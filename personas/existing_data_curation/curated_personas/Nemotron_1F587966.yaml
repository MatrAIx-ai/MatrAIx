personas:
  professional: Angel Norwood, a licensed clinical psychologist, integrates evidence‑based CBT and DBT with a community‑focused, collaborative style, leveraging their organized, methodical approach and
    sociable energy to design and lead group workshops, supervise interns, and rigorously evaluate outcomes using psychometric analytics.
  sports: Angel Norwood energizes weekends by hiking the Ouachita foothills, participating in a local women's climbing club, cheering on the Oklahoma City Thunder and Dallas Cowboys, and completing weekly
    yoga sessions that blend strength and flexibility, reflecting their love for group activity and commitment to consistent fitness.
  arts: Angel Norwood immerses in the arts through community‑theater productions, African drum circles inspired by the rhythms of Fela Kuti and Tony Allen, and a reading habit that spans sci‑fi classics
    like Octavia Butler's Parable of the Sower to contemporary psychology works by Brené Brown, all of which fuel their creative outlet and communal spirit.
  travel: Angel Norwood prefers meticulously planned road trips that combine outdoor adventure and cultural immersion, having trekked a segment of the Appalachian Trail in Virginia, explored New Orleans’
    historic French Quarter, and already earmarked a future retreat to the Scottish Highlands for a community‑wellness workshop.
  culinary: Angel Norwood treats their kitchen like a laboratory, crafting soul‑nourishing dishes such as quinoa‑seeded collard‑green stew with smoked tempeh, turmeric‑infused carrot soup, and sweet‑potato
    gnocchi topped with sage‑brown butter, and regularly sharing these nutrient‑dense meals at neighborhood potlucks.
  core: Angel Norwood blends scientific precision with a vibrant communal ethos, juggling research, therapy, drumming, gardening, and late‑night coffee‑fuelled grant writing, all while never missing a weekly
    yoga class.
background:
  cultural: Angel is a Black woman raised in Muskogee, Oklahoma, whose family roots trace back to the Great Migration and the early 20th‑century settlement of African‑American communities in the Indian
    Territory. She grew up attending a historically Black Baptist church that emphasized storytelling, music, and communal service, shaping her values of resilience and collective uplift. Angel celebrates
    Juneteenth and Black History Month with family gatherings and community outreach, and she honors local Indigenous traditions by participating in cultural exchanges with neighboring tribal nations. Her
    cultural identity informs her therapeutic approach, prompting her to incorporate narratives of empowerment, address racial and socio‑economic stressors, and foster culturally responsive spaces for her
    clients.
attributes:
  skills: '[''Cognitive‑behavioral therapy (CBT)'', ''Dialectical behavior therapy (DBT)'', ''Trauma‑informed care'', ''Motivational interviewing'', ''Psychometric assessment (e.g., MMPI‑2, WAIS-IV)'',
    ''Statistical analysis and research design'', ''Group therapy facilitation'', ''Crisis intervention'', ''Case management'', ''Community mental‑health program development'', ''Culturally responsive counseling'',
    ''Digital mental‑health platform integration'', ''Supervision and training of psychology interns'', ''Public speaking and workshop design'', ''Evidence‑based practice implementation'']'
  hobbies: '[''Hiking local trails'', ''Community theater acting'', ''African drum circles'', ''Cooking healthy soul‑food recipes'', ''Reading science‑fiction and psychology books'', ''Yoga practice'',
    ''Youth mentorship volunteering'', ''Gardening native Oklahoma plants'', ''Photography of nature and community events'', ''Attending live jazz and blues concerts'', ''Running community wellness workshops'']'
  career_goals: Angel aims to earn a Ph.D. in Clinical Psychology within the next three years to deepen her research expertise. She plans to obtain full licensure as a clinical psychologist and eventually
    open a private practice focused on serving underserved rural and minority populations in Oklahoma. A key ambition is to develop a community mental‑health hub in Wagoner County that offers culturally
    competent services, group workshops, and tele‑therapy options. Angel also aspires to become a faculty adjunct at a regional university, mentor emerging psychologists, and publish research on mental‑health
    disparities affecting Black communities in the Southern Plains.
