  career_goals: John hopes to pursue a STEM pathway that merges his curiosity with practical impact. He aspires to earn a scholarship to a high-performing high school, study engineering—particularly mechanical
    or civil engineering—and eventually design sustainable infrastructure projects for the Pocono region. He is also intrigued by computer science and dreams of developing apps or simple robotics that help
    his community, such as tools for local park maintenance or school resource management.
