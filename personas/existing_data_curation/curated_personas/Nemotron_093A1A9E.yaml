personas:
  professional: John Albright, an aspiring aerospace tinkerer, combines disciplined project planning with boundless curiosity as they construct elaborate LEGO Technic machines, program simple Scratch games,
    and launch model rockets, always documenting each step to meet high personal standards.
  sports: John Albright guards the point for the Pocono Valley Junior Hoopers, emulating the play style of NBA star James Harden while cheering for the Philadelphia 76ers, and they follow a strict after-school
    conditioning regimen that includes sprint drills, free-throw practice, and weekly film review sessions.
  arts: John Albright's saxophone solo in the school jazz band reflects a budding appreciation for classic bebop legends like Charlie Parker and John Coltrane, and they often spend evenings transcribing
    melodies from the Star Wars soundtrack, a habit that fuels both their musical creativity and their love for sci-fi storytelling.
  travel: John Albright prefers meticulously planned weekend getaways, such as family hikes along the Pocono Ridge Trail and day trips to the historic sites of Washington DC, while dreaming of a future
    summer adventure at NASA's Kennedy Space Center and a themed vacation at Orlando's Disney World, they balance their love for exploration with the constraints of a modest allowance.
  culinary: John Albright enjoys a rotating menu of pepperoni pizza, cheesy spaghetti carbonara, and crunchy tacos, often helping their parents whip up homemade banana bread and fruit smoothies, and they
    proudly claim a budding knack for measuring ingredients - though they sometimes forget to wash the dishes, leading to a lingering habit of piling a small stack of plates in the sink.
  core: John Albright blends disciplined engineering curiosity with organized financial habits, a love for basketball, and a knack for music, while they juggle occasional health quirks and a penchant for
    meticulously planned adventures.
background:
  cultural: John was raised in East Stroudsburg, a small-town community in Monroe County, Pennsylvania, where many families share a blend of working-class and middle-class values. The town’s cultural life
    centers on local schools, community events such as the Pocono Mountain Festival, and seasonal traditions like Thanksgiving gatherings and holiday light displays. His family observes the region’s emphasis
    on self-reliance, community service, and school spirit, while also participating in church-based activities common in the area. These influences foster his cooperative nature, appreciation for harmony,
    and desire to contribute positively to his neighborhood.
