  hobbies: '["Art gallery visits", "Street-art exploration", "Sketching", "Photography", "Acoustic guitar playing", "Hiking", "Cooking Tex-Mex cuisine", "Collecting vintage vinyl records"]'
  career_goals: Kenneth aims to transition from a senior sales associate to a store manager within the next two years, leveraging his organizational strengths and people‑oriented approach. He plans to complete
    a bachelor’s degree in Business Administration part‑time, with a focus on marketing and supply‑chain management, to qualify for regional management roles. Long‑term, he envisions opening a boutique
    that showcases emerging local artists and crafts, combining his commercial expertise with his passion for art and community development.
