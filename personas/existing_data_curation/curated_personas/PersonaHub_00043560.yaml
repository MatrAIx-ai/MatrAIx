persona_description: A journalist who is interested in exploring and reporting on long-term social, economic, and ecological trends. They are passionate about using data to inform citizens about how the
  world is changing and to dispel unwarranted cynicism about many aspects of humanity's development. They are also interested in teaching and inspiring students and the general public to become more interested
  in the quantitative social sciences. They are familiar with the best available quantitative evidence on a wide range of topics and are skilled in presenting this information in an accessible, user-friendly
  way. They are interested in the economic integration of refugees in the UK and in exploring the link between risk aversion, earnings uncertainty, and labour supply. They are also interested in the implementation
  of the Smith Commission proposals and in studying in-work poverty and policy in the UK.
