personas:
  professional: Jeffery Cody is an aspiring junior engineer who channels their love of LEGO city building and Scratch coding into meticulously planned projects, and they earn merit badges in scouting that
    showcase a disciplined, structure‑loving nature.
  sports: Jeffery Cody plays forward for the Pinckney Tigers youth soccer team in the fall, cheers on the Detroit Lions on Sundays, occasionally joins the school’s winter ice‑skating club, and they spend
    summer weekends fishing at local lakes with dad, embodying a balanced love of team sport, regional professional fandom, and outdoor recreation.
  arts: Jeffery Cody fuels their creativity by building elaborate LEGO cityscapes, designing simple games on Scratch, devouring the Percy Jackson series, listening to Imagine Dragons and Taylor Swift on
    repeat, and they attend the Pinckney Community Theatre’s summer production of Peter Pan, weaving together a vibrant tapestry of hands‑on creation and popular culture.
  travel: Jeffery Cody prefers family road trips planned around school breaks, relishes past visits to Sleeping Bear Dunes and Disney World in Orlando, enjoys camping at local state parks during summer,
    and they dream of exploring Yellowstone National Park with dad, reflecting a mix of local adventure and big‑destination curiosity within a modest budget.
  culinary: Jeffery Cody loves hearty mac and cheese, chicken nuggets with honey mustard, and the occasional fish fry of trout caught on dad’s lake outings, often helping to grill hotdogs for the Fourth
    of July fireworks and assembling s’mores at camp, and they proudly master the art of flipping pancakes for a perfect breakfast.
  core: Jeffery Cody is a meticulous young builder whose love of order drives both their LEGO city designs and weekly Pokémon card trades, but they sometimes let perfectionism lead to lingering over a single
    LEGO brick while forgetting to finish a school assignment.
background:
  cultural: Jeffery grew up in Pinckney, a small town in Livingston County, Michigan, where Midwestern values of community, hard work, and modesty are emphasized. His family participates in local traditions
    such as Fourth of July fireworks, Thanksgiving gatherings, and church events, fostering a strong sense of belonging. The region's seasonal outdoor activities—snowy winters, summer lake outings, and
    autumn hikes—shape his appreciation for nature. These cultural influences blend with his white American heritage, creating a upbringing grounded in family support, school involvement, and a respect
    for rules and structure.
