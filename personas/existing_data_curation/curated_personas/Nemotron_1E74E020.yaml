  hobbies: '[''LEGO building'', ''Soccer'', ''Reading adventure books'', ''Pokémon card collecting'', ''Scratch programming'', ''Boy Scouts'', ''Fishing'']'
  career_goals: Jeffery dreams of becoming an engineer, particularly a civil or mechanical engineer who designs bridges, roads, and innovative structures. He is motivated to excel in math and science, join
    his school's STEM club, and participate in robotics workshops. He also admires community helpers like firefighters and hopes to combine his love for building with a role that serves his town, viewing
    education as a stepping stone toward a future in engineering and public service.
