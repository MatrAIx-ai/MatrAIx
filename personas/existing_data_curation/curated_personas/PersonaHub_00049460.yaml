persona_description: A Victorian writer and poet who was well-versed in Biblical knowledge and used typological techniques in his works, often seeking to explore the deeper significance of everyday events
  through allegorical interpretations. He was interested in the psychological implications of his use of typology, and his sonnet "The Passover in the Holy Family" is a testament to this. Rossetti's familiarity
  with Dante's poetry is also evident in his translations of the poet's works.
