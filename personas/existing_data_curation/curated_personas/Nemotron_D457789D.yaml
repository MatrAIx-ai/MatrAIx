  hobbies: '[''Abstract painting'', ''Sketching and digital illustration'', ''Reading speculative fiction'', ''Philosophy and abstract theory'', ''Hiking in the Green Mountains'', ''Birdwatching'', ''Arduino
    and kinetic art projects'', ''Ukulele playing'', ''Puzzle solving (crosswords, Sudoku)'', ''Meditation and yoga'']'
  career_goals: In the short term, Maria plans to complete an online data‑analytics certificate and build a portfolio of freelance projects, such as data visualizations for local non‑profits and interactive
    dashboards for small businesses. She wants to leverage her creative eye and analytical mindset to transition from cashier work into a role that merges technology and design. Long‑term, she aspires to
    secure a remote position as a data analyst or user‑experience researcher where she can explore abstract concepts, conduct user‑centric research, and design data‑driven product experiences—all while
    maintaining a flexible schedule that supports her family and allows time for her artistic pursuits. She also hopes to mentor community members in basic data literacy, contributing to the tech ecosystem
    of rural Vermont.
