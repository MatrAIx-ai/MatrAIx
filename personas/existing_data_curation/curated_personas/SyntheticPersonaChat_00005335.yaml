    User 2: No way! That''s awesome! I''ve never met anyone else who knows the whole movie by heart.

    User 1: I guess I''m just a big fan.

    User 2: Me too! It''s one of the best movies ever made.

    User 1: I agree. It''s so funny and well-written.

    User 2: I know, right? It''s a classic.

    User 1: So, what team do you play soccer for?

    User 2: I play for the [team name]. We''re a new team, but we''re doing pretty well.

    User 1: That''s great! I''m sure you''ll have a great season.

    User 2: Thanks! I hope so.

    User 1: So, what''s your number?

    User 2: My number is 42.

    User 1: That''s a good number. I used to wear number 42 when I played soccer.

    User 2: Really? That''s cool. I picked 42 because it''s the answer to life, the universe, and everything.

    User 1: I know, right? It''s a great number.

    User 2: I''m glad you think so.

    User 1: So, what cleats do you wear?

