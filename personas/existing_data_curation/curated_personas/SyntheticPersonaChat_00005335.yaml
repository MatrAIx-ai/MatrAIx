    User 2: I know, right? They''re so comfortable and they give me great traction.

    User 1: I''m glad you like them.

    User 2: Thanks! I love them.

    User 1: Me too.

    User 2: So, what do you do for volunteer work?

    User 1: I volunteer at a local human rights organization.

    User 2: That''s great! I''m sure you do a lot of good work.

    User 1: I try. I''m glad I can help out.

    User 2: I''m sure the people you help appreciate it.

    User 1: I hope so.

    User 2: So, what do you like about volunteering?

    User 1: I like helping people who are less fortunate than me. I also like making a difference in the world.

    User 2: That''s great. I think volunteering is a really important thing to do.

    User 1: I agree. It''s a great way to give back.

    User 2: I know, right? It''s so rewarding.

    User 1: Me too.

    User 2: So, what are you doing later?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m not sure either. Maybe we could hang out?

    User 1: That sounds like fun! I''d love to hang out.

    User 2: Great! We can do whatever you want.

    User 1: We could go to a movie, play soccer, or just hang out and talk.

    User 2: Any of those sound good to me.

    User 1: Great! I''ll pick you up at 7:00.

    User 2: Sounds good! I''ll see you then.'
