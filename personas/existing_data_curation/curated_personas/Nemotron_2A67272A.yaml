personas:
  professional: Sun Eun is a detail‑driven CNC technician and lean‑manufacturing champion who leverages bilingual communication to streamline shop‑floor processes, mentors new hires, and meticulously documents
    workflows while they plot a path toward a supervisory role.
  sports: Sun Eun is a co‑ed volleyball enthusiast who competes with the Providence Spikers, cycles the Blackstone River Path on weekends, hikes the White Mountains and Acadia National Park during the fall,
    and stays loyal to the Boston Celtics and New England Patriots, using each activity as a structured release for their energetic social nature.
  arts: Sun Eun blends kinetic K‑pop choreography with a love for contemporary sculpture, often rehearsing routines to the beats of BTS and BLACKPINK while drawing inspiration from the metal installations
    of Richard Serra, the vibrant canvases of Yayoi Kusama, and local New England gallery shows, channeling this aesthetic into their DIY metal‑sculpture workshops.
  travel: Sun Eun plans weekend getaways with meticulous itineraries, favoring the rugged trails of the Appalachian Trail in Maine, the historic streets of Kyoto for a design workshop, and occasional road
    trips to Portland’s maker fairs, balancing their love of adventure with a modest travel budget tied to their savings goals.
  culinary: Sun Eun is a skilled home chef who faithfully prepares bibimbap, kimchi fried rice, and bulgogi using gochujang, sesame oil, and fresh napa cabbage, often hosting communal dinners where friends
    admire the precision of their plating as much as the flavor, while they occasionally indulge in late‑night ramen noodle experiments after a long machining shift.
  core: Sun Eun is a methodical maker who fuses precision engineering with vibrant community dance, thrives on structured routines yet never shies from spontaneous creative bursts, and quietly battles a
    habit of late‑night coffee binges that fuel both their CNC work and 3‑D‑printing projects.
background:
  cultural: Sun Eun is a second-generation Korean-American who grew up in the Boston metropolitan area. Her household emphasized respect for elders, collective responsibility, and a strong work ethic, values
    that still guide her professional life. Fluent in both Korean and English, she bridges her heritage and American culture by participating in Korean cultural festivals, such as Chuseok celebrations at
    the local Korean community center, and by volunteering as a translator for new immigrants. Her family's emphasis on education led her to pursue a humanities degree, yet she was drawn to the tangible
    satisfaction of making things with her hands, prompting her transition to manufacturing. She maintains ties to Korean traditions through food, language, and occasional visits to relatives in South Korea,
    while also embracing the diverse cultural fabric of Massachusetts through community events and multicultural collaborations.
attributes:
  skills: '[''CNC milling and turning'', ''Blueprint reading'', ''MIG/TIG welding'', ''Plastic injection molding operation'', ''Material selection and testing (metals and polymers)'', ''Quality inspection
    using calipers and CMM'', ''Lean manufacturing and Six Sigma process improvement'', ''OSHA safety compliance'', ''Preventative equipment maintenance'', ''CAD/CAM software (SolidWorks, Fusion 360)'',
    ''Technical documentation and record-keeping'', ''Team coordination and shift scheduling'', ''Bilingual communication (Korean & English)'', ''Training and mentorship of new employees'']'
  hobbies: '[''Volleyball league'', ''K-pop dance crew'', ''Hiking New England trails'', ''Cycling'', ''DIY metal sculpture workshops'', ''3-D printing and prototyping'', ''Cooking Korean cuisine'', ''Reading
    contemporary fiction and historical non-fiction'', ''STEM volunteering for middle-school students'']'
  career_goals: In the short term, Sun Eun aims to secure a CNC Certified Operator credential and take on a lead-technician role on the shop floor, where she can apply her process-optimization skills. Within
    three to five years she plans to advance to a production supervisor position, overseeing a team of machinists, driving Lean initiatives, and mentoring junior staff. Long-term, she envisions launching
    her own boutique fabrication studio that merges her artistic sensibility with sustainable metal and plastic design, offering customized products for local artists and small businesses. Throughout her
    career she is committed to building stable, predictable work environments, championing safety, and fostering inclusive, culturally aware teams.
