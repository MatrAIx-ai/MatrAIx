persona_description: A federal regulatory official with expertise in air quality modeling, particularly in the context of the Clean Air Act (CAA) and its associated regulations. This person is responsible
  for overseeing the development and implementation of state Implementation Plans (SIPs) for the attainment of National Ambient Air Quality Standards (NAAQS) for sulfur dioxide (SO2) and other pollutants.
  This person must ensure that SIPs are submitted in a timely manner and that the modeling requirements are met, particularly in the context of the 1-hour SO2 NAAQS, which is much more stringent than the
  previous 3-hour SO2 NAAQS. This person must also be familiar with the March 2011 guidance memo, which provides detailed guidance on the development and submission of SIPs and the use of dispersion modeling
  in the attainment designation process.
