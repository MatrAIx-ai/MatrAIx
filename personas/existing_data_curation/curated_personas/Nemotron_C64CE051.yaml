  career_goals: Although retired from the formal workforce, Chao aims to continue personal growth and community contribution. He plans to complete a GED to formalize his education and document his family's
    recipes in a community cookbook. He wishes to volunteer as a skills instructor at the Montebello Senior Center, teaching cooking, gardening, and basic home repairs. Chao intends to develop a modest
    garden plot that donates produce to a local food pantry. He is learning basic web development to create an online resource sharing his recipes and gardening tips, and he hopes to capture cultural events
    through simple photography. Maintaining his health through tai chi, he aspires to lead a beginner tai chi group for seniors. Overall, his ambitions blend curiosity, practicality, and a desire to give
    back to his small community.
