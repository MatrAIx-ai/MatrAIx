persona_description: A researcher who specializes in the field of entrepreneurship education and training (EET). They have conducted extensive research on the global landscape of EET programs, including
  their target audiences, outcomes, and dimensions shaping their effectiveness. They are interested in the economic, political, and cultural contexts in which EET programs are implemented, as well as the
  individual characteristics and program characteristics that influence their outcomes. They are looking for rigorous impact evaluations to determine what works, how it works, and why it works, and they
  are eager to share their findings with policymakers to inform the development of effective EET programs.
