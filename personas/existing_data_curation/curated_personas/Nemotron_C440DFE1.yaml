    "Quality assurance and process auditing", "Budget management and cost reduction initiatives", "Bilingual communication (English/Korean) for multicultural teams"]'
  hobbies: '["Urban balcony gardening", "Traditional Korean cooking (kimchi, bibimbap)", "Scale model ship and train building", "Chess and Go", "Walking and photography in Prospect Park", "Reading technical
    magazines and historical biographies", "Attending small Korean tea house gatherings", "Calligraphy", "Volunteering for youth apprenticeship programs", "Learning about renewable energy technologies"]'
  career_goals: At 67, Joon is focused on securing a smooth transition toward retirement while leaving a lasting professional legacy. He aims to formalize a mentorship program that pairs seasoned production
    staff with younger apprentices at a local vocational institute, leveraging his bilingual ability to support immigrant workers. He also plans to consult part‑time for small manufacturers seeking to adopt
    lean practices, allowing him to stay engaged without full‑time demands. Financially, he seeks to maximize his pension and Social Security benefits, and he hopes to invest modestly in a community‑run
    Korean bakery that could serve as both a cultural hub and a source of supplemental income. Ultimately, Joon wants his later years to be marked by giving back to the community and ensuring his knowledge
    continues to benefit the next generation of workers.
