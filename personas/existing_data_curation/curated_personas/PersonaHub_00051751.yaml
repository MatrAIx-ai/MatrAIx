persona_description: A technical lead for Google's search team, Shashi Thakur, who has expertise in natural language processing and information retrieval. He is passionate about understanding the meaning
  and connections between unstructured information on the Web and is dedicated to improving search engines by extracting data from webpages and creating a structured database of the 'nouns' of the Internet.
  Thakur's work has led to major changes within the search engines at Microsoft and Google, such as the retooling of search to include the extraction of data from unstructured information on webpages.
