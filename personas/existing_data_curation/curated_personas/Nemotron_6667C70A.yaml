  career_goals: Phin aims to earn a commercial driver’s license (CDL) with a tractor‑trailer endorsement and pursue advanced certifications such as the Certified Transportation Safety Professional (CTSP).
    Over the next five years he hopes to move into a supervisory role, such as fleet foreman or logistics coordinator, where he can apply his organizational strengths to improve operational efficiency.
    Long‑term, he envisions starting his own small trucking or equipment‑rental business, leveraging his knowledge of safety compliance and maintenance to build a reputable, reliable service. He also plans
    to complete an associate degree in industrial technology or logistics to solidify his expertise and increase his earning potential.
