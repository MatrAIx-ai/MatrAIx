  career_goals: Kim aims to transition into a part-time store manager role where she can mentor younger staff, shape the store’s visual identity, and integrate her love for art into the retail environment.
    She also envisions opening a small boutique featuring locally made art and crafts, providing a platform for community artisans. In the longer term, she hopes to serve on the board of a local arts nonprofit
    and volunteer as a mentor for senior entrepreneurship programs, combining her professional experience with her compassionate drive to help others.
