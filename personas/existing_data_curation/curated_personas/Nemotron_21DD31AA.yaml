personas:
  professional: Kim Harrison, a seasoned retail veteran with deep expertise in visual merchandising, inventory control, and team leadership, leverages their methodical organization and artistic curiosity
    to curate compelling store displays, mentor younger staff, and lay the groundwork for a future part‑time manager role and a boutique showcasing local artisans.
  sports: Kim Harrison stays active by walking their dog daily through the prairie, participating in the Nebraska Senior Walkers Club, cheering on the Cornhuskers football team, and joining a local senior
    softball league that meets each spring, embodying a balanced mix of low‑impact fitness and community spirit.
  arts: Kim Harrison immerses themselves in the arts by taking weekly watercolor lessons inspired by Claude Monet, crafting quilts that echo the patterns of early American folk art, attending community
    theater productions of Arthur Miller plays, and curating gallery visits that feature Nebraska‑born artist Bob DeWeese.
  travel: Kim Harrison favors thoughtfully planned trips to cultural festivals such as Santa Fe’s International Folk Art Market, New Orleans Mardi Gras, and Kyoto’s cherry‑blossom season, while also revisiting
    regional gems like the Nebraska State Fair and the historic town of Grafton, balancing adventure with a modest travel budget that prioritizes their family and community obligations.
  culinary: Kim Harrison enjoys home‑cooked, farm‑to‑table meals like roasted heirloom tomatoes with basil pesto, grilled corn on the cob drizzled with herb butter, and a signature beet and goat‑cheese
    salad, showcasing their moderate cooking skill level and a penchant for fresh, locally sourced ingredients.
  core: Kim Harrison, a community‑rooted retail expert with an artistic soul, blends their methodical organization, boundless curiosity, and compassionate mentorship into every facet of life, from store
    displays to garden soil.
background:
  cultural: Kim grew up in a Midwestern, white Protestant family in Nebraska, where values of self-reliance, community, and modesty were emphasized. Her upbringing included church involvement, participation
    in county fairs, and a deep appreciation for the agricultural landscape of Lancaster County. While she respects traditional Midwestern customs, her natural curiosity has led her to embrace diverse artistic
    expressions and multicultural experiences through travel, community programs, and her love of the arts.
