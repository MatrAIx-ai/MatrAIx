  career_goals: Alanna aims to advance into higher operational management, such as an Office Manager or Operations Manager role, where she can lead broader strategic initiatives across multiple departments.
    She plans to earn certifications in Lean Six Sigma and Project Management to strengthen her process‑improvement expertise. Additionally, she is interested in completing a part‑time MBA to broaden her
    business acumen and to position herself for potential promotion to Director of Administrative Services. She also aspires to mentor emerging supervisors and champion workplace environments that support
    focused, low‑distraction work settings.
