  hobbies: '[''Herb gardening on her balcony'', ''Experimenting with seasonal home recipes'', ''Food photography for social media'', ''Reading culinary history and technique books'', ''Hiking in local parks
    and nature reserves'', ''Yoga for stress management'', ''Small‑group cooking club participation'', ''Volunteering at the local food bank kitchen'', ''Listening to jazz while cooking'', ''Knitting scarves
    and blankets'']'
  career_goals: Susan aims to move from a food‑preparation role to a line‑cook position within the next year, targeting an Italian‑focused restaurant in New Jersey where she can deepen her culinary repertoire.
    She plans to earn a Certified Sous Chef credential within two years and eventually pursue a bachelor's degree in Culinary Management. Her long‑term ambition is to become a head chef or launch a boutique
    catering service that specializes in intimate, farm‑to‑table Italian‑style meals for small gatherings—aligning her love of structured, high‑quality food with the flexibility to craft spontaneous, creative
    menus. She also seeks a predictable work schedule that balances career advancement with personal time for her hobbies.
