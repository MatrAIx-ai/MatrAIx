personas:
  professional: Jeffrey Mozdzen, a retired mechanical engineer with two decades of maintenance expertise, now channels his practical mindset into a home workshop where he meticulously restores a 1965 Chevrolet,
    crafts custom wooden furniture, and is quietly building a small side business selling restored classics while mentoring his grandchildren in hands‑on skills.
  sports: Jeffrey Mozdzen enjoys low‑key competition on the lanes of his local bowling league and follows the regional baseball team, the Milwaukee Brewers, while maintaining fitness through weekend fishing
    outings and occasional garden chores, preferring solitary activity over organized sports.
  arts: Jeffrey Mozdzen finds inspiration in the craftsmanship of folk woodcarvers, the storytelling of Johnny Cash, the classic blues of B.B. King, and the historical documentaries about early American
    industry, often listening to these while brewing a new batch of IPA in his garage studio.
  travel: Jeffrey Mozdzen favors purposeful road trips to historic towns such as Marquette, MI, and classic‑car events in Detroit, while dreaming of a pilgrimage to Bavaria’s beer gardens, planning each
    journey with a detailed itinerary but remaining flexible enough to linger at a lakeside fishing spot if the mood strikes.
  culinary: Jeffrey Mozdzen delights in grilling fresh trout from the lake alongside heirloom tomato salad, perfects a hearty vegetable stew from his garden’s bounty, and experiments with home‑brew recipes
    featuring Cascade hops and malted barley, though his cooking skill remains solidly practical rather than gourmet.
  core: Jeffrey Mozdzen blends a steadfast routine with a quiet competitive streak, mastering wood, metal, and hops while occasionally letting disorganization slip into his budget sheets and garden chores.
background:
  cultural: Jeffrey was raised in a small town in central Iowa in a family of German-Lutheran heritage, a background that instilled Midwestern values of hard work, self-reliance, modesty, and community
    responsibility. The agricultural and manufacturing environment of the region shaped his practical, routine-oriented mindset, and his social circle reflects the close-knit, low-key community culture
    of West Des Moines. While he remains reserved and values solitude, he also participates in church gatherings and local volunteer events, embodying the region’s blend of independence and neighborly support.
