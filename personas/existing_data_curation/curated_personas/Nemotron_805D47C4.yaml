  career_goals: Edward aims to re‑enter the education workforce within the next year, targeting a position as a middle‑school teacher or an educational consultant focused on curriculum design for community
    programs. He plans to enroll in a master's program in Educational Leadership or Special Education to deepen his expertise and increase his qualifications for leadership roles. A long‑term ambition is
    to launch a community learning hub in Everett that offers after‑school STEAM workshops, environmental stewardship projects, and stress‑management resources for youth. He also hopes to develop a simple
    mobile app that helps students track anxiety triggers and practice coping strategies, merging his personal experience with professional skill. Throughout his career trajectory, Edward seeks a balance
    between stable income, creative curriculum development, and time for personal reflection and self‑care.
