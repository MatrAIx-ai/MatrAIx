personas:
  professional: Sharmaine James is a budding preschool explorer who blends curiosity with practicality, organizing block towers with methodical precision while staying flexible enough to improvise new structures
    during play, delighting peers with talkative explanations and thriving as the center of group activities.
  sports: Sharmaine James loves to chase after a bright orange ball at the neighborhood playground, proudly wearing the Tiny Tots Soccer Club jersey and eagerly cheering on the local minor league baseball
    team when they visit with family.
  arts: Sharmaine James pours creative energy into drawing rainbow‑colored dinosaurs while singing along to The Wiggles, and they are especially captivated by the animated adventures of the show 'Bluey',
    which shape their playful imagination.
  travel: Sharmaine James enjoys weekend trips to the city zoo, relishing the excitement of seeing giraffes up close, and they dream of a summer adventure to Disney World, guided by a family‑planned itinerary
    that balances sightseeing with nap breaks.
  culinary: Sharmaine James favors cheesy macaroni, crunchy apple slices, and peanut butter‑banana sandwiches, proudly insisting on stirring the sauce themselves, while also delighting in occasional bites
    of homemade chicken nuggets.
  core: Sharmaine James blends boundless curiosity with a love for organized play, thrives on social interaction, and cycles through intense bursts of anxiety that they soothe with familiar routines and
    comforting snacks.
background:
  cultural: Sharmaine is raised in a Black American family in Saint Paul, Minnesota. Her household celebrates African‑American cultural traditions, including Juneteenth, family gatherings featuring soul
    food, and church community events that emphasize music, storytelling, and communal support. The local Black community in Ramsey County provides her with exposure to gospel music, hip‑hop rhythms, and
    cultural festivals that reinforce a sense of identity and belonging while also reflecting Midwestern values of friendliness and civic engagement.
attributes:
  skills: '[''basic language proficiency'', ''counting to ten'', ''color and shape identification'', ''block building'', ''sharing and cooperation'', ''expressive storytelling'', ''following simple routines'']'
  hobbies: '[''singing nursery rhymes'', ''dancing'', ''pretend play with dolls'', ''listening to picture books'', ''library story‑time'', ''outdoor park activities'', ''simple crafts and drawing'']'
  career_goals: Even at her young age, Sharmaine loves watching teachers and caregivers and often says she wants to "help kids learn" when asked about the future. She dreams of becoming a teacher or a community
    helper who can bring joy and support to other children, inspired by her desire to create harmony and nurture others.
