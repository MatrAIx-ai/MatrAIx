  hobbies: '[''TikTok video creation'', ''battle-royale gaming'', ''rap lyric writing'', ''beat-making'', ''pickup basketball'', ''journaling'', ''street art sketching'', ''creative cooking'', ''volunteering
    at youth program'', ''thrift shopping'']'
  career_goals: Shirlee aims to turn her digital media talent into a full‑time career as a content creator and brand strategist for youth‑focused streetwear. Over the next few years she plans to earn her
    GED and complete a short certificate in digital marketing, then launch her own online clothing line that blends custom designs with social‑media storytelling. Long‑term, she hopes to open a community
    hub in Humble that offers mentorship, creative workshops, and entrepreneurial resources for other teens who have left school early, turning her competitive drive into community empowerment.
