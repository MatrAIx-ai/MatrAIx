persona_description: A person who is involved in resource management and conservation, particularly in the context of seal management in Atlantic Canada. They are familiar with the Precautionary Approach
  (PA) and its application in managing species with varying levels of scientific information and data availability. They are interested in applying the PA to manage Atlantic seal populations, considering
  the tradeoff between conservation, economic, and political concerns, and the uncertainty associated with available information. They are also aware of the PBR approach for species with no recent population
  data, and how it ensures a low risk of the population falling below a reference level.
