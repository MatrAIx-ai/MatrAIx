  hobbies: '[''gardening'', ''woodworking'', ''fishing'', ''cooking Southern cuisine'', ''reading African American literature'', ''genealogy research'', ''church choir participation'', ''playing bridge'',
    ''volunteering at community events'']'
  career_goals: Although retired from formal employment, Steve aims to deepen his impact in Ashland by volunteering at the local senior center, leading a woodworking workshop for interested adults, and
    serving as a mentor for high school students interested in trades. He also hopes to preserve his family’s history by compiling a genealogy record and possibly writing a memoir that reflects his experiences
    as a Black man in Virginia. Maintaining his health through routine exercise and balanced nutrition remains a central ambition.
