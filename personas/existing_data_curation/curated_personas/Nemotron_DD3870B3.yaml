  career_goals: Katherine aims to transition from a senior management analyst to a director of analytics within the next five years, overseeing enterprise-wide data strategy and leading high-impact transformation
    projects. She is pursuing a PMP certification and a Six Sigma Black Belt to sharpen her project leadership credentials. Long-term, she envisions steering a cross-functional team that embeds data-driven
    sustainability metrics into corporate decision-making, reflecting her concern for environmental impact and corporate responsibility. She also aspires to mentor junior analysts, particularly women entering
    STEM fields, and to contribute thought leadership through industry conferences and publications.
