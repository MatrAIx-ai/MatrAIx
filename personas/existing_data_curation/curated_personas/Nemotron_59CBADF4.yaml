  hobbies: '[''Mexican cooking'', ''Hosting taco nights'', ''High school football booster'', ''Fishing on Lake Norman'', ''Woodworking'', ''Weekly poker games'', ''Weight training'', ''Live music concerts'',
    ''Participating in Hispanic cultural festivals'', ''Mentoring youth in community programs'']'
  career_goals: Kenny aims to advance to a senior lead inspector role within Mecklenburg County, overseeing multiple inspection teams and shaping regional compliance standards. He plans to earn the ICC
    Certified Building Official credential within the next two years, which will position him for a future role as a code‑adoption consultant for the county planning department. Long‑term, he envisions
    launching his own independent inspection and safety‑consulting firm, offering specialized services to developers and contractors across the Carolinas. He also aspires to mentor the next generation of
    inspectors through workshops and serve on the state building code review committee, cementing his reputation as a competitive, outcomes‑focused leader in the field.
