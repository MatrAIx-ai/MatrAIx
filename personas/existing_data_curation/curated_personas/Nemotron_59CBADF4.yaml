personas:
  professional: Kenny Gomez, a seasoned residential and commercial construction inspector, leverages an OSHA-30 certification and ICC credentials to enforce the 2018 NC Building Code with razor-sharp attention
    to cost-effective safety solutions, while they channel their competitive drive and sociable energy into mentoring junior staff and leading high-stakes safety briefings.
  sports: Kenny Gomez volunteers as a booster for the Lake Norman High School Warriors football program, trains four times a week at Iron Haven Gym focusing on strength building, casts early-morning lines
    on Lake Norman, and avidly follows the Charlotte Hornets and Carolina Panthers, often syncing game-day excitement into their personal workout playlists.
  arts: Kenny Gomez curates weekend taco nights that transform into live-music showcases, regularly booking regional country star Mickey Guyton and regional Mexican group Grupo Firme, while they co-organize
    the local Cinco de Mayo celebration featuring mariachi ensembles and folk dancers, weaving music and heritage into their social life.
  travel: Kenny Gomez prefers road-trip adventures that blend new scenery with culinary experiences, having driven to Asheville's Blue Ridge Parkway for hiking, to Nashville for songwriting workshops and
    live country gigs, and planning a future visit to Oaxaca to explore its famed street-food markets, all while budgeting trips within the family's yearly travel allowance.
  culinary: Kenny Gomez commands weekend taco nights featuring carne asada, al pastor, and chiles rellenos, expertly marinating meats in achiote, lime, and cumin, preparing fresh pico de gallo with heirloom
    tomatoes, and perfecting homemade corn tortillas from masa harina, while also experimenting with brisket-style barbacoa for country-fusion guests.
  core: Kenny Gomez blends a competitive inspector's precision with a sociable chef's flair, juggling code enforcement, poker tables, and weekend taco rallies, all while they never miss a sunrise fishing
    session despite a chronic habit of over-booking their calendar.
background:
  cultural: Kenny is a first‑generation Mexican‑American; his parents immigrated from the state of Jalisco in the 1970s and settled in the Carolinas seeking work in construction. Growing up in a bilingual
    household, he is fluent in both Spanish and English and carries the traditions of his heritage into daily life. He celebrates Día de los Muertos and Cinco de Mayo with family gatherings, prepares home‑cooked
    mole and tamales, and listens to ranchera and corridos. Catholicism plays a modest role, with regular attendance at St. Michael's parish where the local Hispanic community convenes. While fully integrated
    into the broader Midland and Charlotte area—frequenting local diners and sports bars—he remains a proud representative of Mexican culture, often acting as a bridge between the Hispanic community and
    his predominantly Anglo‑American professional environment.
attributes:
  skills: '[''Building Code Compliance'', ''Structural Inspection'', ''Fire Safety Assessment'', ''Accessibility Compliance'', ''Safety Auditing'', ''Report Writing'', ''Blueprint Interpretation'', ''Risk
