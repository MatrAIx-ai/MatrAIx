  career_goals: Gianni hopes to become a leader in technology and community service. In the next few years he aims to captain his middle-school robotics team and mentor younger students in coding and STEM
    projects. He dreams of studying engineering or computer science in high school and college, with a long-term goal of designing affordable tech tools that help immigrant families stay connected with
    their heritage. He also envisions organizing cultural workshops that blend his Nicaraguan roots with modern technology, eventually becoming a community tech educator.
