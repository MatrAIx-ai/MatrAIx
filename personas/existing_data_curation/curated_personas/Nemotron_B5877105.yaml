personas:
  professional: Salazar Walters is a budding game designer who blends a love for collaborative storytelling with hands‑on LEGO building, using their talkative, improvisational nature to prototype interactive
    experiences in Scratch while juggling school projects with a laid‑back approach to deadlines.
  sports: Salazar Walters laces up for weekend matches with the local youth soccer club, channels the flair of FC Barcelona into every dribble, and balances soccer with summer pickup basketball games at
    the community center, keeping fitness light‑hearted and social.
  arts: 'Salazar Walters strums a battered acoustic guitar while humming along to Shakira and Bad Bunny, devours graphic novels such as ''Spider‑Man: Into the Spider‑Verse'' and ''Maus'' during breaks,
    and lights up the stage in the school drama club’s production of ''The Lion King,'' blending music, illustration, and performance into a vibrant personal soundtrack.'
  travel: Salazar Walters prefers spontaneous weekend road trips with the family, recalling a sun‑splashed adventure at the Grand Canyon and a buzzed‑off day at Disney World, while day‑dreaming about future
    voyages to the historic streets of Paris and the neon lights of Tokyo, balancing a modest allowance with school‑year schedules.
  culinary: Salazar Walters, a confident junior chef, whips up family‑style gallo pinto—mixing rice, black beans, plantains, cilantro, and a splash of lime—while also mastering quick tacos with seasoned
    beef, cheese, and fresh salsa, often experimenting with extra cheese or hot sauce for a personal twist.
  core: Salazar Walters is a talkative, curiosity‑driven 11‑year‑old who mixes LEGO building, soccer, and spontaneous guitar riffs, thriving on social buzz but sometimes misplacing homework in a pile of
    colorful bricks.
background:
  cultural: Gianni grows up in a bilingual Nicaraguan household in Prince William County, Virginia. At home, Spanish is spoken daily, and his family keeps traditions such as celebrating Nicaraguan Independence
    Day, cooking classic foods like gallo pinto, nacatamales, and enjoying folkloric music. He attends a local Catholic church where community events often blend American and Nicaraguan customs. While he
    embraces the multicultural environment of his Virginia neighborhood, he remains deeply connected to his roots through language, food, and participation in cultural festivals organized by the Nicaraguan
    diaspora.
