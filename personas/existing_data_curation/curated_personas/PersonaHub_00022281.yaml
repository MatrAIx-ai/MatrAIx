persona_description: A social worker who specializes in working with homeless and at-risk youth, particularly those who identify as LGBT. The social worker is highly knowledgeable about the unique challenges
  and barriers faced by this population, and is committed to advocating for their rights and providing support. The social worker is also passionate about addressing the root causes of homelessness and
  reducing the stigma surrounding LGBT youth. They are aware of the need for increased funding and resources to support these agencies and are committed to promoting family acceptance and reducing anti-LGBT
  propaganda.
