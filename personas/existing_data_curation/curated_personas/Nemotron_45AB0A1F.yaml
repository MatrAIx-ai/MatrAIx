personas:
  professional: Edward Rotundo, a budding LEGO architect, channels their curiosity and methodical nature into constructing intricate builds that blend step‑by‑step guides with original twists, foreshadowing
    a future in engineering or design.
  sports: Edward Rotundo, an enthusiastic member of the neighborhood Sprouts Soccer Club, races across the school field on Saturdays, idolizes Manchester United’s Marcus Rashford and cheers for the New
    York Yankees while balancing organized drills with spontaneous backyard tag games.
  arts: Edward Rotundo, an avid cartoon doodler, fills sketchbooks with superhero mash‑ups, draws inspiration from classic animator Hayao Miyazaki and the whimsical worlds of LEGO movies, and loves listening
    to The Beatles’ “Yellow Submarine” while building their creations.
  travel: Edward Rotundo dreams of a space‑themed adventure, having already visited the local science museum in Philadelphia and the historic parks of Washington, D.C., while planning with their parents
    a summer road trip to Kennedy Space Center and a future visit to the Great Barrier Reef’s underwater wonders.
  culinary: Edward Rotundo enjoys plain cheese pizza, peanut butter and jelly sandwiches, and homemade spaghetti with marinara sauce, proudly chopping carrots under supervision, but often forgets to wash
    their hands before meals and insists on sprinkling extra parmesan on everything.
  core: Edward Rotundo blends a LEGO‑builder’s precision with a child’s boundless curiosity, juggling meticulous projects and spontaneous outdoor explorations, while occasionally misplacing the odd piece
    of LEGO and hoarding extra candy.
background:
  cultural: 'Edward was raised in a white, Italian‑American family in New Hampton, a close‑knit community in Iowa’s agricultural heartland. The Rotundo family blends their heritage with Midwestern life:
    Sunday dinners often feature homemade pasta or meatballs, while holidays and school events are celebrated with the region’s traditions of county fairs, community picnics, and church gatherings. The
    town’s emphasis on neighborly assistance, self‑reliance, and respect for the land influences Edward’s daily routine—he helps with small chores on the family’s garden, participates in local 4‑H projects,
    and attends the nearby church’s youth activities. This blend of cultural influences nurtures his curiosity about nature, his appreciation for practical tasks, and his collaborative spirit.'
attributes:
