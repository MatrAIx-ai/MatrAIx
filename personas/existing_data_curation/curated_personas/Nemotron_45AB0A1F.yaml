  hobbies: '["LEGO building", "Reading adventure and science books", "Exploring nature (collecting rocks, observing birds and insects)", "Playing soccer", "Participating in 4-H activities (gardening, animal
    care)", "Drawing and cartooning", "Educational computer games", "Helping with cooking and gardening at home"]'
  career_goals: Even at seven, Edward already talks about futures that combine his natural curiosity about how things work with his practical, methodical mind. He frequently says he wants to be an engineer—imagining
    himself designing sturdy playground equipment or bridges that help his town. His love for animals also fuels occasional dreams of becoming a veterinarian, where he could care for pets and farm animals.
    In the near term, he aspires to be the class helper or a “junior coach” for his soccer team, roles that let him practice leadership, organization, and teamwork.
