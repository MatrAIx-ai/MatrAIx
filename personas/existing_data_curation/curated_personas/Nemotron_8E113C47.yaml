  hobbies: '[''Salsa dancing'',''Attending local festivals'',''Hiking in the Sonoran desert'',''Yoga'',''Cooking traditional Mexican cuisine'',''Volunteering at community health fairs'',''Reading mystery
    novels'',''Gardening (chilies and herbs)'']'
  career_goals: She aspires to obtain a Nurse Practitioner certification within the next three years, focusing on primary care for underserved communities in Tucson. She also aims to lead a community health
    outreach program that integrates Mexican cultural practices and promotes preventative care. In the longer term, she envisions a teaching role at a local nursing school where she can mentor the next
    generation, while maintaining a schedule that allows her to manage stress and family responsibilities. She is interested in further specializing in emergency nursing and acquiring certifications in
    trauma care and holistic health.
