personas:
  professional: Shawn Wainright, a budding junior helper at the Surprise Community Library, delights in organizing story‑time books, guiding peers with curious questions and practical tidying, turning their
    natural sociability into a tiny but reliable “library assistant” role.
  sports: Shawn Wainright rushes onto the field for Saturday morning soccer with the Sunrise Soccer Club, cheers loudly for the Arizona Diamondbacks and Arizona Cardinals at home games, and balances outdoor
    play with a weekly indoor gymnastics class at the local community center.
  arts: Shawn Wainright spends afternoons drawing superheroes, sings along to the “Let It Go” soundtrack from Frozen, and eagerly attends library story‑time sessions where guest storyteller reads books
    by author Mo Willems.
  travel: Shawn Wainright loves family road trips to the Grand Canyon, dreams of building sandcastles at the Gulf Coast beaches, and packs a tiny backpack with crayons for the imagination‑fuelled rides
    to the nearby park.
  culinary: Shawn Wainright enjoys cheesy pizza slices, crunchy carrot sticks, and mildly spiced chicken tacos with avocado, can proudly spread peanut butter on toast all by themselves, and insists on adding
    a sprinkle of shredded cheese to every homemade quesadilla.
  core: Shawn Wainright blends boundless curiosity with a practical streak, turning playtime into mini‑projects while occasionally leaving toy cars scattered across the living room floor.
background:
  cultural: Shawn comes from a white family with roots in the Midwest that relocated to Surprise, Arizona. His upbringing blends Midwestern values of friendliness, practicality, and community spirit with
    the outdoor, sun‑filled lifestyle of the Southwest. He celebrates typical American holidays like Independence Day, enjoys community events at the local library and park, and is exposed to the multicultural
    atmosphere of Arizona, including occasional Spanish words and foods at school functions.
attributes:
  skills: '["basic counting (1-20)", "reciting the alphabet", "color identification", "simple reading of sight words", "fine motor coordination (cutting, drawing)", "basic use of tablet apps", "organizing
    LEGO blocks", "following simple game rules", "cooperating with peers"]'
  hobbies: '["playing at Surprise Community Park", "biking around the neighborhood", "building LEGO", "drawing and coloring", "listening to storytime books", "group games (tag, hide-and-seek)", "watching
    space and animal cartoons", "exploring desert nature trails", "helping with simple chores"]'
  career_goals: Shawn dreams of exploring the world and helping others. He often talks about becoming an astronaut to discover space, a scientist who studies desert animals, or a teacher who guides friends
    in learning new things. His caring nature also leads him to imagine roles like a firefighter or a community helper, reflecting his desire to be both curious and practical.
