personas:
  professional: Sally Middleton, a 34‑year‑old painting and paper‑hanging specialist, blends over a decade of hands‑on expertise in surface preparation, colour matching, and project scheduling with an organized,
    methodical work style, while their sociable, talkative demeanor wins client trust and their competitive streak fuels the pursuit of Master Painter certification and local contractor awards.
  sports: Sally Middleton, energizing their week with cardio‑dance classes at the local community center, they cheer loudly for the Detroit Tigers, Lions, and Pistons, and join a co‑ed softball league each
    summer, reflecting a sociable, competitive, and organized approach to fitness.
  arts: Sally Middleton, a vibrant presence in community theater where they both act in productions like Our Town and construct sets inspired by Peter Minshall, they unwind with psychological thriller novels
    by Gillian Flynn and playlists featuring Lin‑Manuel Miranda, merging their curiosity, talkative nature, and love of storytelling into a dynamic creative outlet.
  travel: Sally Middleton, planning trips with the same precision they apply to job schedules, they favor weekend road trips through Michigan’s cherry orchards, a yearly Broadway pilgrimage to New York
    City, and dream of a tranquil agriturismo stay in Tuscany that balances garden‑fresh inspiration with a budget‑conscious itinerary.
  culinary: Sally Middleton, a confident home chef, they regularly transform garden harvests into dishes like roasted beet and goat‑cheese salad, herb‑infused quinoa pilaf, and hand‑rolled spinach‑ricotta
    ravioli, while occasionally splurging on artisanal cheeses and locally sourced honey to impress guests at their signature dinner gatherings.
  core: Sally Middleton is a charismatic, detail‑obsessed painter‑entrepreneur whose love of community theater and garden‑fresh cuisine masks a chronic worry habit that drives them to relentless planning,
    a competitive edge, and occasional over‑commitment to social events.
background:
  cultural: Sally was born and raised in Durand, Michigan, a small town in Shiawassee County. Her family traces its roots to German and Irish immigrants who settled in the Midwest in the early 1900s. Growing
    up she absorbed typical Midwestern values of hard work, modesty, reliability, and community involvement. Family traditions such as Thanksgiving dinners, Fourth of July barbecues, and church gatherings
    at the local Lutheran congregation shaped her practical outlook and sociable nature. These cultural influences underpin her competitive spirit and her desire to contribute meaningfully to her community.
attributes:
  skills: '["Surface Preparation", "Paint Application", "Wallpaper Installation", "Color Matching", "Project Estimating", "Scheduling and Time Management", "Customer Communication", "Safety Compliance",
    "Quality Assurance", "Team Leadership"]'
  hobbies: '["Community theater acting", "Hosting dinner parties", "Gardening", "DIY home‑decor projects", "Attending craft fairs", "Reading psychological thrillers", "Cardio‑dance classes"]'
  career_goals: Sally’s primary ambition is to establish her own painting and paper‑hanging business that serves Durand and the surrounding Shiawassee County. She aims to become a certified Master Painter,
    win local contractor awards, and build a small team of apprentices she can mentor. By growing her company she hopes to achieve financial stability, a more predictable schedule, and the ability to balance
    work demands with family life, thereby reducing her chronic stress.
