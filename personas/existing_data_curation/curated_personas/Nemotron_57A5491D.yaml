personas:
  professional: Ana Litscher is a budding robotics programmer who merges her methodical approach to problem‑solving with a competitive edge, leading her school's robotics club to design and code autonomous
    Python‑driven robots for regional contests.
  sports: Ana Litscher is a disciplined competitive swimmer who trains five days a week with the Seattle Rapids Swim Club, draws tactical inspiration from the Seattle Seahawks, Seattle Kraken, and Seattle
    Sounders FC, and adds weekend soccer drills with Seattle United’s youth division to round out her fitness regimen.
  arts: Ana Litscher produces digital illustrations that fuse cyber‑punk motifs with traditional folk patterns, often referencing the vibrant color palettes of Loish and the storytelling of Studio Ghibli,
    and they unwind by streaming music from Billie Eilish and Mitski.
  travel: Ana Litscher prefers meticulously planned trips, spending summer vacations exploring the Pacific Northwest’s national parks like Mount Rainier, then jetting off to Kyoto’s temples for cultural
    immersion, while saving for a future backpacking adventure through Iceland’s waterfalls.
  culinary: Ana Litscher enjoys a mix of comfort and experimental cooking, skillfully preparing avocado toast topped with radish and poached egg, whipping up sushi rolls with smoked salmon and sushi rice,
    and savoring homemade corn‑tortilla quesadillas filled with melty cheese and grilled chicken, all while insisting on fresh cilantro and lime for that extra zing.
  core: Ana Litscher is a meticulously organized teen who balances a competitive spirit in robotics and swimming with a secret love for midnight doodling, a penchant for obsessively tracking every allowance
    cent, and a habit of double‑checking locker locks before leaving school.
background:
  cultural: Ana comes from a Mexican family that preserves rich cultural traditions while living in La Mirada, California. She grew up speaking both Spanish and English and celebrates holidays such as Día
    de los Muertos, Mexican Independence Day, and Christmas with a mix of Mexican cuisine—tacos, tamales, atole—and American customs. Her parents emphasize education, family cohesion, and community involvement,
    shaping her values of responsibility and perseverance. The bicultural environment of Orange County exposes her to diverse perspectives, allowing her to navigate and integrate her Mexican heritage with
    mainstream American culture.
