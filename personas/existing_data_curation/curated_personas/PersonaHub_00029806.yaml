persona_description: A conservationist who is passionate about the protection and recovery of hen harriers, a rare and threatened species of raptor in England. They are dedicated to the implementation of
  effective brood management schemes and the enforcement of legal protections to ensure the survival of the species. They are also concerned about the issue of illegal killing of hen harriers and believe
  that licensing grouse moors and regulating protected species on shooting estates are the best ways to protect these birds.
