  hobbies: '[''Reading historical fiction and biographies'', ''Knitting and crocheting'', ''Gardening (vegetables and flowers)'', ''Birdwatching'', ''Crossword puzzles and Sudoku'', ''Listening to classic
    radio dramas'', ''Small‑group Bible study'', ''Senior‑center book club'']'
  career_goals: Although retired, Lisa remains driven. She aims to maintain her independence by staying physically active and learning new digital tools, such as video calling and online photo archiving.
    She aspires to document and publish a family memoir that blends personal stories with local history, and to become a regular contributor to the Warren Historical Society’s oral‑history project. Additionally,
    she hopes to expand her garden to supply fresh produce for a neighborhood senior‑food program and to mentor a small group of grandchildren in traditional crafts.
