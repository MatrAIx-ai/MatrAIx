personas:
  professional: Yesenia Ramirez is a veteran New York cab driver who leverages an encyclopedic knowledge of the city’s streets and bilingual fluency to deliver fast, culturally enriched rides while pursuing
    a business degree and eyeing a future in fleet management and boutique tour entrepreneurship.
  sports: Yesenia Ramirez is a member of a downtown salsa‑dance studio, runs with the Central Park Running Club on weekend mornings, and ardently follows the New York Knicks, Yankees, and Rangers, cheering
    them from the stands whenever she can.
  arts: Yesenia Ramirez is a regular at MoMA and the Brooklyn Museum, draws inspiration from street‑art legends like Banksy and the vibrant installations of Yayoi Kusama, enjoys listening to the salsa rhythms
    of Eddie Torres and the jazz of Miles Davis, and frequently quotes contemporary novelist Isabel Allende during conversations.
  travel: Yesenia Ramirez prefers curated weekend getaways such as a culinary tour of a southern U.S. city during a brief leave, spontaneous trips to the Hamptons by train, and has already visited Paris
    to practice French, while dreaming of exploring Barcelona’s architecture and the historic streets of Savannah.
  culinary: Yesenia Ramirez is a confident home cook who masterfully prepares mole, tacos al pastor with fresh corn tortillas, and chiles en nogada using herbs like epazote and chilies like pasilla, while
    also relishing the eclectic flavors of New York’s food trucks and often experiments with chilies, cilantro, and homemade salsa in her kitchen.
  core: Yesenia Ramirez blends a relentless curiosity for art and culture with a pragmatic hustle behind the wheel, sprinkling each ride with spontaneous museum anecdotes, all while juggling a budding business
    degree, a love for salsa dancing, and a habit of over‑booking her calendar.
background:
  cultural: Yesenia is a first‑generation Mexican American whose family emigrated from Veracruz when she was a child. She grew up in a bilingual household, speaking Spanish at home and English in school,
    which fostered a deep respect for both cultures. She celebrates traditional holidays such as Día de los Muertos and Mexican Independence Day with family gatherings, vibrant altars, and homemade foods.
    Her Mexican heritage influences her taste in music, dance, and cuisine, and she remains active in a local Latino community center that offers language classes, cultural events, and support for immigrant
    families. Living in New York City, she blends her cultural roots with the city's multicultural fabric, often sharing stories and recipes from her upbringing with passengers and friends.
attributes:
