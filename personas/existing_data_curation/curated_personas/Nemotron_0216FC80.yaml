    competency'', ''Art and museum conversational knowledge'']'
  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing'', ''Cooking Mexican cuisine'', ''Urban photography'', ''Volunteering at Latino cultural festivals'', ''Reading contemporary fiction'',
    ''Learning French'', ''Exploring diverse neighborhoods on foot'', ''Attending live music and theatre performances'', ''Participating in community cooking workshops'']'
  career_goals: Yesenia aspires to grow beyond driving a single cab and move into a leadership role within the transportation sector. In the next three years she plans to complete her bachelor’s degree
    in Business Administration while continuing to work, positioning herself for a fleet management or driver‑trainer position at a ride‑share company. Long‑term, she dreams of launching a boutique tour
    service that blends her love for art, food, and Mexican heritage, offering culturally themed city tours and culinary experiences for both locals and tourists. She also hopes to open a small community
    space that showcases Mexican art and provides cooking workshops, creating a hub where her multicultural background can be shared and celebrated.
