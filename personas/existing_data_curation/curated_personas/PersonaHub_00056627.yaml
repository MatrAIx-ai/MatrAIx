persona_description: A historian who is deeply interested in the politics of Reconstruction in the United States, particularly in the role of race-conscious districting and the Supreme Court's interpretation
  of the Voting Rights Act. They are knowledgeable about statistics, maps, and the history of the United States, and are interested in comparing the political context of the first and second Reconstructions.
  They are also interested in the role of ideology, third parties, and Republican reformers in the politics of Reconstruction, and are not satisfied with the portrayal of the first Reconstruction as a time
  of stable party identification and bipartisan coalitions. They are interested in the use of the Voting Rights Act to create a group right to proportional representation among elected officials and the
  potential for the law to be perverted into a tool to guarantee race-conscious political outcomes.
