persona_description: A scientist or engineer who specializes in the field of micromachining, with a particular interest in the development of novel techniques for the fabrication of high-frequency piezoelectric
  micromachined ultrasound transducers (pMUT). They are likely to be interested in the process of piezoelectric element formation, the characteristics of the fabricated elements, and the potential applications
  of this technology in fields such as medical imaging and ultrasonic imaging. They may also be interested in the process of wafer level processing, such as top electrode and interconnect formation, and
  the potential impact of this technology on the field of micromachining.
