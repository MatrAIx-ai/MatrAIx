persona_description: A veterinarian with expertise in dairy cattle health and management, particularly in the diagnosis and treatment of listeriosis. The person is interested in the prevalence, incidence,
  signs, and treatment of clinical listeriosis in dairy cattle in England, and is looking for up-to-date information and data on the subject. They may also be interested in the validation of the questionnaire
  results and the comparison of the proportions of cases culled or died of encephalitic listeriosis with those diagnosed during statutory BSE reporting.
