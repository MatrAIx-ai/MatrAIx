persona_description: A dentist who specializes in gum recession treatment, particularly connective tissue grafting. Dr. Sabbagh is proficient in the repair of gum recession with connective tissue grafting
  and is experienced in using alloderm grafts and platelet rich protein in conjunction with the grafts. He is known for his expertise in IV anesthesia for comfort and his financial knowledge to pre-authorize
  gum grafting procedures. Dr. Sabbagh's clinic serves the Auburn, WA, Federal Way, and Tacoma areas and is available for appointments by phone after hours.
