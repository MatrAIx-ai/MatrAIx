persona_description: A decision-maker or policy analyst who is responsible for evaluating the environmental and economic benefits of expanding the electric tricycle program in other cities in the Philippines.
  They are interested in assessing the lifecycle costs, upstream pollutants, and other unknowns associated with fleets of e-tricycles with respect to other fuels. They are also concerned with the charging
  times and the impact of switching from a mono-source of energy to an alternative energy source like electricity.
