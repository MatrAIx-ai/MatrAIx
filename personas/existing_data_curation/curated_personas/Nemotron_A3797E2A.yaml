  hobbies: '[''Surfing'', ''Beach Volleyball'', ''Hiking'', ''Photography (urban & coastal)'', ''Visiting Art Galleries and Museums'', ''Cooking experimental meals'', ''Hosting dinner parties'', ''Live
    music festivals'', ''Board games nights'', ''Improvisational comedy workshops'', ''DIY woodworking'', ''Makerspace projects'', ''Yoga and meditation'', ''Exploring sustainable design trends'']'
  career_goals: Melisa aims to become a senior construction manager overseeing large-scale commercial and mixed-use developments in the San Diego region. He plans to earn PMP and LEED AP credentials within
    the next two years to deepen his expertise in project leadership and green building. His long-term ambition is to launch his own boutique construction firm that prioritizes sustainable design, innovative
    technologies such as modular construction, and mentorship of emerging tradespeople. He also hopes to be recognized as a thought leader in integrating artistic aesthetics into functional structures,
    contributing to industry panels and publishing case studies on eco-friendly building methods.
