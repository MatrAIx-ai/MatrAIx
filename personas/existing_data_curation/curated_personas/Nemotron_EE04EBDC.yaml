  career_goals: James aims to turn his artistic passions into a sustainable freelance career. He plans to build a cohesive online portfolio that showcases his speculative fiction and visual concepts, with
    the goal of securing remote commissions for game studios, indie publishers, and digital media platforms. Over the next three years, he hopes to complete and self‑publish a graphic novel that blends
    his narrative and illustration skills. To deepen his expertise, he intends to enroll in a Master of Fine Arts program focused on creative writing or visual arts, leveraging the credential to access
    higher‑profile projects. Ultimately, he seeks a flexible, remote role that permits ample solitude for deep work while providing financial stability, allowing him to mitigate his stress and worry through
    structured yet autonomous professional engagement.
