personas:
  professional: Mary Hurwitz thrives as a senior software engineer who blends full‑stack development, cloud experimentation, and data‑driven decision‑making with a compassionate, flexible leadership style
    that values both innovative ideas and reliable, user‑centric solutions, even as her relaxed approach to deadlines sometimes leaves her scrambling to tidy up project plans.
  sports: Mary Hurwitz finds balance on the trail, joining a local hiking club that explores the Blue Ridge foothills in spring and fall, while cheering on the Charlotte Hornets and the Carolina Panthers
    during basketball and football seasons.
  arts: Mary Hurwitz indulges her creative side by reading historical fiction like "The Nightingale," attending pottery classes, listening to Southern blues and indie folk artists such as Rhiannon Giddens
    and Iron & Wine, and supporting community theater productions at the Raleigh Little Theatre.
  travel: Mary Hurwitz prefers flexible, purpose‑driven travel, often taking weekend‑hiking trips to Asheville and Charleston and dreaming of a vacation to Portugal’s historic towns to explore tech meetups,
    blending adventure with a modest budget and occasional last‑minute planning.
  culinary: Mary Hurwitz enjoys cooking Southern‑inspired dishes with global twists—such as shrimp and grits with miso glaze, collard greens sautéed with kimchi, and scones flavored with rosemary and lemon
    zest—while experimenting with fresh herbs from her garden.
  core: Mary Hurwitz is a compassionate, curiosity‑driven technologist who balances a love for the outdoors, community mentorship, and spontaneous creativity with a laid‑back yet purpose‑filled approach
    to work and life.
background:
  cultural: Mary grew up in a middle‑class family in the American South, shaped by the close‑knit community values of North Carolina. Her upbringing emphasized the importance of education, self‑reliance,
    and giving back to the local community. While she identifies as white, she is keenly aware of the region's diverse cultural tapestry and actively seeks inclusive experiences, from attending local arts
    festivals to supporting initiatives that bridge tech access gaps across socioeconomic lines. Her Southern heritage informs her warm hospitality, love for regional cuisine, and a pragmatic outlook that
    balances tradition with an openness to new ideas.
attributes:
  skills: '[''Full‑Stack Web Development'', ''Backend Architecture Design'', ''Data Analysis & Visualization'', ''Machine Learning Prototyping'', ''Cloud Infrastructure (AWS, Azure)'', ''Agile Project Management'',
    ''Technical Mentorship'', ''Cross‑Functional Collaboration'', ''User‑Centered Design'', ''Technical Documentation'', ''Cybersecurity Best Practices'']'
  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Gardening (native plants & herbs)'', ''Cooking Southern and fusion cuisine'', ''Reading historical fiction and social entrepreneurship non‑fiction'',
    ''Volunteering for community tech workshops'', ''Mentoring high‑school and adult learners in STEM'', ''Yoga'', ''Pottery'']'
  career_goals: Mary aims to move into a senior leadership role such as Director of Engineering or Head of Product, where she can shape technology strategies that have a positive social impact. She is passionate
    about building inclusive digital platforms, especially in education and health sectors, to serve underserved communities in North Carolina. Over the next five years, she plans to launch a community‑focused
    tech mentorship program and eventually establish a nonprofit that provides free coding workshops for adults transitioning into tech careers. Her ambition balances her curiosity for innovative solutions
    with a pragmatic desire to see tangible, beneficial outcomes.
