personas:
  professional: Joelle Jacobs thrives as an elementary school teacher who designs STEAM‑focused, art‑infused lesson plans, leverages interactive whiteboards and data‑driven assessment tools, and channels
    her curiosity, meticulous organization, and sociable kindness into a classroom culture that feels both innovative and reassuring, even as her tendency to worry drives her to over‑prepare for every lesson.
  sports: Joelle Jacobs enjoys weekend hikes with the Five Rivers MetroParks Trails Club, plays casual co‑ed soccer in a local women's league, and follows the Dayton Flyers basketball team, the Cincinnati
    Bengals, and the Cleveland Guardians, weaving community sports enthusiasm into her active lifestyle.
  arts: Joelle Jacobs expresses her creative soul through watercolor landscapes of the Ohio River Valley, photographing everyday moments for a neighborhood Instagram group, volunteers for family programming
    at the Dayton Art Institute, and draws inspiration from Monet, Frida Kahlo, and local folk musician The Milk Carton Kids, which fuels both her personal art projects and classroom integrations.
  travel: Joelle Jacobs plans meticulous weekend getaways to Ohio’s Amish Country, Lake Erie vineyards, and the Cincinnati blues scene, while dreaming of a cultural tour of Ireland’s coastal towns and Germany’s
    Christmas markets, balancing her love of immersive local experiences with a modest travel budget and a penchant for detailed itineraries.
  culinary: Joelle Jacobs crafts farm‑to‑table meals using seasonal Ohio harvests—think roasted beet and goat‑cheese salad with honey‑dijon vinaigrette, pan‑seared trout with lemon‑dill butter, and apple
    crisp with locally sourced apples—showcasing a confident home‑cook’s skill at blending fresh produce with inventive flavor pairings.
  core: Joelle Jacobs blends Midwestern modesty, artistic curiosity, and methodical organization into a life of community‑focused teaching and creative pursuits, while chronic worry fuels both her diligent
    planning and occasional overthinking.
background:
  cultural: Joelle grew up in a middle-class white family in the Dayton suburbs, absorbing the Midwestern values of hard work, community involvement, and modest humility. Her family's heritage traces back
    to German and Irish ancestry, reflected in holiday traditions like a Christmas tree farm outing and St. Patrick's Day gatherings. The region's strong emphasis on public education shaped her early respect
    for schools and civic duty. She celebrates American holidays with community potlucks, supports local farmers' markets, and attends regional events such as the Dayton Air Show and the Ohio State Fair.
    These experiences fostered a deep appreciation for local art, folk music, and the collaborative spirit of small-town Ohio, all of which inform her teaching philosophy and community-focused initiatives.
