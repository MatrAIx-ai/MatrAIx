  hobbies: '[''Watercolor Painting'', ''Acrylic Painting'', ''Photography'', ''Reading Contemporary Fiction'', ''Reading Educational Psychology'', ''Gardening'', ''Hiking'', ''Community Theatre'', ''Knitting'',
    ''Crafting'', ''Cooking Farm-to-Table Meals'', ''Yoga'', ''Meditation'', ''Volunteer Art Programming'']'
  career_goals: Joelle aims to become a leader in her district's curriculum team, championing interdisciplinary STEAM initiatives that embed local art and cultural heritage into elementary education. She
    plans to pursue a master's degree in Educational Leadership within the next two years, positioning herself for a future role as an assistant principal or curriculum coordinator. Additionally, she hopes
    to develop a professional development series for teachers focused on mindfulness and stress-reduction strategies, sharing her own practices for managing anxiety in the classroom. Long-term, she envisions
    authoring a guidebook on integrating community arts projects into middle-school curricula, thereby influencing broader educational policy.
