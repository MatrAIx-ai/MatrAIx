  career_goals: Juan Antonio aims to move from his current specialist role to a senior supervisory or trainer position within the FAA, where he can shape safety protocols and mentor new controllers. He
    hopes to lead initiatives that integrate advanced navigation tools while promoting a supportive, low-stress work culture. In the long term, he envisions establishing community aviation education programs
    in Santa Maria, combining his technical expertise with his love for social engagement.
