personas:
  professional: Kyle Donaldson, a 38-year-old master carpenter with fifteen years of framing, finish work, and custom furniture expertise, leverages his systematic project-oriented mindset and natural assertiveness
    to lead crews, mentor apprentices, and keep jobs on schedule while juggling his sociable drive to involve community volunteers.
  sports: Kyle Donaldson spends Saturday mornings pitching for the Warren Raptors Softball Club, watches the Cleveland Guardians in the summer, bleeds orange for the Ohio State Buckeyes football Saturdays,
    and squeezes in early-morning jogs along the Ohio River during the off-season, all while maintaining a friendly rivalry with his teammate over fantasy baseball drafts.
  arts: Kyle Donaldson, a classic-rock aficionado, collects vinyl from The Rolling Stones, Led Zeppelin, and Neil Young, never misses a live show at the Nutter Center featuring bands like The Black Crowes,
    and occasionally unwinds by browsing exhibits at the Warren Historical Society featuring works by regional painter James Gardner.
  travel: Kyle Donaldson prefers weekend road trips that blend history and nature, having explored Hocking Hills State Park, the historic riverfront of Louisville, and the music scene of Nashville, while
    he dreams of a fall pilgrimage to Asheville's Blue Ridge Mountains and a summer road-trip along the Oregon Coast.
  culinary: Kyle Donaldson enjoys homebrewing craft IPA with Cascade hops, masterfully grills beer-battered catfish seasoned with garlic and paprika, and boasts a respectable skill set in making smoked
    brisket ribs, fresh corn succotash, and pretzel-bread pudding, often pairing his meals with his own brewed stout.
  core: Kyle Donaldson blends a carpenter's precision with a community-first ethos, juggling relentless project schedules, a penchant for classic-rock nostalgia, and a chronic worry that fuels meticulous
    budgeting but also leads to sleepless nights.
background:
  cultural: Kyle grew up in a working‑class family in the Mahoning Valley region of northeastern Ohio, a community with deep roots in manufacturing and trade skills. His grandparents were of German and
    Irish descent, and the family tradition of hands‑on craftsmanship—especially carpentry—has been passed down through generations. The local culture emphasizes self‑reliance, community solidarity, and
    straightforward communication, shaping Kyle's practical mindset and his value for reliability. He was raised in a Methodist household that encouraged service to neighbors, informing his frequent involvement
    in volunteer projects. The economic shifts in the Rust Belt have reinforced his focus on job security and adaptability while maintaining pride in his regional identity.
attributes:
  skills: '["Framing","Finish Carpentry","Custom Furniture Making","Blueprint Reading","Project Scheduling","Safety Compliance","Material Estimation","Team Leadership","Apprentice Mentoring","Tool Maintenance"]'
  hobbies: '["Fishing","Softball League","Habitat for Humanity Volunteering","Classic Rock Concerts","Personal Woodworking","Home Brewing","Historical Society Events","Community Potlucks","Charity Runs"]'
  career_goals: Kyle aims to transition from journeyman carpenter to licensed general contractor within the next three years, establishing his own modestly sized remodeling firm that focuses on quality
    custom work for the Warren area. He plans to earn his Ohio contractor's license, complete NCCER Level 4 certification, and develop strong business management skills. He also wants to mentor apprentices,
    creating a supportive learning environment, while ensuring stable income to reduce financial stress. Long‑term, he hopes to expand into a small team of specialist tradespeople, offering turnkey renovation
    services, and to be recognized locally for reliability and community contribution.
