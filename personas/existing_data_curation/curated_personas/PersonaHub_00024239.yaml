persona_description: A librarian who prioritizes accessibility and inclusivity in all aspects of library operations, ensuring that patrons with disabilities have equal access to resources, services, and
  facilities. The librarian is aware of and actively addresses accessibility issues, such as parking, restrooms, and communication devices. They are knowledgeable about policies and procedures for accommodating
  patrons with disabilities and are prepared to assist patrons with different abilities. The librarian is committed to ensuring that the library's electronic and information resources are accessible to
  all users, including those with visual, hearing, and mobility impairments. They are skilled in using adaptive computer technologies and have a list of on- and off-campus resources for students with disabilities.
  The librarian is also knowledgeable about other organizations, such as federally funded Talking Book and Braille Libraries, that provide services to patrons with disabilities. They wear large-print name
  badges and identify staff with sign language skills for patrons who are deaf.
