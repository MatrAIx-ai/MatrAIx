personas:
  professional: Seth Fearon, an experienced venue operations specialist, leverages their engineering degree and two decades of equipment maintenance, safety inspections, and audiovisual troubleshooting
    to enforce strict procedural consistency, mentoring staff with a calm, routine‑driven approach that reflects their preference for order and low‑stress environments.
  sports: Seth Fearon, a devoted Boston sports fan, watches the Red Sox and Bruins every season, participates in a weekly senior tennis league at the local community center, and keeps fit with early morning
    walks through their vegetable garden, valuing the predictable schedule of these low‑key activities over high‑intensity competition.
  arts: Seth Fearon appreciates classic cinema, regularly re‑watching films such as Casablanca and The Maltese Falcon, enjoys the folk melodies of Pete Seeger, and attends occasional performances by the
    Boston Symphony Orchestra, finding these steady cultural rituals complement their methodical hobby of building model‑railway layouts.
  travel: Seth Fearon prefers meticulously planned historic trips, having toured Colonial Williamsburg and Savannah’s antebellum district, and now hopes to explore Kyoto’s temple gardens, favoring moderate‑pacing
    itineraries that balance quiet museum visits with comfortable boutique inns.
  culinary: Seth Fearon favors home‑cooked New England fare, regularly preparing roasted chicken seasoned with rosemary and thyme, clam chowder enriched with fresh garden potatoes, and a classic beef stew
    slow‑cooked with carrots and bay leaves, while occasionally indulging in a local diner’s lobster roll for a simple culinary treat.
  core: Seth Fearon channels their love for orderly, solitary projects into a dependable, low‑stress lifestyle, punctuated by a lingering worry about the future and a quirky habit of aligning their garden
    rows like railway tracks.
background:
  cultural: Seth was raised in a working‑class New England suburb and retains the pragmatic, community‑oriented values common to that region. His upbringing emphasized punctuality, self‑reliance, and a
    respect for local traditions such as seasonal seafood festivals and supporting the Red Sox. Although he identifies as white American, his cultural identity is rooted in the modest, industrious ethos
    of the Boston‑area neighborhoods where he still lives in Saugus, fostering a strong connection to regional history and a preference for familiar, routine‑based social settings.
attributes:
  skills: '[''Equipment maintenance'', ''Safety inspections'', ''Audio‑visual operation'', ''Ticketing system troubleshooting'', ''Crowd management'', ''Customer service'', ''Basic electrical and mechanical
