  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Model‑railway building'', ''Reading historical non‑fiction'', ''Watching classic films'', ''Small‑group volunteering at local historical society'']'
  career_goals: Seth aims to leverage his reliability and technical know‑how into a supervisory role that emphasizes consistency and safety. Over the next few years he hopes to become a senior operations
    manager for a regional entertainment venue, where he can mentor younger staff, streamline maintenance protocols, and champion a culture of calm, routine‑driven service. He also wishes to acquire formal
    certifications in facility management to solidify his expertise and ensure a stable, low‑stress work environment as he approaches retirement.
