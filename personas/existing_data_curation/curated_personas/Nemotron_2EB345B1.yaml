personas:
  professional: Thomas Joines, a retired home‑repair specialist turned volunteer coordinator, leverages their methodical carpentry, budgeting, and digital archiving skills to lead projects at the Muncie
    Historical Society while mentoring younger volunteers, embodying a pragmatic Midwestern work ethic.
  sports: 'Thomas Joines enjoys fishing on Lake Lemon with a favorite #7 spinnerbait, follows the Indianapolis Colts and Indiana Hoosiers football teams, participates in a local senior softball league,
    and brings a competitive edge to the weekly bridge club, where they often challenge newcomers.'
  arts: Thomas Joines spends leisure hours listening to Woody Guthrie folk songs and the classical piano works of Scott Joplin, reading biographies of Frank Lloyd Wright, and curating photographs for museum
    exhibits, while their own woodworking serves as a quiet artistic outlet inspired by early American craftsmanship.
  travel: Thomas Joines plans their trips with the precision of a seasoned hobbyist, favoring short road‑trips to Ohio’s Amish country, weekend getaways to Chicago’s Art Institute, annual visits to their
    daughter’s Florida retirement community, and dreaming of a summer tour of historic Williamsburg, all while balancing a modest travel budget.
  culinary: Thomas Joines prefers hearty Midwestern fare such as herb‑roasted chicken with garden‑grown rosemary, apple‑cinnamon crumble pie, homemade cornbread, and lentil stew flavored with fresh tomatoes
    and basil, cooking at a beginner‑to‑intermediate level but always insisting on using locally sourced produce and their own homemade jam.
  core: Thomas Joines is a methodical, curiosity‑driven senior who blends classic craftsmanship with modest thrift, competes fiercely in bridge, cherishes community service, and guards their health with
    disciplined routines, while indulging in occasional splurges on vintage collectibles.
background:
  cultural: Thomas grew up in post‑World War II Muncie, Indiana, in a middle‑class, white, largely Protestant household of German‑Irish ancestry. The Midwestern values of self‑reliance, modesty, and community
    service shaped his upbringing, reinforced by his involvement in the local Methodist church and participation in high school football and community events. The sociological studies of “Middletown” that
    highlighted small‑town American life influenced his perspective on social dynamics. Over the decades, he witnessed the shift from a manufacturing‑based economy to a service‑oriented one, which informed
    his pragmatic outlook. While he embraces contemporary ideas, he retains respect for traditional practices and the close‑knit social fabric of his hometown.
attributes:
  skills: '["Home repair and maintenance", "Carpentry", "Basic electrical work", "Plumbing troubleshooting", "Financial budgeting and planning", "Research and archival preservation", "Computer literacy
    for seniors", "Community volunteer coordination", "Gardening"]'
  hobbies: '["Woodworking", "Vintage metal lunchbox restoration", "Reading historical non-fiction", "Genealogy research", "Gardening (vegetables and herbs)", "Fishing", "Bridge (card game)", "Volunteer
    archiving at the local historical society"]'
  career_goals: Although retired, Thomas remains goal‑oriented. He aims to complete the degree he began in college by taking evening courses in American history at the local community college. He plans
    to compile and publish a memoir that weaves together his personal experiences with the broader story of Muncie’s mid‑century transformations. He also aspires to continue mentoring younger volunteers
    at the historical society, ensure the preservation of local artifacts, and support his grandchildren’s education through a structured college‑saving plan. Maintaining his health and independence is
    a priority, so he incorporates regular walking and low‑impact exercise into his routine.
