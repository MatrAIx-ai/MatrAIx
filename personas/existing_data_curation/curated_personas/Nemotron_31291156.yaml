personas:
  professional: Carlos Barreto, a 15‑year‑old tech hobbyist and budding content creator, merges curiosity for Arduino and computer building with a practical knack for making quick, eye‑catching TikTok tutorials,
    often improvising on the fly while thriving on the attention of peers.
  sports: Carlos Barreto dominates the local after‑school soccer field with the school’s varsity team while secretly rooting for the national squad and the MLS side Portland Timbers, and they unwind on
    weekends skateboarding with the community skate club at the downtown park, treating fitness as a social outlet rather than a regimented routine.
  arts: Carlos Barreto curates eclectic playlists featuring Bad Bunny, J Balvin, and Megan Thee Stallion for their TikTok videos, constantly riffing on trending dance challenges and adding humorous commentary,
    and they delight in binge‑watching music videos from reggaeton and hip‑hop artists, which shape their creative identity.
  travel: Carlos Barreto dreams of backpacking to Mexico City for its vibrant Día de los Muertos festivities and to Tokyo for its cutting‑edge tech exhibitions, yet their travel style remains impulsive
    and budget‑conscious, favoring spontaneous weekend trips to nearby amusement parks and the occasional family road‑trip to the beach when school permits.
  culinary: Carlos Barreto loves to experiment in the kitchen, proudly perfecting carnitas tacos, sweet corn tamales, and a fiery salsa verde spiked with jalapeños and cilantro, a skill level that oscillates
    between enthusiastic amateur and occasional kitchen disaster when they forget to stir the sauce.
  core: Carlos Barreto is a talkative, tech‑savvy teen who balances curiosity with a laid‑back, sometimes disorganized lifestyle, thriving on social attention while secretly worrying about grades, acne,
    and money.
background:
  cultural: Carlos grows up in a Mexican‑American household in Houston, Texas, where Spanish is spoken at home and English at school. His family maintains traditions such as celebrating Dia de los Muertos,
    Cinco de Mayo, and Mexican Independence Day, often gathering around food, music, and prayer. Catholic values and close family ties shape his worldview, while the diverse, vibrant Hispanic community
    of Houston gives him exposure to various cultural influences, from Tejano music to urban street art. He navigates a bicultural identity, balancing Mexican heritage—like cooking tamales and speaking
    Spanish—with American teenage life, attending school, using social media, and engaging in city youth culture.
