  career_goals: Carlos envisions a future where he can combine his love for communication, culture, and technology. He aims to become a bilingual content creator or digital media journalist who highlights
    Mexican‑American stories, youth issues, and community events through video, podcasts, and social media. To support this, he plans to study communications or media production in college while also acquiring
    professional skills in video editing, graphic design, and marketing. He is also interested in roles that offer stability, such as public relations or community outreach for nonprofit organizations,
    ensuring a reliable income while staying connected to his community. Ultimately, he wants a career that lets him be in the spotlight, influence others positively, and apply practical tech skills.
