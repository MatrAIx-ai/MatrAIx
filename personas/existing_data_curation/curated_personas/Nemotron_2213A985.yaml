personas:
  professional: Charlie Hayes, a 31‑year‑old aspiring arts administrator, blends creative problem‑solving, solid digital literacy, and a harmonious, flexible approach to coordinate community art exhibitions,
    manage volunteer workshops, and lay the groundwork for a nonprofit cultural program in Jackson County.
  sports: Charlie Hayes, a 31‑year‑old fitness enthusiast, plays pickup basketball at the community center, follows the Mississippi Braves with fervor, paddles with the Gulf Coast Kayak Club on weekends,
    and maintains a steady routine of coastal trail hikes to balance cardio and mindfulness.
  arts: Charlie Hayes channels the soulful resonance of B.B. King, the gospel power of Aretha Franklin, and the storytelling of Robert Johnson into watercolor landscapes and acoustic compositions, while
    drawing inspiration from contemporary visual artists like Amy Sherald and documenting life at local festivals through candid photography.
  travel: Charlie Hayes prefers road‑trip explorations along the Gulf, having already soaked up the jazz of New Orleans, the historic squares of Savannah, and the artistic vibe of Santa Fe, while dreaming
    of a solo pilgrimage to the vibrant street art of Berlin’s Kreuzberg district when finances allow.
  culinary: Charlie Hayes, an inventive home cook, perfects shrimp étouffée with smoked paprika and fresh Gulf shrimp, reimagines fried catfish with a light cornmeal crust, whips up collard greens sautéed
    with garlic and a dash of apple cider vinegar, and often pairs these dishes with a warm, buttery cornbread made from stone‑ground cornmeal.
  core: Charlie Hayes, a 31‑year‑old community‑focused creator, blends soulful blues riffs with meticulous event planning, never misses Friday night gospel sing‑alongs, and habitually sneaks late‑night
    fried catfish into their snack stash.
background:
  cultural: Raised in Gautier, Mississippi, Charlie’s cultural foundations are rooted in Southern African‑American traditions. The local Baptist church has been a cornerstone of family life, shaping his
    values of community service, harmony, and respect for elders. He grew up with a soundtrack of blues, soul, and gospel, which continues to influence his musical taste and artistic expression. Family
    gatherings center around soul food—fried catfish, collard greens, and cornbread—while the Gulf Coast’s fishing heritage adds a layer of coastal cuisine to his palate. He celebrates Juneteenth and participates
    in community festivals that honor Black history and resilience. These cultural threads give him a strong sense of identity, an appreciation for storytelling, and a commitment to uplifting his community
    through art, mentorship, and shared experiences.
attributes:
  skills: '[''creative problem solving'', ''project planning and event coordination'', ''community outreach and volunteer management'', ''basic graphic design (Canva, Photoshop)'', ''photography composition'',
    ''digital literacy (Microsoft Office, Google Suite)'', ''interpersonal communication'', ''conflict mediation'', ''musical composition (acoustic guitar)'', ''Southern cooking and recipe development'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Watercolor painting'', ''Street photography'', ''Playing acoustic guitar and songwriting'', ''Listening to blues, jazz, and gospel music'', ''Cooking
    Southern and fusion dishes'', ''Volunteering as a youth mentor at the community center'', ''Reading science‑fiction and historical novels'', ''Hiking coastal nature trails and birdwatching'', ''Meditation
    and journaling'']'
  career_goals: Charlie aims to finish his undergraduate degree, focusing on community development or arts administration, so he can transition back into the workforce in a role that aligns with his values.
    He envisions working for a non‑profit or municipal cultural program where he can curate local art exhibitions, organize youth workshops, and promote accessible art experiences in Jackson County. In
    the longer term, he dreams of opening a community‑focused art studio and café that doubles as a mentor space for young creators, blending his love of visual arts, music, and Southern cuisine. He also
    hopes to obtain a certification in youth counseling to deepen his impact on at‑risk teens.
