persona_description: A literary scholar who is interested in the works of Christopher Marlowe, particularly his plays and poems. They are looking for an in-depth exploration of Marlowe's literary career
  and the historical and religious contexts within which he wrote. They are also interested in the qualities that continue to make his work fascinating, such as intellectual range, radical irony, and awareness
  of the dangerously compelling power of theatre. They are likely to be familiar with Marlowe's plays, such as "Doctor Faustus" and "Edward II," and may have a particular interest in his translations and
  poems. They may also have a background in English and college success, as evidenced by their interest in literary criticism.
