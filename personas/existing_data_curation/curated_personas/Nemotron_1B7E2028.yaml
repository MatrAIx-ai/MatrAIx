  career_goals: Hoping to transition into a supervisory role within the next two years, Elise plans to complete a hospitality management certification and take on floor-manager responsibilities. Her long-term
    ambition is to open a small boutique eatery that doubles as a gallery space for emerging local artists, merging her expertise in service with her passion for art. She aims to build a reputation for
    curating innovative culinary-art experiences, and eventually mentor other aspiring hospitality professionals from non-traditional educational backgrounds.
