  hobbies: '[''Youth soccer coaching'', ''Hosting trivia nights'', ''Acoustic guitar playing'', ''Hiking and kayaking'', ''Home‑brewing'', ''Cooking workshops'']'
  career_goals: Marvin aims to transition into a supervisory role within the healthcare support field, such as Lead Patient Care Coordinator or Clinic Operations Manager. He plans to complete his associate
    degree in health sciences and obtain certifications like Certified Nursing Assistant (CNA) and Certified Medical Assistant (CMA) to broaden his clinical competencies. Long‑term, he is interested in
    integrating health informatics tools to streamline patient flow and improve data‑driven decision making, positioning himself as a bridge between clinical staff and administrative leadership.
