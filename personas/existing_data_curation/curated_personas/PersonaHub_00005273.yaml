persona_description: Edward Heis was a Catholic astronomer who taught mathematics and sciences in Germany. He was known for his observations of auroral light, sun-spots, comets, zodiacal light, and other
  celestial phenomena. He championed Catholicism during the Kulturkampf and made valuable observations of variable stars. He is credited with being the first to ascertain the point of departure of meteors
  and to draw up a chart of naked-eye stars visible from Central Europe. He also made valuable observations of variable stars and is considered to be one of the first to study them. His work has been influential
  in the field of astronomy and is still referenced and studied today.
