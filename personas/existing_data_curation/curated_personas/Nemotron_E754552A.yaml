  hobbies: '[''Reading science-fiction'', ''Building Raspberry Pi projects'', ''Playing acoustic guitar'', ''Gardening'', ''Cooking Southern-inspired dishes'', ''Volunteering at community center'', ''Attending
    small jazz and poetry gatherings'', ''Jogging in local parks'']'
  career_goals: Vincent aims to transition into a senior technology leadership role, such as Director of IT or Digital Transformation Lead, within a mid‑size organization or a regional government agency.
    He plans to earn PMP and ITIL certifications to formalize his project‑management expertise, and a cloud‑architect credential (e.g., AWS Solutions Architect) to broaden his technical scope. Over the
    next five years he hopes to spearhead initiatives that digitize local business processes, improve data‑driven decision‑making, and create scalable solutions for small‑business owners in Kansas. He also
    envisions launching a part‑time consulting boutique that advises minority‑owned enterprises on technology adoption, while maintaining a flexible schedule that supports his family life.
