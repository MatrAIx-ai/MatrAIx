personas:
  professional: Vincent Ojada, a 36‑year‑old business‑tech bridge, leverages a business degree and hands‑on IT expertise to translate stakeholder needs into data‑driven solutions, guiding agile projects
    while mentoring junior staff and championing process optimization in mid‑size organizations.
  sports: Vincent Ojada enjoys jogging the Junction City trail network, supports the Kansas City Chiefs and Royals, runs with the local Junction City Trail Runners club on weekends, and treats theyself
    to occasional pickup basketball games despite a preference for solitary exercise.
  arts: Vincent Ojada unwinds by playing acoustic guitar at a low‑key coffeehouse open‑mic, draws inspiration from John Coltrane and Bob Dylan, attends intimate jazz nights featuring local saxophonist Maya
    Brooks, and reads poetry from Langston Hughes, weaving those influences into occasional songwriting.
  travel: Vincent Ojada prefers low‑key road trips that blend nature and food, having explored the Great Smoky Mountains, the Texas Hill Country for brisket, and dreaming of a weekend in New Orleans for
    authentic gumbo, while planning trips with a flexible itinerary that accommodates family and budget constraints.
  culinary: Vincent Ojada cooks Southern‑style barbecue at home, perfecting smoked pork ribs with a dry rub of smoked paprika, brown sugar, and cayenne, pairs them with collard greens sautéed in ham hocks
    and cornbread, and enjoys experimenting with hickory wood chips and a homemade apple‑cider glaze.
  core: Vincent Ojada fuses a quiet curiosity for technology with a warm, community‑first spirit, balancing solitary coding marathons with weekend garden tending, guitar strums, and soulful barbecue.
background:
  cultural: Vincent is an African‑American who grew up in Kansas in a family whose roots trace back to the Great Migration, when his grandparents moved from the South to the Midwest seeking better opportunities.
    The family's narrative of resilience, community solidarity, and pride in cultural heritage informs his values. He remains active in the local Black community through his church, cultural festivals,
    and a regional African‑American history society, where he participates in storytelling events and supports youth mentorship programs. His cultural experience blends Midwestern pragmatism—hard work,
    neighborly assistance, and civic engagement—with a deep appreciation for African‑American music, cuisine, and oral traditions. This blend shapes his cooperative personality, his emphasis on harmony,
    and his curiosity about how technology can uplift his community.
