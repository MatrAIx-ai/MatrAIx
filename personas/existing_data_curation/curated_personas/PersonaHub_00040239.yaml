persona_description: A musicologist and historian who specializes in the study of balladry, particularly the subject matter, context, and significance of ballads in seventeenth-century England. He/she has
  expertise in the field of balladry and is knowledgeable about the publishing and performance histories of ballads. He/she is interested in developing an authoritative sample of the best-known ballads
  and has experience in developing online data entry systems and final research resources. He/she is looking for a collaborative partnership with researchers to identify, contextualize, and publish online
  an authoritative sample of seventeenth-century England's best-known ballads, as well as developing an online data entry system for recording information relating to the ballads and developing the final,
  online research resource which will be made publicly accessible for free.
