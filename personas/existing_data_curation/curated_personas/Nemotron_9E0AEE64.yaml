  career_goals: While approaching the latter stage of her career, Ava aims to move into a senior quality management role where she can shape company‑wide continuous‑improvement strategies and champion a
    culture of innovation. She plans to earn advanced certifications such as the ASQ Certified Quality Engineer and pursue a GED to formalize her education. Additionally, she envisions establishing a consultancy
    that helps small manufacturers integrate artistic design elements into functional products, merging her technical expertise with her love of aesthetics. On the personal front, she aspires to maintain
    a balanced work‑life rhythm that allows her to support her family and community initiatives.
