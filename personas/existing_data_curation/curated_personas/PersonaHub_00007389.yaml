persona_description: A historian or a researcher who specializes in military history and aviation history. The person is interested in the lives and contributions of African American military personnel
  during World War II, particularly the Tuskegee Airmen. They are passionate about the discovery of the remains of a Tuskegee Airman, Capt. Lawrence E. Dickson, who went missing during World War II and
  is likely the first missing Tuskegee Airman found since the end of the war. They are excited to learn about Dickson's life and the significance of his remains being identified.
