  hobbies: '[''Gardening (vegetables and herbs)'', ''Cooking traditional Puerto Rican dishes'', ''Reading historical fiction and biographies'', ''Walking along the waterfront'', ''Playing dominoes with
    a small group of friends'', ''Listening to salsa, bolero, and Latin jazz'', ''Genealogy research'', ''Volunteering at the senior center (tech assistance and home projects)'']'
  career_goals: Although officially retired, Dominik’s ambition centers on remaining an active and supportive presence for his family and community. He aims to complete a memoir that captures his journey
    from Puerto Rico to New York, preserving family stories for future generations. He wishes to volunteer regularly at the local senior center, offering workshops on basic home repair and digital skills.
    Maintaining his health through daily walks and gentle exercise is a personal priority, as is cultivating his garden to participate in the neighborhood horticulture contest. Additionally, he hopes to
    support his grandchildren’s education by providing tutoring and financial guidance, and to travel back to Puerto Rico for a meaningful reunion with extended family.
