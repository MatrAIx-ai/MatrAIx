personas:
  professional: Anthony Edgerton, a seasoned commercial grounds manager with three decades of hands‑on horticultural and infrastructure expertise, leverages GIS and CAD to design low‑water irrigation systems
    while quietly steering his crew toward sustainable practices, balancing his innate curiosity for new eco‑technologies with the pragmatic, self‑reliant work ethic forged by years of mountain‑front living.
  sports: Anthony Edgerton, an avid early‑morning hiker, spends his summers tackling Rocky Mountain trails, follows the Colorado Rockies and the Colorado Avalanche with a loyal devotion, and belongs to
    a local amateur golf club where he practices his swing on crisp autumn afternoons.
  arts: Anthony Edgerton finds creative solace in nature photography, often framing elk against sunrise skies à la Ansel Adams, while his evenings echo with the folk strums of John Denver and his bookshelf
    holds classics from Herman Melville to Aldous Huxley, reflecting a quiet yet deep appreciation for both visual and literary arts.
  travel: Anthony Edgerton favors low‑key, nature‑focused travel, planning week‑long hikes through Yellowstone and the Canadian Rockies, while his bucket list includes a solo trek across New Zealand’s South
    Island, always opting for modest lodging and meticulously mapping routes on topographic charts.
  culinary: Anthony Edgerton enjoys simple, hearty meals like grilled Colorado trout with wild rice and roasted root vegetables, often preparing them in his own kitchen where his woodworking skills shine
    in a handcrafted cutting board, while his pantry proudly houses dried sage, juniper berries, and locally sourced honey.
  core: Anthony Edgerton blends mountain‑west pragmatism with an insatiable curiosity, navigating life through solitary hikes, meticulous tool tinkering, and a perpetual worry that fuels both meticulous
    planning and occasional overthinking.
background:
  cultural: Anthony was raised in a small town on Colorado's Front Range, where the surrounding mountains and open spaces fostered a deep respect for the outdoors and a culture of self‑reliance. His white,
    western heritage is interwoven with the region's emphasis on environmental stewardship, community volunteerism (such as fire watch and trail maintenance), and a pragmatic work ethic. Family gatherings
    often centered on modest, home‑cooked meals and quiet conversation, reinforcing his preference for solitude and reflective time. While he embraces the broader American values of individual responsibility
    and civic pride, his daily life reflects the nuanced blend of mountain‑west practicality and a curiosity for innovative, sustainable solutions.
attributes:
  skills: '[''Landscape Management'', ''Team Supervision'', ''Irrigation System Design and Maintenance'', ''Horticultural Knowledge'', ''Budgeting and Cost Control'', ''Safety Compliance'', ''Data-Driven
