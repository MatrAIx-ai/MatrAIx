  hobbies: '[''Hiking'', ''Birdwatching'', ''Nature Photography'', ''Woodworking'', ''Reading Technical and Science Nonfiction'', ''Mindfulness Meditation'', ''Cataloging Plant Species'', ''Repairing Vintage
    Tools'']'
  career_goals: In the next five years, Anthony aims to transition from daily crew supervision to a senior operations manager role where he can shape company-wide sustainability policies. He plans to earn
    a Certified Landscape Professional credential, spearhead low-water native planting programs throughout Fort Collins, and develop a mentorship framework for younger crew members that blends technical
    expertise with soft‑skill development. Long term, he envisions launching a consulting practice that helps municipal and private clients adopt eco‑efficient groundskeeping strategies, allowing him to
    satisfy his curiosity for new methods while remaining grounded in practical, results‑oriented outcomes.
