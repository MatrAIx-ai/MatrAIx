  career_goals: Carolyn aims to become a senior ambassador for the Fairfax Arts Council, leading intergenerational workshops that blend traditional art techniques with contemporary ideas. She plans to curate
    a quarterly community exhibition showcasing works by emerging local artists and senior creators. She also hopes to author a memoir and a series of articles documenting the evolution of Fairfax’s cultural
    scene, while continuing to mentor volunteers at the senior center and support arts education initiatives in schools.
