personas:
  professional: Robbie Glazer, a veteran food‑service manager with a STEM degree, transforms restaurant operations into data‑driven, cost‑controlled systems by building Excel dashboards, optimizing labor
    schedules, and enforcing HACCP standards, all while mentoring staff with a calm, organized leadership style.
  sports: Robbie Glazer, an avid hiker of the Appalachian foothills and weekend fisherman, adheres to a seasonal fitness routine that includes early‑morning trail runs with the Polk County Trail Runners
    club in spring, pick‑up basketball games supporting the Carolina Panthers during winter, and bi‑weekly strength sessions to counteract woodworking‑related back strain, while cheering loudly for the
    Clemson Tigers football team each fall.
  arts: Robbie Glazer, who strums acoustic guitar on the porch after a day’s work, finds inspiration in the storytelling of folk legends like John Hartford and the soulful blues of B.B. King, while their
    reading of non‑fiction history by David McCullough and technology biographies by Walter Isaacson informs their appreciation for documentary films such as ‘The Last Dance’ and the stage performances
    of the local community theater’s annual Shakespeare in the Park.
  travel: Robbie Glazer prefers low‑key road trips that blend outdoor adventure with culinary discovery, meticulously mapping routes on a spreadsheet before setting out for weekend drives to Asheville’s
    Blue Ridge Parkway for mountain hikes, a two‑day foodie tour of Charleston’s historic district, and annual family visits to the Great Smoky Mountains, while dreaming of a future pilgrimage to Denmark’s
    Copenhagen to study its farm‑to‑table dining scene.
  culinary: Robbie Glazer, a self‑taught cook who revels in Southern comfort cuisine, regularly prepares shrimp and grits with fresh Gulf shrimp, collard greens simmered with smoked turkey, and homemade
    pimento cheese using sharp cheddar, heirloom tomatoes, and locally sourced ramps, often experimenting with a touch of smoked paprika and a splash of bourbon to elevate traditional flavors.
  core: Robbie Glazer blends meticulous spreadsheet discipline with a love for Appalachian hikes, woodworking, and Southern comfort cooking, yet they can’t resist ordering extra biscuits during lunch and
    sometimes delay cardio workouts when restaurant chaos peaks.
background:
  cultural: Robbie was raised in a small Appalachian town in western North Carolina, growing up in a family with deep English and German roots. The community emphasized self‑reliance, modesty, and Southern
    hospitality, values that continue to shape his outlook. He was brought up in a Methodist household, participating in church services, potlucks, and local charity drives, which reinforced his cooperative
    and caring nature. The region's strong ties to agriculture and seasonal cooking influenced his appreciation for locally sourced food and hands‑on craftsmanship. These cultural influences, combined with
    his STEM education, have forged a blend of practical problem‑solving, respect for tradition, and a commitment to fostering harmonious relationships both at work and in his community.
attributes:
  skills: '[''Restaurant Operations Management'', ''Budgeting and Financial Planning'', ''Inventory Control and Procurement'', ''Food Safety and HACCP Compliance'', ''Staff Scheduling and Labor Optimization'',
