  hobbies: '[''Hiking'', ''Fishing'', ''Woodworking'', ''Cooking'', ''Community Volunteering'', ''Reading Non-fiction'', ''Acoustic Guitar'', ''Attending Church'']'
  career_goals: Robbie aims to transition from managing a single outlet to overseeing a small cluster of restaurants as a regional manager, with a focus on implementing data‑driven operational standards
    across locations. He also aspires to open a modest farm‑to‑table bistro in Rutherfordton that showcases locally sourced Appalachian ingredients and reflects his commitment to community and sustainability.
    To support these goals, he plans to earn ServSafe Instructor certification, develop a mentorship program for junior staff, and eventually serve as a consultant to help other small‑town food service
    operations improve efficiency while preserving a friendly, family‑like atmosphere. His goals balance his desire for structured growth with the need for personal harmony and work‑life balance.
