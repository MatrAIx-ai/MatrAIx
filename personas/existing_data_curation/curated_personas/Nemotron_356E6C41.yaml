personas:
  professional: Marilyn Ruiz is an aspiring museum studies student who blends her meticulous cataloguing talent, digital illustration skills, and love of abstract watercolor into a vision of curating research‑driven,
    quiet‑space exhibitions that invite reflective visitors while respecting the community‑focused values of her Midwestern upbringing.
  sports: Marilyn Ruiz enjoys low‑impact fitness, attending a Thursday evening yoga class at the local community center, jogging with the weekend running club that supports the Kansas City Royals, and cheering
    from the couch on Saint Louis Blues hockey nights, preferring solitary or small‑group activities over loud stadium environments.
  arts: Marilyn Ruiz expresses her artistic curiosity through watercolor experiments inspired by Georgia O'Keeffe’s bold forms and Wassily Kandinsky’s abstract colors, curates digital illustrations using
    Adobe Illustrator that echo the visual language of contemporary photographer Annie Leibovitz, and regularly visits the Nelson‑Atkins Museum to study works by Monet and modern installations, while finding
    solace in listening to Sufjan Stevens and reading Haruki Murakami.
  travel: Marilyn Ruiz plans trips with the same methodical detail she applies to her journals, favoring quiet retreats like a sunrise hike in the Ozarks, a week‑long immersion in Kyoto’s tranquil temples,
    and a cultural weekend exploring the historic art districts of Santa Fe, all while budgeting carefully to keep her student loan repayments on track.
  culinary: Marilyn Ruiz enjoys preparing simple yet nourishing meals such as quinoa‑stuffed bell peppers seasoned with smoked paprika, miso‑glazed salmon with daikon radish, and a comforting bowl of homemade
    chicken‑and‑dumpling soup, while she also delights in tasting fresh basil pesto pizza at local farm‑to‑table restaurants and occasionally indulging in store‑bought pumpkin pie during Thanksgiving gatherings.
  core: Marilyn Ruiz is a quiet‑minded creator who balances meticulous planning with spontaneous bursts of color, tends to overthink her decisions, relies on daily journaling and meditation to soothe anxiety,
    and can’t resist a fresh cup of artisanal coffee before a night of sketching.
background:
  cultural: Marilyn was raised in a middle‑class, predominantly white suburb of Blue Springs, Missouri, where Midwestern values of reliability, community involvement, and modesty were emphasized. Her family’s
    cultural practices include attending local community events, seasonal celebrations like Thanksgiving and Fourth of July gatherings, and occasional church services reflective of a Protestant background.
    While she respects these traditions, Marilyn’s personal identity is shaped by a broader curiosity about diverse artistic and intellectual cultures, leading her to seek out global art movements, online
    lectures, and multicultural literature that expand her worldview beyond her immediate environment.
attributes:
  skills: '["Digital illustration","Graphic design (Adobe Photoshop, Illustrator)","Analytical research","Written communication","Organizational planning","Library cataloguing","Self‑directed learning"]'
  hobbies: '["Watercolor painting","Sketching","Visiting art museums and galleries","Reading literary fiction and philosophy","Journaling","Meditation and gentle yoga","Photography","Puzzle solving (crosswords,
    logic games)"]'
  career_goals: Marilyn aspires to pursue a bachelor's degree in museum studies or library science, eventually securing a role as an assistant curator or archives specialist at a regional museum or university
    library. She hopes to combine her love of art, meticulous organizational talent, and curiosity for new ideas to design engaging, research‑driven exhibitions or curated collections. In the longer term,
    Marilyn envisions leading independent projects that blend digital media with historical artifacts, allowing her to work largely from a quiet studio while contributing to public education and cultural
    preservation.
