personas:
  professional: John Fettinger, a natural leader among peers, serves as captain of the varsity football team and chief organizer of school dances, where they channel their methodical planning, competitive
    drive, and talkative charisma to keep events on schedule and motivate teammates.
  sports: John Fettinger, a wide receiver on the South Valley High Tigers football squad and point guard for the junior varsity basketball team, trains rigorously after school, follows the Dallas Cowboys
    and Chicago Bulls, and they treat each practice as a strategic battle, even joining seasonal intramural flag football for extra competition.
  arts: John Fettinger, an enthusiastic model‑kit builder and hobby woodworker, spends weekends assembling 1:72 scale aircraft and crafting pine skateboards, while pumping classic rock anthems from Led
    Zeppelin, AC/DC, and The Who into their headphones, and they let the music fuel their creative projects.
  travel: John Fettinger, an organized adventure‑seeker, plans family camping trips with spreadsheets, has trekked through Yosemite National Park and the Adirondacks, dreams of exploring the Grand Canyon,
    and they balance a love of rugged hikes with the practical need to keep within a modest budget.
  culinary: John Fettinger, a modestly skilled home cook, favors high‑protein meals like BBQ chicken wings and pepperoni pizza, enjoys making mac and cheese with sharp cheddar, and they often experiment
    with snack bar recipes using oats, honey, and peanut butter to fuel late‑night gaming sessions.
  core: John Fettinger blends competitive sports, meticulous planning, and a love for classic rock, turning every school event, gaming session, and family camping trip into a well‑organized, high‑energy
    showcase of their sociable, detail‑driven spirit, and they thrive on being the center of attention.
background:
  cultural: John comes from a typical Midwestern white family in Goodhue County, Minnesota, with deep roots in the region's agricultural and small‑town traditions. His heritage reflects the German and Scandinavian
    ancestry common to the area, emphasizing self‑reliance, community service, and a strong work ethic. Growing up in Dennison, he has been shaped by local church gatherings, county fairs, and school events
    that celebrate the farming legacy and neighborly bonds of rural Minnesota.
