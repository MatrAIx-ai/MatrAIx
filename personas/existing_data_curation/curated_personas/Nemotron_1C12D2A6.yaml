  hobbies: '[''Football (team captain)'', ''Basketball (varsity player)'', ''Competitive video gaming (RTS and shooters)'', ''Woodworking and model building'', ''Mechanical tinkering (bikes, small engines)'',
    ''Organizing school dances and community events'', ''Volunteering at local fairs and church activities'', ''Camping and outdoor hobbies'', ''Listening to classic rock music'']'
  career_goals: John aspires to a career that blends structure, tangible results, and community impact. He is drawn to becoming a first‑responder—such as a firefighter or police officer—where his reliability
    and calm under pressure are valuable. Simultaneously, he sees himself learning a skilled trade like automotive or HVAC technology, allowing him to apply his hands‑on problem‑solving skills. Long‑term,
    he hopes to take on leadership roles in his hometown, perhaps running a local service business or serving on the city council, where his organizational talent and sociable nature can shape community
    projects.
