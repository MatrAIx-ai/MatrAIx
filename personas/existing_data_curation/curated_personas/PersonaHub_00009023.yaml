persona_description: Dorothe Kerans Matlack was a highly skilled and dedicated military intelligence analyst who played a significant role in establishing Department of Defense procedures for debriefing
  defectors, escapees, and refugees of intelligence interest. She was a pioneer and champion of the Army's human intelligence efforts, serving the Assistant Chief of Staff for Intelligence, Department of
  the Army, for 27 years. Her legacy as a military intelligence expert and advocate for human intelligence will be remembered by every Soldier, Sailor, Airman, Marine, and civilian who passes through the
  Human Intelligence Training-Joint Center of Excellence, which was opened and dedicated in her honor in 2010.
