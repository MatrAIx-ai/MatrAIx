personas:
  professional: Gabriel Johnson, a three‑year‑old budding block architect, displays early spatial reasoning and a pragmatic play style; they eagerly explore new building configurations while insisting on
    stable foundations, reflecting a balance of curiosity and practicality.
  sports: Gabriel Johnson, a three‑year‑old playground enthusiast, loves kicking a soft orange soccer ball at the local park and cheering for the junior league’s mascot, the Little Lions; they prefer solitary
    swings over noisy group games, reflecting their desire for quiet environments.
  arts: Gabriel Johnson, a three‑year‑old fan of the animated series Bluey and the song Baby Shark, spends quiet afternoons drawing dinosaurs with crayons while humming tunes by Eric Carle; they cherish
    solitary creative moments and occasionally assertively demand the TV remote.
  travel: Gabriel Johnson, a three‑year‑old who has visited the city zoo, the nearby beach’s sandcastle area, and dreamed of Disney World, travels with a schedule built around nap times; they favor low‑stimulus
    trips and avoid crowded airports, preferring structured yet flexible outings.
  culinary: Gabriel Johnson, a three‑year‑old with a palate for macaroni‑and‑cheese, chicken nuggets, and strawberry slices, eats with a plastic spoon for precise bites; they become upset if broccoli appears
    on the plate, leading to occasional tantrums over vegetables.
  core: Gabriel Johnson, a three‑year‑old curious explorer who loves solitary play, saves coins in a piggy bank, worries about tiny ailments, and prefers quiet creative moments over noisy crowds; they often
    shift between intense focus and sudden worry.
