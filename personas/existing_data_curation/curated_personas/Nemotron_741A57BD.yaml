personas:
  professional: Kathrine Punter is a high‑school senior who channels their natural curiosity and talkative flair into leading the drama club’s publicity, using Canva‑crafted graphics and polished public
    speaking to rally peers for community art events while dreaming of a university degree in communications and visual arts.
  sports: Kathrine Punter enjoys cheering on the Lenoir County High School basketball team and the Carolina Hurricanes while fitting in early‑morning jogs along the Neuse River Trail and a weekly yoga class
    at the community center, and they occasionally volunteer as a scoreboard operator for the high‑school football games during the fall season.
  arts: Kathrine Punter blends a love for digital illustration with a devotion to folk art, often sketching in the shadows of the North Carolina Museum of Art while listening to Sufjan Stevens and The Avett
    Brothers, and they regularly contribute to a neighborhood quilting circle where traditional patchwork meets modern graphic motifs.
  travel: Kathrine Punter prefers spontaneous weekend road trips that mix cultural immersion with scenic drives, having already backpacked through Asheville’s Blue Ridge galleries, spent a rainy evening
    on the Outer Banks’ lighthouse trail, and day‑tripped to Charleston’s historic district, while keeping an eye on college tuition costs that limit longer vacations.
  culinary: Kathrine Punter’s palate toggles between a craving for shrimp and grits with a splash of lemon zest and a comfort‑food love for buttery biscuits and honey‑glazed collard greens, and they whip
    up a decent mac‑and‑cheese for drama club meetings while occasionally experimenting with fresh basil pesto on homemade pizza.
  core: Kathrine Punter is a relentlessly organized yet delightfully impulsive teen who can orchestrate a flawless block party while secretly hoarding half‑finished sketchbooks in a closet that doubles
    as a secret art vault, and they often stay up late scrolling through art trends instead of finishing homework.
background:
  cultural: Kathrine was raised in Snow Hill, a close‑knit town in Lenoir County, North Carolina, steeped in Southern traditions. Her family is active in their local Baptist church, and community gatherings,
    high school sports, and Southern hospitality are integral parts of her upbringing. The region’s folk art heritage, quilting circles, and local music scene have nurtured her appreciation for creative
    expression. These cultural influences blend with her curiosity and sociable nature, shaping a persona that values both individual artistic exploration and collective community well‑being.
attributes:
  skills: '[''Public speaking'', ''Event planning'', ''Time management'', ''Graphic design (Canva)'', ''Social media content creation'', ''Art analysis and critique'', ''Teamwork'', ''Conflict resolution'',
