  hobbies: '[''Drawing'', ''Digital illustration'', ''Visiting museums'', ''School drama club'', ''Reading contemporary fiction'', ''Art blogging'', ''Listening to indie and folk music'', ''Volunteering
    at the library'', ''Organizing block parties'']'
  career_goals: Kathrine aims to attend a four‑year university to study communications and visual arts. She aspires to work in community‑focused arts organizations, either as a program director for a local
    cultural center or as a social media manager for a nonprofit arts initiative. Long‑term, she hopes to combine her love of art and people by developing outreach programs that bring creative experiences
    to underserved youth in rural North Carolina.
