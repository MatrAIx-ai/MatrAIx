  career_goals: Roberto aims to become a senior information security analyst within the next three years, earning certifications such as OSCP, CISSP, and CISM to solidify his expertise. He aspires to lead
    a SOC team, design automated detection pipelines, and eventually transition into a security architect role. Long‑term, he envisions stepping into a CISO position where he can shape security strategy
    for a large enterprise, while also mentoring junior analysts and contributing to open‑source security tools.
