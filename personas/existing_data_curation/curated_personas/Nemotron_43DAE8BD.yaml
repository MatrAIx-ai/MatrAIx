  hobbies: '[''Gardening'', ''Hula dancing'', ''Chinese calligraphy'', ''Cooking (fusion cuisine)'', ''Coastal hiking'', ''Reading historical biographies'', ''Volunteer beach clean-ups'', ''Tai Chi'', ''Knitting'']'
  career_goals: Meiling aims to advance into a senior leadership role where she can shape island‑wide social service initiatives, particularly programs that support aging populations and youth mentorship.
    She is passionate about creating a sustainable community garden that blends East Asian horticultural practices with Hawaiian traditions, and she intends to secure long‑term funding for such projects.
    Mentoring newer social workers and fostering a culture of collaborative problem‑solving are also central to her ambitions. Ultimately, she wishes to leave a lasting legacy of harmony, practical support,
    and cultural inclusivity within Kauai’s community networks.
