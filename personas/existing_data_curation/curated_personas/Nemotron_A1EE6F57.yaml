  career_goals: Sylvester aims to obtain his GED within the next year, then enroll in an associate’s program in graphic design or visual communication at a community college in Montgomery County. He plans
    to build a robust portfolio that will enable freelance design work for local nonprofits and small businesses. His long‑term ambition is to work in a museum or cultural center in Washington, D.C., combining
    his art knowledge with program development, and eventually launch his own online shop selling original prints and merchandise. He also seeks to develop effective coping strategies for his anxiety so
    that his career can remain sustainable and flexible.
