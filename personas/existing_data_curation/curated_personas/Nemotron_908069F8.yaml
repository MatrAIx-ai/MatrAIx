  hobbies: '[''Art exhibitions'', ''Museum visits'', ''Senior‑center dance nights'', ''Gardening'', ''Knitting'', ''Embroidery'', ''Community garden volunteering'', ''Book club'', ''Mexican holiday celebrations'',
    ''Culinary experimentation'']'
  career_goals: Although retired, Eloise aims to expand her legacy by establishing a multicultural arts workshop at the Ardmore senior center, where she can teach Mexican crafts, cooking, and storytelling
    to younger volunteers. She hopes to curate an annual community art exhibit showcasing seniors' creative works and to mentor youth in organizing cultural festivals. Her long‑term ambition is to compile
    a digital archive of her family's oral histories and recipes, ensuring that her cultural heritage endures for future generations.
