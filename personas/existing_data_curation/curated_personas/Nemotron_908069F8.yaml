personas:
  professional: Eloise Santiago, a retired community volunteer and informal event coordinator, they leverage meticulous budgeting, bilingual communication, and boundless enthusiasm to orchestrate senior‑center
    festivals, church gatherings, and multicultural workshops with the precision of a seasoned project manager.
  sports: Eloise Santiago, a devoted participant in senior‑center dance nights and weekly low‑impact water aerobics, they avidly follow the Dallas Cowboys and the Texas Rangers, and join the Ardmore Walking
    Club for a brisk stroll through the park every Saturday morning.
  arts: Eloise Santiago, an avid gallery goer who relishes community theater, they draw inspiration from Frida Kahlo’s bold colors and Diego Rivera’s murals, and spend afternoons stitching embroidered table
    linens while curating a monthly seniors’ art showcase at the local museum.
  travel: Eloise Santiago, who prefers organized group tours over solo adventures, they have explored historic towns in Guanajuato and Oaxaca, enjoy tranquil weekend getaways to the Texas Hill Country,
    and dream of wandering the historic plazas of Seville to trace the origins of the architectural motifs they sketch in their diary.
  culinary: Eloise Santiago, a master of aromatic soups and layered tamales, they pride themselves on perfecting mole poblano for large family gatherings, frequently experiment with heirloom tomato gazpacho
    and fresh cilantro‑lime rice, and whip up comforting pozole using home‑grown herbs whenever winter arrives.
  core: Eloise Santiago blends meticulous organization with a lively love of dance, storytelling, and community service, they never miss their nightly habit of knitting a single stitch before bed—a ritual
    that keeps their mind sharp.
background:
  cultural: Eloise is a Mexican‑American whose family originates from Jalisco, Mexico. Raised in a bilingual household, she celebrated traditional Mexican holidays—Día de los Muertos, Las Posadas, and Cinco
    de Mayo—while also embracing the Southern Plains customs of Oklahoma. She maintains strong family ties and has woven Mexican culinary, musical, and artistic traditions into the fabric of her community
    life in Ardmore. Her cultural identity emphasizes hospitality, communal support, and a deep reverence for music, dance, and food that reflects both her Mexican heritage and the regional influences of
    the American Southwest.
