personas:
  professional: An aspiring junior explorer and storyteller, Annie Lee blends a love for animals and space with building‑block worlds, using their boundless curiosity and sociable charm to lead impromptu
    adventures for friends.
  sports: A playground enthusiast named Annie Lee joins the local after‑school soccer club, cheers for the hometown baseball team the River City Rovers, and spends weekends climbing trees and swinging,
    approaching fitness with boundless energy and a preference for group games over structured drills.
  arts: A creative spark named Annie Lee draws bright pictures of jungle animals and galaxies, sings upbeat songs from Disney’s Frozen and Taylor Swift’s Shake It Off in the church choir, and collects stickers
    of artists like Dr. Seuss and Van Gogh, letting these influences shape their vivid storytelling.
  travel: An imaginative traveler named Annie Lee loves weekend trips to the nearby botanical garden, family visits to the state zoo, and daydreams of flying to the Kennedy Space Center and the Eiffel Tower,
    preferring spontaneous adventures over rigid itineraries even when limited by school schedules.
  culinary: A budding baker named Annie Lee mixes chocolate chip cookie dough with family, prefers crunchy carrot sticks, mac‑and‑cheese, and occasional pineapple pizza, and can often be found arranging
    LEGO‑shaped fruit platters, showcasing a playful approach to food that mixes simple favorites with experimental toppings.
  core: Annie Lee, a six‑year‑old whirlwind of curiosity, blends storytelling, block‑building, and contagious enthusiasm while effortlessly turning everyday moments into imaginative adventures, even if
    their pockets are often scattered with rocks and unfinished LEGO projects.
background:
  cultural: Annie is a Black girl growing up in Fredericksburg and Spotsylvania County, Virginia. She is immersed in a close‑knit African‑American family and community that celebrates cultural traditions
    like Sunday gospel services, church choir singing, and community festivals such as Juneteenth. At home, she helps prepare soul‑food staples like collard greens, cornbread, and sweet potatoes, while
    listening to a blend of gospel, R&B, and classic children’s tunes. Her grandparents share stories about the region’s civil‑rights history, and she participates in events at the local African‑American
    cultural center, fostering a strong sense of identity, community responsibility, and pride in her heritage.
