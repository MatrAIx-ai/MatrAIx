  career_goals: Annie dreams of becoming a teacher or a doctor so she can help others learn and stay healthy. She also imagines herself as a community gardener, growing fresh produce for her family and
    neighbors. Her ambition is to create joyful, caring environments where friends and family can thrive, whether that means leading a classroom, caring for animals, or organizing neighborhood clean‑up
    events.
