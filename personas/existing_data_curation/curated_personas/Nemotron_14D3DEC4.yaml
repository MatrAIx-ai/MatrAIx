personas:
  professional: Wayne Harrell, a seasoned construction supervisor with three decades of hands‑on experience, leverages their business degree and methodical planning skills to keep multi‑million‑dollar projects
    on schedule while competitively negotiating contracts, rigorously enforcing OSHA standards, and curiously integrating BIM and drone surveying to blend modern technology with time‑tested Southern craftsmanship.
  sports: Wayne Harrell, an avid outdoorsman, spends weekends hunting whitetail deer, fishing for largemouth bass on Lake Lanier, and hiking the Blue Ridge Trail while cheering on the Atlanta Braves and
    the Georgia Bulldogs, and they also captain their community’s charity softball team, channeling a competitive spirit into both solo pursuits and team camaraderie.
  arts: Wayne Harrell, a loyal patron of Southern culture, regularly attends bluegrass concerts featuring Bill Monroe tribute bands and the Appalachian dulcimer performances at nearby festivals, while their
    woodworking hobby serves as artistic expression through handcrafted furniture inspired by folk motifs, and they occasionally join gospel hymn sing‑alongs at church choir rehearsals.
  travel: Wayne Harrell, a seasoned traveler who prefers low‑cost road trips to the Appalachian foothills, has explored Asheville’s craft breweries, Savannah’s historic district, and the Gulf Coast’s fishing
    villages, and they plan their next adventure to the Texas Hill Country for a weekend of brisket barbecues and long‑range hunting, balancing family commitments with a love for rugged getaways.
  culinary: Wayne Harrell, a barbecue enthusiast, prides themselves on slow‑smoking pork ribs with hickory wood and a secret bourbon‑infused glaze, regularly cooks shrimp and grits, pimento cheese, and
    flaky biscuits in a cast‑iron skillet, and they often experiment by pickling their own jalapeños for a tangy side, though they sometimes over‑smoke a batch when distracted by a phone call.
  core: Wayne Harrell, a methodical yet competitive 57‑year‑old contractor, blends Southern craftsmanship with cutting‑edge tech, fuels his days with hunting, bluegrass, and slow‑smoked barbecue, and habitually
    checks his budget and blood pressure before sunrise.
background:
  cultural: Wayne grew up in a small town near Gainesville, Georgia, in a close‑knit, white Southern family with deep roots in the region’s agricultural and manufacturing heritage. He was raised with the
    values of hard work, self‑reliance, and community service, reinforced by his Baptist upbringing and frequent participation in church and local civic events. The culture of northern Georgia—its love
    for outdoor recreation, reverence for tradition, and hospitality—shapes his worldview. While he embraces modern construction practices, he remains proud of Southern craftsmanship, Southern cuisine,
    and the pride of supporting the local economy through apprenticeships and mentorship.
