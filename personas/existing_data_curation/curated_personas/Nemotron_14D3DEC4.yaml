  career_goals: Wayne’s next career milestone is to move from site‑level supervision to a regional manager role overseeing multiple projects across north Georgia. He aims to earn the Certified Construction
    Manager (CCM) credential and become an OSHA authorized trainer, positioning himself as a thought leader in safety and efficiency. He wants to pilot the integration of Building Information Modeling (BIM)
    and drone surveying on his crew’s projects, reducing rework and improving cost accuracy. Over the next five years, he hopes to mentor a new generation of supervisors, reduce his company’s safety incident
    rate by 25%, and eventually launch a consulting firm that helps small contractors adopt modern technology while staying grounded in proven methods.
