  hobbies: '[''Salsa dancing'', ''Book club'', ''Community theater'', ''Volunteering at local library'', ''Group fitness classes'', ''Hiking'', ''Photography'', ''Cooking'', ''Game nights'', ''Garden planning'']'
  career_goals: Mary aims to launch a career in communications or public relations, ideally within a nonprofit organization or a municipal government office where she can blend her passion for community
    service with her organizational talents. She plans to secure an internship or entry‑level role as a communications coordinator, building a portfolio of press releases, social media campaigns, and event
    programs. Over the next five years, she hopes to earn a certification in nonprofit management and progress to a senior outreach manager position, leading initiatives that foster cultural enrichment
    and civic engagement in the St. Charles area. Long‑term, she envisions pursuing a master's degree in public administration to expand her leadership capabilities and eventually shape policy that supports
    arts and education programs.
