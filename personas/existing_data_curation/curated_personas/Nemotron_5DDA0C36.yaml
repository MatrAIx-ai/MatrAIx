personas:
  professional: Mary Cashion, a 20‑year‑old communications enthusiast, leverages her research acumen, polished public‑speaking, and meticulous event‑planning skills to coordinate author talks and literacy
    workshops at the Saint Peters public library while crafting persuasive social‑media content for nonprofits, positioning herself for a future PR role in municipal government.
  sports: Mary Cashion enjoys weekend hikes at Creve Coeur Lake, joins group fitness classes at the community center, and roots for the St. Louis Cardinals and St. Louis City SC, often wearing team colors
    during outdoor activities.
  arts: Mary Cashion thrives in community theater, designing sets and performing onstage while also capturing festival moments with an iPhone, and she devotes free time to reading contemporary fiction by
    Sally Rooney, listening to Celia Cruz’s salsa hits, and admiring the street‑art works of Banksy.
  travel: Mary Cashion prefers group road trips with friends, has explored New Orleans for its jazz and cuisine, visited Savannah’s historic squares, and dreams of a cultural immersion tour of the Azores,
    balancing adventure with a modest travel budget.
  culinary: Mary Cashion loves experimenting in the kitchen, frequently whipping up paella with saffron, making spicy Korean tteokbokki, and perfecting avocado‑lime salsa, while sourcing fresh herbs and
    locally sourced tomatoes from farmers’ markets for her weekly dinner parties.
  core: Mary Cashion is a meticulously organized, socially driven 20‑year‑old who balances a love for community‑focused arts and fitness with a habit of over‑committing to group projects, often sacrificing
    personal downtime.
background:
  cultural: Mary was raised in the suburban community of Saint Peters, Missouri, a Midwestern environment characterized by friendly neighborly ties and a strong sense of local tradition. Her family’s roots
    trace back to German and Irish ancestry, common among the region’s white population, and she grew up with cultural influences such as holiday gatherings, church participation (she attended a Protestant
    congregation), and community events like county fairs and parades. The values of modesty, hard work, and volunteerism that prevail in the Midwest have shaped her practical outlook and commitment to
    service. Local cuisine, outdoor recreation, and a love for regional history are integral to her identity, and she often incorporates these elements into her social and creative pursuits.
attributes:
