personas:
  professional: A seasoned marine engineer and applied physicist, Alyssa Zealy uses their expertise in coastal infrastructure design, statistical modeling with Python, R, and MATLAB, and meticulous project
    management to lead interdisciplinary research teams, mentor high‑school robotics clubs, and produce clear technical reports, channeling their competitive skepticism into rigorous yet adaptable problem
    solving.
  sports: Alyssa Zealy thrills in weekly senior pickleball matches at the New Bedford senior center, sails with the Buzzards Bay Yacht Club each summer, and they passionately root for the Boston Red Sox
    and New England Patriots, treating each physical activity with the same competitive rigor they applied to engineering projects.
  arts: Alyssa Zealy’s creative side shines on stage with the New Bedford community theater, in their hands while knitting cozy wool garments to the sounds of folk legend Joan Baez, and in their evenings
    devouring historical fiction by Hilary Mantel and Ken Follett, and they often share these passions with friends at local gatherings.
  travel: Alyssa Zealy plans their trips with meticulous itineraries, combining genealogical pilgrimages to Galway, Ireland with science conference visits in Boston and Seattle, while they also savor weekend
    road trips to Acadia National Park for kayaking among native plants.
  culinary: Alyssa Zealy delights in hearty New England fare, expertly preparing lobster bisque and clam chowder with fresh thyme and sea salt, occasionally tackling Irish stew with lamb, carrots, and parsley,
    and they pair meals with a locally brewed amber ale.
  core: Alyssa Zealy blends a lifetime of marine engineering expertise with a fiercely competitive, sociable spirit, knitting functional garments, dominating senior pickleball courts, and they never miss
    a chance to mentor the next generation of innovators.
background:
  cultural: Alyssa is a third-generation white New Englander of primarily Irish and English ancestry. She grew up in suburban Boston before moving to New Bedford for her engineering career, where she embraced
    the city’s maritime heritage and strong community ties. Her upbringing reflected classic New England values of self-reliance, practicality, and civic participation, blended with Irish cultural traditions
    such as storytelling and an appreciation for music. She participates in regional customs like Thanksgiving feasts, Fourth of July parades, and local historic preservation events, and she maintains a
    connection to her family's Catholic roots while also supporting secular community initiatives.
attributes:
  skills: '[''Marine engineering design'', ''Applied physics'', ''Statistical analysis (Python, R, MATLAB)'', ''Project management'', ''Technical writing'', ''Mentoring and tutoring'', ''Community science
