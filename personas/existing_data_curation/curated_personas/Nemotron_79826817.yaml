  hobbies: '[''Sailing'', ''Bridge club'', ''Volunteer docent at museum'', ''Historical fiction reading'', ''Genealogy research'', ''Community theater'', ''Pickleball'', ''Gardening native plants'', ''Knitting'',
    ''Online learning (AI, quantum computing)'']'
  career_goals: Although retired from full-time employment, Alyssa aims to remain an active contributor to STEM education and her local community. She plans to mentor high-school students in robotics and
    coding, serve on the board of the New Bedford Whaling Museum’s education committee, and help develop a hands-on curriculum that integrates marine science with engineering principles. She also hopes
    to author a memoir highlighting the challenges and triumphs of women in STEM during the 20th century, and to stay current with emerging technologies such as artificial intelligence and quantum computing
    through online coursework. Maintaining physical health and social connections is a priority, so she aspires to compete in senior pickleball tournaments and to travel to national science conferences
    to share her expertise.
