persona_description: A physiotherapist who specializes in treating babies with injuries to their arms, focusing on passive range of movement therapy and encouraging sensation and movement to help the baby
  recover. The physiotherapist is knowledgeable about nerve conduction tests, muscle transfers, tendo transfers, and neuromuscular stimulators, and is skilled in preventing or treating disuse muscle atrophy.
  The physiotherapist is interested in understanding the effects of injuries on the nervous system and in finding effective treatments to help the baby recover.
