persona_description: Olusegun Obasanjo, a former Nigerian president and former chairman of the Africa Food Prize Committee, is interested in promoting and rewarding individuals who are contributing positively
  to Africa's agricultural sector. He believes that the youth have the potential to transform the continent's fortunes through agriculture and that African governments should support the sector through
  budgetary support and partnerships with the private sector and civil society. He is also interested in highlighting the success stories and people behind the agricultural initiatives in Africa, and believes
  that rewarding trailblazers in the sector will encourage more young people to take charge of the agenda.
