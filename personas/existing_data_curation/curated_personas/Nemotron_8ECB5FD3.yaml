  career_goals: Leonel aims to transform his modest barbershop into a community creative hub that fuses traditional Mexican grooming traditions with avant‑garde hair art. He plans to introduce a mentorship
    program for young barbers, emphasizing both technical mastery and artistic exploration. Over the next five years, he hopes to expand his services to include specialty grooming workshops, collaborative
    art installations within the shop, and occasional pop‑up styling events at local cultural festivals. He also dreams of visiting Mexico to study regional barbering techniques and to bring those influences
    back to his Arkansas clientele, ultimately establishing a signature style that honors his heritage while pushing the boundaries of modern hair fashion.
