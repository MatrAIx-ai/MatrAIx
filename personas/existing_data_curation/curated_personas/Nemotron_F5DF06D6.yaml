  career_goals: Though officially retired, Feng aims to remain intellectually engaged by offering pro‑bono consulting to local start‑ups, especially those launched by younger Asian‑American entrepreneurs.
    He hopes to serve on the board of a senior‑focused non‑profit in Orange County, using his business acumen to improve program sustainability. Additionally, he aspires to write a memoir that weaves personal
    reflections on his immigrant experience with practical lessons on financial prudence, and to deliver occasional guest lectures at community colleges on cross‑cultural business strategy.
