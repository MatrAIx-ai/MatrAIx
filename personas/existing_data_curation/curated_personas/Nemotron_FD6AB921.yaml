    auditing","Project planning and documentation","Mentoring and training apprentices"]'
  hobbies: '["Hiking in Forest Park and Columbia River Gorge","Arduino and DIY electronics projects","Reading sustainable design and engineering books","Podcasts on renewable energy and electrical trade
    topics","Mindfulness meditation","Landscape photography of Pacific Northwest scenery","Indoor herb gardening","Occasional makerspace participation for repair workshops"]'
  career_goals: Sharon aims to achieve a master electrician license within the next three years, solidifying her expertise in both traditional wiring and emerging renewable‑energy systems. She plans to
    establish a solo contracting business that specializes in low‑impact residential projects—solar installations, energy‑efficiency retrofits, and discreet smart‑home solutions—allowing her to work in
    quiet, client‑focused settings. Long‑term, she hopes to become a recognized advocate for women in the trades, offering workshops and mentorship programs that emphasize practical skill development while
    respecting the introverted nature of many newcomers. She also envisions contributing to community sustainability initiatives by providing pro‑bono electrical assessments for low‑income households.
