personas:
  professional: Sharon Puckett, a certified journeyman electrician with a focus on residential wiring, solar PV installations, and smart‑home automation, leverages their meticulous blueprint reading, safety
    rigor, and quiet, self‑directed problem solving to deliver low‑impact, client‑centric projects that satisfy both practical curiosity and organized execution.
  sports: Sharon Puckett follows the Portland Timbers and the Trail Blazers, spends weekends hiking the trails of Forest Park and the Columbia River Gorge, and participates in a small local running club
    where they log modest mileage to maintain functional strength and resilience.
  arts: Sharon Puckett cultivates a quiet artistic side by photographing misty forest scenes with a Nikon D5600, editing them in Lightroom, drawing inspiration from Ansel Adams' monochrome landscapes and
    Brian Eno's ambient soundscapes, which often play softly while they tinker with Arduino projects.
  travel: Sharon Puckett prefers low‑key, self‑planned trips that combine solitary nature hikes in the Oregon Coast and Columbia River Gorge with occasional eco‑focused pilgrimages to Copenhagen and Iceland’s
    geothermal valleys, always budgeting travel costs to safeguard the capital needed for their future business.
  culinary: Sharon Puckett enjoys preparing simple, herb‑forward meals such as lemon‑garlic roasted salmon garnished with fresh basil, thyme, and oregano from their indoor garden, experiments with low‑waste
    quinoa‑black bean bowls, and occasionally treats themselves to a slice of matcha cheesecake.
  core: Sharon Puckett is a quietly driven electrician‑maker who melds solitary curiosity with meticulous craftsmanship, channeling their love for sustainable tech into low‑impact projects while habitually
    over‑organizing their toolboxes and forgetting to take regular breaks.
background:
  cultural: Sharon grew up in a middle‑class, predominantly white neighborhood on the outskirts of Portland, where the Pacific Northwest’s outdoor culture and a strong DIY ethic were part of everyday life.
    Her family valued self‑reliance, practical education, and community involvement, encouraging her early interest in hands‑on work. Living in Portland exposed her to progressive social values, a commitment
    to environmental stewardship, and a vibrant maker community, all of which shaped her professional focus on sustainable electrical solutions. While she identifies with the broader cultural heritage of
    the region—celebrating local festivals, supporting local artisans, and respecting the area's natural landscapes—she also embraces the city's inclusive spirit by advocating for gender equity in the trades
    and participating in community outreach programs.
attributes:
  skills: '["Residential electrical wiring","Commercial electrical systems","Solar photovoltaic installation and maintenance","Battery storage integration","Smart‑home automation (Lutron, HomeKit, Zigbee)","Blueprint
