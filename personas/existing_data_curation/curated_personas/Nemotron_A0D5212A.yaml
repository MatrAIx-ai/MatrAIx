  hobbies: '[''LEGO building'', ''Exploring nature at the park'', ''Reading science-themed picture books'', ''Memory‑card games'', ''Drawing cartoons and inventions'', ''ScratchJr coding activities'', ''Watching
    educational videos about rockets and machines'', ''Helping in the kitchen with measuring and food art'']'
  career_goals: Manee’s imagination is already reaching toward careers that let her build, test, and lead. She talks about wanting to become an engineer or a scientist who designs cool gadgets, and she
    dreams of winning a school science fair. Her competitive streak pushes her to aim for the top spot in class spelling bees or building contests. In the long term, she envisions herself as a robotics
    designer, creating machines that solve everyday problems, while also hoping to be a leader who inspires other kids to explore how things work.
