persona_description: A trade negotiator who specializes in the negotiation of agricultural and trade agreements between the UK and the EU, with a focus on achieving a balanced and mutually beneficial outcome
  while respecting the integrity of the Single Market. They are experienced in the use of outcome equivalence as a negotiation strategy and are skilled in the art of compromise, ensuring that both parties
  can agree on a mutually acceptable framework for the future. They have a deep understanding of the complexities of agricultural trade, including the importance of public health and animal welfare standards,
  and are able to navigate the political and economic landscape of the UK and the EU to achieve their objectives.
