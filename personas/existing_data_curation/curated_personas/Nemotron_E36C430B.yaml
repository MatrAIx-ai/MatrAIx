personas:
  professional: Benjamin Rankin is a budding marine enthusiast who blends hands‑on fishing trips with budding coding projects, using Python scripts to map Gulf tide patterns and channeling their competitive,
    organized nature into leading the school’s beach‑cleanup crew.
  sports: Benjamin Rankin dominates the local skate park with daily trick practice, plays guard for the Port Charlotte Youth Basketball team three nights a week, joins weekend pickup football games at the
    park, and fervently supports the Miami Heat and Tampa Bay Buccaneers, balancing competitive drive with team camaraderie.
  arts: Benjamin Rankin strums acoustic guitar on evenings, mastering John Mayer’s “Gravity,” enjoys listening to Jack Johnson, local folk duo Sea Breeze, and the occasional Billie Eilish track, and attends
    the Charlotte County Fair’s live music stage, finding creative release beyond competitive gaming.
  travel: Benjamin Rankin has road‑tripped to the Florida Keys and snorkeled at Key West, joined a school field trip to the Everglades, spent a family vacation in Cancun, and dreams of a future fishing
    charter to the Bahamas, preferring mixed itineraries that blend adventure with relaxed beach time.
  culinary: Benjamin Rankin favors grilled grouper tacos with mango salsa, shrimp po'boys with a dash of hot sauce, and can whip up a simple lemon‑garlic fish skillet, though their cooking skill hovers
    at beginner level and they often settle for pizza rolls and spicy Doritos when time runs short.
  core: Benjamin Rankin is a competitive, sociable teen who blends curiosity about marine science with a passion for gaming, yet frequently worries about school performance and sports injuries.
background:
  cultural: Benjamin grew up in Port Charlotte, a small, coastal community in Charlotte County on Florida’s Gulf Coast. The town’s culture revolves around fishing, boating, and a relaxed, family‑oriented
    Southern lifestyle. His family is white, non‑Hispanic, with deep roots in the region; they celebrate traditional American holidays, attend a local Baptist church, and often spend weekends at the beach
    or on the water. The pervasive high‑school sports culture, especially football and basketball, has shaped his social life, while the steady flow of tourists and retirees in the area introduces a modest
    diversity of perspectives. Community events, such as local fairs, fishing tournaments, and volunteer beach clean‑ups, reinforce a sense of civic responsibility, which, together with the natural beauty
    of the Gulf, fuels Benjamin’s appreciation for the outdoors and his interest in marine‑related careers.
