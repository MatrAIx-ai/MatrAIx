  career_goals: In the near term, Benjamin wants to complete his high school diploma, raise his grades, and earn a spot on the varsity basketball or football team at Port Charlotte High. He plans to join
    the school's robotics club or a summer marine technology camp to build on his interest in how machines work underwater. Over the next five years, he aims to enroll in a community‑college program in
    marine mechanics or marine engineering technology, securing certifications that will allow him to work on boat engines, offshore research vessels, or emerging underwater robotics. He also keeps an eye
    on the competitive esports scene, hoping to qualify for a regional gaming team while recognizing the value of a stable technical career. Ultimately, Benjamin envisions a career that blends his love
    of the Gulf Coast’s marine world with his competitive drive, ideally as a marine systems technician who can design, maintain, and troubleshoot equipment used for marine research or offshore energy projects.
