persona_description: Moina Spooner, a journalist who specializes in reporting on issues related to refugees, particularly in Rwanda and East Africa. She is known for her investigative reporting and has
  covered several high-profile stories related to refugee rights and human rights abuses in Rwanda. Her reporting has shed light on the challenges faced by refugees in Rwanda and the limitations of the
  government's refugee operations. Spooner is a vocal advocate for the protection of refugees and has called for accountability for those responsible for the killings of refugees in Kiziba.
