  career_goals: Joseph aims to advance to a senior account director role where he can lead high-value client portfolios and mentor junior sales colleagues, leveraging his competitive drive and strategic
    mindset. He is also interested in specializing in arts-focused advertising, integrating his personal passion for visual culture with professional expertise. Over the next few years, he plans to earn
    a certification in programmatic advertising, speak at regional industry conferences, and eventually launch a boutique consultancy that helps cultural institutions and small businesses craft innovative
    campaigns. While preparing for retirement, he wants to leave a legacy of award-winning, creatively bold work that reflects his openness to unconventional ideas.
