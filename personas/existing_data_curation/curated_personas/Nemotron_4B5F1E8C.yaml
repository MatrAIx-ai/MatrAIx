personas:
  professional: Patti Allen, a 57‑year‑old community‑garden champion who blends meticulous Excel tracking of planting cycles with hands‑on woodworking repairs, leads the town garden club with quiet confidence,
    crafts seasonal workshops that cater to fellow solitary nature lovers, and drafts clear, research‑rich newsletters that reflect her organized, methodical style while subtly steering neighborhood volunteers
    toward sustainable practices.
  sports: Patti Allen, an enthusiastic member of the Maine Seniors Walking Club, logs daily miles along the rocky coastline, follows a seasonal fitness calendar that slots in gentle yoga sessions each spring,
    and keeps a loyal, albeit quiet, allegiance to the New England Patriots and the Boston Bruins, cheering from the porch while tracking progress on a simple pedometer that satisfies their methodical love
    of numbers.
  arts: Patti Allen, a devoted admirer of folk storytellers such as Joan Baez and contemporary acoustic artist Rhiannon Giddens, regularly attends the small‑scale performances at the historic Old Port Theatre,
    collects vintage editions of “The Canterbury Tales” for leisure, and delights in re‑watching classic films starring Katharine Hepburn and Cary Grant, allowing the lyrical narratives to weave into their
    reflective journal entries.
  travel: Patti Allen, a methodical planner who prefers short, well‑researched road trips over spontaneous vacations, has explored the rugged cliffs of Acadia National Park, the historic cobblestones of
    St. Andrews, New Brunswick, and the literary streets of Edinburgh during a carefully budgeted summer abroad, and now aspires to visit the lighthouse‑lined islands of the Azores, always booking accommodations
    that offer quiet private rooms and early‑morning bird‑watching opportunities.
  culinary: Patti Allen, a competent home cook who delights in simmering a creamy New England clam chowder with garden‑fresh thyme, knitting a warm sweater while waiting for the oven to bake a blueberry
    crumble, frequently prepares herb‑crusted baked cod seasoned with rosemary and lemon zest from their own garden, and treats themselves to a soothing cup of Earl Grey tea with a splash of honey, all
    while occasionally ordering take‑out sushi as a guilty‑pleasure indulgence on rainy evenings.
  core: Patti Allen, a solitary, methodical gardener‑craftsperson who balances quiet curiosity with practical stewardship, occasional yarn splurges, and a disciplined yet gently forgetful approach to health
    and finance.
background:
  cultural: Patti is a white New Englander whose family roots trace back to Irish and English ancestors who settled in Maine in the late 19th century. Raised in a modest, close‑knit community in Washington
    County, she grew up with a strong sense of self‑reliance, respect for the natural environment, and an appreciation for local traditions such as lobster festivals and woodworking fairs. She attended
    a small Protestant congregation, which reinforced values of kindness, cooperation, and community service. The coastal culture of Calais, with its rugged landscapes and maritime heritage, has shaped
    her practical outlook, love of the sea, and commitment to preserving local history.
