  career_goals: Although she is not currently part of the formal workforce, Patti aims to deepen her contribution to the community while pursuing personal fulfillment. She hopes to lead the town’s garden
    club, sharing her practical knowledge of sustainable planting and organizing seasonal workshops. She also plans to complete a self‑published family history book that weaves her genealogical research
    with local narratives. Over the next few years, she intends to develop a modest online shop for her handmade knitted goods, allowing her to blend creativity with a low‑key entrepreneurial venture. Additionally,
    she hopes to enroll in a series of continuing‑education classes on digital archiving and horticulture to satisfy her curiosity and stay intellectually engaged.
