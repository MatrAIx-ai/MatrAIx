  career_goals: When asked about his future, Ricardo imagines becoming a firefighter or a teacher—roles that have clear responsibilities, help others, and follow set routines. He is drawn to jobs where
    he can work with a team, keep people safe, and share knowledge, reflecting his caring nature and love for organized, predictable environments.
