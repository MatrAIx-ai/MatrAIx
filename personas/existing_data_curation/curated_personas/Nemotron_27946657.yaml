  career_goals: Ariel dreams of a future where she can combine her love of helping others and her passion for creativity. She often says she wants to become a teacher so she can share knowledge and support
    her friends, an artist who creates paintings that make people smile, and a veterinarian who cares for animals in her community. Her ambition is guided by a desire to make a positive impact on people
    and animals while exploring new ideas.
