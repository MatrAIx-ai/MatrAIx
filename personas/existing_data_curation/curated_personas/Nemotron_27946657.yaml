personas:
  professional: Ariel Ahmadi is a budding junior naturalist and LEGO builder who merges methodical problem‑solving with vivid artistic imagination, often planning detailed nature sketches before constructing
    tiny ecosystems from blocks, and they eagerly share their creations with friends.
  sports: Ariel Ahmadi spends Saturday mornings playing for the Seville Youth Soccer Club, practices gymnastics at the local community center, proudly wears a Cincinnati Bengals cap while cheering for the
    Cleveland Guardians, and looks forward to the upcoming Little League baseball season with the Seville Cubs, and they love the teamwork and camaraderie each sport brings.
  arts: Ariel Ahmadi fills sketchbooks with watercolors of woodland scenes and whimsical characters, plays simple melodies on a small keyboard, and listens to a blend of Disney soundtracks and traditional
    lute music from family celebrations, drawing inspiration from Beatrix Potter and Hayao Miyazaki, and they use their keyboard to add a musical backdrop to each drawing.
  travel: Ariel Ahmadi loves weekend hikes in Hocking Hills State Park to collect leaves, dreams of seeing cherry blossoms in Kyoto, and cherishes family trips to Washington, D.C., where they eagerly explore
    the natural history museum and linger at the National Mall’s open spaces.
  culinary: Ariel Ahmadi enjoys helping in the community garden, often snacking on fresh carrot sticks and cucumber slices, prefers homemade pizza topped with mozzarella, basil, and a drizzle of olive oil,
    and occasionally mixes raisins into oatmeal for a sweet surprise, and they love to brag about their culinary creations to friends.
  core: Ariel Ahmadi blends Midwestern community spirit with quiet curiosity for family folklore, turning every leaf into a canvas, meticulously budgeting their allowance, and they habitually hum the same
    lullaby while sorting crayons.
background:
  cultural: Ariel grows up in Seville, Ohio, a small Midwestern town with a predominantly white population. Her family embraces core American values such as community involvement, kindness to neighbors,
    and celebrating holidays like Thanksgiving, Halloween, and the Fourth of July. At home, the Ahmadi surname reflects Persian roots, and her family incorporates elements of Iranian culture, such as marking
    the Persian New Year (Nowruz) with a Haft‑Sinf table, sharing stories of Persian folklore, and listening to traditional music on special occasions. This blend of Midwestern American life and subtle
    Persian cultural practices gives Ariel a appreciation for diverse art forms, respect for tradition, and a sense of belonging to both her local community and her family's heritage.
