  career_goals: Although retired, Hang remains driven to leave a lasting legacy for his community. He aims to compile a memoir and an oral‑history anthology documenting the experiences of East Asian seniors
    in Whitestone, to be archived at the Queens Public Library. He wishes to formalize his role as a cultural ambassador at the local senior center, offering regular workshops in traditional cooking, calligraphy,
    and storytelling. Hang also hopes to mentor younger volunteers, encouraging them to preserve and share their heritage. On a personal level, he seeks to improve his emotional well‑being through mindfulness
    practice and to achieve top placement in senior chess and mahjong tournaments, demonstrating his competitive spirit while fostering intergenerational connection.
