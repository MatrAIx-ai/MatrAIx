persona_description: A PostgreSQL administrator who is responsible for managing and administering the PostgreSQL database system. This person is skilled in creating and managing procedural languages, as
  well as understanding the underlying system catalog and call handlers. They are also knowledgeable about trust management and the installation of new languages into the template1 database. This person
  has experience working with the PostgreSQL superuser privilege and is familiar with the CREATE LANGUAGE command and its parameters. They are also familiar with the pg_pltemplate system catalog and its
  contents.
