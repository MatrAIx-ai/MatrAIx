personas:
  professional: David Sandoval, a seasoned medical assistant with bilingual fluency and expertise in patient intake, phlebotomy, and electronic health record navigation, balances his preference for structured
    clinic protocols with a spontaneous willingness to troubleshoot on the fly, delivering compassionate care while assertively streamlining front-desk operations.
  sports: David Sandoval, a regular on a local recreational soccer team and an avid hiker of the Franklin Mountains, roots for the El Paso Locomotive FC and the Dallas Cowboys while maintaining a weekend
    routine of sunrise runs and occasional strength-training at the community gym.
  arts: David Sandoval unwinds by listening to norteño legends like Los Tigres del Norte and Banda El Recodo, admires the vibrant murals of local artist José Sánchez, and periodically reads self-improvement
    works by James Clear, all of which shape his appreciation for storytelling through both sound and visual art.
  travel: David Sandoval favors spur-of-the-moment road trips to nearby gems like Marfa, Texas, Santa Fe, New Mexico, and the historic town of San Miguel de Allende, planning loosely to accommodate family
    commitments while seeking desert sunsets and cultural festivals.
  culinary: David Sandoval, an intermediate home cook, delights in preparing tamales and pozole with masa harina, dried chilies, and hominy, often pairing the meals with fresh guacamole and elote, while
    savoring occasional outings to local taquerías for carne asada and chiles rellenos.
  core: David Sandoval is a bilingual medical assistant who blends disciplined clinic routines with spontaneous community projects, a love for desert hikes, and a habit of late-night cooking, all while
    occasionally forgetting to file paperwork on deadline.
background:
  cultural: David grew up in a Mexican‑American household in El Paso, where both English and Spanish shaped his daily life. He maintains close ties with extended family across the border, celebrates Día
    de los Muertos, Cinco de Mayo, and Mexican Independence Day, and participates in local Chicano cultural events. His upbringing emphasized familismo, respect for elders, and a strong sense of community
    responsibility. These cultural values influence his compassionate patient care, bilingual communication, and dedication to community health outreach. He blends traditional Mexican customs with the pragmatic,
    individualistic aspects of American life, creating a bicultural identity that informs both his personal and professional choices.
attributes:
  skills: '["Patient intake and triage","Vital signs measurement","Phlebotomy","Electronic health record management (Epic, eClinicalWorks)","Medical billing and insurance verification","Infection control
