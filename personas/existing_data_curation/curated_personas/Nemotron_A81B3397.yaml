    in fast‑paced clinical settings"]'
  hobbies: '["Cooking traditional Mexican dishes","Playing recreational soccer","Listening to regional Mexican music","Hiking in the Franklin Mountains","Photography of desert landscapes","Volunteering
    at bilingual health fairs","Reading self‑improvement books","Occasional spontaneous road trips"]'
  career_goals: David aims to solidify his professional standing by earning the Certified Medical Assistant (CMA) credential and completing an associate degree in health administration. He aspires to advance
    into a supervisory role, such as Lead Medical Assistant or Medical Office Manager, where he can shape clinic workflows and mentor newer staff, especially those from Hispanic backgrounds. Long‑term,
    he envisions launching a community health outreach program that provides bilingual health education and preventive care workshops, blending his practical medical expertise with his commitment to cultural
    service. Achieving these goals would give him greater financial stability and a structured career path while allowing room for the spontaneous community projects he values.
