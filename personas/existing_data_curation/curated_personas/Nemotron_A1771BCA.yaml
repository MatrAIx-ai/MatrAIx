    Compassionate Care'', ''Clinical Teaching and Mentorship'', ''Medical Image Post‑Processing and Artistic Visualization'', ''Problem Solving under Stress'', ''Team Collaboration'']'
  hobbies: '[''Analog black‑and‑white photography'', ''Visiting art museums and galleries'', ''Gardening (heirloom tomatoes, peppers, prairie plants)'', ''Playing acoustic guitar'', ''Reading (western novels,
