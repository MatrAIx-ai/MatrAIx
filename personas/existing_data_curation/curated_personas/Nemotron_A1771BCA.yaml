personas:
  professional: Don Baker, a veteran diagnostic radiographer with expertise in X‑ray, CT, and interventional imaging, leverages his meticulous attention to patient safety and his artistic eye to excel in
    image post‑processing while fostering a supportive learning environment for junior technologists as he prepares to transition into a lead quality‑assurance coordinator role.
  sports: Don Baker maintains his fitness by joining the Caprock Birdwatchers Society’s weekly nature walks, cheering the Dallas Cowboys on Sundays and the Dallas Mavericks during the NBA season, and enjoying
    occasional lightweight fishing outings on Lake Meredith, preferring low‑impact cardio over high‑intensity workouts.
  arts: Don Baker blends his love for analog photography—drawing inspiration from Ansel Adams and Vivian Maier’s monochrome landscapes—with acoustic guitar sessions that echo the storytelling of Townes Van Zandt,
    frequently curating community art events at the Amarillo Museum of Art and collaborating with local mixed‑media artist Maya Ortega.
  travel: Don Baker favors spontaneous, photography‑centric road trips, having driven the Texas Hill Country to capture the lavender fields of Fredericksburg and the limestone cliffs of Enchanted Rock,
    while he dreams of a fall expedition to Iceland’s misty highlands and a spring visit to Kyoto’s Arashiyama bamboo groves, balancing his wanderlust with a modest travel budget and mid‑range lodgings.
  culinary: Don Baker whips up garden‑fresh tomato‑basil pasta, rustic heirloom pepper salsa, and herb‑infused grilled chicken using vegetables from his own plot, while indulging in occasional steak‑house
    outings at Amarillo’s famed Big Tex BBQ, reflecting a moderate cooking skill that blends homegrown simplicity with occasional upscale dining.
  core: Don Baker, a 63‑year‑old radiology veteran who never leaves home without his black‑and‑white camera, balances meticulous safety protocols at work with a habit of over‑watering his heirloom tomatoes,
    and channels lingering health worries into weekly meditation and late‑night film‑developing sessions.
background:
  cultural: Don grew up in a middle‑class family on the outskirts of Amarillo, Texas, where the Texas Panhandle's open landscapes and agricultural roots fostered a sense of independence and community. His
    parents worked in the regional oil and farming sectors, and family gatherings often centered around church, county fairs, and backyard barbecues. The local culture emphasized hospitality, self‑reliance,
    and a strong work ethic, while also exposing him to the diverse cultural fabric of Amarillo—including the growing Hispanic community, Native American heritage of the Plains, and a vibrant arts scene.
    Don’s education in a public high school and later a state university reinforced a pragmatic, curiosity‑driven outlook, and his adult life reflects a blend of traditional Texan values with a broad appreciation
    for scientific inquiry and artistic expression.
