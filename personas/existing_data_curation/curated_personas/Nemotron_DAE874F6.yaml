  career_goals: Leslie’s ambition now centers on giving back to her community and the next generation of women in STEM. She aims to launch a mentorship program that pairs senior scientists with high‑school
    girls, and to curate a traveling exhibition that juxtaposes Holyoke’s industrial artifacts with contemporary digital art. She also hopes to complete a memoir that documents her experiences navigating
    a male‑dominated field in the 1960s and 1970s, and to secure a small fellowship that funds local history research. Additionally, she plans to deepen her proficiency in machine‑learning tools to analyze
    genealogical data.
