  hobbies: '[''Experimenting with fusion recipes'', ''Home hydroponic herb gardening'', ''Attending food festivals and cooking workshops'', ''Watching culinary TV shows and YouTube channels'', ''Playing
    cricket in local leagues'', ''Listening to classical Indian music and occasional tabla practice'', ''Exploring Michigan’s hiking and biking trails'', ''Reading food science articles and blogs'']'
  career_goals: Dilip aims to become a head chef at a farm‑to‑table restaurant that highlights sustainable, locally sourced ingredients infused with South Asian flavors. Long‑term, he dreams of opening
    his own fusion eatery in Michigan that serves as a cultural bridge and a training ground for aspiring chefs from immigrant backgrounds. He plans to pursue advanced culinary leadership certifications,
    experiment with kitchen automation tools, and eventually develop a line of artisanal spice blends and ready‑to‑eat meals that reflect his scientific approach to cooking.
