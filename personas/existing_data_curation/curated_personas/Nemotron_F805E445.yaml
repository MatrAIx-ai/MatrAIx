  hobbies: '[''Mexican folk dancing'', ''Cooking Mexican cuisine'', ''Community volunteering'', ''Hiking'', ''DIY home improvement projects'', ''Soccer fandom'', ''Reading trade publications'', ''Karaoke'',
    ''Participating in local festivals'']'
  career_goals: In the short term, Alondra aims to earn certifications as an HVAC technician and journeyman electrician, and to become a Certified Maintenance & Reliability Professional (CMRP). She wants
    to be promoted to Maintenance Supervisor within the next three years, where she can lead a small team, implement energy‑efficient retrofits, and develop a data‑driven preventive‑maintenance program
    that reduces downtime. Over the longer horizon, she envisions opening her own residential repair and green‑retrofit business, providing reliable, culturally sensitive services to the Hispanic community
    in West Texas. She also hopes to mentor apprentices through a local vocational school and become an advocate for workplace safety and sustainability in the region.
