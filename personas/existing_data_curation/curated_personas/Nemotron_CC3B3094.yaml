  career_goals: Nicholas aims to advance to a senior director or vice‑presidential role overseeing operations across a regional or national division. He is focused on building a reputation for operational
    excellence, implementing sustainable efficiency initiatives, and mentoring the next generation of disciplined managers. Balancing his ambition, he also seeks to create a work environment that reduces
    stress for his team and supports a healthier work‑life balance for himself.
