  career_goals: Maria aims to transition into an office manager or senior administrative leadership role within the next two years, where she can mentor newer staff and shape a collaborative, flexible office
    culture. She hopes to incorporate her passion for the arts by establishing a quarterly workplace art showcase and forging partnerships with local galleries. In the longer term, she envisions a semi‑retired
    position as a cultural liaison for Union County, helping organize community arts events and workshops. Continuous learning—particularly in project‑management software and community‑engagement strategies—remains
    a key ambition.
