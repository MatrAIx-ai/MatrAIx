  career_goals: Pablo aims to become a top‑performing sales representative and earn a senior or team‑lead position within his company, eventually moving into a supervisory or branch‑manager role that offers
    stability and predictable income. He plans to complete a GED program and obtain a professional sales certification to bolster his credentials. Long‑term, he dreams of launching his own small, service‑oriented
    business—perhaps a consulting boutique for home‑service plans or a modest family restaurant—that caters to the Cuban‑American community, allowing him to blend his sales expertise with his cultural heritage
    while maintaining a routine‑friendly work schedule.
