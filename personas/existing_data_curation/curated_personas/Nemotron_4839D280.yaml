personas:
  professional: Pablo Hoyos, a bilingual telecommunications sales representative, channels his strong preference for routine into daily call quotas and systematic CRM updates, while their warm, empathetic
    tone and flexible problem‑solving keep customers engaged—even if a missed follow‑up occasionally slips through their relaxed, slightly disorganized workflow.
  sports: Pablo Hoyos follows baseball passionately, cheering for the Miami Marlins and the Cuban national team, while joining a local beach‑volleyball pickup group in summer and playing weekend dominoes
    at the park as a social, low‑key competitive outlet, balancing routine shoreline walks with occasional visits to the Marlins’ stadium.
  arts: Pablo Hoyos immerses in classic Latin rhythms, listening to Celia Cruz and Buena Vista Social Club on weekday evenings, attending Little Havana cultural festivals, and casually gaming on FIFA nights,
    finding that the vibrant music and dance scenes provide a social anchor that complements their moderate talkativeness.
  travel: Pablo Hoyos prefers short, well‑planned getaways that fit a predictable schedule, such as weekend trips to Key West’s historic Old Town and annual visits to Orlando’s theme parks, while dreaming
    of a future culinary tour of Caribbean islands that would blend vacation relaxation with the chance to sample regional dishes.
  culinary: Pablo Hoyos cooks traditional dishes like ropa vieja and arroz con pollo every Sunday for family and friends, favoring ingredients such as cumin, garlic, and plantains, and enjoys perfecting
    the achiote‑infused rice while occasionally improvising with a dash of hot sauce for a personal twist.
  core: Pablo Hoyos blends routine‑driven sales expertise with a relaxed, sociable lifestyle, juggling dependable client relationships, spontaneous weekend cooking, and low‑key sports fandom while occasionally
    letting disorganization seep into budgeting and health check‑ups.
background:
  cultural: Born to Cuban immigrant parents who settled in Miami’s Little Havana neighborhood, Pablo grew up bilingual, speaking Spanish at home and English in school and work. He was immersed in Cuban
    cultural traditions—music, food, and community events such as the Calle Ocho Festival—while also navigating the broader American context. Family gatherings centered around shared meals and storytelling,
    reinforcing a strong sense of community, respect for elders, and practical values. These cultural influences shape his friendly, cooperative demeanor and his emphasis on harmony in both personal and
    professional relationships. Pablo maintains close ties to the Cuban‑American community, supporting local businesses, participating in occasional church activities, and celebrating Cuban holidays.
