persona_description: A researcher and scientist who specializes in the field of optical imaging, specifically in the use of ultra-fast image processing techniques to capture images of obscured objects.
  They have conducted research on the CORNAR system, a system developed for capturing images of obscured objects using ultra-fast image processing for images created by reflected laser light. The team won
  a Popular Mechanics Breakthrough award for their work.
