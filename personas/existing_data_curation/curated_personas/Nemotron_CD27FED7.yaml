    and blues'', ''Community clean‑up volunteering'']'
  career_goals: Lazaro aims to leverage his extensive cleaning experience to open a boutique detailing shop that specializes in classic and vintage vehicles, blending his appreciation for art and design
    with his technical skills. He plans to obtain a professional certification in automotive detailing, develop a small team of trainees he can mentor, and build a reputation for meticulous, high‑quality
    service. Over the next five years he also hopes to secure a stable financial base for a comfortable retirement that allows him to travel to art galleries, museums, and national parks across the Southwest.
