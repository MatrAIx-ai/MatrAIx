personas:
  professional: Francia Salazar leverages three decades of full‑stack development, cloud architecture, and agile leadership to prototype culturally resonant web platforms, mentoring junior engineers while
    championing inclusive design and envisioning AI‑enhanced tools that spotlight Caribbean artists.
  sports: Francia Salazar hikes the Watchung Reservation with the local Trailblazers club every spring, supports the New York Yankees and the New York Knicks, and maintains a weekly salsa‑dance cardio routine
    that doubles as her primary fitness regimen.
  arts: Francia Salazar frequents New Jersey art galleries, draws watercolor scenes inspired by the vibrancy of Frida Kahlo and Jean‑Michel Basquiat, and keeps the rhythms of Celia Cruz and Marc Antonio
    alive on the dance floor while curating a community showcase for emerging Caribbean visual artists.
  travel: Francia Salazar plans her trips around family visits to the Dominican Republic, seeks cultural immersion in Barcelona's street art scene, and delights in weekend getaways to New Orleans for jazz,
    all while juggling a modest travel budget that prioritizes off‑season airfare and shared accommodations.
  culinary: Francia Salazar perfects simmered sancocho, buttery mangú, and crisp pastelitos using plantains, yucca, and cilantro, balances her love for home‑cooked comfort with occasional indulgence in
    sushi rolls topped with avocado, and enjoys hosting dinner parties where she experiments with fusion recipes that blend Caribbean spices with Mediterranean herbs.
  core: Francia Salazar is a tech‑savvy, art‑enthusiast mentor who fuses Caribbean vibrancy with code, dances through life with salsa rhythm, and occasionally trades sleep for late‑night debugging or extra
    salsa lessons.
background:
  cultural: Francia is a first‑generation Dominican‑American who grew up in a bilingual household where Spanish and English intermingled. Her upbringing was steeped in Dominican traditions—family gatherings
    centered around music, dance, and food; celebrations of Carnaval, Semana Santa, and Día de los Reyes; and a deep respect for Catholic values. She maintains strong ties to her extended family in the
    Dominican Republic, traveling at least twice a year and supporting community initiatives there. In North Brunswick, she is an active member of the local Dominican cultural association, helping organize
    festivals, cultural exchanges, and youth mentorship programs. This rich cultural tapestry informs her identity, work ethic, and creative outlook.
