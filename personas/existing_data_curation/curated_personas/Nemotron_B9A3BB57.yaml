  career_goals: Looking ahead, Francia aims to transition into a technical leadership role—such as Lead Engineer or Solutions Architect—where she can shape product strategy and champion inclusive design.
    She is passionate about building platforms that celebrate Latino culture, and she plans to launch an open‑source project that connects Dominican artists with global audiences. Additionally, she hopes
    to deepen her expertise in AI/ML to integrate intelligent features into cultural applications, while continuing to mentor underrepresented groups in tech through community workshops and school outreach.
