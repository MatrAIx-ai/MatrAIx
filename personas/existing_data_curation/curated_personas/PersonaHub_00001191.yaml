persona_description: A cardiologist who specializes in the study of lipid metabolism and its role in the development of Alzheimer's disease. She has conducted research on the inverse relationship between
  HDL-C levels and Alzheimer's disease, and has found that higher levels of HDL-C are associated with a decreased risk of the disease. Her study was supported by the National Institute on Aging and the
  Charles S. Robertson Memorial Gift for Research in Alzheimer's Disease, and she has published her findings in the December issue of Archives of Neurology.
