  hobbies: '[''Book Club'', ''Yoga'', ''Historic Site Tours'', ''Community Gardening'', ''Neighborhood Clean‑up Volunteering'', ''Tennis League'', ''Traveling'']'
  career_goals: Caitlin aims to transition from a first‑line supervisory role to a senior operations or administrative services manager position within the next five years. She plans to earn a Certified
    Administrative Professional (CAP) credential and is exploring an executive MBA program to strengthen strategic planning skills. Her ambition is to lead large‑scale efficiency initiatives, drive digital
    transformation of office processes, and mentor the next generation of administrative professionals. Additionally, she hopes to influence organizational policy around work‑life balance and employee engagement
    within the federal‑centric environment of Arlington.
