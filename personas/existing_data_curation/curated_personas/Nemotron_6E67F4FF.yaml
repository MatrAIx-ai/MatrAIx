personas:
  professional: Yolanda Lewis, a veteran commercial cleaning supervisor with three decades of experience, merges meticulous OSHA compliance, green‑cleaning expertise, and hands‑on mentorship to lead janitorial
    teams while championing eco‑friendly practices and cost‑effective solutions, and they constantly seek ways to improve workflow efficiency.
  sports: Yolanda Lewis embraces active movement through line‑dancing at the Clifton Community Center and weekly walks with the local walking club, while cheering for the New York Yankees and following
    the New York Knicks, and they occasionally join bridge tournaments that double as strategic sport.
  arts: Yolanda Lewis delights in leading the senior gospel choir with renditions of Mahalia Jackson and Aretha Franklin, savors contemporary novels by Colson Whitehead, Jesmyn Ward, and Angie Thomas, and
    competes zealously at trivia nights where they welcome challenges from pop‑culture to history.
  travel: Yolanda Lewis prefers weekend getaways to historic towns like Savannah, GA, Charleston, SC, and Asheville, NC, where they explore garden tours and local markets, balancing a modest travel budget
    with a love for immersive cultural experiences.
  culinary: Yolanda Lewis enjoys cooking wholesome meals such as baked salmon with lemon‑dill sauce, roasted sweet potatoes, green bean casserole featuring fresh herbs from their garden, and an occasional
    apple pie, and they often add a pinch of nutmeg for extra warmth, demonstrating moderate culinary skill and a penchant for seasonal ingredients.
  core: Yolanda Lewis blends competitive curiosity with community devotion, turning every cleaning checklist into a green mission while they never miss a gospel rehearsal or line‑dance class, even if it
    means occasional impulse purchases of hymnals.
background:
  cultural: Yolanda identifies as African‑American, with family roots that trace back to the rural South before her parents settled in New Jersey during the Great Migration. Growing up in a close‑knit Black
    community, she embraced church life, attending a Baptist congregation where gospel music and fellowship remain central to her identity. She celebrates cultural milestones such as Juneteenth and Kwanzaa,
    and she enjoys cooking traditional soul food dishes that connect her to her heritage. Her lived experience as a Black woman in the service industry has fostered resilience and a strong sense of solidarity,
    which she channels into mentoring younger workers and advocating for equitable workplace practices.
