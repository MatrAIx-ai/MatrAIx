  hobbies: '["Singing gospel in a community choir","Line‑dancing classes","Bridge and card games at the senior center","Walking club exploring local parks","Reading contemporary African‑American literature","Volunteering
    in a community garden","Participating in trivia nights","Adult‑education workshops on technology and budgeting"]'
  career_goals: Approaching retirement, Yolanda aims to transition into a part‑time supervisory role where she can mentor younger janitorial staff and champion eco‑friendly cleaning practices across multiple
    properties. She plans to obtain a certified green‑cleaning credential to strengthen her expertise and to launch a modest residential cleaning side‑business that leverages her reputation for reliability
    and attention to detail. Additionally, she hopes to serve as a health‑and‑safety liaison for her building, ensuring that workplace standards remain high while advocating for employee well‑being.
