personas:
  professional: Jerry Moreton is a seasoned special‑education teacher who designs data‑driven IEPs, mentors new teachers, and leverages their charismatic public speaking to champion inclusive practices
    at district meetings.
  sports: Jerry Moreton plays pick‑up basketball at the Mastic recreation center, hikes the Fire Island and Connetquot River Preserve, supports the New York Knicks and Mets, and participates in a local
    adult league, balancing competitive drive with community camaraderie.
  arts: Jerry Moreton shines on stage in community‑theatre productions, draws inspiration from Lin‑Manuel Miranda and Meryl Streep, curates nature photography influenced by Ansel Adams, and regularly attends
    performances at the Long Island Shakespeare Festival.
  travel: Jerry Moreton enjoys a blend of meticulous itineraries and spur‑of‑the‑moment trips, having explored Kyoto’s temples, Iceland’s volcanic landscapes, and London’s historic theatres, while weekend
    getaways to the Hamptons and Acadia National Park satisfy their love for both culture and nature.
  culinary: Jerry Moreton cooks gourmet international dishes such as Thai pad thai, Indian butter chicken, and Mediterranean mezze for their spouse, sourcing fresh herbs like basil and lemongrass at farmer’s
    markets, and prides themselves on perfecting the balance between spice and comfort.
  core: Jerry Moreton blends a methodical work ethic with an exuberant, sociable spirit, orchestrating inclusive classrooms by day and lively community performances by night, all while never missing a chance
    to share a well‑timed joke or a red‑pen annotation.
background:
  cultural: Jerry grew up in a middle‑class white family on Long Island, where community involvement and a strong emphasis on education were core values. His parents were both school professionals, instilling
    a respect for public service and lifelong learning. The suburban environment of Mastic, with its proximity to New York City, exposed him to a growing cultural diversity that shaped his inclusive outlook
    while preserving traditional East Coast work ethic. His childhood included participation in church youth groups and local civic events, fostering a sense of responsibility toward his neighbors. This
    blend of suburban American heritage, progressive educational values, and exposure to a multicultural milieu informs his balanced, pragmatic, and socially engaged personality.
attributes:
  skills: '["Individualized Education Program (IEP) development", "Behavior Intervention Planning", "Assistive Technology Integration", "Differentiated Instruction", "Data‑Driven Assessment", "Classroom
    Management", "Parent and Family Engagement", "Collaborative Team Teaching", "Public Speaking and Advocacy", "Curriculum Adaptation for Diverse Learners", "Grant Writing for Special Education Programs",
    "Conflict Resolution", "Professional Development Facilitation", "Use of Evidence‑Based Practices", "Mentoring New Teachers"]'
  hobbies: '["Community theater acting", "Playing basketball", "Hiking in Suffolk County parks", "Cooking international cuisines", "Nature photography", "Hosting an educational podcast", "Reading contemporary
    fiction and educational psychology", "Traveling with spouse", "Volunteering with autism support groups", "Participating in Toastmasters"]'
  career_goals: Jerry aims to advance to a leadership role, such as Special Education Department Head or Curriculum Coordinator, where he can shape district‑wide inclusive policies. He plans to earn an
    Ed.S. in Special Education and eventually a doctorate, focusing his research on technology‑enhanced interventions for students with communication challenges. Jerry also aspires to present his work at
    national conferences, publish articles in education journals, and mentor a cohort of emerging special‑ed teachers. Long‑term, he envisions launching a community outreach program that provides workshops
    for parents and local schools on best practices in inclusive education.
