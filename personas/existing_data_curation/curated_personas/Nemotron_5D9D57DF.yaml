  career_goals: Betty is already expressing simple aspirations. She loves animals and often says she wants to be a veterinarian when she grows up. She also enjoys listening to stories and imagines becoming
    a teacher who reads to children. In the near term, her goals are to learn to read her name, master writing a few words, and transition confidently into preschool and kindergarten. She aims to become
    more independent in daily tasks such as dressing herself and to feel comfortable participating in small group activities at school.
