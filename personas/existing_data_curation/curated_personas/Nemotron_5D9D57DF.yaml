personas:
  professional: Betty Rapoza, a three-year-old budding builder, arranges her block towers with precise order yet gleefully dismantles them on a whim, and they showcase an early fascination with structured
    play that can quickly turn into spontaneous creativity.
  sports: Betty Rapoza, a regular on the toddler soccer carousel at the local park, proudly cheers for the Little Lions while also joining spontaneous splash-filled dance circles whenever a rain puddle
    appears, and they enjoy a blend of organized team play and free-form movement.
  arts: Betty Rapoza, an enthusiastic fan of Dr. Seuss picture books and finger-paint splatters, colors inside the lines with meticulous care yet delights in spontaneous doodles reminiscent of Eric Carle’s
    collage style, and they balance orderly artistic practice with playful improvisation.
  travel: Betty Rapoza, who loves short family outings to the zoo, aquarium, and nearby beach, follows a carefully planned stroller route for snack stops yet often abandons the itinerary to chase fluttering
    butterflies, and they merge predictable travel routines with whimsical detours.
  culinary: Betty Rapoza, a self-declared mac and cheese aficionado, neatly arranges each pasta swirl on the plate but sometimes rebels by sprinkling extra cheese like confetti, and they blend meticulous
    eating habits with spontaneous culinary flair.
  core: Betty Rapoza, a three-year-old who balances precise block building with impromptu sticker trades, channels both a love for structure and a penchant for spontaneous play into every moment, and they
    turn everyday routines into charmingly unpredictable adventures.
background:
  cultural: Betty grows up in a White American family with deep New England roots and Polish heritage reflected in her surname, Rapoza. Her family celebrates traditional American holidays such as Thanksgiving,
    Fourth of July parades, and local community festivals in Portsmouth, NH, while also honoring Polish customs like making pierogi and observing certain holiday foods. The coastal environment influences
    her love for the beach and maritime events, and she attends a nearby preschool that values routine, community involvement, and early literacy. Her upbringing emphasizes courteous behavior, respect for
    nature, and participation in neighborhood playgroups and church activities.
