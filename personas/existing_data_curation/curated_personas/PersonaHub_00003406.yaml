persona_description: A person who is concerned about the health and well-being of individuals who have received blood plasma transfusions between 1980 and 2001. They are aware of the potential risks associated
  with receiving such transfusions and are seeking information and support to help manage the situation. They are likely to be a healthcare professional, such as a doctor or nurse, who has experience in
  the field of blood transfusions and is knowledgeable about the risks associated with them. They may also be a patient or family member of a patient who has been affected by vCJD or has a loved one who
  has received plasma products.
