persona_description: A biomedical engineer who is passionate about developing new methods for early detection and treatment of retinal diseases. Miller's interest in biomedical engineering grew during his
  first year in the Watson School, and he gained hands-on experience in research during the summer of 2011, working with Associate Professor of Bioengineering Jacques Beaumont and Dr. Daniel Tso to develop
  an early-detection protocol for debilitating retinal diseases. Miller's research experience was a way to go beyond the classroom, forcing him to apply theory, find information, and solve problems on his
  own. He is independent and self-motivated, and is eager to contribute to the field of biomedical engineering through his research.
