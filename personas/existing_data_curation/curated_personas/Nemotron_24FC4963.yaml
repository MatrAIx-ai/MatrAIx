personas:
  professional: Neena Antekeier imagines herself as a budding architect, meticulously piecing together LEGO skyscrapers with a love for order and a gentle, collaborative spirit that makes group building
    sessions feel harmonious.
  sports: Neena Antekeier zips around the neighborhood on a pink bike, participates in the Fort Wayne Youth Soccer Club's Saturday games, and cheers loudly for the Indianapolis Colts while dreaming of joining
    a future gymnastics class at the local community center.
  arts: Neena Antekeier spends afternoons drawing family portraits inspired by Eric Carle's bright collages, dancing to Raffi's sing-along songs, and creating whimsical LEGO villages while swapping story-time
    recommendations like Dr. Seuss's book The Cat in the Hat and classic Disney movies.
  travel: Neena Antekeier has explored the nearby Allen County Fairgrounds, taken a family road trip to Chicago's Navy Pier, and daydreams about visiting Orlando's Walt Disney World during the next summer
    vacation.
  culinary: Neena Antekeier loves crunchy carrot sticks with ranch dip, homemade mac and cheese, and helping to spread peanut butter on jelly sandwiches, though they often sneak an extra spoonful of ketchup
    when the family cooks.
  core: Neena Antekeier blends a love for orderly LEGO builds with a sweet tooth and a habit of forgetting bedtime brushing, crafting a bright, cooperative world where imagination meets gentle mischief.
background:
  cultural: Neena is a white Midwestern American child raised in Fort Wayne, Indiana. Her family's heritage includes German and Irish roots, and they uphold typical Midwestern values of kindness, community
    involvement, and modesty. She participates in local traditions such as Fourth of July parades, Thanksgiving gatherings, and the annual Allen County fair. Her upbringing includes regular visits to the
    public library, school field trips to nearby museums, and involvement in community youth groups that emphasize cooperation and caring for neighbors.
