  career_goals: Neena dreams of becoming someone who helps others learn and feel safe, such as a teacher or a veterinarian. She imagines herself in a classroom sharing stories or caring for animals at a
    pet clinic. Occasionally she talks about becoming an astronaut, reflecting her curiosity about space and discovery. At her age, her ambitions are guided by her desire to be kind, supportive, and part
    of a harmonious community.
