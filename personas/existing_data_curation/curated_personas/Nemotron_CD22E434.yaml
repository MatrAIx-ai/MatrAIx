personas:
  professional: Future veterinarian in training, Elizabeth Garcia showcases their curiosity and practicality by meticulously caring for stuffed animal patients, arranging pretend exams, and confidently
    explaining findings to classmates; they love receiving applause for their thoroughness.
  sports: Enthusiastic about playground adventures, Elizabeth Garcia enjoys climbing the jungle gym, follows the Dallas Cowboys with family, kicks a soccer ball at the local youth club, and cheerfully participates
    in seasonal swimming lessons at the community pool; they proudly wear a tiny Cowboys cap.
  arts: Creative and color‑loving, Elizabeth Garcia delights in drawing bright crayon pictures inspired by Frida Kahlo’s vivid palettes, dancing to the lively tunes of Mariachi Vargas, and singing along
    to Disney’s 'Let It Go' while watching performances by the local children’s theater troupe; they often request an encore of the songs.
  travel: Curious about the world, Elizabeth Garcia has visited the nearby Fort Worth Zoo and a family road trip to the Grand Canyon, and dreams of exploring the ancient ruins of Teotihuacan and tasting
    the famous churros of a Mexican city market; they keep a scrapbook of ticket stubs and sketches.
  culinary: Little chef Elizabeth Garcia loves helping bake chocolate chip cookies, proudly stirring in cinnamon and a pinch of vanilla, and eagerly tastes tacos al pastor and tamales during family celebrations,
    though they sometimes sneak extra sprinkles onto their ice cream.
  core: Elizabeth Garcia blends boundless curiosity with a love for order, balancing imaginative play with meticulous puzzle‑solving, while they occasionally forget to clean up their crayons before bedtime.
background:
  cultural: Elizabeth is a Mexican‑American child raised in a bilingual household in Fort Worth, Texas. English and Spanish are spoken at home, and she participates in cultural traditions such as Día de
    los Muertos, Mexican Independence Day, and family gatherings featuring tacos, tamales, and other beloved dishes. She attends a local preschool that celebrates multicultural heritage, and she often joins
    community events at the neighborhood Mexican cultural center, where she learns folkloric dances and hears traditional stories. Her family emphasizes education, close family bonds, and preserving cultural
    heritage, which shape her everyday experiences and aspirations.
attributes:
  skills: '[''Reading simple picture books'', ''Counting and basic addition'', ''Drawing and coloring'', ''Basic Spanish conversational phrases'', ''Using tablets for educational apps'', ''Following multi‑step
