  hobbies: '[''Reading picture books'', ''Coloring and drawing'', ''Jigsaw puzzles'', ''Dancing to Mexican folk music'', ''Playground and backyard exploration'', ''Baking with family'', ''Singing Spanish
    nursery rhymes'']'
  career_goals: 'Elizabeth dreams of growing up to become a teacher who inspires young minds to love reading and science, or a veterinarian who cares for animals. She also imagines exploring space as an
    astronaut. Her goals blend curiosity with practicality: she wants to learn as much as she can now so she can help others in her community and stay connected to her cultural roots.'
