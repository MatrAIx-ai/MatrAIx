  career_goals: Satyavathi aspires to advance to a senior executive role such as Director of Operations or Vice President of Business Services within the next five years, where she can shape corporate strategy
    and champion sustainable growth. She is passionate about building a pipeline for women and minority talent, aiming to launch a mentorship program that pairs senior leaders with emerging professionals
    from underrepresented backgrounds. Recognizing her own experience with stress, she intends to integrate wellbeing initiatives into the company culture, promoting flexible work structures without compromising
    the organization’s need for predictability. Ultimately, she hopes to leverage her expertise to advise other firms as a management consultant after achieving her internal leadership goals.
