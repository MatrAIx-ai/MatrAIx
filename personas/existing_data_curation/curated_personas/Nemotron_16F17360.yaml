  hobbies: '[''watercolor painting'', ''reading biographies of artists and inventors'', ''bird-watching'', ''attending intimate poetry readings'', ''exploring new knitting techniques'', ''exploring new
    quilting techniques'', ''genealogy research'', ''gardening'']'
  career_goals: At this stage, Dana aims to compile an illustrated memoir of Ford City's mid-20th-century life, preserving personal anecdotes and photographs for future generations. She plans to curate
    a modest traveling exhibit of local folk art and historic photographs to share with schools and community centers. By mentoring a small group of high-school students in local-history projects, she hopes
    to inspire curiosity and critical thinking. Dana also aspires to establish a community garden that reflects her love for horticulture and provides a peaceful gathering space for neighbors.
