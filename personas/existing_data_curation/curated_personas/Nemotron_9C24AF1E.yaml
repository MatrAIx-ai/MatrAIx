personas:
  professional: Fernando Mastrapa, a 50-year-old cultural practitioner and conceptual artist, merges methodical grant-writing, bilingual scholarship, and precise project management with highly imaginative
    multimedia installations that fuse traditional bomba rhythms and digital art, thereby forging community-focused exhibitions that reflect his critical, competitive spirit and meticulous attention to
    detail.
  sports: Fernando Mastrapa, a lifelong fan of the Cangrejeros de Santurce baseball team and the Puerto Rico national basketball squad, plays casual tennis at the Loíza community club, maintains fitness
    through early-morning coastal jogs, yet his competitive streak sometimes leads to overexertion and missed recovery days.
  arts: Fernando Mastrapa, an abstract painter and street photographer, curates community murals inspired by the vibrancy of bomba legends like Rafael Cortijo and Ismael Rivera, showcases installations
    alongside works by Wifredo Lam and contemporary Puerto Rican multimedia artist Alexis Duran, and draws creative fuel from his vinyl collection featuring classic plena recordings and avant-garde composer
    John Zorn.
  travel: Fernando Mastrapa, an inquisitive traveler, has explored the historic streets of Old San Juan, photographed the street art of Miami’s Wynwood district, vacationed among the colonial charms of
    Cartagena, and dreams of a residency in Berlin’s Kreuzberg neighborhood and a cultural exchange in Kyoto’s Nishijin district, balancing his itineraries with modest budgets and a desire to document each
    journey through VR footage.
  culinary: Fernando Mastrapa, a self-taught cook, delights in crafting mofongo stuffed with garlic‑shrimp and plantain chips, perfects sofrito with recao, ají dulce, and culantro for a fragrant arroz con
    gandules, experiments with pastelón layered with ripe sweet plantains, and pairs his meals with a glass of aged Puerto Rican rum and a side of sweet guava paste.
  core: Fernando Mastrapa, a 50-year-old avant‑garde curator, channels relentless curiosity into bold multimedia projects while battling chronic worry, a penchant for hoarding pristine vintage vinyl, and
    a competitive edge that drives both his art and his financial strategies.
background:
  cultural: Fernando is a Puerto Rican native of Loíza, a municipality renowned for its Afro‑Puerto Rican heritage. He grew up immersed in the rhythms of bomba and plena, the vibrant colors of local festivals,
    and the oral histories that blend Spanish, African, and Taíno influences. His upbringing in a close‑knit community fostered a deep respect for cultural preservation, which he channels through his artistic
    and scholarly pursuits. Fluent in Spanish and proficient in English, he navigates both local traditions and broader academic discourses, bridging his personal experiences with the island's rich cultural
    tapestry.
attributes:
  skills: '[''Conceptual Art Development'', ''Art Curation'', ''Caribbean Art History Research'', ''Project Management'', ''Grant Writing'', ''Digital Illustration'', ''Street Photography'', ''Bilingual
    Communication (Spanish/English)'', ''Workshop Facilitation'', ''Critical Theory Analysis'']'
  hobbies: '[''Abstract Painting'', ''Street Photography'', ''Experimental Literature Reading'', ''Chess'', ''Bomba/Plena Music Listening'', ''Community Mural Volunteering'', ''Collecting Vintage Vinyl'',
    ''Meditation'', ''Creative Writing (Poetry)'', ''Cooking Traditional Puerto Rican Cuisine'', ''Exploring VR Art'']'
  career_goals: Fernando aims to re‑enter the cultural sector as a program director for a community arts center in Loíza, securing federal and private grants to sustain local heritage projects. He aspires
    to publish a monograph on Afro‑Puerto Rican visual traditions and to launch an independent collective that showcases experimental multimedia installations blending traditional bomba rhythms with digital
    art. Ultimately, he seeks national recognition for his curatorial work while establishing a lasting legacy that empowers emerging artists from under‑represented backgrounds.
