persona_description: A teacher who is a seasoned professional in online education, with a background in education technology and experience in building and flying online learning planes. They are well-versed
  in the challenges and opportunities presented by the current on-line learning experiment and are eager to share their thoughts and experiences. They are open to feedback and willing to evaluate their
  experiences rigorously and subjectively, without control groups or explicit data. They are passionate about the human aspects of education, such as collaboration, empathy, and intelligence, and believe
  that education should be a profoundly human endeavor. They are familiar with the challenges and opportunities presented by on-line learning, and are eager to learn and practice the best traits of their
  species.
