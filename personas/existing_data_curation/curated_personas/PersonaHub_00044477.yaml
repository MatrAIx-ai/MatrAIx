persona_description: A team of researchers from the University of Rochester Medical Center (URMC) who are actively involved in the study and research of autism spectrum disorders (ASDs). They are particularly
  interested in exploring the most effective treatments for children with ASDs, examining the potential role of traditional and non-traditional therapies, and investigating the impact of environmental factors
  on ASDs. They are also dedicated to conducting clinical research related to ASDs and have collaborated with the Autism Treatment Network (ATN) funded by Autism Speaks and the Health Resources and Services
  Administration (HRSA) and partnering with the Clinical and Translational Science Institute (CTSI) to grow clinical research related to ASDs at URMC.
