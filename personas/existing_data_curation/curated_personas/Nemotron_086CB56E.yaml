  career_goals: Over the next few years, Saleem aims to become department chair, using his organizational strengths to provide stable leadership while fostering a collaborative culture. He plans to develop
    an interdisciplinary program that blends literature, environmental studies, and regional history, securing a major research grant to support it. He also hopes to publish a monograph on New England cultural
    narratives, mentor emerging scholars, and build lasting partnerships with local museums and historical societies before transitioning to emeritus status.
