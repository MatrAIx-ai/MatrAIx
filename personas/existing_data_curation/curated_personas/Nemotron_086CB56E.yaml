  hobbies: '[''Hiking'', ''Local Theater'', ''Folk Guitar'', ''Reading Contemporary Fiction'', ''Book Club'', ''Historical Society Volunteering'', ''Gardening'', ''Craft Brewery Exploration'', ''Mindfulness
