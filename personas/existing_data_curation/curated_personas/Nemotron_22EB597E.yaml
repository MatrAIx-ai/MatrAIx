  hobbies: '[''Hiking'', ''Nature photography'', ''Journaling'', ''Knitting and crocheting'', ''Baking'', ''Reading YA fiction'', ''Listening to indie folk music'', ''Community gardening'', ''Board‑game
    nights'', ''Sketching'']'
  career_goals: Elizabeth plans to complete her GED within the next year and then pursue a part‑time position at the Boise Animal Shelter, aiming to become a certified veterinary assistant. She hopes to
    enroll in a community‑college animal‑health program to gain formal credentials, ultimately working in a clinic where she can combine her love for animals with her desire to help others. In parallel,
    she dreams of creating a small community garden that supplies fresh produce to a local food‑bank, blending her practical gardening skills with her commitment to community harmony. She values a stable,
    hands‑on career that offers a predictable schedule while still allowing flexibility for volunteer work and personal interests.
