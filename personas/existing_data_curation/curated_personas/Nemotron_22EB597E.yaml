personas:
  professional: Elizabeth Bourke, a 17‑year‑old aspiring veterinary assistant, blends hands‑on animal care at the Boise Animal Shelter with her commitment to community gardening, using her practical problem‑solving
    skills and cooperative nature to navigate the structured training she seeks while tolerating the occasional disorganization of her high‑school schedule.
  sports: Elizabeth Bourke stays active by hiking the Boise Foothills with the Boise Hikers’ Club, joins occasional weekend yoga sessions at the Riverstone Community Center, and roots for the Boise State
    Broncos football team while casually playing pickup soccer in the park each spring.
  arts: Elizabeth Bourke immerses herself in indie folk sounds from Sufjan Stevens and Iron & Wine while sketching in her journal, devours contemporary YA novels by authors such as Becky Albertalli, and
    channels her creativity into knitting scarves inspired by the muted palettes of Agnes Martin.
  travel: Elizabeth Bourke prefers low‑key, nature‑focused getaways, often planning spontaneous weekend hikes to Idaho’s Sawtooth Mountains or Oregon’s Crater Lake, while dreaming of a future backpacking
    trip through the Irish countryside to soak in its folk music heritage.
  culinary: Elizabeth Bourke, a budding home baker, loves whisking up chewy oatmeal‑raisin cookies and herb‑infused zucchini bread using fresh rosemary and thyme from her garden, while often pairing her
    creations with a steaming bowl of homemade tomato basil soup, and she happily experiments with seasonal veggie stir‑fries for dinner.
  core: Elizabeth Bourke, a 17‑year‑old garden‑loving, yarn‑obsessed aspiring veterinary assistant, balances a love for structured animal care with spontaneous hikes and occasional cookie‑baking meltdowns,
    all while keeping a notebook of doodles and a spare yarn ball in their backpack.
background:
  cultural: Elizabeth grew up in a predominantly White, middle‑class neighborhood in Boise, Idaho, immersed in the Pacific‑Northwest’s blend of self‑reliance and outdoor appreciation. Her family values
    community involvement, volunteerism, and a modest, practical lifestyle that emphasizes environmental stewardship and local traditions. Idaho’s strong connection to nature, seasonal festivals, and a
    close‑knit community network have shaped her outlook, providing a cultural backdrop of independence, cooperation, and a respect for the land.
