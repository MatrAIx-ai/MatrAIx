personas:
  professional: Teresa Sanders, a budding robotics enthusiast and digital illustrator, leverages her curiosity and practical problem‑solving to design award‑winning school robots while also creating eye‑catching
    social‑media graphics that showcase their competitive drive.
  sports: Teresa Sanders channels her love of the outdoors into regular hikes on the Sacramento River Trail and competes in her school’s cross‑country team, while cheering for the Sacramento Kings and following
    the San Francisco 49ers, balancing structured training with spontaneous weekend runs.
  arts: Teresa Sanders strums acoustic guitar to the folk stylings of John Mayer, crafts digital illustrations inspired by the vibrant palettes of Studio Ghibli, and devours sci‑fi novels by Becky Chambers,
    letting these artistic influences shape their identity and downtime.
  travel: Teresa Sanders prefers solo weekend getaways to nearby nature spots like Yosemite National Park and the Redwoods, while dreaming of a cultural immersion trip to Kyoto, Japan, planning trips with
    meticulous Google Maps itineraries yet leaving room for impromptu detours when they feel the urge for adventure.
  culinary: Teresa Sanders enjoys whipping up protein‑packed quinoa bowls with roasted sweet potatoes and kale, perfecting a signature trail‑mix granola bar recipe, but often resorts to instant ramen when
    homework piles up, revealing a mix of budding culinary confidence and teenage convenience cravings.
  core: Teresa Sanders blends competitive curiosity with practical creativity, thriving on solo hikes, robot challenges, and guitar chords while habitually juggling schoolwork with a penchant for neglecting
    dental floss.
background:
  cultural: Teresa comes from a white, middle‑class family with roots in the Pacific Northwest and the Midwest. Growing up in Sacramento, she has been exposed to a blend of suburban Californian culture
    and the city's diverse community. Her family emphasizes education, community service, and outdoor recreation, influencing her practical outlook, curiosity about technology, and appreciation for the
    natural environment.
