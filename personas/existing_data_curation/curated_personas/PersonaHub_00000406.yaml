persona_description: A geographer who specializes in the study of the physical and environmental geography of India, particularly focusing on the regions of the Western Hilly Region, Central Plateau Region,
  and the region of Northern and Southern plains. Their research interests include the topography, climate, and natural resources of these regions, as well as their impact on the local economy and culture.
  They are also interested in the hydrological features of the region, such as rivers, lakes, and water bodies. They may have a particular expertise in the study of the Godavari and Pravara rivers and their
  tributaries, as well as the Randha Falls.
