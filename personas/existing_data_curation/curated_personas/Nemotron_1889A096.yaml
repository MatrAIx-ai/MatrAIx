  hobbies: '["truck restoration", "fishing", "vegetable gardening", "watching classic Western movies", "fantasy football", "darts"]'
  career_goals: Approaching retirement, James aims to secure a stable supervisory role where he can oversee a small team of material handlers, using his competitive drive to improve warehouse throughput
    while keeping safety standards high. He is also pursuing a formal OSHA certification to strengthen his qualifications and hopes to transition into a part‑time consulting position for local logistics
    firms, offering practical advice on process efficiency and equipment upkeep. Ultimately, he seeks a reliable pension and supplemental income that will support his independent lifestyle and modest hobbies.
