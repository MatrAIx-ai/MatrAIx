personas:
  professional: Minhchau Nguyen is a budding junior architect who spends preschool days building block towers, applying a methodical, organized approach to design, and displaying an early knack for planning
    and following through on construction projects.
  sports: Minhchau Nguyen enjoys toddler soccer with the Little Kickers club, practices twice weekly at the community center, roots for Orlando City SC in MLS, and occasionally watches Orlando Magic NBA
    games with family.
  arts: Minhchau Nguyen loves drawing colourful dinosaurs, delights in watching Pixar's Turning Red, sings along to Disney's Frozen soundtrack, and collects stickers of Rowlf the Dog, finding joy in the
    vibrant visual storytelling of classic cartoons.
  travel: Minhchau Nguyen enjoys short weekend road trips to Clearwater Beach, loves the structured itinerary of Disney World, and dreams of seeing lanterns glow at the local Lunar New Year parade.
  culinary: Minhchau Nguyen prefers the familiar comfort of chicken noodle soup for breakfast, helps stir the aromatic broth when parents make pho, delights in rolling spring rolls with rice paper and shrimp,
    and often requests crunchy carrot sticks with hummus as a healthy snack.
  core: Minhchau Nguyen is a four‑year‑old who thrives on order, cherishes a tiny piggy bank, and builds block castles with the precision of a miniature city planner.
background:
  cultural: Minhchau is a Vietnamese‑American raised in Orlando, Florida. His parents immigrated from Vietnam and maintain a bilingual household, speaking both Vietnamese and English. The family observes
    traditional Vietnamese customs such as celebrating Tet (Lunar New Year), preparing dishes like pho and spring rolls, and showing respect for elders. They participate in the local Vietnamese community
    center and attend cultural festivals, blending these heritage practices with the broader American environment of Orlando.
attributes:
  skills: '[''Following daily routines'', ''Sorting objects by size and color'', ''Counting up to ten'', ''Letter recognition (A‑Z)'', ''Bilingual communication (English and Vietnamese)'', ''Simple puzzle
    assembly'', ''Organizing toys'', ''Memorizing short song verses'', ''Cooperative play in small groups'']'
  hobbies: '[''Puzzle solving'', ''Duplo building'', ''Drawing and coloring'', ''Listening to picture books'', ''Singing nursery rhymes'', ''Guided pretend play with small groups'', ''Helping in the kitchen'',
    ''Participating in Tet celebrations'', ''Observing fish at the aquarium'', ''Short nature walks'']'
  career_goals: He often imagines himself as a teacher or librarian who keeps books and activities organized while helping friends learn. He likes the idea of creating a calm, orderly environment where
    everyone feels safe and supported. In the future, he hopes to work in a role that blends caring for others with maintaining structure, such as a teacher, librarian, or pediatric nurse.
