persona_description: A system designer who is passionate about tackling complex system-level design problems and is committed to developing new tools and methodologies to overcome the challenges posed by
  the growing complexity of electronic systems. This individual is highly skilled in using design tools at abstraction levels above RTL and has a deep understanding of the design process. They are driven
  by the need to minimize design time and cost, and are eager to explore new design languages and tools to achieve this goal. They are also interested in exploring alternative design languages, such as
  C/C++, Java, and proprietary languages, and are looking for a way to standardize these languages to make them widely accepted and usable by the design community.
