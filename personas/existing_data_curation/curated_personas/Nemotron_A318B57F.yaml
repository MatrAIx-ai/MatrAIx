  hobbies: '["drawing with crayons", "building block towers", "listening to children''s songs", "dancing", "outdoor backyard exploration", "reading picture books", "arranging stuffed animals into scenes"]'
  career_goals: She frequently declares she wants to become an artist who paints big pictures of the sky, an astronaut who travels to the stars, or a teacher who tells stories to other children. Her ambition
    is guided by her fascination with novelty, abstract ideas, and her methodical learning style, driving her to imagine future roles that blend creativity and exploration.
