personas:
  professional: A budding junior scientist, Ruby Young, channels her vivid imagination and intellectual curiosity into methodical block experiments, daily “research” sessions with magnifying glasses, and
    carefully planned play schedules that she insists on following, turning the preschool classroom into a tiny laboratory.
  sports: A tiny soccer enthusiast, Ruby Young, proudly dons the jersey of the local “Kiddie Kickers” club, schedules weekly backyard dribble drills with the precision of a tiny coach, enjoys cheering for
    the Seattle Seahawks on game days, yet assertively claims the front spot on the swing set, balancing cooperative play with a splash of independence.
  arts: An imaginative little artist, Ruby Young, fills sketchbooks with abstract crayon swirls of galaxies, sings enthusiastically to “Baby Shark” and “Let It Go,” idolizes the playful animation of Walt
    Disney, and meticulously plans her art sessions with a tiny timer she set herself, showcasing both creative flair and methodical organization.
  travel: A curious junior traveler, Ruby Young, delights in family road trips to the nearby botanical garden and the sunny boardwalk of Santa Monica, carries a miniature map she stamps with colorful stickers
    after each stop, dreams of exploring Disney World’s kingdoms, and balances her excitement with occasional cranky moments when trips are delayed.
  culinary: A selective yet adventurous eater, Ruby Young, adores cheesy macaroni, strawberry‑banana smoothies, and assembles tiny fruit kebabs with grapes and melon cubes, meticulously lines up her favorite
    dishes on a plastic plate, but stubbornly refuses broccoli, declaring it “green monster stuff,” and occasionally sneaks a cookie when no one watches.
  core: Ruby Young, a three‑year‑old bundle of imagination, methodical play, and tiny ambitions, balances curiosity with organization while navigating a world of crayons, coins, and kid‑size adventures.
background:
  cultural: Ruby is being raised in a white, middle-class family in Lubbock, Texas. Her family participates in local traditions such as county fairs, visiting nearby farms, and attending community church
    events, while also exposing her to diverse experiences through preschool story times and library programs that celebrate a variety of cultures. The West Texas environment, with its open plains and close-knit
    community, shapes her friendly, modest demeanor and appreciation for outdoor play.
