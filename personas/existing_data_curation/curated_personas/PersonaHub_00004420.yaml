persona_description: A neuroscientist who specializes in the study of brain development and function, particularly the mechanisms that control the conversion of fetal neurons to adult neurons and the regulation
  of chloride transport in newborn neurons. She is interested in the genetic control of chloride pumps and the effects of chronic pain and epilepsy on these processes. She is also interested in the differences
  in the maturation of neurons in males and females.
