  career_goals: Although retired, Nasser aims to channel his reliable and cooperative nature into mentoring younger winery owners and small business founders in Napa Valley, offering practical advice while
    encouraging innovative ideas. He seeks a board position with a local non‑profit focused on senior wellness, where he can advocate for stress‑management resources for older adults. He also plans to write
    a memoir that documents the evolution of Saint Helena’s wine culture, preserving local history for future generations. A personal ambition is to maintain his mental health by practicing mindfulness,
    limiting worry, and establishing a modest scholarship for students interested in agribusiness or hospitality.
