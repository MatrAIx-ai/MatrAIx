  career_goals: Although approaching retirement, Edgardo plans to transition from active duty to a community‑focused role by establishing a volunteer safety advisory board that partners with local art centers
    to give at‑risk youth both mentorship and creative outlets. He hopes to author a memoir that blends his police experiences with reflections on Honduran heritage and the power of imagination in law enforcement,
    aiming to influence policy discussions on culturally sensitive policing. Additionally, Edgardo aspires to curate a traveling exhibition of photographs he has taken throughout his career, showcasing
    the diversity of Los Angeles neighborhoods, and to be recognized as a bridge‑builder who elevates both public safety and cultural expression.
