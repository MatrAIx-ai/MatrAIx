persona_description: A cryptographer or a security researcher who is interested in understanding the underlying principles and techniques of block ciphers, specifically the Fast Encryption Algorithm for
  Multimedia (FEA-M). This individual is likely to be familiar with the large block size of 4096 bits and the use of 64×64 binary matrices for encryption, as well as the concept of session keys and the
  need for an invertible matrix for the key. The person is also likely to have an interest in vulnerabilities and improvements of FEA-M, and may have a particular interest in the use of invertible matrices
  for the key.
