  hobbies: '[''Reading historical nonfiction'', ''Cooking Gulf‑coast seafood'', ''Gardening'', ''Sailing'', ''Bird‑watching'', ''Volunteer work at animal shelter'', ''Photography'', ''Yoga'', ''Road trips'',
    ''Attending local art festivals'']'
  career_goals: Irene aims to transition her business acumen into a part‑time consultancy role for local startups and non‑profits, while also serving on a community board focused on environmental conservation.
    She hopes to launch a small home‑based venture selling handmade garden accessories and to mentor younger women entrepreneurs in the Pensacola area. Ultimately, she wants to maintain financial independence,
    deepen her community impact, and have the freedom to travel and explore new interests without a full‑time job.
