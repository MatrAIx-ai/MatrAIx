personas:
  professional: Jantavia Zaman, a 32‑year‑old construction specialist with hands‑on concrete mixing, forklift operation and blueprint reading, channels their curiosity for sustainable design and artistic
    eye into leading crew‑level projects that blend green building practices with aesthetic touches, eyeing a forewoman role within three years.
  sports: Jantavia Zaman roots for the Detroit Lions and the Detroit Pistons, runs with the Motor City Trail Club on Saturday mornings, and they treat tending a small balcony garden as a low‑impact fitness
    routine that balances the high‑energy bursts of weekend hikes on the Huron River trail.
  arts: Jantavia Zaman immerses themselves in Detroit’s vibrant art scene, often sketching watercolors after viewing a mural by local artist Maya Basrur, volunteering on community mural projects that blend
    urban narratives with sustainable themes, and letting loose by dancing to Bhangra hits from the legendary band Dhol Batti at cultural festivals.
  travel: Jantavia Zaman prefers short, budget‑friendly road trips to nearby nature spots like Hocking Hills and Sleeping Bear Dunes, where they find solitude for reflection, while day‑dreaming about a
    future solo trek through the Canadian Rockies to capture rugged landscapes for their art.
  culinary: Jantavia Zaman whips up fragrant chicken biryani, spiced lentil dal, buttery naan and fresh cucumber raita for family gatherings, often seasoning with cilantro and mint harvested from their
    balcony garden, and occasionally experiments with a fusion twist by adding locally sourced Michigan blueberries to a mango lassi.
  core: Jantavia Zaman balances hard‑hat safety checks with watercolor brushstrokes, starts their mornings with yoga, can’t resist a spontaneous Bhangra dance when a beat drops on site, and meticulously
    budgets every dollar toward launching their own green‑building, art‑focused contracting firm.
background:
  cultural: Jantavia is the daughter of Bangladeshi immigrants who settled in the Detroit metro area in the early 1990s. Raised in a bilingual household, she speaks English fluently and retains conversational
    Bangla, celebrating both Eid and Diwali with her extended family. The household emphasized respect for elders, hospitality, and a strong work ethic, values she carries into her professional life. While
    she embraces Midwestern American customs—such as a love for automotive museums and local sports—she also stays connected to South Asian traditions through food, music, and community gatherings at the
    regional cultural centre. This blend of heritage and local culture shapes her identity, fostering a perspective that values both communal harmony and individual curiosity.
