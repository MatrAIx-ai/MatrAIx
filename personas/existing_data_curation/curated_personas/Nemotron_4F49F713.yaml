  career_goals: Jantavia aims to advance from laborer to a site supervisor or forewoman within the next three years, pursuing a construction‑management certification and the OSHA 30‑hour safety trainer
    course. She hopes to specialize in green building projects and eventually launch a small contracting firm that blends affordable housing with community art installations. Mentoring other women entering
    the trades and fostering inclusive work environments are also central to her long‑term professional vision.
