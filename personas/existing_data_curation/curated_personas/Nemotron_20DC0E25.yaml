  career_goals: Tina aims to transition from a skilled tradesperson to the owner of her own painting and paper‑hanging business within the next two to three years. She plans to obtain a contractor’s license
    and expand her service offerings to include eco‑friendly, low‑VOC painting solutions for both residential and small commercial clients. Leveraging her curiosity for new techniques, she hopes to become
    a trusted provider of high‑quality finishes while mentoring apprentices to build a reliable team. Long‑term, Tina envisions a reputable, family‑friendly company known for punctuality, craftsmanship,
    and community involvement, allowing her to achieve a stable income and a healthier work‑life balance for her family.
