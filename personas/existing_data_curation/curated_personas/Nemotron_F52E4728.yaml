  hobbies: '[''Gallery and Museum Visits'', ''Attending Multicultural Festivals'', ''Street Photography'', ''Reading Literary Fiction & Poetry'', ''Creative Writing & Journaling'', ''Cooking International
    Dishes'', ''Yoga and Guided Meditation'', ''Balcony Gardening'', ''Book Club Participation'']'
  career_goals: Hiyam aims to channel her lifelong curiosity and artistic knowledge into tangible community impact. She aspires to curate a neighborhood art exhibition that highlights underrepresented voices
    from Jackson Heights, and to write and self‑publish a memoir that intertwines her personal journey with reflections on art. She wishes to develop a regular series of free art workshops for seniors and
    recent immigrants, fostering cross‑cultural dialogue. Volunteering as a docent at the Queens Museum is a stepping stone toward a part‑time role coordinating educational programs. Ultimately, she seeks
    to structure her creative practice in a way that supports personal resilience and reduces stress, while leaving a lasting cultural legacy in her community.
