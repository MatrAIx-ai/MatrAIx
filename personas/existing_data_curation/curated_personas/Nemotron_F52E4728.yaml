personas:
  professional: A community‑focused art curator and volunteer docent, Hiyam Koch leverages deep knowledge of Western art history and a keen eye for outsider art to design inclusive exhibitions, using their
    empathy and occasional assertiveness to mentor emerging artists while navigating spontaneous project ideas and occasional deadline slip‑ups.
  sports: A casual fitness enthusiast, Hiyam Koch joins the Queens Senior Walking Club for weekly strolls through Flushing Meadows, watches the New York Knicks and Yankees on game nights, and dabbles in
    pick‑up tennis at the local courts when the weather permits.
  arts: An avid patron of avant‑garde installations, Hiyam Koch immerses themselves in MoMA exhibitions, draws inspiration from artists like Frida Kahlo, Ai Weiwei, and Jean‑Michel Basquiat, and channels
    those impressions into poetry, memoir drafts, and community photography workshops.
  travel: A culturally curious traveler, Hiyam Koch has explored Oaxaca’s culinary markets, Chiang Mai’s temple festivals, and Medellín’s street‑art scene, and now yearns to wander Lisbon’s historic neighborhoods
    and Kyoto’s zen gardens, typically crafting loose itineraries that leave room for spontaneous detours.
  culinary: A culinary explorer, Hiyam Koch mixes turmeric‑laden Indian curries, fragrant Colombian ajiaco, and bright Thai tom yum, often harvesting basil and cilantro from their balcony garden to garnish
    dishes while occasionally indulging in a late‑night slice of New York‑style pizza.
  core: A perpetually curious 57‑year‑old curator, Hiyam Koch balances spontaneous art projects with chronic worry, a thriving balcony herb garden, and an ever‑growing archive of multicultural festival
    photographs.
background:
  cultural: Hiyam is a white American of German‑Irish ancestry, born and raised in the Northeastern United States. After completing her BA in the humanities, she settled in Jackson Heights, Queens, a neighborhood
    celebrated for its cultural mosaic. Living amidst South Asian, Latin American, East Asian, and other immigrant communities has profoundly shaped her worldview. She embraces the neighborhood’s diversity
    by learning conversational Spanish, participating in cultural festivals, and incorporating culinary and artistic influences from her neighbors into her daily life. While her ethnic heritage is European,
    her identity is deeply interwoven with the multicultural fabric of Queens, reflecting an open, inclusive, and exploratory cultural orientation.
