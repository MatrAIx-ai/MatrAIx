persona_description: A healthcare professional who has conducted research on the effectiveness of different strategies for increasing adherence to antiretroviral therapy (DOT) and has published several
  studies on the use of modified DOT in HIV-positive people with tuberculosis (TB). They have experience in implementing DOT in residential AIDS treatment facilities and have found that modified DOT can
  lead to better adherence and awareness of medication side effects in patients with TB. They are also familiar with the potential cost savings and success of DOT in resource-poor settings compared to other
  treatment options.
