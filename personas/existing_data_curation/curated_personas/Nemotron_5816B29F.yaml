    solving'']'
  hobbies: '[''Cooking traditional and modern Cuban dishes'', ''Listening to salsa, son, and timba'', ''Competitive online gaming (e.g., strategic shooters)'', ''Personal journaling and sketching urban
    landscapes'', ''Photography of local festivals and street scenes'', ''Collecting vintage Cuban vinyl records'', ''Volunteering at small community cultural events'']'
  career_goals: Julia aims to complete her GED within the next two years and enroll in a culinary arts program that blends classic Cuban cuisine with contemporary techniques. She envisions opening a modest
    pop‑up kitchen or food truck that showcases modern Cuban dishes while telling the cultural story behind each recipe. Simultaneously, she plans to hone her video editing skills to launch a YouTube channel
    dedicated to cooking tutorials, cultural insights, and lifestyle vlogs, eventually monetizing the platform and securing a role as a digital media assistant for a local community organization. Her long‑term
    ambition is to combine culinary expertise with digital storytelling to celebrate her heritage and achieve financial independence.
