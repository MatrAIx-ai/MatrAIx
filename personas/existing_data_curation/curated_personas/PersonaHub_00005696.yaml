persona_description: A Chinese medicine practitioner who specializes in the treatment of respiratory and upper respiratory tract infections, with a particular focus on the use of Sang Ju Yin and its ingredients.
  They are experienced in the use of herbal decoctions and pills, and are knowledgeable in the bidirectional regulation of lung qi. They are cautious in their use of the medicine, considering its side effects
  and contraindications, and recommend taking it for a short period of time. They are also aware of the potential risks associated with the use of herbal decoctions, and advise caution when taking it with
  alcohol, smoking, or spicy or greasy foods.
