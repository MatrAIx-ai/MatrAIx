  hobbies: '["Watercolor painting", "Visiting art galleries and museums", "Reading about contemporary art and philosophy", "Cooking traditional and experimental Mexican cuisine", "Gardening and horticulture",
    "Walking trails in Kent County parks", "Volunteering at community cultural events", "Participating in local cultural festivals"]'
  career_goals: Magali aims to formalize her lifelong learning by obtaining a GED within the next year, which would open doors to part‑time volunteer or entry‑level positions at the local community center
    or art museum. She envisions leading art‑related workshops that celebrate Mexican heritage and contemporary artistic expression, thereby fostering cross‑cultural dialogue. In the longer term, she hopes
    to launch a small home‑based business selling handmade crafts and specialty foods, leveraging her culinary and artistic talents while also mentoring other women in the community who share similar backgrounds.
