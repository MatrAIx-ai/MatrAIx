  career_goals: Shawn aspires to become an aerospace engineer or astronaut, inspired by the nearby Kennedy Space Center and his fascination with space exploration. He aims to excel in math and science throughout
    middle and high school, join STEM competitions, and eventually study engineering at a university with a strong aerospace program. He also dreams of contributing to environmental projects that protect
    Florida’s coastal ecosystems, combining his practical mindset with his desire to help others. He plans to develop strong technical skills, such as advanced programming and robotics, and hopes to mentor
    younger students in a future community outreach role.
