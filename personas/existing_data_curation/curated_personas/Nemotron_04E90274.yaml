personas:
  professional: Shawn Childers, an 11‑year‑old member of the school robotics club, designs and programs simple robots with a methodical, curiosity‑driven approach that mirrors their meticulous LEGO Technic
    builds and Minecraft architecture.
  sports: Shawn Childers enjoys weekend bike rides with a close circle of friends to the nearby park, follows the local junior soccer team, the Riverdale Rovers, and cheers for the regional professional
    baseball team, the Springfield Sluggers, while occasionally joining school track practice for short sprints.
  arts: Shawn Childers channels imagination into hand‑drawn comic strips inspired by the storytelling of Stan Lee and the animation style of Hayao Miyazaki, while listening to the music of Imagine Dragons
    and admiring the visual art of modern graphic novelists such as Becky Carter.
  travel: Shawn Childers has explored the Grand Canyon on a family road trip, visited the Monterey Bay Aquarium to study marine life, and dreams of a future visit to the Kennedy Space Center and the Great
    Barrier Reef, preferring structured itineraries over spontaneous travel.
  culinary: Shawn Childers prefers straightforward meals like cheese pizza and spaghetti with tomato sauce, enjoys assembling simple snacks such as peanut butter‑banana wraps, and occasionally experiments
    with baking chocolate chip cookies, relishing the aroma of fresh‑baked goods and the crunch of sea‑salted pretzels.
  core: Shawn Childers is an organized, curiosity‑driven 11‑year‑old who balances methodical building projects with quiet stargazing, insect collecting, and comic sketching, while occasionally hoarding
    shells and struggling to share favorite LEGO sets.
background:
  cultural: Shawn is a White American growing up in Palm Bay, a suburban community on Florida’s Space Coast. He experiences a middle‑class Southern‑Florida lifestyle, attending a public elementary school,
    celebrating holidays like Thanksgiving, Christmas, and the Fourth of July, and participating in community events such as local fairs and beach outings. His family frequently visits the Kennedy Space
    Center and nearby beaches, fostering an appreciation for space exploration and marine environments. He is raised with typical American cultural values of independence, teamwork, and respect for nature,
    while also being exposed to the diverse tourism and multicultural atmosphere of the region.
attributes:
  skills: '["Reading comprehension", "Basic Scratch programming", "LEGO model building", "Organizational planning", "Basic science experimentation", "Math problem solving", "Sketching/drawing"]'
