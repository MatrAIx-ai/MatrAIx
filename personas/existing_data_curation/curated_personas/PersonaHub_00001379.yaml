persona_description: A historian who is fascinated by the history of the early American colonies, particularly the period between 1600 and 1700. This person is deeply interested in the details of the Jamestown
  colony and the events that occurred there, including the discovery of cannibalism and the ways in which the settlers tried to survive during the worst drought in 800 years. This person is also interested
  in the broader context of early American history, including the role of religion, politics, and social structures in shaping the development of the colonies.
