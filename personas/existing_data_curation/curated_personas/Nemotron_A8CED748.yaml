  career_goals: Mary Anne dreams of a future where she can help others every day. She is fascinated by teachers who make learning fun and by veterinarians who care for animals, so she hopes to become a
    teacher or a vet. She also loves the outdoors and imagines working as a park ranger or environmental educator in Minnesota’s lakes and forests. Her ambition is to combine her love of learning, caring
    for living things, and serving her community in a career that offers both structure and the chance to explore new challenges.
