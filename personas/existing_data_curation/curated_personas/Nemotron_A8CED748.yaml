personas:
  professional: Mary Eagle is a budding wildlife storyteller and aspiring environmental journalist, blending her love for adventure books, lake paintings, and Girl Scout badge projects into a future career
    focused on raising awareness about Minnesota’s natural habitats.
  sports: Mary Eagle dominates the U10 level of the Minnesota Thunder Soccer Academy, cheers for the Minnesota Twins when not on the field, and balances vigorous after‑school matches with weekend hikes
    on the Grand Rounds trail, all while keeping a colorful set of shin guards as lucky charms.
  arts: Mary Eagle channels imagination into sketching cartoon characters inspired by Dr. Seuss and classic Disney animations, while their serene watercolour renditions of Lake Minnetonka echo the calm
    hues of Monet, and they spend Thursday evenings improvising piano pieces that echo the playful motifs of Mozart.
  travel: Mary Eagle prefers family road trips that blend structured itineraries—like a day‑long exploration of the Boundary Waters Canoe Area—with spontaneous pit stops at local corn mazes, and dreams
    of backpacking along Norway’s fjord trails after mastering map‑reading with Girl Scouts.
  culinary: Mary Eagle delights in baking chocolate chip cookies with Mom, perfecting the crisp edges and chewy centers, adds a pinch of sea salt to their grandma’s apple pie, and experiments with simple
    skillet fried fish while keeping a stack of colorful aprons for every cooking session.
  core: Mary Eagle is a structure‑loving yet spontaneously creative 10‑year‑old who balances soccer, sketching, and cookie‑baking with a habit of over‑packing their backpack with extra glitter pens, often
    leaving a trail of colored footprints in their wake.
background:
  cultural: Mary Anne was born and raised in Clara City, a small town in Chippewa County, Minnesota. Her family’s heritage is rooted in the Midwestern tradition of German and Scandinavian ancestry, reflected
    in holiday foods, folk music, and an emphasis on community togetherness. Growing up in a rural setting, she has been immersed in the Minnesota nice ethic—politeness, cooperation, and a strong sense
    of helping neighbors. She attends a local public elementary school, participates in church gatherings, and celebrates regional events such as the county fair and ice‑fishing season. While she is white,
    her upbringing includes an awareness of the area's Chippewa (Ojibwe) history, and she has learned to respect the local indigenous heritage through school lessons and community storytelling.
