  hobbies: '[''Visiting art galleries and museums'', ''Digital photography'', ''Community theater acting'', ''Backyard gardening'', ''Cooking experimental dishes'', ''Hosting dinner parties'', ''Weekly
    book club'', ''Volunteering at science museum'', ''Yoga and mindfulness practice'', ''Traveling to cultural festivals'', ''Blogging about science‑art intersection'']'
  career_goals: Although not currently employed, Mary aspires to channel her curiosity into a part‑time role that bridges science and the arts. She aims to launch a community‑focused outreach program that
    offers hands‑on workshops—ranging from scientific illustration to citizen‑science gardening projects—for elementary schools in St. Charles County. She also plans to obtain a certificate in museum education
    to volunteer as a docent and workshop facilitator at the St. Louis Science Center. In the longer term, she hopes to publish a series of illustrated articles that make complex scientific concepts accessible
    to a general audience, and possibly turn her illustrations into a modest freelance business.
