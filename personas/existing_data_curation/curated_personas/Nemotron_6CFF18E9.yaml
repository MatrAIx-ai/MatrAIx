  hobbies: '[''watercolor painting'', ''quilting'', ''herb gardening'', ''cooking'', ''reading historical fiction'', ''listening to jazz and gospel music'', ''playing bridge'', ''attending art exhibitions'',
    ''volunteering at senior center'', ''leading storytelling workshops'']'
  career_goals: 'Kia’s current ambitions focus on legacy and mentorship: she plans to mentor her grandchildren and local high‑school students, sharing family stories, recipes, and craft techniques; she
    intends to compile a memoir and a cookbook that document her life and cultural heritage; she also hopes to curate an intergenerational art exhibition at the Knightdale community center and to establish
    a modest scholarship for students pursuing arts or humanities, ensuring her competitive drive leaves a lasting positive impact.'
