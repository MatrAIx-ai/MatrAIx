personas:
  professional: Kia Jackson, an 85‑year‑old community event architect and Southern‑style culinary storyteller, leverages meticulous organization, an outgoing presence, and a competitive edge to flawlessly
    coordinate intergenerational art exhibitions, volunteer mentoring programs, and local heritage celebrations, ensuring every detail from volunteer schedules to recipe cards aligns with her high standards.
  sports: Kia Jackson, an 85‑year‑old avid walker, joins the Knightdale senior walking club for daily sunrise strolls, follows the Charlotte Hornets and Carolina Panthers with seasonal enthusiasm, and enjoys
    low‑impact pickleball sessions at the community center, valuing gentle exercise over competitive sports.
  arts: Kia Jackson, a lifelong lover of the arts, paints watercolor landscapes inspired by Monet and Winslow Homer, quilts intricate patterns that echo both traditional Southern motifs and modern abstract
    designs, attends gallery openings featuring artists like Hannah Sharp, and immerses herself in the sounds of Ella Fitzgerald, John Coltrane, Mahalia Jackson, and B.B. King, letting these creative currents
    shape her daily rhythm.
  travel: Kia Jackson prefers thoughtfully planned, small‑group tours that balance cultural immersion with comfort, having already explored historic Savannah, the jazz‑laden streets of New Orleans, and
    the art museums of Paris, while still dreaming of a leisurely river cruise through the Scottish Highlands, all while coordinating travel around her volunteer schedule and her grandchildren’s school
    calendar.
  culinary: Kia Jackson, an accomplished Southern chef, expertly blends family staples like shrimp and grits, collard greens with smoked turkey, and sweet potato casserole with experimental twists such
    as basil‑infused barbecue glaze, relishes sourcing fresh rosemary, thyme, and heirloom tomatoes from her herb garden, and enjoys hosting intimate dinner parties where she pairs each dish with a curated
    playlist of blues and gospel.
  core: Kia Jackson, an 85‑year‑old energetic storyteller and meticulous planner, channels her boundless curiosity, competitive spirit, and calm resilience into vibrant art, soulful cooking, and community
    mentorship, even if she occasionally hoards extra quilting supplies and forgets to pay a utility bill on time.
background:
  cultural: Born and raised in the African‑American community of the Raleigh‑Durham area during the 1950s and 60s, Kia grew up amid the civil‑rights movement, church fellowship, and strong family ties.
    Her grandparents migrated from the rural South, bringing rich culinary traditions, gospel music, and oral storytelling that shaped her worldview. In Knightdale, she remains active in her local Black
    church, participates in Juneteenth celebrations and cultural festivals, and honors Southern hospitality and resilience through community service, cooking, and the arts.
