  career_goals: Jerry envisions a future where he can combine his love for art, people, and helping others. He dreams of becoming a creative professional—such as a graphic designer, illustrator, or museum
    curator—where he can create visual experiences that inspire and educate. He also feels drawn to roles that support community well‑being, like a youth program director or a school counselor, because
    he wants to use his empathy to make a positive impact. In the short term, he aims to join his middle‑school art club, enter local drawing contests, and develop more advanced coding projects that blend
    storytelling with visual art.
