personas:
  professional: Jerry Campione is a budding digital storyteller who blends cartoon sketches with Scratch animations, thrives on school debate challenges, and meticulously plans each project, reflecting
    their organized curiosity and sociable flair.
  sports: Jerry Campione is an enthusiastic soccer player for the Clermont Youth Soccer Club who also follows Orlando City SC, spends weekends hiking around Lake Minnehaha for cardio, and approaches fitness
    with a playful, community‑focused mindset.
  arts: Jerry Campione is a passionate comic‑book fan who fills a sketchbook with cartoons, draws inspiration from creators like Stan Lee and Bill Watterson, regularly visits the Clermont Art Spring festival,
    and swaps fan art with friends at school, channeling their vivid imagination into social connections.
  travel: Jerry Campione is an adventurous family traveler who loves weekend road trips to Walt Disney World and the beaches of Clearwater, plans day‑long hikes around Lake Minnehaha with a detailed map,
    and balances a modest allowance with parental approvals to explore new destinations like Washington, D.C.
  culinary: Jerry Campione is a budding home chef who enjoys making mango‑salsa on toasted baguette slices, whipping up peanut‑butter‑banana smoothies, and mastering the perfect grilled cheese, using fresh
    Florida mangoes, ripe bananas, and whole‑grain bread as staple ingredients.
  core: Jerry Campione is a talkative, worry‑prone 11‑year‑old whose boundless curiosity fuels a love for sketching, coding, soccer, and community service, while their meticulous nature often clashes with
    bouts of stress.
background:
  cultural: Jerry was raised in the suburban community of Clermont, Florida, a region known for its family‑centric neighborhoods and abundant outdoor spaces near lakes and parks. His household reflects
    a mainstream middle‑class American upbringing with strong ties to community and church activities; his family attends a local Baptist congregation that emphasizes service and togetherness. He has been
    immersed in the cultural mix of Central Florida, where seasonal festivals celebrate both local traditions and the diverse Hispanic influences of the broader state. Growing up, he has participated in
    the Clermont Art Spring festival, local farmers’ markets, and school‑sponsored community service events, which have reinforced values of cooperation, creativity, and civic responsibility.
