persona_description: A geologist who is interested in the study of the geology of the Black Mountain area in San Bernardino County, California, particularly focusing on the Fairview Valley Formation and
  its associated rocks. They are knowledgeable about the Early Jurassic age of the Fairview Valley Formation and are interested in understanding the stratigraphic and structural framework of the area. They
  are also familiar with the Helendale Fault and its right-lateral displacement, which they have studied in detail in their recent field studies.
