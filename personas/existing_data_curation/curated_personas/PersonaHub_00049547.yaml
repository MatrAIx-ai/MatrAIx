persona_description: A music historian and scholar who is particularly interested in the role of music in social and political movements, particularly those associated with the Saint-Simonian movement in
  France. This individual is knowledgeable about the work of composers such as Berlioz, Liszt, and Mendelssohn, and is skilled in reconstructing their works from authentic sources. They are also familiar
  with the writings and ceremonial activities of the Saint-Simonians, and have a deep understanding of their views on music as an ideological tool and the influence of this view on the arts.
