persona_description: A food scientist and nutritionist who advocates for the use of locally grown and diverse foods in promoting healthy diets and reducing the burden of non-communicable diseases in regions
  affected by lifestyle diseases. She is passionate about the potential of crop diversity to make a difference and has dedicated her efforts to promoting the use of local foods in the Island Food Community
  of Pohnpei, which has won the World Food Prize for its efforts in reducing the burden of chronic disease. She is also interested in the use of crop genetic diversity to improve livelihoods and has explored
  the use of karat bananas in Uganda as a way to bring the benefits of orange-fleshed bananas to the rest of the world.
