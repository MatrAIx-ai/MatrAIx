personas:
  professional: Kimberly Jennings, a retired educator with a legacy of curriculum design for elementary and adult learners, leverages her methodical organization, calm confidence, and competitive drive
    to orchestrate intergenerational workshops, mentor teachers, and champion historic preservation, all while captivating audiences with her articulate public speaking.
  sports: Kimberly Jennings follows the Oklahoma City Thunder and the Oklahoma Sooners football team with spirited enthusiasm, participates in a weekly senior walking club at Sequoyah County park, and applies
    her competitive edge to bridge tournaments at the senior center, treating each match as a mental sport.
  arts: Kimberly Jennings immerses herself in Southern folk art, quilting patterns inspired by Mary Ann Taylor, listening to the gospel harmonies of The Blind Boys of Alabama, admiring Georgia O'Keeffe’s
    paintings, and attending community theater productions of "A Raisin in the Sun," all of which feed her storytelling evenings and fuel her memoir's artistic flair.
  travel: Kimberly Jennings prefers slow‑paced heritage tours, having explored Charleston’s historic district and Savannah’s riverfront, and dreaming of a pilgrimage to Colonial Williamsburg, while budgeting
    each trip through careful planning and often traveling with her bridge club companions for camaraderie.
  culinary: Kimberly Jennings delights in perfecting Southern classics like fried chicken, collard greens seasoned with smoked turkey, sweet potato pie, and shrimp and grits, expertly using buttermilk,
    okra, and fresh herbs from her garden, though her occasional over‑salted gravy reveals a stubborn adherence to old family recipes.
  core: Kimberly Jennings is an 81‑year‑old historian‑educator who couples relentless curiosity with methodical calm, turning every garden, quilt, and community gathering into a living archive of Southern
    heritage, while her competitive streak fuels both bridge victories and meticulous financial bookkeeping.
background:
  cultural: Kimberly grew up in a small town on the Great Plains, steeped in Midwestern values of hard work, community service, and church involvement. As a white Oklahoman, she was shaped by the rural
    traditions of the region, while living in Sequoyah County exposed her to the heritage of the Cherokee Nation and the broader tapestry of Native American influences that inform local history. She maintains
    a deep respect for Southern hospitality, Protestant (predominantly Baptist) faith practices, and the reciprocal support networks typical of small‑town America. Her education and lifelong learning ethos
    reflect the post‑World‑II push for broader access to higher education in the Midwest, which she has carried forward through volunteer mentorship and cultural preservation.
