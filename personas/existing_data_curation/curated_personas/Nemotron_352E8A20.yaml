  hobbies: '["Reading Historical Nonfiction", "Genealogy Research", "Native Oklahoma Gardening", "Crossword Puzzles", "Bridge (Card Game)", "Quilting", "Cooking Traditional Southern Cuisine", "Community
    Storytelling Events"]'
  career_goals: Although retired, Kimberly aims to remain a pivotal educational resource in Sequoyah County by leading intergenerational learning programs that pair senior expertise with youth curricula.
    She plans to volunteer as a guest lecturer at the local community college, advise the school board on curriculum updates, and spearhead a historic preservation project documenting the county's early
    20th‑century school system. Additionally, she aspires to publish a memoir that weaves together her teaching philosophy, personal resilience, and the region's cultural narratives, establishing herself
    as a respected voice in regional education circles.
