  hobbies: '[''Desert Hiking'',''Landscape Photography'',''Strategic Board Games (e.g., Settlers of Catan)'',''Chess'',''Reading Non‑Fiction (Leadership, Psychology)'',''Meal Prepping and Culinary Experimentation'',''Yoga
    (focus on flexibility and mindfulness)'',''Volunteer Mentor for Youth Coding Workshops'']'
  career_goals: Samantha aims to complete her bachelor's degree in Human Resources or Business Administration while obtaining professional certifications such as the ATD Certified Professional in Learning
    and Performance (CPLP). In the next five years she envisions rising to a senior Learning and Development Manager role at a technology firm, leading large‑scale, data‑driven training initiatives. Long‑term,
    she hopes to become a Director of Learning Strategy, champion evidence‑based learning solutions across multiple business units, and eventually launch her own consultancy that helps fast‑growing companies
    build measurable talent development pipelines.
