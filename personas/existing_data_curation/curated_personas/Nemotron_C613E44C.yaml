personas:
  professional: Jordan Rogers is a self‑directed high‑school artist‑engineer who blends sketching, digital illustration, and rudimentary coding into interactive concept art prototypes, leveraging their
    competitive drive from chess and robotics club to meet tight deadlines while eyeing a future in indie game design.
  sports: Jordan Rogers shoots hoops with the Westside Youth Basketball League, follows the Chicago Bulls closely, and joins a seasonal intramural soccer team, preferring quick, high‑intensity pickup games
    over extended gym routines.
  arts: Jordan Rogers spends weekends exploring community art fairs and museum exhibitions, drawing inspiration from experimental hip‑hop producers like Flying Lotus and Aphex Twin, and admiring visual
    artists such as Studio Ghibli’s Hayao Miyazaki and contemporary illustrator Loish, which they weave into their own surreal digital illustrations.
  travel: Jordan Rogers often plans trips around art and technology, having taken a family weekend to the Museum of Modern Art in New York, a school field trip to the NASA Kennedy Space Center, and a solo
    backpacking adventure through Tokyo’s Akihabara district, while day‑dreaming about an immersive residency in Iceland’s volcanic landscapes.
  culinary: Jordan Rogers prefers bold, customizable meals such as spicy miso ramen with sriracha, chicken tacos topped with avocado and pickled radish, and weekend smoothie bowls blended with frozen berries,
    banana, and oat milk, though their cooking skill remains at a confident beginner level, often guided by YouTube tutorials.
  core: Jordan Rogers is a 16‑year‑old creative strategist who fuses art and code, channels competitive instincts into every project, and balances disciplined work habits with a penchant for late‑night
    gaming marathons.
background:
  cultural: Jordan is an African‑American teenager growing up in Kissimmee, Florida, a city marked by a vibrant blend of Caribbean, Latino, and Southern cultural influences. His family maintains strong
    ties to the Black church, where he participates in youth choir and community service, nurturing a sense of solidarity and cultural pride. He benefits from local programs that celebrate Black art and
    encourage STEM participation, such as after‑school creative coding workshops and youth mentorship initiatives. The multicultural atmosphere of Central Florida, combined with his family's heritage, informs
    his artistic voice, which often blends elements of African‑American visual traditions, urban music, and the bright, diverse palette of his Floridian surroundings.
attributes:
  skills: '[''digital illustration'', ''sketching'', ''basic Python programming'', ''basic JavaScript programming'', ''problem-solving'', ''project organization'', ''public speaking'', ''strategic gaming'']'
  hobbies: '[''digital illustration'', ''sketching'', ''science‑fiction reading'', ''chess'', ''strategy video games'', ''robotics tinkering'', ''basketball'', ''experimental music listening'', ''visiting
    art fairs'']'
  career_goals: Jordan aspires to merge his love for art and technology by becoming a concept artist and interactive media designer for video‑games or immersive experiences. He plans to apply to a specialized
    magnet high school for visual arts, then pursue a degree in Game Design or Computer Animation at a college that supports under‑represented students. In the long term, he dreams of launching his own
    indie game studio that creates story‑driven games with abstract, artistic aesthetics. He also hopes to earn scholarships from local arts foundations and mentor younger black students interested in STEAM
    fields.
