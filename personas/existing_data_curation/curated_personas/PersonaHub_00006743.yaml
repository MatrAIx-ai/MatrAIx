persona_description: A scientist who specializes in facial expression research, particularly in understanding the factors that contribute to a successful and genuine smile. She is interested in studying
  the spatiotemporal dynamics of facial expressions and how they affect how people perceive emotions. Her research interests include computer animation, computer vision, and the neural basis of facial expression.
  She is dedicated to developing a comprehensive understanding of the emotional perception of facial expressions and how it can be used in medical practices for facial reanimation surgery and rehabilitation.
