personas:
  professional: Rabe Marshall, a budding sandbox explorer, channels curiosity and practicality into constructing elaborate block castles, improvising layouts when pieces don’t fit and favoring flexible
    play over strict rules.
  sports: Rabe Marshall, a member of the Little Bayou Ducks swim class, splashes enthusiastically in the community pool, cheers for the New Orleans Pelicans, and loves tossing a rubber football during family
    barbecues.
  arts: Rabe Marshall delights in dancing to the lively accordion tunes of Clifton Chenier, humming the melodies of Louis Armstrong, and drawing colorful scenes with crayons while watching animated musical
    cartoons.
  travel: Rabe Marshall enjoys short trips to the nearby Atchafalaya Basin for paddle‑boat rides, dreams of watching Mardi Gras floats in New Orleans, and once visited a family friend's farm in Texas for
    a weekend picnic.
  culinary: Rabe Marshall relishes the aroma of jambalaya with andouille sausage and shrimp, prefers finger foods like chicken nuggets, and often pretends to stir a pot with a wooden spoon while Mom cooks
    the family barbecue.
  core: Rabe Marshall, a curious yet easily flustered toddler, balances imaginative play with occasional tantrums over misplaced toys and clings to a soft alligator for comfort.
background:
  cultural: Rabe is raised in a Black family living in Broussard, Louisiana, a community shaped by both African‑American and Cajun/Creole influences. His upbringing blends Southern Baptist traditions—such
    as Sunday worship, family barbecues, and oral storytelling—with regional customs like zydeco music, Mardi Gras celebrations, and Louisiana cuisine. His parents speak English while occasionally using
    French‑inspired phrases, emphasizing community values, respect for elders, and a love of outdoor activities common to the bayou environment.
attributes:
  skills: '["Counting to ten", "Primary color identification", "Fine motor coordination with blocks and crayons", "Basic story sequencing", "Pattern recognition"]'
  hobbies: '["Building with wooden blocks", "Sorting pebbles and shells", "Listening to storytime at the library", "Singing zydeco and gospel songs", "Drawing with crayons", "Quiet play with a stuffed animal",
    "Small group playdates"]'
  career_goals: Rabe often imagines helping others by building or fixing things. He talks about becoming a 'builder' who makes safe playgrounds or a 'doctor' for animals, blending his love of curiosity
    about how things work with a practical desire to improve everyday life. Though still playful, his simple ambition is to grow up and create things that make friends and family happier.
