personas:
  professional: David Metz, a 17‑year‑old aspiring automotive technician, channels his love of routine and hands‑on problem solving into part‑time garage work where he performs oil changes, battery swaps,
    and minor engine tune‑ups, while his organized yet flexible mindset ensures he always follows a checklist before customizing motorcycle parts.
  sports: David Metz enjoys hunting, fishing, and weekend rides on his motorcycle, is a member of the local youth hunting club and a high‑school track cross‑country team, follows the Detroit Lions and Chicago
    Cubs for professional sports inspiration, and schedules regular strength‑training sessions at the community gym to stay fit for fieldwork.
  arts: David Metz’s evenings are filled with classic rock and country vinyl, featuring bands like Lynyrd Skynyrd, Fleetwood Mac, and Johnny Cash, while he occasionally watches western films starring Clint
    Eastwood, and he admires the craftsmanship of guitar builders like Taylor, which fuels his appreciation for both music and mechanical precision.
  travel: David Metz prefers short, planned road trips to nearby state parks for camping and fishing, has already explored the Adirondack Mountains and plans a future drive along Route 66 to experience
    roadside Americana, and dreams of an international hunting expedition to New Zealand once his auto‑repair shop is operational.
  culinary: David Metz enjoys cooking hearty meals on a camp stove, frequently prepares smoked brisket with a dry rub of smoked paprika, chipotle, and brown sugar, whips up classic chili using ground beef,
    kidney beans, and plenty of cumin, and occasionally experiments with crafting his own BBQ sauce using ketchup, apple cider vinegar, and molasses.
  core: David Metz blends a disciplined love of routine with a rugged outdoor spirit, balancing meticulous budgeting and hands‑on mechanics with weekend hunts, classic rock playlists, and dreams of a hometown
    auto‑repair business.
background:
  cultural: David grew up in Greenville, a small town in Muhlenberg County, Kentucky, within a tight‑knit, working‑class white community that values tradition, self‑reliance, and family ties. His family’s
    roots are tied to the region’s agricultural and former coal‑mining heritage, giving him a familiarity with rural life, local customs, and community gatherings such as church services, high school football
    games, and county fairs. The cultural environment emphasizes courtesy, modesty, and a pragmatic outlook, which aligns with David’s preference for routine, practicality, and harmonious relationships.
attributes:
  skills: '[''Basic automotive maintenance'', ''Carpentry and woodworking'', ''Small-engine repair'', ''General home repair and handyman tasks'', ''Organizational and coordination skills'']'
  hobbies: '[''Hunting and fishing'', ''Motorcycle maintenance and customization'', ''Listening to classic rock and country music'', ''Co-op video gaming'', ''Church volunteering and community service'',
    ''Reading DIY and mechanics manuals'']'
  career_goals: David aims to enroll in a vocational training program after completing his GED, focusing on automotive technology or HVAC repair. He wants to earn certifications that will allow him to work
    as a qualified mechanic in his hometown, eventually opening his own small auto‑repair shop to serve the community. He is also considering joining the U.S. Army as an automotive and mechanical specialist
    to gain disciplined training and a steady career path. His overarching ambition is to achieve financial stability while remaining close to his family and contributing to the local economy.
