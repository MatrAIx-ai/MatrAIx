personas:
  professional: Miguel Young is a veteran utility meter reader turned mentor who leverages three decades of analog and digital metering expertise, a solid grasp of electrical safety, and a knack for translating
    technical jargon into plain language to train new crews while championing the rollout of smart‑meter technology; they balance curiosity with practicality and a competitive drive to constantly improve
    processes.
  sports: Miguel Young enjoys early‑morning fishing on the Red River, participates in a weekly community‑center bowling league, and passionately follows the St. Louis Cardinals and the Kansas City Chiefs,
    often cheering while brandishing a BBQ rib as a good‑luck charm.
  arts: Miguel Young immerses themselves in blues, gospel, and classic R&B, attending live shows at The Riverfront Blues Club where they revel in the sounds of B.B. King, Aretha Franklin, and Sam Cooke,
    while also lending their voice to the church choir and appreciating vintage car show aesthetics.
  travel: Miguel Young favors road‑trip adventures in his restored 1967 Chevrolet, frequently escaping to the Ozark fishing lodges and planning a dream pilgrimage to New Orleans for its vibrant music scene,
    while also ticking off destinations like the National Corvette Museum in Bowling Green and the historic blues trail in the Mississippi Delta.
  culinary: Miguel Young showcases soulful cooking at neighborhood barbecues, mastering dishes like smoked pork ribs, collard greens, cornbread, and black‑eyed peas, and while their culinary skill is solid,
    they often over‑season with hickory‑smoked rub, reflecting a bold, no‑holds‑back palate.
  core: Miguel Young is a sociable, curiosity‑driven retiree whose competitive streak fuels a life of hands‑on mentorship, classic‑car restoration, blues appreciation, and community barbecues, all navigated
    with a spontaneous, occasionally disorganized, but resilient outlook.
background:
  cultural: Miguel grew up as a Black son of the Deep South in a working‑class family that moved to Texarkana in the 1970s. His upbringing was shaped by the church, soul music, and the strong sense of community
    that characterizes African‑American neighborhoods in Arkansas. He carries the oral storytelling tradition of his grandparents, who migrated from Mississippi during the Great Migration, and celebrates
    cultural milestones such as Juneteenth and Kwanzaa alongside traditional Southern holidays. Navigating a predominantly white, rural environment has instilled in him a pragmatic resilience and a deep
    appreciation for Black cultural expressions—particularly gospel music, barbecue cuisine, and the collective support found in his church and local community groups.
attributes:
  skills: '[''Utility Meter Reading'', ''Digital Meter Diagnostics'', ''Data Entry & Reporting'', ''GIS Navigation'', ''Safety Compliance'', ''Basic Electrical Troubleshooting'', ''Customer Communication'',
    ''Adaptability to New Technology'', ''Process Improvement Initiatives'']'
  hobbies: '[''Fishing'', ''Card games (e.g., poker, bridge)'', ''Barbecue and soul‑food cooking'', ''Live blues and gospel music'', ''Classic car restoration'', ''DIY home improvement'', ''Church choir
    singing'', ''Community volunteering'']'
  career_goals: Miguel is focused on transitioning from field work to a mentoring and supervisory role before retirement. He aims to become a senior trainer for new meter readers, developing onboarding
    programs and safety workshops that draw on his hands‑on experience. He also aspires to play a key part in the rollout of smart‑meter infrastructure in his service area, positioning himself as a point‑person
    for technology integration. Financially, he wants to secure a comfortable retirement for his wife and support his adult children’s college expenses. On a community level, he hopes to serve on the local
    utilities advisory board to advocate for equitable service delivery and represent the interests of longtime residents.
