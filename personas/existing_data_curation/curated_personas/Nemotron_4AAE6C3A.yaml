  hobbies: '[''Golf'', ''Fishing'', ''Barbecue Cooking'', ''Classic Car Restoration'', ''Woodworking'', ''Church Choir Participation'', ''Food‑bank Volunteering'', ''Classic Rock Music'', ''Attending Live
    Concerts'']'
  career_goals: Norman aims to advance to a senior procurement leadership role, such as Procurement Manager or Director of Supply Chain, within the next five years. He intends to spearhead company‑wide
    cost‑reduction initiatives, integrate sustainable and ethical sourcing practices, and achieve the Certified Professional in Supply Management (CPSM) credential. He also hopes to mentor the next generation
    of purchasing agents, contribute to industry associations in Georgia, and build a reputation as a trusted partner for both internal stakeholders and external suppliers.
