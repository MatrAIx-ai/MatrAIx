persona_description: A historian who specializes in the history of the Republic of China, particularly the era from 1912 to 1949. Their research interests include the events, figures, and policies that
  shaped the development of the republic, the relationship between the republic and other major powers, and the impact of the republic on Chinese society and politics. They are knowledgeable about the Qing
  Dynasty, the People's Republic of China, and the role of Sun Yat-sen and the Kuomintang in the republic's history.
