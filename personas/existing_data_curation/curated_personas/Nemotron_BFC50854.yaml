  career_goals: Marcelo often talks about becoming a firefighter because he admires their bravery and wants to help people in his community. He also dreams of being an artist, drawing comics and creating
    colorful murals, and imagines building impressive structures as a future engineer. His ambitions blend his curiosity for new ideas with a practical desire to contribute positively to his family and
    neighborhood.
