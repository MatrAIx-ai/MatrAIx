personas:
  professional: A budding LEGO engineer, Marcelo Gutierrez, at age six channels curiosity and practicality into designing simple vehicles and structures, using methodical planning and reliable execution
    to turn box instructions into original creations, and already dreams of one day sketching blueprints for real-world machines.
  sports: A lively soccer enthusiast, Marcelo Gutierrez, plays midfield for the Sun Valley Cubs U-8 league, practices dribbling with friends at the neighborhood park each Saturday, cheers on the River City
    Rovers during televised matches, and approaches fitness with a balanced mix of structured drills and spontaneous tag games, yet occasionally forgets to stretch before games, leading to minor knee scrapes.
  arts: A vibrant young artist, Marcelo Gutierrez, fills sketchbooks with cartoons inspired by Pixar's Buzz Lightyear and Disney's Mickey Mouse, enjoys coloring scenes from Dr. Seuss's books, and indulges
    in building LEGO sculptures that double as visual storytelling, while occasionally spending hours on a single drawing, neglecting chores.
  travel: A curious explorer, Marcelo Gutierrez, loves weekend trips to the local desert state park to hunt for unique rocks and insects, dreams of visiting the Grand Canyon's rim, and feels a special excitement
    about traveling to Mexico City to hear grandparents' stories in person, though they sometimes resist long car rides and prefer the comfort of the tablet games.
  culinary: A budding food adventurer, Marcelo Gutierrez, delights in munching on cheesy quesadillas with salsa, savoring fresh apple slices dipped in peanut butter, and helping to bake chocolate chip cookies
    where they proudly sprinkle extra chocolate chips, yet they often skip vegetables unless they're shaped like dinosaurs.
  core: Marcelo Gutierrez, a six-year-old with a methodical mind and boundless curiosity, blends organized LEGO building, spirited soccer play, and a love for cartoon art into a unique blend of disciplined
    creativity, though they sometimes forget to tidy up their colorful creations.
background:
  cultural: Marcelo grows up in a Mexican‑American household in Yuma, Arizona, where Spanish is spoken at home and English at school. He celebrates cultural traditions such as Día de los Muertos, family
    gatherings featuring tacos, tamales, and horchata, and enjoys local Hispanic music and dance at community events like the Yuma County Fair. The desert environment of Yuma influences his love of outdoor
    exploration, while his family's emphasis on respect, cooperation, and storytelling shapes his identity.
