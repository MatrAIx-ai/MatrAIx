personas:
  professional: Lea Malone, a budding naturalist and junior writer, channels their love of routine and meticulous observation into documenting local bird species and drafting mystery story outlines for
    the school literary club.
  sports: Lea Malone prefers solitary fitness activities, joining the local youth hiking club for weekend trail walks with their dog, while cheering on the Seattle Seahawks during football season and occasionally
    dabbling in a beginner swimming class at the municipal pool.
  arts: Lea Malone channels their creative spirit through sketching impressionist landscapes inspired by Claude Monet, crocheting intricate scarves using patterns from Bella's Crochet Corner, and playing
    beginner piano pieces by Ludwig van Beethoven and Yiruma, which together nurture their love of structured artistic expression.
  travel: Lea Malone's travel style blends meticulously planned nature trips—such as family weekend getaways to Acadia National Park where they document bird sightings—with a strong preference for quiet,
    scheduled itineraries that avoid crowded tourist hotspots, all while balancing school commitments and parental constraints.
  culinary: Lea Malone delights in preparing simple garden-inspired meals like roasted zucchini and carrot soup seasoned with rosemary, perfecting strawberry shortcake using fresh berries from their backyard,
    and occasionally baking oat-based banana muffins for their dog.
  core: Lea Malone is a routine-loving, quietly observant twelve-year-old who balances meticulous journaling, solitary craft pursuits, and a gentle anxiety that fuels their careful planning of every detail.
background:
  cultural: Lea grew up in Wilkesboro, North Carolina, within a close‑knit, predominantly white rural community that values tradition, self‑reliance, and respect for nature. Her family observes Southern
    customs such as seasonal garden planting, community church gatherings, and local county fair events, which reinforce a sense of continuity and routine. Influenced by Appalachian folk heritage and the
    agrarian lifestyle of Wilkes County, Lea has learned the importance of hard work, modesty, and helping neighbors. These cultural roots shape her appreciation for quiet, dependable environments, her
    preference for practical activities, and her desire to contribute to her community in a caring, organized manner.
