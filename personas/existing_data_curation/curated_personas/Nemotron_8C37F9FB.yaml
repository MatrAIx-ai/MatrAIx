  career_goals: Lea aspires to work in a quiet, routine‑oriented field where she can help living beings and maintain order. She dreams of becoming a veterinary technician or animal caretaker, ideally on
    a farm or at a local animal shelter, because the work combines her love for animals with the structured care schedules she enjoys. In the short term she plans to volunteer at the community animal shelter,
    earn her high school diploma, and later attend a vocational program in veterinary technology. Her long‑term ambition includes further certification to open a small, well‑organized pet‑care business
    in her hometown, providing reliable services to the community while preserving the calm, dependable environment she values.
