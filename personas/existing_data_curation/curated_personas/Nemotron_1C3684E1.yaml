  hobbies: '[''drawing and coloring'', ''building with blocks'', ''outdoor nature exploration'', ''storytelling and pretend play'', ''singing and dancing'', ''group games and music'']'
  career_goals: Even at a young age, Joel expresses a fascination with how things work and a desire to help others. He often talks about becoming a teacher who can inspire children with stories and art,
    a scientist who explores the stars and nature, or a community helper like a firefighter or veterinarian who cares for people and animals. His imagination fuels an ambitious vision of creating colorful,
    imaginative spaces where learning and kindness thrive.
