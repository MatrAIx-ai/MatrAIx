personas:
  professional: Joel Moore, a three‑year‑old aspiring architect who constructs elaborate block cities with meticulous planning, merges vivid imagination with methodical organization, and always offers to
    help friends stabilize their creations.
  sports: Joel Moore, a three‑year‑old who cheers for the New York Yankees, regularly attends the Tiny Tykes Soccer Club practice, and dashes across the playground with boundless energy, always insisting
    on sharing the ball and offering high‑fives to teammates.
  arts: Joel Moore, a three‑year‑old captivated by the melodies of The Wiggles and the animated wonder of Disney’s Frozen, spends hours drawing snowflake murals and performing impromptu dance routines,
    channeling abstract curiosity into vivid creative expression.
  travel: Joel Moore, a three‑year‑old who has explored the San Diego Zoo and Disney World, dreams of seeing the Eiffel Tower in Paris, and prefers family road trips that include frequent playground stops
    and snack breaks.
  culinary: Joel Moore, a three‑year‑old who adores cheesy macaroni, peanut‑butter‑banana sandwiches, and strawberry‑banana smoothies, can independently spread peanut butter on toast but often leaves bright
    orange sauce smudges on their cheeks.
  core: Joel Moore, a three‑year‑old whirlwind of organized imagination, boundless sociability, and heartfelt compassion, transforms daily play into collaborative adventures, even if it means occasionally
    leaving a trail of sticker‑stained fingers.
background:
  cultural: Joel grows up in Cabool, a small town in Texas County, Missouri, characterized by close‑knit community ties and a rural Midwestern setting. His family participates in local traditions such as
    weekend church gatherings, community fairs, and seasonal outdoor activities like fishing and picnics. The environment offers a mixture of natural landscapes—forests, streams, and farmland—that influences
    his curiosity about nature. The cultural values emphasize politeness, helpfulness, and respect for elders, which align with his compassionate disposition. Exposure to both traditional family customs
    and contemporary media (cartoons, children's books) provides a balanced cultural perspective.
