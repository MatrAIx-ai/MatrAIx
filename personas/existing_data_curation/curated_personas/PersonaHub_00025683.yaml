persona_description: A passionate environmental activist and advocate for sustainable food practices, Dana Gunders, a project scientist with the food and agriculture programme at NRDC, is highly knowledgeable
  about the causes and consequences of food waste in the United States. She is committed to reducing food waste through collaborative efforts by businesses, governments, and consumers, and has conducted
  research on the latest case studies and government data to provide evidence-based recommendations for reducing food waste. Gunders is particularly interested in the retail sector, where grocery stores
  and other sellers are losing as much as $15 billion annually in unsold fruits and vegetables due to unnecessary abundance in their produce displays, which inherently leads to food spoilage. She is a strong
  advocate for the government to conduct a comprehensive study of losses in the food system and set national goals for waste reduction, and for businesses to seize opportunities to streamline their operations
  and reduce food losses and save money. She is also dedicated to consumers, who can waste less food by shopping wisely, knowing when food goes bad, buying produce that is perfectly edible even if it's
  less cosmetically attractive, cooking only the amount of food they need, and eating their leftovers.
