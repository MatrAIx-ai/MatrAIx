persona_description: A policy analyst who specializes in the study of land conflict in India, particularly its incidence, pendency, and legal and administrative factors. She is interested in understanding
  the coexistence of numerous, conflicting laws leading to legal disputes over land, and how these disputes impact the development trajectory of the country. Her research interests include the legislative
  and administrative factors behind the high incidence of legal and extralegal conflicts over land, and how they impact the resolution of land disputes. She is also interested in the judicial factors behind
  the pendency of land disputes, and how they impact the expeditious resolution of land disputes.
