  hobbies: '[''Visiting art galleries and murals'', ''Acrylic painting'', ''Playing Spanish guitar'', ''Restoring vintage electronics'', ''Cooking Spanish cuisine'', ''Hiking'', ''Attending Lodi Wine &
    Food Festival'', ''Exploring sustainable DIY projects'']'
  career_goals: Steven aims to earn advanced certifications such as the EPA Universal Refrigerant Certification, Journeyman Electrician, and HVAC R-410A certification within the next three years. He aspires
    to transition from an employee role to operating his own small handyman business focused on eco‑friendly repairs and retrofitting older homes in the Lodi area. He also hopes to combine his love for
    art and preservation by specializing in the maintenance and restoration of historic buildings and public art installations.
