  career_goals: Phuoc aims to channel his technical expertise and artistic sensibility into launching a startup that creates AI‑enhanced creative tools for independent musicians and visual artists. In the
    short term, he seeks a flexible software‑engineering role at an innovative company where he can contribute to product development while continuing to experiment with design and interactive media. He
    also plans to compete in hackathons and win recognitions that bolster his reputation, and eventually, he hopes to pursue a master’s degree in Human‑Computer Interaction to deepen his understanding of
    user‑centered design. Balancing his competitive drive with self‑care, he is mindful of managing stress and seeks environments that value autonomy and collaborative creativity.
