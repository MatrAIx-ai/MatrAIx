  career_goals: Javier dreams of merging his love for art and technology by becoming a video game designer or digital animator. He aims to attend a high school with a strong arts program, develop a compelling
    portfolio, and later study media arts or graphic design at university. He hopes to create indie games that reflect his Mexican heritage and address themes of identity and emotional well‑being, and eventually
    mentor younger students in both art and coding. He also wants to use his future career to support his family and give back to his community.
