  career_goals: Sherry aims to transition from a high‑performing clinician to a clinic owner who integrates physical rehabilitation with creative arts therapies. She plans to earn a board‑certified orthopedic
    specialist credential (OCS), complete a doctorate in physical therapy (DPT) focusing on neuro‑rehabilitation, and publish research on the synergistic effects of art‑based interventions on motor recovery.
    Within the next five years she hopes to open a boutique practice in Bergen County that offers sports injury rehab, geriatric mobility programs, and art‑infused wellness workshops. She also aspires to
    become a sought‑after speaker at national PT conferences, sharing her evidence‑driven, interdisciplinary approach.
