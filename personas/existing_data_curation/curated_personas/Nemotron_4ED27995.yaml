personas:
  professional: Sherry Sepulveda is a veteran musculoskeletal rehabilitation specialist who blends rigorous evidence‑based practice with a flair for creative arts therapy; they design data‑driven treatment
    plans, mentor junior clinicians, and spearhead quality‑improvement initiatives while meticulously managing clinic workflows and EMR systems.
  sports: Sherry Sepulveda competes in weekly tennis matches at the local club, runs charity 5Ks each spring, and follows the New Jersey Devils and New York Giants; they balance a competitive edge with
    a mindful post‑exercise stretching regimen that reflects their analytical approach to performance.
  arts: Sherry Sepulveda frequents contemporary art galleries and the Newark Museum, sketches watercolors of urban skylines, experiments with analog photography inspired by Ansel Adams and Sara Löwent;
    they curate art‑infused wellness workshops that integrate the works of Yayoi Kusama and Agnes Martin into therapeutic practice.
  travel: Sherry Sepulveda plans trips with the same meticulousness they apply to clinic operations, favoring art‑centric itineraries such as a weekend in Santa Fe to explore Pueblo Revival murals, a cultural
    immersion in Oaxaca’s vibrant markets for culinary inspiration, and annual visits to the Getty Center in Los Angeles; they balance travel costs against the budget needed for their future clinic.
  culinary: Sherry Sepulveda enjoys experimenting in the kitchen with dishes like chicken mole, chipotle‑infused quinoa bowls, and lemon‑thyme grilled salmon; they skillfully balance a moderate home‑cooking
    skill set with occasional forays into high‑end culinary classes, always topping meals with fresh cilantro, smoked paprika, and a splash of aged sherry.
  core: Sherry Sepulveda is a data‑driven PT who channels a competitive, art‑loving mind into meticulously organized clinics, while juggling stress‑induced worry, disciplined finances, and a penchant for
    tennis, yoga, and culinary experiments; they constantly seek ways to intertwine science and creativity.
background:
  cultural: Sherry grew up in a middle‑class white family in suburban New Jersey, shaped by the region’s emphasis on education, community involvement, and a blend of East Coast cultural amenities. Her upbringing
    in Bergen County exposed her to a diverse population, fostering an appreciation for varied cultural expressions and artistic venues. Through her marriage to a Sepulveda, she gained intimate exposure
    to Hispanic traditions, such as family gatherings with music and food, enriching her cultural perspective. This dual influence informs her inclusive patient care approach, integrating respect for cultural
    differences while drawing on the pragmatic, self‑reliant values common in her American upbringing.
