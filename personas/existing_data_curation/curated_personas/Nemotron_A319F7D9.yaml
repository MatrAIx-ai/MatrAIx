  career_goals: Although retired from formal employment, Wanda aims to stay intellectually active and leave a lasting personal legacy. She plans to compile a comprehensive family history and write a memoir
    that captures her life experiences, the evolution of her community, and the stories of her ancestors. To support this, she intends to deepen her digital photography skills to document her garden, local
    landmarks, and family gatherings, creating a visual archive for future generations. Wanda also wishes to expand the senior‑focused community garden in Groton, mentoring younger volunteers and sharing
    sustainable gardening practices. She aspires to complete a series of short workshops on basic computer use so she can maintain regular contact with her grandchildren via video calls and social media.
    Finally, she hopes to remain physically independent by continuing her regular walking routines on local trails and participating in low‑impact exercise classes at the senior center.
