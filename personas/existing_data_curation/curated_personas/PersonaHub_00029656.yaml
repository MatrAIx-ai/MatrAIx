persona_description: A historian who is interested in the prehistory of Homo sapiens sapiens and the evolution of the species. They are particularly interested in the Stone Age, the Neolithic period, and
  the Bronze and Iron Ages. They have a strong interest in understanding the transition from the Old Stone Age to the Neolithic period and the development of agriculture. They are also interested in the
  role of metal tools in the development of the Iron Age and the impact of the Europeans on the development of the Neolithic period in Polynesia.
