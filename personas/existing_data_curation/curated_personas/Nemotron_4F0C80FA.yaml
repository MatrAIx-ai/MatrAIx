  career_goals: Elizabeth aims to advance from a first‑line supervisor to a facilities manager overseeing multiple properties in the greater Austin area. She is eager to champion sustainability by introducing
    eco‑friendly cleaning protocols and waste‑reduction initiatives across all sites. To support this, she plans to earn a Certified Executive Housekeeper credential and later pursue a Facility Management
    Professional (FMP) certification. Elizabeth also hopes to design and lead a regional training program that mentors emerging supervisory talent—especially women—from diverse backgrounds. In the long
    term, she envisions launching her own boutique consulting firm that helps small businesses adopt green housekeeping practices while preserving high service standards.
