  hobbies: '[''Watercolor Painting'', ''Collecting Mexican Folk Art'', ''Cooking Traditional Mexican Dishes'', ''Garden Cultivation (Native Herbs & Succulents)'', ''Reading (History & Business)'', ''Hiking
