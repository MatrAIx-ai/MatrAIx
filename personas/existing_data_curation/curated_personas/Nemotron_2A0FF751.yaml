  career_goals: Omar aims to finish his associate degree in Business Administration and obtain a certification in nonprofit management within the next two years. He aspires to secure a full‑time role as
    a program coordinator for a local community organization that serves immigrant families, where he can blend his organizational strengths with his desire to help others. In the longer term, he envisions
    moving into a supervisory position, possibly leading a small agency that provides social services and cultural integration programs for the Colombian and broader Latino community in Louisiana. Stability,
    clear career progression, and the ability to make a tangible positive impact are central to his ambitions.
