  hobbies: '["Vegetable gardening", "Baking family recipes", "Quilting and patchwork", "Birdwatching", "Bridge card games", "Volunteering at the local senior center", "Reading historical fiction", "Walking
    local nature trails", "Puzzle solving (crosswords, Sudoku)"]'
  career_goals: At 74, Ashley aims to maintain a steady, predictable work schedule that provides both financial security and social engagement. She plans to transition to a part‑time role over the next
    two years, allowing her more time for community volunteerism while still contributing her expertise to the plant’s safety culture. A key ambition is to formalize her safety knowledge by completing an
    OSHA refresher certification and to serve on the company’s safety committee, championing incident‑free operations. She also hopes to mentor at least three younger employees, passing on her meticulous
    work habits and compassionate leadership style. Ultimately, Ashley envisions a phased retirement by age 78 that balances continued purpose at work with a deeper involvement in her church’s outreach
    programs and the local senior center, thereby reducing her worry about losing routine and relevance.
