  career_goals: Miguel aims to transition from his current period of unemployment into a flexible tech role that balances structure with autonomy. In the short term, he plans to earn an AWS Certified Solutions
    Architect credential and secure remote freelance contracts in data analysis or IoT consulting, allowing him to set his own schedule. Long‑term, he envisions launching a small startup that designs low‑cost
    smart‑home devices for underserved communities in the Lebanon, PA area, combining his competitive spirit with a tangible social impact. He also aspires to mentor Puerto Rican youth in STEM through local
    workshops, using his resilient mindset to inspire confidence in others while maintaining a healthy skepticism that drives rigorous quality standards.
