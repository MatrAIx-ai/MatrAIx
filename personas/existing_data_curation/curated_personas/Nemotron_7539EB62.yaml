personas:
  professional: Fazlur Boykin is a seasoned software architect who leverages 35 years of enterprise Java and C# experience to enforce rigorous code quality through automated testing, continuous integration
    pipelines, and meticulous system documentation, while mentoring junior developers and guiding local small businesses toward modern, maintainable solutions.
  sports: Fazlur Boykin follows the St. Louis Cardinals (MLB) and St. Louis Blues (NHL) and participates in a community senior baseball league each spring, while preferring low‑impact exercise such as early‑morning
    walks and gardening as his main fitness activities.
  arts: Fazlur Boykin’s artistic side manifests in a love for classic railway documentaries, vintage computer literature, and a deep appreciation for the music of Beethoven, The Beatles, and the jazz stylings
    of Miles Davis, often listening to the latter while building scale‑model train scenery.
  travel: Fazlur Boykin prefers meticulously planned road trips to historic industrial sites, having visited the Henry Ford Museum in Dearborn, the Strasburg Rail Road in Pennsylvania, and planning a future
    pilgrimage to the Canadian Pacific Railway Museum in Alberta, balancing travel with a moderate budget that reserves funds for hobby‑related purchases.
  culinary: Fazlur Boykin enjoys cooking hearty Midwestern fare such as pot roast with carrots and potatoes, fresh garden tomatoes and basil in a classic Caprese salad, and seasonal corn chowder, boasting
    moderate cooking skills that shine when they can integrate fresh produce from their own vegetable garden.
  core: Fazlur Boykin combines a methodical engineering mind with a quiet, hobby‑driven lifestyle, balancing disciplined consulting work, meticulous model‑train crafting, and a love of history while maintaining
    calm, predictable routines and a penchant for structured planning.
background:
  cultural: Fazlur grew up in a middle‑class white family in the Midwestern United States, with deep roots in the industrial towns of southern Illinois. His family heritage includes German and Irish ancestors
    who settled in the region in the late 19th century. The local culture, emphasizing practicality, self‑reliance, and community solidarity, shaped his values of responsibility and calm perseverance. He
    attended local public schools and earned a STEM degree at a state university, reflecting the region’s strong emphasis on technical education. Though divorced, he maintains strong ties to the Belleville
    community through his involvement with the historical society and neighborhood gardening clubs, embodying the Midwestern ethos of modesty, hard work, and neighborly support.
