personas:
  professional: Maria Parrado, a 25-year-old aspiring arts administrator, blends their meticulous project-management abilities, bilingual fluency, and curiosity for visual culture to design inclusive community
    exhibitions while assertively coordinating volunteer teams and navigating tight museum deadlines.
  sports: Maria Parrado, a 25-year-old, mixes weekend hikes through the Texas Hill Country with weekly salsa-dance cardio classes, supports the Dallas Cowboys and FC Dallas, and joins a local Fort Worth
    running club for 5-k races, using a Fitbit to track progress despite occasional post-workout soreness.
  arts: Maria Parrado, a 25-year-old, immerses themselves in Fort Worth’s Cultural District, curating Instagram reels of exhibitions by artists such as Kerry James Marshall and local painter Julie Schindler,
    while sketching urban skylines in watercolor after gallery openings and dancing to performances by the Fort Worth Symphony.
  travel: Maria Parrado, a 25-year-old, prefers meticulously planned weekend trips to Austin’s live-music scene and quarterly cultural escapes abroad like Barcelona’s street-art tours, balancing a modest
    travel budget with a craving for immersive art experiences, yet sometimes postpones longer vacations due to work stress.
  culinary: Maria Parrado, a 25-year-old home chef, skillfully prepares traditional tamales and mole poblano (infusing them with roasted ancho chiles, chocolate, and fresh cilantro) while also experimenting
    with Tex-Mex fusion dishes like shrimp tacos with avocado crema, often sharing these meals at potluck gatherings with friends.
  core: Maria Parrado, a 25-year-old art-obsessed organizer, channels relentless curiosity and social energy into community projects, yet battles chronic worry that fuels late-night caffeine binges and
    occasional over-commitment to events they can barely attend.
background:
  cultural: Maria comes from a bicultural Mexican‑American family that maintains strong ties to both Spanish and English languages. Raised in a household where celebrations such as Día de los Muertos, Cinco
    de Mayo, and quinceañeras were central, she grew up with a deep appreciation for Mexican folklore, music, and cuisine. In Fort Worth’s vibrant Latino community, she frequently attends local cultural
    festivals, volunteers at a Spanish‑language after‑school program, and supports neighborhood murals that reflect her heritage. Her upbringing emphasized communal responsibility, respect for elders, and
    a love of storytelling, all of which shape her worldview and motivate her desire to create inclusive cultural spaces.
