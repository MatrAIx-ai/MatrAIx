  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Sketching and watercolor painting'', ''Salsa and bachata dancing'', ''Cooking traditional Mexican cuisine'', ''Mindfulness meditation'',
    ''Hiking in the Texas Hill Country'', ''Reading contemporary fiction and social‑change nonfiction'', ''Participating in community volunteer events'']'
  career_goals: Maria aims to combine her passion for the arts with her organizational talents by pursuing a career in arts administration or nonprofit program management. She plans to complete a bachelor’s
    degree in arts management or community development, secure an internship at a local museum or cultural organization, and eventually become a program coordinator responsible for designing inclusive community
    art initiatives. Long‑term, she envisions leading a cultural center that bridges the Hispanic community with broader Fort Worth audiences, and possibly mentoring youth through arts‑based empowerment
    programs.
