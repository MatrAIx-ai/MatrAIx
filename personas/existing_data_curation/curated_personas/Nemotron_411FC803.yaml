    ''helping friends with schoolwork'']'
  career_goals: Krystle dreams of a future where she can combine her love for people and art. She imagines becoming a teacher who uses creative projects to help children learn, an artist who paints murals
    that brighten her town, or a veterinarian who cares for animals. Behind each ambition is her deep desire to help others, nurture harmony, and explore new ideas.
