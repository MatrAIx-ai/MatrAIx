    vegetable garden)'', ''Hiking in the Sierra Nevada foothills'', ''Traveling to explore historical sites in Mexico and the U.S.'', ''Collecting folk art and ceramics'']'
  career_goals: Looking ahead, Mailyn aims to transition from operational management to strategic leadership, positioning herself for a senior executive role such as Director of IT or Chief Information
    Officer within the next five years. She is pursuing PMP and CISSP certifications to solidify her credentials in project management and cybersecurity. A core ambition is to spearhead a digital transformation
    initiative for a regional public‑service agency in Fresno, improving access to government services for underserved communities. Simultaneously, she plans to mentor emerging talent—especially women and
    Hispanic professionals—through formal mentorship programs and community workshops, leaving a lasting impact on the next generation of technologists.
