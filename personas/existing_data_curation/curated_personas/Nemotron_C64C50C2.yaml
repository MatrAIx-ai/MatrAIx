personas:
  professional: Karina Ojeda, a seasoned property manager with 15+ years overseeing residential communities, leverages bilingual communication, meticulous budgeting via Yardi and QuickBooks, and a pragmatic
    yet compassionate conflict‑resolution style, and they keep their Sylmar portfolio thriving.
  sports: Karina Ojeda enjoys hitting the trails of the Angeles National Forest with the local Sierra Hiking Club, supports the Los Angeles Lakers and the LA Galaxy, and occasionally they join a community
    soccer league for a quick match on Saturday mornings.
  arts: Karina Ojeda finds creative escape behind their camera, capturing urban street art like murals by Shepard Fairey and natural vistas, and they unwind listening to classic ranchera singers like Vicente
    Fernández and contemporary folk artist José González while cooking.
  travel: Karina Ojeda prefers road‑trip adventures that blend nature and culture, having driven up the Pacific Coast Highway to Big Sur, explored the historic vineyards of Napa Valley, and they dream of
    visiting the cherry blossoms of Kyoto during the spring festival.
  culinary: Karina Ojeda skillfully prepares family‑recipe carnitas tacos, homemade salsa with heirloom chilies, and a fragrant agua fresca using fresh herbs from their garden, yet they frequently burn
    the tortilla edges when multitasking between a Zoom call and the stove.
  core: Karina Ojeda balances methodical professionalism with a love of garden‑fresh flavors, spontaneous hikes, and a habit of over‑committing to community projects, all while they keep a meticulously
    organized budget and tend to forget watering their succulents.
background:
  cultural: Karina is a first‑generation Mexican‑American whose parents immigrated from Jalisco. Growing up in Sylmar, she was immersed in a vibrant blend of Mexican traditions and Southern California culture.
    She celebrates Día de los Muertos, holds close family ties, and values communal support, which informs her compassionate yet pragmatic approach to property management. Her bilingual fluency and deep
    respect for cultural customs enable her to bridge gaps between diverse residents, fostering a sense of belonging and mutual respect within the communities she serves.
attributes:
  skills: '[''Property Management'', ''Community Association Governance'', ''Budgeting and Financial Reporting'', ''Tenant Relations'', ''Vendor Negotiation'', ''Regulatory Compliance'', ''Conflict Mediation'',
    ''Facility Maintenance Oversight'', ''Bilingual Communication (Spanish/English)'', ''Software Proficiency (Yardi, Buildium, QuickBooks)'']'
  hobbies: '[''Community Gardening'', ''Hiking in Angeles National Forest'', ''Traditional Mexican Cooking'', ''Yoga'', ''Photography (urban and nature)'', ''Reading Mystery Novels'', ''Volunteering at
    Local Community Center'']'
  career_goals: Karina aims to become a Certified Community Association Manager (CCAM) and obtain a real‑estate license to broaden her professional credentials. She envisions launching her own boutique
    property‑management firm focused on affordable, sustainable housing developments in the San Fernando Valley. Over the next five years, she plans to expand her portfolio to manage at least 200 units,
    integrate green‑building practices, and mentor emerging Latina professionals in the industry. Additionally, she hopes to spearhead a community‑led revitalization project that transforms underutilized
    spaces into mixed‑use, family‑friendly neighborhoods.
