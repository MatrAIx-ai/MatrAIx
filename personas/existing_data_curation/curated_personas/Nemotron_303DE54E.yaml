personas:
  professional: Yolanda Jones is a budding visual storyteller who marries watercolor sketching with iPad comic creation while applying their organized, methodical mindset to robotics club projects, where
    they experiment with unconventional problem‑solving to build small autonomous devices.
  sports: Yolanda Jones plays on a community youth basketball league in San Joaquin County, follows the Golden State Warriors and Oakland Athletics for inspiration, and balances team practice with solo
    jogging sessions at the local park to stay fit during the school year.
  arts: Yolanda Jones immerses themselves in contemporary visual culture, drawing inspiration from artists like Banksy, Hayao Miyazaki, and the graphic novel work of Alison Bechdel, while curating playlists
    that feature R&B, jazz, and hip‑hop legends such as Nina Simone and Kendrick Lamar to fuel their creative process.
  travel: Yolanda Jones enjoys day trips to nearby Yosemite National Park and weekend visits to San Francisco's museum districts, dreams of exploring Tokyo's manga cafés, and plans each outing with a mix
    of family input and their own research, balancing budget constraints with a love for cultural immersion.
  culinary: Yolanda Jones loves experimenting with bold flavors, often preparing avocado toast with chili flakes, homemade sushi rolls with cucumber and spicy mayo, and whipping up mango‑lime smoothies,
    while also appreciating classic comfort foods like pepperoni pizza and chicken tacos.
  core: Yolanda Jones blends a passion for vibrant art, methodical robotics tinkering, and community‑focused kindness into a teen life that balances bright creativity with quiet reflection and disciplined
    organization.
background:
  cultural: Yolanda comes from a Black family that has lived in the Bay Area for generations before relocating to Manteca, where her parents work in healthcare and education. Her household celebrates traditions
    such as Juneteenth, family reunions featuring soul food recipes like collard greens and sweet‑potato pie, and storytelling evenings where elders share histories of the civil‑rights movement. She regularly
    attends events at the local African‑American community center, which expose her to contemporary Black music, dance, and visual art. These cultural experiences inform her creative work, providing a rich
    tapestry of themes and motifs that she weaves into her drawings and digital projects. Yolanda feels a strong sense of responsibility to represent her heritage positively and to build bridges between
    her diverse classmates and the broader community.
attributes:
  skills: '["Organizational planning", "Time management", "Digital illustration (Procreate)", "Basic coding (Scratch)", "Public speaking", "Collaborative project coordination", "Photography basics", "Research
