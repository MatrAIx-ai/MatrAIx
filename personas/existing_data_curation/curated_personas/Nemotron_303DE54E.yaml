  hobbies: '["Sketching and watercolor painting", "Digital illustration on iPad", "Reading graphic novels and biographies", "Listening to R&B, hip‑hop, jazz, and soul music", "Participating in the school
    robotics club", "Volunteering as a peer tutor", "Attending local museum exhibitions and cultural festivals", "Journaling and creative writing"]'
  career_goals: Yolanda aspires to attend a high‑school program that emphasizes visual arts and technology, and she plans to pursue a degree in graphic design or multimedia storytelling at a university
    renowned for its liberal arts curriculum. She envisions a career where she can merge her love for art, technology, and community—such as becoming a multimedia artist, a creative director for socially‑focused
    campaigns, or an educator who teaches digital art to younger students. Her long‑term ambition includes launching a community art initiative in Manteca that showcases Black cultural narratives and provides
    free workshops for teens, allowing her to combine her organizational strengths with her desire to foster harmony and inclusion.
