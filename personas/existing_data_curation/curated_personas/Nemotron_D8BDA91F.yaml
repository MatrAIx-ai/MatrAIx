personas:
  professional: Daniela Oca, a senior market research director, leverages their bilingual fluency and mastery of SPSS, R, and Tableau to deliver culturally nuanced consumer insights for Latino markets,
    while their disciplined project‑management style and outgoing mentoring keep research teams both precise and energized.
  sports: Daniela Oca stays active through weekly salsa classes at the Brooklyn Community Center, gentle yoga at a local studio, and brisk walks in Prospect Park, while cheering on the New York Knicks in
    winter, the New York Yankees in summer, and they also join their bridge club on Saturday evenings.
  arts: Daniela Oca expresses their artistic side through watercolor paintings of tropical coastlines, immerses themselves in the rhythms of Celia Cruz and Marc Anthony during salsa nights, and draws inspiration
    from the novels of Julia Álvarez and the films of Fernando Pilar at the Brooklyn Caribbean Film Festival.
  travel: Daniela Oca prefers meticulously planned trips that blend cultural immersion with relaxation, returning each year to their family’s island for festive gatherings, while also exploring New Orleans’
    jazz scene, strolling the streets of Barcelona, and taking weekend getaways to the Catskill Mountains with their bridge club friends.
  culinary: Daniela Oca showcases their culinary expertise by preparing arroz con gandules, pernil, and pasteles for neighborhood potlucks, hand‑crafting sofrito with cilantro, garlic, and annatto, and
    pairing these dishes with fresh heirloom tomatoes and herb‑infused water, while they delight in occasional dining at Brooklyn’s Latin fusion bistro for a well‑executed mofongo.
  core: Daniela Oca blends disciplined research precision with salsa‑driven spontaneity, mentoring junior analysts while never missing a chance to dance, though they occasionally misplace their glasses
    during enthusiastic teaching moments.
background:
  cultural: Daniela was born to Puerto Rican parents and grew up bilingually, absorbing the island's rich traditions of music, storytelling, and communal celebration. After moving to New York as a young
    adult, she embraced the multicultural tapestry of Brooklyn while maintaining strong ties to her heritage through family gatherings, the observance of holidays like Nochebuena, and regular visits to
    Puerto Rico. Her cultural identity informs her professional lens, giving her a deep appreciation for the nuances of Latino consumer behavior and the importance of culturally resonant messaging. Daniela
    actively participates in local Puerto Rican cultural festivals, supports community organizations that promote Spanish language arts, and mentors younger Puerto Rican professionals, serving as a bridge
    between her island roots and the diverse fabric of her New York neighborhood.
attributes:
  skills: '[''Market research design'', ''Quantitative analysis (SPSS, Excel, R)'', ''Qualitative research (focus groups, in‑depth interviews)'', ''Data visualization (Tableau, PowerBI)'', ''Consumer behavior
    analysis'', ''Strategic planning'', ''Project management'', ''Bilingual communication (Spanish/English)'', ''Presentation and report writing'', ''Brand analysis'', ''Digital marketing metrics'', ''Social
    media analytics'', ''Stakeholder engagement'']'
  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Volunteer work at senior community centers'', ''Bilingual book club'', ''Watercolor painting'', ''Urban balcony gardening'', ''Yoga'',
    ''Bridge'', ''Traveling to Puerto Rico'', ''Photography of cultural festivals'']'
  career_goals: Daniela aims to leverage her decades of experience to become a senior research director specializing in multicultural consumer insights, particularly within the growing Latino market in
    the United States. She is passionate about mentoring the next generation of analysts, especially women and senior professionals re‑entering the workforce, and plans to develop a structured mentorship
    program within her organization. Over the next five years, she hopes to lead high‑visibility brand strategy projects that shape inclusive advertising campaigns, speak at industry conferences on the
    importance of cultural nuance in data interpretation, and eventually launch a boutique consultancy that helps small businesses in Brooklyn and Puerto Rico translate market research into actionable growth
    plans. Additionally, Daniela envisions co‑authoring a research‑focused book that chronicles the evolution of consumer trends among Caribbean diaspora communities.
