  hobbies: '[''Fantasy illustration'', ''Science‑fiction/fantasy reading'', ''Journaling'', ''Piano practice'', ''LEGO Technic building'', ''Sketching cityscapes'', ''Museum visits'', ''Coding interactive
    stories'', ''Mindfulness meditation'']'
  career_goals: Laurie aspires to attend a specialized high‑school program focused on visual arts and technology, eventually studying graphic design or game development at university. She dreams of becoming
    a concept artist or multimedia storyteller who blends illustration, narrative, and interactive media. She also hopes to use her experiences with stress and worry to advocate for mental‑health resources
    for teen creators, possibly integrating wellness themes into her future creative work.
