personas:
  professional: Laurie Wasserstrom, a 14‑year‑old aspiring digital storyteller, blends a love of fantasy illustration with budding coding skills to create interactive comic‑style apps, applying their methodical
    planning and relentless curiosity to craft detailed storyboards while balancing school assignments and after‑school clubs.
  sports: Laurie Wasserstrom enjoys seasonal participation in the Cincinnati West Side Soccer Club’s spring league, follows the Cincinnati Bengals on Sundays, and practices yoga three times a week to offset
    desk‑bound sessions building LEGO models and drawing, viewing fitness as a necessary counterbalance to prolonged sitting.
  arts: Laurie Wasserstrom spends weekends at the Cincinnati Art Museum admiring works by Monet and contemporary street artist Banksy, draws inspiration from authors Neil Gaiman and Brandon Sanderson for
    their fantasy sketches, and unwinds playing piano pieces by Ludovico Einaudi, all of which shape a vibrant personal aesthetic.
  travel: Laurie Wasserstrom’s travel diary includes a family road‑trip to St. Louis to visit the City Museum, a school‑organized field trip to Washington D.C.’s National Gallery of Art, and a coveted summer
    wish to explore the sci‑fi exhibitions at Tokyo’s Miraikan, preferring itineraries that blend cultural immersion with creative inspiration.
  culinary: Laurie Wasserstrom favors experimenting with homemade Cincinnati chili over spaghetti, enjoys crafting avocado toast topped with feta and cherry tomatoes, and boasts a modest skill level that
    lets them follow YouTube tutorials for sushi rolls, though they often burn the edges of their pan when distracted by a new LEGO build.
  core: Laurie Wasserstrom is a disciplined teen dreamer who balances meticulous planning with vivid imagination, channeling stress into art, code, and a modest savings habit while occasionally succumbing
    to nail‑biting anxiety.
background:
  cultural: Laurie comes from a white Midwestern family in Cincinnati, with roots that include German and Irish ancestry typical of the region. Her upbringing highlights community involvement, respect for
    public education, and exposure to local cultural institutions such as the Cincinnati Art Museum and the symphony. Family gatherings often feature shared meals and storytelling, reinforcing a sense of
    modesty and reliability. The city's seasonal festivals and the nearby parks provide Laurie with opportunities to explore nature and local arts, shaping her appreciation for both tradition and creative
    innovation.
