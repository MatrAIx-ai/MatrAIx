  career_goals: Although still in middle school, Aundre envisions a future where he can merge his love for art, technology, and community. He dreams of becoming a multimedia creator—perhaps a filmmaker
    or digital content producer—who can tell stories that reflect the experiences of Black youth in the South. He hopes to attend a specialized arts high school or earn a scholarship to study graphic design
    and film at a university. Long‑term, he aims to launch a YouTube channel or a community media hub that showcases local talent, offers mentorship, and raises awareness of social issues affecting his
    hometown. He also sees himself as an advocate for arts education, working to bring more creative resources to under‑served schools in Coosa County.
