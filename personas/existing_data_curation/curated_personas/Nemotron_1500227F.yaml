personas:
  professional: Shara Welch, a veteran inventory control manager with three decades mastering Fishbowl and NetSuite, leverages her meticulous, organized nature and skeptical eye for detail to streamline
    shipping processes while nurturing her curiosity for art by curating efficient, aesthetically pleasing warehouse layouts.
  sports: Shara Welch enjoys low‑impact fitness like walking the shores of Lake Minnetonka and cross‑country skiing in winter, follows the Minnesota Twins and the Vikings seasons, and participates in a
    senior bridge club that doubles as a casual social‑exercise gathering, preferring structured, small‑group activities over competitive leagues.
  arts: Shara Welch spends weekends painting watercolors of Minnesota lakes, draws inspiration from Claude Monet and Georgia O’Keeffe, regularly attends gallery openings in Stillwater featuring local artist
    Jane Hoss, and volunteers to teach basic drawing at the senior center, where her meticulous eye for composition shines.
  travel: Shara Welch prefers meticulously planned trips, opts for quiet lake‑side cabins in the Boundary Waters during summer and cultural tours of Florence’s Uffizi in the off‑season, balancing her love
    for nature with a craving for European art, all while budgeting carefully to keep travel within her retirement savings plan.
  culinary: Shara Welch enjoys cooking with fresh regional ingredients, favoring dishes like smoked walleye with dill, wild rice pilaf with cranberries, and blueberry rhubarb crisp, and while her skill
    level is intermediate, she often experiments with herb‑infused syrups for tea, yet she can be indecisive about seasoning, leading to occasional over‑salted meals.
  core: Shara Welch is a methodical logistics expert turned art enthusiast who balances careful planning with quiet creativity, often worrying about details but finding solace in watercolor brushstrokes
    and puzzle pieces.
background:
  cultural: Shara grew up in a small farming community in central Minnesota, raised in a family of German-Swedish descent that practiced the Lutheran faith. The region's values of hard work, self-reliance,
    and community involvement shaped her worldview. She maintains close ties to local traditions such as county fairs, seasonal potlucks, and church gatherings, while also embracing the Midwest's strong
    support for the arts through volunteer work at the town's community center and regional art festivals. Her cultural identity blends the pragmatic, modest ethos of the Upper Midwest with an appreciation
    for artistic expression.
