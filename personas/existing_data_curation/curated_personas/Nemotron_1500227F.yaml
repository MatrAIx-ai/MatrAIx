  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting local art galleries'', ''Reading art-history books'', ''Knitting'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Gardening'', ''Birdwatching'',
    ''Volunteering to teach art classes for seniors'', ''Playing chess'', ''Playing Scrabble'']'
  career_goals: Shara's primary career ambition is to advance to a supervisory position within the shipping-receiving department, where she can lead a small team, introduce lean-process improvements, and
    cut order-processing errors by at least 15%. She also aims to earn a certificate in supply-chain management to formalize her practical knowledge before retirement. In the longer term, she envisions
    transitioning to a part-time logistics consultant for local small businesses, which would free up time to curate and volunteer at community art projects and possibly teach art appreciation workshops
    at the senior center.
