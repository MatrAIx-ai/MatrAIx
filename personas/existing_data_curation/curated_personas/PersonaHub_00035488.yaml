persona_description: A politician who is known for his successful career in the Mexican political system, particularly within the Institutional Revolutionary Party (PRI). He is a former minister of planning
  and the budget, and was the presidential candidate of the PRI in 1988, losing to his brother, Raul Salinas de Gortari. Salinas was supported in his rise by Miguel de la Madrid, who had been one of his
  professors at the National Autonomous University. He is known for his efforts in economic retrenchment and privatization, as well as his efforts to open the Mexican economy to foreign investment and competition.
  He is also known for his involvement in the scandals and assassinations of high-ranking politicians after his tenure as president.
