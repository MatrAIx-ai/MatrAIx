  career_goals: David aims to earn Certified Safety Professional (CSP) credentials within the next three years and to lead a comprehensive safety‑and‑well‑being program at his organization that integrates
    mental‑health support for employees. He envisions advancing to a regional safety director role, where he can mentor junior staff and shape safety culture across multiple sites. Long‑term, he hopes to
    launch a consulting practice that offers holistic occupational health services, combining traditional safety measures with stress‑reduction and creative‑wellness workshops for both workplaces and the
    local community.
