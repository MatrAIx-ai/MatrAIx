  career_goals: Shuqing aims to move from a hands‑on maintenance role to a supervisory position, ultimately becoming a facilities manager or lead mechanic overseeing a diverse team of technicians. She plans
    to obtain advanced certifications in industrial automation and sustainable energy equipment, positioning herself to lead green‑technology retrofits across the Los Angeles County. Over the next five
    years, she hopes to launch a small consulting firm that blends mechanical reliability with artistic design, offering bespoke solutions for public art installations and community makerspaces. Mentoring
    younger workers—especially women and immigrants—remains a core ambition, as does building a reputation as a go‑to expert for innovative, resilient machinery solutions.
