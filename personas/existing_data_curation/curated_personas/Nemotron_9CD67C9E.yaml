  career_goals: John aims to transition from senior developer to lead software architect, focusing on building innovative tools that bridge technology and the arts. He is pursuing AWS Solutions Architect
    certification and deepening his knowledge of machine‑learning techniques to create generative‑art platforms. He also aspires to mentor emerging developers through local coding bootcamps and eventually
    launch a boutique consultancy that helps artists and cultural institutions digitize their work. Ultimately, John envisions a role where he can shape product strategy, foster interdisciplinary collaboration,
    and leave a lasting impact on the creative tech ecosystem.
