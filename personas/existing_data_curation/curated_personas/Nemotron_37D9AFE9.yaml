personas:
  professional: Bobby Lewis, a 34‑year‑old master machinist, blends precision CNC programming with metal sculpture, using Mastercam and Fusion 360 to produce custom artistic parts while competitively entering
    regional machining contests and planning a boutique workshop in Fort Myers; they thrive on meticulous detail and the quiet focus that solitary machining affords.
  sports: Bobby Lewis channels competitive energy into early‑morning kayaking along the Gulf coast, follows the Tampa Bay Buccaneers for football and the Miami Heat for basketball, and occasionally participates
    in a local rowing club’s off‑season drills, preferring low‑impact endurance over high‑intensity gym sessions.
  arts: Bobby Lewis, an introspective creator, spends weekends hand‑crafting scale models of vintage aircraft while photographing industrial textures, draws inspiration from Antony Gormley’s metal installations,
    and listens to Brian Eno’s ambient albums, all of which feed their avant‑garde artistic sensibility.
  travel: Bobby Lewis, whose workshop plans anchor them in Fort Myers, favors low‑cost solo trips to industrial museums in Detroit, sunrise kayaking tours in the Florida Keys, and maintains a long‑standing
    wish to explore Munich’s engineering heritage, balancing travel ambitions with a disciplined savings plan for their future boutique.
  culinary: Bobby Lewis, an amateur cook, prefers fresh Gulf seafood—grilling mahi‑mahi with smoked paprika and a citrus glaze, crafting shrimp tacos with pickled onions, and occasionally experimenting
    with bourbon‑glazed short ribs for post‑workshop gatherings, while keeping a modest repertoire of sous‑vide tools and a habit of over‑seasoning their dishes.
  core: Bobby Lewis, a 34‑year‑old CNC virtuoso, merges meticulous machining with metal art, lives frugally to fund a future boutique, stays calm under pressure, and finds solace in solitary kayaking and
    precise craftsmanship.
background:
  cultural: Bobby grew up in a middle‑class, white family in the suburban outskirts of Fort Myers, where a strong work ethic and self‑reliance were core values. The Florida Gulf Coast lifestyle—characterized
    by outdoor recreation, a blend of Southern hospitality, and a modest exposure to the region's diverse Hispanic influences—shaped his appreciation for quiet, solitary pursuits and a respect for community
    traditions. His upbringing emphasized practical skills, hands‑on learning, and a modest, understated pride in craftsmanship, all of which continue to inform his personal and professional identity.
attributes:
  skills: '[''CNC milling'', ''Lathe operation'', ''Blueprint reading'', ''Precision measurement (micrometer, caliper, CMM)'', ''CAM programming (Mastercam, Fusion 360)'', ''SolidWorks CAD modeling'', ''Tool
    and machine maintenance'', ''Troubleshooting hydraulic and spindle systems'', ''TIG/MIG welding'', ''Metal sculpture and artistic fabrication'', ''Additive manufacturing (metal 3D printing)'']'
  hobbies: '[''Scale model building (aircraft, vintage cars)'', ''Metal sculpture and artistic fabrication'', ''Kayaking on the Gulf'', ''Macro and landscape photography'', ''Listening to technology and
    art podcasts'', ''Reading science‑fiction and engineering non‑fiction'', ''Exploring new CNC and additive manufacturing techniques'']'
  career_goals: Bobby aims to transition from a skilled operator to a certified CNC programmer and eventually lead a small precision‑machining boutique that specializes in custom artistic metal parts for
    local designers and engineers. He plans to obtain a Journeyman Machinist certification and an advanced CNC programming credential within the next two years. Competitive by nature, he is targeting participation
    in regional machining contests to benchmark his expertise. Long‑term, he envisions opening his own workshop in Fort Myers where he can merge his technical mastery with his passion for metal art, offering
    both production services and limited‑edition sculptural pieces.
