personas:
  professional: Hue Hariprashad, a veteran licensed practical nurse with four decades of home‑health and community clinic experience, leverages meticulous assessment skills, wound‑care expertise, and bilingual
    communication to lead interdisciplinary teams while injecting their skeptical, structured mindset into curriculum design for future nurses.
  sports: Hue Hariprashad, a passionate member of the Broward Senior Walkers Club, competes in weekly bridge tournaments, counts daily steps with a walking group, and roots for the Miami Heat, Miami Dolphins,
    and Inter Miami CF while attending their games when possible.
  arts: Hue Hariprashad channels creative energy into watercolor landscapes of Florida sunsets, draws inspiration from Claude Monet and Georgia O'Keeffe, and enjoys listening to Celia Cruz, Ravi Shankar,
    and the Broadway hits of Lin‑Manuel Miranda during painting sessions.
  travel: Hue Hariprashad prefers organized cultural tours, having explored historic districts in Charleston, Savannah, and Boston, visited the temples of Kyoto and the ruins of Machu Picchu, and now dreams
    of a river cruise through the Danube and a culinary pilgrimage to Tuscany.
  culinary: Hue Hariprashad blends lemongrass, Thai basil, and kaffir lime with Florida mangoes and stone‑crab in inventive dishes like lemongrass‑marinated grilled snapper and mango‑basil salsa, showcasing
    advanced cooking skills at neighborhood potlucks while occasionally over‑spicing to test flavor boundaries.
  core: Hue Hariprashad is a pragmatic, socially vibrant nurse‑educator who balances structured mentorship with lively salsa, community gardening, and relentless curiosity about health and culture.
background:
  cultural: Hue Hariprashad was born to Vietnamese immigrants who settled in Florida after the Fall of Saigon. Growing up in a bilingual household, she navigated both Vietnamese traditions—such as honoring
    ancestors, celebrating Tet, and cooking family recipes—and the multicultural environment of South Florida. Her cultural identity emphasizes respect for elders, community solidarity, and a holistic view
    of health that blends conventional Western medicine with traditional remedies. Fluent in Vietnamese and English, Hue actively participates in local Asian-American nursing associations, and she incorporates
    cultural competency into her nursing practice, advocating for family involvement and culturally appropriate patient education.
attributes:
  skills: '[''Comprehensive patient assessment'', ''Chronic disease management'', ''Advanced wound care'', ''Medication safety and administration'', ''Infection control protocols'', ''Electronic health
    record (EHR) documentation'', ''Interdisciplinary team leadership'', ''Standard operating procedure development'', ''Mentorship and preceptorship'', ''Cultural competency in Southeast Asian health practices'',
    ''IV therapy certification'', ''Gerontological nursing certification'', ''Quality improvement and compliance'']'
  hobbies: '[''Salsa and Latin dance classes'', ''Community gardening and urban farming'', ''Cooking fusion Southeast Asian-Florida cuisine'', ''Volunteering at senior health fairs'', ''Reading medical
    journals and historical fiction'', ''Walking and step-count challenges with local groups'', ''Bridge club competitions'', ''Traveling with cultural tours'', ''Health blogging'', ''Watercolor painting'']'
  career_goals: As she approaches the traditional retirement age, Hue aims to transition to part‑time mentorship and education while maintaining a hands‑on clinical presence. Her primary ambition is to
    become an adjunct faculty member at a local community college, where she can train the next generation of practical nurses with an emphasis on structured care planning and cultural sensitivity. She
    is also developing a community‑based health navigation program that provides health literacy workshops for Southeast Asian seniors in Broward County, hoping to secure grant funding and be recognized
    as a leader in multicultural geriatric care. Hue aspires to publish articles on evidence‑based wound care and present at regional nursing conferences, ultimately earning a reputation as a trusted consultant
    for home‑health agencies.
