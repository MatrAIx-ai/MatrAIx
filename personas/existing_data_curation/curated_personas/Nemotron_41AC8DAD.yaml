personas:
  professional: Hazel Tran, a 25‑year‑old construction laborer in Norman, blends rigorous OSHA‑certified safety practices, blueprint reading, and hands‑on carpentry with a compassionate, team‑mediating
    style, and despite a sometimes‑scatterbrained approach to paperwork, they are steadily building toward a foreperson role and eventually an employee‑owned contracting firm focused on affordable housing.
  sports: Hazel Tran enjoys low‑impact fitness, frequently hiking the Lake Thunderbird trails with the local Norman Trail Hikers club and joining occasional weekend pick‑up volleyball games, while cheering
    on the Oklahoma Sooners football team in the fall and the Oklahoma City Thunder in the NBA season.
  arts: Hazel Tran finds solace in acoustic folk playlists featuring Bon Iver, The Lumineers, and Mumford & Sons, while devouring contemporary fiction by Sally Rooney and Celeste Ng and doodling in a weather‑worn
    sketchbook during evenings of quiet contemplation.
  travel: Hazel Tran prefers low‑key weekend getaways to natural spots like Santa Fe’s high desert and the Grand Canyon, plans trips spontaneously within a tight budget, yet always returns refreshed to
    their Norman balcony garden for a weekend of herb‑infused cooking.
  culinary: Hazel Tran, an avid home‑cook, often prepares comforting chicken noodle soup, herb‑roasted salmon with rosemary and thyme, and a quinoa‑mint salad, drawing fresh basil and cilantro from their
    balcony garden while experimenting with occasional spicy chili using jalapeños and smoked paprika.
  core: Hazel Tran is a compassionate, structure‑loving yet occasionally disorganized DIY‑enthusiast who balances construction expertise with quiet hobby pursuits while dreaming of leading a community‑focused
    contracting firm.
background:
  cultural: Hazel grew up in Norman, Oklahoma, in a white, middle‑class family with deep roots in the Midwest and Great Plains. Her upbringing emphasized community involvement, self‑reliance, and a strong
    work ethic typical of the region. Family traditions include celebrating Thanksgiving, the Fourth of July, and local events like the Norman Summerfest. She was raised attending a local Baptist church,
    which reinforced values of compassion and cooperation. Living in a diverse construction environment has broadened her cultural awareness, and she respects the varied backgrounds of her coworkers, often
    acting as a bridge for inclusive teamwork.
attributes:
  skills: '["General construction labor","Concrete forming","Basic carpentry","Power tool operation","OSHA 30‑hour safety certification","Blueprint reading and interpretation","Basic plumbing tasks","Basic
