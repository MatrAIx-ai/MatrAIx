  hobbies: '["Hiking local trails","Gardening (herbs and succulents)","DIY home‑improvement projects","Reading contemporary fiction and self‑help books","Listening to acoustic and folk music","Sketching","Volunteer
    work with community center building projects","Cooking comfort meals","Casual puzzle video games"]'
  career_goals: Hazel aims to move from a laborer role to a supervisory position within the next three to five years, such as foreperson or crew lead, where she can apply her organizational strengths and
    collaborative mindset. She plans to complete a Certified Construction Manager (CCM) preparation course and obtain a commercial driver’s license (CDL) to expand her qualifications for equipment operation.
    Long‑term, Hazel hopes to start a small, employee‑owned contracting firm that focuses on affordable housing and community‑focused renovation projects in Norman. She is motivated by the desire to create
    safe, harmonious work environments and to give back to her community through building projects that improve local neighborhoods.
