  professional: Michael Peltonen blends his STEM background with hands-on mechanical curiosity, and they leverage persuasive communication and a relaxed planning style to consistently exceed parts-sales
    targets while eyeing a Regional Sales Manager position and a part-time MBA.
  sports: Michael Peltonen stays active by joining pickup basketball games at the local YMCA, and they play in the Lakeview Flyers ultimate frisbee league, cheer for the Detroit Pistons and Detroit Lions,
    and follow the Michigan Wolverines football team each autumn.
  arts: Michael Peltonen nurtures their creative side by strumming acoustic guitar at open-mic nights, and they immerse themselves in live performances by The Avett Brothers, Jack White, and local garage
    band The Midnight Oil, and dominate community trivia nights with their pop-culture knowledge.
  travel: Michael Peltonen favors spontaneous weekend road trips along Michigan's lakeshore, and they often stop at Mackinac Island, explore Sleeping Bear Dunes, and occasionally venture to Nashville for
    its music scene, preferring last-minute itineraries over detailed travel planning.
  culinary: Michael Peltonen loves cooking hearty meals such as pork shoulder braised with Michigan cherries, loaded mac and cheese, and chili topped with shredded cheddar, and they enjoy sourcing fresh
    cherries, maple syrup, and locally milled flour from the Eastern Market to create comforting dishes for friends.
  core: Michael Peltonen is a curiosity-driven, sociable parts-sales professional, and they balance classic-car tinkering, spontaneous road trips, and acoustic-guitar jams with a laid-back yet sometimes
    disorganized lifestyle, all while wrestling with occasional stress.
background:
  cultural: Michael grew up in Kalamazoo, Michigan, in a family with Finnish roots—reflected in his last name Peltonen—alongside broader Midwestern American influences. His household celebrated traditional
    Finnish holidays like Juhannus while also embracing local customs such as the Kalamazoo County Fair. This blend of heritage and regional culture fostered his appreciation for community gatherings, outdoor
    recreation, and a pragmatic work ethic. He identifies as white American, and his cultural experiences shape his friendly, inclusive demeanor and his respect for both tradition and innovation.
