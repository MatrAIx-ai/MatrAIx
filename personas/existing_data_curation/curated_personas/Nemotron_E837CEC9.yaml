personas:
  professional: Catrina Adam, a veteran registered nurse with four decades of acute-care and community-health experience, leverages meticulous assessment and wound-care expertise while they channel a competitive
    drive and anxiety-management techniques into mentoring new staff and championing evidence-based geriatric protocols.
  sports: Catrina Adam finds primary exercise in daily walks along the Androscoggin River, supplements this with weekly senior yoga at the Lewiston Community Center, and they cheer on the Boston Red Sox
    and the Portland Sea Dogs while occasionally joining the local senior softball league for friendly competition.
  arts: Catrina Adam weaves historical fiction and biographies of pioneering women into their evenings, enjoys the folk melodies of Joni Mitchell and the classical piano works of Debussy, and they regularly
    visit the Portland Museum of Art to admire works by Winslow Homer, all of which inspire their knitting designs for shelter blankets.
  travel: Catrina Adam prefers low-key, purpose-driven trips that blend history and nature, having toured the Freedom Trail in Boston, explored the cobblestone streets of Charleston in South Carolina, and
    they plan a serene autumn pilgrimage to Acadia National Park, always arranging modest accommodations through friends to keep costs manageable.
  culinary: Catrina Adam delights in harvesting fresh herbs from their garden to craft herb-infused vinaigrettes for roasted beet and goat-cheese salads, whips up hearty vegetable soups seasoned with thyme
    and sage, and they, despite modest kitchen confidence, treat their shelter knitting circles to warm zucchini gratins and apple-cinnamon crumble.
  core: Catrina Adam balances a fierce competitive edge and lingering anxiety with a nurturing love for gardening, knitting, and mentoring, and they often channel their meticulous nature into both patient
    care and perfecting the stitch pattern for the next blanket.
background:
  cultural: Catrina was born and raised in the Lewiston area of Androscoggin County, Maine, a region shaped by a working‑class New England heritage with strong French‑Canadian and Irish immigrant roots.
    Her family’s modest Protestant upbringing emphasized self‑reliance, community responsibility, and practical benevolence—values that continue to guide her daily life. She identifies with the New England
    tradition of straightforward, pragmatic interaction while also appreciating Lewiston’s multicultural fabric, having learned a few French phrases from neighbors and participating in local festivals.
    The seasonal rhythms of Maine—harsh winters, vivid autumn foliage, and long summer evenings—have nurtured her love of gardening and bird‑watching, reinforcing a cultural resilience that mirrors her
    personal perseverance. Her deep connection to the local community is reflected in her volunteer work, mentorship in nursing, and commitment to improving the health and well‑being of her neighbors.
