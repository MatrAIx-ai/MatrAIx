  career_goals: Catrina aims to transition into a formal preceptor role, guiding newly licensed nurses and sharing her wealth of practical knowledge. She plans to earn a certification in geriatric nursing
    or palliative care to deepen her specialty expertise. Looking ahead, she envisions part‑time consulting for home‑health agencies, using her experience to refine care protocols. Passionate about mental‑health
    advocacy, she seeks opportunities to promote support resources for healthcare workers, drawing on her own experiences with anxiety. Ultimately, she wishes to leave a lasting legacy of improved patient
    safety and compassionate care in the Lewiston community, perhaps by establishing a volunteer education program for seniors.
