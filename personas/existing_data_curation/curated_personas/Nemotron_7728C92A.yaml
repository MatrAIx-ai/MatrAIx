personas:
  professional: Tyson Arias, a 50‑year‑old aspiring part‑time handyman and home‑catering specialist, leverages his hands‑on repair, woodworking, and gardening expertise along with bilingual communication
    skills to offer personalized services that blend practical problem‑solving with a calm, cooperative approach, while also coordinating neighborhood events and mentoring younger residents.
  sports: Tyson Arias stays active by walking his local park trails, playing in a senior softball league on Saturdays, and joining casual basketball pick‑up games at the community center, all while cheering
    for the Los Angeles Dodgers, Los Angeles Lakers, and LA Galaxy with a relaxed, community‑spirit focus.
  arts: Tyson Arias immerses himself in regional sounds ranging from Vicente Fernández’s classic rancheras to Arturo Sandoval’s vibrant Latin jazz, regularly attending small mariachi performances at local
    festivals and enjoying classic films by Alfonso Cuarón, reflecting a quiet yet passionate appreciation for cultural artistry.
  travel: Tyson Arias plans his travel around modest road trips to places like Joshua Tree National Park and Seville, Spain, while dreaming of a culturally immersive visit to Oaxaca’s culinary markets,
    balancing careful budgeting with a spontaneous love for exploring new landscapes.
  culinary: Tyson Arias crafts authentic dishes such as mole poblano, chiles rellenos, and fresh salsa verde using heirloom chilies, roasted cumin, and hand‑picked cilantro from his garden, approaching
    cooking with a skilled yet experimental hand that blends tradition with occasional fusion twists.
  core: Tyson Arias is a calm, resourceful 50‑year‑old who gardens, fixes, and cooks with quiet confidence, yet often forgets to schedule dental cleanings and talks to his tomato vines like old friends.
background:
  cultural: Tyson grew up in a Mexican‑American household in Southern California, where his family maintains strong ties to Mexican cultural traditions. They celebrate holidays such as Día de los Muertos
    and Mexican Independence Day with food, music, and family gatherings, emphasizing hospitality and respect for elders. Bilingual, Tyson navigates both Spanish and English contexts, blending the communal
    values of his heritage with the multicultural environment of Westminster, Orange County. He values family cohesion, mutual support, and the preservation of cultural customs while engaging with the broader
    suburban community.
