  career_goals: Tyson aims to translate his practical expertise into a part‑time handyman service that serves his local community, providing supplemental income while preserving flexibility. He also hopes
    to develop a small home‑based catering venture focused on authentic Mexican dishes, leveraging his cooking skills and cultural heritage. Additionally, he aspires to mentor younger community members
    by sharing his knowledge of home maintenance and gardening, and to continue fostering neighborhood cohesion through volunteer leadership. He plans to obtain relevant certifications, such as a handyman
    license and a food handling permit, to formalize his capabilities.
