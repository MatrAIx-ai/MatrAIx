  career_goals: Rene imagines a future where he can combine his love for building things with helping others, so he often says he wants to become an engineer or a firefighter. He is fascinated by how bridges
    are built and how fire trucks work, and he dreams of designing safe structures that protect people. His competitive nature also fuels an ambition to excel in school science fairs and possibly become
    a pilot someday, seeing it as a way to explore new ideas while mastering practical skills.
