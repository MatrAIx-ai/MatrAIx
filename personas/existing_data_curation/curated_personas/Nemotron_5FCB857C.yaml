personas:
  professional: Joaquin Fernandez, a retired community organizer, uses their bilingual communication, hands‑on handyman skills, and modest bookkeeping expertise to coordinate neighborhood festivals, mentor
    younger relatives in cultural traditions, and lead cooking workshops, preferring flexible, spontaneous planning over rigid schedules.
  sports: Joaquin Fernandez, a devoted fan of the Dallas Cowboys and FC Dallas, gathers with friends at the senior center’s weekly game‑watch sessions, stays fit through regular salsa and cumbia dancing,
    and participates in a seasonal bocce league to keep active during cooler months.
  arts: Joaquin Fernandez, who sings in the church choir every Sunday, draws artistic inspiration from Carlos Santana’s guitar virtuosity, Gloria Estefan’s vibrant salsa rhythms, and Johnny Cash’s storytelling
    ballads, often sketching designs for simple wooden furniture while humming these tunes.
  travel: Joaquin Fernandez, who favors relaxed road trips over strict itineraries, returns each summer to his family’s hill‑top hometown, enjoys weekend excursions to Austin’s live‑music venues, and dreams
    of strolling the historic plazas of Seville, all while carefully budgeting travel expenses against his pension.
  culinary: Joaquin Fernandez, an accomplished home cook, delights in preparing authentic tacos al pastor with smoked chilies, heirloom tomato salsa, and homemade corn masa, while also crafting fresh guacamole,
    tamales, and vibrant pozole for community cooking classes.
  core: Joaquin Fernandez, a lively 74‑year‑old community pillar, blends spontaneous curiosity with practical hands‑on skills, dancing, gardening, and storytelling, even as they occasionally misplace a
    bill or forget a prescription.
background:
  cultural: Joaquin is a first‑generation Mexican‑American whose parents emigrated from the state of Jalisco. He grew up speaking Spanish at home, celebrating Día de los Muertos, Semana Santa, and Mexican
    Independence Day, and adhering to Catholic traditions. His identity blends Mexican heritage—especially the cuisine, music, and family values of his hometown—with the Texas community he has called home
    for most of his life, fostering a strong sense of belonging in Dallas' vibrant Mexican diaspora.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Basic bookkeeping and budgeting'', ''Automotive maintenance'', ''Cooking traditional Mexican cuisine'', ''Community event planning and coordination'',
