  hobbies: '[''Salsa and cumbia dancing'', ''Watching Mexican soccer matches'', ''Gardening (chilies, tomatoes, herbs)'', ''Traveling to Jalisco for family visits'', ''Board games and bingo'', ''Church
    choir singing'', ''Woodworking and small carpentry projects'']'
  career_goals: Although retired, Joaquin aims to remain a pillar of his community. He wants to mentor younger relatives in Mexican cultural traditions, compile and publish a memoir of his family's journey
    from Jalisco to Texas, volunteer regularly at the local senior center teaching cooking classes, lead cultural workshops at Dallas' annual Cinco de Mayo celebrations, and stay physically active to maintain
    his health and independence.
