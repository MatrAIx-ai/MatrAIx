personas:
  professional: David Huber, a retired handyman turned community historian, leverages decades of woodworking, minor electrical and plumbing expertise along with their keen research skills to craft custom
    furniture and curate local history narratives, channeling their curiosity and relaxed approach into volunteer docent work and mentorship at the museum, while their competitive streak surfaces in meticulous,
    detail‑driven projects.
  sports: David Huber stays active with gentle walks along the Burbank Greenway and a weekly senior softball league at Willow Creek Community Center, cheers on the Chicago Cubs and Chicago Bulls on television,
    and is a member of the Burbank Senior Activity Center’s chess club, which serves as their primary competitive outlet.
  arts: David Huber, an avid watercolorist and photographer, draws inspiration from Monet’s soft palettes, Ansel Adams’ dramatic landscapes, and the jazz stylings of Miles Davis, frequently visits the Art
    Institute of Chicago’s rotating exhibits, and hosts informal critique gatherings featuring works by local artist Sarah Lin, which reflects their endless curiosity.
  travel: David Huber prefers relaxed, well‑planned trips such as a yearly weekend getaway to the historic town of Galena, a 2019 pilgrimage to the art museums of Paris, and a recent cruise to the Caribbean,
    always booking senior‑friendly accommodations and relying on their tablet to map accessible routes.
  culinary: David Huber enjoys preparing simple, garden‑fresh meals like heirloom tomato bruschetta, roasted beets with goat cheese, and occasional fish chowder, considers themselves a competent home cook
    who loves experimenting with fresh herbs like rosemary and thyme, yet often orders their favorite pepperoni pizza from the local pizzeria when arthritis flares.
  core: David Huber, a curious octogenarian with a competitive streak, blends artistic pursuits, hands‑on craftsmanship, and a skeptical yet steady approach to life, all while habitually misplacing their
    glasses and forgetting appointments until reminded by their tablet alarm.
background:
  cultural: David was born and raised in the post‑World War II Midwest, a period that instilled a blend of self‑reliance and community orientation typical of the region. His upbringing in a predominantly
    white, working‑class neighborhood emphasized modesty, prudence, and a respect for tradition, while also exposing him to the cultural shifts of the 1950s‑1970s—rock‑n‑roll, classic cinema, and the burgeoning
    modern art scene. Relocating later to suburban Burbank in Cook County introduced him to a more diverse urban tapestry, fostering an appreciation for varied cultural expressions without altering his
    core values of independence and thoughtful curiosity. This background informs his aesthetic tastes, his respect for local history, and his preference for intimate, meaningful social interactions.
