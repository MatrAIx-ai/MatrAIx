personas:
  professional: Jeanne Vega, a seasoned volunteer coordinator at her church, applies her methodical record‑keeping, meal‑planning expertise, and meticulous attention to detail to schedule weekly events,
    manage community outreach, and maintain the church’s historical archives, ensuring that everything runs smoothly and predictably.
  sports: Jeanne Vega, a dedicated member of the community senior walking club, enjoys leisurely morning walks on the local park trail to spot birds, watches the regional minor‑league baseball team the
    River City Rattlers during summer, and follows the national women’s tennis circuit, believing that low‑impact activity and gentle cheering keep her both physically and mentally fit.
  arts: Jeanne Vega, an avid fan of classic cinema and gospel music, treasures the films of Frank Capra and John Ford, listens to Mahalia Jackson and Johnny Cash on her vintage record player, admires the
    quilting designs of folk artist Lucy Morgan, and finds inspiration in the poetry of Robert Frost, which influences her needlework and reading choices.
  travel: Jeanne Vega, who prefers planned, low‑stress trips, revisits historic sites like Gettysburg and Shenandoah National Park on weekend drives, dreams of a serene tour of England’s cottage gardens,
    and enjoys annual family pilgrimages to the seaside town of Asheville and the Blue Ridge Parkway, balancing her love of nature with a cautious itinerary that respects her health.
  culinary: Jeanne Vega, a skilled home preserve artisan, transforms her heirloom tomatoes, pickles okra, and ferments cabbage into homemade jams and relishes, pairs them with cornbread and slow‑cooked
    beans, and delights in cooking for her grandchildren using fresh dill, thyme, and cracked black pepper, while modestly rating herself as an intermediate chef who favors time‑honored comfort foods.
  core: Jeanne Vega, an 80‑year‑old garden‑to‑table storyteller, blends disciplined organization with quiet devotion to tradition, navigating life through meticulous record‑keeping, gentle routines, and
    a steadfast commitment to preserving family heritage.
background:
  cultural: Jeanne was raised in Ranger, a small community in the foothills of northern Georgia, and her cultural identity is rooted in the Southern Appalachian white tradition. Her upbringing emphasized
    church participation, self‑reliance, and deep connections to the land. She grew up with Southern comfort food, folk music, and a strong oral storytelling tradition, and she continues to honor these
    customs through her cooking, needlework, and community involvement.
attributes:
  skills: '["Meal planning and cooking", "Home budgeting and financial management", "Garden cultivation and maintenance", "Canning and food preservation", "Quilt making and needlework", "Basic computer
    use (email, video calls)", "Organizing church events and volunteer coordination", "Medication and health schedule management", "Genealogy research and record keeping", "Simple home repairs and maintenance"]'
  hobbies: '["Heirloom vegetable gardening", "Canning and food preservation", "Knitting and crochet", "Quilt making", "Reading historical fiction and local history", "Crossword puzzles", "Watching classic
    films", "Listening to gospel and classic country music", "Birdwatching", "Nature walks"]'
  career_goals: Jeanne's primary ambition is to maintain her independence and health while continuing to share the knowledge she has gathered over a lifetime. She plans to complete a written memoir of her
    family's history and recipes, teach her grandchildren the art of quilting and canning, and remain an active, organized volunteer for scheduling events at her church. Ensuring that her home remains orderly
    and that her loved ones have access to the family traditions she values are central to her goals.
