  career_goals: John aims to transition into a technology leadership role, such as Director of Engineering or Chief Technology Officer, where he can shape product vision and drive innovative solutions that
    blend commerce and creativity. He is interested in spearheading initiatives that leverage AI and immersive media to transform the art and entertainment sectors, reflecting his curiosity about unconventional
    ideas. Over the next five years, he plans to lead a cross‑functional team, launch at least one successful product line, and mentor emerging talent. Ultimately, he envisions founding his own startup
    that offers AI‑augmented tools for artists and designers, capitalizing on his business acumen and technical expertise.
