personas:
  professional: Shaunte Braden is a personal‑service operations manager who leverages advanced Excel, SQL, and Python to automate workflows; they balance a curiosity for emerging beauty‑tech with a pragmatic,
    ROI‑focused mindset, and use a flexible, occasionally‑disorganized planning style to champion inclusive training and agile scheduling for diverse teams.
  sports: Shaunte Braden enjoys weekend hikes in the Cascades and paddle‑boarding on Puget Sound; they are a member of a local hiking club that meets monthly and fervently support the Seattle Seahawks,
    Seattle Mariners, and Seattle Sounders, often cheering them on while maintaining a modest jogging routine.
  arts: Shaunte Braden curates eclectic playlists that weave classic jazz from John Coltrane with contemporary R&B artists like H.E.R. and Kamasi Washington; they attend monthly spoken‑word open mics at
    community centers and devour speculative fiction by N.K. Jemisin, using these artistic influences to fuel their culinary creativity.
  travel: Shaunte Braden favors spontaneous road trips to the Pacific Northwest’s national parks—Olympic, Mount Rainier, and the San Juan Islands—while dreaming of a cultural immersion in Kyoto; they balance
    their love of nature with a modest budget that leads them to camp under the stars rather than stay in luxury hotels.
  culinary: Shaunte Braden experiments with modern twists on soulful dishes, turning collard greens into a quinoa‑enhanced salad, infusing sweet potato gnocchi with smoked paprika, and crafting a kale‑and‑black‑eyed‑pea
    stew; they maintain a whole‑food, health‑focused kitchen that showcases their intermediate cooking skills.
  core: Shaunte Braden is a data‑driven service leader who blends curiosity with practicality; they navigate life’s stress with yoga and mindfulness, and constantly balance community‑centric ambition with
    a relaxed, sometimes‑disorganized approach to planning.
background:
  cultural: Shaunte grew up in a tight‑knit African‑American family in the Pacific Northwest, with deep roots tracing back to the Southern United States. Her parents emphasized resilience, education, and
    community service, shaping her commitment to mentorship and collective uplift. She actively participates in Tacoma’s Black community events, such as the annual Juneteenth celebration and local Black
    History Month panels, where she shares her professional journey to inspire others. Shaunte’s cultural identity informs her value of inclusive spaces, driving her to create workplaces where diverse voices
    are heard and celebrated. She also incorporates elements of her heritage into her culinary experiments and music selections, weaving cultural pride into everyday life.
