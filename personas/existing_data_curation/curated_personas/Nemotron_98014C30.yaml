personas:
  professional: Kent Singh is a budding digital artist and junior game creator who channels their curiosity and love for comic‑style storytelling into daily sketches, experimental digital paintings, and
    building modest Minecraft mods, while their relaxed approach to deadlines often leaves projects half‑finished but brimming with fresh ideas.
  sports: Kent Singh kicks a soccer ball at the local park every weekend with the City United Youth club, competes fiercely in pick‑up matches, follows the MLS team LA Galaxy, and uses the sport as an outlet
    for their high energy while remaining skeptical of teammates’ commitment.
  arts: Kent Singh immerses themselves in comic‑book culture, drawing inspiration from Stan Lee, Jack Kirby, and the graphic novel series ‘Saga’, creates short TikTok art videos, binge‑watches sci‑fi movies
    like ‘Blade Runner 2049’, and constantly experiments with new markers, water‑colors, and digital brushes to satisfy their open‑minded curiosity.
  travel: Kent Singh dreams of a spontaneous trip to Tokyo’s Akihabara district to explore anime shops and sushi stalls, has already visited the city’s science museum on a school field trip, and prefers
    impulse‑planned weekend getaways over detailed itineraries despite occasional anxiety about missing school work.
  culinary: Kent Singh favors quick, flavorful meals such as pepperoni pizza, chicken tacos with salsa, and cheesy nachos, can barely boil pasta without burning it, but loves experimenting with bright food
    coloring to create 'comic-style' cupcakes, reflecting their artistic flair in the kitchen.
  core: Kent Singh blends a fierce competitive streak in gaming and soccer with a boundless curiosity for art and sci‑fi, while their relaxed attitude toward obligations and frequent worries paint a portrait
    of an energetic yet occasionally disorganized twelve‑year‑old.
background:
  cultural: Kent lives in Murrieta, a suburban city in Riverside County, where his family follows a typical middle‑class Anglo‑American lifestyle. He celebrates national holidays such as the Fourth of July
    and Thanksgiving, and is exposed to a blend of mainstream American pop culture and the multicultural influences of Southern California, including occasional participation in local community festivals
    and school multicultural events. His upbringing emphasizes independence, curiosity, and a relaxed approach to schedules, reflecting the region’s laid‑back yet diverse atmosphere.
