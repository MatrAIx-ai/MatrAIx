  career_goals: Kent envisions turning his love for art and gaming into a career as a video‑game designer or animator, hoping to study animation or computer science in a specialized high‑school program
    and eventually work at a game studio. He also dreams of becoming a notable content creator on platforms like TikTok or a competitive soccer player, though he often worries about balancing school expectations
    with his creative and athletic ambitions.
