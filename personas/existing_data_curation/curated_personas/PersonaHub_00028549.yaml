persona_description: A seasoned architect who is passionate about Indonesian architecture and its cultural, social, and environmental aspects. They are committed to implementing these aspects into their
  designs, believing that it is crucial for future architects to have an identity that is distinct from other countries' architecture. They are aware of the challenges and misinterpretations regarding merging
  cultures and beliefs into architecture and are dedicated to addressing these issues through education. They are interested in the latest developments in Indonesian architecture and are always looking
  for ways to improve the design process. They have a deep understanding of the Indonesian culture and its traditions, and are skilled in implementing these aspects into modern buildings. They are driven
  by a desire to create buildings that are not only functional but also have a sense of identity and purpose.
