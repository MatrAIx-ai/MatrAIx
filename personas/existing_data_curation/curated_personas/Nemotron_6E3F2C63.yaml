  hobbies: '[''Watercolor painting'', ''Crocheting and lacework'', ''Vietnamese calligraphy'', ''Experimental cooking (fusion of Southeast Asian and Oregonian cuisine)'', ''Reading speculative fiction and
    philosophy'', ''Crossword puzzles'', ''Senior dance classes'', ''Community choir participation'', ''Volunteering at local senior center (craft workshops)'', ''Herb and vegetable gardening'']'
  career_goals: Hongngoc aims to transition from employee to an independent senior‑household consulting service that specializes in eco‑friendly cleaning and aesthetic household harmony for the aging population
    in the Portland metro area. She seeks to mentor younger domestic workers, develop a niche brand known for high standards and artistic touch, and secure a reliable income stream to support her grandchildren’s
    education. Concurrently, she plans to deepen her artistic practice through community art courses and eventually curate a small exhibition of her watercolor works that reflect her Southeast Asian heritage
    and Oregon landscapes. She also hopes to document her life story in a memoir that celebrates cultural integration and resilience.
