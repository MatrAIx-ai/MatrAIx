personas:
  professional: Joel Cherry, a methodical IT support specialist with over two decades of experience troubleshooting hardware, scripting automation in PowerShell and Python, and championing ITIL processes,
    now channels their imaginative curiosity toward a future Service Desk Manager role where they can blend technical leadership with creative digital learning experiences.
  sports: Joel Cherry, an avid outdoor enthusiast who joins the Sioux Falls Running Club for sunrise hikes in the Black Hills, cycles the Big Sioux River trail with the local cycling group, and cheers on
    the Minnesota Vikings, the Sioux Falls Storm, and the Chicago Cubs, balances seasonal activities like winter snowshoeing and summer fishing trips, and they often volunteer as a race marshal during community
    runs.
  arts: Joel Cherry, a watercolor painter inspired by Claude Monet and a digital illustrator who emulates Hayao Miyazaki’s style in Adobe Creative Suite, also strums acoustic guitar to John Mayer and performs
    improv sketches at the local theater, regularly attends the Sioux Falls Art Festival where they showcase their vintage computer‑themed collages.
  travel: Joel Cherry, a planner who blends weekend getaways to the Black Hills, Yellowstone, and a yearly culinary tour of Kyoto with spontaneous road trips to Minnesota’s Boundary Waters, prefers a mix
    of adventure hiking and relaxed market visits, yet balances travel with their family’s school schedule and modest travel budget.
  culinary: Joel Cherry, an intermediate home cook who delights in grilling locally caught trout with rosemary‑infused butter, crafting bison burgers topped with heirloom tomatoes, and experimenting with
    kimchi‑style pickles after visiting a farmer’s market, while occasionally indulging in a nightly slice of pepperoni pizza as a quick reward, and they love sharing meals with friends at board‑game nights.
  core: Joel Cherry, a 49‑year‑old tech guru with a painter’s soul, merges methodical troubleshooting with spontaneous watercolor sessions, budget‑conscious investing, and a love for snowshoeing, yet can’t
    resist a late‑night slice of pizza after a marathon board‑game night, and they always carry a spare set of colored pencils in their bag.
background:
  cultural: Joel grew up in the Upper Midwest, raised in a family with German‑Scandinavian roots typical of South Dakota’s settler heritage. The region’s emphasis on community, self‑reliance, modesty, and
    practicality shaped his values and work ethic. He reflects Midwestern hospitality—friendly, collaborative, and modest—while embracing the growing cultural diversity of Sioux Falls. Participation in
    local traditions such as county fairs, community service through his Lutheran church, and support for regional arts and outdoor recreation are integral to his identity. This blend of northern European
    ancestry and contemporary Midwestern life informs his balanced outlook, combining a strong sense of duty with a genuine curiosity for novelty and creative expression.
