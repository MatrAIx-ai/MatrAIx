  career_goals: Joel aims to transition into an IT leadership role, such as Service Desk Manager or IT Operations Lead, where he can oversee a team, drive process improvements, and champion a culture of
    continuous learning. He intends to deepen his expertise in cloud architecture and cybersecurity by earning certifications like AWS Solutions Architect and CISSP. Additionally, he wants to integrate
    his creative passions by developing interactive digital learning experiences and leading community tech workshops that blend technical skill‑building with artistic expression.
