personas:
  professional: Maedell Copper, an aspiring teen game developer, blends curiosity for science‑fiction with practical Python and Scratch coding skills, creating interactive stories while balancing schoolwork
    and volunteer duties, and uses their meticulous yet flexible mindset to iterate on prototypes and collaborate in small, supportive coding clubs.
  sports: Maedell Copper enjoys leisurely nature walks in the nearby state park and is a member of the local youth hiking club, while also cheering for the regional baseball team, the River City Ravens,
    and occasionally joins a school‑organized intramural badminton group for light cardio.
  arts: Maedell Copper finds artistic inspiration in the minimalist piano works of Ludovico Einaudi, sketches scenes reminiscent of Studio Ghibli's Hayao Miyazaki, and admires the storytelling of author
    Andy Weir, weaving these influences into their journal entries and code narratives.
  travel: Maedell Copper favors planned, low‑key trips such as weekend camping at Pine Ridge State Forest and day excursions to the city’s science museum, while dreaming of a future adventure to Iceland’s
    volcanic landscapes and Japan’s anime‑filled Akihabara district.
  culinary: Maedell Copper, a budding baker, enjoys crafting chocolate‑chip cookies and fudgy brownies with dark chocolate and sea‑salt, experiments with simple pasta dishes like garlic‑butter spaghetti,
    and often shares these treats during community center gatherings, reflecting a moderate cooking skill level and love for comfort foods.
  core: Maedell Copper is a quiet, curiosity‑driven teen who balances coding, piano, and nature walks with a calm, organized approach, sharing homemade treats while quietly excelling in school and community
    projects.
background:
  cultural: Maedell is African American, raised in a close‑knit family in Westerville, Ohio. Her grandparents share stories of the Great Migration and stress the importance of education, community service,
    and resilience. The family attends a local Baptist church, where she participates in the youth choir and occasional community outreach events. Cultural traditions in her household include celebrating
    Juneteenth, preparing soul‑food dishes such as collard greens, sweet potato pie, and cornbread, and listening to a wide range of music from gospel and classic R&B to contemporary hip‑hop. She takes
    pride in the achievements of Black scientists, artists, and activists, which inspire her academic and career aspirations.
attributes:
  skills: '["Mathematics (algebra and geometry)", "Science (basic biology and chemistry)", "Introductory Python programming", "Computer literacy (Word, PowerPoint, Excel)", "Organizational and time‑management
