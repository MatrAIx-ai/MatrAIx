  hobbies: '["Reading (science fiction and biographies)", "Creative writing/journaling", "Sketching and drawing", "Playing piano", "Introductory coding (Python, Scratch)", "Nature walks and gardening",
    "Baking simple treats", "Volunteering at community center (organizing activities)", "Watching science and space documentaries"]'
  career_goals: Maedell is drawn to a career that blends science, technology, and service to others. She aspires to become a biomedical engineer or work in public health, aiming to design affordable medical
    devices that improve community health. She hopes to attend a university with a strong STEM program that values diversity, secure internships in research labs, and later contribute to innovations in
    healthcare technology. Alongside her professional goals, she wants to mentor younger students—especially Black girls—in math and coding, fostering confidence and representation in STEM fields.
