  hobbies: '[''Golf'', ''Woodworking'', ''Reading Biographies'', ''Jazz and R&B Music'', ''Church Volunteering'', ''Community Clean‑ups'', ''Gardening'']'
  career_goals: Johnnie aims to transition from day‑to‑day sales execution to a mentorship and consultancy role within the next two years, leveraging his extensive experience to help small and mid‑size
    businesses in the Sacramento region improve their sales processes. He aspires to earn the regional President’s Club award for exceeding targets, then launch a part‑time sales coaching practice that
    offers workshops on ethical selling and data‑driven strategy. Long‑term, he hopes to establish a scholarship for local high‑school students interested in business, ensuring his legacy supports the next
    generation while securing financial stability for his family.
