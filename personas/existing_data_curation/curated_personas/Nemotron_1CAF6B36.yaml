personas:
  professional: Johnnie Smart, a 62‑year‑old sales veteran with three decades of B2B and consumer experience, leverages disciplined pipeline design, data‑driven forecasting, and masterful negotiation to
    mentor emerging businesses while eyeing the regional President’s Club and a part‑time consultancy, and they plan to transition into mentorship within the next two years.
  sports: Johnnie Smart enjoys weekend rounds at Elk Grove Country Club, follows the Sacramento Kings NBA team and Sacramento Republic FC, and they participate in local senior pickleball leagues to stay
    active despite occasional knee soreness.
  arts: Johnnie Smart fills evenings with classic soul and jazz legends like Miles Davis, Aretha Franklin, and Earth, Wind & Fire, curates a vintage vinyl collection, and they attend monthly performances
    at the Sacramento Community Theatre to satisfy a lifelong appreciation for musical storytelling.
  travel: Johnnie Smart favors well‑planned road trips that blend golf at acclaimed courses—such as a recent weekend in Pebble Beach—with relaxed wine‑tasting in Napa Valley, while they dream of a pilgrimage
    to St Andrews, Scotland, for a historic round of golf.
  culinary: Johnnie Smart, a modest home cook, often prepares herb‑infused grilled chicken, tomato‑basil pasta, and fresh salsa using garden‑grown tomatoes and basil, and they occasionally over‑salt dishes
    in the pursuit of perfect flavor.
  core: Johnnie Smart blends disciplined sales expertise with a quiet love of golf, woodworking, jazz, and community service, and they are guided by pragmatic optimism and a tendency to over‑organize.
background:
  cultural: Johnnie was raised in a Black family in California during the civil‑rights era, absorbing the values of resilience, community, and faith from his parents and church. He maintains strong ties
    to African‑American cultural traditions—celebrating Juneteenth, savoring soul‑food dishes, and listening to gospel and classic R&B. His upbringing instilled a deep sense of responsibility to uplift
    others, which informs his cooperative yet assertive demeanor in professional settings. Living in Elk Grove’s diverse community, he embraces multicultural interactions while preserving the heritage of
    the Black experience that shapes his identity and worldview.
attributes:
  skills: '[''Strategic Negotiation'', ''Customer Relationship Management'', ''Sales Pipeline Development'', ''Data‑Driven Forecasting'', ''CRM Software (Salesforce, HubSpot)'', ''Market Research'', ''Team
