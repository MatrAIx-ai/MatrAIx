  career_goals: Ernesto dreams of working with his hands in a career that combines structure with community service. He hopes to become an automotive technician or a skilled handyman, so he can provide
    reliable help to his family and neighbors. He also imagines one day leading a youth workshop at the local community center where he could teach basic repair skills and organized hobbies to younger kids.
