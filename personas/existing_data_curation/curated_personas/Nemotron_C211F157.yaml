  career_goals: James aims to earn a bachelor’s degree in social work and become a Licensed Professional Counselor in Washington within the next three years. He plans to develop a community art-therapy
    program for youth on Camano Island, lead a county-wide mental-health outreach initiative, and eventually open his own private practice that integrates creative arts into counseling. Additionally, he
    hopes to mentor emerging counselors in group facilitation and advocate for increased mental-health resources in Snohomish County.
