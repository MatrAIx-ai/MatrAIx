  hobbies: '[''hiking the Appalachian Trail'', ''collecting vintage vinyl records'', ''attending live concerts and music festivals'', ''experimental cooking'', ''reading contemporary literature and philosophy'',
    ''volunteering for community art workshops'', ''playing board games with friends'', ''candid photography at local events'']'
  career_goals: Tyler aims to record a concept album that fuses traditional Appalachian folk with contemporary lyrical themes, releasing it independently while maintaining creative flexibility. He envisions
    establishing a community music collective in Selinsgrove that offers open‑mic nights, collaborative songwriting sessions, and mentorship for younger artists. Long‑term, he hopes to tour regionally with
    a rotating ensemble, collaborate with artists from diverse cultural backgrounds, and eventually produce a live‑recorded performance that showcases the collective’s eclectic talent. He also aspires to
    author a memoir about his artistic journey, highlighting the intersections of music, art, and lifelong curiosity.
