persona_description: A farmer who owns a farm in Somerset, England, and uses a magnet to collect and sell metal objects from his fields before mowing or grazing. He is concerned about the risk of wire damage
  to his Holsteins and has found a solution with a magnet mounted on a stainless steel skirt. The magnet attracts all metal objects to the skirt and when removed, everything falls into a tray below. The
  farm's vet has also noted other sources of wire, such as worn clamp tyres and bits of fencing wire. The farm's contractor has reported an improvement in field clearing with the magnet, and the farm's
  silage contractor has also noted a difference in fields cleared by the magnet.
