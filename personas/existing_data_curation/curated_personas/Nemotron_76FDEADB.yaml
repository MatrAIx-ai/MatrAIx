  career_goals: William aims to advance from his current sales representative position to a senior account manager role within the next two years, focusing on high‑value service contracts in the technology
    sector. He plans to earn professional certifications such as the Certified Professional Sales Leader (CPSL) and a Salesforce Administrator credential to deepen his technical expertise. Long‑term, he
    aspires to become a regional sales manager, leading a team of reps and shaping sales strategy for the Southeast market. Additionally, he harbors an entrepreneurial ambition to launch a boutique consulting
    firm that helps Black‑owned small businesses adopt cloud‑based services, merging his sales acumen with a commitment to community empowerment.
