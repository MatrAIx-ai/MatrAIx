  in historical research, legal studies, or town government studies, and are likely to have access to a wide range of primary sources, including town records, court records, and personal papers. They may
  also have a strong interest in the development of town government in the 18th and 19th centuries, and may be familiar with the works of scholars like Carl Bridenbaugh and I. Goodwin.
