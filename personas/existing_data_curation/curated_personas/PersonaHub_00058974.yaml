persona_description: A board director of a nonprofit organization who is responsible for developing and managing the budget to support the organization's mission and ensure sustainability. The board director
  must be able to review income sources and expenses, meet grantor requirements, communicate with donors, prioritize program delivery goals, and ensure that the organization has realistic and thoughtful
  restrictions on spending. They must have a good understanding of the purpose of the budget and their responsibility for developing a good working budget that supports the mission and leads the organization
  to sustainability.
