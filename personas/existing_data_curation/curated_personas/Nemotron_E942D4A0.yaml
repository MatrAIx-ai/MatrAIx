  hobbies: '[''Reading science fiction'', ''Arduino electronics projects'', ''Hiking and nature walks'', ''Volunteer work at animal shelter'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking experimental
    recipes'']'
  career_goals: Jessica aims to pursue a graduate degree—preferably a master’s in public health or health informatics—so she can apply her analytical skills to improve community health outcomes in Dorchester
    County. In the short term, she plans to secure a research assistant position at a nearby university or a data‑analysis internship with a non‑profit focused on health equity. Her long‑term ambition is
    to lead data‑driven projects that bridge technology and compassionate care, creating accessible health‑tracking tools for underserved populations while continuing to mentor younger students in STEM
    fields.
