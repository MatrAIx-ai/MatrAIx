personas:
  professional: Jessica Wright, a budding data analyst and aspiring health informatics specialist, leverages Python, R, and Arduino tinkering to translate community health data into actionable insights,
    while their spontaneous nature sometimes leads to missed deadlines, their compassion fuels collaborative projects, and they mentor peers in peer‑tutoring sessions.
  sports: Jessica Wright, an early‑morning hiker on the Palmetto Trail who cheers for the Carolina Panthers, the Charleston Battery soccer team, and the South Carolina Gamecocks basketball squad, plays
    intramural volleyball twice a week at the university gym, and blends cardio with nature walks to clear her mind.
  arts: Jessica Wright, an avid reader of classic sci‑fi authors such as Isaac Asimov and contemporary voices like N.K. Jemisin, enjoys listening to indie folk musician Sufjan Stevens and ambient creator
    Tycho while sketching circuit diagrams, and occasionally attends community theater productions of "Our Town" and local art gallery openings.
  travel: Jessica Wright, a budget‑conscious explorer who has road‑tripped to historic Savannah, trekked the Blue Ridge Parkway, dreams of backpacking through Kyoto’s temples and volunteering at a health
    clinic in Costa Rica, prefers flexible itineraries that allow spontaneous detours, and saves travel funds in a dedicated high‑interest account.
  culinary: Jessica Wright, a budding home cook who experiments with shrimp and grits, quinoa‑black bean bowls, lemon‑basil roasted chicken, and kale‑chip snacks, balances nutrition and flavor by incorporating
    sweet potatoes, coconut oil, and fresh herbs, and documents each trial in a well‑worn journal while a jazz playlist streams in the background.
  core: Jessica Wright blends Southern hospitality with data‑driven curiosity, turning solitary tinkering, compassionate volunteer work, and a habit of procrastinating on paperwork into a mission to make
    community health smarter.
background:
  cultural: Jessica grew up in Ladson, South Carolina, a suburban community steeped in Southern hospitality and close‑knit neighborhood ties. Her family emphasized education and community service, often
    attending local church events and participating in school volunteer programs. While she embraces traditional Southern values—respect for elders, modesty, and a strong sense of community—she also draws
    from her academic environment, exposing her to diverse perspectives and progressive ideas. This blend of regional heritage and modern STEM culture shapes her outlook, fostering a deep commitment to
    helping others while pursuing innovative, data‑driven solutions.
attributes:
  skills: '[''Python programming'', ''Statistical analysis (R)'', ''Laboratory experimental design'', ''Scientific writing'', ''Data visualization (Tableau)'', ''Peer tutoring in math and science'', ''Community
