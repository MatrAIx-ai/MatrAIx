    interior design aesthetics'', ''Time management under pressure'', ''Adaptability to unconventional design requests'', ''Knowledge of sustainable flooring options'']'
  hobbies: '[''Visiting art galleries and folk festivals'', ''DIY woodworking and furniture making'', ''Fishing and outdoor recreation'', ''Participating in local lawn‑care and renovation contests'', ''Photography
    of built environments and nature'', ''Experimenting with Southern cooking recipes'', ''Collecting vintage vinyl records'', ''Gardening (herbs and vegetables)'', ''Reading historical non‑fiction'', ''Attending
    live country and blues music events'']'
  career_goals: Michael aims to transition from freelance installer to the owner of a small, reputable flooring company that emphasizes craftsmanship and eco‑friendly practices. He plans to obtain industry
    certifications such as IICRC and GreenGuard, expand his service offerings to include design consultation, and mentor a handful of apprentices to preserve trade skills in his community. Over the next
    five years he hopes to be recognized as the go‑to specialist for custom patterned flooring in southern Georgia, while building a flexible schedule that allows him to pursue his artistic interests alongside
    his work.
