personas:
  professional: Michael Booth, a seasoned flooring installer with over two decades of hands‑on expertise in carpet, hardwood, laminate, and tile, they blend meticulous measuring, blueprint interpretation,
    and custom finishing with a curiosity for design, channeling their competitive streak into flawless installations while aiming to launch a small eco‑friendly flooring company, earn IICRC and GreenGuard
    certifications, and mentor apprentices to preserve trade skills in southern Georgia.
  sports: Michael Booth spends weekends casting lines on Lake Lanier with the Georgia Bass Anglers Association, joins occasional deer hunts through the Southern Outdoorsmen Club, competes fiercely in neighborhood
    lawn‑care contests, and cheers on the Atlanta Falcons and Braves while they keep a modest jogging routine to stay limber.
  arts: Michael Booth frequents regional galleries and folk art festivals, curates a vintage vinyl collection featuring The Allman Brothers, Miles Davis, and Johnny Cash, captures the grainy texture of
    reclaimed wood in photographs inspired by Ansel Adams, and they find creative spark in the works of Southern folk artist Howard Finster, all of which shape their aesthetic sensibility.
  travel: Michael Booth prefers spur‑of‑the‑moment road trips across the Southeast, revisiting Savannah’s historic squares, Asheville’s mountain art scene, and the Florida Keys for fishing, while they dream
    of an Icelandic landscape photography tour and balance travel with the financial reality of building a small business.
  culinary: Michael Booth experiments with Southern cooking, perfecting shrimp‑and‑grits with smoked paprika, frying chicken with a buttermilk brine, and simmering collard greens with moon‑shine‑aged ham,
    often picking fresh rosemary, thyme, and hot peppers from their modest garden to elevate each dish, they also enjoy pairing meals with a carefully selected vintage record to set the ambiance.
  core: Michael Booth blends a carpenter’s precision with an artist’s curiosity, juggling a competitive lawn‑care streak, occasional disorganization, and a love for vintage vinyl, all while they chase the
    perfect balance between eco‑friendly flooring craftsmanship and solitary fishing retreats.
background:
  cultural: Michael was raised in a working‑class white family in rural central Georgia, where Southern hospitality, self‑reliance, and a strong respect for manual trades shaped his worldview. He grew up
    attending community events, church gatherings, and local fairs that celebrated regional music, craft, and cuisine. This cultural milieu instilled a practical work ethic, an appreciation for craftsmanship,
    and a modest, friendly demeanor. While his upbringing included traditional Southern values and a background in vocational apprenticeship, his personal curiosity has led him to embrace broader artistic
    influences and contemporary sustainable practices.
