    in the energetic drumming of The Who, weaving music and art into their daily play.
  travel: Ryan Hasegawa, who loves weekend trips to the local beach and family vacations to San Diego Zoo and a summer camp in the Rocky Mountains, they plan each adventure with a mix of spontaneous beach
    play and carefully packed snacks, and they dream of visiting Tokyo Disney Resort and the Great Barrier Reef someday.
  culinary: Ryan Hasegawa, who favors pepperoni pizza, chicken nuggets, and mac and cheese, they can skillfully melt cheese on a grilled sandwich and occasionally experiment by adding pineapple to pizza,
    showing a moderate cooking ability and a fondness for cheesy, familiar flavors.
  core: Ryan Hasegawa, an energetic 11-year-old who thrives on team sports, group music, and routine-driven play, they balance a laid-back attitude with a strong sense of fairness, often forgetting to tidy
    up but always ready to lend a hand.
