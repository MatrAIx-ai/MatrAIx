personas:
  professional: Mario Sagarra is a hands‑on community organizer turning his carpentry, mechanical troubleshooting, and bilingual communication skills into a budding career as a maintenance technician, where
    they keep facilities running smoothly while coordinating neighborhood events on the side.
  sports: Mario Sagarra plays forward for the Novato Community Soccer Club in the spring and fall, roots for the San Francisco 49ers and Golden State Warriors, and fits in weekday jogs along the Marin Headlands
    to stay active, though they occasionally skip workouts after a late night at a block party.
  arts: Mario Sagarra’s evenings often feature dancing to Banda El Recodo and sighing along to Vicente Fernández while hosting neighborhood potlucks, and they enjoy watching classic cinema starring Pedro
    Infante and attending local folk‑dance festivals whenever possible.
  travel: Mario Sagarra prefers spontaneous road trips along Highway 1, savoring stops at Big Sur, Santa Barbara, and the coastal towns of Baja California, while balancing family commitments that limit
    longer vacations, yet they keep a “wishlist” of national parks like Yosemite and Yellowstone for future family adventures.
  culinary: Mario Sagarra cooks confidently, often preparing carne asada tacos with fresh cilantro, lime, and charred corn tortillas, while their skillet‑seared shrimp al ajillo and homemade salsa verde
    showcase a skill level that straddles home‑cooking comfort and small‑business ambition.
  core: Mario Sagarra is a sociable, structure‑loving fixer‑upper who blends hands‑on carpentry, community event planning, and flavorful taco recipes into a life of practical ambition, occasional budget
    splurges, and a habit of forgetting to take medication on busy nights.
background:
  cultural: Mario grew up in a Mexican household where family, food, and tradition are central. He carries the warmth of Mexican hospitality and the values of close‑knit family ties into his daily life
    in Novato. He maintains cultural practices such as celebrating Día de los Muertos, cooking regional dishes like tacos al pastor and pozole, and participating in local Mexican community events. His bilingual
    ability reflects his heritage, and he often serves as a cultural bridge between his Mexican roots and the broader Marin County community, helping preserve Mexican customs while embracing his life in
    California.
attributes:
  skills: '[''Basic carpentry'', ''Home repair'', ''Furniture assembly'', ''Mechanical troubleshooting'', ''Traditional Mexican cooking'', ''Bilingual communication (Spanish & English)'', ''Event organization'',
