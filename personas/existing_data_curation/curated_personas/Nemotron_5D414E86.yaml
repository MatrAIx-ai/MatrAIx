  hobbies: '[''Community soccer'', ''Mexican cooking'', ''Attending festivals'', ''Listening to and dancing to Banda/Ranchera music'', ''Church volunteer work'', ''Organizing block parties'', ''Woodworking'',
    ''Road trips along the California coast'', ''Fishing trips'']'
  career_goals: Mario aims to translate his hands‑on skills and community connections into a stable, sustainable livelihood. He is working toward earning his GED and enrolling in a local trade program to
    become a certified carpenter or maintenance technician, which would give him a predictable income while allowing flexibility for family time. In the longer term, he dreams of opening a small family‑run
    taco stand or food cart in Novato, where he can showcase his cooking and create a gathering spot for the local Mexican community. He also hopes to mentor younger neighbors, sharing practical skills
    and fostering a supportive neighborhood network.
