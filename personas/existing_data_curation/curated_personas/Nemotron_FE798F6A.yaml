  hobbies: '["Piano playing","Acoustic guitar","Live concerts and music festivals","Reading modern literature and history","Hiking and kayaking","Volunteering at community arts events","Yoga","Cooking experimental
    dishes"]'
  career_goals: In the next few years Laura aims to secure a position as assistant music director with a regional theater or a community orchestra in the Tampa Bay area, where she can lead productions and
    develop original scores. She plans to launch a portfolio of commissioned works that blend classical techniques with modern electronic textures, showcasing her curiosity for new ideas while maintaining
    practical compositional foundations. Long‑term, she aspires to become a chief music director for a major symphony, create a signature sound recognized nationally, and establish a non‑profit music education
    program that provides mentorship and performance opportunities for underrepresented youth in Pasco County.
