personas:
  professional: Laura Morris, a 23‑year‑old composer and orchestrator, blends classical orchestration with modern electronic textures, conducts community ensembles across Tampa Bay, and relies on her meticulous
    project‑management skills to transform ambitious scores into polished productions.
  sports: Laura Morris follows the Tampa Bay Buccaneers and Lightning, runs weekend 5Ks with the Tampa Running Club, paddles with a mixed‑gender kayaking group on Weeki Wachee Springs, and incorporates
    yoga into her routine to balance strength and flexibility.
  arts: Laura Morris immerses herself in the works of Max Richter and Tame Impala, attends Sarasota Opera’s Puccini productions, and draws narrative inspiration from contemporary authors such as Yaa Gyasi
    and Ocean Vuong, weaving these influences into her own compositions.
  travel: Laura Morris favors planning weekend getaways that blend music festivals and natural scenery, having explored New Orleans’ jazz districts and Asheville’s spring‑fed rivers, while dreaming of a
    summer immersion in Vienna’s concert halls and a solo retreat to Bali’s rice‑field terraces.
  culinary: Laura Morris, an intermediate home chef, delights in preparing Cuban Ropa Vieja with cumin‑spiced pork, Thai green curry infused with lemongrass and galangal, and a Mediterranean grilled halloumi
    salad crowned with pomegranate seeds, often pairing meals with a crisp Albariño or chilled rosé.
  core: Laura Morris, a methodical yet adventurous 23‑year‑old composer, toggles between meticulous score‑crafting and spontaneous late‑night jam sessions, while habitually forgetting to water her indoor
    plants amid bursts of creative flow.
background:
  cultural: Laura grew up in a middle‑class suburban family in the Tampa Bay region of Florida. Her parents, both educators, encouraged a broad appreciation for the arts and humanities, exposing her early
    to classical music, church choir, and multicultural performances common in the area. The Florida cultural milieu—characterized by a mix of Southern traditions, Latin influences, and a thriving contemporary
    music scene—shaped her eclectic taste. While identifying as white American, she values the diversity of her community and integrates those varied cultural rhythms into her compositions.
attributes:
  skills: '["Music composition","Orchestration","Conducting","Music theory","Score arranging","Digital audio workstations (Logic Pro X, Ableton Live)","Music notation software (Sibelius, Finale)","Project
