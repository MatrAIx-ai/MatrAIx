personas:
  professional: Sina Robbins is a seasoned early‑learning and K‑12 education administrator who designs evidence‑based STEM curricula, oversees multi‑year budgets and grant funding, and leads community outreach,
    channeling their preference for routine and sociable nature into meticulously organized workshops and collaborative stakeholder meetings that keep teachers, families, and partners aligned.
  sports: Sina Robbins leads a weekend 5 K running club along the Charles River, drills in a local co‑ed softball league, and avidly supports Boston’s Red Sox, Celtics, and New England Patriots, and they
    view athletics as a communal way to stay fit and foster neighborhood camaraderie.
  arts: Sina Robbins volunteers on the Norwood community theater’s production crew, consistently attends Boston Symphony Orchestra concerts featuring Mahler, enjoys live folk‑rock shows by The Avett Brothers,
    and watches Meryl Streep performances on screen, and they treat the arts as a shared family experience that enriches community bonds.
  travel: Sina Robbins prefers well‑planned short road trips along the New England coast—such as weekend stays in Newport and Portland—while also cherishing a family vacation to Washington, D.C., and a
    recent cultural immersion in Dublin, Ireland, and they balance their love of history with the need to stay grounded for their teenage children.
  culinary: Sina Robbins enjoys teaching family‑friendly cooking classes that spotlight Mediterranean dishes like grilled lamb with rosemary, lemon‑infused tabbouleh, and roasted eggplant, while also perfecting
    a hearty New England clam chowder, and they approach each meal with a hands‑on, data‑driven mindset, often jotting flavor notes in a color‑coded notebook.
  core: Sina Robbins blends a pragmatic love of routine with an outgoing community spirit, channeling that balance into data‑driven STEM leadership, neighborhood theater productions, and organized 5 K runs,
    and they manage disciplined finances and health habits that keep their busy life humming.
background:
  cultural: Sina grew up in a middle‑class white New England family in the Boston suburbs, where practical self‑reliance and community service were core values. Her upbringing emphasized the importance
    of education, punctuality, and participation in local traditions such as town meetings, Fourth of July parades, and Thanksgiving potlucks. She maintains strong ties to regional heritage through involvement
    in local historical societies and by preserving family customs that blend modest practicality with festive communal gatherings.
attributes:
  skills: '[''Curriculum development'', ''STEM program integration'', ''Budget and grant management'', ''Staff supervision and training'', ''Data analysis and program evaluation'', ''Educational technology
    integration'', ''Community outreach'', ''Stakeholder communication'', ''Conflict resolution'', ''Event planning'']'
  hobbies: '[''Mentoring after‑school STEM club'', ''Community theater production'', ''Running club'', ''Community gardening'', ''Family cooking classes'', ''Organizing neighborhood block parties'', ''Reading
    historical fiction'', ''Attending live music concerts'']'
  career_goals: Leveraging her routine‑driven, practical approach, Sina aspires to become a district‑level Director of Early Learning and STEM Initiatives, where she can shape policy and expand equitable
    access to high‑quality STEM education across Norfolk County. She plans to pursue an EdD in Educational Leadership within the next three years to deepen her strategic expertise and to lead a regional
    consortium that partners schools, businesses, and community organizations in creating hands‑on STEM experiences for young learners. Long‑term, she hopes to mentor emerging educators and influence state‑wide
    early childhood standards, ensuring that practical, research‑backed programs become the norm.
