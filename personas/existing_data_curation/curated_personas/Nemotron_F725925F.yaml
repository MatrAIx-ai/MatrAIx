  hobbies: '[''Chess'', ''Scratch and Python coding'', ''Gardening'', ''Reading mystery and sci-fi novels'', ''Nature sketching'', ''Photography of farmland'', ''Volunteer at county fair (livestock exhibits)'']'
  career_goals: Dodie aims to leverage her practical mindset and love for structured problem-solving into a career in civil engineering. In the short term, she plans to earn top grades in math and science,
    win a regional STEM competition with her robotics team, and secure a scholarship for a high-school program focused on engineering design. Long-term, she envisions studying civil engineering at a university
    known for its research in sustainable rural infrastructure, eventually designing safe bridges, roadways, and community facilities that serve towns like Manawa. She also hopes to mentor younger students
    in STEM, combining her competitive drive with a sense of responsibility.
