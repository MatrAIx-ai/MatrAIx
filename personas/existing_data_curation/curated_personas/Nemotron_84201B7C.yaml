  hobbies: '[''Abstract acrylic painting'', ''Scale model building (vintage tractors, historic aircraft)'', ''3D modeling for custom components'', ''Landscape and astrophotography'', ''Reading speculative
    fiction and philosophy'', ''Chess'', ''Hiking the Loess Hills'']'
  career_goals: Paul’s career plan centers on advancing from a skilled fabricator to a leadership role where he can shape production strategy and drive continuous improvement. In the next two to three years,
    he intends to earn a Six Sigma Green Belt and complete an associate’s degree in manufacturing engineering, strengthening his analytical and engineering capabilities. He aims to become a shift supervisor
    and eventually a plant manager, responsible for overseeing operational efficiency, workforce development, and lean initiatives. Long‑term, Paul envisions launching his own boutique metal‑art studio
    that merges his fabrication expertise with his passion for abstract art, producing limited‑edition functional sculptures and custom pieces for both industrial clients and private collectors.
