  career_goals: He aims to leverage his on‑the‑job experience into a formal business education. Albert plans to enroll in a community college business program within the next year, then transfer to a four‑year
    university for a B.S. in Business Administration with a focus on supply‑chain management. His short‑term goal is to become a full‑time store manager and earn a Certified Retail Manager credential. Long‑term,
    he aspires to become a regional manager for a national retail chain and eventually own a small chain of convenience stores that integrate local products with online ordering. He also seeks to develop
    leadership workshops for other young managers in his community.
