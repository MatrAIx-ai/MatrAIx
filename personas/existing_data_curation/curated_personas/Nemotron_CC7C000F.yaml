personas:
  professional: Arelia Wilson, a senior engineering technologist renowned for merging precision mechanical design with data-driven process improvement, leads cross-functional product development teams with
    a skeptical eye for inefficiency, mentors high-school robotics clubs, meticulously plans each project milestone to align with their goal of mastering Industry 4.0 technologies, and is actively pursuing
    PMP certification to pave the way for a future consulting practice.
  sports: Arelia Wilson channels their competitive drive into early-morning kayaking on Keuka Lake, weekend trail runs through the Finger Lakes foothills, follows the Rochester Red Wings and the New York
    Knicks, and belongs to the Finger Lakes Paddle Club where they log weekly mileage and set personal bests on a hybrid bike.
  arts: Arelia Wilson frequents Rochester's intimate jazz venues to see performances by Robert Glasper and Gregory Porter, curates vinyl collections featuring Miles Davis, Sade, and Esperanza Spalding,
    and draws creative inspiration for their culinary experiments from the improvisational flair and soulful storytelling of these artists.
  travel: Arelia Wilson plans meticulous weekend escapades to the Adirondack High Peaks for rugged hikes, dreams of kayaking Iceland's glacial lagoons, budgets for culinary pilgrimages to Kyoto's Nishiki
    Market, and balances these adventures with a home base in Rochester that anchors their community involvement.
  culinary: Arelia Wilson's kitchen fuses Southern comfort with global twists, perfecting dishes like miso-glazed shrimp and grits, kimchi-sautéed collard greens, and bourbon-caramel sweet-potato pie, while
    they hone sous-vide techniques and host monthly dinner gatherings that showcase their experimental palate.
  core: Arelia Wilson is a methodical engineer whose fierce competitive streak fuels high-tech Southern cooking experiments and solo wilderness retreats, while a skeptical eye drives both relentless innovation
    and occasional over-analysis, and a quirky habit of collecting vintage mechanical watches they never set as alarms pushes them to wake naturally for sunrise hikes.
background:
  cultural: Arelia grew up in a close‑knit Black family in the Rochester metropolitan area, where cultural heritage and community solidarity were emphasized. Her parents, both educators, instilled a deep
    respect for learning and civic engagement, encouraging her involvement in local African‑American cultural events and church activities. She identifies strongly with the legacy of the Rochester Black
    community’s activism and contributions to civil rights, which fuels her commitment to mentorship and diversity initiatives in STEM. While she celebrates traditional customs—such as family gatherings
    during Juneteenth and honoring ancestors through oral histories—she also navigates the broader multicultural landscape of upstate New York, integrating diverse perspectives into her professional and
    personal life.
attributes:
  skills: '[''SolidWorks and AutoCAD 3D modeling'', ''CNC machining setup and optimization'', ''Programmable Logic Controller (PLC) programming and troubleshooting'', ''Statistical Process Control (SPC)
    and Six Sigma Green Belt methods'', ''Python and MATLAB for data analysis and automation scripting'', ''Root cause analysis and failure mode effects analysis (FMEA)'', ''Predictive maintenance planning
    and condition monitoring'', ''Technical documentation and compliance auditing'', ''Lean manufacturing implementation and value stream mapping'', ''Team training, mentorship, and STEM outreach facilitation'']'
  hobbies: '[''Hiking and kayaking in the Finger Lakes area'', ''Attending live jazz and soul music performances'', ''Cooking modern Southern dishes and hosting dinner parties'', ''Reading science‑fiction
    novels and engineering journals'', ''Participating in hackathons and robotics competitions'', ''Volunteering for Rochester STEM Outreach workshops'', ''Maintaining a bullet journal for personal organization'']'
  career_goals: Arelia aims to advance into a senior engineering technologist or technical manager role where she can lead cross-functional teams on high‑impact product development projects. She plans to
    earn a master's degree in engineering management to deepen her strategic planning skills and attain PMP certification to formalize her project leadership expertise. Long‑term, she envisions establishing
    a consulting practice that helps mid‑size manufacturers in upstate New York adopt Industry 4.0 technologies, while also creating structured mentorship programs to increase the representation of Black
    women in engineering fields.
