  career_goals: Stephen aims to transition from journeyman roofer to a certified foreman within the next three years, obtaining the South Carolina Roofing Contractor license and pursuing additional training
    in solar‑panel integration and eco‑friendly roofing systems. He envisions eventually launching his own small roofing firm focused on high‑quality craftsmanship and sustainable materials, providing a
    stable income for his family and creating apprenticeship opportunities for younger workers in the community. A long‑term goal is to achieve a balanced work schedule that reduces stress, allowing him
    more time for family and personal interests while maintaining a reputation for reliability and excellence in the local trade.
