personas:
  professional: N Hudson is a 46‑year‑old floral designer and horticultural specialist who blends a STEM background with advanced CAD‑driven installations, leveraging meticulous project management and sustainable
    sourcing to run a predictable, well‑organized business while still allowing creative flexibility in boutique studio design, and they prioritize structure without stifling artistic experimentation.
  sports: N Hudson enjoys weekend hikes in the Cascades and practices yoga for flexibility, while cheering on the Seattle Seahawks in football and supporting the Seattle Sounders FC in soccer, and they
    also participate in a local community garden’s “fit‑for‑the‑farm” walking club to stay active.
  arts: N Hudson curates an Instagram feed of macro floral photography inspired by artists like Georgia O’Keeffe and photographer Annie Leibovitz, attends regional art gallery openings featuring contemporary
    painter Kehinde Wiley, and they find solace in the jazz of Nina Simone during design sessions.
  travel: N Hudson prefers carefully planned eco‑friendly trips, often exploring nearby Pacific‑Northwest destinations such as Vancouver Island and the Oregon Coast, while dreaming of a sustainable horticulture
    conference in Kyoto, balancing travel with the boutique studio’s seasonal workload and family obligations, and they rely on detailed itineraries to reduce stress.
  culinary: N Hudson favors farm‑to‑table meals, skillfully preparing dishes like roasted beet and goat cheese salad with fresh herbs from their garden, enjoys cooking with seasonal ingredients such as
    wild mushrooms and heirloom tomatoes, but can be indecisive about dessert choices, often defaulting to a slice of store‑bought carrot cake, and they cherish sharing meals with community members.
  core: N Hudson is a detail‑oriented floral entrepreneur who channels scientific precision into sustainable artistry, balances structured planning with a love for spontaneous garden experiments, habitually
    worries about perfection, and they find calm in yoga and gratitude journaling.
background:
  cultural: Rochelle identifies as African‑American and draws inspiration from the rich traditions of Black horticultural knowledge and community stewardship. Growing up in a close‑knit Black neighborhood,
    she learned the value of collaborative garden spaces and the cultural symbolism of plants in African‑Diasporic celebrations. In her designs, she occasionally incorporates colors and patterns that echo
    African textiles and uses locally sourced native plants to honor both her heritage and the Pacific‑Northwest environment. She actively participates in local Black cultural events such as Juneteenth
    celebrations and Black History Month panels, and she advocates for greater diversity in the horticulture and design industries.
