  career_goals: Rochelle aims to open a flagship boutique floral studio in Olympia that showcases sustainable, technology‑enhanced designs. Over the next three years she plans to earn a Certified Sustainable
    Horticulture credential, develop a line of biodegradable floral containers, and launch community workshops that teach urban gardening and eco‑friendly event design. She hopes to become a recognized
    speaker on sustainable floral practices at regional conferences and to mentor emerging Black women in horticulture. Ultimately, she envisions expanding the studio into a regional hub that partners with
    local farms and offers therapeutic floral‑design programs for health‑care facilities.
