persona_description: A scientist and researcher in astronomy, particularly interested in the study of small bodies in the Solar System, including asteroids, comets, and other small celestial bodies. They
  are skilled at calculating the probability of small bodies passing close to Earth and potentially capturing them into an orbit around the planet. They have a deep understanding of orbital mechanics and
  have used supercomputers to perform complex simulations of asteroid flybys. They have published their findings in scientific journals and have presented their work at conferences. They are passionate
  about their research and are dedicated to understanding the history and evolution of the Solar System.
