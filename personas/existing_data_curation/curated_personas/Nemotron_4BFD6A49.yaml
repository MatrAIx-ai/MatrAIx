  career_goals: Harry aims to translate his strong organizational skills into a stable, structured career. He plans to enroll in a vocational apprenticeship for plumbing or HVAC to gain a certified trade
    qualification within the next year. His long‑term ambition is to launch a small, reliable home‑repair and maintenance business that serves the Boerne community, providing consistent service while achieving
    financial security and reducing personal stress. He also hopes to become more involved in local community leadership, potentially serving on the board of a neighborhood association.
