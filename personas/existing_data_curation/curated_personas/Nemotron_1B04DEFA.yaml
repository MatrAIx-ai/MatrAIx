  career_goals: Elsa aims to move from her receptionist role into a supervisory administrative position within the local school district, such as a school office manager or district information coordinator.
    She plans to earn a certification in Office Administration and eventually pursue a Master's in Educational Administration. Long term, she hopes to open a community tutoring center in Statham that offers
    personalized academic support and workshops on stress-management, reflecting her competitive drive and personal experience with anxiety.
