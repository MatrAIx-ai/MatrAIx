  career_goals: Adam aims to earn his GED within the next year and enroll in a state‑approved Certified Psychiatric Technician program to qualify for a supervisory aide role. He aspires to design a small
    art‑therapy initiative within his workplace, using his drawings and photography to support patient well‑being. Long‑term, he hopes to publish a collection of short stories that explore mental‑health
    themes and to co‑found a community art space in Grifton that offers workshops for youth and adults.
