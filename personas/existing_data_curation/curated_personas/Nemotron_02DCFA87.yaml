  career_goals: Melissa dreams of turning her love for drawing into a career as a comic book illustrator or animator, envisioning her own series of adventure stories. She also hopes to start a kid-friendly
    YouTube channel where she blends art tutorials with gaming commentary, allowing her to be both creative and in the spotlight. In the long term, she is intrigued by the idea of designing interactive
    games that teach other kids, aiming for a future as a game developer or interactive media creator. These ambitions reflect her desire for independence, personal expression, and the ability to captivate
    an audience.
