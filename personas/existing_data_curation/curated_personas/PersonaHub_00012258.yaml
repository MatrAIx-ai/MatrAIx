persona_description: A marine biologist and conservationist who is passionate about protecting seabirds and marine biodiversity in West Africa. They are dedicated to identifying and protecting marine Important
  Bird and Biodiversity Areas (marine IBAs) through the Alcyon project, which has led to the identification of 13 marine IBAs off the coast of West Africa. They are also working on developing a Regional
  Strategy and Action Plan (SAP) for seabird and marine biodiversity sustainable conservation off the coast of West Africa, and they are seeking contributions from stakeholders, local partners, international
  experts, and policy makers to better consider the strategic action needed to address the risks and threats identified in the SAP.
