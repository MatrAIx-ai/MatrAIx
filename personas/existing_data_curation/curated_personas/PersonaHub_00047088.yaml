persona_description: A Balinese temple architect who specializes in the layout and design of Balinese temples, particularly those within the Pura kahyangan jagad, Pura tirta, Pura desa, and Pura puseh.
  His expertise lies in the construction of the nista mandala, madya mandala, Utama mandala, and other supporting facilities within the temple compounds. He is also knowledgeable about the rules and regulations
  for the use of gates within Balinese architecture, including the split gate and the roofed tower gate. His work involves the creation of intricate and harmonious designs that reflect the spiritual and
  physical realms of Balinese people.
