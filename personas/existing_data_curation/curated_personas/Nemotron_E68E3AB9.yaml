personas:
  professional: Steve Vega, a seasoned municipal records clerk in Gurabo, blends meticulous archiving expertise with a laid‑back, curiosity‑driven approach, using bilingual communication and basic office
    software to keep the city’s documents organized while occasionally experimenting with new scanning tools, and seeks to step into a supervisory role that will let them spearhead a digitization overhaul.
  sports: Steve Vega follows the Cangrejeros de Santurce in the Puerto Rican Baseball League, joins a Saturday‑morning pick‑up soccer group at the Gurabo community field, and maintains a low‑key fitness
    routine by trekking the nearby hills, preferring the camaraderie of local club activities over formal gym sessions.
  arts: Steve Vega immerses themselves in the sounds of merengue and bachata while also appreciating salsa classics by Willie Colón and contemporary pop from Luis Fonsi, often singing in the church choir
    and occasionally attending live performances at the Teatro La Perla, letting the rhythm shape their relaxed yet socially engaged evenings.
  travel: Steve Vega enjoys weekend getaways to Vieques and Culebra for snorkeling, leisurely road trips to the historic streets of Old San Juan, and dreams of exploring Barcelona’s architecture and Havana’s
    music scene, planning trips with a mix of spontaneous spontaneity and modest budgeting to fit their flexible travel style.
  culinary: Steve Vega cooks with a confident yet unhurried hand, preparing mangú with boiled plantains, sautéed red onions, and a side of fried eggs, simmering sancocho with yuca, corn, and pork, and seasoning
    lechón with garlic, oregano, and sour orange, while they relish the aroma of cilantro and avocados in every meal and enjoy sharing these dishes at neighborhood gatherings.
  core: Steve Vega is a 52‑year‑old records wizard who balances a love for garden‑fresh mangú with a habit of misplacing their own filing tabs, preferring spontaneous community gatherings over rigid schedules.
background:
  cultural: Steve is a first‑generation Dominican who has lived most of his adult life in Gurabo, Puerto Rico. He grew up in a close‑knit immigrant community where Spanish is the primary language, and he
    has functional English skills from his work environment. His daily life blends Dominican customs—celebrating Dominican Independence Day with family gatherings, enjoying merengue, bachata, and traditional
    foods—with Puerto Rican traditions such as participating in the town’s patron saint festival and eating local dishes like lechón. Raised Catholic, he values community service and family solidarity,
    often attending church activities and helping neighbors. The fusion of Dominican Caribbean culture and Puerto Rican island life shapes his music preferences, culinary tastes, and social interactions.
attributes:
  skills: '["Physical file organization", "Digital document scanning and indexing", "Bilingual communication (Spanish/English)", "Basic office software (Microsoft Word, Excel)", "Customer service for public
    inquiries", "Problem solving for misfiled records", "Knowledge of municipal record‑keeping procedures", "Interpersonal conflict resolution", "Adaptability to new filing systems"]'
  hobbies: '["Listening to merengue and bachata", "Cooking traditional Dominican dishes", "Gardening vegetables", "Playing dominoes with neighbors", "Attending local baseball games", "Walking nearby hills
    and trails", "Volunteering at church choir", "Fishing outings with friends"]'
  career_goals: Steve hopes to move into a supervisory role, such as Records Supervisor, within the Gurabo municipal government, where he can lead a digitization project that reduces paper dependence. He
    plans to enroll in a GED program to formalize his education and expand his career options. Over the next few years, he also intends to mentor new clerical staff, improve his personal organization skills,
    and eventually use his experience to support community initiatives or start a small home‑based catering service featuring Dominican and Puerto Rican dishes.
