personas:
  professional: Marc Donaldson, a pint-sized budding architect, meticulously constructs LEGO cities with disciplined precision, eagerly shares their creations with peers, and combines curiosity about new
    shapes with a compassionate drive to help friends build, showing they love order and creativity alike.
  sports: Marc Donaldson, a tiny sports enthusiast, proudly wears a Chicago Cubs cap while cheering for the team, idolizes the Chicago Bulls, and participates in the Little Kickers soccer program at the
    community recreation center, where they practice dribbling and scoring goals with disciplined enthusiasm, illustrating they blend fandom with active play.
  arts: Marc Donaldson, a budding art aficionado, delights in finger painting bright abstracts inspired by Vincent van Gogh’s Starry Night, claps along to the playful tunes of The Wiggles, and enjoys watching
    Disney’s classic films starring Mickey Mouse, which fuel their curiosity for new ideas, showing they merge visual art, music, and storytelling with compassionate imagination.
  travel: Marc Donaldson enjoys family road trips to the Chicago Children’s Museum, splashy days at Michigan’s sandy Lake Michigan shoreline, and has a budding wish to see the Eiffel Tower in Paris, preferring
    short, stroller-friendly journeys that mix playground exploration with occasional restless moments, reflecting they balance adventure with comfort.
  culinary: Marc Donaldson loves cheesy macaroni and cheese (elbow pasta, cheddar cheese), chicken nuggets (breaded), banana slices, and helps stir pancake batter made of flour, eggs, and milk, though they
    often create a delightful mess by splattering batter, indicating they approach dining with enthusiastic curiosity and occasional messiness.
  core: Marc Donaldson is a meticulously organized, curious toddler who balances a love for structured play with a compassionate heart and occasional candy-fueled tantrums, showing they navigate the world
    with disciplined enthusiasm.
background:
  cultural: Marc comes from a White, Southern family in Moss Point, Mississippi. His upbringing includes Southern hospitality, regular church attendance, comfort foods like fried chicken and biscuits, and
    exposure to local music such as blues and gospel. Family gatherings and community events shape his sense of belonging, while his parents emphasize kindness, cooperation, and respect for tradition.
