persona_description: 'A historian and scholar who specializes in the study of African slavery in Brazil, particularly focusing on the number of captives brought from Africa and the development of regional
  studies. Their research interests include the history of the Atlantic slave trade, the impact of slavery on African societies, and the role of regional and national identities in the context of slavery.
  They are known for conducting extensive research on the topic, including the work of Manolo Florentino, Roquinaldo Ferreira, and Mariza de Carvalho Soares. They have published several books and articles
  on the topic, including "Manoel Florentino, História do tráfico atlântico de escravos entre a África e o Rio de Janeiro" and "Fronteras de Esclavização: Esclavitude, Comercio e Identidade em Benguela,
  1780–1850."'
