personas:
  professional: Ita Rodriguez, an experienced personal care aide, blends two decades of hands‑on senior support with bilingual communication skills, a curiosity for home‑care technology, and a competitive
    drive to maintain high satisfaction scores while they aspire to earn CNA credentials and eventually supervise care teams.
  sports: Ita Rodriguez enjoys daily walks in York’s Riverside Park, participates in a senior badminton club, follows the Philadelphia Eagles and the New York Knicks for football and basketball thrills,
    and occasional joins community dance contests that blend fitness with salsa rhythms.
  arts: Ita Rodriguez’s artistic life revolves around salsa and merengue dancing, frequent visits to local cultural festivals featuring "Celia Cruz" and "Marc Anthony"’s music, and leading arts‑and‑crafts
    sessions at senior centers where they channel creativity into vibrant handmade décor.
  travel: Ita Rodriguez favors culturally rich getaways, having visited the historic streets of Old San Juan and the vibrant markets of Cartagena, while planning future trips to Barcelona’s music festivals
    and short weekend retreats to the Catskill Mountains, balancing adventure with budget‑friendly travel arrangements.
  culinary: Ita Rodriguez delights in cooking traditional island dishes like arroz con gandules, tostones, and sofrito‑infused chicken, skillfully preparing them for potluck gatherings, and they relish
    pairing these meals with fresh cilantro, lime, and a hint of adobo seasoning.
  core: Ita Rodriguez is a calm, competitive senior‑care champion who balances a love for salsa dancing, potluck cooking, and spontaneous trivia wins with a laid‑back approach to finances and occasional
    disorganization.
background:
  cultural: Ita was born to Puerto Rican parents and grew up speaking Spanish at home, immersed in island traditions such as bomba, plena, and holiday celebrations like Día de los Reyes. After moving to
    York, Pennsylvania, she kept close ties to the local Latino community, attending cultural festivals, church events, and Puerto Rican social clubs. Her heritage informs her caregiving, as she often incorporates
    familiar foods, Spanish phrases, and music to create a comforting environment for clients. She values the strong family bonds, respect, and communal support characteristic of Puerto Rican diaspora culture,
    and she proudly shares her cultural recipes and stories in community gatherings, serving as a bridge between diverse client backgrounds and their families.
attributes:
  skills: '[''personal care assistance (bathing, dressing, grooming)'', ''mobility support and transfers'', ''vital signs monitoring'', ''medication reminder coordination'', ''infection‑control and hygiene
    protocols'', ''bilingual communication (English/Spanish)'', ''group activity planning and facilitation'', ''basic first aid and CPR'', ''care documentation and electronic health record entry'', ''continuous
    learning of home‑care technologies'']'
  hobbies: '[''salsa and merengue dancing'', ''cooking and sharing Puerto Rican cuisine'', ''volunteering at senior centers'', ''organizing bingo and game nights'', ''participating in community trivia contests'',
    ''gardening'', ''walking in local parks'', ''attending health and wellness workshops'', ''church and community social events'', ''learning new senior‑care technologies'']'
  career_goals: Ita aims to deepen her professional credentials by completing a Certified Nursing Assistant (CNA) program and eventually becoming a shift supervisor or care coordinator at her facility.
    She hopes to mentor new personal care aides, sharing her practical expertise and bilingual skills. Long‑term, she envisions launching a small home‑care service that emphasizes culturally tailored support
    for Puerto Rican seniors in the York area, integrating familiar foods, music, and language into care plans. Additionally, she wishes to organize community workshops on wellness and technology use for
    older adults, positioning herself as a trusted resource within the local Latino community.
