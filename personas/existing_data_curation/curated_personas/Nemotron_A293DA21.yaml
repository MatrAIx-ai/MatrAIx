  hobbies: '["Classic car restoration","Furniture making (woodworking)","Genealogy research","Community trivia nights","Volunteer senior driver","Bird‑watching","Low‑impact fitness classes"]'
  career_goals: Although retired, Raymond aims to leverage his experience by mentoring younger professionals through local apprenticeship programs and serving on the board of the Erie Community Development
    Council. He aspires to document the industrial history of Erie County in a series of articles for the regional historical society, and he is keen on establishing a neighborhood garden that combines
    his practical skills with community engagement. He also hopes to complete his unfinished college coursework in business administration, primarily to satisfy his curiosity and set a personal example
    for his grandchildren. Finally, Raymond wants to become an advocate for senior mental‑health awareness, using his own experience with stress to help peers develop healthier coping strategies.
