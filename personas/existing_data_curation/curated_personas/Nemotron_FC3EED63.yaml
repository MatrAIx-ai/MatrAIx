personas:
  professional: Liliana Cadwallader, a veteran humanities teacher with over twenty years of classroom experience, designs rigorous, data‑driven curricula and leads school‑wide initiatives, leveraging her
    meticulous organization, competitive spirit, and sociable energy to mentor teachers and champion evidence‑based practices while constantly monitoring stress indicators in herself and her students.
  sports: Liliana Cadwallader joins a weekly early‑morning running club, tackles the San Gabriel Mountains on weekend trail hikes, practices yoga at a local studio, and avidly follows the Los Angeles Dodgers,
    Lakers, and Galaxy, channeling her sociable competitive streak into both personal fitness and sports fandom.
  arts: Liliana Cadwallader volunteers backstage at the South Pasadena Community Theater, immerses herself in classic literature through a book club that reads Austen and Baldwin, and enjoys live jazz performances
    by local ensembles like the Vintage Jazz Orchestra, blending her love of structure with a vibrant artistic community.
  travel: Liliana Cadwallader plans meticulous itineraries for weekend escapes to Big Bear for snow‑capped hikes and coastal retreats in Santa Barbara, while dreaming of a literary pilgrimage to Edinburgh
    and a garden tour of Kyoto, balancing her structured travel style with an appetite for cultural enrichment.
  culinary: Liliana Cadwallader follows structured recipes such as Julia Child’s Beef Bourguignon and a precise quinoa‑and‑roasted‑vegetable bowl, favors seasonal garden produce like rosemary, kale, and
    heirloom tomatoes, and enjoys brewing pour‑over coffee with single‑origin beans, reflecting her disciplined yet exploratory palate.
  core: Liliana Cadwallader blends disciplined organization, sociable energy, and a competitive edge, constantly juggling a high‑pressure teaching career with community arts, fitness routines, and a meticulous
    approach to money and health, all while wrestling with a habit of over‑worrying.
background:
  cultural: Liliana comes from a white, Anglo-American background and was raised in a middle-class household in Southern California. Growing up in the culturally diverse Los Angeles County, she was exposed
    to a mosaic of traditions, languages, and artistic expressions, which cultivated a broad appreciation for multicultural perspectives while maintaining a strong connection to mainstream American cultural
    norms. Her upbringing emphasized the value of education, civic participation, and community service, values that continue to shape her professional ethos and personal interests. Living in South Pasadena,
    a historically affluent suburb with a strong emphasis on public schooling and local arts, reinforces her commitment to structured community involvement and lifelong learning.
attributes:
