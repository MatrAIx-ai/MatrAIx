  hobbies: '[''Book club'', ''Community theater volunteering'', ''Trail hiking'', ''Running'', ''Yoga'', ''Crossword puzzles'', ''Gardening'', ''Cooking'', ''Adult literacy tutoring'']'
  career_goals: Liliana aims to transition into a district-level curriculum specialist role, where she can shape humanities instruction across multiple schools. She plans to pursue a master's degree in
    Educational Leadership within the next two years, with the ultimate goal of becoming an assistant principal and later a principal. She also aspires to publish a research article on stress-reduction
    strategies for elementary students, and to spearhead a school-wide program that integrates mindfulness and structured coping skills into daily routines. Winning the Teacher of the Year award and serving
    on the local school board are additional milestones she hopes to achieve.
