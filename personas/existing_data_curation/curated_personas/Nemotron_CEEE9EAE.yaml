  hobbies: '["Fishing", "Gardening", "Woodworking", "Seasonal hunting", "Attending local fairs", "Listening to classic rock", "Helping neighbors with home repairs"]'
  career_goals: Lowell aims to progress from a sales associate to a supervisory role, seeking a shift lead position within the next two years. His long‑term ambition is to become store manager, where he
    can apply his love of routine and practical problem‑solving to oversee all store functions. He also envisions eventually opening a small, family‑run specialty shop in Fishersville, allowing him to combine
    his retail experience with his desire for a stable, community‑focused business that supports his family.
