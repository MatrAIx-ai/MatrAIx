  career_goals: Olga aims to transition into a part‑time consulting role that lets her continue serving local small businesses and nonprofit organizations with her financial expertise. She wants to formalize
    a mentorship program for young accountants in the Lee County area, sharing practical knowledge and ethical standards. Additionally, she plans to volunteer as a financial advisor for church and community
    charity groups, helping them maintain fiscal health. Maintaining mental sharpness and contributing to her family's financial security are also central to her long‑term aspirations.
