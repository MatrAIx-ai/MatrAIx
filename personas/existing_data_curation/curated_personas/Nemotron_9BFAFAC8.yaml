  career_goals: Looking ahead, Mary aims to transition from a front‑desk position to an office‑manager or administrative‑coordinator role within the next three to five years. She plans to finish her associate
    degree and pursue a bachelor’s in business administration, while obtaining a Certified Administrative Professional (CAP) credential. Her goal is to lead a small team, improve office processes, and mentor
    new staff, all while maintaining the flexible schedule that allows her to continue exploring personal interests.
