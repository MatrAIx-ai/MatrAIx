personas:
  professional: Mary Hadley leverages her front‑desk experience and natural curiosity to streamline office workflows, excelling at multi‑line phone management and rapid software learning, while their preference
    for flexibility sometimes leaves their desk a bit cluttered as they juggle scheduling, basic bookkeeping, and occasional conflict resolution with a friendly yet assertive tone.
  sports: Mary Hadley hits the trails around Lake Superior for hiking in summer, cross‑country skis on groomed tracks in winter as a member of the Duluth Nordic Ski Club, and winds down by cheering on the
    Minnesota Vikings, Twins, and Wild, though they prefer casual weekend runs over rigorous gym sessions.
  arts: Mary Hadley captures the stark beauty of the North Shore through photography inspired by Ansel Adams and Chris Burkard, unwinds at open‑mic nights listening to Sufjan Stevens and indie folk playlists,
    and weaves intricate crochet pieces while they blend visual and literary arts, often quoting Mary Oliver, into their personal creative sanctuary.
  travel: Mary Hadley plans trips on a loose spreadsheet, favoring spontaneous weekend getaways to the Apostle Islands and the Canadian Shield, while dreaming of an Icelandic adventure to chase northern
    lights, balancing a modest travel budget with a love for rugged, nature‑focused experiences.
  culinary: Mary Hadley enjoys experimenting in the kitchen, often cooking wild‑rice risotto with chanterelle mushrooms, perfecting a sourdough starter with rye flour, and whipping up salmon baked with
    dill and lemon, while they still savor quick meals like avocado toast topped with hemp seeds, reflecting a mix of culinary confidence and occasional reliance on convenience.
  core: Mary Hadley is a curious, flexibly‑minded office pro who thrives on outdoor adventure, creative pursuits, and a habit of starting projects—like budgeting or crocheting—before finishing them, even
    though they often leave a few threads loose.
background:
  cultural: Mary grew up in a small town near Duluth in a family with German and Norwegian roots, reflecting the broader Scandinavian heritage of northern Minnesota. The region’s emphasis on community,
    modesty, and a strong work ethic shaped her practical outlook, while seasonal traditions—such as ice fishing, hot‑dish gatherings, and the state fair—remain a cherished part of her life. She values
    the close‑knit neighborhood culture, yet her natural curiosity encourages her to explore ideas beyond her immediate surroundings, fostering an open‑minded yet grounded perspective.
