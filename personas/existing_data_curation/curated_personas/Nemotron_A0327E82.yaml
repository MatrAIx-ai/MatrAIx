  hobbies: '[''Arduino tinkering'', ''Woodworking'', ''Vegetable gardening'', ''Science‑fiction reading'', ''Chess puzzles'', ''Cycling'', ''Wildlife photography'', ''STEM volunteering'']'
  career_goals: Jeremy aims to advance into a senior engineering leadership role where he can guide the development of sustainable energy solutions for residential applications. Over the next five years,
    he plans to lead a multidisciplinary team creating next‑generation solar‑plus‑storage platforms while establishing corporate partnerships with local schools for hands‑on STEM programs. He intends to
    earn professional credentials such as the Professional Engineer (PE) license and the Project Management Professional (PMP) certification to formalize his technical and managerial expertise. Ultimately,
    Jeremy envisions founding a boutique consulting firm focused on low‑cost renewable retrofits for modest‑income households, allowing him to blend his technical curiosity with his desire to help others.
