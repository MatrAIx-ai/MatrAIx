personas:
  professional: Jeremy Wheelock, a 41‑year‑old senior electrical engineer specializing in power electronics and embedded systems, blends meticulous circuit design expertise with a hands‑on curiosity, leading
    multidisciplinary teams to prototype solar‑plus‑storage platforms while championing community STEM mentorship programs.
  sports: Jeremy Wheelock enjoys solitary cardio, regularly cycling the tranquil trails of Clay County with the local Clay County Cyclists club and hiking nearby state parks, while cheering on the regional
    baseball team, the Clay County Hawks, they steer clear of team sports that demand extensive social interaction.
  arts: Jeremy Wheelock immerses themselves in science‑fiction, favoring authors like Isaac Asimov, N.K. Jemisin, and Liu Cixin, captures local wildlife through photography inspired by Ansel Adams, and
    relaxes to a curated soundtrack of Vangelis synth scores and progressive rock legends such as Yes.
  travel: Jeremy Wheelock prefers low‑key, nature‑focused travel, planning weekend escapes to places like the Great Smoky Mountains National Park and a solo cultural immersion in Kyoto’s technology museums,
    yet they budget trips carefully to preserve capital for their envisioned renewable‑energy consulting firm.
  culinary: Jeremy Wheelock enjoys farm‑to‑table cooking, frequently preparing dishes like quinoa salad with hydroponic cherry tomatoes, fresh basil, and roasted bell peppers, while they are a competent
    home chef who occasionally splurges on specialty pour‑over coffee from a local artisan roaster.
  core: Jeremy Wheelock is a solitary, curiosity‑driven engineer who balances meticulous problem‑solving with compassionate mentorship, often found tinkering late into the night while neglecting sleep and
    obsessively cataloguing the garden’s harvest.
background:
  cultural: Jeremy was raised in a middle‑class, predominantly white suburban community in the Jacksonville metropolitan area, where his family embraced a blend of Southern hospitality and Midwestern work
    ethic. His upbringing emphasized self‑reliance, respect for tradition, and community involvement, often expressed through church attendance and participation in local service projects. While he identifies
    with mainstream American cultural norms—valuing personal responsibility, education, and civic duty—he also appreciates the diverse cultural fabric of Florida, having grown up near a mix of coastal and
    inland influences. These experiences have shaped his pragmatic outlook, his appreciation for quiet, and his commitment to helping neighbors through both professional work and volunteer activities.
attributes:
  skills: '[''Analog circuit design'', ''Digital signal processing'', ''Power electronics'', ''Embedded systems programming'', ''MATLAB/Simulink modeling'', ''Altium Designer'', ''Project management'',
