personas:
  professional: Avon Bates, a 79-year-old retired facility maintenance supervisor turned community historian, leverages decades of mechanical, electrical, and carpentry expertise to lead hands-on workshops,
    and they apply meticulous organization and a skeptical eye to preserve Tulsa's heritage through oral-history interviews and detailed memoir-writing.
  sports: Avon Bates enjoys low-impact fitness by walking the Tulsa River Parks trail, follows the Tulsa Drillers minor-league baseball team, and they occasionally join a senior badminton club, all while
    maintaining a competitive edge in weekly chess tournaments at the senior center.
  arts: Avon Bates immerses themselves in gospel choirs featuring Mahalia Jackson's recordings and jazz sessions spotlighting Miles Davis, while also savoring classic black-and-white cinema like Casablanca
    and practicing mindfulness to reflect on the themes, and they find these artistic experiences reinforce their disciplined, reflective outlook.
  travel: Avon Bates prefers purposeful travel that blends heritage tours and relaxation, meticulously planning trips to places like New Orleans for its music roots, the National Civil Rights Museum in
    Memphis, and a dream pilgrimage to Washington, D.C.'s historic districts, but they usually balance them with family obligations.
  culinary: Avon Bates favors soulful Southern cooking, skillfully frying catfish, braising collard greens with smoked ham hocks, and baking sweet-potato pie using fresh rosemary from their herb garden,
    and they also enjoy the occasional spicy gumbo as a flavorful nod to their culinary heritage.
  core: Avon Bates is a disciplined, curiosity-driven elder who channels their competitive streak into chess and carpentry, worries often about health and finances, yet finds solace in gospel music and
    garden herbs.
background:
  cultural: Avon’s cultural identity is rooted in the African‑American experience of the Midwest‑South. Growing up in Tulsa during the post‑World War II era, he witnessed the transformation of the historically
    vibrant Black Wall Street district and lived through the civil‑rights movement, which shaped his critical and skeptical worldview. Family gatherings revolve around soul food traditions—collard greens,
    fried catfish, and sweet potato pie—alongside storytelling sessions that preserve oral histories. The local Baptist church has been a cornerstone of his social life, providing a sense of community,
    gospel music, and opportunities for service. Avon maintains a deep respect for elders and values education as a pathway to empowerment, which fuels his dedication to genealogy and historical preservation.
    His cultural background informs his commitment to mentoring younger generations and preserving Tulsa’s Black heritage.
