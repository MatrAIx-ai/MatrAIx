  career_goals: Even at six, Lorraine imagines a future where she can combine her love of animals, her desire to help others, and her organized nature. She often says she wants to become a veterinarian
    so she can care for pets and wildlife, and she also dreams of being a teacher who can share her curiosity about the world with younger children. Lorraine’s ambitions are shaped by her practical side—she
    pictures herself studying nature in a lab, keeping detailed notes, and using her methodical approach to solve problems that help both people and animals.
