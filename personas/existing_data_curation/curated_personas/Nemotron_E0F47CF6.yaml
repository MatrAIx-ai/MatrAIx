personas:
  professional: A budding marine explorer‑engineer, Lorraine Pope applies her methodical curiosity to building intricate LEGO reefs and sketching ocean life, foreshadowing a future career blending engineering
    precision with marine biology.
  sports: A spirited swimmer, Lorraine Pope participates in the Neighborhood Suns Swim Club’s under‑5 program, loves playing tag at the park, and cheers for the city’s professional baseball team, the Riverfield
    Rangers, while also dabbling in junior soccer with the Greenfield Gators.
  arts: A creative illustrator, Lorraine Pope fills sketchbooks with vibrant drawings of sea turtles and dinosaurs, draws inspiration from Eric Carle’s bold collages and Beatrix Potter’s animal tales, and
    sings along to "Under the Sea" from The Little Mermaid during playtime.
  travel: An inquisitive explorer, Lorraine Pope has collected seashells at the nearby Oceanview Beach, visited the city aquarium to see jellyfish up close, and dreams of snorkeling the Great Barrier Reef
    and hiking the volcanic landscapes of Iceland.
  culinary: A budding chef, Lorraine Pope enjoys assembling peanut‑butter‑jelly sandwiches, mixing pancake batter with flour, eggs, and blueberries, and savoring fish‑shaped goldfish crackers, cheese‑topped
    pizza, and strawberry‑banana smoothies.
  core: Lorraine Pope blends meticulous curiosity with playful imagination, turning backyard discoveries into LEGO masterpieces while meticulously saving allowance for her next creative adventure.
background:
  cultural: Lorraine was born and raised in Crestview, Florida, in a middle‑class family that blends Southern hospitality with typical Gulf Coast lifestyle. Her family celebrates common American holidays
    such as Thanksgiving, Christmas, and the Fourth of July, often with beach outings and picnics near the nearby Gulf. Lorraine attends a local preschool that incorporates play‑based learning and occasionally
    participates in church Sunday school, where she learns basic values of kindness and community service. The region’s natural environment—beaches, pine forests, and wildlife refuges—has nurtured her curiosity
    about nature, while the close‑knit community encourages polite interaction, cooperation, and a balanced emphasis on both group activities and personal reflection.
