personas:
  professional: Aramis Mora is a retired handyman‑turned‑community organizer who leverages his practical skills in minor home repairs, gardening, and bilingual communication to keep the senior center running
    smoothly, all while maintaining structured volunteer schedules and a dependable, low‑key demeanor.
  sports: Aramis Mora follows Major League Baseball with a particular enthusiasm for games featuring Caribbean teams, attends local park league matches when schedules allow, and incorporates gentle morning
    walks in Concord’s Frank Liske Park as his regular low‑impact fitness routine.
  arts: Aramis Mora enjoys listening to classic salsa, plena, and bomba recordings by legends such as Rafael Hernández and Ismael Rivera, often humming along while preparing meals, and occasionally attends
    parish choir rehearsals, finding the rhythm of the music soothing and reinforcing his cultural connections.
  travel: Aramis Mora dreams of revisiting the historic streets of Old San Juan and exploring the lush Guajataca forest, while also planning modest road trips to nearby Blue Ridge Mountains and Atlantic
    coastal towns, preferring well‑planned itineraries that balance leisurely sightseeing with comfortable accommodations.
  culinary: Aramis Mora expertly prepares arroz con gandules, pasteles, and lechón using a secret sofrito blend of cilantro, achiote, and annatto, enjoys experimenting with fresh herbs from his garden like
    oregano and basil, and delights in serving homemade tembleque dessert to family gatherings, though he sometimes over‑salts the beans in his enthusiasm.
  core: Aramis Mora is a structured, community‑focused elder who blends hands‑on craftsmanship, culinary tradition, and gentle worry into a life of quiet service and flavorful gatherings.
background:
  cultural: Aramis was raised in a Puerto Rican household where Spanish was spoken daily and Catholic traditions guided family life. He grew up celebrating holidays such as Navidad, Three Kings Day, and
    San Juan festivals, with an emphasis on music, dance, and communal meals. The flavors of arroz con gandules, pasteles, and alcapurrias are central to his culinary identity, and he carries these traditions
    to his home in Concord, North Carolina. While adapting to life on the mainland, he maintains strong ties to his heritage by participating in the local Puerto Rican community's cultural events, teaching
    his grandchildren Spanish phrases, and preserving the importance of family solidarity, respect, and reciprocity that shaped his upbringing.
attributes:
  skills: '[''Home maintenance (plumbing, electrical, carpentry)'', ''Traditional Puerto Rican cooking'', ''Bilingual communication (Spanish/English)'', ''Community volunteer coordination'', ''Basic first
