personas:
  professional: Kevin Lowe is a seasoned carpenter and budding studio founder who blends two decades of structural framing expertise with a flair for client‑centered workshops, leveraging his meticulous
    blueprint reading and talkative charisma to lead teams and showcase projects as the charismatic front‑man of his own future woodworking studio.
  sports: Kevin Lowe is a regular on the Moorhead Ice Hawks adult league, fiercely competitive as a forward on the ice while also coaching youth hockey drills, and they follow the Minnesota Wild avidly,
    balancing winter rink time with early‑morning fishing trips on the Red River that double as low‑impact cardio.
  arts: Kevin Lowe fronts the folk‑rock group Red River Rambler, wielding rhythm guitar and a gravelly voice that charms local tavern audiences, while they draw creative inspiration from Bob Dylan, Gillian
    Welch, and the regional storytelling tradition evident in the works of author Louise Erdrich, often weaving song narratives about timber, river, and community.
  travel: Kevin Lowe prefers road‑trip adventures that combine woodworking fairs and outdoor pursuits, charting routes to places like Badlands National Park for a weekend hike, the historic timber towns
    of British Columbia for inspiration, and the Minnesota State Fair for procurement of reclaimed wood, all while keeping travel costs low by camping in a refurbished trailer they built themselves.
  culinary: Kevin Lowe’s palate is rooted in hearty Midwestern fare—smoked trout from his own catch, skillet‑seared pork tenderloin with apple‑cider glaze, and garden‑fresh heirloom tomato salads—while
    they enjoy crafting custom cutting boards that double as serving platters, and they never miss the ritual of ending meals with a slice of warm, cinnamon‑spiced apple pie.
  core: Kevin Lowe blends a disciplined, structure‑driven work ethic with a gregarious, competitive spirit, channeling two decades of carpentry into a fledgling studio while thriving on community music,
    ice‑hockey camaraderie, and hands‑on DIY projects, all punctuated by a calm resilience and occasional neglect of dental care.
background:
  cultural: Kevin was raised in a middle‑class, second‑generation Scandinavian‑American family in the Moorhead area. His parents were active in the local Lutheran church, emphasizing hard work, modesty,
    and community service. Growing up in the Upper Midwest, he absorbed the region’s agricultural roots, seasonal outdoor traditions, and the value placed on craftsmanship. He attended the local public
    high school and completed some coursework at Minnesota State Community College in construction and design before entering the carpentry trade. The tight‑knit Midwestern culture, with its focus on reliability,
    self‑reliance, and friendly competition at community events, has shaped his practical mindset, calm resilience, and sociable demeanor.
attributes:
  skills: '[''Structural framing'', ''Custom cabinet making'', ''Finish carpentry'', ''Historic restoration'', ''Blueprint interpretation'', ''Construction management'', ''Project scheduling'', ''Power‑tool
