  hobbies: '[''Playing rhythm guitar and singing in a folk‑rock band'', ''Recreational ice hockey'', ''DIY woodworking projects'', ''Volunteering as a lumber‑jack competition judge'', ''Fishing on the Red
    River'', ''Gardening'', ''Attending the North Dakota State Fair'', ''Participating in community workshops on sustainable building'']'
  career_goals: Kevin aims to evolve from a freelance carpenter into the owner of a full‑service woodworking studio that offers custom furniture, high‑end renovations, and apprentice training. In the next
    five years he plans to secure a commercial workshop space in Moorhead, expand his client base through an online portfolio, and earn a Master Craftsman certification from a reputable woodworking guild.
    He also wants to launch a monthly community class on sustainable building practices and serve as an adjunct instructor at the local community college, leveraging his practical expertise and love for
    mentoring. Long‑term, he envisions his studio becoming a regional hub for quality craftsmanship and a launchpad for the next generation of carpenters.
