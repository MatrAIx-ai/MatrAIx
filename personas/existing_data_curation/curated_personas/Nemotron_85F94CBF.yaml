personas:
  professional: Kimberly Wesleyjohnson is an aspiring multidisciplinary artist who merges hand‑drawn sketching, digital illustration, and AI‑assisted visual design into concept art for graphic novels and
    games, but their spontaneous nature and resistance to rigid schedules often leads to missed deadlines.
  sports: Kimberly Wesleyjohnson plays drop‑in basketball with the Riverside Rovers youth club, jogs the local park in the spring, and watches the NBA’s Los Angeles Lakers and the NFL’s Green Bay Packers
    on weekends, yet their spontaneous approach to fitness results in an irregular training routine.
  arts: Kimberly Wesleyjohnson channels an eclectic love for speculative fiction into daily sketches, draws inspiration from illustrators like Moebius and musician Anderson .Paak, frequents local poetry
    slams featuring spoken‑word artists such as Sarah Kay, and curates a playlist of R&B legends like Erykah Badu to fuel their creative process.
  travel: Kimberly Wesleyjohnson plans spontaneous weekend getaways on a shoestring budget, has visited Detroit’s mural district and taken a school trip to Austin, while dreaming of immersive futuristic
    tours of Tokyo and a creative residency in Reykjavik, though limited finances and school commitments often keep those ambitions in the realm of future plans.
  culinary: Kimberly Wesleyjohnson enjoys experimenting in a modest kitchen, confidently whipping up miso ramen with tofu, nori, and scallions, mastering simple vegan stir‑fry with jackfruit, sriracha,
    and lime, yet often skips meals to sketch late into the night, rewarding occasional brunch outings with avocado toast and poached eggs.
  core: Kimberly Wesleyjohnson is a fiercely imaginative teen artist who blends AI‑enhanced illustrations with handwritten sketches, wrestles with anxiety‑driven journaling, and habitually loses track of
    deadlines while thriving in solitary creative bursts.
background:
  cultural: Kimberly is a Black teenager growing up in Peachtree Corners, a suburban community on the edge of Atlanta, Georgia. She draws cultural strength from the rich African-American heritage of the
    South—family gatherings filled with soul food, gospel music at her local church, and storytelling traditions that celebrate resilience and creativity. Community events such as Juneteenth celebrations
    and local art festivals expose her to contemporary Black artists who blend history with modern expression. While she embraces the digital culture of her generation, she also values the intergenerational
    wisdom shared by her grandparents and elders, which informs her artistic voice and her desire to represent Black experiences in her work.
attributes:
  skills: '[''Creative Writing'', ''Illustration'', ''Digital Graphic Design'', ''Basic HTML/CSS'', ''Video Editing'', ''Conceptual Storyboarding'', ''Photography'', ''Music Production (GarageBand)'', ''Emotional
    Insight'', ''Collaborative Group Projects'']'
  hobbies: '[''Sketching'', ''Digital Painting'', ''Reading Science Fiction & Fantasy'', ''Poetry Writing'', ''Listening to R&B and Hip-Hop'', ''Exploring AI Art Generators'', ''Journaling'', ''Urban Photography'',
    ''Attending Local Poetry Slams'', ''Meditative Walking'']'
  career_goals: Kimberly aspires to become a multidisciplinary artist, eventually working as an illustrator for graphic novels or as a concept artist in the gaming industry. She hopes to earn a scholarship
    to a university with a strong fine-arts program, where she can further refine her digital painting and animation skills. In the long term, she envisions using her art to amplify under-represented voices
    in her community and to create visual narratives that foster mental-health awareness among other young people who experience stress and anxiety. She also dreams of establishing a freelance studio that
    blends traditional media with emerging technologies such as AI-generated art.
