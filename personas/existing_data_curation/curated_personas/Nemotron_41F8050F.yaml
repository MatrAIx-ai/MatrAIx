personas:
  professional: Jomaris Espinoza is a budding young illustrator and mini-architect who channels their meticulous organization and high standards into vibrant paintings and precisely assembled LEGO creations,
    demonstrating an early professional-grade focus on detail and creative problem-solving.
  sports: Jomaris Espinoza eagerly joins the after-school Ridgefield Soccer Club for weekly matches, follows the United States Women's National Team for inspiration, and brings the same organized focus
    and high personal standards to their weekend soccer games, which they treat as both fun play and a disciplined fitness routine.
  arts: Jomaris Espinoza pours their love of bright visuals into paintings that echo the playful boldness of Yayoi Kusama and the colorful scenery of Disney's Moana, dances to the energetic beats of BTS
    and Kidz Bop, and spends bedtime hours with adventure novels by Enid Blyton, weaving these influences into a uniquely vivid artistic outlook.
  travel: Jomaris Espinoza loves family road trips that blend excitement and discovery, eagerly recounting their recent visits to Disneyland and the Grand Canyon while dreaming of a future adventure to
    Paris's Eiffel Tower, and they meticulously help plan each outing with a sticker-filled itinerary that balances fun attractions with time for drawing nature scenes.
  culinary: Jomaris Espinoza proudly assists in family kitchens by kneading dough for fluffy pancakes, chopping bright red bell peppers for tacos al pastor, and whisking fresh guacamole with ripe avocados
    and lime, delighting in the vivid colors and flavors while proudly presenting their culinary creations to friends at school lunches.
  core: Jomaris Espinoza blends disciplined ambition with a boundless love for bright art, soccer, and LEGO, yet they often lose track of time when choreographing dance moves in the living room, leaving
    a trail of scattered crayons.
background:
  cultural: Jomaris is raised in a Mexican‑American household in Wichita, Kansas. She speaks both Spanish and English at home, celebrates Día de los Muertos and other Mexican holidays, enjoys traditional
    música regional, learns folk dances, and participates in community events at the local Hispanic cultural center.
