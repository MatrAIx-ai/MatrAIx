personas:
  professional: Jonathon Burhans, a retired civil engineer with a lifetime of experience in structural design and project coordination, applies their analytical mind to everything from troubleshooting home
    wiring to mentoring high‑school STEM clubs, blending practical problem‑solving with a compassionate, hands‑on mentorship style that keeps their community projects thriving.
  sports: Jonathon Burhans, an avid follower of the Atlanta Braves and longtime fan of the Georgia Bulldogs, enjoys watching baseball and college football games at the local community center while maintaining
    physical fitness through daily walks in Decatur’s parks and participation in a neighborhood seniors’ pickleball league; they also play bridge competitively with a small circle of friends, treating the
    card game as a cerebral sport.
  arts: Jonathon Burhans, a lover of classic jazz, fills their evenings with the sounds of Miles Davis, Duke Ellington, and Billie Holiday while leafing through historical biographies by David McCullough
    and Barbara Tuchman, and they channel the same creative energy into crafting wooden furniture in their shed, viewing each piece as both functional art and a homage to mid‑century design.
  travel: Jonathon Burhans, a nostalgic traveler who favors leisurely road trips to historic destinations such as Gettysburg, Savannah’s riverfront, and the monuments of Washington, D.C., plans trips months
    in advance to accommodate mobility needs, often visiting family in neighboring states or attending genealogy conferences in New England, balancing a love for exploration with the comfort of staying
    in familiar, accessible accommodations.
  culinary: Jonathon Burhans, an enthusiastic home cook, delights in preparing traditional comfort dishes like fried chicken, collard greens, buttery cornbread, and peach cobbler, while also integrating
    fresh heirloom tomatoes, sweet potatoes, and okra from their garden into seasonal soups and stews, and they showcase a solid intermediate skill set in canning and slow‑cooking techniques that turn family
    recipes into weekend feasts.
  core: Jonathon Burhans, an 88‑year‑old retired engineer with a green thumb, jazz‑filled ears, and a penchant for mentoring, weaves curiosity and practicality into a life of gardening, woodworking, and
    community service, all while occasionally losing track of appointments in favor of a good bridge hand.
background:
  cultural: Jonathon is a White American who grew up in the post‑World War II South, absorbing a blend of Midwestern work ethic and Southern hospitality. Raised in a Protestant (Methodist) family, his upbringing
    emphasized faith, community service, and respect for tradition. He identifies with the values of his generation—hard work, modesty, and civic duty—while also embracing the curiosity fostered by his
    STEM education. Living in Decatur, GA, he participates in local cultural traditions such as church gatherings, neighborhood potlucks, and volunteer initiatives, reflecting a deep commitment to nurturing
    harmony and connection within his community.
attributes:
  skills: '["Civil Engineering (Structural Design)", "Project Planning & Coordination", "Electronics Repair", "Woodworking & Carpentry", "Mentoring & Coaching", "Community Outreach & Conflict Mediation"]'
  hobbies: '["Gardening (heirloom vegetables)", "Woodworking (furniture making)", "Reading (history and biographies)", "Classic jazz listening", "Birdwatching", "Bridge (card game)", "Genealogy research",
    "Cooking (Southern comfort food)"]'
  career_goals: Even in retirement, Jonathon aims to leave a lasting legacy by sharing his knowledge with younger generations. He volunteers as a mentor for local high‑school STEM clubs, hopes to author
    a memoir that weaves together his engineering projects and life lessons, and is working to expand the neighborhood community garden he helped found. He also desires to stay mentally sharp by learning
    basic coding for hobbyist electronics projects and to maintain his health through regular gardening and walking in the Decatur parks.
