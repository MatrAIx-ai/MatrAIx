personas:
  professional: Rebeca Benjumea, an aspiring 12‑year‑old game designer, transforms fantasy sketches of mythic creatures into simple Python prototypes, meticulously planning each coding session to meet school
    project deadlines while exclusively working in the quiet of their bedroom to avoid social distractions, and they thrive on solitary focus.
  sports: Rebeca Benjumea enjoys birdwatching hikes at the local wetlands, runs on the school cross‑country team, supports the New York Yankees and follows the regional youth soccer league, and they channel
    their competitive nature into personal time‑trial challenges.
  arts: Rebeca Benjumea spends evenings sketching landscapes and fantastical beings while listening to a curated mix of Celia Cruz, Plena Libre, and Brian Eno, frequently citing Alan Lee and Hayao Miyazaki
    as inspirations, and they channel their critical eye into refining each line with methodical precision.
  travel: Rebeca Benjumea plans weekend excursions to nearby nature reserves like the wetland sanctuary with a spreadsheet itinerary, dreams of hiking the misty trails of El Yunque and witnessing the northern
    lights in Iceland, yet they are constrained by school obligations and a modest pocket money allowance.
  culinary: Rebeca Benjumea loves preparing family recipes such as mofongo and arroz con gandules, expertly mashing plantains and stirring sofrito, yet they often over‑season in an attempt to impress, and
    they meticulously document each cooking experiment in their reflective journal.
  core: Rebeca Benjumea is a solitary, methodical 12‑year‑old who blends fantasy art, coding, and cooking while navigating intense anxiety and a competitive drive that fuels both creative triumphs and occasional
    impulsive splurges, and they constantly seek quiet spaces to recharge.
background:
  cultural: Rebeca is a second‑generation Puerto Rican growing up in Saint Cloud, Florida. Her household blends Spanish and English, celebrates traditions such as Noche de San Juan, and prepares classic
    dishes like pasteles, mofongo, and arroz con gandules. The vibrant Puerto Rican diaspora in Osceola County, coupled with the multicultural environment of Central Florida, shapes her artistic perspective,
    prompting her to weave Caribbean motifs, bilingual narratives, and a strong sense of cultural identity into her creative work.
