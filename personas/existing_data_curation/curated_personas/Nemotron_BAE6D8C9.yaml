  career_goals: Rebeca aspires to become a professional concept artist and narrative designer, crafting visual worlds for video games or animated stories while incorporating elements of Puerto Rican heritage.
    In the short term, she aims to enroll in an arts‑focused high‑school program, expand her portfolio with freelance commissions, and earn recognition for culturally rich illustrations. Long‑term, she
    envisions studying graphic design or interactive media at a university, establishing a solo studio that produces graphic novels and visual projects that blend Caribbean motifs with speculative storytelling,
    and ultimately working both independently and with creative teams that value originality and depth.
