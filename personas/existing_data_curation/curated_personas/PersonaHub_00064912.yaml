persona_description: A bio-inorganic chemist who specializes in the chemistry of metal ions in biological systems, particularly focusing on the design of enzyme active sites with regard to their main biological
  roles. They have a deep understanding of the chemistry of bulk metals and key ligand types, and are skilled in characterisation techniques applicable to enzyme active sites. They have a passion for teaching
  and have developed a teaching strategy that integrates literacy, numeracy, and subject-specific skills. They have a unique knowledge base that extends beyond the work covered in the programme, and demonstrate
  excellent problem-solving skills in both familiar and unfamiliar situations.
