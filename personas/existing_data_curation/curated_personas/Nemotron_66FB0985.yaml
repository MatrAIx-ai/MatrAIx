personas:
  professional: Angeles Castro, a seasoned community volunteer, leverages bilingual communication, culinary expertise, and seamstress skills to organize senior center art programs and cultural events, blending
    meticulous planning with spontaneous creativity while occasionally forgetting to log volunteer hours.
  sports: Angeles Castro follows the Houston Astros and Dallas Cowboys on television, participates in a low‑impact walking club at the senior center, tends a garden as daily exercise, and enjoys occasional
    community salsa dancing classes, though they avoid high‑intensity workouts due to joint discomfort.
  arts: Angeles Castro, an avid watercolorist, spends afternoons painting blooming tomatoes and historic neighborhood scenes while listening to folk singer‑songwriter Lila Downs, is a dedicated crocheter
    of blankets for charity, and often quotes Frida Kahlo, though they sometimes struggle to finish projects when distracted by storytelling.
  travel: Angeles Castro enjoys leisurely trips to historic Gulf Coast towns like Galveston and to vibrant cultural festivals in New Orleans, prefers guided tours that accommodate a slower pace, has a wish
    list that includes visiting the missions of San Antonio and exploring the gardens of Versailles, yet tends to book travel last minute, worrying about mobility.
  culinary: Angeles Castro prepares traditional mole with dried chiles, homemade pan dulce, and heirloom tomato salads, uses a well‑worn cast‑iron skillet and fresh herbs from a backyard garden, relishes
    the sweet aroma of cinnamon and piloncillo while baking, but has a habit of over‑seasoning dishes until the palate is overwhelmed.
  core: Angeles Castro blends curiosity, steadfast community spirit, and a love for colorful cuisine and watercolor, juggling a tendency to over‑commit to events with a gentle habit of forgetting to water
    houseplants on rainy days.
background:
  cultural: Angeles grew up in a bilingual Mexican‑American household in Texas, where Spanish was spoken at home and English was used in school and the wider community. Her upbringing was steeped in Catholic
    traditions, family celebrations like Día de los Muertos, and the communal spirit of neighborhood fiestas. She carries forward the values of respect for elders, strong family bonds, and hospitality,
    while also embracing the Texan blend of cultures. Her identity reflects a balance of preserving Mexican customs—such as cooking mole, making papel picado, and honoring patron saints—and participating
    in local Texan traditions, creating a rich, hybrid cultural perspective.
attributes:
  skills: '["Traditional Mexican cooking", "Bilingual Spanish–English communication", "Sewing and embroidery", "Gardening", "Community event organization", "Storytelling and oral history", "Basic computer
