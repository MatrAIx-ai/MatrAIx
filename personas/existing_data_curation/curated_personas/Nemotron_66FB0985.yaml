  hobbies: '["Watercolor painting", "Gardening (heirloom vegetables and herbs)", "Baking traditional Mexican pastries", "Listening to Mexican folk music", "Reading historical fiction about Mexican heritage",
    "Attending cultural festivals and art openings", "Storytelling and oral history sharing", "Crocheting blankets for charity"]'
  career_goals: Even at 76, Angeles aims to leave a lasting cultural legacy. She plans to mentor younger volunteers at the senior center’s art program, help curate a small exhibit of local Mexican‑Texan
    artwork, and compile a family recipe book coupled with anecdotes for future generations. She also hopes to learn watercolor painting techniques to express her curiosity about visual art and perhaps
    contribute a few pieces to community displays.
