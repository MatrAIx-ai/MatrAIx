personas:
  professional: Louis Herrington is a veteran electrician with over four decades of experience in residential, commercial, and industrial wiring, who now integrates his methodical expertise and artistic
    curiosity into gallery lighting design while pursuing Master Electrician certification and part‑time consulting.
  sports: Louis Herrington is an avid supporter of the Rochester Red Wings baseball team and the Buffalo Bills, participates in a weekly senior walking club at Highland Park, plays occasional golf at Monroe
    Golf Club each spring, and enjoys casual handball at the Rochester Community Center, preferring low‑intensity activities that fit his age and health considerations.
  arts: Louis Herrington immerses himself in Rochester’s vibrant arts scene, sketching still‑lifes inspired by Caravaggio’s chiaroscuro, attending exhibitions of Ansel Adams’ photography at the George Eastman
    Museum, designing custom lighting for local gallery openings, and listening to Beethoven’s Ninth Symphony while painting, all of which satisfy his curiosity and need for solitude.
  travel: Louis Herrington favors culturally rich trips, having explored Florence’s Uffizi Gallery, toured the historic streets of Salem, Massachusetts, experienced the luminous Luminosa Light Festival
    in Girona, Spain, and he hopes to study traditional illumination techniques in Kyoto’s ancient temples, balancing his love of art with the comfort of well‑planned itineraries.
  culinary: Louis Herrington enjoys moderate cooking, regularly preparing herb‑infused rosemary chicken, roasted root vegetables with thyme, and a hearty minestrone soup enriched with basil, garlic, and
    Parmesan, while savoring fresh focaccia drizzled with olive oil, and he often incorporates garden‑grown herbs into his meals.
  core: Louis Herrington is a meticulous electrician‑artist who blends precise wiring with poetic light, worries about every detail, yet finds solace in garden roses, vintage radios, and quiet sketching
    sessions.
background:
  cultural: Louis is a second-generation American of Irish-German ancestry, raised in a modest, working-class neighborhood on the east side of Rochester. His family's roots in the city trace back to the
    early 20th-century manufacturing boom, and values of hard work, reliability, and community service were instilled early on. While he grew up attending a Methodist church, his cultural identity is shaped
    by the Rochester ethos of modesty, self-reliance, and appreciation for both the city's industrial past and its thriving arts community. He takes pride in local traditions such as the Lilac Festival
    and the annual Rochester International Jazz Festival, and he maintains close ties with the region's union network and neighborhood cooperatives.
attributes:
