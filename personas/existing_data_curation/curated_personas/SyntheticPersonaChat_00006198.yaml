    User 2: I like to go out with friends, watch movies, and just relax.

    User 1: Oh, that sounds nice. I like to do those things too.

    User 2: Me too!

    User 1: So, what do you want to do after college?

    User 2: I''m not sure yet. I''m thinking about going to grad school, but I''m not sure what I want to study.

    User 1: Oh, I see. Well, I''m sure you''ll figure it out.

    User 2: Thanks, I hope so!

    User 1: So, what do you think of our new professor?

    User 2: I think he''s pretty good. He''s really enthusiastic about the subject and he''s a good teacher.

    User 1: I agree. He seems like he really knows what he''s talking about.

    User 2: Yeah, he does.

    User 1: So, what do you think of the class so far?

    User 2: I think it''s going well. The material is interesting and the professor is good at explaining it.

    User 1: I agree. I''m really enjoying it so far.

    User 2: Me too!

    User 1: So, what do you think of the new syllabus?

    User 2: I think it''s pretty good. It''s clear and concise, and it gives us a good idea of what we''re going to be learning.

    User 1: I agree. It''s a good syllabus.

    User 2: Me too!'
