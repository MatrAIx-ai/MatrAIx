  hobbies: '[''Visiting art galleries and museums'', ''Painting (watercolor and acrylic)'', ''Playing acoustic guitar'', ''Adult soccer league'', ''Hiking local parks'', ''Fishing on the Kalamazoo River'',
    ''Cooking traditional Mexican cuisine'', ''Attending local music and cultural festivals'', ''Photography (landscape and street)'', ''Volunteering at community centers'']'
  career_goals: Jose aims to transition from hands-on driving to a supervisory logistics role within the next three years, targeting a position such as regional fleet supervisor or logistics coordinator.
    He plans to earn the Certified Transportation Professional (CTP) credential and complete a certification in supply-chain management. Long-term, he aspires to launch his own niche delivery service that
    specializes in transporting artwork and cultural goods, combining his passion for art with his industry expertise, while also mentoring new drivers from immigrant backgrounds.
