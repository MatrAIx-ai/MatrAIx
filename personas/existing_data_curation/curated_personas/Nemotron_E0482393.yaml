personas:
  professional: Jose Estevez, a 48‑year‑old Class A CDL driver turned logistics strategist, leverages meticulous route planning, bilingual client negotiations, and fleet‑management tech expertise to ensure
    on‑time deliveries while mentoring new drivers, all with a keen eye for opportunities to transport artwork.
  sports: Jose Estevez stays fit by playing forward for a Kalamazoo adult soccer league, weekend hiking the Kalamazoo River Valley Trail, casting lines on the Kalamazoo River for bass, and cheering the
    Detroit Lions and Michigan Wolverines while scheduling weekly bike rides with fellow drivers.
  arts: Jose Estevez fuels their creativity by painting watercolors of downtown murals, strumming acoustic guitar to the rhythms of Carlos Santana and Pat Metheny at local cafés, and frequenting the Kalamazoo
    Institute of Arts for exhibitions featuring Frida Kahlo and contemporary street‑art collectives.
  travel: Jose Estevez favors well‑planned road‑trip itineraries, having driven from Michigan to Oaxaca for a culinary immersion, and a weekend getaway to Asheville’s Blue Ridge Parkway, while dreaming
    of navigating the historic streets of Barcelona on a future European art tour.
  culinary: Jose Estevez enjoys cooking traditional dishes like chicken tinga, chiles rellenos, and handmade corn tortillas, skillfully blending chipotle, cumin, and fresh cilantro, while pairing them with
    craft brews from Kalamazoo breweries and occasionally exploring new flavors at farm‑to‑table pop‑ups.
  core: Jose Estevez is a methodical trucker‑turned‑logistics visionary whose love for art fuels midnight sketching sessions, yet their tendency to over‑schedule logistics calls can clash with spontaneous
    craft‑beer outings.
background:
  cultural: Jose is of Mexican heritage, raised in a bilingual household where Spanish and English were both spoken daily. His cultural upbringing emphasizes strong family ties, community solidarity, and
    respect for tradition, shaping his cooperative and kind disposition. He celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and holds a deep appreciation for Mexican folk art, music,
    and cuisine. Living in Battle Creek, Michigan, he blends his Mexican roots with Midwestern values, participating in local events, supporting Latino community organizations, and preserving his heritage
    through cooking, language, and artistic pursuits.
