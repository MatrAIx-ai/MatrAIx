persona_description: A researcher at the University of Florida's Institute of Food and Agricultural Sciences who specializes in plant diseases and their management. The researcher has experience with crape
  myrtle, a popular ornamental tree that has a disease problem. The researcher has conducted genetic testing to identify the cause of the disease and has published the first report of the bacterium causing
  leaf spot in crape myrtle. The researcher believes that the disease affects only crape myrtle commercial producers and is spread by factors such as overhead irrigation systems and large numbers of plants
  kept in close quarters. The researcher suggests an integrated management approach to the problem, rather than a silver bullet that only stops the problem temporarily. The researcher is based at the North
  Florida Research and Education Center in Quincy.
