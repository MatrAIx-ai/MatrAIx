persona_description: A scientist who is researching the potential for mining and refining materials from asteroids and other nearby bodies, with a focus on the development of robotics and 3D printing technology.
  He is passionate about the idea of establishing industry in space for a low cost and believes that it is possible to achieve this by starting with the simplest materials and gradually advancing to more
  advanced models and robots. He is also interested in the potential for mining precious metals from asteroids and the use of heat shields made of leftover soil to transport the materials back to Earth.
