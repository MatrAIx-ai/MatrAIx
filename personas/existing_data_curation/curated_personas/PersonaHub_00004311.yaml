persona_description: A healthcare professional who specializes in performing and interpreting x-rays and fluoroscopy tests for various body systems, including the skeletal, digestive, urinary, respiratory,
  and reproductive systems. They are knowledgeable in the use of contrast substances and have experience in obtaining detailed images of internal organs. They are likely to have a detailed understanding
  of the procedures involved in these tests and are skilled in communicating with patients to ensure their comfort and understanding of the tests. They may also be responsible for interpreting test results
  and providing recommendations for further care.
