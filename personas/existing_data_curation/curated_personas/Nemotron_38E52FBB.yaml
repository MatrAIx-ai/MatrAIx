personas:
  professional: Regina Mclean, a veteran vehicle and mobile equipment mechanic with three decades of hands‑on experience, combines meticulous diagnostic skill, strict safety adherence, and a cooperative
    yet assertive leadership style as they transition toward a mentorship and supervisory role, including developing structured training programs and pursuing EV power‑train certification.
  sports: Regina Mclean stays active through light hikes on nearby trails, a weekly senior walking club at the community center, and cheering for the local minor‑league baseball team, the River City Redbirds,
    while they prefer low‑impact exercise that fits their structured routine.
  arts: Regina Mclean expresses creativity through quilting intricate patterns inspired by automotive schematics, attending performances of folk singer Joan Baez, listening to classic country artist Dolly
    Parton, and volunteering at the Clyde Historical Society to preserve local heritage, which together shape their appreciation for craftsmanship and narrative.
  travel: Regina Mclean prefers well‑planned road trips that blend automotive history with scenic countryside, having driven Route 66 to the Henry Ford Museum in Michigan and now dreaming of a pilgrimage
    to the Porsche Museum in Stuttgart, all while balancing travel costs with a modest retirement budget.
  culinary: Regina Mclean enjoys cooking farm‑to‑table meals such as roasted chicken with rosemary, heirloom tomato salad, and vegetable stew using produce from their own garden, demonstrating a precise,
    recipe‑focused approach, though they occasionally skip breakfast in favor of a strong coffee.
  core: Regina Mclean is a precision‑driven mechanic‑mentor with a green thumb and classic‑car hobby, who balances structured routine with community‑centric activities, pragmatic finances, and a pragmatic
    yet slightly indulgent approach to health and leisure.
background:
  cultural: Regina grew up in a modest, white, working‑class family in the rural areas surrounding Sandusky County, Ohio. The Midwestern values of hard work, reliability, and community involvement shaped
    her worldview. Her family's tradition of hands‑on trades and self‑sufficiency encouraged an early interest in fixing and maintaining equipment. Being married and rooted in Clyde, she participates in
    local church gatherings and community events, reflecting the region's emphasis on neighborly support and modest, practical living. This cultural backdrop informs her disciplined, structured approach
    to both work and personal pursuits.
attributes:
  skills: '[''Automotive diagnostics'', ''Diesel engine repair'', ''Hydraulic system maintenance'', ''Electrical wiring and troubleshooting'', ''Preventive maintenance scheduling'', ''Parts inventory management'',
    ''Use of OBD-II scanning tools'', ''Safety compliance and OSHA standards adherence'', ''Team leadership and mentorship'']'
  hobbies: '[''Classic car restoration'', ''Gardening (vegetables and ornamental plants)'', ''Quilt making'', ''Volunteer work with local historical society'', ''Reading automotive history books and biographies'',
    ''Hiking local trails'', ''Attending community church events'']'
  career_goals: Looking ahead, Regina aims to transition from hands‑on repair work to a mentorship and supervisory role within the next few years. She envisions leading a small team of technicians at her
    current shop or at a regional dealership, developing structured training programs that codify her practical knowledge for the next generation of mechanics. Additionally, she is interested in gaining
    certification in electric‑vehicle power‑train maintenance to stay current with emerging technologies. Ultimately, Regina hopes to secure a stable, low‑stress position that allows her to gradually reduce
    hours while still contributing her expertise, and she is open to part‑time consulting for local farms and small businesses needing mobile equipment upkeep.
