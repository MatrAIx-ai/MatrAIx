  career_goals: Christie aims to transition into a senior supervisory role within the facilities department of a local health‑care or educational institution, where she can mentor younger custodial staff
    and implement sustainable cleaning initiatives. She plans to obtain a Green Cleaning Certification within the next year and, eventually, start a small side business offering eco‑conscious residential
    cleaning services. Securing a stable pension and building a modest savings buffer for retirement remain top priorities, and she hopes to use her experience to consult on cost‑effective maintenance strategies
    for community centers.
