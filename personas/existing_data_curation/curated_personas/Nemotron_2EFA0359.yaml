  career_goals: While approaching retirement, Marilyn aims to leverage her deep expertise to become a trusted financial advisor for Utah’s small‑business community and non‑profits, focusing on integrating
    cloud‑based accounting solutions and sustainability reporting. She plans to maintain her CPA designation and to create a mentorship program within her firm to support the next generation of women accountants.
    Additionally, she hopes to teach part‑time courses on practical accounting and ethics at a local community college, and to volunteer her financial knowledge with regional charitable organizations.
