  career_goals: Amaury aims to transition into senior technical leadership, ultimately becoming a Chief Technology Officer or founding his own startup that fuses AI with creative expression. Over the next
    five years, he plans to lead a multidisciplinary team building a platform for digital artists powered by generative models, secure patents, and publish research in reputable journals. He also seeks
    to mentor Latinx talent in technology, organize community hackathons, and become a recognized speaker at industry conferences, thereby shaping inclusive innovation ecosystems.
