  career_goals: Looking ahead, Tiffany aims to transform her practice into a boutique consultancy focused on sustainable, accessible design for aging residents in Gloucester County. She plans to obtain
    NCIDQ certification to bolster her professional credentials, and to mentor emerging designers through workshops and one‑on‑one coaching. Tiffany also aspires to publish a guidebook that blends practical
    design advice with historic preservation insights, and to lead community projects that revitalize historic neighborhoods. While preparing for a gradual transition toward semi‑retirement, she intends
    to continue selective consulting work that aligns with her values of craftsmanship, environmental responsibility, and social impact.
