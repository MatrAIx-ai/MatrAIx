personas:
  professional: Marilyn Montaigne is an aspiring urban sketcher who blends dystopian graphic novel aesthetics with Brooklyn cityscapes, channeling their competitive drive into freelance commissions for
    indie zines while wrestling with a love of spontaneity that often collides with the pressure of school deadlines.
  sports: Marilyn Montaigne squeezes quick jogs around the Prospect Park loop into their sketch‑filled afternoons, rolls with a local skate crew on weekends, roots for the Brooklyn Nets in basketball and
    New York City FC in soccer, and prefers solo cardio routines over team sports because they find group drills draining.
  arts: Marilyn Montaigne immerses themselves in ambient soundscapes by Brian Eno and Nils Frahm, pores over graphic novels by Alan Moore and the vivid murals of Lady Aiko, and draws stylistic cues from
    the subversive street works of Banksy, weaving these influences into their own sketchbooks and occasional experimental poetry.
  travel: Marilyn Montaigne favors spontaneous day trips, often catching the LIRR to wander the historic streets of Philadelphia or trek the rugged cliffs of Maine, while day‑dreaming about a future solo
    backpacking trek across Iceland’s volcanic terrain once they secure a college scholarship.
  culinary: Marilyn Montaigne enjoys crafting quick avocado toast topped with smoked salmon, perfecting midnight ramen bowls with miso and fresh bok choy, and experimenting with heritage spice blends like
    za’atar to add a touch of artisanal flair to their modest kitchen creations.
  core: Marilyn Montaigne is a restless teen artist who battles anxiety with graphite, obsessively annotates dystopian narratives, and balances a fierce competitive streak with an aversion to rigid schedules.
background:
  cultural: Marilyn is a White American whose family traces its roots to German and Irish immigrants who settled in the Midwest before moving to Brooklyn. Growing up in the culturally rich neighborhoods
    of Kings County, she has been immersed in the eclectic artistic scene of Brooklyn—from street murals to avant‑garde galleries—while also being exposed to the diverse languages, cuisines, and traditions
    of her neighbors. Her household values independence, critical thinking, and self-expression, which aligns with the progressive, individualistic atmosphere of her community. This blend of modest Midwestern
    heritage and vibrant urban art culture shapes her identity and creative outlook.
