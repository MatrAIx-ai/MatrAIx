  career_goals: She dreams of becoming a freelance illustrator and graphic novelist, creating immersive visual narratives that explore complex emotions. Marilyn hopes to attend a specialized art high school
    in New York and later study illustration at an undergraduate program such as the School of Visual Arts. She also wants to develop an online platform where she can share her art, write mental-health-focused
    essays, and collaborate with other young creators on collaborative comics. In the long term, she envisions using her art to raise awareness about anxiety and emotional well-being.
