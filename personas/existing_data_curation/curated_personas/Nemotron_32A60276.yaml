    coding club projects"]'
  career_goals: Maria aspires to become a community‑focused professional who can blend her love for learning with helping others. She dreams of becoming a teacher or a community health advocate, roles where
    she can organize educational programs, mentor younger children, and promote wellness within her neighborhood. Inspired by the desert environment, she also envisions a future in environmental science
    or conservation, working to protect local flora and raise awareness about sustainable living. Her long‑term ambition is to lead projects that combine education, health, and cultural heritage, ensuring
    that both her Mexican roots and her Desert Hot Springs community thrive.
