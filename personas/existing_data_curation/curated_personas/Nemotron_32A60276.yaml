personas:
  professional: Maria Rojas is a budding junior coder who, through her school's Scratch club, designs interactive adventure stories that blend scientific curiosity with structured project planning, reflecting
    their disciplined, achievement‑driven mindset.
  sports: Maria Rojas shines as a forward on the Desert Cactus FC youth soccer team, cheering for the Arizona Cardinals and Phoenix Suns while also idolizing the Phoenix Rising FC forward, and they spend
    weekends after practice sprinting on desert trails to boost stamina, revealing their energetic, team‑oriented spirit.
  arts: Maria Rojas dazzles in the school folk dance troupe, performing lively choreography to melodies by the local band Desert Echoes and crafting intricate papel picado for community festivals, while
    also devouring graphic novels by creators like Jim Lee, illustrating their love for vibrant storytelling and cultural expression.
  travel: Maria Rojas prefers adventurous day trips to nearby desert preserves such as Saguero National Park and weekend family outings to the Grand Canyon, planning each excursion with detailed checklists
    and a pocket notebook of curiosities, yet they sometimes postpone trips when school projects demand extra focus, highlighting their curiosity‑driven wanderlust balanced by disciplined priorities.
  culinary: Maria Rojas enjoys snacking on fresh mango slices and homemade queso fresco tacos while eagerly helping their family roll colorful papel picado, and they proudly attempt to bake simple cinnamon
    churros, often ending up with a slightly burnt edge because they rush to get back to their science experiment, reflecting both their love of flavorful foods and their occasional haste.
  core: Maria Rojas is a curious, organized ten‑year‑old who channels boundless energy into soccer, coding, and folk crafts, balancing a drive for achievement with a playful love of adventure, even if they
    sometimes forget to sip water during games.
background:
  cultural: Maria is a Mexican‑American growing up in Desert Hot Springs, California. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, quinceañera preparations, and
    seasonal festivals with music, dance, and homemade cuisine like tamales and pozole. Bilingualism is a daily reality at home, where Spanish is spoken alongside English, fostering her fluency in both
    languages. The close‑knit Mexican community in Riverside County values family solidarity, respect for elders, and communal support, which shapes Maria's cooperative yet assertive demeanor. Additionally,
    the desert landscape influences her appreciation for nature and informs her emerging interest in environmental stewardship.
