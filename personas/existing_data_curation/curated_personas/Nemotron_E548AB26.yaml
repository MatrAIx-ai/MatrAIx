personas:
  professional: Joanel Larosa, a 26‑year‑old project management specialist in the tech sector, blends a methodical, Agile‑savvy approach with deep compassion to craft realistic timelines, mitigate risk,
    and bridge bilingual, multicultural teams while nurturing harmony and innovation.
  sports: Joanel Larosa, an avid weekend hiker who belongs to the Sierra Club Bay Area Chapter, follows the San Jose Sharks, Golden State Warriors, and San Jose Earthquakes, and occasionally plays recreational
    tennis at a local community center to stay active.
  arts: Joanel Larosa, a photography enthusiast who studies the work of Annie Leibovitz and enjoys contemporary fiction by Sally Rooney and Chimamanda Ngozi Adichie, spends evenings listening to Phoebe
    Bridgers and attending indie film screenings at the Castro Theatre.
  travel: Joanel Larosa, a meticulous planner who prefers solo or small‑group trips, has trekked Yosemite and explored Kyoto’s temples, dreams of wandering Patagonia’s glaciers, and balances travel aspirations
    with a modest budget that prioritizes cultural immersion over luxury.
  culinary: Joanel Larosa, an intermediate home cook who delights in preparing authentic mole poblano, chiles en nogada, and tacos al pastor using fresh cilantro, dried ancho chiles, and epazote, often
    sources ingredients at the Santa Cruz Farmers Market and savors the process as a meditative link to family traditions.
  core: Joanel Larosa, a methodical, empathetic project manager with high emotional reactivity, channels anxiety into disciplined routines, solitary creativity, and a commitment to uplifting underrepresented
    communities.
background:
  cultural: Joanel is a second‑generation Mexican‑American raised in the vibrant multicultural tapestry of the Bay Area. Her family hails from Jalisco, and she grew up speaking both Spanish and English
    at home, fostering a deep appreciation for Mexican customs such as Día de los Muertos celebrations and family‑centric gatherings. While she embraces the entrepreneurial spirit of Silicon Valley, she
    also preserves her cultural roots through frequent visits to Mexican bakeries, cooking family recipes, and participating in local Latino cultural festivals. This dual identity informs her collaborative
    style, making her attuned to the nuances of diverse teams and motivated to bridge cultural gaps in the workplace.
attributes:
  skills: '[''Project Planning and Scheduling'', ''Agile Methodologies (Scrum/Kanban)'', ''Risk Management'', ''Budgeting and Financial Forecasting'', ''Resource Allocation'', ''Stakeholder Communication'',
    ''Conflict Mediation'', ''Team Cohesion and Empathy‑Driven Leadership'', ''Data Visualization (PowerBI, Excel)'', ''Project Tracking Tools (JIRA, Asana)'', ''Basic SQL for Reporting'', ''Bilingual Communication
    (Spanish‑English)'']'
  hobbies: '[''Reading contemporary fiction and personal‑development books'', ''Journaling for emotional processing'', ''Cooking traditional Mexican cuisine'', ''Weekend hiking in nearby nature preserves'',
    ''Yoga and guided meditation'', ''Urban photography'', ''Volunteer tutoring and mentorship at community center'']'
  career_goals: Joanel aims to transition from a Project Management Specialist to a senior program manager within the next three years, securing PMP and Agile Certified Practitioner certifications along
    the way. Her long‑term ambition is to lead a cross‑functional program office that drives socially responsible technology initiatives, particularly those that increase access for underrepresented Latinx
    communities. She envisions mentoring junior women and Latinx professionals, fostering an inclusive workplace culture that values emotional well‑being. Additionally, she plans to pursue a part‑time MBA
    focused on sustainable business strategies to deepen her strategic leadership capabilities.
