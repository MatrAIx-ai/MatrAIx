    games (jigsaw, memory matching)'', ''Small‑group art workshops'']'
  career_goals: Siera dreams of becoming an artist who can bring stories to life through illustrations, perhaps working as a children's book illustrator or museum curator. She is also fascinated by the
    idea of designing interactive learning tools, so she imagines creating educational games that inspire other kids. As she matures, she hopes to combine her love for art and technology in a career that
    allows her to express unconventional ideas while helping others feel confident and creative.
