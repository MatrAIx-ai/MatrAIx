personas:
  professional: A budding junior illustrator who combines curiosity for fantasy worlds, methodical planning of art projects, and a reserved yet assertive work style, Siera Godinez uses Scratch to prototype
    interactive storybooks and organizes her art supplies with meticulous care.
  sports: A nature‑enthusiast who enjoys weekend desert hikes with the Henderson Junior Hiking Club, occasionally practices beginner soccer with the local community league, and cheers on the Las Vegas Aces
    and Vegas Golden Knights while maintaining a routine of sunrise stretching that balances her anxiety with physical release.
  arts: An avid creator and fan of visual storytelling, Siera Godinez spends hours drawing scenes inspired by J.K. Rowling’s magical worlds and Claude Monet’s soft palettes, practices piano pieces by Yiruma
    and Ludovico Einaudi, and attends library storytime sessions where she reenacts characters from Rick Riordan’s adventures, forging a sense of confidence through artistic expression.
  travel: An inquisitive explorer who plans family trips with detailed sketch maps, Siera Godinez loves weekend outings to Red Rock Canyon for desert photography, dreams of visiting the Grand Canyon’s rim,
    and imagines future adventures to Tokyo’s cherry blossom festivals, balancing her desire for new scenery with the comfort of familiar routines.
  culinary: A budding home chef who loves making colorful veggie wraps with hummus, sautéed chicken tacos seasoned with cumin and cilantro, and whipping up strawberry‑banana smoothies with fresh berries,
    Siera Godinez enjoys experimenting with simple recipes that let her design plates like mini works of art, though she sometimes forgets to clean the kitchen before starting a new project.
  core: Siera Godinez is a quietly curious eight‑year‑old whose sketchbooks double as emotional outlets, whose meticulous organization sometimes turns into hoarding of art supplies, and whose vivid imagination
    is balanced by occasional flood‑like anxiety.
background:
  cultural: Siera is a White American child raised in the suburban community of Henderson, Nevada. Her family emphasizes mainstream American traditions such as Thanksgiving and holiday celebrations, while
    also exposing her to the diverse cultural fabric of Southern Nevada, including local art festivals, desert heritage exhibits, and occasional community events that reflect Hispanic and Native American
    influences. This blend of a stable, family‑centered upbringing with exposure to a multicultural environment nurtures her appreciation for varied artistic expressions and unconventional ideas.
