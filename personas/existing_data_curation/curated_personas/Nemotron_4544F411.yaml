  career_goals: Juan Gabriel dreams of growing up to be someone who helps others and creates harmony. He envisions becoming a teacher who nurtures young minds, a pediatric doctor who cares for children,
    or a veterinarian who protects animals. His ambitions are guided by his calm resilience and desire to make a positive impact.
