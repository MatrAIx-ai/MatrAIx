personas:
  professional: Juan Rodriguez, a budding wildlife illustrator, turns backyard insect discoveries into detailed animal sketches, applying their curious yet practical mind to plan each drawing step‑by‑step,
    while their organized yet flexible nature ensures even the smallest details are never missed.
  sports: Juan Rodriguez enjoys setting up a mini soccer goal with the Little Rockets Soccer Club and joining the Junior Splash Swim Team for weekly lessons, while also cheering on the hometown baseball
    team, the Cubs, in televised games, preferring small‑group drills that balance teamwork with personal space.
  arts: Juan Rodriguez is an enthusiastic LEGO builder and animal illustrator who draws inspiration from Beatrix Potter’s rabbit sketches, Maya the Bee’s bright colors, and the gentle melodies of Spanish
    lullabies like Canta, Canta, often humming them while assembling creations.
  travel: Juan Rodriguez loves family road trips to the nearby state park’s butterfly garden and a summer vacation at San Diego’s sunny beach, and they daydream about one day trekking through the Amazon
    rainforest’s canopy when they’re older.
  culinary: Juan Rodriguez delights in mixing dough for mini pizzas topped with tomato sauce, mozzarella, and fresh basil, and they proudly perfect the batter for banana‑cinnamon cupcakes, often sprinkling
    colorful sprinkles as a finishing touch.
  core: Juan Rodriguez blends quiet curiosity with gentle compassion, turning backyard bug hunts into mini science labs while regularly leaving a trail of LEGO bricks wherever they sit.
background:
  cultural: Juan Gabriel’s family maintains strong ties to their Spanish heritage while embracing the multicultural atmosphere of Tucson. Spanish is spoken at home, and he celebrates traditions such as
    Día de los Reyes, Semana Santa, and local Mexican‑American festivals. Family meals feature paella, tortilla de patatas, and churros, and he often helps with cooking, learning recipes passed down by
    his grandparents. He attends a nearby Catholic parish, participates in community events that blend Spanish and Southwestern cultures, and enjoys listening to flamenco music and folkloric stories. These
    cultural experiences shape his identity and inform his values of community, compassion, and harmony.
