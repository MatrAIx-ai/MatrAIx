    and Problem Solving"]'
  hobbies: '["Cooking Mexican Cuisine", "Photography (Street & Landscape)", "Hiking in San Gabriel Mountains", "Reading Historical Nonfiction and Contemporary Fiction", "Playing Acoustic Guitar", "Attending
    Indie Film Screenings", "Participating in Small Film-Making Meet-Ups", "Volunteering as a Youth Media Mentor"]'
  career_goals: As he moves forward, Jorge aims to direct his first feature-length narrative that weaves Mexican cultural themes with contemporary Los Angeles life. He plans to establish a boutique production
    company that champions stories from under-represented Mexican-American voices, partnering with streaming platforms for wider distribution. He also aspires to expand his budgetary scope from independent
    projects to mid-scale studio productions, while maintaining a collaborative, harmonious work environment. Mentoring emerging filmmakers from his community and creating a scholarship program for high-school
    students interested in media are long-term ambitions that reflect his commitment to giving back.
