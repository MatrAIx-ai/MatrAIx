personas:
  professional: Jorge Mistri is a 32‑year‑old film and television production specialist who blends meticulous budgeting, crew coordination, and bilingual communication with a curiosity‑driven willingness
    to experiment on set, ensuring projects stay on schedule while nurturing a collaborative, harmonious atmosphere.
  sports: Jorge Mistri hikes the San Gabriel Mountains with a local outdoor club each weekend, enjoys casual pick‑up soccer with a community league that supports the LA Galaxy, and follows the Los Angeles
    Lakers, balancing a love for nature with a modest commitment to staying physically active.
  arts: Jorge Mistri captures street life through a vintage Leica, strums acoustic renditions of folk classics taught by their mother such as "La Llorona," and attends indie‑film screenings featuring directors
    like Jim Jarmusch and Sofia Coppola, while their reading list ranges from Isabel Wilkerson’s *The Warmth of Other Suns* to Chimamanda Ngozi Adichie’s *Americanah*, shaping a creative palate that blends
    visual, musical, and literary influences.
  travel: Jorge Mistri prefers meticulously planned weekend getaways that blend adventure and culinary exploration, having trekked the volcanic trails of Iceland, savored street tacos in Oaxaca, and plotted
    a future road trip along the Pacific Coast Highway to capture sunrise over Big Sur, all while balancing a modest travel budget and occasional family responsibilities.
  culinary: Jorge Mistri is a seasoned home chef who masters hand‑made mole and tamales, often experimenting by fusing them with Korean gochujang or Mediterranean spices, and delights in cooking dishes
    like chiles en nogada, using ingredients such as dried ancho chilies, masa harina, and Oaxaca cheese, while they occasionally over‑season to the point of making the sauce too spicy.
  core: Jorge Mistri, a 32‑year‑old production veteran, balances meticulous budgeting with creative risk‑taking, cooks experimental mole‑fusion dishes, hikes in solitude, and occasionally splurges on camera
    gear while quietly striving to amplify under‑represented voices in film.
background:
  cultural: Jorge was raised in a close-knit Mexican-American family in the Greater Los Angeles area, where bilingualism and strong intergenerational ties were central. Celebrations such as Día de los Muertos,
    Semana Santa, and family reunions in the kitchen instilled in him a deep appreciation for Mexican traditions, music, and cuisine. Growing up in Mission Hills, a community with a vibrant Latino presence,
    he frequently interacted with both his heritage community and the broader entertainment industry, shaping his identity as a bicultural creator. His Mexican roots inform his storytelling sensibility,
    emphasizing themes of family, perseverance, and cultural pride, while his American upbringing equips him with a pragmatic approach to navigating the competitive film market.
attributes:
  skills: '["Film Production Management", "Budgeting and Cost Control", "Production Scheduling", "Crew Coordination", "Location Scouting", "Post-Production Supervision", "Camera and Lighting Technical Knowledge",
