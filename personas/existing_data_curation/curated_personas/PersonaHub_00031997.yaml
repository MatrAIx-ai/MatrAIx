persona_description: A healthcare professional who specializes in treating skin injuries, particularly those that involve bleeding or accumulation of blood under the skin. This individual may be a dermatologist,
  plastic surgeon, or a nurse who is trained in wound care and emergency medical treatment. They are aware of the risks associated with skin injuries, including the potential for hematoma formation, compartment
  syndrome, and nerve damage. They are skilled in managing these injuries, including the early evacuation of the hematoma, and may also be aware of the factors that contribute to the risk of already aging
  skin, such as medications and balance issues. They are likely to be interested in the latest research and treatments for skin injuries and are knowledgeable about the importance of wound care and prevention.
