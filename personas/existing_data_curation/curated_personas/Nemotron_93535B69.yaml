personas:
  professional: Gareth Mccann is a methodical teen mechanic-in-training who leverages his hands-on skills in automotive maintenance, carpentry, and tool management to become the go-to problem-solver for
    his school robotics club and neighborhood friends, embodying reliability and a competitive drive to master every technical challenge.
  sports: Gareth Mccann competes in his town's youth basketball league, cheering for the local high school team and the NBA's Golden State Warriors, while also spending weekends fishing at nearby ponds
    for relaxation, balancing competitive drive with steady, low-key outdoor activity.
  arts: Gareth Mccann relaxes after a day of fixing cars by listening to classic rock bands like AC DC and Lynyrd Skynyrd, sketching car designs inspired by the works of automotive illustrator Chip Foose,
    and binge-watching car-centric shows like Fast N Furious and the series Top Gear.
  travel: Gareth Mccann prefers road trips that combine practical errands with adventure, planning a weekend drive to the state's automotive museum in Detroit and a fishing expedition to Lake Tahoe, while
    they keep travel costs low by staying with family friends and using a meticulously budgeted itinerary.
  culinary: Gareth Mccann favors straightforward, protein-rich meals such as pan-fried trout, cheeseburgers with thick-cut fries, and homemade chili, often cooking on the family grill and seasoning with
    simple staples like garlic, paprika, and fresh herbs, reflecting their preference for reliable, no-frills flavor.
  core: Gareth Mccann is a routine-obsessed teen who channels competitive energy into hands-on projects, from fixing engines to shooting hoops, while meticulously budgeting every dollar and keeping a spreadsheet
    for every hobby.
background:
  cultural: Gareth comes from a white, European‑American family rooted in South‑Jersey’s Atlantic County. His upbringing reflects the modest, working‑class culture of the region, where community events
    such as county fairs, high‑school sports, and Fourth of July picnics are central. Family life includes shared meals, regular church attendance, and a strong appreciation for a practical work ethic.
    The proximity to the Pinelands and the Atlantic shoreline has introduced him to outdoor traditions like fishing and seasonal hunting, reinforcing his preference for routine, reliability, and a down‑to‑earth
    outlook.
