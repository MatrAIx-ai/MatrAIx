  career_goals: Gareth plans to earn his GED within the next year and then enroll in a vocational automotive technology program at a community college. He aims to secure an apprenticeship with a local repair
    shop, achieve ASE certification, and eventually open a small, reliable garage serving his community. As a backup, he is interested in the U.S. Navy’s engineering tracks, attracted by the clear hierarchy,
    structured routine, and technical training the service provides.
