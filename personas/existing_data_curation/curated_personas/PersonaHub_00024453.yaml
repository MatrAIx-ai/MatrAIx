persona_description: A Mapbox user who is interested in creating a building height map for their map style using the Mapbox Streets v7 vector tiles. They are looking for a simple and easy way to style buildings
  on Mapbox Streets v7 by the height of the buildings, and are open to using different colors for buildings with different heights. They are interested in using Mapbox's setPaintProperty function to create
  buttons to turn their different building height layers on and off, or allowing their users to pick the color of each building height range for themselves.
