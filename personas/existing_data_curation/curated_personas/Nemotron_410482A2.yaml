  hobbies: '[''Painting'', ''Mixed‑media collage'', ''Indie music concerts'', ''Theater attendance'', ''Contemporary fiction reading'', ''Psychology non‑fiction'', ''Hiking'', ''Kayaking'', ''Photography'',
    ''Board game nights'', ''Experimental cooking'']'
  career_goals: Tara aspires to earn a bachelor's degree in Communications or Arts Administration and ultimately work as a digital content strategist for a nonprofit that promotes mental‑health awareness
    and arts education among youth. She envisions creating innovative, data‑driven campaigns that blend storytelling with visual design, leveraging her competitive drive to lead successful outreach initiatives.
    In the long term, Tara hopes to launch her own community‑focused arts collective in East Texas, where she can curate exhibitions, run workshops, and provide a supportive space for young creators while
    continuing to advocate for mental‑well‑being resources. Her goal is to balance personal creative fulfillment with measurable social impact, advancing into leadership roles that allow her to shape organizational
    culture and strategy.
