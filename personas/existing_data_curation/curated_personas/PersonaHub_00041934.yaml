persona_description: A team of engineers and scientists who specialize in developing and implementing numerical simulation tools for the automotive industry, focusing on the Gasoline Direct Injection (GDI)
  engine. They are skilled in using OpenFOAM® and in-house simulation codes, and have expertise in mapping piston/valve motions and simulating spray atomization. Their goal is to precisely investigate the
  entire engine process from nozzle flow to fuel/air mixture, ensuring the accuracy and reliability of their simulations.
