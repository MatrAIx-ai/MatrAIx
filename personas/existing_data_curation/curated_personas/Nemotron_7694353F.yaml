    and blankets", "Walking in local parks and birdwatching", "Learning digital photography"]'
  career_goals: Even though Lucero is retired from formal employment, she aims to deepen her impact on the local senior community by volunteering at the Kingsport Senior Center, where she hopes to lead
    cooking workshops that celebrate Mexican heritage. She dreams of compiling a small family cookbook that preserves her recipes and the stories behind them, sharing it with grandchildren and neighbors.
    Lucero also aspires to learn digital photography to document community events and the natural beauty of Sullivan County, with the eventual goal of creating a modest online gallery that connects her
    Mexican roots with her Southern home. Travel remains a gentle ambition; she hopes to visit her hometown in Mexico for a family reunion once her health permits.
