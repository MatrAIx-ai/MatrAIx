  career_goals: Amy aims to expand her private investigation practice into a boutique agency that specializes in missing‑person and cold‑case work in Alaska’s remote regions. She plans to integrate advanced
    technologies such as drone imaging, AI‑assisted pattern analysis, and remote sensing to improve case outcomes. Over the next five years she hopes to obtain certification as a Certified Professional
    Investigator, publish a case study on cold‑climate investigations, and mentor emerging investigators, especially women, in the field. Ultimately, she envisions establishing a reputable firm that balances
    rigorous inquiry with the flexibility to support her personal need for autonomy and occasional solitude.
