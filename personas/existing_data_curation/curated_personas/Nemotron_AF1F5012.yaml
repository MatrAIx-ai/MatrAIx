personas:
  professional: Amy Harmon, a private investigator specializing in Alaskan cold‑case and missing‑person work, merges forensic data analysis, AI‑driven pattern recognition, and rugged wilderness expertise
    to solve mysteries, balancing relentless curiosity with practical, low‑tech survival tactics, even as they maintain a relaxed attitude toward paperwork that sometimes leaves case files in a disorganized
    stack.
  sports: Amy Harmon, an avid hiker and snowshoe enthusiast, trains with the Anchorage Trail Runners Club, follows the Alaska Aces hockey team, and prefers solitary mountain treks to large‑scale team sports,
    though they occasionally join a local cross‑country skiing group to blend fitness with brief social interaction.
  arts: 'Amy Harmon, a wildlife photographer and classic mystery aficionado, channels solitary curiosity into creative expression: they spend weekends framing aurora‑lit landscapes inspired by Ansel Adams,
    read Agatha Christie while listening to Joni Mitchell, and occasionally sketch tundra flora, attending the Anchorage Museum’s photography exhibitions.'
  travel: Amy Harmon, a spontaneous explorer, has trekked the Svalbard archipelago, captured Iceland’s Westfjords under the northern lights, and driven through Denali National Park, favoring flexible itineraries
    that allow impromptu detours for aurora hunting, while they dream of a future expedition to Patagonia’s Torres del Paine.
  culinary: Amy Harmon, an intermediate home cook, frequently prepares pan‑seared wild salmon with spruce tip oil and cloudberry pancakes harvested from their garden, relishes the solitude of cooking, yet
    they occasionally indulge in a hearty reindeer stew after a cold‑weather case, using locally sourced herbs to add a personal touch.
  core: Amy Harmon blends forensic acumen with Alaskan wilderness grit, navigating cold cases with curious pragmatism while they maintain a laid‑back, solitary streak that fuels both adventurous pursuits
    and occasional disorganization.
background:
  cultural: Amy grew up in a middle‑class family in the Pacific Northwest, with mixed Italian and Anglo‑American heritage. Her upbringing emphasized independence, education, and an appreciation for nature,
    values that align with the rugged, self‑reliant culture of Alaska. Since moving to Anchorage, she has embraced the local community’s respect for the wilderness, while also showing awareness and respect
    for the Indigenous peoples of the region, often participating in cultural awareness workshops and supporting local initiatives.
