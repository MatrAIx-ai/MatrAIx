personas:
  professional: Sheila Estes, a retired community volunteer and master quilter, blends her lifelong practicality with a curiosity for new techniques, using her budgeting savvy to fund quilting workshops
    while competitively vying for the best stitch awards, yet often approaches obligations with a relaxed, flexible mindset that leaves her studio a bit disorganized.
  sports: Sheila Estes enjoys low‑impact exercise through daily walks on the Wabash River trail, birdwatching hikes, and cheering for the Chicago Cubs and the local high‑school basketball team, while their
    competitive streak surfaces in bridge tournaments at the senior center, even though they prefer flexible, social fitness routines over formal gyms.
  arts: Sheila Estes expresses creativity through quilting, knitting, and an avid love of historical fiction, often reciting passages from Maya Angelou and listening to Johnny Cash while attending choir
    rehearsals, and they occasionally compete for the “Best Quilt” award at community fairs, reflecting a mix of storytelling and artistic rivalry.
  travel: Sheila Estes favors modest road trips to nearby national parks like Badlands and historic towns such as Savannah, dreams of tracing ancestral roots in Dublin, and approaches travel with a flexible
    itinerary that balances careful budgeting with spontaneous detours, though they sometimes forget prescription meds while packing.
  culinary: Sheila Estes delights in cooking classic Midwestern comfort dishes such as chicken pot pie, cheddar‑cheddar biscuits, and apple crumble, using garden‑fresh tomatoes, heirloom carrots, and locally
    sourced honey, while they occasionally over‑salt recipes in their enthusiasm and preserve jams for future family gatherings.
  core: Sheila Estes is a pragmatic yet curious octogenarian who blends competitive quilting, meticulous budgeting, and an adventurous spirit with a relaxed, sometimes disorganized approach to life.
background:
  cultural: Sheila grew up in a small Midwestern town in Illinois during the post‑World War II era. As a white, Protestant (Methodist) community member, she was raised with values of self‑reliance, modesty,
    and strong ties to family, church, and local agriculture. Her life reflects the rhythms of rural Moultrie County—seasonal planting, community gatherings, and an appreciation for practical skills—while
    her curiosity keeps her open to new ideas, especially when they can improve everyday life.
attributes:
  skills: '["Budgeting and household finance", "Seasonal gardening", "Knitting and quilting", "Cooking traditional Midwest recipes", "Community event coordination", "Basic first aid", "Oral history storytelling",
