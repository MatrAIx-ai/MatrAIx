  hobbies: '["Gardening", "Knitting", "Reading historical fiction", "Crossword puzzles", "Playing bridge", "Birdwatching", "Cooking traditional recipes", "Scrapbooking family genealogy", "Attending church
    services", "Senior center activities"]'
  career_goals: Though retired, Sheila aims to remain independent and mentally sharp. She plans to compile a memoir and family recipe book, learn basic smartphone photography to document her garden and
    gatherings, and share her knowledge by mentoring younger members of the local quilting circle. She also hopes to deepen her genealogy research and create a digital archive for her descendants, while
    staying active in her church and senior center.
