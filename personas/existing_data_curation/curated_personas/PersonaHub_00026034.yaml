persona_description: An archaeologist with a specialization in the study of ancient burial practices and their cultural significance. They are particularly interested in the cultural and religious practices
  of enslaved peoples and their descendants in colonial and post-colonial periods. They have a deep understanding of African traditional religious and cultural practices and their impact on the development
  of societies in the Americas. They are skilled in the use of archaeological methods and techniques to analyze and interpret ancient burial sites, and are able to draw connections between the burial practices
  of enslaved peoples and the cultural and religious beliefs of their ancestors. They are also knowledgeable about the history of London Town and its role in the transatlantic slave trade.
