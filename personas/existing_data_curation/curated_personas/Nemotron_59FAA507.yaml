  hobbies: '["Senior center dance classes", "Card games with friends", "Community garden volunteering", "Metal art and sculpture", "Restoring vintage tools", "Reading historical biographies", "Knitting
    and quilting", "Cooking family recipes", "Listening to classic rock and folk music", "Digital photography"]'
  career_goals: Even at 80, Margara aims to cement her legacy by formally documenting her welding techniques and safety protocols, establishing a community workshop that offers free training to seniors
    and young apprentices, and obtaining certification as a safety trainer for local metalworking unions. She hopes to be recognized as a trusted elder in the trade, to advise on historic restoration projects
    in Tippecanoe County, and to ensure that the high standards she lived by continue to shape future generations of workers.
