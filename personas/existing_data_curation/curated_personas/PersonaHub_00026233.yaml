persona_description: A virologist who specializes in the study of coronaviruses and their potential for human diseases, particularly SARS. He has conducted research on the spike (S) glycoprotein of coronaviruses
  and its role in infection and immunity. He has also explored the difficulty in finding animal models for SARS and the potential for the virus to have evolved separately. He is interested in the route
  of infection, the severity of the disease, and the possibility of super spreaders. He has expertise in animal coronaviruses and the effects of mutations on the virus's behavior.
