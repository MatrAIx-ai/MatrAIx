personas:
  professional: Casey Medley, a 17‑year‑old aspiring IT support specialist, blends self‑taught Python coding, DSLR photography, and meticulous project note‑taking into a budding freelance tech tutorial
    channel, while leveraging a skeptical eye for troubleshooting household electronics to position themselves for a junior network support role at an Indianapolis small business.
  sports: Casey Medley enjoys weekend rides with the local Indy Cycling Club, cheering on the Indianapolis Colts during football season and the Indiana Pacers in basketball, while maintaining a modest cardio
    routine on a stationary bike to offset the sedentary pull of strategy games like Civilization.
  arts: Casey Medley channels creative energy into sketching woodland scenes inspired by the works of Ansel Adams and illustrating sci‑fi concepts from authors like Isaac Asimov, while curating a YouTube
    playlist that includes ambient synth duo M83 and indie filmmaker Christopher Nolan for visual storytelling inspiration.
  travel: Casey Medley prefers meticulously planned road trips to photo‑rich destinations such as the Indiana Dunes and Hocking Hills, while dreaming of a solo adventure to Iceland’s aurora‑lit landscapes
    and Tokyo’s tech districts, balancing travel ambitions with a modest student budget.
  culinary: Casey Medley favors quick, nutrient‑dense meals like quinoa‑kale bowls with a splash of sriracha, but also loves experimenting with avocado toast topped with poached eggs, and they regularly
    treat themselves to the signature pork sandwich at Bru Burger Bar, while mastering the art of matcha‑infused smoothies in their modest kitchen.
  core: Casey Medley, a 17‑year‑old tech‑savvy introvert, juggles a competitive streak in strategy games with a meticulous habit of note‑taking, often worrying about deadlines yet finding solace in sketching
    and DSLR photography.
background:
  cultural: Casey grew up in Avon, a suburban community in Hendricks County, Indiana, where Midwestern values of hard work, self‑reliance, and close‑knit community ties are prominent. Her family reflects
    a typical white, middle‑class background with an emphasis on modest, practical lifestyles. Local influences include the county’s agricultural roots, church gatherings, and community events such as county
    fairs and library programs. The region’s blend of rural and suburban culture has shaped her practical outlook, appreciation for quiet spaces, and the competitive drive nurtured by a school environment
    that values achievement and independence.
