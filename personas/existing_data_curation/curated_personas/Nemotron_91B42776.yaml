  career_goals: Casey aims to turn her practical tech skills into a stable, independent career. She plans to earn a certification in network support or web development through a community college or online
    program, eventually working as a junior IT support technician or junior web developer for a small business in the Indianapolis area. Her competitive drive fuels a desire to become a reliable problem‑solver,
    and she hopes to later manage a small team or run her own freelance tech consultancy, balancing autonomy with practical impact.
