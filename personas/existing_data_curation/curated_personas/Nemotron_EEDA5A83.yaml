  career_goals: Joshua dreams of turning his imagination into a career that helps others. He envisions himself as a children's book author‑illustrator who can bring comfort and wonder to young readers,
    or as a video‑game designer who creates interactive stories that teach kindness and cooperation. He also imagines exploring space science, hoping someday to contribute to a project that makes the world
    a better place. Whatever path he chooses, his ambition is to combine creativity with purpose, using his talents to inspire and support his community.
