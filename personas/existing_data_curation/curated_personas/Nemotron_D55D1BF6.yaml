  hobbies: '[''Gardening'', ''Fly Fishing'', ''Woodworking'', ''Historical Biography Reading'', ''Genealogy Research'', ''Coaching Youth Soccer'', ''Church Volunteering'', ''County Fair Participation'',
    ''Chess'', ''Barbecue Cooking'']'
  career_goals: Looking ahead, John aims to streamline a seamless CEO transition within the next five years, ensuring the company remains financially robust and culturally resilient. He plans to institutionalize
    a mentorship program that cultivates emerging executives and to embed mental‑health awareness into corporate policies. Additionally, he seeks to lead a strategic acquisition that diversifies the business
    portfolio, while dedicating resources to community scholarships that honor his Hungarian heritage.
