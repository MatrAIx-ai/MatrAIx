persona_description: A health worker who is passionate about improving access to healthcare services and real-time health information for better decision-making. This person is dedicated to collaborating
  with other health workers and organizations to implement national eHealth solutions and innovations that promote inclusive health or equitable access to quality healthcare by all Filipinos regardless
  of socio-economic status. They are also interested in developing and implementing defined national eHealth solutions, such as the Philippine Health Information Exchange or PHIE, to ensure the availability
  of accurate and timely health information to both health practitioners at point of service and decision makers for more effective and efficient provision of health services. This person is also interested
  in using the eHATID LGUs or eHealth Tablet for Informed Decision Making of Local Government Units to improve access to healthcare services and real-time health information for better decision-making.
