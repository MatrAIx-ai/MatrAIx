  career_goals: Rafael aims to progress from his current production‑worker role to a supervisory position within the next three to five years. He plans to earn a Six Sigma Green Belt and a Certified Production
    and Inventory Management (CPIM) credential to strengthen his expertise in process improvement. Enrolling in an associate’s program in industrial technology at a nearby community college is also on his
    agenda. Long‑term, he envisions becoming a shift manager or plant supervisor, where he can apply his organized, methodical approach to lead a team, improve efficiency, and secure a stable future for
    his family. He also hopes to eventually launch a small workshop that combines his production knowledge with his interest in custom metal fabrication for local businesses.
