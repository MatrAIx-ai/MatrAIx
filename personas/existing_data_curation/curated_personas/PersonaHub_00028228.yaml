persona_description: A historian or archaeologist who specializes in the study of medieval glass and stained glass windows. They are particularly interested in the cultural and economic aspects of glass
  production and trade in mid-sixteenth century London, and the role of foreign glaziers in the city. They are knowledgeable about the history of the Worshipful Company of Glaziers of the City of London
  and the alien communities of London in the fifteenth century. They have a keen interest in the history of stained glass windows in King's College Chapel and are familiar with the work of Walter Gedde.
  They have a strong understanding of the technical aspects of glass production, including the furnace and enamelling process, and are interested in the economic and social factors that influenced the development
  of the glazing industry in mid-sixteenth century London. They are also interested in the history of the Southwark Glaziers and have a deep understanding of the subgroups and isomorphisms of groups.
