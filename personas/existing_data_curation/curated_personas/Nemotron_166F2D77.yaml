    and scheduling'', ''Quality assurance compliance'', ''Performance monitoring and continuous improvement'']'
  hobbies: '[''Model train building'', ''Woodworking projects'', ''Jazz, soul, and blues listening'', ''Cooking traditional soul food recipes'', ''Reading mystery novels and historical biographies'', ''Walking/jogging
    on local trails'', ''Online chess playing'', ''Participating in church choir'']'
  career_goals: George aims to leverage his extensive front-line experience into a supervisory role within the next two years, targeting a Team Lead or Customer Service Manager position where he can shape
    operational standards and mentor junior staff. He plans to obtain a Six Sigma Green Belt and a Certified Customer Service Professional credential to formalize his expertise in process improvement and
    quality assurance. His long-term ambition is to move into an operations management role overseeing multiple call-center teams, ensuring consistent service delivery while maintaining the structured,
    predictable environment he values. He also seeks a stable retirement plan, focusing on financial security and a smooth transition out of the workforce.
