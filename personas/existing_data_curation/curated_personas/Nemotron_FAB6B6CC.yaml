personas:
  professional: Brooks Harden, a senior full‑stack developer with deep expertise in cloud‑native architecture, blends design thinking and a love for visual art to craft intuitive user experiences while
    mentoring junior engineers and championing socially impactful tech projects, and they aim to transition into a lead architect role that fuses art and software for community installations.
  sports: Brooks Harden, an avid hiker who trails the Sandia Mountains year‑round and joins the Sandia Peaks Trail Club for group hikes, also participates in local Sunday morning runs with the Albuquerque
    Running Group, they cheer for the New Mexico United soccer team and the Albuquerque Isotopes baseball club, and they keep fit with a mix of cardio hikes and occasional trail‑running races in the spring.
  arts: Brooks Harden, a devoted photographer of high‑desert sunsets and watercolor painter inspired by the bold palettes of R.C. Gorman and the serene compositions of Ansel Adams, also plays acoustic guitar
    at community jam sessions that often feature folk favorites from John Denver and Lyle Lovett, and they regularly visit galleries showcasing Southwestern and Native American art to stay attuned to contemporary
    creators such as Jaune Quick‑to‑Notice.
  travel: Brooks Harden, who loves the stark beauty of the high desert, has hiked the dunes of White Sands National Park, explored the historic streets of Santa Fe, and taken photography trips to Sedona
    and the Grand Canyon, they dream of capturing the aurora borealis in Iceland and plan a future cultural immersion tour of Oaxaca, Mexico, balancing meticulous trip planning with spontaneous photo‑stop
    detours.
  culinary: Brooks Harden, an enthusiastic home chef of New Mexican cuisine, regularly prepares green chile enchiladas, carne adovada, and smoky posole using Hatch green chilies and roasted Pueblo corn,
    they enjoy experimenting with homemade salsas and occasionally over‑spice dishes when excited, and they love pairing meals with a glass of New Mexico Pinot Noir while listening to their own acoustic
    guitar recordings.
  core: Brooks Harden, a tech‑savvy artist at 58 who merges code with canvas, can be found chasing desert sunsets with a camera, mentoring juniors over coffee, and occasionally neglecting their stretching
    routine after a weekend hike, all while dreaming up community‑focused digital installations.
background:
  cultural: Brooks grew up in a Midwestern Anglo‑American family but has lived in Albuquerque for over three decades, immersing himself in the region's rich cultural mosaic. He embraces the blend of Hispanic,
    Pueblo, and contemporary Southwestern influences that shape daily life—from the language and cuisine to the vibrant art scene. His appreciation for community harmony and collaborative spirit reflects
    both his personal values and the cooperative ethos of the local neighborhoods. Brooks participates in cultural festivals, respects indigenous traditions, and often incorporates native motifs into his
    artistic projects, creating a bridge between his white American heritage and the diverse cultural tapestry of New Mexico.
