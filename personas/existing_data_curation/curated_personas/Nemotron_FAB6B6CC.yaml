  hobbies: '["Landscape photography", "Hiking in the Sandia Mountains", "Visiting art galleries and museums", "Watercolor painting", "Playing acoustic guitar", "Cooking New Mexican cuisine", "Volunteering
    as a coding mentor", "Attending the Albuquerque International Balloon Fiesta", "Participating in local maker spaces", "Reading science‑fiction and historical non‑fiction"]'
  career_goals: Brooks aims to transition into a lead architect role where he can guide cross‑functional teams in creating innovative, socially impactful technology solutions. He envisions spearheading
    projects that fuse art and software—such as interactive public installations or immersive digital experiences for local cultural events. Additionally, he is passionate about expanding the tech talent
    pipeline in Albuquerque, planning to launch a nonprofit coding academy for underserved youth. Over the next decade, Brooks hopes to serve as a chief technology officer for a mission‑driven organization
    while continuing to mentor and contribute to open‑source projects that promote community well‑being.
