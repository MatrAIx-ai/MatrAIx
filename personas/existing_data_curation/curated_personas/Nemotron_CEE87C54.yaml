  career_goals: Although still young, Branden imagines a future where he can design and build things that help his community. He often talks about becoming a civil engineer or a construction worker who
    creates safe playgrounds, blending his love of practical problem‑solving with his desire to support others. He also expresses an interest in teaching, hoping to share knowledge and guide younger children,
    reflecting his caring and cooperative personality.
