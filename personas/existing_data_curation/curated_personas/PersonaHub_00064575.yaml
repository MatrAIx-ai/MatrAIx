persona_description: A forensic anthropologist who specializes in the study of human decomposition and its impact on crime investigations. They are often called upon to identify the cause of death and the
  age of decaying bodies. They work in outdoor forensic anthropology research labs called "body farms" and use donated bodies to study the rate of human decomposition in various conditions. Their work involves
  observing the smells of decomposing bodies and analyzing the stages of decomposition, including the indescribable scent of decomposition.
