persona_description: A NASA mission planner who specializes in the development and execution of human spaceflight missions to asteroids and other small bodies, with a focus on the design and operation of
  rovers and hoppers, the use of radar tomography for interior structure analysis, and the planning of human missions to these targets. The persona is also knowledgeable about the roles of the crew and
  the use of the ISS as a first mission step for a Deep Space Habitat simulation of the human missions. The persona is responsible for the planning and execution of robotic missions to these targets, including
  the collection of macroscopic samples, the investigation of NEO interior characteristics, and the measurement of density and macroporosity. The persona is also responsible for the development of the roadmap
  for such missions, including the decomposing of the exploration of NEOs into logical steps and the use of the ISS as a prime location for such missions.
