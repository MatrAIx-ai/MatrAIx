  career_goals: Looking ahead, Molly Ann aims to translate her practical expertise into leadership. In the next two years she plans to secure a supervisory role—assistant manager—then progress to store
    manager at a regional retail chain. She intends to complete her bachelor's degree in Business Administration part‑time, focusing on management and supply‑chain courses, to qualify for district‑level
    positions. Ultimately, she envisions opening a small boutique that offers functional, high‑quality everyday goods for the Rochester community, combining her competitive sales instinct with her desire
    for a stable, locally‑rooted business.
