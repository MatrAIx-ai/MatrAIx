personas:
  professional: Jacqueline Vina, a 22-year-old civil engineer specializing in structural analysis, AutoCAD drafting, and site management, leverages their routine-driven mindset and meticulous organization
    to keep project schedules on track while confidently asserting themselves in multidisciplinary team meetings.
  sports: Jacqueline Vina hits the Sawnee Mountain trails for weekend hikes, plays forward for the community-based Atlanta Central Soccer Club, and follows the Atlanta Falcons and Atlanta United with a
    pragmatic mix of cheering at home games and tracking stats online, using these activities to balance their disciplined work routine with lighthearted competition.
  arts: Jacqueline Vina relaxes after work by listening to Yo-Yo Ma’s cello suites, streaming Beyoncé’s recent visual album, attending occasional Georgia Symphony Orchestra concerts, and quoting Lin-Manuel
    Miranda’s lyrics while chopping vegetables, weaving these artistic moments into their structured daily rhythm.
  travel: Jacqueline Vina prefers meticulously planned weekend getaways—like cycling the Blue Ridge Parkway, exploring historic Savannah, and a recent short trip to New Orleans—while dreaming of a summer
    research tour to Barcelona’s sustainable architecture scene, balancing these ambitions with a modest travel budget and occasional family obligations.
  culinary: Jacqueline Vina, an avid home cook, cultivates heirloom tomatoes, corn, and cilantro in their garden, then crafts hand-rolled tamales and roasted corn-filled enchiladas seasoned with smoky chipotle
    and fresh lime for family gatherings, while also enjoying occasional dinners at Atlanta’s farm-to-table bistro, The Optimist.
  core: Jacqueline Vina is a methodical civil engineer who balances a love for structured schedules with spontaneous hikes, occasionally neglects sleep for project deadlines, and can’t resist a late-night
    puzzle session, where they puzzle over crossword clues long after the day ends.
background:
  cultural: Jacqueline was raised in a Honduran‑American household where Spanish was spoken at home and family traditions such as Semana Santa and Feria Juniana were celebrated. Her parents emphasized respect
    for elders, community solidarity, and practical work ethic, values that influence her routine‑oriented and dependable nature. While she embraces the cultural richness of her heritage—through food, music,
    and occasional visits to Honduras—she also integrates into the Southern U.S. environment, respecting local customs and contributing to the multicultural fabric of Cherokee County.
