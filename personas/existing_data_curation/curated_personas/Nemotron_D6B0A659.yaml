  career_goals: Jacqueline aims to obtain her Professional Engineer (PE) license within the next three years and advance to a senior project manager role overseeing public infrastructure projects in the
    Atlanta metropolitan area. She seeks to lead multidisciplinary teams on sustainable, cost-effective building initiatives that benefit her local community. Long‑term, she envisions mentoring junior engineers
    and contributing to cross‑border collaborations that incorporate sustainable practices from Central America into U.S. projects.
