personas:
  professional: Ricky Dejohn is a retired community organizer turned intergenerational arts facilitator who leverages his imaginative storytelling, event‑planning acumen, and digital‑photography expertise
    to spark creative collaboration between seniors and school‑age children, thriving on the social buzz of being the center of attention.
  sports: Ricky Dejohn stays active by joining the Galva Senior Walking Club for daily prairie‑trail strolls, cheering on the Chicago Cubs in spring and the Chicago Bears in fall, and occasionally participating
    in a low‑impact pickleball league at the community center.
  arts: Ricky Dejohn channels their love for storytelling into vibrant Midwestern landscape paintings inspired by Grant Wood, strums the ukulele to the melodies of Woody Guthrie and Joan Baez at local gatherings,
    and stars in community‑theater productions of Arthur Miller, finding their creative heartbeat in every brushstroke and stage cue.
  travel: Ricky Dejohn favors purposeful, low‑key trips that blend cultural immersion with family reunions, often driving to Chicago for a day at the Art Institute, taking a weekend pilgrimage to Galena’s
    historic sites, and dreaming of a future virtual museum tour of the Louvre’s Impressionist wing when their budget allows.
  culinary: Ricky Dejohn delights in cooking rustic dishes such as creamy corn chowder made with fresh garden corn, heirloom tomato‑basil pasta, and homemade apple‑cinnamon crumble, boasting a competent
    yet modest kitchen skill set that favors simple, seasonal ingredients over elaborate techniques.
  core: Ricky Dejohn is a gregarious, imagination‑driven septuagenarian who weaves painting, storytelling, and community theater into daily life, even if they sometimes lose track of time and forget to
    water their beloved garden.
background:
  cultural: Ricky grew up in a small farming community in central Illinois, descended from German and Irish immigrant families who settled the region in the late 19th century. He embodies Midwestern values
    of hard work, neighborliness, and modesty, while also embracing broader American cultural currents through his passion for the arts and lifelong learning. His upbringing included participation in 4‑H
    clubs, church choirs, and county fairs, experiences that fostered his sociable nature and community spirit. The blend of traditional agricultural heritage and a curiosity for novelty shapes his worldview
    and daily life.
