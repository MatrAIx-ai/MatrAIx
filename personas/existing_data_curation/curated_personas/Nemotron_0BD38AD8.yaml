  hobbies: '[''Landscape painting'', ''Short story writing'', ''Community theater acting'', ''Senior center volunteering'', ''Gardening'', ''Genealogy research'', ''Local history tours'', ''Digital photography'',
    ''Traveling to art museums'', ''Playing the ukulele'']'
  career_goals: Although officially retired, Ricky aims to leave a lasting cultural imprint on his community. He plans to launch an intergenerational art workshop that pairs seniors with school‑age children,
    author a memoir chronicling life in rural Illinois, and serve on the board of the Galva Historical Society to preserve local heritage. He also hopes to mentor emerging artists through guest lectures
    at regional community colleges and to curate a traveling exhibition of his own paintings and photographs for small-town galleries across the Midwest.
