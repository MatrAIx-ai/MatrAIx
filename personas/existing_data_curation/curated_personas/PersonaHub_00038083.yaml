persona_description: A horticulture researcher who focuses on the biological control of Pythium root rot in container flower production. They have experience with microbial inoculants and their effectiveness
  in suppressing the disease in greenhouse settings. They have conducted studies on the use of vermicompost and vermicompost extracts as alternatives to chemical control methods. Their work has been shared
  with growers at extension meetings in New York during the winter of 2012-13. They are likely to be knowledgeable about the biology of Pythium root rot and the efficacy of microbial products in controlling
  it.
