  career_goals: John dreams of becoming an astronaut‑engineer who designs innovative space habitats, and he also imagines working as a video‑game creator where his ideas can come to life. He is eager to
    lead projects that blend art and technology, hoping to win recognition for his creative inventions while also building confidence to handle stressful challenges.
