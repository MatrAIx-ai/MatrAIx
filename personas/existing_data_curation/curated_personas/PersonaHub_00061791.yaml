persona_description: A historian and educator who specializes in the history of African-American education in Asheville and Western North Carolina. He is passionate about the critical examination of history
  and its impact on society, particularly in terms of the role of education in the African-American community during the Civil War and post-war period. He is also interested in the role of Asheville in
  the civil rights movement and the importance of education in creating a black intellectual class. He is committed to highlighting the good things in history while also considering the things that might
  have gone wrong and asking why they happened.
