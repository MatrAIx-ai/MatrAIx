persona_description: A team of researchers from Boston University, Harvard Medical School, and Massachusetts General Hospital who are working on developing new genetic circuits for synthetic biology. They
  are aiming to create a toolbox for synthetic biology by designing transcription factors that can be used in nonbacterial cells. Their work is part of a larger effort to develop genetic "parts" that can
  be assembled into circuits to achieve specific functions. The team includes researchers in electrical engineering, biomedical engineering, and pathology, and they are using a new method to design transcription
  factors for nonbacterial cells. Their research is focused on overcoming the bottleneck that has limited synthetic biology applications, and they are hoping to make it easier to develop circuits that do
  exactly what a researcher wants.
