  hobbies: '[''Sketching and comic drawing'', ''Reading fantasy and science books'', ''LEGO building and beginner robotics'', ''Piano practice'', ''Nature hiking and wildlife photography'', ''Volunteer
    work at an animal shelter'']'
  career_goals: Michael envisions a future where he can merge his love for art and science to help others. He aspires to become a biomedical illustrator, creating detailed visuals that aid medical education,
    or an environmental engineer who designs sustainable solutions for his community. He also dreams of one day mentoring younger students through outreach programs that combine creative arts and STEM,
    aiming to foster curiosity and compassion in the next generation.
