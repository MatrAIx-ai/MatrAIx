  career_goals: Teresa dreams of becoming a robotics engineer who designs machines that could help protect wildlife, combining her love for building with her curiosity about animals. She also imagines working
    as a wildlife biologist, spending time in nature and conducting experiments. Though she is only seven, she already talks about entering science fairs, winning awards, and eventually leading her own
    research projects, reflecting her competitive spirit and desire for solitary, focused work.
