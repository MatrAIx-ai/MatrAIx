personas:
  professional: Teresa Allen, a budding junior inventor, channels her love for LEGO and simple science kits into designing tiny solar‑powered models, meticulously documenting each step in a spiral‑bound
    notebook even when she impulsively discards a plan to create a spontaneous space‑rocket contraption.
  sports: Teresa Allen follows the Cincinnati Reds with eager enthusiasm, plays on the Cincinnati United Soccer Club under‑8 team during spring, and swims freestyle laps at the community pool, preferring
    solitary drills over group games while eyeing the scoreboard for a competitive edge.
  arts: Teresa Allen spends afternoons drawing intricate forest scenes inspired by Beatrix Potter, sketches space‑themed comic strips while humming melodies from Yiruma, and practices piano pieces by Mozart,
    revealing a quiet yet vivid artistic spirit.
  travel: Teresa Allen prefers meticulously planned day trips to the Cincinnati Zoo, the Krohn Conservatory, and the Cincinnati Art Museum, while dreaming of a structured adventure to Tokyo’s Ghibli Museum,
    balancing her love of quiet observation with occasional spur‑of‑the‑moment family road trips to Lake Erie.
  culinary: Teresa Allen delights in colorful veggie stir‑fry with broccoli, carrots, and snap peas, savors a cheesy pepperoni pizza on weekends, meticulously chops strawberries for homemade shortcake,
    yet often grabs a quick cereal bowl before brushing her teeth because of a rushed morning habit.
  core: Teresa Allen is a solitary, puzzle‑loving seven‑year‑old who alternates between strict planning for LEGO creations and impulsive space sketches, fiercely guards her allowance, and battles occasional
    allergies with a pragmatic yet sometimes forgetful health routine.
background:
  cultural: Teresa was raised in a suburban neighborhood of Cincinnati, Ohio, within a white, middle‑class family that values education, community involvement, and traditional American holidays such as
    Thanksgiving and Christmas. Her family often visits local cultural sites—including the Cincinnati Zoo, the Cincinnati Art Museum, and the public library—providing her with exposure to the city’s rich
    natural and artistic heritage. While her household maintains a modest connection to a local community church, the family’s primary focus is on fostering independence, curiosity, and respect for personal
    space, aligning with the broader Midwestern cultural emphasis on politeness and self‑reliance.
