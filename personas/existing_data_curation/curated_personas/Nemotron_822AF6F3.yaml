  career_goals: Aeri aims to become the lead architect of a regional digital repository that preserves both scientific research data and cultural heritage artifacts. She wants to spearhead interdisciplinary
    programs that pair local artists with scientists, fostering community engagement through exhibitions and maker‑space workshops. Over the next five years, she plans to earn a doctorate in Library and
    Information Science, focusing on data curation and user experience design, and publish research on the impact of digital archives on underserved populations. Aeri also aspires to mentor emerging librarians,
    especially those from minority backgrounds, and to serve on advisory boards that shape inclusive collection policies. Ultimately, she hopes to secure a senior leadership role—Head of Digital Services
    or Director of Collections—where she can champion innovation while maintaining the organized, reliable standards she values.
