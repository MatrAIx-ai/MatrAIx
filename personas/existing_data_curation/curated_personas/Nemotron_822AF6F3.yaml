personas:
  professional: Aeri Kao, a 52‑year‑old digital archivist and library collections specialist, leverages deep knowledge of MARC21, BIBFRAME, Python automation, and community outreach to build inclusive,
    research‑friendly repositories while championing interdisciplinary art‑science collaborations that reflect collective well‑being.
  sports: Aeri Kao, at 52, is an avid hiker who tackles the Cascades’ foothills year‑round, participates in a local trail‑blazing club, practices yoga twice weekly, and follows the Seattle Seahawks and
    Seattle Kraken with moderate enthusiasm, preferring low‑impact fitness over competitive sports.
  arts: Aeri Kao, 52, is a dedicated sketcher and photography enthusiast who frequents the Seattle Art Museum to study works by Ansel Adams, Dale Chihuly, and contemporary Pacific Northwest painters, spends
    evenings editing mist‑laden forest images using open‑source software, and attends calligraphy workshops to preserve the elegant brush‑stroke tradition.
  travel: Aeri Kao, now 52, plans trips with meticulous itineraries, favoring immersive nature experiences like hiking Iceland’s volcanic landscapes or kayaking through the San Juan Islands, balances a
    modest travel budget with a desire for cultural depth, and dreams of exploring historic tea houses in England’s countryside while honoring family responsibilities.
  culinary: Aeri Kao, 52, cultivates a modest herb garden and prepares hand‑rolled dumplings, fermented kimchi, and artisanal tea ceremonies, skillfully blending traditional flavors of ginger, soy sauce,
    and napa cabbage with modern twists like quinoa‑filled dumplings, while savoring occasional fine‑dining outings at Seattle’s Farmhouse Kitchen for seasonal produce.
  core: Aeri Kao’s life at 52 is a carefully scripted blend of methodical stewardship, artistic curiosity, and quiet worry, manifesting in precise budgeting, meticulous digital archiving, and a love for
    misty forest hikes balanced by occasional indulgences in camera gear and homemade dumplings.
background:
  cultural: Aeri Elena Kao is a second‑generation American of East Asian descent—her parents immigrated from Taiwan in the early 1970s. Raised in the Seattle metropolitan area, she grew up bilingual, speaking
    Mandarin at home while navigating English‑dominant schools. Her family emphasized academic achievement, respect for elders, and community service, values that continue to shape her professional ethos.
    Aeri maintains close ties to the local Asian community, taking part in Lunar New Year celebrations, cultural festivals, and volunteer efforts at the Pacific Northwest Asian Cultural Center. She integrates
    traditional customs—such as tea ceremonies and calligraphy—into her personal life and occasionally incorporates East Asian perspectives into library programming, highlighting works by Asian authors
    and artists. While fully immersed in the Pacific Northwest lifestyle, Aeri blends her heritage’s emphasis on collective well‑being with the region’s love for outdoor recreation and environmental stewardship.
