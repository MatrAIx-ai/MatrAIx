persona_description: A historian who is interested in the history of banking and its impact on rural communities. They are familiar with the concept of banking statistics and how they can be used to analyze
  the performance of a community. They are also aware of the role of banks in financing farmers and merchants and how their role has changed over time. They have a deep interest in the history of Lyon County
  and the city of Marshall, Minnesota, and are interested in the statistical record left by the banks. They are also interested in current research and upcoming conferences on the history of southwest Minnesota.
