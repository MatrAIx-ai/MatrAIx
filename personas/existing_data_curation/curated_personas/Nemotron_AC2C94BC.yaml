personas:
  professional: A retired mechanical engineer turned community technology mentor, Terry Jacobs leverages their lifelong engineering precision and creative problem‑solving to guide seniors through basic
    programming, while they relax about strict deadlines, allowing improvisation to enrich every workshop.
  sports: Terry Jacobs follows the Arizona Diamondbacks and supports the Yuma Desert Runners club, participates in a senior walking group three times a week along the Colorado River trail, enjoys modest
    pickleball matches at the community center, and though they never chase a high‑intensity workout, they relish the camaraderie of seasonal sand‑volleyball leagues.
  arts: An avid watercolor painter and digital photographer, Terry Jacobs captures the stark beauty of desert sunrises, draws inspiration from Georgia O’Keeffe’s southwestern palettes and the speculative
    worlds of Neil Gaiman, regularly performs in community theater productions alongside local actor Tom Selleck, delights in attending the Yuma Art & Cultural Festival to meet fellow creators, and they
    often share their work at the senior center’s monthly art showcase.
  travel: Terry Jacobs prefers thoughtfully planned group tours, relishing road trips to nearby marvels like the Grand Canyon and Sedona while dreaming of a senior‑focused adventure to Iceland’s northern
    lights, yet they often defer long‑haul flights due to health concerns and a desire to stay close to their tight‑knit Yuma community.
  culinary: A modest home chef, Terry Jacobs loves preparing green‑chile enchiladas with fresh oregano, slow‑cooked pork shoulder seasoned with cumin and paprika, and sipping a robust dark‑roast coffee
    while discussing the subtle flavors of heirloom tomatoes, and they often share these dishes with fellow retirees at the senior center’s weekly potluck.
  core: Terry Jacobs is an imaginative, socially vibrant 83‑year‑old who blends engineering precision with artistic wonder, worries about the future yet constantly seeks new ways to enrich their community
    through paint, pixels, and mentorship.
background:
  cultural: Born in the Midwestern United States to a family of German‑Irish ancestry, Terry grew up during the post‑World War II boom and the cultural shifts of the 1960s. He later moved to Yuma, Arizona,
    where he embraced the desert’s relaxed pace while retaining a Midwestern work ethic and a deep respect for community values. His cultural outlook reflects a blend of traditional American principles,
    the artistic curiosity sparked by his generation’s countercultural movements, and an appreciation for the diverse heritage and neighborly spirit of the Southwest.
