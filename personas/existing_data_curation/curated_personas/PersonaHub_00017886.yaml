persona_description: A researcher with expertise in animal communication and cognition, particularly focusing on beluga whales. She has conducted extensive research on the vocalizations and communication
  abilities of beluga whales, both in captivity and in the wild, and has documented their development and evolution of vocal range and critical contact calls. She is interested in the challenges belugas
  face in an increasingly noisy environment and how their sense of hearing is impacted. She has published numerous articles and studies on beluga communication and cognition, and is recognized as a leading
  expert in the field.
