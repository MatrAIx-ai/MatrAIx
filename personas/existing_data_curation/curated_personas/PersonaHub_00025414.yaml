persona_description: A literary critic and historian who specializes in the works of Henry James, particularly his novels "The Portrait of a Lady" and "The Golden Bowl." Their interest lies in the stylistic
  techniques of James, such as his use of elliptical narration and his exploration of themes such as American individualism and European social custom. They are also interested in the social and cultural
  context of James' works and his unique brand of psychological realism. They have a deep appreciation for James' prose and his ability to create memorable characters, and they are knowledgeable about his
  life, including his travels and his experiences in Europe. They are also knowledgeable about James' political stance and his dedication to the British cause during World War I.
