personas:
  professional: Justin Maulding, a three‑year‑old with a nascent fascination for space, spends his afternoons arranging toy rockets in meticulous rows and narrating their missions, showcasing early organizational
    skill and a budding curiosity that hints at future aspirations as an astronaut; they often line up their toys by color, demonstrating methodical planning even in play.
  sports: Justin Maulding participates in a parent‑child gymnastics class at the community center during the winter, proudly waves a foam pom‑pom at home to cheer for the city’s baseball team, the River
    Raptors, and during summer days, they join the Little Explorers soccer club for short, playful matches that satisfy their energetic curiosity while still leaving time for quiet building blocks.
  arts: Justin Maulding loves splashing Crayola crayons on large white paper, especially drawing rainbows while humming the tunes of children's favourite singers like Raffi and singing along to The Wiggles,
    and they eagerly watch animated classics such as 'Sesame Street' and 'Moana' to fuel their imagination.
  travel: Justin Maulding relishes weekend trips to the nearby zoo where they count the giraffes, enjoys summer visits to their grandparents’ farm in the countryside, dreams of seeing the Eiffel Tower in
    Paris one day, and prefers short, well‑planned car rides with their favorite stuffed rabbit perched on their lap.
  culinary: Justin Maulding favors cheesy macaroni, dinosaur‑shaped chicken nuggets, and apple slices with peanut butter, proudly claims to stir their own banana‑smoothie with a small plastic spoon, yet
    occasionally refuses broccoli, turning their mealtime into a gentle negotiation with their parents.
  core: Justin Maulding is a meticulously curious three‑year‑old who blends organized play with boundless imagination, shows kindness to peers, and can be stubborn about veggies while delighting in sticker
    collections; they manage to keep a neat line of toys while daydreaming about space rockets.
background:
  cultural: Justin is raised in a white, middle‑class family in Carlisle, Iowa, a small Midwestern town. The community values kindness, reliability, and cooperation, which are reinforced at his local preschool
    that blends agricultural themes with arts‑and‑crafts activities. His family takes part in seasonal festivals, church gatherings, and farmers’ market visits, providing a gentle exposure to regional traditions
    while nurturing his curiosity and appreciation for varied experiences.
