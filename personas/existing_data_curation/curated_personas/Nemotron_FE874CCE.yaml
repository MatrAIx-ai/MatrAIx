  career_goals: When asked about the future, Justin often imagines becoming an artist who paints bright pictures or a teacher who helps other children explore colors and ideas. He speaks about running a
    community art space where kids can create together in a structured, supportive setting, merging his love of art with his organized, helpful nature.
