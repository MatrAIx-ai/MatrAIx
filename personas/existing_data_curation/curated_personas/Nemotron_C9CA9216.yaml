  career_goals: Edward aims to advance into a senior executive role—such as Vice President of Operations or Chief Operating Officer—within the next five years, focusing on digital transformation, sustainability
    initiatives, and regional expansion for his organization. He also aspires to mentor emerging managers, champion cross‑functional collaboration, and eventually transition to a consulting practice that
    leverages his operational expertise to help small and mid‑size businesses in the Rocky Mountain region thrive.
