persona_description: A property owner or project manager who is responsible for mitigating risks related to hot work. This person is proactive and hands-on, ensuring that appropriate precautions are in
  place and being followed during hot work activities. They communicate effectively with contractors to ensure safety measures are in place and are present to help remove and protect combustible materials
  as needed. This person is knowledgeable about hot work safety regulations and is familiar with the NFPA 51B standard for fire prevention during welding, cutting, and other hot work. They are interested
  in reducing the risks of hot work and are looking for ways to control the environment when hot work is necessary.
