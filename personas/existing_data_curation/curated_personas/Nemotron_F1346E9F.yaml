personas:
  professional: Evaldo Rodriguez is a meticulous operations manager who uses advanced Excel and PowerBI modeling to optimize supply‑chain workflows, leverages his bilingual fluency for seamless Latin American
    partner collaboration, and applies a structured project‑management approach—guided by his upcoming PMP certification—to balance assertive decision‑making with cooperative team leadership.
  sports: Evaldo Rodriguez follows Liga MX and Guatemalan club soccer—cheering for Club América and Municipal—plays midfield for a Sacramento amateur league team on weekends, and hikes the Sierra foothills
    as his preferred low‑impact cardio routine.
  arts: Evaldo Rodriguez relaxes by strumming acoustic guitar, often covering folk classics by Los Panchos and traditional marimba pieces, enjoys attending local cultural festivals featuring Guatemalan
    dance troupes, and unwinds with films by Alejandro González Iñárritu.
  travel: Evaldo Rodriguez favors road‑trip adventures that blend nature and culture, having explored coffee plantations in the Guatemalan highlands and vineyard tours in Napa, he plans future trips to
    Oaxaca’s culinary markets while keeping travel expenses within his family’s financial plan.
  culinary: Evaldo Rodriguez prepares traditional Guatemalan fare such as pepian, kak'ik, and tamales, sourcing heirloom corn, roasted chilies, and fresh herbs from his garden, and brews single‑origin Guatemalan
    coffee using a French press, though his habit of adding extra spice can sometimes overwhelm diners.
  core: Evaldo Rodriguez balances a structured, data‑driven career with a garden‑fresh culinary hobby, weekend hikes, and acoustic guitar sessions, all while navigating mild health quirks and a disciplined
    yet occasional splurge on premium coffee.
background:
  cultural: Evaldo was born in the highlands of Guatemala and moved to California in his early twenties. He retains a deep connection to his Guatemalan roots, celebrating holidays such as Día de la Independencia
    and Semana Santa with family gatherings and traditional foods. Bilingual in Spanish and English, he upholds the values of familismo, Catholic observance, and community solidarity. Living in Elk Grove,
    he is active in the local Guatemalan diaspora, helping organize cultural events and preserving the Spanish language at home, while integrating the pragmatic, structured work ethic common in the United
    States.
attributes:
  skills: '[''Project Management'', ''Financial Analysis'', ''Budgeting'', ''Strategic Planning'', ''Data Visualization (Excel, PowerBI)'', ''Bilingual Communication (Spanish/English)'', ''Supply Chain
