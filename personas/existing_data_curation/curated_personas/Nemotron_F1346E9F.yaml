  hobbies: '[''Cooking Guatemalan cuisine'', ''Organic gardening'', ''Hiking in the Sierra foothills'', ''Reading business & self‑improvement books'', ''Volunteering at local cultural festivals'', ''Playing
    acoustic guitar'', ''Watching soccer (Liga MX, Guatemalan national team)'']'
  career_goals: Evaldo aims to secure a stable mid‑level managerial role in operations or supply chain within a medium‑sized company in the Sacramento region, where he can apply his structured approach
    and reliability. Over the next year, he plans to obtain a PMP certification to formalize his project management expertise. Looking ahead five years, he aspires to launch a small family‑owned import‑export
    venture focused on Guatemalan coffee and artisan crafts, creating jobs for fellow immigrants while blending his business acumen with cultural heritage.
