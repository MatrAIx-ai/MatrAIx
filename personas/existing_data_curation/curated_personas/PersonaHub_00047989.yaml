persona_description: A scientist who specializes in the study of gecko adhesion and nanotechnology. He has a deep understanding of the tiny hairs on gecko feet and how they enable them to cling to extremely
  smooth surfaces and defy gravity. He has developed a new adhesive system for textile surfaces that imitates the properties of geckos, using nanohair technology to create mechanical grip on smooth materials.
  He is interested in the potential of nanotechnology for improving adhesion and finding new applications for textiles.
