personas:
  professional: Julia Vogel, a newborn who already organizes her colorful building blocks by hue and insists on a strict bedtime routine, displays early signs of the detail‑oriented, systematic thinking
    that will later define a career in engineering or data analysis.
  sports: Julia Vogel, a newborn who delights in weekly infant swimming lessons at the community pool and claps enthusiastically whenever the local soccer team City United FC scores on the family’s TV,
    combines early physical activity with budding team loyalty.
  arts: Julia Vogel, a newborn who lights up to Brahms' Lullaby, the playful tunes of Disney's 'Frozen' soundtrack, and the vivid illustrations of Eric Carle's picture books, integrates music and visual
    art into her daily routine, shaping a nascent appreciation for creative expression.
  travel: Julia Vogel, a newborn who has already visited her grandparents’ farmhouse in Vermont and is slated for a summer road trip to the Grand Canyon, experiences travel through meticulously scheduled
    feedings and naps, balancing adventure with infant‑friendly logistics.
  culinary: Julia Vogel, a newborn who prefers organic formula blended with a dash of vanilla, shows delight when tasting her first carrot‑and‑apple puree, and is set to explore banana‑coconut mash soon,
    reflects early selective palate development paired with parental guidance.
  core: Julia Vogel, a newborn blends a surprisingly organized routine with boundless curiosity, thrives on social interaction, and hints at a future competitive edge, all while occasionally succumbing
    to thumb‑sucking stubbornness.
background:
  cultural: Julia is a first‑generation American born in Houston to Salvadoran parents. She is raised in a bilingual household, speaking both Spanish and English, and is immersed in Salvadoran cultural
    traditions such as family gatherings featuring pupusas, celebrations of Día de los Muertos, and participation in local community events within Houston's vibrant Latino neighborhoods. These cultural
    roots shape her values, language, and early experiences.
