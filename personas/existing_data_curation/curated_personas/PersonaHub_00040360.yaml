persona_description: A teacher who is an advanced-level English teacher and is passionate about teaching writing skills. The teacher has a deep understanding of the Common Core standards and is skilled
  in creating engaging and challenging writing activities. The teacher has experience teaching small groups and is able to adapt the lesson to fit the needs of different reading groups. The teacher is knowledgeable
  about the text and is able to identify the key vocabulary and concepts that need to be introduced. The teacher is able to create a close reading activity that requires students to go back into the story
  and look more closely at the text and pictures in order to write accurately. The teacher is able to create a lesson that is well-organized and easy to follow. The teacher is able to create a lesson that
  is challenging but not too difficult for the advanced-level group.
