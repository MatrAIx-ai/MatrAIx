personas:
  professional: Prunella Carrillo, a 22‑year‑old pharmacy technician in Billings, merges flawless prescription verification and sterile compounding with a data‑driven mindset—leveraging Excel and Python
    scripts to spot medication trends—while offering empathetic counseling that reflects her love for community service and artistic problem‑solving, all as a stepping stone toward a future PharmD focused
    on holistic, mental‑health‑integrated care.
  sports: Prunella Carrillo enjoys hiking the Beartooth Trail and occasional snowshoeing at Big Sky Resort, is a member of the Yellowstone Hikers Association, follows the Billings Mustangs baseball team
    and cheers for the Montana Grizzlies football squad, and fits in weekly yoga sessions to counterbalance the stress of pharmacy work.
  arts: Prunella Carrillo spends weekends painting watercolor landscapes of the Tetons, captures wildlife on her DSLR during sunrise hikes, plays acoustic ukulele renditions of Iron & Wine and Jason Mraz
    for small gatherings, and regularly attends gallery openings at the Yellowstone Art Museum, where she draws inspiration from local Indigenous textile patterns.
  travel: Prunella Carrillo favors meticulously planned road trips to national parks—already trekking Yellowstone’s Grand Canyon of the Yellowstone and dreaming of a solo backpacking stretch on the Pacific
    Crest Trail—while balancing a modest student budget that steers her toward affordable hostels and roadside campsites rather than luxury resorts.
  culinary: Prunella Carrillo cooks health‑focused meals featuring herb‑infused salmon with dill, quinoa bowls tossed with roasted rosemary carrots, and wild‑berry smoothies, enjoys experimenting with locally
    sourced huckleberries and sage, yet occasionally succumbs to late‑night pizza delivery when deadlines loom.
  core: Prunella Carrillo is a detail‑driven pharmacy tech with a creative soul, who balances a love of mountains, watercolor, and data analysis, while wrestling with anxiety‑fuelled worry, occasional impulsive
    spending, and a habit of journaling at midnight to untangle thoughts.
background:
  cultural: Prunella grew up in Billings, Montana, in a middle‑class family that valued education, self‑reliance, and community service. Her parents, both professionals in healthcare and education, encouraged
    curiosity and a love of learning while instilling a respect for the rugged, outdoors‑oriented culture of the American West. Although ethnically white, her surname reflects a diverse family history that
    she honors through an openness to different perspectives. The “big‑sky” environment and proximity to Yellowstone fostered a deep appreciation for nature, while the city’s modest but vibrant arts scene
    nurtured her artistic interests. She participates in local health fairs and volunteer events, blending the region’s practical work ethic with a compassionate, culturally aware outlook.
attributes:
  skills: '[''Prescription verification'', ''Sterile and non-sterile compounding'', ''Pharmacy software (PioneerRx, QS/1)'', ''Pharmacology knowledge'', ''Dosage calculations'', ''Inventory management'',
    ''Controlled substances compliance'', ''Patient counseling'', ''Data analysis (Excel, Python)'', ''Creative workflow optimization'', ''Attention to detail'', ''Empathy'', ''Assertive communication'',
    ''Team collaboration'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Nature photography'', ''Hiking'', ''Visiting art galleries and museums'', ''Reading science-fiction and philosophy'', ''Playing acoustic ukulele'',
    ''Cooking healthy meals'', ''Journaling'', ''Puzzle solving (crosswords, sudoku)'', ''Board games (Catan) with small groups'']'
  career_goals: Prunella aims to enroll in a PharmD program within the next two years, with the long‑term goal of becoming a clinical pharmacist who integrates mental‑health support and holistic wellness
    into community pharmacy practice. She plans to earn certifications in immunizations and medication therapy management, and to develop a telepharmacy service that reaches patients in rural Montana. Ultimately,
    she hopes to open an independent pharmacy that offers personalized counseling, stress‑reduction workshops, and artistic health‑education resources, positioning herself as a leader who bridges conventional
    pharmacy care with creative, patient‑centered approaches.
