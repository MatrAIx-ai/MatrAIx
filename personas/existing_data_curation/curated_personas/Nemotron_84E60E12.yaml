personas:
  professional: John Etheridge is a maintenance technician for an industrial plant who leverages precise diagnostic skills, rigorous preventive‑maintenance schedules, and a competitive drive to outpace
    peers, positioning them for a senior supervisory role within five years.
  sports: John Etheridge, a member of the Amarillo Rifle Club and a seasonal fly‑fisher on Lake Meredith, stays fit with Saturday target‑shooting drills and occasional pickup basketball games, while rooting
    for the Dallas Cowboys and following the Professional Rodeo Cowboys Association circuit, and they treat each session as a test of precision and endurance.
  arts: John Etheridge draws creative inspiration from the gritty blues of Stevie Ray Vaughan and the woodworking elegance of Joanna Gaines, often channeling that aesthetic into his custom motorcycle restorations
    and handcrafted furniture while occasionally attending community theater productions of classic Westerns like The Magnificent Seven, and they view art as a practical extension of their problem‑solving
    mindset.
  travel: John Etheridge plans meticulously outlined road trips that blend quiet cabin stays near Lake Tahoe with motorcycle‑friendly routes through the Texas Hill Country, and they dream of a future specialty
    tour of Bavaria’s vintage bike museums and a fishing lodge in New Zealand’s South Island.
  culinary: John Etheridge is a competent home cook who favors smoky Texas BBQ, regularly seasoning brisket with a rub of smoked paprika, brown sugar, and cumin, while their go‑to post‑fly‑fishing dinner
    is pan‑seared trout finished with fresh dill and lemon butter, and they treat each meal as a disciplined experiment in flavor balance.
  core: John Etheridge is a methodical mechanic‑carpenter who thrives on order, secretly hoards vintage motorcycle manuals, and occasionally burns the midnight oil polishing new tools at the expense of
    sleep, and they consider meticulousness a badge of honor.
background:
  cultural: John was raised in a predominantly Anglo‑American, white community in the Texas Panhandle, where self‑reliance, a strong work ethic, and respect for routine are cultural cornerstones. Growing
    up in Amarillo, he absorbed regional values such as practicality, modesty, and a preference for small, close‑knit social circles. These influences shape his disciplined approach to work, his comfort
    with solitary activities, and his competitive drive to excel within his trade.
attributes:
  skills: '[''Mechanical repair'', ''HVAC maintenance'', ''Electrical troubleshooting'', ''Preventive maintenance scheduling'', ''Inventory management'', ''Safety compliance inspections'', ''Basic welding'',
    ''Carpentry'', ''Project coordination'', ''Time management'']'
  hobbies: '[''Vintage motorcycle restoration'', ''Woodworking'', ''Model building'', ''Fly fishing'', ''Rodeo watching'', ''Target shooting'', ''Technical reading'', ''Engineering documentaries'']'
  career_goals: John aspires to advance from a general maintenance technician to a senior maintenance supervisor within the next five years. He plans to obtain industry certifications such as the EPA Section 608,
    HVAC‑EX, and the Certified Maintenance Manager (CMM) designation to solidify his technical credibility. Long‑term, he aims to become a facilities manager for a large manufacturing plant in the Texas
    Panhandle, and eventually launch his own small repair‑service business that emphasizes reliability, rigorous standards, and disciplined workflow.
