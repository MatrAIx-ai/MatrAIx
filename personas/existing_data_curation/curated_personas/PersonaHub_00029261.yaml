persona_description: A medical professional with expertise in electrolyte management and particularly in the measurement and treatment of ionized calcium (iCa) levels in critically ill patients. They are
  familiar with the measurement of total calcium and its effects on homeostasis, and are aware of the role of albumin and pH in calcium levels. They have knowledge of the different forms of calcium (gluconate
  and chloride) and their appropriate administration. They are also aware of the potential effects of calcium on the clotting cascade, banked blood, and citrate. They are skilled in interpreting calcium
  levels and administering calcium in a safe and effective manner, particularly in trauma patients. They have a deep understanding of the role of calcium in the heart and the importance of maintaining normal
  or high values for cardiogenic-related hypotension.
