    and creative problem solving'', ''Public speaking and presentation'', ''Empathy and active listening'']'
  hobbies: '[''Woodworking projects'', ''Cooking Portuguese dishes (e.g., bacalhau, caldo verde)'', ''Reading non-fiction (technology, history)'', ''Jogging or walking coastal trails'', ''Playing acoustic
    guitar'', ''Watching Boston Red Sox games'', ''Participating in local community festivals and board-game nights'', ''Gardening herbs and vegetables'', ''Mindfulness meditation'']'
  career_goals: Thomas aims to advance from his current sales representative role into a leadership position within the next three years. He plans to earn a Certified Professional Sales Leader (CPSL) credential
    and deepen his expertise in cloud-based service offerings. By developing stronger organizational habits and leveraging data-driven strategies, he hopes to consistently exceed quota and mentor junior
    sales colleagues. Ultimately, Thomas envisions a future where he can lead a small, high-performing sales team or launch his own consultancy that helps local businesses select and implement service solutions,
    all while maintaining the flexibility and work-life balance that suit his personality.
