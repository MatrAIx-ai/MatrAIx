  career_goals: In the next year, Sean plans to earn the Certified Financial Planner (CFP) designation and expand his client base to include at least 50 high-net-worth individuals, focusing on young professionals
    in tech and creative fields. Over the next three to five years, he aims to be promoted to senior financial advisor and lead a small team of junior advisors, leveraging his competitive drive to achieve
    top-ranking performance within his firm. Ultimately, Sean envisions launching his own boutique advisory practice in the Cleveland area that blends traditional wealth management with personalized art-investment
    consulting, positioning himself as a thought leader who publishes insight articles, hosts webinars, and speaks at industry conferences. To sustain his ambition, he also intends to integrate stress-management
    practices—regular yoga, journaling, and professional coaching—into his routine.
