persona_description: A healthcare professional who is aware of the link between diet and mental health, and advocates for a healthier lifestyle as a primary treatment for depression, anxiety, and other
  mental illnesses. They are aware of the risks and side effects of antidepressant medications, and are critical of the over-prescription and ineffective treatment of mental illnesses. They are also aware
  of the growing body of evidence that suggests that nutrition is fundamental to good mental health, and are advocates for a clean and nutrient-dense diet as a primary treatment for mental illnesses.
