  hobbies: '[''Painting'',''Attending local art festivals'',''Cooking traditional Salvadoran dishes'',''Salsa and folkloric dance classes'',''Volunteering at community center'',''Gardening'',''Reading contemporary
    fiction'',''Exploring new cuisines'',''Participating in neighborhood potlucks'']'
  career_goals: Sarai aspires to move beyond the cash register and take on a supervisory role within the retail environment, such as becoming a shift manager or department lead. She is also interested in
    obtaining a Retail Management certification to broaden her leadership capabilities. In the longer term, she dreams of opening a small boutique or community art space that showcases Salvadoran and other
    Latin American crafts, combining her love of art, culture, and entrepreneurship. Volunteering as a coordinator for local cultural events is another avenue she hopes to develop, allowing her to blend
    professional growth with community service.
