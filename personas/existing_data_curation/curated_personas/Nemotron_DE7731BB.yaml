personas:
  professional: Sarai Narvaez, a veteran retail cashier with over two decades of POS mastery, leverages their natural curiosity and sociable flair to turn bustling checkout lines into opportunities for
    community connection while aspiring to become a shift manager and eventually open a boutique showcasing Latin-inspired crafts.
  sports: Sarai Narvaez enjoys community salsa and folkloric dance classes as primary cardio, joins a weekend walking club at Lake Lavon, roots for the Dallas Cowboys and Dallas Mavericks, and occasionally
    plays pick‑up volleyball at the Little Elm recreation center.
  arts: Sarai Narvaez spends Saturday mornings painting vibrant abstracts inspired by Frida Kahlo and Yayoi Kusama, regularly attends the Denton Arts & Jazz Festival to catch performances by Alex Cuba and
    The Head and the Heart, and volunteers to curate community murals that celebrate cultural craftsmanship.
  travel: Sarai Narvaez prefers spontaneous road trips with friends, often exploring nearby Hill Country towns like Fredericksburg and Wimberley, relishes annual visits to the historic center of Oaxaca
    for its food and dance, and dreams of a cultural immersion tour of Granada’s Alhambra, balancing a modest travel budget with occasional splurges on boutique art workshops.
  culinary: Sarai Narvaez, an enthusiastic home chef, skillfully prepares pupusas stuffed with quesillo and loroco, tender pork tamales wrapped in banana leaves, and experiments with chimichurri‑marinated
    grilled vegetables, always ensuring fresh corn masa, ripe plantains, and locally sourced cheese feature on the table.
  core: Sarai Narvaez is a sociable, art‑obsessed retail veteran who turns everyday interactions into vibrant cultural exchanges, all while juggling spontaneous creativity with occasional organizational
    chaos.
background:
  cultural: Sarai was born to Salvadoran immigrants and grew up in a household where Spanish was spoken and Salvadoran customs were celebrated. She maintains strong ties to the Salvadoran diaspora in Texas,
    attending community events such as Fiesta San Salvador and celebrating holidays like Día de la Madre with traditional foods and music. Her Catholic upbringing influences her values of family, hospitality,
    and service to others. While she has embraced Texan culture, she preserves Salvadoran traditions through cooking, dance, and participation in cultural organizations, and she often shares these customs
    with friends and neighbors, fostering cross‑cultural understanding.
attributes:
  skills: '[''Bilingual Spanish-English communication'',''Cash handling and POS operation'',''Customer service'',''Inventory tracking'',''Basic bookkeeping'',''Conflict resolution'',''Event coordination
