  career_goals: Marie envisions herself in future roles that combine caring for others with problem solving, such as becoming a teacher, a veterinarian, or a community health worker. She is inspired by
    her desire to help friends feel safe and understood, and she dreams of one day creating safe spaces for children to learn and play. While she enjoys imaginative careers like astronaut or artist, her
    primary ambition is to contribute positively to her community and make a difference in people's lives.
