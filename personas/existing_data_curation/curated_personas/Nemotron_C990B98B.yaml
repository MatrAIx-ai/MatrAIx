personas:
  professional: A budding junior coder and storyteller, Marie Thomas channels curiosity and practicality by creating Scratch games that blend mystery narratives with logical puzzles, and they reliably share
    their projects during library workshops while balancing the urge to explore new ideas with the discipline to finish each program.
  sports: Enthusiastic about outdoor play, Marie Thomas spends weekends on the soccer field with the Riverdale Rovers youth team, joins the community pool for lap swimming in summer, and che ers for the
    City Grizzlies, balancing team collaboration with a preference for low‑pressure casual games.
  arts: An imaginative artist, Marie Thomas sketches whimsical scenes inspired by Quentin Blake while practicing Beethoven’s ‘Für Elise’ on the piano, and they often re‑read adventure tales by Enid Blyton,
    letting these influences shape both their visual and musical creativity.
  travel: Curious about the world, Marie Thomas has explored nearby beaches on family road trips, visited the historic museum in the state capital, and dreams of an adventure to Disneyland and the castles
    of Scotland, favoring well‑planned itineraries that mix fun attractions with quiet moments for journaling.
  culinary: In the kitchen, Marie Thomas often helps prepare family‑favorite spaghetti carbonara and fragrant fried rice, skillfully chopping carrots and adding a pinch of cinnamon to cookies, yet they
    sometimes burn toast when distracted by a new story idea.
  core: Marie Thomas is a ten‑year‑old storyteller‑coder who balances relentless curiosity with a gentle anxiety, channeling both into creative projects while occasionally succumbing to impulse candy cravings.
background:
  cultural: Marie is an African-American girl growing up in Essex, Maryland, a community known for its rich Black heritage and close-knit neighborhoods. She is raised with an awareness of African-American
    history, celebrating cultural milestones like Juneteenth and Black History Month with school projects and family gatherings. Her family maintains traditions such as soulful cooking, gospel music, and
    storytelling, which nurture her sense of identity. The multicultural environment of Baltimore County, with its museums and community centers, provides Marie opportunities to learn about her heritage
    while engaging with diverse cultures.
