personas:
  professional: Curtis Rollins, an 84‑year‑old former maintenance supervisor now dedicated to coordinating senior‑center volunteer programs, leverages their carpentry, budgeting, and team‑leadership experience
    to organize community clean‑ups with methodical precision while mentoring younger volunteers.
  sports: Curtis Rollins, a devoted fan of the Tampa Bay Buccaneers and Orlando Magic, stays active with daily Gulf beach walks, joins a senior pickleball league each winter, and balances their love of
    watching sports with a disciplined routine of light stretching and occasional gardening cardio.
  arts: Curtis Rollins, a lifelong aficionado of classic jazz, regularly spins Duke Ellington, Count Basie, and Ella Fitzgerald on their vintage record player, attends the local community theater’s monthly
    productions, and reads biographies of figures like David McCullough, finding inspiration for their own oral history project.
  travel: Curtis Rollins, who prefers relaxed, well‑planned trips, enjoys annual weekend drives to the historic streets of St. Augustine, takes occasional cruises to the Bahamas with their sister, and dreams
    of a slow‑paced road trip along the Gulf Coast to watch sunsets, all while budgeting travel expenses in their trusty spreadsheet.
  culinary: Curtis Rollins, an adept home gardener, delights in preparing fresh grouper ceviche with lime and cilantro, cooking stone‑crab claws with drawn butter, and baking key‑lime pie using home‑grown
    oranges, while their cooking skill hovers at confident amateur level, often improvising with herbs from their garden.
  core: Curtis Rollins, an 84‑year‑old detail‑oriented volunteer, blends their practical handyman skills, cautious financial planning, and love of nature and jazz into a structured, community‑focused life
    peppered with occasional worry and a habit of double‑checking every schedule.
background:
  cultural: Curtis grew up in a mid‑century white, middle‑class family in the American South, where values of hard work, self‑reliance, and community service were emphasized. After moving to Florida in
    his thirties, he adopted the relaxed coastal lifestyle of Sarasota while retaining Southern hospitality traditions. His cultural background combines post‑World War II American sensibilities with the
    neighborly, arts‑appreciating atmosphere of his Gulf Coast community, reflected in his love of seafood dishes, participation in local arts festivals, and strong involvement in intergenerational activities
    at the senior center and local church.
