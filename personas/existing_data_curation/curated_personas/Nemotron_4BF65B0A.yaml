  career_goals: Although retired from formal employment, Rosario aims to deepen her impact as a community volunteer. She plans to lead a senior center outreach program that pairs older adults with youth
    mentors, and she aspires to expand the local community garden she helped launch, turning it into an educational space for sustainable gardening. She hopes to compile and publish a family cookbook that
    blends classic Texas recipes with stories collected from relatives, preserving culinary heritage for future generations. Rosario also envisions serving on the board of the Amarillo Historical Society,
    contributing her organizational skills to preserve local history, and she is open to running for a seat on the city council’s advisory committee on senior affairs to advocate for the needs of older
    residents.
