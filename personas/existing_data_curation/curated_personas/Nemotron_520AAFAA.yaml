  career_goals: Patsy is committed to continuous professional growth. In the short term she plans to earn a master’s degree in Educational Leadership, take on the role of grade‑level team leader, and serve
    as a mentor for new teachers while integrating social‑emotional learning into her classroom. Over the next several years she aims to become an instructional coach, champion technology integration across
    her school, and spearhead a district‑wide mentorship program that promotes inclusive curriculum design. Her long‑term ambition is to move into school administration, first as an assistant principal
    and ultimately as a principal, where she can shape a school culture that balances clear structural expectations with the flexibility needed for innovative teaching. She also hopes to contribute to the
    district curriculum committee and possibly author a guide on balancing structure and flexibility in elementary education.
