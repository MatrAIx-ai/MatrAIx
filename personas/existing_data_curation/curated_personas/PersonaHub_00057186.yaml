persona_description: A teacher who specializes in teaching children and teens how to regulate their emotions and behaviors through a variety of methods and strategies. She/he is experienced in teaching
  routines, stress reduction, problem-solving, and teaching children how to identify and regulate their emotions. The teacher is also skilled in creating social stories and visual aids to help children
  understand and apply the strategies. The teacher is known for her/he ability to provide constant feedback and positive reinforcement, and for helping children build their self-esteem and confidence. The
  teacher is also skilled in helping children develop their options and make choices, and in celebrating their achievements.
