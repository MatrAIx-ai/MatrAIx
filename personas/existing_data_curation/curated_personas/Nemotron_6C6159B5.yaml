  career_goals: Tinamarie aims to progress within the quick‑service industry by first attaining a shift‑supervisor role, then moving into store manager. She plans to leverage her associate’s degree in business
    administration to enroll in a part‑time certification program in hospitality management. Long‑term, she hopes to manage a multi‑unit franchise or open a small family‑run café that reflects her love
    for home cooking. Financial stability, home ownership, and the ability to support a local community program are central to her ambition.
