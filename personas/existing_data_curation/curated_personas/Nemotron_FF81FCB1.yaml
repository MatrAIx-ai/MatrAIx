  career_goals: Although retired, Albert aims to leave a lasting legacy by documenting the oral histories of Newnan’s African‑American community and compiling a family genealogy archive. He aspires to launch
    a small scholarship fund for local high‑school students pursuing trades, and to continue volunteering as a mentor for youth interested in practical skills. He also hopes to coordinate health‑ and wellness
    workshops for seniors, ensuring his spouse and peers stay active and socially engaged.
