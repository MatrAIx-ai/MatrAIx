personas:
  professional: Kevin Mcmillian, a 71‑year‑old technology strategist, leverages his deep STEM expertise and charismatic public‑speaking to drive M&A deals while championing creative collaborations, yet
    they often resist rigid timelines, preferring spontaneous brainstorming sessions that keep boardrooms buzzing.
  sports: Kevin Mcmillian is a devoted follower of the Kentucky Derby, a lifelong fan of the Louisville Cardinals men's basketball team, and a weekend golfer at the historic Kentucky Highlands Country Club,
    where they enjoy leisurely rounds with fellow executives, though their competitive edge sometimes makes them bicker over the scorecard.
  arts: Kevin Mcmillian curates vinyl evenings featuring Miles Davis and Ella Fitzgerald, regularly attends contemporary installations by Yayoi Kusama and Ai Weiwei at the Speed Art Museum, and they lend
    their voice as a guest narrator for local productions of 'Hamlet', letting their artistic sensibility bleed into their boardroom pitches.
  travel: Kevin Mcmillian prefers impromptu cultural expeditions—jet‑setting from a weekend jazz festival in New Orleans to a spring gallery opening in Berlin, savoring a wine tour of Bordeaux, and dreaming
    of the cherry‑blossom lanterns of Kyoto—yet they anchor each trip with a thoughtfully designed itinerary to balance board commitments and family gatherings.
  culinary: Kevin Mcmillian’s kitchen is a laboratory where bourbon‑glazed pork tenderloin meets smoked paprika‑spiced shrimp étouffée, and they routinely whip up grilled peach salad with arugula and toasted
    pecans, delighting friends with spontaneous flavor pairings while never missing an opportunity to showcase a perfectly aged single‑malt rye in their after‑dinner digestif.
  core: Kevin Mcmillian blends relentless curiosity with a love for spontaneous social galas, yet their habit of over‑committing to events often leaves their calendar a chaotic jigsaw puzzle punctuated
    by late‑night worry about unfinished projects.
background:
  cultural: Kevin was raised in Louisville, Kentucky, a city renowned for its Southern hospitality, bourbon heritage, and the Kentucky Derby. His family lineage includes Irish and Scottish roots common
    among the region’s white population. The blend of Midwestern pragmatism and exposure to global cultures through education and travel has shaped a worldview that values community, tradition, and a constant
    appetite for new artistic and intellectual experiences.
