  hobbies: '[''Visiting Art Galleries'', ''Live Jazz and Theatre'', ''Collecting Vintage Vinyl'', ''Traveling for Cultural Festivals'', ''Attending Kentucky Derby Events'', ''Bourbon Tasting'', ''Community
