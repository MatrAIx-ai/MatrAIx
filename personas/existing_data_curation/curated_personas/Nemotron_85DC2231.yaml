  career_goals: At this stage Kevin aims to cement his legacy by establishing a foundation that supports STEM education and the arts in Kentucky and beyond. He seeks to transition from daily operational
    duties to board and advisory roles where he can guide digital transformation and sustainability initiatives. He also wishes to mentor the next generation of entrepreneurs, invest in socially responsible
    startups, and expand his company’s impact through strategic acquisitions that embrace unconventional, innovative business models.
