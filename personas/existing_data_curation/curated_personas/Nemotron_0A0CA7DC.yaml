  hobbies: '[''Reading mystery novels and self‑improvement books'', ''Gardening and experimenting with heirloom varieties'', ''Baking, cooking, and food preservation'', ''Crocheting and knitting'', ''Birdwatching
    and nature walks'', ''Crossword and Sudoku puzzles'', ''Listening to true‑crime podcasts'', ''Participating in small book clubs and community potlucks'']'
  career_goals: Marie aims to translate her practical skills into a modest, home‑based business that fits her preference for flexibility. She plans to develop a line of homemade preserves, sauces, and pickled
    goods using produce from her garden, selling them at the local farmer’s market and through online community groups. Over the next five years she hopes to achieve financial independence, expand to a
    small community‑supported agriculture (CSA) subscription, and earn a reputation for award‑winning products. To support this, she is considering completing a GED and taking a short culinary certification,
    while also working on personal organization skills to better manage production schedules and finances. Ultimately, she wishes to become a mentor for other women in Tangipahoa who want to start similar
    ventures.
