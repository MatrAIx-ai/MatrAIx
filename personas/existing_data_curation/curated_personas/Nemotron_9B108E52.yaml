  career_goals: In retirement, Joshua aims to preserve and share his professional legacy by mentoring students at local community colleges, volunteering as a technical advisor for the Seattle Science Museum,
    and authoring a memoir on the evolution of aerospace technology. He also seeks to stay intellectually active by learning about emerging AI tools, maintaining good health through regular walks, and deepening
    his connections with his spouse and grandchildren.
