  hobbies: '["Classic car restoration and club participation", "Community theater acting and improv", "Barbecue cooking and hosting social gatherings", "Acoustic guitar playing", "Arduino and small‑scale
    electronics tinkering", "Fishing and outdoor recreation", "Participating in repair competitions", "Mentoring apprentices at the local technical college"]'
  career_goals: Lee aims to transition from day‑to‑day shop work to a leadership role that leverages his technical depth and people skills. Over the next five years he plans to earn the ASE Master Technician
    certification and become the lead technical advisor for a regional fleet services provider. He also wants to launch a boutique mobile‑repair service that specializes in electric‑vehicle conversions
    and telematics integration for local businesses. Additionally, Lee hopes to develop a community apprenticeship program at the nearby technical college, positioning himself as a mentor and recognized
    authority in Nebraska’s mobile‑equipment sector.
