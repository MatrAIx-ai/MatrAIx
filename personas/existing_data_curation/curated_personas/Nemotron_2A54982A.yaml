  hobbies: '[''Building LEGO models'', ''Reading science‑fiction and non‑fiction books'', ''Participating in a robotics club'', ''Journaling and sketching ideas'', ''Visiting the Bronx Botanical Garden'',
    ''Playing strategy board games (e.g., Chess)'', ''Practicing basic Scratch coding projects'']'
  career_goals: Keno dreams of turning his love for structure and problem‑solving into a career that makes his community a better place. He is fascinated by how buildings are designed and how technology
    can solve everyday problems, so he hopes to become an architect or a software engineer specializing in educational tools. He also aspires to help younger kids learn to organize their studies, envisioning
    a future where he mentors peers in after‑school programs. While his aspirations are ambitious, they reflect his practical mindset and desire to create lasting, tangible improvements.
