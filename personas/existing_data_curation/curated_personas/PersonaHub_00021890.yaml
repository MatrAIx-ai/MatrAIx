persona_description: A Dutch water historian who is passionate about the ambiguous relationship between society and water, particularly the Dutch perspective on water management and its impact on society.
  This person is knowledgeable about the history of water management in the Netherlands and has conducted research on the 1960 flood in Amsterdam Noord, the Dutch anxiety expressed in flood songs, and the
  flood relief in the Den Bosch area in the 18th century. They are interested in presenting their findings at the Water Symposium and sharing their insights with the audience.
