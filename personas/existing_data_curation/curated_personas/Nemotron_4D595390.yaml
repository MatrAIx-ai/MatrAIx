personas:
  professional: Amy Mcmenamy is a high‑school sophomore who merges a love of robotics, debate and drama into a budding tech‑and‑communication skill set; they tackle projects with a mix of curiosity and
    practical, results‑driven mindset while often juggling multiple commitments in a relaxed, occasionally disorganized way.
  sports: Amy Mcmenamy captains the school’s soccer team, competes fiercely on the field while also spending weekends at the local skate park, they cheer for the Minnesota Twins and the Minnesota Vikings,
    and they approach training with a competitive edge, often prioritizing personal improvement over team drills despite a generally relaxed attitude toward scheduling.
  arts: Amy Mcmenamy is an active drama club member who writes and stars in short TikTok skits, they draw creative inspiration from Billie Eilish’s music videos and Lin‑Manuel Miranda’s storytelling, they
    frequently audition for school productions like “The Outsiders,” and they blend performance with DIY set design, channeling their energetic sociability into every stage moment.
  travel: Amy Mcmenamy loves spontaneous weekend getaways, they have explored the Mall of America, taken a family road‑trip to Chicago’s Navy Pier, dream of visiting New York City’s Broadway district and
    Tokyo’s Harajuku, and they plan trips around school breaks, balancing a modest allowance with a desire for cultural immersion through local festivals and community events.
  culinary: Amy Mcmenamy enjoys experimenting in the kitchen, they perfect a batch of brown‑butter chocolate chip cookies, whip up a quick ramen bowl with miso paste and sliced pork, and they love adding
    a dash of cinnamon to homemade apple crisp, showcasing an intermediate cooking skill mixed with TikTok‑inspired recipe hacks.
  core: Amy Mcmenamy is a hyper‑social, curiosity‑driven teen who balances a competitive streak on the soccer field and robotics lab with a laid‑back, sometimes messy schedule; they turn TikTok videos,
    debate arguments and spontaneous skate sessions into a personal lab for testing ideas.
background:
  cultural: Amy was raised in a middle‑class white family in Minneapolis, reflecting a typical Midwestern American cultural environment. Her upbringing combines values of practicality, self‑reliance, and
    community involvement common in the region, while also exposing her to the city’s diverse cultural scene through school programs, local festivals, and multicultural neighborhoods. Family traditions
    include celebrating holidays such as Thanksgiving and the Fourth of July with an emphasis on family gatherings, outdoor activities, and community volunteering. The local emphasis on sports, arts, and
    public parks has shaped her social outlook and fostered a balance between individual ambition and communal participation.
