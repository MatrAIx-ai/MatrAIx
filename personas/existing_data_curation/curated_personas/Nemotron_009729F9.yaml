personas:
  professional: Trenton Mena, a 34‑year‑old pipefitting specialist, leverages their deep technical mastery of high‑pressure piping, MIG/TIG welding, and strict code compliance to lead crews with a competitive
    drive for flawless execution, while their love of routine and hands‑on problem‑solving ensures every project runs like clockwork.
  sports: Trenton Mena dominates local pickup basketball games and anchors a community softball team, spends weekends fishing the St. Lucie River, and fiercely supports the Miami Dolphins, Tampa Bay Lightning,
    and Florida State Seminoles, channeling their competitive edge into every sport.
  arts: Trenton Mena relaxes by blasting classic rock icons such as Led Zeppelin, The Rolling Stones, and Bruce Springsteen, attending occasional live shows at the Sunrise Amphitheater, and binge‑watching
    action classics like Die Hard and Rambo, letting the raw energy of music and film mirror their competitive spirit.
  travel: Trenton Mena favors short, well‑planned road trips that combine fishing in the Everglades, exploring the historic streets of Charleston, South Carolina, and occasional weekend getaways to the
    Bahamas for snorkeling, all while balancing budget constraints and the need for a reliable vehicle for their Camaro.
  culinary: Trenton Mena gravitates toward backyard grilling, perfecting smoky Texas‑style brisket with hickory chips, searing Cajun‑seasoned shrimp boils, and concocting homemade barbecue rubs featuring
    paprika, brown sugar, and garlic, rarely venturing beyond the grill for more elaborate cuisine.
  core: Trenton Mena is a methodical, competition‑driven pipefitter who channels routine‑loving energy into grilling, fishing, and restoring a classic Camaro, balancing pragmatic finances with occasional
    splurges on high‑octane hobbies, all while maintaining a stoic, skeptical edge.
background:
  cultural: Trenton is a white American whose family roots trace back to Irish and Italian ancestry, typical of many Floridian families with Southern influences. He grew up in a coastal town in Florida,
    where a blend of Southern hospitality and beach‑side lifestyle fostered his outgoing, sociable nature. His household emphasized a strong work ethic, practical problem‑solving, and respect for skilled
    trades, reflecting his parents' and grandparents' tradition of hands‑on occupations. He identifies with mainstream American values, participates in his local Christian church community, and values community
    involvement, responsibility, and maintaining reliable, routine‑oriented practices in both his personal and professional life.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''Blueprint reading'', ''Welding (MIG/TIG)'', ''High‑pressure system installation'', ''HVAC ductwork installation'', ''Sprinkler system installation'', ''Leak
    detection'', ''OSHA safety compliance'', ''Project scheduling'', ''Team leadership'', ''Apprentice mentoring'', ''Troubleshooting'', ''Pipe bending and threading'', ''Marine‑grade piping installation'']'
  hobbies: '[''Fishing'', ''Pickup basketball'', ''Community softball'', ''Backyard grilling'', ''Automotive restoration'', ''Gardening'', ''Habitat for Humanity volunteering'', ''Watching football'', ''Listening
    to classic rock music'', ''DIY home improvement'']'
  career_goals: Trenton aims to earn his Master Plumber license within the next two years and step into a supervisory role that oversees large commercial and industrial piping projects throughout St. Lucie
    County. He plans to expand his technical repertoire into sustainable building systems, focusing on solar‑thermal and geothermal piping to stay ahead of green‑construction trends. Long‑term, he intends
    to launch his own contracting firm that delivers high‑quality pipefitting services while establishing a structured apprenticeship program to train the next generation of tradespeople. Additionally,
    he aspires to become a certified safety trainer, sharing his practical expertise across the industry.
