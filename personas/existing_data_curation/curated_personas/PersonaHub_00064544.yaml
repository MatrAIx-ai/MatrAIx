persona_description: A national leader and supporter of research-based knowledge and strategies aimed at promoting excellence and equity in the education of children and youth placed at risk of educational
  failure. This person is involved in the National Institute on the Education of At-Risk Students, co-sponsoring two studies on Developing and Implementing High Performance Learning Communities and a Partnership
  for Excellence and Accountability in Teaching. They are also involved in field-initiated studies research grants, small business innovation research program, D.C. Desk, visiting scholars fellowships,
  and graduate research fellowships and dissertation grants. This person is likely to be a highly motivated and dedicated individual who is passionate about improving the education of at-risk students and
  promoting equity in the education system.
