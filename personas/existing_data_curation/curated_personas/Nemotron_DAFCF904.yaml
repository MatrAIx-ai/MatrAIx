  hobbies: '[''Visiting art galleries and museums'', ''Sketching and photography of local architecture'', ''Gardening (native prairie plants)'', ''Reading mystery novels and art publications'', ''Participating
    in historical walking tours'', ''Volunteering at community art events'', ''Attending workshops on sustainable logistics'']'
  career_goals: Despite being near traditional retirement age, Jeri aims to transition from full‑time route driving to a mentorship and consulting role within the local logistics community. She hopes to
    become a certified safety trainer for new drivers, sharing her methodical approach and stress‑management strategies. Concurrently, she is exploring the possibility of launching a niche courier service
    dedicated to delivering artwork and cultural artifacts for Oak Park’s galleries, museums, and community art programs. This would allow her to blend her logistical expertise with her love of art while
    maintaining a flexible schedule that supports her health and family life. Ultimately, Jeri seeks financial stability for a comfortable retirement and the satisfaction of contributing to the cultural
    vibrancy of her community.
