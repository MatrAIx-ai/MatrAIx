personas:
  professional: Bilqees Mitra is a budding robotics enthusiast who channels their disciplined, organized nature into building competition‑ready robots, applying a practical curiosity that blends systematic
    testing with inventive problem solving, and frequently leads their school’s robotics club to ensure projects meet high standards.
  sports: Bilqees Mitra plays point guard for their middle‑school basketball team, follows the NBA’s Los Angeles Lakers for inspiration, and dedicates after‑school practice to conditioning drills and weekend
    pick‑up games at the community centre to stay fit.
  arts: Bilqees Mitra expresses themselves through Bollywood dance routines that blend classic choreography with contemporary moves, rehearsing to songs by A.R. Rahman and Shreya Ghoshal while also humming
    pop hits from Taylor Swift and Billie Eilish, and they occasionally sketch fan‑art of Bollywood stars like Priyanka Chopra.
  travel: Bilqees Mitra loves family road trips that combine visits to science museums and historic forts, dreams of exploring Dubai’s futuristic skyline and Kyoto’s cherry‑blossom festivals, and prefers
    meticulously planned itineraries over spontaneous wandering, though they sometimes get sidetracked by pop‑culture souvenir stalls.
  culinary: Bilqees Mitra enjoys whisking fragrant biryani with basmati rice, apricot pieces, and saffron threads, mastering the crisp edges of vegetable samosas, and blending a mango‑lassi with fresh yogurt
    and cardamom, proudly presenting these dishes at family gatherings despite occasional over‑spicing.
  core: Bilqees Mitra is a hyper‑organized, curiosity‑driven 12‑year‑old who balances a love for robotics, basketball, and Bollywood dance with a tendency to over‑worry and stay up late perfecting code,
    making them a disciplined yet slightly stressed multitasker.
background:
  cultural: Bilqees belongs to a South Asian family that maintains strong cultural ties while living in the diverse community of Edison, New Jersey. Her household values education, family cohesion, and
    respect for tradition, encouraging her to excel academically and to stay connected to her heritage. She grows up speaking English and her family's native language (such as Hindi, Urdu, or Bengali) at
    home, celebrating festivals like Diwali, Eid, and other cultural observances with food, music, and community gatherings. The vibrant South Asian community in Middlesex County provides her with opportunities
    to participate in cultural clubs, language classes, and intergenerational events, shaping a bicultural identity that blends South Asian customs with American experiences.
