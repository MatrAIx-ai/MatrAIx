  career_goals: As she approaches high school, Bilqees aspires to pursue a STEM career, ideally as a biomedical engineer or a medical researcher who can develop solutions that improve community health.
    She aims to maintain top academic performance, earn scholarships, and participate in advanced science programs. Bilqees also hopes to become a mentor for younger students, leading science clubs and
    organizing community outreach events that promote mental‑wellness and academic confidence. Ultimately, she envisions combining her technical expertise with her compassionate nature to make a tangible
    impact on society.
