  career_goals: At two years old, Sherin's career aspirations are still forming, but her love for animals, bright picture books, and drawing suggest budding interests that could later become a veterinarian,
    illustrator, or teacher. She often pretends to help her parents and cares for toy animals, reflecting an early desire to care for others and share knowledge, and she enjoys being the center of attention
    during storytime and play.
