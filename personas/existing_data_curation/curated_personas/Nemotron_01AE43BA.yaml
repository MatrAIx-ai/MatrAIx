personas:
  professional: Sherin Collins, a two‑year‑old aspiring mini‑engineer who spends hours stacking wooden blocks, demonstrates early spatial reasoning and quick problem‑solving, channeling balanced curiosity
    and practicality into sturdy tower designs while their talkative, sociable demeanor turns each play session into a collaborative brainstorming meeting.
  sports: Sherin Collins, a two‑year‑old energetic explorer, delights in toddler tag games at the community park, rides a bright red tricycle, cheers for the local soccer team City FC, and participates
    in the Tiny Tot T‑Ball league, embodying a balance of self‑start activity and friendly competition.
  arts: Sherin Collins, a two‑year‑old captivated by animated music, sings along to The Wiggles' Fruit Salad and Disney's Let It Go, dances to Sesame Street's Elmo, and revels in picture books illustrated
    by Eric Carle, shaping a vivid artistic identity.
  travel: Sherin Collins, a two‑year‑old adventure‑curious explorer, loves family trips to the nearby zoo where they marvel at giraffes, and dreams of visiting Disneyland Resort in California, preferring
    trips with a structured itinerary that includes plenty of snack breaks and parent‑guided play.
  culinary: Sherin Collins, a two‑year‑old budding food connoisseur, favors soft mac and cheese with cheddar, finger‑friendly chicken nuggets, sweet banana slices, and often helps stir mashed potatoes with
    a wooden spoon while insisting on a dash of cinnamon on their oatmeal.
  core: Sherin Collins, a talkative and socially energized two‑year‑old, blends curiosity with practicality in every play, spends pocket money on glittering stickers, manages mild eczema with diligent moisturising,
    dashes around in a tricycle, sings The Wiggles, dreams of zoos and Disneyland, and insists on sprinkling cinnamon on oatmeal.
background:
  cultural: Sherin lives in Livingston, Texas, a small community in Polk County known for Southern hospitality and close‑knit neighborhoods. Her family's cultural practices reflect typical East‑Texas white
    American traditions, including regular church attendance, celebrations of holidays such as Thanksgiving and the Fourth of July with community picnics, and a fondness for local outdoor activities like
    fishing, hiking, and county fairs. The warm climate and rural setting provide ample opportunities for Sherin to engage with nature, local wildlife, and community events.
