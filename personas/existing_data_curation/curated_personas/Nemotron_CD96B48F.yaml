personas:
  professional: Joseph Mclean, a retired maintenance handyman turned neighborhood volunteer coordinator, leverages their meticulous budgeting, carpentry, and electrical troubleshooting skills to organize
    systematic home-repair projects for the local association, and they approach every task with reliable, methodical precision.
  sports: Joseph Mclean maintains a steady fitness routine consisting of early morning walks along the Schuylkill River, weekly laps at the Philadelphia YMCA pool, and seasonal attendance at Philadelphia
    Eagles football games and Phillies baseball matches, and they favor low-impact, structured activities that align with their methodical mindset.
  arts: Joseph Mclean immerses themselves in classic cinema, revisiting masterpieces like "Casablanca" and "The Philadelphia Story," savoring orchestral works by Beethoven and folk ballads by Woody Guthrie,
    and they occasionally attend local historical society lectures featuring Dr. Eleanor Greene, allowing these artistic flavors to reinforce their love of tradition and narrative.
  travel: Joseph Mclean plans trips with meticulous spreadsheets, favoring low-stress itineraries that blend historic sightseeing with relaxation; they have explored Lancaster's Amish farms on guided tours,
    spent a weekend wandering Philadelphia's Old City historic district, and dream of a genealogy-focused visit to Dublin's Georgian neighborhoods, always traveling with their spouse to keep the experience
    comfortable and financially manageable.
  culinary: Joseph Mclean enjoys cooking hearty comfort meals such as rosemary-infused beef pot roast with carrots and potatoes, homemade apple crumble using heirloom apples from their garden, and a classic
    Philadelphia cheesesteak with provolone and sautéed onions, and they adhere to precise recipes and measured ingredients while savoring the ritual of a well-organized kitchen.
  core: Joseph Mclean is a spreadsheet-obsessed retiree who transforms gardening, genealogy, and home-repair into methodical projects, yet they occasionally forget to water the begonias during a weekend
    spent mentoring grandchildren.
background:
  cultural: Joseph is a second-generation white American of Irish and German ancestry, raised in a working-class neighborhood of Philadelphia. He grew up in a Catholic family, attending St. Patrick’s parish,
    and internalized the city’s strong sense of community, modesty, and loyalty. Philadelphia’s historic roots, love of local sports teams, and food traditions such as cheesesteaks and soft pretzels are
    woven into his daily life, and he values the customs of the city’s blue-collar culture.
