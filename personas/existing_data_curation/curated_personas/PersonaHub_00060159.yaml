persona_description: A researcher studying the impact of ozone stress on tropical ecosystems and cash crops, focusing on native and cultivated C3 and C4 plant species from the Mata Atlantica and cultivated
  areas in southern Brazil. The researcher aims to validate the phytotoxic potential of ozone stress using controlled exposure experiments and field surveys, and to compare the structural responses of C3
  and C4 plant species to ozone stress.
