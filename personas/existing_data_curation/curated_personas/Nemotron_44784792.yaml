  career_goals: Sun aims to obtain a professional certificate in digital marketing within the next year and leverage her bilingual background to secure a role as a marketing coordinator for a tech‑focused
    company that values multicultural outreach. She aspires to advance to a marketing manager position, where she can blend data‑driven strategy with creative campaign development. Long‑term, Sun is interested
    in founding a bilingual tutoring platform that connects Korean‑American students with mentors, combining her entrepreneurial drive, competitive spirit, and cultural insight.
