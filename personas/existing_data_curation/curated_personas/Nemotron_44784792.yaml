personas:
  professional: Sun Jeon, a 24‑year‑old bilingual marketing aspirant, blends data‑driven analysis with creative campaign ideas, leveraging her knack for public speaking, community event coordination, and
    hands‑on social‑media content creation to position herself as a future marketing coordinator for a tech‑focused, multicultural firm.
  sports: Sun Jeon thrives on competitive team play, captaining a local ultimate frisbee squad called the Lehigh Valley Throwers and starring as a midfielder for the Lehigh Valley Soccer Club, while cheering
    for the Philadelphia Eagles and Philadelphia 76ers, and she hits the nearby Blue Mountain Trail every other weekend for cardio hikes.
  arts: Sun Jeon channels her energetic side through K‑pop dance classes where she perfects BTS and Blackpink choreography, fills her playlists with songs by IU, listens to contemporary fiction authors
    like Sally Rooney, and fuels her entrepreneurial spark with podcasts such as The Tim Ferriss Show and How I Built This.
  travel: Sun Jeon favors weekend getaways that blend adventure and culture; she has explored New York City’s art districts, hiked the Shenandoah Skyline, dreams of sampling Tokyo’s sushi and tech scene,
    and balances a modest travel budget by staying in hostels while splurging on local culinary tours.
  culinary: Sun Jeon’s kitchen is anchored by traditional dishes like kimchi, bibimbap, and bulgogi, where she expertly layers gochujang, sesame oil, and napa cabbage, while also experimenting with fusion
    tacos and ramen, and she occasionally indulges in fried chicken from a nearby fast‑food joint for comfort.
  core: Sun Jeon, a 24‑year‑old bilingual dynamo, merges competitive sports, data‑savvy marketing ambitions, and a love for Korean flavors into a pragmatic yet curious approach to life, occasionally over‑spending
    on concerts and neglecting dental floss.
background:
  cultural: Sun is a second‑generation Korean American who grew up in the Philadelphia metropolitan area before moving to Quakertown, PA. She was raised with a blend of Korean family traditions—such as
    celebrating Chuseok, respecting elders, and emphasizing education—and the independent, community‑oriented values common in suburban Pennsylvania. Fluent in both English and Korean, Sun routinely bridges
    cultural gaps by volunteering at the local Korean cultural center, organizing multicultural festivals, and introducing Korean culinary practices to her broader community. Her bicultural experience gives
    her a nuanced perspective on identity, encouraging her to navigate and celebrate both her heritage and her American upbringing.
