  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Photography (street and nature)'', ''Playing piano'', ''Reading philosophy and literature'', ''Hiking in forest
    preserves'', ''Cooking and exploring diverse cuisines'', ''Volunteer math tutoring for underprivileged youth'', ''Mindfulness meditation'', ''Participating in community theater (set design)'']'
  career_goals: Robert aims to lead a multidisciplinary research institute that applies mathematical and data-driven solutions to pressing societal challenges, such as health equity and climate resilience.
    He aspires to secure major grants that fund collaborative projects across mathematics, computer science, and the arts, fostering innovative approaches to problem solving. A core ambition is to mentor
    the next generation of scientists, establishing a mentorship program that emphasizes compassion, ethical research, and creative thinking. He also seeks to publish a seminal monograph that synthesizes
    his work on harmonizing quantitative rigor with artistic insight, while cultivating a balanced workload that supports his mental well‑being.
