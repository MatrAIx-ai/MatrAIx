personas:
  professional: A budding explorer of cause and effect, Alice Cobian, at one year old, already demonstrates a methodical approach to stacking blocks and sorting shapes, hinting at future organizational
    skills and a practical mindset, and they often insist on repeating familiar routines during play.
  sports: A playful tot, Alice Cobian, at one year old, loves crawling after the soft rubber balls in the community baby gym and circles the living-room whenever the Chicago Cubs are on TV, showing early
    team loyalty while they occasionally try to copy the players' gestures with their own wobbly limbs.
  arts: A budding rhythm lover, Alice Cobian, at one year old, giggles to Mozart's lullabies and claps along with the vibrant Disney songs from films like "Frozen", while they eagerly flip through Dr. Seuss
    picture books, revealing an early appreciation for music and visual storytelling.
  travel: A curious wanderer, Alice Cobian, at one year old, has already felt the warm sand of Santa Monica Beach during a family weekend and peered at the giant pandas at San Diego Zoo, and they daydream,
    through bedtime stories, of strolling the cobblestones of Paris's Montmartre in the future.
  culinary: A selective palate, Alice Cobian, at one year old, prefers the smooth texture of pureed carrots, bananas, and avocado, often requesting a spoonful of homemade chicken broth seasoned with a pinch
    of cumin, while they occasionally reject new flavors like broccoli, displaying a cautious yet adventurous approach to food.
  core: Alice Cobian, a one-year-old who cherishes predictable routines, balances a pragmatic curiosity with mild skepticism toward unfamiliar textures, and they display a competitive streak when stacking
    blocks, occasionally ending their calm day with a stubborn tantrum.
