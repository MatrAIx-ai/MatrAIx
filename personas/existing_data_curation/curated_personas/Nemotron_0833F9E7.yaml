  career_goals: She aspires to attend a college with a strong visual arts program and ultimately work as a freelance illustrator or graphic designer, creating artwork for books, games, and social media.
    Her keen interest in how art can support mental well‑being also leads her to consider a double major in psychology or art therapy, with the goal of becoming an art therapist who helps adolescents manage
    anxiety and depression. In the near term, she aims to improve her academic standing, build a robust portfolio, and secure a summer internship at a local design studio or community art center.
