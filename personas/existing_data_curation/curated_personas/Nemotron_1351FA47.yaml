  career_goals: Norma aims to re‑enter the workforce by launching a boutique consulting service that helps local nonprofits streamline finances and operations. Within the next year she plans to earn a Project
    Management Professional (PMP) certification and secure a part‑time advisory role with a community development agency in Kane County. Long‑term, she envisions expanding her consultancy into a full‑service
    firm, mentoring young Black women in business, and eventually taking a leadership position on the board of a regional economic development nonprofit.
