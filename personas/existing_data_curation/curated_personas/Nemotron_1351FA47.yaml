personas:
  professional: Norma Jeanpierre is a boutique nonprofit consultant with a razor‑sharp command of financial planning, project management, and grant writing, channeling their love of routine and exacting
    standards into meticulously crafted budgets, spreadsheets, and strategic roadmaps for community organizations, while their competitive edge drives them to secure high‑impact contracts and their cautious
    skepticism ensures every proposal is defensible.
  sports: Norma Jeanpierre fuels their competitive spirit by leading weekly Zumba sessions at the Aurora Community Center, cheering the Chicago Bears on Sundays, joining a local pick‑up basketball league
    in the summer, and planting a small vegetable plot in their backyard as a form of low‑impact cardio.
  arts: Norma Jeanpierre curates soulful playlists featuring Etta James, Marvin Gaye, and Kirk Franklin for their church choir rehearsals, hosts a monthly book club that devours works by Toni Morrison and
    Octavia Butler, and enjoys occasional evenings at the Chicago Symphony Orchestra and local gospel concerts.
  travel: Norma Jeanpierre prefers meticulously planned trips, having already toured New Orleans for its music and cuisine, explored the historic streets of San Juan for a family reunion, and they now dream
    of a restorative retreat to the Canadian Rockies, all while they balance budget constraints and a desire to bring their extended family along.
  culinary: Norma Jeanpierre excels at cooking Creole classics like gumbo, jambalaya, and fried catfish with a secret blend of cayenne and smoked paprika, while also mastering Southern staples such as collard
    greens, cornbread, and peach cobbler, using fresh garden herbs they harvest themselves.
  core: Norma Jeanpierre blends disciplined routine with vibrant community energy, obsessively colors spreadsheets, leads a gospel choir, and never misses a Sunday brunch, even if it means staying up late
    perfecting a new gumbo recipe, all while they juggle dozens of commitments.
background:
  cultural: Norma is a Black woman of Afro‑Caribbean descent, with family roots in Haiti and the southern United States. Raised in a tightly knit extended family, she grew up immersed in the traditions
    of the Black church, emphasizing faith, education, and communal support. She celebrates cultural milestones such as Haitian Independence Day and incorporates family recipes and oral histories into her
    daily life. Living in Aurora, Illinois, she maintains strong ties to the local Black community, participating in church events, cultural festivals, and neighborhood initiatives that reflect her values
    of resilience, practicality, and collective advancement.
