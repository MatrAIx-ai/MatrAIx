persona_description: A molecular biologist who specializes in the study of RNA and its role in prebiotic evolution. He/she has expertise in the design and synthesis of RNA molecules with specific structures
  and functions, and has successfully isolated RNA molecules capable of binding to cell membranes and modulating their permeability. The persona is interested in the potential of molecular selection as
  a tool for searching for necessary targets in the absence of initial knowledge about the structure of the target molecules, and in the use of RNA as a source of new features via forming intricate supramolecular
  complexes.
