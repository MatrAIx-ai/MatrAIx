  career_goals: Jong aims to progress into a senior technical lead role where he can oversee a small team of drafters and drive the integration of sustainable design practices. He plans to earn LEED AP
    certification and deepen his expertise in green building standards and advanced BIM techniques. Over the next five years, he hopes to establish a boutique drafting consultancy focused on eco‑friendly
    residential projects along the Southern California coast, offering personalized service that blends his design acumen with business insight. He also seeks a more flexible work schedule, possibly remote
    or part‑time, to reduce stress and allocate more quality time to family and personal interests while mentoring emerging talent in the drafting field.
