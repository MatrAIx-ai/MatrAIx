personas:
  professional: Jong Le, a veteran architectural and civil drafter with 25 years of experience, leverages deep CAD and BIM expertise and a pragmatic curiosity to translate complex design concepts into precise,
    code‑compliant drawings, while they assertively guide junior drafters and negotiate design adjustments.
  sports: Jong Le, an avid weekend hiker who belongs to the San Diego Hiking Club, follows the Padres and Wave FC for inspiration, and uses early‑morning beach jogs as a warm‑up before tackling the coastal
    trails of Torrey Pines.
  arts: Jong Le, who captures the cliffs of Torrey Pines through a compact landscape camera echoing Ansel Adams’ style, finds solace in the speculative worlds of Isaac Asimov and the cinematic elegance
    of Hayao Miyazaki, and lets these artistic influences sharpen the precision and imagination applied to every drafting project.
  travel: Jong Le prefers meticulously planned, low‑key getaways that blend nature and culture, such as a recent solo road trip along the Pacific Coast Highway and a family pilgrimage to Jeju Island’s tea
    gardens, while day‑dreaming about an eco‑focused retreat in Norway’s fjords.
  culinary: Jong Le, a confident home chef, routinely prepares kimchi, bibimbap with gochujang, and roasted sea‑bass tacos, relishing the tactile ritual of the traditional tea ceremony while also exploring
    fresh market finds like heirloom tomatoes and avocados for occasional fusion dishes.
  core: Jong Le, a meticulous yet delightfully disorganized draftsman, balances a relentless curiosity for sustainable design with a habit of postponing paperwork, a penchant for late‑night puzzle sessions,
    and a persistent worry about meeting expectations.
background:
  cultural: 'Jong Le is a second‑generation Korean‑American who grew up in a bilingual household that emphasized respect for elders, education, and community. He celebrates traditional Korean holidays such
    as Chuseok and Lunar New Year, maintains ties to the local Korean church, and preserves culinary traditions by preparing dishes like kimchi and bibimbap. Living in San Diego, he blends his East Asian
    heritage with the multicultural, outdoor‑centric lifestyle of Southern California, enjoying coastal activities, diverse cuisine, and a relaxed pace of life. This cultural synthesis informs his balanced
    outlook: he values collective well‑being and hierarchical respect while also embracing individual curiosity, practical problem‑solving, and flexibility in both his professional and personal pursuits.'
