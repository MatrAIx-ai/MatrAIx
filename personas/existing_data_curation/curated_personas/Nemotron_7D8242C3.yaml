  career_goals: William aims to secure a stable technical career that leverages his hands‑on abilities while offering a clear pathway for advancement. In the short term, he plans to earn his GED and obtain
    industry certifications such as CompTIA A+ and an automotive service technician credential. He envisions starting as an entry‑level IT support technician or an apprentice mechanic at a local shop, eventually
    progressing to a specialized role—either as a network administrator for small businesses or as an automotive technician specializing in performance tuning. His competitive nature pushes him to excel
    in certification exams and to be recognized as a top performer among his peers. Long‑term, he dreams of launching his own custom PC building business or a small automotive performance shop, combining
    his technical expertise with entrepreneurial ambition, providing a reliable income and personal autonomy.
