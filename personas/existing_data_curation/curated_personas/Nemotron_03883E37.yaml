  hobbies: '[''Exploring nature trails'', ''Collecting rocks and leaves'', ''Reading picture books and early chapter books'', ''Drawing and coloring'', ''Making friendship bracelets'', ''Building forts
    with cushions and cardboard'', ''Playing hide-and-seek'', ''Participating in school garden club'', ''Doing simple science experiments'', ''Solving puzzles'']'
  career_goals: Susan dreams of becoming a teacher who creates a kind and engaging classroom, and she also imagines caring for animals as a veterinarian. She hopes to continue learning about science and
    nature, and to use her compassion to help both children and animals stay healthy. In the future, she wants to volunteer in school projects and community events, like organizing a book drive or a pet‑care
    workshop, while staying grounded in practical ways to support her community.
