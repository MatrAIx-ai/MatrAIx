    tools'']'
  hobbies: '[''Hiking coastal trails'', ''Reading mystery and historical non-fiction'', ''Playing chess competitively'', ''Photography of natural landscapes'', ''Experimenting with fusion cooking'', ''Yoga
    and mindfulness meditation'', ''Mentoring youth in community STEM programs'', ''Attending jazz and R&B concerts'', ''Traveling to explore African diaspora heritage sites'', ''Gardening in her backyard'']'
  career_goals: Nakivia aims to advance to a Chief Compliance Officer role within the next five years, preferably at a technology or biotech firm that values data‑centric governance. She seeks to lead a
    strategic compliance program that integrates AI and predictive analytics to anticipate regulatory changes before they arise. Earning the Certified Compliance and Ethics Professional (CCEP) credential
    and a graduate certificate in Business Analytics are concrete steps on her path. Beyond titles, she hopes to shape industry best‑practice standards through speaking engagements and White‑paper authorship,
    while also championing mentorship programs that increase Black representation in compliance and risk management fields. To manage her stress sensitivity, she looks for organizations that prioritize
    employee wellness and flexible work arrangements.
