  career_goals: Eager to merge his curiosity about technology with his love for the natural world, Joseph aspires to become a robotics engineer or an environmental scientist. He dreams of designing autonomous
    machines that can monitor ecosystems and help protect wildlife, envisioning a future where he can work independently on projects that blend practical problem‑solving with innovative ideas. In the longer
    term, he hopes to contribute to sustainable community initiatives, perhaps designing eco‑friendly structures or tools that benefit his town.
