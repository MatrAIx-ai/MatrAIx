personas:
  professional: Gloria Dailey is an aspiring junior game designer who merges vivid cartoon sketches with Scratch programming, channeling their spontaneous curiosity into imaginative story prototypes while
    they often battle the challenge of meeting self‑set deadlines.
  sports: Gloria Dailey kicks around the field with the River Valley Rangers under‑12 soccer team, champions the skills of Sporting Kansas City by watching games on weekends, and fills free time with energetic
    dribbling drills, while they sometimes over‑exert themselves, ending with sore calves.
  arts: Gloria Dailey fuels their imagination by doodling cartoon heroes inspired by the illustrations of Debbie Driscoll, listening to whimsical piano pieces by Yiruma, and diving into graphic novels like
    'Baboon' by Jeremy Haun, while they proudly showcase their creations at the local community art festival.
  travel: Gloria Dailey prefers spontaneous day‑crawls along the Platte River trail and weekend picnics at nearby state parks, while they dream of a future family adventure to the Grand Canyon and a magical
    trip to Paris to see the Eiffel Tower lit at night.
  culinary: Gloria Dailey loves crafting colorful veggie‑topped pizzas with mozzarella, fresh basil, and pepperoni, sipping strawberry‑banana smoothies, and munching carrot sticks with hummus, though their
    cooking skills are still budding, and they often end in a delightful mess of flour on the kitchen counter.
  core: Gloria Dailey is a curious ten‑year‑old bursting with artistic energy and compassionate spirit, whose spontaneous ideas and occasional anxiety turn everyday moments into vivid, unfinished masterpieces,
    and they constantly chase new inspirations.
background:
  cultural: Gloria grows up in a white, Midwestern family in Papillion, Nebraska. Her community emphasizes friendliness, volunteerism, and participation in local events such as county fairs, church gatherings,
    and neighborhood potlucks. Family traditions include celebrating holidays like Thanksgiving with large dinner gatherings, attending community craft fairs, and supporting school activities. The suburban‑rural
    mix of Papillion provides easy access to parks, farms, and community centers, fostering a strong sense of neighborly responsibility and appreciation for nature. These cultural influences shape Gloria's
    compassionate outlook, her enjoyment of collaborative group activities, and her desire to contribute positively to her community.
