  hobbies: '[''Drawing'', ''Watercolor painting'', ''Storytelling'', ''Scratch programming'', ''Reading fantasy books'', ''Nature exploration'', ''Improvisational drama'', ''Piano basics'', ''Soccer'',
    ''Animal shelter volunteering'']'
  career_goals: Gloria dreams of turning her love for art and helping others into a future career. She imagines becoming an artist who creates murals or community art projects that brighten public spaces
    and bring neighborhoods together. She also hopes to be a teacher or youth mentor, using her compassion and storytelling skills to guide younger children and foster a supportive classroom environment.
    A secondary ambition is to work with animals as a veterinarian, inspired by her volunteering at the local shelter. At this stage she is eager to join school clubs like the Kindness Committee and the
    Art Club, and she looks forward to developing her artistic talent and learning more about caring for people and animals.
