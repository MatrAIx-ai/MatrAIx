personas:
  professional: Teresa Sarver, a retired administrative professional turned senior community volunteer, they bring their methodical budgeting and event‑planning expertise to orchestrate church socials,
    senior‑center historical preservation meetings, and family gatherings with calm, reliable precision.
  sports: Teresa Sarver enjoys their daily walk along Fort Lauderdale’s beachfront, they participate in a local seniors’ pickleball league, follow the Miami Dolphins and the Miami Heat, and they occasionally
    join a gentle swimming class at the community pool to stay fit.
  arts: Teresa Sarver spends quiet evenings knitting and quilting while listening to Beethoven’s symphonies, they indulge in historical fiction by Ken Follett, attend the Florida Orchestra’s summer concerts,
    and they volunteer on the church choir committee, where they appreciate the choral works of Mozart.
  travel: Teresa Sarver prefers well‑planned road trips to historic sites, they have visited Charleston’s historic district and the Everglades National Park, they dream of touring Boston’s Freedom Trail,
    and they always book accommodations with familiar comforts and easy access to their garden.
  culinary: Teresa Sarver loves cooking family recipes such as chicken pot pie, shrimp creole, and peach cobbler, they rely on fresh herbs from their garden—basil, rosemary, thyme—to season their dishes,
    and they label leftovers with handwritten dates, though they occasionally forget to refrigerate them promptly.
  core: Teresa Sarver is a steadfast steward of routine, they weave careful organization into community service, gardening, knitting, and memoir writing, while indulging in occasional garden gossip and
    a sweet tooth for peach cobbler.
background:
  cultural: Teresa comes from a white, Midwest‑rooted American family with German and Irish ancestry. Raised in a Protestant, community‑oriented household, she values tradition, self‑reliance, and practical
    stewardship. Relocating to Fort Lauderdale introduced her to Florida’s diverse cultural tapestry, yet she maintains her conventional values, often expressing pride in preserving the customs and rituals
    passed down through generations.
attributes:
  skills: '[''Household Budgeting'', ''Event Planning'', ''Garden Management'', ''Sewing and Knitting'', ''Volunteer Coordination'', ''Basic Computer Skills'']'
