  career_goals: Courtney dreams of turning her love for imagination and art into a career. She aspires to become a concept artist or illustrator for books and video games, eventually creating her own graphic
    novel series. She is also intrigued by the idea of designing immersive experiences as a game developer or animator. In the longer term, she imagines studying visual arts or creative writing in college,
    where she can merge her curiosity for abstract ideas with a flexible, self‑directed creative practice.
