personas:
  professional: Courtney Dyer, a budding young storyteller who blends her love of fantasy illustration, short fiction, and simple Scratch coding to create interactive digital comics that she shares with
    peers at her art club.
  sports: Courtney Dyer enjoys weekend bike rides along the lakeside trails of Owatonna, occasionally practices beginner‑level soccer with the Owatonna Vikings youth team, and cheers for the Minnesota Twins
    while dreaming of playing on a high‑school cross‑country team.
  arts: Courtney Dyer devotes afternoons to sketching dragons inspired by the graphic novel series Amulet, listening to the orchestral scores of Star Wars, and attending the local art club where they admire
    works by Pixar animators and collect printed copies of Hayao Miyazaki’s art books.
  travel: Courtney Dyer’s travel dreams include day trips to the historic downtown of Minneapolis, weekend camping at Voyageurs National Park, and a future pilgrimage to the Warner Bros. Studio Tour in
    London, yet they usually plan outings with parents using colorful magnet maps and rely on an early bedtime to recharge.
  culinary: Courtney Dyer likes to whip up cheesy pizza rolls and chocolate chip cookies, sprinkling cinnamon on oatmeal for breakfast, and often experiments with rainbow pasta sauce while watching cooking
    tutorials, though they sometimes over‑salt the sauce in their enthusiastic attempts.
  core: Courtney Dyer is a 12‑year‑old imaginative explorer who balances sketchbooks, LEGO builds, and bicycle adventures, all while navigating allowance‑driven splurges, occasional allergy flare‑ups, and
    a habit of leaving art supplies strewn across the living room.
background:
  cultural: Courtney comes from a white, Midwestern American family in Owatonna, Minnesota. Her upbringing reflects the region’s values of community, modesty, and a strong connection to the outdoors, with
    seasonal activities such as ice skating in winter and lake swimming in summer. Her family’s cultural roots include German‑Scandinavian ancestry common in the area, which influences a respect for tradition,
    a love of simple comforts, and participation in local community events like county fairs and school volunteer programs.
