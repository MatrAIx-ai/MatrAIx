  career_goals: Even in retirement, Martin aims to leave a lasting educational legacy. He aspires to mentor younger teachers through occasional guest lectures at the local community college, compile and
    publish his memoir to preserve his life‑story for future generations, and help establish a scholarship for aspiring educators in Ocean County. He also seeks to strengthen senior‑center programs, ensuring
    they remain well‑organized and socially enriching for his peers.
