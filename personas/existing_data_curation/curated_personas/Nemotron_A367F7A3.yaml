personas:
  professional: Irma Garib is a charismatic bilingual financial product specialist who thrives on high‑pressure securities and commodities negotiations, using Salesforce analytics and a deep grasp of FINRA
    compliance to outpace rivals while eyeing a future as a senior account executive and eventual boutique broker; they channel competitive energy into every client interaction.
  sports: Irma Garib passionately follows soccer, rallying behind their national team in every World Cup qualifier, regularly watching matches at the local sports bar, supporting the St. Louis City SC MLS
    club, and spending weekend mornings trekking the Ozark Trail with a community hiking group, balancing competitive fandom with outdoor endurance.
  arts: Irma Garib’s artistic life revolves around salsa and bachata nights at community halls where they lead the rhythm, regularly attending live performances by artists such as Bad Bunny and Marc Anthony,
    and curating playlists that blend reggaeton beats with classic boleros, using music as both a social catalyst and a personal energizer.
  travel: Irma Garib prefers spontaneous weekend getaways, often planning last‑minute trips to nearby hill towns in the Midwest, dreaming of exploring coffee farms of Colombia and historic streets of Antigua,
    and balancing love for local Missouri hikes with an ambitious bucket list that includes a springtime road trip down the Pacific Coast Highway; they relish the mix of adventure and cultural immersion.
  culinary: Irma Garib delights in crafting authentic pupusas stuffed with cheese, loroco, and pork, perfecting the hand‑pressed technique for potluck nights, while also experimenting with guacamole infused
    with roasted pepitas and savoring single‑origin Guatemalan coffee at brick‑and‑mortar cafés, though they admit to over‑seasoning sauces when trying new recipes.
  core: Irma Garib is a results‑driven, bilingual sales dynamo whose love for dance, soccer, and fintech fuels a competitive mindset that occasionally battles disorganization but drives relentless ambition;
    they constantly push boundaries while juggling a packed schedule.
background:
  cultural: Irma’s Salvadoran roots are a central part of her identity. She grew up in a bilingual household, speaking Spanish at home and English at school, which gives her a natural fluency that she leverages
    in her professional outreach to Latino clients. She celebrates Salvadoran holidays such as Día de la Independencia (September 15) and Día de los Difuntos, often preparing traditional foods like pupusas,
    yuca frita, and tamales for family gatherings. Community and family are vital; she stays close to her parents and participates in local church events and cultural festivals that bring together the Salvadoran
    diaspora in Missouri. These experiences instill values of resilience, collectivism, and a strong work ethic, while her Midwestern upbringing adds a practical, down‑to‑earth perspective. Irma blends
    these cultural influences in both her personal life and career, using her heritage to build trust and rapport in a diverse client base.
