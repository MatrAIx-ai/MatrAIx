  hobbies: '[''Salsa and bachata dancing'', ''Volunteering at a Latinx community center'', ''Group fitness classes (Zumba)'', ''Hiking in Missouri state parks'', ''Cooking Salvadoran cuisine'', ''Following
    soccer and supporting El Salvador'', ''Attending live music concerts'', ''Exploring specialty coffee shops'', ''Reading about fintech and emerging markets'']'
  career_goals: Irma aims to break into the top 5% of sales performers at her firm within the next two years, earning Series 7 and Series 63 licenses and eventually becoming a Certified Financial Planner.
    She envisions moving into a senior account executive or team‑lead role where she can mentor junior agents and design training programs that emphasize agility and competitive spirit. Long‑term, Irma
    aspires to launch her own boutique brokerage focused on serving underserved Latino entrepreneurs in the Midwest, blending her cultural insights with cutting‑edge fintech solutions to create a niche
    market presence.
