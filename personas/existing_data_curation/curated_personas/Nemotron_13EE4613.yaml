  career_goals: Terry aims to pursue a technical career that blends his love for routine, reliability, and hands‑on work. After completing high school with a focus on STEM, he plans to secure an apprenticeship
    at a local machine shop or renewable‑energy maintenance firm, eventually becoming a certified mechanical technician or aerospace component assembler. He values stable, structured employment where he
    can apply his methodical approach, continue improving his technical expertise, and work independently.
