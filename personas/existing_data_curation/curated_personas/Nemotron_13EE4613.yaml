personas:
  professional: An aspiring mechanical hobbyist, Terry Carver, 14, channels their methodical nature and love for routine into building and painting scale model kits while experimenting with small automation
    scripts, envisioning a future as a precision engineer who values practical problem‑solving over abstract theory.
  sports: Terry Carver, 14, prefers solitary fitness pursuits, tackling the red‑rock trails around Grand Junction for regular hikes with a backpack camera, while cheering discreetly for the Denver Broncos
    in football season and the Colorado Avalanche in hockey, and occasionally joining the Grand Junction High School cross‑country team to maintain endurance.
  arts: Terry Carver, 14, channels their competitive edge into meticulous painting of model kits, draws inspiration from classic American novelists like Mark Twain and Ernest Hemingway, and finds solace
    in the acoustic folk sounds of John Denver and the timeless guitar riffs of the Eagles, while occasionally watching the period drama series "Mad Men" for its practical storytelling.
  travel: Terry Carver, 14, charts travel plans with the same precision as a model blueprint, favoring rugged weekend trips to nearby Mesa Verde National Park and the Great Sand Dunes for solo hiking and
    photography, while dreaming of a future road‑trip across the historic Route 66 to explore the Southwest’s desert vistas, all constrained by parental permission and school schedule.
  culinary: Terry Carver, 14, enjoys simple, hearty meals like a Colorado‑style green‑chile burrito and homemade trail‑mix bars made with oats, almonds, and dried cranberries, cooks with a beginner’s confidence
    in the family kitchen, and frequently swaps recipes on a teenage cooking subreddit while avoiding sugary snacks that could disrupt their disciplined routine.
  core: Terry Carver, a 14‑year‑old with a penchant for solitary precision, transforms routine into mastery of scale models, disciplined budgeting, and resilient independence, all while quietly critiquing
    the world around them.
background:
  cultural: Terry grew up in Grand Junction, Colorado, in a family of Anglo‑American heritage that values self‑reliance, practicality, and community traditions such as local fairs and outdoor recreation.
    His upbringing blends a modest suburban lifestyle with frequent exposure to the Colorado high desert, fostering an appreciation for rugged independence, moderate conservatism, and a respect for the
    region’s natural environment.
