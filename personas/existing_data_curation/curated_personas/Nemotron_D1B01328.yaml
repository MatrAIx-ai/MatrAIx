  career_goals: Hunter aims to transition to a registered nursing (RN) credential within the next two years, targeting a BSN program that accommodates his full‑time schedule. He aspires to become a nurse
    manager in his current clinic, leveraging his competitive drive to lead a high‑performing team that consistently exceeds patient‑care benchmarks. Additionally, he plans to specialize in wound‑care certification
    and to spearhead community outreach programs that improve chronic‑illness management for seniors in Travis County. Long‑term, he envisions opening a small home‑health agency that provides structured,
    evidence‑based care to underserved neighborhoods, blending his love for organization with his commitment to personal interests.
