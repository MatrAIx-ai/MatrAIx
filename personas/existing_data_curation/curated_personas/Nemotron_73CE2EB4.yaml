    development'', ''Team training and supervision'', ''Quality assurance'', ''Immunization assistance'']'
  hobbies: '[''Hiking local trails'', ''Biking'', ''Cooking and experimenting with healthy recipes'', ''Reading contemporary fiction'', ''Yoga'', ''Board game nights'', ''Participating in community events
    and volunteer health fairs'', ''Improvisational theater'', ''Nature photography'']'
  career_goals: Jenine aims to leverage her practical experience as a pharmacy technician into a career as a licensed pharmacist. She is currently pursuing a Bachelor of Science in Pharmaceutical Sciences
    part‑time, with plans to apply to a Doctor of Pharmacy (PharmD) program within the next two years. In the short term, she seeks to advance to a lead technician or pharmacy supervisor role, where she
    can mentor staff, streamline workflow, and implement technology‑driven safety initiatives. Long‑term, she envisions managing a community pharmacy in Payette or opening her own independent pharmacy that
    integrates comprehensive medication counseling, immunization services, and regular health‑education events for local residents. She also plans to obtain certifications in immunization and medication
    therapy management to expand her clinical skill set.
