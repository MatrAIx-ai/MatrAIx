personas:
  professional: Jenine Young, an ambitious pharmacy technician in Payette, leverages meticulous prescription verification, proficiency with PioneerRx and QS/1, and strong patient counseling to streamline
    workflow, mentor peers, and drive safety initiatives, all while mapping a clear path toward a PharmD and future pharmacy ownership.
  sports: Jenine Young embraces the Idaho outdoors by hiking the foothills around Payette and weekend mountain biking with the local Idaho Trailblazers club, practices yoga at the Boise State Yoga Collective,
    and fervently supports the Boise State Broncos football and the Idaho Steelheads hockey teams.
  arts: Jenine Young indulges in contemporary fiction from authors like Sally Rooney and Ocean Vuong, performs improv at the Payette Improv Workshop, frequents open-mic nights featuring musicians such as
    Mitski, and draws creative inspiration from photographer Annie Leibovitz for their own nature photography.
  travel: Jenine Young prefers structured weekend getaways, often road-tripping to Yellowstone or Glacier for hiking and photography, while dreaming of a culinary immersion tour of Tuscany’s farm-to-table
    markets, balancing limited vacation time with a meticulously planned itinerary and travel fund.
  culinary: Jenine Young experiments with healthy farm-to-table dishes like quinoa-beet salad with locally sourced kale and Idaho potatoes, grilled trout with lemon-herb butter, and sweet-potato kale curry,
    honing a moderate cooking skill that blends seasonal ingredients and creative plating during dinner parties with friends.
  core: Jenine Young is a socially dynamic, structure-loving pharmacy technician who balances meticulous professionalism with outdoor adventure, creative cooking, and community engagement, all while managing
    a disciplined financial plan and occasional impulse buys.
background:
  cultural: Jenine grew up in a middle‑class family that settled in Payette, Idaho during her early childhood. Her upbringing reflects the blend of mainstream American values—self‑reliance, education, and
    volunteerism—with the distinctive small‑town culture of southwestern Idaho, where outdoor recreation, county fairs, and close‑knit community ties are central. She was raised with an appreciation for
    hard work and practicality, traits reinforced by her family's involvement in local small‑business endeavors and participation in community events. While she identifies with broader White American cultural
    norms, her daily life is shaped by the regional emphasis on outdoor activities, neighborly support, and a strong sense of civic responsibility.
attributes:
  skills: '[''Prescription verification'', ''Medication dispensing'', ''Drug interaction screening'', ''Dosage calculation'', ''Pharmacy management software (e.g., PioneerRx, QS/1)'', ''Inventory control'',
