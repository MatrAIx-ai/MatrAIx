  hobbies: '["Nature photography", "Sketching and painting", "Hiking local trails", "Home hydroponic gardening", "Visiting art galleries and attending live music events", "Cooking farm‑to‑table meals",
    "Reading speculative fiction", "Watching sustainability documentaries", "Practicing mindfulness meditation"]'
  career_goals: Harry aims to advance from a miscellaneous agricultural worker to a farm manager specializing in sustainable and regenerative practices. He plans to enroll in a bachelor’s program in Agricultural
    Science to deepen his technical expertise and obtain organic farming certification. In the medium term, he envisions launching a community‑supported organic farm that incorporates artistic installations
    and agritourism experiences, showcasing the intersection of agriculture and visual art. He also hopes to lead a team that adopts cutting‑edge technologies such as IoT soil sensors and drone‑based crop
    monitoring, positioning himself as a regional advocate for environmentally responsible farming. Ultimately, he wants to be recognized for creating a farm that is both a productive food source and a
    cultural gathering space.
