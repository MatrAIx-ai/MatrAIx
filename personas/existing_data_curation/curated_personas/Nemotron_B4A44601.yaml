  hobbies: '[''Softball League Participation'', ''Youth Basketball Coaching'', ''Gulf Fishing Trips'', ''DIY Boat Maintenance'', ''Live Music Attendance'', ''Community Theater Volunteering'', ''Woodworking'',
    ''Poker Nights'']'
  career_goals: Douglas aims to progress to a regional sales director role within the next three years, overseeing multiple markets and driving enterprise‑wide growth initiatives. He plans to earn a Project
    Management Professional (PMP) certification to sharpen his operational oversight skills and to develop a mentorship program that prepares high‑potential sales supervisors for senior leadership. Long‑term,
    he envisions founding a boutique consulting firm that helps midsize companies streamline their sales operations and boost profitability, leveraging his competitive drive and structured problem‑solving
    approach.
