personas:
  professional: A seasoned B2B sales leader, Douglas Teta leverages two decades of experience building structured sales processes, rigorous performance metrics, and compliance‑focused teams, while their
    practical problem‑solving mindset, competitive edge, and knack for conflict mediation foster a collaborative, results‑driven workplace.
  sports: An energetic community athlete, Douglas Teta competes in the St. Petersburg Bay Area co‑ed softball league, coaches a youth basketball squad at the Pinellas Youth Sports Center, and stays fit
    with sunrise jogs along St. Pete Beach while rooting for the Tampa Bay Buccaneers and Tampa Bay Rays each season.
  arts: A passionate patron of the local arts, Douglas Teta regularly enjoys live performances by The Blue Goats and The Riptide Blues at Jannus Live, volunteers backstage for productions at the Community
    Theatre of St. Petersburg, and finds inspiration in the storytelling of playwright August Wilson and the soulful melodies of blues legend B.B. King.
  travel: A weekend explorer with a laid‑back yet adventurous spirit, Douglas Teta often plans quick getaways for Gulf‑side fishing trips to Sanibel Island, has road‑tripped the Florida Keys and attended
    Mardi Gras in New Orleans, and dreams of a Mediterranean cruise visiting Barcelona and Dubrovnik, balancing relaxed beach time with cultural immersion.
  culinary: A moderately skilled home chef, Douglas Teta loves grilling freshly caught grouper with garlic, lemon, and fresh thyme, simmering a hearty gumbo with Andouille sausage, okra, and cayenne, and
    perfecting a wood‑smoked pork shoulder using his custom‑built smoker, while occasionally treating themselves to a steak au poivre at the downtown steakhouse.
  core: Douglas Teta merges a disciplined, structure‑loving sales mindset with a sociable, competitive spirit, channeling a passion for fishing, woodworking, and community sports into a life that balances
    pragmatic planning, occasional risk‑taking at poker tables, and a steadfast dedication to both personal and professional growth.
background:
  cultural: Douglas was raised in a middle‑class family with German and Irish ancestry in the American South before relocating to coastal Florida in his thirties. His upbringing emphasized Southern hospitality,
    a strong work ethic, and practical problem‑solving. Living in Saint Petersburg exposed him to the multicultural flavor of the Gulf Coast, fostering an appreciation for diverse cuisines, regional festivals,
    and the laid‑back beach lifestyle while retaining his Euro‑American cultural roots.
attributes:
  skills: '[''Team Leadership'', ''Strategic Sales Planning'', ''Performance Metrics Analysis'', ''Customer Relationship Management (CRM) Systems'', ''Budget Forecasting'', ''Conflict Resolution'', ''Sales
