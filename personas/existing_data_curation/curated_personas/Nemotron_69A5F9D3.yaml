personas:
  professional: Margarita Collazolopez, a seasoned floral designer with fifteen years of hands‑on experience, blends contemporary event aesthetics with traditional altar motifs, leverages Adobe Illustrator
    for sleek branding, and applies her structured, detail‑oriented mindset to meticulous inventory control and reliable delivery schedules.
  sports: Margarita Collazolopez enjoys solitary hikes on the Rocky Mountain trails each weekend, practices yoga three times weekly, roots for the Denver Broncos and follows the Colorado Rockies, and occasionally
    joins a local trail‑running club for the occasional 5K fundraiser.
  arts: Margarita Collazolopez captures the intricate textures of her floral installations with a vintage Nikon, crafts colorful papel picado for Día de los Muertos celebrations, draws inspiration from
    Frida Kahlo’s symbolism and the modern narratives of Sally Rooney, and curates a modest Instagram gallery that showcases both her work and her love for contemporary literary fiction.
  travel: Margarita Collazolopez prefers meticulously planned weekend escapes to destinations like Sedona’s red rock vistas and Santa Fe’s art markets, balances adventure with budget by using a travel rewards
    credit card, dreams of a pilgrimage to Oaxaca’s historic tile workshops, yet often opts for local mountain retreats due to family responsibilities.
  culinary: Margarita Collazolopez experiments with traditional mole negro, hand‑rolled tamales, and fresh aguachile using herbs from her rooftop garden, relishes the bright zest of marigold petals as garnish,
    and enjoys cooking for friends while occasionally over‑seasoning dishes in her enthusiastic pursuit of authentic flavor.
  core: Margarita Collazolopez is a detail‑driven floral artist who blends vibrant cultural motifs with sustainable practices, budgets meticulously, embraces solitary hikes, and channels her creative energy
    into both design and community workshops, all while juggling a tendency to splurge on rare seeds.
background:
  cultural: Margarita was born to Mexican immigrant parents who settled in Colorado when she was a child. Growing up in a bilingual household, she celebrated Día de los Muertos and other Mexican festivals,
    experiences that instilled a deep appreciation for vibrant colors, symbolic flowers, and communal storytelling. Her Mexican roots influence her design palette—bright marigolds, papel picado accents,
    and traditional altar arrangements—while her Denver upbringing connects her to the region's emphasis on sustainability and outdoor recreation. This blend of cultural heritage and local values shapes
    both her professional style and personal outlook.
attributes:
  skills: '["Floral design for weddings and events", "Traditional Mexican flower arrangement", "Inventory and supply chain management", "Customer service and relationship building", "Budgeting and small‑business
    bookkeeping", "Graphic design using Adobe Illustrator for promotional materials", "Workshop instruction and mentorship", "Sustainable sourcing and plant health care"]'
  hobbies: '["Urban gardening", "Cooking Mexican cuisine", "Hiking in the Rockies", "Floral photography", "Reading contemporary literary fiction", "Practicing yoga", "Hand‑crafted papel picado"]'
  career_goals: Margarita aims to open a flagship boutique studio in Denver that highlights locally‑grown, sustainably‑sourced flowers while honoring her Mexican heritage through seasonal collections. She
    plans to earn a professional horticulture certification to deepen her knowledge of plant care and expand her service offerings to include dried‑flower and preservation work. Over the next five years,
    she envisions building a modest network of regional growers, launching a quarterly community workshop series focused on small‑group learning, and securing recurring contracts with local boutique hotels
    and restaurants.
