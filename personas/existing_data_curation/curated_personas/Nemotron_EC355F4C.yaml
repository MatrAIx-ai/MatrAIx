    at community health fairs'', ''attending small cultural gatherings with close friends'']'
  career_goals: Rasid aims to advance his nursing credentials by completing an Associate Degree in Nursing (ADN) to transition into a Registered Nurse role, with a longer‑term plan to earn a BSN and specialize
    in community health nursing focused on serving South Asian immigrant families in New Jersey. He aspires to become a charge nurse in a primary‑care clinic, develop a health‑literacy program targeting
    diabetes prevention, and eventually mentor new LPNs. Rasid also intends to obtain certifications such as Certified Diabetes Educator and Telehealth Nursing Specialist to stay at the forefront of evolving
    care models.
