personas:
  professional: Justina Remy is a detail‑driven engineering technologist who leverages her solid foundation in CAD, PLC programming, and statistical process control to lead cross‑functional R&D projects,
    balancing a natural curiosity for emerging manufacturing tech with a pragmatic, lean‑process mindset, and they ensure every team meeting ends with a concrete action plan.
  sports: Justina Remy plays varsity‑level volleyball for the Tallahassee Tritons, hits the gym for heavy weight‑lifting three times a week, hikes the Alfred B. Maclay State Park trails each weekend, proudly
    supports the Florida State Seminoles football team, follows the Atlanta Hawks NBA season closely, and they treat each training session as a competitive challenge, maintaining meticulous performance
    logs.
  arts: Justina Remy attends hip‑hop dance workshops featuring choreography of artists like Missy Elliott, frequently watches live R&B and jazz concerts—recently seeing H.E.R. at the Tallahassee Memorial
    Auditorium and Kamasi Washington at a nearby jazz club—and captures urban‑nature scenes inspired by the works of Gordon Parks, sharing her photography on Instagram while she experiments with digital
    editing.
  travel: Justina Remy prefers meticulously planned weekend road trips, often using a shared Google Sheet itinerary, and has explored Savannah’s historic squares, the jazz‑rich streets of New Orleans during
    Mardi Gras, and a solo backpacking stint through the Blue Ridge Parkway, while she saves for a longer‑term goal of visiting the aerospace museums of Toulouse, France.
  culinary: Justina Remy enjoys modern twists on classic soul‑food dishes such as shrimp‑and‑grits with miso glaze, collard greens sautéed with garlic‑infused quinoa, and sweet‑potato mash seasoned with
    fresh rosemary, and she frequently experiments with seasonal Florida produce like grapefruit and heirloom tomatoes, showcasing her intermediate‑to‑advanced cooking skills at family potlucks and occasional
    pop‑up tastings.
  core: Justina Remy blends disciplined engineering precision with a vibrant community spirit, turning every project, workout, and kitchen experiment into a competitive yet collaborative quest for excellence,
    even if they occasionally burn a batch of quinoa while multitasking.
background:
  cultural: Justina grew up in a close-knit Black community in Tallahassee, shaped by the traditions of Southern African-American culture and the supportive network of her church and extended family. Family
    gatherings often featured storytelling, gospel music, and home-cooked meals that blend soul food staples with fresh Florida produce. She is actively involved in local cultural festivals and has strong
    ties to historically Black institutions such as Florida A&M University, which inform her commitment to representation and community uplift. These roots fuel her ambition to blend technical excellence
    with social impact.
attributes:
  skills: '[''AutoCAD'', ''SolidWorks'', ''Creo'', ''PLC programming'', ''Python'', ''MATLAB'', ''Statistical analysis (Minitab)'', ''Technical documentation'', ''Project planning'', ''Lean manufacturing'',
    ''Quality assurance'', ''Equipment calibration'', ''Data acquisition'', ''3D printing'', ''Team leadership'', ''OSHA safety compliance'', ''Troubleshooting'', ''Process optimization'']'
  hobbies: '[''Volleyball'', ''Hip-hop dance'', ''Weightlifting'', ''Hiking'', ''Cooking Southern cuisine'', ''Live music concerts'', ''Reading sci-fi literature'', ''STEM volunteering (Girl Scouts)'',
    ''Arduino tinkering'', ''Photography'']'
  career_goals: Justina aims to become a senior engineering technologist within the next five years, leading large-scale research and development projects for a governmental or aerospace contractor. She
    plans to earn a Certified Engineering Technologist (CET) credential and a Six Sigma Green Belt to deepen her process-improvement expertise. Long-term, she envisions launching a startup that creates
    low-cost, sustainable manufacturing solutions for underserved communities, while also establishing a mentorship pipeline for Black youth interested in STEM.
