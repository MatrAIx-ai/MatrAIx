personas:
  professional: Amalia Jo is a seasoned systems analyst whose pragmatic curiosity and results‑oriented mindset let them dissect complex IT environments, craft clear specifications, and mentor women‑in‑tech,
    all while balancing a competitive edge with collaborative learning.
  sports: Amalia Jo hikes the Blue Ridge and trails with the Triangle Hiking Club, follows the Carolina Hurricanes, and participates in a local women’s running group that trains for seasonal 5K races, blending
    competitive spirit with nature‑focused fitness.
  arts: Amalia Jo immerses themselves in salsa dancing, listening to Marc Anthony and Gloria Estefan, and attends performances at the North Carolina Stage, letting rhythmic movement and vibrant music anchor
    their cultural roots and creative outlet.
  travel: Amalia Jo plans weekend getaways to the Great Smoky Mountains and charming coastal towns like Savannah, while dreaming of bird‑watching excursions in Cuenca, Ecuador and a culinary tour of Barcelona,
    balancing adventure with practical budgeting.
  culinary: Amalia Jo cultivates a garden of tomatoes, plantains, and peppers, then crafts a fragrant sofrito‑based rice and beans stew and crispy tostones, showcasing a solid cooking skill level flavored
    by island‑inspired dishes and fresh ingredients.
  core: Amalia Jo blends a competitive tech mind with a love for garden‑fresh meals, salsa rhythms, and late‑night home‑automation projects, all while juggling a disciplined budget and a watchful eye on
    health.
background:
  cultural: Amalia grew up in a close‑knit Puerto Rican household that prioritized family gatherings, music, and flavorful food. Bilingual from an early age, she carries the island’s vibrant traditions—such
    as salsa rhythms and festive celebrations—while embracing the slower‑paced, community‑focused lifestyle of Sampson County, NC. Her heritage informs her warm hospitality, resilience, and a deep appreciation
    for both cultural continuity and the opportunities presented by her adopted Southern community.
