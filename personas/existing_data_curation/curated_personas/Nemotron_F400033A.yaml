  hobbies: '[''Gardening'', ''Cooking (Puerto Rican cuisine)'', ''Salsa dancing'', ''Hiking'', ''Birdwatching'', ''DIY electronics'', ''Reading mystery novels'', ''Local women‑in‑tech meetups'']'
  career_goals: Amalia is driven to advance into a senior or lead systems analyst position where she can shape strategic technology initiatives for small‑to‑mid‑size businesses in rural North Carolina.
    She aims to earn advanced certifications such as CISSP or CCNP to broaden her cybersecurity expertise, and eventually launch her own consulting practice focused on bridging the digital divide for local
    enterprises. Mentoring women entering the tech field and serving as a catalyst for community‑wide tech adoption are also central to her long‑term vision.
