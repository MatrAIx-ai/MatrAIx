  career_goals: Michael aims to move into a supervisory role within a regional logistics firm, eventually managing a fleet of drivers while integrating sustainable transportation practices. He plans to
    earn a bachelor’s degree in logistics or business administration to broaden his strategic insight, and he hopes to one day launch his own small trucking business focused on reliable service and community
    support. Balancing his ambition with his sensitivity to stress, he also seeks a position that offers a clearer work-life balance and opportunities for mentorship.
