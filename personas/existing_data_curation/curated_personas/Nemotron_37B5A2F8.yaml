  hobbies: '[''Running (local 5K club)'', ''Sailing on Boston Harbor'', ''Hiking state parks'', ''Community volunteer events in Braintree'', ''Cooking classes and craft brewery tours'', ''Playing acoustic
    guitar'', ''Watching Boston Red Sox and Celtics games'', ''Participating in local trivia nights'', ''Reading business and self‑improvement books'']'
  career_goals: He aims to progress from senior cost estimator to cost manager and eventually director of cost control, overseeing a team of estimators for large commercial developments in the New England
    region. James plans to obtain the AACE Certified Cost Professional (CCP) credential and to specialize in sustainable building cost estimation. He also wants to mentor junior staff, improve cost efficiency
    processes, and contribute to the adoption of data‑driven estimating practices within his organization.
