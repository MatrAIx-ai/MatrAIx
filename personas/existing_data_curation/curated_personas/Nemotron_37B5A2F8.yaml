personas:
  professional: James Earnhardt is a senior cost estimator at a New England construction firm, leveraging deep expertise in quantity takeoffs, ProEst, and risk analysis while channeling a routine‑oriented,
    practical mindset into meticulous cost models and their outgoing nature into clear stakeholder presentations.
  sports: James Earnhardt runs with the Braintree 5K Club, sails regularly with the Boston Harbor Sailing Association, hikes the Blue Hills Reservation on weekends, and supports the Boston Red Sox, Celtics,
    Bruins, and Patriots, often wearing their jerseys during workouts.
  arts: James Earnhardt unwinds by strumming acoustic renditions of Bob Dylan and The Avett Brothers at informal gatherings, regularly attends Boston Symphony Orchestra concerts, and enjoys the witty films
    of John Krasinski, reflecting a blend of classic folk roots and contemporary Boston cultural scene.
  travel: James Earnhardt plans meticulously for modest getaways, favoring weekend drives to the rugged Maine coastline, sailing excursions to Nantucket, and annual trips to the historic streets of Dublin,
    Ireland, where they combine a love for maritime heritage with a dash of cultural exploration.
  culinary: James Earnhardt, a self‑taught home chef, relishes mastering lobster rolls with fresh New England clams and buttered rolls, perfecting a hoppy stout‑infused beef stew after craft brewery classes,
    and routinely experiments with rosemary‑infused roasted potatoes and smoked cheddar, often pairing meals with locally brewed IPAs.
  core: James Earnhardt blends a methodical, budget‑focused mind with a social, outdoorsy spirit, balancing spreadsheets and sailing knots while habitually checking the weather app before every hike and
    never missing a Friday night craft‑beer tasting.
background:
  cultural: James was raised in a suburban New England family of primarily English and Irish ancestry. His upbringing in Braintree, Massachusetts, reflects the region’s pragmatic work ethic, emphasis on
    community involvement, and appreciation for seasonal traditions—thanksgiving gatherings, holiday parades, and leaf‑peeping excursions. He values the practical, down‑to‑earth sensibilities common among
    New Englanders and carries a respect for the area’s historical roots, from early colonial heritage to modern Boston culture.
attributes:
  skills: '[''Cost Estimation'', ''Quantity Surveying'', ''Budget Development'', ''Financial Forecasting'', ''Risk Assessment'', ''Advanced Excel Modeling'', ''Construction Contracts Knowledge'', ''Vendor
