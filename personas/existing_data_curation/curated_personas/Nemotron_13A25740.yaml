  career_goals: Jesus dreams of becoming someone who can share stories and art with many people, envisioning himself as a performer, a teacher, or an artist when he grows up. He is fascinated by astronauts
    and firefighters, often saying he wants to explore space or help others, but his core ambition is to keep discovering new ideas and bring joy through creative expression.
