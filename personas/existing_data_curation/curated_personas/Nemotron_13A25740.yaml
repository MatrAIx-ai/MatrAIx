personas:
  professional: A curious preschool explorer named Jesus Montalvo turns every day into a mini‑enterprise, spontaneously leading “show‑and‑tell” sessions where they charm classmates with elaborate tales
    and simple science tricks, yet they often leave crayons scattered and forget the schedule, reflecting their love for attention and aversion to structure.
  sports: A playground‑enthusiast named Jesus Montalvo proudly dons the Little Kickers soccer club jersey, attends weekly toddler gymnastics at the community center, and chants for the local professional
    baseball team, the River City Ravens, though they often forget their water bottle after games, illustrating a sociable, spontaneous approach to fitness.
  arts: A budding mini‑artist named Jesus Montalvo spends afternoons finger‑painting with bright primary colors, humming along to "Baby Shark" and Mozart’s “Eine kleine Nachtmusik,” and proudly showcases
    a crayon portrait of a dancing elephant at family gatherings, embodying a love for both visual and musical arts.
  travel: A wide‑eyed adventure‑seeker named Jesus Montalvo loves weekend trips to the local zoo, sunny Sunshine Beach, and the magical world of Disneyland, planning each outing on a hand‑drawn map and
    demanding a window seat on car rides, reflecting a spontaneous, experience‑driven travel style.
  culinary: A snack‑loving four‑year‑old named Jesus Montalvo delights in crunchy chicken nuggets, creamy mac and cheese, strawberry‑banana smoothies, and enjoys sprinkling extra cinnamon on apple slices
    while helping stir pancake batter on weekends.
  core: A talkative, curiosity‑driven four‑year‑old named Jesus Montalvo blends spontaneous creativity, love for the spotlight, and occasional mess‑making, whether leading preschool performances, splurging
    on stickers, or chasing soccer balls.
background:
  cultural: Jesus grows up in a vibrant Mexican‑American household in San Antonio. At home, he hears both Spanish and English, celebrates traditional holidays such as Día de los Muertos, Cinco de Mayo,
    and Mexican Independence Day, and enjoys family meals featuring tacos, tamales, and rice. The community’s rich Mexican heritage, with its music, art, and festivals, influences his love for colorful
    art and lively songs. He often visits the River Walk’s cultural events and learns about Mexican folklore from grandparents, blending his Mexican roots with the diverse culture of Texas.
