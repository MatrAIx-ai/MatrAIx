  career_goals: In retirement, Rembrandt aims to develop a cohesive body of artwork that explores memory, migration, and identity, with the goal of exhibiting a solo show at a Brooklyn gallery and presenting
    his work in local cultural centers. He aspires to publish a coffee‑table book that fuses his paintings, calligraphy, and reflective essays on his East Asian heritage and life in New York. Additionally,
    he wishes to mentor emerging Asian‑American artists through small, intimate workshops, and to expand his practice by learning new digital media such as 3D modeling or animation, thereby bridging traditional
    aesthetics with contemporary technology.
