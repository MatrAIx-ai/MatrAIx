  career_goals: Aida aims to earn her GED and obtain a certification as a community health worker or home‑care aide, which would allow her to secure stable part‑time employment in her municipality. In the
    longer term she plans to launch a home‑based catering business that specializes in local dishes, and to develop a freelance virtual‑assistant service leveraging her organizational and bilingual skills.
    Her overarching ambition is to achieve financial independence, reduce chronic stress, and become a recognized, reliable provider of essential services within her community.
