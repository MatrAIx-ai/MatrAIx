personas:
  professional: Aida Hernandez, a 43‑year‑old aspiring community health worker and budding virtual assistant, channels her meticulous budgeting, bilingual communication, and hands‑on home‑repair skills
    into organizing neighborhood wellness workshops, while her preference for structure and critical mindset ensures every detail is accounted for, even if it sometimes creates tension with volunteers.
  sports: Aida Hernandez follows the local basketball team the Santurce Cangrejeros, participates in a Saturday coastal walking club for birdwatching, and joins a community softball league, blending low‑impact
    exercise with a competitive spirit while staying grounded in predictable routines.
  arts: Aida Hernandez blends musical tradition and literary intrigue, playing the cuatro at family gatherings while devouring mystery novels by Agatha Christie and Tana French, and enjoys the soulful salsa
    of Celia Cruz alongside contemporary paintings by local artist José Velásquez, enriching her evenings with these artistic touches.
  travel: Aida Hernandez prefers purposeful travel, often planning budget‑friendly trips to nearby island destinations like St. Thomas for snorkeling, while dreaming of a cultural pilgrimage to Barcelona’s
    Gothic Quarter, balancing meticulous itinerary planning with a desire for occasional spontaneous detours.
  culinary: Aida Hernandez, an avid home cook, masters classic dishes such as arroz con gandules, mofongo, and pastelón, infusing them with fresh herbs from her garden like cilantro and thyme, and demonstrates
    an intermediate‑to‑advanced skill level, often experimenting with new spice blends to prepare meals for future catering clients.
  core: Aida Hernandez is a detail‑driven, worry‑prone planner who finds solace in gardening, crocheting, and crossword puzzles, yet can be overly critical and occasionally over‑commits to community projects
    at the cost of personal downtime.
background:
  cultural: Aida was raised in San Sebastián, a close‑knit municipio in Puerto Rico’s interior, within a working‑class family that emphasized familismo, Catholic traditions, and community celebrations such
    as the Fiestas Patronales. The town’s agricultural heritage introduced her early to fresh produce and home‑grown cooking, while the island’s vibrant music—bomba, plena, salsa, and the cuatro—filled
    family gatherings. Bilingualism in Spanish and English is typical of her generation, allowing her to navigate both local and broader contexts. Her cultural upbringing shapes her love for cooking, music,
    gardening, and community service, and fuels her desire to preserve local customs while pursuing personal advancement despite limited economic opportunities.
