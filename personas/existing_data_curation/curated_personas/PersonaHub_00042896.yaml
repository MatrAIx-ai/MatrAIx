persona_description: A scientist studying the effects of hurricanes on coastal marshes, particularly the impact on the ability of these wetlands to sustain themselves during and after a storm. She is particularly
  interested in the changes in sediment deposition in these marshes, as well as the potential for subsidence. Her research has focused on the importance of coastal marshes in protecting local communities
  from hurricane-induced storm surges and flooding, and she is working to understand the factors that may be contributing to the decline of these wetlands.
