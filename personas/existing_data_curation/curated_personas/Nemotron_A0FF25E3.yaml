  hobbies: '[''Beach walking and shell collecting'', ''Birdwatching'', ''Gardening and sustainable landscaping'', ''Cooking Mexican cuisine'', ''Reading classic literature and science journals'', ''Chess
    and puzzle solving'', ''Community potlucks and cultural celebrations'', ''Volunteering at senior centers and leading tech workshops'']'
  career_goals: Although retired from formal employment, Luis aims to leave a lasting impact through mentorship and community service. He aspires to volunteer at local schools and senior centers, offering
    hands‑on STEM workshops for youth and guiding fellow retirees in technology use. Luis also hopes to document his professional experiences in a memoir that highlights the evolution of engineering practices,
    and to contribute his expertise to community projects such as creating a solar‑powered garden hub in Grover Beach. His ambition is to balance the transmission of practical knowledge with fostering curiosity
    in the next generation.
