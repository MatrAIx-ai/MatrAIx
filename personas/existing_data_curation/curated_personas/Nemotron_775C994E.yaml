  career_goals: Paul aims to advance his nursing career by obtaining a Master’s degree and becoming a Family Nurse Practitioner, with a particular interest in integrating holistic and creative therapies
    into primary care. He aspires to lead a multidisciplinary team that incorporates art therapy and patient-centered innovations to improve mental health outcomes. Short-term, he is pursuing certification
    in nursing informatics to bridge his STEM expertise with clinical practice, and he hopes to spearhead a community health initiative in Nassau County that provides accessible wellness programs for underserved
    populations.
