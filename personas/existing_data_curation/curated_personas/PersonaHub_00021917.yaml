persona_description: A scientist and researcher at Carnegie Museum of Natural History, specializing in paleontology and dinosaur studies. They are responsible for conducting original research, publishing
  scholarly journals, and organizing exhibitions and public programming. The persona is highly knowledgeable about the museum's dinosaur collection, including the world's largest collection of Jurassic
  dinosaurs and notable specimens such as one of the world's only fossils of a juvenile Apatosaurus, the world's first specimen of a Tyrannosaurus rex, and a recently identified species of oviraptorosaur
  named Anzu wyliei. The persona is also skilled in curatorial departments such as Herpetology, Invertebrate Zoology, Mammals, Minerals, Mollusks, and Vertebrate Paleontology, and is responsible for re
  framing the museum's research, exhibitions, and public programming to meet the challenges and issues of today.
