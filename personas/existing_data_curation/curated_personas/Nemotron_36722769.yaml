personas:
  professional: Beatris Gilmer, a budding young engineer in training, channels their energetic, organized nature into building complex LEGO structures and solving puzzles, laying early foundations for a
    future in STEM.
  sports: Beatris Gilmer thrives on the soccer field as a forward for the Little Lions Youth Soccer Club, enjoys hip‑hop dance classes at the community center, and proudly follows the Los Angeles Dodgers,
    fitting all activities into a structured weekly schedule.
  arts: Beatris Gilmer spends free time sketching comic‑style heroes, devouring adventure series like Enid Blyton’s Secret Series and R. L. Stine’s Goosebumps mysteries, and listening to upbeat kid‑pop
    tracks from The Wiggles and Disney soundtracks, fueling a vibrant imagination.
  travel: Beatris Gilmer dreams of exploring the red rock formations of Sedona after weekend trips to Riverside Park and the municipal zoo, and has already visited the state capitol museum, with a family
    vacation to Disney World in Florida on the horizon.
  culinary: Beatris Gilmer prefers classic kid‑friendly meals such as pepperoni pizza, mac and cheese, and chicken nuggets, but also loves helping bake chocolate chip cookies and assembling fruit salads
    with strawberries, blueberries, and a drizzle of honey.
  core: Beatris Gilmer is a routine‑loving, energetic 9‑year‑old whose love for group activities, puzzles, and organized fun shapes a bright, proactive outlook that occasionally leads to forgetful snack
    choices.
background:
  cultural: Beatris was raised in a middle‑class white family in Trenton, New Jersey. Her family follows typical American traditions, celebrating holidays such as Thanksgiving, Christmas, and the Fourth
    of July with family gatherings and community events. She attends a public elementary school that emphasizes multicultural awareness, exposing her to diverse cultures through classroom projects and local
    library programs. The environment blends suburban New Jersey values of practicality and community involvement, shaping her routine‑oriented yet sociable outlook.
