  career_goals: Although still young, Beatris imagines a career that blends helping others with a clear, structured routine. She aspires to become a teacher or a pediatric nurse—roles where she can apply
    her reliability, compassion, and love for group activities to support children. She also finds the idea of working as a library assistant appealing, as it would let her share her enthusiasm for reading
    while maintaining organized environments. In the short term, she aims to excel in school, earn the "Star Student" award, and continue developing leadership skills through after‑school clubs.
