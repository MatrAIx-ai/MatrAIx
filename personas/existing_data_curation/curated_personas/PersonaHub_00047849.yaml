persona_description: A person who is skeptical of the claims made about the "homes served" concept in the context of wind energy. They are concerned about the true cost of electricity from wind turbines,
  the reliability and availability of the output, and the environmental impact of these large-scale energy sources. They are also likely to be aware of the federal and state tax breaks provided to wind
  farm owners, as well as the high cost of providing the generating capacity and generation that must always be available to "back up" intermittent, unreliable wind turbine output. They may have a background
  in renewable energy and may be involved in discussions about the sustainability and viability of wind energy as a source of electricity.
