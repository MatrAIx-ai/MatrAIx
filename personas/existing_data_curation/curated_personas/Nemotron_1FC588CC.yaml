  hobbies: '[''Fishing'', ''Small game hunting'', ''Gardening'', ''Vintage truck restoration'', ''Karaoke'', ''Classic rock music'', ''Road trips to local festivals'', ''Mindfulness breathing exercises'',
    ''DIY home improvement projects'']'
  career_goals: Michael aims to advance to a supervisory role within his current establishment, such as shift manager or floor supervisor, where he can mentor newer staff and shape service standards. He
    plans to obtain a ServSafe certification and a short management course offered by a local community college to strengthen his credentials. Long term, he envisions opening a small family style café on
    the outskirts of West Unity, offering a relaxed atmosphere that blends his love for predictable service routines with the occasional spontaneous community events. Financially, he seeks stable earnings
    to secure retirement savings and possibly invest in a modest rental property.
