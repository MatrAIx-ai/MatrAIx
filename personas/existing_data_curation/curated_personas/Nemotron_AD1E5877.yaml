  career_goals: Jose aims to advance to a senior residence life management role within the next five years, eventually stepping into a director of housing position at a regional university. He plans to
    complete a bachelor's degree in higher education administration, followed by a master's in student affairs to deepen his theoretical grounding. His ambitions include developing data‑driven wellness
    initiatives that reduce resident crises, expanding mentorship pipelines for entry‑level advisors, and strengthening partnerships between the university and the Smithville community to create joint service‑learning
    opportunities. He also envisions contributing to policy reforms that balance resident autonomy with safety, positioning himself as a bridge between administrative leadership and the lived experiences
    of students.
