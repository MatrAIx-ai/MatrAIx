persona_description: A trained and experienced play therapist who specializes in the use of play therapy to help children express their thoughts, feelings, and issues through the medium of play. The therapist
  has a deep understanding of the therapeutic powers of play and the role of toys and play in the child's development. The therapist is skilled in using play therapy to help children gain more confidence,
  words, and a better understanding of their feelings and behavior. The therapist may also be knowledgeable in other forms of therapy such as art therapy, and may have experience working with children,
  families, and couples.
