personas:
  professional: Rani Kapasi, a retired business associate turned community mentor, leverages their budgeting acumen, event‑planning savvy, and warm multi‑generational communication style to coordinate senior‑center
    workshops, cultural festivals, and soon an oral‑history project documenting the experiences of immigrant families in Baltimore County, all while embracing a relaxed, flexible approach that occasionally
    leaves paperwork slightly disorganized.
  sports: Rani Kapasi stays active through a senior‑center dance class that blends low‑impact Bollywood steps with gentle cardio, enjoys weekend walks along the Chesapeake Bay, and is an avid supporter
    of the Baltimore Ravens and the Orioles, often cheering from the community center’s viewing lounge.
  arts: Rani Kapasi participates in a multicultural book club where they discuss works such as The Nightingale and Educated, volunteers at cultural festivals performing storytelling segments, and relaxes
    at home listening to classic film scores and world‑instrumental music while crocheting intricate shawls.
  travel: Rani Kapasi dreams of visiting their ancestral hometown in Gujarat, India, after already exploring Baltimore’s Inner Harbor, a weekend retreat in the Shenandoah Valley, and a cultural tour of
    New Orleans’ French Quarter, preferring thoughtfully planned trips that blend heritage discovery with opportunities to share stories back home.
  culinary: Rani Kapasi delights in crafting fusion dishes like crab‑infused coconut curry, spiced cauliflower tacos with cumin and coriander, and homemade naan topped with local cheese, showcasing a seasoned
    palate that mixes traditional spices—turmeric, cardamom, garam masala—with Baltimore’s fresh seafood and farm‑to‑table vegetables.
  core: Rani Kapasi, a 73‑year‑old community energizer, balances curiosity with practicality, dances, gardens, and records stories with calm resilience, even if they occasionally misplace their glasses
    or forget a bill.
background:
  cultural: 'Rani was born to Indian parents who migrated to the United States in the early 1970s, settling in the Baltimore suburbs. Growing up in a bilingual household, she learned Gujarati and English
    simultaneously, absorbing the values of familial responsibility, hospitality, and reverence for education. While she embraces American customs—celebrating holidays like Thanksgiving and Fourth of July—she
    also maintains South Asian traditions such as Diwali, Holi, and the weekly practice of cooking family recipes passed down through generations. Her community involvement reflects a blend of these cultural
    threads: she helps organize multicultural festivals that showcase Indian music, dance, and cuisine alongside the diverse heritage of Pikesville. This dual cultural lens informs her worldview, fostering
    a sense of belonging both to her heritage and to her local American neighborhood.'
