  career_goals: Although retired from formal employment, Rani aims to deepen her impact as a community mentor. She plans to train younger volunteers at the local senior center, fostering leadership and
    intergenerational exchange. She envisions launching a community oral‑history project that records the experiences of South Asian immigrants in Baltimore County, preserving cultural memory for future
    generations. Rani also hopes to develop her digital photography skills to create a visual archive of local cultural events and publish a photo‑book. A personal ambition is to visit her ancestral hometown
    in Gujarat, India, and share her journey with her community through talks and workshops. To formalize her contributions, she intends to obtain a volunteer‑coordinator certification, allowing her to
    lead larger community initiatives.
