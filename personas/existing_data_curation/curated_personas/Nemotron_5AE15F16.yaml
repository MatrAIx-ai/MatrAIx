personas:
  professional: Zahidul Wortham, a part-time convenience-store associate who leverages bilingual communication and meticulous inventory tracking to keep the family shop operating smoothly, channels their
    methodical, routine-loving nature and competitive edge into an aspiring apprenticeship as an electrician, planning each shift like a project timeline.
  sports: Zahidul Wortham, a weekend soccer and cricket enthusiast, drills at the local park with the Gardena United club and joins the regional LA Cricket League, cheered on by Los Angeles Galaxy matches,
    and supplements training with regular gym sessions and early morning jogs along the Hawthorne River Trail.
  arts: Zahidul Wortham, who unwinds after a day of event planning by immersing in high-octane action films like John Wick and competitive shooters such as Valorant, also enjoys listening to iconic Bengali
    music legends like Lata Mangeshkar and modern fusion artist Shironamhin, and sketches quick doodles of game characters during breaks.
  travel: Zahidul Wortham, whose travel style mixes short, budget-friendly road trips with purposeful cultural visits, has road-tripped to Santa Barbara's coastline, explored Seattle's tech scene, and yearns
    to experience the historic streets of Kolkata while planning a future pilgrimage to Mecca for Ramadan.
  culinary: Zahidul Wortham, a confident cook of traditional fish curry (shorshe ilish) and aromatic rice (mishti pulao) for family gatherings, also experiments with spice-laden ramen and grilled tacos,
    proudly combining mustard seeds, turmeric, and fresh cilantro in every dish, yet they sometimes over-salt the chili oil when stressed.
  core: Zahidul Wortham blends a disciplined, routine-driven work ethic with a lively social pulse, juggling community leadership, competitive sports, and a love for vibrant Bengali flavors while battling
    occasional anxiety-induced over-planning.
background:
  cultural: Zahidul is a second‑generation Bangladeshi American raised in Gardena, CA. His family immigrated from Dhaka and maintains strong ties to Bengali Muslim traditions. He grew up speaking Bengali
    at home and English at school, celebrating Eid, Pohela Boishakh (Bengali New Year), and attending weekly prayers at the local mosque. The close‑knit South Asian community in his neighborhood influences
    his values of family loyalty, respect for elders, and commitment to cultural preservation while navigating life in a diverse Los Angeles environment.
