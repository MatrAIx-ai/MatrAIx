  hobbies: '[''Soccer'', ''Cricket'', ''Community Event Volunteering'', ''Youth Mentorship'', ''Cooking Bengali Cuisine'', ''Competitive Video Gaming'', ''Action Movies'', ''Jogging'', ''Gym Workouts'']'
  career_goals: Zahidul aims to secure a stable, structured career that offers clear routines and long‑term security, reducing his stress about the future. He is interested in pursuing a vocational apprenticeship
    as an electrician or HVAC technician, or joining the Los Angeles Police Department to serve his community. He plans to complete a certification within the next two years, advance to a supervisory role,
    and ultimately provide financial stability for his family while serving as a role model for younger members of his community.
