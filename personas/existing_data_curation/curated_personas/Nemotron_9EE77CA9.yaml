  hobbies: '["Visiting Art Galleries and Murals", "Street Photography", "Acoustic Guitar Playing", "Hiking in the Ozarks", "Sketching Landscapes", "Philosophy Book Club", "Youth Mentorship Volunteering"]'
  career_goals: Richard aims to blend his transportation background with his passion for community art by moving into a role that oversees passenger experience design for regional transit systems. He plans
    to complete his bachelor's degree in Urban Planning or Public Administration within the next three years, leveraging his on‑the‑ground experience to advocate for more inclusive, aesthetically pleasing
    transit environments. Long‑term, he envisions becoming a Mobility Planner or Transit Operations Manager who can integrate public art projects, improve rider accessibility, and foster partnerships between
    the transit agency and local cultural institutions, all while maintaining the flexible, people‑focused work style he values.
