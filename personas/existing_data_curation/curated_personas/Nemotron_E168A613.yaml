personas:
  professional: Joan Barcome, a diligent front‑end web developer in Manhattan, blends her clean‑code expertise in React, Vue, and accessibility standards with a pragmatic curiosity that drives her to prototype
    in TypeScript while mentoring junior teammates in Agile sprints.
  sports: Joan Barcome fuels her fitness routine by joining the Sunfire Yoga Collective in Brooklyn, cheering for the New York Knicks during basketball season, and tackling weekend hikes in the Hudson Valley,
    though she sometimes skips Thursday cardio after a late‑night bug fix.
  arts: Joan Barcome channels her love for visual storytelling into urban photography of Manhattan’s steel silhouettes, curates weekly visits to off‑beat Brooklyn galleries showcasing street artists like
    Banksy and emerging photographer Vivian Maier, and unwinds with indie cinema classics at Anthology Film Archives and playlists from Bon Iver.
  travel: Joan Barcome plots travel itineraries with meticulous spreadsheets, favoring weekend escapes to the Hudson Valley, a memorable summer stint in Reykjavik’s midnight sun, and a future wish to wander
    Kyoto’s cherry‑blossom avenues, all while balancing a modest travel budget against her goal of a future solo consultancy retreat.
  culinary: Joan Barcome delights in crafting vegetarian meals like smoky roasted cauliflower tacos with cumin‑spiced chickpeas, garlicky kale pesto pasta, and occasional spicy miso ramen, a culinary skill
    set honed through TikTok experiments but often interrupted by late‑night code debugging sessions.
  core: Joan Barcome is a curiosity‑driven front‑end developer who balances meticulous code craftsmanship with a love for inclusive design, weekend hikes, and spontaneous vinyl hunts, all while wrestling
    with a habit of over‑scheduling her free time.
background:
  cultural: Joan grew up in a middle‑class, white, Anglo‑American family in the suburbs of New York State. Her family’s heritage includes Irish and German roots, which are celebrated through seasonal traditions
    such as Thanksgiving, Fourth of July barbecues, and occasional St. Patrick’s Day gatherings. Moving to Manhattan for her web‑development career exposed her to the city’s rich cultural diversity, shaping
    her appreciation for inclusive practices and multicultural perspectives. While she identifies with mainstream American values, she actively embraces the city’s pluralism—attending cultural festivals,
    supporting LGBTQ+ initiatives, and integrating diverse user needs into her professional work.
