  career_goals: Joan aims to transition from a mid‑level web developer to a senior front‑end engineer within the next two to three years, eventually moving into a lead or technical architect role where
    she can shape product strategy and mentor junior developers. She is particularly passionate about creating inclusive digital experiences, so she plans to deepen her expertise in accessibility and universal
    design, contributing to projects that address social good—such as mental‑health platforms or community resources. Long‑term, she envisions launching her own consultancy that helps startups build sustainable,
    user‑centered web products while fostering collaborative, supportive team cultures.
