  career_goals: Willie's career ambition is to cement his reputation as a reliable technology steward while preparing the organization for a secure, future‑ready future. Over the next three to five years
    he aims to step into a senior executive position such as Chief Information Officer (CIO), where he can shape long‑term IT strategy that balances innovative solutions with the operational stability he
    values. He also plans to formalize a mentorship and apprenticeship program to increase Black representation in the tech workforce, leveraging his business expertise to create clear career pathways.
    Ultimately, Willie seeks to leave behind a legacy of well‑documented, resilient systems and a culture of accountability that endures beyond his tenure.
