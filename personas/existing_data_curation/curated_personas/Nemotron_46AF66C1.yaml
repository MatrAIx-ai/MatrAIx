personas:
  professional: Joann Beharry, a seasoned architect in North Carolina, blends advanced BIM tools like Revit and AutoCAD with hand sketching and model making, and they channel a competitive, skeptical mindset
    into sustainable, heritage‑focused projects while embracing a flexible, iterative workflow despite occasional disorganization.
  sports: Joann Beharry tackles the Falls Lake and Roanoke River State Park trails with the local ‘Tar Heel Trailblazers’ hiking club, and they cheer on the Carolina Panthers and attend Durham Bulls games
    when they can carve out time between design projects.
  arts: Joann Beharry enriches their creative palette by singing gospel and blues classics by Mahalia Jackson and B.B. King in the church choir, collecting vintage blues records, and drawing inspiration
    from the urban sketches of Edward T. Harper and the novels of Toni Morrison, which together shape their design aesthetic.
  travel: Joann Beharry favors road‑trip adventures that combine architectural pilgrimages and nature retreats, such as the Blue Ridge Parkway drive to Asheville and a historic tour of Savannah, and they
    dream of a study tour of Gaudí’s Barcelona and an eco‑retreat in Costa Rica once their boutique firm gains stability.
  culinary: Joann Beharry, an avid backyard gardener, turns home‑grown tomatoes, collard greens, and basil into contemporary Southern dishes like BBQ‑glazed pork tenderloin with heirloom tomato compote
    and lemon‑garlic collard greens, and they occasionally indulge in a low‑country boil at Raleigh’s Poole’s Diner while experimenting with smoked paprika and fresh okra in their kitchen.
  core: Joann Beharry is a competitively curious, flexible architect who balances sustainable heritage design with a garden‑fed Southern kitchen, a love of gospel blues, and a relaxed, sometimes disorganized
    approach to life.
background:
  cultural: Joann is a second‑generation African‑American resident of Edgecombe County, with deep family roots in Rocky Mount that stretch back to the Great Migration era. Her upbringing was shaped by the
    close‑knit community of the local Black church, where storytelling, gospel music, and a strong sense of mutual support were daily fixtures. These cultural influences fostered her resilience and appreciation
    for preserving collective memory, which she channels into her design work by emphasizing heritage preservation and community‑focused spaces. Joann’s Southern Black cultural identity informs her culinary
    passions, her participation in community volunteerism, and her commitment to mentoring the next generation of Black professionals in architecture.
attributes:
  skills: '["AutoCAD", "Revit (BIM)", "SketchUp", "Hand drafting", "Physical model making", "North Carolina building code compliance", "Sustainable design", "Historic preservation", "Cost estimating", "Client
    communication", "Project coordination", "Iterative design workflow"]'
  hobbies: '["Backyard gardening", "Southern cooking with contemporary twists", "Reading architectural and African‑American literature", "Sketching urban landscapes", "Hiking local state parks", "Volunteer
    tutoring in drafting", "Singing in church choir", "Attending blues and jazz performances"]'
  career_goals: Joann aims to obtain her North Carolina professional architect license within the next two years and to become a LEED Accredited Professional. She envisions launching a boutique architecture
    firm in Rocky Mount that specializes in culturally responsive residential and community projects, particularly those that preserve African‑American historic sites and promote sustainable living. Mentorship
    is central to her ambition; she plans to create a scholarship program and lead workshops for aspiring Black architects in the region. Long‑term, Joann hopes to speak at national design conferences about
    the intersection of heritage preservation and modern design, and to achieve a healthy balance between her flexible work style and personal well‑being.
