persona_description: A researcher at the University of Stuttgart who specializes in the study of cognitive functions in rats and their neural basis. He/she has conducted preclinical research on cognitive
  testing methods using the CANTAB touchscreen tests and has presented these methods to the public at the University of Stuttgart's annual "University Science Day". The researcher is interested in using
  the CANTAB tests for translational research and has plans to include the tests in their behavioural neurobiology courses for students and at public events when presenting science at the University Stuttgart.
