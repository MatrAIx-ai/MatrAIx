personas:
  professional: Kim Miller, a 28‑year‑old general office clerk in Arlington, leverages rigorous clerical expertise and a self‑taught Canva design talent to inject artistic brainstorming into routine paperwork,
    aiming to pivot into a marketing assistant role that marries organization with creativity.
  sports: Kim Miller stays active by attending yoga classes at a downtown studio, jogging with the Arlington Running Club on Saturday mornings, cheering on the Dallas Cowboys on football Sundays and the
    Texas Rangers during spring baseball, while occasionally catching a Mavericks game at the local sports bar.
  arts: Kim Miller immerses themselves in the Arlington Arts Center’s rotating mixed‑media exhibits, curates collage projects inspired by the bold colors of Yayoi Kusama, the street‑wise edge of Banksy,
    and the lyrical depth of Tame Impala, while feeding their speculative‑fiction appetite with authors like N.K. Jemisin during a weekly book club.
  travel: Kim Miller favors spontaneous road‑trips, often packing a cooler of brisket and a sketchbook for weekend escapes to Texas towns like Fredericksburg, Waco, and Austin, and occasionally ventures
    farther to Santa Fe or New Orleans, balancing a modest travel budget with a love for off‑the‑beaten‑path cultural stops.
  culinary: Kim Miller savors the smoky richness of Texas brisket seasoned with a Kansas City rub and loves experimenting with brisket tacos garnished with pickled red onions, cilantro, and avocado, while
    also cooking simple‑but‑fresh meals like basil‑pesto chicken pasta and occasionally baking cinnamon‑sugar biscuits.
  core: Kim Miller is a creatively curious, anxiety‑prone 28‑year‑old who flips between spontaneous road‑trip adventures and meticulous office checklists, thriving on art‑filled afternoons but habitually
    procrastinating on deadlines, all while juggling coffee‑fuelled brainstorming sessions and nightly yoga.
background:
  cultural: Kim grew up in Arlington, a suburban city in Tarrant County, Texas, within a middle‑class white family whose roots trace back to the Midwest and the Deep South. Her upbringing blended traditional
    Southern hospitality—family barbecues, high school football Saturdays, and a strong sense of community—with the multicultural vibe of the Dallas‑Fort Worth metroplex, where she was exposed to diverse
    music, cuisine, and artistic events. Although she did not earn a high‑school diploma, her family emphasized a love of learning, encouraging her curiosity about art, history, and new ideas. The regional
    culture’s emphasis on self‑reliance and flexibility resonates with her spontaneous nature, while the area’s growing arts scene has nurtured her appreciation for unconventional creative expression.
attributes:
  skills: '[''Data entry'', ''Microsoft Office Suite (Word, Excel, Outlook)'', ''Customer service and conflict resolution'', ''Basic graphic design (Canva)'', ''Simple video editing'', ''Creative brainstorming'',
