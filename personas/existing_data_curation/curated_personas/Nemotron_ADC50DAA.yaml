  hobbies: '[''Visiting art galleries and museums'', ''Mixed-media collage and sketching'', ''Spontaneous road trips and travel photography'', ''Yoga and mindfulness meditation'', ''Reflective journaling'',
    ''Reading speculative fiction (book club)'', ''Volunteer work at community art workshops'', ''Experimenting with cooking eclectic recipes'']'
  career_goals: Kim wants to move from a purely administrative role into a position that blends her organizational experience with her creative interests, such as a marketing assistant, community outreach
    coordinator, or gallery administrator. In the next 12 to 18 months she plans to enroll in a community‑college associate program in marketing or communications while completing online courses in digital
    media and project management to strengthen her ability to meet deadlines. Long‑term, she aspires to lead a small team in a nonprofit arts organization, using her curiosity about new ideas to develop
    innovative outreach programs and public events. She also hopes to build a personal portfolio of graphic design and social‑media projects that could support freelance work alongside her full‑time job.
