  hobbies: '[''Adult Basketball League'', ''Hudson Valley Hiking'', ''Reading Historical Biographies'', ''Mentoring Youth Arts Program'', ''Italian Cooking'', ''Photography'']'
  career_goals: Van aspires to advance from his current supervisory role to a store manager position within the next two years, with a long‑term goal of becoming a district manager overseeing multiple locations
    in the New York metropolitan area. He plans to augment his humanities degree with an MBA focused on retail operations and supply‑chain management to broaden his strategic perspective. Additionally,
    Van is interested in contributing to corporate training initiatives, leveraging his talent for staff development, and eventually launching his own boutique concept that blends curated fashion with community‑focused
    events.
