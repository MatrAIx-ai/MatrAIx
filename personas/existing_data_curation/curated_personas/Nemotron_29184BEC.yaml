  hobbies: '["Journaling for stress management", "Listening to R&B, neo‑soul, and hip‑hop", "Cooking traditional soul‑food and experimenting with new recipes", "Participating in church youth group activities",
    "Sketching and digital art creation", "Playing strategy video games (e.g., Civilization)", "Practicing yoga and guided meditation", "Volunteering at the community food pantry", "Organizing youth basketball
    tournaments", "Learning basic coding through online platforms"]'
  career_goals: Prasanti aims to complete her GED within the next year, providing a solid foundation for further education. She plans to enroll in a community college program that offers a Certified Nursing
    Assistant (CNA) certificate, drawn to the structured environment and clear career pathway in healthcare. In the short term, she hopes to secure a part‑time position in a medical office or senior care
    facility to gain hands‑on experience and build professional reliability. Long‑term, Prasanti aspires to earn a Bachelor’s degree in Public Health, focusing on community outreach and preventive care
    for underserved populations, particularly within Black neighborhoods. She also envisions one day mentoring at‑risk youth, using her own journey to inspire others to pursue stable, purpose‑driven careers.
