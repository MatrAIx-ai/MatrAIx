personas:
  professional: Prasanti Canty, an aspiring Certified Nursing Assistant, blends meticulous time‑management, solid basic computer skills, and a compassionate yet assertive communication style to thrive in
    volunteer health settings while juggling a rigorous study schedule and community commitments.
  sports: Prasanti Canty is a dedicated organizer and coach for a local youth basketball club, regularly volunteers at community tournaments, and passionately follows the Chicago Bulls, using weekly pickup
    games as a structured outlet for fitness.
  arts: Prasanti Canty merges digital illustration with soulful music, designing event graphics while curating playlists featuring H.E.R., Leon Bridges, and Kendrick Lamar, and occasionally attends live
    R&B performances when tickets are affordable.
  travel: Prasanti Canty enjoys low‑key weekend road trips to historic towns like Savannah and Nashville, plans each itinerary with meticulous spreadsheets, and dreams of a study‑abroad public health outreach
    in Ghana to experience community health work firsthand.
  culinary: Prasanti Canty experiments with comforting soul‑food dishes such as collard greens, sweet‑potato casserole, and cornbread, seasoning with smoked paprika and hot sauce while perfecting friends’
    favorite mac‑and‑cheese and documenting recipes in her journal.
  core: Prasanti Canty is a detail‑oriented teen who juggles disciplined study, community health aspirations, creative art, and a passion for soulful cooking, all while wrestling with occasional anxiety
    and a habit of over‑scheduling.
background:
  cultural: Prasanti is an African American teenager raised in a close‑knit family that values resilience, community, and cultural heritage. Growing up in the suburban setting of Collegeville, PA, she navigates
    a predominantly white environment while staying rooted in Black cultural traditions. Her family emphasizes the importance of church, music, and food as pillars of identity; Sunday gospel services, family
    gatherings featuring collard greens and cornbread, and spirited discussions about Black history are regular parts of her life. She draws inspiration from Black artists, activists, and community leaders
    who have championed education and social uplift. These influences shape her perspective on the importance of giving back, especially to underserved Black neighborhoods. While she is aware of the challenges
    of being a minority in her community, she leverages her cultural background as a source of strength, seeking to blend her personal ambitions with a commitment to community empowerment.
