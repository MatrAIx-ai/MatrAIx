personas:
  professional: Shirley Harris is a community‑focused organizer with strong budgeting and event‑coordination skills, whose love for structure and sociable energy drives her to meticulously plan outreach
    programs while flexibly adapting to the emotional needs of low‑income families.
  sports: Shirley Harris keeps active by attending line‑dancing classes at the Kent County community center, joining a local senior walking club for sunrise hikes, and cheering on the Baltimore Ravens in
    the fall while supporting the Maryland Terrapins women's soccer team in the spring, all within a structured weekly fitness routine.
  arts: Shirley Harris finds artistic solace in her church choir’s renditions of gospel classics by Mahalia Jackson and contemporary soul by Alicia Keys, while her evenings are often spent knitting scarves
    inspired by Georgia O'Keeffe’s color palettes and shaping pottery bowls that echo the earthy textures of Southern folk art.
  travel: Shirley Harris prefers meticulously planned weekend getaways that balance relaxation with culinary discovery, having already explored Savannah’s historic squares and the vibrant food markets of
    New Orleans, while dreaming of a week‑long cooking immersion in Bologna, Italy, whenever her modest savings allow.
  culinary: Shirley Harris boasts a modest‑to‑advanced kitchen skill set that shines when she perfects soul‑food staples like crispy fried chicken, buttery collard greens seasoned with smoked turkey, and
    sweet potato pie, often finishing them with garden‑fresh thyme, garlic, and a dash of hot sauce for that signature kick.
  core: Shirley Harris is a structured yet sociable 45‑year‑old who channels anxiety into community service, but secretly hoards bulk pantry staples and can’t resist a late‑night line‑dance replay on YouTube.
background:
  cultural: Shirley identifies as an African‑American with family roots that trace back to the rural South, part of the Great Migration that settled in Delaware’s Kent County. Raised in a close‑knit church
    community, she values traditions such as soul‑food cooking, gospel music, and celebrations of Juneteenth and Kwanzaa. Her cultural heritage deeply influences her commitment to community service, intergenerational
    support, and preserving the rich traditions of Black families in Dover.
attributes:
  skills: '[''Event Planning'', ''Community Outreach'', ''Budget Management'', ''Microsoft Office'', ''Google Suite'', ''Interpersonal Communication'', ''Conflict Resolution'', ''Mentorship'', ''Caretaking'',
