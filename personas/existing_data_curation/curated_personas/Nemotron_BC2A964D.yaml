  hobbies: '[''Choir Singing'', ''Line Dancing'', ''Cooking Soul Food'', ''Urban Gardening'', ''Reading Self‑Help Books'', ''Volunteering at Food Pantry'', ''Knitting'', ''Pottery'']'
  career_goals: Shirley aims to re‑enter the workforce within the next year by completing an associate’s degree in Business Administration at a community college nearby. She envisions a role as a community
    outreach coordinator for a non‑profit serving low‑income families in Kent County, where she can blend her organizational strengths, sociable nature, and passion for helping others. In the longer term,
    she hopes to launch a small home‑based catering business showcasing traditional soul food, thereby combining her culinary talent with entrepreneurial ambition.
