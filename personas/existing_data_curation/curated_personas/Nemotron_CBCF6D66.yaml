personas:
  professional: Ozge Bobko, a two‑year‑old who already treats the living‑room play area like a tiny office, sorting blocks by color and size with methodical precision, mirroring adult routines and showing
    an early knack for organized, predictable tasks, and they often insist on finishing each tower before moving on.
  sports: Ozge Bobko, a two‑year‑old who loves the local community park’s tiny swing set and proudly wears a miniature Alabama Crimson Tide jersey while toddling on her tricycle, engages in daily outdoor
    play that satisfies her need for structured activity and occasional bursts of competitive spirit, and they giggle loudly whenever they manage to spin twice on the swing.
  arts: Ozge Bobko, a two‑year‑old who sings along to ‘The Wheels on the Bus’ and loves the bright crayons of artist Eric Carle’s ‘The Very Hungry Caterpillar’, while her parents’ Sunday gospel hymns from
    the local church choir echo in the house, shape her creative expression and leisure, and they often present their drawings to family members with a shy smile.
  travel: Ozge Bobko, a two‑year‑old who enjoys long car rides to Grandma’s farm in the countryside and to the annual Birmingham State Fair, and who clutches a picture of Disney World’s castle in anticipation
    of her first big vacation, reflects a travel style that balances familiar, routine‑filled trips with a bright‑eyed longing for adventure, and they chatter excitedly about the next stop as soon as the
    car starts moving.
  culinary: Ozge Bobko, a two‑year‑old who prefers buttery biscuits with honey, tender chicken nuggets coated in cornmeal, and soft apple slices dipped in peanut butter, often insists on helping stir the
    mashed potatoes with a plastic spoon, yet throws a tantrum when faced with unfamiliar textures like broccoli, and they proudly proclaim that the biscuits are the best ever after each bite.
  core: Ozge Bobko, a two‑year‑old whose love for tidy toy rows, ritualistic snack times, and clingy comfort in familiar faces mixes with sudden bursts of anxiety, paints a portrait of a tiny but fiercely
    organized soul navigating a world of predictable routines and occasional emotional storms, and they often signal their distress with a high‑pitched squeal.
background:
  cultural: Ozge is raised in a white, Southern‑American family in Hazel Green, Alabama. Her upbringing reflects rural Madison County values such as close family ties, frequent church attendance, participation
    in local fairs and community gatherings, and an emphasis on Southern hospitality and traditions. The family’s routine‑oriented lifestyle, love of outdoor play, and polite, community‑focused demeanor
    shape her cultural experience.
attributes:
  skills: '[''Following daily routines'', ''Sorting shapes and colors'', ''Counting up to ten'', ''Imitating block patterns'', ''Expressing basic emotions through words'']'
  hobbies: '[''Building block towers'', ''Coloring with crayons'', ''Singing nursery rhymes'', ''Playing in the sandbox'', ''Pretend caring for stuffed animals'']'
  career_goals: Even at two years old, Ozge enjoys role‑playing as a caregiver, often "helping" her stuffed animals and mimicking her mother's caring tasks. She shows an early fascination with nurturing
    roles, hinting at future ambitions such as becoming a teacher, a veterinarian, or a community helper who looks after others.
