persona_description: A higher education institution that prioritizes the use of digital assessment in their learning and assessment practices. They are committed to offering authentic learning and assessment
  experiences to their students and believe that digital assessment can help bridge the gap between the use of IT on campus and at work. They are interested in exploring how digital assessment can be implemented
  in various academic and administrative areas, and how it can contribute to an organisationally led rather than an individually led digital transformation. They are also interested in learning more about
  how e-assessment can provide new opportunities for authors of tests in all paths of education and how it can help them mirror the students' lives and world better.
