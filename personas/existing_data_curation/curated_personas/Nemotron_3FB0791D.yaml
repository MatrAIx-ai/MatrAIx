personas:
  professional: Blanca Moralespagan is a high-school junior known for meticulously planning school projects and community events, leveraging bilingual communication and budding Python skills to prototype
    sustainable neighborhood designs, and they aspire to become a licensed urban planner who bridges city officials with Spanish-speaking residents.
  sports: Blanca Moralespagan is a dedicated member of her high-school volleyball team and the local Anaheim Volleyball Club, supplements training with folkloric dance sessions for flexibility, follows
    the Los Angeles Dodgers for baseball, the LA Lakers for basketball, and streams LAFC matches for soccer, maintaining a disciplined fitness routine that balances team practices with personal conditioning,
    and they always finish each workout with a quick stretch.
  arts: Blanca Moralespagan expresses creativity through vibrant folkloric dance performances, devours sci-fi and fantasy novels such as N.K. Jemisin's *The Fifth Season* and Brandon Sanderson's *Mistborn*
    series, enjoys listening to Mariachi Vargas de Tecalitlan and Billie Eilish's *Happier Than Ever*, and they occasionally stream video games like *The Legend of Zelda* to showcase storytelling appreciation.
  travel: Blanca Moralespagan prefers organized weekend road trips, often traveling with family to their hometown in Guanajuato for Dia de los Muertos celebrations, and exploring nearby California gems
    such as Joshua Tree and Yosemite, while they dream of a future study abroad semester in Mexico City to combine cultural immersion with urban planning research.
  culinary: Blanca Moralespagan enjoys preparing homemade tamales with masa, pork, and ancho chilies, mastering mole sauce using dried chiles and Mexican chocolate, and crafting fresh guacamole with ripe
    avocados, cilantro, and lime, displaying a solid cooking skill level that blends tradition with occasional experimental twists like quinoa-filled tacos, and they often finish the meal with a bowl of
    pozole for extra flavor.
  core: Blanca Moralespagan is a meticulously organized, bilingual teen who balances a passion for sustainable urban design and folkloric dance with late-night gaming marathons, often juggling school, community
    projects, and a sneaky love for spicy snacks, and they never miss a chance to volunteer at the local garden.
background:
  cultural: Blanca was raised in a Mexican‑American household in Anaheim, where family traditions such as Día de los Muertos, quinceañera celebrations, and Sunday tamal‑making meals are central. Fluent
    in both Spanish and English, she balances the rich cultural heritage of her parents with the diversity of Southern California. Her community ties include participation in local cultural festivals, a
    youth group at a nearby Catholic church, and friendships across multiple ethnic backgrounds.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Organizational and time‑management'', ''Project planning and execution'', ''Basic computer literacy (Microsoft Office, Python)'', ''Traditional
    Mexican cooking'', ''Peer tutoring and informal leadership'']'
  hobbies: '[''Folkloric Mexican dance'', ''Volleyball'', ''Reading sci‑fi and fantasy novels'', ''Cooking traditional Mexican dishes'', ''Building robotics kits'', ''Community gardening'']'
  career_goals: Blanca aims to finish high school with honors and earn a scholarship to attend a community college where she will study civil engineering and urban planning. Her long‑term ambition is to
    become a licensed urban planner who designs sustainable, inclusive neighborhoods in Orange County, especially focusing on projects that improve infrastructure for under‑served Mexican‑American communities.
    She also hopes to use her bilingual skills to serve as a liaison between city officials and Spanish‑speaking residents, fostering greater civic engagement.
