persona_description: A statistician or researcher who is responsible for conducting and analyzing population censuses. They are knowledgeable in the methodology, techniques and applications of collecting
  and interpreting census data. They are likely to have experience in conducting extensive surveys, analyzing large datasets, and using statistical software to extract valuable insights from census results.
  They are also likely to have a strong understanding of the social, economic and demographic factors that influence population growth and change, and how these factors can be accurately measured and represented
  through census data. They are committed to providing accurate and reliable statistical information to policymakers and other stakeholders, and are dedicated to improving the quality and accuracy of census
  data over time.
