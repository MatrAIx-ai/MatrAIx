  professional: Hung Heu, a budding game developer in primary school, they craft Scratch animations and lead the class coding club, merging a love for structured LEGO building with a practical, hands‑on
    approach to problem solving while embracing the flexibility of spontaneous play.
  sports: Hung Heu, an energetic forward for the Eastside Elementary Thunderbolts junior soccer team, they practice after school at the community park, cheer for the professional league side Seattle Sounders
    FC, and mix in casual basketball during winter, approaching fitness with a balance of structured drills and spontaneous street games.
  arts: Hung Heu, who sings in the school choir, acts in drama productions, devours graphic novels like My Hero Academia, admires the animation style of Pixar and the pop energy of BTS, they draw inspiration
    from these creators to fuel their own Scratch storytelling, blending structured performance with a carefree creative flair.
  travel: Hung Heu, who loves weekend excursions to the nearby botanical garden, a summer camp in the mountains, and occasional family trips to Hanoi, they plan trips with a rough doodle map, preferring
    spontaneous park adventures over strict itineraries while balancing school schedules and a modest family travel budget.
  culinary: Hung Heu, who enjoys cooking simple Lunar New Year dishes like pork dumplings and spring rolls with cabbage and carrots, they also love making peanut butter sandwiches and experimenting with
    instant ramen topped with kimchi, showcasing a playful yet practical approach to cooking with a short attention span for detailed recipes.
  core: Hung Heu blends a love for structured LEGO builds with a free‑spirited knack for spontaneous soccer games, juggling a practical savings habit and occasional impulsive splurges, while navigating
    mild allergies with a relaxed mindset and a contagious, collaborative energy.
background:
