  career_goals: Gregory dreams of a future where he can blend art and technology. He hopes to become an interactive media designer or video game developer who creates immersive experiences that spark imagination.
    He is also fascinated by engineering and envisions working on robotics projects that help people. In the long term, he aspires to contribute to museums or science centers as a curator or educator, sharing
    his love for creativity and discovery with others. His current ambition is to join a school robotics club and continue developing his coding and design skills.
