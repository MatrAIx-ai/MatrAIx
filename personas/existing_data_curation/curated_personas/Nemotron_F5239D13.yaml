personas:
  professional: Gregory Tregle is a budding junior architect in the making, channeling a methodical, organized mind into sketching elaborate cityscapes and building complex LEGO structures, while their
    curiosity fuels a love for experimenting with design concepts in Minecraft and art workshops.
  sports: Gregory Tregle dabbles in after‑school soccer with the Oakland United Soccer Club and swims at the Lake Merritt community pool, while cheering for the Oakland Athletics, the Golden State Warriors,
    and idolizing Stephen Curry for his precision shooting.
  arts: Gregory Tregle, inspired by the whimsical illustrations of Dr. Seuss, the bold lines of comic artist Jim Lee, and the melodic works of Ludwig van Beethoven, especially Für Elise, spends weekends
    sketching original characters, assembling LEGO models, and tinkering on the piano to develop a unique artistic voice.
  travel: Gregory Tregle prefers family‑oriented weekend road trips, having already trekked through Muir Woods and the bustling Pier 39 in San Francisco, and now longs to experience the cherry blossoms
    of Kyoto and the medieval castles of Edinburgh when school breaks allow, all while carefully mapping out a budget with parents.
  culinary: Gregory Tregle enjoys constructing perfectly layered cheese pizza with a splash of oregano, whipping up banana‑spinach smoothies for snack time, and mastering the art of cereal‑topped parfaits,
    though they stubbornly resist trying broccoli, often pleading for extra cheese.
  core: Gregory Tregle is a methodical mini‑designer whose boundless curiosity drives daily sketches, LEGO experiments, and piano riffs, even as they occasionally forget to brush teeth and hoard extra cheese
    on their pizza.
background:
  cultural: Gregory grows up in a middle‑class white family in Oakland, California, a city known for its cultural diversity and vibrant arts scene. His parents emphasize curiosity, education, and creative
    expression, encouraging him to explore museums, community art events like the First Fridays art walk, and local workshops. While celebrating traditional American holidays such as Thanksgiving and Fourth
    of July, Gregory is also exposed to the multicultural fabric of the Bay Area, attending neighborhood festivals that showcase music, food, and traditions from various cultures. This blend of supportive
    family values and the inclusive, progressive environment of Oakland shapes his open‑minded outlook and appreciation for varied experiences.
