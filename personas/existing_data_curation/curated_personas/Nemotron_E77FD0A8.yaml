  career_goals: Dayna dreams of a career that combines her love for order with a chance to help others. She is fascinated by teachers who create structured, welcoming classrooms and imagines herself leading
    a group of young learners one day. Her compassion for animals fuels an ambition to become a veterinarian or veterinary technician, where she can apply a methodical approach to caring for pets. She also
    shows interest in library work, attracted by the organized world of books and the opportunity to assist community members in finding information.
