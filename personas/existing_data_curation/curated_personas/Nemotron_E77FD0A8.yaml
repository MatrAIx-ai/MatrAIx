personas:
  professional: Dayna Esparza is a budding junior architect who loves constructing intricate LEGO models, applying their methodical planning skills to translate step‑by‑step instructions into three‑dimensional
    designs, while their natural need for order and worry‑free predictability drives them to meticulously document each build in their journal.
  sports: Dayna Esparza enjoys the structured rhythm of youth swim lessons at the community pool, follows the local high school basketball team—the Riverdale Raptors—and practices soccer on Saturdays with
    the Crescent City Cubs youth club, preferring activities that have clear drills and progress milestones.
  arts: Dayna Esparza delights in reading the Magic Tree House series and listening to the whimsical piano compositions of Yiruma, while also sketching scenes from their favorite picture book Where the
    Wild Things Are during quiet afternoons, finding the predictable patterns in music and illustration soothing.
  travel: Dayna Esparza loves family trips to the nearby national park for nature walks on well‑marked trails, has explored the historic forts of Colonial Williamsburg, and dreams of visiting the orderly
    gardens of Keukenhof in the Netherlands, planning each outing with a checklist of must‑see spots.
  culinary: Dayna Esparza enjoys helping bake chocolate chip cookies and simple vanilla cupcakes, measuring flour, sugar, and butter with a kid‑friendly kitchen scale, and favors snack meals like grilled
    cheese sandwiches with cheddar and apple slices, finding comfort in the exactness of recipes.
  core: Dayna Esparza is a meticulous nine‑year‑old who finds calm in step‑by‑step LEGO builds, carefully tracks every allowance cent, logs allergies in a journal, and can’t resist the occasional sticker‑splurge,
    all while navigating a world that often feels too unpredictable.
background:
  cultural: Dayna grew up in Piedmont, Alabama, a small town in Cleburne County where Southern hospitality and close‑knit community values are prominent. Her family often participates in local church activities,
    community fairs, and school events, reinforcing a sense of belonging and shared traditions. Regional customs such as family meals featuring fried chicken, biscuits, and sweet tea, as well as outdoor
    pursuits like fishing and hiking in the nearby hills, shape her everyday experiences. The rural environment fosters a practical, self‑reliant outlook, while the emphasis on politeness, punctuality,
    and mutual support influences her cooperative yet assertive personality.
