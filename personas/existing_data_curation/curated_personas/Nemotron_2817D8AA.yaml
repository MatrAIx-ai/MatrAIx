  hobbies: '[''Ice Fishing'', ''Vegetable Gardening'', ''Woodworking'', ''Custom PC Building'', ''Mindfulness Meditation'', ''Yoga'', ''Bowling'', ''Volunteer Tech Mentoring'']'
  career_goals: Allen aspires to move into a senior leadership role such as IT Director or Chief Information Officer within the next five years. He plans to obtain the CISSP certification and deepen his
    expertise in cloud migration to modernize legacy systems used by local utilities and government agencies. He also wants to establish a formal mentorship program for junior technicians, promoting the
    disciplined, documentation-first culture he values. Financially, he aims to secure a stable retirement while maintaining a consulting side-business that lets him apply his troubleshooting skills on
    a project-by-project basis. Additionally, he hopes to develop personal resilience through stress-management training to reduce the anxiety that can interfere with his performance.
