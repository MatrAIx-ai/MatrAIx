  career_goals: Leon aims to earn his Certified Public Accountant (CPA) license within the next three years, leveraging his practical experience to move into a senior accountant role. He seeks a supervisory
    position where he can lead a small team, improve workflow efficiency, and implement modern accounting technologies. Long term, he envisions opening his own bookkeeping consultancy serving small businesses
    in the Baton Rouge area and contributing to community financial-literacy workshops. He also hopes to be recognized as a trusted advisor on Louisiana tax matters.
