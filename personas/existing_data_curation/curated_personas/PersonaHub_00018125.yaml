persona_description: A researcher and scientist who specializes in the field of immunology, particularly in the study of the relationship between childhood immunization and the development of diabetes mellitus.
  Classen is the director of American based Classen Immuno Therapies in Baltimore, Maryland. His research team has published several papers demonstrating the association between vaccines given six weeks
  after birth and the development of insulin dependent diabetes in humans and rodents. He is also involved in epidemiological studies to substantiate observations about the Hib vaccine, which was introduced
  in New Zealand in 1993.
