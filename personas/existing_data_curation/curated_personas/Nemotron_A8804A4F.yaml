  career_goals: Khalib aims to secure a tenured senior lecturer position within the next five years, leveraging his experience to lead the development of an interdisciplinary program that bridges academic
    theory with workforce readiness. He aspires to establish a Center for Community‑Engaged Learning at his institution, create a suite of online courses that expand access for non‑traditional students,
    and publish research on equity in adult education. Ultimately, he envisions stepping into an administrative role such as department chair, where he can shape policy and advocate for greater representation
    of Black scholars in higher education.
