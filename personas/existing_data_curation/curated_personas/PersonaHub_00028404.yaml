persona_description: A healthcare professional with a focus on orthopedic surgery and joint replacement, who is concerned about the increasing prevalence of antibiotic-resistant infections associated with
  implanted medical devices. They are particularly interested in the use of antibiotics as a preventative measure for infection during joint replacement procedures and the importance of pre-clinical and
  clinical research in addressing this issue. They are aware of the potential consequences of failing to treat infections, including increased morbidity, mortality, and prolonged hospital stays, and are
  committed to finding effective solutions to this problem.
