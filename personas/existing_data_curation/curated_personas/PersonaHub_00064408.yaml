persona_description: A person interested in the classification, names, size, weight, and age of fish species, particularly those from Europe and introduced in the Guadiana drainage. They are also interested
  in the IUCN Red List status, threats to humans, and fisheries. They are familiar with the diagnostic features of the species, including the possession of certain characters such as the lateral line, snout
  shape, and ventral profile. They are also interested in the estimates of some properties based on models, including the phylogenetic diversity index and the minimum population doubling time. They are
  interested in the research interests of a mathematics professor, particularly the concepts and theorems related to subgroups and isomorphisms, and their research interests include the structure of finite
  groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
