persona_description: A researcher and game designer who is passionate about educating people about the design and operation of power grids. They are currently working on a video game called "Griddle" that
  aims to help people understand the historical operation of traditional power systems and the contemporary changes brought about by new technology and environmental awareness. The researcher has a unique
  experience at ERG, where they were fortunate to have a supportive advisor and the freedom to seek additional advising outside the department for the aspects that are outside ERG's core strengths. The
  researcher is also grateful to have ERG's strong reputation to lean on when seeking additional advisors in other departments. The researcher is interested in learning more about how computer modeling
  can answer important questions about power systems and feels that they have some useful skills to bring to the table.
