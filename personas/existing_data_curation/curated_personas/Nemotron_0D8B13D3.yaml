  career_goals: Fabio dreams of growing up to be someone who creates beautiful pictures and helps others learn. He imagines becoming an artist who paints bright scenes or a teacher who shares stories with
    young kids. He also likes the idea of being a community helper, like a firefighter or a park guide, because he enjoys keeping people safe and happy. These aspirations reflect his love of art, his desire
    to support others, and his curiosity about the world.
