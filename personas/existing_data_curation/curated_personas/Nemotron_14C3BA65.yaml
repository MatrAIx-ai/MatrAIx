  hobbies: '[''Fishing'', ''Hiking'', ''Motorcycle Restoration'', ''Volunteer Work (Food Bank)'', ''Acoustic Guitar'', ''Watching Baseball'', ''Reading Practical Non-Fiction'', ''Scenic Road Trips'', ''Participating
    in County Fairs'']'
  career_goals: Jonathan aims to transition from front‑line driving into a supervisory logistics role within the next five years, targeting positions such as Fleet Manager or Regional Logistics Coordinator.
    He plans to obtain advanced certifications in hazardous‑materials handling and safety training so he can mentor new drivers and improve fleet safety standards. Long‑term, he dreams of launching his
    own small‑scale trucking operation that emphasizes reliable service, driver well‑being, and community partnerships, reflecting his desire to help others and maintain harmonious working relationships.
