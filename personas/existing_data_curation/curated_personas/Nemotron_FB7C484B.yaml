  hobbies: '[''Crayon drawing'', ''Block building'', ''Listening to picture‑book stories'', ''Dancing to children’s music'', ''Backyard nature exploration'', ''Leaf collecting'', ''Rhythmic clapping games'',
    ''Simple shape puzzles'']'
  career_goals: Although still very young, Pamela loves to talk about 'painting big pictures' and 'exploring the world'. She dreams of one day becoming an artist who creates vivid, imaginative drawings,
    and also imagines herself as a nature explorer who discovers new things. Her competitive streak shows in wanting to be the best at building the highest block tower. She aspires to share stories and
    ideas, hinting at future ambitions as a storyteller or teacher who can inspire other curious minds.
