  skills: '[''Digital illustration'', ''Basic video editing'', ''Social media content creation'', ''Public speaking'', ''Event planning'', ''Critical analysis'', ''Strategic gaming'', ''Adaptable organization'']'
  hobbies: '[''Sketching and digital illustration'', ''Playing guitar'', ''Attending live music shows'', ''Debate club'', ''Competitive video gaming'', ''Skateboarding'', ''Exploring street art'', ''Volunteering
    at community art events'']'
  career_goals: Maurice aims to turn his artistic passion into a career by attending a community-college program in graphic design or multimedia arts and eventually working as a creative director for a
    boutique agency in Austin. In the short term, he plans to grow his personal YouTube and Instagram channels into a recognizable brand that showcases his sketches, short films, and behind-the-scenes event
    coverage. He also dreams of launching a youth-focused art collective that hosts workshops and exhibitions, giving other teens a platform to experiment with unconventional ideas. His competitive nature
    drives him to seek recognition through art contests and local entrepreneurship awards.
