  hobbies: '[''watercolor painting'', ''sketching Alaskan scenery'', ''quilting and blanket making'', ''folk‑music singing'', ''community theater'', ''group hiking and birdwatching'', ''lake fishing'',
    ''cooking and sharing meals'', ''volunteering at the village library'', ''story‑telling evenings'']'
  career_goals: Evelyn aims to deepen her technical expertise by obtaining formal certifications in electrical work and renewable‑energy systems, allowing her to lead community projects that transition
    the village to more sustainable power sources. She is passionate about mentoring younger residents—especially women—who are interested in trade skills, and hopes to develop a hands‑on apprenticeship
    program that blends practical training with community values. In the longer term, Evelyn envisions a small, locally owned maintenance cooperative that would provide reliable services while fostering
    economic resilience for Chignik Lake.
