personas:
  professional: Benson Hatch is a budding model engineer who spends weekends meticulously assembling Tamiya airplane and car kits, applying the same strategic thinking he uses in chess and video games while
    dreaming of one day designing functional prototypes for local community projects.
  sports: Benson Hatch plays on the Hampton Hoops youth basketball league, regularly cheers for the Atlanta Braves and the local high school Bulldogs football team at the county fair, and balances competitive
    drills with structured practice, embodying a love for team sports that mirrors their organized mindset.
  arts: Benson Hatch enjoys fine‑tuning model kits with paint brushes, listens to classic Southern storytelling songs by Chris Stapleton while working, and visits the community theater to watch productions
    of classic tales, allowing artistic detail and narrative appreciation to shape their leisure time.
  travel: Benson Hatch prefers family road trips that follow a clear itinerary, having visited the Georgia Aquarium in Atlanta and the historic squares of Savannah, while dreaming of a future camping excursion
    in the Great Smoky Mountains, all planned around school breaks and limited allowance.
  culinary: Benson Hatch helps prepare simple Southern dishes like fried chicken, mac and cheese, and collard greens, loves to pick ripe tomatoes from the family garden for fresh salads, and enjoys making
    lemonade with a splash of mint, showing a developing kitchen skill set anchored in home‑grown ingredients.
  core: Benson Hatch is a methodical 12‑year‑old who blends competitive model‑building with a steadfast routine, yet often forgets to floss and can be skeptical of new ideas.
background:
  cultural: Benson was raised in the close‑knit, small‑town environment of Hampton, Georgia, where Southern values of family, community, and tradition are prominent. His family regularly attends a local
    Methodist church, participates in community events such as the county fair and high school football games, and values self‑reliance and a strong work ethic. These cultural influences reinforce his preference
    for routine, practicality, and responsibility while providing a supportive backdrop for his competitive yet collaborative pursuits.
attributes:
  skills: '[''Organizational skills'', ''Time‑management'', ''Methodical problem‑solving'', ''Basic mechanical aptitude'', ''Strategic gaming (chess, turn‑based video games)'', ''Reliable teamwork'', ''Consistent
    routine adherence'']'
  hobbies: '[''Model kit building'', ''Chess'', ''Strategic video gaming'', ''Reading practical non‑fiction'', ''Boy Scouts activities'', ''Basketball'', ''Gardening'']'
  career_goals: Benson aspires to pursue a career that blends his love of structure, practicality, and hands‑on work. He hopes to graduate high school with honors and study engineering—particularly civil
    or mechanical engineering—so he can design and build reliable infrastructure. He also envisions a future where he could work as a skilled tradesperson, such as a carpenter or automotive technician,
    appreciating the tangible results of his effort. Long‑term, Benson wants to contribute to his community by applying his organized, methodical approach to solve real‑world problems, potentially leading
    local projects or joining a community service program that values routine and dependability.
