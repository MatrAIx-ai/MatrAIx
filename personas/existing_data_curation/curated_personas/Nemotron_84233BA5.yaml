  hobbies: '["Woodworking", "Classic car restoration", "Fishing", "Hiking", "Boston Red Sox fandom", "Local history research", "Fire safety volunteer teaching", "Cooking New England cuisine"]'
  career_goals: Richard aims to become a fire captain within the next three years, followed by pursuing fire chief certification. He wants to earn Fire Inspector and Fire Investigator credentials, lead
    the department’s community risk‑reduction program, and develop a mentorship pipeline for new recruits. Long‑term, after retirement, he hopes to work as a fire‑safety consultant for local schools and
    municipalities and possibly teach fire‑science courses at a community college.
