  hobbies: '["Visiting contemporary art galleries", "Digital illustration", "Photography (street and landscape)", "Reading speculative fiction", "Playing piano", "Hiking in the Texas Hill Country", "Volunteer
    coding workshops", "Raspberry Pi home‑automation projects"]'
  career_goals: In the near term, Monica aims to earn certifications such as the AWS Certified Solutions Architect and CompTIA Security+ while taking on increasingly complex analyst projects that let her
    lead cross‑functional teams. She hopes to transition to a senior systems analyst role within the next two years, focusing on digital transformation initiatives for mid‑size enterprises in the Dallas
    area. Long‑term, Monica aspires to become a solutions architect or director of technology, where she can shape enterprise‑wide strategies and mentor emerging talent—especially women in tech. She also
    envisions launching a boutique consultancy that blends technology with interactive art installations, leveraging her curiosity for unconventional ideas and her appreciation of aesthetic design.
