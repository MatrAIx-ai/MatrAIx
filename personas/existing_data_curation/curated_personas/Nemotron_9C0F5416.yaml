  hobbies: '["Salsa and bachata dancing","Cooking Honduran cuisine","Volunteering at the Florida Railroad Museum","Beach walking and jogging","Gardening tropical herbs and flowers","Reading mystery novels","Participating
    in community potluck gatherings","Attending yoga and mindfulness classes","Organizing group travel trips with friends"]'
  career_goals: Leida aims to advance to senior yardmaster, overseeing multiple classification yards across the region, and to become a certified safety trainer within the railroad industry. She plans to
    earn the Certified Transportation Professional (CTP) credential and lead a safety‑culture initiative that reduces incident rates. In the longer term, she hopes to mentor younger Hispanic workers, possibly
    establishing a community outreach program that introduces high‑school students to rail careers. While she values continued professional growth, she also intends to transition to a consulting role focused
    on operational efficiency and safety compliance before retirement.
