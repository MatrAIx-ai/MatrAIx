persona_description: A geologist who specializes in the study of the unique geology of South Florida, particularly the boulder zone and the upper Floridian aquifer. He has extensive knowledge and experience
  in understanding the geology of the region and is well-versed in the potential environmental impacts of deep well injection. He is interested in finding alternative methods of wastewater disposal that
  are more environmentally friendly and sustainable. He is also interested in the economic and social impacts of deep well injection on local communities and governments.
