  hobbies: '["Folkloric and hip‑hop dancing", "Soccer", "TikTok content creation (dance and cooking videos)", "Reading YA fiction", "Journaling", "Sketching and cartoon illustration", "Volunteering at community
    center events"]'
  career_goals: Janely aspires to become a community liaison or youth advocate who bridges cultural and linguistic gaps in Brownsville. She hopes to pursue a degree in communications or social work, aiming
    to work for non-profit organizations that support bilingual education and mental-health resources for teens. Long-term, she envisions leading community outreach programs that empower other young people
    to speak up and stay resilient.
