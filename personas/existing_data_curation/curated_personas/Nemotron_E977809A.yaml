personas:
  professional: Janely Abarca, an aspiring digital creator, merges their love for traditional folkloric dance and high‑energy hip‑hop with a practical eye for video editing, producing concise TikTok tutorials
    that teach choreography and quick recipes while they coordinate volunteer events at the community center, a blend that showcases their curiosity, calm confidence, and natural knack for being the enthusiastic
    focal point of group projects.
  sports: Janely Abarca leads a lively weekend soccer squad in a local youth league, preferring the midfielder role where they can both organize play and improvise on the fly, they cheer for the national
    women's team and the hometown professional club, and they balance competitive drive with a laid‑back enjoyment of the sport.
  arts: Janely Abarca blends dance, sketching, and pop culture by choreographing routines set to BTS and Doja Cat tracks, drawing whimsical cartoons inspired by Bill Watterson’s Calvin and Hobbes and Megan Levit’s
    expressive style, and they frequently cite Misty Copeland’s ballet precision as a guiding influence, reflecting their sociable and curious artistic spirit.
  travel: Janely Abarca’s travel style mixes family day trips to nearby national parks like Zion and weekend getaways to Disney World with an eventual dream of exploring Tokyo’s street fashion scene, favoring
    itineraries that combine cultural festivals and opportunities to film short travel clips for their TikTok audience, a balance of adventure and practicality that they relish.
  culinary: Janely Abarca’s culinary experiments range from mastering homemade pepperoni pizza with mozzarella, basil, and oregano to whipping up quick ramen bowls using soy sauce, nori, and soft‑boiled
    eggs, and they often showcase bite‑sized taco‑style quesadillas with avocado and cheddar in their cooking tutorials, highlighting a playful yet organized kitchen approach.
  core: Janely Abarca is a calm, talkative teen who seamlessly fuses dance, video creation, and community service, constantly juggling organized planning with spontaneous creativity while rarely letting
    stress interfere, and they thrive on the energy of group projects.
background:
  cultural: Janely grew up in a Mexican-American household on the U.S.-Mexico border, where Spanish is spoken at home and English is used at school. Her family celebrates Día de los Muertos, Cinco de Mayo,
    and traditional religious holidays, often preparing homemade tamales, pozole, and aguas frescas. The close-knit community of Brownsville emphasizes family solidarity, respect for elders, and a strong
    sense of regional pride. Janely’s cultural identity blends Mexican heritage with the dynamic, bilingual life of a border city, shaping her values of community service, harmony, and cultural pride.
