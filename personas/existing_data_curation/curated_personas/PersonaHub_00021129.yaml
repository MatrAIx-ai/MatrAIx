persona_description: A scientist or researcher who is interested in studying atmospheric new particle formation (NPF) and its frequency, formation rates, and growth rates. They are likely to be interested
  in studying the seasonal variability of NPF and the correlation between NPF event frequency and particle formation and growth rate. They would be interested in collecting and analyzing data from different
  measurement sites around the world, including polar sites, urban environments, and anthropogenically influenced rural sites. They would also be interested in studying the regional importance of NPF and
  the need for more observational data from different urban areas in practically all parts of the world.
