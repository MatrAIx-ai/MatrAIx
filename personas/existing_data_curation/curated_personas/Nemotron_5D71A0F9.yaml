personas:
  professional: Amber Kilayko, a seasoned deputy with a dual expertise in forensic investigation and digital analytics, leverages her gregarious, detail‑oriented nature to lead crime‑scene teams, mentor
    junior officers, and champion data‑driven policing strategies within the Clinton County Sheriff’s Office.
  sports: Amber Kilayko, an avid hiker of the Clinton County River trails and a weekend participant in the Cedar Crest Cross‑Fit class, roots for the Cleveland Browns, Cleveland Guardians, and Cleveland
    Cavaliers, and they also coach a youth soccer team at the county shelter, balancing competitive viewing with community play.
  arts: Amber Kilayko, a charismatic fixture in the county’s community theater, channels her love of mystery novels into starring roles in Agatha Christie adaptations, while they unwind by listening to
    live recordings of the Cleveland Orchestra and revisiting classic film noir masterpieces such as Chinatown.
  travel: Amber Kilayko prefers purposeful travel that blends relaxation with learning, often planning road trips to national parks like Acadia and Shenandoah, and they have long‑standing dreams of chasing
    the aurora borealis in Iceland while balancing those adventures with a modest travel fund for occasional family visits to Washington, D.C., for criminology symposia.
  culinary: Amber Kilayko, a confident home chef, specializes in farm‑to‑table dishes such as roasted beet salad with goat cheese, herb‑infused chicken coq au vin, and a signature spicy black‑bean chili,
    frequently using garden‑fresh rosemary, thyme, and garlic to impress friends at her weekly dinner gatherings.
  core: Amber Kilayko blends a detective’s analytical mind with a theater‑lover’s charisma, turning community service, gardening, and stargazing into a vibrant tapestry of curiosity, compassion, and occasional
    over‑commitment.
background:
  cultural: Amber is a white Midwestern American whose family lineage traces back to German and Irish immigrants who settled in Ohio in the early 20th century. Raised in the small‑town environment of Xenia,
    she embodies the practical, community‑oriented values of the region, blending traditional Midwestern hospitality with a modern, progressive outlook shaped by her STEM education. Her upbringing emphasized
    service and compassion, which aligns with her career in law enforcement and her strong commitment to community well‑being.
attributes:
  skills: '["Criminal Investigation", "Forensic Science", "Digital Forensics", "Data Analysis and Crime Mapping", "Crisis De‑escalation", "Community Policing", "Public Speaking", "Leadership and Mentoring"]'
  hobbies: '["Mystery/True‑Crime Book Club", "Volunteer Work at Local Shelter", "Gardening", "Hiking", "Amateur Astronomy", "Cooking and Hosting Dinner Parties", "Community Theater"]'
  career_goals: Amber aims to advance to a supervisory position such as Sergeant or Lieutenant within the Clinton County Sheriff's Office, where she can lead a specialized unit focused on cybercrime and
    forensic investigations. She seeks to integrate data‑driven policing strategies to enhance community safety, develop comprehensive training programs for junior officers, and expand community outreach
    initiatives that build trust. In the long term, she envisions collaborating with state agencies on policy development and pursuing a master’s degree in criminal justice to deepen her strategic impact.
