  career_goals: Luis aims to transition from the shop floor to a lead‑assembler or shift‑supervisor role where he can formalize his mentorship of younger workers and influence process improvements. He is
    pursuing an associate‑level certification in Production Technology to solidify his technical credentials and hopes to introduce a small‑scale lean‑training program for the plant’s Latino workforce.
    Over the next five years he wishes to develop a reliable after‑hours repair service for local small businesses, leveraging his fabrication skills while building a modest side venture that can support
    his family’s retirement plans. He also envisions supporting his children’s vocational education, encouraging them to obtain college degrees or skilled‑trade apprenticeships.
