persona_description: A healthcare professional who is interested in advancing the debate in nursing and health care research. They have a strong background in nursing and health care and are knowledgeable
  in the context of nursing and health care research. They are also skilled in accessing sources of knowledge, making the most of existing knowledge, and evaluating qualitative and quantitative research.
  They are familiar with populations and samples, ethical issues in published research, and the utilization of research findings in practice. They are also proficient in reviewing and interpreting research,
  and translating research findings into health care practice.
