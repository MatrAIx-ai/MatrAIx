personas:
  professional: Jackie Bishop, an eight‑year‑old aspiring visual artist, channels their curiosity and methodical planning into detailed animal sketches and elaborate LEGO constructions, treating each creative
    session like a mini‑project with a clear outline and deadline.
  sports: Jackie Bishop enjoys playing forward on the St. Louis Youth Soccer Club during the fall season, attends beginner swim lessons at the local community pool in the summer, and frequently joins family
    nature walks in Forest Park, collecting leaves and rocks while cheering for the St. Louis Cardinals.
  arts: Jackie Bishop immerses themselves in the arts by drawing whimsical animal kingdoms inspired by Eric Carle and Hayao Miyazaki, regularly visiting the Saint Louis Art Museum to study works by Vincent
    van Gogh and Frida Kahlo, and practicing piano pieces by Ludwig van Beethoven and Yiruma at their local music school.
  travel: Jackie Bishop loves family road trips to the Missouri Botanical Garden and the historic St. Charles district, dreams of exploring the Grand Canyon’s rim, and prefers planned itineraries that balance
    museum visits with plenty of time for nature scavenger hunts.
  culinary: Jackie Bishop favors comfort foods like creamy macaroni and cheese, delights in making strawberry shortcake with a parent, and often experiments by adding colorful bell peppers and carrot ribbons
    to their vegetable snacks, while proudly declaring their favorite dish is rainbow fruit salad with honey‑lime dressing.
  core: Jackie Bishop is a curious, organized eight‑year‑old whose vivid imagination fuels art and LEGO builds, yet intense anxiety sometimes triggers brief meltdowns, and they meticulously budget their
    allowance to fund creative passions.
background:
  cultural: Jackie is a White American growing up in the suburban community of Saint Peters, Missouri. Her family reflects typical Midwestern values of politeness, community participation, and appreciation
    for seasonal holidays such as Thanksgiving, Christmas, and Fourth of July fireworks. She attends a public elementary school that emphasizes both academic achievement and extracurricular arts programs.
    Her cultural experiences include attending the St. Charles County fair, community library storytimes, and local museum trips. Her household celebrates a blend of family traditions, including Sunday
    family meals, holiday baking, and occasional church attendance, providing her with a stable, supportive environment that nurtures her curiosity and love for art.
