  career_goals: Jackie dreams of becoming an artist or museum curator who can share beautiful artworks with others. She also imagines designing inspiring spaces as an architect, drawing on her love for
    organized planning. She hopes to continue writing stories and may someday become a children's author. Because she is aware of her strong feelings, she is interested in helping other kids manage emotions,
    envisioning a future role as an art therapist or youth counselor. She plans to study art and design in high school and continue her piano lessons.
