personas:
  professional: Terry Bailey, a budding mini-architect, spends afternoons arranging wooden blocks into elaborate forts inspired by the stories whispered at church picnics and the rhythmic patterns of bluegrass
    tunes that echo through the valley.
  sports: Terry Bailey, a toddler enthusiast of the local community center’s junior gymnastics class, proudly dons a Tiny Wildcats jersey while cheering for the Kentucky Wildcats football team on Saturday
    mornings, and loves playing a makeshift baseball game with a soft rubber ball in the backyard.
  arts: Terry Bailey, a little finger‑painter, delights in the library’s craft hours, often humming along to Bill Monroe and Alison Krauss while dabbling in watercolors and crafting tiny paper guitars.
  travel: Terry Bailey, who prefers short family road trips, enjoys exploring the nearby state park’s waterfall trail and the historic flatboat museum, while daydreaming about a future visit to the illuminated
    lights of Washington, D.C., and the warm sands of the Gulf Coast.
  culinary: Terry Bailey, a picky eater with a sweet tooth, relishes fluffy apple‑butter pancakes drizzled with maple syrup, giggles over a spoonful of chunky peanut butter on honey toast, and loves the
    burst of fresh wild blueberries mixed into plain yogurt.
  core: Terry Bailey is a curious, compassionate two‑year‑old who stitches together stories from backyard adventures and bluegrass lullabies while blissfully scattering toys, coins, and blueberry stains
    alike.
background:
  cultural: Terry is a white child raised in Pikeville, a small town nestled in the Appalachian foothills of eastern Kentucky. His family’s roots run deep in the valley, where community life revolves around
    church gatherings, county fairs, and a strong tradition of bluegrass music and storytelling. Local customs such as picking wild berries, attending Sunday services, and celebrating the annual Pike County
    Fair shape his sense of belonging and hospitality. Exposure to Appalachian crafts at the local library’s art programs and the close‑knit, family‑centered environment foster his appreciation for art,
    music, and cooperative community values.
attributes:
  skills: '[''Basic verbal communication'', ''Color and shape recognition'', ''Fine motor skills (crayon drawing, block stacking)'', ''Gross motor skills (running, climbing)'', ''Empathy and sharing behavior'',
