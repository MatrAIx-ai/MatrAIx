  hobbies: '[''Cooking and recipe experimentation'', ''Reading contemporary fiction and non-fiction'', ''Community gardening'', ''Yoga'', ''Listening to Indian classical music'', ''Walking through Queens
    neighborhoods and attending small cultural festivals'']'
  career_goals: Despite not being formally employed, Inayat aspires to formalize her expertise and increase her independence. She plans to earn a GED within the next year, which will open pathways to community
    college courses in culinary arts or small business management. Her longer‑term ambition is to launch a modest home‑based catering service specializing in healthy South Asian meals for local families
    and small corporate events. She also hopes to become a certified community health volunteer, leveraging her knowledge of nutrition and cultural practices to support other South Asian households in Queens.
