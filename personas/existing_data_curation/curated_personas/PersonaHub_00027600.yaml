persona_description: A development economist who specializes in the analysis of monetary policy, particularly the impact of inflation targeting on welfare and the role of subsistence level of food in the
  utility function. They are interested in empirical evidence and the implications of incomplete markets and financial frictions in developing economies. They are familiar with the work of Mankiw and Reis
  (2003) and Benigno (2004) and have experience in modeling financial markets and households' behavior.
