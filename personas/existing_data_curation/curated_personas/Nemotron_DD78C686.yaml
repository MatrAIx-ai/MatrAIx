  hobbies: '[''drawing and coloring'', ''watercolor painting'', ''building with Duplo blocks'', ''reading picture books'', ''collecting seashells'', ''sandbox play'', ''nature walks'', ''pretend kitchen
    play'', ''listening to children’s music'', ''watching nature documentaries'']'
  career_goals: Wendy often talks about wanting to be an artist who paints beautiful pictures, a teacher who helps other kids learn, or a marine biologist who cares for sea creatures. She dreams of exploring
    the ocean and even space one day, combining her love of nature, art, and curiosity about the world. Her ambitions are framed in childlike wonder, focusing on helping others and creating things that
    make people happy.
