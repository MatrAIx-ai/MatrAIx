personas:
  professional: Wendy Paul, a preschool explorer who they pretend is a marine biologist and aspiring astronaut, channels their curiosity about sea life and rockets into imaginative sand‑and‑shell experiments,
    showing early problem‑solving abilities and a delightfully disorganized yet flexible play style.
  sports: Wendy Paul, they enjoy weekly swim lessons at the local pool, participate in the Palm Bay Youth Soccer Club’s tiny‑kit sessions, and proudly wear a Miami Marlins cap when the family gathers to
    watch a baseball game on the weekend.
  arts: Wendy Paul, they spend afternoons colouring marine‑themed pictures inspired by Eric Carle’s vibrant illustrations and dancing to the catchy tunes of Sesame Street characters, while also attending
    the Palm Bay Art Walk where they admire the bright murals of local artist Maya Rivera and proudly replicate her sea‑shell collage techniques at home.
  travel: Wendy Paul, they love spontaneous beach mornings at the nearby Treasure Cove, cherish excursions to the Kennedy Space Center where rockets spark endless wonder, and dream of a family adventure
    to Maui’s Hana Highway, favoring the freedom of sand‑castle building over rigid itinerary schedules.
  culinary: Wendy Paul, they snack enthusiastically on cheesy macaroni bites, crunchy fish sticks with tartar sauce, and sweet strawberry‑banana smoothies, often assisting Mom in mixing pancake batter and
    proudly sprinkling shredded coconut onto a tropical fruit parfait made with mango, pineapple, and a drizzle of honey.
  core: Wendy Paul, they are a curious little explorer who blends a love for sea life and space with a habit of turning every sandcastle into a miniature rocket, while occasionally misplacing their crayons
    in the most unexpected places.
background:
  cultural: Wendy is raised in a white, middle‑class family in Palm Bay, Florida, where the coastal lifestyle and proximity to the Space Coast shape her experiences. Family activities often include beach
    outings, visits to local nature preserves, and trips to community art events, fostering her love of art and the natural world. She celebrates typical American holidays such as Thanksgiving, Christmas,
    and the Fourth of July, and participates in community gatherings like the Palm Bay Art Walk and local library story times. The region’s connection to the Kennedy Space Center and marine ecosystems subtly
    influences her curiosity about space and sea life.
attributes:
  skills: '[''crayon and watercolor drawing'', ''basic counting to ten'', ''letter recognition (A‑J)'', ''simple puzzle solving'', ''sharing and cooperative play'', ''basic self‑care (dressing, feeding)'',
