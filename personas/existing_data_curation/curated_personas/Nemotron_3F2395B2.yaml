  career_goals: Although retired from formal employment, Guillermo aims to deepen his legacy by mentoring younger volunteers at the local senior center, documenting his family’s migration story in a memoir,
    expanding his photography skills to capture cultural moments, and helping to establish a community garden that blends New Jersey produce with Ecuadorian heirloom varieties. He also hopes to travel back
    to Ecuador for a short visit to reconnect with his hometown and to share the experience through a series of talks at the River Edge cultural association.
