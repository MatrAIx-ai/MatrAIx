  career_goals: Cu aspires to become a lead data scientist or principal research analyst within a technology or biotech firm where she can spearhead independent projects that blend rigorous mathematics
    with real-world impact. She aims to publish peer‑reviewed papers on applied statistical methods, earn industry certifications (such as Certified Analytics Professional), and eventually mentor a small,
    high‑performing team that values both disciplined methodology and innovative experimentation. Her competitive nature drives her to win data‑science competitions and secure patents for novel analytical
    frameworks, while her desire for structure motivates her to establish predictable, data‑driven workflows that empower her to navigate complex challenges efficiently.
