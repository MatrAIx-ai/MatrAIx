personas:
  professional: Tiffany Wall, a budding elementary education major at a regional university, leverages meticulous lesson‑planning, tech‑savvy use of Google Classroom, and a balanced curiosity‑practicality
    mindset, and they design inclusive, data‑driven curricula that keep the classroom both structured and engaging.
  sports: Tiffany Wall embraces hiking the rolling hills of Moniteau County with the local Trail Runners club, practices yoga twice weekly at the community center, roots for the St. Louis Cardinals in baseball,
    and they join a seasonal pick‑up volleyball league every spring.
  arts: Tiffany Wall finds creative release in community theater productions of 'Our Town,' strums acoustic renditions of John Mayer and Iron & Wine songs on their guitar, and they devour novels by Sarah
    J. Maas while attending yearly local art fairs featuring muralist Shepard Fairey.
  travel: Tiffany Wall prefers low‑cost road trips that blend nature and culture, having explored the Ozark Highlands, spent a weekend in Chicago’s museum district, and they dream of a spring backpack trek
    through the Appalachian Trail as their next big adventure.
  culinary: Tiffany Wall, an enthusiastic home cook, experiments with spicy shrimp tacos, rosemary‑infused roasted potatoes, and silky homemade apple pie, proudly boasting a growing skillset that ranges
    from novice microwave meals to confident skillet sautés, and they often alphabetize their spice rack to keep the pantry organized.
  core: Tiffany Wall is a methodical yet curious 19‑year‑old whose love of organized lesson plans, spontaneous guitar strums, and meticulous budgeting coexists with a quirky habit of alphabetizing their
    spice rack, and they occasionally over‑plan weekend trips to the point of stress.
background:
  cultural: Tiffany was raised in a white, Midwestern family in Moniteau County, Missouri, with ancestry tracing back to German and Irish roots. Growing up in a small‑town environment, she internalized
    values of community involvement, self‑reliance, and respect for tradition. Her family placed a strong emphasis on education—both parents worked in the school system—fostering her early interest in teaching.
    Participation in local events such as county fairs, church gatherings, and volunteer drives shaped her sense of civic duty. While she embraces these regional customs, she also seeks broader perspectives
    through academic studies and online communities, balancing her local heritage with a curiosity about diverse educational practices.
attributes:
  skills: '[''Lesson Planning'', ''Classroom Management'', ''Educational Technology'', ''Tutoring'', ''Research Methodology'', ''Writing'', ''Organizational Skills'', ''Interpersonal Communication'', ''Problem
