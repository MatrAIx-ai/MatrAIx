  hobbies: '[''Reading (Young Adult & Contemporary Fiction)'', ''Hiking'', ''Community Theater'', ''Volunteering at Local Library'', ''Cooking'', ''Gardening'', ''Yoga'', ''Photography'', ''Acoustic Guitar
    Playing'', ''Crocheting'', ''Book Club Participation'', ''DIY Home Projects'']'
  career_goals: Tiffany aims to complete her bachelor's degree in elementary education with a focus on inclusive classroom strategies within the next two years. She plans to secure a student‑teaching placement
    in a public school where she can apply her methodical lesson‑design skills and develop classroom management expertise. Upon graduation, she intends to obtain certification and begin a full‑time teaching
    role in a community‑oriented school in Missouri or nearby. In the longer term, she hopes to pursue a master's in educational leadership to move into curriculum development or school administration,
    and she dreams of launching a community tutoring initiative that provides academic support for underserved students in Moniteau County.
