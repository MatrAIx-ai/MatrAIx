  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Cooking'', ''Hiking'', ''Yoga'', ''Genealogy Research'', ''Quilting'', ''Volunteer Service'']'
  career_goals: Hani aims to advance to a senior leadership role such as Director of Community Services for Johnson County, where she can shape large-scale initiatives that integrate sustainable business
    models with social impact. She seeks to champion innovative, evidence-based programs that expand access to health, housing, and workforce development services. In the longer term, she hopes to launch
    a consultancy that helps smaller nonprofits adopt strategic planning and funding practices, and to serve on regional nonprofit boards to influence policy and collaborative solutions across the Midwest.
