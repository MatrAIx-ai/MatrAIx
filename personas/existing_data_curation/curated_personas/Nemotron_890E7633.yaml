personas:
  professional: Hani Sherbine, a seasoned community services strategist, leverages two decades of program development, grant management, and stakeholder engagement to craft evidence‑based initiatives, while
    their relaxed, flexible approach lets them adapt plans on the fly and their calm, assertive demeanor resolves crises without losing sight of practical outcomes.
  sports: Hani Sherbine enjoys weekend hikes on the Kanza Trail with the Kansas Trails Club, practices gentle yoga at a local studio, occasionally joins the Olathe 5K run, and cheerfully follows the Kansas
    City Chiefs, Royals, and Sporting Kansas City as their go‑to professional sports teams.
  arts: Hani Sherbine intertwines a love of historical fiction—favoring Hilary Mantel and Ken Follett—with a passion for quilting, regular trips to the Kansas City Art Institute exhibitions, evenings listening
    to jazz pianist Brad Mehldau, and occasional outings to see productions by the Kansas City Repertory Theatre.
  travel: Hani Sherbine favors a mix of spontaneous weekend road trips to nearby Midwestern gems like Omaha, Des Moines, and the Ozarks, while also planning occasional deep‑dive genealogical trips to Bavaria
    and Tuscany, balancing a modest travel budget with a love for boutique B&B stays and a flexible itinerary that leaves room for unplanned garden‑supply stops.
  culinary: Hani Sherbine, an adept home chef, delights in crafting global dishes such as Mediterranean ratatouille with heirloom tomatoes, Indian chickpea curry spiced with cumin and coriander, and Moroccan
    tagine featuring preserved lemons, often showcasing fresh basil, rosemary, and garlic from their garden while hosting informal dinner parties for friends and book‑club mates.
  core: Hani Sherbine blends pragmatic community leadership with a garden‑obsessed, mildly disorganized spirit, turning any crisis into a collaborative opportunity while regularly swapping heirloom seeds
    for fresh ideas.
background:
  cultural: Hani is a white American who grew up in the Midwestern United States, likely in a suburban environment similar to Olathe. Her family background includes German and Irish ancestry, with a strong
    emphasis on community involvement, self-reliance, and practical problem-solving typical of Midwestern culture. Raised in a middle-class household, she attended church regularly, which fostered a sense
    of service and compassion. Her business education at a regional university reinforced a pragmatic outlook, while her career in social services reflects a commitment to collective well-being. This blend
    of cultural values informs her balanced approach to curiosity and practicality, flexibility in obligations, and emotionally stable engagement with community challenges.
