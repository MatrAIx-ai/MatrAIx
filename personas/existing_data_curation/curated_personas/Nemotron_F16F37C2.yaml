personas:
  professional: Bobby Campbell is a retired industrial maintenance shift supervisor who now runs a part‑time handyman service for seniors, applying three decades of mechanical, electrical, and carpentry
    expertise while mentoring volunteers and delivering safety‑focused workshops.
  sports: Bobby Campbell is a devoted Kansas City Chiefs fan who never misses a Sunday game, participates in a senior bowling league and a community softball team, and cheers on the Royals during baseball
    season while coaching youth fishing contests.
  arts: Bobby Campbell enjoys listening to classic rock legends like The Rolling Stones and Creedence Clear Water Revival, attends Kansas City Symphony concerts and local theater productions, and curates
    a personal vinyl collection of 1960s blues.
  travel: Bobby Campbell favors road trips across the Midwest, has visited Yellowstone and the historic district of St. Louis, dreams of sailing the Great Lakes in summer, and plans a future pilgrimage
    to Nashville’s country‑music scene.
  culinary: Bobby Campbell relishes Kansas City‑style burnt‑end barbecue, chicken‑fried steak, and home‑grown garden tomatoes in fresh salsa, cooks a weekend pot roast with root vegetables, and occasionally
    experiments with craft beer‑marinated ribs.
  core: Bobby Campbell blends a practical Midwestern work ethic with a gregarious love for community, hands‑on projects, classic rock, and senior‑center mentorship, all while balancing modest financial
    habits and a keen eye for local history.
background:
  cultural: Bobby’s cultural background is rooted in Midwestern American values typical of the Kansas City, Missouri area. Growing up in a middle‑class suburb, he absorbed a strong work ethic, practicality,
    and a community‑first mindset. The region’s blend of industrial and agricultural heritage fostered his hands‑on approach to problem‑solving, while the local culture’s emphasis on neighborliness, volunteerism,
    and modesty resonates with his cooperative and sociable nature. He identifies with the broader Midwestern tradition of friendly, outspoken civic participation, and maintains connections to the area's
    diverse ethnic tapestry, including families of German and Irish descent common to the region.
