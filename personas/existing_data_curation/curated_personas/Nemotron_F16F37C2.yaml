  career_goals: Although retired from full‑time work, Bobby aims to stay active in his community by mentoring younger volunteers and providing occasional handyman consulting for local senior‑focused projects.
    He hopes to develop a small part‑time service helping seniors with home repairs, leveraging his practical skills while fostering social connections. Additionally, he plans to attend workshops on digital
    tools to keep up with technology and to serve as a guest speaker at local schools and community centers, sharing the value of practical trades and teamwork.
