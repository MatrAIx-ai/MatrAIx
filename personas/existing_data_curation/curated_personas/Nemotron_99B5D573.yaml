  career_goals: Priscilla aims to advance to a senior solutions architect role where she can shape digital transformation strategies for midsized organizations, with a particular interest in sustainable
    IT practices for cultural institutions in the Hudson Valley. She plans to earn the AWS Solutions Architect Professional certification and lead cross‑functional teams that blend technology with artistic
    innovation. Over the next five years, she wants to establish a mentorship program for women in tech within her community, publish thought pieces on the intersection of art and technology, and eventually
    launch her own consultancy that helps nonprofit arts organizations adopt modern, secure, and user‑friendly technology solutions.
