personas:
  professional: Catrina Mcdaniel, a retired engineering professor turned data-driven community organizer, leverages their statistical modeling and data visualization expertise to design interdisciplinary
    STEM mentorship pipelines, while channeling their curatorial eye into a traveling exhibition that bridges science and African-American art, all managed with a meticulous yet flexible approach that they
    uphold with quiet confidence.
  sports: Catrina Mcdaniel avidly follows the Houston Astros and Houston Rockets, participates in a senior-friendly softball league at the community center, and maintains fitness through daily garden tending,
    sunrise walks along Buffalo Bayou, and a weekly gentle yoga class, balancing a competitive spirit with an earnest respect for their body's limits at 75, a balance they carefully monitor.
  arts: Catrina Mcdaniel spends afternoons sketching heirloom vegetables in delicate watercolors, curates community art shows that spotlight under-represented voices, and attends intimate performances of
    jazz legends like Miles Davis and contemporary saxophonist Wynton Marsalis at Houston's historic Continental Club, letting these experiences shape their reflective yet competitive creative outlook,
    a perspective they cherish in every brushstroke.
  travel: Catrina Mcdaniel favors meticulously planned cultural trips, having explored New Orleans' historic French Quarter, Savannah's antebellum squares, and Washington, D.C.'s national museums, while
    a recent pilgrimage to Ghana fulfilled a lifelong curiosity about ancestral narratives, all undertaken on senior-friendly tours that accommodate their health considerations and modest budget, a journeying
    style they have refined over decades.
  culinary: 'Catrina Mcdaniel delights in fusing Southern staples: gumbo, collard greens, and peach cobbler with global twists like kimchi-infused jambalaya or Creole-spiced quinoa salads, often harvesting
    heirloom tomatoes, okra, and sweet potatoes from their backyard garden to craft meals that celebrate both tradition and experimentation, a kitchen adventure they pursue with the same curiosity that
    fuels their artistic pursuits.'
  core: Catrina Mcdaniel is a data-savvy, garden-tending mentor who blends scientific rigor with artistic flair, channels a competitive edge into community service, and balances meticulous planning with
    spontaneous creative bursts at 75, a stance they uphold daily.
background:
  cultural: Catrina was raised in Houston’s historic Third Ward, a vibrant Black community known for its gospel churches, Creole cuisine, and strong tradition of civil‑rights activism. Her parents, both
    educators, instilled a deep respect for learning and community service. She has remained active in local cultural events such as Juneteenth celebrations, church choirs, and African‑American art festivals,
    while also embracing the multicultural diversity of modern Houston. Her identity as a Black woman in STEM informs her dedication to mentoring the next generation and preserving the cultural narratives
    of her community.
