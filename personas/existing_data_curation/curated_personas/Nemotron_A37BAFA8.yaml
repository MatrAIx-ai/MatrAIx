  career_goals: Catrina aims to create a sustainable mentorship pipeline that connects retired STEM professionals with underserved high‑school students in Houston, to curate a traveling exhibition that
    explores the dialogue between science and African‑American art, and to author a memoir that reflects on her career, the evolution of Black women in STEM, and her personal journey of resilience.
