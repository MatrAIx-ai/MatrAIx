personas:
  professional: Jacob Tess, a 35‑year‑old metal and plastic fabricator, leverages deep expertise in MIG, TIG, and CNC machining alongside a keen eye for aesthetic detail to lead custom‑fabrication projects,
    streamline processes, and mentor apprentices as they work toward a supervisory role and journeyman certification.
  sports: Jacob Tess is a dedicated weekend sailor on Charleston’s Intracoastal waterways, a member of the local sailing club, enjoys occasional fishing trips for redfish and trout, and supports the Carolina
    Panthers and the Charleston Battery with a loyal fan’s enthusiasm.
  arts: Jacob Tess frequents the Riverbanks Museum and the historic Old Slave Mart Art Center, sketches metalwork concepts while listening to classic rock bands like The Rolling Stones and jazz greats such
    as Miles Davis, and draws inspiration from sculptor Richard Serra and woodcarver Wharton Esherick for their own handcrafted pieces.
  travel: Jacob Tess prefers road trips that blend coastal adventures and craft fairs, having explored the historic streets of Savannah, the islands of the Bahamas, and the art studios of Asheville, while
    planning a future pilgrimage to the German steel‑fabrication hubs of Dortmund and Essen.
  culinary: Jacob Tess favors low‑country cuisine, especially shrimp and grits, deviled eggs, and Carolina mustard BBQ sauce, enjoys cooking with fresh herbs like thyme and rosemary, and occasionally experiments
    with smoked paprika in their own marinades, though they are notorious for over‑salting their signature crab cakes.
  core: Jacob Tess blends Southern hospitality and meticulous craftsmanship, balancing a disciplined work ethic with a love for sailing, vinyl music, and occasional over‑cooking, all while pursuing a managerial
    path and mentoring the next generation of fabricators.
background:
  cultural: Jacob grew up in a middle‑class white Southern family with deep roots in the Lowcountry of South Carolina. His upbringing emphasized hard work, community, and hospitality, reflected in traditions
    like family barbecues, church attendance, and support for local events. The coastal environment fostered a respect for nature and a love of outdoor activities, while the region’s rich history of crafts
    and maritime trades inspired his interest in metalworking and art. Though he pursued some college education, he values practical experience and mentorship, blending Southern modesty with a curiosity
    for new ideas.
