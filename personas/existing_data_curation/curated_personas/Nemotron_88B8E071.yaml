  career_goals: Jacob aims to advance to a supervisory or operations manager role within the manufacturing sector, overseeing a team of fabricators while driving efficiency and innovation. He aspires to
    earn a journeyman certification in metalwork, and eventually open his own boutique workshop that blends functional metalcraft with artistic sculpture. He also intends to mentor apprentices, develop
    lean manufacturing initiatives, and perhaps obtain an associate degree in industrial technology to solidify his technical foundation.
