persona_description: A network engineer who is responsible for managing and maintaining a switched network. They are skilled in using the show spanning-tree command to obtain information about the spanning
  tree status of the network and understand the criteria used to elect the root bridge in PVST+. They are also familiar with the characteristics of a Layer 2 loop and the nonproprietary protocol that provides
  router redundancy for a group of routers which support IPv4 LANs. They have experience with configuring and managing the Rapid PVST+ protocol on a production network and are aware of the process of determining
  link types on switch interfaces.
