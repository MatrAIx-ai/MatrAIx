  hobbies: '["drum circles","hoop dance gatherings","community basketball","hiking in the mesas","photography of desert landscapes","silver jewelry making","listening to psychology podcasts","cooking traditional
    Navajo dishes","competitive online gaming","participating in local powwows"]'
  career_goals: Joan aims to earn a Certified Nursing Assistant credential within the next two years, then pursue an associate’s degree in community health. She hopes to become a Navajo Nation community
    health worker specializing in mental‑health and stress‑reduction services for youth. Long‑term, she dreams of opening a holistic wellness center in Shiprock that blends modern personal‑care services
    with traditional Navajo healing practices, and to train others in culturally sensitive care.
