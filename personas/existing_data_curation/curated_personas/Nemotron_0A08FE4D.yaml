personas:
  professional: Joan Chauhan, a budding Certified Nursing Assistant trainee, blends practical client‑care abilities with a culturally responsive mindset, using their strong interpersonal communication and
    calm de‑escalation skills to bridge modern health protocols with community traditions, while their competitive streak pushes them to excel in clinical assessments despite occasional disorganization.
  sports: Joan Chauhan participates in community basketball games on weekends and hikes the red mesas during the summer, and they root for the Denver Nuggets and the New Mexico State Aggies while maintaining
    a flexible workout routine that blends traditional hoop‑dance cardio with occasional yoga sessions.
  arts: Joan Chauhan immerses themselves in creative expression by crafting silver jewelry inspired by tribal motifs, capturing desert landscapes through photography, and listening to the atmospheric folk
    sounds of Bon Iver and the rhythmic drumming of local drum circle ensembles, which shape their artistic identity.
  travel: Joan Chauhan prefers spontaneous road trips that blend adventure with cultural immersion, often exploring nearby red‑rock sites like Monument Valley and Sedona, while they daydream about a future
    backpacking journey through Oaxaca, Mexico, to study traditional cuisine and craft techniques.
  culinary: Joan Chauhan regularly cooks blue‑corn pancakes topped with Saskatoon berries and simmered mutton stew seasoned with juniper berries, while also mastering quick game‑night snacks like spicy
    ramen bowls, showcasing their blend of traditional desert flavors and modern comfort foods.
  core: Joan Chauhan, a 21‑year‑old community‑focused aspiring health worker, balances a competitive gaming edge with a laid‑back, sometimes disorganized approach to life, channeling their curiosity and
    cultural humility into a relentless pursuit of holistic wellness for their people.
background:
  cultural: Joan comes from a Navajo family rooted in Shiprock, New Mexico, a community that balances ancient traditions with contemporary life. Her upbringing involved fluency in Diné Bizaad, participation
    in seasonal ceremonies, and learning traditional crafts such as weaving and silversmithing. The values of k’é (kinship) and humility shape her view of service, while the historical resilience of her
    people fuels her dedication to improving health outcomes for her community. She navigates the intersection of modern American Indian identity and mainstream society, drawing strength from both worlds.
attributes:
  skills: '["client communication","culturally responsive care","basic health screening (blood pressure, glucose checks)","first aid and CPR","manual service skills (hair styling, nail care)","flexible
