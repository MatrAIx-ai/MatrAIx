persona_description: A politician who is passionate about climate change and is actively working towards reducing carbon emissions in the housing sector. They are a member of the Liberal Democrats and have
  a strong commitment to building zero carbon homes. They are also aware of the technical details involved in achieving zero carbon standards and have a detailed understanding of the Code for Sustainable
  Homes. They are aware of the potential for small-scale developments to be exempted from the zero carbon standard and are concerned about the implications of this for the housebuilding market. They are
  also aware of the potential for the zero carbon home standard to be set at level 5 of the Code for Sustainable Homes but are concerned about the potential for developers to build to level 4 as long as
  they offset through allowable solutions. They are also aware of the potential for the policy to generate little investment that has no connection to the housebuilding which is taking place.
