personas:
  professional: Felisa Deveaux, a 51‑year‑old elementary arts‑integration teacher, leverages their two decades of classroom experience, meticulous planning, and digital tool proficiency to weave visual
    art, literature, and mindfulness into interdisciplinary curricula while they mentor new teachers and champion community partnerships.
  sports: Felisa Deveaux, an avid hiker, spends weekends trekking the Cedar River trail and regularly joins the local walking club, they cheer passionately for the Iowa Hawkeyes basketball team, participate
    in a community softball league each summer, and occasionally practice folk‑dance routines for fitness.
  arts: Felisa Deveaux, a watercolor enthusiast who draws inspiration from Georgia O'Keeffe and the tranquil Iowa prairie, fills sketchbooks with quick studies from regional art galleries, they strum a
    ukulele to folk tunes by The Chieftains at community gatherings, and they find solace in poetry by Mary Oliver and essays by John Berger.
  travel: Felisa Deveaux, a meticulous planner, prefers immersive cultural trips such as a weekend folk festival in Asheville, a culinary tour of Madison’s farm‑to‑table restaurants, a scenic road trip
    along the Great River Road, and a dream pilgrimage to the English Cotswolds to study historic garden designs, they always balance budget constraints and family commitments while seeking authentic experiences.
  culinary: Felisa Deveaux, a proficient home cook, delights in preparing seasonal Midwestern dishes like pork tenderloin with apple chutney, rhubarb crisp, corn succotash, and skillet‑fried catfish, they
    source heirloom corn, sweet potatoes, and fresh basil from their garden and the local farmer’s market, and they experiment with herb‑infused oils to add a personal twist.
  core: Felisa Deveaux, a 51‑year‑old arts‑driven educator, channels their curious, organized, and socially vibrant nature into community creativity while they navigate high anxiety through mindfulness
    and a never‑ending to‑do list.
background:
  cultural: Felisa grew up in a tight‑knit, small‑town community in the Iowa heartland, rooted in German and Irish ancestry and a family tradition of Lutheran church involvement. The Midwestern values of
    reliability, neighborliness, and a strong work ethic shaped her outlook, while the region’s agricultural heritage fostered an appreciation for seasonal rhythms that she reflects in her gardening and
    cooking. Her upbringing emphasized community participation—fair days, church choirs, and volunteer service—which continues to influence her sociable, collaborative nature and her dedication to fostering
    harmonious, inclusive environments both inside and outside the classroom.
attributes:
  skills: '[''Interdisciplinary Curriculum Design'', ''Visual Arts Integration'', ''Lesson Planning'', ''Classroom Management'', ''Differentiated Instruction'', ''Social-Emotional Learning Facilitation'',
    ''Technology Integration (Google Classroom, Smartboard)'', ''Parent and Community Communication'', ''Collaborative Teamwork'', ''Mentoring New Teachers'', ''Conflict Resolution'']'
  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Reading Historical Fiction and Poetry'', ''Visiting Art Galleries and Museums'', ''Gardening (Native Plants)'', ''Folk Dancing'', ''Hiking Local Trails'',
    ''Yoga and Mindfulness Meditation'', ''Cooking Midwest Seasonal Recipes'', ''Playing Ukulele'', ''Volunteering at the Community Library'', ''Organizing School and Town Events'']'
  career_goals: Felisa aims to deepen her impact beyond her classroom by earning a master’s degree in Educational Leadership and becoming a district arts‑integration specialist. She envisions designing
    district‑wide curricula that embed visual arts and SEL throughout elementary education, leading professional‑development workshops for fellow teachers, and publishing a guide on project‑based learning
    with an arts focus. Additionally, she hopes to champion a school‑wide mindfulness program that addresses anxiety and promotes emotional resilience for both students and staff.
