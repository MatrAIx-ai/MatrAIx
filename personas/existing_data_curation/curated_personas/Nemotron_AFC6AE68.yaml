  career_goals: In the coming years Elizabeth aims to channel her organizational talent into volunteer leadership roles within Monroe County, such as coordinating the senior services program or leading
    a community garden. She plans to complete a short certificate in gerontology to better support older adults. She also dreams of turning her quilting hobby into a small home-based business, managing
    orders, inventory, and shipping with her systematic approach. Maintaining personal independence while being a reliable mentor to younger volunteers and staying socially engaged are central ambitions.
