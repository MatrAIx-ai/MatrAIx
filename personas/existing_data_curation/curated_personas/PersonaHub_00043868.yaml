persona_description: A scientist or agronomist who conducts research on the optimal timing and methods of irrigation for cotton production in arid and semiarid regions. They are interested in understanding
  the effects of water deficit stress on cotton growth and development, and are looking for ways to improve the efficiency of irrigation systems to maximize yield and productivity. They are likely to be
  familiar with the pressure chamber technique, soil water measurement methods, and the use of neutron attenuation to measure soil moisture content. They may have a background in plant physiology and agronomy,
  and may be conducting research in the context of climate change and sustainable agriculture.
