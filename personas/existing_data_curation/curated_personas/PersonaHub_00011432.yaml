persona_description: A researcher at the University of Bristol who specializes in the study of the Earth's mineral resources, particularly precious metals like gold and platinum. Her research focuses on
  the distribution and origin of these metals, and how they were added to the Earth's mantle. She is likely to be interested in the full load of meteorite gold that was added to the Earth's mantle after
  the core formed, and the theory that this is what caused the over-abundance of precious metals in the Earth's silicate mantle. Her work has been published in the journal Nature.
