  hobbies: '[''Fishing'', ''Hiking'', ''Acoustic guitar playing'', ''Woodworking'', ''Reading personal development books'', ''Volunteering at community center'', ''Strategy video games'', ''Journaling for
    stress relief'']'
  career_goals: James aims to deepen his expertise in manufacturing management by completing an associate degree in Industrial Technology at a local community college and earning certifications such as
    Certified Production and Inventory Management (CPIM). His short‑term goal is to advance to a shift‑manager role, where he can implement lean‑manufacturing improvements and mentor new employees. Long‑term,
    he envisions becoming a plant manager who cultivates a safety‑first culture and perhaps launching a consulting service for small, family‑run factories in rural Georgia, giving back to the community
    that shaped him.
