persona_description: A historian who specializes in the study of American history, particularly the period from the 19th century to the present. They are interested in the themes of Manifest Destiny and
  homesteading migration, and how they relate to the broader context of American history. They are also familiar with the cultural and social factors that influenced these movements, such as economic reasons,
  racial and class discrimination, and the sense of an alien landscape. They have a deep understanding of the concept of the American frontier as a durable part of the national mythology and how it has
  helped to model the exodus to the suburbs. They are also aware of the difference between Frederick Jackson Turner's (frontier/homesteading) and John L. O'Sullivan's (Manifest Destiny) perspectives on
  the American frontier, and how they relate to contemporary urban homesteading.
