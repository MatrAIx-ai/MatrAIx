  hobbies: '[''Gardening'', ''Knitting'', ''Reading classic literature'', ''Reading local history'', ''Birdwatching'', ''Crossword puzzles'', ''Walking nature trails'', ''Listening to bluegrass and gospel
    music'']'
  career_goals: Although Tonya is no longer in the formal workforce, she aims to remain an active contributor to her community by expanding her volunteer leadership role at the church and senior center.
    She hopes to complete a short certification in first‑aid and senior safety to better support her neighbors, and she aspires to compile and preserve her family’s oral histories in a written memoir, thereby
    honoring her heritage while keeping herself intellectually engaged.
