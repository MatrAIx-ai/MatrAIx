persona_description: A charismatic and influential black leader who advocates for economic independence and social justice, particularly among poor and marginalized communities. Known for his fiery oratory
  skills and uncompromising stance against racism and inequality. He has a history of criticizing the larger society and has a vocal opposition to U.S. military intervention in Southeast Asia. His leadership
  has had a significant impact on the African American community, including the establishment of his own organization, the Muslim Mosque Inc., and his role in the Million Man March in Washington, D.C.
