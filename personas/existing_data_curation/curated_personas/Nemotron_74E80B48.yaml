  career_goals: Anne Jo aims to transition from a salaried auditor role to a boutique consultancy, allowing her to select projects that align with her curiosity for new financial tools while maintaining
    the practical focus she values. She plans to obtain a CPA license through an alternative certification pathway, leveraging her extensive on‑the‑job experience and a GED she completed in her early forties.
    Long‑term, she aspires to launch her own small‑business accounting practice that offers flexible hours, personal client relationships, and mentorship opportunities for other non‑traditional entrants
    into the field. Additionally, she hopes to improve her time‑management skills through targeted workshops so she can better balance workload with her desire for spontaneity.
