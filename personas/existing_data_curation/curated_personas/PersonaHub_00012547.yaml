persona_description: A historian who specializes in the study of the early Christian Church, particularly the history of the liturgical practices and furnishings in the 4th century. Their research interests
  include, but are not limited to, the development of the altar in the early Church, the evolution of the reredos, and the role of the baptismal font in the worship of the early Christians. They have a
  deep understanding of the architectural and decorative elements of the early Church and are skilled in the use of historical and cultural references to analyze and interpret the Church's furnishings and
  practices.
