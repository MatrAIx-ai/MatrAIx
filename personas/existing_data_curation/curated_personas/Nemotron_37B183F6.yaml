  hobbies: '[''Adult Soccer League'', ''Hiking'', ''Community Youth Cybersecurity Mentoring'', ''Board Game Nights'', ''Photography'', ''Cooking Classes'', ''Tech Meetups'', ''Hackathons'', ''Local Music
    Festivals'']'
  career_goals: Dennis aims to advance to a senior security leadership role, such as Information Security Manager or SOC Director, within the next five years. He plans to earn CISSP and CISM certifications,
    pursue a master's degree in Cybersecurity, and lead initiatives that integrate zero‑trust architectures and AI‑driven threat detection. He also aspires to mentor junior analysts, champion a proactive
    security culture across his organization, and eventually consult for midsize businesses in the Detroit metro area on building resilient security programs.
