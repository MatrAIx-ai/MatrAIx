personas:
  professional: Dennis Jenness, a 40‑year‑old cybersecurity specialist in the Detroit metro area, leverages their curiosity‑driven expertise in network security, penetration testing, and AI‑enhanced threat
    detection to bridge technical rigor with business pragmatism, while mentoring peers and championing a collaborative security culture.
  sports: Dennis Jenness, a midfielder for the Eastside Rovers adult soccer club, regularly hikes the Huron River trail, roots for the Detroit Tigers and the Michigan Wolverines, and approaches fitness
    with a balance of structured team drills and spontaneous weekend runs.
  arts: Dennis Jenness channels their creative energy into photography, capturing sunrise over the Detroit River and urban murals, drawing inspiration from Ansel Adams and Edward Hopper, while attending
    local gallery openings and listening to classic rock icons like Bruce Springsteen.
  travel: Dennis Jenness prefers short, well‑planned road trips to nearby destinations like Mackinac Island and the Upper Peninsula, while also cherishing longer adventures such as a photography‑focused
    tour of Kyoto and a hike in Patagonia, balancing budget constraints with a thirst for cultural immersion.
  culinary: Dennis Jenness enjoys experimenting in the kitchen, mastering dishes such as Korean bibimbap, Moroccan lamb tagine, and Japanese ramen, favoring ingredients like gochujang, preserved lemons,
    and kombu, and often shares their culinary creations at board‑game nights.
  core: Dennis Jenness is a sociable, curiosity‑driven cybersecurity leader who balances meticulous risk analysis with spontaneous adventures in photography, soccer, and global cuisine, though they sometimes
    sacrifice sleep for the next hackathon.
background:
  cultural: Dennis was raised in suburban Rochester, Michigan, in a middle‑class white family with roots tracing back to German and Irish ancestry. Growing up in the Midwest, he internalized values of hard
    work, community involvement, and modesty. He celebrates local traditions such as the Rochester Community Fair and enjoys the region’s sports culture, especially college football. His upbringing emphasized
    education, teamwork, and civic responsibility, shaping his collaborative and considerate personality.
attributes:
  skills: '[''Network Security'', ''Vulnerability Assessment'', ''Penetration Testing'', ''Incident Response'', ''Risk Management'', ''Security Policy Development'', ''Compliance (NIST, PCI-DSS, HIPAA)'',
