personas:
  professional: Roderic Frazier is a seasoned photographer who leverages two decades of expertise in studio lighting, meticulous digital workflow, and client relations to run a methodical solo practice,
    while they use their competitive drive to fuel a strategic plan to launch a multi-service studio and teaching hub for underserved youth in Lakewood.
  sports: Roderic Frazier is an avid basketball enthusiast who plays weekly pick-up games at the local recreation center, follows the Cleveland Cavaliers and Detroit Pistons, and they complement the court
    sessions with regular jogs along the Lakefront Trail, adhering to a disciplined fitness schedule that balances cardio and strength training.
  arts: Roderic Frazier is a devoted jazz and soul aficionado who frequents live shows at Cleveland's Severance Hall and Nighttown, curates a classic R&B vinyl collection featuring artists like Miles Davis
    and Aretha Franklin, and they channel that artistic passion into mentoring at a youth arts program while restoring vintage cameras as a personal creative outlet.
  travel: Roderic Frazier is a methodical traveler who plans weekend road trips to the Ohio Lake Erie islands and the vibrant culinary scene of New Orleans using detailed itineraries, and they prefer immersive
    cultural experiences over luxury, balancing travel costs with the studio's cash flow by booking off-season accommodations and leveraging airline miles.
  culinary: Roderic Frazier is a proficient home chef who blends traditional Southern comfort foods such as fried chicken, collard greens, and shrimp-and-grits with modern twists like smoked paprika-infused
    barbecue sauce, routinely experiments with buttermilk brines and hot-sauce marinades, and they enjoy cooking alongside their wife while swapping recipes inspired by jazz-age cookbooks.
  core: Roderic Frazier is a structured, community-focused visual storyteller whose habit of cataloguing every shot rivals their weekend basketball competitiveness, and they indulge in late-night vinyl
    digging that sometimes keeps them up past a healthy bedtime.
background:
  cultural: Roderic grew up in the Cleveland metropolitan area as part of a close‑knit African‑American family with deep roots in the local church and community organizations. His upbringing was shaped
    by the rich cultural tapestry of the Black neighborhoods of East Side Cleveland, where gospel music, storytelling, and a strong sense of mutual support were daily fixtures. The traditions of family
    gatherings, barbecues, and the celebration of milestones—especially those centered around church holidays—instilled in him a respect for communal resilience and pride. As a Black photographer in the
    Midwest, he draws inspiration from the legacy of civil‑rights activists and artists who documented the Black experience in Ohio, and he often incorporates themes of identity, perseverance, and community
    into his work. His cultural perspective informs both his aesthetic choices—favoring natural light that captures authentic moments—and his commitment to mentoring the next generation of Black creatives.
