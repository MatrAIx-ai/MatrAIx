  hobbies: '[''basketball (pick‑up games)'', ''live music (jazz, soul)'', ''cooking (Southern and soul food)'', ''vintage camera restoration'', ''walking/photography on Lakefront Trail'', ''mentoring youth
    in arts programs'', ''collecting vinyl records'']'
  career_goals: Roderic aims to transform his solo practice into a multi‑service studio that serves local businesses, community organizations, and corporate clients. Over the next five years, he plans to
    open a dedicated studio space in Lakewood that doubles as a teaching hub where he can offer photography workshops to underserved youth, especially within the African‑American community. He also aspires
    to curate a regional exhibition showcasing his documentary series on the Black experience in the Cuyahoga Valley, and to publish a coffee‑table book that blends his portrait work with personal narratives.
    Ultimately, he seeks to be recognized as a trusted visual storyteller who balances commercial success with community impact.
