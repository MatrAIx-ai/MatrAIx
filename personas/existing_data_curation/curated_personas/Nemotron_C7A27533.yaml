  career_goals: Lisa aims to translate her people‑centric strengths into a flexible, community‑focused role. She aspires to become a community outreach coordinator or events planner for a local nonprofit,
    where she can blend curiosity with practicality. In the short term, she plans to take short‑term certificate courses in hospitality or digital marketing to enhance her skill set while maintaining a
    schedule that allows her to pursue personal interests. Ultimately, she hopes to launch a small home‑based venture—such as a catering side‑business or a social‑media‑driven boutique—that offers both
    creative freedom and steady income without requiring a traditional four‑year degree.
