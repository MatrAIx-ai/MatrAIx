  hobbies: '[''Pickup Basketball'', ''Strategy Video Games (Civilization, StarCraft)'', ''Acoustic Guitar'', ''Animal Shelter Volunteering'', ''Hiking in North Texas'', ''CrossFit Classes'']'
  career_goals: Timothy’s primary career ambition is to join a disciplined, structured profession that offers clear progression and community service. He plans to enroll in the Texas Department of Public
    Safety’s law‑enforcement training academy within the next year, earn his certification as a state police officer, and eventually pursue a bachelor’s degree in criminal justice to qualify for detective
    or supervisory roles. In parallel, he intends to obtain a commercial driver’s license and take courses in emergency vehicle operation, positioning himself for a future transition into firefighting or
    emergency‑medical services if he chooses. Long‑term, Timothy seeks financial stability, a predictable schedule, and the ability to lead a team while continuing personal development through continuing‑education
    credits.
