personas:
  professional: Mario Reyes is a data‑driven strategic analyst who blends advanced Excel, SQL, Tableau, and Power BI expertise with a humanities‑sharpened critical mind, using their skeptical yet curious
    outlook to rigorously assess risk, champion process optimization, and translate complex insights into clear, actionable recommendations in fast‑moving corporate environments.
  sports: Mario Reyes participates in a co‑ed soccer league with the Chicago River Soccer Club, follows the Chicago Bears and the Chicago Bulls for seasonal excitement, and complements team play with early
    morning lakefront runs that satisfy both their competitive drive and need for stress‑relieving cardio.
  arts: Mario Reyes regularly explores contemporary art at the Art Institute of Chicago and the Museum of Contemporary Art, draws inspiration from artists like Yayoi Kusama and street‑level provocateur
    Banksy, and unwinds with readings of Haruki Murakami, Margaret Atwood, and the philosophy of Slavoj Žižek.
  travel: Mario Reyes favors purposeful travel that blends cultural immersion with personal growth, having trekked the historic streets of Oaxaca, explored Kyoto’s temples, and planning a future road‑trip
    along the Pacific Coast to experience both artisanal cuisine and scenic lakefront retreats.
  culinary: Mario Reyes enjoys mastering a rich mole sauce and chiles en nogada while infusing modern twists like quinoa‑stuffed empanadas and avocado‑lime salsa, showcasing their strong cooking skills
    by hosting weekly dinner gatherings where friends savor both heritage flavors and experimental dishes.
  core: Mario Reyes is a meticulous, curiosity‑driven analyst who balances competitive ambition with cultural curiosity, channels stress into meditation and soccer, and constantly refines their palate through
    inventive cooking.
background:
  cultural: Mario is a first‑generation Mexican‑American; his parents emigrated from Jalisco when he was a child. Raised in a bilingual household, he celebrated Mexican holidays such as Día de los Muertos,
    Las Posadas, and Mexican Independence Day with extended family, fostering strong family bonds and a deep sense of community. Living in Chicago's vibrant Mexican neighborhood, he actively participates
    in cultural festivals, supports local Mexican‑owned businesses, and incorporates his heritage's values of hospitality, perseverance, and respect into both his personal life and professional collaborations.
