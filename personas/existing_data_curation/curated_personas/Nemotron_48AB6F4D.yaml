  career_goals: Mario aims to advance to a senior management analyst role within the next three to five years, eventually stepping into a director of strategic initiatives position where he can lead cross‑functional
    teams and shape corporate strategy. He plans to earn PMP and CBAP certifications and is considering a part‑time MBA to deepen his leadership and financial acumen. Mario also aspires to champion inclusive
    workplace practices by integrating his cultural perspective into diversity initiatives, mentor junior analysts, and develop robust stress‑management frameworks for high‑performing teams.
