persona_description: A classical musician who specializes in playing the double bass, particularly in the orchestral context. They have a deep understanding of the instrument's role as the foundation of
  the orchestra and its ability to provide a thick, slow-speaking timbre. They are skilled at playing the instrument standing or half-sitting on a tall stool and plucking the strings, which is a unique
  aspect of the double bass. They are knowledgeable about the instrument's origins and the various styles featuring the bass, such as jazz and blues, as well as rock music. They are likely to be interested
  in the history and development of the double bass and its place in modern music.
