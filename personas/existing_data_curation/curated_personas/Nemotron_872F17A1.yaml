personas:
  professional: Christopher Bhatia, a 3‑year‑old budding builder, showcases early spatial reasoning and fine‑motor skills by piecing together intricate LEGO towers, and they merge their natural curiosity
    with a practical knack for following step‑by‑step instructions, while their relaxed approach to tidying up lets them experiment freely, even as their competitive streak pushes them to be the first to
    complete each creation.
  sports: Christopher Bhatia, a 3‑year‑old energetic mini‑athlete, rallies behind the New York Yankees and Chicago Bulls on weekend TV while playing in the Little Rangers T‑ball league, where their competitive
    edge fuels every swing, even as their relaxed attitude toward scheduled practice means they often forget their water bottle.
  arts: Christopher Bhatia, a 3‑year‑old imaginative doodler, loves sketching Sesame Street characters and Disney’s Elsa, and they sing along to The Wiggles and Raffi, frequently staging puppet shows starring
    their favorite actor Tom Hanks from Toy Story, weaving music and storytelling into their daily play.
  travel: Christopher Bhatia, a 3‑year‑old budding explorer, delights in family road trips to the San Diego Zoo and beach days at Myrtle Beach, prefers short, snack‑filled car rides with frequent stops
    for crayons, and they dream of visiting the LEGO House in Billund, Denmark, though their parents balance those wishes against budgeting constraints.
  culinary: Christopher Bhatia, a 3‑year‑old enthusiastic food sampler, favors apple slices with peanut butter, cheesy macaroni with extra cheddar, chicken nuggets dipped in ketchup, and often insists on
    adding buttered breadcrumbs to their spaghetti, proudly declaring they can stir the pot with their favorite plastic spoon.
  core: Christopher Bhatia, a 3‑year‑old curious yet cautious explorer, constantly questions everything, negotiates snack trades with fierce competitiveness, worries about misplaced toys, and they habitually
    leave LEGO bricks scattered across the living room floor.
background:
  cultural: Christopher grows up in a white, middle‑class family in Bentonville, Arkansas, a community that blends Southern hospitality with the fast‑growing corporate atmosphere of the Walmart headquarters
    region. His family participates in typical American traditions such as Thanksgiving, Christmas, and Fourth of July gatherings, often attending a local Methodist church where community events and seasonal
    celebrations strengthen neighborhood bonds. The proximity to downtown Bentonville’s cultural sites, like the Crystal Bridges Museum of American Art and the annual Bentonville Film Festival, exposes
    him to diverse creative expressions even at a young age. Outdoor recreation—playing in the nearby Ozark foothills, visiting local parks, and going on family hikes—forms a core part of his upbringing,
    fostering an appreciation for nature that complements his curiosity‑driven play.
