persona_description: A researcher studying the impact of welfare reform on immigrant families, focusing on legal immigrants, refugees, naturalized citizens, and undocumented immigrants. The researcher is
  interested in understanding the effects of welfare reform on low-income immigrant families with children, their rates of benefit usage before and after the reform, and the success of policies intended
  to broaden health insurance coverage among children. The researcher is also interested in the role of naturalizations or rising incomes within immigrant families in explaining the declining benefit use
  occurring between 1994 and 1999.
