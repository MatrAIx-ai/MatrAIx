  hobbies: '[''Gardening (Vegetable & Herb)'', ''Cooking Peruvian Cuisine'', ''Birdwatching'', ''Reading Historical Nonfiction'', ''Volunteering at Food Banks'', ''Attending Peruvian Cultural Festivals'',
