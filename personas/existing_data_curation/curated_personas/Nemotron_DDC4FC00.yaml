  career_goals: As he approaches retirement, Francisco aims to transition his expertise into a mentorship and consulting role, helping small businesses and non‑profit organizations in the West Des Moines
    area improve operational efficiency. He plans to earn a Six Sigma Black Belt certification within the next year, develop a series of workshops on process improvement for local community colleges, and
    author a practical guide on sustainable business operations. Ultimately, his ambition is to leave a lasting legacy by nurturing the next generation of operations leaders while maintaining a balanced,
    purpose‑driven lifestyle.
