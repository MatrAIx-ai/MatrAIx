  career_goals: Keri aims to advance from her current administrative assistant role to a senior executive assistant or office manager position within the next three years. She plans to obtain the Certified
    Administrative Professional (CAP) credential and pursue a part‑time certificate in project management to broaden her skill set. Long‑term, she envisions moving into a program coordination role at a
    local museum or cultural organization where she can blend her administrative expertise with her passion for history and the arts. She also hopes to develop expertise in digital workflow automation,
    such as using CRM and task‑management platforms, to increase office efficiency and position herself as a strategic partner to senior leadership.
