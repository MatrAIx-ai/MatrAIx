persona_description: A filmmaker who specializes in documentaries and has produced and directed award-winning films about human-wildlife coexistence in post-colonial Africa. He has a passion for storytelling
  and believes that well-told stories can move viewers' hearts and minds regarding crucial, human issues. He has a unique perspective on the relationship between humans and wildlife, having produced and
  directed films that explore the tension between indigenous Kenyans and Namibians and the white expatriates that control tourism in the regions. He has won numerous awards for his films, including Best
  Documentary at festivals such as Full Frame Documentary Film Festival, Durham, N.C., and the Boston International Film Festival, Boston, Mass.
