personas:
  professional: A senior technical director-in-training, Melad Mclaughlin leverages deep expertise in broadcast sound, DMX lighting rigs, and IP‑audio networking, pairing their meticulous safety compliance
    habits with an experimental curiosity that drives innovative live productions.
  sports: A member of the Triangle Trail Club, Melad Mclaughlin tackles spring hikes up the Blue Ridge and follows the Carolina Panthers and Durham Bulls, preferring low‑impact cardio over gym workouts,
    while occasionally joining friendly ultimate‑frisbee games with fellow techs.
  arts: A curator of nocturnal listening sessions, Melad Mclaughlin spins indie folk from Bon Iver and experimental electronic tracks by Boards of Canada and Aphex Twin, while attending independent film
    screenings at the Rialto and drawing inspiration from visual artist James Turrell.
  travel: Melad Mclaughlin favors meticulously planned micro‑adventures, having trekked the Great Smoky Mountains, explored the synth scene in Berlin’s Kreuzberg district, and dreaming of a road‑trip through
    New Zealand’s South Island to capture sunrise over fjords.
  culinary: A home‑brew enthusiast, Melad Mclaughlin crafts seasonal IPAs using Cascade hops and pairs them with charcoal‑grilled pork belly tacos, while their cooking skill hovers at confident, often improvising
    with sweet potato mash and smoked paprika.
  core: Melad Mclaughlin blends a pragmatic, safety‑first mindset with a restless curiosity, turning technical precision into personal hobbies while juggling a penchant for vintage gear and a habit of overlooking
    routine paperwork.
background:
  cultural: Melad grew up in a white, working‑class family in a small town near Raleigh, North Carolina. Leaving formal schooling before completing ninth grade, he entered the workforce early, learning
    trade skills through apprenticeships, community‑college night courses, and on‑the‑job mentorships in the regional broadcast industry. The Southern values of hospitality and community responsibility
    shape his interpersonal style, while the progressive arts scene of Carrboro has broadened his cultural perspective and nurtured his love for independent music and film. His background blends a practical,
    self‑reliant work ethic with an appreciation for the collaborative, creative spirit of the local creative community.
attributes:
  skills: '[''Live audio mixing'', ''Digital console operation'', ''Pro Tools'', ''Reaper'', ''Audio signal routing'', ''Dante networking'', ''Lighting design and programming'', ''DMX and sACN control'',
    ''LED video wall operation'', ''Cable management'', ''Rigging and equipment safety'', ''Troubleshooting under pressure'', ''Collaborative production support'']'
  hobbies: '[''Analog synthesizer tinkering'', ''Custom LED projects'', ''Hiking'', ''Landscape photography'', ''Listening to indie and electronic music'', ''Reading technical forums'', ''Independent film
    watching'', ''Homebrew craft beer'', ''Board game nights'']'
  career_goals: Melad aims to advance to a senior technical director role at a regional public broadcasting station or university media department, where he can shape large‑scale audio‑visual productions.
    He plans to earn industry certifications such as AVIXA’s Certified Technology Specialist (CTS) and Dante certification to validate his expertise in IP‑based workflows. Over the next five years, he hopes
    to spearhead the integration of immersive sound and LED video technologies in local venues, and eventually launch a boutique consulting firm that offers audio‑visual design and training services to
    community theaters and events in the Triangle region. Mentoring apprentices and giving back through workshops at local trade schools are also central to his long‑term vision.
