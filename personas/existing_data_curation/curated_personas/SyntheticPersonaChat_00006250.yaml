    User 1: So, what are you doing for fun these days?

    User 2: I''m not really doing much. I''ve been having a lot of social anxiety lately.

    User 1: Oh, I''m sorry to hear that. I know what you mean. I have social anxiety too.

    User 2: Oh, really? That''s good to know. I thought I was the only one.

    User 1: No, you''re not. There are a lot of people who have social anxiety.

    User 2: That''s good to know.

    User 1: So, what do you do to cope with your social anxiety?

    User 2: I try to avoid social situations as much as possible.

    User 1: I know that can be hard.

    User 2: It is.

    User 1: But there are other things you can do to cope. You can talk to a therapist or join a support group.

    User 2: I''ve thought about doing that.

