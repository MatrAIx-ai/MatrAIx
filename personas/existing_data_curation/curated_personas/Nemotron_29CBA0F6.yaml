  career_goals: Marissa aims to advance from her current secretary role to an office manager or executive assistant position within the next three to five years. She plans to enroll in an associate’s program
    in Business Administration to deepen her knowledge of organizational leadership and project management. By mastering advanced scheduling software and developing stronger time‑management skills, she
    hopes to lead a small administrative team and oversee office operations for a growing company or nonprofit in the Augusta metropolitan area. Financial stability and a work environment that balances
    structure with occasional flexibility are key motivators, as is the opportunity to mentor newer staff members and contribute to a supportive workplace culture.
