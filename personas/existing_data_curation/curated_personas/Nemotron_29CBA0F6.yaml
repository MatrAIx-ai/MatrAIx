personas:
  professional: Marissa Engram, a 22‑year‑old secretary in Augusta, thrives on building orderly filing systems and precise schedules while also deftly handling last‑minute requests with calm composure,
    applying a healthy dose of skepticism to verify details, and they use their strong communication skills to mediate client interactions, all in pursuit of a future office‑manager role.
  sports: Marissa Engram, a 22‑year‑old who enjoys regular walks along the Savannah River Trail, occasional hikes in state parks, and a weekly mindfulness yoga class, also follows the Atlanta Falcons and
    Atlanta Hawks, and they occasionally join a local trail‑running club for casual weekend runs.
  arts: Marissa Engram, a 22‑year‑old quilting enthusiast, frequently reads contemporary fiction by authors like Celeste Ng and self‑help books by Brené Brown, shares crocheted creations at local craft
    fairs, and competes in board‑game nights playing Catan and Ticket to Ride, all of which enrich their creative identity, and they relish the friendly competition.
  travel: Marissa Engram, a 22‑year‑old who balances meticulous planning with spur‑of‑the‑moment road trips, has explored the historic streets of Charleston, the mountain retreats of Asheville, and regularly
    escapes to nearby state parks, while they budget modestly for weekend getaways.
  culinary: Marissa Engram, a 22‑year‑old who loves cooking Southern comfort dishes such as fried chicken seasoned with smoked paprika, collard greens simmered with ham hocks, and peach cobbler made with
    fresh stone fruit, they also experiment with new recipes like Korean bibimbap and vegan jackfruit tacos.
  core: Marissa Engram, a 22‑year‑old navigating the tension between a love for structured routines and spontaneous creativity, channels their competitive edge and anxiety into meticulous work habits, vibrant
    quilting projects, and occasional impulsive culinary experiments, and they often find solace in journaling.
background:
  cultural: Marissa was raised in the small‑town Southern environment of Hephzibah, Georgia, within a predominantly white, middle‑class community that values family ties, church involvement, and modest
    hospitality. Growing up, she participated in church activities, community festivals, and local high school events, which underscored the importance of tradition, respect for elders, and a strong sense
    of place. The Southern culinary heritage—home‑cooked meals, seasonal ingredients, and shared picnics—has shaped her food preferences and social gatherings. While her upbringing emphasized conventional
    values and a close‑knit community network, Marissa also experiences modern influences through social media and pop culture, allowing her to blend classic Southern sensibilities with contemporary interests.
    Her cultural perspective reflects a balance of staying grounded in hometown roots while seeking personal growth and broader opportunities.
