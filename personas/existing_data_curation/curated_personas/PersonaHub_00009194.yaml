persona_description: A historian and political analyst who specializes in studying the roots, premises, and worldviews of anti-Americanism, as well as the phenomenon of anti-Americanism as it is experienced
  and expressed by people living in the United States, the causes and manifestations of anti-Americanism in various places outside the United States, the anti-American worldviews of the religious left,
  the prevalence of anti-Americanism among college and university professors, the transmission of anti-American attitudes and worldviews to children in classrooms across the United States, the messages
  conveyed by two of the most prominent and influential anti-Americans of recent times, the filmmakers Oliver Stone and the late historian Howard Zinn, and the refutations of the charge that the United
  States is a force of evil in the world.
