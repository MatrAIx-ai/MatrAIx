persona_description: A historian interested in the Neolithic and Bronze Age history of the Avalon Marshes, specifically focusing on the changes in the landscape and the interactions between Neolithic and
  Bronze Age man and the environment. This person is also knowledgeable about the development of the River Axe and the impact of the Roman Empire on the marshes. They are interested in the role of the church
  in controlling and exploiting the marshes during medieval times and the changes brought about by the enclosure acts in the 18th and 19th centuries. They are also interested in the impact of the Puriton
  munition works and the growing horticultural use of peat on the landscape of the Avalon Marshes.
