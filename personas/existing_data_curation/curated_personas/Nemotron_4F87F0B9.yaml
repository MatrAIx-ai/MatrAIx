personas:
  professional: Jesse Avery is a senior B2B sales representative in wholesale manufacturing who merges a methodical pipeline-management approach with a curiosity for AI-driven lead scoring, routinely extracting
    insights from Salesforce, HubSpot, Power BI and emerging Python automations to hit and exceed quotas while strategically mapping a two-year path toward a sales-manager position and a future entrepreneurial
    venture.
  sports: Jesse Avery is a disciplined long-distance runner who trains with the New York Road Runners club, competes in the annual NYC Marathon, cross-trains at Brooklyn Strength gym, and follows the New
    York Yankees, Knicks, and Rangers with the same methodical enthusiasm they bring to their weekly 10-mile river runs.
  arts: Jesse Avery captures the industrial-glamour of Long Island City's warehouses and the shimmering Manhattan skyline with a Nikon Z6, drawing visual inspiration from Andreas Gursky and Jacob Riis,
    while their playlist of Radiohead, The National, and Tame Impala fuels nighttime editing sessions and their reading list alternates between classic sci-fi by Isaac Asimov and cyber-punk by William Gibson.
  travel: Jesse Avery favors meticulously planned weekend getaways to the Catskill Mountains for hiking, budget-friendly overnight trips to Washington, D.C. to explore museums, and long-haul flights to
    Tokyo for tech conferences, balancing a love of discovery with a strict travel budget managed through the TripIt app.
  culinary: Jesse Avery experiments in the kitchen by deconstructing comfort staples—such as sous-vide chicken pot pie with a smoked-paprika crust and miso-infused mac & cheese—while sourcing fresh herbs
    and vegetables from the community garden they volunteer at, mastering techniques like caramelizing onions, perfect poaching, and using a sous-vide precision cooker.
  core: Jesse Avery is a methodical, curiosity-driven sales professional who runs riverside marathons, snaps urban skylines, cooks modern comfort food, and balances a disciplined financial plan with a stubborn
    coffee habit.
background:
  cultural: Jesse is a white American who grew up in a middle‑class family in Queens, New York. His upbringing emphasized hard work, self‑reliance, and community responsibility, values that continue to
    shape his professional and personal decisions. While his heritage traces back to Northern European ancestors, he identifies strongly with the multicultural fabric of New York City, which has broadened
    his perspective and fostered an appreciation for diverse viewpoints. He celebrates traditional holidays such as Thanksgiving and the Fourth of July with family, but also participates in neighborhood
    events that reflect the city’s ethnic mosaic. This blend of a pragmatic, results‑oriented American work ethic and exposure to a vibrant, diverse urban environment informs his balanced approach to curiosity,
    practicality, and interpersonal engagement.
attributes:
