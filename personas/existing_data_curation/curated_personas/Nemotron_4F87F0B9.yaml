  career_goals: Jesse aims to transition from senior sales representative to sales manager within the next two years, leading a small high‑performing team focused on sustainable product lines in the manufacturing
    sector. He plans to earn a Certified Professional Sales Leader credential and enroll in a part‑time MBA program to deepen his strategic and financial acumen. Over the next five to seven years his ambition
    is to become a director of sales, shaping regional go‑to‑market strategies and mentoring emerging talent. Ultimately he envisions launching his own wholesale distribution venture that leverages data‑driven
    sales processes while maintaining the reliability and ethical standards he values. Throughout his career progression he intends to balance aggressive growth targets with realistic planning, ensuring
    each step aligns with his methodical, results‑oriented mindset.
