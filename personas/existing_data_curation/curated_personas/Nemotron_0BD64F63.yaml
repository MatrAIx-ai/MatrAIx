  career_goals: Nancy aims to transition from store‑level supervision to a regional management role where she can influence broader operational policies and champion employee well‑being across multiple
    locations. She envisions creating a mentorship program that pairs seasoned supervisors with emerging retail talent, integrating compassion‑focused training modules that address stress management and
    workplace harmony. In the longer term, she hopes to consult for small‑town retailers, helping them adopt flexible staffing models and community‑centric marketing strategies while eventually scaling
    back to part‑time work that allows more time for volunteer leadership in Glenvil.
