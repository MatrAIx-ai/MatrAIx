personas:
  professional: Jason Fuller, a 36‑year‑old restaurant operations manager with a STEM foundation, leverages data‑driven inventory control, predictive sales analytics, and hands‑on equipment troubleshooting
    to run a sleek dining venue while their laid‑back, sometimes chaotic schedule reflects a love of flexibility and a willingness to assert themselves when steering the vision toward a future farm‑to‑table
    gallery.
  sports: Jason Fuller spends weekends scaling the Rocky Mountains on foot and tackling rugged trails on a mountain bike with the Front Range Riders club, follows the Colorado Rockies baseball team and
    the Denver Broncos football squad, and balances high‑intensity cardio with weekly yoga sessions that ease the strain from their adventurous fitness routine.
  arts: Jason Fuller curates their restaurant’s visual vibe by sketching street‑art murals inspired by the works of Denver’s own Cletus Wentz and photographing installations by the St. Lawrence Street Art
    Collective, while unwinding at indie‑film screenings featuring directors like Greta Gerwig and attending live shows by Bon Iver and local folk singer Kaitlyn Davies, letting these creative encounters
    shape their design sensibility.
  travel: Jason Fuller prefers spur‑of‑the‑moment road trips that blend high‑altitude hikes in Rocky Mountain National Park with cultural detours to Kyoto’s fermented food markets and Barcelona’s street‑art
    districts, plans loosely using a simple spreadsheet that leaves room for last‑minute detours, and balances their travel budget between modest camping gear purchases and splurges on boutique wineries
    they discover along the way.
  culinary: Jason Fuller, an avid home‑brewer and sourdough enthusiast, experiments with wild‑yeast levains, fermented beet and carrot kimchi, and a seasonal wild‑mushroom risotto topped with locally sourced
    heirloom tomatoes, showcasing a chef‑level skill set that merges scientific precision with artistic plating, and regularly hosts tasting evenings featuring their own IPA brewed with citrus hops.
  core: Jason Fuller is a curiosity‑driven restaurant manager who balances data‑rich efficiency with a laid‑back, sometimes chaotic lifestyle, channeling stress into yoga, improvisational art, and experimental
    fermentation while occasionally juggling anxiety and a penchant for spontaneous mountain‑bike adventures.
background:
  cultural: Jason grew up in the Denver metropolitan area, raised in a middle‑class white family that valued self‑reliance, education, and a strong connection to the outdoors. Frequent family trips to the
    mountains instilled a lifelong love of hiking, skiing, and environmental stewardship. Living in Arvada, he is immersed in a community that blends Colorado’s rugged western heritage with progressive,
    arts‑focused values. The local culture emphasizes sustainability, craft food and beverage scenes, and support for independent creators, all of which shape Jason’s worldview and professional ambitions.
