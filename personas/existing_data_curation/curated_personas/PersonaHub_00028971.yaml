persona_description: A materials scientist and engineer with expertise in electrochromic materials and inkjet-printing technology. They are interested in exploring the use of electrochromic materials and
  inkjet-printing process for flexible and stretchable electronics applications. They are looking for new materials and techniques to improve the performance of electrochromic devices and to make them more
  suitable for use in stretchable and flexible electronics. They are likely to be familiar with the chemical and physical properties of electrochromic materials and have experience with inkjet-printing
  technology. They may have a background in materials science, physics, or engineering and have a passion for innovation and discovery.
