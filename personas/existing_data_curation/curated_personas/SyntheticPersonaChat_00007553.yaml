    User 2: You should definitely give it a try! It''s a great way to get out in nature and explore.

    User 1: I will! I''ll have to find some good hiking trails near my college.

    User 2: You can do that online or you can ask a local hiking group.

    User 1: Thanks for the tip! I''ll definitely do that.

    User 2: No problem! So, what''s your favorite phone?

    User 1: I''m not really an Apple person, so I have a Samsung Galaxy.

