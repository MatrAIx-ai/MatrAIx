  career_goals: Luz Maria aspires to study environmental engineering or public health at a university such as Oregon State, focusing on sustainable urban agriculture and community health in Latino neighborhoods.
    She wants to combine her scientific curiosity with her cultural roots, developing affordable, eco‑friendly food systems that honor Mexican culinary traditions. In the long term, she hopes to lead a
    nonprofit that provides bilingual education and mentorship for under‑represented teens, helping them navigate STEM careers while staying connected to their heritage.
