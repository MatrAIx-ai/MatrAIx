personas:
  professional: Luz Perez, a budding robotics enthusiast, merges their curiosity with practicality by designing simple autonomous bots for school competitions, leveraging a meticulous organization style
    and a flair for graphic storytelling to prototype user‑friendly interfaces.
  sports: Luz Perez runs cross‑country with the school Eagles team in spring, joins weekend pick‑up soccer games with the Riverside Youth Club, and follows professional teams like the Los Angeles Dodgers
    and Dallas Stars from a distance, preferring low‑intensity exercise that fits their reserved nature.
  arts: Luz Perez draws intricate characters inspired by graphic novelists such as Marjane Satrapi, listens to traditional folk melodies by Lila Downs alongside indie acoustic tunes from Iron & Wine, and
    spends evenings sketching while humming these songs, occasionally sharing their creations at the community center's cultural events.
  travel: Luz Perez has explored the historic town of San Miguel de Allende, dreams of attending the anime convention in Tokyo, and enjoys weekend getaways to the mountain resort of Valle de Bravo, planning
    trips meticulously to stay within a modest budget while balancing school responsibilities.
  culinary: Luz Perez experiments with family recipes, skillfully preparing dishes like tamales, pozole, and fresh salsa verde, while also trying to perfect a homemade guacamole, treating cooking as a therapeutic
    outlet that complements their love for science‑fiction narratives.
  core: Luz Perez is a tech‑savvy, introspective teen who balances a passion for robotics and graphic storytelling with a tendency to overthink and occasional anxiety, often finding calm in sketching and
    mindfulness.
background:
  cultural: Luz Maria was born to Mexican immigrant parents who settled in Salem’s Eastside neighborhood. At home, Spanish is spoken alongside English, and the family celebrates Mexican holidays such as
    Día de los Muertos, Las Posadas, and Mexican Independence Day, often preparing home‑cooked meals that blend regional flavors with Pacific Northwest ingredients. Her grandparents passed down recipes
    and stories that instilled a sense of pride in her heritage. While attending a public middle school, she navigates a bicultural identity, balancing the expectations of her family’s traditional values—respect
    for elders, hard work, and community solidarity—with the broader American culture of independence and self‑expression. This dual perspective informs her outlook on education, community involvement,
    and future aspirations.
