personas:
  professional: Brandi Potter, a retired program coordinator turned senior advisory board chair, leverages her meticulous event-planning expertise and confident public-speaking to orchestrate community-center
    programs with a lively, talkative flair that keeps volunteers engaged and projects running on schedule.
  sports: Brandi Potter, a steadfast fan of the Cleveland Browns and Guardians, joins the senior center's weekly bridge gatherings as her primary 'sport,' while maintaining fitness through daily lakeside
    walks and occasional bird-watching hikes during the spring and fall seasons.
  arts: Brandi Potter regularly attends productions by the Sandusky Playhouse, cherishes the classic films of Fred Astaire and Ginger Rogers, and keeps a collection of watercolor paintings by local artist
    Mary Beth Collins, finding inspiration for her own genealogical storytelling.
  travel: Brandi Potter prefers meticulously planned road trips, having toured the Perry's Victory and International Peace Memorial, the Rock and Roll Hall of Fame in Cleveland, and a weekend getaway to
    Mackinac Island, yet she still dreams of a leisurely cruise along the Great Lakes to explore historic lighthouses.
  culinary: Brandi Potter delights in preparing Midwest staples such as chicken pot pie with rosemary-infused crust, homemade apple crumble topped with nutmeg, and hearty bean soup seasoned with thyme from
    her garden, showcasing a skilled, home-cook approach that blends tradition with fresh, garden-grown ingredients.
  core: Brandi Potter balances a regimented, schedule-obsessed mindset with an infectious love for community storytelling, often losing track of time while knitting scarves for charity and occasionally
    hoarding vintage postcards from her travels.
background:
  cultural: Brandi is a white Midwestern American whose family roots trace back to German and Irish immigrants who settled in the Great Lakes region in the early 20th century. Raised in a modest, Protestant
    (Methodist) household in the 1930s and 1940s, she internalized values of hard work, community service, and modest hospitality common to Sandusky, Ohio. The city’s mix of industrial, maritime, and small‑town
    traditions informs her deep appreciation for local history, seasonal festivals, and the practical, down‑to‑earth outlook that characterizes her generation.
