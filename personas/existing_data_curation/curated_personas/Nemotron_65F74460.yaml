  hobbies: '[''Book clubs'', ''Historical fiction reading'', ''Knitting and crocheting'', ''Gardening'', ''Cooking and baking'', ''Volunteer work at library'', ''Bridge (card game)'', ''Community theater
    attendance'', ''Genealogy research'', ''Walking along Lake Erie'', ''Birdwatching'', ''Road trips to historical sites'', ''Hosting social gatherings'']'
  career_goals: Although retired, Brandi aims to remain a civic leader by chairing the senior advisory board at the Sandusky community center, curating a traveling exhibit on the city’s maritime heritage,
    and publishing a memoir that weaves together her personal history with mid‑20th‑century American life. She wishes to mentor younger volunteers through a storytelling program in local schools, continue
    her lifelong learning by taking a community‑college course in digital storytelling, and ensure the preservation of the town’s historical archives for future generations.
