  hobbies: '[''Hiking in the Wasatch Mountains'', ''Adult basketball league'', ''Family cooking'', ''Volunteer work at local food bank'', ''Nature photography'', ''Board game nights'', ''Trivia contests'']'
  career_goals: Phillip aims to advance from his current clerical position to a senior billing specialist or accounting coordinator role within the next three to five years. He plans to complete his associate
    degree in business administration and pursue a Certified Billing Specialist (CBS) credential, which will bolster his credibility and open doors to supervisory responsibilities. Long‑term, he envisions
    moving into a finance manager or small‑business owner capacity, where he can combine his practical financial expertise with his interest in community‑focused enterprises. Balancing career growth with
    family time remains a core priority, so he seeks roles that offer stable hours and opportunities for mentorship and team leadership.
