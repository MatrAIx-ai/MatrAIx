personas:
  professional: An ambitious construction manager who blends hands‑on technical expertise with a lively, community‑focused leadership style, Alfredo Alicea leverages curiosity and practical problem‑solving
    to keep projects on schedule while navigating the emotional highs of site life.
  sports: Alfredo Alicea plays pick‑up basketball at the Scranton community center, follows the Philadelphia Eagles in the NFL and the New York Knicks during the NBA season, and participates in a local
    hiking club that explores the Pocono trails each summer, balancing competitive sport with outdoor recreation.
  arts: Alfredo Alicea immerses himself in the beats of Bad Bunny, the smooth salsa of Marc Anthony, and the vibrant rhythms of merengue and bachata during nightly dance events, while also supporting local
    theater productions at the F.M. Kirby Center, letting music and performance shape his social world.
  travel: Alfredo Alicea prefers spontaneous weekend getaways, often heading to the Pocono Mountains for hikes, but also plans annual trips to New York City’s cultural festivals and dreams of exploring
    Barcelona’s historic streets, balancing a modest travel budget with his craving for new experiences.
  culinary: Alfredo Alicea is an enthusiastic home chef who expertly prepares sancocho and mangú, seasoning with cilantro, ajíes, and ripe plantains, while also experimenting with fusion dishes that blend
    smoky barbecue brisket with Caribbean spices, showcasing his love for both tradition and innovation.
  core: Alfredo Alicea is a charismatic, high‑energy construction manager who balances a love for community celebrations and DIY projects with a restless emotional temperament that fuels both his ambition
    and occasional impulsiveness.
background:
  cultural: Alfredo was raised in a close‑knit Dominican‑American household where Spanish was spoken at home and Catholic traditions marked family celebrations. His parents instilled a respect for community,
    music, and food, and he grew up attending Dominican festivals in the New York‑New Jersey area before moving to Scranton. This bicultural upbringing gives him a strong sense of identity, combining the
    warmth and rhythm of Caribbean culture with the practical, industrious spirit of the Rust Belt. He often shares Dominican stories and recipes with coworkers, and he feels a responsibility to represent
    his heritage positively while navigating life in a predominantly white, working‑class town.
attributes:
  skills: '[''Project Management'',''Construction Site Supervision'',''Budgeting and Cost Control'',''Safety Compliance (OSHA)'',''Blueprint Reading'',''Team Leadership'',''Conflict Resolution'',''Basic
