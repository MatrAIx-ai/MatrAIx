  hobbies: '[''Basketball'',''Merengue and Bachata Dancing'',''Cooking Dominican Cuisine'',''Hiking'',''Reggaeton Listening'',''Multiplayer Video Gaming'',''DIY Home‑Improvement'',''Community Festival Participation'',''Volunteering'']'
  career_goals: Alfredo aims to progress from managing individual construction sites to overseeing large‑scale commercial projects in the Northeastern corridor. He plans to obtain a professional General
    Contractor license and a master's degree in Construction Management within the next three years. Long‑term, he dreams of launching his own construction firm that focuses on eco‑friendly building methods
    and provides mentorship opportunities for young Latino workers. He also hopes to develop stronger stress‑management skills to handle his high emotional reactivity, allowing him to lead teams more calmly
    and sustainably.
