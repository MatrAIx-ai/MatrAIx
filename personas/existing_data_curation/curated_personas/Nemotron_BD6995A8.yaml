  career_goals: Reginald aims to move from his current business-operations specialist role into senior leadership, targeting positions such as Operations Manager, Director of Business Process Improvement,
    or Head of Innovation within a fast-moving, culturally-rich company. He wants to be known for designing flexible, high-performance processes that support creative teams, and to eventually launch his
    own consultancy that helps arts-focused startups scale efficiently. He also seeks to become a sought-after speaker at industry conferences, sharing insights that blend operational rigor with unconventional,
    artistic thinking, while building a reputation that outpaces his peers.
