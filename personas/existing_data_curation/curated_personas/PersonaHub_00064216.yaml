persona_description: A scientist or engineer who specializes in the field of audio technology and sound synthesis, particularly in the creation of spatial sound. They have a deep understanding of the principles
  of 3D sound synthesis, including the use of Head-Related Transfer Functions (HRTFs) to accurately control the location and quality of synthesized sounds. They have experience in developing and implementing
  3D sound systems for various applications, such as human/computer interfaces, computer games, and virtual reality systems. They are skilled in manipulating cues such as azimuth and elevation to create
  a sense of depth and presence in the synthesized sound. They have a passion for exploring the mysteries of sound perception and how it can be harnessed to enhance the user experience.
