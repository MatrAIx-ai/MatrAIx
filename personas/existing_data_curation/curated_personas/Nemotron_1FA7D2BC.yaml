  career_goals: Approaching retirement, Elizabeth aims to leave a lasting imprint on her organization by spearheading a strategic HR transformation that embeds mental‑health awareness, flexible work policies,
    and creative learning experiences into the corporate culture. She envisions establishing a mentorship program for emerging HR professionals and publishing a practical guide on integrating arts‑based
    methods into employee development. Beyond her company, she hopes to transition into a part‑time HR consultancy focused on small businesses in Iowa, helping them build resilient, inclusive workplaces
    while continuing her volunteer work with local arts councils and community wellness initiatives.
