persona_description: A zoologist and optometrist who specializes in the study of animal behavior and the development of pupils in animals. His research interests include the effects of different pupil shapes
  on visual acuity and orientation, the role of orientation in predator avoidance and prey detection, and the importance of accurately gauging the distance between predators and prey in ambush predators.
  He has conducted extensive fieldwork at zoos and farms to observe grazing animals and ambush predators, and has developed computer models to study the effects of different pupil shapes and orientations
  on visual acuity and orientation. He is particularly interested in the development of vertical pupils in ambush predators, and has published several papers on the topic.
