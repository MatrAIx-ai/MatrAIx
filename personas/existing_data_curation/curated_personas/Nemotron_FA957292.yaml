personas:
  professional: Priscilla Wiley, a seasoned manufacturing floor veteran with thirty years operating presses and CNC machines, blends curiosity-driven process tweaks with a practical focus on safety, and
    they are poised to step into a supervisory or OSHA safety‑trainer role to mentor new hires while easing physical strain.
  sports: Priscilla Wiley enjoys line dancing at country‑music venues, often competing in friendly dance‑offs, walks the Oak Mountain State Park trails three times a week, cheers for the Alabama Crimson
    Tide football team on Saturdays, and they also dominate senior center bingo and bridge tournaments, staying casually fit through community fitness classes.
  arts: Priscilla Wiley sings alto in the church choir, often performing classics by Dolly Parton and Johnny Cash, competes in regional quilting contests inspired by the works of Mary Elizabeth Carter,
    and they attend classic‑car shows where they admire the design aesthetics of vintage Chevrolet pickups.
  travel: Priscilla Wiley prefers road‑trip adventures with a practical itinerary, having driven the scenic routes through the Great Smoky Mountains and spent a weekend in Nashville’s music district, while
    they dream of a relaxed getaway to Savannah’s historic squares, balancing travel cost with a modest travel fund.
  culinary: Priscilla Wiley cultivates tomatoes, beans, and magnolia blooms in a backyard garden and turns the harvest into rustic tomato‑bean stew seasoned with fresh basil and smoked paprika, enjoys cooking
    Southern‑style fried catfish with corn‑meal crust, and they delight in baking biscuits with buttermilk and honey butter.
  core: Priscilla Wiley is a hands‑on, community‑driven 58‑year‑old who mixes practical manufacturing know‑how with a love for choir, quilting, and classic‑car tinkering, all while they juggle retirement
    worries and a competitive streak.
background:
  cultural: Priscilla was born and raised in Montevallo, Alabama, a close‑knit Southern town where family, church, and community events shape daily life. Her grandparents farmed the surrounding countryside,
    and her father worked in a nearby textile mill, embedding a strong work ethic and appreciation for manual trades in her upbringing. As a lifelong Southern Baptist, she values hospitality, shared meals,
    and regular church gatherings. The local culture’s emphasis on friendliness, modesty, and respect for tradition informs her social interactions, while the region’s industrial history gave her exposure
    to manufacturing early on. Growing up with Southern cuisine—fried chicken, biscuits, and collard greens—she carries those culinary comforts into her adult life, and her speech carries the gentle drawl
    of rural Alabama. These roots, combined with her practical education through a high‑school diploma, have shaped a resilient, community‑oriented identity that balances curiosity with a grounded, hands‑on
    approach to life.
attributes:
  skills: '["Machine operation","Assembly line workflow","Basic CNC troubleshooting","Equipment maintenance","Safety compliance (OSHA)","Inventory control","Quality inspection","Team coordination","Problem
