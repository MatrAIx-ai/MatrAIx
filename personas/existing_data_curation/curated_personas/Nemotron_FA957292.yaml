  hobbies: '["Church choir","Line dancing","Gardening (vegetables & flowers)","Quilting","Bingo","Card games (bridge, spades)","Volunteering at food pantry","Walking in Oak Mountain State Park","Classic
    car shows","DIY home repairs"]'
  career_goals: Looking ahead, Priscilla wants to transition from line work to a supervisory or safety‑trainer role within the next two years, allowing her to share her knowledge while reducing the physical
    strain of the job. She plans to complete an OSHA 30‑hour certification and attend a short leadership workshop offered by her employer. By becoming a shift lead or certified safety officer, she hopes
    to mentor younger workers, champion a more organized work environment, and secure a stable position as she approaches retirement. Outside the plant, she dreams of converting her mechanical knack into
    a modest side venture—hand‑crafted wooden furniture or custom quilts—that could supplement her income and keep her creatively engaged.
