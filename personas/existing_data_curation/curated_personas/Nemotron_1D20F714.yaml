personas:
  professional: Lakisha Bobb, an experienced building maintenance specialist, leverages decades of hands‑on HVAC, plumbing, and electrical expertise to lead crews, schedule preventive maintenance, and ensure
    safety compliance, while preparing for formal certification and a supervisory role at a senior‑housing complex, and they excel at coordinating teams with a blend of structure and flexibility.
  sports: Lakisha Bobb stays active by joining the Staten Island senior softball league, walking the waterfront five days a week, cheering for the New York Yankees during summer and the New York Knicks
    in winter, and they participate in a community yoga class that balances their need for structure with social interaction.
  arts: Lakisha Bobb nurtures a love for the arts through their community choir, where they enjoy singing hymns by Mahalia Jackson and gospel renditions of Aretha Franklin, and indulges in mystery novels
    by Agatha Christie and Tana French, while they occasionally attend off‑Broadway productions featuring actors like John Leguizamo.
  travel: Lakisha Bobb prefers low‑key road trips, having explored the historic Hudson Valley towns of Hudson and Rhinebeck, taken weekend cruises to the Hamptons, and they dream of a winter escape to Asheville,
    North Carolina, all planned with a careful budget and a desire to travel with their choir friends.
  culinary: Lakisha Bobb delights in cooking soulful Southern‑style dishes such as smoked collard greens, pan‑fried catfish, and sweet potato cornbread, skillfully seasoning with smoked paprika, garlic,
    and a pinch of hot sauce, while they also experiment with vintage radio repairs over dinner, making their kitchen both a culinary and tinkering haven.
  core: Lakisha Bobb blends meticulous maintenance expertise, community spirit, and a penchant for soulful cooking into a vibrant, sometimes worry‑prone life that balances structure with outgoing social
    rhythms, and they never miss a bingo night.
background:
  cultural: Lakisha grew up in a working‑class African‑American family that migrated to New York during the post‑World War II Great Migration. Her upbringing was shaped by strong church ties, a deep respect
    for community solidarity, and the traditions of Southern cuisine and oral storytelling passed down from her grandparents. Living in Staten Island, she balances the cultural rhythms of Black New York
    life—music, festivals, and neighborhood networks—with the practical demands of her trade, embodying resilience and pragmatism forged by generations of perseverance.
attributes:
  skills: '[''HVAC maintenance'', ''plumbing repairs'', ''electrical troubleshooting'', ''basic carpentry'', ''preventive maintenance scheduling'', ''safety compliance'', ''team leadership'', ''budget monitoring'',
