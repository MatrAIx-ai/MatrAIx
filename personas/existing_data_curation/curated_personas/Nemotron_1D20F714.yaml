  hobbies: '[''community choir'', ''volunteering at senior center'', ''community gardening'', ''bingo nights'', ''cooking soulful Southern dishes'', ''reading mystery novels'', ''DIY electronics tinkering'',
    ''walking the Staten Island waterfront'']'
  career_goals: Approaching retirement, Lakisha aims to earn an official HVAC certification to formalize the expertise she has built over decades and to qualify for a supervisory building‑manager role at
    a senior‑housing complex. She also hopes to mentor younger apprentices from the local community, eventually establishing a modest, part‑time handyman service that can supplement her pension while keeping
    her socially engaged and financially secure.
