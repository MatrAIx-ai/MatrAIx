  career_goals: Although approaching retirement, Gail aims to transition into a mentorship and advisory role where she can share her decades of administrative expertise while staying connected to her passion
    for the arts. She is pursuing a Certified Administrative Professional (CAP) credential and exploring part‑time consultancy for nonprofit galleries and cultural institutions in Las Vegas, hoping to help
    them modernize their administrative systems. Gail also wishes to lead a small team as an office manager in an arts‑focused nonprofit, combining her love of art with her organizational talent. Additionally,
    she plans to develop a workshop series on effective office practices and stress‑management for senior workers, reflecting her desire to reduce workplace anxiety and promote well‑being.
