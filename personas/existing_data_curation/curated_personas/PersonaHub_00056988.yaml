persona_description: An archaeologist or historian with a specialization in Creek Indian history and archaeology. They are particularly interested in the period of Macon during the 1690s-1718, when the
  area was a major trading hub for the Creek people. They have a keen eye for detail and are skilled in excavation and artifact analysis. They have a deep understanding of the historical context and the
  cultural significance of the site, making them an expert in interpreting the artifacts found there. They are also knowledgeable about the Yamasee War and its impact on the Creek people, as well as the
  history of English-backed Creeks in the region.
