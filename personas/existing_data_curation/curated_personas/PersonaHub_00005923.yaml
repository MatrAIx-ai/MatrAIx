persona_description: A group of researchers who specialize in the study of PTSD, particularly the development of blood tests to identify the disorder. They are part of a consortium of labs that analyze
  blood work and other biological data from men who have served in combat in Afghanistan and Iraq. Their work is focused on systems biology and uses a "wisdom of crowds" approach to identify indicators
  linked to PTSD. They have successfully narrowed down the million indicators to 343, and are now using additional statistical techniques to pinpoint a set of 28 highly predictive markers. They are hopeful
  that their findings will lead to the development of a positive blood test for PTSD, which could identify people who need additional assessment and treatment.
