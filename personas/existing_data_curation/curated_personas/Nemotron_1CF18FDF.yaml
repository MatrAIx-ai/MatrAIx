personas:
  professional: Jose Morales, a budding LEGO architect, excels at sorting blocks by color and size, leads collaborative building projects at preschool, and uses their compassionate nature to help classmates
    troubleshoot designs.
  sports: Jose Morales participates in the community’s Tiny Tots Soccer league, proudly wears a miniature Chicago Cubs cap during games, and attends Saturday swimming lessons at the local YMCA, balancing
    team enthusiasm with personal fitness goals.
  arts: Jose Morales loves drawing superhero comics in the preschool art corner, hums along to The Wiggles’ catchy tunes, and enjoys re‑enacting scenes from Pixar’s Toy Story with action figures, reflecting
    a vivid imagination nurtured by collaborative play.
  travel: Jose Morales prefers well‑planned family trips, especially short drives to the zoo or weekend stays at a beachfront resort, cherishing predictable itineraries while daydreaming about a future
    adventure to Disneyland.
  culinary: Jose Morales delights in creamy macaroni and cheese sprinkled with cheddar, helps stir batter for banana pancakes, and insists on crunchy apple slices as a side, revealing a budding palate that
    favors comforting staples with a hint of culinary curiosity.
  core: Jose Morales is a structured, sociable five‑year‑old who balances a love for organized play with a compassionate streak, thriving on predictable routines while eagerly sharing experiences with friends.
background:
  cultural: Jose is raised in a Mexican‑American household in Houston, Texas. Spanish is spoken at home, and he celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings
    featuring tacos, tamales, and aguas frescas. He blends Mexican cultural values—family closeness, respect for elders, and community harmony—with the diverse influences of the broader Houston community,
    giving him a bicultural perspective.
