  career_goals: Jose dreams of growing up to be someone who helps others and keeps his community safe and healthy. He talks about wanting to become a teacher so he can guide friends in learning, a firefighter
    to protect people, or a pediatrician to care for children. He also hopes to finish school, stay bilingual, and continue contributing to his family and neighborhood.
