    ''Project Management'', ''Patient Advocacy'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Chinese calligraphy and brush painting'', ''Fusion cooking'', ''Hiking in Santa Monica Mountains'', ''Playing chess and Go'', ''Jazz and classical
    music appreciation'', ''Volunteering at community health fairs'', ''Reading sci‑fi and health‑innovation literature'', ''Traveling to Guangdong and Taiwan'']'
  career_goals: Hoi aims to complete his bachelor's degree and obtain a Master’s in Health Administration within the next three years, followed by the FACHE certification. His long‑term ambition is to become
    a senior executive—such as Vice President of Operations or Chief Operating Officer—of a large, multi‑site health system in Southern California. He envisions leading a network‑wide transformation that
    integrates advanced analytics, AI‑driven clinical support, and evidence‑based art‑therapy programs to improve patient outcomes and health‑equity, particularly for underserved Asian‑American communities.
    Additionally, he plans to mentor emerging health‑care leaders from diverse backgrounds and contribute thought pieces on innovative health‑service models to professional journals.
