personas:
  professional: Jeral Simpson, a seven‑year‑old budding robotics enthusiast, combines meticulous LEGO construction with early coding experiments in their after‑school robotics club, showcasing a methodical,
    curiosity‑driven approach that hints at a future in engineering.
  sports: Jeral Simpson plays on the Riverdale Rovers youth soccer team, occasionally practices swimming at the community pool, and fervently supports the Chicago Cubs and Chicago Bulls, channeling their
    competitive spirit into both team play and personal fitness routines.
  arts: Jeral Simpson enjoys the whimsical animation of Studio Ghibli’s My Neighbor Totoro, the classical piano works of Ludwig van Beethoven, and collects LEGO minifigures that double as figurines of favorite
    characters, weaving creative storytelling into their leisure time.
  travel: Jeral Simpson prefers meticulously planned family road trips, such as the recent weekend excursion to the Grand Canyon National Park where they collected rocks, while dreaming of a future voyage
    to the Kennedy Space Center to see real rockets, balancing curiosity with a need for structure.
  culinary: Jeral Simpson favors simple, hands‑on meals like homemade grilled cheese sandwiches and fruit kebabs, enjoys experimenting with rock candy sugar crystals, yet often forgets to drink enough water
    after intense puzzle sessions, reflecting a practical yet experimental palate.
  core: Jeral Simpson is a methodical, curious seven‑year‑old whose love for LEGO, puzzles, and robotics is matched by a competitive streak, occasional worry, and a habit of stashing coins for future projects.
background:
  cultural: Jeral is a Black American growing up in Marlborough, MA, within a close‑knit family that values education, perseverance, and community. He attends a local historically Black church where gospel
    music and storytelling reinforce his cultural identity, and he celebrates holidays such as Juneteenth and Kwanzaa with his relatives. The city’s multicultural programs and a neighborhood community center
    provide him with exposure to African‑American history, mentorship from Black professionals in STEM, and opportunities to connect with peers who share similar cultural roots.
