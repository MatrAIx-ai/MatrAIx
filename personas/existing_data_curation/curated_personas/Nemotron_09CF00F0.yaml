  career_goals: Alejundro often talks about wanting to work with animals or help people when he grows up. He dreams of becoming a veterinarian or a community scientist who discovers simple ways to keep
    pets healthy and the neighborhood safe. He also imagines being a bilingual teacher who can share his love of both English and Spanish with younger kids. In the short term, his main ambition is to stay
    on top of his schoolwork, earn good grades, and be known as a reliable classmate who helps others.
