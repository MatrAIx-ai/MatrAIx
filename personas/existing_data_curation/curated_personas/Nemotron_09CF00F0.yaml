personas:
  professional: Alejundro Leon, a budding LEGO architect, channels curiosity and practicality into intricate brick creations, often organizing group build sessions and meticulously documenting each project
    in a notebook.
  sports: Alejundro Leon thrives on the soccer field as a member of the local youth league, cheering for FC Dallas while also arranging makeshift baseball games at the neighborhood park, balancing competitive
    drive with teamwork despite sometimes over‑exerting in practice.
  arts: Alejundro Leon channels creativity into drawing comic‑style heroes inspired by Jeff Smith, building elaborate Minecraft monuments, and dancing to upbeat tunes by Taylor Swift, blending visual storytelling
    with rhythmic expression.
  travel: Alejundro Leon loves family road trips to the San Antonio River Walk and the Grand Canyon, dreams of visiting Disney World and Tokyo Disneyland, and prefers itineraries that mix playground adventures
    with cultural festivals, although long car rides can trigger impatient sighs.
  culinary: Alejundro Leon enjoys helping in the kitchen, expertly mashing avocados for guacamole, assembling soft corn tacos with carne asada, salsa roja, fresh cilantro, and lime, and can whip up a quick
    cheese quesadilla, often adding a generous pinch of salt to satisfy their taste buds.
  core: Alejundro Leon is an energetic, brick‑building enthusiast who loves group games, worries about tiny setbacks, and blends curiosity with a practical knack for turning ideas into tangible creations.
background:
  cultural: Alejundro grows up in a Mexican‑American household in Navasota, Texas, where Spanish is spoken at home and English at school. His family maintains traditional Mexican customs such as celebrating
    Día de los Muertos, preparing homemade tamales, and attending a local Catholic church. The blend of Mexican heritage and Texas community life gives him a strong sense of family loyalty, respect for
    elders, and pride in bilingualism. Community events like the Navasota Fiesta and local rodeos expose him to both Hispanic and Southern cultural traditions, shaping his worldview and values.
