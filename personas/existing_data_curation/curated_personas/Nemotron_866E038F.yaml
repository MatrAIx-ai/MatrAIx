  career_goals: Shereene aims to advance to a senior executive role, such as Chief Financial Officer, within the next five years. She is focused on leading a digital transformation of financial operations,
    integrating advanced analytics and fintech solutions to enhance decision‑making. She also aspires to champion sustainable finance initiatives that align corporate performance with environmental and
    social responsibility, leveraging her appreciation for the arts to develop community‑focused CSR programs. Pursuing professional credentials like the CFA or CPA is a priority, as is mentoring the next
    generation of finance professionals and expanding her influence in industry networks.
