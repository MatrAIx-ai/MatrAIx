  career_goals: His primary ambition is to grow the company into a nationally recognized leader in its sector while preserving a culture that values creativity, ethical stewardship, and employee well‑being.
    Over the next five to seven years he aims to launch two new product lines, achieve a sustainable revenue milestone that positions the firm for a potential IPO, and embed community‑focused arts initiatives
    into the corporate identity. He also seeks to mentor emerging entrepreneurs, expand the firm’s impact in Utah’s outdoor and tourism markets, and cultivate a personal work‑life balance that reduces stress
    and supports his family.
