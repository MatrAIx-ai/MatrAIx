  hobbies: '[''Knitting'', ''Quilting'', ''Vegetable gardening'', ''Reading historical fiction'', ''Southern literature'', ''Church choir singing'', ''Genealogy research'', ''Cooking Southern recipes'',
    ''Card games'', ''Walking'', ''Community theater attendance'']'
  career_goals: Although no longer employed, Sharon’s personal ambition is to remain mentally sharp and socially engaged. She aims to complete a memoir that captures her experiences as a teacher and a resident
    of Asheboro, to mentor a new generation of community volunteers, and to advocate for better mental‑health resources for seniors in Randolph County. She also aspires to maintain her health through regular
    walks and to keep her home organized and safe for future family visits.
