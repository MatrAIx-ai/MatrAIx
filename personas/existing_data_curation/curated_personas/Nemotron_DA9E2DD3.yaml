  hobbies: '[''Reading adventure and mystery books'', ''Building LEGO sets (including Technic and City)'', ''Nature hikes and leaf‑rock collecting'', ''Playing with and training her dog Bella'', ''Drawing
    and comic‑style illustration'', ''Piano practice (beginner level)'', ''Girl Scouts badge projects (community service, outdoor skills)'', ''Participating in school science fair projects'']'
  career_goals: Mamie often talks about wanting to become a veterinarian because she loves caring for her dog and is fascinated by how animals stay healthy. She imagines a career where she can combine her
    love for animals with the systematic study of biology she enjoys in school science lessons. At the same time, she dreams of one day designing playgrounds or interactive spaces for kids, reflecting her
    practical curiosity and her knack for planning. Her immediate ambition is to maintain high grades, win a place in the school science fair, and earn a badge for community service through Girl Scouts,
    all of which she believes will prepare her for a future career that balances compassion, organization, and inventive problem‑solving.
