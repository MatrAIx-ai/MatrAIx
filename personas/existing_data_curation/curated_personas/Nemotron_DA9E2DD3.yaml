personas:
  professional: Mamie Duncan is an aspiring junior engineer who channels her love for adventure mystery books into designing LEGO contraptions, following meticulous step‑by‑step instructions while also
    improvising when a piece doesn’t fit, demonstrating her curiosity balanced by a practical, organized mindset.
  sports: Mamie Duncan enjoys weekend hikes in the Wasatch Mountains with their dog Bella, participates in the local Junior Trailblazers club, cheers for the Utah Jazz and Real Salt Lake, and prefers low‑impact
    activities like nature walks over competitive team sports, though they sometimes assertively challenge peers during a playground soccer scramble.
  arts: Mamie Duncan expresses creativity by sketching comic‑style heroes inspired by Stan Lee, practicing piano for a few minutes each day to play simple melodies from the soundtrack of Moana, and swapping
    favorite adventure books with friends, showing how artistic appreciation shapes their leisure.
  travel: Mamie Duncan loves exploring the outdoors, having hiked in Yellowstone National Park and taken a family road trip to the Grand Canyon, and dreams of visiting Japan during the cherry‑blossom season
    to see the bright lanterns, preferring well‑planned itineraries that balance adventure with the comfort of familiar routines.
  culinary: Mamie Duncan loves cheesy pepperoni pizza, builds homemade trail mix with almonds, raisins, and pretzel sticks, enjoys helping their parent stir a simple banana‑peanut butter sandwich, and is
    developing basic cooking skills by following illustrated recipe cards, while occasionally sneaking extra chocolate chips into cookies when feeling anxious.
  core: Mamie Duncan is a meticulous young explorer who turns curiosity into organized projects, worries about missing details, and channels nervous energy into building LEGO marvels, journaling nature
    finds, and doodling heroic comics.
background:
  cultural: 'Mamie comes from a white, middle‑class family that has lived in the suburban community of Sandy, Utah for several generations. Her upbringing reflects typical Salt Lake County values: a strong
    emphasis on family ties, community participation, and outdoor recreation. She regularly experiences Utah’s seasonal traditions, such as skiing trips in the winter, hiking and camping in the summer,
    and celebrating national holidays like Thanksgiving and Christmas with extended family gatherings. Her family attends community events at the local school and church, and she has been involved in Girl
    Scouts, which reinforces a sense of service and self‑reliance. The cultural milieu blends American mainstream customs with the distinctive outdoor‑oriented lifestyle of the Intermountain West, shaping
    her practical, organized, and community‑focused outlook.'
attributes:
  skills: '[''Reading comprehension (4th‑grade level)'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Organizational planning (uses personal planner for assignments)'', ''Basic computer
