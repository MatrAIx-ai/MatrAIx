  hobbies: '[''Hiking'', ''Fishing'', ''Playing Video Games (Strategy)'', ''Reading Personal Finance'', ''Genealogy Research'', ''Mindfulness Meditation'', ''Traditional Beadwork'', ''Cooking Southern Cuisine'',
    ''Attending Tribal Powwows'', ''Volunteering at Community Food Pantry'']'
  career_goals: Joena aims to progress from cashier to shift supervisor within the next year and ultimately become a store manager, providing stable leadership for his team. He plans to enroll in community‑college
    courses in business administration to build formal management skills. Long‑term, he dreams of opening his own small convenience store that highlights locally sourced products and Lumbee‑crafted goods,
    contributing to his tribal community’s economic development. Recognizing his heightened emotional sensitivity, he seeks work environments that offer supportive mentorship and opportunities to practice
    stress‑management techniques, ensuring his career growth aligns with both personal well‑being and community values.
