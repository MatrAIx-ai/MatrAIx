personas:
  professional: Joena Prabhakaran, a 33‑year‑old front‑line retail professional, combines meticulous cash‑handling and POS mastery with a curiosity‑driven push for system improvements, balancing unwavering
    reliability on the register with flexible problem‑solving when the store rushes, and employing calm assertiveness to de‑escalate customer concerns.
  sports: Joena Prabhakaran, 33, hikes the nearby Blue Ridge foothills and fishes at Lake James each spring, cheers on the New Orleans Saints in football and follows the Charlotte Hornets in basketball,
    and they belong to the local fishing club that meets every Saturday.
  arts: Joena Prabhakaran, a 33‑year‑old, expresses cultural creativity through traditional beadwork, enjoys listening to folk‑rock artist Rhiannon Giddens and classic soul singer Aretha Franklin, and they
    attend regional powwows and local art fairs to stay connected to community heritage.
  travel: Joena Prabhakaran, 33, prefers planned road trips to scenic destinations like the Great Smoky Mountains and the Gulf Coast, dreams of fishing in New Zealand’s lakes, and they try to fit weekend
    getaways into a limited budget while balancing work commitments.
  culinary: Joena Prabhakaran, a 33‑year‑old, relishes cooking Southern comfort foods such as fried catfish, collard greens with smoked turkey, and homemade cornbread, uses fresh garden herbs and heirloom
    tomatoes, and they often host potlucks where friends praise their slow‑cooked gumbo.
  core: Joena Prabhakaran, 33, is a curiosity‑driven retail professional who wrestles with intense anxiety, finds calm in beadwork and fishing, and cleverly budgets for a future tribal‑community store while
    occasionally forgetting to schedule medical check‑ups.
background:
  cultural: Joena is a member of the Lumbee tribe, one of the largest Native American communities in North Carolina. Raised in Rockingham, he grew up at the intersection of Lumbee traditions and the broader
    Southern culture of Richmond County. Family gatherings, annual powwows, storytelling sessions, and participation in tribal council events instilled in him a deep respect for his ancestry, a strong sense
    of community, and an appreciation for the land. At the same time, he navigates life in a predominantly non‑Native town, blending Lumbee values of cooperation, humility, and connection to nature with
    the practical realities of Southern small‑town life. This dual cultural lens informs his interactions, work ethic, and personal aspirations.
attributes:
