  career_goals: As she grows, Laura aspires to channel her love for art and her organized mindset into a career that melds creativity with strategic planning. She envisions becoming a museum curator or
    arts program director, where she can design unconventional exhibitions, champion emerging artists, and oversee complex project logistics. Her competitive drive pushes her to aim for leadership roles
