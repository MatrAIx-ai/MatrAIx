personas:
  professional: Laura Paulson, a newborn raised in the small town of Belgrade, Montana, already shows a methodical curiosity that, combined with the community’s self‑reliance ethos, points toward a future
    career as a sustainable‑farm systems engineer where her organized, competitive nature will drive efficient land stewardship.
  sports: Laura Paulson, a newborn, is already enjoying mini‑flyer toys featuring the Missoula Grizzlies basketball logo and her parents intend to enroll her in the Bozeman Broncos youth soccer club once
    she toddles, fostering a budding love for team sports and outdoor pursuits like hiking.
  arts: Laura Paulson, a newborn, is soothed by the gentle strums of John Denver’s acoustic folk songs and the storytelling reels of local illustrator Maya White, whose work is often displayed at the Belgrade
    summer fair, nurturing an early appreciation for rustic music and visual arts.
  travel: Laura Paulson, a newborn, has already joined family road trips to Yellowstone and Glacier National Parks and, tucked in a carrier, watches travel documentaries about the Scottish Highlands and
    Kyoto, hinting at a future blend of adventurous hikes and cultural explorations.
  culinary: Laura Paulson, a newborn, subsists on breastmilk and pureed sweet potatoes with a hint of locally sourced rosemary, while her parents introduce her to the scent of fresh Idaho potatoes and meadow
    honey, planting the seeds for a lifelong love of hearty, farm‑fresh cuisine.
  core: Laura Paulson, a newborn, combines a quiet, curious temperament with a competitive spark nurtured by a close‑knit, self‑reliant Montana community, making even her earliest routines a blend of methodical
    care and subtle ambition.
background:
  cultural: Laura is raised in Belgrade, a small town in Gallatin County, Montana, within a family of white, predominantly European (German‑Scandinavian) ancestry. The community values self‑reliance, close
    ties to the land, and a modest appreciation for the arts through local fairs, library programs, and seasonal festivals. Her upbringing blends the practical frontier ethos of rural Montana with exposure
    to regional Native American crafts and storytelling, fostering a respect for both natural environments and cultural heritage. These influences shape her appreciation for artistic expression, organization,
    and a competitive spirit to succeed within a close‑knit community.
