persona_description: A GP (General Practitioner) who is interested in early detection and intervention for children with autism spectrum disorder (ASD). They are looking for a simple and effective screening
  test that can be included in regular health visitor checks to identify children who may be showing signs of ASD early on. They are also interested in the potential benefits of early therapy for the developing
  brain and want to ensure that any screening programme is conducted with reassurances for parents who may be concerned about the possibility of misdiagnosis.
