personas:
  professional: Nguyen Pham is an 18‑year‑old high school senior who, leveraging their fluency in English and Vietnamese and self‑taught Python, HTML/CSS, and JavaScript skills, designs Arduino prototypes
    for school projects while orchestrating the robotics club’s weekly builds and presenting ideas with confident, talkative coordination.
  sports: Nguyen Pham is a weekend basketball regular in the Milwaukee Community Center’s pick‑up league, often coordinating games with moderate chatter, rooting for the Milwaukee Bucks while tracking the
    NBA season, and occasionally following the Milwaukee Brewers for a change of pace.
  arts: Nguyen Pham’s artistic palate swings from listening to Kendrick Lamar’s hip‑hop, catching indie rock shows like The Strokes at local venues, to streaming V‑pop hits by Sơn Tùng M‑TP, while devouring
    sci‑fi novels by Isaac Asimov and Liu Cixin, and occasionally sketches pixel art for their game mods.
  travel: Nguyen Pham dreams of a tech‑centric road trip through Silicon Valley, has already explored Chicago’s museum district, and hopes to visit Seoul’s vibrant gaming cafés and Hanoi’s Tet celebrations,
    balancing a student‑budget itinerary with a desire for cultural immersion.
  culinary: Nguyen Pham cooks traditional phở and bánh mì with family, infusing star anise, lemongrass, and sriracha into a creative phở‑burger fusion, while also mastering the art of homemade pho broth
    and experimenting with bao‑bun tacos.
  core: Nguyen Pham is a tech‑savvy, bilingual teen who balances competitive gaming, basketball, and family cooking, constantly juggling a tight budget and lofty startup dreams while staying emotionally
    steady and occasionally procrastinating on dental visits.
background:
  cultural: Nguyen Kirk Pham is a second‑generation Vietnamese American raised in Milwaukee's vibrant Vietnamese community. Growing up in a multigenerational household, he learned to speak Vietnamese fluently
    and embraced traditions such as Tết, Mid‑Autumn, and the preparation of family recipes. His family places a strong emphasis on education, respect for elders, and collective well‑being, while also encouraging
    integration into American society. He celebrates both U.S. holidays like Thanksgiving and Fourth of July and Vietnamese festivals, often helping with food preparation and event organization. Participation
    in a local Vietnamese youth association provides language classes, cultural workshops, and community service opportunities, shaping a bicultural identity that blends Midwestern practicality with Vietnamese
    collectivist values.
