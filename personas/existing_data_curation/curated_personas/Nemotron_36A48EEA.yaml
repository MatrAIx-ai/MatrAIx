  hobbies: '[''Basketball'', ''Competitive video gaming'', ''Science-fiction reading'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Cooking Vietnamese cuisine'', ''Community cultural festival participation'',
    ''Listening to music (hip‑hop, indie rock, V‑pop)'']'
  career_goals: He plans to enroll in a Computer Science program at a state university, possibly adding a Business minor to broaden his career options. He aims to secure internships at technology firms
    where he can work on user‑experience design for bilingual applications, especially mobile apps that help Vietnamese‑American users practice language skills while accessing cultural resources. In the
    long term, he envisions launching a tech startup that merges e‑commerce with cultural content, enabling diaspora communities to discover authentic products and stories. He also hopes to volunteer teaching
    coding at community centers, blending his technical ambitions with a desire to give back to his cultural community.
