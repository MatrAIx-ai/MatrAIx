  hobbies: '[''Reading (business, history, self-development)'', ''Cooking (modern Southeast Asian cuisine)'', ''Walking/hiking (Erie Canal towpath)'', ''Balcony gardening (herbs, succulents)'', ''Puzzle
    solving (crosswords, Sudoku)'', ''Small book club participation'', ''Listening to indie music'']'
  career_goals: Edilyn aims to become a district manager within the next three years, overseeing multiple locations, and eventually progress to a regional director role. She plans to earn a Bachelor's in
    Business Administration part-time, followed by an MBA focusing on operations and supply-chain management. She wants to champion data-driven initiatives, implement process-improvement programs, and mentor
    emerging managers. Long-term, she envisions opening her own boutique retail concept that blends sustainable practices with her cultural heritage.
