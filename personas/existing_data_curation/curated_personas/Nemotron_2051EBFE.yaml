personas:
  professional: Edilyn Vang harnesses their competitive drive and methodical planning to run daily store operations, using Excel, PowerBI and POS analytics to fine‑tune inventory, labor scheduling, and
    sales targets while mentoring staff and pursuing a fast‑track path to district management.
  sports: Edilyn Vang maintains fitness through solitary walks along the Erie Canal towpath and seasonal cross‑country skiing, regularly logging miles with the Erie Trail Runners club, while cheering the
    Buffalo Bills in football season and the Sabres on the ice, embodying a disciplined yet low‑key approach to sports.
  arts: Edilyn Vang immerses themselves in indie music, regularly attending intimate shows featuring Phoebe Bridgers, Mitski and Sufjan Stevens, while also exploring contemporary art at the local Glass
    Hall gallery and collecting vintage photography books, allowing their quiet curiosity to fuel a nuanced cultural palate.
  travel: Edilyn Vang plans travel with meticulous itineraries, opting for affordable weekend getaways to the Finger Lakes and historic Boston while dreaming of a solo cultural immersion trip to Kyoto and
    a hiking adventure through Norway’s fjords, balancing a modest budget with a hunger for new perspectives.
  culinary: Edilyn Vang enjoys cooking at an intermediate skill level, reimagining classic family recipes into health‑focused dishes like turmeric‑infused pho with spiralized zucchini, lemongrass chicken
    lettuce wraps, and matcha‑chocolate chia pudding, often experimenting with ingredients such as miso, ginger and kale to create balanced meals.
  core: Edilyn Vang is a methodical yet quietly competitive strategist who thrives on solitary puzzles, data‑driven decisions, and occasional culinary experiments, though they sometimes over‑schedule and
    neglect downtime.
background:
  cultural: 'Edilyn is a second-generation Vietnamese-American. Her parents immigrated to the United States in the late 1990s and settled in the Buffalo area. Growing up, she experienced a blend of American
    and Vietnamese traditions: celebrating Thanksgiving and Fourth of July alongside Tet (Lunar New Year) with family gatherings, traditional foods, and ancestor worship. She frequently visits the local
    Asian cultural center, participates in community festivals such as the annual Buffalo Asian Festival, and volunteers at a Vietnamese community kitchen. The values of diligence, respect for elders, and
    community cohesion instilled by her family shape her work ethic and personal relationships. At home, she maintains fluency in Vietnamese, prepares family recipes, and observes cultural customs while
    also embracing the multicultural landscape of Buffalo.'
attributes:
  skills: '[''Store operations management'', ''Inventory control and forecasting'', ''Staff scheduling and training'', ''Data analysis (Excel, PowerBI)'', ''POS system administration'', ''Customer service
