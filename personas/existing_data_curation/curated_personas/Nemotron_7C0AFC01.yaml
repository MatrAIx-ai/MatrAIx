personas:
  professional: Elise Mancilla, a retired strategic business consultant, applies her decades of expertise in financial analysis, cross‑functional project leadership, and mentorship to guide budding entrepreneurs,
    while her natural curiosity and balanced organization drive her to curate community art exhibitions and lead senior‑service initiatives.
  sports: Elise Mancilla enjoys low‑impact fitness through morning walks in Hermann Park and weekly pickleball matches at the senior center, follows the Houston Astros and Houston Rockets with avid loyalty,
    and participates in the local "Golden Years" walking club that meets every Saturday.
  arts: Elise Mancilla immerses herself in the visual arts by curating watercolor pieces inspired by Monet, O'Keeffe, and the vibrant Houston Museum District exhibitions, while she frequently attends Houston
    Symphony concerts featuring Beethoven conducted by Andrés Orozco‑Espinoza, and she delights in films starring Meryl Streep and stage productions of works by August Wilson.
  travel: Elise Mancilla prefers organized group tours that balance cultural immersion with comfortable pacing, having visited historic sites such as the Alhambra in Spain, the National Mall in Washington,
    D.C., and the medieval streets of Bruges, while she hopes to explore Kyoto’s gardens once her health allows, all within a modest travel budget.
  culinary: Elise Mancilla, an adept home cook, crafts Tex‑Mex favorites like carne asada tacos with fresh cilantro, lime, roasted poblano salsa, and homemade guacamole, while she also experiments with
    rose‑infused jam pastries and enjoys dining at Hugo’s for authentic regional flavors, reflecting her blend of culinary tradition and creative flair.
  core: Elise Mancilla is a curious, meticulously organized octogenarian whose love of art, strategic mind, and habit of over‑worrying converge in a life filled with watercolor painting, rose gardening,
    and a relentless pursuit of mentoring the next generation.
background:
  cultural: Elise was born in 1941 in a modest suburb of Dallas and moved to Houston for college, where she earned an MBA from the University of Houston. Raised in a mid‑Midwestern, Anglo‑American household,
    she was taught the values of hard work, self‑reliance, and courteous Southern hospitality. Her marriage to a second‑generation Texan introduced her to the cultural mosaic of Houston, where she embraced
    the city’s vibrant Hispanic, African‑American, and Asian communities. Although she identifies as white, she enjoys Tex‑Mex culinary traditions, participates in multicultural festivals, and supports
    initiatives that celebrate the city’s diversity. Her faith background is Methodist, and she regularly attends a local church that emphasizes service and community involvement.
