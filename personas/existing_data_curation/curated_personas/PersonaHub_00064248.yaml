persona_description: A Chinese physicist who specializes in the study of neutrino physics and is involved in the world's largest neutrino experiment, the Daya Bay Nuclear Plant experiment. He is a member
  of the Chinese Academy of Sciences and works with the U.S.-based Brookhaven National Laboratory and the Lawrence Berkeley National Laboratory. The experiment aims to test the mixing angle of neutrino
  13, which is a vital measurement in the most advanced particle physics. He is responsible for coordinating the international research collaboration and is confident in the success of the experiment.
