personas:
  professional: Mariano Cabrera, a seasoned accountant and internal auditor with three decades of experience, leverages their meticulous eye for detail, advanced Excel and ERP expertise, and fluency in
    English and Spanish to deliver reliable financial reporting for small‑to‑medium enterprises and nonprofit organizations, while balancing a preference for structure with a relaxed attitude toward strict
    deadlines.
  sports: Mariano Cabrera follows Orlando City SC and streams matches of Atlético Nacional and Deportivo Cali, stays fit with weekly fishing trips on nearby lakes, evening walks along local nature trails,
    and keeps their mind sharp through regular bridge and canasta gatherings with longtime friends.
  arts: Mariano Cabrera immerses themselves in the rhythms of cumbia and vallenato, regularly listening to Carlos Vives and Jorge Celedón while cooking, finds inspiration in biographies of Simón Bolívar
    and Nelson Mandela, and occasionally attends local theater productions of plays by Luis Rodríguez, all of which shape their reflective leisure time.
  travel: Mariano Cabrera prefers low‑key travel, planning weekend getaways to the Ocala National Forest and the historic streets of Cartagena, while dreaming of leisurely Caribbean cruises that blend nature,
    culture, and the opportunity to sample regional cuisines.
  culinary: Mariano Cabrera is an adept home cook who skillfully prepares traditional dishes such as ajiaco (with chicken, corn, potatoes, and guasca), tamales, and empanadas using herbs from their garden,
    and also enjoys simple meals like grilled fish with salsa verde and fresh avocado slices.
  core: Mariano Cabrera blends a meticulous accountant’s routine with a relaxed love for solitary fishing, occasional garden forgetfulness, and a steadfast devotion to family‑centric culinary traditions,
    all while navigating the gentle tension between structure and flexibility.
background:
  cultural: Mariano was born and raised in the coffee‑rich region of Antioquia, Colombia, where family gatherings centered around shared meals, Catholic traditions, and lively music. He immigrated to the
    United States in his early thirties, settling first in Miami before moving to the Orlando metro area, where a vibrant Colombian diaspora helped preserve his cultural roots. Mariano maintains fluency
    in Spanish and regularly celebrates Colombian holidays such as Independence Day (July 20) and the Festival of the Flowers, often preparing traditional foods and inviting friends from the local Hispanic
    community. He attends a bilingual Catholic parish, participates in Semana Santa observances, and stays connected with relatives back home through weekly video calls. His Colombian heritage informs his
    values of family solidarity, hospitality, and a pragmatic work ethic, while his years in Florida have blended these traditions with American customs, giving him a bicultural perspective that enriches
    both his professional practice and personal life.
attributes:
  skills: '[''US GAAP financial reporting'', ''Tax preparation (individual & small business)'', ''Payroll processing'', ''Account reconciliation'', ''Advanced Excel (formulas, pivot tables, macros)'', ''QuickBooks'',
    ''Sage 50'', ''Basic ERP audit modules'', ''Bilingual communication (English/Spanish)'', ''Analytical problem solving'', ''Florida state tax regulations'', ''Internal audit procedures'']'
  hobbies: '[''Reading historical biographies'', ''Gardening'', ''Fishing at local lakes'', ''Watching Colombian soccer'', ''Cooking traditional Colombian dishes'', ''Playing bridge and canasta'', ''Walking
    nature trails'', ''Volunteering at community tax clinics'', ''Listening to cumbia and vallenato music'', ''Attending small church gatherings'']'
  career_goals: Approaching retirement, Mariano aims to transition from full‑time employment to part‑time consulting, focusing on providing affordable bookkeeping and tax advice to Colombian and other Hispanic
    entrepreneurs in the Orlando area. He hopes to earn a CPA designation through a tailored certification program that leverages his extensive practical experience. Additionally, he intends to mentor younger
    members of the local Hispanic business network, share his knowledge of financial best practices, and eventually serve on the board of a community nonprofit that offers financial literacy workshops to
    low‑income families.
