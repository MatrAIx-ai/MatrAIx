  hobbies: '[''Reading contemporary YA novels'', ''Science non fiction about nature and animals'', ''Gardening (vegetable garden)'', ''Caring for family pets (dog, chickens)'', ''Hiking and biking on local
    trails'', ''Knitting and crocheting'', ''Playing board games (Settlers of Catan)'', ''Volunteering at the farmers market'', ''Listening to folk and country music'']'
  career_goals: Camille aims to finish high school with a solid GPA, possibly through a GED if needed, and then pursue a vocational program in agricultural science or veterinary technology at a community
    college. She wants to combine her love for animals, her practical farm experience, and her organized approach to become a veterinary assistant or a farm manager. In the longer term she dreams of earning
    a degree in animal health or agribusiness, so she can help local farmers adopt sustainable practices and eventually run her own small, diversified farm that supports her community.
