  career_goals: Steven aims to advance to senior project manager and eventually Director of Engineering within a leading construction firm, overseeing large‑scale transportation and water infrastructure
    projects across the Southeast. He plans to earn PMP certification and become a LEED Accredited Professional to embed resilience and sustainability in every project. Recognizing his sensitivity to stress,
    he seeks to champion a culture of safety, clear communication, and work‑life balance, mentoring junior engineers and fostering collaborative, well‑structured teams. Long‑term, he envisions establishing
    his own consulting practice that emphasizes community‑focused, environmentally responsible engineering solutions.
