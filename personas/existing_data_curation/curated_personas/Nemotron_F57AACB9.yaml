personas:
  professional: Steven Nissen, a 36‑year‑old licensed civil engineer in Georgia, they blend methodical expertise in AutoCAD, Revit BIM and Civil 3D with strong interpersonal coordination to deliver sustainable
    infrastructure projects, while mentoring junior staff and championing a culture of safety and work‑life balance.
  sports: Steven Nissen, an avid participant in Atlanta’s Saturday evening soccer league with the ‘Peachtree Strikers’ and a regular player on his office’s weekday basketball pickup games, they passionately
    follow Atlanta United FC and the Georgia Tech Yellow Jackets, and they maintain a structured weekly fitness regimen that blends cardio drills, strength training at the local gym, and weekend hikes in
    nearby state parks.
  arts: Steven Nissen, a lover of live music and theater, they spend their off‑hours listening to John Mayer’s acoustic sets, classic orchestral recordings by Yo‑Yo Ma, and attending performances at the
    historic Fox Theatre, while their woodworking hobby fuels an appreciation for the craftsmanship of artisans such as Lee James.
  travel: Steven Nissen, who plans his getaways with spreadsheet precision, they enjoy weekend hikes in Georgia’s Tallulah Gorge and Stone Mountain State Parks, have road‑tripped through Asheville’s Blue
    Ridge Mountains, and they dream of visiting Yellowstone and the Canadian Rockies, balancing limited vacation days with a desire for nature‑focused relaxation.
  culinary: Steven Nissen, an enthusiastic home cook, they favor nutritious, balanced meals such as grilled salmon with quinoa, sweet‑potato black‑bean chili, and roasted Brussels sprouts tossed with turmeric
    and olive oil, and their cooking skill sits at an intermediate level where they confidently follow recipes but often improvise seasoning to suit their family’s palate.
  core: Steven Nissen keeps his life drafted on a blueprint, merging disciplined engineering precision, community‑oriented volunteerism, and a love for team sports, and they constantly worry enough to drive
    meticulous planning.
background:
  cultural: Steven grew up in the suburban outskirts of Atlanta, Georgia, in a middle‑class family with deep Southern roots. His upbringing emphasized community involvement, hospitality, and a strong work
    ethic, reflected in his frequent participation in local church events and neighborhood gatherings. While his ethnic heritage is primarily Northern European—German and British ancestors—he identifies
    strongly with Southern culture, valuing family meals, regional cuisine, and civic responsibility. This blend of cultural influences shapes his pragmatic outlook, collaborative spirit, and commitment
    to contributing positively to his community.
