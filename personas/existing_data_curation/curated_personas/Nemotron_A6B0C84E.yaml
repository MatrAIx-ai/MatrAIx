  hobbies: '[''knitting and crocheting'', ''bird-watching'', ''native garden cultivation'', ''senior center craft circles'', ''participating in local festivals'', ''reading historical fiction'', ''listening
    to classic rock and folk music'', ''walking coastal trails'', ''volunteering at community events'', ''cooking traditional family meals'']'
  career_goals: Alicia aims to continue contributing to her workplace and community while gradually shifting toward mentorship and supportive roles. She hopes to become a part‑time senior shift lead, where
    she can guide newer cashiers, streamline daily routines, and ensure a smooth, reliable checkout experience. Beyond the store, she plans to expand her volunteer work at the senior center by organizing
    intergenerational craft workshops and establishing a neighborhood “Senior Friend” program that pairs retirees with younger volunteers for mutual support. Maintaining her health, staying active, and
    preserving the close‑knit spirit of Crescent City are central to her long‑term aspirations.
