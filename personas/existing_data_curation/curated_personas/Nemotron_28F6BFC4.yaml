  career_goals: Robert aims to transition into a driver‑trainer or safety‑coach role within his current company, leveraging his extensive experience to mentor younger drivers and elevate safety standards.
    He also plans to obtain a Class A commercial driver’s license endorsement for hazardous‑materials transport to access higher‑paying routes. In the longer term, he envisions launching a modest independent
    delivery service that capitalizes on his deep knowledge of the St. Louis area and his network of contacts, providing a steady income stream as he approaches retirement.
