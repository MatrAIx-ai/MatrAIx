  career_goals: Approaching retirement, Andrew aims to transition into a leadership role within his district, such as STEM department chair, where he can shape curriculum policy and champion innovative
    instructional practices. He aspires to mentor a new generation of teachers, establishing a structured onboarding program that reflects his high standards for instructional excellence. Andrew also hopes
    to author a practical guide on integrating project‑based learning in high‑school science courses, thereby contributing to the broader educational community. Additionally, he plans to expand the school's
    outreach by partnering with local businesses and museums to create real‑world learning opportunities for students.
