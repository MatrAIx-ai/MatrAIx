  hobbies: '[''Playing basketball'', ''Youth choir participation'', ''Journaling and creative writing'', ''Reading young adult literature'', ''Cooking family recipes'', ''Smartphone photography'', ''Playing
    video games (e.g., Minecraft)'']'
  career_goals: She is determined to complete her high school education, planning to earn her GED if necessary, and then enroll in a community college nursing program. Her immediate goal is to become a
    Certified Nursing Assistant (CNA) so she can gain hands‑on experience in a local clinic. Long‑term, she aspires to become a Registered Nurse, providing stable, structured care to her community. She
    also hopes to eventually work on health outreach programs that address preventative care in rural areas. She aims to combine her practical nature with her desire to help others, seeking a career that
    offers clear pathways and dependable advancement.
