personas:
  professional: Sheyenne Pyatt is an aspiring teen leader who coordinates the youth basketball pickup games at the local park and serves as a peer mentor in the church choir, showcasing practical organization
    and a reliable work ethic.
  sports: Sheyenne Pyatt is an enthusiastic pickup basketball player who regularly joins games at the local park, follows the NBA’s Miami Heat and the hometown high school Panthers, and balances their fitness
    routine with occasional weekend jogs to stay agile for the court.
  arts: Sheyenne Pyatt is a gospel‑soul music enthusiast who sings with the church youth choir, admires artists like Kirk Franklin and Elevation Worship, reads contemporary YA novels by John Green and Sarah
    J. Maas, and captures candid street scenes on their smartphone inspired by photographers on the Humans of New York Instagram account.
  travel: Sheyenne Pyatt is an adventurous teen who loves day trips to nearby state parks, has visited Washington, D.C. on a school field trip, dreams of exploring the Grand Canyon, and plans future family
    vacations to coastal beaches while balancing budgeting constraints with the desire for new experiences.
  culinary: Sheyenne Pyatt is a budding home cook who perfects family‑style fried chicken and mac‑and‑cheese, experiments with fresh basil and garlic in homemade pizza, enjoys baking cinnamon rolls on weekends,
    and occasionally shares their creations on a private Instagram story for friends and family.
  core: Sheyenne Pyatt is a structured, community‑focused teen who balances basketball teamwork, gospel choir harmony, disciplined saving, proactive health management, and creative pursuits while navigating
    the quirks of teenage life.
background:
  cultural: She is an African‑American teenager growing up in Sparta, a small town in Hancock County, Georgia. Her family and community are strongly anchored in the Black church, which provides cultural,
    spiritual, and social support. She has been raised with Southern Black culinary traditions, gospel music, and stories of resilience passed down through generations. Family gatherings and church events
    are central to her social life, reinforcing values of mutual aid, respect for elders, and collective responsibility. She is aware of the historical legacy of the rural South, including both the challenges
    and the rich cultural contributions of African‑American communities, which shape her identity and her aspirations to give back to her neighborhood.
