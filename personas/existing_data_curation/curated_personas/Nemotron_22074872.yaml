  career_goals: In the next five years, Sarah aims to step into a senior architect role, leading large‑scale digital transformation initiatives that improve operational efficiency for both corporate and
    non‑profit clients. She seeks to earn certifications such as TOGAF and PMP to deepen her strategic expertise. Sarah is passionate about fostering inclusive tech cultures, so she plans to design mentorship
    programs that support underrepresented groups in STEM. Ultimately, she envisions leveraging AI and machine learning to create intuitive, user‑friendly systems that enhance community services while maintaining
    high standards of data security and ethical design.
