personas:
  professional: Roy Spivey is an electrical and electronics engineer with two decades of experience who blends analog and digital circuit expertise, Python and C++ firmware development, and a vivid artistic
    imagination to design sustainable power-management architectures and IoT prototypes, while they lead cross-functional teams, mentor junior staff, and champion aesthetic elegance in technical documentation.
  sports: Roy Spivey is a low-key fitness enthusiast who cycles with the Greensboro Urban Cyclists club on weekends, and they follow the UNC Greensboro Spartans basketball team, watch the Greensboro Swarm
    G-League games, and prefer gentle treadmill walks over high-intensity workouts, valuing consistency over competition.
  arts: Roy Spivey channels their love for abstract expression through weekend painting sessions inspired by Kandinsky and Pollock, and they savor the improvisational sounds of Miles Davis, John Coltrane,
    and Etta James during intimate jam nights with local musicians, while they find digital illustration inspiration from contemporary creator Beeple.
  travel: Roy Spivey favors solo, contemplative trips that blend natural scenery and cultural depth, having trekked the volcanic landscapes of Iceland, explored the historic streets of Kyoto, and they are
    planning a future visit to the solar farms of the Atacama Desert to scout renewable-energy ideas.
  culinary: Roy Spivey enjoys cultivating a rooftop garden of rosemary, thyme, and cilantro, which they incorporate into homemade herb-infused pesto, roasted red-pepper hummus, and occasional grilled sardines,
    while their cooking skill hovers between confident sauté-master and occasional over-salting, a quirk they humorously attribute to their love of bold flavors.
  core: Roy Spivey is a 50-year-old engineer-artist whose meditative abstract paintings, jazz-infused evenings, and persistent worry about the future create a uniquely balanced yet occasionally stressed
    outlook on life, and they navigate daily challenges with a blend of disciplined curiosity and gentle self-critique.
background:
  cultural: Roy grew up as a Black man in Greensboro, North Carolina, a city steeped in civil‑rights history and vibrant African‑American cultural life. His family’s roots trace back to the Great Migration,
    and he was raised with the rhythms of gospel, soul, and jazz that were staples in the local church and community gatherings. These musical traditions, combined with family stories of the Greensboro
    sit‑ins, instilled in him a strong sense of resilience, cooperation, and the importance of harmony—values that guide his personal and professional interactions. Roy remains connected to the region’s
    Black community through participation in local cultural festivals, volunteer work with historically Black colleges and universities’ outreach programs, and membership in the North Carolina Society of
    Black Engineers. He draws both inspiration and grounding from this heritage, which informs his collaborative style, his commitment to mentorship, and his appreciation for artistic expression.
attributes:
  skills: '["Analog circuit design", "Digital signal processing", "PCB layout (Altium Designer)", "Embedded systems programming (C, C++, Python)", "Power electronics and renewable energy systems", "MATLAB/Simulink
