    "Design thinking", "Data analysis and visualization", "Mentorship and team collaboration"]'
  hobbies: '["Abstract painting", "Digital illustration", "Jazz and blues listening", "Live jazz jam sessions", "Science fiction novels", "Urban photography", "Model building (RC cars)", "Urban gardening",
    "Logic puzzles (Sudoku, cryptic crosswords)", "STEM mentorship for youth", "Visiting art galleries", "Documentary film watching", "Hiking in local state parks"]'
  career_goals: Roy aims to transition into a senior innovation leadership role where he can guide the development of sustainable energy solutions and cutting-edge IoT devices. He seeks to secure patents
    for novel power-management architectures, and to influence product strategy that merges functionality with aesthetic elegance. In parallel, he wants to give back to the community by establishing a mentorship
    program for underrepresented STEM students in Greensboro and by teaching part-time at a local community college. By building a small consulting practice focused on renewable-energy prototypes, he hopes
    to maintain a flexible schedule that reduces stress and supports his personal well-being.
