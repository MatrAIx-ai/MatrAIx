  hobbies: '["Historic home photography", "Hiking and beach walking", "Art exhibition visits", "Community theater", "Tennis", "Sailing", "Wine tasting", "DIY woodworking"]'
  career_goals: William aims to advance to a regional director position overseeing multiple community associations in the Greater New York area, eventually establishing his own boutique property management
    firm that emphasizes sustainable practices and technology integration. He plans to earn the Certified Property Manager (CPM) designation and pursue an MBA to broaden his strategic leadership skills.
    Long‑term, he envisions shaping affordable housing initiatives within East Hampton, leveraging his competitive drive to influence policy and drive profitable, community‑focused development.
