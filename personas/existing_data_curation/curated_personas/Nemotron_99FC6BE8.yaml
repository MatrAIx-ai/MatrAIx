personas:
  professional: Young Evans is an aspiring junior game designer who creates interactive storytelling adventures in Scratch, channeling their curiosity and love for unconventional ideas into playful digital
    creations that often feature fantasy spaceships and puzzle challenges.
  sports: Young Evans sprints across the field for the Riverdale Rovers U9 soccer team, thrills at fast-paced drills, follows Orlando City SC’s attacking style on TV for tactical inspiration, and revels
    in summer baseball with the neighborhood Tigers, channeling their competitive streak into every game.
  arts: Young Evans spends afternoons filling sketchbooks with bold, colorful illustrations reminiscent of Hayao Miyazaki’s whimsical worlds, builds LEGO starships inspired by the Star Wars saga, and decks
    out their room with posters of Pixar’s “Toy Story” characters, letting those artistic touchstones shape both their play and their emerging personal style.
  travel: Young Evans favors hands-on outings, eagerly exploring the Smithsonian National Air and Space Museum during family trips, dreaming of a future visit to the Kennedy Space Center in Florida, and
    also hoping to see the Northern Lights in Norway, blending structured museum tours with imaginative, far-flung adventures.
  culinary: Young Evans devours pepperoni pizza topped with extra mozzarella, builds wobbly spaghetti carbonara with Parmesan and peas, loves dipping sushi rolls with cucumber and avocado in soy sauce,
    and delights in baking chocolate-chip cookies—though they inevitably create a flour-covered kitchen mess in the process.
  core: Young Evans is an endlessly curious, sketch-loving, LEGO-building, soccer-driven kid who trades spontaneous bursts of artistic imagination for occasional scattered focus and a stubborn love of impromptu
    snack-making.
background:
  cultural: Young is a white American child raised in Sterling, Virginia, part of Fairfax County’s suburban community. His family participates in typical U.S. cultural traditions such as Thanksgiving, Christmas,
    and Fourth of July celebrations, and they attend a local community church. Growing up near Washington, D.C., he benefits from the region’s rich museum and cultural offerings, including frequent visits
    to the Smithsonian museums, local art workshops, and science fairs. The diverse surroundings have fostered an openness to new ideas while his family’s emphasis on education and extracurricular activities
    has supported his artistic, technical, and athletic pursuits.
