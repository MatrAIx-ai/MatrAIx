  career_goals: He dreams of exploring the stars as an astronaut and creating his own comic‑book heroes as an illustrator. He also imagines designing video games that blend his coding and storytelling skills.
    In sports, he hopes to join a youth soccer league that could lead to a future as a professional player. At school, he aims to win the science fair with an original project that mixes art and science,
    reflecting his love for unconventional ideas.
