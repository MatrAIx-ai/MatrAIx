  career_goals: Although retired from formal employment, Maria’s primary ambition is to serve as a cultural ambassador for the Mexican community in Orange County. She aims to become the senior volunteer
    coordinator at her local senior center, where she can design and lead intergenerational programs that celebrate Mexican heritage. She dreams of establishing a regular series of workshops—covering traditional
    crafts, cooking, and storytelling—held at community centers and museums. Maria also hopes to document her family’s migration story and Mexican‑American experiences in a memoir that can be used in local
    schools for multicultural education. Finally, she aspires to create a community garden that grows native Mexican herbs and vegetables, offering gardening classes to seniors and children alike.
