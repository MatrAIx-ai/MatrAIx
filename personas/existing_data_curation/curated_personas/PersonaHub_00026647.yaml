persona_description: A theater historian who is fascinated by the Elizabethan and Jacobean periods, particularly the lives and careers of the writers and actors that Shakespeare worked with, and the Elizabethan
  theatrical scene. They are curious about the shadowy figure of the Bard himself and the age of Shakespeare when anyone convicted of stealing more than twelve pence could be hanged. They are also interested
  in the study of group theory, particularly the concepts and theorems related to subgroups and isomorphisms, and their research interests include the structure of finite groups, representation theory of
  groups, and the theory of group automorphisms.
