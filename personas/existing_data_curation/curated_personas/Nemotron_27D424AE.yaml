personas:
  professional: Soraya Torresgonzales, a retired grocery‑store manager turned community entrepreneurship mentor, blends her methodical budgeting acumen with a talkative, sociable flair to design and host
    monthly financial‑literacy workshops for senior‑age women in her town.
  sports: Soraya Torresgonzales joins the Riverwalk Seniors Walking Group for a brisk weekly stroll along the town’s river, cheers on the hometown minor‑league baseball squad the River Valley Raptors, and
    participates in a community‑organized senior soft‑ball league that plays on Saturdays.
  arts: Soraya Torresgonzales delights in teaching grandchildren folkloric dance steps, finds inspiration in the music of Lila Downs and the paintings of Frida Kahlo, and regularly discusses the self‑help
    best‑seller ‘The Power of Now’ by Eckhart Tolle at her book club.
  travel: Soraya Torresgonzales has explored the historic streets of Oaxaca City, trekked the red‑rock canyons of Sedona, Arizona, and dreams of a future pilgrimage to the vibrant markets of Guanajuato
    as well as a relaxing coastal retreat in Puerto Vallarta.
  culinary: Soraya Torresgonzales is a confident home chef who expertly prepares tamales de puerco, rich mole poblano simmered with chocolate and chiles de árbol, and fresh salsa verde using tomatillos,
    cilantro, and jalapeños, while constantly experimenting with new spice blends and streaming cooking tutorials.
  core: Soraya Torresgonzales merges a meticulous, budget‑savvy mind with a sociable, talkative spirit, juggling community mentorship, garden therapy, and occasional worry‑filled overthinking.
background:
  cultural: Soraya is a first‑generation Mexican‑American who grew up in a tight‑knit border community near Yuma County. Her family maintains strong Mexican cultural ties, including Catholic faith, Spanish
    language, and celebrations like Día de los Muertos and Las Posadas. She blends these traditions with the practical realities of life in Arizona, valuing family, community reciprocity, and respect for
    elders. Her daily life reflects a fusion of Mexican heritage—through food, music, and family customs—and the entrepreneurial spirit of the U.S. Southwest, shaping her identity as a bridge between two
    cultures.
