  career_goals: Although officially retired, Soraya aims to channel her expertise into a community mentorship program that helps local entrepreneurs, especially women, launch small businesses. She hopes
    to establish a monthly workshop series on practical financial skills and basic computer use for seniors, and she aspires to become a trusted advisor for the town’s senior center. Additionally, she wants
    to complete a short certificate in geriatric counseling to better support peers coping with stress and anxiety, reflecting her desire to combine compassion with self‑growth.
