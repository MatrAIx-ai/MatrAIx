personas:
  professional: Jose Quiroz is a self-taught visual artist in Miami who blends large-scale mural painting with digital illustration, channeling curiosity and spontaneity into story-driven community projects,
    yet habitually battles deadline pressure due to a natural aversion to rigid structure.
  sports: Jose Quiroz plays forward for the community soccer team Opa Locka United, follows the Miami Heat and the Miami Hurricanes with avid enthusiasm, and supplements weekly matches with weekend hikes
    through the Everglades, using solo runs as a reflective escape from their competitive drive.
  arts: Jose Quiroz curates a cherished vinyl collection featuring Jimi Hendrix, Celia Cruz, and Buena Vista Social Club, devours graphic novels such as Alan Moore's *Watchmen* and *Maus*, regularly attends
    art fairs showcasing creators like Kehinde Wiley and Banksy, and translates these influences into experimental mixed-media murals that fuse street-art grit with refined color theory.
  travel: Jose Quiroz favors spontaneous, low-budget trips that blend cultural immersion and nature, having recently explored the historic neighborhoods of Mexico City, the mangrove trails of Belize, and
    revisited their family's home country in Central America, while they dream of an artist-in-residence experience in the vibrant districts of Barcelona.
  culinary: Jose Quiroz, an enthusiastic home cook, regularly prepares hearty gallo pinto with red beans, rice, and plantains and intricate nacatamales wrapped in banana leaves, enjoys sampling fresh ceviche
    at Wynwood's pop-up stalls, and pairs meals with artisanal Guatemalan coffee and locally brewed craft beers.
  core: Jose Quiroz blends a restless creative spark with a competitive edge, juggling midnight mural sessions, impromptu salsa lessons, and a habit of misplacing brushes in coffee cups while dreaming of
    a solo gallery debut.
background:
  cultural: Jose was raised in a bilingual Nicaraguan household in Opa Locka, where Spanish was spoken at home and English dominated school and work life. His family observed Catholic traditions and celebrated
    Nicaraguan holidays such as La Purísima, while also participating in the broader Hispanic and Caribbean cultural fabric of South Florida. These dual influences manifest in his art through vivid color
    palettes, folk‑pattern motifs, and narratives that honor communal resilience and migration stories. Jose values the strong sense of family, the celebratory spirit of community gatherings, and the blend
    of Central American heritage with the urban, multicultural environment of Miami‑Dade County.
attributes:
  skills: '[''acrylic mural painting'', ''spray‑paint street art'', ''mixed‑media collage'', ''digital illustration (Procreate, Photoshop)'', ''art‑history research'', ''color theory application'', ''visual
    storytelling'', ''community workshop facilitation'', ''improvisational composition'']'
  hobbies: '[''exploring Miami street‑art districts'', ''attending local art fairs'', ''photographing urban architecture'', ''cooking Nicaraguan cuisine'', ''playing community soccer'', ''reading graphic
    novels'', ''sketching in cafés'', ''hiking the Everglades'', ''learning rumba and salsa dancing'', ''traveling to Nicaragua'', ''collecting vintage vinyl records'', ''reading poetry and folklore'']'
  career_goals: Jose aims to secure a solo exhibition at a reputable Miami gallery within the next three years and to establish a permanent series of community murals in Opa Locka that celebrate the Nicaraguan
    diaspora and local neighborhood stories. He plans to launch his own studio space that doubles as a teaching hub for at‑risk youth, develop a line of limited‑edition prints and apparel featuring his
    signature motifs, and obtain an international artist‑in‑residence fellowship in Central America to deepen his cultural vocabulary. To achieve these goals, he is working on improving his time‑management
    skills and building a network of collaborative partners while maintaining his competitive drive to stand out in the regional art scene.
