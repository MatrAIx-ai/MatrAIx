  hobbies: '[''Cooking Mexican cuisine'', ''Hiking'', ''Photography'', ''Chess'', ''Raspberry Pi projects'', ''Reading sci-fi'', ''Community coding mentorship'']'
  career_goals: Arturo aims to step into a Lead Architect or VP of Engineering role within the next five years, shaping technology strategy for data-intensive platforms that prioritize reliability and practical
    performance. He plans to earn AWS Certified Solutions Architect - Professional and Microsoft Azure Solutions Architect Expert certifications to formalize his cloud expertise. Driven by his competitive
    spirit, he wants to mentor a small cohort of senior developers, especially those from Hispanic backgrounds, and to launch a SaaS product that simplifies inventory management for Midwest manufacturers.
    He also aspires to contribute to open-source performance-testing tools, using his critical and data-driven mindset to influence corporate technical decisions.
