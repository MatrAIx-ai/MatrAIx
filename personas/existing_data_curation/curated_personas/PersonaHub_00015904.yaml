persona_description: A veterinarian who has been involved in the veterinary profession in Namibia for over 117 years, and has played a significant role in shaping the veterinary services and public health
  within the country. The veterinarian has experience in the field of animal health and production, and has been involved in improving animal health and production on farms through the application of veterinary
  medicine in close collaboration with veterinarians. The veterinarian has also been involved in the development of veterinary legislation and the early forms of disease control in the South-West Africa
  region, and has been recognized as the representative body of the veterinary profession in Namibia.
