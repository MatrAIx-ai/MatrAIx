persona_description: A historian or a researcher who specializes in the study of African history, particularly focusing on the impact of the Great Plague on the Cape Colony and the spread of the disease
  to other parts of the world. This person is interested in the social, economic, and cultural impacts of the disease on the inhabitants and their interactions with the Europeans and the native populations.
  They are also knowledgeable about the impact of the disease on the agricultural industry, the loss of life, and the changes in the social structure of the colonized communities. This person is likely
  to have access to primary sources, such as records, diaries, and eyewitness accounts, that provide insights into the experiences of the colonized communities during the Great Plague.
