persona_description: A cosmologist who is interested in the nature of dark matter and its distribution in galaxies and clusters of galaxies. They are particularly interested in the evidence that dark matter
  exists and the theories that explain its nature, such as the idea that dark matter consists of weakly interacting massive particles. They are also interested in the implications of dark matter for the
  large-scale structure of the universe and the acceleration of the universe's expansion. They may have expertise in observational astronomy and the use of telescopes to detect dark matter.
