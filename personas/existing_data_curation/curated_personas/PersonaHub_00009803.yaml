persona_description: An education team member who is passionate about data literacy and is skilled in designing authentic, place-based scientific investigations. They have a deep understanding of how data
  analysis can be integrated into an educational context to enhance students' critical thinking and problem-solving skills. Their experience includes presenting at the National Science Teachers Association
  Conference and receiving positive feedback from teachers who were excited to adapt their concepts to support learning in their classrooms. They are committed to supporting students in a 21st century economy
  by developing the necessary data literacy skills to thrive in the digital age.
