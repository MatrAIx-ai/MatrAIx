personas:
  professional: Crystal Boone, a one‑year‑old who thrives on routine and meticulous arrangement of toys, already shows nascent engineering instincts, hinting at a future career in civil engineering where
    their practical mindset, balanced organization, and early competitive drive will shape systematic problem‑solving.
  sports: Crystal Boone, at age one, enjoys the rhythm of weekly stroller walks while the local youth soccer group Tiny Tots FC practices in the park and often watches the Chicago Cubs on TV, preferring
    gentle toddler yoga sessions over high‑energy games, yet quietly competes by matching the fastest friend’s crawling speed.
  arts: Crystal Boone, a one‑year‑old, delights in the soothing lullabies of Ella Fitzgerald and the classic animations of Walt Disney, especially The Lion King, while also being captivated by picture books
    illustrated by Eric Carle, shaping a gentle yet discerning artistic palate.
  travel: Crystal Boone, only a year old, has already enjoyed a short family trip to the seaside town of Cape May, and their parents dream of future excursions to San Diego’s zoo and the quiet gardens of
    Kyoto, favoring well‑planned, familiar itineraries that minimize stress.
  culinary: Crystal Boone, at one, prefers soft, familiar foods such as oatmeal with banana, mashed sweet potatoes, and avocado puree, showing a strong attachment to gentle textures while occasionally reaching
    for a small bite of mild cheddar cheese, reflecting a cautious yet occasionally curious palate.
  core: Crystal Boone, a one‑year‑old, blends a love for routine, quiet observation, and a budding competitive streak into a toddler who meticulously arranges toys, worries about new faces, and silently
    judges the world.
background:
  cultural: Crystal is raised in a predominantly white, family‑centered community in Roy, Utah. The town's strong Latter‑day Saints influence emphasizes regular schedules, close‑knit family ties, and community
    service. Her household reflects these values through routine meals, weekly church gatherings, and participation in local farming activities. This cultural setting reinforces her preference for familiarity,
    practicality, and modest social interactions.
