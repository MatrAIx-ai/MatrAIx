persona_description: A mechanical engineer who specializes in 3D printing and has designed customized tools for people with physical disabilities. He has experience in designing tools for patients with
  fingers amputations or reduced mobility due to spinal cord injury, and has worked with a physiatrist, an orthoprotesist, and an occupational therapist to create unique solutions that combine knowledge
  and experiences from each of them. He has designed tools for patients, but also searches for inspiration on websites like Thingiverse and hackaday.io, and has designs available on Thingiverse. He believes
  that 3D printers offer the opportunity to find solutions to necessities so specific that there are no companies that create exactly what you need.
