  hobbies: '[''Desert gardening (xeriscaping)'', ''Historical nonfiction reading'', ''Quilting and knitting'', ''Hiking Sonoran Desert trails'', ''Southwestern cooking experiments'', ''Volunteer work at
    senior center'', ''Crossword puzzles'']'
  career_goals: Katherine aims to formalize her informal education by earning a GED within the next year, followed by a certificate in community health or nonprofit management. She envisions launching a
    small home‑based catering service that highlights her Southwestern cooking skills, using her organizational strengths to scale the business responsibly. Additionally, she hopes to take on a leadership
    role in her neighborhood association, where she can apply her competitive drive to improve local amenities and mentor younger residents on practical life skills.
