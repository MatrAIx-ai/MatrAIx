  career_goals: Even at his young age, Jason talks about growing up to be someone who builds and fixes things for his family and community. He imagines a future as a carpenter or handyman who creates safe,
    sturdy structures, and also entertains ideas of helping others as a firefighter or teacher. His practical side values stable, reliable work, while his caring nature pushes him toward a career that lets
    him support and protect those around him. He hopes for a low‑stress, dependable role that offers clear routines and the chance to make a positive impact.
