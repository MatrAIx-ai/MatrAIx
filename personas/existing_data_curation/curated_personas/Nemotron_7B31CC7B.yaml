personas:
  professional: Helmer Smith is an aspirational digital content creator who blends improvisational theater flair with hands-on engineering curiosity, producing weekly TikTok sketches about model rockets
    while leveraging their talkative, sociable nature to collaborate with peers, though they often miss deadlines due to a relaxed approach to planning.
  sports: Helmer Smith fuels their love for kinetic play at the downtown skate park, proudly belongs to the community skateboarding club, avidly follows the Los Angeles Lakers and Seattle Seahawks on TV,
    joins occasional pick-up basketball games during spring, and they keep a worn-out pair of Vans for skate sessions while ignoring formal gym routines.
  arts: Helmer Smith channels creative energy through improv theater performances, strums beginner chords to songs by Billie Eilish and Tash Sultana on their guitar, curates TikTok montages set to tracks
    by Lil Nas X and Doja Cat, and they attend local open-mic nights where they admire the comedic timing of Jim Gaffigan and the storytelling of Lin-Manuel Miranda.
  travel: Helmer Smith dreams of swapping their skateboard for a mountain bike on a bike-tour of the Pacific Northwest, has already taken a school field trip to Washington, D.C., where they marveled at
    the Air and Space Museum, and they hope to visit the Kennedy Space Center in Florida to see real rockets up close.
  culinary: Helmer Smith favors bold flavors, often ordering spicy chicken tacos with cilantro lime rice and extra hot sauce, occasionally attempts to bake pepperoni pizza at home but forgets to let the
    dough rise, and they enjoy late-night snack runs for cheesy ramen bowls seasoned with crushed red pepper flakes and a splash of soy sauce.
  core: Helmer Smith is a socially magnetic, anxiety-prone teen who juggles TikTok fame, skateboarding thrills, and impulsive spending, yet habitually misplaces homework and forgets appointments.
background:
  cultural: Helmer grew up in Lake Forest, an affluent suburb in Lake County, Illinois, where Midwestern values of modesty, community involvement, and outdoor recreation intersect with access to cultural
    amenities. His family, of White American descent, emphasizes education, kindness, and cooperative behavior, which aligns with his own considerate nature. The region’s many lakes and parks foster a love
    for outdoor activities like skateboarding and fishing, while local libraries, youth programs, and a tech‑savvy peer network expose him to digital media and DIY culture. This environment blends traditional
    Midwestern emphasis on harmony with contemporary digital influences, shaping Helmer’s sociable, curious, and flexible outlook.
