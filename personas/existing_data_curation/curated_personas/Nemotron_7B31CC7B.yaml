  career_goals: Helmer aims to channel his curiosity and sociable energy into a flexible, creative career. In the near term, he wants to grow a YouTube or TikTok channel that showcases science‑inspired
    DIY projects and addresses teen mental‑health topics, leveraging his communication and media skills. Over the longer term, he envisions becoming a youth program coordinator or mental‑health advocate,
    designing supportive community initiatives for adolescents. He prefers a freelance or self‑directed path that allows for spontaneity and avoids rigid schedules.
