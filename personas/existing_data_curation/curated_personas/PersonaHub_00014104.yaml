persona_description: A scientist and researcher who specializes in the study of embryonic stem cells, particularly in the field of naive stem cells. They have developed a method to revert and maintain human
  embryonic stem cells in a naive state that closely resembles that of mouse embryonic stem cells. They have published a checklist of characteristics human embryonic stem cells must have to be considered
  naive. They are particularly interested in the differences between naive human embryonic stem cells and conventional human embryonic stem cells, and in the ability of naive human embryonic stem cells
  to incorporate into mouse embryos. They are also interested in the differences between naive human embryonic stem cells and conventional mouse embryonic stem cells, and in the ability of naive human embryonic
  stem cells to differentiate into various cell types.
