persona_description: A school district administrator who is committed to improving attendance rates and reducing chronic absence in their school district. They have experience working with data and research
  to identify patterns and solutions to address absenteeism. They are proactive in advocating for policies and practices that support attendance, such as tracking absenteeism data for each student and partnering
  with families and community agencies to intervene when attendance is a problem. They understand the importance of attendance in education and the impact it has on student achievement and graduation outcomes.
  They are interested in innovative strategies to counter attitudes that prevent students from attending school, such as incentives, personal calls, adult mentors, and curriculum that features engaging,
  team-based activities. They are also aware of the importance of community partners, such as health providers and criminal justice agencies, in supporting students and reducing absenteeism.
