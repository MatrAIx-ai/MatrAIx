personas:
  professional: Andreyna Linares is a bilingual administrative specialist who streamlines office workflows with pragmatic curiosity, juggling overlapping calendars in Google Workspace while championing
    process improvements and serving as a cultural liaison in a dynamic Los Angeles firm.
  sports: Andreyna Linares enjoys casual basketball pick‑ups at a local community center, follows the LA Lakers on TV, hikes regularly in Griffith Park, and occasionally joins a recreational soccer league
    that meets on Saturday afternoons.
  arts: Andreyna Linares immerses herself in LA’s art scene, frequenting the Broad and street‑mural tours, curating playlists that mix Bad Bunny, Leon Bridges, and indie folk from Devon Banhart, and practicing
    DIY jewelry while drawing inspiration from the city’s vibrant murals.
  travel: Andreyna Linares prefers spontaneous weekend getaways, often exploring nearby coastal towns like Santa Barbara on a rented bike, while dreaming of a cultural immersion trip to Oaxaca’s markets
    and Monteverde’s cloud forests, balancing a modest travel budget with occasional splurges.
  culinary: Andreyna Linares cooks pupusas and tamales with a modern twist—adding avocado salsa or smoked cheese—and delights in sourcing fresh corn masa from the local farmer’s market and experimenting
    with chilies, though she sometimes forgets to label leftovers, leading to occasional fridge raids.
  core: Andreyna Linares navigates life with curious pragmatism, juggling organized chaos at work, occasional financial spontaneity, mild health anxieties, and a love for community‑rooted art, food, and
    outdoor adventure, all while balancing social buzz with solo recharge.
background:
  cultural: Andreyna is a first‑generation Salvadoran‑American born and raised in Los Angeles. Her parents emigrated from El Salvador in the 1990s, bringing strong family values, a deep respect for elders,
    and a vibrant cultural heritage. She grew up speaking Spanish at home and became fluent in English through school and community interactions. The vibrant Salvadoran enclave in Pico‑Union shaped her
    identity; she regularly participates in local celebrations such as Día de la Independencia (September 15) and shares traditional foods with friends and family. These experiences foster a bicultural
    perspective that blends Salvadoran communal spirit with the pragmatic, individualistic ethos of California. Andreyna’s cultural background informs her bilingual communication skills, her love for Salvadoran
    cuisine, and her commitment to community outreach while navigating the expectations of mainstream American workplace culture.
