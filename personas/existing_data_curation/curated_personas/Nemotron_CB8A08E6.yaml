  career_goals: Andreyna aims to strengthen her professional credentials while balancing her desire for flexibility and personal growth. In the short term, she plans to earn her GED and enroll in a Certified
    Administrative Professional (CAP) program to formalize her skill set. Over the next two years she hopes to master project‑management platforms such as Asana or Trello, positioning herself for a promotion
    to office manager or executive assistant. Leveraging her bilingual abilities, Andreyna also aspires to become a cultural liaison or community outreach coordinator for a nonprofit serving the Salvadoran
    community in Los Angeles. Long‑term, she envisions completing a degree in Business Administration or Human Resources and eventually launching her own small venture—perhaps a boutique that blends Salvadoran
    culinary tradition with contemporary lifestyle products—allowing her to blend creativity, practicality, and community impact.
