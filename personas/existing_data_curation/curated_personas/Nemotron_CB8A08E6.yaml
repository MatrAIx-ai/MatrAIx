  hobbies: '[''Cooking Salvadoran cuisine'', ''Exploring Los Angeles neighborhoods'', ''Hiking in Griffith Park'', ''Dancing salsa'', ''Listening to music (reggaeton, indie folk)'', ''Reading fiction and
