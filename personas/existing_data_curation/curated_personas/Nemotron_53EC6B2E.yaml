  career_goals: Even at 81, Eric remains driven by a desire to give back and to keep learning. He hopes to publish a memoir that intertwines his engineering experiences with reflections on art and history,
    curate a small exhibition of local artists at the community center, and continue mentoring young engineers through a regional STEM outreach program. He also aims to complete a long‑standing personal
    project of restoring a historic New England farmhouse, and to travel to a few major European art museums he has admired since his youth.
