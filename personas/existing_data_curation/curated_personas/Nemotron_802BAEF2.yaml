personas:
  professional: Kara Mcmullen is a budding problem‑solver whose love of structure and detail shines when building intricate LEGO sets and solving multi‑piece puzzles, approaching each project with disciplined
    focus and a compassionate willingness to share instructions with friends.
  sports: Kara Mcmullen loves weekend nature hikes, participates in the Little Seahawks Soccer Club where they practice gentle teamwork on a small field, cheers for the Seattle Seahawks during family game
    nights, and enjoys a weekly kids’ swimming class, preferring structured activities with a few familiar peers.
  arts: Kara Mcmullen delights in filling sketchbooks with detailed forest scenes, strings together bead bracelets while humming Disney soundtrack tunes, and curls up with Dr. Seuss picture books, letting
    the blend of visual and musical inspiration shape a calm and orderly creative world.
  travel: Kara Mcmullen has explored the tide pools of Olympic National Park, marveled at the Seattle Space Needle on a family weekend, and dreams of a future trip to Disneyland Paris and a snowy adventure
    in the Swiss Alps, always mapping out routes with crayons on a large living‑room floor plan.
  culinary: Kara Mcmullen adores buttery pancakes topped with fresh blueberries, helps season salmon fillets with dill and lemon for dinner, and frequently asks for macaroni and cheese loaded with extra
    cheddar, mixing beloved comfort foods with a taste for local Pacific Northwest flavors.
  core: Kara Mcmullen is a meticulous six‑year‑old who thrives on organized play, lines up crayons by hue, loves quiet creative projects, yet occasionally forgets to put away LEGO bricks, leaving a charmingly
    chaotic corner of the living room.
background:
  cultural: Kara is a white American child raised in Liberty Lake, Washington, a suburban community in Spokane County. Her family values education, community involvement, and outdoor recreation typical
    of the Pacific Northwest. She celebrates mainstream American holidays such as Thanksgiving and Christmas, participates in local events like community picnics and nature hikes, and is encouraged to respect
    diverse perspectives while primarily experiencing mainstream U.S. cultural norms.
attributes:
  skills: '["Organizing personal belongings", "Following daily schedules", "Reading age‑appropriate books", "Basic addition and subtraction", "Writing legibly", "Using educational tablet apps", "Cooperative
