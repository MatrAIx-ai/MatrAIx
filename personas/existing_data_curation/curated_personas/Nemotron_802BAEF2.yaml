  hobbies: '["Reading picture books", "Drawing and coloring", "Building LEGO sets", "Nature walks with family", "Caring for family pet", "Bead stringing crafts", "Playing cooperative board games", "Listening
    to music", "Simple piano practice"]'
  career_goals: Kara dreams of growing up to become a teacher who creates organized, supportive classrooms where every child feels cared for. She also expresses a love for animals and imagines one day working
    as a veterinarian or a science teacher, combining her compassion for living beings with her enjoyment of structure and clear expectations. In the meantime, she aims to improve her reading and math skills,
    become a reliable helper at home, and continue learning new things that will prepare her for those future roles.
