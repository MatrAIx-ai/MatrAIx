personas:
  professional: Claudia Cruz is a senior graphic design student who blends surreal illustration with user-experience design, leveraging their fluency in Spanish and English to craft culturally resonant
    digital interfaces for inclusive community projects.
  sports: Claudia Cruz balances a love for the Detroit Lions and Detroit Tigers with seasonal participation in a community ultimate frisbee league in spring, weekly yoga sessions during the off-season,
    and occasional weekend snowshoeing trips to the Upper Peninsula in winter.
  arts: Claudia Cruz immerses themselves in artistic pursuits by sketching surreal landscapes inspired by Frida Kahlo, curating digital collages to the soundtrack of indie artists like Mitski and Latin-fusion
    groups such as Cafe Tacvba, and regularly attending Detroit's street-art festivals and exhibitions featuring creators like Shepard Fairey.
  travel: Claudia Cruz prefers spontaneous, budget-friendly weekend getaways, often hitchhiking or using rideshares to explore nearby cultural hubs such as Chicago's art districts and New Orleans during
    Mardi Gras, while dreaming of a future pilgrimage to Oaxaca's vibrant markets and the historic murals of Mexico City once they secure a well-paid design internship.
  culinary: Claudia Cruz is an avid home chef who expertly prepares tamales rellenos de rajas, rich mole poblano infused with ancho chilies and dark chocolate, and experiments with fusion dishes like mole-glazed
    roasted cauliflower, while they also relish exploring Detroit's food trucks for tacos al pastor topped with pineapple and fresh cilantro.
  core: Energetic, introspective, and fiercely imaginative, Claudia Cruz channels grief into vibrant visual storytelling, balancing meticulous budgeting with occasional impulsive art-supply splurges, and
    finds solace in midnight sketch sessions accompanied by indie-Latin playlists.
background:
  cultural: Claudia was born to Mexican immigrant parents in Wyandotte, Michigan, and grew up bilingual, celebrating Día de los Muertos, Cinco de Mayo, and Catholic traditions with her family. The vibrant
    Mexican diaspora community in the Detroit metro area shaped her love for bold colors, folk art, and communal gatherings. While she has embraced Midwestern American culture through school and local events,
    her Mexican heritage remains central to her identity, influencing her language, cuisine, and artistic sensibilities. The early loss of her spouse at age 18 deepened her appreciation for family support
    and inspired her interest in healing through art, leading her to bridge cultural roots with contemporary creative expression.
