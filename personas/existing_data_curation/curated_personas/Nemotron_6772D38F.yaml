  hobbies: '[''Sketching surreal artwork'', ''Digital illustration'', ''Reading speculative fiction and magical realism'', ''Cooking Mexican cuisine'', ''Attending art exhibitions and street art festivals'',
    ''Photography'', ''Writing poetry'', ''Listening to indie and Latin-fusion music'', ''Practicing yoga'', ''Volunteering at community cultural center'']'
  career_goals: Claudia aims to graduate with a Bachelor of Fine Arts in Graphic Design within the next two years and secure a professional internship at a socially engaged design studio. She envisions
    a career as a visual storyteller and UI/UX designer who creates inclusive, culturally resonant digital experiences. Long‑term, she plans to pursue a Master’s degree in Art Therapy to combine her artistic
    talent with mental‑health support, ultimately opening a community art studio in Michigan that offers workshops for marginalized youth and promotes Mexican heritage through collaborative projects.
