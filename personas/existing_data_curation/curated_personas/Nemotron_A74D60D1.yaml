  hobbies: '["Gardening", "Birdwatching", "Reading historical fiction and non-fiction", "Knitting", "Crossword puzzles and sudoku", "Nature walks in Snohomish County", "Journaling", "Genealogical research",
    "Digital photography"]'
  career_goals: Although retired from formal employment, Wanda remains goal‑oriented. She aspires to complete a memoir that weaves together her family history and personal reflections, and to publish a
    series of articles on local horticultural practices for the community garden newsletter. She aims to deepen her digital literacy by mastering photography on a tablet and learning basic photo‑editing.
    A long‑standing interest in genealogy drives her to finish a comprehensive family tree and share it with relatives. Volunteering as a research assistant at the Arlington public library, where she can
    apply her archival skills, is a key ambition. Finally, she is committed to maintaining her health through daily walks along the Snohomish River and a balanced lifestyle.
