  hobbies: '["Traditional Mexican Cooking", "Herb and Vegetable Gardening", "Knitting", "Listening to Mariachi and Folk Music", "Walking in Local Parks", "Attending Sunday Mass", "Reading Historical Novels",
    "Genealogy Research", "Volunteering at Senior Center", "Participating in Cultural Festivals"]'
  career_goals: Although Alexis is no longer employed, her ambitions focus on maintaining independence, health, and a purposeful role within her community. She aims to keep her daily routine organized,
    continue volunteering at the senior center, and lead a monthly cooking class that teaches traditional Mexican recipes to younger families. Alexis also aspires to improve her familiarity with digital
    health tools to better monitor her wellbeing. By fostering intergenerational connections and preserving cultural traditions, she seeks to leave a lasting legacy while ensuring her own life remains structured,
    predictable, and stress-managed.
