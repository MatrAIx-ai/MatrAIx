  career_goals: Daniel aims to re‑enter the workforce in a role that blends his organizational talent with his love for community engagement. Over the next two years he plans to complete a bachelor’s degree
    in Business Administration, earn a Certified Associate in Project Management (CAPM) credential, and launch a small, home‑based renovation business that can serve neighbors in Mount Pleasant and the
    greater Charleston area. He also hopes to secure a part‑time position in a nonprofit or municipal department where he can coordinate events, mentor volunteers, and contribute to local development while
    maintaining flexibility for his family responsibilities.
