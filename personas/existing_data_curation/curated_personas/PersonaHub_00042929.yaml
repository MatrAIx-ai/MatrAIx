persona_description: A researcher at the Smithsonian who specializes in the study of plant physiology, particularly the effects of environmental factors on the distribution and abundance of tropical tree
  species. The individual is skilled in data analysis and modeling, and has expertise in predicting the outcomes of environmental change on the planet's most biodiverse terrestrial ecosystem. They are particularly
  interested in the role of phosphorus in determining the distribution of tropical tree species, and have developed predictive models to identify the genetic basis for tolerance to low phosphorus soils.
