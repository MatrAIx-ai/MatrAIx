personas:
  professional: Marie Bennette, a seasoned accountant known for her meticulous eye for detail, leverages her love of structure to excel in GAAP compliance, audit procedures, and advanced Excel data modeling,
    while calmly asserting leadership when training junior staff and streamlining processes with technology.
  sports: Marie Bennette embraces gentle exercise, tackling the Ozark trail system for weekend hikes, practicing weekly yoga, and cheering on the St. Louis Cardinals and St. Louis Blues, while occasionally
    walking with a local seniors' walking club at the park on Saturday mornings.
  arts: Marie Bennette weaves artistic inspiration into daily life, crafting quilts influenced by Faith Ringgold’s bold narratives, devouring historical novels by Philippa Gregory, and regularly attending
    folk concerts by Gillian Welch and Shakespeare-in-the-Park productions that feature performances reminiscent of Helen Mirren.
  travel: Marie Bennette prefers meticulously planned road trips, having explored the Ozark National Scenic Riverways and the historic streets of Savannah, Georgia, while dreaming of a future pilgrimage
    to England’s Cotswolds, balancing a modest travel budget with a love for cultural immersion.
  culinary: Marie Bennette enjoys modest culinary adventures, skillfully preparing herb‑roasted chicken with lemon thyme, fresh quinoa‑and‑avocado salads tossed with garden‑grown basil, and an occasional
    indulgent apple crumble that showcases her love for seasonal, homegrown ingredients.
  core: Marie Bennette navigates life with the precision of a balanced ledger, stitching together spreadsheets, quilt patterns, and a habit of double‑checking the thermostat before bedtime, all while never
    missing a church fundraiser deadline.
background:
  cultural: Marie Anne grew up in a mid‑western town in Missouri, where community ties, modesty, and a strong work ethic are valued. Her family background reflects typical Midwestern cultural themes such
    as church involvement, seasonal community events, and a focus on family stability. Her upbringing emphasized practical problem‑solving and reliability, traits that continue to shape her professional
    and personal life. While she identifies as white American, she embraces the inclusive, neighborly spirit of the region, participating in local festivals, supporting small businesses, and maintaining
    close relationships with extended family and longtime friends.
attributes:
  skills: '[''Financial reporting'', ''GAAP compliance'', ''Tax preparation'', ''Audit procedures'', ''Internal controls'', ''Regulatory compliance'', ''Budgeting and forecasting'', ''Process improvement'',
