  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Book club participation'', ''Yoga'', ''Volunteer fundraising'', ''Hiking'']'
  career_goals: She aims to obtain her CPA certification within the next two years and move into a senior auditor or accounting manager role at her firm. Marie Anne is interested in leading a small team,
    streamlining audit processes with technology, and eventually transitioning to a consulting capacity where she can advise local businesses on financial best practices. She also hopes to mentor younger
    accountants and contribute to community financial literacy programs.
