personas:
  professional: Timothy Wilson, a senior clergy leader in Denver, leverages his rigorous biblical exegesis, strategic church growth planning, and conflict‑resolution expertise while channeling his organized,
    competitive drive and sociable energy into building a multi‑site congregation that balances liturgical depth with community outreach.
  sports: Timothy Wilson, an avid outdoorsman, spends Saturdays hiking the Rocky Mountains, cycles the Cherry Creek Trail year‑round, competes in a local Saturday night basketball league with the Denver
    Dingers, and follows the Denver Broncos and Colorado Avalanche with a competitive edge that fuels their own fitness goals.
  arts: Timothy Wilson cultivates his artistic side by leading worship with acoustic arrangements of John Mark McMillan and Shane & Shane, curating photo exhibitions of the Colorado landscape inspired by
    Ansel Adams, and attending monthly theater productions at the Denver Center for the Performing Arts featuring actors like Viola Davis and Lin‑Manuel Miranda.
  travel: Timothy Wilson plans trips with a blend of purposeful service and adventure, having organized a volunteer outreach in Oaxaca, Mexico, while also trekking the Scottish Highlands to connect with
    ancestral roots, and frequently weekend‑escapes to nearby Aspen and the Great Sand Dunes to recharge.
  culinary: Timothy Wilson enjoys cooking hearty, farm‑to‑table meals, often preparing Colorado lamb stew with rosemary, sweet potatoes, and locally sourced quinoa, while also perfecting a traditional haggis‑style
    oat loaf and indulging in craft coffee brewed with single‑origin Ethiopian beans.
  core: Timothy Wilson blends disciplined pastoral leadership with a relentless curiosity, competitive spirit, and a habit of checking weather forecasts obsessively before every outdoor ministry event.
background:
  cultural: Timothy comes from a white American family with Scottish ancestry, reflected in his surname Macintyre. He was raised in a mainline Protestant tradition that emphasizes both personal piety and
    social responsibility. His liberal‑arts education deepened his appreciation for diverse cultural narratives and critical inquiry. Living in Denver, he blends this heritage with the city’s progressive,
    outdoor‑oriented culture, valuing community engagement, environmental stewardship, and interfaith collaboration while maintaining the liturgical and theological roots of his upbringing.
