  hobbies: '[''Hiking'',''Cycling'',''Basketball'',''Photography'',''Reading (literature & theology)'',''Acoustic guitar'',''Trivia nights'',''Debate clubs'',''Volunteering at community food pantry'',''Cooking'']'
  career_goals: Timothy aims to expand his leadership impact by becoming a senior pastor of a multi‑site congregation that serves both the spiritual and social needs of Denver’s diverse community. He plans
    to launch a center for mental‑health counseling and homelessness services under his church’s umbrella, develop a published work that bridges biblical ethics with modern social‑justice issues, and serve
    on his denomination’s regional council to influence broader policy. Additionally, he aspires to become a sought‑after speaker at national ministry conferences and to mentor a new generation of clergy
    with a balance of intellectual rigor and practical compassion.
