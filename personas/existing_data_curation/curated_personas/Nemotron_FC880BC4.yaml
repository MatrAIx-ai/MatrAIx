personas:
  professional: Mario Cifuentes, a seasoned security and fire‑alarm technician in Volusia County, blends a decade of low‑voltage wiring expertise with meticulous documentation and customer‑focused communication,
    aiming to earn NICET Level III and mentor junior installers while laying the groundwork for a boutique, hurricane‑resilient smart‑home service.
  sports: Mario Cifuentes, who enjoys early‑morning fishing on the St. Johns River, also follows the Orlando Magic and Tampa Bay Rays, participates in a local over‑50 recreational softball league during
    summer, and maintains a modest fitness regimen of weekend hikes and occasional body‑weight workouts to balance solitary hobbies with light athletic activity.
  arts: Mario Cifuentes, an avid collector of classic Latin‑jazz vinyl, spins recordings by Tito Puente, Celia Cruz, and Eddie Palmieri while quietly practicing acoustic guitar, and supplements their artistic
    palate with nature photography inspired by Ansel Adams, filling quiet evenings with creative expression.
  travel: Mario Cifuentes prefers structured, low‑stress getaways, planning weekend trips to Florida’s Gulf Coast for fishing, a yearly hiking excursion to the Blue Ridge Mountains, and dreaming of a future
    cultural tour of Spain’s historic cities, all while balancing family commitments and the budgetary constraints of launching a new business.
  culinary: Mario Cifuentes, a competent home cook, prepares traditional Puerto Rican dishes such as mofongo with garlic‑infused sofrito and arroz con gandules using ripe plantains and adobo seasoning,
    often experimenting with a slow‑cooker adaptation while pairing meals with a crisp local sauvignon blanc.
  core: Mario Cifuentes is a methodical, solitary technician who channels a love for precision into both high‑tech security systems and hobbyist model aircraft, while occasionally surrendering to coffee‑fuelled
    late‑night vinyl sessions and a slight forgetfulness about routine health check‑ups.
background:
  cultural: Mario grew up in a bilingual Puerto Rican household, with Spanish spoken at home and English used at school and work. Family ties and cultural traditions are central to his identity; he celebrates
    holidays like Noche Buena, San Juan, and other Caribbean festivals with extended family gatherings and traditional foods. The strong community ethic of his heritage influences his cooperative nature
    and willingness to help neighbors, especially through fire‑safety outreach. The rhythmic beats of bomba and plena shape his musical preferences, while values such as respect for elders, perseverance,
    and pride in his heritage guide his approach to both work and personal life. Living in Orange City, Florida, he balances his Caribbean roots with the local Floridian lifestyle, often participating in
    local Puerto Rican festivals and salsa events, and maintaining fluency in both Spanish and English.
attributes:
  skills: '[''Fire alarm system installation'', ''Security system configuration'', ''Low‑voltage electrical wiring'', ''Blueprint and schematic interpretation'', ''Compliance with NFPA and Florida building
    codes'', ''System testing and troubleshooting'', ''Preventive maintenance scheduling'', ''Technical documentation and reporting'', ''Customer liaison and consultation'', ''Access control programming'',
    ''Project coordination'', ''Use of diagnostic tools and hand/power tools'']'
  hobbies: '[''Scale model aircraft building'', ''Early‑morning fishing'', ''Arduino home‑automation projects'', ''Reading technical and historical books'', ''Listening to classic Latin jazz'', ''Cooking
    Puerto Rican cuisine'', ''Nature photography'', ''Quiet guitar practice'', ''Volunteering for community fire‑safety education'']'
  career_goals: Mario aims to deepen his technical credentials and expand his professional scope while maintaining the structured work environment he values. In the next two years he plans to earn the NICET
    Level III certification and become proficient in integrated smart‑home security platforms, especially those designed for hurricane‑prone Florida. He seeks opportunities to lead larger installation projects
    and to mentor junior installers within his company, leveraging his detail‑oriented mindset. Long‑term, Mario aspires to launch his own boutique security‑and‑fire‑alarm service, focusing on custom, resilient
    solutions for residential clients and small businesses in Volusia County. He also envisions offering training workshops that emphasize safety compliance and meticulous workmanship.
