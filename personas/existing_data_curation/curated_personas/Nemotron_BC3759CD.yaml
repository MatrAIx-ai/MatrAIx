    Indie Music Shows'']'
  career_goals: Sondra aims to enroll in a community college program within the next year to earn an associate's degree in Human Services or Social Work, followed by a bachelor's in Nonprofit Management.
    Her long‑term ambition is to become a community outreach coordinator for a local arts‑focused nonprofit, designing inclusive programs that blend art therapy, youth mentorship, and cultural education.
    She also hopes to become a certified mediator to support conflict resolution in community settings.
