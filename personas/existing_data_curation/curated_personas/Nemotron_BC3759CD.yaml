personas:
  professional: Sondra Miguez is an organized community‑service enthusiast who leverages her strong administrative skills and compassion to coordinate neighborhood art‑therapy workshops, manage library
    reading programs for children, and mediate conflicts, all while planning her path toward a degree in Human Services and a future as an outreach coordinator for a local nonprofit.
  sports: Sondra Miguez enjoys waterfront yoga classes at sunrise, participates in a casual pick‑up volleyball league at the community center, roots for the New England Patriots during football season,
    and occasionally joins local sailing workshops to explore the harbor they love.
  arts: Sondra Miguez frequently sketches the bustling New Bedford wharves, captures candid harbor moments with their vintage 35mm camera, draws inspiration from maritime paintings by Winslow Homer and
    contemporary indie musicians like Mitski, and volunteers at the Whaling Museum to lead art‑focused tours for youth.
  travel: Sondra Miguez prefers modest, coastal getaways, having taken weekend trips to Cape Cod, the historic streets of Charleston, and a solo art pilgrimage to Barcelona’s Picasso Museum, while always
    planning trips around student discounts and budgeting for a future backpacking tour through the Pacific Northwest.
  culinary: Sondra Miguez loves cooking with fresh seafood, expertly preparing New England clam chowder and lobster rolls, experiments with homemade sushi rolls using locally sourced fish, and frequently
    enjoys a cup of Ethiopian pour‑over coffee while sketching at the community garden.
  core: Sondra Miguez blends meticulous organization, artistic curiosity, and a deep‑seated compassion into a life focused on community enrichment, creative expression, and thoughtful self‑care, all while
    juggling the occasional subscription slip‑up.
background:
  cultural: Sondra is a white New Englander with roots in the coastal working‑class community of New Bedford, Massachusetts. Her family traditions reflect the region’s maritime heritage – celebrating Fourth
    of July parades, enjoying fresh seafood, and participating in local festivals such as the New Bedford Folk Festival. Raised in a tight‑knit neighborhood, she values self‑reliance, community service,
    and the multicultural tapestry of the city, which includes Portuguese, Brazilian, and other immigrant influences that shape her open‑minded outlook.
