  career_goals: Yolander frequently imagines herself as a teacher who reads books and sings songs to other children, or as a dancer who performs on stage. She also expresses a desire to help others, saying
    she wants to be a nurse or a community helper when she grows up. These aspirations reflect her love for attention, storytelling, and caring for people, and they guide her playful learning as she explores
    different roles in pretend play.
