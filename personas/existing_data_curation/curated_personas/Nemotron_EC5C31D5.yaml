personas:
  professional: Yolander Cunningham, a budding builder, constructs towering block castles with surprising precision, using their curiosity for new designs and practical habit of aligning each brick, while
    delighting peers with lively explanations.
  sports: Yolander Cunningham, an energetic preschooler who loves kicking a soft soccer ball at the local community field, cheers for the hometown baseball team the Thunderbirds, and attends toddler gymnastics
    classes to channel boundless energy into coordinated flips.
  arts: Yolander Cunningham, a gleeful little artist who spends afternoons drawing bright dinosaurs on paper, sings along to songs by Disney Junior, and adores performances by the children's theater troupe
    Tiny Tots Theater.
  travel: Yolander Cunningham, an adventurous three‑year‑old who enjoys family road trips to the nearby aquarium, dreams of visiting Disney World in Florida, and prefers itineraries that blend playground
    stops with nap‑friendly breaks.
  culinary: Yolander Cunningham, a picky eater with a sweet spot for mac and cheese, chicken nuggets, and strawberry‑sliced bananas, likes dipping carrots in ranch dressing, and tries to help stir the batter
    for pancake mornings despite frequent spills.
  core: Yolander Cunningham, a chatty, curiosity‑driven toddler who balances imagination with order, boisterously leads playtime while secretly hoarding stickers in a hidden stash.
background:
  cultural: Yolander is a Black child raised in the rural community of Hensley, Arkansas. Her family belongs to a close‑knit African‑American community that values oral storytelling, gospel and rhythm &
    blues music, and communal gatherings at church and family homes. Local traditions such as Saturday morning church services, choir singing, and shared meals featuring soul‑food recipes have shaped her
    early experiences. The blend of Southern rural life and African‑American cultural heritage gives her a strong sense of family, community solidarity, and an appreciation for music and storytelling, all
    of which are reflected in her daily play and aspirations.
attributes:
