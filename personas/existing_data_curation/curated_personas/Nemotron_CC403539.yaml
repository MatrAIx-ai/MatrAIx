personas:
  professional: Janet Lopez, a retired community volunteer turned senior‑center mentor, leverages her business coursework and knack for organization to coordinate events, manage modest budgets, and guide
    younger volunteers with a hands‑on, structured approach that blends practicality with warm interpersonal mediation.
  sports: Janet Lopez walks the scenic trails along the Yellowstone River with the local senior hikers club, cheers on the Montana Grizzlies football team on Saturdays, and they enjoy casual rounds of lawn
    bowling at the community park during summer.
  arts: Janet Lopez devotes her afternoons to reading Larry McMurtry’s Western novels, listening to Bob Dylan’s folk ballads while knitting, and attending performances by the Livingston Little Theater where
    they adore the work of James Earl Jones.
  travel: Janet Lopez prefers meticulously planned trips, having taken organized bus tours to Yellowstone and the Grand Canyon, and dreaming of a leisurely river cruise on the Danube through Budapest and
    Vienna after her grandchildren finish college.
  culinary: Janet Lopez delights in baking her signature apple pie with a flaky crust and a sprinkle of cinnamon, simmering herbal tea infused with native garden flowers, and preparing hearty stews featuring
    locally sourced potatoes, carrots, and rosemary, while they occasionally order sushi for a change of pace.
  core: Janet Lopez, an 80‑year‑old garden‑savvy bridge champion, blends structured community leadership with a love for historic stories, forgetting to water her roses on rainy days but they never miss
    a bridge game.
background:
  cultural: Janet was born and raised in the small town of Livingston, Montana, in a multigenerational family with deep roots in the American West. Her ancestry includes Northern European (German and Scandinavian)
    forebears who settled the region in the early 1900s, as well as a paternal lineage bearing the Lopez surname that reflects a distant Spanish‑American heritage. Growing up in a close‑knit rural community,
    she absorbed the values of self‑reliance, practical problem‑solving, and mutual support that characterize much of Montana’s cultural fabric. Her family’s involvement with the local Lutheran church and
    frequent participation in town festivals reinforced a sense of communal responsibility and celebration of seasonal traditions. Janet’s cultural identity is thus a blend of frontier pragmatism, Mid‑western
    hospitality, and an appreciation for the region’s natural landscape and diverse heritage.
