  career_goals: Even in retirement, Phung aims to leave a lasting legacy by sharing his knowledge with the community. He plans to volunteer as a guest lecturer at local community colleges, develop an intergenerational
    art‑technology workshop for seniors and teens, and write a memoir that intertwines his engineering experiences with his cultural heritage. He also aspires to curate a small exhibition of Southeast Asian
    ceramics and modern engineering prototypes at the Roseville Art Center, fostering dialogue between art and science.
