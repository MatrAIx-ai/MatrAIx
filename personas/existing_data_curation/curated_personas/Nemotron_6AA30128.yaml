  hobbies: '[''Gardening'', ''Cooking and baking'', ''Food preservation (canning, pickling)'', ''Knitting and quilting'', ''Reading historical fiction and memoirs'', ''Walking/hiking on local trails'',
    ''Birdwatching'', ''Attending book clubs'', ''Playing bridge'', ''Visiting farmers markets and art fairs'', ''Volunteer work at the senior center'']'
  career_goals: Although retired, Jennifer continues to set forward-looking goals. She aims to expand her gardening expertise by completing a community-college horticulture certificate and to share that
    knowledge through weekly workshops at the local library. She aspires to document her family's stories in a memoir that blends personal anecdotes with the history of Brookfield, preserving local heritage
    for future generations. Volunteering as a coordinator for the senior center's 'Meals on Wheels' program is a priority, allowing her to apply her cooking and organizational skills while staying flexible
    about time commitments. She also hopes to travel to regional historic sites—such as historic villages in Wisconsin and nearby Minnesota—combining her curiosity for history with leisurely road trips.
    Maintaining her health to keep up with her gardening and community activities remains a central ambition.
