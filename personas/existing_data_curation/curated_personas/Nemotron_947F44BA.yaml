  hobbies: '[''Classic truck restoration'', ''Gardening'', ''Listening to classic country music'', ''Reading true‑crime novels'', ''Hiking in local trails'', ''Participating in drivers’ association meetings'',
    ''Volunteering at senior center'', ''Crocheting'', ''Crossword and sudoku puzzles'', ''Gentle yoga'']'
  career_goals: As she approaches retirement age, Jocelyn aims to transition into a mentorship role, becoming a certified safety trainer for new drivers and offering consulting services to small logistics
    firms. She hopes to launch a side business as a freight broker to generate supplemental income for a secure retirement, while also completing a defensive driving certification and participating in community
    outreach programs that promote road safety. Maintaining a steady income and a sense of purpose remains central to her career ambitions.
