persona_description: A scholar and historian who specializes in the study of Croatian history and culture, particularly the works and contributions of Šižgorić and Pribojević. He is particularly interested
  in the intersections of language, identity, and cultural heritage, and how these factors have shaped the cultural landscape of the region. He is also an expert on the role of humanism in the development
  of Croatian culture and the impact of the humanist movement on the broader European intellectual landscape.
