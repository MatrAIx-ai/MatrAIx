  career_goals: Stephanie aims to move from her current role into a supervisory position within the next two years, seeking a Team Lead or Customer Experience Manager role where she can shape support strategies
    and mentor new hires. She plans to finish her bachelor’s degree in Communications or Human‑Computer Interaction, and to acquire certifications such as Certified Customer Experience Professional (CCXP)
    and UX Design Fundamentals. Long‑term, she aspires to blend her front‑line insights with her creative aptitude by transitioning into a user‑experience researcher or product manager role, driving the
    design of intuitive, customer‑centric products. She is motivated by the challenge of improving satisfaction metrics and enjoys setting ambitious performance goals, aiming to consistently rank in the
    top 5% of her department’s agents.
