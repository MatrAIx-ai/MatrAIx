persona_description: A historian who is fascinated by the ancient Greek and Roman way of war and its impact on society. They are particularly interested in the philosophical and strategic aspects of warfare
  and how it was constructed and maintained by the Greeks and Romans. They are also curious about the ways in which ancient society thought about conflict and how individual identities were sometimes constructed
  by war. They enjoy using fascinating examples from the Iliad, Tacitus, and the Persian Wars to explore these themes and appreciate the use of arresting anecdotes and striking visual images to convey the
  meaning of ancient war.
