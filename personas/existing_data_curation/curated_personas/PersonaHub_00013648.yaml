persona_description: A diplomat who specializes in the protection of cultural property during international armed conflicts. This persona has extensive knowledge and experience in the interpretation and
  application of the 1954 Hague Convention, particularly in its provisions related to the protection of cultural property in times of war. They are well-versed in the doctrine of "imperative military necessity"
  and its limitations, and are skilled in negotiating with military authorities to ensure the protection of cultural property during armed conflicts. This persona is dedicated to the preservation of cultural
  heritage and has a deep understanding of the importance of cultural property in international relations. They are also skilled in diplomatic negotiations and have a keen eye for detail in ensuring compliance
  with the provisions of the 1954 Hague Convention.
