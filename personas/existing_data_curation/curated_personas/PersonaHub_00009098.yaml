persona_description: A midwife who specializes in rural and northern maternity care in the Northwest Territories, with a focus on providing informed choices and culturally sensitive care to women and their
  families. She has extensive knowledge and skills in traditional knowledge and cultural practices related to childbirth, and has developed a unique approach to maternity care that integrates traditional
  methods with modern medical practices. She is passionate about empowering women and their communities to make informed choices about their own healthcare, and is committed to promoting cultural awareness
  and respect for the unique needs of rural and northern communities.
