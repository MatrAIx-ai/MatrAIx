  career_goals: April hopes to become a veterinarian or wildlife biologist, combining her love for animals with a curiosity about science. She aims to deepen her knowledge of biology through her school’s
    science club and local wildlife programs, and later pursue a degree in animal science or environmental studies. In the short term, she wants to lead a community project to protect a local park’s habitat
    and mentor younger students in STEM activities. She values a career that lets her help others, work collaboratively, and apply practical solutions to real‑world problems.
