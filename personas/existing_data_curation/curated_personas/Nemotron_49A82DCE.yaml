personas:
  professional: A budding young coder and budding scientist, April Valery blends a love for fantasy storytelling with a practical knack for building simple games on Scratch, often channeling curiosity into
    school science fair projects while staying grounded by organizing her ideas in tidy notebooks.
  sports: April Valery spends weekends dribbling for the Solon Soccer Club’s under‑12 team, cheering on the Cleveland Browns on Sundays and the Cleveland Guardians during summer baseball, and balances competitive
    play with a love for friendly pick‑up games at the neighborhood park.
  arts: April Valery channels their imagination into sketching woodland creatures inspired by John James Audubon while listening to the melodic beats of Imagine Dragons and reading fantasy epics by J.K.
    Rowling, often weaving these influences into interactive Scratch stories they share with classmates.
  travel: April Valery prefers family‑planned weekend getaways to Ohio’s Hocking Hills, where they hike to waterfalls, while dreaming of a school exchange trip to London’s Natural History Museum and a future
    adventure exploring the coral reefs of Australia.
  culinary: April Valery enjoys making gooey mac and cheese with sharp cheddar and a dash of paprika, baking chocolate chip cookies with extra walnuts, and crafting homemade trail mix with dried cranberries,
    almonds, and pretzel sticks, though they sometimes sneak a spoonful of peanut butter straight from the jar.
  core: April Valery is a curious yet practical twelve‑year‑old who balances imaginative storytelling with organized problem‑solving, brightens community spaces with kindness, and tackles challenges with
    steady calm, even when juggling school projects and soccer drills.
background:
  cultural: April comes from a White, Midwestern American family with German and Irish ancestry. Growing up in Solon, Ohio, a suburban community in Cuyahoga County, she experiences the region’s blend of
    strong public school support, family‑oriented values, and community involvement. Family traditions include celebrating holidays like Thanksgiving and Christmas, attending church events, and participating
    in local activities such as the Solon Summer Concert Series and community clean‑up days. The local culture emphasizes politeness, teamwork, and a practical approach to problem‑solving, which aligns
    with April’s balanced personality. Exposure to the broader cultural diversity of the Cleveland metropolitan area also encourages openness and respect for different perspectives.
