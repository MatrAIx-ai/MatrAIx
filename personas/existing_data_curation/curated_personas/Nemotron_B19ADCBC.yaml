  career_goals: At 71, Jordan’s primary ambition is to create a lasting personal and community legacy. He aims to earn a GED to formalize his education, write a memoir chronicling his life on the Texas
    border, and compile a small‑scale local history of Presidio that can be used by schools and the historical society. He hopes to mentor younger residents through a community workshop where he teaches
    woodworking and basic repair skills. Jordan also aspires to exhibit his own paintings and sketches in regional galleries, travel to major art museums in Texas (such as the San Antonio Museum of Art
    and the Museum of Modern Art in Dallas), and maintain careful stewardship of his retirement funds to ensure financial stability and reduce stress.
