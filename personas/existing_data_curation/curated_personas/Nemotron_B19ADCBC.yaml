personas:
  professional: Jordan Helms is a self-taught handyman and budding community mentor on the Texas border, applying a methodical, organized approach to woodworking, small-engine repairs, and meticulous record-keeping
    while channeling a competitive chess spirit into workshop leadership, and pursuing a GED and a memoir to cement a lasting legacy.
  sports: Jordan Helms follows the Texas Rangers and Dallas Cowboys as a loyal fan, participates in the senior center’s weekly chess tournaments for mental sport, and joins the Presidio Senior Walking Club
    for sunrise hikes along the Rio Grande, a low-impact regimen that eases arthritis while satisfying a competitive drive.
  arts: Jordan Helms immerses themselves in desert-inspired visual arts, drawing inspiration from Georgia O'Keeffe exhibitions in Marfa, sketching with charcoal, playing folk harmonica tunes by Woody Guthrie,
    and helping organize community festivals that blend Texan and Mexican melodies, all while curating a private collection of regional folk paintings.
  travel: Jordan Helms prefers road trips that blend art pilgrimage and family heritage, having driven historic Route 66 to El Paso and Marfa for exhibitions, planning future visits to the San Antonio Museum
    of Art and the Dallas Museum of Art, while budgeting each journey carefully to protect retirement funds.
  culinary: Jordan Helms cooks traditional Tex-Mex dishes such as carne asada tacos, chile rellenos, and homemade guacamole, often incorporating garden-fresh heirloom tomatoes, fresh chilies, and squash,
    while occasionally experimenting with smoked brisket and their beloved secret salsa recipe.
  core: Jordan Helms is a methodical, art-obsessed ranch hand who balances competitive chess with solitary gardening, worries about finances, and channels a skeptical yet caring spirit into preserving border-side
    heritage.
background:
  cultural: Jordan is a white American raised in the remote West Texas town of Presidio. His family has deep ranching roots that stretch back several generations, embodying the frontier values of independence,
    self‑reliance, and strong community ties. While his primary cultural identity is shaped by a Protestant, rural Texas heritage, living on the U.S.–Mexico border has exposed him to Mexican influences—Spanish
    language, regional cuisine, and vibrant cross‑cultural festivals—which he has incorporated into his daily life. This blend of Anglo‑American frontier tradition and borderland cultural exchange defines
    his worldview and informs his appreciation for both local history and diverse artistic expressions.
