persona_description: A German historian who started a new era in historical studies by his method of source criticism, and whose works had a momentous influence on the general conception of history. He
  was the only son of the Danish explorer Carsten Niebuhr and spent over a year in England and Scotland before embarking on a career in state service. He became private secretary to Count Schimmelmann,
  the Danish minister of finance, and in 1804 director of the national bank. In 1806, at the request of Baron von Stein, the Prussian chief minister, he took up a similar post in Prussia. Two years after
  Stein’s fall (1808), however, disapproving of Prince von Hardenberg’s policy, he resigned and became state historiographer. At the same time he became a member of the Berlin Academy of Sciences and was
  thereby empowered to lecture at the newly founded University of Berlin. In 1810 he began the series of lectures on Roman history that were the basis of his great book. In 1816 he went as Prussian ambassador
  to the Vatican, retiring to Bonn in 1823.
