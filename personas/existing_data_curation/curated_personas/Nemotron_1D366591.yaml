personas:
  professional: Jesse Poole, a 57‑year‑old veteran of early childhood education, blends three decades of district‑wide program management, meticulous budget oversight, and staff development with a practical,
    structure‑loving mindset that tolerates a bit of disorganization, allowing them to creatively adapt curricula to Illinois standards while championing community partnerships and emergency preparedness.
  sports: Jesse Poole follows the Chicago Cubs and Chicago Bears avidly, participates in a local senior softball league, enjoys seasonal fishing tournaments on the Illinois River, and maintains a relaxed
    fitness routine that mixes morning walks with occasional yoga stretches in the garage.
  arts: Jesse Poole regularly attends productions by the Seneca Community Theater, delights in the historical novels of Philippa Gregory and Ken Follett, and fills their garage workshop with the soundtracks
    of Bob Dylan and The Rolling Stones, which together fuel their love for storytelling and classic American folk culture.
  travel: Jesse Poole favors low‑key road trips to Starved Rock State Park and the Shawnee National Forest, dreams of exploring historic Bath in England and the vineyards of Marlborough, New Zealand, and
    plans each journey with a flexible itinerary that balances their budget constraints and love for leisurely fishing spots.
  culinary: Jesse Poole’s palate celebrates garden‑fresh roasted heirloom tomatoes, sautéed zucchini, and herb‑infused home‑brewed pale ales, and while they can expertly craft a sourdough loaf, they prefer
    casual dining at the local farmer’s market stalls where they can sample fresh cornbread and smoked trout.
  core: Jesse Poole is a pragmatic early‑education leader who balances budget precision with a laid‑back love of gardening, fishing, home‑brewing, and woodworking, all while nurturing community ties and
    occasionally forgetting where they put their keys.
background:
  cultural: Jesse is a lifelong resident of Seneca, Illinois, a small town in LaSalle County known for its close-knit community and Midwestern values. He comes from a white, multi-generation family with
    deep ties to the region’s agricultural and industrial heritage. He actively participates in his local Methodist church, attends county fairs, and values the hospitality, practicality, and cooperative
    spirit that characterize the Midwest. His upbringing emphasized hard work, community service, and respect for tradition, shaping his collaborative and stable approach to both professional and personal
    life.
