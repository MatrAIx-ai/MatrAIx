personas:
  professional: Richard Rogers, a 19‑year‑old aspiring community‑arts strategist, blends their knack for spontaneous idea‑generation, solid photography fundamentals, and basic Photoshop and Canva skills
    with a natural talent for rallying volunteers and promoting campus events, all while wrestling with rigid deadlines due to their love of loosely structured creative environments.
  sports: Richard Rogers, an enthusiastic intramural soccer player for their university’s Red Hawk League, never misses a Columbus Crew home game, cheers on the Ohio State Buckeyes during football season,
    and joins weekend pick‑up basketball at the local community center, though their lack of consistent stretching leaves them with occasional shin splints.
  arts: Richard Rogers, an avid cultural explorer who spends weekends roaming Columbus’s Short North galleries and capturing nocturnal shots of Banksy‑style murals for Instagram, draws creative fuel from
    the psychedelic installations of Yayoi Kusama and the off‑beat beats of Tyler, the Creator, hones quick‑thinking skills in the improv troupe Playful Chaos, mentors kids in digital drawing at a youth
    arts program, and constantly swaps stories with local muralist Saffron, though they often neglect to back up their photo archives until the last minute.
  travel: Richard Rogers, a spontaneous traveler on a modest student budget, has road‑tripped to Nashville for a live‑music weekend, splurged on a three‑day indie festival in Austin, captured the neon street
    art of New York City during a short study‑abroad stint, and now pins Portland, Oregon’s vibrant mural scene and a future backpacking trek through Mexico’s coastal towns as their next big adventure,
    all while booking last‑minute hostels and relying on rideshare apps for cheap travel.
  culinary: Richard Rogers, a self‑taught home chef, mixes Korean BBQ tacos with maple‑glazed pork belly, perfects miso‑infused ramen topped with fresh basil and smoked paprika, whips up caramelized banana
    crepes for weekend brunch, sources gochujang and kimchi from the local Asian market, and frequently posts their experimental fusion dishes on Instagram, though they sometimes over‑season and burn the
    edges when juggling late‑night photo editing.
  core: Richard Rogers, a 19‑year‑old nightlife‑photography lover and improv aficionado, blends spontaneous creativity with community storytelling, even as they battle chronic insomnia, forget deadlines,
    and hoard vintage camera gear like treasure.
background:
  cultural: Richard grew up in a middle-class, white Anglo-American family in Columbus, Ohio. His ancestry includes German and Irish roots, and his upbringing reflected typical Midwestern values such as
    friendliness, cooperation, and a strong sense of community. He attended a public high school where he was involved in the school’s art club and theater program, and later enrolled part-time at Ohio
    State University, taking courses in communications and visual arts before pausing his studies to explore personal interests. The local culture of Columbus—its growing arts scene, diverse food options,
    and emphasis on community events—has shaped his appreciation for creative expression and his desire to contribute to the cultural fabric of his hometown.
