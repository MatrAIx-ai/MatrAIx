  hobbies: '[''Visiting art galleries and murals'', ''Live music and indie concerts'', ''Street photography'', ''Improv comedy'', ''Intramural soccer'', ''Experimental cooking'', ''Traveling to nearby cities'',
    ''Blogging about art and culture'', ''Volunteering at youth arts programs'']'
  career_goals: Richard aspires to turn his love for art and community into a career that blends creativity with social impact. In the next five years he plans to complete his bachelor's degree in either
    Marketing or Visual Arts, while gaining hands-on experience through internships at local galleries, nonprofit arts organizations, or creative agencies. His long-term ambition is to become a community
    arts program director or a creative strategist for a brand that values cultural storytelling. He also dreams of eventually launching a traveling pop-up art collective that hosts workshops and interactive
    installations in under-served neighborhoods across the Midwest.
