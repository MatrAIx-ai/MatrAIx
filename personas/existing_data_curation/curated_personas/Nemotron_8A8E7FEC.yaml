  hobbies: '[''model train assembly'', ''wooden ship model building'', ''vegetable gardening'', ''crossword and Sudoku puzzles'', ''Cuban cooking'', ''genealogy research'']'
  career_goals: He aims to preserve his independence through self‑sufficient home maintenance, while offering his technical know‑how to younger members of the local Cuban community via informal mentorship.
    Oscar aspires to compile a practical guidebook on low‑cost home repairs and Cuban‑American cooking, and hopes to remain financially stable by carefully managing his retirement savings. He also wishes
    to obtain a volunteer certification as a Home Maintenance Advisor through a local senior services program.
