  hobbies: '[''Live music and dancing'', ''Gardening herbs for cocktails'', ''Hiking the Natchez Trace'', ''Cooking Southern cuisine'', ''Reading mystery novels'', ''Volunteer work at community events'',
    ''Photography of historic sites'', ''Crochet and knitting'', ''Trivia night participation'']'
  career_goals: Looking ahead, Lori aims to move into a bar manager role where she can shape the drink menu and mentor new staff, while still keeping the relaxed, community‑focused atmosphere she loves.
    She dreams of creating a small boutique bar or coffee‑cocktail lounge that highlights locally sourced ingredients and celebrates Natchez’s historic charm. To support this vision, she plans to earn a
    certified mixology credential, enhance her inventory‑control expertise, and develop event‑planning skills for charity fundraisers. Balancing her practical need for stability with her curiosity, she
    hopes to build a thriving business that offers flexibility for her family and a welcoming space for friends and neighbors.
