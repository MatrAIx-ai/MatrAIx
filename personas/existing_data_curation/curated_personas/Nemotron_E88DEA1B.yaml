personas:
  professional: Lori Mayers, 44, blends expert cocktail mixology with a community‑focused bar operation where they juggle inventory, staff mentorship, and storytelling about Natchez’s spirits while often
    relying on improvisation due to a laid‑back attitude toward rigid scheduling.
  sports: Lori Mayers jogs sections of the Natchez Trace each weekend, belongs to a local sunrise hiking club, cheers on the Mississippi Braves during baseball season, and occasionally watches Memphis Grizzlies
    games, preferring low‑impact, social fitness activities that pair nature with camaraderie.
  arts: Lori Mayers frequents live blues nights featuring Taj Mahal and jazz sets with Diana Krall, captures historic Natchez storefronts through the lens of a Canon DSLR inspired by Dorothea Lange, and
    spends evenings crocheting while humming to Stevie Ray Vaughan, weaving music and visual art into their community‑centered life.
  travel: Lori Mayers prefers spontaneous weekend road trips, often cruising down the Mississippi River corridor to explore the historic French Quarter of New Orleans for its music and cuisine, or taking
    a quick flight to Nashville to soak in the country‑song scene, all while balancing family responsibilities that limit extended vacations.
  culinary: Lori Mayers masters the art of Southern comfort food, regularly serving shrimp‑and‑grits and collard‑green casserole at potlucks, while whipping up rosemary‑infused bourbon Old Fashioneds and
    basil‑mint mojitos that showcase herbs from their garden, reflecting a culinary approach that blends familiar flavors with inventive mixology.
  core: Lori Mayers, a 44‑year‑old bar professional, balances a restless curiosity for new flavors with a laid‑back, community‑first vibe, often juggling spontaneous improvisation against a backdrop of
    occasional stress and charming quirks.
background:
  cultural: Lori grew up in the heart of the Mississippi Delta, raised in a white, middle‑class family in a small town near Natchez. Her upbringing was shaped by Southern hospitality, church involvement,
    and a strong sense of community. She was exposed to the region’s rich musical heritage—blues, gospel, and country—and to the culinary traditions of the South, which inform her love of food and drink.
    The historic atmosphere of Natchez, with its antebellum homes and river‑front culture, gave her a deep appreciation for storytelling and local history. While she values these traditions, Lori also embraces
    new ideas, blending her Southern roots with a broader curiosity about the world.
attributes:
  skills: '[''Cocktail mixology'', ''Customer service'', ''Cash handling'', ''Inventory management'', ''Event coordination'', ''Team leadership'', ''Conflict resolution'', ''Rapid multitasking'', ''Cultural
