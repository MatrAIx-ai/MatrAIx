persona_description: A researcher or clinician interested in the assessment and treatment of mental health in older adults, particularly those with depression. The individual likely conducts cross-sectional
  and longitudinal studies to evaluate the relationship between LIPA (physical activity level index) and depression, anxiety, psychological distress, overall mental health, perceived stress, and negative
  affect. They are also familiar with the use of device-based measures and isotemporal substitution models to assess LIPA and are likely to adjust for confounders such as age, gender, BMI, ethnicity, education,
  income, marital status, and physical functioning. The individual may have expertise in the development and validation of instruments related to physical activity and mental health, as well as in the use
  of statistical analysis methods to evaluate the results.
