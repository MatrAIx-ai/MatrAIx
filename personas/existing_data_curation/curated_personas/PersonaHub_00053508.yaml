persona_description: A chemistry professor at Duke University who specializes in the field of magnetic resonance imaging (MRI), particularly in the development of new techniques for improving the accuracy
  and reliability of temperature measurements in MRI scans. He has a unique understanding of how hydrogen atoms in internal organs behave in the presence of a magnetic field, and has developed a new approach
  to selective detection of intermolecular multiple quantum coherences (iMQCs) in hydrogen atoms, which he uses to improve the accuracy of heat measurements in MRI scans. He has also developed a new technique
  for measuring temperature changes in procedures like hyperthermia cancer therapy, and has applied this technique to demonstrate its effectiveness in live rodents. He is currently working on refining the
  electronics and interpretation of data from MRI scans to improve heat measurements, and has suggested that his technique could be applied in other kinds of therapy.
