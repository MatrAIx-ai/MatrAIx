personas:
  professional: Louis Doran is a 29‑year‑old culinary supervisor with a STEM graduate background who seamlessly blends food‑safety expertise, lean‑process thinking, and Python‑driven workflow analytics
    to keep a fast‑paced kitchen running like a well‑orchestrated lab, and they foster a low‑stress team culture through their calm, collaborative demeanor.
  sports: Louis Doran enjoys solitary weekend hikes along the trails near Crossroads Park, follows the local soccer club the River City FC, and they participate in a monthly 5‑k run group that meets at
    the community park, while also stretching their wrists after long board‑game nights to prevent tendinitis.
  arts: Louis Doran frequents downtown art galleries, often lingering over exhibitions by modernists like Yayoi Kusama and Georgia O’Keeffe, and they spend evenings sketching watercolors of cityscapes,
    drawing inspiration from their favorite musician, Björk, for creative plating concepts.
  travel: Louis Doran prefers meticulously planned culinary pilgrimages, having visited Kyoto’s Nishiki Market to study fermentation, Barcelona’s tapas bars for inspiration, and the Napa Valley for wine‑pairing
    retreats, and they also enjoy weekend road trips to the nearby Sierra Nevada for the solitude they crave.
  culinary: Louis Doran is an experimental home chef who regularly cooks sous‑vide duck breast with a miso‑caramel glaze, crafts beet‑infused foams with agar‑agar, and they perfect coffee‑infused panna
    cotta using a precision immersion circulator and a lab‑style mise en place, though they sometimes spend hours obsessing over plating symmetry.
  core: Louis Doran is a calm, art‑loving culinary technologist who merges data‑driven kitchen management with modernist cooking, pursues low‑stress efficiency, and they balance solitary hikes with occasional
    board‑game camaraderie.
background:
  cultural: Louis comes from a White, Midwestern‑American background, raised in the Oklahoma City metropolitan area. His family’s roots trace to German and Irish ancestry, and he grew up in a community
    that values hospitality, hard work, and modesty. The regional culture of Oklahoma—combining Plains resilience, a strong sense of local community, and a growing appreciation for arts and culinary diversity—has
    shaped his preference for harmony, his calm demeanor, and his curiosity about blending traditional comfort foods with innovative techniques.
