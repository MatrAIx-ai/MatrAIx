  career_goals: Louis aims to progress to kitchen manager and eventually open a small boutique restaurant that blends culinary art with technology‑driven sustainability. He plans to earn a Certified Culinary
    Manager credential, deepen his expertise in food science, and lead an innovative menu development team that incorporates local ingredients and modern cooking techniques. Over the next five years, he
    envisions overseeing multiple locations or becoming a consultant who helps eateries improve efficiency and food safety while fostering a collaborative, low‑stress workplace.
