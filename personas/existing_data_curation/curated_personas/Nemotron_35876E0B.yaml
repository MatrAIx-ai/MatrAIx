  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Landscape photography'', ''Hiking in the Rockies'', ''Playing acoustic guitar'', ''Reading contemporary fiction'', ''Mindfulness
    meditation'', ''Volunteering teaching art to children'', ''Exploring indie coffee shops'', ''Playing board games'']'
  career_goals: He plans to transfer to a four‑year university to major in psychology with a focus on art therapy, aiming to become a licensed art therapist who helps adolescents manage anxiety and stress.
    Simultaneously, he is building a portfolio for user‑experience design, hoping to work at a tech‑creative agency where he can blend his artistic eye with his analytical mindset. In the longer term, Daniel
    envisions creating community workshops that combine art, mindfulness, and mental‑health education.
