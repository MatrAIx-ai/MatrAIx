personas:
  professional: A future art therapist and budding UX designer, Daniel Dubin combines a solid foundation in graphic design, photography, and web development with a methodical, organized work ethic and an
    innate curiosity that drives them to blend therapeutic practice with user‑experience research for adolescent mental health.
  sports: A weekend hiker and snow‑shoer who also follows professional sports, Daniel Dubin is a devoted fan of the Denver Broncos and Colorado Avalanche, belongs to the local Colorado Mountain Club for
    trail runs, and incorporates a disciplined cardio routine into their schedule, though anxiety sometimes causes them to skip workouts.
  arts: A devoted participant in Colorado’s creative scene, Daniel Dubin frequents the Denver Art Museum and the Museum of Contemporary Art Denver, sketches in a leather‑bound journal inspired by Georgia
    O’Keeffe’s landscapes, plays acoustic guitar to the tunes of Sufjan Stevens and Iron & Wine, and volunteers teaching art to kids, channeling their kindness into community projects.
  travel: An avid explorer of the Rocky Mountain West, Daniel Dubin has hiked the crags of Rocky Mountain National Park, trekked the dunes of Great Sand Dunes National Park, and dreams of strolling through
    Kyoto’s zen gardens, favoring self‑planned itineraries that balance low‑budget backpacking with occasional splurges on boutique coffee shops in Denver and Portland.
  culinary: A coffee aficionado and budding home cook, Daniel Dubin’s palate delights in pour‑over coffee, matcha lattes, avocado toast with radish and microgreens, roasted vegetable quinoa bowls, and the
    occasional Colorado bison burger, though they habitually order an extra espresso at every café visit.
  core: A meticulous, curiosity‑driven art lover with an undercurrent of anxiety, Daniel Dubin weaves together suburban community values, mountain adventures, and a love for indie coffee into a uniquely
    reflective yet occasionally over‑thinking life approach.
background:
  cultural: Daniel grew up in a middle‑class white family in Parker, Colorado, where the blend of suburban community values and the nearby Rocky Mountain outdoor culture shaped his outlook. His parents,
    of German‑Irish descent, emphasized education, self‑reliance, and community service. He was exposed to the region’s appreciation for nature, sustainability, and a vibrant arts scene in nearby Denver,
    fostering his love for both outdoor adventure and creative expression. While rooted in traditional American small‑town customs, he shows an awareness of the state’s Native American heritage and strives
    to respect the land and its diverse cultural influences.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Digital photography'', ''Basic web development (HTML, CSS, JavaScript)'', ''Research and analytical writing'', ''Data organization (Excel,
