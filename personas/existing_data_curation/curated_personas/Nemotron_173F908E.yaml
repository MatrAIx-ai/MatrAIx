  career_goals: Even at three, Gwendolyn voices whimsical ambitions that reflect her curiosity and artistic appreciation. She dreams of becoming an artist who paints bright pictures for storybooks, imagines
    herself as an astronaut exploring space, and says she wants to help Mom in the kitchen by stirring batter. She also expresses a desire to care for animals like the family’s pet rabbit and hopes to learn
    to read and write so she can tell her own stories one day.
