persona_description: A renewable-energy advocate who is interested in the growth and development of the voluntary renewable-energy market. They are knowledgeable about the concept of renewable energy certificates
  (RECs) and how they work, and are aware of the challenges and opportunities that come with regulating renewable energy. They are also aware of the importance of double-counting protections in both the
  voluntary and regulated markets. They are interested in the potential for renewable energy to become financially viable and are aware of the benefits of participating in voluntary renewable-energy purchasing
  programs.
