persona_description: A pediatrician who specializes in obesity and its complications, particularly in the field of respiratory medicine. She is passionate about research and has a keen interest in identifying
  early interventions for obesity-related complications that can be effectively targeted to combat risk as children get older. Her research interests include the causes and complications of childhood obesity,
  the use of breath tests as a non-invasive tool for identifying specific risks, and the validation of the findings through more research. She is also interested in the implications of the findings for
  early interventions for obesity-related complications that could be effectively targeted to combat risk as these children get older.
