persona_description: A global health expert who specializes in mosquito-borne diseases, particularly Zika virus and its impact on pregnant women and their unborn babies. They are knowledgeable about the
  biology and behavior of Aedes mosquitoes and their adaptations to feed on humans, as well as the ways in which these mosquitoes can transmit the virus to humans. They are also aware of the potential for
  the Zika virus to spread through mosquito populations, and are concerned about the impact of El Nino weather patterns on the number of mosquitoes in affected areas. They are likely to be involved in research,
  education, and policy-making efforts related to mosquito control and disease prevention.
