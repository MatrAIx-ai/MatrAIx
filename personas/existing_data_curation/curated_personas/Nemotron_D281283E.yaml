  hobbies: '[''Zumba and line‑dance classes'', ''Cooking traditional Chinese dishes'', ''Gardening herbs and vegetables'', ''Volunteering at the senior center'', ''Neighborhood potluck gatherings'', ''Bird‑watching
    in local parks'', ''Reading health and wellness magazines'', ''Practicing tai chi in community classes'', ''Participating in online nursing forums'']'
  career_goals: Yue Ying aims to continue her nursing practice while gradually transitioning to a mentorship and community‑health educator role. Over the next two years she plans to earn a Certified Geriatric
    Nurse credential and complete her high‑school equivalency, which will give her greater confidence and flexibility. She hopes to reduce her workload to part‑time to better manage stress, and eventually
    launch a small home‑health consulting service that serves Mandarin‑speaking seniors in the Beaumont area, merging her clinical expertise with her cultural background.
