personas:
  professional: Yue Ying, a 63‑year‑old Licensed Practical Nurse in Beaumont, blends meticulous patient assessment and bilingual communication with a relaxed, people‑centered approach, and they mentor new
    staff while gradually shifting toward part‑time geriatric education and a home‑health consulting service for Mandarin‑speaking seniors.
  sports: Yue Ying participates enthusiastically in weekly Zumba and line‑dance sessions at the local senior center, practices tai chi each sunrise in the park, follows the Los Angeles Lakers and the San
    Diego Padres, and they join the Beaumont Bird Club for leisurely bird‑watching walks that double as gentle cardio.
  arts: Yue Ying enjoys the soothing cello works of Yo‑Yo Ma, the vibrant pop of Jay Chou, and classic Cantonese opera recordings, often attending community cultural performances with friends, and they
    hum along while preparing festive dumplings, highlighting a love of music that bridges tradition and contemporary flair.
  travel: Yue Ying prefers short, well‑planned trips such as weekend getaways to Yosemite’s giant sequoias, a family reunion in Taiwan during Lunar New Year, and a relaxed cruise along the California coast,
    and they carefully balance travel costs with a fixed pension, opting for senior discounts whenever possible.
  culinary: Yue Ying’s kitchen blends home‑grown basil, cilantro, and bok choy with expertly prepared dishes like steamed fish with ginger, braised pork belly (hong shao rou), and hand‑rolled jiaozi for
    holiday gatherings, though they occasionally forget to label leftovers, leading to occasional food waste.
  core: Yue Ying is a caring, sociable nurse‑educator who balances community service, modest financial habits, and a love for dance, tea, and traditional cooking, all while navigating the occasional disorganization
    that comes with a busy senior life.
background:
  cultural: Yue Ying is of Chinese heritage, born to immigrant parents who emphasized respect for elders, harmony, and community responsibility. Bilingual in Mandarin and English, she maintains cultural
    traditions such as celebrating Lunar New Year and the Mid‑Autumn Festival with her local Chinese community. Living in Beaumont, California, she blends her East Asian values—collectivism, modesty, and
    gratitude—with the diverse, multicultural environment of Riverside County, which has enriched her perspective on health care and community engagement.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''Wound care'', ''Vital signs monitoring'', ''Basic Life Support (BLS) certification'', ''Electronic health record documentation'', ''Bilingual
