persona_description: A team of researchers from the University of Kentucky, specializing in the digital restoration of ancient texts, particularly those from the ancient Roman city of Herculaneum. The team
  is led by W. Brent Seales, who has developed a technique to digitally unravel fragile ancient texts that haven't been read in nearly 2,000 years. The team is using a synchotron facility called the Diamond
  Light Source to scan and image the scrolls, and is planning to use machine learning to help discern the differences between ink and papyrus all the way through the countless layers wrapped up in the scroll.
  The ultimate goal is to read the ancient texts, which could have been written in the same time period as the eruption of Vesuvius.
