personas:
  professional: Jonathan Hood is a 16‑year‑old aspiring automotive technician who leverages his hands‑on experience with truck upgrades and his strategic mindset from competitive gaming to diagnose problems
    quickly, yet his spontaneous nature often leads him to skip formal documentation and struggle with meeting apprenticeship deadlines.
  sports: Jonathan Hood spends weekends at the local skate park mastering ollies and kickflips, roots for the San Antonio Spurs in basketball and cheers on San Antonio FC during soccer season, and they
    treat skateboarding as their primary fitness outlet while rarely attending formal gym sessions.
  arts: Jonathan Hood mixes Texas country classics like Willie Nelson with hip‑hop hits from Travis Scott while editing short TikTok clips of car mods and gaming highlights, drawing visual inspiration from
    YouTubers such as Hoonigan and Mighty Car Mods, and they channel this eclectic soundtrack into creative energy for both their builds and their skate tricks.
  travel: Jonathan Hood enjoys the lively atmosphere of Fiesta San Antonio and local car shows, dreams of driving to Detroit for the North American International Auto Show and flying to Los Angeles for
    a regional eSports tournament, but tight teen budgets and school commitments keep most trips short‑range and planned with friends.
  culinary: Jonathan Hood loves the smoky flavor of Texas brisket and the spice of tacos al pastor from San Antonio’s street vendors, often replicating a simple burger‑and‑fries combo at home with jalapeños
    and smoked paprika, while their cooking skill hovers at confident amateur level, preferring quick, high‑energy meals that match their fast‑paced hobbies.
  core: Jonathan Hood is a competitive teen whose love for tinkering under the hood, mastering video‑game tactics, and landing skate tricks fuels a restless curiosity tempered by impulsive spending and
    a chronic battle with organization.
background:
  cultural: Jonathan is a white Texan raised in the Bexar County suburb of San Antonio. His family has deep roots in the region, with grandparents who worked in ranching and the oil industry. Growing up
    in a predominantly Anglo neighborhood, he was also immersed in the broader cultural tapestry of San Antonio, which blends Southern, Mexican, and urban influences. He celebrates traditional American
    holidays while also participating in local events like Fiesta, and he is familiar with Spanish greetings and Mexican cuisine thanks to the city's multicultural environment. His upbringing emphasized
    self‑reliance, a practical work ethic, and a fascination with cars—a common thread in Texas culture—shaping his hands‑on interests and competitive spirit.
attributes:
  skills: '["Basic car maintenance (oil changes, brake replacement)", "DIY electronics troubleshooting and repurposing", "Strategic gaming (FPS, RTS) with quick adaptation to meta changes", "Video editing
