  hobbies: '["Competitive FPS and RTS gaming", "Skateboarding at the local park", "Automotive tinkering and performance upgrades", "Listening to Texas country music and hip‑hop", "Attending car shows and
    Fiesta San Antonio", "Creating short video content for social media"]'
  career_goals: Jonathan aims to turn his mechanical aptitude into a paid apprenticeship as an automotive technician, with the goal of earning a journeyman certification within the next five years. He also
    dreams of building a modest online presence as a car‑mod enthusiast, producing video content that could attract sponsorships or generate a side income. Simultaneously, he hopes to join a regional eSports
    team for the games he excels at, competing in local tournaments and possibly securing a scholarship or sponsorship that would support his further education or training.
