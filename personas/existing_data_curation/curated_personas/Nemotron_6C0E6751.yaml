  hobbies: '[''Gardening'', ''Southern cooking and baking'', ''Swing dancing'', ''Historical fiction book club'', ''Volunteer work at local animal shelter'', ''Quilting and crocheting'', ''Guided walking
    tours of historic Charleston'', ''Photo documentation of community events'']'
  career_goals: Bridget aims to formalize her extensive volunteer experience into a senior leadership role within a Charleston‑based nonprofit focused on historic preservation and community health. She
    plans to earn a certificate in nonprofit management to strengthen her strategic planning and fundraising capabilities, positioning herself to oversee larger event programs and mentor emerging volunteers.
    Parallel to this, she hopes to launch a modest catering venture that showcases Southern comfort food using locally sourced ingredients, providing meals for community gatherings and charitable events.
    Her long‑term ambition is to blend her structured, practical approach with her sociable, collaborative spirit to develop sustainable programs that reinforce community cohesion and honor local heritage.
