persona_description: Kevin Eggan, a 31-year-old assistant professor of molecular and cellular biology, is interested in using cloning to study degenerative diseases. He has made significant contributions
  to the field of cloning, including cloning mice from neurons and explaining how cloning "reprograms" the genetic material from an adult mouse cell. Eggan plans to create human stem cell lines from patients
  with neurodegenerative disorders and study disease development and search for new drugs. He is also studying nuclear reprogramming in human cells in the hope of finding a way to create patient-specific
  embryonic stem cells without using human eggs.
