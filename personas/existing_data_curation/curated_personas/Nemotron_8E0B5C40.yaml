personas:
  professional: Maritza Salcedo, a 20‑year‑old school bus driver in Los Angeles County, blends meticulous defensive driving, bilingual communication, and on‑the‑spot vehicle troubleshooting with a relaxed
    yet surprisingly assertive approach to managing elementary student behavior and route logistics.
  sports: Maritza Salcedo, who hikes the San Gabriel Mountains on weekends, plays casual beach volleyball at Venice Beach, and avidly follows the Los Angeles Dodgers and Lakers, approaches fitness with
    a laid‑back ethos that prioritizes fun over strict regimens.
  arts: Maritza Salcedo enjoys sketching urban scenes in a pocket notebook, listening to regional norteña and cumbia groups such as Café Tacvba and Natalia Lafourcade, and attending community theater performances
    of classic cinema works by Guillermo del Toro, letting the arts shape their identity and leisure.
  travel: Maritza Salcedo prefers spontaneous road trips to nearby destinations like Joshua Tree and Santa Barbara, while dreaming of a culturally immersive journey to Oaxaca, balancing limited student‑loan
    finances with a love for short‑term adventure over meticulously planned itineraries.
  culinary: Maritza Salcedo loves cooking traditional dishes such as mole poblano, pozole, and tamales, experimenting with fresh chiles and cacao, and often hosts family gatherings where they serve homemade
    salsa and freshly made guacamole, showcasing a moderate culinary skill level fueled by nostalgia and curiosity.
  core: Maritza Salcedo is a 20‑year‑old bilingual bus driver who balances practical curiosity with a laid‑back vibe, channeling stress into yoga, cooking, and occasional spontaneous road trips while nurturing
    a dream of greener school transportation.
background:
  cultural: Maritza is a Mexican‑American raised in Los Angeles County, with family roots in Jalisco, Mexico. She grew up in a bilingual household where Spanish was spoken daily, and Mexican traditions
    such as Día de los Muertos, quinceañeras, and family gatherings were celebrated with enthusiasm. The vibrant Latino community in Southern California has reinforced her cultural pride, while also exposing
    her to a broader American context. She balances collectivist values—strong family ties, respect for elders, and community support—with an independent, practical outlook shaped by her education and career.
    Her bicultural identity informs her communication style, her love for Mexican cuisine, and her commitment to serving diverse student populations.
attributes:
  skills: '[''Safe school bus operation'', ''Defensive driving'', ''Route planning and navigation'', ''Student supervision and behavior management'', ''Basic vehicle maintenance and troubleshooting'', ''First
