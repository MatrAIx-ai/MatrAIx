    tools'']'
  hobbies: '[''Cooking Mexican dishes'', ''Listening to regional Mexican music'', ''Hiking in the San Gabriel Mountains'', ''Yoga and meditation'', ''Sketching and drawing'', ''Reading contemporary fiction'',
    ''Playing video games'', ''Exploring electric vehicle technology'', ''Attending community cultural festivals'', ''Volunteering at local youth centers'']'
  career_goals: Maritza aims to advance within the school transportation field by becoming a senior driver and eventually a driver trainer or transportation coordinator for her district. She plans to enroll
    in a community college program for logistics or public administration to earn a degree in transportation management. Passionate about sustainability, she hopes to specialize in electric bus fleet operations
    and advocate for greener school transportation solutions. Long‑term, she envisions creating a mentorship program for new drivers that emphasizes safety, cultural competency, and stress‑management techniques,
    while also seeking a better work‑life balance to reduce her own stress levels.
