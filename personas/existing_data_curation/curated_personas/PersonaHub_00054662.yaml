persona_description: 'A researcher at the Institute for Health Metrics and Evaluation (IHME) at the University of Washington, United States, who has contributed to the study titled "Mortality from Malaria:
  A New Analysis of 1980-2010 Data". The researcher is known for his expertise in using data from verbal autopsies and computer modeling to estimate malaria mortality by age, sex, country, and year, and
  for his role in the study''s peer review process. The researcher is interested in the reliability of the data used in the study and the extent of the decline in malaria deaths, and is critical of the
  study''s conclusions.'
