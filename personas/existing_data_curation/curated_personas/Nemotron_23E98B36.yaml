personas:
  professional: John Gifford, a 17‑year‑old aspiring IT support specialist and hobbyist electrician, combines a methodical research habit with hands‑on tinkering—troubleshooting household electronics, repairing
    small engines, and writing Python scripts—while they leverage their organized yet flexible approach to study for a CompTIA A+ certification and juggle GED coursework, all in a quiet, solitary setting.
  sports: John Gifford, a 17‑year‑old who favors low‑stimulus solo exercise, keeps fit by jogging at sunrise, attending weekly Bike‑Fit sessions with the Riverton Youth Cycling Club, and doing body‑weight
    workouts at home, while passionately rooting for the Chicago Cubs and the Seattle Seahawks on game days.
  arts: John Gifford, an avid consumer of speculative fiction and cinematic scores, spends evenings reading Brandon Sanderson and Neil Gaiman, listening to Hans Zimmer and the band Muse, and they occasionally
    sketch model aircraft designs inspired by the aesthetic of Syd Mead, which fuels their imaginative problem‑solving.
  travel: John Gifford, a frugal 17‑year‑old explorer, prefers meticulously planned solo trips to low‑light locales—like a weekend camp at New Mexico’s Lincoln National Forest for stargazing and a family
    visit to the Grand Canyon—while they dream of future budget‑friendly adventures to Chile’s Atacama Desert and Japan’s Akihabara district to soak in night skies and tech culture.
  culinary: John Gifford, a 17‑year‑old with modest cooking skills, favors quick, precision‑oriented meals like spaghetti aglio e olio, grilled cheese with sharp cheddar, and microwave ramen topped with
    soft‑boiled eggs and sriracha, while they occasionally treat themselves to junk‑food pizza nights and late‑night snack runs for candy bars.
  core: John Gifford, a 17‑year‑old solitary tinkerer, channels a quiet curiosity into building Arduino gadgets and model kits, maintains a meticulous journal, yet often procrastinates on routine health
    check‑ups and they indulge in late‑night gaming marathons.
background:
  cultural: John grew up in Youngstown, Ohio, a city shaped by its historic steel‑manufacturing roots and a tight‑knit, working‑class community. His family’s cultural heritage blends Midwestern values of
    self‑reliance, modesty, and community support with a mix of Irish and German ancestry common in the region. Local customs like high school football gatherings, neighborhood block parties, and a strong
    emphasis on family cohesion have influenced his worldview, fostering a respect for hard work, practicality, and quiet perseverance.
attributes:
