  hobbies: '[''reading science‑fiction/fantasy'', ''strategy and simulation video gaming'', ''model kit building'', ''Arduino/Raspberry Pi tinkering'', ''stargazing'', ''technology podcasts'', ''journaling'']'
  career_goals: John aims to complete his GED within the next year and pursue a technical certification—either CompTIA A+ for IT support or an apprenticeship in electrical work—so he can secure a stable,
    quiet job that leverages his hands‑on skills. He dreams of eventually starting a freelance handyman service or a small remote tech‑support business, allowing him to work independently while staying
    in a low‑stimulus environment.
