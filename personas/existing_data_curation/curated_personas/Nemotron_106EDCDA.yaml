  career_goals: She aspires to move into a pharmacy management role where she can combine her technical expertise with her business background to improve clinic efficiency and patient outcomes. Over the
    next five years, Ashley aims to lead a team of pharmacy technicians, implement data‑driven inventory systems, and develop community health outreach programs. Ultimately, she envisions opening her own
    independent pharmacy that offers personalized care and integrates wellness services, leveraging her entrepreneurial spirit and desire for community impact.
