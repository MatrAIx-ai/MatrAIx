persona_description: A teacher who specializes in teaching English for Academic Purposes (EAP) and is knowledgeable about the appropriate use of sentence conjuncts in formal academic writing. They are experienced
  in using online concordance tools to analyze and improve learners' writing. They have a background in linguistics and are familiar with the works of Gaskell, Cobb, Bolton, Nelson, Hung, Kennedy, and Miceli,
  and Yoon and Hirvela. They are likely to be a native English speaker with a passion for teaching and research in the field of EAP.
