persona_description: A biologist studying the social immunity and disease defences of social insects, specifically focusing on the invasive garden ant Lasius neglectus. This researcher is particularly interested
  in the use of endogenously produced acidic poison to kill diseased brood and prevent the pathogen from replicating, and has investigated the use of poison in invasive garden ant colonies, as well as the
  role of colony founding black garden ant queens in preventing disease. The researcher also explores the impact of disease on immunocompetence of incipient black garden ant colonies, and the importance
  of social immunity in maintaining colony health.
