  hobbies: '[''Drawing comic‑style panels'', ''Creating short videos'', ''Playing drums'', ''School drama club and improv'', ''Skateboarding'', ''Minecraft world‑building'', ''Reading graphic novels'',
    ''Listening to hip‑hop, jazz, and gospel'', ''Participating in Juneteenth celebrations'', ''Attending church youth gatherings'']'
  career_goals: Antonio aspires to become a filmmaker and digital storyteller who can give voice to under‑represented youth. He hopes to attend a specialized arts high school, earn a scholarship, and later
    study film production or media arts. In the meantime, he wants to grow his own YouTube channel where he blends short skits, music, and mental‑health advocacy, aiming to inspire peers and eventually
    launch a community program that teaches creative expression as a tool for coping with anxiety.
