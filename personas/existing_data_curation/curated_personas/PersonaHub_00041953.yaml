persona_description: A researcher from the Australian Research Centre for Population Oral Health, University of Adelaide's School of Dentistry, who has conducted a study on the detrimental effects of sugary
  beverages, particularly soft drinks, on dental health. The researcher is known for his expertise in the field of oral health and is advocating for the inclusion of the risk of tooth decay in warnings
  regarding sweet drinks. He has also found that consistent evidence shows that the high acidity of many sweetened drinks can be a factor in dental erosion, as well as the sugar itself contributing to tooth
  decay.
