    direction'', ''CRM management (HubSpot)'', ''Graphic design basics (Adobe Photoshop, Illustrator)'']'
  hobbies: '[''Reading contemporary fiction and poetry'', ''Journaling'', ''Vegetable gardening'', ''Hiking in the Ozarks'', ''Yoga and meditation'', ''Cooking Southern cuisine'', ''Nature photography'',
    ''Volunteering at church bible study'', ''Attending local theater productions'']'
  career_goals: Kimberly aims to move into a senior leadership role, such as Director of Marketing or Vice President of Marketing, within the next five years, overseeing a regional or national team. She
    wants to champion data‑driven, emotionally resonant campaigns that align with corporate values and community impact. She is pursuing an executive MBA to broaden her strategic business acumen and aspires
    to mentor emerging female marketers, fostering a culture of resilience and flexibility in high‑pressure environments. Additionally, she hopes to launch a consulting side‑project focused on brand storytelling
    for nonprofit organizations in her community.
