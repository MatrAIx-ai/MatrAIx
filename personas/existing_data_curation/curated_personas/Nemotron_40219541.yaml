  career_goals: Veronica aims to turn her social savvy and organizational talent into a career in community management or event coordination for a tech startup or cultural organization. She plans to complete
    a digital marketing certification and build a personal brand that showcases her expertise in curating experiences and managing online communities. In the longer term, she aspires to lead a team that
    designs inclusive, high‑energy events and to eventually launch her own boutique agency that blends experiential marketing with data‑driven strategies.
