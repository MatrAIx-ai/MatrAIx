personas:
  professional: Camilo Martinez, an aspiring architect-in-training, channels their love for Lego architecture and love of structure into early design sketches and school projects, combining disciplined
    attention to detail with a cooperative spirit that makes them a reliable teammate in group assignments.
  sports: Camilo Martinez, a midfielder for the Midtown Tigers youth soccer club, thrives on the predictable practice schedule and clear team roles, cheering for the national soccer team and keeping a collection
    of Los Angeles Galaxy jerseys while staying disciplined about weekly drills.
  arts: Camilo Martinez immerses themselves in adventure comics like "The Adventures of Tintin" and graphic novels such as "Sword of the Stranger," while regularly listening to banda legends Banda El Recodo
    and norteño group Los Tigres del Norte during family meals, letting the rhythmic storytelling fuel their creative Lego constructions.
  travel: Camilo Martinez dreams of a structured family trip to Legoland California and a cultural visit to the historic ruins of Chichen Itza, preferring itineraries that balance educational tours with
    downtime for building LEGO models, while budget constraints keep overseas travel on the wishlist.
  culinary: Camilo Martinez enjoys helping their mother prepare enchiladas and tamales, skillfully rolling corn tortillas, seasoning with roasted chilies and queso fresco, and has begun experimenting with
    homemade salsa verde, yet they sometimes skip breakfast to rush to soccer practice.
  core: Camilo Martinez is a detail‑oriented 12‑year‑old who balances soccer, LEGO building, and family music, but can become overly anxious about schoolwork and tends to over‑plan their modest allowance.
background:
  cultural: Camilo is a Mexican‑American growing up in Mission, Texas, a city on the U.S.–Mexico border with a predominant Hispanic population. At home, Spanish is spoken alongside English, and his family
    celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and Posadas, often gathering for communal meals of tacos, tamales, and sopes. He regularly attends a bilingual public middle
    school that emphasizes both cultures. Weekly, his family participates in local Catholic services and community festivals that feature mariachi music and folkloric dance. Camilo’s cultural identity is
    shaped by a blend of Mexican heritage, Texan influences, and the cross‑border dynamics of daily life, fostering strong family bonds, respect for elders, and a sense of community responsibility.
attributes:
  skills: '["bilingual Spanish-English communication", "basic arithmetic and problem solving", "reading comprehension", "organized note-taking and time management", "basic computer literacy (typing, educational
    software)", "teamwork and strategic thinking in soccer", "simple cooking (preparing staple Mexican dishes)", "responsible pet care"]'
  hobbies: '["playing soccer with local youth league", "building Lego architecture sets", "reading adventure comics and graphic novels", "playing educational video games (math and language)", "listening
    to regional Mexican music", "helping family cook traditional Mexican dishes", "solving puzzles and model kits"]'
  career_goals: Camilo aspires to pursue a career that combines his love for structure, practicality, and helping others. He dreams of becoming a civil engineer, designing safe bridges and infrastructure
    for his border community, and hopes to earn a scholarship to study engineering after high school. He also envisions the possibility of teaching, especially in bilingual settings, where he could support
    younger students in mastering both Spanish and English. Additionally, Camilo is curious about culinary arts, wanting to preserve his family’s traditional recipes. Ultimately, his goal is to achieve
    academic success, secure a stable, well‑structured profession, and contribute financially to his family’s well‑being.
