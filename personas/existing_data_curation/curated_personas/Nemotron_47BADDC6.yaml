personas:
  professional: Madge Arroyo is an aspiring LEGO architect who meticulously follows instruction manuals, applying their natural love of structure and detail to plan complex builds and envision a future
    as a design engineer.
  sports: Madge Arroyo enjoys swimming with the Gulf Coast Kids Swim Team, plays soccer in a local under‑8 league, and eagerly cheers for the Houston Astros and Houston Texans, while maintaining a routine
    of daily stretching before school.
  arts: Madge Arroyo channels their love of pattern and color by drawing detailed Gulf shoreline scenes, humming Disney classics such as ‘Let It Go’ from Frozen and ‘How Far I’ll Go’ from Moana, and delighting
    in the whimsical antics of the animated series ‘Bluey’.
  travel: Madge Arroyo loves weekend trips to nearby Gulf beaches for shell‑collecting, enjoys family road trips to Orlando’s Disney World, and dreams of exploring the coral reefs of the Great Barrier Reef,
    preferring organized itineraries that include beach walks, snack breaks, and plenty of photo opportunities.
  culinary: Madge Arroyo delights in precisely measuring flour, sugar, and chocolate chips to bake batches of cookies, favors peanut butter and jelly sandwiches with crunchy crust, and enjoys simple dishes
    like mac and cheese, always insisting on a dash of extra cinnamon for extra sweetness.
  core: Madge Arroyo is a detail‑driven 7‑year‑old who thrives on structure, from LEGO builds to cookie recipes, balancing a vivid imagination with a love for predictable routines, while occasionally indulging
    in impulsive shell‑collecting adventures.
background:
  cultural: Madge Anne was raised in Gulfport, Mississippi, within a white family that embraces Southern hospitality and community values. Her household often gathers for church services, holiday potlucks,
    and local festivals such as the Gulf Coast Festival, where she has experienced zydeco music, barbecue, and fishing traditions. Although her surname Arroyo reflects a Hispanic lineage, her family incorporates
    occasional Spanish greetings and enjoys cooking dishes like arroz con pollo for special occasions. She enjoys the warm climate, beach outings, and the close‑knit neighborhood atmosphere that encourages
    neighborly help and respect for local customs.
