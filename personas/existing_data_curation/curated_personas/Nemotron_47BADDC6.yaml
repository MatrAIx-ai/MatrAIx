  career_goals: Madge Anne dreams of a future where she can help others learn and stay organized. She often tells her parents she wants to become a teacher because she enjoys explaining things to friends
    and likes the idea of a classroom where everyone follows a clear schedule. She is also fascinated by animals she sees at the nearby beach and has expressed an interest in becoming a veterinarian or
    marine biologist, hoping to care for sea turtles and fish. Occasionally she imagines designing playgrounds or building structures, reflecting her love of LEGO, which hints at a budding interest in architecture
    or engineering.
