persona_description: A professional engineer who specializes in the design and development of automatic control systems, particularly in the field of servomechanisms. They have extensive knowledge and experience
  in the design and implementation of systems that use feedback mechanisms to control mechanical position or motion, and have worked on applications ranging from gunlaying and fire-control systems to automatic
  machine tools and satellite-tracking antennas. They are skilled in the use of digital signal processing techniques and have a deep understanding of the principles underlying feedback control systems.
