  career_goals: Although retired from full-time teaching, Crystal aims to continue contributing to her community by expanding the Columbia Historical Society's oral-history collection and publishing a family
    memoir that weaves together personal stories with regional history. She aspires to mentor younger volunteers, especially high-school students, in research and preservation techniques. Crystal also plans
    to enroll in a short-term digital preservation course to deepen her technical skills, ensuring that local historical documents are accessible online. On a personal level, she seeks to maintain her health
    through regular walking and yoga, allowing her to stay active and engaged in community life for as long as possible.
