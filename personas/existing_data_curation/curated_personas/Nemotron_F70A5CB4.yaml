personas:
  professional: Crystal Needel, a retired high school English teacher with three decades of curriculum development and literary analysis experience, now channels their methodical organization and love of
    archival research into coordinating oral-history projects and leading preservation workshops at the Columbia Historical Society, where they also mentor volunteers.
  sports: Crystal Needel enjoys low‑impact fitness through daily walks along the Congaree River Trail, weekly yoga sessions at the local senior center, and follows the Carolina Panthers and the Columbia
    Fire, occasionally joining a community walking club for seniors where they share birdwatching tips.
  arts: Crystal Needel immerses themselves in historical fiction by Hilary Mantel, biography collections from Doris Kearns Goodwin, and folk music by the Carter Family, and they spend evenings quilting
    vibrant patterns inspired by traditional Southern quilting techniques while attending community theater productions of classic plays.
  travel: Crystal Needel prefers thoughtful road trips to historic sites such as Charleston’s historic district, the Lowcountry plantations, and the colonial town of Williamsburg, planning each itinerary
    with genealogical research in mind and balancing their love of nature with relaxation at quiet lakeside cabins, where they often sketch local flora.
  culinary: Crystal Needel delights in cooking with garden‑fresh herbs like rosemary, thyme, and sage, often preparing herb‑infused roasted chicken and fresh garden salads, while they occasionally over‑salt
    their soups due to a habit of ‘seasoning until it tastes right’.
  core: Crystal Needel is a methodical, curiosity‑driven retiree who blends their love for history, gardening, and community service with a disciplined routine, and they sometimes forget to cancel excess
    subscriptions.
background:
  cultural: Crystal grew up in a middle-class white family in the Upstate region of South Carolina, where Southern hospitality, church involvement, and respect for tradition were core values. Her family's
    roots trace back to early 19th-century farmers and craftsmen who settled near the Congaree River. Raised in a Methodist household, she attended community events such as county fairs and church potlucks,
    which fostered a strong sense of community service. Moving to Columbia for college, she earned a BA in humanities and later embraced the city's richer cultural tapestry, engaging with local historical
    societies and multicultural festivals while maintaining her Southern identity. Her background informs her appreciation for both the continuity of local customs and the curiosity to explore new ideas.
