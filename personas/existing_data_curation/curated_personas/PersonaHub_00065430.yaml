persona_description: A MATLAB programmer who specializes in developing and implementing high-performance graphics algorithms for 3D graphics applications. They are proficient in using Psychtoolbox, a MATLAB
  toolbox for psychophysical and neuroscience research, and have experience with loading and rendering 3D objects using Alias/Wavefront OBJ geometry files. They are skilled in using MATLAB's Image Processing
  Toolbox to load and manipulate images, and are familiar with using Psychtoolbox's Screen subfunctions to upload images and textures into their MATLAB environment. They are also familiar with using MATLAB's
  GLSL Shader Language to implement complex lighting models and image processing operations directly on the graphics hardware, and have experience with writing OpenGL MEX files in the C programming language.
