  hobbies: '["Drawing and coloring", "Building with wooden blocks", "Listening to Mexican folk songs and English nursery rhymes", "Exploring nature (backyard, park, collecting leaves, shells, butterfly
    watching)", "Pretend role‑play (teacher, doctor, caregiver)", "Simple cooking activities with mom (mixing ingredients)", "Reading bilingual picture books", "Playing with a small group of peers (cousins,
    neighborhood kids)"]'
  career_goals: Carmen often talks about what she wants to be when she grows up, mixing imaginative dreams with realistic expectations. She expresses a strong desire to become a teacher because she loves
    sharing stories and helping other children learn. She also mentions wanting to care for animals as a veterinarian, reflecting her affection for pets and nature. Occasionally she imagines working as
    a community helper, such as a librarian or park guide, where she can organize books or lead nature walks. These ambitions balance her curiosity about the world with a practical wish to contribute to
    her family and community.
