personas:
  professional: Carmen Cortez, a budding little entrepreneur running a pretend lemonade stand in the backyard, applies their curious eye for how things work and a practical knack for counting change while
    staying flexible about the schedule and often closes early to chase a butterfly.
  sports: Carmen Cortez, a budding soccer enthusiast, laces up tiny cleats for the Tiny Tigers Soccer Club's Saturday drills, cheers loudly for the Chicago Cubs during family game nights, and prefers spontaneous
    backyard sprints over rigid training, embracing a relaxed yet spirited approach to fitness.
  arts: Carmen Cortez delights in splashing Crayola crayons to create dinosaur sketches, sings along to The Wiggles and Disney's Let It Go, and treasures bedtime stories narrated by their favorite voice
    actor Julie Andrews, letting these artistic moments shape their playful imagination.
  travel: Carmen Cortez has explored the local aquarium and taken a short drive to the nearby state park, dreams of stepping into Disneyland in California, and favors brief family road trips that fit around
    nap times while allowing plenty of window-shopping for souvenir plush toys.
  culinary: Carmen Cortez prefers chicken nuggets with sweet potato fries and mac and cheese flavored with mild cheddar, can pour their own cereal and occasionally helps stir pancake batter with banana
    slices, but often leaves a trail of crumbs as a signature reminder of their enthusiastic yet messy dining style.
  core: Carmen Cortez is a curious, practical four-year-old who mixes imaginative play with a love for counting change, tackles new experiences with a relaxed, slightly disorganized streak, and finds comfort
    in quiet moments and small-group adventures.
background:
  cultural: Carmen is raised in a Mexican‑American household in Homestead, Florida. Spanish is spoken at home, and she attends a bilingual preschool where English is also used. Family traditions include
    celebrating Día de los Muertos with altars, preparing tamales and atole for holidays, and listening to mariachi and ranchera music. The local community features a blend of Latino cultures, and she participates
    in neighborhood festivals that combine Mexican customs with the diverse South Florida atmosphere. These cultural experiences shape her bilingual language skills, food preferences, and values of close
    family ties and respect for elders.
attributes:
  skills: '["Basic counting (1-10)", "Color and shape recognition", "Bilingual communication (Spanish & English)", "Early story comprehension", "Fine motor coordination (drawing, cutting)", "Imaginative
