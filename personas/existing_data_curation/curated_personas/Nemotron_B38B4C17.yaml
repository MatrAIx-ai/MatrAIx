personas:
  professional: Robin Rivera, a 16‑year‑old aspiring UI/UX designer, blends street‑level sketching, digital illustration in Procreate, and basic web coding to craft culturally resonant interfaces for community
    museums, leveraging their bilingual fluency and methodical project‑management style.
  sports: Robin Rivera follows the Los Angeles Lakers and LA Galaxy with fervor, participates in a weekend community soccer league, and incorporates brisk urban walks to photograph murals as part of their
    exercise routine, though they often skip formal workouts in favor of relaxed sketch‑marathons.
  arts: Robin Rivera spends weekends at The Broad and LACMA, drawing inspiration from Banksy's street murals, Yayoi Kusama's immersive installations, and listening to indie folk icons like Bon Iver while
    also practicing acoustic renditions of traditional family folk songs, channeling this eclectic mix into mixed‑media projects on Procreate.
  travel: Robin Rivera favors low‑cost, day‑trip explorations, frequently hopping on the Metrolink to capture Downtown San Diego's murals, dreaming of a future study‑abroad stint in Barcelona’s vibrant
    street‑art scene while balancing school commitments and a modest travel budget.
  culinary: Robin Rivera loves cooking family tamales and mole, often experimenting by pairing the rich chilies with ramen broth or quinoa, and delights in sourcing fresh cilantro, roasted poblanos, and
    lime to create bold fusion‑style plates after school.
  core: Robin Rivera is a meticulous teenage art‑tech hybrid who channels a competitive curiosity into vibrant visual storytelling while juggling school, side hustles, and a penchant for puzzle‑solving.
background:
  cultural: Robin is a first‑generation Mexican‑American raised in East Los Angeles. At home she speaks Spanish and celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings
    centered on mole, tamales, and papel picado decorations. Exposure to vibrant Mexican street murals and community cultural centers nurtured her appreciation for folk art and contemporary Latino expression.
    Her parents emphasize bilingual education, cultural pride, and community involvement, which informs Robin’s identity and creative perspective. Living in the multicultural landscape of Los Angeles, she
    blends Mexican heritage with urban American influences, shaping her worldview and artistic voice.
attributes:
  skills: '["Digital illustration (Procreate/Adobe Photoshop)", "Street photography", "Bilingual communication (Spanish/English)", "Event planning and organization", "Research and critical analysis", "Basic
    HTML/CSS coding", "Traditional Mexican cooking"]'
  hobbies: '["Urban sketching", "Visiting art galleries and museums", "Street photography", "Playing acoustic guitar", "Reading magical realism and sci‑fi", "Creative coding (HTML/CSS)", "Volunteering as
    art mentor", "Cooking traditional Mexican dishes"]'
  career_goals: Robin aspires to blend her artistic talent with technology by becoming a UI/UX designer or multimedia storyteller for cultural institutions, ideally working in a museum or community arts
    organization that highlights Mexican-American narratives. She plans to attend a specialized arts high school, earn a scholarship for graphic design, and later study at a design college. Long‑term, she
    hopes to launch an online platform that showcases youth art from the Los Angeles Latino community, serving as a creative director and cultural curator while leveraging her bilingual skills to engage
    diverse audiences.
