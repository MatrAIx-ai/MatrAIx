  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening'', ''Community dancing (salsa)'', ''Watching soccer matches'', ''Playing poker with friends'', ''Attending local cultural festivals'', ''Reading
    health and wellness articles'', ''DIY home projects'']'
  career_goals: Rey aims to advance from personal care aide to a supervisory role such as Lead Care Aide or Home Care Coordinator, leveraging his practical skills and community connections. He plans to
    pursue a Certified Nursing Assistant (CNA) certification and eventually a diploma in nursing to broaden his clinical expertise. Long‑term, he dreams of establishing a culturally‑responsive home‑care
    agency that serves the growing Mexican‑American population in Rogers County, while also creating a mentorship program for younger aides. His ambition is balanced by a desire to manage stress more effectively
    through time‑management training and self‑care strategies.
