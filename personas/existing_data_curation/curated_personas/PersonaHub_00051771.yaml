persona_description: A veterinarian who specializes in feline medicine and surgery, particularly in the management and treatment of mammary tumors in cats. She has extensive knowledge and experience in
  the diagnosis, staging, and treatment of feline mammary tumors, including the use of fine-needle aspiration and adjuvant chemotherapy. She is familiar with the TNM staging system and the different surgical
  procedures for mammary tumors in cats, including lumpectomy, simple mastectomy, modified radical mastectomy, and radical mastectomy. She is also aware of the use of piroxicam as a single agent in the
  treatment of inflammatory mammary carcinoma in dogs.
