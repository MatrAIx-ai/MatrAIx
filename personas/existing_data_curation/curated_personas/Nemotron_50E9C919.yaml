  hobbies: '["Book club", "Bridge (card game)", "Gardening", "Quilting", "Cooking and sharing recipes", "Genealogy research", "Volunteering as a historical society docent", "Walking groups along the Great
    South Bay", "Attending community theater productions", "Senior‑center potluck events"]'
  career_goals: Veda aims to expand her impact on senior well‑being in Islip by establishing a mentorship program that pairs seniors with high school students interested in local history. She hopes to compile
    a collection of oral histories from longtime residents, preserving Islip’s mid‑century narratives in a community archive. Additionally, Veda plans to complete a memoir reflecting on her life through
    the lens of post‑war America, sharing it at senior‑center reading events. Her ambition includes ongoing advocacy for accessible community services—such as improved transportation for seniors—and securing
    a regular speaking slot at the Suffolk County Historical Society.
