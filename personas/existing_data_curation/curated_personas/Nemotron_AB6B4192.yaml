personas:
  professional: Todd Zanders is a highly organized library assistant who leverages their meticulous cataloging skills, instructional expertise, and compassionate mediation abilities to create structured,
    supportive programming for patrons, especially seniors, while managing the anxiety of high expectations through precise planning and calm communication.
  sports: Todd Zanders plays forward for the Arverne Beachside Basketball League, cheers for the New York Knicks and New York Yankees, and joins a senior‑friendly walking group that meets at the local Queens
    community center three times a week, balancing competitive spirit with low‑impact cardio to stay fit.
  arts: Todd Zanders immerses themselves in jazz and R&B, regularly attending concerts featuring the James Brown tribute band and listening to classics by John Coltrane, Aretha Franklin, and Miles Davis,
    while also curating a personal collection of vinyl records and occasional trips to the Queens Museum for rotating art exhibitions.
  travel: Todd Zanders prefers meticulously planned trips, often traveling with a detailed itinerary that includes historical tours of Savannah, a genealogy pilgrimage to Galway, Ireland, and relaxing beach
    days in Aruba, balancing adventure with the comfort of familiar routines and budget‑conscious accommodations.
  culinary: Todd Zanders enjoys cooking soulful Caribbean dishes, skillfully preparing jerk chicken with scotch bonnet peppers and coconut rice, and pairing them with fresh herbs from their garden, while
    also experimenting with classic comfort foods like chicken pot pie, reflecting a blend of cultural curiosity and methodical recipe organization.
  core: Todd Zanders is a structured, sociable senior library professional who channels their compassionate nature and anxiety‑driven meticulousness into community‑focused programming, mindful self‑care,
    and a love of jazz, basketball, and Caribbean cooking.
background:
  cultural: Todd identifies as African American and was raised in the vibrant, multicultural neighborhoods of Queens. His upbringing was shaped by strong community ties, church participation, and a family
    emphasis on education and service. He draws on the rich heritage of Black and Caribbean cultures in the area—celebrating traditions such as gospel music, storytelling, and communal cooking—while navigating
    the unique challenges and resilience that come with being a Black professional in a city that values diversity. These experiences inform his compassionate approach to library work and his dedication
    to fostering inclusive, supportive spaces for all patrons.
attributes:
