  hobbies: '[''Playing basketball in community leagues'', ''Reading historical biographies'', ''Cooking soul food and Caribbean dishes'', ''Gardening in the local community garden'', ''Attending jazz concerts'',
    ''Volunteering at senior centers'', ''Walking along the Arverne beach'', ''Participating in local church choir'', ''Genealogy research'', ''Mindfulness meditation'']'
  career_goals: Todd aims to transition from his current clerical role into a senior library specialist position where he can shape programming for seniors and underserved adults in Queens. He is pursuing
    certification in library and information science to deepen his expertise and plans to secure grant funding for mental‑health resource hubs within the branch. Long‑term, he hopes to establish a community
    literacy and wellbeing initiative that blends his educational background, compassion for patrons, and desire for structured, impactful service before retiring.
