personas:
  professional: Alberto Reyessilva blends deep counseling expertise with an abstract‑art sensibility, designing data‑driven career workshops that weave O*NET analytics and vibrant visual metaphors while
    leveraging their skeptical, competitive edge to rigorously evaluate program outcomes.
  sports: Alberto Reyessilva hikes the coastal trails of Orange County with a local trail club, follows the Anaheim Ducks and Los Angeles Dodgers, participates in a casual Sunday soccer league, and uses
    yoga as a primary fitness routine while occasionally skipping workouts when creative projects demand attention.
  arts: Alberto Reyessilva invests evenings in abstract painting, improvisational theater workshops, and acoustic‑guitar jam sessions, drawing inspiration from Yayoi Kusama, Francis Bacon, and contemporary
    Mexican muralists, while regularly attending gallery openings at the Laguna Art Museum and the MOCA.
  travel: Alberto Reyessilva prefers spontaneous trips that combine cultural immersion with artistic discovery, returning often to Oaxaca to study folk art, planning last‑minute flights to Guadalajara for
    Día de los Muertos festivals, and budgeting for occasional European art museum tours with their spouse.
  culinary: Alberto Reyessilva experiments with Mexican‑fusion dishes such as kimchi‑topped carnitas tacos and mole‑infused ramen, enjoys sourcing chipotle, nori, and fresh corn masa at farmers’ markets,
    and rates Otium and niche taco trucks among their favorite dining spots, while occasionally over‑seasoning meals in pursuit of bold flavors.
  core: Alberto Reyessilva is a 43‑year‑old counselor‑artist whose competitive curiosity fuels innovative career programs, even as their laid‑back habit of misplacing paperwork and love for midnight taco
    experiments keep life delightfully unpredictable.
background:
  cultural: Born to Mexican immigrant parents, Alberto grew up bilingual in a close‑knit family that honored traditions such as Día de los Muertos, posadas, and home‑cooked Mexican cuisine. His upbringing
    in Southern California blended Mexican heritage with the multicultural tapestry of Orange County, fostering a deep appreciation for both Mexican folk art and the diverse artistic expressions of his
    community. He maintains strong ties to local Mexican cultural organizations, volunteers at community centers, and regularly incorporates Mexican cultural narratives—such as familismo, respeto, and storytelling—into
    his counseling practice to resonate authentically with Latino students and families.
attributes:
  skills: '[''Career counseling'', ''Academic advising'', ''Creative workshop design'', ''Artistic facilitation'', ''Multicultural competency'', ''Active listening'', ''Public speaking'', ''Digital assessment
    tools (O*NET, MyPlan)'', ''Strategic program development'', ''Conflict resolution'']'
  hobbies: '[''Abstract painting'', ''Contemporary art gallery visits'', ''Reading speculative fiction'', ''Improvisational theater'', ''Playing acoustic guitar'', ''Culinary exploration of Mexican‑fusion
    cuisine'', ''Hiking coastal trails'', ''Attending cultural festivals'', ''Traveling in Mexico'', ''Yoga and meditation'']'
  career_goals: Alberto aims to become the director of student services for a large Southern California school district, scaling his innovative, art‑infused counseling model across hundreds of schools.
    He plans to launch a community‑focused mentorship program that pairs Mexican‑American high‑school students with industry professionals, and to author a research‑based guide on integrating creativity
    into career counseling. Ultimately, he aspires to influence state education policy to embed culturally responsive, experiential career development into public curricula, positioning himself as a leading
    voice in the field.
