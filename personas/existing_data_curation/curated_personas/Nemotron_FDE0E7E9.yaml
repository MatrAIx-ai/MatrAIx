  career_goals: Ines aims to deepen her analytical expertise and transition into a senior data scientist role within the next five years. She plans to earn certifications in machine learning and cloud analytics,
    and to lead interdisciplinary projects that fuse data insights with artistic storytelling—such as data‑driven installations or visual narratives for community outreach. Ultimately, she envisions mentoring
    junior analysts and contributing to research initiatives at Houston’s burgeoning tech and energy sectors, while maintaining a flexible work arrangement that supports her creative pursuits.
