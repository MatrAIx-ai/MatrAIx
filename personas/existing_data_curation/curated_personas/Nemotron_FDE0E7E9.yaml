personas:
  professional: Ines Talton, a Houston‑based data analyst eager to become a senior data scientist, blends statistical rigor with artistic storytelling, using Python, SQL, and interactive visualizations
    to turn complex energy‑sector datasets into compelling narratives, thriving in fluid project scopes because they value curiosity and a relaxed, sometimes disorganized, approach to deadlines.
  sports: Ines Talton enjoys weekend hikes through Houston’s bayou preserves, occasionally joins the Houston Running Club for early‑morning 5K runs, they root for the Astros and Rockets while fitting in
    spontaneous yoga sessions at a local studio, embodying a laid‑back yet consistent approach to staying active.
  arts: Ines Talton channels curiosity into street photography of Houston’s vibrant murals—often capturing works by the local graffiti collective CTRL‑ALT‑DEL—while they sketch and create data‑themed digital
    illustrations inspired by Salvador Dali, and they unwind at live‑music nights featuring indie acts like Khruangbin and jazz saxophonist Kamasi Washington.
  travel: Ines Talton adopts an impulsive travel style, often booking last‑minute road trips to nearby national parks such as Big Bend for stargazing, they also dream of future voyages to Iceland’s aurora‑lit
    fjords and Kyoto’s tea houses, balancing limited savings with a hunger for experiential discovery.
  culinary: Ines Talton experiments in the kitchen with fusion dishes like kimchi‑infused carnitas tacos and miso‑marinated shrimp tacos, they confidently wield a cast‑iron skillet and sous‑vide, while
    they indulge in weekend brunches that feature avocado toast topped with pomegranate seeds and a drizzle of sriracha honey.
  core: Ines Talton navigates life as a data‑driven storyteller who trades meticulous spreadsheets for spontaneous sketchpads, they thrive on curiosity‑fuelled chaos, and they habitually forget to file
    taxes until the deadline looms, embracing the creative mess that fuels their innovations.
background:
  cultural: Ines grew up in a middle‑class white family in the suburbs of Houston, Texas. While her upbringing was shaped by traditional Texan values such as independence, modesty, and a strong work ethic,
    the city’s rich multicultural tapestry exposed her to a wide array of artistic, culinary, and linguistic influences. Frequent family trips to the Houston Museum District, local rodeos, and community
    festivals gave her a blend of Southern hospitality and an appreciation for cultural diversity. This environment fostered her open‑minded curiosity and her comfort navigating both familiar and unconventional
    experiences.
