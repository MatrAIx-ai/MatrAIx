  hobbies: '["Cooking traditional Mexican dishes","Gardening (herbs and vegetables)","Attending church services and community events","Dancing to regional Mexican music","Knitting and crocheting","Walking
    in local parks","Reading historical novels (Mexican history)","Watching telenovelas","Volunteering at the community center"]'
  career_goals: Natalia intends to complete the remaining requirements of her college studies, aiming for a degree in community health or early childhood education. She hopes to launch a small home‑based
    catering service that offers traditional Mexican meals for local events and to volunteer as a cultural liaison at the Covina community center. Long‑term, she aspires to obtain certification as a home
    health aide, enabling her to support elderly neighbors while staying rooted in family life.
