personas:
  professional: Oscar Delariva, a seasoned plumber and pipefitter with over 30 years of hands‑on experience, blends meticulous code compliance and modern inspection tools with a compassionate, mentorship‑focused
    approach, while they navigate a relaxed attitude toward paperwork as they work toward licensed contractor status and a community‑centered plumbing business.
  sports: Oscar Delariva, a devoted fan of the Houston Astros and Dallas Cowboys, spends his summers fishing with the Corpus Christi Anglers Association, participates in a local 50‑plus softball league
    in Floresville, and they maintain a simple fitness routine of early‑morning walks around their vegetable garden and occasional weight‑lifting at the community gym.
  arts: Oscar Delariva, an avid lover of classic western cinema, regularly watches John Wayne and Clint Eastwood films such as "The Magnificent Seven" and "Unforgiven", reads historical novels on Mexican‑American
    heritage by authors like Rudolfo Anaya, and they enjoy listening to traditional folk singers such as José Alfredo Jiménez while occasionally humming a harmonica during garden work.
  travel: Oscar Delariva, who prefers flexible itineraries over rigid schedules, often plans weekend road trips to historic Texas sites like the San Antonio missions and Hill Country wineries, has taken
    a memorable cultural tour of Oaxaca in Mexico, and they dream of a future pilgrimage along the Camino de Santiago, all while balancing limited vacation time with family commitments.
  culinary: Oscar Delariva, a proficient home cook, delights in preparing tamales and pozole using fresh corn, chilies, oregano, and garden‑grown zucchini, while they also master smoky grilled catfish from
    Lake Corpus Christi and often accompany meals with homemade salsa verde and a side of roasted sweet potatoes.
  core: Oscar Delariva is a pragmatic, community‑oriented craftsman who balances a love for solitary hands‑on projects—from restoring a ’70 Chevrolet pickup to fishing and gardening—with a generous spirit,
    occasional paperwork procrastination, and they steadfastly watch classic westerns on Friday nights.
background:
  cultural: Oscar comes from a Mexican‑American family that settled in Atascosa County before he was born. His parents emigrated from the state of Jalisco and brought with them a strong emphasis on family,
    Catholic faith, and traditional Mexican customs. Oscar grew up bilingual, speaking Spanish at home while attending an English‑language school. He celebrates Día de los Muertos, Las Posadas, and Mexican
    Independence Day with his extended family, often preparing traditional foods and sharing stories of his heritage. Living in Floresville, he blends his Mexican roots with the local Texas ranching culture,
    participating in community festivals, supporting local churches, and maintaining the close‑knit family ties that shape his values of compassion and cooperation.
attributes:
  skills: '[''pipe installation'', ''welding (MIG/TIG)'', ''steam system maintenance'', ''hydronic heating troubleshooting'', ''blueprint reading'', ''code compliance (Texas plumbing and mechanical codes)'',
    ''client communication'', ''team coordination'', ''apprentice mentorship'', ''use of mobile inspection software'', ''safety procedures and OSHA standards'']'
  hobbies: '[''fishing'', ''vegetable gardening'', ''classic car restoration'', ''cooking Mexican cuisine'', ''attending weekly Mass'', ''volunteer outreach'', ''reading historical novels'', ''watching
    classic western films'', ''small‑group poker nights'', ''community clean‑up events'']'
  career_goals: Oscar aims to transition from a senior journeyman to a licensed contractor so he can open his own modest plumbing and pipe‑fitting business focused on serving the Floresville community and
    neighboring towns. He hopes to obtain a Master Pipefitter certification, expand his knowledge of energy‑efficient and green‑building piping practices, and eventually mentor a small team of apprentices,
    providing them with both technical training and the supportive, cooperative environment he values. Additionally, he wants to lead occasional community service projects, such as affordable home‑repair
    clinics, that combine his skill set with his desire to help others.
