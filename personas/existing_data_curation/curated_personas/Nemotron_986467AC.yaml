  hobbies: '["Watercolor painting", "Live theater and music attendance", "Historical fiction book club", "Heirloom vegetable gardening", "Seasonal flower gardening", "Cooking classes and community potlucks",
    "Genealogy research", "Ballroom dancing", "Museum docent volunteering"]'
  career_goals: Although retired from formal employment, Elvira aims to deepen her impact on the local arts and cultural scene. She aspires to serve on the board of the Swartz Creek Arts Council, mentor
    younger artists through informal workshops, and launch a seasonal community art fair that blends visual arts with local crafts. She is also interested in documenting her family’s history in a memoir
    or blog, combining her genealogy hobby with storytelling. A long‑term ambition is to obtain a certification in art‑therapy basics so she can lead therapeutic art sessions at the senior center, blending
    her compassion with her creative expertise.
