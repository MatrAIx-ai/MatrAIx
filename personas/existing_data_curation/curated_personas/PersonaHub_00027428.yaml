persona_description: A teacher who is responsible for grading and assessing student performance in a specific subject, such as mathematics. The teacher uses rubrics to communicate to students and colleagues
  the criteria for assessing their performance, as well as the levels of performance required for each criterion. The rubric is a communication tool that makes grading and assessment more objective and
  consistent, and also provides a checklist for students to ensure they have covered all the aspects of the assignment. The teacher is also responsible for field testing the rubric to identify any confusion
  or gaps and updating it accordingly. The rubric helps to promote reflective thinking and provides a validation of marks received, making it easier for both the teacher and the students.
