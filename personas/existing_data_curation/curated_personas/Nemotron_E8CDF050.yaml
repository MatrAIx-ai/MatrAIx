  career_goals: Bettina aims to move into a supervisory role, such as shift lead or inventory coordinator, within the next few years. She plans to enroll in a community‑college program in Supply Chain Management
    to deepen her knowledge of logistics and warehouse operations. Long‑term, she aspires to become a warehouse manager or logistics planner, combining her organizational abilities with her desire to help
    others by coordinating community outreach programs, donation drives, and partnerships with local nonprofits. She also values maintaining a flexible schedule that supports her well‑being and personal
    interests.
