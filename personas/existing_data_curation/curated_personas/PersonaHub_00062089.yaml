persona_description: A researcher or scientist who studies the effects of cadmium exposure on breast cancer development and growth, as well as the mechanisms by which cadmium influences gene expression
  and cell cycle, apoptosis, and genomic instability in breast cancer cells. This person is interested in understanding the link between cadmium exposure and breast cancer risk and the potential for cadmium
  to transform normal human breast cells into a triple negative or basal-like cancer phenotype. They are also likely to be familiar with the impact of cadmium on the cell cycle, suppression of apoptosis,
  and alteration of gene expression in hormone receptor positive breast cancer cells.
