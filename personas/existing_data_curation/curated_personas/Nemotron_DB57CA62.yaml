  career_goals: Christine dreams of a future where she can combine her love for animals and her curiosity about the natural world, aiming to become a veterinarian or an environmental scientist. She also
    expresses interest in designing simple inventions that help her community, such as eco-friendly school projects, and hopes to pursue a college degree that balances hands‑on research with community service.
