  hobbies: '[''Street Photography'', ''Visiting Art Galleries'', ''Exploring Street Murals'', ''Boxing'', ''Running'', ''Reading Philosophy'', ''Reading True-Crime Books'', ''Live Music Concerts'', ''Cooking'',
    ''Mentoring Youth Art Workshops'', ''Traveling to Historical Sites'']'
  career_goals: Henry aims to rise to the rank of precinct captain within the next five years, focusing on integrating community arts programs as preventative tools for at-risk youth. He aspires to become
    a senior trainer, developing curricula that blend investigative techniques with cultural competency. Henry is also considering completing his high school diploma and pursuing a bachelor's degree in
    criminal justice or public administration to broaden his strategic impact. Ultimately, he wishes to lead a specialized community-relations unit that leverages his curiosity about art and new ideas to
    foster stronger police-community partnerships in Philadelphia.
