personas:
  professional: Estrella Jackson, a veteran hairstylist and salon owner with over three decades of experience, leverages their artistic curiosity and sharp competitive drive to fuse abstract painting techniques
    into cutting‑edge hair designs while maintaining meticulous organization of inventory, appointments, and staff mentorship.
  sports: Estrella Jackson passionately follows the Atlanta Hawks and Atlanta Falcons, regularly plays tennis at the Peachtree Community Tennis Club, and fits in early‑morning walks that double as meditation
    for stress relief.
  arts: Estrella Jackson frequents the High Museum of Art and the Atlanta Contemporary, and draws creative inspiration from artists such as Kehinde Wiley, Yayoi Kusama, and Jean‑Michel Basquiat, channeling
    those bold color palettes into both their abstract canvases and innovative hair‑color techniques.
  travel: Estrella Jackson has explored the historic streets of Savannah and the jazz‑filled nights of New Orleans, and dreams of visiting Paris’s Louvre and Kyoto’s Nishijin Textile Museum to study art
    and traditional fabric crafts, favoring itineraries that blend gallery tours with herb‑farm visits.
  culinary: Estrella Jackson prepares soulful Southern dishes like shrimp and grits, smoked collard greens, and sweet potato pie, seasoning them with homegrown rosemary, thyme, and sage, and while their
    cooking skill is solidly home‑cook level, they delight in experimenting with herbal infusions that echo their natural hair‑care line.
  core: Estrella Jackson couples a fiercely competitive boutique mindset with an artist’s devotion to color, constantly worries about the next breakthrough while never missing a choir rehearsal or a chance
    to blend herbs into their hair‑care rituals.
background:
  cultural: Estrella is an African American woman whose life is rooted in the rich cultural tapestry of the South. Raised in Spartanburg, SC, she grew up immersed in church music, family reunions featuring
    soul food, and a strong sense of community that reflects the resilience of Black traditions. Her family history includes stories of the Great Migration and the Civil Rights Movement, shaping her appreciation
    for cultural expression and advocacy. In her professional work, she honors Black hair culture by celebrating natural textures and innovative styling, often drawing inspiration from Southern Black art,
    music, and storytelling. She maintains active connections with local Black cultural institutions, participates in community events, and weaves her heritage into both her creative practice and everyday
    life.
