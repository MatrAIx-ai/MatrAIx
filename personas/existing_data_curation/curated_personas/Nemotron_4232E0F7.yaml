  career_goals: Estrella aims to transform her boutique salon into a flagship studio known for artistic hair design that fuses visual art and cultural heritage. She plans to launch a signature line of natural
    hair‑care products inspired by Southern herbs and Black hair traditions. Her competitive drive pushes her to earn regional styling awards and to host workshops that blend cosmetology with painting and
    sculpture. Long‑term, she wishes to mentor the next generation of Black stylists, establish a scholarship for aspiring cosmetology students from underserved communities, and eventually retire while
    having built a lasting legacy of artistic excellence and community empowerment.
