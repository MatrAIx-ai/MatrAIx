personas:
  professional: Jacob Hassan is a budding mini‑engineer who explores the world through building blocks and pretend play, balancing curiosity with a practical drive to make things fit; they often dismantle
    toys to understand how they work before reassembling them.
  sports: Jacob Hassan is a lively three‑year‑old who enjoys sprinting across the playground, prefers small playdates of two or three kids, and kicks a ball with the neighborhood’s junior soccer club, the
    Little Lions; they cheer for the city’s professional baseball team, the Tigers, on game days, yet their competitive streak often leads them to insist on winning games of tag.
  arts: Jacob Hassan delights in drawing colorful dinosaurs and coloring books, sings along to nursery rhymes like 'The Wheels on the Bus' and 'Twinkle Twinkle Little Star', and watches animated movies
    starring characters like Moana; they often imitate the voice of actor Tom Hanks from 'Toy Story', and their favorite illustrator is Eric Carle, whose collages inspire their own scribbles.
  travel: Jacob Hassan loves family trips to the local zoo and the seaside boardwalk, cherishes a recent vacation to Disneyland Paris, and dreams of exploring the Great Barrier Reef in future; they prefer
    short, well‑planned outings with a familiar caregiver over long, unstructured trips, yet their curiosity drives them to ask endless questions about every new place they encounter.
  culinary: Jacob Hassan has a strong preference for creamy mac & cheese, chicken nuggets, and sweet banana slices, enjoys the taste of cheddar cheese and peas, and can proudly stir a bowl of pancake batter
    with a plastic spoon; they often request extra ketchup on their fries and love the aroma of fresh‑baked cinnamon rolls, though they sometimes make a mess spilling cereal on the floor.
  core: Jacob Hassan is a curious yet laid‑back three‑year‑old who balances spontaneous play with a love for routine, often competing fiercely in games while secretly cherishing quiet moments alone.
background:
  cultural: 'Jacob is raised in Casa Grande, AZ, within the Gila River Indian Community, a community rooted in the traditions of the Akimel O''odham (Pima) and Pee Posh (Maricopa) peoples. His family maintains
    many traditional practices: they use some O''odham words at home, celebrate seasonal ceremonies, and honor the desert landscape through storytelling and handmade crafts. Meals often include fry bread
    and tepary beans, and he has been introduced to traditional music played on drums and flutes. While his daily life blends modern suburban experiences with tribal heritage, his upbringing emphasizes
    respect for nature, the value of community, and the perseverance of his ancestors.'
attributes:
  skills: '[''Walking'', ''Running'', ''Climbing'', ''Stacking blocks'', ''Sorting shapes'', ''Color recognition'', ''Basic counting (to three)'', ''Simple sentence formation'', ''Imitative play'', ''Assisting
