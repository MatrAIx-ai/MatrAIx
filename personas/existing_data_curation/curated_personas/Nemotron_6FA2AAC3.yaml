  hobbies: '[''Building block towers'', ''Drawing with crayons'', ''Exploring the backyard and desert flora'', ''Listening to tribal stories'', ''Collecting rocks and insects'', ''Pretend play with toy
    animals'', ''Simple kitchen helper activities'', ''Singing nursery rhymes'', ''Playing hide-and-seek with one friend'', ''Sorting colorful objects'']'
  career_goals: Even at three, Jacob shows early ambitions shaped by his curiosity for the desert environment and the stories of his elders. He often says he wants to be a "desert ranger" who helps animals,
    or a "storyteller" who shares the legends of his people. He also loves building things, so he sometimes imagines becoming a builder or engineer who constructs safe playgrounds. These aspirations blend
    his practical side (helping his family) with his love for new ideas.
