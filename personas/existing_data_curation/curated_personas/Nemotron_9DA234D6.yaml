  hobbies: '[''vegetable gardening'', ''woodworking'', ''model train building'', ''lake fishing'', ''reading historical non-fiction'', ''volunteering at community center'', ''book club participation'',
    ''church audio-visual assistance'', ''journaling'', ''guided meditation'']'
  career_goals: Although retired from full-time employment, Dylan aims to channel his expertise into community service and personal legacy projects. He plans to volunteer as a mentor for local high-school
    STEM clubs, help organize neighborhood safety workshops, and contribute his technical skills to the Edmond public library's maker space. He also hopes to author a short memoir documenting his career
    and family history, and to establish a modest scholarship for students pursuing engineering degrees. Managing his anxiety is a central ambition; he seeks to maintain a structured daily routine that
    includes regular therapy, mindfulness practice, and purposeful engagement in meaningful projects.
