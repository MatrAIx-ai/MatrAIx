  hobbies: '[''Pickup basketball'', ''Weekly trivia nights'', ''Cooking Vietnamese‑Italian fusion meals'', ''Street photography'', ''Traveling to Vietnam'', ''Volunteering at Tet festivals'', ''Listening
    to jazz and hip‑hop'', ''Reading books on educational innovation'']'
  career_goals: Thinh aims to move from his current administrator role to a district‑wide early‑learning director within the next five years. He plans to earn a Master’s in Educational Leadership to deepen
    his strategic and policy expertise. He is driven to secure larger, multi‑year grants that will expand culturally responsive after‑school programs for immigrant families in Philadelphia. Ultimately,
    he hopes to launch his own nonprofit that blends Vietnamese cultural education with modern pedagogical practices, positioning himself as a regional thought leader in early‑childhood innovation and advocacy.
