  hobbies: '[''Urban walking and mural photography'', ''Soul food cooking and recipe experimentation'', ''Journaling and guided meditation'', ''Crocheting blankets for shelters'', ''Community choir singing
    gospel and neo‑soul'', ''Podcasts on social justice, psychology, and self‑improvement'']'
  career_goals: Renita dreams of turning her passion for helping others into a formal career. She plans to enroll in a community health worker certification program while completing a GED to strengthen
    her academic foundation. Her long‑term ambition is to work as a community health advocate or peer‑support specialist for a local nonprofit, where she can combine her practical problem‑solving skills
    with her compassionate nature. She hopes this path will provide stable income, a structured routine that helps curb her procrastination, and a platform to design programs that address mental‑health
    and financial‑wellness challenges in Philadelphia’s underserved neighborhoods.
