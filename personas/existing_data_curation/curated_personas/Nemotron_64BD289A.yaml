  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading mystery and historical novels'', ''Stamp collecting'', ''Crocheting'', ''Quilting'', ''Exploring local history'', ''Volunteering at community library
    reading group'']'
  career_goals: Janet aims to advance within the United States Postal Service by moving into a supervisory role, such as assistant postmaster or shift supervisor, where she can mentor new carriers and oversee
    route efficiency. She is motivated to deepen her expertise in logistics technology, including advanced routing software and automated sorting systems. Recognizing the value of formal education, she
    plans to earn her GED and pursue certifications in supply chain management to broaden her career options. Long‑term, Janet envisions a transition to a logistics coordination or community outreach position
    that allows her to apply her practical experience while contributing to local service initiatives.
