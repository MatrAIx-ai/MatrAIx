  career_goals: Jerry is fascinated by space and emergency responders. He often says he wants to become an astronaut who explores planets and a firefighter who helps people in danger. He also dreams of
    being a scientist who studies animals and protects the environment, and his practical side makes him imagine designing bridges or playgrounds as an engineer. He sets small goals, like mastering a new
    LEGO set or finishing a new picture book each month, because he worries about being good enough and wants to prove his abilities over time.
