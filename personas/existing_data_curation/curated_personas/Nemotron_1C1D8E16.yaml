personas:
  professional: Jerry Bartz, a six‑year‑old aspiring engineer, channels their curiosity‑practicality balance into building intricate LEGO rockets and vehicles, methodically sorting pieces while staying
    flexible enough to improvise new designs, hinting at early project‑planning and teamwork skills.
  sports: Jerry Bartz, a member of the Little Rockets Soccer Club, plays short matches in the spring, cheers for the Cityville Lions professional soccer team, and balances enthusiastic participation with
    occasional hesitation after games due to lingering worries about performance.
  arts: Jerry Bartz, an avid doodler, fills sketchbooks with colored illustrations of dinosaurs, rockets, and family portraits, enjoys listening to The Wiggles and watching Pixar’s ‘Toy Story’, and often
    mimics Dr. Seuss’s rhymes when narrating their own imaginative adventures.
  travel: Jerry Bartz, who has visited the Natural History Museum in Washington, D.C., dreams of traveling to the Kennedy Space Center in Florida and exploring the dinosaur fossils at Dinosaur National
    Monument, favoring carefully planned family trips that mix educational stops with the freedom to roam the museum halls.
  culinary: Jerry Bartz, a picky eater who loves cheesy macaroni, chicken nuggets, and strawberry‑banana fruit salad, enjoys helping stir pancake batter and sprinkling cinnamon sugar on toast, yet consistently
    refuses broccoli, revealing a simple yet enthusiastic approach to cooking and dining.
  core: Jerry Bartz, a six‑year‑old LEGO builder with a vivid imagination, balances curiosity, organization, and occasional worry, turning playtime into mini‑engineering projects while navigating the ups
    and downs of childhood emotions.
background:
  cultural: Jerry is raised in a suburban neighborhood of Denver, Colorado, within a predominantly white, middle‑class family. His household reflects typical Western American values emphasizing independence,
    practical problem‑solving, and community involvement. He celebrates local traditions such as summer picnics, Fourth of July fireworks, and outdoor activities like hiking and biking in the nearby foothills.
    The family attends a community church, where gentle moral teachings shape his sense of responsibility and compassion. Growing up in a diverse city, Jerry is also exposed to multicultural influences
    through school and neighborhood friends, including varied cuisines and cultural celebrations that broaden his perspective.
