personas:
  professional: Mark Huttula, a 28‑year‑old university lecturer, blends deep technical expertise in Python, R, and MATLAB with a magnetic, talkative teaching style to design interdisciplinary STEAM curricula,
    lead hackathon workshops, and mentor students and MakerSpace inventors alike, turning complex data science concepts into lively, hands‑on experiences.
  sports: Mark Huttula is an avid hiker who tackles the rugged Oregon coastline and Forest Park trails each weekend, occasionally joins the local Portland Timbers fan club for spirited soccer matches, and
    runs a casual 5K club with fellow faculty members, all while keeping a modest collection of trail‑ready gear.
  arts: Mark Huttula shines on stage with a Portland improv comedy troupe, strums acoustic renditions of Sufjan Stevens and Fleet Foxes on an aging Gibson guitar, curates a monthly open‑mic night at a neighborhood
    café, and volunteers at the local gallery to help emerging visual artists showcase their work.
  travel: Mark Huttula prioritizes weekend getaways to nearby natural wonders like the Columbia River Gorge, has trekked to Olympic National Park and the Canadian Rockies, dreams of backpacking the Patagonian
    Andes, and meticulously plans trips using a hybrid of digital itineraries and spontaneous detours, all while staying within a modest travel budget.
  culinary: Mark Huttula’s palate is a blend of craft‑brew experimentation, spicy Thai noodle bowls, freshly grilled Pacific salmon, and home‑cooked mushroom risotto, and they can be found fine‑tuning hop
    schedules in the kitchen while occasionally over‑hops a batch, resulting in a signature amber ale that neighbors both love and tease for its bold bitterness.
  core: Mark Huttula is a talkative, curiosity‑driven educator who channels their love for tech, comedy, and the outdoors into lively classrooms, adventurous hikes, home‑brewed experiments, and a relentless
    pursuit of interdisciplinary innovation, even if occasional over‑commitment leaves them juggling a packed schedule.
background:
  cultural: Mark grew up in Portland, Maine, a close‑knit coastal community in New England. His family reflects a blend of Finnish and Irish ancestry, with stories of immigrant perseverance passed down
    through generations. The region's emphasis on community involvement, environmental stewardship, and appreciation for maritime heritage shaped his values. He celebrates local traditions such as lobster
    festivals and winter ice‑fishing while also embracing broader cultural experiences through travel and university life. This background nurtured his practical outlook, curiosity about the natural world,
    and strong sense of civic responsibility.
