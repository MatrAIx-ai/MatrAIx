  career_goals: Mark aims to secure tenure within the next five years while expanding his role as an interdisciplinary curriculum innovator. He plans to launch a STEAM initiative that integrates art and
    design into traditional science courses, enhancing student engagement. By establishing a community outreach program, he hopes to bring hands‑on STEM experiences to local K‑12 schools and adult learners.
    Long‑term, Mark envisions stepping into departmental leadership, using his collaborative and assertive style to shape academic policy and foster an inclusive, forward‑thinking environment.
