personas:
  professional: Maria Fox, a retired community organizer now serving as the senior‑center garden program coordinator in Eagle County, blends practical handyman skills with a curious, flexible mindset, allowing
    them to improvise garden layouts, mentor volunteers, and handle unexpected maintenance issues with calm assertiveness.
  sports: Maria Fox, a member of the Eagle County Trail Club, enjoys moderate hikes, seasonal cross‑country skiing, and follows the Denver Broncos in football and the Colorado Avalanche in hockey, preferring
    steady, low‑impact activity over intense gym routines.
  arts: Maria Fox finds inspiration in the landscape paintings of Albert Bierstadt, the folk melodies of John Denver, and the classic films of Audrey Hepburn, often integrating these artistic influences
    into their quilting patterns and nature‑photography projects.
  travel: Maria Fox prefers spontaneous weekend road trips to nearby alpine towns like Aspen and Telluride, as well as occasional longer drives to Banff National Park in Canada, balancing a love for scenic
    adventure with a modest travel budget that steers clear of pricey overseas cruises.
  culinary: Maria Fox delights in preparing seasonal dishes such as quinoa‑beet salads with goat cheese and wild rosemary, hearty lamb stews with root vegetables, and herb‑infused focaccia, showcasing a
    confident home‑cook level that occasionally gives in to fast‑food burritos when time runs thin.
  core: Maria Fox blends a curious hands‑on spirit with a laid‑back, sometimes disorganized streak, turning garden beds, quilts, and sunrise photos into a lifelong patchwork of community, nature, and quiet
    rebellion against strict schedules.
background:
  cultural: Maria grew up in a middle‑class white family in the Midwest before relocating to Carbondale, Colorado, where she embraced the mountain‑west lifestyle. Her cultural outlook blends a practical,
    self‑reliant ethos with an appreciation for the region’s outdoor traditions, folk arts, and community spirit. She participates in local festivals that celebrate Colorado’s frontier heritage, values
    the supportive networks common in small towns, and maintains a connection to her family’s German‑American roots through family recipes and holiday customs.
attributes:
  skills: '["Home maintenance", "Basic carpentry", "Plumbing repairs", "Gardening and horticulture", "Food preparation and cooking", "Household budgeting", "Community event coordination", "Basic computer
