  hobbies: '["Hiking", "Bird‑watching", "Nature photography", "Gardening", "Cooking", "Quilting", "Book club participation", "Volunteer work at community events", "Snowshoeing", "Learning about local geology"]'
  career_goals: Although retired from formal employment, Maria aims to deepen her involvement in Eagle County’s community life. She plans to volunteer as a coordinator for the local senior‑center garden
    program, mentor younger volunteers in emergency preparedness, and enroll in community‑college courses on sustainable agriculture and Colorado history. She also hopes to complete a series of nature‑photography
    workshops and eventually publish a small memoir that blends personal stories with the region’s cultural heritage.
