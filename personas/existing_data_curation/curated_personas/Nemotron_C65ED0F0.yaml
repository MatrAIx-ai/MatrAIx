  career_goals: Abdullah hopes to blend his love for art and structured thinking by pursuing a future career in architecture or graphic design, where he can design visually compelling spaces while applying
    his methodical planning skills. He is also fascinated by technology and imagines working in video‑game design or robotics, fields that let him experiment with unconventional ideas. In the long term,
    he aspires to create projects that inspire peers and contribute to his community’s cultural life.
