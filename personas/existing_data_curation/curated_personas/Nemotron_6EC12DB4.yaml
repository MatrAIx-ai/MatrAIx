  career_goals: At 77, Johnny’s ambitions focus on preserving his independence and leaving a tangible legacy. He aims to complete a handcrafted wooden fishing boat that he has been designing for years,
    a project that combines his carpentry skill with his love of fishing. He plans to formalize his mentorship by establishing a quarterly workshop at the local senior center where he teaches basic home‑repair
    and budgeting techniques to small groups, reinforcing his competitive desire to be recognized as a competent instructor. Johnny also seeks to document his family’s oral history—recording stories, recipes,
    and cultural anecdotes—to create a digital archive for future generations. Health‑wise, he is committed to maintaining his physical resilience through regular walks in the Chugach foothills and weekly
    strength‑training routines, ensuring he can continue managing his home’s winter systems without assistance. Finally, he hopes to secure a leadership role on the senior center’s facilities committee,
    where his systematic approach to maintenance and resource allocation can benefit his close‑knit community.
