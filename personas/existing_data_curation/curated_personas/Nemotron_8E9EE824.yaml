  career_goals: At this stage Brandon aims to give back to his community while staying active and engaged. He plans to mentor younger volunteers at the Casper senior center, help document the town’s oil‑heritage
    history, and contribute ideas to the local historical society. He also hopes to complete a memoir of his life’s stories, travel with his wife to a few national parks, and maintain his health so he can
    continue leading group activities.
