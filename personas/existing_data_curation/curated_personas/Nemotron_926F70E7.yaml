  career_goals: She aims to step into a senior finance leadership role, targeting a Chief Financial Officer position within the next five to seven years at a mid‑size or growing tech‑focused firm. Angelie
    plans to earn CPA certification and deepen her expertise in data analytics and ESG integration, positioning herself as a champion for sustainable finance. She also aspires to mentor emerging Latinx
    women in finance, and eventually launch a boutique consulting practice that supports small businesses in immigrant communities, helping them navigate financing and growth challenges.
