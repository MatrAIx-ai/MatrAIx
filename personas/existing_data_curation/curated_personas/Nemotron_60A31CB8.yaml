  career_goals: Uriel aims to advance to a supervisory position such as shift commander or correctional education coordinator within the next five years, leveraging her education background to expand rehabilitative
    programming for inmates. She is pursuing additional certifications in criminal justice and trauma‑informed care, with the ambition to design evidence‑based curricula that improve literacy and vocational
    skills among the incarcerated. Long‑term, she envisions a role in corrections administration where she can influence policy to balance security with effective rehabilitation, and she hopes to mentor
    a new generation of officers who share her commitment to professionalism and cultural sensitivity. Additionally, she is interested in obtaining a master's degree in criminal justice to broaden her strategic
    impact.
