persona_description: A researcher and scientist specializing in the field of materials science and engineering, particularly focused on the development and application of crystallization inhibitors to prevent
  the damage caused by salt on stone buildings. They have conducted research on the effects of salt on stone and have developed new treatments that have proven effective in reducing the damage caused by
  salt. They have published papers on their research and have collaborated with experts from the SALTCONTROL project to improve maintenance and restoration techniques for stone buildings. They have conducted
  laboratory tests on the effects of their treatments and have applied them to the case of salt crystallization in stone buildings. They have developed a methodology for studying the damage caused by salts
  and selecting the most appropriate additive for a specific substrate and type of salt.
