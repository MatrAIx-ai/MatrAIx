  hobbies: '[''Woodworking'', ''Vintage motorcycle restoration'', ''Home brewing'', ''Vegetable gardening'', ''Birdwatching'', ''Photography'', ''Italian cooking'', ''Reading non‑fiction'', ''Scale model
    building'', ''Hiking'']'
  career_goals: Ambrose aims to channel his practical expertise into a flexible, community‑oriented micro‑business. He plans to obtain a state‑certified handyman license so he can offer reliable repair,
    maintenance, and custom woodworking services to neighbors in Ephrata while preserving a work‑life rhythm that accommodates his family. At the same time, he wants to expand his vegetable garden and home‑brew
    operation to supply a small stand at the local farmers’ market, providing a modest supplemental income and a sense of contribution to the local food scene. Long‑term, he hopes to mentor younger DIY
    enthusiasts through workshops at the town’s community center, sharing his blend of curiosity and pragmatic know‑how.
