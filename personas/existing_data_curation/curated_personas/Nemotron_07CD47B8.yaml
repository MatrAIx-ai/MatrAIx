    and fundraising'', ''Project management and budgeting'', ''Scientific writing and presentation'', ''Cross‑functional team leadership'']'
  hobbies: '[''Reading (classic literature, science fiction, Salvadoran poetry)'', ''Cooking traditional Salvadoran dishes (pupusas, tamales)'', ''Mindfulness meditation and journaling'', ''Solo hiking
    in Blue Hills Reservation'', ''Nature photography'', ''Solving puzzles (Sudoku, cryptic crosswords)'', ''Learning classical guitar'', ''Attending quiet museum exhibitions'']'
  career_goals: Rosario aims to become a leading principal investigator who can translate cutting‑edge biomedical discoveries into viable therapeutics. In the next five years she plans to lead a multidisciplinary
    R&D team within a biotech firm, eventually launching her own venture focused on affordable treatments for diseases disproportionately affecting Latin American communities, such as Chagas disease. She
    also aspires to secure independent research funding, publish high‑impact papers, and mentor emerging scientists from underrepresented backgrounds. Balancing her competitive drive, she seeks to build
    a reputation for rigorous, data‑driven decision making while fostering a lab culture that values integrity and resilience.
