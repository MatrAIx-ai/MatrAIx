personas:
  professional: Rosario Dejesus is a biomedical researcher turned biotech strategist who leverages CRISPR expertise, data analysis, and business planning to architect translational projects, while their
    competitive drive and preference for solitude translates into meticulous, data‑driven decision‑making and a leadership style that values rigorous integrity but often keeps interactions to a minimum.
  sports: Rosario Dejesus finds solace in solo hikes across the Blue Hills Reservation during crisp autumn weekends, occasionally joins the Boston Trail Runners for group runs, follows the Boston Red Sox
    and Boston Bruins loyally, and prefers low‑impact cardio over competitive team sports, reflecting their solitary and competitive mindset.
  arts: Rosario Dejesus devotes rainy evenings to reading classics like Mary Shelley’s Frankenstein, modern sci‑fi by Neal Stephenson, and poetry by Pablo Neruda, strums Bach’s cello suites on a classical
    guitar, captures dew‑kissed forest scenes with a DSLR, and frequents quiet exhibitions at the Museum of Fine Arts, Boston, allowing artistic contemplation to temper their rigorous scientific routine.
  travel: Rosario Dejesus plans travel with meticulous spreadsheets, opting for low‑key nature retreats such as Acadia National Park and Patagonia’s Torres del Paine over bustling cities, yet they dream
    of meditative mornings in Kyoto’s temples, balancing limited venture‑funding budgets with the occasional splurge on a solo trekking adventure.
  culinary: Rosario Dejesus enjoys mastering traditional dishes like cheese‑filled pupusas and sweet corn tamales, meticulously preparing masa harina, chilies, and cotija cheese at home while also experimenting
    with quinoa salads and avocado toast, displaying a competent yet precise cooking style that mirrors their methodical laboratory approach.
  core: Rosario Dejesus is a solitary, fiercely competitive biotech strategist who balances relentless curiosity with chronic worry, channeling meticulous precision into both scientific research and daily
    rituals like morning coffee and nightly journaling.
background:
  cultural: Rosario was born to Salvadoran immigrant parents who settled in the Boston area. She grew up bilingual, speaking Spanish at home and English outside, and was immersed in Salvadoran traditions
    such as Semana Santa celebrations, family gatherings centered around pupusas, and folk music like marimba and cumbia. Her family’s emphasis on hard work, education, and community solidarity shaped her
    disciplined work ethic. Living in Somerville, she maintains strong ties to the local Salvadoran diaspora through community festivals, cultural organizations, and volunteer work at a Spanish‑language
    health outreach program. These cultural roots inform her interest in developing affordable health solutions for Latin American populations.
attributes:
  skills: '[''CRISPR gene editing'', ''Cell culture and immunoassays (ELISA, flow cytometry)'', ''Bioinformatics pipeline development (Python, R)'', ''Statistical analysis and data visualization'', ''Clinical
