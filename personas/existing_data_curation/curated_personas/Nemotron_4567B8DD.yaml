personas:
  professional: Juan Davila, a two‑year‑old, already demonstrates a budding professional curiosity by meticulously arranging building blocks by color and size, a habit that hints at a future career in early
    childhood education or design, and they often ask adults to explain the purpose of each tool.
  sports: Juan Davila, a two‑year‑old, enrolls in the Little Sprinters soccer program at Sunrise Kids Club, watches the Los Angeles Dodgers on weekend family TV nights, prefers short bursts of activity
    over prolonged play, and they eagerly line up after each session to receive a water bottle.
  arts: Juan Davila, a two‑year‑old, delights in the bright songs of Raffi and the animated adventures of Sesame Street, often humming Baby Beluga while drawing simple circles, and they use a chunky crayon
    to create colorful scribbles that reflect an early creative spark.
  travel: Juan Davila, a two‑year‑old, has explored the nearby city zoo and enjoyed a family getaway to the Grand Canyon, preferring short, structured outings with clear itineraries over long, unplanned
    vacations, and they always carry a beloved stuffed rabbit for comfort.
  culinary: Juan Davila, a two‑year‑old, favors smooth macaroni and cheese, banana slices, and soft peas, insists on using a tiny fork for each bite, and they show particular fondness for cheddar cheese
    dusted over their veggies, while occasionally refusing broccoli.
  core: Juan Davila is a detail‑obsessed two‑year‑old who lines up toys, hoards pennies, avoids unfamiliar foods, clings to predictable routines, and they revel in exploring new textures and sounds when
    gently encouraged.
background:
  cultural: Juan is raised in a Cuban‑American household in Houston, where Spanish is spoken at home and Cuban traditions are celebrated. Family meals feature classic dishes such as arroz con frijoles and
    plantains, and the household is filled with the sounds of salsa and son music. He participates in cultural events like Cuban Heritage Month festivals and enjoys dancing to traditional rhythms with his
    family. These experiences foster a strong sense of familismo, bilingual language development, and an appreciation for Cuban culinary and musical heritage, all of which shape his daily routines and play
    preferences.
