    maintenance'']'
  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Science‑fiction reading'', ''Attending art exhibitions'', ''Technology meetups'', ''Community event organization'', ''Hiking with local groups'',
    ''Yoga and meditation'', ''Cooking Gujarati cuisine'', ''Mechanical model kit building'']'
  career_goals: Amit aims to transition from first‑line supervision to a senior operations manager role overseeing multiple facilities within the Pacific Northwest. He is driven to lead a company‑wide initiative
    that embeds predictive maintenance and sustainability practices—such as energy‑efficient retrofits and renewable‑energy integration—into the core workflow. Over the next five years, he plans to obtain
    the Certified Maintenance & Reliability Professional (CMRP) credential and to mentor emerging engineers through industry‑partnered apprenticeship programs. In the longer term, Amit envisions founding
    a boutique consulting firm that helps mid‑size contractors adopt lean, technology‑enabled maintenance strategies while also contributing to community STEM outreach in Bellevue’s schools.
