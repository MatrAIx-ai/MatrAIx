  career_goals: Fidel aims to channel his practical expertise and social energy into launching his own small‑scale service business, such as a mobile repair shop or a Mexican‑style food cart, within the
    next two years. He plans to obtain a certified trade credential (e.g., Automotive Service Excellence or a culinary micro‑credential) to bolster credibility. Alongside entrepreneurship, he wants to improve
    his personal organization skills by adopting simple project‑management tools, enabling him to meet deadlines and expand his client base. Long‑term, he hopes to become a recognized community resource
    in Galveston—providing affordable repairs, mentoring younger workers, and perhaps organizing a local sports league—while achieving financial stability that supports his family.
