  hobbies: '[''Reading historical fiction'', ''Gardening succulents'', ''Knitting'', ''Listening to Jazz and Soul'', ''Walking desert trails'', ''Cooking Southern/ Southwestern fusion'', ''Attending small
    book clubs'', ''Storytelling to children'']'
  career_goals: Although retired from formal employment, Annie seeks to deepen her impact within the Tucson community. She aims to lead a small intergenerational gardening project that teaches sustainable
    practices to youth, expand her storytelling sessions at the local library, and become more proficient with tablet technology to document her family’s history. She also hopes to organize a quarterly
    cultural potluck that blends African American culinary traditions with Southwestern flavors, and to maintain her health through regular walks and gentle yoga, ensuring she can continue serving as a
    trusted elder and mentor.
