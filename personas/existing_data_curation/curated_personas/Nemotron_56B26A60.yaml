  hobbies: '[''Art museum and gallery visits'', ''Jazz and blues concerts'', ''Community volunteering'', ''Gardening'', ''Cooking Southern and fusion dishes'', ''Hiking local trails'', ''Traveling to cultural
    festivals'', ''Reading biographies of Black innovators'', ''Board-game nights'']'
  career_goals: In the coming years Maurice aims to shift from day-to-day buying to a senior advisory role where he can champion minority-owned and sustainable suppliers. He envisions launching a boutique
    that showcases locally made, artist-crafted goods, while also serving as a guest lecturer on procurement at a community college. Volunteering on the board of a regional arts nonprofit and mentoring
    emerging Black professionals are also central to his long-term ambition.
