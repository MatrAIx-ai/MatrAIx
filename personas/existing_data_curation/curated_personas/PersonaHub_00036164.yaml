persona_description: A concerned individual who is deeply interested in the security and privacy implications of the proposed amendment to Article 45 in the EU’s Digital Identity Framework (eIDAS). This
  person is knowledgeable about the principles and practices of digital security, particularly in the context of HTTPS and certificate authorities (CAs). This person is concerned about the potential security
  risks and privacy concerns that could arise from requiring governments to designate specific third-party CAs in all major root stores, and is actively seeking ways to mitigate these risks. This person
  is also interested in understanding the broader implications of this amendment on democratic practices and the potential for authoritarian surveillance.
