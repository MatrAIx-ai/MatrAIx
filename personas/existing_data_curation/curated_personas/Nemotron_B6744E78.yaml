personas:
  professional: Lanson Prasad, a 15‑year‑old aspiring digital artist and budding storyteller, channels their methodical planning and imaginative curiosity into creating sci‑fi and fantasy illustrations
    with Procreate and 3D models in Blender, while also composing simple guitar melodies and participating in the school’s music club’s weekly jam sessions.
  sports: Lanson Prasad, a 15‑year‑old who enjoys hiking the local greenway trails with friends and occasionally joins the community’s pick‑up basketball games, proudly wears the jersey of the regional
    high school’s soccer team, and follows the city’s minor league baseball club for inspiration.
  arts: Lanson Prasad, a 15‑year‑old sketch artist and guitarist, draws inspiration from the cinematic worlds of Studio Ghibli, the atmospheric scores of Hans Zimmer, and the narrative depth of Neil Gaiman’s
    novels, while regularly contributing to the school’s music club and experimenting with Blender to bring fantastical realms to life.
  travel: Lanson Prasad, a 15‑year‑old with a love for both solitary hikes and group adventures, has trekked the nearby state park's waterfall trail, dreams of exploring the towering cliffs of New Zealand’s
    Fiordland, and meticulously plans future trips using a travel journal that mixes budget spreadsheets with sketches of imagined sci‑fi cities.
  culinary: Lanson Prasad, a 15‑year‑old who balances a modest cooking skill set with a love for bold flavors, can whip up a quick ramen bowl with soft‑boiled egg and soy‑garlic broth, experiments with
    homemade pepperoni pizza topped with artichoke hearts, and frequently snacks on salty chips while sketching, though they often forget to clean the kitchen afterward.
  core: Lanson Prasad, a 15‑year‑old with a boundless imagination tempered by meticulous planning, toggles between creating detailed sci‑fi art, strategic chess matches, and late‑night gaming, all while
    occasionally succumbing to snack‑induced messes and the pull of procrastination.
background:
  cultural: Raised in Wake Forest, a suburban community in Wake County, North Carolina, Lanson comes from a middle‑class white family with Southern cultural roots. He celebrates traditional holidays like
    Thanksgiving and the Fourth of July with family barbecues and community events such as the Wake Forest Fall Festival. His upbringing includes participation in a local Baptist church youth group, attendance
    at the public library’s art and STEM programs, and exposure to regional institutions like the Marbles Kids Museum and the nearby Research Triangle Park. This blend of Southern hospitality, strong emphasis
    on education, and proximity to tech and arts resources has shaped his curiosity for novelty, abstract concepts, and organized creative pursuits.
