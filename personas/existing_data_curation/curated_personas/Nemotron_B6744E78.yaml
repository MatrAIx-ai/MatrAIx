  career_goals: Lanson aims to pursue a university degree in visual arts or interdisciplinary design, with a long‑term ambition to work as a concept artist or user‑experience designer for video‑game studios
    or tech companies in the Research Triangle. He dreams of creating immersive worlds that blend narrative, art, and technology, and hopes to eventually lead a creative team that experiments with novel
    storytelling formats. In the near future, he plans to build a competitive portfolio, win a regional art competition, and enroll in advanced placement courses in computer science and visual arts to strengthen
    his college applications.
