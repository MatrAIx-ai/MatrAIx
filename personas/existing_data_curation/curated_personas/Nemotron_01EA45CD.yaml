  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration (Procreate)'', ''Surfing'', ''Hula dancing'', ''Listening to traditional Polynesian music'', ''Mobile photography of nature and
    urban scenes'', ''DIY fashion design (custom T‑shirts)'', ''Playing chess'', ''Coding simple games in Scratch'', ''Reading mythology and folklore'', ''Ukulele playing'', ''Strategy board games with
    small groups'']'
  career_goals: Tia aspires to earn a GED and secure a scholarship to a specialized art program where she can fuse her Polynesian heritage with contemporary visual storytelling. She dreams of becoming a
    freelance digital artist and content creator who produces culturally resonant illustrations, short films, and social media campaigns that celebrate Hawaiian myth and the natural environment. In the
    longer term, she hopes to launch an online platform that mentors other Pacific Island youth in digital arts and encourages the preservation of indigenous narratives. Competitive by nature, she also
    aims to win local surfing contests and use her visibility to advocate for ocean conservation. Ultimately, Tia wants her work to be recognized both within her community and on a global stage, showing
    that a young artist from Waipahu can shape modern visual culture.
