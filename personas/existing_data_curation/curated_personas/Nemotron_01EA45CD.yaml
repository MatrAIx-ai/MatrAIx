personas:
  professional: A budding digital visual storyteller named Tia Ork blends traditional island narratives with modern illustration, leveraging sketching, watercolor, Procreate, and video editing in iMovie
    and CapCut, while their disciplined project‑management approach and competitive drive push them to create culturally resonant social media reels and win local art contests.
  sports: Surf enthusiast Tia Ork rides the reefs with the Waipahu Surf Club, follows the World Surf League and the local Oahu Wave Riders, occasionally joins beach volleyball games with the Hawaii Rainbow
    Warriors’ intramural team, and they approach each session with a competitive mindset that fuels their drive to qualify for the upcoming island surf contest.
  arts: Creative spirit Tia Ork spends weekends sketching maritime scenes, painting watercolor sunsets, crafting digital illustrations inspired by the works of artist Kiana L, they practice hula dances
    in their community club while playing ukulele renditions of Israel Kamakawiwo'ole and Jack Johnson, and they curate playlists featuring contemporary indie folk to accompany their artistic process.
  travel: Adventurous 17‑year‑old Tia Ork prefers short, budget‑friendly island hops—such as a sunrise hike on the Na Pali Coast of Kauai and a surf‑focused getaway to Maui’s Hana Highway—while dreaming
    of an extended cultural immersion in Tokyo, and they meticulously plan trips using travel blogs and their own photo journal to capture each experience.
  culinary: Food‑curious teen Tia Ork enjoys crafting poke bowls with ahi tuna, avocado, and sesame oil, perfects a simple spam musubi for after‑school snacks, and experiments with coconut milk‑based curries,
    yet they often skip cooking altogether in favor of ordering late‑night pizza, revealing a playful inconsistency in their kitchen habits.
  core: Tia Ork is a fiercely curious, organized yet competitive 17‑year‑old who channels their love for island traditions, surf culture, and digital art into a disciplined creative journey peppered with
    occasional impulsive splurges and a penchant for late‑night sketch marathons.
background:
  cultural: Tia is a Native Hawaiian of Polynesian descent, raised in the Waipahu community on Oahu. Her family places high value on ʻohana (family) and respect for the ʻāina (land), traditions she experiences
    through weekly visits to the local cultural center where she learns hula, oli (chants), and the histories of her ancestors. Growing up near the bustling streets near Pearl Harbor, she has been exposed
    to a blend of traditional island customs and modern influences, from surfing culture to digital media. The communal spirit of Hawaiian festivals, such as the Makahiki celebrations, has shaped her appreciation
    for storytelling and art as vehicles for cultural preservation. While she navigates contemporary teenage life—social media, school challenges, and peer groups—her heritage remains a guiding compass,
    informing her artistic style, her love for the ocean, and her desire to share Polynesian narratives with a broader audience.
