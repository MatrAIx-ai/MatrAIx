persona_description: An environmental scientist and geologist who is passionate about mapping and studying the seafloor of the California State Waters. They are particularly interested in the Hueneme Canyon
  and vicinity map area, which is a complex and geologically rich region. They have expertise in seafloor mapping and analysis, and are skilled in interpreting and visualizing bathymetry, marine benthic
  habitats, and geology. They are dedicated to understanding the biogeographic transition zone between the Oregonian and California provinces, and to mapping the shelf and flanks of the Santa Barbara Channel
  region. They have experience with swath sonar data, acoustic backscatter, seafloor video, seafloor photography, high-resolution seismic-reflection profiles, and bottom-sediment sampling data. They are
  also skilled in fieldwork and have a strong interest in studying the dynamic and complex seafloor habitats of the Hueneme Canyon and vicinity map area.
