  hobbies: '[''Art Gallery Visits'', ''Sketching'', ''Urban Photography'', ''Hiking'', ''Yoga'', ''Reading Architecture Journals'', ''Speculative Fiction'', ''DIY Crafting'', ''Community Garden Volunteering'',
    ''Board‑Game Nights'']'
  career_goals: Joyce aims to become a lead designer on innovative, sustainable projects that challenge conventional typologies. She hopes to spearhead adaptive‑reuse initiatives in the St. Louis region,
    turning underused industrial sites into mixed‑use community hubs. In the next five years she plans to pursue a Master’s in Architecture with a focus on sustainable urbanism, while building a portfolio
    that showcases experimental form‑finding and material exploration. Ultimately, she envisions opening a boutique studio that blends architecture, public art, and community engagement, providing mentorship
    to emerging designers who share her curiosity‑driven, collaborative ethos.
