personas:
  professional: Joyce Clark is a forward‑thinking architectural designer in St. Louis, harnessing BIM tools like Revit and AutoCAD alongside parametric modeling in Rhino to conjure sustainable, adaptive‑reuse
    projects, while their love for fluid creativity often clashes with the rigid scheduling demands of larger firms.
  sports: Joyce Clark enjoys weekend hikes in the Ozark foothills and yoga flow classes, occasionally joining the Gateway Trail Club for group runs, while cheering on the St. Louis Cardinals and St. Louis
    Blues as part of their relaxed, community‑spirit fitness routine.
  arts: Joyce Clark frequents St. Louis art galleries, sketching installations inspired by the works of contemporary artist Julie Mehretu and the street provocations of Banksy, and finds solace in listening
    to indie folk duo The Milk Carton Kids while exploring the city's pop‑up exhibitions.
  travel: Joyce Clark plans short, budget‑conscious trips that blend structure and spontaneity—such as a weekend road trip to Asheville for its craft breweries and a meticulously researched solo trip to
    Reykjavik to study passive‑house designs—while dreaming of a longer retreat in Kyoto’s temple gardens.
  culinary: Joyce Clark, an enthusiastic home cook, perfects farm‑to‑table dishes like rosemary‑infused roasted carrots and mushroom risotto, often sourcing fresh greens from the community garden and occasionally
    treating themselves to a rare matcha latte at a boutique café.
  core: Joyce Clark is a curiosity‑driven architect who balances spontaneous creativity with occasional schedule chaos, constantly sketching ideas on a pocket notebook while forgetting to file paperwork
    on time.
background:
  cultural: Joyce grew up in O’Fallon, a suburban community in St. Charles County, Missouri, within a middle‑class, predominantly white Midwestern environment. Her family’s ancestry blends German and Irish
    roots, which fostered an appreciation for practical craftsmanship and storytelling traditions. The Midwest’s emphasis on modesty, self‑reliance, and community involvement shaped her cooperative yet
    assertive nature. Local institutions such as the St. Louis Art Museum and the Missouri History Museum exposed her early to a range of artistic expressions, reinforcing her curiosity about new ideas.
    Seasonal community events—county fairs, farmers’ markets, and local theater productions—provided informal venues for her to observe the intersection of culture and built space, informing her design
    sensibility and commitment to socially responsive architecture.
