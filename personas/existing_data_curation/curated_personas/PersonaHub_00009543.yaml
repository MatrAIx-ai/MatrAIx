persona_description: A researcher studying the social behavior of hamadryas baboons, focusing on their affiliative tendencies, social organization, and the impact of social relationships on their behavior.
  This person is particularly interested in the close bonds between male and female kin, their tendency to respect social bonds, and the role of social affiliation in the maintenance of the group. They
  are also interested in the differences between female and male baboons, and the factors that contribute to these differences.
