personas:
  professional: Christian Prieto is an 18‑year‑old aspiring HVAC apprentice who leverages his hands‑on aptitude for carpentry, electrical work, and small‑engine repair to solve maintenance challenges efficiently,
    even when his informal organization sometimes leaves him scrambling for tools, but his competitive drive ensures he consistently beats deadlines and impresses supervisors.
  sports: Christian Prieto channels his outdoor energy into weekend ATV rides with the Bayou Trail Riders club, follows the New Orleans Saints and LSU Tigers for football, shoots hoops at the local YMCA,
    and maintains a basic fitness regimen of push‑ups and fishing trips that keep him agile, while his competitive nature often makes him insist on winning local lawn‑mower drag races.
  arts: Christian Prieto's artistic side surfaces in his habit of listening to classic rock legends like Led Zeppelin, country icons like Johnny Cash, and Cajun zydeco virtuoso Buckwheat Zydeco while rebuilding
    engines, and he unwinds by playing competitive shooters such as Call of Duty, all of which blend into a personal soundtrack that fuels his DIY woodworking projects.
  travel: Christian Prieto prefers spur‑of‑the‑moment road trips along the Gulf Coast, with a lingering wish to explore the Florida Keys for fishing, the historic streets of New Orleans for its music festivals,
    and eventually a cross‑country drive to Colorado’s mountains, budgeting his travels through savings from seasonal work and occasionally hitchhiking to stretch his limited funds.
  culinary: Christian Prieto favors hearty Southern fare—gumbo with crawfish, black‑ened catfish, po'boys piled high with hot sauce, and a backyard grill for ribs—cooking at an intermediate skill level
    that lets him follow online tutorials for spice blends while still ordering fast‑food pizza when his tool‑laden schedule runs late.
  core: Christian Prieto is an 18‑year‑old practical tinkerer who balances a competitive drive with laid‑back scheduling, often misplacing his tools but never misplacing his resolve to become the go‑to
    maintenance pro in Terrebonne Parish.
background:
  cultural: Christian grew up as a white Southern American in Montegut, a small community in Terrebonne Parish, Louisiana. The coastal environment and swamp culture have shaped his everyday life, from frequent
    visits to the bayou for fishing to participation in local Cajun and Creole celebrations like crawfish boils and Mardi Gras parades. His family traditions include attending a nearby Catholic or Baptist
    church, reflecting the religious diversity of the region. While his heritage is primarily Anglo‑American, he has absorbed the region's culinary tastes, music, and a strong sense of community responsibility.
    The blend of southern hospitality, practical self‑reliance, and the relaxed pace of parish life influences his outlook and values.
attributes:
  skills: '[''basic carpentry'', ''plumbing repair'', ''electrical wiring'', ''HVAC maintenance'', ''hand and power tool operation'', ''preventive maintenance scheduling'', ''mechanical troubleshooting'',
    ''safety protocol adherence'', ''basic welding'', ''equipment diagnostics'', ''material inventory management'', ''basic computer literacy for maintenance software'']'
  hobbies: '[''Fishing in local bayous'', ''DIY woodworking projects'', ''Competitive video gaming'', ''ATV off‑road riding'', ''Listening to classic rock, country, and Cajun zydeco music'', ''Rebuilding
    small engines'', ''Attending community festivals and church gatherings'']'
  career_goals: Christian aims to turn his hands‑on experience into a recognized trade qualification. Over the next few years he plans to complete an apprenticeship and earn a journeyman certificate in
    HVAC or electrical work at a community college in the New Orleans area. His long‑term ambition is to become a lead maintenance technician for a regional property management firm, eventually moving into
    a foreman or supervisory role where he can mentor younger workers. Competitive by nature, he also hopes to be known as the most reliable and efficient maintenance worker in Terrebonne Parish, and he
    dreams of eventually opening his own small repair and maintenance service that offers flexible scheduling for local residents and small businesses.
