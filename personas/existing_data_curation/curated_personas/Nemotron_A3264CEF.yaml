personas:
  professional: A budding little architect, Ghaleb Young builds towering structures from wooden blocks, they relish the predictable pattern of each layer while occasionally overthrowing the design in a
    spontaneous burst of giggles, hinting at a future career blending meticulous planning with creative rebellion.
  sports: A lively member of the Neighborhood Tots Soccer Club, Ghaleb Young darts across the soft grass during toddler soccer sessions, they cheer for the local professional baseball team, the Coastal
    Mariners, and adore splash time at the junior swim club, always eager for new movement.
  arts: A budding color enthusiast, Ghaleb Young spends afternoons with Crayola crayons drawing scenes inspired by Disney’s Frozen and Pixar’s Toy Story, they giggle at the rhymes of Dr. Seuss and love
    watching Millie Bobby Brown’s playful performances on family TV.
  travel: A small voyager, Ghaleb Young loves short car rides to the city zoo where giraffes tower like giant blocks, they delight in building sandcastles at family beach trips to Clearwater, and they dream
    of exploring the sparkling lights of Disneyland Paris one day.
  culinary: A determined muncher, Ghaleb Young favors soft mac & cheese, warm chicken nuggets, bright orange carrot sticks, and sweet apple slices; they can spread peanut butter on toast with a tiny spoon
    yet still rely on parents for cooking.
  core: Ghaleb Young balances a love of orderly block towers with sudden bursts of crayon chaos, constantly humming lullabies while clutching a cherished stuffed bunny.
background:
  cultural: Ghaleb is raised in a typical suburban American household in Moorpark, California. His family observes mainstream U.S. traditions such as Thanksgiving, Fourth of July, and Halloween while also
    appreciating the multicultural environment of Southern California. The local community blends Anglo-American and Latino influences, which he experiences through neighborhood festivals, bilingual signs,
    and occasional Spanish-language songs in public spaces. His upbringing emphasizes polite behavior, respect for personal space, and a balanced view of individuality and community harmony.
