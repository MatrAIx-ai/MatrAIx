  career_goals: Although Ghaleb is only two, his emerging interests hint at future aspirations. He enjoys storytime and often points to pictures of teachers or helpers, expressing a wish to "help" and "teach"
    others. With encouragement from his parents, he looks forward to starting preschool where he can learn to read, count, and interact with peers. His long-term ambition, shaped by his caring nature and
    preference for stable routines, is to pursue a role that supports and cooperates with others—such as a teacher, community volunteer, or caretaker—while maintaining a predictable, structured environment.
