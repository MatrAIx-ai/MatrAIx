personas:
  professional: Norma Soto is a quality inspector‑tester‑sorter‑sampler‑weigher at a food‑processing plant who applies rigorous FDA and ISO compliance, precision weighing, and statistical sampling skills,
    while her curiosity for contemporary art and openness to unconventional thinking fuels creative continuous‑improvement suggestions and data‑driven problem‑solving.
  sports: Norma Soto enjoys hiking the Blue‑Blazed trails of Connecticut’s state parks, follows the New England Patriots and Boston Red Sox, and trains with the local co‑ed running group Hartford Runners,
    balancing solitary outdoor workouts with community‑based exercise.
  arts: Norma Soto spends weekends immersed in contemporary galleries featuring works by Ai Weiwei, Kehinde Wiley, and Jenny Holzer, captures installations on film inspired by photographer Sebastião Salgado,
    and unwinds to the experimental sounds of Björk and the jazz stylings of Esperanza Spalding.
  travel: Norma Soto prefers carefully planned trips that blend cultural immersion and nature, having explored the historic streets of Cartagena, the misty cliffs of the Scottish Highlands, and the coastal
    trails of Acadia National Park, while dreaming of a culinary tour of the Amalfi Coast.
  culinary: Norma Soto delights in preparing traditional Ceviche, Causa, and Ají de Gallina, often experimenting with New England twists like lobster‑Ceviche with ají amarillo and maple‑infused causa, and
    they prize fresh lime, cilantro, pisco, and locally sourced clams for their vibrant flavor palettes.
  core: Norma Soto blends meticulous quality‑control expertise with a vibrant artistic curiosity, balancing precise data‑driven work, spontaneous sketch‑sessions, and inventive fusion cooking while maintaining
    an easygoing, organized, and community‑focused outlook.
background:
  cultural: Norma is a first‑generation Peruvian‑American. Her parents emigrated from Lima, bringing with them vibrant traditions of music, dance, and seasonal celebrations such as Inti Raymi and Señor
    de los Milagros. Growing up, the household blended Spanish and English, and family meals centered around shared recipes that emphasized fresh ingredients and communal cooking. These cultural roots instilled
    in her a strong sense of hospitality, respect for collective well‑being, and an appreciation for rhythmic expression, all of which influence her collaborative work style and her love for culinary experimentation.
    While she fully embraces life in West Hartford, she maintains ties to the Peruvian community through local festivals and a weekly cultural club.
attributes:
  skills: '["Quality inspection", "Sampling and weighing", "Statistical analysis (SPC)", "Equipment calibration", "Regulatory compliance (FDA, ISO)", "Root‑cause analysis", "Process documentation", "Continuous
    improvement (Lean, Six Sigma basics)", "Effective communication", "Basic graphic design", "Photography"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and photography", "Cooking Peruvian and fusion cuisine", "Hiking in state parks", "Board‑game nights with friends", "Salsa dancing", "Volunteer
    English tutoring"]'
  career_goals: Norma aims to advance from her current operational role into a senior quality assurance or process improvement position within the next three to five years. She plans to complete her bachelor's
    degree in Industrial Engineering or Food Science and obtain a Certified Quality Engineer (CQE) credential. Long‑term, she envisions leading cross‑functional teams that integrate data‑driven quality
    systems with creative problem‑solving, possibly overseeing a regional quality department. She also hopes to mentor new hires, sharing both her technical expertise and her appreciation for innovative
    thinking.
