personas:
  professional: Myriam Gonzalez, a 22‑year‑old construction specialist, blends meticulous project‑coordination expertise, bilingual crew communication and a budding eye for sustainable, folk‑art‑inspired
    design, channeling their curiosity and disciplined work ethic into every residential build they oversee.
  sports: Myriam Gonzalez follows the Los Angeles Dodgers for baseball, supports the Bakersfield Condors in hockey, and keeps fit through solo sunrise yoga classes at a local studio, preferring low‑impact,
    solitary workouts over team sports, which align with their need for quiet concentration.
  arts: Myriam Gonzalez immerses themselves in watercolor studies of urban skylines at the Bakersfield Museum of Art, draws inspiration from the bold murals of Diego Rivera and the ambient compositions
    of Brian Eno, and curates a modest home gallery where they display their folk‑pattern sketches.
  travel: Myriam Gonzalez prefers meticulously planned solo trips, having trekked the ancient ruins of Oaxaca and camped under the stars of Joshua Tree, while dreaming of a quiet retreat in the Scottish
    Highlands to sketch mist‑shrouded lochs, a journey they see as both artistic pilgrimage and personal escape.
  culinary: Myriam Gonzalez enjoys reimagining classic mole with smoked chipotle and quinoa, perfecting elote grilled with cotija and lime, and experimenting with heirloom tomatillos in a fresh salsa, though
    they occasionally over‑salt dishes when distracted by a new puzzle.
  core: Myriam Gonzalez is a quietly driven creator who fuses disciplined construction mastery with a restless artistic curiosity, thriving in solitude while their chronic worry fuels relentless precision.
background:
  cultural: Myriam is a second‑generation Mexican‑American who grew up in Bakersfield, CA, in a bilingual household. She celebrates Mexican holidays such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day, often preparing family recipes and participating in community festivals. Her extended family maintains close ties to relatives in Mexico, and she frequently visits or communicates
    with them, preserving cultural traditions. The vibrant colors, folk art, and communal values of Mexican culture influence her aesthetic sensibilities and her desire to incorporate cultural motifs into
    her design ideas at work. She also engages with the local Mexican community, supporting artisans and attending cultural events, which reinforce her sense of identity and belonging.
attributes:
  skills: '["Project coordination","Construction site safety compliance","Material logistics and inventory management","Blueprint reading","Basic CAD drafting","Equipment operation (forklift, power tools)","Cost
    estimating","Bilingual communication (English/Spanish)","Excel and construction‑management software proficiency","Attention to detail and quality control"]'
  hobbies: '["Sketching and drawing","Visiting art museums and galleries","Reading (architecture, design, fiction)","Puzzle solving (crossword, sudoku)","Yoga and meditation","Indoor gardening (succulents)","Cooking
    Mexican cuisine with modern twists","Woodworking & DIY projects","Listening to ambient instrumental music"]'
  career_goals: Myriam aims to move from her current miscellaneous construction role to a formal project‑coordinator position within the next two to three years, focusing on residential and small commercial
    projects. She seeks certification as a Certified Construction Manager (CCM) and plans to specialize in sustainable, eco‑friendly building practices that blend functional design with artistic elements.
    Long‑term, she aspires to launch her own boutique contracting firm that emphasizes environmentally responsible construction, integrates Mexican folk‑art motifs, and offers precise project oversight
    while allowing her to work in quieter, behind‑the‑scenes capacities.
