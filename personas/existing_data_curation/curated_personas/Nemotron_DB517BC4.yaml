  hobbies: '[''Shoreline exploration and stone collecting'', ''Reading adventure books (e.g., Magic Tree House)'', ''LEGO building and inventing stories'', ''Playing soccer with peers'', ''Sketching wildlife'',
    ''Environmental club activities'', ''Educational puzzle video games'']'
  career_goals: Allan dreams of a future where he can combine his love for nature, his curiosity about how things work, and his desire to help others. He often says he wants to become a veterinarian so
    he can care for animals, or a park ranger/environmental scientist who protects the forests and Lake Superior shoreline he explores. He is also fascinated by the idea of creating educational video games
    that teach kids about science, reflecting his practical curiosity. In the near term, Allan aims to improve his reading fluency, become a bit more organized with school projects, and learn basic coding
    through fun, game‑based programs.
