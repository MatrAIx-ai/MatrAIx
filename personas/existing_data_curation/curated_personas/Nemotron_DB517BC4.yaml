personas:
  professional: Allan Overman is a budding junior naturalist whose curiosity about the shoreline fuels a practical habit of documenting wildlife, and they channel their compassion into leading the school's
    environmental club projects with a relaxed, improvisational style.
  sports: Allan Overman plays forward for the Superior Youth Soccer Club, loves cheering on the Minnesota Wild during the winter, and spends weekend afternoons sprinting along the lake’s beach with a frisbee,
    balancing team camaraderie with solitary shoreline runs.
  arts: Allan Overman sketches detailed wildlife drawings inspired by the works of John James Audubon, builds imaginative LEGO narratives like a mini‑architect, and enjoys listening to the folk tunes of
    the band The Avett Brothers while watching Pixar’s "Finding Nemo" for creative inspiration.
  travel: Allan Overman prefers spontaneous day trips to nearby state parks such as Isle Royale National Park and the Sleeping Bear Dunes, dreaming of a future family road‑trip to Yellowstone, and plans
    trips around school holidays, balancing the desire for adventure with family budget constraints.
  culinary: Allan Overman favors simple, hearty meals like mac and cheese and pan‑fried lake trout, loves mixing chocolate chips into homemade cookies, can confidently make a peanut butter and jelly sandwich,
    and delights in creating rock‑shaped pretzel bites during weekend cooking sessions.
  core: Allan Overman is a stone‑collecting, soccer‑loving, LEGO‑building kid who forgets homework, hoards pennies, and turns every backyard adventure into a mini‑expedition.
background:
  cultural: Allan grows up in Marquette, a tight‑knit community on the shores of Lake Superior in Michigan’s Upper Peninsula. His family’s heritage includes Northern European roots, with ancestors who arrived
    from German and Polish regions and settled in the area’s historic mining towns. The local culture emphasizes self‑reliance, appreciation for the natural landscape, and seasonal outdoor activities such
    as snowshoeing, ice fishing, and hiking. Community events like town festivals, library storytimes, and school‑led environmental projects reinforce values of cooperation and stewardship, resonating with
    Allan’s compassionate and cooperative personality. These influences shape his respect for nature, his sense of belonging, and his balanced approach to curiosity and practicality.
attributes:
  skills: '[''Reading comprehension (grade‑3 level)'', ''Basic addition and subtraction'', ''LEGO construction and simple engineering concepts'', ''Digital navigation of educational tablet apps'', ''Soccer
