  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading historical fiction and contemporary novels'', ''Church youth group volunteering'', ''Hiking local trails'', ''Baking pies and desserts'',
    ''Attending county fairs and community events'']'
  career_goals: Doris aims to secure a stable administrative position within the local government or a small business where her organizational talent can be fully utilized. She plans to enroll in a community‑college
    office administration certificate program to formalize her skills. In the medium term, she hopes to advance to a supervisory or office‑manager role. Ultimately, she would like to combine her love for
    structure and community by offering part‑time personal‑organizing services for neighbors and local seniors, providing reliable support while maintaining a predictable work schedule.
