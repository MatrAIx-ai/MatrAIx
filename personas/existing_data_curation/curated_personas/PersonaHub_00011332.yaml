persona_description: A public health researcher who is interested in the health impacts of particulate matter (PM) pollution and how it compares to smoking. They are particularly interested in the conversion
  factors between PM pollution levels and cigarettes per day and the potential for confusion in using this analogy. They are also interested in the scale of the PM pollution problem and how it affects everyone
  in an area. They are aware of the limitations of using PM levels as a reference point and are looking for alternative ways to communicate the health risks of PM pollution.
