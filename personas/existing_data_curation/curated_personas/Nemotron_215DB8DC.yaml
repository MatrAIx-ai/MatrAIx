  hobbies: '[''Herb gardening'', ''Baking pies'', ''Reading historical fiction'', ''Knitting'', ''Volunteering at food pantry'', ''Attending church events'', ''Collecting vintage cookbooks'', ''Nature walks'',
    ''Yoga'']'
  career_goals: Kathryn aims to become a head chef at a respected local restaurant that celebrates traditional Southern cooking while fostering community outreach. She aspires to one day open her own family‑style
    eatery in La Fayette, offering a menu of reliably excellent dishes that reflect her disciplined approach to quality. Long‑term, she hopes to develop a line of prepared meals for regional delivery, earn
    recognition for operational excellence, and mentor junior cooks, sharing her organized, compassionate work ethic.
