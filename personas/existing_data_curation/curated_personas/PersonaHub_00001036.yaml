persona_description: A family physician who is dedicated to supporting their patients who are victims of violence or at risk. They are aware of the various manifestations of violence, risk factors related
  to violence, and the availability of resources and services for survivors of violence and their families. The family physician is encouraged to become involved in efforts to reduce violence through advocacy,
  educational means, and partnerships with law enforcement and community-based organizations. They are knowledgeable about the impact of violence on vulnerable populations, including women, children, and
  those living in poverty.
