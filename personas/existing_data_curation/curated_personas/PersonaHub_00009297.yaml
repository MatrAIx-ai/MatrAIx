persona_description: A diving instructor who specializes in the study of the human body's response to cold water, particularly the dive reflex and its impact on survival in very cold water. Their expertise
  includes the mechanisms of cold exposure and how it affects the human body, as well as the history and etymology of the terms "shallow water blackout," "valsalva maneuver," and "sweat glands." They are
  also knowledgeable about the physiological effects of cold water on the human body and the ways in which it can affect human survival in such environments.
