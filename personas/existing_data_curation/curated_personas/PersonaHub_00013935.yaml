persona_description: A researcher and scientist who specializes in the study of circadian rhythms and their transplantability into bacterial species. Her work involves manipulating and using biological
  circuits in a predictable, programmable way to transplant circadian rhythms into bacteria for potential clinical applications. She is a Core Faculty member at the Wyss Institute for Biologically Inspired
  Engineering at Harvard University and a Professor in the Department of Systems Biology at Harvard Medical School. Her team successfully transplanted a circadian rhythm into the bacterial species E. coli,
  which could one day be used in probiotic pills as a way to monitor the gut microbiota. Her research has implications for understanding how other modular biological circuits could be transplanted from
  one species to another, and for developing therapeutic strategies to influence a patient's circadian rhythm or program drugs to release internally at a specific point in the patient's circadian rhythm.
