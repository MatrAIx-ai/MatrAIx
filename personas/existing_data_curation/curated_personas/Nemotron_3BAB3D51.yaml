personas:
  professional: A budding problem solver and future engineer, Jennifer Serfaty loves to assemble chunky puzzles and LEGO bricks, they arrange each piece methodically while eagerly testing new building techniques
    and outmaneuvering peers in friendly competition.
  sports: A lively member of the local toddler soccer clinic, Jennifer Serfaty kicks the ball with disciplined enthusiasm, they also enjoy watching the New York Knicks on Saturday afternoons, and balance
    their competitive streak with solitary sandbox play during the warm summer months.
  arts: A curious little art aficionado, Jennifer Serfaty delights in finger-painting with bright primary colors, they sing along to Raffi's Baby Belugaa, and love storytime featuring Dr. Seuss, letting
    each artistic encounter feed their love for new ideas.
  travel: A tiny explorer who loves car rides, Jennifer Serfaty has already visited the city zoo, the seaside at Santa Monica Beach, and dreams of a family trip to Disneyland, they favor meticulously planned
    outings that include a stop at their favorite ice-cream shop.
  culinary: A budding gourmand with a sweet tooth, Jennifer Serfaty favors mac and cheese with a sprinkle of cheddar, they love crunchy apple slices, and can proudly boast their skill at mixing batter for
    banana pancakes, despite often spilling milk on the kitchen floor.
  core: Jennifer Serfaty is a methodical, curiosity-driven three-year-old who balances competitive play with solitary creativity, keeps a tidy pink piggy bank, and tackles life's tiny challenges with steady
    composure, even if they sometimes forget to brush their teeth after a riveting puzzle.
background:
  cultural: Jennifer was raised in Stockton, California, within a predominantly white, European‑American family that values community, modest religious observance, and education. The multicultural environment
    of the Central Valley, with its agricultural roots and diverse neighbor cultures, subtly influences her exposure to a variety of foods, festivals, and community events. Her family celebrates traditional
    American holidays such as Thanksgiving and Fourth of July, while also supporting local arts programs, museum trips, and nature activities that nurture her curiosity and appreciation for varied experiences.
