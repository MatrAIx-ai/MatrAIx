persona_description: A researcher at Temple University School of Medicine who is working on developing a noninvasive maternal blood test to identify fetal brain injuries. The researcher is focused on examining
  the potential causes of these serious birth defects, focusing on the mother's use of medications and alcohol during pregnancy. The researcher aims to alleviate the problem of the test taking up to ten
  years to have a significant impact on prevention and early diagnoses of fetal brain injuries.
