personas:
  professional: Stephanie Frizie, a 16‑year‑old visual storyteller in training, blends her sketching talent, Procreate mastery, and narrative flair into concept art pieces for indie games, while confidently
    presenting ideas in school clubs and juggling tight deadlines with a planner‑in‑hand approach.
  sports: Stephanie Frizie enjoys weekend hikes on Fairview’s nature trails and occasional pick‑up basketball games at the community gym, follows the Fairview High School track team during the spring season,
    roots for the Chicago Bulls in the NBA, and uses a daily 15‑minute yoga flow to counteract long hours of drawing.
  arts: Stephanie Frizie immerses herself in the work of illustrators like Loish, graphic novelists such as Becky Cloonan, and experimental musicians including Oneohtrix Point Never, regularly attending
    local art fairs and sharing her sketchbook pages on Instagram to connect with fellow young creators.
  travel: Stephanie Frizie dreams of photographing the aurora borealis in Iceland after a memorable road trip to the Grand Canyon, prefers meticulously planned itineraries with sketch‑friendly stops, yet
    often postpones international travel due to her part‑time job and school commitments.
  culinary: Stephanie Frizie is a novice home cook who can whip up a decent avocado‑miso toast and a comforting chicken ramen, favors fresh basil, goat cheese, and roasted veggies in her dishes, but frequently
    orders pizza after late‑night art sessions as a quick energy fix.
  core: Stephanie Frizie is a relentlessly curious teen artist who balances meticulous planning with spontaneous creativity, battles occasional acne and the urge to binge snack, and constantly sketches
    worlds while day‑dreaming about future game concepts.
background:
  cultural: Stephanie was raised in Fairview, a small community in Major County, Oklahoma, within a predominantly white, Midwestern cultural setting. Her family’s roots trace back to early European settlers
    in the region, and she grew up attending local schools, church gatherings, and county fairs that celebrate rural traditions and community camaraderie. This environment nurtured a sense of independence,
    modesty, and appreciation for open spaces, which often inspire the natural themes in her artwork. At the same time, her frequent use of the internet and exposure to broader American pop culture—music,
    films, and online art communities—blend the local heritage with contemporary, global influences, shaping a cultural identity that balances small‑town values with a curiosity for novel, abstract ideas.
attributes:
  skills: '[''Creative Writing'', ''Digital Illustration'', ''Concept Sketching'', ''Basic Video Editing'', ''Photography Composition'', ''Research & Information Synthesis'', ''Time Management'', ''Collaborative
