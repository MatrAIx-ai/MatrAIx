  hobbies: '[''Sketching'', ''Digital Painting'', ''Creative Writing'', ''Reading Science Fiction'', ''Playing Indie Video Games'', ''Photography'', ''Listening to Experimental Music'', ''Exploring Nature
    Trails'', ''Attending Community Art Workshops'', ''Sharing Art on Social Media'']'
  career_goals: Stephanie aims to turn her passion for visual storytelling into a professional career. She plans to build a robust portfolio of illustration and narrative work that will enable her to apply
    to a specialized art program or a college degree in Fine Arts, Graphic Design, or Game Design. Her long‑term ambition is to work as a concept artist or graphic novelist, creating immersive worlds for
    video games, comic books, or interactive media. She also hopes to secure mentorship or internship opportunities with established creators, and eventually give back to her community by leading youth
    art workshops in Fairview and showcasing her work at regional art fairs.
