personas:
  professional: Noemi Baez, a 45‑year‑old full‑stack developer with a business degree, marries technical rigor and commercial insight to craft cloud‑enabled web solutions; they lead agile squads, translate
    stakeholder needs into data‑driven specifications, and mentor junior programmers while championing pragmatic innovation.
  sports: Noemi Baez fuels fitness through salsa and bomba sessions, weekend hikes in karst terrain, and occasional pick‑up basketball games with friends, cheering on the Cangrejeros de Santurce baseball
    squad during spring and supporting the Capitanes de Arecibo basketball team in the winter; they belong to a local hiking club that organizes monthly trail excursions.
  arts: Noemi Baez immerses in the arts by reading contemporary novels from authors like Gabriel García Márquez and Valeria Luiselli, listening to classic salsa legends such as Celia Cruz and modern bomba
    groups, and attending off‑beat theater productions featuring playwrights like Lin‑Manuel Miranda, which together shape their cultural palate and provide inspiration for code design.
  travel: Noemi Baez prefers meticulously planned weekend getaways that blend adventure with relaxation, having trekked the limestone caves of Camuy, explored the colonial charm of Old San Juan, ventured
    to the misty cloud forests of Monteverde in Costa Rica, and day‑dreamed about a future culinary tour of Barcelona’s tapas bars, all balanced against family commitments.
  culinary: Noemi Baez delights in crafting traditional mofongo with a twist—adding roasted plantain chips, garlic‑shrimp sauté, and a hint of smoked paprika—while perfecting arroz con gandules seasoned
    with sofrito, cilantro, and a splash of coconut milk, and they regularly experiment with tropical herbs like culantro and epazote from their garden in spice‑infused sauces.
  core: Noemi Baez is a pragmatic innovator who fuses business savvy with full‑stack coding, spices life with salsa rhythms, garden‑grown herbs, and a disciplined yet adventurous financial plan, all while
    navigating occasional back‑pain and a habit of over‑booking personal projects.
background:
  cultural: Noemi was born and raised in Camuy, a town nestled in the central mountain range of Puerto Rico. Her family’s lineage reflects the island’s blended heritage of Spanish, Taíno, and African ancestors,
    and she speaks both Spanish and English fluently. Puerto Rican culture’s emphasis on family, community solidarity, and hospitality shapes her cooperative mindset and her desire to give back through
    mentorship and local tech initiatives. Traditional celebrations such as the Fiesta de la Virgen del Carmen, the rhythms of plena and salsa, and the communal preparation of foods like lechón and pasteles
    are integral to her identity. Growing up surrounded by the natural beauty of the Rio Camuy and its famous caves fostered a respect for the environment that influences her weekend hikes and her advocacy
    for sustainable tech solutions.
