  skills: '[''Python'', ''JavaScript (React, Node.js)'', ''Java'', ''SQL'', ''PostgreSQL'', ''MongoDB'', ''AWS'', ''Agile/Scrum'', ''Business analysis'', ''Data visualization (Tableau, Power BI)'', ''Mentoring'']'
  hobbies: '[''Cooking (Puerto Rican cuisine)'', ''Salsa and bomba dancing'', ''Hiking in karst caves'', ''Photography'', ''Volunteer coding workshops'', ''Reading Latin American literature'', ''Yoga'',
    ''Gardening'']'
  career_goals: Noemi aspires to move into a technology leadership role where she can shape product strategy for Puerto Rican businesses, particularly small tourism and agricultural enterprises. In the
    next five years she plans to earn an AWS Solutions Architect certification, complete a part‑time MBA focused on digital transformation, and lead a cross‑departmental project to build a cloud‑based marketplace
    for local artisans. She also aims to expand her community impact by organizing coding workshops for underserved youth and, eventually, launching her own consultancy that merges software development
    with business process optimization, all while preserving a healthy work‑life balance for her family.
