  hobbies: '[''Reading African American literature'', ''Watercolor painting'', ''Gardening'', ''Walking in local parks'', ''Listening to jazz and soul music'', ''Volunteer tutoring for seniors'', ''Journal
    writing'', ''Participating in small book clubs'']'
  career_goals: Veronica aims to transition from a teaching assistant role to a full‑time adjunct faculty position at a community college or liberal arts institution, where she can design and teach interdisciplinary
    courses that highlight underrepresented voices in literature and art. She also aspires to develop a mentorship program for adult learners returning to education, publish a scholarly article on African
    American literary criticism, and earn a teaching certification that combines practical pedagogy with her curiosity for innovative instructional methods. Her long‑term ambition is to contribute to curricular
    reforms that balance tradition with contemporary relevance, ensuring students gain both critical insight and practical skills.
