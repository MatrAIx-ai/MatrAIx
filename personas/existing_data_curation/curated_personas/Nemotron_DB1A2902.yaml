  hobbies: '[''Gardening (roses, herbs)'', ''Hiking in the Cascade foothills'', ''Wine tasting at Southern Oregon vineyards'', ''Reading historical fiction'', ''Birdwatching at local wetlands'', ''Quilting
    and knitting'', ''Playing bridge at the senior center'', ''Cooking and experimenting with new recipes'', ''Tinkering with truck telematics'', ''Volunteering with community disaster‑relief transport'']'
  career_goals: Looking ahead, Annette wants to stay active in the trucking industry while gradually shifting toward mentorship and safety training for newer drivers. She aims to obtain a small owner‑operator
    lease to run a niche delivery service that supports local farms and artisans in the Willamette Valley. Additionally, she hopes to volunteer her driving skills with Jackson County’s disaster‑relief transport
    team, using her practical expertise to help the community during emergencies. Maintaining a flexible schedule that allows time for personal interests remains a core ambition.
