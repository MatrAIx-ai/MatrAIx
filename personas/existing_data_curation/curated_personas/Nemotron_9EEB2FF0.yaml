  hobbies: '[''Watercolor Painting'', ''Landscape Photography'', ''Reading Poetry'', ''Hiking'', ''Birdwatching'', ''Knitting'', ''Genealogy Research'', ''Volunteering at the Anchorage Museum'', ''Attending
