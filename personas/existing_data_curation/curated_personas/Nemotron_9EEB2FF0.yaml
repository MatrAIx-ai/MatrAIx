  career_goals: Although retired, Karen is driven by a lifelong commitment to learning and cultural stewardship. She aspires to author a book that weaves together stories of Anchorage’s artists and Indigenous
    art traditions, and to secure a grant to launch a senior‑focused community art exhibition. She plans to mentor emerging artists through workshops at the Anchorage Museum, serve on the museum’s advisory
    board, and continue traveling to major art destinations to broaden her perspective.
