personas:
  professional: Karen Tavera, a retired humanities scholar turned senior arts advocate, leverages her deep knowledge of Western and Indigenous Alaskan art history, meticulous event planning, and digital
    archiving expertise to curate community exhibitions, secure grants, and mentor emerging artists at the Anchorage Museum, and they channel their calm, resilient demeanor into every board meeting and
    workshop.
  sports: Karen Tavera, an avid low‑impact fitness enthusiast, hikes regularly with the Anchorage Hiking Club, participates in the local Seniors’ Walking Group, bird‑watches along the Tony Knowles Coastal
    Trail, and they cheer on the Seattle Seahawks and Seattle Sounders while fondly remembering their Midwest‑born support for the Minnesota Twins.
  arts: Karen Tavera, a watercolor painter and wildlife photographer, draws inspiration from Georgia O'Keeffe’s desert palettes and Ansel Adams’ black‑and‑white landscapes, attends performances by the Alaska
    Folk Festival and the Seattle Symphony, and they regularly study traditional Dena’ina beadwork and Athabascan carving to infuse Indigenous aesthetics into their own artistic practice.
  travel: Karen Tavera, a methodical planner, prefers curated cultural itineraries that blend slow travel with guided museum tours, has journeyed to the Louvre in Paris, the Uffizi in Florence, and recently
    explored the Seattle Art Museum and the rugged landscapes of Denali National Park, and they balance these trips with a modest budget and a love for leisurely train rides.
  culinary: Karen Tavera, a capable home cook, delights in preparing cedar‑plank grilled salmon with fresh dill, whipping up wild berry crumble with locally foraged lingonberries, and occasionally baking
    a classic Midwestern chicken pot pie, and they relish the flavors of wild Alaska herbs like spruce tips and cloudberries alongside familiar comforts.
  core: Karen Tavera, a 67‑year‑old curatorial veteran, merges Midwestern pragmatism with Alaskan wildness in a calm, curious outlook, orchestrating community art projects while habitually writing shopping
    lists on scrap paper and refusing to upgrade to a smartphone, and they find peace in watercolor mornings and knitting evenings.
background:
  cultural: Karen grew up in a small Midwestern town in Illinois, raised in a white, European‑American family with strong community and self‑reliance values. After moving to Anchorage in her thirties, she
    embraced the rugged Alaskan environment and developed a deep respect for the Dena’ina and Athabascan cultures, incorporating their artistic traditions into her own appreciation of the arts. Her lifelong
    involvement in church and local civic groups fostered a spirit of service, while her academic training in the humanities gave her a broad cultural lens that blends classic Western art history with Indigenous
    perspectives.
