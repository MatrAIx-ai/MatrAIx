  career_goals: Maria plans to earn a GED and obtain an Office Administration certificate within the next two years to formalize her education. She aims to advance from her current secretary role to a senior
    administrative coordinator position, taking on greater responsibility for office management and supervisory duties. In the longer term, she aspires to become an office manager for a medium‑sized firm
    in the Dallas area, leveraging her bilingual skills to support diverse teams, and eventually launch a freelance administrative consulting service that helps small businesses streamline operations while
    maintaining a structured, low‑stress work environment.
