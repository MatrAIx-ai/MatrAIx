personas:
  professional: Maria Echavarria is a meticulous office administrator who leverages flawless Excel spreadsheets, bilingual document translation, and a quiet, structured work style to manage schedules, correspondence,
    and small office events with uncanny reliability.
  sports: Maria Echavarria enjoys solitary hikes along local nature trails, follows the Dallas Cowboys and Dallas Mavericks for seasonal excitement, and participates in a weekend recreational softball league,
    preferring low‑impact activities that fit her structured schedule.
  arts: Maria Echavarria devours contemporary Latin American novels by authors such as Valeria Luiselli and classic works by Jane Austen, keeps a reflective journal, and finds solace listening to traditional
    regional songs by Lila Downs while preparing meals, shaping her quiet yet vibrant artistic palate.
  travel: Maria Echavarria prefers low‑key travel, planning trips months in advance to destinations like the Pacific Northwest's Olympic National Park and the historic streets of San Miguel de Allende,
    balancing a modest travel budget with a desire for cultural immersion and quiet exploration.
  culinary: Maria Echavarria masters the precise art of homemade tamales, pozole, and enchiladas, favoring ingredients such as masa harina, dried ancho chilies, hominy, fresh cilantro and avocado, and enjoys
    the ritualistic process of slow cooking as a calming culinary escape.
  core: Maria Echavarria is a quiet, detail‑driven professional who finds order in spreadsheets, serenity in garden walks, and comfort in the rhythmic simmer of traditional dishes.
background:
  cultural: Maria was born to Mexican immigrant parents and grew up in a bilingual household in Mesquite, Texas. Spanish is spoken at home, and she actively participates in family celebrations of Día de
    los Muertos, Mexican Independence Day, and Christmas traditions that blend Catholic customs with Mexican folklore. She maintains close ties with her extended family in both Texas and Veracruz, Mexico,
    often traveling to visit relatives. While she prefers quiet personal spaces, she values the cultural principles of respect, hospitality, and community solidarity inherited from her heritage. Her culinary
    skills, language proficiency, and occasional involvement with the local Mexican community center reflect a strong cultural identity woven into her daily life.
