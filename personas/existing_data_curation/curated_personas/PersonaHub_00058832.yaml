persona_description: A mental health researcher who specializes in studying the psychological well-being of care home workers during times of crisis. She is particularly interested in the prevalence of
  post-traumatic stress disorder and anxiety among these workers and the factors that contribute to their mental health struggles. She is well-versed in conducting anonymous surveys and analyzing large
  datasets to understand the psychological impact of the pandemic on care home workers. Her research interests also include the societal and cultural aspects of care work, particularly how it is perceived
  and valued in different contexts.
