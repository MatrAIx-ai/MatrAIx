persona_description: A leader in the field of action research or site-based applied research who is committed to continuously improving educational or organizational outcomes through the implementation
  of solutions to complex problems. This leader is skilled in developing research questions that address the problem, understanding basic principles of research logic, and being an excellent reflective
  thinker. They are interested in understanding the implications of the evidence-based results of a solution, the status of the problem or issue after implementation, and the best way to communicate the
  results and next steps. They are willing to examine and question their own assumptions and beliefs about what is real, and are committed to uncovering their views and advocating for their decisions.
