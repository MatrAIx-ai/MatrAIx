personas:
  professional: Juana Ocasio, a 42-year-old freelance painter and paperhanger, blends meticulous craftsmanship, bilingual communication, and a keen eye for color to lead small crews in delivering custom
    murals that fuse Spanish artistic motifs with Hawaiian natural scenery, while methodically estimating costs, scheduling work, and ensuring safety compliance with reliable, organized precision.
  sports: Juana Ocasio stays fit by hiking Haleakalā trails each weekend, playing in a co‑ed adult soccer league affiliated with the Maui Soccer Club, cheering on the Hawaii Rainbow Warriors football team,
    and incorporating daily stretching routines inspired by flamenco dancers, though they admit to occasionally skipping Monday yoga when work gets hectic.
  arts: Juana Ocasio blends her love for dancing and photography by attending salsa nights featuring Celia Cruz’s music, taking flamenco workshops led by the celebrated dancer Carmen Amaya, capturing island
    sunsets with a Nikon D850, and drawing inspiration from the vibrant paintings of Frida Kahlo and local Hawaiian artist Herb Kawainui Kane, while sometimes staying up late editing photos on Lightroom.
  travel: Juana Ocasio prefers meticulously planned trips that balance adventure and relaxation, having explored the volcanic craters of Haleakalā on foot, backpacked the rugged coasts of Kauai, and dreamed
    of attending Seville’s Feria de Abril and strolling through the lavender fields of Provence, while always reserving budget‑friendly Airbnbs near cultural festivals to keep travel costs manageable.
  culinary: Juana Ocasio delights in cooking, expertly preparing a saffron‑infused paella with fresh Maui ahi tuna, pineapple, and plantain, mastering a traditional Spanish tortilla with locally sourced
    sweet potatoes, and frequently experimenting with kalua pork in a fusion "Hawaiian‑Spanish" stew that showcases bold ingredients like chiles de árbol and coconut milk, reflecting a high intermediate
    skill level and a passion for creative flavor pairings.
  core: Juana Ocasio merges meticulous craftsmanship, vibrant cultural flair, and community‑centric values into a well‑organized yet adventurous life where each brushstroke, hike, and dinner party reflects
    a reliable, sociable, and curious spirit.
background:
  cultural: Juana Elena Ocasio is a Spanish‑heritage Hawaiian resident who grew up speaking both Spanish and English at home. She celebrates traditional Spanish holidays such as Día de los Reyes and Semana
    Santa while also embracing Hawaiian customs like Lei Day and the annual Merrie Monarch Festival. Her cultural identity blends the warmth and communal spirit of her Spanish roots with the laid‑back,
    nature‑oriented lifestyle of Maui, influencing both her personal interactions and her artistic expression in painting projects.
attributes:
  skills: '[''Surface preparation'', ''Interior painting'', ''Exterior painting'', ''Paper hanging'', ''Drywall finishing'', ''Color theory'', ''Project estimating and budgeting'', ''Project scheduling'',
