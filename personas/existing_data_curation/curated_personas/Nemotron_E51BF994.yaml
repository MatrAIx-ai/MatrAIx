  hobbies: '[''Local Hawaiian cultural festivals'', ''Salsa dancing'', ''Flamenco dancing'', ''Community volunteer painting projects'', ''Hiking Haleakalā trails'', ''Landscape photography'', ''Cooking
    Spanish-Hawaiian fusion dishes'', ''Reading home design magazines'', ''Experimenting with new paint finishes'', ''Hosting social gatherings'']'
  career_goals: Juana aims to expand her freelance practice into a small family-owned painting and decorative finishing business that offers custom mural work inspired by both Spanish artistic motifs and
    Hawaiian natural scenery. She plans to obtain advanced certifications in eco‑friendly painting techniques, train apprentices from her community, and build a reputation for reliable, high‑quality workmanship.
    Over the next five years, she hopes to secure contracts for larger commercial projects while maintaining the personal, community‑focused approach that defines her work ethic.
