personas:
  professional: A budding junior digital illustrator and game creator, Dorothea Leefatt harnesses her curiosity and competitive streak to craft detailed landscape sketches and interactive Scratch games,
    balancing meticulous note‑taking with the freedom to experiment on her tablet.
  sports: A dedicated outdoor enthusiast, Dorothea Leefatt pads up for the Riverside Rangers U‑9 soccer team, joins the after‑school hiking club that treks the nearby state park, and roots for the hometown
    Mariners during baseball season, channeling her competitive edge into every sprint and climb.
  arts: An avid creator, Dorothea Leefatt fills her sketchbook with O'Keeffe‑inspired desert flora, draws pixel art in Procreate set to the whimsical piano pieces of Yiruma, and draws inspiration from the
    fantastical worlds of J.K. Rowling and Brandon Sanderson while attending community art workshops where she meets local muralist Maya Rivera.
  travel: An inquisitive traveler, Dorothea Leefatt has explored the sandstone canyons of the Grand Canyon during a family road trip, camped under the Milky Way near Yosemite, and dreams of trekking the
    dunes of the Sahara and watching the Northern Lights in Iceland, always mapping routes in her nature journal and packing a sketchbook for impromptu art sessions.
  culinary: A budding food explorer, Dorothea Leefatt delights in munching on carrot sticks with hummus, sipping blueberry‑banana smoothies, and helping her parents bake desert‑themed cupcakes topped with
    edible cactus sprinkles, while her favorite dinner is a homemade pepperoni pizza with fresh basil and mozzarella.
  core: Curious yet reserved, Dorothea Leefatt blends a competitive spirit with meticulous organization, turning every sketch, LEGO build, and star‑gazed night into a personal quest for knowledge, though
    she sometimes hoards pocket money and forgets to take her vitamins.
background:
  cultural: Dorothea was raised in a predominantly white family in Red Rock, Arizona, where European‑American traditions blend with the desert‑region lifestyle. Her household celebrates typical American
    holidays such as Thanksgiving and Fourth of July, while also emphasizing respect for the surrounding Sonoran Desert environment. She attends a local school that incorporates regional natural‑history
    lessons, introducing her to the cultural heritage of Indigenous peoples of Arizona. Family outings often involve hiking, star‑watching, and community events like the county fair, fostering a sense of
    independence, curiosity, and connection to both her immediate community and the broader national culture.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic'', ''drawing and sketching'', ''digital illustration using a tablet'', ''introductory coding with Scratch'', ''nature observation and journaling'',
    ''puzzle solving'', ''self‑organization for school tasks'']'
  hobbies: '[''drawing and painting'', ''digital art with tablet'', ''nature journaling and rock collecting'', ''reading fantasy and science books'', ''building LEGO structures'', ''playing chess'', ''coding
    simple games in Scratch'', ''participating in a small art club'']'
  career_goals: Dorothea dreams of becoming a visual storyteller—perhaps an illustrator, wildlife documentary filmmaker, or environmental scientist—who can combine her love of art with her curiosity about
    the natural world. She aims to develop her creative problem‑solving abilities, earn recognition for her artwork in school exhibitions, and one day explore unconventional ideas that could inspire others.
    While still early, she sees herself pursuing advanced art and science studies that blend imagination with scientific inquiry.
