personas:
  professional: Antonio Hayes is an aspiring digital illustrator who spends after‑school hours sketching cityscapes of the Fox River, experimenting with a simple art app on their tablet, and creating short
    Scratch animations, channeling their curiosity and love of fresh ideas into a fledgling creative portfolio, even though they often leave school assignments for later and prefer a flexible, unstructured
    creative process.
  sports: Antonio Hayes follows the Milwaukee Bucks and Chicago Cubs on television, plays in a local youth soccer club called the Fox River Eagles on weekends, and enjoys the occasional pick‑up game of
    basketball at the community center, preferring low‑pressure group activities over competitive leagues.
  arts: Antonio Hayes draws inspiration from graphic novel creators like Noelle Stevenson, the whimsical animation style of Hayao Miyazaki, the soulful vocals of Aretha Franklin, the improvisational jazz
    of Miles Davis, the introspective hip‑hop of Kendrick Lamar, and the dreamy indie rock of Tame Impala, weaving these influences into their own sketches, Scratch animations, and playlists.
  travel: Antonio Hayes has explored nearby nature retreats such as Door County and the Wisconsin Dells, visited Washington, D.C. on a school field trip, and dreams of backpacking through the Pacific Northwest's
    Olympic National Park, favoring spontaneous day‑trip planning over extensive itineraries due to school and family constraints.
  culinary: Antonio Hayes enjoys cooking simple dishes like avocado toast with chili flakes, banana‑pancakes topped with maple syrup, and makes a surprisingly crisp grilled cheese, while their favorite
    restaurant meals are pepperoni pizza and chicken nuggets, and they often experiment with adding unexpected toppings like pineapple or jalapeños.
  core: Antonio Hayes is a curious, laid‑back twelve‑year‑old who transforms their love of drawing, eclectic music, and spontaneous nature walks into a vibrant, sometimes messy, creative life.
background:
  cultural: Antonio is a Black American growing up in Neenah, Wisconsin, a small Midwestern city on the Fox River. His family maintains strong cultural ties to African‑American heritage, celebrating holidays
    such as Kwanzaa, sharing stories of the civil rights movement, and listening to gospel, soul, and contemporary Black artists at home. His grandparents often recount family histories and teach him about
    important Black figures, fostering a sense of pride and identity. At school and in the community, Antonio participates in multicultural events and has attended the annual African‑American cultural festival
    in nearby Milwaukee. The blend of his family’s rich cultural traditions with the close‑knit, modest values of his Midwestern surroundings gives him a unique perspective that informs his art, his curiosity
    about diverse experiences, and his desire to contribute positively to his community.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''Scratch programming'', ''creative writing'', ''critical thinking'', ''empathy'', ''basic math'']'
  hobbies: '[''drawing'', ''digital art'', ''nature photography'', ''listening to music'', ''Scratch coding'', ''reading graphic novels'', ''chess'']'
  career_goals: Antonio dreams of turning his love for art and technology into a career as a multimedia storyteller. He aspires to become a digital illustrator or concept artist for video games or animated
    films, blending hand‑drawn aesthetics with interactive media. In high school he hopes to join a specialized arts program, build a strong portfolio, and attend summer workshops that focus on graphic
    design and coding. Long‑term, he wants to create community art projects that celebrate African‑American stories in the Midwest and mentor younger kids in his neighborhood, using his artistic skills
    to inspire confidence and creativity.
