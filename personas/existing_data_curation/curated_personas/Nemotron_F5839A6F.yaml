  hobbies: '[''Reading Business and Self‑Improvement Books'', ''Cooking Creole and Soul Food'', ''Gardening'', ''Attending Gospel Choir Sessions'', ''Nature Walks and Bike Rides'', ''Journaling'', ''Listening
    to Jazz and Blues'', ''Volunteering at Community Youth Programs'']'
  career_goals: Yolanda aims to progress from a sales associate to a regional sales manager within the next five years, leveraging her blend of curiosity and practicality to implement data‑driven sales
    initiatives. She plans to earn a Certified Professional Salesperson (CPS) credential and attend leadership workshops to enhance her managerial capabilities. Long‑term, she hopes to launch her own boutique
    store that highlights locally sourced Creole-inspired fashion and goods, providing a platform for community entrepreneurship while maintaining a competitive edge in the market.
