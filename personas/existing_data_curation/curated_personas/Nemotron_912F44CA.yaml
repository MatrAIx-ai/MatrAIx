  hobbies: '[''hiking in Shenandoah'', ''dance classes (salsa and Zumba)'', ''community theater'', ''board game nights'', ''volunteering at local animal shelter'', ''exploring Virginia craft breweries'',
    ''gardening'', ''yoga'', ''reading contemporary business books'', ''cooking experimental meals'']'
  career_goals: Susan aims to advance to a senior development leadership role, such as Development Director or Vice President of Advancement, within the next three to five years. She plans to lead larger
    capital campaigns and diversify revenue streams by integrating digital fundraising tools and data analytics. She intends to obtain the Certified Fund Raising Executive (CFRE) credential and consider
    a master’s degree in nonprofit management to deepen her strategic expertise. Long‑term, she dreams of starting her own fundraising consultancy to help grassroots organizations in Appalachia and beyond.
    She also wishes to mentor junior fundraisers and champion collaborative community initiatives while maintaining a healthy work‑life balance with her husband.
