  hobbies: '["Jogging", "Gardening", "Cooking Mexican cuisine", "Reading mystery novels", "Solving crossword puzzles", "Playing chess", "Volunteering at church youth program", "Participating in Mexican
    cultural festivals"]'
  career_goals: Julieta plans to earn a master’s degree in Educational Leadership within the next three years and transition into an instructional coach or curriculum specialist role in Collin County. She
    wants to develop a district‑wide bilingual program that standardizes support for Spanish‑speaking students and to launch a structured after‑school tutoring initiative that reflects her competitive drive
    to improve student test scores. Ultimately, she aspires to become an assistant principal, where she can influence school‑wide policies while maintaining the practical, routine‑oriented environment she
    values.
