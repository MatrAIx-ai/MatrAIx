personas:
  professional: Julieta Monroy is a dedicated elementary and middle‑school teacher who blends data‑driven lesson planning with bilingual Spanish‑English instruction, leveraging strong classroom‑management
    and educational‑technology skills, while their routine‑oriented and competitive nature drives them to set high test‑score targets and mentor peers through professional‑development workshops.
  sports: Julieta Monroy hits the pavement each sunrise with the North Texas Road Runners, cheers on the Dallas Mavericks during basketball season and the Texas Rangers in baseball, and joins a co‑ed community
    soccer league in the summer to stay competitive and fit.
  arts: Julieta Monroy enjoys the vibrant regional folk sounds of Los Tigres del Norte, admires the colorful canvases of Frida Kahlo, and unwinds with mystery novels by Agatha Christie while occasionally
    attending local theatre productions of plays by Lorena Abreu.
  travel: Julieta Monroy prefers structured weekend getaways, often road‑tripping to Austin’s live‑music scene or exploring historic San Antonio, and dreams of a culturally immersive tour of Oaxaca and
    a brief study‑tour in Barcelona to observe international educational models.
  culinary: Julieta Monroy, an adept home chef, perfects traditional tamales and pozole with masa, pork shoulder, hominy, and chilies, while they frequently experiment by adding smoked paprika or quinoa
    to blend new flavors into classic Mexican dishes.
  core: Julieta Monroy balances a love of routine—morning jogs, meticulous lesson plans, and budget spreadsheets—with a competitive streak that surfaces in chess matches, garden harvests, and a relentless
    pursuit of higher test scores.
background:
  cultural: Julieta is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and English were spoken daily. Her family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Cinco de Mayo, and other cultural holidays with food, music, and storytelling. She identifies with her Catholic faith and is active in the local Hispanic community in McKinney, often
    sharing cultural practices with her students and colleagues. This heritage informs her compassionate, practical teaching style and her commitment to supporting Spanish‑speaking learners.
attributes:
  skills: '["Classroom management", "Curriculum design", "Lesson planning", "Differentiated instruction", "Bilingual education (Spanish-English)", "Data-driven assessment", "Educational technology integration",
