  hobbies: '[''Kayaking'', ''Hiking'', ''Cycling'', ''Community Volunteering'', ''Charity Event Organization'', ''Youth Mentorship'', ''Woodworking'', ''Motorcycle Restoration'', ''Live Music Concerts'']'
  career_goals: David aims to progress to a regional operations manager role, where he can spearhead sustainability initiatives such as green routing and fuel‑efficiency programs for the company's fleet.
    He is pursuing certification as a Certified Supply Chain Professional (CSCP) and plans to enroll in a master's program in Logistics and Supply Chain Management. Long‑term, he hopes to lead a digital
    transformation project that integrates IoT tracking and AI‑based predictive maintenance, while also mentoring the next generation of transportation supervisors.
