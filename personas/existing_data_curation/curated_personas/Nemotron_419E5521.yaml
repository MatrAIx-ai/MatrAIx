personas:
  professional: David Neese is a transportation logistics supervisor who blends data‑driven route optimization with a hands‑on, Lean mindset, using their curiosity to test new IoT tracking ideas while honoring
    proven safety protocols, and channels their sociable, cooperative nature into mentoring crews and leading community‑focused sustainability projects.
  sports: David Neese is an avid weekend kayaker on the coastal waters, a regular hiker of the White Mountains, and a member of the Barrington Cyclists club, cheering on the New England Revolution in MLS
    and the Boston Red Sox in baseball, while using flexible training routines that blend group rides with solo strength sessions to stay fit year‑round.
  arts: David Neese frequents Portsmouth live‑music venues to see blues legends like Buddy Guy and indie folk act Lake Street Dive, collects vintage motorcycle memorabilia as functional art, and enjoys
    woodworking projects inspired by the craftsmanship of Sam Maloof, letting these artistic pursuits shape both their leisure time and their hands‑on problem‑solving at work.
  travel: David Neese plans most trips around weekend getaways, having kayaked the waters of Cape Cod, hiked Acadia National Park, and now dreaming of a road‑trip through New Zealand’s South Island for
    its coastal trails, balancing a modest travel budget with a love for adventure and a preference for destinations that offer both outdoor challenge and community connection.
  culinary: David Neese enjoys grilling fresh Atlantic salmon with dill and lemon, whipping up lobster rolls with buttery brioche, and crafting homemade wood‑fired pizza topped with mozzarella, roasted
    garlic, and rosemary, preferring hands‑on cooking that mirrors their woodworking hobby while also treating themselves to oysters at Portsmouth’s waterfront restaurants on special occasions.
  core: David Neese is a data‑driven logistics leader who channels their energetic, community‑oriented spirit into outdoor adventures, occasional impulse buys for vintage bikes, and a habit of postponing
    dentist appointments, all while relentlessly pursuing greener, tech‑enabled transportation solutions.
background:
  cultural: David grew up in a traditional New England family with deep roots in the region, tracing ancestry to early English settlers and later Irish immigrants. He embraces New England values of self‑reliance,
    community involvement, and respect for the natural environment. Growing up in the modest, close‑knit towns of southern New Hampshire, he developed an appreciation for local traditions, seasonal festivals,
    and a strong work ethic that reflects the region’s heritage.
attributes:
  skills: '[''Logistics Planning'', ''Route Optimization'', ''Fleet Maintenance Oversight'', ''Safety Compliance'', ''Data‑Driven Performance Analysis'', ''Lean Process Improvement'', ''Team Leadership'',
