  career_goals: Mahamed aims to secure a stable, structured role that leverages his organizational and people-skills while providing a reliable routine. He plans to enroll in a community-college associate
    program in Business Administration or Hospitality Management, with the longer-term goal of becoming a community-center coordinator or event-management specialist for local nonprofits. By obtaining certifications
    in event planning and basic first-aid/CPR, he hopes to combine his love for group activities with his desire to support others, all within a low-stress, predictable work environment.
