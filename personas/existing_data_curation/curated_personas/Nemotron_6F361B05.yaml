personas:
  professional: Mahamed Hogue works as an event‑assistant at a local nonprofit community center, where their knack for detailed spreadsheets, empathetic listening, and coordinating volunteer food‑bank shifts
    translates into smooth, low‑stress programming.
  sports: Mahamed Hogue plays in the Rockland community basketball league and a co‑ed soccer team that practices at the local park, roots for the Boston Celtics and New England Revolution, and keeps fit
    by hiking the coastal trails of Cape Ann on weekends, though they sometimes skip workouts after a stressful week.
  arts: Mahamed Hogue joins a weekly acoustic‑guitar jam at a rustic coffee shop, covering folk artists like The Avett Brothers, Simon & Garfunkel, and local singer‑songwriter Emily Jane while also enjoying
    board‑game nights featuring Catan and Ticket to Ride, and they occasionally indulge in binge‑watching classic Shakespeare adaptations on TV.
  travel: Mahamed Hogue prefers short, budget‑friendly road trips to coastal getaways such as Martha’s Vineyard and Acadia National Park, planning itineraries with a detailed spreadsheet and a love for
    lighthouse hikes, yet dreams of an international backpacking adventure through the historic towns of Ireland and Scotland once finances allow.
  culinary: Mahamed Hogue favors New England staples like clam chowder, lobster rolls, and homemade apple crisp, often cooking simple one‑pot meals featuring fresh local vegetables, while they also enjoy
    brewing a strong dark‑roast coffee and occasionally treat themselves to spicy Thai green curry when craving a flavor escape.
  core: Mahamed Hogue is a community‑oriented 23‑year‑old who balances meticulous organization with a love for group sports, guitar jams, and mindfulness, yet battles a habit of over‑worrying and occasional
    splurges on caffeine.
background:
  cultural: Mahamed comes from a multi-generational white New England family with roots in the region dating back several decades, reflecting a mix of English and Irish ancestry. Raised in Rockland, MA,
    he grew up in a close-knit, suburban community that values hard work, practicality, and civic involvement. The town’s modest coastal culture, local traditions, and emphasis on community service have
    shaped his cooperative outlook and his appreciation for structured, group-oriented activities.
