  hobbies: '[''Fishing'',''Hunting'',''Woodworking'',''Classic car restoration'',''Home gardening'',''Reading historical nonfiction'',''DIY electronics projects'',''Volunteer at church food pantry'']'
  career_goals: He aims to move from crew member to lead foreman within the next three years, securing a certified safety officer credential to improve on‑site risk management. Todd also plans to complete
    a community‑college certification in electrical utilities management, positioning himself for a supervisory or training role that will allow him to mentor new linemen. Long‑term, he hopes to establish
    a small subcontracting business that provides line‑installation services to municipal projects, ensuring stable income for his family and a smoother transition to retirement while reducing the physical
    strain of field work.
