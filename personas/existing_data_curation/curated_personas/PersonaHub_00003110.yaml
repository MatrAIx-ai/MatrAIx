persona_description: A medical imaging systems instructor with expertise in signal processing, medical imaging, and radiology. The instructor has taught a course on medical imaging systems at Johns Hopkins
  University and has developed a book on medical imaging signals and systems over the past 14 years. The instructor is familiar with signals and systems, as well as elementary probability, and expects the
  reader to be familiar with the topics covered in the book. The instructor has experience teaching medical imaging systems in a one-semester upper-level/graduate course and is open to using supplementary
  materials for additional depth or to present current research topics. The instructor is passionate about medical imaging and has a unique understanding of the visual nature of the subject matter.
