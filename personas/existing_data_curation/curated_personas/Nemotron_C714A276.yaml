personas:
  professional: Ruben Reyes is a high‑school senior turning his street‑art passion into a budding career path, blending graphic design skills, bilingual communication, and community event organizing to
    envision a future as a cultural‑arts coordinator for a nonprofit serving youth from diverse backgrounds.
  sports: Ruben Reyes drives an active lifestyle through weekend basketball games with the Eastside Hoops League and regular sessions with the Urban Glide skate crew, while cheering for the New York Knicks
    and following the NBA season, balancing cardio on the court with the street‑style agility of skateboarding.
  arts: Ruben Reyes channels his curiosity into bold street murals inspired by Banksy and RETNA, while his playlist of Bad Bunny, J Balvin, and Ozuna fuels his visual storytelling, and he spends evenings
    dissecting the works of Frida Kahlo and Diego Rivera at local art shows.
  travel: Ruben Reyes alternates between spur‑of‑the‑moment trips to the nearby coastal boardwalk and carefully planned visits to vibrant cities like Barcelona, Mexico City, and Cartagena, dreaming of a
    solo road‑trip across the U.S. to capture murals and street‑culture on camera.
  culinary: Ruben Reyes loves to spend weekends in the kitchen mastering island classics such as mofongo, arroz con gandules, and plantain fritters, using fresh sofrito, achiote, and tostones to blend flavors
    while honing a modest but growing skill set that mixes family recipes with experimental plating for friends.
  core: Ruben Reyes is a sociable, organized teen who balances a relentless love for street art, community activism, and a hidden tendency to procrastinate on schoolwork while constantly juggling sketchbooks,
    skateboards, and snack wrappers.
background:
  cultural: Ruben was raised in a Puerto Rican household in Monsey, New York, where Spanish is spoken at home and family gatherings feature traditional dishes like arroz con gandules and lechón. He celebrates
    Puerto Rican holidays such as Three Kings Day and participates in local diaspora events that keep his island heritage alive. Living in a predominantly Orthodox Jewish community has exposed him to a
    diverse cultural tapestry, fostering an appreciation for cross‑cultural dialogue while maintaining strong ties to his Catholic roots and the vibrant rhythms of Caribbean music.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Public speaking'', ''Event planning and coordination'', ''Social media content creation'', ''Graphic design (Photoshop, Canva)'', ''Photography'',
