  hobbies: '[''Sketching and mural painting'', ''Digital art and graphic design'', ''TikTok video creation'', ''Listening to reggaeton and Latin trap'', ''Playing basketball'', ''Skateboarding'', ''Cooking
    Puerto Rican cuisine'', ''Volunteering at community center'', ''Organizing youth workshops'']'
  career_goals: Ruben aims to pursue a career that blends his love of art, community, and digital media. He plans to obtain his GED and enroll in a community‑college program in communications or graphic
    design, with the long‑term goal of becoming a cultural‑arts coordinator or digital marketing specialist for a nonprofit that serves Hispanic youth. He also dreams of building an online platform that
    showcases emerging Latino artists and promotes cultural exchange.
