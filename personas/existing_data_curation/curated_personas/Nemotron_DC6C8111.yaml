personas:
  professional: Andrea Mclaughlin, an aspiring young engineer, applies their methodical planning and pragmatic curiosity to building complex LEGO structures and leading small‑group robotics challenges,
    and they demonstrate early problem‑solving and leadership skills.
  sports: Andrea Mclaughlin, who cheers for the New York Knicks and the Seattle Seahawks, enjoys swimming lessons at the local community center, participates in a weekend youth soccer league, and often
    joins family hikes to collect rocks, reflecting a balanced yet competitive approach to fitness, and they relish the thrill of friendly competition.
  arts: Andrea Mclaughlin draws detailed sketches of animals inspired by Beatrix Potter, admires Leonardo da Vinci’s inventive designs, and often listens to the whimsical melodies of folk duo The Milk Carton
    Kids while constructing LEGO models, and they weave artistic appreciation into their quiet, focused playtime.
  travel: Andrea Mclaughlin prefers meticulously planned family trips, having explored Yellowstone National Park’s geysers, taken a weekend getaway to Washington, D.C. to see the Smithsonian’s natural history
    exhibits, and dreaming of snorkeling the Great Barrier Reef, they balance curiosity with a love for structured itineraries.
  culinary: Andrea Mclaughlin, a budding home chef, enjoys assembling simple meals like grilled cheese sandwiches and mac and cheese, delights in decorating gingerbread cookies with colorful icing, and
    often helps their parents bake chocolate chip brownies, showcasing a developing culinary confidence paired with a penchant for sweet treats.
  core: Andrea Mclaughlin, an 8‑year‑old with a razor‑sharp curiosity, channels their competitive spirit into meticulous LEGO builds, yet often loses track of bedtime and hoards rocks in their backpack,
    and they occasionally forget to tidy up their desk.
background:
  cultural: Andrea was raised in Zebulon, a small town in Johnston County, North Carolina, within a family that values community, modesty, and Southern hospitality. Her household reflects a blend of traditional
    American customs and local traditions, such as attending community festivals, celebrating seasonal holidays, and participating in church‑based youth activities. The region’s emphasis on neighborly support
    and appreciation for the outdoors has shaped her practical outlook and love for hands‑on learning. While her ethnic background is White, her upbringing incorporates the broader regional heritage of
    North Carolina, encouraging respect for diverse perspectives while maintaining a strong sense of local identity.
