personas:
  professional: Tina Stone, an Administrative Services Manager at a regional nonprofit, blends pragmatic curiosity with a natural flair for people‑centric leadership, streamlining cloud‑based scheduling,
    negotiating vendor contracts, and mentoring staff while occasionally letting their relaxed approach to deadlines cause last‑minute scrambles.
  sports: Tina Stone enjoys hiking the Oakley Trail near Cincinnati, cheers loudly for the Bengals and Reds, and participates in the local “Cincy Trailblazers” running club that meets Saturday mornings
    for 5‑kilometer group runs.
  arts: Tina Stone frequently attends concerts by the Cincinnati Symphony Orchestra, community productions at the Ensemble Theatre, and indie shows featuring The Woodtowns, while their reading list is stacked
    with contemporary fiction from Sally Rooney and Chimamanda Ngozi Adichie, often quoting favorite lines during dinner parties.
  travel: Tina Stone favors spontaneous weekend getaways, having recently explored the historic downtown of Lexington, Kentucky, trekked the waterfalls of Hocking Hills State Park, and taken a scenic road
    trip to Asheville, North Carolina, all while juggling limited vacation days and a desire to discover new local cuisine.
  culinary: Tina Stone delights in hosting dinner parties featuring rosemary‑infused roast chicken, handmade gnocchi with sage butter, and a signature Cincinnati chili topped with shredded cheddar, while
    their kitchen quirks include occasionally over‑proofing sourdough starter and forgetting to defrost meat in time.
  core: Tina Stone is a charismatic, curiosity‑driven administrator who transforms chaotic schedules into lively gatherings, yet habitually misplaces receipts and relies on a sticky‑note system that never
    quite sticks.
background:
  cultural: Tina is a white Midwestern American with German and Irish ancestry, raised in Cincinnati, Ohio. Her upbringing reflects the region’s emphasis on community, hospitality, and modest practicality.
    She participates in local traditions such as the Oktoberfest celebration, enjoys Cincinnati‑style cuisine, and values the city’s blend of cultural diversity. Her family’s Catholic roots have fostered
    a sense of service, leading her to volunteer regularly and prioritize harmony in her personal and professional relationships.
