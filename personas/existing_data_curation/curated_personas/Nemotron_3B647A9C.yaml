  career_goals: Tina aims to progress into a regional Director of Operations role where she can shape policy for multiple sites, champion flexible work arrangements, and lead large‑scale efficiency initiatives.
    She also envisions mentoring the next generation of administrative professionals, possibly establishing a consultancy that helps small nonprofits optimize their administrative functions while maintaining
    a people‑first culture.
