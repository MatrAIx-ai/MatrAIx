  career_goals: Leonor aims to earn her GED and enroll in a state‑approved apprenticeship program to become a certified journeyman carpenter within the next three years. She envisions advancing to a master
    carpenter role, eventually launching her own custom furniture and small‑scale remodeling business that serves the Salvadoran and broader community in Southwest Florida. In the long term, she hopes to
    mentor other young women from immigrant backgrounds, offering them pathways into skilled trades and potentially pursuing a construction management certification to oversee larger residential projects.
