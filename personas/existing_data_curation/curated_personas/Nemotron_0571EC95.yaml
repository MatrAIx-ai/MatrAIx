personas:
  professional: Leonor Kahng is a 21‑year‑old bilingual carpenter who excels at residential framing, cabinet installation and custom furniture fabrication, combining a methodical, blueprint‑driven workflow
    with a flexible, people‑first approach that leverages their outgoing nature to bridge communication between crew members and clients in both Spanish and English, and they consistently keep project timelines
    on track despite occasional last‑minute changes.
  sports: Leonor Kahng plays forward for a local co‑ed soccer league and dances salsa and bachata on weekend nights, follows the Tampa Bay Buccaneers and Orlando Magic, and they maintain a flexible fitness
    routine that mixes structured team practices with spontaneous beach volleyball games at Naples Pier.
  arts: Leonor Kahng immerses themselves in the rhythm of cumbia and reggaetón, regularly dances to Celia Cruz and Bad Bunny, sketches bespoke furniture designs while listening to Carlos Vives, and they
    draw inspiration from community murals during local art festivals, letting these creative outlets shape their personal aesthetic and social connections.
  travel: Leonor Kahng prefers spontaneous road trips along the Gulf Coast, having already explored the Everglades, Key West, and a cultural weekend in New Orleans, and they dream of a future visit to Oaxaca
    for its vibrant festivals, balancing a modest travel budget with a love for beach relaxation and on‑the‑fly adventure planning.
  culinary: Leonor Kahng enjoys cooking pupusas, tamales, and yuca frita for friends, skillfully seasons plantains with achiote, pairs their dishes with fresh Gulf shrimp for a coastal twist, and while
    they are confident in the kitchen, they sometimes over‑salt recipes when dancing late into the night.
  core: Leonor Kahng is a 21‑year‑old bilingual carpenter whose structured craftsmanship blends seamlessly with a love for dance, communal cooking, and spontaneous coastal adventures, and they approach
    planning with relaxed flexibility while driving to uplift their community.
background:
  cultural: Leonor grew up in a Salvadoran immigrant family that values close‑knit relationships, hard work, and cultural traditions. Bilingual in Spanish and English, she celebrates holidays such as Las
    Posadas, Día de los Muertos, and the Salvadoran Independence Day with family gatherings and traditional foods. Her Catholic upbringing instilled a sense of community service, which she expresses through
    local volunteer work. The blend of her Salvadoran heritage and life in Naples, FL, shapes her identity, infusing her craftsmanship with a respect for family‑centered projects and a desire to uplift
    her cultural community within the construction trade.
