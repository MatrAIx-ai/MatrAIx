  career_goals: Steven aims to channel his blend of technical and artistic interests into a community‑focused role. He plans to launch a non‑profit initiative that integrates STEM education with hands‑on
    art workshops for youth in the Tampa Bay area, while offering pro‑bono consulting for small local businesses seeking to adopt digital tools. He also aspires to become a regular speaker at regional conferences
    on interdisciplinary creativity, author a blog series on the convergence of engineering and art, and eventually pursue a master's degree in education or art history to deepen his expertise. Through
    these efforts, he hopes to leave a lasting impact on his community while continuing personal growth.
