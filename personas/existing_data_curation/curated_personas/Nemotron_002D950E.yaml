personas:
  professional: Steven Tate leverages their engineering expertise, data analysis acumen, and agile project management to orchestrate community art‑tech workshops, drawing on their calm resilience and gregarious
    speaking style to bridge technical and creative audiences, and they thrive on turning complex data into accessible experiences.
  sports: Steven Tate spends spring mornings jogging local 5K routes, summers kayaking the Hillsborough River and joining a rowing club, and stays a devoted fan of the Tampa Bay Buccaneers, Rays, and Lightning,
    while they blend a relaxed fitness routine with seasonal sports enthusiasm.
  arts: Steven Tate curates a personal collection of contemporary prints featuring works by Shepard Fairey, Yayoi Kusama, and Kerry James Marshall, regularly attends performances at the Straz Center and
    Tampa Theatre, and enjoys acoustic guitar sessions of John Mayer and folk duo The Milk Carton Kids; they let these varied influences shape their creative outlook.
  travel: Steven Tate prefers flexible, experience‑focused trips, often planning weekend drives to historic St. Augustine or a sailing getaway in the Florida Keys, while they balance modest family budget
    constraints with a desire for artistic immersion, and their bucket list includes a photography‑focused cultural tour of Kyoto and a design‑oriented visit to Barcelona.
  culinary: Steven Tate loves grilling, perfecting a smoked pork rib rub with brown sugar, paprika, and cumin, while also relishing fresh Florida seafood such as grouper ceviche with lime and cilantro,
    and they often whip up a quinoa‑black bean salad tossed with roasted sweet potatoes, feta, and a drizzle of lemon‑tahini dressing.
  core: Steven Tate is a relentlessly curious engineer‑artist who can charm a room at trivia night, meticulously plans community events, occasionally procrastinates on paperwork, and never seems to miss
    a sunset barbecue, while they keep a pocket notebook of random ideas for future projects.
background:
  cultural: Steven is a white American who grew up in a middle‑class family in the Southeast, with deep roots in the Tampa Bay region. His upbringing reflected Southern hospitality, a strong emphasis on
    education, and an appreciation for community involvement. He identifies with the cultural mix of Florida’s coastal lifestyle—outdoor recreation, diverse culinary traditions, and a lively arts scene—while
    also valuing traditional family and civic responsibilities. His family background includes Irish and English ancestry, and he participates in local festivals, church gatherings, and volunteer activities
    that celebrate the region’s multicultural fabric.
