personas:
  professional: Hector Negrin, a 46‑year‑old veteran landscaper, blends two decades of hands‑on design expertise with a curiosity for eco‑innovations, leading crews in Portland and they are actively pursuing
    LCT certification while laying groundwork for a community‑focused green business.
  sports: Hector Negrin enjoys weekend hikes along the Columbia River Gorge, jogs with the Portland Trail Runners group, plays casual soccer in a community league, and they cheer for the Portland Timbers
    and Trail Blazers during the seasons.
  arts: Hector Negrin captures seasonal textures in the Columbia River Gorge with a Nikon D5600, cites Ansel Adams as a visual influence, strums acoustic renditions of Bob Dylan and Maggie Rogers at home,
    and they regularly join Portland street‑art tours featuring murals by local artists such as Steve Sponaugle.
  travel: Hector Negrin prefers low‑key, nature‑focused weekend getaways, planning trips that include the Oregon Coast, Crater Lake, and a recent road trip to British Columbia’s Okanagan Valley, while they
    dream of exploring the terraced gardens of Kyoto and the wilds of Patagonia.
  culinary: Hector Negrin experiments with family‑heritage dishes like tamales and mole, incorporating local salmon, wild mushrooms, and foraged sage, and they often finish meals with a squeeze of fresh
    lime and a drizzle of locally sourced honey.
  core: Hector Negrin, a 46‑year‑old eco‑landscape enthusiast, blends photography, guitar, and community gardening into a daily rhythm, but they habitually forget to stretch after long installs, leading
    to occasional back aches.
background:
  cultural: Hector’s Mexican heritage is a central thread in his identity, shaping his values of family, community, and respect for the land. He grew up speaking Spanish at home, celebrating Día de los
    Muertos with colorful altars that often feature native plants, and learning heirloom gardening techniques from his grandparents. Relocating to Portland introduced him to the Pacific Northwest’s rich
    Indigenous plant traditions, which he now blends with Mexican horticultural knowledge in his designs. He stays connected to his cultural roots through local Mexican festivals, cooking gatherings, and
    bilingual mentorship programs that support other Mexican‑American workers in the landscaping industry.
attributes:
  skills: '[''Landscape Design'', ''Plant Identification'', ''Irrigation System Installation'', ''Equipment Maintenance'', ''Sustainable Gardening Practices'', ''Team Leadership'', ''Project Planning'',
    ''Community Outreach'', ''Native Plant Restoration'', ''Organic Pest Management'']'
  hobbies: '[''Nature Photography'', ''Hiking'', ''Guitar Playing'', ''Mexican Cooking'', ''Community Gardening'', ''Street Art Exploration'', ''Woodworking'', ''Reading horticulture literature'', ''Attending
    art exhibitions'', ''Volunteering at local shelters'']'
  career_goals: Looking ahead, Hector aspires to transition from hands‑on groundskeeping to a supervisory and entrepreneurial role. He plans to earn a Landscape Industry Certified Technician (LCT) credential
    and eventually launch his own eco‑friendly landscaping firm that emphasizes community‑based projects, such as neighborhood garden spaces and public art‑integrated greenways. A core ambition is to mentor
    at‑risk youth and immigrant newcomers, offering training pathways into green‑job careers, while continuing to champion culturally inclusive design that weaves Mexican horticultural motifs into Portland’s
    urban fabric.
