personas:
  professional: Aida Flores, a 21‑year‑old emerging special‑education teacher, blends meticulous lesson‑plan organization, bilingual communication, and a vibrant art‑centered pedagogy to craft individualized
    programs for diverse learners, and they assertively advocate for resources within multidisciplinary teams.
  sports: Aida Flores stays active by hiking with the Hill Country Trail Club during spring and fall, practicing yoga three times weekly at Serenity Studio, and cheering on the San Antonio Spurs while occasionally
    joining a local Latin‑dance fitness class for cardio, and they relish the social boost of group workouts.
  arts: Aida Flores explores creative expression by painting San Antonio cityscapes inspired by the bold colors of Diego Rivera, studying works at the San Antonio Museum of Art and the McNay, listening
    to Latin legends like Celia Cruz while dancing, and drawing artistic inspiration from contemporary muralist Okuda San Miguel, and they constantly experiment with new techniques in their free time.
  travel: Aida Flores prefers carefully planned weekend getaways, having trekked the Hill Country and visited the vibrant streets of Mexico City on a student exchange, while dreaming of a summer art‑focused
    trip to Barcelona’s Gothic Quarter, all balanced against a modest travel fund, and they often map routes with a detailed notebook before each adventure.
  culinary: Aida Flores, an adept home cook, frequently prepares family‑style chicken enchiladas with homemade salsa verde, fragrant cilantro‑lime rice, and spiced churros for dessert, while also experimenting
    with fresh seafood ceviche using lime, jalapeño, and avocado, and they keep a handwritten recipe journal to track flavor tweaks.
  core: Aida Flores is a detail‑driven art‑loving future educator who balances meticulous lesson planning with spontaneous watercolor sketches, hoards extra paint tubes for “just in case” projects, stays
    up late reading contemporary novels, and they occasionally forget to water their houseplants.
background:
  cultural: Aida is a second‑generation Latina raised in San Antonio’s vibrant Hispanic community. Fluent in both English and Spanish, she grew up celebrating traditions such as Día de los Muertos, quinceañeras,
    and local festivals like Fiesta San Antonio. Her family places strong emphasis on close intergenerational bonds, community service, and preserving cultural heritage through music, dance, and food. These
    influences shape her teaching philosophy, prompting her to incorporate bilingual resources, culturally relevant art, and community‑engaged projects that reflect the values and experiences of the Latino
    families she serves.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Differentiated instruction'', ''Behavioral intervention planning'', ''Assistive technology utilization'', ''Bilingual communication
    (English-Spanish)'', ''Collaborative team facilitation'', ''Data collection and progress monitoring'', ''Art integration in curriculum'', ''Classroom organization and lesson planning'', ''Parent and
    community outreach'']'
  hobbies: '[''Painting and sketching'', ''Art therapy workshops'', ''Visiting museums and galleries'', ''Yoga'', ''Latin dance (salsa, folklorico)'', ''Cooking traditional Latino dishes'', ''Reading contemporary
    fiction and educational psychology'', ''Hiking in Hill Country'', ''Volunteer tutoring for children with disabilities'']'
  career_goals: Aida aims to obtain full certification as a special education teacher and later pursue a Master’s degree in Special Education with a focus on inclusive arts education. She hopes to become
    a lead inclusion specialist in her school district, designing culturally responsive programs that blend visual arts and therapeutic strategies for Latino students with disabilities. Long‑term, she envisions
    establishing a community outreach center that offers art‑based support services and advocacy training for families navigating the special‑education system.
