  career_goals: Driven by her competitive nature, Minda aims to advance to a senior management analyst position within the next three years, followed by a managerial role overseeing performance‑improvement
    initiatives for a regional corporation or government agency. She plans to earn a Project Management Professional (PMP) certification and pursue a master's degree in Business Analytics to deepen her
    technical expertise. Ultimately, she envisions leading a cross‑functional analytics team as a Director of Analytics, where she can shape data‑informed strategies that improve operational efficiency
    and community outcomes. Minda also hopes to mentor emerging Black women in STEM, building a supportive network within Broward County.
