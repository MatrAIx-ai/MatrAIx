personas:
  professional: Data-driven analyst Minda Preston leverages Python, R, and Tableau to turn large-scale datasets into actionable insights, while methodically charting a path toward a senior management analyst
    role, PMP certification, and ultimately directing a cross-functional analytics team.
  sports: Minda Preston trains for local 5K races, practices yoga thrice weekly at a downtown studio, supports the Miami Heat, and captains a community running club that meets at Hollywood Beach each Saturday.
  arts: Minda Preston finds creative respite in attending spoken-word nights at the Broward Center, listening to Fleetwood Mac and Maya Angelou’s poetry, while weekly chess sessions serve as her strategic
    art form.
  travel: Minda Preston plans her getaways with spreadsheet precision, favoring weekend escapes to the Florida Keys, a yearly cultural immersion trip to the Dominican Republic, and occasional eco-adventures
    in Costa Rica, balancing structured itineraries with spontaneous beach walks.
  culinary: Minda Preston channels her disciplined creativity into cooking, mastering jerk chicken with scotch bonnet peppers, mofongo with plantains, and experimenting with spice blends while meal-prepping
    healthy lunches for her workweek.
  core: Minda Preston blends analytical rigor, competitive drive, and a love for disciplined routines with occasional coffee-induced splurges and a relentless quest for personal improvement.
background:
  cultural: As a Black woman raised in the multicultural environment of Broward County, Minda’s cultural identity blends African‑American traditions with the vibrant Caribbean influences common in South
    Florida. Family gatherings feature soulful R&B, hip‑hop, and reggae music, and meals often showcase dishes from Jamaican, Haitian, and Trinidadian cuisines, reflecting her parents’ Caribbean roots.
    Growing up near the beach and diverse neighborhoods, she participates in local events like the Broward Caribbean Festival, which reinforces a sense of community pride. Her involvement in church and
    mentorship programs highlights a commitment to collective uplift, while her professional ambition is informed by a desire to serve as a role model for other Black professionals in analytics.
