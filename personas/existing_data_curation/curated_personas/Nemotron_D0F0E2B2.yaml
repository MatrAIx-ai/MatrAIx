  career_goals: George envisions a future where he can combine his love for the ocean, his practical mindset, and his sociable nature. His primary ambition is to become a professional lifeguard for Myrtle
    Beach, where he can maintain routine safety protocols while interacting daily with beachgoers. He plans to earn certifications in water rescue and first aid, and eventually pursue a degree in marine
    environmental science or coastal management. In the longer term, he hopes to work as a coastal safety instructor or marine conservation advocate, using his communication skills to educate the community
    about ocean protection.
