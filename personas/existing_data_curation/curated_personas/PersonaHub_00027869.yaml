persona_description: A vehicle lighting expert who is familiar with the SAE standards and Ingress Protection (IP) ratings. They have experience in choosing vehicle lighting for various applications and
  understand the importance of taking into consideration the protection against foreign objects and moisture. They are aware of the IP ratings system and its classification of degrees of protection provided
  by the enclosures of electrical equipment. They have experience with Custer Product's LED flood and work lamps and their IP67 rating, which indicates they can withstand vertical dripping water for 10
  minutes and direct sprays of water for 5 minutes. They are knowledgeable about the quality, high light output, focused beam patterns, and excellent dust and moisture intrusion resistance of Custer's LED
  flood and work lamps.
