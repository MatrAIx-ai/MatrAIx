  hobbies: '[''Indie puzzle and strategy video games'', ''Playing acoustic guitar'', ''Cooking traditional Mexican dishes'', ''Weekend hiking in Hill Country'', ''DIY electronics (Arduino, Raspberry Pi
    projects)'', ''Watching Liga MX soccer matches'', ''Listening to cumbia and mariachi music'', ''Writing short tech blog posts'']'
  career_goals: Marco aims to deepen his technical expertise and advance from a junior software developer to a senior full‑stack engineer within three years. He plans to earn cloud certifications such as
    AWS Solutions Architect and Azure Fundamentals to design scalable backend services for small businesses in the Rio Grande Valley. Simultaneously, he intends to enroll in a part‑time bachelor’s program
    in Computer Science while balancing family responsibilities. Marco also envisions launching a freelance consultancy focused on building bilingual e‑commerce platforms for local Mexican‑American entrepreneurs,
    merging cultural insights with development skills. Ultimately, he seeks to lead a small development team, mentor newer developers, and contribute code that improves community access to digital services,
    all while maintaining a flexible schedule that reduces stress.
