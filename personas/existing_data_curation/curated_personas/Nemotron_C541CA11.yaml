personas:
  professional: Marco Ocasio is a junior full‑stack web developer who harnesses their bilingual fluency and hands‑on debugging mindset to craft pragmatic React and Node.js solutions for regional small businesses,
    blending curiosity for new frameworks with a flexible, sometimes disorganized workflow that thrives under Agile sprints.
  sports: Marco Ocasio is an avid weekend hiker who trails the Hill Country with a local outdoor club, follows Liga MX passionately—especially Tigres UANL—and supports Austin FC in the MLS, while they occasionally
    join pickup soccer games with friends to stay fit.
  arts: Marco Ocasio immerses themselves in music, rotating between classic cumbia from Celso Piña, mariachi performances by Mariachi Vargas de Tecalitlán, and contemporary Latin pop hits by Bad Bunny,
    and they enjoy indie puzzle game art narratives as a quiet form of creative relaxation.
  travel: Marco Ocasio favors low‑commitment road trips, regularly weekend‑escaping to nearby San Antonio and the Gulf Coast, dreams of exploring Oaxaca’s culinary scene, and balances travel plans with
    family responsibilities and a modest travel budget.
  culinary: Marco Ocasio loves to cook, expertly preparing tamales with masa and pork, simmering carnitas seasoned with cumin and orange, and experimenting with pozole using hominy and chipotle, while they
    proudly host communal meals that blend traditional flavors with a modern twist.
  core: Marco Ocasio blends technical curiosity with a laid‑back, sometimes scattered approach, constantly juggling code, family gatherings, and a lingering worry about whether they’re staying on track.
background:
  cultural: Marco grew up in San Juan, Hidalgo County, a town where Mexican and Texan cultural currents intersect. Bilingual from childhood, he speaks both Spanish and English fluently and participates
    in family gatherings that blend Mexican traditions—such as Día de los Muertos altars, tamale‑making parties, and quinceañera celebrations—with Southern Texas customs like barbecues and rodeo festivals.
    His Catholic upbringing informs his observance of religious holidays, yet he embraces the inclusive community spirit of the Rio Grande Valley, where neighbors exchange tips on gardening, cooking, and
    local entrepreneurship. Marco’s identity as a Mexican‑American shapes his worldview; he feels responsible for developing technology that serves bilingual users and small regional businesses, and he
    often volunteers at community coding workshops that teach Spanish‑speaking youth basic programming.
