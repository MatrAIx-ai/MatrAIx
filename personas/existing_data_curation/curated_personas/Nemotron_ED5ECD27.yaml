  career_goals: Alma aims to transition from being a skilled contractor to owning her own painting and paper‑hanging business within the next three years. She plans to obtain a state‑issued contractor’s
    license and pursue professional certifications such as the Painting and Decorating Institute (PDI) credential and Green Building (LEED) training to differentiate her services. Her long‑term ambition
    is to specialize in high‑end decorative painting and custom murals for residential and commercial clients in the Roanoke area, building a reputation for artistic quality and reliable service. She also
    hopes to mentor apprentices, expand her crew to balance workload, and achieve a stable income that supports her family while allowing her to allocate time for personal art projects.
