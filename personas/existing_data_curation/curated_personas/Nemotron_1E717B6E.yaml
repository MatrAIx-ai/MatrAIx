  career_goals: Giovanni aspires to transform his practical experience into a meaningful community role. He aims to secure a part‑time position as a volunteer coordinator for a neighborhood outreach organization
    in Bernalillo County, where he can design and lead regular social‑gathering events, mentor at‑risk youth, and help coordinate disaster‑response drills. He also dreams of launching a modest mobile food
    cart offering classic New Mexican snacks, leveraging his love for local flavors and his outgoing personality to build a friendly, flexible business that fits his desire for structure without rigid commitments.
