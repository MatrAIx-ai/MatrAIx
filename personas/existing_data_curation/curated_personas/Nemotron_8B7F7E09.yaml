personas:
  professional: Jason Worden, a 35‑year‑old master automotive service technician, leverages a methodical, competition‑driven mindset and a deep practical work ethic to excel at engine diagnostics, transmission
    overhauls, and electric‑vehicle system troubleshooting, while they mentor junior staff with the same disciplined reliability that their small‑town upbringing prized.
  sports: Jason Worden fuels their competitive spirit by racing drag cars at the local Oklahoma City Dragway, hitting the off‑road trails with the Oklahoma Trail Riders club in the spring, cheering for
    the Oklahoma City Thunder and the Oklahoma State Cowboys, and maintaining a routine of weight‑lifting and cardio at their hometown gym to stay ready for the demands of both the shop floor and the back‑country
    hunts.
  arts: Jason Worden channels their love of classic rock—spinning Led Zeppelin, AC DC, and The Allman Brothers—while they strum an acoustic guitar at church socials and local car‑shows, and they occasionally
    unwind watching western films starring Clint Eastwood that echo their community’s storytelling traditions.
  travel: Jason Worden prefers road‑trip adventures that blend work and play, charting routes from the Oklahoma plains to the Texas Hill Country for hunting lodges, scheduling weekend visits to Detroit’s
    North American International Auto Show, and planning a future drive up the historic Route 66 to visit family‑run farms in Kansas, all while they balance the costs against a modest family budget.
  culinary: Jason Worden enjoys hearty Midwestern fare—cooking brisket seasoned with smoked paprika, sweet‑potato casserole, and freshly caught catfish fried in cornmeal—while they pride themselves on a
    competent grill‑master skill set that lets them perfect a ribeye steak and a classic baked beans side dish at family gatherings.
  core: Jason Worden is a pragmatic yet curiosity‑driven auto guru who balances a disciplined work ethic with a penchant for high‑octane projects and a competitive edge, and they occasionally neglect personal
    downtime in favor of the next garage challenge.
background:
  cultural: Jason grew up in a small-town community in the Canadian County area of Oklahoma, where a practical work ethic and self‑reliance are highly valued. His family’s roots trace back to Midwestern
    farmers and oil‑field workers, giving him an appreciation for both agricultural and industrial traditions. He was raised in a Baptist household that emphasized community service, honesty, and perseverance.
    The regional culture—marked by a love of cars, outdoor recreation, and local sports—has shaped his identity, fostering a balance between respect for established methods and a curiosity for new automotive
    technologies.
attributes:
  skills: '[''Engine diagnostics'', ''Transmission repair'', ''Electronic control system troubleshooting'', ''ASE Certified (Engine, Brakes, Advanced Diesel)'', ''Hybrid and electric vehicle maintenance'',
    ''Technical service bulletin interpretation'', ''OBD‑II scanning'', ''Service documentation'', ''Workshop organization'', ''Mentoring junior technicians'']'
  hobbies: '[''Custom car building'', ''Drag racing'', ''Off‑road riding'', ''Acoustic guitar'', ''Hunting'', ''Fishing'', ''Automotive podcasts and magazines'', ''Car‑show competitions'']'
  career_goals: Jason aims to become a master technician and eventually transition into a shop manager role where he can shape service standards and mentor a larger team. He is working toward additional
    certifications in electric vehicle systems and hopes to open his own independent garage within the next five years, focusing on high‑performance and eco‑friendly vehicle services. He also envisions
    offering specialized training courses for local mechanics and participating in regional automotive competitions to showcase his shop’s capabilities.
