  career_goals: Fernando aims to deepen his expertise in credit risk management and become a senior analyst within the next three to five years. He plans to earn the Chartered Financial Analyst (CFA) designation
    and pursue advanced coursework in data science to enhance his analytical capabilities. Ultimately, he envisions a leadership role where he can shape inclusive lending policies and design financial education
    initiatives that blend creativity with practical guidance for Latino and immigrant communities. He is also interested in exploring opportunities in fintech startups that champion user-friendly, socially
    responsible financial products.
