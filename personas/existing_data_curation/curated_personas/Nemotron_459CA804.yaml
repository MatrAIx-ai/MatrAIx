  hobbies: '[''Volleyball'', ''Hip‑hop dance'', ''Competitive online gaming (FPS)'', ''Chess'', ''Running'', ''Meditation'', ''Journaling'', ''Cooking Chinese family recipes'']'
  career_goals: Yutong aims to complete the police academy and earn a promotion to detective within the next five years, focusing on the cyber‑crime and community outreach units. She is driven to develop
    specialized investigative skills, lead a community liaison team, and eventually influence policy on youth mental‑health support within the department. Her competitive nature pushes her to seek leadership
    training and earn commendations for excellence in both field operations and public service.
