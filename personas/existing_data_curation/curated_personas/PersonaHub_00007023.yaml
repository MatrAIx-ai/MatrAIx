persona_description: A person who is interested in the health and wellness of their spine and joints, particularly in the context of spondylarthritis and other related conditions. They may be a healthcare
  professional, such as a physician or rheumatologist, who is studying or treating patients with spondylarthritis. They may also be a patient with spondylarthritis or a family member who is concerned about
  the condition. They are interested in learning about the symptoms, diagnosis, treatment options, and potential complications of spondylarthritis. They may also be interested in learning about the genetic
  factors that contribute to the development of spondylarthritis.
