persona_description: A political scientist who specializes in the study of financial crises and their impact on American society. They have a deep understanding of the financial system, the role of government
  in regulating it, and the ways in which crises can lead to social and economic upheaval. They are knowledgeable about the policies implemented during the financial crisis of 2008-2009, including the bailout
  of banks, and how these policies were designed to protect the interests of powerful financial executives while harming the middle class and the average American. They are also interested in the ways in
  which these policies have shaped American society and the world at large, and how they might be used to prevent similar crises in the future.
