  hobbies: '[''Gardening'', ''Cooking traditional and fusion South Asian meals'', ''Reading biographies and historical non‑fiction'', ''Daily walks in local parks'', ''Playing chess'', ''Listening to classical
    Indian music and classic Bollywood soundtracks'', ''Volunteering at a food pantry'', ''Attending community cultural events'']'
  career_goals: Although retired, Anil’s ambitions focus on giving back and personal enrichment. He aims to mentor younger members of his cultural community, document his family’s oral history for future
    generations, continue learning digital tools to stay connected with grandchildren, volunteer regularly at the local senior center, and maintain his health through regular exercise and balanced nutrition.
    He also hopes to support his wife’s charitable initiatives and ensure his financial resources are sufficient for his family’s needs.
