personas:
  professional: Christina Baker, an aspiring freelance illustrator and content creator, leverages their knack for visual storytelling, basic photo editing, and social‑media curation to build a portfolio
    while juggling a part‑time gallery assistant gig that satisfies their desire for flexibility and community engagement, even though their tendency toward disorganization sometimes delays deadlines.
  sports: Christina Baker, an avid hiker of the San Gabriel Mountains and weekend yoga devotee at CorePower Yoga, cheers for the Los Angeles Lakers and the LA Galaxy, and occasionally joins the LA Road
    Runners club for group runs that satisfy their love for outdoor movement despite a generally relaxed approach to regular cardio.
  arts: Christina Baker, a dedicated explorer of Los Angeles’s art scene, visits galleries such as MAPS and The Geffen Contemporary, curates indie playlists featuring Phoebe Bridgers, Snail Mail, and Mitski,
    and participates in community art workshops where they experiment with sketching, digital illustration, and collaborative murals inspired by street artists like Shepard Fairey.
  travel: Christina Baker, who prefers spontaneous, budget‑friendly travel, often takes weekend getaways to Santa Barbara’s coastal trails, explores the murals of Mexico City on solo adventures, and dreams
    of attending Portland’s indie‑music festival, balancing wanderlust with the need to save for a future studio‑café.
  culinary: Christina Baker, an experimental home cook with intermediate skills, delights in preparing Korean bibimbap bowls, vegan jackfruit tacos, and avocado‑lime quinoa salads, savoring fresh ingredients
    like heirloom tomatoes, miso, and cilantro, while regularly browsing the LA Farmers Market for seasonal produce to inspire new recipe creations.
  core: Christina Baker, a 24‑year‑old art‑obsessed free spirit, channels their curiosity into a budding creative career while wrestling with anxiety, occasional disorganization, and a habit of splurging
    on aesthetic treats.
background:
  cultural: Christina comes from a white American background, with her family having settled in California for several generations. Growing up in West Covina, she experienced a suburban lifestyle blended
    with the cultural mosaic of Los Angeles County. While her household traditions are rooted in typical American holidays and family gatherings, she has been exposed to the vibrant multicultural influences
    of the region—especially Mexican, Asian, and other Latin American cultures—through local festivals, food, and community art events. This mix of a stable suburban upbringing and the diverse artistic
    milieu of Southern California shapes her worldview and creative interests.
