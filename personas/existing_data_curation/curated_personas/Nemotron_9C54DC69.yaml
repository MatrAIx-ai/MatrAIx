  hobbies: '[''Visiting Art Galleries'', ''Street Art Exploration'', ''Mood Board Creation'', ''Indie Music Listening'', ''Live Music Shows'', ''Hiking'', ''Experimental Cooking'', ''Yoga'', ''Journaling'',
