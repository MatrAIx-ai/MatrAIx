  career_goals: Christina aspires to turn her artistic passions into a sustainable, flexible career. She plans to build a portfolio of sketches, illustrations, and digital artwork that she can market as
    a freelance illustrator and content creator. To strengthen her technical abilities, she intends to enroll in a community‑college program in graphic design or digital media after obtaining her GED. She
    also hopes to secure part‑time work in a local gallery or museum where she can share her love of art with the community while maintaining a schedule that accommodates her need for spontaneity and self‑care.
    Long‑term, she dreams of eventually opening a small studio‑café that blends art exhibitions, workshops, and a relaxed community space.
