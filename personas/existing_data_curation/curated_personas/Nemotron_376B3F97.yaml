  career_goals: Nick aims to become a senior manager or partner at a regional CPA firm within the next five years, deepening his expertise in forensic accounting and data analytics. He plans to obtain his
    CPA license if not already, pursue additional certifications such as Certified Fraud Examiner (CFE), and lead high‑risk audit engagements. Long‑term, he aspires to transition into a CFO role or launch
    his own boutique advisory practice focused on compliance, technology integration, and financial strategy for small to midsize enterprises.
