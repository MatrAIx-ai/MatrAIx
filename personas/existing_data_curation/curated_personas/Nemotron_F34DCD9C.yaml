  career_goals: Chad aims to advance to a senior HR leadership role, such as HR Director or Vice President of Human Resources, where he can shape strategic workforce planning and drive a data‑informed employee
    experience. He plans to earn the SHRM‑SCP certification and mentor emerging HR professionals within his organization and the local community. Additionally, he seeks to spearhead a partnership with regional
    educational institutions to create apprenticeship pipelines, reinforcing his commitment to workforce development while maintaining a healthy work‑life balance for his family.
