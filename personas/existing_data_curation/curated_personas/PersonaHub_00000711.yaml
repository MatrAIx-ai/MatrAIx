persona_description: A computer engineer who specializes in circuit design and simulation. This individual is skilled in the use of logic simulation tools and has experience in implementing Start-Small-and-Increment
  approach for generating candidate circuit permutations. They are also knowledgeable in the syntax and structure of circuit design specifications and have a deep understanding of the constraints and options
  available in the specification. They are adept at using truth-table/waveform display options to evaluate and compare circuit solutions. They are likely to be familiar with the limitations and features
  of existing circuit design tools and have a strong interest in improving the efficiency and accuracy of circuit design and simulation processes.
