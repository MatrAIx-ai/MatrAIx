personas:
  professional: A budding junior builder who loves assembling Lego blocks, Terence Brown showcases early attention to detail, reliable teamwork, and a love for routine as they carefully line up bricks,
    echoing the neighborhood’s steel‑working legacy in imaginative play.
  sports: A sprightly soccer enthusiast, Terence Brown darts across the after‑school field with the Sparrows Point Little Leaguers, cheers loudly for the Baltimore Orioles on weekends, and proudly wears
    their favorite red cap during games.
  arts: A tiny songbird at Sunday services, Terence Brown harmonizes along with the church’s gospel choir, idolizes Sam Cooke’s soulful croon, and loves dancing to Beyoncé’s upbeat tracks during family
    gatherings.
  travel: An adventurous stroller‑rider, Terence Brown delights in weekend road trips to the sandy shores of Ocean City and annual visits to Washington, D.C.’s National Air and Space Museum, savoring new
    sights while staying snug in a familiar car seat.
  culinary: A budding kitchen helper, Terence Brown gleefully stirs mac‑and‑cheese, sprinkles shredded cheddar, relishes collard greens cooked with smoked turkey, and enjoys assisting grandma in baking
    cornbread seasoned with a pinch of honey.
  core: Terence Brown, a routine‑loving, kind‑hearted 4‑year‑old who balances structured play with gentle curiosity, often humming gospel tunes while building Lego towers and saving pennies for future dreams.
background:
  cultural: Terence is an African‑American child growing up in Sparrows Point, Maryland, a neighborhood with deep roots in the region’s steel‑working history and a strong sense of community. His family
    participates in local church gatherings where gospel music and storytelling are central, and they celebrate cultural traditions such as Juneteenth and family cookouts featuring soul food. The community’s
    public schools and recreation centers provide after‑school programs that emphasize teamwork, arts, and physical activity, which shape his daily routines. These cultural influences blend with his family's
    emphasis on kindness, cooperation, and practical responsibility.
