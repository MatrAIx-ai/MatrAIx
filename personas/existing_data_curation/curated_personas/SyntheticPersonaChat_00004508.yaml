data:
  user 1 personas: 'Marduk is my favorite band.

    I enjoy hiking on glaciers.

    I always seem to be losing things , most recently , my mind.

    Lutefisk is the best dish in the whole world.'
  user 2 personas: 'I like to make short films.

    My mother is a well known celebrity.

    I have traveled overseas many times.

    I have been on the tv news six times.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hey! How''s it going?

    User 1: Pretty good! I''m just chilling, watching TV. What about you?

    User 2: Not bad! I''m just getting ready to go out.

    User 1: Oh, where are you going?

    User 2: I''m going to see a movie with my friends.

    User 1: Nice! What movie are you seeing?

    User 2: We''re seeing the new Marvel movie.

    User 1: Oh, I''ve heard good things about that one.

    User 2: Yeah, me too! I''m excited to see it.

    User 1: Well, have fun!

    User 2: Thanks! You too!

    User 1: What do you do for fun?

    User 2: I like to make short films, travel, and read.

    User 1: Oh, that''s cool! I''ve always wanted to make a short film.

    User 2: It''s a lot of fun! You should give it a try.

    User 1: I just might! What kind of short films do you make?

    User 2: I make all kinds of short films, but I mostly like to make comedies.

    User 1: Oh, I love comedies! What''s your favorite short film that you''ve made?

    User 2: I''m not sure if I have a favorite, but I really like this one that I made about a guy who''s trying to get his girlfriend to break up with him.

    User 1: That sounds funny! I''d love to see it sometime.

    User 2: Yeah, I can show you it later.

    User 1: Thanks! What''s your favorite thing about traveling?

    User 2: I love the feeling of being in a new place and experiencing something different.

    User 1: I know what you mean! I love traveling too. What''s the coolest place you''ve ever been?

    User 2: I''ve been to a lot of cool places, but I think my favorite was Japan.

    User 1: Japan sounds awesome! I''ve always wanted to go there. What did you like about it?

    User 2: I loved the culture, the food, and the people.

    User 1: I can imagine! Japan looks like a beautiful country.

    User 2: It is! I''m so glad I got to go there.

    User 1: Me too! I hope you can go back again someday.

    User 2: Me too!'
