personas:
  professional: Petrona Canton is a budding robotics enthusiast who applies her methodical mindset to after-school club projects, meticulously following step-by-step schematics much like she does with LEGO
    builds, and dreams of becoming a future engineer.
  sports: Petrona Canton plays on the Little Strikers Soccer Club in her neighborhood, attending structured drills twice a week, and she roots for the nearby professional baseball team, the Kansas City
    Royals, while preferring the predictability of youth soccer over large crowds at stadiums.
  arts: Petrona Canton enjoys drawing deer, butterflies, and forest scenes inspired by the whimsical style of Eric Carle, frequently listening to child-friendly R&B artist Tori Kelly and gospel group Kirk
    Franklin as she sketches, and she eagerly watches animated adaptations of classic picture books for artistic inspiration.
  travel: Petrona Canton prefers well-planned family road trips with clear itineraries, such as the recent weekend visit to the Smithsonian National Air and Space Museum in Washington, D.C., and she dreams
    of exploring the Grand Canyon's rim where she can imagine the scale of nature she loves to draw.
  culinary: Petrona Canton loves helping her mother bake chocolate chip cookies, measuring out brown sugar and butter with a practiced hand, and she is also fond of assembling fruit kebabs with pineapple,
    grapes, and a drizzle of honey as a healthy snack.
  core: Petrona Canton is an eight-year-old detail-oriented planner who balances structured play, disciplined saving, and quiet curiosity, while occasionally forgetting to bring her allergy meds during
    spur-of-the-moment adventures.
background:
  cultural: Petrona’s cultural background is rooted in African American traditions within York County, Pennsylvania. She grows up in a close‑knit family that values church gatherings, storytelling, and
    shared meals featuring Southern‑inspired dishes like collard greens and cornbread. Her grandparents share stories of the Great Migration and the importance of education, while local Juneteenth celebrations
    and Sunday school reinforce a sense of community pride. Music ranging from gospel choirs to kid‑friendly R&B shapes her daily routine, and community events at the local recreation center provide structured
    activities that align with her preference for predictability and organization.
