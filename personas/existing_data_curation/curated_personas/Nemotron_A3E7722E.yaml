  career_goals: Petrona dreams of becoming a teacher who can design structured, supportive classrooms, or a wildlife biologist who studies animals using careful, methodical research. She also imagines herself
    as an astronaut, exploring space with precise planning and teamwork, and hopes to use her organizational strengths to lead projects that help others learn and protect the environment.
