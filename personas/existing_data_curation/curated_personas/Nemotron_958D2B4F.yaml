  professional: Jacob Carswell, a two‑year‑old budding engineer, applies curiosity with practicality by assembling LEGO bricks into functional‑looking contraptions while tolerating occasional messy spills,
    and they favor spontaneous play over rigid schedules.
  sports: Jacob Carswell, a two‑year‑old who attends the neighborhood YMCA’s Tiny Tots soccer class and proudly wears a miniature Manchester United jersey while sharing a snack with a teammate, yet they
    prefer short, unplanned dashes across the grass to regimented drills.
  arts: Jacob Carswell, a two‑year‑old who hums along to Raffi’s “Baby Beluga” and watches Sesame Street’s Elmo, often squeezes a crayon to doodle abstract shapes, showing a quiet yet imaginative artistic
    side that they share with a small circle of playmates.
  travel: Jacob Carswell, a two‑year‑old who delights in the sensory wonder of Monterey Bay Aquarium during family trips and dreams of seeing the Eiffel Tower someday, prefers relaxed, short‑duration getaways
    over long itineraries, and family budgeting often guides their travel experiences.
  culinary: Jacob Carswell, a two‑year‑old who delights in creamy macaroni and cheese sprinkled with peas and loves picking at banana slices, but they often create a mess by flinging peas onto the floor,
    reflecting a love for comfort foods with occasional adventurous bites.
  core: Jacob Carswell, a two‑year‑old explorer, balances bright curiosity with practical play, shuns rigid routines, prefers quiet corners and small groups, wrestles with frequent worries, and often turns
    simple tasks into messy, delightful experiments.
background:
  cultural: Jacob is raised in a white, middle‑class family in Lewes, Delaware, a coastal town with a strong sense of community and maritime heritage. Family traditions include weekend trips to the beach,
