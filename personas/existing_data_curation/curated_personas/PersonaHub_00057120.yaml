persona_description: A researcher in the field of prebiotics and gut microbiota, focusing on the role of pectins in promoting the growth and function of beneficial bacteria. This person is particularly
  interested in the potential of pectins from different sources as prebiotics for selective improvement of the gut microbiota, and has conducted research on the degradation capabilities of pectin by gram-negative
  and gut-born Firmicutes. They have published a paper on the prebiotic effect of pectin in FEMS Microbial Ecology, demonstrating the potential of pectins from different origins as prebiotics for selective
  improvement of the gut microbiota.
