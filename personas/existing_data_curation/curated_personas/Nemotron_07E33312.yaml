  career_goals: Patrick aims to transition into a senior leadership role within his health system, such as Director of Ambulatory Care, where he can shape policies that prioritize holistic, patient‑centered
    care. He is passionate about integrating the arts into medical practice, and he plans to develop a curriculum that uses visual and performing arts to enhance physician empathy and burnout resilience.
    He seeks to expand his research portfolio, focusing on outcomes of art‑based interventions in chronic disease management, and to publish findings in peer‑reviewed journals. Mentorship remains a core
    ambition; he intends to formalize a mentorship program for early‑career physicians and to increase community outreach by establishing free health clinics partnered with local cultural institutions.
    In the longer term, he envisions a semi‑retired phase dedicated to teaching, lecturing, and supporting arts‑health collaborations in the Boston area.
