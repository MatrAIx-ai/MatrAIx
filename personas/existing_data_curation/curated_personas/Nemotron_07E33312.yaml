personas:
  professional: Patrick Shafiei, a 55‑year‑old board‑certified internal‑medicine physician, blends rigorous data‑driven clinical practice with a passion for the arts, leading quality‑improvement projects
    while mentoring residents, and they design interdisciplinary curricula that harness visual and performing arts to boost empathy and curb burnout.
  sports: Patrick Shafiei plays competitive tennis at the Charles River Tennis Club, hikes the Blue Hills with the Boston Trailblazers group, follows the Boston Red Sox and Boston Celtics avidly, and they
    squeeze in weekend kayaking on the Charles when weather permits.
  arts: Patrick Shafiei frequents the Museum of Fine Arts, savors contemporary shows featuring artists like Mark Bradford and Kehinde Wiley, attends weekly jazz trio listening sessions featuring Miles Davis
    and John Coltrane recordings, and they participate in improv theater workshops at the Boston Playwrights’ Theatre to keep their creative thinking sharp.
  travel: Patrick Shafiei prefers meticulously planned trips, revisiting the historic streets of Florence and the coastal villages of Amalfi after a Boston weekend getaway to Martha's Vineyard, and they
    dream of exploring the cherry‑blossom festivals in Kyoto while balancing family commitments.
  culinary: Patrick Shafiei enjoys cooking lobster rolls and New England clam chowder alongside Mediterranean grilled branzino with lemon‑dill sauce, experiments with saffron risotto paired with a crisp
    Pinot Grigio, and they often finish meals with a drizzle of pomegranate molasses on roasted vegetables.
  core: Patrick Shafiei is a curious, organized physician who balances rigorous medical leadership with a love for jazz, tennis, and fine wine, yet they sometimes neglect their own health check‑ups in favor
    of mentoring and art‑infused research.
background:
  cultural: Patrick grew up in a middle‑class family in the Greater Boston area, where education, civic engagement, and appreciation for the arts are deeply valued. Although his surname reflects Persian
    ancestry, he identifies primarily as American with a blend of New England and Iranian cultural influences. He celebrates typical American holidays such as Thanksgiving and Christmas while also honoring
    Persian traditions like Nowruz, which he observes with his extended family. This dual heritage has fostered a respect for diverse perspectives and a curiosity for global ideas. His professional identity
    is rooted in the collaborative, evidence‑based ethos of the U.S. medical community, and he remains actively involved with local cultural institutions, community health initiatives, and neighborhood
    volunteer groups.
