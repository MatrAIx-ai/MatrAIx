    mentoring new hires'', ''Problem‑solving with pragmatic approach'', ''Stress management and emotional regulation'']'
  hobbies: '[''DIY home improvement'', ''Woodworking'', ''Gardening'', ''Hiking in the Hudson Valley'', ''Reading non‑fiction (productivity, psychology, technology)'', ''Playing chess'', ''Scale model building'',
    ''Listening to tech and entrepreneurship podcasts'', ''Volunteering at the local community center'', ''Nature photography'']'
  career_goals: Rahman aims to leverage his disciplined work ethic and competitive drive to advance into a supervisory role within the next two years, ideally as a Team Lead overseeing a group of customer
    service agents. He is focused on obtaining a Certified Customer Service Professional (CCSP) credential and completing a short‑term business operations certification to strengthen his managerial toolkit.
    Long‑term, he envisions moving into a call‑center operations manager position where he can shape staffing strategies, drive quality‑assurance programs, and implement data‑driven process enhancements
    across multiple shifts. His ambition also includes developing a mentorship framework that formalizes knowledge transfer for new hires, reinforcing the high‑performance culture he values. Though formal
    education was limited, Rahman is committed to lifelong learning and plans to earn a GED while pursuing leadership training opportunities.
