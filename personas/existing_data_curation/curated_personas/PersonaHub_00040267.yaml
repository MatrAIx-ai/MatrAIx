persona_description: A professional educator who is dedicated to promoting wildlife conservation and environmental education through zoo-based programs. They have experience collaborating with organizations
  to develop and evaluate educational programs that aim to enhance students' knowledge, connection to wildlife, and adoption of pro-environmental behaviors. They are skilled in conducting mixed-methods
  research, analyzing large data sets, and drawing insights from international literature on zoo, environmental, and visitor education. They are interested in enhancing the effectiveness of the FES Program
  by incorporating additional ZV resources, aligning the program with curriculum needs, and promoting deeper levels of engagement with local wildlife.
