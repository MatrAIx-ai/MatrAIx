persona_description: A military historian who specializes in the English Civil War and the events that occurred in Liverpool, including the Battle of Nantwich, Siege of Liverpool, and the restoration of
  the monarchy in 1660. Their interest lies in the tactical and strategic aspects of the conflict, including the roles of key figures like Colonel John Moore and Major-General Meldrum, and the impact of
  the conflict on the local community. They are also interested in the broader historical context of the English Civil War and its legacy, including the role of Liverpool as a center of the Roundhead movement
  and the subsequent restoration of the monarchy.
