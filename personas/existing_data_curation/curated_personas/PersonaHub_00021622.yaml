persona_description: A paleoecologist or paleohydrologist who is interested in understanding the relationship between river discharge and flood frequency and magnitude. This individual is likely to be interested
  in the study of paleoflood records in lakes and the use of sediment dynamics and material accumulated during known-magnitude floods to help model and mitigate future flood risk. They may also be interested
  in the broader implications of the study for understanding the effects of climate change on river systems and flood risk.
