persona_description: A geneticist who specializes in the study of gene expression and RNA processing, particularly in the role of RNA polymerase in the transcription of DNA to mRNA. They are skilled in
  the use of molecular biology techniques and tools to manipulate and study gene expression patterns. They have a deep understanding of the structure and function of the double helix and the role of the
  promoter and terminator sites in gene regulation. They are also knowledgeable about the different strands of DNA and their role in gene expression, as well as the importance of antisense RNA in gene regulation.
