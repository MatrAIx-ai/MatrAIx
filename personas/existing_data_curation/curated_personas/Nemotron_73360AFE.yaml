personas:
  professional: Elias Pletka is an emerging freelance illustrator who blends hand‑drawing, digital illustration, and basic Python scripts to streamline portfolio management, and they aim to collaborate
    with indie game studios while maintaining a flexible, solitary workflow.
  sports: Elias Pletka enjoys weekend bike rides along the Willamette River, follows the Portland Timbers (MLS) and the Portland Trail Blazers (NBA), and they belong to a low‑key community cycling club
    that meets for casual rides while they prefer gentle yoga sessions over intense gym workouts.
  arts: Elias Pletka immerses themselves in ambient soundscapes by Brian Eno and Aphex Twin while sketching urban vistas, draws inspiration from visual artists like Olafur Eliasson and Yayoi Kusama, and
    they actively contribute to online art forums such as ConceptArt.org, sharing speculative fiction‑inspired illustrations and experimental photography.
  travel: Elias Pletka prefers low‑key, self‑planned trips that balance quiet reflection with creative stimulus, having explored the misty streets of Kyoto and the rugged fjords of Iceland while dreaming
    of a future solo backpacking journey through the Scottish Highlands, all within a modest student budget.
  culinary: Elias Pletka, a modest home‑cook, loves crafting simple yet aesthetically pleasing meals like avocado toast topped with za’atar, sushi rolls seasoned with pickled ginger, and occasional vegan
    lentil soup spiced with turmeric, while they often experiment with plating techniques inspired by their love of visual art.
  core: Elias Pletka is a solitary, curiosity‑driven 19‑year‑old who fuses art, tech, and quiet introspection into a flexible freelance dream, occasionally stumbling into disorganization and late‑night
    creative marathons.
background:
  cultural: Elias grew up in a suburban neighborhood of Springfield, Ohio, within a middle‑class family that traces its roots to German‑American and Irish‑American ancestry. His upbringing was shaped by
    Midwestern values of modesty, community responsibility, and self‑reliance, while his public‑school education exposed him to a broad range of cultural experiences, from regional folk traditions to contemporary
    art events in the city. Although he identifies with mainstream American culture, he maintains a personal curiosity about global artistic movements and enjoys integrating diverse influences into his
    creative pursuits.
