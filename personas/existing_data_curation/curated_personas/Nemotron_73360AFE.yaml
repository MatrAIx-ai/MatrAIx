  career_goals: Elias aims to build a flexible, freelance‑oriented career that blends his artistic talents with technology. He plans to enroll in online graphic‑design courses and a community‑college certificate
    program in digital media, with the long‑term ambition of working as a freelance illustrator for indie game studios or publishing his own graphic stories. He also hopes to develop a modest online platform
    where he can share his artwork, reflective writing, and curated playlists, allowing him to earn income while preserving his preference for solitary, flexible work environments.
