persona_description: A scientist or researcher who is interested in radiation biology, cell biology, and radiation sensitivity. They are particularly interested in the clonogenic assay and its use in evaluating
  the radiation sensitivity of different cell lines. They are familiar with the use of various viability assays, including the In-Cell Western, DRAQ5, Sapphire, Cell Titer Glo, ATP, and primary cortical
  neurons. They have experience with manual counts and computerized viability assays and are familiar with the limitations and caveats of these assays. They are also interested in the use of natural antioxidant
  formulations in radiation sensitivity studies.
