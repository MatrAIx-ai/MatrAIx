personas:
  professional: Ricardo Rosche, a budding junior inventor, channels their vivid imagination and love for abstract concepts into creating elaborate LEGO contraptions, planning a future career in engineering
    while maintaining a surprisingly organized blueprint notebook.
  sports: Ricardo Rosche, an energetic member of the Little Stars Soccer Club, spends Saturday afternoons mastering dribbling drills, idolizes the professional soccer team FC Metro, and also enjoys splash
    time at the community pool where they practice freestyle kicks for fun.
  arts: Ricardo Rosche, a whimsical doodler enamored with the bold lines of Keith Haring and the playful tunes of Disney’s 'Let It Go' sung by Idina Menzel, spends evenings drawing colorful murals on their
    bedroom wall with washable markers, and proudly sings along at family karaoke nights.
  travel: Ricardo Rosche, a wide‑eyed explorer who has already trekked to the Magic Kingdom in Orlando, built a sandcastle on the Gulf Coast, and dreams of sailing to the ancient ruins of Machu Picchu to
    chase legends of hidden treasure, always planning trips with a detailed hand‑drawn map.
  culinary: Ricardo Rosche, a budding chef who loves the bright flavors of mango salsa, the comforting chew of spaghetti with marinara, and the tactile fun of kneading pizza dough, often helps their parents
    stir, sprinkle cheese, and taste‑test homemade cookies, though they sometimes sneak an extra handful of candy before dinner.
  core: Ricardo Rosche blends boundless curiosity, meticulous play, and a splash of childlike stubbornness into a uniquely inventive spirit that colors every activity.
background:
  cultural: Ricardo is growing up in the suburban community of Webster, New York, within a middle‑class white family with German and Irish ancestry. He experiences typical American cultural traditions,
    such as celebrating Thanksgiving, the Fourth of July, and Sunday family meals, and participates in local community events at the public library and park that emphasize play‑based learning and group
    interaction.
