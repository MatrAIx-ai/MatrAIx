  career_goals: Sydney aspires to a career that merges her curiosity for technology with a grounded, results‑oriented mindset. She aims to study computer science or user experience design at a university
    that values hands‑on projects, and ultimately hopes to work as a software developer or UX designer creating intuitive tools for everyday users. She is also interested in entrepreneurial side projects
    that allow her to maintain flexibility, independence, and the ability to focus on personal interests. While she values practical outcomes, she wants her work to challenge conventional approaches and
    incorporate innovative ideas.
