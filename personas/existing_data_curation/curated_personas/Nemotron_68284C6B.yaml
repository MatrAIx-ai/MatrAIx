  career_goals: Gloria aims to transition into a foreman role within the next two years, leveraging her reliability and organizational strengths to lead larger crews. She plans to earn a Certified Drywall
    Professional credential to formalize her expertise. Long‑term, she envisions launching a small family‑owned general‑contracting business that can provide stable, routine work for local clients while
    allowing her to mentor the next generation of tradespeople. Financial security for retirement and the ability to support her extended family remain central to her ambitions, as does maintaining a schedule
    that balances work with community involvement.
