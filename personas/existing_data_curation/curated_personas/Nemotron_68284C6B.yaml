personas:
  professional: Gloria Phillips, a seasoned drywall specialist with three decades of hands‑on experience in sheetrock installation and acoustic ceiling work, they blend meticulous blueprint reading, strict
    safety adherence, and a no‑nonsense, routine‑driven approach with a competitive edge that pushes crews toward on‑time, high‑quality finishes while mentoring apprentices with the same practical grit.
  sports: Gloria Phillips, a stalwart catcher for the South Dade Community Softball League, they pepper their weekends with early‑morning drills while keeping a loyal fan‑heart for the Miami Heat and Miami
    Marlins, often cheering at home games during the NBA and MLB seasons and joining neighborhood pick‑up basketball games when the weather allows.
  arts: Gloria Phillips, an avid choir member and salsa enthusiast, they immerse themselves in the soulful sounds of Anita Baker, the timeless grooves of Marvin Gaye, the uplifting hymns of Kirk Franklin,
    and the rhythmic reggae of Bob Marley, letting these musical pillars inspire their garden parties, weekend dance socials, and occasional karaoke renditions that blend gospel fervor with Caribbean flair.
  travel: Gloria Phillips, a lover of coastal getaways and cultural festivals, they favor well‑planned trips that combine family reunions with sunshine, splitting time between weekend stays in Key West,
    annual cruises to the Bahamas, a nostalgic visit to the Dominican Republic’s beach towns to honor Caribbean roots, and occasional pilgrimages to New Orleans for its jazz heritage, all balanced against
    retirement savings and caregiving duties.
  culinary: Gloria Phillips, a seasoned home cook who blends Southern soul‑food staples with Caribbean zest, they take pride in mastering dishes like jambalaya with smoked turkey and okra, jerk‑spiced grilled
    catfish topped with mango salsa, and collard greens simmered with Scotch bonnet peppers, seasoning each plate with a dash of patience and a secret family spice blend that includes allspice, cayenne,
    and fresh thyme.
  core: Gloria Phillips, a routine‑driven, community‑centered tradeswoman with a competitive streak, they balance unwavering work ethic and gospel‑filled social life while occasionally indulging in midnight
    coffee and a penchant for late‑night mystery novels.
background:
  cultural: Gloria is an African‑American woman who grew up in Miami’s vibrant black community, where Southern family traditions intersect with Caribbean and Latin influences. Her upbringing emphasized
    church, family gatherings, and a strong work ethic rooted in practicality and perseverance. She values the soulful music of R&B, gospel, and reggae that fill neighborhood celebrations, and she incorporates
    those rhythms into her cooking and social life. Fluent in English and comfortable with some Spanish, Gloria navigates a multicultural environment while preserving the traditions of her heritage—faith,
    community service, and a deep respect for elders.
