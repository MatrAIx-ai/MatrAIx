personas:
  professional: David Lee is a retired tradesman turned community elder who leverages his carpentry, auto maintenance, and desert gardening expertise to organize volunteer projects, mentor youth, and provide
    hands‑on problem‑solving for neighbors, all while balancing a practical curiosity with a compassionate, cooperative approach.
  sports: David Lee follows the Phoenix Suns avidly, watches weekend games on TV, participates in the Laveen Senior Walking Club for low‑impact exercise, enjoys seasonal fishing trips to Lake Pleasant,
    and occasionally joins a local pickup basketball game, balancing his love of team spirit with a practical, low‑intensity fitness routine.
  arts: David Lee enriches his leisure with gospel music from legends like Mahalia Jackson and contemporary groups like Kirk Franklin, attends community storytelling nights featuring historical biographies,
    and supports local cultural festivals showcasing artists such as the Arizona Theatre Company's productions, letting his compassionate nature find expression through shared artistic experiences.
  travel: David Lee prefers road‑trip adventures that blend family visits to his Midwestern roots with occasional desert escapes to Sedona's red rocks and a dream pilgrimage to New Orleans' music district,
    carefully planning itineraries around budget constraints while staying open to spontaneous detours that satisfy his curiosity and need for relaxation.
  culinary: David Lee delights in preparing classic soul‑food dishes like collard greens, smoked catfish, sweet potato pie, and cornbread spiced with jalapeño, while integrating fresh tomatoes, chilies,
    and herbs from his desert garden, showcasing a moderate cooking skill level that fuses Southern comfort with Southwestern zest.
  core: David Lee is a 60‑year‑old garden‑loving mentor who balances meticulous budgeting, health monitoring, and gospel‑filled evenings with a habit of worrying over details and a stubborn reluctance to
    fully embrace new digital tools.
background:
  cultural: David is an African‑American who grew up in the Midwest before moving to Arizona in his thirties for work, bringing with him the traditions of Black church life, family storytelling, and Southern
    cooking. In Laveen he has woven those cultural roots into the local tapestry, contributing to the small but vibrant Black community through church outreach, soul‑food gatherings, and intergenerational
    mentorship. His experiences reflect both the resilience of his heritage and the adaptive spirit needed to thrive in the desert Southwest.
attributes:
  skills: '[''Carpentry'', ''Basic Auto Repair'', ''Desert Gardening'', ''Community Mediation'', ''Mentorship'', ''Event Coordination'', ''Basic First Aid'', ''Soul-Food Cooking'', ''Budget Management'']'
  hobbies: '[''Desert gardening'', ''Gospel music listening'', ''Soul-Food cooking'', ''Fishing'', ''Woodworking'', ''Reading historical biographies'', ''Community storytelling'', ''Church activities'',
    ''Watching NBA games'']'
  career_goals: Although no longer in the formal workforce, David aims to deepen his role as a community elder by leading local volunteer programs, offering mentorship to at‑risk youth, and possibly launching
    a small home‑based gardening consultancy that shares sustainable practices with his neighborhood. He also seeks to improve his digital literacy so he can stay connected with family, help others navigate
    online resources, and document his life stories for future generations.
