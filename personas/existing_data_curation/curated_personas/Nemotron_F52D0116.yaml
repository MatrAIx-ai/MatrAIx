  hobbies: '[''Sketching and drawing'', ''Watercolor painting'', ''Digital illustration and animation'', ''Reading fantasy and poetry'', ''Creative writing and journaling'', ''Listening to Cuban jazz, salsa,
    and indie folk music'', ''Virtual museum tours and art documentaries'', ''Nature walks and botanical sketching'', ''Participating in school art club'', ''Basic game development with Scratch'']'
  career_goals: Vanessa envisions a future where she can combine her love for visual storytelling with her cultural roots. She aspires to study fine arts or graphic design at a university, eventually working
    as a professional illustrator or museum curator who highlights under-represented Latinx narratives. In the short term she hopes to earn a portfolio strong enough to win a scholarship for an arts summer
    program, develop a personal website to showcase her artwork, and volunteer at local cultural events in Lansing to gain curatorial experience. Long-term, she dreams of opening a small studio or gallery
    space where she can host community workshops that blend Cuban artistic traditions with contemporary digital media, fostering cross-cultural dialogue.
