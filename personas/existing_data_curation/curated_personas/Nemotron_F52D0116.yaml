personas:
  professional: Vanessa Fuentes is an aspiring digital illustrator who blends watercolor washes with simple animation, channeling their curiosity and disciplined organization into leading the middle‑school
    art club’s weekly sketch challenge while they quietly perfect their craft after school.
  sports: Vanessa Fuentes finds balance through brisk nature walks in nearby parks and a seasonal spot on the middle‑school soccer team, cheering on the Lansing Lancers while they prefer low‑impact fitness
    activities over high‑energy sports.
  arts: Vanessa Fuentes immerses themselves in the vibrant works of Frida Kahlo and Hayao Miyazaki, syncs their drawing sessions to the lively rhythms of Cuban jazz and indie folk playlists, and they draw
    inspiration from the rhythmic patterns of traditional son cubano, shaping a distinct, colorful visual style.
  travel: Vanessa Fuentes dreams of exploring the historic streets of Old Havana via virtual tours, hopes to soak up the sun‑kissed beaches of Puerto Rico, and enjoys annual family road trips to Michigan’s
    Upper Peninsula for quiet lake hikes, favoring meticulously planned itineraries that still leave room for spontaneous sketch stops.
  culinary: Vanessa Fuentes loves the aromatic comfort of arroz con pollo and the sweet crispness of fried plantains, often helping their family prepare black bean soup on weekends, while they experiment
    with mango‑pineapple smoothies and doodle new recipe ideas in their sketchbook.
  core: Vanessa Fuentes is a quietly curious teen whose solitary creativity flourishes through watercolor, animation, and rhythmic music, balancing disciplined saving habits with occasional snack indulgences
    while they navigate mild allergies and a love for nature walks.
background:
  cultural: Vanessa comes from a Cuban-American family that immigrated to the United States before she was born. Her parents maintain a bilingual household, speaking Spanish at home and celebrating Cuban
    cultural milestones such as Carnaval de La Habana and the traditional feast of Noche de San Juan. Family gatherings often feature dishes like arroz con pollo, plantains, and black bean soup, and music
    ranging from classic son cubano to contemporary Latin pop fills the kitchen. Growing up in Lansing, Michigan, Vanessa navigates a blend of her Cuban heritage and Midwestern surroundings, attending a
    local school with a modest Latinx community and participating in cultural events organized by the regional Cuban association. This bicultural environment enriches her artistic perspective, giving her
    a deep appreciation for vibrant colors, rhythmic patterns, and stories of migration that she incorporates into her artwork.
