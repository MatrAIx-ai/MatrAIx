  hobbies: '[''Basketball (playing and watching)'', ''Competitive video gaming (FIFA, NBA 2K, Call of Duty)'', ''DIY electronics repair (phones, consoles)'', ''Cooking traditional Puerto Rican dishes'',
    ''Listening to reggaeton and salsa music'', ''Walking in local parks and community spaces'']'
  career_goals: Gregorio plans to complete his secondary education—either by finishing high school or obtaining a GED—and then enroll in a vocational program for automotive or electronic repair at a local
    technical institute. He aspires to become a certified automotive technician, leveraging his mechanical aptitude into a stable, well‑paid career that values routine maintenance work. Simultaneously,
    his love of basketball drives him to seek a scholarship to play for his high‑school team, hoping a strong performance could earn him a place on a college squad or an apprenticeship with a community
    sports program. He envisions a future where he blends practical technical work with community mentorship, helping younger kids learn reliable skills.
