persona_description: A music enthusiast who is interested in microphone pickup patterns and their applications in recording and live performance. This person is knowledgeable about the Cardioid, Figure
  of Eight, and Omnidirectional patterns and their characteristics, as well as the special cases that require the use of these patterns. They are also familiar with the use of microphones with variable
  directionality switches and stereo pairs, and are aware of the proximity effect. This person is likely to be interested in recording and performing live music, and is looking for the best microphone for
  their specific needs.
