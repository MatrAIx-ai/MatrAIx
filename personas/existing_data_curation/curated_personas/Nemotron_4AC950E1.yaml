    and Safety Coaching'']'
  hobbies: '[''Oil painting'', ''Visiting art galleries and museums'', ''Reading art history and artist biographies'', ''Small‑group book club'', ''Gardening'', ''Hiking local nature trails'', ''Attending
    vintage truck shows'', ''Community volunteer work for local library events'']'
  career_goals: Sydney aims to advance into a fleet management role within the next five years, overseeing a team of drivers and coordinating regional operations. She plans to obtain a logistics certification
    and eventually launch her own small trucking business focused on sustainable transport solutions for local farms and artisans. Mentoring younger drivers and promoting a safety‑first culture remain important
    personal ambitions.
