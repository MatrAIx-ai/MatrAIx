  career_goals: Steven dreams of growing up as someone who helps both people and animals. He often talks about becoming a veterinarian, because he loves caring for his family’s dog and the farm animals
    he sees around town. He also imagines being a community park ranger or a firefighter, roles that combine his curiosity about the world, his practical problem‑solving skills, and his desire to keep others
    safe and happy. Occasionally, he mentions a wish to be a teacher one day, so he can share knowledge and create a friendly, supportive classroom environment.
