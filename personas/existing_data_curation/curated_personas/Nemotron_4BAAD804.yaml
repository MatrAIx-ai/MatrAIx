personas:
  professional: Steven Son is a budding naturalist and LEGO architect, seamlessly weaving his curiosity about rocks, leaves, and insects with his practical talent for organized building, while his compassionate
    nature drives him to share discoveries and creations with friends and family.
  sports: Steven Son dashes onto the neighborhood soccer field for after‑school matches with the Waukomis Wildcats Youth Soccer Club, roots for the Oklahoma Sooners football team in the fall, idolizes the
    Oklahoma City Thunder, and balances these passions with regular bike rides and nature hikes that satisfy both their energetic and reflective sides.
  arts: Steven Son fills sketchbooks with vibrant drawings of woodland critters inspired by Eric Carle’s illustrations and Dr. Seuss’s whimsical characters, while humming classic country tunes by Dolly Parton
    and Garth Brooks and occasionally dancing to fiddle reels at community barn dances.
  travel: Steven Son loves weekend road trips that blend family picnics at the Oklahoma City National Memorial with adventurous day‑long hikes in the Wichita Mountains, and they dream of exploring Yellowstone’s
    geysers and the Sahara’s dunes, though school schedules and parental budgeting keep most journeys within the state.
  culinary: Steven Son delights in the comforting taste of homemade chicken nuggets with honey‑mustard, savors buttery cornbread drizzled with honey, proudly helps whisk together a blueberry crumble using
    fresh berries from the family garden, yet they notoriously steal an extra slice of pizza when no one’s watching.
  core: Steven Son is a curious, organized six‑year‑old who balances nature exploration and LEGO building, often forgetting to tidy up toys but always ready to lend a hand, turning each day into a blend
    of adventure and gentle teamwork.
background:
  cultural: Steven grows up in Waukomis, a small, close‑knit community in Garfield County, Oklahoma. The town’s culture is shaped by a blend of agricultural traditions, local school events, and strong community
    ties often centered around church gatherings and county fairs. Family gatherings frequently involve potluck meals, country music, and storytelling about the region’s history. The local school emphasizes
    teamwork, respect for nature, and participation in sports like football and basketball, which influences Steven’s social interactions. While his primary cultural exposure is rural Midwestern, he also
    experiences a broader American cultural mix through media, school curricula, and occasional visits to nearby towns.
