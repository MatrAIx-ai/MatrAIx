  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Cooking Southern cuisine'', ''Attending blues and jazz concerts'', ''Church choir participation'', ''Volunteering with housing nonprofit'',
    ''Genealogy research'', ''Quilting'', ''Walking in local parks'']'
  career_goals: Bridget aims to become a senior broker and team leader within her local office, guiding a small group of agents through mentorship and training. She plans to earn the Certified Residential
    Specialist (CRS) designation and to expand her services into property management and affordable‑housing initiatives, helping first‑time homebuyers in underserved neighborhoods. Long‑term, she hopes
    to establish her own boutique real‑estate firm that focuses on sustainable development and community revitalization in North Little Rock.
