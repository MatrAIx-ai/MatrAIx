  career_goals: Teresa dreams of a future where she can blend art and technology. She aspires to become a digital animator or interactive game designer focused on educational content, allowing her to share
    creative ideas while using her structured planning skills. She hopes to win school art and science fairs, earn a scholarship for a STEM‑arts program, and later study visual arts or computer science
    at a university where she can lead collaborative projects that celebrate diverse cultures, including her Puerto Rican heritage.
