personas:
  professional: Teresa Rodriguez, an aspiring ten‑year‑old digital artist and junior robotics enthusiast, merges meticulous sketching with methodical LEGO programming, channeling their curiosity and competitive
    drive into school art and robotics club projects.
  sports: Teresa Rodriguez, a member of a local youth soccer team and an enthusiastic fan of the city’s basketball squad, balances structured practice with spontaneous salsa and reggaetón dance sessions
    at community festivals, approaching fitness with the same methodical competitiveness they bring to puzzles.
  arts: Teresa Rodriguez, a dedicated participant in their school’s art club, creates digital illustrations with Procreate, draws inspiration from Hayao Miyazaki and Billie Eilish’s visual storytelling,
    practices ukulele with songs by Jack Johnson, and channels salsa rhythms into kinetic sketches, reflecting a blend of curiosity and organized creativity.
  travel: Teresa Rodriguez enjoys family road trips to nearby science museums, dreams of visiting the Kennedy Space Center to watch a rocket launch, and balances careful itinerary planning with the spontaneous
    excitement of cultural festivals in neighboring towns, all while staying within a modest child’s allowance.
  culinary: Teresa Rodriguez helps prepare the family’s arroz con gandules, loves adding mango salsa to grilled chicken, and masterfully blends banana and coconut milk into a bright smoothie, showcasing
    a preference for fresh fruit and bold flavors while practicing a methodical approach to cooking.
  core: Teresa Rodriguez, a ten‑year‑old puzzle‑loving digital artist who balances methodical robotics projects with spirited salsa dancing, stays remarkably calm, competitively driven, and finds joy in
    both meticulous sketches and spontaneous family cooking.
background:
  cultural: Teresa comes from a proud Puerto Rican family that maintains strong ties to the island's traditions while living in Dallas, Texas. At home, Spanish is spoken alongside English, and she celebrates
    holidays such as Fiesta de San Juan and Día de la Independencia de Puerto Rico with music, dance, and food. Family gatherings often feature salsa, bomba, and plena rhythms, and recipes like pasteles,
    alcapurrias, and arroz con gandules are prepared together. Growing up in a vibrant Hispanic community in Dallas, Teresa also partakes in local cultural events, parades, and community festivals that
    showcase Latino artistry and heritage. This blend of island heritage and Texan environment nurtures her appreciation for multicultural expression and informs her desire to share her cultural roots through
    art and technology.
