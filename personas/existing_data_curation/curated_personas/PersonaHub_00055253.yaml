persona_description: A healthcare provider who specializes in the diagnosis and treatment of sexually transmitted infections and sexually transmitted diseases, particularly those affecting the reproductive
  organs. They are knowledgeable about the symptoms, causes, and treatments of epididymitis, gonorrhea, and chlamydia infections. They are skilled in performing physical exams, performing diagnostic tests,
  and prescribing appropriate antibiotics to treat the condition. They are also knowledgeable about the long-term complications of the condition and the importance of early diagnosis and treatment. They
  are aware of the importance of safe sex practices and the role of sexual partners in preventing the spread of sexually transmitted infections.
