persona_description: A sports medicine researcher who specializes in the analysis of high school and college wrestling injuries, particularly focusing on the incidence, type, and risk factors for injury.
  Their research interests include comparing the injury rates among high school and college wrestlers, characterizing the incidence and type of injuries, and comparing risk factors for injury in matches
  and practices. They have experience using data from the High School Reporting Information Online (RIOTM) and the NCAA Injury Surveillance System (ISS) to analyze injury rates and compare them between
  high school and college wrestlers. They are likely to be interested in studying the factors that contribute to the higher injury rates in matches compared to practices and the impact of factors such as
  age, gender, and wrestling style on injury risk.
