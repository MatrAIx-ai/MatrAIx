  career_goals: Carmelita aspires to translate her lifelong expertise into a more formal community leadership role. She aims to become a volunteer coordinator for a local nonprofit that serves the Dominican
    diaspora in Bergen County, using her organizational talents to expand outreach programs. Additionally, she dreams of launching a modest home‑based catering service that specializes in traditional Dominican
    dishes, allowing her to share her culinary heritage while generating supplemental income. Mentoring younger women and immigrants in budgeting, cooking, and cultural pride is also a key ambition, reflecting
    her competitive drive to excel and uplift others.
