  hobbies: '[''Backyard gardening'', ''Cooking farm-fresh meals'', ''Listening to R&B and jazz'', ''Basketball'', ''Volunteering at food pantry'', ''Reading self-help books'', ''Fishing'', ''Hiking'', ''Watching
    agricultural documentaries'']'
  career_goals: Motivated by a desire for both stability and the flexibility to serve his community, Bobby aims to transition into a leadership role that blends agricultural expertise with social impact.
    He plans to earn a certification in horticulture or sustainable agriculture within the next two years, and to become the manager of a community-garden initiative in Nassau County. His long-term ambition
    is to establish a cooperative urban farm that supplies fresh produce to local food banks and schools, while also providing job-training opportunities for unemployed youth. By securing a more predictable
    schedule and formal credentials, he hopes to improve his mental-health resilience and expand his capacity to help others.
