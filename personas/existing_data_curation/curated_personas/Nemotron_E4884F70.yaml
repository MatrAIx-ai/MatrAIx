  career_goals: Cassandra aims to transition into a senior leadership role within the financial services sector, such as Credit Services Manager or Director of Loan Operations, where she can shape policy,
    mentor junior counselors, and drive technology‑enabled process improvements. She plans to earn a Certified Financial Planner (CFP) designation and explore fintech product development to create more
    intuitive, art‑inspired financial education tools. Long‑term, she envisions launching her own consultancy that blends rigorous financial guidance with creative, community‑focused workshops, allowing
    her to maintain flexibility while making a broader impact on financial literacy in the San Diego region.
