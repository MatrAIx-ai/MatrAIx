personas:
  professional: Cassandra Wingard, a credit‑services strategist with ten years of loan origination and counseling experience, leverages her mastery of Excel, PowerBI, SQL, and Python to build data‑driven
    financial models while infusing her artistic curiosity into creative client‑education tools and flexible process improvements.
  sports: Cassandra Wingard fuels her fitness routine by hiking the coastal trails with the San Diego Hiking Club, practicing sunrise yoga on Pacific‑side beaches, playing weekly beach‑volleyball matches,
    and cheering on hometown teams like the San Diego Padres, Los Angeles Lakers, and San Diego Wave FC.
  arts: Cassandra Wingard immerses herself in Southern California's cultural scene by frequenting Balboa Park galleries, curating visual guides featuring emerging artists like Maya Liu, capturing coastal
    sunsets with a lens inspired by Ansel Adams and Chase Jarvis, dabbling in watercolor landscapes, and attending indie concerts at The Casbah to hear Tame Impala, Phoebe Bridgers, and local folk band
    The Morning Lights, while devouring contemporary fiction by Sally Rooney and Ocean Vuong.
  travel: Cassandra Wingard prefers spontaneous, experience‑rich trips that blend adventure and artistic inspiration—she’s trekked Joshua Tree and Big Sur, savored sushi in Tokyo, strolled lantern‑lit streets
    of Kyoto, captured sunsets in Santorini, and now dreams of hiking Iceland’s volcanic terrain and photographing Patagonia’s glaciers, all while budgeting with a dedicated travel fund that allows occasional
    luxury splurges.
  culinary: Cassandra Wingard, an intermediate home chef, delights in experimenting with global flavors—perfecting Southern‑California fish tacos with char‑grilled Mahi‑Mahi, cilantro, and lime crema, whipping
    up kimchi‑fried rice with gochujang and sesame oil, and crafting homemade ricotta‑filled ravioli tossed in truffle‑scented butter, all while sourcing fresh avocados, heirloom tomatoes, and miso paste
    at the local farmers market.
  core: Cassandra Wingard merges analytical rigor with an artist’s eye, balancing spreadsheets and watercolor palettes, yet often procrastinates filing tax forms until the deadline and forgets to refill
    her eye‑exam prescription.
background:
  cultural: Cassandra is a white American who grew up in a middle‑class suburban setting in Southern California. Her family emphasizes education, hard work, and community involvement, values that have guided
    her professional path. Living in Chula Vista—a city known for its vibrant Hispanic heritage and multicultural atmosphere—has exposed her to a rich tapestry of cultural traditions, from Mexican festivals
    to diverse culinary scenes. This environment has fostered her appreciation for varied experiences and inclusive perspectives, influencing both her personal interests in art and her professional commitment
    to empathetic, culturally aware financial counseling.
