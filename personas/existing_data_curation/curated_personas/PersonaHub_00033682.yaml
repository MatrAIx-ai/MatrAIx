persona_description: A teacher who conducts research on the construction of classroom tests based on indicators, specifically focusing on standard competences for seventh grade junior high school students.
  She aims to create a proper and good test for regular class teaching and learning. Her expertise lies in the mapping, syllabus, and lesson plans, and her goal is to develop the indicators into mapping,
  syllabus, and lesson plans. She is also interested in the Bloom's revised taxonomy, the level of validity, and the dependability of the constructed test items. Her research interests include item testing,
  classroom testing, and the development of good tests for students.
