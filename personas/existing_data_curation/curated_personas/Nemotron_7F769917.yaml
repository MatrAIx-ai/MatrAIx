personas:
  professional: Teresa Rivers, a budding creative technologist, blends their love for hip‑hop dance, soccer teamwork, and digital illustration to design interactive storytelling games in Scratch that they
    share on their school blog, while their spontaneous nature often leads them to chase new ideas at the expense of tight deadlines.
  sports: Teresa Rivers, a midfielder on the local youth soccer club, follows the US Women’s National Team and idolizes Alex Morgan, sparks energy on the field with their dance‑inspired footwork, and never
    misses a Friday night watching the Seattle Sounders on TV, though they sometimes skip strength‑training sessions because of a dislike for routine.
  arts: Teresa Rivers, a digital illustrator inspired by Studio Ghibli and contemporary street artists like Banksy, spends weekends sketching fan‑art of their favorite YA characters such as the protagonist
    of The Hate U‑Give, choreographs short hip‑hop routines to Billie Eilish tracks, and they write short stories in the voice of John Green, channeling their compassionate side into community‑focused narratives.
  travel: Teresa Rivers, an adventure‑loving teen, has road‑tripped to the Grand Canyon with their family, dreams of a cultural exchange summer in Kyoto to study traditional Japanese dance, and they favour
    spontaneous weekend getaways to nearby beaches over meticulously planned vacations, often budgeting their allowance to fund these trips.
  culinary: Teresa Rivers, an enthusiastic home cook, swears by homemade tacos al pastor with pineapple and cilantro, experiments with rainbow macaroni and cheese for their friends, and they can flawlessly
    bake chocolate chip cupcakes topped with sprinkles, though they sometimes over‑salts their soccer snack packs.
  core: Teresa Rivers, a high‑energy teen who fuses dance, soccer, and digital art into creative projects, impulsively spends on fun but they save for big goals, stays health‑conscious while occasionally
    forgetting sunscreen, and they thrive on community‑driven experiences that blend compassion with a love for spontaneity.
background:
  cultural: Teresa is a Black teenager raised in Bryn Mawr, a suburb of Philadelphia with a close‑knit African‑American community. Her family emphasizes education, resilience, and cultural pride, and she
    participates in the local Black church where gospel music and community service are central. Celebrations of Juneteenth, Kwanzaa, and Black History Month are woven into her family life, shaping her
    awareness of African‑American heritage. Teresa enjoys listening to R&B, hip‑hop, and neo‑soul, incorporating these rhythms into her dance, while her parents encourage her to explore both the cultural
    traditions of their Southern roots and the progressive opportunities offered by the diverse suburban environment, fostering a balanced sense of identity.
