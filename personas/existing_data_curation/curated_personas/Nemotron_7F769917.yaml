  career_goals: Teresa aims to blend her compassion with her curiosity for science and community wellbeing; in the short term she plans to become student council president and launch a peer‑mentorship program
    at school, while in the longer term she envisions studying public health or nursing to focus on adolescent mental health and health education. She hopes to work as a community health advocate or youth
    program coordinator, using her communication talents and tech‑savvy to develop workshops that empower teenagers in underserved neighborhoods, and she also dreams of establishing an after‑school coding
    club to introduce peers to digital creativity.
