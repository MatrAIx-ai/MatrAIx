personas:
  professional: Liz Jocelyn, a meticulous pharmacy technician in the DFW metroplex, blends rigorous drug‑interaction analysis and sterile compounding expertise with imaginative bilingual patient‑education
    graphics, and they are charting a path toward a PharmD focused on psychiatric and community care while pioneering art‑infused wellness programs.
  sports: Liz Jocelyn, a yoga‑enthusiast who joins the local DFW Runners club for weekend trail runs and attends Dallas Mavericks games with friends, also follows the Dallas Cowboys and supports FC Dallas,
    blending low‑impact workouts with occasional pickup soccer to stay fit.
  arts: Liz Jocelyn, an avid watercolorist and digital illustrator, draws inspiration from Frida Kahlo’s emotive portraits and the surreal soundscapes of Björk, regularly showcases work at the Klyde Warren
    Park Art Bridge, and participates in book clubs discussing N.K. Jemisin’s speculative fiction and Haruki Murakami’s philosophical novels.
  travel: Liz Jocelyn, who favors purposeful travel over superficial sightseeing, has visited Oaxaca for its Day of the Dead celebrations, explored the colonial streets of Guanajuato, trekked the desert
    landscapes of Sedona, attended art fairs in Austin, and dreams of a literary pilgrimage to Dublin’s James Joyce Centre.
  culinary: Liz Jocelyn, a home cook who experiments with mole poblano layered with dark chocolate and chilhuacle peppers while perfecting hand‑made corn tamales infused with epazote and fresh cilantro
    from her herb garden, also enjoys crafting refreshing agua de jamaica and pairing dishes with artisanal craft beers.
  core: Liz Jocelyn, a 29‑year‑old bilingual pharmacy technician turned aspiring pharmacist, fuses scientific precision with artistic imagination, channels anxiety into yoga and sketching, and dreams of
    a community pharmacy that doubles as a cultural wellness hub.
background:
  cultural: Liz is a first-generation Mexican-American raised in the Dallas-Fort Worth metroplex. Her family maintains strong ties to Mexican traditions such as Día de los Muertos, quinceañeras, and weekend
    gatherings featuring homemade tamales and salsa. Bilingualism is a daily practice, and she often bridges cultural concepts of traditional herbal remedies with modern pharmaceutical knowledge. Growing
    up in a close-knit, familismo-oriented household instilled a deep sense of community responsibility, which she carries into her patient care. The blend of Catholic heritage and a contemporary, secular
    outlook informs her appreciation for ritual, symbolism, and artistic expression, enriching both her personal identity and professional ethos.
attributes:
  skills: '[''Prescription processing'', ''Medication compounding (sterile & non-sterile)'', ''Drug interaction analysis'', ''Inventory management'', ''Pharmacy management software (e.g., PioneerRX, QS/1)'',
    ''Dosage calculations'', ''Analytical thinking'', ''Bilingual communication (Spanish/English)'', ''Patient counseling'', ''Creative educational material design'', ''Attention to detail'', ''Regulatory
    compliance'', ''Basic research methods'', ''Digital illustration'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading speculative fiction'', ''Philosophy and neuroscience non-fiction'', ''Cooking modern Mexican cuisine'', ''Herb gardening'', ''Yoga'',
    ''Mindfulness meditation'', ''Journaling'', ''Small-group book club participation'', ''Visiting local art galleries'', ''Volunteering at mental-health outreach (art therapy)'']'
  career_goals: She aims to transition from pharmacy technician to licensed pharmacist by enrolling in a PharmD program within the next two years, focusing on psychiatric and community pharmacy. Her long-term
    ambition is to lead a community pharmacy that integrates mental-health counseling, culturally sensitive medication education, and artistic wellness programs. She also envisions developing a mobile app
    or series of visual guides that simplify complex medication regimens for Spanish-speaking patients. By combining her scientific background with her love for art and abstract concepts, Liz hopes to become
    a thought leader in patient-centered pharmaceutical care while maintaining a balanced personal life.
