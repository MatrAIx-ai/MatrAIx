  career_goals: Casey aims to channel her experience and passion for the arts into a leadership role within her local cultural community. She hopes to serve on the board of the nearby art museum or heritage
    center, spearhead community art projects, and mentor young artists through workshops and after‑school programs. Additionally, she wants to develop a modest home‑based venture creating custom greeting
    cards and prints that blend her photography and artistic sensibility. Continuing education in art history or creative writing is also on her agenda, allowing her to deepen her knowledge and perhaps
    publish a memoir about her family's Cajun roots and Midwestern life.
