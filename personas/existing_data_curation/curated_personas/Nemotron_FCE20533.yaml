personas:
  professional: Casey Thibodeaux, a 51‑year‑old community arts coordinator, leverages their event‑planning acumen, budget‑management skills, and sharp visual documentation abilities to design inclusive
    cultural programs, while their curiosity and openness to unconventional ideas fuel innovative collaborations with local artists and nonprofits.
  sports: Casey Thibodeaux tracks the Cleveland Browns in football and the Cincinnati Reds in baseball, participates in the Columbus Trail Run Club’s spring long‑distance runs, and maintains a routine of
    daily walks and light resistance training that complement their gardening hobby, favoring low‑impact activities over high‑intensity sports.
  arts: Casey Thibodeaux immerses themselves in the visual arts by studying the paintings of Georgia O’Keeffe and Claude Monet, attends local theater productions of Lin‑Manuel Miranda’s 'Hamilton', and
    draws creative energy from the music of Nina Simone and Brandi Carlile, which together shape their mixed‑media watercolor works and community workshops.
  travel: Casey Thibodeaux enjoys weekend getaways to nearby Lake Erie islands and the historic streets of Cincinnati, has trekked through the cultural neighborhoods of New Orleans, and dreams of photographing
    the lavender fields of Provence and the fjords of New Zealand, preferring meticulously planned itineraries that leave room for spontaneous photo stops.
  culinary: Casey Thibodeaux delights in crafting a spiced quinoa‑and‑smoked sausage stew that marries bold peppery seasonings with hearty Midwestern comfort, alongside a creamy mushroom‑and‑leek soup prepared
    with classic technique, showcasing their intermediate cooking skills and love for flavor fusion.
  core: Casey Thibodeaux is a curious, organized art‑enthusiast who balances community leadership with spontaneous watercolor splashes, a habit of cataloguing every sunset photo, and occasional impulsive
    craft splurges.
background:
  cultural: Casey descends from a family of French‑Cajun origin that migrated from Louisiana to the Midwest several generations ago. While she was raised in North Olmsted, Ohio, her household preserved
    elements of Cajun culture—such as an appreciation for communal meals, storytelling, and a love of music—interwoven with the Midwestern values of neighborliness, hard work, and community service. She
    identifies with both her Southern French heritage and the broader American cultural tapestry of the region, celebrating local festivals, attending church services (reflecting a blend of Catholic and
    Protestant traditions), and maintaining strong family ties that emphasize hospitality and mutual support.
