persona_description: A geneticist who specializes in the study of population genetics, particularly the effects of migration on genetic diversity and evolutionary progress. Their research interests include,
  but are not limited to, the impact of migration on the spread of invasive species, the use of island models of evolution for understanding genetic isolation and the potential for genetic variation to
  be combined to produce potentially fitter offspring. They are also interested in the potential for migration to bring together diverse individuals to see what happens when they are combined and the potential
  for cross-over to result in offspring that are fitter than either of their parents.
