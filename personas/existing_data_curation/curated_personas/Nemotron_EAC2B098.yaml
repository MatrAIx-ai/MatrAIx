  hobbies: '[''Woodworking'', ''Vintage truck restoration'', ''Radio electronics tinkering'', ''Fishing'', ''Seasonal hunting'', ''Missouri college football fandom'', ''Puzzle solving (crosswords, Sudoku)'',
    ''Attending county fair events'']'
  career_goals: At 52, Joshua aims to advance into a supervisory role within the county office, such as Lead Administrative Clerk or Records Supervisor, where he can mentor newer staff and streamline office
    processes. He plans to enroll in a community‑college certificate program in office administration to formalize his knowledge and boost his competitiveness. His ambition includes earning recognition
    as the department’s most reliable record‑keeper, reducing his own stress by establishing clearer procedures, and eventually transitioning to a part‑time consultancy role that lets him share his practical
    expertise with small businesses in Franklin County.
