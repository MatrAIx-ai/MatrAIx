personas:
  professional: Joshua Lima, a 52‑year‑old office clerk in Franklin County, leverages his decades of clerical mastery and hands‑on curiosity to outpace peers in data accuracy while devising improvised filing
    hacks that keep the municipal office humming, even as they prepare for a supervisory leap.
  sports: Joshua Lima follows the Missouri Tigers football team religiously, roots for the St. Louis Cardinals in baseball, and spends weekend mornings angling at the community dock while occasionally joining
    the local hunting club for deer season, balancing low‑key competition with solitary sport as they unwind after a stressful week.
  arts: Joshua Lima enjoys tinkering with vintage radios and carving wooden figurines, often listening to classic country legends like Merle Haggard while sanding, and unwinds with crossword puzzles and
    Sudoku from the county‑fair newsletter, finding both the static hum and the puzzle grids comforting as they seek mental sharpness.
  travel: Joshua Lima prefers weekend road trips in their restored 1970 Chevrolet pickup, taking scenic routes to the Ozark River for fishing, dreaming of a future fishing lodge in Canada’s B.C. interior,
    but their budget‑conscious nature and spontaneous planning keep voyages modest and last‑minute.
  culinary: Joshua Lima favors hearty Midwestern fare—smoked ribs, pork stew, and corn‑bread—often cooking them on their backyard grill while experimenting with homemade wood‑smoked sauces, yet they rarely
    venture into fine dining, preferring a well‑worn skillet to a restaurant menu.
  core: Joshua Lima is a pragmatic tinkerer who balances meticulous record‑keeping with a love for lone fishing trips, a competitive edge at work, and a lingering worry that their disorganization sometimes
    undermines their grand plans.
background:
  cultural: Joshua’s cultural background is rooted in the Midwestern, small‑town ethos of Washington, Missouri. Raised in a working‑class family of likely German‑Ancestry, he internalized values of self‑reliance,
    hard work, and modesty. The community’s Protestant (mainly Methodist/Baptist) traditions and local customs—such as Friday night barn dances, Fourth of July parades, and church potlucks—have shaped his
    social outlook, even though his skeptical nature keeps him somewhat guarded. The region’s agricultural legacy and close‑knit neighborliness influence his practical approach to tasks and his appreciation
    for hands‑on hobbies, while his competitive streak reflects the local pride in sports and regional achievements.
