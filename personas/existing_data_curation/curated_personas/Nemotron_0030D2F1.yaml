  career_goals: Andrew aims to be promoted to lieutenant within the next five years, where he plans to lead a task force that integrates arts-based community policing initiatives to engage at-risk youth.
    He envisions establishing a formal mental-health crisis response unit within the department, drawing on his calm demeanor and crisis-intervention training. In the longer term, he hopes to transition
    into a training-academy instructor role, sharing his expertise in de-escalation, cultural liaison, and creative problem-solving with the next generation of officers. He also aspires to serve as a bridge
    between the police department and municipal cultural committees, ensuring public safety strategies are informed by community values and artistic expression.
