    activities'']'
  hobbies: '[''Watercolor painting'', ''Urban and nature photography'', ''Visiting art galleries and folk festivals'', ''Cooking traditional Mexican cuisine'', ''Reading historical fiction'', ''Listening
    to jazz and Mexican folk music'', ''Herb gardening'', ''Volunteering to teach art to children'']'
  career_goals: Carla aims to advance to a supervisory or security manager position at the local casino, where she can lead a team, implement comprehensive training that blends her educational expertise
    with security best practices, and influence policy on patron safety. She plans to obtain professional certifications such as the Certified Protection Professional (CPP) and eventually pursue a master's
    degree in security management. Long‑term, she envisions creating a community nonprofit that offers art workshops and safety education to at‑risk youth, merging her passions for security, education,
    and the arts.
