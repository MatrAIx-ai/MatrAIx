personas:
  professional: Carla Hernandez, a seasoned casino security specialist with a background in education, leverages real-time surveillance, threat assessment, and bilingual communication to de‑escalate incidents,
    while their curiosity drives innovative training ideas and their spontaneous nature sometimes makes deadline management a challenge.
  sports: Carla Hernandez follows the Dallas Cowboys and Houston Astros with fervor, plays pickup soccer on weekends at a local community field, occasionally joins a recreational tennis league at the city
    park, and uses early morning hikes in Hill Country to stay fit, though spontaneous road trips sometimes cause missed scheduled yoga classes.
  arts: Carla Hernandez, an avid watercolor portraitist, draws inspiration from Frida Kahlo’s vibrant self‑portraits and Georgia O'Keeffe’s desert palettes, captures street life through photography, attends
    gallery openings featuring folk art festivals, and playlists that swing between Miles Davis jazz and Lila Downs folk melodies shape her creative rhythm.
  travel: Carla Hernandez prefers loosely planned road trips that blend photography adventures with cultural immersion, having explored New Mexico’s Santa Fe, the historic colonial town of San Miguel, and
    the coastal seaside villages of the Yucatán peninsula, while they dream of hiking the Andes and attending a music festival in New Orleans.
  culinary: Carla Hernandez, an accomplished home cook, meticulously crafts mole with dark chocolate, pasilla chilies, almonds, and plantains, prepares tamales using masa and pork shoulder, tends a herb
    garden for fresh cilantro and oregano, and delights in sharing these dishes at community potlucks where they pair meals with craft sodas.
  core: Carla Hernandez blends sharp security instincts with a vibrant artistic soul, navigating life with curiosity, spontaneous flair, community‑focused compassion, and a penchant for mole‑infused evenings,
    all while wrestling with occasional disorganization.
background:
  cultural: Carla is a first‑generation Mexican‑American who grew up in a close‑knit immigrant family in Texas. Bilingual in Spanish and English, she celebrates Mexican traditions such as Día de los Muertos,
    quinceañeras, and family gatherings centered around home‑cooked meals. Her upbringing emphasized respect for elders, community solidarity, and a strong work ethic. These cultural values shape her compassionate
    yet assertive approach to both her professional duties and personal relationships, and they inspire her love for art, storytelling, and sharing her heritage through cooking and community initiatives.
attributes:
  skills: '[''CCTV monitoring and video analytics'', ''Threat assessment and incident response'', ''Conflict de‑escalation'', ''Security report writing'', ''Bilingual communication (English/Spanish)'',
