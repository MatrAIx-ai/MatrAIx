persona_description: A historian who specializes in the study of the history of Ireland and Scotland, particularly the kingdoms of Dál Riata and Alba. His research interests include the genealogy of the
  Cenél nGabraín, the origins of the royal house of Scotland, and the history of the kingdoms of Dál Riata and Alba. He is particularly knowledgeable about the genealogical segments of the Cenél nGabraín,
  the kingship of Dál Riata, and the royal house of Scotland. He is also skilled in using historical evidence and analyzing genealogies to piece together the history of these kingdoms.
