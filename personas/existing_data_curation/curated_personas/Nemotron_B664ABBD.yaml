personas:
  professional: Dolores Harris, an educational program manager in a Midwest school district, leverages her expertise in curriculum development, data‑driven decision‑making, and cross‑functional team leadership
    to embed arts‑based learning while her calm, organized, and sociable nature keeps workshops on schedule and morale high.
  sports: Dolores Harris stays active through weekly Zumba and yoga classes at the local YMCA, cheers season‑ticket games for the Indianapolis Colts and follows the Indiana Pacers, and occasionally joins
    a community running club for charity 5K events.
  arts: Dolores Harris immerses herself in the Indianapolis arts scene by attending the Indianapolis Symphony Orchestra, exploring murals by local artist Keith Baca, and quoting lyrics from Joni Mitchell
    while curating a monthly book‑and‑art discussion group with friends.
  travel: Dolores Harris prefers curated cultural trips, having explored the jazz streets of New Orleans during Mardi Gras, the Gaudí architecture of Barcelona, and the tea gardens of Kyoto, and she meticulously
    plans future visits to the Festival of Lights in Lyon while balancing a modest travel budget and her professional development schedule.
  culinary: Dolores Harris enjoys cooking comfort dishes like pork tenderloin with apple chutney, indulging in global flavors such as Ethiopian injera with berbere‑spiced stew, and perfecting avocado toast
    topped with heirloom tomatoes, feta, and a drizzle of smoked paprika, often sharing meals at potluck gatherings with her friends.
  core: Dolores Harris blends Midwestern reliability with artistic curiosity, turning disciplined project management into vibrant education initiatives, while occasionally over‑booking social events and
    forgetting dental appointments.
background:
  cultural: Dolores grew up in a middle‑class white family in the Indianapolis suburbs, where Midwestern values of reliability, community involvement, and modest ambition were emphasized. Her parents championed
    education and encouraged participation in school theater, local museum programs, and community service. This upbringing fostered a deep appreciation for both traditional American holidays and regional
    celebrations such as the Indianapolis 500 and the annual Festival of Lights. She maintains strong ties to her local church and volunteer networks, reflecting the collaborative spirit of Indiana’s cultural
    landscape.
attributes:
  skills: '[''Curriculum design'', ''Educational program development'', ''Team leadership'', ''Project management'', ''Data‑driven decision making'', ''Arts integration'', ''Strategic planning'', ''Process
