  career_goals: Alianet aims to secure a scholarship to a STEM‑focused high school and later pursue a bachelor's degree in engineering—preferably civil or environmental engineering—so he can design resilient
    infrastructure for coastal communities in Florida. He envisions becoming a licensed professional engineer who works on projects with clear, structured deliverables and measurable outcomes. He also hopes
    to develop software tools that aid in project planning and risk management, aligning his love for organized systems with a practical, impact‑driven career.
