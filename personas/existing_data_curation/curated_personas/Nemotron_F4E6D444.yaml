personas:
  professional: Alianet Stearns is a budding software hobbyist whose disciplined approach to Python and Scratch projects, combined with meticulous model‑kit construction, reflects a strong preference for
    routine, precision, and high standards, positioning them for a future in engineering.
  sports: Alianet Stearns maintains a low‑stress fitness routine centered on early‑morning laps with the Largo Community Swim Team, cheering for the Tampa Bay Buccaneers, Rays, and Lightning on game days
    while preferring solitary swim drills over organized team sports.
  arts: Alianet Stearns immerses in the detailed worlds of science‑fiction authors Isaac Asimov and Frank Herbert, finds strategic elegance in board‑game designer Reiner Knizia’s creations, and enjoys the
    ambient scores of Jeremy Soule during model‑kit builds, reflecting a solitary yet analytically rich artistic palate.
  travel: Alianet Stearns favors meticulously planned family road trips to nearby Gulf Coast gems like Clearwater Beach and the Everglades, while dreaming of a structured visit to Tokyo’s Akihabara district
    to explore its tech museums, always opting for low‑stress itineraries over spontaneous adventures.
  culinary: Alianet Stearns relishes the predictability of home‑cooked grilled cheese and spaghetti, while also savoring regional favorites such as shrimp tacos, key lime pie, and citrus‑infused salads,
    and they have a beginner‑level cooking ability that enables them to prep fresh fish dishes under parental guidance.
  core: Alianet Stearns is a methodical 13‑year‑old whose love of precise model kits, disciplined swimming, and anxiety‑driven bullet‑journaling shapes a quiet, high‑standard‑focused worldview, even as
    occasional late‑night video‑game sessions disrupt their sleep.
background:
  cultural: Alianet comes from a middle‑class white family rooted in the Tampa Bay region of Florida. Growing up in Largo, he experiences a blend of suburban life and the Gulf Coast’s coastal culture, attending
    local public schools and participating in community events such as the Pinellas County fairs and beach clean‑ups. His family emphasizes a practical work ethic, educational attainment, and traditional
    American values, while also embracing the laid‑back, hospitality‑oriented climate of the southeastern United States.
