personas:
  professional: Weldon Joseph, an aspiring junior engineer, channels his methodical curiosity into building intricate LEGO space missions and tinkering with basic code in Minecraft, where their competitive
    streak drives them to perfect every design and share step-by-step guides with friends.
  sports: Weldon Joseph, a member of the neighborhood youth basketball league, practices shooting drills at the local park, idolizes the Chicago Bulls and follows LeBron James's games, and during the winter
    months swaps the ball for indoor soccer with the elementary school's after-school club.
  arts: Weldon Joseph, a budding storyteller, devotes free time to crafting LEGO dioramas inspired by Percy Jackson, sings gospel hymns at the church youth group, and draws inspiration from artists like
    J.K. Rowling's fantasy worlds and the vibrant beats of Lizzo for creative energy.
  travel: Weldon Joseph, who loves weekend hikes, has explored the Rocky Mountain National Park's trailheads, dreams of visiting the Grand Canyon's rim, and prefers family-planned road trips that balance
    adventure with a reasonable allowance for souvenirs.
  culinary: Weldon Joseph, a self-proclaimed snack architect, can whip together a perfect PB&J sandwich, enjoys building LEGO-shaped fruit kebabs with strawberries, bananas, and grapes, and occasionally
    indulges in pepperoni pizza after a long Minecraft session.
  core: Weldon Joseph, a 9-year-old LEGO enthusiast with a competitive edge, balances curiosity and practicality while juggling basketball, science experiments, and a secret stash of comic books.
background:
  cultural: Weldon is an African‑American boy raised in Mayesville, South Carolina, where family and community traditions run deep. He grew up surrounded by the rich culinary aromas of Southern cooking—collard
    greens, cornbread, and peach cobbler—often shared during Sunday family gatherings. The local Baptist church plays a central role in his life, offering a space for music, storytelling, and mentorship.
    His family emphasizes pride in their heritage, passing down stories of resilience from his grandparents who migrated from the rural South during the Great Migration. Community events like the annual
    Lee County fair and local basketball tournaments provide opportunities to connect with peers and celebrate cultural expressions such as gospel music and spoken‑word poetry. These influences shape Weldon's
    sense of identity, grounding his aspirations in both personal ambition and a commitment to giving back to his close‑knit community.
