  career_goals: Inspired by his curiosity about how things work and his love of competition, Weldon dreams of becoming an engineer or astronaut who can design inventions that solve everyday problems, such
    as a solar‑powered bike. He also harbors a long‑term ambition to lead a robotics team at his middle school, combining his technical skills with his desire to be recognized for excellence. Occasionally,
    he imagines playing professional basketball and using the teamwork lessons from sports to inspire future community projects, like a neighborhood garden or STEM outreach for younger kids.
