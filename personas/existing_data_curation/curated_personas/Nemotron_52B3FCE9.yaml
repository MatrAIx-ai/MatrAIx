  hobbies: '[''Gardening'', ''Reading non-fiction'', ''Walking/hiking'', ''Cooking'', ''Photography'', ''Volunteering at community events'', ''Attending local art exhibitions'', ''Yoga'', ''Podcast listening'']'
  career_goals: At this stage, Priscilla aims to transition from frontline product promotion to a strategic consultancy role where she can design and oversee demonstration programs for sustainable and tech‑forward
    brands. She plans to create a freelance consulting practice that helps small and mid‑size companies develop practical, data‑driven demo strategies, incorporating virtual‑reality and remote‑presentation
    platforms. She also aspires to author a guidebook on effective product storytelling and to mentor the next generation of demonstrators through workshops at local community colleges. Her long‑term ambition
    is to leave a legacy of best‑practice standards that balance creative engagement with measurable sales outcomes, while maintaining a balanced work schedule that respects her need for personal time.
