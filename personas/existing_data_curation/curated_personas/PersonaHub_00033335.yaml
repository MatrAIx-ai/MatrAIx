persona_description: A renowned gender historian and professor at UC Santa Barbara, Patricia Cline Cohen, who has presented research on marriage inequality and reform in the decade preceding the American
  Civil War. Her research has been engaging and illuminating, and she has captured the attention of students and faculty with her presentation on Mary Gove Nichols and Thomas Low Nichols and their interaction
  with the idea of free love in the 1850s. Cohen's presentation has also challenged the notion that history is only valuable as a utilitarian mechanism for learning about today's life, emphasizing its ability
  to record the change that has occurred through time.
