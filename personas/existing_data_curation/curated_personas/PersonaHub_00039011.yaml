persona_description: A doctor who specializes in infectious diseases, particularly in the diagnosis and treatment of bloodstream infections. They are skilled in taking blood samples, performing culture
  tests, and interpreting results to determine the cause and severity of infections. They are knowledgeable in the use of antibiotics and other medications to treat bacterial and fungal infections, and
  they are skilled in managing severe cases of infections. They are also knowledgeable in the use of blood cultures to detect and treat serious infections, such as endocarditis and osteomyelitis. They are
  skilled in communicating with patients and their families to provide accurate and effective treatment plans.
