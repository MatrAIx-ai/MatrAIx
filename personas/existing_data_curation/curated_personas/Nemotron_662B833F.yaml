  hobbies: '[''Watercolor painting'', ''Oil painting'', ''Hiking in the Blue Ridge Mountains'', ''Nature photography'', ''Knitting'', ''Cooking seasonal meals'', ''Reading contemporary fiction'', ''Attending
    local folk music festivals'', ''Volunteer at community garden'']'
  career_goals: Georgia hopes to translate her love of art and community into a flexible, part‑time role that allows her to remain spontaneously creative while contributing to the cultural life of Hiawassee.
    She aims to become a freelance arts facilitator, organizing monthly workshops at the local library or community center, and to launch a modest online shop selling her own pottery and textile pieces.
    Over the next few years, she plans to enroll in a bachelor's program in arts administration or community development, enabling her to take on a more formal position as a cultural liaison for the town’s
    tourism board—an ambition that balances her desire for structured impact with the freedom to explore unconventional ideas.
