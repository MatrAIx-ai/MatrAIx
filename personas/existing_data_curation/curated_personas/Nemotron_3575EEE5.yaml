  hobbies: '[''Gardening'', ''Cooking Southern Cuisine'', ''Volunteer Work at Church'', ''Reading Historical Fiction'', ''Dog Walking'', ''Attending Community Festivals'', ''Vintage Home‑Decor Projects'',
    ''Watercolor Painting'']'
  career_goals: Brittany aims to transition from a solo broker to a small boutique brokerage, hiring and mentoring two to three new agents over the next three years. She plans to earn the Certified Residential
    Specialist (CRS) designation and become a recognized expert in senior‑downsize and first‑time‑homebuyer assistance in Hall County. Her long‑term ambition includes establishing a community housing advisory
    board to guide local development and ensuring a comfortable financial cushion for a relaxed retirement while continuing to serve her clients with personalized care.
