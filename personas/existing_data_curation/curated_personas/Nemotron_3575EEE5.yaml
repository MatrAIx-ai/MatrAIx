personas:
  professional: An experienced residential sales broker, Brittany Paxton blends three decades of Buford market expertise with a structured yet flexible client‑centered approach, mastering property valuation,
    market trend analysis, and empathetic negotiation while they occasionally let paperwork pile up due to a relaxed attitude toward strict deadlines.
  sports: An enthusiastic local sports fan, Brittany Paxton cheers for the Atlanta Braves and Falcons on game days, follows the Georgia Bulldogs football season with nostalgic pride, and they regularly
    walk the Pine Mountain trail with their border collie as part of the community walking club, occasionally joining a senior‑friendly pickleball group at the nearby senior center.
  arts: A lifelong creative enthusiast, Brittany Paxton immerses themselves in watercolor painting at the senior center, collects vintage home‑decor pieces inspired by mid‑century designers like Charles
    and Eames, reads Southern historical fiction by Pat Conroy and Margaret Mitchell, and they enjoy listening to Dolly Parton, the Gaither Vocal Band, and classic films starring Morgan Freeman during community
    festivals.
  travel: An adventurous yet budget‑conscious traveler, Brittany Paxton has explored the historic streets of Savannah and Charleston, the jazz‑filled alleys of New Orleans, and the scenic Blue Ridge Parkway,
    and they dream of a relaxed road‑trip through the Italian countryside while balancing travel costs with their retirement savings.
  culinary: A seasoned Southern cook, Brittany Paxton delights in perfecting fried chicken, shrimp and grits, peach cobbler, and a garden‑fresh tomato‑okra stew, skillfully blends home‑grown herbs like
    basil and dill with smoked paprika, and they love hosting family gatherings where the aroma of slow‑cooked collard greens fills the house.
  core: A warm‑hearted, structure‑loving yet pleasantly disorganized 61‑year‑old, Brittany Paxton balances a thriving real‑estate career, community service, gardening, and Southern cooking while they cherish
    quiet moments with their border collie and prioritize kindness over perfection.
background:
  cultural: Brittany was raised in suburban Atlanta and has spent the majority of her adult life in the Hall County region of North Georgia. Coming from a white, middle‑class Southern family, she grew up
    with the values of Southern hospitality, church involvement, and community service. Her cultural identity is shaped by the traditions of the American South, including a strong work ethic, an emphasis
    on family and neighborly support, and a deep appreciation for local customs such as Southern cuisine and church gatherings.
