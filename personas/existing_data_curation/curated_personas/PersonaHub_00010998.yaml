persona_description: An engineer and consultant who specializes in building codes, specifically focusing on the impact of hurricanes on coastal communities and the need for stricter regulations to protect
  against storm damage. This individual has worked with Miami-Dade County on building codes and understands the consequences of lax building regulations, particularly in regards to mobile homes and the
  need for stronger hurricane shutters or impact-resistant windows. This person is likely to be interested in the re-evaluation of building codes after Hurricane Charley and the potential opportunity to
  implement stricter standards for mobile homes and other structures.
