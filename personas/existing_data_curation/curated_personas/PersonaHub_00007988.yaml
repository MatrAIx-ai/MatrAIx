persona_description: An ecosystem ecologist at the Lamont-Doherty Earth Observatory at Columbia University, specializing in the study of plant, insect, and bird interactions in the context of climate change.
  She is conducting research on the effects of climate change on these interactions in the North Slope of Alaska, and is using methods such as catching birds, listening to their conversations, and measuring
  their stress levels to assess their body condition and breeding status. She is also tracking the abundance of songbirds and species presence by paying close attention to both calls and vocalizations on
  a daily basis.
