    gardens)'', ''Integrated pest management'']'
  hobbies: '[''Backyard gardening'', ''Heirloom vegetable cultivation'', ''Visiting art galleries and museums'', ''Birdwatching'', ''Nature photography'', ''Woodworking'', ''Fishing on the Chesapeake Bay'',
    ''Volunteer work at a community garden'', ''Historical site tours'', ''Reading about horticulture, landscape architecture, and art history'']'
  career_goals: Ian aims to become a senior grounds manager for a historic site in Yorktown, leveraging his passion for history and landscaping to preserve and enhance heritage gardens. He plans to earn
    the Certified Landscape Professional (CLP) credential and eventually launch his own boutique landscaping firm focused on sustainable, art‑infused outdoor spaces for private clients and community projects.
    Ian also hopes to mentor younger workers, advocate for environmentally responsible landscaping within local government, and develop a portfolio of signature projects that showcase native Virginia flora
    alongside public art installations.
