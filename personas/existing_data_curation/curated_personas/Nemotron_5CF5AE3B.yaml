personas:
  professional: Ian Stukes, a 52‑year‑old horticulture specialist with expertise in irrigation design, historic landscape preservation, and crew supervision, blends meticulous project planning with an open‑minded,
    art‑infused aesthetic to deliver sustainable garden installations for heritage sites.
  sports: Ian Stukes enjoys early‑morning jogs along the York River, follows the Washington Commanders and Norfolk Tides, plays casual softball with the community garden league, and they spend weekends
    fishing on the Chesapeake Bay, balancing social team play with solitary outdoor pursuits.
  arts: Ian Stukes spends afternoons at the Virginia Museum of Fine Arts, sketching garden layouts inspired by Monet’s water lilies and O’Keeffe’s desert blooms, and they collect sculptures by local artist
    John Kearney, integrating the pieces into their garden pathways.
  travel: Ian Stukes prefers low‑key road trips that blend history and horticulture, having toured Colonial Williamsburg, the gardens of Monticello, and the tea fields of Kyoto, and they daydream about
    a pilgrimage to the ancient olive groves of the Amalfi Coast.
  culinary: Ian Stukes cooks garden‑to‑table meals, favoring heirloom tomatoes, fresh basil, roasted beet salads, and their signature grilled trout with rosemary‑infused butter, and they garnish each plate
    with a drizzle of locally pressed olive oil, showcasing a love for Chesapeake seafood and seasonal ingredients.
  core: Ian Stukes is a garden‑obsessed historian who balances precise planning with spontaneous art, and they occasionally hoard rare seeds while forgetting to stretch after a day of digging.
background:
  cultural: Ian is a white American of English and Irish descent, raised in Virginia’s Tidewater region. His upbringing blends Southern hospitality with a strong respect for the area’s colonial history,
    especially Yorktown’s Revolutionary significance. He grew up in a working‑class family that valued hands‑on labor, land stewardship, and community involvement. Local traditions—such as church gatherings,
    town fairs, and preservation societies—have shaped his sense of belonging and his appreciation for both rural and coastal cultures. This background informs his commitment to maintaining historic landscapes,
    supporting community projects, and honoring the natural heritage of the Chesapeake Bay area.
attributes:
  skills: '[''Horticultural plant identification'', ''Soil health assessment'', ''Irrigation system design and maintenance'', ''Landscape design with artistic integration'', ''Groundskeeping equipment operation
