personas:
  professional: Alexandra Brown, a biomedical engineering graduate working as a medical imaging technologist in a Houston hospital, combines meticulous equipment maintenance with data-driven quality control,
    using Python and Excel to track MRI and CT performance while training new staff and ensuring HIPAA and Joint Commission compliance.
  sports: Alexandra Brown enjoys low‑impact fitness, taking daily walks around Hermann Park, joining a community yoga class on Tuesday evenings, and cheering on the Houston Astros, Houston Rockets, and
    Houston Dynamo while occasionally playing in a co‑ed softball league at a local recreation center.
  arts: Alexandra Brown unwinds by reading historical fiction from authors such as Hilary Mantel and Ken Follett, listening to classic country legends like George Strait and contemporary singer‑songwriter
    Brandi Carlile, and attending occasional performances at the Houston Ballet and the Alley Theatre, where they appreciate the storytelling in both dance and drama.
  travel: Alexandra Brown prefers short, well‑planned road trips to nearby destinations like San Antonio’s River Walk, New Orleans for its historic French Quarter, and Galveston for beach relaxation, while
    occasionally dreaming of a cultural immersion tour of Kyoto during cherry blossom season, balancing travel with their demanding hospital schedule and limited vacation days.
  culinary: Alexandra Brown delights in cooking Texan comfort dishes like chicken‑fried steak with creamy gravy, smoked brisket topped with a tangy mesquite BBQ sauce, and hearty chili topped with fresh
    cilantro from their balcony herb garden, often seasoning with smoked paprika, cumin, and garlic, and pairing meals with sweet tea or a chilled craft beer.
  core: Alexandra Brown blends a methodical, routine‑driven career in medical imaging with a quiet love for knitting scarves, solving crosswords, and perfecting Texan comfort food, while occasionally letting
    disorganization creep into their schedule and relying on their calm, cooperative nature to keep both work and home life running smoothly.
background:
  cultural: Alexandra is a white American who was raised in a suburban neighborhood of Houston, Texas. Her family emphasized hard work, practical self‑reliance, and traditional Southern hospitality. Growing
    up in a multicultural metropolis, she developed an appreciation for diverse perspectives while maintaining the core values of routine, reliability, and community service instilled by her upbringing.
    She celebrates regional traditions such as Texas Independence Day, enjoys local barbecues, and participates in small church gatherings. Her cultural identity blends Texan friendliness and neighborliness
    with a pragmatic, technically oriented mindset shaped by her STEM education and career in health technology.
attributes:
  skills: '[''Medical equipment operation (MRI, CT, X‑ray, ultrasound)'', ''Preventative maintenance and calibration'', ''Quality control and regulatory compliance'', ''Basic data analysis and reporting
