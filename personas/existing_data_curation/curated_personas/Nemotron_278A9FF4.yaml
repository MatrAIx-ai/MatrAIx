    training on SOPs'']'
  hobbies: '[''Reading historical fiction'', ''Herb balcony gardening'', ''Cooking Texan comfort meals'', ''Walking in Hermann Park'', ''Crossword puzzles and Sudoku'', ''Knitting scarves'', ''Volunteering
    at community health outreach events'', ''DIY electronics projects'']'
  career_goals: Alexandra aims to advance to a lead health technologist position within a major Houston hospital, obtaining advanced certifications such as ARRT MRI and ASCP Molecular Biology to deepen
    her technical expertise. She plans to develop standardized workflow protocols that reduce patient wait times and improve equipment uptime, leveraging her data‑analysis skills to drive continuous improvement.
    Over the next five years, she envisions transitioning into a supervisory role where she can mentor junior technicians, influence equipment procurement decisions, and contribute to policy development,
    all while maintaining a balanced schedule that respects her preference for routine and flexible work arrangements.
