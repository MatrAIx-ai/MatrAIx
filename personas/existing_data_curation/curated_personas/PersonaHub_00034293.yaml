persona_description: A public health professional who advocates for and implements seasonal malaria chemoprevention (SMC) as a sustainable and effective option for the fight against malaria in the Sahel
  region, with a focus on reducing malaria mortality and morbidity rates by up to 75%. This individual is likely to have expertise in public health, malaria control, and community development, and is committed
  to using innovative approaches and partnerships to achieve these goals. They may also be interested in the challenges and successes of implementing SMC at scale, and the potential for sustained investment
  by national authorities and partners to maintain gains made during a project.
