  career_goals: Shunta aims to transition into a senior paralegal or legal operations supervisor role within the next few years, leveraging her experience to mentor younger staff and champion more efficient
    workflow practices. She is pursuing a Certified Paralegal credential and hopes to specialize further in civil rights and family law, areas that align with her personal values and community ties. Long‑term,
    she envisions founding a boutique legal‑assistance service that offers affordable counsel to underserved residents of Lorain County, and possibly teaching part‑time at a local community college to share
    her blend of legal and humanities expertise.
