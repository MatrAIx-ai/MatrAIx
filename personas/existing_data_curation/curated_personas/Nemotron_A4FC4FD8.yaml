  hobbies: '[''Coastal gardening'', ''Fishing'', ''Nature trail hiking'', ''Chinese calligraphy'', ''Traditional cooking'', ''Lunar New Year community events'', ''Historical biography reading'', ''Sunset
    photography'', ''Mahjong'']'
  career_goals: Approaching retirement, Yiu aims to solidify his legacy by mentoring upcoming supervisors and creating a comprehensive training manual for office operations. He hopes to transition into
    a part‑time consulting role, offering process‑optimization advice to small businesses in the Georgetown County area. Additionally, he aspires to volunteer as a career mentor at the local community college,
    sharing his practical experience with adult learners and helping bridge the gap between senior citizens and modern workplace technologies.
