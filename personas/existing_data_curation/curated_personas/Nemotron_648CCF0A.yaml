  career_goals: Although she is not currently in the formal workforce, Ourania is driven to turn her practical skills into a modest entrepreneurial venture, selling homemade preserves and pickles at the
    county farmers' market. She also hopes to enroll in a community college horticulture program to deepen her gardening expertise and earn a certification that would qualify her to lead workshops at the
    local extension office. Beyond personal projects, she aspires to take on a leadership role in her church’s outreach committee, organizing volunteer initiatives that address food insecurity in Lee County,
    thereby blending her organizational knack with her competitive drive to make a visible impact.
