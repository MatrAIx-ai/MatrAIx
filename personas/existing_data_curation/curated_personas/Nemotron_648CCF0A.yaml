  hobbies: '[''Gardening'', ''Culinary experimentation'', ''Reading mystery novels'', ''Crossword puzzles'', ''Birdwatching'', ''Knitting'', ''Attending local festivals'', ''Bridge (card game)'', ''Volunteering
