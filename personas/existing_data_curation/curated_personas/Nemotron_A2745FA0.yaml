personas:
  professional: Marc Fried, a 21‑year‑old law‑enforcement trainee in Adams County, blends solid protocol training with a hands‑on, on‑the‑fly decision style, excelling in patrol and emergency response while
    they constantly battle a dislike for paperwork and tight report deadlines.
  sports: Marc Fried devotes weekends to rock climbing with the Boulder Ridge Climbers, backcountry skiing in the Wasatch, CrossFit at Colorado CrossFit, volunteers for the Thornton Little League, and passionately
    supports the Denver Broncos and Colorado Rockies.
  arts: 'Marc Fried immerses in true‑crime literature, binge‑watches crime dramas like Mindhunter and Law & Order: SVU, conquers strategy games such as XCOM 2 and Civilization VI, and winds down listening
    to folk‑rock acts like The Lumineers and classic singer‑songwriter Bob Dylan.'
  travel: Marc Fried favors spontaneous, rugged trips, having already tackled the peaks of Rocky Mountain National Park, camped in Yosemite’s Half Dome area, and planning a future backpacking trek through
    Patagonia’s Torres del Paine, all while balancing limited student funds with a love for adventure.
  culinary: Marc Fried gravitates toward hearty mountain fare, regularly cooking bison chili, elk stew, and protein‑packed oatmeal bowls, while savoring locally roasted coffee and craft beers like Oskar Blues,
    and rarely indulges in elaborate dining beyond the occasional farm‑to‑table burger joint.
  core: Marc Fried is a competitive, outdoors‑obsessed law‑enforcement student who thrives on adrenaline‑filled action, sidesteps paperwork, and constantly juggles structure with a spontaneous, sometimes
    reckless, drive.
background:
  cultural: Marc grew up in a middle‑class, predominantly white suburban neighborhood in Thornton, Colorado, with a family heritage rooted in Northern European (German and Irish) ancestry. His upbringing
    emphasized hard work, community service, and respect for individual responsibility—values that align with the local western and frontier sensibility. While his cultural exposure has been largely homogenous,
    his role as a police officer in an increasingly diverse county has prompted him to engage with a broader range of cultural perspectives, fostering an awareness of both his own background and the multicultural
    dynamics of the communities he serves.
attributes:
  skills: '[''law enforcement protocols'', ''firearms handling'', ''traffic stop procedures'', ''incident report writing'', ''conflict de‑escalation'', ''first aid/CPR'', ''community outreach'', ''investigative
    interviewing'', ''basic forensic evidence collection'', ''physical fitness and defensive tactics'']'
  hobbies: '[''hiking in the Rocky Mountains'', ''rock climbing'', ''backcountry skiing'', ''shooting sports'', ''weightlifting and CrossFit'', ''reading true‑crime literature'', ''watching crime dramas'',
    ''playing strategic video games'', ''volunteering at local youth sports programs'']'
  career_goals: Marc aims to complete his associate degree in criminal justice within the next two years and leverage that education to qualify for the detective track in the Adams County Sheriff's Office.
    He hopes to specialize in narcotics or violent crimes investigations, where his blend of structured training and on‑the‑fly problem‑solving can be most effective. Long‑term, he envisions moving into
    a supervisory role, such as a sergeant, where he can mentor new officers while shaping policies that balance procedural rigor with practical field flexibility.
