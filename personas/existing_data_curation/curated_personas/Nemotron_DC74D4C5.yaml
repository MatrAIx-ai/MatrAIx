  hobbies: '[''Street photography'', ''Graffiti art tours'', ''Listening to Bollywood and hip-hop music'', ''Cooking Indian cuisine'', ''Reading self-help and philosophy books'', ''Playing chess online'',
    ''Attending open-mic nights'', ''Fitness and park workouts'', ''Volunteering at local community events'']'
  career_goals: Vishal aims to transition from entry-level cleaning to a supervisory role within the next two years. He plans to obtain a GED and enroll in a Certified Building Operator program to deepen
    his knowledge of HVAC, energy management, and sustainability practices. His long-term ambition is to launch his own eco-friendly cleaning service that uses non-toxic products and offers customized maintenance
    contracts for New York residential and commercial properties. He also hopes to improve his financial stability, reduce his stress by acquiring formal qualifications, and eventually mentor other young
    immigrants entering the workforce.
