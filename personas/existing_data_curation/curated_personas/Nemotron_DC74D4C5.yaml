personas:
  professional: Vishal Patel is a diligent janitor in Manhattan high‑rise apartments whose expertise in floor care, basic plumbing, and multilingual customer service fuels their ambition to become a building‑operations
    supervisor within two years and eventually launch an eco‑friendly cleaning service that uses non‑toxic products.
  sports: Vishal Patel plays pickup basketball on weekends at a local Brooklyn gym, roots for the New York Knicks and the Miami Heat, competes in online chess tournaments, and occasionally relaxes by watching
    a Yankees game on TV.
  arts: Vishal Patel roams Brooklyn’s street‑art districts photographing murals, attends open‑mic nights where they blend Bollywood hits with hip‑hop tracks by Kendrick Lamar, and draws creative inspiration
    from musicians A.R. Rahman and J Cole while chatting enthusiastically with strangers.
  travel: Vishal Patel spends their modest vacation budget on weekend trips to the Hudson Valley’s vineyards, dreams of exploring Tokyo’s neon art scene, and makes a point to return each year for Diwali
    celebrations in their Queens neighborhood.
  culinary: Vishal Patel loves cooking at home, mastering dishes such as dhokla, paneer tikka, and masala chai, experimenting with turmeric and cumin while also perfecting pizza topping combos, and frequently
    hosts friends for potluck evenings that fuse spice‑laden snacks with classic New York deli fare.
  core: Vishal Patel is a talkative, competition‑driven cleaning professional who balances a relentless work ethic, cultural festivals, and a worry‑laden mind while plotting an eco‑cleaning empire.
background:
  cultural: Vishal is a first-generation Indian American, born to Gujarati parents who immigrated to Queens in the early 2000s. His household blends traditional customs—celebrating Diwali with diyas, preparing
    festive meals, and speaking Gujarati at home—with the fast-paced, diverse environment of New York City. He grew up attending a local Hindu temple and participating in community gatherings that emphasize
    family solidarity and respect for elders. This bicultural upbringing has instilled in him a strong work ethic, a love for Indian cuisine and music, and an appreciation for multicultural artistic expression.
    While he values his South Asian roots, he also embraces the city's melting-pot culture, navigating between his heritage and the cosmopolitan life of Manhattan.
attributes:
