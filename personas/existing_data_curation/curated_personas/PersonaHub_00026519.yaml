persona_description: A researcher who studies the relationship between adolescent 12-step participation during treatment, lifetime religiosity, and clinical outcomes. She is interested in exploring the
  benefits of service participation in 12-step programs of recovery for substance-dependent adolescents and how it can reduce their craving symptoms. Her studies have been published in the Journal of Studies
  on Alcohol and Drugs and have replicated results among adults in her prior collaborative research.
