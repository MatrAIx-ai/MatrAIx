  career_goals: Loretta aims to advance to a senior management analyst position within the next three years, then transition into a director of operations or data‑strategy role where she can shape organizational
    policies and drive data‑informed social‑impact initiatives. She plans to pursue an MBA or a master’s in data analytics to deepen her strategic leadership skills. Long‑term, she aspires to become a chief
    data officer or a consultant specializing in sustainable business practices, and to mentor underrepresented groups in STEM.
