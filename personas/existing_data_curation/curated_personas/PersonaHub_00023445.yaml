persona_description: A historian who specializes in the study of the Russian Empire and its transformation from a monarchy to a socialist state. Their research interests include the development of public
  spaces in the early 20th century, the role of "people's houses" in shaping the collective identity of the Russian population, and the impact of these spaces on the Soviet ideal of the well-rounded and
  developed "collective man." They are particularly interested in the transformation of these spaces into workers' clubs and "houses of culture" after the collapse of the USSR and the ways in which they
  reflect the fragmented reality of post-Soviet years and its atomized society.
