  hobbies: '["DIY home improvement projects","Backyard gardening (vegetables & herbs)","Watching Washington Commanders football games","Fishing at Patuxent River","Restoring a 1967 Ford Mustang","Family
    bike rides and weekend hikes","Reading non-fiction (logistics, history, personal development)","Community clean‑up volunteer work"]'
  career_goals: Samuel aims to move from his current stocker role into a shift‑supervisor position within the next two years, and eventually become a warehouse operations manager for a regional distribution
    center. To support this path, he plans to earn APICS CPIM certification and a Six Sigma Green Belt, deepening his expertise in inventory control and process improvement. He is interested in learning
    more about automation technologies such as voice‑guided picking and robotics, and hopes to lead projects that integrate these tools. Long‑term, Samuel wants a stable, higher‑earning career that provides
    for his family, enabling him to contribute to his children’s education and to invest in home improvements.
