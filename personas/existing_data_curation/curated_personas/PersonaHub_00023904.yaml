persona_description: A scientist or researcher who specializes in the study of Vibrio cholerae, particularly in the identification, characterization, and detection of the bacteria using molecular techniques
  such as PCR. They are familiar with the use of multiplex PCR to simultaneously amplify multiple genes of interest in one reaction and have experience with the Oligo Explorer version 1.2 software. They
  are skilled in the use of PCR assays to determine the specificity of the PCR and have experience with the triplex PCR assay for the amplification of the ompW, ctxB, and rfbO1 genes. They have a thorough
  understanding of the molecular biology techniques used in the study and are familiar with the importance of identifying the species and serogroup of Vibrio cholerae through molecular methods. They are
  also aware of the significance of the cholera toxin in the epidemiology of the disease and have experience with the detection of the somatic O-antigen biosynthesis gene rfbOl in Vibrio cholerae isolates.
