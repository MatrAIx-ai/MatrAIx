  hobbies: '[''Recreational Soccer'', ''Basketball'', ''Hiking'', ''Landscape Photography'', ''Community Garden Volunteering'', ''Acoustic Guitar'', ''Open‑Mic Performances'', ''Historical Fiction Book
    Club'']'
  career_goals: Kyle aims to earn his Professional Engineer (PE) license within the next two years and transition into a senior project management role where he can lead large‑scale infrastructure projects
    across New England. He is driven to integrate sustainable and resilient design practices into municipal water and transportation systems, emphasizing community benefit and environmental stewardship.
    Over the next decade, Kyle envisions directing a multidisciplinary engineering team that collaborates closely with local planners, historians, and artists to create infrastructure that respects regional
    heritage while meeting modern needs. He also hopes to mentor junior engineers and contribute to professional societies focused on ethical engineering and public welfare.
