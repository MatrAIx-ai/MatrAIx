personas:
  professional: Kyle Hunt is a technically skilled civil engineer who blends structural analysis expertise with an organized, community‑focused approach, using AutoCAD, Revit, and GIS to design sustainable
    infrastructure projects while they translate complex concepts into clear reports for diverse stakeholders.
  sports: Kyle Hunt channels their energetic sociability into weekly rec soccer matches with the Brookline United club, regular pick‑up basketball at the local YMCA, and hikes along the Boston Harborwalk,
    while they cheer on the Boston Red Sox, the New England Patriots, and the Boston Celtics as part of their seasonal sports devotion.
  arts: Kyle Hunt nurtures their creative side by strumming acoustic renditions of songs by Neil Young and Joni Mitchell at open‑mic nights, devouring historical fiction by Hilary Mantel and Ken Follett,
    and attending Boston Symphony Orchestra performances featuring Beethoven and John Williams.
  travel: Kyle Hunt alternates relaxed weekend trips to Cape Cod, the maritime villages of Martha’s Vineyard, and rugged hikes in Acadia National Park with dream voyages to Iceland’s volcanic landscapes
    and the historic streets of Edinburgh, favoring meticulously planned itineraries that balance adventure with budget constraints.
  culinary: Kyle Hunt enjoys cooking hearty New England clam chowder with fresh clams, potatoes, and thyme, perfecting a lobster roll with buttered brioche and a dash of lemon, while they also relish sushi
    rolls featuring avocado and pickled ginger, often sourcing ingredients from the community garden they help maintain.
  core: Kyle Hunt is a structure‑loving engineer who balances meticulous project management with nightly guitar riffs, occasionally forgetting to water their garden while never missing a soccer game or
    a deadline.
background:
  cultural: Kyle grew up in a middle‑class, white New England family with deep roots in the region, tracing his ancestry back to early Anglo‑American settlers of Massachusetts. His upbringing in a close‑knit
    community emphasized responsibility, cooperation, and respect for local traditions. Attending a public high school in the area, he was encouraged to participate in both athletics and arts programs,
    fostering a balanced outlook. At college, he pursued a liberal arts degree in humanities, focusing on history and cultural studies, which cultivated his appreciation for the narratives that shape built
    environments. This blend of regional heritage, community values, and a humanities education informs his perspective as a civil engineer, prompting him to consider the cultural and historical context
    of the infrastructure he designs.
