  career_goals: Tony aims to transition into a supervisory or pharmacy manager role within the next three years, using his blend of technical precision and creative communication to lead a team that prioritizes
    patient education. He plans to obtain the Certified Pharmacy Technician (CPhT) credential and enroll in a part‑time Bachelor’s program in Health Sciences to broaden his professional qualifications.
    Long‑term, he envisions launching a community wellness center that pairs medication counseling with art‑therapy workshops for seniors and chronic‑ill patients, fostering a holistic approach to health.
    He also seeks to become a mentor for younger pharmacy staff and an advocate for accessible, engaging health information throughout the Puyallup and greater Seattle area.
