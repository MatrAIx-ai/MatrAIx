persona_description: A dermatologist who specializes in treating fungal infections of the skin and is particularly knowledgeable about the various types of fungi that cause these infections, their classification,
  and their potential for causing serious disease in immune suppressed individuals. She has a deep understanding of the different groups of fungi that cause superficial fungal infections, including the
  deeper layers of the skin, the nails, and the hair, as well as the systemic mycoses that can result from breathing in fungal spores. She is also aware of the risks for systemic mycoses and the potential
  for infection to be more serious and chronic in immune compromised individuals.
