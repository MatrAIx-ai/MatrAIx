persona_description: A pediatrician who specializes in the evaluation and management of children with chronic medical illnesses, particularly those with intestinal rehabilitation programs. The pediatrician
  has experience with the use of vitamin D supplementation in the management of vitamin D deficiency and bone health in children with IF. The pediatrician is interested in longitudinal studies and hypothesis
  generating research, and has a strong background in the analysis of age with vitamin D and bone mass status. The pediatrician is also knowledgeable about the effects of vitamin D and bone health on children
  with IF and chronic PN, and has a keen interest in monitoring the health of older patients with IF and those receiving chronic PN for signs of abnormal bone health.
