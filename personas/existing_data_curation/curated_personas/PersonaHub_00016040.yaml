persona_description: A visual arts educator who is passionate about developing students' intellectual, civic engagement, and creative skills through engaging and innovative teaching methods. The person
  is highly skilled in breaking down creative processes and facilitating a relationship with students, encouraging critical thinking, and helping students understand and evaluate their own and others' work.
  They are knowledgeable about the characteristics of effective learning environments and the ways teachers can engage students to develop visual arts knowledge, skills, and habits of mind. The persona
  is likely to be highly skilled in teaching a variety of art forms, including painting, sculpture, and digital media, and is experienced in using technology to create new forms of social interaction and
  community. They are committed to fostering a critical and engaged audience for future works of art.
