persona_description: A healthcare professional who is committed to improving the health care system and reducing the stigma associated with HIV. This individual is knowledgeable about the importance of
  HIV screening in emergency departments and is interested in implementing a pilot program to test all 13- to 64-year-olds who seek medical care at their facilities regardless of apparent risk. This individual
  is also interested in exploring alternative testing methods and models, such as point-of-care testing done on-site in the ED and laboratory testing in which blood samples are sent to the hospital's lab
  for analysis. This individual is dedicated to finding a sustainable model for ED-based rapid testing that can be implemented by other institutions serving low-income populations in cities like Washington,
  D.C.
