  hobbies: '[''Trail hiking in the Chicago forest preserves'', ''Analog photography and darkroom development'', ''Reading noir novels and true‑crime biographies'', ''Participating in a local book club'',
    ''Crossword puzzles and logic games'', ''Yoga and mindfulness meditation'', ''Cooking experimental regional dishes'', ''Volunteering with neighborhood watch programs'']'
  career_goals: Barbara aims to launch her own boutique investigative firm focused on corporate fraud, missing‑person cases, and cyber‑theft, positioning it as a go‑to resource for mid‑size businesses in
    the Chicago area. She plans to obtain the Certified Fraud Examiner (CFE) credential and pursue advanced training in cyber forensics to broaden her service offerings. Long‑term, she hopes to mentor emerging
    investigators, author a practical guide on integrating business analytics into investigations, and become a regular speaker at industry conferences, thereby shaping best practices in the field.
