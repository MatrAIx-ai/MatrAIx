  hobbies: '[''Sailing and boat maintenance'', ''Competitive regatta participation'', ''Vegetable gardening'', ''Woodworking'', ''Reading (maritime history, DIY technology)'', ''Community theater volunteering'',
    ''Organizing local clean‑up events'', ''Chess'', ''Photography (landscape)'', ''Cycling (scenic routes)'']'
  career_goals: Joshua aims to leverage his accumulated expertise to remain an active contributor to his community while pursuing personal growth. He plans to offer occasional consulting to local small‑business
    owners on cost‑effective maintenance and operations, mentor younger volunteers in the Lakeside community association, and author a practical guide on DIY home and boat repairs. He also aspires to stay
    physically active by completing a senior‑friendly cycling challenge around Lake Erie and to compete in the local sailing club's regatta circuit, targeting a top‑three finish within the next two seasons.
