persona_description: A male healthcare professional who is over 60 years old and has a family history of abdominal aortic aneurysm. He has one or more risk factors such as smoking, hypertension, diabetes,
  obesity, and a history of abdominal pain or a previous abdominal aortic aneurysm. He is likely to be concerned about the potential complications of an abdominal aortic aneurysm, such as rupture and bleeding,
  and seeks medical attention if he experiences symptoms such as abdominal pain, back pain, or sudden changes in blood pressure. He may be interested in learning about the different types of abdominal aortic
  aneurysm repair procedures and the risks and benefits associated with each option.
