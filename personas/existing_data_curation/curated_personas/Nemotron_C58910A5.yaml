  career_goals: Tricia aims to transition into a regional procurement director role, overseeing multi‑site sourcing strategies for a large retail or hospitality organization. She plans to obtain a bachelor's
    degree in Business Administration and a Certified Professional in Supply Management (CPSM) credential to deepen her strategic expertise. Long‑term, she hopes to champion sustainable and ethical sourcing
    programs, mentor emerging procurement talent, and eventually lead a consultancy focused on cost‑effective, environmentally responsible supply‑chain solutions.
