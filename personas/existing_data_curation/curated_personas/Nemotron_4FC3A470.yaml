  career_goals: Deborah dreams of turning her love for nature and practical problem‑solving into a career that helps both people and the environment. She imagines herself as a wildlife biologist or a conservation
    scientist who explores forests, studies animals, and designs projects to protect local habitats. She also entertains the idea of becoming a teacher, sharing her curiosity with future students. While
    still exploring possibilities, she consistently expresses a desire to work in a field where she can apply her hands‑on skills to real‑world challenges and make a positive impact on her community.
