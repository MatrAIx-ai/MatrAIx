personas:
  professional: Francisco Reyeshernandez is an aspiring digital illustrator and junior Python programmer who channels their disciplined, organized nature into crafting interactive storybooks and animated
    sketches for school projects.
  sports: Francisco Reyeshernandez plays midfield for a local youth soccer club, follows the San Francisco Giants and Golden State Warriors with enthusiasm, and maintains a disciplined after‑school routine
    that includes swimming laps at the community pool and weekend jogging with a small group of friends.
  arts: Francisco Reyeshernandez delights in sketching fantastical creatures inspired by sci‑fi novels, admires the vibrant murals that appear during Día de los Muertos celebrations, and routinely listens
    to instrumental post‑rock group Explosions in the Sky alongside traditional folk songs by Los Folkloricos.
  travel: Francisco Reyeshernandez prefers family‑planned trips that combine cultural immersion—such as visiting the region where their family’s traditional dishes originate during festive celebrations—and
    outdoor adventure, having already explored Yosemite National Park and dreaming of a future trip to the historic streets of Granada.
  culinary: Francisco Reyeshernandez enjoys helping to prepare tamales de pollo and pozole rojo with their family, experimenting with cinnamon‑sugar churros, can confidently fry a simple pepperoni pizza,
    yet often over‑season their salsa when in a hurry.
  core: Francisco Reyeshernandez is a meticulous, curious 11‑year‑old who blends disciplined digital art projects with careful allowance budgeting, a knack for organized group work, and a quiet, cooperative
    demeanor that sometimes leads to over‑planning and occasional forgetfulness about snacks.
background:
  cultural: Francisco is raised in a Mexican‑American household in San Pablo, California. At home, Spanish is spoken alongside English, and family gatherings revolve around traditional Mexican dishes such
    as tamales and pozole. He celebrates cultural holidays like Día de los Muertos and Carnaval, which have instilled in him a reverence for art, symbolism, and community. His parents emphasize respect,
    modesty, and the importance of education, shaping his disciplined and cooperative nature. Growing up in a diverse Bay Area community, Francisco blends his vibrant Mexican heritage with broader American
    influences, fostering a bicultural identity that enriches his creative perspective.
