  career_goals: Francisco dreams of becoming a multidisciplinary creator who merges art and technology to develop immersive experiences such as video games or interactive installations. He aims to study
    computer science and visual arts in college, eventually working as a game designer or digital artist who tells stories reflecting his Mexican heritage and promotes cultural understanding. In the near
    term, he hopes to deepen his coding and artistic skills, enter regional art competitions, and contribute to community tech workshops, while also mentoring younger students in after‑school programs to
    foster curiosity and discipline.
