  hobbies: '[''Community Gardening'', ''Local Theater Volunteering'', ''Choir Singing'', ''Baking'', ''Fishing'', ''Lakefront Hiking'', ''Card Game Nights'', ''Crafting (Crochet/Knitting)'', ''Attending
    Seasonal Festivals'']'
  career_goals: Jennifer aims to earn the Certified Quality Inspector credential from ASQ and advance to a shift‑supervisor or lead‑inspector role within the plant. She aspires to spearhead continuous‑improvement
    projects that blend innovative testing methods with established quality protocols. Long‑term, she hopes to mentor junior inspectors, develop a small consulting practice for local manufacturers, and
    secure a work schedule that balances professional growth with her community commitments.
