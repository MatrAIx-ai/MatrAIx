  career_goals: As she approaches retirement, Sokha aims to transition from full‑time pressing to a mentorship and consulting role, helping local manufacturers adopt sustainable practices and preserve traditional
    Southeast Asian textile methods. She plans to launch a small boutique studio offering custom alterations, eco‑friendly garment finishing, and workshops that blend modern fashion with her cultural heritage.
    Additionally, she hopes to compile a community guide documenting traditional Vietnamese fabric techniques for future generations and to serve as a cultural ambassador at local arts festivals.
