  hobbies: '[''Painting'', ''Art Gallery Visits'', ''Live Music Concerts'', ''Gardening'', ''Hiking'', ''Book Club'', ''Bridge'', ''Genealogy Research'', ''Mediterranean Cooking'']'
  career_goals: At this stage in her life, Sandra aims to leave a lasting educational legacy by establishing a community‑based, intergenerational arts and literacy program in Vacaville. She plans to mentor
    retired and early‑career teachers, author a memoir that captures lessons from her teaching journey, and collaborate with local schools and museums to embed creative learning experiences into the curriculum.
    Additionally, she seeks to serve as a guest lecturer at nearby community colleges and advocate for lifelong learning opportunities for seniors.
