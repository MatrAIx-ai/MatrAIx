  career_goals: Lori aims to transition from a hands‑on analyst role to a strategic leadership position within the next five years, ideally as a senior security manager or consultant focused on small‑business
    and community cybersecurity in Alaska. She wants to expand her mentorship program, formalizing a quarterly workshop series that teaches online safety to seniors and local entrepreneurs. Staying current
    with AI‑driven threats and cloud security is a priority, so she plans to earn a certified cloud security professional credential. Ultimately, Lori envisions leveraging her experience to influence regional
    policy on cyber resilience, ensuring that remote Alaskan communities are protected against emerging digital risks.
