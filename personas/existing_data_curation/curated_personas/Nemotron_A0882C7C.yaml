  hobbies: '["Hiking","Snowshoeing","Dog Sledding","Wildlife Photography","Reading Mystery Novels","Community Theater","Volunteering (Cybersecurity Education for Seniors)","Knitting","Cooking Alaskan Seafood","Ukulele
