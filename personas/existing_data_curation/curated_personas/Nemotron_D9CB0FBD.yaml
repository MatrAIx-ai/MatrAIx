  career_goals: Evan plans to pursue a bachelor's degree in Marketing or Hospitality Management, aiming to specialize in community event promotion and tourism. In the short term, he hopes to secure an internship
    with a local event‑production company or the Denver tourism board, where he can apply his communication and organizational skills. His long‑term ambition is to become a senior event director for a regional
    nonprofit or municipal agency, designing inclusive festivals, outdoor adventure programs, and cultural events that celebrate Denver's diverse community. He also intends to deepen his expertise in digital
    media to enhance audience engagement and expand his professional network.
