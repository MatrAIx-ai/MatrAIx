  career_goals: Charles aims to broaden access to quality healthcare in Deer Lodge County by expanding the local telehealth network and establishing a community‑based health clinic that integrates mental‑health
    services and art‑therapy programs. He aspires to become a medical director, influence health‑policy decisions affecting rural populations, and publish research on innovative care models for underserved
    areas. Additionally, he hopes to mentor the next generation of physicians, teach medical humanities courses, and eventually serve on a state health board to shape broader systemic improvements.
