personas:
  professional: Evelyn Tenney is a community services program manager who blends their humanities background with bold artistic vision, designing grant-winning, art-infused mental-health initiatives and
    rallying volunteers through dynamic presentations, even though tight deadlines can thrust them into a frantic, last-minute creative sprint.
  sports: Evelyn Tenney fuels fitness by hiking the Wissahickon trails with a local outdoor club, attending Saturday-morning yoga at the community center, and cheering on the Philadelphia Eagles on Sundays
    while also supporting the Philadelphia Union women's soccer team as a dedicated fan, and they relish the end-of-week post-hike smoothie routine.
  arts: Evelyn Tenney paints bold acrylic canvases inspired by the surreal collages of Yayoi Kusama, sketches park scenes while listening to Sufjan Stevens, they write midnight-hour abstract poems, perform
    improv at the Upright Citizens Brigade, frequent indie film festivals such as SXSW and Tribeca, and they collect vintage postcards featuring works by Banksy.
  travel: Evelyn Tenney prefers weekend escapes that blend nature and culture, meticulously planning hikes in Sedona, Arizona, yet they sometimes book a last-minute flight to Kyoto, Japan to explore tea
    houses and night markets, all while navigating a modest freelance budget and leveraging travel credit-card points for accommodation.
  culinary: Evelyn Tenney experiments in the kitchen with global flavors, mastering Thai green curry with kaffir lime, cooking Japanese ramen with homemade dashi, and attempting Ethiopian injera paired
    with doro wat, their moderate cooking skill lets them improvise with spices like sumac and smoked paprika, and they love sampling bold dishes at pop-up vegan eateries.
  core: Evelyn Tenney is a fiercely creative 27-year-old who channels intense anxiety into vivid art and community projects, yet often battles procrastination and a habit of hoarding vintage postcards that
    clutter their apartment.
background:
  cultural: Evelyn grew up in a middle‑class white family in the Midwestern heartland of Missouri, where community solidarity and modesty are deeply valued. Her family’s European‑ancestral roots—primarily
    German and Irish—instilled an appreciation for cultural traditions, folk music, and storytelling that she later explored through her humanities studies. Living in Warrensburg, a university town, exposed
    her to a vibrant campus art scene and a network of service‑oriented organizations, shaping her commitment to blend creativity with social impact. This blend of Midwestern pragmatism, academic curiosity,
    and artistic enthusiasm informs her approach to community service and personal life.
