  hobbies: '["Acrylic painting", "Sketching", "Poetry writing", "Improv comedy classes", "Community theater participation", "Indie film festivals attendance", "Gallery openings visits", "Yoga and mindfulness
    practice", "Hiking local trails", "Experimenting with global recipes", "Collecting vintage postcards", "Social dancing (swing)"]'
  career_goals: Evelyn aims to rise to the role of director of community services within a regional nonprofit, where she can scale her innovative, art-infused program models to serve larger populations.
    She dreams of launching her own nonprofit that merges creative arts with mental-health support, offering workshops and community-based residencies that address anxiety and emotional distress. Over the
    next five years she plans to secure a major state grant, expand her professional network, and earn a recognition award for community impact, positioning herself as a thought leader in socially engaged
    arts. Ultimately, she aspires to influence public policy to embed creative interventions into standard social-service curricula.
