  career_goals: Tara aims to progress into a senior strategic planning role where she can shape long‑term business direction for a regional manufacturing firm. She is focused on obtaining a professional
    certification in business analytics and eventually overseeing a multidisciplinary analytics department. Her ambition includes mentoring junior analysts and establishing a data‑governance framework that
    balances rigorous methodology with the flexibility needed for fast‑moving market conditions.
