personas:
  professional: Tara Berry, a diligent management analyst with eight years of experience, turns complex data into predictive models and risk assessments, and they leverage a methodical, competitive mindset
    to drive process‑optimization projects that meet tight deadlines and align with cross‑functional teams' strategic goals.
  sports: Tara Berry fuels their competitive spirit through weekend hikes with the Blue Ridge Hiking Society, early‑morning yoga at Core Balance, cheering for the Charlotte Hornets, and signing up for the
    annual Charlotte 5K and summer volleyball league.
  arts: Tara Berry unwinds with the rhythmic challenge of New York Times crosswords, streams Fleet Foxes and Tchaikovsky while cooking, and attends weekend performances at the local community theater staged
    by Charlotte Repertory, occasionally curating a small collection of O'Keeffe prints.
  travel: Tara Berry prefers meticulously planned trips that blend outdoor adventure with cultural immersion, having mapped hiking treks through Asheville's Blue Ridge, weekend art tours in Charleston,
    and a culinary weekend in Kyoto, while their long‑term wish list includes the Milford Track in New Zealand and the historic towns of the Czech Republic.
  culinary: Tara Berry cultivates a rooftop vegetable garden that fuels their proficient yet experimental cooking, often assembling ratatouille with heirloom tomatoes, rosemary‑infused quinoa salads, and
    beet‑goat‑cheese tartines, while they balance their healthy meals with occasional guilty‑pleasure pepperoni pizza on Friday nights.
  core: Tara Berry is a strategically minded analyst who balances a love for structured data and nature, channeling their competitive drive into puzzles, hiking, and meticulous life planning, even as they
    battle chronic stress and a penchant for over‑checking every detail.
background:
  cultural: Tara identifies as a white American with deep roots in western North Carolina’s Appalachian region. Her family lineage includes Scots‑Irish and German ancestors who settled in the area in the
    late 1800s, bringing a tradition of self‑reliance, modesty, and community participation. Growing up in Sherrills Ford, she was immersed in the local church and town events that emphasize practicality
    and mutual support. While she embraces the region’s appreciation for hard work and routine, she also values the broader cultural influences of southern hospitality and a growing awareness of diversity
    within her community.
