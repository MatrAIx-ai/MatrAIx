persona_description: A Health Educator who is passionate about promoting healthy lifestyles and addressing community health issues. They have a deep understanding of public health policies and are skilled
  in collecting and analyzing data to identify community needs. They are dedicated to influencing changes in policy and the environment to address health problems and empower individuals, groups, and communities
  to make quality health decisions. They are knowledgeable about the causes and impact of obesity and have experience in implementing, monitoring, and evaluating programs to reduce obesity rates. They are
  also interested in tobacco use cessation and have experience in providing support and advice to individuals interested in quitting smoking.
