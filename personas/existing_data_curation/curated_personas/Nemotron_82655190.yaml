    robotic assistance)'', ''Improvisational problem‑solving in fast‑paced environments'']'
  hobbies: '[''Woodworking and model building'', ''Hiking in Patapsco Valley State Park'', ''Home cooking and recipe experimentation'', ''Volunteering at community health fairs'', ''Reading popular science
    and medical advancement books'', ''Playing acoustic guitar'', ''Photography of nature and family events'']'
  career_goals: Kyle aims to transition from surgical technologist to Certified Surgical First Assistant within the next three years, expanding his hands‑on responsibilities in complex procedures. He plans
    to pursue a Master’s degree in Healthcare Administration to gain leadership skills and eventually take on a supervisory role overseeing OR staff and workflow optimization. Passionate about patient‑centered
    care, he wants to contribute to a hospital committee that develops protocols for postoperative pain management and to author articles on integrating new technologies with compassionate care. Long‑term,
    Kyle envisions mentoring a mentorship program for new surgical technologists and collaborating with local community health initiatives to improve surgical after‑care education.
