personas:
  professional: Michael Price, a 42‑year‑old head cook with two decades of fast‑paced kitchen experience, leverages expert knife work, butchery, and avant‑garde pastry skills to create improvisational,
    farm‑to‑table tasting menus that blend Midwestern heritage ingredients with global flavors, while their spontaneous nature drives bold, last‑minute menu experiments but often clashes with scheduling
    demands.
  sports: Michael Price enjoys solitary fitness pursuits such as cross‑country skiing, paddle‑boarding on Lake Kettle, and seasonal snowshoeing, while cheering on the Minnesota Twins and Vikings from the
    comfort of a home bar, and maintains a casual membership in the Faribault Community Canoe Club.
  arts: Michael Price immerses in avant‑garde jazz from Sun Ra and Cecil Taylor, studies impressionist works at the Walker Art Center, and channels that visual energy into hand‑drawn plating sketches inspired
    by Jackson Pollock’s drips, while they regularly photograph Minnesota’s lakeside sunsets for personal gallery collections.
  travel: Michael Price favors low‑key, nature‑focused travel, often taking weekend drives to the North Shore of Lake Superior for mushroom foraging, dreaming of a longer trek through New Zealand’s West
    Coast rainforests, yet they limit extended trips due to the demands of managing a future tasting‑room and caretaker duties on the family farm.
  culinary: Michael Price, a seasoned chef with expert knife and pastry skills, delights in crafting dishes such as walleye with spruce‑infused beurre blanc, wild‑rice risotto with foraged morels, and heritage
    pork belly glazed with miso‑brown sugar, while they experiment with small‑batch kombucha and barrel‑aged craft beers to accent each plate.
  core: Michael Price is a solitary culinary artist who fuses Midwestern tradition with avant‑garde experimentation, juggling a perfectionist palate with a chaotic schedule and a penchant for wild foraging
    and quiet reflection.
background:
  cultural: Michael grew up on a family farm just outside Faribault, Minnesota, in a household that traced its roots to German and Scandinavian immigrants who settled the region in the late 19th century.
    The Midwestern values of self‑reliance, modesty, and respect for seasonal cycles were ingrained in him from an early age, shaping his appreciation for locally sourced ingredients such as wild rice,
    walleye, and heirloom vegetables. Community gatherings like county fairs and church potlucks introduced him to a diverse array of regional dishes, sparking his curiosity about food as a cultural expression.
    Although he left high school to pursue work in restaurant kitchens, his upbringing continues to influence his cooking philosophy, emphasizing a connection to the land, a reverence for tradition, and
    an openness to blend those customs with contemporary artistic ideas.
