  hobbies: '[''Watercolor painting'', ''Gardening'', ''Hiking'', ''Yoga'', ''Mindfulness meditation'', ''Reading historical fiction'', ''Community theater'', ''Volunteering at senior center'', ''Crafting
    (crochet, knitting)'', ''Cooking and exploring new recipes'']'
  career_goals: Cynthia aims to earn her Bachelor of Science in Nursing while continuing to work, with the long‑term goal of becoming a nurse educator and eventually a nursing manager at the local hospital.
    She is pursuing certifications in mental health nursing and wound care to deepen her expertise and to lead specialized programs that integrate art‑based therapeutic activities for patients dealing with
    anxiety and chronic illness. Additionally, she hopes to develop a community health initiative that offers free health workshops, nutrition classes, and creative art sessions for seniors and low‑income
    families in Cass County, positioning herself as a bridge between clinical care and community well‑being.
