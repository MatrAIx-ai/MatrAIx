personas:
  professional: Maria Kioko is a probation officer and correctional treatment specialist who leverages data-driven risk assessment, evidence-based intervention design, and trauma-informed counseling to
    craft individualized rehabilitation plans, applying their organized, methodical approach and compassionate yet assertive style to advocate for equitable services and mentor emerging professionals.
  sports: Maria Kioko is a dedicated hiker who joins the Buffalo Trails Association for weekend climbs along the Niagara Escarpment, watches the Buffalo Bills and Buffalo Sabres religiously, plays in a
    recreational adult basketball league at the community center during summer, and incorporates early-morning jogs into their routine to balance the demands of their correctional work.
  arts: Maria Kioko is an avid piano player who often accompanies community storytelling nights with improvisations inspired by Thelonious Monk and Nina Simone, regularly attends Buffalo's jazz and blues
    venues featuring artists like Kamasi Washington and Gregory Porter, and devours contemporary science-fiction novels by N.K. Jemisin as well as true-crime works by Michelle McNamara, all of which fuel
    their analytical yet imaginative outlook.
  travel: Maria Kioko favors carefully planned weekend getaways that blend outdoor adventure with cultural immersion, having hiked the White Mountains in New Hampshire, explored Savannah's historic districts,
    and attended a literary festival in Edinburgh, while they dream of a spring pilgrimage to Kyoto's temples to deepen their botanical interests and a summer road trip along Canada's Lake Superior shoreline.
  culinary: Maria Kioko is a confident home cook who blends their love for traditional soul-food, such as slow-cooked collard greens seasoned with smoked turkey, crispy fried catfish, and buttery cornbread,
    with fresh basil, thyme, and cilantro harvested from their rooftop garden, often pairing these meals with homemade sweet-potato pie and experimenting with seasonal vegetable stir-fries.
  core: Maria Kioko is an organized, data-driven probation officer who balances an analytical mind with a soulful love of community music, gardening, and a relentless drive to create equitable pathways
    for formerly incarcerated individuals, while habitually forgetting to water their indoor succulents.
background:
  cultural: 'Maria is an African-American woman whose parents migrated from the Southern United States to Buffalo in the 1970s. Growing up in a close-knit Black neighborhood, she was immersed in the traditions
    of church, community activism, and oral storytelling. She actively participates in local Juneteenth celebrations, the African American History Museum’s programs, and the Buffalo Urban League. Her cultural
    heritage informs her professional practice: she employs culturally responsive counseling, advocates for equitable services, and mentors other Black professionals seeking careers in corrections. She
    values the resilience and collective support that characterize her community, and she incorporates those values into her approach to probation and treatment work.'
attributes:
  skills: '["Risk Assessment", "Case Management", "Data Analysis and Reporting", "Crisis Intervention", "Trauma-Informed Counseling", "Program Development", "Community Outreach", "Conflict Resolution",
    "Report Writing", "Statistical Modeling for Recidivism Trends"]'
  hobbies: '["Urban Gardening", "Hiking in Niagara Escarpment", "Reading Science Fiction and Crime Fiction", "Playing Piano", "Cooking Soul Food", "Volunteering as Youth Mentor", "Attending Jazz and Blues
    Concerts"]'
  career_goals: Seeking to leverage her analytical background and hands-on experience, Maria aims to advance into a supervisory or program-directorial role within the Erie County Probation Department. She
    plans to complete a master’s in criminal justice with a focus on restorative justice, obtain certification as a Certified Correctional Treatment Specialist, and spearhead a data-driven reentry initiative
    that reduces recidivism among high-risk populations. Long-term, she envisions founding a nonprofit that provides culturally responsive mental-health services and job training for formerly incarcerated
    individuals, while also mentoring emerging Black professionals in the criminal-justice field.
