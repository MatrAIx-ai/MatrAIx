personas:
  professional: Lloyd Hudson is an aspiring digital illustrator and budding game developer, channeling their vivid imagination into surreal sci‑fi sketches while methodically learning Python to create interactive
    art pieces.
  sports: Lloyd Hudson is a member of the Worcester County hiking club, enjoys weekend trail runs, follows the Boston Red Sox and New England Patriots, and channels their competitive streak into setting
    personal best times on local hills while occasionally joining varsity cross‑country practice for extra cardio.
  arts: Lloyd Hudson is a digital painter who draws inspiration from H.R. Giger, Syd Mead, and the atmospheric scores of Hans Zimmer, regularly writes short sci‑fi flash fiction, experiments with piano
    improvisations echoing Radiohead and Tame Impala, and attends indie shows featuring bands like The Dandelion Sessions.
  travel: Lloyd Hudson favors meticulously planned weekend hikes to places like the Wachusett Mountain State Park and occasional road trips to Boston for concerts, dreams of a solo backpacking adventure
    through Tokyo's Akihabara district, and balances travel excitement with a modest budget and school responsibilities.
  culinary: Lloyd Hudson's palate favors spicy ramen, sushi rolls, and homemade avocado toast; they can whip up a quick miso ramen with tofu and noodles, but they often rely on instant mac & cheese when
    studying late, and they love experimenting with matcha‑flavored desserts.
  core: Lloyd Hudson is a fifteen‑year‑old sci‑fi dreamer who sketches surreal worlds, competitively solves chess puzzles, and habitually trades sleep for midnight coding while meticulously budgeting every
    art‑supply cent.
background:
  cultural: Lloyd grew up in Clinton, Massachusetts, a small New England town with a close‑knit community and a strong emphasis on public education and seasonal traditions. His family traces its roots to
    Anglo‑Irish ancestry, reflecting the region's colonial heritage. He has regular access to the town library, local art clubs, and the nearby cultural resources of Worcester, such as museums and university
    exhibitions, which nurture his artistic interests. Seasonal activities like leaf‑peeping in autumn, ice‑skating in winter, and summer hikes are part of his life, reinforcing a practical, self‑reliant
    ethos typical of the area. While embracing contemporary teen culture through social media and indie music, Lloyd also values the modesty, work ethic, and community involvement characteristic of his
    New England upbringing.
