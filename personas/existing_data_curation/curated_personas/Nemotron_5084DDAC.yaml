  career_goals: Lloyd aspires to merge his artistic imagination with technical expertise, aiming to become a concept artist and later a creative director in the video‑game or interactive media industry.
    He plans to build a robust portfolio of original artwork and small digital projects, secure a scholarship to a STEAM‑focused high school, and eventually pursue a BFA or B.S. that blends visual arts
    and computer science. In the longer term, he envisions founding his own indie studio where he can lead multidisciplinary teams to develop immersive storytelling experiences. He also hopes to gain mentorship
    through summer art programs and local design studio internships.
