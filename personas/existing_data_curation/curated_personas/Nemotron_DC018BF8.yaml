  career_goals: Zebulon aims to progress into senior leadership within the analytics field, targeting a role such as Director of Business Analytics or Senior Management Consultant. He plans to obtain a
    professional certification (e.g., PMP) and potentially pursue an MBA to broaden his strategic perspective. His long‑term ambition is to design and implement a data‑centric decision‑support platform
    for regional organizations, while maintaining a balanced lifestyle that supports his family and community involvement.
