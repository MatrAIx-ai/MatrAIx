  career_goals: Doris aims to become a CPA-certified senior audit manager within the next three years, overseeing multiple audit engagements and driving strategic improvements across the firm. She aspires
    to integrate data analytics and automation into her team's workflow, positioning herself as a thought leader in modern auditing practices. Long-term, she envisions stepping into a CFO role for a mid-size
    regional company, where she can combine her financial expertise with her interest in strategic planning. Throughout her career progression, she seeks to mentor junior accountants, champion diversity
    and inclusion initiatives, and contribute to community financial-literacy programs in Overland Park.
