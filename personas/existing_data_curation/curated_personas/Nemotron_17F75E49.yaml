  career_goals: Brian aims to advance within the Killeen Police Department while maintaining the structured routine he values. In the next three to five years, he plans to achieve the rank of Sergeant,
    leveraging his organizational strengths and high standards to lead a shift. He also hopes to specialize as a Detective in property crimes, using his investigative skills. To support these goals, he
    intends to enroll part‑time in an associate degree program in criminal justice and later pursue certification as a law enforcement instructor, eventually training new recruits at the Texas Police Academy.
