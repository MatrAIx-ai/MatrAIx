persona_description: A researcher at the Translational Genomics Research Institute (TGen) and Barrow Neurological Institute, who has conducted research on the genetic risk factors for stress-induced cardiomyopathy
  (SIC), a rare type of heart disease. The persona has expertise in genomic sequencing and has identified new genetic risk factors associated with SIC through the use of ultra-high resolution cameras and
  supercomputers. The persona has published the study in the journal Neurosurgery and has identified rare genetic changes associated with SIC. The persona has expertise in the field of neurology and has
  conducted research on the physiology of the heart and the treatment of heart disease.
