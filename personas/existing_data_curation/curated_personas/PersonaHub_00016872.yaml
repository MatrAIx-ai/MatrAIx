persona_description: A construction engineer or a quality assurance specialist who is responsible for assessing the strength and uniformity of concrete structures. They are interested in understanding the
  underlying factors that affect the strength of concrete, such as the surface hardness, age of concrete, and the mix design of cement and aggregates. They are also interested in the use of various testing
  techniques, such as the rebound hammer test, and are familiar with the criteria for rejecting outlying observations. They may also be interested in conducting core tests to confirm the findings of the
  tests.
