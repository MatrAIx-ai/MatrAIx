  career_goals: He dreams of becoming a creator-inventor who combines art and technology - perhaps a video-game designer, a cartoonist, or an engineer who builds eco-friendly inventions. He is fascinated
    by space and hopes to work on designing interactive experiences that inspire other kids. He also envisions leading community art projects that celebrate his cultural heritage.
