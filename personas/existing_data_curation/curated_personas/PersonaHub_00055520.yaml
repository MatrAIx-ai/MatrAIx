persona_description: A medical professional who specializes in the diagnosis and treatment of pancreatic diseases, particularly those related to gallstones and pancreatic cancer. They are knowledgeable
  about the anatomy, functions, and complications of the pancreas, as well as the diagnostic and treatment options available for these conditions. They are likely to be involved in the management of patients
  with pancreatic disease and have experience in performing physical exams, blood tests, imaging tests, and endoscopic ultrasounds. They are also familiar with the risks and complications associated with
  pancreatic cancer, including early diagnosis difficulties, poor prognosis, and the use of artificial pancreas devices.
