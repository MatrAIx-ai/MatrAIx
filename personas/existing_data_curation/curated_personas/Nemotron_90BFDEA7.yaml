personas:
  professional: Valerie Espinal is a part‑time community event coordinator who leverages her meticulous budgeting, structured project management, and outgoing charisma to plan fundraisers for local nonprofits
    while maintaining a healthy skepticism that pushes her to double‑check every detail.
  sports: Valerie Espinal energizes her routine with weekly Zumba classes, cheers for the Atlanta Falcons in football season, follows the Atlanta Braves in baseball, and participates in the Savannah Community
    Running Club’s 5K charity races.
  arts: Valerie Espinal’s artistic life revolves around singing in her church choir, reading the works of Philippa Gregory and James Lee Burke, and drawing inspiration from musicians like Mavis Staples,
    folk singer Dolly Parton, and the soulful rhythms of contemporary salsa artist Carlos Vives.
  travel: Valerie Espinal prefers thoughtfully planned road trips that blend historical tours with culinary stops, having explored Charleston’s historic district, the Creole flavors of New Orleans, and
    dreaming of a cultural immersion in Cartagena, Colombia’s colonial quarter.
  culinary: Valerie Espinal cooks at an advanced level, delighting friends with Southern‑comfort staples infused with Caribbean flair such as shrimp and grits with scotch bonnet pepper sauce, jerk‑spiced
    chicken served over collard greens, and sweet‑potato pudding seasoned with cinnamon and nutmeg.
  core: Valerie Espinal blends a competitive, detail‑oriented mindset with a warm, community‑centric spirit, turning meticulous event planning and spice‑laden cooking into daily acts of service, even as
    she occasionally forgets to log her own self‑care.
background:
  cultural: Valerie is an African‑American woman raised in the southeastern United States who has lived in Port Saint Lucie for the past decade. Her upbringing was shaped by church, family gatherings, and
    a strong sense of community. She embraces traditions of Southern hospitality and Afro‑Caribbean cuisine, and her identity is informed by both the broader African‑American cultural heritage and the vibrant,
    multicultural environment of South Florida. Valerie values intergenerational storytelling, gospel music, and the collective resilience of her community.
attributes:
  skills: '[''Event planning'', ''Budgeting and financial tracking'', ''Volunteer coordination'', ''Interpersonal communication'', ''Leadership and team facilitation'', ''Conflict mediation'', ''Time management'',
