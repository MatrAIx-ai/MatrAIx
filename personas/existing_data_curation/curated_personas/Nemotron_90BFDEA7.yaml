  hobbies: '[''Cooking Southern and Afro‑Caribbean meals'', ''Community gardening'', ''Zumba dance classes'', ''Church choir participation'', ''Reading historical fiction'', ''Volunteering at senior center'',
    ''Organizing local cultural festivals'', ''Mentoring youth'']'
  career_goals: Valerie aims to re-enter the workforce part‑time, focusing on roles that leverage her event‑planning and community‑outreach abilities. She plans to earn a Certified Volunteer Administrator
    credential and eventually launch a home‑based consulting business helping local nonprofits organize fundraisers. She also envisions mentoring younger women in her church and neighborhood, providing
    guidance on financial planning and career development.
