  hobbies: '[''Landscape photography'', ''Hiking'', ''Acoustic guitar'', ''Volunteering with historical society'', ''Watercolor painting'', ''Woodworking'', ''Reading architecture & design'', ''Cooking
    Appalachian cuisine'', ''Attending art exhibitions'']'
  career_goals: Approaching retirement, Daniel aims to transition from routine drafting contracts to a boutique consultancy focused on adaptive reuse of historic buildings in Appalachia. He wishes to obtain
    advanced BIM certification, mentor younger drafters through local apprenticeship programs, and compile a photographic and technical archive of Spencer's vernacular architecture. Long‑term, Daniel hopes
    to author a guidebook on sustainable rural design and partner with the county planning commission to influence community‑centered development while maintaining his flexible, self‑directed work rhythm.
