personas:
  professional: An operations leader who transforms administrative services through meticulous budget planning, workflow automation, and bilingual stakeholder engagement, Cesilia Ortiz channels her calm
    resilience and artistic curiosity into creating office environments that double as collaborative galleries.
  sports: A weekend hiker and casual runner, Cesilia Ortiz tackles the Payette foothills with the Payette Trail Runners club, roots for the Boise State Broncos football team in the fall, and catches Idaho
    Steelheads hockey games in the winter for a balanced mix of outdoor adventure and local sports fandom.
  arts: An avid visual‑arts enthusiast, Cesilia Ortiz curates personal photography collections inspired by Ansel Adams’s landscapes and Banksy’s street satire, frequents the Boise Art Museum’s exhibitions
    of contemporary painter Georgia O’Keeffe, and pours over the works of photographer Cindy Sherman for creative problem‑solving cues in her workplace.
  travel: A methodical planner with a love for both solitude and cultural immersion, Cesilia Ortiz has trekked the Sawtooth Mountains, explored Barcelona’s Gothic Quarter, and dreams of a spring retreat
    to the lavender fields of Provence, always booking off‑peak flights through a travel‑budget app to keep expenses in check.
  culinary: A home‑cooking aficionado, Cesilia Ortiz whips up traditional arepas stuffed with shredded beef, black beans, and plantains, perfects a pabellón de pollo using cumin and achiote, and experiments
    with quinoa‑salad garnished with avocado, lime, and toasted pumpkin seeds, while admitting a habit of over‑seasoning to satisfy their bold palate.
  core: Cesilia Ortiz is a calm, methodical operations manager who fuses artistic curiosity with strategic acumen, yet occasionally forgets to water her indoor succulents while juggling a growing collection
    of vintage camera lenses.
background:
  cultural: Cesilia was born to Venezuelan parents who instilled a strong sense of family, music, and culinary tradition. She grew up bilingual, celebrating festivals like Carnaval and Venezuelan Independence
    Day, often preparing homemade arepas and dancing to joropo rhythms. Relocating to Idaho, she blended her Latin heritage with the region's love for the outdoors, participating in local community events
    while maintaining ties to the Venezuelan diaspora through language clubs and cultural gatherings. This bicultural experience informs her inclusive outlook and her desire to bridge diverse perspectives
    in both personal and professional settings.
