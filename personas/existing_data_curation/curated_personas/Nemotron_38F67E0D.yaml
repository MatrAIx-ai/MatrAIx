  career_goals: Cesilia aims to advance from administrative services manager to a director of operations role within the next five years, focusing on implementing innovative, technology‑driven processes
    that enhance efficiency and employee well‑being. She plans to pursue an MBA with a concentration in organizational leadership to deepen her strategic capabilities. Passionate about the intersection
    of art and work, she aspires to champion a corporate culture that incorporates creative spaces and community art initiatives. Long‑term, she envisions launching a consultancy that helps mid‑size companies
    embed sustainable, culturally inclusive practices into their operational frameworks.
