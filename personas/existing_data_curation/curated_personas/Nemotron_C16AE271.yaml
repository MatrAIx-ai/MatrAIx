  career_goals: While still an infant, Soo's caregivers envision a future shaped by his natural curiosity and love for art. They hope he will pursue a path that blends creativity with thoughtful organization,
    such as a career in visual design, illustration, or architecture, where his appreciation for unconventional ideas can flourish. They also nurture a potential interest in teaching or community work,
    reflecting his kindness and cooperative nature, so that he might one day become an educator or cultural liaison who promotes harmony and cross‑cultural understanding.
