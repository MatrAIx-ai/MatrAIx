  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries'', ''Birdwatching'', ''Gardening'', ''Reading historical fiction'', ''Book club'', ''Knitting'', ''Volunteer craft workshops'',
    ''Cooking'', ''Attending folk music concerts'', ''Exploring art fairs'']'
  career_goals: Approaching retirement, Dora aims to remain a reliable and respected member of her store while gradually shifting toward mentorship, helping train new cashiers and sharing best practices.
    She hopes to deepen her involvement with the local arts community, perhaps by taking a part-time role or volunteer position at the Purdue University Art Museum gift shop or as a docent for community
    art tours. Continuing education through evening art classes is a priority, allowing her to refine her watercolor techniques and broaden her knowledge of art history. Longer-term, she envisions turning
    her hobby of painting and crafting into a modest home-based business selling hand-made cards and prints, providing supplemental income and a creative outlet. Throughout, she prioritizes financial stability
    for her family, maintaining health, and nurturing close relationships with her spouse and small circle of friends.
