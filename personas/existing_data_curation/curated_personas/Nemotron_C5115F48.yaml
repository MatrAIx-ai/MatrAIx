  hobbies: '[''Adult basketball league'', ''Fishing on the Illinois River'', ''DIY home renovation'', ''Cooking with family'', ''Rotary Club volunteer work'', ''Reading business and personal finance books'',
    ''Personal data‑science projects'', ''Weekend hiking'']'
  career_goals: John aims to advance from senior auditor to audit manager within the next three years, positioning himself as a leader in integrating data‑analytics tools into traditional audit processes.
    Over the longer term, he envisions attaining partnership at his firm or transitioning to a chief financial officer role at a mid‑size manufacturing company in the Midwest, where he can drive strategic
    financial planning and digital transformation. He is also interested in building a niche consulting practice that helps small businesses adopt cloud‑based accounting solutions while maintaining a healthy
    work‑life balance with his family.
