  hobbies: '[''Drawing and coloring'', ''Dancing to music'', ''Singing traditional lullabies'', ''Building with blocks'', ''Pretend‑play doctor or teacher'', ''Storytime at the library'', ''Participating
    in family cultural celebrations'', ''Playing cooperative games with peers'']'
  career_goals: Even at four, Graciela loves imagining future roles and frequently says she wants to become a teacher who helps other kids learn, a veterinarian who cares for animals, or a dancer who performs
    on stage. These aspirations reflect her desire to be helpful, be around people, and express herself creatively, all while maintaining the structured environment she feels most comfortable in.
