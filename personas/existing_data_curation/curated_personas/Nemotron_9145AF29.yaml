personas:
  professional: Graciela Gomez, a pint-sized playground organizer, channels her love of structure and sociability into arranging daily play schedules, reliably counting blocks, and confidently leading her
    classmates in group storytelling sessions.
  sports: Graciela Gomez, a budding soccer enthusiast, proudly wears a tiny Cowboys jersey while practicing with the Sulphur Springs Little Kickers club and cheers loudly for the Dallas Cowboys during family
    game nights.
  arts: Graciela Gomez immerses themselves in crafts, creating bright papel picado for family celebrations, drawing vibrant portraits of Dora the Explorer, and singing along to the upbeat soundtrack of
    'Coco' while pretending to be Miguel.
  travel: Graciela Gomez recently explored the State Capitol on a school field trip to Austin and dreams of wandering the colorful streets of Guanajuato, yet for now delights in weekend road trips to Lake
    Tawakoni for paddle‑boarding.
  culinary: Graciela Gomez adores warm cheese quesadillas, mango slices, and homemade chicken tacos, often stirring the salsa with a tiny wooden spoon and proudly serving the finished dish to their family.
  core: Graciela Gomez is a methodical, talkative four‑year‑old who thrives on routine, loves leading playtime, and balances a sweet tooth with a disciplined piggy‑bank routine.
background:
  cultural: Graciela comes from a Mexican family that has settled in Sulphur Springs, Texas, where she grows up immersed in a bilingual environment. At home she hears Spanish spoken alongside English, celebrates
    Día de los Muertos and Navidad with vibrant foods, music, and crafts, and participates in local community events that blend Mexican traditions with Texan customs. Her upbringing emphasizes familismo,
    respect for elders, and a strong sense of community, shaping her values of cooperation, responsibility, and pride in her cultural heritage.
attributes:
  skills: '[''Counting to ten'', ''Letter recognition (A-Z)'', ''Shape matching and puzzle solving'', ''Following daily routines'', ''Bilingual storytelling (Spanish & English)'', ''Leading group songs
