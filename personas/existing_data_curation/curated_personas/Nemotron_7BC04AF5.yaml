personas:
  professional: Madeleine Stinson, a 26‑year‑old sheet‑metal fabricator whose precision measurement, CNC plasma cutting, and MIG/TIG welding expertise are matched by a habit of methodically checking every
    blueprint twice, they thrive in the structured environment of a regional metal shop where they quietly lead projects and mentor apprentices while planning their own independent business.
  sports: Madeleine Stinson, an avid hiker of the Nebraska Sandhills and occasional trail‑runner, they maintain fitness through weekly yoga sessions, follow the Nebraska Cornhuskers football and the Omaha
    Storm Chasers baseball teams from a distance, and belong to the local Nebraska Hiking Association, which they join for solo treks rather than group outings.
  arts: Madeleine Stinson, who crafts small wooden furniture and metal‑art sculptures in a quiet garage workshop, they draw inspiration from the minimalist metal works of Alexander Calder, the photographic
    landscapes of Ansel Adams, and the haunting folk harmonies of Sufjan Stevens, often listening to such artists while they fine‑tune a new piece.
  travel: Madeleine Stinson, a solitary explorer who prefers meticulously planned road trips to remote natural sites—having trekked the Badlands, camped in Yellowstone, and photographed the dunes of Great
    Sand Dunes—now dreams of a quiet Icelandic summer to capture volcanic basalt formations, and they budget these trips within a modest travel fund.
  culinary: Madeleine Stinson, a competent home cook who favors hearty Midwestern fare such as roasted chicken with thyme, sweet potato and kale hash, and a well‑crafted quinoa‑beet salad sprinkled with
    feta, they enjoy sourcing fresh produce at the local farmer’s market and brewing a robust pour‑over coffee with beans from a single‑origin Ethiopian roast.
  core: Madeleine Stinson, a precision‑obsessed metal fabricator who finds solace in solitary woodworking, secretly hoards vintage tool catalogs, and occasionally forgets to water their houseplants during
    long project marathons, they also tend to skip routine health check‑ups in favor of focusing on the next project.
background:
  cultural: Madeleine grew up in a rural, working‑class community in western Nebraska, where practical trades and self‑reliance are deeply valued. Her family’s cultural roots are primarily of Northern European
    descent, reflecting the common German and Irish heritage of many Midwestern families. The local culture emphasizes modesty, a strong work ethic, community cooperation, and attendance at church and county
    events. These values have shaped her preference for structure, responsibility, and quiet individualism, while also fostering a cooperative spirit and concern for others' needs.
attributes:
  skills: '[''Blueprint reading'', ''Precision measurement'', ''Metal cutting and shaping'', ''MIG/TIG welding'', ''CNC plasma cutting'', ''Installation of HVAC ductwork and roofing panels'', ''Safety compliance
    (OSHA standards)'', ''Tool maintenance'', ''Basic CAD drafting'', ''Project estimation basics'', ''Problem‑solving in fabrication processes'']'
  hobbies: '[''Hiking the Sandhills'', ''Birdwatching'', ''Photography of natural scenery'', ''Woodworking small projects'', ''Metal‑art sculpture'', ''Reading non‑fiction books on craftsmanship and engineering'',
    ''Solving jigsaw and logic puzzles'', ''Listening to metalworking and craftsmanship podcasts'', ''Yoga and meditation'']'
  career_goals: She aims to earn a journeyman certification in sheet metal work within the next year and obtain a specialty welding certification. In the medium term, Madeleine aspires to become a lead
    fabricator or foreman at a regional metal shop, overseeing projects and mentoring apprentices. Ultimately, she wishes to start her own small metal‑fabrication business focused on custom HVAC components
    and artistic metal pieces for local clients, leveraging her technical expertise while maintaining a structured, independent work environment. She also plans to complete an associate degree in mechanical
    engineering technology to broaden her technical knowledge.
