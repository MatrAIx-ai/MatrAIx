  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Reading Speculative Fiction'', ''Creative Writing'', ''Fingerstyle Guitar'', ''Vinyl Record Collecting'', ''Hiking'', ''Mindfulness Meditation'', ''Journaling'',
    ''Experimental Cooking'', ''Community Art Workshops'']'
  career_goals: Jose aims to earn his Certified Public Accountant (CPA) license within the next two years and transition from a clerk role to a senior accountant position at a regional firm. He aspires
    to lead a small audit team, champion process‑improvement projects, and eventually open his own boutique bookkeeping consultancy serving local small businesses. Balancing his competitive drive with his
    emotional sensitivity, he also plans to incorporate mindfulness and stress‑management practices into his workplace culture to foster a healthier, more supportive environment for himself and his colleagues.
