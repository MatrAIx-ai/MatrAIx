persona_description: A professional with expertise in contingency planning and infrastructure management, particularly in the context of national infrastructure in Great Britain. This person is skilled
  in coordinating and sharing information across different sectors and agencies to mitigate risks and ensure resilience. They have experience in using geographic data to support the systematic modelling
  and interoperability of assets, enabling real-time visualisation, minimising costs, and providing a common understanding of the interoperability and interdependency of critical assets. They are passionate
  about reducing costs and delivering cross-government or industry efficiencies through coordinated planning and response strategies.
