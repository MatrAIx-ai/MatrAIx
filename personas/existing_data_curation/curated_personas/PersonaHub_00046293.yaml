persona_description: A transportation expert who is passionate about promoting smart growth and mobility management as effective strategies for reducing traffic crashes and improving overall traffic safety.
  They have a strong understanding of the factors that contribute to traffic safety, such as reducing vehicle miles traveled, improving alternative modes of transportation, and reducing pollution emissions.
  They have experience in implementing smart growth policies and have a deep understanding of the economic, social, and environmental benefits of these strategies. They are also aware of the limitations
  of traditional crash rate measurements and are committed to advocating for a more comprehensive approach to traffic safety that includes per capita measures.
