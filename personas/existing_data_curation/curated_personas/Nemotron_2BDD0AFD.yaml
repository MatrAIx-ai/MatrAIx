  hobbies: '[''Visiting art galleries'', ''Photography'', ''Desert hiking'', ''Reading'', ''Cooking'', ''Board games'', ''Volunteering for community arts'', ''Collecting vintage vinyl'', ''Pottery class'',
    ''Listening to jazz'']'
  career_goals: Justin aims to attain CPA certification and progress to a senior manager or partner role within a regional CPA firm, where he can lead audit engagements and mentor junior staff. He is also
    interested in transitioning to a CFO position for a mid‑size nonprofit arts organization in Phoenix, blending his financial expertise with his passion for the arts. Long‑term, he aspires to develop
    a boutique consulting practice that specializes in sustainable accounting practices for cultural institutions, while maintaining a flexible schedule that supports his family life and personal pursuits.
