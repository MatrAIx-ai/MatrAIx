  career_goals: Damian aims to complete a bachelor's degree in Communications or Public Relations and secure an internship with a nonprofit organization or a community‑focused agency in the New York metropolitan
    area. He dreams of becoming a communications specialist who can blend storytelling with data‑driven strategies to promote social causes, while also building a personal brand as a digital content creator
    that educates and entertains his audience. Long‑term, he envisions a role that lets him lead community outreach programs, organize public events, and shape messaging that resonates with diverse audiences.
