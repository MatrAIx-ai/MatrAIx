personas:
  professional: Steven Park, a veteran high school history and literature teacher, leverages their balance of curiosity and practicality to design interdisciplinary curricula that weave primary source analysis
    with digital media, maintains a classroom structure that invites spontaneous inquiry, applies their skeptical mindset to rigorous source evaluation, and uses their calm yet competitive demeanor to mediate
    student conflicts, mentor new teachers, and prepare for a future role as department chair.
  sports: Steven Park, a co‑ed league midfielder for the Providence Strikers, cheers on the New England Revolution, roots for the Boston Red Sox and New England Patriots, and spends their weekends hiking
    the coastal trails of Acadia National Park and the Blackstone River State Park, balancing competitive soccer with family outdoor adventures.
  arts: Steven Park, an avid patron of the Providence Performing Arts Center, regularly attends Broadway‑style productions like *Hamilton* and classical concerts featuring Yo‑Yo Ma, volunteers backstage
    to hone their technical skills, and immerses themselves in literary works by Hilary Mantel and classic novels such as *Moby‑Dick*, shaping their teaching through a deep appreciation of performance and
    storytelling.
  travel: Steven Park, who loves planning meticulous trips, has explored New England’s coastal state parks, trekked Acadia National Park, dreams of walking the ancient streets of Rome and Kyoto to sample
    authentic Mediterranean and Asian fare, and prioritizes family‑friendly itineraries that blend historical tours with relaxed beach time, all while they budget for occasional airfare with a travel rewards
    credit card.
  culinary: Steven Park, a moderately skilled home chef, frequently experiments with Mediterranean dishes like shakshuka and moussaka and Asian recipes such as pad thai and ramen, favors ingredients like
    fresh basil, rosemary, and star anise, enjoys pairing their meals with craft beers, yet sometimes over‑spices their sauces in a competitive quest for bold flavors.
  core: Steven Park is a calm, competitive educator who balances rigorous historical inquiry with hands‑on woodworking, soccer, and experimental cooking, while occasionally neglecting garden watering in
    their relentless schedule.
background:
  cultural: Steven's cultural roots are grounded in the Anglo-American traditions of New England. Raised in Rhode Island, he grew up immersed in the region's historical consciousness—frequent visits to
    colonial sites, celebration of town meetings, and an emphasis on self-governance. His family observes typical New England customs such as early-morning breakfasts of grilled cheese and tomato soup on
    cold winters, Fourth of July parades, and an annual Thanksgiving gathering that underscores gratitude and community. The local maritime heritage, reflected in outings to the Narragansett Bay, has shaped
    his appreciation for the outdoors and seasonal changes. While culturally rooted in this heritage, Steven also embraces the diversity of Providence County, participating in multicultural festivals and
    integrating global perspectives into his teaching.
