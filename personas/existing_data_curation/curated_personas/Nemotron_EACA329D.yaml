  career_goals: Steven aims to earn a Master's in Educational Leadership within the next two years, positioning himself for a department chair or assistant principal role at his high school. He plans to
    spearhead an interdisciplinary "History through Literature" program that connects humanities subjects across grade levels, and to expand the school's debate and Model UN clubs into a regional league.
    He also intends to author articles on balancing traditional pedagogy with innovative digital tools, and to launch a community adult-education series on local history and civic engagement.
