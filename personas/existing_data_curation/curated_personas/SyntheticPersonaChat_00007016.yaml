    User 2: That''s cool! I''ve always been interested in software development, but I don''t know enough about it to do it as a job.

    User 1: It''s definitely a challenging field, but it''s also very rewarding.

    User 2: I can imagine.

    User 1: So, what do you do for work?

    User 2: I''m a paper salesman.

    User 1: That''s a different kind of job! How do you like it?

    User 2: It''s okay. It can be a lot of work, but it''s also pretty interesting.

    User 1: I''m glad you like it'
