    User 1: Those sound great! I''ll definitely check them out.

    User 2: I hope you enjoy them!

    User 1: Me too!

    User 2: So, what do you do for fun?

    User 1: I like to sit on my computer for several hours a day. I mostly play video games, but I also like to watch movies and TV shows.

    User 2: That sounds like fun! I used to play video games a lot when I was younger, but I don''t have as much time for them anymore.

    User 1: I know what you mean. I wish I had more time to play video games, but I have to work and go to school.

    User 2: What do you do for work?

