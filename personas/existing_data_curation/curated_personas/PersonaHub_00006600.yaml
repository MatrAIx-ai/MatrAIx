persona_description: A water resources management professional with expertise in watershed modeling and nutrient load reduction techniques. They are interested in using natural systems and agricultural
  management practices to mitigate nutrient loading into municipal water supplies, particularly in the context of water supply systems like Waco Lake in Texas, USA. They are likely to be familiar with the
  concept of natural systems as a pre-agricultural scenario and have experience with watershed modeling to prioritize management options for nutrient reduction. They may also have a background in agricultural
  management and treatment fields like dairy treatment fields and waste water treatment plants, and be familiar with the potential impact of these practices on nutrient loading.
