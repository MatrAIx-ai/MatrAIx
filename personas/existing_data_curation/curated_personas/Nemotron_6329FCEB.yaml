  career_goals: Tamara dreams of turning her social charisma and passion for mental‑wellness into a career. She hopes to become a mental‑health advocate and content creator, using platforms like YouTube
    or TikTok to share coping strategies for teens, while also pursuing a degree in psychology or communications at a community college. In the longer term, she envisions working in community outreach or
    youth counseling, designing programs that blend creativity, practical life skills, and emotional support. She also aspires to develop a small online boutique that sells handcrafted items she makes herself,
    merging her practical DIY skills with entrepreneurial ambition.
