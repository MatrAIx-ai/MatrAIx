personas:
  professional: Lori Taylor is a seasoned facilities maintenance specialist with three decades of hands‑on expertise in HVAC, electrical, plumbing, and carpentry, whose methodical, safety‑first mindset
    and meticulous record‑keeping make them a natural fit for a Lead Maintenance Manager position in a municipal facility.
  sports: Lori Taylor jogs with the town’s senior walking group, plays third base for the community center’s adult softball league, roots for the River Valley Hawks minor‑league baseball team, and follows
    the regional NFL franchise, the Midtown Bears, on Sundays, all while tracking step counts in a spreadsheet as meticulously as maintenance logs.
  arts: Lori Taylor enjoys listening to John Coltrane’s jazz improvisations, the folk harmonies of The Avett Brothers, and classical piano recordings by Ludovico Einaudi while working in the garden, attends
    the local community theater’s production of 'Our Town', and collects prints of Andrew Wyeth’s realist paintings, finding that these artistic details inform their own woodworking designs.
  travel: Lori Taylor prefers well‑planned road trips that combine scenic drives with historical stops, has explored Yellowstone and Grand Canyon National Parks, spent a weekend in Asheville’s craft‑brew
    scene, visited the historic district of Charleston for its colonial architecture, and dreams of a design‑inspired tour of Copenhagen’s sustainable urban spaces.
  culinary: Lori Taylor cooks with a garden‑fresh focus, regularly preparing roasted beet and goat‑cheese salads, herb‑infused grilled salmon with rosemary, and homemade sourdough bread, excels at precise
    recipe measurements, but often reaches for salty chips while reading technical manuals, balancing health‑conscious meals with a guilty‑pleasure snack habit.
  core: Lori Taylor blends a precision‑driven, competitive work ethic with a quiet love for solitary crafts, balancing meticulous maintenance schedules with occasional indulgent splurges on premium tools
    and snacks.
background:
  cultural: Lori grew up in the Midwest, where a pragmatic, self‑reliant ethos shapes everyday life. Her family’s heritage—primarily of German and Irish descent—instilled a respect for hard work, punctuality,
    and community involvement typical of many small‑town Ohio families. While she identifies with the broader white Midwestern culture, her personal values are anchored in the region’s emphasis on practicality,
    reliability, and modest civic participation, such as volunteering at the local library’s repair workshop and supporting neighborhood improvement projects.
