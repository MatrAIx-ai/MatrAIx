  career_goals: Lori aims to leverage her extensive practical knowledge to advance into a supervisory role as Lead Maintenance Manager for a mid‑size municipal facility or a large property management company.
    She plans to obtain certification as a Certified Maintenance Manager (CMM) and become a licensed HVAC specialist. Over the next five years, she also hopes to mentor apprentices through a local vocational
    program, sharing her structured, reliable work ethic with the next generation of tradespeople.
