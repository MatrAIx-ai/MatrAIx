persona_description: A historian who specializes in the study of prehistory, particularly the archaeological finds and sites of the Veneto region in Italy. She is interested in the environmental characteristics
  of the Monti Berici e Lessini and how they influenced the discovery of many finds during the Lower Palaeolithic Era. She is also interested in the cultural and economic evolution of the Neolithic and
  Eneolithic periods in the region. She is knowledgeable about the Neanderthal Man and Homo sapiens populations in the region and their impact on the archaeological finds. She is also interested in the
  spiritual beliefs and artistic objects found in the Riparo Tagliente burial site.
