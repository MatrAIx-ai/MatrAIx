persona_description: 'A seasoned public health professional with a background in malaria control and M&E. The individual is knowledgeable about the multifaceted nature of the fight against malaria and understands
  the importance of a robust M&E system in supporting the implementation and evaluation of interventions. They are familiar with the USAID-funded MEASURE Evaluation-PIMA project and its role in enhancing
  the capacity of the Ministry of Health''s Malaria Control Unit to collect, analyze, and use data to make strategic decisions. The persona is interested in the theme of this year''s World Malaria Day,
  "Invest in the future: defeat malaria," and recognizes the need for continued investment in vaccines and preventive measures while also acknowledging the importance of M&E in understanding and sustaining
  the gains made in the fight against malaria.'
