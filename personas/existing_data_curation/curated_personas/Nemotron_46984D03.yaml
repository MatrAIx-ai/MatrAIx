  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Reading historical fiction'', ''Genealogy research'', ''Community theatre set design'', ''Volunteering at senior center'', ''Church choir participation'']'
  career_goals: Even though he is officially retired, Charles aims to stay actively involved in his community. He hopes to expand the local senior‑center’s volunteer mentorship program, sharing his life‑work
    experience with younger neighbors. He also wishes to document and preserve his family’s genealogy, creating a digital archive for future generations. Maintaining good health to continue gardening and
    occasional woodworking projects, and supporting his wife’s involvement in the church choir are also central to his personal agenda. Ultimately, he wants to leave a legacy of reliability, compassion,
    and practical knowledge.
