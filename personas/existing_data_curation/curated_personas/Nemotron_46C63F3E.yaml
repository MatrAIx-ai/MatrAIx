  career_goals: Dennis aims to secure a stable part‑time position that offers flexible hours, allowing him to continue using his expertise while mentoring younger staff. He plans to obtain a Certified Food
    Protection Manager credential and eventually move into a supervisory role such as kitchen steward or sanitation manager. In the longer term he hopes to merge his love of art with his hospitality background
    by opening a modest community café that doubles as a gallery space for local artists, creating a venue where his creative interests and practical experience intersect.
