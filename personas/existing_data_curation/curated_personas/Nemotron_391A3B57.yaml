    leaders"]'
  career_goals: Freddie aims to advance within the United States Postal Service by moving into a supervisory position, such as a shift lead or mail processing center supervisor. He plans to obtain the Certified
    Postal Technician credential and pursue additional training in supply chain and logistics management. In the longer term, he aspires to manage a regional distribution hub, where he can implement efficiency
    improvements, lead performance‑driven teams, and mentor newer clerks.
