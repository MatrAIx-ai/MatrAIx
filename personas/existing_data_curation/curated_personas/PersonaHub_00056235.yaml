persona_description: A researcher or scientist who studies the effects of low-level exposure to mercury on fetal growth, neuro-development, and other aspects of health. The individual is likely to be interested
  in the complex interactions between exposure timing, precision of the exposure assessment, and confounding factors. They would be familiar with the literature on the topic and would be looking for studies
  that provide statistical estimates of associations between cord blood mercury levels and birth outcomes, gestational age, and neurocognitive and behavioral outcomes. The persona is also likely to be interested
  in the potential impact of low-level in utero mercury exposure on fetal growth and the possibility of effects on post-natal growth. They would be looking for studies that provide evidence of an effect
  on fetal growth and would be interested in the potential impact of low-level in utero mercury exposure on fetal growth and the possibility of effects on post-natal growth.
