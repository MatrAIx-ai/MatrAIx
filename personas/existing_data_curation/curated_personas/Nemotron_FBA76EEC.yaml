  career_goals: Rebecca dreams of becoming a multimedia storyteller—such as a graphic novelist, game designer, or scientific illustrator—who can blend art, technology, and scientific ideas to inspire other
    kids. In the near future she hopes to join her middle school robotics and art clubs, and by high school she aims to lead a project that combines virtual reality with educational content about space.
    Long-term, she envisions studying visual arts or aerospace engineering in college and contributing to a NASA outreach program that creates immersive experiences for aspiring astronauts.
