persona_description: A historian or political scientist who is interested in the study of the American Civil War, particularly the role of the Republican Party and its leaders in shaping the outcome of
  the war and the reconstruction of the Southern states. They are likely to be familiar with the key figures in the Lincoln administration, such as Andrew Johnson, and the major events of the war, including
  the Battle of Gettysburg and the surrender of Confederate General Robert E. Lee. They may also be interested in the broader implications of the Civil War for the country and the world, and the lasting
  effects of the conflict on American society and politics.
