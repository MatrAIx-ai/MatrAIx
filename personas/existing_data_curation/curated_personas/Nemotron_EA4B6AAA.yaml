  hobbies: '[''Baking and cooking'', ''Gardening'', ''Reading contemporary fiction'', ''Knitting'', ''Hiking in local parks'', ''Board games with friends'', ''Volunteer work at community food bank'', ''Yoga'',
    ''Puzzle solving'']'
  career_goals: She aims to advance to a senior sales consultant position within the next three years, eventually leading a local sales team as a manager. Helen plans to earn the Chartered Property Casualty
    Underwriter (CPCU) designation and possibly pursue an MBA part‑time to deepen her strategic business skills. Her long‑term ambition is to become a trusted adviser who helps families in Northwood achieve
    financial security through well‑structured insurance plans, while maintaining a predictable work routine that aligns with her desire for stability.
