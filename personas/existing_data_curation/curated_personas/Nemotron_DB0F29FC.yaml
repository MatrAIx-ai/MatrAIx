  career_goals: Although retired from full‑time work, Ana aims to continue shaping the HR field by mentoring emerging professionals in Bishop and surrounding counties. She plans to volunteer as a consultant
    for local small businesses, helping them implement fair employment practices and employee wellness programs. Ana also aspires to document her decades of experience in a memoir that blends HR insights
    with stories of cultural resilience, and she hopes to establish a scholarship for students pursuing education or human‑resources degrees, especially those from underrepresented backgrounds.
