persona_description: A seasoned amateur astronomer who is interested in learning more about the constellations and their locations in the sky. They are looking for a constellation guide to help them locate
  fainter and deeper objects to hunt with binoculars or a telescope. They are also interested in learning more about deep-sky guides such as Sue French's Deep-Sky Wonders collection, Sky Atlas 2000.0 Companion
  by Strong and Sinnott, the bigger Night Sky Observer's Guide by Kepple and Sanner, or the classic if dated Burnham's Celestial Handbook. They are interested in becoming a better amateur astronomer and
  believe that a full appreciation of the universe cannot come without developing the skills to find things in the sky and understanding how the sky works. They are willing to invest in a good deep-sky
  guidebook and a good deep-sky telescope. They are interested in learning about the planets and their positions in the sky.
