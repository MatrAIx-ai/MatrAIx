  career_goals: Tamara aims to obtain her Certified Public Accountant (CPA) license and advance to a senior audit manager role within the next three years, overseeing larger, complex engagements. She aspires
    to lead a team of auditors, mentor junior staff, and champion a culture of continuous learning. Leveraging her compassion, she plans to develop and run financial‑literacy workshops for low‑income residents
    of Denver and partner with local non‑profits on budgeting and grant compliance. In the longer term, she envisions transitioning into a chief financial officer position at a community arts organization,
    blending her accounting expertise with her passion for the humanities and social impact.
