persona_description: A geologist who specializes in the study of sedimentary rocks and their formation processes, particularly those related to the Navajo Sandstone. His research interests include the origin
  and formation of the Navajo Sandstone, the factors that led to its deposition, and the impact of this formation on the surrounding landscape. He is particularly interested in the evidence for underwater
  deposition and the implications of this for the Flood-like conditions of the Genesis Flood. He is also knowledgeable about the research conducted by scientists Freeman and Visher on the Navajo Sandstone
  and its similarities to submarine dunes. He is likely to be interested in the implications of the Navajo Sandstone for understanding the Flood and its impact on the Earth's history.
