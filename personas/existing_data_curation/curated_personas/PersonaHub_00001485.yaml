persona_description: A microbiologist who specializes in the study of gut bacteria and their role in the development of antibiotic resistance. This person is interested in the distribution and origin of
  ARGs among gut bacteria, the identification of potential transferrable ARGs, and the genetic arrangement of transferrable ARGs and associated mobile gene elements. They are also interested in the integration
  of IncQ plasmids and the genetic arrangement of ARGs on gut bacterial contigs. This person has expertise in metagenomics, bioinformatics, and antibiotic resistance.
