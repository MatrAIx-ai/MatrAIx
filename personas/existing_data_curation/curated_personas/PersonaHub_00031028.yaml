persona_description: A historian who specializes in the study of the history of the Métis people, particularly the Mountain Métis. His research interests include the development of the Freemen culture,
  the founding of the Métis Nation of Alberta, and the role of the Mountain Métis in the fur trade. He is interested in the cultural, social, and political aspects of the Métis people, and is known for
  his expertise in the history of the Northwest Company, the XY Company, and the Hudson Bay Company.
