  career_goals: Even though Nelson is currently not in the formal workforce, he hopes to channel his experience into part‑time community‑focused initiatives. He aims to start a weekly “Art & Culture” workshop
    at the local community center where he can blend his love of art with his cultural heritage, teaching participants to paint, critique works, and explore Mexican artistic traditions. He also dreams of
    organizing a small pop‑up kitchen that offers authentic Mexican dishes, providing a venue for younger cooks to learn and for seniors to reconnect with familiar flavors. Ultimately, Nelson would like
    to document his family’s migration story and the history of the Cicero neighborhood in a self‑published memoir, hoping it will serve as a cultural bridge for future generations.
