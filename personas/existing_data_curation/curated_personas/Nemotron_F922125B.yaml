personas:
  professional: Juan Ajo is an ambitious high‑school senior leveraging his bilingual fluency, natural public‑speaking charisma, and self‑taught Python skills to prototype community‑focused apps, thriving
    under the competitive pressure of scholarship pursuits while rallying teammates with talkative, leader‑type energy.
  sports: Juan Ajo dominates the Essex Youth Basketball League as a point guard, follows the Baltimore Ravens and Orioles with fervor, and maintains a competitive fitness routine that blends weekend pickup
    games with sporadic weight‑training, though their love for video gaming occasionally leads to missed workouts.
  arts: Juan Ajo immerses themselves in reggaeton and Latin pop icons like Bad Bunny and J Balvin, curates TikTok videos that remix classic salsa beats, and finds a sci‑fi escape in reading books such as Dune,
    shaping a creative outlet that fuels their content‑creation hustle.
  travel: Juan Ajo plans trips with a blend of adventurous curiosity and budget constraints, having explored Mexico’s coastal towns during family holidays and dreaming of backpacking through Costa Rica’s
    rainforests while keeping a spreadsheet of flight prices and visa requirements.
  culinary: Juan Ajo enthusiastically crafts pupusas stuffed with queso fresco and loroco and steams tamales for family gatherings, mastering the art of masa dough on TikTok while also experimenting with
    spicy chipotle salsa verde and occasional Korean bibimbap, showcasing a versatile kitchen skill set.
  core: Juan Ajo is a talkative, competition‑driven teen who fuses tech curiosity with deep family traditions, yet battles persistent worry that fuels both meticulous planning and occasional procrastination.
background:
  cultural: Juan was raised in Essex, Maryland, by Salvadoran parents who immigrated to the United States in the early 2000s. At home, Spanish is spoken daily, and family gatherings revolve around shared
    meals, Catholic traditions, and celebrations of Salvadoran holidays such as Día de la Independencia (September 15) and Las Fiestas Patronales. The community’s strong emphasis on family cohesion, respect
    for elders, and a love for music and dance influences Juan’s identity. While he navigates American teenage culture, he remains deeply connected to his heritage through language, cuisine, and participation
    in local Latin American events.
