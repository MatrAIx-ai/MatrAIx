persona_description: A scientist who specializes in computational systems, particularly those related to artificial intelligence and machine learning. They are working on a project called Robo Brain, which
  is an expansive computational system that learns from publicly available internet resources, computer simulations, and real-life robot trials. The system is currently downloading information from one
  billion images, 120,000 YouTube videos, and 100 million how-to documents and appliance manuals, and is storing the information in a Markov model. The project received funding from various organizations,
  including Google, Qualcomm, Microsoft, and the National Science Foundation. The persona is likely to be interested in the latest developments in artificial intelligence and machine learning, and may have
  expertise in areas such as computer vision, natural language processing, and robotics.
