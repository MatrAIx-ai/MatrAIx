  hobbies: '[''basketball'', ''soccer'', ''playing guitar'', ''community volunteering'', ''hiking'', ''camping'', ''photography'', ''bike repair'', ''DIY projects'', ''cooking'', ''video creation'']'
  career_goals: John aims to complete his associate degree in communications or environmental studies while securing an apprenticeship in community outreach or sustainable agriculture. He envisions a career
    that blends his love for people and hands‑on problem solving—such as becoming a community events coordinator for a local non‑profit, a digital outreach specialist for a regional agricultural cooperative,
    or starting his own small‑scale eco‑tourism venture. He is motivated to develop leadership skills, earn certifications in event management and basic renewable energy systems, and ultimately create a
    role that lets him stay flexible, stay connected with his community, and apply practical solutions to local challenges.
