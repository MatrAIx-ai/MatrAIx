  career_goals: Rafael plans to earn his GED within the next year and then enroll in a community college program focused on information technology or automotive technology. He aims to secure an apprenticeship
    with a local electrician or auto shop to gain hands‑on experience while working toward professional certification as an HVAC or automotive technician. In the longer term, he hopes to combine his technical
    skills with his passion for his heritage by opening a small food‑service venture—such as a Puerto Rican‑style food truck—serving the Woodbridge community. He also wants to give back by mentoring at‑risk
    youth in Prince William County, leveraging his organizational abilities and sociable nature to lead after‑school programs and cultural activities.
