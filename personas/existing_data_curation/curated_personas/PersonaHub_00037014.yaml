persona_description: A scientist and researcher in the field of planetary science, particularly focusing on the study of asteroids and their impact on Earth. They have expertise in using thermal data and
  images from space missions like NASA's Lunar Reconnaissance Orbiter (LRO) to date large craters on the Moon and estimate the rate of impact. They have a unique perspective on the role of asteroids in
  shaping the Earth's history and the possible causes for the uptick in asteroid hits in the past 290 million years.
