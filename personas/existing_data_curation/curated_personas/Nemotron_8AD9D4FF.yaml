personas:
  professional: Emelinda Whitaker is an aspiring junior coder who crafts simple interactive stories in Scratch, channeling the strategic precision of chess and the narrative structure of mystery novels
    into tidy, rule‑based projects.
  sports: Emelinda Whitaker enjoys leisurely walks along the trails of Zorinsky Lake Park, follows the Nebraska Cornhuskers football and the Omaha Lancers hockey teams, and participates in a small after‑school
    intramural soccer league that meets twice a week.
  arts: Emelinda Whitaker engages in artistic expression by sketching serene park scenes inspired by Claude Monet, listening to the folk storytelling of Gillian Welch, and devouring Agatha Christie mysteries,
    all of which fuel their imagination and provide structured creative outlets.
  travel: Emelinda Whitaker loves weekend trips to the historic Old Market district in Omaha and day excursions to the Sandhills, while dreaming of exploring Boston’s Freedom Trail and the expansive vistas
    of Yellowstone National Park when they’re older.
  culinary: Emelinda Whitaker delights in baking classic chocolate chip cookies and honey‑buttered scones, carefully measuring each ingredient—flour, butter, brown sugar, and a pinch of cardamom—using a
    kitchen scale, and sharing the results with family after church gatherings.
  core: Emelinda Whitaker is a methodical teen who blends a love of puzzles, quiet reflection, and disciplined creativity, yet sometimes over‑plans their free time and forgets to simply enjoy the moment.
background:
  cultural: Emelinda is a white Midwestern American raised in Omaha, Nebraska. Her family’s cultural heritage reflects a blend of German and Irish ancestry, typical of many residents in the area. She grew
    up in a community that values hard work, punctuality, modesty, and public service. Family and church (a local Protestant congregation) play central roles in her life, celebrating mainstream U.S. holidays
    and participating in community events such as the county fair and school volunteer projects. The local public school system emphasizes structure, responsibility, and collaborative learning, which aligns
    with her personal preference for organization and small‑group interaction.
