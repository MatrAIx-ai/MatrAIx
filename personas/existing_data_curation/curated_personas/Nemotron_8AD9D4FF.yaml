  hobbies: '[''Reading mystery and historical fiction'', ''Journaling'', ''Sketching'', ''Chess club'', ''Introductory coding'', ''Baking'', ''Walking in local parks'']'
  career_goals: Emelinda aims to finish high school with strong grades, particularly in science and mathematics, and then pursue a degree at the University of Nebraska. She is drawn to careers that combine
    structure, practicality, and helping others, such as nursing or civil engineering. In the short term, she plans to volunteer at the local health clinic and join a senior mentorship program to gain exposure
    to the healthcare environment. Long‑term, she aspires to become a registered nurse focused on community health, or, if her interest in engineering deepens, to work as a civil engineer designing safe,
    functional infrastructure for her hometown.
