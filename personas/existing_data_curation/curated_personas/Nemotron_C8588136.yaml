  hobbies: '[''Fishing'', ''Gardening'', ''Reading historical non-fiction'', ''Attending high school football games'', ''Woodworking'', ''Exploring cryptocurrency and blockchain'', ''Volunteering at community
    food bank'']'
  career_goals: James aims to transition from an analyst role to a senior portfolio strategist within the next five years, eventually launching a boutique advisory firm that serves local families and small
    manufacturers. He wants to integrate sustainable investment strategies focused on renewable energy projects in the Great Lakes region, and to mentor aspiring analysts who lack formal credentials. Financial
    security for his retirement and the ability to support his community through financial literacy workshops are key motivators.
