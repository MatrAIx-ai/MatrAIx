personas:
  professional: Tania Costa, a veteran HR leader and strategic advisor, leverages her STEM-trained analytical mindset and compassionate mediation style to design data-driven compensation models, champion
    diversity, equity, and inclusion initiatives, mentor emerging HR talent, and transition to part-time consulting for small businesses and nonprofits, while establishing a legacy succession program at
    her current firm.
  sports: Tania Costa stays active by leading the Long Island Senior Walking Club, attending gentle yoga sessions at the Jones Beach Community Center, and rooting for local teams such as the New York Mets,
    the New York Islanders, and the Long Island Ducks, often watching games on weekend afternoons.
  arts: Tania Costa enriches her creative life by performing in the local community theater troupe, recently starring in a production of The Glass Menagerie, participating in a book club that devours historical
    fiction and women's memoirs by authors like Isabel Allende and Chimamanda Ngozi Adichie, and listening to fado legends such as Amalia Rodrigues while admiring the intricate patterns of traditional azulejos
    tiles.
  travel: Tania Costa plans meticulous, culturally immersive trips, often traveling to Lisbon and the Douro Valley to savor Mediterranean traditions, while also exploring historic sites along the Northeastern
    corridor such as Boston's Freedom Trail, Philadelphia's Independence Hall, and the seaside charm of Salem, balancing these journeys with weekend getaways to nearby vineyards and coastal towns.
  culinary: Tania Costa, an enthusiastic home cook with intermediate skill, delights in crafting Mediterranean and southern European dishes like bacalhau a Bras, caldo verde, and ratatouille, and her pantry
    brims with olive oil, garlic, piri-piri, fresh herbs, and canned chickpeas, though she sometimes over-salts in her quest for authentic flavor.
  core: Tania Costa mixes analytical precision with heartfelt compassion, turning every HR challenge, garden plot, and family recipe into a community-building opportunity - though they habitually misplace
    their reading glasses on the garden bench.
background:
  cultural: Tania grew up in a middle-class family on Long Island, the daughter of Portuguese-American parents who immigrated to the United States in the 1960s. Her household blended traditional Portuguese
    customs—such as celebrating Festa de São João, speaking Portuguese at family gatherings, and cooking dishes like bacalhau—with the broader suburban culture of Nassau County. This bicultural upbringing
    instilled in her a strong work ethic, a respect for education, and a commitment to community service. While fully integrated into the American mainstream, she maintains an appreciation for her heritage
    through language practice, participation in local Portuguese cultural festivals, and a love for the cuisine, which often influences her cooking hobby and social gatherings.
attributes:
