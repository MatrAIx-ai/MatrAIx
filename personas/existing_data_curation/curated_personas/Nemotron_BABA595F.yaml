  career_goals: At 61, Tania aims to leverage her extensive experience to mentor the next generation of HR professionals and to shape organizational culture through strategic advisory roles. She plans to
    transition gradually into a part-time consulting capacity where she can help small businesses and non-profit organizations implement effective HR policies, improve employee engagement, and build inclusive
    workplaces. A key ambition is to develop a legacy program that formalizes succession planning and knowledge transfer within her current employer, ensuring continuity of best practices. Tania also hopes
    to champion employee well-being initiatives, such as wellness workshops and flexible work arrangements, and to contribute her expertise to community workforce-development projects in Long Island.
