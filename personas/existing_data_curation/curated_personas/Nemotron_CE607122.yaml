personas:
  professional: Daniel Azer, a budding coder and LEGO architect, channels their curiosity and competitive spark into after‑school STEM clubs where they design Scratch Jr. games and build intricate brick
    creations, often improvising solutions when plans go awry.
  sports: Daniel Azer, a spirited soccer enthusiast who plays for the Jacksonville Youth Soccer Club (JYSC) and cheers for the Jacksonville Armada FC, spends weekends sprinting on beach sand, joins pick‑up
    basketball games, and treats every match as a chance to outplay opponents, reflecting a competitive drive.
  arts: Daniel Azer, a comedic storyteller who stages impromptu sketches for family and classmates inspired by the antics of Jim Carrey and the wit of Kevin Hart, avidly follows the LEGO Movie series and
    favorite author Rick Riordan, and watches nature documentaries narrated by David Attenborough to fuel imaginative Scratch Jr. projects.
  travel: Daniel Azer, a spontaneous traveler who loves day trips to Amelia Island’s shoreline and annual visits to Disney World, plans trips more by excitement than itinerary, often requesting beach picnics
    and fireworks shows like the Fourth of July celebration in downtown Jacksonville, while dreaming of a future adventure to Washington, D.C.
  culinary: Daniel Azer, a budding food explorer who devours shrimp po’ boy sandwiches at local seafood shacks, builds his own pizza with pepperoni and extra cheese at home, and mixes LEGO‑themed lunches
    with banana slices and peanut butter, while enjoying sweet iced tea on hot summer days.
  core: Daniel Azer, a 9‑year‑old social whirlwind with a knack for LEGO, soccer, and quick‑witted jokes, balances curious experimentation with a laid‑back, sometimes disorganized routine, and turns every
    beach outing or club meeting into a stage for competition and comedy.
background:
  cultural: Daniel grew up in Jacksonville, Florida, a city known for its coastal lifestyle and Southern hospitality. His family celebrates traditional American holidays like Thanksgiving and Independence
    Day, often with beach outings, barbecues, and fireworks. The multicultural atmosphere of Jacksonville exposes him to a mix of Southern customs, diverse cuisines, and a strong emphasis on community sports
    and outdoor recreation. His parents encourage curiosity through library visits, museum trips, and participation in after‑school STEM clubs, while also valuing a relaxed, flexible approach to daily routines
    typical of his suburban neighborhood.
