  career_goals: Daniel dreams of one day becoming an astronaut or a video game developer, combining his love for space exploration with his talent for building and programming. He also fantasizes about
    being a professional soccer player, driven by his competitive spirit and desire to shine in the spotlight. In the near term, he aims to win his school’s science fair, become captain of his soccer team,
    and host a class talent show, seeing these achievements as stepping stones toward larger ambitions in STEM and performance.
