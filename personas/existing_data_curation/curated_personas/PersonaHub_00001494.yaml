persona_description: A veterinarian who specializes in the diagnosis and treatment of elbow dysplasia in dogs, a common condition that causes lameness and pain in large and giant breed dogs. They are experienced
  in ruling out other possible causes for the symptoms, using diagnostic tests such as x-rays, computed tomography (CT) scans, and magnetic resonance imaging (MRI), and may order a fine needle aspirate
  of fluid from the joint to test for degenerative joint disease. They have a deep understanding of the genetic, developmental, and nutritional factors that contribute to the condition, and may need to
  consult with other specialists such as orthopedic surgeons or radiologists.
