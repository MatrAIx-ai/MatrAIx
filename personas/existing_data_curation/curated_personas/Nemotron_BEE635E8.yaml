personas:
  professional: Joselyn Millan is a veteran community liaison who blends bilingual storytelling, event coordination, and modest digital fluency to bridge senior immigrants and U.S.-born youth, using their
    compassionate nature and flexible, sometimes disorganized, approach to keep cultural traditions alive through workshops and intergenerational cooking gatherings.
  sports: Joselyn Millan enjoys leisurely walks in the local park, often pausing for bird‑watching, and cheers on the Dallas Cowboys while occasionally joining community dance circles that keep them gently
    active despite arthritis.
  arts: Joselyn Millan spends afternoons crocheting vibrant blankets, listening to marimba ensembles like those performed by the local folk group, and devouring historical novels by authors such as Isabel
    Allende, allowing their artistic sensibility to reinforce a deep sense of identity and community belonging.
  travel: Joselyn Millan has revisited the capital city of their birth country, explored historic neighborhoods in Mexico City, and dreams of touring the colonial streets of Cartagena, yet their travel
    style remains low‑key and family‑oriented, favoring short trips that fit within a modest budget and a need for plenty of rest.
  culinary: Joselyn Millan expertly prepares pupusas stuffed with cheese and loroco, slow‑cooked tamales wrapped in banana leaves, and sweet atol de elote, seasoning each with fresh cilantro, epazote, and
    a pinch of cumin, while delightfully experimenting with new fillings to keep tradition lively.
  core: Joselyn Millan is a caring cultural custodian whose love of cooking, crochet, and storytelling is balanced by a habit of misplacing glasses, a penchant for worrying about missed appointments, and
    an unyielding commitment to keep heritage alive for future generations.
background:
  cultural: Joselyn was born in a small town outside San Salvador and grew up immersed in the rhythms of Salvadoran Catholic celebrations, folkloric dances, and the warm communal life of her extended family.
    She emigrated to the United States in her early twenties, settling first in Los Angeles before moving to Dallas in the 1990s, where a vibrant Salvadoran diaspora offered a sense of home. She has preserved
    the language, culinary traditions, and religious observances of her heritage, while also adopting Texan customs and the multicultural tapestry of Dallas. Joselyn regularly participates in the annual
    Fiesta Salvadorena in Dallas, volunteers at the El Salvadorian‑American Center, and serves as a bridge between older immigrants and younger, U.S.-born Salvadorans, helping to translate, explain customs,
    and celebrate shared identity.
