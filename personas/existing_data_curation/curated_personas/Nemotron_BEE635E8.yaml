  career_goals: Joselyn’s primary ambition is to ensure that her family and the broader Salvadoran community in Dallas retain a living connection to their heritage. She aims to compile a scrapbook‑style
    memoir that combines photographs, recipes, and recorded stories from her childhood in El Salvador, and to donate a copy to the local public library’s Latino archive. She also hopes to launch a monthly
    "Cocina y Cuentos" (Cooking and Stories) gathering at the community center, where seniors teach younger participants how to make classic dishes while sharing folklore. Though she is no longer in formal
    employment, she wants to stay active as a cultural liaison for the school district, helping educators integrate Salvadoran cultural units into their curricula. Maintaining her health and independence,
    she also aspires to keep learning new digital tools to stay connected with her grandchildren across the country.
