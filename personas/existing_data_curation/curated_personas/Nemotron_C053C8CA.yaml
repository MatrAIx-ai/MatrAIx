  hobbies: '[''Adult basketball league'', ''Fishing trips'', ''Steelers game outings'', ''Volunteering at community food pantry'', ''Reading self‑help and stress‑management books'', ''DIY woodworking'']'
  career_goals: William aims to move up to a store manager position at a larger regional retailer, eventually targeting a district or regional manager role where he can influence broader operational strategies.
    To support these ambitions, he plans to obtain his GED and enroll in a short‑term certificate program in retail management or business administration. He also hopes to complete a leadership development
    course offered by his employer, giving him the credentials needed for promotion. Long‑term, he envisions opening his own small‑scale specialty shop that blends his love of community service and practical
    craftsmanship, allowing him to apply his supervisory experience while achieving greater work‑life balance.
