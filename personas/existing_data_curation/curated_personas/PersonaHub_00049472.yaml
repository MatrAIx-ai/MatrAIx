persona_description: A team of Agricultural Research Service and Purdue University animal scientists and behavioralists who are working on improving the humane treatment of poultry while keeping the business
  bottom line in mind. They focus on issues such as housing environment for poultry, routine practices like beak trimming and induced molting, and breeding gentle birds with low mortality rates from pecking
  and high egg production. They also research alternatives to traditional housing and practices, such as cages with perches for stronger bones, and alternatives to induced molting.
