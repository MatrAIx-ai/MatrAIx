  hobbies: '[''Woodworking'', ''Metal sculpture crafting'', ''Industrial and landscape photography'', ''Visiting art museums'', ''Reading historical non‑fiction'', ''Herb gardening'', ''Crossword and Sudoku
    puzzles'', ''Model kit assembly (e.g., mechanical models)'', ''Cycling on quiet country roads'']'
  career_goals: Approaching retirement, Charles aims to transition from full‑time shop work to a consultancy role where he can help small manufacturing firms adopt lean processes and improve product quality.
    He also plans to establish a modest home‑based fabrication studio focused on creating custom metal art pieces that blend his technical skill with his love of visual art. Additionally, he hopes to mentor
    the next generation of tradespeople through evening classes at the local community college and contribute occasional lectures to the North Attleboro Historical Society on the town’s industrial heritage.
