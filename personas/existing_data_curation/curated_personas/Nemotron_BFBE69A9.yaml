  career_goals: Although retired from formal employment, Lisa aims to deepen her community impact. She plans to lead a senior‑citizen mentorship program, expand her volunteer role in local literacy initiatives,
    and master a new creative skill such as watercolor painting. She also hopes to travel to national parks in the northern states and complete a genealogical research project that documents her family’s
    immigration story.
