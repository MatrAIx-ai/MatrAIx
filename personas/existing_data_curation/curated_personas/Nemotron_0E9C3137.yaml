    to indie/alternative music","Watching DIY and science YouTube channels"]'
  career_goals: Ashley wants to turn her hands‑on talents into a career that balances creativity and practicality. After high school she plans to enroll in a local vocational‑technical school to train as
    an automotive or small‑engine technician, while also taking electives in product design. Simultaneously, she hopes to launch an online shop on Etsy to sell her handcrafted accessories and graphic prints,
    using the technical skills she gains to manage the e‑commerce side. Her ambition is to be financially independent, running a flexible business that lets her set her own schedule and stay competitive
    in her field.
