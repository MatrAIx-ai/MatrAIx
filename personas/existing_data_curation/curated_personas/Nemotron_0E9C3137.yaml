personas:
  professional: Ashley Geller, a 16‑year‑old aspiring automotive and small‑engine technician, merges hands‑on mechanical tinkering with digital illustration skills, often spearheading informal brainstorming
    sessions for DIY projects while wrestling with strict deadlines and a natural skepticism toward rigid structures.
  sports: Ashley Geller pedals enthusiastically on Indiana’s rolling bike trails, follows the Indianapolis Colts and Indiana Pacers, and belongs to a local weekend cycling club, preferring solo rides that
    satisfy a competitive spirit over team sports due to a strong independent streak.
  arts: Ashley Geller curates indie playlists featuring Tame Impala and Phoebe Bridgers, creates digital illustrations inspired by retro video‑game aesthetics using free Photoshop alternatives, and draws
    creative sparks from YouTube DIY channels like Draw with Jazza and Simone Giertz, weaving these influences into handcrafted accessories sold on Etsy.
  travel: Ashley Geller’s travel style blends spontaneous, budget‑friendly road trips—such as a recent weekend photo‑hunt along the Hoosier countryside and a planned future visit to Austin’s maker fairs—favoring
    the freedom to explore over meticulously scheduled tours.
  culinary: Ashley Geller favors quick, flavorful meals like sriracha‑infused ramen and homemade granola bars for bike rides, experiments with banana‑bread variations after TikTok tutorials, yet often forgets
    to set timers, leading to occasional over‑cooked treats.
  core: Ashley Geller is a curious, DIY‑minded teen who fuses mechanical tinkering with digital art, thrives on competitive gaming, and battles procrastination while hustling toward financial independence
    through a fledgling Etsy shop.
background:
  cultural: Ashley grew up in Hagerstown, a small town in Henry County, Indiana, within a white, Midwestern family that values self‑reliance, modesty, and community involvement. Local traditions like county
    fairs, high‑school sports nights, and gatherings at the neighborhood diner shaped her sense of belonging. While these roots emphasize practical, hands‑on skills and a strong work ethic, Ashley also
    taps into broader cultural currents through the internet, blending classic Midwestern values with contemporary digital influences. This mix informs her outlook, allowing her to respect established methods
    while staying eager to explore new ideas.
attributes:
  skills: '["DIY crafting","Basic computer troubleshooting","Graphic design (Canva)","Mechanical tinkering (bike repair, small engine maintenance)","Critical thinking","Clear verbal communication"]'
