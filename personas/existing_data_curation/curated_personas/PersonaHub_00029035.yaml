persona_description: A video artist who explores the impact of climate change on local landscapes and the environment, particularly in coastal regions. Coover's work combines live footage, layered images
  of maps, and text to imaginatively examine the effect of floods on people's lives in a fictionalized near future. His fascination with abandoned sites and structures like gravestones marks the demise
  of an area's industrial pursuits, reflecting his unique knowledge of the impact of sea-level change and the passing of time.
