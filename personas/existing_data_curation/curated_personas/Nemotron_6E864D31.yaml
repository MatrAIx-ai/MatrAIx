  career_goals: Although retired, Angela aims to leave a lasting cultural legacy in Philadelphia. She plans to write and publish a memoir that intertwines her personal story with the city’s artistic evolution,
    and to establish a small scholarship for high‑school students pursuing visual arts. She also hopes to co‑curate a traveling exhibition that showcases works by senior artists, and to continue volunteering
    as a docent at the Philadelphia Museum of Art, sharing her knowledge with diverse audiences. Additionally, she desires to organize intergenerational art workshops that foster community bonds and nurture
    empathy among participants.
