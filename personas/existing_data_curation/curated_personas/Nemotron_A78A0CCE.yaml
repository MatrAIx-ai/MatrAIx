  hobbies: '[''basketball'', ''hip‑hop and R&B dancing'', ''church youth choir'', ''reading graphic novels'', ''creative writing/journaling'', ''simple science experiments'', ''nature walks'', ''cooking
    Southern family recipes'', ''community volunteering'']'
  career_goals: Ida aspires to become a community health nurse or a science teacher, merging her curiosity about how things work with a desire to help others in her hometown. She envisions studying biology
    and public health in college, then returning to Dale County to provide health education, support youth wellness, and mentor fellow students. Her long‑term ambition includes organizing health workshops
    at the local church and creating outreach programs that combine practical health knowledge with friendly, supportive community environments.
