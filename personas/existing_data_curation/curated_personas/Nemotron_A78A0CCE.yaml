personas:
  professional: Ida Johnson is a budding youth leader in her middle school's science club, organizing weekly experiments and community outreach, where their curiosity‑practical balance and knack for teamwork
    turn complex kits into hands‑on learning for peers.
  sports: Ida Johnson dribbles on the local park basketball courts with the Midtown Middle School team, follows the Atlanta Hawks and the Georgia Bulldogs for inspiration, and balances a high‑energy training
    routine with hip‑hop dance cardio, though they occasionally skip stretching after games.
  arts: Ida Johnson blends hip‑hop moves to the beats of Kendrick Lamar and Beyoncé with choral harmonies from the church youth choir, while immersing themselves in fantasy graphic novels by creators like
    Jim Lee and writing short stories reminiscent of Neil Gaiman, fueling a vibrant creative outlet.
  travel: Ida Johnson dreams of exploring the botanical gardens of Savannah, the historic streets of New Orleans, and the sprawling museums of Washington DC, preferring family‑planned trips that combine
    nature hikes with cultural sites, though budget constraints sometimes limit them to weekend visits to nearby state parks.
  culinary: Ida Johnson eagerly assists in preparing collard greens simmered with smoked ham hocks, sweet tea brewed with real sugar and a splash of lemon, and often experiments with adding pine nuts to
    mac and cheese, showcasing a budding culinary skill set that blends Southern comfort food with modest culinary curiosity.
  core: Ida Johnson is a socially vibrant, worry‑prone teenager who channels energy into basketball, dance, and storytelling, while juggling a passion for science and a tendency to procrastinate on homework.
background:
  cultural: Ida grows up as a Black teenager in rural Newton, Alabama, where Southern African‑American culture profoundly shapes her life. Her family and church are central pillars, emphasizing close‑knit
    relationships, gospel music, storytelling, and communal support. Weekly church services, potluck gatherings, and local festivals expose her to rich traditions of oral history, soulful singing, and Southern
    cooking that celebrate resilience and unity. These cultural influences nurture Ida's kindness, collaborative spirit, and desire to maintain harmony, while also instilling a practical sense of responsibility
    toward her community. The legacy of perseverance and collective care in her cultural heritage informs her ambitions to give back through health education and mentorship.
