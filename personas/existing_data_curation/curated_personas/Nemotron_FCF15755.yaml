personas:
  professional: Andrew Jiang is an aspiring visual storyteller who blends hand‑drawn wildlife sketches and tribal symbols into short animated videos using beginner‑friendly editing software, channeling
    a curious and spontaneous mindset into creative projects while often wrestling with the lack of structure needed to meet school deadlines.
  sports: Andrew Jiang enjoys weekend hikes along the nearby creek trails, occasionally laces up for the town’s youth soccer league as a midfielder, and roots for the local minor‑league baseball team, the
    River City Runners, while preferring solitary bike rides over crowded gym classes.
  arts: Andrew Jiang immerses themselves in graphic novels like 'Sandman' by Neil Gaiman and 'Saga' by Brian K. Vaughan, draws stylistic cues from Hayao Miyazaki’s fluid animation and the bold patterns
    of tribal mask artisans, and practices hand drumming to traditional rhythms taught by older cousins, echoing the percussive beats of world‑music legend Sheila E.
  travel: Andrew Jiang favors spontaneous day trips to nearby Blue Ridge State Park, dreams of trekking the ancient Redwood forests of California, and plans a future weekend campout in the Appalachian Mountains,
    balancing a love for nature with the constraints of school schedules and a modest budget.
  culinary: Andrew Jiang prefers hearty, easy meals such as stir‑fried udon with miso broth, enjoys crafting trail mix with dried cranberries, pumpkin seeds, and dark chocolate, and experiments with making
    homemade berry jam from wild strawberries gathered on creek walks, though they often over‑cook pasta when distracted by a new sketch idea.
  core: Andrew Jiang is a curious, art‑driven teen whose love for tribal symbolism and digital animation fuels spontaneous creativity, tempered by occasional procrastination and a quiet preference for solitary
    exploration of woods and graphic storytelling.
background:
  cultural: Andrew is of American Indian descent, with his family belonging to the Muscogee (Creek) Nation, a community with deep roots in Alabama. Growing up in Russellville, he participates in tribal
    gatherings, powwows, and language workshops organized by the local Creek cultural center. His grandparents share oral histories and traditional crafts, which Andrew incorporates into his art. The values
    of stewardship of the land, communal responsibility, and reverence for ancestral stories shape his worldview and inspire his creative projects.
attributes:
  skills: '["Basic drawing and sketching","Digital illustration using Procreate","Storytelling and oral history collection","Beginner coding in Scratch","Photography basics","Knowledge of Muscogee cultural
    traditions"]'
  hobbies: '["Sketching wildlife and tribal symbols","Reading mythology and graphic novels","Exploring local forests and nature trails","Playing a hand drum and learning tribal rhythms","Creating short
    animated videos","Playing chess in small groups"]'
  career_goals: Andrew dreams of turning his love for art and storytelling into a career as a multimedia illustrator and cultural storyteller. He hopes to attend a specialized arts high school where he
    can study visual design, then pursue a degree in graphic design or game development, with a focus on integrating indigenous narratives into interactive media. He also wants to work with local environmental
    groups to document and protect the natural landscapes of Alabama, merging his artistic skills with a commitment to conservation.
