persona_description: A member of the indigenous Kankana-ey Igorot community in the Philippines, who is passionate about protecting her community's traditional ways of living and advocating for the rights
  of indigenous peoples. She is an expert on traditional knowledge and practices that can help in reducing carbon emissions and living sustainably. Tauli-Corpuza is a member of the Intergovernmental Panel
  on Climate Change (IPCC) and has spoken at a special workshop run by United Nations University (UNU) and the IPCC earlier this month in Cairns, Australia.
