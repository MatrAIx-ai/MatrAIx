persona_description: An individual who is interested in understanding the relationship between distance running and heart rate. They are curious about how much blood the heart can pump during a VO2 max
  test and how their VO2 max relates to their running speed. They are looking for training tips and strategies to increase their VO2 max, which is a measure of their maximum oxygen consumption during exercise.
  They are a beginner who wants to start their VO2 max training with steady state cardio and gradually increase their intensity and duration. They are also interested in the genetic and environmental factors
  that can affect VO2 max and the potential for improvement through training.
