  career_goals: Wayne envisions a career that lets him stay creative, independent, and flexible. He aims to become a freelance digital content creator, producing artwork, animations, and short videos for
    indie game developers or alternative media outlets. He also hopes to launch his own YouTube channel where he can blend art, technology, and critical commentary on pop culture. In the longer term, he
    aspires to develop an independent video game or interactive art project that showcases his unconventional ideas, possibly collaborating with a small collective. He prefers gig‑based work over a traditional
    9‑to‑5 job, seeking environments that value autonomy and personal initiative.
