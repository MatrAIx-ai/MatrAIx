personas:
  professional: Wayne Watson is a 17‑year‑old aspiring freelance digital content creator who merges urban‑art illustration, free‑software 2D animation, and Python‑driven interactive experiments to serve
    indie game developers, all while wrestling with a spontaneous work style that often makes meeting deadlines a challenge.
  sports: Wayne Watson fuels their fitness by skateboarding through the Cascade forest trails and riding with the local mountain‑bike club ‘Cascade Riders,’ while cheering on the Seattle Sounders FC and
    Seattle Kraken and occasionally dropping into the downtown skate park ‘Skate Patrol.’
  arts: Wayne Watson channels a love for street‑art icons like Banksy and comic creators such as Mike Mignola into vibrant murals and digital sketches, follows indie game art from titles like Celeste, and
    curates playlists featuring Nirvana, The Stooges, and lo‑fi hip‑hop producer J Dilla during late‑night art sessions.
  travel: Wayne Watson prefers spontaneous, budget‑friendly trips, having backpacked through Olympic National Park and taken a weekend ferry to Vancouver, while dreaming of a rain‑soaked adventure in Tokyo’s
    Akihabara district and a surf‑and‑hike tour of New Zealand’s South Island.
  culinary: Wayne Watson enjoys crafting quick ramen bowls with miso, chili oil, and soft‑boiled eggs, experimenting with spicy taco fillings of chorizo and avocado, yet often resorts to take‑out sushi
    burritos and craft beers from local microbreweries when the creative flow stalls.
  core: Wayne Watson is a restless teen who can lose track of hours while animating pixel art, hoards limited‑edition game merch, and balances a fierce competitive streak with a penchant for spontaneous,
    unstructured creativity.
background:
  cultural: Wayne grew up in Spanaway, a suburban community in Pierce County, Washington, surrounded by the lush, rainy landscapes typical of the Pacific Northwest. His family’s background is white American,
    with a modest middle‑class upbringing that values independence and self‑reliance. The regional culture—a mix of outdoor recreation, a vibrant independent music and art scene, and a tech‑savvy youth
    environment near Seattle—has shaped his appreciation for both nature and alternative creative expression. Local skateparks, community art projects, and easy access to public libraries and internet cafés
    have nurtured his DIY ethos and curiosity, while the broader Pacific Northwest emphasis on environmental awareness subtly informs the themes of his artwork.
