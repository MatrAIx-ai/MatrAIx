personas:
  professional: Ma Kim, a budding builder‑in‑training who loves stacking wooden blocks and role‑playing as a miniature doctor, displays early curiosity paired with a practical, hands‑on problem‑solving
    style, and they prefer the flexibility of unstructured play over rigid schedules.
  sports: Ma Kim, who energetically toddles through the neighborhood playground and attends a weekly parent‑child mini‑soccer class with the local community league, cheerfully waves a tiny Seattle Mariners
    cap while preferring the calm of a quiet corner over the roar of crowded stadiums, and they illustrate a love of movement tempered by a need for small‑group comfort.
  arts: Ma Kim, who hums along to Raffi's Bananaphone and giggles at the animated antics of Bluey, spends quiet afternoons drawing simple stick‑figure families with crayons while they occasionally imitate
    the gentle piano tunes from a children’s Ludovico Einaudi CD, embodying a reserved yet tender artistic spirit.
  travel: Ma Kim, who has enjoyed a sunny family day at the local zoo and a brief weekend trip to the seaside town of Myrtle Beach, dreams of a gentle adventure to Disneyland Paris, yet they prefer short,
    familiar outings with a parent nearby rather than long, unpredictable journeys, reflecting a careful balance of curiosity and stress‑sensitivity.
  culinary: Ma Kim, who delights in buttery mac and cheese sprinkled with sharp cheddar and loves the sweet softness of banana slices, can expertly stir a bowl of oatmeal with a plastic spoon but they often
    refuse broccoli, showcasing a budding palate that favors familiar comfort foods while occasionally tasting new bites.
  core: Ma Kim, a two‑year‑old explorer who balances relentless curiosity with cautious worry, clings to a beloved pink piggy bank, scrapes elbows from block towers, and they habitually hum Raffi while
    seeking quiet corners in bustling rooms.
background:
  cultural: Ma Dawn Kim is a second‑generation Korean‑American raised in El Cerrito, California. Her family maintains a blend of South Korean traditions—such as celebrating Chuseok and Lunar New Year, speaking
    Korean at home, and cooking dishes like kimchi and bibimbap—while also participating in the multicultural fabric of the Bay Area. She attends a local Korean cultural enrichment program where she learns
    basic Hangul and traditional songs. The diverse neighborhood exposes her to a variety of languages and customs, fostering an early appreciation for cultural harmony and encouraging her to navigate both
    Korean and American environments seamlessly.
