  career_goals: While still very young, Ma Dawn’s emerging aspirations are shaped by her nurturing family and the harmonious values she cherishes. She expresses a budding interest in helping others, often
    offering comfort to younger siblings and showing excitement when she watches teachers read stories. Her long‑term ambition, as imagined by her parents, is to become a preschool teacher or a community
    caregiver who creates calm, supportive learning spaces where children can explore safely and without pressure. She also hopes to preserve her Korean heritage, aspiring to speak fluently in both Korean
    and English to bridge cultures.
