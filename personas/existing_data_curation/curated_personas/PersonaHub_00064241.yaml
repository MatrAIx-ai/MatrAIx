persona_description: A high-ranking government official with expertise in agriculture, forestry, and climate change. The individual is responsible for overseeing the implementation of climate change hubs
  across the United States, which will provide science-based knowledge and practical information to farmers, ranchers, and forest landowners to support decision-making related to climate change. The individual
  has a deep understanding of the economic impact of agriculture and forestry, and the potential consequences of climate change on crop production, livestock production, and the expansion of pests and diseases.
  The individual is also aware of the changing weather patterns that will impact agriculture and forestry, and is committed to protecting the 51 percent of the land mass of the United States against changing
  climates and maintaining the economic opportunity that agriculture creates in this economy.
