personas:
  professional: Coleen Johns, a retired community organizer turned senior‑center advisory board hopeful, leverages her budgeting savvy, event‑planning prowess, and conflict‑mediation skills to coordinate
    volunteer programs and garden projects, bringing a pragmatic curiosity to every initiative.
  sports: Coleen Johns, a devoted fan of the Houston Astros and Houston Rockets, spends Sunday afternoons watching baseball and basketball while joining a low‑impact senior walking club that meets at Hermann
    Park each spring, balancing leisure viewing with gentle exercise.
  arts: Coleen Johns, an avid supporter of community theater, delights in the works of playwrights like August Wilson and enjoys listening to folk singer Gillian Welch while stitching quilts inspired by
    the brushstrokes of Georgia O'Keeffe.
  travel: Coleen Johns prefers road trips across Texas, having photographed the San Antonio Missions and the historic Alamo, while dreaming of a relaxed weekend in Marfa’s art installations, always planning
    itineraries around her husband’s historic‑preservation interests and their modest travel budget.
  culinary: Coleen Johns blends Southern comfort with Tex‑Mex flair, regularly whipping up shrimp étouffée tacos with fresh cilantro, lime, and fire‑roasted corn tortillas, and often experiments with heirloom
    tomatoes, chipotle peppers, and locally sourced collard greens.
  core: Coleen Johns, a 71‑year‑old garden‑loving genealogist, balances a meticulous budget with spontaneous herb‑spice experiments, never misses a Sunday baseball game, yet habitually misplaces her reading
    glasses.
background:
  cultural: Coleen was raised in a middle‑class Anglo‑American family in suburban Houston, steeped in Southern hospitality and traditional Texan values. Her upbringing emphasized self‑reliance, practical
    problem‑solving, and a strong sense of community service, often expressed through church involvement and neighborhood events. Living in the diverse city of Houston has exposed her to Hispanic cultural
    influences, which she embraces through cuisine and festivals, while still honoring the customs of her own heritage such as BBQ gatherings, line dancing, and celebrating holidays with family.
attributes:
  skills: '["Budget management", "Event planning", "Volunteer coordination", "Basic computer and internet research", "Genealogical research", "Gardening and horticulture", "Culinary arts (Southern and Tex‑Mex
