  hobbies: '["Gardening (native Texan plants and herbs)", "Birdwatching", "Reading historical fiction", "Genealogical research", "Cooking (Southern and Tex‑Mex cuisine)", "Quilting", "Nature photography",
    "Community theater attendance", "Volunteer tutoring at the local library"]'
  career_goals: Although retired, Coleen aims to continue contributing to her community. She aspires to serve on the advisory board of the local senior center, mentor younger volunteers, and lead a community
    garden project. She also plans to compile and self‑publish a memoir that weaves together her family history and reflections on life in Houston. Traveling within Texas to explore historic sites and supporting
    her husband's interest in local historical preservation are also important personal ambitions.
