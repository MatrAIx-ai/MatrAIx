  career_goals: As Xenia matures, she aspires to channel her innate curiosity and love for the arts into a career that blends creativity with cultural advocacy. She envisions becoming a visual artist or
    curator who highlights Puerto Rican heritage within the broader Charlotte community, possibly pursuing a role as a community arts educator or cultural program director. Her long‑term ambition includes
    using art to foster dialogue, empower underrepresented voices, and create inclusive spaces that celebrate both tradition and innovative expression.
