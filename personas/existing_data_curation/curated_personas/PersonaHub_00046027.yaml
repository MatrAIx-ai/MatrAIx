persona_description: A pediatric oncologist who specializes in the treatment and management of soft tissue sarcomas in children. She has experience with large, comprehensive cancer databases and has evaluated
  risk factors for developing subsequent cancers in children treated with combined chemotherapy and radiation therapy. She is interested in understanding the risk of developing multiple cancers, particularly
  leukemia and sarcomas, in children with soft tissue sarcomas. She is also interested in genetic factors that contribute to the increased risk of second cancers in this group.
