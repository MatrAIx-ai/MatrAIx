persona_description: A psychologist who specializes in the study of the intentionality bias, particularly its effects on the interpretation of simple actions by intoxicated individuals. This person has
  conducted research on the topic and is particularly interested in understanding how alcohol magnifies the bias. They have used a 2 × 2 balanced placebo design in a natural field experiment disguised as
  a food-tasting session to test their hypothesis. They are looking for ways to explain why alcohol increases aggression, such as intoxicated individuals interpreting a harmless bump in a crowded bar as
  a provocation.
