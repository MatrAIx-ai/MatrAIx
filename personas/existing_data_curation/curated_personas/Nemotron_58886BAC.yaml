  hobbies: '[''Woodworking'', ''Gardening'', ''Cycling'', ''Documentary watching'', ''Reading non-fiction'', ''Cooking'', ''Community volunteering'', ''Puzzle video games'']'
  career_goals: He aims to build on his meticulous data background to transition into a data‑analysis or business‑intelligence role. Over the next few years he plans to earn a professional certification
    in data analytics, learn intermediate Python for data manipulation, and take on small analytical projects at his current workplace. Ultimately he hopes to become a team lead who mentors junior data
    clerks while maintaining a stable work‑life balance that supports his family.
