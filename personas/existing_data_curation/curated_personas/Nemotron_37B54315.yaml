    at community festivals'', ''Cooking Indian‑American fusion dishes'', ''Collaborative mural projects'']'
  career_goals: Tammy aims to transition from her current volunteer and personal‑project focus into a full‑time role in the nonprofit arts sector. Over the next two years she plans to enroll in a master's
    program in Museum Studies or Arts Administration, while continuing her volunteer docent work at the Lake County Historical Museum. Her long‑term ambition is to become a program director for a community
    arts center in Central Florida, where she can design inclusive workshops, curate socially relevant exhibitions, and secure funding through grant writing. She also hopes to develop her own artistic practice
    and hold solo exhibitions that reflect her multicultural experiences.
