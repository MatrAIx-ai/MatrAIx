personas:
  professional: A community arts organizer, Tammy Ghosh leverages meticulous project‑management skills and a curiosity for unconventional artistic expressions to coordinate mural projects, curate exhibitions
    at the Orlando Museum of Art, and lead workshops that foster cross‑cultural dialogue.
  sports: An outdoor‑enthusiast, Tammy Ghosh regularly hikes the Ocala National Forest, joins a local weekend kickball league with the Lake County Lions, and practices Vinyasa yoga at the community studio,
    balancing cardio and flexibility to sustain the energy needed for event planning.
  arts: A multidisciplinary artist, Tammy Ghosh paints impressionistic landscapes, creates abstract mixed‑media collages, and experiments with digital illustration using Procreate, while drawing inspiration
    from contemporary creators like Kehinde Wiley, Yayoi Kusama, and Banksy, and they often write reviews for the Orlando Sentinel.
  travel: A culturally curious traveler, Tammy Ghosh prefers curated art‑focused trips, having explored the street murals of Berlin, the galleries of Santa Fe, and plans a future pilgrimage to the Venice
    Biennale to blend their love of visual and literary arts.
  culinary: A home‑chef who blends family‑heritage fusion flavors, Tammy Ghosh frequently prepares dishes like spiced chicken tacos, aromatic quinoa bowls, and mango‑chili lassi, while experimenting with
    fresh herbs from their garden and hosting themed dinner parties to showcase these creations.
  core: Tammy Ghosh is an organized, outgoing arts advocate who balances meticulous grant‑writing with spontaneous mural painting, steady budgeting with indulgent culinary experiments, and yoga‑based self‑care
    with occasional weekend hikes.
background:
  cultural: Although Tammy identifies as White, her family name reflects her Indian heritage; her father emigrated from West Bengal in the early 1990s. Growing up in a multicultural household in the Midwest
    before moving to Florida, she was raised with both American and Indian cultural traditions. Holiday celebrations included both Thanksgiving and Diwali, and she was exposed to a range of artistic expressions—from
    classic American literature and Western painting to Indian classical music and folk dance. This bicultural upbringing has shaped her inclusive worldview, fueling her interest in cross‑cultural art projects
    and community engagement.
