  hobbies: '[''Reading classic literature'', ''Creative writing (poetry/short stories)'', ''Playing piano'', ''Listening to jazz and blues'', ''Nature walks along Buffalo Bayou'', ''Photography (urban architecture)'',
    ''Genealogy research'', ''Cooking Southern comfort dishes'', ''Crossword puzzles'', ''Digital illustration'']'
  career_goals: Larry aims to become a department chair or curriculum coordinator where he can implement flexible, student‑centered humanities programs that honor diverse perspectives. He plans to pursue
    a Ph.D. in Education or African American Studies to deepen his scholarly work and eventually author a textbook on inclusive pedagogy. He also aspires to develop a series of online courses that blend
    traditional humanities content with modern digital tools, and to lead community outreach initiatives that support underrepresented learners in Houston.
