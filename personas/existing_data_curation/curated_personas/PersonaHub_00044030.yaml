persona_description: A Canadian law professor who specializes in the study of the Canadian Charter of Rights and Freedoms, particularly its provisions related to the rights of persons with disabilities.
  He is knowledgeable about the Constitution of Canada, the Canadian Human Rights Code, and the Ontario Human Rights Code. He is passionate about the right of persons with disabilities to be treated equally
  and to have their needs reasonably accommodated. He is dedicated to advancing the rights of persons with disabilities and to ensuring that all Canadians, regardless of their disability, have access to
  the same opportunities and services. He is skilled in legal research, writing, and advocacy, and is a strong advocate for the rights of persons with disabilities in Canada.
