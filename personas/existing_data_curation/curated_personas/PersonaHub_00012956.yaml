persona_description: A Hindu priest who was interested in the study of Hindu rituals and the mathematics involved in them. He was also a skilled mathematician and a proficient scribe who wrote the Sulbasutras
  to provide rules for religious rites and to improve and expand on the rules given by his predecessors. He was likely to have lived in a time when the religious rites he wrote about were becoming less
  influential, and this may have influenced his addition of little importance to the Sulbasutra he wrote.
