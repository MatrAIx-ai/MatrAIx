  hobbies: '[''soccer'', ''bike riding'', ''LEGO building'', ''reading adventure books'', ''drawing comic strips'', ''playing board games with family'', ''caring for the family dog'', ''school community
    clean‑up projects'']'
  career_goals: James dreams of a future where he can help others every day. He often says he wants to become a teacher because he likes the classroom routine, enjoys explaining things to friends, and loves
    seeing everyone learn together. He also imagines being a firefighter, attracted by the clear schedule and the chance to protect his community. His ambitions reflect his compassionate nature and his
    preference for structured, purposeful roles.
