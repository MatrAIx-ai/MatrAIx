personas:
  professional: James Perry, a budding team captain on his elementary soccer squad and the informal organizer of his class’s LEGO building sessions, leverages his practical, structure-loving mind to coordinate
    games and projects, though they sometimes forget to bring needed pieces.
  sports: James Perry, a lively member of the Riverdale Rangers U‑8 soccer team who idolizes the United States Men’s National Soccer Team and the New York Yankees, spends weekends biking through the park,
    and proudly wears his team’s jersey during school clean‑up days, while they cheer loudly for every goal.
  arts: James Perry, an avid comic‑strip creator who models his panels after Spider‑Man and the playful world of Adventure Time, devours the Percy Jackson series by Rick Riordan, and sings along to the
    Disney soundtrack of Moana while playing Candy Land with his family, and they often sketch new characters on the back of school worksheets.
  travel: James Perry, a curious traveler who has already explored Disney World, the Grand Canyon, and a weekend trip to Myrtle Beach, prefers spontaneous, snack‑packed day outings with a colorful map of
    the route, and they daydream about visiting Tokyo’s Shibuya Crossing next summer.
  culinary: James Perry, a budding chef who can confidently spread peanut butter on toast, stir pancake batter, and loves topping pepperoni pizza with extra mozzarella, garlic, and a dash of oregano, while
    they occasionally skip their vegetables in favor of extra cheese.
  core: James Perry, a hyper‑energetic seven‑year‑old who balances a love for structured LEGO builds with a habit of misplacing soccer shoes, embodies compassion, spontaneity, and a persistent curiosity
    about the world, and they never miss a chance to help a classmate in need.
background:
  cultural: James is raised in a middle‑class, white New England family in Nashua, New Hampshire. His upbringing reflects the region’s emphasis on community, safety, and participation in local traditions
    such as town fairs, school sports, and seasonal celebrations like Thanksgiving and the Fourth of July. He attends a public elementary school where multicultural awareness is introduced, but his daily
    culture is shaped by suburban values of neighborly respect, volunteerism, and a love of outdoor activities amid the New England landscape.
