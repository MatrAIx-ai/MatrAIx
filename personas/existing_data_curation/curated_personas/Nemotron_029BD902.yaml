  hobbies: '[''Volunteering at farmers market'', ''Church choir'', ''Dance classes'', ''Gardening'', ''Cooking Southern cuisine'', ''Book club'', ''Quilting'', ''Knitting'', ''Dog walking'', ''Hiking'',
    ''Community fitness boot camps'']'
  career_goals: Elizabeth aims to progress to a supervisory or store manager role within the next few years, leveraging her practical retail experience and interest in leadership. She plans to develop management
    capabilities through on‑the‑job training and community college courses in business and personnel management. Long‑term, she envisions opening a small boutique that highlights locally sourced goods and
    provides employment opportunities for youth in Caswell County. She also hopes to lead community outreach initiatives that use the store as a hub for charity drives, educational workshops, and job‑training
    programs.
