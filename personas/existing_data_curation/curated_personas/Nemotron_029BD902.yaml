personas:
  professional: Elizabeth Rostek, a 40‑year‑old retail specialist, combines sharp point‑of‑sale expertise, keen visual merchandising sense, and empathetic conflict‑resolution skills, turning their natural
    curiosity and outgoing energy into a habit of constantly testing new store layouts while keeping the floor running smoothly for both customers and staff.
  sports: Elizabeth Rostek channels their energetic spirit into weekend hikes on the Caswell County Trails, regular community boot‑camp sessions with the ‘Fit‑For‑All’ club, and avidly follows the Charlotte
    Hornets for basketball, cheering on the Carolina Panthers during football season, while keeping a modest weekly mileage of 3‑4 miles on their dog‑walking routes.
  arts: Elizabeth Rostek finds creative balance by singing gospel hymns with their church choir, delighting in the soulful ballads of Aretha Franklin and contemporary folk tunes by Jason Isbell, while their
    evenings are spent quilting inspired by the bold patterns of textile artist Faith Ringgold and they discuss the latest works of novelist Sally Rooney in their book club.
  travel: Elizabeth Rostek prefers short, purposeful road trips that blend sightseeing with community service, such as volunteering at a historic farmstead in Asheville, dreaming of a future culinary tour
    of New Orleans, and they already cherish memories of weekend getaways to the Outer Banks where they collected seashells for their garden projects.
  culinary: Elizabeth Rostek, a confident home cook, masters Southern classics like fried chicken, collard greens, and peach cobbler, while they experiment with heirloom tomatoes, smoked paprika‑infused
    okra gumbo, and occasionally swap recipes with neighbors for vegan twists, and they never miss a chance to bake fresh cornbread using stone‑ground cornmeal.
  core: Elizabeth Rostek blends relentless curiosity with down‑to‑earth pragmatism, juggling a bustling retail career, a thriving community garden, and a choir schedule, all while they habitually forget
    to water houseplants when a new project excites them.
background:
  cultural: Elizabeth was raised in a close‑knit, rural community in Caswell County, North Carolina, where Southern hospitality and community involvement are valued. Her family background reflects working‑class
    traditions, with an emphasis on self‑reliance, respect for local customs, and participation in church and neighborhood events. Growing up, she absorbed the customs of Southern dining, storytelling,
    and a strong sense of neighborly support. While her education concluded with a high school diploma, she has pursued informal learning and community courses, balancing practicality with a curiosity for
    new ideas. Her cultural identity combines the values of traditional Southern life with an openness to progressive community initiatives.
attributes:
  skills: '[''Customer Service'', ''Sales'', ''Point‑of‑Sale System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Product Knowledge'', ''Conflict Resolution'', ''Team Collaboration'',
