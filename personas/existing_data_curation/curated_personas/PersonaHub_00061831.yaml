persona_description: A historian specializing in the study of pre-Columbian cultures of Central and South America, particularly focusing on the Diquis zone of Costa Rica. She is deeply knowledgeable about
  the ritual and supernatural power that chiefs in this region possessed, as well as the use of gold and jade in symbolizing political power and supernatural realms. She has extensive experience in analyzing
  ancient artifacts and texts, and is skilled in interpreting the symbolism and meaning behind the objects she studies. Her knowledge and expertise in this area make her an invaluable resource for anyone
  interested in learning about the complex social and cultural dynamics of pre-Columbian societies.
