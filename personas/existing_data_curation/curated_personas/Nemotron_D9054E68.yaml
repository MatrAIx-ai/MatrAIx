  career_goals: Austin dreams of turning his curiosity and love for creativity into a future career. He imagines himself as an explorer‑artist who travels to discover wildlife and then captures those experiences
    in drawings or cartoons. He also talks about wanting to be an astronaut or a scientist who solves puzzles, reflecting his interest in new ideas and unconventional thinking. Ultimately, he hopes to combine
    art and science in a role that lets him create and discover.
