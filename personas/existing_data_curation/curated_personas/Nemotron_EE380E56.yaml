  career_goals: Although he is not currently employed, J aims to formalize his practical knowledge by completing a GED and launching a small woodworking stall at the annual county fair. He also hopes to
    become a volunteer coordinator for the local community center, where he can mentor at‑risk teens and help expand a neighborhood garden. His overarching ambition is to blend his curiosity for new DIY
    techniques with his commitment to community stability and self‑sufficiency.
