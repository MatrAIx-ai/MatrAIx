  career_goals: Maria aims to transition into a senior design consultancy role where she can champion sustainable product lines for local manufacturers, leveraging her practical mindset to create repeatable,
    low‑stress workflows. She envisions opening a boutique studio that offers personalized design services to small businesses while providing mentorship to emerging designers, allowing her to balance professional
    achievement with a predictable, anxiety‑friendly schedule.
