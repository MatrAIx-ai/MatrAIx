personas:
  professional: Maria Orozco, a seasoned product and visual designer, leverages two decades of hands‑on experience and a STEM background to lead small, cross‑functional teams through meticulous, data‑driven
    design processes that prioritize reliability, low‑stress workflows, and sustainable product solutions for local manufacturers, and they mentor emerging designers while maintaining a predictable schedule.
  sports: Maria Orozco enjoys low‑impact fitness, taking reflective walks along the San Joaquin River, participating in a local yoga studio, playing occasional tennis at the community club, follows the
    Oakland Athletics baseball team, and they belong to a weekend walking group that meets at the river trail.
  arts: Maria Orozco cultivates creative expression through pottery classes, reads historical fiction by authors like Ken Follett, listens to classical guitarist Paco de Lucía while painting, attends intimate
    gallery openings featuring contemporary painters, and they find inspiration in the works of Frida Kahlo.
  travel: Maria Orozco prefers meticulously planned short‑haul trips, often visiting nearby destinations such as Napa Valley for wine tastings, Big Sur for coastal hikes, and occasionally dreams of exploring
    Lisbon’s historic neighborhoods, and they travel with a well‑packed itinerary that balances relaxation with cultural immersion.
  culinary: Maria Orozco cooks a set weekly menu of traditional Spanish dishes like paella with saffron, gazpacho, and tortilla española using fresh vegetables from their garden, favors high‑quality olive
    oil and chorizo, enjoys the predictability of home‑cooked meals, and they occasionally indulge in take‑out sushi when pressed for time.
  core: Maria Orozco, a detail‑oriented designer who channels anxiety into structured routines, finds solace in garden‑fresh meals, quiet river walks, and mentoring, while maintaining a modest, health‑focused
    lifestyle.
background:
  cultural: Born and raised in Seville, Spain, Maria carries a strong Spanish heritage that shapes her values of tradition, family, and practicality. After relocating to Stockton, California, she maintains
    bilingual fluency and regularly celebrates cultural holidays such as Semana Santa. Her design aesthetic subtly incorporates Mediterranean motifs—warm earth tones, tile patterns, and natural materials—reflecting
    her cultural roots while resonating with the diverse community of the San Joaquin Valley.
