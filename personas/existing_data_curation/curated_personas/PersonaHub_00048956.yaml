persona_description: A color camera user who values precision and detail in their color differentiation. They are particularly interested in applications that require high levels of differentiation and
  accuracy, such as in leather crafting or in line scan applications for inspecting continuous, moving objects. They are also aware of the challenges in achieving high levels of color differentiation in
  low light conditions and are looking for color cameras that can accurately estimate color values in areas where light levels are lower. They may also be interested in the different options available for
  color imaging, such as Bayer mosaic and prism-based, multi-sensor technology, and the different applications each technology can be used in.
