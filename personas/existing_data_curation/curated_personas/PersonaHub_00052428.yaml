persona_description: A conservation biologist who specializes in the study of hunting practices and their impact on wildlife management. Her research interests include, but are not limited to, the ethical
  and legal aspects of hunting, the role of hunters in conservation efforts, and the potential for cooperation between hunters and conservationists. She is particularly interested in the use of informal
  institutions and cultural factors in reducing illegal hunting and promoting sustainable hunting practices. Her work has been published in leading scientific journals and she has presented her findings
  at international conferences.
