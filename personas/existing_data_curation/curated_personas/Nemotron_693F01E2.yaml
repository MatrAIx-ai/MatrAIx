personas:
  professional: Terry Alix, a budding explorer in the field of infant cognitive development, applies emerging hand‑eye coordination and early problem‑solving skills while navigating new toys with a calm,
    competitive edge that balances curiosity and practicality and often resists rigid routines.
  sports: Terry Alix enjoys the bright orange mini‑soccer ball at the neighborhood toddlers’ gym, frequently watches the Chicago Cubs on family outings, and favors spontaneous, unstructured play over regimented
    sports drills.
  arts: Terry Alix delights in Baby Mozart lullabies and colorful Miffy cartoons, often experiments with Crayola finger paints in primary colors, reflecting a curious yet practical creative spark.
  travel: Terry Alix’s travel log includes stroller‑friendly trips to Grandma’s house across town and a relaxed beach outing to Ocean City, where flexible itineraries accommodate ample nap time while satisfying
    a budding curiosity for new sensory experiences.
  culinary: Terry Alix favors smooth purees of sweet potato, avocado and banana, occasionally explores soft carrot sticks as finger foods, but stubbornly refuses peas, illustrating a calm palate that chooses
    practical nourishment with occasional quirky defiance.
  core: Terry Alix, a one‑year‑old paradox of calm curiosity and spontaneous competition, greets each day with practical discovery, skeptical observation, and a quirky habit of refusing peas.
