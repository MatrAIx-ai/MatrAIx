personas:
  professional: Janet Overton, a seasoned paralegal with a strong knack for legal research, precise document drafting, and case management, leverages their curiosity‑driven analytical mind and competitive
    edge to implement legal‑tech innovations while mentoring junior staff and maintaining meticulous organization in a South Carolina law office.
  sports: Janet Overton stays active by attending weekly yoga classes, taking morning walks through Beaufort’s historic district, cheerfully supporting the South Carolina Gamecocks football team, and participating
    in a co‑ed social dancing troupe that doubles as a lively cardio workout at coastal festivals.
  arts: Janet Overton nurtures a love for Southern literature, delving into works by Pat Conroy and Eudora Welty with their book club, enjoying live theater at the Beaufort Little Theatre, and listening
    to blues icons like B.B. King and contemporary folk artist Iron & Wine during gatherings.
  travel: Janet Overton prefers heritage‑rich trips, having explored Charleston’s historic district, Savannah’s riverfront, and a weekend retreat to St. Augustine, while planning a future voyage to Williamsburg’s
    colonial sites, always balancing travel costs with family budget constraints and a desire for leisurely, educational itineraries.
  culinary: Janet Overton delights in preparing classic Southern dishes—smoked pork shoulder, shrimp and grits, collard greens simmered with ham hocks, and peach cobbler—using fresh garden herbs like thyme
    and rosemary, and frequently bakes buttery biscuits to share at family gatherings.
  core: Janet Overton blends a competitive drive for professional recognition with an outgoing, community‑focused spirit, yet their high emotional reactivity and occasional anxiety spark self‑criticism
    that they soothe through yoga, gardening, and lively social dancing.
background:
  cultural: Janet grew up in a middle‑class white family in the Lowcountry of South Carolina, where Southern hospitality, respect for tradition, and strong community ties were central values. Her upbringing
    included regular church involvement, seasonal family gatherings featuring Lowcountry cuisine, and a deep appreciation for the region’s rich history, from colonial settlements to Gullah cultural influences.
    She attended local public schools, earned a degree in the arts and humanities, and remained rooted in Beaufort, often engaging in historic preservation activities and neighborhood events that celebrate
    the coastal lifestyle. Her cultural identity blends a love for the natural waterfront environment, a commitment to community service, and a reverence for Southern customs and storytelling.
