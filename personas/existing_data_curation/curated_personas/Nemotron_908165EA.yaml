personas:
  professional: Steven Guinto, a 27‑year‑old aspiring senior UX/UI designer, blends a solid visual communication foundation with a precision‑driven eye for typography and brand identity, channeling their
    critical, competitive nature into rigorous design audits while grounding innovative concepts in the pragmatic, community‑focused values of their Midwestern upbringing, and they habitually seek feedback
    to refine every pixel.
  sports: Steven Guinto fuels their love for active outdoor pursuits by riding with the Madison Cycling Club on Lake Mendota’s shoreline, cheering on the Green Bay Packers and Milwaukee Bucks on game days,
    and joining seasonal intramural soccer leagues, balancing competitive spirit with a laid‑back appreciation for community sports, and they revel in the camaraderie of local game‑watch gatherings.
  arts: Steven Guinto immerses themselves in the Madison arts scene by photographing urban vistas inspired by Ansel Adams, attending installations by Olafur Eliasson, curating playlists that feature Sufjan
    Stevens and The National, and debating the narrative techniques of Wes Anderson films at local film clubs, and they regularly share their work on Instagram, fostering a dialogue between visual design
    and contemporary culture.
  travel: Steven Guinto prefers thoughtfully planned yet flexible trips that blend adventure and design inspiration, having explored the rugged Badlands, the fjords of Iceland, and the modernist architecture
    of Copenhagen while they eye future visits to Norway’s fjord villages and Kyoto’s traditional machiya houses, all while balancing a modest travel budget.
  culinary: Steven Guinto, an enthusiastic home‑brewer and garden‑to‑table cook, delights in crafting hoppy IPAs with locally sourced hops, simmering Swedish meatballs with lingonberry sauce, and whipping
    up seasonal vegetable ratatouille, and they frequently experiment with seasonal produce from their garden, showcasing a moderate culinary skill set that balances experimental brewing with reliable,
    comfort‑food classics.
  core: Steven Guinto channels a relentless, detail‑obsessive drive into both pixel‑perfect UI work and the quest for the perfect brew, and they often sacrifice sleep for an extra design iteration or a
    test batch, while their skeptical yet curious mindset keeps them constantly refining every facet of their life.
background:
  cultural: Steven was raised in a middle‑class white family in Madison, Wisconsin, absorbing Midwestern values of reliability, community involvement, and an appreciation for the region’s natural landscape.
    His European ancestry—primarily German and Scandinavian—shapes his affinity for clean, functional aesthetics and understated design. He participates regularly in local art festivals and values the progressive,
    collaborative arts scene that characterizes the Madison cultural milieu.
