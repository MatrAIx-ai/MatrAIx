  hobbies: '[''Cycling'', ''Photography'', ''Reading classic literature'', ''Strategy board games'', ''Competitive video gaming'', ''Home brewing'', ''Gardening'']'
  career_goals: Steven aims to progress to a senior UX/UI designer role, eventually leading multidisciplinary design teams that balance innovative concepts with pragmatic execution. He aspires to shape
    the visual strategy of a forward‑thinking technology firm in the Midwest, and later launch his own boutique consultancy focused on sustainable, user‑centric branding for socially responsible businesses.
