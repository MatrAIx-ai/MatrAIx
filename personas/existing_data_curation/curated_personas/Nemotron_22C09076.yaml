  hobbies: '["Visiting contemporary art galleries", "Reading speculative fiction and science non‑fiction", "Hiking and nature walks", "Arduino and DIY electronics projects", "Acoustic guitar playing", "Digital
    photography", "Cooking experimental dishes", "Board games with close friends"]'
  career_goals: Timothy aims to transition from his current hiatus into a full‑time role where he can leverage both his analytical and creative strengths. He is targeting positions such as data scientist,
    research analyst, or UX‑focused product developer in industries that intersect technology and sustainability. In the longer term, he envisions launching a boutique consultancy that helps small businesses
    turn data insights into compelling visual narratives, or pursuing a master’s degree in environmental engineering to deepen his impact on green technology solutions. He also wishes to contribute to community
    art‑tech projects that marry his love of art and innovative thinking.
