personas:
  professional: Timothy Morris, a 27‑year‑old data‑driven creator, merges Python, statistical modeling, and Arduino tinkering with a knack for visual storytelling, turning raw research into sleek UX prototypes
    that reflect his curiosity and disciplined yet flexible work ethic.
  sports: Timothy Morris enjoys solo hikes along Cedar Creek Trail in the spring, joins a weekday cycling group that meets at the Cedar Rapids Recreation Center, and follows the Iowa Hawkeyes football team
    and the Cedar Rapids RoughRiders for a dose of local sports camaraderie, while keeping a modest routine of bodyweight circuits at home.
  arts: Timothy Morris frequents contemporary galleries and the Cedar Rapids Museum of Art, draws creative fuel from artists like Yayoi Kusama and musician Tame Impala, captures trail sunsets in black‑and‑white
    photography, and relaxes by strumming acoustic covers of Joni Mitchell and Neil Young during intimate jam sessions.
  travel: Timothy Morris prefers meticulously planned weekend getaways that blend nature and design, having trekked the Redwood forests of California, explored the street art of Berlin, and is planning
    a sustainable eco‑retreat in New Zealand, while balancing travel costs with a modest savings plan.
  culinary: Timothy Morris's experimental kitchen skills shine in dishes like miso‑glazed cauliflower tacos, sous‑vide beet risotto, and smoky jalapeño‑infused dark chocolate truffles, favoring ingredients
    such as turmeric, kombucha, and smoked paprika, while often ordering artisanal coffee beans to fuel his late‑night projects.
  core: Timothy Morris is a curiosity‑driven technophile who blends data science with art, lives on a steady savings rhythm yet indulges in high‑tech gadgets, hikes to clear his mind, and occasionally burns
    the midnight oil on code, guitar, or experimental recipes.
background:
  cultural: Timothy grew up in Cedar Rapids, a Midwestern city with deep roots in agriculture, manufacturing, and a growing arts scene. His family’s heritage combines German and Irish ancestry, typical
    of many white Iowa households, and it emphasized self‑reliance, modesty, and community involvement. These cultural values shape his reserved demeanor, his comfort with solitude, and his preference for
    small, meaningful gatherings. At the same time, the region’s support for local museums, music festivals, and maker‑spaces nurtured his appreciation for art and unconventional ideas. This blend of Midwestern
    pragmatism and a curiosity‑driven openness informs both his personal interests and his professional aspirations.
attributes:
  skills: '["Python", "Java", "C++", "R", "MATLAB", "Statistical Modeling", "Data Visualization", "Technical Writing", "Project Management", "Graphic Design", "Digital Photography", "Arduino & Embedded
