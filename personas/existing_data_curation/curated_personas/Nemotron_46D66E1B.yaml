  career_goals: Adrielle aims to move into a supervisory role within the restaurant, eventually becoming a floor manager or hospitality trainer. She plans to earn a certification in restaurant management
    and leverage her competitive streak to lead her venue to regional service awards. Long‑term, she envisions opening a small community café that highlights Southern comfort food with a health‑conscious
    twist, serving as a hub for local workshops and cultural events.
