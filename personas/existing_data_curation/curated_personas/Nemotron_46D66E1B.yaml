personas:
  professional: Adrielle Evans, a seasoned front‑of‑house professional with a knack for memorizing complex orders, mastering cash handling, and diffusing peak‑hour pressures, channels their curiosity and
    competitive drive into mentoring staff, and they maintain the organized flexibility required to keep a bustling restaurant running smoothly.
  sports: Adrielle Evans enjoys cheering for the Norfolk Tides baseball team and the Virginia Beach professional women's soccer squad, and they stay active by joining a local line‑dancing club and taking
    brisk morning walks along the Elizabeth River during the milder spring and fall seasons.
  arts: Adrielle Evans finds creative fulfillment quilting while listening to the timeless crooning of Patsy Cline, the soulful blues of B.B. King, and the modern folk storytelling of Rhiannon Giddens,
    often attending local theater productions of classic Southern dramas that echo the community narratives they help preserve.
  travel: Adrielle Evans prefers road‑trip adventures that blend cultural immersion with comfort, having explored historic Savannah, Charleston, and New Orleans, while dreaming of a culinary pilgrimage
    to Oaxaca, Mexico, and a leisurely European sojourn to the vineyards of Bordeaux, and they plan these journeys around their volunteer schedule and family commitments.
  culinary: Adrielle Evans expertly prepares Southern comfort staples such as shrimp and grits, collard greens, and fried chicken, infusing them with fresh basil, thyme, and a hint of smoked paprika from
    their herb garden, and they revel in experimenting with global twists like miso‑glazed pork ribs or harissa‑spiced sweet potato mash.
  core: Adrielle Evans blends relentless curiosity with calm resilience, turning hospitality challenges into opportunities for mentorship, while they love Southern food, community festivals, and line dancing,
    fueling a life rich in flavor, rhythm, and disciplined optimism.
background:
  cultural: Adrielle is an African American woman born and raised in the Chesapeake‑Suffolk region of Virginia. Her upbringing was shaped by Southern Black traditions, church fellowship, and a strong emphasis
    on family and community resilience. She celebrates Juneteenth, Kwanzaa, and local heritage festivals, often incorporating soulful music, storytelling, and Southern cuisine into her life. Her cultural
    identity blends the historic legacy of the African diaspora with the coastal influences of the Hampton Roads area, fostering a deep sense of belonging and pride.
