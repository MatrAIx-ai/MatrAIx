  career_goals: Andrew imagines a future where he can blend his love for art with his desire to help others. He hopes to become an illustrator or animator who creates stories that inspire friendship, or
    perhaps a teacher or youth organizer who uses creative projects to bring people together. He also dreams about caring for animals as a veterinarian, reflecting his compassionate nature.
