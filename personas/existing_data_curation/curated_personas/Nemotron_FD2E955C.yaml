personas:
  professional: Andrew Alipio, a budding creative explorer who blends a love for sketching cartoons, watercolor painting, and LEGO engineering into spontaneous, unstructured projects, showcases his curiosity
    and compassion for storytelling.
  sports: Andrew Alipio, a lively participant in the Desert Springs Youth Soccer Club and an avid fan of FC Dallas and the local El Paso Locomotive FC, dashes across the sand‑covered field with enthusiastic
    dribbles, yet often skips stretching afterward, resulting in the occasional scraped knee.
  arts: Andrew Alipio, an enthusiastic creator who spends afternoons drawing cartoon heroes like Spider‑Man, painting watercolor desert sunsets, and composing simple beats on a tablet inspired by classic
    rock legends such as The Rolling Stones, country ballads by Johnny Cash, and folk melodies that play at home.
  travel: Andrew Alipio, a curious explorer who has trekked the Franklin Mountains, collected rocks at Carlsbad Caverns, dreams of riding roller coasters at Disneyland and wandering the ancient streets
    of Kyoto, but usually relies on his parents for road‑trip planning and prefers short drives over long flights.
  culinary: Andrew Alipio, a budding food fan who relishes pepperoni pizza, cheesy chicken quesadillas, fresh strawberries, and will only eat broccoli if it’s cut into superhero shapes, often stirring spaghetti
    sauce with a wooden spoon while humming his favorite rock riffs.
  core: Andrew Alipio, an eight‑year‑old imagination engine who fuses cartoon art, LEGO architecture, and desert wanderings into a compassionate, spontaneous worldview, even if they sometimes lose track
    of deadlines or forget to stretch after soccer.
background:
  cultural: Andrew is a white American child raised in El Paso, Texas, a border city where Mexican‑American culture is a daily presence. While his family’s heritage traces back to European (primarily French‑American)
    roots, his upbringing blends English and Spanish language exposure, celebrations of both Fourth of July and local traditions like Cinco de Mayo, and a love for Texan foods alongside Mexican dishes.
    This multicultural environment nurtures his openness to new ideas and his appreciation for diverse artistic expressions.
