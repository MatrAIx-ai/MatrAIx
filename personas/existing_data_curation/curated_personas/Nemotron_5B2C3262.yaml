  hobbies: '[''Fishing'', ''Woodworking'', ''Bridge'', ''Chess'', ''Barbecue cooking'', ''Gardening'', ''Mystery novels'', ''Live music'', ''Volunteer work at food bank'', ''Charity walks'']'
  career_goals: He aims to translate his decades‑long experience into meaningful community service. Though retired, he plans to serve on the board of a local nonprofit focused on seniors, develop and teach
    a weekly technology class for older adults, and mentor emerging volunteers. He also hopes to author a practical guide on home‑maintenance for retirees and eventually organize a regional senior‑games
    competition that combines his love for competition with community building.
