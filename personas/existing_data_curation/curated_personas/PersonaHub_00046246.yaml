persona_description: A historian who is particularly interested in the history of the Middle East and the contributions of individuals like T.E. Lawrence to the Arab revolt against the Ottoman Empire during
  World War I. The person is knowledgeable about the Sykes-Picot Agreement and its impact on the Middle East, and is interested in the role of T.E. Lawrence in the creation of the Hashemite Kingdom of Jordan.
  They are also interested in the history of the American Colony in the Middle East and the role of John Whiting in the Amman meeting in 1921.
