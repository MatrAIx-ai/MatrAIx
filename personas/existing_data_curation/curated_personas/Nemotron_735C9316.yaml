  career_goals: Eufemia aspires to a career that merges her fascination with the natural world and her knack for creating digital experiences. She dreams of becoming a wildlife biologist or veterinarian,
    where she can observe and protect local wildlife and care for animals. Simultaneously, she envisions developing educational video games or interactive apps that teach kids about ecology, blending her
    Scratch expertise with her practical mindset. In the future, she hopes to lead community initiatives in Ellabell, such as a sustainable garden or an after‑school nature club, allowing her to use her
    organizational skills in a flexible, collaborative setting.
