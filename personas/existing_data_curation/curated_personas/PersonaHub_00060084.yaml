persona_description: A user who is interested in making choices or selecting options from a list. This person is likely to be looking for a way to present multiple options that can each be selected, offer
  help or error handling for simple settings, and provide confirmation after selection. This person is also interested in progressive disclosure, using text links and tooltips to keep information hidden
  but close by, and focusing on positive labels for checkboxes. This person is also likely to be interested in parallel labels, using the same structure for filters for transport options, types of notifications
  to receive, or additional services to purchase.
