  hobbies: '[''Visiting art galleries and museums'', ''Painting and mixed-media art'', ''Cooking Indian-fusion dishes'', ''Reading contemporary fiction and art theory'', ''Traveling to culturally rich destinations'',
    ''Photography'', ''Organizing cultural events (Diwali, film nights)'', ''Participating in Toastmasters'', ''Leading a trivia team'', ''Playing badminton'', ''Practicing yoga'']'
  career_goals: Disha aspires to move into academic leadership by becoming the chair of her department within the next five years. She plans to launch an interdisciplinary major that merges visual arts,
    digital media, and cultural studies, positioning her institution as a hub for innovative arts education. To support this vision, she intends to complete a Ph.D. in Education Policy, strengthening her
    work on equitable curriculum reform. Disha aims to expand her research portfolio with peer‑reviewed publications, influence state education policy through advisory committees, and mentor emerging faculty.
    Additionally, she seeks to develop community partnership programs that bring arts education to under‑served youth and eventually author a textbook on inclusive pedagogy.
