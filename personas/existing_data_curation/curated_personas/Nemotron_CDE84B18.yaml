  career_goals: Joon dreams of becoming a multimedia creator—perhaps an animator, game designer, or YouTube content producer—who can blend art, technology, and storytelling to share fresh ideas with a broad
    audience. He aspires to lead a team in a future robotics or game‑development competition, aiming to win regional awards. Over the long term, he hopes to use his sociable nature to inspire other kids,
    maybe as a youth workshop facilitator, while also mastering the balance between his competitive drive and collaborative spirit.
