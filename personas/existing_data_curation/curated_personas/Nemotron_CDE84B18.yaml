personas:
  professional: An aspiring junior inventor, Joon Whang channels their curiosity and love for robotics into building LEGO-based machines, often leading school debate club presentations with a confident,
    talkative flair.
  sports: A budding outdoors enthusiast, Joon Whang hikes the Cascades on weekend family trips, plays on the Bellevue Youth Soccer Club, and cheers for the Seattle Seahawks, balancing structured team practice
    with spontaneous park skate sessions.
  arts: A creative sketcher and pianist, Joon Whang spends evenings drawing comic characters inspired by classic manga artists like Osamu Tezuka and practicing piano pieces ranging from Beethoven to contemporary
    pop hits, often performing in school drama productions.
  travel: An eager explorer, Joon Whang enjoys short road trips to nearby destinations like Mount Rainier and Vancouver, dreams of visiting the historic temples of Kyoto, and prefers family‑guided adventures
    that mix nature hikes with tasting local street foods.
  culinary: A budding home chef, Joon Whang loves whipping up rice bowls topped with marinated beef strips, sautéed veggies, and a side of spicy fermented cabbage, while their favorite snack remains the
    crunchy seaweed‑wrapped rice rolls from the neighborhood market.
  core: Joon Whang is a talkative, curious ten‑year‑old who blends a competitive spark with creative pursuits, juggling sketchbooks, LEGO builds, and piano practice while often worrying about performance
    and money.
background:
  cultural: Joon comes from a Korean‑American family that values education, community, and cultural heritage. He grows up bilingual, speaking English at school and Korean at home, and participates in weekend
    Korean language classes. Family traditions such as celebrating Seollal (Lunar New Year) and Chuseok (harvest festival) are woven into his life, giving him a deep appreciation for Korean food, music,
    and folklore. Living in Bellevue's diverse Asian community, Joon balances these cultural roots with mainstream American experiences, fostering a unique perspective that enriches his curiosity and creative
    outlook.
