persona_description: A researcher who is passionate about understanding the complex dynamics of household fuel transitions, particularly in low- and middle-income countries. This person is interested in
  exploring the enabling environments for fuel transitions, including the role of consumers, community organizations, political leaders, non-governmental organizations, and fuel manufacturers/providers.
  They are skilled in mixed methods research, with a focus on using both quantitative and qualitative methodologies to compare rhetoric, perceived impact, and reality. This person is interested in the socio-economic
  factors that affect transition from biomass to cleaner fuels and is looking for a diverse team with expertise in policy-making, community engagement, and energy poverty analysis. They are looking for
  a project that will provide space for stakeholders to explain local barriers and facilitators of adoption and develop a model of socio-economic characteristics that affect transition.
