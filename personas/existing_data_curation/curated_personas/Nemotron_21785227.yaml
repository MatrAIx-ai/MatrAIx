  hobbies: '[''Photography'', ''Sketching/Digital painting'', ''Hiking and nature walks'', ''Strategy indie video gaming'', ''Reading speculative fiction'', ''DIY electronics'', ''Attending intimate art
    openings'']'
  career_goals: He aims to earn a certification in Emergency Medical Dispatch (EMD) and enroll in a community‑college program for Communications Technology within the next two years. His long‑term ambition
    is to advance to a supervisory or communications‑center manager role for a regional public‑safety agency, where he can implement more flexible, technology‑driven workflows. Simultaneously, he dreams
    of cultivating a side career as a visual artist or indie‑game concept designer, leveraging his love of art and new ideas to create immersive story‑elements or digital illustrations.
