  user 1 personas: 'My parents used to work in politics , until they discovered the goodness within themselves.

    I don t like wearing pants when i don t have to.

    I enjoy john grisham movies , but not his books.

    My girlfriend tells me she s going to leave me almost every day.'
  user 2 personas: 'I live a nomadic lifestyle and travel frequently.

    I work remotely as a programmer.

    I am currently traveling in japan.

    I can speak three languages.

    I haven t gone home in over two years.'
  Best Generated Conversation: 'User 1: Hi, I''m [user 1''s name].

    User 2: Hi, I''m [user 2''s name].

    User 1: What are you up to?

    User 2: I''m currently traveling in Japan.

    User 1: That''s amazing! I''ve always wanted to travel to Japan.

    User 2: It''s a beautiful country. I''ve been here for a few weeks now and I''m still not tired of it.

    User 1: What have you been doing while you''re there?

    User 2: I''ve been exploring the different cities and towns, trying the local food, and seeing all the historical and cultural sites.

    User 1: That sounds like a lot of fun! I''m sure you''re having a great time.

    User 2: I am. I''m so glad I decided to come here.

    User 1: Do you have any plans to travel anywhere else after Japan?

    User 2: I''m not sure yet. I might go to Europe or South America next.

    User 1: Those are both great places to visit. I''m sure you''ll have a great time wherever you go.

    User 2: Thanks. I''m looking forward to it.

    User 1: So, what do you do for a living?

    User 2: I work remotely as a programmer.

    User 1: Oh, that''s cool. I''ve always wanted to be a programmer.

    User 2: It''s a lot of fun. I get to work on different projects all the time and I can work from anywhere in the world.

    User 1: That sounds like a great job.

    User 2: It is. I''m very lucky to have it.

    User 1: So, what languages do you speak?

    User 2: I speak English, Spanish, and Japanese.

    User 1: Wow, that''s impressive! I only speak English.

    User 2: It''s not that hard. I just picked them up as I went along.

    User 1: I guess I''m just not that good at languages.

    User 2: Everyone has their strengths and weaknesses. You''re probably good at something else that I''m not good at.

    User 1: I guess that''s true.

    User 2: So, what do you do for fun?

    User 1: I like to read, write, and play video games.

    User 2: Oh, that''s cool. I like to read and play video games too.

    User 1: We should play video games together sometime.

    User 2: That would be fun.

    User 1: Great. We can exchange gamertags.

    User 2: Sounds good'
