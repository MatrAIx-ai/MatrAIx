  career_goals: Frances aims to transition into a senior leadership role within her insurance firm, such as Claims Management Supervisor or Training and Development Specialist, where she can mentor junior
    adjusters and shape best-practice protocols. She plans to earn the CPCU (Chartered Property Casualty Underwriter) designation and an AIC (Associate in Claims) certification to solidify her expertise.
    Over the next five years, she hopes to spearhead a pilot program for handling complex fraud investigations, integrating data-analytics tools to improve detection rates. Ultimately, she envisions a consulting
    career that blends her investigative acumen with her passion for community education about insurance literacy and consumer rights.
