  hobbies: '[''reading (medical memoirs, nature essays, classic literature)'', ''herb gardening'', ''hiking Appalachian trails'', ''birdwatching'', ''photography'', ''knitting and crocheting'', ''journaling
    and mindfulness'']'
  career_goals: Kiley aims to advance her nursing credentials by completing an Associate Degree in Nursing (ADN) and becoming a Registered Nurse within the next three years. She is interested in specializing
    in hospice and palliative care, where her compassion for end‑of‑life patients can be fully utilized. She also aspires to mentor new LPNs, developing a supportive training program that addresses emotional
    resilience. Long‑term, she hopes to assume a charge nurse role in a community health clinic, coordinating care for rural patients while advocating for increased mental‑health resources for healthcare
    staff.
