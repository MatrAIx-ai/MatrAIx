personas:
  professional: Kiley Whitworth, a 15‑year Licensed Practical Nurse, combines precise clinical skills—vital signs monitoring, IV management, wound care, and patient education—with a compassionate, cooperative
    demeanor shaped by close‑knit mountain community values, and a curiosity that propels their goal to become a hospice‑focused Registered Nurse and mentor new nurses.
  sports: Kiley Whitworth maintains fitness through solitary trail hikes in the mountain ranges, seasonal birdwatching walks with the New River Trail Hikers club, occasional yoga sessions at home, and avidly
    follows the West Virginia Mountaineers basketball team and the Pittsburgh Steelers football team, preferring low‑impact, nature‑based exercise over crowded gyms.
  arts: Kiley Whitworth expresses their creativity by knitting and crocheting patterns inspired by Carter Family folk songs, photographing sunrise over native wildflowers, and immersing themselves in classic
    literature from Jane Austen and Emily Dickinson, while their playlist often includes Doc Watson and The Avett Brothers, reflecting a deep appreciation for traditional Appalachian storytelling through
    music.
  travel: Kiley Whitworth prefers thoughtfully planned solo getaways to serene natural destinations—having trekked the Blue Ridge Parkway and Shenandoah National Park, yearning to explore the Scottish Highlands
    and a quiet cabin in the Catskills—while balancing travel costs with family obligations and a modest income that guides them toward off‑season, budget‑friendly itineraries.
  culinary: Kiley Whitworth enjoys cooking rustic, herb‑forward meals—such as herb‑infused chicken broth, wildflower honey biscuits, smoked trout with dill, and apple crumble using locally‑grown apples—drawing
    on fresh mint, thyme, and sage from their garden, while their modest culinary skill is complemented by a love for experimenting with seasonal ingredients and occasional foraging trips.
  core: Kiley Whitworth blends solitary mountain‑rooted serenity with fierce compassion, balancing a diligent, curiosity‑driven nursing career against bouts of anxiety that fuel meticulous journaling, frugal
    budgeting, and an occasional obsession with perfecting every stitch in their knitting.
background:
  cultural: Kiley grew up in the Appalachian region of West Virginia, shaped by close‑knit community values, self‑reliance, and a modest lifestyle. The cultural emphasis on neighborly assistance, deep religious
    roots, and respect for tradition influence her compassionate and cooperative demeanor. Her upbringing in a small town like Hinton exposed her to the challenges of rural healthcare access, reinforcing
    her commitment to serve underserved populations. While identifying with mainstream White American culture, she appreciates local folk music, storytelling traditions, and the rugged natural landscape,
    which informs her love for solitary outdoor pursuits.
attributes:
  skills: '[''patient assessment'', ''vital signs monitoring'', ''medication administration'', ''wound care'', ''IV therapy'', ''catheter management'', ''patient education'', ''emotional support and counseling'',
