  career_goals: Tina aims to earn the Master Pipefitter certification within the next two years, positioning herself for senior supervisory roles on large commercial and industrial projects. She aspires
    to become a foreman or project manager, leading a crew that prioritizes safety, quality, and efficiency. Long‑term, she envisions launching her own independent pipefitting contractor in central Wisconsin,
    focusing on energy‑efficient steam and hydronic systems for green building projects. She also wants to develop a mentorship program for women entering the trades, helping diversify the workforce. Balancing
    her competitive drive with a desire for reduced stress, she plans to negotiate predictable schedules and invest in continuing education on emerging technologies.
