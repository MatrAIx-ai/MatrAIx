personas:
  professional: Tina Selph, a veteran pipefitter and steamfitter in central Wisconsin, leverages 15 years of blueprint interpretation, welding, and CAD routing expertise while channeling her meticulous,
    competitive nature into flawless project execution and mentorship of apprentices.
  sports: Tina Selph hikes the Kettle Moraine State Forest with the local Trailblazers Hiking Club each weekend, follows the Green Bay Packers and Milwaukee Bucks on game days, and incorporates a disciplined
    strength‑training routine at the Willard Gym to offset the physical demands of pipefitting, treating fitness as both a stress outlet and a personal competition.
  arts: Tina Selph curates industrial‑themed photography inspired by Edward Burtynsky, paints watercolor city‑nature mash‑ups echoing Joseph Zbukvic’s fluid style, restores vintage metal furniture, and
    regularly attends UW‑Stevens Point gallery openings featuring regional artists such as Mary O’Connor.
  travel: Tina Selph prefers meticulously planned road trips that blend scenic hikes—like a recent venture to the Upper Peninsula’s Pictured Rocks—with quick stops at industrial marvels such as Detroit’s
    former Packard Plant, and dreams of photographing Iceland’s geothermal steam fields during the next summer break.
  culinary: Tina Selph enjoys cooking hearty Midwestern meals like bratwurst with sauerkraut and cheese curds, experiments with smoked paprika‑infused quinoa salads, and treats themselves to artisanal cheese
    boards featuring aged cheddar and blue cheese while occasionally splurging on fine dining at Madison’s L’Eagle restaurant.
  core: Tina Selph fuses a pipefitter’s precision with an artist’s eye, turning blueprints into canvases while battling a competitive streak and a habit of over‑worrying that fuels relentless self‑improvement.
background:
  cultural: Tina grew up in a middle‑class white family in central Wisconsin, the youngest of three siblings. Her ancestry is primarily German and Norwegian, typical of the Upper Midwest, and she was raised
    in a Lutheran community that emphasized hard work, self‑reliance, and modesty. The region’s strong blue‑collar traditions, close‑knit small‑town culture, and seasonal outdoor recreation have shaped
    her values. Local traditions such as county fairs, community concerts, and the annual Stevens Point Art Fair have nurtured her appreciation for both craftsmanship and the arts. While she identifies
    with mainstream Midwestern cultural norms, she also embraces the region’s growing interest in sustainable living and gender diversity in trades.
