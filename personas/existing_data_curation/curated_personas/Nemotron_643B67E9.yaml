  career_goals: He aims to complete his high school education, either by finishing the remaining grades or earning a GED, and then enroll in a community-college trade program focused on automotive technology
    or electrical work. Andrew hopes to become a certified technician so he can secure a stable, well-paid job that supports his family and community. While he values practical trades, his curiosity about
    software leads him to keep exploring coding on the side, with a long-term ambition to combine his technical skills into a role that blends hardware repair with simple software development, such as building
    custom diagnostic tools. He also wishes to volunteer at the local youth center to mentor younger kids and develop his leadership abilities.
