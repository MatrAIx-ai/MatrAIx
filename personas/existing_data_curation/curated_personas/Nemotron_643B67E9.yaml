personas:
  professional: Andrew Joyner, a high-school junior who spends afternoons in the school robotics club and evenings meticulously assembling model airplane kits, blends a curiosity for new tech with a practical,
    organized approach, making them a reliable go-to for classmates who need a calm, detail-oriented problem-solver.
  sports: Andrew Joyner enjoys weekend hikes with the local Wayne National Forest Trail Club, casts a line on the Ohio River for catfish and bass in the spring, and follows the Cincinnati Reds, Cleveland
    Browns, and Ohio State Buckeyes football teams, keeping a low-key fitness routine that balances solitary nature walks with occasional pickup basketball games.
  arts: Andrew Joyner finds solace strumming acoustic guitar to John Mayer and The Beatles while devouring Brandon Sanderson, Ursula K. Le Guin, and Neil Gaiman novels, and channels the imagination sparked
    by these creators into short sci-fi stories and meticulous model-painting that reflects an understated yet vivid artistic sensibility.
  travel: Andrew Joyner prefers self-planned road trips to nearby natural spots like Hocking Hills State Park and a school-organized visit to Washington, D.C., while dreaming of a future adventure to Tokyo's
    robotics expo and a summer hike through the Canadian Rockies, balancing modest family budget constraints with a love for both cultural immersion and outdoor exploration.
  culinary: Andrew Joyner's culinary taste leans toward comfort foods such as homemade mac and cheese with sharp cheddar, grilled trout seasoned with lemon and dill fresh from their fishing trips, and fluffy
    pancakes drizzled with maple syrup, while their cooking skill level hovers at confident amateur, often experimenting with brown-butter spaghetti tossed with fresh sage.
  core: Andrew Joyner is a quietly meticulous teen whose love of tinkering, penchant for solitary creativity, and lingering anxiety create a blend of thoughtful problem-solving punctuated by occasional
    over-thinking and snack-centric study marathons.
background:
  cultural: Andrew grew up in Mingo Junction, a small working-class town in eastern Ohio with deep roots in the steel industry and Appalachian culture. His family's values reflect the region's emphasis
    on hard work, self-reliance, modesty, and close community ties. Local traditions such as high-school football games, town fairs, and church gatherings have shaped his sense of belonging. He identifies
    with a Midwestern, white cultural background that values practicality and cooperation, and he often hears stories about the town's industrial past and the resilience of its residents. These influences
    contribute to his cooperative nature, his desire for stable, hands-on work, and his concern for the well-being of his neighbors.
