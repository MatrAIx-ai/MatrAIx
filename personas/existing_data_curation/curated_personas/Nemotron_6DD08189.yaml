  hobbies: '[''Reading historical biographies'', ''Native Texas gardening'', ''Birdwatching'', ''Hill Country hiking'', ''Knitting'', ''Baking pies'', ''Journaling'', ''Volunteer reading at library'']'
  career_goals: Rita’s current ambition is to channel her educational expertise into community‑focused, low‑stress roles that allow her to work independently or in small, collaborative settings. She plans
    to volunteer as a curriculum mentor for local after‑school programs, develop a series of printable resource guides for homeschooling families, and serve on the board of a nonprofit focused on adult
    literacy. In the longer term, she hopes to author a practical guidebook on integrating mindfulness practices into classroom environments, thereby combining her concern for stress reduction with her
    instructional background.
