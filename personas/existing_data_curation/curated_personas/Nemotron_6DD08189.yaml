personas:
  professional: Rita Usta, a seasoned educator with over three decades of classroom and administrative experience, leverages their graduate training in education to design meticulous curricula and data‑driven
    instructional resources, and they excel in low‑stress, collaborative volunteer roles that let them work independently and mentor teachers and parents.
  sports: Rita Usta enjoys low‑impact fitness, joining a senior walking club that meets weekly to trek the Hill Country trails, and they cheer on the Dallas Cowboys on Sundays and support the Texas Rangers
    during baseball season, while occasionally practicing gentle yoga at a community center to ease joint stiffness.
  arts: Rita Usta finds solace in classic literature and folk music, often rereading biographies of Robert E. Lee and Hilary Mantel's novels while listening to John Prine and Alison Krauss, and they attend
    occasional performances by the Austin Symphony Orchestra, appreciating works by painter Andrew Wyeth.
  travel: Rita Usta prefers thoughtfully planned trips that combine quiet nature with historic depth, having visited the bluebonnet trails of Ennis, the desert art installations of Marfa, and the colonial
    museums of Williamsburg, and they dream of a slow‑paced pilgrimage to the monasteries of Catalonia.
  culinary: Rita Usta is a confident baker who expertly crafts apple‑cinnamon pies and pecan praline tarts, infusing their native‑Texas garden herbs like rosemary and sage into savory dishes, and they enjoy
    pairing these creations with a glass of Texas Hill Country Pinot Noir.
  core: Rita Usta blends meticulous organization with a love for solitary garden walks, historic reading, and quiet volunteering, while they often over‑worry about every detail, even as they savor a fresh‑baked
    pecan pie.
background:
  cultural: Rita is a white Texan whose family roots trace back to German settlers who arrived in Central Texas in the late 19th century. She was raised in a modest, middle‑class community that valued education,
    hard work, and quiet civic participation. The region’s blend of Southern hospitality and the spacious, natural landscape of the Hill Country shaped her appreciation for community service, self‑reliance,
    and time spent outdoors. While she respects traditional Texan customs—such as local festivals and home‑cooked meals—her personal preferences lean toward solitary, reflective experiences rather than
    large‑scale social gatherings.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Lesson Planning'', ''Educational Technology Integration'', ''Data‑Driven Assessment'', ''Project Coordination'', ''Budget Management'',
