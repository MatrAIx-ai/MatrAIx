  hobbies: '[''Fishing at Canyon Lake'', ''Gardening (vegetables and herbs)'', ''Cooking traditional Kerala cuisine'', ''Watching documentary series on engineering and logistics'', ''DIY home repair projects'',
    ''Attending small‑group meetings at the local Syrian Christian church'', ''Listening to Carnatic and devotional music'', ''Reading technical manuals'']'
  career_goals: Looking ahead, Venkata aims to transition from a front‑line mover to a supervisory role such as shift lead or warehouse coordinator, where he can apply his practical knowledge while mentoring
    younger workers. He plans to earn a certification in supply‑chain management and learn more advanced warehouse‑management systems to increase operational efficiency. In the longer term, he envisions
    starting a modest family‑run hauling and moving service that leverages his network of contacts in the Canyon Lake area, providing a steadier, less physically demanding income as he approaches retirement.
    Throughout, he remains attentive to financial stability and wants to ensure his health is protected from the wear and tear of manual labor.
