persona_description: A military historian who specializes in the history of the Atlantic Seaboard, particularly the strategic decisions and military bases established during the 18th century. His research
  interests include the history of naval strategy, military history of Nova Scotia, and the development of naval bases in Canada. He is particularly interested in the history of Halifax, the key to the
  North Atlantic, and the role of the 40th Regiment in establishing the town. He is also interested in the history of the naval militia and the role of these units in protecting British settlements and
  in the development of militias in the Maritime provinces.
