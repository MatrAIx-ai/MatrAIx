    regulations (financial, healthcare, environmental)'', ''Creative problem solving'', ''Presentation design with artistic flair'', ''Adaptive project management'', ''Proficiency with compliance software
    (MetricStream, SAP GRC)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Hiking in the Berkshire hills'', ''Gardening (perennial flowers, herbs)'', ''Reading historical biographies and contemporary
