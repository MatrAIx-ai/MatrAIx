    the town arts council'']'
  career_goals: Jannet aims to progress into a senior leadership role such as Compliance Director, where she can shape a culture that balances rigorous standards with flexibility and innovation. She hopes
    to spearhead the integration of emerging technologies, like AI‑driven monitoring tools, to streamline risk assessments while maintaining a human‑centered approach. Mentoring younger compliance professionals
    and leading cross‑functional ethics workshops are also central to her vision. Long‑term, she envisions channeling her expertise into community outreach, offering pro‑bono compliance guidance for local
    non‑profits and establishing an arts‑focused ethics program that highlights the intersection of creativity and corporate responsibility.
