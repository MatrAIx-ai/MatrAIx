personas:
  professional: Jannet Tilley, a veteran compliance officer with a knack for translating dense regulations into vivid, art‑inspired presentations, leverages their curiosity and collaborative nature to craft
    flexible, technology‑driven risk programs while occasionally letting deadlines slip because they prioritize flexibility over strict planning.
  sports: Jannet Tilley treks the Berkshire hills with the local hiking club each spring, proudly roots for the Boston Red Sox and Celtics throughout the year, and complements those passions with weekly
    yoga sessions that keep them flexible and grounded.
  arts: Jannet Tilley delights in strolling through the Museum of Fine Arts and the Clark Art Institute, often sketching watercolors inspired by Monet’s lily pads and O'Keeffe’s desert flowers, while attending
    Boston Symphony Orchestra concerts featuring Mahler and supporting productions at the American Repertory Theater, and they let these experiences shape their creative outlook.
  travel: Jannet Tilley prefers thoughtfully planned weekend getaways to Cape Cod, the Vermont Green Mountains, and the historic streets of Florence, and they balance their love for art and nature with
    a modest travel budget and a penchant for spontaneous hikes once they arrive.
  culinary: Jannet Tilley, an enthusiastic home chef, frequently whips up Mediterranean‑inspired dishes like lemon‑rosemary grilled chicken and zucchini risotto, seasoning them with garden‑grown basil,
    thyme, and sage, while they also enjoy sampling farm‑to‑table bistro menus that feature locally sourced beet salad with goat cheese.
  core: Jannet Tilley blends a seasoned compliance career with a watercolor‑splattered soul, juggling meticulous risk analysis and occasional deadline drift while they nurture a herb garden, cherish vintage
    museum tours, and habitually forget to water their succulents.
background:
  cultural: Jannet grew up in a traditionally New England, white‑American family with deep roots in Berkshire County. Her upbringing blended the region’s classic values of community involvement, self‑reliance,
    and respect for the natural landscape with a modern, progressive outlook that embraces cultural diversity and the arts. Raised in the public school system and later attending a state university for
    business, she has been shaped by the region’s historic appreciation for education and civic duty. While her heritage reflects Anglo‑American lineage, Jannet’s worldview is broadened by frequent travel
    to cultural festivals and a lifelong curiosity for unconventional ideas, which she integrates into both her professional and personal life.
