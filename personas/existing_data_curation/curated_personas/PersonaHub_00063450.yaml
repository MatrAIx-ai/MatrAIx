persona_description: A scientist who conducts research on population dynamics, specifically focusing on density-dependent and density-independent processes in determining population size. The scientist
  has conducted experiments on arctic ground squirrels and has used density-perturbation experiments to investigate the simultaneous operation of density-dependent and density-independent declines in weaning
  rates and overwinter survival during hibernation. The scientist is likely to be interested in understanding the interactions between different factors that influence population size and how they can be
  quantified and modeled.
