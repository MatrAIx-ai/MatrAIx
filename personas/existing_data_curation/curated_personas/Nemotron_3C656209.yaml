  career_goals: Even at five, Ashley loves to imagine her future. She dreams of becoming a teacher because she enjoys sharing stories and helping friends understand new ideas. She also talks about exploring
    space as an astronaut, caring for animals as a veterinarian, and helping her community as a firefighter. Her practical side often translates these big dreams into small, achievable steps, like helping
    her teacher set up classroom displays or caring for a class pet. She aspires to grow her curiosity into a lifelong love of learning that shapes any career she chooses.
