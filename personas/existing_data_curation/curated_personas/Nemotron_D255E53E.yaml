    writing'']'
  career_goals: Megan aims to turn her passion for the arts and community engagement into a professional role that balances creativity with social impact. She plans to complete her undergraduate degree
    in arts administration or communications and secure a position as a program coordinator or outreach specialist at a regional museum, community arts center, or nonprofit cultural organization. Over the
    next five years, she hopes to develop expertise in curating public exhibitions, designing inclusive arts programs, and leveraging digital media to broaden audience reach, while also cultivating a sustainable
    work‑life balance that supports her mental well‑being.
