personas:
  professional: Megan Mclean, a budding arts administration coordinator, blends watercolor expertise and digital illustration with strong communication and event planning skills, channeling their curiosity
    and flexible organization into inclusive community programs while navigating occasional stress‑induced perfectionism.
  sports: Megan Mclean, a 24‑year‑old coastal yoga enthusiast, routinely attends sunrise beach yoga sessions with the Shoreline Yoga Club, hikes the local shoreline trails year‑round, cheers for the Seattle
    Seahawks (NFL) and Seattle Mariners (MLB), and occasionally joins a weekend beach‑volleyball league with friends.
  arts: Megan Mclean devotes her free time to painting serene coastal watercolors inspired by Winslow Homer, capturing urban life through photography in the style of Vivian Maier, crafting digital illustrations
    influenced by Lois van Baarle (Loish), and attending live shows by indie band The War on Drugs and community theater productions of local playwrights.
  travel: Megan Mclean prefers affordable, spontaneous weekend getaways, has trekked the coastal cliffs of Oregon’s Cannon Beach, dreamt of exploring the pastel villages of Santorini, and meticulously saves
    for spring trips to Kyoto while juggling a modest student budget.
  culinary: Megan Mclean, an amateur home cook, cherishes avocado toast with feta and poached eggs for breakfast, delights in preparing coconut shrimp tacos with fresh cilantro and lime, and enjoys sipping
    single‑origin pour‑over coffee at local cafés while occasionally indulging in artisanal macaron pastries.
  core: Megan Mclean, a curious and socially vibrant 24‑year‑old artist, balances creative pursuits with community activism, often juggling anxiety‑induced worries and occasional overspending on art supplies.
background:
  cultural: Megan was raised in the coastal village of Niantic, Connecticut, in a family with Irish and English ancestry that values education, community service, and an appreciation for the arts. The New
    England setting, with its seasonal festivals, maritime heritage, and proximity to cultural hubs like New Haven and Providence, has shaped her sensibilities and fostered a strong connection to local
    history and environmental stewardship. Her upbringing combined traditional New England customs—such as Thanksgiving gatherings, Fourth of July parades, and town‑wide art fairs—with a modern, open‑minded
    outlook that encourages curiosity and creative expression.
