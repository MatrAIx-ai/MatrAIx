    field'']'
  career_goals: Karishma aims to advance into senior leadership within her organization, targeting roles such as Director of Business Operations or Chief Strategy Officer. She plans to pursue an MBA or
    a professional certification in strategic management to deepen her expertise. Her ambition includes leading large‑scale transformation projects that integrate innovative, artistic thinking into business
    processes, championing diversity and inclusion initiatives, and mentoring the next generation of women professionals from under‑represented backgrounds.
