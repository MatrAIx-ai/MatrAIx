personas:
  professional: Adis Patino, a seasoned handyman and amateur woodworker, uses their decades of carpentry, plumbing, and electrical troubleshooting skills to keep their homestead running smoothly, applying
    their practical, structured mindset while tolerating occasional disorganization in project timelines.
  sports: Adis Patino enjoys low‑intensity fitness through weekend fishing on nearby lakes, early‑morning walks along their property, follows the Carolina Panthers (NFL) and the UNC Tar Heels (college basketball),
    and is a member of the local Appalachian Fly‑Fishing Club, preferring solitary recreation over organized team sports.
  arts: Adis Patino finds artistic fulfillment in woodworking carvings and folk music, regularly listening to Doc Watson, the Carter Family, and Alison Krauss while reading James Agee’s Appalachian stories,
    and attends the annual Mountain Heritage Festival to showcase their hand‑crafted pieces.
  travel: Adis Patino favors relaxed, self‑driven trips that blend nature and heritage, having explored the Blue Ridge Parkway, spent weekend stays in Asheville, and dreaming of a cultural pilgrimage to
    the historic villages of Andalusia, Spain, while budgeting travel around their modest retirement funds.
  culinary: Adis Patino relishes cooking from their garden, preparing heirloom tomato salsa, fried catfish with collard greens, and apple crisp made from their own orchard fruit, though they often forget
    to finish dishes before the family gathers for dinner.
  core: Adis Patino is a pragmatic, solitary craftsman who balances a love of self‑reliance with occasional indulgences, like buying premium woodworking tools, while remembering to water their tomatoes
    even if they sometimes miss a day.
background:
  cultural: Adis grew up in rural western North Carolina within a white Appalachian community that values self‑reliance, family ties, and a close connection to the land. He was raised with Southern hospitality,
    church attendance, and a respect for traditional crafts such as woodworking and farming. While his surname hints at Spanish ancestry, his cultural upbringing aligns with the modest, community‑oriented
    lifestyle of the Appalachian region, blending conservative values with a practical, hands‑on approach to everyday life.
