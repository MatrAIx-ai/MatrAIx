  career_goals: Adis aims to stay healthy and independent, focusing on maintaining his home and property. He plans to deepen his woodworking hobby by creating a small line of handcrafted birdhouses for
    sale at local craft fairs. He wishes to document his family’s genealogy and write a memoir to preserve stories for his grandchildren. He also hopes to volunteer occasionally at the local senior center,
    teaching basic computer skills to peers. Finally, he wants to ensure his family’s financial stability by continuing to provide budgeting advice.
