  career_goals: In the next few years, Yomayra aims to deepen her financial expertise by earning the Certified Financial Planner (CFP) designation and pursuing a CPA license. She aspires to advance to a
    senior financial manager or branch manager position at a community‑focused credit union, where she can leverage her bilingual skills to serve the growing Latino population in the McHenry County area.
    Long‑term, she dreams of launching her own boutique financial consulting firm that offers budgeting and financial literacy services to small businesses and families, especially those from under‑represented
    backgrounds. She also hopes to later further her education with a bachelor’s degree in finance or business administration.
