  career_goals: Marissa aims to leverage her hospitality education and cleaning expertise to launch a boutique cleaning and home‑styling service that emphasizes eco‑friendly practices and personalized aesthetic
    touches. She plans to earn a Certified Professional Housekeeper credential and eventually pursue a bachelor’s degree in interior design, expanding her offerings to include space planning and upcycling
    consultations. In the near term, she hopes to develop a mentorship program for junior cleaners in her community, teaching both technical rigor and creative problem‑solving. Long‑term, she envisions
    establishing a trusted home‑care business in the Greater Orlando area that provides financial stability, flexibility, and a platform for her artistic interests while supporting other widowed and single
    professionals.
