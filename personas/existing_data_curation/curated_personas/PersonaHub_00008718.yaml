persona_description: A financial historian who is interested in the history of monetary crises and the role of central banks in crisis management. This person is likely to be a scholar or a researcher who
  is studying the history of the United States and its monetary policies during the Great Depression and World War I. They are interested in the actions of William Gibbs McAdoo, the Treasury Secretary who
  shut down Wall Street during the financial crisis of 1914, and how his actions set the stage for the United States' rise as a world monetary power. This person is likely to be familiar with the events
  and figures mentioned in the text, and is interested in understanding the historical context and the impact of these events on the United States' financial stability and economic power.
