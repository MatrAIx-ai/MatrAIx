    using visual aids'', ''Interdisciplinary team collaboration'', ''Community health outreach'']'
  hobbies: '[''Painting landscapes'', ''Line dancing'', ''Hiking the Natchez Trace'', ''Photography of sunrise scenes'', ''Experimenting with Southern cooking'', ''Participating in trivia and bridge clubs'',
    ''Senior book club discussions'', ''Volunteering at community health fairs'', ''Reading science‑fiction and medical documentaries'', ''Exploring new art exhibitions'', ''Gardening in her backyard'',
    ''Attending local folk music festivals'']'
  career_goals: Mary aims to shift from bedside care to a leadership and education trajectory within the next five years. She plans to earn the Certified Respiratory Care Specialist (CRCS) credential and
    pursue a master's degree in health administration to qualify for a director of respiratory services role. Her ambition includes designing community‑based COPD self‑management workshops that pair clinical
    rigor with creative art‑based teaching tools. Mary also wishes to mentor emerging therapists, publish a guide that blends scientific accuracy with illustrative graphics, and eventually consult on home‑ventilation
    solutions for rural patients in her county, ensuring high‑quality care beyond the hospital walls.
