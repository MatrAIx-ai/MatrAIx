personas:
  professional: Mary Miller is a veteran respiratory therapist whose three decades of expertise in advanced ventilatory support, arterial blood‑gas analysis, and emergency airway management converge with
    their artistic flair for visual teaching, enabling them to mentor staff, spearhead quality‑improvement projects, and pursue a leadership path—all while embracing a curious, flexible mindset that values
    creativity over rigid planning.
  sports: Mary Miller fuels their active lifestyle by hiking the Natchez Trace each spring, joining a local line‑dancing club that blends social fun with cardio, cheering for the Tennessee Titans and Nashville
    Predators, and maintaining a weekly regimen of resistance‑band exercises and low‑impact cardio, all driven by a competitive edge that shines in trivia nights yet balances a relaxed attitude toward fitness.
  arts: Mary Miller channels their lifelong curiosity into weekly painting classes inspired by Monet’s Water Lilies and Bob Ross’s serene landscapes, attends community theater productions featuring Jamie
    Lee Curtis, curates a small collection of Georgia O’Keeffe prints, and weaves these artistic influences into their respiratory‑care workshops, enriching both their professional and personal identity.
  travel: Mary Miller prefers flexible road‑trip adventures that weave scenic hikes through the Great Smoky Mountains with cultural stops in Savannah, Georgia, while budgeting for occasional overseas journeys
    to Kyoto’s cherry‑blossom festivals and Paris’s Musée d’Orsay, planning each trip with a mix of spontaneity and modest budgeting to accommodate their volunteer commitments.
  culinary: Mary Miller delights in Southern comfort cuisine with inventive twists, such as shrimp and grits seasoned with smoked paprika and mango chutney, jalapeño‑cheddar cornbread, and heirloom tomato
    gazpacho flavored with fresh basil, yet often leaves the kitchen a mess as they jump from one creative experiment to the next.
  core: Mary Miller blends seasoned respiratory expertise, artistic curiosity, a competitive yet sociable spirit, and a pragmatic, evidence‑based approach to health, finance, and lifelong learning, all
    colored by a penchant for spontaneous creativity and occasional disorganization.
background:
  cultural: Mary grew up in the close‑knit rural environment of Robertson County, Tennessee, absorbing the hallmarks of Southern hospitality, community stewardship, and a strong church influence. Her family
    traditions emphasize generosity, storytelling, and a deep appreciation for regional music and cuisine. While her early life was shaped by these values, her pursuit of a STEM graduate education broadened
    her worldview, fostering an openness to unconventional ideas and artistic expression. This blend of Southern roots and scientific curiosity manifests in her commitment to community health, her love
    for group activities, and her drive to integrate creative approaches into patient care. Mary respects the heritage of her hometown while continually seeking fresh perspectives that challenge the status
    quo.
attributes:
  skills: '[''Patient assessment & ABG interpretation'', ''Mechanical ventilator management'', ''Non‑invasive ventilation (CPAP/BiPAP, HFNC)'', ''Airway emergency interventions'', ''Pulmonary pharmacology
