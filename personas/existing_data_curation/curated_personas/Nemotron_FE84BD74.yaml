  career_goals: Gini aims to advance into a senior leadership role within health informatics, such as Director of Clinical Documentation Improvement or Health Information Management Manager. She plans to
    obtain a RHIA certification and pursue a master's degree in health informatics to deepen her expertise in data-driven patient care. Her long‑term ambition is to lead a digital transformation project
    that integrates AI‑assisted record accuracy tools across her health system, fostering a culture of continuous improvement while mentoring the next generation of health information professionals.
