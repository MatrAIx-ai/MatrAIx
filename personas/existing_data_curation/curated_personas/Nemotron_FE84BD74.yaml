personas:
  professional: Gini Sowell, a veteran health information manager with two decades of expertise in ICD‑10 coding, HIPAA compliance, and EHR optimization across Epic and Cerner, channels their organized,
    methodical nature and assertive yet cooperative leadership style into driving data‑centric quality improvements and mentoring clinicians toward seamless digital workflows.
  sports: Gini Sowell, a dedicated fan of the Cleveland Browns and Ohio State Buckeyes, spends weekends hiking the Hocking Hills trails with the Ohio Outdoor Explorers club, attends local yoga sessions
    for balance, and participates in a community softball league during the summer, embodying a consistent, social approach to fitness.
  arts: Gini Sowell, an avid participant in a local book club where they devour mysteries by Agatha Christie, finds inspiration in the melodies of Bob Dylan and Joan Baez, frequently attends stage productions
    at the Cleveland Play House, and decorates their home with prints of Grant Wood’s American Gothic, weaving artistic appreciation into their everyday life.
  travel: Gini Sowell favors meticulously planned trips that blend historic immersion with leisurely exploration, having visited Gettysburg, the Indiana Dunes, and Dublin’s medieval districts, while their
    future wish list includes a heritage tour of Edinburgh’s castle and the culinary streets of Bologna, balancing their mid‑career schedule and family commitments.
  culinary: Gini Sowell, an enthusiastic home chef with intermediate skill, delights in crafting farm‑to‑table dishes like roasted beet and goat‑cheese salad, hand‑rolled gnocchi with sage‑brown butter,
    and seasonal soups seasoned with rosemary and smoked paprika, while they also love sampling local farm‑to‑table restaurants that feature heirloom tomatoes and fresh corn.
  core: Gini Sowell blends methodical precision with boundless curiosity, juggling a demanding health informatics career, community volunteerism, and a penchant for puzzle‑solving, all while occasionally
    over‑scheduling their weekends and relying on strong coffee to power through.
background:
  cultural: Gini was raised in the Midwest, embodying the region’s values of reliability, community engagement, and modesty. As a white American with ancestral roots in German and Irish immigrant families,
    she maintains traditions such as celebrating Thanksgiving with an extended family dinner and participating in local church events. Her cultural identity includes a strong sense of neighborliness, involvement
    in county fairs, and a commitment to volunteer service, all of which shape her collaborative and compassionate outlook both at work and in her personal life.
