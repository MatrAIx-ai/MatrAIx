personas:
  professional: Brooke Carroll, a seasoned painter and paperhanger in Austin, blends meticulous surface preparation, color theory expertise, and low‑VOC decorative finish techniques with a curious, competitively‑driven
    mindset that pushes them to meticulously schedule projects while flexibly adapting to artistic challenges, positioning them for a future boutique contracting firm.
  sports: Brooke Carroll stays active by tackling Hill Country hikes on weekends, participating in the Austin Running Club’s Saturday 5K runs, and cheering on Austin FC in MLS while occasionally attending
    Texas Longhorns basketball games, treating fitness as a restorative complement to their hands‑on trade work.
  arts: Brooke Carroll finds artistic identity in painting Texas hill‑country vistas inspired by the luminous color palettes of James Turrell, immersing themselves in folk art festivals featuring works
    of Terry Allen, and recharging after work with live shows by Austin’s own Gary Clark Jr., St. Vincent, and The Black Angels, while their design aesthetic is further honed by reading contemporary novels
    by Sally Rooney and design magazines.
  travel: Brooke Carroll prefers carefully curated road trips that blend artistic discovery and outdoor adventure, having already explored Marfa’s desert installations, the historic streets of Florence,
    and Kyoto’s tranquil gardens, while future plans include a week‑long hike through New Mexico’s Santa Fe Trail and a culinary tour of Provence, all balanced against the demands of growing their boutique
    painting business.
  culinary: Brooke Carroll, an avid home cook with intermediate culinary skills, frequently experiments with heirloom tomato gazpacho, smoked paprika‑infused chicken enchiladas, and rosemary‑scented focaccia,
    delighting in sourcing fresh herbs from their garden and pairing dishes with locally crafted Texas craft beers.
  core: Brooke Carroll blends a fiercely competitive, curiosity‑driven quest for artistic mastery with a quirky habit of overstocking paint supplies and a love for early‑morning canvas sessions that often
    turn into impromptu garden meditations, reflecting a pragmatic yet whimsical life philosophy.
background:
  cultural: Brooke grew up in Central Texas, in a family with Midwestern roots that settled in the Austin‑Manor region during the early 1990s. The community’s blend of small‑town values and the vibrant,
    eclectic culture of the greater Austin area shaped her outlook. She embraces the Texas tradition of hospitality, self‑reliance, and a strong work ethic, while also being open to the diverse artistic
    influences that flourish in Travis County, from indie music scenes to local craft fairs. Her cultural identity is anchored in the Lone Star spirit, yet she values inclusivity and the cross‑cultural
    exchanges found in the region’s festivals, food, and visual arts. This background informs both her professional approach—practical, reliable, yet inventive—and her personal pursuits, which celebrate
    both the familiar and the new.
attributes:
  skills: '[''interior painting'', ''paper hanging'', ''surface preparation'', ''color theory'', ''decorative faux finishes'', ''project estimation'', ''client communication'', ''time management'', ''safety
