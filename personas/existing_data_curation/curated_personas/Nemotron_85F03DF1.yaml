  hobbies: '[''fine art painting'', ''watercolor sketching'', ''visiting art galleries'', ''DIY home renovation'', ''landscape photography'', ''hiking in the Hill Country'', ''gardening'', ''reading contemporary
    fiction'', ''cooking experimental recipes'', ''attending live music performances'']'
  career_goals: Brooke aims to transition from a skilled tradesperson to a recognized specialist in high‑end residential finishes. Over the next five years she plans to earn her Texas Painting Contractor
    license and complete advanced courses in decorative finishes and low‑VOC coatings. She envisions launching her own boutique painting company, 'Carroll Custom Finishes,' offering premium services such
    as bespoke murals, hand‑painted accent walls, and eco‑friendly paint solutions. Brooke also wishes to build a network of local interior designers and artisans to collaborate on project aesthetics, and
    to mentor apprentices, promoting craftsmanship within her community. Ultimately, she hopes her work will be featured in regional design publications and that she will be known as a creative problem‑solver
    who blends functional painting with artistic expression.
