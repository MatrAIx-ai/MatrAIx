  career_goals: Even in retirement, Ali’s main ambition is to stay healthy, keep his home and garden running smoothly, and support his spouse. He aims to continue volunteering at the local senior center,
    mentor younger neighbors in practical DIY projects, and maintain financial stability through careful budgeting. He hopes to preserve his family’s traditions and pass down his gardening knowledge to
    his grandchildren.
