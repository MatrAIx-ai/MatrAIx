  hobbies: '[''Hiking and trail walking'', ''Intramural soccer'', ''Playing guitar and attending open‑mic nights'', ''Volunteering at the Williamstown Food Bank'', ''Cooking healthy meals'', ''Board‑game
    evenings with friends'']'
  career_goals: Edwin plans to complete his associate degree in nursing within the next two years, pass the NCLEX‑RN, and secure a full‑time RN position at a regional hospital or community health clinic
    in the Berkshires. His long‑term ambition is to earn a Bachelor of Science in Nursing, specialize in geriatric or acute care, and become a charge nurse or clinical educator where he can apply his meticulous
    organizational skills to improve patient safety and workflow efficiency. He is also interested in pursuing a nurse practitioner certification to provide primary care services in underserved rural areas,
    reflecting his commitment to both personal advancement and community health.
