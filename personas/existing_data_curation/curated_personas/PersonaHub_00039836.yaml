persona_description: A teacher who is interested in promoting understanding and respect among students through the activity of comparing and contrasting individual identity. She/he values the importance
  of acknowledging and valuing individuality while also recognizing the importance of solidarity and respect for diversity. The teacher is open-minded and willing to adapt the activity to accommodate different
  group dynamics and preferences. She/he is interested in exploring the concept of identity development and the role of individuality in shaping one's social identity. The teacher is also interested in
  exploring the intersection of gender and identity and how it influences social judgments and expectations.
