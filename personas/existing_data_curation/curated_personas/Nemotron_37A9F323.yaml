personas:
  professional: Artisha is a budding LEGO architect and junior coder who channels curiosity into building intricate models and creating simple Scratch animations, while their practical side keeps their
    projects organized and schedule‑bound.
  sports: Artisha's weekend soccer practice with the Oak Grove Juniors keeps them active, and they cheer for the regional youth soccer league while occasionally watching the national team on TV, balancing
    gentle teamwork with personal fitness.
  arts: Artisha's artistic world blends sketching characters from their beloved mystery series, building LEGO narratives, and listening to gospel hymns and contemporary R&B from artists like Kirk Franklin
    and Beyoncé, shaping a creative outlet that feels both personal and culturally resonant.
  travel: Artisha enjoys family nature‑trail outings in the nearby state park, where they collect leaves and identify insects, and they dream of visiting Yellowstone National Park and the historic streets
    of Boston, preferring weekend adventures that fit around school.
  culinary: Artisha prefers kid‑friendly dishes like macaroni‑and‑cheese with hidden peas, loves making peanut butter‑banana wraps, and delights in the sweet taste of blueberries and honey while occasionally
    sneaking a chocolate chip cookie when no one is watching.
  core: Artisha blends a quiet curiosity with practical organization, turning LEGO bricks, mystery books, and gentle soccer games into a disciplined yet imaginative childhood.
background:
  cultural: As a Black girl growing up in Murfreesboro, Tennessee, Artisha is raised in a close‑knit African‑American community that blends Southern traditions with cultural heritage. Her family participates
    regularly in a local Baptist church, where gospel music, storytelling, and community service are integral parts of her upbringing. Family gatherings often feature Southern soul food such as collard
    greens, fried chicken, and cornbread, and discussions about Black history and civil‑rights figures are encouraged at the dinner table. The neighborhood’s cultural center hosts weekend art workshops
    and youth science clubs, providing her with exposure to both creative and academic pursuits. This environment shapes her identity, instills values of resilience, respect for elders, and a sense of belonging
    to a broader Black Southern narrative.
