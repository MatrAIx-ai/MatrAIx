  career_goals: Although still young, Artisha dreams of turning her love for animals and her knack for problem‑solving into a future career as a veterinarian or wildlife biologist. She imagines one day
    studying animal anatomy, helping injured creatures, and possibly designing educational apps that teach other children about nature. She also values stability and community service, so she keeps the
    possibility of becoming a science teacher in mind, where she could share her curiosity with kids who prefer small, supportive groups. These goals are motivated by her practical mindset, her desire to
    help others, and her wish to create a calm and reliable environment for herself and her future patients.
