  hobbies: '[''Visiting art galleries and murals'', ''Live music and theater attendance'', ''Sketching and photography'', ''Cooking (Italian and experimental cuisine)'', ''Hiking in state parks'', ''Volunteering
    at an animal shelter'', ''Short road trips to cultural sites'']'
  career_goals: Diane aspires to work in the cultural sector, aiming to become a community arts program coordinator or a marketing associate for a local museum or art gallery. She plans to enroll in a community‑college
    program in arts administration or marketing to build formal credentials. In the longer term, she hopes to launch a freelance event‑planning business that specializes in art‑related festivals, pop‑up
    exhibitions, and youth workshops, leveraging her curiosity for new ideas and her outgoing personality to create vibrant community experiences.
