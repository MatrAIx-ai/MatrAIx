persona_description: A science educator who is interested in the development of authentic school scientific activities, particularly in the primary and secondary levels of education. This individual is
  likely to have a background in didactics of science and is interested in the philosophical underpinnings of scientific models and their educational value. They may have a strong interest in the semantic
  conception of models and the idea of theoretical models as proposed by Ronald Giere, and are seeking to find a meta-theoretical conception of what a scientific model is that has educational value and
  is tuned with the possibility of designing an authentic school scientific activity.
