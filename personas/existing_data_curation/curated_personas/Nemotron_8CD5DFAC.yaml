personas:
  professional: Wendy Dawkins is a seasoned adult‑education specialist whose expertise in arts‑focused curricula, public speaking, and improvisational theater fuels community workshops that blend watercolor
    techniques, creative‑thinking exercises, and digital photography, while their relaxed attitude toward strict planning often leads to last‑minute course tweaks and a charmingly chaotic lesson‑plan notebook.
  sports: Wendy Dawkins enjoys hiking the White‑Mountain trails with a local outdoor club, occasionally joins a community yoga class, and avidly follows the Boston Red Sox, the New England Patriots, and
    the Boston Bruins, treating weekend game nights as social rituals while using competitive board‑game tactics to motivate themselves during fitness challenges.
  arts: Wendy Dawkins immerses themselves in the New England art scene, regularly visiting galleries showcasing Edward Hopper and contemporary local painters, drawing inspiration from Annie Leibovitz’s
    photography, performing improv at the Boston Improv Asylum, and creating watercolor landscapes influenced by the changing foliage of the region.
  travel: Wendy Dawkins plans trips with a mix of spontaneity and modest budgeting, favoring weekend drives to Acadia National Park, seasonal leaf‑peeping tours in Vermont, and, when saving permits, dream
    trips to the Louvre in Paris and the Uffizi Gallery in Florence, balancing a love for cultural immersion with a pragmatic approach to travel costs.
  culinary: Wendy Dawkins delights in experimenting with global cuisines, skillfully preparing New England clam chowder, Thai green curry, and Spanish paella using fresh herbs like sage and thyme, and while
    their cooking confidence is high, they often splurge on artisanal cheeses and exotic spices, turning their kitchen into a lively tasting laboratory.
  core: Wendy Dawkins blends a lifelong curiosity for art with a relaxed, sometimes chaotic approach to planning, a competitive edge in finances and games, and a penchant for spontaneous creativity that
    fuels both their community workshops and kitchen experiments.
background:
  cultural: Wendy is a third‑generation Anglo‑American from Connecticut, raised in a small New England town. Her upbringing reflects the region's cultural emphasis on education, civic engagement, and self‑reliance.
    She grew up in a modest, middle‑class household with ties to the local Protestant community, which cultivated her sense of community service and appreciation for the natural environment of the Northeast.
