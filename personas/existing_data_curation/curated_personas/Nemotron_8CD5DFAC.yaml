  career_goals: Wendy aims to re-enter the education field by establishing a community arts program that offers low-cost workshops for adults and seniors. She hopes to secure a part‑time teaching position
    in art appreciation at a local community college and to develop a series of online courses on creative thinking and visual arts. Additionally, she plans to mentor emerging educators through a volunteer
    mentorship network and to author a memoir that reflects on her lifelong love of learning and art.
