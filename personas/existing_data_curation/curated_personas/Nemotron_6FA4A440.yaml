  career_goals: Tammy plans to obtain her GED within the next year and then enroll in a community‑college program focused on graphic design or visual arts. She aims to build a strong portfolio that will
    enable her to work as a freelance illustrator or concept artist for video games, comics, or indie publications. Parallel to her artistic ambitions, she hopes to launch an online platform where she shares
    her artwork and raises awareness about teen mental health, combining creativity with advocacy. In the long term, Tammy envisions a career that blends her passion for art, her empathy for others, and
    her desire to make a positive impact on her community.
