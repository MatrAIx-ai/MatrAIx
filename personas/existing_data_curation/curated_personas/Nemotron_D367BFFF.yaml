personas:
  professional: Roshonda Campbell is an aspiring junior visual storyteller who blends hand‑sketching, digital tablet art, and poetic narrative to create comic‑style illustrations, thriving on spontaneous
    bursts of creativity while often wrestling with school deadlines and organization.
  sports: Roshonda Campbell is a fan of the Seattle Seahawks and the Seattle Kraken, enjoys cheering at local high‑school basketball games, and participates in a community after‑school skateboarding club
    where they practice tricks on weekends, balancing a love for spontaneous movement with occasional bouts of competitive spirit.
  arts: Roshonda Campbell immerses themselves in hip‑hop, R&B, and soul, drawing inspiration from artists like Kendrick Lamar, H.E.R., and J. Cole while studying graphic novels such as Saga and Maus and
    admiring street‑art legends like Banksy and Shepard Fairey, often translating that energy into vibrant doodles and digital collages during art club meetings.
  travel: Roshonda Campbell dreams of exploring vibrant mural districts in Berlin, wandering through the Museum of Modern Art in New York, and taking weekend road trips to nearby coastal towns for seaside
    sketching sessions, planning each adventure loosely to keep room for spontaneous detours while budgeting modestly from their allowance savings.
  culinary: Roshonda Campbell loves crafting avocado toast topped with chili flakes, whipping up rainbow smoothie bowls with fresh berries and coconut flakes, and indulging in pepperoni pizza and spicy
    ramen after late‑night gaming, yet often forgets to eat balanced meals due to their immersion in creative projects.
  core: Roshonda Campbell is a boundary‑pushing teen artist whose spontaneous imagination fuels vivid creations, while a lingering anxiety and occasional impulsive spending add a touch of chaos to their
    otherwise harmonious world.
background:
  cultural: Roshonda is raised in a close‑knit African‑American family in Louisville’s historic West End, an area with deep roots in the city’s civil‑rights history. Her family’s gatherings often center
    around church, gospel singing, and Southern soul‑food meals such as fried chicken, collard greens, and sweet potato pie. She celebrates Juneteenth and participates in community events at the Muhammad
    Ali Center and local street‑art festivals that showcase Black artists. The city’s rich musical heritage—especially jazz, blues, and hip‑hop—shapes her taste in music. Storytelling, oral history, and
    a strong sense of community responsibility are emphasized at home, fostering her appreciation for African‑American cultural contributions and her desire to give back.
