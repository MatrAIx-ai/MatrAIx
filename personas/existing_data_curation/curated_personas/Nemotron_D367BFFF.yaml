  hobbies: '[''Doodling and sketching'', ''Digital art on tablet'', ''Listening to hip‑hop, R&B and soul music'', ''Writing poetry'', ''Reading graphic novels and comics'', ''Visiting Louisville art museums
    and street‑art tours'', ''Participating in school art club'', ''Freestyle dancing to music'', ''Playing creative video games such as Minecraft'', ''Volunteering at community youth art workshops'']'
  career_goals: Roshonda hopes to turn her love for visual storytelling into a career as an illustrator or graphic designer, perhaps creating graphic novels that highlight under‑represented voices and social
    issues. She dreams of studying fine arts and digital media at a university known for a strong arts program, and later using her skills to mentor younger teens through community art workshops in Louisville.
    In addition, she wants to become a youth advocate for mental‑health awareness, using her platform and creative work to help peers manage stress and anxiety.
