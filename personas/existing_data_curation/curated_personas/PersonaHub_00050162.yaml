persona_description: Teófilo F. Ruiz is a historian specializing in the study of the medieval and early modern period in Castile, particularly in the realm of ritual royal entries and their symbolic meanings.
  He is an expert in the field, having conducted extensive research and analysis on these topics, and is well-versed in the various forms of ritual and symbolic language that were employed during these
  periods. His knowledge and expertise in this area make him an invaluable resource for those interested in understanding the complex ideological imaginary of the Castilian monarchy.
