personas:
  professional: Starr Hudson, a 20‑year‑old aspiring hospitality professional, leverages their high school student council experience and volunteer event coordination to excel in planning community festivals,
    using Canva and Microsoft Office to create seamless schedules while maintaining a calm, structured approach that keeps team morale high—they thrive on turning chaos into order.
  sports: Starr Hudson, an enthusiastic member of the Easton Intramural Soccer League and a regular hiker with the local Appalachian Trail Conservancy club, follows the New England Revolution, Boston Red
    Sox, and Boston Celtics, balancing weekly practices with weekend trail treks; they find camaraderie both on the field and on the footpath.
  arts: Starr Hudson, a budding landscape photographer inspired by Ansel Adams and a DIY craft enthusiast who sells homemade candles at community fairs, curates Instagram feeds featuring sunrise shots of
    the Hudson Valley and displays upcycled furniture pieces to the delight of local art lovers, while listening to Taylor Swift and watching Zendaya’s performances for creative spark; they consider each
    image and craft a visual story of community.
  travel: Starr Hudson, who favors budget‑friendly road trips and weekend hikes, has trekked Shenandoah National Park and plans to backpack through the Scottish Highlands during the Edinburgh Fringe Festival,
    balancing a love for spontaneous Instagram‑worthy moments with the constraints of a student budget; they always pack a reusable water bottle and a compact camera to capture each adventure.
  culinary: Starr Hudson, a talented home cook, delights friends with seasonal dishes like rosemary‑infused roasted chicken, maple‑glazed pumpkin pie, and quinoa‑black bean salads, often sourcing fresh
    herbs from the local farmer’s market and experimenting with oat‑based vegan desserts, while also crafting homemade spiced candles that double as aromatic table centerpieces; they love to host holiday
    gatherings where everyone shares a story and a bite.
  core: Starr Hudson, a 20‑year‑old structured social butterfly, channels boundless energy into community events and DIY projects, yet occasionally sacrifices sleep to finish a last‑minute craft or bake,
    all while maintaining a calm, resilient demeanor; they thrive on turning organized plans into lively experiences.
background:
  cultural: Starr was raised in a middle‑class white family in Easton, Pennsylvania, a small city in the Lehigh Valley known for its historic downtown and riverfront festivals. Her upbringing emphasized
    hard work, community involvement, and traditional American customs such as celebrating Thanksgiving, Fourth of July parades, and local holiday markets. She attended a public high school where she was
    active in student council and volunteer clubs, reflecting the region’s strong emphasis on civic participation. Though her family’s religious affiliation is modestly Protestant, cultural values of respect,
    cooperation, and modesty shaped her worldview. Easton’s blend of industrial heritage and growing arts scene, along with the proximity to larger cities like Philadelphia, exposed her to diverse cultural
    activities while maintaining a close‑knit community atmosphere.
attributes:
  skills: '["Event planning", "Volunteer coordination", "Customer service", "Microsoft Office", "Basic graphic design", "Social media management", "Conflict resolution", "Time management", "Basic budgeting"]'
  hobbies: '["Volunteer work", "Community event organization", "Intramural soccer", "Hiking", "Photography", "Cooking and baking", "DIY crafts", "Social media content creation"]'
  career_goals: Starr plans to enroll in the Business Administration program at Northampton Community College within the next year. She aims to specialize in hospitality management and event coordination,
    securing an entry‑level role at a local hotel or community organization after graduation. In the medium term, she hopes to become a senior event manager, overseeing regional festivals and community
    outreach programs. Her long‑term ambition is to open a community‑focused café that doubles as a venue for local artists and charitable events, combining her love for social interaction, organization,
    and community service.
