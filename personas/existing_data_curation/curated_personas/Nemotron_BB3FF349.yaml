personas:
  professional: Wesley Kahn, a budding hardware tinkerer and self‑taught PC builder, channels their curiosity and practicality into designing custom rigs while balancing meticulous planning with spontaneous
    upgrades, often collaborating quietly with friends on tech projects.
  sports: Wesley Kahn, a low‑key fitness enthusiast, spends weekends hiking Everglades trails and swims laps at the Hollywood Beach community pool, while cheering for the Miami Heat and Miami Dolphins from
    the sidelines rather than participating in organized school sports.
  arts: Wesley Kahn, an avid sketched‑storyteller, draws fantasy characters inspired by Brandon Sanderson’s Cosmere and the visual style of Studio Ghibli while listening to synth‑wave artist Com Truise
    during late‑night gaming sessions.
  travel: Wesley Kahn, a budget‑conscious teen explorer, prefers meticulously planning weekend trips to state parks like John Pennekamp Coral Reef State Park and dreams of a future solo backpacking adventure
    through Kyoto’s retro districts after high school.
  culinary: Wesley Kahn, a modest home‑chef, enjoys crafting ramen bowls flavored with miso paste and topping them with soft‑boiled eggs, while occasionally whipping up avocado‑toast‑style breakfast smoothies
    featuring banana and spinach for quick post‑walk fuel.
  core: Wesley Kahn balances a restless curiosity for tech with a habit of over‑analyzing every game mechanic, leading to late‑night coding sessions that often replace social outings, yet their quiet kindness
    shines through thoughtful journal entries that keep friends feeling heard.
background:
  cultural: Wesley is a white teenager raised in the suburban community of Hollywood, Florida, within the diverse environment of Broward County. His family embodies middle‑class American values that emphasize
    personal responsibility, cooperation, and community harmony. Growing up near the Atlantic coast, he has been shaped by beach culture and the seasonal tourism that brings a mix of visitors and residents
    from Latin American and Caribbean backgrounds. Local festivals, multicultural neighborhoods, and exposure to a variety of cuisines have broadened his awareness of South Florida's cultural mosaic. Family
    gatherings often combine traditional Southern cooking with Floridian seafood dishes, reflecting both his heritage and regional influences. This blend of quiet residential life and a vibrant, multicultural
    setting contributes to his respectful, cooperative nature and his desire for harmony in his relationships.
