  hobbies: '[''PC building'', ''Indie video gaming'', ''Science‑fiction reading'', ''Sketching'', ''Journaling'', ''Beach walks'', ''Tabletop RPGs'', ''Nature trail hiking'', ''Documentary watching'', ''Arduino
    tinkering'']'
  career_goals: Wesley aims to complete his high school education through a GED and then enroll in a community college computer‑science program. He plans to earn industry certifications such as CompTIA
    A+ and Cisco CCNA, which will enable him to start a stable technical support career. Over the longer term, he aspires to become a software developer, focusing on applications that promote mental‑wellness
    for teenagers, blending his technical curiosity with a practical desire to help others. He also dreams of creating an indie video game that incorporates calming gameplay mechanics, allowing him to fuse
    his creative interests with a reliable income stream.
