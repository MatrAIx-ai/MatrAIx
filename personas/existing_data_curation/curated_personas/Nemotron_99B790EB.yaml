personas:
  professional: Kathya Montoya is a warehouse stocker who blends meticulous inventory control with an eye for visual merchandising, using their bilingual fluency and calm problem‑solving to train new hires
    and keep the floor running smoothly despite their relaxed approach to strict scheduling.
  sports: Kathya Montoya enjoys hiking with the Hill Country Hikers club in the spring, cheers on Austin FC in MLS matches, follows the Texas Longhorns basketball season, and occasionally joins salsa‑dance‑fitness
    classes that double as cardio workouts.
  arts: Kathya Montoya spends evenings at Austin’s Hotel Eden Ballroom listening to Gary Clark Jr. and St. Vincent, while their watercolor canvases echo the atmospheric tones of contemporary painter Ana
    Leñero, and they collect limited‑edition prints from surrealist artist James Jean.
  travel: Kathya Montoya plans spontaneous road trips with a loose itinerary, favoring vibrant cities like Mexico City and New Orleans for cultural immersion, while dreaming of a solo trek through Patagonia’s
    steppe when finances finally allow a longer sabbatical.
  culinary: Kathya Montoya whips up creative twists on classic dishes such as chiles en nogada with a drizzle of pomegranate molasses and avocado‑lime crema, expertly slices heirloom tomatoes for fresh
    salsa, and confidently experiments with achiote‑infused carnitas, all while mastering a beginner’s level in making homemade masa.
  core: Kathya Montoya is a free‑spirit warehouse enthusiast who balances a love for vibrant watercolor landscapes with a habit of leaving birthday cards half‑finished, turning everyday chores into playful
    experiments.
background:
  cultural: Kathya was raised in a close‑knit Mexican‑American family in the Greater Austin area. Her parents immigrated from Jalisco, so Spanish was spoken at home and Mexican traditions—such as Día de
    los Muertos, Las Posadas, and Cinco de Mayo—were celebrated with authentic food, music, and crafts. Living in Taylor, Texas, she also embraces local Texan customs, enjoying community barbecues and regional
    festivals. She is active in the local Hispanic community, volunteering at the community center and participating in cultural events that reinforce her bicultural identity and pride in her heritage.
attributes:
  skills: '[''Inventory Management'', ''Order Picking & Packing'', ''Bilingual Communication (Spanish/English)'', ''Visual Merchandising'', ''Customer Service'', ''Team Collaboration'', ''Training & Mentoring'',
    ''Basic Graphic Design (Canva, Photoshop)'', ''Safety Compliance'', ''Creative Problem Solving'', ''Flexible Time Management'', ''Data Entry in Warehouse Management Systems'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Live music concerts in Austin'', ''Reading sci‑fi and fantasy novels'', ''Cumbia and bachata dancing'', ''Cooking Mexican
    cuisine'', ''DIY crafts and jewelry making'', ''Hiking in Texas Hill Country'', ''Volunteering at local community events'', ''Board game nights with friends'']'
  career_goals: Kathya aims to move from her current stocker role into a supervisory position within the next two years, leveraging her strong interpersonal skills and operational knowledge. She envisions
    becoming a visual merchandiser for a regional retail chain, where she can blend her artistic eye with inventory expertise to shape compelling store experiences. In the longer term, she hopes to earn
    an associate degree in business administration and eventually open a boutique that showcases Mexican‑inspired handcrafted goods, collaborating with local artists and celebrating her cultural heritage.
