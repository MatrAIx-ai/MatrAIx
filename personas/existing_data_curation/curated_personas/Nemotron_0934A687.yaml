  career_goals: Attia plans to attend a university in the Washington, D.C. area to study communications or hospitality management, aiming to turn her love of people‑focused work into a career in community
    outreach, event planning, or socially responsible marketing. She hopes to gain hands‑on experience through internships with nonprofit organizations or local cultural institutions, eventually becoming
    a community engagement director or marketing strategist who blends innovative ideas with practical execution. In the meantime, she wants to build a personal brand—perhaps a lifestyle blog or video channel—that
    offers practical advice for her peers while showcasing new trends.
