personas:
  professional: Jonathan Evans, a 21‑year‑old aspiring community health coordinator, blends their compassionate, organized approach with practical data‑analysis skills to design youth mental‑wellness programs
    and coordinate volunteer events on campus.
  sports: Jonathan Evans, a 21‑year‑old Purdue student, plays intramural basketball and pick‑up soccer weekly, hikes the Wabash River trail for cardio, cheers on the Boilermakers men’s basketball and football
    teams, roots for the Indianapolis Colts during football season, and they balance these activities with a part‑time job and coursework.
  arts: Jonathan Evans, a 21‑year‑old photography enthusiast, captures candid street scenes with a Canon EOS 80D, draws creative inspiration from Ansel Adams and Sebastião Salgado, and they regularly attend
    live shows by indie folk band The Dandelion Club and singer‑songwriter Maya Reyes.
  travel: Jonathan Evans, a 21‑year‑old student traveler, prefers budget‑friendly road trips with friends, has explored Chicago, Washington D.C., and the Great Smoky Mountains, and they plan a solo trek
    to Iceland’s South Coast after graduating to combine hiking with photography.
  culinary: Jonathan Evans, a 21‑year‑old home chef, enjoys experimenting with plant‑based dishes like quinoa‑black bean burgers, spicy Thai basil chicken, and classic avocado toast with lemon zest, often
    sourcing fresh herbs from the local farmers’ market and using a cast‑iron skillet for searing, and they share their culinary creations with friends at potluck gatherings.
  core: Jonathan Evans, a 21‑year‑old compassionate go‑getter, balances community service, campus sports, and midnight photo edits while occasionally procrastinating on dental visits and splurging on the
    latest kitchen gadget.
background:
  cultural: Jonathan was raised in a middle‑class Midwestern family in Indiana, absorbing values of modesty, hard work, and community involvement. The regional culture—marked by a strong sense of hospitality,
    a love for college basketball, and seasonal traditions like the Indiana State Fair—shapes his outlook. Exposure to the diverse campus environment at Purdue broadened his perspective, fostering an appreciation
    for collaborative problem‑solving and inclusive practices while still honoring his Midwestern roots.
