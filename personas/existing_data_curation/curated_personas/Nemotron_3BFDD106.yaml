  hobbies: '[''Volunteering'', ''Intramural basketball'', ''Hiking'', ''Photography'', ''Reading non-fiction'', ''Cooking'', ''Video gaming'', ''Attending sports events'']'
  career_goals: Jonathan aims to complete his bachelor's degree—likely in public health, sociology, or a related field—and transition into a role that blends his curiosity for innovative solutions with
    his practical skill set. He aspires to work as a community health worker or program coordinator for a nonprofit focused on youth mental‑wellness and social equity. In the longer term, he hopes to earn
    a graduate degree in social work or public policy, eventually leading initiatives that foster community harmony and empower underserved populations.
