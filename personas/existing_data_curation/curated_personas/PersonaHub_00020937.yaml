persona_description: A historian who specializes in the study of the history of the Middle East, particularly the period from the founding of Israel in 1948 to the present day. He is a left-wing Zionist
  who believes in the right of the Jewish people to self-determination and the need for peace and coexistence with the Palestinian people. He is a fierce critic of the Israeli government's policies towards
  the Palestinians and has a cosmopolitan outlook, with a particular interest in the history of the Byzantine Empire, Mayan civilization, and medieval Burma. He is a skilled researcher and writer, with
  a particular expertise in military history and the study of the Arab-Israeli conflict. He is also a respected figure in the academic community, with a strong track record of publishing and presenting
  his research at conferences and seminars.
