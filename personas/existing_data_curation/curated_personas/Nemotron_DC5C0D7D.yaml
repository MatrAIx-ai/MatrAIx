  hobbies: '[''Volleyball'', ''Cheerleading'', ''Hip-Hop Dancing'', ''Church Choir'', ''Bullet Journaling'', ''Cooking Soul-Food Recipes'', ''DIY Crafts'', ''Reading YA Novels'', ''Volunteer Tutoring'',
    ''Exploring New Gadgets'']'
  career_goals: Linda hopes to graduate high school with honors and secure a scholarship that will enable her to pursue a bachelor's degree in nursing or business administration. She envisions a career
    where she can combine her organizational talent and compassion, such as becoming a registered nurse who also leads health-education programs for underserved youth in her community. In the longer term,
    she aspires to launch a nonprofit mentorship program that empowers teenage girls in Louisiana to achieve academic and personal success, while also advocating for mental-health awareness among peers.
