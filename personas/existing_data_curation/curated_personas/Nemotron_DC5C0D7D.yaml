personas:
  professional: Linda Cato is a high‑school varsity volleyball captain and cheerleader who leverages her meticulous bullet‑journal planning and strong public‑speaking skills to lead group projects, organize
    school events, and tutor younger students, all while balancing a pragmatic curiosity about nursing and business.
  sports: Linda Cato is a dedicated varsity volleyball player and cheerleader at her high school, a passionate fan of the New Orleans Pelicans and the New Orleans Saints, and she also trains with a local
    youth volleyball club that competes in regional tournaments, balancing rigorous practice schedules with her academic commitments.
  arts: Linda Cato expresses her creative side by dancing to Kendrick Lamar’s hip‑hop beats, singing gospel classics by Kirk Franklin in her church choir, belting out R&B anthems by Beyoncé during pep rallies,
    and immerses herself in contemporary YA novels like John Green’s *The Fault in Our Stars* and Angie Thomas’s *The Hate U Give*, all of which shape her artistic appreciation.
  travel: Linda Cato enjoys weekend trips to New Orleans and Baton Rouge, has taken a school‑organized excursion to Washington D.C., and dreams of exploring the cultural vibrancy of New York City and the
    beaches of the Bahamas once she saves enough for a solo summer adventure.
  culinary: Linda Cato loves experimenting in the kitchen with homemade soul‑food staples like fried catfish, collard greens seasoned with smoked paprika, and a tangy gumbo thickened with okra, while also
    mastering classic comfort dishes such as mac and cheese and banana pudding, often sharing her creations at family gatherings and church potlucks.
  core: Linda Cato is an organized, high‑energy teen whose relentless drive to excel in sports, academics, and community service is tempered by a persistent undercurrent of anxiety that fuels both meticulous
    planning and occasional over‑commitment.
background:
  cultural: Linda grew up in Denham Springs, a tight-knit Southern town where her African-American heritage is celebrated through family gatherings, church life, and community events. Her family places
    great value on traditions such as cooking gumbo and collard greens, listening to gospel and contemporary R&B, and honoring milestones like Juneteenth and Kwanzaa. Active participation in her local Baptist
    church has shaped her sense of service, providing opportunities to lead youth programs and choir performances. As a black teenager in Louisiana, Linda is keenly aware of both the challenges and the
    strengths of her community, drawing inspiration from local role models and the resilient spirit of her neighborhood to pursue her goals.
attributes:
