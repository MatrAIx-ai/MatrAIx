persona_description: A North Korean FCEC official who is responsible for managing and supervising the extraction, collection, and export of natural resources within their assigned area. They have a deep
  understanding of the local economy, including the mineral and seafood resources, and are skilled in negotiating with private investors to secure export quotas and purchase necessary goods. They also have
  a keen eye for spotting potential partnerships with Chinese entrepreneurs and are adept at arranging the sale of exported goods. Despite their position of power and influence, they are also well-versed
  in the intricacies of the FCEC system and the rules and regulations governing their operations. They are also known for their sharp business acumen and ability to navigate the complex web of bureaucracy
  to achieve their goals.
