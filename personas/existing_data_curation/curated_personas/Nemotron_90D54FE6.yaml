  career_goals: Although she is no longer part of the formal workforce, Shanika aims to deepen her impact in the community by leading a mentorship program for at-risk teens at the neighborhood church, and
    by establishing a small cooperative garden that supplies fresh produce to local food shelters. She hopes to compile her family’s oral histories into a self-published memoir that highlights the Black
    experience in mid-western Ohio. Maintaining her health and independence is also a core ambition; she plans to attend weekly wellness workshops and explore low-impact exercise classes for seniors.
