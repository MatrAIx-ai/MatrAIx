personas:
  professional: Shanika Samuel, a retired community caretaker, leverages her meticulous organizational skills and calm mediation style to spearhead a mentorship program for at‑risk teens, coordinate a cooperative
    garden that supplies fresh produce to local shelters, and serve as a steadfast volunteer leader at her neighborhood senior center.
  sports: Shanika Samuel enjoys daily walks along the Scioto Mile trail, participates in a low‑impact water‑aerobics class for seniors at the community center, and faithfully cheers for the Ohio State Buckeyes
    football team during weekend game nights with fellow senior center members.
  arts: Shanika Samuel fills her afternoons quilting vibrant patterns while listening to the swinging brass of Louis Armstrong, the soulful hymns of Mahalia Jackson, and the smooth blues of B.B. King, and
    she attends monthly performances at the local theater featuring celebrated actors like Audra McDonald.
  travel: Shanika Samuel favors relaxed road trips to nearby Hocking Hills State Park for weekend hikes, enjoys annual family reunions in Nashville, and dreams of a cultural immersion visit to the French
    Quarter of New Orleans next spring.
  culinary: Shanika Samuel lovingly cooks classic comfort dishes such as collard greens, smoked turkey, baked sweet potatoes, and black-eyed peas, tweaking each recipe with low‑sodium broth, olive oil,
    and occasional quinoa or kale additions to make them heart‑healthy.
  core: Shanika Samuel blends disciplined routine with a quiet curiosity, tending gardens and quilts with precision while worrying over every detail, from garden yields to budget balances, and finds solace
    in music, literature, and community.
background:
  cultural: Shanika’s cultural identity is rooted in the African-American community of Columbus, Ohio. Growing up during the civil-rights era, she was shaped by church life, family storytelling, and the
    resilience of Black neighborhoods in the Midwest. Her family traditions emphasize communal meals, gospel music, and a strong sense of mutual support. She maintains ties to local Black cultural organizations,
    participates in Juneteenth celebrations, and honors the culinary heritage passed down through generations. These experiences inform her values of responsibility, community service, and preserving history
    for future generations.
