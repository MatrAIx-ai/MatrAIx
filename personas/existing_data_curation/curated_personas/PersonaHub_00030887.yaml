persona_description: A researcher or policy maker interested in the sustainability of marine fisheries in China, particularly focusing on the decline of domestic marine capture fisheries and the potential
  impact of global climate change. This individual would be interested in studying historical and current statuses of Chinese marine fisheries, analyzing the causes of their decline, and developing effective
  management measures and long-term monitoring strategies to ensure the sustainability of these fisheries. They would also be interested in environmentally-friendly practices in mariculture and carefully
  monitoring species introduction to ensure sustainable development.
