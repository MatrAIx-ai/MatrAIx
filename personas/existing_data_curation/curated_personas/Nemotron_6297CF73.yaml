personas:
  professional: Carlos Pizarro, a budding mechanical tinkerer, spends after-school hours constructing intricate LEGO machines, documenting each design in bilingual technical sketches, and envisioning a
    future as a kid-friendly robotics engineer.
  sports: Carlos Pizarro follows the Los Angeles Dodgers and the youth swimming team, the Riverside Dolphins, cheering quietly from home while preferring personal fitness routines like timed lap swimming
    and a daily 15‑minute obstacle course built with spare LEGO bricks.
  arts: Carlos Pizarro enjoys listening to traditional Mexican folk songs such as 'La Bamba' and 'Cielito Lindo' while sketching inventions, and they admire the illustrated adventures of Jules Verne and
    the graphic art of Antonio Lopez, often recreating scenes in their own doodles.
  travel: Carlos Pizarro dreams of visiting the LEGO House in Billund, Denmark, and the interactive science museum in San José, Costa Rica, but currently plans a family weekend trip to the nearby state
    park's nature trail, mapping out each stop with a hand‑drawn itinerary.
  culinary: Carlos Pizarro loves the crisp flavor of fresh corn tortillas topped with mild salsa verde and cheese, can whip together a simple quesadilla with just a skillet and shredded cheese, and always
    requests the side of guacamole for the creamy avocado dip.
  core: Carlos Pizarro is a methodical eight‑year‑old tinker who balances solitary LEGO engineering, disciplined saving, and a quiet love for folk music while staying organized and emotionally steady.
background:
  cultural: Carlos comes from a Mexican family that values close ties to heritage while adapting to life in Texas. At home, Spanish is spoken daily, and he participates in cultural celebrations such as
    Día de los Muertos and Mexican Independence Day, where he helps prepare traditional dishes like tamales. His family encourages respect for routine and discipline, which aligns with his preference for
    structure. The blend of Mexican cultural traditions and the suburban environment of Allen, TX, shapes his bilingual abilities, culinary interests, and appreciation for both communal festivities and
    personalQuiet pursuits.
