personas:
  professional: Michael Walters is a high‑school sophomore who channels his love of fishing and hands‑on model kit construction into a budding interest in mechanical engineering, spending free afternoons
    tinkering with Revell kits and dreaming of designing farm‑tech equipment, all while maintaining a relaxed, routine‑driven work ethic that sometimes slips into mild procrastination.
  sports: Michael Walters follows the Seattle Seahawks and Washington State Cougars football teams, rides with the Yakima River Cyclists club on weekends, and balances casual fishing trips on the Yakima
    River with a laid‑back approach to fitness that favors fun over regimented training.
  arts: 'Michael Walters enjoys assembling detailed model kits, listening to classic rock legends like Led Zeppelin and The Eagles alongside country singers such as Carrie Underwood, and diving into graphic
    novels like Saga and Batman: The Killing Joke, often pairing these hobbies with late‑night gaming sessions of Minecraft and FIFA.'
  travel: Michael Walters prefers family road trips that blend familiar comforts with scenic adventure, having explored the Columbia River Gorge and Mt. Rainier while dreaming of a future visit to Crater
    Lake and the bustling streets of New York City, always planning itineraries that balance budget constraints with spontaneous stops.
  culinary: Michael Walters favors grilled trout fresh from the river, pepperoni pizza with extra cheese, and classic fish tacos, cooking at a moderate skill level by mastering the family grill and occasionally
    experimenting with dill and lemon‑buttered potatoes, while still relying on their parents for more elaborate meals.
  core: Michael Walters is a routine‑loving teen who finds calm in fishing, model kits, and classic rock, yet wrestles with occasional anxiety and a habit of putting off chores until the last minute.
background:
  cultural: Michael is a white teen of mixed German and Irish ancestry raised in Yakima, Washington. His family’s roots are tied to the region’s agricultural heritage, and he grew up attending local community
    events such as county fairs and volunteers at the church youth group. The cultural atmosphere emphasizes hard work, self‑reliance, and close‑knit neighborly relationships, which shape his practical
    outlook and preference for familiar routines.
attributes:
  skills: '[''Orchard fruit picking and pruning'', ''Basic small‑engine repair'', ''Equipment maintenance (tractor, irrigation)'', ''Simple cooking and meal preparation'', ''Casual computer use (gaming,
