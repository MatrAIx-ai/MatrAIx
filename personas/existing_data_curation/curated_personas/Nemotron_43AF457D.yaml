  hobbies: '[''Fishing'', ''Playing video games (Minecraft, FIFA)'', ''Watching football'', ''Model kit building'', ''Listening to classic rock and country music'', ''Biking'', ''Helping with family chores'',
    ''Reading graphic novels'', ''Occasional skateboarding'']'
  career_goals: Michael wants to finish his high‑school equivalency (GED) and secure a stable, routine-driven job that lets him stay close to his Yakima community. He is interested in becoming an agricultural
    technician or a diesel mechanic, pursuing a trade apprenticeship that blends his love for practical work with the reliability of a well‑defined schedule. Long‑term, he dreams of helping run the family
    orchard or owning a small piece of farmland where he can apply his hands‑on skills and provide for his family.
