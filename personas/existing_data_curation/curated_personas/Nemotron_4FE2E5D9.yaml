  career_goals: Ricardo aims to secure a full‑time role as a multimedia content creator or creative coordinator within a cultural nonprofit or forward‑thinking agency in New York, where he can merge his
    artistic passions with community engagement. He plans to complete a bachelor's degree in Fine Arts to deepen his theoretical grounding, build a professional portfolio that showcases innovative, socially
    resonant projects, and eventually launch a community‑driven arts program that connects Ecuadorian diaspora youth with creative mentorship opportunities. Stability, creative impact, and personal growth
    are central to his ambitions.
