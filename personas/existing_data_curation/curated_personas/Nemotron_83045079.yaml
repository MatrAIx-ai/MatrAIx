personas:
  professional: Sam Ravine, a 34‑year‑old construction specialist, blends hands‑on expertise in concrete forming, framing, and heavy equipment operation with a methodical, safety‑first mindset, positioning
    themselves for a foreman role while mentoring new laborers and planning a future green‑building subcontracting firm.
  sports: Sam Ravine is a devoted New Orleans Saints fan who rallies with friends at the local sports bar for every Sunday game, follows the Louisiana State University Tigers football team, and spends lazy
    Saturdays fishing the Mississippi River, treating angling as both sport and relaxation.
  arts: Sam Ravine enjoys the vibrant sounds of live jazz, often attending Preservation Hall performances and Mardi Gras parades where the rhythms of Louis Armstrong recordings echo, and they channel that
    creative energy into DIY furniture restoration projects inspired by vintage New Orleans décor.
  travel: Sam Ravine prefers road‑trip adventures along the Gulf Coast, having explored the historic French Quarter in New Orleans, the fishing lodges of the Florida Keys, and dreaming of a future kayak
    excursion through the Everglades while balancing travel costs with family obligations.
  culinary: Sam Ravine experiments with Creole flavors on weekends, perfecting gumbo that simmers with a dark roux, okra, and smoked andouille sausage, and whipping up jambalaya packed with shrimp, crawfish,
    and long‑grain rice, while they frequently source ingredients at local farmers’ markets and indulge in beignets from Café du Monde.
  core: Sam Ravine is a pragmatic builder who channels a love for structured safety, Southern football, fragrant Cajun cuisine, and quiet river fishing into a balanced, hands‑on lifestyle dotted with occasional
    DIY exuberance and disciplined budgeting.
background:
  cultural: Sam grew up in a working‑class white family in suburban New Orleans, where Southern hospitality and community festivals were a regular part of life. He was raised on the region’s blend of Cajun
    and Creole food, jazz and brass band music, and the tradition of Mardi Gras celebrations. Although his heritage is rooted in Anglo‑American culture, his upbringing in Orleans Parish has given him a
    deep appreciation for the city’s unique culinary, musical, and social customs, which he incorporates into his daily life and relationships.
attributes:
  skills: '["Concrete forming","Drywall installation","Framing","Masonry","Heavy equipment operation (backhoe, excavator, forklift)","Blueprint reading","OSHA safety compliance","Local building code knowledge","Troubleshooting
    on site","Team coordination and training"]'
  hobbies: '["Fishing","Watching New Orleans Saints football","Cooking Creole cuisine","DIY home improvement","Restoring vintage furniture","Attending Mardi Gras and local music events"]'
  career_goals: Sam aims to move beyond entry‑level labor to become a crew foreman within the next three years. He plans to obtain an OSHA 30‑hour certification and a commercial driver’s license to expand
    his responsibilities. Long‑term, he hopes to start his own small construction subcontracting business, focusing on residential renovations and green building practices. He also wants to become a certified
    construction safety officer to improve workplace safety standards on his future projects.
