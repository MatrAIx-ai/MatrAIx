  hobbies: '["vegetable gardening","birdwatching","classic car restoration","reading historical nonfiction and Southern literature","weekly chess club","cooking Southern cuisine","home‑improvement DIY projects"]'
  career_goals: Although retired from formal employment, Calvin aims to stay actively engaged in his community. He hopes to volunteer as a mentor for a local middle‑school STEM club, sharing his practical
    knowledge while continuing his own learning through online courses on emerging technologies. He also intends to contribute to the preservation of a historic neighborhood in Williamson County by offering
    his woodworking and restoration skills. A personal ambition is to write a memoir that weaves together his life experiences, family history, and reflections on the evolution of technology, providing
    a resource for future generations of his family.
