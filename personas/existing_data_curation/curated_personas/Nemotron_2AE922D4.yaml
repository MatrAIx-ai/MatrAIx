  hobbies: '[''Reading historical non-fiction and classic literature'', ''Photography (urban and nature)'', ''Hiking in the Carolina foothills'', ''Walking on Wrightsville Beach'', ''Cooking (Southern cuisine)'',
    ''Home brewing craft beer'', ''Attending small art gallery events'', ''Playing board games with close friends'', ''Genealogy research'', ''Listening to jazz and folk music'']'
  career_goals: Michael aims to obtain his CPA certification within the next year and secure a senior auditor position at a reputable regional accounting firm. Over the next five years, he aspires to advance
    to audit manager, overseeing larger client engagements and mentoring junior staff. Long‑term, he envisions moving into a finance leadership role—such as CFO—at a mid‑size company or a nonprofit arts
    organization in Wilmington, where he can combine his financial acumen with his passion for the humanities and community development. He also dreams of establishing a boutique consulting practice that
    assists local cultural institutions with financial strategy and sustainability.
