personas:
  professional: Michael Scott is a detail‑oriented accountant with advanced Excel, SAP and QuickBooks expertise who blends his structured GAAP compliance mindset with a spontaneous flair for creative problem‑solving,
    enabling them to deliver accurate financial reports while mentoring junior staff and pursuing a CPA certification.
  sports: Michael Scott enjoys weekend hikes in the foothills, sunrise beach runs at Wrightsville, and cheerfully follows the Carolina Panthers and Charlotte Hornets, while they belong to a local running
    club that meets for weekly jogs and occasionally compete in a casual beach‑volleyball league during summer.
  arts: Michael Scott attends intimate art gallery openings featuring local realist painters like Terry Shamsie, spins vinyl of John Coltrane and Bob Dylan, and captures urban architecture through black‑and‑white
    photography, letting their love for history and storytelling shape their aesthetic sensibility.
  travel: Michael Scott prefers low‑key, research‑driven trips, such as a genealogy‑focused road trip to Savannah’s historic district and a solo backpacking adventure through the Scottish Highlands, planning
    each itinerary meticulously but leaving room for spontaneous photo walks, all while balancing a modest travel budget.
  culinary: Michael Scott enjoys cooking Southern comfort dishes like shrimp and grits, fried chicken, and collard greens, experiments with home‑brewing a hoppy IPA, and frequently incorporates smoked paprika,
    pecans, and buttermilk into their recipes, showcasing a solid intermediate cooking skill level.
  core: Michael Scott is a disciplined accountant with a quiet penchant for historic novels, spontaneous photography, and home‑brewed beer, whose structured work ethic coexists with a love for solitary
    reflection and occasional impulsive indulgences.
background:
  cultural: Michael identifies as a white American with deep Southern roots. He was raised in a suburban community near Wilmington, NC, in a middle‑class family that valued hard work, modesty, and community
    service. His upbringing included regular attendance at a Baptist church, participation in regional traditions such as the Azalea Festival, and an appreciation for the coastal and historic culture of
    the area. He embraces Southern hospitality and culinary customs—like barbecue and biscuits—while also being shaped by the broader liberal arts perspective gained from his university education in arts
    and humanities.
attributes:
  skills: '[''Financial reporting'', ''Tax compliance'', ''Internal auditing'', ''GAAP'', ''Advanced Excel modeling'', ''QuickBooks and SAP'', ''Data analysis'', ''Regulatory compliance'', ''Project management'',
