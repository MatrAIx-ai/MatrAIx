  career_goals: Although officially retired, Long Ho seeks to stay intellectually active by contributing his technical knowledge to local non‑profits that promote STEM education for middle‑school students.
    He aspires to develop a community workshop series on sustainable home improvements, author a guidebook on practical DIY engineering for seniors, and serve on the Greer town advisory board to advocate
    for environmentally responsible infrastructure. His ambition is to blend his curiosity for new technologies with a practical desire to improve everyday life for his neighbors.
