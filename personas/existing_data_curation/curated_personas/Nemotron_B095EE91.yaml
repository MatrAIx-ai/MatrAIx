personas:
  professional: Long Park is a retired mechanical engineer and former project manager who now volunteers technical expertise to local STEM nonprofits, systematically mentors junior engineers, drafts DIY
    engineering guides for seniors, and serves on the Greer town advisory board, embodying a methodical, reliable, and collaborative approach.
  sports: Long Park is an avid hiker of the Blue Ridge trails, a member of a senior walking club that meets on Saturday mornings, follows the Greenville Drive minor-league baseball team, and cheers for
    the Carolina Panthers during football season, integrating moderate cardio exercise with social sports fandom.
  arts: Long Park is a dedicated calligrapher who practices brush-stroke techniques three times a week, regularly attends performances by the Charleston Symphony Orchestra and local theater productions
    featuring classic plays, and curates a small collection of traditional landscape paintings that inspire their woodworking designs.
  travel: Long Park is a road-trip enthusiast who has explored Asheville's art scene, visited Washington D.C.'s museums during a spring family vacation, enjoys annual trips to the Great Smoky Mountains,
    and dreams of touring the Canadian Rockies, often planning itineraries months in advance to balance budget constraints and family time.
  culinary: Long Park is a culinary hobbyist who perfects fermented vegetable stew with locally sourced cabbage, garlic, and a dash of pepper paste, pairs it with Southern-style smoked pork ribs and sweet
    potato mash, and experiments with seasonal farm produce, showcasing a skillful blend of traditional fermentation techniques and Southern flavors.
  core: Long Park blends meticulous engineering logic with a love for gardening, hiking, and calligraphy, channels practicality into community service, keeps a disciplined budget, and balances disciplined
    health routines with occasional indulgent weekend feasts.
background:
  cultural: Born to South‑Korean immigrant parents, Long Ho grew up in a bilingual household that emphasized respect for elders, collective harmony, and a strong work ethic. He maintains many Korean customs,
    such as celebrating Chuseok and Lunar New Year with his family, preserving ancestral rites, and practicing Korean tea ceremony. While fully integrated into the Greer community, his cultural identity
    remains a guiding influence in his emphasis on cooperation, modesty, and service to others.
