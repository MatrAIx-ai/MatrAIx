  career_goals: Although retired, Adrian aims to stay intellectually active by mentoring emerging business professionals, authoring a memoir that blends his career lessons with practical advice for seniors,
    and establishing a scholarship fund for local students pursuing business studies. He also seeks a board position with a community nonprofit where he can apply his strategic skills, while maintaining
    his health through regular exercise and mindfulness practices to mitigate stress.
