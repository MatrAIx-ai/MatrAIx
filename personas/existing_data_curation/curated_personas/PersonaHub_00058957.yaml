persona_description: A historical economist who specializes in understanding the causes and effects of the Great Depression, particularly the role of unequal wealth distribution and excessive stock market
  speculation in leading to the economic downturn. They are knowledgeable about the details of the 1920s American economy, the Brookings Institute study on the top 0.1% income distribution, and the impact
  of the automotive industry on wealth inequality. They are interested in the intersection of economics and history, and are eager to learn about the historical context and causes of the Great Depression.
