  career_goals: Though retired from the formal workforce, Radwan aims to leave a lasting educational legacy in his community. He plans to establish a small local history archive and volunteer as a literacy
    tutor for seniors. He hopes to author a memoir that weaves personal stories with the region’s colonial past, and to run occasional woodworking workshops at the community center, passing his craft to
    interested adults. He also aspires to mentor a new generation of teachers through a summer apprenticeship program, fostering practical, curiosity‑driven pedagogy.
