  career_goals: Lily aims to advance to a senior finance leadership role within the next five years, targeting positions such as Finance Director or Chief Financial Officer for a regional company or a growing
    agribusiness in the Santa Barbara area. She plans to obtain her Certified Public Accountant (CPA) license to broaden her professional credibility and to lead a finance‑transformation initiative that
    streamlines reporting processes through automation. Lily is also passionate about championing diversity in finance, so she intends to mentor other women and under‑represented professionals in the industry
    and to collaborate with local economic development groups to strengthen the financial health of small businesses in Lompoc.
