personas:
  professional: Lily Donkor is a pragmatic financial manager who leverages 15 years of budgeting, forecasting and risk assessment expertise to streamline mid‑size business finances in Santa Barbara County,
    translating complex data into actionable insights for senior leadership while mentoring cross‑functional teams and championing diversity in finance.
  sports: Lily Donkor energizes weekends with spin classes at a downtown studio, competitive Zumba sessions, and spirited beach volleyball matches with the Lompoc Beach Volleyball Club, while rooting for
    the Los Angeles Dodgers and joining the Santa Ynez Trail Runners for weekend hikes in the mountains.
  arts: Lily Donkor fills their free evenings on stage with the Lompoc community theatre’s musical productions, channeling the Broadway energy of Lin‑Manuel Miranda while sipping wine and discussing the
    latest novel by Celeste Ng, and they unwind by listening to Adele’s soulful ballads during dinner preparations.
  travel: Lily Donkor prefers carefully planned road trips along the Pacific Coast Highway, balancing vineyard tours in Napa with a weekend hike in Tuscany’s Chianti hills, while budgeting for occasional
    family visits to Santa Barbara and dreaming of a cultural immersion in Marrakech’s souks.
  culinary: Lily Donkor’s culinary hobby revolves around Mediterranean cooking, mastering dishes like roasted lamb with rosemary, chickpea shakshuka and grilled branzino, seasoning them with Kalamata olives,
    feta cheese and fresh basil, and they often pair these meals with a glass of local Pinot Noir from Santa Barbara’s vineyards.
  core: Lily Donkor blends a structured financial mind with a love for community, wine, and an active social life, tackling budgets with the same vigor they bring to beach volleyball, all while juggling
    gentle health quirks and a penchant for spontaneous music moments.
background:
  cultural: Lily comes from a third‑generation white, middle‑class family that settled in the Central Coast of California during the post‑World War II era. Her upbringing blended the small‑town values of
    Lompoc—close‑knit community, agricultural heritage, and a strong work ethic—with the broader Californian appreciation for outdoor life and cultural diversity. Her family’s roots trace back to Midwestern
    farming communities, which has instilled in her a respect for hard work, practicality, and community service. Growing up near the flower fields and vineyards, Lily developed an affinity for local agriculture
    and the region’s wine culture, which continues to shape her personal interests and civic involvement.
