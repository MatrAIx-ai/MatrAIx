personas:
  professional: Eboni Snowden is a reliable material mover in Columbia County’s warehouses, certified in forklift operation and inventory management, who thrives on structured workflows while mentoring
    new teammates, and now pursues a shift‑lead role bolstered by plans for a logistics certification and first‑aid training.
  sports: Eboni Snowden enjoys solitary weekend hikes on the Catskill trails as a member of the Columbia County Hiking Association, listens to classic soul and jazz icons like Aretha Franklin and John Coltrane
    while walking, and roots for the New York Knicks and New York Mets when watching televised games.
  arts: Eboni Snowden indulges in historical fiction by Hilary Mantel and memoirs of community resilience by Jesmyn Ward, sketches the Catskill foothills inspired by Thomas Cole’s Hudson River School paintings,
    and fills quiet evenings with the soulful sounds of Aretha Franklin and the improvisational jazz of John Coltrane, shaping a reflective and aesthetically grounded identity.
  travel: Eboni Snowden prefers low‑key, spontaneous weekend getaways that combine garden‑inspired relaxation with gentle exploration, having trekked the Finger Lakes wine region and the Adirondack High
    Peaks, while dreaming of a summer agritourism stay in Tuscany’s rolling hills to study heirloom tomato cultivation.
  culinary: Eboni Snowden, an intermediate home cook, harvests garden tomatoes and kale to create rustic tomato‑basil focaccia, hearty kale and white‑bean soup, and a crackly sourdough loaf flavored with
    rosemary, all while experimenting with family‑style chicken and dumpling recipes that echo cherished gatherings.
  core: Eboni Snowden blends a love for quiet, structured work with a compassionate drive to nurture both people and plants, balancing a physically demanding warehouse job with evening gardening, baking,
    and a habit of meticulous budgeting that occasionally borders on obsession.
background:
  cultural: Eboni’s cultural background is rooted in her African‑American heritage and the working‑class community of upstate New York. Raised by parents who emphasized hard work, self‑reliance, and mutual
    aid, she grew up attending local churches where gospel music and community service were central. The blend of Black cultural traditions—such as storytelling, soulful music, and a deep respect for collective
    well‑being—intersects with the rural, seasonal rhythms of the Hudson Valley. This dual influence informs her strong sense of empathy, her commitment to helping others in her neighborhood, and her appreciation
    for quiet, reflective spaces where she can honor both her family’s legacy and her personal values.
