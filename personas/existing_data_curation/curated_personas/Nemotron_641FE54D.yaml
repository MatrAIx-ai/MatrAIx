  career_goals: Eboni aims to advance into a supervisory role within the warehouse environment, such as shift lead or inventory coordinator. She plans to earn a certified supply‑chain logistics credential
    and obtain a first‑aid/CPR certification to broaden her responsibilities. Over the next few years she intends to complete a GED, enroll in a community‑college program in logistics, and gain certification
    in hazardous‑material handling. Her long‑term ambition is to combine her love of structure with her compassionate nature by overseeing a team that prioritizes safety, fairness, and a supportive workplace
    culture, while also mentoring new workers from under‑represented backgrounds.
