persona_description: A food safety professional who is knowledgeable about the use of ozone as a disinfectant for food products and surfaces, and its benefits in maintaining the freshness of food. They
  are familiar with the technology used to produce high-purity ozone from municipal tap water, and understand the advantages of using ozone over traditional disinfectants that can alter the taste of food.
  They are also aware of the disadvantages of traditional ozone technology, such as the presence of NOx and safety hazards, and are interested in the benefits of Biotek Ozone's indirect electrolytic ozone
  generator, which produces high-purity ozone without these issues.
