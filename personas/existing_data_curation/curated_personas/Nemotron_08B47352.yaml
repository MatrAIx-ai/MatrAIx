  hobbies: '[''Hiking'', ''Mountain biking'', ''Snowboarding'', ''Woodworking'', ''Reading business and engineering books'', ''Listening to tech and construction podcasts'', ''Visiting craft breweries'',
    ''Board‑game nights'', ''Mentoring youth apprentices'']'
  career_goals: Albert aims to transition from a first‑line supervisor to a full‑scale construction project manager within the next three years, eventually earning a Professional Engineer (PE) license or
    Certified Construction Manager (CCM) credential. He plans to lead larger commercial and mixed‑use developments in the Denver metro area, emphasizing sustainable building practices and integration of
    green technologies. In the longer term, Albert dreams of founding his own construction consulting firm that specializes in lean construction and safety optimization for mid‑size contractors. To support
    these goals, he intends to pursue a master’s degree in construction management and obtain certifications such as PMP and OSHA 30‑Hour.
