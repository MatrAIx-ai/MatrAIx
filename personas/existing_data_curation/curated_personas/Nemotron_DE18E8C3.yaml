personas:
  professional: A precocious leader of make-believe board meetings, June Cross runs their backyard store with meticulous inventory lists, prefers clear rules for playtime, loves charming the other kids
    with lively storytelling, competes for the top sales spot, and never misses a chance to organize the Lego shelves.
  sports: An energetic mini-soccer enthusiast, June Cross plays for the Little Explorers Soccer Club at the neighborhood park, cheers for the Chicago Cubs during family outings, and never skips the after-school
    swim lesson that keeps their energy in check.
  arts: A vivid imaginative creator, June Cross fills sketchbooks with bold Crayon drawings of Bluey characters, sings along to Idina Menzel's Let It Go, enjoys watching Sesame Street's Elmo and Abby Cadabby
    dance, and proudly mimics their moves.
  travel: A curious young explorer, June Cross loves short road trips to the city zoo, dreams of one day visiting Disneyland in California, prefers staying in hotels with bubble-bath tubs, and always packs
    a favorite stuffed rabbit for reassurance.
  culinary: A selective but adventurous eater, June Cross devours cheesy macaroni, slathers peanut butter and strawberry jam on whole-grain bread, relishes carrot sticks dipped in hummus, and proudly helps
    stir batter for blueberry muffins while insisting the oven timer be set exactly at 12 minutes.
  core: June Cross is a talkative, structure-loving, sociable 4-year-old who thrives on predictable routines, loves captivating peers with stories, and tackles daily challenges with a competitive spark.
background:
  cultural: June was raised in Princeton, a small town in Johnston County, North Carolina, in a white, middle‑class family with deep Southern roots. Her family attends a local Methodist church, celebrates
    traditional holidays such as Thanksgiving and Fourth of July with community potlucks, and enjoys regional foods like fried chicken and sweet tea. The community emphasizes close‑knit neighborhood ties,
    church gatherings, and school events, all of which shape her cultural experiences.
attributes:
  skills: '[''Early literacy'', ''Basic numeracy'', ''Following multi-step routines'', ''Fine motor coordination'', ''Verbal communication'', ''Organizing and sorting'', ''Early problem solving'', ''Leadership
    in play'']'
  hobbies: '[''Building blocks'', ''LEGO'', ''Singing nursery rhymes'', ''Dancing'', ''Storytelling'', ''Structured games'', ''Circle time activities'', ''Reading picture books'', ''Puzzle solving'']'
  career_goals: June dreams of becoming a teacher or school leader, where she can organize classroom activities, share stories, and guide peers while enjoying the structure of lesson plans. She also imagines
    herself as a champion in friendly spelling or math contests and hopes to one day coach a team of younger children, combining her love for competition with her sociable nature.
