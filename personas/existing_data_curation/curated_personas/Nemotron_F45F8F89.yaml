personas:
  professional: Marshall Goepp is a veteran high-voltage transmission line specialist who now channels four decades of climbing, safety, and crew-lead expertise into mentorship, safety-officer duties, and
    consulting on small-scale renewable projects, balancing their competitive drive with a pragmatic, safety-first mindset, and they inspire apprentices with a blend of rigor and curiosity.
  sports: Marshall Goepp hikes the Cascades with the Cascades Climbing Society, spends weekends fishing and crabbing in Puget Sound, and cheers for the Seattle Seahawks, blending a modest fitness routine
    with a competitive edge that loves debating the best fishing spots with fellow club members, and they relish the challenge of honing their stamina on steep terrain.
  arts: Marshall Goepp crafts custom wooden furniture and restores a 1960s pickup while enjoying the sounds of Fleet Foxes and Bob Dylan, attending Skagit County Historical Society lectures, and occasionally
    catching a performance at the Pacific Northwest Playhouse, letting music and history shape their creative identity, and they share their insights with friends over a glass of whiskey.
  travel: Marshall Goepp favors road-trip adventures that combine fishing on the San Juan Islands, a nostalgic visit to the Grand Canyon, and a dream of cruising the Alaskan Inside Passage, planning trips
    around weekends and budget constraints while preferring practical, self-driven itineraries, and they eagerly map each route using both paper maps and their ham radio contacts for weather updates.
  culinary: Marshall Goepp prefers fresh Pacific Northwest seafood like cedar-plank salmon and Dungeness crab cakes, cooks with a solid intermediate skill level, regularly brews dark roast coffee, and they
    enjoy a post-work glass of rye whiskey while tinkering with his ham-radio antenna, occasionally over-indulging in hearty meatloaf and apple pie.
  core: Marshall Goepp is a charismatic, competitively-driven retiree who blends seasoned utility expertise with a love for outdoor adventure, hands-on craftsmanship, and spirited community debate, all
    while juggling a pragmatic yet occasionally indulgent lifestyle, and they approach each day with a blend of curiosity and disciplined practicality.
background:
  cultural: Marshall grew up in a multigenerational, working‑class family of German‑Scandinavian descent in the rural Pacific Northwest. The region’s strong connection to the outdoors, self‑reliance, and
    community cooperation shaped his values. He has lived most of his adult life in Skagit County, where he participates in local festivals, supports the county fair, and attends a Lutheran congregation
    that emphasizes service and modesty. While he appreciates the progressive environmental discussions common in Washington, his practical upbringing leads him to balance new ideas with proven methods,
    reflecting the blend of traditional rural culture and the evolving tech‑savvy spirit of the area.
attributes:
  skills: '["High‑voltage power line installation", "Live line maintenance", "Electrical safety compliance", "Climbing and rope‑rigging techniques", "Blueprint and schematic interpretation", "Preventive
    maintenance planning", "Team leadership and crew supervision", "Training and mentorship of apprentices", "Emergency outage response", "Smart‑grid integration basics"]'
  hobbies: '["Volunteer fire‑watch leadership", "Fishing and crabbing in Puget Sound", "Cascades hiking", "Amateur radio (ham) operation", "Woodworking and furniture making", "Vintage pickup truck restoration",
    "Weekly card‑game nights", "Historical society lectures and debates"]'
  career_goals: Approaching retirement, Marshall aims to transition from hands‑on line work to a mentorship and safety‑officer role within his utility. He plans to complete his journeyman certification,
    obtain a Certified Safety Professional credential, and volunteer as an adjunct instructor at the local technical college to pass on his practical knowledge. He also hopes to consult on small‑scale renewable‑energy
    projects for nearby farms, leveraging his curiosity about new transmission methods while preserving the reliability his community depends on.
