  career_goals: Approaching retirement, Vernon aims to transition into a senior training and mentorship role within the department, guiding younger officers in de‑escalation techniques and community engagement.
    He aspires to become the precinct’s community liaison, using his appreciation for the arts to develop collaborative programs with local galleries and schools that address at‑risk youth. Vernon also
    plans to complete a GED and pursue a certificate in mental‑health crisis intervention, positioning himself to advise on police‑mental health partnerships after his service ends. Long‑term, he hopes
    to author a guide on compassionate policing based on his 30‑year career and to volunteer with a nonprofit focused on veterans’ reintegration.
