personas:
  professional: Justine Hess, a ten‑year‑old aspiring storyteller who loves to blend hand‑drawn illustrations with simple Scratch animations, channels their vivid imagination and love for novelty into creating
    whimsical short stories and interactive games, though their spontaneous nature often leads to loose timelines and a preference for creative freedom over strict deadlines, and they eagerly share their
    creations with friends and family.
  sports: Justine Hess enjoys community soccer, playing forward for the Lexington Lightning U‑11 squad in the fall league, and spends Saturday afternoons cheering for the South Carolina Gamecocks football
    team and the Columbia Fireflies minor‑league baseball club, while they prefer cooperative board games over solo competition and regularly bike rides through the neighborhood park for casual exercise.
  arts: Justine Hess immerses themselves in the arts by sketching scenes inspired by J.K. Rowling’s wizarding world, listening to Taylor Swift’s storytelling songs while painting whimsical characters, marveling
    at Pixar’s vibrant animation in movies like Coco, and drawing influence from Beatrix Potter’s delicate illustrations, all of which they weave into their own creative projects.
  travel: Justine Hess loves family road trips to the historic streets of Charleston and the breezy trails of Table Rock State Park, has explored the interactive exhibits at the South Carolina State Museum,
    and dreams of saving for a summer adventure to Orlando’s theme parks, while they balance excitement for travel with the modest budget the family sets for vacations.
  culinary: Justine Hess delights in Southern comfort foods, often helping to bake flaky biscuits and fried chicken for Sunday dinner, sipping sweet tea with a splash of lemon, and experimenting with homemade
    chocolate chip cookies that feature dark chocolate chunks and fresh strawberries, while they occasionally trade their favorite candy for extra LEGO bricks at the local market.
  core: Justine Hess is a ten‑year‑old dreamer who blends Southern storytelling traditions with boundless imagination; they balance a love for art, nature, and LEGO bricks against occasional worries and
    a sweet tooth for biscuits and candy.
background:
  cultural: Justine lives in Lexington, a suburban community in Richland County, South Carolina. Her family is middle‑class and has deep roots in the American South, with a heritage that includes German
    and Irish ancestry. The household participates in local traditions such as attending a nearby Baptist church on Sundays, sharing family meals featuring Southern foods like biscuits, fried chicken, and
    sweet tea, and taking part in community events like the Lexington Farmers Market and the annual county fair. Her parents place a strong emphasis on education, encouraging trips to the South Carolina
    State Museum, public libraries, and nature parks. The close‑knit neighborhood values politeness, cooperation, and modesty, which reinforce Justine’s kind and considerate nature. While she enjoys these
    regional customs, her family also fosters a love of storytelling and creativity, often gathering for evenings of reading and sharing imaginative ideas.
attributes:
  skills: '[''Imaginative storytelling'', ''Illustration with drawing and watercolors'', ''Basic Scratch programming'', ''Creative writing'', ''Empathy and conflict mediation'', ''Puzzle solving'', ''LEGO
    model construction'', ''Basic piano playing'']'
  hobbies: '[''Sketching and painting'', ''Reading fantasy and science books'', ''Short story and poetry writing'', ''Scratch programming'', ''Nature exploration (collecting leaves, rocks)'', ''LEGO building'',
    ''Cooperative board games'', ''Piano practice'', ''Journaling'']'
  career_goals: While she is only ten, Justine already dreams of a future where she can combine her love of art and ideas. She hopes to become an illustrator and author of children’s books that make abstract
    concepts like emotions, nature, and science accessible to other kids. She also imagines designing video games or interactive stories that let players explore imaginative worlds at their own pace. Ultimately,
    she wants her creative work to bring comfort, spark curiosity, and help others feel understood.
