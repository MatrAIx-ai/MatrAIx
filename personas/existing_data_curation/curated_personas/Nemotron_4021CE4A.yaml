  hobbies: '[''Sketching'', ''Street photography'', ''TikTok/Instagram video creation'', ''K‑pop/V‑pop listening'', ''Hip‑hop dancing'', ''Anime and manga fandom'', ''Cooking Vietnamese dishes'', ''Basketball'',
    ''Volunteering at youth art programs'']'
  career_goals: Trinh aims to channel her creative and competitive spirit into a career in visual communications or graphic design. She plans to enroll in a community college's art program, followed by
    a bachelor’s degree in graphic design or multimedia arts, with the goal of becoming a freelance designer or a creative director for a youth‑focused brand. She also dreams of launching an online platform
    that showcases her artwork, highlights Southeast Asian culture, and offers mentorship to other teenagers. In the long term, she hopes to open a community art space in Hampton where she can host workshops,
    exhibitions, and cultural events.
