personas:
  professional: Trinh Soe is a high‑school senior who harnesses digital illustration, street photography, and short‑form video editing to craft eye‑catching social‑media campaigns, while leading informal
    art clubs with a relaxed, improvisational planning style that reflects their curious and competitive spirit.
  sports: Trinh Soe plays on the Hampton community center’s youth basketball league, idolizes the Virginia Cavaliers, participates in weekend pick‑up games at the local park, and approaches fitness with
    a competitive edge but a relaxed attitude toward strict training regimens.
  arts: Trinh Soe pours their energy into sketching anime characters, creating fan‑art tributes to Studio Ghibli’s Spirited Away and BTS’s music videos, performing hip‑hop dance battles at local open‑mic
    nights, and curating playlists that blend K‑pop, V‑pop, and indie rap, shaping their identity through a vibrant blend of visual and auditory art.
  travel: Trinh Soe dreams of a cultural road‑trip to Japan’s anime districts and a summer visit to New Orleans for its jazz scene, prefers spontaneous weekend getaways over meticulously planned itineraries,
    and balances travel aspirations with family budget constraints, often using student discount programs.
  culinary: Trinh Soe enjoys mastering home‑cooked bánh mì with crisp baguette, pickled daikon, and lemongrass‑marinated pork, tweaks pho broth with star anise and fresh herbs, experiments with bubble‑tea
    pearls, and occasionally orders fast‑food tacos for convenience, reflecting a blend of culinary tradition and teen convenience.
  core: Trinh Soe is a curiosity‑driven, socially‑savvy teen visual storyteller who balances fierce competitive drive with a laid‑back approach to planning, often juggling art, basketball, and cultural
    passions while navigating typical teenage financial and health quirks.
background:
  cultural: Trinh is a second‑generation Vietnamese‑American raised in the diverse city of Hampton, Virginia. Her parents immigrated from Vietnam after the war, preserving traditions like Tet celebrations,
    Vietnamese language use at home, and culinary practices. Growing up, she balanced American school life with cultural activities at a local Buddhist temple and community events that highlight Southeast
    Asian heritage. The multicultural environment of Hampton, which includes a vibrant Asian community alongside Southern hospitality, has cultivated her appreciation for varied artistic expressions and
    reinforced a strong sense of family and cultural identity.
attributes:
  skills: '[''Digital illustration'', ''Graphic design basics (Canva, Photoshop Lite)'', ''Social media content creation'', ''Video editing (iMovie)'', ''Street photography'', ''Public speaking and group
