persona_description: A special education teacher who has experience implementing and advocating for the implementation of Response to Intervention (RTI) in schools. She is knowledgeable about the process
  of identifying students with disabilities and the use of RTI to prevent and address behavior problems. She is also familiar with the assessment and evaluation process and the factors that contribute to
  a student's ability level. She is aware of the importance of collaboration with other professionals and the need for appropriate policies and procedures in making decisions about testing and IEPs. She
  is aware of the challenges in implementing RTI on a large scale and the importance of addressing these challenges.
