personas:
  professional: Javier Aguilar, a 19‑year‑old aspiring school counselor, leverages his bilingual counseling skills, active‑listening talent, and knack for digital resource sharing to run informal workshops
    for peers, while they sometimes scramble to finish materials at the last minute due to a relaxed approach to planning.
  sports: Javier Aguilar, a dedicated street‑basketball player, they spend Saturdays shooting hoops with the Eastside Hoops Crew at Baldwin Park Recreation Center, follow the Los Angeles Lakers and LA Galaxy
    for inspiration, and hike the Angeles National Forest trails where they mix cardio jogging with photography of the wildflower‑filled slopes.
  arts: Javier Aguilar immerses himself in music by blasting regional norteño groups like Los Tigres del Norte alongside indie rock bands such as Tame Impala, they attend local film screenings of director
    Guillermo del Toro’s works, and curate a small Instagram reel series showcasing the vibrant street art of East LA, which fuels their creative outlet between counseling sessions.
  travel: Javier Aguilar dreams of backpacking the historic streets of Guanajuato and the bustling night markets of Oaxaca, they recently road‑tripped to Santa Barbara’s wine country and took a weekend
    getaway to Joshua Tree’s desert cliffs, reflecting a love for both cultural immersion and natural escape on a student budget.
  culinary: Javier Aguilar perfects the art of homemade mole poblano and tamales with masa, chilies, and chocolate, they experiment with quinoa‑based fillings for a healthier twist, but often forget to
    clean the kitchen promptly, leaving pots to soak overnight as a testament to their flexible approach to cooking.
  core: Javier Aguilar is a curiosity‑driven, bilingual mentor who blends community‑rooted compassion with a laid‑back, occasionally chaotic lifestyle, they feel a deep drive to empower underrepresented
    youths while juggling school, side‑projects, and spontaneous adventures.
background:
  cultural: Javier is a first‑generation Mexican‑American raised in Baldwin Park, a vibrant community in Los Angeles County. His parents emigrated from the state of Jalisco and maintain strong ties to Mexican
    traditions, speaking Spanish at home and celebrating holidays such as Día de los Muertos, Navidad, and quinceañeras. He grew up navigating both Mexican and Southern Californian cultures, giving him
    a bicultural identity that values family cohesion, respect for elders, and community service. This heritage informs his commitment to supporting other Latino youth in education and his appreciation
    for Mexican cuisine, music, and festivals.
attributes:
  skills: '[''Active Listening'', ''Empathetic Communication'', ''Bilingual English-Spanish'', ''College Application Guidance'', ''Career Interest Assessment'', ''Small Group Facilitation'', ''Resource
