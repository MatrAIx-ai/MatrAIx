  hobbies: '[''Reading (science fiction)'', ''Listening to regional Mexican and indie music'', ''Strategy video gaming'', ''Cooking Mexican dishes'', ''Street basketball with small group'', ''Hiking and
    photography'', ''Volunteering at cultural festivals'']'
  career_goals: Javier aims to earn an associate’s degree in counseling from a community college, followed by a bachelor’s in psychology or school counseling. He plans to become a certified school counselor,
    focusing on supporting Latino students as they navigate higher education and career pathways. He hopes to design a mentorship program that pairs high‑school students with college volunteers, and eventually
    take a leadership role in shaping equity policies within the Los Angeles County School District. Additionally, he dreams of creating an online platform tailored to bilingual students for career exploration
    and resource sharing.
