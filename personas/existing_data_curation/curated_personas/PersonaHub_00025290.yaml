persona_description: A birder who is passionate about identifying and understanding the various species of redpolls, particularly the Hoary Redpoll. They have extensive experience with redpolls and have
  a keen interest in their biology, ecology, and behavior. They are particularly interested in the differences between Hoary Redpolls and Common Redpolls and the factors that contribute to these differences.
  They are also interested in the identification of intermediate redpolls and the potential for two subspecies of Common Redpoll. They are open-minded and willing to consider alternative explanations for
  the differences between the redpolls they have seen, such as age or feather shape, rather than sticking to arbitrary labels. They are dedicated to learning more about redpolls and improving their identification
  skills.
