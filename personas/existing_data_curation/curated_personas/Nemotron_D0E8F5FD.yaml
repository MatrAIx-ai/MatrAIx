  hobbies: '[''Gardening'', ''Heirloom seed cultivation'', ''Knitting and quilting'', ''Genealogy research'', ''Church choir singing'', ''Book club participation'', ''Birdwatching'', ''Volunteering at community
    events'']'
  career_goals: Although retired, Shannon remains eager to deepen her involvement in the community and pursue personal enrichment. She plans to complete the remaining credits for her associate degree in
    business administration through a local community college, aiming to earn her diploma before the end of the year. She also hopes to write and self‑publish a memoir that captures her family’s Texas heritage
    and the changes she has observed over seven decades. In the next few years, Shannon aspires to expand the senior center’s intergenerational garden program, mentor younger volunteers, and travel to three
    historic Texas sites—The Alamo, the Juneteenth Heritage Center, and the Texas State Historical Museum—to broaden her knowledge and share these experiences with her grandchildren.
