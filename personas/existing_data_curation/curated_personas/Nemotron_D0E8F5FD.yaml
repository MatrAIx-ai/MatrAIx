personas:
  professional: Shannon Wade, a retired senior‑center coordinator who blends decades of community event planning, basic bookkeeping, and first‑aid expertise with a curiosity for genealogy and modern tech,
    leads intergenerational garden programs and grant‑writing initiatives using meticulous organization tempered by flexible improvisation.
  sports: Shannon Wade follows the Dallas Cowboys and Texas Rangers avidly, joins the senior walking club for daily strolls around the wildlife refuge, and pitches in on the church’s senior softball team
    each spring, balancing gentle competition with a love of birdwatching.
  arts: Shannon Wade sings in the church choir, devotes evenings to the local book club dissecting historical fiction like "The Nightingale", and creates intricate quilts inspired by the colors of Texas
    wildflowers, while drawing creative inspiration from gospel legend Mahalia Jackson and folk painter William H. Thomas.
  travel: Shannon Wade plans leisurely road trips to historic Texas sites such as The Alamo, Juneteenth Heritage Center, and the Texas State Historical Museum, using a tablet to map routes and schedule
    stops at family‑friendly diners, while dreaming of a future visit to Washington, D.C.’s National Archives to trace ancestral records.
  culinary: Shannon Wade excels at preparing classic Texan comfort foods—chicken‑fried steak, collard greens, and pecan pie—while also experimenting with heirloom tomato sauces and home‑canned peach jam,
    wielding her cherished cast‑iron skillet and often humming gospel tunes, though she occasionally forgets to shut off the stove while humming.
  core: Shannon Wade blends Southern hospitality with tech‑savvy curiosity, balancing meticulous budgeting and community service with quilting marathons and occasional stove‑forgetting mishaps, all while
    humming a hymn under their breath.
background:
  cultural: Shannon grew up in a mid‑west transplanted family that settled in rural Texas during the post‑World War II era. Raised in a Protestant (Southern Baptist) household, she was taught the importance
    of community, self‑reliance, and family loyalty. The small‑town values of Centerville—hospitality, modesty, and a strong work ethic—have shaped her outlook. While she respects traditional Texan customs
    such as church gatherings, county fairs, and home‑cooked meals, her curiosity has led her to embrace modern technologies and diverse perspectives, balancing heritage with ongoing learning.
