  hobbies: '[''Visiting art galleries and museums'', ''Sketching architectural details'', ''Acrylic painting'', ''Photography of urban textures'', ''Korean calligraphy'', ''Cooking traditional Korean dishes'',
    ''Hiking'', ''Pickup basketball'', ''Participating in maker fairs'', ''Listening to architecture and entrepreneurship podcasts'', ''Reading design theory books'']'
  career_goals: Aijun aims to become a certified lead stucco contractor within the next three years, earning the National Association of Decorative Arts certification and completing a construction management
    certificate program. He envisions opening his own boutique remodeling firm that specializes in high‑end decorative plasterwork for historic homes and modern interiors in the Southeast. He seeks to mentor
    apprentices, contribute to industry standards, and gain recognition through awards such as the Craftsmanship Excellence Award. Long‑term, he hopes to expand his business to include a design studio that
    blends East Asian artistic motifs with contemporary U.S. architecture.
