personas:
  professional: Aijun Ou is a 28-year-old plaster and stucco mason who blends meticulous surface-finishing expertise with a competitive drive to innovate decorative textures, leveraging their curiosity
    for material science and a commitment to earning lead contractor certification while mentoring apprentices.
  sports: Aijun Ou regularly pumps up their fitness by playing pickup basketball with the local Bulldogs league, hiking the Appalachian foothills on weekends, and cheering for the Atlanta Hawks, Atlanta
    Falcons, and Atlanta Braves, while emphasizing a balanced routine that mixes cardio with functional strength training.
  arts: Aijun Ou frequently roams the High Museum of Art and the Woodruff Arts Center, draws inspiration from the abstract forms of Yayoi Kusama and the vibrant colors of Georgia O'Keeffe, practices Korean
    calligraphy alongside acrylic painting, and curates a personal collection of vintage architectural sketches.
  travel: Aijun Ou's travel style blends meticulous planning with spontaneous adventure, having trekked the historic streets of Kyoto during Chuseok, explored the cobblestone alleys of Prague for restoration
    ideas, and weekend-escaped to Savannah's riverfront, while dreaming of a road trip along the Pacific Coast to study seaside architecture.
  culinary: Aijun Ou delights in cooking bibimbap with gochujang, kimchi jjigae, and grilled pork belly alongside Southern staples like shrimp and grits, savoring ingredients such as gochugaru, doenjang,
    sweet potatoes, and fresh okra, and occasionally experiments with fusion dishes that marry spice and comfort.
  core: Aijun Ou is a curiosity-driven plaster artist who balances competitive ambition with a love for traditional calligraphy, meticulous craftsmanship, and spontaneous hikes, yet sometimes bends the
    budget for art supplies and wrestles with a skeptical edge toward new collaborations.
background:
  cultural: Aijun is a second‑generation Korean‑American raised in the Atlanta metropolitan area. His family maintains strong ties to Korean cultural traditions, celebrating holidays such as Seollal and
    Chuseok, speaking Korean at home, and emphasizing diligence, respect for elders, and communal responsibility. The blend of Korean craftsmanship values with Southern hospitality shaped his work ethic
    and aesthetic sensibility. He participates in the local Korean community’s cultural events, engages in bilingual networking, and draws inspiration from both East Asian artistic motifs and the diverse
    cultural landscape of Georgia.
attributes:
  skills: '[''Stucco application'', ''Plaster finishing'', ''Surface preparation'', ''Blueprint interpretation'', ''Project scheduling'', ''Safety compliance'', ''Tool maintenance'', ''Material mixing'',
