  hobbies: '[''Soccer'', ''Salsa dancing'', ''Cooking Mexican cuisine'', ''Hiking'', ''Fishing'', ''Hackathons'', ''Multiplayer video gaming'', ''Coding mentorship'', ''Playing guitar'', ''Listening to
    music'', ''Tech meetups'', ''Reading science fiction'']'
  career_goals: Javier aims to advance to a senior software engineer role within the next two years, with the long‑term ambition of becoming a lead architect or engineering manager who can shape product
    strategy. He plans to earn AWS Solutions Architect and Certified Scrum Master credentials to deepen his cloud and agile expertise. He is driven to lead high‑impact projects that serve underrepresented
    communities, such as building bilingual educational platforms for Latino learners. In parallel, Javier hopes to mentor junior developers, contribute to open‑source initiatives, and eventually launch
    his own SaaS startup that leverages his full‑stack and cloud skills. He also envisions organizing a regional tech meetup in Batesville to foster a collaborative developer ecosystem in rural Mississippi.
