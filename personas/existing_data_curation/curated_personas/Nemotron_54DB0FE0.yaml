personas:
  professional: Channa Celestin, a retired financial planner and nonprofit strategist, leverages their methodical budgeting expertise and compassionate mediation style to design senior‑focused community
    programs that run like clockwork, ensuring every grant proposal meets tight deadlines and each workshop fosters collaborative learning, and they take pride in ticking every box on a project plan before
    the deadline.
  sports: Channa Celestin enjoys low‑impact fitness through daily walks at Riverbanks Zoo and Garden, plays pickleball on Tuesdays with the Lex County Senior Sports Club, follows the Carolina Hurricanes
    in hockey season and the Charleston RiverDogs during summer, cheering from the comfort of their porch while sipping tea, and they never skip a morning stretch before the walk.
  arts: Channa Celestin finds solace in their church choir’s harmonious renditions of classic gospel standards, devours biographies of prominent 20th‑century social‑justice leaders, stitches vibrant quilts
    inspired by Southern folk art, and they unwind each evening listening to the smooth jazz of Miles Davis while sipping sweet tea.
  travel: Channa Celestin prefers thoughtfully planned road trips that balance sightseeing with leisurely stops, has already explored the historic streets of Savannah and the blue‑ridge vistas of Asheville,
    dreams of a guided tour of England’s Tudor homes, delights in weekend getaways to the nearby Lake Murray for quiet reflection, and they always keep a travel journal to note the flavors of each place.
  culinary: Channa Celestin, a confident home cook, prepares low‑sodium Southern comfort foods such as collard greens simmered with smoked turkey, black‑eyed peas seasoned with bell pepper and a splash
    of apple cider vinegar, and baked peach cobbler sprinkled with cinnamon, always checking the sodium content on each ingredient label, and they never miss a chance to share a plate with neighbors.
  core: Channa Celestin blends meticulous budgeting, community compassion, and a love for quiet Southern traditions into a quietly powerful force that shapes neighborhood well‑being, and they never shy
    away from a spreadsheet if it means a friend gets help.
background:
  cultural: Channa is an African-American woman whose life has been shaped by the rich cultural heritage of South Carolina’s Black community. Growing up in the era of desegregation, she witnessed the civil-rights
    struggle firsthand, fostering a deep respect for social justice and community solidarity. Her family traditions are rooted in church life, Southern cuisine, and storytelling, which have reinforced values
    of mutual aid and perseverance. She draws on the legacy of African-American entrepreneurs and community leaders in Columbia, blending that history with contemporary business knowledge to serve her neighbors.
    Her cultural identity emphasizes intergenerational ties, reverence for elders, and a commitment to uplifting the local Black community.
attributes:
  skills: '[''Financial Planning'', ''Budget Management'', ''Nonprofit Program Development'', ''Grant Writing'', ''Event Planning'', ''Mentorship'', ''Conflict Mediation'', ''Community Outreach'', ''Project
