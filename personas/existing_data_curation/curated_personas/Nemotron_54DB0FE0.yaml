  hobbies: '[''Gardening'', ''Southern Cooking'', ''Reading Biographies'', ''Genealogy Research'', ''Church Choir'', ''Local History Tours'', ''Quilting'', ''Walking in Parks'', ''Food Bank Volunteering'',
    ''Small-Group Book Club'']'
  career_goals: Although retired from formal employment, Channa aims to leverage her business background to serve as a board member for a local nonprofit focused on senior services, and to launch a volunteer-run
    financial-literacy workshop series for older adults in Lexington County. She hopes to mentor emerging Black entrepreneurs in the Columbia area, write a guidebook on practical budgeting for seniors,
    and become a community liaison that bridges local businesses with social service agencies. Her long-term ambition is to leave a lasting impact on the financial well-being and cohesion of her neighborhood.
