  hobbies: '[''Zumba and salsa dance classes'', ''Local book club'', ''Volunteering at Bayonne food pantry'', ''Exploring NJ shoreline boardwalks'', ''Cooking workshops'', ''Spontaneous outings to concerts
    and street fairs'', ''Yoga practice'', ''Hiking the Palisades'', ''Binge‑watching classic sitcoms'', ''Collecting vintage postcards'']'
  career_goals: Eva aims to transition from her current executive secretary role to a senior executive assistant or office manager position within the next three to five years. She plans to obtain a Certified
    Administrative Professional (CAP) credential to formalize her expertise and strengthen her organizational skill set. While she appreciates the stability of routine administrative work, she also seeks
    opportunities to lead small projects, mentor junior assistants, and contribute to workplace initiatives that enhance employee well‑being. Long‑term, she envisions a role that blends her practical strengths
    with occasional creative responsibilities, such as coordinating community outreach events for her organization.
