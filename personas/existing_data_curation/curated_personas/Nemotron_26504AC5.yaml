  hobbies: '["Gardening","Bridge (card game)","Community choir singing","Quilting","Walking in local parks","Reading mystery novels","Cooking and recipe experimentation","Attending community theater","Volunteering
    at senior center","Gentle yoga"]'
  career_goals: Floresita aims to keep her mind and body active by learning digital photography, creating a scrapbook of family memories, and writing a short memoir of her life in the Midwest. She hopes
    to travel to historic sites in neighboring states, volunteer as a mentor for youth at the local community center, and continue organizing intergenerational gatherings to foster community harmony. Maintaining
    her health, staying socially engaged, and passing on her cooking and craft skills to grandchildren are central ambitions.
