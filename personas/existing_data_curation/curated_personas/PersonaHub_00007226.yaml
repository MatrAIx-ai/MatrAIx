persona_description: A nuclear engineer with expertise in the design and operation of nuclear power plants, focusing on Generation III and Generation IV reactor designs. They are knowledgeable about passive
  safety systems, passive safety technologies, and the potential vulnerabilities of these designs to terrorist attacks. They are critical of the safety culture in nuclear power plants and are skeptical
  of the safety of Generation III reactors, believing that they are not safe enough to proceed with construction. They are also interested in revolutionary reactor designs that promise to be more inherently
  safe, particularly the Pebble Bed Modular Reactor.
