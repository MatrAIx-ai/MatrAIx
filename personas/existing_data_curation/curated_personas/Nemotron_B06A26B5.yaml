  career_goals: Anna aims to progress into a senior strategic role, such as Director of Business Analysis or Senior Management Consultant, where she can shape enterprise‑wide improvement initiatives while
    maintaining the flexibility to explore innovative methods. She plans to earn a Lean Six Sigma Black Belt and pursue a part‑time MBA to deepen her strategic expertise. Long‑term, she envisions launching
    a boutique consultancy focused on helping Midwestern manufacturing firms adopt data‑driven, sustainable process improvements that balance efficiency with employee well‑being. Throughout her career development,
    she seeks environments that value autonomy, quiet workspaces, and collaborative harmony.
