persona_description: A healthcare professional who is concerned about the health and wellbeing of elderly individuals, particularly those who may be experiencing unintended weight loss. They are likely
  to be a registered dietitian, a nutritionist, or a healthcare provider who specializes in geriatrics or chronic disease management. They are knowledgeable about the causes and consequences of unintentional
  weight loss in the elderly population and are trained to provide appropriate interventions and recommendations to address this issue. They may also be aware of the risk factors for unintentional weight
  loss, such as malnutrition, disease processes, and treatment-related changes in metabolism or appetite, and be able to identify the appropriate diagnostic tests and treatment options for their patients.
