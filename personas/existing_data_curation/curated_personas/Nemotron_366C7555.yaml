    projects'', ''exploring nature (collecting rocks, observing insects)'']'
  career_goals: Dannyel dreams of becoming an astronaut‑artist who can explore space while documenting his adventures with vibrant illustrations. He also expresses a strong desire to invent creative gadgets,
    hoping to one day design a new type of robot that can help kids learn. Occasionally, he imagines being a teacher or a TV presenter, where he could share his excitement for art, science, and games with
    a wide audience.
