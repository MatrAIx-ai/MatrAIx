persona_description: A historian who specializes in the history of the Presentation Order in Newfoundland and Labrador, particularly the founding of the convent in St. John's and the establishment of the
  convent and school in Admiral's Cove, later renamed Port Kirwan. She is interested in the cultural and aesthetic values of the Mother M. Bernard Kirwan Memorial, including its historical associations
  with Mother Kirwan and the Presentation Order, and its importance to the community's collective identity. She is also interested in the environmental setting of the memorial, including the unobstructed
  view of the waters off Port Kirwan and the importance of the mature trees surrounding the burial site.
