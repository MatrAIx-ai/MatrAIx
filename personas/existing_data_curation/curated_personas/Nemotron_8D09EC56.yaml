  hobbies: '["Woodworking", "Classic car restoration", "Historical society participation", "Genealogy", "Lake walking and fishing", "Bridge (card game)", "Crossword and jigsaw puzzles", "Library volunteering"]'
  career_goals: 'Even in retirement, Patrick aims to stay active and purposeful: maintain his health through daily walks and low‑impact exercise; preserve and expand his family’s genealogical archive; complete
    a handcrafted wooden dock on his lakeside property; mentor younger members of the local seniors’ association in organizational and DIY skills; write and self‑publish a memoir documenting his life and
    cultural heritage; continue serving his parish as a lay usher and committee member; and assemble a modest classic model‑train collection that reflects his interest in precision and craftsmanship.'
