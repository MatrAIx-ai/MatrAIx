  career_goals: Desaree aims to transition from a front‑line process engineer to a senior technical leader who spearheads sustainability‑focused R&D projects. She aspires to manage a multidisciplinary team
    that balances breakthrough research with cost‑effective production, eventually positioning herself as a plant manager or a consultant specializing in green chemistry and process optimization. Her competitive
    drive pushes her to earn recognized industry certifications (e.g., CSP, Six Sigma Black Belt) and to publish technically rigorous papers that establish her reputation in the chemical engineering community.
