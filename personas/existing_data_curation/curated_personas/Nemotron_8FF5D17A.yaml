personas:
  professional: Jonathan Ruiz is a seasoned welder and metal fabricator who blends 25 years of MIG, TIG, and stick welding expertise with an artistic flair, mentoring apprentices in a laid‑back yet safety‑focused
    workshop while their curiosity drives them to experiment with plasma cutting and kinetic metal art, and their competitive streak pushes them to dominate regional welding contests.
  sports: Jonathan Ruiz is a devoted fan of the Texas Rangers, Dallas Cowboys, and Austin FC, plays third base for the Hill Country Ironworkers adult softball league, and joins the Caldwell County 5K running
    club to stay active, often rewarding themselves with a post‑game barbecue after a weekend of competition, a moment they cherish.
  arts: Jonathan Ruiz channels their love of metalcraft and rhythm by sculpting Oaxacan‑inspired kinetic pieces, snapping sunrise landscapes of the Hill Country, and drumming to the beats of Los Tigres del Norte
    and Lila Downs in their garage band, drawing artistic guidance from Frida Kahlo’s bold colors and Diego Rivera’s narrative murals.
  travel: Jonathan Ruiz alternates between meticulously planning road trips to their relatives in the border towns for Día de los Muertos celebrations and spontaneous weekend drives to Austin’s SXSW festival,
    Santa Fe’s art market, or Oaxaca’s Guelaguetza, balancing cultural immersion with low‑cost, photography‑rich adventures that fuel their artistic vision.
  culinary: Jonathan Ruiz’s culinary repertoire centers on hand‑rolled tamales stuffed with pork and ancho chilies, a slow‑cooked mole sauce featuring chocolate, sesame seeds, and dried pasilla peppers,
    smoky Texas brisket seasoned with mesquite wood and a rub of cumin, paprika, and brown sugar, and fresh salsa verde made from tomatillos and serrano chilies, dishes they perfect for family gatherings.
  core: Jonathan Ruiz is a fiercely curious welder‑artist whose relentless tinkering, late‑night photography, and impromptu barbecues mask a habit of over‑committing, scattered paperwork, and occasional
    neglect of health check‑ups, turning stress into kinetic metal sculptures while a competitive edge drives them to constantly out‑shine their peers.
background:
  cultural: Jonathan grew up in a bilingual household in Texas, the son of Mexican immigrants who settled in the Central Texas region in the 1970s. His family maintained strong ties to Mexican traditions—celebrating
    Día de los Muertos, preparing tamales and mole for holidays, and listening to mariachi and norteño music. The values of hard work, craftsmanship, and communal support were reinforced by his father's
    experience as a factory welder and his mother's role in the local church. Although he is now divorced, he remains closely connected to his extended family in both Texas and the Mexican border towns,
    often traveling to visit relatives during major festivals. This cultural blend informs his appreciation for both practical trades and the decorative artistry found in Mexican metal‑craft, shaping his
    personal and professional identity.
