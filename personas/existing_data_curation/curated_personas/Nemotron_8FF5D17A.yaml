  career_goals: Jonathan aims to transition from contract‑based welding gigs to running his own small boutique metal‑art studio in Caldwell County, where he can combine his technical welding expertise with
    his love for artistic expression. He plans to obtain an advanced welding certification (e.g., Certified Welding Specialist) to broaden his credibility and to qualify for larger custom‑fabrication contracts.
    Over the next five years he hopes to host a community workshop series that teaches decorative metalwork and basic electronics soldering, positioning himself as a local mentor while creating a steadier
    income stream that reduces financial stress. He also wants to secure a stable health‑benefits package, either through a union membership or a small business plan, to better support his teenage children
    after the divorce.
