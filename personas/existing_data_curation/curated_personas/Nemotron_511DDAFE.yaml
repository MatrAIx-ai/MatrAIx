  hobbies: '[''Reading contemporary fiction'', ''Yoga'', ''Digital illustration and Canva design'', ''Cooking traditional Vietnamese dishes'', ''Community volunteering and tutoring'']'
  career_goals: She aims to complete a Bachelor’s degree in Business Administration within the next two years, focusing on operations management. Her long‑term ambition is to secure an entry‑level role
    as an Administrative Coordinator or Operations Analyst, where she can apply her organizational strengths and eventually move into an Office Manager position. She also hopes to leverage her bilingual
    abilities to support Vietnamese‑American community initiatives, possibly leading outreach programs that provide career‑readiness workshops.
