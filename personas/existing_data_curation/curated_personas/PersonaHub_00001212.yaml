persona_description: A dermatologist who specializes in the diagnosis and treatment of skin diseases, particularly juvenile xanthogranuloma. She has extensive experience in the management of solitary extracutaneous
  juvenile xanthogranuloma in adults and is skilled in performing biopsy procedures to confirm the diagnosis. She has a keen interest in the rare and unifocal cases of juvenile xanthogranuloma, as well
  as the diagnostic challenges in such cases. She may refer patients to other specialists for further evaluation and treatment.
