personas:
  professional: Wilson Fitzgerald is an aspiring digital illustrator who blends hand‑drawn cartoons with watercolor techniques, using a tablet to experiment with character design while their curiosity and
    collaborative spirit drive them to seek feedback from friends and teachers, despite a habit of leaving sketchbooks unfinished.
  sports: Wilson Fitzgerald dribbles for the Stark County Youth Soccer Club, cheering on the Cleveland Browns and Cleveland Cavaliers on game days, favors Saturday morning pick‑up matches at the local park,
    and blends energetic play with a love for teamwork, though they often forget to stretch after games, leading to occasional shin splints.
  arts: Wilson Fitzgerald finds inspiration in the animated works of Studio Ghibli, the comic panels of Raina Telgemeier, and the vibrant street art of local mural festivals, while spending weekends sketching
    characters after watching live theater productions at the county playhouse, and they use playlists featuring Billie Eilish and Disney soundtracks to fuel their creativity.
  travel: Wilson Fitzgerald enjoys weekend road trips to nearby attractions like Cedar Point and the Rock and Roll Hall of Fame, dreams of exploring Tokyo's Akihabara for anime merch and the natural splendor
    of Iceland's waterfalls, plans trips with friends using colorful maps and a spontaneous 'let's go wherever the bus takes us' mindset, while limited allowance keeps overseas adventures on the wish list.
  culinary: Wilson Fitzgerald prefers homemade pepperoni pizza with extra mozzarella, experiments with watermelon‑mint smoothies, and can whip up a quick watercolor‑inspired fruit tart, yet their cooking
    skill is mostly limited to microwaving mac and cheese and they often over‑season dishes in the quest for bold flavors.
  core: Wilson Fitzgerald is a curiosity‑driven, art‑obsessed 12‑year‑old who juggles sketchbooks, soccer balls, and video‑game strategies, but their love for spontaneity often leaves homework unfinished
    and snack crumbs everywhere.
background:
  cultural: Wilson was raised in Massillon, Ohio, a small Midwestern city known for its close‑knit community and strong high‑school football culture. His family reflects typical Midwestern values of modesty,
    hospitality, and a communal spirit. They celebrate traditional American holidays such as Thanksgiving and Christmas, and also observe Irish heritage festivities like St. Patrick's Day, reflecting a
    blend of ethnic ancestry common in the region. Wilson's upbringing includes participation in local events such as the Stark County Fair, church gatherings, and neighborhood sports leagues, all of which
    reinforce a sense of community responsibility and teamwork. While his cultural exposure is primarily rooted in Midwestern American life, his school environment provides opportunities to interact with
    peers from diverse backgrounds, nurturing his appreciation for varied ideas and experiences.
