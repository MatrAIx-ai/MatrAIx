  career_goals: Wilson dreams of a future where he can blend his love for art with his desire to help others. He envisions becoming a community‑focused artist or graphic designer who creates murals and
    visual projects that inspire social cohesion. He is also interested in teaching art or leading youth workshops, allowing him to share his creative ideas while fostering a supportive environment for
    other kids. Open to unconventional paths, Wilson imagines starting a YouTube channel that showcases collaborative art projects and promotes kindness and cooperation among his audience. Ultimately, he
    wants a career that offers flexibility, creativity, and the chance to make a positive impact on his community.
