  hobbies: '["Building block play", "Shape sorter puzzles", "Storybook reading", "Crayon drawing", "Singing nursery rhymes", "Outdoor exploration (parks, nature walks)", "Watching educational cartoons",
    "Dancing to music"]'
  career_goals: Although only three years old, Tan frequently engages in role‑play that hints at early aspirations. She loves pretending to be a teacher, a caregiver, or a doctor, expressing a desire to
    help and guide others. These imaginative play scenarios suggest that, as she grows, she may be drawn toward caring or educational professions, such as teaching, nursing, or early‑childhood education.
