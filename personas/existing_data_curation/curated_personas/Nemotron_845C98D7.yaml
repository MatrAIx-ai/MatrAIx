personas:
  professional: A budding mini scientist, Tan Wei delights in assembling block towers and sorting color‑coded puzzles, using their natural curiosity and practical sense to explore cause‑and‑effect while
    their relaxed, slightly disorganized style adds a playful spontaneity to every experiment.
  sports: An enthusiastic tiny athlete, Tan Wei splashes through the Little Dolphins swim lessons, dribbles a soft soccer ball with the Panda Pals T‑ball club, and happily watches the Seattle Mariners on
    family TV while clutching a mini Seahawks jersey, approaching fitness with bursts of joyous energy and frequent snack breaks.
  arts: A budding mini artist, Tan Wei spends afternoons coloring picture books of pandas and dumplings, dancing to Raffi’s ‘Baby Beluga’ and the ‘Moana’ soundtrack, and giggling at Sesame Street sketches,
    letting these creative moments shape their gentle, cooperative spirit.
  travel: A curious little explorer, Tan Wei has marveled at the bustling Pike Place Market stalls, taken a short ferry ride to Bainbridge Island, and dreams of stepping onto the streets of Disneyland and
    seeing lanterns at a future lantern festival, favoring short, parent‑planned outings that balance stroller‑friendly routes with occasional spontaneous snack stops.
  culinary: A tiny gourmet, Tan Wei adores slurping warm pork baozi and chicken rice porridge at home, delights in a bite‑sized mooncake during the Mid‑Autumn Festival, and happily munches chicken nuggets,
    apple slices, and strawberry yogurt at preschool, often proudly stirring the pancake batter with a plastic spoon.
  core: Tan Wei, a three‑year‑old with boundless curiosity and a knack for turning everyday moments into playful experiments, often forgets to put away toys but quickly mends any hurt with a sweet smile
    and a shared snack.
background:
  cultural: Tan comes from an East Asian (Chinese) family that maintains many cultural traditions while living in Seattle's multicultural setting. At home, Mandarin is spoken alongside English, and the
    family celebrates Lunar New Year, Mid‑Autumn Festival, and enjoys foods like dumplings, rice porridge, and mooncakes. In her preschool and community, she participates in American holidays such as Thanksgiving
    and Halloween, and she interacts with peers from diverse backgrounds. This blend of cultural influences shapes her daily routines, food preferences, storytelling experiences, and the bilingual environment
    that nurtures her curiosity and adaptability.
attributes:
  skills: '["Basic language skills (simple sentences, naming colors and objects)", "Counting to ten", "Fine motor coordination (stacking blocks, using crayons)", "Hand‑eye coordination (puzzle and shape
