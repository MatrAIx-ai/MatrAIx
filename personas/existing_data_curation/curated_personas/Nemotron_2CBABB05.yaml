personas:
  professional: Cindy Reeder is a seasoned welder and metal fabricator who masters MIG, TIG, and stick welding, excels at interpreting blueprints, and channels their sociable, assertive energy into mentoring
    peers while they juggle a relaxed, sometimes disorganized approach to project scheduling.
  sports: Cindy Reeder spends Saturday nights rolling strikes with the Indianapolis Bowl‑Club league, hits the trails of Brown County State Park for weekend hikes, and avidly follows the Indianapolis Colts
    and Indiana Pacers, proudly wearing team colors while they cheer at local sports bars.
  arts: Cindy Reeder immerses themselves in the local art community, finding creative sparks at the Indy Craft Fair while drawing inspiration from sculptor Maya Lin, improvisational troupe The Second City,
    and the vibrant street murals of Banksy, and they regularly perform in a community theater production of 'A Midsummer Night's Dream'.
  travel: Cindy Reeder prefers spontaneous road trips to nearby creative hubs like Asheville, North Carolina, and Nashville, Tennessee, while dreaming of an international metal‑art pilgrimage to the Venice
    Biennale and a summer workshop in the Scottish Highlands, and they balance limited vacation time with a love for both adventure and relaxed, low‑cost getaways.
  culinary: Cindy Reeder loves firing up the backyard grill, perfecting a smoky Kansas City‑style ribs recipe with hickory wood chips, pairing it with a tangy coleslaw made from fresh cabbage and apple
    cider vinegar, and they often experiment with homemade spice rubs featuring paprika, brown sugar, and chili powder while swapping recipes with neighbors during weekend potlucks.
  core: Cindy Reeder blends steel and stage, forging metal art by day, delighting in improv comedy and bowling by night, all while they navigate a delightfully chaotic schedule that leaves room for spontaneous
    BBQs and occasional missed appointments.
background:
  cultural: Cindy grew up in a close‑knit, working‑class family in rural northeastern Indiana. Her white Midwestern heritage—rooted in German and Irish ancestry—instilled values of hard work, modesty, and
    community responsibility. The local culture’s emphasis on self‑reliance and cooperative spirit shaped her pragmatic yet compassionate outlook. Active in the local trade union and community events, she
    enjoys the simple pleasures of small‑town life, from Saturday farmer’s markets to high school football games. This background informs her collaborative work style, her appreciation for practical art,
    and her desire to give back through mentorship and community projects.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Brazing'', ''Soldering'', ''Metal fabrication'', ''Blueprint reading'', ''Metallurgical testing'', ''Safety and OSHA compliance'', ''Equipment
    maintenance'', ''Problem solving'', ''Team coordination'', ''Mentoring apprentices'', ''Basic CAD drafting'', ''Custom metal art creation'']'
  hobbies: '[''Attending art fairs'', ''Community theater'', ''Improvisational comedy'', ''Bowling league'', ''Hiking state parks'', ''Community gardening'', ''Metal sculpture'', ''Pottery'', ''Vintage
    car restoration'', ''Barbecuing and recipe experimentation'', ''Women-in-welding meetups'']'
  career_goals: Guided by her love for both technical craft and artistic expression, Cindy aims to become a Certified Welding Inspector and eventually a foreman overseeing a diverse metal‑fabrication shop.
    She dreams of launching a boutique studio where she can produce and sell her own metal sculptures and functional art, while offering hands‑on workshops that encourage community members, especially women,
    to explore welding and metalworking. Cindy also seeks to deepen her expertise in advanced brazing techniques to serve niche markets such as custom automotive restoration and industrial repair, all while
    preserving a flexible schedule that allows her to stay engaged with the local arts scene.
