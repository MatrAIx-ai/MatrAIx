  career_goals: Connie aims to progress into a senior systems analyst or IT solutions architect role within the next five years, leading larger digital‑transformation projects for small businesses and agricultural
    firms in Graves County. She plans to earn industry‑recognized certifications such as CBAP, PMP, and TOGAF, and to complete a bachelor's degree in Information Technology to broaden her strategic acumen.
    Long‑term, she aspires to become a trusted consultant specializing in rural broadband expansion and agri‑tech integration, while also mentoring junior analysts and fostering a collaborative, knowledge‑sharing
    culture within her organization.
