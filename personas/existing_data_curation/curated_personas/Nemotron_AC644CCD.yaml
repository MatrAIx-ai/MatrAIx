personas:
  professional: Connie Barwick, a 47‑year‑old computer systems analyst, leverages their methodical, curiosity‑driven approach to craft precise SQL queries, Power BI dashboards, and Python automations that
    satisfy both pragmatic business needs and their love for elegant problem‑solving.
  sports: Connie Barwick keeps active through weekend hikes on the Rolling Hills Trail and occasional community yoga classes, follows the Kentucky Wildcats men's basketball team and the Memphis Grizzlies,
    and maintains a modest membership with a local running club while they prefer solitary jogging over crowded gyms.
  arts: Connie Barwick immerses themselves in Southern literature—re‑reading works by William Faulkner and Eudora Welty—while also attending monthly performances at the nearby community theater featuring
    classic plays by Tennessee Williams, and they enjoy the folk blues of artists like Gillian Welch and the cinematic scores of Ennio Morricone.
  travel: Connie Barwick prefers meticulously planned trips that blend quiet reflection and cultural immersion, having explored historic Savannah, Georgia and the Blue Ridge hills of Asheville, while their
    bucket list includes a tranquil week in Kyoto’s countryside and a solo hiking adventure in Iceland’s Westfjords, and they relish the anticipation of mapping each itinerary in advance.
  culinary: Connie Barwick delights in home‑grown vegetables, often cooking roasted heirloom tomatoes with fresh basil into a vinaigrette, mastering low‑sodium gumbo with locally sourced shrimp, and they
    confidently bake sourdough bread, though they are notorious for over‑seasoning dishes with chili flakes when stressed.
  core: Connie Barwick is a methodical tech analyst who balances pragmatic problem‑solving with solitary hobbies, disciplined finances, a health‑aware routine, and a quietly adventurous spirit peppered
    with occasional indulgent quirks, and they approach each project with quiet confidence.
background:
  cultural: Connie was raised in Hickory, a tight‑knit community in Graves County, Kentucky, where Southern hospitality and self‑reliance are core values. Her family has deep roots in the region, tracing
    back several generations of small‑farm and coal‑industry workers. The local church, a United Methodist congregation, played a central role in her early life, instilling a sense of community service
    and modesty. Growing up in a predominantly white, rural setting, she absorbed traditions such as county fairs, home‑cooked Southern meals, and a strong work ethic. While her divorce forged a more independent
    outlook, she still cherishes the close‑family bonds, seasonal festivals, and the practical, no‑frills approach to life characteristic of her Kentucky upbringing.
