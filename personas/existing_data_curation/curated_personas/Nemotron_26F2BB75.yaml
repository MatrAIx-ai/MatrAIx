personas:
  professional: Charles Perrotti is an aspiring young robotics enthusiast who channels his methodical, organized nature into designing LEGO city models that double as practice for building functional prototypes,
    and he eagerly volunteers to lead his school’s robotics club projects, blending teamwork with a realistic, step‑by‑step problem‑solving approach.
  sports: Charles Perrotti is a spirited basketball player who practices after school with his friends, faithfully follows the Cleveland Browns and Guardians, and participates in local youth leagues where
    his reliable, team‑first attitude helps him coordinate on‑court strategies and maintain consistent fitness.
  arts: Charles Perrotti immerses himself in classic rock legends such as The Beatles, The Rolling Stones, and Led Zeppelin while building intricate LEGO scenes inspired by adventure novels like Treasure
    Island, and he eagerly attends community theater productions of classic comedies during church fundraiser nights.
  travel: Charles Perrotti dreams of exploring the historic streets of Rome after his family’s summer Ferragosto celebrations, has already visited the nearby Cuyahoga Valley National Park on school trips,
    and looks forward to a road trip to the Great Lakes shoreline with his friends, balancing his love for structured itineraries with spontaneous stops for ice‑cream.
  culinary: Charles Perrotti enjoys helping his family roll fresh pasta dough for spaghetti carbonara, loves the aroma of simmering tomato‑basil sauce, and, while still mastering knife skills, often adds
    grated pecorino and a pinch of red pepper flakes to elevate simple meals.
  core: Charles Perrotti blends a disciplined, organized mindset with a lively, sociable spirit, making them a reliable leader in school clubs, a careful saver, a diligent athlete, and a budding culinary
    helper who never skips a Sunday pasta tradition.
background:
  cultural: Charles comes from an Italian‑American family rooted in Cleveland’s historic Little Italy neighborhood. Raised in a Catholic household, he participates in community festivals, church gatherings,
    and family traditions such as Sunday pasta meals and summer celebrations of Ferragosto. The city’s Midwestern work ethic and love for sports, especially the Browns and Guardians, shape his values of
    reliability, teamwork, and community service.
attributes:
  skills: '[''Time Management'', ''Organizational Planning'', ''LEGO Model Building'', ''Basic Scratch Programming'', ''Team Collaboration'', ''Calm under Pressure'']'
