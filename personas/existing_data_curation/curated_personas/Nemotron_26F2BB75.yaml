  career_goals: Charles aims to become a civil engineer, inspired by Cleveland’s bridges and the city’s industrial history. He envisions designing safe, functional structures that improve his community.
    He also dreams of joining the city’s fire department one day, combining his love for teamwork, structure, and public service. In the short term, he plans to excel in his science and math classes to
    lay the groundwork for those ambitions.
