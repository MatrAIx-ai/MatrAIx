  hobbies: '["Community gardening", "Knitting/crocheting", "Reading mystery novels", "Hiking the Chain of Lakes", "Volunteering at food pantry", "Yoga and meditation", "Thrift store hunting", "Baking",
    "Home organization", "Women’s support group"]'
  career_goals: Clarita aims to move into a supervisory role within the facilities department, such as Lead Janitor or Facilities Coordinator, where she can apply her organizational talents to oversee larger
    teams and develop cleaning strategies for multiple buildings. She plans to obtain certifications like the Certified Professional Cleaner (CPI) and the Institute of Inspection, Cleaning and Restoration
    Certification (IICRC). Over the next five years she hopes to complete a bachelor’s degree in Facility Management or Business Administration, which would open pathways to a Facilities Manager position
    or possibly launching her own eco‑friendly cleaning service. A key ambition is securing a work schedule that supports her mental‑health needs, allowing for consistent routines and less on‑call anxiety.
