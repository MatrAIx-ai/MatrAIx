personas:
  professional: Clarita Swain, a seasoned facilities maintenance specialist with over fifteen years mastering green‑cleaning protocols, floor care, and inventory logistics, leverages their meticulous, competition‑driven
    mindset to mentor crews and engineer efficient cleaning strategies while quietly questioning new management directives.
  sports: Clarita Swain frequents the Chain of Lakes trail for solo hikes in the spring and autumn, supports the Minnesota Timberwolves, Vikings, and Twins from the comfort of their living room, and participates
    in a community softball league that satisfies both their competitive edge and need for structured activity.
  arts: Clarita Swain immerses themselves in mystery literature, devouring works by Agatha Christie and Gillian Flynn while also crafting patterned blankets inspired by the designs of yarn artist Debbie
    Stoller, and enjoys the folk harmonies of Joni Mitchell during quiet evenings.
  travel: Clarita Swain prefers low‑key road trips that blend nature and thrift hunting, having explored Door County’s shoreline, trekked the dunes of Lake Michigan’s Sleeping Bear, and collected vintage
    memorabilia in Portland, while always planning itineraries months in advance to accommodate their anxiety‑sensitive schedule.
  culinary: Clarita Swain transforms home‑grown rosemary, thyme, and kale into herb‑infused focaccia, carrot‑ginger soup, and seasonal zucchini bread, boasting a modest knack for farm‑to‑table cooking that
    balances meticulous recipe adherence with occasional experimental improvisation when a new garden harvest arrives.
  core: Clarita Swain is a detail‑obsessed, eco‑conscious facilities veteran whose competitive drive and anxiety‑laden perfectionism fuel a life of structured productivity, community generosity, and occasional
    thrift‑store indulgences.
background:
  cultural: Clarita identifies as a white Midwesterner with German‑Scandinavian ancestry, typical of many families in Minneapolis. She grew up in a suburban neighborhood where values of hard work, modesty,
    and community involvement were emphasized. The local culture’s blend of practical pragmatism and appreciation for the arts—such as the city’s vibrant music and theater scenes— resonates with her balanced
    outlook. Her upbringing in a predominantly Protestant environment instilled a sense of responsibility and civic duty, which she expresses through volunteer work and participation in local women’s support
    groups. Living in an area known for its harsh winters and seasonal changes has also fostered resilience and an appreciation for indoor comforts like baking and crafting.
attributes:
  skills: '["Commercial cleaning", "Floor care and polishing", "Chemical safety", "Inventory management", "OSHA compliance", "Scheduling and logistics", "Team coordination", "Training and mentorship", "Green
