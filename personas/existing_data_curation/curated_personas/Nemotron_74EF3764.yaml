personas:
  professional: Maria Herrero, a veteran healthcare support worker in Milton, VT, combines precise vital‑sign monitoring and efficient electronic health‑record navigation with a warm, patient‑centered approach,
    leveraging their curiosity to stay updated on wound‑care techniques while embracing a relaxed attitude toward scheduling that lets them juggle medication refills, insurance verification, and informal
    mentorship of new staff.
  sports: Maria Herrero stays active by hiking the Green Mountains with the local Green Mountain Trail Association in the summer, enjoys cross‑country skiing at Stowe during winter, follows the Boston Red
    Sox, the New England Patriots, and the Boston Bruins on television, and maintains a casual jogging routine on village trails that balances their love of nature with a modest cardio habit, while they
    often pause to photograph wildflowers along the trail.
  arts: Maria Herrero finds creative solace in playing acoustic guitar to the folk strains of The Avett Brothers and classic John Denver while knitting to the mellow piano of Ludovico Einaudi, fuels their
    imagination with historical fiction by Hilary Mantel and Ken Follett, and displays a small collection of Monet reproductions in their garden shed, which together shape their leisurely aesthetic sensibility,
    and they often share their handmade scarves at library events.
  travel: Maria Herrero prefers low‑key road trips that blend scenic hikes with local food stops, often planning day‑long outings to Stowe, exploring Burlington’s waterfront, and reminiscing about a memorable
    weekend in Portland, Maine, while they dream of a spring pilgrimage to the historic gardens of Kyoto and a rugged trek through the Scottish Highlands to sample regional teas and crafts.
  culinary: Maria Herrero enjoys farm‑to‑table cooking, confidently preparing heirloom tomato and basil bruschetta, herb‑marinated chicken baked with rosemary and thyme, and rustic ratatouille that showcases
    native vegetables, while they occasionally indulge in a cheese board featuring locally produced goat cheese and honey, reflecting a competent yet adventurous kitchen style.
  core: Maria Herrero balances a calm, curious outlook on work and life with a tendency to misplace their garden tools and forget to log medication refills, turning missed appointments into chances to improvise
    and connect with patients in unexpected ways.
background:
  cultural: Maria was raised in a modest New England town, with family roots that trace back to Irish and Spanish ancestors who settled in Vermont generations ago. Growing up, she participated in traditional
    holiday celebrations that blended Catholic customs with the region's secular community ethos. This mixed heritage has fostered a respect for cultural diversity while reinforcing the New England values
    of self‑reliance, community cooperation, and an appreciation for the seasonal rhythms of rural life. Her background informs her practical outlook, her curiosity about different cultural practices, and
    her commitment to serving the local community.
attributes:
