    communication'']'
  hobbies: '[''Historical fiction reading'', ''Gardening (vegetables and herbs)'', ''Hiking'', ''Knitting'', ''Cooking farm‑to‑table meals'', ''Acoustic guitar'', ''Volunteer work at the town library'']'
  career_goals: Maria aims to formalize her hands‑on experience by earning a Certified Nursing Assistant (CNA) credential within the next year. She envisions moving into a supervisory or lead‑support role
    where she can mentor newer staff and help shape patient‑education programs focused on preventive care for seniors. Long‑term, she hopes to develop community health workshops that blend her practical
    knowledge with her curiosity about emerging health‑tech tools, all while maintaining a flexible schedule that preserves time for family and personal interests.
