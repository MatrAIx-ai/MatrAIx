persona_description: A scientist who studies the impact of containment measures on a society's resilience during an epidemic outbreak, and proposes alternative strategies to prevent such a breakdown. He
  is a postdoctoral researcher at EPFL's Laboratory for Human-Environment Relations in Urban Systems (HERUS), and has published multiple studies on the topic. He is interested in the socio-economic factors
  that influence the effectiveness of containment measures, and how they can be used to inform decision-making in public health emergencies.
