  hobbies: '[''Trail running'', ''Mountain biking'', ''Arduino/Raspberry Pi tinkering'', ''Reading (science‑fiction, systems thinking)'', ''Strategy board games'', ''Cooking Southern cuisine'', ''Live music
    attendance'', ''Reflective journaling'']'
  career_goals: Danny aims to become a senior logistics strategist within the next five years, leading a cross‑functional team that leverages AI‑driven analytics to streamline national distribution networks.
    He plans to earn a Six Sigma Black Belt and pursue certifications in advanced data analytics to further sharpen his competitive edge. Ultimately, he hopes to launch his own logistics consulting firm,
    helping midsize manufacturers adopt flexible, technology‑enabled supply chains while also developing personal resilience strategies to manage his intense emotional reactivity in high‑pressure environments.
