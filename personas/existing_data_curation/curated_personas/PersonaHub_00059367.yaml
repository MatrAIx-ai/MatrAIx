persona_description: A researcher or policy analyst interested in understanding the links between gender and poverty, as well as the impact of specific policies and overall policy approaches on these links.
  This individual is likely to be familiar with JRF's definition of poverty and the concept of gender as a constituent element of social relations based on perceived differences between the sexes and a
  primary signifier of power creating unequal access to resources. They are also likely to have a keen interest in intersectionality and the examination of social and economic relations and institutions,
  as well as the gender factors implicated in the poverty of couples.
