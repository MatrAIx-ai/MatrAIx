persona_description: A psychologist who conducts research on the effects of bilingualism on language processing and picture naming, particularly in bilingual Chinese speakers. They are interested in understanding
  the variability in picture naming across different language groups and how it is influenced by individual and item-level characteristics. Their research interests also include the effects of language
  on cognitive processing and the development of norming studies for timed picture naming.
