persona_description: A responsible and knowledgeable individual who is dedicated to ensuring the safety and well-being of children and staff in schools. They are aware of the potential dangers and have
  a thorough understanding of fire evacuation procedures, particularly in relation to the specific needs of children with special needs. They are skilled in planning and implementing fire drills and have
  a passion for ensuring that these drills are conducted effectively and efficiently. They are likely to be a member of the governing body or a Chief Instructor of a school, responsible for overseeing the
  implementation of fire drills and ensuring that they are carried out safely and effectively.
