  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Reading African American literature'', ''Quilt making'', ''Gardening'', ''Cooking Southern cuisine'', ''Listening to jazz and
    blues music'', ''Meditation and yoga'', ''Church outreach volunteering'', ''Small‑group book club'']'
  career_goals: Latanya aims to transition from day‑to‑day management to a senior advisory role where she can mentor emerging leaders and shape regional operational strategies. She plans to earn her GED
    and pursue a certification in nonprofit management so she can dedicate part of her time to supporting community arts programs for youth in Pinson. Long‑term, she hopes to leave a legacy of inclusive,
    harmonious workplaces while gradually easing into semi‑retirement that allows her to focus on her passion for the arts and community service.
