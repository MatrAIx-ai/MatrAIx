personas:
  professional: Latanya Weatherford leverages decades of operational management expertise, from meticulous staff scheduling to data‑driven budgeting in Excel, to mentor emerging leaders and shape regional
    strategy as she transitions into a senior advisory role and pursues nonprofit management certification.
  sports: Latanya Weatherford enjoys a low‑impact fitness routine that includes morning walks with her community garden club, follows the Alabama Crimson Tide football season passionately, and plays in
    a friendly senior softball league that meets at the local park each spring.
  arts: Latanya Weatherford immerses herself in the local arts scene by attending gallery openings featuring works by regional painters, participates in a community theater production of August Wilson’s
    plays, reads Toni Morrison and Maya Angelou, and stitches quilts inspired by the improvisational spirit of John Coltrane and Nina Simone.
  travel: Latanya Weatherford prefers carefully planned road trips that blend cultural stops—like the jazz festivals of New Orleans and the historic streets of Savannah—with quiet days gardening in the
    Blue Ridge Mountains, and she dreams of a future pilgrimage to the Smithsonian’s African American History Museum in Washington, D.C.
  culinary: Latanya Weatherford’s kitchen is a laboratory for Southern comfort food, where she perfects shrimp and grits, collard greens flavored with smoked turkey, and sweet potato casserole topped with
    pecan streusel, often incorporating home‑grown tomatoes and okra from her modest vegetable patch, though she sometimes over‑salts the gravy.
  core: Latanya Weatherford balances methodical planning, community‑focused mentorship, and a vibrant love of jazz and quilting, all while wrestling with a propensity for worry and a habit of over‑committing
    to others.
background:
  cultural: Latanya is a lifelong resident of the Black community in Blount County, Alabama. Her family traditions are rooted in Southern African American culture, including church fellowship, soulful music,
    and a deep respect for oral history and storytelling. Growing up during the civil‑rights era, she witnessed the power of collective action and community resilience, values that continue to shape her
    cooperative spirit and dedication to harmony. Her cultural heritage influences her love of jazz, Southern cooking, quilting, and a commitment to giving back through local mentorship and arts initiatives.
attributes:
  skills: '[''Operations Management'', ''Staff Scheduling'', ''Inventory Control'', ''Budgeting'', ''Safety and Quality Compliance'', ''Conflict Resolution'', ''Team Leadership and Mentoring'', ''Microsoft
