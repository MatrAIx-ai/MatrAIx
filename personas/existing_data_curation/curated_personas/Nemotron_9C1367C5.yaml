personas:
  professional: Keith Bruce, a seasoned senior store manager with three decades of frontline retail expertise, they excel at inventory control, staff mentorship, and meticulous point‑of‑sale accuracy, balancing
    routine processes with gentle flexibility to keep the store humming smoothly.
  sports: Keith Bruce, an enthusiastic local sports follower, they cheer on the town’s high‑school football team, the River Valley Raiders, attend Friday night games, support the regional minor‑league baseball
    club the Eastside Eagles, and are loyal fans of the New York Giants and the Milwaukee Brewers, while also participating in a senior bowling league at the community center.
  arts: Keith Bruce, a devoted lover of narrative and nostalgia, they devour historical fiction novels such as Ken Follett’s 'The Pillars of the Earth', attend occasional performances of classic Broadway
    revivals featuring Bette Midler, and enjoy listening to folk legend John Prine and pianist George Winston for quiet evenings.
  travel: Keith Bruce, a measured traveler who values low‑stress trips, they have taken weekend road‑trips to historic Williamsburg, Virginia, a scenic drive to the Biltmore Estate in Asheville, and long‑planned
    a pilgrimage to the canals of Bruges in Belgium, preferring itineraries that balance sightseeing with plenty of downtime in cozy cafés.
  culinary: Keith Bruce, a modest home chef, they favor hearty, seasonal meals like beef stew simmered with carrots, potatoes, and thyme, bake cornbread with honey butter, and relish the fresh taste of
    their garden’s heirloom tomatoes in a simple Caprese salad, though they often forget to defrost frozen items until the last minute.
  core: Keith Bruce, a routine‑driven senior retail manager, they blend meticulous work habits with quiet garden retreats, quietly worry about tomorrow’s numbers, and find solace in woodworking, bridge,
    and the comfort of classic stories.
background:
  cultural: Keith is a white American with deep roots in the Mid‑Atlantic working‑class tradition. His family’s ancestry includes German and Irish immigrants who settled in western Pennsylvania during the
    early 20th century. Raised in a modest, close‑knit community, he values practicality, loyalty, and self‑reliance. Local customs such as celebrating Thanksgiving, the Fourth of July, and community church
    gatherings shape his cultural outlook. He carries a straightforward, down‑to‑earth attitude that reflects the heritage of the Rust Belt region where he lives and works.
