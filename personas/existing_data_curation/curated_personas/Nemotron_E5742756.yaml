personas:
  professional: Stephanie Sooy is a highly skilled meat processing technician who leverages meticulous cutting precision, strict HACCP compliance, and a competitive edge to consistently exceed production
    targets, and they organize shift schedules and mentor new hires with a structured, results‑driven approach.
  sports: Stephanie Sooy is an energetic co‑ed softball player for the Clinton Crushers, a regular participant in spin and HIIT classes at Metro Detroit Spin Club, a weekend hiker on the Clinton Township
    trails, and a die‑hard fan of the Detroit Tigers, Detroit Pistons, and Detroit Red Wings, often sporting their jerseys during workouts.
  arts: Stephanie Sooy embraces the local arts scene by attending live performances at The Fillmore Detroit featuring acts like The Strokes and Tame Impala, and they dominate karaoke nights at Karaoke Big
    City with classic anthems such as Journey’s 'Don’t Stop Believin’' and Queen’s 'Bohemian Rhapsody,' using music as a social outlet after a long shift.
  travel: Stephanie Sooy prefers organized group road trips that blend music festivals and culinary stops, having explored Nashville’s honky‑tonk bars and Austin’s renowned BBQ joints, while they now dream
    of a cross‑country adventure to Kansas City’s burnt‑end BBQ scene and a weekend getaway to Osaka to sample authentic smoked fish.
  culinary: Stephanie Sooy’s culinary passion centers on mastering meat, from slow‑smoked Texas‑style brisket seasoned with smoked paprika, brown sugar, and cumin to Korean‑inspired beef bulgogi jerky flavored
    with gochujang and sesame, and they regularly experiment with homemade rubs using chipotle, garlic powder, and liquid smoke while still occasionally burning the ribs due to over‑eagerness.
  core: Stephanie Sooy blends relentless precision at the meat plant with a competitive, socially‑charged off‑shift life, often juggling spreadsheets, barbecue experiments, and karaoke battles, all while
    occasionally letting their competitive streak turn into stubbornness.
background:
  cultural: Stephanie was born and raised in Clinton Township, a predominantly white, middle‑class suburb of Detroit. Her family heritage includes German and Polish roots, which manifest in a strong work
    ethic, an appreciation for practical, hands‑on tasks, and a community‑oriented outlook typical of the Midwest. Growing up, she was surrounded by the region’s agricultural and manufacturing traditions,
    fostering a pragmatic mindset and a love for group gatherings, whether at family barbecues, local sports leagues, or community events.
attributes:
  skills: '[''Meat cutting and portioning'', ''Deboning poultry and fish'', ''Food safety and HACCP compliance'', ''Sanitation and clean‑room procedures'', ''Operation of band saws, grinders, and slicers'',
    ''Inventory tracking and stock rotation'', ''Scheduling and staff coordination'', ''Training and onboarding new employees'', ''Equipment maintenance and troubleshooting'', ''Customer service at retail
    butcher counter'']'
  hobbies: '[''Playing on a co‑ed softball team'', ''Grilling, smoking, and experimenting with meat rubs'', ''Hiking local Michigan trails'', ''Gym workouts and group fitness classes (spin, HIIT)'', ''Volunteering
    at the Clinton Township food pantry'', ''Attending live music concerts and karaoke nights'']'
  career_goals: Stephanie aims to advance from her current processing role into a lead butcher or shift‑manager position within the next three years, gaining certification as a Certified Meat Professional
    and completing a food‑science associate program at a local community college. Long‑term, she envisions opening her own specialty butcher shop that emphasizes locally sourced, sustainably raised meats
    and provides hands‑on workshops for home cooks. She is also motivated to become a mentor and trainer for new staff, fostering a high‑performing, safety‑first team culture.
