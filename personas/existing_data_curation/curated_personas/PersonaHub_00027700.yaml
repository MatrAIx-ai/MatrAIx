persona_description: A teacher or educator who is interested in promoting literacy and reading comprehension, particularly in children's literature and picturebooks. They are passionate about incorporating
  discussions and activities that encourage children to think critically about the content and meaning of picturebooks, and to develop their own creative responses to the visual and literary elements. They
  are also likely to be familiar with the work of various authors and illustrators in the children's literature field, and may have experience teaching on teacher education courses in children's literature
  and literacy.
