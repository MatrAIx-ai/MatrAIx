    "Puzzle solving (crosswords, logic puzzles)", "Playing the violin in after‑school ensemble"]'
  career_goals: Paula aspires to pursue a career in science and technology, aiming to become a biomedical engineer who designs medical devices for children. She is determined to attend a competitive high
    school with a strong STEM program, earn scholarships, and eventually study at a top university. Her long‑term ambition includes contributing to innovative health solutions and mentoring other young
    girls interested in STEM.
