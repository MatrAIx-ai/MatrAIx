  hobbies: '[''Cooking traditional Honduran meals'', ''Walking along the Bay Shore waterfront'', ''Yoga and meditation'', ''Reading contemporary fiction'', ''Volunteering at local community center'', ''Herb
    gardening'', ''Listening to Latin music'', ''Crafting and DIY projects'']'
  career_goals: Marta aims to transition from hostess to a supervisory role, such as floor manager or assistant manager, within the next two to three years. She plans to earn a ServSafe certification and
    complete a bachelor’s degree in hospitality management to strengthen her leadership credentials. Long‑term, she dreams of opening a small café that blends Honduran flavors with New York's coastal vibe,
    creating a welcoming space for her community.
