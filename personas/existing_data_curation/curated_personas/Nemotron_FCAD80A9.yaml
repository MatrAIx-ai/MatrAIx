personas:
  professional: Marta Serrano, a bilingual front‑of‑house specialist known for calm conflict resolution and meticulous reservation coordination, is leveraging their practical, structure‑oriented mindset
    and compassionate service style to earn a floor‑manager position within New York’s coastal‑flavored dining scene.
  sports: Marta Serrano enjoys a relaxed fitness regimen that includes sunrise walks along the Bay Shore promenade, weekly yoga classes, and cheering for the New York Knicks basketball team and the New
    York Yankees baseball team, and they occasionally join a community rowing club that meets on the Hudson River during the summer.
  arts: Marta Serrano finds creative release in crafting homemade jewelry while listening to the rhythmic sounds of Latin pop artists such as Bad Bunny and Rosalía, and they unwind with contemporary fiction
    from authors like Sally Rooney and Chimamanda Ngozi Adichie, allowing the narratives to inform their approach to hospitality storytelling.
  travel: Marta Serrano favors short, purposeful trips that blend relaxation and cultural immersion, such as weekend getaways to the Hamptons, a solo adventure through the historic streets of Charleston,
    and a nostalgic visit to Puerto Rico’s Old San Juan, while they dream of a future culinary tour of Oaxaca's street‑food markets.
  culinary: Marta Serrano delights in preparing family recipes of baleadas and tamales, finely seasoning them with freshly harvested cilantro, oregano, and sweet plantains from their balcony garden, and
    they pair each dish with a steaming cup of hibiscus tea, while continuously experimenting with new flavor twists inspired by coastal New York seafood.
  core: Marta Serrano blends a love for structured service with a laid‑back habit of forgetting to log expenses, finding calm in yoga and kitchen aromas, and relentlessly curating a welcoming space—though
    they often misplace their phone during busy shifts.
background:
  cultural: Marta was raised in a Honduran‑American household where Spanish was spoken at home and family gatherings centered around shared meals. The values of hospitality, community support, and respect
    for elders shaped her worldview. She celebrates Honduran holidays such as Feria del Mango and Semana Santa, while also participating in local New York cultural events. Her bilingual ability and connection
    to the Honduran diaspora in Suffolk County help her bridge cultures, fostering inclusivity in both her personal life and professional environment.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish & English)'', ''Reservation and seating management'', ''Conflict resolution'', ''Team collaboration'', ''POS system operation (e.g.,
