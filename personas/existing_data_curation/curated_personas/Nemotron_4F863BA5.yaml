  hobbies: '[''Gardening (native plants and medicinal herbs)'', ''Reading (medical history and classic Southern literature)'', ''Book club participation'', ''Healthy Southern cooking classes'', ''Volunteer
    work at church food pantry'', ''Organizing community health fairs'', ''Yoga'', ''Walking/hiking along Cahaba River trail'', ''Genealogy research'']'
  career_goals: Rose aims to transition into a nurse manager or clinical educator role within the next three years, leveraging her calm leadership style and organized approach to enhance team performance
    and patient outcomes. She plans to pursue a Master of Science in Nursing with a focus on community health or health informatics, preparing her to develop and oversee telehealth services that improve
    access for underserved residents of Jefferson County. Rose also seeks to mentor and support new nurses, fostering a collaborative environment that balances structure with flexibility. In the longer
    term, she aspires to lead quality‑improvement programs that integrate new technologies in a practical, evidence‑based manner, and to contribute to state health‑policy discussions aimed at advancing
    health equity. Her ultimate ambition is to author a guide on blending technology with compassionate patient education, reflecting her blend of curiosity and practicality.
