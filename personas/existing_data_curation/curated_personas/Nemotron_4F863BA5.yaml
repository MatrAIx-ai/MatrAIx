personas:
  professional: Rose Prewitt is an experienced registered nurse with over 25 years in the Birmingham‑Bessemer health system, and they blend advanced clinical expertise, health‑informatics fluency, and a
    calm, collaborative leadership style that guides rapid‑response teams, optimizes electronic health records, mentors new staff, and balances curiosity for new technology with pragmatic, evidence‑based
    care.
  sports: Rose Prewitt roots for the Alabama Crimson Tide football team and the Birmingham Barons baseball club, participates in a local walking group that meets for sunrise hikes along the Cahaba River
    trail, and they maintain a weekly yoga practice at the community center, balancing competitive spirit with low‑impact fitness.
  arts: Rose Prewitt savors classic Southern literature like Harper Lee’s *To Kill a Mockingbird* and modern medical‑history biographies, discusses them at their book club, enjoys folk music from Emmylou
    Harris, attends performances at the Alabama Shakespeare Festival, and they collect hand‑painted Appalachian quilts displayed in their living room.
  travel: Rose Prewitt has explored nearby Asheville for its mountain hikes, spent a weekend in New Orleans soaking up live jazz on Frenchmen Street, and they dream of strolling the historic streets of
    Charleston and visiting Edinburgh’s Royal Mile to trace family roots, always planning trips around their clinic schedule and modest budget.
  culinary: Rose Prewitt excels at preparing wholesome Southern dishes such as shrimp and grits garnished with fresh garden mint, collard greens simmered with smoked turkey, and peach cobbler made with
    home‑grown peaches, and they incorporate medicinal herbs like echinacea and lemon balm into teas for patients, reflecting their culinary skill and health‑focused philosophy.
  core: Rose Prewitt blends a calm, evidence‑driven nursing career with a love for gardening, Southern cooking, and community education, and they navigate life with practical curiosity, organized flexibility,
    and a gentle, resilient spirit.
background:
  cultural: Rose Jeanne Prewitt was raised in Bessemer, Alabama, a city rooted in steel‑industry heritage and close‑knit Southern community values. As a white Southern woman from a modest, working‑class
    family, she grew up emphasizing hard work, self‑reliance, and hospitality—a cultural backdrop that nurtured her cooperative nature and desire for harmony. The local Methodist congregation played a central
    role in her upbringing, instilling a sense of service, kindness, and calm resilience. This environment, combined with strong encouragement for STEM education in her community, sparked her curiosity
    and led her to pursue a nursing degree. Rose’s cultural identity blends traditional Southern respect for tradition and community with an openness to scientific progress, informing both her professional
    dedication to patient care and her personal commitment to community well‑being.
