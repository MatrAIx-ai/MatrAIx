personas:
  professional: Aaron Deleon, an aspiring concept artist and future UX designer, merges their vivid imagination, meticulous organizational habits, and sociable teamwork to craft immersive visual narratives
    for interactive media, while their confident yet compassionate demeanor guides collaborative creative projects.
  sports: Aaron Deleon, a regular participant in pick-up soccer games with the Quincy Youth Soccer Club and an avid hiker along the Mississippi River trail, roots for the St. Louis Cardinals and follows
    the Chicago Bears, balancing weekly cardio runs with occasional strength-training sessions while preferring the camaraderie of team sports over solo workouts.
  arts: Aaron Deleon, an avid creator of surreal digital illustrations influenced by Salvador Dalí and Hayao Miyazaki, strums acoustic guitar in a casual band echoing John Mayer’s style, stars in school
    productions of Hamilton and The Lion King, and frequents local art galleries showcasing emerging multimedia artists, letting these varied inspirations shape their eclectic aesthetic.
  travel: Aaron Deleon, a budget-conscious teen who plans trips using spreadsheet itineraries, enjoys weekend getaways to nearby St. Louis for its museums and riverfront, has taken a school field trip to
    Chicago’s Museum of Science and Industry, and dreams of a solo adventure to Tokyo’s Akihabara to immerse themselves in gaming culture while balancing school responsibilities.
  culinary: Aaron Deleon, a moderately skilled home cook, favors bold flavors such as spicy chicken tacos with lime-infused salsa, homemade pepperoni pizza topped with fresh basil, and occasional weekend
    attempts at miso ramen with butter and soft-boiled eggs, often swapping recipes with friends after band practice.
  core: Aaron Deleon, a 16-year-old imaginative dreamer with a disciplined planner’s mind, juggles surreal art projects, late-night LEGO builds, and a habit of skipping sleep after creativity spikes, while
    mentoring peers at the community center.
background:
  cultural: Aaron grew up in Quincy, Illinois, a Midwestern small city known for its river heritage, community fairs, and a blend of German, Irish, and Anglo‑American cultural influences. His family traces
    roots to German immigrants who settled in Western Illinois in the 19th century, and he was raised with Midwestern values of self‑reliance, community involvement, and humility. The region’s agricultural
    backdrop and seasonal rhythms shape his appreciation for outdoor activities like fishing and hiking. He celebrates typical Midwest holidays, enjoys attending the Quincy Fair, and maintains strong ties
    with a close‑knit extended family and local church community, which nurture his sociable and cooperative nature.
