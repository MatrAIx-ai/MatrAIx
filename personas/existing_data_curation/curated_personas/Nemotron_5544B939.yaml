  hobbies: '[''Oil painting'', ''Experimental photography'', ''Board game nights'', ''Community theater'', ''Group hiking'', ''Volunteer work at food pantry'', ''Financial‑literacy workshops'', ''Gardening'',
    ''Home craft‑beer brewing'', ''Reading classic literature and philosophy'']'
  career_goals: Michael aims to advance to a chief financial officer role within the next five years, positioning himself as a champion of sustainable finance and community‑focused investment strategies.
    He seeks to lead his organization’s ESG initiatives, integrating social responsibility into core financial decision‑making. Michael also wants to develop a mentorship program for junior finance professionals
    in the St. Louis region and to author a guide on blending creative thinking with financial stewardship, sharing his passion for novelty and abstract concepts with a wider audience.
