  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading legal thrillers'', ''Studying American history'', ''Volunteer work at church'', ''Coaching Little League baseball'', ''Attending county
    fair'']'
  career_goals: He aims to transition his practice from a primarily litigation-focused firm to a boutique advisory consultancy that serves the agricultural and small-business community across Sedgwick County
    and neighboring regions. Over the next five years he wants to become a senior partner, mentor junior attorneys, and develop a series of continuing-education workshops on risk management for local farms.
    Ultimately, he hopes to secure a legacy of financial stability for his family while reducing day-to-day administrative burdens, allowing more flexibility for personal pursuits.
