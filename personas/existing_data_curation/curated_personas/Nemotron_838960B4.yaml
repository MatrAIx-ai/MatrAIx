personas:
  professional: Eric Jester, a seasoned commercial lawyer with three decades of experience in agricultural and real‑estate law, leverages his razor‑sharp negotiation skills and business‑savvy strategic
    planning while imposing his own brand of relaxed structure—preferring clear case files but allowing flexibility in client interactions—to guide small‑business clients through complex risk assessments.
  sports: Eric Jester follows the Kansas City Chiefs and the Wichita Thunder, coaches a Little League baseball team on weekends, and maintains personal fitness through early‑morning fishing outings on Cheney
    Reservoir and membership in a local senior softball league that satisfies his competitive edge while offering social camaraderie.
  arts: Eric Jester's evenings often feature classic rock from Bruce Springsteen and folk storytelling from Bob Dylan, while his weekends include visits to the Wichita Symphony and admiration for Grant
    Wood's Midwestern paintings, all of which anchor his appreciation for narratives that echo his legal background.
  travel: Eric Jester prefers road‑trip planning that balances relaxation with purposeful stops, having driven the Flint Hills, toured Santa Fe's historic plaza, and explored Yellowstone, while his bucket
    list includes a culinary pilgrimage to Texas Hill Country vineyards and a leisurely Caribbean cruise to unwind from his demanding consultancy ambitions.
  culinary: Eric Jester enjoys cooking robust Kansas‑style dishes such as chicken‑fried steak with mushroom gravy, grilled corn succotash seasoned with fresh rosemary, and occasional smoked trout seasoned
    with lemon‑dill, reflecting a competent home‑cook level that favors hearty, locally sourced ingredients.
  core: Eric Jester blends razor‑sharp legal acumen, a competitive streak, and a love for quiet outdoors, all while navigating life with structured pragmatism tempered by a flexible, occasionally disorganized,
    personal rhythm.
background:
  cultural: Eric was raised in a middle-class, farm-oriented community in central Kansas, where Midwestern values of self-reliance, hard work, and community involvement shaped his worldview. His family’s
    Protestant (Baptist) background emphasized modesty, responsibility, and a respect for tradition, while his business degree introduced a pragmatic, results-oriented mindset. The blend of rural culture
    and professional education gives him a pragmatic, competitive edge tempered by a strong sense of duty to his family and local community.
