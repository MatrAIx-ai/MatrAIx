persona_description: A scientist who specializes in the development of microendoscopes and their applications in neuroscience, particularly in the study of neural circuit development and cellular changes
  in response to experience. He has developed portable two-photon fluorescence microendoscopes that can image the brains of awake animals and has also developed optical remote control of discrete neural
  circuits using blue light. He is also interested in combining two-photon fluorescence microendoscopy with genetic techniques to view particular neural circuits in active animals.
