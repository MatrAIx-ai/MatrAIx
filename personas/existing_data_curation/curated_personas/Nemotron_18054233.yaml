  hobbies: '[''Gardening'',''DIY woodworking'',''Trail walking/hiking'',''Listening to classic rock'',''Crossword puzzles'',''Reading construction manuals'',''Small book club participation'',''Community
    fitness class'']'
  career_goals: Virginia aims to move from laborer to foreman within the next two years by completing a Construction Management certificate at a local community college and obtaining a Certified Safety
    Officer credential. She seeks a supervisory role that offers a more predictable schedule and higher earnings, providing financial stability after her divorce. In the long term, she hopes to launch a
    small home‑renovation business that leverages her practical skills while allowing her to set her own workload and maintain a structured work environment.
