  career_goals: Although no longer part of the formal workforce, Kyla aims to deepen her impact as a community volunteer leader. She aspires to become a senior‑center ambassador, designing inclusive programs
    that blend structured activities with spontaneous social opportunities. Kyla also wishes to expand her digital proficiency to assist other older adults in navigating online services, and she dreams
    of compiling a memoir that captures her life experiences and the cultural evolution of Seattle for future generations.
