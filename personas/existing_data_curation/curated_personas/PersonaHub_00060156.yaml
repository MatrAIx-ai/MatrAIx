persona_description: A researcher who studies perceptual defense and sensitization phenomena in the context of geometric problem-solving and problem-solving in the context of semicircular mazes. The researcher
  is interested in understanding how prior learning and the degree of figural generalization of a theorem affect the thinking process of students in solving geometrical problems and in problem-solving in
  semicircular mazes. The researcher is also interested in studying the fundamental processes of conditioning, extinction, and reconditioning in a semicircular maze.
