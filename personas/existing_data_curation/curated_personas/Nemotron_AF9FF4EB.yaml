  career_goals: Gary aspires to transition to a senior portfolio manager role where he can integrate his passion for art and alternative assets into a specialized investment strategy. Over the next five
    years, he aims to obtain the CFA charter, deepen his expertise in ESG and cultural asset finance, and mentor junior analysts. Ultimately, he hopes to launch his own boutique advisory firm focused on
    serving high‑net‑worth clients interested in art, real assets, and sustainable investing, while maintaining a flexible schedule that supports his family life and personal interests.
