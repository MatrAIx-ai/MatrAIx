  hobbies: '[''Cooking traditional Punjabi meals'', ''Gardening'', ''Attending Gurdwara services'', ''Participating in cultural dance events'', ''Playing bridge with friends'', ''Walking and hiking'', ''Practicing
    yoga'', ''Quilting and embroidery'']'
  career_goals: Harpreet aims to formalize her passion for cooking by launching a modest home‑based catering service that offers authentic Punjabi dishes for local events. She also wants to create a mentorship
    program that connects senior women in the South Asian community with younger volunteers, fostering cultural continuity. Additionally, she aspires to serve as a senior liaison at the Pittsburg community
    center to advocate for the needs of older South Asian residents, and she plans to learn digital photography to document cultural celebrations for future generations.
