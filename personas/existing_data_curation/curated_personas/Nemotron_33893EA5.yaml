  hobbies: '[''Mountain biking'', ''Rock climbing'', ''Acoustic guitar playing'', ''Attending live-music shows'', ''Strategy video gaming'', ''Volunteer AED installation and testing'', ''Data-driven emergency
    preparedness workshops'']'
  career_goals: Cecil aims to become a fully certified paramedic within the next 12 months, followed by a leadership role as an EMS shift supervisor. He plans to leverage his data-analysis skills to develop
    evidence-based protocols that reduce response times across Travis County. In the longer term, he envisions launching a tech-focused startup that creates portable diagnostic tools for EMTs, blending
    his engineering background with frontline insights. He also hopes to contribute to community resilience by organizing AED placement programs and public emergency-preparedness workshops.
