personas:
  professional: Cecil Hauck, a 28‑year‑old biomedical engineer turned emergency medical technician, harnesses data‑analysis expertise and high‑pressure communication to streamline EMS response protocols
    while pursuing paramedic certification and planning a future startup that delivers portable diagnostic tools for first responders.
  sports: Cecil Hauck fuels their competitive drive with weekly climbs at the Austin Bouldering Project, Saturday mountain‑bike excursions along the Greenbelt, and avidly follows the Texas Longhorns football
    and Austin FC soccer teams while tracking personal fitness milestones like a sub‑25‑minute 5‑k run.
  arts: Cecil Hauck, an acoustic‑guitar enthusiast, spends evenings improvising folk melodies inspired by Gillian Welch and John Prine, and regularly visits intimate venues such as the Cactus Café to catch
    emerging singer‑songwriters and local jam sessions.
  travel: Cecil Hauck balances a love for spontaneous weekend escapes—like a recent rock‑climbing trip to Moab—with a carefully budgeted bucket list that includes trekking the Patagonian Andes and exploring
    Japan’s Kumano Kodo pilgrimage routes, ensuring each adventure aligns with their fluctuating EMS schedule.
  culinary: Cecil Hauck enjoys crafting high‑protein meals like grilled chicken with quinoa and roasted sweet potatoes, indulges in Austin’s legendary brisket tacos, savors craft IPAs from local breweries,
    and experiments with homemade salsa using fresh jalapeños, cilantro, and lime.
  core: Cecil Hauck blends a data‑driven, structure‑loving work ethic with a spontaneous love for mountain‑bike trails, competitive climbing sessions, and late‑night folk guitar jams, all while juggling
    modest finances, occasional injury management, and a relentless drive toward paramedic leadership.
background:
  cultural: Cecil grew up in a middle-class Anglo-American family in the Midwest, where self-reliance and a strong work ethic were emphasized. His upbringing included traditional American holidays, a focus
    on education, and an appreciation for outdoor recreation. Since moving to Austin, he has absorbed the city’s eclectic blend of tech innovation, live-music culture, and Texan hospitality. He enjoys local
    traditions such as backyard barbecues, listening to country and indie music, and exploring the city's food‑truck scene, while also participating in the vibrant start-up community. This mix of Midwestern
    pragmatism and Austin’s progressive, collaborative spirit informs his personal and professional identity.
attributes:
