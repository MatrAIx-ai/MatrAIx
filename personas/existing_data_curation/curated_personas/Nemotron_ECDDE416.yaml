  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Local history research", "Coastal trail walking", "Community theater acting", "Competitive bridge", "Bird watching"]'
  career_goals: Although retired from the formal workforce, Alexandra aims to deepen her impact as a community mentor, offering workshops on budgeting and estate planning for younger residents. She plans
    to compile a detailed family genealogy and local history manuscript, leveraging her organizational strengths. Additionally, she aspires to lead a senior‑center gardening club, fostering intergenerational
    collaboration while maintaining the structured environment she values.
