personas:
  professional: Alexandra Chapman, a retired homemaker turned community mentor, leverages their meticulous organizational skills to run budgeting workshops, coordinate senior‑center events, and lead a local
    genealogy project, all while applying a pragmatic, structure‑first mindset.
  sports: Alexandra Chapman enjoys brisk walks on the coastal trail with the Hanover Senior Strollers club, follows the Boston Red Sox in spring, roots for the New England Patriots on Sundays, and occasionally
    joins a low‑impact pickleball league at the senior center, balancing competitive drive with a gentle exercise routine.
  arts: Alexandra Chapman stars in local productions of classic plays like Arthur Miller’s 'The Crucible', delights in quilting patterns inspired by William Morris, and spends evenings listening to folk
    singer Joan Baez while rereading Bernard Cornwell’s New England‑set novels, weaving these artistic threads into their identity.
  travel: Alexandra Chapman prefers organized day trips, using a detailed itinerary to explore historic towns such as Salem, enjoys weekend getaways to Cape Cod, and dreams of a guided tour through the
    historic streets of Edinburgh, balancing budget‑conscious travel with a love of heritage and literary landscapes.
  culinary: Alexandra Chapman cooks classic New England fare—clam chowder, baked beans, and apple crumble—using fresh garden harvests like heirloom tomatoes and kale, and though their culinary skill is
    solid, they often over‑salt their dishes, a habit inherited from a teenage love of hearty stews.
  core: Alexandra Chapman, a structured yet socially engaged 67‑year‑old, blends competitive vigor with community stewardship, balancing meticulous organization with a love for gardening, theater, and strategic
    bridge games, all while keeping a skeptical eye on new trends.
background:
  cultural: Alexandra was raised in a middle‑class white New England family with Irish and English ancestry. Growing up in suburban Hanover, Massachusetts, she absorbed a cultural emphasis on self‑reliance,
    modesty, and civic duty. Her upbringing included participation in traditional holiday celebrations, regular attendance at a Protestant church, and a deep appreciation for the region’s historic preservation.
    These influences shape her structured yet community‑oriented outlook.
attributes:
  skills: '["Personal budgeting and finance management", "Event planning and coordination", "Volunteer program organization", "Basic computer proficiency (Microsoft Office, email)", "Garden design and horticultural
