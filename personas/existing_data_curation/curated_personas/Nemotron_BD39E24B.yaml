  hobbies: '[''Drawing and sketching'', ''Digital illustration'', ''Writing short fantasy stories'', ''Playing Minecraft'', ''School art and drama clubs'', ''Basic coding with Scratch'', ''Listening to
    music and dancing'', ''Soccer (team sport)'', ''Exploring local parks and nature trails'', ''Cooking Salvadoran dishes with family'']'
  career_goals: She aspires to become a professional illustrator or animator, eventually creating interactive media that combines her love for art, technology, and storytelling. Paulina dreams of attending
    a specialized arts high school, then studying visual communications in college, with a long‑term goal of producing animated series that showcase Salvadoran folklore blended with contemporary themes.
    She also hopes to mentor younger kids in her community, using art and digital tools to celebrate multicultural heritage.
