personas:
  professional: A budding digital artist and storyteller, Paulina Gonzalez channels an imaginative curiosity into creating whimsical character sketches, experimental pixel art, and interactive narratives
    on Scratch, while their relaxed approach to deadlines sometimes leaves projects unfinished.
  sports: An energetic soccer enthusiast, Paulina Gonzalez plays forward on a local youth league team, cheers for the Idaho Vandals during basketball season, and idolizes Seattle Seahawks quarterback Russell
    Wilson, though their competitive streak sometimes overshadows team cooperation.
  arts: A passionate creator, Paulina Gonzalez spends afternoons drawing fantasy characters inspired by Studio Ghibli and Pixar, listens to the ambient scores of Lena Raine while dancing to Billie Eilish,
    and showcases original sketches in school drama club productions, often swapping ideas with peers at art club.
  travel: A curious explorer of the great outdoors, Paulina Gonzalez hikes the Boise River Greenbelt and has camped at Craters of the Moon, dreaming of a summer trek through Yellowstone, yet their modest
    allowance confines most adventures to weekend road‑crawls with family.
  culinary: A budding home chef, Paulina Gonzalez delights in mastering family recipes like cheese pupusas and tamales with grandparents, while also experimenting with simple dishes such as spaghetti carbonara
    and chocolate chip cookies, though they sometimes forget to clean up the kitchen after cooking.
  core: A wildly imaginative pre‑teen, Paulina Gonzalez blends artistic flair with a competitive edge, often juggling half‑finished sketches while dreaming up epic fantasy worlds and occasionally neglecting
    chores in favor of creative play.
background:
  cultural: Paulina is a first‑generation Salvadoran‑American, raised in a bilingual household where Spanish is spoken daily alongside English. Her family preserves Salvadoran traditions, celebrating holidays
    like Día de la Madre and preparing dishes such as pupusas, tamales, and yuca con chicharrón. She grew up hearing folklore and stories from her grandparents, which fuels her imaginative storytelling.
    While attending school in Caldwell, Idaho, she participates in local Hispanic cultural festivals and shares her heritage through art projects that blend Salvadoran folk motifs with modern styles. This
    dual cultural experience shapes her identity, fostering both pride in her roots and curiosity about the broader world.
