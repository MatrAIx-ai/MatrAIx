persona_description: A wildlife conservationist and environmental scientist with expertise in the impacts of climate change on wildlife, particularly in the Tibetan Plateau region. They have experience
  working with local, regional, state, and national natural resource managers, private landowners, and policy-makers to develop adaptive management guidelines and biological indicators for the effects of
  climate change. They have also collaborated with the Tibetan Academy of Agriculture and Animal Sciences and the Tibetan Forestry Bureau to gather baseline data on wildlife and develop partnerships with
  local agencies responsible for natural resource management. They have experience working with global climate models and Intergovernmental Panel on Climate Change projections to understand the potential
  effects of climate change on the Tibetan Plateau and the endangered species that call it home.
