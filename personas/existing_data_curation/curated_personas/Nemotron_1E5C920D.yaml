personas:
  professional: Kalieb Whitfield is a meticulous engineering technologist who applies CAD, PLC programming, and data‑driven process optimization to streamline complex manufacturing systems, while their
    organized, competitive nature drives them to lead cross‑functional teams toward Lean Six Sigma goals, and their skeptical eye ensures every solution is rigorously vetted.
  sports: Kalieb Whitfield stays active by shooting hoops at the local YMCA basketball league, follows the Charleston Battery in the USL Championship, hikes the Raven Cliff Trail and the Angel Oak Park
    loop on weekends, and mixes competitive sprint intervals with casual beach volleyball at Folly Beach, reflecting their balanced need for social engagement and solitary endurance.
  arts: Kalieb Whitfield immerses themselves in Charleston's vibrant art scene, capturing sunrise over the harbor in a Gregory Crewdson‑inspired photographic series, creating digital illustrations reminiscent
    of James Jean, strumming acoustic renditions of John Mayer and B.B. King on weekend jam sessions, and regularly attending live jazz at The Commodore and blues gigs at the Charleston Music Hall.
  travel: Kalieb Whitfield maps out travel with a spreadsheet‑style itinerary, balancing a modest budget with a love for authentic experiences, opting for weekend road trips to Asheville's Blue Ridge Parkway,
    kayaking the Savannah River, a month‑long backpacking adventure across the Scottish Highlands after earning their master’s, and periodic weekend getaways to Lisbon to capture pastel‑colored streets
    with their camera.
  culinary: Kalieb Whitfield, a competent home chef, loves perfecting shrimp and grits with Gulf shrimp, stone‑ground grits, smoked paprika, and fresh thyme, often pairs meals with locally roasted espresso
    from Black Tap Coffee, experiments with low‑country boil weekends, and treats themselves to artisanal oyster po' boys at the Charleston Farmers Market.
  core: Kalieb Whitfield merges analytical precision with artistic flair, obsessively aligning toolboxes and photo compositions while habitually forgetting to water houseplants—resulting in a small jungle
    of wilted succulents—and never skips a Friday night jazz set, all driven by a competitive edge that pushes them to out‑perform peers.
background:
  cultural: Kalieb is a second‑generation African‑American raised in Charleston's historic neighborhoods, where the legacy of Gullah culture and the city's civil‑rights history shaped his worldview. His
    family emphasizes community service, storytelling, and the preservation of Black heritage, which he honors through participation in local Emancipation Day celebrations and support for Black artists.
    He grew up listening to gospel and jazz, and often incorporates these musical traditions into his creative projects. His educational path, including a bachelor's degree in mechanical engineering from
    a historically Black university, reinforced his pride in contributing to the legacy of Black engineers. Kalieb remains connected to his cultural roots by volunteering at the Charleston Afro‑Caribbean
    Cultural Center and mentoring aspiring Black technologists.
attributes:
  skills: '[''SolidWorks CAD'', ''AutoCAD'', ''MATLAB'', ''Python for data analysis'', ''PLC programming (Allen‑Bradley)'', ''CNC machining'', ''Lean Six Sigma Green Belt'', ''Project scheduling (MS Project)'',
    ''Technical documentation'', ''Quality assurance and compliance'']'
  hobbies: '[''Photography'', ''Digital illustration'', ''Playing acoustic guitar'', ''Attending jazz & blues concerts'', ''Basketball'', ''Hiking coastal trails'', ''DIY electronics (Arduino, Raspberry
    Pi)'', ''3D printing'', ''Cooking Southern cuisine'', ''Mentoring youth in STEM'']'
  career_goals: Kalieb aims to become a senior engineering technologist within the next three years, leading cross‑functional teams on high‑impact infrastructure and manufacturing projects. He plans to
    earn a Lean Six Sigma Black Belt and complete a master's degree in engineering management to transition into a project manager role. Ultimately, he envisions founding a consultancy that blends sustainable
    engineering solutions with community development in Charleston's historically underserved neighborhoods, leveraging his technical expertise, competitive drive, and passion for innovative design.
