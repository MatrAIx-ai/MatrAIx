  hobbies: '[''Watercolor painting'', ''Paper crafting (papel picado)'', ''Gardening'', ''Book club participation'', ''Senior folk dance'', ''Cooking Mexican cuisine'', ''Community potluck hosting'', ''Walking
    nature trails'', ''Volunteering at local library'']'
  career_goals: Although retired, Bessy aims to mentor aspiring teachers, especially those interested in bilingual and arts‑focused pedagogy. She hopes to author a series of children’s books that blend
    Mexican folklore with contemporary storytelling, and to establish a community art studio for seniors and youth in Bethany. Additionally, she aspires to coordinate a local mentorship program linking
    retirees with school classrooms, fostering lifelong learning, cultural exchange, and creative collaboration.
