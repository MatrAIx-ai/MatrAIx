  career_goals: Nick aspires to attend a four‑year university, ideally studying engineering (civil or aerospace) or computer science, to develop the technical expertise needed for a career where precision
    and systematic thinking are prized. He is motivated by the prospect of contributing to infrastructure projects in the Southwest, improving water management, or working on aerospace technologies. If
    he chooses a military path, he considers becoming a pilot or officer, attracted by the regimented environment. In the short term, he aims to improve his academic record, earn a certification in Python
    programming, and secure a leadership role in his high school’s robotics or math club. Ultimately, he seeks a career offering clear progression, measurable achievements, and the ability to make tangible
    contributions to society.
