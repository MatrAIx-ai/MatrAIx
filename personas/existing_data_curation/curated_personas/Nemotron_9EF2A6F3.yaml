personas:
  professional: Nicholas Munson, a disciplined high‑school junior with a talent for precision engineering and Python scripting, channels their love of systematic progress into the robotics club, where they
    lead project timelines, document build processes, and mentor teammates in analytical problem‑solving.
  sports: Nicholas Munson energizes weekends with solo desert hikes and occasional pickup basketball, while they faithfully cheer for the El Paso High School Longhorns football team, follow Dallas Cowboys
    game stats, and support the local hiking club “Desert Trailblazers” as a member.
  arts: Nicholas Munson finds creative fuel in classic science‑fiction authors like Isaac Asimov, the cinematic scores of Hans Zimmer, and the black‑and‑white desert photography style of Ansel Adams, and
    they spend spare evenings editing short video reels set to the music of Daft Punk, sharing these visual stories on a modest Instagram page.
  travel: Nicholas Munson prefers methodical road trips, charting detailed itineraries for destinations that combine adventure and learning; they have mapped weekend excursions to Carlsbad Caverns to study
    geology, organized a family visit to Austin’s South Congress for live music, and dream of a future hiking trek through the Grand Canyon rim and a cultural immersion trip to Mexico City.
  culinary: Nicholas Munson enjoys crafting spicy carne asada tacos with fresh cilantro, lime, and corn tortillas, complements the meal with a chunky homemade guacamole featuring ripe avocados and diced
    tomato, and occasionally experiments with a chicken fajita skillet, though they often admit the dish ends up a bit too salty.
  core: Nicholas Munson is a methodical teen who blends a disciplined love of engineering and budgeting with solitary desert hikes, while they quietly indulge in sci‑fi narratives and over‑seasoned tacos.
background:
  cultural: Born and raised in El Paso, Texas, Nick comes from a family of long‑time Texas residents of European descent. His upbringing reflects traditional Western American values—self‑reliance, hard
    work, and community service—while also being shaped by the unique multicultural fabric of the border city. Although his household primarily observes Anglo‑American customs and celebrates holidays like
    Fourth of July and Thanksgiving, proximity to Mexican culture has given him familiarity with the Spanish language, regional cuisine such as tacos and enchiladas, and community events like Fiesta de
    los Dulces. The desert environment and close‑knit community of El Paso foster his appreciation for outdoor activities and local sports culture, especially high‑school football games as a spectator.
