  career_goals: Mayra aims to progress from managing a single location to overseeing multiple outlets as a regional operations manager within the next five years, leveraging her strong organizational skills
    and competitive drive. She aspires to launch her own boutique eatery that highlights authentic Ecuadorian cuisine while incorporating contemporary New York food trends. To support these goals, she plans
    to enroll in a part‑time business management program and obtain an Advanced Food Safety Manager certification, positioning herself for higher‑level leadership and entrepreneurial opportunities.
