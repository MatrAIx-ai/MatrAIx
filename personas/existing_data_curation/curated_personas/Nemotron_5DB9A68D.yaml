    Arduino projects (e.g., weather sensor)","Reading sci‑fi and environmental non‑fiction"]'
  career_goals: James dreams of a career that lets him stay curious and flexible while applying his hands‑on skills. He is drawn to fields where creativity meets technology, such as game development, interactive
    media design, or environmental technology. He envisions working as a software developer creating educational or simulation games that teach users about nature and sustainability. Alternatively, he sees
    himself as a field technician or drone operator for conservation projects, gathering data on local ecosystems. His long‑term ambition is to combine independent work with occasional collaborative teams,
    allowing him to balance his need for solitude with occasional assertive contributions, and to maintain a lifestyle that avoids overly rigid schedules.
