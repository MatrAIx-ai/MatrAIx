personas:
  professional: John Galili is a budding robotics enthusiast and Minecraft architect who blends meticulous blueprint planning with hands‑on programming, turning school projects into polished competition
    robots while channeling the same structured creativity into elaborate digital builds, and they quietly battle the occasional bout of self‑doubt that comes with high expectations.
  sports: John Galili rides the waves with the Sunset Bay Junior Surf Club and swims for the Oceanview Middle School Team, rigorously training each summer while cheering for the Los Angeles Lakers and the
    San Diego Padres, and they often skip a practice after a stressful robotics deadline.
  arts: John Galili pours disciplined artistry into piano practice, interpreting Beethoven’s ‘Moonlight Sonata’ with precision, improvising within the C‑major scale after listening to Ludovico Einaudi’s
    ambient pieces, and they also devour the science‑fiction worlds of authors like Isaac Asimov.
  travel: John Galili prefers meticulously planned road trips, cataloging each waypoint in a spreadsheet; they have explored the coastal cliffs of Big Sur, trekked the lava fields of Iceland, and dream
    of snorkeling the Great Barrier Reef while balancing a limited budget and school responsibilities.
  culinary: John Galili is a budding home‑chef who whips up quick ramen bowls with soft‑boiled eggs, enjoys pineapple‑topped pizza despite sibling protests, and can flawlessly make avocado toast with a
    sprinkle of chili flakes, though they often forget to clean the kitchen afterward.
  core: John Galili is a detail‑obsessed teen who constructs towering Minecraft castles, programs competition robots, and plays piano with precision, and they juggle chronic worry, occasional procrastination,
    and a penchant for midnight snack raids.
background:
  cultural: John comes from a middle-class, suburban family in San Diego, California. His ethnic background is white, and his family heritage includes ancestors of European (primarily Anglo-American) descent,
    with occasional familial ties to Mediterranean cultures that are observed through small family traditions. Growing up in a culturally diverse coastal city, he is exposed to a mix of mainstream American
    customs—celebrating holidays such as Thanksgiving, the Fourth of July, and Halloween—and the vibrant Latino influence of the region, which he experiences through school Spanish lessons and community
    events. The family places a high value on education, routine, and community involvement, reinforcing John’s preference for structure and responsibility while also encouraging him to respect the multicultural
    environment around him.
attributes:
  skills: '[''Organizational and time-management skills'', ''Basic Scratch programming'', ''Introductory Python coding'', ''Intermediate piano playing'', ''Strategic video-game planning (Minecraft, SimCity)'',
