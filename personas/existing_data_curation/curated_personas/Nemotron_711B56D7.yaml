  hobbies: '[''Minecraft building and modding'', ''Robotics club projects'', ''Piano practice'', ''Reading science-fiction and engineering books'', ''Surfing and swimming'', ''Community event organization'']'
  career_goals: John aims to pursue a career that combines his love for building, problem-solving, and clear, structured processes. He plans to maintain high grades through high school, earn a scholarship,
    and study engineering—preferably civil or mechanical—at a university. He hopes to join his school’s robotics team as a leader, attend summer STEM camps, and eventually work on designing sustainable
    infrastructure or mechanical systems that improve his community. Aware of his tendency to worry, he also intends to develop stress-management skills and possibly mentor younger students to help them
    organize their projects.
