persona_description: 'A historian or researcher who is passionate about the study of race relations and the impact of lynching on African American communities. They are interested in interviewing survivors
  of lynching and documenting their experiences through interviews and transcripts. They are committed to preserving and sharing the stories of those who were targeted and killed in these violent acts of
  racial terrorism. They are also interested in collaborating with Baylor University Press on a book from the project, with the working title "Conversations with Elders: African Americans Remember Lynching".'
