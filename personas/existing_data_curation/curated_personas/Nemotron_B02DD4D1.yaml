  career_goals: Ivan aims to earn his Certified Journeyman Carpenter license within the next two years and eventually start his own locally-focused construction firm that specializes in eco-friendly home
    renovations. He plans to complete an associate’s degree in construction management, gain experience on larger commercial projects, and build a reputation for high-quality, innovative craftsmanship.
    In the long term, he dreams of training apprentices from his community and expanding his business to include custom furniture design.
