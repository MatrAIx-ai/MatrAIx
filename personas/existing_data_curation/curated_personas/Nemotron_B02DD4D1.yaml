personas:
  professional: Ivan Dominguez, an 18‑year‑old aspiring journeyman carpenter, blends solid framing and blueprint‑reading skills with a curiosity for sustainable materials, leads small crews on site, and
    favors flexible, on‑the‑fly problem solving over strict planning, a habit that mirrors they prioritize flexibility over rigid schedules and thrive on the social dynamics of teamwork despite occasional
    disorganization.
  sports: Ivan Dominguez plays pickup soccer in Fresno’s community leagues, runs with the local Fresno Runners club, follows the Fresno State Bulldogs and the Los Angeles Lakers, and lifts at a neighborhood
    gym, channeling they competitive energy into fitness while juggling a flexible schedule.
  arts: Ivan Dominguez creates DIY furniture inspired by the minimalist aesthetic of IKEA and the craftsmanship of woodworker Marc Dufour, while their playlists feature regional folk guitar, indie rock
    band The Strokes, and cinematic scores by Hans Zimmer, a blend that showcases they practical creativity and eclectic artistic taste.
  travel: Ivan Dominguez prefers spontaneous weekend road trips to California’s national parks like Yosemite and Sequoia, dreams of backpacking through Patagonia and exploring Kyoto’s temples, and balances
    these travel ambitions with a limited college budget, often planning last‑minute itineraries that mirror they flexible, adventure‑seeking spirit.
  culinary: Ivan Dominguez loves cooking spicy grilled chicken tacos with fresh cilantro, lime, and roasted corn, experiments with reclaimed oak cutting boards for prep work, and frequently visits local
    taco trucks to savor authentic street‑style flavors, a habit that mirrors they hands‑on, experimental approach to both food and woodworking.
  core: Ivan Dominguez is an energetic, anxiety‑prone 18‑year‑old carpenter‑in‑training who trades meticulous tool organization for spontaneous creativity, often forgets appointments, and they constantly
    envision launching an eco‑friendly construction firm.
background:
  cultural: Ivan grew up in Fresno’s vibrant Mexican-American community, speaking both Spanish and English at home. His family maintains traditions such as Día de los Muertos celebrations, Sunday tamales,
    and community gatherings at the local church. He draws pride from his Mexican heritage while navigating the bicultural experience of a suburban California setting, often bridging the values of hard
    work and family solidarity with the entrepreneurial spirit of his peers.
