personas:
  professional: Aigner Bohm, a 49‑year‑old full‑stack software developer with two decades of experience, leverages their deep expertise in React, Node.js, cloud architecture, and AI integration while channeling
    their curious, collaborative, and art‑inspired mindset to lead agile teams that blend sleek UI/UX design with robust microservices, often volunteering mentorship in coding workshops to foster inclusive
    engineering cultures.
  sports: Aigner Bohm, an energetic 49‑year‑old, joins a community basketball league affiliated with the Dallas Basketball Association during the winter, follows the Dallas Mavericks and the Houston Rockets
    passionately, and complements team play with regular hikes in Texas state parks to maintain stamina and relieve lower‑back tension.
  arts: Aigner Bohm, a devoted patron of the Dallas arts community, routinely attends gallery openings featuring contemporary African American artists such as Kehinde Wiley and Amy Sherald, spins cherished
    Miles Davis and Nas vinyl on their refurbished turntable, and occasionally improvises saxophone solos that echo John Coltrane’s phrasing during relaxed evenings.
  travel: Aigner Bohm, who balances a demanding tech career with a love for cultural immersion, meticulously plans weekend trips to festivals like New Orleans’ Jazz & Heritage Festival and Munich’s Oktoberfest,
    while dreaming of a future sabbatical to explore the street art scene in Berlin and the culinary markets of Marrakech, often using points from a travel rewards credit card to stretch a modest vacation
    budget.
  culinary: Aigner Bohm, an avid home‑chef with an intermediate skill level, loves experimenting with Southern comfort staples like crispy fried chicken and collard greens while weaving in multicultural
    twists such as kimchi‑infused gumbo or miso‑marinated pork ribs, and they frequently source locally farmed okra and smoked paprika at the Dallas Farmers Market for weekend cooking sessions.
  core: Aigner Bohm, a 49‑year‑old tech leader who blends a love for jazz vinyl, saxophone jam sessions, and community basketball with a relentless curiosity for AI, yet habitually burns the midnight oil
    on side projects, often forgetting to schedule dental check‑ups.
background:
  cultural: Aigner is a Black American who grew up immersed in the rich traditions of African American culture, including gospel music, storytelling, and strong family bonds. Having spent much of his adult
    life in Texas, he blends Southern cultural influences—such as cuisine and community gatherings—with his professional life in the tech industry. Living in Frisco, a diverse but predominantly white suburb,
    he actively celebrates Juneteenth, Black History Month, and participates in local initiatives that promote representation in STEM. His heritage informs his appreciation for art, music, and community
    mentorship, and he strives to be a bridge between his cultural roots and the broader tech community.
attributes:
  skills: '[''Full‑stack web development (React, Node.js)'', ''Cloud architecture on AWS and Azure'', ''DevOps CI/CD pipelines'', ''Microservices design'', ''Data analysis and visualization (Python, SQL,
    Tableau)'', ''AI/ML model integration'', ''Agile Scrum methodology'', ''Technical mentorship and team leadership'', ''UI/UX design principles'', ''Performance optimization and scalability'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Collecting and listening to jazz and hip‑hop vinyl records'', ''Playing saxophone'', ''Recreational basketball and community leagues'',
