  hobbies: '[''Hiking in the White Mountains'', ''Birdwatching'', ''Model Railroading'', ''Woodworking'', ''Reading non‑fiction (technology, history)'', ''Volunteering at community center (computer tutoring)'',
    ''Playing bridge'', ''Gardening (vegetables)'', ''Classic film appreciation'']'
  career_goals: Keith aims to advance from first‑line supervisor to store manager within the next two years, leveraging his analytical skills to boost sales and reduce operational waste. Long‑term, he aspires
    to become a district manager overseeing multiple locations, and eventually to consult for retail chains on data‑driven process optimization. He also seeks to mentor emerging supervisors, building a
    cohesive team culture that balances performance with employee well‑being, while developing strategies to manage his own stress and maintain work‑life balance.
