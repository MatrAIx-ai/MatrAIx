personas:
  professional: Keith Lau, a seasoned frontline retail supervisor who leverages meticulous Excel dashboards and basic SQL queries to fine-tune staff schedules, inventory turnover, and visual merchandising,
    applies Lean and Six Sigma rigor to slash waste, and they double-check every metric out of an ever-present worry for flawless performance.
  sports: Keith Lau, an avid hiker who conquers the White Mountains each fall, follows the Boston Red Sox with fervor, plays pickleball at the senior center weekly, and they sometimes forgo these activities
    when inventory crises arise, balancing a love of outdoor fitness with the pull of professional responsibilities.
  arts: Keith Lau, a hands-on hobbyist who builds intricate model railways and crafts custom furniture in a home workshop, relaxes to the folk melodies of Joan Baez, regularly visits the Currier Museum
    of Art to admire Winslow Homer's seascapes, and they weave their appreciation of tradition and precision into each creative project.
  travel: Keith Lau, a methodical road-tripper who plots leaf-watching excursions through Vermont's Green Mountain National Forest each October, has already explored Acadia National Park's rugged coastline
    and the historic streets of Boston, and they now dream of a bird-watching expedition to New Zealand's South Island, all while budgeting carefully for each trip.
  culinary: Keith Lau, a home-cooking enthusiast who perfects New England clam chowder with fresh clams and thyme, regularly prepares maple-glazed carrots harvested from their vegetable garden, and they
    treat every meal as a chance to apply the same disciplined precision they use in inventory spreadsheets.
  core: Keith Lau, a meticulous, curiosity-driven planner whose love of tidy spreadsheets and model railways masks a chronic worry that fuels both their precision and occasional over-planning in every facet
    of life.
background:
  cultural: Keith grew up in a middle‑class New England family with deep Anglo‑American roots, tracing ancestry to early English and Irish settlers of New Hampshire. Raised in a small‑town environment,
    he was immersed in community traditions such as town meetings, seasonal fairs, and a strong emphasis on education and self‑reliance. Although his surname ‘Lau’ reflects a marriage connection to an Asian‑American
    lineage, his cultural identity is grounded in New England Protestant values, modesty, and a pragmatic approach to life. He participates in local civic groups, supports regional conservation efforts,
    and celebrates typical New England holidays with family gatherings centered around hearty home‑cooked meals.
attributes:
  skills: '[''Retail Operations Management'', ''Staff Scheduling and Training'', ''Data Analysis (Excel, SQL)'', ''Performance Metrics and KPI Tracking'', ''Inventory Control'', ''Customer Service Excellence'',
