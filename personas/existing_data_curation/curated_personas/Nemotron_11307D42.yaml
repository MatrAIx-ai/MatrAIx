  hobbies: '[''Drawing and painting'', ''Soccer'', ''LEGO building'', ''Sticker collecting'', ''Listening to Mexican and pop music'', ''Educational tablet games'', ''Watching space documentaries'']'
  career_goals: Diego dreams of becoming a professional soccer player who can lead his team to championships, while also imagining himself as an illustrator who creates comic books that blend Mexican folklore
    with modern adventures. He wants to use his bilingual abilities to tell stories that bridge his Mexican heritage and American life, hoping one day to be recognized both on the field and in the studio.
    He also hopes to mentor younger kids in art and sport, turning his competitive drive into a source of inspiration for others.
