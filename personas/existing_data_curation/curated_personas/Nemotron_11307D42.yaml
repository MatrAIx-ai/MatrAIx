personas:
  professional: Diego Mundarain, a budding junior illustrator and future astronaut‑in‑training, channels their boundless curiosity and competitive spark into vibrant drawings of legendary heroes, LEGO city
    schematics, and space‑themed educational games, while their relaxed attitude toward homework lets them bounce between projects in a delightfully disorganized yet creative rhythm.
  sports: Diego Mundarain dashes across the local park every Saturday with the 'Sunset Strikers' youth soccer team, idolizing Los Angeles FC’s fast‑paced attacks and channeling their competitive edge into
    every play, while their skeptical streak sometimes turns friendly scrimmages into intense showdowns.
  arts: Diego Mundarain spends afternoons sketching colorful mythic figures inspired by the bold brushstrokes of Frida Kahlo and the surreal whimsy of Salvador Dalí, while blasting mariachi hits from Luis
    Miguel and pop anthems by Taylor Swift, using the combination of classic and contemporary sounds to fuel their artistic imagination.
  travel: Diego Mundarain loves exploring the cosmos from home, having visited the local planetarium and the Space Center Houston on a family trip, and now dreams of a future virtual reality tour of the
    International Space Station, preferring organized day‑trip adventures over long vacations because of school schedules and parental budgeting.
  culinary: Diego Mundarain prefers bold, colorful meals like cheese pizza topped with extra cheddar and pepperoni, hands‑on spaghetti with tomato sauce, and galaxy‑themed cupcakes glazed with blue food
    coloring and cocoa powder, often assembling the dishes themselves with parental supervision while snacking on fruit smoothies blended with mango and banana.
  core: Diego Mundarain is a curious, competitively spirited six‑year‑old who blends vivid legend‑filled sketches, relentless soccer drills, and a love of space‑themed snacks into a playful yet sometimes
    anxious and disorganized whirlwind of creativity.
background:
  cultural: Diego is raised in a Mexican-American household in Garden City, Kansas. His parents speak Spanish at home and celebrate traditions such as Día de los Muertos, Cinco de Mayo, and Christmas with
    Mexican foods like tamales, pozole, and pan dulce. He attends a bilingual elementary program that reinforces both Spanish and English literacy. The local Hispanic community, church gatherings, and neighborhood
    festivals provide a strong sense of cultural identity, while the Midwestern environment exposes him to American customs, school sports, and community events. This blend of Mexican heritage and Kansas
    life shapes his values, language, and daily experiences.
attributes:
