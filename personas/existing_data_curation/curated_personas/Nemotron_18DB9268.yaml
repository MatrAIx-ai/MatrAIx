  hobbies: '[''hiking'', ''watercolor painting'', ''journaling'', ''ukulele playing'', ''drama club'', ''volunteering at library'', ''Scratch animation'']'
  career_goals: Maria dreams of turning her passion for art and storytelling into a career that blends creativity with community impact. She aims to study visual arts or museum studies in college, with
    a long‑term goal of becoming a curator or creative director for a regional arts centre that showcases Appalachian culture. In the meantime, she aspires to develop a YouTube channel where she shares
    art tutorials, nature vlogs, and interviews with local artists, hoping to inspire other kids.
