personas:
  professional: Maria Gibbs, an aspiring junior multimedia storyteller, blends her methodical sketch‑journaling from hikes in the Great Smoky Mountains with digital animation skills in Scratch, delivering
    captivating presentations that reflect her curiosity and knack for leading peers in school projects, and they thrive on the positive feedback they receive.
  sports: Maria Gibbs, a dedicated member of the local Outdoor Explorers Club, spends weekends navigating the rugged trails of the Great Smoky Mountains, plays on her middle‑school soccer team, and roots
    for the Tennessee Volunteers during televised games, and they enjoy the sense of camaraderie and personal challenge this mix provides.
  arts: Maria Gibbs, a budding watercolorist inspired by the atmospheric tones of John Singer Sargent and the playful narratives of Pixar shorts, channels her love of storytelling into ukulele performances
    of Broadway tunes and animated Scratch projects for the school drama club, and they often receive applause that fuels their creative confidence.
  travel: Maria Gibbs, an adventurous planner, maps weekend camping trips to the Great Smoky Mountains and dreams of exploring the towering cliffs of Zion National Park, balancing school obligations with
    family road trips to iconic sites like Washington, D.C.'s National Mall, and they savor each new landscape as a source of artistic inspiration.
  culinary: Maria Gibbs, who delights in mixing fresh strawberries with banana for smoothies and whipping up quick veggie quesadillas after a hike, relies on homemade granola bars for trail fuel but sometimes
    indulges in extra candy bars during study marathons, and they love sharing their favorite recipes with friends during sleepovers.
  core: Maria Gibbs is a curiosity‑driven, talkative 12‑year‑old who merges art, outdoor adventure, and community spirit into a lively, organized life, though she occasionally forgets to prioritize sleep,
    and they often energize a room with their enthusiasm.
background:
  cultural: Maria was raised in Sevierville, Tennessee, a town nestled at the foothills of the Great Smoky Mountains. Her family embodies many Southern Appalachian traditions—Sunday church gatherings, community
    festivals, and a love for storytelling through music and folk art. The region’s emphasis on hospitality, close‑knit community, and appreciation for the natural environment has shaped her values and
    her creative outlook.
