persona_description: A metallurgist who specializes in the refining and smelting of copper, zinc, and other precious metals. They have extensive knowledge of the refining techniques used in the Victorian
  era, including the use of various impurities and techniques for selecting the best refining type of copper. They have worked in the Welsh period and have a deep understanding of the fundamental changes
  that occurred in the development of copper smelting during that time. They have a keen interest in the maritime aspect of the industry, and are likely to be knowledgeable about the use of the sea in the
  extraction and transportation of metals.
