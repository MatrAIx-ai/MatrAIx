personas:
  professional: Elana Noboa, a veteran hospitality professional with a keen eye for artistic plating and bilingual customer service, channels their imaginative curiosity and meticulous organization into
    training staff, designing a specialty menu that fuses coffee pairings with innovative twists on traditional arepas and empanadas, all while navigating the competitive dynamics of restaurant leadership
    with a healthy dose of skepticism about corporate motives.
  sports: Elana Noboa enjoys low‑impact fitness such as sunrise yoga, brisk walks in the city park while birdwatching, and salsa dancing at community events, loyally cheering for the local River City FC
    soccer team and participating in a weekend amateur badminton club at the community center.
  arts: Elana Noboa spends evenings experimenting with abstract watercolors inspired by Kandinsky, frequents gallery openings featuring emerging Latin American painters, strums acoustic guitar to the melancholic
    chords of Nick Drake, and reads speculative fiction by Octavia Butler and the philosophical musings of Borges, all feeding their restless imagination.
  travel: Elana Noboa prefers meticulously planned trips that blend cultural immersion and artistic inspiration, having visited the historic old town of Cartagena, the coffee‑grown valleys of the Andes,
    the serene temples of Kyoto, and the vibrant murals of Valparaíso, yet their part‑time work schedule and budgeting concerns often confine future adventures to weekend getaways in nearby nature reserves.
  culinary: Elana Noboa approaches cooking as a laboratory, mastering the art of arepas with quinoa‑filled centers, hand‑folded empanadas seasoned with aji amarillo, and coffee‑infused chocolate mousse,
    while their pantry boasts panela, panela cheese, and fresh herbs, and they delight in tasting their creations at intimate bistro pop‑ups.
  core: Elana Noboa is an endlessly curious hospitality veteran who balances meticulous organization with artistic whimsy, often juggling stress‑induced worry, a competitive edge, and a love for abstract
    painting, coffee‑infused cuisine, and salsa rhythms.
background:
  cultural: Elana is a first-generation Colombian-American who grew up in a bilingual household after her family moved from Medellin to New Jersey when she was a child. She maintains strong ties to Colombian
    culture through family traditions such as celebrating Carnaval de Barranquilla, preparing arepas and bandeja paisa on weekends, and listening to cumbia and vallenato music. She participates in the local
    Colombian community, helping organize cultural festivals and sharing her heritage by introducing Colombian coffee and dishes in her restaurant work, while also raising her children with a blend of Colombian
    and American values.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (Spanish/English)'', ''Memory for Orders and Preferences'', ''High-Pressure Shift Management'', ''Creative Menu Development'', ''Artistic Plating'',
    ''Coffee and Wine Pairing'', ''Staff Training and Mentoring'', ''Shift Scheduling'', ''Food Safety and Sanitation'']'
  hobbies: '[''Abstract Watercolor Painting'', ''Reading Philosophy and Speculative Fiction'', ''Cooking Colombian Cuisine'', ''Salsa Dancing'', ''Gardening'', ''Short Story Writing'', ''Attending Art Exhibitions'',
    ''Birdwatching'', ''Playing Acoustic Guitar'']'
  career_goals: Elana aims to move into a supervisory role where she can shape the dining experience and mentor younger staff. She dreams of introducing a small specialty menu that highlights Colombian
    coffee and regional dishes, and eventually hopes to open a boutique cafe that doubles as an art space for local creators. Balancing her desire for novelty with the need for a less stressful schedule,
    she plans to transition to part-time work that allows more time for her artistic pursuits while still contributing her expertise to the restaurant community.
