personas:
  professional: Jason Aparicio, a 17‑year‑old aspiring visual storyteller, leverages their curiosity and organized yet flexible work ethic to produce digital illustrations, photo essays, and a self‑built
    portfolio website, while assertively seeking feedback in small‑group critique sessions.
  sports: Jason Aparicio enjoys weekend hikes at McDowell Mountain Regional Preserve, follows the Arizona Cardinals (NFL) and Phoenix Suns (NBA) for a sense of community, and participates in a local casual
    soccer league with close friends, indicating a low‑key but engaged athletic lifestyle.
  arts: Jason Aparicio immerses themselves in graphic novels like 'Sandman' by Neil Gaiman and 'Watchmen' by Alan Moore, draws inspiration from illustrators such as Jim Lee and Katsuhiro Otomo, and tunes
    into podcasts featuring designer interviews, weaving these influences into their own digital painting style.
  travel: Jason Aparicio prefers solo road trips to desert destinations like Sedona and Grand Canyon National Park, plans itineraries via online forums, balances adventure with budget constraints, and dreams
    of a future study‑abroad stint in Kyoto to explore manga culture.
  culinary: Jason Aparicio favors Southwestern flavors, regularly prepares prickly pear smoothies, avocado toast with chili flakes, and occasional chicken enchiladas, while experimenting with matcha latte
    art, revealing a modest cooking skill set that leans toward quick, flavorful meals.
  core: Jason Aparicio, a 17‑year‑old art enthusiast, blends meticulous planning with spontaneous creativity, hoards Procreate brushes, and occasionally neglects sleep to chase the perfect desert shot.
background:
  cultural: Jason grew up in a suburban white family in Chandler, Arizona, a city known for its tech‑industry growth and proximity to the vibrant Phoenix arts scene. His upbringing reflects a blend of typical
    Mid‑western American values—emphasis on self‑reliance, community involvement, and a modest middle‑class lifestyle—combined with the Southwest’s outdoor culture, where weekend hikes and desert photography
    are common. Although his household is primarily Anglo‑American, exposure to the diverse cultural tapestry of the greater Phoenix area—such as local Hispanic festivals, Native American art exhibits,
    and contemporary galleries—has broadened his artistic perspective. Family support for creative pursuits, access to public libraries, and the internet have shaped his curiosity and appreciation for varied
    artistic expressions.
attributes:
  skills: '[''Sketching'', ''Digital Illustration'', ''Photography'', ''Basic Photo Editing (Lightroom)'', ''HTML/CSS website development'', ''Creative Writing'', ''Research and Information Synthesis'',
