  hobbies: '[''Sketching and Digital Painting'', ''Photography (desert and urban scenes)'', ''Reading Graphic Novels and Art History Books'', ''Listening to Design and Culture Podcasts'', ''Hiking in McDowell
    Mountain Preserve'', ''Participating in Small Sketching Meet-ups'', ''Playing Narrative-driven Video Games'']'
  career_goals: Jason aims to turn his passion for visual storytelling into a professional career. In the short term, he plans to complete his GED and assemble a polished portfolio that highlights illustration,
    photography, and web design work. He hopes to enroll in a community college or an art-focused certificate program to deepen his technical skills and gain formal credentials. Long‑term, he envisions
    working as a freelance graphic illustrator or a junior designer at a creative agency in the Phoenix metropolitan area, collaborating on branding, game art, or editorial projects. He also dreams of eventually
    establishing his own boutique studio where he can mentor other young artists and produce socially conscious visual content.
