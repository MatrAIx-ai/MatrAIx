personas:
  professional: Sirous Jones, a veteran casino surveillance specialist with three decades of experience in CCTV monitoring, threat assessment, and incident reporting, blends meticulous risk management with
    a compassionate leadership style, and they aim to mentor junior officers while integrating AI-driven analytics to ease staff stress.
  sports: Sirous Jones enjoys weekend bird-watching hikes with the Clarksville Nature Club, follows the Tennessee Titans with fervor, plays low-impact golf at a local senior league, and they incorporate
    daily walks into their routine to balance desk-bound surveillance duties.
  arts: Sirous Jones regularly paints abstract canvases inspired by the Cumberland River, writes short stories over evenings with a cup of coffee, strums acoustic renditions of John Prine and Townes Van
    Zandt at community open-mic nights, and they attend exhibits featuring works by Mark Rothko at the Clarksville Cultural Arts Center.
  travel: Sirous Jones favors road-trip adventures through the Great Smoky Mountains and Asheville’s art districts, occasionally plans a yearly cultural pilgrimage to New York’s museum circuit, yet they
    balance travel dreams with a modest retirement budget, often opting for modest cabin stays over luxury hotels.
  culinary: Sirous Jones loves cooking Southern comfort foods like shrimp and grits, collard greens seasoned with smoked turkey, and they experiment with fresh river trout and heirloom tomatoes, yet their
    cooking skill is modest, relying on tried-and-true family recipes while occasionally treating themselves to a gourmet chef-guided tasting menu.
  core: Sirous Jones is an imaginative, compassion-driven security veteran who balances meticulous surveillance work with nightly abstract painting, a habit of humming folk tunes while monitoring cameras,
    and a lingering worry that fuels both careful preparation and occasional over-thinking.
background:
  cultural: Sirous grew up in a small town in Tennessee, steeped in Southern hospitality and community values. As a white male with deep roots in the region, he was influenced by church life, country and
    folk music, and the presence of the nearby military base, which fostered a respect for order and service. While he honors traditional Southern customs, his curiosity has led him to embrace diverse artistic
    expressions and progressive ideas, blending a classic Southern upbringing with a broad, imaginative outlook.
