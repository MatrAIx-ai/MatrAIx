  career_goals: Sirous aims to advance to a senior surveillance supervisory role where he can mentor younger officers and design training programs that emphasize compassionate, cooperative approaches to
    security. He wishes to integrate innovative technologies, such as AI‑driven analytics, to improve operational efficiency and reduce stress for staff. Long‑term, he aspires to become a security consultant
    for multiple gaming venues, focusing on holistic risk management and the mental well‑being of security teams.
