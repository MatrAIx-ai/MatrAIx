personas:
  professional: Edward Duprey, a veteran bank clerk with over thirty years mastering accounts payable, ledger reconciliation, and QuickBooks, thrives on structured processes yet often lets spontaneous mentorship
    and community outreach guide daily tasks, positioning them as a natural candidate for a senior advisory role.
  sports: Edward Duprey competes every Thursday night in the Middletown Strikers bowling league, cheers on the Hartford Yard Goats during baseball season, and joins a casual walking group at the local park,
    embracing community camaraderie over rigorous training.
  arts: Edward Duprey strums acoustic guitar in a folk circle that covers Bob Dylan and Joan Baez, attends the regional theater's productions of classic plays, and devours historical fiction by Ken Follett
    and Hilary Mantel, letting music and literature color their evenings.
  travel: Edward Duprey prefers short, spontaneous drives to the Connecticut shoreline—often stopping at Mystic Seaport or Old Saybrook for lobster rolls—while harboring a dream to explore the colonial
    streets of Williamsburg, Virginia, balancing budget constraints with a love for coastal nostalgia.
  culinary: Edward Duprey enjoys preparing collaborative meals of clam chowder, roasted chicken, and apple pie with their spouse, skillfully blending garden herbs like rosemary and thyme into dishes, though
    they sometimes over‑season when excitement takes over.
  core: Edward Duprey is a detail‑driven former bank clerk who balances structured financial stewardship with a relaxed, sociable lifestyle of folk music, community gardening, and spontaneous seaside outings,
    all while occasionally misplacing receipts in a charming, endearing disarray.
background:
  cultural: Edward is a third‑generation white American from New England, raised in a middle‑class family in the Hartford County area. His upbringing was rooted in the values of self‑reliance, community
    involvement, and modesty typical of the region. He attended the local public high school, entered the workforce directly after graduation, and has spent his adult life in Connecticut. His cultural identity
    reflects a blend of traditional New England Protestant (Methodist) influences, a strong work ethic, and a deep appreciation for the history and natural beauty of the surrounding coastal and rural landscapes.
attributes:
  skills: '[''Bookkeeping'', ''Bank Reconciliation'', ''Payroll Processing'', ''Accounts Payable'', ''Accounts Receivable'', ''Data Entry'', ''Microsoft Excel'', ''QuickBooks'', ''Customer Service'', ''Regulatory
