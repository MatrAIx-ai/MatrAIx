personas:
  professional: Tan Wu, an experienced interior painter and muralist, channels two decades of surface preparation, drywall repair, and color theory expertise into a boutique studio that blends meticulous
    budgeting and crew coordination while they adapt spontaneous mixed‑media designs for Brooklyn’s eclectic clientele.
  sports: Tan Wu stays active by playing weekend co‑ed softball with the Greenpoint Guardians, follows the Brooklyn Nets and New York Yankees religiously, and attends sunrise yoga sessions at the Brooklyn
    Bridge Park Club, pairing community salsa nights with a modest cardio routine they cherish.
  arts: Tan Wu immerses in Brooklyn’s art scene, sketching street life, curating mixed‑media murals inspired by artists like Ai Weiwei and Yayoi Kusama, and contributes set designs to the local theater
    troupe while they debate works by Zadie Smith and Susan Sontag in their weekly book club.
  travel: Tan Wu plans trips with a mix of structured itineraries for heritage sites in Kyoto, Shanghai, and Seoul and spontaneous sketch‑filled detours in Barcelona’s alleyways, favoring off‑peak travel
    to stretch the budget while they seek fresh visual inspiration.
  culinary: Tan Wu cultivates a rooftop herb garden to flavor home‑cooked ramen broth, handmade sushi rolls, and Sichuan mapo tofu, juggling a moderate cooking skill set that balances meticulous prep of
    miso‑based soups with the occasional indulgence in spicy street‑food tacos they love sharing with friends.
  core: Tan Wu is a 48‑year‑old Brooklyn based painter‑artisan who channels relentless curiosity and worry‑driven perfectionism into vibrant murals, community workshops, and late‑night herb‑infused cooking,
    all while they juggle a love for salsa, yoga, and meticulous budgeting.
background:
  cultural: Born to a Japanese mother and a Chinese father who immigrated to the United States in the 1970s, Momoko grew up navigating a bicultural household while living in Queens before moving to Brooklyn.
    She celebrates both the Japanese Obon and Chinese New Year, incorporating traditional foods, music, and rituals into family life. Fluent in English and Japanese, with conversational Mandarin, she often
    bridges cultural gaps within her community, offering advice on home décor that blends Eastern aesthetics with Western interiors. Her art frequently reflects this fusion, using motifs like kanzashi hairpins
    and Chinese calligraphy brushstrokes in contemporary mural projects. The rich tapestry of her East Asian heritage, combined with the diverse urban environment of Brooklyn, informs her worldview, artistic
    sensibility, and dedication to cultural exchange.
