  hobbies: '[''Gallery visits'', ''Sketching and photography'', ''Rooftop gardening'', ''Cooking Japanese and Chinese cuisine'', ''Yoga and tai chi'', ''Art‑history book club'', ''Community festivals'',
    ''Salsa dancing'', ''Set design for theater'', ''Travel to East Asia'']'
  career_goals: Momoko aspires to transform her trade career into a boutique art‑focused studio that offers both high‑end painting services and community mural projects. She plans to obtain a certification
    in decorative arts to deepen her design credentials, and to launch a series of after‑hours workshops that teach painting and paper‑hanging techniques to local youths. Over the next five years, she hopes
    to secure commissions for public art installations in Brooklyn parks, publish a small collection of her mixed‑media works, and eventually mentor emerging women artisans in the trades. Balancing financial
    stability with creative fulfillment, she also aims to develop a network of like‑minded artists to collaborate on interdisciplinary projects, all while managing stress through mindfulness practices.
