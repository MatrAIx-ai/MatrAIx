  hobbies: '[''Watercolor painting'', ''Gardening (tropical and coastal plants)'', ''Traditional Cambodian cooking'', ''Walking on the beach'', ''Reading historical biographies and Southeast Asian literature'',
    ''Attending art gallery openings'', ''Practicing tai chi'', ''Participating in Cambodian New Year celebrations'', ''Storytelling at the senior center'', ''Photography'']'
  career_goals: Although retired, Samnang remains driven to leave a lasting legacy. He aims to document his family's oral history and the broader Cambodian diaspora experience through a series of recorded
    interviews and a memoir. He aspires to mentor his grandchildren and younger community members in cooking, gardening, and art appreciation, fostering intergenerational connections. Samnang wishes to
    collaborate with the Laguna Beach Museum of Art to curate a small exhibition showcasing traditional Khmer art and contemporary works inspired by his travels. He also hopes to continue his volunteer
    work at the local senior center, enhancing cultural programming and promoting harmony among residents. Maintaining his health and staying intellectually active through lifelong learning are also central
    to his personal ambitions.
