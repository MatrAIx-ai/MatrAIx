persona_description: A neuroscientist who specializes in the study of the nervous system, specifically focusing on the role of proteins and their defects in neurological diseases. They have conducted research
  on the genetic defects of spectrin, a protein that forms an integral part of the cytoskeleton in neurons, and how these defects can lead to axon breakage in C. elegans, a millimeter-long worm prized by
  neurobiologists. They have also studied the effects of mutations in the gene encoding the beta3 form of spectrin on the structure and function of neurons in live specimens.
