  career_goals: Timothy aims to earn his GED within the next year and enroll in a community college program in visual arts or graphic design. He aspires to build a portfolio that will enable freelance work
    in digital illustration and photography. Long‑term, he hopes to work as a creative director for a cultural institution, such as a museum or arts nonprofit, where he can combine his love for art, community
    engagement, and innovative thinking.
