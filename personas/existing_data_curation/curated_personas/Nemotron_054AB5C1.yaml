personas:
  professional: Timothy Seda is a high‑school senior who channels their curiosity for sketching and digital illustration into a budding freelance career, using strong organization, collaborative teamwork,
    and an ability to translate local beach and historic district scenes into marketable graphics, and they often seek feedback from peers to refine their style.
  sports: Timothy Seda enjoys pick‑up basketball at the community park, follows the Miami Heat and Tampa Bay Buccaneers with fervor, swims at the beach each summer morning, and occasionally joins a local
    youth soccer league for weekend matches, and they keep fitness casual yet consistent.
  arts: Timothy Seda frequently visits downtown galleries, drawing inspiration from Van Gogh’s vivid palettes, Banksy’s streetwise satire, and the moody sounds of The National alongside classic rock legends
    like Fleetwood Mac, and they weave these influences into both hand‑drawn sketches and Procreate digital illustrations.
  travel: Timothy Seda prefers budget‑friendly road trips that spark creative ideas, having driven to the historic streets of St. Augustine and captured sunrise over the Everglades, dreaming of a future
    study‑abroad stint in Barcelona to deepen artistic practice, and they keep a travel journal full of sketches and photos.
  culinary: Timothy Seda is an amateur cook who loves fresh Florida seafood, often preparing grilled grouper tacos with lime‑infused salsa and ending meals with key lime pie, while their cooking skill remains
    at a confident intermediate level thanks to late‑night experiments after sketching sessions, and they frequently experiment with new spice blends.
  core: Timothy Seda is a detail‑oriented teen artist who balances methodical planning with spontaneous creativity, occasional overspending on art gear, and a habit of losing track of time during sunset
    photography sessions, and they often stay up late editing images.
background:
  cultural: Timothy grew up in Pinellas Park, a suburban community in Pinellas County, Florida. His family reflects a typical middle‑American, white background with strong values of community involvement
    and modest self‑reliance. The region’s blend of Southern hospitality and diverse tourist influences has exposed him to a variety of cultural experiences, from local seafood festivals to art events featuring
    artists from across the country. This environment fostered his appreciation for both traditional American customs and the broader artistic community.
