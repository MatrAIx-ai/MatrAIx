persona_description: A researcher or scholar who specializes in the British National Corpus (BNC), a 100 million word collection of written and spoken language samples from a wide range of sources, designed
  to represent a wide cross-section of British English from the later part of the 20th century, both spoken and written. The BNC contains examples of both spoken and written language, and is not limited
  to any particular subject field, genre or register. The BNC is designed to provide a comprehensive and representative corpus for the study of British English, and is used for research in fields such as
  linguistics, English language and literature, and cultural studies. The BNC is a valuable resource for scholars and researchers who are interested in studying the evolution and variation of British English
  over time.
