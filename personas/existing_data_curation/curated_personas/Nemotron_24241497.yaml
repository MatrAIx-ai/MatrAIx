personas:
  professional: Shimon Rodriguez, a meticulous front‑of‑house specialist who blends methodical crowd‑flow management and clear communication with an imaginative flair for signage and thematic queue layouts,
    they position themselves for a supervisory role in hospitality while pursuing a Hospitality Management degree.
  sports: Shimon Rodriguez, a weekend hiker who tackles the Sandhills trails and attends local community‑run yoga sessions, supports the Carolina Panthers and Charlotte Hornets, follows the Greenville Drive
    minor‑league baseball team, and keeps fit by mixing moderate cardio hikes with occasional weight‑training at the gym, all while using a sports‑tracking app to log mileage and set gentle progress goals.
  arts: Shimon Rodriguez, an avid creator who paints abstract watercolors inspired by Helen Frankenthaler, captures low‑light theater moments reminiscent of Cindy Sherman and night‑sky vistas echoing Ansel
    Adams, strums acoustic renditions of Bob Dylan and Muddy Waters on a vintage guitar, and frequents local galleries and community theater productions where they often volunteer backstage, weaving these
    artistic threads into their identity.
  travel: Shimon Rodriguez, a methodical adventure planner who favors road‑tripping through the Appalachian Mountains, has explored Asheville, NC, Savannah, GA, and Reykjavik, Iceland for aurora photography,
    and dreams of hiking Patagonia’s Torres del Paine while balancing travel budgets with a modest savings plan that reserves funds for off‑season creative retreats.
  culinary: Shimon Rodriguez, an intermediate home cook who blends Southern comfort dishes like shrimp‑and‑grits and collard greens with Mediterranean experiments such as saffron‑infused seafood paella,
    enjoys sourcing fresh herbs at farmer’s markets, perfects a sourdough starter using rye flour, and relishes dining at indie bistros where they can discuss the chef’s use of smoked paprika and citrus
    zest.
  core: Shimon Rodriguez, a 34‑year‑old blend of methodical organizer and imaginative artist, juggles front‑of‑house duties, watercolor experiments, astrophotography trips, and a budding event‑planning
    side hustle while habitually hoarding coffee cups and refusing to skip a single night‑sky shoot regardless of weather.
background:
  cultural: Shimon grew up in a small town in the Upstate region of South Carolina, rooted in a white Southern, second-generation family that values community, hospitality, and tradition. Family gatherings
    often featured classic Southern cuisine—fried chicken, collard greens, and barbecue—alongside church potlucks and high-school football games. He was raised with an emphasis on politeness, helping neighbors,
    and participating in local festivals such as the York County Summer Fair. This environment fostered his cooperative nature and respect for harmonious relationships. While his heritage is primarily Anglo-American,
    he has been exposed to the broader cultural mosaic of the region, including Gullah culinary influences and the vibrant arts scene in nearby Charlotte, which sparked his interest in abstract art and
    community theater. His cultural identity blends a deep appreciation for Southern hospitality with an openness to diverse artistic expressions.
