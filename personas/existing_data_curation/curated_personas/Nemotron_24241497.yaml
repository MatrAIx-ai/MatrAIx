  hobbies: '[''Reading speculative fiction'', ''Abstract watercolor painting'', ''Low-light theater photography'', ''Astrophotography'', ''Playing acoustic guitar'', ''Hiking in the Sandhills'', ''Attending
    community theater'', ''Backstage volunteering'', ''Woodworking'']'
  career_goals: Shimon aims to leverage his front-of-house experience into a supervisory role within the hospitality or entertainment industry. Over the next three years he plans to complete a bachelor's
    degree in Hospitality Management, either online or through a community college, to complement his practical knowledge. His long-term ambition is to become an Event Operations Manager for a regional
    theater or concert venue in the Upstate, where he can oversee staffing, logistics, and guest experience. He also hopes to launch a boutique event-planning service focused on small community festivals
    and art exhibitions that blend his creative interests with his organizational strengths. Ultimately, he seeks a career that balances reliable operational leadership with opportunities to inject imaginative
    concepts into public events.
