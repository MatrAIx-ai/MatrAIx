  hobbies: '["Reading adventure and mystery books", "LEGO building and creative design", "Soccer", "Hip‑hop dance classes", "School choir singing", "Nature exploration and journaling", "Educational TV (e.g.,
    Bill Nye)", "Arts‑and‑craft projects", "Kid‑friendly robotics kits (LEGO Boost)", "Strategic board games (Connect Four)", "Organizing scavenger hunts"]'
  career_goals: Betty dreams of becoming a scientist who designs solutions for the environment, inspired by her love of nature and hands‑on experiments. She also envisions herself as a veterinarian who
    cares for animals, reflecting her curiosity about how living things work. Her competitive spirit drives her to aim for the school science fair winner’s trophy, and she hopes to lead a future robotics
    or engineering club where she can combine her practical problem‑solving with her curiosity. Ultimately, she wants a career that lets her explore questions, build tangible projects, and help her community.
