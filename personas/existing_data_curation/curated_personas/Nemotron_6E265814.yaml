personas:
  professional: Betty Guerra is a budding junior engineer who loves designing intricate LEGO towns and tinkering with LEGO Boost robotics kits, channeling their methodical planning and competitive spirit
    into creating elaborate structures that mimic the adventurous worlds in their mystery books.
  sports: Betty Guerra is a lively midfielder on the River Runners kids’ soccer team; they practice drills after school, cheer for the Seattle Seahawks and the Seattle Mariners, and spend rainy afternoons
    sprinting through tag games at the park, always insisting on a quick warm‑up stretch before each match.
  arts: Betty Guerra dazzles in their hip‑hop dance class mastering high‑energy routines to the beats of Kidz Bop versions of Ariana Grande, sings in their school choir performing classics like “Let It
    Go,” and draws inspiration from Disney movies, especially the animated adventures of Moana and the whimsical art of Studio Ghibli.
  travel: Betty Guerra’s travel diary boasts a weekend camping trip to the nearby state forest, a family vacation to Disney World in Orlando where they rode Space Mountain, and a wish to explore the ancient
    ruins of Machu Picchu someday, all while preferring short, adventure‑filled trips over long, unstructured vacations.
  culinary: Betty Guerra loves the taste of cheesy macaroni, pepperoni pizza, and strawberry‑banana smoothies, can assemble a simple peanut‑butter‑jelly sandwich on their own, and enjoys sprinkling extra
    chocolate chips onto cupcakes at birthday parties, though they sometimes sneak a handful of gummy bears when no one is watching.
  core: Betty Guerra is a curious, methodical seven‑year‑old who balances their love for building epic LEGO worlds and competitive soccer with a playful streak that leads to occasional candy‑theft and a
    steadfast habit of planning every adventure down to the last LEGO brick.
background:
  cultural: Betty grew up in a middle‑class family in Matthews, a suburban community of Charlotte, North Carolina. Her family’s heritage includes Irish and German roots, and they follow many Southern traditions
    such as celebrating Thanksgiving with a family feast, Fourth of July fireworks, and community barbecues. They attend a local Methodist church where community service and kindness are emphasized. The
    neighborhood is close‑knit, with block parties, a local library storytime, and a popular community park that hosts sports leagues and summer camps. The area’s growing cultural diversity has exposed
    Betty to classmates from many backgrounds, fostering an inclusive outlook while still reflecting the region’s values of hospitality, hard work, and respect for education.
attributes:
  skills: '["Fluent reading (grade‑2 level)", "Basic arithmetic (addition & subtraction up to 20)", "Puzzle solving and logical reasoning", "LEGO building with step‑by‑step instructions", "Organizing small
