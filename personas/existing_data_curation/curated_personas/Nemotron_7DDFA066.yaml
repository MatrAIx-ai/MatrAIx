personas:
  professional: Paul Mizell, a 7‑year‑old who treats LEGO constructions like miniature engineering projects, blends boundless curiosity with a practical knack for following step‑by‑step guides, and brings
    that same flexible, sometimes chaotic, problem‑solving style to school assignments and group activities.
  sports: Paul Mizell, a 7‑year‑old who spends weekends at the Jersey City community soccer league, cheers for the New York Yankees and New York Knicks, and frequents the waterfront park’s splash pad for
    unstructured play, balancing organized team sports with spontaneous backyard tag games.
  arts: Paul Mizell, a 7‑year‑old who fills sketchbooks with cartoon characters inspired by Dr. Seuss, Pixar’s Toy Story, and classic comic strips, loves visiting the Liberty Science Center’s art workshops,
    and eagerly hums tunes from Disney’s Frozen while drawing, letting vivid imagination shape his leisure.
  travel: Paul Mizell, a 7‑year‑old who dreams of exploring the tropical shells of the Florida Keys after his annual family trips to Liberty State Park, enjoys day‑long adventures to the Bronx Zoo and a
    weekend ferry ride to Ellis Island, but his travel plans stay anchored to school schedules and parental budgets.
  culinary: Paul Mizell, a 7‑year‑old who favours cheesy pizza, chicken nuggets, and strawberry‑banana smoothies, can proudly make a PB&J sandwich on his own, and collects coconut chips and bright‑colored
    gummy bears as his go‑to snack ingredients after treasure‑hunting beach walks.
  core: Paul Mizell, a 7‑year‑old whose boundless curiosity fuels elaborate LEGO cities, yet their habit of leaving bricks scattered reflects a charmingly chaotic approach to both play and learning.
background:
  cultural: Paul was born and raised in Jersey City, New Jersey, in a family of European‑American heritage (primarily Irish and English ancestry). He grows up in a multicultural urban neighborhood, which
    exposes him to diverse languages, foods, and celebrations, while his household maintains traditional American customs such as Thanksgiving, Fourth of July fireworks, and holiday gatherings. He attends
    a public elementary school where he interacts with peers from many backgrounds, shaping a broad, inclusive outlook.
