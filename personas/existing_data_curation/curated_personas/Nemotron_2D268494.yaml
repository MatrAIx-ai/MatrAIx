  hobbies: '[''Abstract painting'', ''Urban photography'', ''Reading science‑fiction and philosophy'', ''DIY electronics (Arduino projects)'', ''Volunteering at school STEM fairs'', ''Community theater
    set design'', ''Birdwatching'', ''Hiking in Ouachita Mountains'', ''Live music attendance'']'
  career_goals: Cherie aspires to transition from frontline driving to a leadership role within the Little Rock transit authority. She aims to become a senior driver trainer, leveraging her STEM background
    to develop data‑driven training modules and safety workshops. Over the next five years, she hopes to spearhead a pilot program that integrates technology—such as mobile apps and interactive maps—into
    route planning to improve punctuality and rider experience. Additionally, she is passionate about community outreach, planning to coordinate STEM‑focused art workshops for local youth that combine her
    love of abstract art with engineering concepts. Long‑term, she envisions consulting on transit efficiency projects for regional municipalities while continuing to ride occasionally to stay connected
    with front‑line operations.
