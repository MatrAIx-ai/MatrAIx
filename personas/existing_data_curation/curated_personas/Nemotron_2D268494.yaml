personas:
  professional: Cherie Talley is a veteran public transit driver turned data-driven trainer, leveraging three decades of mechanical expertise, GIS route optimization, and a vivid artistic imagination to
    craft innovative, safety-focused training modules; they combine analytical precision with creative problem-solving to improve rider experience and mentor new drivers.
  sports: Cherie Talley enjoys a blend of low-impact cardio and community sport, jogging along the Arkansas River in spring, joining the Little Rock Hiking Club for weekend Ouachita treks, cheering loudly
    for the Arkansas Razorbacks basketball team and the Little Rock Travelers minor-league baseball, and practicing gentle yoga twice a week to counteract the stiffness from long-haul bus routes.
  arts: Cherie Talley channels a lifelong love for the abstract and the narrative into her painting and photography, drawing inspiration from Mark Rothko's color fields, Henri Cartier-Bresson's street compositions,
    and the blues legend Muddy Waters, while also contributing set designs for the Arkansas Repertory Theatre and attending performances by indie folk singer Sufjan Stevens and blues artist Gary Clark Jr.
  travel: Cherie Talley plans trips with a mix of meticulous itinerary mapping and spontaneous detours, having photographed the neon streets of Tokyo, hiked the fjords of Norway, explored the historic districts
    of New Orleans, and frequently returns to the nearby Ozark National Forest for weekend photo-expeditions that satisfy both her adventure thirst and her love for riverine scenery.
  culinary: Cherie Talley balances Southern comfort with culinary experimentation, mastering shrimp-and-grits with a whisper of smoked paprika, crafting quinoa-based black bean chili infused with fresh
    cilantro, and indulging in a perfectly caramelized peach cobbler, all while staying fueled by a daily espresso and an ever-growing collection of heirloom tomatoes from her backyard garden.
  core: Creative, technically sharp, and slightly disorganized, Cherie Talley blends a love for buses, brushes, and binary code into a uniquely curious life that juggles mentorship, midnight coffee, and
    a habit of misplacing small art tools.
background:
  cultural: Cherie grew up in a small town in central Arkansas, where Southern hospitality and close‑knit community values shaped her early worldview. As a white woman from the South, she experienced both
    the supportive network of local churches and the challenges of pursuing a STEM degree in a region where women in engineering were still a minority. Her upbringing instilled an appreciation for regional
    traditions—such as home‑cooked meals, folk music, and annual county fairs—while her academic journey broadened her perspective to include diverse artistic and scientific cultures. Living and working
    in Little Rock, she embraces the city’s blend of historic Southern charm and modern urban revitalization, actively participating in neighborhood art walks, riverfront festivals, and the local public‑transit
    community. This mix of Southern roots, academic achievement, and artistic curiosity informs her inclusive, collaborative approach to both her professional and personal life.
attributes:
  skills: '[''Vehicle operation and safety'', ''Mechanical troubleshooting'', ''Electrical system diagnostics'', ''Route optimization (GIS)'', ''Data analysis for schedule adherence'', ''Fuel efficiency
