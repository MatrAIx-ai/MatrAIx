personas:
  professional: Shelby Milne is an aspiring environmental sustainability analyst who blends their solid research background, early‑stage Python scripting, and an eye for composition honed through digital
    photography to turn field surveys into clear, data‑driven recommendations, thriving in independent projects even as a relaxed approach to deadlines sometimes leads to a cluttered spreadsheet.
  sports: Shelby Milne prefers solitary fitness pursuits, logging weekly hikes in the Boulder foothills, joining the Boulder Trail Club for seasonal trail runs and occasional indoor rock climbing, while
    cheering on the Colorado Avalanche during hockey season and the Denver Broncos in the fall, but they rarely join team sports because their competitive streak favors personal challenges.
  arts: Shelby Milne channels their creative side through digital photography inspired by Ansel Adams, capturing Colorado sunrise vistas that they later edit in Lightroom, while unwinding with story‑rich
    indie games like Hades and Celeste, sketching nature scenes in a weathered Moleskine, devouring dystopian novels such as 'Station Eleven' and 'The Windup Girl', and regularly tuning into science podcasts
    hosted by Neil deGrasse Tyson.
  travel: Shelby Milne plans travel with a blend of meticulous itinerary maps and spontaneous detours, favoring solo weekend getaways to nearby gems like Rocky Mountain National Park and Great Sand Dunes,
    already dreaming of a summer trek across Iceland’s volcanic landscape and a future backpacking adventure through Patagonia’s Torres del Paine, yet their modest student budget and occasional procrastination
    often delay booking flights until the last minute.
  culinary: Shelby Milne enjoys simple, nutrient‑dense meals, often whipping up a quinoa‑and‑kale bowl with roasted chickpeas and a squeeze of lime or seasoning a pan‑seared lemon garlic salmon with fresh
    herbs, while their occasional indulgence includes a late‑night order of Thai green curry from a local delivery service, and they favor brewing cold‑brew coffee using a French press on busy study nights.
  core: Shelby Milne balances a restless curiosity for environmental data and solitary hikes with a chronic worry that fuels meticulous journaling, frequent meditation sessions, and occasional procrastination
    on deadlines.
background:
  cultural: Shelby grew up in a middle‑class white family in the Rocky Mountain region, where a blend of self‑reliance, environmental stewardship, and academic encouragement shaped her worldview. Her parents
    fostered independent thought and a love for the outdoors, often taking weekend trips to explore the mountains. Living in Boulder, she is immersed in a community that values sustainability, progressive
    politics, and a DIY ethos, which aligns with her practical curiosity. While she embraces the local culture’s emphasis on environmental activism, she remains cautious in social interactions, preferring
    small, trusted circles. Online, she engages with diverse literary and scientific communities, broadening her cultural perspective beyond her immediate surroundings.
attributes:
  skills: '["Literature Review", "Data Analysis (Excel, SPSS)", "Basic Python Programming", "Digital Photography", "Creative Writing", "Critical Thinking", "Independent Research", "Outdoor Navigation"]'
  hobbies: '["Hiking and trail exploration", "Nature photography", "Reading speculative fiction", "Journaling", "Meditation and mindfulness", "Playing indie video games", "Sketching and drawing", "Listening
    to science and tech podcasts", "Board game nights with close friends"]'
  career_goals: Shelby aims to complete a bachelor's degree in Environmental Studies and transition into a role as a data‑driven sustainability analyst, where she can blend her curiosity for new environmental
    solutions with a practical, results‑oriented mindset. She aspires to secure internships that offer hands‑on fieldwork and analytical experience, eventually moving into a consulting position that provides
    flexibility and remote work options to accommodate her need for stress‑management. Long‑term, she hopes to build a personal brand as a science communicator, producing blog and video content that demystifies
    environmental data for a broader audience while maintaining a competitive edge for scholarships and industry certifications such as GIS.
