  career_goals: Although retired from formal employment, Ashley aims to remain a vibrant force in the educational community of San Diego. She aspires to launch a neighborhood learning hub that offers free
    tutoring, senior-led workshops, and cultural exchange programs. She hopes to author a practical guide on effective teaching strategies for adult learners and serve on the advisory council of a local
    nonprofit focused on youth mentorship. Her ambition includes being recognized as a community educator who bridges generational gaps through innovative, yet grounded, learning experiences.
