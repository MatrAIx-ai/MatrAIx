  hobbies: '[''gallery visits'', ''sketching'', ''hiking'', ''yoga'', ''reading speculative fiction'', ''cooking experimental New Mexican dishes'', ''animal shelter volunteering'', ''indie video gaming'',
    ''live music attendance'']'
  career_goals: Lauren aims to pursue a degree in community psychology or social work, with a focus on integrating art therapy into youth counseling. She aspires to develop a community arts program that
    offers free workshops and therapeutic art sessions for underserved populations in Albuquerque. In the long term, she envisions leading a nonprofit organization that blends creative expression with mental
    health support, fostering harmony and empowerment within her community.
