persona_description: A researcher and educator in the field of early childhood education, particularly focusing on the intersection of gender and schooling in the early years. This person is interested
  in exploring the complex world of play and how it parallels the role of gender in society, as well as the role of Montessori settings and bilingual education. They are also knowledgeable about gender
  equity in education and the importance of early child care environments in shaping the development of children. Additionally, they are interested in the intersection of gender and early learning environments,
  the role of girls and women in STEM, the duality of women scholars of color, and the importance of women leaders advancing careers. They are likely to read this text as a resource for their research and
  educational work in the field of early childhood education.
