  career_goals: Although retired, Si Yu aims to deepen her role as a cultural bridge in her neighborhood. She plans to mentor younger volunteers at the senior center, sharing both organizational skills
    and cultural traditions. She hopes to lead a community garden club, teaching sustainable gardening practices while preserving herb varieties used in East Asian cooking. Si Yu also aspires to compile
    a family memoir that documents recipes, stories, and the immigrant experience for future generations. A modest travel goal includes visiting her ancestral hometown in China to reconnect with family
    roots. Maintaining her health through regular tai chi and staying socially engaged in small, supportive groups are also central to her ongoing ambitions.
