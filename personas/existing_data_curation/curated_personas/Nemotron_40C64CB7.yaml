  career_goals: Cathy dreams of a future where she can help others and work with living things. She often says she wants to become a teacher because she enjoys sharing what she learns, or a veterinarian
    because of her love for animals. Her practical side also makes her imagine becoming an engineer or a scientist who designs helpful inventions. She is motivated to pursue education and stay organized
    to achieve these goals.
