personas:
  professional: Cathy Burris is a meticulous young builder who spends weekends assembling intricate LEGO sets and model kits, treating each build as a mini engineering project and documenting the steps
    in a bright notebook— their curiosity fuels new designs while their practical, organized approach ensures no step is skipped, positioning them as a budding future architect in the making.
  sports: Cathy Burris trains with the Enid Youth Soccer Club, idolizes the Oklahoma City Thunder for their teamwork, cheers for the Oklahoma State Cowboys during football season, and favors afternoon tag
    games that keep them agile and energized.
  arts: Cathy Burris devotes time to sketching prairie landscapes in pastel, often channeling the impressionistic hues of Claude Monet, while they flip through Nancy Drew mystery books and sing along to
    Taylor Swift's Shake It Off as they build LEGO, blending literary intrigue with musical cheer.
  travel: Cathy Burris looks forward to family road trips, having cherished the bright rides at the Oklahoma State Fair in Oklahoma City and the desert sunsets of Albuquerque, while their wish list includes
    a first‑time visit to Disneyland and a summer camping adventure in the Rocky Mountains, balancing budget constraints with the excitement of new horizons.
  culinary: Cathy Burris loves mixing butter, brown sugar, and chocolate chips to bake chewy cookies, and they've mastered the art of frosting mini vanilla cupcakes with a swirl of strawberry jam, though
    they occasionally forget to set a timer and end up with a slightly over‑browned batch—a sweet quirk that keeps their family laughing.
  core: Cathy Burris blends meticulous curiosity with an organized, kind‑hearted spirit, turning LEGO builds, nature sketches, and modest savings into a playful roadmap toward future creativity, all while
    navigating occasional candy splurges and allergy sneezes with a friendly grin.
background:
  cultural: Cathy grew up in Enid, Oklahoma, a small Midwestern community where family, church, and local traditions are central. Her household celebrates typical American holidays, attends a local Methodist
    church, and participates in community events such as the Garfield County Fair and the Oklahoma State Fair. The values of hard work, politeness, and cooperation are emphasized, and she often hears stories
    about the region’s agricultural roots and the friendly, close‑knit nature of small‑town life.
