  career_goals: Nhut aims to transition from senior technician to shop foreman within the next two years, leveraging his organizational strengths to improve shop productivity and quality control. He plans
    to acquire additional ASE certifications in hybrid and electric vehicle systems, positioning himself for the growing market in Arizona. Long‑term, he dreams of opening his own independent garage that
    emphasizes disciplined service standards and a supportive environment for younger mechanics, providing financial stability for his family while reducing the stress of corporate constraints.
