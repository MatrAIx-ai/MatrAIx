    services (AWS, Azure)"]'
  hobbies: '["Woodworking", "Gardening", "Hiking in the Blue Ridge Mountains", "Reading science‑fiction and historical non‑fiction", "Chess", "Amateur photography", "DIY electronics (Raspberry Pi, Arduino)",
    "Volunteer coding mentor for seniors"]'
  career_goals: Approaching retirement, David aims to transition from full‑time employment to selective consulting, focusing on helping small businesses in rural Virginia modernize their IT infrastructure.
    He is driven to leave a lasting legacy by establishing a community tech mentorship program for seniors and high‑school students, leveraging his competitive spirit to organize coding hackathons that
    foster local talent. David also hopes to author a technical memoir that blends his experiences with practical advice for balancing innovation and reliability, and to develop a niche software product
    that addresses the needs of agricultural cooperatives in the Blue Ridge region, ensuring his work remains impactful yet low‑stress.
