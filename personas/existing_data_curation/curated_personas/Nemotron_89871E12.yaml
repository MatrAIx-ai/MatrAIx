personas:
  professional: Jerry Yu, an 83‑year‑old retired community organizer turned cultural steward, channels his storytelling flair, ukulele enthusiasm, and unwavering calm into designing intergenerational art
    workshops, yet his love of flexibility often turns the program schedule into a fluid, loosely timed jam session.
  sports: Jerry Yu, though past typical athletic prime, cheers enthusiastically for the University of Hawaii Rainbow Warriors basketball team, participates in morning tai chi classes at the senior center,
    and joins the local senior softball club known as the Waipahu Wavebreakers, all while preferring low‑impact movement to protect their joints.
  arts: Jerry Yu is a celebrated ukulele improviser at neighborhood luaus, a dedicated collector of hand‑woven baskets and tapa cloth, a sunrise photographer who captures Makapuʻu’s cliffs, and a fan of
    artists like Israel Kamakawiwo'ole and Herb Kawainui Kane, letting those influences seep into their own storytelling and craft.
  travel: Jerry Yu dreams of revisiting the volcanic landscapes of the Big Island, exploring Fiji’s coral reefs, and strolling through the markets of Tahiti, yet prefers cost‑effective weekend trips to
    nearby nature preserves and cultural festivals, planning each journey loosely around volunteer opportunities.
  culinary: Jerry Yu masterfully prepares kalua pig, lomi lomi salmon, and poi while experimenting with ginger‑infused lomi and soy‑glazed kalua, relishes swapping recipes with fellow seniors, and occasionally
    over‑spices dishes in their eagerness to innovate.
  core: Jerry Yu blends a lifelong love of storytelling, music, and gardening with a delightfully relaxed but occasionally scattered attitude, turning every community gathering into a vibrant, improvisational
    celebration of culture.
background:
  cultural: Jerry was born and raised in Waipahu, a vibrant multi-ethnic community on Oʻahu. He is of Native Hawaiian descent with ancestral links to other Polynesian islands such as Samoa and Tonga, a
    heritage reflected in family stories, chants, and customs. Growing up, he participated in local hālau (hula schools) and learned ʻoli (chant) and mele (song) from elders, immersing himself in the ʻohana
    (family) and community values of aloha and kuleana (responsibility). The cultural mosaic of Waipahu—interwoven with Japanese, Filipino, and other Pacific Islander influences—shaped his worldview, fostering
    both a deep respect for his own Polynesian roots and an openness to diverse artistic expressions.
