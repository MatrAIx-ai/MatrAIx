persona_description: A professional who specializes in DPI, a non-destructive testing method used to detect surface-connected discontinuities such as cracks, fractures, porosity, and flaws in joints. They
  have extensive knowledge and experience in applying DPI to various test components, including dipping, spraying, and brushing, and are proficient in using the method under ultraviolet or white light.
  They are also skilled in interpreting the results of DPI inspections and applying the findings to further inspection or maintenance tasks.
