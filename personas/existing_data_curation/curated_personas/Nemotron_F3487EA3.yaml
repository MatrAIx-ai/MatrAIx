  career_goals: He aims to transition from a senior DBA role to a data architect position where he can shape enterprise‑wide data strategies, integrate advanced analytics, and mentor junior staff. In the
    next five years he hopes to lead a cross‑functional data engineering team, champion cloud‑first migrations, and contribute to open‑source database tooling. Ultimately, he aspires to become a chief data
    officer or launch his own consultancy that helps midsize firms turn their data assets into competitive advantage while fostering a collaborative, people‑first culture.
