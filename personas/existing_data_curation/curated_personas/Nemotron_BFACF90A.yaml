  hobbies: '[''Community soccer league'', ''LEGO building'', ''Minecraft Creative mode'', ''Listening to Colombian music'', ''Dancing cumbia'', ''Helping with cooking (arepas, empanadas)'', ''Reading adventure/fantasy
    books (English & Spanish)'', ''Scratch programming'', ''After‑school tutoring'']'
  career_goals: Jose imagines a future where he can help his community while using his love of clear, step‑by‑step work. He is drawn to careers that combine hands‑on problem solving with dependable schedules.
    Right now he talks about becoming a firefighter because he admires the regular training, teamwork, and the chance to protect people. He also enjoys watching videos about car mechanics and has expressed
    a wish to be an automotive technician, where he could use his skill with tools and following manuals. In school he aims to keep his grades strong in math and science so that he can later enroll in a
    high‑school technology program or a vocational track that leads to engineering or computer programming. Jose’s longer‑term ambition includes possibly studying computer coding, because the logical structure
    of programming appeals to his preference for routine and practicality. He sees himself graduating from a local Miami high school, earning a technical certificate, and then working in a stable, community‑oriented
    job that lets him follow a clear career path.
