personas:
  professional: Jose Coutard, an aspiring junior engineer who avidly builds LEGO sets and Minecraft structures, channels his love for routine and meticulousness into following step‑by‑step instructions,
    while they occasionally worry and double‑check each build, hinting at a future in design or architecture.
  sports: Jose Coutard, a dedicated midfielder for the Little Haiti Soccer Club, trains twice weekly, idolizes Inter Miami CF’s midfielder Gio Giglio, and stays fit by sprint drills and weekend beach volleyball,
    while they cheer on the Miami Heat during the NBA season as a source of motivation.
  arts: Jose Coutard, who spends his evenings listening to cumbia classics by Carlos Vives, vallenato hits from Diomedes Diaz, and the occasional pop track by Shakira, practices simple salsa steps with
    his family, and they delight in creating LEGO stop‑motion videos inspired by the imagination of Pixar’s 'Toy Story' characters, reflecting a vivid blend of musical and visual creativity.
  travel: Jose Coutard, whose family road‑trip blazed a sunny route to the Disney World Resort in Orlando last summer and a summer visit to Cartagena to meet relatives, now they dream of a future school‑organized
    exchange to Tokyo’s Akihabara district, balancing their love for familiar beach sand with a yearning for the bright neon bustle of distant cities.
  culinary: Jose Coutard, who proudly rolls golden arepas and folds crisp empanada dough alongside his mother every Saturday, savors the rich flavors of bandeja paisa when the family gathers for holidays,
    and they delight in munching on pepperoni pizza while sipping mango juice, showcasing a palate that blends savory tradition with kid‑friendly favorites.
  core: Jose Coutard, a ten‑year‑old routine‑loving LEGO aficionado who worries about missing a step, drinks extra water before soccer games, and they secretly record their own Minecraft builds to share
    with friends, lives life with a disciplined yet imaginative flair.
background:
  cultural: 'Jose comes from a Colombian immigrant family that settled in Miami’s Little Haiti‑North Miami area, where Spanish is spoken at home and English is used at school. His parents keep many Colombian
    traditions alive: they celebrate Carnaval de Barranquilla with colorful decorations, prepare holiday meals such as bandeja paisa and natilla, and teach him basic Spanish phrases and folklore. The vibrant
    Latino neighborhood exposes him to a mix of Colombian, Cuban, and Puerto Rican cultures, and he participates in local festivals that feature salsa dancing and street food. At church he joins a youth
    group where he practices his bilingual skills. This blend of Colombian heritage and Miami’s multicultural environment shapes his identity, giving him a strong sense of family, a love for Latin music,
    and pride in being both Colombian and American.'
attributes:
