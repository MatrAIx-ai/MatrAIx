    and mentoring'', ''Time management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading African American literature and philosophy'', ''Listening to jazz, blues, and soul music'', ''Mindfulness meditation'', ''Journaling'', ''Solo
    nature walks and hiking'', ''Urban photography'', ''Solving puzzles and brain teasers'', ''Cooking Southern‑inspired meals'', ''Watching documentaries on history and science'']'
  career_goals: Eric aims to earn an associate‑level certification in office administration within the next year, positioning himself for a senior information coordinator role at his current organization.
    He wants to lead initiatives that modernize filing systems and transition legacy records to digital formats, especially for local cultural institutions. Over the next five years, he hopes to volunteer
    as a digitization specialist for a community museum, merging his receptionist expertise with his passion for art and Black heritage. Ultimately, Eric envisions a transition to a public information officer
    position at a cultural or historical organization, where he can shape public outreach while leveraging his organizational strengths and cultural knowledge.
