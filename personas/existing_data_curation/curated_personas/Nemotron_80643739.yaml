personas:
  professional: Eric Jefferson blends meticulous front‑desk management with a deep curiosity for visual culture, expertly coordinating appointments, maintaining flawless records, and designing informative
    displays while actively pursuing an associate‑level certification to spearhead digitization projects for cultural institutions.
  sports: Eric Jefferson prefers solitary fitness pursuits such as weekly hikes along the Barton Creek Greenbelt, follows the Austin FC soccer team for a communal connection, and they occasionally join
    a local photography club's weekend walks rather than participating in team sports.
  arts: Eric Jefferson spends quiet mornings in art galleries absorbing contemporary installations, captures urban architecture through a vintage Leica, and they unwind to the sounds of John Coltrane, Miles
    Davis, and Aretha Franklin, which shape their reflective creative mindset.
  travel: Eric Jefferson favors low‑key solo trips that blend cultural immersion with natural serenity, having explored the museum district of Washington, D.C., the jazz heritage of New Orleans, and they
    aspire to wander the historic streets of Paris and the coastal cliffs of Cape Town.
  culinary: Eric Jefferson enjoys crafting Southern‑inspired dishes like shrimp and grits, collard greens seasoned with smoked paprika, and sweet potato pie, and they often experiment with buttermilk‑infused
    batters and fresh okra to bring comfort flavors to the table.
  core: Eric Jefferson is a methodical curator of quiet experiences, balancing a keen eye for art and history with an anxious inner world that fuels both disciplined routines and occasional over‑analysis.
background:
  cultural: Eric was raised in a Black family that migrated from the Deep South to Austin in the late 1970s. His parents instilled the values of the Southern Black church, emphasizing community, storytelling,
    and resilience. He grew up attending a historically Black congregation, celebrating Juneteenth, Kwanzaa, and family reunions that emphasized oral history. The vibrant Black cultural scene of Austin—its
    music venues, community centers, and museum initiatives—has shaped his appreciation for African American art, jazz, and soul food. Eric’s identity is informed by a legacy of perseverance and a commitment
    to preserving and sharing Black heritage within the broader Texas context.
attributes:
  skills: '[''Front‑desk management'', ''Customer service'', ''Phone etiquette'', ''Appointment scheduling'', ''Recordkeeping'', ''Data entry'', ''Document digitization'', ''Microsoft Office proficiency'',
