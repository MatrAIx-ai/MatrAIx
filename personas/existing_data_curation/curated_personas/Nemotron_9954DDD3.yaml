personas:
  professional: Rodolfo Santiagomendoza, a retired home‑maintenance specialist with an associate’s degree in Industrial Technology, blends their hands‑on troubleshooting expertise with a compassionate volunteer
    spirit to coordinate senior programs and teach intergenerational workshops on traditional cooking and basic home‑repair, all while their persistent worry drives them to double‑check every detail.
  sports: Rodolfo Santiagomendoza keeps fit by walking along the Sabine River and fishing with the Longview Anglers Club, while cheering on the Texas Rangers, Dallas Cowboys, and Houston Astros, and they
    also attend a senior‑focused Tai Chi class at the community center to maintain flexibility.
  arts: Rodolfo Santiagomendoza immerses themselves in music, ranging from boleros by Armando Manzanero to classic country tunes by Johnny Cash and Patsy Cline, and they regularly sing in the church choir
    and attend community theater productions featuring works by August Wilson.
  travel: Rodolfo Santiagomendoza prefers carefully planned road trips that combine cultural heritage tours of historic Southwestern towns, sunrise hikes in Big Bend National Park, and relaxed weekends
    at family cabins on East Texas lakes, budgeting ahead to secure affordable lodging while still allocating funds for occasional flights to Oaxaca to trace their family’s migration roots.
  culinary: Rodolfo Santiagomendoza, an adept home chef, perfects mole with roasted ancho chilies, chocolate, and a pinch of smoked Texas brisket, crafts tamales using hand‑ground corn masa and heirloom
    tomatoes, and experiments with pozole that blends traditional hominy with local smoked sausage, all while sourcing fresh marigolds and cilantro from their garden to garnish each dish.
  core: Rodolfo Santiagomendoza balances a lifelong curiosity and meticulous practicality with a compassionate heart, a tendency to worry over details, and a love for gardening, cooking, and community service
    that keeps them perpetually busy.
background:
  cultural: Rodolfo was born to Mexican immigrants who settled in East Texas in the 1960s. He grew up in a bilingual household where Spanish was spoken at home and English at school, fostering a strong
    sense of both Mexican heritage and Texan identity. Family gatherings centered around festive foods, Día de los Muertos altars, and Catholic traditions, instilling values of familismo, respect for elders,
    and community solidarity. Throughout his life, he has participated in local Mexican cultural events—parades, tamale fairs, and folkloric dance performances—while also embracing Texas customs such as
    rodeo outings and country music festivals. This blended cultural background informs his compassionate outlook, his desire to preserve Mexican culinary and gardening traditions, and his role as a bridge
    between the older Mexican‑American community and newer residents of Longview.
