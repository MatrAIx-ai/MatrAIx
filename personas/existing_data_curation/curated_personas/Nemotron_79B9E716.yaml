  hobbies: '["Gardening", "Hiking", "Reading historical fiction", "Cooking", "Knitting", "Birdwatching", "Volunteering at community garden", "Painting watercolors", "Bridge (card game)", "Traveling to national
    parks"]'
  career_goals: Patricia aims to deepen her community involvement by completing her college coursework and earning an associate’s degree in nonprofit management. She hopes to serve on the board of a local
    environmental nonprofit, lead a neighborhood garden initiative, and develop a mentorship program for seniors who wish to learn new skills. While she does not seek formal employment, she is driven to
    use her experience to foster collaboration, support lifelong learning, and leave a lasting positive impact on her Wheat Ridge community.
