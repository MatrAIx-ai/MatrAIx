personas:
  professional: Paul Ashmore, a retired small-business strategist, channels his decades of strategic planning and financial analysis into mentoring emerging entrepreneurs and guiding the Pasadena Arts Center
    board toward sustainable growth, while they prefer flexibility over rigid schedules and occasionally let deadlines drift.
  sports: Paul Ashmore follows the Houston Astros, Dallas Cowboys, and Houston Rockets, while they personally play weekly senior golf at the local country club and join a low-impact walking group at the
    community center to keep fit.
  arts: Paul Ashmore, a frequent visitor of Houston’s Museum District, immerses themselves in the works of Georgia O’Keeffe, Andy Warhol, and Texas sculptor James Surls, and evenings often find they listen
    to Willie Nelson while dissecting contemporary art monographs with their book club.
  travel: Paul Ashmore’s travel style blends deliberate planning with spontaneous detours, having toured the Louvre in Paris and the Getty Center in Los Angeles, while they dream of a road trip through
    the Texas Hill Country to photograph bluebonnet fields and historic mission churches in San Antonio.
  culinary: Paul Ashmore enjoys cooking Texas-style smoked brisket, homemade chili with black beans and jalapeños, and fresh garden salads featuring heirloom tomatoes and basil, though they often forget
    to let the meat rest properly and rely on their neighbor’s secret spice rub for the perfect flavor.
  core: Paul Ashmore is a curious, art-loving retiree who blends Southern hospitality with global curiosity, mentors budding entrepreneurs, and balances disciplined financial stewardship with occasional
    indulgent barbecue splurges, while they remain steadfastly optimistic about community growth.
background:
  cultural: Paul was born and raised in a mid-century Texas suburb, growing up in a family that valued hard work, self-reliance, and Southern hospitality. His white, Anglo-American heritage is rooted in
    the broader cultural tapestry of the Gulf Coast region, where community gatherings, church involvement, and regional traditions—such as Texas barbecue and country music—have shaped his worldview. A
    college education broadened his perspective, exposing him to diverse ideas and artistic movements, which he later integrated into his personal life. Today, while he cherishes the modest, down-to-earth
    values of his upbringing, he also embraces a more global, open-minded outlook, especially through his appreciation of visual arts and varied cultural experiences.
