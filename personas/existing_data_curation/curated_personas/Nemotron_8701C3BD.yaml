  career_goals: Sham aims to solidify his position as a trusted front‑desk professional while pursuing a senior administrative role that would allow him to mentor new staff. He plans to obtain a Certified
    Administrative Professional (CAP) credential to enhance his skill set and increase job security. Over the next few years, he hopes to secure a modest promotion to an office manager or lead information
    clerk position, which would provide a reliable income for future retirement, and eventually transition to a part‑time consulting role helping local small businesses organize their front‑office processes.
    He also aspires to contribute more actively to his church’s community outreach programs.
