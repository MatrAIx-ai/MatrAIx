personas:
  professional: Sheila Sappelt, a seasoned muralist and community art coordinator, blends acrylic mastery with meticulous project management, channeling curiosity into bold public installations while maintaining
    the practical discipline of grant writing, budgeting, and stakeholder negotiation, and they reliably meet deadlines with adaptable flexibility.
  sports: Sheila Sappelt, an avid hiker of the Texas Hill Country and yoga enthusiast, joins the Hill Country Hiking Club for seasonal treks, practices yoga three times weekly at a downtown studio, and
    supports the San Antonio Spurs, they balance moderate cardio with mindful flexibility and community camaraderie.
  arts: Sheila Sappelt, a mixed‑media muralist, draws inspiration from Frida Kahlo and Diego Rivera, attends River Walk concerts by Los Lonely Boys, and curates community exhibitions that weave Texan history
    with contemporary visual storytelling, they view art as both personal exploration and public dialogue.
  travel: Sheila Sappelt prefers curated road trips that blend adventure with cultural immersion, having explored Santa Fe’s art scene, trekked the limestone cliffs of Tulum, and yearning to photograph
    the aurora over Iceland, they plan travel using a modest budget earmarked for artistic retreats and occasionally splurge on a weekend workshop in Sedona.
  culinary: Sheila Sappelt, confident in the kitchen, flavors Tex‑Mex dishes with garden‑fresh cilantro, oregano, and roasted poblano peppers, perfecting chiles rellenos, carne asada tacos, and pozole,
    they experiment with homemade salsa verde using epazote from their herb plot, and occasionally over‑season in a playful quest for heat.
  core: Sheila Sappelt is a detail‑oriented muralist who balances artistic curiosity with practical project rigor, fuels creativity with hiking, yoga, and spicy Tex‑Mex cooking, and they meticulously plan
    a future studio while occasionally over‑ordering art supplies.
background:
  cultural: Sheila was raised in a suburban Anglo‑American family with deep Texas roots, experiencing the blend of Southern hospitality and the vibrant multicultural vibe of San Antonio. Her upbringing
    included participation in local traditions such as rodeos, backyard barbecues, and the annual Fiesta, exposing her to Mexican‑American music, dance, and cuisine. This cultural mosaic influences her
    artistic sensibility, embedding practical work ethic with an openness to new ideas, and fostering a community‑oriented outlook that balances personal creativity with collaborative projects.
