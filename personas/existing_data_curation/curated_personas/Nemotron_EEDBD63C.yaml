  hobbies: '[''Hiking'', ''Gardening (herbs and native plants)'', ''Cooking Tex-Mex cuisine'', ''Live music attendance'', ''Reading historical fiction'', ''Yoga'', ''Volunteering at art museums'', ''Photography
    (landscapes, street art)'']'
  career_goals: Sheila aims to expand her impact in San Antonio by securing larger public art commissions and establishing a permanent studio space that also serves as a community hub. She plans to develop
    a series of online art courses that combine her curiosity for new techniques with practical teaching methods. Collaborating with local schools and cultural institutions, she hopes to create interdisciplinary
    art programs that blend visual arts with Texan history. In the longer term, she aspires to publish a coffee‑table book of her mural work and eventually open a small gallery that showcases emerging regional
    artists while providing mentorship and workshop space.
