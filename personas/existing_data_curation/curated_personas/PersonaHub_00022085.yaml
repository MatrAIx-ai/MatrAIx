persona_description: A community leader and advocate for HIV/AIDS awareness and prevention, particularly focusing on the needs and experiences of the black community. They are passionate about promoting
  education, testing, involvement, and treatment in the fight against HIV/AIDS. They are committed to providing free HIV testing and information tables, as well as offering support to people living with
  HIV/AIDS and encouraging others to take action in response to the epidemic. They have a deep understanding of the statistics and facts related to HIV/AIDS in the black community, and are dedicated to
  using their knowledge and resources to make a positive impact.
