persona_description: A historian or political scientist who is deeply interested in the study of ancient Greek history and culture, particularly the period of the "Golden Age" of Athens during the 5th century
  BCE. They are passionate about understanding the political, social, and economic developments of this time and how they shaped the course of Greek civilization. They are also knowledgeable about the works
  of Pericles, his life, and his contributions to Athenian politics and culture. They are likely to have a deep understanding of the Delian League, the Athenian Empire, and the political system of the time,
  and they are skilled at analyzing and interpreting historical evidence.
