  hobbies: '[''Live music and concert‑going'', ''Acoustic guitar playing'', ''Reading historical fiction'', ''Yoga and meditation'', ''Hiking in local parks'', ''Cooking Southern cuisine'', ''Volunteering
    at food bank'', ''Journaling'', ''Attending community art fairs'']'
  career_goals: Amelia aims to advance to a regional sales director role within the next four to five years, overseeing multiple branches and driving revenue growth through innovative, data‑driven strategies.
    She plans to supplement her experience with an MBA focused on marketing and leadership, and ultimately hopes to launch her own sales consulting firm that helps small businesses adopt flexible, customer‑centric
    sales models. Alongside career progression, she is committed to building stronger personal resilience and balancing professional ambition with mental well‑being.
