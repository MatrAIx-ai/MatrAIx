personas:
  professional: Amelia Jennings is a sales manager in Nashville who leverages her curiosity‑driven love of emerging tech and practical data‑analysis skills to coach a close‑knit team, negotiate with clients,
    and craft persuasive presentations, while balancing a flexible, sometimes disorganized approach to meeting deadlines as she eyes a regional director role.
  sports: Amelia Jennings enjoys weekend hikes on Cheatham County’s Greenway trail and practices yoga at a local studio, roots for the Tennessee Titans and the Nashville Predators, and belongs to a casual
    hiking club that meets monthly, preferring low‑impact fitness that aligns with her flexible schedule.
  arts: Amelia Jennings immerses herself in Nashville’s music scene, regularly attending shows by artists like Jason Isbell, Phoebe Bridgers, and local indie bands, while also finding inspiration at community
    art fairs featuring painters such as Ellie Mae, and reads historical fiction by Hilary Mantel and philosophy by Nietzsche to fuel her creative reflections.
  travel: Amelia Jennings favors spontaneous road trips to nearby destinations like the Great Smoky Mountains and New Orleans for music‑filled evenings, but plans occasional longer getaways to Dublin and
    Austin, balancing a modest travel budget with a desire for both adventure and cultural immersion.
  culinary: Amelia Jennings loves cooking Southern comfort dishes—perfecting chicken fried steak, biscuits and gravy, and shrimp and grits—using fresh farmers‑market ingredients like collard greens and
    smoked paprika, though she sometimes burns the gravy when juggling a work call.
  core: Amelia Jennings is a curiosity‑driven sales strategist with a heart for community, an anxious mind that seeks calm in music and yoga, and a habit of impulsive spending that clashes with her occasional
    disorganization.
background:
  cultural: Amelia grew up in a middle‑class white family in the South, embodying the traditional hospitality and community values of Cheatham County, Tennessee. Her upbringing blended church involvement,
    neighborly support, and a love for country music and storytelling. Attending a liberal arts college broadened her perspective, fostering an appreciation for diverse literary and artistic traditions.
    Relocating to Nashville deepened her connection to the city's dynamic music and creative scene, while she continues to honor the modest, neighborly ethos of her small‑town roots.
