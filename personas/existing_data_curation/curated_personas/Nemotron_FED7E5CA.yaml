personas:
  professional: An enthusiastic junior robotics enthusiast, Gary Gooch channels curiosity and methodical planning into designing and programming small robots for the after‑school club, often taking the
    lead in group projects while thriving on the attention of peers.
  sports: An energetic youth soccer player, Gary Gooch captains the Ukiah United U‑9 squad, balances weekly practices with weekend hikes in the redwoods, and passionately follows the San Francisco 49ers
    while never missing a chance to show off his goal‑celebration dance.
  arts: Gary Gooch, a budding comic‑style illustrator and sci‑fi aficionado, spends free moments sketching adventures inspired by Stan Lee, replicating Minecraft landscapes on paper, and swapping favorite
    episodes of “Adventure Time” with friends.
  travel: A nature‑curious explorer, Gary Gooch enjoys weekend trips to Redwood State Park and has already visited the Monterey Bay Aquarium, dreaming of future family adventures to Yosemite and a road‑trip
    along the Pacific Coast Highway.
  culinary: Gary Gooch delights in crafting easy‑hand meals like mac and cheese with a sprinkle of locally sourced cheddar, whipping up strawberry‑banana smoothies with fresh berries from the farmer’s market,
    yet often leaves a trail of cereal crumbs during marathon Minecraft sessions.
  core: Gary Gooch blends a love for building robots, leading soccer games, and sketching comics with an organized, talkative spirit that makes every school day feel like a collaborative adventure, even
    if the occasional cereal spill reminds him to clean up.
background:
  cultural: Gary grew up in Ukiah, a small town in Mendocino County known for its vineyards, redwood forests, and close-knit community events. His family is of white American heritage, with roots in the
    Pacific Northwest and California farming regions. The area's emphasis on nature, outdoor activities, and community gatherings has shaped his love for the environment, teamwork, and local traditions,
    while the broader Californian culture has introduced him to diverse ideas and a progressive outlook on education and technology.
