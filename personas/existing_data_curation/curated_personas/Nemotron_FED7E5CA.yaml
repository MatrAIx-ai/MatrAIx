  career_goals: Gary dreams of becoming an engineer who designs eco-friendly inventions, such as renewable-energy gadgets or sustainable community projects. He also imagines helping his town as a future
    community leader or science teacher, hoping to inspire other kids to explore and protect the natural environment around Ukiah.
