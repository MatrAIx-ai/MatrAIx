  career_goals: Dario aspires to graduate high school and pursue a career that blends his passion for helping others with his love of communication and community. He hopes to study psychology or social
    work at a community college, eventually becoming a youth counselor or bilingual mental‑health advocate who can support Latino teens dealing with anxiety and emotional challenges. He also dreams of using
    his media skills to produce a bilingual YouTube channel that raises awareness about mental‑health resources and celebrates Mexican‑American culture. In the longer term, he envisions leading community
    outreach programs in San Bernardino County that empower at‑risk youth through mentorship and culturally relevant workshops.
