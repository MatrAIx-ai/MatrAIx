  career_goals: Michael aims to advance from a mid-level graphic designer to a senior designer within the next three years, focusing on expanding his expertise in user experience and interactive media.
    He plans to earn a professional certification in UX design and build a robust portfolio that showcases both commercial and socially-conscious projects. In the longer term, Michael aspires to become
    an art director, leading multidisciplinary creative teams and shaping brand identities for tech startups and sustainability-focused organizations. He also envisions launching a boutique design studio
    that offers integrated branding, digital, and community mural services, allowing him to merge his practical design skills with his desire for collaborative, impact-driven work.
