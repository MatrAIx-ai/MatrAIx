personas:
  professional: Richard Tebben, a seasoned community college educator, blends curiosity with practicality by designing data‑driven STEM curricula that honor academic standards while integrating emerging
    industry tools, and leverages their disciplined, competitive nature to mentor faculty and spearhead grant‑winning projects toward a future Department Chair role.
  sports: Richard Tebben competes in a co‑ed volleyball league with the Minneapolis Mavericks, cycles the Grand Rounds trail network on weekends, and hikes the North Shore’s Gooseberry Falls, proudly wearing
    the Vikings navy and gold while occasionally cheering for the Minnesota Timberwolves during off‑season tournaments.
  arts: Richard Tebben contributes to a community theater troupe staging classic plays like Arthur Miller’s 'Death of a Salesperson', enjoys live jazz at local clubs featuring artists such as Wynton Marsalis,
    and draws inspiration from Ansel Adams’ black‑and‑white landscapes for personal photography projects.
  travel: Richard Tebben favors road‑trip explorations, having cycled the historic Route 66 segment in Arizona, trekked the Canadian Rockies, and toured European World War II museums in Normandy, while
    planning future visits to Iceland’s volcanic terrain to combine hiking, photography, and local craft‑brew experiences.
  culinary: Richard Tebben displays an intermediate culinary skill set, often grilling locally sourced salmon with dill sauce, cooking hearty bratwurst casseroles, and crafting sourdough bread, while savoring
    craft beers such as Surly’s Furious and Allagash White, and occasionally experimenting with smoked cheese boards.
  core: Richard Tebben is a disciplined, competitive educator who channels curiosity into innovative curricula, while juggling vibrant community activities, strategic finance habits, proactive health monitoring,
    and a zest for outdoor adventure and craft‑beer culture.
background:
  cultural: Richard grew up in the heart of the Upper Midwest, raised in a family of German-Scandinavian heritage that emphasized hard work, modesty, and community involvement. The regional "Minnesota Nice"
    ethic shaped his sociable and outgoing demeanor, while the practical, no-nonsense approach of Midwestern culture reinforced his organized, achievement-driven mindset. Lutheran traditions from his upbringing
    informed his personal ethics and sense of service, and local festivals like Scandinavia Fest and the State Fair deepened his appreciation for the area's cultural tapestry. This blend of cultural influences
    underpins his pragmatic curiosity, competitive nature, and commitment to both personal growth and community enrichment.
