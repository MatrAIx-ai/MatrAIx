  hobbies: '[''Volleyball League'', ''Cycling'', ''Hiking'', ''Photography'', ''Woodworking'', ''Community Theater'', ''Board Games'', ''Adult Literacy Volunteering'', ''Craft Beer Tasting'', ''Reading
    Historical Biographies'']'
  career_goals: Richard aims to advance to a Department Chair or Program Director role within his college, where he can lead a strategic overhaul of vocational and STEM curricula to better align with regional
    workforce needs. He seeks to secure grant funding for community-embedded learning projects and to spearhead interdisciplinary collaborations between academia and local industry partners. A further ambition
    is to become a recognized speaker at state and national education conferences, sharing his pragmatic yet forward-thinking teaching models, while continuing to mentor emerging educators and foster a
    high-performance teaching culture.
