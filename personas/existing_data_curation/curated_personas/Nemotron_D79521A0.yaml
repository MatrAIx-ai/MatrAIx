  hobbies: '["Woodworking","Classic car restoration","Scale model building","Gardening","Cooking Mexican cuisine","Reading technical manuals","DIY home improvement","Watching engineering documentaries","Volunteering
    at Habitat for Humanity (tool workshops)","Listening to traditional Mexican music"]'
  career_goals: He aims to secure a stable, upward‑trajectory career while maintaining a predictable schedule that supports his family life. In the next 2‑3 years he plans to obtain a GED and a certified
    welding credential (AWS Certified Welder) to broaden his technical qualifications. He aspires to become a lead assembler or shift supervisor, overseeing a small team, improving workflow efficiency through
    lean practices, and ensuring consistent product quality. Long‑term, Anthony envisions starting a modest side business offering custom metal‑fabrication and repair services to local residents, leveraging
    his meticulous skill set and community‑oriented values.
