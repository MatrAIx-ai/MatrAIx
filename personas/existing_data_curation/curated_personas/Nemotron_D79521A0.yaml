personas:
  professional: A meticulous assembler/fabricator in Houston's manufacturing sector, Anthony Hernandez leverages his blueprint-reading expertise, CNC and welding skills, and methodical approach to lead
    process improvements while they mentor new hires with quiet composure.
  sports: Anthony Hernandez enjoys watching the Houston Astros, Rockets, and Texans on game nights, participates in a community softball league on Saturdays, and they also maintain personal fitness through
    early-morning bike rides along the Buffalo Bayou and occasional autocross events with their classic car.
  arts: Anthony Hernandez immerses themselves in traditional folk music, often playing corridos and norteña tunes while they work on woodworking projects, and they regularly attend local cultural festivals
    featuring dance troupes and artisanal crafts, drawing artistic inspiration from performers like Lila Downs and actor Edward James Olmos.
  travel: Anthony Hernandez plans purposeful road trips that combine annual family reunions in Veracruz, Mexico with weekend escapes to Austin's live-music districts and yearly hikes in West Texas's Hill
    Country, while they prefer staying at modest B&Bs to keep expenses predictable.
  culinary: Anthony Hernandez excels at preparing tamales, carne asada, and homemade salsa using fresh chilies, tomatillos, and masa harina, and they treat each meal as a hands-on project, often experimenting
    with flavors while balancing the budget by growing tomatoes and peppers in their garden.
  core: Anthony Hernandez blends a methodical, solitary work ethic with deep community compassion, routinely listening to corridos while welding, meticulously tracking tool inventories, and occasionally
    indulging in late-night documentary marathons that delay bedtime.
background:
  cultural: 'Anthony is a second‑generation Mexican‑American who grew up in the vibrant, multicultural neighborhoods of Houston’s East End. He is bilingual in Spanish and English, and his family maintains
    many Mexican traditions: celebrating Día de los Muertos with altars at home, preparing tamales during Christmas, and attending local fiestas. Catholic values and a strong sense of family solidarity
    shape his worldview. He stays connected to relatives in Mexico through regular video calls and occasionally visits his parents’ hometown. In Houston, he participates in community events such as the
    annual Mexican Festival, enjoys Tex‑Mex cuisine, and integrates the work ethic of his heritage with the city’s industrial opportunities.'
attributes:
