  hobbies: '[''Bollywood dancing'', ''Contemporary dance'', ''Group sports (basketball, soccer)'', ''Hiking'', ''Cooking South Asian cuisine'', ''Reading YA fiction'', ''Educational tech podcasts'', ''Volunteering
    at cultural festivals'', ''Organizing social gatherings'']'
  career_goals: Saadia aims to pursue a bachelor’s degree in Early Childhood Education and later a master’s in Educational Administration. She envisions becoming a licensed preschool director who integrates
    innovative, tech‑enhanced learning tools while honoring proven developmental frameworks. Long‑term, she hopes to launch a community‑focused learning center in DeKalb County that offers bilingual programs
    and cultural enrichment for South Asian families, combining her competitive drive to lead an impactful organization with her curiosity for new pedagogical approaches.
