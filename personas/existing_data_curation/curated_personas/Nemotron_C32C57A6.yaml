  career_goals: Although retired, Anna’s personal ambitions focus on health, independence, and legacy. She aims to stay physically active through daily walks and gardening, maintain cognitive sharpness
    by learning new features on her tablet, and complete a memoir that documents her family’s story and the early history of Casper, Wyoming. She wishes to pass her crafts—especially crocheting and quilting—to
    her grandchildren, create a family recipe book, and continue volunteering at the local church and senior center, particularly by helping organize community heritage projects.
