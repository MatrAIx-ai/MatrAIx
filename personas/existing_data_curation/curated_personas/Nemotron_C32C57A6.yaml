personas:
  professional: Anna Bowman, a retired community organizer and home economist, channels decades of gardening, sewing, budgeting, and first‑aid experience into orchestrating church potlucks, senior‑center
    heritage projects, and intergenerational skill‑sharing workshops, all while mentoring grandchildren in practical life skills.
  sports: Anna Bowman, a regular member of the Casper Senior Walkers Club, maintains fitness through daily nature walks, weekly bowling sessions with the senior center league, and seasonal bird‑watching
    hikes, while cheering on the Wyoming Cowboys football team each fall and occasionally joining a community softball game organized for retirees.
  arts: Anna Bowman, an avid crocheter and quilter who devotes afternoons to stitching blankets inspired by the patterns of Grandma Moses, delights in historical fiction by Ken Follett and the folk melodies
    of Joan Baez, frequently attends performances at the Casper Center for the Arts, and keeps a small gallery of reproductions by Grant Wood and Andrew Wyeth in her living room.
  travel: Anna Bowman prefers low‑key, leisurely trips, such as a spring day pilgrimage to the historic Fort Laramie, an autumnal drive through Yellowstone and Grand Teton national parks, a summer weekend
    visit to her daughter in Denver, and occasional family cruises to Alaska, all planned around her garden schedule and modest travel budget.
  culinary: Anna Bowman, a competent home cook who savors making chicken pot pie, cornbread, and her signature garden stew thickened with heirloom tomatoes, fresh basil, and sage, bakes flaky apple pie
    using Granny Smith apples from the farmer’s market, and meticulously cans her summer harvest into jars of salsa and pickled beans, though she occasionally forgets to set the timer and ends up with over‑crisped
    biscuits.
  core: Anna Bowman, a meticulous gardener, quilter, and community storyteller, blends curiosity with practicality, cherishes preserving her family’s legacy through crafts and memoirs, and never skips a
    daily walk—even if it means pausing to chase a bright cardinal.
background:
  cultural: Anna comes from a multi‑generational white American family that settled in Wyoming during the early 1900s. Raised in Casper throughout the Great Depression and World War II, she internalized
    values of thrift, self‑reliance, and community cooperation. Her cultural roots are steeped in Protestant (Methodist) traditions, frontier hospitality, and a strong connection to the outdoors—reflected
    in her love of gardening, wildlife observation, and participation in local fairs. These influences, combined with a lifelong curiosity and practical mindset, shape her daily life and interactions.
