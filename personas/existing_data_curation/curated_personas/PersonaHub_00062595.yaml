persona_description: A Tolkien scholar who is interested in the interplay between the oral and literate modes of social and cultural interaction in Middle-earth, particularly in the culture of the Elves
  and the various elvish tribes. This individual is familiar with the methodologies developed within the oral-formulaic theory in medieval studies and has a keen interest in the analysis of the characters
  and races created by J.R.R. Tolkien for The Lord of the Rings. This person is also knowledgeable about the ideas for many of the characters and races in The Lord of the Rings being traced back to specific,
  mostly medieval, literary genres. Additionally, this individual is interested in the analysis of the figure of the queen, especially in the context of the fertility myth, for the overall pattern and meaning
  of Tolkien's literary output based on the relevant epic topoi including the omphalic space and heroic intrusion.
