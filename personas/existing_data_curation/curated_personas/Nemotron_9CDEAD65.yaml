personas:
  professional: Suzette Denton, a 67‑year‑old retired liberal‑arts scholar turned community art curator, blends her watercolor and mixed‑media mastery with a deep knowledge of 20th‑century American art
    to organize modest exhibitions, run intergenerational workshops, and manage volunteer budgets with a calm, detail‑oriented style.
  sports: Suzette Denton, a fan of the local Crestview Oaks baseball team, enjoys leisurely walks on the nature trail that double as bird‑watching excursions, participates in a weekly senior Tai Chi class
    at the community center, and occasionally joins a gentle gardening‑fit club that emphasizes low‑impact stretching.
  arts: Suzette Denton finds solace in painting sunrise over pine‑flat horizons, draws inspiration from the works of Georgia O'Keeffe, Claude Monet, and contemporary poet Mary Oliver, and frequently attends
    intimate jazz evenings featuring local pianist Elise Harper at the Crestview Coffee House, all while curating a personal blog that showcases vintage postcard collections of historic American art exhibitions.
  travel: Suzette Denton carefully plans travel around art‑centric events, having recently visited the Virginia Museum of Fine Arts for its 20th‑century American art exhibit, planning a future trip to the
    Musée d'Orsay in Paris to study Impressionist landscapes, and dreaming of a weekend pilgrimage to the Florence Biennale, all while balancing a modest travel budget and a desire for low‑stimulus environments.
  culinary: Suzette Denton delights in cooking simple yet flavorful dishes such as roasted beet and goat‑cheese salad, heirloom tomato gazpacho, and a buttery herb‑infused quinoa pilaf, often using fresh
    vegetables from their garden and occasionally treating themselves to a vintage wine from the 2008 Napa Valley harvest.
  core: Suzette Denton is a quietly curious 67‑year‑old artist‑curator who balances disciplined garden routines with spontaneous watercolor sessions, prefers solitary reflection over bustling social scenes,
    and maintains a modest, well‑planned life anchored in art, nature, and gentle self‑care.
background:
  cultural: Suzette was raised in the Deep South during the 1950s and 1960s, growing up in a modest, middle‑class white family that valued community, hospitality, and perseverance. Her upbringing was steeped
    in Southern traditions of storytelling, church‑centered gatherings, and a respect for the natural landscape of the Gulf Coast. While she pursued some college coursework in liberal arts—focusing on English
    literature and art history—her education was complemented by the rich cultural tapestry of nearby Tallahassee’s art scene and local folk traditions. This blend of Southern sensibility and a lifelong
    curiosity for new ideas has shaped her gentle, considerate demeanor and her openness to unconventional artistic expressions. Today, residing in Crestview, Florida, she remains connected to the region’s
    quiet, rural charm while engaging with broader artistic currents through travel, online communities, and volunteer work.
attributes:
  skills: '["Watercolor painting", "Mixed‑media art", "American art history knowledge", "Community art workshop coordination", "Volunteer program management", "Creative writing and journaling", "Digital
