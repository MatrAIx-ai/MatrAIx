personas:
  professional: Justin Gilbert is a seasoned heavy‑vehicle and mobile equipment technician in his mid‑twenties, proficient in diesel engine diagnostics, hydraulic and pneumatic systems, welding, and custom
    retrofits; they channel their curiosity and competitive spirit into inventive solutions, even as they resist rigid schedules and occasionally let deadlines slip.
  sports: Justin Gilbert fuels their competitive drive on the weekend off‑road racing circuit with the Peculiar Trail Blazers club, enjoys fishing on Table Rock Lake and hiking the Ozark trails, and they
    rally behind the Kansas City Chiefs and St. Louis Cardinals from the comfort of their modest living room.
  arts: Justin Gilbert blends their love of mechanics with modern art, frequenting the Columbia Museum of Art to admire Basquiat and listening to Sturgill Simpson’s country storytelling, while they channel
    this inspiration into hand‑painted kinetic sculptures that echo the bold colors of street‑artist Shepard Fairey.
  travel: Justin Gilbert prefers spontaneous, self‑guided road trips that combine off‑road adventure with scenic photography, often exploring the Badlands and the Ozarks, and they dream of driving an electric‑converted
    Jeep through Iceland’s volcanic landscapes once their boutique repair venture stabilizes financially.
  culinary: Justin Gilbert enjoys hearty Midwestern barbecue, regularly grilling smoked pork ribs seasoned with honey‑chipotle glaze and serving cornbread with jalapeño butter, and they are a competent
    home cook who confidently seasons dishes with smoked paprika, garlic, and fresh herbs from a small windowsill garden.
  core: Justin Gilbert is a curious, solitary mechanic who transforms diesel engines into kinetic art, thrives on competition, but they habitually procrastinate on paperwork and forget dental appointments,
    all while maintaining an unusually calm demeanor.
background:
  cultural: Justin grew up in Peculiar, a small town in Cass County, Missouri, where Midwestern values of hard work, practical problem-solving, and community self-reliance are prominent. His family background
    is rooted in the region's working-class tradition, with generations of auto-repair and farm equipment technicians. While the local culture emphasizes modesty, country music, and small-town celebrations,
    Justin's curiosity led him to seek out broader artistic and technological influences through regional museums, university extension courses, and online forums. This blend of Midwestern pragmatism and
    an appetite for unconventional ideas shapes his worldview, giving him a grounded yet open-minded perspective.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Hydraulic and pneumatic system repair'', ''Preventive maintenance scheduling'', ''Technical schematic interpretation'', ''Welding and metal fabrication'', ''Custom
    equipment retrofitting'', ''Diagnostic software utilization'', ''Equipment performance evaluation'']'
  hobbies: '[''Scale model building'', ''Vintage motorcycle restoration'', ''Visiting art galleries'', ''Photographing landscapes'', ''Hiking and fishing'', ''Maker-space kinetic sculpture projects'', ''Off-road
    driving club'']'
  career_goals: Justin aims to earn advanced certifications such as the ASE Master Technician and the CMA (Certified Mobile Equipment Technician) within the next two years, positioning himself as a leading
    expert in heavy-equipment repair in the Midwest. He aspires to transition into a lead-technician role where he can mentor a small, tight-knit crew while maintaining the autonomy he values. Long-term,
    he dreams of launching his own boutique mobile repair service that specializes in innovative retrofits—particularly electric-drive conversions and artistic customizations—for construction firms and
    local artists. He also hopes to stay at the forefront of emerging heavy-equipment technologies, attending industry expos and collaborating on experimental projects that blend mechanics with contemporary
    art.
