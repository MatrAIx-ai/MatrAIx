personas:
  professional: Katherine Lanier, an aspiring young visual artist and imaginative LEGO storyteller, channels her curiosity into vibrant nature paintings and intricate brick constructions, balancing a love
    for spontaneous creativity with occasional disorganization in her art projects.
  sports: Katherine Lanier plays forward for the Pleasant Ridge Youth Soccer Club, cheers for the Detroit City FC and the U.S. Women's National Team during game nights, and enjoys seasonal ice skating at
    the local rink, mixing energetic group play with a competitive spirit.
  arts: Katherine Lanier devotes afternoons to drawing woodland scenes inspired by Claude Monet's water lilies and painting fantastical creatures after listening to Taylor Swift's pop hits, attends community
    art workshops at the Pleasant Ridge Community Center where they explore mixed-media techniques, and gets lost in picture-book adventures by Beatrix Potter and the Magic Tree House series.
  travel: Katherine Lanier has roamed the historic streets of Detroit's Eastern Market during the Fourth of July fair, trekked the sand dunes of Sleeping Bear Dunes State Park on a family road trip, visited
    Mackinac Island's car-free charm, and dreams of exploring Disney World in Orlando and the Grand Canyon's rim, favoring hands-on nature experiences over long flights.
  culinary: Katherine Lanier loves homemade macaroni and cheese sprinkled with cheddar, pizza with pepperoni and a side of carrot sticks, and Saturday morning blueberry pancakes drizzled with maple syrup,
    often helping stir batter and sprinkle fresh strawberries while preferring simple, familiar flavors over exotic dishes.
  core: Katherine Lanier, a curious 7-year-old with boundless imagination, blends art, LEGO and soccer into a lively, slightly disorganized routine, often worrying about missing a masterpiece or a goal.
background:
  cultural: Katherine lives in Pleasant Ridge, a suburban community in Oakland County, Michigan. Her family, of European descent, celebrates typical American holidays such as Thanksgiving, Christmas, and
    the Fourth of July with community gatherings and family traditions. She attends a local public elementary school where multicultural celebrations, library programs, and community art classes are part
    of the curriculum. The Midwestern emphasis on community involvement, access to public parks, libraries, and nearby museums, as well as participation in neighborhood events, nurtures her appreciation
    for art, nature, and social interaction.
