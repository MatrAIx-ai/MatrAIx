  hobbies: '[''drawing'', ''watercolor painting'', ''LEGO building'', ''reading'', ''soccer'', ''group games'', ''after‑school art workshops'', ''library storytime'', ''nature walks'', ''dancing'']'
  career_goals: Katherine dreams of becoming an artist who can bring her imaginative worlds to life, perhaps as an illustrator of children’s books or as a museum guide where she can share her love of art.
    She also imagines caring for animals as a veterinarian, combining her compassion with scientific curiosity. She hopes her future work will allow her to stay creative, interact with others, and have
    the flexibility to explore new ideas without strict schedules.
