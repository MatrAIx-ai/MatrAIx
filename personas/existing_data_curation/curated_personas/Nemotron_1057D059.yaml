personas:
  professional: Monique Stevens, a 38-year-old aspiring Certified Nursing Assistant, blends part-time home-health work with a fledgling home-based catering service that delivers classic Southern comfort
    dishes, using their routine-driven cooking, gardening, and sewing skills to provide reliable, one-on-one care despite occasional disorganization.
  sports: Monique Stevens enjoys low-impact exercise, primarily walking the Cotton Belt Trail and occasional gentle yoga at the community center, is a faithful fan of the Dallas Cowboys football team, and
    volunteers as a scorekeeper for the local women's softball league, preferring solitary activity over competitive sports.
  arts: Monique Stevens frequently listens to gospel legends like Mahalia Jackson and soul icons such as Aretha Franklin, watches classic films like Gone with the Wind and Casablanca on Saturday evenings,
    and finds solace knitting while humming hymns, integrating these artistic comforts into their quiet routine.
  travel: Monique Stevens prefers solo road trips that blend nature and heritage, has explored the historic streets of Savannah, Georgia, dreams of a quiet cabin stay in the Great Smoky Mountains, and carefully
    budgets each journey to avoid overspending, often planning trips around church holidays for extra savings.
  culinary: Monique Stevens excels at cooking hearty Southern dishes such as fried catfish, collard greens simmered with smoked turkey, and sweet potato pie, spices their recipes with fresh garden herbs
    like thyme and sage, and enjoys baking cornbread and peach cobbler for family gatherings, though they sometimes over-salt dishes when distracted.
  core: Monique Stevens balances a love for routine and solitude with a quiet entrepreneurial spirit, channeling their garden’s cycles into culinary creations while occasionally misplacing grocery lists
    and forgetting appointments.
background:
  cultural: Monique is a 38‑year‑old Black woman raised in the historically Black neighborhoods of Waco, Texas. Her upbringing was deeply rooted in Southern Black culture, with strong ties to the local
    Baptist church, family gatherings centered around soul food, and community events such as Juneteenth celebrations. She grew up hearing oral histories from elders, learning traditional recipes, and participating
    in church choir rehearsals. The blend of Texas hospitality and African‑American resilience has shaped her values of practicality, community support, and self‑reliance. Though she lives alone, she maintains
    close connections with her extended family and church community, preserving the cultural traditions passed down through generations.
