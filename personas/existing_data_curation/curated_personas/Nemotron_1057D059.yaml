  hobbies: '[''Gardening'', ''Baking and cooking traditional Southern dishes'', ''Knitting and crocheting'', ''Reading historical novels'', ''Walking in local parks'', ''Listening to gospel and soul music'',
    ''Watching classic movies'', ''Birdwatching'']'
  career_goals: Monique hopes to turn her practical abilities into a modest source of income. She plans to complete a Certified Nursing Assistant (CNA) program at a local community college, which would
    allow her to work part‑time in home health care—an environment that values routine and one‑on‑one interaction. Simultaneously, she dreams of launching a small home‑based catering service that specializes
    in soul food and Southern baked goods, providing her flexibility to work from home and maintain her preferred solitary schedule. Long‑term, she aims to achieve financial stability enough to purchase
    a modest house in a quiet neighborhood of Waco.
