  hobbies: '[''watercolor painting'', ''visiting museums'', ''reading biographies'', ''herb gardening'', ''calligraphy'', ''jigsaw puzzles'', ''genealogy research'', ''docent volunteering'', ''live jazz'',
    ''walking along the Missouri River'']'
  career_goals: Although retired, Lisa aims to complete a three‑volume memoir that intertwines her personal narrative with the history of St. Charles, and to publish it through a small press. She plans
    to launch a digital archive of photographs and oral histories of long‑time residents, securing a modest grant to sustain the project. Additionally, she hopes to establish a community art workshop that
    offers free classes in watercolor and calligraphy for seniors, solidifying her legacy as a cultural mentor in the region.
