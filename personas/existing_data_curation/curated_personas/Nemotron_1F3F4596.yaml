  hobbies: '[''Woodworking'',''Fishing'',''Classic car restoration'',''Gardening'',''Model train building'',''Reading non-fiction (history and engineering)'',''DIY home repairs'']'
  career_goals: Kenneth wants to solidify his reputation as a reliability champion in his plant and, within the next three to five years, move into a plant-manager role where he can shape broader operational
    strategy. He aims to earn his Six Sigma Green Belt certification, lead a cross-functional continuous-improvement project, and eventually transition into a consulting role that helps smaller Midwestern
    manufacturers adopt lean practices, allowing him a more predictable schedule as he approaches retirement.
