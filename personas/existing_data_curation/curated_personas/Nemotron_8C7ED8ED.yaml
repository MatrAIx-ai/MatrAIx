personas:
  professional: Kevin Felker is a 39‑year‑old construction veteran who blends 15 years of framing, concrete formwork, and finish carpentry expertise with a meticulous, solitary work ethic, using his curiosity
    for green building technologies to drive detailed documentation and quality‑control as he pushes toward a Certified Construction Manager credential and a site‑supervisor role focused on energy‑efficient
    homes.
  sports: Kevin Felker channels his affinity for the outdoors into regular hikes across the Sierra foothills, supplements the activity with a modest cardio routine, cheers on the Sacramento Kings (NBA)
    and the San Francisco 49ers (NFL), and participates in the Lodoga Trail Runners club for occasional group runs, favoring low‑impact fitness that aligns with his methodical and solitary disposition.
  arts: Kevin Felker expresses his creative side through meticulous scale‑model construction of Frank Lloyd Wright houses, captures textures in nature inspired by Ansel Adams photography, and unwinds listening
    to Joni Mitchell’s album Blue and the folk‑rock sounds of The Avett Brothers, while occasionally attending local craft fairs that showcase artisanship.
  travel: Kevin Felker prefers meticulously planned, low‑key travel that balances adventure with solitude, favoring off‑season visits to destinations like Yosemite National Park, the rugged coast of New Zealand’s
    South Island, and the vineyards of Tuscany, where he can hike, photograph natural textures, and savor quiet evenings, all while budgeting carefully to fund his future contracting venture.
  culinary: Kevin Felker enjoys cooking with a moderate skill level, often preparing herb‑infused tomato sauces with basil and oregano from his garden, grilling rosemary‑seasoned chicken or salmon, and
    savoring dishes like chicken piccata and roasted vegetable medleys, while occasionally treating himself to a craft‑brew tasting of a local IPA and a slice of sourdough bread.
  core: Kevin Felker is a methodical, solitary builder who balances a love for green construction with a habit of obsessively cataloguing his model‑house projects, occasionally neglecting social outings
    in favor of quiet hikes and meticulous budgeting, all while secretly binge‑listening to vintage tool restoration podcasts.
background:
  cultural: Kevin grew up in a middle‑class white working‑class family in suburban California, where the value of hard work, self‑reliance, and community service were emphasized. His upbringing blended
    the pragmatic Mid‑western work ethic of his grandparents with the outdoors‑oriented lifestyle of Northern California. He is familiar with the local traditions of Saturday farmers’ markets, volunteer
    fire‑department events, and the regional pride in preserving the Sierra foothill environment. This cultural mix informs his practical mindset, his appreciation for quiet, and his drive to contribute
    responsibly to his community.
attributes:
  skills: '[''Framing'', ''Concrete Formwork'', ''Drywall Installation'', ''Finish Carpentry'', ''Blueprint Reading'', ''Material Estimating'', ''Project Scheduling'', ''OSHA Safety Compliance'', ''Heavy
    Equipment Operation'', ''Tool Maintenance'', ''Quality Control Inspection'', ''Construction Management'']'
  hobbies: '[''Scale Model Building'', ''Hand‑Tool Restoration'', ''Hiking'', ''Nature Photography'', ''Reading Technical Journals'', ''Podcasts on Construction Technology'', ''Urban Gardening'', ''Amateur
    Photography of Construction Projects'']'
  career_goals: Kevin aims to transition from laborer to site supervisor within the next three years, leveraging his associate degree to obtain a Certified Construction Manager (CCM) credential. He plans
    to specialize in sustainable building practices, such as installing low‑impact insulation and solar‑ready roofing, and eventually launch his own small‑scale general contracting firm focused on energy‑efficient
    homes in the Placer County area. He also hopes to mentor apprentices, sharing his methodical approach and commitment to safety.
