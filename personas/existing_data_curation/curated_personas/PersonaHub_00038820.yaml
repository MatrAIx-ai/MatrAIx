persona_description: A scientist or researcher who specializes in the development and application of advanced robotics technology in medical research, particularly in the field of mental health. They are
  interested in creating models of psychological conditions and testing new drugs on them. They are skilled in the development of robots and have experience in the field of neuroscience and psychology.
  They are looking for ways to improve the current methods of inducing depression and are interested in the latest research on the use of animal models in human conditions. They are eager to test their
  new model of depression against more conventional systems and are open to new ideas and approaches.
