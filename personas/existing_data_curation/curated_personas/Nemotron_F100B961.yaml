personas:
  professional: Asher Wallace is an aspiring HVAC technician who leverages his hands‑on woodworking, basic automotive repair, and meticulous organizational skills to excel in school projects and volunteer
    event coordination, and their need for predictability drives them to master step‑by‑step procedures and keep a tidy workbench.
  sports: Asher Wallace enjoys weekend kayaking with the Maine Lakes Paddle Club, follows the New England Patriots during football season, and occasionally shoots hoops at the local high school gym, preferring
    low‑impact exercise that complements their love of the outdoors while keeping a practical, routine‑driven fitness schedule.
  arts: Asher Wallace unwinds with fantasy epics by Brandon Sanderson and Patrick Rothfuss, supplements their creative spark by building handcrafted birdhouses inspired by mid‑century modern design, and
    relaxes to the folk harmonies of Bon Iver and Fleet Foxes while occasionally streaming strategy titles like Civilization VI and XCOM 2.
  travel: Asher Wallace prefers low‑key, budget‑friendly trips that combine scenic camping with short city stops, having explored Acadia National Park and a weekend in Boston while dreaming of a solo backpacking
    adventure through Iceland’s waterfalls and the rugged coast of Newfoundland.
  culinary: Asher Wallace enjoys cooking simple, hearty meals such as pan‑seared trout with lemon‑dill sauce, blueberry pancakes stacked with maple syrup, and occasional fish tacos seasoned with cumin and
    cilantro, showing a modest culinary skill set that favors fresh local ingredients and a habit of over‑salting to ‘wake up’ the palate.
  core: Asher Wallace is a detail‑oriented 18‑year‑old trades‑bound aspiring contractor whose love of quiet lake mornings, methodical woodworking, and strategic video games balances a steady anxiety that
    fuels both meticulous planning and occasional procrastination.
background:
  cultural: Asher comes from a multi‑generational New England family rooted in the rural communities of Penobscot County, Maine. His heritage includes a blend of Irish and French‑Canadian ancestry, reflecting
    the historical settlement patterns of the region. The local culture emphasizes self‑reliance, practicality, and a close connection to the outdoors—values that have shaped his outlook and interests.
    Community ties are strong; participation in town events, seasonal fishing traditions, and support for local businesses are common threads in his upbringing. This background has fostered his cooperative
    nature, respect for hard work, and desire to contribute positively to his tight‑knit neighborhood.
attributes:
  skills: '[''Microsoft Office and Google Suite proficiency'', ''Basic automotive maintenance'', ''Woodworking and carpentry basics'', ''First aid and CPR certified'', ''Event organization and volunteer
    coordination'', ''Conflict mediation and active listening'', ''Time management and punctuality'']'
  hobbies: '[''Fishing and kayaking'', ''Woodworking projects'', ''Strategy video gaming'', ''Reading contemporary fantasy'', ''Journaling'', ''Mindfulness meditation'', ''Volunteering at community center'']'
  career_goals: Asher aims to pursue a structured, stable career that leverages his practical abilities while providing clear expectations. He plans to enroll in a technical college program for HVAC or
    plumbing, with the long‑term goal of becoming a licensed tradesperson and eventually running his own small contracting business. The predictability and tangible outcomes of the trade appeal to his preference
    for concrete results. He also hopes to secure a reliable income that reduces his financial anxieties and allows him to support his family and community. In the meantime, he is considering a part‑time
    position in a local hardware store to gain retail experience and further develop his customer‑service skills.
