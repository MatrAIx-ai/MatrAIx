personas:
  professional: Lauren Highfield, a two-year-old who meticulously arranges toys by color and follows a strict daily routine, displays early architectural instincts and a practical mindset that hint at a
    future path in design or early childhood education.
  sports: Lauren Highfield, a two-year-old who loves the kinetic fun of weekly toddler gymnastics at Little Gym and cheers on the New York Yankees during family TV time, prefers short, structured bursts
    of play in small-group soccer at the neighborhood park, and enjoys splash-time at the local community pool.
  arts: Lauren Highfield, a toddler who sings along to Raffi's 'Baby Beluga', watches the bright characters of Sesame Street, and frequently draws stick-figure families inspired by Dr. Seuss's whimsical
    illustrations, lets these artistic exposures shape their playful imagination.
  travel: Lauren Highfield, a two-year-old who explores new places on family outings, prefers stroller-friendly spots like the Children's Museum of Indianapolis and the gentle boardwalks of Balboa Park
    in San Diego, and dreams of a future adventure at the geysers of Yellowstone National Park where sensory experiences fit their love of routine and predictable patterns.
  culinary: Lauren Highfield, a toddler whose palate gravitates toward familiar comforts like creamy macaroni and cheese, banana pancakes drizzled with a touch of maple syrup, and soft cooked carrots seasoned
    with a pinch of parsley, insists on eating from the same blue bowl each meal and occasionally refuses new foods without a thorough visual inspection.
  core: Lauren Highfield, a two-year-old routine enthusiast who lines up toys by color, demands the same bedtime story night after night, and negotiates snack time with unwavering resolve, embodies a blend
    of practicality, gentle assertiveness, and endearing stubbornness.
background:
  cultural: Lauren is raised in a white family in Lemoore, California, a small agricultural community in the Central Valley. Her upbringing reflects the region’s emphasis on practicality, hard work, and
    community events such as local fairs and school gatherings. Family traditions include weekend visits to nearby farms, participation in church‑based activities, and shared meals that celebrate modest,
    home‑cooked cuisine.
