  career_goals: She aims to advance from frontline surveillance to a supervisory role within the casino’s security department, eventually becoming a Security Manager overseeing both physical and cyber‑risk
    strategies. Leveraging her STEM background, Heleny aspires to integrate advanced analytics and AI‑driven monitoring tools to improve fraud detection. She plans to obtain certifications such as Certified
    Protection Professional (CPP) and Certified Information Systems Security Professional (CISSP) to bridge physical security with cybersecurity. Long‑term, she envisions mentoring women and Latino professionals
    entering security and technology fields, and perhaps launching a consulting firm that advises gambling venues on holistic safety solutions.
