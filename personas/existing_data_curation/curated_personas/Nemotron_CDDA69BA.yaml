  career_goals: Carmen aspires to transform her practical expertise into a thriving owner‑operator business. Over the next five years she aims to obtain a certified master painter credential and expand
    her services to include high‑end decorative finishes and sustainable paint solutions. She dreams of hiring and mentoring a small crew of apprentices, particularly women and first‑generation workers,
    to create a supportive, community‑focused company in the Atlanta metropolitan area. A long‑term ambition is to be recognized for culturally inspired murals that celebrate Mexican heritage while enriching
    local neighborhoods, and to balance her entrepreneurial growth with a flexible schedule that accommodates family life.
