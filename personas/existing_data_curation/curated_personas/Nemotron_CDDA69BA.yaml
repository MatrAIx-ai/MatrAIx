personas:
  professional: An experienced painter and paperhanger, Carmen Santibanez leverages fifteen years of hands‑on expertise in surface preparation, decorative murals, and low‑VOC finishes, and they balance
    a spontaneous, curiosity‑driven approach with meticulous OSHA safety practices while often juggling project timelines with a flexible, improvisational style.
  sports: Carmen Santibanez stays active by attending salsa and cumbia classes at the community center, hiking the Appalachian Trail segments near Atlanta with their family, and rooting for the Atlanta
    Braves while they occasionally join a weekend recreational soccer league with a local garden club crew.
  arts: Beyond painting walls, Carmen Santibanez draws inspiration from Frida Kahlo’s vivid self‑portraits and the rhythmic melodies of Celia Cruz, and they integrate these influences into bright murals
    for neighborhood youth art programs while sharing the experience at local gallery nights.
  travel: An adventurous planner, Carmen Santibanez prefers spur‑of‑the‑moment road trips to the Blue Ridge Mountains and long‑planned cultural escapes to Santa Fe’s art scene, and they budget carefully
    to balance family visits to relatives in Texas.
  culinary: Carmen Santibanez, a confident home chef, regularly crafts mole poblano, hand‑rolled tamales, and fiery salsas featuring roasted tomatillos, chipotle, and fresh cilantro, and they also experiment
    with herb‑infused garden vegetables like rosemary‑scented zucchini in casual potluck gatherings.
  core: Balancing restless curiosity with a love for community, Carmen Santibanez flips between spontaneous mural projects and missed deadlines, and they often swap a paintbrush for a dance shoe, unable
    to resist a late‑night salsa session even after a day of ladder climbs.
background:
  cultural: Carmen’s Mexican roots are a vibrant thread woven throughout her identity. Raised in a bilingual household, she grew up speaking both Spanish and English, and she cherishes family traditions
    like Día de los Muertos, Cinco de Mayo celebrations, and weekly communal meals featuring mole and pozole. Her parents instilled a strong sense of community, respect for elders, and a love for music
    and dance, which she carries into the Georgia neighborhood where she now lives. While she has adapted to the Southern culture of hospitality, she maintains connections with the local Hispanic community,
    attending church services in Spanish and participating in cultural events at the nearby Mexican consulate. Her heritage influences her aesthetic sensibility, often inspiring her to incorporate bright
    colors, intricate patterns, and folkloric motifs into her painting work, bridging Mexican artistic heritage with the homes she transforms.
