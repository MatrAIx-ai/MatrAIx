  career_goals: Timothy aspires to become an astronaut‑artist, envisioning a future where he travels to other planets and paints alien landscapes. He also dreams of inventing a robot that can draw, hoping
    to be recognized as the best kid inventor at school. In the short term, he wants to win the school science fair and be the champion of the local LEGO building contest.
