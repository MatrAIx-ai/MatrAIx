personas:
  professional: Timothy Hill is an aspiring junior architect who channels their love of LEGO city building and fantasy creature sketches into creative problem solving, though they often leave plans scattered
    and favor spontaneous construction over strict schedules.
  sports: Timothy Hill is a forward on the Sprout Soccer Club’s spring team, competes fiercely against peers while rooting for the New York Yankees, and balances the structured practice with solitary weekend
    hikes through the nearby woods, where they feel most at ease.
  arts: Timothy Hill delights in drawing fantastical dragons and unicorns while listening to upbeat tunes by The Wiggles and Raffi, admires the LEGO sculptures of Nathan Sawaya and animated films from Pixar
    and Studio Ghibli, which inspire their own creative sketches, and they often incorporate those influences into new drawings.
  travel: Timothy Hill enjoys spontaneous family trips to the Dinosaur National Monument and the Kennedy Space Center, dreaming of a future adventure to the Eiffel Tower, preferring flexible itineraries
    that allow plenty of time for woodland explorations, and they love the freedom to wander.
  culinary: Timothy Hill loves cheesy macaroni, pepperoni pizza, and peanut butter and jelly sandwiches, often attempting to add extra carrots to their snack plate, though they are a messy eater who sometimes
    leaves crumbs all over the LEGO floor.
  core: Timothy Hill is a curious, art‑obsessed six‑year‑old who builds sprawling LEGO worlds, battles anxiety with imagination, and hoards LEGO bricks while neglecting tidy play areas, and they constantly
    hum The Wiggles while sketching.
background:
  cultural: Timothy grows up in Summerville, a small town in Chattooga County, Georgia, within a white, Southern‑influenced family that values close‑knit community ties, church gatherings, and regional
    traditions such as backyard barbecues, homemade biscuits, and fried chicken. Family celebrations often include storytelling, country and bluegrass music, and participation in county fairs that showcase
    Appalachian crafts.
attributes:
  skills: '[''Reading simple sentences'', ''Basic addition/subtraction (to 20)'', ''Drawing detailed pictures'', ''LEGO construction'', ''Memorizing dinosaur and space facts'', ''Reciting short poems'',
