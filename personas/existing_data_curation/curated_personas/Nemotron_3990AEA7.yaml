  professional: Sheri Whitaker is an aspiring soccer strategist and LEGO architect who blends on‑field tactical thinking with spatial problem‑solving learned from building intricate LEGO models, and they
    often lead friends in planning impromptu match formations while balancing schoolwork with a love for structured play.
  sports: Sheri Whitaker is a dedicated youth soccer player in the Southern California youth league who idolizes Los Angeles FC and emulates star forward Carlos Vela’s moves on the field, and they also
    cheer for the Los Angeles Lakers, using pre‑game routines to stay energized before weekend matches.
  arts: Sheri Whitaker embraces hip‑hop dance classes where they practice routines to tracks by Beyoncé, Lil Nas X, and BTS, and they collect stickers of pop icons like Taylor Swift, channeling this energy
    into weekend performances at school talent shows.
  travel: Sheri Whitaker relishes family outings to Disneyland and has a wish list that includes a summer visit to Universal Studios Hollywood and a spring adventure to Tokyo Disney Resort, preferring meticulously
    planned itineraries for theme‑park navigation but also improvising spontaneous snack hunts when they spot a tasty treat.
  culinary: Sheri Whitaker enjoys crafting personal pizza slices topped with mozzarella, pepperoni, and fresh basil, savoring chicken tacos with cilantro and lime, and they eagerly sample the famous churros
    at Disneyland, often attempting to recreate them at home with cinnamon sugar.
  core: Sheri Whitaker is a vibrant ten‑year‑old whose structured mind fuels strategic play in soccer and LEGO building, while their spontaneous social energy drives friendships, yet they juggle occasional
    disorganization and skepticism, making them a competitive yet adaptable budding leader.
background:
  cultural: Sheri grows up in a middle‑class white family in Anaheim, Southern California. The city's suburban setting, sunny climate, and proximity to Disneyland shape a childhood filled with outdoor play,
