persona_description: A climatologist at the University of Georgia who studies the relationships between atmospheric circulation patterns, snow cover, and climate change, and has published research on the
  impact of autumn snow cover in northwest Eurasia on subsequent winter temperatures in North America. He is known for his work on the relationship between climate change and agricultural productivity,
  and for his leadership in the Climatology Research Laboratory at the University of Georgia.
