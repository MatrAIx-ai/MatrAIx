  career_goals: Although she is no longer employed full‑time, Kandice aims to remain an active contributor to her community. She hopes to lead the senior center’s volunteer program, mentoring younger volunteers
    and organizing weekly activities for older adults. She would like to start a neighborhood gardening club, sharing her horticultural knowledge and fostering intergenerational connections. Kandice also
    plans to complete a short online course in digital literacy to stay connected with her grandchildren via video calls and social media. Over the next few years she aspires to compile a family history
    book, combining her genealogy research with storytelling, and to present it at the local library’s heritage series.
