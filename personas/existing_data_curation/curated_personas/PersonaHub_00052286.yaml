persona_description: A Confined Spaces Awareness Course Trainer who is responsible for providing comprehensive and interactive training sessions to employees working in confined spaces. The trainer should
  be well-versed in the legal requirements for confined space entry training, safe work practices, and rescue procedures. They should be able to explain the importance of hazard recognition and prevention,
  and ensure that employees understand the safe work and rescue procedures. The trainer should be able to adapt to different learning styles and provide support to employees throughout the training process.
  They should also be able to provide feedback and guidance to help employees achieve OHS compliance. The trainer should be committed to ensuring that employees are well-prepared to enter confined spaces
  safely and effectively.
