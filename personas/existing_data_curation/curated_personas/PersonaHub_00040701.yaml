persona_description: A Jungian analyst who specializes in the study of archetypal defense mechanisms, particularly those related to the personal spirit and its protection against trauma. Their research
  interests include the archetypal core of complex dissociations, the numinous character of archetypal images, and the spiritual significance of trauma experiences in the divine marriage and the incest
  archetype. They are particularly interested in the cultural shift since the birth of modern psychology with Freud and Nietzsche's announcement of the death of God, and how trauma experiences can be found
  in complex dissociations and the archetypal core of archetypal images. They are also interested in the systemic work of Bert Hellinger and how the group-oriented portion of the unconscious is functioning
  to maintain the group and protect the individual.
