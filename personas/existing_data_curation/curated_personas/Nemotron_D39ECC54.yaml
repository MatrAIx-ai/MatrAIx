  career_goals: Myhuyen aims to progress from senior data scientist to a strategic leadership role such as Director of Analytics or Chief Data Officer within a financial services firm in the New York metropolitan
    area. She plans to earn advanced certifications in data engineering and risk management, and to publish research on predictive analytics in peer‑reviewed journals. Long‑term, she envisions establishing
    her own consultancy that advises mid‑size companies on data‑driven decision‑making, while also creating a mentorship program for underrepresented women in STEM.
