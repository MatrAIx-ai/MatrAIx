  career_goals: Robert dreams of becoming a firefighter one day because he admires the bravery and order of the fire station, and he likes the idea of helping people stay safe. He also talks about wanting
    to be a teacher when he grows up, so he can create a structured, caring classroom where everyone feels included. His love for animals sometimes leads him to imagine being a veterinarian, caring for
    the farm animals he sees around his hometown. These ambitions reflect his desire for roles that combine helping others, maintaining order, and contributing to his community.
