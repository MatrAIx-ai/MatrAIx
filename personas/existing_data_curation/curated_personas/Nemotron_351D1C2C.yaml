personas:
  professional: River Diazgranados, an aspiring young programmer and storyteller, leverages a love for mystery novels and structured narratives to create interactive Scratch projects that blend digital
    illustration with branching storylines, showcasing meticulous planning and a preference for solitary, focused work.
  sports: River Diazgranados, who enjoys after‑school swimming at the community pool and participates in the local youth soccer club the Riverside Rovers, follows professional teams such as the Los Angeles
    Lakers for basketball and the Seattle Sounders for soccer, prefers structured practice sessions over spontaneous play, and logs workout progress in a simple spreadsheet to track endurance gains.
  arts: River Diazgranados, an avid visual creator, spends evenings sketching wildlife inspired by John James Audubon, paints watercolor landscapes after watching Studio Ghibli films, produces digital illustrations
    on a tablet influenced by artists like Loish, and attends a weekly youth art workshop where they explore mixed media techniques while listening to indie pop artists such as Clairo and Spanish‑language
    pop singer Natalia Lafourcade.
  travel: River Diazgranados, a cautious yet curious traveler, prefers family‑planned trips with clear itineraries, revels in nature‑focused destinations like the Grand Canyon, the Redwood National Forest,
    and has a bucket‑list entry for Kyoto’s bamboo groves, balancing a desire for exploration with the need for predictable schedules and occasional quiet reading time on the road.
  culinary: River Diazgranados, a budding home chef, delights in preparing family recipes such as tacos al pastor and fresh salsa alongside their mother, experiments with herb‑infused water using garden‑grown
    basil and cilantro, enjoys the tangy flavor of lime‑marinated fish tacos, and skillfully assembles guacamole with ripe avocados, roasted corn, and a pinch of sea salt.
  core: River Diazgranados, a quietly ambitious 12‑year‑old, channels intense anxiety into structured creativity, meticulous savings, and solitary pursuits, balancing a love for mystery, art, and gardening
    with a steady rhythm of routine.
background:
  cultural: 'River’s Mexican heritage is a vibrant thread woven through her daily life in Calexico, a border community where Mexican and American cultures intersect. At home, Spanish is the primary language,
    and she regularly helps translate between Spanish‑speaking relatives and English‑speaking teachers, reinforcing her bilingual fluency. Family gatherings often feature traditional dishes like tamales,
    pozole, and fresh salsa, and celebrations such as Día de los Muertos and Las Posadas bring colorful customs, altars, and storytelling into her world. Catholic traditions, including attending Mass with
    her family on Sundays and observing holidays like Christmas Eve (Nochebuena), shape her sense of ritual and community. The proximity to the U.S.–Mexico border exposes River to a bicultural environment:
    she navigates the expectations of the American school system while preserving Mexican values of family respect, collectivism, and perseverance. Community events at the local library and cultural center
    foster her connection to a broader Mexican‑American identity, reinforcing pride in her ancestry and motivating her to contribute positively to her neighborhood.'
