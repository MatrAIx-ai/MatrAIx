  career_goals: River’s career aspirations are shaped by her desire for predictable, organized work environments where she can apply her practical abilities while maintaining a quiet, focused setting. In
    the short term, she aims to graduate high school with strong grades in science and math, and to improve her English fluency through tutoring and extracurricular clubs. She plans to join the school’s
    technology or robotics club to deepen her coding skills and hopes to volunteer at the local animal shelter, where she can assist with animal care and record‑keeping tasks that suit her meticulous nature.
    Looking ahead, River envisions a career as a veterinary technician or a biomedical laboratory assistant, occupations that blend hands‑on, structured tasks with a calm atmosphere. She is also intrigued
    by the possibility of developing simple health‑tech apps that help peers manage anxiety, merging her Scratch programming experience with her personal experience of emotional reactivity. Ultimately,
    she hopes to pursue a community college program in veterinary technology or computer science, followed by a certification that leads to stable, purpose‑driven employment.
