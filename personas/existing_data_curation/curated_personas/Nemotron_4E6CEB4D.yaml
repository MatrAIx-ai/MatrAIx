  career_goals: Morvin aims to advance into a team lead or supervisory role within his customer service department, where he can mentor new representatives and shape service standards. Long‑term, he aspires
    to transition into a community‑focused position such as a customer experience manager for a nonprofit arts organization, blending his passion for art with his dedication to helping others. To reach
    these goals, he plans to earn certifications in conflict resolution and leadership, pursue a part‑time associate degree in business administration, and gain experience coordinating volunteer programs
    that support local cultural initiatives.
