  hobbies: '[''Painting and sketching'', ''Visiting local art galleries and museums'', ''Reading science‑fiction and psychology non‑fiction'', ''Photography of Pennsylvania’s natural landscapes'', ''Hiking
    and nature walks in the Appalachian region'', ''Playing acoustic guitar'', ''Attending and volunteering for community theater productions'', ''Collecting vintage vinyl records'']'
  career_goals: David aims to progress from a frontline representative to a supervisory or training role within his company, leveraging his competitive drive to lead a small team and shape service protocols.
    He plans to enroll part‑time in an associate program for Business Administration or Communications to add formal credentials and improve his organizational discipline. In the longer term, he wants to
    contribute to the design of customer‑experience initiatives, championing flexible, customer‑centric solutions that reflect his open‑minded, curiosity‑driven approach.
