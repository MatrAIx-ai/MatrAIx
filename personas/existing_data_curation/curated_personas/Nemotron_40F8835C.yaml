personas:
  professional: David Coler blends a decade of frontline customer‑service mastery with an improvisational problem‑solving style, leveraging strong verbal communication, CRM expertise in Zendesk and Salesforce,
    and a knack for on‑the‑fly creative fixes, and they aim to lead a small team while pursuing a Business Administration associate degree.
  sports: David Coler embraces weekend hikes along the Appalachian Trail, occasionally joins a local running club for 5K races, follows the Philadelphia Eagles and Philadelphia 76ers with fervor, and they
    sprinkle in pick‑up basketball games when competitive urges surface, though a flexible schedule sometimes leads to missed workouts.
  arts: David Coler immerses themselves in painting rolling Lehigh Valley hills, curates a vintage vinyl collection featuring Bob Dylan and Simon & Garfunkel, captures black‑and‑white photographs of historic
    architecture, strums acoustic guitar at home, and they volunteer as crew for community‑theater productions, drawing inspiration from Van Gogh and local Pennsylvania impressionists.
  travel: David Coler prefers spontaneous, nature‑focused getaways, having hiked the Shenandoah National Park and explored historic Boston, they dream of wandering the art‑rich streets of Florence, Italy,
    while balancing travel plans around a modest budget and occasional work‑related constraints.
  culinary: David Coler enjoys cooking simple, seasonally inspired meals like mushroom risotto and grilled cheese with aged cheddar, experiments with farm‑to‑table ingredients such as local Pennsylvania
    apples and artisanal cheese, and they relish evenings savoring a hearty bowl of Pennsylvania Dutch chicken pot pie while listening to vinyl records.
  core: David Coler is a curious, art‑loving customer‑service veteran whose competitive edge and love for flexible, spontaneous experiences coexist with a habit of occasional disorganization, and they maintain
    a skeptical yet open‑minded outlook on life.
background:
  cultural: David grew up in Lehighton, Pennsylvania, in a working‑class family rooted in the region’s coal‑mining heritage. The community’s modest, tight‑knit ethos and the surrounding Pennsylvania Dutch
    craftsmanship traditions have shaped his appreciation for practical creativity and local history. He celebrates regional events such as the annual Carbon County Fair and July 4th parades, while maintaining
    an open‑minded outlook that values diverse artistic expressions and new ideas, reflecting both his Appalachian upbringing and his personal curiosity.
attributes:
  skills: '[''Customer Relationship Management (Zendesk, Salesforce)'', ''Verbal communication and active listening'', ''Conflict de‑escalation'', ''Technical troubleshooting of consumer electronics'',
