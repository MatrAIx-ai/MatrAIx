  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting and sketching'', ''Reading historical fiction'', ''Gardening'', ''Birdwatching'', ''Knitting'', ''Participating in a small book
    club'', ''Listening to jazz vinyl records'', ''Volunteering at the senior center'', ''Exploring local history tours'']'
  career_goals: As she approaches retirement, Jennie aims to transition into a mentorship role, passing her extensive knowledge of inspection and testing to younger colleagues. She hopes to lead a small
    cross‑functional team to streamline sampling procedures, reduce waste, and improve product consistency. Outside of work, she aspires to volunteer as a docent at the local art museum, sharing her love
    of art with seniors. Jennie also wishes to enroll in a community‑college course on digital photography to combine her curiosity for new ideas with a creative outlet, while maintaining a balanced lifestyle
    that mitigates stress and worry.
