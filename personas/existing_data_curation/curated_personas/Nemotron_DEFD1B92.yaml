personas:
  professional: Troy Waugaman is a budding junior scientist who spends afternoons arranging his toy lab in methodically labeled bins, draws step‑by‑step experiment logs with crayons, and proudly promises
    to keep his projects tidy, showcasing his curiosity and organized nature.
  sports: Troy Waugaman is an enthusiastic member of the Tiny Tigers soccer club who loves to practice dribbling after school, cheerfully watches the River City Runners baseball games on TV, prefers small‑group
    drills over crowded playgrounds, and keeps a tote bag ready for his weekly swim lessons.
  arts: Troy Waugaman is a tiny art aficionado who fills sketchbooks with rainbow‑colored doodles, can sing every verse of 'Baby Shark' by Pinkfong, lines up his favorite picture books by Dr. Seuss and
    Eric Carle on a shelf, and believes each illustration hides a secret story.
  travel: Troy Waugaman is a curious junior explorer who delights in road‑trip snack boxes, proudly marks his family’s visits to Disneyland and the Grand Canyon on a crayon‑drawn map, dreams of seeing the
    Eiffel Tower, and chooses short flights because long travel makes him fussy.
  culinary: Troy Waugaman is a picky yet adventurous eater who expertly spreads peanut butter on toast with a plastic knife, devours cheesy macaroni, loves apple slices sprinkled with cinnamon, and refuses
    broccoli unless it’s cut into dinosaur shapes.
  core: Troy Waugaman is a methodical, curiosity‑driven five‑year‑old who balances love for organized play, disciplined saving, creative imagination, and occasional impulsive treats with a tiny rebellious
    streak.
background:
  cultural: Troy is a white American child raised in Nashville, Tennessee, within a family that values Southern hospitality, community, and family gatherings. His parents expose him to the city’s vibrant
    music scene, often taking him to family-friendly events at the Frist Art Museum or local festivals. He celebrates traditional holidays such as Thanksgiving, Christmas, and the Fourth of July with barbecues,
    homemade pies, and fireworks. The household participates in a Baptist church where Sunday school reinforces kindness and sharing. These cultural experiences blend with his curiosity, encouraging him
    to appreciate both art and the local heritage.
