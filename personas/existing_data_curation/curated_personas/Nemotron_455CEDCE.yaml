personas:
  professional: Joselyn is an aspiring game developer who builds interactive Scratch games and complex LEGO robotics, channeling their curiosity and competitive spirit into meticulous coding while letting
    their relaxed approach keep deadlines fluid.
  sports: Joselyn plays forward for the Midtown Youth Soccer Club, thrives in weekend matches, follows the USWNT and the LA Galaxy, and balances competitive play with a relaxed training routine that includes
    spontaneous pick‑up games at the local park, all while cheering for their favorite professional team, New York City FC.
  arts: Joselyn transforms futuristic ideas into comic strips inspired by Moebius, sketches characters while listening to Daft Punk and the orchestral scores of Hans Zimmer, and showcases salsa moves to
    the beats of Bad Bunny and Marc Anthony at community gatherings, blending visual storytelling with rhythmic expression and they often share their creations with friends.
  travel: Joselyn prefers spontaneous day trips to nearby state parks like Redwood National Forest and exploratory weekend getaways to the Grand Canyon, planning itineraries on the fly with a flexible mindset
    that values discovery over strict schedules, and they cherish dreaming of future adventures in Costa Rica's rainforests and Japan's cherry blossom festivals.
  culinary: Joselyn assists in cooking a slow‑cooked shredded beef stew seasoned with cumin, garlic, bell peppers, and olives—often referred to as ropa vieja—while also mastering mango‑lime smoothies and
    homemade plantain chips, displaying a budding intermediate cooking skill level that balances family tradition with experimental flavor pairings and they love sharing the dishes with friends.
  core: Joselyn is a curious, competitive tinkerer who juggles LEGO robotics, Scratch coding, and soccer drills with a laid‑back, slightly chaotic flair, and they thrive on balancing structure with spontaneity.
background:
  cultural: Joselyn was born into a Cuban-American family that maintains strong ties to its heritage while living in Carlstadt, New Jersey. At home, Spanish is spoken alongside English, and family meals
    often feature classic Cuban flavors like plantains, black beans, and citrus-marinated pork. She celebrates cultural traditions such as Carnaval and enjoys listening to the rhythms of salsa, son, and
    contemporary Latin pop. The close-knit Cuban community in Bergen County provides opportunities for cultural festivals, dance classes, and community service events, which have shaped Joselyn's sense
    of identity and pride. While she embraces the multicultural environment of her suburb, her heritage influences her values of family solidarity, resilience, and an appreciation for vibrant music and
    food.
