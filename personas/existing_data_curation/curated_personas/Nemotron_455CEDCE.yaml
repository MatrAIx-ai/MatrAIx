  career_goals: Joselyn dreams of turning her curiosity and practical mindset into a future career in technology. She aims to become a software developer or robotics engineer who creates tools that make
    everyday tasks easier for her peers, especially apps that help kids stay organized - reflecting her own experience with flexible planning. She also envisions leading a community tech-club where she
    can mentor younger kids, combining her competitive spirit with a desire to share knowledge. In the longer term, she imagines working on sustainable tech projects that benefit both her Cuban heritage
    community and the broader world.
