  hobbies: '[''Community Theater'', ''Gardening'', ''Hiking'', ''Reading Historical Fiction'', ''Yoga & Mindfulness'', ''Cooking'', ''Volunteering at Health Fairs'', ''Book Club'', ''Sourdough Baking'',
    ''Iowa Hawkeyes Football Fan'']'
  career_goals: Kelsey aims to advance into a regional director or vice‑presidential role within the next five to seven years, overseeing multiple care sites across Iowa and neighboring states. She plans
    to complete a Master's in Health Administration to deepen her expertise in health policy and finance. Central to her ambition is building a workplace culture that mitigates staff stress—she intends
    to launch a comprehensive employee‑wellness program, mentorship pathways for emerging female leaders, and resilience training workshops. She also seeks to spearhead the integration of telehealth services
    and improve patient‑satisfaction scores above 90% by designing patient‑centred care pathways that blend structured processes with flexible, personalized care.
