personas:
  professional: Kelsey Watkins is a healthcare operations leader who blends a structured, data‑focused approach with a sociable, team‑building style, using Lean Six Sigma Green Belt tools and Epic expertise
    to streamline patient‑flow across multiple sites while championing employee‑wellness initiatives.
  sports: Kelsey Watkins is a devoted Iowa Hawkeyes football fan who spends weekends hiking the Turkey River trail, participates in a local women's running club, and occasionally joins a community softball
    league, balancing competitive spirit with a love for low‑key outdoor activity.
  arts: Kelsey Watkins actively performs and designs sets for a community‑theater troupe, knits quilts inspired by Midwestern folk patterns, reads historical fiction by Hilary Mantel, and finds creative
    inspiration from playwright Lin‑Manuel Miranda and painter Georgia O’Keeffe.
  travel: Kelsey Watkins prefers meticulously planned road trips that blend cultural stops like a weekend in Chicago’s theater district with nature escapes such as a summer hike in the Badlands, and they
    dream of exploring the historic vineyards of Tuscany while balancing travel costs with family obligations.
  culinary: Kelsey Watkins experiments with heirloom vegetable dishes like roasted beet and goat cheese salad, perfects sourdough boule with a tangy crust, and frequently whips up spicy kimchi fried rice,
    all while sourcing fresh herbs from their own garden and savoring the process as a creative outlet.
  core: Kelsey Watkins is a pragmatic, structure‑loving healthcare strategist who mitigates stress through community arts, garden rituals, and meticulous planning, yet their worry‑prone nature often fuels
    a relentless pursuit of perfection.
background:
  cultural: Kelsey grew up in a small Midwestern town in Iowa, raised in a family with German and Irish roots. Her upbringing emphasized community involvement, self‑reliance, and hospitality typical of
    the region. She attended local public schools and earned her BA in Humanities from the University of Iowa, where exposure to liberal arts reinforced her appreciation for diverse perspectives. Living
    in Bettendorf—a hub of the Quad Cities—she experiences a blend of Iowa and Illinois cultural traditions, from state‑fair celebrations to river‑front festivals. Midwestern values of hard work, modesty,
    and collective responsibility shape her outlook, while her participation in church and community service reflects a commitment to the cooperative spirit of her cultural heritage.
attributes:
  skills: '[''Strategic Healthcare Management'', ''Regulatory Compliance'', ''Budgeting & Financial Forecasting'', ''Team Leadership & Development'', ''Quality Improvement (Lean Six Sigma)'', ''Patient
