persona_description: A materials scientist who specializes in the development and application of photopolymerization techniques, particularly those used in the production of microstructures. He is skilled
  in creating thin PDMS walls and using them to remove closed loops in structures, as well as incorporating a wide range of materials, including metal, into micro structures fabricated by multiphoton absorption
  polymerization (MAP). He is excited by the potential of this technique to greatly increase the range of microscopic structures that can be created in a single molding step, which is an important step
  towards the mass production of micromachines made from plastic.
