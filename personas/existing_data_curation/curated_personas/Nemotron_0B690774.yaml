personas:
  professional: Alyssa Tully, an aspiring full‑stack developer proficient in JavaScript, React, and Python data scripts, channels her curiosity and meticulous organization into building user‑friendly digital‑humanities
    tools while managing her tendency to over‑worry with rigorous code reviews and Agile planning.
  sports: Alyssa Tully hikes the Kaskaskia River trail with the Midwest Hiking Club every Saturday, follows the St. Louis Cardinals for baseball, and practices yoga at a local studio to counteract the sedentary
    nature of her coding work.
  arts: Alyssa Tully spends evenings immersed in the poetry of Sylvia Plath, strums acoustic renditions of Joni Mitchell and Bob Dylan on her guitar, and curates a personal playlist of indie folk that fuels
    her creative writing.
  travel: Alyssa Tully prefers low‑key, reflective trips, such as a literary pilgrimage to the Bodleian Library in Oxford and a solo backpacking trek through Shenandoah National Park, planning each itinerary
    meticulously to fit her modest student budget.
  culinary: Alyssa Tully enjoys cooking simple, wholesome meals like spaghetti aglio e olio and blueberry lemon pancakes, appreciates fresh herbs such as basil and cilantro, and treats herself to specialty
    coffee at local cafés when she needs a focused break.
  core: Alyssa Tully, a quietly ambitious coder with a love for classic literature and a habit of over‑thinking every decision, balances diligent planning with occasional late‑night indulgence in poetry
    and coffee.
background:
  cultural: Alyssa grew up in O’Fallon, Illinois, a Midwestern suburb known for its close‑knit community and blend of urban and rural influences. Her family’s Irish and German ancestry reflects the common
    heritage of the region, and she was raised with values of modesty, hard work, and a deep appreciation for the arts. The local cultural scene—festivals, historic sites, and a supportive school system—nurtured
    her love of literature and civic engagement, while the pragmatic Midwestern mindset reinforced her balanced approach to curiosity and practicality.
