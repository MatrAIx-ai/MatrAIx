  career_goals: She aims to become a lead full‑stack developer focusing on digital‑humanities platforms that make archival materials widely accessible. Over the next five years, Alyssa plans to pursue a
    Master’s in Human‑Computer Interaction, contribute to open‑source cultural heritage projects, and eventually launch a startup that creates stress‑management apps for students. She seeks roles that blend
    innovative problem‑solving with practical impact, allowing her to maintain a stable work‑life rhythm and mitigate her natural tendency toward worry.
