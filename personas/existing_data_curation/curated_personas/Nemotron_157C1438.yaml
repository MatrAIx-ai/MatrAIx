personas:
  professional: Nicole Devore, a certified career counselor who blends a STEM background with data‑driven analytics, designs evidence‑based career programs for regional universities, leverages Python and
    SPSS to forecast labor‑market trends, and uses her competitive, critical eye to push junior advisors toward measurable outcomes while still valuing the community‑first mentality she grew up with.
  sports: Nicole Devore, an avid kayaker on Lake Munson, a regular participant in Hillsborough River State Park trail hikes, and a competitive member of the Lithia community tennis league, roots for the
    Tampa Bay Buccaneers and the Orlando Magic while cheering on the Tampa Bay Lightning during hockey season.
  arts: Nicole Devore, who captures Florida sunsets with a DSLR, draws artistic inspiration from Ansel Adams’ landscape composition and the ambient tones of Bon Iver, attends occasional live performances
    by local jazz ensembles, and curates a personal playlist that mixes classical piano with modern indie folk for focused work sessions.
  travel: Nicole Devore, who plans her trips with a blend of meticulous itineraries and spontaneous detours, has hiked the red‑rock trails of Sedona, explored the historic streets of Savannah during a spring
    festival, and dreams of kayaking the fjords of Norway while budget‑consciously balancing family commitments.
  culinary: Nicole Devore, a self‑taught sous‑vide enthusiast, frequently prepares perfectly cooked salmon with miso glaze, experiments with quinoa‑stuffed bell peppers seasoned with fresh basil and lemon
    zest, and enjoys pairing her dishes with crisp Sauvignon Blanc while occasionally splurging on a gourmet cheese board after a successful client presentation.
  core: Nicole Devore, a data‑savvy career strategist with a competitive streak, balances rigorous analytics and community‑focused mentorship while indulging in sous‑vide meals, weekend kayak trips, and
    a relentless quest for personal efficiency.
background:
  cultural: Nicole is a white American who grew up in a middle‑class family in Ohio, where her parents emphasized education, self‑reliance, and community involvement. After earning a STEM bachelor's degree,
    she relocated to Lithia, Florida, attracted by the warm climate and the region’s growing diversity. In Lithia she embraces the blend of suburban Southern hospitality—neighborhood gatherings, outdoor
    recreation, and seasonal festivals—with the multicultural influences of Central Florida’s international workforce. She participates in local volunteer initiatives and a non‑denominational community
    group, while maintaining a pragmatic, secular outlook rooted in her Midwestern upbringing.
attributes:
  skills: '[''Career counseling'', ''Labor market analysis'', ''Psychometric assessment'', ''Program development'', ''Data-driven advising'', ''Public speaking'', ''Curriculum design'', ''Student support
    services'', ''Conflict resolution'', ''Project management'', ''Technology integration for virtual advising'']'
  hobbies: '[''Kayaking'', ''Hiking'', ''Tennis'', ''Science podcasts'', ''Reading non-fiction'', ''Experimental cooking'', ''Mentoring STEM students'', ''Photography of nature'', ''Yoga'']'
  career_goals: Nicole aims to become the Director of Career Services at a regional university where she can scale her data‑centric approach statewide. She plans to launch an integrated career‑outcome tracking
    system that leverages predictive analytics to match students with high‑growth industries in Central Florida. Over the next five years she hopes to publish research on the impact of evidence‑based counseling
    on graduate employment rates, secure certification as a National Certified Counselor (NCC), and mentor a cohort of junior advisors. Her ultimate ambition is to shape policy that expands equitable access
    to career resources for underserved student populations.
