personas:
  professional: Jarrod Duncan is a seasoned customer service representative at a regional tech firm, using their empathetic listening, quick technical troubleshooting, and a flair for creative problem-solving
    to de-escalate tense calls while designing unconventional training guides for new hires, and their relaxed attitude toward rigid schedules lets them prioritize tasks intuitively and consistently exceed
    performance targets.
  sports: Jarrod Duncan enjoys leisurely weekend hikes through the Morton Arboretum and regular rides on Naperville's 12-mile bike path, follows the Chicago Bulls and Cubs avidly, and participates in the
    local Naperville Running Club's monthly group runs, preferring low-pressure, nature-centric exercise over competitive sports.
  arts: Jarrod Duncan channels curiosity through a weekly watercolor sketch class at the community center, wanders the Art Institute of Chicago's contemporary wings, draws inspiration from artists like
    Yayoi Kusama and graphic novelist Alan Moore, and their soundtrack often features Sufjan Stevens and classic indie folk, blending modern visual art with literary exploration.
  travel: Jarrod Duncan favors spontaneous weekend getaways, swapping between Chicago's museum district, breezy bike rides along the Indiana dunes of Lake Michigan, and occasional long-haul trips to New
    Orleans for jazz and Portland for food-truck tours, balancing adventure with a modest travel budget, family time, and a habit of overpacking a few extra sketchbooks.
  culinary: Jarrod Duncan cooks at an intermediate level, frequently whipping up ethnic dishes like Korean kimchi fried rice, Ethiopian injera with berbere-spiced stew, and Indian butter chicken, delighting
    in fresh cilantro, turmeric, miso, and a pantry of diverse spices that fuel nightly culinary experiments with their spouse.
  core: Jarrod Duncan is a compassionate, art-obsessed customer-service pro who trades meticulous planning for creative spontaneity, often juggling a cluttered calendar, midnight cooking sessions, and a
    habit of forgetting where they parked their bike.
background:
  cultural: Jarrod grew up in the Midwest, raised in a suburban community near Chicago that emphasized modesty, hard work, and community involvement. As a white American with a high‑school education, his
    cultural identity blends traditional Midwestern values—such as reliability, neighborliness, and a pragmatic outlook—with an openness to diverse artistic expressions found in local museums and cultural
    festivals. He participates in regional traditions like Fourth of July parades and high‑school sports events, while also embracing the area’s growing appreciation for contemporary art, technology, and
    social responsibility. His family ties and long‑standing residence in Naperville anchor him to the local community, influencing his compassionate approach to both work and volunteer activities.
attributes:
  skills: '[''Customer Service'', ''Active Listening'', ''Conflict Resolution'', ''Empathy'', ''Problem Solving'', ''Technical Troubleshooting'', ''CRM Software (Zendesk, Salesforce)'', ''Multi‑Channel
