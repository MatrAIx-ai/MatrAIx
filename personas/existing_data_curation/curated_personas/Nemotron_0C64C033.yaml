  hobbies: '[''Visiting Art Galleries'', ''Sketching Classes'', ''Podcast Listening (Design & Psychology)'', ''Reading Contemporary Fiction'', ''Graphic Novels'', ''Hiking (Morton Arboretum Trails)'', ''Cycling'',
    ''Experimental Cooking'', ''Volunteer Food Pantry Work'', ''Small Book Club'', ''Board Games with Friends'', ''Weekend Museum Trips to Chicago'']'
  career_goals: Jarrod aims to transition from front‑line representative to a team‑lead role within the next two years, leveraging his people‑skills and process insights to shape a more harmonious customer
    experience. He plans to earn a Certified Customer Experience Professional (CCXP) credential and enroll in community‑college courses on business communication and service design. Long‑term, he envisions
    moving into a customer‑success manager or user‑experience research position where he can blend his analytical abilities with his passion for helping others. He also harbors a personal ambition to launch
    a small community‑focused initiative that uses art workshops to teach empathy and communication skills to local youth.
