personas:
  professional: Arthur Shelton, a seasoned DIY technician with hands‑on expertise in automotive repair, carpentry, and home electrical troubleshooting, channels his meticulous organization and competitive
    drive into delivering reliable handyman services while steadily pursuing electrician certification and future HVAC credentials.
  sports: Arthur Shelton stays fit by weightlifting at the local gym and joining a seasonal fishing club on the Mississippi River, cheering for the New Orleans Saints and supporting the Natchez community
    softball league whenever opportunities arise.
  arts: Arthur Shelton immerses himself in blues music, regularly spinning records by Muddy Waters, B.B. King, and Howlin’ Wolf, while attending intimate community storytelling evenings that echo the oral
    traditions of the Delta and reading regional histories that deepen his connection to local heritage.
  travel: Arthur Shelton prefers purposeful road trips that blend history and nature, having explored the historic river towns of Vicksburg, the blues‑rich streets of Memphis, and the scenic trails of the
    Great Smoky Mountains, while dreaming of a future solo pilgrimage to the Mississippi River’s source at Lake Itasca.
  culinary: Arthur Shelton favors home‑cooked Southern fare, often preparing fried catfish with a cornmeal crust, collard greens seasoned with smoked turkey, and buttery cornbread, channeling his modest
    cooking skills into simple, flavor‑rich meals that remind him of river‑side picnics.
  core: Arthur Shelton, a detail‑oriented, solitary craftsman with a competitive streak, balances a love for vintage tech and blues history against a relentless drive for financial stability, all while
    wrestling with stress‑induced health worries.
background:
  cultural: Arthur was raised as a Black male in Natchez, Mississippi, a region steeped in Southern African‑American traditions. His upbringing was shaped by the close‑knit church community, family gatherings
    centered on soul food and gospel, and an oral history of the Natchez Pilgrimage and Delta blues. These cultural influences instilled a strong sense of resilience, self‑reliance, and respect for communal
    storytelling, while the practical demands of life in a small river town fostered his hands‑on skill set and pragmatic outlook.
attributes:
  skills: '[''Automotive repair'',''Carpentry'',''Basic electrical troubleshooting'',''Computer hardware troubleshooting'',''Project planning and organization'',''Local history research'']'
  hobbies: '[''Reading African American history'',''Chess'',''Fishing'',''Listening to blues music'',''Weightlifting'',''Tinkering with vintage electronics'']'
  career_goals: Arthur aims to secure a stable position in a skilled trade, such as becoming a certified electrician or mechanic, and eventually launch his own handyman service to serve the Natchez community.
    He plans to obtain a GED and pursue vocational certification in HVAC to broaden his opportunities. Financial independence and the ability to provide reliable services are central to his ambition, helping
    him counter stress and negative emotions through concrete achievement.
