  career_goals: Anne aims to leverage her operational expertise to become a store manager within the next two years, then progress to a district manager role where she can influence multiple locations.
    In the longer term, she plans to earn a bachelor’s degree in Business Administration and open a boutique that merges her love of curated art with retail, offering bespoke home-decor and apparel selections.
    She is motivated by meeting high performance standards and achieving measurable sales growth, while maintaining the disciplined, organized approach that defines her work.
