personas:
  professional: An aspiring volunteer docent at the Metropolitan Museum of Art, Eric King combines his self‑taught art‑history expertise, engaging storytelling skills, and improvisational theatre flair
    to captivate visitors, even as his love of spontaneity sometimes clashes with the museum’s rigid schedule and deadline-driven environment.
  sports: A lifelong New York sports fan, Eric King avidly follows the New York Knicks and New York Yankees, joins a senior walking club that meets twice weekly in Central Park, and participates in a community‑center
    volleyball league for seniors, using these activities as both social glue and a gentle way to keep his joints limber despite occasional joint soreness.
  arts: An active watercolor painter and jazz‑record collector, Eric King regularly attends gallery openings featuring artists like Kehinde Wiley and Louise Bourgeois, paints Midtown skylines inspired by
    the improvisational rhythms of Miles Davis and John Coltrane, and contributes to an improvisational storytelling circle where he weaves philosophy and poetry into vivid narratives.
  travel: A spontaneous explorer, Eric King frequently hops on the Metro‑North to discover new Hudson Valley villages, has taken day trips to the Finger Lakes and a weekend to Montreal, and dreams of future
    pilgrimages to the art capitals of Paris, Florence, and Vienna to study masterpieces firsthand while balancing his desire for adventure with a modest travel budget.
  culinary: A curious home‑cook, Eric King delights in preparing classic New York bagels with smoked salmon and capers, experimenting with coq au vin using fresh thyme and red wine, and crafting a roasted
    beet salad drizzled with goat‑cheese crumbles and a hint of truffle oil, all while keeping a well‑stocked spice rack that includes saffron, fresh basil, and smoked paprika.
  core: Eric King is a curious, sociable 73‑year‑old who blends spontaneous creativity with a deep love for art, community, and lifelong learning, even as he wrestles with occasional disorganization and
    bouts of worry.
background:
  cultural: Eric grew up in a middle‑class family in upstate New York with roots in Anglo‑American and Central‑European heritage. Moving to New York City in his twenties immersed him in a multicultural
    environment, where he absorbed the vibrancy of Harlem jazz, the avant‑garde art scene of the Lower East Side, and the diverse cultural festivals of the boroughs. Though his family traditions include
    classic American holidays and a love for folk music, his adult life is shaped by the city’s mosaic of cultures, making him proud of his American identity while deeply appreciating the artistic contributions
    of the many immigrant communities that surround him.
