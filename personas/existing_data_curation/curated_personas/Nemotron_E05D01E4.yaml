  career_goals: He aims to become a volunteer docent at the Metropolitan Museum of Art, where he can share his passion for art with visitors and junior volunteers. He also hopes to launch a community art
    mentorship program connecting senior artists with local high‑school students, and to publish a memoir of his life and artistic journey. Additionally, he wishes to travel to European art capitals such
    as Paris, Florence, and Vienna to deepen his understanding of art movements, and to continue learning a new instrument, the piano, to expand his creative expression.
