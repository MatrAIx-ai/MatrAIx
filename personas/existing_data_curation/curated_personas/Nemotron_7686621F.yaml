  hobbies: '["Visiting art galleries", "Sketching and painting", "Photography (street and nature)", "Creative writing (poetry, short stories)", "Reading contemporary literature", "Yoga and meditation",
    "Cycling and hiking on local trails", "Cooking experimental recipes", "Attending open‑mic and indie music events", "Volunteering for community art projects"]'
  career_goals: Stephanie aims to complete a bachelor's degree in art history or communications while building a portfolio of writing, photography, and design work. She envisions a career in arts administration,
    such as working as an assistant curator or program coordinator at the Kalamazoo Institute of Arts, and eventually curating exhibitions that spotlight emerging regional artists. She also aspires to develop
    a freelance creative practice, offering content creation and visual storytelling services to small businesses and cultural nonprofits.
