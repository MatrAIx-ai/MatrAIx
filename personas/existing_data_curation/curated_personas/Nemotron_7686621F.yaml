personas:
  professional: Stephanie Adams—a budding arts administrator with a knack for digital storytelling—leverages her solid grounding in art history, Canva and Photoshop skills, and community event coordination
    to curate pop‑up exhibitions while juggling a flexible, sometimes chaotic schedule that reflects her relaxed approach to obligations.
  sports: Stephanie Adams embraces an outdoor‑centric fitness routine, cycling the Kalamazoo River Trail and hiking local bluffs while cheering for the Kalamazoo Wings and the Western Michigan Broncos,
    yet her flexible attitude means she sometimes skips scheduled workouts in favor of impromptu art walks.
  arts: Stephanie Adams immerses herself in the regional art scene, attending open‑mic poetry nights, sketching plein‑air at the Kalamazoo Art Center, photographing street murals, and drawing inspiration
    from artists like Yayoi Kusama, photographer Nan Goldin, and musician Mitski, which fuels her ambition to curate exhibitions highlighting emerging local talent.
  travel: Stephanie Adams prefers spontaneous, budget‑friendly travel, often hopping on a weekend train to Chicago for a gallery crawl, taking road trips to the Indiana Dunes for sunrise hikes, and dreaming
    of a future art‑focused pilgrimage to New York’s MoMA, all while balancing a student schedule and a modest travel fund.
  culinary: Stephanie Adams experiments with seasonal produce, whipping up dishes like roasted beet and goat‑cheese tart with sumac, hand‑crafted kimchi using napa cabbage and Korean chili flakes, and kale‑fennel
    salad, cooking at a moderate skill level and delighting a tight‑knit circle of friends, though she sometimes forgets to clean the kitchen afterward.
  core: Stephanie Adams is a curious, art‑obsessed twenty‑one‑year‑old who balances a laid‑back, slightly chaotic lifestyle with a relentless drive to showcase emerging creators, often trading organized
    plans for spontaneous inspiration.
background:
  cultural: Stephanie grew up in a middle‑class white family in the Midwestern town of Kalamazoo, Michigan. Her upbringing reflects typical Midwestern values of community, modesty, and self‑reliance, while
    her parents’ appreciation for education and the arts encouraged her curiosity. She was exposed to local cultural traditions such as the Kalamazoo Art Hop, county fairs, and seasonal outdoor activities,
    which shaped her appreciation for both creative expression and the natural environment. Her European ancestry (German and Irish) informs family customs around holiday celebrations and a modest, down‑to‑earth
    outlook.
attributes:
  skills: '["Creative writing", "Graphic design (Canva, Photoshop)", "Photography", "Art history research", "Social media management", "Event coordination (small community art events)", "Digital illustration",
