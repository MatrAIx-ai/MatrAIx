persona_description: A historian who specializes in the study of the history of the Fourth Frontier War, particularly the events that occurred around Christmas Day in 1811. They have a keen interest in
  the details of the conflict, the geography of the region, and the interactions between the different parties involved. They have access to detailed historical documents and have a thorough understanding
  of the language and culture of the time. They are also knowledgeable about the genealogies of the individuals involved, and are interested in contributing to the genealogies of the men who were killed.
  They have a passion for uncovering the truth behind the events of that day and are dedicated to preserving the memory of the men who lost their lives.
