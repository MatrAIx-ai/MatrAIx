personas:
  professional: Rebecca Steele, the 28‑year‑old, is a dynamic elementary and middle‑school STEM teacher who leverages her STEM degree, Google Classroom mastery, and robotics club leadership to craft project‑based
    lessons, while her structured‑yet‑flexible mindset lets her keep the classroom organized yet open to spontaneous experiments, and her outgoing nature builds strong parent‑teacher partnerships.
  sports: Rebecca Steele, the 28‑year‑old, channels their energy into weekend intramural volleyball with the Middleton Mavericks, seasonal hiking along the Ice Age Trail, and occasional kayaking on Lake
    Mendota, cheering on the Milwaukee Bucks and the Wisconsin Badgers while also being a member of the local Madison Outdoor Club.
  arts: Rebecca Steele, the 28‑year‑old, finds inspiration at the annual Madison World Music Festival, where they’ve danced to the rhythms of Avicii and the soulful folk of Brandi Carlile, unwind with karaoke
    renditions of Beyoncé’s 'Crazy in Love' at neighborhood pubs, and regularly attend performances by the Madison Symphony Orchestra.
  travel: Rebecca Steele, the 28‑year‑old, prefers spontaneous road trips to nearby state parks like Devil’s Lake and the Door County shoreline, but also dreams of a summer backpacking adventure through
    Norway’s fjords, planning itineraries with a mix of Google Trips and handwritten notes, balancing a modest travel budget with a love for both active exploration and relaxed lake‑side evenings.
  culinary: Rebecca Steele, the 28‑year‑old, enjoys farm‑to‑table cooking, frequently preparing roasted beet and goat‑cheese salads, pan‑seared Lake‑Front trout with fresh herbs, and late‑summer apple crisp
    topped with locally sourced cheddar, showcasing a solid intermediate skill level and a penchant for sourcing ingredients at the Middleton farmers’ market.
  core: Rebecca Steele, the 28‑year‑old, blends a structured teaching style with a laid‑back love of outdoor science, spontaneous karaoke, and a habit of misplacing receipts, embodying a friendly, organized‑yet‑flexible
    spirit that keeps both students and friends energized.
background:
  cultural: Rebecca grew up in a Midwestern, white American family in a small Wisconsin town, where community involvement and practical education were emphasized. Her upbringing included traditions like
    annual county fairs, apple picking, and sharing cheese curds with family. These experiences fostered a strong sense of community, modesty, and a love for hands‑on learning, which she now brings into
    her classroom and extracurricular initiatives. Her cultural background also informs her appreciation for seasonal outdoor activities and local volunteerism.
attributes:
  skills: '["Curriculum development", "STEM instruction", "Classroom management", "Differentiated instruction", "Project‑based learning", "Technology integration (Google Classroom, Seesaw, SMART Board)",
