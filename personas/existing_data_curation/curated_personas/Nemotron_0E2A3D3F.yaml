  hobbies: '["Hiking the Ice Age Trail", "Volunteering at the Middleton public library''s STEM storytime", "Playing intramural volleyball", "Leading a weekend DIY science‑experiment club", "Cooking farm‑to‑table
    meals", "Attending local music festivals", "Karaoke nights with friends"]'
  career_goals: Rebecca aspires to become a STEM curriculum coordinator within her district, where she can shape district‑wide instructional standards and mentor fellow teachers. She plans to pursue a master's
    degree in Educational Leadership to qualify for roles such as Instructional Coach or Assistant Principal. Long‑term, she hopes to launch a community STEM outreach program that partners local schools,
    libraries, and tech companies to provide hands‑on learning opportunities for under‑served youth in Dane County.
