persona_description: A researcher or analyst who is interested in understanding the trends and changes in substance use prevalence over the past three decades, and is familiar with the methodology and analysis
  techniques used in the National Survey on Drug Use and Health (NSDUH) reports. The individual is likely to be familiar with the Detailed Tables and the table types used in the NSDUH reports, and is interested
  in the revisions made to the tables in the 2004 NSDUH report. The individual is likely to have a background in statistics and research methodology, and is interested in the implications of the revisions
  made to the tables for the understanding of substance use trends.
