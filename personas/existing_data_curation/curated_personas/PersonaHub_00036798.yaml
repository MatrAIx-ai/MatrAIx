persona_description: A development economist who specializes in the analysis of population growth, its implications for society and economy, and the need for effective fertility control measures. He has
  extensive knowledge of the demographic trends in Lesotho and is concerned about the potential consequences of the current rate of population growth, including the doubling of the population in less than
  three decades and the exacerbation of social and political unrest. He is also aware of the challenges posed by the growing number of returning migrant workers from South Africa, the demand for social
  services like health and education, the deteriorating quality of health services, and the diminishing household assets. He is particularly concerned about the food deficit in Lesotho and the need for
  effective measures to ensure food security.
