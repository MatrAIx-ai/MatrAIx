  career_goals: Robert aims to steer his company toward sustainable, international expansion that respects cultural nuance and social responsibility. He plans to launch a mentorship program that cultivates
    diverse future leaders, and eventually transition to a board‑level or advisory role influencing industry standards. In the long term, he aspires to create a charitable foundation dedicated to arts education
    and community development in the Miami area, reinforcing his commitment to cultural enrichment and public good.
