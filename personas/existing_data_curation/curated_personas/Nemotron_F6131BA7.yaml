  hobbies: '["Sketching", "Visiting art galleries", "Abstract painting", "Reading philosophy", "Reading modern poetry", "Crossword puzzles", "Cryptic riddles", "Herb gardening", "Wildflower gardening",
    "Senior book club", "Mentoring museum volunteers", "Amateur astronomy", "Attending public lectures"]'
  career_goals: She aspires to stage a solo exhibition at the St. Charles County Historical Society Gallery, publish a limited‑edition chapbook of poems and micro‑stories, and launch a mentorship program
    for emerging senior artists in her community. Over the next five years she hopes to explore new artistic mediums such as mixed‑media collage and virtual‑reality sketching, and to travel to at least
    three major U.S. art museums. Additionally, Samantha wants to document her family’s oral histories and compile them into a community archive, contributing to the preservation of regional cultural memory.
