personas:
  professional: Samantha Samford is a veteran community art curator and workshop facilitator whose calm resilience and competitive streak drive her to meticulously organize senior art exhibitions while
    often juggling a delightfully chaotic schedule of sketching sessions and genealogical research.
  sports: Samantha Samford enjoys low‑impact fitness like weekly walks along the Saint Peters Riverfront and occasional senior tennis matches, cheers on the St. Louis Cardinals and the St. Louis Blues,
    and participates in a local walking club that meets at the county fairgrounds, reflecting a flexible yet competitive spirit toward staying active.
  arts: Samantha Samford immerses herself in abstract art, frequently visiting the St. Louis Art Museum, the Contemporary Art Museum St. Louis, and admiring works by Jackson Pollock, Mark Rothko, and Marina
    Abramović, while also writing poetry inspired by Wallace Stevens and T.S. Eliot, and they often sketch in the riverfront park, channeling their boundless curiosity into both visual and literary creation.
  travel: Samantha Samford prefers spontaneous, curiosity‑driven trips to major art institutions such as the Metropolitan Museum of Art in New York, the Art Institute of Chicago, and the Getty Center in
    Los Angeles, while also relishing weekend getaways to the historic St. Charles County Fair and quaint river towns, balancing limited senior travel budgets with a desire for cultural immersion.
  culinary: Samantha Samford cultivates a small herb and wildflower garden that supplies fresh thyme, rosemary, and lavender for simple dishes like herb‑infused roasted chicken, wildflower salad with goat
    cheese, and occasional Mediterranean stews, while they also enjoy comfort foods like fried catfish with hush‑puppy batter, savoring the flavors of their Missouri roots.
  core: Samantha Samford is a calm, ever‑curious 76‑year‑old who blends abstract painting, genealogy, and modest living into a slightly disorganized yet fiercely competitive pursuit of artistic legacy.
background:
  cultural: Samantha’s cultural background is rooted in Midwestern American traditions typical of St. Peters and St. Charles County. Her family ancestry traces back to German and Irish immigrants who settled
    in Missouri in the late 19th century. She was raised in a Methodist household that emphasized community service, modesty, and self‑reliance. The region’s strong appreciation for local history, seasonal
    fairs, and church‑based social activities shaped her sense of belonging. While she respects these traditions, her lifelong curiosity has fostered a cosmopolitan appreciation for global art and literature.
