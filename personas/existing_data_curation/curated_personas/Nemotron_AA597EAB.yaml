  career_goals: Looking ahead, Teresita aims to transition into a supervisory or training role within the customer service department, leveraging her mentorship experience to develop a cohesive team. She
    plans to obtain a certification in Customer Service Management and explore opportunities to lead bilingual support initiatives that serve the growing Hispanic community in Yakima. Over the next five
    years, she hopes to contribute to corporate process improvement projects, while also preparing for a gradual retirement that includes part‑time consulting or community outreach work focused on consumer
    rights education.
