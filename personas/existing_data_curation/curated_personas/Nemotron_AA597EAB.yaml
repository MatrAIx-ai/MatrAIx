personas:
  professional: A bilingual customer service specialist with a talent for conflict resolution, Teresita Santamaria leverages their empathetic listening and CRM expertise to streamline case management while
    mentoring new hires, embodying a curious yet organized approach to leadership.
  sports: A weekend hiker and occasional soccer enthusiast, Teresita Santamaria participates in the Yakima FC women’s recreational league, cheers on the Seattle Seahawks in the fall, and joins a local walking
    group that traverses the Yakima River Canyon each spring.
  arts: An avid patron of the arts, Teresita Santamaria frequents the Yakima Art Museum, paints watercolor scenes inspired by Ansel Adams' landscapes, and enjoys live performances by local theater troupe
    2M3 and listening to folk musician Mary Chapin Carpenter.
  travel: A meticulous planner with a love for scenic retreats, Teresita Santamaria has mapped out trips to the vineyards of Napa Valley, weekend getaways along the Oregon Coast, and a dream pilgrimage
    to the historic streets of Granada, balancing travel expenses with a modest savings plan.
  culinary: A seasoned home cook, Teresita Santamaria expertly prepares mole poblano with ancho chilies and chocolate, bakes fresh sourdough using local Yakima wheat, and relishes pairing their meals with
    Pinot Noir from the Yakima Valley.
  core: Teresita Santamaria blends curiosity with discipline, juggling bilingual mentorship, watercolor painting, and a love for wine, all while occasionally procrastinating on dental check-ups.
background:
  cultural: Teresita grew up in a Mexican‑American household where Spanish was spoken alongside English, fostering a deep appreciation for both cultures. Family gatherings centered around shared meals,
    music, and celebrations of holidays such as Día de los Muertos and Mexican Independence Day, instilling a strong sense of heritage. Her upbringing in the agricultural region of Yakima exposed her to
    the migrant labor history and the close‑knit Hispanic community, influencing her values of hard work, hospitality, and community solidarity. While she embraces the broader Pacific Northwest lifestyle,
    she maintains cultural traditions through cooking, bilingual communication, and participation in local cultural festivals.
