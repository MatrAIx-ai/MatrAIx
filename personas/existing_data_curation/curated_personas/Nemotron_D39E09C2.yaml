  hobbies: '[''Reading historical biographies'', ''Puzzle solving (crossword, Sudoku, logic games)'', ''Vegetable gardening'', ''Knitting and crochet'', ''Genealogical research'', ''Architectural photography'',
    ''Collecting vintage jazz records'', ''Online chess and Sudoku tournaments'', ''Online learning (programming, culinary arts)'']'
  career_goals: Although not currently employed, Heather aims to earn a certification in data analytics or archival science within the next two years, allowing her to volunteer as a grant writer and archival
    consultant for the Villa Park Historical Society. She plans to publish a memoir that chronicles her self-directed path and to launch a small consultancy offering budgeting and organization services
    to seniors in DuPage County. Additionally, she hopes to qualify for senior-level online chess and Sudoku tournaments, using her competitive drive to achieve recognitions in these solitary contests.
