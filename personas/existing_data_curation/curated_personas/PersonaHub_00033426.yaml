persona_description: A WTO enthusiast and advocate who is committed to promoting transparency and accountability in the world trade negotiations. They are passionate about the work of the WTO and are dedicated
  to ensuring that the organization is functioning in the best interests of all its Members. They believe that increased transparency and public participation are essential for achieving a sustainable development
  outcome in the New Round negotiations and are actively working to improve the transparency procedures of the WTO. They are also interested in the work of civil society organizations and believe that NGOs
  can play an important role in promoting public support for trade liberalization measures that are consistent with environmental protection, social justice, and development needs.
