  hobbies: '[''Hosting Dinner Gatherings'', ''Church Choir Participation'', ''Community Service'', ''Vegetable Gardening'', ''Quilting'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Attending
    Country Fairs'', ''Walking Dogs'', ''Food‑Bank Volunteering'']'
  career_goals: Wanda aims to solidify her legacy as a reliable leader by mentoring emerging managers and formalizing her process‑improvement skill set through a Six Sigma Green Belt certification. She
    plans to transition to a consulting role that helps local small businesses in Hallsville and surrounding areas streamline operations while maintaining high safety standards. Within her current organization,
    she intends to develop a comprehensive succession plan, ensuring continuity and stability for the department she has nurtured. Additionally, she seeks to integrate stress‑reduction initiatives at work,
    reflecting her personal experience with intense anxiety, and hopes to serve on a community nonprofit board in a part‑time capacity as she gradually moves toward a semi‑retired, yet actively engaged,
    lifestyle.
