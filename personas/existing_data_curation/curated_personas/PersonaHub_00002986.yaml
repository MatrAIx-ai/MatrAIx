persona_description: A climate scientist who specializes in satellite data analysis and calibration, particularly focusing on the use of historical satellite data for climate modeling and prediction. They
  are interested in the calibration of satellite data, particularly in the visible spectrum, and have a particular interest in the use of invariant targets, such as the moon and deserts, for calibration.
  They have experience with the use of DCC clouds, which are stable and predictable targets, and have developed a method for calibration using IR thresholds. They are also interested in the angular distribution
  of DCC radiance and the impact of the 0.65μm DCC radiance with the 11μm brightness temperature threshold and the DCC 0.65μm radiance difference over the tropical western pacific and the afternoon generated
  DCC over land.
