personas:
  professional: Angelita Pham, though only one year old, already shows a budding curiosity for patterns as a tiny explorer of shapes, practicing fine motor skills through block stacking which hints at future
    interests in engineering, and they thrive on a predictable feeding schedule while occasionally delighting in spontaneous giggles that reveal a flexible side.
  sports: Angelita Pham delights in crawling races at the local indoor play gym, participates in a weekly baby gymnastics class at Tiny Turtles Club, and cheerfully waves a tiny flag for the Metro Rockets
    baseball team alongside the family, balancing structured activity time with flexible free‑play moments.
  arts: Angelita Pham is enchanted by the gentle melodies of Raffi, the soothing tunes of the Baby Einstein series, and the bright illustrations of Sesame Street, often humming along and giggling, which
    nurtures an early love for music and visual storytelling while they enjoy the predictable rhythm of bedtime storytime.
  travel: Angelita Pham enjoys family outings to the city zoo and the coastal aquarium, cherishes the sensory wonder of a day at the nearby botanical garden, and dreams of strolling through the immersive
    world of Disney theme parks in Anaheim, embracing both planned excursions and spontaneous pit stops, and they eagerly anticipate each new adventure.
  culinary: Angelita Pham loves the sweet smoothness of mashed banana, the buttery richness of avocado puree, and the subtle crunch of tiny peas on their high‑chair tray, showing an evolving palate while
    they clutch a soft wooden spoon and occasionally refuse the occasional new texture.
  core: Angelita Pham, a one‑year‑old who balances structured routines with spontaneous play, charms with an unshakeable calm, a quirky refusal of nap time, and a growing curiosity about the world’s textures
    and sounds, and they often greet each day with a shy smile.
background:
  cultural: Angelita is raised in a Southeast Asian (Vietnamese‑American) household in Rosedale, Queens. Her parents blend traditional Vietnamese customs—such as celebrating Tet, preparing pho and bánh
    mì, and speaking Vietnamese at home—with the multicultural environment of New York City. She attends a local bilingual preschool that supports both English and Vietnamese language development. Family
    gatherings emphasize respect for elders, communal meals, and storytelling, giving Angelita a strong sense of cultural identity while also embracing the diverse community around her.
