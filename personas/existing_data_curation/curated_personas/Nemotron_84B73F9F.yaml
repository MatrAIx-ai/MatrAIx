  career_goals: Although only a toddler, Angelita already shows a budding curiosity about learning. Her family encourages her to explore a wide range of experiences, so her long‑term goal is simply to become
    a lifelong learner—first by thriving in preschool, then by discovering a passion, whether it be in the arts, science, or helping others. She often says, in her own babble, that she wants to "draw lots"
    and "make friends," hinting at future ambitions of becoming an artist or community‑oriented individual.
