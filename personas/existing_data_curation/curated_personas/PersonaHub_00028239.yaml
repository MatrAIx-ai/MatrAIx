persona_description: A diabetes management and health living educator who is dedicated to addressing the needs of Aboriginal communities through education, tools, clinics, and one-on-one counseling. This
  individual is knowledgeable about diabetes mellitus Type 2, particularly in the context of First Nations and Inuit populations, and has experience working with the Aboriginal Urban Diabetes Initiative
  in Edmonton, Alberta. They are passionate about improving the lives of people affected by diabetes and those at risk among Aboriginal and Torres Strait Islander communities in Ontario.
