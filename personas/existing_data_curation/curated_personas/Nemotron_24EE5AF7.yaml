  career_goals: Even at 87, Joseph remains eager to contribute his experience to the community. He aims to mentor younger volunteers at the senior center, preserve and share local history through the town’s
    historical society, and document his life lessons in a memoir for his grandchildren. He also hopes to ensure the continuity of the neighborhood garden and promote intergenerational programs that foster
    curiosity and practical learning. His ambition is to leave a legacy of compassion, cooperation, and quiet resilience.
