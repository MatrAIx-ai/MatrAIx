  hobbies: '["DIY home projects", "Woodworking", "3D printing", "Reading sci‑fi and engineering literature", "Playing keyboard", "Listening to jazz and neo‑soul", "Basketball (pickup games)", "Hiking and
    river trail walks", "Mentoring youth in trade programs"]'
  career_goals: Lamin aims to earn certifications as a Certified Welding Specialist and a CNC Programming Technician within the next two years. He plans to complete an associate degree in Industrial Technology
    to deepen his design knowledge, then move into a foreman role on commercial construction projects. Long‑term, he envisions opening his own metal‑fabrication shop that focuses on sustainable building
    components, while also establishing a mentorship program for high‑school students interested in skilled trades.
