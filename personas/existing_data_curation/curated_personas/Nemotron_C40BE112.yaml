  hobbies: '[''Painting'', ''Photography'', ''Salsa dancing'', ''Hiking'', ''Cooking Spanish dishes'', ''Visiting art galleries'', ''Community theater'', ''Group volleyball'', ''Volunteer work with seniors'',
    ''Exploring new music'']'
  career_goals: Marcelo aims to formalize his expertise by earning a Certified Nursing Assistant (CNA) credential and eventually completing an associate degree in health sciences. He envisions moving into
    a supervisory role as a home health coordinator, where he can design and lead community‑based wellness programs that integrate art and creative activities for elderly clients. Long‑term, he hopes to
    launch a small nonprofit that provides art‑therapy workshops and cultural enrichment events for seniors in New Castle County, leveraging his Spanish heritage and love of the arts to foster social connection
    and mental wellbeing.
