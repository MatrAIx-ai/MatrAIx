personas:
  professional: Marcelo is a bilingual home health aide who delivers compassionate patient care, performs basic wound care and medication coordination under supervision, and they infuse each shift with
    a relaxed, improvisational style and a curious eye for art, frequently designing simple creative activities to boost seniors' mood and engagement.
  sports: Marcelo stays active by hiking the trails of White Clay Creek State Park, they also partake in lively salsa dancing nights that double as cardio, and they follow the Philadelphia Eagles and Phillies
    with a casual fan enthusiasm, occasionally joining the local White Clay Trail Club's weekend group walks.
  arts: Marcelo nurtures a vibrant artistic life, painting urban scenes inspired by the works of Edward Hopper, capturing candid street moments in the style of Henri Cartier-Bresson, curating community
    art-making sessions that echo the participatory ethos of Yayoi Kusama, and they attend performances by the Delaware Repertory Company and concerts featuring pianist Lang Lang.
  travel: Marcelo prefers spontaneous weekend getaways, often strolling through the historic streets of Wilmington and hiking the Pennsylvania Poconos, they also dream of a cultural pilgrimage to Barcelona's
    museums, balancing modest travel budgets with an appetite for immersive art-focused experiences.
  culinary: Marcelo enjoys cooking paella Valenciana with saffron and chorizo, gazpacho with fresh tomatoes and cucumbers, and a simple tortilla de patatas, wielding a moderate kitchen skill set that they
    blend with authentic family recipes and occasional experimental twists like adding smoked paprika to classic marinades.
  core: Marcelo blends a relaxed, sometimes disorganized lifestyle with a boundless curiosity for art, using spontaneous paint-splashes and salsa steps to weave community connections while they occasionally
    let bills pile up until reminder nudges them back on track.
background:
  cultural: Marcelo is of Spanish descent, with his family roots tracing back to Andalusia. While he was born and raised in the United States, he grew up in a bilingual household where Spanish language,
    cuisine, and traditions such as Semana Santa and the Feria were integral to family life. He maintains a strong connection to his heritage by speaking Spanish at home, preparing paella and tapas for
    gatherings, and participating in local cultural festivals that celebrate Spanish music and dance. Living in Newark, DE, he blends this cultural identity with the Mid‑Atlantic community, contributing
    his multicultural perspective to his work and social circles.
attributes:
  skills: '[''Patient care'', ''Basic wound care'', ''Medication administration assistance'', ''Bilingual communication (Spanish/English)'', ''Empathy and active listening'', ''Community resource coordination'',
