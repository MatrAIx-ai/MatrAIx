personas:
  professional: Beth Bryant is a budding naturalist-engineer who blends a love of wildlife sketching with LEGO architecture, writes interactive Scratch stories about animals, and approaches each project
    with calm curiosity balanced by practical step-by-step planning, and they often choose quiet study corners to focus.
  sports: Beth Bryant is a member of the Saturday Morning Nature Walk Club and participates in a community junior swimming lesson, while cheering quietly for the nearby junior baseball team, the Riverdale
    Rangers, preferring individual, low-key physical activities over noisy team sports, and they enjoy the calm rhythm of a solo bike ride along the park trail.
  arts: Beth Bryant channels their love of nature into detailed animal sketches inspired by Beatrix Potter and Studio Ghibli’s "My Neighbor Totoro", enjoys listening to Raffi’s "Baby Beluga" while building
    LEGO creations, and delights in acting out short stories with friends using voices reminiscent of Disney’s Pixar characters, and they often experiment with drawing new animal characters after each birdwatching
    outing.
  travel: Beth Bryant prefers carefully planned family road trips to nature-rich destinations like Yellowstone National Park and the San Diego Zoo, where they can roam quiet trails and birdwatch, while
    dreaming of future adventures to the Galapagos Islands and New Zealand’s South Island for even more exotic wildlife encounters.
  culinary: Beth Bryant enjoys crunchy carrot sticks and apple slices as snacks, loves helping to whisk together simple oatmeal with cinnamon and honey for breakfast, and takes pride in crafting no-bake
    granola bars featuring rolled oats, dried cranberries, and almond butter, while occasionally indulging in cheesy pizza with pepperoni on family movie nights, and they often suggest new fruit combinations
    for the next snack.
  core: Beth Bryant is an eight-year-old quiet explorer whose relentless curiosity fuels detailed animal sketches, intricate LEGO worlds, and serene birdwatching, all while maintaining a remarkably calm
    disposition and a secret stash of glitter stickers, and they cherish solitary moments to dream up new adventures.
background:
  cultural: Beth grows up in a Midwestern white American family in Bellevue, Nebraska, where community values of self‑reliance, modesty, and a strong work ethic are emphasized. Her family participates in
    local church gatherings, celebrates traditional American holidays, and encourages appreciation of the outdoors and agriculture. The prairie landscape and nearby farms foster her love for nature and
    animals, while the close‑knit community reinforces her cooperative yet assertive nature. This cultural setting supports her calm resilience, practical curiosity, and preference for quiet, solitary activities.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Creative writing'', ''Sketch drawing'', ''LEGO construction'', ''Basic science experiments'', ''Block-based coding (Scratch)'', ''Nature observation'',
    ''Organizational skills'']'
  hobbies: '[''Reading nature and science books'', ''Sketching wildlife'', ''LEGO building'', ''Birdwatching'', ''Gardening'', ''Block-based coding (Scratch)'', ''Writing animal stories'', ''Collecting
    rocks'', ''Puzzle solving'']'
  career_goals: Beth dreams of becoming a wildlife biologist or veterinarian who studies and protects the animals of the Great Plains. She also hopes to design educational games that teach other kids about
    science and nature, combining her curiosity for new ideas with her practical skill set. Her long‑term ambition is to attend a university with a strong biology program, conduct field research, and later
    work at a conservation center or wildlife rehabilitation facility in Nebraska.
