personas:
  professional: Nita Stevens is a curious kindergarten explorer who loves building simple structures with blocks and conducting tiny science experiments, displaying a blend of inventive curiosity and practical
    problem‑solving while shunning overly rigid classroom schedules and thriving in flexible, hands‑on learning environments.
  sports: Nita Stevens dashes around the local playground as part of the Little Sprinters Soccer Club, cheers on the nearby baseball team, the Detroit Tigers, during family outings, and blissfully splashes
    in the community pool on warm afternoons, reflecting a spontaneous love for movement and teamwork.
  arts: Nita Stevens delights in drawing bright dinosaurs inspired by the works of Dr. Seuss, sings along to the catchy tunes of Disney’s Frozen soundtrack featuring Idina Menzel, and giggles at the playful
    antics of Sesame Street’s Elmo, weaving these artistic influences into daily playtime.
  travel: Nita Stevens dreams of returning to the Magic Kingdom in Orlando, revisits Grandma’s coastal cottage in Maine each summer, and fancies a future trip to the Great Barrier Reef, favoring family‑led
    itineraries that blend familiar comforts with the thrill of discovering new playgrounds.
  culinary: Nita Stevens loves munching on cheddar‑filled macaroni, scooping crunchy carrot sticks with hummus, and getting hands‑on with mixing batter for chocolate chip pancakes, proudly claiming their
    secret ingredient is a dash of cinnamon.
  core: Nita Stevens is a kind, curious five‑year‑old who balances spontaneous play with practical problem‑solving, loves quick snack adventures, and keeps a tidy piggy bank while happily navigating the
    ups and downs of early childhood.
background:
  cultural: Nita grows up in a Midwestern white family in Omaha, Nebraska, where community values such as friendliness, cooperation, and respect for nature are emphasized. Her family celebrates traditional
    holidays like Thanksgiving and Fourth of July with neighborhood picnics and local fireworks, and they often participate in community events such as farmers market visits and church-based kids programs.
    The region's open plains, agricultural roots, and close-knit neighborhoods shape her appreciation for the outdoors, practical problem-solving, and caring for others.
