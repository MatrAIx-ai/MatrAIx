  career_goals: Even though she is only five, Nita loves thinking about the future. She often says she wants to be a teacher so she can share her love of stories and help other kids learn, or a veterinarian
    because she wants to care for animals she meets at the local farm and the zoo. Her practical side also leads her to imagine becoming a park ranger to keep the parks in Omaha clean and safe, showing
    her desire to combine curiosity about nature with helping the community.
