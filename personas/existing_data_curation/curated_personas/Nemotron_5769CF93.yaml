personas:
  professional: Jasmin Schatz is an aspiring concept artist who blends strong sketching and digital photography skills with a reliable, organized approach to school art projects, allowing them to experiment
    freely while consistently meeting deadlines.
  sports: Jasmin Schatz enjoys weekend bike rides along the Wapsipinicon River trail and competes on the middle‑school track and field team specializing in the 800‑meter run, while cheering on the Iowa
    Hawkeyes football and the Chicago Cubs baseball teams.
  arts: Jasmin Schatz blends a love of fantasy novels—especially Brandon Sanderson’s Stormlight Archive—with an ear for indie musicians like Phoebe Bridgers and Tame Impala, channeling that inspiration
    into detailed sketches that echo the moody realism of Andrew Wyeth, and they frequently organize DIY art workshops for younger children at the local library.
  travel: Jasmin Schatz has explored the Art Institute of Chicago and the rugged scenery of Badlands National Park, and they long to backpack through Iceland’s waterfalls and the Scottish Highlands, preferring
    a mix of structured school field trips and spontaneous family road trips while carefully budgeting travel funds saved from their allowance.
  culinary: Jasmin Schatz delights in crafting homemade thin‑crust pizza topped with fresh mozzarella, basil, and locally sourced tomatoes, baking sweet apple crisp with Granny Smith apples, cinnamon, and
    oat crumble, and experimenting on weekends with simple Scandinavian‑inspired lefse made from potatoes, butter, and flour, though they sometimes over‑salt their sauces.
  core: Jasmin Schatz is a curiosity‑driven teen who balances meticulous schoolwork with spontaneous sketch‑sessions in nature, hoards limited‑edition vinyls, habitually forgets to floss after late‑night
    art marathons, and dreams of turning their doodles into comic‑book panels.
background:
  cultural: Jasmin comes from a white Midwestern family in Anamosa, Iowa, with ancestral roots in German and Scandinavian farming communities that have settled in Linn County for generations. The local
    culture values community involvement, modesty, and a strong work ethic, reflected in traditions such as county fairs, school performances, and church gatherings. Growing up in a small‑town environment,
    she benefits from supportive public‑school arts programs and a close‑knit community that encourages both creative expression and practical responsibility. While she embraces these Midwestern values,
    she also engages with broader American pop culture through music, literature, and digital media, providing a balanced perspective that shapes her curiosity and openness to new ideas.
