  career_goals: Jasmin aspires to attend a high school with a strong visual arts program and build a portfolio that will allow her to study graphic design or illustration at university. She dreams of using
    her artistic talents to create meaningful visual stories, eventually working as a freelance illustrator or design teacher, and contributing to local community art projects. She also hopes to combine
    her interest in technology and art by exploring digital media careers in the future.
