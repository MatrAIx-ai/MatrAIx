  hobbies: '[''Gardening'', ''Traditional Salvadoran cooking'', ''Playing dominoes'', ''Attending church services'', ''Listening to classic boleros'', ''Walking in local parks'']'
  career_goals: Although retired from formal employment, Renato aims to remain a reliable pillar for his family and community. His primary ambition is to preserve and pass on Salvadoran cultural traditions
    to his grandchildren while maintaining his health and emotional well‑being. He hopes to expand his volunteer role at the local community center, lead a small cooking class that teaches pupusas and tamales,
    and establish a modest garden that supplies fresh produce for church outreach programs. Financially, he seeks to keep his savings stable and manageable, avoiding unnecessary risk.
