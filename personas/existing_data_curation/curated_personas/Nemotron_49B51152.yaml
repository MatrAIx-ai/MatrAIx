personas:
  professional: Cedric Miller, an aspiring digital illustrator and street‑photography enthusiast, merges a curious, open‑minded outlook with a competitive drive to experiment with bold color palettes and
    narrative concepts, and they often push the boundaries of assignments in the school art club while skeptically weighing peers’ critiques.
  sports: Cedric Miller, an energetic pick‑up basketball player at the local community gym, channels a competitive edge into fast‑break drills and follows the Washington Wizards for inspiration, yet they
    also enjoy occasional weekend matches with the Fredericksburg youth league and skeptically assess teammates’ commitment during games.
  arts: Cedric Miller, a dedicated member of the school art club who spends free time sketching characters and creating digital pieces influenced by the gritty aesthetics of Banksy, the vibrant storytelling
    of Alex Ross, and the rhythmic flow of Kendrick Lamar and SZA, regularly captures downtown Fredericksburg in street‑photography, and they eagerly dissect sci‑fi novels like Dune to fuel their visual
    imagination.
  travel: Cedric Miller, an inquisitive teen who prefers short, budget‑friendly road trips, often explores Washington, D.C.’s museums and murals, dreams of wandering Tokyo’s neon districts for inspiration,
    and they meticulously plan each outing with a spreadsheet to balance school responsibilities and parental constraints.
  culinary: Cedric Miller, a budding home cook with a penchant for bold flavors, gravitates toward spicy ramen topped with soft‑boiled eggs, whips up chicken‑and‑waffles for weekend brunch, and they love
    experimenting with jalapeño‑infused guacamole, though they sometimes neglect vegetables when rushed after basketball practice.
  core: Cedric Miller, a 15‑year‑old whose restless creativity is tempered by anxiety, channels a competitive spirit into art, basketball, and meticulous budgeting, while they constantly question others’
    motives and worry about meeting high personal standards.
background:
  cultural: Cedric was raised in a close‑knit African‑American family in Spotsylvania County, where the legacy of the local civil‑rights movement and the vibrant heritage of the Fredericksburg African‑American
    community shape his identity. Family gatherings feature gospel music, soulful cooking, and storytelling that reinforce his cultural roots. He attends a historically Black church that emphasizes community
    service and artistic expression, influencing his involvement in events like the annual African‑American Heritage Celebration. The blend of Southern traditions, urban hip‑hop culture, and the region's
    rich history informs his worldview and fuels his creative voice.
attributes:
  skills: '["Digital illustration", "Basic Python programming", "Photography", "Basketball", "Public speaking", "Event coordination"]'
  hobbies: '["Sketching", "Digital art", "Street photography", "Basketball", "Hip‑hop and R&B music", "Strategy video games", "Reading science‑fiction", "Community art workshops"]'
  career_goals: Cedric aims to merge his artistic talent and tech curiosity by pursuing a career in multimedia design, such as becoming a graphic artist for video games or a digital content creator. He
    also wants to mentor younger peers through youth art programs in his community, eventually securing a role that balances creative influence with financial stability to ease his worries about the future.
