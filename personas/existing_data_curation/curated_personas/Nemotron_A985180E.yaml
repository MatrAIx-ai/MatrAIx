  career_goals: Although retired, Ursula aims to stay actively engaged in her community. She plans to mentor younger neighbors through workshops on cooking, gardening, and basic digital skills. Preserving
    her family’s history is a priority, so she intends to complete a comprehensive genealogy project and share stories at local senior centers. Travel is another ambition—she hopes to take leisurely road
    trips with her husband through the Blue Ridge Mountains and coastal Carolina. Additionally, Ursula dreams of expanding the community garden she helped start, turning it into a hub for neighborhood cooking
    classes and seasonal festivals.
