  career_goals: Amelia dreams of becoming an elementary-school teacher who can create a structured, supportive classroom where every student can thrive. In the near term she is determined to win the upcoming
    school science fair and earn a place on the school debate team, milestones that will strengthen her confidence and academic record. Long-term she imagines studying architecture or civil engineering,
    inspired by the intricate LEGO models she builds, and eventually designing functional, beautiful spaces that serve her community.
