personas:
  professional: Amelia Bordelon is a budding youth programmer who builds simple games on Scratch, leads her after‑school soccer team as a forward, and applies their meticulous, organized mindset to every
    project, turning group activities into structured successes; they thrive on clear objectives and enjoy setting deadlines for themselves.
  sports: Amelia Bordelon plays forward for the school’s soccer team, trains with the local youth club the Greenfield Strikers, and cheers for Atlanta United and the Atlanta Braves, balancing competitive
    drills with a disciplined routine that satisfies their love for structure and teamwork; they relish the camaraderie of after‑practice gatherings.
  arts: Amelia Bordelon sings in the school choir, draws inspiration from pop star Taylor Swift, musical storyteller Lin‑Manuel Miranda, and Disney‑Pixar films like ‘Coco’, and they weave these artistic
    influences into their creative Scratch games and intricate LEGO builds.
  travel: Amelia Bordelon enjoys family trips to the Grand Canyon and Disneyland, meticulously plans weekend outings to nearby museums using checklists, and dreams of visiting Tokyo’s interactive science
    museums and Paris’s iconic art galleries when their budget permits; they love collecting postcards from each destination.
  culinary: Amelia Bordelon prefers comforting dishes like pepperoni pizza, cheesy macaroni, and strawberry shortcake, experiments with simple recipes such as fruit kebabs shaped like LEGO bricks, and they
    eagerly try new ingredients like avocado and mango in school lunches.
  core: Amelia Bordelon is an organized, high‑energy ten‑year‑old who thrives on structured group activities, worries about perfection, and they channel their meticulous nature into soccer, coding, and
    LEGO building while occasionally over‑indulging in sugary snacks.
background:
  cultural: Amelia was raised in a middle-class white family in Edison, New Jersey. Her parents, both professionals, emphasize the importance of education, punctuality, and community involvement. Though
    her heritage is primarily Northern European (Irish-German), growing up in the culturally diverse Middlesex County has exposed her to a variety of traditions—she celebrates Thanksgiving, Christmas, and
    Fourth of July alongside neighborhood festivals that feature foods and customs from many cultures. She attends a public elementary school where she interacts daily with classmates from a wide range
    of ethnic backgrounds, fostering an early appreciation for diversity while maintaining her own family's values of hard work and organized living.
