personas:
  professional: Hannah Allen is a budding junior scientist who channels their love for order and practical problem‑solving into weekly Girl Scout badge projects, Minecraft creations, and leading the school’s
    soccer team with a blend of structured drills and spontaneous teamwork, and they stay emotionally steady under pressure.
  sports: Hannah Allen is an enthusiastic member of the Wichita Falls Youth Soccer Association who idolizes the Dallas Cowboys and Dallas Mavericks, practices soccer in the fall and basketball in the winter,
    and they approach fitness with a balance of structured team drills and flexible, spontaneous pick‑up games at the local park.
  arts: Hannah Allen is a lively choir singer who loves belting out Taylor Swift’s “Shake It Off” and Luke Bryan’s “Country Girl (Shake It For Me)” during school performances, sketches adventure scenes
    inspired by mystery novels they read, and they regularly watch Disney’s “Frozen” and the “Harry Potter” series for artistic inspiration.
  travel: Hannah Allen is a budding traveler who has taken family road trips to Lake Wichita for fireworks, visited the Grand Canyon on a school field trip, dreams of exploring Mexico City’s vibrant markets,
    and they prefer flexible itineraries that allow spontaneous stops at local fairs.
  culinary: Hannah Allen is a budding home cook who enjoys mixing basic ingredients like cheddar cheese, ground beef, and tortillas to make tacos, helps bake cornbread with a hint of honey, and they delight
    in the smoky flavor of Texas BBQ ribs on family cookouts, though they sometimes over‑season the mac and cheese.
  core: Hannah Allen blends a love for structure with a playful flexibility, turning soccer drills, Minecraft builds, and Girl Scout projects into a vibrant, community‑focused life punctuated by occasional
    candy‑induced disorganization.
background:
  cultural: Hannah’s cultural background is rooted in a typical middle‑class white family in Wichita Falls, Texas. The community’s Southern‑West Texas values—friendliness, strong family ties, and a sense
    of neighborhood pride—shape her daily life. She celebrates holidays such as Thanksgiving and Christmas with extended family gatherings, and she enjoys local traditions like the annual Independence Day
    fireworks over Lake Wichita. Her family’s cultural influences include country and pop music, Texas BBQ, and occasional trips to nearby ranches or farms, where she learns about livestock and outdoor
    life. Though largely homogenous, the city’s growing diversity exposes her to Mexican and African‑American cultural elements through school and community events, broadening her perspective. Church attendance
    and participation in community service through Girl Scouts also reinforce a spirit of giving and cooperation that characterizes her upbringing.
