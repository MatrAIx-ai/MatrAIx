  career_goals: Hannah dreams of a future where she can combine her love for animals, her practical mindset, and her friendly personality. She is most excited about becoming a veterinarian, a career that
    offers clear scientific training and the chance to care for pets and wildlife. She also imagines working as an elementary school teacher or a community youth mentor, roles that let her use her leadership
    in group settings and supportive nature. While she values the routine and clear guidelines of a medical or educational profession, she also hopes to keep room for flexibility, perhaps by organizing
    school events or leading summer camps. In the near term, she aims to excel in science classes, volunteer at the local animal shelter, and take on more responsibilities in school clubs to build the skills
    she will need.
