personas:
  professional: Dennis Kurpiewski, a 65‑year‑old retired mechanical engineer, now channels his product‑design expertise and meticulous CAD skills into mentoring youth at a local STEM club and spearheading
    the creation of a community makerspace where seniors can learn hands‑on woodworking and engineering, balancing his love of structured project planning with an unexpectedly spontaneous enthusiasm for
    improvising workshop solutions.
  sports: Dennis Kurpiewski regularly hikes the trails of the Cleveland National Forest, participates in a local swing‑dance league that keeps him active, and avidly follows the San Diego Padres and San
    Diego Loyal SC, occasionally joining community runs organized by the San Diego Running Club.
  arts: Dennis Kurpiewski enjoys the rhythmic elegance of swing‑dance nights set to the sounds of the Glenn Miller Orchestra and Ella Fitzgerald, curates vintage car aesthetics reminiscent of mid‑century
    designers, and often indulges in board‑game evenings featuring artistic titles like Azul, while also attending seasonal performances by the San Diego Symphony.
  travel: Dennis Kurpiewski loves spontaneous West‑Coast road trips with his friends, dreaming of cruising his restored classic car along the Pacific Coast Highway from Big Sur to Redwood National Park,
    and he frequently revisits his favorite weekend getaway to Portland, Oregon for its craft breweries and vibrant maker community.
  culinary: Dennis Kurpiewski takes pride in cooking pierogi stuffed with potatoes and cheese, simmering kielbasa with cabbage and dill, and brewing his own amber ale, often using fresh vegetables from
    his garden and occasionally forgetting to set timers, which results in delightfully charred edges on his roasted root vegetables.
  core: Dennis Kurpiewski blends a structured engineering mind with a spontaneous hobbyist spirit, juggling woodworking, classic‑car restoration, community mentoring, and swing‑dance, though they sometimes
    let forgotten timers ruin a perfectly cooked pierogi.
background:
  cultural: Dennis is a second‑generation Polish‑American whose grandparents emigrated from Poland in the 1920s. Raised in a Catholic household in suburban Southern California, he celebrated both American
    holidays and Polish traditions such as Wigilia, the making of babka, and Easter fish dishes. Living in Bonsall, a semi‑rural community in San Diego County, he embraces the region’s outdoor lifestyle
    and multicultural environment while maintaining a strong sense of family responsibility and community service that reflects his European roots.
