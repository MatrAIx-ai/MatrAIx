  hobbies: '[''Hiking'', ''Gardening'', ''Classic car restoration'', ''Woodworking'', ''Cooking (Polish cuisine)'', ''Swing dancing'', ''STEM volunteer mentoring'', ''Birdwatching'', ''Board games'', ''Home
    brewing'']'
  career_goals: Dennis aims to stay active and purposeful by expanding his volunteer STEM mentorship, eventually establishing a community makerspace where seniors can learn hands‑on skills. He plans to
    earn a certification in woodworking instruction, share his craft with younger generations, and write a memoir that weaves together his engineering career, family heritage, and life lessons. He also
    hopes to travel spontaneously along the West Coast with friends, maintain his health through regular hikes, and continue contributing to local community projects.
