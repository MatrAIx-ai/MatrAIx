  hobbies: '[''LEGO building'', ''Reading picture books and early chapter books'', ''Bike riding'', ''Organized soccer'', ''Nature exploring (collecting pine cones, rocks)'', ''Watching educational cartoons'',
    ''School art projects (drawing, painting)'', ''Helping with household chores'']'
  career_goals: Kenneth dreams of growing up in a job that lets him help others and follows a clear, structured routine. He often talks about becoming a firefighter because he likes the idea of rescuing
    people, working with a team, and having set procedures. He also imagines being a teacher one day, sharing knowledge and keeping a classroom organized. Occasionally, he mentions wanting to be an astronaut,
    attracted by the idea of learning and exploring, but his primary ambition is to have a stable, community‑focused career where he can be reliable and supportive.
