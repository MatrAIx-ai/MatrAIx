  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Visiting local art galleries'', ''Reading art history and contemporary fiction'', ''Listening to creativity and psychology podcasts'',
    ''Gardening'', ''Experimental cooking'', ''Journaling'', ''Volunteering for children’s art workshops'']'
  career_goals: Nancy aims to build on her customer‑service foundation by moving into a team‑lead or supervisory role within the next three years, where she can mentor newer agents and shape service protocols.
    She plans to complete her bachelor’s degree in Business Administration or Marketing, leveraging her curiosity for new ideas to develop innovative customer‑experience programs, possibly integrating community
    art initiatives that align with her creative interests. In the longer term, she envisions transitioning into a customer‑experience manager or product‑specialist position that blends her analytical skills,
    empathy, and passion for art, allowing her to influence brand storytelling while maintaining a balanced, flexible work environment.
