personas:
  professional: Parker Martin is an aspiring museum curator and exhibition designer who, drawing on their adeptness with digital illustration, qualitative research, and Python data analysis, crafts immersive
    concept-driven exhibition proposals in a quiet self-directed manner that balances meticulous organization with a willingness to explore unconventional artistic narratives.
  sports: Parker Martin enjoys solitary weekend hikes along the Blue Ridge Parkway, participates in a casual intramural soccer league, and follows the Virginia Tech Hokies football and basketball teams,
    using these activities as low-key ways to stay fit while preserving their preference for quiet, nature-based exercise.
  arts: Parker Martin immerses themselves in mixed-media sketching, curates photography series of Appalachian vistas, and regularly attends indie film screenings and gallery openings featuring experimental
    artists such as Olafur Eliasson and Marina Abramovic while listening to ambient composers like Brian Eno and Aphex Twin to fuel their art-theory explorations.
  travel: Parker Martin prefers low-budget solo trips that blend photography opportunities with quiet contemplation, having hiked in Shenandoah National Park, captured sunrise in Asheville, and visited
    the Museum of Modern Art in New York, while dreaming of a future summer in Berlin's contemporary art scene and a winter photography expedition to Iceland's icy landscapes.
  culinary: Parker Martin is a competent home cook who favors plant-forward meals like mushroom risotto, spicy miso ramen, and avocado toast with heirloom tomatoes, often experimenting with seasonal ingredients
    such as foraged wild greens and locally roasted coffee beans while occasionally treating themselves to specialty teas at nearby farm-to-table cafes.
  core: Parker Martin is a quietly curious art-obsessed introvert who balances meticulous organization with a love for solitary creative exploration, occasionally indulging in spontaneous art-supply splurges
    and mindful meditation to navigate the occasional anxiety that accompanies their ambitious curatorial dreams.
background:
  cultural: Parker grew up in a middle‑class white family in the Shenandoah Valley region of Virginia. His upbringing blended traditional Southern values—self‑reliance, respect for nature, and close family
    ties—with the academic and cultural exposure provided by attending Virginia Tech. He was raised with a love of the outdoors, an appreciation for local folk music, and early exposure to visual arts through
    school programs and community museums. This background informs his reflective, solitary disposition, his curiosity about diverse artistic expressions, and his balanced approach to organization and flexibility.
