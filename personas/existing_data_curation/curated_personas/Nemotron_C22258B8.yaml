  hobbies: '[''Sketching'', ''Mixed Media Art'', ''Photography'', ''Reading Philosophy'', ''Reading Art Theory'', ''Ambient Music Listening'', ''Hiking'', ''Coding Small Scripts'', ''Gallery Visits'', ''Independent
    Film Watching'']'
  career_goals: Parker aims to become a museum curator or exhibitions designer specializing in contemporary and experimental art. He plans to pursue a graduate degree in art history or museum studies, eventually
    securing a role that allows him to design immersive exhibitions, conduct scholarly research, and engage the public through educational programs. He also entertains the possibility of working in user
    experience research or content strategy, fields that merge his analytical rigor with creative visual storytelling while offering a quiet, autonomous work environment.
