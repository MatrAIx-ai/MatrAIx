  career_goals: Although no longer in the formal workforce, Sharon aims to compile a memoir that captures the oral histories of her hometown and to record a series of interviews with longtime residents.
    She plans to curate a small exhibition of her paintings and textile pieces at the local community center, mentor her grandchildren in quilting and knitting, and learn basic digital photography to archive
    her artwork and local scenery.
