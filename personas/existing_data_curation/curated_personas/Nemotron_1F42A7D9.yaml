  career_goals: Although only three, Vanessa often talks about wanting to help others when she grows up. She expresses a wish to become a teacher who reads stories to children in a quiet classroom, a librarian
    who curates calm reading corners, or a botanist who studies plants in nature. Her calm, resilient temperament and love of solitary, quiet spaces shape these gentle, service‑oriented ambitions.
