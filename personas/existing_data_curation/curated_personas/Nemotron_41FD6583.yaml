  hobbies: '[''Gardening'', ''Reading historical novels and poetry'', ''Crossword puzzles and Sudoku'', ''Tai chi meditation'', ''Tea ceremony'', ''Knitting and embroidery'']'
  career_goals: Although retired, Ha aspires to preserve and share her culinary heritage by compiling a family cookbook of traditional recipes, and to mentor her grandchildren in Mandarin language and cooking
    techniques. She plans to volunteer regularly at the Littleton community center, offering basic cooking and tea‑ceremony workshops for seniors. Maintaining her health through gentle exercise and ensuring
    long‑term financial stability for her husband are also top priorities. When possible, she hopes to travel to her ancestral hometown in China to reconnect with extended family and cultural roots.
