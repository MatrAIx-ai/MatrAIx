personas:
  professional: A hands‑on vocational educator, Scotty Summerall blends a relaxed yet assertive teaching style with a knack for turning complex concepts into practical workshops, leveraging their talent
    for curriculum adaptation and informal mentoring to empower adult learners while tolerating a bit of organized chaos in the process.
  sports: A dedicated greenway cyclist, Scotty Summerall rides with the Charlotte Bicycling Club, cheers for the Charlotte Hornets and Carolina Panthers, and occasionally joins a weekend pick‑up soccer
    league at Freedom Park, preferring low‑impact endurance over high‑intensity gym workouts.
  arts: An avid acoustic guitarist, Scotty Summerall frequents local jam sessions where they riff on songs by Jason Isbell and Molly Tuttle, while also finding inspiration in documentaries about scientific
    breakthroughs and attending the Charlotte Symphony’s occasional performances of modern composers.
  travel: An off‑beat explorer, Scotty Summerall favors flexible, low‑cost road trips to nearby music hubs like Asheville and Austin, has already toured the historic streets of New Orleans for its culinary
    scene, and dreams of biking through Copenhagen’s canals to expand their bicycle‑restoration knowledge.
  culinary: A home‑cooking enthusiast, Scotty Summerall loves crafting modern Southern barbecue such as smoked brisket with a honey‑bourbon glaze and pulled‑pork tacos, experiments with spice rubs using
    smoked paprika and brown sugar, and treats weekend cook‑outs as both a hobby and a community‑building ritual.
  core: At 36, Scotty Summerall is a curiosity‑driven educator who cycles, builds furniture, strums guitar, and balances relaxed disorganization with a fierce commitment to empowering adult learners and
    local makers.
background:
  cultural: Scotty grew up in a middle‑class family in the Charlotte suburbs, rooted in the American South's emphasis on hospitality and community. His upbringing combined traditional Southern values—like
    respect for neighbors and a love of outdoor activities—with exposure to the city's growing cultural diversity. He celebrates regional traditions such as indie music festivals and local food fairs, while
    also engaging with the broader, progressive currents that shape Charlotte’s modern urban identity. His heritage reflects a blend of Anglo‑American lineage and the inclusive, forward‑thinking atmosphere
    of a growing Southern metropolis.
