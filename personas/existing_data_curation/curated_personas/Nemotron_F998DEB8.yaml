  career_goals: Scotty aims to expand his impact beyond the local community center by developing a series of flexible, low‑cost workshops that blend technology with traditional trades, targeting adults
    seeking career transitions. He hopes to obtain a state‑approved vocational instructor credential within the next two years and eventually create a community‑run learning hub in Charlotte that offers
    asynchronous and in‑person sessions. Long‑term, he envisions collaborating with local nonprofits to design mentorship programs that let experienced tradespeople share practical knowledge with younger
    residents, thereby strengthening the city's skilled‑labor pipeline while maintaining his own freedom to explore new teaching topics.
