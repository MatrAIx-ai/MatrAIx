persona_description: Hrvoje Sagrak is a Croatian lawyer, IT industry executive, and business consultant with a background in nuclear engineering and risk analysis. He has over 25 years of experience in
  the field of nuclear power and risk management, having worked for several international organizations and companies. Sagrak is skilled in leading and supporting national initiatives through the Croatian
  Employers Association-ICT branch association, and has published over 95 professional papers and four books in the field of technical sciences. He has a unique understanding of the nuclear power sector
  and its risks, and has contributed to several international certified training programs and scientific programs.
