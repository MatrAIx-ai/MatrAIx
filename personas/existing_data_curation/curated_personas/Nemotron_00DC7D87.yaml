personas:
  professional: Janet Spehar, a 32‑year‑old retail associate with a STEM degree, balances her innate curiosity and methodical practicality by streamlining POS workflows, automating inventory checks with
    Python, and translating Excel‑driven data insights into clear, customer‑focused strategies, positioning herself as a rising retail analyst.
  sports: Janet Spehar jogs in Central Park with the NYC Road Runners club during spring, joins a community volleyball league in summer, roots for the New York Knicks, Yankees, and Islanders, and uses her
    balcony gardening as a low‑impact fitness routine, blending competitive spirit with seasonal activity.
  arts: Janet Spehar spends weekends at MoMA and the American Museum of Natural History, draws inspiration from contemporary creators like Yayoi Kusama and Banksy, curates playlists featuring Vampire Weekend
    and Kamasi Washington, and attends Off‑Broadway productions, letting diverse artistic experiences shape her creative outlook.
  travel: Janet Spehar plans balanced getaways using detailed itineraries, prefers weekend trips to Hudson Valley’s farm stalls and autumn hikes, dreams of exploring Copenhagen’s design districts, but constraints
    of work schedule and a modest travel fund keep her adventures primarily regional and thoughtfully budgeted.
  culinary: Janet Spehar experiments in her balcony kitchen, mastering miso‑spiced ramen, kimchi‑infused tacos with shiso and Szechuan peppercorn, and locally sourced beet‑root risotto, reflecting an intermediate
    cooking skill level and a palate that thrives on bold, cross‑cultural flavors.
  core: Janet Spehar blends analytical rigor with a love for community, channeling curiosity into data‑driven retail improvements while juggling a caffeine habit, late‑night coding sessions, and a penchant
    for spontaneous museum visits.
background:
  cultural: Janet was raised in a middle‑class family of Irish‑German descent in upstate New York before moving to the city for work. Her upbringing emphasized self‑reliance, community involvement, and
    appreciation for a wide range of cultural experiences found in New York City. She celebrates traditional American holidays such as Thanksgiving and Christmas, while also enjoying the multicultural festivals
    and cuisines of her urban environment. Her white ethnic background informs her familial traditions, but her daily life is enriched by the city's diverse cultural tapestry.
attributes:
