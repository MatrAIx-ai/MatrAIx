  hobbies: '[''Museum visits'', ''Science exhibitions'', ''Popular‑science reading'', ''Tech podcasts'', ''Coding meetups'', ''Yoga'', ''Urban gardening'', ''Experimental cooking'', ''Math tutoring'', ''Walking
    in Central Park'']'
  career_goals: Janet aims to transition from front‑line retail to a data‑driven role that leverages her STEM degree, such as a retail analyst or operations coordinator. She plans to complete a part‑time
    certification in data analytics and take on additional responsibilities like scheduling and performance reporting at her store. In the medium term, she aspires to become a shift supervisor and then
    store manager, using her analytical perspective to improve efficiency. Ultimately, she envisions launching her own small business that blends technology and community service, perhaps a tech‑repair
    kiosk with a social‑impact mission.
