personas:
  professional: Agnes Coger, a veteran grocery store cashier with over three decades of precision cash handling, inventory control, and POS expertise, leverages their structured mindset and competitive
    drive to train staff, resolve customer issues calmly, and pursue a supervisory role while studying business administration to formalize their leadership potential.
  sports: Agnes Coger, a dedicated member of the Dandridge senior bowling league, enjoys weekly Thursday night games that satisfy their competitive streak, roots for the Nashville Predators in hockey and
    the Tennessee Titans in football, and maintains light cardio by walking the neighborhood while tending their garden each morning.
  arts: Agnes Coger, an avid quilter who follows intricate patterns from "Quilting Quarterly", sings in their church choir performing Handel’s "Messiah" and enjoys historical novels by Michael Shaara and
    the evocative folk ballads of the Appalachian tradition, often listening to recordings of the Carter Family while stitching.
  travel: Agnes Coger, who prefers well-planned road trips over spontaneous flights, loves revisiting Civil War battlefields such as Gettysburg and Vicksburg, dreams of a guided tour of historic sites in
    England’s Cotswolds, and balances travel with a modest budget by staying in family-owned B&Bs and using senior discounts for museums.
  culinary: Agnes Coger, a home-cook who harvests tomatoes, basil, and beans from their garden, delights in cooking vegetable frittatas with goat cheese, prepares classic chicken pot pie for church potlucks,
    and occasionally indulges in Southern-style shrimp and grits at local diners, though they often forget to freeze leftovers, leading to occasional waste.
  core: Agnes Coger, a meticulous, routine-loving gardener-quilter with a competitive edge, balances structure with creative escapes, occasionally overspends on hobby supplies, and never lets stress derail
    their calm, steady approach to life.
background:
  cultural: Agnes grew up in the rural‑suburban community of Dandridge, Tennessee, steeped in Southern traditions and a strong sense of community. As a white Southern woman, she was raised with values of
    hospitality, self‑reliance, and respect for family ties. Weekly church attendance at the local Baptist congregation shaped her moral outlook and provided a network of social support. The region’s culinary
    heritage—home‑cooked meals, biscuits, collard greens—has influenced her cooking hobby. Local festivals celebrating Appalachian music and history, as well as the proximity to the Great Smoky Mountains,
    nurture her appreciation for regional folklore and outdoor recreation. Although she pursued some college education, she remained rooted in the practical, hands‑on work ethic typical of the area, balancing
    modesty with a quiet confidence.
attributes:
