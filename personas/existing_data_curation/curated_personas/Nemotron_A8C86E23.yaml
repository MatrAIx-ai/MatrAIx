  hobbies: '[''Gardening'', ''Quilting'', ''Crossword puzzles'', ''Reading historical fiction'', ''Bowling league'', ''Church choir'', ''Volunteer at food pantry'']'
  career_goals: Looking ahead, Agnes aims to transition from front‑line cashier duties to a supervisory position such as shift lead or assistant store manager, where she can leverage her organizational
    strengths and competitive drive to improve team performance. She plans to enroll in evening courses at a community college to earn an associate degree in Business Administration, which will give her
    the formal credentials needed for management. In the longer term, she hopes to use her bookkeeping experience to provide part‑time accounting support for local small businesses, allowing her to maintain
    a stable schedule while contributing her detail‑oriented expertise. Mentoring younger employees and being recognized as a top performer in accuracy and customer satisfaction are also important milestones
    for her.
