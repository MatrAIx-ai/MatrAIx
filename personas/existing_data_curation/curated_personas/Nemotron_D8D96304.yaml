  career_goals: Mitchell aims to advance to a regional operations manager position within the next three to five years, leveraging his expertise to standardize best practices across multiple locations.
    He plans to earn Certified Food Safety Manager credentials and achieve a Lean Six Sigma Black Belt to solidify his authority in efficiency initiatives. Parallel to his corporate ambitions, he harbors
    a personal goal of eventually opening a small, low‑traffic café that reflects his love for solitude, high‑quality sustainable fare, and a relaxed atmosphere, allowing him to transition into a semi‑retired
    entrepreneurial role while mentoring younger staff.
