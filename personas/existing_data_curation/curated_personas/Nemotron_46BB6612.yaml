  career_goals: Patricia aims to advance to a senior leadership role, such as Director of Business Analytics, within the next five years. She is focused on spearheading enterprise‑wide data‑driven transformation
    projects that enhance decision‑making and operational agility. To support this trajectory, she plans to obtain a professional certification in management analytics and enroll in a part‑time MBA program.
    Patricia also aspires to expand her mentorship program, cultivating the next generation of analysts, and to champion sustainability initiatives that align business performance with environmental responsibility.
