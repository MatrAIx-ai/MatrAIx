  career_goals: Angela aims to advance her clinical expertise by earning a Master of Science in Nursing with a focus on family practice, eventually becoming a Nurse Practitioner to serve the underserved
    population in Campbell County. She is also interested in leading a telehealth program that leverages her curiosity for new technologies while addressing rural health access gaps. Long‑term, she envisions
    a leadership role—such as Nurse Manager or Director of Quality Improvement—where she can champion health equity initiatives, mentor emerging nurses of color, and shape policies that reduce disparities
    in her community.
