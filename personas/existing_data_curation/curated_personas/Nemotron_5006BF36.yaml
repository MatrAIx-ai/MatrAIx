  career_goals: Although retired, Harvetta remains driven to stay mentally active and emotionally balanced. She aims to complete a written memoir that weaves her personal history with the broader story
    of her family's migration from the rural South to Rochester. She hopes to pass down her cooking and quilting knowledge to her grandchildren through informal workshops. Harvetta also wants to deepen
    her involvement with the local senior center by leading a weekly gardening club and assisting with community-heritage projects that celebrate African-American contributions in Monroe County. Learning
    to use a tablet more fluently for video calls with distant relatives is another personal ambition, as is maintaining her health through regular walks and attending a mindfulness group at her church.
