  career_goals: Harrie aims to graduate high school with honors and earn a scholarship to study nursing or education, fields she sees as both stable and community‑focused. She dreams of working as a registered
    nurse at a local clinic or becoming a middle‑school teacher, where she can mentor younger students and give back to her town. In the short term, she is focused on building a strong academic record,
    securing leadership positions in student government, and gaining certification in first aid to bolster her future health‑care credentials.
