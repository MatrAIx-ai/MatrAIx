personas:
  professional: Harrie Barrett is a freshman student‑council member who organizes school health awareness events, applying their love for structure and community service to mentor peers while balancing
    basketball practice and choir rehearsals.
  sports: Harrie Barrett guards the point for the middle‑school basketball team, roots for the Charlotte Hornets and the UNC Tar Heels, and spends weekends coaching a youth drill squad at the local YMCA,
    using competition to sharpen skills and foster leadership.
  arts: Harrie Barrett sings alto in the school choir, choreographs gospel‑infused dance routines for church events, and posts TikTok videos set to Beyoncé, Lizzo, and Aretha Franklin remixes, channeling
    creative energy into social connection.
  travel: Harrie Barrett enjoys family road trips to Wilmington’s waterfront, weekend hikes along the Blue Ridge Parkway, and dreams of attending the New Orleans Jazz & Heritage Festival, planning trips
    around school breaks and a modest travel budget.
  culinary: Harrie Barrett loves cooking collard greens seasoned with smoked turkey, perfecting crispy fried chicken, and baking buttery cornbread, often filming short cooking reels for TikTok while experimenting
    with sweet potatoes and hot sauce for extra kick.
  core: Harrie Barrett is a structured yet social teen who channels competitive energy into basketball, choir, and TikTok, balancing a disciplined routine with a penchant for spontaneous sneaker splurges.
background:
  cultural: Harrie grows up in a close‑knit Black community in Harrells, North Carolina, where Southern African‑American traditions shape daily life. Church plays a central role, providing a space for gospel
    music, communal meals, and intergenerational storytelling. Family gatherings feature soul‑food dishes like collard greens, fried chicken, and cornbread, and holidays are marked by celebrations such
    as Juneteenth and Emancipation Day. Harrie's upbringing blends respect for elders, a strong work ethic rooted in her grandparents' agricultural and service‑industry histories, and a deep pride in the
    resilience of her community. These cultural influences reinforce her desire to uplift others through health, education, and mentorship.
