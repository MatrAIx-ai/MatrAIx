personas:
  professional: Senior mechanical engineer Brennan Louis leverages deep expertise in FEA, CFD, and multi‑CAD workflows while infusing abstract artistic sensibility into product design, orchestrating cross‑functional
    teams with a blend of disciplined lean methodology and spontaneous creative brainstorming.
  sports: Brennan Louis enjoys weekend hikes along the Laguna Coast Wilderness Park, participates in the local Orange County Trail Club, follows the Anaheim Ducks and Los Angeles Angels, and incorporates
    low‑impact cycling to stay fit, preferring solitary or small‑group outdoor activities over competitive sports.
  arts: Brennan Louis paints abstract canvases inspired by the fluid dynamics of water, practices classical guitar pieces by Bach and Villa‑Lobos, admires the kinetic sculptures of Theo Jansen and the surreal
    paintings of Hilma af Klint, and regularly attends gallery openings at the Laguna Art Museum, where they often discuss the intersection of engineering and art.
  travel: Brennan Louis favors meticulously planned trips that blend creative inspiration with sustainable practices, having explored the serene fjords of Norway’s Lofoten Islands, the ancient stone forests
    of Haean, South Korea, and the coastal road trips of California’s Highway 1, while dreaming of a future visit to the geothermal landscapes of Iceland to study natural fluid dynamics.
  culinary: Brennan Louis enjoys crafting small‑batch IPAs with citrus hops, pairs them with home‑cooked meals featuring grilled salmon, quinoa salads tossed with roasted beetroot and feta, and occasionally
    indulges in spicy ramen bowls, while their cooking skill hovers at confident home‑chef level, often experimenting with fermentation techniques.
  core: Brennan Louis is a 50‑year‑old engineer‑artist who balances meticulous technical rigor with a restless imagination, fueling a life of creative problem‑solving, mindful solitude, and occasional indulgences
    in craft brewing and avant‑garde painting.
background:
  cultural: Brennan grew up in a middle‑class white American family on the West Coast, absorbing the region's emphasis on innovation, individualism, and environmental stewardship. Living in Aliso Vievo
    and the broader Orange County area, he has been exposed to a diverse cultural mosaic, including Hispanic, Asian, and other communities that have enriched his appreciation for multicultural art and collaborative
    problem‑solving. His upbringing combined a traditional work ethic with progressive values, fostering a respect for both personal achievement and community harmony. This blend shapes his professional
    outlook, balancing technical rigor with a genuine concern for societal and ecological impact.
attributes:
  skills: '["Finite Element Analysis (FEA)", "Computational Fluid Dynamics (CFD)", "SolidWorks CAD modeling", "Additive manufacturing", "Project management", "Lean manufacturing", "Systems integration",
