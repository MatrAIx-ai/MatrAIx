  hobbies: '["Abstract painting", "Landscape photography", "Playing classical guitar", "Reading science fiction and philosophy", "Hiking in local trails", "Model kit building (mechanical/electrical)", "Visiting
    maker spaces", "Volunteering for STEM outreach programs", "Craft brewing", "Meditation and mindfulness"]'
  career_goals: At this stage, Brennan aims to transition into a strategic leadership role such as Chief Engineer or Technical Director, where he can steer large‑scale sustainable product initiatives and
    champion green engineering practices. He is driven to develop patented technologies that blend functionality with aesthetic appeal, potentially collaborating with artists to create kinetic installations.
    He also aspires to establish a boutique consultancy focused on eco‑friendly mechanical design, while dedicating time to mentor emerging engineers and author a book on creative engineering problem‑solving.
