personas:
  professional: Jose Casal is a technical sales specialist who leverages a STEM background and bilingual fluency to close complex engineering deals, blending data‑driven market analysis with a competitive,
    practical mindset while mentoring junior teammates and driving revenue growth.
  sports: Jose Casal is a recreational athlete who plays pickup basketball at local courts, joins a weekly community soccer league, rides a mountain bike with the Atlanta Cyclists Club, supports the Atlanta
    Hawks and Atlanta United, and participates in the annual Atlanta Spring 5K charity run each spring.
  arts: Jose Casal is an avid fan of live Latin music, regularly attending concerts by Carlos Vives, J Balvin and Natalia Lafourcade, exploring street‑art murals in Atlanta’s Old Fourth Ward, and staying
    updated on scientific and technology non‑fiction by authors such as Malcolm Gladwell and Mary Roach.
  travel: Jose Casal prefers active, culturally immersive trips, having road‑tripped to Oaxaca to explore markets and cuisine, spent a weekend in New Orleans for jazz festivals, and now dreams of cycling
    the Camino de Santiago and trekking Patagonia’s Andes, always planning with detailed spreadsheets to balance work deadlines, budget constraints, and family commitments.
  culinary: Jose Casal enjoys cooking authentic Mexican dishes like tacos al pastor, chiles en nogada and pozole, using fresh corn masa, ancho chilies and chipotle, experimenting with spice blends at a
    moderate skill level, frequently hosting dinner nights for friends, but often over‑spices in the quest for the perfect heat.
  core: Jose Casal is a data‑driven, bilingual technical sales pro who balances a competitive edge with community‑centered hobbies—from pickup basketball to Arduino tinkering—while occasionally over‑cooking
    the heat in their kitchen.
background:
  cultural: Jose is the son of Mexican immigrants and grew up in a bicultural household that celebrated traditional Mexican holidays such as Día de los Muertos and Cinco de Mayo while also embracing Southern
    hospitality in Georgia. His bilingual upbringing reinforces strong family ties, a respect for hard work, and a sense of resilience. He frequently participates in local Mexican cultural festivals, shares
    homemade tamales with neighbors, and maintains a deep appreciation for the blend of Mexican values—community, perseverance, and celebration—with the friendly, outgoing vibe of his Southern community.
