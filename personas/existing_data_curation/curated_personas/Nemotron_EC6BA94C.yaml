  career_goals: Jose aims to advance to a regional sales manager position within the next three years, leading a high-performing team and driving revenue growth for a technology-focused company. He plans
    to earn advanced sales certifications, expand his network across the Southeast, and eventually launch his own consulting firm that helps manufacturing firms adopt innovative engineering solutions. His
    long‑term ambition includes mentoring junior sales professionals and shaping strategic market initiatives that blend technical insight with commercial acumen.
