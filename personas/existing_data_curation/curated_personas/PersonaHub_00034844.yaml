persona_description: A historian and archaeologist who is passionate about the history and culture of Istanbul, Turkey. They are interested in the digital preservation and presentation of historical sites
  and monuments, particularly those related to the Roman, Byzantine, Ottoman, and early Republican periods. They are also interested in the use of digital technology in teaching and research, and have experience
  working with museums and universities. They have a background in art history and archaeology, and have a strong interest in the intersection of art and history. They are interested in the use of digital
  technology to create a comprehensive and accessible resource for scholars, students, and the general public to study the deep history of Istanbul.
