personas:
  professional: Digna Fernandez, a retiree who crafts community events, leverages her meticulous planning and bilingual fluency to organize cultural festivals, church gatherings, and neighborhood potlucks,
    ensuring smooth logistics and inclusive participation, and they always follow through on commitments.
  sports: Digna Fernandez enjoys low‑impact exercise, taking daily morning walks in the local park, playing in a senior softball league, cheering for the Laurel Lumberjacks minor league baseball team, leading
    a weekly gardening club that doubles as a gentle fitness routine, and they view staying active as essential to maintaining independence.
  arts: Digna Fernandez immerses herself in visual arts through frequent visits to the county museum, reads art history books, attends a local art history workshop, draws inspiration from folk motifs, sings
    in her church choir with classic balada and folk songs, collects prints by regional painters like Maria Lopez, and they often incorporate artistic themes into their knitting and embroidery.
  travel: Digna Fernandez prefers relaxed, culturally rich trips, often taking short road trips to historic towns such as Natchez and Birmingham, dreaming of visiting a famed botanical garden in England,
    enjoys planning itineraries that blend museum visits with family‑friendly stays, and they savor the balance of adventure and comfort.
  culinary: Digna Fernandez celebrates her culinary heritage by perfecting family dishes such as pupusas, tamales, and chicken soup, while experimenting with healthier twists like avocado oil and whole‑wheat
    masa, loves using home‑grown cilantro, tomatoes, and marigolds to flavor meals, and they delight in sharing these creations at community potlucks.
  core: Digna Fernandez blends a lifelong love of community service, gardening, and culinary tradition with a methodical, curious spirit, balances frugal habits and occasional forgetfulness, stays socially
    engaged through choir, book club, and cultural events, and they approach life with quiet determination and a readiness to help others.
background:
  cultural: Digna was born to Salvadoran immigrant parents who settled in the United States in the 1960s. She grew up in a bilingual household where Catholic traditions, family gatherings, and celebrations
    of Salvadoran holidays such as Día de la Independencia (September 15) and Semana Santa were central to daily life. The strong sense of familia and community shaped her values of cooperation, hospitality,
    and respect for elders. In Laurel, Maryland, she remains active in the local Salvadoran diaspora, attending church festivals, cultural dances, and community events that keep her connected to her roots.
    Her upbringing instilled a love for Salvadoran cuisine, folklore, and music, which she proudly shares with friends and neighbors, serving as a cultural bridge between generations.
attributes:
  skills: '["Bilingual Spanish-English communication", "Traditional Salvadoran cooking", "Community event planning and volunteer coordination", "Household budgeting and financial management", "Garden cultivation
    and horticulture", "Basic computer literacy (email, video calling, digital archiving)", "Knitting and crocheting", "Oral history documentation"]'
  hobbies: '["Gardening (herbs and seasonal flowers)", "Knitting and crocheting", "Cooking traditional Salvadoran dishes with healthy adaptations", "Visiting museums and reading art history books", "Participating
    in a community book club", "Listening to and singing Salvadoran folk music", "Documenting family oral histories"]'
  career_goals: Although retired, Digna is determined to stay active in her community. She aspires to compile a community cookbook that preserves family recipes and the stories behind them, to mentor younger
    members of the Salvadoran diaspora in cultural traditions, and to volunteer as a cultural liaison at the local senior center, helping newcomers navigate services. She also hopes to enroll in a local
    art history workshop to deepen her appreciation of visual arts and to share her insights through occasional talks at the community center. Maintaining good health so she can continue gardening and attend
    family gatherings remains a personal priority.
