  career_goals: Patricia often talks about wanting to become a teacher like her mother, an artist who paints big pictures, or a veterinarian who helps animals. She loves the idea of drawing on big canvases,
    singing on a stage, and taking care of her stuffed animals, reflecting her curiosity about caring professions and creative expression.
