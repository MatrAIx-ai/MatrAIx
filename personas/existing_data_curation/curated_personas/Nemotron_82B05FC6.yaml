personas:
  professional: Patricia Donaldson is a budding storyteller who organizes their toys by color and size, using their natural curiosity and a balance of structure and flexibility to create imaginative play
    narratives that mirror early classroom learning.
  sports: Patricia Donaldson plays in the St. Louis County Tiny Tots Soccer Club, enjoys swinging at the local park, proudly wears a St. Louis Cardinals cap while cheering for the team during family game
    nights, and attends preschool gymnastics, blending organized team play with free-form outdoor activity.
  arts: Patricia Donaldson delights in drawing vivid pictures of zoo animals, sings along to Raffi’s "Bananaphone" and the Wiggles, and watches Pixar’s "Toy Story" with wide-eyed enthusiasm, letting music
    and visual art shape their playful imagination.
  travel: Patricia Donaldson has visited the City Museum, explored the St. Louis Zoo on rainy days, taken a family road trip to the Ozark National Forest, and dreams of seeing the giant redwoods of California,
    preferring spontaneous playground stops over strict itineraries while packing their favorite stuffed bunny for comfort.
  culinary: Patricia Donaldson prefers creamy mac and cheese, crunchy apple slices with peanut butter, strawberry yogurt, helps stir batter for banana pancakes, and loves the aroma of fresh-baked cinnamon
    rolls from the neighborhood bakery, yet often sneaks an extra cookie when no one is looking.
  core: Patricia Donaldson is a curious three-year-old who balances organized play with spontaneous imagination, saves stickers in a pink piggy bank, and can be both a meticulous helper and a mischievous
    snack thief.
background:
  cultural: Patricia grows up in a middle‑class white family in St. Louis County, Missouri. Her family celebrates typical Midwestern customs such as holiday gatherings, community festivals, and frequent
    trips to local attractions like the St. Louis Zoo and the City Museum. She is exposed to a blend of European‑American heritage—particularly German and Irish traditions—through family stories, food,
    and occasional cultural celebrations. The local preschool emphasizes inclusivity and introduces her to diverse cultures, while her parents encourage appreciation of art, music, and nature, shaping her
    early worldview.
