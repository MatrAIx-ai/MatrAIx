    ''genealogy research'']'
  career_goals: In her retirement, Mary Rose aims to stay mentally and physically active, deepen her curiosity by learning genealogy and local history, and preserve her family's culinary heritage by compiling
    a handwritten cookbook for her grandchildren. She aspires to expand her volunteer role at the senior center, eventually coordinating intergenerational programs that connect seniors with schoolchildren.
    She also hopes to travel with her spouse to visit family and attend cultural festivals, while maintaining her independence and health through regular walking and yoga classes at the community center.
