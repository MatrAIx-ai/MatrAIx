personas:
  professional: Sandra White, a meticulous student council member and budding event planner, leverages their love for routine, strategic thinking, and teamwork to organize school assemblies, community fundraisers,
    and local volunteer drives with precision and reliability.
  sports: Sandra White is a midfielder for the Greenfield Youth Soccer Club and a varsity cheerleader, trains five days a week, idolizes the US Women’s National Team and the local basketball franchise the
    City Hoops, and approaches each practice with a competitive, schedule‑driven mindset.
  arts: Sandra White captures suburban sunsets with their Canon EOS 2000D, draws artistic inspiration from photographer Annie Leibovitz, and unwinds by listening to Taylor Swift’s latest album while sketching
    in their journal, blending visual storytelling with a love for structured creativity.
  travel: Sandra White prefers meticulously planned weekend getaways, has already visited Washington DC and the Grand Canyon with their family, and dreams of a structured photography tour of Kyoto during
    their next summer break, where they can photograph cherry blossoms on a carefully outlined itinerary.
  culinary: Sandra White excels at baking classic chocolate chip cookies and lemon‑zest pound cakes, favoring butter, vanilla extract, and dark chocolate chips, and records each batch in their journal to
    perfect crumb texture, though they occasionally forget to clean the kitchen promptly after a late‑night bake.
  core: Sandra White is a routine‑obsessed teen who channels their competitive spark into soccer, board games, and perfectly measured cookie batches, while their skeptical edge keeps them double‑checking
    every plan and their journal becomes both compass and confessional.
background:
  cultural: Sandra was raised in a middle‑class, predominantly white family in Culver City, California. Her upbringing reflects typical American suburban values such as punctuality, responsibility, and
    community service. Growing up in the culturally diverse Los Angeles County, she has been exposed to a variety of cultural events and perspectives, yet her family traditions center around mainstream
    American holidays like Thanksgiving and Christmas, family meals, and participation in local community activities. This environment encourages both independence and collaborative involvement, shaping
    her sociable yet organized personality.
attributes:
  skills: '["Organizational planning", "Time management", "Digital literacy (Google Workspace, basic coding)", "Public speaking", "Leadership in student council", "Team sports strategy", "Baking and recipe
    execution", "Photography and photo editing"]'
  hobbies: '["Soccer", "Cheerleading", "Baking", "Photography", "Strategic board games (e.g., Settlers of Catan)", "Journaling", "Student council involvement", "Community volunteering"]'
  career_goals: Sandra aims to combine her love of organization, community involvement, and leadership into a career in event planning and project management. In the short term, she plans to enroll in a
    high‑school program with a business and management focus to deepen her skills in budgeting, logistics, and stakeholder communication. Long‑term, she envisions earning a degree in business administration
    with a concentration in project management and working for a nonprofit or community organization that coordinates large‑scale events, youth programs, or charitable fundraisers. She also remains open
    to coaching youth sports teams, merging her competitive spirit with mentorship.
