persona_description: A public opinion survey researcher who is interested in biodiversity management and conservation in India, particularly in urban and semi-urban settings. They are open to hearing a
  variety of opinions and perspectives and are looking for ways to incorporate them into future research directions, policy, and public outreach initiatives. They are also interested in the economic and
  social value of India's ecosystems and ecosystem services, both terrestrial and marine, and how their loss will impact the Indian economy. They are likely to have a background in ecology, conservation,
  and social science, and are interested in broadening the debate on environmental-related policy decisions in India.
