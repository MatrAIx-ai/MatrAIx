personas:
  professional: Jackson Dillard, a soon‑to‑retire veteran detective with 35 years in Palm Beach County policing, blends meticulous investigative expertise with a humanities‑informed empathy, making them
    a natural senior trainer for crisis‑intervention and a compassionate adjunct instructor in criminal justice.
  sports: Jackson Dillard, an avid golfer with a weekday tee time at Boca Raton Resort & Club who follows the Miami Dolphins and supports the Florida Panthers, also enjoys occasional snapper fishing off
    the Intracoastal Waterway as a low‑impact way to stay active.
  arts: Jackson Dillard, a lifelong reader of historical biographies by David McCullough and classic literature by Herman Melville, frequents the Boca Raton Museum of Art to admire works by Winslow Homer,
    and unwinds listening to Bill Evans jazz while solving crosswords.
  travel: Jackson Dillard, a methodical planner, prefers low‑stress coastal getaways such as a weekend cruise to Key West’s maritime museums and a carefully‑budgeted road trip to historic Newport, Rhode
    Island, where they can explore shipyards and lighthouses.
  culinary: Jackson Dillard, a competent home cook, relishes grilling fresh snapper with a lemon‑herb marinade and savoring Key Lime pie, while their pantry is stocked with locally sourced shrimp, mango,
    and a trusted bottle of Floridian white wine they keep for special Sunday meals.
  core: Jackson Dillard, a disciplined former detective with a bird‑watching habit, meticulous budgeting, chronic worry, and a soft spot for golf, snapper, and maritime history, lives by structure while
    quietly battling stress.
background:
  cultural: Jackson grew up in a middle-class white family in suburban Florida, where traditional American values of hard work, civic duty, and community respect were emphasized. His upbringing in a predominantly
    Anglo-American environment was complemented by exposure to the diverse cultures of South Florida, including Latino and Caribbean communities, which shaped his cultural sensitivity and inclusive outlook.
    A former reserve member of the U.S. Army, he carries a strong sense of patriotism and a belief in service to others. His education in the humanities broadened his appreciation for literature, history,
    and the arts, informing his compassionate approach to policing and his active involvement in local community initiatives.
