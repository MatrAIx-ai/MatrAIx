personas:
  professional: Migdalia Campuzano, a newborn, hasn't yet entered a profession, but her early observations—wide‑eyed stares at colorful mobiles and the soft cadence of her mother's voice—hint at a budding
    inclination toward imaginative and abstract thinking that may later steer her toward creative research or design.
  sports: Migdalia Campuzano, a newborn, enjoys gentle tummy‑time routines that build core strength and occasionally participates in family baby‑yoga sessions, while her parents, fans of the Chicago Cubs,
    often wear their caps during stroller walks.
  arts: Migdalia Campuzano, even before she can speak, is soothed by classical pieces like Debussy's 'Clair de Lune' and the indie lullabies of Sufjan Stevens, and her nursery walls display prints of Van
    Gogh's Starry Night, planting an early appreciation for color and abstraction.
  travel: Migdalia Campuzano, at one month old, has already taken a weekend road trip to Carmel‑by‑the‑Sea, where she spent a day in a stroller under foggy cliffs, and future family plans include a visit
    to Kyoto's cherry blossoms.
  culinary: Migdalia Campuzano's palate is limited to pureed sweet potatoes, avocado, and oat cereal, her parents craft homemade baby food seasoned lightly with cinnamon, and they occasionally enjoy a gourmet
    dinner of seared salmon for themselves.
  core: Migdalia Campuzano, a newborn with vivid imagination and a relaxed nature, oscillates between curious sensory exploration and occasional disorganized sleep patterns, preferring quiet moments over
    crowds.
background:
  cultural: Migdalia grows up in a Mexican‑American household where Spanish and English are spoken interchangeably. Family traditions such as celebrating Día de los Muertos, preparing tamales, and enjoying
    mariachi music are woven into daily life. Living in the close‑knit community of Ridgecrest, California, she blends her rich Mexican heritage with an appreciation for the arid desert environment, shaping
    a unique cultural perspective that values storytelling, art, and nature.
