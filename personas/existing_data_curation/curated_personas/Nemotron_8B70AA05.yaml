  hobbies: '[''Bridge club'', ''Weekly chess meet‑up'', ''Photography of historic Westport'', ''Volunteer with Westport Historical Society'', ''Fishing with spouse'', ''Attending jazz concerts'', ''Leading
    senior community hikes'', ''Participating in local theatre workshops'']'
  career_goals: David aims to transition from frontline surveillance to a consulting role, offering part‑time advisory services to local casinos and community safety boards. He hopes to author a practical
    guide on integrating traditional security methods with emerging digital tools, and to volunteer as a senior mentor in the Westport Public Safety Academy, sharing his experience while staying mentally
    active. Ultimately, he wants to leave a legacy of improved security protocols and to remain engaged in his profession without the physical demands of full‑time shifts.
