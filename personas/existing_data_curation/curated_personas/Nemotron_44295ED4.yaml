  hobbies: '[''soccer with friends'', ''LEGO construction'', ''basic video gaming (strategy games)'', ''nature exploration (collecting rocks and insects)'', ''drawing and comic art'']'
  career_goals: Although only seven, David dreams big. He imagines himself as an astronaut who can explore space, a professional soccer player who scores winning goals, and a video‑game designer who builds
    the worlds he loves to play in. In the short term, he wants to win the school’s robotics competition and improve his soccer skills enough to make the varsity team in middle school. He also hopes to
    travel to Mexico to visit his grandparents and become fluent in Spanish, seeing this as a practical step toward future opportunities. His competitive nature pushes him to set high standards, though
    he sometimes worries about not being good enough, which fuels his determination.
