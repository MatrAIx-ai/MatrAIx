personas:
  professional: David Gomez is an aspiring young engineer who channels their curiosity into complex LEGO constructions and a love for solving strategy video game puzzles, often blending imaginative play
    with practical problem‑solving.
  sports: David Gomez is a lively member of the local Sherwood Junior Soccer League, idolizing the Portland Timbers and often organizing impromptu neighborhood matches on weekends, while they prefer the
    fast‑paced midfield role that lets them chase the ball and showcase their competitive spirit.
  arts: David Gomez enjoys drawing comic‑style heroes inspired by classic Saturday morning cartoons and the vibrant rhythms of mariachi music, often humming songs by Los Tigres del Norte while sketching,
    and they are a regular attendee of the community arts fair where they admire the work of illustration artist Kelsey O’Neill.
  travel: David Gomez loves weekend family trips to the nearby Willamette River for creek exploring, has taken a memorable vacation to Disneyland, and dreams of visiting the historic plazas of a city renowned
    for its Día de los Muertos celebrations.
  culinary: David Gomez prefers bite‑size tamales filled with cheese and chicken that their grandparents make for holiday feasts, enjoys customizing pizza with pepperoni and pineapple, and occasionally
    attempts to bake chocolate chip cookies, though they often burn the edges while impatiently waiting for the timer.
  core: David Gomez is a curious, competitive, and sociable 7‑year‑old who transforms anxiety into LEGO builds and comic sketches, balances bilingual traditions with typical kid adventures, and navigates
    life with a mix of flexibility and occasional disorganization.
background:
  cultural: David grows up in a bilingual Mexican‑American household in Sherwood, Oregon. At home, Spanish is spoken alongside English, and he participates in family traditions such as celebrating Día de
    los Muertos and sharing homemade tamales during holidays. His grandparents often tell stories about Mexico, which inspire his curiosity about his heritage. He enjoys listening to mariachi music and
    learning simple traditional dances, blending these cultural experiences with typical American childhood activities. This multicultural upbringing gives him a strong sense of identity and an appreciation
    for both Mexican and local community values.
attributes:
  skills: '[''reading comprehension (grade 2 level)'', ''basic arithmetic (addition/subtraction)'', ''LEGO construction and spatial reasoning'', ''basic Spanish conversation'', ''soccer dribbling and teamwork'',
