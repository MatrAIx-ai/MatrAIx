persona_description: A healthcare professional who specializes in cardiology and cardiovascular diseases, particularly coronary insufficiency, heart valve diseases, cardiac rhythm and conduction disturbances,
  and aorta diseases. They are well-versed in the use of various diagnostic and therapeutic methods such as electrocardiography, coronary angiography, myocardial perfusion scintigraphy, drug therapy, balloon
  treatment, stent insertion, bypass surgery, and surgical operations for heart valve diseases, cardiac rhythm disturbances, aortic diseases, and peripheral vascular diseases. They are also knowledgeable
  in the management of hypercholesteremia and hypertension, as well as the treatment of congenital heart diseases. They are likely to read medical journals, attend conferences, and consult with colleagues
  in the field.
