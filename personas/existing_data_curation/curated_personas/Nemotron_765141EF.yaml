personas:
  professional: Katia Sims, a seasoned production planner with advanced SAP and NetSuite expertise, translates their meticulous, data-driven approach into lean schedules and continuous-improvement projects
    that keep the Columbus manufacturing floor running like clockwork.
  sports: Katia Sims stays fit by joining weekend Afro-Caribbean dance classes, cheering on the Columbus Blue Jackets and Columbus Crew, and participating in a local senior bowling league that meets at
    the community center.
  arts: Katia Sims channels their love of music through the church choir, often singing works by Aretha Franklin and Sam Cooke, and finds inspiration in historical novels by Philippa Gregory while attending
    performances at the Ohio Theatre.
  travel: Katia Sims prefers well-planned road trips to historic sites like the Dayton Aviation Heritage Museum and the historic districts of Savannah, balancing cultural immersion with comfortable lodging
    and a clear budget that respects their phased-retirement timeline.
  culinary: Katia Sims delights in preparing soul-food staples such as collard greens, smoked turkey, sweet potato casserole and cornbread, using garden-fresh tomatoes, kale, and home-grown herbs like rosemary
    and thyme to add a personal touch to each dish.
  core: Katia Sims blends meticulous planning with vibrant community involvement, turning data into action by day and rhythm, garden, and kitchen into joy by night, all while keeping a watchful eye on health
    and finances.
background:
  cultural: Katia is a second‑generation African‑American who grew up in the Midwest after her parents migrated north during the Great Migration. Her family’s history of resilience and community activism
    shaped her values of education, mutual support, and cultural pride. She remains deeply connected to Columbus’s Black community through her church, local NAACP chapter, and annual Black History Month
    events. Katia celebrates African‑American traditions through music, storytelling, and cuisine, often hosting family gatherings that blend Southern cooking with Midwestern influences. Her cultural background
    informs her commitment to mentorship, community outreach, and the preservation of Black heritage within the broader tapestry of Ohio life.
attributes:
  skills: '[''Production scheduling'', ''Inventory management'', ''ERP system operation (SAP, Oracle NetSuite)'', ''Advanced Excel and data analysis'', ''Lean manufacturing and process improvement'', ''Vendor
