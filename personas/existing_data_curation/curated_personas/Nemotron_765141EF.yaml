  hobbies: '[''Church choir singing'', ''Community dance classes (Afro‑Caribbean, line dancing)'', ''Cooking traditional Southern and soul‑food dishes'', ''Vegetable gardening'', ''Volunteering at youth
    mentorship program'', ''Playing bridge in a social club'', ''Reading historical fiction'', ''Attending local history tours and cultural festivals'']'
  career_goals: Katia aims to secure an APICS CPIM certification within the next year to formalize her supply‑chain expertise. She aspires to move into a senior planner or operations supervisory role where
    she can lead continuous‑improvement projects and mentor a larger team. Looking ahead, she envisions transitioning to a part‑time consulting capacity that helps small and mid‑size manufacturers in the
    Columbus area optimize their production processes, while also maintaining a balanced schedule that supports her personal interests and eventual phased retirement.
