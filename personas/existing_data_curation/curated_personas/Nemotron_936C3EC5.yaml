personas:
  professional: Donald Deleon, an aspiring comic artist and budding digital illustrator, leverages their meticulous organization and sociable nature to produce polished storyboard projects for school drama
    club productions while juggling a disciplined schedule of art practice.
  sports: Donald Deleon, an avid participant in the local surf club at Ventura Beach, spends Saturday mornings catching waves, while also cheering for the LA Lakers and LA Dodgers, and occasionally joins
    the middle school track team for sprint drills to stay fit.
  arts: Donald Deleon channels their creative curiosity into daily sketching of characters inspired by comic legends like Alex Ross and manga artist Akira Toriyama, experiments with digital tools reminiscent
    of Loish’s vibrant palettes, strums acoustic covers of John Mayer, and stages elaborate set pieces for the school drama club while regularly attending local performances of the Ventura Symphony and
    community theater productions.
  travel: Donald Deleon plans weekend getaways to nearby coastal gems such as Santa Barbara and Malibu for sunrise photography, dreams of a summer road‑trip to the Redwood National Park, and hopes to one
    day explore Tokyo’s anime districts, all while navigating parental budget limits and school schedule constraints.
  culinary: Donald Deleon enjoys a mix of classic American comfort foods and coastal flavors, often whipping up pepperoni pizza with extra cheese, crafting fresh fish tacos with lime‑marinated cod and avocado,
    and experimenting with simple desserts like banana‑cinnamon pancakes, while displaying a beginner’s skill level that occasionally results in burnt edges and a lingering smell of burnt garlic.
  core: Donald Deleon is a highly organized, socially vibrant teen who transforms curiosity into colorful comics, yet battles intense anxiety that fuels both creative bursts and occasional self‑doubt.
background:
  cultural: Donald grew up in a middle‑class, white family in Ventura, California, a coastal city known for its relaxed beach lifestyle, strong environmental awareness, and cultural diversity. The region’s
    mix of surf culture, outdoor activities, and a vibrant arts scene has shaped his appreciation for nature and creativity. While his household reflects mainstream American values—emphasizing education,
    community involvement, and self‑expression—Donald also benefits from the multicultural fabric of Ventura County, interacting with peers from Hispanic, Asian, and other backgrounds, which has broadened
    his perspective and reinforced his inclusive, cooperative outlook.
