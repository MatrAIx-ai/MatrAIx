  career_goals: Donald aspires to attend a specialized arts high school where he can deepen his visual‑arts training while maintaining his academic excellence. In the longer term, he envisions a career
    that blends creativity with helping others—such as becoming an art therapist or a community arts program director—so he can use his artistic talents and empathetic nature to support youth mental health.
    He also hopes to gain experience through internships at local galleries or nonprofit arts organizations, eventually earning a degree in fine arts or psychology to fulfill his ambition of making a positive
    impact through art.
