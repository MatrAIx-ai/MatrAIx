personas:
  professional: Brendaly Reitz, a 21‑year‑old office administrator, leverages their curiosity‑driven practicality to excel in scheduling, onboarding new staff, and fine‑tuning digital filing systems, all
    while navigating a laid‑back approach to deadlines that sometimes leads to last‑minute workflow tweaks; their strong empathy and conflict‑mediation skills make them a natural liaison between team members,
    and they are actively pursuing an associate degree in business administration to transition into an office manager role within a nonprofit setting.
  sports: Brendaly Reitz enjoys light hiking on the rolling trails of Nodaway County with the Prairie Trail Hikers club, attends a weekly community yoga class for flexibility, roots for the Kansas City
    Chiefs in football season and the St. Louis Cardinals in baseball, and occasionally joins a casual intramural volleyball game at the county community center, balancing a relaxed fitness routine with
    a fondness for local team spirit.
  arts: Brendaly Reitz finds inspiration in indie folk playlists featuring Iron & Wine, Sufjan Stevens, and The Milk Carton Kids while devouring contemporary novels by Sally Rooney and Celeste Ng at her
    monthly book club, occasionally volunteers backstage at the local community theater for productions of Shakespeare and modern dramas, and crafts hand‑knit scarves to the rhythm of folk ballads, intertwining
    their love for storytelling, music, and tactile creativity.
  travel: Brendaly Reitz prefers spontaneous weekend road trips to nearby natural gems such as the Ozark National Forest and the historic river town of Hannibal, enjoys exploring the vibrant food scene
    of Kansas City on a budget, and dreams of backpacking through the Scottish Highlands and the fjords of Norway once they secure a gap‑year stipend, balancing a love for local adventure with long‑term
    wanderlust constrained by student finances.
  culinary: Brendaly Reitz, a budding home cook, loves experimenting with seasonal farm‑to‑table dishes like quinoa‑roasted vegetable bowls tossed with fresh basil, feta, and lemon zest, frequently tries
    her hand at sourdough starter and occasionally over‑salts the sauce, while also delighting in comforting meals such as chicken pot pie made with locally sourced carrots and thyme, reflecting a curious
    palate tempered by occasional kitchen missteps.
  core: Brendaly Reitz is a compassionate, curiosity‑driven organizer who balances a love for nature, crafts, and community service with a habit of last‑minute paperwork and an easygoing approach to planning.
background:
  cultural: Brendaly grew up in Maryville, a small Midwestern town in Nodaway County, Missouri. Her family traces its roots to German and Irish immigrants who settled in the region in the late 19th century.
    The community’s values of hard work, modesty, and neighborly support have shaped her worldview. She was raised with a blend of Protestant (Methodist) and secular community traditions, participating
    in local high‑school sports events, county fairs, and church‑based service projects. This upbringing reinforced a cooperative spirit and a practical outlook that she carries into both her personal life
    and professional endeavors.
