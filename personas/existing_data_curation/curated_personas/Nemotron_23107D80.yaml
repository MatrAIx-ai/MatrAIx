  career_goals: Brendaly aims to expand her supervisory experience into a full office manager or operations coordinator role within the next three to five years. She plans to enroll in a community college
    business administration program to earn an associate degree, which will qualify her for broader strategic responsibilities such as administrative manager or HR liaison. Long‑term, she hopes to combine
    her passion for helping others with her organizational talents by leading the administrative side of a nonprofit or community service organization, ensuring efficient operations that support the mission
    while maintaining a cooperative and compassionate workplace culture.
