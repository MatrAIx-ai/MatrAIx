personas:
  professional: India Harrell, a future quality assurance specialist, already demonstrates meticulous sorting of shape blocks and a preference for predictable routines, traits that suggest a career built
    on structure and attention to detail.
  sports: India Harrell, despite being only one, is a dedicated tiny fan of the Chicago Cubs, tuning in to the weekend games at the same time each week and delighting in the predictable pre‑game chants
    while preferring solitary floor‑time crawling over any impromptu backyard play.
  arts: India Harrell, an infant with a strong preference for quiet, repeatedly requests the soft piano rendition of Debussy's 'Clair de Lune' before nap time and cradles the illustrated pages of Eric Carle's
    'The Very Hungry Caterpillar', allowing these gentle artistic experiences to shape their early sense of calm and curiosity.
  travel: India Harrell, at one year old, has visited the local botanical garden and taken a weekend family trip to the Grand Canyon, favoring meticulously planned itineraries that stick to familiar routines
    and feeling uneasy when travel plans become spontaneous.
  culinary: India Harrell, a one‑year‑old, prefers smooth pureed carrots and applesauce, recoils from the texture of peas, and insists on a precise feeding order—first carrots, then avocado mash, then applesauce—making
    mealtimes a structured ritual that soothes their need for predictability.
  core: India Harrell, a one‑year‑old with a pronounced need for routine, quiet solitude, and a surprisingly competitive streak even in block sorting, reacts intensely to disruptions, making them both endearingly
    meticulous and prone to tantrums.
background:
  cultural: India is raised in a Black family in Richmond, Virginia, where African American cultural traditions are woven into daily life. She experiences the warmth of community gatherings, gospel and
