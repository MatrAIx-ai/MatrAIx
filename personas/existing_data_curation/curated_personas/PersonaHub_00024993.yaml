persona_description: A researcher from Korea who specializes in developing self-powering, color-changing humidity sensors for smart windows, health care, and safety management. His research team includes
  professors from POSTECH and KAIST, and they have successfully developed a variable color filter using a metal-hydrogel-metal resonator structure, which can change the resonance wavelength of light transmitted
  depending on the humidity of the environment. The research findings were published as a cover story in the latest edition of Advanced Optical Materials, a journal specializing in nanoscience and optics.
