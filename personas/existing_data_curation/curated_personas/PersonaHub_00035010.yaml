persona_description: A concerned citizen who cares deeply about the environment and wildlife, particularly the grizzly bears of Montana's Cabinet Mountains Wilderness. They are passionate about protecting
  these precious species and the ecosystems they inhabit, and are willing to take action to ensure their survival. They are likely to be involved in environmental advocacy groups or organizations, and are
  dedicated to spreading awareness about the potential threats to grizzly bears and other wildlife from large-scale mining projects like Montanore mine. They are also likely to be knowledgeable about the
  Clean Water Act and the regulations that govern its implementation, and are advocating for the EPA and the Army Corps of Engineers to close the mining loopholes and protect the nation's most pristine
  waters and wildlife.
