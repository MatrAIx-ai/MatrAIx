personas:
  professional: Andrew Aufdemorte is a self‑taught automotive enthusiast who blends hands‑on garage work with a budding tech side, leveraging his Python scripting and Photoshop skills to troubleshoot car
    builds while planning to enroll in automotive technology courses and launch a custom‑car shop alongside a freelance PC‑building service.
  sports: Andrew Aufdemorte never misses a Marietta High School Blue Devils football game, roots for the Atlanta Falcons on Sundays, and runs with the Marietta Track Club during spring, preferring short
    jogs over gym routines while keeping a casual, competitive edge.
  arts: Andrew Aufdemorte spends evenings sketching downtown Marietta skylines while blasting Led Zeppelin and Chris Stapleton, edits gaming highlight reels with Adobe Photoshop, and follows the visual
    style of Pixar and the cinematography of Christopher Nolan for inspiration.
  travel: Andrew Aufdemorte favors road trips to car‑culture hotspots like Detroit’s Motor City and Nashville’s music scene, has already visited Asheville’s mountain trails and New Orleans’ jazz districts,
    and dreams of a future tech‑centric pilgrimage to Tokyo’s Akihabara, planning each outing with a mix of online itineraries and spontaneous detours.
  culinary: Andrew Aufdemorte loves southern barbecue, especially smoked pork ribs slathered in a bourbon‑infused glaze, pairs them with creamy coleslaw and sweet tea, and occasionally experiments with
    building gourmet burgers using premium wagyu beef, sharp cheddar, and toasted brioche buns.
  core: Andrew Aufdemorte is a 20‑year‑old garage tinkerer with a competitive gaming streak, a habit of losing tools in the garage, and an unwavering belief that the perfect car can be built while a classic
    rock riff plays in the background.
background:
  cultural: Andrew was raised in a middle‑class, white family in Marietta, Georgia, a suburban community within Cobb County. His upbringing reflects a blend of traditional Southern values—such as hospitality,
    an appreciation for community gatherings, and a love of regional sports like college football—and a modern, tech‑savvy outlook. Family weekends often involved church services and BBQs with neighbors,
    while evenings were spent watching game highlights or exploring online forums about automotive and gaming culture. He identifies with the broader Southern Anglo‑American heritage, cherishing local traditions
    like Fourth of July fireworks and Thanksgiving feasts, yet he also embraces contemporary digital media and the independent spirit of the internet. This cultural mix informs his balanced perspective,
    allowing him to respect established customs while staying curious about new ideas.
