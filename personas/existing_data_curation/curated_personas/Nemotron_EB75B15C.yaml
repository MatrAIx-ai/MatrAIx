  hobbies: '["Playing video games (strategy and FPS)", "Car restoration and customization", "Building custom PCs", "Listening to rock and country music", "Attending local high school football games", "Jogging
    in local parks", "Sketching cityscapes and mechanical designs"]'
  career_goals: Andrew aims to enroll in a community college program for automotive technology within the next year, with the goal of earning ASE certification and eventually opening his own small custom‑car
    shop that also offers online parts sales. While he values the flexibility of hands‑on work, he is also intrigued by the tech side of the industry and plans to develop a modest side business building
    custom PCs and offering freelance digital‑design services. His competitive streak drives him to set measurable milestones, such as completing a certification within two years and growing a profitable
    side hustle that supports his independent lifestyle. He envisions a career that lets him blend his love for mechanics with his digital curiosity, all while maintaining a schedule that leaves room for
    personal projects and leisure.
