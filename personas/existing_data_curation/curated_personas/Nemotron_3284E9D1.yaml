personas:
  professional: Sonya White leverages their meticulous project coordination skills, diplomatic interpersonal style, and love for community engagement to excel as a program coordinator at a nonprofit, where
    they design youth development initiatives, streamline logistics with Trello and Canva, and consistently meet tight deadlines while fostering a collaborative spirit.
  sports: Sonya White channels their energetic spirit into Zumba and Afro‑dance classes at the community center, hikes the trails of Blue Spring State Park on weekends, supports the Orlando Magic and the
    Tampa Bay Lightning, and belongs to the local YMCA fitness club where they occasionally join a softball league.
  arts: Sonya White immerses themselves in creative culture by attending the Winter Garden Arts Festival, curating a social‑media page that highlights local artists like muralist Maya Lin, and reading contemporary
    works from authors such as Chimamanda Adichie, all of which inspire their potluck gatherings and community storytelling nights.
  travel: Sonya White prefers meticulously planned weekend getaways that blend nature and cultural flavor, having explored Savannah’s historic squares, the Great Smoky Mountains, and a weekend art crawl
    in Asheville, while dreaming of a future trip to the vibrant markets of Oaxaca and a group retreat in the Florida Keys, always using a travel budgeting spreadsheet to keep costs in check and they often
    share itineraries with friends on their social media page.
  culinary: Sonya White delights in cooking Southern‑inspired dishes like fried catfish, collard greens seasoned with smoked paprika, and sweet potato casserole, perfecting each recipe passed down from
    their grandmother, and they skillfully host potluck nights that showcase their knack for pairing buttermilk cornbread with spicy gumbo and a curated selection of craft sodas.
  core: Sonya White is a hyper‑organized, socially driven catalyst who balances disciplined achievement with spontaneous community fun, and they often juggle meticulous planning and occasional impulse purchases.
background:
  cultural: Sonya grew up in Bartow, a small city with deep African‑American roots dating back to the Reconstruction era. Her family has long been involved in the local Baptist church, which serves as a
    cultural hub for community gatherings, activism, and celebration of traditions such as Juneteenth and Black History Month. She was raised on stories of the civil‑rights struggles in Central Florida
    and maintains close ties with extended family in the rural South, preserving culinary traditions like collard greens and sweet potato pie. Sonya actively supports Black‑owned businesses in Polk County,
    participates in the annual Black Heritage Festival in nearby Lakeland, and draws inspiration from gospel, soul, and contemporary R&B music. Her cultural identity is a source of pride that informs her
    commitment to community uplift and her vision for future leadership within her community.
attributes:
  skills: '[''Project Coordination'', ''Event Planning'', ''Time Management'', ''Customer Service'', ''Community Outreach'', ''Social Media Management'', ''Basic Data Analysis'', ''Conflict Resolution'',
