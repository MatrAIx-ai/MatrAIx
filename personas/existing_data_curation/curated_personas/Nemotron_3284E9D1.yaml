  hobbies: '[''Zumba and Afro‑dance classes'', ''Community Food Bank volunteering'', ''Youth mentorship program'', ''Book club focusing on Black literature'', ''Cooking Southern‑inspired meals'', ''Hosting
    potluck gatherings'', ''Hiking state parks'', ''Attending local art and cultural festivals'', ''Organizing game nights and movie marathons'', ''Curating a social‑media page for local events and Black‑owned
    businesses'']'
  career_goals: Sonya aims to complete her bachelor's degree in Public Administration within the next two years, leveraging her disciplined study habits and curiosity for new ideas. Her short‑term goal
    is to secure a full‑time position as a program coordinator for a local nonprofit focused on youth development or community health, where she can apply her organizational talents and sociable nature.
    In the longer term, she aspires to become a director of community engagement, leading larger initiatives that promote equity and wellness in Black neighborhoods across Central Florida. She also dreams
    of launching a social‑enterprise that offers affordable wellness workshops and mentorship programs for young Black women, combining her ambition for achievement with her desire to give back to her community.
