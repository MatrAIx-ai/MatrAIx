persona_description: A healthcare professional who specializes in the study of eating disorders, particularly atypical eating behaviors, orthorexia, diabulimia, and athletes with eating disorders. They
  are knowledgeable in the medical aspects of eating disorders, including the impact of trauma and substance abuse, and have a deep understanding of the unique challenges faced by athletes and pregnant
  women with eating disorders. They are skilled in treating eating disorders and have a special interest in understanding the factors contributing to the development of these disorders, including the role
  of gender, race, ethnicity, culture, sexuality, age, and size. They are also knowledgeable about the importance of maintaining a positive body image during pregnancy and the importance of addressing both
  eating disorders and substance abuse in individuals with these disorders.
