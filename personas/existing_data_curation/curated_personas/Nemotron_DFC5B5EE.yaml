personas:
  professional: Teresa Franke, a ten‑year‑old aspiring junior sleuth, leverages her fascination with mystery books and precise chess tactics to design systematic school projects, drafting detailed outlines
    and delivering presentations with the steady composure that comes from her naturally calm disposition.
  sports: Teresa Franke, a ten‑year‑old who trains with the Pine Grove Juniors soccer team every Saturday and attends weekly swimming lessons at the community pool, thrives on the routine of drills and
    scores, while cheering for the New York Yankees on television because of their disciplined batting lineup.
  arts: Teresa Franke, a ten‑year‑old craft enthusiast, spends afternoons weaving friendship bracelets while humming along to Taylor Swift’s Shake It Off, drawing inspiration from Beatrix Potter’s countryside
    illustrations and absorbing the atmospheric scores of John Williams’ Harry Potter soundtrack, which together shape her imaginative yet orderly leisure time.
  travel: Teresa Franke, a ten‑year‑old with a penchant for meticulously planned outings, enjoys weekend excursions to the nearby state park’s botanical garden and remembers her family’s road trip to Yellowstone
    National Park, while dreaming of a guided tour of the Great Barrier Reef, though her travel plans always fit around school assignments and parental schedules.
  culinary: Teresa Franke, a ten‑year‑old budding chef, favors simple yet colorful meals like avocado toast sprinkled with sunflower seeds, whips up strawberry‑banana smoothies using fresh garden berries
    she helped pick, and occasionally bakes oatmeal cookies flavored with cinnamon and chocolate chips, proudly presenting them to the church youth group after service.
  core: Teresa Franke, a ten‑year‑old who thrives on routine, balances her love of mysteries, chess, and gardening with a surprisingly meticulous allowance ledger, all while occasionally forgetting to water
    her newly planted seedlings when a good book captures her attention.
background:
  cultural: Teresa grew up in Crossville, Tennessee, a small town in the Cumberland County region of the Appalachian foothills. Her family reflects a typical Southern Appalachian upbringing, with strong
    emphasis on family bonds, community involvement, and respect for nature. She attends a public elementary school where local traditions such as Friday night football, county fairs, and church gatherings
    are part of her community life. Her household celebrates regional holidays like Independence Day with backyard barbecues and local music, and her family maintains a modest garden and a pet dog, reflecting
    the rural lifestyle. The cultural values of politeness, hospitality, and cooperation shape her interactions, while the surrounding natural landscape inspires her interest in wildlife and the outdoors.
