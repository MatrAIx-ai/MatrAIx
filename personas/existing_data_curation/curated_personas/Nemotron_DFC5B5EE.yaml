  career_goals: Teresa dreams of a career that combines her love of animals, structure, and helping others. She aspires to become a veterinarian, envisioning a future where she can care for pets and wildlife
    in a calm, methodical way. She also expresses interest in becoming an elementary school teacher, where she can provide a predictable, supportive learning environment. In the short term, she aims to
    earn good grades, join the school science club, and volunteer at the local animal shelter to gain experience.
