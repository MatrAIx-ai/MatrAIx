  hobbies: '[''Experimenting with modern African‑American recipes'', ''Running'', ''Mindfulness yoga'', ''Logic puzzles'', ''Science‑fiction reading'', ''Balcony herb gardening'', ''Volunteering at community
    kitchen'']'
  career_goals: Diamond aims to translate her technical background into higher‑level operational management. Over the next five years she plans to obtain advanced certifications in HACCP and Lean Six Sigma,
    then move into a regional food‑service manager role overseeing multiple sites. Ultimately, she aspires to lead the culinary operations of a large institutional kitchen or launch her own data‑focused
    food‑tech venture that blends healthy menu design with efficiency analytics. She is driven by a desire to demonstrate measurable improvements in staff productivity, waste reduction, and customer satisfaction.
