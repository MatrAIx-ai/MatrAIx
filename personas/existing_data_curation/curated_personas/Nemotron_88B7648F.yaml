  career_goals: Ryan envisions a future where he can merge his competitive drive with his love of technology and community. He aspires to earn a scholarship to a university with strong engineering or computer
    science programs, aiming to become a robotics or software engineer who designs tools that improve everyday life. Simultaneously, he dreams of playing basketball at the collegiate level, with the long‑term
    goal of competing in professional leagues or coaching youth teams. His ambition also includes using his communication and video‑production skills to create educational content for other teens, helping
    them navigate academic subjects and develop practical tech skills. To achieve these goals, Ryan is focused on improving his academic performance, expanding his programming portfolio, and maintaining
    his athletic training while managing his anxiety through coping strategies.
