personas:
  professional: Ryan Kelley is a teenage tech enthusiast and content creator who blends a curiosity for electronics with a practical knack for video editing, turning basketball and gaming highlight reels
    into shareable clips while juggling school assignments with a competitive edge.
  sports: Ryan Kelley is a basketball‑obsessed teen who trains at the local community gym, follows the Chicago Bulls and Chicago Blackhawks, plays pickup games every weekend, and spends Saturday mornings
    skateboarding at the Fox River Skate Club while logging bike rides along the Fox River trail for cardio.
  arts: Ryan Kelley channels creative energy into editing gaming highlight reels, riffing on guitar for the school’s indie‑rock band, and curating playlists that feature Billie Eilish, Travis Scott, and
    the lo‑fi beats of J Dilla, while occasionally sketching street‑art inspired by Banksy on notebook margins.
  travel: Ryan Kelley prefers short, action‑filled getaways, such as weekend trips to Chicago’s Navy Pier for roller‑coaster thrills, camping at Door County’s state parks for night‑time bike rides, and
    dreaming of a future visit to Tokyo’s Akihabara district to hunt rare gaming merch.
  culinary: Ryan Kelley favors bold, handheld foods—devouring spicy buffalo chicken pizza, crafting DIY nachos with jalapeños and queso, and occasionally attempting to program a simple Arduino‑controlled
    LED oven to perfect a batch of chocolate‑chip cookies.
  core: Ryan Kelley is a high‑energy, hyper‑competitive teen who juggles basketball, fast‑paced gaming, and DIY tech projects, yet battles intense anxiety that fuels both impromptu creativity and occasional
    procrastination.
background:
  cultural: Ryan grew up in a middle‑class family in Batavia, a small suburb of the Chicago metropolitan area. His upbringing reflects the Midwestern values of hard work, community involvement, and modesty.
    Family gatherings often centered around shared meals and local traditions such as attending the Kane County Fair and participating in seasonal activities like ice‑skating in winter and volunteer clean‑up
    events in summer. The community emphasizes friendliness and cooperation, which has reinforced Ryan’s sociable nature while also encouraging a practical, down‑to‑earth outlook. Though his family does
    not strictly adhere to any specific religious practice, they value open dialogue and support, providing a stable environment that nurtures his curiosity and ambition.
