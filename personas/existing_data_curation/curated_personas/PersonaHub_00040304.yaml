persona_description: A scholar who is deeply interested in the development of Luther's thought and its impact on contemporary thought, particularly in the context of late medieval theology, piety, and political
  and social change. They are also interested in the role of allegorical methods of biblical interpretation in the understanding of the Bible and its implications for practicing theology. They appreciate
  the distinction between passive and active human righteousness and the distinction between two realms or dimensions of human life, as well as Luther's theology of the cross. They are likely to be interested
  in the unfolding dynamics of political and social change at the dawn of the modern era and the influence of Luther's thought on contemporary thought.
