  hobbies: '[''cooking Mexican cuisine'', ''gardening herbs and vegetables'', ''folkloric dance'', ''church and community gatherings'', ''reading historical fiction'', ''knitting and crocheting'', ''bingo
    and card games'', ''listening to mariachi music'']'
  career_goals: Although retired, Luz Esther aims to stay actively involved in her community, mentor younger volunteers, and preserve her cultural heritage. She hopes to organize a monthly intergenerational
    cooking workshop, write a short memoir of her life experiences, and continue learning health and wellness topics so she can support her peers and advocate for senior resources.
