personas:
  professional: Mack Kanavage, a veteran landscaping contractor with three decades of hands‑on experience, blends disciplined crew leadership, cost‑focused budgeting, and expert irrigation design with a
    skeptical, competitive eye for sustainable products, preferring flexible schedules that accommodate their love of solitary problem‑solving and a relaxed approach to formal planning.
  sports: Mack Kanavage, a devoted fan of the Alabama Crimson Tide and the Birmingham Barons, spends their weekends fishing on local lakes, participates in a senior‑aged golf league at the Birmingham Country
    Club, and rolls through the cooler months on a community walking club that keeps their knees moving despite occasional osteoarthritis.
  arts: Mack Kanavage, who unwinds after a day of landscaping by listening to B.B. King, Muddy Waters, Miles Davis, and John Coltrane at Birmingham’s intimate Saturn Lounge, infuses that bluesy rhythm into
    their woodworking projects and often quotes passages from David McCullough’s historical narratives while bird‑watching with a small friends group.
  travel: Mack Kanavage prefers leisurely, self‑guided road trips—such as the historic blues trail through the Deep South, a weekend stay in Asheville’s artisan community, and a recent drive to the Great
    Smoky Mountains—while dreaming of a future drone‑ready expedition to the Scottish Highlands and a sun‑soaked sailing vacation in the Greek islands to capture new horizons.
  culinary: Mack Kanavage, an avid gardener, often cooks rustic Southern fare—like shrimp and grits, collard greens seasoned with home‑grown garlic, and fried catfish—while occasionally experimenting with
    Mediterranean recipes that showcase fresh basil and olive oil, and they pride themselves on a competent, no‑frills cooking style that balances practicality with the occasional culinary indulgence at
    local farm‑to‑table bistros.
  core: Mack Kanavage, a competitively skeptical 62‑year‑old landscaper who thrives on solitary problem‑solving, secretly hoards vintage car parts, occasionally misplaces their gardening schedule, and balances
    a disciplined work ethic with a relaxed, slightly disorganized personal life.
background:
  cultural: Mack grew up in a middle‑class family on the outskirts of Birmingham, where Southern hospitality and a strong work ethic were daily lessons. He attended local public schools before earning a
    business degree at a state university, and his upbringing reinforced values of self‑reliance, community involvement, and respect for the region’s natural environment. Though he identifies with the broader
    white Southern cultural milieu—enjoying regional cuisine, a love of outdoor recreation, and a modest, no‑frills sensibility—Mack emphasizes personal responsibility and the practical side of his heritage,
    shaping his approach to both work and life.
