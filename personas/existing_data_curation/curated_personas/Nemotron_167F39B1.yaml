  hobbies: '[''Gardening'', ''Woodworking'', ''Classic car restoration'', ''Fishing'', ''Birdwatching'', ''Reading historical non-fiction'', ''Listening to blues and jazz music'', ''Exploring new plant
    varieties'', ''Drone aerial landscape mapping'']'
  career_goals: Mack aims to grow his landscaping operation into a regional leader in sustainable ground‑care while preserving the flexibility that keeps his crew motivated. Over the next five years he
    wants to secure certifications in eco‑friendly landscaping, mentor younger supervisors to ensure a smooth transition before retirement, and launch a consulting wing that helps municipal parks adopt
    water‑saving techniques. He also hopes to leave a profitable, well‑organized business that can support his family and fund a modest retirement in the Birmingham area.
