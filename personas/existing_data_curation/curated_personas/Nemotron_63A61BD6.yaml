personas:
  professional: Norman Grubbs is a nonprofit program strategist who blends meticulous grant writing, data‑driven evaluation, and a skeptical eye for partnership alignment to design arts‑based community
    resilience initiatives across the Carolinas, while methodically coordinating volunteers and leveraging CRM tools to keep every project on schedule.
  sports: Norman Grubbs is an avid hiker of the Blue Ridge foothills and a member of the Charlotte Cycling Club who logs weekly rides around Lake Norman, follows the Charlotte Hornets and Carolina Panthers,
    and schedules fitness sessions in a planner, though they occasionally skip workouts to meet tight proposal timelines.
  arts: Norman Grubbs is a frequent visitor to the Harvey B. Gantt Center and the Mint Museum, a street‑and‑nature photographer inspired by Vivian Maier and Ansel Adams, and a concertgoer who loves contemporary
    acts like Tame Impala and St. Vincent, channeling this artistic curiosity into innovative community programs.
  travel: Norman Grubbs is a traveler who meticulously plans trips with spreadsheet budgets yet embraces spontaneous detours, having hiked the Blue Ridge Parkway, explored Berlin’s art districts, and dreaming
    of a culinary tour of Oaxaca while ensuring travel expenses align with their future social‑enterprise funding goals.
  culinary: Norman Grubbs is an intermediate home chef who experiments with eclectic dishes such as Thai green curry, Ethiopian injera, and Korean kimchi, sourcing seasonal produce like heirloom tomatoes,
    galangal, and harissa at local farmers markets, while refining their palate with ingredients such as miso and smoked paprika.
  core: Norman Grubbs is a methodical, art‑curious nonprofit strategist whose competitive edge and skeptical nature drive disciplined financial habits, rigorous program design, and a relentless pursuit
    of community resilience.
background:
  cultural: Norman grew up in a middle‑class, white family on the suburban outskirts of Charlotte, where involvement in church groups and neighborhood charities was a common expectation. The Southern emphasis
    on hospitality, personal responsibility, and close‑knit community ties shaped his early values. Living in a rapidly diversifying Charlotte has exposed him to a vibrant multicultural arts scene and progressive
    civic initiatives, which broadened his outlook. He blends traditional Southern work ethic and respect for neighbors with the inclusive, forward‑thinking ethos of modern urban life, informing his balanced
    approach to social and community service.
attributes:
  skills: '["Program Development & Management", "Strategic Planning", "Grant Writing", "Budget Management", "Data Analysis & Reporting", "Stakeholder Engagement", "Volunteer Coordination", "Community Needs
