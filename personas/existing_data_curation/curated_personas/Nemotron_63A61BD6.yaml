  hobbies: '["Visiting art galleries", "Photography", "Attending live music shows", "Hiking", "Cycling", "Reading contemporary fiction and non‑fiction", "Cooking experimental recipes", "Playing chess",
    "Exploring local farmers'' markets"]'
  career_goals: Norman aims to advance to senior leadership in the non‑profit sector, ideally as a regional director overseeing a coalition of social‑service agencies across the Carolinas. He wants to champion
    data‑driven program innovation and embed arts‑based interventions that boost community resilience. His long‑term ambition includes securing multi‑year funding streams, influencing public policy on affordable
    housing and workforce development, and eventually launching his own social‑enterprise that bridges the arts, education, and job‑training for underserved youth.
