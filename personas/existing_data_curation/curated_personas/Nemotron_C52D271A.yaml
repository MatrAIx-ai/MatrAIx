  hobbies: '[''Visiting art galleries and museums'', ''Watercolor sketching'', ''Photography'', ''Reading fiction, poetry, and art-history'', ''Cooking Vietnamese cuisine'', ''Community gardening'', ''Yoga
    and meditation'', ''Participating in a small book club'', ''Volunteering at a cultural center'', ''Attending local cultural festivals'']'
  career_goals: Tu aspires to build on her retail expertise by moving into a supervisory or assistant-manager position within the store, where she can mentor new employees and improve service standards.
    Simultaneously, her long-standing curiosity about art motivates her to pursue a part-time certification in museum studies or community arts programming, with the goal of volunteering as a docent at
    the Oakland Museum of California or leading art-related workshops for seniors. Over the next few years she hopes to combine her organizational strengths and compassionate nature to create a small community
    space that offers art classes and cultural events, enriching the lives of her neighbors while maintaining a stable career in the retail sector.
