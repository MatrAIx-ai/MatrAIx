  hobbies: '[''Reading Historical Fiction and Poetry'', ''Gardening'', ''Cooking Fusion Cuisine'', ''Attending Cultural Festivals'', ''Bridge and Scrabble'', ''Senior‑Center Discussion Groups'', ''Mindful
    Breathing'', ''Gratitude Journaling'']'
  career_goals: Although officially retired, Pallavi aims to continue influencing education by volunteering as a mentor for new teachers in the Minneapolis school district and offering pro‑bono consulting
    for culturally responsive teaching. She aspires to author a guidebook on incorporating South Asian pedagogical traditions into U.S. classrooms and to lead a local intergenerational literacy program
    that pairs seniors with immigrant youth. Her competitive streak drives her to seek recognition for the programs she helps launch, hoping to secure small grants that sustain them beyond her involvement.
