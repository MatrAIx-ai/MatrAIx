personas:
  professional: Robinesha Smith, a 28‑year‑old full‑stack developer proficient in Python, JavaScript and Java, leverages their methodical, organized nature and love for structure to lead Agile sprints,
    enforce rigorous code quality standards, and mentor junior engineers while they chart a path toward senior and technical leadership.
  sports: Robinesha Smith enjoys solo hikes on Griffith Park’s winding trails, practices Vinyasa yoga at the Los Angeles Yoga Collective studio, roots for the Los Angeles Lakers and Los Angeles Dodgers,
    and they occasionally join a community pick‑up basketball league, reflecting a balanced yet structured approach to fitness.
  arts: Robinesha Smith curates a vinyl collection featuring Marvin Gaye, Aretha Franklin, and Curtis Mayfield, captures street art by Shepard Fairey and Banksy with their camera, loses themselves in Octavia
    Butler’s sci‑fi novels, and they attend intimate poetry slams spotlighting voices like Saeed Jones and Danez Smith, weaving these influences into a personal aesthetic that fuels both their coding creativity
    and weekend board‑game strategy sessions.
  travel: Robinesha Smith meticulously plans trips using detailed spreadsheets, favors solo adventure hikes such as Iceland’s Laugavegur trail and Kyoto’s forested paths, and they balance wanderlust with
    budget constraints by redeeming airline points for flights to Barcelona and backcountry camping in Sedona, while they dream of a future retreat in New Zealand’s South Island to recharge before their
    next career milestone.
  culinary: Robinesha Smith, an intermediate‑skill home chef, reinvents soul‑food classics with healthy twists—collard greens simmered with smoked turkey, baked sweet‑potato mac and cheese topped with cauliflower,
    and quinoa‑stuffed okra spiced with smoked paprika—while they source heirloom tomatoes, kale, and avocados at local farmers’ markets and pair meals with crisp citrus‑infused iced tea.
  core: Robinesha Smith blends analytical precision with a quietly rebellious love for vintage R&B, solitary hikes, and code‑first problem solving, while they obsessively track spreadsheets for budgeting,
    health, and travel itineraries.
background:
  cultural: Robinesha grew up in South Los Angeles in a close‑knit African‑American family with deep roots in the community. Her parents, originally from the Mississippi Delta, instilled in her a strong
    sense of cultural pride and the value of education. She celebrates Juneteenth, Kwanzaa, and family reunions with traditional foods, music, and storytelling. As a Black woman in tech, she is active in
    local networks such as Black Women in Tech LA, where she mentors other women of color and advocates for inclusive hiring practices. Her cultural heritage influences her culinary interests, her love
    of soul‑music, and her commitment to giving back through community service and youth empowerment.
attributes:
  skills: '[''Python'', ''JavaScript'', ''Java'', ''C#'', ''React'', ''Node.js'', ''SQL'', ''Git'', ''Agile Scrum'', ''Test‑Driven Development'', ''AWS'', ''CI/CD'', ''Debugging'', ''Algorithm Optimization'']'
  hobbies: '[''Science‑fiction reading'', ''Sudoku and logic puzzles'', ''Hiking in Griffith Park'', ''Yoga'', ''Cooking healthy soul‑food meals'', ''STEM mentorship volunteering'', ''Street photography'',
    ''Poetry slams'', ''Strategy board games'', ''Collecting vintage R&B vinyl'']'
  career_goals: Robinesha aims to progress to a senior software engineer role within the next two years, focusing on building reliable, high‑performing systems. She seeks opportunities to lead a development
    team as a technical lead, where she can apply her organizational strengths to streamline project workflows and improve code quality. In the longer term, she aspires to become a software architect or
    CTO of a mission‑driven startup that creates educational technology tools for under‑represented youth. To support these goals, she plans to earn an AWS Solutions Architect certification and pursue a
    part‑time master’s degree in computer science.
