personas:
  professional: Lizzie Woodham is a self‑taught horticulturist and small‑batch preserve artisan who blends her hands‑on gardening, carpentry, and budgeting expertise with a competitive, skeptical edge to
    launch a modest home‑based market stall while juggling spontaneous community mediation and GED coursework, and they often shift priorities on a whim.
  sports: Lizzie Woodham is a casual outdoor enthusiast who hikes the Yakima River Canyon each spring, runs the occasional 5 K, follows the Seattle Seahawks and Seattle Mariners for football and baseball,
    and participates in the Prosser senior cycling club, preferring low‑impact activity that fits their busy schedule and competitive streak.
  arts: Lizzie Woodham is a devoted bird‑sketcher inspired by John James Audubon, a fan of folk legends like Joni Mitchell, and a regular at the Benton County Fair’s bluegrass stage where they enjoy performances
    by the Yakima River Ramblers, allowing their spontaneous creativity to flourish alongside their knitting and quilting.
  travel: Lizzie Woodham favours impromptu road trips to nearby wine regions such as Walla Walla and the Oregon Coast, while dreaming of a Mediterranean culinary tour of Tuscany and Provence, balancing
    their wanderlust with a tight budget and a love for local festivals.
  culinary: Lizzie Woodham delights in crafting small‑batch strawberry‑basil jam, dill‑pickled cucumbers, and fermented sauerkraut using garden harvests, and they savour simple meals like grilled trout
    with lemon‑herb quinoa, occasionally treating themselves to a cherry‑pie slice at the Benton County Fair.
  core: Lizzie Woodham is a fiercely curious, hands‑on gardener and preserve maker whose competitive streak fuels community projects, yet their spontaneous nature and occasional disorganization keep them
    juggling dreams, budgets, and a love for bird‑sketching with a good‑humored skepticism, and they never miss a chance to debate local policies at the county fair.
background:
  cultural: Lizzie comes from a white, working‑class family rooted in the rural Pacific Northwest. Growing up in the 1960s and 70s, she was immersed in a tight‑knit community that valued self‑reliance,
    agricultural traditions, and modest church involvement. The local culture of Prosser—centered on farming, seasonal festivals, and neighborly support—shapes her practical outlook and her comfort with
    informal, hands‑on learning. While she respects traditional methods, her lifelong curiosity pushes her to experiment with new gardening practices and community initiatives.
attributes:
  skills: '[''Organic gardening'', ''Food preservation (canning, pickling, fermenting)'', ''Basic carpentry and repairs'', ''Household troubleshooting'', ''Frugal budgeting'', ''Community mediation'']'
  hobbies: '[''Birdwatching and sketching'', ''Knitting'', ''Quilting'', ''Attending local fairs and competitions'', ''Reading historical fiction'']'
  career_goals: Lizzie hopes to turn her gardening and preserving talents into a modest home‑based venture, selling jars of homemade jams and pickles at the local farmers' market. She dreams of completing
    a GED to formalize her education and eventually volunteer as a workshop instructor at the community center, teaching practical self‑sufficiency skills. She also aspires to lead a neighborhood garden
    project that combines new, sustainable techniques with traditional planting methods, thereby mentoring younger residents while satisfying her curiosity about innovative agriculture.
