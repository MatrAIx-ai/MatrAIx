personas:
  professional: Sonia Varona, a senior actuary specializing in mortality and morbidity modeling, leverages their mastery of stochastic simulations, R, Python, and bilingual communication to distill complex
    risk insights for diverse stakeholders, while they explore emerging analytics without strict process discipline, and their calm resilience carries them through tight deadlines despite occasional organizational
    lapses.
  sports: Sonia Varona, an avid hiker, spends weekend mornings trekking the foothills around Aurora while they cheer on the Colorado Rockies and Denver Broncos, participates in the Colorado Hiking Club’s
    sunrise climbs, and balances their active lifestyle with gentle yoga sessions at a nearby community studio.
  arts: Sonia Varona nurtures their creative side by devouring mystery novels by Agatha Christie, admiring the vibrant murals of local artist Carlos Alvarez, and they savor intimate evenings of live mariachi
    music that echo the soulful strings of Vicente Fernández.
  travel: Sonia Varona prefers thoughtfully planned, low‑key getaways that blend sunrise photography with cultural immersion, such as weekend trips to Estes Park for Colorado skyline shots, a week‑long
    escape to the vineyards of Mendoza, and a solo adventure through the historic streets of Cartagena, all while they balance their modest travel budget with a love for authentic experiences.
  culinary: Sonia Varona, an accomplished home cook, delights in perfecting complex mole poblano with ancho chilies, toasted sesame seeds, and Mexican chocolate, rolls hearty pork‑filled tamales with fresh
    masa, and they pair their creations with vibrant avocado salsa, while occasionally treating themselves to a farm‑to‑table dinner featuring locally sourced trout.
  core: Sonia Varona balances actuarial rigor with sunrise hikes, juggling a love for meticulous data models and a habit of leaving coffee mugs in the microwave, and they embody calm resilience and a relaxed,
    curiosity‑driven outlook on life.
background:
  cultural: Sonia was raised in a Mexican‑American household where family bonds, respect for elders, and vibrant culinary traditions were central. Bilingual from childhood, she celebrates Día de los Muertos
    and Mexican Independence Day with her extended family, maintaining strong ties to relatives in Mexico. Living in Aurora's diverse Hispanic community, she participates in local cultural festivals and
    supports initiatives that promote Latino representation in STEM fields. Her heritage informs her collaborative style—balancing compassion with assertiveness—and fuels her desire to mentor the next generation
    of underrepresented actuaries.
