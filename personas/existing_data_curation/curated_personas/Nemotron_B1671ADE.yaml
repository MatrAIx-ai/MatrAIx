  career_goals: Sonia aims to attain Fellowship of the Society of Actuaries (FSA) within the next three years, positioning herself for a senior leadership role such as Chief Risk Officer or Head of Predictive
    Analytics. She is motivated to develop climate‑risk models that inform corporate sustainability strategies and to mentor underrepresented talent—particularly Mexican‑American women—into the actuarial
    profession. Long‑term, she envisions launching a boutique consultancy that blends actuarial rigor with culturally informed risk solutions for community‑based insurers in the Southwest.
