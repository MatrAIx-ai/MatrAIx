  career_goals: Beverly aspires to become an architect or a museum curator, combining her love for art, design, and meticulous organization. She dreams of winning regional science fairs and gaining scholarships
    that will support her higher education. Her competitive nature drives her to aim for top grades and leadership roles in school clubs, while her desire for achievement fuels a long‑term goal of creating
    innovative, sustainable designs that reflect both artistic beauty and functional precision.
