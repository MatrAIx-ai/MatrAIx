  career_goals: Michele aspires to earn her GED and pursue a vocational certificate in home organization or culinary arts, enabling her to launch a part‑time home‑based consulting service for household
    efficiency. She also aims to expand her volunteer work into a leadership role within the local community garden and food‑bank network, ultimately seeking a modest supplemental income while maintaining
    her preference for a stable, routine‑driven lifestyle.
