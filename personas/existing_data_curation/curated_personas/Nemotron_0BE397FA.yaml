  career_goals: When older, Davonte aspires to channel his love for art and unconventional ideas into a career that blends creativity with community impact. He dreams of becoming a visual artist or multimedia
    designer who curates exhibitions celebrating Black Southern culture, or a cultural educator who develops art programs for youth in Jefferson Parish. He aims to pursue higher education in Fine Arts or
    Media Studies, achieve a stable yet flexible professional life, and eventually assume leadership roles that allow him to advocate for representation and innovative artistic narratives.
