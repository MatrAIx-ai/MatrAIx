  career_goals: Looking ahead, Jonathan aims to leverage his supervisory experience into a district‑manager role within the next three years, overseeing multiple locations and standardizing best practices
    across the region. He plans to develop a mentorship program for emerging supervisors, passing on his structured approach and practical problem‑solving skills. Financial security for his family remains
    a priority, so he is focused on maximising retirement contributions and exploring the possibility of acquiring a small specialty retail venture after stepping down from full‑time employment. Ultimately,
    he hopes to leave a legacy of reliability, balanced leadership, and community involvement within the retail sector.
