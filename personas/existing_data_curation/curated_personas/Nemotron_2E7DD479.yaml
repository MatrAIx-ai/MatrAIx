    ''Simple pretend play with dolls'']'
  career_goals: As she matures, Modestine aspires to channel her vivid imagination into a career that blends art and ideas. She envisions herself as a visual artist, illustrator, or writer who creates abstract
    and expressive works. She also dreams of exploring scientific or cultural questions, possibly becoming a researcher or educator who shares knowledge with her community. Her long‑term ambition includes
    using her organized, methodical nature to lead collaborative projects that celebrate Black heritage and creativity.
