personas:
  professional: Modestine Shannon, an inquisitive one‑year‑old, treats each new toy as a laboratory, methodically arranging stacking rings and cataloguing the sounds they make, revealing an early blend
    of imagination and systematic curiosity that hints at future scholarly pursuits.
  sports: Modestine Shannon, a lively toddler at the local Little Sprouts Toddler Gym, participates in weekly baby‑gym sessions, loves crawling races, and eagerly watches the River City Rovers on family
    TV nights, clapping quietly whenever the team scores, and they beam with pride at each cheer.
  arts: Modestine Shannon, an imaginative infant, spends hours with high‑contrast picture books, responds enthusiastically to Debussy’s piano lullabies, and delights in finger‑painting bright abstract swirls,
    seeing every melody and color as a story they imagine being told.
  travel: Modestine Shannon, ever‑curious about the world beyond the nursery, has accompanied the family on a weekend trip to the Grand Canyon’s rim and a short beach getaway in Santa Monica, preferring
    short, well‑planned excursions where familiar toys and a consistent nap schedule are maintained, and they relish the novelty of new sights while clutching their favorite blanket.
  culinary: Modestine Shannon, a budding foodie, favors sweet mashed carrots and ripe banana purées, delights in trying new textures like avocado toast finger‑food, and, when allowed, attempts to mimic
    sizzling sounds by clapping spoons, often ending meals with a sticky‑sweet grin that they savor with pure delight.
  core: Modestine Shannon is a meticulously organized, highly imaginative one‑year‑old whose intense emotions turn routine disruptions into dramatic episodes, and whose secret stash of snack crumbs betrays
    a budding financial instinct that they guard jealously.
background:
  cultural: Modestine is a Black child raised in Finksburg, Maryland, a close‑knit community in Carroll County. Her family honors African American cultural traditions through storytelling, gospel music,
    and community gatherings at the local church. She is immersed in celebrations of Black history, soul food, and the arts, which shape her developing aesthetic sensibilities and provide a supportive environment
    for her imaginative and emotionally expressive nature.
attributes:
  skills: '[''Walking'', ''Basic speech (20+ words)'', ''Color identification'', ''Shape sorting'', ''Fine motor coordination (stacking blocks)'', ''Scribbling with crayons'', ''Pattern recognition'']'
