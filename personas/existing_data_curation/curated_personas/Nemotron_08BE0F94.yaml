  hobbies: '[''Watercolor painting'', ''Acrylic painting'', ''Poetry writing'', ''Reading classic literature'', ''Gardening'', ''Attending community theater'', ''Line dancing'', ''Genealogy research'',
    ''Knitting'', ''Quilting'', ''Cooking and sharing meals'', ''Visiting art museums and cultural festivals'', ''Participating in senior book clubs'', ''Mentoring younger artists'']'
  career_goals: Although retired, Amanda remains driven by personal artistic milestones and community impact. She aspires to publish a collection of her poems and memoir excerpts that weave together her
    Midwestern upbringing with her lifelong love of art. She hopes to stage a solo exhibition at the Davenport Art Center showcasing her abstract watercolors. Amanda also aims to launch a senior‑focused
    art mentorship program that pairs older adults with younger artists, fostering intergenerational creativity. Beyond these goals, she wishes to travel to at least three major art museums in the United
    States, deepen her genealogical research, and continue serving on the local arts council to advocate for accessible cultural programming.
