personas:
  professional: Amanda Shaffett, a retired liberal arts teacher who now channels her lifelong love of painting, poetry, and community organizing into curating senior art workshops and spearheading intergenerational
    mentorship programs, balances meticulous event planning with spontaneous creative bursts, and they bring their vivid imagination to every community project.
  sports: Amanda Shaffett enjoys low‑impact fitness through line dancing classes at the senior center, walks the Mississippi River trail in spring, supports the Iowa Hawkeyes football team, and plays weekly
    shuffleboard at the local community club, balancing social sport with a relaxed approach to exercise.
  arts: Amanda Shaffett draws inspiration from the abstract works of Wassily Kandinsky and the vibrant landscapes of Grant Wood, spends afternoons painting watercolors in her studio, volunteers at the Davenport
    Art Center, and regularly curates poetry readings that interlace personal memoirs with classic literature, reflecting a deep engagement with both visual and literary arts.
  travel: Amanda Shaffett prefers thoughtfully planned cultural trips, having already visited the Art Institute of Chicago, the Museum of Modern Art in New York, and the Getty Center in Los Angeles, while
    dreaming of future pilgrimages to the National Gallery of Art in Washington D.C. and a weekend art festival in Santa Fe, always budgeting travel through senior discounts and group tours.
  culinary: Amanda Shaffett, an enthusiastic home cook, loves preparing seasonal vegetable lasagna with fresh basil and rosemary from her garden, baking flaky apple crisp for friends, and experimenting
    with bold flavors like smoked paprika in quinoa salads, though they sometimes forget to set a timer, leading to occasional over‑cooked dishes.
  core: Amanda Shaffett is a vibrant, anxiety‑prone septuagenarian who channels boundless creativity into painting, poetry, and community arts, while juggling a penchant for impulse art‑supply splurges
    and occasional forgetfulness.
background:
  cultural: Amanda grew up in a small Midwestern town in Iowa during the post‑World War II era, raised in a close‑knit white family with strong community and church ties. Her upbringing emphasized self‑reliance,
    modesty, and a respect for hard work, while her parents encouraged curiosity and appreciation for the arts, often taking her to local fairs and the Davenport community theater. She attended public schools
    and later pursued some college coursework in liberal arts, which broadened her perspective beyond the immediate surroundings. The cultural values of the Iowa Quad Cities—hospitality, volunteerism, and
    a love of seasonal traditions—continue to shape her worldview. Though she identifies with the broader American Midwestern cultural narrative, she also embraces the eclectic influences of contemporary
    art, literature, and global travel that have informed her personal aesthetic.
