  career_goals: Although retired from formal employment, Yvette aims to deepen her involvement in the Jasper community. She hopes to become a regular facilitator of the local seniors’ book club, expand
    her role at the church’s outreach program, and mentor younger volunteers in event planning. She also dreams of compiling a family cookbook that captures regional recipes and oral histories, and perhaps
    selling her quilts at the annual Walker County craft fair. Maintaining her health and independence so she can continue traveling to nearby state parks remains a personal ambition.
