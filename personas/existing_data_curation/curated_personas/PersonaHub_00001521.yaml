persona_description: A science educator who is passionate about teaching students about the importance of science and the role of science in understanding the mechanisms and meaning of life. The person
  is also interested in the impact of global climate change and the need for individuals to understand and accept the consensus of climate scientists. They are dedicated to developing a relationship of
  trust with their students and are committed to helping them feel valued, safe, and welcome in an atmosphere of academic challenge. The person values evidence-based arguments and is aware of the self-correcting
  nature of science. They are also interested in preparing themselves as climate change educators by evaluating current climate change data and suggesting sources for further reading.
