  career_goals: Nancy aims to transition from full‑time corporate development into a consulting role that focuses on interdisciplinary projects blending data science, interactive media, and cultural preservation.
    She aspires to become a recognized thought leader in data‑driven storytelling, delivering talks at regional tech meetups and art forums. A key ambition is to mentor emerging women programmers in the
    Midwest, establishing a mentorship circle that supports their career progression. Over the next five years, she hopes to spearhead a grant‑funded initiative creating a digital archive of Sherman’s historical
    artifacts, leveraging machine‑learning for image tagging and interactive visualizations. Ultimately, she seeks to leave a lasting impact by integrating her technical expertise with her passion for art
    and community heritage.
