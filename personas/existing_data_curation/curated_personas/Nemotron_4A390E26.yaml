  career_goals: Luis envisions completing his GED by age 18 and then enrolling in a culinary program that focuses on street‑food entrepreneurship. His ultimate ambition is to open a family‑run taco cart
    in the Mission District that blends traditional Mexican flavors with the fast‑paced, innovative vibe of San Francisco. He also dreams of turning his skateboarding skill into a semi‑professional career,
    aiming for sponsorships and local competitions, and eventually opening a small skate shop that doubles as a community hub. These goals reflect his desire for a practical, self‑sustaining livelihood
    while allowing room for the spontaneous, competitive pursuits he enjoys.
