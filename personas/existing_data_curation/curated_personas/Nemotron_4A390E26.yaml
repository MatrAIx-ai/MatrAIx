personas:
  professional: Luis Vielma, a high‑school sophomore, blends a love for skateboarding and bike repair into a budding side hustle, designing custom decks and posting quick‑fire TikTok tutorials, and they
    apply a routine‑driven work ethic while still allowing spontaneous creative bursts.
  sports: Luis Vielma is an avid skateboarder who spends afternoons at the local skate park, loyally follows the San Jose Earthquakes, and joins neighborhood soccer pickup games, and they use a competitive
    edge to push tricks while embracing the Bay Area’s outdoor culture.
  arts: Luis Vielma captures the city’s vibrant murals and street life with a phone, admires regional banda music and local muralists, and they blend cooking and skateboarding into short TikTok performances,
    letting creative impulses temper a routine‑oriented personality.
  travel: Luis Vielma loves weekend trips to Muir Woods and the Santa Cruz boardwalk, dreams of attending the Day of the Dead celebration in Oaxaca, and they plan routes on a map app while leaving room
    for spontaneous detours, navigating a limited teen budget wisely.
  culinary: Luis Vielma whips up family‑passed recipes like tacos with corn tortillas, chilaquiles, and salsa verde, adding a chipotle‑infused guacamole twist, and they balance confident stovetop sautéing
    with occasional burnt tortillas, reflecting a blend of tradition and experimental flair.
  core: Luis Vielma is a routine‑loving teen who balances skateboarding, gaming, and cooking with a competitive spirit, occasional impulsive spending, and a habit of staying up late to edit TikTok videos,
    and they stay cool under pressure.
background:
  cultural: Luis comes from a Mexican‑American household in San Francisco, where Spanish is spoken at home and English dominates school and the broader community. His parents immigrated from Jalisco, bringing
    with them a strong emphasis on family meals, respect for tradition, and celebration of cultural holidays such as Día de los Muertos and Mexican Independence Day. Growing up in a vibrant, multicultural
    city, Luis blends his Mexican heritage with the eclectic Bay Area culture—absorbing influences from local street art, diverse culinary scenes, and a community of young creatives. This dual cultural
    exposure shapes his identity, informing his love of Mexican cuisine, his participation in city festivals, and his adaptive, pragmatic outlook on life.
