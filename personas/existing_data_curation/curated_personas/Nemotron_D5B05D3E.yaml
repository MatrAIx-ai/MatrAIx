  career_goals: Jose aims to advance to a supervisory or shift‑manager position within the Middlesex County dispatch center, where he can lead a team, streamline workflows, and champion the adoption of
    AI‑driven decision‑support tools. He plans to obtain certification in emergency management and pursue a master's degree in public administration to broaden his impact on community safety. A personal
    goal is to develop and implement a mental‑health support program for dispatchers, drawing on his own experiences with anxiety and distress, to foster a healthier work environment. Additionally, Jose
    hopes to mentor younger staff, especially those from bilingual backgrounds, and to contribute to public‑safety outreach initiatives that educate residents about emergency preparedness.
