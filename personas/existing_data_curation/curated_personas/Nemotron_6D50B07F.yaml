personas:
  professional: Jorge Andres, a retired electrical engineer with a master’s degree in Renewable Energy Systems, applies their deep knowledge of solar‑photovoltaic integration, MATLAB modeling, and bilingual
    technical writing to design community micro‑grids, and they blend visual storytelling through watercolor sketches to make complex engineering concepts accessible to their small cohort of high‑school
    mentees.
  sports: Jorge Andres enjoys early‑morning hikes along the dry forest trails of the Aguadilla region, follows the local baseball team Indios de Mayagüez with seasonal enthusiasm, and they casually play
    senior‑division doubles tennis at the municipal courts on weekends.
  arts: Jorge Andres blends a love for classical guitar—performing pieces such as Rodrigo’s Concierto de Aranjuez and traditional Mexican corridos—with a devotion to visual arts that sees them attending
    monthly gallery talks featuring the work of contemporary Puerto Rican painters like José Campeche Jr., while Frida Kahlo’s vivid watercolors inspire their own sketches.
  travel: Jorge Andres prefers intimate, photography‑focused getaways, often spending a long weekend exploring the colonial arches of Guanajuato to capture its pastel buildings, or taking a short ferry
    ride to Vieques for sunrise shoots, and they are planning a modest road trip along Puerto Rico’s western coast to document the karst cliffs of Cabo Rojo before their budget allows for a longer cultural
    pilgrimage to Oaxaca.
  culinary: Jorge Andres enjoys experimenting in the kitchen, often fusing a rich mole verde with a splash of local adobo and serving it over crisp tostones, while regularly seasoning their rooftop herb
    garden’s cilantro and epazote to flavor arroz con gandules and a smoky pollo al chilito, though they sometimes over‑salt the dish in the excitement of trying new variations.
  core: Jorge Andres is a curious, solitary senior who merges renewable‑energy expertise with watercolor storytelling, turning each sunrise into a canvas while quietly championing sustainable micro‑grids
    in their community.
background:
  cultural: Jorge was born in Puerto Rico to Mexican immigrants who arrived in the 1960s seeking work in the island’s growing manufacturing sector. Raised bilingually, he celebrates Día de los Muertos with
    his family while also participating in Puerto Rican fiestas patronales, seamlessly weaving both traditions into his daily life. His Spanish carries subtle Mexican inflections, but he has adopted local
    idioms and a deep affection for the island’s music, food, and natural landscapes. He is an active member of a cultural club that preserves Mexican folklore in Puerto Rico, often organizing joint events
    that highlight the shared histories and artistic expressions of both peoples. This blended heritage informs his worldview, encouraging him to bridge technical expertise with cultural storytelling.
attributes:
  skills: '[''Renewable Energy System Design'', ''Power‑System Analysis'', ''MATLAB Programming'', ''Python Data Modeling'', ''Technical Writing'', ''Bilingual Communication (Spanish/English)'', ''Project
    Management'', ''Mentorship & Teaching'', ''Creative Problem Solving'', ''Photography Composition'', ''Watercolor Illustration'']'
  hobbies: '[''Landscape Photography'', ''Watercolor Painting'', ''Classical Guitar'', ''Herb & Succulent Gardening'', ''Reading Folk Literature'', ''Hiking Coastal Trails'', ''Fusion Cooking (Mexican‑Puerto
    Rican)'', ''Curating Small Art Exhibitions'', ''Mentoring Youth in STEM'']'
  career_goals: Although officially retired, Jorge aims to launch a community‑driven micro‑grid project that brings affordable solar power to the outskirts of Aguadilla. He plans to mentor a small cohort
    of high‑school students in hands‑on STEM projects, eventually establishing a makerspace where engineering meets local art. He also aspires to publish an interdisciplinary guide that blends technical
    explanations of renewable energy with visual storytelling through his own watercolor illustrations, preserving both his Mexican heritage and Puerto Rican surroundings. Finally, he wishes to curate a
    modest travelling exhibition that showcases the visual dialogue between Mexican folk art and contemporary Puerto Rican artists, fostering cultural exchange.
