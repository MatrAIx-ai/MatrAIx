  hobbies: '[''Gardening (vegetable and ornamental)'', ''Woodworking (furniture building)'', ''Reading (historical biographies, local history)'', ''Birdwatching'', ''Volunteering at community library'',
    ''Chess (senior club)'', ''Fishing in local lakes'', ''Cooking classic American comfort food'']'
  career_goals: Although formally retired, Allen aims to stay active through community involvement and lifelong learning. He plans to lead workshops at the local senior center on woodworking and garden
    design, mentor younger volunteers in project planning, and complete a personal memoir documenting his family history. Allen also aspires to obtain a basic first‑aid certification to serve as a health
    aide during community events, and to travel with his spouse to historic sites across the United States, blending his curiosity with a well‑structured itinerary.
