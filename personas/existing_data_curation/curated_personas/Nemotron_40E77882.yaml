personas:
  professional: Allen Wiley, a retired home‑renovation project manager turned senior‑center workshop facilitator, leverages their meticulous budgeting, disciplined organization, and assertive yet cooperative
    demeanor to coordinate woodworking classes, garden design seminars, and volunteer schedules for the Gainesville public library, consistently meeting high standards while mentoring younger volunteers.
  sports: Allen Wiley enjoys low‑impact physical activities such as early morning walks along the St. Johns River, occasional pickleball matches with the Gainesville Senior Pickleball Club, seasonal fishing
    trips for bass, and is an avid supporter of the Florida Gators football team, balancing gentle exercise with a passion for local sports fandom.
  arts: Allen Wiley, a regular patron of the Gainesville Community Theatre, frequently attends productions starring local actor Mark McCormick, delights in folk‑rock performances by Gillian Welch, and reads
    biographies of artists like Georgia O’Keeffe to inspire creative motifs in their custom furniture designs.
  travel: Allen Wiley prefers meticulously planned road trips to historic American sites—such as Colonial Williamsburg, the Gettysburg battlefield, and the Alamo—balancing a love of history with a modest
    travel budget, careful itineraries that accommodate their spouse’s pacing, and occasional detours for birdwatching in state parks.
  culinary: Allen Wiley enjoys cooking fresh sautéed snapper with lemon‑caper butter, side dishes of heirloom tomatoes, basil, and sweet corn harvested from their garden, and indulgent low‑sugar key lime
    pie, though they often over‑season with paprika, reflecting a blend of meticulous recipe planning and occasional culinary spontaneity.
  core: Allen Wiley integrates disciplined project‑management skills, a love of woodworking and gardening, cautious financial habits, and a steady worry‑driven attention to health, creating a uniquely organized
    yet occasionally anxious senior who balances solitary crafts with community engagement.
background:
  cultural: Allen is a White American born in the Midwest during the post‑World War II era, raised in a middle‑class, Protestant household that valued self‑reliance, hard work, and community service. After
    relocating to Gainesville, Florida, he embraced the region’s blend of Southern hospitality and the vibrant retiree culture. His cultural identity reflects a respect for tradition, a strong sense of
    civic duty, and an appreciation for the multicultural tapestry of modern Florida, while his personal values remain rooted in the disciplined, achievement‑oriented upbringing of his generation.
