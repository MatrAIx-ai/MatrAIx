persona_description: A professional who specializes in the field of metalworking, particularly in the use of cutting fluids in increasing productivity and reducing costs. This individual is knowledgeable
  about the functions, types, characteristics, advantages, and limitations of various cutting fluids, and has experience in selecting the appropriate fluid based on factors such as machinability, compatibility,
  and acceptability. They are also familiar with various application methods of cutting fluids and the precautions that should be observed by the operator. This persona is likely to be an engineer or a
  metalsmith who works in the metalworking industry and is responsible for selecting and using cutting fluids to improve the efficiency and quality of metalworking operations.
