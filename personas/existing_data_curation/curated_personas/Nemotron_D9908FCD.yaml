  career_goals: She aims to expand her home workshop into a community‑oriented studio that offers collaborative spaces, apprenticeship programs, and regular design exhibitions. Over the next five years,
    Maria plans to launch a line of limited‑edition furniture that reflects her abstract artistic vision, using reclaimed wood and innovative joinery. She also hopes to author a book that merges woodworking
    techniques with creative design thinking, and to host a regional symposium on sustainable craft practices.
