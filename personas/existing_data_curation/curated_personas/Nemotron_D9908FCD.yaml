personas:
  professional: A master woodworker and design visionary, Maria Snipes leverages meticulous project planning, hand‑carving, dovetail joinery, CNC routing, and sustainable material sourcing to craft sculptural,
    abstract furniture while captivating clients with their talkative, collaborative workshop leadership and approachable teaching style.
  sports: An active gardener and weekend hiker, Maria Snipes follows the Dallas Cowboys, Austin FC, and the San Antonio Spurs with enthusiasm, participates in a senior tennis league at the community center,
    and balances low‑impact cardio with weekly yoga to counteract the physical strain of woodworking.
  arts: A theater‑enthusiast and abstract painter, Maria Snipes draws creative fuel from the bold color fields of Mark Rothko, the kinetic installations of Olafur Eliason, and the lyrical storytelling of
    Lin‑Manuel Miranda, regularly performing in community productions of Tennessee Williams’ 'The Glass Menagerie' while translating these influences into reclaimed‑wood furniture with sculptural flair.
  travel: A meticulous planner with a love for cultural immersion, Maria Snipes enjoys weekend road trips to Hill Country vineyards, annual pilgrimages to Santa Fe’s art festivals, and dreams of a month‑long
    workshop tour across Tuscany’s artisan villages, Andalusian olive groves in Spain, and Kyoto’s timber workshops, balancing discovery with a budget that prioritizes her studio’s expansion.
  culinary: A seasoned pitmaster and inventive baker, Maria Snipes perfects classic Texas brisket, smoked pecan‑crusted trout, and a signature caramel‑apple cobbler, sourcing local heirloom corn and mesquite
    wood for her grill, and occasionally curates elaborate cheese boards featuring aged cheddar and blue cheese for her dinner parties.
  core: A charismatic blend of craftsman and philosopher, Maria Snipes channels boundless imagination into reclaimed‑wood masterpieces, habitually juggles multiple projects, over‑caffeinates during late‑night
    painting sessions, and never misses a Friday night theater curtain call.
background:
  cultural: Maria was born and raised in Lubbock, Texas, a community shaped by the wide‑open West Texas plains and a strong sense of neighborly hospitality. Her family has a long tradition of woodworking,
    passing down hand‑tool skills through generations. Growing up, she participated in local fairs, Friday night football gatherings, and church events, which reinforced values of cooperation, reliability,
    and community service. The region’s mix of Southern and Southwestern cultural influences—such as a love for outdoor activities, a respect for the land, and an appreciation for storytelling—have informed
    her artistic sensibility and her commitment to sustainable, locally sourced materials.
