personas:
  professional: A budding junior coder and nature sketcher, Teresa Puglisi blends their curiosity about the natural world with early coding experiments on a tablet, delivering meticulously organized doodles
    and simple interactive stories while navigating occasional self‑doubt that colors their creative process.
  sports: Teresa Puglisi enjoys Saturday morning hikes on nearby trails, participates in the town’s ‘Kids Soccer League’ as a member of the ‘River Runners’ team, follows the local baseball club the ‘Cityville
    Tigers,’ and balances active play with regular piano practice, though they sometimes feel pressured to keep up with faster teammates.
  arts: Teresa Puglisi finds inspiration in the whimsical watercolor landscapes of Beatrix Potter, frequently listens to piano pieces by Ludovico Einaudi while sketching, admires the storytelling of Disney’s
    ‘Moana,’ and regularly attends community theater productions of classics like ‘Peter Pan,’ where they eagerly volunteer for backstage roles despite occasional stage‑fright.
  travel: Teresa Puglisi loves weekend trips to the nearby Pine Ridge State Park, has enjoyed a family vacation to Orlando’s Disney World, dreams of exploring the ancient ruins of Machu Picchu, and prefers
    detailed itineraries that include nature walks, yet they sometimes feel anxious about flying and the unknown.
  culinary: Teresa Puglisi delights in baking chocolate chip cookies with their grandmother, prefers homemade mac and cheese seasoned with cheddar and a pinch of paprika, enjoys fresh fruit salads featuring
    strawberries, blueberries, and mint, and eagerly experiments with adding a dash of cinnamon to oatmeal, though they occasionally over‑sweeten desserts when nervous.
  core: Teresa Puglisi is a curious, meticulous nine‑year‑old who balances a love of art, coding, and nature with a lingering worry about meeting expectations, often found sketching in the backyard while
    humming piano scales.
background:
  cultural: Teresa is a white American with Italian ancestry, raised in the suburban community of Thompson's Station in Williamson County, Tennessee. Her family embraces Southern hospitality, participates
    in local church activities, and attends community events such as county fairs and school art shows. At home, she experiences Italian culinary traditions and family stories from her grandparents, while
    also enjoying Southern customs like barbecues, country music, and outdoor recreation. This blend of Southern and Italian-American influences, together with an emphasis on education and community involvement,
    shapes her worldview and daily life.
