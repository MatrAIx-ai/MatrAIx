persona_description: A Japanese artist and writer who is known for his abstract and avant-garde paintings and sculpture. He was born in Japan in 1911 and lived in Paris for a decade before returning to
  Japan in 1940. His works often question the nature of art and art should be available to all, should be shared by everyone in the same way, like the sun. He introduced the concept of Taikyoku-ism (polarism)
  in 1947 and created works such as Dawn, Heavy Industry, and Law of the Jungle. He was a prolific artist and writer and had a significant impact on the art world.
