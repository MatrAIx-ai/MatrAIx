  career_goals: Aixa aims to expand her practice by establishing a boutique advisory firm focused on serving retirees and small business owners in mountain communities. She plans to earn her Certified Financial
    Planner (CFP) designation and pursue specialized certifications in sustainable investing to integrate innovative, environmentally conscious options for her clients. Over the next five years, she envisions
    hiring and mentoring a junior advisor, publishing a quarterly financial insights newsletter, and launching a community financial literacy program in local schools. Her long‑term ambition is to transition
    into a semi‑retirement role where she continues to provide strategic counsel while dedicating more time to mentorship and community service.
