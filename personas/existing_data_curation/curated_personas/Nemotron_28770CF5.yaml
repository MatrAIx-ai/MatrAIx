  hobbies: '[''Hiking'', ''Snowshoeing'', ''Nature Photography'', ''Cooking Mexican Cuisine with Modern Twists'', ''Yoga and Mindfulness'', ''Women’s Book Club'', ''Volunteering with Habitat for Humanity'',
