  hobbies: '[''Gardening'', ''Cooking'', ''Reading'', ''Hiking'', ''Yoga'', ''Book club'', ''Quilting'', ''Live music'', ''Animal shelter volunteering'']'
  career_goals: April aims to complete her undergraduate degree in Business Administration, enabling her to serve more effectively on the board of a local youth‑education nonprofit. She aspires to launch
    a small home‑based artisanal jam business that blends traditional Southern flavors with new culinary ideas. Additionally, she hopes to expand her mentorship role, guiding young women in the community,
    and to spearhead the development of a neighborhood garden that provides fresh produce and educational workshops for residents.
