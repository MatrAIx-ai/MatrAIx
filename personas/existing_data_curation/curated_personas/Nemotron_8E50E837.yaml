personas:
  professional: April Ford, a 52‑year‑old community event planner and aspiring entrepreneur, leverages their expertise in horticulture, budget management, and conflict mediation to coordinate volunteer
    activities, serve on the board of a youth‑education nonprofit, and map out the launch of a home‑based artisanal jam business that blends Southern flavors with innovative twists.
  sports: April Ford stays active by hiking the local Blue Ridge Trail Club's weekend routes, practicing yoga at sunrise, and cheering for the River City Rascals minor league baseball team and the Bayou
    City FC women’s soccer squad, while they also play in a community pickleball league each spring and join a casual softball team that meets for weekend games.
  arts: April Ford’s artistic side blossoms in a monthly quilting circle, a community book club that discusses historical fiction and women’s history, and live music evenings where they enjoy folk‑blues
    performances by regional artist Josie Morgan and occasional jazz sets by the downtown quartet, while they also attend the local theater’s productions of classic plays and collect vintage concert posters.
  travel: April Ford prefers purposeful travel, often planning road trips that combine historic women’s sites—such as the women's suffrage museum in Seneca Falls—with culinary stops to sample regional cuisines;
    they have visited Kyoto’s zen gardens for horticultural inspiration, explored the historic districts of Savannah and Charleston, and dream of a summer getaway to the lavender fields of Provence, all
    while balancing a modest travel budget and occasional family obligations.
  culinary: April Ford is an adventurous home chef who blends Southern staples like fried green tomatoes, shrimp and grits, and pecan pralines with international flavors such as Thai green curry, Moroccan
    tagine, and Korean kimchi, frequently experimenting with heirloom vegetables from their garden, using ingredients like okra, sweet potatoes, lavender, and hibiscus to craft small‑batch artisanal jams,
    and while their recipe development is meticulous, they sometimes over‑season a dish before realizing the balance is off.
  core: April Ford, a 52‑year‑old garden‑loving community catalyst, balances practical organization with curious experimentation, turning volunteer chaos into harmony while sprinkling everyday life with
    seed‑saving, jam‑making, and a habit of over‑seasoning dishes.
background:
  cultural: April grew up in a middle‑class family in North Carolina, absorbing the values of Southern hospitality, community involvement, and self‑reliance. While she maintains strong ties to regional
    traditions—such as church participation, family gatherings, and an appreciation for Southern cuisine—she also embraces broader American cultural experiences through travel, diverse literature, and community
    service. Her background reflects a blend of local Southern influences and an openness to a wide range of cultural perspectives.
