persona_description: A scientist or researcher who specializes in GPS and satellite navigation technology, particularly in the field of animal tracking. They are familiar with the process of filtering GPS
  data to remove spurious fixes and suspicious data, and understand the importance of accurate location data in the context of animal behavior and conservation. They may have experience with the use of
  GPS units in various settings, including indoor and dense cover environments, and have developed a specialized approach to filtering data to accurately represent the paths of animals. They may also be
  interested in the potential ethical implications of using GPS data in animal tracking and conservation efforts.
