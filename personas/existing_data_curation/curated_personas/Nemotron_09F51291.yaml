  career_goals: Radford aims to progress into a technical leadership role—such as Lead Engineer or Software Architecture Manager—within the next three years, where he can shape system design decisions and
    mentor junior developers. He is working toward AWS Certified Solutions Architect and Certified Scrum Master credentials to bolster his credibility. Long‑term, he envisions launching his own boutique
    consultancy focused on helping midsize companies modernize legacy codebases while adopting cloud‑native solutions. He also hopes to achieve a balanced work‑life schedule that secures financial stability
    for his family and affords him time for personal projects.
