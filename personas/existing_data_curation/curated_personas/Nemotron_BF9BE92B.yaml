  career_goals: Gloria aims to secure her architect licensure (NCARB) within the next three years, followed by LEED Green Associate certification to deepen her expertise in sustainable design. She aspires
    to specialize in affordable, environmentally responsible housing for Latino communities in New Jersey, leveraging her cultural insight to create spaces that honor heritage while meeting modern standards.
    In the medium term, she seeks a project-manager role that balances structured workflow with design leadership; long-term, she envisions founding her own boutique firm that prioritizes community-driven,
    resilient architecture.
