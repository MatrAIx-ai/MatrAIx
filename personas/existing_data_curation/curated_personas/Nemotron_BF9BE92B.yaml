personas:
  professional: Gloria Valderrama, a 22‑year‑old aspiring architect, merges AutoCAD, Revit, and BIM precision with a methodical, solitary workflow, channeling her love for structured problem‑solving into
    sustainable, code‑compliant housing designs for underserved communities.
  sports: Gloria Valderrama enjoys solitary jogs along coastal trails and farmland paths, belongs to the North Jersey Trail Runners club, and follows the New Jersey Devils hockey team for a touch of community
    spirit.
  arts: Gloria Valderrama captures urban textures through black‑and‑white photography, sketches architectural concepts in a leather‑bound notebook, listens to Beethoven and Philip Glass while she works,
    and finds inspiration in the poetry of Federico García Lorca.
  travel: Gloria Valderrama prefers carefully planned trips that balance cultural immersion and natural serenity, having explored historic coastal towns in New England, visited a Caribbean island known
    for its colonial forts, and dreaming of wandering Barcelona’s modernist neighborhoods and Kyoto’s temples.
  culinary: Gloria Valderrama cooks traditional island‑style dishes such as sofrito‑based rice with plantains, slow‑roasted pork shoulder with adobo, and fresh ceviche, showcasing a modest culinary skill
    set that highlights fresh herbs, citrus, and bold spices.
  core: Gloria Valderrama is a solitary, structure‑loving architect‑in‑training who blends disciplined design work with quiet creative pursuits, a penchant for sustainable housing, and a habit of planning
    everything down to the last detail—even her coffee splurges.
background:
  cultural: Gloria was raised in a bilingual Puerto Rican household, where Spanish was spoken alongside English. Family gatherings emphasized music, storytelling, and the preparation of traditional foods
    such as arroz con gandules and pasteles. She participates in local cultural celebrations, including the annual Puerto Rican Festival in nearby cities, and volunteers with community outreach programs
    that support Latino youth in design and construction. Her heritage informs her values of community resilience, respect for elders, and a deep appreciation for the island’s architectural vernacular,
    which she seeks to reinterpret in her work.
