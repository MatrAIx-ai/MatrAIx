    Knowledge'']'
  hobbies: '[''Cooking Traditional Mexican Dishes'', ''Gardening (herb garden)'', ''Reading Historical Fiction'', ''Walking the Texas Hill Country Trails'', ''Volunteering at Local Community Center'', ''Listening
    to Mariachi and Corrido Music'', ''Quilting'']'
  career_goals: Grisel aims to progress from desk clerk to front‑office supervisor within the next two years, eventually attaining a property‑manager position overseeing multiple units. She plans to enroll
    in a bachelor's program in Hospitality Management to complement her associate degree, and she hopes to mentor new staff, implement process‑improvement initiatives, and one day open a small boutique
    inn that reflects her Mexican‑Texan heritage while offering a structured, high‑quality guest experience.
