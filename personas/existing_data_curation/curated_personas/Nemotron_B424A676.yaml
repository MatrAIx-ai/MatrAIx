personas:
  professional: Grisel Vazquez, a front-desk hospitality specialist with bilingual fluency in English and Spanish, leverages her meticulous organization, conflict‑resolution skill, and practical mindset
    to keep hotel operations running smoothly even during peak seasons.
  sports: Grisel Vazquez, a resident of Boerne, Texas, enjoys weekend hikes with the Hill Country Hiking Society, cheers on the San Antonio Spurs and Dallas Cowboys, and participates in a local senior women's
    tennis league, preferring low‑impact, structured exercise that complements her busy schedule.
  arts: Grisel Vazquez finds creative refuge in quilting while listening to classic mariachi legends like Vicente Fernández and corrido storytellers such as Los Tigres del Norte, often attending monthly
    performances at the Boerne Cultural Center and borrowing historical fiction novels that blend Mexican and Texan narratives.
  travel: Grisel Vazquez prefers thoughtfully planned trips that blend cultural immersion and family time, having recently explored the colonial towns of San Miguel de Allende and the vineyards of Paso
    Robles, while budgeting for a future pilgrimage to the historic missions of Texas and a weekend getaway to Hill Country wineries.
  culinary: Grisel Vazquez, an avid cook of regional Mexican fare, expertly prepares dishes like chiles en nogada, pozole verde, and tamales using fresh cilantro, epazote, and locally grown oregano from
    her herb garden, and she treats weekends as opportunities to host communal meals that showcase her culinary heritage.
  core: Grisel Vazquez blends disciplined professionalism with a heartfelt devotion to family recipes, balancing a structured front‑desk career with a penchant for hoarding receipts and planning elaborate
    dinner parties that often run late into the night.
background:
  cultural: Grisel is a first‑generation Mexican‑American whose family emigrated from the state of Jalisco. Raised in a bilingual household in Texas, she blends Mexican customs—such as celebrating Día de
    los Muertos, preparing mole and tamales, and maintaining close family ties—with the hospitality spirit of the Texas Hill Country. Her Catholic faith, love for community festivals, and respect for tradition
    shape her interactions, while her professional role allows her to extend the welcoming values of her heritage to guests from around the world.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (English/Spanish)'', ''Reservation Management'', ''Front Desk Operations'', ''Cash Handling'', ''POS System Operation'', ''Property Management
