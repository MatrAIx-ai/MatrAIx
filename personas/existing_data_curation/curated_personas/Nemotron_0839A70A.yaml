  career_goals: Jacqueline dreams of turning her love of stories and visuals into a career as a journalist or documentary filmmaker focused on her community. She wants to use her digital art and video‑making
    skills to highlight local social issues and celebrate the cultural vibrancy of St. Louis. Recognizing the practical side of achieving these goals, she plans to improve her organization and study habits,
    aim for a strong high‑school record, and eventually pursue a degree in communications, media studies, or urban planning. Long‑term, she hopes to work for a nonprofit or media outlet that empowers Black
    youth and preserves the city’s artistic heritage.
