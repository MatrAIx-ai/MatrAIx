personas:
  professional: Jacqueline Jeanlouis is an aspiring visual storyteller who blends her love of contemporary YA narratives and street‑art sketching to create engaging short videos on TikTok, using her curiosity
    and practical mindset to experiment with new editing tools while often wrestling with procrastination and deadline pressure for school projects.
  sports: Jacqueline Jeanlouis spends afternoons shooting hoops at the community court in Tower Grove Park, follows the Saint Louis University Billikens men’s basketball team for collegiate inspiration,
    and is a fan of the Chicago Bulls, regularly joining pickup games that blend social interaction with a competitive edge.
  arts: Jacqueline Jeanlouis captures the energy of St. Louis street murals in sketchbooks, drawing stylistic cues from Jean‑Michel Basquiat and Banksy, while listening to jazz virtuoso Kamasi Washington
    and hip‑hop lyricist Kendrick Lamar, and they adore graphic novel creator Raina Telgemeier for her strong, resilient protagonists.
  travel: Jacqueline Jeanlouis favors immersive day trips that combine urban art tours and music history, having explored the Gateway Arch, taken a weekend road trip to Nashville’s Country Music Hall of
    Fame, and visited New York City’s Museum of Modern Art, all while budgeting carefully and dreaming of a future backpacking adventure across European capitals such as Paris and Berlin.
  culinary: Jacqueline Jeanlouis enjoys helping the family prepare traditional weekend dishes like collard greens, fried chicken, cornbread, and macaroni and cheese, often adding a dash of hot sauce to
    the greens, documenting the cooking process on TikTok, though they sometimes overcook the chicken when distracted by editing.
  core: Jacqueline Jeanlouis is a curiosity‑driven teen who stitches together YA storytelling, street‑art sketching, and TikTok editing into a vibrant personal brand, balancing spontaneous creativity with
    occasional lapses in organization and a love for basketball, music, and soulful family cooking.
background:
  cultural: Jacqueline comes from a multigenerational African‑American family embedded in the fabric of St. Louis. Her grandparents share stories of the city’s civil‑rights history and keep traditions alive
    through church gatherings, soul‑food cooking, and celebrations of Black culture. The neighborhood’s rich blend of blues, jazz, and vibrant street art fuels her curiosity and practical outlook, while
    the close‑knit community teaches her compassion balanced with personal ambition. Growing up in this environment shapes her identity as a proud Black teen who values both her heritage and the possibilities
    of the modern world.
