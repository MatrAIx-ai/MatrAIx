    and OSHA training'', ''Data analysis (Excel, Minitab)'']'
  hobbies: '[''Book discussion group chair'', ''Vegetable gardening'', ''Quilting'', ''Bridge club member'', ''County fair volunteer coordinator'', ''Church choir singer'']'
  career_goals: In the coming years, Susan plans to shift from frontline production tasks to a mentorship and safety leadership position within her facility. She intends to earn the Certified Manufacturing
    Technologist (CMfgT) credential and complete advanced OSHA training, positioning herself as the principal authority on quality assurance and workplace safety. Leveraging her natural empathy and desire
    for harmony, she aims to design a stress-management program for the shop floor that incorporates regular check-ins and clear procedural guidelines. Susan also hopes to transition into part-time consulting
    for regional manufacturers and teach applied engineering technology courses at the local community college, allowing her to maintain a predictable schedule while sharing her practical knowledge.
