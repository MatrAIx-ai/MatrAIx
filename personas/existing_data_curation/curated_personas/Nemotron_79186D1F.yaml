personas:
  professional: Jeremy Brown blends curiosity and methodical planning to produce inclusive UI/UX prototypes and graphic designs for community nonprofits, leveraging Photoshop, Illustrator, and Python automation
    while they balance coursework and a youth art mentorship role.
  sports: Jeremy Brown paddles the Gulf’s calm waters each weekend with a local club, follows the Tampa Bay Lightning and Buccaneers for their high‑energy games, and they keep fit by joining community‑center
    pick‑up basketball sessions and tracking runs on Strava, balancing cardio with the occasional surf lesson in winter.
  arts: Jeremy Brown sketches in sun‑lit coffee shops while listening to Miles Davis, Erykah Badu, Kendrick Lamar, and Aphex Twin, curates a personal Instagram feed of street murals by artists like Shepard Fairey
    and local graffiti crews, and they draw inspiration from contemporary fiction authors Zadie Smith and Ta‑Nehisi Coates to inform their visual narratives.
  travel: Jeremy Brown enjoys weekend road trips to Key West and St. Petersburg for sunset photography, dreams of a design immersion week in Barcelona’s Gothic Quarter, and they plan trips with a blend
    of budget‑friendly student hostels and occasional splurges on cultural tours, always packing a lightweight sketchbook for impromptu mural studies.
  culinary: Jeremy Brown favors Gulf shrimp po’boy sandwiches, Cuban coffee, and Saturday night sushi rolls from a local food‑truck, can whip up a quick quinoa‑avocado bowl at home, and they love experimenting
    with spice blends while photographing meals for their food‑journal Instagram, but they often skip proper meal prep when deadlines loom, opting for late‑night pizza.
  core: Jeremy Brown is a curiosity‑driven design enthusiast who balances meticulous planning with spontaneous art‑hunting, but they’ll binge‑watch series and neglect sleep when a project deadline looms,
    and they have a habit of doodling marginalia in every book they read.
background:
  cultural: Jeremy was raised in a middle-class African-American family in Tampa's Seminole Heights neighborhood. His parents emphasized education, community service, and cultural pride. Family gatherings
    often feature gospel music, Southern soul food, and storytelling that connect to the broader Black experience in the American South. He attends a historically Black Baptist church, participates in youth
    outreach, and celebrates cultural events such as Juneteenth and Black History Month. The blend of Southern Black traditions, the Afro-Caribbean influences of nearby Ybor City, and the contemporary Florida
    hip-hop scene shape his worldview and creative expression.
