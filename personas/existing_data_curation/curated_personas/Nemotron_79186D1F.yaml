  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Street photography'', ''Listening to diverse music (jazz, hip-hop, soul, classical)'', ''Reading contemporary
    fiction and non-fiction'', ''Playing chess'', ''Volunteering for community mural projects'', ''Paddleboarding and beach activities'']'
  career_goals: Jeremy aims to complete a bachelor's degree in visual communication or graphic design, secure an internship at a design studio or museum, and eventually work as a UI/UX designer or creative
    project manager focused on inclusive, community-centered projects. He hopes to lead art-based outreach programs that highlight under-represented voices and, in the long term, launch his own studio that
    partners with local nonprofits and cultural institutions.
