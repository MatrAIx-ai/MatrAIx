  career_goals: Nicole aims to advance from first‑line supervision to a regional sales manager position within the next three to five years. She plans to earn a Certified Professional Sales Leader (CPSL)
    credential and possibly complete an associate's degree in business management at a local community college. Her ambition includes spearheading a digital transformation initiative for her department—introducing
    advanced CRM analytics and streamlined reporting tools—to boost sales efficiency and employee satisfaction. Long‑term, she envisions establishing a small consulting practice that helps Midwest firms
    refine their B2B sales processes. Along the way, she hopes to expand her mentorship program, enabling more entry‑level sales staff to develop leadership skills.
