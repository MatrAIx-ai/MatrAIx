personas:
  professional: Joshua Flintroy, an aspiring junior engineer, loves tinkering with LEGO and Minecraft to build structures, turning their curiosity and practical mindset into early problem‑solving skills
    while thriving as the outspoken leader of school science fairs.
  sports: Joshua Flintroy dashes onto the Portland Youth Soccer Club field after school, idolizes the Portland Timbers' quick passing style, pedals their bike through Washington Park on weekends, and eagerly
    watches the Trail Blazers, even though they sometimes skip warm‑ups in their rush to be the star on the field.
  arts: Joshua Flintroy draws vibrant cartoon heroes inspired by shows like *SpongeBob SquarePants* and grooves to Beyoncé, Lil Nas X, and DaBaby on the family playlist, stealing the spotlight at school
    talent shows with enthusiastic karaoke renditions and impromptu skits.
  travel: Joshua Flintroy loves weekend trips to the Oregon Zoo and a memorable family vacation to San Diego’s Balboa Park, dreams of exploring Yellowstone’s geysers, and prefers spontaneous road‑trip adventures
    over meticulously planned itineraries, often packing their backpack with LEGO bricks for entertainment.
  culinary: Joshua Flintroy fiddles with the kitchen making peanut butter‑jelly sandwiches, mac‑and‑cheese, and pizza topped with pepperoni and pineapple, proudly claims their secret ingredient is a dash
    of ketchup, but habitually leaves crumbs on the floor and forgets to wash dishes.
  core: Joshua Flintroy is a chatty, curiosity‑driven 7‑year‑old who leads playground games, spends allowance on gadgets, forgets chores, and turns every mishap into a story worth sharing.
background:
  cultural: Joshua is raised in a Black family that honors African‑American traditions while embracing the diverse, progressive spirit of Portland. His parents often share stories of their Southern roots,
    cook soul‑food meals like collard greens and cornbread, and play a mix of gospel, jazz, hip‑hop and R&B at home. The family celebrates Juneteenth and participates in community events at a local Black
    cultural center, where Joshua attends after‑school programs that teach African‑American history, music, and art. At school, he takes part in Black History Month projects, which fuel his curiosity about
    his heritage. Living in Multnomah County, he also benefits from an inclusive environment that encourages him to explore both his cultural identity and the broader community’s values of cooperation and
    environmental stewardship.
attributes:
  skills: '["Reading (grade‑level chapter books)", "Basic addition and subtraction (up to 20)", "Storytelling", "Soccer fundamentals", "Basketball shooting basics", "Friendship building and mediation",
