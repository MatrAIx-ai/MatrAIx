  hobbies: '["Playing soccer", "Building with LEGO bricks", "Reading adventure books", "Playing Minecraft", "Drawing cartoon characters", "Listening to hip‑hop and R&B music", "Dancing", "Biking in local
    parks", "Science experiment kits", "Participating in school talent shows"]'
  career_goals: Joshua dreams of being a hero who helps others—he often says he wants to become a firefighter or an astronaut exploring space. He is fascinated by how video games are made and imagines designing
    his own games one day. In the short term, he aims to become the class monitor next school year, to help his friends and be a leader during group activities, and hopes to make the school soccer team.
    He also wants to improve his reading skills so he can read longer adventure novels without help.
