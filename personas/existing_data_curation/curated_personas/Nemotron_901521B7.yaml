personas:
  professional: Kellie Whitley, a budding junior cartographer, channels her curiosity and competitive edge into meticulously mapping the woods behind her home, using sketching skills and a methodical notebook
    to document leaf patterns and insect habitats, and they proudly display each completed map on the fridge.
  sports: Kellie Whitley, a member of the after-school soccer team, balances a competitive drive on the field with a love for watching the US Women's National Soccer Team and the local junior basketball
    league, often sprinting through backyard obstacle courses in place of formal training during the off-season, and they relish the thrill of scoring a goal as much as solving a tricky chess puzzle.
  arts: Kellie Whitley immerses herself in the whimsical worlds of Bill Watterson's Calvin and Hobbes, sketches landscapes reminiscent of Claude Monet's water lilies, loses herself in the melodies of Taylor
    Swift's acoustic tracks, reenacts scenes from Pixar's Up with her stuffed toys, and they often blend these inspirations into imaginative comic strips.
  travel: Kellie Whitley dreams of trading backyard explorations for real-world adventures, having visited Disneyland during a family trip and hiked the short trails of Shenandoah National Park, and they
    now pin the Eiffel Tower and the Great Barrier Reef on a world map as future destinations, preferring guided tours that balance discovery with the comfort of a familiar adult chaperone.
  culinary: Kellie Whitley, a budding kitchen experimenter, favors building towering peanut butter and jelly sandwiches, crafting spaghetti with marinara sauce speckled with fresh basil, mixing fruit smoothies
    with mango, spinach, and a splash of orange juice, though they often forget to wash their hands before cooking, earning gentle reminders from their mother.
  core: Kellie Whitley blends relentless curiosity, a competitive streak, and a love for organized creativity into a bright, slightly skeptical eight-year-old who sketches, solves puzzles, and plans adventures
    with equal fervor, and they never pass up an opportunity to learn something new.
background:
  cultural: Kellie was raised in Henderson, a small town in Chester County, Tennessee. Her family follows a Southern, middle‑class lifestyle, with Sundays often spent at a local Baptist church and holidays
    marked by family gatherings around traditional Southern meals like fried chicken, cornbread, and peach cobbler. Community events such as the county fair, local 4‑H clubs, and school talent shows have
    shaped her appreciation for folk art, country music, and outdoor activities. While rooted in these traditions, Kellie's parents encourage curiosity and unconventional thinking, supporting her interests
    in science and digital art.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic'', ''drawing'', ''digital illustration'', ''Scratch programming'', ''basic science observation'', ''organizing school supplies'']'
  hobbies: '[''sketching'', ''painting'', ''nature exploration'', ''reading mystery and science books'', ''jigsaw puzzles'', ''Chess'', ''soccer'', ''piano'']'
  career_goals: Kellie dreams of becoming a scientist‑artist who blends creativity with discovery. She hopes to win a regional science fair with an experiment about local wildlife, and someday work as a
    marine biologist or environmental artist, creating visual stories about ecosystems. She also imagines designing educational video games that teach art and science. Her competitive streak fuels her ambition
    to be first in school contests and earn a scholarship for a specialized STEM summer program.
