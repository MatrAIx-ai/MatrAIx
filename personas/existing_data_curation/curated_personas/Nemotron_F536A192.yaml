    art workshops'']'
  career_goals: She dreams of becoming a professional illustrator or concept artist for comic books and video games, hoping to create characters that reflect her own experiences and cultural heritage. She
    also aims to develop an online channel where she can share her art tutorials and collaborate with other young creators. In the future, she wants to use her artistic voice to raise awareness about mental
    health and empower peers to express themselves creatively.
