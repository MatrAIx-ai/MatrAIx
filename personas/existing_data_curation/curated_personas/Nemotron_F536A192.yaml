personas:
  professional: An aspiring digital illustrator and budding storyteller, Omekia Seymore transforms a keen curiosity and competitive spirit into vivid tablet sketches, they harness spontaneous bursts of
    creativity while frequently sidestepping structured timelines due to their relaxed, disorganized approach.
  sports: A weekend swimmer and casual soccer enthusiast, Omekia Seymore participates in the Fort Lauderdale Youth Soccer Club, they cheer for the Miami Heat and Miami Dolphins, they prefer solo bike rides
    along the Riverwalk for stress relief, and they balance a competitive drive with a laid‑back attitude toward regular workouts, often skipping scheduled practice when besieged by intense emotions.
  arts: An avid visual storyteller, Omekia Seymore spends afternoons sketching downtown breezes while listening to Kendrick Lamar, Rihanna, and the calypso rhythms of Kes the Band, draws inspiration from
    the mural‑style street art of Banksy, the emotive portraits of Frida Kahlo, and the graphic narrative of the comic series 'Saga', and frequently attends the ArtServe community workshops where they experiment
    with Photoshop and Procreate, channeling their intense emotions into vibrant digital collages.
  travel: A spontaneous explorer, Omekia Seymore prefers short family road trips to nearby beach towns like Fort Mason and occasional weekend getaways to Orlando’s theme parks, they dream of visiting the
    colorful streets of Cartagena and the historic art museums of Paris, and they typically pack a sketchbook and a handheld music device rather than a rigid itinerary, allowing mood‑driven detours that
    soothe their anxiety.
  culinary: A budding kitchen experimenter, Omekia Seymore enjoys blending Caribbean flavors like coconut‑milk‑based jerk chicken with classic American comfort foods, frequently whipping up fish tacos topped
    with pineapple salsa and cilantro, they master the perfect avocado toast with a sprinkle of za’atar, they savor smooth chocolate milkshakes, and they often burn toast when lost in daydreams.
  core: Omekia Seymore is an intensely emotional, art‑obsessed 11‑year‑old who channels stormy feelings into digital sketches, they hoard a chaotic allowance, they dread bedtime routines, and they find
    solace in spontaneous playlists of hip‑hop, R&B, and Caribbean beats.
background:
  cultural: Omekia is a Black American growing up in Fort Lauderdale, Florida, a city known for its multicultural coastal community. Her family celebrates African‑American traditions such as Juneteenth
    and Black History Month, while also sharing Caribbean influences common in Broward County, including music, food, and storytelling. She is exposed to a vibrant local arts scene, from street murals to
    community festivals, which nurtures her appreciation for visual expression. The community’s emphasis on resilience, creativity, and collective support shapes her worldview and fuels her desire to tell
    stories that reflect her heritage and personal experiences.
