persona_description: A sailor who is interested in using tidal atlases and integrating tidal information into navigation and planning, particularly for racing and offshore sailing. They are familiar with
  traditional paper charting and tidal gates, but also enjoy using electronic forms of tidal atlases and have experience with using a RIB to check current rates. They are skilled at estimating current and
  flow rates without a RIB, and have experience with using a tide stick to measure the current. They are a fan of integrating tidal information into navigation and planning and have a unique knowledge of
  how to hit laylines across the tide.
