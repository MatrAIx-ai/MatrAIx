personas:
  professional: Thomas Norvell is a seasoned retail sales professional who leverages disciplined inventory management, data‑driven sales tracking, and a personable approach to build strong customer loyalty,
    while they channel curiosity into emerging retail technology and apply organized precision to cash handling and visual merchandising.
  sports: Thomas Norvell stays active through a hometown softball league with the Moncks Corner Mariners, weekend hikes in Congaree State Park, regular fishing trips on the Congaree River, and they cheer
    for the Carolina Panthers in the NFL and the Charleston Battery in USL soccer, embodying a community‑centric approach to fitness.
  arts: Thomas Norvell nurtures their creative side through DIY woodworking inspired by Sam Maloof, curating playlists that blend the soulful tones of Alabama Shakes, the storytelling of Jason Isbell, and
    classic Southern rock from The Allman Brothers, while they regularly attend the Spoleto Festival USA to absorb theatrical productions and visual art installations by regional creators like Stephen Hillyer.
  travel: Thomas Norvell prefers spontaneous weekend getaways to nearby coastal spots like Kiawah Island and historic Savannah, plans annual trips to national parks such as Shenandoah for hiking, and they
    dream of a culinary tour through Tuscany, balancing a modest travel budget with occasional splurges on festival experiences like New Orleans' Mardi Gras.
  culinary: Thomas Norvell is a confident home chef who regularly experiments with low‑country barbecue, mastering smoked pork ribs with applewood chips, perfecting shrimp and grits seasoned with Andouille
    sausage, and crafting handcrafted pimento cheese dip, while they also enjoy occasional outings to farm‑to‑table eateries for fresh oyster po’ boys.
  core: Thomas Norvell blends disciplined retail acumen with a sociable, curiosity‑driven love of Lowcountry outdoor life, yet they tend to over‑schedule their weekends, leaving little room for rest, and
    are notorious for hoarding vintage woodworking tools while simultaneously forgetting to water their garden.
background:
  cultural: Thomas grew up in Moncks Corner, a predominantly white, working‑class community in South Carolina’s Lowcountry. His upbringing emphasized Southern hospitality, modesty, and strong church involvement,
    with regular participation in community events such as county fairs, shrimp boils, and volunteer projects. This cultural environment fostered a courteous demeanor, a love for regional cuisine like barbecue
    and seafood, and a deep appreciation for outdoor activities such as fishing and hunting, all of which continue to shape his values and daily life.
