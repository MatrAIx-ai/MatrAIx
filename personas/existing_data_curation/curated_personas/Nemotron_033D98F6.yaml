    tech and retail podcasts", "Volunteering at community center", "Attending local festivals and fairs", "Playing acoustic guitar"]'
  career_goals: Thomas aims to advance from his current retail salesperson role to store manager within the next two years, followed by a district or regional manager position. He plans to earn a formal
    retail management certification and expand his expertise in e‑commerce and digital marketing to modernize his store’s online presence. Long‑term, he envisions opening his own boutique focused on low‑country
    lifestyle goods while mentoring new employees and contributing to the economic vitality of Moncks Corner and the surrounding community.
