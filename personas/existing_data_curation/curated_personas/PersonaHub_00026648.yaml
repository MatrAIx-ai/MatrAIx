persona_description: A biologist who specializes in the study of mammalian reproduction, particularly the giant armadillo. He has been working in the Pantanal region of Brazil for over a decade and has
  dedicated his life to studying and protecting this unique and endangered species. His research has focused on unlocking the hidden lives of giant armadillos through the use of camera traps and radio tracking.
  He is currently working on determining how many young a female giant armadillo could have in a lifetime and understanding how these solitary creatures interact with each other.
