personas:
  professional: Rupal Jahan, a CPA‑qualified senior audit manager with a graduate business degree, harnesses meticulous GAAP/IFRS expertise, advanced data‑analytics skills in Python and Tableau, and an
    innate curiosity for innovative reporting; they design robust internal controls while mentoring junior staff with a collaborative yet assertive approach.
  sports: Rupal Jahan jogs the Boston Common trails three times a week, participates in the Boston Women’s Running Club’s half‑marathon training program, plays weekly doubles tennis with the local corporate
    league, and follows the Boston Celtics, Boston Red Sox, and New England Patriots with a steady fan’s devotion; they balance solitary cardio sessions with occasional team‑spirit gatherings at the sports
    bar.
  arts: Rupal Jahan frequents the Institute of Contemporary Art in Boston, where they study works by Kehinde Wiley and Yayoi Kusama, draw watercolors inspired by the minimalist compositions of Agnes Martin,
    and unwind listening to the ambient piano of Nils Frahm and the cinematic scores of Ryuichi Sakamoto; they weave this artistic exposure into both their sketchbook practice and their data‑visualization
    projects.
  travel: Rupal Jahan prefers meticulously planned cultural getaways, having recently explored the historic temples of Kyoto, the modernist architecture of Barcelona, and the geothermal wonders of Iceland,
    while they budget for longer stays that allow ample time for reading and sketching; they aspire to a solo trek through the Canadian Rockies once financial commitments settle.
  culinary: Rupal Jahan skillfully prepares traditional dishes such as chicken tikka masala, dal makhani, and aloo gobi, while experimenting with fusion creations like paneer‑taco wraps with mango chutney
    and quinoa‑based biryani, savoring aromatic spices like cardamom, cumin, and tamarind; they enjoy occasional fine‑dining outings for sushi but find greatest satisfaction in home‑cooked meals shared
    with close friends.
  core: Rupal Jahan is a methodical, curiosity‑driven accountant who fuses art, tech, and mindfulness into a calm, organized life, marked by a penchant for perfection‑induced late‑night sketching and an
    unshakable commitment to sustainable finance.
background:
  cultural: Rupal grew up in a South Asian household that blended traditional customs with American life. Her family placed a strong emphasis on education, community, and respect for elders, celebrating
    festivals such as Diwali and Eid with food, music, and storytelling. Bilingual in English and Hindi, she maintains close ties with a vibrant South Asian diaspora in the Raleigh‑Durham area, often volunteering
    at cultural events and supporting local Indian arts initiatives. This heritage informs her appreciation for intricate art forms, culinary traditions, and a collaborative spirit, while her American upbringing
    has nurtured independence, a respect for diverse ideas, and an openness to unconventional thinking.
