  career_goals: Rupal aims to advance to a senior manager role within her firm and eventually become a partner, focusing on building a practice around sustainability and integrated reporting. She envisions
    leveraging data‑driven insights to shape strategic financial decisions for technology‑focused companies, with a long‑term goal of transitioning to a CFO position at a mid‑size firm that values ethical
    stewardship. Additionally, she seeks to champion diversity in finance by mentoring South Asian women and contributing as a guest lecturer on emerging accounting technologies at local universities.
