  hobbies: '[''watercolor painting'', ''gallery visits'', ''book club'', ''community choir'', ''gardening (native plants)'', ''county fair attendance'', ''dance lessons (salsa/ballroom)'', ''historical
    site exploration'', ''digital art experimentation'', ''volunteering for art exhibitions'']'
  career_goals: Marcia aims to transition into a supervisory or manager position within warehouse operations over the next few years, pursuing certifications in supply chain management and advanced safety
    training to strengthen her leadership credentials. She also hopes to leverage her passion for the arts by establishing a small community art workshop space that offers classes and displays local artists'
    work, blending her logistics expertise with her creative interests. Additionally, she wants to mentor younger workers, particularly women, to encourage diverse representation in the material handling
    field.
