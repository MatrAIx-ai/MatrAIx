  career_goals: Liam aims to complete his high‑school diploma and then enroll in a technical college to earn an associate degree in mechanical engineering technology. He dreams of advancing to a bachelor's
    program in robotics, ultimately working on autonomous vehicle systems or aerospace projects. He also sees the U.S. Navy's nuclear or engineering programs as a disciplined pathway that aligns with his
    competitive drive and desire for structured achievement. Throughout his education, he plans to secure internships in local engineering firms and compete in robotics competitions to build a strong professional
    portfolio.
