personas:
  professional: Liam Romani is an aspiring aerospace hobbyist and budding software developer; they channel their disciplined curiosity into designing Arduino‑controlled model rockets, rigorously document
    each build in their journal, and apply a competitive, methodical mindset to out‑engineer their peers' prototypes.
  sports: Liam Romani jogs the nearby park trails five times a week to clear their mind, competes on their high‑school cross‑country team, they avidly follow the Los Angeles Lakers, and they root for the
    local youth soccer club Falcon FC during the spring season.
  arts: Liam Romani spends evenings sketching futuristic vehicle concepts while listening to the cinematic scores of Hans Zimmer, they binge‑watch Christopher Nolan’s sci‑fi films, and they collect limited‑edition
    prints from retro‑future illustrator Syd Mead, finding the blend of imagination and technical precision a perfect mirror for their own creative pursuits.
  travel: Liam Romani prefers meticulously planned weekend road trips to nearby national parks like Yosemite, they dream of a future solo backpacking adventure through the tech hubs of Tokyo and Berlin,
    and they balance a modest allowance with a yearning for hands‑on exposure to global engineering marvels.
  culinary: Liam Romani, a self‑taught home cook, they frequently experiment with pantry‑friendly meals such as spicy Szechuan‑style stir‑fry featuring tofu, ginger, and chili oil, but they can’t resist
    the occasional indulgence in a perfectly cheesy pepperoni pizza from the local pizzeria, often balancing the two by meal‑prepping on Sundays to maintain disciplined nutrition.
  core: Liam Romani is a meticulous teen inventor with a competitive edge, they channel anxiety into precision projects while battling a perpetual habit of over‑planning and occasional reluctance to socialize.
background:
  cultural: Liam grew up in Baltimore's Eastside neighborhood in a working‑class white family with Irish‑American and German roots. His household emphasizes self‑reliance, punctuality, and the development
    of practical skills, often spending weekends at community centers and the public library's STEM programs. The city's maritime history and diverse urban culture have exposed him to local sports fandom
    (Orioles, Ravens) and a strong sense of neighborhood resilience. While his family traditions include weekend barbecues and community soccer matches, his personal identity is shaped by the public school
    system's focus on vocational pathways and mentorship initiatives aimed at fostering technical expertise among youth.
