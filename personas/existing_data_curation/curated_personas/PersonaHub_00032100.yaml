persona_description: A finance professional with a strong understanding of taxation laws and their practical application. This individual is likely to be an accountant or a tax advisor who specializes in
  the taxation of dividends in Australia. They have a deep knowledge of the Franked Dividend concept and its implications on taxation. They are likely to be familiar with the details of the tax imputation
  system and the process of calculating tax imputation credits. They are also likely to be knowledgeable about the tax implications of unfranked dividends and the process of calculating the taxes that would
  be owed if the dividend were unfranked. They may also be familiar with the tax laws and regulations of other countries and their application to dividends.
