  career_goals: Patricia aims to earn advanced certification as an Emergency Medical Dispatcher and later pursue a bachelor’s degree in Public Safety Administration. She envisions moving into a supervisory
    role, such as Lead Dispatcher or Communications Center Manager, where she can mentor new staff and contribute to improving dispatch protocols. Long‑term, she hopes to specialize in emergency preparedness
    planning for her county, blending her love of community service with her curiosity about innovative public‑safety technologies.
