persona_description: A distinguished Canadian architect, designer, and writer who is best known for his work in England. He was born on December 17, 1895, to Methodist missionaries in Tokyo, and his childhood
  experiences in Japan would play an important role in his aesthetic sensibility that he brought to his architectural work. He attended the University of British Columbia and East London College, and established
  his own firm in 1928. His most notable work is the Isokon building in Hampstead, London, and he was awarded the OBE (Order of the British Empire) in 1947.
