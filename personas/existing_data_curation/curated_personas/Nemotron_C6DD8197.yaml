  career_goals: Chan aims to graduate high school with a strong academic record while earning certifications in automotive technology through his school’s vocational program. He plans to attend a technical
    college to become a certified diesel mechanic, with the long‑term ambition of opening his own custom auto‑repair shop serving the Pyatt community. Alongside his trade goals, he hopes to continue competing
    in basketball, earn a team captain position, and possibly secure a sports scholarship that would support his further education. His desire to combine practical, hands‑on work with community service
    drives his ambition to bring reliable, affordable car care to his rural hometown.
