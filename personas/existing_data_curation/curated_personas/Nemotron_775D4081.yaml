  hobbies: '[''Gardening (vegetable and flower beds)'', ''Knitting and crocheting'', ''Reading DIY and home repair books'', ''Puzzle solving (jigsaw, crosswords)'', ''Walking her dog in local parks'', ''Attending
    small-group church activities'', ''Volunteer home repairs for neighbors'']'
  career_goals: Lauren aims to deepen her technical expertise by obtaining certifications such as HVAC‑R, EPA 608, and Certified Facility Manager. She aspires to move into a supervisory role within the
    municipal facilities department, where she can apply her systematic planning and reliability to oversee a larger portfolio of buildings. Long‑term, she envisions starting a modest, locally‑focused home‑repair
    service that offers dependable, routine maintenance to homeowners in Youngstown, providing her with a stable schedule, reduced workplace stress, and a clear path toward a comfortable retirement.
