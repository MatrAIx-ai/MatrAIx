personas:
  professional: Lauren Mcafee, a veteran facilities maintenance technician with over twenty years of hands‑on experience in HVAC, electrical, plumbing, and carpentry, they apply their methodical, routine‑driven
    mindset and meticulous record‑keeping to design preventive‑maintenance schedules that minimize downtime and ensure safety compliance in municipal buildings.
  sports: Lauren Mcafee, a dedicated walker and occasional skier who joins the Youngstown Trail Runners Club for regular river‑trail walks with their Labrador Milo, they root for the Cleveland Browns in
    football season, follow the Cleveland Cavaliers during the NBA playoffs, and favor low‑impact cardio over team sports to match their preference for solitary, steady‑paced activity.
  arts: Lauren Mcafee, an avid fan of folk music and classic cinema, they spend quiet evenings listening to the bright mandolin arrangements of Old Crow Medicine Show, revisiting the films of Agnès Varda,
    and attending small‑scale local craft fairs where they admire handmade quilts and crocheted pieces, finding inspiration for their own knitting projects.
  travel: Lauren Mcafee, a meticulous planner who prefers low‑stress getaways, they favor weekend trips to nearby Amish Country in Lancaster, Pennsylvania for its predictable markets and pastoral scenery,
    and dream of a longer pilgrimage to the botanical gardens of Kyoto, always booking accommodations with kitchenettes to continue their garden‑to‑table cooking.
  culinary: Lauren Mcafee, a capable home cook who cultivates tomatoes, bell peppers, and basil in their backyard garden, they love preparing fresh ratatouille and seasonal vegetable soups, and treat themselves
    to a hearty meatloaf with mashed potatoes on Sundays, while regularly experimenting with new crochet‑inspired plating designs that mirror the patterns of their crafts.
  core: Lauren Mcafee, the 43‑year‑old maintenance maestro who gardens with precision, knits for comfort, worries about every checklist, they never skip a scheduled oil change for their own car, yet secretly
    binge‑watch detective podcasts when the house is quiet.
background:
  cultural: Lauren grew up in Youngstown, Ohio, a city shaped by the steel industry and a strong Midwestern work ethic. Her family traces its roots to second‑generation immigrants from Germany and Ireland
    who settled in the Mahoning Valley in the early 1900s, bringing values of hard work, self‑reliance, and community solidarity. The region’s cultural fabric—marked by blue‑collar traditions, Protestant
    church involvement, and a close‑knit neighborhood network—has reinforced Lauren’s practical mindset and preference for routine. Local customs such as county fairs, community potlucks, and modest holiday
    celebrations resonate with her love for predictable, familiar rituals. While she identifies as a white American, she embraces the down‑to‑earth ethos of the Rust Belt, which emphasizes reliability,
    loyalty, and pride in maintaining the physical spaces that support everyday life.
attributes:
