persona_description: A team leader in the field of forest genetics and tree breeding, with expertise in reproductive biology, DNA analysis, and genetic improvement of major timber species. They have established
  a germplasm bank for teak, selected and developed improved clones, and initiated studies on phytochemical analysis and reproductive biology in selected medicinal plants and invasive species. They have
  also initiated studies on genome-wide and geospatial approaches for enhancing the adaptive potential of threatened rattan resources in India. They are interested in ongoing research projects such as genetic
  improvement of selected tree species, DNA barcoding, and establishment projects, and have a strong interest in the field of forest genetics and tree breeding.
