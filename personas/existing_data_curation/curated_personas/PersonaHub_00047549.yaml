persona_description: 'A book reviewer and education expert who specializes in teaching students how to study more efficiently and effectively. They have experience teaching English in high school, college,
  and on a military base overseas and have developed a packet of study tips that has helped students improve their grades. They have a slim, accessible book titled "Study Smart, Study Less" that provides
  students with three things to improve their study habits: managing time, figuring out when they study best, and making their environment efficient. They are also knowledgeable about the importance of
  engaging with the material actively during lectures and avoiding distractions during study time.'
