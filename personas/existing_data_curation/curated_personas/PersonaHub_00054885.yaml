persona_description: A forest activist who is deeply concerned about the impact of wood-based bioenergy on forests and the people who rely on them. They are passionate about community-led forest management
  and are committed to advocating for justice-based policies that prioritize meeting basic needs and avoiding ecological damage. The person is knowledgeable about the impacts of deforestation and is interested
  in exploring the underlying causes of forest degradation and the role of market-based conservation mechanisms in perpetuating deforestation. They are also interested in the specific challenges faced by
  African countries in implementing economic partnerships agreements that would further devastate their forests, biodiversity, and livelihoods.
