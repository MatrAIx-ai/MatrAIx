persona_description: A sociologist who specializes in the study of mores and their impact on society. They are deeply knowledgeable about the concept of mores and how they influence human behavior, particularly
  in the context of social norms and cultural practices. They have a keen interest in understanding the social consequences of violating mores and the extent to which these consequences are severe. They
  are likely to have a strong background in sociology and social psychology, as well as an understanding of the role of religion and philosophy in shaping mores. They may also have experience working with
  data and conducting research to analyze the relationship between mores and social behavior.
