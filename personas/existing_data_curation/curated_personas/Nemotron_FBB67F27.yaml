  hobbies: '[''wine tasting'', ''herb gardening'', ''cooking Vietnamese cuisine'', ''bridge'', ''bingo'', ''senior walking club'', ''tai chi'', ''reading historical non-fiction'', ''puzzle solving'', ''volunteering
