  career_goals: Although retired, Quynh remains driven to stay intellectually active and give back to her community. She hopes to mentor high-school girls interested in STEM through the local after-school
    program, and to document her story as a Vietnamese-American woman who navigated a male-dominated field in the 1960s. She aspires to write a memoir that blends personal history with reflections on scientific
    curiosity, and to lead a small volunteer garden that experiments with sustainable viticulture practices. Maintaining her health, nurturing her social network, and completing a series of advanced puzzles
    and crosswords also feature among her personal ambitions.
