  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Listening to and curating music'', ''Playing basketball'', ''Attending live music and open‑mic events'', ''Creative
    writing and spoken‑word poetry'', ''Volunteering at youth art workshops'']'
  career_goals: He aspires to study Communications or Media Studies at a community college and eventually earn a Bachelor's degree in Public Relations or Marketing. Leon aims to become a social media strategist
    or community outreach coordinator, using his love for art and culture to amplify local artists' work and promote community events. In the long term, he envisions launching his own boutique agency that
    offers event planning and branding services for small businesses and cultural initiatives in Daytona Beach. He also hopes to mentor younger youth in his neighborhood, helping them develop confidence
    and communication skills. While ambitious, his goals remain rooted in his desire to create inclusive, uplifting spaces.
