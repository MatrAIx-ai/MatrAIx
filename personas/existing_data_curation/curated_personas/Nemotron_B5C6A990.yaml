personas:
  professional: Leon Woldu, a budding communications enthusiast with a knack for public speaking and graphic design, channels their talkative energy into orchestrating community events and crafting eye‑catching
    social‑media content for local artists; they thrive on turning ideas into visual stories for the neighborhood.
  sports: Leon Woldu, a regular on the Daytona Beach rec basketball league who drops in on Thursday night pickup games, roots for the Miami Heat and follows the local baseball team the Daytona Tortugas,
    and uses early morning beach runs to stay fit; they consider each game a chance to blend competition with socializing.
  arts: Leon Woldu, an avid patron of Daytona's street‑art scene who often sketches beside the vibrant Atlantic murals, curates playlists that weave together Kendrick Lamar, SZA, and Tame Impala, and regularly
    performs spoken‑word pieces at the community hub inspired by the poetics of spoken‑word legend Sarah Kay; they see art as a communal conversation.
  travel: Leon Woldu, who treasures sunrise photo expeditions along the Atlantic shoreline and dreams of a weekend road trip to New Orleans to soak up its jazz heritage, often plans low‑budget trips with
    friends, while keeping a Pinterest board of future destinations like the murals of Berlin and the beaches of Costa Rica; they value experiences that broaden their creative outlook.
  culinary: Leon Woldu, a fan of local food trucks who can always be found ordering a spicy fish taco with cilantro‑lime slaw and a cold hibiscus iced tea, enjoys making avocado‑toast topped with poached
    eggs at home, but often forgets to clean the kitchen after late‑night snack sessions; they binge‑watch cooking videos for new recipe ideas.
  core: Leon Woldu, a sociable 19‑year‑old art‑obsessed communicator who transforms curiosity into community‑building but constantly battles a worry‑prone mind; they channel their nervous energy into creative
    projects.
background:
  cultural: Leon grew up in a close‑knit African‑American community in Daytona Beach, where family, church, and neighborhood gatherings shape daily life. He was raised with an appreciation for Black cultural
    expressions—soul music, hip‑hop, and oral storytelling—while also being exposed to the coastal, tourism‑driven culture of Florida. Community values emphasize mutual support, respect for elders, and
    a collective responsibility to uplift one another. Leon’s upbringing includes participation in church choirs, local block parties, and community service projects, all of which have reinforced his cooperative
    nature and his desire to maintain harmony. He also draws inspiration from regional Black artists and activists, integrating their perspectives into his own creative pursuits.
attributes:
  skills: '[''Public speaking'', ''Interpersonal communication'', ''Event coordination'', ''Basic graphic design'', ''Social media content creation'', ''Conflict mediation'', ''Organizational planning'',
