persona_description: A physicist who specializes in the study of rheology, specifically the deformation and flow of materials. He has applied the principles of rheology to understand the behavior of cats
  and has proposed a theory that categorizes them as liquids if given enough time. His work has been acknowledged with the Ig Nobel prize in Physics and he has published a paper in the Rheology Bulletin.
