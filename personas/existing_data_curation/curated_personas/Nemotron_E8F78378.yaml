  career_goals: Thomas aims to scale his company’s market share nationally while embedding sustainable practices and cutting-edge AI technologies across its operations. He is committed to establishing a
    best-in-class employee well-being framework that reduces stress and promotes work-life balance. Over the next five years he seeks a board seat at a Fortune-500 firm, to mentor emerging leaders, and
    to become a recognized thought leader by speaking at industry conferences and publishing on responsible innovation and inclusive leadership. He also plans to deepen his impact on the Duluth arts community
    through sponsorship and strategic partnerships.
