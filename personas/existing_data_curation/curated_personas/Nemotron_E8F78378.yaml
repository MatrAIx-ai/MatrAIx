personas:
  professional: Thomas Ard, a 36‑year‑old chief operating officer, fuses deep technical expertise with strategic business acumen, leading his company through data‑driven innovation while channeling his
    curiosity and methodical planning into building cross‑functional teams that balance high performance with employee well‑being.
  sports: Thomas Ard, an avid outdoor enthusiast, spends his weekends kayaking on Lake Superior, cross‑country skiing the Superior National Forest trails, leading group hikes with the Duluth Trail Club,
    and cheering for the Minnesota Vikings, Twins, and Timberwolves whenever he can catch a game.
  arts: Thomas Ard, a devoted patron of Minnesota’s contemporary art scene, routinely tours galleries showcasing artists like Jeff Koons and Yayoi Kusama, attends live‑music shows featuring The Jayhawks
    and local indie acts, and volunteers at the Duluth Arts Festival, using his photography to capture the region’s evolving creative landscape.
  travel: Thomas Ard, a methodical yet adventurous planner, prefers curated trips that blend nature and culture—having explored the Boundary Waters, hiked Iceland’s waterfalls, wandered Kyoto’s temples,
    and savored Barcelona’s architecture—while budgeting carefully to fund family-friendly vacations and occasional solo retreats to Patagonia.
  culinary: Thomas Ard, a self‑taught home chef, delights in whipping up Thai green curry, Ethiopian injera with doro wat, and Japanese ramen, sourcing fresh produce from the Duluth farmers market, yet
    often over‑spices his dishes when juggling work deadlines.
  core: Thomas Ard merges executive rigor with artistic curiosity, balancing data‑driven leadership, community‑focused philanthropy, and a love for outdoor adventure while wrestling with a perfectionist’s
    worry.
background:
  cultural: Thomas grew up in the Upper Midwest as a White American with roots in Scandinavian and German immigrant families, which imbues him with a blend of modesty, self-reliance, and community spirit
    characteristic of Duluth, Minnesota. The region’s rugged lake-front geography and strong labor tradition shaped his appreciation for outdoor recreation, hard work, and egalitarian values. He embraces
    the local culture of civic engagement, supporting the city’s vibrant arts scene and seasonal festivals, while also reflecting broader American ideals of individualism and entrepreneurship.
