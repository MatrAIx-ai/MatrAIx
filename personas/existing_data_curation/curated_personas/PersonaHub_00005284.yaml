persona_description: A commercial building designer and architect who is familiar with the latest technology trends in the building industry, including radiant heating and cooling systems, and is interested
  in LEED certification projects. They are also knowledgeable about HVAC systems and their operation, as well as the principles of thermal comfort and energy efficiency. They are likely to be familiar with
  the second law of thermodynamics and its application in heat transfer and the operation of radiant cooling systems. They are interested in understanding the benefits and limitations of radiant cooling
  systems in terms of their impact on energy consumption and thermal comfort, and how they can be used in conjunction with an HVAC system to achieve net-zero energy buildings.
