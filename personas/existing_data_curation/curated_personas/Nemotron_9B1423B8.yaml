personas:
  professional: Dorian Bernal, a logistics veteran with over a decade of hands‑on experience optimizing warehouse operations, inventory control, and multi‑modal transport, they blend methodical analysis,
    a curious eye for IoT automation, and a competitive drive to mentor diverse teams and push regional supply‑chain performance.
  sports: Dorian Bernal, a dedicated player in the San Bernardino Adult Soccer League and frequent hiker of the San Bernardino National Forest, they cheer for the LA Galaxy and Los Angeles Rams, and volunteer
    as a mentor for the Mountain Lions youth sports program, blending competitive play with community leadership.
  arts: Dorian Bernal, an avid appreciator of vibrant mural art and Mexican folk music, they regularly attend live shows by Los Lobos, explore street‑art festivals featuring works inspired by Frida Kahlo,
    and unwind with classic rock bands like The Strokes, letting these creative experiences inspire their culinary experiments.
  travel: Dorian Bernal, an enthusiastic road‑tripper who plans detailed itineraries for weekend escapes to Yosemite and a yearly culinary pilgrimage to Oaxaca, they prefer driving their modified pickup
    along scenic routes, while balancing travel ambitions with family and budget constraints.
  culinary: Dorian Bernal, a self‑taught chef passionate about Mexican cuisine, they master mole poblano, chiles en nogada, and carnitas tacos, often grill corn on the cob with chipotle butter at barbecues,
    and revel in the flavors of fresh poblano peppers, cilantro, lime, and roasted corn masa.
  core: Dorian Bernal, a methodical logistics leader who channels competitive energy into community soccer, fiery Mexican cooking, and data‑driven supply‑chain innovation while juggling a love for pickup
    trucks and a skeptical eye on every deal.
background:
  cultural: Dorian grew up in a bicultural Mexican‑American household in the Inland Empire, speaking both Spanish and English at home. His family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Mexican Independence Day, and holiday gatherings with extended relatives. These cultural roots influence his love for Mexican food, music, and community events. While he has never
    married, he remains closely connected to his extended family and frequently participates in local cultural organizations that preserve and promote Mexican heritage in Rialto and the broader San Bernardino
    County.
attributes:
  skills: '[''Warehouse Operations Management'', ''Transportation Coordination'', ''Inventory Control'', ''Route Optimization'', ''Regulatory Compliance (DOT, FMCSA)'', ''Data Analysis and Reporting'',
    ''Lean Process Improvement'', ''Vendor Negotiation'', ''Staff Training and Leadership'', ''Supply Chain Software (WMS, TMS)'', ''IoT Freight Tracking Integration'', ''Budgeting and Cost Management'']'
  hobbies: '[''Adult Soccer League'', ''Hiking in the San Bernardino Mountains'', ''Barbecue and Cooking Mexican Cuisine'', ''Car Meet‑ups (Modified Pickups & Trucks)'', ''Mentoring Youth Sports Programs'',
    ''Listening to Regional Mexican and Rock Music'', ''Attending Community Festivals'']'
  career_goals: Dorian aims to move from managing a single distribution center to overseeing a regional logistics network across Southern California, eventually becoming a senior director of supply‑chain
    operations. He plans to earn advanced certifications such as the APICS Certified Supply Chain Professional (CSCP) and to lead initiatives that reduce carbon emissions, implement warehouse automation,
    and improve on‑time delivery metrics. In the longer term, he envisions launching his own consulting firm that advises midsize manufacturers on building resilient, technology‑enabled distribution systems.
