persona_description: An archeologist who specializes in the study of prehistoric, ancient, and destroyed cultures, using the scientific capability of many persons who are not archeologists in their jobs.
  They use the scientific capability of botanists, zoologists, soil scientists, and geologists to identify and explain plants, animals, soils, and rocks. They are also skilled in using the radioactive Carbon
  Dating Method to determine dates and are known for their ability to situate material remains in historical contexts and increase understanding of the past. They are a historian and their aim is to explain
  the experiences and achievements of our predecessors and develop the present by knowledge of the experiences and achievements of our predecessors.
