personas:
  professional: Alice Spears, a budding museum curator-in-training, combines her sharpened research and analytical writing skills with a flair for graphic design, coordinating small community art events
    while interning as a docent at the Rochester Museum, where her curious, organized yet flexible nature and empathetic listening help her spotlight local artists and history.
  sports: Alice Spears, an avid hiker of the Genesee River trails, supplements her outdoor pursuits by cheering on the Rochester Americans during the hockey season, jogging with the Rochester Trailblazers
    running club on weekends, and occasionally joining a local yoga studio for flexibility work.
  arts: Alice Spears, a sketch‑loving art enthusiast, frequents the Rochester Contemporary Art Center to study works by Kehinde Wiley and Ansel Adams, strums acoustic covers of Joni Mitchell and Nick Drake
    for personal solace, and curates small pop‑up exhibitions featuring emerging local photographers.
  travel: Alice Spears prefers low‑key weekend escapades, having hiked the Catskills, explored the historic streets of Boston, and taken a bus to the vibrant art districts of Montreal, while dreaming of
    future trips to the coastal villages of Portugal and the cherry‑blossom festivals of Japan, always planning itineraries on a spreadsheet to balance cost with cultural immersion.
  culinary: Alice Spears, a home‑cooking experimenter, delights in mastering carrot‑ginger soups and rosemary‑infused focaccia, enjoys sourcing fresh herbs at the Rochester farmers’ market, and occasionally
    treats herself to a dinner at diners featuring classic New York‑style pizza with pepperoni and extra mozzarella.
  core: Alice Spears balances a curiosity‑driven love for art with a habit of over‑stocking sticky notes for project plans, yet often forgets to water their potted succulents, and can’t resist the lure
    of secondhand vintage postcards that line their bookshelf.
background:
  cultural: Alice comes from a white, multi‑generational family with roots in the northeastern United States, including Irish and German ancestry. Growing up in Honeoye Falls, a small town in Livingston
    County, she was immersed in a close‑knit community that values modesty, self‑reliance, and mutual support. The region's natural beauty and seasonal changes fostered her appreciation for outdoor pursuits
    and seasonal celebrations. Her family emphasized education, cultural exposure through museum visits, and community service, shaping her balanced outlook on personal growth and social harmony.
attributes:
  skills: '["Research and analytical writing", "Graphic design (Adobe Photoshop, Illustrator)", "Digital illustration", "Basic photography", "Event planning for small gatherings", "Community volunteering
    coordination", "Creative problem solving", "Basic Spanish", "Time management"]'
  hobbies: '["Sketching and drawing", "Visiting galleries and museums", "Reading contemporary fiction and poetry", "Photography (landscape and urban)", "Hiking in Genesee River trails", "Playing acoustic
    guitar", "Cooking and experimenting with recipes", "Participating in local book club", "Volunteering at community arts events"]'
  career_goals: Alice aspires to combine her love for art and community engagement by pursuing a career in museum curation or cultural program coordination. She plans to complete her bachelor's degree in
    Art History or Museum Studies, followed by a master's in Curatorial Practice. Ultimately, she hopes to work at a regional museum in upstate New York, developing exhibitions that highlight local artists
    and history. In the meantime, she aims to build a freelance graphic design portfolio and volunteer as a docent at the Rochester Museum to gain hands‑on experience.
