    in Workplace Design'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Reading on Art, Philosophy, and Emerging Technologies'', ''Woodworking'', ''Model Ship Building'', ''Gardening'', ''Meditation and Journaling'', ''Playing
    Chess at a Community Club'', ''Volunteer Safety Workshops for Local Schools'', ''Participating in an African-American History Discussion Group'']'
  career_goals: Kadeem aims to transition into a consulting role where he can leverage his extensive safety expertise to help small manufacturers in the Mid‑Atlantic region improve their compliance and
    employee well‑being. He aspires to author a practical guide on integrating ergonomic best practices with aesthetic workplace design, and to present his insights at industry conferences and local community
    workshops. Over the next few years, he also hopes to mentor the next generation of safety engineers, ultimately building a legacy of safer, more humane work environments while achieving a balanced pace
    that supports his mental health.
