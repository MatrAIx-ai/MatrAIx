persona_description: A scientist or researcher at the Fraunhofer Institute for Molecular Biology and Applied Ecology IME in Aachen, Germany, who specializes in the production of biopharmaceuticals from
  plants. This person is highly skilled in the use of plants to produce complex active substances, including proteins that cannot be chemically produced. They have developed equipment to pulp plants, which
  is a key step in producing biopharmaceuticals. They are currently working on developing biopharmaceuticals for clinical studies, including the production of antibodies for use in vaginal gels and malaria
  vaccines in plants.
