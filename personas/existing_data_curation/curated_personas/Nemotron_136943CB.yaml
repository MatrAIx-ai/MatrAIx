  career_goals: Driven by his competitive nature, Dwight aims to secure a store manager position within the next two years, where he can lead a team, implement data‑driven sales strategies, and consistently
    rank as the top performer in his district. Long‑term, he envisions opening a boutique retail space that emphasizes sustainable, locally sourced products, leveraging his deep market knowledge and community
    ties. He also plans to develop his expertise in e‑commerce integration to complement brick‑and‑mortar operations, and seeks mentorship or training in stress‑management techniques to better handle his
    intense emotional reactivity while pursuing these ambitions.
