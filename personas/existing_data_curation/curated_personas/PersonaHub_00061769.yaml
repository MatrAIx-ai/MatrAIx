persona_description: A medical professional who specializes in craniofacial reconstruction and prosthetics, focusing on the surgical reconstruction of facial defects, the design and fabrication of ocular
  and craniofacial prostheses, and the treatment of facial deformities. They have a deep understanding of the anatomy, physiology, and pathology of the facial tissues, and are skilled in the use of biocompatible
  materials, mechanical devices, and surgical techniques to restore the functional and aesthetic aspects of the face. They are also knowledgeable about the role of prostheses in the emotional and psychological
  well-being of their patients, and have a passion for helping individuals who have suffered from facial defects.
