  hobbies: '[''visiting art galleries'', ''sketching and drawing'', ''Indian classical dance'', ''fusion cooking'', ''reading contemporary literature'', ''writing reflective blog posts'', ''street photography'',
    ''yoga and meditation'', ''volunteering art workshops'', ''attending literature and film festivals'']'
  career_goals: Usha aims to transition from a teaching assistant role to a tenure-track faculty position within a liberal arts department, focusing on South Asian art history and comparative literature.
    She plans to pursue a master's and eventually a Ph.D. in Humanities, target research grants to fund a community-based art education program for immigrant youth in Detroit, and publish a monograph on
    diaspora visual culture. Long-term, she aspires to become department chair or a museum curator, shaping curricula that bridge academic inquiry and public engagement, while also mentoring underrepresented
    students.
