personas:
  professional: Juan Nichols is a construction management professional who translates blueprints into on‑site reality, leveraging Procore, Primavera P6, and a hands‑on materials science intuition, while
    they balance a competitive drive with a laid‑back, sometimes disorganized approach that lets curiosity guide practical problem‑solving on large commercial projects.
  sports: Juan Nichols is a weekend fly‑fisher on the Grand River and a dune‑hiker along Lake Michigan, occasionally lacing up trail‑running shoes for local races, while rooting for the Detroit Lions and
    supporting the Grand Rapids Griffins, and they belong to a small regional outdoor club that meets monthly.
  arts: Juan Nichols expresses creativity through handcrafted wooden furniture and scale model houses, draws inspiration from architects like Frank Lloyd Wright and designers such as Charles Eames, and
    they unwind to the folk‑rock sounds of The Avett Brothers and the ambient scores of documentary series on engineering marvels.
  travel: Juan Nichols prefers low‑key road trips that blend work and wander, having explored the Upper Peninsula’s state parks and the craft‑brew scene in Portland, Oregon, while they dream of a future
    visit to Denmark to study the country’s pioneering sustainable building practices.
  culinary: Juan Nichols enjoys cooking freshly caught trout with lemon‑herb butter, perfecting a rustic wood‑fire pizza topped with locally sourced mushrooms and smoked mozzarella, and they frequently
    pair meals with seasonal Michigan craft beers like New Holland’s Whirlwind IPA.
  core: Juan Nichols is a curious yet laid‑back construction manager who spends weekends fishing, building furniture, and sipping craft beer, all while they juggle certification dreams, occasional disorganization,
    and a competitive edge that fuels both work and hobby pursuits.
background:
  cultural: Juan grew up in a middle‑class, white Midwestern family in Grand Rapids, with deep‑rooted German‑Scandinavian ancestry common to the region. His upbringing emphasized modesty, hard work, and
    community involvement—values echoed in local traditions such as county fairs, cherry‑harvest festivals, and neighborhood block parties. He maintains a strong connection to Michigan’s outdoors, often
    partaking in seasonal activities like ice‑fishing in winter and lake trips in summer. While he identifies with broader American cultural norms, his day‑to‑day life is shaped by the practical, no‑nonsense
    ethos of the Midwest, balanced by an appreciation for the region’s craft food and brewing scene.
attributes:
  skills: '[''Construction project coordination'', ''Blueprint and structural drawing interpretation'', ''Cost estimating and budgeting'', ''Project scheduling (Procore, Primavera P6)'', ''OSHA safety compliance
    and risk assessment'', ''Subcontractor negotiation and management'', ''Basic structural analysis'', ''Building Information Modeling (BIM) familiarity'', ''Conflict resolution'', ''Adoption of sustainable
    building practices'']'
  hobbies: '[''Fly‑fishing'', ''Hiking'', ''Woodworking and furniture making'', ''Scale model house building'', ''Arduino and home‑automation tinkering'', ''Watching engineering documentaries'', ''Reading
    nonfiction on science and materials'', ''Craft brewery outings with small groups'']'
  career_goals: Juan aims to earn the Certified Construction Manager (CCM) and Project Management Professional (PMP) credentials within the next two years, positioning himself for senior project manager
    roles on large commercial developments across Michigan. He is particularly interested in leading sustainable‑building projects that achieve LEED certification and integrating emerging technologies such
    as drone‑based site surveys and advanced prefabrication methods. Over the next five to ten years, Juan aspires to launch his own construction firm, focusing on mid‑size commercial and mixed‑use projects
    that emphasize efficiency, environmental responsibility, and innovative design. He also hopes to mentor junior tradespeople, sharing his blend of practical know‑how and curiosity‑driven learning.
