  hobbies: '["Hiking", "Nature Photography", "Birdwatching", "Gardening", "Woodworking", "Metalworking (DIY art)", "Reading Technical Articles", "Meditation", "Yoga", "Knitting", "Podcasts (Engineering
    & Sustainability)", "Board Games (small group)", "Volunteering at Animal Shelter", "Maker Fairs"]'
  career_goals: Alexandria aims to advance to a lead fabricator or supervisory role within the next five years, leveraging additional certifications in advanced welding (AWS Certified Welder) and CNC programming.
    She is interested in specializing in renewable‑energy component fabrication, such as wind‑turbine parts, to align her work with sustainability goals. Long‑term, she envisions mentoring new hires, contributing
    to process‑improvement initiatives, and possibly launching a small boutique shop that creates custom metal art and functional pieces, blending her technical skill set with creative expression while
    maintaining a stable, low‑stress work environment.
