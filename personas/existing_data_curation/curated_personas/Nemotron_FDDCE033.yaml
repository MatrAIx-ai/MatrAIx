personas:
  professional: Angel Ponce, a 48‑year‑old strategic marketing executive, fuses data‑driven campaign planning with a vivid abstract imagination, wielding bilingual copywriting and emerging AR‑powered storytelling
    to craft culturally resonant brand narratives, while their relaxed, flexible work style lets them pivot quickly even as their competitive streak pushes them to out‑innovate rivals.
  sports: Angel Ponce, 48, balances a relaxed weekend paddle‑boarding routine on the nearby coast with a competitive enthusiasm for cheering the local baseball club, the Cangrejeros de Santurce, while regularly
    attending a small community yoga class that satisfies both their fitness and mindfulness goals.
  arts: Angel Ponce, a 48‑year‑old abstract painter and photographer, draws inspiration from Mark Rothko’s color fields, Yayoi Kusama’s immersive installations, and the lyrical piano works of Ludovico Einaudi,
    while regularly attending intimate poetry readings featuring Ocean Vuong’s verses and collaborating on traditional Puerto Rican dishes with fellow creative friends.
  travel: Angel Ponce, 48, prefers off‑the‑beaten‑path trips that blend art and nature, having explored the colonial streets of Cartagena, the vibrant murals of Oaxaca, and the avant‑garde galleries of
    Berlin, while dreaming of a future immersion in Tokyo’s contemporary design scene, all planned on a flexible schedule that accommodates their boutique consultancy workload.
  culinary: Angel Ponce, 48, enjoys cooking at a moderate skill level, frequently preparing mofongo with plantains and garlic, arroz con gandules seasoned with culantro and sofrito, and sipping espresso
    while experimenting with native herbs like cilantro and oregano in small‑group kitchen sessions that turn dinner into a creative workshop.
  core: Angel Ponce, 48, channels a restless imagination into bold marketing campaigns, balances competitive ambition with a laid‑back, yoga‑infused lifestyle, and often forgets to pay bills on time while
    still finding time for spontaneous abstract painting sessions.
background:
  cultural: Angel was raised in Hatillo, a municipality known for its rich agricultural heritage and vibrant community celebrations such as the Fiestas Patronales de San Francisco de Asís. Her Puerto Rican
    roots are expressed through bilingual fluency, a love for bomba y plena rhythms, and a deep respect for island traditions. She incorporates local motifs—like the iconic Vejigante mask and the island’s
    natural colors—into her branding work, aiming to reflect the island’s resilience and creativity while honoring her family’s generational ties to Puerto Rico’s cultural tapestry.
