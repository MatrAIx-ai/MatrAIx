  career_goals: Angel aspires to become a chief marketing officer within the next decade, leading integrated, culturally resonant campaigns for a multinational brand that emphasizes Caribbean markets. She
    seeks to champion the use of emerging technologies—such as AR experiences and AI‑driven personalization—to push creative boundaries. Additionally, she hopes to mentor emerging marketers, launch a boutique
    consultancy focused on authentic Latin American storytelling, and earn recognition for award‑winning, socially impactful advertising.
