  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Community Theater Set Design'', ''Wine Tasting Trips'', ''Yoga'', ''Birdwatching'', ''Book Club Participation'']'
  career_goals: Renee aims to transition from classroom teaching to a leadership role within her district, such as department chair or curriculum coordinator, where she can shape interdisciplinary programs
    that blend her love for history and digital media. She is planning to pursue a Master's in Educational Leadership to strengthen her administrative skills, and hopes to mentor a cohort of new teachers,
    fostering a culture of balanced innovation and pragmatic teaching methods. Long-term, she envisions serving on the school board to advocate for flexible scheduling and community-centered learning opportunities
    that reflect the diverse needs of Kingwood families.
