  hobbies: '[''Gardening'', ''Southern Cooking'', ''Quilting'', ''Crocheting'', ''Church Choir'', ''Bible Study'', ''Historical Fiction Reading'', ''Volunteer Work at Food Bank'', ''Walking Nature Trails'',
    ''Gospel and Soul Music Listening'']'
  career_goals: Tia aims to advance to an Office Supervisor position at the local health clinic, where she can leverage her organizational strengths and compassionate leadership. She plans to earn the Certified
    Administrative Professional (CAP) credential to formalize her expertise. Additionally, she wants to establish a mentorship program for younger administrative staff, spearhead community health fair initiatives,
    and gradually transition to a part‑time role that balances her desire for continued professional contribution with increased time for family, volunteering, and personal well‑being as she approaches
    retirement.
