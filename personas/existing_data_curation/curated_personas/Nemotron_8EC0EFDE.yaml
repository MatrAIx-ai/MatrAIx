personas:
  professional: Tia Labranch, a veteran administrative support specialist with three decades of office management experience, leverages meticulous scheduling, conflict mediation, and compassionate mentorship
    to keep the local health clinic’s operations humming, while they balance practical reliability with a curiosity for new efficiencies despite occasional worry over over‑commitments.
  sports: Tia Labranch enjoys leisurely nature‑trail walks with their church walking group and casual pickleball at the community center, they also cheer on the Auburn Tigers football team and the Atlanta
    Braves baseball club, balancing low‑impact exercise with seasonal fan enthusiasm.
  arts: Tia Labranch finds creative fulfillment in quilting and crocheting handcrafted gifts, they sing in their church choir to the soaring hymns of Mahalia Jackson and the soulful rhythms of Aretha Franklin,
    and they immerse themselves in historical fiction by Walter Dean Myers, letting music and textile art enrich their daily life.
  travel: Tia Labranch plans trips with meticulous checklists yet delights in spontaneous weekend getaways, they have explored Savannah’s historic squares and the jazz‑filled streets of New Orleans, while
    dreaming of a pilgrimage to the Great Smoky Mountains and a cultural tour of Washington, D.C.’s civil‑rights landmarks.
  culinary: Tia Labranch transforms classic soul‑food staples—like baked chicken and dumplings, shrimp and grits, and sweet‑potato casserole—into lighter, garden‑fresh creations using home‑grown tomatoes,
    low‑sodium seasoning, and olive oil, they still savor the indulgent taste of a perfectly spiced pecan‑topped collard greens dish.
  core: Tia Labranch blends compassionate leadership, Southern hospitality, and a love for gardening and gospel music into a meticulous yet occasionally anxious life, they are punctuated by a penchant for
    midnight sweet‑tea sips and a stubborn habit of postponing piano lessons.
background:
  cultural: Tia is a Black woman from Gallion, Alabama, deeply rooted in a multi‑generational Southern African‑American community. Her family history reflects the legacy of ancestors who navigated the Great
    Migration and settled in rural Alabama, preserving traditions of faith, resilience, and community service. Raised in a close‑knit church environment, she internalized values of hospitality, gospel music,
    soul food, storytelling, and seasonal church events. Her cultural identity blends Southern hospitality with the enduring strength of Black Southern culture, emphasizing kinship networks, oral history,
    and the preservation of heritage through cooking, music, and active participation in community initiatives.
attributes:
  skills: '[''Office Management'', ''Scheduling and Calendar Coordination'', ''Data Entry'', ''Records Management'', ''Customer Service'', ''Financial Tracking'', ''Event Planning'', ''Community Outreach
