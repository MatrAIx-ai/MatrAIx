persona_description: A scientist and researcher in the field of materials science and engineering, particularly focused on the development and improvement of 3-D-printed materials. They have expertise in
  the use of UV irradiation to strengthen 3-D-printed materials, and have successfully applied this technique to improve the transverse stress of fused deposition modeling (FDM) printed materials. They
  are currently working on expanding this method to other materials and are interested in the potential of 3-D printing to become a manufacturing technology rather than a maker technology.
