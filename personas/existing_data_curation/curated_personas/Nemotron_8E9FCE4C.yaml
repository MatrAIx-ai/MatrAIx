personas:
  professional: A retired computational engineer, Ana Ortega leverages three decades of data science expertise to mentor emerging Latinx women in STEM, bridging technical rigor with community activism through
    part‑time consulting and curriculum design, and they bring the same disciplined mindset to every mentorship session.
  sports: Ana Ortega hits the Rocky Mountain trails weekly with the Denver Hiking Club, practices sunrise yoga at her garden, and cheers for the Colorado Avalanche and Denver Broncos, balancing vigorous
    cardio with mindful stretching to sustain their energy at 58, and they never miss a Saturday hike even when the weather turns brisk.
  arts: Ana Ortega lights up community dance nights with salsa and Marinera moves, accompanies herself on the cajón to the rhythms of Celia Cruz and Eva Ayllón, and draws inspiration from Diego Rivera’s
    murals, weaving music and visual art into her cultural stewardship, and they often end the night sharing stories of the dance’s historical roots.
  travel: Ana Ortega plans her voyages meticulously, using travel reward points to revisit Machu Picchu for Inti Raymi celebrations and to trek Alaska’s Denali, while savoring weekend escapes to Colorado’s
    hot springs that blend adventure with relaxation, and they always pack a compact telescope for stargazing.
  culinary: Ana Ortega’s kitchen doubles as a culinary classroom where she perfects ceviche, causa, and lomo saltado, seasoning them with ají amarillo and pisco‑infused marinades, while her hands‑on workshops
    teach friends to roll quinoa‑filled empanadas and sip authentic pisco sours, and they love experimenting with seasonal ingredients sourced from local farmers’ markets.
  core: Ana Ortega fuses analytical rigor with vibrant cultural traditions, channeling their disciplined mind into mentorship, mountain hikes, and sizzling Peruvian plates, and they occasionally forget
    to water their succulents.
background:
  cultural: Ana Marie Ortega embraces her Peruvian‑American identity, having grown up in a bilingual household within Denver’s vibrant Latino community. Her upbringing blended Andean family values—collectivism,
    respect for education, and religious traditions—with the independent spirit of the American West. She actively participates in the Peruvian Cultural Center of Colorado, celebrating festivals such as
    Inti Raymi, Señor de los Milagros, and Día de la Canción, and often shares traditional recipes and folk music with neighbors. Ana’s fluency in Spanish and deep knowledge of Peruvian history allow her
    to serve as a cultural liaison in community projects, fostering cross‑cultural understanding. She draws inspiration from her ancestors’ resilience, weaving those narratives into her mentorship philosophy
    and community outreach.
