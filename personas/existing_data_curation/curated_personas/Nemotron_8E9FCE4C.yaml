  hobbies: '["Hiking in the Rocky Mountains", "Yoga", "Native‑plant gardening", "Cooking Peruvian dishes", "Hosting cooking workshops", "Salsa and Marinera dancing", "Playing the cajón", "Participating
    in community dance nights", "Astronomy club attendance", "Book club reading (history & science)", "Volunteering as STEM mentor", "Traveling to Peru"]'
  career_goals: Although retired from full‑time employment, Ana is driven to continue shaping the STEM landscape through mentorship, advocacy, and part‑time consulting. She aims to establish a bi‑annual
    youth STEM summit that highlights Latinx women in science, serve on the board of a local nonprofit focused on equitable tech education, and offer pro‑bono data analytics advisory to community organizations.
    Additionally, she plans to author a guidebook on culturally responsive STEM teaching and to pursue a certification in community health to integrate data‑driven solutions into public health initiatives.
    Her overarching ambition is to leave a lasting legacy that empowers the next generation of underrepresented innovators while staying intellectually vibrant.
