  career_goals: Although still a toddler, Jerry often imagines future roles that mirror his love of order and teamwork. He frequently declares his dream of becoming a firefighter, attracted by the clear
    routines, uniforms, and group camaraderie. He also enjoys pretending to be a teacher, guiding other children in organized activities. These playful aspirations hint at a future ambition toward careers
    that combine structure, responsibility, and frequent social interaction.
