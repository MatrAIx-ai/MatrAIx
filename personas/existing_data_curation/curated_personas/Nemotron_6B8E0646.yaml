personas:
  professional: A budding mini‑entrepreneur in Katy, Texas, Jerry Steele loves arranging building blocks into tidy columns during playtime, rigorously follows the daily routine of snack, nap, and story,
    and naturally leads a small circle of friends in cooperative games, showcasing an early blend of structure, practicality, and sociable leadership; they delight in making sure everyone gets a turn.
  sports: A pint‑sized sports enthusiast, Jerry Steele participates in the Little Explorers Soccer Club, cheers for the Houston Astros during family game nights, and mimics the Dallas Cowboys' touchdown
    dances at weekend block parties; they approach fitness with boundless energy and a love for team spirit.
  arts: An early admirer of bright colors and catchy tunes, Jerry Steele watches Disney’s Frozen and sings along to The Wiggles and Sesame Street, enjoys finger‑painting to the rhythm of Beyoncé’s upbeat
    tracks, and, during weekend craft sessions, they eagerly create collage art using glitter stickers and crayon scribbles.
  travel: An adventurous toddler, Jerry Steele has visited the bustling Dallas Science Center, splashed in the warm surf at Galveston Beach, taken a family road trip to Austin’s music festivals, and dreams
    of a future trip to Paris’s Eiffel Tower where they imagine tasting croissants; they approach travel with excitement for new sights but rely heavily on familiar car seat comforts.
  culinary: A picky eater with a love for comfort foods, Jerry Steele prefers creamy mac and cheese, crunchy chicken nuggets, sweet strawberry slices, and occasional carrot sticks, can mash peas with a
    plastic fork, delights in sprinkling shredded cheddar on everything, and, when offered a new dish like quinoa, they often push it away, showcasing a culinary habit of comfort and occasional stubbornness.
  core: Jerry Steele, a two‑year‑old who thrives on routine yet worries about small changes, bursts with energy in group play, hoards colorful stickers, and occasionally throws tantrums when meals don’t
    go their way, making them a charmingly disciplined yet delightfully unpredictable toddler; they often seek reassurance with a tight hug.
background:
  cultural: 'Jerry is a white toddler raised in Katy, Texas, a suburban community in Fort Bend County. His family’s daily life reflects a blend of Southern hospitality and modern suburban values: regular
    family meals, attendance at a local community church, and participation in neighborhood events like holiday celebrations and block parties. The multicultural environment of Fort Bend County introduces
    him to diverse foods, music, and cultural festivals, while his immediate cultural upbringing emphasizes polite manners, teamwork, and respect for routine—traits that align with his personality profile.'
