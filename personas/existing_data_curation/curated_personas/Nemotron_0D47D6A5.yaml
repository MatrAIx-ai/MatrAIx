    ''Attention to detail and process adherence'']'
  hobbies: '[''Cooking traditional Mexican recipes'', ''Hiking local trails (Daley Ranch, Escondido Dog Park)'', ''Puzzle solving (crosswords, sudoku)'', ''Journaling'', ''Yoga and mindfulness practice'',
    ''Reading self‑improvement and motivational books'', ''Attending small community cultural events'', ''Bilingual language‑exchange meetups'']'
  career_goals: Katya aims to advance from her current secretarial role to an Office Manager position within the next three years, leveraging her organizational strengths and competitive drive. She plans
    to earn a Microsoft Office Specialist certification and complete a GED program, followed by an associate’s degree in Business Administration at a community college. Long‑term, she envisions transitioning
    into operations management or becoming an executive assistant for a senior executive, where she can shape workflow efficiencies and mentor junior staff. Her ambition is balanced with a desire for stable,
    predictable career progression while gradually expanding her leadership responsibilities.
