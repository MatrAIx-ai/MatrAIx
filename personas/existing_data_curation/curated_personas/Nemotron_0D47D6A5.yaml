personas:
  professional: Katya Rosales, a detail‑oriented office administrator with bilingual fluency and a knack for streamlining calendars, is leveraging her competitive drive to prepare for a Microsoft Office
    Specialist certification and a future Office Manager role where she can formalize procedures and mentor junior staff.
  sports: Katya Rosales enjoys weekly hikes on the Daley Ranch trails, is a member of the local Sunrise Hiking Club, and complements the cardio with sunrise yoga sessions, while rooting for the Los Angeles
    Dodgers and following the MLS team LAFC for a dose of team spirit.
  arts: Katya Rosales finds creative refuge in listening to Natalia Lafourcade’s folk‑pop melodies, attending bilingual poetry nights featuring poet Eduardo Cote, and admiring Frida Kahlo’s exhibitions
    at nearby museums, which together shape her reflective outlook.
  travel: Katya Rosales prefers structured itineraries, having explored Oaxaca’s culinary markets and San Miguel de Allende’s historic plazas, while planning a future trip to Barcelona to study its architecture
    and savor paella, balancing solo travel with occasional language‑exchange meet‑ups.
  culinary: Katya Rosales delights in crafting authentic tamales using masa harina, dried guajillo chiles, and pork shoulder, perfects pozole with hominy, pork, and fresh cilantro, and experiments with
    mole negro, showcasing her intermediate cooking skills and love for bold, earthy flavors.
  core: Katya Rosales is a structured, competitive 24‑year‑old who balances a disciplined work ethic with reflective hobbies like puzzle solving, yoga, and cooking family recipes, while occasionally battling
    budget‑driven impulse buys and minor health neglect.
background:
  cultural: Katya is a second‑generation Mexican‑American who grew up in a bilingual household in Escondido, California. She was raised with strong Mexican cultural traditions, celebrating Día de los Muertos,
    quinceañeras, and holiday gatherings featuring family‑cooked meals. Spanish remains the language of her family conversations, while English dominates her school and work environments. Her Catholic upbringing
    influences her values of community service and respect for familial bonds. Katya actively participates in the local Mexican‑American community, volunteering at cultural festivals and supporting neighborhood
    initiatives, all while navigating the dual identity of her heritage and the broader Californian culture.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint, Outlook)'', ''Google Workspace (Docs, Sheets, Calendar)'', ''Bilingual Spanish‑English communication'', ''Scheduling and calendar management'',
