  hobbies: '[''Volleyball'', ''Dance (hip‑hop and line dancing)'', ''Cooking and baking'', ''DIY crafts'', ''Hiking local trails'', ''Reading teen fiction'', ''Church youth events'', ''Social media content
    creation'']'
  career_goals: Eileen aims to finish her high school education, ideally by obtaining her GED within the next two years, and then enroll in a community‑college program to become a Certified Nursing Assistant.
    She sees healthcare as a stable career that will let her help her family and community. In parallel, she dreams of turning her love for cooking into a modest home‑based catering service, providing baked
    goods for local events. Long‑term, she hopes to continue her studies to become a Registered Nurse or a health educator, combining her practical curiosity with a desire to support others.
