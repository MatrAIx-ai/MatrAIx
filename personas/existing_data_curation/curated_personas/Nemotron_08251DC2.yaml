  hobbies: '[''Collecting baseball cards'', ''Building LEGO Technic models'', ''Reading non-fiction (wildlife, technology, engineering)'', ''Playing chess'', ''Fishing at local lakes'', ''Cub Scouts badge
    activities'']'
  career_goals: Scott aspires to a future where he can serve his community through a structured and reliable career. He dreams of becoming a firefighter, attracted by the clear routines, teamwork, and tangible
    help to others. He is also fascinated by how machines work and hopes to study mechanical engineering someday. In the short term, he looks forward to joining Cub Scouts and a junior fire‑cadet program
    to develop discipline, leadership, and the practical skills he values.
