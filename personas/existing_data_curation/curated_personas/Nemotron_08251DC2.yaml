personas:
  professional: Scott Borden, a nine‑year‑old budding engineer, channels his love of LEGO Technic and baseball‑card organization into early experiments with simple machines, tackling projects with methodical
    precision and a competitive drive to top his own benchmarks.
  sports: Scott Borden, an avid junior angler, rises before dawn for family fishing outings at Lake Minneola while cheering for the Tampa Bay Rays, and also participates in Cub Scout badge activities such
    as archery and canoeing, preferring organized team sports that involve clear rules and individual scoring.
  arts: Scott Borden, a structured creative, spends free time building detailed LEGO Technic models while listening to kid‑friendly educational series like Wild Kratts and the instrumental folk music of
    the O'Neill Brothers, and enjoys sketching realistic wildlife diagrams from his non‑fiction books, though he avoids spontaneous drawing challenges.
  travel: Scott Borden, a planner‑type traveler, loves family road trips to the Everglades National Park where he follows a pre‑written checklist of animal sightings, and dreams of visiting the Kennedy
    Space Center, preferring organized itineraries over spontaneous detours.
  culinary: Scott Borden, a picky but curious eater, favors simple foods such as peanut butter and jelly sandwiches, grilled cheese, and homemade chicken nuggets seasoned with mild paprika, often helping
    his parents assemble mini pizza bites, yet he stubbornly refuses to try spicy sauces.
  core: Scott Borden is a disciplined, routine‑loving nine‑year‑old who balances a competitive streak with meticulous organization, whether sorting baseball cards, building LEGO, or planning his next fishing
    trip, all while navigating occasional picky‑eater quirks and mild allergies.
background:
  cultural: Scott comes from a middle‑class, suburban White family in Clermont, Florida, a community known for its lakes and outdoor recreation. His family observes traditional Southern‑influenced customs,
    such as celebrating Thanksgiving and the Fourth of July with community barbecues, attending a local Baptist church for weekly services, and taking part in regional youth programs like 4‑H and Cub Scouts.
    The surrounding natural environment fosters his appreciation for fishing and nature. His upbringing emphasizes practical skills, responsibility, respect for routine, and modest competitiveness, shaping
    his worldview and daily habits.
