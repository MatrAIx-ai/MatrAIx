personas:
  professional: Fonda Wiley is a community‑focused event coordinator who leverages her strong mediation skills, DIY know‑how, and love of multicultural gatherings to design inclusive, low‑budget block parties
    and wellness workshops in Queens, all while keeping a flexible schedule that accommodates family life.
  sports: Fonda Wiley enjoys walking the streets of Queens for fresh air, practices yoga three times a week for flexibility, follows the New York Knicks and the Queens FC soccer team on weekends, and signs
    up for community fun runs when her schedule allows, showing a casual yet socially engaged approach to fitness.
  arts: Fonda Wiley captures candid street moments with a mirrorless camera, cites the works of David Hockney and Frida Kahlo as visual inspiration, attends monthly open‑mic nights featuring artists like
    Nina Simone covers, and knits vibrant scarves while listening to Ludovico Einaudi, intertwining photography, music, and craft into her creative identity.
  travel: Fonda Wiley favors low‑cost, spontaneous weekend getaways, has explored the historic districts of Boston, tasted the street food scene in New Orleans, dreams of visiting Kyoto’s garden temples,
    and often plans trips around community volunteer events, balancing adventure with budget constraints.
  culinary: Fonda Wiley cooks experimental dishes such as basil‑infused shakshuka, miso‑marinated roasted carrots, and cucumber‑mint salsa verde, incorporates home‑grown herbs from her balcony garden, and
    delights in swapping recipes at Queens’ ethnic eateries, reflecting a multicultural palate anchored in seasonal produce.
  core: Fonda Wiley blends a curiosity for global flavors with a practical, community‑oriented mindset, juggling garden seedlings, craft projects, and neighborhood events while occasionally misplacing their
    keys and forgetting to water a few pots.
background:
  cultural: Fonda is a 41‑year‑old white woman who grew up in a middle‑class family in Queens, New York. Her upbringing combined traditional American values of self‑reliance and community involvement with
    the vibrant, multicultural environment of Sunnyside. While she celebrates mainstream holidays such as Thanksgiving and Independence Day, she has also embraced the diverse cultural traditions of her
    neighbors, often participating in neighborhood festivals, trying new cuisines, and incorporating global influences into her cooking and gardening. This blend of a foundational American cultural identity
    and a deep appreciation for the surrounding cultural mosaic shapes her worldview and daily life.
