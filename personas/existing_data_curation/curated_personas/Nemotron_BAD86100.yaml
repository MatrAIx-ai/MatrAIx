  hobbies: '["Balcony gardening (herbs and vegetables)", "Cooking & multicultural recipe experimentation", "Volunteer work at community center (event organizing)", "Yoga and mindfulness meditation", "Reading
    contemporary fiction and memoirs", "Street photography", "DIY crafts (knitting, crocheting, upcycling furniture)"]'
  career_goals: Fonda aims to re‑enter the workforce in a flexible, part‑time capacity that leverages her community‑building strengths while allowing her to maintain family responsibilities. She plans to
    pursue a certification in community health or nutrition within the next two years to enhance her ability to support local wellness initiatives. Additionally, she aspires to launch a modest online boutique
    featuring her handmade crafts and gardening guides, turning her hobbies into a supplemental income stream. Ultimately, Fonda hopes to become a recognized facilitator of inclusive neighborhood events
    that celebrate the cultural diversity of Queens, fostering connections and harmony among residents.
