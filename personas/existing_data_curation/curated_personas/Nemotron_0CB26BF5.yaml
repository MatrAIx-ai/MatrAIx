personas:
  professional: Bruce Ferris is an aspiring automotive engineer who channels their methodical mindset and love of competition into designing and rebuilding small engines, leading their high school robotics
    team's autonomous projects, and regularly programming Python-based diagnostic tools to streamline performance testing.
  sports: Bruce Ferris is a high-school basketball point guard who attends after-school practices, lifts weights at the school gym to stay disciplined, roots for the Detroit Pistons during the NBA season
    and the Michigan Wolverines during college football, and treats weekend chess tournaments as a strategic warm-up for competitive play.
  arts: Bruce Ferris enjoys classic car documentaries directed by Ken Burns, immerses themselves in the guitar riffs of AC/DC and the instrumental rock of Joe Satriani, and appreciates the visual storytelling
    of automotive photographer Larry Goldstein, often using these influences to inspire their own robot designs.
  travel: Bruce Ferris loves taking road trips to automotive landmarks, having visited the Henry Ford Museum in Dearborn, the Nurburgring in Germany, and planning a future weekend getaway to the Toyota
    Museum in Japan, while they prefer to meticulously plan routes and accommodation using spreadsheets to maximize time on the road.
  culinary: Bruce Ferris's palate favors hearty, engine-fueling meals like a classic cheeseburger with aged cheddar, crisp pickles, and caramelized onions, homemade pepperoni pizza, and a well-seasoned
    spaghetti bolognese, and they experiment with grilling techniques in the backyard while occasionally indulging in energy drinks during late-night coding sessions.
  core: Bruce Ferris is a calm, competition-driven teen who balances meticulous engineering projects with a relentless quest for structured improvement, yet they can be overly skeptical about shortcuts
    and sometimes forget to unwind.
background:
  cultural: Bruce comes from a white, Midwestern American background, likely of German and Polish ancestry common in the Detroit suburbs. Growing up in Dearborn Heights, Michigan, he is exposed to a mix
    of suburban and industrial influences, with the local community shaped by the historic automotive manufacturing sector. His family participates in typical American cultural traditions such as Thanksgiving,
    the Fourth of July, and local high‑school football events. The proximity to a diverse population, especially the sizable Arab‑American community in nearby Dearborn, gives him occasional exposure to
    different languages, cuisines, and perspectives, fostering a pragmatic openness while maintaining his culturally rooted values of hard work, reliability, and a preference for clear, structured environments.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Python programming'', ''Microsoft Excel'', ''Strategic planning'', ''Time management'', ''Chess strategy'', ''Small‑group leadership'']'
