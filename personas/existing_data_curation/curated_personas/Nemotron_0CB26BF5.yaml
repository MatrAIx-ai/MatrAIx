  career_goals: Bruce aims to channel his practical mindset and competitive drive into a career in automotive engineering. In the next two years, he plans to earn a high‑school diploma through an accelerated
    program and enroll in a community college offering an Associate’s degree in Mechanical Engineering Technology. He intends to obtain certifications in automotive diagnostics and continue developing his
    programming abilities to create custom diagnostic tools. Long‑term, he envisions working for a major automaker in the Detroit metropolitan area, contributing to the design and testing of fuel‑efficient
    powertrains. Ultimately, he aspires to lead an engineering team where he can apply his reliable, organized approach to project management and drive performance improvements. He also has a secondary
    ambition of potentially launching a small, locally‑focused auto‑repair shop that integrates technology‑driven services.
