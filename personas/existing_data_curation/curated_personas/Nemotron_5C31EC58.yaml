personas:
  professional: Jennifer Jones, a 30-year-old mechanical engineer specializing in CAD modeling, finite-element analysis, and IoT-enabled product design, channels her relaxed yet flexible work style and
    natural assertiveness into spearheading sustainable smart-home prototypes while quietly sketching watercolor-inspired concepts that blend engineering rigor with artistic flair.
  sports: Jennifer Jones, an avid outdoors enthusiast, spends weekends trail-running and cross-country skiing through the North Central Forest, belongs to the Green Bay Trail Club, and roots for the Milwaukee
    Bucks and Green Bay Packers, while maintaining a modest home gym for yoga and strength training.
  arts: Jennifer Jones, a watercolor landscape painter and mixed-media collage artist, draws inspiration from Monet's light, Rothko's color fields, and James Turrell's immersive installations, frequently
    listens to the Art Matters podcast, curates a small home gallery featuring works by local creators like Francesca Harding, and enjoys the haunting folk sounds of Sufjan Stevens while working.
  travel: Jennifer Jones prefers low-key, nature-focused getaways, planning spontaneous weekend drives to Door County's purple sand dunes and the Apostle Islands for kayaking, while dreaming of a summer
    study tour in Iceland to explore geothermal energy and a cultural immersion trip to Kyoto, Japan, scheduling longer journeys around family obligations during school breaks.
  culinary: Jennifer Jones, an intermediate home cook, delights in preparing wild mushroom risotto, rye sourdough with sprouted grain flour, and honey-glazed salmon using fresh Midwestern ingredients, yet
    she has a quirky habit of ordering extra pepperoni pizza late at night during marathon coding sessions.
  core: Jennifer Jones blends precise engineering with an artist's imagination, thriving in solitary creation while juggling a relaxed, sometimes chaotic lifestyle and a relentless curiosity for sustainable
    design.
background:
  cultural: Jennifer was raised in a Midwestern, French‑Canadian and German‑heritage household near Wisconsin Rapids. The region’s strong community ties, appreciation for nature, and pragmatic work ethic
    shaped her values of self‑reliance and modesty. While she enjoys local traditions like county fairs and weekly farmer’s markets, she prefers the quiet of her own space for reflection. Her background
    blends the practical sensibilities of the Upper Midwest with an openness to diverse artistic influences, fostering a balanced outlook that respects both tradition and innovative thinking.
attributes:
  skills: '[''Mechanical design'', ''CAD modeling (SolidWorks, AutoCAD)'', ''Finite‑element analysis'', ''Python scripting for data analysis'', ''Systems troubleshooting'', ''Technical writing'', ''Project
    coordination'', ''Cross‑functional communication'', ''Rapid prototyping'', ''Independent research'']'
  hobbies: '[''Watercolor painting'', ''Mixed‑media collage'', ''Hiking in the North Central Forest'', ''Woodworking and furniture making'', ''Listening to contemporary art podcasts'', ''Reading speculative
    fiction'', ''Arduino prototyping'', ''Solo photography of natural scenery'']'
  career_goals: Jennifer aims to deepen her technical expertise while moving into a senior engineering role that affords her autonomy and creative problem‑solving. She dreams of leading a small team that
    develops sustainable, user‑centric products—ideally in the renewable‑energy or smart‑home sector—where she can blend engineering rigor with an artistic sensibility. Long‑term, she envisions launching
    a boutique consultancy that helps midsize manufacturers adopt innovative, environmentally friendly design practices, all while maintaining a flexible schedule that supports her family life and solitary
    pursuits.
