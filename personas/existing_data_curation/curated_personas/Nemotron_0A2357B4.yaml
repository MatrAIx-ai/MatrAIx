  career_goals: Randy aspires to transition from being an independent truck driver to a regional logistics coordinator for a company that specializes in delivering artisanal and eco‑friendly goods across
    the Pacific Northwest. In the longer term, he hopes to launch his own mobile boutique that combines freight services with pop‑up art exhibitions, giving local artists a traveling platform while providing
    curated product deliveries. He also wants to attain certifications in commercial vehicle operation and sustainable logistics to reduce his stress and increase job stability.
