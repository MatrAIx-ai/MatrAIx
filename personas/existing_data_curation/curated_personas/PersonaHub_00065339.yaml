persona_description: A scientist at New Mexico Highlands University who specializes in the study of cardiovascular physiology and the impact of physical activity on the human body. The scientist has conducted
  research on the effects of walking on cerebral blood flow and has found that walking produces larger pressure waves in the body that significantly increase blood flow to the brain. The scientist is presenting
  their research at the APS annual meeting in Chicago and is expected to share new data that suggests the brain blood flow is very dynamic and depends directly on cyclic aortic pressures that interact with
  retrograde pressure pulses from foot impacts.
