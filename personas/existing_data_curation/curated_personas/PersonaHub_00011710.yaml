persona_description: A conservationist and environmentalist who is passionate about the study and preservation of waterbirds in Bhutan. They are a member of the Ugyen Wangchuck Institute of Conservation
  and Environment (UWICE), a non-profit organization that conducts annual waterbird counts in the country. They are also a nature guide trainee and have documented the first record of a mandarin duck and
  a black-necked grebe in Bhutan. They are dedicated to generating comprehensive data and information on Bhutan's waterbird diversity and its response to climate change.
