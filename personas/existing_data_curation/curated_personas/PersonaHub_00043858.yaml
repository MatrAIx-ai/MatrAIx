persona_description: A scientist or researcher who is interested in studying gene expression and the biological processes that occur within cells. They are particularly interested in the use of RNAseq and
  other sequencing technologies to analyze gene expression data and investigate the metabolic state of tissues and cells. They are also aware of the limitations and challenges associated with RNAseq, including
  issues such as DNA sequencing, mapping algorithms, and normalization methods. They are also familiar with other methods for analyzing gene expression, such as FPKM and DESeq, and are interested in exploring
  their advantages and disadvantages. They are also interested in the use of RNAseq for non-annotated genomes and the challenges associated with mapping reads in RNA and DNA sequencing.
