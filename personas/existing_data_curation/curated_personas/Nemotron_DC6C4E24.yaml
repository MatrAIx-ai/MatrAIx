personas:
  professional: Edna Williams is a construction laborer known for mastering concrete finishing, formwork assembly, and heavy equipment operation, blending a practical safety focus with a competitive drive
    to secure an OSHA 30‑hour certification and crane operator license while navigating deadline pressures through spontaneous problem‑solving and structured team coordination.
  sports: Edna Williams enjoys skateboarding with the downtown Hawthorne crew, attends CrossFit classes at the local box, and roots for the Los Angeles Lakers and LA Rams, while participating in a community
    skate club that meets monthly, balancing competitive training with occasional overexertion and a playful rivalry with teammates.
  arts: Edna Williams expresses creativity by sketching vibrant street‑art murals inspired by the works of Banksy and Shepard Fairey, curates playlists featuring H.E.R., Kendrick Lamar, and SZA, and frequents
    The Broad and local graffiti tours, letting R&B and hip‑hop rhythms shape their illustrative style.
  travel: Edna Williams blends spontaneous road trips to Joshua Tree and planned weekend getaways to San Diego with budget‑friendly Airbnb stays, dreaming of a skate‑culture pilgrimage to Portland while
    balancing limited savings and a desire for both adventure and relaxation.
  culinary: Edna Williams cooks quick, health‑focused meals like avocado toast with heirloom tomatoes, Mexican tacos al pastor, and miso‑ramen bowls, utilizing fresh basil and cilantro from their balcony
    garden, and enjoys experimenting with spices like smoked paprika and chilies, though they sometimes skip meal prep in favor of fast‑food after late‑night skate sessions.
  core: Edna Williams is a gritty construction pro who swaps concrete for sketchpads, tackles deadlines with last‑minute fixes, and balances a disciplined savings plan with the lure of new skate tricks.
background:
  cultural: Edna is a second‑generation African‑American who grew up in Hawthorne, a culturally diverse suburb of Los Angeles. Her family maintains strong ties to the Black Church and community festivals,
    blending Southern‑American culinary traditions with Southern‑California food culture. She identifies with the legacy of Black laborers and activists who shaped the region’s workforce, which fuels her
    determination to succeed in a male‑dominated field. Her cultural background informs her music preferences, community involvement, and the value she places on family and mentorship.
attributes:
  skills: '[''Concrete finishing'', ''Formwork assembly'', ''Heavy equipment operation (backhoe, forklift)'', ''Blueprint reading'', ''OSHA safety compliance'', ''Team coordination'', ''Physical stamina'',
