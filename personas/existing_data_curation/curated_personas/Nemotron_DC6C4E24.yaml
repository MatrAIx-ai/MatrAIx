  hobbies: '[''Urban gardening'', ''Street art murals'', ''Skateboarding'', ''R&B and hip‑hop music'', ''DIY home improvement projects'', ''Reading thriller novels'', ''CrossFit fitness classes'', ''Volunteering
    at a community youth center'']'
  career_goals: Edna plans to obtain her OSHA 30‑hour certification and a certified crane operator license within the next two years, positioning herself for a foreman role on commercial sites. In the longer
    term, she hopes to lead a crew on larger building projects and eventually launch a small contracting business that emphasizes sustainable, affordable housing in Southern California. She also wants to
    mentor other women and people of color entering the trades, using her competitive drive to advocate for greater diversity in the construction industry.
