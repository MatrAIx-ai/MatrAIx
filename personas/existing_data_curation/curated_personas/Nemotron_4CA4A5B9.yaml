  career_goals: Novlette aims to pursue a college degree in Visual Arts with a minor in Community Development, eventually becoming a community arts program director or youth arts therapist. She envisions
    establishing a nonprofit art space in Bakersfield that offers free workshops, mentorship, and therapeutic art sessions for underserved youth. In the short term, she plans to earn a scholarship, intern
    at a local museum or cultural center, and acquire professional certifications in graphic design. Her long‑term ambition is to merge her creative talents with her passion for social impact, creating
    inclusive platforms where art catalyzes empowerment and community cohesion.
