personas:
  professional: Novlette Scarborough is a 16‑year‑old emerging digital illustrator and community‑focused graphic designer who leverages Photoshop, Canva, and basic web development to lead school art club
    murals and organize charity fundraisers, blending her organized planning, sociable energy, and compassionate drive to empower peers through visual storytelling.
  sports: Novlette Scarborough enjoys the local high school basketball games, cheering for the Bakersfield High Cougars, participates in weekend recreational soccer with a mixed‑culture youth league, and
    stays active through weekend jogs along the Kern River Trail, occasionally swapping a sketch session for a quick pick‑up game.
  arts: Novlette Scarborough immerses herself in the vibrant mural scene of Bakersfield, draws inspiration from artists like Kehinde Wiley, Jean‑Michel Basquiat, and modern street artists such as Shepard
    Fairey, attends monthly art‑film screenings featuring works by Ava DuVernay and Spike Lee, and regularly creates chalk installations that echo the city’s colorful storytelling.
  travel: Novlette Scarborough dreams of a road‑trip along Route 66 to explore iconic southwestern murals, has already visited the Getty Center in Los Angeles for a youth art workshop, and plans a future
    summer itinerary that includes a cultural exchange in Oaxaca, Mexico, balancing school responsibilities with her love for spontaneous photo‑walks.
  culinary: Novlette Scarborough delights in weekend family cooking sessions that blend collard greens and cornbread with tacos and salsa, often experimenting with homemade hot sauce using jalapeños and
    smoked paprika, and enjoys sketching her favorite dishes—like sweet potato pie and chilaquiles—while listening to jazz.
  core: Novlette Scarborough is a crafty, community‑centric teen who channels curiosity and meticulous planning into art, saves wisely, stays health‑aware, sports a love for basketball and soccer, revels
    in murals and film, dreams of road‑trip adventures, and balances soulful cooking with a flair for flavor experiments.
background:
  cultural: Novlette identifies as African American, with family roots that trace back to the Southern United States and a lineage of migrants who settled in California during the 1970s. She grew up in
    a close‑knit extended family where church gatherings, Sunday potlucks, and celebrations of Juneteenth are central to her cultural identity. The household blends traditional soul food—collard greens,
    cornbread, and sweet potato pie—with the diverse culinary influences of Bakersfield, especially Mexican cuisine, reflected in family tacos and salsa nights. Through church youth groups and local Black
    cultural events, she has been exposed to African American history, gospel music, and spoken‑word poetry, which shape her artistic voice. While embracing her heritage, she also values the multicultural
    fabric of Kern County, fostering friendships across cultural lines and drawing inspiration from the city’s vibrant mural scene.
