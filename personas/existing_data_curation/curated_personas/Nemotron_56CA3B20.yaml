personas:
  professional: A community historian and practical DIY mentor named Taurus Steele blends self‑taught budgeting, home‑repair know‑how, and oral‑history storytelling into weekly senior‑center workshops,
    while they bring a competitive bridge mindset and a relaxed approach to planning that keep them sharp yet occasionally scattered.
  sports: A lifelong Miami sports enthusiast named Taurus Steele follows the Heat, the Dolphins, and Inter Miami CF with fervor, participates in low‑impact senior aqua‑aerobics at the community pool, and
    they maintain a casual walking routine along the bay, though their competitive spirit often shows up in bridge rather than physical contests.
  arts: A vintage‑vinyl collector and classic soul aficionado named Taurus Steele spins records by Aretha Franklin, Marvin Gaye, and Nina Simone, attends monthly live jazz nights at the historic Olympia
    Theater, and they weave those musical narratives into their oral‑history recordings, while their occasional crochet projects reveal a tactile appreciation for rhythm and pattern.
  travel: A nostalgic traveler named Taurus Steele prefers short road trips to Key West and the Everglades, dreams of revisiting family roots in the rural South and exploring the Caribbean islands of Jamaica
    and the Bahamas, plans trips with a loose itinerary that leaves room for spontaneous stops at local roadside fruit stands, and they balance limited retirement funds with careful budgeting.
  culinary: A culinary alchemist named Taurus Steele fuses Southern soul comfort dishes like collard greens and smoked turkey with Caribbean heat from scotch bonnet peppers, regularly prepares shrimp and
    grits infused with coconut milk, whips up mango‑pineapple salsa for jerk chicken, and they experiment with herb blends harvested from a balcony garden of thyme, cilantro, and basil, while occasionally
    over‑seasoning in pursuit of bold flavor.
  core: A pragmatic yet curiosity‑driven senior, Taurus Steele blends competitive bridge tactics, frugal deal‑hunting, and a love for soul‑caribbean cooking, and they juggle occasional worry with a delightfully
    disorganized schedule.
background:
  cultural: Taurus grew up as a Black woman in Miami during the final years of segregation and the civil‑rights movement, witnessing both the challenges and the resilience of the city’s Black neighborhoods
    such as Overtown and Liberty City. Her family roots trace back to the rural South, and she absorbed Southern culinary traditions; living in a city with a strong Caribbean presence, she also integrated
    Haitian and Jamaican flavors into her cooking. The local church and community centers provided a support network, fostering a strong sense of collective memory that she now preserves through oral history.
    The vibrant multicultural mosaic of Miami, where Spanish, Afro‑Latino, and African‑American cultures intersect, shaped her worldview, giving her a blend of African diaspora heritage and South Florida’s
    coastal lifestyle. Throughout her life she navigated economic hardships, cultivating self‑reliance and a competitive spirit that reflects broader narratives of Black perseverance in urban America.
attributes:
  skills: '["Basic home repair (plumbing, electrical, carpentry)", "Cooking (Southern soul food and Caribbean cuisine)", "Budgeting and personal finance management", "Negotiation and bargain shopping",
    "Oral history documentation", "Digital literacy (smartphone, email, social media)", "Storytelling and community mentorship"]'
  hobbies: '["Balcony herb gardening", "Experimenting with new spice blends and cooking", "Playing bridge (senior tournaments)", "Local history tours and oral history recording", "Genealogy research", "Listening
    to classic R&B, jazz, and soul music", "Collecting vintage vinyl records", "Monthly bingo and trivia nights", "Crochet and knitting", "Crossword and puzzle solving"]'
  career_goals: Taurus aims to formalize her lifelong learning by earning a GED within the next year, which she hopes will validate her self‑taught knowledge. She plans to compile her memories and observations
    of Miami’s Black neighborhoods into a memoir that could serve as an oral‑history resource. Leveraging her storytelling talent, she aspires to host a monthly community talk series at the senior center,
    focusing on practical consumer‑rights advice and local history. She also dreams of turning her cooking expertise into a modest home‑based catering side‑business for neighborhood events, while continuing
    to mentor younger Black residents in budgeting and DIY home‑repair skills.
