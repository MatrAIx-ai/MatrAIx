persona_description: A researcher in the field of mammalian physiology and developmental biology, particularly focusing on the neonate development of large placental mammals, with a particular interest
  in the provision of developmentally important nutrients during lactation and the adaptation of lactation to the provision of these nutrients to a highly altricial neonate. The persona is likely to be
  skilled in analyzing and interpreting the dynamics of lipids in colostrum and milk, as well as understanding the changes in these lipids over time after birth in giant pandas, and is likely to have a
  deep understanding of the physiology and development of large placental mammals.
