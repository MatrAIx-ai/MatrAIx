persona_description: A political figure who was a key figure in the organization and development of the Latter-day Saint movement, and played a significant role in the establishment and early growth of
  the Nauvoo City. He was involved in the economic, political, and religious affairs of the community, and was a prominent figure in the political and religious life of the region. He was also a leader
  in the movement for plural marriage, and was involved in the establishment of the Nauvoo Temple. He was also involved in the development of the city of Nauvoo and the introduction of the sacred ordinances
  in all Mormon temples.
