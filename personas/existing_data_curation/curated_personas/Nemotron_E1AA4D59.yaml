  hobbies: '[''Salsa dancing'', ''Soccer'', ''Car restoration'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Hiking in the Angeles National Forest'', ''Watching classic films'', ''Playing
    guitar'']'
  career_goals: Fernando aims to advance from a skilled worker to a supervisory role, targeting a foreman or lead technician position within the next three years. He is pursuing certification as a Certified
    Welding Inspector (CWI) and plans to enroll in a short management course at a community college. Long‑term, he dreams of launching his own small metal‑art studio that blends traditional Mexican motifs
    with contemporary design, providing employment opportunities for fellow workers in his community.
