personas:
  professional: Fernando Ramtahal is a veteran metal-and-plastic fabricator in Los Angeles, expertly wielding MIG and TIG welders, CNC machines, and blueprint interpretation, who blends their preference
    for structure with a relaxed, cooperative yet assertive style to mentor new hires while pursuing Certified Welding Inspector certification and a future foreman role.
  sports: Fernando Ramtahal stays active by playing forward in a neighborhood soccer league that mirrors the attacking flair of the LA Galaxy, cheering for the Galaxy on weekends, hiking the rugged trails
    of the Angeles National Forest with a local mountaineering club, and they join Saturday morning basketball pick-ups at the community center, all while maintaining a relaxed approach to training schedules.
  arts: Fernando Ramtahal nurtures their creative side through salsa nights at a local community center, dancing to the timeless rhythms of Celia Cruz and Marc Anthony, strumming acoustic renditions of
    classic folk songs on their guitar during gatherings, and indulging in classic Hollywood films such as 'Casablanca' and 'The Godfather' during weekend movie marathons, which together shape their vibrant
    cultural expression.
  travel: Fernando Ramtahal favors spontaneous road trips that blend cultural immersion and nature, often cruising the Pacific Coast Highway to Santa Barbara, exploring historic towns like San Miguel de
    Allende for their vibrant festivals, and they camp under the stars in the Sierra Nevada, though budget constraints sometimes limit overseas adventures.
  culinary: Fernando Ramtahal, an enthusiastic home chef, crafts authentic dishes such as mole, chiles en nogada, carnitas, and fresh salsa using chilies, masa, dried spices, and locally sourced herbs,
    and they delight in hosting weekly gatherings where the aroma of slow-cooked pork and roasted corn fills their backyard, reflecting a deep appreciation for flavor and community.
  core: Fernando Ramtahal, a 47-year-old metal-fabrication expert with a love for salsa dancing, vintage cars, and spontaneous cooking, balances a structured work ethic with a habit of misplacing their
    favorite wrench and an occasional impulse to splurge on classic car parts.
background:
  cultural: Fernando is a Mexican‑American who grew up in a bilingual household in Los Angeles. His family maintains strong ties to Mexican traditions, celebrating holidays such as Día de los Muertos and
    Mexican Independence Day with food, music, and community gatherings. He values the importance of family, hospitality, and respect for elders, while also embracing the multicultural vibrancy of Southern
    California. His Mexican heritage influences his culinary tastes, love for salsa music and dance, and his dedication to supporting local Latino workers and community initiatives.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''CNC machine operation'', ''Blueprint reading'', ''Plastic injection molding'', ''Equipment maintenance'', ''Quality inspection'', ''Safety compliance'', ''Inventory
