personas:
  professional: Marc David is a customer service representative turned aspiring brand storyteller; they excel at active listening, thrive in chaotic environments, and channel their spontaneous curiosity
    into creative visual solutions for tech startups.
  sports: Marc David is a weekend hiker with the Bloomington Trail Runners and a loyal fan of the Indiana Hoosiers basketball team, the Chicago Cubs, and the Indianapolis Colts; they prioritize trail runs
    over gym workouts and treat every long run as a personal competition against their own previous pace.
  arts: Marc David roams Bloomington’s galleries and indie venues, drawing inspiration from visual artists like Banksy and musicians such as Phoebe Bridgers, while they spend evenings sketching street scenes,
    strumming acoustic versions of Radiohead tracks, and performing in improv comedy workshops.
  travel: Marc David prefers spontaneous road trips, often packing a cooler and a camera for day‑long adventures to nearby Chicago, Nashville, and the Ozarks, yet they dream of saving enough to explore
    the neon streets of Tokyo and the fjords of Iceland within the next five years.
  culinary: Marc David enjoys a mix of casual cooking and brewery tours, frequently whipping up quick avocado toast with sriracha, perfecting a spaghetti carbonara, and ordering a pork belly bao at local
    taprooms, while they relish tasting craft lagers infused with citrus and coriander.
  core: Marc David’s restless curiosity fuels a creative hustle that blends sketchbooks, stories, and customer conversations, but their aversion to rigid schedules often leaves deadlines dangling while
    they chase the next artistic spark.
background:
  cultural: Marc grew up in the Midwestern town of Bloomington, Illinois, in a family of German‑Irish descent typical of the region. He was raised with the modest, community‑focused values of the Midwest—emphasizing
    hard work, politeness, and a love for local sports like the Chicago Bulls—while his curiosity led him to seek out broader cultural experiences through music, art, and online communities. The local arts
    infrastructure, including the Bloomington Center for the Arts and nearby university theater, has shaped his appreciation for creativity, and he identifies with a blend of traditional American Midwestern
    culture and a contemporary, globally connected perspective.
