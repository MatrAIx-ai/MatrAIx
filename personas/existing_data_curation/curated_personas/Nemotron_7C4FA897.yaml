    in nature trails'', ''Exploring local breweries'', ''Improv comedy workshops'', ''Story‑driven video gaming'', ''Writing short stories'', ''Collecting vinyl records'']'
  career_goals: Marc aspires to leverage his people‑centric skills and creative interests into a role that blends customer experience with brand storytelling. In the next three to five years, he aims to
    earn certifications in digital marketing and UX design, move into a customer experience manager position at a tech startup, and eventually transition into a marketing or brand strategist role where
    he can shape visual narratives for products. He is motivated by competition and wants to be recognized as a leader who can drive customer satisfaction metrics above industry benchmarks.
