  career_goals: Yamilka’s immediate ambition is to advance to a senior dispatcher or shift-supervisor position within the Fort Worth 911 Center, earning Texas Department of Public Safety dispatcher certification
    and completing EMT training. Over the next five years she aims to lead a team, design streamlined dispatch workflows, and mentor new staff. Ultimately she wishes to transition into emergency management
    or a public-safety analyst role, where she can apply her analytical mindset to improve community response strategies.
