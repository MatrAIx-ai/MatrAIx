personas:
  professional: Janet Hendrix leverages three years of fast‑food floor experience and ServSafe Level 1 knowledge to excel at POS accuracy, end‑of‑shift reconciliation, and inventory troubleshooting, while
    they channel a competitive drive to exceed performance metrics and aim for shift‑supervisor and eventually manager positions that blend structured operations with community‑focused sourcing.
  sports: Janet Hendrix hits the Champaign bike trail each sunrise for brisk jogs, is a member of the local Champaign City Runners club, cheers for the Chicago Bears and Chicago Bulls, and occasionally
    joins weekend pickup soccer games with friends, balancing competitive spirit with a flexible fitness routine that they adjust based on their schedule.
  arts: Janet Hendrix streams alternative‑rock staples like Arctic Monkeys, The Strokes, and Tame Impala while diving into mystery novels by Gillian Flynn and Tana French, enjoys karaoke renditions of Queen's
    'Bohemian Rhapsody', and crafts DIY home‑decor pieces inspired by mid‑century modern aesthetics, weaving music and literature into their creative downtime as they unwind after a shift.
  travel: Janet Hendrix prefers spontaneous, budget‑friendly road trips, often cruising to Chicago for a deep‑dish pizza experience, to St. Louis for a riverfront stroll, or to Nashville for live music,
    while also cherishing local weekend getaways to nearby farms for fresh produce, and they balance adventure with practical constraints.
  culinary: Janet Hendrix experiments with simple yet flavorful dishes such as quinoa‑roasted vegetable bowls, chickpea curry with coconut milk, and sheet‑pan fajitas seasoned with smoked paprika and fresh
    cilantro, showing a beginner‑to‑intermediate cooking skill level and a love for fresh market ingredients like heirloom tomatoes and avocados, while they often improvise with seasonal vegetables from
    the local farmer’s market.
  core: Janet Hendrix is a structure‑loving, competitively driven fast‑food veteran who balances disciplined work habits with laid‑back gaming marathons, spontaneous jogs, and a penchant for DIY creativity,
    all while they juggle a skeptical eye on finances and occasional health neglect.
background:
  cultural: Janet comes from a middle‑class, white, Midwestern background rooted in central Illinois. Her family traces its ancestry to German and Irish immigrants who settled in the region in the early
    20th century. Growing up near Champaign, she experienced a blend of rural work‑ethic traditions and the more diverse, college‑town environment of the University of Illinois. She was raised with typical
    Midwestern customs—community involvement, modesty, and a focus on self‑reliance—while also being exposed to broader cultural events through campus festivals, ethnic food markets, and local music scenes.
attributes:
  skills: '[''POS system operation'', ''Cash handling and reconciliation'', ''Food safety and sanitation adherence (ServSafe Level 1 certified)'', ''Order assembly and speed optimization'', ''Clear customer
    communication'', ''Multitasking under high volume'', ''Equipment troubleshooting (grill, fryer)'', ''Inventory monitoring and restocking'', ''Team coordination and shift handover'', ''Problem detection
    and error correction'']'
  hobbies: '[''Jogging/Running'', ''Competitive online gaming (e.g., League of Legends)'', ''Cooking simple meals at home'', ''Listening to alternative rock music'', ''Reading mystery/thriller novels'',
    ''DIY home décor projects'', ''Attending local farmers market'', ''Occasional karaoke with friends'']'
  career_goals: Janet aims to translate her on‑the‑job experience into leadership roles within the food‑service industry. In the next two years she plans to earn a formal ServSafe certification and a GED,
    positioning herself for a shift‑supervisor position at her current restaurant. Her competitive drive pushes her to exceed performance metrics, and she hopes to leverage that success into a restaurant‑manager
    role at a larger chain. Long‑term, Janet envisions opening a fast‑casual eatery that emphasizes locally sourced ingredients and streamlined operations, merging her love for structure with a flexible,
    community‑focused concept.
