persona_description: A combat surgeon who specializes in the treatment of severely injured soldiers in war-torn areas like Iraq and Afghanistan. He or she is highly skilled in the diagnosis and treatment
  of blood loss and hemorrhage, and is proficient in identifying and mobilizing the necessary resources to transfuse large amounts of blood in a timely manner. The surgeon is also experienced in identifying
  potential donors and testing their blood for viruses like hepatitis C and HIV, a critical step in ensuring the availability of blood products in combat hospitals.
