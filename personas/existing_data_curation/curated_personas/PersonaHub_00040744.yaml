persona_description: A geologist who specializes in the study of the Earth's atmosphere, particularly the effects of methane on the rise of oxygen and the potential for ice ages. They are interested in
  applying stable isotope analysis to Mesoarchaean and Palaeoproterozoic glacial sediments to understand the weathering reactions controlling the ocean-bound flux of nickel, an essential micronutrient for
  the organisms that produced methane in Precambrian oceans. They are curious about the potential consequences of changes in Ni content of the continental crust and the impact of sulfide weathering on the
  flux of Ni to the oceans, as it may have sustained sufficient methane production to prevent a permanent icehouse while allowing O2 to rise.
