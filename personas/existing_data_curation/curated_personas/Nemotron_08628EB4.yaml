  career_goals: Melissa aims to graduate high school with honors, earn a scholarship, and pursue a degree in civil engineering or environmental science. She wants to apply her practical problem‑solving
    skills to design sustainable infrastructure and protect Minnesota’s lakes and waterways. In the long term, she envisions working on community development projects that improve her hometown, while also
    mentoring younger students through STEM outreach programs.
