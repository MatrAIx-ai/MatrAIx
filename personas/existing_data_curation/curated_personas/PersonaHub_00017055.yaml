persona_description: A systems architect and engineer who specializes in the design and implementation of distributed and concurrent systems, particularly in the context of artificial intelligence and machine
  learning. They have experience working on problems involving decision-making, problem-solving, and algorithmic design. They are skilled in developing and implementing reactive rules for decision-making
  in complex systems, and are familiar with the trade-offs between decision quality and computation time in such systems. They have experience working on applications such as offensive attack war games,
  where they are responsible for coordinating the actions of predator agents to capture one prey agent. They are skilled in using performance profiles to quantify the quality of decision-making and in using
  reactive rules to coordinate the actions of agents in complex systems. They are also skilled in using incremental scheduling and partial planning approaches to ensure that schedules are valid and meet
  the requirements of multiple agents.
