personas:
  professional: Felicia Wall is a seasoned nonprofit program manager with two decades of experience in strategic planning, grant writing, and data‑driven evaluations, whose curiosity‑driven yet practical
    mindset and sociable, talkative style make her a magnetic facilitator of town‑hall meetings and a natural bridge between government agencies, donors, and community groups, even as her relaxed attitude
    toward strict deadlines sometimes leads to a charmingly disorganized project calendar.
  sports: Felicia Wall is an avid cyclist who joins the Hudson River Greenway Riding Club for weekend rides, a regular participant in the NYC River Runners running group, and a passionate supporter of the
    New York Knicks and New York City FC, balancing their love for community fitness with occasional yoga classes to stay grounded.
  arts: Felicia Wall is a devoted patron of New York’s cultural scene, frequently attending Broadway productions like "Hamilton", improv nights at the Upright Citizens Brigade, and annual cultural festivals,
    while their street photography captures the city’s evolving neighborhoods, and they often discuss the work of Lin‑Manuel Miranda, Audra McDonald, and Spike Lee with their book club.
  travel: Felicia Wall explores both nearby and far‑flung destinations, enjoying spontaneous weekend trips to the Hudson Valley’s wineries and planned visits to New Orleans for jazz and culinary immersion,
    while they also dream of a literary pilgrimage to Dublin and a tech‑focused tour of San Francisco, always balancing budget‑friendly train travel with occasional reward‑point flights.
  culinary: Felicia Wall is an enthusiastic home cook who experiments with recipes learned in weekend classes, often preparing ramen with miso broth, Ethiopian injera with berbere‑spiced lentils, and homemade
    kimchi, while they love to host friends for eclectic dinner parties featuring tacos al pastor and harissa‑roasted vegetables, though they sometimes get distracted by photography and over‑salt a dish.
  core: Felicia Wall is a sociable, curiosity‑driven nonprofit strategist who blends flexible, people‑centric leadership with a love for urban culture, mindful living, and a delightfully organized chaos.
background:
  cultural: Felicia was raised in a middle‑class suburban community on Long Island, New York, within a family of mixed Northern European ancestry (primarily English, Irish, and German roots). Growing up
    near New York City, she was immersed in the region’s cultural diversity, which fostered an inclusive worldview and a strong sense of civic responsibility. Her parents emphasized the importance of education,
    community service, and open‑minded curiosity, values that have guided her both personally and professionally. While she identifies as a white American, she actively celebrates the multicultural fabric
    of the city through her work, social circles, and personal interests.
attributes:
  skills: '["Strategic planning and budgeting", "Grant writing and fundraising", "Program design and evaluation", "Stakeholder engagement and partnership building", "Public speaking and facilitation", "Conflict
    resolution and mediation", "Team leadership and staff development", "Community outreach and event coordination", "Data analysis for outcomes measurement", "Crisis management and response coordination"]'
  hobbies: '["Attending live theater and improv performances", "Leading a neighborhood book club", "Exploring diverse culinary scenes and cooking classes", "Street photography of urban neighborhoods", "Weekend
    biking along the Hudson River", "Yoga and mindfulness practice", "Mentoring high‑school students", "Participating in trivia nights"]'
  career_goals: Felicia aims to ascend to a senior executive role, such as Director of Community Services for the City of New York, where she can shape citywide policies on homelessness, affordable housing,
    and mental‑health access. She envisions launching a nonprofit that leverages public‑private partnerships to deliver sustainable housing solutions and community empowerment programs. Over the next five
    years, she plans to publish research on program impact, speak at national social‑service conferences, and mentor emerging leaders in the sector, positioning herself as a thought leader in community
    innovation and equitable service delivery.
