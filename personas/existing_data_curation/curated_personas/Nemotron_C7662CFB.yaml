personas:
  professional: Israel Estrada, a seasoned welder and metal fabricator with three decades mastering MIG, TIG, arc, and oxy‑fuel processes, blends his practical curiosity and relaxed scheduling into a hands‑on
    mentorship style that lets apprentices learn by fixing real‑world problems while he experiments with laser and friction‑stir techniques in his modest community workshop.
  sports: Israel Estrada enjoys early‑morning coastal fishing to stay fit, joins a seasonal softball league that plays in the summer, follows the local baseball team Indios de Mayagüez with zeal, and attends
    the island’s annual marathon, though he prefers dancing salsa at festivals for cardio.
  arts: Israel Estrada’s social world spins to the rhythms of salsa, plena, and bomba, so he regularly dances to tracks by Héctor Lavoe, Willie Colón, and modern reggaetón hits from Bad Bunny, while also
    attending concerts by the local Philharmonic orchestra that blends traditional island melodies.
  travel: Israel Estrada favors short, spontaneous trips—spending a weekend cruising the beaches of Culebra, a nostalgic return to the historic streets of Old San Juan, and dreaming of a longer vacation
    to Cartagena’s colonial harbor and Oaxaca’s colorful markets, all planned over a game of dominoes with friends.
  culinary: Israel Estrada loves throwing backyard barbecues where he grills marinated whole fish, prepares mofongo with chicharrón, arroz con gandules seasoned with sofrito, and his favorite dessert is
    tembleque flavored with coconut milk, though his cooking skill is strong in grilling and rustic dishes but limited in pastry work.
  core: Israel Estrada is a community‑focused, hands‑on welder who balances curiosity with a laid‑back lifestyle, trading bolts for barbecues, dance steps, and occasional financial improvisations while
    mentoring the next generation.
background:
  cultural: Israel grew up in Manatí, a coastal town in northern Puerto Rico known for its farming, fishing, and vibrant festivals. Raised in a working‑class Puerto Rican family, he internalized values
    of hard work, community solidarity, and respect for tradition. Spanish is his first language, but he is comfortable using English in technical contexts. His Catholic upbringing shaped his participation
    in local religious celebrations and the annual Fiestas Patronales de Manatí. The island’s rich musical heritage—salsa, plena, bomba—has fueled his love for dancing and social gatherings. He takes pride
    in his Puerto Rican identity, evident in his culinary tastes, his dedication to helping neighbors, and his desire to pass on his trade to the next generation of island workers.
