  career_goals: Approaching retirement, Israel aims to shift from full‑time shop work to a mentorship and consulting role. He plans to earn a Master Welder certification and open a modest community workshop
    in Manatí where he can teach younger workers, hobbyists, and local tradespeople. He wants to stay current with modern welding techniques—especially laser and additive manufacturing—to support neighborhood
    infrastructure projects, such as renovating community centers and assisting the local fishing industry with equipment repairs. Israel also hopes to author a practical guide on welding best practices
    for Puerto Rican tradespeople and volunteer as a trainer at the municipal vocational school.
