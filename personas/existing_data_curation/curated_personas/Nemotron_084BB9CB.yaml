personas:
  professional: Elizabeth Earp, a veteran bookkeeper with decades of QuickBooks and Excel expertise, channels their love of structure into meticulous ledger management while offering compassionate mentorship
    and flexible, pro‑bono tax support for local nonprofits.
  sports: Elizabeth Earp enjoys low‑impact fitness through daily bird‑watching walks with the Golden Years Walking Group, occasionally plays gentle tennis at the community center, and follows the Milwaukee
    Brewers and St. Louis Cardinals baseball seasons on television, while they cheer quietly from her porch.
  arts: Elizabeth Earp relaxes with historical novels by Philippa Gregory and memoirs such as The Diary of Anne Frank, knits scarves inspired by traditional Scandinavian patterns, and finds solace in listening
    to Bach’s Brandenburg Concertos and attending local exhibitions of Mary Cassatt’s prints, while they let these creative pursuits shape their tranquil evenings.
  travel: Elizabeth Earp prefers carefully planned yet flexible road trips, having explored Colonial Williamsburg and the English Cotswolds, and dreams of a leisurely river cruise through the Netherlands’
    tulip fields, while they balance comfort, modest budget, and the desire to visit historic sites that echo their love of genealogy.
  culinary: Elizabeth Earp, an adept home cook, transforms garden vegetables and fresh herbs like rosemary and thyme into hearty chicken pot pie, beef stew, and seasonal apple crumble, while they also bake
    rustic sourdough bread for church potlucks, savoring the comforting aromas of home‑cooked meals.
  core: Elizabeth Earp is a calm, structured bookkeeper who finds joy in solitary gardening, knitting, and quiet mentorship, while they occasionally misplace receipts and forget appointments, balancing
    disciplined precision with gentle flexibility.
background:
  cultural: Elizabeth was raised in a modest, working‑class family in the Gulf Coast region of East Texas. The community emphasized hard work, modesty, Southern hospitality, and active participation in
    a Protestant church. Local traditions such as potluck gatherings, church picnics, and neighborhood support networks shaped her sense of responsibility and compassion. While primarily identifying with
    mainstream white Texan culture, she respects the diverse influences of the surrounding region, including the close‑knit, intergenerational ties that define life in Port Neches and Jefferson County.
