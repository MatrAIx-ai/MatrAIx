personas:
  professional: Belinda Weaver, a high-school junior who channels her knack for organization, basic web design, and compassionate peer mediation into leading the school's environmental club, where she leverages
    Google Workspace and Canva to produce research-driven presentations, while dreaming of a future in environmental health or community nursing.
  sports: Belinda Weaver spends weekends trail-running on Boulder's foothills, joins the local youth soccer league in the fall, and cheers for the Colorado Rockies and Denver Broncos, treating each workout
    as a data-driven experiment to improve endurance while staying loyal to the University of Colorado's outdoor club for group climbs.
  arts: Belinda Weaver captures sunrise vistas with a DSLR, strings together acoustic renditions of John Mayer and Fleet Foxes on her guitar, and draws inspiration from Ansel Adams' black-and-white landscapes,
    curating a small online gallery on Canva that blends photography with handwritten journal excerpts.
  travel: Belinda Weaver prefers road-trip adventures that blend hiking and cultural stops, having explored Rocky Mountain National Park, the Grand Canyon, and a spring weekend in Portland's food cart scene,
    while dreaming of backpacking through Patagonia's Torres del Paine once she saves enough for the airfare.
  culinary: Belinda Weaver's kitchen revolves around fresh farmer-market finds, whipping up quinoa-bowl salads with roasted sweet potatoes, black beans, avocado, and a squeeze of lime, perfecting a signature
    almond-blueberry granola that she sells at the community garden's seasonal bake-sale, and never misses her post-hike smoothie of spinach, banana, and chia seeds.
  core: Belinda Weaver is an ultra-organized teen who balances a deep love for nature, a compulsive habit of over-scheduling, and a compassionate drive to help others, all while sometimes forgetting to
    sleep enough after late-night coding sprints.
background:
  cultural: Belinda comes from a white American family that originally settled in the Midwest before relocating to Boulder for its outdoor lifestyle and progressive community values. Her parents, both educators,
    emphasized academic diligence, environmental stewardship, and community service. Growing up in Boulder, she has been exposed to a diverse mix of cultures, the local indigenous heritage of the Arapaho
    and Cheyenne peoples, and a strong emphasis on sustainable living, all of which shape her worldview and personal identity.
attributes:
  skills: '["Organizational planning", "Time management", "Research and information synthesis", "Basic coding (Scratch, HTML)", "Graphic design (Canva)", "Event coordination", "Peer mediation", "First-Aid/CPR
    certification", "Community outreach", "Digital communication"]'
  hobbies: '["Hiking and trail exploring", "Nature photography", "Acoustic guitar", "Reading science and environmental literature", "Journaling", "Volunteer work at a local animal shelter", "Community gardening",
    "Basic coding projects (Scratch, HTML)", "Sketching"]'
  career_goals: Belinda aims to complete her high school education with a strong academic record and earn a scholarship to the University of Colorado Boulder, where she plans to study environmental health
    or nursing. She wants a career that combines her practical problem-solving skills with her drive to help others, such as becoming a public health professional focused on community wellness, a registered
    nurse in a community clinic, or an environmental educator. In the long term she hopes to lead community-based health initiatives that promote sustainable living and equitable access to care.
