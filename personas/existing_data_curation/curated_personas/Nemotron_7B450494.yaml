  career_goals: Kyungae dreams of a future where her curiosity and practicality merge, aiming to become a software engineer who designs educational tools that make learning accessible for all children.
    She is also drawn to the idea of applying technology to health, so she keeps the option open to study biomedical engineering or health informatics. In the short term, she plans to excel in high school
    STEM courses, participate in coding clubs, and seek mentorship that will guide her toward a university program in computer science or engineering.
