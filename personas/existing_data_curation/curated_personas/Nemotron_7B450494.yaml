personas:
  professional: Kyungae Wong, a budding teenage game developer who merges sci‑fi storytelling with disciplined coding in Unity, spends weekend afternoons turning graphic novel ideas into playable prototypes,
    and they balance imaginative curiosity with methodical project planning.
  sports: Kyungae Wong, a midfield enthusiast for the Cuyahoga Valley Youth Soccer League, devotes after‑school practice to team drills while also jogging the trails of Cuyahoga Valley National Park, and
    they cheerfully support the Cleveland Browns and follow the Cleveland Cavaliers during the off‑season.
  arts: Kyungae Wong, an avid manga‑style illustrator inspired by Rumiko Takahashi and Hayao Miyazaki, crafts digital panels using Clip Studio Paint, composes emotive piano pieces ranging from Beethoven’s
    Moonlight Sonata to Yiruma’s River Flows in You, and they immerse themselves in the video‑game scores of Yoko Shimomura while drafting storyboards for future indie games.
  travel: Kyungae Wong, who plans family trips with a detailed spreadsheet, enjoys seasonal weekend outings to Cuyahoga Valley State Park and annual visits to Niagara Falls, dreams of exploring Tokyo’s
    Akihabara district to see original manga artwork, and they balance their love for adventure with a modest budget that keeps long‑haul travel on the horizon.
  culinary: Kyungae Wong, an intermediate home chef, frequently prepares bibimbap using gochujang, sesame oil, and assorted vegetables, perfects kimchi pancakes on rainy afternoons, experiments with ramen
    broth enriched by miso and chili flakes, and they sometimes forget to clean the kitchen after marathon cooking sessions.
  core: Kyungae Wong blends sci‑fi imagination with disciplined creativity, channeling coding, piano, soccer, and family cooking into a balanced teenage life that is both practical and curiosity‑driven,
    albeit with occasional procrastination and a propensity for snack‑laden gaming marathons, and they often juggle responsibilities with a playful, slightly scattered approach.
background:
  cultural: Kyungae comes from an East Asian family with Korean heritage, where both Korean and English are spoken at home. Her family celebrates Lunar New Year, Chuseok, and other Korean holidays, preserving
    traditions such as preparing kimchi and sharing stories of ancestors. Growing up in Cleveland, she participates in the local Korean cultural center’s language classes and community festivals, blending
    the values of respect for elders, emphasis on education, and community harmony with the diverse multicultural environment of her city.
