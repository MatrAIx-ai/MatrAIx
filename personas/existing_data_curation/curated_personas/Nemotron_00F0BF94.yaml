personas:
  professional: Joel Ortiz, a senior information security analyst, blends three decades of expertise in network architecture, SIEM platforms like Splunk and QRadar, and incident response with a solitary,
    design‑thinking mindset, allowing them to craft unconventional security solutions while compassionately mentoring seniors in community cyber‑safety workshops.
  sports: Joel Ortiz greets each sunrise with a solitary jog along Miami Beach, plays weekly tennis at the Coral Gables Country Club, follows the Miami Heat and Miami Marlins avidly, and occasionally joins
    community beach‑volleyball pick‑ups, balancing a low‑key fitness regimen with a love for coastal sports.
  arts: Joel Ortiz channels their curiosity for art into oil paintings of folklore‑inspired coastal light reminiscent of J. M. W. Turner, improvises solo piano jazz in the style of Bill Evans, captures
    candid moments with a Leica like Henri Cartier‑Bresson, curates a modest collection of handcrafted glazed pottery, and frequents Miami Art Basel for fresh creative fuel.
  travel: Joel Ortiz favors meticulously planned, low‑key getaways that blend cultural immersion with seaside relaxation, having explored Key West, New Orleans, Barcelona, and Kyoto, while dreaming of future
    trips to Iceland’s geothermal lagoons and the rainforests of Belize.
  culinary: Joel Ortiz enjoys cooking moderate‑skill dishes such as grilled shrimp with mango salsa, saffron‑infused paella, and smoky chipotle black‑bean stew, while savoring fresh limes, cilantro, and
    occasional visits to seaside taco stalls for ceviche, reflecting a palate that balances bold flavors with coastal freshness.
  core: Joel Ortiz navigates life with a quiet, art‑driven soul who merges relentless cyber‑security rigor with spontaneous jazz improvisations, yet often battles stress‑induced worry and a tendency to
    delay paperwork.
background:
  cultural: Born to Mexican parents, Joel grew up bilingual, celebrating traditions such as Día de los Muertos, Las Posadas, and the vibrant music of mariachi and son jarocho. His heritage instilled a strong
    sense of family loyalty and community responsibility, which he carries into his life in Miami's multicultural tapestry. He regularly participates in local Latin American cultural events, supports Mexican
    community centers, and integrates Mexican culinary arts into his home life. This bicultural experience enriches his worldview, fostering empathy, adaptability, and a deep appreciation for diverse artistic
    expressions, all of which inform his personal and professional interactions.
attributes:
  skills: '[''Network Security Architecture'', ''Threat Intelligence'', ''Penetration Testing'', ''Vulnerability Assessment'', ''Incident Response'', ''SIEM (Splunk, QRadar)'', ''Firewall Configuration
    (Palo Alto, Cisco ASA)'', ''Encryption (AES‑256, PKI)'', ''Risk Modeling'', ''Compliance Frameworks (NIST, ISO 27001, PCI‑DSS)'', ''Security Awareness Training'', ''Design‑Thinking in Security Solutions'']'
  hobbies: '[''Oil Painting'', ''Street Photography'', ''Solo Piano'', ''Jazz Improvisation'', ''Reading Science Fiction'', ''Collecting Mexican Folk Art'', ''Meditation and Mindfulness'', ''Volunteer Cyber‑Safety
    Workshops'', ''Walking on Miami Beach at sunrise'', ''Gardening'']'
  career_goals: Joel aims to transition from a hands‑on analyst role into a strategic leadership position where he can shape organizational security culture. He envisions becoming a Chief Information Security
    Officer for a midsize firm that values innovation and community impact. Simultaneously, he plans to launch a boutique consultancy focused on providing affordable cyber‑safety education to local immigrant
    and senior populations in Miami, leveraging his compassionate drive. Long‑term, Joel hopes to influence regional cybersecurity policy by participating in advisory boards and publishing thought pieces
    that merge technical rigor with creative problem‑solving.
