persona_description: A researcher and geoscientist who specializes in the development and application of photogrammetry and computer vision techniques for the accurate and rapid acquisition of digital elevation
  models (DEMs) of growing lava domes. They are skilled in the use of photo-based approaches for DEM construction, including the development of automated reconstruction pipelines and the use of control
  points for georeferencing. They have experience collecting high-quality imagery for 3D reconstruction of lava domes, and are proficient in scaling and georeferencing the resulting point clouds. Their
  expertise is valued in the hazard assessment and monitoring of lava domes, as well as in the development of new methods for the acquisition of DEMs in remote and challenging environments.
