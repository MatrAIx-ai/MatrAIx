  career_goals: Thomas aims to graduate high school with honors and earn a scholarship to study engineering, preferably mechanical or robotics engineering, at a top STEM university. He is motivated to design
    sustainable vehicles or autonomous drones that could benefit his community in Forsyth County. Long‑term, he envisions founding a tech startup that merges his love for robotics and software development,
    while also mentoring younger students in STEM through local after‑school programs.
