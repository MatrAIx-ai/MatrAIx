personas:
  professional: Thomas Cheffin is a budding robotics enthusiast who designs and programs LEGO Mindstorms creations, hones algorithmic thinking through Scratch and Python projects, and applies their methodical,
    competitive nature to win local coding challenges.
  sports: Thomas Cheffin plays on the Riverside Raptors youth basketball team, practices three times a week at the neighborhood park where they also join informal pickup games, cheers for the Chicago Bulls
    during the NBA season, and balances competitive drive with a habit of tracking personal stats on a mobile fitness app.
  arts: Thomas Cheffin’s soundtrack is a blend of Kendrick Lamar’s hip‑hop beats, H.E.R.’s soulful R&B, and Kirk Franklin’s uplifting gospel, and they channel this rhythm into creating pixel art for their
    Scratch games while occasionally sketching comic panels inspired by classic sci‑fi novels.
  travel: Thomas Cheffin loves weekend trips to the local science museum, cherishes a family road‑trip memory of the Johnson Space Center in Houston, and dreams of touring the Kennedy Space Center in Florida
    and the International Space Station virtual tours, preferring hands‑on, budget‑friendly experiences over luxury resorts.
  culinary: Thomas Cheffin prefers quick, flavorful meals like spicy chicken quesadillas with cheddar, homemade mac and cheese with a breadcrumb topping, and grabs a slice of pepperoni pizza after a basketball
    game, often experimenting with extra hot sauce to test their tolerance.
  core: Thomas Cheffin is a methodical teen tinkerer with a competitive edge, balancing relentless curiosity in robotics with a thrifty allowance budget and a soundtrack that fuels late‑night coding sessions.
background:
  cultural: Thomas is a Black adolescent raised in Cumming, GA, within a family that values education, community, and cultural heritage. His parents emphasize hard work and have instilled pride in African‑American
    history and Southern traditions. He regularly attends a local African‑American church, where he participates in youth group activities that blend gospel music, community service, and mentorship. Family
    gatherings feature Southern comfort foods like barbecue and collard greens, and storytelling that celebrates both his family's civil‑rights legacy and contemporary Black culture. These experiences shape
    his worldview, fostering a balance of curiosity, practicality, and a competitive spirit that drives his academic and personal pursuits.
