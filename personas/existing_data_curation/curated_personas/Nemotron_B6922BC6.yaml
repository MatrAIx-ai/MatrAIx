  career_goals: Even in retirement, Orville is driven by a desire to leave a lasting, positive impact on his community and the business he built. His primary goals are to mentor emerging entrepreneurs in
    Stoughton, establish a scholarship fund for local high‑school students pursuing business studies, document his business’s history for future generations, and serve on the boards of charitable organizations
    that support economic development and senior services. He also hopes to author a memoir that captures lessons from his eight‑decade career, ensuring his practical knowledge benefits others.
