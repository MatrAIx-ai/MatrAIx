personas:
  professional: Orville Benner, a retired chief executive renowned for strategic planning, financial stewardship, and operational efficiency, now applies their methodical curiosity and calm, organized demeanor
    to mentor emerging Stoughton entrepreneurs, oversee a scholarship fund for business students, serve on nonprofit boards, and chronicle the company's history for future generations.
  sports: Orville Benner enjoys low-impact activities such as walking the Lake Kegonsa trail, fishing for largemouth bass on local lakes, and participating in the Stoughton Senior Walking Club, while avidly
    supporting regional teams like the Milwaukee Brewers, Milwaukee Bucks, and Green Bay Packers, reflecting their balanced mix of leisurely fitness and community sports loyalty.
  arts: Orville Benner attends performances by the Madison Repertory Theatre, enjoys the Milwaukee Symphony Orchestra’s classic repertoire, cherishes the regionalist paintings of Grant Wood and the folk
    melodies of Woody Guthrie, and curates historical exhibits at the Stoughton Historical Society, reflecting their deep appreciation for Midwestern artistic heritage that dovetails with their love of
    history.
  travel: Orville Benner favors thoughtfully planned road trips that explore Midwestern industrial heritage sites such as the Henry Ford Museum, historic downtown Milwaukee, and the quarry towns of Rockford,
    while also cherishing annual family visits to the lake cabins at North Lake, and their itineraries always blend curiosity for heritage tourism with a preference for familiar, comfortable destinations.
  culinary: Orville Benner delights in preparing classic Wisconsin comfort foods such as bratwurst with sauerkraut, fried cheese curds, and apple dumplings crafted from heirloom apples harvested from their
    orchard, using fresh butter, sharp cheddar, and locally sourced pork, and they often conclude meals with a warm bowl of fish fry battered in cornmeal after a successful day on the water.
  core: Orville Benner blends disciplined leadership, pragmatic curiosity, and a routine-driven life of gardening, woodworking, bridge, and community mentorship, while a faint tendency to postpone minor
    health check-ups in favor of a well-kept bridge schedule adds a quirky, human touch to their otherwise methodical existence.
background:
  cultural: 'Orville grew up in a white, multi‑generational Midwestern family in Dane County, Wisconsin, with deep German and Scandinavian roots that are common in the area. His upbringing emphasized hard
    work, modesty, and community service, shaped by Lutheran church traditions and the agricultural landscape of southern Wisconsin. He lived through the Great Depression, World War II, and the post‑war
    industrial boom, experiences that reinforced a pragmatic outlook and a strong sense of civic responsibility. His cultural identity is tied to the values of the Wisconsin heartland: self‑reliance, neighborly
    cooperation, and a respect for both tradition and incremental innovation.'
