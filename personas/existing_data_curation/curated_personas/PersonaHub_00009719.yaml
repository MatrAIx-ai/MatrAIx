persona_description: A historian who specializes in the history of the Catholic Church and the conflicts between the Church and the secular rulers, particularly the conflict between Pope Gregory XIII and
  Cardinal Wolsey. The persona is interested in the details of the bull granting the additional faculties of visitation and the subsequent suppression of monasteries, as well as the motivations and actions
  of the individuals involved in the controversy. The persona is also interested in the broader context of the conflict, including the economic and social factors that contributed to the decline of the
  monasteries and the need for increased facilities of study in England.
