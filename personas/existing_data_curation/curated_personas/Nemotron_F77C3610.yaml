  hobbies: '[''Beach Walks'', ''Mexican Cooking'', ''Gardening'', ''Attending Cultural Festivals'', ''Community Mural Participation'', ''Yoga and Meditation'', ''Reading Social-Justice Literature'']'
  career_goals: Somattie aims to advance to a senior leadership role, such as Director of Community Services for a regional nonprofit or municipal agency, where she can shape policy and secure long-term
    funding for under-served populations. She plans to complete a bachelor's degree in Social Work or Public Administration to complement her extensive field experience. Her ambition includes launching
    a community-based nonprofit that provides integrated support—legal aid, language classes, and mental-health services—to recent Mexican immigrants and their families. She also seeks to mentor emerging
    social-service professionals, especially women of color, and to present her program-evaluation models at state and national conferences.
