persona_description: A historian of science who specializes in the decipherment of ancient Greek computer artifacts and their significance in the understanding of ancient Greek science and technology. His
  research interests include the intricacies of the Antikythera Mechanism, the differential gear of the Antikythera Mechanism, and the role of Greek mechanical devices in advancing Western technological
  culture. He has spent 16 years studying the Greek device and has reported that it is one of the most important pieces of evidence for the understanding of ancient Greek science and technology. He has
  also written a masterful account of how he decoded the Greek computer, "Gears from the Greeks," and described the differential gear of the Antikythera Mechanism as the landmark of the computer's high-tech
  nature.
