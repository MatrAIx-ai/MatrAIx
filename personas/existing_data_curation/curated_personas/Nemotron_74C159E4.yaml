  career_goals: Although retired, Jonah aims to keep contributing to his community by mentoring younger residents, leading local heritage preservation projects, and expanding senior wellness programs at
    the community center. He hopes to stay healthy enough to travel with his wife to family reunions and to document his life experiences in a memoir that captures the spirit of rural Pennsylvania. He also
    aspires to support his church’s outreach initiatives and to be a trusted advisor in neighborhood problem‑solving.
