personas:
  professional: Avis Davis, a veteran crossing guard turned aspiring senior safety coordinator, leverages three decades of calm, clear communication and first‑aid expertise to de‑escalate traffic incidents,
    while their love of routine is tempered by occasional lapses in paperwork organization and a heightened sensitivity to stressful situations.
  sports: Avis Davis enjoys gentle morning walks with their Labrador as a member of the San Diego Senior Strollers club, rallies behind the Padres at Petco Park during baseball season, and follows the San
    Diego Wave FC for a dash of competitive spirit, while their low‑impact fitness routine reflects their preference for predictable, low‑stress activity.
  arts: Avis Davis nurtures their creative side through a church choir that sings gospel classics by Mahalia Jackson and R&B favorites from Marvin Gaye, they quilt intricate patterns inspired by traditional
    motifs, and they lose themselves in historical novels by authors such as Colson Whitehead and Yaa Gyasi, all of which enrich their cultural appreciation.
  travel: Avis Davis prefers low‑key, well‑planned trips that blend nature and heritage, having explored the desert trails of Joshua Tree and the historic streets of Old Town San Diego, while they dream
    of a leisurely road‑trip through Portugal’s Algarve coast and a serene visit to Kyoto’s bamboo groves.
  culinary: Avis Davis cherishes cooking soulful family meals, expertly preparing collard greens seasoned with smoked ham hocks, buttery cornbread, and sweet‑potato pie, and although their culinary confidence
    shines in the kitchen, they occasionally over‑spice when experimenting with new heirloom tomatoes from their garden.
  core: Avis Davis blends a steadfast love of routine with a tender, anxiety‑prone heart, finding calm in rows of succulents, choir harmonies, and community safety, even as occasional disorganization and
    emotional spikes keep their life vibrantly unpredictable.
background:
  cultural: Avis was raised in a multi‑generational African American family that migrated from the Deep South to California during the 1970s. Her upbringing emphasized church involvement, community service,
    and the preservation of Black cultural traditions such as storytelling, soulful cuisine, and music. Living in La Mesa, she maintains strong ties to the local Black community, participating in cultural
    festivals and mentorship programs that celebrate heritage while navigating the broader multicultural landscape of San Diego County. Her experiences have forged a deep sense of resilience, pride, and
    a commitment to fostering harmony and safety for all members of her community.
attributes:
  skills: '["Traffic Safety Management", "Pedestrian Communication", "First Aid and CPR", "Conflict De‑escalation", "Child Supervision", "Public Speaking", "Training and Mentoring", "Incident Record Keeping",
