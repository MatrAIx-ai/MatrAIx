  hobbies: '["Succulent gardening", "Church choir participation", "Cooking traditional soul food", "Reading African American history fiction", "Quilting", "Listening to R&B and gospel music", "Volunteering
    at community center", "Dog walking", "Bridge (card game)", "Classic movie nights"]'
  career_goals: Avis hopes to transition from daily flag‑ging duties to a senior safety coordinator role where she can design and lead traffic‑safety education programs for schools across San Diego County.
    She plans to obtain a Certified Traffic Safety Trainer credential and to author a culturally responsive road‑safety curriculum that incorporates stories and perspectives from the African American community.
    Ultimately, she envisions a part‑time advisory position that allows her to share her expertise while reducing the high‑stress triggers that affect her emotional well‑being.
