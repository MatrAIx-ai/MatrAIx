personas:
  professional: A budding baby model named Amal Clark, they charm camera crews with a natural curiosity for props and a relaxed demeanor that makes scheduling shoots easy, turning playtime into a surprisingly
    effective marketing asset.
  sports: An energetic crawler named Amal Clark, they attend a weekly toddler gymnastics class at the community center, cheer on the local River City Royals baseball team during family TV nights, and love
    splashing in the backyard pool during summer.
  arts: A budding art enthusiast named Amal Clark, they delight in the vivid illustrations of Eric Carle’s 'The Very Hungry Caterpillar', sway to the soothing lullaby 'Twinkle Twinkle Little Star' performed
    by the Vienna Boys' Choir, and often babble along to the gentle piano pieces of Ludovico Einaudi.
  travel: A curious explorer named Amal Clark, they love short stroller rides to the nearby park, were thrilled by the sensory wonder of a family trip to the San Diego Zoo, and dream of someday feeling
    the sand at the Maldives while Mom packs a familiar soft blanket.
  culinary: A tiny foodie named Amal Clark, they favor smooth sweet potato puree with a hint of cinnamon, love the occasional bite of ripe avocado, and can discern the difference between whole‑milk formula
    and a bland rice cereal.
  core: A one‑year‑old curiosity‑driven explorer named Amal Clark, they blend a relaxed flexibility with a competitive edge, turning everyday play into a mini adventure, while occasionally being skeptical
    of strangers and delighting in bright colors and textures.
background:
  cultural: Amal is raised in a white Appalachian family in Staffordsville, Kentucky. The local culture emphasizes close‑knit community ties, church gatherings, and a love for traditional Appalachian music
    and folk art. Family traditions include weekend picnics near the Ohio River, participation in local quilting circles, and holiday celebrations featuring bluegrass and gospel music. These cultural influences
    foster her appreciation for art, music, and the outdoors, and shape her relaxed, flexible approach to daily life.
