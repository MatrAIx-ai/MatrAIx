  career_goals: While still a toddler, Amal’s immediate goal is to keep learning and exploring the world around her. Her parents nurture her inquisitive nature, encouraging her to ask questions, experiment
    with art, music, and nature. In the long term, she is imagined to channel her curiosity and creative appreciation into a career that blends artistic expression with exploration of ideas—potentially
    as a visual artist, designer, or a storyteller with a scientific bent. Her flexibility and competitive streak suggest she will aim to excel in any field she chooses, always seeking new experiences.
