  hobbies: '[''abstract painting'', ''watercolor sketching'', ''visiting art galleries'', ''reading art history'', ''reading mythology'', ''gardening'', ''wildflower cultivation'', ''listening to folk music'',
    ''listening to bluegrass'', ''cooking Southern cuisine'', ''baking pies'', ''genealogy research'', ''participating in community craft fairs'', ''attending church socials'', ''bridge club'']'
  career_goals: As she approaches retirement, Jessica aims to transition from full-time contracting to part-time work focused on her own artistic projects. She plans to develop a signature style of abstract
    murals for local businesses and community spaces, mentor a young apprentice from her community, and compile a portfolio of her artwork to showcase at regional art fairs. Long-term, she hopes to publish
    a small book of her paintings and the stories behind them, and to help establish a community art workshop in Jasper where seniors can explore creative pursuits.
