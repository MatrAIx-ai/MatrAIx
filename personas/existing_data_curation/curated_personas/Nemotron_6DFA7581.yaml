personas:
  professional: Jessica Claxton, a seasoned painter‑paperhanger turned part‑time mural artist, leverages her mastery of surface preparation, color theory, and faux‑finishing to translate abstract ideas
    into vibrant community murals while embracing a flexible, often spontaneous workflow that reflects her imaginative yet occasionally disorganized temperament.
  sports: Jessica Claxton, a devoted fan of the Alabama Crimson Tide football and Birmingham Barons baseball teams, spends her mornings strolling the Cahaba River trail with the local senior walking club
    and plays weekly pickleball matches at the Jasper Community Center, viewing light exercise as a gentle counterbalance to her artistic schedule.
  arts: Jessica Claxton, whose evenings are filled with listening to Bill Monroe’s bluegrass while studying Georgia O'Keeffe’s abstract desert canvases, frequently roams the Birmingham Museum of Art and
    the Mobile Museum of Art for inspiration, and channels mythic narratives into mixed‑media paintings that blend folk motifs with contemporary abstraction.
  travel: Jessica Claxton, who plans travel with a loose, curiosity‑driven itinerary, enjoys relaxed road trips along the Blue Ridge Parkway, weekend getaways to Savannah’s historic squares, and annual
    pilgrimages to the Galax Old Fiddlers’ Convention, while dreaming of a future European art tour of the Italian Renaissance towns.
  culinary: Jessica Claxton, a competent home cook who delightfully whips up Southern comfort fare such as shrimp and grits, collard greens with smoked turkey, and buttermilk biscuits, often seasoning with
    fresh garden herbs like thyme and rosemary while occasionally experimenting with a wildflower‑infused honey glaze for roasted chicken.
  core: Jessica Claxton, a 67‑year‑old painter‑paperhanger turned community muralist, blends an imaginative, flexible spirit with a love for native gardens, folk music, and Southern cuisine, while juggling
    retirement, health quirks, and a creative drive to mentor and share art with her town.
background:
  cultural: Jessica grew up in the rural community of Jasper, Alabama, in a working-class family where hands-on trades were valued over formal schooling. Raised in a Southern Baptist environment, she was
    immersed in the region's traditions of hospitality, church fellowship, and community support. The cultural tapestry of Walker County—marked by Appalachian folk art, quilting, and storytelling—shaped
    her appreciation for creativity and imaginative expression. While she never earned a formal high-school diploma, she learned the painting and paper-hanging trades through apprenticeships and on-the-job
    experience. Her Southern upbringing instilled a respect for modesty, self-reliance, and a love for the outdoors, which continues to influence both her work ethic and her artistic sensibilities.
