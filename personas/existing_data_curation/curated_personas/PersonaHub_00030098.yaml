persona_description: A researcher and scientist who specializes in the study of cell fate determination in the retina and the development of neural stem cells. Their research interests include the identification
  and characterization of intrinsic developmental programs that control cell-fate decisions in the retina, the understanding of the molecular mechanisms that underlie cell diversity, and the potential use
  of neural stem cells as a source of new cells to replace those lost after neural injury or neurodegenerative diseases. Their work involves the use of clonal-density culture systems, retinal explant assays,
  and live imaging microscopy to reconstruct the lineage of retinal progenitor cells and study the function of genes that control cell fate decisions and asymmetric cell divisions.
