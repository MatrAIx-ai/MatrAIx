  career_goals: As a seasoned mechanic nearing retirement, Carmen aims to transition into a senior supervisory role where she can lead a small maintenance crew, formalize a mentorship program for apprentices,
    and champion reliability‑centered maintenance initiatives at her current plant. She aspires to acquire certifications such as the Certified Maintenance & Reliability Professional (CMRP) and deepen her
    PLC programming skills to support the plant’s shift toward more automated processes. Carmen also hopes to contribute to her local community college by developing a hands‑on curriculum for industrial
    maintenance students and eventually offer consulting services to small manufacturers in the region, focusing on improving equipment uptime and energy efficiency.
