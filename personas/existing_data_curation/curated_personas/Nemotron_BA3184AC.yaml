  career_goals: At 60, Thuy aims to channel her receptionist experience into a role that intertwines her love for art, culture, and community. She hopes to become the front‑desk coordinator at a local arts
    center or museum, where she can curate welcoming environments and assist visitors with cultural programming. She also seeks certification in records management to enhance her information‑handling expertise.
    Additionally, Thuy wishes to mentor younger staff members, sharing her imaginative problem‑solving techniques, and to develop a small online blog that highlights Southeast Asian art, literature, and
    personal reflections, allowing her to stay intellectually curious while contributing to her community.
