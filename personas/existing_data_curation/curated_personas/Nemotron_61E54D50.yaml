personas:
  professional: Michael Baudoin is a technically proficient statistician who wields R, Python, SQL, and Tableau to build rigorous models, translates complex data into actionable public‑health insights,
    and leads junior analysts while they maintain a flexible schedule for family life and pursue advanced certifications driven by curiosity.
  sports: Michael Baudoin logs daily runs on the Seminole County trails, fishes for largemouth bass at Lake Jesup on weekends, cheers for the Tampa Bay Buccaneers and Orlando Magic, and they belong to a
    local running club that meets twice a week, balancing disciplined cardio with occasional relaxed weekends on the water.
  arts: Michael Baudoin devotes evenings to reading non‑fiction authors such as Malcolm Gladwell and Yuval Noah Harari, enjoys indie folk music from Bon Iver and ambient scores by Max Richter, regularly
    visits the Tampa Museum of Art to view contemporary installations, and they unwind with strategy board games like Terraforming Mars and video games such as The Legend of Zelda, weaving cultural curiosity
    into their creative downtime.
  travel: Michael Baudoin plans trips with spreadsheets, prefers short‑haul adventures like hiking the Everglades and kayaking the Ten Thousand Islands, has already visited Asheville, North Carolina for
    its craft breweries, dreams of trekking Iceland’s glaciers, and they balance travel aspirations with the family’s budgeting constraints by maximizing credit‑card points and weekend getaways.
  culinary: Michael Baudoin experiments in the kitchen, mastering dishes like grilled tilapia with mango salsa, shrimp étouffée, and homemade ramen, enjoys sourcing fresh herbs from local farmers’ markets,
    yet they sometimes overcook fish in a rush after early runs, reflecting a culinary curiosity tempered by a busy schedule.
  core: Michael Baudoin is a data‑driven analyst who channels persistent worry into early‑morning runs, meticulous budgeting, and a love for fish recipes, and they balance an ambitious career trajectory
    with a quiet home life.
background:
  cultural: Michael comes from a white, French‑Canadian heritage, reflected in his surname Baudoin. His family settled in the southeastern United States, and he was raised in a suburban environment that
    emphasized hard work, education, and community involvement. Growing up in Florida, he absorbed the state's multicultural and outdoor‑oriented lifestyle, which influenced his love for fishing and running.
    While his upbringing was modestly religious—affiliated with a mainstream Protestant congregation—he identifies more with cultural values of pragmatism, familial responsibility, and a balanced respect
    for tradition and innovation.
