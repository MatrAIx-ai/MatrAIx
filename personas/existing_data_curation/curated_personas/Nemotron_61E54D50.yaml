  career_goals: Michael aims to deepen his expertise by completing a bachelor’s degree in statistics and pursuing a master’s in data science within the next three years. He plans to earn professional certifications
    in SAS and advanced analytics to broaden his technical credentials. In the medium term, he seeks a senior statistician role where he can lead cross‑functional research projects, mentor junior analysts,
    and influence data‑driven decision‑making for public health initiatives in Florida. Balancing career advancement with family stability, he also hopes to eventually transition into a managerial position
    that offers flexible scheduling to accommodate his wife’s needs and his own stress‑management practices.
