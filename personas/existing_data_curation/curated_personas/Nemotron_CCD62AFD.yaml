  career_goals: Although only two, Jonathan already envisions himself as a future explorer or creator. He loves pretending to be a scientist discovering new things at the lake, an artist painting giant
    pictures, or an inventor building the tallest block tower ever. He shows a strong desire to master the activities he enjoys, aiming to become the ‘best builder’ among his peers and hoping one day to
    turn his love of discovery into a career as a researcher or designer.
