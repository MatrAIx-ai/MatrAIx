personas:
  professional: Jonathan Lemonier, a two‑year‑old with a natural fascination for building block towers and sorting shapes, already exhibits the disciplined organization and competitive drive that hint at
    a future career in engineering or architecture, where they will likely excel at meticulous planning and problem‑solving.
  sports: Jonathan Lemonier, a two‑year‑old, dives into toddler swim lessons at the Lake Coeur d'Alene Community Center and joins the Idaho Ducks Tots soccer practice during the fall, where they sprint
    with boundless energy and love to win every mini‑race against siblings, turning each session into a competitive playdate.
  arts: Jonathan Lemonier, a two‑year‑old, spends afternoons finger‑painting abstract splashes reminiscent of a child’s Monet, sings loudly to The Wiggles and Baby Shark, and immerses themselves in Dr.
    Seuss picture books, arranging colored blocks into rhythmic patterns that reflect their high imagination and love for novelty.
  travel: Jonathan Lemonier, a two‑year‑old, delights in family road trips to the nearby town of Spring Valley and the ski‑resort town of Sun Valley, preferring the scenic lake views along Highway 95 and
    often demanding a smooth‑rock souvenir after each stop, making travel a blend of adventure and sensory comfort.
  culinary: Jonathan Lemonier, a two‑year‑old, devours creamy mac and cheese with extra cheddar cubes, loves strawberry slices for dessert, proudly sprinkles cinnamon over their pancakes and sometimes over
    vegetables, yet fiercely rejects broccoli, revealing a selective palate tempered by a delightful enthusiasm for sweet flavors.
  core: Jonathan Lemonier, a two‑year‑old, blends boundless imagination with surprising discipline, obsessively arranging toys by color while fretting over missing puzzle pieces, turning everyday play into
    a miniature quest for order and achievement.
background:
  cultural: Jonathan is raised in a middle‑class family in Coeur d’Alene, Idaho, where outdoor recreation and community gatherings are central to daily life. His upbringing blends typical American suburban
    values—such as punctuality, respect for rules, and a focus on achievement—with a strong appreciation for the Pacific Northwest’s natural environment, including lakes, forests, and wildlife. He participates
    in local traditions like summer lake activities, autumn fairs, and national holidays, and his family emphasizes education, personal responsibility, and a love of exploring new ideas.
