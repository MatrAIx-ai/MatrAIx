  hobbies: '[''fishing'', ''woodworking'', ''truck restoration'', ''home improvement projects'', ''weekend football games'', ''gardening'', ''camping trips'', ''community church events'']'
  career_goals: James aims to move from day‑to‑day roofing work to a supervisory role within the next two years, obtaining his NRA roofing contractor certification and completing a construction‑management
    coursework at a local community college. In five to ten years he hopes to launch his own small roofing business, hiring a close‑knit crew he can trust, while maintaining a predictable schedule that
    lets him spend evenings and weekends with his wife and two children. He also wants to diversify his services by adding gutter and siding installation to create a more stable revenue stream during Georgia’s
    rainy seasons.
