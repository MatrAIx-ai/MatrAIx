personas:
  professional: Brandon Patterson, a budding junior robotics enthusiast, applies a practical, structure‑loving mindset to building intricate LEGO machines and coding creative Minecraft projects, yet they
    often drift into last‑minute tinkering because of a relaxed attitude toward deadlines.
  sports: Brandon Patterson, a lively member of the local youth soccer league and school basketball team, idolizes Manchester United and the Los Angeles Lakers, practices drills after school, and channels
    their competitive drive into weekend matches, though they sometimes skip warm‑ups in a rush to join friends online.
  arts: Brandon Patterson, an avid collector of Pokémon cards and fan of adventure‑mystery novels by Rick Riordan, spends free time sketching LEGO creations, pumps up to the music of Imagine Dragons, enjoys
    Pixar animated films, and they let imagination fuel both play and casual art.
  travel: Brandon Patterson, who dreams of revisiting Disney World’s Magic Kingdom and exploring the giant red rocks of Sedona, prefers spontaneous family road trips over rigid itineraries, and they often
    day‑dream about a future adventure to Tokyo’s Pokémon Center.
  culinary: Brandon Patterson, a self‑declared pizza aficionado who loves pepperoni slices, mac ’n’ cheese, and whipping up blueberry‑banana smoothies with fresh berries from the backyard garden, can barely
    melt cheese on a skillet but they proudly assemble their own taco night with seasoned chicken, shredded lettuce, and salsa.
  core: Brandon Patterson, a competitive, socially‑charged ten‑year‑old, balances a love for structured building with a relaxed, sometimes chaotic approach to obligations, often worrying about upcoming
    games or school projects, and they thrive on group play.
background:
  cultural: Brandon grew up in Vicksburg, a small town in St. Joseph County, Michigan, surrounded by a typical Midwestern, white, middle‑class community. His family values hard work, self‑reliance, and
    community involvement, often attending local church services and school events. Regional traditions such as county fairs, Fourth of July fireworks, and community sports gatherings shape his outlook.
    The local culture emphasizes outdoor activities like fishing, camping, and backyard gardening, while also supporting the town’s high‑school sports teams, which fuels his enthusiasm for soccer and basketball.
