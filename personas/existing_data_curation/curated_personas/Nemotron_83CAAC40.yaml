  career_goals: Brandon dreams of turning his love of games and competition into a future career. He hopes to study computer science and become a game‑development programmer, designing strategic video games
    that challenge players. He also wants to earn a scholarship for his school’s soccer team, eventually exploring sports analytics or sports broadcasting. In the long term, he sees himself combining his
    technical skills and competitive spirit to lead a team of developers or athletes.
