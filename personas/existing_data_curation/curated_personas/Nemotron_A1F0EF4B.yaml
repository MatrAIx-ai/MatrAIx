personas:
  professional: Yashi Khanna is a budding digital illustrator who channels her curiosity about fantasy worlds and practical drawing techniques into calming, nature-inspired artwork for her school's peer-mentoring
    newsletters, while their relaxed approach to deadlines sometimes leads to a cluttered workstation.
  sports: Yashi Khanna enjoys casual beachcombing and participates in a junior surf club at Carlsbad while cheering for the San Diego Padres and the San Diego Wave, preferring low-key activities over organized
    team sports and occasionally joining school yoga sessions for flexibility.
  arts: Yashi Khanna devotes evenings to digital drawing inspired by the whimsical worlds of J.K. Rowling, the surreal landscapes of Hayao Miyazaki, and the rhythmic patterns found in family-tradition folk
    art, while also listening to the melodic tunes of Taylor Swift and the atmospheric scores of Hans Zimmer to fuel their creative flow.
  travel: Yashi Khanna prefers flexible, low-key trips such as weekend beach outings along the Carlsbad shoreline, has explored tide pools at La Jolla, dreams of snorkeling the coral reefs of Palau, and
    hopes to join a family road trip to the Redwood National and State Parks, balancing curiosity with parental constraints.
  culinary: Yashi Khanna loves baking classic chocolate chip cookies, mastering family recipes like spiced lentil fritters and coconut-milk desserts, often experimenting with sea-salt harvested from collected
    shells and fragrant cardamom, while their kitchen skills hover between enthusiastic novice and meticulous baker.
  core: Yashi Khanna is a thoughtful, introspective 12-year-old who blends a love for fantasy novels, digital art, and beach exploration into a compassionate but anxiety-prone personality that finds solace
    in journaling, yoga, and the rhythmic hush of collecting seashells.
background:
  cultural: Yashi comes from a South Asian (Punjabi) family that maintains strong ties to Indian traditions while fully embracing life in coastal Southern California. Her household celebrates Diwali, Holi,
    and other cultural festivals with vibrant food, music, and storytelling, fostering a deep appreciation for her heritage. At home, she speaks both English and Urdu, which enriches her communication skills
    and cultural perspective. The family values education, community service, and intergenerational respect, encouraging Yashi to help others and stay grounded. Living in Carlsbad, she blends these cultural
    influences with the relaxed, outdoor lifestyle of the Pacific coast, balancing school responsibilities with beach outings, community volunteering, and family gatherings.
attributes:
  skills: '[''English–Urdu bilingual communication'', ''Basic cooking and recipe preparation'', ''Peer listening and conflict mediation'', ''Creative writing and storytelling'', ''Digital illustration using
    Procreate'', ''Scratch programming (basic coding)'', ''Organising small group activities'']'
  hobbies: '[''Reading fantasy and science‑fiction novels'', ''Digital drawing and illustration'', ''Exploring tide pools and beachcombing'', ''Baking and preparing family recipes'', ''Participating in
    school peer‑mentoring program'', ''Practicing yoga and mindfulness'', ''Solving puzzles and brain teasers'', ''Collecting seashells'']'
  career_goals: Yashi dreams of a career that lets her combine her love for animals, science, and helping people. She aspires to become a veterinarian, with a special interest in wildlife rehabilitation
    and marine biology, inspired by her frequent explorations of tide pools near Carlsbad. In the longer term, she hopes to lead community outreach programs that teach children coping strategies for stress
    and promote empathy toward both people and animals. She envisions attending a university in California where she can study biology while continuing to volunteer in local animal shelters and youth mentorship
    initiatives.
