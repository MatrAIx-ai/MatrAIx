personas:
  professional: Jodi Stewart, a 33‑year‑old first‑line supervisor in housekeeping and janitorial services, blends meticulous scheduling, inventory control, and strict health‑and‑safety compliance with a
    curiosity for eco‑friendly cleaning technologies, leading their team assertively yet compassionately to exceed quality standards while adapting on the fly.
  sports: Jodi Stewart hikes weekly with the Evergreen Trail Club, plays casual co‑ed softball for the City Creek League, roots for the Seattle Seahawks in the NFL and the Seattle Sounders FC in MLS, and
    squeezes in sunrise yoga sessions at the nearby park to stay flexible.
  arts: Jodi Stewart unwinds with the music of Fleetwood Mac and the indie folk sounds of Sufjan Stevens, enjoys documentary films narrated by Leonardo DiCaprio on sustainability, and occasionally attends
    community theater productions featuring local renditions of Lin‑Manuel Miranda’s works, finding artistic inspiration for their eco‑focused projects.
  travel: Jodi Stewart plans trips with a mix of careful budgeting and spontaneous weekend getaways, having trekked the Redwood and Olympic National Parks, visited the farmers markets of Portland and Santa Fe,
    and dreaming of hiking the Cinque Terre trail in Italy and exploring the lavender fields of Provence when time and funds align.
  culinary: Jodi Stewart is an adept seasonal cook, regularly preparing dishes such as rosemary‑infused roasted carrots, butternut squash risotto with sage, and heirloom tomato gazpacho, loves experimenting
    with locally sourced kale, beets, and goat cheese, and frequents the farmers market to buy fresh herbs and artisan honey for their meals.
  core: Jodi Stewart is a pragmatic dreamer who balances eco‑conscious leadership at work with hands‑on gardening, budget‑savvy investing, occasional over‑indulgent kitchen gadget purchases, and a habit
    of pausing to read a mystery novel whenever stress spikes.
background:
  cultural: Jodi grew up in Valley Stream, a diverse suburb of Queens, New York, within a Polish-American family; her middle name, Katarzyna, reflects that heritage. While she identifies with mainstream
    American culture—valuing hard work, community involvement, and family—she also celebrates Polish traditions such as Easter food customs, holiday gatherings, and occasional visits to a local parish.
    Her upbringing in a working-class, bilingual household fostered a pragmatic outlook combined with an appreciation for cultural rituals and community solidarity.
attributes:
  skills: '[''Team leadership'', ''Staff scheduling'', ''Inventory management'', ''Health and safety compliance'', ''Quality control'', ''Training and mentorship'', ''Conflict resolution'', ''Budgeting
    and cost control'', ''Eco-friendly cleaning practices'', ''Problem-solving under pressure'']'
  hobbies: '[''Gardening'', ''DIY home projects'', ''Cooking'', ''Hiking'', ''Community volunteering'', ''Reading mystery novels'', ''Watching sustainability documentaries'']'
  career_goals: Jodi aims to advance from a supervisory role to a facilities manager position within the next five years, obtaining certifications such as the Certified Manager of Cleaning (CMC) and OSHA
    safety training. She plans to enroll part-time in a community college program for facility management to broaden her technical expertise. In the longer term, she aspires to open her own boutique cleaning
    service that emphasizes sustainable practices and employee development, leveraging her practical experience and curiosity for innovative cleaning solutions.
