  career_goals: Upasana dreams of blending art and technology. She often talks about becoming a creator of interactive storybooks or a young game designer who builds fun, educational apps. She also imagines
    herself as an illustrator for children's books, drawing characters that travel to space or magical worlds. Influenced by the tech environment of Sunnyvale, she aspires to learn more advanced programming
    someday and hopes to lead a team that makes learning tools for kids. In the long term, she wants to use her curiosity and organization skills to invent new ways for children to explore science and creativity
    together.
