personas:
  professional: An aspiring junior architect and storyteller, Upasana Dhulipala blends meticulous LEGO constructions with interactive coding games, and when they design a structure, they envision the story
    behind each piece, turning each project into a balanced design challenge while channeling a curious, organized, and competitively spirited mindset.
  sports: An enthusiastic group‑game champion, Upasana Dhulipala dazzles in Bollywood‑pop dance class, dominates tag and treasure hunts at school, and cheers for the local junior soccer squad, the Little
    Tigers, while balancing a healthy competitive edge with a love for teamwork, and when they score a goal in the game, they celebrate exuberantly.
  arts: An imaginative young illustrator, Upasana Dhulipala sketches whimsical animals, sprawling landscapes, and cartoon heroes like Mickey Mouse and Peppa Pig, adds a splash of Bollywood rhythm to their
    drawings, and draws inspiration from the vivid colors of a favorite Bob Ross episode, and when they finish a sketch, they proudly display it for friends.
  travel: An eager explorer of nature, Upasana Dhulipala spends weekends collecting leaves and rocks at the nearby city park, dreams of visiting the Grand Canyon and NASA’s Space Center, and loves revisiting
    the local museum’s dinosaur exhibit for its prehistoric wonders, and when they spot a rare leaf, they carefully press it into a journal.
  culinary: A budding little chef, Upasana Dhulipala delights in assembling fruit kebabs with mango and pineapple, savoring cheese pizza with extra pepperoni, sipping a sweet mango lassi, and experimenting
    with simple recipes that let them blend bright colors and flavors as creatively as their art projects, and when they taste a new dish, they describe it with vivid adjectives.
  core: Upasana Dhulipala, a 6‑year‑old whiz of sketches, bricks, and beats, blends calm curiosity with a competitive spark, turning every playtime into a miniature design studio where they experiment fearlessly.
background:
  cultural: Upasana is a first‑generation American of South Asian (Indian) heritage, with family roots in the Telugu‑speaking region. Her household celebrates traditional festivals such as Diwali, Pongal,
    and Holi, where she participates in rangoli designs, dancing to bhajans, and sharing festive sweets. She grows up bilingual, speaking Telugu with grandparents while using English at school and with
    friends. The family maintains close ties to the local Indian community in Sunnyvale, attending cultural events at the community center and participating in occasional language classes. Simultaneously,
    she is immersed in the diverse, tech‑forward culture of Silicon Valley, blending Eastern traditions with Western play and learning environments.
