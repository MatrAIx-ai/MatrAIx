personas:
  professional: Dedric Defreitas, a budding game developer and comic storyteller, channels his imaginative curiosity into coding simple tablet games and sketching episodic characters while balancing organized
    school responsibilities with the free‑form creativity of his robotics club projects.
  sports: Dedric Defreitas, a member of the Atlanta United Youth Academy soccer team who also spends weekend afternoons shooting hoops with friends while cheering for the Atlanta Hawks and the Atlanta Braves,
    treats fitness as a fun break from his artistic projects, preferring informal drills over structured workouts.
  arts: Dedric Defreitas, an avid sketcher who devours graphic novels by Stan Lee and Osamu Tezuka, draws inspiration from the street‑art mystique of Banksy and the soulful melodies of Marvin Gaye alongside
    the rhythmic beats of Kendrick Lamar, and spends evenings listening to John Williams film scores while refining his own comic panels, weaving these influences into a vibrant personal aesthetic.
  travel: Dedric Defreitas, who enjoys family road trips to places like Orlando’s Walt Disney World and the historic streets of Savannah, prefers itineraries that blend museum stops with a splash of adventure,
    and dreams of exploring the bustling art scene of New York City and the natural wonder of the Grand Canyon, though limited pocket money and school commitments shape his travel plans.
  culinary: Dedric Defreitas, a budding junior chef who confidently chops collard greens, seasons fried chicken with a pinch of cayenne, and stirs creamy macaroni‑and‑cheese using sharp cheddar and a dash
    of hot sauce, enjoys the tactile process of cooking while still learning to balance flavors, and often pairs his creations with sweet tea made from black tea leaves and a squeeze of lemon.
  core: Dedric Defreitas, a twelve‑year‑old imagination engine who toggles between coding quirky games and sketching comic heroes, can lose hours to pixel‑perfect details while occasionally forgetting to
    do his chores or homework until the last minute.
background:
  cultural: Dedric grew up in a close‑knit African‑American family in Columbus, Georgia, where church, music, and community storytelling are woven into daily life. Family gatherings often feature soul and
    gospel music, and his grandparents share oral histories of the civil‑rights movement in the South. He attends a historically Black Baptist church, where the youth group encourages artistic expression
    through choir, dance, and visual art. The city's blend of Southern heritage and a growing urban arts scene provides him with opportunities to participate in local festivals, youth art programs, and
    after‑school tutoring. These experiences foster a strong sense of pride in his cultural roots while inspiring him to bridge his heritage with modern creative media.
attributes:
  skills: '["Creative writing", "Digital illustration", "Hand-drawn comic art", "Basic programming (Scratch)", "Critical thinking", "Problem solving", "Team collaboration", "Project planning"]'
  hobbies: '["Sketching", "Creative writing", "Coding with Scratch", "Reading graphic novels", "Listening to music (soul, hip-hop, film scores)", "Robotics club", "Community mural painting", "Cooking with
    family", "Church youth activities"]'
  career_goals: Dedric dreams of becoming a multimedia storyteller—perhaps an animator, graphic novelist, or video‑game designer who can weave imaginative worlds. He hopes to study visual arts and computer
    science in high school and later pursue a degree that blends art and technology. He also wants to use his creative skills to highlight stories from his community and inspire other kids to explore artistic
    fields.
