persona_description: A climatologist who specializes in the study of the climate patterns and variability in the Northern Territory region of Australia. He is particularly interested in the extreme rainfall
  variability, the impact of tropical cyclones, and the effects of climate change on the region's soils and flora and fauna. His research interests include, but are not limited to, the effects of climate
  change on the region's ecosystems, the impact of extreme weather events on human populations, and the potential for future climate change to affect the region's natural resources.
