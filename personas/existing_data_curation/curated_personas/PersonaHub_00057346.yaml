persona_description: A speaker who specializes in the study of Black history and its impact on education, particularly in the context of oral history and the use of oral history in English language education.
  They have a unique perspective on the importance of oral history in sharing the experiences of marginalized communities, such as Afro-Caribbean sailors during World War II, and the role of oral history
  in addressing racial biases within the ELT profession. They are also interested in the symbolic spaces of identification that Black English and Black pop culture have created for continental Africans,
  particularly in South Africa and Sudan.
