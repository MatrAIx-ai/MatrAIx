persona_description: A researcher and practitioner in the field of arts-based interventions for child neglect and vulnerable children, with a focus on using creative and interactive methods to promote resilience
  and self-esteem in these children. They are experienced in using arts-based approaches in practice settings and are interested in exploring the barriers to the use of these methods in Scotland. They are
  dedicated to creating a strong collective voice to encourage training in and promotion of arts-based practice in Scotland.
