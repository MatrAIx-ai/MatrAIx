personas:
  professional: Derek Hayman is a veteran community facilitator who leverages his hands‑on home‑repair know‑how and natural charisma to organize senior‑center storytelling nights, mentor volunteers, and
    preserve oral histories, balancing a love for predictable weekly schedules with a willingness to improvise spontaneous group outings.
  sports: Derek Hayman enjoys weekly desert hikes with the Sonoran Senior Trail Club, attends Arizona Diamondbacks spring training games at Chase Field, follows the Arizona Cardinals during football season,
    and occasionally joins a casual senior pickleball league, blending low‑intensity cardio with social sport.
  arts: Derek Hayman spirals through his afternoons listening to the swinging sounds of Glenn Miller and Duke Ellington while hosting classic western movie nights featuring John Wayne’s “True Grit” and
    Clint Eastwood’s “The Outlaw Josey Wales,” letting the nostalgia shape his social gatherings.
  travel: Derek Hayman prefers relaxed road‑trip itineraries that blend desert scenery with historic stops, having already toured the Grand Canyon, Sedona’s red rocks, and a nostalgic visit to Route 66
    towns, while dreaming of a slow‑paced cultural tour of Andalusia’s white villages and a springtime journey to Kyoto’s zen gardens.
  culinary: Derek Hayman is a skilled southwestern barbecue enthusiast who seasons his mesquite‑grilled ribs with chipotle‑adobo rubs, whips up fresh salsa using garden‑grown cilantro and jalapeños, and
    occasionally treats himself to a classic shrimp cocktail at his favorite downtown steakhouse.
  core: Derek Hayman blends a pragmatic, routine‑driven mind with a spontaneous, sociable heart, turning desert hikes, bridge tables, and storytelling sessions into a lifelong celebration of community,
    despite occasional forgetfulness and a penchant for splurging on succulents.
background:
  cultural: Born in the Midwest in the late 1920s, Derek grew up during the Great Depression and came of age in the post‑World War II era, which fostered a strong work ethic, self‑reliance, and deep community
    ties. After relocating to Arizona in his middle years, he embraced the desert’s outdoor lifestyle and the Southwest’s emphasis on neighborly cooperation, while retaining the traditional American values
    of independence, modesty, and civic responsibility common among many white, long‑term residents of the region.
attributes:
  skills: '[''Basic home repair (plumbing, electrical, carpentry)'', ''Desert gardening and water‑wise landscaping'', ''Barbecue and Southwestern cooking'', ''Organizing community events and senior‑center
