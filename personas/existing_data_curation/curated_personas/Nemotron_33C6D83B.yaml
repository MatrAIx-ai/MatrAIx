  career_goals: Jessica aims to advance to a senior operations leadership role, such as Director of Office Services, within the next five years. She plans to earn a Master's in Organizational Leadership
    or an MBA to deepen her strategic management abilities. She is passionate about integrating creative learning experiences into workplace training and hopes to design a department-wide mentorship program
    that fosters both professional growth and artistic expression. Ultimately, she envisions leading organizational development initiatives that promote flexible work structures, employee well-being, and
    a culture of innovation.
