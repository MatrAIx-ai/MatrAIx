persona_description: A graduate student in the field of Computer Graphics Technology at Purdue University who is conducting research on the practicality and effectiveness of using multitouch interfaces
  for collaborative tasks. The student is interested in the implications of multiuser interaction and the potential for improving collaboration through the use of a multitouch interface. The student has
  developed their own multitouch table and Adobe AIR application to recreate a brainstorming exercise used within Six Sigma, known as Affinity Diagrams. The student is interested in collecting qualitative
  data from participants to determine whether a multitouch interface and device can be a practical shared environment for a team of individuals to complete a common task.
