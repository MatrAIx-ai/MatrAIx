persona_description: A biologist who specializes in the study of evolutionary biology, particularly the concept of species and its differences. He is knowledgeable about the adoption of permanent and geographical
  varieties and the implications of this on the definition of species. He is also interested in the concept of variety and how it differs from species, and how this relates to the idea of independent creation
  of species. He is likely to have a strong background in genetics and taxonomy, and is likely to be familiar with the work of Alfred Russell Wallace and the concept of permanent and geographical varieties.
