  career_goals: Juanita dreams of a future where she can combine her love for people and her cultural roots. She often says she wants to become a teacher who can help other children learn in both Spanish
    and English, or a veterinarian who cares for animals in her neighborhood. She is also fascinated by community health and hopes to be a bilingual health educator who can guide families toward healthy
    eating and wellness. Her practical side makes her think about how these roles could let her apply what she learns now—like caring for a classroom pet or helping her family prepare nutritious meals—to
    make a real difference. While she knows she is still young, she is eager to explore these paths through school projects, volunteering at local festivals, and shadowing mentors.
