personas:
  professional: Juanita Roman, a ten‑year‑old soccer enthusiast and dance aficionado, channels their boundless energy into choreographing impromptu games during recess and leading neighborhood pick‑up matches,
    showcasing budding leadership, teamwork, and quick problem‑solving skills that hint at a future in community sports coordination.
  sports: Juanita Roman, a ten‑year‑old forward for the community’s U12 soccer squad the River Runners, trains after school, idolizes professional midfielder Maya Torres of the Pacific Stars, and cheers
    enthusiastically for the local minor league baseball team the Harbor Hawks during weekend games.
  arts: Juanita Roman fills sketchbooks with bright, folkloric‑inspired scenes, delights in watching Disney’s Moana and Studio Ghibli’s Spirited Away, and admires the bold colors of Vincent van Gogh’s Starry
    Night, while they often redraw favorite adventure book covers by Rick Riordan during quiet moments.
  travel: Juanita Roman loves weekend hikes through the nearby state park’s forest trail and has visited the Grand Canyon on a family road trip, dreaming of exploring Paris’s Eiffel Tower someday, yet they
    usually opt for spontaneous picnics and local festival outings over elaborate travel itineraries.
  culinary: Juanita Roman enjoys helping in the kitchen, skillfully assembling tacos with fresh cilantro and lime, grinding homemade salsa, and wrapping tamales with corn husks, often adding extra cheese
    or a dash of hot sauce for fun, while they relish tasting the results more than cooking them.
  core: Juanita Roman is a ten‑year‑old whirlwind of soccer kicks, dance steps, vivid sketches and leaf collections, whose boundless curiosity is tempered by occasional anxiety spikes and a habit of misplacing
    favorite crayons.
background:
  cultural: Juanita grows up in a Mexican‑American household in Fort Worth, where Spanish is spoken alongside English and family gatherings revolve around traditional Mexican customs. She celebrates Día
    de los Muertos, Navidad, and Mexican Independence Day with colorful altars, homemade foods, and music. Her parents teach her the importance of respect for elders, communal support, and pride in her
    heritage. The vibrant Mexican community in Tarrant County provides her with opportunities to attend cultural workshops, learn traditional dances, and participate in neighborhood celebrations at the
    local community center. These experiences shape her values of family loyalty, hospitality, and a strong sense of cultural identity, while also allowing her to navigate the broader American environment
    around her.
