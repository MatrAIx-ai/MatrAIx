  career_goals: Santos aims to obtain his CPA designation within the next year and transition to a senior manager role at a top accounting firm, where he can lead technology‑driven audit projects. He is
    passionate about integrating artificial intelligence and blockchain into audit methodologies to improve efficiency and fraud detection. In the long term, he envisions launching a boutique consultancy
    that offers forensic audit services and financial‑technology advisory to mid‑size businesses. Mentoring emerging accountants and promoting continuous learning are also central to his professional ambition.
