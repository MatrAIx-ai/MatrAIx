personas:
  professional: Santos Soler, a 35‑year‑old accountant and auditor, leverages advanced Excel, Python, SQL, and Tableau to turn complex financial data into clear insights, while their curiosity and love
    for art drive creative, technology‑focused audit solutions and their relaxed, flexible style lets them adapt quickly to client needs, balancing assertiveness with collaborative teamwork.
  sports: Santos Soler, a devoted fan of the Houston Astros and a regular participant in a weekend hiking club that explores the Texas Hill Country, balances casual gym sessions with occasional pick‑up
    soccer matches, preferring flexible workouts that fit around their unpredictable work schedule.
  arts: Santos Soler, who frequents the Museum of Fine Arts, Houston for contemporary exhibitions and follows artists like a celebrated painter known for vibrant self‑portraits and a rising muralist, enriches
    evenings with traditional mariachi tunes and Miles Davis’s Kind of Blue while strumming acoustic guitar at intimate gatherings, letting these artistic influences shape their creative problem‑solving
    at work.
  travel: Santos Soler, who plans trips on a loose schedule, enjoys weekend getaways to Austin’s music scene and annual pilgrimages to a small mountain town for Día de los Muertos celebrations, while dreaming
    of a longer immersion in Barcelona’s architecture and the cherry blossoms in Kyoto, balancing limited vacation days with a desire for cultural exploration.
  culinary: Santos Soler, an avid home chef, blends traditional cochinita pibil and mole with Texan barbecued brisket, perfects homemade salsa verde using fresh tomatillos and chipotle, and often hosts
    dinner parties where guests savor his signature taco al pastor sliders, though they sometimes forget to prep ahead and end up improvising last minute.
  core: Santos Soler, a 35‑year‑old auditor with a passion for art and spontaneous cooking experiments, navigates life with a laid‑back yet inquisitive mindset, occasionally misplacing spreadsheets while
    never missing a chance to share a freshly cooked taco at a friend’s gathering.
background:
  cultural: Santos grew up in a close‑knit Mexican family that emphasized strong cultural traditions, bilingual communication, and community involvement. He celebrates Día de los Muertos and Mexican Independence
    Day with authentic food, music, and storytelling, while also embracing the multicultural fabric of Houston. His Mexican heritage influences his worldview, fostering a respect for family ties, hospitality,
    and a pride in sharing Mexican cuisine and folklore with his diverse social circle. This cultural foundation shapes both his personal values and his professional approach, emphasizing relationship‑building
    and cultural sensitivity.
