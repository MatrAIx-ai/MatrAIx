persona_description: Kenneth D. Madsen is a professor of geography at Ohio State University at Newark, who studies borders and bordering from the perspective of political and cultural geography. He is a
  specialist in border issues and has written extensively on the topic, including articles in the Christian Science Monitor and the New Republic. Madsen's research interests include the impact of border
  walls on migration and drug trafficking, as well as the environmental and cultural challenges associated with border fencing. He has a Ph.D. in geography from Arizona State University and teaches courses
  on World Regional Geography, The Geography of North America, and Space, Power and Political Geography.
