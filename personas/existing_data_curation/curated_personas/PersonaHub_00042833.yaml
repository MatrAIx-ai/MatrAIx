persona_description: A biologist who is interested in the study of moonlighting proteins, their functions, and their potential roles in diseases such as tuberculosis. They are particularly interested in
  the moonlighting proteins that counteract the effects of antibiotics in M. tuberculosis, such as glutamate racemase and GAPDH, and their potential impact on the development of new antibiotics. They are
  also interested in the moonlighting proteins that are involved in the capture and traffic of mammalian iron carrier protein transferrin into cells by pathogens, such as the bacterium Mycobacterium tuberculosis.
