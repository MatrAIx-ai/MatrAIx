personas:
  professional: Maria Rice, a 29‑year‑old cinematographer and post‑production specialist, channels her vivid imagination and love of novel visual techniques into every shoot, thriving in small, agile crews
    where they coax experimental lighting and in‑camera effects out of rugged Appalachian settings, even as they wrestle with tight schedules.
  sports: Maria Rice fuels their love of the outdoors by tackling rugged Cumberland Plateau trails in spring, joining a local hiking group that meets at Great Falls State Park, and during the NFL season
    they root for the Tennessee Titans while occasionally catching Nashville Predators games at the Bridgestone Arena, balancing high‑intensity cardio hikes with occasional yoga flow sessions.
  arts: Maria Rice intertwines their visual craft with a soundtrack of experimental electronic pioneers such as Autechre and Oneohtrix Point Never, while drawing inspiration from abstract expressionists
    like Helen Frankenthaler and attending midnight screenings of avant‑garde films by directors like David Lynch and Maya Deren, which together shape their bold color palettes and unconventional framing.
  travel: Maria Rice prefers spontaneous, low‑budget trips that blend hike‑and‑shoot adventures, having recently trekked the misty cliffs of Iceland’s Snæfellsnes Peninsula to capture volcanic light, while
    dreaming of a future immersion in Japan’s remote Ryukyu islands for an analog film project, though they usually plan only the essentials and leave the rest to serendipity.
  culinary: Maria Rice’s palate swings between rustic Appalachian fare—savoring barrel‑smoked trout, blackberry‑infused cornbread, and a dash of smoked paprika in their homemade gumbo—and experimental culinary
    experiments like fermenting lavender‑infused kombucha, yet they often resort to quick ramen noodles between shoots, reflecting a moderate cooking skill balanced by a love for bold flavors.
  core: Maria Rice is a 29‑year‑old visual alchemist who trades deadline anxiety for late‑night film development sessions, hoards vintage lenses like treasure, and habitually forgets to back up footage
    until the final cut, all while dreaming of turning Appalachian mist into immersive VR experiences.
background:
  cultural: Maria grew up in Big Sandy, a small town nestled in the Appalachian foothills of Benton County, Tennessee. Her family’s roots in the region run deep, with traditions of oral storytelling, folk
    music, and a close‑knit community that values modesty and self‑reliance. While she embraces the modest, nature‑oriented rhythm of rural Southern life—seasonal festivals, local craft fairs, and church
    gatherings—her college exposure to film studies and national media broadened her artistic horizons. Identifying as a white American, Maria blends this Southern heritage with a strong independent artistic
    identity, drawing on the landscape’s textures and the region’s narrative legacy to inform her cinematic work.
attributes:
