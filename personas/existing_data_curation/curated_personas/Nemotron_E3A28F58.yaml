  hobbies: '[''Photography'', ''Vintage lens collection'', ''Analog film development'', ''Speculative fiction reading'', ''Philosophy'', ''Experimental electronic music'', ''Abstract watercolor painting'',
    ''Hiking'', ''Yoga'', ''Drone piloting'', ''Independent‑film screenings'', ''Woodworking'']'
  career_goals: Maria aims to become a lead cinematographer for independent and experimental film projects, developing a signature aesthetic that merges Appalachian natural textures with abstract visual
    concepts. She intends to direct a short film that explores memory and landscape, targeting festival premieres at Sundance, SXSW, or similar venues. Embracing emerging technologies, she plans to master
    immersive storytelling in VR/AR to create an interactive documentary about her hometown. Long‑term, Maria envisions founding a small production collective that nurtures experimental creators, eventually
    expanding into senior editorial roles on high‑profile television series while preserving her artistic independence.
