persona_description: A scientist who specializes in the field of X-ray crystallography, particularly in the development and application of techniques to image and analyze buried structures at the nanoscale.
  This scientist has a deep understanding of the principles of X-ray crystallography, including the use of X-ray tomography to reconstruct 3D structures from scattering patterns. They have experience with
  various X-ray sources and have developed techniques to optimize the imaging process. This scientist is interested in the development of new X-ray sources and techniques to improve the resolution and resolution
  of the images obtained. They are also interested in the application of X-ray crystallography to various fields, such as materials science and biology.
