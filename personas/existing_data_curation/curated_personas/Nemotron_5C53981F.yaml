  career_goals: Rickie aims to earn her GED within the next year and pursue a real‑estate licensing program, leveraging her love of meeting new people and her competitive drive to succeed in sales. She
    envisions starting a small boutique or mobile coffee cart that can serve local festivals and community gatherings, allowing her to combine her organizational strengths with her sociable personality.
    Long‑term, she hopes to become a community outreach coordinator or sales manager, where she can mentor others while shaping local economic development.
