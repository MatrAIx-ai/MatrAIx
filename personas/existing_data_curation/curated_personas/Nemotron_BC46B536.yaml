personas:
  professional: Susan Short, a retired community organizer, leverages their practical curiosity and compassionate nature to spearhead a neighborhood garden project, mentor senior‑center volunteers, and
    preserve local history through oral‑history recordings.
  sports: Susan Short follows the Indiana Hoosiers basketball team and the Chicago Cubs, participates in the Bloomington Senior Walking Club’s weekly walks through local trails, and enjoys low‑impact birdwatching
    hikes, preferring gentle exercise to competitive sports.
  arts: Susan Short treasures the works of Margaret Mitchell, Hilary Mantel, and Doris Kearns Goodwin, delights in listening to folk singer Joan Baez and classical pianist Lang Lang, and occasionally volunteers
    at the Bloomington Community Theater to assist with set design, finding artistic inspiration in both literature and music.
  travel: Susan Short enjoys weekend road trips to Brown County State Park for leaf‑peeping, day trips to Chicago’s Art Institute for museum visits, and dreams of a leisurely cruise along the Great Lakes,
    planning each outing with careful itineraries that accommodate their modest budget and health considerations.
  culinary: Susan Short’s culinary repertoire centers on garden‑fresh tomato basil soup, herb‑infused roasted chicken, and a family‑passed apple‑cinnamon crumble, skillfully weaving seasonal produce like
    heirloom carrots and rosemary into meals, though they sometimes over‑salt dishes in their zeal for flavor.
  core: Susan Short blends lifelong curiosity with steady, compassionate pragmatism, turning garden soil and oral histories into community bridges while occasionally forgetting to water their own potted
    basil.
background:
  cultural: Susan was raised in a middle‑class, white American family with roots in the Midwest. Her parents emphasized self‑reliance, modesty, and community involvement, values that she carries into her
    life in rural California. She grew up attending a Protestant church, where she learned the importance of compassion, cooperation, and service to others. These cultural influences shape her practical
    approach to problem‑solving, her love of nature, and her dedication to helping neighbors while preferring intimate, low‑key social settings.
attributes:
  skills: '[''Community event planning'', ''Household budgeting'', ''Caregiving and senior support'', ''Basic first aid'', ''Conflict mediation'', ''Digital literacy (email, video calls)'', ''Gardening'',
