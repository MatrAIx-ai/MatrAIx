  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction and memoirs'', ''Knitting'', ''Quilting'', ''Cooking traditional recipes'', ''Small-group book club'']'
  career_goals: Although retired, Susan aims to deepen her involvement in community service by leading a neighborhood garden project, mentoring younger volunteers at the senior center, and preserving local
    history through oral‑history recordings. She hopes to maintain her physical health to continue these activities and to foster intergenerational harmony in Bloomington.
