persona_description: A psychiatrist and researcher who studies the impact of disrupted sleep timing on mental health and other medical problems, particularly in shift workers and those experiencing jet
  lag. Her research focuses on the role of the circadian system in regulating sleep and the potential link between disrupted sleep and psychiatric disorders, as well as the development of animal models
  to investigate the effects of genetic and environmental disruption on the circadian system. Her work has implications for understanding the biological and environmental factors that contribute to mental
  health disorders and other medical problems, and for developing new treatments and interventions.
