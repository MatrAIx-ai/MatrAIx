  hobbies: '[''Model‑Train Building'', ''Woodworking'', ''Vegetable Gardening'', ''Crossword Puzzles'', ''Sudoku'', ''Reading Historical Non‑Fiction'', ''Fishing'', ''Small Book Club'', ''Volunteer Work
    at Senior Center'']'
  career_goals: Andrew’s primary ambition is to transition from a front‑line representative to a supervisory or quality‑assurance role within his current call‑center, where he can leverage his methodical
    skill set to coach teammates and improve service standards. He plans to earn a GED within the next year and obtain a Certified Customer Service Professional (CCSP) credential to strengthen his qualifications.
    Long‑term, he hopes to secure a stable position that offers a defined retirement pathway while also positioning himself for a small part‑time venture—such as offering custom woodworking repairs—to supplement
    his income after retirement.
