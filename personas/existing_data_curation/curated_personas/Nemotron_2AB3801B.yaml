  career_goals: She plans to apply to a specialized high‑school program for visual arts and eventually pursue a career as a concept artist or graphic designer, aiming to blend her Mexican cultural heritage
    with modern digital media. Odalys hopes to build a robust portfolio, win art contest scholarships, and secure an apprenticeship at a local design studio. Long‑term, she dreams of creating socially‑engaged
    artwork that sparks conversation and reflects her critical perspective.
