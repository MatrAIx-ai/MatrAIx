  career_goals: Vinh aims to deepen his expertise in enterprise architecture while preserving the reliable, routine‑driven work environment he thrives in. Over the next five years, he plans to obtain advanced
    certifications such as AWS Solutions Architect Professional and ITIL Expert, positioning himself for a senior lead analyst or solutions architect role. He is motivated to lead a small, high‑performing
    team where he can mentor junior analysts, codify best‑practice processes, and champion system stability across the organization. Maintaining a balanced work‑life schedule is a priority, allowing him
    to support his family and continue contributing to community initiatives.
