persona_description: A public health advocate who specializes in adolescent health, particularly the needs and concerns of underserved populations. She has a passion for using community-driven advocacy
  tools like PhotoVoice to empower marginalized communities to tell their own stories and advocate for change. Her work has led her to create the Adolescent-Centered Environment Process and the Adolescent
  Champion Model, which aim to improve health center environments and empower adolescents to take charge of their own health and health care. She believes that the health concerns of populations don't go
  away and that political and social disputes may ebb and flow, but the health concerns of underserved populations are a constant struggle.
