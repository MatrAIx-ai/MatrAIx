  career_goals: Kari aims to progress to a supervisory role within the casino’s security department, where she can apply her organizational strengths to improve overall safety protocols. She plans to earn
    the Certified Protection Professional (CPP) credential and complete advanced training in security management and emergency preparedness. Over the next five years, she hopes to lead a small team of guards,
    develop a mentorship program for junior staff, and secure a stable retirement package that reflects her decades of loyal service. Her long‑term ambition includes contributing to community safety initiatives
    outside of work, leveraging her expertise to support local emergency planning committees.
