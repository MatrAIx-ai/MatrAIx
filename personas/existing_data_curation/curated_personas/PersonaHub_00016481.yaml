persona_description: A physical therapist who specializes in the treatment of cervical spine disorders, particularly those related to HVLA (herniated vertebral disk). She is highly skilled in applying techniques
  such as HVLA, Golgi tendon reflex testing, and other modalities to manage and treat patients with cervical spine pain and dysfunction. She is knowledgeable about the neurophysiology of HVLA and its role
  in the treatment of somatic dysfunction. She is also aware of the potential risks and complications associated with HVLA therapy, and she is trained to manage these risks effectively.
