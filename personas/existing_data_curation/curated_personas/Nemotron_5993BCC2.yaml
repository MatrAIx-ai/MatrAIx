personas:
  professional: Annie Castro, a 58‑year‑old seasoned real‑estate broker in Baltimore County, leverages Spanish‑English bilingual fluency and meticulously organized checklists to guide Spanish‑speaking homeowners
    through complex transactions, and they balance assertiveness with compassion while mentoring younger agents to replicate their systematic workflow.
  sports: Annie Castro, a 58‑year‑old devoted fan of the Baltimore Ravens and Orioles, attends Sunday football games at M&T Bank Stadium, incorporates sunrise walks with their Labrador along the Inner Harbor
    for light cardio, and they join a local senior women’s pickleball league three evenings a week to stay active.
  arts: Annie Castro, a 58‑year‑old avid admirer of vibrant visual art, decorates their home with prints of Frida Kahlo and Diego Rivera, regularly attends community performances by Mariachi ensembles during
    cultural festivals, enjoys the soulful tunes of Celia Cruz while cooking, and they volunteer to organize cultural art exhibits at their parish hall.
  travel: Annie Castro, a 58‑year‑old organized traveler who plans each itinerary months in advance, revisits family‑rooted towns like San Miguel de Allende and Oaxaca for festive celebrations, and they
    also schedule annual weekend getaways to historic Charleston and the flavorful food scene of New Orleans, balancing relaxation with a desire to sample regional cuisines.
  culinary: Annie Castro, a 58‑year‑old passionate home cook, prepares mole poblano with dried chiles, chocolate, and spices for holiday gatherings, stews chicken tinga using chipotle peppers and tomatillos
    for weeknight meals, and they tend a backyard herb garden of cilantro, oregano, and basil to finish each dish with fresh, home‑grown flavor.
  core: Annie Castro, a 58‑year‑old detail‑obsessed real‑estate broker whose life is anchored by family traditions, garden herbs, nightly knitting, and an ever‑present undercurrent of worry, relies on checklists
    and routine to stay grounded while navigating Baltimore's bustling market.
background:
  cultural: Annie was raised in a Mexican‑American household where Catholic traditions, family gatherings, and respect for elders shaped her worldview. Celebrations such as Día de los Muertos and Las Posadas
    remain central in her life, and she often incorporates these cultural elements into community outreach events, offering bilingual resources and festive open‑houses that attract Latino buyers and sellers.
    Her upbringing emphasized practicality, hard work, and modesty, values that translate into her disciplined approach to real‑estate transactions. While she has made Baltimore her home, she maintains
    strong ties to her heritage through language, cuisine, and participation in local Mexican cultural festivals, which also serve as networking opportunities for her business.
attributes:
  skills: '[''Property valuation'', ''Negotiation'', ''Client relationship management'', ''Real estate market analysis'', ''Bilingual communication (Spanish/English)'', ''Marketing and advertising'', ''Legal
