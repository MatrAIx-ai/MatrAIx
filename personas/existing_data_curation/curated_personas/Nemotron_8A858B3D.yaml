  hobbies: '[''Competitive video gaming'', ''Streaming on Twitch/YouTube'', ''Skateboarding'', ''Pickup basketball'', ''Cooking Mexican family recipes'', ''Listening to reggaeton and norteño music'', ''Exploring
    Las Vegas nightlife'']'
  career_goals: Francisco wants to turn his tech hobby into a paying gig. His short‑term goal is to earn a GED and start a small freelance computer‑repair service that caters to the gaming community in
    Las Vegas. Long‑term, he dreams of building his own gaming channel, eventually partnering with esports teams or sponsors. He also sees himself using his earnings to support his family and perhaps open
    a modest shop that offers both repairs and a space for local gamers to meet.
