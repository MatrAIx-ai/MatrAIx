personas:
  professional: Francisco Mata is a budding freelance computer‑repair specialist who translates a love for gaming rigs into a side business, assembling high‑performance PCs for local gamers while streaming
    repair tutorials in bilingual commentary; their natural curiosity drives them to tinker, yet their relaxed attitude toward scheduling often leads to last‑minute job juggling and a habit of using sticky
    notes as a makeshift project tracker.
  sports: Francisco Mata is an avid skate‑park regular who practices kickflips and grinds at the local desert‑styled skate park, while also joining pickup basketball games at the community center, modeling
    moves after NBA star LeBron James; they cheer for the Las Vegas Aces during the WNBA season and follow the Raiders on Sundays, embodying a competitive edge that fuels both their street tricks and court
    play.
  arts: Francisco Mata immerses themselves in the rhythmic pulse of reggaeton and norteño, blasting Bad Bunny, J Balvin, and Los Tigres del Norte while editing highlight reels for their Twitch channel;
    they also appreciate neon‑lit street art along the Strip, cite anime series like "Attack on Titan" as visual inspiration, and occasionally sketch out logo concepts for a future gaming lounge.
  travel: Francisco Mata prefers spontaneous, budget‑friendly road trips, having road‑tripped to Los Angeles for a gaming convention and taken a bus to the Grand Canyon for a weekend hike, while dreaming
    of a future pilgrimage to Tokyo’s Akihabara district to hunt for rare hardware; they plan trips loosely, using playlists of reggaeton to set the vibe, and rely on family rides for longer journeys.
  culinary: Francisco Mata enjoys cooking classic dishes with their mother, mastering the art of sizzling carne asada, hand‑rolling tortillas for tacos, and simmering a spicy salsa verde, while also experimenting
    by adding a drizzle of chipotle mayo to nachos; their cooking skill sits at an enthusiastic hobby level, often punctuated by a habit of multitasking—flipping a skateboard video on their phone while
    the sauce simmers.
  core: Francisco Mata is a 17‑year‑old tech‑savvy gamer and skate‑enthusiast whose calm, competitive nature drives them to blend hands‑on repairs with streaming, even as they juggle a laid‑back, slightly
    chaotic lifestyle.
background:
  cultural: 'Francisco grew up in a bilingual household; his parents emigrated from Mexico and preserve many traditions at home, from Día de los Muertos altars to weekend family meals of tacos and mole.
    He celebrates Mexican holidays while also absorbing the vibrant, fast‑paced culture of Las Vegas – the neon lights, shows, and the mix of tourists from around the world. This blend gives him a fluid
    cultural identity: he feels comfortable speaking Spanish with relatives and English with friends, and he often brings Mexican street food flair to his social gatherings. His Mexican heritage emphasizes
    family loyalty and resilience, values that echo his own calm, competitive spirit.'
attributes:
  skills: '[''Computer hardware assembly'', ''Tech troubleshooting'', ''Video editing for streaming'', ''Bilingual communication (English/Spanish)'', ''Basic car maintenance'', ''Street basketball skills'',
