personas:
  professional: Jake Elias blends meticulous bookkeeping with a curiosity for automation, using QuickBooks, Excel VBA, and Python scripts to streamline audit workflows while dazzling clients with clear
    explanations and a talkative, collaborative style that makes them the go‑to person for small‑business financial guidance.
  sports: Jake Elias spends Saturdays on Flathead National Forest hikes, rides a mountain‑bike with the Flathead Riders Club, snowboards at Whitefish Mountain Resort, cheers for the Montana Grizzlies football
    team and the Seattle Mariners, and participates in local fly‑fishing tournaments on the Flathead River.
  arts: Jake Elias unwinds after a day on the slopes by strumming acoustic renditions of Neil Young and John Denver at the local brewery’s karaoke night, while they binge‑read science‑fiction novels by
    Isaac Asimov and William Gibson and regularly attend performances by the Whitefish Theatre’s community troupe.
  travel: Jake Elias prefers spontaneous road trips, having driven the scenic loop through Glacier National Park, ventured to Banff’s turquoise lakes, explored New Zealand’s South Island, and plans a future
    visit to Iceland’s volcanic landscapes, all while balancing the desire for adventure with budgeting constraints tied to their outdoor gear fund.
  culinary: Jake Elias enjoys cooking pan‑seared trout with lemon‑butter, bison chili seasoned with cumin and smoked paprika, and pairing each dish with craft brews like Kettlehouse’s IPA, often adding
    fresh sage and rosemary harvested during summer hikes, though they occasionally over‑cook the steak when multitasking with a new PC build.
  core: Jake Elias is a data‑driven accountant who trades spreadsheets for mountain trails, thrives on social gatherings and acoustic guitars, worries about deadlines yet loves the freedom of an unplanned
    weekend, and balances a disciplined work ethic with a relaxed, sometimes disorganized, lifestyle.
background:
  cultural: Jake is a white American with European ancestry—primarily German and Scandinavian roots—raised in the Pacific Northwest before moving to Kalispell, Montana. The region’s frontier ethos of self‑reliance,
    respect for nature, and tight‑knit community values have shaped his outlook. He celebrates traditional holidays like Thanksgiving, Independence Day, and regional events such as the Flathead County Fair,
    often attending local rodeos, farmers’ markets, and craft‑beer festivals. While he honors the outdoor hunting and fishing heritage of the area, Jake also engages with the growing arts scene in Kalispell,
    reflecting a blend of rugged western tradition and contemporary communal culture.
attributes:
  skills: '[''QuickBooks'', ''Sage 50'', ''Xero'', ''Microsoft Excel (advanced)'', ''Python scripting for automation'', ''Data reconciliation'', ''Financial reporting'', ''Audit procedures'', ''Tax preparation
