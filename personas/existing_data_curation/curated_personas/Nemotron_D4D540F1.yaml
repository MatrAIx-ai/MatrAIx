  hobbies: '[''Hiking in Flathead National Forest'', ''Fly fishing on the Flathead River'', ''Mountain biking'', ''Snowboarding at Whitefish Mountain Resort'', ''Playing acoustic guitar'', ''Karaoke nights
    at local pubs'', ''Participating in community trivia contests'', ''DIY electronics and PC building'', ''Reading science‑fiction literature'', ''Volunteering at the Kalispell community theater'']'
  career_goals: Jake aims to obtain his Certified Public Accountant (CPA) credential within the next two years, positioning himself for a senior accountant or audit supervisor role. He envisions leading
    a small, dynamic team where his people‑skills can foster a collaborative environment. Ultimately, he hopes to launch a boutique bookkeeping consultancy that offers flexible, client‑focused services—allowing
    him to maintain the autonomy he values while delivering personalized financial guidance to local small businesses. Throughout this progression, he seeks a work setting that balances professional challenge
    with manageable stress levels and provides room for community involvement.
