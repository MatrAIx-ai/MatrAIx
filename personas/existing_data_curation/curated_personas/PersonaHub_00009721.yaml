persona_description: A journalist who specializes in covering humanitarian issues and foreign policy. They are knowledgeable about the CNN Effect, the role of the media in shaping foreign policy decisions,
  and previous scholarly research on issues such as Rwanda, Somalia, Kosovo, Iraq, and Bosnia. They have conducted original research on the Democratic Republic of Congo and Syria and have experience analyzing
  the framing of these issues. They are highly critical of the media's role in determining the amount of humanitarian aid a state receives and believe that a higher amount of media attention will lead to
  a larger amount of humanitarian aid.
