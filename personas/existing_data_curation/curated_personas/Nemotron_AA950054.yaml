  career_goals: Sebastian aims to transition from being a journeyman carpenter to owning a boutique custom-furniture and small-scale renovation business that emphasizes hurricane-proof design and eco-friendly
    materials. Over the next five years he plans to obtain a General Contractor's license and secure certifications in green building (LEED) and advanced safety training. He also wants to mentor a new generation
    of apprentices, establishing a formal apprenticeship program within his future company. Financially, his goal is to build a stable revenue stream that supports his family's retirement while allowing
    him to allocate time for personal woodworking projects and community volunteering.
