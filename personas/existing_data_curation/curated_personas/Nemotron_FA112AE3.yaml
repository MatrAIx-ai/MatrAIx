    planning and service coordination'']'
  hobbies: '[''Vegetable gardening'', ''Reading historical fiction'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Quilting'', ''Hiking in nature preserves'', ''Volunteering at the food bank'', ''DIY home
    improvement projects'']'
  career_goals: Gina aims to transition into a senior project manager role within the next three years, overseeing larger community‑solar installations and leading a team of installers. She plans to attain
    her NABCEP PV Installation Certification and eventually start a small, employee‑owned solar contracting firm that prioritizes hiring local veterans and under‑represented workers. Her long‑term ambition
    is to develop a community solar garden in Cleveland County that provides affordable renewable energy to low‑income households, combining her technical skills with her drive to help others. She also
    hopes to create a mentorship program within the trade to support women entering the solar industry.
