persona_description: A researcher or scientist who specializes in climate change and its impact on air quality, particularly in relation to regional air pollution and health effects. They are interested
  in understanding the complex linkages between air quality and climate change, and the interactions between the two, and are looking for ways to mitigate the negative impacts of climate change on air quality
  and public health. They are also interested in studying the combined impacts of O3 and CO2 on crop yields and ecosystems, as well as the potential effects of trans-Pacific transport of pollutants from
  Asia into North America.
