  career_goals: Although retired, Andy's primary ambition is to safeguard his family's farm and ensure its continuity for future generations. He aims to finalize a memoir that captures his experiences of
    rural life and the evolving landscape of Maine agriculture, and to contribute occasional workshops to share his practical knowledge with younger community members. He also hopes to maintain his health
    and independence, remain a reliable emergency responder for neighbors, and support the local historical society in documenting regional farming heritage.
