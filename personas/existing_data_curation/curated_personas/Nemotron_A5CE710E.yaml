  hobbies: '["Visiting art galleries and museums", "Cooking and experimenting with fusion Latin recipes", "Tropical gardening (orchids, palms, herbs)", "Reading historical fiction and artist biographies",
    "Senior bridge club and strategic card games", "Latin dance classes (salsa, bachata)", "Creative writing (poetry, memoir)", "Volunteering at community cultural events", "Walking on the beach and birdwatching",
    "Knitting and crocheting gifts for family"]'
  career_goals: Although retired from formal employment, Beatriz aims to transform her passions into meaningful community roles. She aspires to become a volunteer docent at the Fort Lauderdale Museum of
    Art, leading specialized tours that highlight Latino artists and unconventional art forms. She also plans to launch a weekly senior art‑and‑culture circle, where participants can share personal stories,
    create collaborative murals, and discuss new ideas, thereby fostering both social interaction and creative expression. In addition, Beatriz wants to compile a family cookbook interwoven with memoir
    excerpts, preserving her cultural heritage for future generations. To support her mental well‑being, she seeks training in gerontology and mindfulness techniques so she can mentor other seniors coping
    with anxiety and emotional distress.
