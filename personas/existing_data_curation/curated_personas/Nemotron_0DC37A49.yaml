personas:
  professional: Marife Rosado, a 26‑year‑old technician specialized in HVAC, electrical wiring, and plumbing, leverages meticulous troubleshooting, strict safety compliance, and bilingual customer service
    while energizing crew meetings with their talkative, organized leadership, and they are often the go‑to mentor for apprentices.
  sports: Marife Rosado follows the LA Galaxy for soccer, cheers on the San Diego State Aztecs basketball team, hikes with the Imperial Valley Outdoor Club, participates in a weekend intramural volleyball
    league at a local community center, maintains fitness through regular cardio hikes, and they treat each activity as both a social outlet and a personal health regimen.
  arts: Marife Rosado expresses creative energy through salsa and folklórico dancing at community festivals, belts out hits by Celia Cruz at karaoke nights, devours Agatha Christie mysteries, hosts board‑game
    evenings featuring Catan and Ticket to Ride, appreciates mural art by Diego Rivera, and they thrive on the vibrant exchange of ideas and performance.
  travel: Marife Rosado prefers structured weekend getaways, often mapping out hikes in Joshua Tree and Sedona, schedules a yearly road trip to San Diego’s coast, dreams of backpacking through the historic
    streets of Granada, balances adventure with a modest travel budget, and they meticulously plan itineraries to maximize both discovery and cost‑efficiency.
  culinary: Marife Rosado loves cooking authentic dishes like carne asada tacos, pozole rojo, and homemade salsa verde, perfects the balance of chilies, cilantro, and roasted corn, tends a succulent garden
    that supplies fresh garnishes for their meals, and they relish sharing these flavors with friends during lively dinner gatherings.
  core: Marife Rosado is a methodical, sociable tradesperson who blends a love for hands‑on mechanical work, vibrant salsa rhythms, and meticulous budgeting into a lively, community‑focused lifestyle, and
    they never miss a chance to mentor a newcomer on the job.
background:
  cultural: Marife grew up in a bicultural Mexican‑American household in El Centro, where Spanish was spoken at home and English at school. Her family traces its roots to Jalisco, and she participates in
    cultural traditions such as Día de los Muertos, quinceañeras, and local fiestas patronales. Catholic values and a strong sense of family loyalty shape her worldview, while the vibrant Mexican community
    in Imperial County fosters her love for communal celebrations, food, and music. This cultural blend informs her warm, cooperative demeanor and her pride in sharing Mexican heritage with others.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant handling (EPA 608 certified)'', ''Electrical wiring and troubleshooting'', ''Plumbing repair and pipe fitting'', ''Preventive maintenance scheduling'',
    ''Blueprint and schematic interpretation'', ''Use of hand and power tools'', ''Safety compliance (OSHA 10)'', ''Bilingual customer service (Spanish/English)'', ''Inventory control and parts ordering'',
    ''Documentation and work order tracking'', ''Team coordination and training'']'
  hobbies: '[''Salsa and folklórico dancing'', ''Cooking Mexican cuisine'', ''Gardening succulents'', ''Desert hiking'', ''Karaoke'', ''Board game nights with friends'', ''Reading mystery novels'', ''DIY
    home improvement projects'']'
  career_goals: Marife aims to become a fully licensed journeyman technician and achieve NATE certification in HVAC. She aspires to move into a supervisory role within the next few years, overseeing a crew
    of installers and mechanics. Long‑term, she dreams of launching her own small‑business service company that offers reliable, community‑focused maintenance solutions in Imperial County, while also mentoring
    the next generation of skilled tradespeople.
