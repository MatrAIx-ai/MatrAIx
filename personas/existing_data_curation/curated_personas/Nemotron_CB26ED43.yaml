  career_goals: Indika aims to become a senior technical leader driving innovative, aesthetically‑driven electronics products, particularly in the smart‑home and wearable technology spaces. She aspires
    to lead a multidisciplinary design team at a forward‑thinking company in Columbus, championing user‑centred solutions that merge functionality with artistic expression. Parallel to her professional
    trajectory, she is committed to expanding diversity in STEM by establishing mentorship programs for South Asian women and under‑represented groups, and by speaking at industry conferences on the synergy
    between engineering and art. Over the next five years, she plans to earn a Professional Engineer (PE) license through experience‑based pathways, obtain advanced certifications in IoT and product design,
    and launch a community‑focused maker space that offers creative electronics workshops.
