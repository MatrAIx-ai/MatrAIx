  career_goals: Although she is not pursuing paid employment, Jamie aims to deepen her volunteer leadership by organizing a neighborhood community garden, mentoring younger volunteers at the Newark Food
    Bank, and expanding her knowledge of senior support services through short courses. She also hopes to improve her digital skills to stay connected with her family and to travel with her spouse to historic
    sites across the Northeast.
