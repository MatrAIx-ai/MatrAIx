  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Cooking'', ''Knitting/Crocheting'', ''Walking and Birdwatching'', ''Volunteer Work at Food Bank'', ''Local History Tours'',
