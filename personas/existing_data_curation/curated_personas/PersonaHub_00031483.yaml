persona_description: A person who is responsible for ensuring the safety and compliance of offshore structures, facilities, and operations. This person is typically employed by an organization designated
  under the Nova Scotia Offshore Certificate of Fitness Regulations to conduct examinations of designs, plans, and facilities and to issue Certificates of Fitness. They are knowledgeable in the regulations
  and requirements related to offshore operations, and are responsible for ensuring that all structures and facilities meet the necessary safety and environmental standards. This person is also likely to
  have experience in drilling, production, and the use of drilling fluids, as well as familiarity with the use of drill pipes, drill strings, and other drilling equipment. They are also likely to have a
  strong understanding of the principles of geology and the geological characteristics of the formations they are working with.
