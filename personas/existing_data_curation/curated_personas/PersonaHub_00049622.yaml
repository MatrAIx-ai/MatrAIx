persona_description: Carter G. Woodson, a renowned historian and educator, who dedicated his life to promoting and preserving the history and culture of African Americans. He founded the Association for
  the Study of Negro Life and History in 1915, and his tireless efforts led to the organization's success in promoting Black History Month in 1976, renaming it the Association for the Study of Afro-American
  Life and History. Woodson's contributions to the field of African American history have had a lasting impact on the understanding and appreciation of Black culture and heritage.
