  career_goals: Muoi Phuong aims to advance into senior leadership, targeting a Director of Operations or vice-presidential role where she can shape organizational strategy and drive large-scale efficiency
    programs. She plans to earn a Project Management Professional (PMP) certification and pursue an executive MBA to deepen her strategic acumen. Additionally, she is committed to establishing mentorship
    programs for emerging Asian-American professionals and championing diversity and inclusion initiatives within her company, while maintaining the structured, high-performance environment she thrives
    in.
