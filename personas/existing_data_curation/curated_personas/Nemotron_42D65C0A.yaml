  career_goals: Even at nine, Enesha dreams of becoming an artist who can translate feelings into colors and stories. She imagines a future as a visual illustrator, a children's book author, or a community
    muralist who brings joy to her neighborhood. She hopes her art will help other children express their emotions, especially those who feel anxiety or sadness, and she aspires to use her creativity to
    connect people across different backgrounds.
