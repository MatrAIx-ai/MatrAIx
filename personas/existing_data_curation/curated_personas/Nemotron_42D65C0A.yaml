personas:
  professional: Enesha Clark is a budding illustrator who channels their vivid imagination into watercolor sketches and spontaneous story ideas, thriving on creative freedom while often wrestling with the
    need for structure and deadlines.
  sports: Enesha Clark dabbles in after‑school soccer with the Fort Valley Little League and loves spontaneous dance‑offs to gospel and pop beats, while also cheering for the Atlanta Braves during family
    outings and eagerly anticipating the annual community 5K fun run.
  arts: Enesha Clark spends afternoons splashing watercolors while humming to gospel choir renditions of Kirk Franklin, idolizing the lively brushwork of Henri Matisse, the whimsical illustrations of Dr.
    Seuss, and the street‑art vibrancy of Keith Haring, often recreating those styles in their own sketchbook.
  travel: Enesha Clark loves weekend road trips to the historic squares of Savannah and the bustling Children’s Museum of Atlanta, dreams of exploring the natural trails of the Great Smoky Mountains, and
    hopes to someday stand in front of the Smithsonian’s National Museum of African American History in Washington, D.C.
  culinary: Enesha Clark delights in the aroma of simmering collard greens seasoned with smoked turkey and the buttery crunch of fresh cornbread, often assisting Mom in whisking batter, while also enjoying
    cheesy macaroni, juicy peach cobbler, and snacking on sweet strawberry slices.
  core: Enesha Clark is a vivid‑imagination‑driven 9‑year‑old who breathes color into watercolors, dances to gospel beats, and wrestles with intense anxiety that fuels both their creative spark and occasional
    mood swings.
background:
  cultural: Enesha is a Black girl growing up in Fort Valley, a small town in the historic Black Belt of Georgia. Her family values the close‑knit community spirit of Southern Black culture, including regular
    church gatherings, gospel music, and family storytelling traditions. She enjoys Southern comfort foods like collard greens and cornbread, and her household celebrates holidays with a blend of African
    American customs and local Southern flair. The rich musical heritage of the area—ranging from gospel choirs to modern hip‑hop—shapes her love of rhythm and dance. Community events, such as local art
    fairs and school performances, provide her with opportunities to see diverse expressions of Black creativity, reinforcing her appreciation for art and new ideas.
