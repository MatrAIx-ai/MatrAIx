personas:
  professional: A seasoned full‑stack engineer with three decades of experience, Angelique Judge leverages meticulous Java, Python, and React expertise to design cloud‑native AWS architectures while championing
    inclusive, structured Agile teams and mentoring mid‑career developers.
  sports: An avid hiker and community sports fan, Angelique Judge joins a weekly local hiking group traversing the Hudson Highlands, supports the New York Giants and the New York Rangers on game days, and
    schedules weekend bike rides to balance cardiovascular fitness with her love for the outdoors.
  arts: A dedicated community theatre enthusiast, Angelique Judge acts in and designs sets for local productions, draws inspiration from Lin‑Manuel Miranda’s storytelling and the classic plays of Arthur
    Miller, and often coordinates post‑show potluck gatherings featuring live music from local folk artists.
  travel: A planner who balances structured itineraries with occasional spontaneous getaways, Angelique Judge has explored historic sites in Washington, D.C., enjoyed a spring weekend in the Irish countryside
    to connect with family traditions, and aspires to visit Iceland’s geothermal spas and Japan’s cherry‑blossom festivals while staying within a moderate retirement budget.
  culinary: An enthusiastic home chef, Angelique Judge cultivates herbs and tomatoes in her garden to craft comforting dishes such as slow‑cooked beef pot roast, herb‑infused roasted vegetables, and a signature
    shepherd’s pie, while hosting monthly potluck dinners where friends sample her homemade apple crumble with cinnamon.
  core: Angelique Judge blends methodical engineering precision with a warm, community‑focused spirit, juggling leadership ambitions, anxiety management, and a love for theater, hiking, and hearty home‑cooked
    meals.
background:
  cultural: Angelique was raised in a middle‑class suburban neighborhood of New Jersey in an Irish‑American Catholic family. Her upbringing emphasized punctuality, community service, and a strong work ethic,
    values reinforced by her parents' careers in manufacturing and education. She celebrates traditional American holidays such as Thanksgiving and Fourth of July, and also observes cultural traditions
    like St. Patrick's Day. Living near Rutgers University and the diverse Greater New York metropolitan area has exposed her to a broad range of cultural perspectives, reinforcing her cooperative and inclusive
    outlook while maintaining a practical, structured approach to life.
