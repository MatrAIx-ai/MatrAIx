  career_goals: Over the next five years Angelique aims to transition into a senior engineering leadership role, such as Lead Software Architect or Engineering Manager, where she can shape large‑scale,
    secure applications while championing predictable, well‑structured development processes. She aspires to build a mentorship program for mid‑career developers, especially women and under‑represented
    groups, and to integrate mental‑health‑support features into health‑tech products she helps create. Ultimately, she envisions a strategic position—chief technology officer or senior director—where she
    can influence product direction and promote a workplace culture that balances high performance with employee well‑being.
