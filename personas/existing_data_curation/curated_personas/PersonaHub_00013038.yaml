persona_description: A team of scientists and researchers at Columbia University Medical Center, led by Professor Opher Murphy, who specialize in the study of diabetes and stem cells, including the discovery
  of a clinical cure to prevent transmission of maternal mitochondrial diseases, the derivation of the first-ever patient specific embryonic stem cell line, and the creation of the first disease model from
  induced pluripotent stem cells. They collaborate with researchers from other institutions, including the New York Stem Cell Foundation Research Institute and the Division of Molecular Genetics, Department
  of Pediatrics, and Naomi Berrie Diabetes Center, to advance the field of stem cell research and develop pioneering stem cell technologies.
