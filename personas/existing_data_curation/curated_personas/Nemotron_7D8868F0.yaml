personas:
  professional: Stephen Dotson is an inquisitive budding naturalist who blends his love of insects and rock collecting with his skill for constructing elaborate LEGO models, and they channel this curiosity
    into simple Scratch animations that document each discovery, balancing fresh ideas with reliable methods.
  sports: Stephen Dotson is an enthusiastic member of the Greenfield Youth Soccer Club, practicing drills after school and they cheer for the city’s professional baseball team, the River City Tigers, while
    also following the national soccer stars like Kylian Mbappé to inspire his own game.
  arts: Stephen Dotson is a creative comic‑strip enthusiast who sketches superhero adventures inspired by Spider‑Man and Batman, they admire the animation style of Pixar’s "Toy Story" and the bold colors
    of comic artist Jim Lee, and they bring these influences to life through Scratch projects and LEGO dioramas.
  travel: Stephen Dotson is an adventurous day‑tripper who loves weekend visits to the nearby state natural history museum and a recent family road‑trip to the Grand Canyon, they daydream about traveling
    to Disneyland and often plan impromptu bike rides to the local park, balancing excitement with the comfort of familiar routes.
  culinary: Stephen Dotson is a budding chef who delights in making cheesy pepperoni pizza slices and assembling peanut butter and jelly sandwiches, they enjoy helping their parent whisk together chocolate
    chip cookies with vanilla extract and brown sugar, and they proudly experiment with crunchy carrot sticks and hummus as a healthy snack.
  core: Stephen Dotson is a methodical micro‑explorer who balances a love for detailed LEGO constructions with an occasional habit of misplacing the tiniest pieces under the couch, yet they remain upbeat
    and cooperative in group projects.
background:
  cultural: Raised in a middle‑class white family in Downers Grove, Illinois, Stephen experiences typical Midwestern values such as politeness, community involvement, and a love for outdoor activities.
    Family traditions include Sunday gatherings, attending local festivals like the Downers Grove Summer Festival, and school events. He is exposed to a blend of American cultural icons—classic cartoons,
    baseball, and community service—while also learning respect for diverse neighbors in the multicultural DuPage County area.
