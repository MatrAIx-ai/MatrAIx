  career_goals: Billy aspires to move from managing a single facility to overseeing multiple sites as a regional director of operations within the next five years. He is driven to spearhead digital transformation
    initiatives that integrate innovative technologies into traditional manufacturing processes, positioning his company as a leader in efficiency and sustainability. Long‑term, he hopes to launch a community‑focused
    creative hub that blends his managerial expertise with his passion for art and innovation, providing mentorship and collaborative space for local entrepreneurs and artists.
