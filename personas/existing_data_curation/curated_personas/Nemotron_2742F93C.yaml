  career_goals: Alfonza aims to complete his GED within the next year and enroll in a community‑college program focused on graphic design or visual communications. He wants to build a professional portfolio
    that blends traditional illustration with digital media, eventually securing a role as a junior graphic designer for a creative agency or a digital content creator for a nonprofit. Long‑term, he envisions
    opening a community art studio in Bellflower where he can mentor younger teens, run workshops, and showcase local street‑art talent. He also aspires to earn scholarships that support students of color
    in the arts, using his education to provide financial stability for his family while staying true to his passion for creativity and community service.
