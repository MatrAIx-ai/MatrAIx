personas:
  professional: Alfonza Carter, a 16‑year‑old aspiring graphic designer, merges manga illustration, street‑art sketches, and basic video editing to craft compelling digital portfolios, leveraging their
    organized planning and collaborative tutoring experience to lead school projects and community art workshops.
  sports: Alfonza Carter plays pickup basketball at Oak Park in Bellflower, idolizes the Los Angeles Lakers and follows the LA Dodgers, participates in local youth leagues, and coaches basic drills for
    younger kids during community‑center sessions, using their reliable and cooperative nature to foster teamwork.
  arts: Alfonza Carter immerses in manga creation, street‑art influences from Banksy, and visual storytelling inspired by Katsuhiro Otomo, curates playlists featuring Miles Davis, Kendrick Lamar, and J
    Dilla, and draws inspiration from indie films like 'Moonlight' and documentaries on urban culture, shaping their artistic identity.
  travel: Alfonza Carter enjoys weekend trips to the beaches of Santa Monica, seasonal visits to San Diego’s Comic‑Con, dreams of a cultural immersion trip to Tokyo’s Akihabara for manga, and prefers budget‑friendly
    travel using public transit and staying with friends, balancing school obligations with wanderlust.
  culinary: Alfonza Carter loves sampling ramen with pork belly, tacos al pastor with pineapple, and homemade sushi rolls featuring avocado and spicy mayo, often cooking simple meals for themselves while
    experimenting with soy sauce and matcha in creative desserts.
  core: Alfonza Carter, a 16‑year‑old creative prodigy, blends manga artistry, basketball hustle, and community spirit, juggling school, side‑gig finances, and occasional late‑night sketch sessions, all
    while battling a penchant for skipping sleep.
background:
  cultural: Alfonza is an African‑American teenager raised in Bellflower, a diverse suburb of Los Angeles County. His family traces its roots to the Southern United States, bringing traditions of soulful
    cuisine, gospel music, and storytelling into the household. Growing up, he attended a local Baptist church, where weekly services and community events reinforced values of fellowship and service. The
    multicultural environment of Bellflower—home to vibrant Black and Latino neighborhoods—exposes him to a blend of West‑Coast hip‑hop, Latin rhythms, and emerging street‑art scenes. He celebrates cultural
    milestones such as Juneteenth and participates in neighborhood block parties that highlight African‑American history, dance, and cuisine. This rich tapestry of heritage and contemporary urban culture
    shapes his identity, artistic voice, and commitment to giving back to his community.
