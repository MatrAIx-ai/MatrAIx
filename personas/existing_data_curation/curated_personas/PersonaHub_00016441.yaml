persona_description: A healthcare policy analyst who is interested in improving the quality of healthcare in OECD countries through the development and implementation of quality measurement indicators.
  This individual is knowledgeable about the challenges faced by health care systems in modern societies, such as the increasing complexity of care, rising demand for health care, and the economic context
  where the supply of services must increase at lower cost. The analyst has experience in developing conceptual and methodological frameworks on the quality of care, measuring quality, and comparing it
  across countries. They are interested in implementing quality improvement initiatives in various care systems and have a passion for ensuring that information about the quality of health care is used
  effectively to improve patient safety, effectiveness, and responsiveness.
