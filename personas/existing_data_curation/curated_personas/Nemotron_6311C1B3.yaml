personas:
  professional: Sierra Edgerton, a 29‑year‑old auditor in Washington, D.C., combines solid accounting expertise—financial reporting, tax preparation, and internal controls—with a humanities‑driven curiosity,
    using Power BI visual storytelling and inventive problem‑solving to craft audit reports that highlight ethical and cultural dimensions for nonprofit and arts clients, and they pride themselves on bridging
    numbers with narratives.
  sports: Sierra Edgerton, an occasional runner who logs weekend 5‑k miles with the DC Road Runners club, follows the Washington Capitals in hockey, the Washington Wizards in basketball, and DC United in
    soccer, and they complement these fandoms with a flexible yoga practice that satisfies their spontaneous fitness style.
  arts: Sierra Edgerton immerses themself in DC’s vibrant arts scene, frequenting exhibitions by Kehinde Wiley, collecting limited‑edition prints by Shepard Fairey, sketching watercolors inspired by Monet
    and Basquiat, attending live performances of jazz saxophonist Kamasi Washington and improv shows at DC Improv, and they mentor young artists through community programs.
  travel: Sierra Edgerton favors spontaneous weekend food‑tour adventures through nearby historic neighborhoods like Old Town Alexandria and Philadelphia’s Italian Market, dreams of a month‑long cultural
    deep‑dive in Berlin’s museum island and Kyoto’s temple gardens, and they balance a limited travel budget by leveraging airfare‑watch alerts and flash‑sale deals.
  culinary: Sierra Edgerton, a budding home cook, delights in whipping up shrimp and grits seasoned with smoked paprika and collard greens, savors Ethiopian injera plates spiced with berbere, devours street‑style
    falafel wraps drizzled with tahini and pickled radish at DC night markets, and they occasionally splurge on a seven‑course tasting menu featuring miso‑glazed black cod.
  core: Sierra Edgerton blends an inquisitive auditor’s analytical rigor with an artistic flair, thriving on creative problem‑solving while habitually over‑committing to projects and racing against looming
    deadlines, and they often rely on late‑night coffee to power through.
background:
  cultural: Sierra was raised in a close‑knit African‑American family in Prince George’s County, where church, music, and community activism were central to daily life. Growing up near Washington, D.C.,
    she was exposed to a rich tapestry of Black history and contemporary cultural expression—from Juneteenth celebrations and Black History Month events to the vibrant murals and jazz clubs of the city.
    Her upbringing instilled a strong sense of resilience and collective responsibility, which she carries into her professional world. Sierra is actively involved in the National Association of Black Accountants
    and supports local Black arts initiatives, seeing her career as a platform to champion financial empowerment and cultural representation within her community.
