  career_goals: Sierra aims to become a CPA within the next two years and leverage that credential to move into a senior audit manager role at a mid‑size firm known for its work with nonprofit and cultural
    institutions. She is passionate about aligning financial stewardship with social impact, envisioning leadership of a specialized practice that provides audit and advisory services to arts organizations,
    museums, and community nonprofits. In the longer term, she aspires to attain a partner position or to launch her own consultancy that integrates financial rigor with creative strategy, promoting sustainable
    funding models for Black cultural initiatives. To support these ambitions, she plans to pursue an MBA focused on social entrepreneurship and deepen her expertise in ESG reporting.
