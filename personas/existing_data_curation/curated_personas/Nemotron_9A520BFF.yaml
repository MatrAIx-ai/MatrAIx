  career_goals: Alejandro dreams of a career that lets him combine his love for people, storytelling, and culture. He hopes to become a community radio host or a social media influencer who highlights Mexican-American
    life and youth issues in San Antonio. He is also interested in attending culinary school to become a chef who fuses traditional Mexican flavors with modern twists, possibly running a family food truck
    or appearing on a cooking show. Ultimately, he wants a role where he can share stories, engage audiences, and celebrate his heritage while applying practical skills.
