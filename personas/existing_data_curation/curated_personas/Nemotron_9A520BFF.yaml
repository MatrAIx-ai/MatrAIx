personas:
  professional: Alejandro Crespo is a budding teen content creator who combines his love for soccer, dance, and cooking into short TikTok videos, while also volunteering at local festivals to hone event-setup
    skills, showing a curious yet practical approach to learning new media tools despite a relaxed attitude toward deadlines.
  sports: Alejandro Crespo plays casual soccer with friends at the local park, cheering for San Antonio FC and dreaming of joining the youth academy, prefers spontaneous pick-up games over structured training,
    and sometimes forgets to stretch, which leads to occasional ankle twists.
  arts: Alejandro Crespo is a lively TikTok dancer who loves moving to Bad Bunny, J Balvin, and regional Mexican corridos, reads graphic novels like 'Saga' and 'Maus', and follows cooking podcasts featuring
    chefs like José Andrés, blending visual storytelling with rhythmic performance.
  travel: Alejandro Crespo enjoys weekend trips to the San Antonio River Walk and day-excursions to Austin's music scene, dreams of visiting Mexico City's historic center and the beaches of Puerto Vallarta,
    and prefers spontaneous travel plans with family over rigid itineraries, often using a travel-planning app that they open only when school projects require it.
  culinary: Alejandro Crespo helps in the kitchen making homemade salsa with tomatillos, jalapeños, cilantro, and lime, cooks chicken tinga tacos with corn tortillas and avocado, experiments with TikTok
    food trends like whipped coffee, and has a moderate cooking skill level that they showcase in short recipe videos.
  core: Alejandro Crespo is a sociable, talkative teen who fuses soccer, salsa-making, and TikTok storytelling into a vibrant daily routine, balancing curiosity with a laid-back, sometimes disorganized
    style, while wrestling with teenage worry and stress.
background:
  cultural: Alejandro is a first‑generation Mexican‑American raised in a close‑knit family in San Antonio's vibrant Mexican community. He speaks Spanish at home and celebrates traditions such as Día de
    los Muertos, Cinco de Mayo, and family gatherings featuring tamales, pozole, and other classic dishes. The bicultural environment blends respect for elders, communal harmony, and a love of music and
    dance, shaping his identity and influencing his social and creative pursuits.
