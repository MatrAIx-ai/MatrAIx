  hobbies: '[''Book club leadership'', ''Quilting'', ''Community theater acting'', ''Church choir singing'', ''Gardening'', ''Southern cooking'', ''Hiking'', ''Local history research'', ''Hosting potluck
    gatherings'', ''Senior center volunteering'', ''Nature photography'']'
  career_goals: She is working toward earning a Texas teacher certification and a master’s degree in Curriculum and Instruction within the next three years. Her long‑term ambition is to transition from
    a teaching assistant to a lead classroom teacher, eventually taking on a curriculum coordinator role where she can design inclusive, technology‑rich lessons for the district. She also hopes to launch
    a peer‑mentorship program that pairs upper‑grade students with younger learners, and to present workshops on effective classroom communication at regional education conferences.
