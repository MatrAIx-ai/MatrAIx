personas:
  professional: Elizabeth Butler, a 51-year-old educational support specialist at an elementary school, blends a decade of hands-on classroom assistance with a keen talent for literacy tutoring, Google
    Classroom integration, and calm behavior management, channeling their sociable, talkative demeanor into effective liaison work between teachers, parents, and volunteers while ensuring lesson designs
    balance innovative tech ideas with tried-and-true instructional methods.
  sports: Elizabeth Butler enjoys weekend hikes through the pine-forested trails near Gilmer, is a loyal fan of the Dallas Cowboys in football, follows the Houston Astros during baseball season, and joins
    a local seniors' walking club that combines social connection with moderate cardio fitness.
  arts: Elizabeth Butler leads a vibrant community book club where they passionately debate works from Jane Austen to Stephen King, performs in community theater productions, sings alto in the church choir,
    and captures the colors of seasonal festivals through nature photography inspired by Ansel Adams, often displaying their prints at local gatherings.
  travel: Elizabeth Butler prefers thoughtfully planned road trips that interlace adventure with relaxation, having explored the wildflower-laden Hill Country, the historic streets of Savannah, and the
    lively markets of Oaxaca, while dreaming of a future pilgrimage to the lavender fields of Provence once their master's program wraps up.
  culinary: Elizabeth Butler delights in garden-fresh ratatouille seasoned with basil and oregano they harvest themselves, slow-cooked brisket for Sunday potlucks, and seasonal heirloom tomato salads, while
    mastering the crisp crust of artisan apple pies that become the centerpiece of their community dinner parties.
  core: Elizabeth Butler, a talkative and community-oriented lifelong learner, balances a love of technology and tradition, occasionally overcommits to potluck planning, and thrives on nurturing both seedlings
    and students alike, using their natural charisma to rally others.
background:
  cultural: Elizabeth is a fourth‑generation White Texan from Gilmer, a small town in East Texas. She was raised in a close‑knit, Southern‑influenced community where church, family gatherings, and neighborly
    hospitality are central. Her upbringing emphasized respect for tradition, a strong work ethic, and a deep sense of civic responsibility. She regularly participates in local church events, regional fairs,
    and community service projects, reflecting the cultural values of generosity, modesty, and collective harmony that characterize many rural Texas communities.
attributes:
  skills: '[''Classroom assistance'', ''Literacy tutoring'', ''Technology integration'', ''Behavior management support'', ''Parent liaison'', ''Differentiated instruction facilitation'', ''Small-group instruction'',
