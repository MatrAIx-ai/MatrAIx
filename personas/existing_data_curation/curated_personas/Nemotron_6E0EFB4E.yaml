  hobbies: '[''Building blocks'', ''Shape‑sorting puzzles'', ''Reading picture books'', ''Singing nursery rhymes'', ''Dancing to music'', ''Playing at the park'', ''Pretend play with dolls'', ''Helping
    with simple cooking'', ''Attending library storytime'']'
  career_goals: Even at her young age, Maria often talks about wanting to help others and keep things orderly. She imagines becoming a teacher who reads stories to children, a nurse who cares for patients,
    or a community helper like a librarian. Her long‑term ambition is to grow into a role where she can organize events, support friends, and maintain a harmonious environment.
