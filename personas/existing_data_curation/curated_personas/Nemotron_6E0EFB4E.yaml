personas:
  professional: Maria, a two‑year‑old who instinctively organizes playtime, leads mini‑show‑and‑tell circles at preschool and arranges block towers in neat rows, and they display an early flair for systematic
    coordination and a love of routine.
  sports: Maria, a budding sports fan, cheers for the Los Angeles Dodgers while playing tee‑ball with the Rosamond Little League team every Saturday, and they eagerly sprint to the sandlot for a quick game
    of catch after each practice.
  arts: Maria, an enthusiastic little performer, belts out Raffi’s 'Baby Beluga', reenacts scenes from Pixar’s Toy Story with her stuffed cowboy, and they delight relatives by drawing crayon portraits of
    Woody and Buzz during family gatherings.
  travel: Maria, an adventurous stroller‑rider, loves family road trips to Lake Isabella’s calm waters, the vast dunes of Death Valley, and the sunny shores of Santa Barbara, and they always request a stop
    at the local donut shop for a fresh glazed treat before bedtime.
  culinary: Maria, a discerning toddler palate, savors buttery mac & cheese, chicken nuggets dusted with a pinch of paprika, and crunchy apple slices, and they love to help stir her mother’s banana muffin
    batter with a plastic spoon while occasionally stashing stray peas in her pocket.
  core: Maria, a calm, routine‑loving two‑year‑old, thrives on organized play, community smiles, and a steady stream of crayons, snacks, and family rituals, and they never miss a nap.
background:
  cultural: Maria comes from a white, middle‑class American family in Rosamond, California. Her upbringing reflects the close‑knit, suburban‑rural culture of Kern County, where community gatherings, church
    activities, and traditional holidays such as Thanksgiving, Christmas, and the Fourth of July are central. Family values emphasize routine, practicality, and caring for neighbors, which align with Maria’s
    organized, cooperative, and calm nature.
attributes:
  skills: '[''Following daily routines'', ''Early language development'', ''Cooperative play'', ''Methodical block building'', ''Memorizing songs and stories'', ''Calm attention to tasks'', ''Basic self‑care
