  hobbies: '[''Restoring vintage trucks'', ''Attending car shows'', ''Watercolor painting'', ''Visiting art galleries'', ''Playing guitar'', ''Fishing'', ''Barbecue hosting'', ''Dart league'', ''Kart racing'',
