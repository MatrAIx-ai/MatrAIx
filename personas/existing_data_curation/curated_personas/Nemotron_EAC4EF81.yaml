  career_goals: Jason aims to secure an entry‑level role in data analysis or project coordination where he can apply his analytical strengths and methodical approach. He aspires to deepen his expertise
    in data-driven decision making, obtain relevant certifications, and eventually take on responsibilities that blend strategy with implementation. Over the next five years, he envisions moving into a
    senior analyst or team lead position, using his collaborative and harmonious nature to foster supportive work environments, and possibly launching a small consulting venture that helps local nonprofits
    leverage data for community impact.
