  hobbies: '[''Soccer'', ''Competitive video gaming (Minecraft, Fortnite)'', ''LEGO building'', ''Reading adventure novels'', ''Hip‑hop dance classes'', ''Arts and crafts (painting, beadwork)'', ''Science
    club projects'', ''Exploring local parks and nature trails'']'
  career_goals: Even at ten, Marielle dreams of turning her competitive energy and love of structure into a future career. She envisions herself as a top‑level soccer player who leads a team, or as an engineer
    who designs practical solutions for everyday challenges. She also hopes to win science fairs and eventually study mechanical engineering or robotics, aiming to combine her critical thinking with hands‑on
    creation. In the short term, she wants to become the captain of her school’s soccer team and start a small weekend stall selling handmade crafts to friends and neighbors.
