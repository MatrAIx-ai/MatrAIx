personas:
  professional: A junior LEGO architect with a competitive edge, Marielle Carson builds intricate brick creations while organizing group build sessions, using their practical mindset to follow step‑by‑step
    instructions and their sociable nature to rally friends, even though they sometimes lose track of the parts due to a laid‑back approach to scheduling.
  sports: A spirited youth soccer player for the Midland United U‑10 team, Marielle Carson also attends hip‑hop dance classes at the Midland Dance Academy, combines competitive drive with a love for group
    play, though they occasionally forget to stretch before matches, and they cheer for the local high‑school football team, the Midland Mustangs.
  arts: 'An enthusiastic LEGO and jewelry crafter, Marielle Carson spends weekends designing custom bead bracelets while listening to pop‑rock hits from Imagine Dragons and Taylor Swift, reads the Percy
    Jackson series for adventure inspiration, and watches the animated film ''Spider‑Man: Into the Spider‑Verse'' for creative spark.'
  travel: An adventurous family traveler, Marielle Carson has explored the nearby Cedar Bluff Trail and a weekend camping trip to Lake Texoma, dreams of visiting Disney World in Florida and the historic
    castles of Scotland, but prefers short, budget‑friendly road trips that fit around school schedules.
  culinary: A budding kitchen helper, Marielle Carson loves munching on homemade mac and cheese, crafting fruit‑laden smoothies with strawberries, bananas, and spinach, and decorating cupcakes with rainbow
    sprinkles; they often forget to wash hands before cooking, a quirky habit they’re learning to curb.
  core: Marielle Carson is a competitive, socially‑savvy 10‑year‑old who blends structured LEGO building with spontaneous soccer games, balances a playful allowance habit with a habit of misplacing chores,
    and thrives on creative challenges while occasionally overlooking details.
background:
  cultural: Marielle grows up in Midland, Texas, a community shaped by the oil industry, ranching heritage, and strong ties to Southern Baptist traditions. Her family celebrates classic Texas customs such
    as BBQ gatherings, country music concerts, and local rodeos, while also participating in church events and school festivals. The region’s emphasis on hard work, community support, and pride in Texan
    identity influences her worldview, encouraging a balance of independence and belonging. Exposure to both the wide‑open West Texas landscape and a close‑knit neighborhood gives Marielle a blend of town‑centric
    friendliness and appreciation for the expansive, rugged outdoors.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Teamwork and informal leadership'', ''Strategic gaming (Minecraft, Fortnite)'', ''Basic coding with Scratch'', ''Arts and crafts (painting,
