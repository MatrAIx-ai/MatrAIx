personas:
  professional: Ethan Mayeux, a 41‑year‑old logistics specialist, leverages his meticulous inventory tracking, ERP‑driven order entry, and forklift certification to streamline warehouse operations, while
    his competitive streak drives him to exceed accuracy metrics and positions him for a future lead inventory manager role.
  sports: Ethan Mayeux channels his competitive nature into the local bowling league, cheers on the Chicago Bears and St. Louis Cardinals during football and baseball seasons, and spends early mornings
    on the lake fishing for bass, treating both pursuits as disciplined, routine‑driven workouts.
  arts: Ethan Mayeux finds creative release in woodworking while listening to classic rock icons like Bruce Springsteen and the storytelling lyrics of Johnny Cash, occasionally attends community‑theater
    productions of classic American plays, and appreciates the craftsmanship of folk painter Grant Wood.
  travel: Ethan Mayeux prefers well‑planned road trips that combine his love of fishing and vintage trucks, such as a weekend drive to Lake of the Ozarks to cast for catfish, and dreams of a cross‑country
    Route 66 tour that would let him document pit stops in a precise journal.
  culinary: Ethan Mayeux enjoys hearty Midwestern fare, often cooking the trout he catches with a lemon‑butter glaze, perfecting a slow‑cooked BBQ brisket seasoned with smoked paprika, and whipping up rustic
    biscuits using his own flour blend, all while favoring simple, no‑fuss cooking methods.
  core: Ethan Mayeux is a methodical, competition‑driven warehouse veteran who balances hands‑on hobbies, disciplined finances, and pragmatic routines into a steady, self‑reliant life at 41.
background:
  cultural: Ethan grew up in a middle‑class, white, Midwestern family in the Rockford area. His heritage includes French‑Canadian roots, reflected in the family name Mayeux, and a Catholic upbringing that
    emphasizes community, hard work, and family values. The cultural norms of Machesney Park—practicality, reliability, and a strong sense of neighborhood—have shaped his outlook. He values traditional
    customs, such as family gatherings, church involvement, and local sports fandom, while also embracing the region’s modest, no‑frills approach to life.
attributes:
