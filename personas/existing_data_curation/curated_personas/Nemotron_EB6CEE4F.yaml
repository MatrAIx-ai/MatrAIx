  career_goals: Neyla aims to move from a material mover role into a supervisory position within the next two years, targeting a shift‑lead or logistics coordinator role. She plans to earn OSHA certification
    and a certificate in supply‑chain management through a community college program, leveraging her love of learning and abstract thinking to redesign warehouse workflows. Long‑term, she envisions opening
    a small art‑focused community space where she can mentor at‑risk youth, combining her compassion for helping others with her passion for creativity.
