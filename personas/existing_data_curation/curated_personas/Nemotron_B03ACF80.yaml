  career_goals: To channel his business acumen and sociable nature into a career that revitalizes the local economy, Dewayne aims to launch a consulting practice that supports small businesses and startups
    in the Berkshires. He aspires to obtain a Project Management Professional (PMP) certification within the next year, and eventually take on a leadership role as a Community Development Manager for Berkshire
    County. His long-term ambition includes serving on the Pittsfield City Council to influence policies that foster sustainable growth, while mentoring emerging entrepreneurs and promoting regional collaboration.
