persona_description: A professional manager who is responsible for setting and achieving organizational objectives through strategic planning, operational planning, and functional planning. The manager
  has experience in setting and implementing long-term, medium-term, and short-term plans, and has expertise in selecting the most appropriate alternative, budgeting, and following up actions. The manager
  also has knowledge of corporate planning, operational planning, and functional planning, and has experience in formulating derivative plans and setting standards. The manager is skilled in using procedures,
  methods, rules, and schedules to achieve organizational goals, and is familiar with budgets and project management. The manager has a deep understanding of the organization's competitive environment and
  is able to develop strategies and policies that align with the organization's objectives.
