  career_goals: Jacob aims to advance from his current surveillance role to a supervisory position within the casino security department within the next three to five years. He plans to obtain professional
    certifications such as the Certified Protection Professional (CPP) and the Certified Surveillance Operator (CSO) to strengthen his credentials. Long‑term, he envisions moving into risk‑assessment consulting,
    leveraging his practical experience and growing expertise in data‑driven surveillance technologies. Jacob also hopes to enroll in community college courses in criminal justice and cybersecurity to broaden
    his skill set while maintaining his reliable work ethic and balanced approach to new responsibilities.
