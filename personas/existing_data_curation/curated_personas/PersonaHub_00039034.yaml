persona_description: A financial expert who is concerned about the potential risks associated with large and interconnected financial institutions. They are particularly interested in the ways in which
  these institutions can fail and the consequences of their failure, particularly in terms of the impact on the economy and the wider financial system. They are also interested in the ex ante and ex facto
  policies that are put in place to mitigate the risks associated with these institutions and the accountability issues that arise when these institutions fail.
