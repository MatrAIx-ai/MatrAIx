  career_goals: Although still a toddler, Nancy often talks about wanting to help animals and imagines herself as a veterinarian or a kind teacher for younger kids. She is currently focused on mastering
    writing her name, dressing herself, and gaining more independence, viewing each new skill as a step toward her future dream of caring for others.
