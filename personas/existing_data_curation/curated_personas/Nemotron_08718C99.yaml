personas:
  professional: Gary Knapp, an aspiring robotics hobbyist who blends sci‑fi curiosity with practical tinkering, writes and debugs Arduino code while methodically documenting projects, balancing his love
    for new ideas with a reliable, organized workflow.
  sports: Gary Knapp, a basketball enthusiast who plays guard for his school's intramural league, idolizes the Los Angeles Lakers and follows NBA highlights on ESPN, while also joining a local youth sports
    club that offers after‑school strength drills, balancing teamwork with his love for solitary coding breaks.
  arts: Gary Knapp, an acoustic folk guitarist who often performs Bob Dylan and Mumford & Sons ballads at family gatherings, while his love for sci‑fi novels by Isaac Asimov and Arthur C. Clarke fuels his
    imagination and shapes his artistic taste.
  travel: Gary Knapp, a curious teen traveler who has visited the Kennedy Space Center in Florida and plans to attend the International Robot Expo in Shenzhen, prefers structured day trips with a blend
    of educational tours and spontaneous park stops, navigating family budget constraints.
  culinary: Gary Knapp, a budding cook who enjoys crafting pepperoni pizza at home, experimenting with sushi rolls after watching YouTube tutorials, and snack‑prepping protein granola bars for his robotics
    club, though he often forgets to eat breakfast before school.
  core: Gary Knapp is a 14‑year‑old science‑obsessed, guitar‑playing, basketball‑loving teen who balances curiosity and practicality, juggling solo projects with community service while occasionally forgetting
    to sleep.
background:
  cultural: Gary was raised in Matherville, a small farming community in Mercer County, Illinois. His family’s heritage reflects a typical Midwestern white background, with values centered on hard work,
    self‑reliance, and community involvement. He grew up attending a local public school and a Protestant church, participating in town events such as county fairs, barn dances, and community service drives.
    The rural environment exposed him to agriculture, local traditions, and a strong sense of neighborliness that shape his cooperative and pragmatic outlook.
