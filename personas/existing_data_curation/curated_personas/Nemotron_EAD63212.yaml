personas:
  professional: Linda Geer is a seasoned food-service operations manager in Southeast Alaska who leverages meticulous inventory control, staff scheduling expertise, and a collaborative, energetic leadership
    style to introduce sustainable, locally sourced menus while mentoring teams toward regional director aspirations.
  sports: Linda Geer is a keen outdoor athlete who hikes the Tongass National Forest trails, kayaks the pristine waterways each summer, plays in the Craig Outdoor Club’s kayaking league, and cheers for
    the Alaska Anchorage Seawolves hockey team during the winter season.
  arts: Linda Geer cultivates artistic outlets through wildlife photography inspired by Ansel Adams, folk-contemporary dance classes set to music by Sufjan Stevens, a book club that devours novels by Barbara
    Kingsolver, and evenings of knitting while listening to the folk duo The Milk Carton Kids.
  travel: Linda Geer plans adventure-focused trips with detailed itineraries, having trekked Glacier Bay’s fjords, explored Skagway’s historic district, and now yearning to photograph Iceland’s volcanic
    landscapes, all while balancing family commitments and budgeting for modest, eco-friendly travel.
  culinary: Linda Geer experiments in the kitchen with Alaskan king salmon cedar-plank, hand-crafted herring roe pâté, birch-syrup glazed carrots, and cloudberry vinaigrette, skillfully blending New Nordic
    techniques with locally foraged mushrooms and seaweed while occasionally over-seasoning in pursuit of bold flavors.
  core: Linda Geer is an organized, sociable food-service leader whose love for wilderness, dance, and kitchen gadgets fuels a community-centric vision, even as they sometimes forget to turn off the stove
    after a bustling dinner service.
background:
  cultural: Linda is a white Alaskan who grew up in the Pacific Northwest before moving to Craig in her early twenties. She embraces the close-knit, self-reliant spirit of rural Alaska while honoring the
    region's Indigenous heritage through participation in cultural festivals and supporting local Native-owned food suppliers. Her family background includes Scandinavian and German ancestry, which influences
    her appreciation for hearty, seasonal meals and community celebrations. Living in a remote area has fostered a strong sense of community responsibility and respect for the natural environment.
attributes:
  skills: '[''Food service operations management'', ''Menu development and seasonal sourcing'', ''Cost control and budgeting'', ''Inventory management'', ''Staff scheduling and training'', ''Customer service
    excellence'', ''Conflict resolution'', ''Safety and sanitation compliance'', ''POS and inventory software proficiency'']'
  hobbies: '[''Hiking and trail exploration'', ''Kayaking and wildlife photography'', ''Community volunteer work (fish fry, potlucks)'', ''Experimental home cooking'', ''Book club membership'', ''Knitting'',
    ''Weekend dance classes'']'
  career_goals: Linda aims to advance to a regional food service director role overseeing multiple establishments across Southeast Alaska, where she can mentor other managers and champion sustainable sourcing
    practices. She is also working toward earning a Certified Professional Food Manager (CPFM) credential and plans to complete a short-term culinary program to deepen her cooking expertise. Long-term,
    she dreams of opening a community-focused café that doubles as a gathering place for locals and visitors, featuring a menu that showcases Alaskan ingredients and cultural collaborations with Indigenous
    partners.
