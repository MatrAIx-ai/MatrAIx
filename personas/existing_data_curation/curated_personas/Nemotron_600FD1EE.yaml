  career_goals: Amelia’s ambitions focus on continued personal growth and community impact rather than paid employment. She aims to deepen her involvement with the El Monte senior center, aspiring to a
    leadership role in its food‑distribution program. To broaden her reach, she plans to master digital publishing tools and launch a blog that shares her gardening tips, recipes, and family‑history stories.
    She intends to complete a certificate in senior health advocacy offered by a local community college, enabling her to mentor peers on navigating healthcare resources. Another goal is to compile her
    ancestry research into a printed memoir for her grandchildren, preserving a tangible family legacy. Throughout, she seeks to stay self‑sufficient, remain intellectually curious, and leave a lasting
    positive imprint on her community.
