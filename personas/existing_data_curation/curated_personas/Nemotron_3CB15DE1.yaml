  career_goals: While still active, Emily aims to transition from formal auditing to a community advisory role, offering pro‑bono financial guidance to local nonprofits, senior services, and small farms.
    She wishes to mentor the next generation of accountants through workshops at the local community college and through the IRS Volunteer Income Tax Assistance program. She hopes to author simple guides
    on financial stewardship for seniors, ensuring her knowledge leaves a lasting impact. Additionally, she aspires to continue learning about emerging cloud‑based accounting tools, integrating them into
    her volunteer work, and to maintain a balanced, relaxed pace that honors her love of flexibility and social connection.
