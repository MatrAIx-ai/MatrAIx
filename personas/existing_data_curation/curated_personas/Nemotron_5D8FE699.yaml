  hobbies: '[''Reading Spanish literature'', ''Gardening'', ''Hiking'', ''Nature photography'', ''Knitting'', ''Crossword puzzles'', ''Cooking Spanish cuisine'', ''Classical guitar listening'']'
  career_goals: Irma aspires to advance to senior operations management, overseeing multiple regional sales units and integrating her expertise in education to shape corporate learning and development strategies.
    She aims to drive data‑driven process improvements, champion mentorship and diversity initiatives, and eventually assume a Director of Sales Enablement or Learning & Development role where she can influence
    organizational culture and performance at a strategic level.
