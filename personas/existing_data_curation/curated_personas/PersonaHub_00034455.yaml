persona_description: A Reformer who was deeply committed to the principles of the Reformation, particularly the doctrines of predestination and the organization and discipline of Protestantism. He was known
  for his practical approach to theology and his ability to organize and discipline the fledgling Protestant movement. His works, including his commentaries and the Institutes of the Christian Religion,
  were highly regarded and had a significant impact on the development of Protestant theology and the establishment of the Reformed world.
