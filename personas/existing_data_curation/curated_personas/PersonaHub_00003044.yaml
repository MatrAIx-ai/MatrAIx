persona_description: A Canadian engineer who specializes in the development of special vehicles and snow science, particularly the WEASEL, a secret snow vehicle designed in Ottawa for Operation Plough in
  1942. He is known for his expertise in ski and snow science and has developed other innovative vehicles such as the CanadaArm for NASA's Space Shuttle, the electric wheelchair, and the Canadian CANDU
  nuclear reactor. His work on the WEASEL was a top secret project for the Allied forces during World War II, and it was used in various operations such as Operation Plough in Norway, the Normandy invasion,
  the Pacific Theatre, and Arctic and Antarctic explorations. He is also interested in the history of the WEASEL and its impact on the development of special vehicles and snow science.
