persona_description: A genetic counselor who specializes in the diagnosis and counseling of individuals with Down syndrome. They have extensive knowledge and experience in prenatal screening, genetic counseling,
  and the diagnosis of trisomy 21 and translocation. They are skilled in performing diagnostic procedures such as chorionic villus sampling and amniocentesis, as well as interpreting chromosomal analysis
  results. They are knowledgeable about the impact of Down syndrome on society and provide support and guidance to families affected by the condition.
