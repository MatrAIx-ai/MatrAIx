personas:
  professional: Evens Mccray, a seasoned building inspector in Austin County, combines deep knowledge of the International Building Code and Texas Accessibility Standards with a sketch artist's eye for
    structural detail, delivering clear inspection reports while mentoring contractors and driving toward a future as a Certified Building Official leading a sustainability-focused inspection team.
  sports: Evens Mccray, an avid weekend hiker with the Austin County Trail Riders, faithfully follows the Dallas Cowboys and Houston Astros, and occasionally joins a local recreational softball league,
    balancing a love of outdoor cardio with sporadic gym sessions when inspection deadlines allow.
  arts: Evens Mccray, who spends evenings sketching historic Austin storefronts, curates a growing collection of Ansel Adams-inspired black-and-white photography, draws narrative inspiration from Octavia
    Butler and Isaac Asimov, and regularly showcases mixed-media pieces at the Austin Art Walk alongside performances by local jazz saxophonist Maya Jane Coles.
  travel: Evens Mccray, a meticulous planner who maps weekend road trips to Hill Country vineyards and occasional solo pilgrimages to Barcelona's Sagrada Familia for its daring architecture, balances a
    modest travel budget by staying in boutique B&Bs and often swaps structured itineraries for spontaneous hikes in the Rio Grande Valley when time permits.
  culinary: Evens Mccray, a self-taught home chef who blends Tex-Mex barbecue with Southeast Asian flavors - crafting brisket kimchi tacos and jalapeno-infused pho - prides themselves on mastering the perfect
    smoky char while still occasionally over-salting a stew in the pursuit of bold taste.
  core: Evens Mccray, a 39-year-old building inspector with a painter's eye, a sci-fi imagination, and a penchant for green-focused DIY projects, navigates life by sketching solutions, budgeting creativity,
    and hiking toward sustainable horizons.
background:
  cultural: Evens grew up in a close‑knit African‑American community in the Greater Houston area, where family, church, and community bonds shaped her values. Her parents—a mother who taught elementary
    school and a father who worked as a carpenter—instilled a strong work ethic, respect for education, and pride in her heritage. She regularly participates in local Juneteenth celebrations, church gatherings,
    and Black cultural events in Bellville, and she maintains ties to the broader Texas African‑American tradition of storytelling, music, and cuisine. As a member of the National Association of Minority
    Contractors and a volunteer with the local community centre, she actively supports initiatives that uplift Black youth and promote representation in the construction trades. Her cultural background
    informs her commitment to mentorship, community service, and the integration of African‑American artistic expression into her creative pursuits.
attributes:
  skills: '[''Building code interpretation (International Building Code, Texas Accessibility Standards)'', ''Structural, fire, and safety inspections'', ''Inspection report writing'', ''Digital inspection
    tools (handheld scanners, Bluebeam Revu, PlanSwift)'', ''Basic AutoCAD drafting and plan review'', ''GIS mapping for site analysis'', ''Project coordination and documentation'', ''Training and mentorship
    of junior inspectors and contractors'', ''Community outreach on building safety'', ''Sketching and visualizing construction details'']'
  hobbies: '[''Painting and sketching architectural forms'', ''Reading science fiction and philosophy'', ''Creative writing (short stories)'', ''DIY home improvement projects'', ''Gardening'', ''Photography
    of historic buildings and natural scenery'', ''Attending local art and cultural festivals'', ''Cooking fusion cuisine'', ''Hiking in the Texas Hill Country'', ''Mentoring youth in construction trades'']'
  career_goals: Evens aims to become a Certified Building Official and take on supervisory responsibilities within the Austin County Building Department. She envisions leading a team of inspectors, developing
    more efficient inspection workflows, and integrating sustainable building practices into local code enforcement. In the long term she aspires to launch a consulting firm that advises small contractors
    on green construction, code compliance, and innovative design, while also creating mentorship programs for underrepresented youth interested in the trades.
