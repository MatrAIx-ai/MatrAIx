personas:
  professional: Jessica Cleary is a disciplined roofer who excels at precise measurement, OSHA safety compliance, and on‑site organization, and they channel their competitive edge into streamlining crew
    workflows while pursuing journeyman certification within two years.
  sports: Jessica Cleary tackles weightlifting at the Iron Forge CrossFit box and joins the Summit Striders trail‑running club for weekend mountain runs, while cheering on the Seattle Seahawks in football
    and the Boston Celtics in basketball, and they demonstrate a competitive and disciplined approach to personal fitness and team sports fandom.
  arts: Jessica Cleary relaxes by playing acoustic guitar, often covering John Mayer’s 'Gravity' and Ed Sheeran’s 'Shape of You', while attending intimate open‑mic nights featuring local folk artists such
    as Sarah Jarvis, and they keep a modest collection of vintage vinyl from Bob Dylan and The Lumineers that shapes their creative downtime.
  travel: Jessica Cleary prefers meticulously planned road trips that blend outdoor adventure with sustainable design research, having explored Yellowstone’s geysers, the Rocky Mountains’ high‑altitude
    trails, and Austin’s music scene on a modest budget, and they dream of a future study tour of Copenhagen’s innovative green roofing projects.
  culinary: Jessica Cleary, an adept home cook, favors high‑protein meals such as grilled salmon with quinoa and roasted sweet potatoes, often spicing up a hearty chili con carne with jalapeños and black
    beans, and they relish crafting crisp avocado toast with lime zest for post‑run breakfasts.
  core: Jessica Cleary blends a fiercely competitive spirit with a love for solitary precision, obsessively cataloguing tools and workouts while secretly indulging in late‑night indie guitar sessions, making
    them a disciplined dreamer who trusts structure over spontaneity as they navigate each day.
background:
  cultural: Jessica was raised in Brownsville, Pennsylvania, a small, close‑knit, working‑class community in Fayette County. Her family’s tradition in skilled trades and the region’s pragmatic, self‑reliant
    culture have instilled a strong work ethic and respect for craftsmanship. The local culture blends Appalachian hospitality with a down‑to‑earth, no‑frills attitude, shaping Jessica’s practical, organized,
    and disciplined outlook.
attributes:
  skills: '[''shingle installation'', ''roof deck framing'', ''measurement and layout'', ''material estimation'', ''OSHA safety compliance'', ''team coordination'', ''on‑site organization'', ''blueprint
    reading'', ''basic carpentry'', ''business administration basics'']'
  hobbies: '[''Sudoku puzzles'', ''jigsaw puzzles'', ''woodworking'', ''weightlifting'', ''trail running'', ''reading technical manuals'', ''acoustic guitar'', ''community clean‑up volunteering'']'
  career_goals: Jessica aims to become a certified journeyman roofer within the next two years, then advance to foreman to lead crews on larger commercial projects. She plans to complete her associate degree
    in construction management, obtain Green Roofing certification, and eventually launch her own roofing contracting business focused on sustainable, energy‑efficient roofs. Long‑term, she hopes to mentor
    other young women entering the trades.
