  hobbies: '[''Sketching'', ''Creative writing'', ''Piano practice'', ''Theater acting'', ''Debate club'', ''Game coding'', ''Event organization'', ''Music curation'', ''VR art exploration'', ''Journaling'']'
  career_goals: Juanita aims to enroll in a specialized arts high school and later earn a degree in Graphic Design or Film Production. She dreams of becoming a creative director or multimedia storyteller
    who blends visual art, narrative, and technology to produce immersive experiences. Winning national art competitions and securing a scholarship for her innovative projects are key milestones on her
    path.
