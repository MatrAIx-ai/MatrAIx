personas:
  professional: Juanita Su is an aspiring interactive storyteller who merges fantasy writing, character sketching, and simple game coding to craft narrative‑driven mobile games for classmates, directing
    school coding clubs and theater productions with meticulous planning and a flair for the spotlight, and they thrive on audience applause.
  sports: Juanita Su channels competitive energy into leading the Dover High cheer squad and competing in cross‑country meets, while avidly following the Cleveland Browns, Cincinnati Reds, and Ohio State
    Buckeyes, and they never miss a Saturday night high‑school football game despite balancing late‑night rehearsals.
  arts: Juanita Su blends sketching anime‑inspired characters with fantasy world‑building, performs lead roles in school theater, practices piano pieces by Ludovico Einaudi, and curates eclectic playlists
    featuring Billie Eilish, Olivia Rodrigo and K‑pop group BTS, while immersing themselves in virtual‑reality installations by Marshmallow Laser Feast.
  travel: Juanita Su alternates between weekend family road trips to Cincinnati’s zoo and Cedar Point amusement park and a school field trip to Washington, D.C., while dreaming of wandering Tokyo’s neon
    districts to experience anime culture, balancing these adventures with limited pocket money saved in a custodial account.
  culinary: Juanita Su favors comforting mac and cheese, indulgent apple pie at hometown fairs, and experimental butter‑infused ramen, often cooking while listening to a self‑curated lo‑fi piano playlist
    and occasionally attempting a traditional corned‑beef and cabbage stew shared during holiday gatherings.
  core: Juanita Su melds a vivid fantasy imagination and razor‑sharp organization to dominate school debates and theater stages, yet wrestles with intense anxiety that fuels nightly journaling and spontaneous
    playlist curation.
background:
  cultural: Juanita is a White adolescent from Dover, Ohio, raised in a middle‑class family with German‑Irish roots. Her upbringing reflects typical Midwestern traditions—community fairs, high‑school football
    games, holiday gatherings, and church events—while her school and online exposure introduces her to broader artistic and cultural influences.
