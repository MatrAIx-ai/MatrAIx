persona_description: A water resource management expert who specializes in the assessment and development of water sources in refugee situations. They are familiar with the guidelines and best practices
  outlined in the Water Manual for Refugee Situations, particularly in terms of physical protection, data collection, and the development of new sources. They have a deep understanding of the importance
  of rainwater, groundwater, and municipal or private systems in terms of quality and are skilled in the treatment and disinfection of surface waters. They are also adept at assessing and collecting relevant
  data on water sources and regions, and are able to use this information to create a databank that can be used for planning and implementing longer-term water supply systems.
