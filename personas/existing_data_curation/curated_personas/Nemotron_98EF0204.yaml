  career_goals: Kenny’s imagination is guided by his love of helping others, his fascination with technology, and his enjoyment of being in the spotlight. He frequently tells his classmates that he wants
    to become a teacher who uses interactive coding tools to make lessons fun, and he also dreams of joining the local fire department one day, using drones and computer simulations to keep his community
    safe. Space and science captivate him, so he sometimes pictures himself as an astronaut conducting experiments in orbit. In the short term, he aims to be elected class tech captain, lead his soccer
    team as captain, and win the school science fair with a project that blends Scratch programming and a simple robot. These goals reflect his blend of curiosity, practicality, organization, and sociability.
