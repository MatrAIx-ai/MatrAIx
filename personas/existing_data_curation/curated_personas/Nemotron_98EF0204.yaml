personas:
  professional: Kenny Hollis is a junior tech explorer who spends school hours mastering Scratch coding, building intricate LEGO cityscapes, and leading group projects, showcasing their practical curiosity,
    organized yet flexible approach, and natural charisma as a peer mentor.
  sports: Kenny Hollis loves playing as a striker for the Yukon Lightning U-9 soccer league, inventing new game variations at recess, cheering for the local high school Eagles football team on Friday nights,
    and admiring the Oklahoma City Energy FC for inspiration.
  arts: Kenny Hollis shines on stage with the school drama club, delighting classmates by reciting Robert Frost poems and performing as the lead in the iconic musical The Lion King, while drawing inspiration
    from classic Disney singers like Julie Andrews and idolizing young actors such as Millie Bobby Brown.
  travel: Kenny Hollis enjoys weekend family camping trips to the Ouachita National Forest, explores the Tulsa Zoo during school field days, dreams of a road trip to the Grand Canyon, and prefers organized
    itineraries with plenty of nature hikes and snack breaks, balancing a modest allowance with parental guidance.
  culinary: Kenny Hollis delights in mac and cheese and chicken nuggets, proudly helps stir batter for chocolate chip cookies, favors crunchy carrot sticks and apple slices as snack staples, and can name
    the secret ingredient—cheddar—in their favorite homemade pizza.
  core: Kenny Hollis is a curious, calm, and talkative 8-year-old who blends practical LEGO building with imaginative Scratch coding, loves leading games and performances, and balances disciplined saving
    with occasional candy splurges.
background:
  cultural: Kenny was raised in a predominantly white suburban community in Yukon, Oklahoma County, where family, school, and neighborhood ties are strong. The local culture places a high value on participation
    in school activities, community events such as the county fair, and outdoor recreation like bike rides and weekend hikes. His family celebrates traditional American holidays—Thanksgiving, Christmas,
    and the Fourth of July—with gatherings, fireworks, and communal meals, and they often attend a local church that emphasizes service and fellowship. Growing up in central Oklahoma, Kenny has been exposed
    to a blend of Midwestern values—politeness, hard work, and a respect for nature—and enjoys the region’s love of high school sports, especially football and soccer, which are community focal points.
    These influences have fostered his sociable nature, his appreciation for organized community activities, and his calm, resilient outlook.
