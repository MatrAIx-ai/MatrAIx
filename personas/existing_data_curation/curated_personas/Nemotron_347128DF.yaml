personas:
  professional: James Mulligan is a self-taught IT support technician who thrives on rapid hardware fixes and Linux command-line scripting, yet they often sidetrack from rigid ticket deadlines to improvise
    creative workarounds, aiming to earn CompTIA A+, Network+ and CCNA certifications before launching a boutique consulting studio.
  sports: James Mulligan joins a weekly Minneapolis basketball pick-up league on Saturdays, cheering for the Minnesota Timberwolves and the Minnesota United FC whenever possible, they blend competitive
    drive with social camaraderie, and maintain a modest home workout routine of bodyweight circuits to counterbalance their desk-bound tech job.
  arts: James Mulligan channels creative energy into producing hip-hop beats on FL Studio, sampling J Dilla and Kendrick Lamar while layering synths inspired by cyberpunk soundtracks, they also sketch downtown
    street scenes during walks and unwind by devouring William Gibson's Neuromancer, illustrating a blend of digital and analog artistic expression.
  travel: James Mulligan prefers spontaneous weekend road trips to Minnesota's North Shore and occasional budget flights to Tokyo's Akihabara for tech expos, they plan itineraries loosely on a note-taking
    app, balancing the thrill of last-minute deals with the anxiety of overspending, and dream of a future cross-country tour of co-working spaces to scout potential consulting clients.
  culinary: James Mulligan's culinary routine toggles between quick ramen with homemade miso broth and energy-dense protein smoothies while they experiment with spiced chicken tacos after watching street-food
    vloggers, and on gaming nights they indulge in pepperoni pizza and craft coffee, revealing a pragmatic palate that still craves occasional flavor adventures.
  core: James Mulligan is a 23-year-old tech hobbyist whose relentless quest for structure clashes with spontaneous PC builds, competitive gaming, and a nervous habit of late-night beat-making that fuels
    both creative fire and anxiety-driven overthinking.
background:
  cultural: James grew up in North Minneapolis, a community with deep African‑American roots and a rich tradition of music, activism, and neighborhood solidarity. His family maintains ties to Southern Black
    culinary traditions, often gathering around soulful dishes that reinforce intergenerational storytelling. He was raised attending a local church, where gospel music and community service shaped his
    sense of resilience and collective responsibility. The multicultural fabric of Minneapolis—its festivals, public art, and vibrant music scene—has influenced James's appreciation for diverse artistic
    expressions, while his experiences as a Black young adult in the Midwest inform his cautious approach to trust and his drive to succeed in a competitive professional landscape.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Software installation and configuration'', ''Basic networking (LAN/Wi‑Fi setup)'', ''Linux command‑line operations'', ''Python scripting for automation'',
    ''Remote desktop and help‑desk support'', ''Customer service and technical communication'']'
  hobbies: '[''Custom PC building'', ''Strategy and RPG video gaming'', ''Urban balcony gardening'', ''Hip‑hop beat production'', ''Recreational basketball'', ''Reading science‑fiction novels'', ''Sketching
    street photography'']'
  career_goals: James aims to deepen his technical credentials by obtaining CompTIA A+ and Network+ certifications within the next year, followed by a Cisco CCNA to transition into network engineering.
    He envisions moving from a frontline support role to a specialist position where he can design and implement secure network solutions for small businesses. In the longer term, James is motivated to
    start his own tech‑consulting boutique that offers on‑site troubleshooting and custom PC builds, leveraging his competitive drive and desire for autonomy while providing a stable, structured environment
    that mitigates his anxiety about unpredictable work conditions.
