  career_goals: Maria aims to complete a Bachelor of Science in Mechanical Engineering within the next three years through evening courses while continuing her full‑time engineering role. She plans to obtain
    her Professional Engineer (PE) license, lead innovative product development projects in the aerospace or renewable‑energy sector, and eventually launch her own consultancy that helps small manufacturers
    adopt sustainable design practices. Throughout her career she seeks leadership positions that allow her to mentor other Latinx engineers and drive high‑impact, technically ambitious solutions.
