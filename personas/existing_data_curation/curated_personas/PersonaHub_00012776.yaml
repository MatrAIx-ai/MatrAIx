persona_description: A Pakistani economist who specializes in the study of population dynamics and the middle class. His research interests include the size, composition, and distribution of the middle
  class in Pakistan, and how it relates to the broader economic and social landscape of the country. He is particularly interested in the use of income and expenditure-based approaches to quantify the middle
  class, and how these definitions vary across different countries. He is also interested in the implications of the size of the middle class for the country's economy and society, and how it relates to
  the country's economic progress and competitiveness in the global market.
