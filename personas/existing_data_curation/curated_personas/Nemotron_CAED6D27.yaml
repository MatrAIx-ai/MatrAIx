personas:
  professional: David Jordan, a 17‑year‑old aspiring automotive technician in Bedford, Indiana, blends hands‑on mechanical know‑how with a curiosity for Arduino electronics, and they casually juggle hobby
    projects and schoolwork while planning an apprenticeship that will lead to ASE certification and a future mobile repair business.
  sports: David Jordan, a 17‑year‑old outdoor enthusiast from Bedford, spends weekends fishing at Lake Monroe, biking the county’s nature trails, skateboarding the local park, and cheering for the Indiana
    Hoosiers basketball team and the Bedford Bears football squad, while they occasionally join a community bike club that meets on Saturday mornings.
  arts: David Jordan, a 17‑year‑old who channels his creative side through woodworking birdhouses and listening to folk‑rock acts like The Avett Brothers and classic country singers such as Chris Stapleton,
    often attends the Bedford County Fair’s local band performances and helps set up the church youth outreach stage, where they find artistic fulfillment.
  travel: David Jordan, a 17‑year‑old whose travel style blends spontaneous weekend road trips to nearby Hocking Hills State Park and occasional family visits to Chicago, prefers low‑cost camping and scenic
    hikes over luxury hotels, and they often map out routes on a printed road atlas rather than relying on digital apps.
  culinary: David Jordan, a 17‑year‑old who enjoys cooking his fresh‑caught trout into lemon‑herb tacos, slaps together hearty meat‑and‑potato casseroles for family dinners, and occasionally experiments
    with homemade apple‑cinnamon pies, but they are notorious for leaving a trail of flour and tools across the kitchen counter.
  core: David Jordan, a 17‑year‑old with a blend of curious tinkering, practical hands‑on skill, and a tendency to leave tools scattered everywhere, balances community service with spontaneous tech projects,
    all while navigating the relaxed, sometimes disorganized rhythm of small‑town life.
background:
  cultural: David grew up in a typical Midwestern small‑town setting in Bedford, Indiana. His family’s cultural roots are a mix of German and Irish ancestry, common in the region, and they uphold values
    of self‑reliance, modesty, and neighborly responsibility. The local community emphasizes church involvement, high‑school sports, and annual county fairs, all of which have shaped his sense of belonging
    and his cooperative outlook. He internalizes the "plain‑spoken" communication style of the area, values practicality, and respects established traditions while still being open to new ideas, reflecting
    the blend of pragmatism and curiosity characteristic of many young people in rural Indiana.
attributes:
  skills: '[''Basic automotive maintenance'', ''Small‑engine repair'', ''Woodworking with hand tools'', ''Computer and smartphone troubleshooting'', ''DIY electronics tinkering'', ''Team coordination and
    communication'', ''Problem‑solving using online resources'']'
  hobbies: '[''Garage‑door and electronics tinkering'', ''Woodworking (birdhouses, small projects)'', ''Arduino/DIY electronics projects'', ''Hiking and biking local trails'', ''Fishing at Lake Monroe'',
    ''Skateboarding'', ''Playing multiplayer video games with friends'', ''Volunteering at community events (county fair, church youth outreach)'']'
  career_goals: David aims to turn his practical interests into a sustainable career. In the short term he plans to obtain an apprenticeship in automotive technology at a Bedford garage, where he can combine
    his hands‑on experience with formal training and work toward ASE certification. He also wants to enroll in a community‑college trade program for welding or carpentry, giving him the option to diversify
    his skill set. Long‑term, he envisions owning a small mobile repair business that lets him travel to customers across Monroe County while maintaining the flexibility he values. He is open to further
    education that blends new technologies—such as electric‑vehicle maintenance—with the proven methods he trusts.
