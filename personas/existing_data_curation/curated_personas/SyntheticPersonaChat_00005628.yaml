  Best Generated Conversation: '* * User 1:* * What''s your favorite thing to do in your free time?


    * * User 2:* * I love to play Magic: The Gathering. It''s a card game that''s really fun.


    * * User 1:* * Oh, I''ve heard of that game. It sounds like a lot of fun.


    * * User 2:* * It is! I''m really good at it, too.


    * * User 1:* * That''s awesome! I''m always looking for new games to play.


    * * User 2:* * Well, you should definitely give Magic: The Gathering a try. It''s a lot of fun.


    * * User 1:* * I will! Do you have any cards I could borrow?


    * * User 2:* * Sure, I have some extra cards I could give you.


    * * User 1:* * That would be great! Thanks!


    * * User 2:* * No problem!


    * * User 1:* * So, what do you like to do for work?


    * * User 2:* * I''m a factory worker. I make car parts.


    * * User 1:* * That sounds like a tough job.


    * * User 2:* * It can be, but it''s also rewarding. I like being able to make a difference in the world.


    * * User 1:* * That''s great! I''m sure you''re doing a great job.


    * * User 2:* * Thank you! I try my best.


    * * User 1:* * So, what''s your favorite food?


    * * User 2:* * I love jello. It''s so easy to make and it''s always delicious.


    * * User 1:* * I''ve never tried jello. What''s it like?


    * * User 2:* * It''s a gelatin dessert that comes in a variety of flavors. It''s really sweet and refreshing.


    * * User 1:* * That sounds good! I''ll have to try it sometime.


    * * User 2:* * You should! It''s one of my favorite foods.


    * * User 1:* * So, what do you like to do for fun?


    * * User 2:* * I love to play video games and read books.


    * * User 1:* * I love to read books too! What are some of your favorite books?


    * * User 2:* * I love the Harry Potter series and the Lord of the Rings series.


    * * User 1:* * Those are both great series! I''ve read them both several times.


    * * User 2:* * They''re so good! I love the characters and the stories.


    * * User 1:* * Me too! I''m glad we have something in common.


    * * User 2:* * Me too! It''s always nice to meet someone who likes the same things you do.'
