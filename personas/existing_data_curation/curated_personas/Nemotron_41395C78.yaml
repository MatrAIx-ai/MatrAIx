personas:
  professional: Mark Kettlewell, a veteran NYPD detective with a graduate business degree, they blend meticulous data-driven investigations, crisis negotiation expertise, and strategic budgeting to lead
    community‑art outreach programs, while habitually arriving early to briefings and staying late to fine‑tune precinct initiatives.
  sports: Mark Kettlewell, an avid waterfront jogger who completes the NYC Marathon each spring, they are also a dedicated fan of the New York Knicks and the New York Islanders, and hold a membership with
    the East River Running Club, which meets every Saturday for interval training.
  arts: Mark Kettlewell, an enthusiastic patron of New York’s art scene, they spend weekends at MoMA, the New Museum, and Brooklyn artist studios, practice street‑photography inspired by Henri Cartier‑Bresson,
    and regularly act in community‑theater productions such as 'The Little Shop of Horrors'.
  travel: Mark Kettlewell, a culture‑curious traveler, they combine photographic expeditions with visits to festivals, having captured sunrise over the Amalfi Coast, explored the lantern‑lit streets of
    Kyoto during cherry blossom season, and attended the Edinburgh Fringe, all while planning future trips to Patagonia’s glaciers.
  culinary: Mark Kettlewell, a self‑taught home chef, they experiment with international dishes like seafood paella with saffron, miso‑glazed black cod, and Moroccan tagine, pairing each with carefully
    selected wines—such as a full‑bodied Rioja for the paella and a crisp Riesling for the tagine—while occasionally over‑spicing to the point of the kitchen smoke alarm going off.
  core: Mark Kettlewell, a methodical yet gregarious police strategist, they juggle crime‑solving with art‑collecting, waterfront runs, and soirée‑hosting, and their guilty pleasure is splurging on rare
    wines that sometimes leave their credit card breathless.
background:
  cultural: Mark grew up in a middle‑class, Anglo‑American family in the suburbs of Long Island, where the coastal town of Sea Cliff fostered a vibrant community of artists, musicians, and civic volunteers.
    His upbringing blended traditional American values of reliability and service with exposure to the region’s rich cultural scene, shaping his appreciation for the arts and his commitment to public safety.
    Though his ethnic heritage traces back to English and Irish ancestors, his identity is strongly tied to the diverse, progressive atmosphere of Nassau County.
