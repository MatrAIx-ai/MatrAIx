  hobbies: '[''Visiting art galleries and museums'', ''Photography (urban and coastal)'', ''Attending cultural festivals and artist talks'', ''Reading non-fiction on psychology, philosophy, and emerging
    ideas'', ''Hosting dinner parties and social gatherings'', ''Participating in community theater'', ''Waterfront jogging and hiking'', ''Cooking and wine tasting, exploring international cuisines'',
    ''Traveling to experience diverse cultures and arts'', ''Volunteering for local art outreach programs'']'
  career_goals: Mark aims to advance to a senior leadership role within the NYPD, such as precinct captain or deputy chief of community affairs, where he can integrate his business acumen and passion for
    the arts into department strategy. He aspires to design and implement city‑wide cultural‑engagement programs that use art and creativity to strengthen community ties and prevent crime, and plans to
    pursue a master's degree in public administration to deepen his policy expertise and drive progressive reforms in policing.
