persona_description: A professional in the field of environmental and water quality testing, specifically interested in radium-226 (226Ra) activity concentration determination in water samples. They are
  familiar with the ISO 13165 standard and its test method using coprecipitation followed by gamma-spectrometry. This person has expertise in determining the activity concentrations of other isotopes of
  radium, such as 223Ra, 224Ra, and 228Ra, as well as the ability to perform direct gamma-spectrometry on water samples smaller than 1 l. They are likely to be involved in environmental monitoring and regulatory
  compliance, and are interested in developing new analytical methods for water quality assessment.
