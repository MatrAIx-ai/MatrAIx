persona_description: A researcher who specializes in the study of social interactions and emotions, particularly focusing on the neural and behavioral mechanisms underlying empathy and yawn contagion. Their
  research interests include, but are not limited to, the effects of social bonding on yawn contagion, the role of familiarity in yawn contagion, and the neurobiological basis of empathy. They are particularly
  interested in the differences in the neural activation patterns related to yawn contagion across different social groups and individuals.
