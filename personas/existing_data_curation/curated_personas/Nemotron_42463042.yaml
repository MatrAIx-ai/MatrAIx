personas:
  professional: Hezekiah Neal is a seasoned IT support engineer who leverages deep hardware, LAN/WAN, and ServiceNow expertise to build airtight documentation and repeatable workflows, channeling a structured,
    practical mindset while mentoring junior staff and championing collaborative problem‑solving.
  sports: Hezekiah Neal dominates a local West Palm Beach basketball league and drops into beach‑volleyball pick‑ups at Lake Worth, follows the Miami Heat, the Orlando Magic, and the Tampa Bay Buccaneers
    religiously, and they schedule weekly strength‑and‑conditioning sessions to stay injury‑free, yet they occasionally skip a jog after late‑night coding sessions.
  arts: Hezekiah Neal immerses themselves in live jazz at CityPlace Pavilion, sways to soul classics by Aretha Franklin and D'Angelo, and nods to hip‑hop lyricism from Kendrick Lamar, building a personal
    vinyl collection that features Miles Davis, John Coltrane, and modern soul‑rap hybrids, while they also host quarterly music‑themed potlucks.
  travel: Hezekiah Neal prefers thoughtfully curated trips that blend cultural immersion with culinary discovery, having trekked to New Orleans for its jazz heritage, explored Barbados to sample authentic
    jerk cuisine, and taken a weekend road‑trip to Savannah’s historic squares, while they dream of a future solo voyage to Lisbon’s waterfront neighborhoods once their family commitments stabilize.
  culinary: Hezekiah Neal is a confident home chef who blends Southern staples like Shrimp and Grits and Peach Cobbler with Caribbean flavors such as Jerk Chicken and Callaloo, meticulously seasoning with
    scotch bonnet peppers, allspice, and a dash of smoked paprika, and they host potluck gatherings where each dish tells a story of heritage and experimentation.
  core: Hezekiah Neal fuses meticulous IT craftsmanship with a love for community cooking, balances a structured work ethic with lively social circles, yet wrestles with chronic stress that fuels late‑night
    gadget tinkering and occasional health check‑up neglect.
background:
  cultural: Hezekiah is an African‑American who grew up in a close‑knit black community in South Florida, where church, family, and neighborhood gatherings shaped his values. He draws on the storytelling,
    musical, and culinary traditions of the black diaspora, especially Southern and Caribbean influences, which he celebrates through his cooking and music tastes. His cultural identity informs his commitment
    to community service, particularly his involvement with local youth mentorship programs. He appreciates the resilience and entrepreneurial spirit of his heritage, which fuels his ambition to create
    opportunities for others while honoring his roots.
attributes:
  skills: '["Hardware troubleshooting", "Network configuration", "Help desk ticketing systems (e.g., ServiceNow)", "Customer service and communication", "IT security fundamentals", "SOP development", "Process
