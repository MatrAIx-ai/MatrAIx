  career_goals: Hezekiah aims to advance into an IT Operations Manager role within the next three to five years, overseeing a regional support team and driving service‑delivery efficiencies. He plans to
    obtain ITIL Expert and CompTIA Security+ certifications to deepen his expertise. Leveraging his business background, he wants to lead digital‑transformation projects that align technology services with
    organizational strategy. Additionally, Hezekiah aspires to launch a community tech‑training program for under‑served youth in West Palm Beach, combining his professional knowledge with his commitment
    to uplift the local African‑American community. He also focuses on developing better stress‑management habits to maintain a healthy work‑life balance.
