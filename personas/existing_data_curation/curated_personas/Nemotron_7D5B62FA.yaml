  career_goals: Leveraging his STEM background and hands‑on telecom experience, Dene aims to transition from an operator role to a network operations specialist within the next two years. He plans to obtain
    industry certifications such as Cisco CCNA and CompTIA Network+ to validate his technical skills. In the medium term, Dene aspires to become a senior network engineer or technical team lead, overseeing
    infrastructure projects while maintaining a work environment that allows focused, solitary work. Ultimately, he envisions launching a boutique consultancy that provides remote network monitoring and
    optimization services for small businesses in the New York area.
