personas:
  professional: Joyce Derouen, a front‑of‑house specialist at a bustling Colorado Springs café, excels in coordinating reservations, resolving guest conflicts, and curating a welcoming atmosphere through
    personalized, art‑inspired recommendations, while leveraging their strong communication skills and ambition to rise to a supervisory role.
  sports: Joyce Derouen, a member of the Colorado Springs Hiking Club and occasional weekend paddleboarder on Lake Pueblo, follows the Denver Broncos for football, the Colorado Avalanche for hockey, and
    cheers for the local Switchbacks FC soccer team, while maintaining a yoga practice three times weekly to stay flexible and counteract the physical demands of hospitality work.
  arts: Joyce Derouen, an avid participant in Colorado Springs’ art scene, frequents gallery openings featuring artists like Kehinde Wiley and local muralist Maria Ramos, curates playlists that blend The
    Lumineers, Tame Impala, and classic jazz artist Miles Davis, and spends evenings sketching urban landscapes inspired by the works of Edward Hopper and contemporary street photographer Boogie.
  travel: Joyce Derouen, who plans travel around semester breaks, has trekked the red rocks of Sedona, explored the vibrant street art of Austin, Texas, and dreams of sipping espresso in a tiny café in
    Kyoto, Japan, while also hoping to hike Patagonia’s Torres del Paine during a future gap‑year adventure.
  culinary: Joyce Derouen, a self‑taught coffee enthusiast, perfects pour‑over brews with Ethiopian Yirgacheffe beans, whips up avocado toast topped with smoked salmon and microgreens, and occasionally
    experiments with a turmeric‑infused chickpea curry, though they often forget to clean their espresso machine promptly.
  core: Joyce Derouen, a curious art‑loving hospitality host who balances meticulous organization with spontaneous coffee experiments, can be found sketching café walls between shifts, yet habitually loses
    track of time when curating playlists.
background:
  cultural: Joyce comes from a White American background with family roots in the Midwest, and she identifies with the broader American cultural milieu. Growing up in Colorado, she blends the state's outdoors‑oriented
    lifestyle with a keen appreciation for the local arts community, shaped by the diverse population of Colorado Springs, including its military presence and multicultural events. This mix informs her
    open‑minded yet grounded worldview, influencing both her personal interests and professional approach.
