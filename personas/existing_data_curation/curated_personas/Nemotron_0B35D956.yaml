  career_goals: She aspires to advance from hosting to a supervisory role within the hospitality industry, eventually becoming a restaurant or café manager. Joyce plans to complete a degree in Hospitality
    Management while gaining experience in event planning and menu development, with a long‑term ambition to open a community‑focused coffee shop that doubles as an art gallery and live‑performance space.
