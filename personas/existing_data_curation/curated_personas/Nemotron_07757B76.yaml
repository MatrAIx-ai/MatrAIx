personas:
  professional: Jerry Butler, a 50‑year‑old high‑school business teacher, blends graduate business expertise with an abstract‑art sensibility to craft interdisciplinary curricula that weave entrepreneurship,
    marketing, and creative problem‑solving, while mentoring colleagues and coordinating community‑business partnerships.
  sports: Jerry Butler follows the Oklahoma City Thunder and the Dallas Cowboys, plays weekend pickup basketball at the local community center, hikes the Ouachita Trail for cardio, and is a member of the
    Ardmore Soccer Club’s adult league.
  arts: Jerry Butler spends Saturdays painting abstract oil canvases of prairie skies inspired by Georgia O'Keeffe, captures downtown Ardmore’s brick façades in digital photography, strums acoustic guitar
    at open‑mic nights covering Bob Dylan, and refines comedic timing in improv workshops with the Ardmore Players.
  travel: Jerry Butler favors road trips that blend art pilgrimages and nature escapes, having driven to Santa Fe for a gallery show, explored the Grand Canyon on a family hike, and planned a future trek
    through New Zealand’s fjords, all while balancing travel costs with a modest savings plan.
  culinary: Jerry Butler enjoys cooking hearty chicken‑fried steak with homemade peppered jack gravy, experiments with smoked brisket rubs featuring Oklahoma‑grown sweet corn, treats themselves to nightly
    bowls of chili topped with fresh jalapeños, and admits to over‑indulging in late‑night ice‑cream sundaes after board‑game marathons.
  core: Jerry Butler is a creatively driven educator who channels anxiety into art, balances meticulous budgeting with occasional indulgences, and thrives on community collaboration while juggling high‑energy
    projects and a love for prairie‑inspired spontaneity.
background:
  cultural: Jerry grew up in a middle‑class family in the heart of Oklahoma, where community ties, modesty, and a strong work ethic are deeply valued. His parents owned a small family‑run hardware store,
    exposing him early to entrepreneurship and customer service. The local church and high school sports culture reinforced a sense of belonging and collective responsibility, while his upbringing in a
    largely white, rural environment gave him a pragmatic outlook tempered by a curiosity about broader perspectives. After moving to Ardmore, he embraced the city’s blend of traditional Midwestern values
    and a growing artistic scene, participating in community festivals, supporting local artisans, and engaging with the region’s Native American heritage through school projects. This mix of small‑town
    solidarity, entrepreneurial spirit, and openness to artistic expression informs his teaching philosophy and personal interests.
attributes:
  skills: '["Curriculum Development", "Project-Based Learning", "Educational Technology Integration", "Business and Entrepreneurship Education", "Classroom Management", "Mentorship and Coaching", "Creative
