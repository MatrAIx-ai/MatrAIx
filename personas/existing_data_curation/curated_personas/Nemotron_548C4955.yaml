personas:
  professional: Thomas Hays is a seasoned humanities professor at a Tucson community college who designs regimented curricula, champions structured assessment rubrics, and leverages his competitive drive
    to seek departmental chairmanship while mentoring younger faculty.
  sports: Thomas Hays is a devoted fan of the Arizona Diamondbacks and the Tucson Roadrunners, joins a local desert hiking club for weekly trail excursions, and plays casual pickleball at the community
    center, all of which satisfy his need for routine and competitive spirit.
  arts: Thomas Hays immerses himself in classic literature from Steinbeck to McCullough, enjoys western novels by Cormac McCarthy, attends performances by the Tucson Symphony Orchestra, and collects vintage
    western film posters featuring Clint Eastwood and John Wayne.
  travel: Thomas Hays prefers carefully planned road trips, has explored the Grand Canyon and Sedona on scheduled drives, dreams of visiting Moab’s Arches National Park and the Pacific coastline, and balances
    travel desires with a modest retirement budget.
  culinary: Thomas Hays delights in cooking garden‑fresh dishes like grilled zucchini, roasted corn, and slow‑cooked chile rellenos, favors southwestern flavors such as cumin and chipotle, and is comfortable
    preparing a classic carne asada taco on weekend evenings.
  core: Thomas Hays is a routine‑oriented scholar‑craftsman whose competitive edge fuels meticulous teaching, garden stewardship, and chess mastery, all while a lingering worry keeps him tethered to careful
    planning and a cautious outlook.
background:
  cultural: Thomas grew up in a middle‑class, predominantly white suburb of the Midwest during the 1960s and 1970s, absorbing traditional Anglo‑American values of self‑reliance, practicality, and community
    service. Relocating to Tucson in his thirties, he embraced the desert environment and became attuned to the rich tapestry of Southwestern culture, including Native American and Mexican influences, which
    he integrates into his teaching of American history and literature. While his own heritage remains Anglo‑American, his long‑term residence in Arizona has cultivated a respect for local customs, regional
    dialects, and the importance of preserving the historical narratives of the borderlands. This blend of traditional upbringing and regional immersion informs his worldview, balancing a conventional mindset
    with an appreciation for the cultural diversity of his adopted home.
attributes:
