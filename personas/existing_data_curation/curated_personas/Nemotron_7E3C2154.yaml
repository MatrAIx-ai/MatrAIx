  career_goals: Rosanna aspires to build a career as a freelance visual artist and concept illustrator, eventually contributing to indie video games or graphic novels. She plans to compile a professional
    portfolio during the next two years and hopes to enroll in a community‑college art program or secure an apprenticeship that offers flexible, project‑based learning. In the longer term, she dreams of
    launching an online shop where she can sell original prints and handmade accessories, using her art to foster positive social messages and community connection.
