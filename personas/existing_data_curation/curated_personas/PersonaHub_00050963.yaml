persona_description: A farmer who is interested in sustainable and resilient farming practices, particularly those that incorporate traditional knowledge and new insights into sustainable land management.
  This person is likely to have experience with Quesungual, an agroforestry system for hillsides that combines traditional knowledge with new insights into sustainable land management, and has adopted it
  in their farming practices. They are likely to be familiar with the double-whammy of El Niño and Mitch and the trial-by-fire that the system provided for them, and are likely to be interested in how the
  system can help smallholders adapt to the kinds of extreme weather expected to become more frequent as a result of climate change. They are also likely to be interested in the benefits of the system,
  including the capture of carbon dioxide, the improvement of soil fertility, and the maintenance of crop productivity for many years.
