  hobbies: '[''Street art photography'', ''Sketching urban scenes'', ''Reading art and design books'', ''Home automation tinkering'', ''Rooftop herb gardening'', ''Listening to tech and art podcasts'',
    ''Cooking Mexican cuisine'', ''Meditation'', ''Bilingual literature'']'
  career_goals: Amilcar aims to advance from a maintenance technician to a senior facilities manager for a large mixed‑use property, leveraging his experience with sustainable building systems. He plans
    to obtain certifications such as EPA 608, Certified Maintenance & Reliability Professional, and a GED to broaden his qualifications. A long‑term ambition is to start his own consultancy focused on eco‑friendly
    retrofits and art‑installation maintenance for cultural venues. He also hopes to mentor younger Mexican‑American apprentices, sharing the practical and cultural knowledge he has built.
