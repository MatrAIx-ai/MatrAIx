  hobbies: '[''Hiking'', ''Bird watching'', ''Gardening'', ''Watercolor painting'', ''Bridge (card game)'', ''Historical society volunteering'', ''Quilting'', ''Appalachian folk music'', ''Craft fair attendance'',
    ''Farm‑to‑table cooking'', ''Reading historical novels'']'
  career_goals: Cynthia aims to continue selective work that lets her apply her expertise while preserving her health and schedule flexibility. She plans to create community workshops on sustainable painting
    techniques for senior homeowners, document her knowledge in a practical guidebook, and mentor a small group of young painters through a local apprenticeship program. She also hopes to collaborate on
    the restoration of a landmark historic building in Highlands, contributing her technical insight and artistic sensibility. Ultimately she seeks to balance continued earning with more time for family,
    social gatherings, and volunteering at the local historical society.
