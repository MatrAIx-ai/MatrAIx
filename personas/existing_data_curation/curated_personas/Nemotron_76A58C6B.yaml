  career_goals: He often talks about wanting to become a firefighter when he grows up because he likes the idea of helping people, the clear steps of training drills, and the excitement of fire trucks.
    He also enjoys imagining himself as a teacher, sharing stories and helping classmates learn. His ambitions are centered on roles that involve caring for others, following a schedule, and using his hands
    to solve problems.
