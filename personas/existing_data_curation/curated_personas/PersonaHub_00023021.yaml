persona_description: A scientist or ecologist who specializes in the study of freshwater ecosystems, particularly the Missouri and Mississippi Rivers. This individual is likely to have a deep understanding
  of the complex interplay between habitat alteration, pollution, over-harvest, and river regulation that have led to the decline of sturgeon populations, including pallid and shovelnose sturgeons. This
  person is interested in developing and applying a conceptual life-history model that can help understand the factors affecting reproduction, growth, and survival of sturgeons, and is looking for ways
  to improve understanding of the effects of management actions on the ecological requirements of sturgeons.
