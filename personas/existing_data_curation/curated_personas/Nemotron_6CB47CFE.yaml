personas:
  professional: Brittany Montero, an aspiring junior scientist, blends her curiosity for how things work with a practical love for building intricate LEGO structures, turning everyday observations into
    mini experiments that she proudly shares with her classmates.
  sports: Brittany Montero, a spirited member of the Little Kickers Soccer Club, dashes across the field after school, idolizes the Seattle Sounders as her favorite professional team, and eagerly supports
    the community’s youth basketball league on weekends, balancing energetic play with her calm, resilient nature.
  arts: Brittany Montero, a budding illustrator who sketches scenes from adventure books by Rick Riordan and J.K. Rowling, sings along to Disney soundtracks and Taylor Swift pop hits, and practices simple
    piano melodies from Mozart, weaves her artistic passions into everyday play.
  travel: Brittany Montero, an enthusiastic explorer of nearby parks and the lakeside where she watches ducks, has taken family road trips to the Grand Canyon and a weekend camping adventure at Yosemite
    National Park, and now dreams of visiting the Whistler ski resort, always planning child‑friendly itineraries that balance excitement with school schedule constraints.
  culinary: Brittany Montero, a junior baker who loves stirring chocolate chip cookie dough with a pinch of sea salt and sprinkles of rainbow M&M’s, helps her parents prepare spaghetti bolognese topped
    with generous grated Parmesan, and secretly hoards extra cookie crumbs for midnight snack raids, reflecting her playful yet organized kitchen presence.
  core: Brittany Montero is a calm, curiosity‑driven eight‑year‑old who builds LEGO worlds, sketches adventure tales, scores goals on the soccer field, and bakes cookies while effortlessly balancing imaginative
    play with practical responsibility.
background:
  cultural: Brittany lives in Orangeburg, South Carolina, a small Southern town where community ties run deep. Her family participates in local traditions such as church gatherings, community picnics, and
    the annual Orangeburg County Fair. She enjoys Southern comfort foods like biscuits, fried chicken, and sweet tea at family meals, and celebrates holidays with fireworks, parades, and backyard barbecues.
    The emphasis on education, family support, and cooperative community values has shaped her kind, considerate, and resilient personality.
