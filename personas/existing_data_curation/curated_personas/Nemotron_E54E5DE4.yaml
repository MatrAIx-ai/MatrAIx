  hobbies: '[''Sketching urban scenes'', ''Street photography'', ''Listening to eclectic music'', ''Visiting contemporary art galleries'', ''Reading philosophy and science fiction'', ''Participating in
    poetry slams'', ''Volunteering teaching digital art'']'
  career_goals: Chun aims to merge his passion for art and technology by pursuing a career in user experience (UX) design or multimedia storytelling. He plans to complete a Bachelor’s degree in Media Arts
    or Human‑Computer Interaction within the next three years, followed by an internship at a design studio or tech company where he can apply his visual and coding skills. Long‑term, he envisions leading
    creative projects that bring culturally diverse perspectives into digital products, and eventually establishing a consultancy that helps brands tell inclusive stories through interactive media. He also
    hopes to continue learning advanced programming and explore graduate studies in interactive design if the opportunity aligns with his creative ambitions.
