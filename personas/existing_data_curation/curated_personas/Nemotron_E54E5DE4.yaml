personas:
  professional: Chun Do, a 19‑year‑old media arts major, merges digital illustration, Photoshop, Illustrator, and beginner‑level Python data‑visualization scripts with user‑experience design thinking to
    prototype inclusive multimedia stories, while leading the campus photography club's events and volunteering to teach digital art, balancing organized project timelines with the free‑flow of creative
    exploration.
  sports: Chun Do enjoys casual runs along the Charles River and joins the campus intramural soccer league for social fitness, roots for the Boston Celtics and the Red Sox, and uses Strava to log weekly
    5‑kilometer jogs, balancing a laid‑back approach to exercise with occasional high‑energy bursts during group walks for street photography.
  arts: Chun Do curates eclectic playlists featuring Tame Impala, Kamasi Washington, and Aphex Twin while sketching urban skylines in the ICA Boston, draws inspiration from contemporary artists like Banksy
    and Yayoi Kusama, regularly contributes photos to the campus photography club exhibit, and performs at occasional poetry slams, weaving visual, auditory, and literary influences into a singular artistic
    voice.
  travel: Chun Do favors urban adventures, having explored New York City’s street art corridors, Berlin’s avant‑garde galleries, and Portland’s indie music scene, typically planning trips months in advance
    with a focus on budget hostels, local cafés, and spontaneous photography walks, while dreaming of a future exploratory stay in Copenhagen to study Scandinavian design.
  culinary: Chun Do gravitates toward flavor‑forward dishes such as spicy pork‑belly ramen, avocado toast topped with smoked salmon, and matcha‑infused latte, cooks at a moderate skill level experimenting
    with quinoa salads and homemade vinaigrettes, yet often skips meals during exam weeks, leading to a reputation among friends for creative snacking with leftover sushi rolls and craft beer.
  core: Chun Do is a curiosity‑driven 19‑year‑old visual storyteller who blends tech and art, obsessively curates playlists, occasionally over‑indulges in coffee and gear upgrades, and navigates life with
    a disciplined‑flexible balance that sometimes leads to late‑night study marathons.
background:
  cultural: Chun comes from an East Asian family that values education, cultural heritage, and community involvement. Although he grew up in the United States, his household maintained traditions such as
    celebrating Lunar New Year, cooking family recipes, and encouraging bilingualism, which gave him a functional command of Mandarin. This bicultural upbringing nurtured his appreciation for diverse artistic
    expressions and informed his desire to incorporate multicultural narratives into his creative work. Living in Medford, MA, a city with a vibrant mix of cultures, he frequently engages with local Asian
    cultural festivals and collaborates with peers from various backgrounds, fostering an inclusive outlook while honoring his own roots.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Video editing (Premiere Pro)'', ''Python programming (basic)'', ''Research and academic writing'', ''Event planning and coordination'', ''Bilingual:
