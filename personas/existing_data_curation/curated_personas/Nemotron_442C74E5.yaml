  career_goals: Joyce aims to launch her own boutique painting and decorative‑finishes business that emphasizes handcrafted murals and custom wall treatments for residential and small‑commercial clients.
    She plans to earn a Master Painter certification and complete an associate’s degree in interior design to deepen her design expertise. Long‑term, she envisions integrating community art initiatives—organizing
    volunteer mural projects and offering free workshops to local youth. Mentoring apprentices, cultivating a reputation for high‑quality artistic finishes, and becoming a trusted advisor for design‑focused
    homeowners are central to her professional ambition.
