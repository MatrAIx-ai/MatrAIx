  hobbies: '["Acoustic guitar", "Hiking in the Sonoran Desert", "Target shooting", "Community barbecues", "Volunteering at Tucson Food Bank", "Adult trivia night", "Live music events (country & blues)"]'
  career_goals: Joseph aims to move into a supervisory role within the next five years, leading a team of electricians for a regional solar‑installation contractor. He plans to obtain his Master Electrician
    license and become a certified solar installer. Leveraging his talkative, people‑oriented style, he hopes to conduct safety workshops, serve as a mentor for new tradespeople, and eventually open his
    own consulting firm focused on energy‑efficient retrofits, all while maintaining a workload that helps him manage stress and worry.
