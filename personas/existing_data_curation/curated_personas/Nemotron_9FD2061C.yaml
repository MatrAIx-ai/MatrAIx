personas:
  professional: Joseph Griffis, a 50‑year‑old master electrician with a quarter‑century of experience across residential, commercial, and industrial wiring, blends their structured, code‑driven expertise
    in solar photovoltaics and home‑automation with a relaxed, talkative demeanor that makes them a natural mentor and aspiring supervisor for a regional solar‑installation crew.
  sports: Joseph Griffis spends their weekends hiking the Sonoran Desert trails with the Tucson Outdoor Adventure Group, perfecting their aim at the Tucson Tactical Shooting Range, and cheering on the Arizona
    Diamondbacks and Arizona Cardinals at local sports bars, while they occasionally join a casual pickup basketball game at the community center.
  arts: Joseph Griffis, a self‑taught acoustic guitarist, regularly performs at local venues where they string together classic country ballads by Willie Nelson and soulful blues numbers by B.B. King, while
    also attending the Tucson Blues Festival and supporting regional acts like The Tucson Playboys.
  travel: Joseph Griffis enjoys road‑trip adventures that combine carefully plotted stops at iconic sites such as Grand Canyon National Park and Sedona’s red rocks with spontaneous detours to the historic
    town of Tubac, and they dream of a future cross‑border expedition through Mexico’s Copper Canyon, all balanced against their work commitments and family budget.
  culinary: Joseph Griffis relishes grilling marinated carne asada seasoned with cilantro, lime, and roasted jalapeño, pairing it with smoky mesquite‑flavored beans and a side of fresh guacamole, and they
    occasionally indulge in a Kansas City‑style brisket at neighborhood barbecues, showcasing their love for hearty, communal meals.
  core: Joseph Griffis is a sociable, detail‑oriented electrician who worries about the future, mentors apprentices over backyard barbecues, and they channel their stress into guitar strings and desert
    hikes, all while occasionally misplacing their tools amid a chaotic schedule.
background:
  cultural: Joseph was raised in a middle‑class, white family in Arizona where a strong work ethic, self‑reliance, and community involvement were core values. His upbringing blended traditional American
    traditions—celebrating Thanksgiving, Independence Day, and family reunions—with the relaxed, outdoor‑oriented lifestyle of the Southwest. He enjoys regional foods such as Mexican‑inspired dishes and
    grilled barbecues, maintains long‑standing ties to the local electricians’ union, and participates actively in neighborhood events that reflect the cultural mix of Tucson.
attributes:
  skills: '["Residential wiring", "Commercial wiring", "Industrial electrical systems", "Solar photovoltaic installation", "Low‑voltage home automation", "Blueprint interpretation", "NEC code compliance",
