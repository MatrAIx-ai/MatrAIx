  career_goals: Gary aims to advance to a senior full‑stack engineer role within the next three years, followed by a transition into software architect, where he can design scalable, user‑centric applications
    that address real‑world challenges in his Appalachian community. He plans to obtain AWS Certified Solutions Architect and PMP certifications, contribute to open‑source projects, and eventually launch
    a tech consultancy helping small businesses in West Virginia adopt digital tools. Additionally, he hopes to lead community hackathons and mentor the next generation of coders.
