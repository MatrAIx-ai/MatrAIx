personas:
  professional: Francis Prince is a meticulous humanities teaching assistant whose expertise in curriculum design, archival research, and digital platforms like Canvas blends with a competitive drive to
    publish and secure major grants as they chart a path toward tenure.
  sports: Francis Prince hikes the Appalachian Trail with the Harrisburg Hiking Society, follows the Philadelphia Eagles and Phillies with a loyal but measured fan enthusiasm, and supplements outdoor activity
    with weekly yoga to counterbalance lower‑back tension.
  arts: Francis Prince immerses themselves in the warm tones of Miles Davis and the storytelling of Bob Dylan, curates a modest vinyl collection while attending Harrisburg Community Theatre productions,
    and finds aesthetic inspiration in the ornate bindings of vintage literary editions.
  travel: Francis Prince meticulously plans weekend trips to historic Pennsylvania sites like Gettysburg and Lancaster, while budgeting for longer excursions to New England's literary landmarks in Boston
    and dreaming of a summer tour of the Loire Valley's châteaux once family obligations allow.
  culinary: Francis Prince favors hearty Pennsylvania Dutch dishes such as scrapple and chicken pot pie, crafts sourdough bread on a self‑made cutting board, seasons morning coffee with a pinch of cinnamon,
    and occasionally dines out at jazz‑infused bistros to celebrate successful grant proposals.
  core: Francis Prince balances a methodical, competitive scholarly ambition with a solitary love of history, hiking, and vintage literature, all while navigating family life through disciplined budgeting
    and a penchant for precise planning.
background:
  cultural: Francis comes from a Mid‑Atlantic white background, with family roots tracing back to German and Irish immigrants who settled in central Pennsylvania generations ago. Raised in a modest suburban
    setting in Dauphin County, he attended public schools that emphasized hard work, community involvement, and respect for tradition. Exposure to nearby Amish and Lutheran communities reinforced values
    of practicality and self‑reliance. While his upbringing was culturally Anglo‑American, he maintains an appreciation for the region's diverse heritage, which informs both his academic interests and personal
    pursuits.
attributes:
  skills: '[ ''Curriculum development'', ''Instructional technology (Canvas, Blackboard)'', ''Academic advising'', ''Research assistance (archival research, literature reviews)'', ''Scholarly writing and
    editing'', ''Assessment design'', ''Project management'', ''Data organization and analysis (Excel, SPSS)'', ''Student mentorship'', ''Event coordination'' ]'
  hobbies: '[ ''Reading classic literature'', ''Hiking local trails'', ''Photography of historic architecture'', ''Playing chess'', ''DIY woodworking'', ''Collecting vintage books'', ''Volunteering at historical
    society'', ''Listening to jazz and folk music'' ]'
  career_goals: Francis aims to transition from his teaching assistant role to a tenure‑track faculty position in the humanities, focusing on interdisciplinary research that bridges 19th‑century American
    literature with regional Pennsylvania history. He intends to publish a monograph on this subject and secure a grant from the National Endowment for the Humanities to fund a digital‑humanities project.
    Developing a signature course that incorporates archival research methods and digital tools is a priority, as is mentoring graduate students and eventually serving as director of undergraduate studies
    within his department. Throughout these ambitions, he seeks to balance professional growth with family stability in Hummelstown.
