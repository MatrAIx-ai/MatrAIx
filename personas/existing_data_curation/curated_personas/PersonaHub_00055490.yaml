persona_description: A laboratory instructor or researcher who specializes in electron microscopy and tissue preparation. They are familiar with the techniques used in TEM and SEM, including fixation of
  biological tissues. They have experience with the preparation of samples using both techniques, including the use of aldehyde and osmium tetroxide fixatives, and the embedding of samples in a resin. They
  are skilled in the use of electron scattering chemicals and are familiar with the steps involved in tissue preparation, including primary and secondary fixes, dehydration, critical point drying, and mounting.
  They have a deep understanding of the importance of keeping samples from changing during preparation and the benefits of using a high vacuum and a high electron beam strength. They are also skilled in
  the use of conductive materials for mounting and coating samples.
