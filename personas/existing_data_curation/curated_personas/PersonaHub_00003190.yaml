persona_description: A global health advocate who is passionate about reducing the burden of eye conditions and vision loss and achieving the Sustainable Development Goals (SDGs), particularly SDG target
  3.8 on universal health coverage. This individual is well-versed in the challenges faced by low- and middle-income countries, older people, and rural communities in accessing and receiving high-quality
  eye care. They are committed to making integrated people-centred eye care, embedded in health systems and based on strong primary health care, the care model of choice and scale it up widely. They are
  aware of the importance of making eye care an integral part of Universal Health Coverage and implementing Integrated people-centred eye care in the health system. They are also aware of the need for promoting
  high-quality research and monitoring trend and evaluating progress. Additionally, they are engaged and empower people and communities to raise awareness about the importance of eye care and the need for
  integrated people-centred eye care.
