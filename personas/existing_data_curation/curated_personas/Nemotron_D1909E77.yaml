personas:
  professional: Madison Kelly, a 30-year-old vehicle detailing expert, blends meticulous cleaning techniques with eco‑friendly practices and a calm, cooperative leadership style, making them a natural trainer
    for new staff while streamlining shop operations under tight deadlines.
  sports: Madison Kelly enjoys hiking the Connoquenessing Creek trails and weekend mountain biking, follows the Pittsburgh Steelers and Pittsburgh Penguins, and participates in the Western Pennsylvania
    Hikers Association’s monthly group hikes, balancing fitness with a love for the outdoors.
  arts: Madison Kelly finds inspiration in Ansel Adams’ black‑and‑white landscapes, playlists of Fleet Foxes and Brandi Carlile, and local folk art fairs, often capturing wildlife with a DSLR while attending
    community theater productions of Into the Woods.
  travel: Madison Kelly prefers thoughtfully planned road trips that blend adventure and relaxation, having explored the Adirondack Park, a weekend getaway to Asheville’s Blue Ridge Mountains, and dreaming
    of a future eco‑tour of Banff National Park.
  culinary: Madison Kelly cooks wholesome meals like quinoa‑beet salads with feta and roasted root vegetables, crafts seasonal soups with heirloom tomatoes and kale, and experiments with homemade pesto
    using fresh basil from their community garden.
  core: Madison Kelly is a calm, eco‑conscious detailing pro who balances meticulous work, nature‑filled weekends, and a habit of over‑packing camera gear for every hike.
background:
  cultural: Madison grew up in a small town near Butler, Pennsylvania, where values of hard work, modesty, and community are deeply rooted. Her family background reflects the working‑class traditions common
    in Western Pennsylvania, emphasizing responsibility, self‑reliance, and support for neighbors. Local customs such as attending county fairs, cheering for high school sports teams, and participating
    in community volunteer projects have shaped her sense of belonging. While her ethnic identity is White American, she embraces the regional heritage of the Rust Belt, including an appreciation for practical
    skills, straightforward communication, and a calm resilience that helps her navigate both work and personal life.
attributes:
  skills: '[''Vehicle interior detailing'', ''Exterior washing and waxing'', ''Upholstery shampooing and conditioning'', ''Paint protection and polishing'', ''Chemical safety and handling'', ''Eco‑friendly
