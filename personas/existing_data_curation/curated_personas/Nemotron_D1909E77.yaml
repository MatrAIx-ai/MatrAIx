  hobbies: '[''Hiking and nature photography'', ''Cooking wholesome meals'', ''Listening to automotive and DIY podcasts'', ''Community gardening'', ''Volunteering for local neighborhood clean‑up events'',
    ''Reading mystery novels'']'
  career_goals: Madison aims to move into a supervisory role within a high‑quality detailing shop where she can train new staff and help define service standards. She plans to earn a professional automotive
    detailing certification and attend workshops on emerging green‑cleaning technologies. Over the next five years, she hopes to launch a mobile detailing service that specializes in environmentally responsible
    cleaning for local residents and small businesses, offering flexible scheduling that fits her family life. She also wants to contribute to community clean‑up initiatives, using her expertise to promote
    vehicle maintenance and environmental stewardship.
