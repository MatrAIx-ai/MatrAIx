  career_goals: Catherine aims to earn her GED within the next year and pursue a certified nursing assistant program, hoping to secure part‑time work in home health care that leverages her caregiving instincts.
    At the same time, she plans to launch a cottage‑style business selling handcrafted knitted items and homemade preserves, using her organizational talent to market and manage orders. Long‑term, she hopes
    to take a leadership role in her church’s outreach committee, coordinating community service projects while continuing personal growth through new skill acquisition.
