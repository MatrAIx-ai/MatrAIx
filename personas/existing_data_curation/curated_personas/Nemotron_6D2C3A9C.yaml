personas:
  professional: Catherine Marrou is a budding certified nursing assistant who applies their meticulous household management skills, competitive drive, and methodical organization to deliver reliable in‑home
    care while simultaneously running a cottage‑style business that sells handcrafted knitted goods and homemade preserves.
  sports: Catherine Marrou enjoys early morning hikes with the local Trailblazers club, follows the regional football team the Midtown Titans and the soccer side River City Rovers, and incorporates a scheduled
    mix of yoga and pick‑up basketball to stay fit while balancing a busy home schedule.
  arts: Catherine Marrou finds creative fulfillment in knitting, crocheting, reading Agatha Christie mysteries, and listening to bluegrass legends like Bill Monroe and modern folk artist Gillian Welch,
    while also attending community craft fairs where they showcase their upcycled décor.
  travel: Catherine Marrou prefers meticulously planned weekend getaways to nearby state parks such as Blue Ridge and long‑awaited trips abroad like a culinary tour of Tuscany, balancing adventure with
    a budget‑conscious approach that includes detailed itineraries and travel journals.
  culinary: Catherine Marrou excels at baking traditional pies—apple, pecan, and peach—as well as flaky buttermilk biscuits, crafts their own strawberry‑basil jam from garden harvests, and enjoys experimenting
    with seasonal herbs, though they occasionally overindulge in sugary treats to the detriment of their health goals.
  core: Catherine Marrou blends methodical planning, competitive caregiving, and a leafy garden of creative hobbies, yet wrestles with persistent worry and a habit of over‑ordering craft supplies.
background:
  cultural: Catherine grew up in the Appalachian region of Eastern Kentucky, a predominantly white community where Southern hospitality, self‑reliance, and close family ties are deeply valued. Her upbringing
    was shaped by frequent participation in a local Baptist church, county fairs, and traditions of home‑cooked meals, bluegrass music, and an emphasis on hard work. While she respects these cultural roots,
    her natural curiosity drives her to explore ideas beyond her immediate environment through books, online courses, and community workshops, creating a blend of practical Appalachian sensibility and a
    desire for personal development.
