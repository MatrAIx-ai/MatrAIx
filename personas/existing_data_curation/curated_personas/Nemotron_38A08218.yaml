  career_goals: Approaching retirement, Guerby aims to transition from day‑to‑day supervision to a mentorship role, formally establishing a training program for entry‑level custodial staff within his department.
    He hopes to champion a green‑cleaning initiative that adopts sustainable products and waste‑reduction practices across Norfolk’s public facilities. Long‑term, he envisions consulting part‑time for local
    schools and community centers, sharing his expertise in operational efficiency and safety. Additionally, he aspires to volunteer as a youth mentor in a local after‑school program, using his competitive
    spirit to inspire confidence and discipline in younger generations.
