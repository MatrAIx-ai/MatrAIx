persona_description: A scientist who specializes in the study of cell receptors, specifically glutamate receptors, and their functions in the nervous system. The scientist has expertise in cryo-electron
  microscopy (cryo-EM) and is interested in understanding the molecular movements involved in the ion channels operated by these receptors. The scientist has published research on the structure of the enzyme
  beta-galactosidase using cryo-EM, and is now poised to analyze the structures of a wide variety of biologically and medically relevant multi-protein complexes and membrane protein assemblies.
