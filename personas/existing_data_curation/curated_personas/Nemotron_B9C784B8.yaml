personas:
  professional: Juana Valdes is a budding writer and storyteller who channels their structured journaling habit and love of graphic novels into weekly short‑story drafts for school, while their outgoing
    nature makes them a natural leader during group projects and dance rehearsals.
  sports: Juana Valdes energizes their weekends with the San Antonio FC youth soccer club, playing forward for their school team, admiring the tactical discipline of FC Dallas, and complementing their on‑field
    stamina with after‑school yoga sessions to stay flexible for upcoming regional tournaments.
  arts: Juana Valdes blends their love of watercolor painting with folkloric motifs inspired by Día de los Muertos altars, often listening to spirited mariachi and norteña tunes while sketching scenes from
    graphic novels like 'Ms. Marvel' and showcasing their pieces at community art fairs.
  travel: Juana Valdes dreams of wandering the historic streets of the colonial city of Guanajuato and exploring the bustling markets of Oaxaca, while they frequently revisit the San Antonio River Walk
    for family picnics and plan their next school field‑trip to Washington, D.C. using colorful planners, balancing their excitement with a tight allowance that limits long‑distance travel.
  culinary: Juana Valdes whips up homemade tamales with masa, pork and roasted chilies and layers cheesy enchiladas with rich red sauce, proudly mastering the art of folding masa leaves while secretly adding
    extra hot sauce to their plates, and they love tasting fresh mango with a squeeze of lime after meals.
  core: Juana Valdes is a structured, socially vibrant 12‑year‑old who balances team sports, cultural dance, and a vivid imagination, yet often worries about school and health, channeling their anxieties
    into creative journaling and meticulous planning.
background:
  cultural: Juana is a Mexican-American growing up in the vibrant Hispanic community of San Antonio, Texas. Her household is bilingual, with Spanish spoken at home and English at school, and she regularly
    participates in cultural traditions such as Día de los Muertos, Cinco de Mayo, and family quinceañera celebrations. Her upbringing is rooted in Catholic values and strong family connections, and she
    often engages in community events hosted by local Latino organizations. These cultural influences shape her identity, language use, culinary tastes, and appreciation for music and dance.
attributes:
  skills: '["bilingual Spanish-English", "organizational skills for schoolwork", "basic computer literacy", "team sports participation", "creative writing", "drawing and sketching", "group project coordination"]'
  hobbies: '["soccer", "dance (ballet and folklorico)", "reading graphic novels", "creative writing/journaling", "drawing and watercolor painting", "cooking traditional Mexican dishes", "multiplayer video
    gaming"]'
  career_goals: Looking ahead, Juana hopes to pursue a career that blends her love for helping others with her practical, organized nature. She dreams of becoming a bilingual elementary school teacher,
    where she can use her language skills and structured approach to support young learners. She also envisions a future as a pediatric nurse or community health worker, providing compassionate care within
    her Mexican-American community. In the longer term, Juana aims to continue her education, earn a college degree, and secure a stable, rewarding profession that allows her to make a positive impact on
    families.
