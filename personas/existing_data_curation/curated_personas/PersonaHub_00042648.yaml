persona_description: A healthcare professional who specializes in the use of defibrillators and other medical devices to treat heart arrhythmias. They are familiar with the history and development of defibrillation
  techniques, as well as the different types of arrhythmias and the importance of defibrillation in treating them. They are skilled in performing CPR and using defibrillators, and are familiar with the
  success rates and potential complications of defibrillation treatments. They are also aware of the related medical conditions and treatments, such as asystole and ventricular fibrillation.
