personas:
  professional: Tia White, an aspiring concept artist and visual storyteller, fuses self‑taught digital illustration with Python‑powered interactive sketches, leverages their sharp eye for color theory
    and analytical mind to craft evocative game assets, and channels a competitive drive into entering youth art contests despite a laid‑back attitude toward deadlines and a habit of postponing schedule‑keeping,
    yet they remain focused on building a freelance career.
  sports: Tia White, a frequent cyclist on the Scioto River trail, follows the Cleveland Browns and Ohio State Buckeyes with steadfast loyalty, joins occasional pickup basketball games at the community
    center, and prefers low‑pressure fitness habits like sunrise yoga and leisurely bike rides, reflecting their calm demeanor and modest competitive spark, yet they occasionally push themselves to out‑pace
    friends on weekend rides.
  arts: Tia White, a mixed‑media enthusiast, spends weekends sketching in Riverside Park while listening to Bon Iver and Kiasmos, draws inspiration from Olafur Eliasson’s immersive installations and Hayao
    Miyazaki’s narrative depth, and regularly attends indie film screenings at the Allen County Museum where they engage in thoughtful, sometimes skeptical, discussions with a close circle of fellow art
    lovers.
  travel: Tia White, dreaming of swapping Ohio’s flatlands for Tokyo’s neon streets and Giethoorn’s tranquil canals, nonetheless focuses on weekend road trips to Hocking Hills State Park and spontaneous
    lakeside camping along Lake Erie, planning each escape on a whim while budgeting carefully through scholarship winnings and part‑time illustration gigs, and they often capture the journeys with candid
    street‑style photography to feed future art projects.
  culinary: Tia White, an amateur cook who favors farm‑to‑table flavors, often prepares quinoa‑stuffed bell peppers with roasted heirloom tomatoes and fresh basil, experiments with matcha‑foam latte art
    for brunch, and enjoys occasional avocado toast with poached eggs at a local café, though they habitually forget to restock staples, leading to creative late‑night pantry ramen sessions.
  core: Tia White is a curious, calm 17‑year‑old who sketches, codes art bots, and rides bikes for inspiration, yet their disorganized habit of neglecting schedules and dental check‑ups is balanced by an
    unshakable competitive drive to win art contests, and they never let anxiety cloud their creative process.
background:
  cultural: Tia grew up in Lima, a small city in western Ohio rooted in Midwestern agrarian and industrial traditions. Her family’s cultural background is typical of white working‑class communities in the
    region, with an emphasis on modesty, self‑reliance, and a close‑knit neighborhood fabric. While she shares these local values—such as a strong work ethic and community loyalty—her curiosity has pushed
    her beyond the town’s conventional outlook. Through the internet and occasional trips to nearby cultural institutions, Tia has absorbed global artistic influences, blending them with the understated,
    practical sensibility of her hometown. This dual exposure informs her reserved demeanor, her skepticism toward surface‑level motives, and her desire to carve an unconventional creative path while staying
    grounded in the modest, resilient spirit of the Midwest.
attributes:
  skills: '["Digital illustration (Procreate, Photoshop)", "Photography (candid, nature, Lightroom)", "Creative writing (short stories, poetry)", "Critical analysis of visual media", "Basic Python scripting
    for interactive art", "Color theory and composition", "Informal art curation (school club, community events)"]'
  hobbies: '["Sketching in parks", "Mixed‑media collages", "Listening to eclectic music (indie folk, ambient electronic)", "Reading speculative fiction and philosophy", "Puzzle solving (escape rooms, logic
    games)", "Volunteering at Allen County Museum (exhibition setup)", "Cycling along Scioto River trail"]'
  career_goals: Tia aspires to turn her artistic passions into a flexible, independent career. She plans to attend a specialized bachelor’s program in illustration or visual storytelling, with the goal
    of becoming a freelance concept artist for video games or animation studios. She also envisions her own online portfolio and occasional commissions, aiming to exhibit her work in regional galleries
    and national student showcases. Competitive by nature, she hopes to win prestigious youth art competitions and secure scholarships that support her travel to art residencies abroad, allowing her to
    broaden her creative perspective while maintaining the autonomy she values.
