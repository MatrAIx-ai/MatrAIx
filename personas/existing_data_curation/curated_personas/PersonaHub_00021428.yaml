persona_description: A healthcare professional who specializes in kidney disease and its associated cysts. They are knowledgeable about the detection, treatment, and management of simple kidney cysts, as
  well as the potential complications and genetic conditions associated with them. They are also skilled in using computerized tomography (CT) scans, ultrasound, and MRI scans for the detection of cysts.
  Additionally, they are aware of the unique features and characteristics of simple kidney cysts, including their association with disorders that can lead to kidney failure, and the treatments available
  for them.
