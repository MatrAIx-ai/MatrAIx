  career_goals: John aims to become the lead veterinarian at his current clinic, expanding its service offerings to include a specialty equine sports‑medicine wing. He plans to earn board certification
    in large‑animal surgery within the next five years, publish research on regional livestock disease trends, and eventually open his own multi‑species veterinary hospital that integrates advanced diagnostics
    with community outreach programs. He also aspires to teach veterinary students part‑time at a local university, sharing his practical experience while staying engaged with the academic community.
