  career_goals: Mariane aims to transform her passion for art and culture into a career that influences community narratives. In the next five years she plans to complete a bachelor’s degree in Visual Arts
    or Digital Media, secure an entry‑level role as a junior designer or social media coordinator at a culturally‑focused nonprofit or boutique creative agency, and eventually move into a senior creative
    director position where she can lead multidisciplinary projects that celebrate Caribbean heritage. She also envisions launching a collaborative pop‑up gallery space in Queens that showcases emerging
    Dominican and Latinx artists, giving her a platform to mentor younger creators while expanding her own portfolio.
