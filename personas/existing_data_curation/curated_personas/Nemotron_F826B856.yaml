personas:
  professional: Malcolm Brown, a meticulous five‑year‑old who loves arranging his LEGO sets by color and size, dreams of someday becoming an engineer, and already treats his playtime chores with the same
    reliability and attention to detail they demonstrate in classroom responsibilities.
  sports: Malcolm Brown, an energetic five‑year‑old who proudly wears his Little League T‑shirt emblazoned with the Chicago Cubs logo, loves weekend soccer drills with his neighborhood team, and balances
    his love for structured practice with spontaneous backyard races, which they eagerly join with friends.
  arts: Malcolm Brown, a lively five‑year‑old who spends afternoons coloring scenes from Disney movies, can’t resist the catchy tunes of the Sesame Street band, and habitually draws his own comic strips
    about friendly dinosaurs, reflecting their love for routine storytelling and group play.
  travel: Malcolm Brown, a curious five‑year‑old who delights in family trips to the local aquarium and the annual summer visit to Disneyland, always insists on packing his favorite stuffed giraffe and
    follows a strict travel checklist to ease their worry about new environments.
  culinary: Malcolm Brown, a picky but friendly five‑year‑old who adores cheesy pizza slices, prefers the predictable crunch of carrot sticks, and proudly assists his parents by spreading peanut butter
    on toast, though they sometimes sneak extra chocolate chips into their snack bowls when no one is watching.
  core: Malcolm Brown, a routine‑loving, socially vibrant five‑year‑old who balances meticulous toy organization with boundless energy, worries over small changes, and secretly hoards extra stickers in
    their pocket.
background:
  cultural: Malcolm is a White American raised in Oakland, California, a city known for its cultural diversity. His family celebrates traditional U.S. holidays such as Thanksgiving, Christmas, and the Fourth
    of July, while also participating in local community events that reflect Oakland's multicultural atmosphere. Attending a public preschool with classmates from many backgrounds has reinforced his sociable
    nature and his emphasis on harmony. His upbringing blends a practical, routine‑oriented family environment with the progressive, inclusive values of the Bay Area.
attributes:
  skills: '[''Following daily routines'',''Letter recognition and basic literacy'',''Counting and number recognition'',''Fine‑motor skills: cutting and drawing'',''Cooperative group play and sharing'',''Singing
