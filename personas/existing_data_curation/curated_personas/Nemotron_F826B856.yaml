  hobbies: '[''Building with LEGO Duplo'',''Drawing and coloring'',''Group playground games (tag, hide‑and‑seek)'',''Watching educational cartoons (Sesame Street, Paw Patrol)'',''Library storytime and picture
    books'',''Singing nursery rhymes'',''Collecting and trading stickers'']'
  career_goals: Malcolm dreams of becoming a community helper who can keep people safe and happy. He often talks about wanting to be a firefighter or a teacher because he likes caring for others and maintaining
    order. He also hopes to become an excellent reader and writer so he can help friends with schoolwork and tell stories. His underlying ambition is to create a stable, predictable life where he can support
    his family and friends.
