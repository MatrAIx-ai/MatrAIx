  career_goals: Brian plans to enroll in a community‑college program for automotive technology, aiming to earn certification as a mechanic within the next two years. His long‑term ambition is to combine
    his technical expertise with his methodical nature by managing a small service team or eventually opening his own repair shop. He also hopes to give back to Kyle by volunteering with the local fire
    department and mentoring high‑school students interested in trades, leveraging his reliable and cooperative reputation.
