  career_goals: Looking ahead, Mary Lynn aims to transition into a senior administrative leadership role, such as Office Manager or Executive Assistant Manager, where she can oversee multiple departments
    and mentor junior staff. She plans to obtain the Certified Administrative Professional (CAP) credential and pursue project management certification to broaden her strategic capabilities. Leveraging
    her passion for the arts, she envisions integrating creative initiatives into the workplace, such as curating office art displays and organizing cultural events. Over the next five years, she hopes
    to spearhead efficiency‑driven projects that enhance organizational workflow while also exploring opportunities to consult small businesses on office organization and artistic branding.
