  career_goals: Even at this young age, Luz Maria often reflects on future roles she sees adults performing. She expresses a strong desire to become a "helper"—imagining herself as a preschool teacher,
    a community volunteer, or a caregiver who creates a safe, structured environment for other children. She hopes to one day organize classroom activities, lead group games, and support families, combining
    her love for order with her outgoing, compassionate nature.
