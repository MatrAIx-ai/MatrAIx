personas:
  professional: Luz Garcia, a preschool enthusiast who loves arranging blocks and stuffed animals into labeled bins, pretends to be a kindergarten teacher, and they apply a methodical, organized approach
    while thriving on group play and the lively energy of peers.
  sports: Luz Garcia, an energetic toddler, participates in the Little Kickers soccer program, enjoys splash-water play at the community pool, and they passionately cheer for the New York Yankees during
    family outings, reflecting a love for structured group sports and lively fandom.
  arts: Luz Garcia, delighted by coloring with Crayola crayons, humming Raffi's 'Baby Beluga' and The Wiggles' melodies, and they eagerly attend weekly storytime sessions where Dr. Seuss books are read
    aloud, making creative play a central part of their day.
  travel: Luz Garcia, who loves family road trips guided by a bright picture-based itinerary, has explored Disney World in Orlando and the sandy shores of San Diego, and they dream of a future visit to
    the Grand Canyon, balancing excitement with the need for regular naps and snack breaks.
  culinary: Luz Garcia, who favors warm macaroni and cheese, crunchy chicken nuggets, and sweet banana slices, proudly helps stir pancake batter with a tiny spoon, and they often request strawberry jam
    on toast, though they sometimes create a mess by spilling milk during snack time.
  core: Luz Garcia, a meticulously organized yet highly emotional three-year-old, thrives on structured play, clings to routines, and they can become dramatically upset over a missing sticker or an empty
    piggy bank.
background:
  cultural: Luz Maria grows up in a Mexican‑American household in San Jose, California. Her family speaks both Spanish and English at home, celebrating cultural traditions such as Día de los Muertos, la
    Navidad, and quinceañera preparations for older relatives. She enjoys Mexican foods like tamales and enchiladas, participates in family gatherings that emphasize respect for elders, and experiences
    the multicultural vibrancy of Silicon Valley, which blends her heritage with the broader community's diverse influences.
