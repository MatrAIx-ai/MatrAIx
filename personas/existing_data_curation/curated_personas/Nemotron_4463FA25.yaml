  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Speculative fiction writing'', ''Improvisational theater'', ''Street photography'', ''Exploring local art galleries'', ''Hiking'', ''Experimental
    music listening'', ''Cooking Salvadoran cuisine'', ''Philosophy reading'']'
  career_goals: Carlos aims to turn his passion for visual storytelling into a sustainable freelance career, targeting concept art roles in gaming and film studios while also developing a personal brand
    as a speculative fiction author. He envisions publishing a collection of short stories that blend Salvadoran folklore with futuristic themes and establishing an online platform that showcases emerging
    Latin American artists. Long‑term, he hopes to launch a community art space in Lynn that fosters cross‑cultural collaborations and provides mentorship for other aspiring creators.
