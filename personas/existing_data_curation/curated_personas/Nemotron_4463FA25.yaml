personas:
  professional: Carlos Perez, a 28‑year‑old visual storyteller, leverages self‑taught digital illustration and concept‑art skills to chase freelance gigs in gaming and film while simultaneously building
    a speculative‑fiction author brand, yet frequently battles organization and deadline‑driven pressure because they prefer a spontaneous, imagination‑driven workflow.
  sports: Carlos Perez, a 28‑year‑old visual artist from the Boston area, subscribes to the Boston Celtics and Boston Red Sox while occasionally joining the Boston Trail Runners club for weekend hikes and
    trail runs, embraces winter snowshoeing on local trails and summer kayaking on the Charles River, yet their spontaneous schedule often leads to irregular workouts and they prioritize creative bursts
    over disciplined training regimes.
  arts: Carlos Perez, a 28‑year‑old freelance concept artist, spends evenings dissecting the abstract soundscapes of Autechre and Oneohtrix Point Never, immerses in the vivid canvases of Mark Rothko and
    Kara Walker, actively participates in Boston Improv workshop series, and fuels speculative short stories with poetry from Central American voices like Gioconda Belli, allowing their eclectic artistic
    palate to shape a constantly evolving visual and narrative identity.
  travel: Carlos Perez, a 28‑year‑old wandering creative from Lynn, prefers spur‑of‑the‑moment weekend getaways to coastal Maine, the historic streets of Boston, and the vibrant markets of Mexico City while
    meticulously sketching each new scene for future projects, yet saves up for longer‑term adventures such as a sci‑fi inspired pilgrimage to Tokyo and a rugged trek through Patagonia, balancing a modest
    freelance income with a love for both cultural immersion and natural exploration.
  culinary: Carlos Perez, a 28‑year‑old kitchen tinkerer, often experiments with pupusas by stuffing them with smoked Gouda, roasted poblano peppers, and caramelized onions, while also whipping up quick
    avocado toast with hemp seeds for breakfast, enjoys hunting for fresh masa at the local farmer’s market, yet their spontaneous schedule sometimes leads to midnight snack runs for artisanal ramen instead
    of planned meals.
  core: Carlos Perez, a 28‑year‑old imagination‑driven freelancer, lives in a perpetual balance of frantic creative bursts and looming deadline anxiety, trading structured planning for spontaneous sketch‑sessions,
    risky crypto bets, and midnight pupusa experiments, all while competing with themselves to turn speculative dreams into tangible art.
background:
  cultural: Carlos grew up in a Salvadoran immigrant household in Lynn, Massachusetts, where Spanish was spoken at home and family gatherings celebrated traditional holidays such as Las Fiestas. He was
    raised on Salvadoran foods, music, and folk art, which left a lasting imprint on his aesthetic sensibilities. While fully integrated into the multicultural fabric of Essex County, he maintains strong
    ties to his heritage through community events at local cultural centers, visits to family in El Salvador, and by weaving Salvadoran motifs and narratives into his artwork. This dual cultural perspective
    fuels his creative voice, allowing him to blend the vivid colors and storytelling traditions of his roots with contemporary American artistic trends.
