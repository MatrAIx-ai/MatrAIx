  hobbies: '["visiting art galleries and museums", "painting and sketching", "reading art history and philosophy", "fishing on the Wisconsin River", "gardening", "woodworking", "playing bridge", "volunteering
    with local historical society", "attending community theater", "traveling to cultural festivals"]'
  career_goals: Ricardo aims to transition from full-time analysis to a part-time advisory and mentorship role, sharing his decades-long market insights with younger professionals and local entrepreneurs.
    He hopes to author a book that explores the intersection of finance and visual arts, promoting innovative investment strategies that incorporate cultural value. Additionally, he plans to secure and
    grow his personal portfolio with a focus on sustainable and community-focused assets, ensuring financial stability for his family while contributing to regional cultural initiatives. Ricardo also aspires
    to volunteer his expertise to the town's economic development council, helping Nekoosa attract sustainable businesses.
