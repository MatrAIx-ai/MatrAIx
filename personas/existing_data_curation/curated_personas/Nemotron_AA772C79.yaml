  hobbies: '[''Visiting Art Galleries'', ''Collecting Mexican Folk Art'', ''Watercolor Painting'', ''Arduino Electronics Projects'', ''Reading Historical Biographies'', ''Gardening'', ''Cooking Mexican
    Cuisine'', ''Fishing at Galveston Bay'', ''Playing Tennis'', ''Attending Cultural Festivals'']'
  career_goals: Looking ahead, Gregorio aims to advance to a district manager role where he can shape multi-store operations and integrate advanced analytics into retail strategy. He is also interested
    in leading a pilot program for omnichannel sales that merges in‑store experiences with e‑commerce, leveraging his STEM background. Parallel to his professional growth, he hopes to mentor the next generation
    of supervisors and eventually transition to consulting on retail technology adoption before retiring to open a small community art gallery and café that celebrates Mexican heritage.
