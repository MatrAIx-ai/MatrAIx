personas:
  professional: Johanna Tellez, a 55‑year‑old telecommunications veteran with three decades of hands‑on RF installation and maintenance, blends meticulous documentation with a curiosity for emerging 5G
    and smart‑home tech, and they aim to earn advanced FCC and Cisco certifications while mentoring apprentices and eventually launching their own residential telecom business in Los Angeles.
  sports: Johanna Tellez stays active through daily walks on nearby nature trails, occasionally joins a senior walking club that supports the Los Angeles Dodgers community outreach program, and prefers
    low‑impact exercise over competitive sports, valuing gentle fitness that fits their solitary yet disciplined lifestyle.
  arts: Johanna Tellez finds creative resonance in listening to boleros and cumbia by Los Panchos and Celia Cruz while they knit, enjoys reading historical fiction such as Ken Follett’s 'The Pillars of
    the Earth' and biographies of pioneering engineers, and occasionally attends local community theater productions featuring classic cinema icons, allowing music and literature to balance the technical
    rigor of their day.
  travel: Johanna Tellez prefers thoughtfully planned trips that combine cultural immersion with relaxation, having explored the historic streets of Granada, the coastal charm of Santa Barbara, and the
    natural grandeur of Yosemite, while they still dream of visiting the Maya ruins at Tikal and the historic neighborhoods of Barcelona for inspiration.
  culinary: Johanna Tellez delights in preparing pupusas stuffed with queso fresco and loroco and steaming tamales filled with pork and masa, supplements these meals with fresh garden-grown tomatoes, cilantro,
    and chilies for salsa, and enjoys showcasing their intermediate cooking skills at family gatherings where they proudly serve homemade corn tortillas alongside a side of avocado.
  core: Johanna Tellez is a meticulous yet curious telecom veteran who balances a love for solitary radio tinkering and traditional cooking with disciplined financial planning, occasional health oversight,
    and a quiet, reflective appreciation for music and nature, and they often hum a bolero while calibrating equipment.
background:
  cultural: Johanna’s Salvadoran roots shape her daily life and values. Raised in a close‑knit bilingual household, she speaks Spanish at home and English at work, preserving cultural traditions such as
    celebrating Día de la Independencia and participating in local Salvadoran festivals in Reseda. Family and community are central, and she maintains strong ties to the Salvadoran diaspora through church
    gatherings and cultural events. Her heritage fosters a sense of craftsmanship, reliability, and a supportive attitude toward others, which she carries into her professional and personal interactions.
attributes:
  skills: '[''RF equipment installation'', ''troubleshooting and diagnostics'', ''cable termination and splicing'', ''basic fiber optic work'', ''FCC compliance and safety standards'', ''bilingual technical
    communication (Spanish/English)'', ''technical documentation'', ''preventive maintenance'', ''customer service and training'']'
  hobbies: '[''Cooking Salvadoran cuisine'', ''Gardening'', ''Reading historical fiction'', ''Amateur radio hobby'', ''Listening to Latin music'', ''Walking local nature trails'', ''Volunteering at community
    tech workshops'', ''Sewing and knitting'']'
  career_goals: Johanna aims to advance to a senior field technician role and acquire advanced certifications such as the FCC General Radiotelephone Operator Permit and Cisco Certified Technician. She aspires
    to lead a small team of installers, mentor younger apprentices, and eventually launch her own independent telecom installation business focused on residential and small‑business clients in the Los Angeles
    area. She also seeks to deepen her expertise in emerging 5G infrastructure and smart‑home systems, ensuring long‑term financial stability for her family and a comfortable retirement.
