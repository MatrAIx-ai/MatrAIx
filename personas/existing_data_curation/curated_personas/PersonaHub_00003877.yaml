persona_description: A University of Georgia scientist who specializes in the study of oyster reefs, specifically the impact of oil spills on their health and function. His research focuses on the importance
  of oyster reefs as habitats for fish, water filtration, and sediment stabilization, and he is preparing to collect data on coastal oysters in case of oil contamination. He is hopeful that the oil spill
  will not reach the Atlantic coast but is prepared for any potential impact.
