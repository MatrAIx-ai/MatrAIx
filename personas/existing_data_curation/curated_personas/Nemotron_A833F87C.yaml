  career_goals: John aspires to become a civil engineer, envisioning a future where he designs safe, sustainable infrastructure such as bridges, roads, and community parks. He plans to focus on math and
    science courses throughout high school, seek out a university with a strong engineering program, and participate in internships or volunteer projects that involve local planning and construction. Beyond
    engineering, he holds a secondary ambition to mentor younger students, possibly as a teacher or youth club leader, sharing his structured approach and collaborative spirit.
