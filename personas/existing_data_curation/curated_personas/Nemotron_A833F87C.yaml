personas:
  professional: John Widrig, a 13‑year‑old aspiring engineer, channels their love for LEGO Technic and robotics into methodical problem‑solving, and they lead the school robotics club with meticulous planning
    and a collaborative spirit.
  sports: John Widrig, a regular member of the Saint Charles Youth Bike Club, cycles the neighborhood streets, roots for the Chicago Cubs during televised games, and competes in school track and field events
    while also joining impromptu backyard soccer matches, and they relish the balance of structured training and spontaneous play.
  arts: John Widrig, an avid reader of Isaac Asimov’s sci‑fi novels, enjoys the synth‑rock of Imagine Dragons, dives into puzzle‑centric video games like The Witness, and attends the community theater’s
    production of 'The Wizard of Oz' with their family, while they often discuss plot twists and musical cues with friends afterward.
  travel: John Widrig, who prefers structured itineraries, has explored the Museum of Science and Industry in Chicago and spent summer days at Wisconsin Dells, and they dream of a family road trip to the
    Kennedy Space Center and an immersive cultural visit to Tokyo’s Akihabara district.
  culinary: John Widrig, who treats meals like building blocks, layers pepperoni pizza with extra cheese, mixes mac & cheese with a dash of cheddar, bakes chocolate chip cookies with grandma for holiday
    gatherings, but they sometimes over‑season their spaghetti sauce.
  core: John Widrig is a methodical teen who balances structured projects like robotics with spontaneous snack cravings, values community traditions, and constantly seeks to build, plan, and improve the
    world around them.
background:
  cultural: John comes from a middle‑class, white, Midwestern American family in Saint Charles, Illinois. His upbringing reflects typical Midwestern values such as punctuality, neighborliness, and community
    involvement. He has grown up attending a public elementary school and participating in local traditions like the Fourth of July parade, Memorial Day ceremonies, and church gatherings. Family celebrations
    of holidays such as Thanksgiving and Christmas emphasize togetherness, modesty, and respect for rules. These cultural influences have reinforced his cooperative demeanor, appreciation for structure,
    and desire to contribute positively to his community.
