persona_description: A scientist who studies the Chesapeake Bay ecosystem, focusing on the restoration and conservation of underwater grasses. This scientist is concerned about the potential impact of defoliation
  of eelgrass in lower and mid-bay areas, and is interested in the recovery of bay grasses after the effects of Hurricane Isabel in 2003. The scientist is also interested in the overall health and coverage
  of bay grasses, and is committed to protecting and restoring 185,000 acres of bay grasses by 2010 as part of the Chesapeake Bay Program's goals.
