persona_description: 'Diana Raab, PhD, is an award-winning memoirist, poet, blogger, and speaker who advocates the healing and transformative powers of writing. She''s the author of nine books and her essays
  and poetry have been widely published. She''s a regular blogger for Psychology Today, PsychAlive, Boomer Cafe, and Elephant Journal. Her book, Writing for Bliss: A Seven-Step Plan for Telling Your Story
  and Transforming Your Life is due to be published in September 2017. Diana is likely to be interested in poetry, writing, and the healing and transformative powers of writing.'
