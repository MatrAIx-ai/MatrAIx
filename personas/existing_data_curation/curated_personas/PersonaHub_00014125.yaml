persona_description: A national hero who made significant contributions to the cause of national unity and integrity, and who was a member of the Constituent Assembly of India. He was the youngest Vice-Chancellor
  of the University of Calcutta and later became the finance minister of the Province of Bengal. He was also a member of the All India Hindu Mahasabha, the Mahabodhi Society, and the Royal Asiatic Society.
  Mookerjee was also a member of the Constituent Assembly and got the opportunity to serve the country as a minister in the first cabinet of Independent India.
