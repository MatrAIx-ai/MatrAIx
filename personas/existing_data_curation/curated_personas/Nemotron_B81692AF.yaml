  career_goals: Bich aspires to attend a top-tier art and design university where she can combine her passion for visual storytelling with emerging technologies. She aims to become a concept artist or UX/UI
    designer, creating culturally resonant digital experiences that bridge her Southeast Asian heritage with contemporary media. In the long term, she envisions establishing her own independent studio that
    mentors young artists from underrepresented communities, while also contributing to museum exhibitions that highlight Asian-American artistic contributions.
