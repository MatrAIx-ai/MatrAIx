personas:
  professional: Bich Desai, a 15‑year‑old budding visual artist, combines daily sketching of Houston’s Chinatown alleyways with Python scripts that animate her illustrations, leveraging a meticulous, organized
    workflow and a competitive drive to enter youth art contests.
  sports: Bich Desai, an avid supporter of the Houston Astros and a participant in a school cross‑country team, also plays pick‑up basketball at a local community center, balancing structured training with
    weekend runs that double as photo walks, and they keep a competitive edge by logging personal best times.
  arts: Bich Desai, an enthusiastic sketcher and manga fan, devours series like One Piece and Saga while attending museum tours at the Museum of Fine Arts Houston, admires the works of Hayao Miyazaki and
    Banksy, and spends weekends in art workshops learning watercolor techniques that they fuse with digital animation.
  travel: Bich Desai, a methodical planner, prefers organized city trips like a weekend itinerary through San Antonio’s River Walk and a day exploring New Orleans’ French Quarter, while dreaming of a future
    cultural immersion in Kyoto’s historic temples, and they often bring a portable camera to capture street scenes on every journey.
  culinary: Bich Desai, who enjoys cooking ramen with miso broth, sizzling shrimp tacos, and bubble tea with tapioca pearls, often experiments with shiitake mushrooms and Thai basil in their kitchen, yet
    they sometimes forget to clean up afterward, leaving a trail of spices on the counter.
  core: Bich Desai is a 15‑year‑old art‑obsessed pragmatist who sketches, codes, and photographs with competitive precision, yet often loses track of time in a mess of crayons and coffee cups.
background:
  cultural: Bich was raised in a bicultural household in Houston, where her mother’s Vietnamese roots and her father’s Indian heritage blend with the diverse fabric of the city. She celebrates Tet with
    family gatherings, traditional foods, and lantern festivals, while also participating in Diwali celebrations that introduce her to Indian customs and cuisine. Bich attends Vietnamese language classes
    on Saturdays, which strengthen her bilingual abilities and deepen her connection to Southeast Asian storytelling traditions. These cultural experiences influence her artistic style, often incorporating
    motifs from Vietnamese folklore and Indian patterns into contemporary digital works.
