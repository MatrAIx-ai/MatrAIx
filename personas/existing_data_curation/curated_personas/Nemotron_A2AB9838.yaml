  career_goals: Mckinley aims to transition into a Creative Director role within a tech‑driven agency, leading multidisciplinary teams to deliver products that marry business impact with compelling user
    experiences. He wants to launch his own boutique design studio focused on socially conscious brands, mentor junior designers from underrepresented backgrounds, and become a thought leader speaking on
    inclusive design and sustainability. He also plans to deepen his strategic acumen by completing an executive MBA and contributing to corporate innovation labs.
