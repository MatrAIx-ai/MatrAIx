personas:
  professional: Roberto Butler is a three-year-old who already demonstrates meticulous organization by arranging toys in perfect rows, suggesting a future as an architect with a disciplined eye for detail
    and a calm, structured approach.
  sports: Roberto Butler enjoys the predictability of the Saturday morning toddlers' gymnastics class at the Bright Kids Club, cheerfully watches the local baseball team, the City Cubs, and they prefer
    structured play over free‑form running.
  arts: Roberto Butler delights in drawing simple shapes while humming the soothing lullabies of Disney’s "Let It Go" and the melodic rhythms of the Sesame Street theme, often curling up with picture books
    by Eric Carle, which they cherish and which shape their gentle, imaginative world.
  travel: Roberto Butler has savored family road trips to the nearby coastal beach of Sunny Cove and a short flight to the sprawling dinosaur exhibit at the National Museum of Natural History, preferring
    well‑planned itineraries with familiar routines over spontaneous adventures.
  culinary: Roberto Butler prefers soft, bite‑size meals like cheese‑filled macaroni, chicken nuggets, and sliced banana, often insisting on the bright orange ketchup and a side of apple slices, while they
    proudly attempt to sprinkle shredded cheddar on their own plate.
  core: Roberto Butler is a three‑year‑old bundle of disciplined curiosity, who thrives on routine, organizes toys with precision, and they navigate a world of gentle worries with a caring heart.
background:
  cultural: Roberto’s cultural background is rooted in a white, middle‑class family in Odessa, Texas, a city known for its oil‑rich economy and strong high‑school football tradition. His upbringing reflects
    typical Texas values of independence, community involvement, and a respect for routine. Family gatherings often center around weekend football games, Thanksgiving meals, and church attendance, reinforcing
    a sense of belonging and shared customs. The desert landscape of West Texas influences his love for outdoor play, and local community events provide a supportive environment that nurtures his organized
    and considerate nature.
