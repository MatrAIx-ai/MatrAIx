personas:
  professional: Jose Rivabella, a precocious 4‑year‑old preschooler, leads the classroom’s block‑building club with a meticulously organized approach to stacking while freely incorporating whimsical designs,
    reflecting early leadership and a love for creative problem‑solving.
  sports: Jose Rivabella, a lively member of the Little Lions preschool soccer team, eagerly practices dribbling in the park, gushes over the hometown’s junior baseball club, the Cubs, and never misses
    a family outing to the local swimming pool where they splash with boundless energy.
  arts: Jose Rivabella, an animated fan of Sesame Street and the rhythmic tunes of The Wiggles, spends afternoons drawing vibrant crayon scenes of dinosaurs and rainbows, proudly performing a homemade puppet
    show for family, and humming along to Raffi's Baby Beluga, weaving music and visual art into daily play.
  travel: Jose Rivabella, an adventurous traveler for their age, loves road trips to the nearby aquarium where they press their nose against the glass to watch sea turtles, eagerly anticipates a future
    visit to Disneyland, and enjoys short family getaways to the grandparents’ countryside cottage, preferring trips that blend excitement with familiar comforts.
  culinary: Jose Rivabella, a budding foodie, favors cheesy macaroni with a sprinkle of extra cheddar, giggles while dipping carrot sticks into hummus, proudly mixes pancake batter with a wooden spoon,
    and delights in trying a slice of pepperoni pizza topped with olives at family pizza nights.
  core: Jose Rivabella, a 4‑year‑old who merges boundless curiosity with a flair for leading block‑building sessions, balances disciplined saving with occasional impulsive treats, and channels their sociable
    energy into playful storytelling, all while occasionally forgetting to put on their jacket on chilly mornings.
background:
  cultural: Jose’s family maintains strong Guatemalan roots while living in Newman, California. He grows up hearing Spanish lullabies, celebrating traditional holidays such as Día de los Muertos and Semana
    Santa with colorful altars and homemade foods like tamales and atol de elote. At home, he learns basic Spanish words and phrases, and his parents share stories about life in Guatemala, fostering a sense
    of bicultural identity. Local community events, such as the annual Central Valley Latino Festival, give him exposure to Latin dance, music, and art, reinforcing his appreciation for his heritage.
