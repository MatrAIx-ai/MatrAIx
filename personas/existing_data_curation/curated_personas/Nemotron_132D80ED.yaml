  career_goals: Jose dreams of becoming someone who creates and shares stories. He often says he wants to be an artist who paints big colourful pictures, a cartoonist who makes his own characters, or a
    teacher who can tell exciting tales to other kids. He also imagines helping his community, perhaps as a firefighter who protects neighbours, reflecting his desire to be both creative and useful.
