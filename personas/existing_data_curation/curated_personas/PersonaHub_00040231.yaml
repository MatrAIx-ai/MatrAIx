persona_description: A linguistics researcher who specializes in the study of bilingualism and bilingual reading. She is particularly interested in the decoding process and the role of phonological awareness
  in reading success. Her research focuses on the differences in decoding strategies between English and Spanish speakers and the impact of first language skills on phonemic awareness. She is also interested
  in the use of self-reports to understand reading strategies and their effectiveness in bilingual reading.
