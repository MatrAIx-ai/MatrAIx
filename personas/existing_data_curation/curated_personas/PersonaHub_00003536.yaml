persona_description: Marva Temple, an educator and activist who established St. Thomas More's School for Backward Children, a special school for mentally deficient or subnormal children. She was highly
  educated and an advocate for the education of such children, believing that they could thrive in a specialized environment. Temple was instrumental in establishing the school and its operations, leasing
  the Linden Lodge property and running it for some time into the 1940s. Her work was recognized by Catholic priests and other individuals who sought to support her cause, and she was eventually able to
  purchase the property and continue the school's operations.
