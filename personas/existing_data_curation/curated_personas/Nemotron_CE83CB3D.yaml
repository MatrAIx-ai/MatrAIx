  hobbies: '[''reading historical non-fiction'', ''listening to jazz and blues music'', ''rooftop gardening'', ''woodworking'', ''walking in Prospect Park'', ''attending church bible study'', ''volunteering
    at a community food bank'']'
  career_goals: Khalil aims to transition into a supervisory or mentorship role within the next two years, securing a shift‑lead position that allows him to formalize his knowledge and guide younger inspectors.
    He hopes to achieve an OSHA 30‑hour certification and to be recognized for maintaining a zero‑defect record at his facility. Post‑retirement, he plans to offer part‑time consulting to small manufacturers
    in Brooklyn, focusing on improving their quality systems while maintaining a stable income to support his family's future.
