  career_goals: William aims to complete his bachelor's degree in communication or marketing while building a portfolio of digital media projects. He aspires to secure an entry‑level position in social
    media management or community outreach, leveraging his outgoing nature and content‑creation skills. In the long term, he hopes to become a digital marketing specialist or brand manager focused on mental‑health
    awareness campaigns, blending his curiosity for new ideas with a practical, stable career path.
