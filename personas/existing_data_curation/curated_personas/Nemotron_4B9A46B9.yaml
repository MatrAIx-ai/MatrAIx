  career_goals: Christine envisions a future where she can combine her love of structure with helping others. She aspires to become a veterinarian because she admires the orderly science of animal care
    and the compassion required to heal pets and wildlife. She also considers a career as a science teacher, valuing the predictability of lesson planning and the opportunity to mentor younger students.
    In the short term, she aims to strengthen her science coursework, volunteer at the local animal shelter, and earn a junior badge in first aid to build a solid foundation for her long‑term goals.
