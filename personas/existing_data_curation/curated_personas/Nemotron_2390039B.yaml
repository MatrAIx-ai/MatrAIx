  hobbies: '["Zumba classes", "Kayaking on Galveston Bay", "Beach‑cleanup volunteering", "Cooking workshops (Tex‑Mex & coastal cuisine)", "Gardening", "DIY home‑improvement projects", "Reading business
    and self‑development books", "Listening to real‑estate tech podcasts"]'
  career_goals: Joy aims to rank among the top five agents in Galveston County within the next three years, hitting ambitious sales‑volume targets and earning statewide recognition. She plans to launch
    a boutique brokerage that blends data‑backed strategies with community‑centric service, hiring and mentoring a competitive team of agents. To differentiate her listings, she is exploring VR and AI‑driven
    property previews. Financially, she seeks to build a portfolio of investment properties that generate passive income for her family's long‑term security. Additionally, she aspires to speak at regional
    real‑estate conferences, sharing insights on merging new technology with proven sales tactics.
