  career_goals: Steven aims to transition from a machine feeder to a certified CNC operator within the next two years, planning to earn NIMS certification and an associate degree in industrial technology
    at a nearby community college. He aspires to become a shift lead or production supervisor, where he can apply his curiosity for process improvement to drive lean initiatives. Long‑term, he envisions
    opening a small custom‑fabrication shop that blends his mechanical skills with his interest in personalized projects, while maintaining a flexible schedule that supports his active social life.
