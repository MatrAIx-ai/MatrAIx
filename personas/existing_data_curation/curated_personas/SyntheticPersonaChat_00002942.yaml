    User 1: I agree! It''s so well written.

    User 2: So, what do you do for a living?

    User 1: I''m a computer programmer.

    User 2: Oh cool! I''m a student.

    User 1: What do you study?

    User 2: I''m studying computer science.

    User 1: That''s awesome! I''m a big fan of computers.

    User 2: Me too! I love learning about how they work.

    User 1: Do you have any plans for after you graduate?

    User 2: I''m not sure yet. I''m thinking about getting a job as a software engineer.

    User 1: That sounds like a great plan!

    User 2: Thanks! I''m excited to see where my career takes me.

    User 1: I''m sure you''ll do great things.

    User 2: Thanks! I hope so!'
