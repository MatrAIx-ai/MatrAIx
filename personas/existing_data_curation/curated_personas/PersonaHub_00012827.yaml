persona_description: A scientist who studies the interactions among genetic variants and their effects on physical characteristics. Specifically, they focus on the study of complex non-additive effects
  and the missing heritability problem, and have found that higher-order interactions of five or more variants along the genome can have major impacts on an organism's phenotype. They are interested in
  providing basic insights into how these complex interactions occur in biological systems and are looking to open the door for future studies to tease apart how these interactions happen.
