personas:
  professional: Ray Angus, a one-year-old budding explorer, channels their curious appreciation for colors and shapes by methodically arranging block towers and meticulously sorting picture books, while
    they display a reliable and emotionally stable demeanor that lets them calmly navigate toddler playdates, hinting at a future path in early childhood education or cognitive development research.
  sports: Ray Angus delights in the toddler gymnastics sessions at the neighborhood PlayFit Kids club, loves to toddle after soft balls in the park, and enthusiastically waves a tiny Chicago Cubs cap while
    the team plays, showing they have early enthusiasm for both active play and professional baseball.
  arts: Ray Angus, enchanted by bright colors and rhythmic sounds, often hums along to the playful tunes of The Wiggles and gazes fondly at picture books featuring Henri Matisse's cut-outs, while they are
    introduced to classic Disney short films by their parents, weaving a vivid artistic tapestry into their everyday curiosity.
  travel: Ray Angus, who prefers the comforting rhythm of car seat journeys, has already explored the San Diego Zoo and the bright lights of Disneyland with their family, while they dream (through picture
    books) of a future trip to the Eiffel Tower in Paris, balancing adventure with the security of familiar routines.
  culinary: Ray Angus, a budding food explorer, favors smooth sweet-potato puree, creamy avocado mash, and tiny blueberry-studded oatmeal, while they turn up a tiny nose at mushy peas, and they delight
    in occasional soft mini pancakes drizzled with a whisper of pure maple syrup during family brunches.
  core: Ray Angus blends relentless curiosity with a surprisingly methodical streak, often arranging stuffed animals in perfect rows before nap time, yet they habitually drop their favorite spoon in the
    most inconvenient places.
background:
  cultural: Ray is raised in a white, middle‑class family in Salt Lake City, Utah, where the local culture blends a strong community orientation with an appreciation for the outdoors and the arts. His family
    participates in regional traditions such as weekend hikes, winter sports, and community festivals. Growing up near the Wasatch Mountains, he is exposed to a culture that values self‑reliance, family
    cohesion, and a modest, service‑oriented mindset. While his immediate environment is largely secular, occasional exposure to the broader regional influences of the LDS community shapes his experience
    of community gatherings, modest celebrations, and a respect for tradition.
