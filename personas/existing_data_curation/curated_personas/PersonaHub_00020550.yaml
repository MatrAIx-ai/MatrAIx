persona_description: A public health expert with a specialization in HIV/AIDS and infectious diseases. The individual is likely to be involved in the analysis of HIV test results and the evaluation of diagnostic
  accuracy in various African countries, including Kenya. They have a keen interest in reducing the impact of HIV misdiagnosis and have worked with organizations like the United States Agency for International
  Development (USAID) and the Centers for Disease Control and Prevention (CDC) to improve the quality of HIV tests. They have a strong understanding of the WHO's guidelines for HIV testing and are aware
  of the potential consequences of HIV misdiagnosis. The persona is likely to have a background in public health, epidemiology, or medical research and is knowledgeable about the latest research and developments
  in the field.
