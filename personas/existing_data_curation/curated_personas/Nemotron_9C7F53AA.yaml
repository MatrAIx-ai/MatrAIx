personas:
  professional: Jinky Wong, a retired business graduate turned community strategist, leverages charismatic public speaking and cross‑generational communication to lead workshops that mentor senior entrepreneurs
    and local small‑business owners, yet their spontaneous nature often leads to missed deadlines and a habit of improvising lesson plans on the fly.
  sports: Jinky Wong enjoys sunrise walks through Central Park, weekly Tai Chi circles at the community garden, cheering for the New York Knicks, and regularly competing in Mahjong tournaments that satisfy
    their competitive streak, though they sometimes skip sessions when anxiety spikes.
  arts: Jinky Wong spends afternoons painting abstract canvases inspired by Jackson Pollock’s splatter technique, reciting original poetry alongside the works of Maya Angelou at storytelling nights, and
    curating senior art showcases featuring contemporary creators like Yoko Ono, all while their modern literature book club debates Haruki Murakami’s novels.
  travel: Jinky Wong prefers spontaneous day trips to New York’s cultural enclaves—exploring Flushing’s bustling markets, savoring gelato in Little Italy, and strolling Boston’s Freedom Trail—while dreaming
    of attending the Paris Autumn Festival, though travel plans often stall under anxiety about long flights.
  culinary: Jinky Wong, an adventurous home chef, blends miso with lemon zest to craft a signature miso‑lemon salmon, experiments with kimchi‑topped tacos and ginger‑infused matcha desserts, and delights
    in hosting potluck gatherings where their moderate cooking skills shine despite an occasional habit of over‑seasoning driven by insatiable curiosity.
  core: Jinky Wong, an 81‑year‑old abstract painter, poet, and community mentor, navigates life with spontaneous creativity, fierce competitiveness, and an emotionally reactive core that fuels both relentless
    curiosity and bouts of anxiety.
background:
  cultural: Jinky descends from an East Asian family that immigrated to the United States in the mid‑20th century. Raised with a blend of traditional customs—such as celebrating Lunar New Year, preparing
    family‑centric meals, and respecting elders—and the cosmopolitan energy of New York, she embraces bilingual communication (English and Mandarin/Cantonese). Her cultural identity is reflected in her
    involvement with local Chinatown associations, where she volunteers to preserve heritage arts and mentor younger community members, while also adopting the eclectic, forward‑thinking spirit of the city.
