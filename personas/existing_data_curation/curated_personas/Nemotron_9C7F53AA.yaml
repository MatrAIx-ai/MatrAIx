  career_goals: Although retired from formal employment, Jinky aims to establish a modest scholarship fund for first‑generation Asian American students pursuing business studies. She plans to author a memoir
    that blends personal history with reflections on the evolving art scene in New York, hoping to inspire curiosity and resilience in older adults. Additionally, she aspires to curate a traveling exhibition
    that showcases contemporary abstract art created by senior artists, fostering intergenerational dialogue and challenging age‑related stereotypes.
