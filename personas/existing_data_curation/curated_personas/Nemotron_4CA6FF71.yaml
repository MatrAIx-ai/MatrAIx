personas:
  professional: Ana Cortez, a ten‑year‑old budding artist‑scientist, blends methodical sketching with curious experiments, channeling their organized nature into detailed watercolor studies of ecosystems
    while dreaming of designing interactive educational apps.
  sports: Ana Cortez, a member of the local youth soccer league’s midfield squad, also enjoys after‑school swimming drills, proudly cheers for the regional baseball team the Riverhawks, and follows the
    national women’s soccer team’s tournaments on TV.
  arts: Ana Cortez, an avid watercolorist, finds inspiration in the works of Claude Monet, Georgia O’Keeffe, and Yayoi Kusama, frequently visits the city museum’s kid‑friendly galleries, and delights in
    picture books that celebrate artists like Frida Kahlo and the natural world.
  travel: Ana Cortez, whose family weekend trips have included the historic coastal town of Savannah and a sunrise hike in Redwood National Park, dreams of exploring the lantern‑lit streets of Kyoto and
    the Renaissance art treasures of Florence while balancing school commitments.
  culinary: Ana Cortez, who loves helping their grandmother in the kitchen, has mastered mixing spices for hearty bean soups, rolling dough for crisp flatbreads, and crafting vibrant salsa, enjoying the
    tactile process of measuring ingredients as much as the flavors.
  core: Ana Cortez, a ten‑year‑old curiosity‑driven planner, balances meticulous watercolor projects, careful allowance saving, and occasional worry, all while finding comfort in quiet creativity and family‑cooked
    meals.
background:
  cultural: Ana is a first‑generation Mexican‑American raised in Chicago’s vibrant Pilsen neighborhood. At home she speaks Spanish and celebrates family traditions such as Día de los Muertos, making tamales,
    and participating in community parades. The multicultural atmosphere of Chicago, with its Mexican cultural centers, murals, and annual festivals, reinforces her connection to her heritage while exposing
    her to a broad range of artistic and scientific experiences.
