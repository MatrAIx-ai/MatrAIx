  career_goals: Guided by her curiosity about art and the natural world, Ana dreams of a future where she can combine creativity with careful planning. She envisions herself working as a museum curator
    or a wildlife conservationist, roles that require systematic research, thoughtful exhibit design, and the ability to educate and inspire others about cultural and environmental stewardship.
