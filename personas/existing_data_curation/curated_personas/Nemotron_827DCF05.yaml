personas:
  professional: Arcadio Lillo is an aspiring junior game developer who channels the organizational precision of their schoolwork and the rhythmic creativity from drumming into designing custom Minecraft
    mods, often leading school clubs while balancing responsibilities and taking charge of collaborative projects.
  sports: Arcadio Lillo thrives on afternoon soccer matches with the Aguirre Youth Soccer Club, idolizes the Puerto Rico national soccer team and follows Real Madrid, also enjoys watching the Cangrejeros
    de Santurce in baseball, and maintains fitness with daily jogs along the coast, often cheering on the San Juan FC when not playing.
  arts: Arcadio Lillo channels rhythmic passion into a youth drumming circle that fuses traditional bomba beats with modern electronic tracks, drawing inspiration from legendary percussionist Giovanni Hidalgo,
    reggaeton star Bad Bunny, and indie band Tame Impala, while they curate a personal playlist that also features classic rock legends like The Beatles.
  travel: Arcadio Lillo explores the shoreline of Aguirre for sunrise photography, has visited historic Old San Juan and the bioluminescent lagoon in Fajardo, and dreams of backpacking across Costa Rica’s
    rainforests and strolling the streets of Barcelona, preferring DIY itineraries over guided tours because they love spontaneous discovery.
  culinary: Arcadio Lillo enjoys mastering classic Puerto Rican dishes like mofongo, arroz con gandules, and alcapurrias, skillfully crushing plantains and mixing sofrito with garlic and cilantro, while
    they also experiment with homemade pineapple salsa for tacos, reflecting a growing knack for balancing traditional flavors with modern twists.
  core: Arcadio Lillo is a socially vibrant teen who blends disciplined organization with creative spontaneity, juggling soccer, drumming, Minecraft design and family cooking, while they occasionally overspend
    on gaming accessories and forget to floss.
background:
  cultural: Arcadio is a Puerto Rican teenager from Aguirre, a coastal fishing village in the Salinas municipality. He grows up in a bilingual household where Spanish is spoken at home and English is used
    at school, reflecting the island's diverse linguistic landscape. His heritage blends Spanish, African, and Taino influences, celebrated through family gatherings featuring dishes like arroz con gandules
    and alcapurrias, and music ranging from bomba and plena to contemporary reggaeton. Community festivals honor both religious traditions and maritime life, fostering a strong sense of solidarity and pride
    in his island roots.
