  career_goals: Arcadio aims to graduate high school and pursue a degree in environmental science or communications. He dreams of becoming a marine conservation advocate who can raise awareness about coastal
    ecosystems through social media and community workshops. Alternatively, he is interested in a career as a radio or online content host that highlights Puerto Rican culture and local stories, allowing
    him to combine his sociable nature with his desire for structure and impact.
