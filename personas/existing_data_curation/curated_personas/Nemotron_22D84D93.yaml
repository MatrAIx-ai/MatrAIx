personas:
  professional: Charles Broadway, a 10‑year‑old enthusiastic student who treats soccer practice and LEGO building like mini‑projects, using a love for step‑by‑step instructions to lead teammates through
    game tactics while still leaving room for spontaneous fun, and they often balance their desire for structure with a relaxed attitude toward obligations.
  sports: Charles Broadway, a 10‑year‑old member of the Neighborhood Park Soccer Club who idolizes Manchester United and follows their matches on TV, attends twice‑weekly practices, enjoys both organized
    drills and impromptu games at the park, and they thrive on teamwork while occasionally worrying about missing a goal.
  arts: Charles Broadway, a 10‑year‑old budding cartoonist who fills sketchbooks with original superhero doodles, streams hip‑hop hits from Kendrick Lamar and R&B grooves by Beyoncé while dancing at family
    gatherings, and they eagerly share their artwork with classmates, though they sometimes fret about critics' opinions.
  travel: Charles Broadway, a 10‑year‑old who loves family road trips, meticulously helps plan itineraries for visits to Orlando’s Walt Disney World and the Grand Canyon but also delights in spontaneous
    detours to local ice‑cream shops, balancing their need for structure with an adventurous spirit.
  culinary: Charles Broadway, a 10‑year‑old who favors familiar comfort foods like pepperoni pizza, mac and cheese, and chicken nuggets, enjoys helping stir a fruit‑smoothie with strawberry and banana,
    and occasionally experiments with building LEGO‑shaped snack platters, though they can be picky about trying new vegetables.
  core: Charles Broadway, a structured‑yet‑flexible 10‑year‑old who leads soccer drills, builds intricate LEGO worlds, doodles superheroes, dances to Kendrick Lamar, saves allowance in a piggy bank, and
    worries about both missed goals and messy rooms.
background:
  cultural: Charles grows up as a Black child in Hollywood, Florida, within the vibrant and diverse community of Broward County. His family roots include Southern‑U.S. traditions and the rich cultural tapestry
    of the African‑American experience, with frequent church attendance, family reunions, and soulful music gatherings. The local neighborhood celebrates multicultural festivals, such as the African‑American
    Heritage Festival and Caribbean cultural events, exposing him to a blend of music, food, and storytelling. He feels a strong sense of pride in his heritage, often hearing stories of civil‑rights leaders
    and community activism from older relatives. These influences nurture his cooperative spirit, his love for rhythm and dance, and his desire to give back through teamwork and mentorship.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic (addition, subtraction, multiplication tables up to 10)'', ''game rule memorization'', ''team soccer skills'', ''peer mediation and cooperation'',
    ''Lego building and spatial reasoning'', ''basic computer navigation and video game strategy'']'
  hobbies: '[''soccer'', ''Lego building'', ''video gaming (e.g., Minecraft, Super Mario)'', ''drawing and cartooning'', ''listening to hip‑hop and R&B music'', ''dancing'', ''participating in community
    events and block parties'']'
  career_goals: Charles dreams of making the middle‑school soccer team and eventually playing for a local club, hoping one day to see his name on a professional roster. He also imagines himself as a teacher
    or youth mentor, inspired by his desire to help classmates feel included and supported. Another ambition he mentions is learning to code simple games with Scratch, combining his love of video games
    with creative storytelling. In the near term, his goals are to improve his grades in reading and math, earn a spot on the school soccer squad, and complete a basic Scratch project that he can share
    with friends.
