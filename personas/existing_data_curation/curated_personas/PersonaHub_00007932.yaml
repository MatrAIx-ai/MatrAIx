persona_description: A dedicated and compassionate school official or educator who is passionate about ensuring the well-being and development of children from impoverished backgrounds. They are aware of
  the link between hunger and the challenges faced by children in school, and are committed to developing innovative solutions and partnerships to combat hunger and support the academic success of children
  in their care. They are knowledgeable about the effects of hunger on children's development and future life chances, and are willing to take action to address this issue. They are likely to be involved
  in school health services, education policy, or advocacy efforts to address hunger in schools.
