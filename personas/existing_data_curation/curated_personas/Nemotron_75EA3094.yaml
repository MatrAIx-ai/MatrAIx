  career_goals: Thomas aims to transition into a senior technology advisor role, guiding midsize enterprises through digital transformation while championing the integration of art and technology. He intends
    to launch a boutique consultancy that creates immersive interactive installations for cultural institutions and local businesses. Mentorship is a priority; he plans to mentor emerging engineers through
    university‑affiliated programs and industry meetups. Additionally, Thomas aspires to publish a technical book on designing user‑centric cloud applications and to secure patents for innovative security
    frameworks he has been prototyping.
