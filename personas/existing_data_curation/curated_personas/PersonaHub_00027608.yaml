persona_description: A female computer science teacher who is passionate about inspiring girls to pursue a career in technology. She is dedicated to designing curricula that cater to the interests of girls
  and is willing to take innovative approaches to retain their interest in the subject. She is aware of the challenges faced by girls in pursuing a career in technology and is committed to overcoming them
  by applying the summer camp mentality to the school year and getting girls' friends on board. She is also an advocate for the importance of exposure and the need for policymakers and educators to design
  curricula with girls in mind.
