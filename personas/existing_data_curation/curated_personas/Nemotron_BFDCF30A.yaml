  career_goals: Jonathan aims to transition from his current entry‑level mathematical research role into a data‑science position that leverages his quantitative background to solve real‑world problems.
    Over the next two to three years he plans to enroll in a part‑time master’s program in Data Science or Applied Mathematics to deepen his expertise in machine learning and big‑data engineering. He aspires
    to secure a senior data analyst role at a biotech or financial firm in the Boston corridor, where he can lead interdisciplinary projects, mentor junior analysts, and contribute to evidence‑based decision
    making. Long‑term, he envisions moving into a data‑science leadership position, shaping strategic analytics initiatives while advocating for ethical data practices.
