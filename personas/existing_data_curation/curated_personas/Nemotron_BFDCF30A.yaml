personas:
  professional: Jonathan Robinson, a 22‑year‑old applied mathematics researcher, leverages statistical modeling, Python, R, and meticulous documentation to turn noisy data sets into clear, actionable insights,
    while their structured mindset enforces reproducible workflows and their outgoing personality makes them a natural presenter for interdisciplinary teams.
  sports: Jonathan Robinson competes in Boston’s intramural soccer league with the “Harbor Hawks,” joins pick‑up basketball games at the Cambridge Community Center, cheers for the Boston Celtics and New
    England Patriots, and maintains a weekly kayaking session on the Charles River to stay fit.
  arts: Jonathan Robinson strums acoustic guitar at roommate gatherings, drawing inspiration from indie folk icons like Sufjan Stevens and Bon Iver, enjoys live jazz at The Sinclair, binge‑watches series
    such as “Black Mirror,” and solves strategy board games like Settlers of Catan, which they see as a blend of art and logic.
  travel: Jonathan Robinson plans trips with a blend of structure and spontaneity, having hiked Acadia National Park’s Cadillac Mountain, taken weekend bike tours through Portland’s waterfront, and dreaming
    of a spring visit to Kyoto’s cherry‑blossom festivals, all while budgeting around a modest student stipend.
  culinary: Jonathan Robinson experiments in the kitchen, often whipping up sous‑vide salmon with miso glaze, crafting homemade kimchi from napa cabbage and gochugaru, and perfecting a quinoa‑crusted goat‑cheese
    burger, all while sourcing fresh produce from the Boston Public Market.
  core: Jonathan Robinson is a structure‑loving, socially energetic data enthusiast who can’t resist a late‑night board‑game marathon or a spontaneous guitar jam, even if it means sacrificing a few hours
    of sleep.
background:
  cultural: Jonathan comes from a middle‑class White New England family that has lived in the Greater Boston area for generations. His parents emphasized academic achievement, community involvement, and
    respect for tradition, shaping his reliable and responsible nature. He identifies with the regional culture of Massachusetts—an appreciation for the outdoors, seasonal change, and local sports. Family
    traditions include holiday gatherings centered on classic New England cuisine and participation in community events like the Wilmington town fair and regional St. Patrick’s Day celebrations, reflecting
    his Irish‑English ancestry. This background informs his value of education, collaborative spirit, and modest, pragmatic worldview.
