  hobbies: '[''Gallery and Street Art Exploration'', ''Photography (Vintage Leica)'', ''Culinary Fusion Cooking (Southern & Somali)'', ''Beach Walking and Meditation'', ''Live Jazz and Afro‑beat Music'',
