  career_goals: Patrick aims to transition from senior sales associate to store manager within the next two years, leveraging his expertise in visual merchandising to lead a flagship boutique that showcases
    emerging artists of color. He also aspires to develop a mentorship program that pairs seasoned staff with new hires from underrepresented backgrounds, fostering diversity and inclusion in retail. In
    the longer term, he envisions launching a community‑focused pop‑up shop that merges his love for art with local craftsmanship, while completing a business management certification to strengthen his
    strategic leadership capabilities.
