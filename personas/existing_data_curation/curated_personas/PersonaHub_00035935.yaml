persona_description: A veterinarian who specializes in the diagnosis and treatment of eye-related issues in dogs and cats. They are experienced in identifying common eye problems, such as corneal exposure
  and blocked tear ducts, and recommend appropriate treatments to improve ocular health. They are knowledgeable in the use of supplements in the diet to support overall good health and protect the eyes
  from damage. They are also aware of the signs and symptoms of eye issues in pets, such as squinting, scratching, and redness, and provide guidance on how to properly care for the pet's eyes.
