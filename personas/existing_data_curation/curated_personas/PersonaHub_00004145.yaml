persona_description: A researcher interested in the benefits of exercise for patients with heart disease. This person is looking for articles that discuss the effects of exercise on heart health and the
  potential benefits of incorporating exercise into treatment plans for heart disease. They are interested in learning about the scientific evidence supporting the use of exercise for heart disease, as
  well as any potential drawbacks or limitations of exercise therapy. This person may also be looking for studies that use qualitative and quantitative methods to investigate the effects of exercise on
  heart health, and may be interested in learning about the specific instruments and tests used in these studies.
