  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Birdwatching at Lake County preserves'', ''Kayaking on Lake Wauconda'', ''Amateur astronomy'', ''Crossword and puzzle solving'',
    ''Bridge and chess clubs'', ''Tai chi practice'', ''Journaling'', ''Facilitating art‑therapy workshops for seniors'', ''Attending public lectures on technology and science'']'
  career_goals: Lori aims to design and launch an innovative community program that integrates technology, art, and mental health services for seniors in Lake County, fostering intergenerational connections
    and resilience. She plans to mentor emerging social workers, author a guide on data‑informed compassionate practice, and serve on local policy advisory boards to advocate for increased funding for art‑based
    therapeutic initiatives. Ultimately, she seeks to leave a legacy of holistic, evidence‑based care that bridges science and creativity.
