personas:
  professional: David Valdez, a non‑retail sales supervisor who leads a team of associate sellers, couples his bilingual fluency and knack for data‑driven process design with a routine‑driven work style,
    using Salesforce, HubSpot, and Power BI to track KPIs while delivering energetic, talk‑heavy presentations and balancing compassionate coaching with firm accountability.
  sports: David Valdez, an avid recreational soccer player in a local league and a daily jogger through Flushing Meadows, proudly supports the New York Knicks and follows Liga MX, while also attending weekend
    pick‑up basketball games and occasionally streaming NBA highlights after work.
  arts: David Valdez, a sociable enthusiast of music and dance, regularly spins classic rock icons like Pink Floyd and Latin pop stars such as Shakira at gatherings, hits the salsa floor at neighborhood
    fiestas, and appreciates muralist works by Diego Rivera, all of which fuel his creative outlet and community bonding.
  travel: David Valdez, a family‑oriented traveler who alternates between weekend getaways to the Hudson Valley vineyards and annual trips to Oaxaca to explore culinary roots, while also planning a future
    cultural immersion tour of Barcelona to study Mediterranean markets.
  culinary: David Valdez, a confident home cook who masters mole poblano, tamales, and tacos al pastor—infusing ancho, pasilla, and chipotle chilies with fresh cilantro and lime—often hosts family dinner
    parties where his culinary flair meets his love for sociable, festive meals.
  core: David Valdez blends a love for routine, sociable energy, and data‑driven sales leadership with a stress‑prone mind that finds solace in soccer, salsa, and mindful journaling, all while juggling
    ambitious career goals and a passion for Mexican cuisine.
background:
  cultural: David is a first‑generation Mexican‑American whose parents emigrated from Jalisco in the late 1970s. Raised in a bilingual household in Queens, he grew up speaking Spanish at home, celebrating
    Día de los Muertos, quinceañeras, and other Mexican holidays, while also absorbing the multicultural vibrancy of New York City. Family cohesion, respect for elders, and a love of Mexican food and music
    are central to his identity. He maintains strong ties to the local Hispanic community through regular attendance at a Catholic parish, participation in cultural festivals, and volunteer work at a community
    center that offers ESL classes and cultural programming. His Mexican heritage informs his daily life—from cooking homemade mole on weekends to speaking Spanish with extended relatives—while his professional
    aspirations reflect the American emphasis on individual achievement and career advancement.
