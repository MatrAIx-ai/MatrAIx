  career_goals: David aims to move into senior sales leadership within the next three to five years, targeting a regional sales manager position that will allow him to shape strategy across multiple offices.
    To prepare, he plans to enroll in an MBA program focused on organizational leadership and finance, building on his practical experience with formal strategic planning skills. In the longer term, he
    envisions becoming a director of sales operations, driving company‑wide process innovations and mentoring the next generation of supervisors. He also harbors a personal ambition to launch a family‑run
    specialty food import‑export business that combines his Mexican heritage with his sales expertise, while maintaining a stable work‑life balance to support his wife and children.
