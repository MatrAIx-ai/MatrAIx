persona_description: A researcher or economist who studies social customs and their impact on poverty and development. They are particularly interested in understanding how social spending, particularly
  on weddings, funerals, and other rites of passage, affects the health and well-being of impoverished rural children in China. They have a background in economics, sociology, or anthropology and are skilled
  at analyzing data from primary household survey studies. They are also familiar with concepts related to poverty, inequality, and development.
