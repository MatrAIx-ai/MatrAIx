  career_goals: Stacy dreams of turning her love for the ocean and science into a career as a marine biologist or environmental scientist, studying Florida's coral reefs and advocating for conservation.
    She also hopes to earn a scholarship for varsity swimming in high school and eventually compete at the collegiate level. In the nearer term, she aims to become captain of her middle school robotics
    team and launch a YouTube channel that teaches other kids how to code and build simple gadgets.
