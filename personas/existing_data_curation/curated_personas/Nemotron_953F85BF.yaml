personas:
  professional: Stacy Przelomski, an aspiring junior robotics developer, blends curiosity with practicality by designing and programming small machines for school projects, thriving in group settings while
    favoring flexible timelines over strict planning.
  sports: Stacy Przelomski, a member of the Boca Raton Swim Club and the local U12 soccer team, pours competitive energy into early morning laps and weekend matches, cheering for the Miami Dolphins and
    keeping an eye on the Florida Gulf Coast Eagles for inspiration.
  arts: Stacy Przelomski devotes free afternoons to crafting DIY bracelets and filming short vlogs about school events, while avidly devouring the Nancy Drew mystery series and listening to pop icons like
    Olivia Rodrigo and classic Disney soundtracks.
  travel: Stacy Przelomski enjoys spontaneous weekend trips to the nearby coastal parks of Lauderdale‑by‑the‑Sea and dreams of exploring the historic streets of Munich during a future family holiday, preferring
    relaxed beach days over meticulously planned itineraries.
  culinary: Stacy Przelomski favors a blend of tropical fruit smoothies, cheesy pepperoni pizza, and homemade German gingerbread cookies during holiday festivities, often experimenting with quick‑cook recipes
    while occasionally burning toast in a hurry.
  core: Stacy Przelomski is a socially vibrant, competition‑driven pre‑teen who swerves between meticulous robotics creations and carefree beach adventures, balancing curiosity with a laid‑back approach
    to obligations.
background:
  cultural: Stacy comes from a white, middle‑class family that has lived in Boca Raton for several generations. Her grandparents emigrated from Germany after World War II, so family traditions include celebrating
    Christmas with German gingerbread and occasional Easter egg hunts, alongside typical American holidays like Thanksgiving. Growing up in South Florida, she is exposed to a multicultural community where
    Latin American culture, beach lifestyle, and affluent suburban values intersect. The warm climate and proximity to the Atlantic have fostered her love of swimming and marine life, while the region’s
    high school sports culture fuels her competitive spirit. She attends a public middle school that emphasizes both academic achievement and extracurricular involvement, reflecting the local emphasis on
    balancing work and play.
