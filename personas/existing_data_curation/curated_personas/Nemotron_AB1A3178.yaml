personas:
  professional: Paul Bratton, a 16‑year‑old who is completing their GED and eyeing a technical trade, leverages their mechanical knack for oil changes, appliance repairs, and spreadsheet budgeting into
    a part‑time role at the neighborhood auto shop where they meticulously document each job to satisfy their craving for order and predictability.
  sports: Paul Bratton enjoys weekend fishing trips to Percy Priest Lake with the local youth angling club, plays catcher on their high school baseball team, follows the Nashville Predators, Tennessee Titans,
    and Nashville Sounds, and they balance solitary practice with occasional team drills to satisfy their need for routine and controlled competition.
  arts: Paul Bratton spends evenings practicing acoustic guitar through a step‑by‑step YouTube tutorial, curates playlists featuring Luke Bryan, Dolly Parton, and Chris Stapleton while assembling model
    car kits, and they volunteer to play music at their church youth group, allowing structured creativity to counterbalance their analytical mindset.
  travel: Paul Bratton prefers well‑planned getaways, revisiting the Great Smoky Mountains for hiking and fishing camps each summer, cherishes an annual family trip to Disney World, dreams of a spring‑time
    fishing charter in Alaska, and they always book accommodations and itineraries weeks in advance to mitigate stress.
  culinary: Paul Bratton favors Southern comfort foods such as Nashville hot chicken, smoked BBQ ribs, and grilled catfish seasoned with paprika and garlic, enjoys whipping up quick mac & cheese with cheddar
    and a dash of hot sauce, occasionally experiments with a DIY smoker to perfect their weekend feast, and they savor the predictable rhythm of cooking as a calming counterpoint to their anxiety.
  core: Paul Bratton, a 16‑year‑old meticulous planner, channels a quiet love of solo hobbies and a lingering anxiety into structured routines, steady progress, and a steadfast pursuit of a stable trade
    career, and they constantly check their weekly planner to stay on track.
background:
  cultural: Paul grew up in a predominantly white, working‑class community in Lebanon, a small town in Wilson County, Middle Tennessee. His family has deep local roots, with generations of residents involved
    in agriculture, small‑business trades, and community church life. The cultural atmosphere is shaped by Southern hospitality, a strong emphasis on family and church, and a love for high school sports
    and country music. While the area is largely Protestant, his household attends a local Baptist congregation, where community service and fellowship are integral. This environment has reinforced values
    of responsibility, modest ambition, and a preference for clear norms and routines.
attributes:
  skills: '[''Basic automotive maintenance (oil changes, tire checks)'', ''Simple home repairs (fixing leaky faucets, minor carpentry)'', ''Organizational planning (using planners, scheduling tasks)'',
    ''Basic computer literacy (Windows OS, word processing, spreadsheet basics)'', ''Smartphone troubleshooting'', ''Teamwork in sports and group projects'', ''Responsibility for running errands and delivering
    groceries'', ''Time management and adherence to routines'', ''Basic first aid awareness'']'
  hobbies: '[''Strategy video games (e.g., Civilization, SimCity)'', ''Fishing at local lakes'', ''Acoustic guitar practice'', ''Model car kit building'', ''Church youth group service projects'', ''Reading
    graphic novels'', ''Watching high school sports (football, basketball)'', ''Country music listening'']'
  career_goals: He aims to complete his GED within the next year, enabling him to enroll in a technical training program. His long‑term ambition is to become a certified automotive technician or HVAC specialist,
    careers that provide clear daily routines, tangible outcomes, and stable earnings. He is also interested in possibly joining the local community college’s maintenance trades program, where he can benefit
    from structured coursework and mentorship. In the short term, he wants to secure a part‑time job at a local auto shop or a hardware store to apply his mechanical skills and earn money for his future
    certification. He values job security and a predictable schedule that allows him to keep his personal responsibilities in order.
