  career_goals: Although retired from formal employment, Patrick remains driven to leave a lasting cultural and familial legacy. He aims to compile a comprehensive family memoir combining photographs, stories,
    and genealogical charts to pass to future generations. He hopes to establish a small community art space at the local senior center where seniors can create and exhibit artwork. Patrick also aspires
    to mentor a group of high school students in basic woodworking and crafts, fostering hands‑on skill development. Additionally, he plans to contribute a series of illustrated articles on Appalachian
    folklore to the regional newspaper, blending his love of art and storytelling.
