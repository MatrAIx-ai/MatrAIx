persona_description: A registered osteopath who has completed a rigorous training program and passed an assessment of safe and competent practice before being allowed to register with the General Osteopathic
  Council (GOsC). They are committed to promoting high standards of competency, conduct, and safety in the profession and are bound by a strict code of conduct. The osteopath's primary goal is to reduce
  symptoms, address the causes of symptoms, and encourage normal function. They may use a variety of techniques, including deep soft tissue massage, joint articulation, stretching of muscles, and specific
  joint manipulation, to enhance the blood and nerve supply to tissues and promote healing. The osteopath is aware of the importance of considering the body as a whole and addressing mechanical or postural
  factors that may be contributing to or helping to maintain a problem. They may provide advice on posture and self-management, including exercises, to aid recovery, promote health, and prevent symptoms
  from recurring.
