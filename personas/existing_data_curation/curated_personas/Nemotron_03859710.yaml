personas:
  professional: Lilian Wegner, a detail‑oriented retail cashier with strong cash handling and conflict de‑escalation skills, channels their calm resilience and self‑taught photography eye to pursue a transition
    toward gallery assistant and freelance digital art work, and they apply their love of solitary creativity to curate exhibitions and assist artists.
  sports: Lilian Wegner stays active through low‑impact pursuits, joining the Kutztown Hiking Club for weekend trail walks, practicing yoga at the community center, passionately rooting for the Philadelphia
    Eagles in the fall, and they occasionally catch a Penn State Nittany Lions basketball game.
  arts: Lilian Wegner immerses themselves in watercolor painting inspired by Georgia O’Keeffe, studies art‑history podcasts featuring Frida Kahlo and the Bauhaus movement, and they find creative fuel in
    indie games like Journey and the experimental compositions of Ryuichi Sakamoto.
  travel: Lilian Wegner favors solitary road trips, having explored the rustic Pennsylvania countryside, the historic streets of Heidelberg, a weekend sojourn to the Finger Lakes, and they dream of a quiet
    retreat in Kyoto’s artisan districts to study traditional pottery.
  culinary: Lilian Wegner enjoys cooking at an intermediate level, often preparing beet‑and‑goat‑cheese salads, rosemary‑infused roasted root vegetables, and experimenting with a sourdough starter, while
    they savor a slice of warm biscuits topped with homemade apple butter for comfort.
  core: Lilian Wegner is a calm, curiosity‑driven solitary creator who balances meticulous cash‑handling precision with a habit of forgetting appointments, thriving in quiet artistic spaces while they occasionally
    splurge on vintage art finds.
background:
  cultural: Raised in Kutztown, Pennsylvania, Lilian grew up in a community with deep Pennsylvania Dutch roots, reflecting generations of German immigration. The region’s modest, hard‑working ethos, close‑knit
    neighborhood ties, and seasonal festivals have shaped her sense of reliability and community. Proximity to Kutztown University exposed her to a broader cultural mix, encouraging an appreciation for
    art, unconventional ideas, and independent thought. This blend of traditional Pennsylvania German heritage and contemporary college‑town influences informs her worldview and personal values.
attributes:
  skills: '[''Cash Handling and POS Operation'', ''Customer Service and Communication'', ''Conflict Resolution'', ''Basic Inventory Management'', ''Numeracy and Attention to Detail'', ''Digital Photography'',
    ''Photo Editing (Lightroom/Photoshop)'', ''Art Critique and Appreciation'', ''Self‑Directed Learning'', ''Adaptability and Calm under Pressure'']'
  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital photography'', ''Art‑history reading'', ''Philosophy and experimental‑music podcasts'', ''Nature hiking'', ''DIY crafts (candle making, pottery)'',
    ''Indie narrative video games'', ''Reflective journaling'']'
  career_goals: Lilian aims to transition from her cashier role into a position that merges her love for art with flexible, independent work. She plans to enroll in community‑college courses in graphic
    design or museum studies, eventually seeking employment as a gallery assistant, museum docent, or freelance digital artist. In the long term she hopes to launch a small online shop selling her own photography
    prints and curated art selections, allowing her to work from home and maintain the solitude she values.
