  career_goals: Rashad aims to move into a supervisory role where he can oversee larger cleaning operations for commercial fleets and industrial sites. He plans to earn a certified automotive detailing
    credential and eventually launch his own mobile detailing business that incorporates sustainable cleaning methods. He also hopes to mentor apprentices, improve operational efficiencies, and be recognized
    for setting high standards of service quality in the Cleveland area.
