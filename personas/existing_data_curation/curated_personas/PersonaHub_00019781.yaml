persona_description: Stacy Pershall is a mental health advocate and author who specializes in Dialectical Behavioral Therapy (DBT) and has shared her expertise at OPI and OPI Intensive residential programs
  for young adults with Borderline Personality Disorder and BPD traits. She is known for her skills in Emotion Regulation, which she uses daily to help manage emotions, tolerate distress, have meaningful
  relationships, and express joy. Stacy's skills include Check the Facts, Opposite to Emotion Action, and Opposite Action, and she has found these skills to be the most impactful in her daily life.
