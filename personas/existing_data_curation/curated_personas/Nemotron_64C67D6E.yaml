  hobbies: '[''Visiting Art Galleries'', ''Museum Volunteering'', ''Live Jazz Shows'', ''Book Club'', ''Gardening'', ''Creole Cooking'', ''Group Dancing'', ''Community Workshops'', ''Photography'', ''Weekend
    Travel'']'
  career_goals: Bessann aims to advance from her current clerical role to a supervisory position such as Office Manager or Administrative Coordinator, where she can lead a team and drive efficiency initiatives.
    She also aspires to leverage her passion for the arts by spearheading cultural programming within her workplace or local community, potentially becoming a community arts liaison. Over the next five
    years, she hopes to earn certification in office management, mentor younger staff, and develop a small consulting service offering administrative and event‑planning support to nonprofit organizations
    in Baton Rouge.
