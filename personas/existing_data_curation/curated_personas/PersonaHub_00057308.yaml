persona_description: A university archaeologist who specializes in studying the history and culture of ancient civilizations, particularly those associated with the slave trade. They are particularly interested
  in the human remains found in the graves of those who were once enslaved, and the cultural significance of their dental modifications and jewelry. They are also interested in the practical aspects of
  archaeology, such as the investigation of burial sites and the preservation of artifacts. They are passionate about sharing their knowledge and expertise with the public and are dedicated to promoting
  awareness and understanding of the impact of slavery on human history.
