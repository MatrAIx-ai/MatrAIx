  career_goals: Although only two years old, Shelby already shows tentative interests that hint at future aspirations. She often pretends to care for her stuffed animals, feeding them and tucking them in,
    suggesting an early fascination with nurturing roles such as a veterinarian or preschool teacher. Her delight in watching adults prepare meals and her eagerness to help stir a spoon in a play kitchen
    point toward a practical, hands‑on ambition in cooking or caregiving. Guided by her preference for small, familiar groups, she envisions a future where she can both guide younger children and tend to
    animals in a gentle, community‑focused setting.
