personas:
  professional: Shelby Avila, a 2‑year‑old budding explorer who delights in building block towers, balances curiosity with practicality by testing which shapes fit best, prefers flexible, unstructured play
    over rigid schedules, and already shows the cooperative yet assertive spirit that will one day drive innovative problem‑solving; they often switch between solo experimentation and collaborative building
    with peers.
  sports: Shelby Avila, a 2‑year‑old who joyfully attends toddlers’ tumble‑time sessions at the local YMCA and cheers for the Los Angeles Dodgers on family TV nights, prefers the freedom of sandbox digging
    to organized drills, and enjoys occasional mini‑soccer games with the Little Lions toddlers’ club.
  arts: Shelby Avila, a 2‑year‑old who hums along to Raffi’s Bananaphone, sketches crayon dinosaurs during quiet moments, and eagerly watches Sesame Street, finds comfort in rhythmic storytelling that shapes
    their early creative identity.
  travel: Shelby Avila, a 2‑year‑old who loves car rides to the nearby beach in Santa Monica for sandcastle building, dreams of visiting the Grand Canyon’s rim for a stroller‑friendly hike, and prefers
    the familiar routine of packing a favorite stuffed bunny over spontaneous itineraries.
  culinary: Shelby Avila, a 2‑year‑old who adores creamy mac and cheese, loves the sweet bite of banana slices, can barely stir a bowl of soft scrambled eggs with a child‑size wooden spoon, and insists
    on sprinkling a pinch of cinnamon on apple puree whenever possible.
  core: Shelby Avila, a flexible, quietly curious toddler who balances playful exploration with a relaxed approach to rules, often juggling a piggy bank, crayons, and a favorite bunny while navigating the
    world with calm confidence.
background:
  cultural: Shelby is raised in a middle‑class, predominantly Anglo‑American household in Oklahoma City. Her family embraces Midwestern values of friendliness, modesty, and community participation, often
    gathering for small family meals, church events, and neighborhood picnics. The local culture, with its blend of suburban life and occasional cowboy heritage, provides ample outdoor space for park visits
    and backyard exploration, reinforcing her love for nature and small‑group socializing. English is her primary language, and her upbringing balances traditional family routines with exposure to contemporary
    children's media and activities common in the Oklahoma region.
