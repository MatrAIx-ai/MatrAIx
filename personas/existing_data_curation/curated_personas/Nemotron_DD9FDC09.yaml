personas:
  professional: A budding young game designer named Judith Robison blends her love for drawing comic‑style characters, building detailed LEGO models, and coding simple Scratch games, approaching each project
    with a mix of boundless curiosity and pragmatic step‑by‑step planning, while their competitive streak pushes them to iteratively improve their creations.
  sports: Judith Robison speeds across the midfield for the River Valley Under‑9 Soccer Club, relishing the competitive edge of scoring goals while keeping a skeptical eye on teammates' effort, and also
    enjoys spontaneous beach volleyball games with friends, often cheering for the professional team FC Barcelona as a source of inspiration.
  arts: Judith Robison channels a creative spark into sketching comic panels inspired by artists like Jim Lee and Mike Mignola, constructing intricate LEGO dioramas of forest and space scenes, and eagerly
    reads adventure mysteries by authors such as Enid Blyton, letting vivid art and storytelling fuel their imagination.
  travel: Judith Robison loves weekend escapes to the nearby coastal state park where they collect shells, dreams of a future field trip to the Kennedy Space Center to see rockets up close, and has already
    explored the historic lighthouse at Cape Point during a family vacation.
  culinary: Judith Robison is a budding food explorer who adores building homemade pizza topped with pepperoni and pineapple, mixing rainbow fruit salads with kiwi and mango, and occasionally attempts to
    bake glitter‑sprinkled cupcakes, though they can be messy and often forget to clean the kitchen before starting a new LEGO build.
  core: Judith Robison is a curious, competitively‑driven 8‑year‑old who balances relentless invention with occasional impatient huffs when plans go awry, all while hoarding LEGO bricks and chasing mystery
    stories.
background:
  cultural: Judith is raised in a middle‑class white family in Hallandale, Broward County, Florida. Her household celebrates typical American traditions such as Thanksgiving, the Fourth of July, and Halloween,
    while also participating in community events that reflect the region’s diversity, including multicultural festivals and occasional Spanish‑language activities at school. Her family’s heritage traces
    back to European (primarily Irish and English) roots, and she occasionally hears stories of family migrations and customs. Growing up in a multicultural area, Judith has been exposed to Caribbean music,
    Latin food, and bilingual peers, which fuels her curiosity about different cultures while grounding her in a supportive, pragmatic American upbringing.
