  career_goals: Judith dreams of becoming a scientist‑engineer who can both discover new ideas and apply them to solve real‑world problems, especially in environmental conservation. She aims to win her
    school’s science fair, develop a simple app that helps track local wildlife, and eventually serve as a leader—perhaps a team captain or project manager—where she can combine her competitive drive with
    her practical mindset. She also entertains the idea of writing adventure stories, merging her love of narrative with her curiosity about the world.
