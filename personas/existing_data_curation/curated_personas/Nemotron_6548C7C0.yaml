  hobbies: '[''Community soccer'', ''Chess club'', ''Charity running'', ''Gardening'', ''Cooking Puerto Rican cuisine'', ''Hiking'', ''Reading science fiction'', ''Playing guitar (salsa and plena)'']'
  career_goals: Gilberto aims to expand his church’s impact by launching a regional STEM mentorship initiative for youth, fostering interfaith collaborations, and publishing a book that bridges scientific
    inquiry with faith. He aspires to take on a senior leadership role within the diocese, such as regional dean, where he can implement structured, measurable outreach models and mentor younger clergy.
    His long‑term ambition includes establishing a community center that offers both spiritual services and practical STEM workshops.
