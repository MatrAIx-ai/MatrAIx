persona_description: A modern mining pilot who specializes in aerial mapping and photography, particularly skilled in using the aerial camera to record and study geological features and areas of interest.
  He is proficient in maintaining precise balance and position in the air and adjusting to changing conditions, such as wind direction and altitude, to accurately capture the details of the ground and features
  on it. He is adept at using the stereoscopic parallax principle to view and study the images, and is skilled in solving complex engineering problems using the information gathered from the maps. He is
  knowledgeable in the use of the aerocartograph, a machine that receives aerial photographs and converts them into a precise and detailed map of the ground, which can be used for mining and other engineering
  purposes. He is also skilled in using the stereoscope to study the images and view the ground in relief, and is familiar with the use of the photo-theodolite to measure distances and draw precise maps.
