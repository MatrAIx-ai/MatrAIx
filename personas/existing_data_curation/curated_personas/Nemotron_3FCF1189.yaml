  hobbies: '[''Abstract Painting'', ''Photography'', ''Contemporary Fiction Reading'', ''Creative Writing'', ''Smart‑Home Technology Exploration'', ''Coastal Hiking'', ''Gardening'', ''Yoga'', ''Small Book
    Club'']'
  career_goals: She aspires to advance to a regional Director of Facilities position, overseeing multi‑site operations for a major corporate campus. In the next five years, she plans to achieve LEED AP
    certification, champion a campus‑wide green building program, and lead the implementation of smart‑building technologies that improve energy efficiency and occupant wellbeing. Long‑term, she envisions
    establishing her own consulting practice focused on sustainable, art‑integrated facility design for educational and cultural institutions.
