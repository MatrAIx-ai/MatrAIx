    standards'', ''Point‑of‑sale (POS) system operation'', ''Basic coding/scripting for reporting automation'']'
  hobbies: '[''Hiking local nature trails'', ''Community soccer league'', ''Home cooking and recipe development'', ''Wine tasting events'', ''Volunteer work at regional food banks'', ''DIY home improvement
    projects'', ''Reading business and self‑development books'', ''Data visualization and simple coding projects'', ''Food photography'', ''Attending live music gigs in Boston'']'
  career_goals: Susan aims to advance to a food‑service director role overseeing multiple outlets within a corporate or institutional setting, where she can implement sustainable sourcing and technology‑driven
    efficiency programs. She plans to earn advanced certifications in culinary management and pursue a part‑time MBA to broaden her strategic leadership skills. Long‑term, she dreams of opening a boutique
    farm‑to‑table restaurant that highlights New England seasonal produce while mentoring the next generation of kitchen professionals.
