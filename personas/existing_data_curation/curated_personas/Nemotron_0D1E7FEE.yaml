  career_goals: Samuel plans to obtain his GED within the next year and then pursue an apprenticeship in automotive repair or HVAC technology, fields that combine his curiosity about mechanical systems
    with a clear, practical career path. He hopes to earn industry certifications, such as ASE for automotive technicians, while gaining hands‑on experience. In the longer term, Samuel dreams of starting
    a small tech‑repair and consulting service for local residents, leveraging his self‑taught computer skills to provide affordable support for seniors and small businesses. He also keeps an eye on a future
    certification in network security, but his immediate ambition is to secure steady employment, become financially independent, and eventually run his own modest business.
