personas:
  professional: Samuel Capps is a budding automotive‑mechanics enthusiast who couples hands‑on garage work with self‑taught Python scripting, using their practical curiosity to troubleshoot car systems
    and develop small automation tools, while planning to secure an apprenticeship and eventually launch a tech‑repair consulting service for seniors.
  sports: Samuel Capps is an avid desert hiker who frequents South Mountain Park, a regular at the Phoenix Skate Park where they belong to the local Skate Crew, and a seasonal supporter of the Arizona Cardinals
    (NFL), Phoenix Suns (NBA), and Arizona Diamondbacks (MLB), balancing casual workouts with occasional pickup basketball at a community center.
  arts: Samuel Capps enjoys photographing sunrise over the Sonoran Desert, drawing inspiration from Ansel Adams and the synth‑wave sounds of Daft Punk, while diving into sci‑fi/fantasy novels by Neil Gaiman
    and Brandon Sanderson, and occasionally role‑playing in tabletop games that let them channel their storytelling side.
  travel: Samuel Capps loves low‑cost road trips to nearby wonders like the Grand Canyon and Sedona, hopes to visit the Kennedy Space Center to see a live launch, and dreams of backpacking through the Icelandic
    highlands for aurora‑watching, planning trips around school breaks and saving from part‑time gigs.
  culinary: Samuel Capps prefers quick, flavorful meals such as breakfast burritos with scrambled eggs, jalapeños, and cilantro, can whip up a decent grilled corn‑on‑the‑cob with lime and cotija cheese,
    and enjoys experimenting with homemade pizza topped with pepperoni and fresh basil, though they often rely on microwave ramen during late‑night coding sessions.
  core: Samuel Capps is a solitary, curiosity‑driven teen who balances hands‑on tinkering with disciplined budgeting, yet stays up late stargazing and occasionally neglects sleep for hobby projects.
background:
  cultural: Samuel grew up in a middle‑class suburban neighborhood of Phoenix, Arizona, within a family of white American descent that values hard work, self‑reliance, and practical education. His father
    works in construction and his mother manages a retail store, emphasizing hands‑on learning and responsibility from an early age. The desert environment shaped his appreciation for outdoor activities
    and a pragmatic outlook. While his cultural roots are predominantly mainstream American, he has been exposed to the Southwest's multicultural fabric, including local Hispanic festivals, Mexican cuisine,
    and nearby Native American heritage sites, which broadened his cultural awareness without altering his family's core values.
