persona_description: A perioperative nurse who is responsible for implementing evidence-based practices in their clinical practice. They are interested in staying up-to-date with the latest research and
  evidence in the field of perioperative nursing and are looking for tools and resources to help them do so. They are likely to be familiar with the Johns Hopkins nursing evidence appraisal tools and the
  Oncology Nursing Society model for rating evidence. They may also be interested in learning about the process for rating and ranking evidence used to shape AORN's Guidelines for Perioperative Practice.
