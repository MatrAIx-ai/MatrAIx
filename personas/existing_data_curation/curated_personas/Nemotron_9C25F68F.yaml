personas:
  professional: Choo Velasco, a four‑year‑old aspiring “mini‑CEO” who runs a weekend lemonade stand at home, blends curiosity about fruit flavors with practical counting and budgeting skills, keeps the
    tiny operation organized yet adaptable when friends drop by, and thrives on the friendly competition to sell the most glasses each afternoon; they proudly hand out change to peers and celebrate each
    sale.
  sports: Choo Velasco dashes around the neighborhood’s mini‑soccer field every Saturday as a member of the Tiny Tigers Club, idolizes FC Barcelona’s quick passing style, and they channel boundless energy
    into friendly goal‑scoring contests, fiercely competing with classmates to be the top scorer while giggling through occasional tumbles.
  arts: Choo Velasco bursts into spontaneous song whenever The Wiggles’ tune “Fruit Salad” plays, copies drawing styles from beloved picture books by Eric Carle, and they eagerly rehearse lines from the
    animated film “Moana,” letting this blend of musical and visual inspiration shape afternoon playtime.
  travel: Choo Velasco, after a thrilling weekend at Disneyland and a family road‑trip to the Grand Canyon, dreams of spotting the pandas at Chengdu Research Base in China, they prefer short, energetic
    outings with a parent’s hand in hand, and always pack a favorite stuffed giraffe for comfort.
  culinary: Choo Velasco delights in spreading crunchy strawberry jam on warm toast, constructs elaborate peanut‑butter‑banana sandwiches with a child’s plastic knife, and they refuse to nibble peas, preferring
    colorful sprinkles to top every vanilla cupcake they help frost.
  core: Choo Velasco is a four‑year‑old bundle of curiosity and competition, turning every playground game into a strategic showdown while they occasionally hoard glitter stickers in a secret drawer.
background:
  cultural: Choo comes from a mixed East Asian heritage, with roots in Chinese and Filipino families, reflected in his surname Velasco. Growing up in Reedley, California, he is immersed in a multicultural
    environment that blends Asian traditions—such as celebrating Lunar New Year and enjoying dim sum—with the vibrant Hispanic culture of the Central Valley. At home, he hears both English and Tagalog (or
    Mandarin) spoken, participates in community festivals, and values respect for elders, education, and community ties.
