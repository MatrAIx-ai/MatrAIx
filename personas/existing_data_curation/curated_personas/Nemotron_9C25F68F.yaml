  career_goals: He dreams of becoming a firefighter because he admires bravery and helping others, imagines exploring space as an astronaut, and expresses a strong desire to help on his family’s small garden
    where he can see the results of his effort. These ambitions reflect his blend of practicality, curiosity, and competitive spirit.
