  career_goals: Stephen aims to translate his retail experience and artistic sensibility into a managerial career that blends commerce and culture. In the near term, he is targeting a promotion to assistant
    store manager within the next 12–18 months, focusing on developing leadership and operational expertise. Over the next three to five years, he plans to become a full store manager, overseeing budgeting,
    staff development, and visual‑merchandising strategy. Concurrently, he intends to enroll in an associate’s program in Business Administration at a community college and acquire a Retail Management certification.
    Long‑term, Stephen aspires to a regional management role or to launch his own boutique that curates emerging artists’ work alongside lifestyle products, leveraging online platforms and pop‑up events.
    He envisions himself as a bridge between art and everyday retail, fostering community engagement through curated shopping experiences.
