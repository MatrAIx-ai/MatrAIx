personas:
  professional: Wandella Perkins, an 82‑year‑old community culinary ambassador and veteran event organizer, blends their mastery of Southern soul‑food cooking, quilting and crochet with a practical curiosity
    that drives them to mentor younger volunteers while their relaxed approach to planning sometimes leads to last‑minute tweaks in church potlucks and senior‑center gatherings.
  sports: Wandella Perkins enjoys low‑impact fitness through daily walks with the Columbus Senior Walking Club, cheerfully tracks the New Orleans Saints in the NFL and the Mississippi State Bulldogs during
    football season, and often attends Memphis Grizzlies games at the FedExForum with a group of friends, while their occasional disorganization means they sometimes miss the start of the community yoga
    sessions.
  arts: Wandella Perkins participates in the church choir, delighting in gospel classics by Mahalia Jackson and Aretha Franklin, spends evenings crocheting intricate blankets while watching vintage films
    such as Casablanca and Gone with the Wind, and regularly attends the Columbus Arts & Crafts Festival to admire local fiddlers and folk painters, channeling their sociable energy into storytelling that
    preserves community history.
  travel: Wandella Perkins plans leisurely day trips to historic sites like the Natchez National Historical Park, the Vicksburg National Military Park, and the Mississippi Civil Rights Museum in Jackson,
    balancing a love for heritage with a cautious budget that favors group tours and discount senior fares, while dreaming of a short weekend getaway to the French Quarter in New Orleans to sample its famed
    beignets.
  culinary: Wandella Perkins is renowned for turning humble Southern staples into inventive dishes, such as collard greens simmered with smoked turkey and a splash of apple cider vinegar, fried chicken
    glazed with honey‑chili drizzle, and jalapeño‑cheddar cornbread spiced with fresh sweet corn, all while weaving home‑grown tomatoes, okra, and sweet potatoes from their garden into every recipe.
  core: Wandella Perkins blends a lifelong love of gospel, gardening, and quilting with a keen eye for budgeting, a habit of over‑baking biscuits for neighbors, occasional forgetfulness about glasses, and
    a resilient optimism that keeps them humming through life's worries.
background:
  cultural: Wandella is an African‑American woman whose roots run deep in the Deep South, specifically in Columbus, Mississippi. Her grandparents were sharecroppers who later worked in local factories,
    and her family experienced the hardships and triumphs of segregation and the civil‑rights era. Growing up, she was immersed in Southern Black cultural traditions—gospel music, soul food, church fellowship,
    and oral storytelling. The 1960s civil‑rights movement shaped her sense of justice and community service, leading her to become a steadfast volunteer in her church and neighborhood. Her upbringing in
    Lowndes County instilled values of resilience, hospitality, and intergenerational responsibility, which continue to guide her daily life, relationships, and dedication to preserving cultural heritage.
attributes:
  skills: '["Southern cooking", "Quilting", "Crochet", "Gardening", "Event planning", "Community outreach", "Budgeting", "Conflict mediation", "First aid/CPR", "Storytelling"]'
  hobbies: '["Church choir singing", "Bingo", "Crochet", "Gardening", "Cooking", "Reading", "Storytelling with friends", "Walking", "Watching classic movies", "Attending community festivals"]'
  career_goals: In her golden years, Wandella seeks to stay active, independent, and emotionally resilient. She hopes to compile a small family cookbook that captures her treasured recipes and to mentor
    younger women in quilting and storytelling at the senior center. Maintaining her health is a priority, so she plans to join gentle exercise classes and learn stress‑relief techniques. She also aims
    to become comfortable with modern technology—using a smartphone for video calls with grandchildren—and dreams of short trips to nearby historic sites that celebrate African‑American heritage in Mississippi.
