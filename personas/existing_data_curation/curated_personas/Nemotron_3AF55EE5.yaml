personas:
  professional: Luis Bedoya is a retail supervisor with a flair for abstract visual merchandising, merging data‑driven analysis with artistic concepts to craft immersive store displays, using bilingual
    communication and meticulous planning to boost performance while channeling his competitive drive.
  sports: Luis Bedoya participates in local soccer matches with the Portland Community Soccer Club, follows the Portland Timbers in MLS and the Trail Blazers in the NBA, and balances his competitive edge
    with occasional weekend runs along the Willamette River to stay fit.
  arts: Luis Bedoya spends evenings sketching abstract paintings, crafting digital illustrations that fuse modern geometry with traditional motifs, devouring exhibitions at Portland's Blue Sky Gallery and
    the Museum of Modern Art, while his playlists rotate between J Balvin's reggaeton beats and Modest Mouse's indie rock, shaping his creative identity.
  travel: Luis Bedoya prefers meticulously planned weekend getaways to the Oregon coast or Seattle's coffee districts, while dreaming of longer trips to Mexico City’s street‑art alleys, Barcelona’s Gaudí
    architecture, and Peru’s Machu Picchu, balancing a modest travel budget with a craving for cultural immersion.
  culinary: Luis Bedoya enjoys cooking at home, mastering baleadas with refried beans, queso fresco, crema, and a dash of cilantro, as well as pupusas stuffed with curtido, while also experimenting with
    avocado toast topped with smoked salmon and a sprinkle of crushed red pepper, reflecting his blend of comfort flavors and adventurous palate.
  core: Luis Bedoya is a methodical yet imagination‑driven 18‑year‑old who carefully budgets his money, obsessively arranges store displays like a living canvas, spends nights pondering abstract concepts,
    and occasionally neglects sleep to finish a new illustration.
background:
  cultural: Luis is a first‑generation American of Honduran descent. His parents emigrated from Tegucigalpa in the early 2000s, and he grew up in Portland’s multicultural neighborhoods, speaking both Spanish
    and English at home. He regularly participates in Honduran community events such as Feria de la Hispanidad and celebrates holidays like Día de la Independencia with family gatherings, traditional foods
    (baleadas, pupusas) and música merengue. At the same time, he embraces the progressive, arts‑centric vibe of the Pacific Northwest, blending his cultural heritage with contemporary urban influences.
    This bicultural perspective informs his worldview, his appreciation for diverse artistic expression, and his ambition to create a retail space that honors his roots while pushing creative boundaries.
attributes:
  skills: '["Team Leadership", "Customer Service", "Visual Merchandising", "Inventory Management", "Sales Data Analysis", "Scheduling", "Conflict Resolution", "Bilingual Communication (Spanish/English)",
    "POS Systems", "Process Optimization", "Graphic Design Basics"]'
  hobbies: '["Abstract Painting", "Digital Illustration", "Graphic Design", "Speculative Fiction Reading", "Gallery Visits", "Street Photography", "Strategic Board Games", "Journaling and Puzzle Solving",
    "Cooking Traditional Honduran Cuisine", "Bilingual Poetry Writing"]'
  career_goals: Luis is determined to leverage his early supervisory experience into higher‑level retail management roles. Over the next few years he plans to complete a Bachelor’s degree in Business Administration
    with a focus on Marketing and Innovation. He aims to become a store manager, then a district manager, positioning himself as a data‑driven leader who can transform store performance. Ultimately, inspired
    by his love for art and his Honduran heritage, he dreams of launching a boutique concept that blends contemporary Latin American design, sustainable fashion, and immersive visual storytelling, establishing
    a flagship location in Portland or a neighboring city.
