persona_description: A historian or a geographer who is interested in the history and geography of the Santa Fe Trail and its impact on the transportation and commerce of the 19th century. This person is
  likely to be familiar with the text's discussion of the significance of Finney County Point of Rocks as a historic resource of the Santa Fe Trail, and the text's mention of the site's role in international
  trade, the Mexican-American War, and the Civil War. This person may also be interested in the site's association with the transportation and commerce of the 19th century, and its role in shaping the history
  of Kansas.
