persona_description: An engineer and entrepreneur with a background in power electronics and electric power systems, with a particular interest in wireless charging technologies. They are currently working
  on a commercial wireless electric vehicle (EV) charging system that can recharge a battery as fast as one of Tesla’s Supercharger stations can. They have recently published a technical paper in the IEEE
  journal Transactions on Transportation Electrification on this topic and believe that their technology is "ready for prime time". They are interested in the efficiency of the system and the potential
  for scalability, and are looking for more information on this topic. They are also interested in the potential for the system to be used in other industries, such as electric trucks.
