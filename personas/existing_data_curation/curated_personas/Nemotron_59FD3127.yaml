    solving under pressure"]'
  hobbies: '["Reading science‑fiction and philosophy", "Digital illustration and minimalist graphic design", "Long‑Island nature walks and photography", "Yoga and mindfulness/tea‑ceremony practice", "Volunteering
    as a math tutor at the community library", "Cooking Japanese and Vietnamese fusion meals", "Puzzle video games and coding side projects", "Attending local East‑Asian cultural festivals"]'
  career_goals: Kasumi aims to pursue a career that lets her apply her curiosity and practicality in a flexible, low‑stress environment. She is considering a graduate certificate in bioinformatics or data
    science, with a long‑term goal of becoming a data‑driven research analyst in a small biotech startup focused on health‑tech solutions for underserved communities. She values harmony in the workplace,
    so she seeks roles in tight‑knit teams where collaborative decision‑making and mutual support are the norm. Ultimately, she hopes to design tools that translate complex biomedical data into actionable
    insights, contributing to public health improvements while maintaining a work schedule that allows for personal exploration and creative projects.
