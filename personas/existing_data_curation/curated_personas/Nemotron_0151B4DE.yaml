personas:
  professional: Maria Domingo, a budding robotics enthusiast, channels her love for science-fiction and nature into designing modest autonomous bots for her after-school club, balancing wild imagination
    with practical constraints of limited parts and school deadlines.
  sports: Maria Domingo, a member of her middle-school cross-country team and an avid fan of the Arizona Cardinals, spends weekends hiking sand dunes for cardio, slipping in sandboarding when the wind is
    right, and practicing quick sprint drills with friends at the local park.
  arts: Maria Domingo, an avid sketcher of desert fauna, draws inspiration from Studio Ghibli's animation, listens to Hans Zimmer's film scores, and follows indie singer Mitski's lyrical storytelling, weaving
    these influences into her own watercolor wildlife series.
  travel: Maria Domingo, a budding explorer, has trekked the sand dunes of White Sands, camped near Sedona's red-rock cliffs, and dreams of snorkeling the coral reefs of the Great Barrier Reef while savoring
    the flavors of distant cuisines.
  culinary: Maria Domingo, a kitchen collaborator with her grandmother, masters family recipes such as slow-cooked spice-laden stews, fresh corn tortillas, roasted tomatillo salsa, and delicate tamales,
    experimenting with cumin, oregano, and chipotle to perfect each bite.
  core: Maria Domingo is a curious, laid-back twelve-year-old who blends sci-fi imagination with desert adventures, builds modest robots, and navigates life with spontaneous snack runs and a habit of forgetting
    to clean her desk.
background:
  cultural: Maria is a first-generation Mexican-American raised in Los Lunas, New Mexico. She speaks Spanish at home and English at school, celebrating Mexican traditions such as Día de los Muertos, quinceañera
    preparations, and family gatherings, while also participating in local New Mexican festivals and community events. Her family maintains strong ties with the Hispanic community, attending church and
    cultural celebrations, which instills in her a blend of Mexican heritage and Southwestern values, emphasizing family, community, and respect for the natural environment.
attributes:
  skills: '[''Basic biology knowledge'', ''Hands-on science experimentation'', ''Introductory Python programming'', ''Microsoft Office (PowerPoint, Word)'', ''Bilingual Spanish-English communication'',
