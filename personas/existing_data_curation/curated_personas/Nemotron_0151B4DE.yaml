  hobbies: '[''Reading science-fiction and nature books'', ''Hiking local trails'', ''Sketching wildlife'', ''Playing strategy video games'', ''Cooking Mexican dishes with family'', ''Journaling'', ''Robotics
    club activities'']'
  career_goals: Maria hopes to become a wildlife biologist or veterinary technician, driven by her love for animals and the outdoors. She also dreams of designing educational tools that blend science with
    cultural heritage for younger students. In the short term, she aims to join the school's science club, participate in a robotics team, and volunteer at a local animal shelter to gain hands-on experience.
