  hobbies: '[''Visiting art museums and galleries'', ''Street mural photography'', ''Acrylic painting'', ''Playing violin in a community orchestra'', ''DIY electronics projects'', ''Building custom computers'',
    ''Hiking local trails'', ''Attending cultural festivals'', ''Cooking Southern dishes with creative twists'']'
  career_goals: Lot aims to become a certified Master Technician by obtaining NCCER and HVAC Excellence credentials, followed by a supervisory role in facilities management for a forward‑thinking corporate
    campus. She aspires to lead a team that integrates sustainable building technologies and to eventually launch her own eco‑focused installation and repair business that blends functional craftsmanship
    with artistic design. In the longer term, she hopes to contribute to public art‑installation projects that merge her technical skills with her passion for creative expression.
