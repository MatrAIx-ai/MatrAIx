personas:
  professional: Lot Pope is a commercially certified building‑systems technician who expertly reads HVAC, electrical, and plumbing schematics, and they excel at executing energy‑saving retrofits while leveraging
    their curiosity and competitive drive to lead on‑site troubleshooting and keep project timelines tight.
  sports: Lot Pope hits the Chattahoochee River trail on weekends with their husband, races with the Peachtree Trail Runners club, and roots for the Atlanta Hawks and Falcons while they maintain a competitive
    edge in their personal fitness routine that blends cardio hikes with occasional pickup basketball games.
  arts: Lot Pope immerses themselves in Atlanta’s vibrant arts scene by photographing street murals by artists such as Kehinde Wiley, attending museum shows that celebrate contemporary narratives, playing
    violin in a community orchestra, and jamming with friends to reinterpret classics from Stevie Wonder alongside modern R&B icons like Beyoncé while they also paint acrylic landscapes in their home studio.
  travel: Lot Pope plans trips with a blend of detailed itineraries and spontaneous detours, and they prefer weekend escapes to Savannah’s historic squares or New Orleans’ jazz streets, while dreaming of
    a longer adventure to Lisbon’s tile‑laden alleys once their eco‑business savings allow for a month‑long cultural immersion.
  culinary: Lot Pope blends Southern comfort with global twists, mastering dishes like shrimp‑and‑grits infused with lemongrass broth, collard greens sautéed with kimchi and sesame oil, and peach cobbler
    spiced with cardamom, while they use their modest home kitchen as a creative lab for testing new flavor pairings.
  core: Lot Pope is a fiercely curious building‑systems guru who balances meticulous schematics with impromptu violin riffs, and they hoard vintage tech gadgets while occasionally overcommitting to community
    projects at the expense of sleep.
background:
  cultural: Lot is an African‑American woman raised in the Atlanta metropolitan area. Her upbringing blended the rich traditions of Southern Black culture—church community gatherings, gospel and R&B music,
    and family‑centered celebrations—with the suburban environment of Peachtree Corners. She values resilience, community service, and the supportive networks that have historically empowered her community.
    Lot’s cultural identity informs her appreciation for both historic and contemporary Black art, her dedication to mentorship in technical trades, and her commitment to fostering inclusive spaces within
    her professional and personal life.
