    trucks'']'
  career_goals: Joseph aspires to a practical, hands‑on career that lets him work with his hands and be part of his community. He dreams of becoming a carpenter or a farm‑mechanic, imagining himself repairing
    tractors and building structures on his family's land. He also entertains the idea of joining the local fire department one day, valuing the routine, teamwork, and tangible impact. His long‑term ambition
    is to finish high school, learn a trade apprenticeship, and someday run his own small construction or agricultural service business.
