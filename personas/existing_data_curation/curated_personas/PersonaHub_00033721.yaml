persona_description: A crystallographer who is interested in the physical and chemical properties of crystals, and the structure and properties of materials. They are familiar with the standard nomenclature
  and representations for crystallographic frieze-group types, rod-group types, and layer-group types, and have a strong interest in the analysis of the structure and physical properties of crystalline
  materials that contain linear or planar substructures. They are also interested in the Seitz notation of symmetry operations and the inclusion of asymmetric unit symbols and reflection conditions in the
  subperiodic group tables. They have a deep understanding of the concepts and theories related to symmetry, diffraction methods, and crystal-structure determination, and are skilled in teaching these concepts
  and theories.
