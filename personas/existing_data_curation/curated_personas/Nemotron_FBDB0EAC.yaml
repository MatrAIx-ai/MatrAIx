personas:
  professional: Shannon Moore, a veteran hazardous materials removal specialist with over three decades of experience in chemical, radiological, and asbestos abatement, blends rigorous HAZWOPER and EPA
    regulatory expertise with a spontaneous curiosity for emerging remediation technologies, allowing them to troubleshoot unexpected site hazards, design training curricula, and mentor younger workers,
    especially women, while navigating a transition toward a crew‑lead supervisory role.
  sports: Shannon Moore enjoys low‑impact fitness through early‑morning walks along the Kansas prairie, participates in a local bird‑watching walking club that meets on weekends, roots for the Kansas City
    Royals and Chiefs, and occasionally joins community volunteer fire department fitness drills that blend strength training with team drills.
  arts: Shannon Moore channels their love of natural landscapes into watercolor paintings reminiscent of Claude Monet’s brushwork, collects classic rock vinyl from Pink Floyd and Led Zeppelin, enjoys reading
    non‑fiction works by David McCullough, and finds inspiration at local performances by the Lawrence Community Theatre’s Shakespeare productions.
  travel: Shannon Moore prefers spontaneous road trips that blend nature and history, often charting routes to national parks like Badlands and Yellowstone while stopping at small-town museums, they dream
    of visiting the English countryside to trace early 20th‑century agricultural practices and the vineyards of Tuscany for a culinary pause.
  culinary: Shannon Moore delights in farm‑to‑table cooking, skillfully preparing heirloom tomato salad with fresh basil, rosemary‑infused roasted chicken, and seasonal ratatouille using garden‑grown zucchini
    and eggplant, while occasionally indulging in a classic grilled cheese with sharp cheddar and a dash of smoked paprika.
  core: Shannon Moore is a curious, solitary problem‑solver who balances meticulous safety expertise with spontaneous bursts of vintage vinyl enthusiasm and a garden‑fueled approach to wellness.
background:
  cultural: Shannon grew up in a midwestern farming community near Lawrence, Kansas, where self‑reliance and practicality were core values. Her white, Anglo‑American heritage includes longstanding family
    ties to the region, with traditions of community service, church attendance, and seasonal celebrations like county fairs. The local culture’s emphasis on hard work, modesty, and neighborly cooperation
    shaped her practical mindset, while exposure to the university town of Lawrence sparked her curiosity about science and technology. She carries these midwestern values into her professional and personal
    life, balancing a down‑to‑earth work ethic with an openness to new ideas.
attributes:
  skills: '[''Hazardous materials identification'', ''HAZWOPER compliance'', ''PPE selection and use'', ''Decontamination procedures'', ''Site risk assessment'', ''Emergency response planning'', ''Regulatory
    documentation'', ''Crew training and mentorship'', ''Equipment maintenance'', ''Chemical spill containment'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading non-fiction'', ''Watercolor painting'', ''Book club'', ''Volunteer fire department safety outreach'', ''Classic rock vinyl collecting'', ''Cooking
    for small gatherings'']'
  career_goals: Shannon aims to obtain the Certified Hazardous Materials Manager (CHMM) credential within the next two years, transition into a supervisory crew‑lead role, and develop a training curriculum
    for new hires at her company. She also aspires to mentor younger workers, especially women entering the field, and eventually consult for small businesses on compliance and safety best practices. In
    the longer term, she envisions a semi‑retired role as a community emergency response volunteer and part‑time safety auditor.
