persona_description: A researcher and genealogist who is interested in Ohio history and genealogy, particularly the records of local government offices. They are knowledgeable about the Ohio Network of
  American History Research Centers, which funded and provided designated places for county and local governments to deposit their records of historical and genealogical value. They are interested in the
  records of local government offices, such as tax records, militia records, and enumeration of soldiers and sailors, as well as other narrative records that can provide details about their ancestor's life.
  They are also interested in the records of local government offices that have been returned to the Ohio Historical Society or other interested local repositories.
