    destinations'', ''Writing poetry and personal reflections'', ''Participating in improv comedy workshops'']'
  career_goals: Gregory aims to move into senior leadership, targeting a role as a program director or vice president of project management within a forward‑thinking organization that values innovation
    and cultural relevance. He plans to earn additional certifications such as PMP and deepen his expertise in AI‑driven project analytics. Long‑term, he envisions founding a boutique consultancy that helps
    arts institutions and nonprofits manage large‑scale initiatives while embedding creative design thinking. He is also committed to mentoring the next generation of Black project managers and championing
    diversity, equity, and inclusion initiatives at the corporate level.
