personas:
  professional: Joann Perez, a retail operations manager in Seattle, combines strategic planning, data-focused visual merchandising, and conflict mediation with a curious yet skeptical mindset, and they
    apply disciplined organization and flexible problem-solving to guide their team through market volatility.
  sports: Joann Perez hikes the Cascades and kayaks the Puget Sound with the Seattle Outdoor Adventures club, squeezes in weekly yoga at a Capitol Hill studio, and they are a devoted fan of the Seattle
    Seahawks, Sounders FC, and Kraken, balancing competitive team loyalty with personal wellness routines.
  arts: Joann Perez fuels their creative spark by sketching at Seattle Art Museum's Yayoi Kusama exhibit, photographing local street murals by artist Maggie Meg, performing improv at Unexpected Comedy,
    salsa dancing to Marc Anthony, and they curate board-game nights, all of which weave a vibrant artistic thread through their everyday life.
  travel: Joann Perez balances a packed career with carefully planned weekend escapes to the San Juan Islands and Portland's food scene, while dreaming of immersive art-focused trips to Barcelona, Berlin,
    and Kyoto, and they favor curated itineraries that blend cultural discovery with occasional adventure hikes.
  culinary: Joann Perez, an enthusiastic home-chef, loves crafting cedar-plank salmon with wild mushrooms and ramps, whipping up vibrant poke bowls and occasional paella for salsa nights, while indulging
    in Seattle's third-wave coffee and craft IPA scene, though they sometimes over-spend on specialty ingredients.
  core: Joann Perez navigates life with a curious, art-obsessed mind, a relentless drive for professional excellence, a habit of over-budgeting on creative projects, and they constantly wrestle with a chronic
    tendency to worry about every detail.
background:
  cultural: Joann grew up in a suburban middle‑class family in the greater Tacoma area of Washington State. Her upbringing was shaped by the Pacific Northwest’s strong connection to nature, progressive
    community values, and a vibrant regional arts scene. Her parents encouraged independent thought, outdoor recreation, and an appreciation for local culture, leading her to develop a balanced worldview
    that values both organization and creative spontaneity. While identifying as culturally white American, she incorporates the region’s environmental ethic, the DIY maker mentality, and a respect for
    diverse artistic expressions encountered through local festivals and the multicultural influences of nearby Seattle. This background informs her interpersonal style, her competitive drive, and her nuanced
    skepticism as she navigates professional and social spaces.
