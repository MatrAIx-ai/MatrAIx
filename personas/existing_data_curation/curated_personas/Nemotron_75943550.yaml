  career_goals: Joann aims to advance from her current managerial role to a regional director position within the next five years, overseeing multiple locations and shaping the company’s overall customer
    experience strategy. She aspires to integrate advanced analytics and immersive retail concepts that merge data insight with artistic storytelling, positioning the brand as a leader in experiential retail.
    To support this trajectory she plans to pursue an MBA focused on innovation management and seeks mentorship opportunities that enable her to champion women in leadership. In the long term she envisions
    a senior executive role—such as Vice President of Operations or Chief Experience Officer—where she can influence corporate culture, drive sustainable growth, and mentor the next generation of managers.
