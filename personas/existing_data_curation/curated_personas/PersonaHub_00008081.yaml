persona_description: A sociologist who studies the effects of economic changes on education and the economy. This individual is interested in understanding the decline of educational attainment in the United
  States and its impact on the economy. They are likely to have a background in economics and education, and have conducted research on the topic of the Great Stagnation of American Education. They are
  interested in the consequences of rising educational attainment for the economy, and the role of education in shaping the standard of living in the United States. They may also be interested in the impact
  of globalization on education and the economy.
