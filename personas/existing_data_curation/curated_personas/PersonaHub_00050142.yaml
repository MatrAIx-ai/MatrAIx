persona_description: A professor at the University of California-Santa Barbara who specializes in research on student retention and its effects on social, mental health, and academic outcomes. He is critical
  of retention policies that focus solely on academic success and advocates for additional reading aid to help struggling students. He is aware of the costs associated with intervention and believes that
  the benefits outweigh the costs. He is interested in the implementation of reading intervention programs and the funding mechanisms used to support them.
