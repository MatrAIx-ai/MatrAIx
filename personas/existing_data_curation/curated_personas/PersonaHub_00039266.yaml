persona_description: A researcher and inventor who is developing a new 3-D printing technology called high-speed sintering. Hopkinson's group has already shown that the method works at a relatively small
  scale and has calculated that it is "on the order of 100 times faster" than laser sintering certain kinds of parts. The group will now build the machine using funding from the British government and a
  few industrial partners.
