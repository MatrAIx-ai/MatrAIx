personas:
  professional: Swati Saigal, a 42‑year‑old first‑line facilities supervisor, blends hands‑on operational know‑how with a curiosity for green cleaning technologies, using their bilingual fluency in English
    and Hindi to coach a diverse team while often juggling schedules with a flexible, sometimes disorganized approach that keeps them pragmatic yet occasionally stressed.
  sports: Swati Saigal regularly hikes the Cascades foothills in the fall, participates in a local trail‑running club, attends weekly yoga classes for flexibility, and cheers on the Seattle Sounders FC,
    though their relaxed planning sometimes leads to missed workouts.
  arts: Swati Saigal finds artistic inspiration in classic Bollywood films like 'Mughal‑e‑Azam', devours mystery novels by Agatha Christie and Tana French, and curates playlists that blend A.R. Rahman's
    scores with Pacific Northwest folk group The Decemberists, shaping both their culinary experiments and weekend relaxation.
  travel: Swati Saigal enjoys low‑key road trips along the Oregon coast and spontaneous weekend getaways to nearby vineyards, while dreaming of a cultural immersion tour of Kyoto’s tea houses and a trek
    through New Zealand’s South Island, balancing wanderlust with family responsibilities.
  culinary: Swati Saigal experiments with fusion cuisine, often preparing spiced salmon tikka glazed with local maple syrup, cauliflower tikka masala enhanced with foraged chanterelle mushrooms, and tandoori
    quinoa bowls scented with dill and smoked salmon, while tending a modest vegetable garden that supplies fresh herbs like cilantro and mint.
  core: Swati Saigal, a 42‑year‑old facilities supervisor with practical curiosity, balances sustainable cleaning leadership, garden‑fresh fusion cooking, stress‑prone mindfulness, and an ever‑evolving
    quest for personal and professional equilibrium.
background:
  cultural: Swati's cultural background is rooted in the Punjabi region of India. Her family emigrated to the United States when she was a child, bringing with them traditions of hospitality, intergenerational
    respect, and celebrations such as Diwali, Holi, and Vaisakhi. She was raised with a blend of Hindi and English at home, and maintains ties to the local South Asian community through the Sikh temple
    (Gurdwara) and cultural associations in the Tacoma‑Auburn area. Traditional values emphasize family cohesion, modesty, and the importance of service, which influence her collaborative yet assertive
    approach at work. While she has embraced many aspects of American life, she continues to incorporate South Asian culinary practices, music, and seasonal festivals into her daily routine.
attributes:
  skills: '[''Housekeeping Operations Management'', ''Team Leadership and Supervision'', ''Staff Scheduling & Shift Coordination'', ''Training & Mentoring of Janitorial Staff'', ''Inventory Management &
    Procurement'', ''Compliance with OSHA and EPA Regulations'', ''Quality Control & Inspections'', ''Sustainable/Eco‑Friendly Cleaning Practices'', ''Budgeting and Cost Control'', ''Conflict Resolution
    and Employee Relations'', ''Bilingual Communication (English/Hindi)'', ''Equipment Maintenance and Safety'']'
  hobbies: '[''Cooking South Asian & fusion meals'', ''Gardening (vegetables and indoor herbs)'', ''Yoga and mindfulness meditation'', ''Reading mystery novels'', ''Watching classic Bollywood films'', ''Hiking
    in Washington foothills'', ''Volunteering at community clean‑up events'', ''Participating in Diwali and Holi celebrations'']'
  career_goals: Swati aims to advance from her current first‑line supervisor role to a facilities manager position within the next three years, overseeing multiple sites and shaping strategic maintenance
    plans. She intends to earn the Certified Facility Manager (CFM) credential and attend workshops on green building operations and emerging cleaning technologies. A short‑term goal is to create a mentorship
    program for entry‑level custodial staff to reduce turnover and boost job satisfaction. In the longer term, she envisions launching a community‑focused cleaning service that emphasizes sustainable practices
    and provides training opportunities for local youth. Throughout her career progression, she seeks a more predictable schedule that mitigates stress and allows greater time for family and personal interests.
