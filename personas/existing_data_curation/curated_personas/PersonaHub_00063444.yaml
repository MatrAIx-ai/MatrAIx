persona_description: A company that is committed to sustainable agriculture and food production, aiming to achieve 100% sustainable sourcing by 2020. This company is focused on working with farmers, plantation
  owners, processors, refiners, and traders to improve farming practices and encourage a shift towards sustainable sourcing. The company is also committed to transparency in food supply chains and is working
  towards setting industry-leading standards for itself and its suppliers. The company has been working on its Sustainable Agriculture Programme for 15 years and continues to embed sustainability principles
  throughout its supply chains. The company is also developing plans to source non-agricultural raw materials in a more responsible way, taking into account environmental and social impact.
