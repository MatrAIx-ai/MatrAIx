personas:
  professional: Daniel Berg channels his love for routine and competitiveness into a junior leadership role on his local youth soccer team, serving as tactical captain who designs practice drills, coordinates
    teammates, and leverages the strategic thinking honed in multiplayer video games to make quick on‑field decisions.
  sports: Daniel Berg trains with the Springfield Youth Soccer Academy and the Riverdale Little League baseball team, adheres to structured practice sessions to sharpen his stamina and competitive edge,
    and regularly cheers for the New York Yankees and Chicago Bulls on game nights, reflecting his love for organized team sports.
  arts: Daniel Berg fuels his imagination by constructing intricate LEGO models, devouring adventure novels by Rick Riordan, and listening to energetic tracks from Imagine Dragons while attending occasional
    Boy Scout community theatre performances, showcasing how creative storytelling and music shape his leisure.
  travel: Daniel Berg prefers family trips that follow a clear schedule, such as the recent weekend camping adventure in Yosemite National Park and a summer visit to Disneyland, while dreaming of a future
    organized excursion to Tokyo's robotics museum to combine his love of routine with cultural exploration.
  culinary: Daniel Berg enjoys simple, protein‑rich meals such as pepperoni pizza, chicken nuggets, and macaroni‑and‑cheese, often helping their parents whip up grilled cheese sandwiches and school‑friendly
    fruit‑and‑yogurt parfaits, while their burgeoning cooking confidence is evident in weekend attempts at assembling homemade LEGO‑inspired snack platters featuring cheese cubes and pretzel sticks.
  core: Daniel Berg is a routine‑driven, competitively spirited ten‑year‑old who balances structured team sports, strategic gaming, and a flair for LEGO building, all while wrestling with an undercurrent
    of worry and a healthy dose of skepticism.
background:
  cultural: Daniel is a white American raised in the suburban community of Sanford, Florida. His family embraces typical Southern‑Florida suburban values—emphasis on routine, practical achievement, and
    community involvement. He celebrates national holidays like Independence Day and Thanksgiving, and his household often gathers for church events and local community festivals. The warm climate encourages
    outdoor play, which fuels his interest in sports and scouting, while his parents encourage a balanced mix of structured activities and free play.
