  hobbies: '[''Soccer (youth league)'', ''Baseball (community team)'', ''Multiplayer video gaming (strategy and competition)'', ''LEGO building'', ''Collecting baseball cards'', ''Reading adventure and
    mystery novels'', ''DIY science experiments'', ''Boy Scouts (team projects and community service)'']'
  career_goals: He often talks about wanting a career that combines hands‑on work with clear, repeatable procedures. Daniel imagines becoming an automotive technician or mechanical engineer, because he
    likes fixing things, following step‑by‑step manuals, and seeing tangible results. He also dreams of playing professional soccer or baseball, reflecting his love of competition and teamwork. Ultimately,
    he hopes to choose a path that lets him be dependable, work with a routine, and still challenge himself against others.
