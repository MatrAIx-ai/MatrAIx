personas:
  professional: Francisco Olvera, a budding preschool ‘project manager,’ meticulously lines up crayons by color, creates daily block‑building schedules, and delights in exploring new ways to solve simple
    puzzles while always following the steps he has planned.
  sports: Francisco Olvera plays on the neighborhood under‑5 soccer team, proudly wears a tiny Manchester United jersey during practice, cheers for the team on TV, and enjoys the structured drills that
    balance fun with routine, though they sometimes feel upset after missing a goal.
  arts: Francisco Olvera spends afternoons drawing superhero comics, sings loudly along to Disney songs like “Let It Go,” watches Pixar’s “Toy Story,” and experiments with a mini keyboard, often mimicking
    the melodies of classic Disney soundtracks.
  travel: Francisco Olvera loves family trips to Disneyland in Anaheim, enjoys building sandcastles on Florida’s Gulf Coast, dreams of seeing the Eiffel Tower someday, and prefers itineraries that mix short
    car rides with plenty of playground stops to avoid feeling overwhelmed.
  culinary: Francisco Olvera adores cheesy pizza slices, chicken nuggets with honey mustard, fresh strawberries, can whisk batter for cupcakes with a splatter of flour, and is particular about crunchy carrot
    sticks paired with smooth peanut butter.
  core: Francisco Olvera is a meticulous five‑year‑old who balances fierce curiosity with practical organization, loves arranging toys and trying new ideas, yet often feels a wave of anxiety when routines
    shift or expectations change.
background:
  cultural: Francisco grows up in a Venezuelan household that celebrates traditions like Día de la Madre, Christmas with hallacas and pan de jamón, and enjoys Venezuelan foods such as arepas and empanadas.
    The family keeps Spanish as the primary language at home, shares Venezuelan music and dance, and tells folk tales that shape his sense of identity while he also embraces the multicultural community
    of Mableton, Georgia.
