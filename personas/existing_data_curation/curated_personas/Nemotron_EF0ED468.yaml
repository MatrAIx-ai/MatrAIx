  hobbies: '[''Watercolor painting'', ''Sketching'', ''Digital photography'', ''Visiting local art galleries'', ''Listening to Bollywood and jazz music'', ''Cooking fusion Indian‑Florida dishes'', ''Fishing
    at the Gulf of Mexico'', ''Gardening'', ''Attending cultural festivals'', ''Reading science‑fiction novels'']'
  career_goals: Sandeep aims to formalize his production experience by obtaining a certified machine‑operator credential and a forklift license, positioning himself for a shift‑lead or supervisory role
    that still offers flexibility in scheduling. At the same time he hopes to turn his artistic passions into a side venture—perhaps a small studio where he offers custom watercolor artwork, handcrafted
    items, or photography services to the Pinellas Park community. He is also interested in enrolling in evening courses on product design or CNC machining, blending his technical background with creative
    design, and eventually establishing a modest independent business that allows him to balance work, art, and personal curiosity.
