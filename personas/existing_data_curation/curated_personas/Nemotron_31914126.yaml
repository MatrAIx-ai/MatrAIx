  career_goals: Steven seeks to translate his decades‑long hands‑on experience into a leadership role that provides the routine and predictability he values. Over the next five years he aims to become a
    shift supervisor or training officer for the Gilbert Fire Department’s EMS division, where he can shape protocol implementation and oversee quality assurance. He plans to complete a bachelor’s degree
    in health administration to broaden his administrative skills and eventually spearhead a community‑paramedicine program that delivers preventive care to underserved neighborhoods. Additionally, he aspires
    to mentor a new generation of paramedics, emphasizing practical competence and disciplined equipment checks. As he approaches retirement age, Steven also entertains the idea of launching a small private
    medical transport service that offers reliable, scheduled transport for chronic‑care patients, combining his desire for routine with his entrepreneurial spirit.
