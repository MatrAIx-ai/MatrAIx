persona_description: A team of engineers and scientists who are involved in the analysis of storm water runoff on a university campus in Mahoning County, Ohio. They are responsible for calculating the pre
  and post developed land use coefficients, travel times, and storm water runoff volumes for the campus and surrounding areas. Their work involves using the Mahoning County Drainage Criteria and Storm Water
  Manual to identify flow lengths and calculate travel times for overland flow, shallow concentrated flow, and channelized flow. They also need to identify the appropriate rainfall intensity values for
  each design storm using the time of concentration and modified rational equation.
