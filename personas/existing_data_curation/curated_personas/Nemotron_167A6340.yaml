personas:
  professional: A full-stack software engineer named Robert Floyd leverages Python, JavaScript, React, and AWS to build scalable web apps, while his curiosity drives experimentation with Rust and serverless
    tech, and his pragmatic, slightly disorganized nature ensures he delivers production‑ready code on flexible timelines, often mentoring junior developers in Agile settings.
  sports: An avid outdoor enthusiast, Robert Floyd spends weekends hiking the Sawtooth Mountains and mountain‑biking with the Idaho Mountain Bike Association, follows the Boise State Broncos and Idaho Steelheads
    for a dose of local sports spirit, and keeps a casual fitness routine that balances trail workouts with occasional yoga to counteract desk‑bound stiffness.
  arts: Robert Floyd finds creative release strumming acoustic guitar to John Mayer and Neil Young, immerses in sci‑fi worlds by reading Andy Weir and Philip K. Dick, and enjoys board game nights featuring
    titles like Terraforming Mars and Azul, while occasionally attending local folk concerts featuring artists such as Amanda Grace.
  travel: Robert Floyd prefers spontaneous, nature‑focused trips, having camped in Yellowstone and hiked the Inca Trail in Peru, and dreams of wintering in Iceland’s geothermal spas, but balances these
    adventures with family constraints, planning most getaways around long‑weekend windows and using a mix of budget airlines and road trips.
  culinary: Robert Floyd’s palate leans toward hearty, outdoors‑inspired fare, often cooking grilled trout with fresh dill, whipping up Idaho potato hash with smoked jalapeño, and experimenting with sous‑vide
    salmon, while also indulging in craft IPA flights and the occasional sushi roll featuring avocado and cucumber.
  core: Robert Floyd is a curiosity‑driven full‑stack coder who balances tech tinkering with mountain trails, prefers flexible plans, and occasionally forgets to file bills but always returns to his guitar
    for a calming riff.
background:
  cultural: Raised in a predominantly white, middle‑class community in the Mountain West, Robert grew up in an environment that values self‑reliance, practical education, and close family ties. Living in
    Rexburg, Idaho—a small city with a strong emphasis on community, outdoor recreation, and modesty—has shaped his appreciation for a balanced lifestyle that blends work, family, and nature. His cultural
    upbringing encourages curiosity tempered by practicality, fostering a respectful yet assertive demeanor in professional and personal settings.
