personas:
  professional: Sadaf Sengupta, a seasoned elementary and middle school STEM teacher, designs inquiry‑based, technology‑rich lessons, leverages bilingual skills for culturally responsive instruction, mentors
    new educators, and aims to spearhead the district’s STEM initiative as a future curriculum specialist.
  sports: Sadaf Sengupta enjoys weekly hikes in the Great Smoky Mountains with a local club, follows the Nashville Predators for NHL excitement, participates in an annual community marathon, and supplements
    activity with weekend yoga for flexibility and stress relief.
  arts: Sadaf Sengupta actively supports cultural festivals, reveres the sitar music of Ravi Shankar alongside indie folk like Bon Iver, regularly attends local theater productions, and hosts strategic
    board game nights featuring Catan, blending traditional and contemporary artistic passions.
  travel: Sadaf Sengupta prefers well‑planned trips that combine family time and cultural immersion, having recently visited Kolkata for a family reunion and driven the Blue Ridge Parkway, while eyeing
    Kyoto’s temples for a future adventure that balances curiosity with comfort and budget considerations.
  culinary: Sadaf Sengupta delights in crafting classic biryani and samosa, experiments with fusion dishes like paneer tacos, frequents the use of turmeric, cumin, and fresh cilantro, though they sometimes
    over‑salt meals when rushing to serve guests.
  core: Sadaf Sengupta blends disciplined planning, cultural pride, and restless curiosity, juggling teaching leadership ambitions with a habit of over‑thinking, while finding balance through yoga, cooking,
    and vibrant community gatherings.
background:
  cultural: Sadaf’s family traces its roots to Bengal, India. Raised in a bilingual household where Hindi and Bengali were spoken alongside English, she grew up celebrating Diwali, Holi, and Durga Puja,
    with a strong emphasis on education, respect for elders, and community service—values common in many South Asian families. She maintains close ties to her extended family and is an active participant
    in the Indian Association of Knoxville, which hosts cultural festivals, dance workshops, and language classes. These experiences shape her worldview and teaching philosophy, prompting her to bring cultural
    relevance into her classroom by incorporating South Asian examples, stories, and scientific contributions, and by fostering an inclusive environment that honors diverse backgrounds.
attributes:
  skills: '["STEM curriculum design", "Differentiated instruction", "Classroom management", "Technology integration (Google Classroom, coding tools)", "Student assessment and data analysis", "Bilingual
    communication (Hindi/Bengali)", "Parent and community engagement", "After‑school program coordination", "Mentoring and teacher coaching", "Professional development facilitation"]'
  hobbies: '["Community volunteer work", "Organizing cultural festivals", "Yoga and meditation", "Gardening", "Cooking Indian and fusion dishes", "Reading (education and fiction)", "Hiking in the Great
    Smoky Mountains", "Board games and trivia nights", "Knitting/crocheting", "Participating in local book clubs"]'
  career_goals: Sadaf aims to expand her impact beyond her classroom by leading the district’s STEM initiative, designing interdisciplinary units that integrate science, engineering, and cultural perspectives.
    She plans to pursue a master's degree in educational leadership within the next three years to qualify for roles such as curriculum specialist or assistant principal, where she can shape schoolwide
    policy and champion inclusive practices. Sadaf also wants to mentor novice teachers, create a supportive peer‑coaching network, and secure grant funding for after‑school programs that serve under‑represented
    students. Recognizing her tendency toward worry, she is focused on developing stronger work‑life balance strategies and seeking professional development in stress‑management and time‑management.
