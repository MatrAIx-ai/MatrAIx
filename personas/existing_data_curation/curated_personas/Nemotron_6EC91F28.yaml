  hobbies: '[''Woodworking'', ''Gardening'', ''Birdwatching'', ''Historical Biography Reading'', ''Landscape Photography'', ''Fishing'', ''Crossword Puzzles'', ''Sudoku'', ''Small-Group Book Club'']'
  career_goals: Raymond aims to stay intellectually active by completing a series of online courses in sustainable landscaping and local history, volunteering as a mentor for youth in the Olympia community,
    contributing his expertise to the Thurston County planning commission on small‑scale community projects, and compiling a comprehensive family genealogy book. He also seeks to maintain his health through
    regular walks, cultivate a well‑organized low‑maintenance garden that serves as a peaceful retreat for his family, and uphold a structured daily routine that balances curiosity with practical achievement.
