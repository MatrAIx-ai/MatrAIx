  career_goals: Rajeshkumar aims to become a certified journeyman carpenter within the next two years and to open his own custom‑furniture studio in the Bay Area within five years, focusing on sustainable,
    locally sourced wood and innovative design. He hopes to lead small‑scale green building projects, mentor apprentices, and eventually expand into a boutique contracting firm that prioritizes eco‑friendly
    practices. Alongside his professional aspirations, he seeks to develop coping strategies for his anxiety, such as incorporating mindfulness and regular physical activity into his routine to maintain
    a healthy work‑life balance.
