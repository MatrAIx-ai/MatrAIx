  hobbies: '[''street art appreciation'', ''photography'', ''culinary experimentation'', ''hiking in El Yunque'', ''playing guitar (salsa/reggaetón)'', ''reading about supply-chain innovation'']'
  career_goals: Andres aims to move into a supervisory logistics role within the next three to five years, where he can apply his curiosity to integrate technology‑driven inventory solutions. He wants to
    lead a team that embraces flexible, innovative thinking while maintaining operational efficiency. Long‑term, he envisions establishing a boutique consulting service that helps small Puerto Rican businesses
    optimize their shipping and receiving workflows, leveraging his expertise and cultural insights.
