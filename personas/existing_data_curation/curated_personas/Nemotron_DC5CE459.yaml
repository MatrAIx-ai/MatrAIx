personas:
  professional: Taina Borja, a veteran diesel‑engine specialist with five decades of hands‑on experience repairing bus and truck powertrains, leverages systematic diagnostics, precision welding, and meticulous
    documentation to run a consultative practice while mentoring apprentices with a quietly competitive drive and methodical precision.
  sports: Taina Borja enjoys daily walks with the Hudson River Senior Walking Club, follows the New York Yankees in baseball and the New York Knicks in basketball, and occasionally joins a community garden
    fitness class that blends light resistance training with gardening tasks, treating each session as a practical way to keep her knees supple.
  arts: Taina Borja spends evenings listening to classic boleros by Trio Los Panchos and salsa staples from Celia Cruz while devouring historical novels by Ken Follett and Hilary Mantel, and she occasionally
    attends local theater productions of classic plays such as "A Streetcar Named Desire".
  travel: Taina Borja plans her travels with the same precision she applies to engine schematics, favoring carefully scheduled visits to the Finger Lakes wine country and the historic streets of St. Augustine,
    while reserving a coveted spot on a modest cruise to the Azores for next summer, mindful of her modest fixed income.
  culinary: Taina Borja delights in preparing island‑style stews such as arroz con gandules with sofrito, plantain‑based mofongo, and savory pork adobado, skillfully seasoning with cilantro, garlic, and
    achiote, and she often pairs these meals with a glass of crisp white wine while the kitchen fills with the rhythm of classic salsa.
  core: Taina Borja blends relentless curiosity with pragmatic precision, channels a quiet competitiveness into mentoring and engine restoration, and maintains an unflappable calm that makes even the hum
    of a diesel motor feel like a meditation.
background:
  cultural: Taina grew up in a close‑knit Puerto Rican family in the Bronx before moving to Union City, where a vibrant Latino enclave reinforced her bilingual fluency (Spanish and English) and deep appreciation
    for island traditions. Her upbringing emphasized respect for elders, hard work, and communal solidarity, values that underpin her disciplined work ethic and calm resilience. She participates occasionally
    in local cultural festivals, cherishes the rhythms of salsa and bomba, and preserves family recipes that connect her to her island roots while navigating life as an independent, never‑married woman
    in New Jersey.
attributes:
  skills: '[''diesel engine diagnostics'', ''heavy equipment maintenance'', ''hydraulic system repair'', ''precision welding'', ''technical documentation'', ''inventory management'', ''apprentice training'',
    ''safety compliance'', ''blueprint reading'', ''automotive electrical systems'']'
  hobbies: '[''restoring vintage motorcycle engines'', ''balcony vegetable gardening'', ''reading historical novels'', ''studying technical manuals'', ''cooking Puerto Rican cuisine'', ''listening to classic
    salsa and boleros'', ''walking along the Hudson River waterfront'']'
  career_goals: She aims to formalize her extensive knowledge by completing a certified instructor program and creating a practical guidebook on diesel engine maintenance for community colleges. Taina hopes
    to mentor a new generation of mechanics, especially encouraging women to enter the field, while continuing to consult on fleet maintenance for local transit agencies to ensure reliable service in her
    borough.
