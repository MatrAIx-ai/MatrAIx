personas:
  professional: Teresa Moore, a 38‑year‑old non‑profit executive, leverages strategic planning, financial oversight, and data‑driven decision‑making while her high emotional reactivity fuels deep empathy,
    making her a trusted conflict‑resolution guide and champion of workplace wellness.
  sports: Teresa Moore, an avid weekend hiker and casual runner, follows the Seattle Seahawks, Seattle Sounders FC, and the Seattle Kraken, while participating in a local women's recreational softball league
    and joining a monthly sunrise yoga class at Green Lake Park.
  arts: Teresa Moore, a dedicated patron of contemporary literature and community theater, devours novels by Sally Rooney and Chimamanda Ngozi Adichie, frequently attends productions at Seattle Repertory
    Theatre, and curates a small collection of indie vinyl from Bon Iver and Maggie Rogers to unwind.
  travel: Teresa Moore prefers low‑key, culturally rich getaways, planning meticulous itineraries for weekend trips to Santa Fe's art markets, a culinary immersion in Oaxaca, and a week‑long immersion in
    Barcelona to practice Spanish, while balancing travel costs with a modest travel fund.
  culinary: Teresa Moore, an experimental home chef, delights in crafting dishes like mole poblano with homemade chocolate‑chili sauce, fermented kimchi tacos, and zucchini‑noodle carbonara seasoned with
    sumac and black garlic, sourcing ingredients from local farmers' markets and blending flavors from her growing collection of exotic spices.
  core: Teresa Moore blends strategic acumen with empathetic leadership, a penchant for experimental cooking, and a restless curiosity that is simultaneously soothed by yoga and sparked by new tech.
background:
  cultural: Teresa comes from a white, middle‑class New Jersey background, raised in the Newark‑East Orange area. Her family values emphasize hard work, self‑reliance, and community involvement, rooted
    in a blend of Mid‑Atlantic American cultural norms and a modest Catholic upbringing. Growing up in a diverse urban environment has shaped her inclusive outlook and her commitment to fostering harmony
    across different cultural groups in her professional and personal life.
attributes:
  skills: '[''Strategic Planning'', ''Financial Oversight'', ''Operational Management'', ''Stakeholder Engagement'', ''Team Building'', ''Conflict Resolution'', ''Emotional Intelligence'', ''Community Outreach'',
