  hobbies: '[''Yoga'', ''Gardening'', ''Reading contemporary fiction'', ''Cooking experimental dishes'', ''Walking in local parks'', ''Volunteer work at food pantry'', ''Community theater participation'',
    ''Learning Spanish'', ''Exploring new technology gadgets'', ''DIY home improvement'']'
  career_goals: Teresa aims to expand the reach and impact of her organization by implementing innovative, technology‑enabled programs and strengthening community partnerships. She plans to pursue a professional
    development program—potentially an executive MBA—to deepen her strategic and financial expertise. A core ambition is to foster a supportive, mentally healthy work environment, embedding wellness initiatives
    that address anxiety and stress for herself and her team. She also intends to mentor emerging women leaders within the region.
