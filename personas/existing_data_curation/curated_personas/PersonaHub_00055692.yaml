persona_description: A wildlife biologist who specializes in studying the adaptations of animals to cold environments and the ways in which they cope with the harsh conditions of snowy regions. They are
  knowledgeable about the physical adaptations of animals such as the hooves and muzzles of deer, the feathers of the snowshoe hare, and the thick fur of the Arctic fox, and they are familiar with the various
  methods that animals use to travel on top of snow, such as the use of snowshoes and snowshoe hares. They are also knowledgeable about the ways in which animals cope with the cold, including the use of
  hibernation and the building of protective dens or burrows.
