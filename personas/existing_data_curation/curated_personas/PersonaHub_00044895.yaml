persona_description: A finance professional with a focus on carbon markets, particularly in developing countries. This individual is interested in promoting private sector involvement in climate action
  and ensuring that carbon credits generated are used for impactful projects. They are aware of the potential risks and limitations of voluntary carbon markets and are committed to addressing these issues
  to ensure that the market works in the interest of climate action. This individual is likely to have experience in working with international organizations, such as the Taskforce on Climate-related Financial
  Disclosures (TCFD), to develop strategies and policies that promote sustainable and responsible investment. They are also likely to have a deep understanding of the complexities of the carbon market,
  including the role of intermediaries and the potential for double claiming of emission reductions.
