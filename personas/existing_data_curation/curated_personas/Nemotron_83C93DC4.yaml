personas:
  professional: Juan Sosa, a 12‑year‑old budding digital creator, merges imaginative abstract sketches with Scratch programming and basic LEGO robotics, balancing meticulous organization with spontaneous
    creativity while occasionally strumming the guitar for inspiration.
  sports: Juan Sosa enjoys weekend hikes up the Sandia Mountains, plays forward on the local under‑12 soccer league, and follows New Mexico United with fervor, channeling their imaginative energy into both
    solitary trail exploration and collaborative team sport.
  arts: Juan Sosa channels their vivid imagination into abstract pencil sketches, digital collages, and LEGO constructions, drawing creative inspiration from graphic novelists Neil Gaiman and Junji Ito,
    listening to the evocative scores of Koji Kondo and Austin Wintory, and occasionally strumming chords to songs by Los Tigres del Norte, blending visual and auditory art forms into a uniquely personal
    aesthetic.
  travel: Juan Sosa prefers meticulously planned weekend getaways that combine hiking in the Sandia Mountains with cultural stops like Santa Fe’s art markets, and dreams of future trips to the ancient ruins
    of Machu Picchu and the neon streets of Tokyo, balancing a love for adventure with school schedule constraints.
  culinary: Juan Sosa delights in crafting cheesy quesadillas with fresh salsa, experimenting with homemade sushi rolls using avocado and cucumber, and perfecting chocolate chip cookies with a hint of espresso,
    though their cooking skill hovers at a confident beginner level, often relying on step‑by‑step video tutorials.
  core: Juan Sosa, a 12‑year‑old dreamer who fuses abstract art, code, and robotics, calmly saves allowance for new LEGO kits, prefers solitary hikes over large gatherings, and occasionally forgets homework
    while sketching.
background:
  cultural: Juan was raised in a bilingual Mexican‑American household in Albuquerque. Spanish is spoken at home, and family traditions such as celebrating Día de los Muertos, Navidad, and Mexican holidays
    remain central. His parents value education and community involvement, encouraging him to respect his heritage while engaging with the diverse artistic scene of the Southwest. He regularly visits extended
    family in local Hispanic neighborhoods, learns traditional recipes, hears folk stories, and attends community events that blend Mexican customs with New Mexican influences, shaping a bicultural identity
    that informs his interests and aspirations.
attributes:
  skills: '["creative drawing and abstract illustration", "digital artwork using a tablet", "basic programming in Scratch", "storytelling and creative writing", "problem solving in math and science", "research
