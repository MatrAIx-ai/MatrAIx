  hobbies: '["drawing and abstract illustration", "digital art on tablet", "Scratch programming", "reading sci‑fi and graphic novels", "LEGO building and basic robotics", "playing guitar", "listening to
    Mexican folk and video‑game music", "nature sketching in the Sandia Mountains", "participating in cultural festivals like Día de los Muertos"]'
  career_goals: Juan dreams of blending art and technology, hoping to become a multimedia creator such as a video‑game designer, animator, or visual storyteller. He plans to attend a high‑school program
    with a focus on computer science and graphic design, eventually earning a degree that lets him craft immersive, culturally rich experiences. He also wants to use his talents to celebrate Mexican heritage
    by creating bilingual educational games or animated stories that reflect his community, and one day hopes to work in a creative studio or launch his own indie project.
