  career_goals: She dreams of turning her love for art and storytelling into a career as a multimedia artist or illustrator, possibly studying visual arts in college. Kathleen is also passionate about mental
    health; she hopes to use her creativity to design supportive content for peers, perhaps becoming an art therapist or a social‑media advocate for teen well‑being. She envisions a future where she can
    work on collaborative projects that blend unconventional ideas with community impact.
