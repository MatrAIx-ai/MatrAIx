personas:
  professional: An aspiring teen illustrator and storyteller, Kathleen Lung blends their love for watercolor, comic‑style sketches, and short narrative writing to create vibrant visual stories, channeling
    their curiosity into experimental art projects while navigating school responsibilities with a relaxed, often disorganized approach.
  sports: A lively member of the middle‑school soccer team, Kathleen Lung plays forward for the Lakeside Tigers, cheers on their favorite professional women’s club, the Portland Thorns, and combines after‑school
    drills with weekend pickup games at the community park, though they sometimes forget to bring water and skip proper stretching, leading to occasional shin splints.
  arts: A passionate creator, Kathleen Lung spends hours drawing manga‑inspired characters, painting watercolor cityscapes, writing short stories and poems for the school literary magazine, performing in
    the drama club’s spring musical, curating indie playlists featuring Mitski, Tame Impulse, and My Chemical Romance, and crafting friendship bracelets during volunteer art workshops, where they often
    share their latest sketches with peers.
  travel: Eager for new experiences, Kathleen Lung dreams of a spring trip to Kyoto to visit anime museums and tranquil temples, has already explored the nearby state park’s hiking trails with friends,
    prefers spontaneous weekend getaways over meticulously planned vacations, and they often save pocket money for a future family road trip along the Pacific Coast Highway.
  culinary: A budding food enthusiast, Kathleen Lung loves pepperoni pizza piled with extra cheese, enjoys rolling sushi after watching tutorial videos, frequently snacks on mango‑sticky rice and homemade
    mac & cheese, experiments with simple DIY recipes like rainbow fruit kebabs, and they occasionally over‑indulge in sugary cereal during late‑night gaming sessions.
  core: Kathleen Lung is a creatively curious, socially energetic teen who balances artistic ambition with anxiety‑driven mood swings, often forgetting deadlines but pursuing sketches, soccer, and indie
    music with fierce enthusiasm, and they channel their feelings into colorful drawings.
background:
  cultural: Kathleen grew up in West Unity, a small town in Fulton County, Ohio. Her family’s cultural roots are typical of the Midwestern white community, emphasizing close‑knit neighborly ties, community
    events such as county fairs, church youth groups, and family traditions like holiday gatherings and outdoor activities. The town’s modest, supportive atmosphere, combined with exposure to national pop
    culture through the internet, shape her values of friendliness, openness, and a laid‑back approach to obligations.
