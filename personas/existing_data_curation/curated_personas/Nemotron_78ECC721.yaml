  hobbies: '[''Yoga'', ''Mindfulness meditation'', ''Coastal jogging'', ''Reading medical journals'', ''Reading contemporary Puerto Rican literature'', ''Personal journaling'', ''Cooking traditional Puerto
    Rican cuisine'', ''Volunteering at community health fairs'', ''Designing health‑tracking apps'', ''Listening to salsa and reggaeton music'']'
  career_goals: Aida aims to advance from bedside nursing to a leadership role within a hospital’s clinical operations. She plans to earn a Nurse Practitioner certification in acute care within the next
    three years, leveraging her STEM background to specialize in health informatics. Long‑term, she aspires to become a Clinical Nurse Specialist or a unit manager, overseeing evidence‑based practice initiatives,
    improving patient safety metrics, and mentoring junior staff. She also seeks to obtain a certification in infection control to lead a hospital‑wide antimicrobial stewardship program, aligning with her
    competitive drive to be recognized as a top performer in her field.
