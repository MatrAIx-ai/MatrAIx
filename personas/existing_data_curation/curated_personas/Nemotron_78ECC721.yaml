personas:
  professional: Aida Almeida, a 30-year-old registered nurse with a STEM bachelor’s, blends meticulous clinical care and health informatics expertise to streamline EHR workflows, while their competitive
    drive fuels a strategic pursuit of an acute‑care Nurse Practitioner certification and future leadership in infection‑control stewardship.
  sports: Aida Almeida, an avid jogger along the coastal trails of Carolina, supplements their routine with sunrise yoga sessions, supports the Carolina Hurricanes hockey team, and participates in a local
    10‑k run club that meets every Saturday, reflecting a disciplined yet occasionally competitive approach to fitness.
  arts: Aida Almeida, a devoted reader of contemporary Caribbean literature, frequently discusses novels by authors such as Junot Díaz and Eduardo Galeano, while unwinding to reggaeton hits by Bad Bunny
    and classical piano pieces by Ludovico Einaudi, allowing artistic expression to balance their data‑driven mind.
  travel: Aida Almeida, who plans trips with meticulous spreadsheets, favors destinations that combine nature and culture like the rainforests of Costa Rica, the historic streets of Cartagena, and the culinary
    markets of Lisbon, often blending travel with short‑term health‑fair volunteering, yet they sometimes postpone dream trips due to demanding work schedules.
  culinary: Aida Almeida, an enthusiastic home cook, masters the preparation of mofongo with green plantains, pork, and garlic‑infused broth, pairs it with arroz con gandules seasoned with sofrito, and
    occasionally experiments by adding roasted peppers, while occasionally over‑salting dishes in pursuit of the perfect flavor balance.
  core: Aida Almeida, a fiercely organized 30‑year‑old nurse and budding health‑tech innovator, balances competitive ambition with yoga‑induced calm, cooks hearty island dishes, and navigates life with
    meticulous budgeting and a watchful eye on stress.
background:
  cultural: Aida was raised in Carolina, Puerto Rico, a vibrant municipality known for its blend of urban life and Caribbean heritage. She grew up in a bilingual household, fluent in Spanish and English,
    and her family’s Catholic traditions reinforced a strong sense of community and service. Puerto Rican culture’s emphasis on family cohesion, hospitality, and resilience shaped her practical and responsible
    nature. She maintains close ties with extended relatives, participates in local festivals such as patron saint celebrations, and values the island’s rich musical and culinary traditions. Her cultural
    identity informs her compassionate approach to patient care, especially in serving the diverse populations of the San Juan metropolitan area.
attributes:
  skills: '[''Patient assessment'', ''Critical care monitoring'', ''Intravenous therapy'', ''Medication administration'', ''Wound care'', ''Infection control'', ''Electronic health record management'',
