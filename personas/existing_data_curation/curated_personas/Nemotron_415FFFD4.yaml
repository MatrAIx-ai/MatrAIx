  hobbies: '[''Reading health and self‑improvement books'', ''Cooking traditional Mexican dishes'', ''Gardening'', ''Walking/hiking in local nature trails'', ''Listening to regional Mexican music'', ''Knitting'',
    ''Volunteering at community health events'', ''Bilingual storytelling'']'
  career_goals: Ana aims to formalize her education by completing a GED and earning a Certified Nursing Assistant (CNA) credential within the next two years. Building on her practical experience, she plans
    to pursue an Associate Degree in Nursing to become a Licensed Practical Nurse (LPN), with a long‑term ambition of specializing in geriatric care for the Hispanic community. She also hopes to obtain
    advanced certifications in wound care and patient safety, and eventually move into a supervisory role where she can mentor new aides and champion culturally sensitive patient advocacy.
