    ''Volunteer budgeting lessons'']'
  career_goals: Approaching retirement, Maria aims to transition into a senior advisory role where she can mentor emerging finance professionals and guide her organization toward sustainable investment
    strategies. She seeks to lead a community financial literacy program for seniors and rural residents in Windsor County and to serve on the board of a local non-profit focused on economic development.
    Additionally, she plans to establish a scholarship supporting women pursuing STEM degrees in New England, ensuring her legacy of curiosity, practicality, and community service.
