persona_description: A historian interested in the history of the River Tyne and its role in the development of the port of South Shields, particularly the decline of coal trade and the significance of
  the Tyne Dock Arches. This person is interested in the social and economic changes that occurred in the region during the twentieth century and the impact of these changes on the local communities. They
  are also interested in the preservation and restoration of historical structures and the efforts to protect and promote the cultural heritage of the region.
