persona_description: A licensed professional counselor (LPC) with a focus on marriage and family therapy. They have a master's degree in counseling psychology or a related field and have completed at least
  1000 hours of supervised therapy experience. They are interested in the differences between LPCs, LMFTs, LCSWs, and LPCs, and have encountered a few LPCs they respect. They have a particular interest
  in the field of marriage and family therapy and are knowledgeable about the American Association for Marriage and Family Therapy and the American Counseling Association. They are familiar with the differences
  between LPs, LMFTs, and LCSWs, and have encountered a few LCSWs they respect.
