  hobbies: '[''Reading mystery and historical fiction'', ''Journaling'', ''Puzzle solving (crosswords, sudoku)'', ''Herb gardening'', ''Yoga'', ''Jogging'', ''Cooking and meal planning'', ''Small‑group
    book club'']'
  career_goals: Erika aims to transition from her current retail salesperson role into a management track within the next three years. She plans to complete an associate degree in Business Administration,
    focusing on retail management and supply‑chain fundamentals, to provide a clear, structured career pathway. Her short‑term goal is to become an assistant store manager, where she can apply her organizational
    strengths to oversee daily operations and mentor junior staff. Long‑term, she aspires to become a store manager and eventually a district manager, overseeing multiple locations with a focus on efficiency
    and measurable performance metrics. She also entertains the possibility of eventually franchising a small boutique, valuing the predictability of a well‑defined business model.
