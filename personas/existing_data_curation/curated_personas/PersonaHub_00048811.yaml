persona_description: A researcher or scientist who is interested in comparative genomics and has expertise in using the zebrafish as a model system to study regulatory elements in the vertebrate genome.
  They have a background in genetics and bioinformatics and have successfully used the zebrafish to locate specific regulatory sequences and test their ability to drive reporter gene expression in vivo.
  They are aware of the challenges and limitations of using the zebrafish as a model system and have a critical perspective on its successes and failures in this field.
