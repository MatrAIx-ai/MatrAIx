persona_description: A researcher from Sandia National Laboratories who specializes in the field of computer networking and data visualization. He has developed a prototype system that allows researchers
  to access and manipulate very large sets of data stored thousands of miles away, using the Internet as a remote access scheme. His research interests include improving the efficiency of remote access,
  reducing lag time in remote data sharing, and enhancing the interactivity and usability of remote visualization hardware.
