  hobbies: '[''Basketball'', ''Fishing'', ''Hiking'', ''Woodworking'', ''Home improvement projects'', ''Traditional beadwork'', ''Powwow participation'', ''Strategy video games'', ''Reading construction
    magazines'', ''Following Boston Red Sox'']'
  career_goals: Ronald aims to become a certified drywall foreman within the next three years, taking advantage of apprenticeship programs and OSHA refresher courses. He plans to earn a Massachusetts trade‑partner
    license, then transition to owning a small subcontracting firm specializing in high‑end residential renovations and commercial ceiling systems. He also intends to study construction management at a
    community college to broaden his project‑planning expertise and eventually move into site‑supervision or general contracting. Financially, his goal is to purchase a home in East Boston and achieve stable
    income that supports long‑term security.
