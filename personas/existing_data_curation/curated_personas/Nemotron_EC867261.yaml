  career_goals: Yvette is beginning to imagine future roles that combine her love of learning and helping others, often saying she wants to be a teacher, a veterinarian, or an astronaut. Her short‑term
    ambitions focus on mastering the alphabet song, learning to count to ten, and gaining more independence in dressing herself, laying a practical foundation for her curiosity‑driven aspirations. She looks
    forward to attending preschool where she can explore science through play and develop the social confidence to share knowledge with peers.
