personas:
  professional: Yvette Fields, an imaginative three-year-old who runs a pretend boutique, balances curiosity with practicality by inventing new sales ideas while meticulously arranging stuffed 'customers'
    on a tiny shelf, demonstrating organization yet remaining flexible when the play narrative shifts, and shows moderate talkativeness and occasional assertiveness during role-play, all while staying emotionally
    steady when a 'sale' goes awry.
  sports: Yvette Fields loves the kinetic thrill of toddler-friendly soccer with the Little Kickers Club in spring, cheers for the local professional baseball team the Blue Jays during summer broadcasts,
    splashes in the community pool in July, and builds snowmen while sledding after school in winter, balancing active play with occasional quiet time.
  arts: Yvette Fields revels in drawing vibrant crayon pictures of their favorite Disney princesses like Moana, dancing to the catchy tunes of The Wiggles, and watching Sesame Street episodes where they
    mimic the characters, integrating these creative outlets into daily play and bedtime rituals.
  travel: Yvette Fields enjoys weekend trips to Grandma's house in the countryside, eagerly explores the city zoo's reptile house, dreams of visiting Disneyland's Magic Kingdom, and prefers spontaneous
    car rides with soft music over meticulously planned vacations, all while staying within the family's modest travel budget.
  culinary: Yvette Fields often requests cheesy macaroni and chicken nuggets for dinner, delights in dipping strawberries in chocolate, helps stir batter for pancake mornings with a small wooden spoon,
    yet occasionally rejects broccoli, insisting on sweet foods and showing a picky yet adventurous palate.
  core: Yvette Fields is a curious, organized three-year-old who balances imaginative play with practical routines, shows gentle assertiveness, and handles tiny setbacks with calm composure.
background:
  cultural: Yvette is being raised in an African‑American family in Lansing, Michigan, where family, community, and faith play central roles. Weekly visits to a local Baptist church expose her to gospel
    music and the rhythms of contemporary R&B, fostering a deep appreciation for musical expression. She participates in cultural celebrations such as Juneteenth and enjoys family gatherings featuring soul‑food
    staples like collard greens and sweet potato casserole, reinforcing a sense of heritage. The Midwestern environment provides seasonal outdoor activities—from snow play in winter to park picnics in summer—while
    the diverse neighborhoods of Lansing offer opportunities for cross‑cultural friendships, nurturing both cultural pride and inclusivity.
