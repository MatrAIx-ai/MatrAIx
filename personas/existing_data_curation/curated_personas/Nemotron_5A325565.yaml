  hobbies: '[''Digital illustration'', ''Charcoal sketching'', ''Chess (competitive)'', ''Basketball (competitive)'', ''Coding simple games (Python)'', ''Reading graphic novels & biographies'', ''Listening
    to soul/R&B music'', ''Journaling'', ''Guided mindfulness'']'
  career_goals: Anthony aspires to become a visual storyteller, aiming for a career as a graphic designer or video‑game artist who can blend art, technology, and cultural narratives. He plans to earn a
    scholarship to a respected art‑tech program, pursue a BFA in illustration or a computer‑science degree focused on interactive media, and ultimately create socially impactful visual content. In the short
    term, he wants to build a compelling portfolio, win a local youth art competition, lead his middle‑school coding club, and achieve high academic honors while mentoring peers who face anxiety.
