personas:
  professional: Anthony Shields is a 13‑year‑old budding comic‑artist and junior Python coder who channels their meticulous, achievement‑driven nature into daily sketch‑sessions, developing storyboards
    for a self‑published webcomic while meticulously debugging simple mobile games, all while maintaining a skeptical eye toward peer feedback and a competitive streak that pushes them to win local talent
    showcases.
  sports: Anthony Shields fuels their competitive drive on the court as a point guard for the Edgefield Youth Basketball Club, idolizing the NBA’s Charlotte Hornets and emulating their fast‑break style,
    while also maintaining a disciplined chess training schedule at the community center and joining the local summer basketball camp each July.
  arts: 'Anthony Shields immerses themselves in the world of visual art and sound, drawing comic‑style heroes inspired by the storytelling rhythm of classic soul legends like Marvin Gaye and contemporary
    R&B icons such as H.E.R., while devouring graphic novels like ''Black Panther: World of Wakanda'' and the biography ''I Am Malala'' to deepen narrative techniques, and experimenting with digital painting
    tools on their tablet after school.'
  travel: Anthony Shields dreams of road‑tripping to the historic streets of Charleston and the jazz‑filled French Quarter of New Orleans after graduation, already having toured the Edgefield Museum and
    a weekend family visit to Savannah, Georgia, where they practiced sketching local architecture and noted a mural in a heritage festival as a travel‑inspired art project.
  culinary: Anthony Shields balances their love of Southern comfort food with curiosity for global flavors, regularly making peanut‑butter‑banana sandwiches and perfecting crispy fried chicken with a side
    of collard greens at home, while they also experiment with a simple homemade ramen broth after watching a cooking vlog featuring miso, tofu, and scallions.
  core: Anthony Shields is a disciplined, anxious teen who merges comic art, competitive chess, and basketball with a skeptical, high‑achieving mindset; they constantly juggle meticulous budgeting, ritualistic
    breathing, and a secret stash of late‑night graphic novels.
background:
  cultural: Raised in Edgefield, South Carolina, Anthony grows up in a community rich with African‑American history, including ties to Gullah heritage and the legacy of the Civil Rights movement. His family
    upholds Southern traditions such as church gatherings, family storytelling, and participation in local festivals that celebrate black culture. Frequent visits to the Edgefield Museum and involvement
    in the church choir deepen his appreciation for African‑American art and music. The close‑knit neighborhood, with multigenerational households, reinforces values of resilience, respect for elders, and
    a collective commitment to uplifting the community.
