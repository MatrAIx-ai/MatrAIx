personas:
  professional: Becky Farrar is an experienced full‑stack software engineer who designs test‑driven micro‑service architectures, builds scalable AWS deployments, and integrates IoT prototypes for sustainable
    farming, all while mentoring junior developers with a methodical, organized style that mirrors their preference for structure and practical problem‑solving.
  sports: Becky Farrar explores the trails of Hoosier State Park and joins the Indianapolis Trail Runners club for weekend 5K runs, tracks mileage in Strava, and follows the Indianapolis Colts and Indiana
    Pacers with a competitive eye, blending solitary cardio with occasional group rides during summer months.
  arts: Becky Farrar works behind the scenes on set construction and lighting for the Moores Hill Community Theater while unwinding with mystery novels by Agatha Christie, historical fiction by Hilary Mantel,
    and folk music from Gillian Welch, letting these creative pursuits deepen their reflective yet pragmatic outlook.
  travel: Becky Farrar plans well‑structured road trips that combine outdoor adventure with tech curiosity, having visited the Amish farms of Lancaster County, the cornfields of Iowa, and the sustainable
    agriculture labs in the Netherlands, and they now aim to attend a regional tech conference in Silicon Valley while still reserving weekend getaways to the Indiana Dunes for family relaxation.
  culinary: Becky Farrar delights in cooking farm‑fresh meals such as heirloom tomato bruschetta, roasted corn chowder, and pickled cucumbers, leveraging intermediate culinary skills and a love of sustainable
    ingredients, while occasionally treating themselves to a farm‑to‑table dinner featuring locally sourced kale and heritage beans.
  core: Becky Farrar merges disciplined engineering prowess with a hands‑on love for sustainable gardening, carving a life where meticulous code meets rustic creativity, all balanced by a competitive edge
    and a practical, structured worldview.
background:
  cultural: Becky was born and raised in a small town in Indiana, part of a multigenerational Midwestern family with farming roots. Her father worked on a family farm while her mother taught at the local
    high school, instilling a strong work ethic, self-reliance, and a sense of community responsibility. Growing up she participated in county fairs, church gatherings, and the high school computer club,
    which sparked her interest in technology. As a first-generation college graduate with a STEM bachelor's degree, she blends traditional Midwestern values—practicality, reliability, and modesty—with a
    forward-looking embrace of innovation. She remains active in her Methodist congregation and local volunteer groups, reflecting the region's emphasis on neighborly support and civic engagement.
attributes:
  skills: '[''Python'', ''Java'', ''C#'', ''SQL'', ''Git'', ''Docker'', ''Kubernetes'', ''AWS'', ''Agile Scrum'', ''Test-Driven Development'', ''Microservices Architecture'', ''CI/CD pipelines'', ''React'',
    ''Angular'', ''Problem Solving'', ''System Design'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Crossword Puzzles'', ''Reading Mystery Novels'', ''DIY Home Improvement'', ''Raspberry Pi Projects'', ''Community Volunteering'']'
  career_goals: Becky aims to transition into a lead architect role where she can define technical strategy for large-scale, high-impact projects, preferably in the agri-tech sector that serves her Midwestern
    community. She plans to earn the AWS Certified Solutions Architect – Professional credential and lead a remote development team that embraces rigorous code standards and continuous delivery. Over the
    next five years she hopes to launch a consultancy that helps small businesses adopt modern software solutions, contribute to open-source projects related to sustainable farming, and speak at regional
    tech conferences. While pursuing these ambitions, she values maintaining a predictable schedule that supports her family life and personal well-being.
