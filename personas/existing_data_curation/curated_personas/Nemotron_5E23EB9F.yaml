personas:
  professional: Leta Humphrey is a detail‑oriented high school senior who excels at spreadsheet organization and data entry, channeling their love of order into a future as a medical‑records clerk where
    they can work independently and follow clear procedures.
  sports: Leta Humphrey is a low‑key fitness enthusiast who walks daily through their backyard vegetable patch, attends a local yoga class at the community center, and quietly cheers for the Indianapolis
    Colts and the Indiana Hoosiers while occasionally volunteering as a scorer for the Avon Greyhounds varsity soccer team.
  arts: Leta Humphrey is an introspective creative who devotes evenings to knitting intricate Fair Isle patterns while listening to the folk melodies of Gillian Welch, reads mystery novels by Tana French,
    and captures modest black‑and‑white photographs of sunrise fields inspired by Ansel Adams, often reviewing each image through the lens of their quiet, analytical mind.
  travel: Leta Humphrey prefers meticulously planned weekend getaways to quiet locales such as Mackinac Island, the Amish farms of Lancaster County, and the pastel‑colored towns of New England, balancing
    their love for nature with a modest travel budget and family constraints.
  culinary: Leta Humphrey enjoys cooking comforting meals like roasted vegetable quinoa bowls, homemade apple crumble, and hearty tomato soup, often seasoning with fresh basil from their garden and using
    the carrots they harvest themselves for a weekly carrot‑ginger stew.
  core: Leta Humphrey is a quietly meticulous teen whose days revolve around spreadsheets, knitting, and a steadfast quest for order, even if it means occasionally hoarding yarn and double‑checking every
    checklist.
background:
  cultural: Leta was raised in Avon, Indiana, a largely white, middle‑class Midwestern community where family gatherings, local church events, and seasonal celebrations such as Thanksgiving and Fourth of
    July picnics are common. Her upbringing reflects the region’s emphasis on self‑reliance, modesty, and community service, and she grew up with exposure to both suburban life and nearby agricultural traditions.
    These cultural influences have reinforced her preference for order, reliability, and quiet personal spaces.
attributes:
  skills: '[''basic computer literacy (Microsoft Office)'', ''data entry'', ''project organization and scheduling'', ''meticulous note‑taking'', ''budgeting and personal finance'', ''cooking and meal planning'',
    ''basic home maintenance'', ''effective written communication'']'
  hobbies: '[''reading contemporary fiction and mysteries'', ''journaling'', ''knitting'', ''gardening'', ''puzzle solving (crosswords, logic games)'', ''nature photography'']'
  career_goals: Leta aims to obtain her GED within the next year and then pursue a career that offers a stable, predictable routine and minimal social pressure. She is interested in roles such as administrative
    assistant, library aide, or medical records clerk, where she can apply her organizational and data‑entry skills. Long‑term, she hopes to earn a certification in office administration or health‑information
    management, allowing her to work independently in a quiet, structured environment.
