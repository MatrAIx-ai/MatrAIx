  career_goals: Sharon dreams of becoming a children's book illustrator who can bring her imaginative stories to life with colorful art. She also imagines herself as a scientist who explores nature and
    discovers new animals, hoping to combine her love for art and curiosity about the world. In the future, she hopes to work in a museum or school where she can share her creativity and inspire other kids
    to imagine and explore.
