personas:
  professional: Sharon Ryan, a budding junior illustrator, blends vivid fantasy drawing with meticulous LEGO building, using their organized planning skills and sociable nature to lead school art projects
    and drama productions.
  sports: Sharon Ryan, a spirited member of the Loveland youth soccer team, trains twice weekly, cheers for the Colorado Rapids forward Daniel Pereira, and enjoys watching Denver Broncos games with family,
    always eager to sprint across the field and celebrate a goal with a dance, and they feel a rush of confidence after each match.
  arts: Sharon Ryan, a creative enthusiast inspired by Studio Ghibli’s animated worlds and Dr. Seuss’s whimsical illustrations, spends afternoons sketching fantastical landscapes, stars in school drama
    productions, and dances to the pop tunes of Taylor Swift, and they constantly weave storytelling into every brushstroke.
  travel: Sharon Ryan, an adventurous eight‑year‑old who has explored Rocky Mountain National Park’s trails, visited the colorful Denver County Fair, and dreams of strolling through the historic castles
    of Scotland and the cherry blossoms of Kyoto, plans each trip with a hand‑drawn itinerary and a stash of stickers for souvenirs, and they eagerly share travel stories with friends.
  culinary: Sharon Ryan, a kitchen‑curious youngster, loves crafting rainbow fruit kebabs, mixing chocolate chip cookies with extra sprinkles, and proudly assembles peanut‑butter‑and‑jelly sandwiches, often
    insisting on adding fresh strawberries to their morning cereal and sneaking a bite of the cookie dough before baking, and they proudly serve their creations to family members.
  core: Sharon Ryan, an eight‑year‑old imagination engine, balances meticulous LEGO constructions with spontaneous splash‑paint sessions, saves every penny in a glitter‑lined piggy bank, and they sometimes
    abandon homework for a dragon‑filled adventure.
background:
  cultural: Sharon comes from a white Midwestern family in Loveland, Ohio. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, and often participates
    in local traditions like apple picking in the fall and attending the Clermont County fair. Her family has German and Irish ancestry, common in the region, and values friendliness, community service,
    and modesty. She frequently visits the local church and community center, where she engages in group activities and volunteer projects. The supportive, tight‑knit atmosphere of her suburban neighborhood
    and school reinforces her sociable, cooperative nature.
