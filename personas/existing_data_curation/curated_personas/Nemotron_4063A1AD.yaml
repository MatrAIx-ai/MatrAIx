  career_goals: Although officially retired, Brian aims to stay actively engaged in his community and family life. He hopes to mentor a local high-school robotics club, sharing his mechanical know-how while
    encouraging curiosity. He also plans to complete a series of oral-history recordings of longtime Riverview residents, preserving local heritage for future generations. On a personal level, Brian is
    committed to maintaining his health and independence through regular walking, swimming, and health check-ups, ensuring he can continue supporting his wife and grandchildren. He aspires to finish a modest
    renovation of his backyard workshop, turning it into a collaborative space for family projects and community workshops.
