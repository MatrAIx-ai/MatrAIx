  hobbies: '[''visiting local museums (B&O Railroad Museum, Maryland Science Center)'', ''drawing and sketching'', ''building LEGO models'', ''creating Scratch animations and games'', ''playing soccer and
    capture-the-flag'', ''conducting simple science experiments'', ''reading about inventors and space'', ''watching animated movies'', ''listening to music while drawing'']'
  career_goals: Leslie dreams of channeling her love for art and new ideas into a future career that unites creativity with technology. She envisions herself designing interactive museum exhibits or inventing
    playful educational toys that inspire other kids. To reach that, she aims to excel in school science fairs, win local coding contests, and eventually study product design or engineering. Her competitive
    nature drives her to be the top of her class, while her calm resilience encourages her to tackle big, complex projects without fear.
