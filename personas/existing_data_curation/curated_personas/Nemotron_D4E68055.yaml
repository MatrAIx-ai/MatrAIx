personas:
  professional: Mary Oneil is an aspiring visual artist who blends sketchbook drawings, watercolors, and digital illustrations with speculative storytelling, leveraging their curiosity and open-mindedness
    while navigating school projects with a laid-back, often disorganized workflow that nevertheless shines when they assertively defend their creative vision.
  sports: Mary Oneil enjoys casual fitness through park strolls for photography, occasional yoga sessions at their community center, and cheering on the Philadelphia Eagles, Flyers, and Union while never
    committing to a formal sports team, preferring spontaneous movement over regimented training.
  arts: Mary Oneil immerses themselves in the arts by sketching in the margins of a Philadelphia Museum of Art visit, drawing inspiration from watercolor masters like Claude Monet, digital illustrators
    such as Rebecca Sugar, and indie ukulele folk singer Phoebe Bridgers, while also crafting DIY jewelry and attending community workshops to cultivate a multidimensional creative identity.
  travel: Mary Oneil prefers low-cost, spontaneous weekend trips - like wandering the historic streets of Old City Philadelphia, a day trip to Washington, D.C.'s Smithsonian, or a weekend in New York City's
    art districts - while dreaming of an eventual summer study abroad in Paris, balancing a tight school schedule with a love for on-the-fly photography adventures.
  culinary: Mary Oneil's culinary tastes lean toward colorful, fresh dishes like avocado toast topped with radish and microgreens, homemade quinoa bowls drizzled with lemon-ginger dressing, and occasional
    sushi rolls, and while their cooking skill is modest, they delight in plating food as a visual canvas, often experimenting with bright berries and aromatic basil.
  core: Mary Oneil is a curious, slightly disorganized teenage visual storyteller who weaves art, music, and craft into daily life, embracing solitude while still finding joy in small-group collaborations
    and occasionally succumbing to the messiness of adolescence.
background:
  cultural: Mary was raised in a middle‑class, suburban family in Marlton, New Jersey. Her household reflects a blend of typical American customs—celebrating holidays like Thanksgiving and Fourth of July
    with family gatherings, enjoying neighborhood block parties, and participating in community library programs. While her ancestry is primarily of European descent (with family roots in Irish and German
    heritage), her upbringing emphasizes inclusivity and exposure to diverse cultural experiences through school art programs, local museum visits, and multicultural festivals in nearby Philadelphia. This
    environment has fostered an appreciation for both her own cultural traditions and the broader artistic landscape of the region.
