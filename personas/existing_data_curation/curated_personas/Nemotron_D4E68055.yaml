    and natural scenes'', ''playing ukulele'', ''DIY jewelry making'', ''visiting local museums and galleries'', ''participating in small art club meetings'']'
  career_goals: Mary hopes to study graphic design or illustration at a university with a strong visual arts program. She dreams of becoming a freelance illustrator who creates book covers, concept art
    for video games, and editorial graphics for magazines. She is also intrigued by the idea of working in a museum or gallery setting, curating exhibitions that blend contemporary art with interactive
    technology. In the short term, she plans to build a personal online portfolio, enter local art contests, and seek a mentorship with a professional artist. Ultimately, she wants to turn her love for
    storytelling and visual expression into a sustainable creative career while maintaining the flexibility to explore new mediums.
