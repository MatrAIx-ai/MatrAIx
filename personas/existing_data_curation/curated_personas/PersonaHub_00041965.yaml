persona_description: A member of Parliament who voted for the creation of two Parliamentary constituencies on the Isle of Wight, and was in favor of the alternative Lords Amendment 17-20 that would have
  resulted in one constituency for the whole island. He believed that splitting the island into two constituencies would ensure that electors' votes were closer in weight to those cast elsewhere in the
  UK, which is important.
