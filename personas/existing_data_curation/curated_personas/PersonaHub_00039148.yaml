persona_description: A historian who specializes in the study of medieval and early modern history, particularly the period from the 12th to the 16th century. Her research interests include, but are not
  limited to, the history of Scotland, England, and Ireland, the Crusades, and the Wars of the Roses. She is an expert in the use of primary sources, such as medieval manuscripts, legal documents, and military
  records, to reconstruct the past. She is also an expert in the use of secondary sources, such as historical texts and academic articles, to analyze and interpret the historical evidence. She is a member
  of the Royal Historical Society and has published several books and articles on her research.
