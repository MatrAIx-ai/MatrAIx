  hobbies: '[''Painting'', ''Attending Art Exhibits'', ''Crafting (Papel Picado, Embroidery)'', ''Cooking Mexican Cuisine'', ''Gardening'', ''Folklorico Dancing'', ''Walking Groups'', ''Book Club'', ''Genealogy
    Research'', ''Church Choir'']'
  career_goals: Although no longer employed full‑time, Maria aims to mentor emerging teachers through informal tutoring and workshops, launch a community art project that pairs seniors with local youth,
    and establish a scholarship fund for Mexican‑American students pursuing education careers. She also hopes to document and share oral histories of Mexican‑Texan elders, learn digital photography to preserve
    cultural events, and maintain her health and social connections through active community involvement.
