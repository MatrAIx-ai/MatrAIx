  hobbies: '[''Fishing'', ''Hiking'', ''Reading Culinary Memoirs'', ''Baking'', ''Home Brewing'', ''Acoustic Guitar'', ''Photography'', ''Volunteering at Food Pantry'', ''Model Train Building'']'
  career_goals: Garrett aims to move from line cook to sous chef within the next two years, obtaining a Certified Chef de Cuisine (CCC) credential to formalize his expertise. He envisions eventually opening
    a modest farm‑to‑table bistro that showcases a blend of Midwestern seasonal produce and his family’s Russian‑European culinary heritage. To achieve this, he plans to enroll in a culinary management
    program, build a network of local farmers, and develop a signature menu that highlights both practical, cost‑efficient dishes and occasional experimental flavor pairings. He also hopes to mentor apprentices,
    sharing his organized approach to kitchen operations.
