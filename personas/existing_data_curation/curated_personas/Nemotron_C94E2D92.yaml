personas:
  professional: Garrett Fike, a meticulous 39‑year‑old line cook known for razor‑sharp knife work and disciplined kitchen flow, blends classic sauté and braising techniques with cost‑effective menu engineering,
    mentors junior staff with a calm yet assertive style, and is steadily charting a path toward a sous‑chef role and a Certified Chef de Cuisine credential while dreaming of a modest farm‑to‑table bistro
    that showcases seasonal Midwestern produce.
  sports: Garrett Fike, a 39‑year‑old outdoor enthusiast and kitchen veteran follows the Milwaukee Brewers in the spring and summer, roots for the Minnesota Vikings during football season, and enjoys a
    weekly pickup soccer match with fellow food‑service workers; they maintain fitness through early morning hikes in local forest preserves, occasional fishing trips for cardio, and a routine of body‑weight
    workouts at home to counteract the long hours of standing in the kitchen.
  arts: Garrett Fike, a 39‑year‑old line cook with a creative streak strums acoustic renditions of Bob Dylan and The Avett Brothers on a well‑worn guitar after the dinner rush, curates a snapshot collection
    of farmers’ markets inspired by the candid style of Steve McCurry, and unwinds with culinary memoirs like Anthony Bourdain’s Kitchen Confidential and historical fiction by Hilary Mantel; they also enjoy
    classic films starring Meryl Streep and attend occasional local theater productions, letting artistic immersion balance kitchen intensity.
  travel: Garrett Fike, a 39‑year‑old culinary professional plans travels like a menu—meticulously mapping a weekend road trip to Yellowstone for wildlife photography, a summer escape to Napa Valley for
    vineyard tours and barrel‑tasting, and a long‑awaited culinary pilgrimage to Chiang Mai, Thailand to study street‑food fermentations; their travel style blends adventure with budget discipline, using
    credit‑card travel rewards, but family commitments and a demanding kitchen schedule often limit trips to two‑week windows.
  culinary: Garrett Fike, a 39‑year‑old line cook revels in baking artisan sourdough loaves with spelt flour, rye, and wildflower honey, and brews small batches of farmhouse ale using Cascade hops and dark
    malt, cataloguing each experiment in a leather‑bound notebook; in the kitchen they favor braised short ribs with beet reduction, pan‑roasted trout glazed with dill‑infused oil, and seasonal vegetable
    gratins that showcase Midwestern produce, while their palate is equally drawn to classic French techniques and innovative flavor pairings like miso‑marinated carrots.
  core: Garrett Fike, a 39‑year‑old line cook who balances meticulous kitchen precision with a love for fishing, craft brewing, and restless curiosity, often worries about the next service but finds solace
    in sourdough spreadsheets and weekend hikes.
background:
  cultural: Garrett grew up in Plainfield, Illinois, as a second‑generation American with Russian ancestry; his paternal grandparents emigrated from Moscow in the 1970s. The household blended Midwestern
    American customs with Eastern European traditions, celebrating holidays such as Thanksgiving alongside Russian festivals like Maslenitsa. This bicultural upbringing shaped his palate, giving him an
    appreciation for hearty soups, pickled vegetables, and rye breads, while also valuing the fresh, seasonal produce typical of the Midwest. He identifies with the region’s emphasis on hard work, community
    involvement, and modest ambition, and he incorporates these values into his cooking style and personal life.
