  hobbies: '["Fishing", "Woodworking", "Gardening", "Reading historical fiction", "Cooking Southern cuisine", "Attending church services", "Watching classic film noir movies", "Nature walks", "Model airplane
    building", "Volunteer tutoring at the community center"]'
  career_goals: James aims to move into a supervisory or lead representative role within his current company over the next three to five years, focusing on mentoring new hires and ensuring consistent service
    quality. He plans to earn a certification in Customer Experience Management to deepen his expertise while maintaining a predictable schedule that reduces stress and supports his family life. Long‑term,
    he hopes to secure a stable retirement and continue contributing to his community by volunteering at the local senior center and participating in church outreach programs.
