personas:
  professional: Stacy Weatherly, a veteran computer systems analyst, leverages their knack for structured workflow mapping, SQL data analysis, and clear documentation while navigating the occasional chaos
    of loosely defined projects, and they use their mediating skills to bridge technical and non‑technical teams and mentor junior staff.
  sports: Stacy Weatherly enjoys casual fitness through weekly walks with the Prairie Birdwalkers club, follows the Chicago Cubs and Chicago Bears with faithful seasonal devotion, and they play pickleball
    at the local community center on weekends, finding a gentle balance between competitive spirit and low‑impact activity.
  arts: Stacy Weatherly immerses themselves in historical fiction by Philippa Gregory and mystery novels by Tana French at the town book club, channels pattern‑loving creativity into quilting and crocheting
    projects inspired by folk art, and they savor evenings listening to Bob Dylan and Emmylou Harris while appreciating local community theater productions starring regional talent.
  travel: Stacy Weatherly favors leisurely road trips to historic towns like Galena, Illinois, and natural wonders such as Badlands National Park, planning routes with a flexible itinerary that allows spontaneous
    stops for local festivals, and they balance a modest travel budget and volunteer commitments that keep longer international journeys for future bucket‑list aspirations like a colonial history tour of
    Williamsburg.
  culinary: Stacy Weatherly delights in farm‑to‑table cooking, frequently preparing rosemary‑infused roasted vegetable medleys, chicken pot pie with garden‑grown carrots and peas, and crisp salads topped
    with goat cheese and locally harvested heirloom tomatoes, while they showcase modest culinary skill at weekly farmers’ market visits and occasional indulgence in homemade apple crisp for dessert.
  core: Stacy Weatherly balances a love for structured data and garden rows with a habit of misplacing their keys in pockets already full of seed packets, and they offer calm mentorship at work while occasionally
    succumbing to spontaneous vintage‑fabric splurges.
background:
  cultural: Stacy grew up in the Midwestern United States, steeped in the values of small‑town Iowa—community cooperation, modesty, and self‑reliance. Her cultural upbringing includes participation in local
    church activities and yearly county fairs, where agricultural heritage and neighborly support were central. Although she identifies as white American, her life reflects the blend of post‑war rural sensibilities
    and contemporary openness to technology, balancing traditional communal ties with an appreciation for modern digital tools.
attributes:
  skills: '[''Systems analysis'', ''Requirements gathering'', ''Process mapping'', ''Data analysis (SQL, Excel)'', ''Technical documentation'', ''User training and support'', ''Network troubleshooting'',
    ''Hardware/software procurement'', ''Vendor liaison'', ''Project coordination'', ''Business continuity planning'']'
  hobbies: '[''Gardening'', ''Reading (historical fiction, mystery)'', ''Book club participation'', ''Quilting'', ''Crocheting'', ''Volunteer computer tutoring'', ''Birdwatching'', ''Prairie trail walking'',
    ''Community festival attendance'', ''Church social events'']'
  career_goals: Stacy aims to transition into a senior analyst or consulting role that allows her to mentor younger colleagues and lead small, cross‑functional teams. She is pursuing certifications in ITIL
    and cloud fundamentals to broaden her expertise. By leveraging her experience, she hopes to guide local small businesses in Ashton and surrounding rural communities toward more efficient, secure technology
    practices, while maintaining a flexible schedule that supports her personal well‑being and community involvement.
