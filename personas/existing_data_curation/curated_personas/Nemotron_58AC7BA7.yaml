  career_goals: She aims to pursue a career that blends her curiosity for how things work with a practical, results‑oriented mindset. Diane is particularly interested in becoming a software engineer or
    a mechanical engineer, where she can design functional tools or devices. In the short term, she hopes to join a high‑school robotics club, earn a coding certification, and develop a personal project
    that solves a real‑world problem for her community, such as a simple app to organize neighborhood recycling efforts.
