personas:
  professional: Diane Isaac, a budding teen technologist, channels her curiosity and competitive edge into designing custom LEGO robotics and tinkering with Arduino kits, blending strategic thinking from
    chess and video games with a relaxed, sometimes disorganized approach that favors flexible problem‑solving over rigid planning.
  sports: Diane Isaac, a 13‑year‑old who favors solo activity, spends Saturdays hiking the Fontenelle Forest and cycles along the Bob Kerrey Pedestrian Bridge, while cheering for the Nebraska Cornhuskers
    football team and the Omaha Storm Chasers baseball club, but steers clear of organized school sports, preferring the flexibility of personal fitness routines.
  arts: Diane Isaac, an avid sketcher and budding photographer, draws inspiration from Ansel Adams’ black‑and‑white landscapes, loses herself in the synth‑driven sounds of Tame Impala, and re‑watches Studio
    Ghibli's 'Spirited Away' for its whimsical visual storytelling, often integrating these influences into their own nature drawings and zoo photography.
  travel: Diane Isaac, a curious 13‑year‑old traveler, enjoys spontaneous weekend road trips to nearby state parks like the Loess Hills and family vacations to Yellowstone, while dreaming of a spring pilgrimage
    to Kyoto’s cherry‑blossom festival and a summer trek through the Grand Canyon, preferring flexible itineraries that allow time for impromptu photo stops.
  culinary: Diane Isaac, a teen with a modest cooking skill set, favors building her own meals such as pepperoni pizza with fresh basil, quick ramen topped with boiled eggs and sliced scallions, and chocolate
    chip cookies baked from a family‑passed recipe, while delighting in snack experiments like caramel‑drizzled popcorn and peanut‑butter banana smoothies.
  core: Diane Isaac, a 13‑year‑old tactical mind, fuses curiosity with a relaxed, sometimes chaotic schedule, turning LEGO builds and chess strategies into daily challenges while occasionally neglecting
    health routines and overspending on the latest game skins.
background:
  cultural: Diane comes from a middle‑class, white Midwestern family in Omaha, Nebraska. Her upbringing reflects typical Nebraskan values such as self‑reliance, community involvement, and a respect for
    the outdoors. Family gatherings often revolve around traditional American holidays like Thanksgiving and Fourth of July barbecues, and the household maintains a modest appreciation for the region’s
    German‑Irish ancestry. Growing up near the Henry Doorly Zoo, local university museums, and the expansive prairies has fostered in her an appreciation for nature and learning through hands‑on experiences.
