  career_goals: Shawn aims to transition from hands‑on operation to a supervisory or training role within the next few years. He plans to obtain advanced certifications in heavy‑equipment safety and emerging
    autonomous machinery, mentor younger operators, and eventually oversee a small fleet at his current plant. He also hopes to secure a stable retirement plan and explore a side venture restoring classic
    trucks, merging his mechanical know‑how with his passion for art and design.
