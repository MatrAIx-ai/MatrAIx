personas:
  professional: Donna Patton is a seasoned police officer in a suburban New Jersey department, where her routine‑driven mindset, calm demeanor, and skill in community mediation enable them to mentor new
    recruits and lead neighborhood safety workshops while aspiring to become sergeant.
  sports: Donna Patton maintains low‑impact fitness through weekly yoga classes, spring hikes along the Delaware River Valley, and cheering on the New York Giants during football season, while also playing
    in a co‑ed softball league organized by the town’s community center.
  arts: Donna Patton relaxes to classic rock and folk legends such as Bob Dylan, Neil Young, and The Eagles while cooking, indulges in Agatha Christie mystery novels, and occasionally attends community
    theater productions featuring local talent like Sarah Martinez.
  travel: Donna Patton favors low‑key road trips with a handwritten itinerary, frequently revisiting New England coastal towns like Cape Cod and dreaming of a future drive through the Scottish Highlands
    to trace ancestral landscapes, all while balancing a modest travel budget with family responsibilities.
  culinary: Donna Patton excels at home cooking, often preparing family staples such as chicken pot pie, roast beef with rosemary potatoes, and apple crumble, enriching each dish with fresh herbs from her
    garden and treating herself to brunch at the beloved local diner’s eggs benedict on weekend mornings.
  core: Donna Patton balances a disciplined police career with a love for spontaneous garden projects, a habit of misplacing grocery lists, and an unwavering commitment to community safety.
background:
  cultural: Donna is a white, Mid‑Atlantic American who grew up in a small New Jersey town. Her family heritage traces back to English and Scottish roots, fostering a respect for tradition, community service,
    and modest self‑reliance. She was raised in a close‑knit, middle‑class environment where church gatherings, local sports events, and town festivals were regular fixtures. These experiences instilled
    a pragmatic outlook and a strong sense of civic duty, which she carries into her role as a police officer and community volunteer. Her cultural identity emphasizes family cohesion, respect for law and
    order, and an appreciation for the simple, familiar rhythms of small‑town life.
