  career_goals: Donna aims to advance within the department to the rank of sergeant and eventually lieutenant, focusing on building a more robust community‑relations unit. She plans to pursue a master's
    degree in criminal justice administration to broaden her strategic perspective. Long‑term, she envisions leading a regional training academy where she can blend her educational background with policing,
    developing curricula that emphasize practical problem‑solving and mental‑health awareness for officers. She also hopes to spearhead a neighborhood safety initiative that partners local schools, senior
    centers, and volunteer groups.
