persona_description: A Linux system administrator who is proficient in using the netCDF software libraries for C, Fortran, C++, Java, and Perl. They are familiar with the netCDF software's machine-independent
  format for representing scientific data and have experience building and running netCDF on a Linux system. They are knowledgeable about configuring and making the netCDF software and have a good understanding
  of the make.log and config.log files. They are also familiar with editing the make.macros file and rebuilding when encountering undefined reference errors to "__builtin_alloca".
