personas:
  professional: Kourtney Gelatt, a meticulous five‑year‑old, already practices organizational skills by arranging classroom blocks by color and size, dreaming of becoming a kindergarten teacher who will
    turn daily routines into fun learning stations, showing early signs of leadership and an insistence on tidy workspaces.
  sports: Kourtney Gelatt loves the rhythm of gymnastics class at the local YMCA, proudly wears her tiny Indianapolis Colts cap while cheering from the sidelines, and participates in the Osceola Cubs Little
    League team where she insists on lining up the baseball caps in alphabetical order before games.
  arts: Kourtney Gelatt is enchanted by the melodies of children's musician Raffi and the vibrant performances of the community theater’s seasonal production of "Peter Pan," often reenacting scenes in her
    bedroom while drawing detailed posters of the characters she admires.
  travel: 'Kourtney Gelatt dreams of revisiting her family’s annual county fair trips, where she delights in pumpkin patches and corn mazes, and she adds a bold wish to the family’s vacation list: a bright,
    colorful adventure to Walt Disney World to meet Mickey Mouse and explore the Magic Kingdom’s rides.'
  culinary: Kourtney Gelatt prefers classic kid‑friendly meals like cheesy macaroni, chicken nuggets with honey mustard, and apple pie slices topped with a sprinkle of cinnamon, and she enjoys helping her
    mother stir batter for pumpkin pancakes every Sunday morning, proudly arranging fruit slices into smiley faces on her plate.
  core: Kourtney Gelatt is a hyper‑organized five‑year‑old who balances a love for routine with bursts of creative play, obsessively lines up her toy cars but frequently forgets to brush her teeth before
    bedtime.
background:
  cultural: Kourtney was raised in a small-town Midwestern community in Osceola, Indiana, where family, church, and school are central. Her household follows typical Midwestern values of practicality, courtesy,
    and respect for tradition, celebrating holidays like Thanksgiving, Christmas, and local county fairs with familiar routines. The community's emphasis on punctuality, neatness, and cooperative spirit
    is reflected in her preference for order and her disciplined approach to daily activities.
attributes:
  skills: '["Follow multi-step routines","Organize toys and materials by type/color","Early literacy (recognizing sight words, reading simple sentences)","Basic counting and addition","Fine-motor skills
    (coloring, puzzle assembly, writing name)","Leadership in group play (assertive cooperation)"]'
  hobbies: '["Lego building","Jigsaw puzzles","Coloring books","Reading picture books","Watching educational TV","Playing at the park","Sticker collecting and organizing","Helping with household chores","Drawing
    patterns"]'
  career_goals: Kourtney often talks about becoming a teacher because she loves helping friends learn and enjoys keeping a classroom tidy and orderly. She also dreams of being a veterinarian, caring for
    animals she sees on family walks, and sometimes imagines a future as a police officer who helps keep her community safe and organized. Her overarching ambition is to be someone who can set clear plans,
    help others follow them, and be recognized for doing things the right way.
