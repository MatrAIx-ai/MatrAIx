    system)'']'
  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Mexican folk-dance workshops'', ''Cooking traditional Mexican dishes'', ''Photography'', ''Volunteering at local cultural festivals'',
    ''Gardening'', ''Reading contemporary fiction'', ''Traveling to explore new cultures'', ''Hosting neighborhood potlucks'']'
  career_goals: Priscilla aims to transition from a frontline clerk to a supervisory or community liaison position within the postal service, where she can mentor newer employees and shape customer-service
    policies. She is pursuing a certification in community arts management to blend her passion for the arts with her workplace experience, hoping to lead cultural outreach initiatives that bring local
    artists and residents together. In the longer term, she envisions launching a small online boutique that sells handcrafted Mexican-inspired goods, using her design skills and network of local artisans.
    Her ambition is to retire with a portfolio of community projects and a thriving side business that celebrates her heritage while providing financial independence.
