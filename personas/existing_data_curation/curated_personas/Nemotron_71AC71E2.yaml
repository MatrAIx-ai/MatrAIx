personas:
  professional: Danny Lamarre, a retired handyman turned community mentor, leverages their decades of carpentry, plumbing, and electrical troubleshooting skills to run practical home‑repair workshops and
    budgeting seminars for church members, organizing each event with meticulous checklists and a calm, reassuring demeanor.
  sports: Danny Lamarre, a devoted fan of the New Orleans Saints and LSU Tigers, spends weekends fishing in the bayous for catfish, joins a senior bowling league at the local community center, and participates
    in low‑impact water aerobics classes to stay active, all while cheering on their favorite teams from the bleachers.
  arts: Danny Lamarre, an avid lover of gospel legends like Mahalia Jackson, blues icons such as B.B. King, and soul powerhouse Aretha Franklin, frequently attends church music nights, dances at community
    socials, and volunteers as a backstage helper for the neighborhood theater's annual revue, letting their love of music and performance enrich every gathering.
  travel: Danny Lamarre, who savors weekend road trips along the Gulf Coast and plans annual visits to their grandchildren in Atlanta and Chicago, prefers traveling by car with a well‑packed cooler of homemade
    gumbo, avoids long flights due to arthritis, and meticulously maps out itineraries to keep each journey structured and stress‑free.
  culinary: Danny Lamarre, a seasoned home chef renowned for simmered gumbo, jambalaya, and crawfish étouffée spiced with paprika, cayenne, and thyme, delights family gatherings by hand‑crafting roux and
    serving fresh garden tomatoes, while occasionally over‑salting dishes when excited, a quirky habit they humorously acknowledge.
  core: Danny Lamarre, a meticulously organized 70‑year‑old community pillar, blends carpentry prowess, garden wisdom, and soulful love of gospel music with a constant undercurrent of worry that drives
    them to over‑plan every gathering, garden plot, and budget sheet.
background:
  cultural: Danny was born and raised in the Black community of Greenwell Springs, Louisiana, during the turbulent 1950s and 1960s. His upbringing was steeped in Southern African‑American traditions, including
    the deep influence of Baptist church life, gospel music, and communal gatherings. Family celebrations often featured Creole and Cajun cuisine, storytelling, and the observance of cultural holidays such
    as Juneteenth and Mardi Gras. The experience of the Civil Rights era shaped his strong sense of social responsibility and compassion for others. Over the years, he has remained connected to his roots
    through active participation in local churches, neighborhood clubs, and cultural festivals that celebrate the rich heritage of Black Louisianans.
