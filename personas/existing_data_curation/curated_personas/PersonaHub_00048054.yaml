persona_description: A researcher in climate modeling, particularly interested in the impact of precipitation and climate change on plant populations and ecosystems. They are skilled in soil water partitioning,
  plant responses to precipitation, and the modeling of vegetation and erosion. They have experience with spatially explicit vegetation models and are familiar with the state of plant population modeling
  in light of environmental change. They have a background in plant ecology, hydrology, and soil science, and are interested in the long-term forage production of North American shortgrass steppe.
