  career_goals: Marco aims to advance to a logistics supervisor role within the next three to five years, acquiring OSHA certification and an associate degree in Supply Chain Management. He aspires to lead
    a team that adopts data‑driven efficiency measures while integrating his passion for art by coordinating logistics for local art festivals and mural projects. Long‑term, he envisions launching his own
    moving and storage business that supports community cultural events and offers specialized services for art installations.
