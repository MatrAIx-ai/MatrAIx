  hobbies: '[''Fishing'', ''Hiking'', ''DIY home improvement'', ''Classic car restoration'', ''Cooking Puerto Rican cuisine'', ''Listening to salsa and bomba music'', ''Trade podcasts'', ''Chess'', ''Crossword
    puzzles'']'
  career_goals: Domingo aims to obtain his Master Plumber and Journeyman Steamfitter certifications within the next two years, then secure an Illinois contractor’s license to launch his own plumbing and
    pipefitting business focused on industrial and multi‑family projects in the Joliet‑Kendall County area. He seeks to become a recognized specialist in high‑pressure steam systems, win local trade awards,
    and eventually manage a small crew of skilled tradespeople while maintaining the financial stability needed for his growing family.
