personas:
  professional: Domingo Morales, a 34‑year‑old commercial and residential plumber‑pipefitter, blends methodical blueprint reading, MIG/TIG welding, and high‑pressure steam system expertise with a skeptical
    eye for shortcuts, positioning themselves to secure a Master Plumber certification and launch a contractor‑licensed business focused on industrial projects in the Joliet‑Kendall County area.
  sports: Domingo Morales spends early mornings casting on the Fox River for largemouth bass, hikes the Forest Preserve trails with a local Outdoor Enthusiasts Club, roots for the Chicago Bears while cheering
    on the Chicago Cubs during baseball season, and participates in a casual weekend softball league with fellow tradespeople.
  arts: Domingo Morales enriches downtime with salsa and bomba rhythms from legends like Celia Cruz and Héctor Lavoe, cracks open classic vinyl on a portable turntable while cooking, and occasionally solves
    crossword puzzles reminiscent of magazine Crosswords, showcasing a quiet yet competitive appreciation for rhythmic and linguistic arts.
  travel: Domingo Morales plans low‑key road trips in the restored 1965 Chevrolet, favoring fishing lodges in Michigan’s Upper Peninsula and scenic drives through Utah’s national parks, while keeping a
    tight travel budget that aligns with their goal of funding a future family home.
  culinary: Domingo Morales’s palate gravitates toward traditional Puerto Rican dishes like mofongo, arroz con gandules, and pernil, layering flavors with plantains, adobo, and sofrito, and they skillfully
    balance home‑cooked meals for the family with occasional indulgent barbecues after a long workweek.
  core: Domingo Morales is a pragmatic, curiosity‑driven tradesperson who channels solitary tinkering into high‑pressure steam expertise, guards a competitive edge in every DIY project, and juggles a disciplined
    budget while occasionally succumbing to tool hoarding.
background:
  cultural: Domingo’s Puerto Rican roots are a source of pride. He grew up in a bilingual household where Spanish and English were spoken interchangeably, and he celebrates cultural traditions such as Noche
    de San Juan, family gatherings centered around arroz con gandules and lechón, and listening to bomba y plena rhythms. Though he lives in the Midwest, he remains connected to the local Puerto Rican community
    through church events and occasional festivals, preserving a strong sense of family, resilience, and work ethic that influences both his personal life and professional demeanor.
attributes:
  skills: '[''Copper and PVC pipe installation'', ''Steel pipe welding (MIG/TIG)'', ''Pipe bending and fabrication'', ''Blueprint and schematic reading'', ''Hydrostatic pressure testing'', ''Industrial
