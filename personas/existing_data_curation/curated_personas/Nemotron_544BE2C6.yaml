personas:
  professional: Alex Weeks, a veteran automotive service technician with over three decades of hands‑on experience, blends methodical expertise in engine rebuilds and hybrid systems with a quiet leadership
    style, aiming to earn ASE Master Technician status and become a foreman who mentors apprentices while launching a family‑run repair shop in Newark.
  sports: Alex Weeks follows the New York Yankees and the New York Giants, participates in a local anglers’ club that meets at the Passaic River for weekend fishing, and occasionally joins a community bowling
    league.
  arts: Alex Weeks, a lifelong fan of Miles Davis, John Coltrane, Aretha Franklin and Otis Redding, fills his garage with smooth jazz and classic R&B while restoring cars, and occasionally attends live
    shows at the Newark Jazz House.
  travel: Alex Weeks prefers meticulously planned road trips to automotive events like the Detroit Auto Show and the National Corvette Museum in Bowling Green, enjoys weekend fishing getaways to the Jersey
    Shore and the Delaware Bay, and dreams of a future cruise along the Pacific Coast from San Diego to Seattle.
  culinary: Alex Weeks, an avid home chef, delights in preparing soul‑food staples such as fried chicken with a crispy buttermilk batter, collard greens seasoned with smoked paprika and garlic, buttery
    cornbread, and sweet‑potato pie topped with a drizzle of caramel sauce for their wife and grandchildren, often experimenting with fresh herbs and a splash of hot sauce.
  core: Alex Weeks merges a meticulous, curiosity‑driven mind with a quiet, community‑oriented heart, balancing the solitary art of classic‑car restoration with a deep sense of responsibility to family,
    apprentices, and personal health despite a tendency to worry.
background:
  cultural: Alex grew up in a close‑knit African‑American community in Newark, where church, family gatherings, and neighborhood block parties shaped his values of cooperation, respect, and resilience.
    He carries forward the legacy of his grandparents, who taught him the importance of hard work and mutual support. His cultural identity is reflected in his love for soul music, traditional cooking,
    and his commitment to mentoring the next generation through community programs. While navigating the challenges of limited formal education, Alex’s experience mirrors the broader story of perseverance
    and pride common among many Black families in urban New Jersey.
attributes:
  skills: '["Automotive diagnostics", "Engine overhaul and rebuild", "Transmission repair", "Brake system service", "Suspension and steering repair", "HVAC servicing", "Hybrid and electric‑vehicle maintenance",
    "Electrical wiring and sensor troubleshooting", "Customer communication and service estimates", "Inventory management", "Mentoring apprentices", "Tool calibration and maintenance"]'
  hobbies: '["Restoring classic cars", "Listening to jazz, soul, and classic R&B", "Reading automotive magazines and technical manuals", "Playing chess", "Weekend fishing trips", "Volunteering to teach
    basic car maintenance to youth", "Cooking soul food with family"]'
  career_goals: Alex aims to transition from a shop floor technician to a lead foreman role, overseeing a small team and ensuring quality standards are met. He hopes to obtain ASE Master Technician certification
    to formalize his expertise and increase his credibility with customers. Long‑term, he dreams of opening a modest, family‑run repair shop in Newark that emphasizes honest service and provides apprenticeship
    opportunities for local youth, giving back to the community while securing a stable, less stressful work schedule for his family.
