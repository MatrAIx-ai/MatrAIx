persona_description: A scientist or researcher who specializes in Earth observation, environmental science, or remote sensing. They are interested in monitoring and mapping the changing surface of the planet,
  particularly in regions affected by natural disasters or environmental changes. They are likely to be familiar with the Advanced Spaceborne Thermal Emission and Reflection Radiometer (ASTER) instrument,
  its capabilities, and its applications in surface mapping and monitoring of dynamic conditions and temporal change. They may also have an interest in using ASTER data for research in fields such as climate
  change, glacial and volcanic studies, crop stress monitoring, wetland evaluation, thermal pollution monitoring, and soil and geological temperature mapping.
