personas:
  professional: Lum Kotheimer has spent over a decade mastering retail operations in a bustling general‑goods store, using their routine‑focused mindset and competitive edge to consistently exceed sales
    targets while training new associates and handling cash and POS systems with swift precision.
  sports: Lum Kotheimer enjoys playing in the local Moniteau Softball League, cheering on the Kansas City Chiefs during NFL season, and spending Saturdays fishing at Moniteau Lake or hunting with longtime
    friends, while also supporting the nearby high‑school football team, the Moniteau Tigers.
  arts: Lum Kotheimer relaxes with classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd, binge‑watches sitcoms such as Cheers and The Andy Griffith Show, and occasionally attends community
    theater productions and the St. Louis Symphony’s classic concerts.
  travel: Lum Kotheimer prefers road‑trip getaways that blend outdoor adventure with budget‑friendly stops, having explored the Lake of the Ozarks for fishing, driven to Branson for a weekend show, and
    dreaming of a future family vacation to Yellowstone National Park.
  culinary: Lum Kotheimer’s culinary interests revolve around grilling—mastering smoked brisket, pork ribs, and fish tacos from their catches—while also enjoying a well‑seasoned coleslaw, cornbread, and
    the occasional dab of hot sauce, reflecting a practical yet enthusiastic approach to home‑cooked meals.
  core: Lum Kotheimer is a community‑oriented, routine‑driven 38‑year‑old whose competitive spirit fuels both work and recreation, even as worry and occasional disorganization sometimes shadow their otherwise
    pragmatic outlook.
background:
  cultural: Lum grew up in Moniteau County, a small‑town region of central Missouri with deep Midwestern roots. His family heritage includes German and Irish ancestry, typical of many white families in
    the area. Raised in a close‑knit, modest household, he was taught the values of hard work, reliability, and community service. He has been an active member of the First United Methodist Church since
    his teens, participating in church socials and volunteer events. Local traditions—like annual county fairs, church potlucks, and high‑school sports—have shaped his worldview, reinforcing a practical,
    family‑oriented outlook while fostering a love for routine and familiar social settings.
