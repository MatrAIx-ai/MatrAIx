  career_goals: Lum aims to move up from sales associate to store manager within the next two years, focusing on sharpening his leadership and organizational skills through community‑college management
    courses. In the longer term, he envisions becoming a district manager or opening a small, family‑run specialty shop that reflects his love for practical, everyday goods. His competitive drive pushes
    him to be the top performer in his region, while his desire for stability motivates him to secure a comfortable future for his wife and any children, including saving for a larger home and retirement.
    He also hopes to develop better stress‑management habits so that his worry does not interfere with his professional growth.
