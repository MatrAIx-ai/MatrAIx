personas:
  professional: Josiah Saffouri is a seasoned residential carpenter who leverages 25 years of framing, custom cabinetry, and fine-detail woodworking expertise, blending green-building practices and digital
    SketchUp designs with a curious, detail-obsessed mindset that drives their transition toward a boutique studio of sculptural furniture, and they balance meticulous organization with flexible creativity
    while assertively managing client expectations.
  sports: Josiah Saffouri hikes the Palisades cliffs each fall, is a member of the Hudson River Trails Club, plays pickup basketball on weekends while cheering for the New York Knicks, and follows the New
    York Giants and Yankees as their favorite professional sports teams.
  arts: Josiah Saffouri spends weekends sketching at the Met, attending gallery openings featuring emerging artists like Kehinde Wiley's studio, draws inspiration from folk-rock legends such as Bob Dylan
    and The Avett Brothers while playing acoustic guitar, and admires the work of Anselm Kiefer and Georgia O'Keeffe, integrating those visual and musical influences into their furniture designs.
  travel: Josiah Saffouri, who prefers meticulously planned trips, has explored Mediterranean culinary roots in Barcelona and Santorini, trekked the cliffs of Iceland's South Coast, and dreams of a future
    workshop tour in Kyoto, balancing their travel schedule around project deadlines and budgeting constraints.
  culinary: Josiah Saffouri, an adept home cook, blends their Mediterranean heritage with garden-fresh produce to craft dishes like grilled branzino with sumac, lamb tagine with preserved lemon, and shakshuka,
    while pairing each meal with a locally brewed craft IPA, showcasing their advanced cooking skills and love for bold flavors.
  core: Josiah Saffouri, a 45-year-old master carpenter and folk-rock guitarist, merges sustainable woodworking with artful living, constantly worries about project deadlines, yet they find calm in garden-grown
    vegetables and museum strolls.
background:
  cultural: Josiah grew up in a middle‑class suburban family of European descent with Mediterranean roots hinted by his surname. Raised in the New York‑New Jersey border region, he absorbed a mix of American
    work‑ethic values and the cultural diversity of Palisades Park, a community known for its Korean, Hispanic, and other immigrant populations. Family gatherings featured traditional American holidays
    alongside occasional Levantine dishes, giving him an appreciation for cross‑cultural flavors. His early exposure to his father's woodworking shop and his mother's love of museum trips nurtured his curiosity
    for both craft and art, shaping a worldview that values inclusivity, craftsmanship, and artistic exploration.
