  career_goals: Josiah aims to transition his solo carpentry practice into a boutique studio that blends functional craftsmanship with artistic expression. Over the next five years he plans to obtain a
    Certified Journeyman Contractor license, launch a limited‑edition line of sculptural furniture, and secure placements in local galleries and design showrooms. He also hopes to mentor apprentices, publish
    a quarterly blog on sustainable woodworking, and build a workflow that reduces his stress by delegating administrative tasks and incorporating regular mindfulness practices.
