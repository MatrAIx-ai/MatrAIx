  hobbies: '[''Watercolor painting'', ''Pottery'', ''Hiking'', ''Gardening'', ''Visiting art museums and galleries'', ''Reading neuroscience and historical fiction'', ''Volunteering at senior community
    center'', ''Attending local folk music festivals'']'
  career_goals: Marsha aims to transition into a leadership role that lets her shape community‑based rehabilitation programs in the Hudson Valley. She envisions creating a multidisciplinary hub where occupational
    therapy, visual arts, and mental‑health support intersect, offering workshops that help older adults use creativity to regain function and cope with stress. Additionally, she hopes to mentor the next
    generation of therapists through university adjunct teaching and develop a small research grant investigating the impact of art‑infused therapy on post‑stroke recovery. Balancing these ambitions with
    her desire for flexibility, she plans to reduce clinical hours gradually while maintaining a steady presence in her community.
