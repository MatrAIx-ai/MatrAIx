personas:
  professional: A curious budding explorer of natural worlds, Amanda Wigg blends her love for hiking the Blue Ridge Mountains with sketching and Scratch coding to document and animate the ecosystems she
    discovers, showcasing reliability and a collaborative spirit in school science projects.
  sports: A nature‑focused fitness enthusiast, Amanda Wigg hikes the Blue Ridge trails with the local Junior Hiking Club, cheers on the Carolina Hurricanes during the hockey season, and participates in
    a weekend after‑school soccer league with the Blue Ridge Kids FC.
  arts: A budding visual and musical creator, Amanda Wigg draws inspiration from folk legends like Old Crow Medicine Show and bluegrass virtuoso Molly Tuttle, while filling sketchbooks with watercolor landscapes
    and designing simple games on Scratch that echo the storytelling style of her favorite fantasy novels.
  travel: A curious little wanderer, Amanda Wigg has trekked the misty overlooks of Shenandoah National Park, dreams of exploring the ancient redwoods of California’s Redwood National Park, and looks forward
    to a family road trip to the historic cobblestone streets of Savannah, Georgia.
  culinary: A budding chef with a sweet tooth, Amanda Wigg loves whipping up peanut butter‑banana sandwiches, baking blueberry muffins with a pinch of cinnamon, and experimenting with fresh herbs like basil
    in simple pasta salads, though she often forgets to clean up the kitchen afterward.
  core: Ambitious, compassionate, and ever‑curious, Amanda Wigg blends mountain hikes, digital art, and animal‑shelter volunteering into a uniquely thoughtful ten‑year‑old outlook on life.
background:
  cultural: Amanda is a white American raised in a middle‑class family in Asheville, North Carolina. Her upbringing reflects Southern Appalachian cultural influences, including a respect for nature, an
    appreciation for folk music and crafts, and strong community ties. Family traditions such as Sunday meals, celebrations like Riverfest, and occasional visits to local farms nurture her love for the
    outdoors. The region’s vibrant arts scene, from galleries to community art workshops, encourages her curiosity and creative expression while the Appalachian emphasis on hospitality and cooperation shapes
    her compassionate and cooperative personality.
