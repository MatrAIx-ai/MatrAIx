  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Sketching and watercolor painting'', ''Reading fantasy novels'', ''Creating digital art with Scratch'', ''Playing piano'', ''Collecting and identifying
    local rocks and leaves'', ''Volunteering at the community animal shelter'', ''Solving puzzles and brain teasers'']'
  career_goals: Amanda dreams of combining her love for art and nature by becoming an environmental artist or wildlife conservationist. She imagines working as a park ranger or environmental educator in
    the Blue Ridge Mountains, where she can teach children about ecosystems through drawing and storytelling. She also hopes to one day design community art projects that raise awareness about protecting
    local habitats.
