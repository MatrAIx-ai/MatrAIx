personas:
  professional: Juan Gardner, a 55‑year‑old self‑taught visual artist, channels their expertise in oil, acrylic, and large‑scale mural design into public commissions that weave traditional folk motifs with
    Pacific Northwest scenery, while simultaneously coordinating community art festivals and leading weekend workshops at the local center.
  sports: Juan Gardner stays fit by hiking the Columbia River Gorge most weekends, joins a local cycling club for summer rides, hits the ski slopes at Mount Hood in winter, and roots for the Seattle Seahawks,
    Seattle Sounders FC, and Portland Trail Blazers, while they occasionally play casual soccer matches with the community center’s youth league.
  arts: Juan Gardner immerses themselves in the arts, they capture street life with a Canon EOS R5, draw inspiration from Edward Hopper’s urban scenes and Frida Kahlo’s vibrant storytelling, attend live
    shows by acoustic guitarist José González and norteño band Los Tigres del Norte, and regularly visit regional galleries featuring works by local painter Maya Smith and sculptor Anish Kapoor.
  travel: Juan Gardner prefers meticulously planned road trips that balance artistic exploration with natural scenery, having trekked the mural‑rich streets of Oaxaca, wandered the historic neighborhoods
    of Barcelona, and camped along the Pacific Coast of Oregon, while they dream of a future workshop retreat in the lavender fields of Provence.
  culinary: Juan Gardner boasts advanced cooking skills, regularly preparing homemade tamales with masa, pork fillings, and ancho chilies, simmering rich mole sauce with chocolate, peanuts, and pasilla
    peppers, and garnishing meals with fresh cilantro, lime, and heirloom corn, while they also enjoy occasional trips to farmers' markets for organic herbs and specialty chilies.
  core: Juan Gardner blends a disciplined studio practice with spontaneous hikes, a love for bold flavors and folk rhythms, and a knack for organizing community art events—though they sometimes procrastinate
    on paperwork and hoard an ever‑growing collection of sketchbooks.
background:
  cultural: Juan is a second‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English. His family maintains strong ties to Mexican traditions, celebrating holidays
    like Día de los Muertos, Cinco de Mayo, and Las Posadas with vibrant home décor and communal meals. These cultural motifs frequently appear in his artwork, where he blends Mexican iconography—such as
    sugar‑skull imagery and traditional patterns—with contemporary themes. Juan is active in Pasco's Hispanic community, participating in local cultural festivals, language exchange groups, and advocacy
    for Latino artists. His bicultural identity informs both his creative vision and his commitment to fostering cultural awareness through art.
attributes:
  skills: '[''oil painting'', ''acrylic painting'', ''large‑scale mural design'', ''mixed‑media collage'', ''illustration'', ''graphic design basics'', ''community art workshop facilitation'', ''public
