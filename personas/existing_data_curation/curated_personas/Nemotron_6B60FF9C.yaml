  hobbies: '[''hiking and plein‑air sketching'', ''cooking Mexican cuisine'', ''playing acoustic guitar'', ''attending art fairs and galleries'', ''street photography'', ''herb and chili gardening'', ''volunteering
    for community art workshops'', ''celebrating Día de los Muertos'']'
  career_goals: Juan aims to establish his own studio‑gallery in Pasco that doubles as a community hub for artists and cultural events. He seeks to secure multiple public mural commissions for schools and
    municipal buildings, integrating Mexican folk motifs with contemporary Pacific Northwest themes. He plans to launch a limited‑edition print series and explore interactive digital installations that
    blend traditional craftsmanship with modern technology. Additionally, Juan aspires to develop a mentorship program for at‑risk youth, offering art workshops and career guidance, and eventually publish
    a visual memoir that chronicles his artistic journey and cultural heritage.
