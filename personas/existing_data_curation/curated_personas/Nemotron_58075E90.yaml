personas:
  professional: Yamilet Cabrera, a 47‑year‑old bilingual community health enthusiast, blends their strong household management skills with a compassionate knack for teaching basic literacy, and is gearing
    up to launch a home‑based catering service while pursuing a certification in community health to work part‑time as a caregiver.
  sports: Yamilet Cabrera follows the Washington Commanders and the Washington Capitals avidly, participates in a community garden fitness walk along the York River each Saturday, and occasionally joins
    a local adult softball league, though they admit to skipping cardio on rainy days.
  arts: Yamilet Cabrera enjoys the soulful salsa of Celia Cruz, the folk guitar of Mercedes Sosa, and the storytelling films of Guillermo del Toro, while also attending local theater productions of classic
    plays like 'A Streetcar Named Desire' at the nearby community center, where they often discuss the narratives with fellow enthusiasts.
  travel: Yamilet Cabrera dreams of strolling the historic streets of Old Town Alexandria, hiking the misty trails of Shenandoah National Park, and revisiting the Caribbean island they visited as a child,
    balancing weekend getaways with a modest travel budget that prioritizes family visits.
  culinary: Yamilet Cabrera masters the art of crafting arepas, hallacas, and pabellón criollo—often swapping traditional pork for lean turkey and adding quinoa for extra protein—while their garden yields
    fresh cilantro, bell peppers, and tomatoes that flavor their dishes, and they occasionally experiment with fusion recipes like arepa tacos.
  core: Yamilet Cabrera is a caring, organized multitasker who channels their love for tradition into community health work, mindful cooking, and gentle worry‑driven perfectionism.
background:
  cultural: Born and raised in Venezuela, Yamilet carries a deep appreciation for the country's vibrant music, dance, and culinary traditions. She grew up in a close‑knit, Catholic family where communal
    meals and celebrations were central, fostering her love for hospitality and community building. After immigrating to the United States, she settled in Yorktown, VA, where she blends her Venezuelan roots
    with American customs, maintaining Spanish language use at home while engaging with the local community. Her cultural identity is expressed through sharing traditional dishes, participating in cultural
    festivals, and preserving family stories, all of which influence her values of kindness, cooperation, and harmony.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Household budgeting and financial planning'', ''Event coordination and community outreach'', ''Basic computer skills (Microsoft Office, email,
