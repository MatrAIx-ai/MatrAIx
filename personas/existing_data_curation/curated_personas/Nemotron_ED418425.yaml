  career_goals: Krishen aims to become a certified nursing assistant (CNA) within the next year and then enroll in an associate‑degree nursing (ADN) program at a community college. He is competitive and
    wants to graduate at the top of his class, securing a scholarship for a Bachelor of Science in Nursing. Long‑term, he aspires to work in a high‑intensity setting such as an emergency department or intensive
    care unit, and eventually move into a supervisory or unit‑manager role where he can shape care protocols and mentor new staff. He also dreams of giving back to the South‑Asian community in Maryland
    by organizing health‑education workshops and free screening events.
