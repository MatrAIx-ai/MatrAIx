personas:
  professional: Mariana is a seasoned housekeeping specialist with a meticulous eye for detail who leverages their humanities background to infuse aesthetic consulting into boutique cleaning services, navigating
    last‑minute client requests with spontaneous creativity, and they sometimes let deadlines slip due to their spontaneous nature.
  sports: Mariana follows the Buffalo Bills with weekend enthusiasm, supports the Sabres during hockey season, participates in community salsa dance classes as a cardio routine, enjoys brisk walks along
    the Erie Canal to stay active, and they relish the blend of team spirit and personal movement.
  arts: Mariana immerses themselves in Buffalo’s art scene by frequenting the Albright‑Knox Gallery, scouting street murals in Elmwood Village, and painting abstract watercolors inspired by island landscapes,
    drawing creative fuel from artists like Jackson Pollock and Yayoi Kusama, and they view each brushstroke as a dialogue between past and present.
  travel: Mariana prefers short getaways that balance cultural immersion and relaxation, often planning weekend trips to the Niagara Falls region, spontaneous day trips to upstate New York vineyards, and
    occasionally jetting to a Caribbean island to reconnect with familial cooking traditions, and they cherish the mix of adventure and homecoming.
  culinary: Mariana delights in preparing traditional island dishes like mofongo and arroz con gandules, skillfully seasoning with sofrito, plantains, and pork cracklings, while also experimenting with
    modern twists such as quinoa‑based arroz, often sharing meals at community festivals, and they consider cooking a form of artistic expression.
  core: Mariana blends an artistic soul with a pragmatic cleaning hustle, juggling spontaneous creativity, occasional disorganization, and a love for flavorful home‑cooked gatherings, and they often find
    themselves late to appointments when inspiration strikes.
background:
  cultural: Mariana’s Puerto Rican heritage is a central thread in her identity. Raised in a bilingual household, she grew up with the rhythms of bomba and plena music, the flavors of island cuisine, and
    the strong sense of family and community that characterizes Puerto Rican culture. Even after moving to Buffalo, she maintains close ties with the local Puerto Rican diaspora, attending annual celebrations
    like the Puerto Rican Parade and participating in cultural workshops at the community center. Her heritage influences her aesthetic sensibilities—she often incorporates vibrant colors and tropical motifs
    into her interior styling ideas. At the same time, living in Buffalo has exposed her to a blend of Northeastern American artistic traditions and the city’s growing multicultural arts scene, enriching
    her worldview and fueling her curiosity about diverse artistic expressions.
