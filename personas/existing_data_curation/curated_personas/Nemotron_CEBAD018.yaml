  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Abstract watercolor painting'', ''Cooking traditional Puerto Rican cuisine'', ''Salsa and bachata dancing'', ''Volunteering at community
    art events'', ''Walking along the Erie Canal'', ''Reading contemporary fiction'']'
  career_goals: Mariana aspires to grow her cleaning career into a boutique service that blends meticulous housekeeping with personalized interior aesthetic consulting, allowing her to express her appreciation
    for art while providing clients with uniquely styled homes. She hopes to eventually launch her own small business, hiring a team of similarly curious and flexible staff. Long‑term, she dreams of collaborating
    with local art galleries or community centers in Buffalo to organize workshops that teach residents how to care for and display artwork and cultural artifacts, leveraging her humanities background and
    love for community engagement.
