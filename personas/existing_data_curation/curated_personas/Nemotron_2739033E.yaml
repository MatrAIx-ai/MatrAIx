personas:
  professional: Trevor Waters, a budding mini‑architect who meticulously arranges wooden blocks into towering structures, balances curiosity about new shapes with a practical, methodical approach to stability
    by first sketching simple blueprints on paper, proudly shows off each completed design to anyone who watches, and they eagerly explain the design to their peers.
  sports: Trevor Waters, a lively toddler who joins the local Kids’ Soccer Club every Saturday morning, emulates the city’s professional soccer team the Mariners by practicing goal celebrations and shouting
    go team after scoring a pretend goal, and they love sprinting across the grass with boundless energy.
  arts: Trevor Waters, an enthusiastic picture‑book lover who delights in Eric Carle’s bold illustrations, sings the catchy Baby Shark chorus with gusto, and they often draw simple stick‑figure stories
    on crayon‑filled paper during quiet time.
  travel: Trevor Waters, who has explored the nearby zoo and the family’s beach cottage in Monterey, dreams of a future trip to the Grand Canyon’s vast vistas while preferring short car rides with frequent
    play breaks, and they eagerly point at maps, ask for stickers at each stop, and request extra snacks during journeys.
  culinary: Trevor Waters, who favors soft, mildly seasoned foods like mashed sweet potatoes, small pasta shapes, and banana slices, enjoys helping stir the pot with a plastic spoon, and they have a quirky
    habit of sprinkling extra cheddar cheese on every bite, even when it isn’t offered.
  core: Trevor Waters, a methodical yet energetic two‑year‑old who builds block towers, sorts coins, navigates toddler life with calm resilience, sociable charm, and occasional stubbornness over snack choices,
    and they always brighten the room with a bright smile.
background:
  cultural: Trevor was born into a White American family in Escondido, a suburban city in San Diego County, California. His household observes typical American traditions such as Thanksgiving, Fourth of
    July celebrations, and birthday parties, while also embracing the multicultural flavor of Southern California by participating in community events that feature Spanish language and Hispanic food. Regular
    visits to local parks, the beach, and the Escondido Library shape his early social environment. The family’s middle‑class values emphasize curiosity, self‑reliance, and community involvement, providing
    Trevor with a supportive setting that blends suburban American culture with the diverse influences of the broader San Diego region.
