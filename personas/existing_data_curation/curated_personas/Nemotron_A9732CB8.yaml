    service and relationship building'', ''Conflict resolution and assertiveness'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Exploring street murals and public art installations'', ''Salsa and bachata dancing'', ''Cooking and experimenting with Mexican cuisine'',
    ''Urban photography'', ''Yoga practice'', ''Volunteering at community cultural events'', ''Reading contemporary fiction and biographies'', ''Blogging about art and cultural trends'']'
  career_goals: Blanca aims to advance from receptionist to office manager within the next 2-3 years, pursuing a Certified Administrative Professional (CAP) credential and enrolling in a part-time MBA program
    focused on entrepreneurship. She envisions leveraging her business background and passion for the arts to eventually open a boutique cultural consultancy that helps small Latino-owned businesses and
    art venues with marketing and operations. In the short term, she seeks leadership opportunities in her current organization, such as supervising junior clerical staff, implementing streamlined workflow
    systems, and spearheading community-engagement events that blend business and artistic initiatives.
