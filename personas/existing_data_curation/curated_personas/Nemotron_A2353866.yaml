  hobbies: '[''watercolor painting'', ''museum and gallery visits'', ''historical fiction reading'', ''native plant gardening'', ''genealogy research'', ''birdwatching'', ''cooking Mediterranean cuisine'',
    ''volunteering at library'', ''small book clubs'']'
  career_goals: Suesan aims to channel her expertise into meaningful community contributions. She aspires to curate a local art exhibit that highlights under‑represented regional artists, mentor younger
    volunteers in museum and library settings, and complete a museum studies certificate to deepen her curatorial skills. Additionally, she hopes to write and self‑publish a memoir that weaves personal
    anecdotes with reflections on art and cultural history, and to offer occasional consulting to small nonprofit arts organizations seeking strategic planning and grant‑writing support.
