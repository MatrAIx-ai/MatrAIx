personas:
  professional: Suesan Norene, a seasoned community arts facilitator with a knack for grant writing and project planning, channels her meticulous organization and curiosity about art history into curating
    under‑represented local exhibitions and mentoring volunteer teams.
  sports: Suesan Norene enjoys low‑impact fitness through weekend birdwatching hikes with the Escondido Naturalists Club, attends weekly senior yoga sessions at the community center, cheers on the San Diego
    Padres during spring training, and occasionally joins a local senior softball league for social activity.
  arts: Suesan Norene, a practiced watercolorist, draws inspiration from Georgia O'Keeffe's Southwestern palettes and Monet's impressionist brushwork, volunteers as a docent at the Escondido Museum, participates
    in a Sunday book club discussing Hilary Mantel's novels, and curates photography exhibitions featuring works by contemporary local photographer Jenna M. Collins.
  travel: Suesan Norene prefers meticulously planned, low‑stress trips that blend art and history, such as her recent weekend pilgrimage to the Getty Villa in Los Angeles and a week‑long tour of the historic
    villages of Provence, while she dreams of a future solo journey to the Ottoman ruins of Istanbul and the art galleries of Florence, always booking economy seats and staying in boutique B&Bs to stretch
    her modest travel budget.
  culinary: Suesan Norene, an enthusiastic home chef, relishes preparing Mediterranean meals like grilled branzino with lemon‑oregano drizzle, homemade spinach and feta spanakopita, and aromatic chickpea
    falafel, often harvesting fresh basil and rosemary from her garden to flavor her dishes, while she occasionally indulges in a slice of tiramisu from her favorite downtown café.
  core: Suesan Norene balances a meticulously organized, curiosity‑driven approach to art and community service with a quirky habit of misplacing her reading glasses and overwatering her succulents, embodying
    a serene yet subtly stubborn spirit.
background:
  cultural: Suesan was raised in a middle‑class, Anglo‑American family in the Midwest before relocating to Southern California in her twenties. Her upbringing emphasized self‑reliance, community service,
    and respect for cultural traditions. Living in Escondido, she has embraced the region’s rich artistic and environmental heritage, blending a classic American work ethic with a deep appreciation for
    West Coast art, horticulture, and the multicultural fabric of the San Diego community.
attributes:
