  hobbies: '[''Hiking'', ''Motorcycle Restoration'', ''Playing Guitar (Classic Rock)'', ''Community Volunteering'', ''Online Strategy Gaming'']'
  career_goals: He aims to earn a professional certification in travel and tourism, progress to a senior ticketing supervisor role, eventually manage a branch of a travel agency or transportation company,
    broaden his expertise in logistics planning, and possibly launch his own niche travel service focusing on regional tours and heritage trips.
