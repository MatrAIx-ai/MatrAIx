persona_description: A health professional who is interested in antimicrobial resistance and its impact on global health. This person may be a physician, public health official, or researcher working in
  a low-income country. They are likely to be familiar with the challenges of combating antimicrobial resistance and the importance of adopting strategies such as combination therapy, rational prescription
  of medication, patient adherence to prescription regimen, strong regulatory mechanisms, and educational activities. This person may also be aware of the need for efficient laboratory-based surveillance
  of antimicrobial resistance and the role of national monitoring programmes in detecting the emergence and spread of resistant strains. They may be interested in participating in initiatives launched by
  the WHO Regional Office for Africa to combat the growing threat of AMR.
