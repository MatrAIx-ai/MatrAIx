  hobbies: '[''Karaoke singing'', ''Cooking Vietnamese cuisine'', ''Basketball'', ''Cultural festival volunteering'', ''Traveling'', ''Online gaming'', ''Music listening and concerts'', ''Movie watching'']'
  career_goals: Tuan aims to secure an entry‑level role in project coordination or community outreach where clear processes and predictable outcomes are valued. Over the next two years he plans to earn
    a certification in project management (e.g., CAPM) and leverage his organizational strengths to advance toward a supervisory position. He is motivated to build a stable career that allows him to support
    his family, give back to the local Vietnamese community, and continue developing his leadership and communication skills.
