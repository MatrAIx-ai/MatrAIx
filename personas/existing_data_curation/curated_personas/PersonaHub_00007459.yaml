persona_description: A metallurgist or someone with a deep understanding of the chemical and metallurgical processes involved in the production and use of steel and other metals. They are interested in
  the specifics of quenching, hardening, and the effects of different liquids and materials on the properties of steel. They are also knowledgeable about the history of steel production and development,
  including the differences in quality and processing between Japan and other regions, and the factors that led to the development of Japanese steels. They are likely to have a strong interest in the use
  of mercury or dragons blood in steel production, and are familiar with the advantages and disadvantages of different types of oils and liquids for quenching and hardening.
