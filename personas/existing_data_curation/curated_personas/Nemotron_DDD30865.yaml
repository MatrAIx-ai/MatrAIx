  hobbies: '["Art gallery visits", "Sketching and painting", "Contemporary literature", "Indie film screenings", "Yoga and meditation", "Indian-fusion cooking", "Traveling", "Finance and tech podcasts",
    "Puzzle solving", "Community cultural events"]'
  career_goals: Dhara aims to obtain her CPA license within the next two years and advance to a senior associate role at a Big Four firm, with a focus on ESG and sustainability audits. She envisions developing
    a niche in forensic accounting that blends her analytical rigor with her interest in the arts and creative industries. Over the next five to seven years, she hopes to become an audit manager, and eventually
    a partner or start her own boutique consultancy serving startups and cultural enterprises that require flexible, tech‑savvy financial services. She values a work environment that offers flexibility,
    remote‑work options, and opportunities for continuous learning.
