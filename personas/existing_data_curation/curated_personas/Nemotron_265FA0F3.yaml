    visual diagramming for patient instructions'', ''Team collaboration with PTs and physicians'', ''Adaptable problem‑solving in dynamic clinical settings'']'
  hobbies: '[''Abstract painting'', ''Sketching anatomical illustrations'', ''Playing the sitar'', ''Cooking experimental South Asian fusion cuisine'', ''Reading science fiction and philosophical literature'',
    ''Exploring VR and AR applications for rehabilitation'', ''Practicing yoga and meditation'', ''Playing chess'', ''Photography'', ''Attending small art gallery openings'', ''Participating in community
    cultural festivals'', ''Learning new languages (e.g., Mandarin)'']'
  career_goals: Sanjay aims to transition from a PTA to a licensed Physical Therapist by completing a bachelor’s degree and subsequently a Doctor of Physical Therapy (DPT) program. He is particularly drawn
    to specializing in sports medicine and neuro‑rehabilitation, where he can merge his competitive drive with cutting‑edge treatment approaches. Long‑term, he envisions establishing his own boutique rehabilitation
    clinic that incorporates artistic and technological innovations—such as VR‑enhanced motor retraining and customized visual therapy tools. Additionally, he aspires to become a clinical educator, sharing
    his unique blend of evidence‑based practice and creative problem‑solving with the next generation of therapists.
