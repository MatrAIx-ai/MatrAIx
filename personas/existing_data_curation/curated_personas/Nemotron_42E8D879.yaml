personas:
  professional: Gabriela Perez is a building inspector in the Pacific Northwest who expertly applies Oregon's building codes, drone‑assisted site surveys, and emerging sustainable practices, yet they often
    struggle to keep paperwork organized as they work toward a Certified Building Official credential within two years.
  sports: Gabriela Perez enjoys hiking the Willamette Valley foothills, participates in the local Willamette Trailblazers running club, and avidly follows the Portland Timbers and Trail Blazers, though
    they often skip workouts when stress piles up.
  arts: Gabriela Perez finds creative release listening to Lila Downs and Carlos Santana, attending performances at Portland Center Stage, and discussing modern architecture in a small book club focused
    on design, while they occasionally binge‑watch streaming series late into the night.
  travel: Gabriela Perez favors spontaneous weekend getaways to Columbia River Gorge, wine‑touring in the Willamette Valley, and occasional trips to Vancouver and Oaxaca, balancing limited vacation days
    with a love for both local nature and cultural immersion.
  culinary: Gabriela Perez loves cooking traditional mole and pozole using Oregon farm‑fresh corn, hazelnuts, and kale, experimenting with local salsa verde while they often burn the tortilla tops in a
    rush to finish meals before the next inspection.
  core: Gabriela Perez blends a practical, curiosity‑driven approach to building safety with a warm community spirit, a penchant for spontaneous DIY projects, and a persistent undercurrent of worry that
    fuels both meticulousness and occasional disorganization.
background:
  cultural: Gabriela’s Mexican heritage shapes many aspects of her life. Raised in a bilingual household, she fluently switches between Spanish and English, and she celebrates traditional holidays such
    as Día de los Muertos and Las Posadas with her extended family. The strong sense of community and respect for family taught her the value of helping others, which she carries into her work as an inspector.
    While she embraces the Pacific Northwest lifestyle—outdoor recreation and a love for fresh, local produce—she also preserves Mexican culinary traditions, often blending them with Oregon ingredients.
    This cultural blend informs her warm, cooperative demeanor and her desire to give back to both her professional and local communities.
attributes:
  skills: '[''Oregon building code knowledge'', ''Construction safety inspections'', ''Blueprint reading'', ''Structural assessment'', ''Mobile inspection software'', ''Drone site surveys'', ''Risk assessment'',
    ''Sustainable building practices'', ''Effective communication with contractors'', ''Problem‑solving under time pressure'']'
  hobbies: '[''Hiking'', ''Gardening'', ''DIY home‑improvement projects'', ''Cooking Mexican cuisine'', ''Yoga'', ''Meditation'', ''Listening to construction technology podcasts'', ''Reading architecture
    and design books'', ''Small‑group book club'', ''Photography of local landscapes'']'
  career_goals: Gabriela aims to earn her Certified Building Official (CBO) credential within the next two years and to become a senior inspector overseeing complex multifamily projects. She is interested
    in specializing in green building certification (LEED) and hopes to mentor junior inspectors, sharing her practical expertise while improving her own organizational skills. Long‑term, she envisions
    launching a boutique consulting firm that advises small contractors on code compliance and energy‑efficient construction, allowing her to blend her curiosity for new methods with a stable, community‑focused
    career.
