persona_description: A neuroscientist who studies the effects of blindness on memory and cognitive function. Zohary's team's research is focused on the memory improvement observed in blind individuals,
  which they speculate is due to practice and necessity. They are interested in the specific memory task of serial memory, which involves recalling long strings of words in the correct order from a word
  list. Their research is important for understanding the role of blindness in memory and cognitive development.
