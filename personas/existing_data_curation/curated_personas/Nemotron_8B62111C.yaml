personas:
  professional: Drew Harcum is an aspiring full‑time handyman entrepreneur who leverages solid practical skills in automotive repair, home maintenance, and basic electrical work, while balancing a structured,
    spreadsheet‑driven approach to job planning with a relaxed, flexible schedule that accommodates weekend hikes and surf outings.
  sports: Drew Harcum spends free time hiking the Santa Monica Mountains, catching early‑morning surf at Ventura Pier, cycling with the Ventura County Cycling Club, and cheering on the Los Angeles Dodgers,
    Lakers, and Galaxy, approaching fitness with a casual consistency that blends structured training with spontaneous outdoor sessions.
  arts: Drew Harcum relaxes by listening to classic rock icons such as Led Zeppelin, streaming indie films by Greta Gerwig, attending local pop‑up art exhibitions, and strategizing board games at the weekly
    Ventura Board‑Game Society meet‑up, allowing creative expression to punctuate their hands‑on lifestyle.
  travel: Drew Harcum favors spontaneous road trips in their 1978 Chevrolet, often heading north to Santa Barbara’s vineyards, south to Joshua Tree for stargazing, and dreaming of a future adventure to
    Oregon’s coastal rainforests, balancing a love for quick getaways with modest budgeting.
  culinary: Drew Harcum delights in grilling smoked tri‑tip, rosemary‑marinated chicken, and crafting home‑brew lagers, employing hickory chips and fresh herbs while maintaining a moderate cooking skill
    level that encourages frequent experimentation with new rubs and sauces.
  core: Drew Harcum is a practical‑yet‑easygoing handyman who blends vintage car tinkering, outdoor pursuits, disciplined budgeting, occasional health oversights, and a passion for classic rock and board
    games into a balanced, slightly disorganized lifestyle.
background:
  cultural: Drew grew up in the suburban‑rural fringe of Camarillo, a community rooted in agricultural and small‑town Californian traditions. His family reflects a typical White American background, with
    Anglo‑American ancestry and a modest middle‑class upbringing. Raised in a household that valued hard work, self‑reliance, and community involvement, he learned early on the importance of practical skills
    and neighborly cooperation. The local culture—characterized by a mix of agricultural heritage, growing suburban development, and a laid‑back Southern California lifestyle—shapes his preference for a
    balanced life of structured responsibilities and flexible leisure.
attributes:
