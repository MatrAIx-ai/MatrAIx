    self‑improvement)'', ''Board‑game meet‑ups'']'
  career_goals: He intends to transition from occasional odd‑jobs to a full‑time, self‑employed handyman business. Over the next two years he plans to earn a certification in HVAC or residential electrical
    work through a vocational program, which will give him both the credibility and the technical depth to secure consistent contracts. His ultimate ambition is to run a small, locally‑focused service that
    lets him set his own schedule, maintain a stable income, and continue enjoying his leisure time outdoors. He also hopes to eventually acquire a modest property where he can combine a workshop with a
    garden, blending his practical skills with a hands‑on lifestyle.
