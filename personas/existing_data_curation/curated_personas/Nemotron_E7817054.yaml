  hobbies: '[''visiting art museums and galleries'', ''drawing and digital illustration'', ''playing basketball'', ''building LEGO models'', ''exploring local parks'', ''Minecraft and creative video games'',
    ''reading graphic novels and sci‑fi comics'', ''listening to music (hip‑hop, jazz)'', ''drum practice'']'
  career_goals: Ishmail dreams of merging his love for art and technology. He hopes to attend a high‑school arts program or a specialized academy where he can study graphic design, animation, and game development,
    eventually becoming a multimedia storyteller who creates video games or graphic novels that explore new ideas. At the same time, he aims to develop his basketball skills enough to compete at the varsity
    level in high school. He wants to stay flexible, keep learning unconventional techniques, and someday use his platform to highlight diverse voices in the creative industry.
