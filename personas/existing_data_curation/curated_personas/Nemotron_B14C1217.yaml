  career_goals: Oscar aims to advance to a senior director or vice‑president role within the next five years, focusing on leading digital‑transformation initiatives that boost operational efficiency. He
    plans to earn an executive MBA to deepen his strategic and financial expertise, mentor emerging leaders, champion sustainable practices, and cultivate a culture of innovation that positions his organization
    as an industry benchmark for agile operations.
