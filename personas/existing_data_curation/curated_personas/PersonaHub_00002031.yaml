persona_description: A large corporation's human resources manager who is responsible for managing the company's defined benefit pension plans, including the calculation and distribution of benefits to
  employees. This person must be knowledgeable about the various types of defined benefit plans, including final salary plans, FAP plans, and traditional plans, and be able to interpret the benefits formulas
  used to determine pension payments. They must also be able to manage the pension plan's assets, including the calculation of the actuarial value of the plan, and be familiar with the regulatory requirements
  for funding and administration of pension plans. Additionally, they must be able to communicate effectively with employees, explain pension benefits and the company's pension strategy, and provide guidance
  on retirement planning.
