personas:
  professional: Sandra Rodriguez is a budding mini-architect who channels her love for structured creativity into building intricate LEGO models and solving jigsaw puzzles, demonstrating early spatial reasoning
    and a meticulous attention to detail that they proudly showcase in school projects.
  sports: Sandra Rodriguez is a dedicated member of the Minnehaha Youth Soccer League, thriving on the predictable rhythm of weekend drills, proudly wearing the team's green jersey while also cheering for
    the Minnesota Vikings in football and the Minnesota Twins during baseball season.
  arts: Sandra Rodriguez delights in coloring within the lines of picture books by Mo Willems, sketching vibrant scenes inspired by Dr. Seuss’s whimsical worlds, and dancing to the lively cumbia beats of
    Los Hermanos, which fuel their boundless imagination.
  travel: Sandra Rodriguez prefers family‑friendly day trips, reveling in nature walks through Minnehaha Park and visits to the nearby Minneapolis Zoo, while dreaming of one day exploring the magical attractions
    of Disney World in Orlando.
  culinary: Sandra Rodriguez enjoys helping her mother roll dough and stuff cheese‑filled corn empanadas, savors the sweet juiciness of mango slices, and often requests crunchy carrot sticks and sliced
    apples as side snacks, revealing an early palate for balanced flavors.
  core: Sandra Rodriguez blends a love for orderly creativity with spontaneous dance moves, hoards stickers in a secret stash, and never lets a puzzle piece go unmatched, even if it means staying up a few
    minutes past bedtime.
background:
  cultural: Sandra belongs to an Ecuadorian immigrant family that settled in Minneapolis. Spanish is spoken at home, and she is bilingual in Spanish and English. Her household celebrates Ecuadorian traditions
    such as Día de la Independencia, Carnaval, and the feast of the Virgin of the Immaculate Conception, often preparing foods like llapingachos, empanadas de queso, and quinoa soup. She participates in
    community events hosted by the local Ecuadorian cultural center, where she learns folk dances and hears traditional music like pasillo and cumbia. The blend of her family's South American heritage with
    the multicultural environment of Hennepin County gives her a rich, dual cultural perspective.
