  career_goals: Though still young, Sandra already envisions roles where she can help others and maintain order. She often says she wants to be a teacher because she enjoys reading stories to friends, organizing
    classroom activities, and providing a structured learning environment. She also expresses interest in becoming a veterinarian, combining her love for animals with her caring nature. These aspirations
    reflect her desire to contribute positively to her community while working in settings that value routine and responsibility.
