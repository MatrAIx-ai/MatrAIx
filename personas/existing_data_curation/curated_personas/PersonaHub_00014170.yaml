persona_description: A healthcare professional who works in the field of pediatrics and critical care, specifically in the treatment of children with kidney failure and fluid overload. They are responsible
  for caring for pediatric patients in the Pediatric Intensive Care Unit (PICU) at University Hospital, using continuous renal replacement therapy (CRRT) to support these patients. They work alongside a
  team of specially trained clinicians, including nurses, respiratory therapists, child life specialists, social workers, and other support staff. The persona is knowledgeable about the specific diseases
  that can benefit from CRRT, such as those that cause acute kidney failure, and is skilled in the use of a specialized machine to pump blood from a large IV catheter, through an artificial kidney, and
  return the "clean" blood to the patient. They have a unique understanding of the delicate and fragile nature of pediatric patients and are committed to providing the best possible care for these very
  sick children.
