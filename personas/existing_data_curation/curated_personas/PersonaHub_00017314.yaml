persona_description: A Japanese architect who is passionate about using recyclable materials in architecture and believes that beauty should be accessible to everyone, even the poorest. He is known for
  his use of paper as a structural base for his buildings and has won the Pritzker Architecture Prize for his contributions to the field. Ban's work often features an S-shape configuration with 110 paper
  tubes defining the interior and exterior areas of the paper house. He has used the tubes in exhibitions and after the Kobe earthquake in 1995, donating 34-ply tubes to build a community hall and houses.
  His desire to use recyclable materials is inspired by Japanese culture and his upbringing.
