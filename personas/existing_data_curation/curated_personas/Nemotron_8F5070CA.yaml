personas:
  professional: Emily Delgado, a bilingual early‑childhood educator in the New Haven district, leverages a STEM bachelor's foundation and fluency in Spanish and English to design inquiry‑based STEAM lessons
    using interactive whiteboards, coding toys, and digital storytelling, while their balance of meticulous organization and flexible responsiveness keeps the classroom both orderly and creatively alive.
  sports: Emily Delgado enjoys hiking the Connecticut Blue‑Blaze Trail on weekends, is a dedicated member of the New Haven Hiking Club, cheers on the New England Patriots and watches the Hartford Yard Goats
    during the baseball season, and they incorporate gentle yoga sessions at the local wellness studio into their routine to maintain flexibility and stress relief.
  arts: Emily Delgado finds inspiration in the vibrant murals by local artist Maria Kessler, the poetry of Maya Angelou, the music of Billie Eilish and the duet of Carlos Vives, and they regularly attend
    performances by the New Haven Ballet and the off‑Broadway production of Hamilton, weaving these artistic experiences into classroom storytelling and DIY craft activities.
  travel: Emily Delgado favors thoughtfully planned trips that blend cultural immersion and relaxation, such as weekend road‑trips to Mystic, CT, seasonal hikes in the Berkshires during autumn, and international
    journeys to Oaxaca, Mexico, and Lisbon, Portugal, while they balance a modest travel budget and occasional family obligations.
  culinary: Emily Delgado is an enthusiastic home cook who masterfully prepares traditional dishes like pepian, pupusas, and atol using fresh herbs from their garden—such as cilantro, epazote, and oregano—while
    they experiment with bold flavors like chipotle and cacao, displaying a moderate to advanced skill level and a penchant for sharing meals with friends and family.
  core: Emily Delgado merges bilingual STEAM teaching with nature‑centered creativity, managing anxiety through mindfulness while they passionately cook, garden, and build community connections, all guided
    by a pragmatic yet curious spirit.
background:
  cultural: Emily is a first‑generation American; her parents immigrated from Guatemala and raised her in a bilingual household where Spanish was spoken daily. She grew up celebrating Guatemalan traditions
    such as Día de los Muertos, Semana Santa, and family quinceañeras, which instilled a strong sense of community and respect for heritage. The values of family loyalty, hospitality, and collective well‑being
    are central to her identity. In her classroom, she weaves Guatemalan folklore, music, and stories into lesson plans, and she actively participates in a local Guatemalan community organization in New
    Haven that offers cultural workshops and language support. These cultural ties enrich her teaching philosophy, encouraging her to create inclusive, culturally responsive learning environments.
attributes:
  skills: '["Early childhood education", "STEM/STEAM curriculum design", "Bilingual instruction (Spanish/English)", "Classroom management", "Formative child assessment", "Educational technology integration",
    "Lesson planning and curriculum alignment", "Differentiated instruction", "Parent and community communication", "Collaborative team facilitation"]'
  hobbies: '["Cooking Guatemalan cuisine", "Gardening native herbs and flowers", "Hiking Connecticut trails", "Reading multicultural children’s books", "Practicing yoga and mindfulness meditation", "Journaling
    about teaching experiences", "Volunteering at Spanish‑language cultural events", "DIY crafts and recycled‑material science projects with kids"]'
  career_goals: Emily aspires to become a lead teacher and eventually a curriculum specialist who shapes district‑wide bilingual STEM programs for preschoolers. She plans to earn a master’s degree in early
    childhood education with a focus on inclusive practices and special‑needs support. Long‑term, she hopes to develop culturally responsive teaching materials that celebrate Guatemalan heritage, mentor
    new teachers, and possibly open a community learning center that offers after‑school STEM enrichment for families of diverse backgrounds in the New Haven area.
