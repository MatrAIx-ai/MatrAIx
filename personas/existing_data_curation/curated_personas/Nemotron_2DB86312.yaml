  hobbies: '[''building blocks'', ''drawing'', ''singing nursery rhymes'', ''playing soccer'', "participating in children''s choir", ''reading picture books about community helpers'']'
  career_goals: Vincent loves helping others and being part of a team, so he often says he wants to be a firefighter or a teacher when he grows up. He is also fascinated by animals and sometimes imagines
    working at a zoo. His ambitions are shaped by his desire for a clear, practical role where he can use his routine-keeping skills to keep people safe and organized.
