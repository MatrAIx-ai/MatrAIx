personas:
  professional: Karola Greenleaf, a seasoned carpenter with a decade of residential framing and custom cabinetry experience, leverages meticulous joinery expertise and a routine‑driven work ethic while
    thriving on the collaborative, flexible project schedules that let them nurture client relationships and ensure safety on site.
  sports: Karola Greenleaf enjoys weekend hikes on Lick Creek Trail, cheers for the St. Louis Cardinals and St. Louis Blues, and participates in a local adult softball league, blending low‑impact cardio
    with casual team sports that fit their routine‑oriented yet flexible fitness style.
  arts: Karola Greenleaf finds inspiration in folk and country legends like Gillian Welch, Johnny Cash, and the local band The Pickers, attends regional craft fairs where they admire handmade ceramics,
    and spends evenings listening to storytelling ballads while sketching future furniture designs, letting music shape their creative process.
  travel: Karola Greenleaf favors a balanced travel style that mixes well‑planned road trips to nearby destinations like the Ozark National Forest and St. Louis’ Gateway Arch with spontaneous weekend getaways
    to Asheville’s art‑filled neighborhoods, always budgeting for affordable lodging and fuel to keep the adventures within their modest savings.
  culinary: Karola Greenleaf loves cooking hearty Midwestern fare such as beef stew, chicken pot pie, and cornbread, often tossing in home‑grown carrots, potatoes, and thyme from their garden, and while
    they excel at comforting family meals, they sometimes over‑salt dishes in a rush before a work shift.
  core: Karola Greenleaf blends a steadfast love for routine woodworking with a friendly, cooperative spirit, yet their habit of leaving tools scattered and occasional back‑ache reminders keep them grounded
    in both the craft and its quirks.
background:
  cultural: Karola grew up in a white, middle‑class family in St. Charles County, Missouri, where the community values practicality, self‑reliance and neighborly cooperation. Her grandparents were of German
    descent, a heritage that fostered an early respect for craftsmanship and seasonal traditions like community harvest festivals. A local public high school with a robust woodshop program gave her the
    formal introduction to carpentry, reinforcing the Midwestern work ethic of doing things well and reliably. Regular attendance at her town’s Methodist church and participation in neighborhood events
    have reinforced a sense of communal responsibility and modesty that continues to shape her outlook and daily routines.
attributes:
  skills: '[''Residential framing'', ''Finish carpentry'', ''Custom cabinetry'', ''Blueprint reading'', ''Power tool operation'', ''Wood joinery (mortise‑and‑tenon, dovetail, biscuit)'', ''Staining and
    finishing'', ''Team collaboration'', ''Client communication'']'
  hobbies: '[''Small woodworking projects (garden benches, antique repair)'', ''Vegetable gardening'', ''Cooking traditional Midwestern recipes'', ''Listening to folk and country music'', ''Hiking local
    trails'', ''Reading DIY and woodworking magazines'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Karola aims to become a master carpenter and eventually launch a small, family‑run workshop in the Wentzville area that specializes in high‑quality, custom furniture for local homes. She
    plans to join the Missouri Carpenters Union to gain access to advanced training and mentorship opportunities, and she hopes to mentor apprentices who share her appreciation for practical, hands‑on work.
    Over the next five years, she intends to build a stable client base for independent contracting, expand her skill set to include eco‑friendly building practices, and possibly teach weekend woodworking
    courses at the local community center.
