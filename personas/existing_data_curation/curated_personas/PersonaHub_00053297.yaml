persona_description: A professional climate scientist who is dedicated to conducting interdisciplinary research on climate and natural resources in collaboration with other departments in the School of
  Natural Resources and with the North Dakota Field Station, a research and monitoring unit of the U.S. Geological Survey. The climate scientist is responsible for publishing research results in journals,
  the State Climate Office's World Wide Web page, and the media. They also offer undergraduate and graduate courses refining the "Atmospheric Science" in North Dakota State University and provide high-quality
  database for use in classroom activities. The climate scientist interacts with K-12, community colleges teachers and students, and with other community organizations on different aspects of North Dakota
  climate. They provide information and analysis of ongoing climate events and interact with local, state and national officials and media as conditions warrant. The climate scientist also assists local,
  state and national agencies in climate-environment interaction issues such as Drought Response/Mitigation Plan and related application. They interact with other scientists by integrating climate information
  into applications such as agricultural and environmental models. The climate scientist increases public awareness of variations in North Dakota climate and environment and develops an advanced World Wide
  Web site for access to North Dakota-related climate information. The climate scientist responds to phone, e-mail and fax inquiries in a timely fashion.
