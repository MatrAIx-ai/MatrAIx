  hobbies: '[''Pickup basketball'', ''Church choir'', ''Weekend BBQs'', ''Vinyl record collecting'', ''Fishing'', ''Cooking club'', ''Community food drives'']'
  career_goals: Clarence aims to earn his Certified Culinarian credential within the next year and secure a head‑chef position at a reputable local restaurant. Long‑term, he dreams of opening a modest,
    family‑style eatery in Valdosta that highlights traditional Southern comfort dishes while offering catering for community events. He is motivated to mentor aspiring cooks, build a reputation for dependable
    quality, and achieve the financial stability needed to support his family and give back to his community.
