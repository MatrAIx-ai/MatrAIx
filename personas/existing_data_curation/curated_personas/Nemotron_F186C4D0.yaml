personas:
  professional: Cody Fournier, a 57‑year‑old teaching assistant in art history and digital humanities, blends analytical rigor with creative flexibility to design interdisciplinary curricula, meticulously
    curates multimedia archives, and leverages a competitive streak to deliver evidence‑based, unconventional lectures that earn high student evaluations.
  sports: Cody Fournier, a long‑time Chicago Cubs enthusiast, hikes the McHenry County nature preserves each weekend with the local Trail Hikers club, occasionally joins a senior‑friendly pick‑up basketball
    league at the community center, and follows the Chicago Bears during the NFL season.
  arts: Cody Fournier, an oil‑and‑watercolor painter of Illinois countryside scenes, an architectural photographer, and a regular attendee of jazz at the Green Mill and chamber concerts by the St. Paul
    String Quartet, draws inspiration from modernist composers like Miles Davis and visual artists such as Marina Abramović while composing poetry influenced by Wallace Stevens.
  travel: Cody Fournier, a methodical planner who prefers low‑key cultural excursions, has visited Florence’s Uffizi, explored Quebec City’s historic Old Town, and dreams of a road trip along the Upper
    Peninsula’s lighthouses, all while budgeting trips to stay within a modest savings target.
  culinary: Cody Fournier, an intermediate home cook, favors Midwest comfort dishes like pork tenderloin with apple‑cider glaze, crafts fresh salads with heirloom tomatoes, goat cheese, and toasted walnuts,
    and occasionally treats themselves to seared ahi tuna with wasabi‑soy glaze at a local bistro.
  core: Cody Fournier, a solitary, art‑driven academic who balances disciplined budgeting with a competitive drive for grants, a habit of late‑night oil painting, and an over‑reliance on espresso to power
    manuscript revisions.
background:
  cultural: Cody is a second‑generation American of French‑Canadian descent, raised in the suburban Midwest. His family’s roots trace back to Québec, and he grew up hearing stories of French cultural traditions
    while living in the modest, community‑focused environment of Crystal Lake, Illinois. Midwestern values of practicality, self‑reliance, and modesty shaped his work ethic, while frequent trips to the
    Art Institute of Chicago and regional galleries nurtured a deep appreciation for both European and American art. This blend of French‑Canadian heritage and Midwestern upbringing informs his aesthetic
    sensibility, his respect for cultural institutions, and his commitment to sharing art with his local community.
