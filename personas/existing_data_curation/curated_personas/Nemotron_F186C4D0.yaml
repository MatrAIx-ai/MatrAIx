  hobbies: '[''Oil painting'', ''Watercolor painting'', ''Landscape photography'', ''Reading art theory and philosophy'', ''Writing poetry and essays'', ''Hiking in McHenry County nature preserves'', ''Woodworking
    and carpentry'', ''Playing chess'', ''Volunteer docent at regional museum'', ''Attending small live music performances (jazz, chamber music)'']'
  career_goals: Cody aims to transition from his current teaching‑assistant role to a tenure‑track faculty position in art history or digital humanities within the next five years. He plans to publish a
    monograph on contemporary Midwestern visual culture and to secure a research grant that will fund an interdisciplinary course blending art, technology, and critical theory. He also aspires to curate
    a regional exhibition that highlights the Great Lakes artistic heritage and to develop a community‑based art outreach program that brings workshops and lectures to local schools and senior centers.
    Competitive in nature, Cody seeks to win a university teaching award and to position himself as a leading scholar in his department, while mentoring emerging students and fostering a collaborative yet
    ambitious academic environment.
