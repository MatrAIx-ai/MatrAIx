persona_description: A human rights advocate and specialist in the field of women's rights, focusing on the issues of violence against women, sexual and reproductive health and rights, and the rights of
  girl children and adolescent girls. They are committed to strengthening the use of human rights instruments and women's human rights mechanisms to enhance women's advocacy and have organized a series
  of workshops and consultations in Asia, Latin America, and the Middle East to produce submissions for the upcoming thematic report on sexual and reproductive health and rights in times of crisis and insecurity
  by the Working Group on discrimination against women and girls.
