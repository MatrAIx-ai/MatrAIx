  hobbies: '[''Soccer'', ''LEGO building'', ''Educational video gaming'', ''Comic book reading'', ''Science club activities'', ''Hip‑hop dancing'', ''Bike riding'', ''Strategic board games'']'
  career_goals: Kenyatta dreams of becoming an astronaut or a STEM engineer who designs rockets, inspired by his love of space and building things. He also imagines leading a community sports team, hoping
    to be a captain who uses his practical problem‑solving skills to help teammates. While he is confident about his ambitions, he sometimes worries about competition and wants to prove himself in both
    academic and athletic arenas.
