personas:
  professional: Kenyatta Butler, a budding young technologist, merges a love for LEGO construction with early coding skills, channeling their practical curiosity and competitive streak into leading mini
    science club projects, even if their relaxed approach to planning sometimes leaves them scrambling for missing pieces.
  sports: Kenyatta Butler, a spirited member of the Eastside Youth Soccer Club, idolizes Manchester United’s midfield play and the LA Galaxy’s dynamic style, spends afternoons dribbling on the neighborhood
    field, occasionally skips homework to squeeze extra practice, and channels their competitive edge into friendly matches while cheering for the New York Knicks during basketball season.
  arts: Kenyatta Butler, an avid comic‑book collector of Spider‑Man and Batman, grooves to Kendrick Lamar and Lizzo at family gatherings, recreates favorite movie scenes with LEGO minifigures, and mimics
    popular YouTube science presenters for fun, revealing their outgoing energy and a habit of humming tunes while building.
  travel: Kenyatta Butler, who loves family trips that blend adventure and learning, fondly recalls a recent visit to the Kennedy Space Center, dreams of exploring Japan’s Ghibli Museum, prefers itineraries
    that prioritize hands‑on museum exhibits over rigid schedules, and often worries about missing the last bus, reflecting a flexible yet anxious travel style.
  culinary: Kenyatta Butler, who enjoys cheesy pepperoni pizza, chicken nuggets with honey‑mustard dip, and crafts LEGO‑shaped fruit salads from strawberries, bananas, and grapes, occasionally snacks on
    sugary cereal late at night, and proudly boasts his ability to perfectly butter toast, showcasing a love for comfort foods mixed with a mild lack of dietary discipline.
  core: Kenyatta Butler is a curiosity‑driven, competitive eight‑year‑old who builds LEGO kingdoms, writes simple game code, and charges the soccer field, yet often misplaces homework and frets over small
    setbacks, turning stress into a relentless push to win.
background:
  cultural: Kenyatta grows up in a close‑knit African‑American family in Topeka, Kansas. Family gatherings often revolve around church choirs, soul‑food meals, and storytelling about Black heritage and
    local history. He participates in community programs offered by the Kansas African American Museum and the local recreation center, where he learns about civil‑rights history and enjoys basketball leagues
    with peers. The neighborhood’s emphasis on resilience, community support, and pride in cultural traditions shapes his worldview and fuels his desire to succeed.
