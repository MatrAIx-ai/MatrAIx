personas:
  professional: Trinh Trieu is a seasoned highway maintenance specialist with over twenty years of experience operating heavy equipment, planning traffic control, and ensuring compliance with safety standards,
    and they bring a practical, compassionate leadership style that values predictable schedules and crew harmony.
  sports: Trinh Trieu is an avid supporter of the university's football team and the local professional basketball squad, participates in a weekend adult softball league, enjoys occasional surf sessions
    at Waianae Beach for fitness, and incorporates daily shoreline walks into their routine to stay active.
  arts: Trinh Trieu actively engages in community cultural festivals, spends evenings crocheting blankets, practices traditional embroidery patterns learned from family elders, enjoys listening to classic
    singers like Trịnh Công Sơn and local Hawaiian musicians, and attends the monthly art walk at the Honolulu Museum of Art.
  travel: Trinh Trieu prefers well‑planned trips that blend family reunions on the mainland with short island getaways to lesser‑known spots like Lanai’s Hulopoe Bay, values itineraries that include cultural
    sites such as Haleakalā sunrise tours, and balances travel costs with a modest vacation fund saved each year.
  culinary: Trinh Trieu loves preparing steaming bowls of phở that incorporate locally sourced taro and fresh herbs, rolls crispy bánh xèo using coconut milk from a nearby farm, ferments kim chi in a home‑made
    crock, and delights in experimenting with pineapple‑glazed fish tacos that marry heritage flavors with island ingredients.
  core: Trinh Trieu balances a structured, hands‑on career in highway maintenance with a nurturing home life, weaving community service, cultural traditions, and a love of gardening into daily routines,
    even while occasionally forgetting to water the garden during busy weeks.
background:
  cultural: Trinh is a second‑generation Vietnamese American whose family arrived in Hawaii in the early 1970s as refugees after the Vietnam War. Raised in Waianae, she grew up speaking Vietnamese at home
    while attending public schools, giving her a bicultural perspective that blends the values of her heritage—family loyalty, respect for elders, and a spirit of perseverance—with the communal ohana ethos
    of Hawaiian culture. She celebrates Tet (Lunar New Year) with her extended family, prepares traditional foods, and joins local Vietnamese community gatherings, while also participating in Hawaiian traditions
    such as Aloha Friday, beach clean‑ups, and church services that emphasize community service. This dual cultural identity informs her compassionate approach to work and her commitment to fostering harmony
    both on the highway crews she leads and in the broader Waianae neighborhood.
attributes:
  skills: '[''Heavy machinery operation (asphalt paver, roller, backhoe, compactor)'', ''Road surface repair and patching'', ''Traffic control planning and safety compliance'', ''Preventive maintenance
    scheduling'', ''Basic civil‑engineering surveying and drainage inspection'', ''Equipment maintenance and troubleshooting'', ''OSHA and first‑aid certification'', ''Bilingual communication (English‑Vietnamese)'',
    ''Team coordination and mentoring'', ''Use of maintenance management software'']'
  hobbies: '[''Gardening (tropical herbs, taro, flowers)'', ''Traditional Vietnamese cooking'', ''Beach walks and shell collecting'', ''Community volunteer clean‑up events'', ''Crocheting and Vietnamese
    embroidery'', ''Crafting leis for celebrations'', ''Attending cultural festivals'', ''Reading Hawaiian labor history'', ''Fishing with husband'']'
  career_goals: Looking ahead, Trinh aims to step into a supervisory role within the highway maintenance division, such as crew foreman or safety officer, where she can apply her extensive field knowledge
    to guide younger staff and improve safety protocols. She plans to obtain the State of Hawaii Highway Maintenance Supervisor certification and to complete advanced training in pavement management and
    sustainable repair techniques. Trinh is also passionate about promoting greater representation of women and minorities in the trades, so she hopes to mentor apprentices and collaborate with local vocational
    programs. In the longer term, she envisions contributing to community‑focused infrastructure projects that enhance pedestrian safety and incorporate environmentally friendly materials, while maintaining
    a balanced work schedule that supports her family.
