personas:
  professional: A hospitality management aspirant Amitabh Shahriar, pursuing a Business Administration degree with a focus on hospitality, blends his frontline experience with OPERA software, deftly orchestrates
    small community events, and leverages his competitive, structured mindset to streamline front‑desk operations while occasionally juggling disorganized schedules.
  sports: A sports‑enthusiast Amitabh Shahriar joins the Sarasota Bulls pickup basketball crew and Sarasota FC’s casual soccer matches, follows the Miami Heat and Florida Gators, and treats fitness as a
    competitive outlet, though they occasionally skip workouts for marathon gaming sessions.
  arts: An arts‑loving Amitabh Shahriar participates in a university Indian dance troupe, choreographs performances to Bollywood hits and contemporary pop tracks by Ariana Grande and Travis Scott, curates
    Instagram reels of simple Canva graphics, and enjoys binge‑watching movies starring Priyanka Chopra, channeling their sociable energy into creative collaborations.
  travel: A travel‑curious Amitabh Shahriar prefers weekend road trips to Florida’s beaches like Siesta Key and nature trails at Myakka River State Park, relishes occasional city escapes to New York and
    Chicago for concerts, and dreams of attending a cultural festival in Singapore once finances allow, balancing spontaneity with a modest student budget.
  culinary: A culinary hobbyist Amitabh Shahriar experiments with aromatic biryani, buttery chicken, and paneer tikka, perfects mango lassi using fresh mangoes and cardamom, frequently spices up guacamole
    with cumin for a cultural twist, and shares the results on social media despite occasional over‑salting and burned naan.
  core: A concise portrait of Amitabh Shahriar portrays a competitive gamer, aspiring hospitality manager, and cultural event planner who balances structured ambition with spontaneous social energy, all
    while wrestling with occasional anxiety and a penchant for late‑night gaming marathons.
background:
  cultural: Amitabh is a second‑generation South Asian American; his parents emigrated from India (Gujarati‑speaking) in the early 2000s. He grew up in a bilingual household where Hindi and Gujarati were
    spoken alongside English. Family gatherings are centered around traditional celebrations such as Diwali, Holi, and Navratri, featuring homemade sweets, rangoli art, and cultural performances. He regularly
    attends the local India Cultural Center in Sarasota, where he connects with other diaspora youth. While he values his heritage—evident in his love for Indian cuisine, music, and cinema—he also embraces
    the Floridian lifestyle, blending the two cultures in his social circles and community involvement.
attributes:
  skills: '["Bilingual communication (English/Hindi)", "Basic Spanish", "Customer service", "Front‑desk and hospitality software (OPERA)", "Social‑media content creation", "Graphic design (Canva)", "Community
    event planning", "Strategic negotiation", "Quick decision‑making under pressure", "Basic troubleshooting (hardware/software)"]'
  hobbies: '["Pickup basketball", "Pickup soccer", "Indian dance troupe", "Cooking South Asian cuisine", "Competitive online gaming (MOBAs, tactical shooters)", "Game streaming", "Volunteering at community
    festivals", "Hiking and beach outings", "Listening to Bollywood and contemporary music"]'
  career_goals: In the short term, Amitabh aims to transfer his associate’s degree into a bachelor’s program in Business Administration with a focus on Hospitality Management. He hopes to secure a part‑time
    role as a front‑desk associate at a local hotel or resort to gain hands‑on experience. Long‑term, he envisions rising to a regional manager position within a major hotel chain, leveraging his leadership,
    customer‑service expertise, and ability to create structured yet adaptable operational procedures. Parallel to this, he is interested in launching a side‑business that offers culturally themed event
    planning services for the South Asian community in Sarasota, combining his sociable nature with his competitive drive to grow a profitable niche venture.
