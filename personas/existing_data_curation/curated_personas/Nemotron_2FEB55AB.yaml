  hobbies: '[''Reading science-fiction novels'',''Scratch visual programming projects'',''Digital sketching and illustration'',''Competitive online multiplayer gaming (e.g., Fortnite)'',''Jogging in local
    parks'',''Listening to hip-hop and R&B music'',''Volunteering at the community library'',''DIY electronics and gadget disassembly'']'
  career_goals: Francesca's immediate goal is to earn her GED within the next year. She plans to enroll in a vocational program for aircraft-maintenance technology at a nearby community college, building
    on her mechanical curiosity and practical mindset. Parallel to that, she wants to develop her digital illustration skills into a freelance side business, creating custom artwork for social media and
    local merchandise. Long-term, she aspires to secure a stable, well-paid technical role—such as an aircraft technician or IT support specialist—while maintaining the flexibility to pursue independent
    creative projects. Her ambition is driven by a desire for financial independence, self-sufficiency, and to serve as a positive role model for younger members of her community.
