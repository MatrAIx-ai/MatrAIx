personas:
  professional: Francesca Harris is a budding aircraft‑maintenance technician‑in‑training who leverages her hands‑on mechanical talent, entry‑level web design skills, and disciplined organization to lead
    small‑group projects at her community coding club, while her competitive streak drives meticulous attention to detail in both hardware troubleshooting and digital illustration commissions.
  sports: Francesca Harris enjoys early‑morning jogs through the local park, participates in the Warner Robins Youth Track Club for 5K training, and enthusiastically follows the Atlanta Falcons, Atlanta
    Hawks, and Atlanta Braves, while maintaining a casual membership at the community gym to improve core strength.
  arts: Francesca Harris blends her love for hip‑hop legends Kendrick Lamar and Anderson . Paak with a digital illustration style inspired by Beeple, crafting vibrant sketches that accompany her short stories
    while attending local poetry slams featuring spoken‑word artists like Sarah Kay.
  travel: Francesca Harris prefers low‑key, spreadsheet‑planned trips, having explored Savannah’s historic squares and the Smithsonian museums in Washington, D.C., while dreaming of a solo adventure to
    the aerospace museums of Toulouse, France, and the street‑food markets of Tokyo, balancing modest savings with occasional family‑sponsored weekend getaways.
  culinary: Francesca Harris favors Southern comfort meals—crispy fried chicken seasoned with paprika, buttery collard greens cooked with smoked turkey, and peach cobbler—while also experimenting with quick
    ramen bowls spiced with sriracha and grated ginger, showcasing a cooking skill that mixes confident family recipes with exploratory microwave hacks.
  core: Francesca Harris is a pragmatic yet imaginative teen who ditches schoolwork for late‑night gaming marathons, obsessively disassembles gadgets for fun, and sometimes forgets to eat or sleep, all
    while maintaining a steadfast drive toward financial independence and community leadership.
background:
  cultural: Francesca was raised in a close-knit African-American family in Warner Robins, where church and community bonds are central. Her grandparents instilled a strong sense of perseverance and pride
    in Black Southern traditions—weekly choir rehearsals, soulful cooking, and storytelling about the civil-rights era. Local events such as Juneteenth celebrations, neighborhood barbecues, and the county
    library's annual Black History Month showcase have shaped her cultural identity. While navigating broader social challenges, she draws confidence from the resilience of her community and the support
    of peers in a neighborhood youth mentorship program. This cultural foundation influences her values of self-reliance, communal responsibility, and the importance of education and creative expression.
attributes:
