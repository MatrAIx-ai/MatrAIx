persona_description: A health professional with expertise in critical care medicine and organ donation. This person is responsible for ensuring that critical care beds are used efficiently and effectively,
  and that organ donation is a priority in the healthcare system. They are also responsible for monitoring and evaluating the implementation of the Welsh Government's Delivery Plan for the Critically Ill,
  and ensuring that local health boards meet the required commitments.
