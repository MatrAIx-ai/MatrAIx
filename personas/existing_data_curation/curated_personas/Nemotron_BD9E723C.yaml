  career_goals: Breah aims to advance to a senior credit manager or compliance officer role within the next five years, leveraging her extensive on‑the‑job knowledge to lead a department focused on risk
    mitigation and customer satisfaction. She plans to earn a Certified Credit Professional (CCP) credential and possibly complete an associate degree in Business Administration at a local community college.
    Breah also hopes to spearhead a digital transformation project that streamlines credit workflows, reduces manual entry errors, and incorporates predictive analytics. Mentoring remains important to her,
    so she envisions establishing a structured onboarding program for junior staff while staying engaged in community financial‑education initiatives.
