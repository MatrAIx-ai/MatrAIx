  career_goals: Bethsaida’s long‑term ambition is to work in a field where creativity and cultural expression intersect. She dreams of becoming a visual artist or graphic designer who can blend Dominican
    artistic traditions with contemporary digital media. She is also intrigued by curating community art programs that give other kids a platform to explore their heritage. In the meantime, she aims to
    refine her artistic techniques, deepen her coding skills, and pursue a high‑school focus on art and technology, ultimately preparing for a college degree in illustration, multimedia design, or cultural
    studies.
