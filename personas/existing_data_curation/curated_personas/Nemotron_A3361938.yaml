personas:
  professional: Bethsaida Rivera is an aspiring digital storyteller who combines her curiosity and organization to create animated narratives on Scratch, applying her drawing skill, watercolor experiments,
    and a knack for weaving scientific concepts into compelling visual stories.
  sports: Bethsaida Rivera cycles the neighborhood streets after school, participates in the Riverside Rovers youth soccer club, and passionately roots for the New York Knicks and the Dominican Republic
    national baseball team, blending active play with fandom.
  arts: Bethsaida Rivera channels her love for graphic novels and Latin rhythms into her art, drawing inspiration from comic creators Jeff Smith, Studio Ghibli’s Hayao Miyazaki, and colorist Artgerm while
    dancing to the beats of Romeo Santos, Bad Bunny, and Ariana Grande, turning community festival booths into vibrant showcases.
  travel: Bethsaida Rivera enjoys weekend trips to the nearby state park for biking and picnics, has visited Washington, D.C.’s National Air and Space Museum with her class, dreams of exploring the Galápagos
    Islands, and eagerly anticipates a family vacation to a Caribbean beach resort.
  culinary: Bethsaida Rivera loves cooking simple dishes like plátanos maduros, cheese‑filled empanadas, and whipped mango‑coconut smoothies, confidently handling ripe plantains, fresh cilantro, and coconut
    milk, while also experimenting with homemade pizza topped with mozzarella and basil.
  core: Bethsaida Rivera is an inquisitive 11‑year‑old who blends artistic flair with scientific curiosity, habitually doodles in the margins of school notes, sometimes forgets to finish chores while day‑dreaming
    about space, and balances disciplined savings with occasional splurges on art supplies.
background:
  cultural: Bethsaida is a first‑generation Dominican American raised in Antioch, Tennessee. Her household blends Dominican customs—such as celebrating Día de la Independencia, preparing traditional meals
    like arroz con pollo, and speaking Spanish at home—with the lifestyle of the broader American South. Her parents emphasize respect for family, community involvement, and the value of education, which
    is reflected in her bilingual fluency and pride in her Caribbean roots. She regularly attends Dominican cultural events at local churches and community centers, where she experiences music, dance, and
    storytelling that reinforce her heritage. At the same time, she participates in typical Southern school activities and enjoys the diverse cultural mosaic of Nashville, giving her a multifaceted sense
    of identity.
