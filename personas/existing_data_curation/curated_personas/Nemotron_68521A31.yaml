  career_goals: Although retired from formal employment, Kelsey aims to become a leading advocate for the arts within her town. She plans to curate a series of neighborhood exhibitions that spotlight emerging
    local artists, mentor younger participants, and write a memoir that intertwines her personal journey with reflections on art and community. She also aspires to travel to major museums and cultural sites
    across the United States and Europe to broaden her perspective, while continuing to manage her household finances prudently and develop strategies to mitigate stress and maintain mental well‑being.
