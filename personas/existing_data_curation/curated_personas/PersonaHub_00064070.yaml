persona_description: A scientist who studies complex systems and natural disasters, particularly the feedback loops that cause mass extinctions and the potential for complex systems to become more resilient
  in the face of such events. This person is interested in the implications of the End Permian event and the potential for biological diversity to collapse, leading to a period of carbon chaos. They are
  also interested in the potential for complex systems to become more resilient and the role of complexity in maintaining biological diversity.
