persona_description: The study was conducted by a researcher who is interested in the implementation of instructional teaching strategies in teaching English to multilevel classroom at UPB (Unit Pengembangan
  Bahasa) to bidikmisi students who take English course as compulsory subject at STAIN Curup. The researcher aims to find out the condition and teaching strategy for multilevel classroom and collect data
  by interviewing the tutors and students to get the real answer of the situation in teaching English in Multilevel classroom. The researcher is likely to have a background in English teaching and linguistics,
  and have experience in conducting qualitative research. They are likely to have a strong interest in multilevel education and the use of instructional teaching strategies in teaching English.
