  career_goals: Kenneth is focused on advancing to senior leadership roles within a technology‑driven or manufacturing organization. His short‑term goal is to become a Senior Operations Manager overseeing
    multi‑site operations, while his long‑term ambition is to earn a Vice President of Operations or General Manager position where he can shape company‑wide strategic initiatives, drive measurable efficiency
    gains, and mentor the next generation of managers. He seeks opportunities that reward tangible performance outcomes and provide clear pathways for upward mobility.
