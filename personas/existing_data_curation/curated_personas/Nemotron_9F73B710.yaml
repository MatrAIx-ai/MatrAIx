  hobbies: '[''Organic gardening'', ''Reading historical romance and self‑help books'', ''Crocheting and embroidery'', ''Listening to bomba and plena music'', ''Hiking in the Lares hills'', ''Participating
    in a small book club'', ''Family genealogy research'']'
  career_goals: Leah envisions turning her love for cooking and crafts into a modest home‑based business that allows her to work flexible hours and stay close to family. She aims to develop a line of ready‑to‑heat
    Puerto Rican meals and handcrafted home décor items sold through local markets and online platforms. To support this, she plans to take a short community college course in small business management
    and digital marketing, but she wants to keep the learning pace relaxed to avoid overwhelming stress. A secondary goal is to become a certified caregiver for the elderly, enabling her to support aging
    relatives while contributing to her community's well‑being.
