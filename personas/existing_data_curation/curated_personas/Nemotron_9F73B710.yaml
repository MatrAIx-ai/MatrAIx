personas:
  professional: Leah Gonzalezortiz, a 36-year-old home-based culinary and craft entrepreneur-in-training, leverages her practical budgeting savvy, organic coffee-plant gardening, and crochet expertise to
    develop ready-to-heat Puerto Rican meals and handcrafted décor while taking a relaxed, curiosity-driven approach to her community college studies in small-business management.
  sports: Leah Gonzalezortiz finds quiet fitness on the hills surrounding their hometown, often hiking the Lares-Escambrón trail and occasionally joining a local amateur softball league, while cheering
    for the Cangrejeros de Santurce during baseball season and supporting the Puerto Rico national basketball team.
  arts: Leah Gonzalezortiz weaves colorful blankets while listening to classic bomba and plena tracks by Plena Libre and Bomba Estéreo, devours historical romance novels by Nora Roberts and self-help guides
    by Brené Brown, and attends the annual Festival de la Bomba y la Plena, where they feel a deep connection to the rhythm of their community.
  travel: Leah Gonzalezortiz prefers low-key, purpose-driven trips, having explored Old San Juan’s historic plazas, the coffee farms of Antigua, Guatemala, and dreaming of a pilgrimage to the cacao plantations
    of Ecuador, all while balancing travel expenses with their careful budgeting and family responsibilities.
  culinary: Leah Gonzalezortiz excels at crafting traditional dishes such as mofongo, arroz con gandules, and pasteles, infusing them with home-grown rosemary and medicinal herbs, and delights in brewing
    strong café con leche from their own coffee beans, while also perfecting sweet treats like tembleque and alcapurrias for local market fairs.
  core: Leah Gonzalezortiz, 36, turns quiet curiosity and modest entrepreneurial ambition into a blend of home-cooked Puerto Rican meals and crochet art, all while juggling anxiety-fueled worries and a
    love for solitary garden reflections.
background:
  cultural: Leah’s cultural identity is rooted in the rural traditions of Lares, a town known for its historic role in Puerto Rico’s independence movements and its coffee‑planting heritage. She grew up
    immersed in the island’s blend of Spanish, African, and Taíno influences, celebrating fiestas patronales with callejoneadas, plena rhythms, and communal cooking. Family meals feature dishes passed down
    through generations, and the practice of sharing homemade pastries during “dia de la cosecha” remains a cherished ritual. The Catholic faith, infused with folk saints’ devotions, shapes many of her
    holidays and community gatherings. Leah values the close‑knit nature of her neighborhood, where neighbors exchange produce, stories, and support, reflecting a collective resilience that resonates deeply
    with her personal sense of responsibility and compassion.
attributes:
  skills: '[''Traditional Puerto Rican cooking'', ''Household budgeting'', ''Small‑scale organic gardening'', ''Crochet and embroidery'', ''Basic computer literacy (email, social media, online banking)'',
