personas:
  professional: Candis Hamby is a meticulous medical billing coordinator who blends deep knowledge of coding standards with an eagerness to adopt new billing software, acting as a dependable liaison between
    providers and patients while steadily charting a path toward a senior supervisory role.
  sports: Candis Hamby enjoys weekend hikes along White Clay Creek State Park trails, participates in the Northern Delaware Trail Runners club for occasional 5K races, and roots for the Philadelphia Eagles,
    the Baltimore Ravens, and the Washington Wizards during NFL and NBA seasons.
  arts: Candis Hamby nurtures a love for historical fiction from authors like Hilary Mantel, captures sunrise landscapes reminiscent of Winslow Homer with a DSLR, and attends performances by the Delaware
    Theatre Company and occasional jazz sessions featuring John Mayer covers.
  travel: Candis Hamby favors a blend of short road trips to Shenandoah National Park and cultural excursions to New York City museums, while daydreaming about a journey to the rugged Atlantic coast of
    the British Isles, where stone cottages and harbor towns echo the historic seafaring stories shared in community gatherings, balancing careful budgeting with a desire for immersive experiences.
  culinary: Candis Hamby bakes artisan sourdough loaves and rosemary focaccia, whips up pumpkin cheesecake for Thanksgiving, and revels in seasonal salads featuring heirloom tomatoes, fresh basil, and locally
    sourced honey, though they sometimes over‑proof dough when distracted by a new novel.
  core: Candis Hamby is a detail‑oriented billing analyst who meticulously plans finances, hikes for balance, indulges in artisanal baking, and occasionally lets a novel or a migraine delay a scheduled
    appointment, reflecting a pragmatic yet curiously restless spirit.
background:
  cultural: Candis grew up in a middle‑class, white family in the Mid‑Atlantic region, with roots traced to English and Irish ancestors who settled in the Delaware area generations ago. Her upbringing was
    shaped by the suburban culture of New Castle County, where community events, local history, and seasonal celebrations such as Thanksgiving, Fourth of July fireworks, and Christmas were central. She
    attended a public high school that emphasized practical education and civic involvement, and she remains connected to her community through church activities and volunteer work. The regional values
    of reliability, modesty, and a balanced work‑life ethic influence her outlook and daily routines.
attributes:
  skills: '[''Medical billing and coding (ICD‑10, CPT)'', ''Accounts receivable and payable processing'', ''General ledger posting and journal entry management'', ''Financial statement reconciliation'',
    ''Proficiency with billing software (Epic, Cerner, Meditech)'', ''Experience with ERP systems (SAP, Oracle)'', ''Advanced Microsoft Excel (pivot tables, VLOOKUP, macros)'', ''HIPAA compliance and data
    privacy'', ''Customer service and stakeholder communication'', ''Problem‑solving and claim resolution'', ''Time management and task prioritization'', ''Data entry accuracy and quality control'']'
  hobbies: '[''Reading (historical fiction, finance, health policy)'', ''Hiking (White Clay Creek State Park, local trails)'', ''Gardening (vegetables, herbs)'', ''Baking (artisan breads, seasonal desserts)'',
    ''Book club participation'', ''Wine‑tasting with friends'', ''Volunteering at community food bank'', ''Nature photography'']'
  career_goals: Candis aims to leverage her associate degree and on‑the‑job experience to become a senior billing supervisor within the next three to five years. She plans to enroll in a bachelor’s program
    in health information management or business administration, and to obtain professional certifications such as the Certified Professional Biller (CPB) and Certified Coding Specialist (CCS). Her long‑term
    ambition is to lead a billing department that integrates automation tools, improves revenue cycle efficiency, and mentors junior staff, while maintaining a work‑life balance that supports her family.
