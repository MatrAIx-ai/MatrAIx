persona_description: A geographer who specializes in studying the effects of climate change on river systems and flood management. The person is interested in the latest modeling studies on the Fraser River
  and the potential for multiple dike failures in the event of a flood. They are concerned about the reliability of the hydrometric monitoring network and the potential economic losses from a return of
  historic flood levels. The person is also interested in the lack of federal or provincial funding for flood management and the need for a comprehensive strategy to address the issue.
