  hobbies: '[''Gardening'', ''Church choir singing'', ''Bridge'', ''Reading historical fiction'', ''Cooking'', ''Food bank volunteering'', ''Community event planning'', ''Traveling for family reunions'',
    ''Genealogy research'', ''Dance classes'']'
  career_goals: Although retired from full‑time teaching, Lisa is determined to stay active in education and community life. She plans to launch a neighborhood tutoring program for elementary students,
    mentor pre‑service teachers through a structured apprenticeship model, and author a reflective memoir about her career and the evolution of Black education in Texas. She also seeks a board position
    at the local community center to advocate for literacy initiatives and senior wellness programs. Driven by her competitive spirit, she aims to win a regional senior bridge tournament and to earn recognition
    in local garden contests. Maintaining her health, traveling with her husband to historic African‑American sites, and strengthening family ties remain personal priorities.
