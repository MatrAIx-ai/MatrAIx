personas:
  professional: Lisa Carlton, a retired elementary educator with three decades of curriculum development experience, channels their methodical planning and mentorship skills into launching a neighborhood
    tutoring program, guiding pre‑service teachers, authoring a memoir on education history, and advocating for literacy initiatives as a board member of the community center.
  sports: Lisa Carlton, who stays active through low‑impact exercise, regularly competes in senior bridge tournaments at the community center, attends weekly dance classes to maintain energy, and cheerfully
    supports the local professional baseball team, the Texas Rangers, as a seasonal fan.
  arts: Lisa Carlton, who sings in the church choir on Sundays, delights in performing classic gospel hymns, admires the vocal stylings of renowned gospel singers and the poetic storytelling of celebrated
    American authors, and frequently attends community theater productions of classic dramas.
  travel: Lisa Carlton, who balances family commitments with a love for historical exploration, prefers meticulously planned trips to family reunions and visits to civil‑rights museums and historic sites
    across the southern United States, while occasionally joining guided tours of national parks to blend leisure with learning.
  culinary: Lisa Carlton, who specializes in home‑style Southern cooking, expertly prepares dishes like collard greens seasoned with smoked turkey, sweet potato pie, and tomato‑based gumbo, enjoys experimenting
    with fresh herbs harvested from their garden, and often hosts potlucks featuring cornbread and peach cobbler.
  core: Lisa Carlton, a 71‑year‑old former teacher, merges a competitive, organized mindset with a love for gardening, bridge, choir, and community service, while occasionally indulging in impulsive seed
    purchases that strain their modest budget.
background:
  cultural: Lisa grew up in a close‑knit African‑American community in Fort Bend County, Texas, where the Black church, Southern hospitality, and a strong emphasis on education shaped her upbringing. Family
    gatherings centered around soul‑food cooking, storytelling, and gospel music, reinforcing values of resilience, service, and pride in heritage. Her cultural identity is reflected in her commitment to
    community service, love for gospel singing, and dedication to preserving family history, while also navigating the broader Texan cultural landscape.
attributes:
