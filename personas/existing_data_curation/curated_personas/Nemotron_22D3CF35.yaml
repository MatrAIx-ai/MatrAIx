personas:
  professional: Brian Hartsell, a retired small-business financial manager from the oil and gas sector, leverages their meticulous bookkeeping and strategic planning skills to mentor high-school students
    in financial literacy and coordinate heritage art exhibitions, all while applying their methodical, skeptical yet curious nature to ensure every detail is accounted for.
  sports: Brian Hartsell enjoys low-impact fitness through weekend fishing trips on Lake Travis, occasional walks on Hill Country trails, and remains a devoted fan of the Dallas Cowboys and the Texas Rangers,
    while belonging to a local senior golf club where they play a modest 18-hole round each spring.
  arts: Brian Hartsell spends their free afternoons at the Blanton Museum, dissecting works by Georgia O'Keeffe and Edward Hopper, while their playlist features classic rock icons like Creedence Clearwater
    Revival and Lynyrd Skynyrd, and they occasionally sketch their own charcoal landscapes inspired by the Hill Country light.
  travel: Brian Hartsell prefers meticulously planned road trips that combine history and nature, having logged visits to the Alamo in San Antonio, the blue-bonnet fields of Ennis, and dreaming of a relaxed
    cultural tour of Florence, Italy, all while budgeting their travel within a modest retirement allowance.
  culinary: Brian Hartsell relishes classic Texas barbecue, expertly smoking a brisket seasoned with paprika, brown sugar, and mesquite wood chips, while their cooking skill hovers at confident amateur—
    they can whip up a smooth pecan pie crust but still rely on a trusty cast-iron skillet for their favorite chili con carne.
  core: Brian Hartsell is a meticulous, curiosity-driven retiree who balances a love for order and solitary hobbies with a relentless worry about the future, often channeling their skepticism into careful
    planning and occasional over-indulgence in smoky barbecue.
background:
  cultural: Brian grew up in a middle‑class, Protestant family in central Texas, absorbing a blend of traditional Texan values—self‑reliance, community service, patriotism, and a love for barbecue and country
    music. His white ethnic background situates him within the broader Southern cultural milieu, yet his lifelong curiosity has led him to appreciate diverse artistic expressions and to engage respectfully
    with the multicultural fabric of modern Texas.
