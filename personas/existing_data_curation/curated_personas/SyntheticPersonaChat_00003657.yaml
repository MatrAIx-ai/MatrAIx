    User 2: That''s a tough question. I''d have to say either Mario Odyssey or Zelda: Breath of the Wild.

    User 1: Those are both great games! I''ve played both of them and loved them.

    User 2: Me too! They''re both so much fun.

    User 1: It''s nice to meet someone who loves video games as much as I do.

    User 2: Same here! It''s always nice to meet a fellow gamer.

    User 1: So, what do you think of this weather?

