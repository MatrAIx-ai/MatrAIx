  hobbies: '[''Community choir'', ''Line dancing'', ''Gardening'', ''Baking and cooking'', ''Knitting'', ''Volunteering at senior center'', ''Reading mystery novels'', ''Nature walks'', ''Birdwatching'']'
  career_goals: Linda aims to transition from a front‑line cashier role to a supervisory position within the next two years, targeting a shift‑lead or assistant manager role where she can apply her organizational
    strengths and mentor newer employees. She plans to enroll in a short retail‑management certification program offered at a nearby community college to strengthen her leadership credentials. As she approaches
    retirement age, Linda also hopes to secure a flexible part‑time schedule that allows her to devote more time to community volunteering, particularly coordinating events for the local senior center.
    Financially, she is focused on building a modest retirement nest‑egg while maintaining a stable income through her current employment.
