personas:
  professional: Juan Larice is an aspiring junior game developer who translates his love for strategy video games and meticulous LEGO building into carefully structured Scratch projects, and they apply
    their preference for predictability and reliability to meet school coding assignments on time.
  sports: Juan Larice thrives on the soccer field playing midfield for the Falcons FC youth league, idolizes the Los Angeles FC in the MLS, spends weekend evenings honing tricks at the community park with
    the SkateStars crew, and they balance competitive drive with a structured warm‑up routine that keeps their fitness on track.
  arts: Juan Larice channels creative energy by building intricate LEGO Architecture models, designing puzzle‑heavy Scratch games inspired by titles like Portal 2, and they unwind while blasting Bad Bunny,
    J Balvin, and Rosalía on a Bluetooth speaker, which together shape a vibrant, rhythm‑driven artistic identity.
  travel: Juan Larice prefers well‑planned weekend getaways, often routing family trips to nearby attractions like the Grand Canyon and Disneyland, while dreaming of an adventurous summer excursion to Mexico
    City’s historic center, and they demonstrate a mix of structured itineraries and a craving for new cultural experiences despite a modest allowance.
  culinary: Juan Larice enjoys assisting in the kitchen to prepare family staples such as tacos al pastor with pineapple, fresh guacamole with cilantro and lime, and hearty chilaquiles, and they approach
    cooking with the same methodical precision they use for LEGO instructions, often measuring ingredients to the exact gram and experimenting with extra cheese on pizza for a flavorful twist.
  core: Juan Larice is a detail‑oriented teen who balances a love for structured LEGO builds and strategic gaming with a spontaneous habit of checking their phone every few minutes, occasionally forgetting
    to stretch after skateboarding, and they hoard baseball cards in a meticulously labeled binder.
background:
  cultural: Juan is a second‑generation Mexican‑American raised in San Antonio’s predominantly Hispanic Westside. His family maintains strong ties to their Mexican heritage; they speak Spanish at home,
    celebrate Día de los Muertos, Cinco de Mayo, and the city’s annual Fiesta San Antonio. He attends a bilingual charter school that supports both English and Spanish instruction. The community’s emphasis
    on family, respect for elders, and collective support influences his values and daily life. Catholic traditions and neighborhood gatherings also shape his cultural identity. He enjoys Mexican cuisine
    such as tacos al pastor and participates in Hispanic cultural programs like baile folklórico classes.
