  career_goals: Juan aims to graduate high school with solid grades, particularly in STEM subjects, and enroll in a vocational program for automotive technology or mechanical engineering. He envisions working
    at a reputable auto repair shop in San Antonio, earning a certification as an automotive technician, and eventually opening his own garage to support his family. Additionally, he hopes to earn a soccer
    scholarship by playing at the collegiate level, using his athletic discipline as a pathway to further education.
