persona_description: A sports coach who specializes in Olympic lifts, particularly the pull-up and clean and jerk. They are known for their expertise in identifying and correcting the common faults that
  hinder the success of these lifts. They emphasize the importance of starting the lift off smoothly and controlling the movement to avoid compromising body positions. They are also known for their emphasis
  on the importance of hitting the proper positions in the first phase of the lift, and their belief that hitting the proper positions is more important than trying to come off of the floor fast.
