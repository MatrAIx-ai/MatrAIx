  career_goals: Francisco aspires to progress from his current sales role to a store management position within the next three to five years, aiming to oversee daily operations, lead a team, and drive sales
    performance. He is also interested in pursuing a retail management certification or associate degree to formalize his expertise. Long‑term, he dreams of opening a small family‑run boutique or a community‑focused
    grocery shop that blends his retail experience with his cultural heritage, providing a space for local Mexican‑American products and community events.
