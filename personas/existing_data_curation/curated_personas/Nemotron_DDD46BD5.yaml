personas:
  professional: Francisco Bermudez leverages an organized, calm, and diplomatic style to excel as a retail associate, mastering POS systems, inventory control, visual merchandising, and staff training while
    they turn social energy into exceptional customer interactions.
  sports: Francisco Bermudez plays midfield in a local alumni soccer league, roots for the Chicago Fire FC and the Chicago Bulls, and they hit the gym for weight training two nights a week to stay game-ready.
  arts: Francisco Bermudez regularly attends live shows featuring globally-known pop and reggaeton artists like Bad Bunny and Karol G, and they also enjoy intimate jazz performances at Chicago's Green Mill.
  travel: Francisco Bermudez loves weekend getaways to the Lake Michigan shoreline, has explored the vibrant streets of New Orleans, and they plan a road trip to the Grand Canyon to combine scenic drives
    with culinary discoveries.
  culinary: Francisco Bermudez enjoys cooking family-style dishes such as hand-made corn-tortilla wraps, spicy stuffed peppers, and flavorful salsa verde, mastering the art of balancing chilies, fresh herbs,
    and lime, while they also delight in sampling Chicago's deep-dish pizza and Korean-inspired tacos at local food halls.
  core: Francisco Bermudez blends an organized retail mind with a sociable, talk-ative spirit, juggling weekend soccer matches, spontaneous culinary experiments, and a disciplined savings plan, all while
    occasionally over-loading on late-night tacos and forgetting to take breaks.
background:
  cultural: Francisco is a first‑generation Mexican‑American whose parents immigrated to Chicago in the 1990s. He grew up bilingual, speaking Spanish at home and English at school, and that dual language
    skill shapes his daily interactions and work. He maintains strong ties to Mexican traditions, celebrating holidays such as Día de los Muertos and Mexican Independence Day with his extended family and
    community. His faith is rooted in Catholicism, and he often attends a local parish that serves as a cultural hub for the Hispanic neighborhood. These cultural influences inform his food preferences,
    social rhythms, and his desire to foster community-oriented spaces.
