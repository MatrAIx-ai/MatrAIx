personas:
  professional: Michael Tredo, a budding LEGO architect, uses his love for routine and spatial reasoning to construct intricate models while collaborating calmly with friends, turning instructions into
    three‑dimensional stories and showing a relaxed yet cooperative work style.
  sports: Michael Tredo, an enthusiastic weekend cyclist and YMCA swim team member, pedals around the neighborhood with the local bike club and dives into water polo practice, while cheering for the New
    York Yankees and the Los Angeles Lakers during family game nights.
  arts: Michael Tredo, a cartoon‑drawing enthusiast, fills sketchbooks with superhero sketches inspired by Stan Lee and Disney’s Mickey Mouse, watches Pixar films for artistic inspiration, and occasionally
    explores Minecraft worlds for creative design practice.
  travel: Michael Tredo, a curious family‑trip explorer, loves day‑outs to the local beach and annual visits to Disneyland, dreams of a spring adventure in Japan’s anime districts, and prefers parents to
    handle itineraries while he packs his favorite stuffed Bella for the ride.
  culinary: Michael Tredo, a budding kitchen assistant, proudly makes peanut‑butter‑banana sandwiches and stirs pancake batter, delights in cheese pizza with extra mozzarella, and savors chicken nuggets
    dipped in ketchup, yet often asks for seconds and gets anxious when meals change unexpectedly.
  core: Michael Tredo blends a love for structured LEGO builds with spontaneous Minecraft adventures, worries about missing steps, forgets chores without reminders, and finds comfort in feeding Bella and
    munching on pizza.
background:
  cultural: Michael comes from a middle‑class white family living in Mims, Florida, a small community in Volusia County known for its close‑knit neighborhoods and proximity to the Atlantic coast. His family
    values practical routines, Sunday church attendance, and community events such as local festivals and beach clean‑ups. He attends a public elementary school where he participates in a weekly art club
    and a summer swimming program. The Southern Florida culture, with its warm weather, outdoor activities, and multicultural influences, shapes his love for swimming, biking, and occasional visits to nearby
    beaches. His upbringing emphasizes kindness, cooperation, and a stable, predictable environment, aligning with his personality preferences.
