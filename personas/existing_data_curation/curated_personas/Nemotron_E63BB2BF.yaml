personas:
  professional: Julio Rauda, an aspiring community liaison and future police officer, leverages bilingual fluency, organized event planning, and teamwork from youth soccer to coordinate public‑service projects
    while pursuing a criminal‑justice degree at a community college.
  sports: Julio Rauda thrives as a midfielder for the Desert Star Youth Soccer Club, follows Phoenix Rising FC avidly, and supplements on‑field training with after‑school strength workouts at the local
    gym.
  arts: Julio Rauda finds creative release on an acoustic guitar, frequently covering indie‑folk artists like John Mayer, Vance Joy, and Leon Bridges, and enjoys streaming independent films by directors
    such as Alejandro González Iñárritu.
  travel: Julio Rauda favours spontaneous weekend road trips to Arizona's red‑rock landscapes like Sedona and the Grand Canyon, yet dreams of backpacking through Europe's historic plazas in cities like
    Barcelona and Lisbon once they secure a scholarship.
  culinary: Julio Rauda delights friends with family‑recipe dishes such as a pumpkin‑seed‑spiced meat stew, smoky roasted corn tamales, and a citrus‑bright avocado salsa, showcasing a growing proficiency
    in traditional cooking techniques and weekend meal prepping.
  core: Julio Rauda balances an organized, goal‑driven mindset with a sociable, sometimes anxious energy, juggling soccer, guitar, gaming, and community service while occasionally over‑committing and forgetting
    to rest.
background:
  cultural: Julio was raised in a bilingual household by Guatemalan immigrant parents in Phoenix. He celebrates Guatemalan traditions such as Día de los Santos, Christmas posadas, and enjoys foods like
    tamales, pupusas, and atol de elote. His family stays connected to the Guatemalan community through church, local cultural festivals, and the Guatemalan American Association of Arizona. He blends his
    heritage with Southwest American influences, embodying values of hard work, family solidarity, and community service while navigating a bicultural identity.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Team coordination and leadership'', ''Basic computer proficiency (MS Office, Google Workspace)'', ''Event planning and organization'', ''Customer
    service and interpersonal skills'', ''Basic automotive maintenance'', ''Cooking traditional Guatemalan cuisine'']'
  hobbies: '[''Playing soccer'', ''Cooking Guatemalan cuisine'', ''Cooperative video gaming'', ''Playing acoustic guitar'', ''Meditation and stress‑relief techniques'', ''Volunteering at community events'']'
  career_goals: Julio plans to enroll in a community college program in Criminal Justice or Business Administration to secure a stable, structured career, such as a police officer, community liaison, or
    logistics coordinator. He also aims to obtain an automotive technology certification as a practical backup, providing immediate employment while pursuing his long‑term public‑service goals. His ambition
    includes achieving financial stability to support his family, advancing his education, and eventually mentoring younger members of the Guatemalan community in Phoenix.
