  career_goals: Approaching retirement, Jacob’s primary career goal is to transition into a low‑stress, predictable work schedule that still allows him to contribute his experience. He aims to move into
    a mentorship or shift‑lead role where he can supervise a small team, develop training modules, and refine packaging processes for greater efficiency. Jacob also hopes to secure a part‑time advisory
    position that offers flexible hours, enabling him to focus on managing his anxiety and maintaining emotional well‑being while staying connected to his professional community.
