  hobbies: '[''Attending local art fairs and craft workshops'', ''Chicago Design Week participation'', ''Hiking Indiana dunes'', ''Family bike rides'', ''Cooking and experimenting with global recipes'',
    ''Volunteering teaching graphic design to kids'', ''Community theater set design'', ''Reading contemporary fiction'', ''Collecting vintage movie posters'', ''Gardening'', ''Street photography'']'
  career_goals: Lacy aims to transition from senior graphic designer to creative director within the next five years, leading a multidisciplinary team that blends print, digital, and experiential design.
    She is passionate about launching a boutique branding studio focused on sustainable and community‑centric design projects, allowing her to merge her Midwestern practicality with her curiosity for innovative
    solutions. Mentoring emerging designers and speaking at regional design conferences are also high on her agenda, as is deepening her UI/UX expertise through certification courses and real‑world projects.
    Ultimately, she hopes to shape a creative environment where strategic thinking and artistic experimentation coexist.
