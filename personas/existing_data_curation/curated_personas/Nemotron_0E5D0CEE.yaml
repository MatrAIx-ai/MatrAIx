  career_goals: Gregory aims to progress to a supervisory role, targeting promotion to Sergeant within the next three years and eventually to Lieutenant. He seeks advanced training in investigative techniques,
    particularly in narcotics and cyber‑crime investigations, with the goal of becoming a detective specializing in complex cases. To support his leadership aspirations, he plans to complete a bachelor's
    degree in Public Administration and attend the state police academy’s leadership development program. Long‑term, Gregory envisions establishing a community mentorship initiative for at‑risk youth, leveraging
    his experience to strengthen local trust in law enforcement.
