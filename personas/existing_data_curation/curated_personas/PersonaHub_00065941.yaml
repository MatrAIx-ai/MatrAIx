persona_description: A medical professional who is interested in diagnosing and monitoring heart rhythm problems. They are likely to be a doctor or a healthcare provider who works with Holter and event
  monitors to diagnose arrhythmias, silent myocardial ischemia, and heart rate or rhythm problems. They are familiar with the use of these devices and have experience with interpreting the data they provide.
  They may also have a background in electrical engineering or physiology, as these devices rely on electrical signals to record heart activity.
