  career_goals: Natasha dreams of a future where she can combine her love for animals with her desire to help people. In the long term she hopes to become a veterinarian, a teacher, or a community health
    advocate. In the short term, she aims to excel in school, join the school’s science club, volunteer at the local animal shelter on weekends, and deepen her coding skills so she might eventually create
    an app that teaches kids about pet care. These goals reflect her balance of curiosity about how the world works and a practical wish to make a positive impact.
