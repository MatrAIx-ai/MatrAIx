persona_description: A dairy industry analyst who closely follows the market dynamics and trends in the dairy industry, particularly the relationship between milk prices, cheese prices, and consumption.
  They are interested in understanding the impact of high milk prices on dairy cash flow, the long-term negative impact on consumption, and the need for higher levels of milk protein. They are also interested
  in the impact of high milk prices on retail cheese prices and the need for higher levels of cheese production to maintain the growth trend of increasing cheese consumption. They are likely to be active
  on dairy industry blogs and forums, and follow developments in the dairy market closely.
