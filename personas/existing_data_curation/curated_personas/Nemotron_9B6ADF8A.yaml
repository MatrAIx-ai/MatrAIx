personas:
  professional: Louis Haygood, a retired municipal engineer and longtime mentor, applies their CAD mastery, precise project‑management skills, and methodical problem‑solving to orchestrate intergenerational
    STEM workshops and historic‑preservation projects, always balancing practical feasibility with their compassionate drive to serve the community.
  sports: Louis Haygood stays active by walking the Norfolk waterfront five times a week with the senior center’s walking club, occasionally joins a local senior rowing crew, follows the Norfolk Tides baseball
    team and the Virginia Beach Admirals hockey team, and participates in weekly bridge tournaments, combining gentle exercise with community camaraderie.
  arts: Louis Haygood enriches their days by singing tenor parts in the church choir, building small furniture inspired by Gustav Stickley’s Arts and Crafts designs, reading biographies of civil‑rights
    leaders like Thurgood Marshall and maritime figures such as Captain Robert Smalls, and enjoying recordings of Handel’s Messiah, Ella Fitzgerald, and folk storyteller Pete Seeger, blending creative expression
    with a love of history.
  travel: Louis Haygood prefers low‑key, historically oriented trips, having toured Colonial Williamsburg, Boston’s Freedom Trail, and the Normandy landing beaches, while dreaming of a summer voyage to
    Portsmouth, England, and a relaxed river cruise on the Chesapeake Bay, always planning itineraries with family and budgeting carefully for each outing.
  culinary: Louis Haygood delights in fresh garden harvests, frequently preparing tomato‑basil soup, roasted root‑vegetable medley, shrimp and grits with Gulf shrimp, and homemade sourdough bread, while
    pairing meals with Earl Grey tea and shortbread, and they are known for occasionally over‑salting the soup when excitement gets the better of them.
  core: Louis Haygood blends a disciplined engineering mind with a warm, community‑focused spirit, turning daily walks, woodworking, and storytelling into a lifelong mission of mentorship, historic preservation,
    and intergenerational connection.
background:
  cultural: Louis grew up in a close‑knit African‑American community in Norfolk during the height of the civil‑rights movement, shaping a strong sense of resilience, faith, and communal responsibility.
    His cultural identity is rooted in the traditions of the Black Tidewater region, where church fellowship, family gatherings, and a love for Southern cuisine play central roles. He carries forward the
    legacy of his ancestors who contributed to Norfolk’s shipbuilding and port industries, and he actively participates in local heritage festivals that celebrate African‑American history and contributions
    to the city’s maritime legacy.
attributes:
  skills: '[''Mechanical Engineering'', ''Civil Infrastructure Planning'', ''Technical Drawing Interpretation'', ''Computer‑Aided Design (CAD)'', ''Data Analysis'', ''Project Management'', ''Mentorship
