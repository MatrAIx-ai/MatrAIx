  hobbies: '[''Walking along the waterfront'', ''Gardening'', ''Bridge (card game)'', ''Volunteering at historical society'', ''Church choir singing'', ''Woodworking'', ''Reading historical biographies'',
    ''Family storytelling'']'
  career_goals: Although retired, Louis aims to leave a lasting legacy by mentoring youth interested in STEM, supporting senior‑focused community projects, and preserving the historic character of Norfolk's
    neighborhoods. He aspires to document his family’s story for future generations, expand intergenerational learning programs at the local community center, and serve as a bridge between his community
    and city officials on issues of public safety and historic preservation.
