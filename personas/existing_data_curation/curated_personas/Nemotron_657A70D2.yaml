personas:
  professional: John Corriveau, a civil engineer with a decade‑plus track record in designing transportation and water infrastructure, leverages his curiosity‑driven technical mastery of AutoCAD, Civil
    3D, and GIS alongside a gregarious, improvisational leadership style that turns complex regulatory puzzles into collaborative brainstorming sessions while keeping the project crew entertained with witty
    commentary, and they consistently prioritize stakeholder harmony over rigid timelines.
  sports: John Corriveau thrills to backcountry hikes in the Yellowstone foothills, casts fly lines on the Yellowstone River, and races mountain‑bike trails with the Billings Trailblazers club, while cheering
    on the Montana State Bobcats football team and the Billings Mustangs minor‑league baseball club, and they often swap trail stories over post‑ride coffee.
  arts: John Corriveau lights up the stage at Billings Community Theatre by headlining comedic sketches, draws inspiration from legends like Jim Carrey and Tina Fey, and fuels his creative eye with Ansel
    Adams‑style landscape photography captured during sunrise hikes, and they relish the applause as much as the backstage camaraderie.
  travel: John Corriveau prefers spontaneity on weekend road trips, often loading his SUV with fishing rods for impromptu fly‑fishing excursions in Yellowstone and Glacier National Park, while dreaming
    of a future trek through Patagonia’s Torres del Paine after a meticulously planned 2025 family vacation to New Zealand’s South Island, and they usually map out scenic stops over a cup of coffee the
    night before departure.
  culinary: John Corriveau relishes crafting smoky cedar‑plank trout, bourbon‑glazed pork ribs, and huckleberry‑infused baked beans at backyard barbecues, boasting a solid grill‑master skill set but admitting
    their penchant for over‑salting and a tendency to devour the last slice of dessert before guests arrive, and they often entertain the crowd with culinary anecdotes between bites.
  core: John Corriveau is a charismatic, curiosity‑driven engineer who juggles sustainable infrastructure projects, impromptu comedy performances, and weekend wilderness adventures, all while battling a
    habit of scattered paperwork and a love for over‑seasoned barbecue, and they thrive on turning social chaos into collaborative momentum.
background:
  cultural: John grew up in a middle‑class, white family rooted in the small‑town culture of eastern Montana. His parents, who worked in agriculture and local government, instilled a strong work ethic,
    respect for the rugged outdoors, and a sense of communal responsibility. The region’s blend of frontier self‑reliance, close‑knit neighborliness, and annual county fairs shaped his appreciation for
    practical problem‑solving and community celebration. Exposure to the diverse visitors of Yellowstone National Park and interactions with Native American communities in the area broadened his perspective
    on environmental stewardship. While maintaining a Western, pragmatic identity, John embraces inclusive values and often integrates local traditions—such as community potlucks and volunteer service—into
    his personal and professional life.
attributes:
  skills: '["Civil Engineering Design", "Structural Analysis", "Transportation Planning", "Water Resources Management", "AutoCAD", "Civil 3D", "GIS Mapping", "Project Management", "Cost Estimation and Budgeting",
