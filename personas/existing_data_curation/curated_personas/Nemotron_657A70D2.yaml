  hobbies: '["Backcountry Hiking", "Fly Fishing", "Mountain Biking", "Barbecue Hosting", "Community Theater Acting", "DIY Home Renovations", "Landscape Photography", "Mentoring Youth Volunteers", "Local
    History Exploration"]'
  career_goals: John aims to leverage his engineering expertise and people‑focused approach to shape resilient, community‑centered infrastructure in the Yellowstone region. He aspires to become a senior
    city engineer or director of public works, lead a major sustainable transportation corridor, and champion inclusive design standards that prioritize safety for all residents. He also hopes to mentor
    the next generation of engineers through local workshops and to launch a nonprofit that provides engineering assistance to rural schools and small towns. Balancing his love for hands‑on problem solving
    with his passion for community building, John envisions a career where technical excellence and social impact go hand in hand.
