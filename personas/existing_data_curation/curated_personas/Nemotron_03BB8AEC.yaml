  career_goals: Eduardo aims to move from his current clerk position to a senior credit analyst role within the next two years, taking on greater responsibility for high-value loan decisions and risk modeling.
    He aspires to become a credit manager, overseeing a small team and shaping credit policy to improve efficiency and reduce default rates. He plans to obtain a Certified Credit Professional (CCP) credential
    to solidify his expertise. Long-term, Eduardo hopes to transition into a risk management or portfolio oversight role, positioning himself for a stable, senior-level position before retirement, while
    also mentoring younger staff and contributing to the bank's community outreach programs.
