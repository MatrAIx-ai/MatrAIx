personas:
  professional: Donald Ferrier, a seasoned construction laborer in Lockhart who excels at operating backhoes, mixing concrete, and basic carpentry, leverages their practical curiosity and hands-on problem
    solving to aim for a foreman role, study for a GED, earn heavy-equipment certifications, and eventually launch a community-focused contracting business.
  sports: Donald Ferrier, a regular at the Lockhart community basketball league, dribbles in weekend pick-up games at Larkwood Park, tailgates for Lockhart High School football while cheering on the Austin
    FC and Texas Longhorns, and joins the Austin Bass Club for early-morning fishing trips on the Guadalupe River, where they relish the camaraderie of the team.
  arts: Donald Ferrier, a devoted fan of Garth Brooks, Carrie Underwood, and the Texas Country Music Festival, spends Friday nights at the Rusty Spur bar belting out "Friends in Low Places" during karaoke
    and rarely misses a country-music concert in the Dallas-Fort Worth area, where they feel most alive.
  travel: Donald Ferrier prefers spontaneous road trips in their restored 1978 Chevrolet pickup, having driven down to Gulf Shores for a beach barbecue, spent a weekend fishing on Lake Fork, and now dreaming
    of an Alaskan fly-fishing adventure they hope to fund by cutting back on discretionary spending.
  culinary: Donald Ferrier, a backyard pitmaster, spends summer evenings smoking Texas-style brisket and pork ribs with a signature rub of brown sugar, paprika, and black pepper, while also whipping up
    Cajun-spiced catfish fry-ups and perfecting their homemade coleslaw for family gatherings.
  core: Donald Ferrier, a 40-year-old construction hand with a love for pickup basketball, BBQ, country karaoke, and heavy-equipment dreams, balances a curious, competitive streak with a laid-back, sometimes
    disorganized approach that often postpones paperwork in favor of hands-on projects, where they thrive.
background:
  cultural: Donald grew up in a small, working‑class town in Central Texas, immersed in a community that values hard work, hospitality, and family. His heritage reflects the broader white Texan culture,
    with influences from German and Czech settlement patterns common in the region. He is active in his local church, enjoys traditional Texas barbecue, country music, and football, and participates in
    community events like rodeos and neighborhood clean‑up days. This cultural backdrop reinforces his practical mindset, sociable nature, and competitive spirit.
attributes:
  skills: '[''Heavy equipment operation'', ''Concrete mixing and pouring'', ''Basic carpentry'', ''Demolition work'', ''Site clean‑up and organization'', ''Safety compliance'', ''Reading basic construction
