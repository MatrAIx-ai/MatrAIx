  hobbies: '[''Pickup basketball'', ''High school football tailgating'', ''Fishing trips with friends'', ''Barbecue cooking'', ''Country music concerts'', ''Karaoke nights'', ''DIY home renovation projects'',
    ''Restoring old pickup trucks'', ''Community volunteer projects'', ''Attending local rodeos'']'
  career_goals: Donald aims to move up to a foreman position within the next few years, leveraging his practical experience to lead crews and manage daily site operations. He plans to obtain a GED and pursue
    certifications for heavy‑equipment operation and occupational safety, which would open the door to starting his own small contracting business. Long‑term, he hopes to provide greater financial stability
    for his family, mentor younger workers, and become known for reliable, community‑focused construction projects in Lockhart and surrounding areas.
