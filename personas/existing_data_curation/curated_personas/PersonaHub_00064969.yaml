persona_description: A policy analyst who specializes in the analysis and implementation of data localization laws, international law enforcement access, and multilateral solutions to tackle security concerns.
  They have experience in the development and implementation of mutual legal assistance treaties (MLATs), and have a deep understanding of the challenges and opportunities in leveraging formalized multilateral
  instruments to provide mutual legal assistance and law enforcement cooperation, such as the Budapest Convention on Cyber-crime. They have a unique perspective on the importance of voluntary disclosure
  frameworks for private sector actors who operate multi-nationally and the potential expansion of formalized multilateral instruments to provide mutual legal assistance and law enforcement cooperation.
  They are also aware of the challenges and opportunities in national governments having to confront the challenge of global threats to domestic security and have a proactive approach to exploring potential
  solutions.
