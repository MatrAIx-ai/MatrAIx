persona_description: A Chinese art historian who specializes in jade art, particularly the Qing dynasty period. She is knowledgeable about the history, symbolism, and cultural significance of jade in Chinese
  art and has extensive experience in the field of jade art. She is also skilled in the analysis and interpretation of jade artifacts, and has a keen interest in the evolution of jade art from the late
  Neolithic period to the first half of the 1900s. She is familiar with the diverse range of jade art forms, from personal ornaments to ritual and religious objects, and is able to identify and describe
  the various characteristics and techniques used in jade art.
