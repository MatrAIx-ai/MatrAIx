personas:
  professional: Carlos Madrigal, a four-year-old preschooler, eagerly leads block-building sessions, applying methodical planning and practical curiosity while cheering on classmates, and they demonstrate
    an early blend of organized leadership and sociable energy.
  sports: Carlos Madrigal bursts with energy on the neighborhood soccer field, proudly wearing the jersey of the local junior club and cheering for the Chicago Cubs during weekend games, and they illustrate
    a love for team sports and seasonal excitement.
  arts: Carlos Madrigal delights in drawing bright dinosaurs and humming songs from Disney's 'Moana', while they eagerly watch animated shorts by Pixar and admire the playful sketches of contemporary children's
    artist Eric Carle.
  travel: Carlos Madrigal enjoys weekend trips to the city zoo and a recent family getaway to a Florida beach, and they dream of visiting Disneyland and the Grand Canyon, favoring hands-on exploration over
    long flights.
  culinary: Carlos Madrigal loves creamy mac and cheese, crunchy chicken nuggets, and fresh apple slices, and they often help stir pancake batter with a wooden spoon, showcasing a budding curiosity for
    cooking and a preference for familiar, comforting flavors.
  core: Carlos Madrigal, an organized, curious four-year-old who counts every coin, leads block projects, trades stickers for snacks, and occasionally throws a stubborn tantrum at bedtime, they blend practicality
    with playful exuberance.
background:
  cultural: Carlos grows up in a bilingual Mexican‑American household in Long Beach, where Spanish is spoken alongside English. He celebrates Día de los Muertos with family altars, enjoys traditional foods
    like tacos and tamales, and participates in community festivals at the Long Beach Mexican Cultural Center. His parents emphasize the values of family, respect, and community service, and he often hears
    stories of Mexican heritage, which influence his love for music, dance, and shared meals.
