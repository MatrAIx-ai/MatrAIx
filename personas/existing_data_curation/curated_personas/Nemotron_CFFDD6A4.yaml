personas:
  professional: Erlinda Cole, a technology and intellectual property attorney with a STEM background, blends meticulous legal research and contract drafting with a vivid imaginative flair, allowing them
    to craft innovative legal strategies for AI and biotech clients while leveraging their organized, methodical approach and empathetic negotiation style.
  sports: Erlinda Cole enjoys hiking the Illinois Prairie Path and training with a local running club, while cheering on the Chicago Cubs, Bulls, and Blackhawks, and they regularly attend yoga classes at
    a downtown studio to keep a balanced fitness routine.
  arts: Erlinda Cole immerses themselves in abstract painting inspired by Yayoi Kusama, captures urban textures through photography echoing James Turrell’s light work, devours speculative fiction by N.K.
    Jemisin and Ted Chiang, and frequents live performances by St. Vincent and Steppenwolf Theatre, letting these experiences shape their creative identity.
  travel: Erlinda Cole prefers meticulously planned cultural trips, having explored the museums of Paris, the street food stalls of Bangkok, and the fjords of Iceland, while dreaming of future visits to
    Barcelona’s Sagrada Família and Kyoto’s Gion district, balancing these adventures with occasional weekend getaways to Lake Michigan’s shoreline.
  culinary: Erlinda Cole experiments with international cuisine, skillfully preparing Thai green curry, Ethiopian injera with doro wat, and Korean bibimbap using fresh turmeric, miso, and aromatic herbs,
    showcasing an intermediate-to-advanced cooking level that satisfies their love for bold flavors and convivial dinner parties.
  core: Erlinda Cole is a detail-driven IP lawyer who relieves anxiety through art, yoga, and spicy cooking, yet occasionally overspends on paint supplies and theater tickets while juggling a relentless
    drive for professional excellence.
background:
  cultural: Erlinda is a White American of German-Irish descent raised in the Chicago-area suburbs. Growing up in the Midwest, she internalized values of hard work, community involvement, and modesty, while
    the cultural diversity of nearby Chicago exposed her to a rich tapestry of art, music, and cuisine. Her family maintains traditions such as celebrating Thanksgiving, Fourth of July, and occasional Christmas
    customs, and she participates in local community events, including Berwyn's annual Polish Heritage Festival. This blend of Midwestern roots and urban cultural exposure informs her balanced outlook,
    fostering both a grounded work ethic and an appreciation for novelty and artistic expression.
