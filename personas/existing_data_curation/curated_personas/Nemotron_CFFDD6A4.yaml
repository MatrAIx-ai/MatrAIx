  career_goals: Erlinda aspires to become a senior partner specializing in emerging technology and IP law, shaping legal frameworks for AI and biotech. She aims to lead a multidisciplinary practice that
    integrates technical expertise with creative problem-solving. She also seeks to mentor women and underrepresented lawyers, champion mental-health awareness in the legal profession, and eventually serve
    as a judge or policy advisor to influence broader legal reforms.
