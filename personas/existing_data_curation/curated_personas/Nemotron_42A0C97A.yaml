  hobbies: '[''Weekly hiking group in Sonoma County'', ''Wine tasting tours with local vintners'', ''Pickleball matches at community center'', ''Community theater acting'', ''Vegetable gardening'', ''Volunteer
    mentor for business students'', ''Classic car restoration hobby'', ''Reading historical non-fiction'', ''Cooking brunches for friends'']'
  career_goals: Approaching retirement, Damien aims to leverage his extensive experience to mentor emerging analysts and lead high‑impact, organization‑wide improvement initiatives. He aspires to secure
    a senior leadership role—such as Director of Business Analytics—where he can shape strategic direction and embed a culture of data‑driven decision making. In the long term, Damien hopes to transition
    into a part‑time consulting capacity focused on helping local Sonoma County businesses, especially wineries and agricultural firms, streamline operations and adopt sustainable practices. He also envisions
    authoring a best‑practice guide on process optimization for mid‑size enterprises.
