  hobbies: '[''hiking'', ''rock climbing'', ''weightlifting'', ''DIY furniture building'', ''gardening'', ''reading sci-fi novels'', ''cooking southwestern dishes'', ''volunteering with Habitat for Humanity'']'
  career_goals: Leveraging her practical experience, Maria aims to acquire a certified heavy‑equipment operator credential and complete the remaining credits for an associate’s degree in construction management
    within the next two years. In the short term, she plans to earn an OSHA 30‑hour certification and a LEED Green Associate credential to bolster her expertise in safety and sustainable building. Her medium‑term
    goal is to transition to a foreman role, leading small crews and coordinating multiple trades on residential projects. Ultimately, Maria aspires to become a project manager and eventually launch her
    own contracting firm focused on energy‑efficient homes, integrating solar installations and low‑impact materials. She views these milestones as competitive benchmarks that will differentiate her in
    a market that values both reliability and innovation.
