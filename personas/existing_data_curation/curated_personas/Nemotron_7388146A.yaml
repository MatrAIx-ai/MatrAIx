personas:
  professional: Maria Morales, a 21‑year‑old on‑site construction specialist who blends methodical measurement skills with a competitive drive to master heavy‑equipment operation, leverages her OSHA 30‑hour
    training and burgeoning BIM knowledge to lead safety briefings and ensure projects stay on schedule.
  sports: Maria Morales fuels her competitive edge through weightlifting at the local CrossFit box, boxing classes at the downtown gym, and weekly hikes up Garden of the Gods, cheering on the Colorado Rockies
    and following the Denver Broncos, while training with a climbing club that meets at Red Rock Canyon.
  arts: Maria Morales balances her hands‑on trade work with a love for southwestern music, regularly streaming tracks by Los Lobos and listening to classic rock icons like Jimi Hendrix, and she unwinds
    by reading sci‑fi novels such as The Expanse series and attending community theater productions of classic plays.
  travel: Maria Morales prefers trips that blend adventure and sustainability, having backpacked the trail systems of Moab and taken a road‑trip to New Mexico’s historic pueblos, she dreams of visiting
    Patagonia for glacier trekking and plans each journey with a detailed itinerary to maximize hiking days while keeping costs low.
  culinary: Maria Morales delights in cooking enchiladas stuffed with roasted corn and smoked jackfruit, perfecting tamales with masa and chili verde, and experiments with fusion dishes like quinoa‑filled
    burritos, often sourcing fresh chilies, cilantro, and locally milled corn from the farmer’s market.
  core: Maria Morales is a methodical, curiosity‑driven construction pro who channels competitive energy into weightlifting and sustainable DIY projects, all while juggling a disciplined budget and a love
    for southwestern flavors.
background:
  cultural: Maria was raised in a middle‑class household in Colorado Springs where both parents worked in trades—her mother as a carpenter and her father in manufacturing. Although she identifies as white,
    her family carries a blend of Anglo‑American and Hispanic roots, reflected in the bilingual conversations at home and a love for southwestern cuisine. The local culture emphasized self‑reliance, community
    service, and a deep appreciation for the outdoors, shaping her affinity for hiking and sustainable living. Growing up she celebrated traditional American holidays while also participating in regional
    festivals that highlighted Latin American music and food. This mixed cultural exposure nurtured her pragmatic outlook and her interest in integrating diverse practices—like renewable energy—into everyday
    life.
attributes:
