  hobbies: '[''Fine art painting'', ''Sketching landscapes'', ''Reading art history'', ''DIY home projects'', ''Gardening'', ''Hiking local trails'', ''Listening to folk and country music'', ''Attending
    small community gatherings'', ''Cooking Southern cuisine'', ''Reading mystery novels'']'
  career_goals: Kimberly aims to become a certified journeyman painter within the next two years and eventually launch her own small painting and decorative finishing business. She hopes to blend her technical
    skills with her artistic passion by offering custom murals and specialty finishes for local homes and businesses. Long‑term, she envisions creating a community art workshop where she can mentor other
    young artisans while maintaining a strong reputation for reliable, high‑quality workmanship.
