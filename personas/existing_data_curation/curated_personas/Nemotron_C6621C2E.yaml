personas:
  professional: Andrew Monroe is a three‑year‑old who treats every block‑building session like a project, meticulously sorting colorful bricks by shape and size before constructing towers, and they proudly
    label each creation with a handwritten tag.
  sports: Andrew Monroe loves sprinting around the neighborhood park with a mini soccer ball, cheering on the local City Tigers team on a kids' jersey, and they attend a Tuesday gymnastics class where they
    practice balance beams with the same competitive focus they show in puzzle games.
  arts: Andrew Monroe spends afternoons drawing vivid scenes with Crayola markers, often replicating characters from "The Wiggles" and humming "Baby Shark," and they attend a Saturday story‑time at the
    library where they act out the tales with gusto.
  travel: Andrew Monroe enjoys family outings to the city zoo where they count the animals in a notebook, loves splashing in the indoor water park at Great Wolf Lodge, and they eagerly anticipate a future
    trip to Disneyland, dreaming of riding the whimsical carousel.
  culinary: Andrew Monroe favors buttery mac and cheese, crisp chicken nuggets, and fresh strawberry slices, proudly insists on adding a dash of shredded cheese to every bite, and they occasionally help
    their parent stir a simple stir‑fry with peas and carrots.
  core: A systematic three‑year‑old who thrives on routine, builds block towers with precision, saves pennies in a piggy bank, and never skips bedtime story order.
background:
  cultural: Andrew is raised in a white, middle‑class family in Granville, Ohio, a small Midwestern community known for its close‑knit neighborhoods and agricultural surroundings. His family participates
    in local events such as county fairs and community picnics, and they attend a small town church that emphasizes community service and seasonal traditions. The blend of rural values, modest city amenities,
    and a supportive extended family provides Andrew with a stable cultural foundation that reinforces his love for routine, reliability, and communal involvement.
attributes:
  skills: '[''Counting to ten'', ''Letter recognition (A‑C)'', ''Fine motor coordination (stacking blocks)'', ''Basic problem‑solving with simple puzzles'', ''Following daily routines'', ''Verbal communication
    (200+ words)'', ''Social cooperation (sharing, turn‑taking)'']'
  hobbies: '[''Building block towers (Mega Bloks)'', ''Simple jigsaw puzzles'', ''Crayon drawing and coloring'', ''Story‑time at the library'', ''Visiting the local farm'', ''Tricycle riding'', ''Guided
    preschool circle time and songs'']'
  career_goals: Although only three, Andrew already expresses whimsical ambitions shaped by his love of order and building. He frequently mentions wanting to become a builder or a firefighter when he grows
    up, admiring the way they construct and protect. He enjoys pretending to fix toy houses and is fascinated by the shiny red fire truck he sees on neighborhood visits, indicating an early desire to create,
    help, and maintain structured environments.
