  career_goals: Daniel aims to transition from a front‑line material mover to a supervisory role within the next three years, targeting positions such as Shift Supervisor or Warehouse Operations Manager.
    He plans to obtain a Certified Warehouse Manager credential and complete advanced training in supply chain logistics. Ultimately, he aspires to oversee a multi‑site distribution network, implement data‑driven
    process improvements, and mentor a team of warehouse professionals. He also hopes to achieve greater financial stability to support his personal responsibilities and secure a leadership position within
    a reputable logistics firm.
