persona_description: An engineer or geotechnical specialist who is interested in classifying and understanding soils for engineering purposes, particularly for geotechnical engineering projects. They are
  likely to be familiar with the ISO 14688-2:2004 standard and its classification principles for soils, and may need to adapt or refine the classification based on specific project requirements or materials.
  They may also have a keen interest in understanding the different characteristics of soils, their composition and geotechnical properties, and their suitability for geotechnical engineering purposes.
