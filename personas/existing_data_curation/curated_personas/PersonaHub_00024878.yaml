persona_description: A scientist who is working on developing new techniques to diagnose and treat Alzheimer's disease. She is particularly interested in using magnetic resonance imaging to detect amyloid
  plaques in living mice, as it has the potential to slow the progression of the disease and even halt it. She is also interested in using the tracer developed by Takaomi Saido at the Riken Brain Science
  Institute to track the build-up of amyloid plaques in Alzheimer's mice.
