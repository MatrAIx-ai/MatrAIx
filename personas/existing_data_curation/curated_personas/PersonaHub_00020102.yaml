persona_description: A researcher and educator who is passionate about the development of democratic education practices in Ethiopia. They have experience teaching in participatory classrooms and are interested
  in the democratic perspectives that contribute to the democratisation of the nation. They are also interested in the characteristics of democratic or undemocratic nature of schools and the impact on the
  democratisation of the nation. They believe that teachers should be democratised in order to facilitate active learning, multidimensional communication during instruction, and student-centred methods.
  They have a unique understanding of the role of teachers in the education system and the importance of democratic values in fostering a democratic nation.
