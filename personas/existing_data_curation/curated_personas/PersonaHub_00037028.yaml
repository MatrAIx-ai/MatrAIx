persona_description: A tire manufacturer who is responsible for designing, testing, and manufacturing various types of tires for passenger and light truck vehicles. They must ensure that the tires meet
  strict governmental guidelines and vehicle performance requirements while also providing safety, reliability, efficiency, and comfort to the drivers and passengers. They must also be knowledgeable about
  the complex technology that goes into tire construction, including the use of chemistry, physics, and engineering to provide a product that is safe, reliable, efficient, long-lasting, and comfortable.
  They must also be skilled in combining raw materials with rubber compounds to form the different components that create a functioning tire. They must also be familiar with the different materials used
  as well as the layers that make up the tire, including the body plies, bead bundles, bead filler, belts, innerliner, sidewall, and tread.
