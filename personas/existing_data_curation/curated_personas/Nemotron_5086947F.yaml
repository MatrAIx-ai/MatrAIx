personas:
  professional: Debra Rude, a veteran elementary and middle school teacher with a flair for weaving visual arts into core curricula, leverages differentiated instruction and digital tools to create inquiry‑driven
    classrooms while mentoring peers and championing equity through meticulous curriculum design.
  sports: Debra Rude, a devoted member of the local walking club and occasional yoga practitioner, enjoys weekend bird‑watching hikes in the Lowcountry, roots for the Carolina Panthers and the Charleston
    RiverDogs, and prefers low‑impact exercise that complements gardening.
  arts: Debra Rude, an avid watercolorist inspired by Monet and a regular visitor of Brookgreen Gardens, finds solace in reading Maya Angelou’s poetry, listening to the Art History Friday podcast, and knitting
    patterns that echo Southern craft traditions.
  travel: Debra Rude, who plans trips with a meticulous itinerary, has explored historic Savannah, the art‑laden streets of Asheville, and the botanical gardens of Kyoto, and longs to attend the Oaxaca
    Crafts Fair while balancing travel costs with family responsibilities.
  culinary: Debra Rude, whose cooking skill sits at confident home‑chef level, loves preparing shrimp and grits with fresh herbs, baking lavender‑infused shortbread, and experimenting with edible native
    flowers in salads, while frequenting quiet farm‑to‑table bistros for inspiration.
  core: Debra Rude, a solitary, curiosity‑driven educator‑artist at 52, blends disciplined planning with spontaneous creativity, often lost in watercolor, garden, or a quiet book, yet secretly hoards unfinished
    knitting projects as a quirky comfort.
background:
  cultural: Debra grew up in a small town in the Lowcountry of South Carolina within a white, Protestant family that emphasized community, humility, and a respect for Southern traditions. The culture of
    Mayesville values close‑knit relationships, church involvement, and a deep appreciation for local folk art and storytelling, all of which shape her teaching style and artistic interests. She incorporates
    regional history and narratives into her lessons, honors local culinary and musical traditions, and balances these roots with a broad, open‑minded curiosity for new ideas and experiences.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Art Integration'', ''Educational Technology'', ''Literacy Coaching'', ''Student Assessment'', ''Mentoring
