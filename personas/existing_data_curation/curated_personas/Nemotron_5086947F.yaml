  hobbies: '[''Watercolor Painting'', ''Reading Literary Fiction and Poetry'', ''Gardening'', ''Bird-Watching'', ''Photography'', ''Knitting'', ''Visiting Art Galleries and Museums'', ''Listening to Educational
    Podcasts'']'
  career_goals: Debra aspires to move into a district‑level curriculum coordinator role where she can champion arts integration and design equity‑focused curricula for elementary schools. She plans to pursue
    a master's degree in Curriculum and Instruction to deepen her expertise in instructional design. Long‑term, she hopes to create a community‑based art program that provides after‑school creative opportunities
    for children in Sumter County, and she dreams of authoring a children’s book that celebrates curiosity and the natural world.
