personas:
  professional: Shoua Ha, a budding multimedia creator, blends anime‑style illustration, watercolor landscapes, and Arduino light installations with a meticulous yet imaginative approach, leveraging their
    organizational skill to meet art club deadlines while flexibly experimenting with new concepts.
  sports: Shoua Ha, an enthusiastic hiker of the Niagara Gorge trails and occasional member of the school soccer team, balances weekend cardio with leisurely viewings of the Buffalo Bills and Buffalo Sabres,
    preferring low‑impact activities over organized competitive sports.
  arts: Shoua Ha, a devoted anime‑style illustrator and watercolor enthusiast, draws inspiration from Hayao Miyazaki’s films, sketches characters reminiscent of My Hero Academia, practices piano pieces
    like Yiruma’s River Flows in You, and showcases Arduino‑driven light installations, integrating these influences into a vibrant personal art portfolio.
  travel: Shoua Ha, who plans trips with a blend of meticulous research and spontaneous curiosity, frequently explores nearby attractions like Niagara Falls and Toronto’s anime conventions, while dreaming
    of an immersive cultural pilgrimage to Kyoto’s historic districts and the natural splendor of Yellowstone National Park, balancing limited family budget with a desire for both adventure and artistic
    inspiration.
  culinary: Shoua Ha, an intermediate home‑cook with a penchant for Japanese cuisine, delights in crafting ramen broth with miso and kombu, baking matcha‑infused cupcakes, and savoring classic pepperoni
    pizza, while often pairing meals with strawberry‑yogurt smoothies and occasionally overindulging in sugary gummy candies during late‑night study sessions.
  core: Shoua Ha, a 14‑year‑old imagination‑driven creator, flips between meticulous sketchbooks and impulsive Arduino experiments, often losing sleep over art deadlines while hoarding a secret stash of
    neon‑colored gel pens.
background:
  cultural: Shoua is the daughter of Chinese immigrants who settled in Western New York in the early 2000s. At home, Mandarin is spoken alongside English, and the family observes cultural traditions such
    as Lunar New Year celebrations, the Mid‑Autumn Festival, and the exchanging of red envelopes. She enjoys weekend language classes at a local cultural center, where she also learns calligraphy and participates
    in holiday performances. The blend of her family's emphasis on academic diligence and respect for elders with the open, individualistic environment of her American school community has shaped her worldview.
    Living in North Tonawanda, she balances participation in local community events—like volunteer clean‑up drives and school clubs—with maintaining a connection to her East Asian heritage through cuisine,
    storytelling, and cultural festivals.
attributes:
  skills: '["Digital illustration (Procreate, Photoshop)", "Basic programming (Python, Scratch)", "Creative writing (poetry, short stories)", "Critical thinking and problem solving", "Project planning and
    organization", "Photography (digital)", "Piano (intermediate)", "Team collaboration"]'
  hobbies: '["Sketching anime and original characters", "Watercolor painting", "Reading sci‑fi/fantasy novels", "Creative writing (short stories)", "Playing piano", "Arduino tinkering (light displays)",
    "Hiking and nature photography", "Youth art club participation and mentorship"]'
  career_goals: Shoua aims to gain admission to a specialized arts high school where she can deepen her skills in concept art, illustration, and animation. In the longer term, she envisions studying graphic
    design or interactive media at a university and working as a concept artist or UI/UX designer for video games or animated productions. She is eager to build a compelling portfolio through summer art
    workshops, community exhibitions, and online showcases. Alongside her artistic aspirations, she hopes to integrate technology and creativity by learning 3D modeling and game development, potentially
    creating her own indie game projects that blend storytelling, visual art, and interactive design.
