    and mentorship of staff", "Data analysis and outcome measurement"]'
  hobbies: '["Reading historical non-fiction and philosophy", "Woodworking and furniture making", "Gardening and horticulture", "Hiking on local trails", "Photography of urban and natural scenes", "Playing
    acoustic guitar", "Participating in community jam sessions", "Volunteer mentorship for youth", "Attending local theater productions", "Solving puzzles (crosswords, Sudoku)"]'
  career_goals: Freddy aims to transition into a senior leadership role within a regional rehabilitation services network, where he can shape program standards, integrate emerging technologies such as tele‑rehabilitation,
    and promote evidence‑based practices. He plans to obtain a certification in trauma‑informed care and to publish a guide on multidisciplinary coordination for chronic injury recovery. Over the next five
    years, Freddy envisions establishing a community‑based rehabilitation hub in Northwest Ohio that offers holistic services—including vocational training, mental‑health support, and peer mentorship—while
    also serving as a training ground for the next generation of counselors. He is also interested in advocating for statewide policy reforms that enhance access to rehabilitation services for underserved
    populations.
