  career_goals: Omar hopes to combine his love for people and technology by pursuing a career in video game design or as a community youth coordinator. He envisions creating interactive experiences that
    bring friends together and later wants to work on projects that support his neighborhood, possibly as a tech support specialist for local schools or a mentor for younger kids. He also dreams of earning
    a scholarship to attend a vocational program to become an automotive technician, giving him a stable, hands‑on career to support his family.
