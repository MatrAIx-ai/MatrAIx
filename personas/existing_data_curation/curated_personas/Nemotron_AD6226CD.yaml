  hobbies: '["Playing soccer with friends", "Cooking South Indian cuisine", "Attending Diwali and Pongal festivals", "Dancing to Bollywood music", "Yoga and guided meditation", "Video gaming (FIFA, action
    RPGs)", "Exploring local restaurants", "Community volunteering"]'
  career_goals: Prit aims to transition from sales associate to store manager within the next two years, seeking a role that offers clearer structure and predictable responsibilities to reduce his anxiety.
    He plans to enroll in a retail management certification program at a community college and to shadow his current store manager to develop leadership, scheduling, and budgeting skills. Long-term, he
    dreams of opening a small family-run boutique that blends South Asian products with everyday necessities, allowing him to leverage his cultural knowledge while maintaining a flexible work-life balance
    for his wife and future children. He also hopes to become a mentor for newer employees, helping them navigate the retail environment with confidence.
