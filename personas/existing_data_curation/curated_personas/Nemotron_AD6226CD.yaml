personas:
  professional: Prit Sureshkumar is a retail sales associate whose bilingual fluency, knack for visual merchandising, and assertive‑cooperative conflict mediation style enable them to quickly build rapport
    and manage inventory, while they eagerly pursue a store‑manager role to gain the structure that steadies their anxiety.
  sports: Prit Sureshkumar fuels their energetic social life by joining pickup soccer games at local parks, competing in community cricket matches each summer, cheering on Los Angeles FC, and hitting the
    gym for quick HIIT workouts when the schedule allows, and they relish the camaraderie of team sports as a stress outlet.
  arts: Prit Sureshkumar regularly expresses creativity by dancing to Bollywood hits at temple festivals, streaming A.R. Rahman soundtracks, and attending occasional live indie shows featuring artists like
    Haim, while also indulging in classic Hollywood films starring Tom Hanks for a balanced artistic palate, and they enjoy sharing these experiences with friends and family.
  travel: Prit Sureshkumar prefers spontaneous weekend getaways, often driving the Pacific Coast Highway to Santa Barbara or camping in Lake Tahoe, while also planning annual trips to a historic temple
    town in South India to reconnect with family traditions and celebrate festivals, and they balance these journeys with short road trips to nearby desert retreats.
  culinary: Prit Sureshkumar delights in mastering the crisp Masala Dosa with coconut chutney and tangy sambar, layering fragrant biryani with saffron and cardamom, and exploring Orange County’s food scene—from
    authentic ramen to gourmet tacos—while occasionally experimenting with fresh curry leaves and mustard seeds at home, and they cherish cooking together with their spouse as a daily ritual.
  core: Prit Sureshkumar balances a craving for structured routines with a laid‑back, occasionally disorganized lifestyle, channeling high emotional reactivity into energetic community gatherings and a
    steady stream of culinary experiments, all while never missing a chance to hoard discount coupons and binge‑watch classic movies.
background:
  cultural: Prit comes from a South Asian (Tamil) family that immigrated to Southern California in the 1990s. Raised in Orange, CA, he grew up speaking both Tamil and English at home, celebrating festivals
    such as Pongal, Diwali, and Tamil New Year with traditional foods, prayers, and community gatherings. The family maintains ties to the local Hindu temple, where they participate in cultural events and
    volunteer for charitable drives. While embracing American customs—like attending high school football games and enjoying the Californian beach lifestyle—Prit's upbringing emphasized respect for elders,
    collectivist family values, and a strong work ethic. These cultural influences shape his social interactions, culinary preferences, and his desire to eventually open a small business that reflects his
    heritage.
