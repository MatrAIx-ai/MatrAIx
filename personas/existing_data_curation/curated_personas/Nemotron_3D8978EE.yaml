personas:
  professional: Kathy Brayboy, a retired elementary educator with over three decades of curriculum design, student assessment, and mentorship, applies their meticulous organization and calm, empathetic
    demeanor to guide new teachers, lead adult literacy workshops, and spearhead intergenerational community education projects.
  sports: Kathy Brayboy enjoys low-impact fitness through daily walks at County State Park, participates in the Union County Senior Walking Club, cheers on the Union County Wildcats high-school basketball
    team, and they never miss the weekend radio broadcast of the Chicago Cubs, balancing activity with comfortable leisure.
  arts: Kathy Brayboy spends afternoons quilting intricate blankets that incorporate African motifs, and they experiment with digital photography inspired by Ansel Adams, while engaging in a book club that
    reads works by Maya Angelou, Toni Morrison, and James Baldwin, and they also attend performances by the local jazz quartet and the community choral rendition of Mahalia Jackson classics.
  travel: Kathy Brayboy prefers relaxed, well-planned trips and they have visited historic Savannah, the vibrant French Quarter of New Orleans, and the Smithsonian's National Museum of African American
    History and Culture in Washington, D.C., while dreaming of a scenic drive along the Blue Ridge Parkway and a short pilgrimage to the coastal villages of Ghana.
  culinary: Kathy Brayboy, an accomplished home cook, blends Southern comforts such as collard greens, smoked ham hocks, and creamy grits with Midwestern corn and pork roast, frequently seasoning with smoked
    paprika, fresh thyme, and a dash of hot sauce, and they enjoy preparing a weekly batch of gumbo served with buttery cornbread.
  core: Kathy Brayboy, a curious yet pragmatic septuagenarian, weaves African-inspired quilts, mentors teachers, and gardens with disciplined devotion, though they occasionally lose track of a medication
    dose amid their creative projects.
background:
  cultural: Kathy is an African‑American woman whose family roots trace back to the Great Migration of the early 20th century, when her grandparents settled in Ohio seeking industrial work and better educational
    opportunities. Growing up in a close‑knit Black church community in Dublin, she internalized values of collective support, storytelling, and resilience. Her cultural identity is expressed through traditions
    such as Sunday gospel services, soul‑food cooking, and participation in local Black History celebrations. She balances Midwestern modesty with a deep appreciation for African‑American heritage, often
    sharing her family's oral histories and contributing to community events that honor both her racial background and regional upbringing.
