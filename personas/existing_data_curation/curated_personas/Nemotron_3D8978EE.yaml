  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Quilting'', ''Book club (African‑American literature)'', ''Cooking family recipes'', ''Local museum visits'', ''Walking in nature'', ''Digital
    photography'']'
  career_goals: Although she is retired, Kathy aims to remain a vital contributor to her community by volunteering as a mentor for new teachers, leading adult literacy workshops, and serving on the local
    school board advisory committee. She aspires to document and share the oral histories of older Black residents in Union County, and to support intergenerational programs that blend cultural heritage
    with contemporary learning. Additionally, she hopes to pursue a personal project of writing a memoir that reflects her lifelong dedication to education and community service.
