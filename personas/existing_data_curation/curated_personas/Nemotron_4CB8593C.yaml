  career_goals: Kathleen aims to pursue a stable, service‑oriented career that builds on her organizational strengths and caring nature. She plans to attend a community college after high school to study
    business administration or medical assisting, with the goal of becoming a school office administrator or a healthcare support professional. She envisions a role where she can help keep operations running
    smoothly, support colleagues, and contribute reliably to her local community while maintaining a predictable work routine.
