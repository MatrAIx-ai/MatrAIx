personas:
  professional: Kathleen Moses is a high school sophomore who volunteers at the local community garden, applying their methodical planning, reliable record‑keeping, and love for routine to schedule planting
    cycles, maintain a detailed herb journal, and quietly support the garden coordinator, reflecting their reserved but dependable nature, and they often anticipate the next planting season with quiet confidence.
  sports: Kathleen Moses enjoys low‑impact fitness such as walking the Sangamon River trail and occasional yoga, follows the Decatur High School Bulldogs football team in the fall, supports the Chicago
    Cubs (MLB) and Chicago Bulls (NBA) year‑round, and they train with the Decatur Running Club’s beginner group on Saturday mornings.
  arts: Kathleen Moses spends evenings reading contemporary novels by authors such as Sally Rooney and Celeste Ng, knits scarves while listening to acoustic tracks by Taylor Swift and Ed Sheeran, captures
    modest photographs of backyard birds in a style reminiscent of Ansel Adams’ black‑and‑white work, and they enjoy the indie film “Lady Bird” and a community production of ‘Our Town’.
  travel: Kathleen Moses prefers carefully planned road trips with family, favoring short weekend getaways to nearby Saint Louis for museum days and yearly visits to Mackinaw City, Michigan for lakefront
    relaxation, while dreaming of a summer adventure to Yellowstone National Park where they hope to photograph wildlife and hike gentle trails.
  culinary: Kathleen Moses, an avid weekend baker, delights in perfecting chocolate‑chip cookies and cinnamon‑spiced apple crumble, regularly adds fresh garden rosemary and thyme to simple pasta sauces,
    and they enjoy the occasional family dinner at a local diner that serves classic deep‑dish pizza.
  core: Kathleen Moses is a methodical teen who balances quiet journaling, meticulous garden logs, and spontaneous splurges on yarn, yet never misses a Saturday morning birdwatching session, and they often
    finish a novel before the school day ends.
background:
  cultural: Kathleen comes from a White, Midwestern background rooted in Decatur, Illinois. Her family reflects the region’s emphasis on practicality, hard work, and community ties. Growing up in a small‑city
    environment, she has been influenced by local traditions such as high school sports, church gatherings, county fairs, and a blend of agricultural and industrial heritage. These cultural cues reinforce
    her value for routine, reliability, and a supportive community, shaping her worldview and daily habits.
