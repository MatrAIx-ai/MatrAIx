personas:
  professional: Kimberly Barosy, a 40‑year‑old educator with a knack for blending visual arts into early childhood curricula, leverages their meticulous event‑planning skills and tech‑savvy lesson design
    to launch community‑based after‑school art workshops while navigating a competitive grant landscape with a healthy dose of skepticism toward new partners.
  sports: Kimberly Barosy follows the Birmingham Barons baseball team and the Alabama Crimson Tide football program, participates in a Sunday morning community‑run walking club, and plays intramural volleyball
    at the local church, balancing a love for friendly competition with a pragmatic approach to fitness.
  arts: Kimberly Barosy, a passionate watercolorist and quilt maker, regularly visits the Birmingham Museum of Art and the Sidewalk Art Center, curates jazz playlists featuring Miles Davis, Ella Fitzgerald,
    and contemporary soul artists, and draws inspiration from the storytelling traditions of oral history projects to weave cultural motifs into their textile designs.
  travel: Kimberly Barosy enjoys weekend getaways to historic Savannah, culinary tours of New Orleans for gumbo and jazz, and annual trips to the Smithsonian museums in Washington, D.C.; they prefer meticulously
    planned itineraries that balance cultural immersion with budget constraints, yet occasionally improvise a detour to a nearby hiking trail.
  culinary: Kimberly Barosy’s kitchen blends Southern comfort with garden‑fresh flavors, favoring dishes like collard‑green‑seasoned gumbo, okra‑scented fried catfish, and peach cobbler, while skillfully
    using home‑grown thyme, oregano, and basil; their cooking skill is intermediate, and they love experimenting with herbal rubs for holiday feasts.
  core: Kimberly Barosy, a 40‑year‑old arts‑focused educator, balances meticulous planning with spontaneous creativity, pursues competitive grant opportunities, manages a strategic budget, monitors hypertension,
    and channels curiosity into community‑driven cultural projects.
background:
  cultural: Kimberly is a Black woman rooted in the deep cultural tapestry of the South. Growing up in Childersburg, she was shaped by the close‑knit African‑American church community, family traditions
    of storytelling, and the legacy of the civil‑rights movement that still resonates in Talladega County. Her cultural identity is expressed through music, cuisine, and a strong sense of communal responsibility.
    She draws on the resilience and creativity of Black Southern culture to inform her teaching philosophy, artistic pursuits, and commitment to uplifting the next generation in her hometown.
