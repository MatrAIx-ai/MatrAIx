  career_goals: Kimberly aims to re‑enter the education field in a role that blends her love of the arts with community service. She plans to earn a teaching certification in early childhood education and
    launch a part‑time after‑school arts program that partners with local churches and the Childersburg community center. Over the next five years, she hopes to become a program director for a nonprofit
    focused on youth cultural enrichment, while also exploring a graduate certificate in nonprofit leadership to strengthen her fundraising and strategic planning abilities.
