persona_description: A transition counselor who specializes in helping students transition from receiving services in school to working with social service agencies. They are experienced in creating Individualized
  Transition Plans (ITPs) and Individualized Education Plans (IEPs) and understand the importance of ensuring continued services for students who need them. They have a deep understanding of the services
  provided to students in general education and special education programs, and can provide counseling assistance, setting goals, academic support, vocational and educational planning, and identification
  of vocational interests. They are also knowledgeable about the differences between ITP and IFSP and when they are used in regard to the individual student.
