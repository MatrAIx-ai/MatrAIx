  hobbies: '[''Car Restoration'', ''Woodworking'', ''Basketball (Community Leagues)'', ''Music (Hip‑hop, Gospel, R&B)'', ''Cooking Southern Cuisine'', ''Flea Market Exploration'', ''Youth Mentorship at
    Church'']'
  career_goals: Bien aspires to move from a production worker to a shift supervisor within the next two years, leveraging his leadership abilities and continuous‑improvement mindset. He plans to obtain
    his GED, followed by an associate degree in industrial technology or logistics, and to earn additional certifications such as Six Sigma Yellow Belt and Certified Production Technician. Long‑term, he
    envisions a role as a plant manager or launching his own small‑scale manufacturing venture, providing a stable future for his family and contributing to the local economy in Fort Worth.
