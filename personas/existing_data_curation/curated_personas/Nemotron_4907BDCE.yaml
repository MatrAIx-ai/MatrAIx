    and herb garden)", "Cooking Indian fusion cuisine", "Participating in a community choir"]'
  career_goals: Shayan aims to take on regional leadership within his denomination, overseeing multiple congregations and pioneering ministry models that integrate technology and scientific literacy. He
    aspires to author a book that bridges modern science with spirituality and to establish an interfaith community center offering workshops on ethics, environmental stewardship, and mental health. Additionally,
    he seeks to mentor emerging clergy, fostering a culture of curiosity and evidence‑based pastoral practice, and to expand youth programs that combine STEM education with spiritual formation.
