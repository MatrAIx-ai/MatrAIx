personas:
  professional: Shayan Kotha is a seasoned pastor who blends deep theological insight with a STEM‑driven analytical mindset, using statistical tools to evaluate community programs, orchestrating large‑scale
    interfaith events with meticulous project‑management precision, and delivering sermons that interlace scientific concepts with spiritual narratives, all while mentoring emerging clergy and championing
    evidence‑based pastoral practice.
  sports: Shayan Kotha is an avid weekend hiker with the Vernon Hills Trails Club, follows the Chicago Cubs in baseball and the Chicago Bulls in basketball, joins a casual 5‑k run organized by the church’s
    youth ministry each spring, and in winter swaps hiking for cross‑country skiing on the Lake County trails, all while maintaining a disciplined routine of morning stretches that balances their competitive
    drive with the need for physical resilience.
  arts: Shayan Kotha immerses themselves in contemporary art, regularly attending exhibitions at the Museum of Contemporary Art Chicago featuring artists like Kerry James Marshall and Yayoi Kusama, credits
    the emotive piano works of Ludovico Einaudi and the intricate brushwork of watercolorist John Marin for their creative rejuvenation, and lends their voice to a local choir that performs sacred works
    by J.S. Bach and modern pieces by Eric Whitacre, blending their love for visual, musical, and literary arts into a holistic expression of faith.
  travel: Shayan Kotha plans travel with a blend of curiosity and prudence, having trekked the ancient temples of Angkor Wat, explored the serene shores of Lake Como for culinary inspiration, and taken
    a road‑trip through the Upper Peninsula of Michigan to photograph fall foliage, while future itineraries include a pilgrimage to the monasteries of Meteora, Greece, and a science‑focused retreat in
    Iceland’s geothermal regions, all balanced against the budgetary constraints of funding ministry projects and family commitments.
  culinary: Shayan Kotha’s culinary pursuits revolve around Indian‑fusion cooking, where they experiment with paneer‑filled tacos seasoned with garam masala, craft mango‑chili chutney to accompany grilled
    corn on the cob, and perfect a cauliflower‑based tikka masala that incorporates locally harvested zucchini from their garden, while their moderate cooking skill is evident in the occasional over‑spiced
    dish and a habit of sourcing fresh herbs from the farmers’ market each Saturday.
  core: Shayan Kotha is a 47‑year‑old pastor who merges scientific rigor with artistic curiosity, runs a data‑driven ministry, and cooks Indian‑fusion dishes while balancing competitive ambition with a
    calm, methodical outlook.
background:
  cultural: Shayan was born to Indian parents who immigrated to the United States in the 1970s. Raised in a bilingual household, he celebrates South Asian festivals such as Diwali and Holi while also embracing
    his Christian faith, which he adopted during college. His cultural heritage emphasizes respect for elders, the value of education, and a strong sense of community service—principles that shape his pastoral
    approach. Living in Vernon Hills, he actively engages in multicultural events, facilitating dialogue between the Indian diaspora and the broader Midwestern community, and often incorporates Indian musical
    motifs and storytelling traditions into his sermons.
