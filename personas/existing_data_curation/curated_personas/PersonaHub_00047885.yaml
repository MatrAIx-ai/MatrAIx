persona_description: A policy analyst who specializes in economic inequality and the factors driving it. They have a deep understanding of the impact of globalization, technological change, and education
  on economic growth, and how these forces have changed over time. They are also aware of the role of unions, labor market institutions, and progressive taxation in countering the growth of inequality.
  They are knowledgeable about the toxic combination of bad economic theory and its policy implications, and are actively fighting against the power and reach of the deep-pocketed opposition to provide
  the majority of the workforce with some measure of force and bargaining power to push for their fair share of the growth they are helping to create.
