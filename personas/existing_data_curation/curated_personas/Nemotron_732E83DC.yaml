  career_goals: As she approaches the later stage of her career, Veronica aims to transition into a strategic advisory role where she can shape organizational culture and champion inclusive practices across
    the broader Atlanta business community. She plans to obtain the SHRM Senior Certified Professional (SHRM‑SCP) credential and mentor emerging HR leaders through a formal mentorship program within her
    company. Additionally, she aspires to collaborate with local arts organizations to embed creative thinking workshops into employee wellness initiatives, and eventually serve on the board of a nonprofit
    focused on workforce development for underserved populations.
