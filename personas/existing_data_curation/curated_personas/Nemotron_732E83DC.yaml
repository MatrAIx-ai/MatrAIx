personas:
  professional: Veronica Willis is a seasoned human‑resources executive with over three decades of experience, known for turning data‑driven insights from Workday and SAP SuccessFactors into people‑focused
    strategies; their methodical, organized nature and love of creative problem‑solving drive them to mentor emerging HR leaders, design inclusive culture frameworks, and pursue a SHRM‑SCP credential as
    they prepare to advise Atlanta’s broader business community.
  sports: Veronica Willis follows the Atlanta Braves and Falcons avidly, attends home games at Truist Park when possible, and balances their love for competition with a weekly morning yoga class at a downtown
    studio, a monthly senior‑friendly tennis league at the local park, and occasional hikes along the Appalachian Trail during fall weekends.
  arts: Veronica Willis is a watercolor enthusiast who sketches the architecture of the High Museum of Art and the vibrant street murals of the Old Fourth Ward, drawing inspiration from the bold colors
    of Georgia O’Keeffe and the soulful improvisations of Miles Davis; they attend monthly poetry readings featuring contemporary voices like Ocean Vuong, and take piano lessons every other Thursday, where
    they attempt pieces by Debussy.
  travel: Veronica Willis favors weekend road trips that blend scenic drives along the Blue Ridge Parkway with culinary stops at farm‑to‑table restaurants in Asheville, Charleston, and New Orleans; they
    prefer boutique B&Bs over chains, plan itineraries on a whiteboard calendar, and keep a travel journal where they sketch each new landscape, dreaming of a future art‑focused retreat in Santa Fe.
  culinary: Veronica Willis enjoys cooking with native Georgia ingredients such as okra, collard greens, and pecans, often preparing Southern‑style shrimp and grits or a quinoa‑couscous salad drizzled with
    locally sourced honey; their culinary curiosity leads them to experiment with Ethiopian injera and Japanese miso soup on weeknight dinners, while their modest baking skill shines through occasional
    almond‑cake experiments that sometimes end up too dry.
  core: Veronica Willis, a meticulous HR veteran with a passion for watercolor and jazz, balances a disciplined retirement portfolio with spontaneous cultural outings, and they quietly battle a habit of
    last‑minute bill payments.
background:
  cultural: Veronica is a white American who grew up in the Southeast and has spent the majority of her adult life in Atlanta, Georgia. Her upbringing reflects traditional Southern values of hospitality,
    community service, and respect for history, while her professional and personal experiences have cultivated a progressive outlook. Immersed in Atlanta's vibrant multicultural environment, she embraces
    the city's rich artistic scene, Southern cuisine, and evolving social dynamics. She values inclusivity and often integrates the region's cultural heritage into her work and personal pursuits, bridging
    classic Southern traditions with contemporary, diverse perspectives.
