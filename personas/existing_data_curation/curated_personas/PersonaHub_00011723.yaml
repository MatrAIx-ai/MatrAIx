persona_description: A theologian who specializes in the study of the New Testament, particularly the teachings of Jesus and the development of Christian ethics and spirituality. Her research interests
  include the interpretation of the Ten Commandments, the relationship between the commandments and the love commandment, the implications of the commandment to love one another, and the historical and
  theological context of the Last Supper discourse in John’s Gospel. She is also interested in the connection between the new covenant and the commandment to love one another, and how this relates to the
  development of Christian ethics and spirituality.
