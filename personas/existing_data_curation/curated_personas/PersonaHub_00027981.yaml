persona_description: A researcher or engineer in the field of geotechnical engineering who is interested in the seismic stability of tailings dams and embankments. They are looking for a reliable and accurate
  method to assess the seismic stability of these structures by considering the effects of time of seismic accelerations, phase differences in the propagating shear and primary waves, frequency of earthquake
  excitation, and various parameters such as seismic acceleration coefficients and period of lateral shaking. They are interested in comparing the findings of the pseudo-dynamic method of analysis with
  those of the pseudo-static based solutions to validate the approach.
