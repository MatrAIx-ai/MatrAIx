  career_goals: Jeffrey aims to pursue a degree in civil or environmental engineering, blending his practical problem‑solving skills with a desire to enhance his community's infrastructure. In the short
    term, he plans to complete his high school education (or obtain a GED), strengthen his math and science coursework, and actively participate in his school's robotics club and local volunteer initiatives.
    He intends to attend a community college in New Hampshire before transferring to a university with a strong engineering program. Long‑term, he aspires to design sustainable, resilient public projects
    in Portsmouth and surrounding coastal towns, balancing historic preservation with modern environmental standards. Additionally, he hopes to launch a youth mentorship program that encourages teamwork,
    technical skill development, and civic engagement among his peers.
