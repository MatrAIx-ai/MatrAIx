personas:
  professional: Carmen Alarcon, an aspiring Business Analytics student at a Utah university, blends bilingual communication, meticulous Excel data management, and project‑planning precision to assist a
    local startup’s bilingual market research while confidently asserting ideas in team meetings.
  sports: Carmen Alarcon hits the Wasatch trails every Saturday with the Orem Hiking Club, cheers for the Utah Jazz and Real Salt Lake, and maintains fitness through a mix of weekend hikes, occasional yoga
    sessions, and a modest weekly membership at the university’s indoor climbing gym.
  arts: Carmen Alarcon channels creative energy by playing acoustic guitar at open‑mic nights, drawing inspiration from folk icons such as Joni Mitchell and contemporary lyricists like Bon Iver, while devouring
    graphic novels by Neil Gaiman and sci‑fi works from authors like N.K. Jemisin, which together shape their lyrical storytelling style.
  travel: Carmen Alarcon plans weekend getaways to Zion and Bryce Canyon with meticulous itineraries, dreams of exploring the Day of the Dead festivities in Oaxaca and the cherry blossom season in Kyoto,
    and balances budget travel with occasional splurges on cultural festivals that align with their love of vibrant traditions.
  culinary: Carmen Alarcon, an intermediate home chef, perfects mole poblano and tamales with a Utah twist—such as green‑chili‑infused barbecue ribs—while savoring ingredients like chipotle, local sage,
    and fresh cilantro, and frequently experiments with fusion dishes that marry Mexican spice palettes with the mountain state's seasonal produce.
  core: Carmen Alarcon is a 19‑year‑old bilingual analyst‑in‑training who fuses disciplined data work with a love of mountain hikes, midnight tacos, and spontaneous guitar jam sessions, even though they
    sometimes procrastinate on laundry and binge‑watch sci‑fi marathons.
background:
  cultural: Carmen was raised in a Mexican‑American household where family gatherings, respect for elders, and the celebration of holidays like Día de los Muertos and Cinco de Mayo are central. Bilingualism
    is a daily practice, and she grew up hearing a mix of Mexican folklore and modern American pop culture. Moving to Orem, Utah, introduced her to a predominantly LDS community, fostering an appreciation
    for diverse religious and cultural perspectives. She blends her Mexican heritage—through cuisine, language, and community involvement—with the outdoor, nature‑focused lifestyle of Utah, creating a unique
    bicultural identity that informs both her personal values and professional aspirations.
attributes:
  skills: '[''Spanish-English bilingual communication'', ''Microsoft Office Suite (Excel, Word, PowerPoint)'', ''Data entry and database management'', ''Basic statistical analysis'', ''Project planning
    and timeline management'', ''Customer service'', ''Event coordination'', ''Budgeting and bookkeeping'', ''Problem solving'', ''Adaptability to new software tools'']'
  hobbies: '[''Cooking traditional Mexican dishes and experimenting with fusion recipes'', ''Hiking in Wasatch Mountains, Utah'', ''Reading contemporary science fiction and graphic novels'', ''Playing acoustic
    guitar and singing folk songs'', ''Volunteering as an ESL tutor for newcomers'', ''Yoga and meditation'', ''Photography, especially landscape and street photography'', ''Participating in community cultural
    festivals'']'
  career_goals: Carmen aims to transfer her associate's credits into a bachelor’s program in Business Analytics or Information Systems at a Utah university, with the goal of graduating within three years.
    She plans to secure an internship at a Silicon Slopes startup where she can apply her data organization and project‑management skills while gaining exposure to larger‑scale analytics. In the long term,
    she envisions becoming a Business Analyst or Operations Coordinator for a company that serves bilingual markets, allowing her to blend her cultural insight with analytical expertise. She also harbors
    a side ambition to launch a small consultancy that helps local businesses develop culturally resonant marketing strategies for the Latinx community in Utah.
