personas:
  professional: A curious fourth‑grader, Tammie channels their love of building LEGO cities and simple experiments into an aspiring junior scientist role, eagerly sharing discoveries with classmates and
    balancing imaginative ideas with methodical steps.
  sports: Tammie, a spirited member of the Shelby Youth Soccer Club, loves dribbling on the community fields, cheers for the Cleveland Browns during football season, and follows the Cleveland Guardians
    as local baseball heroes, and they regularly practice the school recorder to stay in rhythm during team chants.
  arts: Tammie delights in doodling landscapes inspired by the woods of Sandusky River Park, and they enthusiastically play the school recorder to the tunes of Disney classics like Let It Go, while devouring
    the Magic Tree House adventure books and admiring the colorful illustrations of Dr. Seuss.
  travel: Tammie enjoys family road trips to nearby Cedar Point amusement park and the historic Amish country in Lancaster, dreaming of a future adventure to the Grand Canyon, and they prefer the excitement
    of exploring new playgrounds over long, quiet flights.
  culinary: Tammie loves the comfort of mac and cheese, the zest of homemade chicken tacos seasoned with a pinch of cumin learned from a relative, and the sweetness of strawberry shortcake, and they often
    help stir batter for birthday cupcakes while occasionally sneaking extra chocolate chips.
  core: Tammie blends boundless curiosity with a practical streak, tackling LEGO constructions, soccer drills, and science experiments with equal vigor, while occasionally letting impulsive sticker purchases
    and forgotten inhalers add a relatable childlike charm.
background:
  cultural: Tammie is a white child raised in the small Midwestern community of Shelby, Ohio. Her family lives in a close‑knit neighborhood where community events such as the Richland County fair, school
    festivals, and holiday gatherings are a regular part of life. Although her surname reflects some Hispanic ancestry, her upbringing is rooted in typical American Midwestern traditions—celebrating Thanksgiving
    with a turkey dinner, decorating for Christmas, and enjoying summer picnics at local parks. She occasionally hears Spanish words and recipes from relatives, adding a subtle multicultural layer to her
    otherwise quintessential Ohio childhood.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic (addition/subtraction)'', ''Team sports coordination (soccer)'', ''Creative drawing and coloring'', ''LEGO building and spatial reasoning'', ''Following
