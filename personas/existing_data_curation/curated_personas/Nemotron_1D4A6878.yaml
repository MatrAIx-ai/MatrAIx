  hobbies: '[''Soccer'', ''Exploring nature (woods and ponds)'', ''LEGO building'', ''Reading adventure books'', ''Drawing and coloring'', ''Playing the recorder'', ''STEM club experiments'']'
  career_goals: Tammie dreams of becoming a teacher who can share her love of stories and science, a veterinarian who cares for animals she meets at the local farm, and an astronaut who explores the stars—goals
    that reflect her curiosity, love of helping others, and desire to be part of a team.
