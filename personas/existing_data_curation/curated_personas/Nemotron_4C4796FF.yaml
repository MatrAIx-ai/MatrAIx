personas:
  professional: A miniature builder who transforms cardboard boxes into imagined skyscrapers, Tommie Mayes delights in arranging blocks and puzzles, they demonstrate a quiet, methodical focus that balances
    curiosity with practicality while preferring solitary play.
  sports: Tommie Mayes dons a tiny New York Yankees cap while toddling through Westchester Little Soccer League practices, they prefer gentle games of toss‑ball over loud scrimmages, and they quietly cheer
    for Aaron Judge during televised games, showing a calm yet enthusiastic approach to sports.
  arts: Tommie Mayes thrives in the community arts program at the local library, where they spend quiet afternoons drawing vivid scenes to classic jazz tunes by Louis Armstrong and softly moving to clean‑cut
    hip‑hop beats, nurturing a budding creative identity.
  travel: Tommie Mayes enjoys weekend trips to the Bronx to visit grandparents, delights in short drives to Bear Mountain for stroller‑friendly hikes, and dreams of a future family vacation to Disneyland,
    blending a love for familiar community outings with a budding curiosity for distant adventures.
  culinary: Tommie Mayes prefers mellow comfort foods like creamy mac and cheese, crispy chicken nuggets, and sweet potato fries, yet they also show a surprising palate for collard greens and cornbread
    at Sunday family meals, often helping to stir the pot with a tiny wooden spoon.
  core: Tommie Mayes embodies a quiet, inquisitive spirit who loves solitary play, meticulously lines up toys, enjoys gentle rhythms, yet they can be fussy about bedtime stories and occasionally refuse
    to share snacks.
background:
  cultural: Tommie is raised in a close‑knit African American family that has deep roots in the Bronx while now living in Westchester County. Family life centers around Sunday church gatherings, communal
    meals featuring soulful cuisine, and storytelling that connects him to his ancestors. He is exposed to a mix of urban and suburban cultural influences, including classic hip‑hop, jazz, and community
    arts programs that celebrate Black heritage and foster a sense of belonging.
