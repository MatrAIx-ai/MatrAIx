  hobbies: '[''Oil painting'', ''Watercolor painting'', ''Sketching'', ''Reading art history and philosophy'', ''Gardening heirloom vegetables'', ''Birdwatching'', ''Chess'', ''Small book club participation'',
    ''Woodworking'', ''Listening to classical music'', ''Visiting art museums'']'
  career_goals: Although formally retired, Michael seeks to channel his curiosity and competitive drive into meaningful personal projects. He aims to complete a series of oil paintings depicting Iowa's
    prairie and farm scenes, and to organize a small local exhibition to gain recognition among regional artists. He plans to write and self‑publish a memoir that intertwines his life story with reflections
    on art, history, and unconventional ideas, targeting a niche audience of fellow retirees. Michael also wishes to mentor a select group of peers in woodworking and to contribute regular articles to the
    Creston Historical Society newsletter. In the next five years, he hopes to travel to three major art museums—such as the Art Institute of Chicago, the Metropolitan Museum of Art, and the Smithsonian
    American Art Museum—to broaden his artistic perspective. Finally, he intends to adopt mindfulness practices to better manage his stress and negative emotions.
