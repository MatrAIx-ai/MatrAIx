  skills: '[''Critical thinking'', ''Skeptical analysis'', ''Problem solving'', ''Mechanical repair'', ''Woodworking'', ''DIY home maintenance'', ''Basic computer literacy'', ''Spreadsheet (Excel) proficiency'',
