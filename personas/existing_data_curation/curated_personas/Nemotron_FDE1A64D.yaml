  career_goals: Rahul aims to advance to the rank of Sergeant within the next three years, followed by a Lieutenant position overseeing community affairs. He aspires to design and implement a citywide arts‑based
    outreach program that fosters trust between police and residents, and to complete advanced leadership training at the FBI National Academy. Long‑term, he envisions a role in state‑level policy development
    focused on community policing and mental‑health support for officers.
