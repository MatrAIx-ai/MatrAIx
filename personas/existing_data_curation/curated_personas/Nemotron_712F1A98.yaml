  hobbies: '["Chinese calligraphy", "Tea brewing and appreciation", "Vegetable and herb gardening", "Cooking and sharing traditional meals", "Walking in parks", "Reading historical fiction and Chinese literature",
    "Playing mahjong with a small circle", "Listening to traditional Chinese opera", "Watching classic black‑and‑white films", "Solving crosswords and Sudoku"]'
  career_goals: At 84, Meng's primary ambition is to preserve and share his cultural heritage while maintaining his independence and health. He hopes to document his family’s recipes in a handwritten notebook
    for future generations, mentor younger members of the local Chinese community in cooking and gardening, and volunteer occasionally at the neighborhood cultural center to lead small, informal workshops.
    He also aims to stay physically active through his garden, keep his routine stable, and ensure he remains socially connected through quiet gatherings with a close circle of friends.
