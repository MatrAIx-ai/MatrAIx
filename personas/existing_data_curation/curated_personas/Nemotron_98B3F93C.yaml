personas:
  professional: Joey Machado, a 14‑year‑old aspiring aerospace hobbyist, channels curiosity and methodical planning into designing model airplanes and coding simple flight simulators, and they treat each
    project like a mini‑engineering lab.
  sports: Joey Machado, a member of the Rainsville Middle School cross‑country team, dedicates Saturday mornings to trail runs in the Appalachian foothills, roots for the Alabama Crimson Tide on football
    Sundays, and reserves a spot on the local youth baseball league’s dugout during the summer season.
  arts: Joey Machado, who finds solace in strumming acoustic versions of John Denver’s “Take Me Home, Country Roads” while sketching sunrise vistas over the surrounding hills, also devours classic science‑fiction
    novels and follows indie folk artist Sufjan Stevens for lyrical inspiration.
  travel: Joey Machado, who plans vacations around low‑key nature spots, has hiked the trails of the Great Smoky Mountains on a family camping trip and hopes to explore the historic streets of Asheville,
    North Carolina, while a future goal includes a school‑organized visit to the Kennedy Space Center in Florida.
  culinary: Joey Machado, who relishes the crispy, golden‑battered fried chicken and buttery buttermilk biscuits served at Sunday family gatherings, also enjoys experimenting with homemade apple‑cinnamon
    pancakes and keeps a well‑stocked spice rack featuring paprika, garlic powder, and dried thyme for occasional culinary adventures.
  core: Joey Machado, a quietly curious 14‑year‑old engineer‑in‑training, balances a love for solitary tinkering with an unusually organized habit of chronicling every hobby expense in a ledger, yet they
    often forget to water the backyard bird feeder when caught up in a new code sprint.
background:
  cultural: Joey was raised in Rainsville, a small town in northeastern Alabama, within a family that reflects traditional Southern white culture. Family life centers around church (Baptist), community
    events like county fairs, and gatherings featuring home‑cooked meals such as fried chicken and biscuits. Though his surname, Machado, hints at distant Portuguese roots, his upbringing is steeped in
    Southern values of hospitality, respect for elders, self‑reliance, and an appreciation for the natural landscape of the Appalachian foothills.
