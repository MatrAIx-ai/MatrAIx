personas:
  professional: Dana Cleary is a preschool explorer who transforms daily play into spontaneous science experiments, building block towers while asking endless "why" questions that showcase their innate
    curiosity, and they happily embrace the resulting mess as part of the learning process.
  sports: Dana Cleary is a playground enthusiast who loves the local park’s slides and swings, participates in a toddler soccer group that dons the Seattle Sounders junior colors, and cheerfully waves at
    the Seattle Sounders during family TV time.
  arts: Dana Cleary is a budding visual artist who spends afternoons finger‑painting with non‑toxic paints, loves listening to children’s musician Raffi, and is fascinated by Pixar’s "Finding Nemo," reflecting
    an early appreciation for varied artistic experiences.
  travel: Dana Cleary is a curious little traveler who has visited the family’s weekend beach getaway at Santa Monica and the nearby state zoo, dreams of seeing New York City’s Times Square, and prefers
    spontaneous short trips over long‑planned vacations.
  culinary: Dana Cleary loves the taste of mac and cheese with a sprinkle of cheddar, enjoys dipping carrot sticks in hummus, and is an enthusiastic junior helper who can stir batter but frequently drops
    the spoon, showcasing culinary curiosity mixed with typical toddler messiness.
  core: Dana Cleary is a delightfully curious three‑year‑old who blends a love for messy play, spontaneous learning, and gentle kindness while navigating the world with an easygoing, slightly disorganized
    charm.
background:
  cultural: Dana lives in San Antonio, Texas, where a vibrant blend of Mexican and Texan traditions enriches daily life. Though her family background is white and follows typical American customs, she regularly
    experiences the city’s multicultural atmosphere through community festivals, Spanish-language songs, and local foods. This exposure adds a layer of cultural curiosity to her upbringing.
