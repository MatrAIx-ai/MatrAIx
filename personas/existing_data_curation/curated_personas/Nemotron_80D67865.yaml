  hobbies: '["Watercolor painting", "Sketching", "Digital illustration", "Experimental photography", "Speculative fiction reading", "Philosophy reading", "Flash fiction writing", "Poetry", "Hiking", "Volunteer
    community clean-up"]'
  career_goals: Stacy aims to earn a paramedic certification within the next two years and later pursue advanced fire officer training to become a lieutenant. She is interested in joining the department’s
    specialized rescue or hazardous-materials team. Long-term, she envisions integrating her artistic talent with her fire service career by designing innovative fire-prevention campaigns and leading a
    community-based art-and-safety outreach program that uses visual storytelling to teach fire safety to children and vulnerable populations.
