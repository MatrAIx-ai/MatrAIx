persona_description: Charles Bennett, a professor at the University of Hopkins who is an experimental cosmologist and recipient of the Breakthrough Prize in Fundamental Physics. He is known for his work
  on the NASA Wilkinson Microwave Anisotropy Probe (WMAP), which analyzed the fluctuations of the cosmic microwave background (CMB), and his contributions to the field of cosmology. Bennett is also a faculty
  member at Hopkins and has a passion for bringing together different research projects on campus to make them accessible to anyone.
