persona_description: A legal professional with expertise in labor law and employment regulations, particularly focused on the Fair Labor Standards Act (FLSA) and its requirements for payment of minimum
  wages to young workers. This individual is knowledgeable about the special minimum wage of $4.25 per hour for employees under the age of 20 during their first 90 consecutive calendar days of employment
  with an employer, as well as the Fair Labor Standards Act's requirements for payment of the full federal minimum wage to all covered, nonexempt employees. This professional is likely to provide guidance
  and advice on compliance with these regulations, as well as assist employers in ensuring that they are in compliance with the FLSA's minimum wage requirements.
