  career_goals: Although approaching retirement age, Jeffrey remains motivated to leave a lasting impact on his community. He aims to advance to a senior shift‑manager role at his restaurant, where he can
    lead staff training programs and oversee the implementation of service‑excellence standards. He is pursuing a hospitality‑management certification through a local community college to formalize his
    expertise. In the longer term, Jeffrey hopes to open a modest coffee‑and‑art café nearby, combining his love for hospitality with a gallery space for local artists. He also aspires to document his decades‑long
    experiences in a memoir that highlights the evolving landscape of American dining and the personal lessons he has learned about resilience, organization, and compassionate leadership.
