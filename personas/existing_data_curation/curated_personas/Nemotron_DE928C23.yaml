  hobbies: '[''Painting'', ''Sketching'', ''Digital Art'', ''Reading Speculative Fiction'', ''Philosophy'', ''Piano Playing'', ''Salsa Dancing'', ''Cooking Cuban Cuisine'', ''Community Soccer'', ''Bilingual
    Youth Mentorship'', ''Museum Visits'', ''Mindfulness Meditation'']'
  career_goals: He aims to complete a master's degree in Educational Leadership, obtain advanced certification in bilingual education, and within five years become a curriculum specialist or instructional
    coach focusing on STEAM and arts integration. Long-term, he aspires to a school principal role where he can champion innovative, student‑centered learning environments and embed robust mental health
    supports. He also hopes to secure grant funding to develop a community‑based after‑school arts program.
