personas:
  professional: Alfredo Aguado, a 28‑year‑old bilingual classroom teacher, blends a vivid imagination with methodical lesson planning to deliver arts‑infused STEAM curricula, leads collaborative projects,
    mentors peers, and balances their outgoing energy with a persistent worry about meeting every student’s needs.
  sports: Alfredo Aguado, a dedicated participant in a local co‑ed soccer league, stays fit through weekly matches and morning jogs, cheers for Inter Miami CF and the Miami Dolphins, and balances competitive
    play with a relaxed appreciation for Miami’s beach volleyball tournaments during summer.
  arts: Alfredo Aguado, a passionate painter and experimental digital artist, spends evenings sketching surreal landscapes inspired by the works of Frida Kahlo and Yayoi Kusama, performs piano improvisations
    at community salsa nights echoing the rhythms of Tito Puente, and devours speculative fiction by authors like N K Jemisin while contemplating philosophical treatises by Simone de Beauvoir.
  travel: Alfredo Aguado, an adventurous traveler who prefers curated cultural itineraries, has explored the street art scene of Berlin, the culinary markets of Oaxaca, and routinely visits Miami’s Caribbean
    festivals, while dreaming of attending the Venice Biennale and a quiet retreat in Kyoto’s Zen gardens.
  culinary: Alfredo Aguado, an avid home chef, reimagines traditional island‑inspired dishes such as plantain‑and‑yucca mofongo with a quinoa twist, skillfully balances flavors of lime, cilantro, and smoked
    paprika, and delights in sourcing fresh seafood, avocados, and heirloom tomatoes for their weekly family‑style meals.
  core: Alfredo Aguado, the imaginative yet worry‑prone educator who meticulously plans lessons while habitually over‑scheduling art projects and midnight sketch sessions, embodies a blend of creative fervor
    and organized diligence.
background:
  cultural: Alfredo grew up in a close‑knit Cuban‑American neighborhood in Miami, fluent in both Spanish and English, and steeped in traditions such as music, dance, and cuisine from his parents' homeland.
    He celebrates cultural festivals like Carnaval and the Calle Ocho Parade, maintains strong familial ties, and values the collective spirit of the Cuban diaspora. While embracing his heritage, he also
    navigates the broader multicultural fabric of Miami, blending Cuban customs with contemporary American influences in his teaching and daily life.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning'', ''Bilingual Instruction'', ''Arts Integration'', ''Educational Technology'', ''Curriculum Development'', ''Differentiated Instruction'', ''Data-Driven
