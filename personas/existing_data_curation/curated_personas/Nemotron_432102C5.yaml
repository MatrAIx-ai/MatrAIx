  career_goals: Mariana is determined to formalize her experience by completing her GED and obtaining the Texas Certified Teacher Assistant credential. She hopes to advance to a lead aide position where
    she can design and oversee art‑focused enrichment programs for elementary students. Long‑term, she envisions taking coursework in counseling or social work to become a school‑based mentor, using her
    compassionate nature to support at‑risk youth and promote mental‑wellness. She also aspires to lead community workshops that blend cultural heritage with creative expression, strengthening ties between
    the school and the local Hispanic community.
