  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Listening to Mexican folk music'', ''Cooking Mexican dishes'', ''Playing poker'', ''Digital strategy gaming'', ''Urban photography'', ''Reading
    speculative fiction'', ''Mindfulness meditation'']'
  career_goals: Miguel aims to move beyond his entry‑level role and eventually become a floor manager or compliance specialist at a casino, where he can improve the player experience and promote responsible
    gambling. He plans to earn his GED and enroll in a community‑college program in hospitality or business administration. In the longer term, he hopes to combine his passion for art with his industry
    experience by curating themed art installations and designing visually engaging gaming environments. He also wants to develop skills in mental‑health first response to support colleagues and patrons
    dealing with gambling‑related stress.
