personas:
  professional: Miguel Menendez, a 22‑year‑old budding casino floor associate with a knack for rapid mental arithmetic, bilingual customer service and an eye for visual design, leverages his adaptability
    and creative thinking to smooth high‑volume transactions while spotting risk patterns and problem‑gambling behavior.
  sports: Miguel Menendez, a 22‑year‑old casual sports enthusiast who tunes into the Las Vegas Raiders on Sundays, follows the Golden Knights’ hockey season and joins a weekly pick‑up basketball league
    at a community center, using these outings to unwind from the casino floor hustle.
  arts: Miguel Menendez, a 22‑year‑old avid explorer of the local art scene, spends weekends sketching vibrant street murals, frequents the contemporary gallery downtown, and curates playlists featuring
    folk music and contemporary Latin artists like Lila Downs, Natalia Lafourcade and J Balvin, letting the rhythms and colors inform his own graphic design experiments.
  travel: Miguel Menendez, a 22‑year‑old wanderlust‑infused traveler who has visited a bustling metropolis renowned for its vivid mural districts, explored a historic colonial town celebrated for its rich
    culinary traditions, and dreams of backpacking through a South American capital famed for its tango culture, all while balancing travel plans with a modest budget and his work schedule.
  culinary: Miguel Menendez, a 22‑year‑old home‑cooking enthusiast who reimagines classic mole poblano with roasted cacao and espresso, whips up avocado‑lime tacos al pastor using pineapple‑infused pork,
    and experiments with chilaquiles topped with smoked paprika, all while keeping a modest pantry of staples like corn masa, chiles and fresh herbs.
  core: Miguel Menendez, a 22‑year‑old blending restless curiosity for art and risk with an anxiously reactive mind, juggles casino floor duties, sketchbooks and midnight poker games while dreaming of curating
    immersive gaming spaces.
background:
  cultural: Miguel grew up in a Mexican household where Spanish was spoken daily and cultural traditions such as Día de los Muertos, quinceañeras, and family fiestas were celebrated. Living in Fairfield,
    Ohio, he maintains strong ties to his heritage through cooking, music, and participation in local Hispanic community events. He balances Mexican values of familia, respeto, and communal celebration
    with the more individualistic, flexible lifestyle of the Midwest, often feeling a blend of pride in his roots and curiosity about new cultural experiences.
