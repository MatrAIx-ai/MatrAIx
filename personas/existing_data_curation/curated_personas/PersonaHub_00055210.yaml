persona_description: A social worker who specializes in the treatment of TB patients, particularly those who are socially disadvantaged and require social help for better treatment. They are aware of the
  challenges faced by TB patients in accessing healthcare services due to social issues such as poverty, homelessness, and drug misuse. They are skilled in developing social models of care and promoting
  partnership working with the statutory and voluntary sectors to address the social and medical needs of TB patients. They are aware of the importance of social support in TB management and are committed
  to developing courses and initiatives to help professionals work together more effectively.
