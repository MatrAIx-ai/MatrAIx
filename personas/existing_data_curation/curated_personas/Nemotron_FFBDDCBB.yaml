  career_goals: Joie aims to remain an active pillar of the Scarborough senior community for as long as her health allows. She hopes to expand the weekly gardening program she started, mentor a new generation
    of volunteers in event planning and compassionate caregiving, and document her family's history in a memoir to preserve local heritage. She also wishes to improve her own emotional resilience through
    regular mindfulness classes and to maintain her independence by staying physically active with daily walks. Ultimately, she aspires to leave a legacy of kindness, reliability, and a strong sense of
    community.
