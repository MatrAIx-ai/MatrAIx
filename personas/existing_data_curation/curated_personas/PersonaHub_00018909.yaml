persona_description: A scientist who studies the chemistry and isotopic composition of water in forested headwater catchments, specifically focusing on the sources of stream water sulfate (SO42-) concentrations.
  This scientist uses a combination of hydrological, chemical, and isotopic approaches to investigate the causes of peak SO42- concentrations in stream water and the sources of these concentrations, including
  the contribution of secondary sulfide minerals in C-horizons to the overall SO42- source. The scientist aims to provide evidence for a quantitative assessment of the sources of stream water SO42- in forested
  watersheds by combining hydrological, chemical, and isotopic techniques.
