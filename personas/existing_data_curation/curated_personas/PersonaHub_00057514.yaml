persona_description: A geneticist who specializes in studying the inheritance patterns of limb deficiency defects, particularly in the context of their genetic disorders and recognized associations. They
  have a deep understanding of the clinical presentation of these defects and their potential causes, including teratogen drugs, amniotic band sequence, and 2q31, 6q21, 7q21-q22, 4q, and 4q33 deletions
  and 4q deletions. They have experience in conducting population studies and have published research on congenital abnormalities associated with limb deficiency defects.
