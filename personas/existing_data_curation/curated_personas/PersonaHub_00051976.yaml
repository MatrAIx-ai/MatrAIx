persona_description: A historian and scholar who specializes in the study of World War II and the Holocaust, particularly the ghettos and their inhabitants. They are interested in the detailed research
  and analysis of the various ghettos and their experiences during the Holocaust, including their location, wartime name, and geographical coordinates. They have extensive knowledge of the institutional
  life, terror and killing operations, underground resistance, and the number of survivors at liberation, and they have experience in writing detailed entries on the various ghettos. They are likely to
  be a member of a scholarly community or organization dedicated to the study of the Holocaust and its aftermath, and they are interested in contributing to the field through their research and writing.
