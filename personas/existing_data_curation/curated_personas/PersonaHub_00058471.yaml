persona_description: A fish biologist who specializes in the study of largemouth bass, particularly the ShareLunker breeding program. He/she has extensive experience with genetic analysis, selective breeding,
  and the implementation of conservation regulations. The persona is knowledgeable about the history and development of the ShareLunker program, the techniques used for DNA testing, and the impact of the
  program on Texas bass fishing. The persona is also interested in the genetic traits that allow Florida largemouth bass to achieve unusually large size and the relationships among ShareLunker fish.
