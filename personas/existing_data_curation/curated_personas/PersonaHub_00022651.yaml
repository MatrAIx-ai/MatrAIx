persona_description: A university professor who specializes in prehistoric archaeology, particularly in the study of Mesolithic human remains and the reconstruction of ancient faces. His research interests
  include the development of new techniques for the reconstruction of ancient faces and the use of these reconstructions to study the social and cultural history of ancient peoples. He is also known for
  his work on the Theopetra Cave excavations and his involvement in the development of new methods for the study of Mesolithic human remains.
