  career_goals: Antoinisha aims to launch a youth sports academy in Los Angeles that blends athletic training with artistic and creative workshops, offering underserved children holistic development opportunities.
    She aspires to become a head scout for a major professional league team, using her nuanced eye for talent to shape the future of the sport. Long‑term, she plans to earn her GED and pursue certification
    in sports management, empowering her to influence policy and design programs that expand equitable access to sports resources.
