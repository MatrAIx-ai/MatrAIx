personas:
  professional: Antoinisha Smith is a seasoned sports coach and talent scout who blends rigorous performance assessment with creative, art‑infused training techniques, leveraging her community‑center outreach
    experience and a flexible, curiosity‑driven mindset to mentor athletes in Los Angeles, they thrive on spotting talent in pick‑up games and channel competitive drive into strategic game planning, all
    while honoring community traditions like Juneteenth gatherings.
  sports: Antoinisha Smith is an avid pick‑up basketball player who roots for the Los Angeles Lakers and Dodgers, participates in weekend yoga classes, and maintains a flexible fitness schedule that balances
    competitive training sessions at the community center with spontaneous street‑ball games, even when occasional disorganization leads to missed practice slots.
  arts: Antoinisha Smith frequently explores contemporary galleries like The Broad, draws inspiration from street‑murals by artists such as Kehinde Wiley, attends live jazz sets featuring Kamasi Washington
    and spoken‑word shows by Saul Williams, and weaves these creative experiences into her coaching philosophy, often reflecting on Juneteenth celebrations that bring the community together.
  travel: Antoinisha Smith prefers spontaneous road trips along the Pacific Coast, has already visited Santa Barbara and the historic jazz district of New Orleans, dreams of exploring Caribbean islands
    that echo family recipes, and typically books flights a week ahead, balancing limited budget with a desire for cultural immersion.
  culinary: Antoinisha Smith experiments with Caribbean‑infused dishes like jerk‑spiced chicken tacos, collard greens seasoned with smoked paprika, and sweet‑potato pie flavored with nutmeg, often using
    ingredients such as scotch bonnet peppers, plantains, and black‑eyed peas to craft meals that celebrate her family’s culinary roots.
  core: Antoinisha Smith is a curiosity‑driven, art‑infused sports mentor who balances a competitive edge with a laid‑back, community‑centric lifestyle, occasionally misplacing spreadsheets but never missing
    a basketball game.
background:
  cultural: Antoinisha is an African‑American woman raised in South Los Angeles, steeped in the traditions of Black West Coast culture. Her upbringing was shaped by the rhythms of hip‑hop, gospel music
    from the local church, and the storytelling heritage of her family, which includes Caribbean roots reflected in her middle name, Shanta. She celebrates milestones like Juneteenth and Kwanzaa, participates
    in community block parties, and stays connected to the broader diaspora through cultural festivals and the visual arts. This rich cultural tapestry informs her coaching style, emphasizing resilience,
    community, and creative expression.
