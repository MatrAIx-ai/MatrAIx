  career_goals: Looking ahead, George aims to compile his family's oral history and photographs into a self-published memoir that celebrates three generations of Black experience in the Midwest. He plans
    to launch a series of storytelling and imagination workshops at the local senior center, encouraging participants to explore abstract art and creative writing. He hopes to serve as a docent for the
    Sauk County Historical Society, developing a permanent exhibit on African American contributions to the area. Over the next five years he intends to travel to key historical sites such as the National
    Museum of African American History and Culture in Washington, DC, and several former Underground Railroad locations in Ohio. He also aspires to learn the saxophone and record a small collection of folk-jazz
    pieces, while mentoring at least three young people in digital archiving and community activism.
