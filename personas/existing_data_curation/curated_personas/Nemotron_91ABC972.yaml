  hobbies: '[''Knitting and crocheting'', ''Herb and vegetable gardening'', ''Walking and birdwatching'', ''Reading contemporary fiction'', ''Journaling'', ''Small book club participation'', ''Baking simple
    desserts for neighbors'', ''Listening to bluegrass and folk music'', ''Crossword and jigsaw puzzles'']'
  career_goals: Brandi aims to obtain her GED within the next year to formalize her education and open up part‑time volunteer opportunities. She hopes to become a certified peer‑support specialist, allowing
    her to use her empathy and personal experience with anxiety to help other adults in the Johnstown area. In the longer term, she envisions a role as a volunteer coordinator at the local senior center,
    where she could organize low‑stress activities and provide guidance on community services. Additionally, Brandi is interested in turning her knitting and crocheting into a modest home‑based craft business,
    selling handmade items at regional craft fairs and online platforms, which would give her a structured yet flexible source of income.
