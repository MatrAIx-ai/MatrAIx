  hobbies: '[''Sketching and drawing'', ''Mixed media art'', ''Basketball'', ''Soccer'', ''Listening to Latin indie music'', ''Cooking Mexican dishes'', ''Volunteer art workshops'', ''Attending local music
    gigs'', ''Reading graphic novels'', ''Learning basic coding'']'
  career_goals: Pedro aims to complete his GED within the next year and then pursue an associate degree in graphic design at a community college. He dreams of combining his love for art and his cultural
    heritage to create visual communications that celebrate Mexican-American stories. In the medium term, he hopes to secure an internship at a local design studio or marketing firm where he can hone his
    technical skills and learn professional workflows. Ultimately, he aspires to launch his own freelance design agency that offers branding and promotional services to small businesses in his community,
    especially family‑owned Mexican eateries, and to lead community art workshops that empower other youth.
