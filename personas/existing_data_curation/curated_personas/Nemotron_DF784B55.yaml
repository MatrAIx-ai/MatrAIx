personas:
  professional: Pedro Gonzalez merges their disciplined project coordination and bilingual communication into a burgeoning graphic design path, leading school art club initiatives and crafting eye‑catching
    flyers with Canva and Photoshop to spotlight community stories.
  sports: Pedro Gonzalez dominates the neighborhood basketball court after school, follows the hometown professional team the Metro City Guardians, and plays forward for a community soccer league, mixing
    structured drills with spontaneous pickup games to stay active.
  arts: Pedro Gonzalez fuels their creative drive by sketching urban murals inspired by the bold mural traditions of their community, listening to Latin indie bands like Café Tacvba and Zoé, and admiring
    street‑art icons such as Banksy, Shepard Fairey, and Diego Rivera, which together shape their visual storytelling style.
  travel: Pedro Gonzalez enjoys weekend road trips to the coastal town of Santa Barbara, dreams of backpacking through the American Southwest’s desert canyons, and aspires to soak up Berlin’s vibrant street‑art
    scene and Valparaíso’s colorful murals, balancing school responsibilities with modest travel budgets.
  culinary: Pedro Gonzalez delights in mastering family recipes like tamales, salsa verde, and chipotle‑infused mole, skillfully chopping fresh chiles and masa dough on the weekend, while also savoring
    adventurous street‑food tacos and exploring new flavors at local food trucks.
  core: Pedro Gonzalez is a disciplined, socially vibrant teen who channels an insatiable curiosity into graphic design, community art, and basketball, yet sometimes procrastinates on dental hygiene and
    can be overly meticulous about perfecting every sketch.
background:
  cultural: Pedro was raised in a Mexican immigrant family in Lehigh Acres, where Spanish is spoken at home and Mexican customs are woven into daily life. His parents migrated from Michoacán, bringing with
    them a strong sense of community, respect for family, and a love for Mexican food, music, and festivals. Celebrations such as Día de los Muertos and Cinco de Mayo are marked with home‑cooked meals,
    altars, and community gatherings, fostering his appreciation for cultural heritage. Growing up in a diverse Florida environment, he has also been exposed to Latino and Caribbean influences, shaping
    his bilingual fluency and his ability to navigate both Mexican and broader American cultural contexts.
attributes:
  skills: '[''Time management'', ''Project coordination'', ''Bilingual communication (English/Spanish)'', ''Graphic design (Canva, Adobe Photoshop)'', ''Photo editing'', ''Basic HTML/CSS'', ''Event planning'',
