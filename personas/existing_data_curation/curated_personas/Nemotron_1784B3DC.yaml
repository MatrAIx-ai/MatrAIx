personas:
  professional: Marly Wynn is a community‑focused arts administrator who leverages meticulous project‑management skills, Excel budgeting, and Canva design to coordinate inclusive exhibitions for under‑represented
    creators, while their quiet confidence and habit of double‑checking every detail keep logistics smooth even as lingering worries about funding deadlines often keep them up late.
  sports: Marly Wynn enjoys low‑impact fitness routines such as early morning walks through the historic streets of North Augusta and weekly yoga classes at the local community center, follows the Carolina
    Panthers and the South Carolina Gamecocks with modest enthusiasm, and occasionally joins a Sunday evening recreational softball league, preferring the camaraderie of small‑team play over competitive
    intensity.
  arts: Marly Wynn is a devoted patron of visual and performing arts, frequently visiting the Augusta Museum of History and local galleries, sketching the moss‑draped oaks of the historic district, curating
    intimate listening sessions for jazz legends like John Coltrane and spoken‑word performances by poets such as Saidiya Hartman, drawing inspiration from Romare Bearden's bold collages and Toni Morrison's
    narratives, and sharing these discoveries in small community gatherings.
  travel: Marly Wynn plans trips with the same careful spreadsheets used at work, favoring culturally rich destinations that blend music and history—having savored the jazz heritage of New Orleans, explored
    Gullah‑Geechee villages along coastal Georgia, and dreaming of a pilgrimage to Accra, Ghana—to trace ancestral roots while balancing travel costs against modest savings.
  culinary: Marly Wynn delights in cooking soulful Southern cuisine with modern twists, often preparing shrimp and grits seasoned with smoked paprika and fresh thyme, collard greens simmered with a splash
    of apple cider vinegar, and sweet‑potato pie topped with caramelized pecans, while experimenting with heirloom tomatoes from their garden in a spicy jambalaya, and regularly treating themselves to a
    weekend brunch at The Southern Café, where they order the skillet‑fried chicken biscuit.
  core: Marly Wynn blends meticulous organization with a creative heart, juggling community art projects and budget spreadsheets while battling a habit of late‑night worry over details, a love for gospel‑rooted
    jazz, and a penchant for solitary sketching in garden shade.
background:
  cultural: Marly is an African‑American woman who grew up in the Midlands of South Carolina, a region where the legacy of the Gullah‑Geechee culture and the civil‑rights movement intersect. Raised in a
    tight‑knit church community, she learned the value of collective responsibility, storytelling, and the power of music from an early age. Her family traditions include Sunday gospel singing, home‑cooked
    soul food, and annual celebrations of Juneteenth that emphasize community solidarity. These cultural experiences have shaped her appreciation for African‑American artistic expression, from visual arts
    to jazz and spoken word, and inform her commitment to fostering inclusive cultural spaces in her hometown.
attributes:
  skills: '["Event planning", "Budget management", "Microsoft Office Suite", "Research and writing", "Active listening", "Conflict mediation", "Customer service", "Graphic design (Canva)", "Social media
    promotion", "Data entry"]'
  hobbies: '["Visiting art galleries", "Sketching and drawing", "Reading African-American literature", "Gardening", "Cooking Southern cuisine", "Attending small jazz or spoken‑word events", "Curating home
    art displays", "Keeping a reflective journal"]'
  career_goals: Marly aims to secure a full‑time position in nonprofit arts administration or community outreach where she can combine her love of art with her organizational strengths. She plans to complete
    her bachelor's degree in Arts Administration or Public Policy within the next three years, taking evening courses at a nearby community college. Her long‑term ambition is to become a program manager
    for a regional cultural center, designing inclusive workshops and exhibitions that highlight under‑represented artists, particularly those from the African‑American community. She also hopes to eventually
    mentor younger volunteers and leverage her experience to advocate for equitable access to arts education in Aiken County.
