  hobbies: '[''Astrophotography'', ''Abstract watercolor painting'', ''Model rocketry'', ''Chess'', ''Logic puzzles'', ''Reading contemporary philosophy'', ''Meditation'', ''Herb gardening'', ''Cooking
    Salvadoran cuisine'', ''Programming personal projects'']'
  career_goals: Eduardo aims to become a department chair or lead a STEAM innovation lab at his institution, securing external funding to expand interdisciplinary programs. He intends to publish research
    on integrating art into STEM pedagogy, mentor junior teachers, and develop a community outreach initiative that brings robotics and coding workshops to underrepresented Salvadoran youth in the Fredericksburg
    area. Long‑term, he envisions establishing his own consulting firm that designs culturally responsive STEM curricula nationwide.
