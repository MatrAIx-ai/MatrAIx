persona_description: A geodesist who was responsible for the creation of the Survey of the Coast in the United States during the presidency of Thomas Jefferson in the early 19th century. He was in charge
  of the project for several years, despite political opposition and unsettled conditions in Europe. His work led to the establishment of the first geodetic observatories in the United States and the creation
  of the first triangulation scheme. He was responsible for selecting station sites, directing base line measurements, and observing angles with the recently acquired theodolite. He was dismissed from his
  position in 1832 and appointed to his position again in 1832. He was known for his work in the field of geodesy and his contributions to the development of the American geodesy.
