  hobbies: '[''vegetable gardening'', ''reading biographies and black history'', ''woodworking'', ''listening to jazz and gospel music'', ''church choir participation'', ''dog walking'', ''attending local
    history talks'']'
  career_goals: Although retired from formal employment, Corey aims to channel his practical expertise into volunteer service. He wants to become the maintenance coordinator for the local senior center,
    lead financial‑literacy workshops for low‑income seniors, and mentor high‑school students interested in trades. Additionally, he hopes to document his life story and the history of the black community
    in Mount Vernon through a memoir, preserving his legacy for future generations.
