personas:
  professional: Corey Williams, a retired city facilities specialist turned community volunteer, leverages decades of plumbing, electrical, and carpentry expertise along with meticulous budgeting skills,
    and they coordinate senior‑center maintenance, mentor trade‑interested high‑schoolers, and organize neighborhood events with a calm, methodical demeanor.
  sports: Corey Williams enjoys low‑impact fitness by walking his Labrador through Van Cortlandt Park, follows the New York Yankees during baseball season, participates in a senior bowling league at the
    local community center, and they root for the Westchester Knicks during the winter basketball season.
  arts: Corey Williams finds solace in the soulful sounds of Mahalia Jackson, the improvisational brilliance of John Coltrane, and classic Motown hits by Stevie Wonder, often humming while woodworking,
    and they join his church choir for gospel harmonies.
  travel: Corey Williams favors purposeful road trips that blend history and relaxation, having driven to Savannah’s historic district and Washington, D.C.’s National Museum of African American History,
    and they dream of a leisurely river cruise on the Mississippi to explore Delta blues origins.
  culinary: Corey Williams delights in preparing collard greens seasoned with smoked turkey, slow‑cooking gumbo with okra from his garden, and baking cornbread with honey, and they occasionally over‑salt,
    forcing a quick rinse of the pot.
  core: Corey Williams is a methodical, community‑oriented steward of tradition who balances precise handyman skills with a nostalgic love for vintage music, and they occasionally splurge on old radios
    while forgetting to floss.
background:
  cultural: Corey is an African‑American who grew up in the vibrant, working‑class neighborhoods of Mount Vernon and the Bronx during the 1960s and 70s. His upbringing was shaped by the black church, soul‑food
    family meals, and a close‑knit community that emphasized self‑reliance and mutual aid. He carries the legacy of the civil‑rights era, valuing perseverance and collective responsibility. These cultural
    influences are evident in his love for gospel music, his commitment to community service, and his dedication to preserving local black history.
attributes:
  skills: '[''basic plumbing'', ''electrical troubleshooting'', ''HVAC maintenance'', ''carpentry'', ''landscape upkeep'', ''budgeting and personal finance'', ''event coordination'', ''conflict mediation'',
