persona_description: A project manager who is passionate about promoting the inclusion of diverse groups of migrant children in Europe through the development of ICT tools and digital storytelling. The
  project aims to stimulate intercultural education and empower migrant children through their experiences and reflections on their lives in another country, society, and culture. The project is particularly
  interested in the use of ICT tools to support the goals of the project and will involve workshops with children and their families in schools to stimulate intercultural education. The project manager
  is interested in developing innovative solutions and strategies to promote the inclusion of migrant children in Europe.
