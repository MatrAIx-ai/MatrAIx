persona_description: A professional statistician who is responsible for compiling and analyzing data related to the statistics of Aboriginal and Torres Strait Islander deaths in Australia. They work closely
  with data providers, ensuring that the data is accurate and consistent. They are familiar with the international standards and recommendations for the definition and scope of deaths statistics in a vital
  statistics system and use this knowledge to ensure that the data presented is of high quality. They are also familiar with the various formats of data presented in the release and are able to interpret
  the statistics in relation to the size of the relevant population(s).
