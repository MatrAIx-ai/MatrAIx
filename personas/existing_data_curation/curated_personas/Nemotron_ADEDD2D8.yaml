    ''Cross-cultural competence'']'
  hobbies: '[''Hiking'', ''Book club'', ''Yoga/Pilates'', ''Volunteering at mental‑health hotline'', ''Cooking'', ''Gardening'', ''Crossword puzzles'', ''Cycling'', ''Community theater'', ''Exploring local
    history'']'
  career_goals: Leslie aims to broaden her impact by establishing a community‑focused private practice that offers both in‑person and telehealth services, especially for underserved populations in the Capital
    Region. She seeks a faculty appointment at a nearby university to mentor future clinicians and lead research on resilience and stress management. Additionally, she hopes to spearhead a regional mental‑health
    awareness campaign, secure grant funding for innovative treatment programs, and eventually become director of a local mental‑health center where she can shape policy and service delivery.
