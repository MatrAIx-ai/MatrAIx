personas:
  professional: Leslie Sochacki, a licensed clinical psychologist specializing in evidence‑based CBT and group therapy, leverages their methodical analytical training in SPSS and R to design community mental‑health
    programs, while they bring a sociable, organized nature that ensures workshops run on schedule and participants feel supported.
  sports: Leslie Sochacki, an avid hiker in the Adirondacks, joins the local Adirondack Trails Club for weekly treks, cycles with the Mohawk River Riders group, follows the New York Knicks and Albany Empire
    closely, and they also participate in seasonal community runs organized by the Schenectady YMCA.
  arts: Leslie Sochacki enjoys community theater productions, frequently attends performances of plays by Arthur Miller, delights in concerts by folk singer Brandi Carlile, and they draw inspiration from
    the paintings of the Hudson River School artists, especially those depicting the local landscape.
  travel: Leslie Sochacki prefers well‑planned trips that blend nature and history, having explored the historic canals of the Erie Canal, the fall foliage of Vermont’s Green Mountains, and they dream of
    a week‑long pilgrimage to the tulip fields of the Netherlands during the spring festival.
  culinary: Leslie Sochacki cooks nutritious meals with a focus on seasonal vegetables, often preparing quinoa salads with roasted beets, kale, and goat cheese, enjoys experimenting with homemade sourdough
    bread, and they relish a Sunday roast of herb‑crusted chicken with rosemary potatoes.
  core: Leslie Sochacki is a structured, community‑driven mental‑health professional who balances a love of puzzles and perfecting garden rows with occasional forgetfulness about flossing, and they champion
    resilience through organized outreach.
background:
  cultural: Leslie was raised in a middle‑class, white, Northeastern American family with German‑Irish ancestry. Growing up near Schenectady, she absorbed the region’s Dutch colonial heritage, the strong
    work ethic of the Capital Region, and a community‑oriented culture that values education, public service, and local history. She identifies with broader American values of individualism balanced by
    civic responsibility, and she stays engaged in regional traditions such as the Schenectady County Historical Society events, the annual Tulip Festival, and volunteer initiatives that support community
    wellbeing.
attributes:
  skills: '[''Cognitive-behavioral therapy (CBT)'', ''Psychometric testing'', ''Crisis intervention'', ''Group therapy facilitation'', ''Program development and evaluation'', ''Quantitative research methods'',
