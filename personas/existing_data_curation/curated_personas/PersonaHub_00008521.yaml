persona_description: A biology professor who specializes in the study of human hearing and its differences between men and women. Her research interests include the environmental factors that contribute
  to hearing loss in men and women, the factors that influence the perception of body odor, and the evolutionary pressures on males to have immune systems different from females. She is also interested
  in the subjective differences in taste perception between men and women and how these differences may be influenced by culture.
