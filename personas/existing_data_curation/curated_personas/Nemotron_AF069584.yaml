  career_goals: Tyrone aims to convert his hobbyist engineering projects into a sustainable career. In the short term, he plans to secure a remote full‑stack development or IoT engineering role that leverages
    his Python and hardware prototyping skills while preserving a flexible schedule. He intends to earn professional certifications such as AWS Solutions Architect and Cisco CCNA to boost his marketability.
    Over the longer horizon, he envisions launching his own start‑up that provides affordable smart‑home solutions for underserved urban neighborhoods, thereby reducing energy costs for low‑income residents.
    He also aspires to mentor Black students and emerging technologists in Austin, using his journey to illustrate how curiosity combined with practicality can drive personal success and community impact.
