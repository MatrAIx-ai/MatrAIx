personas:
  professional: Kenner Tillery, an aspiring home‑based artisan‑entrepreneur, blends his seasoned DIY carpentry, meticulous budgeting, and calm competitive drive to create handcrafted wooden furniture while
    pursuing a GED and gearing up to coordinate community arts workshops.
  sports: Kenner Tillery avidly follows the Atlanta Hawks and Atlanta Falcons while playing weekly in the Cobb County Crushers adult softball league, and he keeps fit with early morning walks through his
    garden and occasional yoga classes at the local community center.
  arts: Kenner Tillery, a passionate acrylic landscape painter, curates vintage jazz and gospel vinyl collections featuring Miles Davis and Mahalia Jackson, devours works by Langston Hughes and Toni Morrison,
    and regularly visits the High Museum of Art and the Fox Theatre to draw inspiration for his bold, colour‑rich canvases.
  travel: Kenner Tillery favors purposeful road trips that blend cultural immersion and artistic inspiration, such as weekend drives to New Orleans' French Quarter for live jazz, yearly pilgrimages to Washington
    DC's National Museum of African American History and Culture, and occasional visits to the High Sierra backcountry for sketching, while always planning trips around modest savings and his woodworking
    schedule.
  culinary: Kenner Tillery delights in fusing classic Southern comfort dishes—like chicken and dumplings, collard greens, and peach cobbler—with global twists such as cilantro‑lime quinoa, ginger‑infused
    barbecue ribs, and a coriander‑spiced version of shrimp and grits, frequently cooking with fresh tomatoes, basil, and smoked paprika from his garden.
  core: Kenner Tillery, a calm yet fiercely competitive 52‑year‑old creator, turns his love of painting, woodworking, and vintage jazz into community‑focused projects while quietly mastering budgeting and
    self‑education.
background:
  cultural: Kenner grew up in a close‑knit African‑American family in Powder Springs, where church, gospel music, and community gatherings were central to daily life. His upbringing blended Southern traditions—such
    as home‑cooked soul food and a reverence for hospitality—with the broader legacy of African‑American resilience and storytelling. Family elders regularly shared stories of the civil‑rights era, instilling
    a deep appreciation for history and self‑advocacy. The local church has been a cultural anchor, shaping his values of mutual support, humility, and perseverance. While he embraces these roots, Kenner
    also explores contemporary Black art, music, and literature, which inform his artistic tastes and community involvement. This hybrid cultural identity—Southern Black heritage intertwined with modern
    artistic curiosity—guides his worldview, interactions, and creative pursuits.
