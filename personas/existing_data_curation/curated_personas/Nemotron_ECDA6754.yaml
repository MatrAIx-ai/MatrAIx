  career_goals: Although Kenner is not currently employed, he has set several personal milestones that reflect his competitive spirit and curiosity. He plans to earn his GED within the next year, viewing
    formal education as a means to broaden his knowledge base. He aims to launch a small home‑based venture creating handcrafted wooden furniture and decorative art pieces, hoping to sell them at local
    craft fairs and online platforms. Kenner also wishes to become a volunteer coordinator at the Powder Springs community center, where he can organize arts‑related workshops and mentor teens interested
    in creative writing and visual arts. A long‑term ambition is to compile an oral‑history project documenting African‑American families in Cobb County, preserving their stories for future generations.
    Ultimately, he hopes these pursuits will culminate in a memoir that captures his journey of self‑education and community engagement.
