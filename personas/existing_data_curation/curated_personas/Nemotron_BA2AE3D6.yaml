  hobbies: '["Watercolor painting", "Street photography", "Playing acoustic guitar", "Live music concerts", "Basketball", "Hiking", "Community garden volunteering", "Community theater participation", "Cooking
    international cuisine", "Traveling"]'
  career_goals: Allen aims to transition into a school‑wide instructional coach role where he can champion arts‑rich, technology‑enhanced pedagogy across multiple grade levels. Over the next five years,
    he plans to earn a Master’s in Educational Leadership and take on responsibilities as a grade‑level team leader, eventually positioning himself for a principalship. He also hopes to launch a district‑supported
    after‑school art studio that offers students hands‑on creative experiences and strengthens family and community engagement.
