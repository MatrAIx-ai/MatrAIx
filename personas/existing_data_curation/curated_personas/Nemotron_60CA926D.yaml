personas:
  professional: Mojgan Carter works as the community center activity coordinator in Berkshire County, leveraging their meticulous organization and vivid imagination to design senior and youth programs while
    nurturing a parallel freelance art practice that includes watercolor landscapes, hand‑quilted abstracts, and occasional digital photography exhibitions.
  sports: Mojgan Carter enjoys low‑impact fitness through regular hikes on local trails with the Berkshire Trail Guild, practices gentle yoga at dawn, and casually follows the New England Revolution and
    Boston Celtics for occasional sports excitement.
  arts: Mojgan Carter spends weekends painting Berkshire foliage in watercolor, quilting abstract comfort blankets inspired by Mark Rothko, and curating a personal collection of folk art, while drawing
    poetic inspiration from Mary Oliver, Emily Dickinson, and Nietzsche, which they share at intimate book‑club readings and small‑group art shows.
  travel: Mojgan Carter prefers contemplative travel, planning weekend getaways to the Catskills and Acadia National Park for sketch‑in‑the‑wild sessions, dreaming of a future trip to the Scottish Highlands
    to study heather‑filled landscapes, but balances wanderlust with modest family finances and a limited holiday schedule.
  culinary: Mojgan Carter enjoys preparing seasonal farm‑to‑table meals such as roasted root vegetable medleys, lentil‑and‑apple stew, and a signature beet risotto with fresh thyme, often baking sourdough
    bread and finishing dishes with locally sourced goat cheese and a drizzle of maple syrup.
  core: Mojgan Carter is a reflective 43‑year‑old who channels an artistic soul into paints, quilts, and poetry while navigating chronic worry, a meticulous budgeting habit, and a love for quiet hikes and
    farm‑fresh cooking.
background:
  cultural: Mojgan comes from a multi‑generational white New England family with deep roots in Berkshire County, Massachusetts. The region’s heritage blends a respect for self‑reliance, appreciation of
    the outdoors, and a vibrant local arts scene that includes folk crafts, music festivals, and community theater. Her upbringing reflects the values of modest simplicity, community cooperation, and a
    love for artistic expression, all of which continue to shape her identity, hobbies, and aspirations.
attributes:
  skills: '[''Watercolor painting'', ''Hand quilting'', ''Creative writing (poetry and short stories)'', ''Basic digital photography'', ''Household budgeting'', ''Event planning for small gatherings'',
