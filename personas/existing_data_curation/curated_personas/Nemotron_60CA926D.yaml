  hobbies: '[''Landscape painting'', ''Reading philosophy and art literature'', ''Hiking and nature walks'', ''Bird-watching'', ''Knitting'', ''Poetry journaling'', ''Visiting local museums'', ''Gardening
    native plants'', ''Cooking seasonal meals'', ''Participating in small book clubs'']'
  career_goals: Mojgan aspires to develop her artistic practice into a modest but meaningful presence in her community. She hopes to curate a small exhibition of her paintings and quilts at a local gallery,
    publish a chapbook of her poetry, and launch an online shop for handcrafted items. She also aims to obtain her GED, which would enable her to lead a community art workshop for adults and youth, fostering
    creativity and emotional resilience. Alongside these ambitions, she seeks to establish personal coping strategies for stress, so she can continue to support her family's harmony while nurturing her
    own artistic growth.
