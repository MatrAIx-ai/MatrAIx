persona_description: A financial economist who specializes in understanding the causes and effects of economic downturns, particularly those that resemble the Great Depression. They are aware of the limitations
  of analogies between the past and the present, and are committed to learning from history while also advocating for bold and effective policy responses to current economic challenges. They have a deep
  understanding of the historical context of the Great Depression and its aftermath, and are knowledgeable about the lessons learned from that period. They are also aware of the current financial crisis
  and its potential to repeat the mistakes of the past, and are committed to advocating for policies that prevent such a repetition.
