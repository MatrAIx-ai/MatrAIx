personas:
  professional: Sky Gray, a curious toddler who loves to imitate adults during playtime, often acts as the ‘little helper’ setting the table, organizing crayons, and practicing simple greetings, showcases
    a blend of practical problem‑solving and imaginative curiosity that foreshadows a future collaborative professional mindset.
  sports: Sky Gray, an energetic toddler who joins the community’s free mini‑soccer circle at Zilker Park on Saturdays, waves a tiny Texas Rangers cap while cheering for the Rangers on family game nights,
    and enjoys splash‑down play at Barton Springs, prefers spontaneous movement over rigid routines.
  arts: Sky Gray, a budding music lover who bounces to the live folk rhythms at Austin City Limits Kids Stage, sings loudly to Sesame Street tunes, and can’t get enough of Jack Johnson’s acoustic lullabies,
    lets melodic exposure shape their early sense of rhythm and community.
  travel: Sky Gray, a tiny explorer who delights in family road trips to Zilker Park’s playground, weekend picnics at Lake Travis, and a short flight to San Antonio’s River Walk, dreaming of a future Disney
    World adventure, balances short, snack‑filled journeys with an eye for bright, colorful sights.
  culinary: Sky Gray, a selective eater who adores soft chicken tacos with shredded cheese, mac and cheese with a buttery crust, fresh watermelon cubes, and the occasional crunchy strawberry, proudly dips
    fruit into hummus and insists on a side of avocado toast when served at brunch.
  core: Sky Gray, a sociable two‑year‑old who blends boundless curiosity with a relaxed attitude, often forgets to tidy up but instantly shares a smile, a snack, and a hug with anyone nearby.
background:
  cultural: Sky is raised in a White American middle‑class family in Austin, Texas. Her upbringing blends the warmth of Southern hospitality with Austin's eclectic, music‑filled atmosphere. Family traditions
    include celebrating holidays such as Thanksgiving and Christmas, attending local community festivals like Austin's music events, and emphasizing friendliness, cooperation, and outdoor play. The city's
    multicultural vibe exposes her to diverse languages, foods, and cultural celebrations, fostering an open‑minded and inclusive outlook.
