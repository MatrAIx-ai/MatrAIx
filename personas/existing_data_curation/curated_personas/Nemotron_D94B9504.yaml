  hobbies: '[''Fishing'', ''Reading (mystery and self‑improvement)'', ''Watching sports (football, baseball)'', ''Strategy video games'', ''Photography'', ''DIY home‑improvement projects'', ''Volunteer
    work at church food bank'']'
  career_goals: Damon aims to earn a bachelor's degree in Hospitality Management within the next three years, followed by a certified supervisory program such as the Certified Hospitality Supervisor (CHS).
    He plans to advance from desk clerk to shift supervisor, then to assistant manager, and ultimately become the general manager of a boutique hotel or inn in West Texas. Long‑term, he dreams of owning
    a family‑run lodge that emphasizes personalized service and community involvement, offering a stable and structured career path that aligns with his preference for predictability.
