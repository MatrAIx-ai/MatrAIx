persona_description: A historian or a researcher who specializes in the study of Chinese history, specifically focusing on the period from the Qin dynasty to the Qing dynasty, and the transition from an
  hereditary monarchy to an abstract metonymic concept representing the monarch and the legal authority for the existence of the government. This persona would be interested in the detailed descriptions
  and events of the Dragon Throne, the hereditary monarchy in China before 1912, and the transition from a hereditary monarchy to a constitutional monarchy. They would be knowledgeable about the chronology
  of the emperors, the tradition of the Chinese Empire, and the role of the Dragon Throne in representing the monarch and the legal authority of the government.
