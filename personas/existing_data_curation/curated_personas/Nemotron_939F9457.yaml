personas:
  professional: Edgardo Flores, an experienced maintenance assembler and CNC operator with 25 years of precision engine assembly, bilingual communication, and a curiosity‑driven yet relaxed work style,
    they leverage their technical expertise to mentor teammates while pursuing lead‑supervisor responsibilities.
  sports: Edgardo Flores enjoys weekend fishing trips with their close‑knit friends, follows the Iowa Hawkeyes football and Des Moines Menace soccer teams, and stays loosely active through a modest home‑gym
    routine of weight‑lifting and occasional bike rides.
  arts: Edgardo Flores finds creative release by listening to norteño groups like Los Tigres del Norte, building detailed model kits of historic aircraft, and attending community theater productions that
    showcase classic narratives, all of which enrich their hands‑on artistic identity.
  travel: Edgardo Flores prefers low‑key road trips to the Ozarks and occasional cultural pilgrimages to Oaxaca during Día de los Muertos, balancing their love for scenic drives with family responsibilities
    and a modest travel budget.
  culinary: Edgardo Flores enjoys cooking heritage dishes such as pozole, chiles en nogada, and carnitas, skillfully using pantry staples like dried chiles, masa harina, and fresh cilantro, while often
    hosting hearty family‑style meals that showcase their hands‑on cooking style.
  core: Edgardo Flores blends a seasoned mechanical mindset with a laid‑back, curiosity‑driven outlook, habitually tinkering on engines while occasionally forgetting appointments, and they cherish small‑group
    gatherings over loud crowds.
background:
  cultural: Edgardo is a first‑generation Mexican‑American who grew up in a bilingual household, celebrating Mexican traditions such as Día de los Muertos and Semana Santa while also integrating into the
    Midwestern community of Urbandale, IA. His Catholic upbringing and close connection to the local Mexican diaspora influence his values of hard work, humility, and respect for family and community. He
    maintains strong ties to Mexican cuisine, language, and cultural celebrations, blending them with the practical, collaborative spirit of his workplace.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint reading'', ''Machinery troubleshooting'', ''Basic welding'', ''CNC machine operation'', ''Quality inspection'', ''Inventory management'', ''Safety compliance'',
    ''Problem solving'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Restoring vintage engines'', ''Woodworking'', ''Model kit building'', ''Reading technical journals'', ''Listening to regional Mexican music'', ''Cooking traditional Mexican dishes'', ''Walking
    in local parks'', ''Fishing'']'
  career_goals: Edgardo aims to obtain a maintenance‑technician certification and advance to a lead assembler or shift supervisor position within his plant. He plans to deepen his CNC programming knowledge
    through community college courses and eventually mentor younger workers. In the longer term, he hopes to leverage his mechanical expertise to start a small side business repairing and customizing small
    engines for hobbyists in the Urbandale area.
