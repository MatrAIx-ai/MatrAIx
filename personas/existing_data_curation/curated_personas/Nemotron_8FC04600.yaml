personas:
  professional: Eddie Spurlock, a baritone vocalist and multi‑instrumentalist, leverages their disciplined practice routine and deep knowledge of 1960s soul to arrange and produce original Southern‑blues
    tracks, yet their occasional resistance to tight deadlines forces them to improvise on the fly during recording sessions and live‑sound gigs.
  sports: Eddie Spurlock, a devoted fan of the Carolina Panthers (NFL) and the Charlotte Hornets (NBA), spends weekends fishing on nearby lakes and tending a vegetable patch, prefers low‑impact exercise
    like morning walks, and occasionally joins a local senior softball league, balancing their competitive spirit with a reserved demeanor.
  arts: Eddie Spurlock, a passionate collector of vintage 1960s soul vinyl, immerses themselves in the sounds of Otis Redding, Etta James, and early Muddy Waters while crafting lyrics inspired by Southern
    folklore, and regularly attends performances at the historic Carolina Theatre, drawing artistic renewal from gospel choirs, blues clubs, and the photography of Gordon Parks.
  travel: Eddie Spurlock, an avid lover of heritage travel, enjoys weekend trips to Piedmont towns such as Salisbury and Hillsborough to explore historic preservation tours, dreams of a pilgrimage to Memphis’
    Beale Street and New Orleans’ French Quarter to soak up blues roots, yet they plan each journey around a modest budget that favors short‑haul drives over expensive flights.
  culinary: Eddie Spurlock, a home‑cooking enthusiast, perfects family recipes like fried catfish with hush‑puppy gravy, collard greens simmered with smoked turkey, and sweet‑potato pie, frequently using
    heirloom tomatoes and fresh basil harvested from their backyard garden, and they pair meals with a Southern bourbon sour for a soulful dinner experience.
  core: Eddie Spurlock, a reserved yet fiercely competitive baritone vocalist, blends classic soul with modern blues, hoards vintage vinyl, fuels days with fishing and garden fresh meals, and intermittently
    sabotages their schedule with spontaneous gear splurges.
background:
  cultural: Eddie grew up in a tight‑knit African‑American community in rural North Carolina, steeped in the traditions of gospel choirs, Southern blues, and the civil‑rights era storytelling that shaped
    his family's narrative. His parents were active members of the local church, where he first learned to sing harmonies and later embraced the soulful sounds of Motown and Stax records. The cultural tapestry
    of the Piedmont's musical heritage—mixing Appalachian folk, jazz, and the legacy of Black labor songs—infuses his artistry. Although never married, Eddie maintains strong family ties and serves as a
    cultural bridge, preserving Black Southern musical roots while navigating the modern independent music scene.
attributes:
  skills: '[''vocal performance (soul/gospel)'', ''acoustic guitar'', ''electric bass'', ''music theory'', ''songwriting and arrangement'', ''studio recording & mixing'', ''live sound engineering'', ''private
