  hobbies: '[''collecting vintage vinyl'', ''songwriting'', ''home studio recording'', ''fishing'', ''gardening'', ''cooking Southern dishes'', ''historic preservation tours'', ''church choir participation'']'
  career_goals: Eddie aims to record and release a full-length album that blends Southern soul with contemporary blues, showcasing his original compositions. He aspires to become a sought‑after studio vocalist
    for regional producers and to secure a regular residency at a beloved local venue in Moore County. Long‑term, he hopes to establish a modest recording studio where he can mentor emerging Black musicians
    from the area, preserving the cultural legacy while achieving financial stability for himself.
