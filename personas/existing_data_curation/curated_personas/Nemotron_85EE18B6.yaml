personas:
  professional: Amy Weiss, a licensed practical nurse with a graduate degree in education, blends clinical competence and instructional talent to craft patient‑centered teaching modules, using her curiosity‑practical
    balance to innovate while staying reliably collaborative in interdisciplinary care teams.
  sports: Amy Weiss enjoys weekend hikes on the Paint Creek Trail, participates in a local running club that meets for spring 5K races, supports the Detroit Tigers and Detroit Red Wings, and balances fitness
    with yoga sessions and occasional community volleyball games.
  arts: Amy Weiss nurtures her creative side by attending monthly watercolor workshops with local artist Jenna Willis, knitting scarves while listening to Norah Jones and Fleet Foxes, and drawing literary
    inspiration from contemporary authors like Sally Rooney and Chimamanda Ngozi Adichie.
  travel: Amy Weiss prefers well‑planned, moderate‑budget journeys that combine nature and culture, having trekked Zion and Bryce in Utah and sampled the vineyards of Tuscany, while dreaming of a solo hike
    along Patagonia’s Torres del Paine.
  culinary: Amy Weiss, an intermediate home chef, delights in seasonal vegetable medleys such as roasted beet and goat cheese salad with fresh thyme, experiments with sous‑vide salmon, yet sometimes over‑salts
    soups in the quest for deeper flavor.
  core: Amy Weiss balances scientific rigor with wanderlust, channeling curiosity into patient education and garden experiments, though they occasionally forget to water plants during hectic weeks.
background:
  cultural: Amy was raised in Troy, Michigan, within a midwestern environment that values community, reliability, and hard work. Her family traces its ancestry to German immigrants, a heritage reflected
    in seasonal traditions, a modest appreciation for German cuisine, and a respect for education. Growing up in Oakland County, she was influenced by the region's strong public school system and active
    civic organizations, which fostered her commitment to service and lifelong learning. These cultural roots shape her pragmatic outlook, collaborative spirit, and dedication to improving the health and
    well‑being of her community.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''Wound care'', ''Patient education'', ''Health promotion program development'', ''Curriculum design'', ''Electronic health record documentation'',
