  hobbies: '[''Reading contemporary fiction'', ''Hiking on local trails'', ''Gardening'', ''Cooking seasonal meals'', ''Volunteering at community health fairs'', ''Yoga'', ''Knitting'', ''Attending art
    workshops'', ''Journaling'']'
  career_goals: Amy aims to build on her practical nursing experience by obtaining RN licensure and a Master of Science in Nursing with a focus on education or leadership. Her short‑term goal is to become
    a clinical instructor for LPN programs, leveraging her graduate education background to train future nurses. Long‑term, she envisions a nurse educator role at a community college or hospital, leading
    continuing‑education workshops, developing community health outreach initiatives, and eventually moving into nurse management to shape policy and improve patient‑centered care. She also hopes to author
    educational resources on chronic disease self‑management.
