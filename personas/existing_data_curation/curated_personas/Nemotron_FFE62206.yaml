personas:
  professional: John Henley, a retired electrician-turned-community volunteer, leverages his hands-on expertise in plumbing, electrical troubleshooting, and woodworking to coordinate senior-center projects,
    blending meticulous planning with a willingness to improvise when unexpected challenges arise, while they keep the team harmonious with a kind, cooperative demeanor.
  sports: John Henley, a faithful fan of the Tampa Bay Buccaneers and Tampa Bay Rays, stays fit by participating in the North Port Senior Center’s weekly pickleball sessions and taking leisurely walks along
    the Myakkahatchee Creek Trail, favoring low-impact activity that accommodates their arthritic knees.
  arts: John Henley, a lifelong admirer of Frank Sinatra, John Coltrane, and the paintings of Winslow Homer, attends the local community theater’s classic play revivals and spends evenings listening to
    vinyl records while they reminisce about golden-age cinema, letting music and visual art color their quiet evenings.
  travel: John Henley, who has trekked the historic streets of Savannah, Georgia, and the battlefields of Gettysburg, dreams of a pilgrimage to the Emerald Isle to trace ancestral roots, but presently favors
    day trips to the nearby Everglades and weekend cruises to Key West, balancing a modest travel budget with a love for both history and the sea.
  culinary: John Henley, an avid home cook, prepares Southern-style shrimp and grits, citrus-glazed ham, and fresh key lime pie using locally sourced shrimp, oranges, and okra, proudly showcasing their
    garden harvest in every meal, though they occasionally over-season the gumbo when experimenting with new spice blends.
  core: John Henley, a pragmatic gardener with a historian’s curiosity, balances quiet reflection with community service, often worrying about the future while they savor simple pleasures like a perfectly
    seasoned catfish dinner.
background:
  cultural: John's cultural background is rooted in mid‑century American middle‑class values. He was raised in a small town in Ohio in a family of Irish and English ancestry. The household emphasized self‑reliance,
    hard work, and community service, with regular church attendance and participation in local events. He grew up during the 1950s and 1960s, witnessing both the optimism of the post‑war era and the societal
    changes of the civil‑rights movement, which shaped his cooperative and considerate outlook. After a career, he moved to North Port, Florida, joining a retirement community where the relaxed coastal
    lifestyle and diverse population have broadened his cultural exposure while he still maintains traditional American celebrations such as Thanksgiving, Independence Day, and Memorial Day.
