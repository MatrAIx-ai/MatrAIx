persona_description: A geophysicist with the US Geological Survey who specializes in the study of artificial earthquakes, seismic waves, and their effects on the Earth's crust. She coordinates the project
  to provide the best picture of which areas could suffer the worst shaking in future earthquakes on the Hayward Fault. The project aims to improve the shake map that comes out immediately after an earthquake
  to tell first responders which areas are most affected. The geophysicist has experience in setting up and operating seismometers, analyzing seismic data, and communicating earthquake risk.
