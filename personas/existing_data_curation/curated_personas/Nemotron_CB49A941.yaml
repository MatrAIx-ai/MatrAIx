personas:
  professional: An experienced technophile, Sarah Ruiz channels a lifelong blend of statistical analysis and DIY repair expertise into leading a monthly senior technology workshop at the Southbridge community
    center, where they translate complex coding concepts into straightforward, hands‑on lessons while drafting bilingual documentation for community projects.
  sports: Sarah Ruiz enjoys gentle fitness through weekly nature walks along the Blackstone River, supports the Worcester Red Sox and follows the New England Patriots, and participates in a local senior
    walking club that meets every Saturday morning.
  arts: Sarah Ruiz finds artistic solace in listening to the melodic guitar of Andrés Segovia, attending occasional folk concerts featuring salsa rhythms, and reading the poetic astrophotography of NASA’s
    Hubble collections, allowing the cosmos and cultural harmonies to intertwine in their quiet evenings.
  travel: Sarah Ruiz prefers relaxed, purpose‑driven travel, having already taken a reflective road trip through the historic towns of New England and planning a short, family‑oriented visit to San Juan
    to explore ancestral sites and the island’s vibrant coastal scenery.
  culinary: Sarah Ruiz delights in cooking island‑rooted dishes such as arroz con gandules seasoned with sofrito and hand‑wrapped pasteles, alongside garden‑fresh roasted sweet potatoes, plantains, and
    a signature avocado‑lime salsa that they proudly serve to a close circle of friends during intimate tasting sessions.
  core: Sarah Ruiz is a curiosity‑driven, hands‑on problem‑solver who balances a love of science and ancestral cooking with a fiercely independent streak and occasional anxiety‑fuelled procrastination.
background:
  cultural: 'Born to Puerto Rican parents who moved to the mainland in the early 1960s, Sarah grew up bilingual, absorbing the rhythms of bomba and plena at family gatherings while navigating predominantly
    English‑speaking neighborhoods of the Northeast. Her Catholic upbringing blended with island festivities, and she continues to celebrate holidays such as Three Kings Day and the Puerto Rican Day Parade
    in Boston, often preparing homemade dishes for the occasion. Living in Southbridge, Massachusetts for the past four decades, she has woven herself into the local fabric, participating in community‑center
    events and embracing New England customs like fall apple picking. This dual cultural lens informs her worldview: she values self‑reliance and practicality from her New England environment while cherishing
    the warmth, family focus, and culinary heritage of her Puerto Rican roots.'
attributes:
  skills: '[''Mechanical and electrical troubleshooting'', ''Statistical data analysis (Excel, SPSS)'', ''Bilingual communication (Spanish/English)'', ''Technical documentation and instructional writing'',
    ''Mentoring youth in STEM and robotics'', ''DIY home repairs and improvisational problem solving'', ''Gardening and horticultural maintenance'', ''Project planning with flexible timelines'']'
  hobbies: '[''Gardening (vegetables and heirloom plants)'', ''Puzzle solving (crosswords, Sudoku)'', ''Reading science and astronomy magazines'', ''Traditional Puerto Rican cooking'', ''Genealogy research'',
    ''Nature walks along the Blackstone River'', ''Participating in small‑group book club'', ''Volunteer mentoring for STEM youth'']'
  career_goals: 'Although retired, Sarah aims to stay intellectually active by leading a monthly senior technology workshop at the Southbridge community center, teaching basic coding and data literacy.
    She hopes to author a practical guide titled "Tech for Seniors: A Hands‑On Approach" that blends her curiosity for new tools with her preference for straightforward methods. Maintaining emotional health
    is a priority, so she plans regular mindfulness sessions and a reflective journal to manage anxiety. Reconnecting with her Puerto Rican roots through a family genealogy project and a planned short trip
    to San Juan are important personal milestones. She also aspires to volunteer as a mentor for a local after‑school STEM program, using her competitive drive to encourage students to push beyond comfort
    zones.'
