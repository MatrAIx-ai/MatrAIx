persona_description: A psychohistorian who uses psychological insights and tools to explore the "why" of history and its differences between stated intention and actual behavior. They are open-minded and
  avoid the use of theory until the later stages of research to be as open-minded as possible in examining the evidence. They find that other disciplines are increasingly open to the same concerns as psychohistorians
  and use the special insights of psychology as the most powerful lens of all. They use methods of inquiry like lenses in a telescope to see more clearly, starting by examining their own feelings towards
  war and encouraging all involved to do the same.
