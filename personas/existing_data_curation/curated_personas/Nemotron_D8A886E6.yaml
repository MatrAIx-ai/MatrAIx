  career_goals: Connie aims to stay intellectually active and socially connected. She plans to mentor high‑school and community‑college students interested in STEM through informal tutoring and a local
    “Science Saturday” program. She hopes to write a memoir that weaves together her personal history, family recipes, and lessons from her gardening experiments, and to contribute articles to the county
    library’s monthly newsletter. Volunteering at the senior center and the historic society are also priorities, as is maintaining her health so she can continue traveling with her grandchildren to national
    parks and attending regional fairs.
