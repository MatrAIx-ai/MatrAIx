persona_description: A teacher who is passionate about creating an engaging and interactive learning environment for children, emphasizing the importance of questioning and inquiry-based learning. They
  are dedicated to developing an Outstanding Learning Culture for their pupils, encouraging children to think deeply and apply their learning to the learning enquiry curriculum. They understand the importance
  of reflecting and reviewing learning as part of a supportive and nurturing learning culture, and are committed to providing parents with information on the school's learning activities. They are knowledgeable
  about the curriculum, including the National Curriculum requirements and the various "Learning Enquiries" that children will engage with throughout the year.
