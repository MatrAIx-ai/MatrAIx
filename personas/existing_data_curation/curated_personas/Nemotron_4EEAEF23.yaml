personas:
  professional: Linda Brantley, a veteran transit bus driver in Tuscaloosa, blends meticulous route planning, strict safety compliance, and a naturally charismatic, talkative demeanor as they mentor junior
    drivers, champion community outreach, and envision integrating local art into the agency’s fleet while pursuing a supervisory role.
  sports: Linda Brantley fuels her fitness routine by tackling Cheaha State Park’s rugged trails on weekends, cheering the Alabama Crimson Tide football team at Bryant‑Denny Stadium, and participating in
    the Tuscaloosa Walking Club’s seasonal 5K runs.
  arts: Linda Brantley immerses herself in Tuscaloosa’s arts scene, attending the Museum of Art’s rotating Georgia O’Keeffe exhibit, enjoying live performances by the Alabama Symphony Orchestra and folk
    singer John Moreland at the Amphitheater, and coordinating community festivals that showcase local painters like Sarah Hendricks.
  travel: Linda Brantley prefers curated road trips that blend history and nature, having explored Savannah’s historic squares, New Orleans’ French Quarter, and the Blue Ridge Parkway’s vistas, while they
    plan a future pilgrimage to Barcelona’s Gothic Quarter to study European art and architecture.
  culinary: Linda Brantley, a confident home chef, delights in perfecting shrimp and grits, fried green tomatoes, and collard greens seasoned with garden‑fresh basil and rosemary, while they pair their
    meals with sweet tea brewed from loose leaf black tea and occasionally indulge in a buttery biscuit at a downtown bakery.
  core: Linda Brantley blends relentless organization, a contagious love for community art, and an unshakable curiosity, even if that sometimes means over‑scheduling their calendar and refusing to miss
    a single local concert.
background:
  cultural: Linda is a white Southern woman raised in the Tuscaloosa area of Alabama. Her family heritage traces back to English and Scots‑Irish ancestors, and she grew up immersed in the region’s traditions
    of hospitality, community gatherings, and pride in Crimson Tide football. While she values Southern cuisine, music, and local festivals, her lifelong curiosity has led her to embrace diverse artistic
    expressions and progressive ideas. This blend of deep-rooted Southern values with an open‑minded appreciation for new experiences shapes her approach to both her professional role in public service
    and her active participation in the cultural life of her community.
