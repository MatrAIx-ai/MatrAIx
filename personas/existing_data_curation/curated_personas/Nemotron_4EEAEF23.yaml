  career_goals: Linda aims to move into a supervisory role within the transit agency, such as a driver trainer or route manager, where she can shape schedule optimization and safety protocols. She plans
    to complete a bachelor’s degree in Transportation Management at the University of Alabama, enabling her to contribute to policy development that improves service accessibility and integrates local art
    displays on buses. Additionally, Linda hopes to launch a community‑engagement program that pairs artists with transit routes, fostering a mobile cultural experience for passengers and strengthening
    neighborhood ties.
