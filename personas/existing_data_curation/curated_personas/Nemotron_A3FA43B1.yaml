    workshops'', ''Visiting art museums and galleries'', ''Community sports (ice hockey, ultimate frisbee)'', ''Volunteering for neighborhood revitalization projects'', ''Fishing trips'', ''Exploring craft
    breweries and local cafés'']'
  career_goals: Frank aspires to become a senior leader in Alaska’s infrastructure sector, ultimately directing large‑scale, resilient projects that blend engineering rigor with community‑centered design.
    He aims to obtain a master’s degree in environmental or sustainable engineering to deepen his expertise in climate‑adapted construction. In the next five years, he plans to spearhead a state‑DOT initiative
    that modernizes rural road networks while integrating public art and culturally relevant elements for Indigenous communities. Long‑term, Frank envisions launching his own consultancy that offers innovative,
    flexible engineering solutions for remote Alaskan villages, providing mentorship to young engineers and championing sustainable practices across the state.
