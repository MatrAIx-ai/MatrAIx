personas:
  professional: Frank Sanders is a civil engineer specializing in permafrost‑aware structural design and sustainable transportation planning, who blends rigorous technical analysis using AutoCAD, Civil
    3D, and GIS with spontaneous, improv‑style brainstorming to rally interdisciplinary teams toward resilient Alaskan infrastructure projects, even if their loose scheduling sometimes threatens deadline
    adherence, and they constantly seek ways to incorporate community art into engineering solutions.
  sports: Frank Sanders hits the slopes at Alyeska in winter, sleds with the Anchorage Dog‑Sled Club in spring, and hikes the Chugach Mountains with the local Chugach Hiking Club year‑round, while cheering
    on the Alaska Anchorage Seawolves and the Anchorage Ice Bears whenever possible, and they treat each session as a social recharge.
  arts: Frank Sanders captures the aurora borealis through a Nikon D850, strums acoustic renditions of Neil Young at the Anchorage Community Jam Circle, attends improv workshops at the Anchorage Repertory
    Theatre, and regularly explores exhibitions by Alaska‑born painter Stacy Bassi at the Anchorage Museum, and they often incorporate the inspiration into their own photography and songwriting.
  travel: Frank Sanders prefers spontaneous weekend getaways to remote Alaskan villages like Talkeetna and cabins near Denali, while also planning annual trips to Reykjavik in Iceland to chase northern
    lights, balancing a modest family budget with a love for off‑the‑grid adventures, and they thrive on the blend of familiar wilderness and new cultural experiences.
  culinary: Frank Sanders enjoys cooking cedar‑plank salmon and halibut chowder at home with a moderate skill set, while regularly sampling reindeer sausage and local craft brews like Anchorage Brewing
    Company’s Nightingale Ale at neighborhood pubs, and they never miss a chance to pair meals with fresh Alaskan king crab.
  core: Frank Sanders is a sociable, curiosity‑driven civil engineer who blends spontaneous creativity with rugged Alaskan adventures, often juggling impulsive spending and occasional health neglect while
    leading collaborative, art‑infused infrastructure projects.
background:
  cultural: Frank is a white American whose upbringing was rooted in the Midwestern United States before moving to Anchorage for his civil‑engineering career. Living in Alaska has immersed him in a frontier‑spirit
    culture that values self‑reliance, close ties to the natural environment, and a respect for the Indigenous peoples of the region. He regularly engages with Alaska Native cultural events—such as the
    Iñupiat Heritage Festival and community gatherings at the Alaska Native Heritage Center—while appreciating the blend of modern urban life and outdoor traditions that define Anchorage. His perspective
    blends mainstream American customs (holidays, family life) with a deep admiration for the state’s rugged landscape, local art scene, and the collaborative ethos of the Alaskan community.
