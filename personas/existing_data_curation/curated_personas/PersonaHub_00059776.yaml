persona_description: A biologist who studies the relationship between trees and the ecosystem, particularly the role of trees in mutual support and the concept of class in tree societies. He is interested
  in understanding how trees interact with one another and the environment, and how their communication with other species is encoded in their physical structures. He is fascinated by the idea that trees
  have a different time scale from human societies and that their interactions are more complex and interconnected. He is also interested in the concept of class in tree societies and how it relates to
  the idea of "second-class citizens."
