personas:
  professional: Jingyu Le is a pre‑teen coding enthusiast whose disciplined approach turns Python puzzles into functional scripts, while their strategic mindset from competitive chess fuels a relentless
    pursuit of precision and measurable achievement in every digital project.
  sports: Jingyu Le’s athletic regimen features early‑morning treadmill runs to boost stamina for the school’s cross‑country team, weekend badminton matches at the community center, and a steadfast fandom
    for the Los Angeles Lakers, reflecting a preference for structured, individual‑focused fitness over large‑team sports, and they keep a training log after each session.
  arts: Jingyu Le cultivates artistic expression through daily piano practice of Beethoven’s “Moonlight Sonata,” meticulous Chinese calligraphy inspired by the classic Lantingji Xu, and occasional viewings
    of Studio Ghibli’s “Spirited Away,” allowing them to balance analytical precision with creative flow.
  travel: Jingyu Le plans trips with the same checklist rigor they apply to model kits, favoring historically rich destinations like London’s British Museum, the Smithsonian in Washington, D.C., and a planned
    future itinerary to Kyoto’s temples, and they always prioritize educational value over leisure.
  culinary: Jingyu Le approaches cooking with methodical precision, mastering recipes for sushi rolls with avocado and cucumber, spaghetti carbonara, and homemade matcha latte, timing each step with a kitchen
    timer, while favoring balanced meals that sustain their focus for study sessions, and they relish the exactness of measured ingredients.
  core: Jingyu Le is a methodical 14‑year‑old whose love of routine fuels a disciplined blend of coding, chess, and piano, tempered by a competitive edge, occasional skepticism, and a quietly quirky habit
    of obsessively arranging books by color.
background:
  cultural: Jingyu's family emigrated from China and settled in Texas, preserving many aspects of their heritage at home. Mandarin is spoken daily, and traditional customs such as celebrating the Lunar
    New Year, preparing dumplings, and practicing calligraphy are integral to family life. The household places a strong emphasis on education, respect for elders, and collective responsibility, reflecting
    core East Asian values. While embracing these cultural roots, Jingyu also participates in the broader Mount Pleasant community, attending a local Chinese cultural association, engaging in school activities,
    and navigating the blend of Chinese and American influences that shape her identity.
