  career_goals: Jingyu aspires to pursue a career in biomedical engineering, aiming to design innovative medical devices that improve patient outcomes. She plans to maintain her high academic standards,
    secure a scholarship to a top university, and eventually work in research and development within a reputable medical‑technology firm. As a secondary, equally practical ambition, she considers becoming
    a software engineer, leveraging her strong programming foundation to contribute to stable, high‑impact technology projects.
