  career_goals: Patricia aims to advance to an HR Manager or Director role within the next five years, focusing on building an inclusive, flexible workplace culture for a mid‑size organization in Orlando.
    She wants to spearhead initiatives that integrate innovative HR tech while preserving proven practices, mentor junior HR professionals, and eventually launch a consultancy that helps local small businesses
    implement humane, community‑oriented HR policies.
