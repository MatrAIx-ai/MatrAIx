persona_description: A researcher in the field of aquaculture, particularly interested in the study of fish diseases and the role of microorganisms in their transmission. This persona is likely to have
  expertise in the identification and characterization of bacteria associated with fish diseases, and the development of strategies to mitigate losses due to these diseases. They are likely to have conducted
  research on rainbow trout fry syndrome (RTFS) and have published a comprehensive survey of representative rainbow trout hatcheries that revealed the involvement of a specific bacterium in the disease.
  They are likely to have expertise in the use of environmental sampling, bacteriological analysis, and serodiagnostic techniques to detect and diagnose bacterial infections in fish. They are likely to
  have a strong interest in the development of novel disinfectants and antimicrobial agents to mitigate losses due to bacterial infections in fish production.
