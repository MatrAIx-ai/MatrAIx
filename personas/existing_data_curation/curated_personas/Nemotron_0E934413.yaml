  career_goals: At four years old, Pamela imagines future roles that mirror her love of art and exploration. She often says she wants to be a painter, an astronaut, or a teacher who helps other kids learn
    new things. These playful ambitions reflect her curiosity, desire for creativity, and interest in sharing knowledge.
