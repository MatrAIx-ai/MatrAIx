personas:
  professional: Pamela Post, a budding junior architect in the sandbox, uses blocks and crayons to design imaginative structures, channeling her curiosity, flexible planning, and sociable energy into collaborative
    play with peers.
  sports: Pamela Post, a lively member of the Little Kickers Soccer Club who sprints after the ball on Tuesday evenings, enjoys weekly swimming lessons at the community pool, and proudly cheers for the
    hometown baseball team, the Springfield Storm, during family outings.
  arts: Pamela Post, a bright little painter who splashes watercolors onto oversized paper while humming Raffi’s song 'Baby Beluga', attends storytime at the neighborhood library, and looks up to children’s
    author Mo Willems for imaginative inspiration.
  travel: Pamela Post, an adventurous toddler who loves weekend trips to the local zoo, reminisces about a family vacation to Disney World, dreams of exploring the butterfly garden in Costa Rica, and hopes
    to someday see the Eiffel Tower in Paris.
  culinary: Pamela Post, a picky eater who devours cheese pizza, chicken nuggets, and apple slices, protests broccoli and tofu, loves stirring mac and cheese with a wooden spoon, and enjoys honey drizzle
    on toast for breakfast.
  core: Pamela Post, a curious, energetic, and delightfully disorganized four‑year‑old who transforms everyday moments into spontaneous art projects and snack‑filled adventures.
background:
  cultural: Pamela is a White American child raised in Scottsdale, Arizona. Her family engages in typical Southwest community activities, such as visiting local parks, attending summer camp programs, and
    participating in cultural events at the Scottsdale Public Library. She is exposed to a blend of suburban Arizona life and broader U.S. cultural influences, including school celebrations of diverse holidays,
    and develops an appreciation for the desert landscape and outdoor recreation.
