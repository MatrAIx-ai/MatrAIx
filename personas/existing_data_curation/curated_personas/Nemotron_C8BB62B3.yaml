personas:
  professional: Jennifer Deleon, an aspiring digital illustrator and teenage writer, weaves bilingual storytelling into colorful comic panels, channeling boundless imagination while they often leave projects
    to the last minute because of their relaxed attitude toward obligations.
  sports: Jennifer Deleon, a lively member of the local community soccer team and occasional participant in weekend dance workshops, cheers for the nearby LA Galaxy, follows the Los Angeles Dodgers during
    baseball season, and enjoys sprinting around the neighborhood park with friends, blending a love for team sports, rhythmic movement, and spontaneous backyard games that they eagerly join whenever free.
  arts: Jennifer Deleon, whose evenings are filled with sketching fantasy worlds, experimenting with digital painting apps, practicing calligraphy, and dancing to Bad Bunny, J Balvin, and classic cumbia
    tunes from Los Ángeles Azules, they often draw inspiration from their grandparents’ folk stories and the vibrant mural art on city walls, creating a unique blend of modern pop culture and traditional
    motifs in their creations.
  travel: Jennifer Deleon, who prefers spur‑of‑the‑moment trips to local beaches, weekend journeys to grandparents' hometown for vibrant Independence Day festivities and to observe Semana Santa processions,
    and occasional family vacations to historic sites like the old town of Puebla, dreams of trekking to Machu Picchu next summer, balancing relaxed family outings with a yearning for grand adventure that
    they eagerly plan in snatches of free time.
  culinary: Jennifer Deleon, an enthusiastic kitchen helper who expertly flips pupusas stuffed with cheese and loroco, seasons homemade salsa verde with fresh cilantro and a hint of chilito, likes to experiment
    with sweet rice pudding topped with cinnamon, yet they often skip dinner if a late‑night gaming session runs long, reflecting a love of traditional flavors tempered by teenage time‑management quirks.
  core: Jennifer Deleon, a creatively restless 13‑year‑old who blends an imagination fueled by fantasy stories, bilingual family traditions, and a penchant for last‑minute bursts of artistic energy, all
    while they juggle school, gaming, and the occasional impulsive snack binge.
background:
  cultural: Jennifer was born and raised in Anaheim to Salvadoran immigrant parents. At home, Spanish is spoken and she participates in family traditions such as making and eating pupusas, celebrating Semana
    Santa, and observing El Día de la Independencia de El Salvador. Her community includes a vibrant Latino neighborhood where she attends cultural festivals, dance workshops, and community murals that
    celebrate Salvadoran heritage. This bicultural environment has shaped her worldview, giving her a strong sense of family, a love for delicious Salvadoran cuisine, and an appreciation for artistic expressions
    that blend traditional motifs (like indigo patterns and volcanic landscapes) with modern pop culture. She balances both cultures, using her bilingual abilities to navigate school and community life,
    and often incorporates Salvadoran iconography into her art projects.
attributes:
  skills: '["Digital illustration", "Traditional sketching", "Creative writing (short stories & poetry)", "Basic coding (Scratch, introductory Python)", "Bilingual Spanish-English communication", "Cooking
    traditional Salvadoran dishes", "Mobile photography", "Collaborative group project leadership"]'
  hobbies: '["Sketching and doodling", "Digital painting", "Creative writing (fantasy & poetry)", "Playing Minecraft (creative mode)", "Cooking pupusas with family", "Listening to Latin music and dancing",
    "Mobile photography", "Reading fantasy novels", "Practicing calligraphy"]'
  career_goals: Jennifer dreams of turning her love for imagination and visual storytelling into a career as a concept artist or illustrator for video games, animation, or children's books. She hopes to
    attend an art-focused high school and later a university program in illustration or graphic design, where she can blend her Salvadoran cultural motifs with contemporary digital media. Long-term, she
    envisions creating a community art space in Anaheim that celebrates Latinx culture and offers workshops for other young creators. She also sees herself possibly pursuing a side path in educational content
    creation, developing bilingual storybooks that share Salvadoran folklore with a wider audience.
