  career_goals: Mayte aims to complete her associate degree in nursing to become a Licensed Practical Nurse, with a long‑term ambition of leading a community health program that blends senior care with
    art‑therapy initiatives. She hopes to obtain a CNA certification, mentor younger staff members, and eventually transition into a supervisory role where she can champion culturally informed practices
    and introduce innovative, art‑based wellness activities for the elderly population in Harlingen. Her competitive nature drives her to set measurable milestones for professional growth while maintaining
    the high standards of patient care she values.
