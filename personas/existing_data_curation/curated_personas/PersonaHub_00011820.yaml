persona_description: A construction engineer who specializes in the design and construction of concrete structures, particularly in the use of reinforced concrete and prestressed concrete. They are skilled
  in the chemical process of hydration and the use of water in the cement mixture, and have experience in the use of concrete in various applications such as pavements, architectural structures, foundations,
  motorways/roads, bridges/overpasses, parking structures, brick/block walls, and footings for gates, fences and poles. They are also knowledgeable in the use of concrete in the United States and the global
  industry, and have experience in the use of reinforced concrete and prestressed concrete in the construction of highways and other infrastructure.
