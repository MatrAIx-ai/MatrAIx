data:
  user 1 personas: 'I have borderline personality disorder.

    It is my universe , and everyone else is just a character in it.

    At night , i party hard in the atlanta club scene , and i never miss a music festival.

    I work as a dental assistant in a ritzy part of town.'
  user 2 personas: 'My sister is a published author.

    I was a champion downhill skier in college.

    I vacation in florida every winter.

    My favorite color is yellow.'
  Best Generated Conversation: 'User 1: I am a dental assistant and I love to party in Atlanta.

    User 2: That sounds like fun! I love to party too.

    User 1: What kind of parties do you like to go to?

    User 2: I like to go to all kinds of parties, but my favorite kind is a good ol'' fashioned house party.

    User 1: I love house parties too! They''re the best.

    User 2: I know, right? They''re so much fun.

    User 1: What''s your favorite part about house parties?

    User 2: I love the music, the dancing, and the people.

    User 1: Me too! I love just being able to let loose and have fun.

    User 2: Exactly! House parties are the best way to do that.

    User 1: So, what''s your favorite music to listen to at parties?

    User 2: I like all kinds of music, but my favorite is probably hip-hop.

    User 1: Hip-hop is great! I love to dance to it.

    User 2: Me too! It''s so much fun.

    User 1: So, what are you doing this weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m going to a party. Do you want to come with me?

    User 2: Sure! I''d love to.

    User 1: Great! I''ll pick you up at 8.

    User 2: Sounds good.

    User 1: See you then!


    [At the party]

    User 1: This is so much fun!

    User 2: I know, right?

    User 1: I love the music.

    User 2: Me too.

    User 1: This is the best party ever!

    User 2: I know, right?


    [Later that night]

    User 1: I had so much fun tonight!

    User 2: Me too!

    User 1: We should do this again sometime.

    User 2: Definitely'
