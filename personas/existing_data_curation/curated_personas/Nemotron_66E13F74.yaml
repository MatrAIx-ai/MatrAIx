personas:
  professional: Solange Gibson, a 23‑year‑old retail salesperson in Jesup, blends curiosity about new technology with practical front‑line expertise, excelling at POS systems, visual merchandising and conflict
    resolution while proactively training new staff and eyeing a shift‑lead promotion within two years.
  sports: Solange Gibson enjoys playing pick‑up basketball at the community center and jogging the scenic rails‑to‑trails path, roots for the Atlanta Braves and the Savannah Bananas, and follows a weekly
    yoga class to stay flexible, balancing competitive spirit with a relaxed approach to fitness.
  arts: Solange Gibson immerses themselves in gospel choir rehearsals, soul playlists featuring Aretha Franklin and Kirk Franklin, and hip‑hop dance sessions with friends, while sketching runway‑inspired
    fashion ideas influenced by designers like Dapper Dan and drawing inspiration from local theater productions such as the Jesup Community Playhouse.
  travel: Solange Gibson prefers road‑trip adventures that blend cultural heritage and relaxation, often weekend‑hopping to historic Savannah for its squares and cuisine, planning a future pilgrimage to
    New Orleans for Mardi Gras, and dreaming of a spring visit to Washington, D.C.’s National Museum of African American History, all while keeping travel costs within a modest budget.
  culinary: Solange Gibson delights in cooking Southern comfort staples such as collard greens slow‑cooked with smoked turkey, crispy fried chicken seasoned with a secret blend of herbs, peach cobbler with
    a buttery crust, and sweet tea brewed with a dash of fresh mint, often preparing extra portions for church gatherings and family reunions.
  core: Solange Gibson, 23, balances a curious love of new tech with practical retail savvy, leverages community roots to fuel ambition, and channels a penchant for gospel, fashion sketches, and budgeting
    into a purposeful, community‑focused life.
background:
  cultural: Solange identifies as African‑American and is deeply rooted in the Southern Black tradition of Jesup, Georgia. Her family places strong emphasis on church involvement, community solidarity,
    and the oral storytelling tradition, which have shaped her values of resilience and mutual support. Growing up in a historically Black Baptist congregation, she was immersed in gospel music, choir participation,
    and regular community service, fostering both compassion and a sense of responsibility. The local civil‑rights legacy and family narratives about perseverance influence her worldview and ambition. She
    celebrates cultural milestones such as Juneteenth and Black History Month, cherishes soul food gatherings, and maintains close ties with extended family across the Southeast, blending regional customs
    with a contemporary outlook.
attributes:
  skills: '[''Customer service'', ''POS operation'', ''Inventory management'', ''Visual merchandising'', ''Sales analytics'', ''Conflict resolution'', ''Effective communication'', ''Time management'', ''Basic
    bookkeeping'', ''Digital marketing basics'']'
  hobbies: '[''Reading'', ''Hip-hop dance'', ''Cooking Southern cuisine'', ''Volunteering (financial literacy)'', ''Journaling'', ''Sketching fashion designs'', ''Listening to soul and gospel music'']'
  career_goals: Solange aims to leverage her blend of curiosity and practical retail experience to advance into a supervisory role within the next two years, first as a shift lead and then as an assistant
    store manager. She plans to complete an associate degree in Business Management while continuing to work, using her new academic knowledge to improve store performance metrics. Long‑term, she envisions
    opening her own boutique that celebrates contemporary African‑American fashion, incorporating community‑focused initiatives such as mentorship programs for teens interested in retail careers. She is
    driven to become a recognized leader who balances business success with giving back to her hometown community.
