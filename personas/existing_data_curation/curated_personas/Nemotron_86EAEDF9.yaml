  career_goals: Maria aims to advance from frontline inspection to a supervisory role within the next three years, targeting a Shift Lead or QA Team Lead position where she can mentor newer staff and shape
    quality policies. She plans to earn an ASQ Certified Quality Inspector credential and enroll in an associate degree program in Industrial Technology to deepen her technical knowledge. Long‑term, Maria
    envisions moving into a Quality Assurance Manager role, overseeing process improvements across multiple production lines, and eventually consulting for small manufacturers seeking to implement robust
    quality systems. Her competitive drive motivates her to set measurable performance targets and track her progress rigorously.
