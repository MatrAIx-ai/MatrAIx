  career_goals: Maria Anne aims to move into a supervisory or care coordination role within home health services over the next three years. She plans to earn a Certified Nursing Assistant (CNA) credential
    and complete a post‑secondary nursing program to deepen her clinical expertise. Her long‑term ambition is to develop a small, client‑centered home‑care agency that offers structured, high‑quality services
    while preserving the flexibility her clients value. She also hopes to mentor newer aides and contribute to local senior‑health outreach programs.
