personas:
  professional: Manuel Lugo, a seasoned construction expert with four decades of hands‑on experience, blends precise concrete finishing and code‑compliant framing with artistic flair from his folk‑painting
    hobby, and they are now channeling their meticulous organization and mentorship skills into pursuing a Texas general‑contractor license to oversee community‑focused remodels.
  sports: Manuel Lugo, a dedicated fan of the Dallas Cowboys and the Houston Astros, spends weekends fishing at Lake Worth, enjoys low‑impact cardio through salsa and cumbia dance evenings, and they occasionally
    join a senior baseball league with the Fort Worth Veterans.
  arts: Manuel Lugo regularly visits exhibitions at the Fort Worth Cultural District, draws inspiration from the vivid murals of Diego Rivera and the soulful rhythms of Celia Cruz, and they channel that
    energy into their own folk‑painting classes and community mural projects.
  travel: Manuel Lugo prefers road‑tripping to historic towns such as Galveston, Marfa, and Fredericksburg, planning itineraries around art festivals and local cuisine, and they dream of a leisurely Caribbean
    cruise to capture sunrise photos over the sea.
  culinary: Manuel Lugo is an avid home chef who perfects family‑style mole, hand‑made tamales, and slow‑cooked pozole, layering bold chilies, roasted pumpkin seeds, and fresh cilantro, and they often host
    large gatherings where the fragrant broth drifts through their backyard.
  core: Manuel Lugo is a disciplined, socially‑driven builder‑artist who transforms concrete into canvas, balances meticulous budgeting with spontaneous spice hunts, and they keep their mind sharp by juggling
    blueprints, dominoes, and dance steps.
background:
  cultural: Manuel is a first‑generation Mexican American whose parents immigrated from Jalisco. He grew up bilingual, speaking Spanish at home and English in school, and he maintains strong ties to Mexican
    traditions such as Día de los Muertos, Semana Santa, and family‑centered celebrations. Living in Fort Worth's vibrant Hispanic community, he participates in local festivals like Fiesta de la Independencia
    and supports the Mexican American Chamber of Commerce. His cultural identity shapes his appreciation for artisanal craftsmanship, vibrant colors, and communal solidarity. While fully integrated into
    Texan life, he balances this with a deep respect for his heritage, often incorporating Mexican motifs into his construction work and sharing cultural stories with his grandchildren.
attributes:
  skills: '["Concrete finishing", "Carpentry and framing", "Blueprint interpretation", "Construction site safety compliance (OSHA)", "Heavy equipment operation", "Project scheduling and time management",
    "Budgeting and cost estimation", "Team leadership and mentorship", "Effective communication and conflict resolution", "Decorative finishing and mural painting", "Cultural heritage preservation in construction",
    "Organizational record‑keeping and inventory management", "Sustainable building practices"]'
  hobbies: '["Attending art exhibitions", "Traditional Mexican folk painting", "Community mural projects", "Cooking Mexican cuisine", "Salsa and cumbia dancing", "Playing dominoes", "Volunteer construction
    with Habitat for Humanity", "Fishing at Lake Worth", "Photography of historic neighborhoods", "Reading about construction innovation", "Exploring Mexican history and literature"]'
  career_goals: Manuel aims to transition from daily labor to a supervisory and consulting role. He plans to obtain a Texas general contractor license within the next two years, allowing him to manage small
    residential remodels that incorporate artistic elements reflecting his Mexican heritage. He wants to mentor a new generation of workers, especially those from the local Hispanic community, by offering
    apprenticeships and safety training workshops. Additionally, he hopes to launch a side venture that provides custom decorative concrete and mural services for community spaces such as churches, schools,
    and local businesses. As he approaches retirement, Manuel envisions a steady income from consulting, occasional project oversight, and participation in community heritage projects, while staying active
    in a social and collaborative environment.
