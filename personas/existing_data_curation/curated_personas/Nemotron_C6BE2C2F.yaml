  career_goals: Although Jose is only four, he already shows an interest in jobs that offer clear structure, tangible results, and ways to help others. He often says he wants to be a firefighter because
    of the predictable schedule and the chance to protect his community, and he also talks about becoming a construction worker or a builder, where he can use his love for assembling things. These ambitions
    align with his practical mindset and his desire to contribute to a safe, organized environment.
