personas:
  professional: Jose Perez, a meticulous 4‑year‑old pretend builder, they use colorful interlocking blocks to assemble tidy towers and follow step‑by‑step instructions with delight, embodying their love
    of structure and predictable outcomes.
  sports: Jose Perez, a spirited 4‑year‑old, they play in the Bronx Little League soccer program at Crotona Park, cheer for New York City FC during televised matches, and are a seasonal fan of the New York
    Yankees in spring, balancing organized team play with their preference for small‑group activities.
  arts: Jose Perez, a creative 4‑year‑old, they spend afternoons drawing vibrant papel picado for Día de los Muertos, dance to the upbeat tracks of Selena and the soundtrack of Disney's 'Coco', and enjoy
    watching classic cartoons featuring Mickey Mouse.
  travel: Jose Perez, a curious 4‑year‑old, they enjoy family trips to the Bronx Botanical Garden and the city zoo, dream of visiting the Grand Canyon and a beach resort in Puerto Rico, and prefer itineraries
    that include familiar routines and short, guided excursions.
  culinary: Jose Perez, a budding little chef, they love helping their mother roll soft corn tortillas for tacos, stirring steaming atole flavored with cinnamon and vanilla, and eagerly dip crisp tortilla
    chips in guacamole made from ripe avocado and lime, though they stubbornly refuse broccoli.
  core: Jose Perez, a structure‑loving 4‑year‑old who arranges toys in perfect rows, saves every coin in a pink piggy bank, builds block towers with meticulous care, and cherishes family traditions like
    Día de los Muertos, blending predictability with quiet curiosity.
background:
  cultural: Jose is the son of Mexican immigrants living in the Bronx, a culturally vibrant neighborhood. At home, Spanish is spoken daily, and he grows up with Mexican traditions such as celebrating Día
    de los Muertos, Mexican Independence Day, and enjoying foods like tacos, tamales, and atole. The multicultural environment of the Bronx exposes him to both Hispanic and broader New York City cultures,
    fostering bilingualism, close family ties, and participation in community events at local parks and cultural centers.
