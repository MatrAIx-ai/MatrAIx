  career_goals: At this stage, Torbjorn aims to earn a senior detective position within the Marion County Sheriff's Office, where he can mentor younger officers and lead a specialized cold‑case unit. He
    is driven to improve investigative protocols to reduce case backlog and to foster stronger community trust through outreach programs. Long‑term, he envisions transitioning to a consultant role that
    supports regional law‑enforcement agencies with best‑practice training, while also contributing his experience to a local community college’s criminal justice curriculum.
