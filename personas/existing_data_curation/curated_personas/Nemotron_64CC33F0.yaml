personas:
  professional: Noel Aquino is a seasoned credit‑operations specialist with two decades of experience in credit analysis, risk assessment, and core banking platforms like FIS and Jack Henry; they blend
    pragmatic curiosity with a relaxed, people‑focused style that shines when mediating team disputes and improvising workflow solutions.
  sports: Noel Aquino enjoys walking their dog in Klyde Warren Park, follows the Dallas Cowboys and Dallas Mavericks, and occasionally joins the DFW Soccer Club for low‑intensity recreational matches, preferring
    activities that fit their flexible schedule and love of solitude.
  arts: Noel Aquino strums acoustic guitar while listening to folk legends like Bob Dylan and Gillian Welch, dives into mystery novels by Agatha Christie and Tana French, and occasionally attends Dallas
    Symphony Orchestra performances, letting music and literature shape their quiet, reflective evenings.
  travel: Noel Aquino favors short, budget‑friendly road trips to Hill Country towns like Fredericksburg and occasional long‑haul flights to Oaxaca, Mexico, where they explore local markets, while dreaming
    of a relaxed vineyard getaway in Tuscany when family commitments allow.
  culinary: Noel Aquino is an intermediate‑level cook who experiments with traditional mole verde infused with smoked chipotle and crafts grilled fish tacos using garden‑grown cilantro, lime, and tomatoes,
    always adding a creative twist to beloved family recipes.
  core: Noel Aquino is a pragmatic, garden‑tending credit analyst who balances curiosity with laid‑back flexibility, often improvising both in the kitchen and at work while quietly nurturing community ties
    through music, yoga, and financial‑literacy outreach.
background:
  cultural: Noel is a first‑generation Mexican‑American, raised in Texas by parents who immigrated from Jalisco. She grew up bilingual, speaking Spanish at home and English in school, and she maintains
    strong ties to her heritage through celebrations of Día de los Muertos, Cinco de Mayo, and family gatherings centered around traditional foods. Her Mexican roots inform her warm, cooperative nature
    and her emphasis on community and family. Living in Euless, she blends these cultural values with the diverse, suburban Texan environment, participating in local Hispanic cultural events while also
    embracing the broader multicultural fabric of the Dallas‑Fort Worth metroplex.
attributes:
  skills: '[''Credit analysis'', ''Risk assessment'', ''Financial statement review'', ''Regulatory compliance'', ''Banking software (FIS, Jack Henry)'', ''Bilingual communication (Spanish/English)'', ''Customer
