  hobbies: '[''Cooking (Mexican and fusion)'', ''Gardening (herbs, peppers, vegetables)'', ''Reading (mystery novels, personal finance)'', ''Walking dog in local parks'', ''Yoga & meditation'', ''Playing
    acoustic guitar'', ''Volunteering (financial‑literacy workshops)'', ''Photography (nature)'', ''Attending small cultural events (Mexican festivals)'']'
  career_goals: Noel aims to transition into a supervisory credit‑operations role where she can mentor junior staff and shape a supportive team culture. She plans to earn a Certified Credit Professional
    (CCP) credential and complete her undergraduate degree in finance. Long‑term, she envisions launching a community‑focused credit counseling service that assists Mexican‑American families in the Dallas‑Fort
    Worth area, combining her expertise with her passion for financial education. Throughout, she seeks a flexible schedule that honors her family responsibilities and personal well‑being.
