  career_goals: Although retired, Tammy aims to deepen her community impact by leading regular art workshops for seniors, organizing intergenerational storytelling evenings, and expanding her genealogy
    research into a modest family‑history booklet for her descendants. She hopes to mentor new volunteers at the senior center, continue lifelong learning through occasional community‑college courses in
    art and history, and travel to regional museums and historic sites across California. Tammy also dreams of publishing a small collection of her watercolor paintings alongside personal reflections on
    the neighborhoods she loves.
