persona_description: A hydrologist or river researcher who is interested in the classification of unregulated streams into groups based on hydrologic properties. They are looking for a practical approach
  to provide environmental flow standards and understand how the relative importance of variables changes with regard to scale. They are likely to be familiar with hydrologic statistics and have experience
  with creating regional datasets. They may also be interested in the development of classification trees and the comparison of flow classes to those of the entire US.
