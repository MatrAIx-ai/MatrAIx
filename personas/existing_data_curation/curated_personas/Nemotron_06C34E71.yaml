  career_goals: Chau aspires to advance to a senior detective role where he can lead complex investigations and shape strategic crime‑prevention initiatives. He aims to become a cultural liaison specialist,
    bridging the gap between the police department and the Vietnamese community, and to develop training programs that embed cultural competency and ethical decision‑making into the academy curriculum.
    Ultimately, Chau envisions serving as a lieutenant, guiding department policy toward innovative, community‑focused policing while mentoring the next generation of officers.
