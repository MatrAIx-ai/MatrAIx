persona_description: A scientist at the U.S. National Institute of Environmental Health Sciences who specializes in the study of respiratory toxicity, particularly the effects of diacetyl on the respiratory
  system. The scientist has conducted research on the development of lymphocytic bronchiolitis in mice exposed to diacetyl, and has concluded that workplace exposure to diacetyl contributes to the development
  of obliterative bronchiolitis. The scientist is also interested in the effects of diacetyl on other respiratory conditions, such as popcorn lung, and is conducting further research to determine the appropriate
  levels of diacetyl exposure for human health.
