  career_goals: Although retired from formal employment, Judy aspires to expand her impact in the Portland community by developing a senior‑focused art program that pairs local artists with older adults
    for collaborative workshops. She hopes to mentor young volunteers in compassionate service, champion accessible public art installations, and compile a memoir of her life experiences to inspire intergenerational
    dialogue. Additionally, Judy aims to cultivate a neighborhood pollinator garden that serves both as an educational resource and a modest contribution to local environmental stewardship.
