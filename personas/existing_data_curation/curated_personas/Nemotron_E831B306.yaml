personas:
  professional: Judy Caldwell, a retired community organizer with a lifelong love of art, channels her empathetic listening and meticulous planning into launching a senior‑focused art workshop series that
    pairs local Portland artists with older adults, while mentoring junior volunteers and championing accessible public installations.
  sports: Judy Caldwell stays active with weekly hikes on the Columbia River Gorge, participates in a senior yoga class at the Portland Community Center, and cheers on the Portland Timbers during MLS season
    while occasionally attending Portland Trail Blazers games with their book club friends.
  arts: Judy Caldwell immerses herself in the arts by attending gallery openings featuring local painter Sarah Mitchell, studying the works of Monet and Georgia O'Keeffe, listening to folk singer Joan Baez
    on vinyl, and leading watercolor sessions that echo the subdued palettes of the Pacific Northwest.
  travel: Judy Caldwell prefers low‑stress, culturally enriching trips, often planning weekend getaways to the Oregon Coast’s Cannon Beach, a spring pilgrimage to Seattle’s Pike Place Market, and a long‑awaited
    summer tour of Kyoto’s historic temples, all while juggling a modest travel budget and their volunteer commitments.
  culinary: Judy Caldwell, an avid home chef, delights in preparing seasonal dishes like cedar‑planked salmon with locally foraged fiddleheads, roasted beet and goat cheese salad, and hearty root vegetable
    stew flavored with rosemary and sage, often swapping recipes in their senior cooking circle and experimenting with wildflower honey.
  core: Judy Caldwell is a curiosity‑driven, compassion‑centered retiree who balances meticulous volunteer coordination with spontaneous watercolor splashes, yet occasionally loses track of her garden watering
    schedule when a new exhibit opens.
background:
  cultural: Judy grew up in the Midwest before moving to the Pacific Northwest in her early adulthood, adopting Portland's progressive, environmentally conscious culture while retaining a Midwestern sensibility
    of community and modesty. As a white American who has lived through the social changes of the 1960s and 70s, she values inclusivity, artistic expression, and civic engagement. Her upbringing in a Protestant
    family informs a strong ethic of service and compassion, though she now identifies as spiritually eclectic, drawing inspiration from both traditional values and the eclectic, cooperative spirit of Portland's
    diverse neighborhoods.
