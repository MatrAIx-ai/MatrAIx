    craft breweries'',''Traveling to experience diverse cultures'']'
  career_goals: Chaning aims to advance to a senior leadership role within a regional bank, where she can shape lending policies that increase access for low‑income borrowers. She dreams of launching a
    community‑focused financial empowerment program that combines credit counseling with fintech tools, eventually founding a startup that offers micro‑loans and digital financial‑education resources tailored
    to Black entrepreneurs in the Pittsburgh area. Long‑term, she hopes to become a recognized advocate for equitable financing and mentor the next generation of financial professionals.
