  hobbies: '[''Visiting art galleries and museums'', ''Street photography'', ''Digital illustration and photo editing'', ''Cooking Mexican cuisine'', ''Exploring eclectic music'', ''Reading philosophy and
    psychology'', ''Journaling and productivity planning'', ''Hiking in the Texas Hill Country'', ''Volunteering at cultural festivals'', ''Home organization projects'']'
  career_goals: Luis aims to obtain his GED within the next year and pursue a certification in project management or community arts administration. His short‑term goal is to secure a full‑time role as a
    program coordinator for a cultural institution or nonprofit in Dallas, where he can blend his organizational discipline with his love for art and community engagement. Long‑term, he envisions launching
    a boutique Mexican‑inspired food truck that doubles as a mobile cultural showcase, offering authentic cuisine alongside art exhibits and live performances. He also aspires to build a freelance portfolio
    in digital photography and content creation to support his entrepreneurial venture while continuing professional development in visual arts and cultural programming.
