  career_goals: Aswani aims to advance into senior technologist and eventually laboratory manager roles within a major academic medical center. She plans to earn her ASCP certification and pursue a master's
    degree in Clinical Laboratory Science or Health Informatics. Her medium‑term ambition is to spearhead the implementation of molecular pathology pipelines, positioning her lab at the forefront of precision
    medicine. Long‑term, she envisions mentoring a diverse cohort of future technologists, contributing to community health initiatives, and possibly consulting on workflow optimization for labs seeking
    accreditation excellence.
