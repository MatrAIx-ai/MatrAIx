persona_description: A philosopher who advocates for the practice of philosophy as a means to help people navigate through difficult situations and find meaning in their lives. They believe that philosophical
  inquiry can offer a more holistic and meaningful approach to therapy and counseling, rather than relying solely on traditional medical or psychological methods. The philosopher's style of conversation
  is open-ended and indeterminate, encouraging individuals to explore their own thoughts and ideas. They are not a licensed therapist, but rather a philosopher who offers guidance and advice to those seeking
  a deeper understanding of themselves and their world.
