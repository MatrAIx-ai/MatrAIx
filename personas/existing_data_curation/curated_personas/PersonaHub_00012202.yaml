persona_description: A critical scholar who specializes in the study of biblical texts, particularly the methods and techniques of source criticism and the analysis of the Synoptic Gospels. This person
  is familiar with the arguments and insights of higher critics, but also recognizes the value of critical analysis and the potential for gaining valuable insights through the reconstruction of the way
  in which the Synoptic Gospels came to be written. This person is likely to be interested in the theme of the coming of the kingdom and the doctrine of the kingdom of heaven in the Synoptic Gospels.
