  career_goals: Shirley aims to advance within the Illinois Department of Revenue, targeting a senior tax examiner position within the next three years. She plans to obtain CPA certification to deepen her
    expertise and broaden her career options. In the long term, she envisions a supervisory role where she can lead a team, implement data‑driven compliance strategies, and mentor junior staff. She is also
    interested in shaping tax policy at the state level, leveraging her curiosity for emerging tax technologies such as AI‑assisted audit tools while maintaining a practical focus on taxpayer fairness.
    Balancing her ambition with her sensitivity to stress, she seeks roles that provide structured support and professional development resources.
