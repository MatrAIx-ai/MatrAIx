  career_goals: Christopher aims to advance to senior leadership, such as a Director of Operations or a Corporate Social Responsibility (CSR) executive, where he can integrate his managerial acumen with
    his passion for community impact. He plans to pursue a bachelor's degree in Business Administration and obtain a Project Management Professional (PMP) certification to deepen his strategic capabilities.
    Long‑term, he hopes to mentor emerging managers, champion innovative, compassion‑driven workplace practices, and lead initiatives that strengthen local economic development in the Peoria region.
