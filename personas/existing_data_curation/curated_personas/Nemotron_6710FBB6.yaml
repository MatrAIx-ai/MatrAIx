  hobbies: '[''exploring Chicago murals'', ''visiting art galleries and indie film screenings'', ''digital photography'', ''sketching and drawing'', ''cooking traditional Guatemalan dishes'', ''listening
    to marimba, salsa, and indie folk music'', ''playing acoustic guitar'', ''reading contemporary philosophy and art theory'', ''volunteering at community art workshops'']'
  career_goals: Hector aims to earn his GED within the next year and enroll in a community college program focused on graphic design or visual arts. He envisions working as an assistant at a local museum
    or cultural center, where he can fuse his love for art, storytelling, and his Guatemalan heritage. In the longer term, he aspires to become a community arts coordinator, curating public art projects
    and pop‑up cultural festivals that highlight underrepresented neighborhoods in Chicago. Parallel to this, Hector dreams of launching a small venture that offers authentic Guatemalan street‑food experiences
    at city events, blending his culinary passion with entrepreneurship.
