personas:
  professional: Hector Muniz, an aspiring community arts coordinator and visual storyteller, blends his self‑taught graphic design skills, bilingual communication, and love for street murals into entry‑level
    roles at local museums while balancing reliable project deadline management with a flexible, curiosity‑driven creative process.
  sports: Hector Muniz, a casual Chicago sports enthusiast, follows the Chicago Bulls and the Chicago Bears, plays pick‑up basketball at a neighborhood park league, and occasionally joins a weekend skate‑boarding
    club at the Lakefront Trail.
  arts: Hector Muniz, a devoted visual arts aficionado, draws inspiration from the vibrant murals of Shepard Fairey, the experimental film cuts of Alejandro González Iñárritu, and the lyrical intimacy of
    indie folk artists like Bon Iver and Sufjan Stevens, while regularly attending gallery openings and indie cinema screenings.
  travel: Hector Muniz, a wanderlust‑driven explorer who prefers short, budget‑friendly trips, has trekked through Oaxaca’s street food scene, spent a weekend at New Orleans’ French Quarter for jazz and
    mural tours, and now dreams of a summer pilgrimage to Barcelona’s vibrant street art districts.
  culinary: Hector Muniz, a passionate home cook, excels at preparing traditional dishes such as pepian stew, tamales de elote, and boiled plantain with achiote, using fresh chilies, heirloom corn, and
    locally sourced herbs, while often sharing these meals at communal gatherings.
  core: Hector Muniz, a curious, art‑obsessed 24‑year‑old who balances community‑centric creativity with disciplined yet flexible habits, constantly juggles sketchbooks, cooking pots, and a modest financial
    plan, all while navigating occasional health quirks and a love for Chicago sports.
background:
  cultural: Hector’s Guatemalan roots are central to his identity. Raised in a bilingual household, he grew up with Spanish as his first language and gathered cultural knowledge from family stories, traditional
    celebrations like Semana Santa and Día de los Muertos, and the rhythmic sounds of marimba music. His parents introduced him to Guatemalan cuisine, folklore, and the value of close‑knit community ties.
    Living in Chicago’s diverse neighborhoods, he blends these traditions with the city’s multicultural fabric, navigating a bicultural life that informs his artistic perspective and his desire to build
    bridges between Latin American heritage and contemporary American urban culture.
attributes:
