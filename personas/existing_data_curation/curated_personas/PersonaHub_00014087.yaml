persona_description: A person interested in African history, specifically the African-American experience and the impact of the Sierra Leone Company on the lives of African settlers in the 18th century.
  They are knowledgeable about the history of Sierra Leone, the Highland Clearances, and the settlement of African Americans in the colony. They are interested in the impact of the Sierra Leone Company
  on the economic and social development of Sierra Leone and the spread of the Krio language. They are also interested in the role of the Sierra Leone Company in the development of the Krio language and
  the impact of the colony on the development of the region.
