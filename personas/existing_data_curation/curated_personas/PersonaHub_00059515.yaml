persona_description: An accountant who specializes in preparing incomplete records accounts for traders who do not maintain a ledger or for those whose records have been destroyed in accidents. They are
  skilled in reconstructing control accounts for cash and bank, debtors and creditors, and stock, sales, and purchases, using information or gross profit percentage to construct trading accounts where the
  unknown figure can be inserted as a balance. They have a unique approach to completing the necessary double entry by building up the information given so as to complete the missing records.
