personas:
  professional: Carlos Sum is a bilingual arts enthusiast who leverages their solid grounding in art history, digital photography, and graphic design to coordinate community pop‑up exhibitions and workshops,
    and they approach each project with meticulous organization balanced by creative flexibility and a calm, inclusive demeanor.
  sports: Carlos Sum enjoys hiking the Sandia Mountains with the Albuquerque Hiking Society, follows New Mexico United soccer and the Albuquerque Isotopes baseball teams, participates in a weekly community
    yoga class to maintain flexibility, and they occasionally join a weekend pick‑up basketball game at the local park.
  arts: Carlos Sum immerses themselves in visual and auditory arts, regularly visiting exhibitions featuring artists like Georgia O'Keeffe and local muralist Pablo Jaramillo, playing classical guitar pieces
    by Andrés Segovia as well as flamenco rhythms inspired by Paco de Lucía, and they curate a personal blog where they review works ranging from Ansel Adams photography to contemporary performance art
    by La Jolla Dance Collective.
  travel: Carlos Sum prefers purposeful travel that blends cultural immersion with scenic adventure, having trekked Patagonia's steppe, explored the historic neighborhoods of Barcelona and Seville, and
    they plan a forthcoming trip to Kyoto's temples while budgeting carefully to fund both art‑related workshops abroad and local family visits.
  culinary: Carlos Sum enjoys cooking traditional Spanish dishes such as paella de mariscos and tortilla española, often enhancing recipes with rosemary and saffron from their herb garden, and they relish
    dining at local tapas bars while occasionally burning the bottom of a paella pan due to multitasking while listening to podcasts.
  core: Carlos Sum fuses bilingual cultural mediation with a calm, organized curiosity, curating community art experiences while they juggle a minor forgetfulness about vitamins and a penchant for spontaneous
    vintage camera buys.
background:
  cultural: Carlos is of Spanish descent, with his family roots tracing back to Andalusia. Growing up in Albuquerque’s Hispanic neighborhood, he was immersed in a blend of Spanish, Mexican, and Native American
    traditions. He celebrates both Spanish holidays such as Semana Santa and local New Mexican festivities, speaking fluent Spanish at home while also engaging with the broader bilingual community. His
    cultural identity is reflected in his appreciation for flamenco music, Spanish culinary arts, and the region’s rich Pueblo heritage, which he often incorporates into his artistic and community projects.
attributes:
  skills: '[''Spanish–English translation'', ''Cultural mediation'', ''Art history knowledge'', ''Exhibition curation'', ''Digital photography'', ''Graphic design (Photoshop, Canva)'', ''Community event
    planning'', ''Research and writing'', ''Facilitation and conflict resolution'', ''DIY woodworking'', ''Garden design'']'
  hobbies: '[''Gallery and museum visits'', ''Photography (film and digital)'', ''Classical guitar and flamenco'', ''Reading art history and poetry'', ''Blogging about culture and art'', ''Hiking in New
    Mexico'', ''Herb gardening'', ''Cooking Spanish cuisine'', ''Attending cultural festivals'', ''Volunteering at community art events'']'
  career_goals: Carlos aims to transition from his current non‑working status into a role that leverages his artistic passion and bilingual expertise. He plans to pursue a bachelor’s degree in museum studies
    or cultural management within the next two years, while volunteering as a docent at the Albuquerque Museum. His long‑term ambition is to become a freelance cultural consultant who designs community
    art projects, curates pop‑up exhibitions, and offers translation services for local arts organizations. He also envisions eventually opening a small multicultural art café that serves Spanish-inspired
    pastries and showcases emerging artists from New Mexico.
