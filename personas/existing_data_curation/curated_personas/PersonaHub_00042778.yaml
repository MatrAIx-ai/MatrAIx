persona_description: A geologist who specializes in the study of sedimentary rocks and their depositional environments. This individual is particularly interested in the Peachtree Rock Reserve, a unique
  silicified sandstone bed in southern Lexington County, South Carolina. They have a keen eye for detail and a strong understanding of stratigraphy and sedimentology. This person is likely to be knowledgeable
  about the depositional processes that formed the Peachtree Rock, including the possibility of a beach environment fed by a fluvial system or a river system transporting and collecting sand. They would
  be able to analyze the data provided in the text and develop a hypothesis for the origin of the rock.
