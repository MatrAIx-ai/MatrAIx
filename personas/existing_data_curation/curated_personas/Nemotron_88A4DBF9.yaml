  hobbies: '["Cooking", "Gardening", "Reading historical biographies", "Board games", "Volunteering at soup kitchen", "Community theater", "Sailing", "Evening shoreline walks"]'
  career_goals: Charles aims to secure a full‑time position in the nonprofit sector as a program coordinator for a local community‑service organization, where he can apply his communication and organizational
    talents to develop and run initiatives that support families and seniors in Westport. Over the next five years, he envisions advancing to a program director role, designing larger‑scale outreach strategies,
    and eventually establishing his own community‑resource nonprofit that emphasizes personal connection, practical assistance, and inclusive events.
