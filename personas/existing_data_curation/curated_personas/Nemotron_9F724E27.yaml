  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Gardening'', ''Cooking Indian Cuisine'', ''Yoga and Mindfulness'', ''Digital Photography'', ''Book Club Participation'', ''Volunteer Craft
    Instruction'']'
  career_goals: Although retired from formal employment, Meena aims to deepen her impact as a volunteer docent at the local art museum, leading special tours that highlight South Asian artistic traditions.
    She plans to launch a intergenerational storytelling series at the Pleasanton Senior Center, capturing oral histories of immigrants from the 1960s and 70s. A personal ambition is to publish a memoir
    that weaves her artistic passions with her cultural heritage, and she hopes to travel to Gujarat to visit family roots and study regional crafts firsthand. Meena also aspires to mentor emerging artists
    from the diaspora, offering critique and guidance through a quarterly workshop.
