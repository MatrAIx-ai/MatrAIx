  career_goals: Hebert aims to become a senior director of finance within the next five years, overseeing multi‑unit operations and shaping corporate financial strategy. He seeks to lead a finance transformation
    initiative that leverages AI‑driven analytics while maintaining rigorous internal controls. Long‑term, he aspires to obtain a CFA designation and potentially transition into a CFO role at a mid‑size
    technology firm, where he can merge his competitive drive with innovative financial solutions. He also hopes to mentor emerging Black professionals in finance, fostering a supportive network that blends
    competitiveness with community uplift.
