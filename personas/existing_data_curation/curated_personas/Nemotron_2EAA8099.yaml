personas:
  professional: Erick Goicochea, a methodical full-stack software developer, leverages their disciplined TDD, CI/CD, and AWS cloud design expertise to keep Agile scrum teams on schedule, mentor junior engineers,
    and pursue a path toward technical architect and engineering management roles.
  sports: Erick Goicochea, a committed midfielder for a Chicago adult soccer league team, regularly supports the Chicago Fire FC, follows the Chicago Bulls and Chicago Blackhawks, hikes the Palos Trail
    on weekends, and participates in a weekly pickup soccer session at Lincoln Park while occasionally joining a local running club's 5K races.
  arts: Erick Goicochea, who plays acoustic guitar at The Hideout open-mic nights, draws inspiration from John Mayer and Bon Iver, curates game nights featuring Settlers of Catan and Dungeons & Dragons,
    and enjoys science-fiction novels by Ann Leckie and the a16z Podcast, weaving these creative influences into their coding mindset.
  travel: Erick Goicochea, a weekend adventurer who plans meticulously, has explored Milwaukee's brewery scene, hiked the Indiana Dunes, taken a budget-friendly trip to Reykjavik for the Northern Lights,
    and maintains a spreadsheet of future destinations including Kyoto and Patagonia, balancing travel with professional obligations.
  culinary: Erick Goicochea, an enthusiastic home cook who masters quick skillet-seared salmon, perfects Chicago-style deep-dish pizza on weekends, crafts homemade ramen broth with miso and pork belly,
    and pairs meals with pour-over coffee using a Chemex, while occasionally indulging in spicy tacos from a local taqueria.
  core: Erick Goicochea merges methodical engineering precision with a sociable, board-game-fueled lifestyle, juggling meticulous budgeting, occasional back-pain from soccer, and a habit of late-night hackathon
    caffeine marathons.
background:
  cultural: Erick grew up in Schaumburg, a suburban community in the Chicago metropolitan area, in a family that blends Midwestern American values with a subtle Hispanic heritage reflected in his surname
    Goicochea, which traces back to Basque origins. While he identifies as white American, his household celebrated both traditional American holidays and occasional Latin American culinary traditions,
    such as making empanadas with his grandmother. This bicultural exposure nurtured his appreciation for diverse perspectives and community involvement. He is fluent in English and has conversational Spanish,
    which he uses when volunteering at local after‑school programs. Erick’s cultural upbringing emphasizes hard work, education, and community service, all of which inform his reliable and collaborative
    approach to both his professional and personal life.
