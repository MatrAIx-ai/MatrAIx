  career_goals: Erick aims to deepen his expertise in cloud architecture and become a recognized lead engineer or technical architect within the next five years. He is targeting senior-level roles where
    he can shape system design, drive reliability initiatives, and mentor larger teams. Ultimately, he hopes to transition into an engineering management position that blends his organized, process‑driven
    mindset with his sociable, collaborative nature, possibly leading a product engineering group that delivers high‑impact enterprise solutions. He also aspires to contribute to open‑source projects and
    speak at regional tech conferences to share best practices in reliable software development.
