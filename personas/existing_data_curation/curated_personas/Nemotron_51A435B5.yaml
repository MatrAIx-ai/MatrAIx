personas:
  professional: Kimberly Cancel, a budding environmental club coordinator at their middle school, merges a love for routine cooking sessions with flexible garden project planning, using practical skills
    in recipe journaling, beaded bracelet design, and herb foraging to lead a community garden that supplies fresh produce for school meals, and they enjoy guiding peers in sustainability projects.
  sports: Kimberly Cancel enjoys weekend hikes in the Bull Run watershed, supports the Portland Timbers and the Oregon State Beavers women's soccer team, participates in the school’s middle‑school cross‑country
    club, balances low‑key outdoor exercise with occasional after‑school basketball scrimmages, and they love swapping a jog for a spontaneous trail run.
  arts: Kimberly Cancel immerses themselves in music ranging from regional Mexican corridos by Los Tigres del Norte to indie folk from Portland’s M. Ward, sketches bracelet designs while listening to Taylor Swift,
    reads graphic novels like "Saga" and "Persepolis" for inspiration, and they let these diverse artistic voices shape their creative identity.
  travel: Kimberly Cancel favors spontaneous weekend road trips to Crater Lake National Park and the Oregon coast, dreaming of a future family vacation to Oaxaca’s historic markets, and they prefer flexible
    itineraries that blend hiking adventures with opportunities to sample local street foods.
  culinary: Kimberly Cancel excels at making hand‑pressed corn tortillas, crafting blueberry‑mushroom quesadillas, and simmering a tangy salsa verde with fresh cilantro and cotija cheese, documenting each
    recipe in a well‑worn journal while experimenting with native Oregon berries and Mexican spices, and they constantly refine flavors through trial and error.
  core: Kimberly Cancel blends a love for family traditions, hands‑on creativity, and a relaxed routine, and they often swap a structured cooking night for an impromptu hike or glitter‑filled craft project.
background:
  cultural: Kimberly’s Mexican heritage is a central thread in her daily life, woven through language, food, and family rituals. Her grandparents immigrated to the United States and settled in the Pacific
    Northwest, bringing with them traditions such as Día de los Muertos altars, Christmas posadas, and a love for homemade tortillas. At home, Spanish is spoken alongside English, giving her a bilingual
    identity that she proudly shares at school. Family gatherings often revolve around preparing and sharing traditional dishes, where Kimberly learns cooking techniques passed down through generations
    while also incorporating local Oregon ingredients like berries and mushrooms. She participates in community events at the nearby Mexican cultural center, which celebrates folkloric dance and music,
    reinforcing a sense of belonging to both her Mexican roots and the diverse Oregon community. These cultural experiences shape her values of hospitality, hard work, and respect for elders, influencing
    her aspirations and everyday choices.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Basic cooking and recipe development'', ''Digital literacy (Google Suite, basic photo editing)'', ''Team collaboration and leadership in school projects'', ''Crafting
