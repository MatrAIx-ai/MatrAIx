  hobbies: '[''Cooking and recipe journaling'', ''Listening to music (Mexican and indie folk)'', ''Sketching and crafting friendship bracelets'', ''Hiking local trails and foraging herbs'', ''Reading graphic
    novels and streaming series'', ''Gardening with school environmental club'']'
  career_goals: Kimberly aims to turn her love for cooking into a practical career. In the next few years, she plans to enroll in a high‑school culinary elective and later attend a community college program
    in culinary arts, where she can learn structured, step‑by‑step techniques that match her preference for routine. She also hopes to earn a food safety certification and gain part‑time experience at a
    local bakery or farm‑to‑table restaurant in the Portland area. Long‑term, she envisions opening or managing a family‑run eatery that offers both classic Mexican meals and dishes featuring Oregon’s seasonal
    produce, allowing her to blend her cultural heritage with her community’s tastes. Additionally, she is interested in learning about nutrition so she can eventually lead community‑health workshops for
    teens.
