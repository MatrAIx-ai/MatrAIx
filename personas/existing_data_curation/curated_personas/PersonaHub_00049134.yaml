persona_description: A political scientist who studies the impact of federal policy on education, particularly the implementation and effectiveness of major federal programs like the Elementary and Secondary
  Education Act of 1965 (ESEA) and No Child Left Behind (NCLB), and the consequences of state-level implementation and adoption of national standards like Common Core. This person is interested in the history
  and evolution of education policy, the role of federal and state governments in education, and the impact of these policies on student achievement and outcomes. This person is likely to be familiar with
  the debates surrounding education reform, the use of data and accountability measures, and the role of parental choice programs in education policy.
