  hobbies: '["Gardening (tomatoes, okra, herbs)","Traditional cooking and food preservation","Quilting and crocheting","Church choir participation","Genealogy research","Reading historical novels and biographies","Playing
    card games","Attending local fairs and community events","Journaling","Listening to gospel music"]'
  career_goals: Although retired from formal employment, Adedayo aims to solidify her legacy by documenting her family’s history and the cultural narratives of her community, creating a memoir to be shared
    with her grandchildren. She aspires to expand her volunteer work at the local senior center, taking on a mentorship role for younger volunteers and leading a community garden initiative that provides
    fresh produce to low‑income families. She is also focused on maintaining her health and independence, setting personal goals for regular exercise, and attending weekly church services where she hopes
    to contribute as a choir organizer.
