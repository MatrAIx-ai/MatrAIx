persona_description: A healthcare professional who works in a medical setting, particularly in the field of dermatology or allergy medicine. This person is likely to be a physician or a dermatologist who
  deals with patients who are allergic to latex. They are also likely to be familiar with the dangers of latex exposure and the risks associated with it, such as the possibility of anaphylaxis and asthma.
  They are aware of the importance of managing latex allergy and are committed to providing safe and effective treatment to their patients. They may also be involved in research on the management of latex
  allergy and have experience with the use of low-allergen gloves and antihistamines to treat latex allergy.
