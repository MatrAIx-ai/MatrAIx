persona_description: A historian who specializes in the study of genocide and its causes, particularly the events and perpetrators of the Rwandan genocide. He has a deep understanding of the political,
  social, and cultural factors that led to the outbreak of violence and the subsequent mass killings. He is knowledgeable about the history of Rwanda, the Belgian colonial period, and the post-colonial
  era, and is well-versed in the theories and methodologies of genocide prevention. He is also familiar with the international community's response to the genocide, including the U.N. intervention and the
  RPF's military campaign, and has a keen interest in the implications of the Rwandan experience for global genocides prevention efforts.
