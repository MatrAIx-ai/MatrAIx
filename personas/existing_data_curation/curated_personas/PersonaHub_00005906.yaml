persona_description: A historian who is interested in the development of national identity and the ways in which events and celebrations can shape and reflect the cultural and political landscape of a nation.
  They are curious about the ways in which Australia Day has evolved over time and how it has been used to celebrate the nation and its people. They are also interested in the ways in which Australia Day
  has become more inclusive and diverse, and how this has contributed to a broader shared appreciation of the anniversary and its meanings.
