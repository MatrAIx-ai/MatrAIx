personas:
  professional: Andree Gilbert, a seasoned IT support specialist with two decades of troubleshooting expertise across Windows, macOS, and Linux environments, leverages her methodical calm under pressure
    and competitive drive to design streamlined support workflows, mentor junior technicians, and automate routine tasks with PowerShell, all while pursuing CompTIA Security+ and Cisco CCNA certifications
    to transition into a senior technical lead and eventually an IT security analyst role.
  sports: Andree Gilbert prefers solitary cardio, logging early morning runs along the Lakefront Trail while cheering on the Chicago Bulls during the NBA season and catching the occasional White Sox game
    at Guaranteed Rate Field, and she belongs to the Lakeview Fitness Walkers club for occasional group jogs.
  arts: Andree Gilbert curates a personal soundtrack of Muddy Waters, Miles Davis, and Etta James while capturing monochrome street scenes reminiscent of Henri Cartier‑Bresson, and she regularly visits
    the intimate Velvet Lounge to soak up live blues performances that echo the city’s historic musical roots.
  travel: Andree Gilbert plans low‑key solo getaways, favoring meticulously researched itineraries to historic locales like New Orleans for its jazz heritage and the Scottish Highlands for solitary hikes,
    while balancing a modest travel budget that limits frequent international trips.
  culinary: Andree Gilbert delights in slow‑cooking collard greens seasoned with smoked turkey and sweet potatoes, while also experimenting with a midnight‑inspired pesto of Illinois prairie basil and walnuts,
    and she frequently orders a perfectly seared ahi tuna bowl at the nearby Japanese bistro when dining out.
  core: Andree Gilbert blends relentless curiosity with a quiet, methodical demeanor, channeling her competitive edge into meticulous tech solutions while secretly indulging in late‑night binge‑watching
    of classic detective series and hoarding vintage camera lenses.
background:
  cultural: Andree is a Black woman who grew up on Chicago’s South Side, where she was immersed in a strong sense of community, church life, and the city’s vibrant African‑American cultural scene. The legacy
    of Chicago blues and the civil rights activism of her parents shaped her resilient and self‑reliant outlook. She maintains ties to local cultural institutions such as the DuSable Museum of African American
    History and participates in virtual networks for Black women in tech. Her cultural heritage informs her commitment to mentorship, her appreciation for soulful music, and her determination to carve a
    professional path that reflects both her technical aptitude and her identity.
attributes:
  skills: '[''Windows and macOS troubleshooting'', ''Basic Linux administration'', ''Ethernet and Wi‑Fi networking'', ''Active Directory management'', ''Remote assistance tools'', ''Ticketing system operation'',
    ''PowerShell scripting for automation'', ''Cybersecurity fundamentals'', ''IT asset inventory and documentation'', ''Process improvement and SOP development'']'
  hobbies: '[''Historical nonfiction reading'', ''Balcony gardening'', ''Urban photography'', ''Jazz and blues listening'', ''Low‑key live music attendance'', ''Online data analytics courses'', ''AI self‑study'']'
  career_goals: Andree aims to leverage her extensive support experience into a senior technical lead role where she can design and implement efficient support workflows and mentor a small, high‑performing
    team. She plans to earn a CompTIA Security+ certification and a Cisco CCNA to deepen her network security expertise, with the long‑term ambition of moving into an IT security analyst position that offers
    remote work flexibility. She also hopes to launch a boutique consultancy serving local nonprofit organizations that need reliable, cost‑effective tech support, allowing her to apply her competitive
    drive while maintaining the quiet work environment she prefers.
