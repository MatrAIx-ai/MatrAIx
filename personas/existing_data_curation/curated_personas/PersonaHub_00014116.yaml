persona_description: A team of twelve secondary school teachers who have come together to develop effective pedagogy in languages. They are educators who are passionate about teaching languages and are
  committed to ensuring that their students develop the necessary skills to become competent linguists. They are skilled in planning and implementing language lessons and are interested in exploring the
  latest research from Bristol University to inform their teaching practices. They are also interested in finding solutions to the challenges of teaching languages in Year 7 and are open to discussing the
  features of progression in languages. They are also interested in using grammar for communication and motivating students to become more independent learners in languages.
