  career_goals: Although retired, Nancy aims to stay active, independent, and socially engaged on her own terms. She plans to enroll in a community college digital‑literacy class to become more confident
    with smartphones and health‑tracking apps. She wants to increase her volunteer hours at the local senior center, eventually leading a small gardening group for fellow seniors. Nancy hopes to complete
    a personal memoir that captures her family history and to organize her genealogy research for future generations. She also aspires to establish a more consistent daily routine that reduces her worry
    and helps her manage finances without stress. Ultimately, her ambition is to maintain a peaceful, self‑sufficient lifestyle while quietly contributing to her community.
