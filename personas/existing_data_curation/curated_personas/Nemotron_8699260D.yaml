personas:
  professional: Martrina Barnett is an emerging systems analyst who blends technical expertise in Windows/Linux network troubleshooting and Python automation with a creative flair, turning complex data
    into clear visual stories for stakeholders while thriving in fast‑changing agile projects thanks to their curiosity and relaxed, flexible work style.
  sports: Martrina Barnett enjoys a mix of casual basketball at the local Macon Community Center and weekend runs with the Macon Striders running club, rooting for the Atlanta Hawks and the Georgia Bulldogs,
    while staying flexible about formal workouts, preferring spontaneous pick‑up games over regimented gym routines.
  arts: Martrina Barnett immerses themselves in the contemporary art scene, sketching charcoal portraits inspired by the vibrant palette of modern figurative painters and creating digital illustrations
    set to the rhythms of Miles Davis and Kendrick Lamar, while regularly attending gallery openings that showcase emerging artists.
  travel: Martrina Barnett prefers spontaneous weekend getaways, often hopping on a train to Atlanta for a food festival or exploring Savannah’s historic squares, while dreaming of a future backpacking
    trip through the Pacific Northwest’s national parks, balancing a modest student budget with a love for discovery.
  culinary: Martrina Barnett’s palate gravitates toward Southern comfort with a twist, savoring fried green tomatoes and collard greens, experimenting with homemade hot sauce using habanero and garlic,
    yet they often order a veggie sushi roll at the local café when pressed for time, reflecting a flexible but curious approach to cooking.
  core: Martrina Barnett is a curious tech‑savvy creative who juggles network scripts, charcoal sketches, and late‑night gaming sessions, thriving on flexibility but occasionally losing track of appointments.
background:
  cultural: Martrina was raised in a close-knit African-American family in Macon, Georgia, where Southern Black culture and church traditions played a central role in her upbringing. Family gatherings often
    featured soulful gospel music, home-cooked soul food, and stories of the civil-rights movement that shaped her sense of history and community responsibility. She regularly participates in local cultural
    events such as the Macon Cherry Blossom Festival and the annual Juneteenth celebration, and she supports Black art initiatives at venues like the Douglass Theatre. This heritage instills in her a strong
    appreciation for communal support, resilience, and creative expression, which she brings into both her professional and personal life.
attributes:
  skills: '[''System Analysis'', ''Network Troubleshooting'', ''Windows Administration'', ''Linux Administration'', ''Python Scripting'', ''SQL Querying'', ''Data Visualization'', ''Technical Support'',
