  hobbies: '[''Sketching'', ''Digital Illustration'', ''Visiting Art Galleries'', ''Live Music and Dancing'', ''Strategy Video Games'', ''Role-Playing Games'', ''Tech Meetups'', ''Hackathons'', ''Volunteering
    as a Coding Mentor'', ''Exploring Historic Neighborhoods'', ''Attending Community Festivals'', ''Coffee Shop Socializing'']'
  career_goals: Martrina aims to deepen her expertise as a systems analyst by earning industry certifications such as CompTIA Network+ and Cisco CCNA within the next two years. She plans to enroll in an
    associate’s program in Information Technology and eventually pursue a bachelor's degree in Computer Science while continuing to work full-time. In the medium term, she envisions stepping into a senior
    analyst role where she can lead cross-functional projects, mentor junior colleagues, and integrate her artistic sensibility into user-centric interface design. Long-term, Martrina dreams of launching
    a community-focused tech initiative that offers coding workshops and creative digital art programs for youth in Macon.
