personas:
  professional: Michael Potts, a proficient medical assistant who couples precise phlebotomy and EHR mastery (Epic and AthenaHealth) with a curiosity for evolving clinical protocols, uses their sociable
    energy to translate medical jargon into patient‑friendly education, and balances meticulous organization with a flexible, stress‑prone mindset as they work toward CMA certification, LPN training, and
    a future role as a patient‑care coordinator.
  sports: Michael Potts, an active member of a local co‑ed basketball league who cheers for the Atlanta Hawks and follows the Atlanta Falcons, spends weekend mornings fishing the Chattahoochee River, and
    maintains a personal fitness regimen that balances competitive play with low‑impact stretching to counteract occasional knee soreness.
  arts: Michael Potts, a true‑crime podcast aficionado who regularly listens to "Serial" and "Criminal", enjoys the blues‑infused storytelling of B.B. King and modern country vibes of Chris Stapleton, and
    occasionally attends community theater productions to unwind from clinical work, finding that music and narrative help temper their stress.
  travel: Michael Potts, a weekend‑road‑trip enthusiast who prefers spontaneous, budget‑friendly getaways, has explored the Great Smoky Mountains, taken a fishing excursion to Lake Lanier, and dreams of
    a culinary tour of New Orleans to sample authentic jambalaya, all while balancing family responsibilities and a modest savings plan.
  culinary: Michael Potts, a self‑taught grill master who perfects smoky BBQ ribs using applewood chips, follows his grandmother’s collard‑green recipe with smoked turkey and a splash of vinegar, and experiments
    with homemade craft beer that pairs with his Southern comfort meals, often supplementing dishes with sweet‑potato mash and tangy hot sauce.
  core: Michael Potts blends a restless curiosity with community‑driven compassion, juggling meticulous health work, a love for smoky BBQ, and an underlying worry that fuels both careful planning and occasional
    over‑thinking.
background:
  cultural: Michael grew up in a working‑class family in the southern foothills of north‑central Georgia. His upbringing was steeped in Southern hospitality, church gatherings, and community festivals such
    as the Floyd County Apple Festival. Though he identifies as white, his family’s roots trace back to farm and textile‑mill occupations, instilling a strong work ethic and a pragmatic outlook. He was
    raised on traditional Southern foods and values—respect for elders, self‑reliance, and a deep sense of community responsibility—while also being exposed to the multicultural fabric of the region through
    school and church events. These cultural influences shape his compassionate approach to patient care and his commitment to improving health outcomes in his hometown.
attributes:
  skills: '[''phlebotomy'', ''vital sign measurement'', ''patient triage'', ''EHR documentation (Epic, AthenaHealth)'', ''insurance verification'', ''appointment scheduling'', ''patient education'', ''minor
