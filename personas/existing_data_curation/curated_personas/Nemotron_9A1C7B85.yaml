  hobbies: '[''basketball league'', ''fishing'', ''volunteering at health fairs'', ''listening to medical podcasts'', ''listening to true‑crime podcasts'', ''cooking southern cuisine'', ''home‑brewing'',
    ''DIY woodworking'']'
  career_goals: Michael aims to advance his clinical credentials by obtaining a Certified Medical Assistant (CMA) certification and then pursuing a Licensed Practical Nurse (LPN) program at a nearby community
    college. Over the next five years, he hopes to transition into a patient care coordinator role where he can blend his organizational strengths with his passion for community health education. Long‑term,
    he envisions opening a small outpatient wellness clinic in Floyd County that offers preventive screenings and health‑literacy workshops, especially targeting underserved rural populations. He also plans
    to earn his GED and explore continuing‑education courses in telehealth to broaden his skill set.
