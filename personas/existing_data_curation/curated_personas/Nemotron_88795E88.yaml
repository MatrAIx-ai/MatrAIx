personas:
  professional: Jessenia Santos works as a seasoned commercial building cleaner, excelling in floor care, restroom sanitation, basic plumbing and light electrical troubleshooting while leveraging bilingual
    communication and meticulous inventory management to ensure safety and efficiency; they balance curiosity about eco‑friendly methods with practical reliability, driving their ambition to mentor new
    staff and champion green‑cleaning protocols as a future supervisor.
  sports: Jessenia Santos enjoys leisurely walks through Zilker Park and participates in a senior walking club that meets three times weekly, cheers on Austin FC during MLS matches and supports the Texas
    Longhorns football team on Saturdays, while also dabbling in community pickleball games at a local recreation center.
  arts: Jessenia Santos finds solace in Mexican folk music, regularly listening to Lila Downs and Vicente Fernández while cooking, watches telenovelas such as "La Usurpadora" and "El Señor de los Cielos"
    in the evenings, and reads self‑help works by Brené Brown, which together shape their reflective yet socially connected artistic taste.
  travel: Jessenia Santos cherishes trips back to her hometown in Oaxaca, Mexico, savoring family gatherings and market visits, while also exploring Texas Hill Country getaways like Fredericksburg and planning
    a future pilgrimage to the historic churches of Sevilla, balancing limited vacation days with a desire for culturally enriching experiences.
  culinary: Jessenia Santos operates a kitchen that blends tradition and experimentation, expertly preparing mole poblano, chiles en nogada, and elote con queso using garden‑fresh cilantro, tomatillos,
    and jalapeños, and enjoys experimenting with quinoa‑based tacos, all while maintaining a comfortable skill level that feels both nurturing and creatively adventurous.
  core: Jessenia Santos is a diligent, eco‑mindful cleaner who balances worry‑filled vigilance with a love for gardening, Mexican flavors, and community, often finding herself negotiating between meticulous
    budgeting and impulsive kitchen gadget purchases.
background:
  cultural: Jessenia was born to Mexican immigrant parents who settled in South Texas before the family moved to Austin. She grew up speaking Spanish at home and English at school, maintaining a deep appreciation
    for Mexican traditions, such as Día de los Muertos, Semana Santa, and family gatherings centered around home‑cooked meals. Her Catholic faith and strong family ties shape her values of harmony and caring
    for others. Living in Austin’s multicultural environment, she blends her Mexican heritage with local Texan influences, participating in community festivals, supporting local Mexican restaurants, and
    sharing her cultural recipes with friends and neighbors.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care'', ''Restroom sanitation'', ''Basic plumbing repairs'', ''Light electrical troubleshooting'', ''Hazardous waste handling'', ''Inventory management'', ''Bilingual
    communication (Spanish/English)'', ''Safety compliance'', ''Time management'', ''Team coordination'', ''Customer service'']'
  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Knitting and crochet'', ''Church community involvement'', ''Volunteering at food bank'', ''Walking in local parks'', ''Listening to Mexican
    folk music'', ''Watching telenovelas'', ''Reading self‑help books on stress management'']'
  career_goals: Jessenia aspires to move into a supervisory role where she can mentor newer cleaners and introduce sustainable, green‑cleaning practices to her workplace. She is considering obtaining an
    OSHA safety certification and a Green Cleaning Professional credential to bolster her expertise. Long‑term, she dreams of starting a small, family‑owned cleaning service that emphasizes environmentally
    safe products and offers flexible schedules for other women seeking work‑life balance. While ambitious, she remains mindful of her family responsibilities and seeks a path that provides stability without
    excessive stress.
