persona_description: A historian of urban planning who specializes in comparative-historical origins and applications, with a focus on the evolution of planning theory and praxis over time and across developmental
  contexts, and the political, economic, and social specificities and constraints on planning action. This individual is well-versed in understanding the main theoretical and praxis traditions that underpin
  contemporary approaches to urban planning, especially in the US and Europe, but also in a global-comparative perspective. They are also skilled in assessing the underlying normative, conceptual, and political
  assumptions that mediate major contemporary approaches to urban planning and policy, globally and locally. This individual is equipped to relate contemporary theoretical and praxis traditions to earlier
  rounds of debate and political struggle regarding urbanization as well as the attempt to plan, manage, and modify its socio-spatial expressions and ecological consequences. Additionally, they are knowledgeable
  in social science approaches to the study of cities and urbanization, and able to relate those approaches to the study of planning and design strategies across contexts and scales. Finally, this individual
  is in a position to assess planning discourses regarding social and spatial justice, equity, diversity, and sustainability, and be able to relate them to ongoing social struggles to imagine and create
  alternative urban worlds.
