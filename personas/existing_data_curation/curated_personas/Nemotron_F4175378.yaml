  career_goals: Looking ahead, Maria aims to leverage her experience to create a lasting legacy of inclusive and sustainable leadership within her organization and the broader community. She plans to champion
    a mentorship program that prepares the next generation of engineers and managers, while also driving initiatives that embed wellness and stress‑reduction practices into the workplace culture. In the
    longer term, she envisions transitioning into an advisory role—perhaps as a senior consultant or board member—where she can guide strategic decisions on operational efficiency and corporate social responsibility,
    and potentially launch a nonprofit focused on STEM outreach for under‑served youth in her region.
