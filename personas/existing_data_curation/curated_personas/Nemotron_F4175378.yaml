personas:
  professional: An operations leader with a graduate STEM background, Maria Rhodes leverages three decades of experience translating data into actionable strategies, using a blend of meticulous planning
    and adaptable problem‑solving to guide cross‑functional teams while championing empathetic mentorship and inclusive workplace wellness.
  sports: Maria Rhodes enjoys low‑impact fitness, regularly walking her golden retriever along Uwharrie National Forest trails, participates in a community pickleball league, and follows the Charlotte Hornets
    and UNC Tar Heels for a seasonal boost of competitive spirit.
  arts: Maria Rhodes finds creative solace in quilting with patterns inspired by William Morris, reads historical fiction by Ken Follett and biographies of Marie Curie, and attends occasional performances
    of the Davie County community theater featuring local renditions of Shakespeare, while humming to folk singer Joni Mitchell.
  travel: Maria Rhodes favors thoughtful road trips that blend nature and history, having explored the Blue Ridge Parkway and Shenandoah National Park, and dreaming of a future pilgrimage to the historic
    streets of Bath, England, all while balancing travel budgeting with family commitments.
  culinary: Maria Rhodes crafts wholesome meals using heirloom tomatoes, kale, and rosemary harvested from her garden, often preparing dishes like roasted vegetable quinoa bowls, butternut squash risotto,
    and baked apple cinnamon oatmeal, while occasionally indulging in a locally sourced artisanal sourdough loaf.
  core: Maria Rhodes blends a data‑driven mind with a gardener’s patience, juggling meticulous project plans, worry‑laden budgeting, and a love for quiet hikes, all while occasionally forgetting to water
    a newly sprouted seedling.
background:
  cultural: Maria grew up in a middle‑class, white Southern family in North Carolina, where church, community service, and a respect for tradition were central values. Her upbringing emphasized humility,
    self‑reliance, and the importance of contributing to the well‑being of neighbors. While she maintains an appreciation for Southern hospitality and local customs, her graduate STEM education introduced
    her to a broader, more progressive worldview. This blend of regional culture and academic exposure informs her balanced approach to life—valuing both established practices and new ideas, and fostering
    a compassionate, cooperative spirit in both personal and professional settings.
