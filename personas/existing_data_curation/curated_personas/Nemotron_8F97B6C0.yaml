  career_goals: Marjorie's primary ambition is to keep learning and sharing her love of art and local heritage. She hopes to curate a small, rotating exhibition of works by senior artists at the Hull community
    center, pairing each piece with the artist's personal story. She also aims to compile a memoir that weaves her own life experiences with the changing history of Clarke County, preserving memories for
    her grandchildren and future residents. In addition, she desires to mentor younger volunteers at the senior center, passing on her crafting, gardening, and empathetic communication skills. While she
    does not seek paid employment, she strives to remain an active, supportive presence in her community, fostering harmony, curiosity, and artistic appreciation.
