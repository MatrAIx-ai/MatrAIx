  hobbies: '[''Exploring street art and murals'', ''Visiting contemporary art galleries'', ''Attending live music concerts'', ''Cooking fusion South Asian–Southern recipes'', ''Urban photography'', ''Volunteering
    at shelters and community centers'', ''Providing rides for seniors'', ''Yoga and meditation'', ''Reading science fiction novels'', ''Learning Spanish'']'
  career_goals: Jayshri aims to leverage her driving and sales experience into a career in logistics and supply‑chain management. She plans to complete her associate degree in Business Administration or
    Supply Chain, obtain a professional driver’s license (CDL) and certifications in fleet management. In the short term, she seeks a logistics coordinator role for a regional distribution company, overseeing
    route scheduling and driver training. Long‑term, she dreams of founding a community‑focused transport service that provides affordable delivery and ride‑sharing for underserved neighborhoods in Atlanta,
    especially supporting South Asian and immigrant communities. She also hopes to mentor other young women entering the transportation industry, advocating for diversity and inclusion.
