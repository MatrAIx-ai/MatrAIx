  hobbies: '[''reading historical fiction'', ''gardening'', ''hiking in the Wasatch Mountains'', ''cooking Mexican cuisine'', ''pottery'', ''yoga'', ''volunteering at bilingual tutoring program'']'
  career_goals: Ada aims to earn a Master of Social Work and become a Licensed Clinical Social Worker within the next three years. Her long‑term ambition is to advance to a senior program coordinator role
    where she can design and implement culturally responsive, STEM‑infused interventions for Latino families and school populations in Utah. She also aspires to secure funding for a community outreach center
    that offers bilingual counseling, academic support, and family workshops, and eventually to mentor new social workers in evidence‑based practice.
