personas:
  professional: Ada Mateo, a 29‑year‑old social worker with a STEM bachelor’s background, leverages quantitative analysis and bilingual fluency to design evidence‑based, culturally responsive programs for
    children and families, thriving on structured case management and meticulous grant writing.
  sports: Ada Mateo, a 29‑year‑old outdoor enthusiast, hikes the Wasatch Mountains on weekends, practices yoga weekly at a local studio affiliated with the Utah Yoga Collective, and supports the Utah Jazz
    and Real Salt Lake as a loyal fan while occasionally joining a community trekking club.
  arts: Ada Mateo, a 29‑year‑old creative, attends pottery classes at the Salt Lake City Clay Studio, finds inspiration in historical fiction by Hilary Mantel, and curates a playlist featuring folk singer
    Natalie Merchant and Lila Downs to accompany her artistic sessions.
  travel: Ada Mateo, a 29‑year‑old traveler, prefers low‑key, nature‑focused getaways, having trekked Zion National Park and explored the lavender fields of Provence, and dreams of a solo hike through Patagonia’s
    Torres del Paine while budgeting trips through a detailed spreadsheet.
  culinary: Ada Mateo, a 29‑year‑old home cook, delights in preparing traditional dishes like pozole, mole verde, and tamales using fresh herbs from her garden such as epazote and oregano, while experimenting
    with fusion recipes like quinoa‑stuffed chile rellenos.
  core: Ada Mateo, a 29‑year‑old methodical planner, balances data‑driven social work with solitary hikes, pottery, and meticulously budgeted culinary experiments, all while quietly nurturing a compassionate,
    structured life.
background:
  cultural: Ada is a second‑generation Mexican‑American who grew up in a Spanish‑speaking household, celebrating Día de los Muertos, Día de la Independencia, and family gatherings centered on respect and
    solidarity (familismo). While living in North Salt Lake, she blends her Mexican heritage with the outdoor, community‑oriented culture of Utah, maintaining strong ties with both her extended family and
    the local Mexican community. This dual cultural lens informs her empathetic approach to social work, allowing her to honor clients' traditions while navigating the broader American social services landscape.
attributes:
  skills: '[''case management'', ''risk assessment'', ''evidence‑based assessment'', ''family mediation'', ''child development evaluation'', ''data analysis'', ''program evaluation'', ''grant writing'',
