  career_goals: Ruben dreams of becoming someone who designs tools that help people and the environment. He imagines studying robotics or environmental engineering in high school, eventually working on
    projects that improve community spaces like parks or water‑conservation systems. He also values roles where he can mentor younger kids, perhaps as a youth science workshop leader. He prefers a career
    that offers flexibility and hands‑on problem solving rather than rigid schedules, aligning with his practical curiosity and desire to make a positive impact.
