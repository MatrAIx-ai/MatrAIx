personas:
  professional: Ruben Mateo, an aspiring game creator and budding programmer, channels curiosity and practicality into designing Scratch games while his relaxed, sometimes disorganized approach encourages
    iterative experimentation and collaborative playtesting with close friends.
  sports: Ruben Mateo enjoys exploring the foothills around Lehi on foot, participates in the Lehi Youth Hiking Club in the spring and fall, follows the Utah Jazz for basketball inspiration, and occasionally
    joins a summer community soccer league for light exercise.
  arts: Ruben Mateo sketches landscapes and cityscapes in a well‑worn sketchbook, draws inspiration from graphic novelists like Jeff Lemire and sci‑fi author Becky Chambers, and finds rhythm in Spanish
    pop and folk music from artists such as Rosalía and Manu Chao while practicing guitar.
  travel: Ruben Mateo prefers spontaneous weekend getaways, having hiked the Canyonlands and visited Yosemite with family, while dreaming of trekking Patagonia’s glaciers and exploring the ancient ruins
    of Machu Picchu when finances allow.
  culinary: Ruben Mateo loves homemade pizza with pepperoni and olives, enjoys crafting simple tacos with fresh cilantro and lime, and frequently experiments with fruit‑based smoothies using bananas, strawberries,
    and almond milk.
  core: Ruben Mateo is a curious, nature‑loving 12‑year‑old who balances a love for digital creation with deep emotional sensitivity that fuels both imagination and occasional anxiety.
background:
  cultural: Ruben comes from a Spanish‑heritage family that maintains strong cultural ties. His parents speak Spanish at home, and family meals feature traditional dishes such as paella, gazpacho, and churros.
    The family celebrates Spanish holidays like Semana Santa and Día de los Reyes, and they attend a local Spanish‑language Catholic mass within the Hispanic community of Salt Lake County. Bilingualism
    shapes his worldview, emphasizing respect for elders, communal support, and a love for storytelling, all of which influence his collaborative and considerate nature.
attributes:
  skills: '["Logical problem solving", "Basic Scratch programming", "Spanish language comprehension", "Lego and K''NEX construction", "Sketching and drawing", "Collaborative project participation"]'
