  career_goals: Although retired from formal employment, Robert’s ambition is to remain an active pillar of the Bloomington senior community. He aims to lead the local senior‑center’s activity committee,
    preserve his family’s stories in a community memoir project, and mentor grandchildren and neighborhood youth in practical skills. He also hopes to maintain his health and independence, ensuring he can
    continue supporting his wife and contributing to local festivals and charitable events.
