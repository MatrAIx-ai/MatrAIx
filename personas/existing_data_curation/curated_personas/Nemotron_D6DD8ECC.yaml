personas:
  professional: Jasmin Garcia, a budding playground coordinator, applies their quick social instincts and love for structured games to choreograph tag and hide‑and‑seek sessions for peers, balancing an
    innate need for predictability with a flexible, improvisational style.
  sports: Jasmin Garcia darts across the neighborhood park leading tag games, plays forward for the Little Stars youth soccer team, and cheers loudly for the nearby City FC professional club, channeling
    boundless energy into structured sport while occasionally fretting over missed goals.
  arts: Jasmin Garcia thrives in the school art club, painting vivid animal portraits while humming Shakira’s 'Waka Waka', dancing to Bad Bunny’s beats, and reenacting scenes from Disney’s 'Moana', letting
    these artistic bursts channel their social energy and occasional worries into joyful expression.
  travel: Jasmin Garcia prefers short, family‑guided trips, recalling the excitement of a weekend visit to the nearby state park’s dinosaur exhibit and dreaming of a future adventure to the vibrant streets
    of Barcelona, balancing a love for familiar routines with a budding curiosity for new sights.
  culinary: Jasmin Garcia delights in helping mash avocado for guacamole, toss fresh mango, strawberry, and kiwi into a bright fruit salad, and sprinkle cheese on a simple quesadilla, showing budding kitchen
    confidence that balances enthusiasm for colorful flavors with occasional messes when spilling flour or dropping spoonfuls.
  core: Jasmin Garcia is a sociable six‑year‑old who transforms playground chaos into organized games, worries about missing a turn, and leaves a glittery trail of crafts wherever they go.
background:
  cultural: Jasmin comes from a Mexican‑American family that maintains strong cultural ties. Spanish is spoken at home, and she celebrates traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day with colorful decorations, traditional foods, and music. Her family enjoys cooking tamales, tacos, and arroz con frijoles, and she often helps in the kitchen, learning family recipes.
    Growing up in Litchfield Park, Arizona, she is part of a vibrant Mexican‑American community, attending a local elementary school with a diverse student body and participating in cultural festivals that
    blend Mexican customs with Southwest influences. Her Catholic upbringing includes attending church on Sundays and taking part in community service activities.
