personas:
  professional: Shelley Plotner, a veteran elementary and middle school teacher in Baton Rouge, leverages her interdisciplinary curriculum design expertise, classroom management finesse, and love of the
    arts to create inquiry‑based lessons that spark curiosity while balancing meticulous organization with spontaneous creativity.
  sports: Shelley Plotner, a devoted fan of the LSU Tigers football team and the New Orleans Saints, joins a local walking club for morning strolls through the historic district and participates in seasonal
    yoga classes at the community center, balancing moderate activity with a love for spectator sports.
  arts: Shelley Plotner, an avid participant in Baton Rouge’s community theater and a regular at the LSU Museum of Art, finds inspiration in the works of Henri Matisse, the poetry of Maya Angelou, and the
    folk melodies of the Hot Club of Cowtown, often integrating these influences into her lesson plans.
  travel: Shelley Plotner, who prefers meticulously planned weekend getaways, often drives to folk festivals in New Orleans, historic plantations in Natchez, and art fairs in Savannah, while dreaming of
    a cultural immersion tour of Provence’s lavender fields and the museums of Florence.
  culinary: Shelley Plotner, a proficient home cook, delights in simmering jambalaya with Andouille sausage, okra, and shrimp, perfecting red beans and rice, and experimenting with Creole‑style étouffée,
    while occasionally treating herself to a gourmet tasting menu at a downtown bistro.
  core: Shelley Plotner blends disciplined teaching expertise with a restless curiosity for arts, history, and community, habitually juggling meticulous lesson plans, garden pruning, and spontaneous piano
    improvisations, even as they occasionally forget to water their houseplants.
background:
  cultural: Shelley grew up in a middle-class white family in the Deep South, steeped in the traditions of Southern hospitality, Catholic parish life, and a strong appreciation for regional music and cuisine.
    Living in Baton Rouge, she has been immersed in the blend of French‑Acadian (Cajun) and Creole cultures, celebrating Mardi Gras, listening to zydeco and jazz, and savoring gumbo and jambalaya. Her education
    in arts and humanities has reinforced a respect for diverse cultural expressions, which she brings into her classroom and community involvement.
attributes:
  skills: '[''Curriculum Design'', ''Arts Integration'', ''Differentiated Instruction'', ''Project-Based Learning'', ''Classroom Management'', ''Educational Technology'', ''Student Mentorship'', ''Community
    Outreach'', ''Creative Writing Instruction'', ''Intercultural Communication'']'
  hobbies: '[''Visiting art museums and galleries'', ''Reading historical fiction and poetry'', ''Book club participation'', ''Backyard gardening'', ''Cajun and Creole cooking'', ''Volunteer work with community
    theater'', ''Playing piano'', ''Traveling to folk festivals and art fairs'', ''Writing reflective journals'', ''Nature walks in local parks'']'
  career_goals: Shelley aims to transition into a leadership role within her school district, such as instructional coach or arts program coordinator, where she can expand arts integration across multiple
    grade levels. She plans to complete a master's degree in educational leadership and develop a district-wide arts-focused professional development series. Over the next five years, she hopes to mentor
    new teachers, secure grant funding for after-school art initiatives, and publish a guidebook on incorporating humanities into elementary curricula. Even after retirement, she intends to volunteer as
    a museum educator and continue advocating for arts education in the Baton Rouge community.
