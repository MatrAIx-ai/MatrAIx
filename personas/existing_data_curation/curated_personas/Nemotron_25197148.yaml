personas:
  professional: Melissa Spinelli, a 34‑year‑old aerospace engineer, leverages expertise in CFD, FEA, and systems engineering to design cutting‑edge propulsion concepts while they channel their sociable
    energy and meticulous organization into leading cross‑functional teams and mentoring emerging talent.
  sports: Melissa Spinelli fuels their weekends with a competitive indoor volleyball league, brisk hikes through Cook County forest preserves, and they passionately support the Chicago Cubs and Chicago
    Bulls, integrating interval training and weekend trail runs to sustain stamina for both professional challenges and personal adventures.
  arts: Melissa Spinelli’s artistic palate mixes Latin pop icons like Shakira with classic rock legends such as Fleetwood Mac, their playlists fueling cooking and workouts, and they regularly attend community
    theatre productions and wander the galleries of the Art Institute of Chicago to feed their creative curiosity.
  travel: Melissa Spinelli prefers purposeful travel, meticulously planning trips that blend cultural immersion and outdoor adventure—they've trekked the Andes near Mendoza, explored the vibrant street
    art of Valparaíso, and dream of kayaking the Norwegian fjords, all while balancing family commitments and a demanding aerospace career.
  culinary: Melissa Spinelli’s culinary persona shines when they meticulously prepare tamales, mole, and pozole for friends, using fresh corn husks, ancho chilies, and roasted pumpkin seeds; they consider
    themselves an enthusiastic home‑chef, constantly experimenting with fusion twists and savoring the communal dining experience.
  core: Melissa Spinelli fuses a drive for low‑carbon aerospace innovation with a lively social rhythm—while they lead engineering crews, salsa‑dance, host tamale nights, meditate through anxiety, and strategically
    grow a green‑focused investment portfolio.
background:
  cultural: Melissa is a first-generation Mexican-American whose family roots trace back to Jalisco and Oaxaca. Raised in Chicago's Little Village neighborhood, she grew up bilingual, navigating both English
    and Spanish at home and in school. Mexican cultural values such as familismo, respeto, and communal solidarity shaped her compassionate and cooperative nature. Family gatherings centered around food,
    music, and storytelling reinforced a deep appreciation for heritage, which she celebrates through traditional holidays like Día de los Muertos and Cinco de Mayo. Her bicultural experience also fuels
    her commitment to represent and empower the Mexican-American community in STEM, inspiring her to mentor youth and promote diversity within the aerospace field.
attributes:
  skills: '[''Computational Fluid Dynamics (CFD) analysis'', ''Finite-Element Analysis (FEA) for structural components'', ''CAD modeling (SolidWorks, CATIA)'', ''Propulsion system design and optimization'',
    ''Systems engineering and integration for aerospace projects'', ''MATLAB, Python, and C++ programming for simulation and automation'', ''Avionics and flight control software integration'', ''Aerospace
    standards compliance (FAA, NASA) and safety engineering'', ''Risk assessment and reliability analysis'', ''Project management and cross-functional team leadership'', ''Technical documentation and presentation'',
    ''Mentorship and STEM outreach coordination'']'
  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Hiking in Cook County forest preserves'', ''Playing volleyball in a community league'', ''Mentoring STEM clubs for middle-school students'',
    ''Yoga and mindfulness meditation'', ''Reading science-fiction novels'', ''Watching space documentaries'', ''Listening to Latin pop and classic rock music'']'
  career_goals: Her long-term ambition is to become a senior leader in sustainable aerospace technology. Melissa aims to lead a multidisciplinary team developing electric or hybrid propulsion systems for
    commercial aircraft, contributing to the reduction of aviation carbon emissions. She plans to pursue a Ph.D. in aerospace propulsion to deepen her research expertise while maintaining a senior engineering
    role at a major aerospace firm or with NASA's Artemis program. Parallel to her professional aspirations, she is committed to expanding STEM outreach for Mexican-American youth, establishing mentorship
    pipelines, and creating scholarship programs. Balancing these goals, she seeks to achieve a rewarding senior position that allows her to influence technical direction, promote diversity, and sustain
    a healthy work-life integration with her family.
