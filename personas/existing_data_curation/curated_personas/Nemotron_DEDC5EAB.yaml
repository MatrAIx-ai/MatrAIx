personas:
  professional: Minette Talevich, a 93-year-old volunteer coordinator at the Logan senior center, blends decades of home-economics expertise and storytelling flair, and they organize craft workshops, mediate
    community disputes, and preserve oral histories for future generations.
  sports: Minette Talevich, a 93-year-old enthusiast of gentle activity, walks daily in their garden and attends tai chi classes, and they cheer for the Utah State Aggies basketball team, attend Logan High
    School football games each fall, and occasionally join a senior bowling league.
  arts: Minette Talevich, a 93-year-old lover of folk music and visual art, attends Logan gallery openings showcasing regional painters like James Allen, hums along to Bob Dylan and Joan Baez on the radio,
    and they weave community histories into craft circles, letting creativity nurture their social bonds.
  travel: Minette Talevich, a 93-year-old traveler who favors relaxed, family-friendly excursions, enjoys scenic drives through the Wasatch Mountains, a nostalgic trip to Santa Fe's art market, and a recent
    pilgrimage to the historic Gettysburg battlefield, and they craft flexible itineraries that accommodate garden duties and health checks.
  culinary: Minette Talevich, a 93-year-old culinary hobbyist, prepares hearty meals like rosemary-infused roasted chicken, apple crumble, and garden-fresh herb pesto, preserves seasonal vegetables in mason
    jars, and they share their famous cinnamon-spiced tea at neighborhood potlucks.
  core: Minette Talevich, a curious and calm 93-year-old, blends storytelling, crafts, and modest generosity into a life of gentle purpose, even if their organization sometimes lags behind, and they remain
    unfazed by occasional forgetfulness.
background:
  cultural: Minette grew up in Logan, Utah, a largely Latter‑day Saint (Mormon) community with deep pioneer roots. The region’s cultural fabric emphasizes family cohesion, community service, modest living,
    and a close connection to the surrounding mountains and farmland. This upbringing instilled in her a strong sense of duty to help others, a respect for nature, and an appreciation for art and storytelling
    as ways to preserve heritage. Although she did not complete formal schooling beyond eighth grade, she has been educated through lifelong learning in community centers, church gatherings, and intergenerational
    exchanges.
attributes:
  skills: '[''Knitting'', ''Crocheting'', ''Quilting'', ''Cooking and food preservation'', ''Home budgeting'', ''Gardening'', ''Community volunteer coordination'', ''Basic first aid'', ''Storytelling and
