  hobbies: '[''Knitting'', ''Crocheting'', ''Quilting'', ''Gardening and birdwatching'', ''Visiting art exhibitions'', ''Reading historical fiction'', ''Listening to folk music'', ''Attending community
    potlucks'', ''Participating in church and community socials'', ''Learning new crafts such as watercolor painting'']'
  career_goals: Even at 93, Minette remains focused on giving back to her community and nurturing the next generation. She aspires to keep the intergenerational art and craft workshops at the local community
    center thriving, mentor younger volunteers in storytelling and craft techniques, and complete a collaborative scrapbook that documents the memories of Logan’s senior residents. She hopes to continue
    attending church services and community events, maintaining her health to be present for her grandchildren, and perhaps learn a new artistic medium, such as watercolor painting, through a senior‑friendly
    class.
