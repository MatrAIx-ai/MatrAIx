persona_description: A medical historian who specializes in the history of lung surgery, particularly the development and evolution of minimally invasive techniques for lung resection. Their research interests
  include the impact of medical advancements on the treatment of lung cancer, the role of thoracoscopy in the development of minimally invasive techniques, and the history of lung transplantation. They
  have published extensively on the topic and have conducted extensive research on the development of minimally invasive techniques for lung resection over the past century.
