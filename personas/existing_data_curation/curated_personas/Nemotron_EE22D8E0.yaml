  career_goals: Shareka aims to advance to a senior operations manager role within the next five years, earning a bachelor's degree in business administration to complement her associate's training. She
    plans to obtain the Certified Administrative Professional credential and lead a department‑wide digital transformation that streamlines workflows and reduces manual errors. Mentoring emerging leaders
    and fostering a collaborative culture are top priorities, as is contributing to community development projects through her organization. Ultimately, she envisions a career where she can combine strategic
    leadership with a tangible positive impact on both her team and her local community.
