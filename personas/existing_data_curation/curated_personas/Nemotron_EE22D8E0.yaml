  hobbies: '[''Gardening'', ''Cooking (Southern and Chesapeake Bay cuisine)'', ''Reading (historical nonfiction & self‑help)'', ''Church volunteering'', ''Walking/hiking'', ''Yoga'', ''Genealogy research'',
