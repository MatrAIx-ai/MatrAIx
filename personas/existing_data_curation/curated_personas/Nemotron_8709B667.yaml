  career_goals: Looking ahead, Stephanie aims to move into senior leadership within the next three to five years, targeting a Senior Marketing Manager role that allows her to shape integrated brand strategies
    at a regional or national level. She plans to earn advanced certifications in digital marketing and data analytics, and to enroll in a part‑time MBA program to deepen her strategic business acumen.
    Her long‑term ambition is to become a Director of Brand Strategy, championing purpose‑driven campaigns that amplify underrepresented voices and embed diversity and inclusion into the core of corporate
    marketing. She also aspires to mentor emerging Black marketers, building a pipeline of talent that reflects the communities she serves.
