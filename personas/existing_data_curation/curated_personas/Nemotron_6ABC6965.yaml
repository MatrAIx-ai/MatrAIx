  career_goals: Although retired, Elias is driven to remain purposeful. He aims to formalize his mentorship role by offering pro‑bono consulting to emerging Dominican entrepreneurs in the Finger Lakes region.
    He hopes to co‑author a memoir that captures his immigration journey and the evolution of Dominican culture in upstate New York, preserving his family's oral history for future generations. Additionally,
    Elias aspires to master digital tools—such as video conferencing and social media—to stay connected with his grandchildren and to contribute to virtual community workshops on financial literacy and
    entrepreneurship.
