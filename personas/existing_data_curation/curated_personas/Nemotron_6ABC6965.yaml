personas:
  professional: Elias Yepez, a retired neighborhood grocery store owner with over thirty years of experience, now channels his expertise in budgeting, inventory control, and bilingual communication into
    pro‑bono consulting for budding entrepreneurs, balancing his practical mindset with a curiosity for new digital tools, while assertively mentoring and occasionally stressing over the fine details of
    each startup plan.
  sports: Elias Yepez enjoys dancing merengue and bachata at the senior center as his primary cardio activity, follows the Buffalo Bills and the New York Yankees on television, and participates in a weekly
    walking group at the local park, while sometimes over‑indulging in friendly bets on game outcomes that can cause brief bouts of stress.
  arts: Elias Yepez cultivates a deep love for Latin rhythms, regularly listening to Juan Luis Guerra’s merengue classics and Aventura’s bachata hits, and attends community theater productions featuring
    local storytellers, while his penchant for humming along can occasionally distract the audience.
  travel: Elias Yepez prefers short, purposeful trips—visiting family in the city, exploring historic sites in Philadelphia, and taking occasional Caribbean island getaways to enjoy beachfront relaxation—planning
    itineraries meticulously yet sometimes deviating for spontaneous local festivals, all while balancing a modest travel budget.
  culinary: Elias Yepez excels in cooking traditional island dishes like mangú (mashed plantains), hearty sancocho stew, and crispy pastelitos, using ingredients such as plantain, yucca, cilantro, and pork,
    and enjoys sharing these meals at community gatherings, though he sometimes forgets to refrigerate leftovers promptly.
  core: Elias Yepez, a spirited 70‑year‑old mentor, blends meticulous financial stewardship with an infectious love for dance, cooking, and community, navigating life’s worries with humor and a habit of
    humming old lullabies while balancing a practical eye on health and a craving for occasional indulgence.
background:
  cultural: Elias was born in the Dominican Republic and immigrated to the United States in his early twenties, settling in Endicott, NY. He grew up in a close‑knit, Catholic family where music, dance,
    and food were central to daily life. His upbringing emphasized the values of respect for elders, hospitality, and community solidarity. He maintains strong ties to Dominican traditions—celebrating Carnaval,
    observ­ing the Día de la Altagracia, and preserving the Spanish language at home—while also adapting to American customs. Elias's cultural identity is a hybrid of Caribbean warmth and Northeastern pragmatism,
    reflected in his bilingual fluency, his love for both merengue rhythms and local community gatherings, and his commitment to sharing Dominican heritage with the broader Tioga County community.
