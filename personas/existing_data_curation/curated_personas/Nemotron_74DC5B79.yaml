personas:
  professional: A budding robotics enthusiast, Betty Harrell channels curiosity and practicality into designing simple machines for her school’s robotics club, where they tinker with Scratch games and model
    rockets while maintaining a relaxed approach to deadlines.
  sports: A nature‑oriented athlete, Betty Harrell spends weekends fishing on the streams near Parkersburg and joins the local Little League baseball team, cheering for the West Virginia Mountaineers while
    they train with a modest routine of trail runs and occasional cross‑country hikes.
  arts: An inventive folk musician and mystery enthusiast, Betty Harrell plays the fiddle at family gatherings while they sway to Alison Krauss and the Avett Brothers, and they lose themselves in Nancy
    Drew and The Mysterious Benedict Society, letting the stories fuel their imagination.
  travel: An adventurous explorer with a flexible itinerary, Betty Harrell loves weekend camping trips in the Monongahela National Forest and day excursions to the West Virginia State Fair, while they dream
    of backpacking through Shenandoah National Park and visiting the Smithsonian museums in Washington, D.C., whenever the school calendar permits.
  culinary: A budding home chef, Betty Harrell enjoys cooking the trout they catch in local streams into simple grilled fish tacos with lime and cilantro, while they also love whipping up fluffy pancakes
    topped with fresh blueberries and a drizzle of maple syrup, and they snack on homemade trail mix with peanuts, dried apricots, and chocolate chips.
  core: A curious, competitive soul who balances a love of solitary nature hikes with a penchant for building robots, Betty Harrell delights in solving puzzles while occasionally losing track of homework
    amidst a sea of rocks and fishing lines.
background:
  cultural: Betty comes from a white, working‑class family in Parkersburg, West Virginia, a town set within the Appalachian foothills. Her upbringing reflects the region’s strong sense of community, self‑reliance,
    and appreciation for the outdoors. Family gatherings often feature traditional Appalachian music such as bluegrass and fiddle tunes, and local festivals celebrate the area’s history and natural heritage.
    The community places value on practical skills, hard work, and education, with a growing emphasis on STEM opportunities for youth. While raised in a modest household, Betty’s family encourages curiosity,
    independence, and involvement in local traditions like church services, county fairs, and volunteer clean‑up projects.
