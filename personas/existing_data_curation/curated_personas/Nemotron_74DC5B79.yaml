  career_goals: Betty is drawn to careers that let her explore the natural world while applying practical problem‑solving skills. She dreams of becoming a wildlife biologist or an environmental engineer,
    hoping to work on projects that protect the Appalachian forests and waterways near her hometown. At the same time, she entertains the idea of becoming a science journalist, documenting local environmental
    issues and sharing stories through writing. Her ambitions emphasize flexibility, allowing her to combine field work, research, and occasional creative writing, and she aims to earn scholarships for
    STEM programs that will support these goals.
