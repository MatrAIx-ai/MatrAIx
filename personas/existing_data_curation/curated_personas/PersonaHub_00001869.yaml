persona_description: A conservation biologist who specializes in the study of marine mammals, particularly the Southern right whale. She has extensive experience observing and documenting the behavior of
  kelp gulls and their impact on the whales. Her research interests include the effects of human activities on marine ecosystems and the conservation of endangered species. She is a vocal advocate for the
  protection of marine wildlife and the implementation of effective management strategies to mitigate the impact of human activities on marine ecosystems.
