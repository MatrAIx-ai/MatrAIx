persona_description: An engineer responsible for the design and planning of rural motorways, focusing on the technical requirements and guidelines for designing divided-carriageway roads with two or more
  lanes in link sections, grade-separated junctions, and isolated from their surroundings. They are responsible for preparing new infrastructure projects or improving the existing network and ensuring compliance
  with the general principles and basic technical rules related to the definition of geometrical elements of the planned infrastructures. They are likely to be familiar with the National Instruction on
  Technical Design Requirements for Rural Motorways and the updated guidelines in 2021.
