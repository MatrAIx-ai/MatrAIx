personas:
  professional: Alejandro Arenibas, a seasoned 41‑year‑old full‑stack software engineer, leverages a methodical, data‑driven mindset and a keen artistic eye to craft scalable web applications with React,
    Django, and AWS while championing UI/UX storytelling and mentoring junior teammates, and they consistently align technical decisions with immersive visual experiences.
  sports: Alejandro Arenibas enjoys weekend hikes through Everglades State Park with the local Trailblazers Hiking Club, follows the Miami Heat and Tampa Bay Rowdies for basketball and soccer, and participates
    in a casual 5‑K run group that meets monthly, and they treat each activity as a balance to their solitary work style.
  arts: Alejandro Arenibas frequents modern art galleries such as the Pérez Art Museum Miami and the Museum of Contemporary Art in Broward, sketches conceptual installations inspired by James Turrell’s
    light work and Yayoi Kusama’s polka‑dot motifs, plays the tres in informal salsa jams with friends, curates playlists featuring Celia Cruz, Astor Piazzolla, and Brian Eno, and they weave these influences
    into their UI designs.
  travel: Alejandro Arenibas prefers thoughtfully planned trips that blend cultural immersion and solitude, having explored Miami’s Wynwood Arts District, the historic streets of San Juan, the coastal charm
    of Barcelona, and dreaming of a road‑trip to the Monterey Bay Aquarium while budgeting for periodic flights with premium economy, and they always map out itineraries that leave room for spontaneous
    photo walks.
  culinary: Alejandro Arenibas relishes cooking traditional ropa vieja and crisp tostones with a side of avocado salsa, while experimenting with fusion twists like spicy mango‑glazed pork, maintains a moderately
    skilled kitchen setup that includes a cast‑iron skillet, a high‑end blender, and a trusty pressure cooker, and they often test new recipes while listening to salsa rhythms.
  core: Alejandro Arenibas fuses analytical precision with artistic curiosity, juggling code, canvas, and cuisine while staying methodically organized, subtly skeptical, and occasionally indulging in late‑night
    gadget splurges.
background:
  cultural: Alejandro was born to Cuban immigrant parents who settled in South Florida in the early 1990s. Growing up in a bilingual household in Hollywood, FL, he absorbed the rhythms of Cuban music, the
    flavors of traditional cuisine, and the strong familial ties that characterize Cuban diaspora culture. The vibrant Cuban community in Broward County shaped his worldview, fostering a pride in his heritage
    while encouraging adaptability to American life. He celebrates cultural events such as Carnaval Miami and Cuban Heritage Month, and he maintains regular visits to Cuba to reconnect with extended family.
    This bicultural upbringing informs his appreciation for art, storytelling, and collaborative creativity, and it fuels his desire to develop technology that reflects and preserves the Cuban‑American
    experience.
