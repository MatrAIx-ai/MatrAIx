  career_goals: Alejandro aspires to transition into a principal engineer or engineering manager role where he can shape the technical direction of products that blend technology and art. He aims to lead
    a team that builds immersive digital experiences—such as interactive art platforms or virtual galleries—leveraging AI and AR. He also wants to mentor junior developers, contribute to open‑source projects
    that empower creative coding, and eventually launch his own startup focused on culturally rich tech solutions for the Cuban‑American community. Over the next five years, he plans to earn certifications
    in cloud architecture and machine learning, and speak at industry conferences about the intersection of software engineering and visual arts.
