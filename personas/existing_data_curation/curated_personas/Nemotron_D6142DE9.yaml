personas:
  professional: Grace Odonnell, a mid‑career data analyst turned aspiring science communicator, leverages her mastery of Python, R, and statistical design to translate complex research into visually engaging
    narratives, blending meticulous organization with a flexible, creative mindset that thrives in intimate, collaborative settings.
  sports: Grace Odonnell enjoys low‑impact fitness, practicing yoga three times a week, joining a local walking club that explores Boston’s historic neighborhoods, cheering on the Boston Red Sox and Boston
    Celtics during games, and occasionally training for a 5 K charity run in the spring.
  arts: Grace Odonnell immerses herself in Boston’s art scene, drawing inspiration from Monet’s water lilies at the MFA, curating community photo exhibitions featuring street murals, and finding solace
    in the folk melodies of local musicians while sketching scenes from her Hyde Park walks.
  travel: Grace Odonnell favors thoughtfully planned weekend getaways, such as a coastal escape to Cape Cod for lighthouse tours and a culinary road trip through the Hudson Valley, while dreaming of a week‑long
    cultural immersion in Edinburgh’s folk festival and a solo hike through Iceland’s volcanic landscapes.
  culinary: Grace Odonnell experiments in the kitchen, often whisking together herb‑infused roasted vegetables, fresh basil pesto pasta, and honey‑glazed carrots, preferring seasonal, locally sourced produce
    but sometimes over‑salting dishes when distracted by lingering anxiety.
  core: Grace Odonnell is a data‑driven storyteller who balances meticulous organization with artistic curiosity, managing anxiety through mindfulness while occasionally succumbing to impulsive splurges
    on creative gear.
background:
  cultural: Grace was raised in a middle‑class Irish‑American family in the Greater Boston area. Her grandparents emigrated from Ireland in the 1950s, bringing traditions of storytelling, music, and community
    celebration that continue to shape her values. Growing up in Hyde Park, a historically diverse working‑class neighborhood, she was exposed to a mix of cultures and a strong sense of local activism.
    Her upbringing emphasized education, self‑reliance, and civic involvement, which guided her choice to pursue a STEM degree. Though she identifies as white, she remains aware of the multicultural fabric
    of her community and incorporates Irish cultural practices—such as holiday gatherings and folk music—into her personal life, while also embracing the broader New England artistic and intellectual milieu.
attributes:
  skills: '[''Data analysis (Python, R)'', ''Statistical modeling'', ''Experimental design'', ''Technical writing'', ''Presentations to small audiences'', ''Digital photography'', ''Graphic design basics'',
