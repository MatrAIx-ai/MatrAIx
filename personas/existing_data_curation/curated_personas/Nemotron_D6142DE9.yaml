  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Digital photography of New England landscapes'', ''Reading contemporary fiction, philosophy, and science essays'',
    ''Participating in a small book club'', ''Gardening (herbs and flowers)'', ''Cooking experimental recipes'', ''Yoga and guided meditation'', ''Volunteering as a STEM tutor for middle‑school girls'',
    ''Assisting in community art projects'', ''Journaling'', ''Listening to traditional Irish music'']'
  career_goals: Grace aims to transition into a role that bridges science and visual storytelling, such as science communication, museum education, or freelance content creation. She plans to pursue a certificate
    in science communication and to develop a portfolio of illustrated articles that translate complex research into accessible narratives for adult learners. Over the next five years, she hopes to secure
    part‑time consulting work with local museums or NGOs, launch a community workshop series that combines scientific inquiry with artistic expression, and continue building personal resilience through
    advanced mindfulness training. Ultimately, she envisions establishing a sustainable platform that empowers underrepresented voices—especially women returning to the workforce—to share their scientific
    and creative perspectives.
