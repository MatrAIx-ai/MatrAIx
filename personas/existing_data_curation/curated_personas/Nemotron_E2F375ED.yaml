    food bank'', ''Cooking Southern cuisine'']'
  career_goals: Hasan aims to complete a bachelor's degree in public administration or social work, leveraging his curiosity for new ideas and his practical mindset. He envisions working as a community
    outreach coordinator for a nonprofit or city agency in Pine Bluff, creating mentorship programs, job‑training workshops, and health‑education initiatives for at‑risk youth. In the long term, he hopes
    to establish a community resource hub that connects local schools, businesses, and social services, fostering collaboration and providing a stable support network for his neighbors.
