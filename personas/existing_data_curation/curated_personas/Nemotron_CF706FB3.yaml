  career_goals: Marina aims to transition into a principal hardware architect role where she can steer the development of next‑generation, low‑power IoT platforms. She seeks to lead a compact R&D team that
    values both innovative experimentation and rigorous validation, giving her the chance to mentor junior engineers while channeling her competitive drive into measurable performance benchmarks. At the
    same time, she is exploring freelance consulting to gain greater schedule flexibility, which she hopes will mitigate her anxiety and allow her to maintain a healthier work‑life balance. Long‑term, she
    envisions contributing to industry standards for hardware security and sustainability, positioning herself as a respected thought leader in the field.
