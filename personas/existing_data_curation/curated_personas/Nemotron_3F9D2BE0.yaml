  career_goals: Annie dreams of becoming a teacher or a veterinarian because she loves helping others and caring for animals. She is also fascinated by astronauts and space, imagining herself exploring
    the stars. As she grows, she hopes to keep learning new things, help her family with chores, and one day lead a community project that brings friends together.
