personas:
  professional: An imaginative kindergarten student named Annie Lee envisions a future as a wildlife photographer, and they channel their curiosity and practicality by meticulously arranging toy cameras,
    sketching animal habitats, and following step-by-step guides, displaying the organized and reliable traits that will shape their eventual profession.
  sports: An energetic five-year-old named Annie Lee joins the Little Rockets T-ball club, cheers for the local high school Panthers football team on Saturday evenings, idolizes the Indianapolis Colts,
    and balances organized practice drills with spontaneous tag games in the park.
  arts: An enthusiastic storyteller named Annie Lee loves to draw bright animals inspired by Eric Carle's books, sings along to Raffi's 'Baby Beluga', and enjoys the animated magic of Disney's Frozen, weaving
    these influences into imaginative playtime.
  travel: A curious explorer named Annie Lee loves weekend trips to the county fair, eagerly anticipates a family visit to the Children's Museum of Indianapolis, and prefers short car rides with Mom and
    Dad where she can point out passing cornfields and collect souvenir postcards.
  culinary: A budding foodie named Annie Lee delights in creamy macaroni-and-cheese, crunchy chicken nuggets, and sweet apple slices, proudly helps her mother stir peanut butter cookie dough with chocolate
    chips, and savors buttery corn on the cob at the county fair, always requesting extra strawberry milk.
  core: Annie Lee, a methodical yet adventurous five-year-old, balances meticulous sticker album collections with spontaneous bursts of imagination, often humming Raffi tunes while arranging her toy cars
    in perfect rows.
background:
  cultural: Annie's family reflects a typical Midwestern white upbringing in New Palestine, Indiana. Their daily life emphasizes community, family gatherings, and participation in local church activities.
    They enjoy traditions such as attending the annual county fair, supporting the local high school sports teams, and taking part in community service projects. The cultural environment values friendliness,
    modesty, a strong work ethic, and a deep appreciation for the rhythms of small‑town life.
