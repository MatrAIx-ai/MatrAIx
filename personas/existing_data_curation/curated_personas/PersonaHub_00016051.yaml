persona_description: A healthcare professional who works at Madison Community Hospital and specializes in nuclear imaging, responsible for interpreting and analyzing the results of diagnostic images obtained
  using radioactive isotopes. They are skilled in interpreting the images and using the information to evaluate the health of the patient. They are knowledgeable about the different types of nuclear imaging
  exams, their procedures, and the equipment used. They are responsible for interpreting the results of the exams and communicating them to the patient's physician. They may also be involved in teaching
  and training other healthcare professionals on nuclear imaging techniques.
