  career_goals: Looking ahead, Daniel aims to channel his love for hands-on work into a stable, skill-based career. He plans to pursue a high school automotive technology program, with the long-term goal
    of becoming a certified automotive technician or mechanical engineer. At the same time, his competitive drive fuels a secondary ambition to break into eSports or game testing, leveraging his strategic
    gaming skills. He values roles that combine clear routines, tangible results, and opportunities to solve problems creatively.
