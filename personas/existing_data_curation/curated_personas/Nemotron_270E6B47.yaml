personas:
  professional: Daniel Woodward is an aspiring mechanical engineer who spends weekends assembling scale model cars and tinkering with simple robotics kits, channeling their competitive streak into detailed,
    high‑precision builds while favoring familiar, repeatable processes over abstract theory, and they often jump into a new project on a whim despite a lack of formal scheduling.
  sports: Daniel Woodward is a regular on the Columbus Youth Basketball League, shooting hoops at the local park with friends, a fan of the Columbus Blue Jackets and the Columbus Crew, and they keep their
    fitness routine casual, preferring pickup games over structured training, though their competitive nature pushes them to practice free throws after school.
  arts: Daniel Woodward spends evenings strumming guitar chords from the catalog of Green Day and Imagine Dragons, enjoys reading graphic novels like Saga and Watchmen, and watches movies starring Tom Holland,
    reflecting a creative outlet that balances their pragmatic routine with a competitive drive to master new songs.
  travel: Daniel Woodward has explored nearby Lake Erie and spent a weekend camping in Hocking Hills, dreams of visiting Tokyo’s Akihabara district and the sci‑fi museums of Geneva, and they prefer road
    trips with family over solo backpacking, planning each stop around familiar landmarks and scheduled gaming sessions.
  culinary: Daniel Woodward loves pepperoni pizza with extra mozzarella, homemade mac and cheese topped with crispy bacon, and enjoys grilling fresh trout caught on fishing trips, yet they rarely cook beyond
    microwave meals, relying on their dad’s BBQ skills for more elaborate dishes.
  core: Daniel Woodward is a routine‑loving, competitively‑driven 13‑year‑old who toggles between building model kits, pickup basketball, and gaming, while sprinkling in guitar practice and occasional camping
    trips, all flavored with a healthy dose of skepticism and a laid‑back stress tolerance.
background:
  cultural: 'Daniel is raised in a middle-class, predominantly Anglo-American family in Columbus, Ohio. His upbringing reflects typical Midwestern values: a focus on community, practicality, and a respect
    for routine. Family gatherings often feature backyard barbecues, seasonal holidays like Thanksgiving and Independence Day, and a strong emphasis on self-reliance. He attends a public middle school that
    encourages extracurricular participation, from sports to clubs, reinforcing a balanced view of teamwork and individual effort. The local culture''s mix of suburban comfort and access to city resources
    has shaped his pragmatic yet occasionally skeptical outlook on new ideas.'
