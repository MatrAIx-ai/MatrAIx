personas:
  professional: Jasmine Lyles, a 16-year-old visual storyteller, blends self-taught digital illustration, watercolor, and community facilitation skills to design vibrant murals and youth art workshops,
    leveraging their calm resilience and natural peer-mediating ability to turn creative ideas into social impact projects.
  sports: Jasmine Lyles channels their kinetic energy into hip-hop dance rehearsals with the Hendry County Youth Dance Crew, supplements cardio by jogging through the wetlands while cheering for the Miami
    Heat NBA team and the Florida Gators during football season, and occasionally joins a community soccer league on weekends, balancing structured training with spontaneous street-style sessions.
  arts: Jasmine Lyles curates an Instagram feed that spotlights their own Procreate illustrations alongside homages to street artist Banksy, the vibrant murals of Frida Kahlo, and visual motifs from the
    anime series Studio Ghibli, while drawing lyrical inspiration from R&B icons H.E.R. and gospel singer Kirk Franklin, weaving these influences into their handmade jewelry designs.
  travel: Jasmine Lyles prefers weekend road trips that blend adventure with cultural immersion, having explored the Everglades' mangrove trails, spent a summer art-focused stay in New Orleans' French Quarter,
    and dreaming of a future backpacking journey through Kyoto's historic temples, all while budgeting trips through part-time earnings and parental support, a plan they manage with disciplined scheduling.
  culinary: Jasmine Lyles enjoys crafting colorful smoothie bowls with acai, banana, and chia seeds, mastering quick skillet quesadillas filled with black beans, corn, and pepper jack cheese, and occasionally
    experimenting with homemade lavender-infused macarons, reflecting a growing confidence in their kitchen alongside a penchant for sweet treats like chocolate chip cookies.
  core: Jasmine Lyles is a relentlessly curious teen who transforms weekend art sessions into community-building rituals, yet secretly hoards limited-edition graphic novels and forgets to water their indoor
    succulents until the last minute.
background:
  cultural: 'Jasmine is a Black teenager raised in Lehigh Acres, Florida, whose family roots trace back to the Southern United States and the Caribbean. Her upbringing blends Southern‑Florida traditions
    with vibrant Black cultural practices: she participates in church gatherings, celebrates holidays such as Juneteenth and Kwanzaa, and enjoys cooking family recipes that include Southern soul food and
    Caribbean flavors. The local community’s close‑knit environment and the natural surroundings of Southwest Florida shape her appreciation for outdoor activities and nature‑based art. Through school and
    community programs, she stays connected to the broader Black cultural heritage of storytelling, music, and visual expression.'
attributes:
  skills: '[''Effective interpersonal communication'', ''Facilitation of group activities'', ''Sketching and watercolor painting'', ''Digital illustration (Procreate, Canva)'', ''Basic photography and photo
    editing'', ''Graphic design fundamentals'', ''Event planning for youth workshops'', ''Organizational and time‑management skills'', ''Conflict mediation and peer counseling'', ''Familiarity with local
    cultural resources'']'
  hobbies: '[''Sketching and digital illustration'', ''Hip‑hop dance'', ''Listening to R&B, hip‑hop, and gospel music'', ''Attending community art workshops'', ''Nature sketching in local wetlands'', ''Volunteering
    at community garden'', ''Reading graphic novels'', ''Creative gaming (Minecraft)'', ''Handmade jewelry making'', ''Curating an Instagram art page'']'
  career_goals: As a 16‑year‑old with a passion for art and community, Jasmine aims to earn her GED and enroll in a community‑college program in Fine Arts or Graphic Design. She envisions a career that
    blends visual creativity with social impact—working as a community‑based art facilitator, designing public murals, or curating youth‑focused exhibitions. In the longer term, she hopes to launch a nonprofit
    that offers free art‑making workshops to underserved kids in Hendry County, while also pursuing opportunities as a freelance illustrator and digital content creator.
