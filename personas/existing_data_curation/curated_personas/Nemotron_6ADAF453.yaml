  hobbies: '[''Adult Basketball League'', ''Community Trivia Nights'', ''Classic Car Restoration'', ''Lakefront Hiking'', ''Community Festival Volunteering'', ''Structured Journaling'', ''Guided Breathing
    Exercises'']'
  career_goals: John aims to earn his Project Management Professional (PMP) certification within the next year and leverage it to step into a senior project manager role overseeing multi‑site programs in
    the automotive supply chain sector. Over the next five years, he aspires to become a program director responsible for strategic initiative portfolios, ultimately positioning himself to launch a consultancy
    that helps midsized manufacturers adopt lean, data‑driven project practices. He also seeks to improve his work‑life balance by implementing systematic stress‑reduction routines.
