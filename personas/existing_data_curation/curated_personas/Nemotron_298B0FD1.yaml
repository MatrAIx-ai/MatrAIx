  hobbies: '["Reading non-fiction (economics, psychology, tech)", "Puzzle solving (Sudoku, crosswords)", "Chess", "Go", "Strategic board games", "Jogging (beach routes)", "Strength training", "Cooking (precision
    recipes)", "Personal investing", "Listening to classic rock", "Small‑group social gatherings"]'
  career_goals: Alain aims to become a senior credit analyst within the next two years, then progress to a credit risk manager role. He plans to obtain the Chartered Financial Analyst (CFA) designation
    and a Financial Risk Management (FRM) certification to deepen his expertise. Long‑term, he aspires to lead a risk analytics division, influence corporate credit policy, and eventually move into a chief
    risk officer (CRO) or chief financial officer (CFO) position. He is focused on integrating advanced data science techniques into credit assessment to stay at the forefront of the industry, while maintaining
    a stable and incremental career trajectory.
