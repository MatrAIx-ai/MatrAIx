persona_description: A historian who specializes in the study of the Civil War, particularly the Reconstruction era. His research interests include the impact of the war on the South, the role of Congress
  in Reconstruction, the activities of the Radical Republicans, and the legacy of Reconstruction on modern southern society. He is interested in the images and documents related to the Civil War, particularly
  those taken after the war, and how they reflect the events and the people involved. He is also interested in the role of African Americans in the Reconstruction era, particularly their experiences as
  freed slaves and as part of the new industrial economy in the South.
