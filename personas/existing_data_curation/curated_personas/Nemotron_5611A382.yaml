personas:
  professional: Donald Abreu, a young robotics hobbyist, channels their disciplined piano practice and love for structured LEGO builds into meticulous Scratch coding and team‑driven challenges in their
    school's robotics club, where their organized, reserved nature makes them a reliable yet assertive problem‑solver, and they often spearhead the planning of each build.
  sports: Donald Abreu enjoys playing organized youth soccer in the DC United Academy league during fall, cheerfully watches Washington Capitals games with family on weekends, and maintains a personal fitness
    routine of daily push‑ups and short bike rides, preferring the predictable structure of scheduled practice over large, chaotic gatherings, and they feel most motivated when training with a small, familiar
    group.
  arts: Donald Abreu spends evenings mastering piano pieces by Mozart and Ludovico Einaudi, swipes through illustrated sci‑fi novels by Isaac Asimov and Andy Weir, regularly explores the Smithsonian’s art
    exhibitions featuring works by Alma Thomas, and they channel this eclectic appreciation into designing original LEGO dioramas that reflect both imaginative storytelling and disciplined craftsmanship.
  travel: Donald Abreu prefers family‑oriented trips that blend structured itineraries with hands‑on exploration, having visited the National Air and Space Museum and the Smithsonian National Zoo in Washington,
    DC, eagerly dreaming of a future vacation to Lisbon’s historic tram rides and the interactive science museum in Tokyo, where their curiosity can roam while still following a well‑planned schedule, and
    they always keep a detailed travel journal to track each adventure.
  culinary: Donald Abreu enjoys the comforting taste of mac and cheese after school, proudly helps slice fresh bananas for banana bread, eagerly anticipates the family’s traditional bacalhau à brás and
    pastéis de nata during Festa de São João, and they often experiment with building edible LEGO‑inspired cookie sculptures using chocolate chips and sprinkles.
  core: Donald Abreu is a meticulous ten‑year‑old who transforms LEGO bricks into engineering marvels, strains the patience of their piano teacher with relentless practice, occasionally forgets to do homework
    when a new set arrives, and they secretly collect spare puzzle pieces to finish later.
background:
  cultural: Donald comes from a white Portuguese‑American family; his surname Abreu reflects his ancestry from Portugal. His household blends traditional Portuguese customs—such as celebrating Festa de
    São João and enjoying foods like bacalhau and pastéis de nata—with typical American holidays. Growing up in Washington, DC, he is exposed to the city’s rich cultural diversity, which broadens his perspective
    while he maintains a strong connection to his familial heritage.
attributes:
  skills: '["Organizational planning", "Time management", "Basic arithmetic", "Reading comprehension", "Scratch programming", "LEGO model building", "Piano basics", "Problem solving", "Collaborative teamwork"]'
  hobbies: '["LEGO building", "Piano practice", "Reading science fiction", "Scratch programming", "Puzzle solving", "Museum visits", "Robotics club", "Nature walks"]'
  career_goals: Donald dreams of becoming a civil engineer or architect who designs safe, orderly, and sustainable structures. He is fascinated by the city's iconic monuments and the engineering behind
    bridges and public spaces he sees in Washington, DC. He also imagines one day working on space exploration projects, using his love of systematic problem solving to contribute to aerospace engineering.
    His ambition is to apply his methodical skills to real‑world challenges and create tangible, well‑planned solutions.
