    at local food pantry'', ''listening to R&B and gospel music'', ''nature walks in local parks'', ''watching classic movies'']'
  career_goals: Tammie aims to move from receptionist to office manager within the next three to five years, pursuing certification in office administration and potentially an associate degree in business
    administration. She desires to develop stronger organizational and leadership skills to supervise a small team and improve overall office efficiency. In the long term, she envisions establishing a community
    outreach center or small nonprofit in Harris County that offers information and assistance to residents, building on her experience as an information clerk. Financial stability for her household and
    supporting her husband's career aspirations are also key motivations.
