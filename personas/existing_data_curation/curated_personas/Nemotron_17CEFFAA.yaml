personas:
  professional: Tammie Smith is a receptionist at a community resource office, and they leverage strong customer service, multi‑line phone handling, and a compassionate, detail‑oriented approach to guide
    callers, while balancing a natural preference for structure with a relaxed attitude toward strict scheduling, all while eyeing an office manager role.
  sports: Tammie Smith enjoys walking the trails of Hermann Park twice a week, follows the Houston Astros and the Houston Rockets on TV, and participates in a local church softball league during the summer,
    preferring low‑impact activities over intense competition.
  arts: Tammie Smith finds solace in listening to R&B and gospel legends like Mary J. Blige, Marvin Gaye, and Kirk Franklin, they attend occasional screenings of classic films such as 'Casablanca' and 'To
    Kill a Mockingbird,' and they channel creative energy through knitting while humming favorite tunes.
  travel: Tammie Smith dreams of a weekend road trip to New Orleans to explore its music scene and cuisine, they have previously visited the Gulf Coast beaches of Galveston for a relaxed getaway, and they
    prefer budget‑friendly planning with a flexible itinerary that leaves room for spontaneous stops.
  culinary: Tammie Smith excels at cooking comforting Southern and Creole dishes, often preparing gumbo with okra and Andouille sausage, jambalaya with shrimp, and chicken and dumplings, while also enjoying
    the process of baking cornbread and sharing meals with family and friends.
  core: Tammie Smith is a warm‑hearted, slightly disorganized 22‑year‑old who balances a love for community service and cozy cooking with a habit of forgetting appointments but always finds time to knit
    a blanket for a neighbor.
background:
  cultural: Tammie identifies as African American and grew up in the Greater Houston area, immersed in the region’s rich Black Southern culture. Family gatherings, church involvement, and community solidarity
    have shaped her values of hospitality, mutual support, and resilience. She maintains traditions such as cooking soul food, sharing stories from elders, and participating in church socials. The cultural
    emphasis on strong familial bonds and collective well‑being informs her compassionate nature and her desire to help others in her community. She also appreciates the diverse influences within Texas’s
    Black community, blending Southern, urban, and diaspora elements into her identity.
