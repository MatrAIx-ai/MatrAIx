  career_goals: Teresa aims to leverage her experience into a supervisory role as a lead dental hygienist, where she can mentor newer staff and shape clinic protocols. She is pursuing a certification in
    periodontal therapy to deepen her clinical expertise, and she envisions developing community outreach programs that bring preventive oral health education to schools and senior centers in Wooster. Balancing
    practicality with her curiosity, she also considers a part‑time Master’s in public health to broaden her impact on community wellness, while ensuring her career path maintains the flexible schedule
    she values for personal well‑being.
