personas:
  professional: Teresa Minniear is a seasoned dental hygienist who combines meticulous prophylaxis, periodontal assessment, and radiography expertise with a curiosity‑driven eagerness to integrate emerging
    technologies, while their relaxed, occasionally disorganized style translates into flexible scheduling and collaborative problem‑solving in a fast‑paced clinic.
  sports: Teresa Minniear enjoys weekend hikes with the Wooster Hiking Club through John Bryan State Park, follows the Cleveland Browns and Cleveland Cavaliers with fervor, participates in a community softball
    league, and balances yoga sessions at a local studio with an occasional 5‑k run, reflecting a moderate, flexible approach to fitness.
  arts: Teresa Minniear devotes evenings to reading historical fiction by Philippa Gregory and Hilary Mantel, attends the Cleveland Orchestra’s spring concert, savors folk tunes by Brandi Carlile, and shares
    short stories at a local writer’s circle, allowing creative expression to temper work‑day stress.
  travel: Teresa Minniear favors a mix of short, spontaneous road trips—like a weekend to Shaker Village of Pleasant Hill or a hike in Cuyahoga Valley—paired with longer, planned getaways such as a culinary
    tour of Tuscany and a spring cherry‑blossom visit to Kyoto, always balancing limited vacation days with a flexible schedule.
  culinary: Teresa Minniear experiments with farm‑to‑table cuisine, frequently preparing dishes like roasted beet and goat‑cheese salad, wild‑mushroom risotto seasoned with garden‑grown thyme, and seasonal
    vegetable stir‑fry featuring heirloom tomatoes, all paired with local Ohio wines from Gervasi Vineyard.
  core: Teresa Minniear is a curiosity‑driven dental hygienist who overwaters their garden, worries about the future, and finds calm in yoga, wine tastings, and crafting experimental seasonal dishes.
background:
  cultural: Teresa grew up in a small‑town Midwestern environment in Ohio, shaped by the region’s values of modesty, hard work, and community involvement. Her family’s heritage includes German and Irish
    roots, common in the area, which instilled traditions of seasonal celebrations, a strong emphasis on family gatherings, and a love for local farmers’ markets. While raised in a Protestant household,
    she now identifies as spiritually eclectic, drawing comfort from meditation and community service. The cultural fabric of Wooster—its university presence, local arts scene, and emphasis on neighborly
    support—has influenced Teresa’s appreciation for lifelong learning, civic engagement, and flexible, balanced living.
