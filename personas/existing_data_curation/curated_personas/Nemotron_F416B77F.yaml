    ''Basic graphic design (Canva, Adobe Photoshop)'']'
  hobbies: '[''Visiting art galleries and mural tours'', ''Watercolor painting and sketching'', ''Cooking Mexican and fusion dishes'', ''Reading psychology and contemporary fiction'', ''Yoga and mindfulness
    meditation'', ''Hiking in the San Bernardino Mountains'', ''Street photography'', ''Attending cultural festivals (Dia de los Muertos, Cinco de Mayo)'', ''Exploring specialty coffee shops'', ''Volunteering
    at community English tutoring'']'
  career_goals: Driven by her competitive streak and high personal standards, Arlene aims to advance from her current representative role to a Customer Service Team Lead within the next two years, eventually
    progressing to a Customer Experience Manager overseeing multiple support teams. She plans to earn a Project Management Professional (PMP) certification and complete a bachelor's degree in Business Administration
    to deepen her strategic expertise. Her short-term goal is to raise her team's Net Promoter Score above 95% and achieve top-ranking performance awards. Long-term, she aspires to design customer-experience
    programs that integrate her love for art and culture, and to launch a mentorship initiative that guides bilingual youth from the San Bernardino area into professional service careers.
