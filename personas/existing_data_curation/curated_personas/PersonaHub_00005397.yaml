persona_description: A professor who specializes in environmental studies, particularly in the field of coastal management and tourism. She has expertise in beach changes and recreation planning, and is
  interested in understanding the dynamic interactions between the physical, biological, and human factors that shape the coastal environment. She is concerned about the potential degradation of the high-quality
  coastal environment due to the increasing pressure from tourism and the need to balance economic benefits with environmental conservation. Her research interests include the study of coastal management
  strategies, the impacts of tourism on the littoral physical environment, and the development of sustainable recreation planning practices.
