    gallery openings'']'
  career_goals: Although officially retired, Toni remains driven to leave a lasting creative legacy. She aims to compile and publish a memoir intertwining her personal history with reflections on art and
    community life. She hopes to curate a traveling exhibition showcasing works created by senior artists in New Canaan, fostering intergenerational dialogue. Toni plans to enroll in advanced art history
    courses at a nearby community college to deepen her scholarly understanding of abstract movements. She also aspires to serve on the board of a local cultural nonprofit, using her organizational expertise
    to expand outreach programs. Finally, she dreams of visiting iconic art destinations—Paris, Florence, and the Metropolitan Museum—while continuing to teach creative writing workshops at the senior center.
