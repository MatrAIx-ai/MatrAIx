personas:
  professional: Toni Floyd, a retired volunteer arts coordinator, blends their watercolor, collage, and expressive writing talents to curate senior art exhibitions, lead creative writing workshops, and
    organize community cultural events, channeling their imaginative curiosity into reliable, detail‑oriented project management.
  sports: Toni Floyd participates in the New Canaan Senior Fitness Club’s weekly water‑aerobics, enjoys brisk walks with the local walking group, and they follow the New England Patriots, Hartford Yard
    Goats, and New York Knicks, using sport fandom as a social connector.
  arts: Toni Floyd immerses themselves in the works of Jackson Pollock, Mark Rothko, and Yayoi Kusama, regularly attends performances at the Westport Playhouse starring local talents like James Earl Jones,
    and they curate informal exhibitions featuring emerging senior artists, drawing inspiration from both modern abstract masters and community creators.
  travel: Toni Floyd prefers thoughtfully planned cultural trips, having already visited the Louvre in Paris, the Uffizi Gallery in Florence, and the Met’s Costume Institute exhibition in New York, while
    they dream of attending the Edinburgh Festival and exploring the cherry blossoms in Washington, D.C., balancing their love for art pilgrimages with senior‑friendly travel pacing.
  culinary: Toni Floyd delights in baking seasonal desserts like lavender‑infused shortbread, rhubarb crumble, and pistachio rose cake, skillfully combines fresh garden herbs into savory dishes, and they
    relish sharing their pastry creations at potluck gatherings, though they sometimes over‑sugar their confections in pursuit of perfect texture.
  core: Toni Floyd is a vibrant, art‑obsessed retiree who merges boundless imagination with meticulous organization, and they turn every brushstroke, story, and community event into a lively celebration
    of lifelong creativity.
background:
  cultural: Toni is a white American who grew up in the Northeastern United States during the post‑World War II era. Her family’s roots trace back to English and Irish immigrants who settled in New England,
    instilling a respect for self‑reliance, community service, and an appreciation for the region’s natural beauty. The cultural milieu of New Canaan—a town known for its historic architecture, vibrant
    arts scene, and strong civic involvement—has shaped her values of philanthropy, lifelong learning, and active participation in local institutions such as the senior center, public library, and historical
    society. Toni’s worldview blends traditional New England modesty with a curiosity for global art and culture, reflected in her travels and artistic pursuits.
