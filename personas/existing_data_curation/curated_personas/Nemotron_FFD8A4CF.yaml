personas:
  professional: Elisha Alston, a 21‑year‑old occupational therapy student, blends meticulous client assessments with experimental art‑based interventions, leveraging her love of abstract watercolors and
    gospel‑infused rhythm to design culturally resonant therapy plans for underserved youth.
  sports: Elisha Alston enjoys a disciplined yet gentle fitness routine that includes weekly yoga classes at the university wellness center, occasional jogging along the Elizabeth waterfront, and cheering
    for the New York Knicks during basketball season and the New Jersey Devils in hockey months, while she also joins a mixed‑gender intramural softball team for a competitive outlet.
  arts: Elisha Alston, an avid abstract watercolorist, frequents the Newark Museum and local galleries to draw inspiration from contemporary artists like Kerry James Marshall, curates experimental jazz
    playlists featuring Kamasi Washington and J Dilla, and immerses herself in the novelistic worlds of Colson Whitehead and the philosophical musings of Simone de Beauvoir.
  travel: Elisha Alston prefers meticulously planned weekend escapes that blend cultural immersion and culinary adventure, having already explored New Orleans for its jazz heritage, Jamaica for its vibrant
    spice markets, and the Hudson Valley’s historic farms, while budgeting each trip with a spreadsheet in her bullet‑journal to keep travel costs within her modest student allowance.
  culinary: Elisha Alston, an inventive home cook, blends Southern comfort dishes like fried chicken and collard greens with Caribbean jerk spices and mango salsa, often perfecting a ginger‑infused peach
    cobbler, and she enjoys experimenting with fresh herbs such as thyme and scotch bonnet peppers in her compact kitchen.
  core: Elisha Alston is a methodical, art‑driven future occupational therapist whose competitive streak fuels both meticulous planning and occasional impulsive splurges on supplies, while her intense emotional
    reactivity compels a daily practice of yoga and journaling to stay grounded.
background:
  cultural: 'Elisha is a Black American who grew up in the culturally diverse city of Elizabeth, New Jersey. Her family’s roots trace back to the Southern United States, and she was raised with a strong
    appreciation for gospel music, soulful storytelling, and the resilience of the Black community. Regular attendance at a Baptist church instilled values of service, perseverance, and collective uplift.
    Living in a multicultural urban environment exposed her to a mosaic of traditions, from Caribbean festivals to Latin American cuisine, shaping her inclusive worldview. Elisha’s cultural identity informs
    her professional ethos: she is committed to delivering occupational therapy that honors the lived experiences of Black clients, incorporates elements of African‑American art and music, and addresses
    systemic health inequities through advocacy and culturally responsive practice.'
attributes:
  skills: '["Client Assessment", "Therapeutic Intervention Planning", "Assistive Technology Evaluation", "Detailed Documentation", "Time Management", "Interdisciplinary Collaboration", "Art‑Based Therapeutic
    Techniques", "Sensory Integration Strategies", "Critical Thinking", "Stress‑Management for Clients", "Professional Development and Certification Pursuit"]'
  hobbies: '["Abstract Sketching", "Watercolor and Mixed‑Media Art", "Art Gallery Visits", "Listening to Experimental Jazz and Soul", "Reading Contemporary Fiction and Philosophy", "Bullet‑Journaling",
    "Crossword and Sudoku Puzzles", "Yoga and Mindfulness Meditation", "Cooking Fusion Dishes (Southern & Caribbean)", "Volunteering at Community Health Fairs", "Small‑Group Book Club Participation"]'
  career_goals: Elisha aims to obtain her state licensure within the next year and pursue a specialization in pediatric neuro‑rehabilitation, where she can integrate art therapy to support sensory and emotional
    regulation. She dreams of designing a community‑based program that uses visual‑arts workshops to empower Black youth in Elizabeth and surrounding neighborhoods, reducing disparities in access to creative
    occupational services. Long‑term, she plans to earn a master’s degree, achieve certifications in Hand Therapy and Sensory Integration, and eventually lead a multidisciplinary clinic that champions culturally
    responsive, innovation‑driven care. Her competitive drive pushes her to publish research on the efficacy of art‑infused OT interventions and to become a recognized advocate for mental‑health awareness
    within the African‑American community.
