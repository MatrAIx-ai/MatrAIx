  career_goals: Skye aims to transition into a senior leadership role, such as Director of Business Analysis or Operations Manager, where she can shape enterprise-wide strategy and oversee large-scale transformation
    programs. Over the next five years she plans to earn a bachelor's degree in Business Administration (or an MBA) to complement her certifications and expand her credential base. She also intends to achieve
    a Lean Six Sigma Black Belt and to become a recognized thought leader in data-driven decision making within the public sector of Georgia. Skye is motivated to mentor junior analysts, build high-performing
    teams, and implement predictive analytics platforms that improve service delivery while maintaining fiscal responsibility. Balancing her ambition with personal well-being, she seeks a role that offers
    measurable impact without compromising her ability to manage stress.
