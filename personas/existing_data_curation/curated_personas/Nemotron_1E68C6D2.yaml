personas:
  professional: Skye Weghorst, a 38‑year‑old management analyst in a mid‑size public sector organization, combines a data‑centric mindset with Six Sigma rigor to redesign municipal workflows, translating
    complex analytics into crisp briefings while they harness their competitive, skeptical nature to drive relentless stakeholder negotiations and risk assessments.
  sports: Skye Weghorst dominates the local pickleball circuit, captains a summer community softball team, logs regular early‑morning runs along the tidal marshes, and roots for the Georgia Southern Eagles
    and Savannah Bananas, balancing a competitive drive with a socially‑focused team ethic they cherish.
  arts: Skye Weghorst immerses themselves in creative pursuits, attending photography workshops that capture the low‑light glow of marsh sunsets, devouring mystery novels by Tana French, grooving to Alabama
    Shakes and John Coltrane, and curating board‑game nights that showcase strategic thinking they adore.
  travel: Skye Weghorst favors short‑haul trips that blend coastal relaxation with cultural discovery, frequently visits Charleston’s historic waterfront and Savannah’s riverfront, dreams of exploring the
    Azores for volcanic hikes, and plans each getaway with a detailed spreadsheet that balances travel costs against work‑life balance they strive to protect.
  culinary: Skye Weghorst experiments with Southern‑fusion dishes like miso‑glazed shrimp & grits, okra‑etouffee tacos, and bourbon‑infused peach cobbler, boasts a solid home‑cooking skill set honed through
    weekend recipe trials, and delights friends with dinner gatherings where fresh oysters meet Asian spice blends they carefully curate.
  core: Skye Weghorst is a data‑driven analyst whose competitive edge fuels community pickleball victories, yet they constantly battle worry‑induced stress via yoga, marsh runs, and meticulous budgeting,
    while their love of Southern hospitality shines through experimental dinner parties they host.
background:
  cultural: Skye is a third-generation white American of German-Dutch ancestry, raised in Brunswick, Georgia. Growing up in a small port city gave her a strong sense of Southern hospitality mixed with the
    maritime heritage of the Atlantic coast. Her family celebrated traditional Southern holidays and local festivals such as the Shrimp & Grits Festival, while also emphasizing self-reliance and a pragmatic
    outlook - values that echo her critical and skeptical nature. The coastal environment fostered an appreciation for nature and community service, evident in her involvement with beach-cleanup initiatives.
    Although she shares many Southern cultural traits - such as a love for regional cuisine and a laid-back demeanor - Skye also embraces modern, progressive ideas through online learning and diverse social
    circles, balancing her heritage with an independent, curious mindset.
