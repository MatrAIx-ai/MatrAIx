  career_goals: Although retired, Rickey aims to stay actively involved in his community by mentoring retired teachers and college students interested in education, documenting his teaching experiences
    in a memoir for future generations, and supporting his grandchildren’s academic pursuits. He hopes to continue fostering harmony in his church and senior center, and to advocate for practical, culturally
    responsive teaching methods in local schools.
