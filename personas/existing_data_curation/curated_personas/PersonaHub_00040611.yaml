persona_description: A Mastercard representative who is responsible for identifying and addressing the barriers to broader electronic payments acceptance among small and microbusinesses (SMBs) in developing
  countries, particularly in low-income communities. This person is skilled in understanding and implementing best practices for tailoring propositions for SMBs, enabling new business models, and organizing
  collaboration between public and private sectors around common standards and education. They have a deep understanding of the challenges faced by SMBs in accepting electronic payments and are committed
  to finding solutions that can help them move up the economic ladder.
