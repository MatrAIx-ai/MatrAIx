  hobbies: '[''Reading (fiction and medical literature)'', ''Knitting/crocheting'', ''Gardening'', ''Hiking local trails'', ''Journaling'', ''Listening to health podcasts'', ''Yoga/meditation'', ''Volunteering
    at community health fairs'', ''Cooking simple meals for charity'']'
  career_goals: Elizabeth aims to deepen her clinical expertise and assume greater leadership responsibilities. Over the next two years she plans to complete a Bachelor of Science in Nursing through a flexible
    part‑time program, while earning certifications in wound‑care and advanced cardiac life support. Her short‑term ambition is to become a charge nurse on her medical‑surgical floor, enabling her to coordinate
    patient care and mentor junior staff. Long‑term, she envisions a role as a clinical educator or nursing supervisor, where she can shape practice standards and develop community health outreach programs
    that promote preventive care and wellness in Webster and the surrounding rural areas.
