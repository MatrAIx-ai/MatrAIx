personas:
  professional: Elizabeth Hamilton blends meticulous bedside nursing skills with a curiosity for emerging medical technology, leading her team with practical compassion while juggling a part-time BSN program
    and a habit of occasional missed deadlines due to her relaxed approach to organization.
  sports: Elizabeth Hamilton spends Saturday mornings trekking the Minnesota state trail system, and they join the Twin Cities Trailblazers running group for 5K jogs, fit in a quick indoor spin class at
    the community center, and unwind by cheering on the Minnesota Vikings and Minnesota Timberwolves while occasionally catching a Twins baseball game on TV.
  arts: Elizabeth Hamilton unwinds after knitting sessions by reading contemporary fiction from authors like Ann Patchett and Celeste Ng, while their playlist cycles through Sufjan Stevens, Bon Iver, and
    The Oh Hellos, and they occasionally visit the Weisman Art Museum to view modern installations that inspire new crochet patterns.
  travel: Elizabeth Hamilton prefers low-key, thoughtfully planned getaways that blend nature and culture, such as weekend cabins in the Boundary Waters, a spring road trip to Asheville's art districts,
    and a dream summer to Norway's fjords, but they often postpone distant adventures due to budget constraints and a tendency to over-commit to local volunteer duties.
  culinary: Elizabeth Hamilton enjoys cooking simple, protein-rich meals like quinoa-and-roasted-vegetable bowls, lemon-herb grilled chicken, and hearty lentil soup, which they prepare with fresh herbs
    such as thyme and rosemary, while their steady hands from knitting allow them to hand-roll homemade tortillas for community health-fair lunchboxes.
  core: Elizabeth Hamilton is a curious yet pragmatically relaxed nurse; they knit blankets for charity, worry about every detail, and balance patient care with a habit of occasional disorganization.
background:
  cultural: Elizabeth’s cultural background is rooted in the Midwestern white community of southern Minnesota. Raised in a modest, family‑oriented household, she was exposed to Lutheran traditions and the
    region’s emphasis on humility, hard work, and neighborly support. The small‑town values of self‑reliance, practicality, and community service shaped her outlook, fostering a strong sense of responsibility
    toward family and neighbors. While she respects local customs and the quiet rhythm of rural life, she also embraces the broader American cultural narrative of individual growth and voluntary civic engagement.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''Wound care management'', ''Infection control'', ''Electronic medical records documentation'', ''Patient education'', ''Evidence‑based
