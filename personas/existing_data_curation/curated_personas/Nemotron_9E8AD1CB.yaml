personas:
  professional: Sean Laliberte, a veteran IT support engineer with over two decades of experience, leverages systematic troubleshooting, meticulous documentation, and a calm, patient demeanor to deliver
    reliable service across Windows, macOS, and Linux platforms while pursuing ITIL Expert certification and a future Service Delivery Manager role to mentor junior staff.
  sports: Sean Laliberte, a devoted fan of the Philadelphia Eagles and the Philadelphia Phillies, plays weekly pickleball at the local senior center, follows a light jogging routine through garden rows,
    and participates in a seasonal community golf league, balancing structured exercise with a pragmatic approach to staying fit.
  arts: Sean Laliberte finds creative outlet in woodworking and appreciates the Americana sounds of Johnny Cash, the intricate brushwork of Andrew Wyeth, and the storytelling of Ken Burns documentaries,
    often listening to classic rock while shaping walnut cabinets and attending the annual Pennsylvania Dutch harvest festival for folk‑art demonstrations.
  travel: Sean Laliberte prefers meticulously planned road trips in his restored 1965 Ford Mustang, exploring historic sites such as Gettysburg and colonial Williamsburg, weekend getaways to Lancaster County’s
    Amish farms, and occasional overseas tours to the Netherlands to experience Dutch architectural heritage, all while budgeting time around volunteer commitments.
  culinary: Sean Laliberte, an intermediate home chef, delights in cooking vegetable‑laden ratatouille, herb‑crusted pork tenderloin with apples, and fresh garden salads topped with heirloom tomatoes and
    vinaigrette, often seasoning dishes with rosemary and sage from his own herb garden and pairing meals with a cold glass of local Pennsylvania craft beer.
  core: Sean Laliberte is a meticulous, calm 58‑year‑old who blends a disciplined IT career, precision woodworking, and a love for puzzles, while occasionally over‑organizing their garden and forgetting
    to schedule personal downtime.
background:
  cultural: Sean grew up in a middle‑class suburban community in Montgomery County, Pennsylvania, with family roots tracing back to Irish and German immigrants who settled in the region during the early
    20th century. The local culture emphasized punctuality, self‑reliance, and community involvement, values that shaped his disciplined and cooperative outlook. He maintains connections to regional traditions
    such as the Pennsylvania Dutch harvest festival, local church gatherings, and volunteer service at community centers, reflecting a balance between personal achievement and communal responsibility.
attributes:
  skills: '[''Technical troubleshooting'', ''Network configuration and maintenance'', ''Help desk ticket management (ITIL)'', ''Standard operating procedure development'', ''Hardware repair and replacement'',
    ''Software deployment and patch management'', ''User training and onboarding'', ''Documentation and knowledge base creation'', ''Basic cybersecurity practices'', ''Remote assistance and support'']'
  hobbies: '[''Woodworking'', ''Classic car restoration'', ''Gardening'', ''Jigsaw puzzles'', ''Sudoku'', ''Historical non-fiction reading'', ''Community volunteering'']'
  career_goals: Sean aims to advance into an IT Service Delivery Manager role within the next three years, leveraging his organizational skills to oversee larger support teams and optimize service processes.
    He plans to achieve ITIL Expert certification and design a mentorship program for junior technicians to raise overall team competence. Long‑term, he envisions launching a boutique consultancy that helps
    small businesses streamline their IT operations through structured workflows and preventative maintenance strategies, allowing him to blend his disciplined work ethic with entrepreneurial ambition while
    maintaining a balanced work‑life schedule.
