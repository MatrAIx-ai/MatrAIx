personas:
  professional: Betty Carter, a high‑school junior, is already honing their future as a mechanical engineer by building model trains, applying their routine‑driven, detail‑oriented mindset to precision
    design and problem‑solving.
  sports: Betty Carter spends Saturday mornings jogging alone along the foothills, follows the Denver Broncos and the Colorado Avalanche with quiet enthusiasm, and belongs to the local Youth Hiking Club,
    where they join weekend trail outings and bird‑watching excursions.
  arts: Betty Carter finds solace in the intricate mysteries of Agatha Christie, the sweeping historical tapestries of Hilary Mantel, and the soothing piano works of Claude Debussy, which together shape
    the sketches and journal entries they craft during quiet evenings.
  travel: Betty Carter prefers meticulously planned, low‑key getaways, often opting for week‑long road trips to national parks such as Yellowstone and the Great Smoky Mountains, while dreaming of a future
    pilgrimage to the historic streets of Bath, England, after saving up through part‑time babysitting.
  culinary: Betty Carter enjoys simple comfort cooking, frequently preparing grilled cheese sandwiches with tomato soup, experimenting with wildflower‑infused salads using dandelion greens and rose petals,
    and occasionally tackling homemade pasta carbonara when they feel adventurous.
  core: Betty Carter is a routine‑loving, solitary strategist who blends a love for mystery novels, model trains, and bird‑filled hikes into a disciplined yet quietly competitive outlook.
background:
  cultural: Betty was raised in Bakersfield, California, within a predominantly white, middle‑class community that values self‑reliance, practicality, and traditional family ties. Her upbringing reflects
    a blend of suburban life and the agricultural heritage of Kern County, where many families work in farming, oil, and related industries. Local cultural influences include country music, community sports,
    and a strong emphasis on routine and hard work. While her family maintains a modest, often faith‑centered household, Betty respects these traditions but also seeks her own structured path forward.
attributes:
  skills: '[''Time management'', ''Attention to detail'', ''Basic cooking'', ''Home organization'', ''Pet care'', ''Gardening'', ''Basic auto maintenance'', ''Strategic video gaming'', ''Puzzle solving'']'
  hobbies: '[''Reading mystery and historical fiction'', ''Journaling'', ''Hiking local trails'', ''Birdwatching'', ''Strategic video gaming'', ''Model kit building'']'
  career_goals: Betty plans to earn her high school equivalency (GED) within the next two years, then pursue a certification program at a local community college. She is drawn to stable, hands‑on careers
    and is considering either an automotive technology certificate to become a certified mechanic or a certified nursing assistant (CNA) program to work in healthcare. Her long‑term ambition is to secure
    a reliable, full‑time position that offers a clear routine, opportunities for skill advancement, and the chance to work independently or in a small, trusted team.
