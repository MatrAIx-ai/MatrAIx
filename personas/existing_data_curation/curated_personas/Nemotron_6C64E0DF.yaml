  hobbies: '[''LEGO building'', ''Chess'', ''Soccer'', ''Competitive video gaming'', ''Adventure reading'', ''School debate club'', ''Organizing playdates'']'
  career_goals: Laurence dreams of becoming a professional soccer player one day, while also hoping to win a national spelling bee. He enjoys building things and imagines working as a game developer or
    engineer, designing structured games that challenge others. In the long term he wants to attend a specialized STEM high school and eventually study computer science or mechanical engineering.
