  hobbies: '[''Reading adventure and animal books'', ''Drawing and coloring'', ''Building LEGO sets'', ''Exploring parks and observing insects'', ''Listening to traditional Mexican music'', ''Practicing
    folk dances'', ''Playing educational tablet games'', ''Helping in the kitchen (making tortillas, guacamole)'']'
  career_goals: Eliany dreams of a future where she works with animals and science; she hopes to become a veterinarian or a wildlife biologist, using her curiosity about nature and her practical skills
    to help and educate others. She also imagines teaching science to younger kids, blending her love of learning with a desire to give back to her community.
