personas:
  professional: Eliany Santiago is a budding young naturalist who blends their insatiable curiosity about animals with a methodical approach to building LEGO ecosystems, often leading classroom projects
    on habitats and organizing small displays for classmates.
  sports: Eliany Santiago delights in spending afternoons at the neighborhood Greenfield Park, where they jog lightly with the Greenfield Tigers youth soccer club on weekends, practice basic soccer drills,
    and often pause to observe insects, using a small notebook to document each find.
  arts: Eliany Santiago channels their love for animals into detailed sketches reminiscent of Beatrix Potter’s whimsical illustrations, while the lively folk melodies of the trio Los Cánticos de la Tierra
    echo through the kitchen as they and their cousins practice simple folk dances during family gatherings.
  travel: Eliany Santiago favors short family getaways to natural sites, recalling a memorable weekend at the nearby Riverbend Nature Reserve where they explored streams and collected smooth stones, and
    they dream of someday snorkeling at the Great Barrier Reef’s coral gardens.
  culinary: Eliany Santiago eagerly assists in the kitchen, perfecting the art of rolling fresh tortillas and mashing ripe avocados into creamy guacamole, delighting in the bright taste of lime and cilantro,
    and occasionally experiments by adding a pinch of cumin for extra flavor.
  core: Eliany Santiago is a quiet, curiosity‑driven eight‑year‑old who balances methodical LEGO building with spontaneous insect hunts, saving every spare coin for their next big set while humming folk
    tunes in the kitchen.
background:
  cultural: Eliany grows up in a Mexican-American household in Menifee, California. Spanish is spoken at home, and she celebrates cultural traditions such as Día de los Muertos, Las Posadas, and other Mexican
    holidays with family gatherings, food, and music. Her parents emphasize bilingualism, respect for elders, and community involvement. She participates in church events, enjoys Mexican cuisine like tacos
    and salsa, and engages with the broader multicultural environment of Riverside County.
