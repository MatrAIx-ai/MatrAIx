personas:
  professional: Amirah Riggs is a hospitality professional who excels at front‑of‑house operations, precise reservation management and barista work, and who seeks a floor‑manager role where they can embed
    routine‑driven processes while mentoring staff with a calm, assertive style.
  sports: Amirah Riggs enjoys tranquil early‑morning walks along the Englewood shoreline, participates in a local adult recreational soccer league that plays on Saturdays, follows the New York Giants and
    New York Knicks, and maintains a low‑impact fitness routine that includes gentle yoga and occasional Pilates to keep their back healthy.
  arts: Amirah Riggs immerses themselves in classic literature, regularly rereading Jane Austen and Leo Tolstoy, attends small‑group coffee‑tasting discussions that feature live acoustic sets by folk artists
    like Gillian Welch, and unwinds crocheting scarves while listening to Norah Jones and classical piano recordings.
  travel: Amirah Riggs prefers meticulously planned weekend getaways to historic small towns such as Williamsburg, VA and Port Townsend, WA, where they can explore colonial architecture, enjoy quiet coastal
    walks, and stay at boutique B&Bs that align with their love for routine, while budget constraints keep trips mostly domestic.
  culinary: Amirah Riggs is an avid home baker who perfects sourdough starter, lavender shortbread, and herb‑infused lemon chicken, relies on garden rosemary and thyme for flavor, and occasionally over‑bakes
    cookies because they lose track of time while humming classic Broadway tunes.
  core: Amirah Riggs blends a love for routine, modest hospitality leadership, and solitary creative pursuits, all while juggling a budget‑strict lifestyle, seasonal allergies, and a penchant for over‑baking.
background:
  cultural: Amirah was raised in a middle‑class white family in the American South, where Southern hospitality and practical values were emphasized. Attending a community college for her associate's degree,
    she was encouraged to develop reliable work habits and a straightforward approach to problem‑solving. Her cultural upbringing blends traditional modesty with a strong sense of community responsibility,
    influencing both her professional demeanor and her preference for intimate, familiar social settings.
