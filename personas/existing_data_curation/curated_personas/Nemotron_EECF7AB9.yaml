  career_goals: Kasey aims to move from her current clerk role into a senior planner position within the next two years, followed by a transition to an operations manager or supply‑chain manager role. She
    plans to earn an APICS CPIM certification and eventually a bachelor’s degree in supply‑chain management. Her long‑term ambition is to lead digital transformation projects that streamline production
    workflows and improve sustainability, while mentoring junior staff and fostering a collaborative, innovative workplace culture.
