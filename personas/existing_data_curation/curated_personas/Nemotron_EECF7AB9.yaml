personas:
  professional: A supply‑chain planner with a flair for creative problem‑solving, Kasey Hootman leverages deep SAP and Oracle expertise, lean process‑improvement tactics, and a knack for juggling cross‑functional
    teams to keep production schedules both tight and adaptable while still finding time for a lunchtime watercolor sketch.
  sports: An avid participant in community salsa‑dancing and Sunday yoga, Kasey Hootman also follows the Tampa Bay Rays, cheers for the Florida Gulf Coast Eagles during basketball season, and belongs to
    a local kayaking club that meets at Siesta Key each weekend.
  arts: A frequent gallery‑hopper and community theater enthusiast, Kasey Hootman admires the works of Monet and Frida Kahlo, regularly attends performances at the Asolo Repertory Theatre, and nurtures
    a personal watercolour practice inspired by the bright hues of Sarasota sunsets.
  travel: A sun‑loving explorer, Kasey Hootman has kayaked the Ten Thousand Islands, loved a culinary road trip through New Orleans' French Quarter, and dreams of studying the art scene of Florence while
    saving for a sustainable‑tourism retreat in Costa Rica.
  culinary: An experimental home cook who delights in mastering fresh‑caught grouper ceviche, key‑lime pie, and a saffron‑infused paella, Kasey Hootman blends Mediterranean flavors with Gulf Coast seafood,
    employing a modest skill level that balances confident improvisation with occasional burnt garlic mishaps.
  core: A 38‑year‑old production planner who blends analytical rigor with artistic curiosity, Kasey Hootman navigates spreadsheets, salsa steps, and sea breezes with equal enthusiasm, even if they sometimes
    forget to water their indoor herbs.
background:
  cultural: Kasey was raised in Central Florida in a middle‑class family of European (primarily Irish and German) descent. Growing up among the blend of Southern hospitality, coastal lifestyle, and the
    vibrant arts scene of nearby Sarasota, she developed a strong sense of community and an appreciation for cultural diversity. Her upbringing emphasized family togetherness, community service, and an
    openness to new ideas, which continue to shape her values and worldview today.
