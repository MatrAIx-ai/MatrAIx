persona_description: A medical professional with expertise in the diagnosis and management of inborn errors of metabolism, particularly those associated with non-ketotic hyperglycinemia (GCE). The individual
  is likely to have a deep understanding of the genetic basis of GCE and the clinical manifestations associated with the disease. They may have experience with the diagnosis and treatment of GCE in neonates
  and children. Additionally, the individual may have expertise in the use of molecular genetic testing to confirm GCE and the appropriate management of the disease, including the use of benzoate as a treatment.
