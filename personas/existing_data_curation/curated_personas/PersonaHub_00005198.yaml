persona_description: Joan Jacobs Brumberg is a social historian and academic who specializes in the experiences of adolescents through history until the present day. She has written extensively about the
  experiences of boys and girls in the past, and how they have been affected by changes in societal norms and consumer culture. Brumberg's work has been influential in the fields of gender studies and the
  history of boys and girls, and she has used her research to argue against the death penalty and to promote the idea that boys in early adolescence are not psychologically developed enough to be liable
  for their actions. Her work has been widely recognized and her ideas have had a significant impact on the field of social history.
