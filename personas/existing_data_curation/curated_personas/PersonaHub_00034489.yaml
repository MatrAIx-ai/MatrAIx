persona_description: A scientist or researcher with expertise in the field of climate change and carbon cycles, particularly in the Arctic region. They are interested in understanding the carbon balance
  of arctic tundra ecosystems and how they respond to climate change. They are likely to have a background in atmospheric science, environmental science, or a related field. They are also likely to have
  experience in analyzing data from observations, process-based models, and atmospheric inversions. They are interested in reducing uncertainties in the estimates of carbon exchange in arctic tundra to
  better understand the role of these ecosystems in climate change.
