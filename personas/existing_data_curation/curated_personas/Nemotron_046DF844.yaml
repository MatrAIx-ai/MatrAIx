  hobbies: '[''Cooking and experimenting with Creole recipes'', ''Gardening herbs and vegetables'', ''Attending live jazz concerts'', ''Volunteering at community festivals'', ''Reading New Orleans history'',
    ''Knitting'', ''Walking and street photography in the French Quarter and City Park'']'
  career_goals: Although she is currently not employed, Deanna aims to formalize her culinary passion by launching a modest home‑based catering service for neighborhood gatherings and small events. She
    also plans to complete her GED as a personal milestone and to expand her volunteer leadership, hoping to join the board of a local senior center or food‑bank organization where she can apply her event‑planning
    and budgeting expertise. Additionally, she wishes to secure a stable retirement by modestly investing in home improvements and building a small community garden that can serve as a legacy project for
    her neighborhood.
