personas:
  professional: Deanna Cox, a seasoned community organizer and aspiring home‑based caterer, blends meticulous budgeting and event‑planning expertise with a curiosity for modern culinary twists, channeling
    her practical, methodical mindset into launching a modest catering service while pursuing a GED and seeking a board seat at a local senior center.
  sports: Deanna Cox enjoys low‑impact fitness, regularly walking the historic French Quarter and joining the City Park Bird‑watchers’ walking club, while cheering on the New Orleans Saints during football
    season and the Pelicans in the NBA; they occasionally participate in a senior softball league with the Bayou Breeze team and practice gentle yoga at the community center.
  arts: Deanna Cox immerses herself in the city’s vibrant arts scene, regularly attending live jazz sets at Preservation Hall featuring artists like Wynton Marsalis and Trombone Shorty, savoring classic
    New Orleans blues from Dr. John, and collecting vintage postcards of the French Quarter while devouring local history narratives by author John Churchill Chase.
  travel: Deanna Cox favors relaxed, culturally rich road trips, meticulously planning itineraries in advance; she has explored the historic streets of Savannah, the music scene of Nashville, and the scenic
    Great River Road, and she dreams of a future pilgrimage to the French Riviera’s Nice to soak in Mediterranean markets while still budgeting for a modest garden retreat in the Bayou.
  culinary: Deanna Cox is a seasoned home chef who loves reimagining classic Creole dishes—her signature is a smoked crawfish étouffée with a hint of kaffir lime, a brisket‑infused jambalaya, and beignets
    dusted with organic cane sugar; she sources fresh herbs from her garden such as bay leaf, thyme, and basil, enjoys pairing meals with locally brewed Sazerac cocktails, and occasionally splurges on fine
    dining at Commander’s Palace for inspiration.
  core: Deanna Cox, a pragmatic yet curiosity‑driven 56‑year‑old, balances meticulous community service with a habit of hoarding grocery coupons and a stubborn refusal to turn off the radio during midnight
    garden work.
background:
  cultural: Deanna was raised in New Orleans as a member of the city’s longstanding white community, giving her a deep familiarity with the unique blend of French, Spanish, African‑American, and Caribbean
    influences that shape the region’s culture. She grew up attending a Catholic parish, celebrating traditions such as Mardi Gras, Jazz Fest, and local food markets, and she internalized the city’s emphasis
    on hospitality, music, and cuisine. Her upbringing instilled a respect for the city’s multicultural heritage while also grounding her in Southern values of independence, practicality, and community
    service.
