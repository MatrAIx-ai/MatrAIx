personas:
  professional: Donald Daniels, a seasoned expressive arts therapist, translates their vivid imagination and competitive drive into avant‑garde group workshops that fuse painting, poetry, and saxophone
    improvisation, while their spontaneous nature and aversion to rigid structure often lead to missed paperwork deadlines and last‑minute grant applications, and they frequently rely on creative shortcuts
    to meet deadlines.
  sports: Donald Daniels refreshes their spirit with weekend hikes through the Pine Barrens, belongs to the Camden County Trailblazers walking club, follows the Philadelphia Eagles and Phillies avidly,
    and they often choose solitary cardio over team sports, reflecting their reserved yet competitive streak.
  arts: Donald Daniels creates abstract mixed‑media canvases inspired by Mark Rothko and Jean‑Michel Basquiat, captures urban moments with a Leica M6, plays saxophone in a jazz combo interpreting John Coltrane
    and Miles Davis, writes poetry echoing the cadence of Langston Hughes, and routinely attends gallery openings that showcase experimental visual artists, feeding their restless imagination, and they
    often spend late nights in the studio experimenting with texture.
  travel: Donald Daniels prefers spur‑of‑the‑moment trips that ignite creative sparks, having wandered the jazz‑filled streets of New Orleans, strolled the art‑laden alleys of Montmartre in Paris, explored
    the rugged coastline of Cape Cod, and dreaming of an immersive cultural pilgrimage to Accra, Ghana, while keeping travel costs low by booking off‑season flights and staying in modest inns, and they
    carefully budget each adventure to stay within a modest travel allowance.
  culinary: Donald Daniels, an adventurous home cook, revels in simmering a richly spiced gumbo brimming with smoked sausage, okra, and Creole aromatics, perfects a miso‑glazed salmon with pickled ginger,
    and frequently experiments with bold flavor pairings like chili‑infused dark chocolate, though their habit of over‑seasoning dishes reflects a relentless quest for intensity, and they occasionally forget
    to clean the kitchen after cooking.
  core: Donald Daniels channels a restless imagination into healing art, yet they struggle with a scattered schedule, a skeptical edge, and late‑night jazz sessions that leave brilliance and unfinished
    grant proposals in equal measure.
background:
  cultural: Donald grew up in a close‑knit African-American family in the Camden County area, where storytelling, gospel music, and community activism were daily fixtures. His heritage—rooted in the traditions
    of the African diaspora and the resilience of urban Black neighborhoods—shapes his worldview and counseling approach. He draws on cultural motifs such as oral history, jazz improvisation, and visual
    symbolism to connect with clients, while remaining mindful of systemic challenges that affect Black communities in New Jersey.
attributes:
  skills: '["Expressive arts therapy", "Active listening", "Crisis intervention", "Small-group facilitation", "Psychotherapeutic assessment", "Case management", "Cultural competency", "Program development",
    "Grant writing", "Tele-therapy platforms", "Mentorship"]'
  hobbies: '["Painting", "Sketching", "Jazz saxophone", "Poetry writing", "Modern philosophy reading", "African-Diaspora literature", "Street photography", "Gallery visits", "Hiking"]'
  career_goals: Donald aims to become the director of a community mental-health center where he can institutionalize an arts-based counseling program for underserved Black youth. He seeks to earn board
    certification in expressive arts therapy, publish a book that explores the intersection of abstract thinking and psychotherapy, and become a sought-after speaker at national conferences on creative
    counseling. Ultimately, he envisions building a sustainable network of interdisciplinary practitioners that blend psychology, art, and cultural heritage.
