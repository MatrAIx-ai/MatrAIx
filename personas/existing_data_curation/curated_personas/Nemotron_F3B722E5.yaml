  career_goals: Orlando aims to obtain his Certified Public Accountant (CPA) license within the next year and leverage it to move into a senior audit manager role at his firm. Long‑term, he envisions transitioning
    to a CFO position at a growth‑stage technology company, where he can integrate sustainability reporting and data‑driven financial strategies. He also aspires to launch a boutique consultancy that serves
    Mexican‑American small businesses, offering culturally attuned accounting solutions and mentorship programs for aspiring accountants in his community.
