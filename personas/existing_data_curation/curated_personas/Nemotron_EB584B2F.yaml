personas:
  professional: Edwin Hernandez, an inquisitive preschool explorer who treats building‑block constructions like engineering projects, habitually arranges his toy cars in precise traffic patterns and insists
    on completing each "assignment" before moving on, revealing a competitive streak and a methodical mind.
  sports: Edwin Hernandez, a spirited member of the under‑5 soccer league who idolizes the city’s Thunderbirds, dribbles the ball with fierce competitiveness and proudly dons the team jersey, although he
    sometimes prefers building LEGO forts over a scheduled practice.
  arts: Edwin Hernandez, a budding creator who spends afternoons drawing vivid dinosaurs with Crayola markers, mimics classic Pixar melodies on his toy keyboard, and proudly hangs his paper‑cut galaxy collage
    in his bedroom, often demanding front‑row seats at storytime.
  travel: Edwin Hernandez, an eager traveler who loves family road trips to the nearby national park, collects pinecone souvenirs, dreams of riding the carousel at Disneyland, and meticulously packs a small
    flashlight and a crayon‑marked map for each adventure.
  culinary: Edwin Hernandez, a selective yet adventurous eater who relishes cheesy pizza slices and chicken nuggets, experiments with spreading avocado on toast for breakfast, and loves sprinkling cinnamon
    on sliced apples, though he habitually leaves a sticky trail of sauce on his shirt.
  core: Edwin Hernandez, a five‑year‑old detective of playtime who balances meticulous organization with boundless curiosity, a competitive spark, and occasional snack‑smearing mischief.
background:
  cultural: Edwin is raised in a Salvadoran immigrant family in Katy, Texas. At home, Spanish and English are spoken interchangeably, making him bilingual. His family celebrates Salvadoran traditions such
    as Dia de los Muertos, Christmas posadas, and enjoys dishes like pupusas and tamales during gatherings. He participates in community events at the local Salvadoran cultural centre, where he has learned
    traditional dances and songs. His upbringing blends Salvadoran values of family closeness, respect for elders, and communal celebration with the suburban Texan lifestyle, giving him a rich, multicultural
    perspective.
attributes:
  skills: '["basic reading", "early numeracy", "shape and colour identification", "drawing and colouring", "simple puzzle solving", "LEGO building", "organising toys", "following multi-step instructions"]'
  hobbies: '["drawing and colouring", "building with LEGO or blocks", "solving puzzles", "playing soccer", "exploring parks and nature", "listening to Salvadoran folk music", "reading picture books"]'
  career_goals: Although still young, Edwin loves to imagine his future. He often says he wants to become an astronaut so he can explore space and solve new challenges, and he also dreams of being an architect
    because he enjoys drawing buildings and arranging shapes. He is excited by friendly competition in soccer and hopes to be a champion player one day. His curiosity, appreciation for art, and organized
    mindset drive a strong desire to keep learning, creating, and achieving his imaginative goals.
