  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''LEGO and block building'', ''Playing at the park'', ''Riding a bicycle'', ''Exploring nature and lakes'', ''Beginner piano lessons'',
    ''Singing children’s songs'', ''Educational tablet games'']'
  career_goals: Kerrianne dreams of becoming a veterinarian because she loves caring for animals and wants to help them stay healthy. She also imagines herself as a teacher, sharing knowledge with other
    children, and as a scientist exploring nature and space. Her long‑term ambition is to keep learning, use her curiosity to solve real‑world problems, and contribute positively to her community in Minneapolis.
