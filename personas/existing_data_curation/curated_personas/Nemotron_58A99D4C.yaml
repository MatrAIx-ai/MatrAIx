personas:
  professional: Kerrianne Nichols is an aspiring junior architect in the making, channeling their love for building LEGO and wooden blocks into early design thinking while balancing curiosity with practicality
    in every imagined blueprint.
  sports: Kerrianne Nichols loves riding their small bicycle on neighborhood trails, swimming at the community pool, playing in the Springfield Sprouts beginner soccer league, and cheering for the local
    professional baseball team, the Chicago Cubs, while dreaming of one day stepping onto a major league field, and they relish the balance of joining group rides with quiet solo explorations.
  arts: Kerrianne Nichols immerses themselves in creative expression by coloring Dr. Seuss illustrations, drawing imaginative space scenes inspired by Pixar’s Wall‑E, and singing along to The Wiggles, Raffi,
    and Disney’s Frozen soundtrack, crafting a vibrant personal gallery that balances structure with free‑form imagination.
  travel: Kerrianne Nichols favors short family road trips to natural wonders like Lake Tahoe and Redwood National Park, packing a tiny backpack with crayons and snack‑sized fruit, yet they daydream about
    a future visit to the Kennedy Space Center to see rockets up close, combining their love of exploration with careful, parent‑guided planning.
  culinary: Kerrianne Nichols delights in strawberry‑banana smoothies, building mini cheese quesadillas, and assembling perfect peanut butter & jelly sandwiches, proudly earning a gold star for stirring
    pancake batter without spilling and opting for vegetable sticks as a healthy snack when they can.
  core: Kerrianne Nichols is a calm, endlessly curious six‑year‑old who balances building tiny worlds with big dreams, methodically saves their allowance, and quietly conquers each new adventure with a
    grin.
background:
  cultural: Kerrianne comes from a White American family living in Minneapolis, Anoka County, reflecting typical Midwestern values of community involvement, outdoor appreciation, and a strong emphasis on
    education. Her household observes seasonal traditions such as winter festivals and summer lake outings common in Minnesota. While primarily English‑speaking, her family acknowledges possible Scandinavian
    ancestry prevalent in the region, celebrating holidays like St. Lucia and incorporating simple cultural foods and customs into family life.
