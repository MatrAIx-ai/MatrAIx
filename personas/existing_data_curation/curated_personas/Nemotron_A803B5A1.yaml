  hobbies: '[''Church choir'', ''Quilting circle'', ''Gardening club'', ''Southern cooking and baking'', ''Recipe experimentation'', ''Reading historical fiction'', ''Genealogy research'', ''Family road
    trips'', ''Digital photography'', ''Volunteer work at food bank'']'
  career_goals: Although retired from formal work, Carla aims to deepen her impact within the Statesville community. She hopes to lead a senior‑citizen garden project that provides fresh produce to local
    food banks, expand the church’s outreach program for youth mentorship, and create a family‑recipe blog that preserves and shares Southern culinary traditions. On a personal level, Carla is committed
    to maintaining her emotional wellbeing by attending support groups, learning digital photography to capture family moments, and staying active enough to support her grandchildren’s activities and her
    husband’s health needs.
