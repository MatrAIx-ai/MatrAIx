personas:
  professional: Hyunjoo Feng works as a building maintenance technician in Greater Boston, deftly diagnosing electrical faults, performing HVAC filter changes, and soldering Raspberry Pi circuits for home‑automation
    fixes, while their mix of curiosity and practicality translates into cost‑savvy, sustainable solutions and clear communication with tenants and senior staff.
  sports: Hyunjoo Feng enjoys weekend hikes on the Blue Hills, follows the Boston Celtics and New England Patriots, plays casual pickup soccer at a community field, and holds a membership at a local climbing
    gym for occasional indoor wall sessions.
  arts: Hyunjoo Feng blends a love for Korean calligraphy with a passion for sci‑fi literature, regularly attends local art fairs featuring contemporary painter Hana Kim, streams BTS and BLACKPINK for musical
    inspiration, and hosts board‑game nights that showcase strategy titles like Terraforming Mars.
  travel: Hyunjoo Feng prefers short, budget‑friendly trips such as a weekend getaway to Portland, Maine, a road trip through the White Mountains, and a future dream to explore sustainable housing projects
    in Denmark, while also savoring past visits to Jeju Island for its volcanic landscapes.
  culinary: Hyunjoo Feng excels at preparing classic bibimbap and kimchi stew, experiments with Korean‑taco fusion using corn tortillas and gochujang, cultivates basil and mint on a balcony herb garden,
    and relishes a well‑balanced bowl of ramen topped with soft‑boiled egg and sautéed spinach.
  core: Hyunjoo Feng is a hands‑on maintenance specialist who balances eco‑focused ingenuity with a frugal, community‑oriented mindset, all while juggling a love for Korean flavors, sci‑fi reads, and weekend
    hikes.
background:
  cultural: 'Hyunjoo is a second‑generation Korean‑American raised in Wellesley Hills, Massachusetts. At home, Korean language and customs are a daily presence—she celebrates Chuseok and Lunar New Year
    with her family, enjoys kimchi‑making workshops, and respects the Confucian values of humility and harmony. Growing up in a diverse New England suburb, she blends these traditions with typical American
    experiences: attending public high school, participating in local sports, and embracing the region’s seasonal outdoor culture. Bilingual in English and Korean, she often bridges her two worlds by sharing
    Korean cuisine with friends, integrating Korean pop culture into her social circles, and maintaining close ties to her grandparents, whose guidance reinforces her considerate and cooperative nature.'
attributes:
  skills: '[''Electrical troubleshooting'', ''HVAC filter replacement and basic duct cleaning'', ''Plumbing leak repairs'', ''Carpentry and drywall patching'', ''Preventive maintenance scheduling via CMMS'',
    ''Inventory management for maintenance supplies'', ''Basic soldering and electronics repair'', ''Problem solving under time constraints'', ''Customer communication and service'', ''Energy‑efficient
    system awareness'']'
  hobbies: '[''DIY electronics projects'', ''Korean cooking and recipe experimentation'', ''Hiking local trails'', ''Urban balcony gardening'', ''Reading science fiction and tech articles'', ''Learning
    basic coding for smart home automation'', ''Playing board games with friends'', ''Practicing Korean calligraphy'', ''Listening to K‑Pop music'', ''Volunteer work at community garden'']'
  career_goals: Hyunjoo aims to become a certified HVAC technician and later a licensed electrician, with a special focus on sustainable building technologies. She plans to enroll in a community‑college
    apprenticeship program and pursue certifications in green‑building maintenance and energy‑efficiency retrofitting. In the next five years she hopes to transition into a supervisory role where she can
    mentor new trainees, design preventive‑maintenance protocols that reduce waste, and promote a collaborative, harmonious workplace. Long‑term, she dreams of launching her own small maintenance business
    that prioritizes eco‑friendly practices and serves the multicultural neighborhoods of Greater Boston, allowing her to blend practical expertise with her desire to give back to her community.
