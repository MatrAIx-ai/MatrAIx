persona_description: A renowned Nepalese artist who specializes in the creation of paper manuscripts, especially Thanka / Thangka paintings. His works have been influential in spreading Nepalese art and
  culture beyond the borders of Nepal, particularly in Tibet and China during the thirteenth century. He is known for his innovative and artistic approach to the creation of these paintings, which incorporate
  various aspects of Shiva and Shakti, as well as the Tantric cult. His works are highly sought after and are considered masterpieces of the art form.
