  hobbies: '[''Organic Gardening'', ''Woodworking'', ''Bridge (Card Game)'', ''Community Theater Volunteering'', ''Birdwatching'', ''Historical Photography'', ''Reading Art Biographies'', ''Visiting Art
    Galleries'', ''Walking Tours of Historic Sites'']'
  career_goals: Although retired, John aspires to continue making a meaningful impact in his community. He aims to expand the Jonesboro Historical Society's annual exhibition, integrate more interactive
    storytelling using his photography, and establish a mentorship program linking senior artisans with local high‑school students. He also hopes to travel to regional art museums to deepen his appreciation
    for modern art and to attend workshops that blend traditional crafts with contemporary design, keeping his curiosity alive.
