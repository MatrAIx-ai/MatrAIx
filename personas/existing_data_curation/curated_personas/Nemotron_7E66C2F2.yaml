personas:
  professional: Johnny Crawford, a veteran mason with over 20 years perfecting brick, block and stone work, channels his curiosity for visual arts into meticulous historic restorations across Houston, leading
    small crews with an artistic eye while navigating a relaxed, sometimes disorganized approach that fuels both creative improvisation and occasional project delays.
  sports: Johnny Crawford, a regular at his neighborhood community center, shoots hoops on pick-up games with the East End Hoopers while cheering on the Houston Rockets and Houston Astros, using basketball
    as a stress outlet and a way to stay fit despite a demanding physically-intensive trade.
  arts: Johnny Crawford, an avid visitor to the Museum of Fine Arts and the African American Museum, sketches architectural details for stonework inspiration, captures historic Houston facades through urban
    photography, and immerses himself in the sounds of Miles Davis, B.B. King and Aretha Franklin on vinyl, often spending evenings at the Cactus Café to fuel his creative spirit.
  travel: Johnny Crawford, who prefers weekend road trips to Austin’s music scene, New Orleans’ jazz heritage, and historic Southern towns like Charleston and Savannah for their preservation lessons, dreams
    of an extended study tour of Italy’s marble workshops, balancing travel ambitions with a modest family budget and the occasional work-site call.
  culinary: Johnny Crawford, an enthusiastic home cook, whips up Southern soul-food classics such as fried chicken, collard greens, and jambalaya using smoked paprika and cayenne, often perfecting recipes
    while the house fills with the scent of garlic-butter cornbread, though his woodworking projects sometimes distract him and leave the kitchen a mess.
  core: Johnny Crawford fuses an artisan’s precision with a restless curiosity, juggling historic masonry, jazz vinyl, and soulful cooking, all while battling anxiety-driven disarray that fuels both his
    creative spark and his need for structured financial security.
background:
  cultural: Johnny grew up in Houston’s historically Black Third Ward, a vibrant working‑class neighborhood where church, family, and neighborhood ties shaped his identity. He was raised with the traditions
    of Southern African‑American culture—gospel music, storytelling, soul‑food cooking, and community festivals like Juneteenth. The strong sense of solidarity and collective responsibility in his community
    instilled in him a cooperative spirit and a deep appreciation for the cultural legacy of African‑American artisans. His background informs both his craftsmanship, which honors the durability of historic
    Black neighborhoods, and his desire to give back through mentorship and community‑center projects.
