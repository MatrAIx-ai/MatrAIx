  career_goals: Johnny aims to transform his decades of trade experience into a small, community-focused masonry business that specializes in historic preservation and artistic stone installations in Houston’s
    older neighborhoods. He plans to earn a certified mason contractor license, master ornamental carving techniques, and hire apprentices from local vocational programs to give back to his community. In
    the long term he dreams of completing a flagship restoration project—a renovated cultural center that showcases African-American heritage—while achieving financial stability that eases his anxiety and
    allows him more flexibility for personal pursuits.
