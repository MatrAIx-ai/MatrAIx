  hobbies: '[''Volunteer work at local food bank'', ''Women’s book club'', ''Church potluck organizer'', ''Family hiking trips'', ''Nature photography'', ''Weekly dance‑cardio fitness class'', ''Community
    theater participation'']'
  career_goals: Tanya aims to transition from frontline supervision to a senior office manager role within the next three years, where she can shape broader operational strategies and mentor a larger team.
    She is interested in developing a mentorship program for junior administrative staff to foster career growth and retain talent. Long‑term, she envisions opening a small consulting boutique that helps
    regional nonprofits streamline their administrative processes, allowing her to leverage her business education while giving back to the community.
