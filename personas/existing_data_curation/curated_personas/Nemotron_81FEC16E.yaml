personas:
  professional: David Lee is a curious three‑year‑old who treats every preschool activity like a professional project, using their natural balance of organization and flexibility to line up blocks precisely
    while also improvising whimsical structures.
  sports: David Lee is a budding little athlete who delights in Saturday morning toddler soccer sessions at the local community center, proudly cheering for the Chicago Cubs while also mastering the monkey
    bars at the neighborhood playground.
  arts: David Lee is an appreciative tiny art lover who spends hours with finger paints, humming along to the whimsical scores of Disney movies like "Frozen" and confidently singing the chorus of "Let It
    Go," reflecting an openness to unconventional ideas.
  travel: David Lee enjoys family road trips, especially the annual visit to the Grand Canyon where they marvel at the vast vistas, and dreams of exploring Tokyo’s neon districts after watching a cartoon
    set there, balancing a love for adventure with a need for familiar bedtime routines.
  culinary: David Lee delights in buttery macaroni and cheese, crispy chicken nuggets, and fresh strawberry slices, often insisting on stirring the pot with a wooden spoon while occasionally rejecting broccoli,
    showcasing both budding cooking curiosity and a picky palate.
  core: David Lee is a curious, organized yet flexible three‑year‑old who balances whimsical creativity with routine, occasionally scattering crayons across the floor but always discovering new colors.
background:
  cultural: David is a white child raised in Bristol, Virginia, a small city in the Appalachian-influenced South. His family's cultural roots are largely Anglo-American, with traditions that include attending
    local community events, church gatherings, and seasonal festivals such as fall harvest fairs. He is exposed to Southern hospitality, polite interaction, and a strong sense of community support. The
    region's emphasis on storytelling, folk music, and appreciation of nature is reflected in his early interests in books, music, and outdoor exploration. His upbringing blends a modest, family-centered
    environment with the modest cultural richness of a small Southern town.
