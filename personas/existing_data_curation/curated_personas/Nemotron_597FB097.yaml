personas:
  professional: Jacob Riggs, an experienced plumber‑pipefitter with two decades of welding, blueprint reading, and crew‑management expertise, channels his structured, practical mindset into flawless pipe
    installations and safety compliance, while his outgoing nature makes him the go‑to mentor for apprentices and a trusted liaison for commercial clients as he works toward a master plumber license and
    a future foreman role.
  sports: Jacob Riggs spends weekday evenings tossing pitches in the Long Island North Softball League, roots for the New York Mets every summer, and allocates weekend mornings to bay fishing, maintaining
    a disciplined yet relaxed fitness routine that blends competitive camaraderie with the tranquility of angling.
  arts: Jacob Riggs, a woodworking enthusiast, finds artistic inspiration in the craftsmanship of American folk artist Wharton Esherick and the gritty storytelling of Bruce Springsteen, often listening
    to Springsteen’s “Born to Run” while shaping oak tables, and occasionally attending local community theater productions of classic plays.
  travel: Jacob Riggs prefers meticulously planned road trips in his restored 1965 Chevrolet, favoring coastal getaways like the Hamptons and fishing lodges in the Adirondacks, while also day‑dreaming about
    a future foray to Charleston’s historic waterfront and the rugged beauty of the Pacific Northwest, balancing family obligations with an eagerness for waterfront relaxation.
  culinary: Jacob Riggs, a self‑described backyard grill master, excels at smoking brisket with a rub of smoked paprika and brown sugar, grilling corn on the cob brushed with herb butter, and whipping up
    a creamy New England clam chowder after each fishing outing, though they often leave a trail of charcoal dust and unfinished cleanup around the patio.
  core: Jacob Riggs blends a hands‑on tradesman's precision with a neighborly, bar‑becuing spirit, always juggling pipe blueprints and fishing lures while secretly hoarding vintage car manuals and occasionally
    forgetting to turn off the grill.
background:
  cultural: Jacob grew up in Hempstead, a suburban community in Nassau County with a strong working-class heritage. Raised in a white, middle-class family that valued hard work, loyalty, and helping neighbors,
    he left school early to pursue a trade apprenticeship, following the local tradition of skilled-trade careers. The community’s emphasis on union solidarity, practical problem solving, and close-knit
    social networks shaped his cooperative nature and respect for structured, reliable work practices. His cultural upbringing blends the suburban Long Island ethos of modesty, community involvement, and
    a straightforward, no-nonsense approach to life.
attributes:
  skills: '[''Pipe installation and repair'', ''Welding and brazing'', ''Blueprint interpretation'', ''NY State building code compliance'', ''System troubleshooting'', ''Preventive maintenance'', ''Safety
