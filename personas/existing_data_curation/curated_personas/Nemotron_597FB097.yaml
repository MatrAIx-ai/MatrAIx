  hobbies: '[''Softball league'', ''Fishing'', ''Barbecue cooking'', ''Woodworking'', ''Classic car restoration'', ''Volunteering at community events'', ''Watching baseball'', ''Poker nights with friends'']'
  career_goals: Jacob aims to obtain his master plumber license within the next two years and transition into a foreman or site supervisor role, overseeing multiple crews on large commercial projects. He
    plans to establish his own small contracting business focused on reliable, high-quality plumbing and steam-fitting services in Nassau County, incorporating energy-efficient technologies and green building
    practices. Additionally, he hopes to serve as a union steward, advocating for safe work conditions and mentoring the next generation of tradespeople, while building a stable financial foundation for
    his retirement.
