  hobbies: '[''Cooking traditional Guatemalan dishes'', ''Playing recreational soccer'', ''Dancing to marimba and salsa music'', ''Volunteer tutoring at community center'', ''Hiking coastal trails'', ''Home
    gardening'', ''Organizing community potluck events'']'
  career_goals: Itati is focused on advancing from EMT to certified Paramedic within the next two years, with the long‑term ambition of moving into an EMS Shift Supervisor role. She aims to spearhead a
    community first‑aid program tailored to Guatemalan families in Long Beach, integrate culturally competent disaster response training for local volunteers, and ultimately earn a bachelor’s degree in
    Emergency Management to broaden her impact on regional emergency preparedness.
