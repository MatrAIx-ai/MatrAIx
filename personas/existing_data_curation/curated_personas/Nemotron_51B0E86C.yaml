personas:
  professional: Itati Garcia is a veteran Emergency Medical Technician in Long Beach who leverages two decades of front‑line trauma triage experience, bilingual communication, and a methodical, competition‑driven
    approach to mentor new EMTs, coordinate incident command, and streamline patient handoffs while meticulously planning each shift to meet their goal of becoming a certified Paramedic.
  sports: Itati Garcia plays competitively in a co‑ed soccer league, cheers for the LA Galaxy and the Los Angeles Dodgers, hikes the coastal trails of Long Beach with their family on weekends, and maintains
    a disciplined fitness routine that balances team practice with personal conditioning while fostering friendly rivalry with teammates.
  arts: Itati Garcia attends weekly marimba nights featuring groups like Los Lobos de la Marimba, dances salsa to the rhythms of Celia Cruz and Marc Anthony, and enjoys performances by the local theater
    troupe Teatro Norte, letting music and movement infuse their community events with cultural flair.
  travel: Itati Garcia plans their trips with the same precision they apply to emergency response, favoring organized itineraries that combine family visits to historic colonial towns in Central America,
    weekend getaways to Yosemite and Santa Barbara, and occasional solo road trips along the Pacific Coast Highway, always budgeting carefully and using travel apps to book accommodations.
  culinary: Itati Garcia is an adept home cook who hosts potluck gatherings featuring traditional dishes from their ancestral homeland such as pepian, tamales de elote, and chiles rellenos, seasoning them
    with cilantro, oregano, and epazote harvested from their meticulously tended garden while balancing a love for spicy street‑food flavors with a pragmatic approach to meal planning.
  core: Itati Garcia blends disciplined, competitive professionalism with a vibrant social spirit, channeling their love for community, organized planning, and occasional indulgence in late‑night potluck
    cooking into a life that balances emergency care, family, and cultural celebration.
background:
  cultural: Itati was born in Guatemala and migrated to Southern California as a child, retaining strong ties to her heritage. She is fluent in Spanish, celebrates Semana Santa, Día de los Muertos, and
    other Guatemalan holidays with her extended family, and actively participates in the local Guatemalan cultural association in Long Beach. Her upbringing instilled values of family loyalty, hard work,
    and community solidarity, which she weaves into both her professional ethos and personal life.
attributes:
  skills: '[''Emergency medical assessment'', ''Advanced Cardiac Life Support (ACLS)'', ''Pediatric Advanced Life Support (PALS)'', ''Trauma triage'', ''Incident Command System (ICS) coordination'', ''Medical
