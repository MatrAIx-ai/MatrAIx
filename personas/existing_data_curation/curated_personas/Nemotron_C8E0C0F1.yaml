    ''Reading historical fiction'', ''Attending community theater'', ''Yoga practice'']'
  career_goals: Although retired from formal employment, April aims to leave a lasting imprint on her community by spearheading a multi‑generational arts program that partners the Stoughton Historical Society
    with local schools. She aspires to secure a small grant to fund traveling exhibitions of senior‑created artwork, thereby raising the profile of older artists. A personal ambition is to complete a comprehensive
    family genealogy manuscript for future generations, integrating digital archiving techniques she continues to master. She also seeks to attain a volunteer docent certification at the nearby museum,
    delivering high‑standard tours that blend historical insight with artistic perspective. Ultimately, April wishes to be recognized as a catalyst for lifelong learning and cultural enrichment within her
    town.
