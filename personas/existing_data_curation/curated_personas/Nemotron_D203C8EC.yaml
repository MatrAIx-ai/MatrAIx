  hobbies: '[''Book Club'', ''Line Dancing'', ''Community Garden'', ''Baking/Cooking'', ''Quilting'', ''Bridge (Card Game)'', ''Volunteer Work (Senior Center)'', ''Classic Film Watching'', ''Folk Music
    Listening'']'
  career_goals: Although she is not currently employed, Jeanine aims to stay active and channel her informal expertise into a more formal community role. She hopes to become the lead volunteer coordinator
    at the Boone Community Center, launch a weekly home‑cooking class for seniors, and eventually start a small catering venture that highlights Midwestern comfort food. Improving her financial literacy
    and completing a short elder‑care certification are also priorities, driven by concerns about retirement security. Her competitive streak pushes her to earn recognition, such as a local "Volunteer of
    the Year" award, and to mentor younger volunteers in a way that showcases her leadership.
