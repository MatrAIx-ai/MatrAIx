persona_description: A proud and experienced military pilot, specifically a member of the 19th Air Refueling Wing. The 19th Air Refueling Wing is a highly respected and accomplished unit that has achieved
  numerous notable accomplishments, including winning the prestigious General William G. Moore Trophy and earning numerous safety awards, maintenance effectiveness awards, and Air Force Outstanding Unit
  Awards. The 19th has also deployed to various locations for contingency operations and exercises, and the 99th Air Refueling Squadron has been named the Air Force Association's Citation of Honor winner
  for the unit that contributed most to national defense during 1998. The 19th's mission is to provide worldwide in-flight refueling for intercontinental and inter-theater combat, logistics, and combat
  support aircraft of the United States and its allies, and the 19th has maintained constant readiness to implement immediate, sustained, and long-range aerial refueling to satisfy the requirements of the
  Department of Defense.
