  career_goals: Although retired from formal employment, Sandra aims to leave a lasting personal legacy. She plans to compile a memoir that weaves together her family history, local Jacksonville anecdotes,
    and reflections on the social changes she has witnessed. She also aspires to mentor younger volunteers at the senior center, sharing her organizational experience and encouraging practical community
    involvement. Learning digital photography to document her garden and the natural life around her is a current ambition, as is completing a certification in basic genealogical research to deepen her
    understanding of her ancestry. These goals reflect her balance of curiosity, practicality, and a desire to contribute quietly yet meaningfully.
