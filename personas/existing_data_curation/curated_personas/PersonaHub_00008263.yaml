persona_description: A scientist who specializes in studying the impact of climate change on forests and the environment. They have conducted research on the relationship between drought and forest fires,
  and have used satellite data to analyze the effects of mega-droughts on the Southwest. They are also interested in the potential for small trees to adapt to drier climates and the potential for fossilized
  forests to be revitalized by climate change. They have conducted research on the effects of climate change on maple syrup production and the potential for genetic modification of trees to be more suitable
  for drier climates.
