  hobbies: '[''Visiting art galleries and museums'', ''Traditional cooking and recipe development'', ''Gardening'', ''Knitting and crocheting'', ''Tai chi'', ''Attending community cultural festivals'',
    ''Reading historical and contemporary literature'', ''Volunteering at senior centers'', ''Photography'']'
  career_goals: Though retired from formal employment, Lay Cu Vo aspires to remain an active cultural ambassador in Dallas. She hopes to lead a series of intergenerational workshops that teach traditional
    crafts and cooking, collaborate with the local museum as a volunteer guide focusing on Asian art, and launch a modest community garden that provides fresh produce for seniors. She also wishes to document
    her family's migration story in a memoir and learn digital photography to capture everyday moments, all while maintaining her health and managing stress through regular tai chi practice.
