persona_description: A renowned and controversial artist who became a household name within his own lifetime as the most influential and controversial artist of the 20th Century. His art style, which includes
  cubism, expressionism, and surrealism, has had a significant impact on the art world. He was a bitter opponent of the Franco Nationalist regime and never returned to Spain until the Republic was restored.
  His art collection, which includes works from his 'blue period,' 'harlequin period,' and 'rose period,' as well as his contributions to the cubist movement, has left a lasting impact on the art world.
  His artwork has been exhibited in galleries and museums around the world, and he has been awarded numerous accolades for his contributions to the art world.
