persona_description: An American navigator, bookseller, chartmaker, and cartographer who specialized in nautical charts and maps, particularly those related to the American Civil War. Blunt was born in
  Portsmouth, New Hampshire in 1770, and published The American Coast Pilot, one of the most important published works on American navigation. His work was influenced by Captain Lawrence Furlong, and he
  published 21 subsequent editions of the Coast Pilot, each with important updates. Blunt's work was highly sought after, and he was likely to have been a valuable asset to the Union during the American
  Civil War.
