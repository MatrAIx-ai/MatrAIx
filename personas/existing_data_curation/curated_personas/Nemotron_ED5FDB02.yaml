  career_goals: Bruce aims to advance into a senior leadership role, such as Regional Director of Advertising Sales, where he can shape data‑driven sales strategies across multiple markets. He seeks to
    expand his portfolio of high‑value agency and brand clients, champion the adoption of emerging ad‑tech, and build a mentorship program for newer sales professionals. Long‑term, he envisions launching
    a boutique consulting firm that helps midsize companies optimize their advertising spend with a blend of analytical rigor and practical insight.
