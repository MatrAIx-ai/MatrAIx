persona_description: 'A nuclear physicist who specializes in the study of nuclear magnetic moments, particularly in the development of theoretical models and the identification of common goals to deepen
  understanding of nuclear structure. He/she is actively contributing to the special issue on "Nuclear magnetic moments and related topics" and has been invited to contribute to this special topic by the
  SCIENCE CHINA: Physics, Mechanics & Astronomy editorial board. The persona is likely to be familiar with advanced shell models, self-consistent mean-field theories, and the physics mechanism behind the
  under-lying physics of nuclear magnetic moments. He/she is also interested in the recent development of closely related subjects including nuclear pairing, quantum phase transitions, and nuclear masses
  in microscopic models.'
