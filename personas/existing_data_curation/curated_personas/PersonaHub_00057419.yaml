persona_description: A researcher and scientist who specializes in paleo-genetics and paleo-biology, particularly focusing on the study of viruses and their impact on the evolution of life on Earth. Marco
  Coolen is a researcher at the Woods Hole Oceanographic Institution in Massachusetts, and his work focuses on using genetic signatures preserved in rocks and sediments to tell us about what was alive at
  different time periods. He has published several papers in the journal Science on the 7000 years of Ehux viruses in the Black Sea. Marco and his student Cherel Balkema have been serving as a rapid response
  team on the Knorr, collecting samples and helping other people with their work. He is also interested in fecal pellets and has a new interest in them. Marco and Cherel have been collecting samples and
  helping other people with their work. They have a unique perspective on the oddities of Americans and the way they communicate with each other.
