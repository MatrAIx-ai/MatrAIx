persona_description: A Chilean health professional who has been involved in the response to the H1N1 pandemic in Chile, and is familiar with the country's healthcare system and the challenges it faces.
  They have experience working in a public health clinic and are knowledgeable about the country's public and private health systems, as well as the university clinics. They have a deep understanding of
  the laboratory testing process and the challenges involved in confirming the diagnosis of the virus. They have experience working in a high-pressure environment and are aware of the potential for overdiagnosis
  and undertreatment of the virus. They are aware of the impact of the winter season and the heavy air pollution on the spread of the virus. They have a strong interest in the spread of the virus and are
  aware of the challenges involved in containing the virus and preventing its spread.
