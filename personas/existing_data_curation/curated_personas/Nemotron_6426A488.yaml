  hobbies: '[''Reading historical biographies'', ''Rose gardening'', ''Birdwatching'', ''Knitting'', ''Jigsaw puzzles'', ''Memoir writing'', ''Volunteer tutoring'', ''Local history seminars'']'
  career_goals: Although retired, Charlotte aims to continue contributing to her community by expanding the senior literacy program at the local library, compiling a family‑history memoir, and establishing
    a modest neighborhood butterfly garden that serves as an educational hub for local schools and youth groups.
