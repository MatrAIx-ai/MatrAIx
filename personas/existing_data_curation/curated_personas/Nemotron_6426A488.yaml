personas:
  professional: Charlotte Phelan, a retired elementary educator with decades of curriculum development, differentiated instruction, and community outreach expertise, now volunteers at the local library
    where they blend meticulous organization with a curiosity‑driven flexibility to expand senior literacy programs, and they assertively champion resources while maintaining a cooperative spirit.
  sports: Charlotte Phelan, an avid supporter of the Atlanta Braves and the New Orleans Pelicans, stays active through gentle morning walks with the local senior walking club, weekly tai chi classes at
    the community center, and occasional bird‑watching hikes in the nearby nature reserve, treating fitness as a low‑impact complement to her gardening routine.
  arts: Charlotte Phelan, a devoted reader of Southern literature and admirer of Maya Angelou’s poetry, finds inspiration in the soulful blues of Etta James, the sweeping orchestral works of Aaron Copland,
    and the classic crooning of Frank Sinatra, often knitting intricate sweaters while humming "Fly Me to the Moon" and attending local historical seminars that feature performances by the community theater
    troupe.
  travel: Charlotte Phelan, whose travel preferences favor well‑planned, low‑stress itineraries, has revisited the historic streets of Savannah, Georgia, taken a leisurely river cruise along the Mississippi
    Delta, and explored the colonial charm of Williamsburg, Virginia, while dreaming of a tranquil garden‑focused retreat in Kyoto, Japan, to study traditional horticulture.
  culinary: Charlotte Phelan, an accomplished home cook, cherishes Southern comfort foods like shrimp and grits seasoned with fresh garden herbs, perfects a flaky peach cobbler topped with cinnamon, brews
    a soothing pot of Earl Grey tea, and though they often forget to turn off the stove after simmering her beloved tomato‑basil soup, they delight in sharing these dishes with neighbors during informal
    tea parties.
  core: Charlotte Phelan is a solitary, curiosity‑driven septuagenarian who merges her lifelong teaching passion with community literacy, tends a meticulous rose garden while occasionally neglecting watering,
    balances frugality with a soft spot for vintage biographies, and embraces quiet study over social bustle.
background:
  cultural: Charlotte was raised in a middle‑class, white, Southern family in Baton Rouge. Her parents were both educators with Irish‑American roots, and she grew up with the rhythms of Catholic/Methodist
    traditions common to the area. She experienced the cultural tapestry of Louisiana, including French‑influenced cuisine, Mardi Gras celebrations, and a deep respect for community and hospitality, which
    shaped her values of practicality, curiosity, and modest independence.
