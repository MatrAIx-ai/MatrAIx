persona_description: A physicist and professor at Calvin College, Dr. Loren Haarsma, who is known for his expertise in reconciling science and biblical faith. He is an advocate for the compatibility of
  Christianity and evolution, and his talk at the conference of Christian Reformed Church leaders was focused on this topic. Haarsma's work has been featured in a blog post from the Emeritus Director of
  the Faraday Institute for Science and Religion, titled "How Are Christianity and Evolution Compatible?" He is a respected authority on the topic of reconciling science and faith, and his insights are
  likely to be sought out by those interested in this area.
