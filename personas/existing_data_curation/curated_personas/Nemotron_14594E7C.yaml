  hobbies: '["Hiking","Mountain Biking","Fishing","Recreational Soccer","Volunteer Safety Demonstrator","Live Music at Local Breweries","Model Airplane Building","Mindfulness Meditation"]'
  career_goals: Earl aims to move into a lead crane supervisor role within the next three years, overseeing multiple crews and ensuring rigorous safety standards. He plans to acquire advanced certifications
    such as the NCCCO Tower Crane Operator credential and a Project Management Professional (PMP) certification to broaden his leadership scope. In the longer term, Earl hopes to transition into equipment
    fleet management or launch his own crane rental business that prioritizes safety training and community employment. He also seeks a more predictable work schedule that reduces stress while providing
    stable, reliable income.
