  hobbies: '[''Landscape photography'', ''Watercolor sketching'', ''Reading speculative fiction and philosophy'', ''Writing travel memoirs'', ''Model truck building'', ''Woodworking'', ''Stargazing'', ''Listening
    to classical and ambient music'']'
  career_goals: Roger aims to transition to an independent owner‑operator business, acquiring his own tractor‑trailer to provide niche logistics services for local farms and agribusinesses. Over the next
    few years he intends to develop a mentorship program for new drivers, offer consulting on route efficiency, and compile a memoir that blends his travel photography with reflective essays on the prairie
    landscape. Ultimately, he seeks a sustainable retirement that still allows occasional deliveries and the freedom to explore remote areas for artistic inspiration.
