  career_goals: Michelle’s ambitions are less about formal career advancement and more about personal fulfillment, community contribution, and leaving a lasting record of her life. She aims to complete
    a detailed written memoir that weaves together her family’s story and local history, using her genealogy research to enrich it. She wants to master her tablet so she can join a virtual book club and
    teach younger volunteers how to use digital tools, bridging the generation gap. Over the next few years she hopes to expand her garden to include a small herb plot for cooking classes at the community
    center. She also aspires to organize a senior bridge tournament, using her competitive enthusiasm to foster social connection while maintaining a structured, fair‑play environment. Finally, she seeks
    to reinforce her emotional well‑being by practicing mindfulness journaling and attending a weekly support group for seniors dealing with anxiety.
