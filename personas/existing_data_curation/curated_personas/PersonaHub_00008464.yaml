persona_description: A historian and literary scholar who specializes in the study of working-class literary cultures in the long Victorian period in terms of both profession and location. Her research
  focuses on uncovering the poems, songs, periodical and newspaper writings and other prose writings (including autobiography and biography) of workers in Scotland and the North of England, and on tracing
  a history of reading through borrowers’ records, and studying records of 'literary' associations linked to specific workplaces or operating in their vicinity. Her interdisciplinary focus on the history
  of reading, the history of associational culture, and the literary analysis of workers’ writings makes her a valuable contributor to the study of working-class culture, history, and literature. Her goal
  is to create public awareness of this neglected aspect of industrial heritage and to foster fruitful discussions between institutions and individuals in the heritage sector in Scotland and the North of
  England about the status and significance of literary cultures in Britain's industrial past.
