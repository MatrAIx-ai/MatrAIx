  career_goals: Looking ahead, Marlaina aims to formalize her logistics knowledge by completing an OSHA forklift certification and pursuing a Lean Six Sigma Yellow Belt to understand process improvement.
    She aspires to move into a supervisory or logistics coordinator role where she can blend her knack for creative problem solving with team leadership. Long‑term, she dreams of opening a community art‑and‑craft
    hub that also offers affordable storage and shipping services for local artists, allowing her to merge her appreciation for art with her material‑moving expertise.
