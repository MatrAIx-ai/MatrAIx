  career_goals: Eric aims to advance into a senior strategic analyst or operations manager role where he can shape long‑term business strategy using data‑driven insights. He plans to earn a Six Sigma Black
    Belt and a project‑management certification (PMP) to formalize his process‑improvement expertise, and is considering a part‑time master’s program in Business Analytics to deepen his predictive‑modeling
    skills. While seeking greater influence over organizational decisions, he wants to preserve a flexible schedule that supports his family life and personal well‑being. He also hopes to mentor junior
    analysts, fostering a supportive, low‑stress work environment that values collaboration and clear, predictable processes.
