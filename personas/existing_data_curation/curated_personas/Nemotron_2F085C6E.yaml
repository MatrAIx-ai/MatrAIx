personas:
  professional: Christina Caton, a retired community arts advocate, channels her sharp eye for antiques, strategic bridge mindset, and love of flexible schedules into curating local exhibitions, guiding
    senior volunteers, and documenting the town’s history through digital photography.
  sports: Christina Caton enjoys leisurely walks along the coast, participates in a senior bowling league at the community center, follows the Boston Red Sox and the New England Patriots with fervor, and
    attends weekly water‑aerobics classes, balancing gentle activity with a competitive streak during bridge tournaments.
  arts: Christina Caton frequents the local theatre to see productions like "Our Town," attends folk concerts featuring artists such as Joan Baez and contemporary regional troubadours, meticulously curates
    a personal collection of New England landscape paintings, and channels their love of texture into quilting and creating scarves inspired by gallery exhibits.
  travel: Christina Caton savors day trips to historic Cape Cod towns, annual pilgrimages to Newport’s Gilded Age mansions, and a memorable week‑long cruise to Bermuda, planning each outing with senior
    discounts and a flexible itinerary that allows for spontaneous stops at seaside art fairs.
  culinary: Christina Caton delights in preparing classic New England dishes like clam chowder, lobster rolls with garden‑grown herbs, and apple‑cinnamon crumble, experimenting with heirloom tomatoes from
    their garden, and possesses a confident intermediate skill level that blends tradition with occasional inventive twists.
  core: Christina Caton is a curious, art‑loving septuagenarian who balances competitive bridge drives with tranquil garden walks, while occasionally letting disorganization peek through their otherwise
    diligent volunteer spirit.
background:
  cultural: Christina is a lifelong resident of Westerly, Rhode Island, descended from Irish and English ancestors who settled in New England in the early 1900s. Raised in a Catholic household, she attended
    a local parochial school and grew up steeped in maritime traditions, including clambakes, lighthouse visits, and the annual Watch Hill Summer Fair. Her cultural identity blends the modest, self‑reliant
    ethos of older Rhode Island families with a love for regional arts, history, and community service.
attributes:
  skills: '["Art appraisal and appreciation", "Basic computer and internet research", "Genealogy research", "Gardening", "New England cooking", "Knitting and quilting", "Volunteer coordination", "Bridge
