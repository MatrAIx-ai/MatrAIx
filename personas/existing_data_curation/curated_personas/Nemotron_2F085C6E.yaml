  hobbies: '["Visiting art galleries", "Gardening", "New England cooking", "Knitting and quilting", "Genealogy research", "Bridge (card game)", "Trivia nights", "Local theater and folk music", "Documentary
    watching", "Community volunteering"]'
  career_goals: Although retired, Christina aims to deepen her involvement in the arts and community. She hopes to become a volunteer docent at the local historical society, curate a community art exhibition
    showcasing regional artists, complete a comprehensive family genealogy book, and master digital photography to document her garden and local landscapes. She also wishes to mentor younger volunteers
    in bridge clubs and lead a senior-friendly art‑craft workshop series.
