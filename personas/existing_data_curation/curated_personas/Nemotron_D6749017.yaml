personas:
  professional: Katarina Marshall, a 20‑year‑old environmental‑business major, blends her methodical project‑planning skill set with a deep curiosity for sustainability, channeling her organized, detail‑oriented
    nature into data‑driven research, Python‑assisted automation, and compassionate volunteer work at a local animal shelter, while assertively pursuing a CAPM certification and seeking a nonprofit internship
    that aligns with her balanced ambition and stress‑management routines.
  sports: Katarina Marshall enjoys low‑impact fitness, attending weekly yoga classes, weekend hikes with the Lake Osceola Trail Club, and occasional kayaking trips, while rooting for the Orlando Magic and
    the Florida Gators, and she occasionally joins a recreational ultimate‑frisbee league in the spring.
  arts: Katarina Marshall is an avid reader of literary fiction, savoring novels by Kazuo Ishiguro and Toni Morrison, and she finds artistic solace in nature photography inspired by Ansel Adams, knitting
    simple garments while listening to Joni Mitchell, and attending monthly board‑game nights featuring Settlers of Catan and Dungeons & Dragons sessions.
  travel: Katarina Marshall prefers thoughtfully planned escapes, having backpacked through the Great Smoky Mountains and spent a weekend in Asheville, she dreams of photographing Icelandic waterfalls and
    Norwegian fjords, balancing travel with her limited student budget and a desire for quiet, nature‑centric experiences.
  culinary: Katarina Marshall enjoys preparing plant‑forward meals, often cooking quinoa‑avocado bowls, roasted chickpea salads with turmeric, and baking simple oat bread, while her kitchen staples include
    kale, chickpeas, fresh herbs, and she occasionally treats herself to a latte from a local artisanal café as a reward for completing a tough project.
  core: Katarina Marshall, a 20‑year‑old with a methodical mind, blends quiet curiosity, organized ambition, and a lingering anxiety into a life of sustainable projects, solitary creative pursuits, and
    careful budgeting.
background:
  cultural: Katarina grew up in a middle‑class, predominantly white household in Winter Park, Florida, a suburb known for its lakes, arts scene, and close‑knit community. Her family’s cultural practices
    reflect mainstream American traditions—celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July—while also emphasizing education, community service, and outdoor recreation. The region’s
    multicultural environment and proximity to Orlando’s diverse cultural offerings have exposed her to a variety of perspectives, fostering an appreciation for environmental stewardship and the arts. Her
    ancestry traces back to Northern‑European (Irish and German) roots, but her identity is shaped primarily by the suburban Floridian lifestyle that combines a relaxed outdoor focus with a strong emphasis
    on academic achievement and civic engagement.
attributes:
  skills: '[''Project planning and coordination'', ''Data organization and analysis (Excel, Google Sheets)'', ''Academic research and literature review'', ''Written communication (essay writing, blogging,
