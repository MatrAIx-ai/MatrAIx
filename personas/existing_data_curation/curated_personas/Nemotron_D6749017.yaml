    ''Time management and scheduling'']'
  hobbies: '[''Reading (fiction, psychology, sustainability)'', ''Journaling'', ''Nature walks and hiking'', ''Photography (landscape and wildlife)'', ''Yoga and mindfulness meditation'', ''Knitting/crocheting'',
    ''Cooking healthy meals'', ''Board games and tabletop RPGs (small groups)'', ''Volunteering at animal shelter'', ''Puzzle solving (crosswords, jigsaw puzzles)'']'
  career_goals: Katarina’s immediate goal is to complete her bachelor’s degree—she is currently pursuing a major that blends business principles with environmental studies—and to earn a Certified Associate
    in Project Management (CAPM) credential. She plans to secure an internship or entry‑level role in a nonprofit or a sustainability‑focused firm where she can apply her project‑coordination and data‑analysis
    skills while contributing to community outreach or renewable‑energy initiatives. In the longer term, she aspires to become a project manager or sustainability analyst, leading interdisciplinary teams
    to implement environmentally responsible projects. Throughout her career she prioritizes a balanced workload and proactive stress‑management strategies, aiming to create a professional path that aligns
    her practical ambition with her concern for personal well‑being and societal impact.
