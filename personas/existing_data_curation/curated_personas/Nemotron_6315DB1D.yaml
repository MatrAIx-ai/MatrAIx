  career_goals: Mildred aims to leverage her supervisory experience into a senior operations role within the next five years. She plans to complete a bachelor's degree in Business Administration, earn the
    Certified Administrative Professional (CAP) credential, and obtain project management training (CAPM or PMP). Her ambition includes leading a regional office transformation project that integrates digital
    workflow solutions while preserving the reliability of proven processes. She also seeks to mentor emerging supervisors, champion work‑life balance initiatives for her team, and eventually transition
    into a role that influences organizational strategy at the corporate level.
