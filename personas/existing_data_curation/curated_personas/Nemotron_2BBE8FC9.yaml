personas:
  professional: Damaris Amiama, a seasoned elementary and middle school teacher with over 20 years of experience, merges methodical curriculum design, bilingual instruction, and technology integration into
    a collaborative, structured leadership style as they aim for a curriculum coordinator or assistant principal role.
  sports: Damaris Amiama stays active by leading salsa and Zumba classes at the base fitness center, hiking the Watchung Reservation on weekends, cheering for the New York Yankees and New Jersey Devils,
    and playing forward for the base’s recreational soccer league.
  arts: Damaris Amiama immerses themselves in the arts by dancing to Celia Cruz, reading historical fiction by Ken Follett, and volunteering at the base community center to organize cultural performances
    and art showcases that celebrate family storytelling traditions.
  travel: Damaris Amiama balances structured vacation planning with spontaneous family trips, having explored historic neighborhoods in Mexico City and the colorful streets of Old San Juan, while also enjoying
    weekend road trips to the Pennsylvania countryside for hiking and culinary inspiration.
  culinary: Damaris Amiama delights in cooking traditional dishes such as tamales, arroz con gandules, and mole, often harvesting cilantro, chilies, and oregano from their garden, yet they sometimes resort
    to pre‑made sauces when time runs short.
  core: Damaris Amiama is a highly organized, socially vibrant educator who spices life with salsa, garden‑fresh herbs, and meticulous budgeting, even if occasional impulsive spice purchases slip through.
background:
  cultural: Damaris identifies as Latina, with family roots in Mexico and Puerto Rico. She grew up speaking Spanish at home and celebrates cultural holidays such as Día de los Muertos and Navidad with traditional
    foods, music, and storytelling. Living on Joint Base McGuire‑Dix‑Lakehurst, she blends her Hispanic heritage with the diverse military community, fostering cross‑cultural understanding among students
    and families. Her bilingual abilities and appreciation for both American and Latino traditions shape her inclusive teaching style and community involvement.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Bilingual Education'', ''Student Assessment and Data Analysis'', ''Technology Integration'', ''Extracurricular
    Program Coordination'', ''Professional Development Facilitation'', ''Parent Communication'', ''Conflict Resolution'']'
  hobbies: '[''Salsa Dancing'', ''Zumba Fitness Classes'', ''Cooking Traditional Hispanic Recipes'', ''Gardening'', ''Hiking in New Jersey State Parks'', ''Reading Historical Fiction'', ''Participating
    in Book Clubs'', ''Volunteer Work at Base Community Center'', ''Organizing Cultural Events'', ''Learning New Languages'']'
  career_goals: She aims to transition into a leadership role such as curriculum coordinator or assistant principal within the next five years, focusing on implementing culturally responsive curricula and
    strengthening support systems for military families. Damaris plans to earn a master's degree in Educational Leadership to gain the credentials needed for school administration. She also aspires to mentor
    new teachers, develop a school‑wide mentorship program, and expand after‑school enrichment activities that blend academic support with cultural arts.
