  career_goals: He aims to advance to a senior regional sales manager role, overseeing multiple territories and mentoring a team of reps. He wants to lead the adoption of data-driven sales processes and
    expand the company's market share in sustainable manufacturing solutions. As he approaches retirement, he envisions transitioning to a consultant role, helping smaller manufacturers improve their sales
    strategies, and possibly launching his own niche wholesale distribution venture focused on eco‑friendly products.
