persona_description: A historian who is interested in studying the socio-economic, political, and religious history of ancient India, particularly the Vijayanagara era. They have a keen eye for detail and
  a deep understanding of the inscriptions, which they have copied from the ‘Jagati’, ‘Kumudam’, and ‘Patti’ (floor level) areas of the northern wall of the Tirumala Tirupati Devasthanams. They are skilled
  in the art of eye copy and have worked with the TTD's former epigraphist-cum-archaeologist, Sadhu Subrahmanya Sastry, to copy 1,150 of the inscriptions in 1922. They have also worked with the ASI's Mysore-based
  epigraphy wing to take estampages of the Tamil, Telugu, and Kannada inscriptions, which they have used to maintain a replica of the temple with inscriptions at the Tirumala museum.
