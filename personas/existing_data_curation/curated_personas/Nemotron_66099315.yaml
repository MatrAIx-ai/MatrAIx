  career_goals: Nuno hopes to transform his passion for community harmony into a more formal role as a volunteer coordinator at the Batesburg community center, where he can organize multicultural art workshops
    and support services for Spanish-speaking families. He dreams of establishing a small community garden that doubles as a gathering space for storytelling and cultural exchange. Over the next few years,
    he also aims to complete a GED program to broaden his options for part-time mentorship work, while continuing to nurture his own artistic curiosity through local classes.
