  career_goals: Kay dreams of becoming a robotics engineer or a community-focused scientist who designs tools that help people, especially children, navigate everyday challenges. She aims to strengthen
    her academic performance through high school and eventually pursue a STEM degree, while also developing confidence and resilience to manage her strong emotions. Kay is motivated to turn her competitive
    spirit into innovative problem‑solving and hopes to mentor younger kids in science and technology clubs.
