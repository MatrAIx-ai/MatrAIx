personas:
  professional: Lea Wooten, a retired data analyst and mechanical troubleshooting specialist, channels decades of laboratory and project coordination expertise into mentoring high‑school STEM students and
    organizing hands‑on science workshops at the senior center, where their critical, skeptical mindset and love for routine make every session meticulously planned yet adaptable.
  sports: Lea Wooten, an avid gardener and bridge enthusiast, enjoys low‑impact senior fitness classes and weekly walks in the local park, while cheering on the Los Angeles Dodgers and the LA Lakers, and
    participates in a community bowling league each Thursday night.
  arts: Lea Wooten, a lover of classic American culture, spends afternoons listening to Frank Sinatra and reading biographies of Eleanor Roosevelt, attends the local community theatre’s productions of 'Our
    Town' and 'The Glass Menagerie,' and maintains a collection of vintage vinyl records and jigsaw puzzles featuring works by Norman Rockwell.
  travel: Lea Wooten, a methodical planner, prefers road trips to nearby national parks like Yosemite and seaside towns such as Santa Barbara, often traveling with their adult children’s families, and dreams
    of a guided history tour of Boston’s Freedom Trail before the next anniversary of World War II.
  culinary: Lea Wooten, an enthusiastic home cook, prepares classic American dishes like roasted chicken with rosemary, apple pie with a flaky crust, and seasonal vegetable casseroles using garden harvests,
    while occasionally treating themselves to a slice of New York‑style cheesecake from a local bakery.
  core: Lea Wooten blends a lifelong dedication to routine, community service, and skeptical analysis with a competitive edge at bridge, a tendency to forget occasional medication refills, and a steadfast
    belief that staying active and socially engaged is the key to a vibrant senior life.
background:
  cultural: 'Lea Marie Wooten is a White American who grew up in the post‑World War II era, experiencing the values of the Silent Generation: hard work, community service, and traditional family ties. Raised
    in a middle‑class household with a modest Christian (Methodist) upbringing, she internalized practical, routine‑oriented habits while also valuing sociability and group participation. Relocating to
    Carson, California, later in life exposed her to the multicultural fabric of Los Angeles County, yet she maintains her cultural identity rooted in mid‑20th‑century American norms, blending those traditions
    with an appreciation for the diversity around her.'
attributes:
  skills: '["Data analysis", "Statistical reasoning", "Laboratory techniques", "Technical writing", "Mechanical troubleshooting", "Project coordination", "Curriculum development", "Event planning", "Volunteer
