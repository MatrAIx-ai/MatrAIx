  hobbies: '["Bridge", "Gardening club", "Church socials", "Senior fitness class", "Cooking", "Historical biography reading", "Puzzle solving", "Youth robotics mentoring"]'
  career_goals: Though retired, Lea seeks to stay intellectually engaged and contribute her knowledge to the community. She aims to mentor high‑school and college students in STEM subjects, volunteer at
    the local senior center to organize hands‑on science workshops, and serve on a senior advisory board to advocate for practical programs that benefit older adults. Additionally, she plans to document
    her life story with a focus on women's contributions to engineering, and to maintain her health and vitality through regular exercise and social activities.
