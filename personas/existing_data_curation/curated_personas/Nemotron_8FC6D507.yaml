    ''Organizational development'']'
  hobbies: '[''Mindfulness meditation'', ''Yoga'', ''Creative writing/journaling'', ''Reading contemporary literary fiction'', ''Hiking coastal trails'', ''Baking and cooking'', ''Acoustic guitar'', ''Watercolor
    painting'', ''Small book club gatherings'', ''Volunteering at local animal shelter'']'
  career_goals: Jessica aims to transition from a generalist HR role to a strategic HR Business Partner position within a growing tech or creative firm in Southern California. Over the next two years she
    plans to earn her SHRM‑CP certification and pursue a master’s degree in Human Resources or an MBA with a focus on organizational development. Her long-term ambition is to lead a department that integrates
    employee well‑being, especially mental‑health support, into the core business strategy, ultimately moving toward a Director of Human Resources role where she can shape an inclusive culture and data‑driven
    talent strategies while balancing practicality with innovative ideas.
