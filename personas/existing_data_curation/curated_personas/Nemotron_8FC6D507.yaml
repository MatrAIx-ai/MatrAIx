personas:
  professional: Jessica Hanlon is an emerging HR Business Partner in Southern California who leverages full‑cycle recruiting expertise, data‑driven HR analytics, and a compassionate mediation style to design
    inclusive onboarding experiences while preparing for SHRM‑CP certification and an MBA.
  sports: Jessica Hanlon frequently hikes the coastal trails of Palos Verdes, joins a small weekend running club that meets at the beach, and roots for the Los Angeles Dodgers, preferring low‑intensity
    outdoor activities that align with their preference for solitude and small‑group settings.
  arts: Jessica Hanlon immerses themselves in contemporary literary fiction, favoring authors like Sally Rooney and Ocean Vuong, strums acoustic guitar renditions of Joni Mitchell while painting watercolor
    sunsets of the Pacific, and participates in a cozy book club at a local coffee shop, drawing creative inspiration from the coastal landscape.
  travel: Jessica Hanlon favors tranquil weekend escapes to nearby coastal towns like Santa Barbara and weekend retreats in the Sierra Nevada, plans trips with meticulous itineraries using Google Trips,
    and dreams of a solo pilgrimage to Kyoto’s serene temples to deepen their mindfulness practice.
  culinary: Jessica Hanlon experiments with sourdough starter cultures, kneads artisanal ciabatta loaves infused with rosemary, and crafts seasonal dishes such as grilled salmon with lemon‑dill quinoa,
    often sourcing free‑range eggs and heirloom tomatoes from the local farmer’s market.
  core: Jessica Hanlon balances a high‑octane emotional life with calming yoga, meticulous HR strategy, and creative baking, while occasionally succumbing to impulsive coffee‑shop splurges and late‑night
    guitar jam sessions.
background:
  cultural: Jessica was raised in a middle-class, suburban family in the Los Angeles area. Her family’s cultural roots are primarily Irish‑American and Anglo‑American, and they celebrated traditional American
    holidays such as Thanksgiving and Fourth of July with close-knit family gatherings. Growing up in a diverse Southern California environment, she absorbed influences from the city’s Asian, Latino, and
    Pacific‑Island communities, fostering an early appreciation for multicultural perspectives. These experiences shaped her values of inclusivity, community service, and environmental consciousness, which
    she carries into her personal and professional life.
attributes:
  skills: '[''Full-cycle recruitment'', ''Onboarding and orientation'', ''Employee relations and conflict mediation'', ''HR policy development'', ''HRIS management (BambooHR, Workday)'', ''California labor
