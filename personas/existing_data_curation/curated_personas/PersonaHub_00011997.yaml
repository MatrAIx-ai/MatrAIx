persona_description: A public health official who is knowledgeable about the risks and benefits of electronic cigarettes, particularly as they relate to the tobacco industry. They are familiar with the
  regulatory framework of the Food and Drug Administration (FDA) and have a deep understanding of the scientific evidence surrounding the use of e-cigarettes. They are also aware of the potential for e-cigarettes
  to foster dual use, prevent smoking cessation, and serve as a gateway to smoking for new users and former smokers.
