personas:
  professional: Annabel Longar, a seasoned retail cashier in Reno with over 25 years of cash handling, POS mastery, inventory precision, and conflict‑resolution expertise, leverages their methodical and
    sociable nature to train new hires and is actively pursuing a supervisory role backed by a retail‑management certification.
  sports: Annabel Longar, an energetic participant in weekly Zumba classes and a regular hiker of the Sierra Nevada foothills, proudly roots for the Reno Aces baseball team and the Vegas Golden Knights
    hockey squad, and belongs to a local walking club that meets every Saturday.
  arts: Annabel Longar, a devoted member of a knitting circle that crafts blankets for charity and a book club that discusses authors like Colleen Hoover and Brené Brown, enjoys board‑game evenings featuring
    Catan, and often listens to folk singer Joni Mitchell while crocheting.
  travel: Annabel Longar, a planner‑oriented traveler who favors short, nature‑focused getaways such as weekend trips to Lake Tahoe and a dream itinerary to the Grand Canyon, balances cost with comfort
    by using discount airlines and staying at small B&Bs, and prefers traveling with close friends or family for shared experiences.
  culinary: Annabel Longar, a passionate home cook who regularly hosts potluck dinners featuring dishes like homemade tomato‑basil soup, rosemary‑infused roasted chicken, and fresh garden salads, enjoys
    experimenting with herbs from their backyard, and treats themselves to a slice of tiramisu on special occasions.
  core: Annabel Longar, a methodical yet sociable 56‑year‑old who blends meticulous retail expertise with a bustling community life, channels their anxiety into structured fitness and volunteering, and
    dreams of a balanced early retirement.
background:
  cultural: 'Annabel grew up in a white, middle-class family in the Reno-Sparks area of Nevada. Her parents were involved in the local construction trade, instilling a strong work ethic and a sense of community
    responsibility. Raised in a suburban neighborhood, she attended public schools where she participated in extracurricular clubs and sports, fostering her outgoing nature. Her cultural upbringing reflects
    typical Western American values: independence, practicality, and an appreciation for community engagement. Throughout her adult life, she has remained rooted in the Reno region, celebrating local traditions
    such as the Reno River Festival and supporting regional charitable events.'
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Conflict resolution'', ''Inventory management'', ''Time management'', ''Record-keeping'', ''Shift scheduling'', ''Training
