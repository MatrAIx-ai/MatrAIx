  hobbies: '[''Zumba classes'', ''Hiking'', ''Knitting circle'', ''Book club'', ''Cooking'', ''Gardening'', ''Community kitchen volunteering'', ''Board-game nights'', ''Journaling'', ''Potluck hosting'']'
  career_goals: Annabel aims to advance to a supervisory role within the next two years, obtaining a retail-management certification to strengthen her leadership credentials. She wants to take on shift-supervisor
    responsibilities, mentor fellow cashiers, and improve store efficiency through process optimisation. Long-term, she envisions transitioning to a part-time training and customer-experience consultant
    role, allowing her to share her expertise while maintaining a predictable schedule that supports her mental-health routine and family commitments. Additionally, she hopes to save for a modest early
    retirement that will let her focus more on community volunteering and personal interests.
