  career_goals: Juliann aims to complete her bachelor's degree in mechanical engineering within the next two years while securing a full‑time internship at a company focused on sustainable transportation
    or marine systems. She aspires to become a design engineer dedicated to creating energy‑efficient products, eventually leading multidisciplinary projects that integrate renewable technologies. Long‑term,
    she plans to earn her Professional Engineer (PE) license and either advance to a senior engineering manager position at a large corporation or launch her own consultancy that helps small manufacturers
    adopt green engineering practices. Her curiosity drives her to stay current with emerging fields such as electric propulsion and additive manufacturing, and she intends to contribute to industry standards
    through active participation in professional societies.
