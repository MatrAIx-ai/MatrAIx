personas:
  professional: An aspiring digital illustrator and freelance graphic designer, Luisa Cortes blends her self‑taught web design skills and love for Pacific‑Northwest street art into a growing portfolio,
    while they channel their critical, competitive streak into refining techniques and pursuing a scholarship to a visual communications program.
  sports: A skateboarding enthusiast and avid hiker, Luisa Cortes practices basic tricks at the local skate park with the informal crew ‘Ridge Riders’, follows the Seattle Kraken in the NHL and the Portland
    Timbers in MLS, and spends weekends trail‑running in Forest Park, demonstrating a competitive yet relaxed approach to fitness.
  arts: An active digital creator inspired by indie rock and lo‑fi beats, Luisa Cortes regularly posts character sketches on Instagram, drawing influence from artists like Tame Impala, Arctic Monkeys, Lo‑Fi
    Girl, and Mexican pop singer Natalia Lafourcade, while they volunteer teaching art to younger kids, reflecting a blend of personal expression and community involvement.
  travel: A spontaneous explorer with a love for both local nature and cultural immersion, Luisa Cortes has hiked the Columbia River Gorge and visited Seattle’s Pike Place Market, dreams of tasting street
    tacos in Oaxaca and strolling historic streets in Mexico City, and prefers flexible, last‑minute trips over meticulously planned vacations, balancing budget constraints with a thirst for new experiences.
  culinary: An enthusiastic home cook who blends tradition with creativity, Luisa Cortes often prepares tamales and fresh salsa with family, experiments with modern twists like chipotle‑infused guacamole
    and Mexican‑style ramen, and enjoys baking brownies while listening to lo‑fi beats, showcasing a playful yet occasionally messy kitchen style.
  core: A curious yet laid‑back 16‑year‑old, Luisa Cortes mixes digital art, skateboarding, and family cooking while juggling a pragmatic approach to school, a competitive edge in gaming, and a habit of
    forgetting to file homework on time.
background:
  cultural: Luisa is a second-generation Mexican-American. At home, Spanish is spoken alongside English, and her family preserves traditions from Jalisco, such as celebrating Día de los Muertos with altars,
    making tamales together, and listening to regional Mariachi and ranchera music. Living in Portland, she also adopts the Pacific Northwest’s love for outdoor recreation and progressive community values.
    She participates in local Mexican cultural festivals, like the annual Cinco de Mayo celebration at Portland’s Barrio neighborhood, and enjoys blending these influences—bringing Mexican flavors into
    her cooking and incorporating vibrant, folkloric motifs into her artwork. Her bicultural experience shapes her worldview, giving her a pragmatic yet curious approach to navigating both her heritage
    and her American environment.
