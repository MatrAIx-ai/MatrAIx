  career_goals: Luisa wants to turn her love for digital art and technology into a career. She aims to build a strong portfolio in graphic design and animation, hoping to earn a scholarship to a community
    college program in visual communications. While studying, she plans to freelance creating social-media graphics for local small businesses and community groups. In the longer term, she dreams of launching
    her own boutique online shop that sells custom-designed apparel and accessories inspired by Mexican culture and Pacific-Northwest street art. She also sees herself possibly opening a weekend food-truck
    that serves modern twists on traditional Mexican snacks, merging her culinary interests with entrepreneurial goals.
