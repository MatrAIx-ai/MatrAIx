  career_goals: Mercy aspires to develop a multicultural arts ministry within her congregational setting, creating workshops and exhibits that celebrate Mexican folk traditions alongside contemporary spiritual
    expression. She hopes to earn a certification in pastoral counseling or clinical mental health to better support congregants dealing with anxiety and stress. Long‑term, she envisions stepping into a
    leadership role such as Director of Youth & Cultural Programs, where she can design intergenerational initiatives that blend art, storytelling, and faith, and possibly author a guidebook on integrating
    cultural art practices into religious education.
