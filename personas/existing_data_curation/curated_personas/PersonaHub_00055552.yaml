persona_description: A musicologist who is interested in the cultural and social aspects of music, and the impact of cultural context on musical appreciation. They are familiar with the ideas of the Blank
  Slate and the concept of the cultural reflection in music, and have engaged with arguments challenging the role of context in understanding music. They have read and are familiar with Noam Chomsky's work
  on language and innate knowledge, and have read Pinker's work on the Blank Slate. They are likely to be knowledgeable about the history and theory of music, and have an interest in exploring the intersection
  of music and culture.
