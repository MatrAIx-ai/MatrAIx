personas:
  professional: Deryck Legard is a practical, self‑taught tradesperson who leverages his knack for diagnosing mechanical and electrical issues to transition from ad‑hoc handyman gigs into a state‑certified
    electrician or HVAC technician, aiming to launch a modest freelance maintenance business that provides predictable income and a routine he craves, even as his spontaneous side sometimes resists the
    strict schedules that certification demands. They balance a desire for structure with bouts of impulsive project hopping, often starting a repair job before finishing the paperwork.
  sports: Deryck Legard is a low‑key sports enthusiast who roots for the Birmingham Barons baseball team and the Alabama Crimson Tide football squad, spends early mornings fishing at Lake Snowden, joins
    a casual walking group for treks around Oak Mountain State Park, and maintains a modest membership at the local community center where they sharpen their chess tactics rather than engaging in high‑intensity
    team sports.
  arts: Deryck Legard is a devoted lover of blues and classic soul, regularly spinning records by B.B. King, Aretha Franklin, and John Coltrane while they capture gritty street scenes of their West End
    neighborhood with a vintage DSLR, curating a modest online gallery that juxtaposes barbershop portraits with candid church choir moments, and they hone their strategic mind through weekly chess matches
    at the community center.
  travel: Deryck Legard is a road‑trip aficionado who prefers solo drives along the scenic Appalachian foothills, having already explored the music‑rich streets of New Orleans and the historic river towns
    of Natchez, while dreaming of a quiet retreat in the Smoky Mountains; they plan trips with a detailed budget spreadsheet, opting for modest motels and campgrounds to keep expenses in check.
  culinary: Deryck Legard is a soul‑food connoisseur who masters fried catfish with a perfectly crisp cornmeal crust, slow‑cooks collard greens seasoned with smoked turkey, and bakes buttery cornbread,
    while tending a modest vegetable garden that yields tomatoes, sweet potatoes, and okra, allowing them to blend fresh garden harvests into their traditional recipes and occasional barbecue experiments.
  core: Deryck Legard is a disciplined yet restless hands‑on craftsman whose love for blues, solitary hobbies, and tight budgeting masks an undercurrent of anxiety and a competitive drive that pushes them
    toward constant self‑improvement.
background:
  cultural: Born and raised in Birmingham's West End, Deryck grew up within the African‑American working‑class community that carries the weight of the city's civil‑rights legacy. He was steeped in Southern
    black cultural traditions—gospel music at family gatherings, soul food cooking, storytelling from elders, and a communal respect for self‑reliance. The neighborhood barbershop and local churches shaped
    his early sense of community, though as an adult his introverted nature led him to retreat from formal group activities. He still feels the influence of the historic struggle for equality, which fuels
    his skepticism toward institutions and reinforces his competitive drive. Elements of the region's cuisine, such as fried catfish and collard greens, and the rhythmic pulse of blues and jazz remain integral
    to his personal identity.
attributes:
  skills: '["Auto maintenance", "Basic carpentry", "Simple electrical repairs", "Budgeting and personal finance", "Strategic game analysis (chess, card games)", "Digital photography", "DIY home improvement"]'
  hobbies: '["Fishing", "Walking/Hiking", "Reading true‑crime novels", "Playing chess", "Listening to blues and soul music", "DIY car restoration", "Urban photography", "Gardening", "Strategy video games",
    "Low‑stakes poker"]'
  career_goals: Deryck is driven to secure consistent, structured employment that leverages his hands‑on abilities while providing a clear routine. His primary ambition is to earn a state certification
    as an electrician or HVAC technician through a short vocational program, enabling him to launch a modest freelance maintenance business that offers him both independence and predictable income. He also
    hopes to obtain his GED, improve his formal qualifications, and eventually transition into a full‑time technical role with regular hours, which he believes will help temper his anxiety and give him
    a sense of stability. Alongside the career shift, Deryck aims to develop better organizational habits and build a small client base that respects his competitive work ethic.
