  career_goals: Kevin dreams of becoming a civil engineer who designs safe bridges and community spaces for Rayville, merging his curiosity for how things work with a practical desire to improve his hometown.
    He also nurtures a competitive ambition to play basketball at the high‑school level and possibly beyond, viewing athletics as a way to channel his drive and resilience. Over the next few years, he hopes
    to deepen his coding skills, participate in local youth STEM programs, and eventually attend a high school that offers advanced technology courses, laying the groundwork for a future in engineering
    or computer science. His calm, resilient nature also motivates him to aim for leadership roles in community projects where steady decision‑making under pressure is essential.
