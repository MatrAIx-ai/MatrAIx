  hobbies: '[''Reading (history, philosophy)'', ''Hiking'', ''Birdwatching'', ''Woodworking'', ''Crossword Puzzles'', ''Gardening'', ''Listening to Jazz/Folk Music'', ''Small Book Club'']'
  career_goals: As he approaches retirement, David aspires to transition from full‑time clerical duties to a part‑time senior administrative role within a local non‑profit or community organization where
    his organizational expertise can have a strategic impact. He aims to obtain a certificate in project management or office administration to formalize his knowledge, and to mentor younger staff in record‑keeping
    and workflow optimization. Over the next five years he hopes to lead a small team, streamline operational processes, and eventually offer consulting services to small businesses seeking to improve their
    administrative efficiency.
