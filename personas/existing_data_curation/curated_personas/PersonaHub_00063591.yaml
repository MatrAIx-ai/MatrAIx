persona_description: A scientist at Hitachi Ltd. who specializes in developing new materials for carbon capture and storage, particularly using cerium oxide for efficient collection and accumulation of
  carbon dioxide (CO2) from coal fired power generation. His research interests include developing new solid adsorbent materials that can efficiently adsorb moisture from exhaust gas, which is a key challenge
  for traditional solid adsorbent materials. His goal is to reduce the amount of CO2 released into the atmosphere by 30% compared to traditional absorbing solutions, and to commercialize the new material
  by or after 2025.
