persona_description: A scientist or engineer who is responsible for conducting a resistance measurement test on conductors at a specified reference temperature. The test aims to determine the conductor's
  DC resistance using two methods, with the Kelvin Bridge Method being more accurate. The persona will perform visual examination of the sample, strip insulation from both ends, and place a low electrical
  current and precision voltage on the test sample to record the voltage drop on the sample. The results will be reported including the calculated conductor resistance and test conditions.
