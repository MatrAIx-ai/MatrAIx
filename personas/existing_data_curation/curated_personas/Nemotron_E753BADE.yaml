personas:
  professional: Sean Smith is a budding digital artist and strategic gamer who treats his middle school science fair projects like professional research, leveraging his disciplined organization and curiosity
    to prototype interactive art installations.
  sports: Sean Smith is a dedicated fan of the local high school Bulldogs football team, follows the Atlanta Braves and Falcons with weekly watch parties, and participates in a community youth soccer club
    that meets on Saturday mornings, complementing his love for nature walks around Telfair County’s lakes for low‑impact fitness.
  arts: Sean Smith immerses himself in creative expression by sketching fantasy landscapes, crafting digital art set to the ambient piano works of Ludovico Einaudi, and drawing inspiration from sci‑fi authors
    like Ursula K. Le Guin and Brandon Sanderson, while his current playlist features indie gems such as Fleet Foxes and classical pieces by Yo‑Yo Ma.
  travel: Sean Smith dreams of swapping his quiet hometown for a weekend road trip to Savannah’s historic squares and a family vacation to Orlando’s theme parks, while his long‑term goal is to explore the
    ancient castles of Edinburgh, balancing his limited teen budget with a love for both coastal relaxation and cultural immersion.
  culinary: Sean Smith’s palate blends Southern comfort food like fried chicken, collard greens, and peach cobbler with a burgeoning curiosity for sushi rolls and avocado toast, and he proudly whips up
    a simple shrimp and grits recipe using fresh basil and lime, though he often forgets to measure ingredients precisely, leading to occasional kitchen chaos.
  core: Sean Smith is a meticulously organized 13‑year‑old who channels his intense curiosity and competitive spirit into digital art and strategy games, while his anxiety and occasional impulsive spending
    provide a vivid counterpoint to his disciplined routine.
background:
  cultural: Sean was raised in the small rural community of Mc Rae Helena, Georgia, within a white Southern family that values hard work, church involvement, and close‑knit community ties. Family gatherings
    often feature traditional Southern cuisine, gospel music, and local high school sports events. While the region’s cultural homogeneity has limited his exposure to diverse perspectives, his innate curiosity
    drives him to seek out art, literature, and technology beyond his immediate environment, blending his Southern upbringing with a broader, more unconventional worldview.
