  career_goals: Sean aspires to attend a rigorous high school program that blends art and technology, eventually earning a scholarship to study graphic design or interactive media at a top university. He
    dreams of becoming a creative technologist or UI/UX designer who can fuse visual storytelling with code, aiming one day to lead a multidisciplinary studio that produces immersive digital experiences.
    He is motivated by the desire to prove his capabilities, outpace his peers, and use his talents to gain recognition while also learning strategies to manage his anxiety and emotional intensity.
