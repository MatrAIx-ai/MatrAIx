  career_goals: Christina aspires to become a wildlife biologist or a veterinarian specializing in farm animals, driven by her love for local wildlife and practical, hands‑on work. She hopes to study environmental
    science in high school, win the county science fair, and eventually design sustainable farm technologies. In the short term she aims to lead her 4‑H club’s science project, secure top placement in her
    school’s math challenge, and continue developing Scratch games that explore ecological themes.
