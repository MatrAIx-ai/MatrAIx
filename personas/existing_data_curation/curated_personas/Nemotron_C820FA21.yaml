personas:
  professional: Christina Spicer, a budding junior programmer, designs and customizes games on Scratch, turning her love for logic puzzles and competitive spirit into interactive challenges, while they
    prefer the clear structure of block coding but stay flexible enough to tweak projects on a whim.
  sports: Christina Spicer plays forward for the Riverbend Rovers U9 soccer team, thriving on the competitive edge of matches, embracing teamwork during practice, and complementing on‑field training with
    weekend creek swims and nature‑trail runs that keep them fit and curious.
  arts: Christina Spicer immerses herself in adventure novels like the Percy Jackson series, sketches comic strips inspired by Stan Lee’s superheroes, builds intricate LEGO scenes, and they showcase their
    Scratch games at school talent shows, blending storytelling with hands‑on creation.
  travel: Christina Spicer prefers spontaneous day‑trips to nearby state parks, where they collect rocks and map creek routes, yet they dream of joining Yellowstone National Park’s Junior Ranger program
    to combine their love of nature with structured learning.
  culinary: Christina Spicer enjoys crafting simple meals such as mini pizza bites with pepperoni and mozzarella, snacking on trail mix made of almonds, dried cranberries, and chocolate chips, and they
    relish the occasional berry‑filled smoothie after a long hike.
  core: Christina Spicer is a competitively curious nine‑year‑old who balances structured coding, soccer, and nature exploration with a practical streak, and they have a habit of impulsively splurging on
    LEGO projects.
background:
  cultural: Christina grew up in Hertford, a small town in Chowan County, North Carolina, where community values and Southern hospitality shape daily life. Her family participates in local traditions such
    as the annual county fair, church gatherings, and community service projects. The rural setting provides frequent exposure to farms, wetlands, and historic sites of the Inner Banks, fostering a strong
    connection to the natural environment. While her household reflects a typical white, middle‑class upbringing in a Southern town, she benefits from school programs that emphasize hands‑on learning, local
    history, and community involvement.
