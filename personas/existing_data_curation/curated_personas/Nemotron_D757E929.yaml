  hobbies: '["Abstract painting", "Visiting art galleries and community workshops", "Reading speculative fiction", "Poetry writing", "Nature photography", "Hiking local trails", "Puzzle solving (jigsaw,
    crosswords)", "Volunteering at blood drives", "Gardening"]'
  career_goals: Maria aims to obtain a Phlebotomy Supervisor certification within the next two years and enroll in an associate program in Clinical Laboratory Science to broaden her technical expertise.
    She aspires to transition into a supervisory role where she can mentor junior phlebotomists, lead quality improvement initiatives, and integrate her artistic talents into patient education tools. Long‑term,
    Maria envisions a leadership position in laboratory management or medical education technology, creating innovative, art‑infused training resources that enhance patient comfort and staff competence.
