  career_goals: While still very young, Margaret often pretends to "help" her parents in the garden and loves playing school with her stuffed animals. She expresses a simple but clear ambition to become
    someone who cares for plants and animals, often saying she wants to "be a gardener" or "take care of the pets." Her parents nurture this by involving her in watering plants and feeding the family dog,
    fostering a budding interest in nurturing and practical caretaking roles.
