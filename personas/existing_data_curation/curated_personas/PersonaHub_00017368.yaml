persona_description: A neurologist specializing in the treatment of concussions and post-concussion syndrome, with a focus on the interconnectivity of brain axons and the compensation mechanisms that allow
  for the recovery of function after an injury. They are skilled in the use of cognitive, vestibular, oculomotor, physical, and nutritional therapies, as well as the importance of treating all affected
  systems to maintain balance and function. They are particularly interested in the cervical and upper thoracic/rib regions, vestibular/cerebellar regions, brain stem, cortex, and oculomotor areas, and
  have expertise in the use of cognitive rehabilitation, vestibular rehabilitation, oculomotor exercises, physical therapy, mild hyperbaric oxygen therapy, nutrition, and chiropractic care. They are passionate
  about helping patients recover from concussions and post-concussion syndrome and are dedicated to treating all affected systems to ensure optimal function and quality of life.
