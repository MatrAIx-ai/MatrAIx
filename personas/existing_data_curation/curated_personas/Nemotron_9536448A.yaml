  career_goals: She aims to earn her GED within the next year and enroll in a local vocational program, preferably in culinary arts or automotive technology, where she can blend her practical skills with
    her curiosity for learning new techniques. Long-term, Martha hopes to secure a stable job that offers a clear career path, such as a kitchen assistant in a community restaurant or an entry-level automotive
    service technician, while also continuing to develop her creative side through occasional freelance craft projects.
