personas:
  professional: Richard Abernethy, an aspiring civil engineering technician, blends hands‑on CAD drafting and automotive maintenance know‑how with a methodical, curiosity‑driven approach to sustainable
    infrastructure design, while reliably coordinating project teams and keeping deadlines in sight, and they often integrate field observations from weekend hikes into classroom projects.
  sports: Richard Abernethy, a dedicated member of the Front Range Hiking Club, prioritizes weekend treks in Rocky Mountain National Park while cheering on the Colorado Avalanche for hockey and the Denver
    Broncos for football, and they maintain fitness through regular trail runs and occasional rock‑climbing sessions at Red Rocks.
  arts: Richard Abernethy, a quiet acoustic guitarist, composes folk‑rock songs inspired by Bob Dylan and Neil Young, avidly reads science‑fiction staples by Isaac Asimov and N.K. Jemisin, and regularly
    tunes into the Radiolab podcast while occasional bouts of doodling on campus notebooks shape their creative outlet.
  travel: Richard Abernethy plans travel around a mix of meticulously mapped weekend backpacking trips in the Front Range, such as a sunrise hike to Longs Peak, and dream itineraries to Iceland’s geothermal
    spas and Norway’s fjord routes, balancing a modest student allowance with a strong desire for low‑impact, nature‑focused adventure, and they often use a compact travel checklist to stay organized.
  culinary: Richard Abernethy, an enthusiastic self‑taught cook, favors simple, nutrient‑dense meals like quinoa‑black‑bean salad with cilantro‑lime dressing and hearty campfire chili when on the trail,
    while also indulging in occasional craft coffee and a well‑stocked pantry of dried fruits and trail‑mix nuts, and they sometimes over‑season dishes in a quest for the perfect flavor balance.
  core: Richard Abernethy, a thoughtful aspiring engineer, harmonizes a love for rugged mountain hikes, stray‑strummed folk songs, and meticulous budgeting, yet can’t resist binge‑watching sci‑fi series
    up late, often trading sleep for sunrise climbs.
background:
  cultural: Richard grew up in a suburban white family in Parker, Colorado, where the outdoor lifestyle of the Rocky Mountain region shaped his values. His family's roots trace back to Midwestern American
    traditions, emphasizing self‑reliance, community service, and modesty. The local culture's blend of modest, down‑to‑earth attitudes with an appreciation for nature and sustainability informs his outlook,
    making him comfortable with both individual pursuits and cooperative community activities.
attributes:
  skills: '[''Computer troubleshooting'', ''Basic automotive repair'', ''CAD drafting (SolidWorks basics)'', ''Calculus and physics'', ''Technical writing'', ''First aid certification'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Acoustic guitar playing'', ''Reading science‑fiction'', ''Volunteering at animal shelter'', ''Camping'']'
  career_goals: Richard aims to complete an associate’s degree in engineering technology and later transfer to a bachelor’s program in civil or environmental engineering. He is drawn to sustainable infrastructure
    projects that blend practical construction skills with innovative design. In the long term he hopes to work for a firm that focuses on renewable energy installations, and eventually obtain the professional
    engineer (PE) license. He also considers gaining a trade certification in carpentry or HVAC to broaden his skill set and possibly start his own eco‑friendly construction business.
