personas:
  professional: Thao Truong, a 72‑year‑old retired community elder, leverages decades of budgeting acumen and charismatic storytelling to organize temple fundraisers, senior‑center dance nights, and intergenerational
    cooking workshops, thriving on the structure of event planning while remaining flexible enough to improvise when last‑minute changes arise.
  sports: Thao Truong stays active by dancing line steps at the senior community center, joining weekly walking groups to the nearby park, and cheering on the San Francisco 49ers and the Oakland Athletics,
    while also enjoying strategic mahjong matches as a mental sport.
  arts: Thao Truong illuminates karaoke evenings with soulful renditions of 1960s and 1970s classics like Frankie Valli’s “Can’t Take My Eyes Off You” and Aretha Franklin’s “Respect”, while also appreciating
    historical novels, local community theater performances, and classic cinema evenings featuring films such as “Casablanca”.
  travel: Thao Truong prefers short, budget‑friendly road trips to scenic destinations like Yosemite National Park and the coastal towns of Mendocino, planning loosely around family video‑call schedules,
    and dreams of revisiting her ancestral hometown overseas when health permits.
  culinary: Thao Truong delights in crafting authentic pho broth with star anise, ginger, and lemongrass, rolling fresh spring rolls packed with cilantro, mint, and Thai basil from her herb garden, and
    experimenting with fusion twists like banana‑leaf‑wrapped bánh mì, while savoring the aroma of simmering caramelized fish sauce.
  core: Thao Truong is a talkative, structure‑loving elder who balances meticulous budgeting with spontaneous community gatherings, dances, karaoke, and a lifelong passion for cooking and cultural mentorship.
background:
  cultural: Thao Ngoc Truong was born in a rural village in central Vietnam in the early 1950s. She grew up during a period of political upheaval and moved to the United States in 1985 with her husband,
    joining the growing Vietnamese diaspora in the San Francisco Bay Area. Settling in Fremont, a city known for its diverse Asian population, she has kept close ties to her Vietnamese roots through language,
    cuisine, and Buddhist temple participation. While she embraces American customs, she celebrates Vietnamese holidays such as Tet, Mid‑Autumn Festival, and ancestor worship rituals. Her bilingual ability
    and deep knowledge of Vietnamese cultural practices make her a bridge between older immigrants and younger, U.S.-born Vietnamese families.
