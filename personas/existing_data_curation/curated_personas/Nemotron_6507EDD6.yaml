    centers and community garden"]'
  career_goals: Even in retirement, Thao aims to keep her cultural heritage alive. She wants to mentor younger Vietnamese women in the community by teaching traditional cooking and sharing family stories.
    She plans to compile a handwritten cookbook of her favorite recipes, pairing them with anecdotes, and eventually publish it through a local community press. As a trusted elder, she hopes to serve as
    a liaison between the Fremont senior center and the Vietnamese community, helping seniors access services and stay socially engaged. Maintaining her health and independence so she can continue leading
    community gatherings is also a top priority.
