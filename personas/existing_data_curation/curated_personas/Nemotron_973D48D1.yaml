personas:
  professional: Hermes Torres is a bilingual career counselor who merges rigorous aptitude assessments with culturally responsive workshops, leveraging their curiosity and practicality to design data‑driven
    pathways for high‑school students while energizing group sessions with a charismatic, collaborative style.
  sports: Hermes Torres channels their outgoing energy into a co‑ed recreational soccer league, avidly supports the Chicago Fire and Cubs, hikes the Shabbona Nature Preserve each spring, and participates
    in a local trivia night hosted by the Chicago Wolves hockey club.
  arts: Hermes Torres engages with the arts by attending Día de los Muertos parades, listening to Lila Downs and Café Tacvba, collecting graphic novels by Bryan Lee O'Malley, and hosting weekly board‑game
    gatherings featuring Catan and Pandemic.
  travel: Hermes Torres balances weekend expeditions to Shawnee National Forest with dream trips to Oaxaca’s culinary festivals, plans travel around school breaks, and prefers budget‑friendly yet culturally
    immersive experiences, even keeping a travel journal of local historic sites.
  culinary: Hermes Torres enjoys crafting authentic tacos al pastor with pineapple‑marinated pork, simmering mole negro flavored with ancho chilies, and experimenting with Korean‑Mexican fusion bowls, mastering
    the balance of smoky chipotle, fresh cilantro, and lime.
  core: Hermes Torres is a sociable, data‑driven career counselor who fuses curiosity with practicality, fuels community impact through soccer, cooking, and board‑games, while juggling disciplined finances
    and a penchant for over‑organizing their schedule.
background:
  cultural: Hermes is a first‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English. He maintains strong ties to his Mexican heritage through family traditions,
    food, and participation in community organizations such as the Mexican Cultural Center in Chicago. Values such as respeto (respect), colaboración (collaboration), and familia (family) shape his interpersonal
    style and inform his counseling philosophy, emphasizing community support and cultural relevance. Living in Hinsdale, IL, he bridges Mexican cultural practices with Midwestern American life, serving
    as a cultural liaison for students and families navigating dual identities.
attributes:
  skills: '[''Career counseling and guidance'', ''Aptitude and interest assessment administration'', ''Labor market analysis and data interpretation'', ''Bilingual counseling (Spanish/English)'', ''Group
    facilitation and workshop design'', ''Curriculum and program development'', ''Public speaking and presentation'', ''Counseling documentation and case management'', ''Emotional intelligence and conflict
    resolution'', ''Technology integration (career guidance software, virtual simulations)'']'
  hobbies: '[''Playing recreational soccer'', ''Cooking traditional Mexican dishes and experimenting with fusion recipes'', ''Volunteering as a mentor for youth in community centers'', ''Attending cultural
    festivals and Día de los Muertos celebrations'', ''Hiking in forest preserves around DuPage County'', ''Listening to podcasts on personal development and educational technology'', ''Playing board games
    and trivia with friends'']'
  career_goals: Hermes aims to become the Director of Career Services for a large suburban school district, where he can design and implement a comprehensive, culturally responsive counseling program that
    leverages technology and community partnerships. He plans to earn the Certified Career Counselor (CCC) credential and later pursue a doctorate in Educational Leadership to influence policy at the district
    or state level. A core ambition is to expand outreach to underserved Mexican‑American families by establishing mentorship pipelines with local businesses, creating bilingual resource hubs, and publishing
    research on the impact of culturally tailored guidance interventions.
