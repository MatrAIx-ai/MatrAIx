  career_goals: Byron aims to transition from a skilled tradesperson to a licensed general contractor who runs his own painting and finish‑carpentry firm. Over the next five years he plans to earn a master
    painter certification, obtain the Michigan Residential Contractor License, and expand his services to include color‑design consulting and eco‑friendly paint solutions. He also hopes to mentor apprentices,
    build a reputation for reliable, high‑quality work, and eventually secure contracts for larger commercial projects such as retail centers and multi‑family housing.
