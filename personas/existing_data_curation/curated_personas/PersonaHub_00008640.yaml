persona_description: A professional plumber who specializes in the installation and maintenance of reverse osmosis (RO) systems. They have a deep understanding of the technical specifications and standards
  related to RO systems, and are familiar with the different types of RO systems available in the market. They are skilled in assessing the performance of RO systems and ensuring that they meet the necessary
  standards, such as NSF/ANSI Standard 58 and Standard 42. They are also knowledgeable about the technical issues that arise with POE RO systems and the potential for corrosion of copper plumbing downstream
  of the system. They have experience in designing and implementing solutions to address these issues and ensure the safe and efficient operation of RO systems in homes.
