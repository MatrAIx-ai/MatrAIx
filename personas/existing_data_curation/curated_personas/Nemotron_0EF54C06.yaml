  career_goals: Samantha aims to advance from her current manager role to become a clinic director within the next five years, pursuing a bachelor’s degree in health administration to strengthen her credentials.
    She is passionate about improving patient satisfaction scores and implementing technology‑driven workflow solutions that streamline operations without sacrificing the personal touch. Long‑term, she
    envisions opening her own health‑services consulting practice focused on helping small community clinics adopt efficient, patient‑centered processes while fostering supportive workplace cultures. To
    support these ambitions, she plans to earn a certified healthcare manager credential and develop stronger project‑management habits to counteract her occasional difficulty with deadlines.
