personas:
  professional: Samantha Songey, a 25‑year‑old health services manager at a community clinic in Charles County, blends meticulous patient‑intake coordination and HIPAA compliance with rapid decision‑making
    during emergencies, using their outgoing communication style to boost staff morale while occasionally stumbling over tight deadlines as they pursue a bachelor’s in health administration and aim for
    a clinic director role.
  sports: Samantha Songey powers through weekly Zumba sessions at the local community center, hikes the Potomac Trail in spring, and cheers for the Washington Commanders, Capitals, and Wizards while playing
    on a co‑ed recreational soccer league that meets on Saturday evenings.
  arts: Samantha Songey enjoys live music nights at The Anthem, swaying to the sounds of Hozier and Beyoncé, hosts board‑game soirées featuring Codenames, and volunteers at community theatre productions,
    finding inspiration in the vibrant murals of National Harbor.
  travel: Samantha Songey prefers spontaneous weekend road trips, having driven the historic streets of Annapolis and St. Michaels, while dreaming of a summer escape to Savannah’s moss‑draped squares and
    a sunrise hike in Shenandoah National Park.
  culinary: Samantha Songey, an enthusiastic home cook, frequently prepares Maryland crab cakes seasoned with Old Bay, experiments with Mediterranean falafel wraps, and delights in mixing fresh basil and
    sun‑dried tomatoes into homemade pesto, often sharing the results at neighbor potlucks.
  core: Samantha Songey is a routine‑loving yet impulsive community‑focused health manager whose boundless social energy is tempered by anxiety and a habit of juggling deadlines with spontaneous fun.
background:
  cultural: Samantha grew up in a suburban community in Charles County, Maryland, within a middle‑class white family that emphasized practicality, hard work, and community involvement. Her upbringing was
    shaped by the region’s blend of historic Chesapeake Bay traditions and modern suburban life, fostering a respect for routine and local customs while also encouraging social connectivity through neighborhood
    events and volunteerism. Though her name reflects a multicultural lineage, she identifies primarily with mainstream American cultural practices, celebrating holidays such as Thanksgiving and the Fourth
    of July, and participating in local festivals and charity drives. This background underpins her pragmatic outlook, strong sense of duty to her community, and her desire to maintain a balance between
    stability and lively social engagement.
