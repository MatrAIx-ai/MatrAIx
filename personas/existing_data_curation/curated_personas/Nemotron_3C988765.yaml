  career_goals: John aims to move into senior leadership within sales, targeting a regional sales manager role in the outdoor equipment sector within five years. He plans to deepen his expertise in sustainable
    product lines and become a trusted advisor to corporate accounts, balancing aggressive revenue goals with ethical sales practices. He intends to earn the Certified Professional Sales Leader (CPSL) credential
    and complete an MBA focused on strategic management. Long‑term, he envisions launching a boutique consulting firm that helps small businesses craft compelling brand stories and penetrate new markets,
    leveraging his blend of sales acumen and humanities insight.
