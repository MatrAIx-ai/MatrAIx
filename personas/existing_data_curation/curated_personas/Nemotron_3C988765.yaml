personas:
  professional: John Thwaites is a consultative sales specialist who leverages a humanities‑informed narrative skill set and mastery of Salesforce, HubSpot, Excel, and Tableau to craft data‑driven proposals
    that win environmentally‑focused accounts while staying meticulously organized with Asana and Trello, and they balance aggressive revenue goals with ethical sales practices.
  sports: John Thwaites enjoys solo hikes across the Sierra foothills, weekend rides with the local Cycle‑Sierra club, and follows the Sacramento Kings and San Jose Earthquakes avidly, and they approach
    fitness with a steady endurance mindset while preferring low‑impact activities that complement his love for nature.
  arts: John Thwaites finds creative fulfillment in long‑exposure landscape photography inspired by Ansel Adams, frequent visits to gallery openings featuring contemporary artists like Kerry James Marshall,
    a penchant for listening to Bon Iver while assembling scale model trains, and they draw on classic literature to enrich their storytelling.
  travel: John Thwaites prefers meticulously planned solo trips that blend adventure with sustainability, having trekked Yosemite and Zion, aspiring to hike the Torres del Paine in Patagonia and the Milford
    Track in New Zealand, and they often balance travel costs with a modest savings plan while using map‑making software to chart routes.
  culinary: John Thwaites experiments in the kitchen with locally sourced produce, frequently preparing dishes such as miso‑glazed salmon over quinoa, roasted beet and goat cheese salad with heirloom tomatoes,
    and smoked‑paprika chicken thighs, and they enrich their moderate cooking skill set with a curiosity for global flavors.
  core: John Thwaites is a meticulously organized sales strategist who channels their solitary curiosity into long‑exposure photography, model‑train craftsmanship, and a restless quest for sustainable success,
    while they battle a habit of over‑analyzing every decision.
background:
  cultural: John grew up in a middle‑class family on the outskirts of Portland, Oregon, where his parents emphasized education, community involvement, and an appreciation for the Pacific Northwest outdoors.
    His grandparents immigrated from England in the early 20th century, giving him a modest awareness of his Anglo‑American heritage. During his teenage years, he was immersed in the region’s indie music
    scene, alternative literature, and a strong ethic of self‑reliance, which shaped his balanced outlook on curiosity and practicality. After earning a B.A. in Humanities from the University of Oregon,
    he moved to Reno, Nevada, drawn by the city’s blend of frontier spirit and growing tech‑and‑tourism economy. In Reno, he participates in local cultural events like the River Festival, supports community
    literacy initiatives, and embraces the rugged, independent ethos of the American West while maintaining a broad appreciation for arts and literature.
