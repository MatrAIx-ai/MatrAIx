  career_goals: Moises aims to transition into a leadership role within a community health center, where he can expand integrated primary‑care services and telehealth outreach to underserved neighborhoods
    in Portland. He is eager to develop a preventive‑health curriculum for local schools and to mentor the next generation of physicians through formal residency teaching positions. Additionally, he aspires
    to influence regional health policy by serving on advisory committees that promote patient safety, equitable access, and sustainable healthcare delivery. Balancing professional ambition with personal
    flexibility, he seeks to cultivate a practice environment that values teamwork, patient harmony, and his own well‑being.
