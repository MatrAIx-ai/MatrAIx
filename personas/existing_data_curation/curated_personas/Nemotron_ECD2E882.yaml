  career_goals: Although retired from formal employment, Maricel aims to deepen her role as a cultural ambassador within her community, sharing family recipes and stories with younger generations. She aspires
    to mentor newly arrived immigrant families, helping them navigate language barriers and local customs. Maintaining her health and independence is a personal priority, so she plans to continue daily
    walks on Ewa Beach and attend regular wellness workshops. Maricel also hopes to organize an intergenerational cooking series at the senior center, fostering harmony and mutual respect among residents
    of diverse backgrounds.
