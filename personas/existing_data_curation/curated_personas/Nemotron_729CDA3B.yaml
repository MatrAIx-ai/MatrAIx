  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Reading mystery and true crime books'', ''Playing chess'', ''Cooking traditional Salvadoran dishes'', ''Hiking in local parks'', ''Listening
    to jazz and cumbia music'', ''Volunteering to teach art to local youth'']'
  career_goals: Manu aims to become a senior detective and eventually lead the department’s cold‑case unit, using his artistic perspective to develop new investigative methods. He also wants to launch a
    community crime‑prevention program that integrates local art projects and cultural workshops, mentor younger investigators, and earn advanced certifications such as Certified Criminal Investigator.
