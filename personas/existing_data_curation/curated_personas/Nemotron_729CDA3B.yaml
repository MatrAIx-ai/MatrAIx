personas:
  professional: Manu Arceo, a seasoned detective who fuses rigorous crime‑scene processing with an artist’s eye for visual patterns, leverages their relentless curiosity and relaxed flexibility to devise
    innovative interview methods and data‑driven cold‑case analyses, and they aim to eventually helm the department’s cold‑case unit.
  sports: Manu Arceo, an avid member of the Hill Country Hikers club who spends weekends trekking the Texas Hill Country, follows the Dallas Cowboys in football season and the San Antonio Spurs during NBA
    months, and squeezes in occasional pickup basketball games at the local community center, they keep both mind and body agile.
  arts: Manu Arceo, who roams city streets capturing candid moments on film, frequents galleries showcasing work by Banksy and Kehinde Wiley, devours mystery novels by Agatha Christie and true‑crime accounts
    by Michelle McNamara, and winds down listening to Miles Davis’s modal jazz and the rhythmic cumbia beats of Celso Piña, they find artistic balance that fuels their investigative instincts.
  travel: Manu Arceo, a spontaneous planner who blends weekend road trips across the Texas Hill Country with occasional overseas escapes to historic cities like Oaxaca, Barcelona, and Kyoto, they cherish
    immersive cultural workshops over luxury resorts while juggling limited vacation days and a modest travel budget.
  culinary: Manu Arceo, a self‑taught home chef who expertly flips pupusas stuffed with melty cheese, loroco, and refried beans, seasons grilled yuca with citrus‑marinated pork and pickled cabbage, and
    often experiments with smoky chipotle sauces, they enjoy sharing these hearty plates at community art workshops while sometimes burning the tortilla edges in their rush.
  core: Manu Arceo, a calm, curiosity‑driven detective who solves cold cases with a camera in hand, organizes evidence boards like collage art, forgets to file paperwork until the last minute, and can’t
    resist a fresh cup of coffee while snapping street photos.
background:
  cultural: Manu is a first‑generation Salvadoran American whose family fled civil unrest in the 1980s and settled in Texas. He grew up bilingual, speaking Spanish at home and English in school, and retains
    strong ties to Salvadoran traditions—family gatherings, Catholic celebrations, pupusas, and marimba rhythms. Living in Spring, TX, he blends his Central‑American heritage with the broader Texan Latino
    community, drawing on familismo and communal values to foster trust in his investigations and community outreach.
