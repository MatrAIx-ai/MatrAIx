  career_goals: Rafael dreams of becoming a teacher because he loves helping friends learn and values the structure of a classroom. He is also fascinated by firefighters, admiring their uniforms, teamwork,
    and the way they keep people safe. In the short term, he wants to become the “best reader” in his class and to master writing his name without assistance. He hopes to continue playing soccer for fun
    and to one day be part of a community team, seeing it as a way to stay active, cooperate with others, and bring joy to his family.
