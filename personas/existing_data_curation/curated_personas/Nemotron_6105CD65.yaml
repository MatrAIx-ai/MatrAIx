personas:
  professional: Rafael Isalgue is an eager kindergarten learner who excels at following step‑by‑step LEGO instructions and organizing classroom supplies, showcasing a practical, structure‑loving mindset
    and a cooperative attitude toward peers.
  sports: Rafael Isalgue plays for the neighborhood “Little Kickers” soccer club, idolizes Lionel Messi and cheers for Los Angeles FC on TV, and after school they practice dribbling and shooting drills,
    balancing energetic play with a preference for structured warm‑ups.
  arts: Rafael Isalgue delights in picture books like Dr. Seuss’s “The Cat in the Hat” and Eric Carle’s “The Very Hungry Caterpillar,” colors within lines of activity books, draws cartoons inspired by “Adventure
    Time,” and enjoys listening to traditional folk music while his mother cooks, blending visual storytelling with rhythmic sounds.
  travel: Rafael Isalgue loves family road trips to the nearby national forest where they follow a detailed itinerary of hiking trails and picnic spots, and they dream of visiting Disneyland and the ancient
    pyramids of Mexico, preferring organized plans with time for scheduled play breaks.
  culinary: Rafael Isalgue enthusiastically helps roll tortillas for pupusas, relishes the cheesy, bean‑filled pockets with a side of curtido, also enjoys grilled cheese sandwiches with cheddar and tomato
    soup, and his favorite snack is chocolate chip cookies made with vanilla extract and dark chocolate chunks.
  core: Rafael Isalgue combines a love for structured play, a cautious approach to money, and a worry‑prone, kind heart, often coloring inside the lines but occasionally fretting over tiny changes to routine.
background:
  cultural: Rafael lives in Springdale, Arkansas, in a Salvadoran‑American household where Spanish is spoken alongside English. His family celebrates Salvadoran traditions such as making pupusas for meals,
    observing Catholic holidays like Christmas posadas, and honoring Salvadoran Independence Day with music and food. He regularly attends a local Hispanic community church where he hears both Spanish prayers
    and English sermons. The blend of Salvadoran cultural practices and the broader American environment shapes his bilingual abilities, food preferences, and participation in community events, giving him
    a dual cultural identity that he shares with friends at school.
