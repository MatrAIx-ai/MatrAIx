persona_description: A research scientist who specializes in the study of magnetic interactions, particularly the Dzyaloshinskii-Moriya (DM) interaction and its role in magnetoelectric effects and Skyrmion
  states. They have developed a technique to measure the phase of the DM interaction in antiferromagnetic materials using X-ray scattering, which has allowed them to better predict the twisting direction
  of magnetic domains in various weak ferromagnets. They have also begun to study other weak ferromagnets, such as carbonates, to discover how magnetic domains form and how they are affected by heat and
  magnetic fields.
