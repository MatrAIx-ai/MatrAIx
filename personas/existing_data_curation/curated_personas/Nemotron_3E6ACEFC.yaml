personas:
  professional: Zoila Godoy, an aspiring visual artist and future freelance illustrator, blends sketching talent, beginner Photoshop skills, and bilingual communication into collaborative school projects
    and vibrant social‑media art posts, channeling their curiosity and organized‑yet‑flexible nature into a growing personal brand.
  sports: Zoila Godoy, a casual enthusiast of after‑school basketball at the local community center and a dedicated fan of the Columbus Crew and the Ohio State Buckeyes football team, keeps fit by sketching
    outdoors during park runs and occasionally joins a weekend yoga class to balance their creative energy with physical wellness.
  arts: Zoila Godoy immerses themselves in the arts by studying the brushwork of Frida Kahlo, drawing inspiration from the storytelling animation of Studio Ghibli, listening to folk ballads from their family's
    heritage alongside contemporary pop artists like Billie Eilish, and regularly attending exhibitions at the Columbus Museum of Art, which fuels their own sketchbook and digital comic creations.
  travel: Zoila Godoy dreams of traveling to vibrant locales such as the historic streets of Barcelona, the bustling markets of Marrakech, and the serene national parks of the Pacific Northwest, preferring
    DIY itineraries that blend cultural workshops, street photography opportunities, and budget‑friendly hostels, while also cherishing frequent day trips to nearby Ohio state parks for spontaneous sketching
    sessions.
  culinary: Zoila Godoy enjoys experimenting with traditional corn‑based dishes like tamales and elote, combining fresh cilantro, jalapeño, and masa dough with family‑passed recipes, while also mastering
    quick weeknight meals such as avocado toast with feta and spicy salsa, and they often document their culinary experiments with vibrant photographs for their Instagram feed.
  core: Zoila Godoy is a curious, organized teen who channels a love for sketching, bilingual storytelling, and occasional impulsive candy cravings into a vivid, culturally‑inspired artistic journey.
background:
  cultural: Zoila was raised in a Mexican‑American household that blends vibrant Mexican traditions with life in suburban Ohio. She speaks Spanish at home and English at school, making her bilingual. Family
    celebrations include Día de los Muertos, Las Posadas, and other Mexican holidays, featuring altar‑building, traditional foods, and gatherings that emphasize respect for elders and community solidarity.
    Her parents instill pride in cultural heritage, which Zoila expresses through her art. Living in Powell, she engages with the local Hispanic community, attends cultural festivals, and navigates a bicultural
    identity that informs both her creative perspective and social outlook.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Sketching and drawing'', ''Basic digital illustration'', ''Introductory graphic design (Canva, basic Photoshop)'', ''Photography basics'', ''Social
