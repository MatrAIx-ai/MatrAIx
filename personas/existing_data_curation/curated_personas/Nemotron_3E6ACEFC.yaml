  hobbies: '[''Sketching and drawing'', ''Watercolor and acrylic painting'', ''Visiting art museums and galleries'', ''Listening to Mexican folk and contemporary music'', ''Cooking traditional Mexican dishes'',
    ''Journaling and poetry writing'', ''Photography of everyday life'', ''DIY crafts and handmade jewelry'', ''Playing creative puzzle video games'', ''Participating in community cultural festivals'']'
  career_goals: Zoila aims to combine her passion for art with her bicultural identity by completing her high school education through an alternative program and then pursuing a graphic design or illustration
    degree at a community college or art institute. Her long‑term goal is to become a freelance illustrator and visual storyteller who creates work that celebrates Mexican traditions and contemporary themes.
    She also hopes to collaborate with community organizations that promote cultural arts and eventually mentor younger artists from underrepresented backgrounds.
