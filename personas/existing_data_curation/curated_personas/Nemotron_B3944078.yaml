  career_goals: Kathryn aims to advance from first‑line supervisor to regional manager of a landscaping firm within the next five years, leveraging her practical expertise and leadership skills. She also
    dreams of launching her own sustainable landscaping business focused on low‑water designs for the Southwest, ultimately earning a Certified Landscape Professional credential. Beyond career advancement,
    she seeks greater financial stability to reduce personal anxiety, and hopes to mentor other workers from non‑traditional educational backgrounds, fostering a supportive community within the industry.
