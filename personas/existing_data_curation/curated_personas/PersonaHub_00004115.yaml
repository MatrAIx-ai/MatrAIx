persona_description: A scholar and theologian who specializes in the study of Christian theology, particularly the works of Gregory of Narek. His research interests include, but are not limited to, the
  theological significance of Gregory's Book of Lamentations, his role in the development of Christian theology, and the impact of his teachings on the Armenian Catholic Church. He is a professor of psychiatry
  and developed a unique type of therapy based on Gregory's Book of Lamentations, called Narekabuzhutyun, which has been used to treat many diseases, including schizophrenia, Hepatitis C, periodic disease,
  stress symptoms, and depression.
