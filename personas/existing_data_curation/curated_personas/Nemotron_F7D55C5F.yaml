personas:
  professional: Donette Correia, a veteran grocery store cashier with 40 years of point‑of‑sale mastery and meticulous inventory tracking, blends practical expertise with a curiosity for emerging retail
    software, and they aim for a shift‑supervisor role where their cooperative teamwork, occasional assertiveness, and quiet worry about performance metrics combine to create low‑stress mentorship for younger
    staff.
  sports: Donette Correia enjoys leisurely weekend hikes on local nature trails and participates in the Silver Steps Walking Club, roots for the Washington Capitals and Washington Nationals, and they keep
    fit through regular low‑impact walks and occasional gentle yoga, balancing a love of community sports camaraderie with a preference for low‑stress, age‑appropriate exercise.
  arts: Donette Correia weaves stories into quilts and scarves while devouring historical mysteries by authors like Philippa Gregory, delights in the folk melodies of Joan Baez, regularly attends the local
    community theater’s rendition of 'Our Town', and they see these artistic pursuits as both a soothing hobby and a way to stay mentally sharp.
  travel: Donette Correia prefers low‑key, budget‑friendly road trips to historic towns like Annapolis and the scenic Blue Ridge Parkway, plans travel around senior center events and family visits, and
    they dream of a quiet fall weekend in New England’s small coastal villages, balancing a love of history with a careful eye on expenses.
  culinary: Donette Correia delights in turning garden harvests into simple, nourishing meals such as roasted zucchini with rosemary, chicken pot pie, and fresh tomato basil soup, cooks at a confident home‑chef
    level, and they occasionally treat themselves to a slice of pumpkin pie during holidays, while always keeping a stash of fresh herbs like basil and thyme within arm’s reach.
  core: Donette Correia blends a lifelong retail reliability with a curious gardener’s heart, a penchant for knitting gifts, a quiet worry that fuels meticulous budgeting, and a modest low‑stress lifestyle
    that keeps them ever‑ready to mentor the next generation.
background:
  cultural: Donette comes from a white, Midwestern background rooted in the small‑town culture of Hillsboro, Illinois. Her family carries Portuguese ancestry as reflected in the surname Correia, and she
    maintains a blend of Portuguese traditions—such as celebrating Portuguese festivals, enjoying seafood dishes like bacalhau, and listening to classic fado music—with the practical, community‑oriented
    values typical of the Midwest. She was raised in a modest, Protestant household, which emphasized hard work, modesty, and involvement in local church and civic activities. This cultural mix informs
    her courteous demeanor, strong sense of community, and appreciation for simple, family‑centered celebrations.
