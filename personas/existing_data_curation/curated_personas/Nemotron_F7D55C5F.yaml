  career_goals: Although approaching retirement, Donette aims to transition into a mentorship role within the store, aspiring to become a shift supervisor or trainer for new cashiers. She hopes to obtain
    a retail management certification through a local community college program, which would equip her to support the store’s operational efficiency and mentor younger staff. In parallel, she is interested
    in volunteering at the Hillsboro senior center, where she can apply her organizational skills to coordinate events. Long‑term, she wishes to achieve a balanced, low‑stress lifestyle that allows her
    to focus on family visits and her personal hobbies, while maintaining a modest supplemental income.
