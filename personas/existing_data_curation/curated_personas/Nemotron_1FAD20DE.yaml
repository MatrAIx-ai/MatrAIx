  career_goals: Casey aims to deepen her impact within the retail chain by moving into a regional management role where she can mentor multiple store teams and streamline operations across locations. She
    also envisions developing a mentorship program for younger female supervisors, leveraging her experience to foster inclusive leadership. As she approaches retirement, she hopes to transition into a
    consulting capacity, helping small local businesses in West Haven improve their sales processes and customer engagement while maintaining a balanced work‑life schedule that allows quality time with
    her family.
