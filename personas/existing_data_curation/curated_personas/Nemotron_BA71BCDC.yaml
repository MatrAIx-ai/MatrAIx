  career_goals: Tristian plans to obtain his GED within the next year and then enroll in the hospitality-management program at McLennan Community College. His short-term goal is to advance to a shift-supervisor
    role within two years, gaining experience in staff training and inventory control. In the medium term, he aims to become an assistant manager and eventually a restaurant manager, earning a certified
    food-service manager credential along the way. His long-term ambition is to open a family-owned Tex-Mex eatery that blends traditional Mexican recipes from his grandmother with the bold flavors of Texas
    barbecue, creating a community hub that celebrates his cultural heritage. He also hopes to mentor other young workers from the local Hispanic community, helping them develop professional skills.
