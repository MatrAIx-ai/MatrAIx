personas:
  professional: Tristian Alfonso is a bilingual, methodical waiter at a bustling Waco eatery who expertly juggles POS transactions, team scheduling, and customer service while habitually training new staff,
    and they channel an organized, outgoing nature into a clear path toward becoming a hospitality manager and eventually opening a community‑focused Tex‑Mex restaurant.
  sports: Tristian Alfonso plays forward for the Waco SC Amateur Soccer Club, follows the Dallas Cowboys and the Texas Rangers for professional inspiration, and they complement team drills with three weekly
    weight‑lifting sessions at the local gym to stay fit throughout the seasonal soccer league.
  arts: Tristian Alfonso immerses themselves in community festivals dancing to cumbia and salsa beats from artists like Celso Piña, La Sonora Dinamita, and Marc Anthony, while also enjoying live performances
    by regional theater groups and streaming film classics, and they often study choreography videos to refine their moves.
  travel: Tristian Alfonso prefers a mix of carefully planned road trips and spontaneous weekend getaways, having explored Austin, New Orleans, and San Antonio by car, visited Mexico City and Oaxaca on
    a student exchange, and they dream of backpacking through the Andes while staying within a modest travel budget.
  culinary: Tristian Alfonso loves crafting homemade tamales, hand‑pressed tortillas, and chipotle‑brisket tacos, experiments with mezcal margaritas infused with jalapeño, and they regularly sample new
    restaurant menus around Waco to fuse traditional family recipes with bold Texan flavors.
  core: Tristian Alfonso is an energetic, organized 18‑year‑old who balances waiter shifts, soccer matches, and late‑night salsa dances, but they often forget to reply to group texts, earning a reputation
    as the friendly ghost of the local youth center.
background:
  cultural: Tristian grew up in a bilingual Mexican-American household in Waco, Texas. His parents immigrated from Jalisco, and he was raised speaking Spanish at home while attending English-language schools.
    Family gatherings revolve around traditional Mexican dishes, music, and holidays such as Día de los Muertos, Cinco de Mayo, and Christmas posadas. At the same time, he embraces Texan culture—enjoying
    the state’s barbecue, rodeo events, and the vibrant Hispanic community in McLennan County. This blend of cultures has shaped his warm, hospitality-focused outlook, underscoring the importance of community,
    respect for elders, and the value of sharing food as a way to bring people together.
