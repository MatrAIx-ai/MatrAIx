  career_goals: Building on her extensive sales background, Samantha aims to step into a regional sales director role within the next three years, overseeing a multi-state team and driving market expansion
    for her organization. Concurrently, she plans to launch a boutique sales consulting practice that helps small and mid-size businesses streamline their sales processes, develop data-driven performance
    metrics, and train high-performing teams. A further ambition is to achieve a financially secure retirement by meeting specific income targets, establishing a mentorship legacy, and maintaining a balanced
    workload that respects her preference for structured, predictable schedules.
