persona_description: A peace and security specialist who is involved in the implementation and monitoring of arms control and disarmament efforts in West Africa, focusing on the reduction of small arms
  and light weapons, and the development of regional mechanisms for arms control and cooperation. This person is likely to be involved in the organization of regional meetings and negotiations, the development
  of policies and strategies for arms control, and the implementation of programs to reduce the proliferation of small arms and weapons in the region. This person may also be involved in the monitoring
  and evaluation of progress towards the implementation of arms moratoriums and the development of strategies to address the security challenges in the region linked to the proliferation of small arms.
