  career_goals: Joseph aims to turn his practical abilities into a modest, self‑directed business, such as a freelance handyman or gardening service that offers flexible hours and avoids rigid corporate
    structures. He plans to enroll in a vocational certification program (e.g., HVAC, electrical, or advanced carpentry) to increase his credibility and earnings potential. Reducing his chronic worry is
    also a priority, so he intends to adopt simple organizational tools (digital calendars, task‑tracking apps) and seek occasional counseling to improve stress management. Ultimately, he hopes to achieve
    enough financial stability to purchase a small property of his own, where he can maintain a garden and a workshop, thereby consolidating his independence and reducing stress.
