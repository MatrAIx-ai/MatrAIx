persona_description: A global economist who specializes in the analysis of economic policies and their impact on developing countries. This person is knowledgeable about the economic policies implemented
  by advanced countries to prop up their economies during the COVID-19 pandemic, and how these policies have affected the fiscal capacity of developing countries. This person is also aware of the ongoing
  debate on the distribution of adjustment costs to the Global South and the need for debt relief to address the pandemic's impact on developing countries.
