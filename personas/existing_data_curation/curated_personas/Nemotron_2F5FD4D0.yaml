  career_goals: Julius aims to earn his GED and enroll in a community college art program, focusing on concept art and graphic design. He envisions building a professional portfolio that blends his love
    for abstract storytelling with visual media, eventually securing an apprenticeship with a local studio or gaming company. Parallel to his artistic ambitions, he hopes to formalize his role as a youth
    mentor, perhaps pursuing certifications in community outreach or art therapy so he can leverage his creativity to empower other young people in Houston’s neighborhoods.
