  career_goals: Cortny aims to enroll in a community college program that blends environmental science with hands‑on technology, such as sustainable horticulture or renewable‑energy technology. She envisions
    a career where she can employ her curiosity about eco‑friendly solutions while using her practical skill set to design and maintain community gardens, urban farms, or small‑scale renewable installations.
    Long‑term, she hopes to become a project coordinator for a nonprofit organization focused on climate‑resilient local initiatives, eventually leading teams that balance innovative ideas with reliable,
    community‑grounded practices. Her ambition also includes earning certifications in horticulture and basic electrical work, giving her the flexibility to launch her own sustainable‑living consulting
    business if desired.
