personas:
  professional: Cortny Mcmullin, an aspiring community‑college student in sustainable horticulture and renewable‑energy technology, leverages their practical DIY aptitude, organizational savvy, and balanced
    curiosity‑practicality to design pilot garden projects and prototype low‑cost solar irrigation systems.
  sports: Cortny Mcmullin, a regular participant in Puyallup’s trail‑hiking group and a member of the local youth bike club, enjoys weekend rides on the Cedar River Trail, roots for the Seattle Seahawks
    and Seattle Sounders FC, and balances low‑impact cardio with occasional strength training at the community center.
  arts: Cortny Mcmullin, an enthusiastic ukulele player and budding sci‑fi short‑story author, draws lyrical inspiration from Jack Johnson and narrative spark from Octavia Butler, while crafting handmade
    scarves to the soundtrack of Tame Impala, weaving creative expression into daily life.
  travel: Cortny Mcmullin favors weekend getaways to Mount Rainier’s alpine meadows, occasional road trips to Portland’s food markets, and dreams of backpacking New Zealand’s South Island, planning trips
    with detailed itineraries yet leaving room for spontaneous river‑cleanup volunteer stops.
  culinary: Cortny Mcmullin prefers fresh, garden‑grown fare, regularly preparing quinoa bowls with roasted local vegetables, kale chips, and homemade pesto, while indulging in occasional Pacific Northwest
    salmon dishes and experimenting with matcha‑infused smoothies using locally sourced honey.
  core: Cortny Mcmullin is a pragmatic, curiosity‑driven teen who balances environmental activism, DIY tech tinkering, and creative arts, all while juggling school, part‑time work, and a quirky habit of
    knitting scarves for friends during late‑night coding sessions.
background:
  cultural: Cortny was raised in a predominantly white, middle‑class family in Puyallup, Washington, a city known for its strong community ties and proximity to the Puget Sound’s natural landscapes. Her
    upbringing reflects the Pacific Northwest’s cultural emphasis on self‑reliance, environmental awareness, and a mix of suburban and rural traditions. Family gatherings often feature homemade foods and
    seasonal celebrations tied to regional events such as the Washington State Fair and local high‑school sports. The community’s focus on outdoor recreation, stewardship of forests and waterways, and support
    for local artisans has shaped Cortny’s values, fostering both a practical work ethic and a curiosity about sustainable living. While her heritage is primarily European‑American, she identifies with
    the broader regional culture that blends independence with a cooperative, community‑oriented spirit.
