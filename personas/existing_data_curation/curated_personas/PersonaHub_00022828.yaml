persona_description: A person who is passionate about preserving natural landscapes and appreciates the importance of national parks in preserving the environment. This person is aware of the history and
  the controversy surrounding the creation of the Jackson Hole National Monument and the efforts to abolish it. This person is likely to be a conservationist, environmentalist, or a citizen who cares about
  the natural world and wants to protect it. This person may also be a supporter of the Obama administration's America's Great Outdoors initiative and believes that national parks should play a highly prominent
  role in the effort. This person may be knowledgeable about the Valles Caldera National Preserve and may be interested in seeing it transferred to the National Park Service.
