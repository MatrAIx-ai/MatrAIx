persona_description: A team of researchers dedicated to studying the dynamics of glaciers and ice sheets, particularly in the Swiss Alps. The team's work involves field experiments, laboratory experiments,
  and the formulation of models aimed at characterizing glacial processes. They are particularly interested in developing mathematical relationships needed to predict the sliding speeds of glaciers and
  ice sheets, which can help improve understanding of glacial change and associated sea-level rise. The team is led by Neal Iverson, the Smith Family Foundation Chair of the Department of Geological and
  Atmospheric Sciences at Iowa State University, and Lucas (Luke) Zoet, an Assistant Professor in the Department of Geoscience and Geological Engineering at the University of Wisconsin-Madison. The team's
  research is particularly focused on developing sliding laws, which are uncertain mathematical relationships that introduce major uncertainty in the results of computer models aimed at predicting ice-sheet
  flow and associated sea-level rise.
