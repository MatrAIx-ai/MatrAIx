  career_goals: Donna aspires to attend a four-year university on a merit-based scholarship, majoring in environmental engineering or biomedical sciences where she can combine her analytical curiosity with
    practical problem-solving. She envisions a career that contributes tangible solutions to community health or environmental sustainability, such as designing affordable medical devices or developing
    eco-friendly infrastructure. To reach this goal, she plans to maintain top grades, seek internships in research labs, and eventually assume a project-management role that leverages her disciplined organization
    and collaborative skills.
