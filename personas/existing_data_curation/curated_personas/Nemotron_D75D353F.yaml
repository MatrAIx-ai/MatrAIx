personas:
  professional: Carolyn Beavers, a 51‑year‑old arts‑enthusiast and community organizer in Austell, leverages their knack for public speaking and DIY craftsmanship to coordinate local exhibitions, while
    juggling the launch of an online boutique and pursuing arts‑administration certification, despite their tendency to procrastinate on paperwork.
  sports: Carolyn Beavers enjoys weekly pickleball at the Austell Community Center, follows the Atlanta Falcons and Atlanta Hawks fervently, participates in a seasonal adult softball league each spring,
    and fits in sunrise walks in the local park, though they often skip the occasional gym session when their event‑planning calendar overflows.
  arts: Carolyn Beavers spends Saturday nights at community theater productions, draws inspiration from Georgia O’Keeffe’s floral abstractions and the street‑art provocations of Banksy, frequently crafts
    mixed‑media collages while listening to the soulful sounds of Alabama Shakes, and curates pop‑up gallery shows featuring emerging Southern craft artists like Cora Miller.
  travel: Carolyn Beavers favors unstructured weekend getaways to culturally rich spots such as Savannah’s historic squares, the vibrant art districts of Santa Fe, and the bustling night markets of Bangkok,
    often booking flights last‑minute while balancing a modest travel budget that prioritizes authentic experiences over luxury.
  culinary: Carolyn Beavers delights in reinventing Southern comfort foods—think shrimp and grits with miso glaze, fried chicken topped with kimchi slaw, and sweet‑potato pie spiked with ginger and smoked
    paprika—while skillfully juggling their home kitchen and an experimental small‑batch condiment line featuring locally sourced collard greens, black garlic, and smoked pecans.
  core: Carolyn Beavers is a socially charged, creatively restless 51‑year‑old who melds art‑crafters’ zeal with a competitive edge, often juggling community projects, impulsive craft splurges, and a habit
    of over‑committing while forgetting to file the paperwork.
background:
  cultural: Raised in a middle‑class white family in suburban Georgia, Carolyn’s upbringing blends traditional Southern values—such as hospitality, church community, and family gatherings—with exposure
    to the vibrant, multicultural arts scene of nearby Atlanta. The region’s emphasis on community and storytelling influences her love for group activities and local crafts, while the progressive cultural
    landscape of the metro area fuels her openness to unconventional ideas and new artistic expressions.
