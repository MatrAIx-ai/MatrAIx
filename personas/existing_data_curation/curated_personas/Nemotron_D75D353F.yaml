  career_goals: Carolyn aims to channel her sociable energy and competitive drive into becoming a recognized leader in Austell’s local arts scene. She plans to launch a small online boutique selling her
    handmade crafts while pursuing a certification in arts administration to qualify for a volunteer coordinator role at the nearby museum. Long‑term, she hopes to organize a series of community art workshops
    that blend traditional Southern crafts with contemporary techniques, and to build a regional social‑media platform that showcases emerging artists and fosters artistic dialogue.
