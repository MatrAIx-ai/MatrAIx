personas:
  professional: Sheri Boudreaux, a veteran probation supervisor with four decades of experience, now channels their competitive drive and methodical precision into mentoring junior officers, designing evidence‑based
    rehabilitation curricula, and championing an arts‑integrated pilot program that pairs solitary watercolor workshops with high‑risk clients to lower recidivism.
  sports: Sheri Boudreaux avidly follows the Iowa Hawkeyes football and basketball teams, enjoys the occasional sight of the Des Moines Men’s Soccer Club, and maintains a gentle fitness routine of morning
    walks in the native prairie garden, occasionally joining a local bird‑watching hiking group that meets each spring.
  arts: Sheri Boudreaux regularly visits the University of Iowa’s art gallery, collects limited‑edition prints by Andy Warhol and Georgia O’Keeffe, practices watercolor landscapes of prairie flora, and
    finds inspiration in the historical fiction of Hilary Mantel and the ethical essays of Peter Singer, integrating these influences into restorative‑justice workshops.
  travel: Sheri Boudreaux prefers low‑key, contemplative travel, planning trips that blend art museum tours in Chicago, historic plantation sites in the South that trace their family’s migration, and bird‑watching
    excursions to the Flint Hills and National Wildlife Refuges, always budgeting carefully and opting for off‑peak dates to preserve quiet.
  culinary: Sheri Boudreaux delights in preparing garden‑fresh dishes like roasted beet and goat‑cheese salad, wild rice pilaf with sage, and an apple crumble featuring heirloom apples, while occasionally
    treating themselves to an upscale dinner featuring locally sourced trout, all seasoned with a preference for aromatic herbs over strong spices.
  core: Sheri Boudreaux is a solitary, curiosity‑driven former probation supervisor who blends rigorous analytical precision with artistic sensibility, mentors with a competitive edge, tends a native‑prairie
    garden, and meticulously documents every facet of their life.
background:
  cultural: Sheri is a third‑generation white Midwesterner with French‑Canadian ancestry reflected in her surname. Raised in a modest, Protestant‑influenced Iowa town, she embodies the region’s values of
    hard work, self‑reliance, and community service. Her marriage of over forty years anchors her life in family and local tradition, while her graduate studies in education expose her to broader cultural
    currents. The blend of Midwestern pragmatism and a quiet appreciation for arts and heritage shapes her worldview and daily habits.
attributes:
  skills: '[''risk assessment (LSI‑R)'', ''case management'', ''trauma‑informed counseling'', ''program development'', ''adult‑education curriculum design'', ''restorative justice facilitation'', ''staff
    training and mentorship'', ''data analysis and outcome evaluation'', ''documentation and compliance'', ''arts‑based rehabilitation techniques'']'
  hobbies: '[''watercolor painting'', ''visiting art galleries'', ''reading historical fiction'', ''philosophical essay exploration'', ''heritage gardening'', ''birdwatching'', ''crossword puzzles'', ''genealogy
    research'', ''attending university lecture series'']'
  career_goals: Approaching retirement, Sheri aims to transition into a mentorship role, guiding junior probation officers and shaping district‑wide policies on evidence‑based supervision. She plans to
    author a handbook on integrating arts and restorative practices into correctional treatment, and to consult for nearby community colleges on developing correctional‑justice courses. Ultimately, she
    hopes to institutionalize a pilot program that pairs solitary‑time art workshops with high‑risk offenders, improving recidivism rates and earning state recognition for innovative rehabilitation.
