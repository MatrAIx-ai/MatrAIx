personas:
  professional: Cynthia Love, a retired community organizer turned intergenerational art advocate, leverages meticulous project planning, budget management, and public speaking to coordinate senior‑youth
    art collaborations, channeling her disciplined curiosity into every exhibition and workshop.
  sports: Cynthia Love, a dedicated member of the Willamette River Walking Club, enjoys daily river trail walks and gentle yoga, while cheering on the Portland Timbers and Trail Blazers as her favorite
    professional sports teams.
  arts: Cynthia Love, an avid visitor of Albany and Portland galleries, finds inspiration in Georgia O'Keeffe’s floral abstractions and Monet’s water lilies, volunteers at community theater productions
    of classics such as Our Town, and blends these influences into her own watercolor and digital sketches.
  travel: Cynthia Love, who prefers meticulously planned itineraries with a balance of relaxation and cultural immersion, often revisits Oregon’s Columbia River Gorge and the Portland Japanese Garden, while
    dreaming of a spring garden tour in Kyoto and a coastal retreat in Maui.
  culinary: Cynthia Love, an adventurous home cook, delights in reinventing classic mac‑and‑cheese by folding in harissa and smoked paprika, perfecting pumpkin pie with a hint of cardamom, and crafting
    rosemary‑infused sourdough using vegetables fresh from her garden.
  core: Cynthia Love, a curiously disciplined septuagenarian, channels her love of order into thriving gardens and art projects, yet habitually over‑orders exotic spices that linger unopened on her pantry
    shelf.
background:
  cultural: Cynthia’s cultural background is rooted in a white, American Midwestern heritage that migrated to the Pacific Northwest in her early adulthood. Raised in a modest Protestant household during
    the post‑World War II era, she absorbed values of self‑reliance, community service, and reverence for the natural landscape. Living in Albany, Oregon, she has been shaped by the agricultural rhythms
    and folk‑art traditions of Linn County, as well as the region’s growing appreciation for sustainability and the arts. Her lifelong curiosity blends respect for traditional customs with an openness to
    contemporary cultural currents, reflecting the dynamic cultural tapestry of the Pacific Northwest.
