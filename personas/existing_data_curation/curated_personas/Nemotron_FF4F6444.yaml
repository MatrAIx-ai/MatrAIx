  career_goals: Although retired, Cynthia aims to deepen her impact as a community catalyst. She aspires to launch an intergenerational art program that pairs seniors with local youth, curate a traveling
    exhibition of regional folk art, and author a memoir documenting the cultural evolution of Linn County. She also seeks to maintain her physical health through regular walks and gentle yoga, stay mentally
    sharp by learning new digital tools, and continue mentoring younger volunteers in organized community projects.
