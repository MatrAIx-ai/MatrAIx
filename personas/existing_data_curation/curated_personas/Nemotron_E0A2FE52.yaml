personas:
  professional: Pedro Hernandez, a 60-year-old veteran B2B wholesale sales professional, leverages his 35-year track record in manufacturing, fluency in Spanish and English, and disciplined use of Salesforce
    and SAP to build long-term client relationships while mentoring junior staff, and they keep their pipeline meticulously organized, consistently meeting targets as they transition toward consulting and
    mentorship roles.
  sports: Pedro Hernandez enjoys playing in a community soccer league with fellow expatriates, cheering on D.C. United during MLS season, follows the Washington Capitals in the winter, and they stay active
    through a weekly senior fitness class at the local community center, approaching exercise with the same structured, social mindset they bring to their work.
  arts: Pedro Hernandez immerses himself in the church choir, singing hymns and traditional ballads, enjoys listening to 1960s Latin pop icons like José José and Julio Iglesias while cooking, and they spend
    evenings reading historical biographies by David McCullough, which together shape their sense of identity and leisure.
  travel: Pedro Hernandez prefers low-stress, purpose-driven travel, often planning day trips such as evening walks on the National Mall or a weekend fishing excursion on the Potomac, while dreaming of
    a cultural pilgrimage to the historic streets of San Salvador and a relaxed family vacation to Charleston, and they balance their modest retirement budget with a desire for meaningful experiences.
  culinary: Pedro Hernandez is a proficient home chef who lovingly prepares pupusas stuffed with cheese and loroco, handmade tamales seasoned with achiote, and simmered atol de elote sweetened with panela,
    often pairing these dishes with fresh cilantro and lime while the 1960s hits of José José play in the background, and they delight family gatherings and community festivals with these authentic flavors.
  core: Pedro Hernandez, a calm-yet-social 60-year-old who blends disciplined sales expertise with a warm, community-centered spirit, balances meticulous budgeting with spontaneous weekend barbecues, and
    they find peace in cooking traditional dishes while humming 1960s Latin pop.
background:
  cultural: Pedro grew up in a Salvadoran immigrant household in Washington, DC. His parents fled El Salvador during the civil war of the 1980s and settled in the Mount Pleasant neighborhood, a vibrant
    hub for the Salvadoran diaspora. Raised bilingual, he maintains strong ties to Salvadoran traditions—celebrating Día de los Muertos, Semana Santa, and the annual Fiesta de San Salvador. Family gatherings
    revolve around sharing pupusas, atol de elote, and stories of the homeland. A practicing Roman Catholic, Pedro participates in church events that reinforce communal solidarity. His cultural identity
    informs his warm, cooperative demeanor and fuels his commitment to supporting fellow immigrants through his professional work and community volunteerism.
