  hobbies: '[''Playing pretend with friends'', ''Building LEGO sets'', ''Drawing and coloring'', ''Singing Honduran folk songs'', ''Dancing to music'', ''Exploring parks and collecting rocks'', ''Reading
    picture books about animals'', ''Using a tablet for educational games'', ''Helping Mom in the kitchen to make baleadas'']'
  career_goals: Even at six, Ana frequently talks about future roles that let her help others and explore her curiosities. She dreams of becoming a teacher who inspires classmates, a veterinarian who cares
    for animals, or an astronaut who discovers new worlds. Her sociable nature also fuels an ambition to lead community events, especially celebrations that highlight her Honduran heritage.
