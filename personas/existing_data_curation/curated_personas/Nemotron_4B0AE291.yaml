personas:
  professional: Ana Jimenez, a budding architect in her pretend world, channels her curiosity and methodical planning into elaborate LEGO constructions, coordinating with friends to draft blueprints on
    paper before snapping each block into place, which showcases her organized, sociable, and assertive nature even at six.
  sports: Ana Jimenez, a lively member of the neighborhood “Little Lions” soccer club in the fall and the “Mini Dolphins” swim team in the summer, thrives on energetic games of tag at the park and structured
    practice drills, balancing her love for teamwork with a personal habit of counting each lap or goal to satisfy her organized mindset.
  arts: Ana Jimenez, an enthusiastic fan of The Wiggles, Sesame Street characters, and Studio Ghibli’s animated films, spends afternoons drawing vivid scenes of Totoro and other beloved figures, sings folk
    verses passed down by her family, and crafts colorful paper collages, all of which fuel her expressive, talkative personality.
  travel: Ana Jimenez, who enjoys meticulously planned family road trips to places like the Grand Canyon’s junior ranger program and beach days at a nearby shoreline where she builds sandcastles, dreams
    of seeing Japan’s cherry blossom festivals and eagerly catalogs every new rock she collects, reflecting her curiosity‑driven yet organized approach to travel.
  culinary: Ana Jimenez, a budding kitchen helper, delights in assembling baleadas with warm flour tortillas, refried beans, cheese, and avocado alongside her mother, proudly mixes batter for banana pancakes,
    and often insists on sprinkling cinnamon on fruit salads, showcasing her love for hands‑on cooking and family flavors.
  core: Ana Jimenez is a talkative, organized six‑year‑old whose boundless curiosity fuels endless LEGO skyscrapers, folk‑song rehearsals, and spontaneous kitchen experiments, even as they occasionally
    hoard coins in a piggy bank and forget to bring their inhaler to the playground.
background:
  cultural: Ana grows up in a bilingual Honduran‑American household in Riverton, Utah. At home she speaks Spanish with her parents and grandparents, while at school she uses English. Her family celebrates
    Honduran holidays such as Día de la Independencia (September 15) and Semana Santa, and they enjoy traditional foods like baleadas, pupusas, and atol de elote during gatherings. The local community center
    often hosts multicultural events where Ana participates in dance and music workshops that showcase her heritage, fostering pride in both her Honduran roots and her American community.
attributes:
  skills: '[''Basic reading of picture books'', ''Counting and number recognition up to 20'', ''Bilingual communication in Spanish and English'', ''Organizing simple group games'', ''Following multi-step
