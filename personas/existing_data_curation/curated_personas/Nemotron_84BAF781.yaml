  career_goals: Pamela aims to transition from a hands‑on janitorial role to a supervisory position where she can mentor younger staff and develop a supportive training program that emphasizes teamwork
    and compassion. She hopes to spearhead community‑based cleaning projects that enhance neighborhood harmony. While planning for a gradual retirement, she envisions continuing part‑time work as a volunteer
    coordinator for a local senior center, leading art‑related workshops and fostering inclusive social activities. Pamela also aspires to deepen her personal art practice by attending workshops and possibly
    exhibiting her watercolor pieces in community galleries.
