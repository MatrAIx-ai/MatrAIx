  career_goals: Thomas is fascinated by machines and structures. He hopes that when he grows older he can become a mechanical engineer or a truck mechanic, roles that let him design, build, and maintain
    the big rigs and equipment he sees around Williston. He also envisions helping his family’s small farm or joining future construction projects in his town, applying his practical skills and love for
    orderly, tangible work. For now, his immediate goal is to complete more challenging LEGO creations and earn a scouting badge related to tools and basic repair.
