personas:
  professional: Alicia Hennessey, a licensed practical nurse with five years in outpatient primary care and home health, relies on their practical, checklist driven mindset and competitive edge to excel
    at routine patient assessments, medication administration, and EMR documentation while mentoring peers and pursuing a charge nurse role after earning their RN.
  sports: Alicia Hennessey, an avid hiker who belongs to the Colorado Mountain Club, regularly tackles alpine trails in the Rockies, follows the Denver Broncos and the Colorado Avalanche, participates in
    community yoga classes twice a week, and squeezes in a weekend ski session when the snowpack permits.
  arts: Alicia Hennessey, who finds creative balance in cross stitch projects and listening to folk favorites like The Lumineers and John Denver, attends the Colorado Ballet’s seasonal performances and
    the local community theater’s productions, and devotes their monthly book club evenings to practical non fiction that fuels both professional growth and personal curiosity.
  travel: Alicia Hennessey, a weekend road trip enthusiast, plans family outings to nearby national parks such as Rocky Mountain and Yellowstone, harbors a bucket list ambition to trek the Swiss Alps, leverages
    Google Flights for budget friendly international getaways, and prefers a mix of adventure hiking and relaxed cabin stays that fit their flexible schedule.
  culinary: Alicia Hennessey, a confident home cook who meal preps quinoa and kale salads with roasted sweet potatoes, grilled trout seasoned with lemon, dill, and rosemary, and occasional Colorado green
    chili, enjoys sourcing fresh produce from the local farmers market, yet sometimes forgets to defrost meat in time for dinner.
  core: Alicia Hennessey, a community oriented nurse with a competitive streak, blends meticulous patient care with a relaxed, occasionally disorganized home life, thriving on routine while embracing flexibility.
background:
  cultural: Alicia grew up in a middle‑class family in the Denver suburbs. Her parents, of Irish and German ancestry, emphasized practicality, self‑reliance, and community service. Raised in a Protestant
    household, she participated in church‑organized volunteer programs such as food‑bank drives and health fairs. The Colorado lifestyle—outdoor recreation, a strong focus on health, and a community‑oriented
    spirit—shaped her love for hiking, gardening, and nursing. These cultural influences give her a pragmatic worldview grounded in family values, faith, and a commitment to serving her local community.
attributes:
  skills: '["Patient assessment", "Medication administration", "Basic wound care", "Health‑education counseling", "Electronic medical record (EMR) management", "Triaging and prioritizing care", "Coordination
    with multidisciplinary team", "Discharge planning for home health", "Basic IV therapy", "Documentation and compliance"]'
  hobbies: '["Vegetable gardening", "Meal‑prepping and healthy cooking", "Yoga", "Mountain hiking and nature photography", "Monthly trivia nights", "Quarterly book club", "Journaling", "Cross‑stitch craft"]'
  career_goals: Alicia plans to advance her nursing credentials by earning an Associate of Applied Science in Nursing (AAS) to become a Registered Nurse within the next two years. She intends to specialize
    with a wound‑care certification and hopes to take on a charge‑nurse or nurse‑educator role in her current community clinic. Driven by a competitive streak, she aims to lead a quality‑improvement project
    that reduces medication errors and streamlines charting processes. Long‑term, she envisions a stable supervisory position that allows a predictable schedule for her family, combined with part‑time consulting
    for home‑health agencies.
