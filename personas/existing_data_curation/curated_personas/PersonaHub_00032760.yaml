persona_description: A conservation scientist who specializes in the testing and evaluation of materials for use in display cases and coin storage. This individual has developed a specialized test, the
  Oddy Test, to determine the safety of various materials in contact with coins. The test involves placing a metal coupon in an enclosed space with a given material, and if the metal coupon is corroded
  within 28 days, the material is considered unsafe. This individual uses the Oddy Test to evaluate the safety of various materials for use in display cases and coin storage.
