persona_description: A historian who specializes in the study of the Protestant Reformation and its impact on the development of the English economy. Their research interests include the legal and economic
  implications of interest payments on loans, the impact of the Financial Revolution on the English economy, and the role of the Franciscans and Dominicans in the development of the anti-usury campaign.
  They are particularly interested in the late introduction of the Financial Revolution into England and its impact on the reduction of borrowing costs and the development of international trading networks.
