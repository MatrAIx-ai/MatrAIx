  career_goals: Over the next five years Salome aims to advance from her current managerial role to a senior director position overseeing regional operations across Nevada, leading a cross‑functional initiative
    to streamline processes and improve profitability. Ultimately she envisions founding a boutique consulting firm that helps midsize businesses enhance operational efficiency while cultivating resilient,
    high‑performing cultures. She also seeks to mentor emerging female leaders and champion diversity and inclusion programs within her industry.
