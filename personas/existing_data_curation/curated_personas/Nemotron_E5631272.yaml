personas:
  professional: A community‑focused police officer, Gelasio Iraheta blends a background in education with advanced crisis‑negotiation, data‑driven crime analysis, and bilingual communication to build trust
    across neighborhoods, while their organized, compassionate nature drives meticulous report writing, methodical planning, and the creation of culturally responsive training programs for fellow officers.
  sports: An enthusiastic fitness advocate, Gelasio Iraheta plays and coaches youth soccer for the local U12 boys team, follows the Minnesota Vikings and Timberwolves, hikes Minnesota’s state parks during
    summer weekends, and maintains a disciplined weekly routine of running, weight training, and salsa dancing to stay energetic and socially connected.
  arts: An avid cultural participant, Gelasio Iraheta frequents salsa nights featuring the sounds of Marc Anthony and Celia Cruz, volunteers at community theater productions, devours true‑crime tales by
    Ann Rule and historical nonfiction by David McCullough, and draws inspiration from the modern paintings of Frida Kahlo and the murals of Diego Rivera.
  travel: A moderately adventurous traveler, Gelasio Iraheta prefers well‑planned family road trips, has explored a South American coastal town famed for its fresh seafood, enjoys weekend escapes to New Orleans
    for live jazz, and keeps a bucket‑list spot for a high‑altitude mountain trek in Patagonia to experience rugged wilderness when time and finances align.
  culinary: A confident home chef, Gelasio Iraheta masters traditional coastal dishes such as encebollado and ceviche, routinely experiments with lime, cilantro, and plantain in flavorful concoctions, delights
    friends and family at festive gatherings, yet occasionally over‑spices the broth in pursuit of bold flavor and adds an extra squeeze of hot sauce to every plate.
  core: Gelasio Iraheta is a compassionate, organized community officer who channels boundless energy into coaching soccer, salsa dancing, and culinary creativity, while juggling a penchant for meticulous
    budgeting and occasional night‑shift‑induced fatigue.
background:
  cultural: Gelasio is a first‑generation Ecuadorian American whose parents emigrated from Guayaquil in the early 1990s. He grew up speaking Spanish at home while attending English‑language schools, giving
    him a bicultural fluency that informs his everyday interactions. Family celebrations of Carnaval, Día de los Difuntos, and traditional holiday meals keep his Andean roots vibrant. In Minneapolis, he
    actively participates in the local Ecuadorian diaspora, contributing to cultural events, supporting new immigrants, and sharing Ecuadorian cuisine. His upbringing emphasized education, community solidarity,
    and hospitality, values that shape his compassionate approach to policing and his commitment to fostering harmony between diverse communities.
attributes:
  skills: '[''Community Policing'', ''Crisis Negotiation & De‑escalation'', ''Conflict Resolution'', ''Bilingual Communication (Spanish/English)'', ''Youth Mentorship & Educational Outreach'', ''Report
