    Training'', ''Strategic Planning & Scheduling'', ''Firearms Proficiency'']'
  hobbies: '[''Playing soccer'', ''Coaching youth soccer'', ''Salsa dancing'', ''Cooking traditional Ecuadorian cuisine'', ''Hiking in Minnesota state parks'', ''Reading historical nonfiction'', ''Attending
    community festivals'', ''Volunteering at local youth centers'', ''Exploring police technology advancements'', ''Participating in trivia nights'']'
  career_goals: Gelasio aims to transition into a senior community liaison role or become an instructor at the police academy, where he can leverage his education background to shape the next generation
    of officers. He plans to pursue a master’s degree in public administration or criminology within the next five years to qualify for supervisory positions such as sergeant or precinct commander. A core
    ambition is to develop a citywide youth outreach program targeting at‑risk Latino youth, reducing gang involvement and fostering academic achievement. Long‑term, he hopes to influence municipal policing
    policies to embed equitable, culturally competent practices across the department.
