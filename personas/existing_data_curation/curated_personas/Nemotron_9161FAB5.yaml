  career_goals: She aims to transform her bakery into a community hub that offers workshops, a pop‑up gallery for local artists, and a line of heritage‑inspired baked products celebrating African‑American
    culinary traditions. Over the next five years she plans to author a cookbook that blends classic soul‑food desserts with contemporary techniques, mentor younger bakers from underserved backgrounds,
    and secure a partnership with a regional farmers market to source and promote locally grown ingredients.
