personas:
  professional: Ivy Rollins, a retired art historian turned community archivist, leverages her deep knowledge of modern movements and meticulous grant‑writing skill to curate traveling senior‑artist exhibitions
    while delighting volunteers with spontaneous watercolor workshops, and they balance organized project timelines with the free‑flow of creative improvisation.
  sports: Ivy Rollins enjoys leisurely beach walks at sunrise, joins a low‑impact senior yoga class at the community center each spring, follows the New Smyrna Beach Hurricanes high school football team
    with spirited tailgates, and they never miss a Tampa Bay Rays game on opening day, though they rarely engage in competitive sports beyond gentle swimming.
  arts: Ivy Rollins, an ardent admirer of Jackson Pollock’s drip canvases, Georgia O’Keeffe’s floral abstractions, and Yayoi Kusama’s polka‑dot installations, spends afternoons sketching sea‑foam motifs,
    writes poetry inspired by Heidegger’s essays, and they frequent intimate gallery openings featuring emerging local painters such as Maya Torres and Alejandro Ruiz.
  travel: Ivy Rollins prefers low‑key, culturally rich trips, such as a weekend art retreat in Taos, New Mexico, a nostalgic train journey along the Florida East Coast to St. Augustine, and a relaxed cruise
    to the Bahamas where they explore coral reefs, yet they avoid crowded tourist hubs, opting instead for quiet beachfront B&Bs with garden patios.
  culinary: Ivy Rollins delights in cooking fresh grouper ceviche with lime and cilantro, perfecting key‑lime pie crusts infused with a hint of orange zest, and they grow basil, rosemary, and heirloom tomatoes
    in their native‑Florida garden, often pairing meals with locally roasted coffee while occasionally over‑seasoning dishes with an extra pinch of sea salt.
  core: Ivy Rollins, a 76‑year‑old coastal artist‑scholar, blends disciplined community service with boundless imagination, punctuating days with watercolor meditations, meticulous grant paperwork, and
    a gentle stubbornness about skipping dental floss.
background:
  cultural: Ivy grew up in a Midwestern American family during the post‑war era, absorbing values of community service, self‑reliance, and an appreciation for the arts. After moving to Florida in her 40s,
    she embraced the coastal culture of New Smyrna Beach, with its historic downtown, vibrant arts scene, and close connection to the Atlantic. Her cultural identity blends traditional white American heritage
    with the relaxed, nature‑oriented lifestyle of coastal Florida, influencing her love for gardening, beach walks, and the preservation of local history.
attributes:
  skills: '[''Art History'', ''Literary Analysis'', ''Creative Writing'', ''Curating Exhibitions'', ''Grant Writing'', ''Oral History Documentation'', ''Community Project Coordination'', ''Digital Photography'',
