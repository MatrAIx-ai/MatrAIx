  hobbies: '[''Abstract Painting'', ''Creative Writing (Poetry & Short Stories)'', ''Reading (Literature, Philosophy, Art Theory)'', ''Beach Walking & Bird-watching'', ''Native Plant Gardening'', ''Digital
    Photography'', ''Volunteering at Historical Society'', ''Attending Small Art Gatherings'', ''Knitting'']'
  career_goals: Ivy aims to continue developing her artistic practice, focusing on abstract painting and mixed‑media work that reflects her imagination. She hopes to publish a collection of short stories
    and poems that capture the nuances of aging and coastal life. She aspires to mentor younger artists through a small intergenerational art workshop and to curate a traveling exhibition of senior artists
    from Florida. Additionally, she seeks to preserve local history by creating a digital archive of oral histories from New Smyrna Beach residents. Finally, she wishes to maintain her involvement in community
    garden projects, emphasizing sustainable native planting.
