persona_description: A researcher in developmental biology, specifically focusing on the study of sex change in fish and other vertebrates, including humans. They have expertise in using high-throughput
  RNA-sequencing and epigenetic analyses to uncover the genetic mechanisms underlying this process. The persona is passionate about understanding how complex networks of genes interact to determine and
  maintain sex, not only in fish but in vertebrate animals generally. They are interested in the potential applications of their research in fields such as tissue and organ engineering, aquaculture, and
  medical science. The persona is highly collaborative and has extensive experience in working with international partners, including the University of Otago and colleagues from North Carolina State University,
  USA.
