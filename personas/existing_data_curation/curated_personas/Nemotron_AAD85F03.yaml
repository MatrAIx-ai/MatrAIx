  hobbies: '[''Gardening'', ''Woodworking'', ''Reading classic literature'', ''Local history exploration'', ''Genealogy'', ''Community theater'', ''Bridge'', ''Church choir participation'', ''Cooking Southern
    cuisine'', ''Walking/hiking'', ''Traveling to historic sites'']'
  career_goals: Although retired from full-time work, Roger aims to deepen his impact on the Mocksville community. He plans to serve as chair of the Mocksville Historical Society, leading efforts to preserve
    and share local heritage. He hopes to author a book that weaves oral histories of Iredell County families, drawing on his genealogical work. Additionally, he aspires to develop an intergenerational
    mentorship program that pairs seniors with high-school students for history projects. Roger also intends to take a short course in digital archiving to modernize the society’s records and to travel
    to historic sites in the Southeast to broaden his perspective.
