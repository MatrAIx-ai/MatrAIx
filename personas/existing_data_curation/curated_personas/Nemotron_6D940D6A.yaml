personas:
  professional: Rachel Myers, a 25-year-old front‑of‑house specialist, leverages her meticulous bullet‑journal planning and love of visual aesthetics to streamline high‑tempo bar service, train shift teams,
    and design art‑inspired cocktail menus as she climbs toward a head bartender role.
  sports: Rachel Myers hikes the Appalachian foothills year‑round, attends weekly Vinyasa yoga at the downtown wellness studio, follows the Charlotte Hornets for basketball and the Asheville Tourists for
    minor‑league baseball, and belongs to the Asheville Outdoor Explorers hiking club, where her competitive edge pushes her to top the group’s elevation‑gain leaderboard each season.
  arts: Rachel Myers frequents local galleries, draws inspiration from Monet’s watercolors, Ansel Adams’s black‑and‑white photography, and Georgia O’Keeffe’s bold floral compositions, creates her own watercolor
    series of street scenes, curates pop‑up exhibitions at the community arts center, and discusses contemporary art podcasts featuring Ai Weiwei and Kehinde Wiley.
  travel: Rachel Myers prefers meticulously planned weekend getaways, documenting itineraries in her bullet journal, balancing adventure hikes in the Great Smoky Mountains with culinary escapes to New Orleans
    for Creole cuisine, and dreaming of a spring trip to Barcelona’s Picasso Museum while keeping future European travel on a disciplined savings timeline.
  culinary: Rachel Myers enjoys experimenting with craft cocktails—mixing rosemary‑infused gin with house‑made bitters—and preparing Southern comfort dishes such as shrimp‑and‑grits, pimento cheese toast,
    and bourbon‑glazed peach cobbler, showcasing a moderate cooking skill that blends quick weekday meals with elaborate weekend tasting menus featuring ingredients like smoked paprika, fresh basil, and
    locally sourced heirloom tomatoes.
  core: Rachel Myers navigates life with an artist’s eye and a bartender’s hustle, obsessively color‑coding her schedule and over‑planning every night out, yet secretly binge‑watching true‑crime documentaries
    after a long shift.
background:
  cultural: Rachel comes from a white Southern background rooted in Winder, Georgia, a small‑town community in Oconee County. Raised in a family that values Southern hospitality, church involvement, and
    close‑knit neighborhood ties, she grew up with traditions of home‑cooked meals, seasonal festivals, and a strong work ethic. While her ancestry traces back to English and German settlers, Rachel’s upbringing
    also embraced the region’s growing appreciation for the arts—she attended local craft fairs, community theater, and school art programs that sparked her curiosity. This blend of classic Southern values
    and an openness to new cultural experiences shapes her worldview and informs her personal and professional aspirations.
