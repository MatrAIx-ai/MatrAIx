  career_goals: Rachel aims to climb the hospitality ladder, moving from a bartender helper to head bartender and eventually floor manager within the next three to five years. She plans to earn an associate
    degree in hospitality management, obtain a certified mixology credential, and lead a team that delivers a polished, art‑inspired dining experience. Long‑term, she hopes to open a small boutique café
    or gastropub that blends Southern comfort food with a curated art gallery space, showcasing local artists while offering a sophisticated cocktail menu. She also wishes to mentor aspiring hospitality
    workers and compete in regional mixology contests.
