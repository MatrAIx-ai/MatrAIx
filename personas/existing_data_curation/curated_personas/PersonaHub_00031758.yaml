persona_description: A cybersecurity analyst who is responsible for collecting, processing, and disseminating threat intelligence to ensure the organization's security and compliance. This persona is skilled
  in various intelligence collection methods, including pulling metadata and logs from internal networks and security devices, subscribing to threat data feeds from industry organizations and cybersecurity
  vendors, holding conversations and targeted interviews with knowledgeable sources, scraping and harvesting websites and forums, and infiltrating closed sources such as dark web forums. This persona is
  adept at processing raw data, turning it into useful information, analyzing the information, and presenting it as actionable intelligence. This persona is responsible for disseminating threat intelligence
  to the appropriate security teams, ensuring that the intelligence is easily understandable and actionable for each audience. This persona is also responsible for following up with security teams if they
  have questions. This persona is supported by tools such as threat intelligence solutions and existing security tools.
