  hobbies: '["Lego building", "Wooden block construction", "Jigsaw and shape puzzles", "Coloring and drawing", "Storytime (bilingual picture books)", "Helping with simple kitchen chores", "Listening to
    and dancing to merengue/bachata music", "Small‑group cooperative play"]'
  career_goals: Even at four, Jorge dreams of a future where he can help others and work with structured tasks. He often says he wants to become a teacher because he enjoys sharing stories and guiding friends,
    and he also imagines building things like bridges or tall towers, hinting at an aspiration to be a civil engineer or architect. In the short term, his ambition is to master reading and simple math at
    his preschool, earn stickers for good behavior, and be praised for keeping his belongings organized. He envisions growing up to pursue a career that combines order, practicality, and the chance to assist
    his community.
