personas:
  professional: Jorge Ruiz is a meticulous preschooler who thrives on structured learning activities such as sorting blocks and completing puzzles, consistently adhering to a daily routine and holding themselves
    to high standards for neatness, while they prefer quiet solo play and show kindness to peers.
  sports: Jorge Ruiz attends a Tuesday-Wednesday toddler soccer program with the Tiny Tigers club, they eagerly follow the Hometown Hawks baseball team, and they approach each practice with disciplined
    enthusiasm, preferring structured drills over free play.
  arts: Jorge Ruiz delights in drawing colorful animals with neatly organized crayons, they enjoy listening to The Wiggles and Pixar's Toy Story soundtrack, and they spend weekend afternoons arranging stickers
    in patterns, reflecting a disciplined yet creative spirit.
  travel: Jorge Ruiz loves family outings to the nearby zoo where the routine of feeding giraffes provides comfort, they dream of visiting Disneyland's Magic Kingdom, and they prefer well-planned trips
    with clear schedules over spontaneous adventures.
  culinary: Jorge Ruiz enjoys bite-sized chicken nuggets and macaroni-and-cheese, loves arranging sliced strawberries into smiley faces on their plate, and they proudly help stir peanut butter into banana
    sandwiches, always insisting on a tidy, color-coordinated lunch.
  core: Jorge Ruiz is a routine-obsessed, meticulously organized four-year-old whose kindness and disciplined play coexist with occasional resistance to unexpected changes, and they often seek comfort in
    familiar routines.
background:
  cultural: Jorge is a first‑generation Dominican-American raised in Madison, Wisconsin. At home, Spanish is spoken alongside English, and family meals often feature Dominican staples such as mangú, plantains,
    and beans, introducing him to the flavors of his heritage. He participates in community events like the Dominican Independence Day celebration at the local cultural center, where he sees traditional
    dances, hears the rhythms of güira and tambora, and learns about his ancestors' history. His parents emphasize close family bonds, respect for elders, and the value of hard work, all of which shape
    his routine‑oriented and cooperative nature. While integrating into the broader Madison community through preschool and neighborhood playdates, he retains a strong connection to Dominican customs, language,
    and music.
attributes:
  skills: '["Alphabet recognition", "Writing own name", "Counting to 20", "Sorting and categorizing objects", "Pattern matching", "Fine motor skills (drawing, cutting, building blocks)", "Following daily
