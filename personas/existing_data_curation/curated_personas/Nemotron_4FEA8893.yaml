personas:
  professional: A budding junior scientist, Brittany Brenner delights in mixing kitchen ingredients to observe fizzing reactions, and they blend a vivid curiosity for how things work with a practical need
    to keep a tidy lab station, though their relaxed attitude toward obligations often leads to scattered crayons and unfinished experiments.
  sports: Brittany Brenner competes in the neighborhood Little Tigers soccer club, dribbles with unbridled enthusiasm, and they fervently cheer for the Chicago Cubs during baseball season, yet their competitive
    streak sometimes overshadows cooperation with teammates.
  arts: Brittany Brenner devotes afternoons to drawing characters from Dr. Seuss and dancing to the catchy tunes of Disney's Frozen soundtrack, and they avidly collect stickers of The Magic School Bus and
    Paw Patrol heroes, shaping a vibrant creative identity.
  travel: Brittany Brenner dreams of visiting Disneyland in Anaheim and the Grand Canyon, often packing a small backpack with crayons and snacks for spontaneous day trips, but their anxiety sometimes makes
    them cling to familiar routes.
  culinary: Brittany Brenner prefers cheesy macaroni, crunchy chicken nuggets, and strawberry slices, and they proudly stir pancake batter with a wooden spoon, though they sometimes sneak extra chocolate
    chips into the mix when no one is watching.
  core: Brittany Brenner is a wildly curious five‑year‑old whose bright imagination and competitive spirit collide with emotional turbulence and a habit of leaving toys and savings scattered across their
    world.
background:
  cultural: Brittany is raised in a typical Midwestern family in Crystal Lake, Illinois. Her household celebrates American holidays such as Thanksgiving, Christmas, and Independence Day with community traditions,
    potluck meals, and outdoor activities. The family participates in local church gatherings and neighborhood events, emphasizing kindness, togetherness, and appreciation for nature. Growing up near the
    lake and woods, she has a strong connection to seasonal outdoor recreation like hiking, fishing with family, and summer picnics.
