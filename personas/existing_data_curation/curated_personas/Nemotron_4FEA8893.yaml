  career_goals: Brittany dreams of a future where she can explore and help living things. She often talks about becoming a veterinarian or a zookeeper so she can care for animals, and she also imagines
    herself as a teacher who shares fun stories and crafts with other kids. Her competitive streak makes her want to be the best at these roles, and she envisions leading nature‑based projects or school
    science fairs.
