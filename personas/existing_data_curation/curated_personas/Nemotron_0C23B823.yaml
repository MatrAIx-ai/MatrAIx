  career_goals: Jason dreams of a future where he can blend his love for art, nature, and helping others. He hopes to become an environmental educator or science illustrator who creates engaging visuals
    for textbooks and community workshops. He also aspires to be a teacher who inspires curiosity in younger students and a wildlife photographer who raises awareness about local ecosystems. Ultimately,
    he wants a career that allows him to use his creativity, organization, and empathy to make a positive impact.
