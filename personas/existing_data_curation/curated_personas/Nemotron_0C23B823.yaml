  hobbies: '[''Drawing cartoons'', ''Painting landscapes'', ''LEGO building'', ''Soccer'', ''Basketball'', ''Scavenger hunts'', ''Art club'', ''Robotics club'', ''Reading fantasy books'', ''Exploring nature'',
