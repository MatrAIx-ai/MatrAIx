personas:
  professional: Jason Lynn, a 9‑year‑old aspiring robotics enthusiast and budding game developer, merges curiosity with systematic planning to build LEGO robots, code simple Scratch games, and lead school
    art‑tech projects while ensuring teammates feel included.
  sports: Jason Lynn, a forward on the neighborhood soccer league and guard on the school basketball team, practices three times weekly, cheers for the Chicago Bulls and the River City Rovers, and balances
    energetic play with post‑game stretching to avoid soreness.
  arts: Jason Lynn, a young cartoonist and watercolor enthusiast, draws inspiration from the whimsical style of Dr Seuss, studies Monet’s landscapes for color, watches Pixar’s 'Inside Out' for storytelling,
    collects LEGO art kits, and frequently shares original comic strips at the school art club while humming Billie Eilish’s soft pop melodies.
  travel: Jason Lynn, who loves both backyard explorations and far‑flung adventures, enjoys family road trips that blend learning and excitement—having camped in Yosemite, visited the Smithsonian National
    Air and Space Museum, and dreaming of the LEGO House in Billund—while drafting detailed checklists for each journey to soothe their worry about the unknown.
  culinary: Jason Lynn, an enthusiastic young chef, loves assembling DIY pizza with mozzarella, pepperoni, and fresh basil, mixing fruit salads with strawberries, blueberries, and a squeeze of lemon, and
    experimenting with colorful edible paints to decorate cupcakes, though they sometimes over‑indulge in sugary snacks after long art sessions.
  core: Jason Lynn, a curious, organized, and sociable nine‑year‑old, channels worry into meticulous planning for art, robotics, and adventures, often juggling LEGO builds, sketchbooks, and impromptu scavenger
    hunts while occasionally over‑snacking on candy.
background:
  cultural: Jason is a white American growing up in Wanette, a small town in Pottawatomie County, Oklahoma. His family’s heritage includes German and Irish roots, common in the Midwestern region. The community
    places a strong emphasis on family, church, school, and local traditions such as the county fair, high school football games, and Fourth of July celebrations. He attends a rural elementary school where
    cooperative values and respect for neighbors are taught. The surrounding prairie and oak trees inspire his love of nature, and he participates in church youth groups and library reading programs that
    reflect the close‑knit, modest lifestyle of his hometown.
