personas:
  professional: Raul Ramos is a budding teen gaming influencer and aspiring game designer who synthesizes his strategic insights from Minecraft and Fortnite with the improvisational creativity of skateboarding,
    delivering weekly YouTube tutorials and concept sketches that showcase innovative level ideas, all while occasionally slipping on deadlines due to a relaxed, flexible planning style.
  sports: Raul Ramos is a dedicated skateboarder who spends afternoons at the downtown skate park with the Freedom Flyers club, plays competitive pickup basketball on the neighborhood court while cheering
    for the Los Angeles Lakers, and follows the NBA season religiously, occasionally streaming their own skate tricks live for fans.
  arts: Raul Ramos is a creative teen who fills a sketchbook with comic‑style characters, strums the guitar by learning hits from Bad Bunny, Travis Scott, and J Balvin, and edits short YouTube videos that
    mash up gaming moments with pop‑culture memes, sharing their work with a growing online audience.
  travel: Raul Ramos enjoys weekend road trips to the nearby coastal cliffs for sunset skate sessions, dreams of backpacking to Tokyo to explore its gaming arcades and skate spots, and plans a future family
    vacation to the national park’s hiking trails for a mix of adventure and relaxation.
  culinary: Raul Ramos favors pepperoni pizza and street‑style tacos after a skate session, experiments with quick recipes like chicken quesadillas and instant ramen bowls, and occasionally attempts to
    perfect guacamole using fresh avocados and lime.
  core: Raul Ramos blends gaming strategy, skateboarding freedom, and creative storytelling into an energetic teen persona, yet their easygoing approach often leads to procrastination and impulse spending.
background:
  cultural: Raul grows up in a vibrant Mexican‑American community in Los Angeles. His household speaks both Spanish and English, and family gatherings center around traditional foods like tacos, tamales,
    and mole. He participates in cultural celebrations such as Día de los Muertos parades, Latino heritage festivals, and community service events that emphasize family ties and mutual support. Stories
    from his grandparents about immigration instill in him a sense of pride and responsibility toward his heritage, influencing his desire to represent Latino culture in his creative projects and future
    career.
