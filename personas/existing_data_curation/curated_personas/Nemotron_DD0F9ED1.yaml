  career_goals: Raul aspires to merge his love for technology and art by pursuing a career in graphic design or video game development, where he can create immersive experiences that celebrate his cultural
    roots. He also sees value in a hands‑on technical field such as mechanical engineering or automotive technology, providing a stable and practical career path. His immediate goal is to join a specialized
    high‑school program in Los Angeles that offers advanced courses in digital media, coding, and engineering, followed by a university degree that blends creative design with technical expertise. He hopes
    his future work will both showcase Latino culture and offer practical solutions to everyday problems.
