  career_goals: Kara aims to advance to a facilities manager role where she can integrate her STEM background with operational leadership to champion green cleaning initiatives across multiple sites. She
    plans to obtain certifications in Facility Management (e.g., IFMA) and Sustainable Operations, and to develop a mentorship program that prepares the next generation of housekeeping supervisors. Over
    the next five years, she hopes to implement energy‑efficient and waste‑reduction strategies that become models for other Connecticut facilities, while also positioning herself for a potential consulting
    role in sustainable facility operations post‑retirement.
