    cost control","Technical troubleshooting of cleaning equipment"]'
  hobbies: '["Gardening (vegetables and flowers)","Reading scientific and nature literature","Birdwatching","Nature photography","Knitting","Crossword puzzles","Sudoku","Cooking experimental recipes with
