personas:
  professional: Kara Richards, a 56-year-old facilities supervisor with a STEM background, combines meticulous metric tracking and green cleaning expertise with a relaxed, curiosity‑driven leadership style,
    allowing them to mentor staff compassionately while occasionally letting paperwork slip through the cracks.
  sports: Kara Richards, a 56-year-old who favors solitary early‑morning walks and occasional weekend hikes, follows the New England Patriots and Hartford Yard Goats for a touch of community spirit while
    they keep fit by tending to their garden and practicing gentle yoga at home.
  arts: Kara Richards, a 56-year-old nature‑loving knitter and photographer, draws inspiration from Ansel Adams' landscapes, finds solace in Jane Austen's novels, and unwinds to the folk melodies of Joan
    Baez while they stitch intricate shawls and capture seasonal changes on film.
  travel: Kara Richards, a 56-year-old who prefers low‑key, nature‑focused getaways, plans trips around birdwatching hotspots like Acadia National Park and the Adirondacks, enjoys leisurely drives through
    New England, and dreams of strolling the cherry‑blossom avenues of Kyoto while they keep a loosely organized travel notebook.
  culinary: Kara Richards, a 56-year-old avid gardener and home chef, delights in crafting seasonal dishes such as heirloom tomato gazpacho, rosemary‑infused roasted carrots, and quinoa‑stuffed peppers,
    often improvising with fresh basil and locally sourced kale while they occasionally over‑salt a stew in the excitement of experimentation.
  core: Kara Richards, a 56-year-old facility supervisor who balances green‑cleaning innovation with a habit of misplacing their keys, thrives on solitary garden mornings and quietly questions the status
    quo while they gently mentor their team.
background:
  cultural: Kara grew up in a middle‑class, white Anglo‑American family in the Greater Hartford area. Her upbringing in New England emphasized education, community involvement, and self‑reliance. She maintains
    strong ties to local traditions, including participation in neighborhood volunteer clean‑up events and regular attendance at her community church. The New England cultural values of practicality, modesty,
    and respect for quiet, personal space resonate strongly with her personality. Her STEM education reflects the regional emphasis on academic achievement and innovation.
