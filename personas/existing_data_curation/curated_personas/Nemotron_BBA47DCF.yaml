personas:
  professional: Jessica Correa, a five-year-old aspiring little architect, constructs elaborate block towers tuned to perfect symmetry, demanding order from the playroom, and confidently directs peer collaborations,
    turning their practical, organized mindset into creative early engineering.
  sports: Jessica Correa, a five-year-old who storms the park for Little Kickers soccer practice, proudly sports a mini jersey of the local Falcons football team, and meticulously follows a simple warm-up
    routine before games, merging her outgoing energy with a love of structured play.
  arts: Jessica Correa, a five-year-old who paints rainbows with watercolors, sings along to Raffi's 'Baby Beluga' and Disney's 'Let It Go', and stages impromptu puppet shows featuring favorite characters,
    letting colorful creativity balance her need for predictable routines.
  travel: Jessica Correa, a five-year-old who enjoys short family road trips to the nearby lake, dreams of trekking the towering Redwood trees in California, and packs a tiny suitcase with her beloved plush
    rabbit, blending adventurous curiosity with a need for familiar comfort.
  culinary: Jessica Correa, a five-year-old who delights in helping stir a pot of mac and cheese with cheddar shreds, insists on arranging carrot sticks in smiley faces before dipping them in ranch, yet
    sometimes overindulges in sugary cereal, showcasing a mix of culinary curiosity and occasional lack of moderation.
  core: Jessica Correa, a five-year-old whose love for orderly block towers, careful piggy-bank savings, allergy vigilance, soccer enthusiasm, vivid crayons, beach outings, and cheesy meals paints a picture
    of a socially vibrant, meticulously organized, yet worry-prone youngster.
background:
  cultural: Jessica comes from a close‑knit Puerto Rican family that maintains vibrant cultural traditions while living in Highland Falls, New York. Spanish is spoken at home alongside English, and she
    participates in celebrations such as Three Kings Day, Puerto Rican festivals, and family gatherings featuring foods like arroz con gandules and empanadillas. Music, storytelling, and dance are central
    to her upbringing, providing a strong sense of identity and community. This bicultural environment blends island heritage with the small‑town atmosphere of Orange County, shaping her worldview with
    both warmth and resilience.
