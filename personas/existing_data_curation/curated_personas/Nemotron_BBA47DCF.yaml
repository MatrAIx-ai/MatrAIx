  career_goals: Jessica dreams of growing up in a role where she can help other children feel safe and learn within a structured environment. She often talks about becoming a teacher because she loves sharing
    knowledge and keeping a classroom organized, or a pediatric nurse so she can care for kids while following clear routines. At school she hopes to be a class helper—organizing supplies, leading group
    activities, and supporting friends—so she can combine her love for order with her sociable, caring nature.
