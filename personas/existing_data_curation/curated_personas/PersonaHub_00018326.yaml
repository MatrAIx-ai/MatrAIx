persona_description: A pharmacist who specializes in the preparation and use of tartaric acid, a compound used in making saline draughts and cooling drinks for febrile and diabetic patients. They are experienced
  in using the proportions of tartaric acid and various carbonates to form neutral mixtures and are aware of the compatibility of tartaric acid with alkalies and carbonates, vegetable astringents, and salts
  of potassium, mercury, calcium, and lead. They are aware of the potential risks of administering tartaric acid and are prepared to use chalk, lime, or saccharated solutions of lime to treat poisoning
  by tartaric acid.
