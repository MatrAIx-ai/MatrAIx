    tech blogs and industry news'']'
  career_goals: Juan aims to translate his methodical approach and leadership instincts into a senior IT role. In the next 12-18 months he plans to earn ITIL 4 Foundation and CompTIA Security+ certifications,
    and to take on more responsibility for designing and optimizing support processes. He seeks to become a team lead or IT Operations Manager, where he can mentor junior technicians, streamline service
    level agreements, and embed structured workflows that improve resolution times and user satisfaction. Long term, he envisions launching his own bilingual tech consulting firm that helps small businesses
    in the Phoenix area adopt reliable IT infrastructure while providing culturally aware support.
