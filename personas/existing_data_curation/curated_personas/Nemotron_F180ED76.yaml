personas:
  professional: Dimas Larranaga is a seasoned metal and plastic fabricator with over a decade of experience in MIG, TIG, and stick welding, CNC machining, and injection molding, who blends rigorous safety
    and quality inspection with a curious, artistic eye, and they aim to step up as a lead technician while mentoring junior staff and launching a side business in custom metal art.
  sports: Dimas Larranaga enjoys hiking the Mojave desert trails near Hesperia, follows the Los Angeles Rams and the Los Angeles Lakers, occasionally joins a local weekend running club, and they prefer
    low-key workouts such as trail runs over crowded gyms.
  arts: Dimas Larranaga expresses their artistic side through small abstract metal sculptures inspired by Alexander Calder, frequents the LACMA and independent film screenings, enjoys the music of The Strokes
    and folk singer Sufjan Stevens, and they draw creative energy from community art fairs.
  travel: Dimas Larranaga loves spontaneous road trips across Southern California, with recent stops at Joshua Tree National Park, Sedona, and Santa Fe, dreams of witnessing the Northern Lights in Iceland
    and strolling through the historic streets of Seville, and they usually plan loosely, favoring solitary evenings under the stars while balancing family commitments.
  culinary: Dimas Larranaga enjoys cooking family-style dishes such as pozole, chiles rellenos, and tamales, often using chipotle, epazote, hominy, fresh corn, and masa, they have an intermediate skill
    level in the kitchen, and they love sharing meals at communal gatherings while occasionally experimenting with fusion twists like roasted cactus salad.
  core: Dimas Larranaga is a hands-on metal fabricator with a quiet, curious soul, who balances a love for precise welding with a habit of procrastinating paperwork, finds peace in desert stargazing, and
    they secretly hoard old tool catalogs.
background:
  cultural: Dimas grew up in a Mexican‑American household where bilingual communication (Spanish and English) was a daily norm, and family gatherings centered around shared meals and cultural celebrations
    such as Día de los Muertos and Las Posadas. His parents instilled a strong work ethic and a respect for community harmony, values that continue to guide his cooperative approach at work and home. While
    he proudly maintains traditional Mexican culinary practices and participates in local cultural festivals, he also embraces the diverse influences of Southern California, blending his heritage with contemporary
    art and craft trends.
attributes:
  skills: '["Metal fabrication", "Welding (MIG/TIG/Stick)", "CNC machining", "Plastic injection molding", "Blueprint reading", "Basic CAD design", "Equipment maintenance", "Quality inspection", "Safety
