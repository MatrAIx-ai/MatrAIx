  hobbies: '["Metal sculpting", "DIY home improvement", "Photography", "Hiking", "Cooking Mexican cuisine", "Stargazing", "Attending local art fairs", "Watching independent films"]'
  career_goals: Dimas aims to transition from a skilled fabricator to a lead technician or shop supervisor, eventually overseeing a small team that blends functional manufacturing with artistic design.
    He plans to earn advanced certifications in CNC programming and welding inspection, and hopes to launch a side business creating custom metal art pieces and specialty plastic components for local businesses
    and art collectors. Balancing his love for practical work with creativity, he envisions a role where he can mentor junior workers while experimenting with unconventional design ideas.
