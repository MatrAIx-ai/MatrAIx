personas:
  professional: Joyce Dilcher, a three‑year‑old building‑block architect, channels their vivid imagination and methodical planning into constructing elaborate LEGO cities, while their competitive spark
    drives them to out‑build peers during playgroup sessions.
  sports: Joyce Dilcher, a lively participant in the Pontiac Play Tots soccer group, loves sprinting around the local park, and they cheer for the Chicago Cubs during family outings while practicing basic
    gymnastics moves at the community recreation center.
  arts: Joyce Dilcher, an enthusiastic finger‑painter who creates bright abstract canvases while humming The Wiggles and classic Midwest folk lullabies, frequently attends storytime at the town library
    and drags friends into impromptu dance parties to the tune of 'Baby Shark,' and they love to showcase their artwork to anyone who will watch.
  travel: Joyce Dilcher, an adventurous three‑year‑old, enjoys weekend trips to the Illinois State Fair, a quick drive to the St. Louis Gateway Arch, and dreams of exploring the magic of Disney World’s
    castle, and they always prefer destinations with playgrounds and colorful attractions.
  culinary: Joyce Dilcher, a picky yet curious eater, adores mac and cheese with extra cheese, loves banana‑flour pancakes shaped like smiley faces, and they help spread peanut butter on toast while insisting
    on a side of apple slices.
  core: Joyce Dilcher, a three‑year‑old imagination powerhouse who builds towering LEGO cities, fiercely guards a pink piggy bank, manages mild eczema with meticulous care, dashes around the playground
    as a mini‑soccer star, paints vibrant pictures to the beat of The Wiggles, dreams of Disney adventures, and insists on extra cheese on everything, and they display an endearing competitive spark.
background:
  cultural: Joyce is raised in a white, Midwestern family in Pontiac, Illinois. Her upbringing reflects small‑town values such as close family ties, community events at the local church and school, and
    participation in classic American holidays and local fairs. She is exposed to traditional children's stories, Midwest folk songs, and a supportive neighborhood that encourages outdoor play and group
    activities.
