  career_goals: Looking ahead, Marty aims to move from his first‑line supervisory role to a regional sales director position, overseeing multiple states and shaping broader sales strategy. He is keen to
    embed creative, art‑inspired approaches into the company's sales methodology, positioning the organization as an innovator in customer engagement. Marty also aspires to mentor emerging sales talent,
    establishing a formal coaching program that reflects his competitive drive and critical thinking. In the longer term, he envisions launching a boutique consultancy that blends sales leadership with
    creative thinking, allowing him to work flexibly while pursuing his passion for the arts.
