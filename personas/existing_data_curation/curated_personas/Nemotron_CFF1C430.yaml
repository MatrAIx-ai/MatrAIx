personas:
  professional: A data‑driven marketing manager in Henrico, Virginia, Loretta Stenberg leads a cross‑functional team with a blend of creative storytelling and rigorous ROI tracking, constantly juggling
    curiosity about new digital platforms with a practical focus on measurable results, while occasionally staying late to obsess over campaign dashboards.
  sports: A dedicated hiker and occasional softball enthusiast, Loretta Stenberg trails Shenandoah National Park’s Skyline Drive with her local women’s hiking club, roots for the Washington Commanders,
    and logs workouts on her Apple Watch, though she sometimes skips leg days after a long weekend trek.
  arts: An avid cultural consumer, Loretta Stenberg frequents live music at The Jefferson Theater, admires indie folk musicians like Brandi Carlile, delights in community theater productions starring local
    talent, and captures the nuance of park landscapes with her DSLR, yet she occasionally hoards ticket stubs in a cluttered scrapbook.
  travel: A planner‑by‑nature who loves both adventure and comfort, Loretta Stenberg has explored Asheville’s Blue Ridge Parkway, taken a long weekend to New York’s Broadway, dreams of strolling Kyoto’s
    historic temples, and maps each trip in a spreadsheet while occasionally booking last‑minute cabin stays for spontaneity.
  culinary: A seasonal home‑cook with a thriving vegetable garden, Loretta Stenberg perfects roasted beet and goat‑cheese salads, experiments with heirloom tomato gazpachos, and swaps recipes on community
    board, though she sometimes over‑spices dishes in pursuit of bold flavor.
  core: Loretta Stenberg blends analytical precision with creative curiosity, manages stress through yoga yet worries obsessively about outcomes, and balances structured planning with spontaneous bursts
    of artistic and culinary experiment.
background:
  cultural: Loretta was raised in the suburban neighborhoods of the Greater Richmond area in Virginia, within a middle‑class, predominantly White American community. Her family traces its ancestry to Scandinavia,
    and occasional Swedish traditions—such as Midsummer celebrations and smörgåsbord meals—have been part of family gatherings. Growing up in Henrico County exposed her to a blend of Southern hospitality
    and the region’s increasing cultural diversity, shaping a pragmatic yet open‑minded worldview. She identifies with mainstream American cultural values that emphasize hard work, education, and community
    involvement.
