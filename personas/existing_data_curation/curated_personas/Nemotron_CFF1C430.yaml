  career_goals: Loretta aims to advance to a director‑level position, overseeing a broader portfolio of brands and shaping integrated marketing strategies that align with corporate sustainability and social
    responsibility goals. Long‑term, she envisions moving into a senior executive role such as Chief Marketing Officer or launching her own boutique marketing consultancy focused on data‑driven, ethical
    campaigns. She also hopes to create a mentorship program for women in marketing and deepen her expertise in AI‑enabled personalization and emerging digital technologies.
