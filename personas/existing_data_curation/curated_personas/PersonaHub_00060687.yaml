persona_description: Mark Bromley is a human rights activist, foreign policy expert, and LGBT rights advocate who co-founded the Council for Global Equality to promote inclusive foreign policy that includes
  gender identities and sexual orientations. He has worked with officials and policymakers to ensure that LGBT rights are recognized as human rights on the global policy stage, particularly in countries
  where LGBT individuals face discrimination and persecution. Bromley is well-versed in the challenges of dealing with major bodies like the U.N. and managing multilateral ties, particularly when it comes
  to sensitive topics like LGBT rights. He is also an advocate for the urgent need to prevent teen pregnancy and prevent pollution in India.
