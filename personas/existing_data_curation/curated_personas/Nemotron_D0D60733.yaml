personas:
  professional: Linda Woody, a seasoned warehouse logistics specialist with two decades of forklift operation, inventory control, and safety compliance experience, channels their curiosity and love for
    the arts into an emerging role as a supervisory safety coordinator, where they mentor new staff, introduce art‑handling best practices, and leverage their supply‑chain certification studies to streamline
    both industrial processes and museum inventory systems.
  sports: Linda Woody stays active by leading the Riverwalk Strollers senior walking club, playing weekly pickleball at the community center, cheering the Portland Timbers during the MLS season and the
    Portland Trail Blazers in winter, while also following the Seattle Mariners for spring baseball, illustrating a blend of personal exercise and team fandom that keeps them socially connected.
  arts: Linda Woody brightens their weekends with visits to the Portland Art Museum’s rotating exhibitions of Georgia O'Keeffe and Anselm Kiefer, enjoys pottery sessions inspired by the works of Bernard
    Leach, and devotes evenings to the Pacific Northwest Ballet's productions starring Misty Copeland, all of which fuel their creative curiosity and provide conversation fodder for their senior social
    club gatherings.
  travel: Linda Woody favors leisurely day trips to the Columbia River Gorge’s waterfalls and historic vineyards, cherishes a recent week‑long adventure exploring Savannah’s historic district and sipping
    shrimp and grits at the waterfront, and dreams of strolling Barcelona’s Gothic Quarter and tasting authentic paella, reflecting their blend of local exploration and long‑standing wanderlust.
  culinary: Linda Woody relishes preparing a signature roasted beet and goat cheese salad with walnuts, frequently orders fresh sushi rolls featuring tuna tataki at the beloved Pacific Grill, and delights
    in baking a hearty chicken pot pie topped with flaky puff pastry, while they sometimes over‑season their garden herbs, resulting in a pungently aromatic kitchen.
  core: Linda Woody blends meticulous warehouse expertise with a vibrant love for art, community, and fresh sushi, mentors newcomers like a seasoned chef guiding apprentices, forgets to water their herbs
    on rainy days, yet never skips a senior club dance class, embodying organized curiosity and social grace.
background:
  cultural: Linda was raised in Charlotte, North Carolina, within a middle‑class family that embodies traditional Southern values of hospitality, community involvement, and a strong work ethic. Her upbringing
    included regular participation in local churches, neighborhood events, and family gatherings that celebrated Southern cuisine and music. Over the decades, she has witnessed Charlotte’s growth into a
    diverse, vibrant city, which has expanded her worldview and fostered an appreciation for varied cultural experiences, especially in the arts. Her cultural background blends these classic Southern principles
    of kindness, cooperation, and respect for tradition with an openness to new ideas and multicultural influences that reflect the evolving character of her community.
