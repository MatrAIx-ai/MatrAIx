  hobbies: '[''Retro arcade gaming'', ''Live streaming repair tutorials'', ''Karaoke'', ''Improv comedy'', ''Yoga and meditation'', ''Hiking in the Angeles National Forest'', ''Food exploration and cooking'',
    ''Community tech workshops'', ''Photography of vintage machines'']'
  career_goals: Shini aims to transform her solo service operation into a leading regional maintenance firm that services coin‑operated entertainment and vending devices across Southern California. She
    plans to earn industry certifications in electronic repair and IoT integration, expand her team's technical expertise, and develop a proprietary diagnostic software platform. Over the next five years,
    she aspires to secure contracts with major arcade chains and vending corporations, open a specialized training academy for aspiring technicians, and achieve stable earnings that reduce her financial
    stress. Completing her associate degree in electronics technology—and eventually a bachelor's—remains a personal milestone that will bolster her credibility and open doors to higher‑level engineering
    roles.
