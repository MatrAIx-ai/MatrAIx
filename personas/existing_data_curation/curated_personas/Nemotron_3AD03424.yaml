personas:
  professional: Shini Bahk, a 30-year-old arcade-machine repair specialist, combines deep expertise in PLC control systems and emerging contactless payment modules with bilingual fluency in English and
    Mandarin, turning meticulous preventive‑maintenance schedules and systematic parts inventory management into a rapidly expanding regional service brand while they mentor junior technicians.
  sports: Shini Bahk, an avid West Coast fitness enthusiast, roots for the Los Angeles Lakers and follows the LA Dodgers' season, joins weekly pickup basketball games at a community center, and as a member
    of the Angeles National Forest Hiking Club, they tackle rugged trails every weekend to stay fit.
  arts: Shini Bahk, a karaoke‑loving improv participant, channels their talkative energy into nightly sing‑alongs of Ariana Grande, Dua Lipa, and classic disco hits, regularly attends open‑mic nights featuring
    indie acts like Bad Bad Not Good, and they curate a retro‑gaming photography series inspired by the neon glow of vintage arcade cabinets.
  travel: Shini Bahk, who balances meticulous itinerary planning with spontaneous weekend escapes, has explored the neon streets of Tokyo for a tech expo, hiked the sea cliffs of Big Sur, enjoys annual
    road trips to Joshua Tree for stargazing, and they dream of a culinary tour through Bangkok’s bustling street markets.
  culinary: Shini Bahk, a self‑taught fusion chef, loves crafting spicy pork bao with pickled daikon and sriracha aioli, simmering miso‑ramen broth enriched with shiitake, kombu, and a soft‑boiled egg,
    and topping avocado toast with toasted sesame seeds and chili flakes, while their go‑to comfort dish remains a California‑style fish taco garnished with mango salsa, which they prepare for friends during
    weekend gatherings.
  core: Shini Bahk is a 30‑year-old arcade‑tech entrepreneur whose competitive drive fuels a growing repair business, whose love of karaoke and improv sustains vibrant social ties, and they temper chronic
    worry with yoga, caffeine, and a relentless pursuit of skill mastery.
background:
  cultural: Shini grew up in a first‑generation East Asian family, speaking Mandarin at home while navigating the multicultural mosaic of Pomona and greater Los Angeles. Her cultural upbringing emphasized
    diligence, respect for elders, and communal support, values she brings to her professional ethic and her close‑knit social circles. She celebrates Lunar New Year with traditional gatherings and incorporates
    Asian culinary traditions into her cooking experiments. At the same time, she embraces the eclectic Californian lifestyle—participating in cross‑cultural festivals, adopting West Coast fitness trends,
    and integrating the region’s entrepreneurial spirit into her career ambitions. This blend of heritage and local influences shapes her identity as both a technically adept specialist and a vibrant community
    participant.
attributes:
  skills: '[''Coin‑operated machine diagnostics'', ''Electrical and mechanical repair'', ''PLC and microcontroller programming'', ''Preventative maintenance scheduling'', ''Customer service and communication'',
