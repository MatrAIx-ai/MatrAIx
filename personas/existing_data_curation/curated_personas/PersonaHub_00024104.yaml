persona_description: A wildlife biologist who specializes in studying deer behavior and ecology, particularly the droppings and scat of deer. She is experienced in analyzing droppings for signs of activity,
  size, and age, and can use this information to determine the health and status of the deer population. She is also skilled in identifying different types of droppings and scat, and can use this knowledge
  to locate and track deer populations in an area. She is knowledgeable about the factors that influence droppings, such as diet, age, and sex, and can use this information to make predictions about the
  behavior and habitat of deer. She is also skilled in using modern technology, such as GPS and drones, to locate and study deer droppings.
