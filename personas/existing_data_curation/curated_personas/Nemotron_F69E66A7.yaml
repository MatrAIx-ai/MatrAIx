  hobbies: '[''Reading historical fiction'', ''Gardening (herbs, roses, seasonal flowers)'', ''Knitting and crochet'', ''Birdwatching'', ''Journaling'', ''Listening to classical music'', ''Cooking and baking
    low‑sugar treats'', ''Volunteering at local animal shelter (preparing food, organizing supplies)'']'
  career_goals: Although retired, Kaylee aims to stay active and independent while deepening her contributions to her community. She plans to expand her herb garden to share fresh produce with neighbors,
    compile a family recipe book that intertwines personal stories, and mentor younger volunteers at the animal shelter. She also hopes to enroll in adult‑education classes at the local community college,
    focusing on art history and creative writing, as a form of personal enrichment. Maintaining her health, reducing stress through journaling, and ensuring her home remains safe and organized are central
    to her ongoing ambitions.
