personas:
  professional: Miguel Riveraherrera, a budding junior explorer, harnesses their vivid imagination and love for bright colors to chart new worlds in the backyard, meticulously organizing treasure hunts
    with hand‑drawn maps while fiercely competing with friends to claim the hidden artifacts.
  sports: Miguel Riveraherrera dashes across the community park playing soccer, idolizing the forward from Atlanta United, and competes fiercely in weekend tag races and the climbing wall challenge at the
    rec center, always eager to prove they’re the fastest.
  arts: Miguel Riveraherrera fills sketchbooks with bold, kaleidoscopic drawings inspired by the bright Andean textile patterns on their bedroom wall, dances to the lively folk tunes of Los Kjarkas, and
    admires the playful brushstrokes of children’s book illustrator Eric Carle, often recreating his collage style with construction paper.
  travel: Miguel Riveraherrera loves family road trips to the nearby Blue Ridge Mountains where they explore forest trails, enjoys annual visits to their grandparents’ high‑altitude village for Independence
    Day celebrations, and dreams of returning to Orlando’s Disney World for the magic of the rides and fireworks.
  culinary: Miguel Riveraherrera delights in nibbling empanadas filled with cheese and spinach for family celebrations, savors quinoa soup seasoned with cilantro, and at lunch enjoys building mini pizzas
    with tomato sauce, mozzarella, and pepperoni, though they often end up with sauce on their cheeks.
  core: Miguel Riveraherrera, a bright‑hearted four‑year‑old, fuses vivid imagination with a love for colorful traditions, turning every day into a competitive, art‑filled adventure.
background:
  cultural: Miguel is raised in an Ecuadorian-American household in Grayson, GA. At home, Spanish is spoken alongside English, and he hears traditional Ecuadorian music such as pasillo and sanjuanito during
    family gatherings. He celebrates cultural holidays like Día de la Independencia (Ecuadorian Independence Day) with folk dances and foods like empanadas and quinoa soup. His parents introduce him to
    colorful Andean textile patterns, which inspire his love of bright colors in art. In his community, he also participates in Southern cultural events, blending both heritages in his everyday life.
