personas:
  professional: Isaac Parker is an aspiring game coder who spends their afternoons designing interactive stories in Scratch, applying the same methodical planning they use for intricate LEGO builds, and
    thriving on the peer feedback from their school’s coding club, reflecting their love for structure and sociability.
  sports: Isaac Parker reigns as the point guard for their local junior basketball league, idolizes NBA star Stephen Curry, proudly cheers for the Chicago Bulls, and sharpens their skills at the after‑school
    Hoops Club where they lead drills and friendly scrimmages each Thursday.
  arts: Isaac Parker devotes their weekends to devouring Marvel’s Spider‑Man graphic novels, sketching their own superhero panels, singing lead in their church youth choir with songs ranging from ‘Amazing
    Grace’ to Taylor Swift’s ‘Shake It Off,’ and watches animated series by Genndy Tartakovsky, reflecting their passion for teamwork and creative storytelling.
  travel: Isaac Parker loves family road trips to the Grand Canyon and the interactive Exploration Museum in Chicago, preferring short, activity‑packed stays where they can lead a scavenger‑hunt, and they
    dream of the day they can visit Disneyland for its roller‑coaster thrills and magical parades.
  culinary: Isaac Parker’s favorite meal is pepperoni pizza with extra cheese, enjoys assembling crunchy nachos with salsa, guacamole, and melted cheddar, and occasionally attempts to bake chocolate‑chip
    cookies using an online tutorial, though they often get distracted and end up with a flour‑covered kitchen.
  core: Isaac Parker is a detail‑oriented ten‑year‑old who balances basketball leadership, LEGO engineering, and Scratch coding, often over‑scheduling their days but always keeping the fun factor high.
background:
  cultural: Isaac grows up in a vibrant African‑American community in South Los Angeles, surrounded by a mix of cultural traditions, music, and community solidarity. His family celebrates milestones with
    soulful food like collard greens, cornbread, and fried chicken, and they often gather for church services that emphasize service and fellowship. He regularly attends local events such as Juneteenth
    celebrations, community block parties with hip‑hop and R&B music, and youth mentorship programs that highlight Black history and empowerment. These experiences shape his identity, fostering pride in
    his heritage while encouraging him to be a supportive and active member of his neighborhood.
