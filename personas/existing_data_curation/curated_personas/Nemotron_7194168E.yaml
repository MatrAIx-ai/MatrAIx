  career_goals: Isaac dreams of a future where he can combine his love for organization, helping others, and community involvement. He aims to become a civil engineer or architect who designs safe, inclusive
    spaces for neighborhoods, especially in under‑served areas of Los Angeles. He also envisions possibly teaching or mentoring younger students, using his public speaking skills to inspire them. He hopes
    to one day lead community projects that bring people together, such as after‑school programs or neighborhood clean‑up initiatives.
