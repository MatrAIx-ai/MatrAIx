personas:
  professional: Jenson Devito, a seasoned municipal water and wastewater treatment operator with Level II certification, blends methodical SCADA monitoring, hands‑on maintenance of pumps and blowers, and
    a curiosity for sustainable technologies to lead small teams through incidents while envisioning plant‑manager responsibilities that integrate energy‑efficient upgrades and community education.
  sports: Jenson Devito, an avid kayaker and seasonal fisherman who rows the inland lakes in spring, supports the Detroit Tigers and follows the Michigan State Spartans football team, and belongs to the
    Lake Michigan Kayak Club while occasionally joining a local adult softball league for weekend camaraderie.
  arts: Jenson Devito, a regular at Ann Arbor gallery openings and a volunteer muralist, draws inspiration from Ansel Adams' landscape photography and Shepard Fairey's bold public art, participates in a
    community theater troupe performing classics like Our Town, and enjoys evenings listening to folk duo The Milk Carton Kids.
  travel: Jenson Devito, who plans road trips that combine lake‑side camping, photography excursions at Isle Royale, visits to craft‑brew festivals in Portland, and dreams of exploring Iceland's waterfalls
    for water‑themed photo series, balances these adventures with family commitments and a modest travel budget.
  culinary: Jenson Devito, an intermediate home‑brewer and grill enthusiast, perfects recipes like smoked trout pâté paired with a citrus‑hopped saison, enjoys cooking fish tacos with fresh corn tortillas
    and a dash of chipotle, and occasionally over‑salts his dishes while relishing the balanced flavors of locally sourced maple syrup in his caramelized pork belly.
  core: Jenson Devito, a methodical water‑treatment specialist who balances a love for kayaking, craft‑brewing, and community art with a habit of over‑investing in gear and a penchant for meticulous budgeting,
    embodies curiosity, reliability, and a quietly competitive spirit.
background:
  cultural: Jenson is a third‑generation Italian‑American who grew up in the suburban outskirts of Grand Rapids, Michigan. Raised in a close‑knit, middle‑class family with strong Midwestern values, he was
    taught the importance of reliability, community service, and respect for hard work. The region’s rich industrial heritage and proximity to the Great Lakes fostered an early fascination with water systems,
    steering him toward his career in municipal treatment. He celebrates traditional Italian holidays with his family while also embracing the cultural diversity of Kent City’s growing immigrant communities,
    frequently attending multicultural festivals and integrating these experiences into his appreciation for art and new ideas.
attributes:
  skills: '[''Water & wastewater treatment process operation'', ''SCADA system monitoring and control'', ''Regulatory compliance (EPA, Michigan DEQ)'', ''Equipment maintenance and troubleshooting'', ''Water
    quality testing and data analysis'', ''Hazardous waste handling'', ''Safety and emergency response procedures'', ''Team coordination and shift management'', ''Project planning and documentation'', ''Basic
    hydraulics and environmental chemistry'']'
  hobbies: '[''Landscape photography'', ''Fishing and kayaking'', ''Visiting art galleries and supporting mural projects'', ''Woodworking'', ''Home brewing'', ''Community theater acting'', ''Volunteer water‑conservation
    clean‑ups'']'
  career_goals: Jenson aims to progress into a supervisory or plant‑manager role where he can lead modernization projects that incorporate energy‑efficient technologies and sustainable water‑reuse practices.
    He plans to achieve a Level III Water Treatment Operator certification and pursue coursework in environmental engineering to deepen his technical knowledge. He is passionate about fostering a culture
    of continuous improvement, mentoring newer operators, and partnering with local artists and community groups to develop educational outreach programs that highlight the importance of water stewardship
    in the region.
