  hobbies: '[''Watercolor Painting'',''Art Gallery Visits'',''Quilting'',''Gardening'',''Reading Historical Fiction'',''Traveling to Museums'',''Cooking Southern Cuisine'',''Community Choir'',''Theater
    Attendance'',''Bridge'',''Volunteer Library Programs'']'
  career_goals: Although retired from full-time employment, Shantel aims to stay intellectually active and socially impactful. She plans to mentor young women and underrepresented students interested in
    STEM through local schools and community organizations, offering tutoring and career guidance. She also wishes to volunteer as a consultant for non-profits seeking grant funding and program evaluation.
    Leveraging her love of art, she hopes to launch a community arts-and-science initiative that combines workshops, exhibitions, and storytelling to celebrate African-American heritage in Greenville. Finally,
    Shantel aspires to write a memoir that reflects her journey as a Black woman in technology and her lifelong commitment to community service.
