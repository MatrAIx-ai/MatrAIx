personas:
  professional: Shantel White, a retired data analyst and now a community grant consultant, channels her Python and R fluency into crafting data‑driven proposals and mentoring young women in STEM, applying
    meticulous project‑management skills to blend technical rigor with the uplift of local arts‑and‑science initiatives, and they relish each opportunity to bridge numbers with narratives.
  sports: Shantel White enjoys strolling the Greenville greenway each morning, participates in the senior tennis circle at the local country club, passionately cheers for the Clemson Tigers during college
    football Saturdays, and they treat the community center’s bridge league as a strategic mind‑sport.
  arts: Shantel White finds creative release in watercolor paintings of Southern magnolias, contributes intricate quilts to the historic‑themed exhibitions at the Greenville Museum of Art, attends gallery
    openings that showcase works inspired by Georgia O'Keeffe, and they lend their voice to the community choir that harmonizes gospel hymns and spirituals.
  travel: Shantel White’s travel itinerary weaves cultural immersion with leisurely road trips, having visited the Smithsonian museums in Washington, D.C., the vibrant jazz districts of New Orleans, and
    the cobblestone streets of Charleston, while they dream of a pilgrimage to the National Museum of African American History and Culture to deepen their connection to ancestral narratives.
  culinary: Shantel White’s kitchen is a celebration of Southern flavors, regularly preparing collard greens simmered with smoked turkey, shrimp and grits spiced with cayenne, sweet‑potato pie using heirloom
    produce from her garden, and they never miss the chance to sprinkle fresh basil on a simple tomato‑okras stew.
  core: Shantel White blends analytical precision with artistic curiosity, turning disciplined organization into community mentorship while they channel a love for Southern traditions, gardening bounty,
    and lifelong learning into a vibrant, purpose‑driven life.
background:
  cultural: Shantel grew up in Greenville's historic Black community, raised by parents who were active members of a Baptist congregation. The church's gospel music, communal service, and emphasis on education
    shaped her values of resilience, family, and collective uplift. She has participated in Juneteenth celebrations, the African-American Heritage Festival, and the Southern African American Women's Association,
    maintaining strong ties to Southern Black cultural traditions. Her family history includes connections to the Great Migration, and she frequently explores her genealogy to honor ancestors who paved
    the way for future generations. This cultural heritage informs her commitment to mentorship, community activism, and the celebration of Black artistic and scientific contributions.
