persona_description: A constitutional law scholar who specializes in the study of the United States Constitution, particularly the powers and functions of the federal government, the rights and responsibilities
  of the states, and the balance of power between the branches of government. Their research interests include, but are not limited to, the origins and evolution of the Constitution, the impact of the Constitution
  on American society and culture, and the relationship between the Constitution and other legal systems around the world. They are also interested in the interpretation and application of the Constitution
  in contemporary legal and political contexts.
