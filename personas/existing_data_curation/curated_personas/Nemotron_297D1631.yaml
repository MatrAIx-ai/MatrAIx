  hobbies: '[''sketching'', ''digital art'', ''music listening and beat making'', ''basketball'', ''reading graphic novels'', ''attending local art events'', ''cooking with family'', ''volunteering at youth
    center'']'
  career_goals: Joseph aims to become a professional visual artist and graphic designer, creating album covers, street‑art murals, and digital media for brands. He dreams of producing his own music and
    launching a YouTube channel that blends his art and beats. Long‑term, he hopes to open a community art space in Dallas where local youth can explore creativity. He plans to finish his high school education
    through a GED or alternative program to pursue a scholarship at an art college.
