personas:
  professional: Joseph Canty, a budding visual artist and self‑taught beatmaker, merges park sketching with laptop‑based beat production, letting curiosity drive experimentation even as their relaxed attitude
    toward deadlines sometimes leaves assignments unfinished.
  sports: Joseph Canty, a member of a local youth basketball league and avid Dallas Mavericks fan, plays pickup games after school, follows NBA seasons closely, and balances occasional weekend runs with
    friends, though they sometimes skip workouts when a new art project demands extra time.
  arts: Joseph Canty, who immerses themselves in the vibrant Dallas street‑art scene, draws inspiration from Banksy, Basquiat, and local muralist Mad Dog Jones, crafts beats influenced by Miles Davis and
    Travis Scott, and devours graphic novels like 'Saga' and 'Ms. Marvel', letting these diverse influences shape a uniquely eclectic creative voice.
  travel: Joseph Canty, who prefers spontaneous weekend road trips over meticulously planned vacations, has explored Austin’s music festivals, taken a family road‑trip to Santa Fe to study Southwestern
    murals, and dreams of visiting Mexico City’s Palacio de Bellas Artes to study its famed murals, all while balancing budget constraints from their modest allowance.
  culinary: Joseph Canty, a weekend kitchen collaborator with their family, enjoys cooking taco al pastor with pineapple and cilantro, experimenting with homemade pepper jack cheese, and perfecting a binge‑worthy
    mac and cheese topped with toasted breadcrumbs, often listening to jazz while chopping vegetables.
  core: Joseph Canty, a curiosity‑driven teen artist who balances sketchpads and beats, occasionally lets disorganization sabotage homework, but consistently finds solace in music, basketball, and family‑cooked
    meals.
background:
  cultural: Joseph grew up in a predominantly African‑American neighborhood in Dallas, where the rhythms of hip‑hop, gospel, and jazz shaped his musical tastes. Family gatherings, church events, and community
    festivals like Juneteenth reinforce his cultural heritage. The city’s vibrant street‑art murals and local sports culture have influenced his aesthetic sensibility and social outlook. He balances traditional
    community values with contemporary youth trends and stays aware of social‑justice issues affecting his community.
attributes:
  skills: '[''visual art (drawing, sketching)'', ''digital illustration'', ''photo editing'', ''basic music production'', ''video storytelling'', ''verbal communication'', ''social media content creation'',
