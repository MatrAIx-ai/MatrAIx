  career_goals: She aims to move into a supervisory role within the casino’s surveillance department, where she can mentor newer officers and shape security protocols. She hopes to obtain a certification
    in cybersecurity fundamentals to integrate digital threat monitoring with physical surveillance. Long‑term, she envisions a part‑time consulting practice helping small businesses develop affordable
    safety plans, allowing her to reduce stress while staying active in the field. Additionally, she seeks to advocate for senior employee wellness, introducing stress‑relief initiatives and flexible scheduling.
