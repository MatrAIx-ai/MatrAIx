  career_goals: Deneane aims to advance from her current surveillance role into a senior security management position, ideally overseeing a team of officers at a regional casino or entertainment complex.
    She plans to earn a Certified Protection Professional (CPP) credential and pursue additional coursework in criminal justice to deepen her expertise. Long‑term, she envisions creating a hybrid training
    program that integrates her educational background with security best practices, fostering a culture of empathy and mental‑wellness among security personnel. She also hopes to leverage her love of the
    arts by developing community outreach initiatives that use creative workshops to teach safety awareness to local schools and senior centers, thereby merging her professional goals with her personal
    passion for art and education.
