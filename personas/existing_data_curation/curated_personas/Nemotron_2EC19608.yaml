personas:
  professional: Charleslee Spangler is a veteran early‑childhood program administrator who combines two decades of curriculum design expertise with a hands‑on, arts‑integrated approach, leveraging their
    knack for flexible, data‑driven decision‑making and natural assertiveness to champion collaborative teams while navigating the occasional chaos of disorganized schedules.
  sports: Charleslee Spangler spends Saturday mornings hiking the Santa Monica Mountains with the local Sierra Club chapter, supports the Los Angeles Dodgers and LA Galaxy as a devoted fan, and rounds out
    their fitness routine with a twice‑weekly yoga class that doubles as a stress‑relief practice.
  arts: Charleslee Spangler channels their curiosity into watercolor landscapes echoing Ansel Adams’ contrast, photographs California’s coastline, curates visits to the Los Feliz Art House, mentors after‑school
    art students, and finds solace in the poetry of Ocean Vuong and the music of Joni Mitchell while sipping tea.
  travel: Charleslee Spangler prefers unstructured road trips along the Pacific Coast Highway, has trekked the Redwood and Glacier National Parks, dreams of cherry‑blossom season in Kyoto and a culinary
    tour of Tuscany, and usually books modest accommodations to keep travel costs aligned with impending retirement savings.
  culinary: Charleslee Spangler, an intermediate home chef, delights in cooking Thai green curry with garden‑fresh basil and cilantro, mastering Japanese ramen broth on weekends, and often hosts dinner
    gatherings where they pair dishes with a carefully curated selection of regional wines.
  core: Charleslee Spangler is a 59‑year‑old arts‑driven education leader who combats chronic worry with yoga, occasionally misplaces bills, and finds balance between spontaneous creativity and a longing
    for a low‑stress, flexible future.
background:
  cultural: Charleslee grew up in a middle‑class white family in the American Midwest before moving to Southern California in her early twenties to pursue a career in education. Her cultural identity blends
    traditional Midwestern values of diligence and community service with the eclectic, open‑minded vibe of modern California. Exposure to the diverse artistic scene of Riverside County, combined with a
    family emphasis on lifelong learning, has shaped her appreciation for multicultural arts and progressive educational practices.
