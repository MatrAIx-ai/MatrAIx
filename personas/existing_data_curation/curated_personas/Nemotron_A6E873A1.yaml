  career_goals: Ken aims to transition from a frontline helper role to a supervisory position where he can lead a shift, champion safety, and drive continuous‑improvement projects that reduce waste and
    increase output. He hopes to earn a certification as a Certified Production Technician and subsequently become a safety coordinator or quality champion for his plant. In parallel, he dreams of opening
    a small workshop in Rudy where he can sell handcrafted furniture and original paintings, blending his technical precision with creative expression. Over the next few years, he wants to be recognized
    as a top performer in his facility, mentor younger workers, and develop a peer‑support program that helps coworkers manage stress and anxiety, turning his own experiences into a source of workplace
    resilience.
