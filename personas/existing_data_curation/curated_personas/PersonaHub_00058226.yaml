persona_description: A historian or archaeologist interested in the Second Temple period, particularly in the upper city of Jerusalem where the rich people lived. They are fascinated by the rich and elaborate
  homes of the nobles and priests, and the artifacts found in their remains, including stone furniture, ossuaries, and dishes. They are also interested in the strict observance of ritual purity demanded
  by the Torah and the role of stone vessels in fulfilling this requirement. They are likely to have a deep understanding of the architecture and design of the Second Temple period and the role of the Temple
  in Jewish religious life.
