persona_description: A wool manufacturer who specializes in the trade of wool textiles, particularly focusing on the production of woven cloth and the processing of dyes. They are interested in the full
  cycle of cloth manufacturing, including dyeing and finishing, and have a keen understanding of the impact of trade on the wool industry. They are particularly interested in the winter months, when the
  mass sheep shearing occurs, as this is a significant period for the wool trade. They have a unique knowledge and skills in the field of wool manufacturing and are interested in the historical context
  of the wool trade and its role in the development of trade connections.
