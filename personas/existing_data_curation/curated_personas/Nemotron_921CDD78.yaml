personas:
  professional: Wendy Fuller is an aspiring marine biologist in training who channels her love for the ocean into systematic shell‑cataloguing and precise LEGO constructions, applying the same practical,
    structured mindset they bring to their weekly ballet class.
  sports: Wendy Fuller swims with the San Pedro Swim Club, cheerfully roots for the Los Angeles Dodgers and Los Angeles Lakers during game nights, and enjoys casual beach volleyball with friends, blending
    their structured training routines with the spontaneous energy of coastal play, and they relish the friendly competition.
  arts: Wendy Fuller delights in drawing vibrant fish inspired by Disney’s 'The Little Mermaid' and Mary Blair’s illustrations, attending a weekly ballet class set to Tchaikovsky’s 'Swan Lake', and listening
    to Taylor Swift’s 'Shake It Off' while assembling LEGO models, merging structured creativity with lively artistic expression that they share with friends.
  travel: Wendy Fuller dreams of exploring the Monterey Bay Aquarium, snorkeling around Santa Catalina Island’s lighthouse, and experiencing the magic of Disneyland, planning each family trip with colorful
    stickers on a travel map and favoring relaxed beach picnics over long drives, and they love the anticipation of new adventures.
  culinary: Wendy Fuller enjoys helping Mom prepare grilled cheese sandwiches with sharp cheddar and tomato soup, loves savoring fish tacos with lime, avocado, and corn tortillas, munches on goldfish crackers
    as a snack, and occasionally rolls simple cucumber sushi with crab sticks after watching kid‑friendly cooking videos, showing a curiosity for flavors as meticulous as their shell catalogues, and they
    take pride in helping in the kitchen.
  core: Wendy Fuller is a detail‑oriented, sea‑loving seven‑year‑old whose love of organized LEGO builds, structured ballet lessons, and precise shell cataloguing balances their spontaneous beach adventures
    and gentle kindness, and they are known for their meticulousness.
background:
  cultural: Wendy is a white American child raised in San Pedro, a coastal community in Los Angeles County with a strong maritime heritage. Her family participates in typical American traditions such as
    Thanksgiving, Fourth of July fireworks, and Christmas, while also joining local celebrations like the San Pedro Harbor Festival. She attends a public elementary school where she interacts with classmates
    from diverse cultural backgrounds, giving her exposure to the multicultural fabric of the region. The neighborhood’s proximity to the port and beach influences her interest in the ocean and marine life.
    Her upbringing emphasizes community involvement, respect for others, and a balanced mix of structured family routines and relaxed coastal play.
