  hobbies: '[''LEGO building'', ''swimming'', ''shell collecting'', ''drawing sea life'', ''reading fairy‑tale books'', ''playing board games'', ''caring for goldfish'', ''ballet class'']'
  career_goals: Wendy dreams of becoming someone who helps others learn and stay safe. She often says she would like to be a teacher because she enjoys organizing lessons and seeing classmates understand
    new ideas. She also loves the ocean and imagines herself as a marine biologist studying sea turtles, which combines her caring nature with a structured approach to research. Occasionally she mentions
    wanting to be a veterinarian so she can care for animals. Her ambitions reflect her love for harmony, responsibility, and practical problem‑solving.
