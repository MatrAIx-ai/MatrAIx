  career_goals: Sylvia aims to transition from senior developer to technology leadership within the next five years, targeting roles such as Lead Engineer or Chief Technology Officer in a mid‑size tech
    firm that values creativity and social impact. She plans to leverage her business acumen to drive product strategy, spearhead innovative projects that blend art and technology (e.g., immersive digital
    exhibitions), and mentor underrepresented developers. Long‑term, she envisions launching her own startup that creates software tools for artists and cultural institutions, fostering greater access to
    the arts while maintaining a sustainable, profitable business model.
