  career_goals: Though still very young, Jeremy often voices big dreams that echo his creative spark. He loves saying he wants to become an artist who paints bright pictures, a musician who plays drums,
    or an explorer who travels to space. His competitive streak shows up when he aims to be the 'fastest builder' with his blocks, and his curiosity pushes him toward ambitions of discovering how things
    are made. His parents nurture these aspirations by providing art supplies, musical toys, and books about astronauts and inventors, fostering a playful yet purposeful vision of future careers.
