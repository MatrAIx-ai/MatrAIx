personas:
  professional: Guner Morton is a meticulous financial planner who leverages deep analytical expertise, advanced software like MoneyGuidePro and eMoney, and a humanities‑informed communication style to
    deliver structured, data‑driven retirement and tax strategies for middle‑income families in the Red River Parish region, and they mentor junior advisors with a steady, cooperative yet assertive hand.
  sports: Guner Morton enjoys early‑morning fishing trips on Lake Pontchartrain, participates in a local 5K charity run each spring, follows the New Orleans Pelicans and LSU Tigers with a modest fan’s enthusiasm,
    and they are a member of the Red River Parish community walking club that meets twice weekly.
  arts: Guner Morton finds quiet inspiration in historical fiction by Hilary Mantel and biographies of innovators, attends occasional performances by the Baton Rouge Symphony, collects works by folk artist
    Grandma Moses, and they unwind by listening to Cajun accordion virtuoso BeauSoleil while sanding a new bookshelf.
  travel: Guner Morton prefers meticulously planned road trips to historic sites, has toured the battlefields of Gettysburg and the colonial charm of Williamsburg, dreams of a fall pilgrimage to the vineyards
    of Bordeaux, and they often schedule travel around the fishing season to ensure a weekend at the Florida Keys.
  culinary: Guner Morton experiments with regional Cajun dishes such as gumbo, jambalaya, and blackened catfish, seasonings like cayenne and smoked paprika become staples in their kitchen, they grow fresh
    okra and bell peppers in their garden to enhance recipes, and they sometimes over‑spice a pot, prompting a quick remedial broth.
  core: Guner Morton is a structured financial strategist who balances disciplined budgeting, hands‑on woodworking, and quiet community service, even if they sometimes lose sleep over an unfinished spreadsheet
    or a splintery project.
background:
  cultural: Guner was raised in Shreveport, Louisiana, within a Southern, middle‑class white family that values community, hospitality, and self‑reliance. His upbringing combined traditional Southern customs—church
    attendance, local festivals, and a strong emphasis on family—with exposure to the region’s rich musical and culinary heritage, such as blues, country, and Cajun cuisine. Though his ancestry is primarily
    Anglo‑American, growing up in Red River Parish has given him an appreciation for the blend of cultural influences in Louisiana and a pragmatic outlook shaped by the area's economic realities.
attributes:
  skills: '[''Financial Planning'', ''Investment Advisory'', ''Retirement Planning'', ''Tax Strategy'', ''Budgeting and Cash Flow Management'', ''Risk Assessment'', ''Regulatory Compliance'', ''Client Relationship
