  hobbies: '[''Reading (historical fiction, biographies)'', ''Fishing in local lakes and rivers'', ''Gardening (vegetables and ornamental plants)'', ''Woodworking (handcrafted furniture)'', ''Cooking and
    exploring regional Cajun cuisine'', ''Attending small book club gatherings'', ''Volunteer financial literacy workshops at community center'']'
  career_goals: Guner aims to become a Certified Financial Planner (CFP) and eventually a senior partner at his advisory firm, where he can shape the firm’s service model toward transparent, structured
    planning for middle‑income families in the Red River Parish region. He intends to launch a community‑focused financial‑literacy program, publish quarterly columns in local newspapers on prudent investing,
    and expand his practice to include sustainable and impact investing options. Over the next five years, he aspires to grow his client base by 30% while maintaining the high‑touch, organized service that
    aligns with his values, and ultimately to establish his own boutique advisory practice that blends financial expertise with his passion for education.
