  hobbies: '[''Hiking & Biking in Hill Country'', ''Home Cooking (Tex-Mex & Southern cuisine)'', ''Book Club (Leadership & Self-Improvement)'', ''Community Mentorship for Teens'', ''Yoga'', ''Gardening
    (vegetable garden in backyard)'']'
  career_goals: Teresa aims to advance to a district or regional manager role within the next five years, overseeing multiple stores and shaping broader operational strategy. She plans to augment her business
    knowledge with an Executive MBA focused on retail innovation, and to spearhead initiatives that integrate technology and data analytics into store operations. Additionally, she is passionate about building
    a mentorship program for entry-level retail staff, fostering career pathways and boosting employee retention. Ultimately, she envisions one day opening her own boutique concept that blends curated product
    selections with community-focused events.
