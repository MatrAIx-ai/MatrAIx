  hobbies: '[''Reading bilingual books'', ''Drawing animals and folklore'', ''Building LEGO sets'', ''Playing educational video games'', ''Helping with simple cooking'', ''Nature walks (bird and insect
    observation)'', ''Sticker collecting and scrapbooking'', ''Practicing traditional Mexican dance steps'']'
  career_goals: Yaribel envisions a future where she works closely with animals in a structured, caring environment. Her primary ambition is to become a veterinarian, a goal reinforced by her love for caring
    for the family dog and the neighborhood stray cats. She also aims to excel academically, hoping to win the elementary school science fair and maintain a top‑ranking in her class, which satisfies her
    competitive nature. In the longer term, she imagines herself pursuing a degree in veterinary medicine at a university where she can continue to blend her bilingual abilities with animal health care.
