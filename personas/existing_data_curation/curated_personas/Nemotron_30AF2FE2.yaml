personas:
  professional: Yaribel Martinez, an aspiring young naturalist and LEGO architect, channels their love for step‑by‑step building and detailed animal sketches into meticulously crafted miniature habitats,
    while their preference for structure is challenged by occasional disorganization of scattered bricks and a competitive streak that fuels their desire to win school science fairs.
  sports: Yaribel Martinez, a spirited participant in the Odessa Outlaws youth soccer league, cheers loudly for the Texas Rangers and the local Odessa Mavericks high school football team, and eagerly watches
    the annual West Texas Rodeo, channeling their competitive nature into improving their dribbling and aiming for the winning goal.
  arts: Yaribel Martinez, a passionate collector of stickers featuring Disney and Pixar characters and an avid doodler, draws inspiration from painter Frida Kahlo, guitarist Carlos Santana, and the animated
    film Coco, often recreating vibrant scenes in their sketchbook while practicing traditional dance steps to lively mariachi tunes during family gatherings.
  travel: Yaribel Martinez, who enjoys short family road trips to nearby Big Spring State Park for bird‑watching and a weekend adventure at San Antonio’s River Walk, dreams of exploring the bustling markets
    of Oaxaca and the red rock canyons of Sedona, preferring carefully planned itineraries with built‑in downtime to keep their anxiety at bay.
  culinary: Yaribel Martinez, who delights in helping their mother roll fresh tortillas, whisk guacamole with ripe avocados, cilantro, and jalapeños, and assemble simple chicken quesadillas, often experiments
    by sprinkling queso fresco on their plates, yet they sometimes forget to wash their hands after handling raw chicken, prompting gentle reminders from their parents.
  core: Yaribel Martinez, an eight‑year‑old who balances meticulous LEGO projects and vivid animal drawings with occasional anxiety‑driven mood swings, loves stickers, salsa, and soccer, and fiercely protects
    their structured world while dreaming of big adventures beyond Odessa.
background:
  cultural: Yaribel is a first‑generation Mexican‑American raised in Odessa, Texas, a city in the oil‑rich Permian Basin. Her household is bilingual; Spanish is spoken at home while English is used at school,
    giving her fluency in both languages. Family life centers around Mexican traditions such as Día de los Muertos altars, celebrating Cinco de Mayo with homemade tamales, and attending weekly Catholic
    Mass with her extended family. At the same time, the local Texas culture—ranching, rodeos, and West Texas community events—shapes her experiences, from school field trips to nearby ranches to participating
    in local parades. This blend of Mexican and Texan influences informs her food preferences, music, holidays, and her growing sense of identity.
attributes:
