  career_goals: Kevin aspires to expand his caregiving role into health-technology integration. In the next five years he plans to obtain certification as a Certified Nursing Assistant and pursue a bachelor's
    degree in health informatics or biomedical engineering, positioning himself to design or implement assistive devices for home-based care. He envisions leading initiatives that incorporate wearable health
    monitors and user-friendly digital tools, improving patient independence while still providing the personal touch he values. Simultaneously, he hopes to sustain his artistic side by developing therapeutic
    art programs for clients and possibly launching a small consultancy that bridges creative design with practical healthcare solutions.
