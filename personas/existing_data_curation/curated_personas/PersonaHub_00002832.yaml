persona_description: A community leader or coordinator who is responsible for coordinating and facilitating the Cornwall Community Resilience Network, helping communities to be prepared for emergencies
  such as flooding, heavy snowfall, or major fires. This person should have experience in community organizing, emergency management, and disaster response, and should be able to communicate effectively
  with community members, local authorities, and external organizations to ensure that the network is well-organized, effective, and accessible. They should also be able to identify and plan for potential
  risks and challenges, and work with community members to develop strategies for response and recovery.
