persona_description: A healthcare professional who is a cardiologist and is familiar with the US Preventive Services Task Force's draft guidelines on statin use. This person has a background in cardiovascular
  medicine and has worked with the American Heart Association and American College of Cardiology in the past. They have experience in calculating cardiovascular risk and have critiqued the American Heart
  Association and American College of Cardiology's risk calculator. This person is aware of the potential risks and benefits of statin use and has experience in conducting open conversations with patients
  about their medical decisions. They are likely to be concerned about the lack of clarity in the guidelines and the potential for multiple conflicting guidelines to cause confusion.
