personas:
  professional: Corey Sanchez, at 79 a retired rural handyman turned mentor, blends decades of small‑engine repair, woodworking, and local history research into a hands‑on guide for home maintenance, and
    they channel a competitive edge into regional woodworking contests.
  sports: Corey Sanchez, at 79 a devoted fan of the Indianapolis Colts and the Indiana Hoosiers, spends winter mornings fishing the White River and joining a local senior walking club to spot migrating
    songbirds, while they maintain a modest backyard chicken coop for fresh eggs and avoid high‑impact sports due to joint pain.
  arts: Corey Sanchez, at 79 who cherishes the folk storytelling of Johnny Cash, the paintings of Andrew Wyeth, and the historical dramas of PBS, spends afternoons reading biographies of Abraham Lincoln
    and crafting miniature train scenes that echo the artistry of model designers, and they find solace in these creative pursuits.
  travel: Corey Sanchez, at 79 preferring low‑key road trips over crowds, has explored Gettysburg’s battlefield, taken a weekend drive to the Indiana Dunes for birdwatching, and dreams of a genealogy pilgrimage
    to the archives of Dublin, Ireland, while they budget travel around a modest retirement income.
  culinary: Corey Sanchez, at 79 an avid home cook, grows heirloom tomatoes and sweet corn for rustic vegetable soup, loves slow‑cooked chicken pot pie seasoned with rosemary and thyme, frequently experiments
    with pickling cucumbers and carrots for their pantry, and they often share meals with neighbors during church potlucks.
  core: Corey Sanchez, at 79 a meticulous, anxiety‑prone retiree, weaves a life of solitary tinkering, diligent budgeting, and nostalgic storytelling, while they occasionally over‑order model‑train kits
    that crowd their garage.
background:
  cultural: Corey grew up in a traditional Midwestern, white, working-class family in Benton County. His upbringing was shaped by Protestant values of self-reliance, modesty, and community service. He has
    spent most of his life in rural Missouri, where local traditions, agricultural rhythms, and close-knit neighborhood ties are central. While he respects these traditions, his lifelong curiosity has led
    him to explore new ideas - especially practical innovations - without abandoning his roots.
