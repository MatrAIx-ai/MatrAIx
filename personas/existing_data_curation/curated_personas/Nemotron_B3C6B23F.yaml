  career_goals: Even in retirement, Corey aims to stay self-reliant and to leave a tangible legacy for the younger residents of Warsaw. He plans to compile his memoirs and a practical guide to rural home
    maintenance, mentor a local high-school student interested in trades, and occasionally enter regional woodworking competitions to satisfy his competitive streak. Managing his anxiety is also a priority,
    so he intends to attend a weekly mindfulness group and keep up with regular health check-ups.
