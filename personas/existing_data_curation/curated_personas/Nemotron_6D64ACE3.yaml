    nature trails and park outings with friends'', ''Volunteering at the McKinney community center, especially senior‑focused programs'']'
  career_goals: Esther aims to transition from informal volunteering to a part‑time role that blends her love of art with her community‑focused nature. She plans to become a volunteer coordinator for cultural
    festivals in McKinney, develop and lead workshops that teach Mexican folk‑art techniques, and eventually launch a modest home‑based boutique selling her handcrafted items online and at local markets.
    To deepen her impact, she intends to complete a short certificate program in community health counseling so she can support neighbors dealing with stress and anxiety. Her long‑term ambition is to create
    inclusive, culturally rich experiences that celebrate her Mexican heritage while fostering harmony among the diverse residents of Collin County.
