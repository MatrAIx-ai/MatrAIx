personas:
  professional: Esther Dulal, a community arts coordinator with a knack for improvisational event planning, leverages their bilingual fluency, empathetic listening, and love for folk traditions to design
    inclusive cultural festivals, while they sometimes let last‑minute changes slip past their relaxed organizational style.
  sports: Esther Dulal, a dedicated participant in community folklorico dance and regular walker on the White Rock Nature Trail, roots for the Dallas Mavericks and the Texas Rangers, and joins a local yoga
    club that meets at a community center every Thursday.
  arts: Esther Dulal, a devoted patron of the McKinney Art Museum who explores exhibitions featuring Frida Kahlo and contemporary Texas muralists, channels that inspiration into hand‑painted ceramics, vibrant
    papel‑picado banners, and thoughtful curations for community events.
  travel: Esther Dulal, who prefers flexible itineraries over rigid schedules, enjoys weekend getaways to Austin’s live‑music scene and Santa Fe’s art fairs, dreams of a culinary pilgrimage to Oaxaca’s
    markets, and often books last‑minute train tickets to keep expenses aligned with a modest volunteer stipend.
  culinary: Esther Dulal, an adept home chef, blends smoky Texas brisket with mole rojo to create a signature brisket‑mole taco, seasons dishes with epazote and chipotle, and frequently hosts potluck nights
    where they showcase hand‑rolled tamales infused with locally sourced cheese.
  core: Esther Dulal, a 53‑year‑old community‑focused arts enthusiast, balances an infectious curiosity and love for folk creativity with a tendency toward last‑minute planning and occasional worry about
    stress.
background:
  cultural: Esther grew up in a bilingual Mexican‑American household, where Spanish was spoken at home and English at school. Family traditions such as Día de los Muertos, quinceañeras, and weekly tamale
    nights instilled in her a deep appreciation for Mexican art, music, and cuisine. Living in McKinney, Texas, she has blended these roots with the broader Texan culture, celebrating both Cinco de Mayo
    and local state fairs. Her identity is a vibrant mix of Mexican heritage—marked by strong family ties, communal celebrations, and Catholic influences—and the multicultural, entrepreneurial spirit of
    her Texas community. This dual background fuels her passion for sharing cultural stories, preserving folk crafts, and building bridges between diverse groups in Collin County.
