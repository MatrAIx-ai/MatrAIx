  hobbies: '["Cooking soulful family meals", "Church gospel choir participation", "STEM mentorship for youth", "Cycling and hiking on the Illinois Prairie Path", "Fishing on local lakes", "Attending Chicago
    Cubs games", "Listening to R&B, jazz, and hip‑hop", "Reading leadership and manufacturing tech books"]'
  career_goals: Frazier aims to transition from first‑line supervision to an operations‑manager role within the next five years, leveraging a bachelor’s degree in business administration he plans to complete
    part‑time. He is pursuing Six Sigma Black Belt certification to deepen his expertise in process optimization and hopes to lead a plant‑wide automation project that integrates IoT sensors and robotics
    while preserving the workforce’s skill set. Long‑term, he envisions establishing a mentorship pipeline that connects the manufacturing facility with local schools to inspire under‑represented youth
    toward technical careers, thereby giving back to the community that shaped him.
