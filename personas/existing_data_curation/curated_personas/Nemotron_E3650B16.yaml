personas:
  professional: Rosemary Holden is a budding software creator who spends afternoons designing interactive stories in Scratch, contributes pragmatic solutions to the school robotics club, and leverages an
    organized, methodical mindset to debug code with the same careful planning they apply to school projects, balancing a love for imaginative tech with realistic problem‑solving.
  sports: Rosemary Holden prefers solitary fitness routines such as early‑morning laps at the community pool and weekend trail runs with the school cross‑country team, while cheering on the Los Angeles
    Dodgers in baseball, the Anaheim Ducks in hockey, and the LA Galaxy in soccer during televised games, and they often keep a score‑sheet in their journal to note game highlights.
  arts: Rosemary Holden channels creative energy into playing Beethoven’s ‘Moonlight Sonata’ on the piano, sketching watercolor landscapes inspired by Thomas Moran, devouring sci‑fi novels by Brandon Sanderson,
    and they regularly attend local community theater productions featuring performances by the Orange County Youth Players, all of which shape their narrative voice and aesthetic sensibility.
  travel: Rosemary Holden plans meticulous weekend getaways, having explored Disneyland, the tide pools of La Jolla, and a road trip along the Pacific Coast Highway, and they daydream about future adventures
    to Kyoto’s bamboo forest, the aurora‑lit skies of Iceland, and the ancient ruins of Machu Picchu, balancing a love for structured itineraries with occasional spontaneous detours.
  culinary: Rosemary Holden enjoys crafting herb‑infused dishes such as basil‑pesto pasta and rosemary‑roasted chicken, experiments with fresh mint and thyme in homemade lemon‑ginger tea, and relishes holiday
    feasts featuring turkey and pumpkin pie, yet they sometimes neglect to clean their kitchen counters after cooking, leading to a modest mess they later tidy.
  core: Rosemary Holden is a methodical 13‑year‑old with a curiosity for tech, a penchant for solitary creativity, and they often over‑plan both school projects and snack schedules.
background:
  cultural: Rosemary comes from a white, middle‑class family that has lived in Garden Grove for several generations. Growing up in Orange County, she has been exposed to the region’s cultural diversity
    while her household maintains traditional American customs—celebrating holidays like Thanksgiving, Christmas, and the Fourth of July with family gatherings and home‑cooked meals. Her parents value education
    and encourage self‑directed learning, reflecting the suburban Californian emphasis on academic achievement and civic involvement. The multicultural environment of the area has introduced her to a variety
    of cuisines, festivals, and perspectives, which she appreciates even as she primarily identifies with her Anglo‑American heritage.
