  career_goals: Rosemary aspires to turn her curiosity and methodical mindset into a career that blends scientific inquiry with technology. She envisions becoming a software engineer or data analyst creating
    educational tools, or a research scientist focused on environmental sustainability. She plans to attend a STEM‑focused high school, pursue a university degree in computer science or biology, and ultimately
    develop innovative, practical solutions that help people learn and protect the planet.
