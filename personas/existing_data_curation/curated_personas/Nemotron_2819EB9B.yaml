personas:
  professional: Lena Edgins channels her lifelong curiosity and strong interpersonal skills into community organizing, designing intergenerational art workshops at the Orange City Community Center, curating
    senior‑led exhibitions, and mentoring younger volunteers while they balance meticulous budgeting with the flexibility needed for spontaneous creative projects.
  sports: Lena Edgins stays active by tending her prairie garden, taking brisk morning walks, and cheering on the local minor‑league baseball team, the River Valley Hawks, while they also enjoy weekly bridge
    games that keep their mind sharp and occasionally join senior yoga classes at the community hall.
  arts: Lena Edgins immerses herself in modern and abstract art, frequently visiting regional exhibitions featuring works by Mark Rothko and Wassily Kandinsky, and they paint delicate watercolors inspired
    by Georgia O'Keeffe's floral motifs while relaxing to the sounds of Duke Ellington’s big band recordings during knitting sessions and community art shows.
  travel: Lena Edgins has already taken train trips to New York’s Museum of Modern Art, Chicago’s Art Institute, and Santa Fe’s Georgia O'Keeffe Museum, and they dream of a road‑trip to the Getty Center
    in Los Angeles, balancing their wanderlust with a fixed travel budget and the desire to share each journey’s stories with their grandchildren.
  culinary: Lena Edgins delights in cooking classes that explore international cuisines, especially mastering a saffron‑infused paella, a fragrant Thai green curry, and a Mediterranean mezze platter, and
    they often use herbs harvested from their own garden like rosemary and basil, though they sometimes over‑spice dishes in their zeal to impress.
  core: Lena Edgins is an 82‑year‑old curiosity‑driven community organizer who blends art, gardening, and mentorship into a vibrant senior life, while they juggle worry‑induced budgeting quirks and occasional
    health forgetfulness.
background:
  cultural: Lena was born in the early 1940s on a family farm near Orange City, Iowa, a town known for its Dutch heritage and close‑knit Lutheran community. Raised in a multigenerational household, she
    inherited a respect for hard work, modesty, and community service. The area's annual Tulip Festival, local church, and community college shaped her appreciation for cultural traditions and education.
    While firmly rooted in Midwestern values, Lena’s curiosity led her to explore broader artistic and intellectual currents, allowing her to blend traditional roots with contemporary perspectives.
