  hobbies: '[''Painting (watercolor, acrylic)'', ''Visiting art museums and galleries'', ''Gardening (prairie flowers, vegetables)'', ''Knitting and quilting'', ''Book club and bridge'', ''Community dance
    events'', ''Genealogy research'', ''Cooking international dishes'', ''Attending lectures on science and philosophy'', ''Listening to jazz and big band music'']'
  career_goals: Lena aspires to deepen her involvement in the local cultural scene by leading workshops at the Orange City Community Center, curating intergenerational art projects, and documenting the
    town’s Dutch heritage through oral histories. She aims to mentor younger volunteers, especially women, helping them develop leadership skills. Her personal ambition includes completing a memoir that
    intertwines family history with reflections on societal change, and traveling to at least three major art museums across the United States. Additionally, she hopes to champion mental wellness for seniors
    by creating a peer‑support circle that integrates mindfulness practices.
