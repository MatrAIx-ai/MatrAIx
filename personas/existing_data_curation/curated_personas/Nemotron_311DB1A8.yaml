  hobbies: '[''drawing and sketching'', ''digital painting'', ''writing poetry and short stories'', ''photography (nature and street)'', ''playing acoustic guitar'', ''reading magical realism and fantasy
    novels'', ''attending community theater performances'', ''experimenting with DIY crafts'', ''gardening succulents'', ''browsing online art communities'']'
  career_goals: She envisions a future as a multidisciplinary artist who blends visual storytelling, illustration, and interactive media. Her immediate goal is to build a robust portfolio that showcases
    her sketches, digital paintings, and written pieces, aiming to earn admission to a reputable art college or a specialized illustration program. Long‑term, she hopes to work as a concept artist for video
    games or graphic novels, and to eventually open a community art space in McComb where local youth can explore creativity outside the constraints of traditional classrooms.
