personas:
  professional: Karen Flammini, a 16‑year‑old aspiring multidisciplinary artist, fuses hand‑sketched figures, digital illustration, and poetic narratives, channeling their boundless imagination and relaxed,
    flexible work style into spontaneous concept pieces while often juggling school deadlines with impromptu sketch sessions.
  sports: Karen Flammini, a 16‑year‑old high school student, enjoys casual weekend skateboarding at the local park, follows the McComb High School Panthers football team and the New Orleans Saints for NFL
    excitement, and keeps fit by participating in a community yoga club and occasional Friday night swims at the town pool.
  arts: Karen Flammini, a 16‑year‑old creative enthusiast, immerses themselves in the works of Frida Kahlo, the acoustic melodies of Joni Mitchell, and the magical‑realist novels of Isabel Allende, while
    regularly attending local community theater productions and contributing original poetry to their after‑school circle, carving out a personal aesthetic inspired by both classic and contemporary art.
  travel: Karen Flammini, a 16‑year‑old explorer, prefers short road trips to nearby cultural hotspots like New Orleans for its music festivals and the historic arts quarter in Natchez, while dreaming of
    a student exchange in Florence to study Renaissance art, planning each journey through Pinterest boards and balancing a limited family budget with school‑approved field trips.
  culinary: Karen Flammini, a 16‑year‑old budding chef, favors simple yet flavorful dishes such as shrimp étouffée, sweet tea, avocado toast, and homemade lemon tarts, enjoys experimenting with fresh herbs
    from their indoor succulent garden, and possesses an intermediate skill level in cooking, often sharing meals with friends after art sessions.
  core: Karen Flammini, a 16‑year‑old imaginative teen, balances spontaneous artistic bursts with occasional disorganization, impulse art‑supply splurges, and a quiet love for succulent gardening that grounds
    their creative whirlwind.
background:
  cultural: Karen grew up in McComb, a close‑knit town in Pike County, Mississippi, within a predominantly white, Southern Christian community. Family gatherings, church activities, and local festivals
    have ingrained in her a sense of hospitality, community responsibility, and respect for Southern storytelling traditions. The region’s blues and folk music, as well as the oral histories passed down
    through generations, inform her artistic sensibility. While she feels rooted in these traditions, her avid internet use exposes her to global art movements and diverse cultural narratives, which she
    weaves into her own creative expression.
