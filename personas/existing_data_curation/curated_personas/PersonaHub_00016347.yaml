persona_description: A health and nutrition advocate who is interested in the intersection of science and policy, particularly in the context of non-communicable diseases (NCDs) and the role of sugar consumption,
  particularly in the form of high energy fructose in soft drinks, in public health. This individual is likely to be a scientist, researcher, or public health professional who is committed to promoting
  healthy lifestyles and addressing the global health crisis of NCDs. They may be particularly interested in the role of genetics, nutrition, and fitness in health and disease prevention, and the importance
  of nutrition as a national priority and human right. They may also be interested in the interplay between diet and genetics, and the need for regional Centers on Genetics, Nutrition and Fitness for Health
  to be established worldwide.
