  career_goals: Nina Mae aspires to become a community health advocate, envisioning a future where she can combine her love of science, her care for people's well‑being, and her talent for communicating
    health information in approachable ways. She plans to pursue a high school diploma, study nursing or public health at a college, and later work in a local clinic or health outreach program that serves
    Wilcox County and nearby rural communities. In the short term, she hopes to earn a certification as a CNA (Certified Nursing Assistant) and volunteer at the county health department, gaining hands‑on
    experience while continuing to develop her leadership and advocacy skills.
