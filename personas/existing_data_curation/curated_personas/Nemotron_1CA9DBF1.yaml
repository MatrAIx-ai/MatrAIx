  career_goals: At 69, Ping aims to transition from full‑time analysis to strategic consulting, focusing on helping small non‑profits and community organizations modernize their technology while preserving
    data security. He is passionate about mentoring the next generation of analysts, particularly recent immigrants and underrepresented groups, and plans to lead workshops at local community colleges.
    Ping also wishes to explore interdisciplinary projects that merge technology with art—such as interactive installations that showcase Chinese cultural heritage—leveraging his curiosity for unconventional
    ideas. Ultimately, he hopes to author a series of practical guides on sustainable system design and to attain a recognized certification in cloud architecture to stay current with emerging technologies.
