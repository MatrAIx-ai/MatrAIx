  career_goals: Liliana aims to advance to a Security Operations Manager role at a major casino in Phoenix, overseeing both physical and electronic surveillance teams. She plans to complete her associate
    degree in criminal justice, obtain the Certified Security Supervisor (CSS) credential, and develop specialized anti‑cheating protocols for the gaming floor. Long‑term, she hopes to transition into compliance
    auditing within the state gaming commission, using her experience to mentor younger women entering the security field.
