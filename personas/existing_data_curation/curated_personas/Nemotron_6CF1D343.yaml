personas:
  professional: Liliana Alarcon, a 52-year-old veteran of casino floor surveillance, blends razor-sharp real-time video analysis with calm, methodical incident assessment, leveraging their innate curiosity
    for emerging AI tools while asserting authority during de-escalations, and mentors new guards with the same organized precision that defines their work.
  sports: Liliana Alarcon supports the Phoenix Suns and Arizona Diamondbacks, plays in a co-ed community soccer league on Saturday mornings, and balances their competitive spirit with sunrise walks along
    the Rio Salado, reflecting an organized yet adaptable approach to fitness.
  arts: Liliana Alarcon regularly attends local theater productions of Arthur Miller plays, fills their playlists with the smoky saxophone tones of John Coltrane, and decorates their rooftop garden with
    framed prints of Vincent van Gogh's Starry Night, weaving a love for classic arts into their routine.
  travel: Liliana Alarcon prefers meticulously planned trips that blend cultural immersion with relaxation, having explored Sedona's red-rock trails, Santa Fe's historic plazas, and a weekend food-truck
    crawl in Portland, while dreaming of a future pilgrimage to Kyoto's zen gardens once their retirement savings permit.
  culinary: Liliana Alarcon, an avid home chef, delights in crafting mole with pasilla, mulato, and ancho chiles, slow-cooking pozole using hominy and pork shoulder, and seasoning garden-fresh herbs like
    cilantro and epazote, often hosting neighborhood potlucks where their signature chipotle-infused guacamole steals the spotlight.
  core: Liliana Alarcon balances a high-stakes surveillance career with a garden-filled sanctuary, using meticulous order to calm their anxiety, while occasionally succumbing to late-night spice cravings
    that leave them reaching for an extra bowl of mole.
background:
  cultural: Liliana is a first‑generation Mexican‑American whose parents emigrated from Jalisco, Mexico. Raised in a bilingual household in Phoenix, she embraces both Mexican cultural traditions and the
    broader Southwestern U.S. lifestyle. She celebrates Día de los Muertos, Semana Santa, and Mexican Independence Day with her extended family, and her daily life is flavored by Mexican cuisine, music,
    and values of family loyalty and community service. Her fluency in Spanish and deep connections to the local Mexican community inform her communication style at work and her involvement in neighborhood
    events, while her Catholic upbringing adds a reflective dimension to her personal coping practices.
