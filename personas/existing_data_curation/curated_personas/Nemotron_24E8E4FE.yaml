personas:
  professional: A budding technologist and LEGO architect, Marchia Flentge merges Scratch coding experiments with intricate brick constructions, channeling a curiosity-driven yet practical mindset into
    school projects, and they often misplace their project notebooks in the chaos of after-school play.
  sports: A team-spirited athlete, Marchia Flentge dazzles on the San Mateo Youth Soccer Club's Red Tigers U8 team and swims with the Santa Clara Swim Club's junior squad, idolizing the San Jose Earthquakes
    and Golden State Warriors for their cooperative play, while they relish the competitive spark of scoring a goal and sprinting the last lap in a relay.
  arts: An energetic pop-dancer and budding pianist, Marchia Flentge spends afternoons dancing to Taylor Swift and BTS hits, practicing piano pieces like Fur Elise and Let It Go, and devouring adventure
    books by Andy Weir and graphic novels featuring Spider-Man, which they cite as inspiration for their own storytelling in Scratch.
  travel: An inquisitive weekend explorer, Marchia Flentge eagerly joins family trips to Half Moon Bay's tide pools, hikes the Redwood trails of Muir Woods, and savors annual road trips to Lake Tahoe, while
    dreaming of a future vacation to Disneyland and a cross-country train ride to the Grand Canyon, planning each outing with a hand-drawn map and a spontaneous appetite for new sights.
  culinary: A budding kitchen enthusiast, Marchia Flentge mixes a love for grilled cheese sandwiches with cheddar and tomato soup, whips up macaroni and cheese with hidden broccoli florets, enjoys constructing
    simple cucumber sushi rolls with rice and soy sauce, and occasionally blends banana and peanut butter into a smoothie, though they often forget to clean up the sticky kitchen counter after snack time.
  core: Marchia Flentge is a curious, sociable seven-year-old who blends competitive soccer energy with LEGO creativity, prefers flexible plans over rigid schedules, and habitually misplaces their project
    supplies while staying emotionally steady under pressure.
background:
  cultural: Marchia comes from a middle‑class white family with roots in the Pacific Northwest and the Midwest. Her parents value education, outdoor recreation, and community involvement, reflecting typical
    American cultural norms of the Bay Area. Growing up in Burlingame, she is exposed to a diverse, tech‑savvy environment that encourages curiosity, innovation, and social participation. Family traditions
    include celebrating holidays like Thanksgiving and the Fourth of July with gatherings, weekend trips to nearby nature reserves, and encouraging independence and practical problem‑solving from a young
    age.
attributes:
  skills: '[''Reading fluently'', ''Basic arithmetic'', ''Storytelling'', ''LEGO building'', ''Scratch coding basics'', ''Teamwork'', ''Soccer'', ''Puzzle solving'']'
  hobbies: '[''Soccer'', ''Swimming'', ''LEGO building'', ''Scratch coding'', ''Reading adventure books'', ''Science magazines'', ''Nature walks'', ''Dancing'', ''Piano lessons'']'
  career_goals: Marchia imagines a future where she can combine her curiosity about how things work with her love of teamwork and competition. She aspires to become a creative engineer or game designer
    who builds interactive toys or educational apps that help other kids learn while having fun. Inspired by the tech community near her home in the Bay Area, she also dreams of one day working on projects
    that solve real-world problems, such as designing sustainable playgrounds or inventing simple robots for classroom use. Her competitive spirit pushes her to aim for a role where she can lead a team
    and see her ideas come to life.
