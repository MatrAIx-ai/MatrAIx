persona_description: A historian and geographer who is interested in the history and development of the U.S. Coast Survey, particularly its work in Albemarle Sound, North Carolina. This individual is likely
  to have a deep knowledge and understanding of the surveying techniques and equipment used during the 1840s, as well as an appreciation for the historical context in which these surveys were conducted.
  They may also be interested in the broader impact of the Coast Survey on American navigation and mapping, as well as the role of the Coast Survey in the broader history of American science and exploration.
