  hobbies: '[''Woodworking'', ''Fishing'', ''Hunting'', ''Genealogy'', ''Reading local history'', ''Bluegrass music listening'', ''Card games'', ''Volunteer fire department activities'', ''Gardening'']'
  career_goals: Although retired from paid employment, Seth aims to channel his experience into mentorship and preservation. He wishes to teach his grandchildren and interested local youth how to maintain
    farm equipment, perform basic home repairs, and craft functional woodworking pieces, ensuring that practical knowledge stays alive in his community. He also hopes to complete a small log cabin he has
    been designing for years, using it as a venue for family gatherings and as a showcase of traditional Appalachian building techniques. Additionally, Seth aspires to document oral histories of longtime
    Newport residents, contributing a manuscript to the local historical society and strengthening his marital partnership through shared volunteer work at the church.
