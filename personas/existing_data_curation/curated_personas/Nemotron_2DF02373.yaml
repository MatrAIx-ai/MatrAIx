personas:
  professional: Estela Vegaotero harnesses their decades of experience in curriculum development and instructional design to craft bilingual, technology‑rich courses for adult learners, integrating inclusive
    pedagogy with compassionate mentorship while channeling their curiosity into practical, organized frameworks and managing their own anxiety by meticulously planning each semester.
  sports: Estela Vegaotero hikes the misty trails of El Yunque with the senior walking group Rainforest Striders, attends local baseball games supporting the Cangrejeros, and follows the island's professional
    soccer club FC, using these activities to stay socially engaged and physically active.
  arts: Estela Vegaotero revels in the lively beats of bomba and plena at community festivals, delights in the soulful crooning of Cheo Feliciano, and explores themes of identity and resilience through
    the works of Julia Alvarez and Edwidge Danticat discussed in their book club, enriching their creative spirit.
  travel: Estela Vegaotero favors purposeful travel that mixes cultural immersion with relaxation, regularly revisiting historic Old San Juan, exploring the colonial charm of Cartagena, and seeking tranquil
    retreats along the Bahamas' blue‑water shores, planning each trip meticulously while allowing spontaneous detours for local culinary discoveries.
  culinary: Estela Vegaotero expertly prepares arroz con gandules, slow‑roasted pernil, and silky tembleque using fresh herbs from their garden such as cilantro, oregano, and culantro, and enjoys sharing
    these hearty meals at neighborhood gatherings where their generosity is balanced by an occasional indulgence in too‑many sweet desserts.
  core: Estela Vegaotero is a compassionate, curiosity‑driven educator who balances meticulous organization with flexible creativity, yet their intense emotional reactivity fuels both deep empathy and periodic
    anxiety.
background:
  cultural: Estela grew up in the vibrant communities of San Juan and Bayamón, immersed in Puerto Rico’s rich blend of Spanish, African, and indigenous Taíno heritage. Her family emphasized the importance
    of "familia" and communal support, values that shape her compassionate teaching style and dedication to collective well‑being. Bilingual by upbringing, she navigates both English and Spanish fluently,
    allowing her to bridge cultural gaps in academic settings. Religious traditions, especially Catholic festivals and local patron saint celebrations, have reinforced her sense of ritual and community
    cohesion. Throughout her life, she has drawn strength from Puerto Rican artistic expressions—music, dance, and storytelling—which inspire her creative approaches to education. Her experiences of divorce
    and managing intense emotions have deepened her empathy, motivating her to advocate for mental‑health resources and emotional resilience within the academic community.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Online Teaching Platforms'', ''Bilingual Education (English/Spanish)'', ''Student Mentorship'', ''Academic Advising'', ''Community Outreach'',
