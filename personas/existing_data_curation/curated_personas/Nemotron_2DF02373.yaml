  hobbies: '[''Gardening'', ''Traditional Puerto Rican Cooking'', ''Dancing (Plena/Bomba)'', ''Hiking in El Yunque'', ''Reading Historical Fiction'', ''Meditation and Yoga'', ''Volunteer Tutoring'', ''Book
    Club Participation'', ''Journaling'', ''Painting'']'
  career_goals: Estela aims to leave a lasting legacy by embedding culturally responsive teaching practices into the university’s curricula, ensuring that Puerto Rican history, language, and values are
    integral to learning experiences. She plans to expand the mentorship program she founded for at‑risk adult learners, creating a structured pipeline for peer support and professional development. Over
    the next few years, she hopes to secure a leadership role—such as department chair or director of community engagement—where she can champion interdisciplinary collaborations with local NGOs to provide
    educational resources and mental‑health support for students. Additionally, she aspires to author a scholarly book on adult learning and emotional resilience, drawing from her own experiences with anxiety
    and compassion for others.
