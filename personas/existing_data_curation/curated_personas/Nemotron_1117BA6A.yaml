personas:
  professional: Emilia Moreno, a budding junior architect, channels her love for intricate LEGO constructions and puzzle solving into designing imaginative cardboard forts and detailed sketches, showing
    early strategic thinking and a competitive streak.
  sports: Emilia Moreno enjoys weekend visits to the local park where she participates in the Little Kickers soccer club, practices basic salsa steps at home, cheers for the Brooklyn Nets, and collects
    shells along the shoreline of Coney Island.
  arts: Emilia Moreno expresses her artistic side by drawing cartoons inspired by Bill Watterson and sketching colorful Brooklyn street scenes, while she sways to the salsa rhythms of Marc Antonio and Celia Cruz
    during family dance sessions.
  travel: Emilia Moreno dreams of exploring the Grand Canyon and historic Old San Juan, but currently delights in family trips to the New York Botanical Garden and seasonal visits to Coney Island beach,
    preferring organized itineraries that allow ample time for shell‑hunting and puzzle‑solving breaks.
  culinary: Emilia Moreno loves helping in the kitchen, especially preparing family‑style empanaditas filled with cheese or ham and sprinkling cinnamon on warm apple slices, though her cooking skill remains
    beginner level and often results in a tasty but slightly over‑cooked crust.
  core: Emilia Moreno is a curious, competitive seven‑year‑old who balances solitary puzzle adventures with lively salsa dance bursts, yet often battles worry‑filled thoughts that make bedtime a challenge.
background:
  cultural: Emilia is a second‑generation Puerto Rican growing up in Brooklyn's vibrant Kings County community. Her household is bilingual, with Spanish spoken daily alongside English, and she celebrates
    traditional holidays such as Three Kings Day and the Puerto Rican Festival in Williamsburg. Family gatherings often feature arroz con gandules, pasteles, and lively salsa music, which have shaped her
    love for cooking and cultural dance. She attends a local public elementary school where she participates in a Spanish language program and occasionally joins community events at the nearby cultural
    center, reinforcing her connection to her heritage while navigating the diverse fabric of New York City.
