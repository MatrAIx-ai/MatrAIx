  hobbies: '[''Reading adventure and mystery books'', ''Building LEGO structures'', ''Solving jigsaw puzzles'', ''Playing chess'', ''Drawing cartoons'', ''Listening to salsa music and dancing'', ''Helping
    in the kitchen with Puerto Rican recipes'', ''Exploring parks and collecting shells'']'
  career_goals: Emilia dreams of becoming a marine biologist who explores and protects the ocean life along the Brooklyn waterfront, a goal inspired by her love of water and curiosity about science. She
    is determined to excel in school science fairs and hopes to win a regional competition, channeling her competitive spirit into academic achievement. While she values practicality, she also wants to
    help her family and community, so she envisions a future where she can teach younger children about environmental stewardship, blending her ambition with a sense of responsibility.
