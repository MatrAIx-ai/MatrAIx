  hobbies: '[''Drawing and sketching'', ''Lego building'', ''Reading adventure and science books'', ''Playing basketball'', ''Listening to blues and gospel music'', ''Exploring nature (river banks, parks)'',
    ''Simple coding with ScratchJr'', ''Collecting stickers and postcards'', ''Participating in community art projects'']'
  career_goals: Lee dreams of exploring space and sharing his discoveries through art. He hopes to become an astronaut or a scientist who studies the stars, while also developing his talent as an illustrator
    to create educational comics and visual stories that inspire other children. He aspires to attend a STEM-focused middle school, excel in science and art, and later use his knowledge to give back to
    his community by teaching kids about exploration and creativity.
