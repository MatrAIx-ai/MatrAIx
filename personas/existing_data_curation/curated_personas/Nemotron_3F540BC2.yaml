personas:
  professional: Shirley Virnig is a veteran project management professional with three decades of cross‑functional leadership in construction, technology, and community development, using PMP and Lean Six
    Sigma Black Belt expertise to craft meticulously planned, data‑driven initiatives while fostering a calm, collaborative environment that mentors and empowers team members.
  sports: Shirley Virnig channels her love of the outdoors into weekly hikes with the Foothills Trailblazers and community clean‑up treks, attends weekday yoga at Harmony Flow studio, supports the Colorado
    Avalanche, Denver Broncos, and Colorado Rockies, and joins a local tennis league for light cardio during the summer.
  arts: Shirley Virnig cultivates her creative side through landscape photography inspired by Ansel Adams, enjoys folk‑rock concerts by Brandi Carlile and The Lumineers, participates in a contemporary nonfiction
    book club featuring authors like Michael Lewis, and frequents the Denver Art Museum to view works by Georgia O'Keeffe.
  travel: Shirley Virnig plans her travel with detailed itineraries, favors eco‑friendly road trips to Rocky Mountain National Park, Great Sand Dunes, and Banff, cherishes weekend photography excursions
    in the Colorado Front Range, and dreams of trekking Patagonia’s Torres del Paine and exploring Iceland’s volcanic landscapes.
  culinary: Shirley Virnig delights in cooking wholesome meals such as quinoa‑roasted‑vegetable bowls, grilled salmon with lemon‑dill sauce, kale‑sweet‑potato salad, and lentil soup, often using fresh herbs
    like rosemary and thyme, and while she masters low‑salt seasoning, she occasionally over‑sautés the vegetables.
  core: Shirley Virnig blends structured project mastery with a compassionate, community‑centered spirit, staying calm under pressure while juggling a love for hiking, photography, and meticulous budgeting,
    even if they sometimes forget to floss after a long trek.
background:
  cultural: Shirley was raised in a Midwestern white American family with German ancestry, where values of hard work, reliability, and community service were emphasized. Relocating to Arvada, Colorado,
    she absorbed the mountain west’s appreciation for nature, neighborly cooperation, and practical problem‑solving. She remains active in her local Methodist congregation, which reinforces her compassionate,
    cooperative outlook, and she celebrates seasonal traditions such as Thanksgiving communal potlucks and summer outdoor festivals that reflect both her heritage and regional culture.
attributes:
  skills: '[''Project Planning'', ''Risk Management'', ''Budget Management'', ''Stakeholder Communication'', ''Agile & Waterfall Methodologies'', ''Lean Six Sigma'', ''Team Facilitation'', ''Conflict Resolution'',
