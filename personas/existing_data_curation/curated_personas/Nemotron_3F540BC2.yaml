  hobbies: '[''Hiking'', ''Community Volunteering'', ''Book Club'', ''Gardening'', ''Yoga'', ''Cooking'', ''Traveling'', ''Puzzles (Crosswords, Sudoku)'', ''Photography'']'
  career_goals: Shirley aims to ascend to the role of Director of the Project Management Office, where she can institutionalize a culture of collaborative, ethically grounded project delivery. She intends
    to design and launch a mentorship program for emerging project managers, integrate sustainability metrics into project evaluation, and strengthen cross‑departmental governance. Looking ahead, she envisions
    transitioning to a consultancy focused on strategic community development projects in the Colorado Front Range, leveraging her project expertise to enhance local nonprofit initiatives and green infrastructure
    efforts.
