  sports: Reagan Santiagosantiago, a 2-year-old with boundless energy, enjoys weekly toddler gymnastics sessions at Little Gym while cheering on the Chicago Cubs on family game nights, and in the spring
    they join a Mini Kickball club at the neighborhood park, balancing structured activity with spontaneous backyard sprints.
  arts: Reagan Santiagosantiago, a curious 2-year-old, decks the living room with crayon masterpieces inspired by Eric Carle's vibrant illustrations, sings along to Raffi's Baby Beluga and Sesame Street's
    quirky tunes, and they attend a weekly early-music class where they explore rhythmic patterns on a tiny xylophone, showing an appreciation for both visual and auditory arts.
  travel: Reagan Santiagosantiago, at age 2, prefers short, stroller-friendly outings and has already explored the San Diego Zoo, delighted in a day trip to Walt Disney World's Magic Kingdom, and they daydream
