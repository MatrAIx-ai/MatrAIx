persona_description: A health care professional who works in a nursing or midwifery role and is responsible for supporting women and girls who have been affected by Female Genital Mutilation (FGM). They
  are committed to raising awareness about the practice and its impact on individuals, and are dedicated to promoting best practices in prevention and support. They are knowledgeable about the legal and
  ethical considerations surrounding FGM and are actively engaged in safeguarding practices to ensure the safety and well-being of women and girls in their care.
