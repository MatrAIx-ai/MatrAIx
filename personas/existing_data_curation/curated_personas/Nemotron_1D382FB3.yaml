personas:
  professional: Karina Araniva, a seasoned electrical and electronic engineering technologist at a Midwestern manufacturing firm, leverages their deep expertise in PLC programming, circuit design, and smart
    sensor networks to craft meticulous schematics in AutoCAD Electrical while mentoring junior technicians, and they are actively pursuing PMP and CMRP certifications to transition into senior consulting
    on renewable-energy smart‑grid projects.
  sports: Karina Araniva fuels their fitness by strolling the wooded paths of the Heartland Trail in Will County three times a week, occasionally joining a senior tennis round‑robin at the local recreation
    center, and they loyally follow the Chicago Cubs and the Chicago Bears, cheering the teams from their modest living room during game nights.
  arts: Karina Araniva channels their creative energy into oil painting cityscapes reminiscent of Edward Hopper, captures the interplay of light in their black‑and‑white photography echoing Ansel Adams,
    and finds solace at the piano playing Chopin nocturnes and Einaudi’s minimalist pieces, while they routinely visit the Art Institute of Chicago to study works by Monet and local Illinois muralists.
  travel: Karina Araniva plans their trips with meticulous itineraries, favoring solo or small‑group explorations of culturally rich sites such as the historic streets of Barcelona, the artistic cafés of
    Paris, and the colonial charm of Antigua Guatemala, while also weekending in Midwestern gems like Galena, Illinois and the Everglades wetlands, where they balance their love for photography with a modest
    travel budget.
  culinary: Karina Araniva enjoys crafting traditional Central American staples such as baleadas stuffed with refried beans, queso fresco, and crema, alongside arroz con pollo infused with achiote and fresh
    cilantro, while they experiment by integrating locally sourced vegetables into these recipes, and they proudly serve their family a Saturday stew of plantain and yuca with chicharrón that blends nostalgia
    with a hint of smoked paprika.
  core: Karina Araniva, a quietly competitive 63‑year‑old engineer, fuses art and technology, pursues renewable‑energy consulting, nurtures cultural roots through cooking and painting, and balances solitary
    creativity with a skeptical yet curious outlook.
background:
  cultural: Karina was born in Honduras and immigrated to the United States, settling in Bolingbrook, Illinois. Her cultural identity blends traditional Honduran values—strong family ties, Catholic traditions,
    and a love for Latin American music and cuisine—with Midwestern American influences. Bilingual and active in the local Hispanic community, she participates in cultural festivals and mentors fellow immigrants.
    Her heritage informs her professional perspective, fostering resilience, adaptability, and a collaborative spirit that values diverse viewpoints while maintaining a personal drive for excellence.
