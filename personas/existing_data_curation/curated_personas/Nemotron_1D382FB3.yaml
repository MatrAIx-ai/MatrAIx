  career_goals: Karina aims to transition into a senior technical consultant role focusing on renewable energy projects, leveraging her expertise to design and implement smart grid solutions for local municipalities.
    She plans to obtain certifications such as PMP and CMRP to enhance her project leadership capabilities. Additionally, she aspires to mentor Hispanic youth in STEM through community outreach and to develop
    a part‑time teaching position at a nearby community college, where she can share her practical knowledge and love for interdisciplinary innovation. A long‑term ambition is to spearhead collaborative
    art‑technology installations that showcase cultural narratives within public spaces.
