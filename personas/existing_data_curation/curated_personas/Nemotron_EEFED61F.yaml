  career_goals: Stanley aspires to transition from a general receptionist role to a position that merges his administrative expertise with his passion for the arts. He aims to become a visitor services
    coordinator or public information officer at a local museum, gallery, or cultural center, where he can curate informational materials and engage with small, interested audiences. To qualify, he plans
    to complete a certificate in museum studies or archival management within the next two years. Long‑term, he dreams of establishing himself as a freelance content consultant, producing museum pamphlets,
    exhibition catalog essays, and culturally focused blog posts. Additionally, he hopes to develop a modest side‑business selling limited‑edition prints of his own digital artwork, providing both creative
    fulfillment and supplemental income. Throughout, he seeks roles offering flexibility and reduced supervisory pressure to better manage his anxiety.
