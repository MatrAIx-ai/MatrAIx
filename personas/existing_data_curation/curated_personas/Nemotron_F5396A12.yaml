personas:
  professional: Joan Pruett, a veteran accountant and auditor with over forty years of experience, leverages meticulous document management, mastery of QuickBooks, Sage 50, and advanced Excel, and an unwavering
    commitment to GAAP compliance to transition into a part‑time advisory role for local nonprofits while mentoring a junior colleague with the same disciplined rigor that defined her full‑time career.
  sports: Joan Pruett enjoys low‑impact fitness through morning nature‑trail walks with the Hall County Audubon Walking Club, avidly follows the Atlanta Braves baseball team and the Atlanta Falcons football
    franchise during the season, and participates in weekly bridge games at the local senior center, which she considers her preferred mental sport.
  arts: Joan Pruett finds creative fulfillment in quilting while listening to the gospel harmonies of the Blind Boys of Alabama and the country storytelling of Dolly Parton, and she regularly reads historical
    fiction by authors such as Margaret Mitchell and Lee Stetson, with occasional visits to community theater productions featuring classics like 'The Miracle Worker'.
  travel: Joan Pruett plans her modest travel around heritage and genealogy, having visited the historic districts of Charleston, South Carolina and Savannah, Georgia, exploring Natchez, Mississippi to
    trace family roots, while dreaming of a quiet pilgrimage to Williamsburg, Virginia and a leisurely weekend getaway to the Blue Ridge Mountains in North Carolina.
  culinary: Joan Pruett delights in preparing home‑grown meals such as fresh tomato basil salad, shrimp and grits with locally sourced shrimp, and pecan pie made with garden‑grown pecans, often pairing
    her dishes with the tangy flavor of buttermilk and a splash of hot sauce, while her quilting evenings are accompanied by steaming bowls of chicken noodle soup seasoned with thyme.
  core: Joan Pruett is a meticulous former auditor turned part‑time nonprofit advisor who cultivates a garden, quilts, bridges, and balances disciplined finances with a quiet love for Southern history and
    gospel music.
background:
  cultural: Joan was raised in a close‑knit, white Southern family in Hall County, Georgia, during the post‑World War II era. Her upbringing was steeped in traditional Southern hospitality, church‑centered
    community life, and a strong work ethic shaped by the values of thrift and self‑reliance that characterized her generation. She identifies with the Anglo‑American cultural heritage of the region, cherishes
    family traditions, and maintains a deep respect for the local customs, cuisine, and the rhythms of rural life that continue to influence her worldview.
