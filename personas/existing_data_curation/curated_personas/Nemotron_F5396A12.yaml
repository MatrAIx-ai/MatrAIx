  hobbies: '["Gardening","Quilting","Hand‑sewing","Church choir","Bible study","Reading historical fiction","Bridge","Volunteer tax assistance","Genealogy research","Nature walks","Bird watching"]'
  career_goals: Joan aims to transition from full‑time auditing to a part‑time advisory role that allows her to apply her deep expertise to local nonprofits, church financial committees, and senior citizen
    programs in Hall County. She intends to mentor a junior colleague for at least two years to ensure a smooth succession of her client portfolio. Additionally, she plans to complete a focused continuing‑professional‑education
    series on estate planning and trust administration so she can better support her family's legacy and provide trusted guidance to her grandchildren. Maintaining financial independence and upholding the
    high standards she always set for herself remain central to her professional ambitions.
