  career_goals: Annemarie aims to pursue a career that blends her curiosity about the natural world with her desire to help others and stay connected to her community. She is considering paths such as environmental
    technician, public-health aide, or middle-school teacher, where she can apply hands-on problem-solving, practical skills, and her cooperative nature. In the short term, she plans to complete high school,
    earn a first-aid/CPR certification, and volunteer with local environmental groups. These steps will lay the groundwork for a future degree in environmental science or education, ultimately allowing
    her to work on community-focused projects that balance flexibility with tangible impact.
