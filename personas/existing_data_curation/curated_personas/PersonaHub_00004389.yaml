persona_description: A neuroscientist who studies the visual system of the fruit fly, Drosophila, and has conducted research on the temporal integration of visual motion during tethered flight. She is interested
  in the engineering of feedback control systems and has used genetically encoded calcium indicators to investigate the mechanisms of temporal integration in the optomotor system. Her research has been
  published in the Proceedings of the National Academy of Sciences and has led to the development of new insights into the computational processes underlying visual behavior in insects.
