  hobbies: '[''Pick‑up basketball'', ''Live blues and jazz concerts'', ''Mentoring youth at community center'', ''Hobbyist metal sculpture'', ''Cooking Southern and soul food'', ''Exploring food festivals'',
    ''Reading leadership and engineering history books'', ''Participating in local cultural events (e.g., Chicago Blues Festival)'']'
  career_goals: Ronald aims to earn a journeyman certification and advance to a foreman role, leading larger boiler installation projects across the Chicago region. He is pursuing additional credentials
    in welding inspection and safety management, with a long‑term ambition to launch his own contracting firm that specializes in energy‑efficient boiler systems and offers apprenticeship programs. Ultimately,
    he hopes to become a certified trainer for his local trade union, merging his practical skills with his desire to help others and foster harmony within the workforce.
