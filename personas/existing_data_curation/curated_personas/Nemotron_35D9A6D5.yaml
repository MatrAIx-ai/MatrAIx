personas:
  professional: Ronald Tutt, a 38‑year‑old metal fabricator and boiler specialist, leverages their advanced welding expertise, blueprint interpretation skills, and mechanical engineering knowledge to lead
    crews, mentor apprentices, and solve on‑site challenges while pursuing journeyman certification and a foreman position.
  sports: Ronald Tutt, a sociable 38‑year‑old, stays active playing pick‑up basketball at neighborhood courts, follows the Chicago Bulls and White Sox, participates in a weekend adult league, and volunteers
    as a youth basketball coach, using their love of teamwork to stay fit.
  arts: Ronald Tutt blends metal fabrication with creative expression, crafting small sculptures from scrap while attending live blues performances by Buddy Guy and jazz shows featuring Herbie Hancock,
    and they regularly exhibit their pieces at community art fairs.
  travel: Ronald Tutt plans trips with a mix of detailed itineraries and spontaneous detours, enjoying weekend road trips to music‑rich destinations like New Orleans for jazz and soul‑food, dreaming of
    a cross‑country tour of historic steel towns, and aspiring to visit Stuttgart, Germany to explore precision engineering museums.
  culinary: Ronald Tutt loves cooking Southern and soul‑food classics—smoked collard greens, fried catfish, sweet potato pie—and they source fresh ingredients at Chicago’s farmers markets, often showcasing
    their dishes at neighborhood gatherings after exploring city food festivals.
  core: Ronald Tutt is a talkative, curiosity‑driven fabricator who balances meticulous craftsmanship with a passion for community jazz, metal art, and occasional over‑commitments that leave them scrambling
    to log overtime.
background:
  cultural: Ronald grew up on Chicago’s South Side in a close‑knit Black working‑class family. Immersed in the traditions of African‑American culture—church gatherings, gospel music, neighborhood block
    parties, and the historic blues scene—he developed a strong sense of community and solidarity. His family emphasized hard work, mutual support, and the value of education, guiding his path into the
    trades. The legacy of the Great Migration and the resilience of his community shape his compassionate outlook and his commitment to mentoring the next generation. He takes pride in participating in
    events such as the Chicago African American History Festival and supporting local Black‑owned businesses.
attributes:
  skills: '[''Advanced welding (SMAW, MIG, TIG)'', ''Blueprint and technical drawing interpretation'', ''Pipefitting and structural assembly'', ''Rigging and hoisting operations'', ''Safety compliance (OSHA,
