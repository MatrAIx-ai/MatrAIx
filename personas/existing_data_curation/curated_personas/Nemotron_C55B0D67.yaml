  hobbies: '["Reading mystery and historical fiction", "Gardening (vegetables and herbs)", "Birdwatching", "Knitting and crocheting", "Crossword and logic puzzles", "Volunteering at local food bank", "Gentle
    yoga", "Small book club participation"]'
  career_goals: Anna aims to move into a senior security leadership role, such as Cybersecurity Manager or Security Architect, where she can integrate security frameworks more deeply into corporate strategy.
    She is driven to spearhead a cross‑functional initiative that elevates the organization’s security culture, focusing on education and empathy‑based training. Additionally, she hopes to mentor emerging
    women in tech within her community and eventually launch a regional nonprofit that offers free cybersecurity workshops for small businesses and senior citizens.
