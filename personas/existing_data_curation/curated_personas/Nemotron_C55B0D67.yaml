personas:
  professional: Anna Mckinney is a veteran information security professional who integrates two decades of risk assessment, compliance auditing (HIPAA, PCI), and incident response expertise to translate
    complex technical threats into pragmatic business strategies, and they leverage their compassionate, cooperative nature to foster an inclusive security culture and mentor junior staff.
  sports: Anna Mckinney enjoys low‑impact fitness through a weekly walking club at a local park, and they root for the Nashville Predators during hockey season and the Tennessee Titans on Sundays, while
    also attending community yoga sessions, preferring steady, solitary activity over competitive sports.
  arts: Anna Mckinney finds quiet joy in knitting and crocheting while listening to Dolly Parton’s storytelling ballads and Ludovico Einaudi’s piano pieces, and they regularly lose themselves in mystery
    novels by Agatha Christie and historical fiction by Ken Follett, weaving these cultural touchstones into their creative downtime.
  travel: Anna Mckinney prefers relaxed, spontaneous getaways over rigid itineraries, often taking weekend drives to the Great Smoky Mountains for birdwatching, has already explored the historic streets
    of Savannah, and they hope to experience the culinary scene of San Sebastián, balancing family obligations with their desire for low‑key exploration.
  culinary: Anna Mckinney enjoys farm‑to‑table cooking, regularly harvesting vegetables from their garden to prepare sautéed collard greens with smoked turkey and perfecting a signature pecan pie crust,
    and they also indulge in classic Tennessee barbecue ribs seasoned with a sweet‑spicy rub, reflecting a home‑cooked, moderately skilled culinary approach.
  core: Anna Mckinney blends a seasoned security mindset with Southern hospitality, balancing meticulous risk analysis with spontaneous garden walks, yet they often misplace their knitting needles and forget
    to file tax paperwork on time, embodying a compassionate yet occasionally absent‑minded personality.
background:
  cultural: Anna was raised in a middle‑class white family in the American South, experiencing the blend of Southern hospitality and community values typical of Tennessee. Her family traditions include
    Sunday gatherings, homemade cooking, and participation in local church events, which have shaped her compassionate and cooperative outlook. While she respects regional customs like country music and
    BBQ, her graduate business education and professional career have broadened her perspective, fostering a pragmatic yet open‑minded approach to both work and personal life.
attributes:
  skills: '["Cybersecurity risk assessment", "Incident response coordination", "Security policy development", "Compliance auditing (HIPAA, PCI)", "Network security monitoring", "Vulnerability management",
