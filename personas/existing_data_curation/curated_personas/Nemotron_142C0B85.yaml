personas:
  professional: Josephine Mori, an aspiring marine biologist and junior inventor, uses their vivid imagination and organized curiosity to build elaborate LEGO reefs, draw detailed seascapes, and lead their
    school’s science club in weekly ‘beach‑lab’ experiments, turning playtime into early scientific inquiry.
  sports: Josephine Mori, a member of the Pensacola YMCA Aquatics Club and a weekend sandcastle champion, thrives on swimming laps in the gentle Gulf waves, tags their friends in endless games of capture
    the flag, and cheers passionately for the Tampa Bay Rays during baseball season while sporting a tiny Buccaneers cap for Friday night football outings.
  arts: Josephine Mori, a budding watercolor artist, draws endless inspiration from Mary Blair’s vivid palettes, Wyland’s majestic ocean murals, and the whimsical songs of Sesame Street’s Elmo, often reenacting
    their favorite scenes from Disney’s The Little Mermaid while they sketch sparkling seashells in bright crayon.
  travel: Josephine Mori loves bite‑size road trips that end at sandy shores, having collected shells on family getaways to Gulf Shores, Alabama and the historic streets of St. Augustine, Florida, while
    dreaming of a future vacation to the coral‑rich reefs of Key West and the rust‑colored dunes of the Outer Banks, destinations they hope to explore with their friends and family.
  culinary: Josephine Mori delights in the salty tang of a freshly fried shrimp po’ boy from the Pensacola Seafood Festival, pairs it with a homemade mac‑and‑cheese sprinkled with broccoli florets, proudly
    mixes fruit salads featuring mango, strawberry, and a squeeze of lime, though they often forget to wash their hands before dinner.
  core: Josephine Mori, a seven‑year‑old imagination powerhouse, blends beach‑side curiosity with endless crayon colors, a love for LEGO reefs, and a penchant for forgetting sunscreen while they chase shells
    across tide pools.
background:
  cultural: Josephine grows up in Pensacola, Florida, a coastal city known for its warm Southern hospitality and strong ties to the Gulf of Mexico. Her family celebrates typical American holidays—Thanksgiving,
    Christmas, and the Fourth of July—with community parades, fireworks, and beach picnics. The local culture includes a love of seafood, beach festivals like the Pensacola Seafood Festival, and a relaxed
    outdoor lifestyle that encourages swimming, shell collecting, and exploring tide pools. While her household is predominantly white and reflects many Southern traditions, Josephine is exposed to the
    diverse cultural mosaic of Escambia County through school, neighbors, and community events that feature music, food, and art from various backgrounds, including Hispanic influences and African‑American
    heritage. This mix of Southern customs, coastal recreation, and multicultural exposure shapes her worldview and nurtures her curiosity about both the natural world and creative expression.
