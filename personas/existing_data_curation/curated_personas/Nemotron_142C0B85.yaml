  hobbies: '[''drawing and painting'', ''reading picture books'', ''building with LEGO'', ''collecting shells and rocks on the beach'', ''swimming and water play'', ''playing group games like tag'', ''creating
    stories and role‑play'', ''dancing to music'', ''simple science experiments'', ''participating in school art club'']'
  career_goals: Josephine dreams of becoming someone who creates beauty and explores the wonders of the world. She is fascinated by artists who paint vivid pictures and illustrators who bring stories to
    life, and she often says she wants to be a painter or a cartoonist. At the same time, her love of the Gulf Coast and the sea inspires her to imagine a future as a marine biologist or ocean explorer,
    discovering new sea creatures. She also expresses a wish to share her imagination with others, hinting at a future role as a teacher or storyteller who helps children discover their own creative worlds.
