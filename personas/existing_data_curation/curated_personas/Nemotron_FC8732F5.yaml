    Skiing'', ''Swing Dancing'']'
  career_goals: Steven aims to step into a senior HR leadership role—such as HR Director or Chief Human Resources Officer—within the next three years, where he can champion a culture of creativity, flexibility,
    and holistic employee well‑being. He plans to lead a company‑wide redesign of performance management using design‑thinking and AI‑enabled analytics, and to establish a structured mentorship program
    for emerging HR talent. Ultimately, he aspires to author a book on innovative HR practices and launch a boutique consultancy that helps midsize organizations embed artistic and human‑centred approaches
    into their people strategies.
