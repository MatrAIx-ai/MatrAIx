  hobbies: '[''Gardening'', ''Hiking'', ''Photography'', ''Reading classic literature'', ''Book club participation'', ''Genealogy research'', ''Knitting'', ''Community theater volunteering'']'
  career_goals: Elizabeth aims to transition into a senior leadership role within the Hamilton County Department of Human Services, where she can design and oversee comprehensive, data‑driven programs for
    elderly and at‑risk populations. She is passionate about establishing a county‑wide trauma‑informed care network that integrates social services, healthcare, and community resources with clear protocols
    and measurable outcomes. Additionally, she aspires to mentor emerging social workers, lead professional development workshops, and eventually launch a nonprofit that delivers structured, evidence‑based
    support services to underserved families in the Appalachian region.
