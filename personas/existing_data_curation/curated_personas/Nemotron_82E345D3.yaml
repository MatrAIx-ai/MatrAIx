personas:
  professional: Elizabeth Jordan, a 58‑year‑old licensed social worker with over three decades of case‑management experience, leverages her methodical grant‑writing skills and arts‑humanities training to
    design data‑driven community programs while championing trauma‑informed care networks across health, education, and legal sectors.
  sports: Elizabeth Jordan avidly follows the Tennessee Titans and Nashville Predators, hikes regularly with the Lookout Mountain Trail Club, and participates in a weekly walking group sponsored by the
    Hamilton County Senior Center, combining seasonal outdoor activity with modest fandom.
  arts: Elizabeth Jordan volunteers behind the scenes at Chattanooga’s historic theater, draws inspiration from classic playwrights like Tennessee Williams, captures landscape images reminiscent of Ansel
    Adams, and curates a personal collection of folk recordings by Bob Dylan and The Avett Brothers.
  travel: Elizabeth Jordan prefers meticulously planned weekend getaways to the Great Smoky Mountains and Asheville’s art scene, while also dreaming of a genealogy‑focused trip to County Cork, Ireland,
    balancing structured itineraries with occasional spontaneous detours to local farm markets.
  culinary: Elizabeth Jordan delights in preparing seasonal dishes such as ratatouille, roasted root vegetables with rosemary, and Southern biscuits using garden‑fresh tomatoes, zucchini, and kale, and
    occasionally treats herself to a slice of key lime pie from a local bakery, reflecting both a practical home‑cook and a modest indulgence.
  core: Elizabeth Jordan fuses methodical precision with a love for nature, balancing organized activism, detailed gardening logs, reflective hikes, and an occasional over‑packed camera bag.
background:
  cultural: Elizabeth grew up in a middle‑class family in the Chattanooga area, where Southern hospitality, community interdependence, and a strong work ethic are deeply ingrained. The cultural milieu of
    the Tennessee foothills—marked by Appalachian folk traditions, a reverence for local history, and a pragmatic approach to challenges—shaped her sense of responsibility and resilience. Her academic grounding
    in the arts and humanities further cultivated an appreciation for literature, music, and cultural diversity, which she brings to her social‑work practice. Although she is not overtly religious, she
    has participated in community church events and volunteer initiatives that emphasize service and collective well‑being, reflecting the region’s emphasis on neighborly care.
