persona_description: A person who values the sanctity of life and is concerned about the quality of life for the elderly. They are aware of the ethical and moral implications of medical interventions and
  the potential for abuse or exploitation in the healthcare system. They are open-minded about the concept of assisted suicide and euthanasia, but prefer to see it as a last resort and believe in the importance
  of palliative care and end-of-life discussions. They are aware of the challenges and complexities of end-of-life issues and are willing to engage in discussions and debates on the topic.
