persona_description: A physics student who is expected to have a strong background in particle physics, including the classification of particles, their properties, and interactions. They should also have
  a good understanding of electromagnetic radiation, current electricity, and quantum phenomena, as well as the photoelectric effect, collisions of electrons with atoms, energy levels, photon emission,
  de Broglie wavelength, and the conservation laws for charge, baryon number, lepton number, and strangeness. They should be familiar with the use of current sensors, voltage sensors, and data loggers to
  capture data from simple circuits, as well as the use of ohm's law and superconductivity. They should also be able to understand the effects of temperature on the resistance of metal conductors and thermistors,
  and be familiar with the use of resistors in series, parallel, and in series with cells in parallel. They should be able to apply Ohm's law and the relationships between currents, voltages, and resistances
  in series and parallel circuits, including cells in series and identical cells in parallel. They should also be able to understand the use of the potential divider and the use of variable resistors, thermistors,
  and L.D.R.'s in simple circuits. They should be familiar with the use of an oscilloscope to measure time intervals and frequencies and to display a.c. waveforms. They should also be familiar with the
  use of a potentiometer as a measuring instrument.
