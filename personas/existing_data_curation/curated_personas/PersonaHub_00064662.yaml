persona_description: An oil expert and industry analyst, focusing on the Permian Basin and its potential for oil production, with a special interest in the Ghawar Field and its oil reserves. They are familiar
  with the Master Gas System and its role in transporting associated gas from the field to support industrialization. They are also aware of the ongoing exploration and development efforts in the Ghawar
  Field and its potential for oil production. They have a keen understanding of the economics of oil production, including the costs associated with the development of the field and the potential for oil
  production in Iraq. They have a detailed knowledge of the history and current state of the Ghawar Field and its potential for oil production.
