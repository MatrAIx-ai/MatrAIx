personas:
  professional: Robin Nelson, a seasoned general maintenance technician, blends meticulous HVAC troubleshooting with a painter’s eye for detail, using their curiosity and organized mindset to devise creative,
    sustainable repair solutions while navigating intense emotional reactions that sometimes spur over‑analysis of every task.
  sports: Robin Nelson enjoys weekend hikes on the Blue Ridge Trail, volunteers with the local bird‑watching club, and faithfully supports the New York Knicks, Buffalo Bills, and Asheville City Soccer Club,
    balancing solitary outdoor activity with occasional attendance at live games for community connection.
  arts: Robin Nelson immerses themselves in watercolor landscapes of rolling hills, curates a photography series inspired by the industrial charm of historic textile mills, and draws artistic inspiration
    from Monet, O'Keeffe, and photographer Annie Leibovitz, regularly visiting the Hilltop Art Gallery and regional craft fairs to stay attuned to emerging creative movements.
  travel: Robin Nelson prefers low‑key, meticulously planned trips that blend scenic hikes in the Adirondacks, a weekend exploring the artisan cafés of Asheville, and a dream itinerary to photograph the
    geothermal vistas of Iceland, balancing a modest travel budget with a yearning for tranquil, nature‑focused escapes.
  culinary: Robin Nelson, an avid herb‑garden caretaker, enjoys crafting simple yet flavorful meals such as herb‑infused roasted chicken with rosemary‑scented potatoes and a fresh basil pesto pasta, while
    occasionally indulging in experimental dishes like beet‑root gazpacho, reflecting a moderate cooking skill set and a palate attuned to fresh, earthy ingredients.
  core: Robin Nelson is a precision‑driven maintenance expert with a painter’s soul, who channels intense emotional sensitivity into creative problem‑solving, yet sometimes wrestles with anxiety‑induced
    overthinking and impulsive art‑supply splurges.
background:
  cultural: Robin grew up in a working‑class family in Spartanburg, South Carolina, where the legacy of textile manufacturing and Appalachian foothill culture shaped her community ties. Her upbringing reflected
    traditional Southern hospitality, modest church attendance, and a strong emphasis on self‑reliance. While she appreciates the region's historical roots—such as the close‑knit neighborhood networks and
    locally celebrated festivals—Robin also embraces a broader, more eclectic cultural outlook, influenced by the art and music scenes that have emerged in the Upstate in recent years. This blend of Southern
    heritage and contemporary curiosity informs both her practical work ethic and her artistic inclinations.
attributes:
  skills: '["general maintenance", "electrical repairs", "plumbing repairs", "HVAC system troubleshooting", "carpentry and furniture repair", "preventive maintenance scheduling", "inventory management",
