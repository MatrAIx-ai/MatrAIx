  hobbies: '["watercolor painting", "sketching urban and natural scenes", "photography of wildlife and historic architecture", "succulent gardening", "reading contemporary philosophy and poetry", "visiting
    local art galleries", "DIY home‑decor projects", "birdwatching", "hiking Blue Ridge foothills", "knitting"]'
  career_goals: Robin aims to advance to a senior maintenance supervisor role within a mid‑size company, earning certifications such as Certified Maintenance & Reliability Technician (CMRT) and HVAC specialist
    credentials. She is passionate about integrating sustainable practices into building upkeep, aspiring to lead a team that implements energy‑saving retrofits. Over the long term, Robin envisions opening
    a boutique repair and restoration studio that merges her technical expertise with her love for art, allowing her to create custom, reclaimed furniture while offering maintenance consulting for small
    property owners. To support her emotional wellbeing, she also plans to engage in stress‑management workshops and build a supportive network of colleagues and fellow artisans.
