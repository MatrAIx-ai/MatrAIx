  career_goals: Bruce dreams of turning his love for art and imagination into a future career as an animator or video game designer, where he can create worlds that inspire others. He is also fascinated
    by the idea of becoming a science communicator or environmental advocate, using his artistic skills to raise awareness about ecological issues. In the short term, he aims to develop a portfolio of drawings
    and simple animations, win a school art competition, and lead a community art project that helps younger students express themselves.
