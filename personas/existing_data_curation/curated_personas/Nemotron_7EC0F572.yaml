personas:
  professional: Belinda Smith, a seasoned dental and ophthalmic laboratory technician, leverages their precise manual dexterity and methodical organization to integrate CAD/CAM workflows while mentoring
    apprentices and championing pragmatic digital innovation in prosthetic and optical device fabrication.
  sports: Belinda Smith stays active by hiking the Geneva Lake trails, joining a local pickleball league at the senior center, participating in the Home Lake jogging group, and cheering on the Green Bay
    Packers and Milwaukee Brewers during weekends.
  arts: Belinda Smith expresses their creative side through nature photography inspired by Ansel Adams, quilting with Gee’s Bend patterns, reading mystery novels at their book club, and attending productions
    at the Red Barn Theatre, often quoting lines from Agatha Christie during conversations.
  travel: Belinda Smith prefers road‑trip adventures that blend family bonding with scenic discovery, having explored Kettle Moraine State Forest, Devil’s Lake State Park, and Door County, while planning
    future drives to the Upper Peninsula of Michigan and the historic towns of the Oregon Trail.
  culinary: Belinda Smith delights in cooking hearty Midwestern fare such as chicken pot pie, bratwurst with sauerkraut, and cheese curds, while incorporating garden harvests of heirloom tomatoes and fresh
    herbs into dishes like herb‑infused cornbread and apple crisp, showcasing their intermediate culinary skill and love for communal meals.
  core: Belinda Smith blends meticulous lab expertise with a lively social calendar, balancing budget‑savvy habits, community gardening, and a penchant for re‑organizing everything from tool drawers to
    cookbook shelves, even if that sometimes leads to late‑night project overload.
background:
  cultural: Belinda was born and raised in the Midwest, growing up in a predominantly white, middle‑class community in Wisconsin. Her family lineage includes a blend of German and Scandinavian ancestry,
    which is reflected in regional traditions such as Sunday family dinners, participation in local festivals like the Lake Geneva Summerfest, and an appreciation for dairy heritage. She values the Midwestern
    emphasis on community involvement, self‑reliance, and modest practicality, while also embracing the area's strong Lutheran and broader Christian influences that shape her volunteer spirit and social
    connections.
attributes:
  skills: '[''Dental prosthetic fabrication'', ''Ophthalmic lens grinding'', ''CAD/CAM dental design'', ''Medical device assembly'', ''Material selection (acrylic, titanium, silicone)'', ''Quality assurance
