  career_goals: Dagoberto aims to transition into a plant‑manager role within the next three years, leveraging his practical expertise to lead a continuous‑improvement program and achieve Six Sigma Black
    Belt certification. He aspires to mentor junior workers, drive measurable productivity gains, and eventually launch a consultancy that helps small‑scale manufacturers adopt lean and cost‑effective practices.
    Financially, he seeks to secure a stable retirement fund to support his children’s education and his own independence.
