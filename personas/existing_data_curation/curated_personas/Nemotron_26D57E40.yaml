  career_goals: Although retired, Katherine’s primary ambition is to remain a steady, supportive presence for her family and community. She aims to expand her volunteer role at the senior center, mentoring
    younger volunteers and ensuring programs run smoothly. Katherine also hopes to compile a digital family recipe book and a genealogy archive, preserving her family’s heritage for future generations.
    Maintaining her health and independence through regular walks, mindful gardening, and continued learning—such as mastering new video‑calling tools—are personal goals that align with her desire for structure
    and purposeful activity.
