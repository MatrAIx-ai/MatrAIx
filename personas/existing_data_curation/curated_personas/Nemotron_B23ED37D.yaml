  hobbies: '["Reading historical non-fiction","Woodworking","Fishing","Birdwatching","Gardening","Model railroading","Cooking","Crossword puzzles","Walking in nature","Volunteering at local community events"]'
  career_goals: Approaching retirement, Cory aims to leave a lasting impact by mentoring the next generation of supervisors, formalizing a continuous-improvement culture, and championing sustainable production
    practices. He hopes to earn a Six Sigma Black Belt and transition into a part-time consultancy role where he can share his practical expertise while reducing daily stress. Additionally, he aspires to
    develop a small training program for new hires that emphasizes teamwork, safety, and respectful communication.
