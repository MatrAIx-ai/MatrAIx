personas:
  professional: A determined field service engineer, Priscilla Smith leverages their mechanical expertise and artistic flair to convert arcade machines into interactive art pieces, systematically climbs
    toward a senior engineering role, and sketches business plans for a future vending‑machine art venture while mentoring emerging women technologists.
  sports: An energetic weekend athlete, Priscilla Smith competes in local pickup basketball with the Fort Worth Hoops Society, attends high‑intensity group fitness classes at Orangetheory, dances to hip‑hop
    at DanceFit sessions, and fervently supports the Dallas Mavericks, Dallas Cowboys, and FC Dallas, integrating competitive spirit into both play and viewership.
  arts: A vibrant visual creator, Priscilla Smith spends evenings sketching murals inspired by Shepard Fairey and the local Dallas street‑art scene, produces digital illustrations influenced by Loish and
    Studio Ghibli, attends live shows at the Granada Theater featuring Leon Bridges and Tame Impala, and devours sci‑fi novels by Neal Stephenson and mystery thrillers by Gillian Flynn, weaving art into
    every facet of their life.
  travel: A curiosity‑driven explorer, Priscilla Smith has weekend‑hopped to Austin’s music festivals, New Orleans’ culinary tours, and Seattle’s retro‑arcade museums, dreams of an immersive art tour in
    Barcelona’s Gothic Quarter and a gaming pilgrimage to Tokyo’s Akihabara, and balances meticulous itinerary planning with spontaneous detours when local culture beckons.
  culinary: A daring food enthusiast, Priscilla Smith enjoys sampling tacos al pastor with pineapple, steaming miso ramen with shiitake and soft‑boiled eggs, crafting homemade bibimbap with gochujang and
    sesame oil, and experimenting in the kitchen using ingredients like chipotle, matcha powder, and turmeric, yet admits to binge‑ordering pizza after late‑night gaming marathons.
  core: Priscilla Smith blends a competitive, methodical mind with an insatiable curiosity for art, tech, and gaming, turning every day into a curated mix of mechanical mastery, creative expression, and
    relentless ambition that they pursue with energetic drive.
background:
  cultural: Priscilla grew up in a close‑knit African‑American family in Lewisville, Texas, where church, music, and community gatherings were central to her upbringing. Her grandparents migrated from the
    Deep South during the Great Migration, bringing traditions of gospel music, soul food, and storytelling that continue to shape her values. She participates in local Black cultural events such as Juneteenth
    festivals and the Denton County African‑American Heritage Celebration, and she maintains strong ties to the neighborhood church where she volunteers in youth mentorship programs. This heritage informs
    her appreciation for rhythm, visual expression, and collective uplift, which she weaves into both her professional and personal life.
attributes:
  skills: '[''Mechanical repair'', ''Electrical troubleshooting'', ''Coin mechanism diagnostics'', ''Firmware programming'', ''Preventative maintenance'', ''Technical documentation'', ''Inventory management'',
    ''Customer service'', ''Scheduling and logistics'', ''Custom aesthetic modifications'']'
  hobbies: '[''Visiting art galleries and murals'', ''Sketching and digital illustration'', ''Arcade and video gaming'', ''Group fitness classes'', ''Dancing (hip‑hop, R&B)'', ''Pickup basketball'', ''Volunteering
    at STEM workshops'', ''Attending live music events'', ''Exploring new cuisines'', ''Reading sci‑fi and mystery novels'']'
  career_goals: Priscilla aims to become a senior field service engineer and eventually launch her own vending‑machine and interactive art business. She plans to earn certifications in electromechanical
    systems and IoT device management, and to pursue an associate degree in engineering technology. Over the next five years, she wants to lead a regional service team, mentor other women of color entering
    the trade, and develop a line of artist‑collaborated arcade cabinets that blend gaming with immersive visual art.
