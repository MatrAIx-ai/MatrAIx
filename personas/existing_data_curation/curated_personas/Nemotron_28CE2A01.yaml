  career_goals: Zuriel aims to ascend to a senior leadership role, such as Regional Sales Manager, where he can apply his routine‑oriented approach to train and mentor a team of sales representatives. Over
    the next three years he plans to boost his territory’s revenue by at least 15 % by deepening existing client relationships and expanding into the Latin American manufacturing market, leveraging his
    Puerto Rican heritage and bilingual skills. He also intends to earn a Certified Professional Sales Leader (CPSL) credential and, later in his career, transition to a consulting role that offers greater
    flexibility and supports his desire for work‑life balance as he approaches retirement.
