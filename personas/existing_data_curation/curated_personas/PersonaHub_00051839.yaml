persona_description: A researcher and educator with expertise in the development and evaluation of educational games for children with special needs, particularly those with Down Syndrome. The person is
  involved in the CogniAction project, which aims to create games that improve cognitive functionality and visomotor performance in these children. The individual is likely to be knowledgeable about the
  cognitive and developmental needs of children with Down Syndrome and has experience in designing and evaluating educational games. They may have a background in psychology, education, or a related field
  and have a passion for using technology to support the educational needs of children with special needs.
