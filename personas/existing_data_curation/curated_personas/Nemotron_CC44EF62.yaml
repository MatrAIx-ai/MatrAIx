  career_goals: Horace aims to leverage his extensive software development experience to lead an inclusive tech initiative in the Dayton area, creating mentorship programs for underrepresented youth and
    fostering community‑driven open‑source projects. He plans to transition into a senior architect or CTO advisory role where he can shape technology strategy, champion ethical AI practices, and integrate
    artistic elements into digital products. Additionally, he hopes to author a technical book that bridges software engineering with creative design, and eventually retire from full‑time coding while remaining
    an active consultant and speaker at tech conferences.
