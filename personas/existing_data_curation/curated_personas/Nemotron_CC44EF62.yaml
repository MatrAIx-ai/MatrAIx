personas:
  professional: Horace Bradshaw, a senior full‑stack software architect with deep expertise in Java, Python, cloud platforms, and UI/UX design, channels their disciplined, organized mindset and love of
    jazz improvisation into leading inclusive tech initiatives that mentor underrepresented youth, champion ethical AI, and fuse artistic elements into community‑driven open‑source projects.
  sports: Horace Bradshaw, an avid hiker of the Five Rivers MetroParks and a dedicated supporter of the Dayton Flyers basketball team, also follows the Cincinnati Reds and Bengals, plays in the local senior
    softball league, and attends a weekly yoga class at the community center, balancing competitive spirit with low‑impact fitness.
  arts: Horace Bradshaw, a passionate saxophonist performing with the community jazz band and an acrylic painter inspired by Jacob Lawrence and Romare Bearden, regularly curates digital illustrations for
    exhibitions at the Dayton Art Institute, blending visual storytelling with their technical background while listening to Miles Davis, John Coltrane, and B.B. King.
  travel: Horace Bradshaw, an enthusiastic traveler, prioritizes culturally rich festivals such as the New Orleans Jazz & Heritage Festival, Atlanta's Pan‑African Heritage Festival, and the Savannah African‑American
    History Celebration, often planning trips with fellow musicians and budgeting wisely to fit their retirement savings while eyeing future visits to Harlem’s historic walking tour.
  culinary: Horace Bradshaw, a skilled home cook, delights family gatherings with soul‑food staples like smoked catfish, collard greens simmered with smoked turkey, buttery cornbread, sweet potato pie,
    and gumbo seasoned with fresh thyme and okra from their garden, while occasionally over‑salting the gumbo during a busy weekend of coding.
  core: Horace Bradshaw, a disciplined tech veteran who weaves jazz improvisation into code, mentors youth, never skips a Sunday brunch, yet hoards mismatched socks and regularly forgets passwords despite
    their meticulous nature.
background:
  cultural: Horace grew up in a close‑knit African‑American community in Dayton, shaped by the legacy of the civil‑rights movement and the rich cultural traditions of the Midwest. He maintains strong ties
    to African‑American artistic expression, from jazz and blues music to visual arts, and participates regularly in community events such as Juneteenth celebrations, black‑history lectures, and local church
    gatherings. His upbringing instilled a deep respect for resilience, collective uplift, and the importance of mentorship, values that continue to guide his professional and personal life.
