  career_goals: Miguel aims to advance into a supervisory role within airport security, aspiring to become a lead screener or shift manager where he can shape operational procedures and mentor a larger
    team. He plans to obtain a Certified Protection Professional (CPP) credential and attend advanced TSA leadership workshops. Over the next five years, he envisions contributing to policy development
    for passenger safety, and eventually exploring a consulting niche that helps other transportation hubs implement effective security programs while maintaining a friendly traveler experience.
