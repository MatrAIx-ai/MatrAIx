  career_goals: Although retired from full‑time employment, Julian aims to remain professionally active by serving on the board of the Minneapolis Institute of Art, where he can influence exhibition planning
    and community outreach. He also seeks to mentor emerging engineers and makers through the local maker space, helping them translate ideas into functional prototypes. A personal ambition is to author
    a series of articles or a short book that explores the intersection of engineering principles and visual art, sharing his unique perspective with a broader audience. Additionally, Julian plans to complete
    a mixed‑media art project that fuses engineering schematics with abstract painting, entering it in regional art shows to challenge conventional boundaries.
