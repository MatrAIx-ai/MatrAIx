personas:
  professional: A retired mechanical engineer turned community art advocate, Julian Jarrett leverages their solid grounding in SolidWorks, MATLAB, and Python alongside Agile project management to curate
    interdisciplinary museum programs, mentor makers, and drive board-level strategic planning at the Minneapolis Institute of Art, all while channeling their curiosity and methodical nature into bridging
    engineering rigor with artistic expression.
  sports: A member of the local senior walking club, Julian Jarrett spends weekday mornings strolling historic Minneapolis neighborhoods, joins a community pickleball league in summer, follows the Minnesota
    Vikings, Timberwolves, Twins, and Wild avidly, and hits the cross‑country ski trails each winter to stay fit.
  arts: A fervent patron of the Walker Art Center and Minneapolis Institute of Art, Julian Jarrett regularly attends openings featuring artists like James Turrell and M.C. Escher, paints oil‑and‑acrylic
    canvases that weave engineering schematics with abstract forms, captures downtown architecture through a Leica camera, and revels in live performances by jazz saxophonist Chris Potter and folk musician
    Sufjan Stevens.
  travel: Methodical yet adventurous, Julian Jarrett plans weekend getaways to nearby natural wonders such as the Boundary Waters and summer trips to historic European cities like Prague and Kyoto, while
    dreaming of a future expedition to Iceland’s aurora‑lit landscapes, always balancing travel costs against their modest fixed income.
  culinary: A competent home cook, Julian Jarrett enjoys preparing wild‑rice chowder with fresh dill and smoked salmon, experimenting with spice‑laden Ethiopian lentil stew (misir wot) and authentic Japanese
    sushi rolls, while sourcing heirloom tomatoes, kale, and artisanal cheese from the local farmer’s market for their urban garden‑inspired meals.
  core: Julian Jarrett is a curiosity‑driven, methodical retiree who fuses engineering precision with artistic flair, mentors makers, and occasionally battles a skeptical streak that fuels friendly competition
    in every pursuit.
background:
  cultural: Julian grew up in the Twin Cities region of Minnesota in a middle‑class family of German and Scandinavian ancestry, where values of modesty, hard work, and community service are deeply ingrained.
    Raised in a Lutheran household, he was exposed early to the region’s strong sense of civic responsibility and the concept of "Minnesota nice," which emphasizes friendliness and cooperation. The area's
    rich arts ecosystem—including the Walker Art Center, the Minneapolis Institute of Art, and the annual Art‑A‑Whirl street festival—shaped his lifelong appreciation for visual culture. His education in
    STEM at a state university reflects the region’s emphasis on practical, innovation‑driven learning, while his retirement years have allowed him to blend his technical roots with a growing passion for
    the arts and community engagement.
