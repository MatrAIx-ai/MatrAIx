persona_description: A federal government official responsible for coordinating hurricane evacuation planning and response efforts for state, local, tribal, territorial, and federal partners. The persona
  is knowledgeable about the National Hurricane Program, including its data, resources, and technical assistance for hurricane evacuation and response planning. They are also familiar with the HURREVAC
  Decision Support Tool, the Hurricane Liaison Team, and the SLOSH products. Additionally, the persona is skilled in conducting post-storm assessments to evaluate the accuracy and usefulness of the NHP
  tools, products, and operational support to emergency managers. They are likely to have experience with FEMA's National Hurricane Program and its partners.
