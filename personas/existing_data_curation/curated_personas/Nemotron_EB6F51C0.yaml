  hobbies: '[''Abstract painting'', ''Poetry and short story writing'', ''Playing congas and improvisational drumming'', ''Cooking Dominican–Southern fusion meals'', ''Attending live music festivals and
    community events'', ''Community gardening'', ''Reading philosophy, contemporary art, and science'', ''Volunteering at local community center'', ''Improvisational theater'']'
  career_goals: Rafael aims to re‑enter the workforce in a role that merges his artistic curiosity with his commitment to community wellbeing. He hopes to secure a part‑time position as a community arts
    coordinator at a local non‑profit, where he can design and lead workshops that encourage spontaneous creativity among children, seniors, and newcomers. Over the next few years, he envisions launching
    a pop‑up art studio that offers free sessions for underserved neighborhoods, using his visual storytelling skills and bilingual communication to foster cultural exchange. He also plans to deepen his
    craft by completing online courses in mixed‑media art and to exhibit his abstract paintings in regional galleries. Parallel to his artistic ambitions, he wishes to develop a weekend catering venture
    that showcases Dominican‑Southern fusion cuisine, with profits supporting local charitable causes. Ultimately, he aspires to become a recognized catalyst for inclusive cultural events, leveraging his
    sociable personality and compassionate nature to bring people together.
