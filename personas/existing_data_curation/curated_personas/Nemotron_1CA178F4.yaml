  career_goals: Zafar's primary goal is to remain self‑sufficient and continue contributing his experience to the Fremont community. He aims to mentor younger volunteers at the senior center, document his
    family’s migration story, and preserve local South Asian heritage through oral histories. He also aspires to maintain his health through regular walks and modest physical activity.
