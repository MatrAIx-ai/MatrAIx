  hobbies: '[''Church choir'', ''Volunteer work at food bank'', ''Gardening (heirloom tomatoes, wildflowers)'', ''Attending Fayetteville Fall Festival'', ''Quilting circle'', ''Reading historical fiction'',
    ''Yoga'']'
  career_goals: Erica aims to move into a supervisory or team‑lead role within the next two years, seeking a Customer Service Management certification to formalize her expertise. She aspires to mentor newer
    representatives, improve service‑quality metrics, and eventually transition into a quality‑assurance or training specialist position. In the longer term, she hopes to leverage her experience to launch
    a part‑time consulting service for small local businesses while maintaining a stable retirement plan.
