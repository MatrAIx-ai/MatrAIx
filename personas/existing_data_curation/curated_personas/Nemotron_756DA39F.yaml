personas:
  professional: Brandon Lewis, a seasoned telecommunications technician turned senior technical advisor, combines decades of hands‑on radio repair expertise with a methodical, documentation‑driven approach,
    mentoring junior staff while rigorously evaluating emerging 5G and software‑defined radio solutions, and they are known for challenging vendor claims with skeptical precision.
  sports: Brandon Lewis, a devoted Steelers fan who also enjoys hiking the Allegheny hills, attends Sunday home games at Heinz Field, follows the Pittsburgh Penguins during playoff season, they incorporate
    a weekly 5‑mile hike to manage cholesterol and keep their competitive edge, and they occasionally join a local amateur rowing club for cardio.
  arts: Brandon Lewis, an avid listener of classic rock legends like Muddy Waters and Jimi Hendrix and a regular at the Carnegie Museum of Art’s industrial heritage exhibitions, they spend evenings immersed
    in vinyl collections while sketching furniture designs, and they often cite Pittsburgh’s steel legacy as inspiration for their woodworking aesthetic.
  travel: Brandon Lewis, a road‑trip enthusiast who has explored the historic Allegheny River Valley, the Great Smoky Mountains, and the Smithsonian’s National Museum of American History in Washington,
    DC, they prefer self‑guided itineraries that include stops at vintage radio‑tower sites and craft breweries, and they dream of visiting the Scottish Highlands to trace early radio transmission experiments.
  culinary: Brandon Lewis, a homebrewing hobbyist who crafts his own double‑IPA using Cascade hops and malted barley, they also favor Pittsburgh‑style sandwiches piled with fries, relish simmering beef
    brisket with garlic and paprika, and they occasionally over‑boil the grain for their kit, admitting a penchant for tweaking recipes late into the night.
  core: Brandon Lewis, 60, blends a meticulous engineering mind with a hands‑on maker spirit, balancing competitiveness and curiosity while quietly preparing for a well‑documented retirement.
background:
  cultural: Brandon was born and raised in Pittsburgh’s North Side to a middle‑class family of German‑Irish ancestry. Growing up near the legacy of the steel mills, he internalized the city’s blue‑collar
    work ethic, valuing practicality, reliability, and community solidarity. The region’s strong tradition of technical trades influenced his decision to pursue an associate’s degree in electronics and
    a career in telecommunications. He identifies with the distinctive Pittsburgh culture—pride in the Steelers, love for local museums such as the Carnegie, and a modest, self‑reliant lifestyle. His never‑married
    status reflects a personal independence that aligns with the city’s historical emphasis on individual resilience and hard work.
attributes:
  skills: '[''Radio transmission system installation'', ''Telecommunications equipment troubleshooting'', ''Analog and digital broadcast technology'', ''Fiber optic splicing and testing'', ''FCC compliance
