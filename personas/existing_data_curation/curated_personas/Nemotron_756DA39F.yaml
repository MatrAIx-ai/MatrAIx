    communication'', ''Use of spectrum analyzers and other diagnostic instruments'']'
  hobbies: '[''Amateur radio operation'', ''Building and restoring vintage radios'', ''Woodworking and furniture making'', ''Hiking and nature walks in the Allegheny region'', ''Solving puzzles (crosswords,
