    craft beer'']'
  career_goals: He aims to shift from field‑heavy work to a senior technical advisory role within the next few years, securing advanced certifications such as the Certified Wireless Network Professional
    (CWNP) and an FCC General Radiotelephone Operator License. Brandon plans to leverage his decades of experience to start a boutique consulting firm that advises local broadcasters and telecom installers
    on system upgrades, regulatory compliance, and transition to digital platforms. He also hopes to author a practical guide on legacy broadcast equipment maintenance, contribute to vocational training
    programs at his community college, and be recognized as a mentor and veteran resource within the Pittsburgh telecommunications community.
