persona_description: A wealthy and influential benefactor who played a significant role in the establishment of schools and educational institutions in Utah, particularly in the Provo area. Proctor Academy
  was one of the institutions he supported, and he played a crucial role in its establishment and growth. He was known for his generosity and his support of educational causes, which helped to improve the
  quality of education in the region. Proctor Academy was a substantial and well-respected institution that educated students from all levels, and it played a significant role in the development of formal
  education in Provo.
