    ''Community outreach and victim assistance'', ''Educational pedagogy applied to investigative training'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading mystery and noir novels'', ''Solving crosswords and escape-room puzzles'', ''Candid street photography'', ''Hiking
    in state parks'', ''Journaling and reflective writing'', ''Teaching critical-thinking workshops to teens'']'
  career_goals: Malaya aims to carve a niche in art‑theft and cultural‑property investigations, uniting her curiosity for art with her investigative expertise. She plans to expand her solo practice into
    a boutique agency that offers traditional investigative services alongside digital‑security consulting for small businesses. To bolster credibility, she intends to obtain advanced certifications such
    as Certified Professional Investigator and Certified Cyber Forensics Examiner. A long‑term ambition is to develop a mentorship program that supports aspiring detectives—especially women—and to publish
    a guidebook that fuses educational techniques with investigative best practices. She also aspires to lecture at regional law‑enforcement academies on evidence handling and interview methodology, and
    eventually to share her accumulated knowledge through a memoir reflecting on her unique career path.
