personas:
  professional: Malaya Darienzo is a disciplined private investigator specializing in art theft and cultural‑property crimes, leveraging her education background and meticulous project‑management skills
    to blend forensic photography, digital OSINT, and interview techniques while building a boutique agency that also offers cyber‑security consulting for small businesses.
  sports: Malaya Darienzo enjoys solo hikes in Shawnee National Forest, trains with the St. Louis Running Club for half‑marathons, and follows the Cardinals and Bears, cheering them while keeping a disciplined
    weekly schedule of strength training at the community gym.
  arts: Malaya Darienzo spends weekends painting watercolor landscapes of the Illinois River inspired by Monet and O'Keeffe, curates a personal library of vintage noir novels by Dashiell Hammett, collects
    street photographs reminiscent of Henri Cartier‑Bresson, and finds solace in the haunting folk‑rock of Sufjan Stevens while attending occasional exhibitions at the Art Institute of Chicago.
  travel: Malaya Darienzo favors meticulously planned weekend getaways that balance cultural immersion and outdoor adventure, having trekked the red rocks of Sedona, explored the historic streets of Asheville,
    sampled the coffee scene in Montreal, and admired Renaissance art in Florence, while dreaming of a solo trip to the Musée d'Orsay to study original Impressionist works.
  culinary: Malaya Darienzo, an adept home cook, relishes crafting mushroom risotto with Arborio rice, wild‑foraged mushrooms and Parmesan, grilling fresh lake trout seasoned with lemon zest and dill, and
    indulging in a Sunday brunch of avocado toast topped with poached eggs and smoked paprika, while occasionally treating herself to a steak‑fry at a beloved St. Louis gastropub.
  core: Malaya Darienzo merges detective tenacity with artistic sensitivity, obsessively cataloguing clues like brushstrokes, yet occasionally loses sleep over unsolved puzzles and forgets to water her
    watercolors.
background:
  cultural: Born and raised in a small Midwestern town near St. Louis, Malaya grew up in a Protestant family that emphasized hard work, modesty, and community service—values typical of the region's cultural
    fabric. Exposure to the vibrant cultural offerings of nearby Chicago, including museums, theater, and diverse neighborhoods, fostered her appreciation for art and unconventional ideas. Her education
    at a state university reinforced a belief in lifelong learning and critical inquiry. The Midwestern ethos of independence and practicality shaped her disciplined, achievement‑driven personality, while
    her marriage provides a stable home base that supports her independent professional pursuits. Although she identifies as white, she respects the area's multicultural history and strives to incorporate
    inclusive perspectives when serving clients of varied backgrounds.
attributes:
  skills: '[''Surveillance and covert observation'', ''Forensic photography'', ''Digital forensics and OSINT'', ''Interview and interrogation techniques'', ''Case file management'', ''Report writing and
