personas:
  professional: An aspiring junior software developer who blends a love for futuristic science-fiction ideas with methodical problem-solving, Johnson Valle spends afternoons writing Python scripts, designing
    Scratch games, and troubleshooting battle-ready robots for the school robotics club, treating each line of code like a strategic chess move.
  sports: A disciplined swimmer who logs laps at the community pool, Johnson Valle also follows the Miami Heat for NBA excitement, participates in a middle-school table-tennis club to sharpen reflexes,
    and balances a competitive edge on the chess board with a structured fitness routine.
  arts: An avid piano enthusiast who intertwines classical sonatas with sci-fi soundtracks, Johnson Valle captures street scenes with a mirrorless camera, edits them into short films inspired by Hayao Miyazaki,
    and cites Ludwig van Beethoven as a lifelong musical influence.
  travel: A careful planner with a modest budget, Johnson Valle enjoys weekend trips to the nearby coastal town of Key West for beach photography, dreams of attending the International Robotics Expo in
    Berlin next summer, and hopes to explore the historic streets of a bustling capital city where their family's culinary traditions originated.
  culinary: A budding home chef, Johnson Valle proudly prepares arepas de queso and empanadas de carne every Sunday, experiments with quinoa-filled vegetarian variations, and occasionally rewards friends
    with homemade chocolate chip cookies after a piano recital.
  core: A curious, organized, and competitively driven teen who balances solitary sci-fi reading, strategic coding, disciplined piano practice, and a strong connection to cultural cooking, Johnson Valle
    navigates life with methodical precision and occasional perfectionist quirks.
background:
  cultural: Johnson is the daughter of Venezuelan immigrants who settled in Dallas, Texas. She grew up in a bilingual household, speaking Spanish at home and English at school, which has given her fluency
    in both languages and a deep appreciation for cultural nuance. Her family preserves Venezuelan traditions by preparing dishes such as arepas, hallacas, and empanadas, celebrating national holidays like
    Independence Day (5 July) and the Day of the Virgen de la Caridad. She participates in the local Venezuelan community center, helping organize cultural events and language exchange programs. This bicultural
    upbringing instills in her a strong sense of family solidarity, respect for diverse perspectives, and a desire to bridge her heritage with her interests in technology and education.
