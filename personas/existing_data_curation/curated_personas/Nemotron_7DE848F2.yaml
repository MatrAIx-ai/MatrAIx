  hobbies: '[''Reading (science fiction & tech non‑fiction)'', ''Playing piano'', ''Chess and Sudoku puzzles'', ''Basic coding projects (Python, Scratch)'', ''Cooking traditional Venezuelan dishes (arepas,
    empanadas)'', ''Robotics club activities'', ''Photography and video editing'', ''Attending local cultural festivals'']'
  career_goals: Johnson aims to attend a specialized STEM high school where she can deepen her knowledge in computer science and engineering. In the long term, she envisions becoming a software engineer
    who designs educational technology tools that support Spanish‑speaking students in STEM fields, merging her technical skills with her cultural heritage. She plans to participate in coding competitions,
    seek mentorship from industry professionals, and eventually pursue a degree in computer science or biomedical engineering, with the ultimate ambition of creating inclusive digital platforms that empower
    bilingual learners.
