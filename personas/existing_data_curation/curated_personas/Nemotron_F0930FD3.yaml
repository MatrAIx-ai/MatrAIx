  career_goals: While she is too young for concrete career plans, Alaysha’s love for routine, caring nature, and methodical play foreshadow ambitions in roles that blend structure with service. She often
    mimics adults caring for dolls and voices aspirations such as “be a teacher” or “take care of babies.” Her caregivers imagine her future as a kindergarten teacher, a pediatric nurse, or a community
    program coordinator, where she can maintain harmony while following organized procedures.
