personas:
  professional: Alaysha Young, a two‑year‑old, transforms daily play into a mini‑career by methodically arranging toy blocks into tidy rows, assigning each a “task,” and insisting on a strict bedtime and
    snack schedule, blending innate organization with a caring, cooperative spirit.
  sports: Alaysha Young, a two‑year‑old, enjoys the weekly toddler gymnastics class at the community center, delights in the predictable warm‑up songs, and watches the hometown baseball team, the River
    City Royals, on a small TV, clutching a plush baseball for comfort.
  arts: Alaysha Young, a two‑year‑old, delights in the bright animations of Disney’s "Frozen" and the gentle melodies of Raffi’s "Baby Beluga," often humming along while drawing simple circles and stick‑figure
    families, using art to express their nurturing side.
  travel: Alaysha Young, a two‑year‑old, finds joy in short family trips to the nearby botanical garden and a seaside beach resort, where the familiar lull of car‑ride naps comforts them, and they daydream
    about a quiet lakeside cabin where they could watch ducks from a safe perch.
  culinary: Alaysha Young, a two‑year‑old, prefers soft foods such as banana‑mash, avocado toast bites, mild cheddar cheese cubes, and sweet apple sauce, delights in the flavor of banana pancakes, and habitually
    asks for the same snack before bedtime, though they may throw a tantrum if a new vegetable appears on the plate.
  core: Alaysha Young, a two‑year‑old with a love for routine, is a meticulous little planner who comforts others while quietly fretting over small changes and clings to familiar comforts in every facet
    of life.
background:
  cultural: Alaysha is raised in an African‑American household in Eastvale, California. Her family maintains strong ties to the broader Black community through weekly services at a local Baptist church,
    where gospel music and storytelling are part of her early auditory environment. Family gatherings often feature soul‑food traditions—collard greens, mac & cheese, and sweet‑potato pie—alongside celebrations
    of cultural milestones such as Juneteenth and Kwanzaa. Grandparents and extended relatives frequently share oral histories, reinforcing a sense of heritage and collective responsibility. This cultural
    milieu nurtures Alaysha’s compassion, cooperative spirit, and respect for routine, as community events and family rituals follow familiar, predictable patterns.
