  career_goals: Xiaohua aims to evolve into a senior systems architect role within the next five years, focusing on designing scalable, cloud‑native infrastructures that support real‑time financial services.
    She plans to earn TOGAF and AWS Solutions Architect certifications, lead cross‑functional architecture review boards, and mentor junior analysts—especially women and underrepresented minorities in tech.
    Over the longer term, she envisions launching a consulting practice that helps small businesses adopt secure, resilient IT systems while maintaining a work‑life balance that mitigates her stress‑prone
    tendencies.
