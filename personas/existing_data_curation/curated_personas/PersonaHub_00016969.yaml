persona_description: A hydrologist who specializes in the study of mountain snowpacks and their interactions with human activities, particularly the impact of dust deposition on snowmelt rates and runoff.
  He has led research teams that have addressed uncertainties in understanding dust-on-snow events and developed strategies to reduce their severity in the Colorado River basin. His work has implications
  for water management and climate change adaptation in the region.
