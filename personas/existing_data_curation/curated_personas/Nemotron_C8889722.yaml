  career_goals: Wannee aspires to turn her creative passions into a modest home‑based venture, offering handcrafted artwork and culinary workshops to local families and online participants. She plans to
    earn a certification in community arts education, enabling her to lead regular art and storytelling sessions for children and seniors at the local cultural center. Over the next five years, she hopes
    to compile an illustrated collection of Southeast Asian folktales reimagined with contemporary themes, and to take on a volunteer leadership role that leverages her organizational strengths to enhance
    cultural programming in Frisco.
