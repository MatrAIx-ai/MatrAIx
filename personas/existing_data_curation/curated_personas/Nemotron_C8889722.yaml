personas:
  professional: Wannee Culbertson, a disciplined home‑based entrepreneur in her late forties, leverages meticulous organizational skills and artistic expertise to run boutique workshops that blend watercolor
    illustration, Southeast Asian calligraphy, and culinary storytelling for local families and online participants.
  sports: Wannee Culbertson enjoys solitary early‑morning walks in Central Park, occasionally joins the Frisco Senior Yoga Circle for gentle stretching, follows the Dallas Mavericks for basketball thrills,
    and roots for the Frisco RoughRiders minor‑league baseball team during weekend outings.
  arts: Wannee Culbertson immerses herself in the arts by painting in the style of John Singer Sargent, practicing calligraphy inspired by Hassan Massoudy, listening to Björk’s avant‑garde albums while
    sketching, and attending local theater productions of classic literary adaptations, allowing those influences to inform her own abstract motifs.
  travel: Wannee Culbertson prefers meticulously planned solitary trips that blend cultural immersion with culinary exploration, having journeyed to Chiang Mai, Kuala Lumpur, and Hoi An, while dreaming
    of a quiet retreat in Luang Prabang to study local folklore and photograph rice‑paddy landscapes.
  culinary: Wannee Culbertson, an adept home chef, regularly crafts Southeast Asian dishes such as fragrant lemongrass chicken pho, spicy laksa with coconut milk, and mango sticky rice, incorporating garden‑fresh
    herbs like Thai basil and kaffir lime leaves, and often experiments with tamarind‑infused sauces to marry Texas produce with authentic flavors.
  core: Wannee Culbertson is a methodical yet whimsical creator who channels solitary imagination into watercolor, calligraphy, and garden‑fresh cooking, while quietly hoarding rare stamps and occasionally
    procrastinating on tax paperwork as she balances community leadership aspirations.
background:
  cultural: Wannee’s family originates from the Mekong region of Southeast Asia, bringing a rich blend of culinary, linguistic, and artistic traditions to their home in Frisco, Texas. Raised in a bilingual
    household, she speaks her parents’ native language alongside English, allowing her to bridge cultural contexts. She celebrates festivals such as Lunar New Year and Songkran, and her kitchen is filled
    with aromas of lemongrass, kaffir lime, and galangal. The collectivist values of her heritage—emphasizing respect for elders, community harmony, and hospitality—inform her considerate and cooperative
    nature. These cultural influences shape her artistic expression, community involvement, and dedication to sharing stories that preserve her heritage while engaging with the diverse Texan community.
