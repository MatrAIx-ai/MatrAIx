  hobbies: '[''Cooking traditional Gujarati dishes'', ''Herb gardening'', ''Reading historical fiction and poetry'', ''Knitting and crochet'', ''Bridge (card game)'', ''Walking in Balboa Park'', ''Attending
    community cultural festivals'', ''Volunteer storytelling at senior center'', ''Journaling for stress management'']'
  career_goals: Although formally retired, Komalben’s ambitions focus on leaving a lasting, organized legacy for her family and community. She hopes to compile a memoir of her life and her family’s migration
    story, documenting recipes, oral histories, and cultural customs. She aims to establish a weekly senior‑center book club that blends classic literature with local history, and to lead a series of cooking
    workshops that teach younger generations authentic Gujarati dishes. Maintaining her health so she can continue volunteering, she also seeks to mentor her grandchildren in academic and life‑skill pursuits,
    ensuring they have reliable guidance and emotional support.
