persona_description: A scientist or researcher who is interested in the genetic and evolutionary aspects of domesticated animals, particularly in the study of ancient breeds and their potential for domestication.
  They are likely to be familiar with the Tauros Programme, which aims to breed a suitable replacement for the extinct aurochs, and have experience with ancient breeds and their genetic relationships. They
  may also have an interest in the use of genetic and evolutionary principles to develop practical guidelines for the Tauros Programme.
