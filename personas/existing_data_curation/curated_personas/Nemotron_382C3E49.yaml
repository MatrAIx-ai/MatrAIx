personas:
  professional: Sarah Barrow is a budding young historian and amateur scientist who blends meticulous LEGO Technic models with detailed sketches of Lexington’s colonial architecture, channeling their curiosity
    and disciplined nature into school projects, museum visits, and community history presentations.
  sports: Sarah Barrow plays on the Lexington Little League baseball team and participates in the school’s cross‑country club, cheers for the Boston Red Sox and Boston Celtics, but most weekends they prefer
    nature hikes in nearby conservation areas where they photograph plants and insects.
  arts: Sarah Barrow delights in sketching historic facades, listening to Tchaikovsky’s piano concertos, reading Beatrix Potter and Dr. Seuss, and creating animated stories in Scratch inspired by Studio
    Ghibli’s whimsical style.
  travel: Sarah Barrow has explored Boston’s Freedom Trail, the Salem Witch Museum, and Colonial Williamsburg, and they dream of wandering the historic streets of London and trekking through the granite
    cliffs of Acadia National Park.
  culinary: Sarah Barrow loves homemade New England clam chowder, slice‑of‑pie apple crumble, and lavender lemonade, often whisking batter for Sunday pancakes and recording each recipe with hand‑drawn illustrations
    in a colorful kitchen notebook.
  core: An inquisitive, hyper‑organized ten‑year‑old who channels anxiety into detailed sketches, disciplined piano practice, and methodical LEGO builds while dreaming of preserving local history and mastering
    new creative skills.
background:
  cultural: Sarah comes from a white, Anglo‑American family that has lived in Lexington, Massachusetts for several generations. Her parents are college‑educated professionals who emphasize the importance
    of education, community involvement, and an appreciation of New England’s historical heritage. Family traditions include celebrating Thanksgiving with a focus on local history, participating in community
    clean‑up events, and attending the annual Lexington Battle Green reenactments. Exposure to the region’s colonial museums, public libraries, and seasonal arts festivals has shaped her cultural perspective,
    blending a respect for tradition with a curiosity for new ideas.
