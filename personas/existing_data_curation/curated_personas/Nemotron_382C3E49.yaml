  career_goals: Although she is only ten, Sarah already envisions a future where she can combine art, science, and problem‑solving. She aspires to become a research scientist or an inventor who creates
    aesthetically pleasing, sustainable solutions, such as designing eco‑friendly products. She also dreams of attending a prestigious high school arts program and later studying interdisciplinary fields
    like environmental design or biomedical engineering. Her ambition includes winning national science competitions, publishing illustrated research articles, and eventually mentoring younger students
    to nurture curiosity while maintaining the high standards she sets for herself.
