  hobbies: '[''Reading historical fiction and Mexican literature'', ''Vegetable gardening'', ''Birdwatching'', ''Crocheting'', ''Cooking traditional Mexican dishes'', ''Calligraphy'', ''Crossword puzzles'',
    ''Documentary watching'', ''Nature walks in Lassen County'']'
  career_goals: Haydee aims to move into a supervisory position within the next two years, where she can formalize her systematic approach to enhance cleaning protocols and mentor younger employees. She
    plans to obtain a certification in environmental health and safety before retirement, positioning herself to offer consulting services to small businesses in Lassen County seeking efficient, sustainable
    cleaning practices. Ultimately, she hopes to leave a legacy of safer, more cost‑effective facility management while maintaining a steady, part‑time role that respects her desire for quiet and autonomy.
