  hobbies: '[''Digital illustration'', ''Sketching'', ''Urban photography'', ''Playing guitar'', ''Custom mechanical keyboard building'', ''Robotics hobby projects'', ''Hackathon participation'', ''Video
    gaming (simulation/puzzle)'', ''Community STEM mentorship'', ''Reading sci‑fi/fantasy literature'']'
  career_goals: Markee aims to become a senior mechanical engineer leading interdisciplinary product development teams that fuse cutting‑edge technology with artistic design. He envisions working at an
    innovative firm focused on sustainable consumer products or automotive design, securing patents for novel mechanisms, and publishing thought‑leadership pieces on aesthetic engineering. Over the next
    five years, he plans to pursue a master's degree in mechanical engineering or an MBA to broaden his strategic impact, eventually launching his own consultancy that champions inclusive design and mentors
    underrepresented youth in STEM fields.
