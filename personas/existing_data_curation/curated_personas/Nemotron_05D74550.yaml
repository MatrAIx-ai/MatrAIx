personas:
  professional: Markee Gilbert, a 21‑year‑old mechanical engineering student and creative technologist, blends expertise in SolidWorks, Python, and finite element analysis with a jazz‑infused design aesthetic
    to prototype sustainable consumer products while captivating peers and mentors with energetic, persuasive presentations.
  sports: Markee Gilbert stays active by playing intramural basketball in the spring, running with the local “City Runners” club for weekend 5k to 10k races, and following the NBA’s Los Angeles Lakers and
    the Premier League’s Manchester United, often wearing their jerseys while cycling to hackathon venues.
  arts: Markee Gilbert channels their creative energy into digital illustration inspired by the abstract works of James Turrell, snaps gritty urban photography reminiscent of Henri Cartier‑Bresson, strums
    jazz improvisations on a Fender Stratocaster echoing Miles Davis, and regularly attends contemporary art exhibitions featuring artists like Yayoi Kusama and performance pieces at downtown galleries.
  travel: Markee Gilbert fuels their curiosity with a mix of weekend road trips to architecturally iconic sites like the Salk Institute, annual backpacking adventures through Barcelona’s modernist neighborhoods
    and Kyoto’s temple streets, and occasional gaming‑conference pilgrimages to Austin, balancing careful budgeting with a desire to experience cutting‑edge design and vibrant street culture.
  culinary: Markee Gilbert enjoys crafting homemade ramen broth infused with miso and chashu pork, experiments with charcoal‑infused coffee beans for a smoky espresso, and occasionally orders artisanal
    pizza topped with goat cheese and arugula after late‑night prototyping sessions, while still relying on quick avocado toast when deadlines loom.
  core: Markee Gilbert merges mechanical precision with artistic spontaneity, lives for late‑night prototyping marathons, obsessively tracks wrist health, and can’t resist a good jazz riff or a perfectly
    tuned keyboard switch.
background:
  cultural: Markee is an African American raised in West Harrison, New York, with family roots extending to the southern United States. Growing up in a diverse suburban setting, he experienced both mainstream
    American culture and the rich traditions of Black community life. He stays connected to his heritage through music—especially jazz, soul, and contemporary hip‑hop—family gatherings featuring Southern
    cuisine, and participation in cultural events organized by local Black community groups. Markee is an active member of the National Society of Black Engineers, values social‑justice advocacy, and incorporates
    the narratives and perspectives of his cultural background into his collaborative and inclusive approach to engineering and design.
