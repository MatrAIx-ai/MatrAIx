persona_description: A historian and archeologist who specializes in the study of ancient medicinal plants and perfumes, particularly those from the Mediterranean region. Their expertise lies in the identification
  and analysis of the surviving aromachemicals and their application in creating historical perfumes and essences. They have a deep understanding of the cultural and historical context in which these plants
  were used, and their research often involves the analysis of ancient texts and artifacts. They are also skilled in the use of modern scientific methods and technologies to recreate historical perfumes
  and essences.
