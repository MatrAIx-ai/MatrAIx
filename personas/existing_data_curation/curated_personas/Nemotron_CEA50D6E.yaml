personas:
  professional: Staci Maltby, a 28‑year‑old accountant, blends rigorous audit expertise with data‑science flair, using Python, SQL, and advanced Excel to design predictive fraud models while leading interdisciplinary
    audit teams, channeling her methodical nature and competitive drive into achieving CPA certification and a fast‑track to senior manager.
  sports: Staci Maltby plays forward for a co‑ed community soccer league in Seattle, cheering on the Seahawks and the Seattle Sounders FC, and balances competitive matches with weekend trail runs that double
    as photographic excursions, while also joining a local climbing gym during the winter months.
  arts: Staci Maltby frequents contemporary art galleries like the Seattle Art Museum’s modern wing, attends talks featuring artists such as Kehinde Wiley and Yayoi Kusama, and curates monthly board‑game
    nights where strategy games like Terraforming Mars become a creative outlet alongside her landscape photography pursuits.
  travel: Staci Maltby enjoys meticulously planned weekend getaways, having hiked the Columbia River Gorge for sunrise photo shoots, explored the street art of Portland's Alberta Arts District, and dreams
    of a spring pilgrimage to Kyoto’s bamboo forests, balancing adventure with a modest travel budget and a backup plan for work deadlines.
  culinary: Staci Maltby indulges in culinary workshops that fuse food science with world flavors, mastering dishes like sous‑vide miso‑glazed salmon and handcrafted gnocchi with sage butter, while her
    own kitchen experiments include brewing cold brew coffee and creating matcha‑infused smoothies.
  core: Staci Maltby, a competitively curious accountant, merges data‑driven audit work with art‑inspired side projects, organizes every aspect of life from finances to board games, yet sometimes skips
    dentist appointments in pursuit of perfection.
background:
  cultural: Staci was raised in a middle‑class, white American family in the Pacific Northwest, where outdoor recreation and a strong work ethic are core values. Growing up in Tacoma, she absorbed the region's
    blend of tech innovation and environmental stewardship, which informs her analytical approach and appreciation for nature. Her cultural upbringing emphasizes reliability, community involvement, and
    a pragmatic outlook, while her exposure to diverse artistic communities nurtures an open‑minded curiosity toward unconventional ideas.
