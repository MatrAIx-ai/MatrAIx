  hobbies: '[''Contemporary Art Gallery Visits'', ''Landscape Photography'', ''Hiking in the Pacific Northwest'', ''Co‑ed Community Soccer League'', ''Board‑Game Nights'', ''Escape‑Room Challenges'', ''Culinary
    Workshops'']'
  career_goals: Staci aims to earn her CPA designation within the next year and advance to a senior manager role at a leading accounting firm, where she can lead interdisciplinary audit teams and integrate
    data‑science techniques into traditional audit practices. Over the next five years, she aspires to become a partner overseeing a regional practice, specializing in forensic accounting and financial
    risk advisory. Long‑term, she envisions transitioning into a strategic CFO position for a tech‑forward company, leveraging her analytical expertise and entrepreneurial drive.
