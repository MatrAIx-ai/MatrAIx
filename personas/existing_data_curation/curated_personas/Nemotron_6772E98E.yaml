personas:
  professional: Jill Alvarado, a retired environmental engineer turned citizen‑science advocate, leverages their 30‑year mastery of statistical modeling, GIS, and water‑resource simulation to mentor high‑school
    robotics students, author a sustainable‑living guide, and publish desert bird research, and they apply a methodical yet adaptable mindset to every project.
  sports: Jill Alvarado, a seasoned hiker, regularly joins the Albuquerque Mountain Club for weekend treks in the Sandia range, follows the New Mexico Thunderbirds basketball season, supports the local
    community soccer league’s women’s team, and while they maintain a simple home‑gym routine of resistance bands and yoga for overall fitness, they prefer solitary trail runs over crowded gyms.
  arts: Jill Alvarado, an avid photographer, draws inspiration from Ansel Adams and Edward Weston, curates a modest collection of their prints, attends monthly screenings of classic films by Ingmar Bergman,
    and indulges in folk‑rock vinyl from Joni Mitchell and Neil Young during evenings on the porch, while they also experiment with long‑exposure night photography of the desert sky.
  travel: Jill Alvarado prefers low‑key, nature‑focused travel, having documented the night skies of Iceland’s Þingvellir, explored the ancient temples of Kyoto’s Arashiyama bamboo grove, and frequently
    road‑trips to Santa Fe for its art markets, always planning itineraries around low‑water hiking trails and sustainable lodging, and they savor quiet moments of sunrise photography wherever they go.
  culinary: Jill Alvarado, a pragmatic home cook, favors dishes that echo the desert’s modest bounty, such as grilled cactus (nopal) tacos with roasted Pueblo cheese, quinoa‑based salads flavored with rosemary,
    sage, and prickly‑pear vinaigrette, and occasionally treats themselves to a handcrafted espresso using locally roasted beans, while they meticulously measure water usage to align cooking with their
    xeriscape principles.
  core: Jill Alvarado combines relentless scientific curiosity with a hands‑on, low‑water lifestyle, channeling a competitive drive into community mentorship while they occasionally hoard spare telescope
    parts and vintage lenses.
background:
  cultural: Jill was born and raised in the Midwestern United States to a family of Irish‑German descent, where values of self‑reliance and pragmatic problem‑solving were emphasized. She moved to Albuquerque
    for graduate studies in environmental engineering and has lived in the city for the past four decades, deeply appreciating the desert’s unique ecology and the region’s blend of Native American, Hispanic,
    and Anglo‑American cultures. While she respects local traditions—celebrating community festivals, enjoying New Mexican cuisine, and learning about Pueblo history—she maintains her own cultural identity
    rooted in Midwestern customs and a lifelong commitment to scientific inquiry. This background informs her balanced outlook, combining curiosity about diverse cultures with a practical, independent worldview.
attributes:
  skills: '[''Statistical modeling'', ''GIS spatial analysis'', ''Water‑resource simulation'', ''Environmental impact assessment'', ''Mechanical design (CAD)'', ''Technical writing and grant preparation'',
    ''Project management'', ''Public speaking'', ''Sustainable xeriscape gardening'', ''Solar‑panel installation'', ''Woodworking'', ''Digital photography'', ''Python programming'', ''Mentoring in STEM'']'
  hobbies: '[''Hiking and desert ecology observation'', ''Stargazing and amateur astronomy'', ''Xeriscape gardening'', ''Woodworking (birdhouses, furniture)'', ''Digital photography of Southwestern landscapes'',
    ''Reading science non‑fiction'', ''Chess puzzles'', ''Attending small‑group science talks'', ''Gentle yoga'', ''Knitting functional garments'']'
  career_goals: Although formally retired, Jill’s career ambitions remain focused on personal mastery and community contribution. She aims to author a comprehensive guide on sustainable living in arid environments,
    integrating her engineering expertise with hands‑on gardening experience. Jill plans to mentor a local high‑school robotics team with the goal of winning a regional competition, using her competitive
    drive to push both herself and the students toward excellence. She also seeks to expand her involvement in citizen‑science projects monitoring desert bird populations, hoping to publish her findings
    in a regional science journal. Finally, Jill hopes to compile a memoir that chronicles her journey as a woman in STEM, highlighting lessons of resilience and critical thinking for future generations.
