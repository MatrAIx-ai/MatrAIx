  hobbies: '[''Dancing (cumbia, salsa, reggaeton)'', ''Cooking traditional Mexican dishes'', ''Listening to Latin pop and regional Mexican music'', ''Playing pickup soccer'', ''Volunteering at community
    center'', ''Social media photography and content sharing'', ''Exploring local nature areas'']'
  career_goals: Daysi aims to turn her natural sociability and love for community engagement into a career in outreach or marketing. In the next few years she plans to complete a bachelor’s degree in communications
    or public relations while gaining hands‑on experience as a marketing assistant for a local boutique or cultural organization. Her long‑term ambition is to become a community liaison or brand strategist
    who designs inclusive campaigns that celebrate Mexican-American heritage, and eventually mentor other young people from her neighborhood to pursue similar paths.
