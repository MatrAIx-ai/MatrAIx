personas:
  professional: Julio Santiago, an enthusiastic junior soccer coordinator in his neighborhood youth league, uses their natural curiosity and practical mindset to design simple game drills while balancing
    the need for structure with the flexibility to let teammates improvise, and their outgoing compassion makes them a trusted helper during team activities.
  sports: Julio Santiago, a forward for the Riverside Runners youth soccer team, trains three evenings a week at the local community field, passionately follows the professional baseball squad the Harbor
    Hawks, and occasionally joins a weekend park run club, though they sometimes skip a practice to help their family with weekend cooking.
  arts: Julio Santiago, a budding salsa dancer who attends after‑school dance classes at the Community Arts Center, delights in the lively beats of legends like Celia Cruz and the rhythmic pulse of bomba
    music while also constructing elaborate LEGO castles that inspire their own imaginative storytelling.
  travel: Julio Santiago prefers short, adventure‑filled day trips to nearby parks and the beach town of Carlsbad, enjoys spontaneous treasure hunts for leaves and insects, dreams of a future family vacation
    to the tropical rainforests of Costa Rica, yet their travel plans stay grounded by the modest family budget and school schedule.
  culinary: Julio Santiago loves helping in the kitchen, expertly rolling empanadas with seasoned pork, sprinkling shredded cheese on a quick quesadilla, and mastering the perfect blend of mango and lime
    for a refreshing salsa, though they often sneak a bite of the dough before it bakes.
  core: Julio Santiago merges an energetic love for soccer, salsa dancing, and LEGO building with a practical curiosity, organized play, and a sweet tooth that occasionally derails disciplined saving.
background:
  cultural: Julio grows up in a bilingual Puerto Rican household in Vineland, New Jersey. His family celebrates cultural traditions such as the annual Three Kings Day celebration, enjoys dishes like arroz
    con gandules and flan, and listens to a mix of reggaetón, salsa, and bomba music. He attends a local elementary school with a diverse student body, which allows him to share his heritage while learning
    about others. The close‑knit Puerto Rican community in the area emphasizes family bonds, mutual support, and community involvement, all of which shape Julio’s compassionate and cooperative personality.
