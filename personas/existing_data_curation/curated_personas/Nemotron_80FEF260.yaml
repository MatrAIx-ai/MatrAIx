personas:
  professional: Stephan Pitre, an 18‑year‑old casino surveillance guard with a talent for spotting irregular behavior, blends his keen observational eye and self‑taught video‑forensics skills with a vivid
    imagination, using sketching and digital illustration to map out patterns and envision future forensic‑analysis technologies.
  sports: Stephan Pitre, a member of the Blue Ridge Hiking Society, spends weekends trekking North Georgia’s hills and photographing wildflowers, follows the Atlanta Braves and Atlanta Falcons with fervor,
    joins local pickup basketball games when time allows, and practices yoga to stretch after long shifts on his feet.
  arts: Stephan Pitre, who sketches charcoal urban scenes and creates digital illustrations inspired by cyber‑punk novels like Neuromancer and philosophical essays, fills his playlists with Radiohead, Sufjan
    Stevens, and ambient soundtracks, visits the High Museum of Art for modern installations, and dreams of producing documentary‑style videos that fuse security footage with artistic storytelling.
  travel: Stephan Pitre, who favors spontaneous, budget‑friendly getaways, has explored the Blue Ridge Mountains and Asheville, hopes to chase the northern lights in Iceland and the cherry blossoms of Kyoto,
    and plans each trip around affordable hostels, hiking trails, and photo‑opportunities for his wildflower collections.
  culinary: Stephan Pitre, a modest cook who loves Southern staples like crispy fried chicken, collard greens, and peach cobbler, also experiments with shakshuka and miso ramen, collects wildflower honey
    to drizzle over salads, and insists on brewing a pour‑over using Stumptown beans before any art session.
  core: Stephan Pitre, an imaginative 18‑year‑old surveillance guard who sketches between camera feeds, battles anxiety with meditation, and dreams of turning his love of video forensics into artful documentaries,
    all while juggling a love of hiking, indie music, and tight budgeting.
background:
  cultural: Stephan was raised in Flowery Branch, a small town in Hall County, Georgia, where Southern hospitality and close‑knit community values are prominent. His family comes from a working‑class background
    tied to local manufacturing and service jobs, and he grew up attending church gatherings, local barbecues, and school events that emphasized respect and cooperation. The region’s pine forests and rolling
    hills nurtured his love for solitary outdoor activity, while the nearby Gainesville arts scene exposed him to a broader cultural perspective. Though he identifies as a white Southern American, Stephan’s
    curiosity pushes him beyond typical local conventions, blending traditional values with a strong drive for novelty, art, and abstract thinking.
