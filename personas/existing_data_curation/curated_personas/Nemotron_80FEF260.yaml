  career_goals: Stephan plans to earn his GED within the next year and enroll in a community‑college criminal‑justice program focused on forensic video analysis. He aims to move from entry‑level security
    guard work to a certified surveillance analyst role, eventually joining a corporate security team that uses AI‑driven monitoring tools. He also dreams of merging his artistic side with his technical
    skills by creating documentary‑style video projects about security systems. He seeks a career that offers varied daily challenges, values creative input, and allows interdisciplinary collaboration,
    while providing stability to help manage his stress.
