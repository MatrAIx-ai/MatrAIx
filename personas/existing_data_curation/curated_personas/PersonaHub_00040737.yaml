persona_description: A professional astronomer with extensive experience in comet research, particularly in the study of cometary outbursts and the behavior of volatile gases within comets. They are known
  for their expertise in the Deep Impact mission, which successfully crashed a large metal impactor into a comet in 2005, and for their involvement in the EPOXI mission, which will study a second comet,
  Hartley 2, after the first mission was redirected due to the disappearance of its target, Comet Boethin. They are also likely to be involved in the search for Comet Boethin during the fall of 2008, as
  it has an orbital period of 6.4 years and is expected to be visible during that time.
