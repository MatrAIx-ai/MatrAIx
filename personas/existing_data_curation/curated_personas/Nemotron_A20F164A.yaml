personas:
  professional: Bertha Rodriguez, a meticulous dental and ophthalmic laboratory technician based in Atlanta, merges her CAD/CAM mastery and 3D printing expertise with a skeptical, methodical mindset, championing
    AI driven design workflows while demanding rigorous validation to protect patient safety.
  sports: Bertha Rodriguez fuels her fitness regime with weekly hikes through the Blue Ridge foothills, occasional trail runs with the Atlanta Hiking Club, and a disciplined yoga practice to counteract
    lab induced stiffness, while cheering on the Atlanta Falcons, Hawks, and Braves as her go-to sports teams.
  arts: Bertha Rodriguez finds artistic inspiration in the bold colors of Frida Kahlo, the lyrical guitar riffs of Lila Downs, and the cinematic storytelling of Guillermo del Toro, often attending performances
    at the Alliance Theatre and curating a small collection of contemporary Mexican prints in her apartment.
  travel: Bertha Rodriguez prefers meticulously planned solo getaways that blend nature and culture, revisiting Oaxaca's bustling markets for culinary research, exploring Kyoto's temples for design inspiration,
    and trekking lesser known trails in the Blue Ridge, all while budgeting carefully to keep future boutique lab ambitions on track.
  culinary: Bertha Rodriguez excels at cooking authentic Mexican dishes such as mole poblano and chiles en nogada, remixing them with modern twists like beet infused guacamole and quinoa filled tamales,
    and she relishes sourcing heirloom corn, epazote, and achiote at farmer markets for her experimental kitchen.
  core: Bertha Rodriguez blends analytical precision with creative curiosity, channeling worry into meticulous planning, yet occasionally succumbs to late night spice experiments that leave the kitchen
    a colorful mess.
background:
  cultural: Bertha’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she grew up celebrating Día de los Muertos, quinceañeras, and other family traditions that emphasized
    respect for elders and communal responsibility. Moving to Cumming, GA, she has integrated into the local Hispanic community, volunteering at cultural events and offering Spanish translation services
    at her workplace. Her cultural background instills a strong work ethic and a deep appreciation for craftsmanship, which she blends with her professional commitment to precision. While she embraces American
    professional norms, she continues to honor Mexican culinary and festive customs, often sharing homemade tamales and mole with coworkers during holidays.
attributes:
  skills: '[''Dental prosthetic fabrication'', ''Ophthalmic lens grinding'', ''CAD/CAM software (exocad, 3Shape)'', ''3D printing of medical appliances'', ''Materials testing (metals, ceramics, polymers)'',
    ''Infection control & OSHA compliance'', ''Quality assurance and documentation'', ''Bilingual communication (English/Spanish)'', ''Technical drawing and blueprint interpretation'', ''Equipment calibration
    and maintenance'']'
  hobbies: '[''Urban hiking in the Blue Ridge foothills'', ''Reading scientific journals on biomaterials'', ''Journaling and mindfulness meditation'', ''Cooking traditional Mexican dishes'', ''DIY electronics
    projects'', ''Macro and nature photography'', ''Small-group board game nights'']'
  career_goals: Bertha aims to become a lead technician and eventually a certified specialist in dental and ophthalmic device engineering. She plans to earn the Certified Dental Technician (CDT) credential
    and pursue additional certifications in digital dentistry. Driven by her curiosity, she wants to spearhead the adoption of next‑generation biomaterials and AI‑assisted design workflows in her lab, while
    insisting on thorough validation to preserve patient safety. In the long term, she envisions opening a boutique laboratory that blends traditional craftsmanship with cutting‑edge digital techniques,
    providing personalized solutions for underserved communities in the Atlanta metro area.
