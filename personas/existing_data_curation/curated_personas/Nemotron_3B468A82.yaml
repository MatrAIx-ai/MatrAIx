    health issues in custody'']'
  hobbies: '[''Weightlifting and powerlifting'', ''Trail hiking and fishing in the Appalachian region'', ''Woodworking and model building'', ''Playing strategy video games (e.g., XCOM, Civilization)'',
    ''Reading true crime and criminal justice literature'', ''Listening to classic rock and bluegrass music'', ''Playing chess'']'
  career_goals: David aims to complete his associate’s degree in criminal justice while earning his full correctional officer certification. Within the next three to five years he hopes to be promoted to
    sergeant, enrolling in the state’s Corrections Officer Leadership Academy to gain supervisory skills. Long‑term, he envisions attaining a bachelor’s degree and moving into administrative roles, eventually
    qualifying for a warden or deputy warden position. He is also interested in developing evidence‑based rehabilitation programs that reduce recidivism, and he seeks mentorship opportunities to sharpen
    his strategic planning abilities.
