personas:
  professional: David Morson, an aspiring correctional officer with a reputation for meticulous report writing and precise inmate classification, channels his need for structure and competitive drive into
    reliable crisis response and steadfast adherence to correctional policies, earning him the trust of supervisors.
  sports: David Morson, a dedicated weightlifter and powerlifter training at Apex Strength Club, follows the Pittsburgh Steelers (NFL) and the Pittsburgh Penguins (NHL) with fervor, and joins the Appalachian
    Trail Hiking Society each summer for long‑distance treks while maintaining a disciplined weekly cardio regimen.
  arts: David Morson, a fan of classic rock legends like Led Zeppelin and The Rolling Stones and bluegrass icons such as Bill Monroe and Alison Krauss, frequently watches true‑crime series like "Making
    a Murderer" and enjoys strategic video games such as XCOM, finding these pursuits reinforce his analytical mindset.
  travel: David Morson prefers meticulously planned road trips that balance solitary hikes in Shenandoah National Park and fishing at Douglas Lake with occasional international adventures like a self‑guided
    tour of Norway’s Lofoten Islands, always budgeting his travel expenses to align with his long‑term savings goals.
  culinary: David Morson, a competent home cook, favors high‑protein meals such as grilled ribeye steak with peppercorn sauce, cedar‑plank smoked trout, and unwieldy BBQ ribs, often seasoning with rosemary
    and smoked paprika while occasionally indulging in a cheat‑day pizza topped with extra cheese and pepperoni.
  core: David Morson is a methodical, stress‑prone 18‑year‑old whose life revolves around logs—whether tracking gym lifts, inmate data, or budget spreadsheets—yet his competitive streak and love for solitary
    pursuits keep him constantly sharpening both mind and muscles.
background:
  cultural: David grew up in a middle‑class, white family in Charleston, West Virginia, immersed in the Appalachian cultural milieu. His upbringing emphasized self‑reliance, hard work, and community loyalty,
    values rooted in the region’s coal‑mining heritage and small‑town traditions. He was raised in a Protestant (Methodist) environment that reinforced order, discipline, and respect for authority. Local
    customs—such as attending high‑school football games, participating in county fairs, and listening to bluegrass and folk music—have shaped his sense of identity. While he appreciates these regional
    traditions, his exposure to college life and modern correctional work has broadened his perspective, blending traditional Appalachian values with a contemporary, career‑focused outlook.
