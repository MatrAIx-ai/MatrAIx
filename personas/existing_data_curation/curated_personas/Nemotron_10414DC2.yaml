  career_goals: Jenny is still forming her career aspirations, but she expresses a keen interest in roles that combine curiosity about living things with practical problem‑solving, such as becoming a veterinarian
    or a wildlife biologist. She also dreams of using her creativity to design video games or to be an elementary school teacher, reflecting a desire to help others learn.
