personas:
  professional: Jenny Hunter is an aspiring junior game developer who creates interactive stories in Scratch, combining curiosity for new ideas with a practical step‑by‑step approach, and leverages their
    organized yet flexible workflow to debug and iterate on projects.
  sports: Jenny Hunter plays midfield for the local community soccer team, the Riverdale Rovers, practices three times a week after school, idolizes Megan Rapinoe, enjoys sprint drills and weekend hikes
    along the nearby creek, and balances enthusiasm for competition with a laid‑back attitude toward fitness when schoolwork piles up.
  arts: Jenny Hunter sketches lively cartoon characters inspired by classic comic strips like Calvin and Hobbes, reads adventure series such as the Magic Tree House books, admires the animation style of
    Studio Ghibli’s Totoro, and channels this creative energy into crafting storyboards for their Scratch games.
  travel: Jenny Hunter loves spontaneous day trips to the state park’s waterfall trail, collects pinecones and rocks as souvenirs, dreams of camping in Yellowstone National Park, and prefers low‑cost, family‑guided
    excursions over elaborate travel plans, often mapping routes with colorful crayons.
  culinary: Jenny Hunter enjoys baking chocolate chip cookies and sugar‑dusted snickerdoodles with a measuring cup that’s slightly off, proudly claims a perfect “no‑burn” record for grilled cheese, and
    delights in experimenting with ingredients like rolled oats and raisins in a simple granola bar recipe.
  core: Jenny Hunter is a curious, organized ten‑year‑old who mixes a love for coding, soccer, and cookie baking with a dash of occasional forgetfulness and a habit of collecting forest treasures.
background:
  cultural: Jenny grew up in Hoagland, a small town in Allen County, Indiana, where Midwestern values of community, modesty, and self‑reliance are prominent. Her family traditions include attending local
    county fairs, church gatherings, and volunteering for neighborhood clean‑up events. While her immediate environment is largely homogenous, she is exposed to broader American pop culture through school,
    internet, and media, shaping a blend of local small‑town sensibility with curiosity about the wider world.
