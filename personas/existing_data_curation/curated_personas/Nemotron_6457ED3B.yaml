  career_goals: Winfield dreams of becoming a wildlife biologist or environmental scientist, a path that lets him satisfy his curiosity about how ecosystems function while applying practical solutions to
    protect Indiana’s natural spaces. He envisions studying biology in high school and college, conducting field research, and later leading community education programs that teach younger students about
    conservation. His caring nature also fuels a secondary ambition to work as a science teacher or youth camp mentor, where he can combine his cooperation skills with his desire to help others succeed.
