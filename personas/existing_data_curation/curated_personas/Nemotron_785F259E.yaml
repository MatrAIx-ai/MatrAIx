  career_goals: Hector aims to become a store manager within the next two years, then progress to a district manager role and eventually a regional operations director or corporate retail strategist. He
    plans to pursue part‑time coursework toward an MBA to broaden his strategic and financial expertise, and he is also interested in launching his own technology‑enhanced e‑commerce venture that leverages
    data analytics to improve customer experience.
