persona_description: A history enthusiast who is interested in the exploration and mapping of the Australian coastline, particularly the work of the Baudin expedition. They are particularly interested in
  the detailed maps produced by the expedition's geographers and the Atlas of the official account of the voyage, published in 1811. They are also interested in the coastal profiles and the modifications
  made to them during the voyage. They appreciate the efforts of Louis Freycinet and François Péron in correcting and updating the names of topographical features and are curious about the digitalization
  project of the Museum of Natural History in Le Havre.
