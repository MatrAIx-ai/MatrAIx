personas:
  professional: Kimberly Clark, a 15‑year‑old varsity cheerleader and improv enthusiast, channels their practical mindset and calm resilience into orchestrating high‑energy school spirit events while they
    juggle TikTok content creation and community‑center volunteer coordination.
  sports: Kimberly Clark, a spirited member of the varsity cheer squad who also helps run youth soccer tournaments at the community center, they cheerfully root for the Detroit Red Wings in hockey, the
    Michigan Wolverines football team in the fall, and train with the local hiking club for weekend lake‑trail adventures.
  arts: Kimberly Clark fuels their creative spark by performing improv sketches with the drama club, producing quick‑cut TikTok videos inspired by Charli D'Amelio’s dance trends, and baking cupcakes that
    double as edible art, they also admire the musical storytelling of Lin‑Manuel Miranda and the pop hits of Ariana Grande.
  travel: Kimberly Clark prefers spontaneous weekend getaways, often packing a backpack for a sunrise hike along the Lake Huron shoreline, while dreaming of future trips to the vibrant streets of Montreal
    and the misty cliffs of Acadia National Park, they balance a low‑budget plan with a wish for adventure.
  culinary: Kimberly Clark enjoys experimenting with frosting flavors, from salted caramel buttercream on vanilla cupcakes to matcha‑green tea swirls, while also perfecting classic pepperoni pizza and hearty
    fish tacos, boasting a confident yet occasionally impulsive kitchen style that mixes precise measuring with last‑minute ingredient swaps, and they love sharing their creations on social media.
  core: Kimberly Clark is a calm, organized‑yet‑flexible teen who blends high‑energy cheer leadership with spontaneous TikTok creativity, a love for lakeside hikes, and a sweet tooth that keeps friends
    smiling, and they never miss a chance to spread good vibes.
background:
  cultural: 'Kimberly grew up in Port Huron, Michigan, a Midwestern city on the U.S.-Canada border known for its close‑knit community and Great Lakes heritage. Her family reflects typical Midwestern values:
    a strong work ethic, emphasis on community involvement, and appreciation for outdoor recreation. Growing up in a predominantly white, small‑town environment, she was exposed to local traditions such
    as neighborhood block parties, high school sports culture, and seasonal lake activities. Her upbringing also includes participation in a local church youth group, which reinforced a sense of collective
    responsibility and resilience common in the region.'
