  hobbies: '["Cheerleading", "Improv drama", "Community center volunteering", "Youth sports coordination", "TikTok video creation", "Baking", "Lake Huron hiking", "Listening to pop music", "Playing video
    games with friends"]'
  career_goals: Kimberly aims to finish her high school diploma and then pursue a degree in nursing or social work, fields that combine her desire for a structured career path with her passion for helping
    others. She envisions becoming a registered nurse who serves the Port Huron community, particularly in school health settings. Simultaneously, she plans to maintain a small side channel on social media
    where she shares practical health tips, study strategies, and community event highlights for teens, leveraging her digital expertise and outgoing personality.
