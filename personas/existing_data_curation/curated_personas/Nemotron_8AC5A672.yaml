  hobbies: '["Street photography", "Landscape photography", "Acoustic guitar playing", "Open‑mic jam sessions", "Salsa dancing", "Recreational soccer", "Cooking Salvadoran cuisine (pupusas, tamales)", "Mentoring
    at community robotics clubs", "Hiking in the Santa Cruz Mountains", "Visiting art galleries and museum exhibitions"]'
  career_goals: Rene aims to advance into a senior technologist or engineering manager role where he can lead multidisciplinary teams to develop innovative, sustainable hardware solutions. He aspires to
    champion design‑thinking practices that fuse engineering rigor with artistic aesthetics, driving product development that balances functionality with user experience. Over the next five years, he plans
    to spearhead Green‑Tech initiatives, mentor underrepresented youth in STEM, and eventually establish a consult‑engineering boutique that offers custom solutions for small manufacturers seeking to adopt
    lean and environmentally conscious processes.
