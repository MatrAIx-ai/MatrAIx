personas:
  professional: Janet Campo, a 29‑year‑old human resources assistant, blends their empathetic listening and artistic flair to design employee‑wellness events and engaging internal communications, while
    calmly navigating a loosely organized desk and flexible schedule as they pursue SHRM‑CP certification and a future HR generalist role.
  sports: Janet Campo stays active by attending weekly yoga sessions, joining the Lafayette Wetlands Walking Club for solitary wetland hikes, cheering on the New Orleans Saints during football season, and
    occasionally playing in a casual co‑ed basketball league affiliated with the New Orleans Pelicans community program.
  arts: Janet Campo, a watercolor hobbyist, draws inspiration from contemporary artist Julie Mehretu’s bold compositions, frequently visits the Acadiana Center for the Arts to view exhibitions by regional
    painters, and unwinds listening to Leon Bridges’s soulful blues while quoting lines from poet Ocean Vuong during book‑club discussions.
  travel: Janet Campo prefers low‑key, solo‑friendly trips, having already explored the historic streets of Savannah, Georgia, and the mountain art scene of Asheville, North Carolina, while dreaming of
    a meditative retreat in Sedona, Arizona, and they typically use flexible Airbnb stays over rigid itineraries.
  culinary: Janet Campo enjoys cooking Cajun‑style gumbo with andouille sausage, shrimp, and a pinch of filé powder, experimenting with jambalaya variations seasoned with fresh thyme and bell peppers, and
    they consider their kitchen skill level intermediate, often sharing dishes with close friends over cozy dinner parties.
  core: Janet Campo is a calm, art‑loving HR professional whose habit of drifting between to‑do lists fuels spontaneous creativity, even as they occasionally forget to file expense reports on time.
background:
  cultural: Janet is a white American raised in Lafayette, Louisiana, a city known for its blend of Cajun, Creole, and French heritage. Her family has deep roots in the region, and she grew up attending
    local festivals such as the Festival International and enjoying Zydeco music, gumbo, and jambalaya. While her ethnic background is primarily Northern European, the Southern Louisiana environment exposed
    her to a multicultural tapestry that includes French language phrases, Catholic celebrations, and a strong sense of community hospitality. These cultural influences have shaped her appreciation for
    diverse artistic expression, her collaborative spirit, and her laid‑back, resilient outlook on life.
