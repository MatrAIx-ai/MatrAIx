  career_goals: Janet aims to transition from an HR assistant to an HR generalist within the next two years and eventually become an HR manager. She plans to earn a SHRM‑CP certification and complete an
    associate’s degree in business administration to deepen her strategic HR knowledge. Her long‑term ambition is to shape a workplace culture that values employee well‑being, resilience, and creativity,
    perhaps by integrating local art initiatives and mindfulness programs into the company’s employee experience. She also hopes to mentor new hires and develop a structured mentorship program for the organization.
