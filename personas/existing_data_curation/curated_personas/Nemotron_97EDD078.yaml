  career_goals: As a four‑year‑old, Melanie imagines future careers that let her interact with many people and share ideas. She often says she wants to become a teacher, a storyteller, or a community leader
    who can organize fun events for friends. Her goals reflect her love of attention, her desire to help others, and her curiosity about how things work.
