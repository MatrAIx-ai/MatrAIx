persona_description: A scientist or researcher interested in the study of genetic organisms and their potential use in genetic dissection of vertebrate genomes. They are familiar with techniques such as
  microinjection and are interested in using medaka fish as a model organism for genetic research. They are likely to be interested in the comparative genetics of related genes between medaka and zebrafish,
  which allows for the identification of novel phenotypes that are unidentifiable in a single species. They are also interested in the use of medaka fish for genetic dissection of vertebrate genomes and
  the potential of medaka as a model organism for genetic research.
