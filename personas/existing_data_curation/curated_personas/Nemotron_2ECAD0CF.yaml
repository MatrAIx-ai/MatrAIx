  career_goals: Although retired from the formal workforce, Terry is driven to stay engaged and make a lasting impact in his community. He aims to mentor younger volunteers at the senior center, lead a
    yearly local history exhibition, and establish a small scholarship for high-school students pursuing vocational trades. He also plans to complete a memoir documenting his experiences on the Nebraska
    plains. His competitive streak motivates him to win the senior bowling league and the bridge tournament at the community center. Maintaining his health and independence remains a personal ambition.
