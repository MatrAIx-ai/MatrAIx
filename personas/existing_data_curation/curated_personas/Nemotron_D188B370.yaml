personas:
  professional: Maria Kim, a retired boutique owner turned community business mentor, channels their methodical planning, calm composure, and curious mindset into guiding emerging entrepreneurs from culturally
    rich backgrounds, designing outreach events, and steering fundraising campaigns for the local cultural arts center.
  sports: Maria Kim, a devoted fan of the Chicago Cubs and active member of the community senior walking club, integrates gentle morning walks and weekly low-impact yoga into their routine, favoring consistent,
    low-stress exercise over competitive sports while enjoying televised baseball games with a modest bowl of popcorn.
  arts: Maria Kim, an avid watercolorist who reinterprets the vibrant motifs of Frida Kahlo and the delicate patterns of contemporary artist Yayoi Kusama, spends weekends at the museum admiring Monet and
    attending live performances by Mariachi Los Camperos, weaving artistic inspiration into both their own paintings and community cultural festivals.
  travel: Maria Kim, who prefers carefully planned group tours over spontaneous trips, has explored the historic streets of Oaxaca and the bustling markets of Jaipur, revisits the tranquil gardens of Kyoto
    for quiet reflection, and now dreams of a leisurely pilgrimage to Machu Picchu and a cultural immersion in Granada, balancing a love of heritage with a modest travel budget and an affinity for comfortable
    accommodations.
  culinary: Maria Kim, a proficient home chef, lovingly prepares mole with dried chilies, epazote, and chocolate, as well as fragrant vegetable biryani spiced with cumin and cardamom, often seasoning these
    dishes with garden-grown cilantro and oregano, and while their meticulous plating reflects an organized nature, they sometimes forget to set a timer, resulting in a charred bottom on the tamales they
    cherish.
  core: Maria Kim, a calm and methodical cultural guardian, blends business savvy with artistic curiosity, mentors young entrepreneurs, curates heritage festivals, and delights in watercolors - yet habitually
    double-checks every grocery list twice, even when the pantry is already full.
background:
  cultural: Maria is a second‑generation Latino‑American of indigenous Mixtec descent whose family migrated from the Oaxaca region of Mexico to the United States in the 1960s. Raised in a bilingual household,
    she speaks fluent Spanish and maintains knowledge of Mixtec language phrases and customs. Her upbringing blended Catholic traditions with indigenous celebrations such as Día de los Muertos, and she
    actively participates in the local Mexican‑Indigenous cultural association in Norman. She incorporates these cultural roots into her cooking, storytelling, and community involvement, preserving and
    sharing her heritage with younger generations.
