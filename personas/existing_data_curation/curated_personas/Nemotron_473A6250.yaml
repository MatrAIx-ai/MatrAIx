personas:
  professional: Jimmy Pointdujour, a retired craftsman turned community storyteller, leverages their woodworking, furniture restoration, candid portrait photography, and digital archiving talents to coordinate
    monthly pop‑up art workshops for seniors and youth, channeling their curious nature and competitive streak while embracing a relaxed, often disorganized, planning style that they navigate with easygoing
    charm.
  sports: Jimmy Pointdujour enjoys birdwatching along the Wabash River floodplain, follows the Indianapolis Colts and Indiana Pacers avidly, participates in the Riverwalk Seniors Club’s weekly morning walks,
    and treats light gardening as their primary low‑impact fitness routine, which they cherish as a calm way to stay active.
  arts: Jimmy Pointdujour spends weekends painting watercolors of the Indiana prairie inspired by Thomas Hart Benton and Charles Burchfield, captures candid portraits on a vintage 35 mm camera, immerses
    themselves in Miles Davis’s "Kind of Blue" on a lovingly restored record player, and they frequent the Evansville Museum of Arts, History & Science to study works ranging from Jacob Lawrence to contemporary
    regional painters.
  travel: Jimmy Pointdujour favors spontaneous, low‑budget road trips that combine art and history, having driven to Chicago’s Art Institute for modernist tours, explored New Orleans’s jazz districts, and
    trekked the historic streets of Savannah, while dreaming of a leisurely week‑long sail along the Maine coastline to capture sunrise seascapes, which they hope to document in future watercolors.
  culinary: Jimmy Pointdujour enjoys modest cooking, regularly preparing hearty vegetable stew with heirloom tomatoes, sweet corn, and basil from their garden, while indulging in rustic Midwest favorites
    such as fried catfish, buttery cornbread, and a crisp apple crumble topped with cinnamon‑spiced walnuts, and they often pair the dishes with a glass of locally brewed amber ale.
  core: Jimmy Pointdujour, a curious yet laid‑back senior, blends a competitive woodworking streak with a love for quiet garden retreats, often misplacing tools amid spontaneous art sessions, which they
    attribute to their love of the process over the product.
background:
  cultural: Jimmy was born in 1960 in Terre Haute to a second‑generation African‑American family that valued self‑reliance, church, and storytelling. Growing up during the civil‑rights era, he experienced
    both the challenges of segregation and the solidarity of a close‑knit Black community. His grandparents migrated from the South during the Great Migration, bringing traditions of gospel music, oral
    histories, and Southern cuisine, which blended with Midwestern values of modesty and practicality. Throughout his life, Jimmy has remained connected to local Black churches, the annual Terre Haute Black
    History Festival, and community mentorship programs, shaping his perspective on art, resilience, and cultural heritage.
attributes:
  skills: '["Woodworking and furniture restoration", "Photography", "Basic computer literacy", "DIY electronics troubleshooting", "Oral storytelling", "Community volunteer coordination"]'
  hobbies: '["Watercolor painting", "Jazz record collecting", "Vegetable gardening", "Birdwatching", "Chess puzzles", "Reading biographies", "Attending local art galleries", "Volunteering at the community
    center"]'
  career_goals: Although retired from formal employment, Jimmy aims to channel his curiosity and competitive drive into community‑oriented projects. He plans to launch a monthly pop‑up art workshop for
    local seniors and youth, write a memoir highlighting African‑American experiences in the Midwest, win the Indiana State Amateur Woodworking Competition, mentor a small group of aspiring artists at the
    community center, and serve as a docent at the Vigo County Historical Museum.
