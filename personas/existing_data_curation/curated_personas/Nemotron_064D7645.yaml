personas:
  professional: Yenny Velazquez, a budding robotics developer at her high school, blends scientific curiosity with disciplined project management as she leads the robotics club in designing competition-ready
    bots while balancing solo Arduino experiments and collaborative coding sessions.
  sports: Yenny Velazquez dominates the Ipswich Youth Soccer Club as a forward on Saturdays, dances salsa with family during gatherings, and roots for the New England Revolution, often quoting the team's
    midfield tactics while practicing drills after school.
  arts: Yenny Velazquez devours science‑fiction novels like Becky Chambers’ *The Long Way to a Small, Angry Planet*, grooves to bomba rhythms from Grupo Altura, and draws inspiration from street artist
    Shepard Fairey’s bold murals, merging futuristic imagination with vibrant cultural beats.
  travel: Yenny Velazquez, a meticulous planner, has charted weekend trips to Boston’s Freedom Trail and a family vacation to Old San Juan, and dreams of attending the International Robot Exhibition in
    Tokyo, balancing cultural immersion with budget‑friendly itineraries.
  culinary: Yenny Velazquez perfects pasteles with seasoned pork, sofrito, and ripe plantains, regularly prepares arroz con gandules for family dinners, and experiments with a homemade guava glaze on cupcakes,
    showcasing a cooking skill set that ranges from festive traditional dishes to inventive dessert twists.
  core: Yenny Velazquez, a disciplined teen who fuses scientific curiosity with heartfelt community ties, codes robots by day, seasons pasteles by night, and never skips a soccer practice, all while meticulously
    budgeting each dollar.
background:
  cultural: Yenny was born to Puerto Rican parents who moved to the United States before she was born. Growing up in Ipswich, Massachusetts, she was immersed in a bilingual household where Spanish was spoken
    at home and English at school. Family traditions such as celebrating Nochebuena, preparing arroz con gandules, and listening to bomba and plena music are central to her identity. She participates in
    local cultural events organized by the Boston Puerto Rican community, and she volunteers with organizations that support Latino youth. Her cultural background instills in her values of respeto, familia,
    and comunidad, which shape her cooperative and caring nature.
