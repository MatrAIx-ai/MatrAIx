  hobbies: '[''Reading science‑fiction and popular science'', ''Coding small games and Arduino projects'', ''Robotics club participation'', ''Playing soccer'', ''Salsa dancing'', ''Cooking Puerto Rican
    recipes'', ''Volunteering as a tutor at the youth center'', ''Journaling'']'
  career_goals: Yenny aspires to attend a top‑ranked university where she can study biomedical engineering, a field that melds her curiosity about science with her practical desire to improve health outcomes.
    She dreams of creating affordable medical devices that serve underserved populations, including the Puerto Rican diaspora in New England. In the short term, she plans to earn scholarships by maintaining
    high grades, expand her coding portfolio, and take leadership roles in STEM clubs. Long‑term, she envisions working in research labs or launching a social‑impact startup, while remaining connected to
    her community through mentorship programs for younger students.
