  career_goals: Shalini aims to advance to a senior director role within the next five years, leading large‑scale organizational transformation for a nonprofit or socially focused enterprise. She is driven
    to champion comprehensive diversity, equity, and inclusion programs that reflect her own South Asian heritage, and to build a mentorship pipeline for emerging women leaders from immigrant backgrounds.
    In the longer term, she envisions establishing a boutique consultancy that helps organizations implement structured, data‑driven operational frameworks while maintaining cultural sensitivity.
