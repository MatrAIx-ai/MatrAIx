  career_goals: At this stage of life, Alex aims to leave a lasting legacy by mentoring local youth who show interest in science and engineering, and by helping to develop a community exhibition that fuses
    Appalachian folk art with scientific themes. He is working on a memoir that weaves his personal history with reflections on scientific discovery, and he hopes to contribute oral histories of his region
    to the Pike County Historical Society. Continuing to learn about new artistic mediums, especially digital art, remains a personal ambition. His goals balance personal enrichment with community contribution,
    reflecting his cooperative nature and occasional assertiveness to see projects through.
