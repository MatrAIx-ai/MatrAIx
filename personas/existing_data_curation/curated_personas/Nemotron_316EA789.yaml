personas:
  professional: An organized high‑school senior, Nancy Miller balances schoolwork with volunteer work at the town library while eyeing a certified nursing assistant certificate, leveraging their knack for
    routine‑based tasks, precise budgeting, and dependable scheduling to excel in group projects and future medical office roles.
  sports: A devoted fan of Alabama Crimson Tide football, Nancy Miller also participates in the church’s softball league during spring and jogs the local park’s trail every Saturday, balancing passive spectating
    of college games with light, routine‑based exercise to stay fit and honoring their community’s love of sport.
  arts: An avid reader of classic Southern literature, Nancy Miller regularly re‑reads 'To Kill a Mockingbird' and enjoys listening to Dolly Parton and Luke Bryan while knitting scarves, occasionally attending
    community theatre productions of 'Our Town' that reinforce their appreciation for storytelling and simple, heartfelt performances.
  travel: Nancy Miller prefers short, well‑planned road trips to nearby historic towns such as Charleston, South Carolina and Savannah, Georgia, where they can explore antebellum architecture and local
    food festivals, while dreaming of a future pilgrimage to the historic civil‑rights sites of Montgomery, Alabama, once they save enough from their part‑time job.
  culinary: With a modest skill set in the kitchen, Nancy Miller bakes buttery buttermilk biscuits and pecan pie using fresh cornmeal and locally sourced pecans, delights in preparing simple vegetable garden
    salads, and enjoys occasional family gatherings where they serve classic comfort foods like fried chicken and collard greens.
  core: Nancy Miller is a routine‑loving teen who knits, bakes, and plans their future as a CNA, often juggling an over‑full schedule with a habit of forgetting to set their phone alarm and a tendency to
    over‑bake cookies until they’re slightly burnt.
background:
  cultural: Nancy comes from a white, Southern‑American family with deep roots in Sylacauga, Alabama. Her upbringing reflects traditional Southern values such as community involvement, church attendance,
    and a strong sense of hospitality. Family gatherings often revolve around shared meals, music, and high‑school football celebrations. The local culture emphasizes modesty, self‑reliance, and respect
    for longstanding customs, all of which shape Nancy’s worldview and daily habits.
