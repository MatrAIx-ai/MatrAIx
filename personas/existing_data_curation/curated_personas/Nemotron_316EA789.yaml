    the local library'']'
  career_goals: Nancy aims to finish her high school diploma and then pursue a vocational certificate in medical assisting or office administration. She values a career that offers clear routines, dependable
    hours, and the chance to help others, so she is interested in becoming a Certified Nursing Assistant or a medical office receptionist in a local clinic. In the long term, she hopes to secure a stable,
    full‑time position that allows her to support her family and stay rooted in her community.
