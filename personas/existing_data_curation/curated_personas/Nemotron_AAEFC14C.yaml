  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Book club (art & literature)'', ''Gardening'', ''Photography'', ''Pottery'', ''Quilting'', ''Knitting'', ''Listening to jazz &
    folk music'', ''Short road trips exploring new towns'']'
  career_goals: Janet aims to transition into a trainer and mentor role within her company, obtaining a Certified Driver Trainer endorsement and sharing her decades of experience with younger drivers. She
    intends to achieve a perfect safety record over the next two years and earn a company excellence award. As she approaches retirement, she plans to reduce her driving hours to part‑time and focus on
    a small side business creating handcrafted quilts inspired by local art. Additionally, she hopes to enroll in adult education courses in logistics and volunteer as a driver for seniors in her community,
    combining her professional expertise with a desire to give back.
