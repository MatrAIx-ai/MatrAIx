  career_goals: Although approaching retirement age, Hong Chan Ma aims to cement his reputation as the go‑to technical adviser in his dealership. He plans to mentor younger sales staff, develop a streamlined
    inventory‑management protocol that can be adopted company‑wide, and eventually transition to a consulting role where he can advise multiple distributors on parts strategy. He also hopes to launch a
    modest side venture refurbishing vintage agricultural parts, leveraging his hands‑on expertise.
