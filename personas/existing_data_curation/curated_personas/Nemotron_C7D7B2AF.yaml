  career_goals: Caitlin aims to progress to a district manager role within the next five years, overseeing multiple store locations and shaping regional sales strategy. She plans to develop a comprehensive
    training curriculum that emphasizes sustainable retail practices and inclusive customer experiences. Ultimately, she envisions launching her own boutique consulting firm to help independent retailers
    integrate community‑focused, environmentally responsible strategies, possibly complemented by earning an MBA focused on sustainable business.
