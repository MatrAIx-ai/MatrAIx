personas:
  professional: Caitlin Martin, a 36‑year‑old retail operations manager in Portland, combines strong people‑management, analytical acumen, and a community‑first mindset to drive high‑service standards,
    optimize inventory, and champion sustainable retail practices, while they lead their team with a blend of curiosity, practicality, and assertive compassion.
  sports: Caitlin Martin is an avid cyclist and trail‑hiker who cheers for the Portland Thorns, follows Oregon Ducks basketball, and rides regularly with the Portland Cycling Club, balancing cardio with
    restorative yoga sessions to stay fit and flexible.
  arts: Caitlin Martin immerses themselves in Portland’s indie music and art scene, attending live shows by The Helio Sequence, Kate Tempest, and local experimental bands, exploring galleries showcasing
    emerging Pacific Northwest painters like Jen Groff, and volunteering at community art center open‑mic nights.
  travel: Caitlin Martin favors weekend getaways to the San Juan Islands, a yearly trek through the Canadian Rockies, and dreams of strolling Kyoto’s autumn foliage, planning trips with a mix of spontaneous
    hikes and detailed itineraries that dovetail with their love for sustainable travel and community engagement.
  culinary: Caitlin Martin loves cooking seasonal farm‑to‑table meals such as cedar‑plank salmon with foraged ramps, heirloom tomato gazpacho, and wild mushroom risotto, and they improvise confidently in
    the kitchen while occasionally over‑seasoning in an enthusiastic quest for flavor.
  core: Caitlin Martin is a community‑driven retail leader who balances analytical rigor with adventurous curiosity, often juggling yoga poses, bike rides, and spontaneous craft fairs while occasionally
    forgetting to water their indoor succulent collection.
background:
  cultural: Caitlin is a second‑generation white American raised in suburban Clackamas County, Oregon. Her upbringing blended a classic Pacific Northwest appreciation for nature and outdoor recreation with
    the progressive, environmentally conscious culture of Portland. Her humanities education fostered a love for literature, history, and the arts, shaping a worldview that values community engagement,
    social equity, and sustainable living. While identifying with mainstream American cultural norms, she embraces the region’s emphasis on localism, DIY creativity, and inclusive community participation.
