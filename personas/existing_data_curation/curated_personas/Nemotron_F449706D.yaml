  career_goals: Angela aspires to transition into an office manager or executive assistant role that leverages her bilingual abilities and leadership potential. Over the next three to five years, she plans
    to earn a Certified Administrative Professional (CAP) credential and complete community college courses in business administration. She hopes to mentor junior staff, implement process improvements that
    increase office efficiency, and eventually serve as a bilingual liaison bridging communication between corporate leadership and the growing Hispanic community in her organization.
