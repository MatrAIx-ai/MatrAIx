personas:
  professional: An organized budding engineer-in-training, Marilou Truong channels their methodical nature into designing intricate LEGO constructions, solving puzzles in adventure series books, and leading
    the school's peer-buddy program with reliable, step-by-step guidance.
  sports: An active participant in the Evergreen Tigers Youth Soccer Club, Marilou Truong embraces the structured drills of fall soccer, enjoys swimming laps at the community pool in summer, follows the
    Seattle Sounders FC for inspiration, and dedicates weekend nature walks to observing local wildlife, balancing competitive play with gentle outdoor exercise.
  arts: A thoughtful young artist, Marilou Truong practices piano pieces by Yiruma and Ludovico Einaudi with disciplined daily sessions, devours the adventure-mystery "The Magic Tree House" series, joins
    the school choir, and finds inspiration in Studio Ghibli's animated films such as "Spirited Away".
  travel: A meticulous young explorer, Marilou Truong plans family outings with detailed checklists, cherishes past trips to Yosemite National Park and the Grand Canyon, dreams of sailing to the Great Barrier
    Reef, and always packs a small field notebook to record wildlife sightings.
  culinary: A budding home chef, Marilou Truong enjoys preparing simple Vietnamese spring rolls and pho broth with fresh basil and coriander from their garden, masters the art of perfectly simmered rice,
    occasionally overcooks scrambled eggs, and delights in sharing their culinary creations with peers during the peer-buddy program.
  core: Marilou Truong blends quiet determination with compassionate curiosity, structuring every adventure—whether building LEGO castles, tending a veggie patch, or guiding new classmates—while secretly
    hoarding chocolate under their pillow.
background:
  cultural: Marilou is a second‑generation Vietnamese‑American. Her family preserves cultural traditions such as celebrating Tet (Lunar New Year), preparing pho, bánh mì, and spring rolls together, and
    speaking Vietnamese at home. Values of respect for elders, community harmony, and modesty are emphasized. Living in Howell, Michigan, she blends these Southeast Asian roots with Midwestern American
    life, attending the local public elementary school, participating in neighborhood events, and sharing her heritage through school cultural presentations.
