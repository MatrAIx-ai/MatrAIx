  career_goals: Marilou dreams of a future where she can help others every day. She aspires to become a pediatric nurse or a teacher because both roles let her support children’s health and learning in
    a structured, compassionate way. She plans to focus on science and education in middle school, aiming to volunteer in school health programs and community outreach, always seeking roles that promote
    harmony and practical assistance.
