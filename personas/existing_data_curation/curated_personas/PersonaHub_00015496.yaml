persona_description: A web 2.0 enthusiast who is interested in collaborative and interactive online platforms. They are drawn to the features of web 2.0 websites such as social networking, tagging, tagging,
  and bookmarking. They are likely to be familiar with the terms "network as platform," "architecture of participation," "social network features," "user ownership of information," and "rich, interactive,
  user-friendly interface." They are also likely to be interested in the concept of folksonomy, which is a way of using open-ended labels to categorize information. They may have used or interacted with
  web 2.0 websites such as Google Docs and Spreadsheets, del.icio.us, Flickr, and Google Maps. They may also be interested in the concept of group theory, particularly the concepts and theorems related
  to subgroups and isomorphisms.
