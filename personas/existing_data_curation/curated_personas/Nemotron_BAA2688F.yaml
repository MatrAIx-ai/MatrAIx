  career_goals: Leonard dreams of becoming a veterinarian because he loves animals and wants to help them stay healthy, a goal that blends his curiosity about the natural world with a practical desire to
    provide reliable care. He also imagines a future as an astronaut, fascinated by space exploration and the disciplined training it requires. Both aspirations reflect his balanced approach of valuing
    new ideas while staying grounded in realistic, service‑oriented professions.
