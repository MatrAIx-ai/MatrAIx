persona_description: A historian who specializes in the study of art and cultural heritage, with a particular focus on the history of art theft and its impact on the collecting history of stolen art. Their
  expertise in the restoration and analysis of bronze statues and their historical context, as well as their ability to differentiate between objects based on their provenance and provenance of the objects,
  makes them a valuable source for understanding the history behind the objects stolen and their relevancy to the past. Their research interests include the history of art theft, the collecting history
  of art, and the impact of art theft on the art world.
