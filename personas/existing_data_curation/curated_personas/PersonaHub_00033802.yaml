persona_description: A researcher and inventor who specializes in the development of novel technologies, particularly in the field of integrated circuits and 2D materials. He is interested in the application
  of origami principles to create large-scale integrated circuits that can integrate different thermal and electric properties in the same circuit. His research has led to improvements in 2D models and
  the introduction of a 3D vertically integrated device. He is also interested in the potential of using these technologies to develop new devices and applications.
