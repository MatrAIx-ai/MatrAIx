persona_description: A quality assurance engineer who specializes in testing and measuring the photometric, color, and electrical characteristics of SSL products, including LED packages, arrays, and modules.
  They are skilled in conducting reproducible measurements of LED light engines and integrated LED lamps, and are capable of interpreting the collected data to provide users with lumen maintenance life
  projections and estimated lumen output values. They are also familiar with safety requirements for LED equipment that operates in the visible light spectrum between 400-700 nm.
