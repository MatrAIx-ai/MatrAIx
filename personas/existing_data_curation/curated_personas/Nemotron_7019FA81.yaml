personas:
  professional: An accomplished medical scientist, Michelle Acayan combines deep expertise in molecular biology, CRISPR gene editing, flow cytometry, and bioinformatics with an imaginative mindset, and
    they meticulously lead a translational immunotherapy program while fostering a compassionate, collaborative lab culture.
  sports: An avid hiker and yoga practitioner, Michelle Acayan explores the St. Croix River trail, participates in a local cross‑country ski club each winter, and they cheer for the Minnesota Twins, Vikings,
    and Wild while maintaining a balanced fitness routine.
  arts: A watercolor aficionado, Michelle Acayan paints serene Minnesota lake vistas inspired by John Singer Sargent and Claude Monet, plays Debussy piano preludes for creative flow, and they regularly
    attend gallery openings featuring contemporary artists such as Kehinde Wiley.
  travel: A meticulous travel planner, Michelle Acayan enjoys weekend retreats to the Boundary Waters, annual explorations of Iceland’s geothermal landscapes, and they have a long‑standing desire to experience
    Kyoto’s Zen gardens and tea ceremonies.
  culinary: A garden‑to‑table enthusiast, Michelle Acayan cultivates basil, rosemary, and lemon balm in their backyard and they incorporate these herbs into dishes like herb‑infused grilled salmon with
    wild rice and a refreshing cucumber‑mint gazpacho.
  core: Michelle Acayan fuses scientific rigor with artistic imagination, channeling stress‑induced anxiety into watercolor painting, yoga, and a relentless drive to pioneer immunotherapy solutions.
background:
  cultural: Michelle grew up in a middle‑class white family in the Upper Midwest, with German‑Scandinavian ancestry that emphasized community, modesty, and a love for nature. The values of self‑reliance,
    cooperation, and public service ingrained in her upbringing are reflected in her compassionate approach to science and community involvement. Living in Stillwater, she embraces the region’s strong support
    for education, outdoor recreation, and the arts, integrating these cultural threads into both her professional and personal life.
attributes:
  skills: '[''Molecular Biology'', ''Immunology'', ''CRISPR Gene Editing'', ''Flow Cytometry'', ''High-Throughput Screening'', ''Bioinformatics (Python, R)'', ''Data Analysis'', ''Grant Writing'', ''Regulatory
    Compliance (FDA)'', ''Project Management'', ''Scientific Communication'', ''Mentorship and Team Leadership'']'
  hobbies: '[''Watercolor Painting'', ''Piano Playing'', ''Literary Fiction Reading'', ''Poetry Writing'', ''Yoga and Mindfulness'', ''Hiking and Birdwatching'', ''Herb Gardening'', ''Science Outreach Volunteering'',
    ''Attending Art Exhibitions'', ''Cooking with Herbal Ingredients'']'
  career_goals: Michelle aims to become a senior principal investigator leading a translational research program focused on immunotherapies for autoimmune diseases. She seeks to secure large multi‑institutional
    grants, build a collaborative lab that bridges basic science and clinical practice, and mentor diverse early‑career scientists. She also aspires to influence health policy through evidence‑based advocacy
    and expand community health education programs in Stillwater. Long‑term, she envisions establishing a nonprofit that funds innovative medical research and provides scholarships for underrepresented
    students.
