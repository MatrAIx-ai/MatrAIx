personas:
  professional: Tara Madigan, a 54‑year‑old community‑focused craft entrepreneur, blends her budgeting expertise, keen organizational skills, and empathetic mediation style to run a modest home studio selling
    quilts and watercolor prints while coordinating intergenerational art‑therapy workshops at the Bellevue senior center.
  sports: Tara Madigan follows the Nebraska Cornhuskers football, roots for the Omaha Storm Chasers minor‑league baseball team, and participates in the Bellevue Parks Senior Walking Club where she combines
    gentle morning walks with bird‑watching that feels like a low‑key sport.
  arts: Tara Madigan draws creative inspiration from Claude Monet’s watercolors, Georgia O’Keeffe’s prairie flowers, and John James Audubon’s bird illustrations, regularly attends productions at the Omaha
    Community Theater, and quotes Maya Angelou’s poetry while stitching her quilts.
  travel: Tara Madigan’s travel style mixes careful road‑trip planning—having driven scenic routes through Yellowstone and Badlands National Parks and visited Chicago’s Art Institute—with occasional overseas
    dreams of a summer in Provence’s lavender fields, all while budgeting trips to suit her modest studio income.
  culinary: Tara Madigan enjoys cooking hearty Midwestern fare like corn succotash, herb‑infused roasted beets, and chicken pot pie, skillfully using fresh rosemary, thyme, and sage from her garden and
    occasionally experimenting with beet‑and‑goat‑cheese gnocchi.
  core: Tara Madigan, a 54‑year‑old quilting and watercolor enthusiast, balances meticulous budgeting with spontaneous art‑supply splurges, finds serenity in early‑morning bird‑watching, and sometimes loses
    track of time stitching, forgetting to eat lunch.
background:
  cultural: Tara grew up in a small Midwestern town in Nebraska, raised in a family with deep German‑Scandinavian roots that emphasized hard work, modesty, and community involvement. The values of self‑reliance,
    thrift, and neighborly support that are characteristic of the Nebraskan prairie have shaped her worldview. Her upbringing was marked by participation in church gatherings, county fairs, and school‑community
    events, fostering a strong sense of local identity and a love for regional traditions. Living in Bellevue, Sarpy County, she remains connected to these heritage customs while her curiosity has led her
    to embrace broader artistic influences, blending Midwestern practicality with a keen appreciation for diverse cultural expressions.
