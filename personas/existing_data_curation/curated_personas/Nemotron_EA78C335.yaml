  hobbies: '[''Watercolor painting'', ''Quilting and knitting'', ''Gardening (vegetables and herbs)'', ''Attending local art fairs and community theater'', ''Reading historical fiction and memoirs'', ''Participating
    in book clubs'', ''Volunteering at animal shelter'', ''Bird watching'', ''Dog walking'']'
  career_goals: Although she is not currently employed, Tara aspires to transform her passions into a modest, purpose‑driven role within her community. She hopes to launch a small home‑based studio where
    she can sell her hand‑crafted quilts and watercolor prints, leveraging online platforms such as Etsy. To support this, she plans to enroll in a community college digital‑marketing class to learn e‑commerce
    basics. Additionally, Tara wishes to serve as a volunteer coordinator for the Bellevue senior center, organizing art‑therapy sessions and intergenerational craft workshops. Her long‑term ambition is
    to become a recognized facilitator of community arts, helping neighbors of all ages discover creative outlets while fostering social cohesion.
