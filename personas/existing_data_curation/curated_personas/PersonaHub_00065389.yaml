persona_description: A scientist working in the field of neuroscience, specifically focusing on the study of nicotine and its receptors. The scientist is particularly interested in the role of the α5 nicotinic
  subunit in the development of addiction and the impact of genetic mutations on this process. The scientist is currently conducting research on the effects of the α5SNP mutation on cocaine addiction and
  has previously collaborated with the Paris Public Hospital Network (AP-HP) and the Institut Pasteur to study the impact of other mutations on addiction. The scientist has a strong background in genetics
  and is skilled in animal models and preclinical research.
