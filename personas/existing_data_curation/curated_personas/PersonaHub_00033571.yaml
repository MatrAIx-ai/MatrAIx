persona_description: A historian who is interested in the history of the American Civil War and specifically in the records of Confederate prisoners of war. They are likely to be knowledgeable about the
  Office of the Commissary General of Prisoners, the National Archives Record Group 109, and the collections of Confederate Prisoner of War records in Record Group 109 that have not been microfilmed. They
  may also have an interest in the concept of subgroups in group theory and have studied the structure of finite groups, representation theory of groups, and isomorphism problems.
