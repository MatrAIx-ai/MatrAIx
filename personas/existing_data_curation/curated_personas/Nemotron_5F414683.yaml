  career_goals: Juan aims to obtain his GED within the next year and pursue a vocational certification in automotive technology or small‑business management. He envisions launching a mobile car‑detailing
    and basic‑maintenance service that leverages his hands‑on skills and sociable personality, eventually expanding into a neighborhood handyman shop. In parallel, he hopes to take on a part‑time role in
    a local retail or hospitality setting to develop formal customer‑service experience and steady income. Over the next five years, Juan aspires to become a recognized community resource—running weekend
    workshops on DIY projects and coordinating local events—while building a sustainable, self‑run business that blends practical expertise with his love for connecting with people.
