personas:
  professional: Juan Sarnicki is a budding automotive service entrepreneur who blends hands‑on curiosity with practical organization, using their strong interpersonal skills to market a mobile car‑detailing
    and basic‑maintenance venture while studying for a GED and a vocational auto‑technology certificate.
  sports: Juan Sarnicki is a devoted fan of the San Antonio Spurs and the Houston Astros, spends Saturday evenings cheering at local high‑school football games, and volunteers as a youth soccer referee
    for the Floresville Minors club, balancing their love of watching sports with hands‑on involvement in community leagues.
  arts: Juan Sarnicki embraces a vibrant musical life, strumming acoustic guitar in a neighborhood jam group that covers Texas country icons like Willie Nelson and George Strait as well as Latin legends
    such as Selena and Carlos Vives, while also shining on karaoke nights with a repertoire that ranges from classic rock anthems to traditional polka tunes.
  travel: Juan Sarnicki prefers weekend road trips that mix adventure and nostalgia, often cruising to Austin’s live‑music scene, exploring the historic River Walk in San Antonio, and planning a future
    pilgrimage to a historic European city renowned for its pierogi festivals to explore personal roots.
  culinary: Juan Sarnicki delights in cooking Tex‑Mex comfort foods like chicken enchiladas with chipotle salsa and homemade carnitas, while also honoring family holiday traditions with pierogi stuffed
    with potato and cheese, showcasing a moderate cooking skill that blends smoky paprika, fresh cilantro, and occasional experiments with new kitchen gadgets.
  core: Juan Sarnicki is a sociable, talkative 26‑year‑old who balances curiosity‑driven tinkering with practical community service, charging into gatherings as the life of the party while methodically
    planning the next step toward their mobile‑detailing dream.
background:
  cultural: Juan is a white American of Polish descent, as indicated by his surname Sarnicki, raised in Floresville, Texas. His upbringing blends the traditions of his Polish heritage—celebrating holidays
    like Polish Christmas Eve with pierogi and family gatherings—with the vibrant Texan and Hispanic culture of the Hill Country. He grew up speaking English at home, picking up conversational Spanish from
    his neighbors and the local community, which has shaped a bicultural identity. The small‑town atmosphere fostered a strong sense of community, hospitality, and respect for local customs such as high
    school football Saturdays, county fairs, and neighborhood barbecues. Juan’s cultural mosaic informs his sociable nature, love of music, and appreciation for both established practices and new ideas.
