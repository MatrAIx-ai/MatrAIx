personas:
  professional: Shae Coley, a 15‑year‑old aspiring narrative designer, translates their love for mystery and science‑fiction novels into detailed story outlines for school and personal Minecraft role‑play
    scenarios, preferring a clear plot structure but allowing improvisation, and they balance practical, solo‑focused study habits with a relaxed, occasionally disorganized approach to deadlines.
  sports: Shae Coley, a casual teen athlete, enjoys daily dog‑walks, occasional pick‑up soccer games with friends, supports the local high school basketball team the Cedar Valley Hawks and follows the professional
    team the Seattle Sounders, yet they prefer spontaneous movement over a strict workout schedule, embodying their flexible yet structured mindset.
  arts: Shae Coley, who spends hours sketching characters and experimenting with digital illustration, draws inspiration from Hayao Miyazaki, Becky Cloonan, and indie folk musicians such as Sufjan Stevens
    and Lucy Dacus, channels mystery novel themes into their art, and they sometimes procrastinate finishing projects, leaving a trail of half‑completed drawings in their sketchbook.
  travel: Shae Coley, who delights in quiet, low‑budget getaways, has explored the nearby state park’s hiking trails and attended a weekend art retreat in Asheville, dreams of visiting the historic streets
    of Edinburgh, and they plan trips meticulously on paper while allowing room for spontaneous detours, reflecting their blend of structure and flexibility.
  culinary: Shae Coley, an enthusiastic amateur baker, frequently whips up cinnamon rolls, lemon‑herb chicken, and mint‑infused shortbread using herbs from their indoor garden, relies on simple recipes
    from online blogs, and they occasionally over‑bake cookies due to their relaxed approach to timing, resulting in a delicious—if slightly crisp—treat.
  core: Shae Coley, a quietly driven teen, merges structured storytelling with spontaneous creativity, habitually forgets to log snack expenses, and hoards extra Minecraft skins for future projects, all
    while they remain emotionally steady.
background:
  cultural: 'Shae comes from a White, middle‑class Midwestern family in Camby, Indiana. Her upbringing reflects the practical, community‑oriented values typical of the Hoosier region: an emphasis on hard
    work, modesty, and involvement in local activities. Family gatherings, seasonal holidays, and community events such as county fairs and library programs have shaped her sense of belonging. While her
    household includes some Protestant cultural traditions, it prioritizes inclusivity, service, and volunteerism, encouraging her participation at the animal shelter. The mix of suburban life and nearby
    natural spaces nurtures her appreciation for outdoors activities like gardening and dog walks, and the strong local high‑school sports culture provides a backdrop of communal pride.'
attributes:
  skills: '["Digital Literacy (Windows, Microsoft Office)", "Online Research and Troubleshooting", "Personal Organization with Planner", "Basic Cooking and Meal Preparation", "Pet Care and Animal Handling",
    "Sketching and Digital Illustration", "Volunteer Coordination and Teamwork"]'
  hobbies: '["Reading mystery and sci‑fi novels", "Sketching and digital illustration", "Playing sandbox video games (Minecraft)", "Dog walking and animal shelter volunteering", "Indoor herb gardening",
    "Baking simple treats", "Crocheting", "Listening to indie folk music", "Small book‑club participation"]'
  career_goals: Shae aims to pursue a stable, hands‑on career that combines her love for animals with practical, predictable work. She plans to complete high school with a focus on science electives and
    then enroll in a community‑college veterinary technician program, eventually working in a veterinary clinic or animal‑rehabilitation center. While keeping this primary path in mind, she also wants to
    develop her artistic side by taking graphic‑design courses and potentially offering freelance digital‑art services to local small businesses, allowing her to maintain flexibility and creative expression
    alongside a reliable profession.
