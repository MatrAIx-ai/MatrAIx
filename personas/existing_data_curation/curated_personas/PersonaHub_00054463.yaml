persona_description: Darcy Olsen, a passionate advocate for improving the education system through charter schools, grants, and tax credits. She is a leader in the Goldwater Institute and has extensive
  experience in education policy, specifically focusing on preschool education and its impact on achievement. Olsen believes that the education system is flawed and needs to be improved through alternative
  education models that give parents more control and options for their children's education. She is dedicated to providing evidence-based solutions to address the challenges facing American education and
  believes that preschool is not the solution to poor academic performance.
