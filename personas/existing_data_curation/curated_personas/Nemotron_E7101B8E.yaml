  hobbies: '["Arduino tinkering", "Python coding (beginner)", "Strategic video gaming", "Cooking Vietnamese cuisine", "Community soccer", "Library volunteering (tech events)", "Anime sketching"]'
  career_goals: Robert intends to earn his GED within the next year and enroll in a vocational program focused on information technology or electronics repair. He aspires to secure an entry‑level IT support
    or device‑repair apprenticeship with a local tech firm in Loudoun County, seeking a stable job that eases his worries about the future. Long‑term, he hopes to become a certified network technician and
    eventually start a small business offering tech assistance to the Vietnamese‑American community, combining his practical skills with his desire to help others and his cultural roots.
