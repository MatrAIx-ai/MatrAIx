personas:
  professional: Robert Quach, a 17‑year‑old aspiring IT support technician, combines his methodical organization, bilingual communication, and hands‑on experience with Arduino and Python to troubleshoot
    basic tech problems for classmates, volunteer at the library, and strategically plan his entry into a vocational program.
  sports: Robert Quach plays in a community soccer league as a midfielder, follows the Washington Commanders in the NFL and the Washington Capitals in the NHL, and incorporates weekly cardio runs to balance
    screen time, showing a practical yet socially connected approach to fitness.
  arts: Robert Quach expresses creativity through anime‑style sketches inspired by Makoto Shinkai and Studio Ghibli, enjoys listening to the soundtracks of 'Your Name' and the music of Yoko Kanno, and attends
    local comic‑con events where they occasionally share fan art, channeling stress into detailed line work.
  travel: Robert Quach prefers weekend road trips to nearby Shenandoah National Park for hiking and photography, has visited Washington, D.C.'s museums on school field trips, and dreams of a tech‑focused
    study tour to Tokyo to explore emerging electronics markets, balancing budget constraints with a desire for immersive experiences.
  culinary: Robert Quach finds comfort in cooking traditional family dishes like pho broth and bánh mì with homemade pâté, experiments with adding lemongrass and star anise for depth, and enjoys occasional
    food‑truck tacos, showing a blend of methodical recipe follow‑through and spontaneous flavor tweaks.
  core: Robert Quach is a diligent, tech‑savvy teen who balances meticulous planning with a lingering worry about the future, channeling stress into Arduino tinkering, soccer, and quietly perfecting anime
    sketches while quietly saving every spare dollar.
background:
  cultural: Robert is a second‑generation Vietnamese‑American whose parents immigrated to the United States in the early 2000s. Raised in Ashburn, VA, he grew up in a neighborhood with a strong Southeast
    Asian presence, celebrating cultural festivals like Tet and the Mid‑Autumn Festival. At home, Vietnamese language and values such as respect for elders, community solidarity, and diligence are emphasized.
    While navigating American school life, he blends these cultural expectations with his personal drive for practical achievement, often acting as a bridge between his family's traditions and the broader
    community.
attributes:
  skills: '["Google Workspace", "Microsoft Word", "Basic computer troubleshooting", "Arduino assembly and programming", "Python (beginner)", "Scratch (beginner)", "Bilingual English‑Vietnamese translation",
