  hobbies: '[''Sketching and digital art'',''Video content creation'',''Playing guitar/accordion in jam sessions'',''Attending Zydeco and Cajun music festivals'',''Competitive video gaming'',''Improvisational
    theater'',''Journaling and photography'',''Cooking Cajun cuisine'',''Fishing'',''Listening to philosophy podcasts'']'
  career_goals: Joseph dreams of turning his love for art, music, and community storytelling into a career as a digital content creator and cultural influencer. He aims to launch a YouTube channel that
    blends Cajun music, visual art, and commentary on contemporary ideas, eventually building a personal brand that attracts a global audience while celebrating his hometown heritage. He also aspires to
    perform with a Zydeco band regionally and hopes to compete in e‑sports tournaments, seeking the recognition that fuels his competitive drive. Long‑term, he envisions organizing youth‑focused cultural
    events in Church Point, giving him the flexibility he values while channeling his sociable energy into community leadership.
