personas:
  professional: Marilyn Moore, a 25‑year‑old sales associate at a high‑traffic Philadelphia boutique, blends meticulous inventory control and data‑driven visual merchandising with a charismatic, competitive,
    stage‑like approach to customer service, propelling them toward rapid promotion to store manager.
  sports: Marilyn Moore channels competitive drive into high‑intensity group classes at PhilaFit, salsa nights with the Philadelphia Salsa Society, and fervently supports the Eagles, 76ers, Flyers, and
    Union, while occasionally joining a co‑ed recreational soccer league.
  arts: Marilyn Moore energizes the stage in a local improv troupe, stars in community theatre productions of classics like 'Much Ado About Nothing', and draws inspiration from the comedic timing of Amy
    Schumer, the musical storytelling of Lin‑Manuel Miranda, and the vibrant salsa rhythms of Marc Anthony, all while they relish the audience’s immediate feedback.
  travel: Marilyn Moore prefers meticulously planned weekend getaways, having already explored New Orleans’s jazz scene, Austin’s live‑music bars, Barcelona’s salsa nights and tapas, and dreams of a future
    culinary tour of Marrakesh once their boutique takes off.
  culinary: Marilyn Moore, an intermediate home‑cook, relishes crafting Philly cheesesteaks, shrimp tacos with cilantro‑lime salsa, and homemade gnocchi topped with ricotta and sage, often pairing dishes
    with craft IPA selections for a social dinner experience that they love sharing with friends.
  core: Marilyn Moore is a charismatic, competition‑driven social butterfly who meticulously plans every outing, yet habitually scrolls through retail trend forums late into the night, sacrificing sleep
    for the next big store idea that they’re always chasing.
background:
  cultural: Marilyn grew up in a middle-class family in the Philadelphia metropolitan area, with roots in the Northeastern United States that trace back to Irish and German ancestry. She was raised with
    a blend of traditional American values - self-reliance, punctuality, and community involvement - and an appreciation for the city's rich historical heritage and cultural diversity. Frequent visits to
    local museums, neighborhood festivals, and sports events (e.g., Eagles games) have shaped her worldview, fostering a pragmatic outlook while remaining open to new ideas.
attributes:
  skills: '[''Customer Service'', ''Sales Communication'', ''POS Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Data Analysis (Excel)'', ''Social Media Engagement'', ''Event Planning'',
