  career_goals: Betty dreams of exploring many possibilities before deciding on a lifelong path. She is especially drawn to roles that let her connect with living creatures and solve real‑world problems,
    such as becoming a veterinarian, wildlife rehabilitator, or marine biologist. At the same time, she enjoys performing and imagines a future in theater or dance. She hopes to keep her options open, attend
    summer camps, and gain hands‑on experience to discover what best blends her love for caring, curiosity, and creative expression.
