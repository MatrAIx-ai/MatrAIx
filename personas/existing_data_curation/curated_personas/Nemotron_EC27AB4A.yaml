personas:
  professional: Betty Smith, an aspiring junior game developer who blends her love for soccer teamwork, improv drama, and Scratch coding into interactive story‑games, approaches projects with curious practicality
    yet often leaves the final polish for later because they prefer flexible play over strict deadlines.
  sports: Betty Smith, a dedicated member of the Houston Youth Soccer Club, spends Saturdays on the field scoring goals, cheers for the Houston Dynamo, and also enjoys weekend hikes in Hermann Park where
    they practice quick footwork drills.
  arts: Betty Smith, a vibrant participant in her school's drama club and Saturday dance class, draws weekly comic strips inspired by Raina Telgemeier, imagines storylines like those of J.K. Rowling, and
    they also love watching Pixar movies for animation cues.
  travel: Betty Smith, an enthusiastic explorer of Houston's Hermann Park, the Houston Arboretum, and Space Center Houston, frequently dreams of visiting the Grand Canyon and Disney World, planning each
    trip with colorful maps while balancing school assignments and allowance.
  culinary: Betty Smith, a budding home‑chef, loves making cheese quesadillas with fresh salsa, whipping up strawberry‑banana smoothies, and they often reward themselves with a slice of pepperoni pizza
    after completing a LEGO city.
  core: Betty Smith is a socially energetic, creativity‑driven ten‑year‑old who channels anxiety into sketching, soccer, and building LEGO worlds, but frequently juggles a disorganized schedule and occasional
    impulsive spending.
background:
  cultural: Betty lives in a middle‑class neighborhood of Houston, Texas, where her family blends Southern hospitality with the city’s multicultural vibrancy. Her parents, both college‑educated professionals,
    emphasize education, community involvement, and exposure to diverse cultural celebrations. She celebrates national holidays such as Thanksgiving and the Fourth of July with traditional meals, and often
    joins neighborhood festivals featuring music and food from the many cultures that make up Houston, including Tex‑Mex and Vietnamese cuisine. Her family’s values include kindness, curiosity, and resilience,
    which shape her outlook and support her emotional growth.
