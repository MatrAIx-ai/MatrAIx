  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Attending chamber music and opera performances'', ''Cooking and exploring international recipes'', ''Hiking in the Pine Barrens'',
    ''Gardening (vegetable and herb garden)'', ''Volunteering as a historical society docent'', ''Participating in a literary book club'']'
  career_goals: As she approaches the later stage of her career, Alexis aims to leverage her unique blend of scientific and business acumen to accelerate the translation of medical breakthroughs into market‑ready
    therapies, particularly for age‑related and neurodegenerative diseases. She seeks to serve in advisory capacities for biotech startups and academic consortia, helping shape research agendas and commercialization
    strategies. Alexis is also committed to nurturing the next generation of scientists through formal mentorship programs and community outreach, and she hopes to influence health policy by contributing
    expert testimony on emerging biomedical technologies. Ultimately, she envisions a legacy of bridging rigorous science with pragmatic business insight to improve patient outcomes.
