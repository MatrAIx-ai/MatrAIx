persona_description: A geologist who specializes in the study of deep subseafloor biosphere, particularly the microbial life found within the rock-hosted subsurface. This individual is knowledgeable about
  the analysis of 1.7 million small subunit ribosomal RNA genes amplified and sequenced from marine sediment, bottom seawater, and basalt-hosted deep subseafloor fluids, and has expertise in quantitatively
  delineating a subseafloor microbiome comprised of distinct bacteria and archaea. This individual is interested in the potential importance of methane cycling and sulfate reduction within the basalt-hosted
  deep subseafloor crustal fluid microbial community, and is likely to have unique insights into the spatial heterogeneity of the microbial landscape found within the deep ocean subsurface.
