  career_goals: As he approaches retirement, Samuel aims to transition into a part‑time mentorship role where he can pass on his administrative expertise to the next generation of office staff. He plans
    to obtain a Certified Administrative Professional (CAP) credential to formalize his skill set and increase his eligibility for advisory positions. He also hopes to take a leadership role in a local
    nonprofit arts organization, leveraging his organizational talents to coordinate exhibitions, manage volunteer schedules, and preserve the cultural history of Bay Shore through a community archive project.
    On a personal level, Samuel wants to travel to a handful of world‑renowned art museums—such as the Louvre, the Vatican Museums, and the Getty—to broaden his artistic perspective and compile a reflective
    journal that he can share with his grandchildren.
