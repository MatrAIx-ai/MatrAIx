  career_goals: Although retired, Chong aims to stay intellectually engaged by mentoring emerging engineers and volunteering to teach STEM concepts at local community centers. He aspires to author a memoir
    that captures his life's journey and the evolution of technology across decades. Maintaining high personal standards, he seeks to continue improving his health through regular tai chi practice and balanced
    nutrition, while also planning occasional trips to visit his ancestral homeland and explore cultural heritage sites. His overarching ambition is to contribute his experience to enrich younger generations
    and preserve his family's cultural legacy.
