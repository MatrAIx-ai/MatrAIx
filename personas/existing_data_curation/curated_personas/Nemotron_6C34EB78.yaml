personas:
  professional: Mohammed Starkey, a 27‑year‑old CNC machinist and welder, leverages precise technical drawing interpretation, CNC lathe and mill operation, and MIG/TIG welding expertise, while his preference
    for structure and concern for safety guide his methodical approach to coordinating small shop‑floor teams and aiming for a shift‑supervisor role.
  sports: Mohammed Starkey avidly follows the Cahokia High School Cougars football team, attends Friday night games, volunteers as an equipment manager, participates in a weekend recreational softball league,
    and keeps fit by lifting weights at the local community center while occasionally fishing for rest on the Kaskaskia River.
  arts: Mohammed Starkey appreciates classic American rock, frequently listening to Lynyrd Skynyrd and the Allman Brothers Band while working on car restorations, enjoys occasional outings to community
    theatre productions of classic plays, and collects vintage automotive photography that decorates their garage.
  travel: Mohammed Starkey prefers short, purposeful trips that fit a tight schedule, taking weekend drives to St. Louis for a blues concert, annual camping vacations at Shawnee National Forest, and dreaming
    of a future road trip along Route 66 to explore historic automotive museums.
  culinary: Mohammed Starkey loves mastering the grill, regularly preparing Texas‑style brisket with mesquite wood and a dry rub of smoked paprika, brown sugar, and garlic, while also crafting hearty chili
    con carne and occasionally experimenting with homemade BBQ sauce using cayenne and apple cider vinegar.
  core: Mohammed Starkey balances meticulous, safety‑focused machining work with a passion for classic cars, weekend fishing, and grilling, all while wrestling with anxiety‑driven over‑planning and a habit
    of staying up late on DIY projects.
background:
  cultural: Mohammed grew up in the small‑town Midwestern setting of Effingham, Illinois, where white, working‑class values of hard work, community responsibility, and modesty prevail. Although his first
    name reflects a Muslim heritage—stemming from a family conversion—his upbringing blended typical Midwest customs—such as celebrating Thanksgiving, Fourth of July parades, and county fairs—with an appreciation
    for diverse cultural practices shared at the local mosque and community gatherings. This hybrid cultural backdrop nurtured his cooperative nature, practical mindset, and strong sense of duty toward
    family and neighbors.
attributes:
  skills: '[''CNC machining'', ''MIG/TIG welding'', ''Metal fabrication'', ''Plastic injection molding'', ''Blueprint reading'', ''Preventive maintenance'', ''Quality inspection'', ''Safety compliance'',
    ''Mechanical troubleshooting'', ''Team coordination'']'
  hobbies: '[''Fishing'', ''Classic car restoration'', ''DIY home improvement'', ''High school football fan'', ''Mentoring youth'', ''Grilling'', ''Meditation'']'
  career_goals: He aims to earn an AWS Certified Welder credential and a CNC Machinist certification within the next two years, positioning himself for a shift‑supervisor role in his plant. Over the next
    five years, Mohammed plans to develop leadership and project‑management skills to oversee larger production runs and eventually open a modest, family‑run metal‑fabrication shop that serves local agricultural
    and automotive businesses. To support these goals, he intends to enroll in evening courses for an Associate’s degree in Manufacturing Technology, ensuring greater job security and a higher income for
    his growing family.
