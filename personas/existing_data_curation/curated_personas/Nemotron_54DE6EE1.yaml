personas:
  professional: Steve Wilkins, a 41‑year‑old consultative sales leader, blends curiosity‑driven client outreach with pragmatic pipeline management, using Salesforce and HubSpot to adapt pitches on the fly,
    while coaching a small team through flexible, results‑focused tactics despite they occasional struggle with strict deadlines.
  sports: Steve Wilkins follows the Oklahoma City Thunder for basketball, roots for the Dallas Cowboys during football season, participates in a local 4‑H hunting club’s deer and turkey outings, and joins
    a casual weekend softball league to stay fit, balancing competitive spirit with a laid‑back approach.
  arts: Steve Wilkins channels his love for storytelling into acoustic guitar sessions inspired by John Denver and Neil Young, writes simple folk‑rock songs while listening to science‑fiction podcasts,
    and delights in the classic novels of Isaac Asimov and Octavia Butler, which feed they creative imagination.
  travel: Steve Wilkins prefers low‑key road trips that combine fishing on the Canadian River, hunting excursions in the Texas Panhandle, and occasional family visits to nearby college football stadiums,
    while dreaming of a guided fly‑fishing lodge in New Zealand’s South Island.
  culinary: Steve Wilkins enjoys cooking fresh river trout with lemon‑butter sauce, slow‑smoked turkey legs seasoned with rosemary and garlic, and hearty chili made with black beans and ground beef, while
    they moderate cooking skill lets them experiment with wood‑smoked flavors on weekend barbecues.
  core: Steve Wilkins is a curiosity‑driven sales pro who balances spontaneous adaptability with anxiety‑fuelled overthinking, finding solace in fishing, guitar strings, and the occasional impulsive purchase.
background:
  cultural: Steve grew up in a small, tight-knit community in western Oklahoma, where the culture blends agricultural roots, oil-industry influence, and strong Midwestern values of self-reliance, community
    service, and modesty. His family attended a local Methodist church, and his upbringing emphasized respect for tradition, hard work, and neighborly support. This background informs his practical approach
    to sales and his appreciation for both new ideas and established methods, while his community ties keep him grounded in the local customs and seasonal events of Burns Flat.
