  hobbies: '[''Fishing'', ''Hunting'', ''High-School Football Attendance'', ''Acoustic Guitar'', ''Science-Fiction Reading'', ''Woodworking'', ''4-H Volunteering'', ''Mindfulness Meditation'']'
  career_goals: Steve aims to advance to a regional sales director role within the next five years, where he can implement data-driven sales strategies and mentor a larger team. He plans to pursue an associate's
    degree in business management to formalize his knowledge and improve organizational skills that will help reduce his work-related anxiety. Long-term, he aspires to start his own sales consulting firm
    focused on helping small rural businesses adopt flexible, results-oriented sales processes.
