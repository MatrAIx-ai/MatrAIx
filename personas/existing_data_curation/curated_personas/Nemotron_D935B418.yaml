  hobbies: '["bass fishing", "hunting (deer & turkey)", "woodworking projects", "DIY electronics and Arduino tinkering", "playing acoustic guitar", "reading sci‑fi and self‑help books", "strategy video
    gaming", "local community volunteer events", "trail running", "cycling"]'
  career_goals: Kenneth aims to secure a certification as a CNC machinist while completing his GED, laying the groundwork for an associate degree in manufacturing technology. He envisions moving from a
    production line role to a supervisory or quality‑assurance position where he can apply his curiosity for process improvement in a practical, results‑oriented way. Long‑term, he hopes to launch a small,
    data‑driven workshop that combines his hands‑on expertise with modest automation, providing stable income and reducing the financial stress that often worries him.
