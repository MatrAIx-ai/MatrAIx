  career_goals: Edward aspires to obtain his GED within the next two years and enroll in a vocational program focused on electrical trades. He is drawn to careers that offer clear routines, measurable outcomes,
    and the opportunity for steady advancement, such as becoming a licensed electrician or a maintenance technician. Additionally, he is considering enlisting in the Army to gain disciplined training, acquire
    technical certifications, and secure a structured career path that aligns with his desire for predictability and responsibility.
