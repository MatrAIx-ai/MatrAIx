personas:
  professional: Lazaro Urdaneta, a precision machinist in Albuquerque, harnesses his CNC milling and turning expertise, meticulous blueprint interpretation, and structured problem‑solving to consistently
    meet tight tolerances while mentoring junior operators, positioning themselves for a CNC programming supervisor role and eventually a family‑run machining shop catering to aerospace and defense clients.
  sports: Lazaro Urdaneta enjoys solitary hikes in the Sandia Mountains and occasional weekend mountain‑biking with the Albuquerque Mountain Bike Club, follows the Albuquerque Isotopes baseball team and
    the New Mexico State Aggies basketball squad, and maintains a steady cardio routine through trail runs, preferring low‑key fitness over crowded gyms.
  arts: Lazaro Urdaneta channels creative energy into desert‑landscape photography, often citing the influence of Ansel Adams and Edward Weston, while listening to classic folk guitarist José Alfredo Jiménez
    and modern indie band The Strokes during workshop sessions, and occasionally attends local art openings at the ABQ Makerspace gallery.
  travel: Lazaro Urdaneta plans trips with meticulous itineraries, favoring road‑driven explorations of the Southwest like Monument Valley and Sedona, dreams of a technical tour of Japan’s precision‑manufacturing
    districts, and balances the desire for solitude with occasional visits to family gatherings in New Mexico’s high‑desert towns.
  culinary: Lazaro Urdaneta takes pride in preparing family‑style dishes such as chiles rellenos, pozole, and carne asada, often using fresh Hatch chiles, corn masa, and cilantro, while their cooking skill
    ranges from competent grill‑master to experimental tinkerer who occasionally adds smoked paprika to a traditional mole, and they enjoy pairing meals with local craft beers.
  core: Lazaro Urdaneta is a detail‑obsessed machinist who balances solitary tinkering, disciplined budgeting, and a penchant for vintage motorcycles, yet occasionally lets perfectionism spill into late‑night
    work sessions that delay sleep.
background:
  cultural: Lazaro grew up in a Mexican‑American household in Albuquerque, where Spanish was spoken alongside English and family traditions blended Mexican heritage with Southwestern culture. He celebrates
    holidays such as Día de los Muertos and Mexican Independence Day, often preparing dishes like tamales and pozole with his mother. His upbringing emphasized familismo, respect for elders, and a strong
    work ethic, values that continue to shape his approach to both his career and personal life. While he identifies with his Mexican roots, he also embraces the multicultural environment of New Mexico,
    participating in local Latino community events and maintaining ties with relatives in both the U.S. and Mexico.
attributes:
  skills: '["CNC milling", "CNC turning", "G-code programming", "Blueprint reading", "Precision measurement (CMM)", "Machine maintenance and troubleshooting", "Quality control and inspection", "CAD/CAM
    software (SolidWorks, Fusion 360)", "Material selection and metallurgy basics", "Welding basics", "Safety compliance and OSHA regulations", "Process optimization", "Mentoring junior machinists"]'
  hobbies: '["Scale model engine building", "Vintage motorcycle restoration", "Arduino and DIY electronics projects", "Hiking (Sandia Mountains)", "Landscape photography", "Traditional Mexican cooking",
    "Small-group makerspace mentoring", "Reading technical manuals and engineering journals"]'
  career_goals: Lazaro aims to advance from his current machinist role to a CNC programming supervisor position within the next three to five years. He plans to earn certifications such as the NIMS CNC
    Programmer and Machinist, and pursue an associate degree in Manufacturing Engineering to deepen his technical knowledge. Long‑term, he aspires to open a small, family‑run precision machining shop that
    can serve local aerospace and defense contractors while providing stable employment for his community. He values a career path that offers both technical challenges and the stability needed to support
    his family and personal responsibilities.
