persona_description: A researcher in the field of developmental neuroscience, specifically focusing on the study of neurobiological substrates underlying neuropsychiatric disorders such as schizophrenia
  and attention deficit hyperactivity disorder. Their expertise lies in the investigation of brain function during visuospatial working memory tasks in children with 22q11DS, using functional magnetic resonance
  imaging (fMRI). The researcher aims to understand the neurobiological mechanisms underlying the cognitive deficits observed in this group and how these deficits may contribute to later development of
  neuropsychiatric disorders.
