  hobbies: '[''Visiting art museums'', ''Pottery class'', ''Collecting Talavera tiles'', ''Cooking regional Mexican cuisine'', ''Reading historical fiction'', ''Listening to tech podcasts'', ''Walking at
    White Rock Lake'', ''Yoga'', ''Mentoring bilingual youth'', ''Adult education courses in digital photography'']'
  career_goals: She aims to transition from a clerk role to a supervisory or lead planner position within the next two years, leveraging her experience to mentor junior staff and spearhead continuous-improvement
    projects. She plans to earn a Lean Six Sigma Green Belt certification to formalize her expertise and position herself as a process-optimization specialist. Long-term, Dianelis envisions either moving
    into an operations manager role at a regional plant or launching a small consulting practice that helps midsize manufacturers streamline their production planning. She also hopes to use her love of
    art by incorporating creative problem-solving workshops for her team, blending her professional goals with personal passions.
