  career_goals: Sarah dreams of becoming a civil engineer who designs safe, sustainable infrastructure for her community. She plans to enroll in a high‑school STEM program, pursue an engineering degree,
    and eventually work on projects that improve public transportation, green spaces, and flood‑resilient structures in cities like Cleveland. She is also open to related fields such as environmental science
    or data analytics, where her analytical mindset and organized work style can be applied.
