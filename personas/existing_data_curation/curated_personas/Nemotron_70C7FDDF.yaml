personas:
  professional: Sarah Faiola, a 13‑year‑old middle school student with a talent for logical problem‑solving, channels her organized, methodical nature into leading the school’s robotics club and coordinating
    library volunteer schedules, demonstrating early leadership and project‑management skills.
  sports: Sarah Faiola, a dedicated midfielder for the Riverdale Rangers youth soccer league, follows a disciplined training schedule, cheers for the local professional team the City Hawks, and spends weekends
    playing pickup basketball at the community center to stay fit.
  arts: Sarah Faiola, an avid reader of Agatha Christie mysteries and a sketchbook enthusiast inspired by Frank Lloyd Wright’s geometric designs, spends free time reproducing Escher’s impossible constructions
    and attends the monthly teen art showcase at the community library where they admire works by contemporary illustrator Lisa Congdon.
  travel: Sarah Faiola, who prefers meticulously planned itineraries, recently visited Washington D.C.’s Smithsonian museums on a school field trip, dreams of exploring the historic streets of Kyoto during
    a future family vacation, and enjoys day trips to nearby state parks where they can map trails in their notebook.
  culinary: Sarah Faiola, who favors simple yet flavorful meals, often cooks spaghetti carbonara with pancetta and parmesan, loves homemade sushi rolls featuring avocado and cucumber, and enjoys crafting
    fruit smoothies with mango, spinach, and Greek yogurt for a post‑practice snack.
  core: Sarah Faiola blends a love for structured problem‑solving with creative sparks, balancing a disciplined schedule of soccer, library volunteering, and sketching, yet occasionally succumbs to spontaneous
    board‑game purchases that throw off her budget.
background:
  cultural: Sarah grew up in a middle‑class family in the suburbs of Cleveland, Ohio. Her household reflects Midwestern American values that emphasize education, punctuality, and community involvement.
    Family traditions include regular gatherings for homemade meals, stories about her grandparents' immigration from Europe, and a shared commitment to civic responsibility. The local culture of Cleveland—its
    public parks, diverse neighborhoods, and strong public school system—provides Sarah with a balanced view of urban and suburban life, reinforcing her practical, organized, and cooperative outlook.
