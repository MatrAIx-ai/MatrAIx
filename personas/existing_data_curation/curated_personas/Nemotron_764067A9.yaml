  hobbies: '["Zydeco and Cajun music festivals","Cooking traditional Louisiana cuisine","Fishing","Gardening","Reading contemporary fiction and philosophy","Journaling market and cultural observations","Mentoring
    high‑school students","Playing acoustic guitar"]'
  career_goals: Van aims to become a senior buyer or category manager within the next three years, overseeing multiple product lines and larger budgets. He plans to earn a professional supply‑chain certification
    (CSCP) and pursue an MBA to deepen strategic expertise. Long‑term, he envisions launching his own boutique retail store that highlights locally sourced Cajun goods while emphasizing sustainable and
    culturally resonant merchandise. He also seeks to be recognized as a thought leader who integrates cultural curiosity with practical retail strategy.
