  career_goals: Maritza aims to build on her coding and artistic strengths to pursue a future in environmental design or marine conservation. In the short term, she plans to join her middle‑school robotics
    club, take advanced science electives, and improve her Spanish‑to‑English translation skills for community outreach. By high school she hopes to enroll in a specialized STEM program, volunteer with
    local coastal clean‑up initiatives, and eventually study marine biology or sustainable design at university. Long‑term, she envisions a career that blends scientific research with public education,
    helping protect Florida’s coastal ecosystems while fostering community awareness.
