personas:
  professional: Maritza Mendez is an aspiring junior coder and cartoonist who channels their curiosity into simple Python projects while keeping meticulously organized sketchbooks, balancing school responsibilities
    with community volunteering at the local library, and often worries about meeting deadlines despite their cooperative nature.
  sports: Maritza Mendez plays midfield for the Little Havana Youth Soccer Club, idolizes Inter Miami CF's playmaker Julián Álvarez, follows the Miami Heat and the Miami Marlins, and balances soccer practice
    with nightly salsa sessions, using dance as a fun way for them to stay fit and relieve stress.
  arts: Maritza Mendez draws vibrant cartoons inspired by the whimsical style of Bill Watterson, enjoys listening to Bad Bunny and classic son while sketching, reads fantasy series such as Harry Potter
    and El Señor de Los Anillos in both Spanish and English, and often spends weekends volunteering at the bilingual story‑time where they help craft imaginative tales for younger children.
  travel: Maritza Mendez dreams of exploring the historic streets of Old San Juan and the vibrant markets of Cartagena, but currently enjoys weekend road trips to the Florida Keys and occasional visits
    to the Everglades, planning each adventure with a mix of family input and their own doodled itineraries, while keeping travel expenses modest due to a limited allowance.
  culinary: Maritza Mendez loves helping their mother simmer arroz con pollo, perfect the sweet caramel of flan, and experiment with plantain chips, yet they sometimes over‑salt the rice and resort to microwave
    snacks when homework piles up.
  core: Maritza Mendez is a curious, organized teen who balances coding, cartooning, and salsa with a habit of over‑thinking schoolwork and occasional snack‑induced procrastination, and they often channel
    their worries into detailed sketches.
background:
  cultural: Maritza’s family emigrated from Cuba to Miami when her parents were young, and her household is a vibrant blend of Cuban traditions and American life. She grows up speaking Spanish at home and
    English at school, celebrating holidays like Noche de San Juan and enjoying music ranging from classic son to contemporary reggaetón. Family gatherings feature homemade dishes such as ropa vieja and
    flan, and community events at the local Cuban cultural center reinforce her connection to the island’s heritage. This bicultural environment shapes her values of family solidarity, respect for elders,
    and a strong sense of community responsibility.
