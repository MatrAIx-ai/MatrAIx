  hobbies: '[''Soccer'', ''Basketball'', ''Robotics club (Scratch/LEGO Mindstorms)'', ''LEGO building'', ''Reading adventure books'', ''Chess'', ''Board games (Ticket to Ride Junior)'', ''Community volunteer
    activities (library reading buddy)'']'
  career_goals: Joseph dreams of one day designing and building structures that help his community, imagining a future as a civil engineer or city planner. He also likes the idea of coaching younger kids
    in sports, combining his love of teamwork with mentorship. To reach these goals, he plans to focus on excelling in math and science at school, join STEM extracurriculars, and continue developing leadership
    skills through team sports and community service.
