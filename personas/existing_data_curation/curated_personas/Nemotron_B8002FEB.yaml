  hobbies: '[''Visiting museums and galleries'', ''Watercolor painting'', ''Knitting and quilting'', ''Gardening'', ''Reading historical fiction'', ''Bridge'', ''Crossword puzzles'', ''Live jazz and classical
    music'', ''Walking in parks'', ''Attending community festivals'']'
  career_goals: Although retired from formal employment, Linda aims to deepen her impact on the local arts scene by establishing an intergenerational art mentorship program that pairs seniors with high-school
    students. She hopes to secure a board seat at the Minneapolis Institute of Art to influence community outreach strategies. Linda also aspires to write and self-publish a memoir recounting her lifelong
    love of art, travel, and Minneapolis history, and to travel to three major international museums—the Louvre, the Uffizi, and the Van Gogh Museum—within the next five years. Finally, she plans to learn
    conversational French to enrich her visits to French-language exhibitions.
