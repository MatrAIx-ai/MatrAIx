  career_goals: Although retired from formal employment, Judith aims to deepen her involvement in preserving Kenai’s cultural heritage. She aspires to become a volunteer docent at the local museum, develop
    a small series of handcrafted quilts inspired by Alaskan motifs for sale at community markets, and mentor younger residents in both artistic techniques and community planning. She also hopes to author
    a blog documenting the history and stories of the Kenai Peninsula, thereby contributing to the region’s collective memory and encouraging intergenerational dialogue.
