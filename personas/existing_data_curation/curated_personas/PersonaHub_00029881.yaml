persona_description: A Gemini Observatory astronomer who specializes in the study of the optical counterpart of submillimeter galaxies, particularly those behind the A851 galaxy cluster. He has obtained
  the highest spectroscopic redshift measured so far, at z = 3.35, for a SCUBA galaxy at a distance of 8 billion light-years. His team has also detected the signature of an Active Galactic Nucleus, which
  may have a profound impact on the evolution of these galaxies.
