persona_description: A botanist who specializes in the study of plant taxonomy, particularly the identification and classification of cultivars. This person is knowledgeable about the cultivation, propagation,
  and classification of plants, and is likely to have a deep understanding of the International Code of Nomenclature for Cultivated Plants (ICNCP) and the International Society for Horticultural Science
  Commission for Nomenclature and Cultivar Registration (ISHS). They are also likely to be familiar with the use of botanical names and cultivar epithets, and have a strong interest in the development and
  protection of plant varieties.
