personas:
  professional: Leon Brock, a seasoned machinist with over twenty years of experience in manual and CNC machining, leverages their deep knowledge of G‑code programming, precision measurement, and lean process
    improvement to lead shop‑floor teams, while their relaxed approach to deadlines often results in innovative, albeit occasionally delayed, project solutions.
  sports: Leon Brock, a devoted fan of the Detroit Red Wings and Detroit Tigers, attends home games when schedules allow, participates in a weekend pick‑up basketball league at the local YMCA, jogs along
    the Great Lakes shoreline during early mornings, and is a member of the Detroit Cycling Club, reflecting a balanced but not overly regimented approach to fitness.
  arts: Leon Brock expresses creativity through woodworking and small‑scale 3D printing, drawing aesthetic inspiration from the functional designs of Charles and Ray Eames, the improvisational rhythms of
    John Coltrane, and classic film noir starring Humphrey Bogart, while also indulging in mystery novels by Agatha Christie during solitary evenings.
  travel: Leon Brock favors spontaneous road trips, having driven the scenic routes of the Great Lakes and explored the Upper Peninsula’s rugged coastlines, while also planning future adventures such as
    a cycling tour of the Scottish Highlands and a cultural excursion to Kyoto, Japan, balancing a love of local discovery with occasional international wanderlust.
  culinary: Leon Brock enjoys cooking with garden‑fresh herbs, frequently preparing Detroit‑style pizza topped with locally sourced mozzarella, homemade tomato‑basil soup, and slow‑roasted pork shoulder
    seasoned with smoked paprika and brown sugar, while also experimenting with wood‑smoked brisket during summer barbecues.
  core: Leon Brock blends precise machining expertise with a laid‑back passion for classic cars, woodworking, and mystery novels, navigating life with practical curiosity, occasional disorganization, and
    a steady commitment to community mentorship.
background:
  cultural: Leon grew up in Detroit’s working‑class neighborhoods, the son of a former auto‑assembly line worker and a homemaker. The city’s auto‑industry heritage shaped his practical outlook and respect
    for skilled trades. Though he completed only high school, he absorbed a strong work ethic and community spirit from local unions and neighborhood workshops. His cultural identity is rooted in Midwestern
    values—self‑reliance, modesty, and a friendly, cooperative demeanor. Leon’s white, Midwestern background and lifelong residence in Wayne County give him a deep appreciation for Detroit’s resurgence,
    and he often volunteers at local STEM outreach programs to support the next generation of machinists.
