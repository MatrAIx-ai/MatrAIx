  career_goals: Leon aims to leverage his practical curiosity by advancing into a CNC programmer/supervisor role within the next five years. He is pursuing an associate’s degree in Manufacturing Technology
    and certifications such as the Certified CNC Operator (CCO) and Lean Six Sigma Yellow Belt. His long‑term ambition is to open a modest custom parts shop that blends traditional machining with modern
    additive manufacturing, allowing him to work on niche projects while maintaining a flexible schedule that suits his preference for a relaxed work‑life balance. He also hopes to mentor apprentices and
    contribute to Detroit’s revitalized manufacturing community.
