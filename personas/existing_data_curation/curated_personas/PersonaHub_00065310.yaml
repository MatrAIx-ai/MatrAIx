persona_description: A network administrator who is responsible for managing and maintaining a network infrastructure, particularly focusing on the end-to-end connection between the BSS and the SGSN. This
  persona is skilled in understanding the concepts of virtual connection, network service virtual connection, and NS-VCs, and is capable of managing and distributing traffic from multiple cells within a
  network. They are also skilled in using administrative means to dynamically configure BVCs and NS-VCs at the BSS and SGSN sides, respectively. This persona is likely to be involved in the operation and
  maintenance of a network infrastructure, and is responsible for ensuring the smooth and efficient operation of the network.
