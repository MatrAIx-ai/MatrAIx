  career_goals: Now retired, Marcia aims to channel her experience into mentorship and community service. She plans to volunteer as a literacy tutor for adult learners, lead workshops on lifelong learning
    at the local library, and write a memoir reflecting on her teaching career. Additionally, she hopes to spearhead a community garden project that merges her practical skills with innovative, eco‑friendly
    ideas, and to serve as a mentor for younger educators navigating modern classroom challenges.
