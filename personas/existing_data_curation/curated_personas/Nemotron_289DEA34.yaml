  career_goals: Donald aims to turn his practical abilities into a flexible independent venture, such as a freelance handyman service or a small custom‑furniture studio, providing income without the constraints
    of a traditional 9‑to‑5 job. He plans to earn his GED and possibly acquire a certification in HVAC or electrical work to expand his service offerings. Long‑term, he hopes to become a trusted community
    resource in Everett, mentoring neighbors interested in DIY projects and building a modest reputation for reliable, quality work.
