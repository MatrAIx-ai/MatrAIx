    ''Workshop facilitation'']'
  hobbies: '[''Watercolor painting'', ''Botanical illustration'', ''Photography'', ''Reading contemporary fiction and poetry'', ''Hiking and nature walks'', ''Yoga and meditation'', ''DIY home décor projects'',
    ''Volunteering at community garden'', ''Visiting art galleries and museums'', ''Trying experimental cooking'', ''Exploring new coffee shops'']'
  career_goals: Maylen aspires to open her own boutique floral studio in Vallejo that includes a workshop space for teaching sustainable design techniques. She aims to launch a subscription‑based line of
    eco‑friendly floral arrangements for local businesses and homeowners, gain recognition in national floral design competitions, and eventually publish a book that blends botanical science with artistic
    storytelling. Her competitive drive pushes her to continually innovate and position herself as a thought leader in the Bay Area’s floral community.
