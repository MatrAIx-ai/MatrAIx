  career_goals: Juan aims to advance to an office manager or executive assistant role within the next three years, seeking to lead a team and oversee larger operational projects. He plans to earn the Certified
    Administrative Professional (CAP) credential and enroll in part-time coursework for an associate degree in business administration. Juan is also interested in developing expertise in project coordination,
    eventually transitioning into a project coordinator position that leverages his organizational strengths. Long-term, he envisions mentoring younger administrative staff and possibly consulting for small
    businesses to improve their administrative efficiency.
