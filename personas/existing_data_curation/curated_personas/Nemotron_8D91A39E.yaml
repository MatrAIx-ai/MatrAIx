  career_goals: Omar frequently talks about wanting to become a firefighter or an astronaut because he loves helping people and exploring new places. He also imagines being a teacher when he grows up, reflecting
    his enjoyment of stories and showing friends how to play games. These aspirations blend his practical desire to aid others with his curiosity about the world.
