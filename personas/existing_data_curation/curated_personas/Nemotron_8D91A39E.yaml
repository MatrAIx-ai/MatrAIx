personas:
  professional: Omar Alanis, a budding preschool helper, leverages a practical knack for sorting puzzles and a love of structure to keep the classroom’s toy shelves tidy, yet they thrive on spontaneous
    story circles that let them shine socially.
  sports: Omar Alanis, a spirited fan of the local junior soccer league, dons a miniature red jersey of the Chicago Cubs during weekend matches, loves splashing in the community pool’s kids swim class,
    and eagerly cheers for the Detroit Tigers while still preferring free‑play tag in the park over structured drills.
  arts: Omar Alanis, an avid collector of picture books and budding finger‑painter, often hums along to the playful tunes of Disney’s Let It Go and the kid‑friendly folk songs of Raffi, while delighting
    in episodes of the animated series Bluey that shape their imaginative storytelling.
  travel: Omar Alanis, an adventurous little explorer, loves family road trips to the nearby zoo, the sandy shores of Clearwater Beach, and dreams of seeing the towering castles of Disneyland in California,
    always packing a favorite plush for comfort.
  culinary: Omar Alanis, a picky yet curious eater, adores cheesy macaroni, chicken nuggets dipped in honey‑mustard, and bright fruit smoothies blended with bananas, strawberries, and a splash of orange
    juice, often helping stir the batter with a tiny wooden spoon.
  core: Omar Alanis, a 4‑year‑old whirlwind of energy, balances a love for tidy toy organization with spontaneous bursts of laughter, often forgetting to put away crayons when a new adventure beckons.
background:
  cultural: Omar comes from a bilingual Hispanic family that embraces Mexican‑American traditions. He hears both Spanish and English at home, celebrates cultural holidays such as Día de los Muertos and
    Cinco de Mayo, enjoys family meals featuring tacos, tamales, and other traditional foods, and listens to Latin music that influences his love for rhythm and dance. These cultural experiences shape his
    identity and daily life in Colorado Springs.
