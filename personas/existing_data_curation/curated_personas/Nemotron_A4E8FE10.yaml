  career_goals: Walter aims to transition into a facilities‑management role where he can oversee multiple sites and shape sustainable cleaning policies for a large organization. Over the next five years,
    he plans to earn the Certified Facility Manager (CFM) credential and a LEED Green Associate certification, positioning himself for a director‑level position in a cultural institution such as a museum
    or university. Ultimately, he envisions founding a consultancy that advises organizations on integrating technology and eco‑friendly practices into their housekeeping operations.
