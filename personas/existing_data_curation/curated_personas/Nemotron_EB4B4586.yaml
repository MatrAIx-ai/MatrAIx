  hobbies: '[''Quilting'', ''Crocheting'', ''Sketching and painting'', ''Reading historical fiction'', ''Local history research'', ''Organic gardening'', ''Attending small concerts and poetry readings'',
    ''Community theater'', ''Weekly book club'', ''Nature walks'']'
  career_goals: Although retired from formal employment, Ida aims to deepen her involvement in her community. She hopes to lead a weekly art workshop at the local senior center, mentor younger volunteers
    in compassionate caregiving, and complete a community oral‑history project documenting the stories of longtime residents in Sullivan County. She also aspires to become more digitally literate to archive
    her genealogy research online and to travel to regional art museums to broaden her artistic perspective.
