  career_goals: Jay’s primary ambition is to give back to his community and ensure its cultural legacy endures. He aims to compile and publish a memoir of local oral histories, establish a community garden
    that provides fresh produce and educational workshops, mentor youth in woodworking and gardening, help organize an annual arts and heritage festival, and continue learning digital photography and modern
    art techniques to document the Shenandoah Valley’s landscapes.
