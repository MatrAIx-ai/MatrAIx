persona_description: An engineer who specializes in dam construction and hydroelectric power generation. The individual is knowledgeable about the engineering principles and practices involved in building
  dams, including the selection of materials, design of structures, and the operation and maintenance of the dams. They are also familiar with the environmental and social impacts of dam construction, including
  the effects on fish migration and water supply. The individual may have worked on or studied the construction of dams in the United States or elsewhere, and may have expertise in the design and operation
  of hydroelectric power plants.
