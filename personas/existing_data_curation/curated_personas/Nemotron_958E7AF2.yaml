personas:
  professional: A curious junior explorer of knowledge named Carmen Cervantes treats kindergarten projects like mini research missions, meticulously organizing crayons, stickers, and facts while delighting
    in sharing new discoveries with their small circle of classmates, and they proudly present each finished poster to the teacher.
  sports: An enthusiastic backyard athlete named Carmen Cervantes loves playing mini‑soccer with the neighborhood “Little Stars” club on Saturday mornings, cheering for the Los Angeles Dodgers while practicing
    dribbling drills, and prefers the gentle rhythm of swimming lessons at the local community pool over large, noisy gym classes, and they always make sure to water down the orange juice after a sweaty
    session.
  arts: A budding mini‑artist named Carmen Cervantes spends afternoons sketching colorful wildlife inspired by the works of Frida Kahlo and Henri Matisse, humming the tunes of Disney’s "Moana" while painting,
    and proudly displays their creations on a dedicated corkboard in their bedroom, and they often invite a sibling to critique the color choices.
  travel: A tiny adventure seeker named Carmen Cervantes enjoys weekend trips to the nearby botanical garden and eagerly saves allowance for a family vacation to Disneyland, while dreaming of exploring
    the beaches of Maui and the historic castles of Scotland, and they keep a crayon‑drawn map on their bedroom wall to track imagined routes.
  culinary: A playful little chef named Carmen Cervantes loves mixing peanut butter and banana into a sticky sandwich, mastering the art of melting cheese for perfect macaroni, and occasionally sneaks a
    forkful of chocolate chip cookies before dinner, despite a habit of spilling milk on the kitchen floor, and they proudly serve their creations to stuffed animals during pretend tea parties.
  core: A meticulous, curiosity‑driven five‑year‑old named Carmen Cervantes organizes their world by color, hums while drawing, and can’t resist a glitter‑filled sticker, even if it means messy fingers,
    and they often line up their toys in perfect rows before bedtime.
background:
  cultural: Carmen is raised in a bilingual Mexican household in Lancaster, California. Her family speaks both Spanish and English at home and celebrates Mexican traditions such as Día de los Muertos, making
    homemade tamales, and creating colorful piñatas. She participates in local community festivals that feature mariachi bands and traditional dances. The values of familismo and respect for elders are
    woven into daily life, while growing up in Los Angeles County exposes her to a diverse mix of cultures, fostering her curiosity about varied experiences and ideas.
