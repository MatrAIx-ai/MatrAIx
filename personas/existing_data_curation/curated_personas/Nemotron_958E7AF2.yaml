  career_goals: Even at five, Carmen dreams of becoming someone who helps others and creates beauty. She imagines herself as an artist who paints colorful pictures that celebrate her family's stories, a
    teacher who shares the love of books with younger children, and a veterinarian who cares for animals. She also hopes one day to travel to new places to explore different cultures and ideas.
