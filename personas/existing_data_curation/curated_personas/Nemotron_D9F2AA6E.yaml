  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital art apps'', ''Reading fantasy novels'', ''Creative writing'', ''Scratch animation'', ''Nature walks and rock collecting'', ''Journaling'',
    ''Listening to indie folk music'', ''Volunteer library events'', ''Community clean‑up'', ''Board games with close friends'']'
  career_goals: Diana dreams of turning her love for art and empathy into a future career where she can inspire and support others. She imagines becoming an illustrator or graphic storyteller who creates
    inclusive, emotionally resonant work, possibly extending into art therapy or coordinating community art programs for kids. She also hopes to develop a small after‑school studio where she can mentor
    younger students in drawing and digital media, using creativity as a tool for emotional wellbeing and social connection.
