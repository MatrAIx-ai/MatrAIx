personas:
  professional: Diana Clouatre, an aspiring illustrator and budding digital storyteller at age twelve, blends watercolor, colored pencils, and tablet‑based animation to craft whimsical fantasy scenes while
    navigating a loosely structured art schedule that mirrors their preference for flexibility over rigid planning and they embrace a relaxed approach to deadlines.
  sports: Diana Clouatre enjoys weekend hikes along the Appalachian foothills, volunteers as a trail‑cleanup crew with the Blue Ridge Explorers club, joins informal soccer kick‑abouts with the Blue Ridge
    Wildcats youth league, and they tune in to watch the Carolina Panthers and Charlotte Hornets when friends gather.
  arts: Diana Clouatre draws artistic inspiration from the ethereal watercolors of John Singer Sargent, the folk melodies of Bon Iver and The Lumineers, the storytelling of fantasy author Sarah J. Maas,
    and they spend Saturday afternoons sketching scenes while listening to Bon Iver’s “Holocene” on repeat.
  travel: Diana Clouatre has trekked to Shenandoah National Park for a weekend nature retreat, visited the Smithsonian museums in Washington, D.C., and they dream of exploring the cherry blossom gardens
    of Kyoto, Japan, though a modest family budget keeps future trips to regional state fairs and nearby historic towns.
  culinary: Diana Clouatre loves munching on freshly baked cheese‑and‑herb scones, whipping up quick strawberry‑banana smoothies with Greek yogurt, and they experiment with vibrant beet‑infused cupcakes
    topped with powdered sugar dusted like paint splatters.
  core: Diana Clouatre is a creatively restless twelve‑year‑old who channels curiosity and compassion into art while they juggle occasional anxiety and a delightfully disorganized schedule.
background:
  cultural: Diana is raised in Pottsville, Pennsylvania, a town with a rich coal‑mining heritage and a tightly knit community ethos. Her family carries French‑Canadian roots reflected in the surname Clouatre,
    and they participate in local Catholic traditions, including church festivals and community gatherings. The town's cultural fabric blends Appalachian folklore, church‑based charity, and school‑driven
    arts programs, which have nurtured Diana's appreciation for art, storytelling, and collective harmony. While she enjoys the small‑town closeness, she also values the broader currents of contemporary
    media and artistic expression that reach her through school and the internet.
