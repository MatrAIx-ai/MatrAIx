personas:
  professional: Gary Holt, a 30-year-old compensation specialist, leverages expertise in compensation design, benefits administration, and data analytics (Excel, SQL, Tableau) to craft data-driven pay structures,
    while their curious, relaxed, and sociable nature fuels experimentation with innovative reward models and collaborative workshops that feel more like improv sessions than formal presentations.
  sports: Gary Holt channels his energetic, sociable streak into weekly beach-volleyball matches with the Tampa Beach Volleyball Club, roots for the Tampa Bay Buccaneers on Sundays, cheers on the Lightning
    during hockey season, and squeezes in early morning runs along the Tampa Riverwalk to maintain fitness.
  arts: Gary Holt frequents the Tampa Museum of Art to admire works by Kehinde Wiley, captures urban murals reminiscent of Banksy's style through street-art photography, joins improv nights where they channel
    the playful energy of Second City alumni, and streams indie musicians like St. Vincent and local saxophonist Esperanza Spalding for creative inspiration.
  travel: Gary Holt's travel style blends spur-of-the-moment city escapes with curated cultural tours, having already explored New Orleans' jazz scene, Berlin's street-art districts, and Lisbon's seafood
    markets, while dreaming of immersing in Kyoto's temples and Barcelona's modernist architecture, all booked on a flexible calendar that leaves room for spontaneous board-game meet-ups with friends.
  culinary: Gary Holt, an adventurous home cook, whips up diverse dishes such as Thai green curry with kaffir lime leaves, homemade Argentinian empanadas seasoned with chimichurri, and a Sunday brunch of
    shrimp and grits spiced with smoked paprika, while regularly indulging in Tampa's fresh grouper tacos and seeking the umami depth of miso-marinated carrots at local food festivals.
  core: Gary Holt, a 30-year-old compensation guru, lives by the motto 'data drives delight,' yet habitually forgets to renew streaming subscriptions, prefers impromptu art hikes over rigid schedules, and
    balances a love for strategic board games with a relentless curiosity about every new pay model they encounter.
background:
  cultural: Gary grew up in a suburban neighborhood of Tampa, Florida, within a family of Anglo‑American roots who valued community involvement and a laid‑back coastal lifestyle. The multicultural milieu
    of the Gulf Coast—marked by Cuban, Haitian, and broader Latin American influences—shaped his appreciation for diverse artistic expressions and culinary flavors. While his cultural heritage is primarily
    white American, his upbringing in Pinellas County exposed him to a blend of Southern hospitality, outdoor recreation, and a growing emphasis on inclusivity, which informs both his personal interests
    and professional perspective on equitable compensation.
