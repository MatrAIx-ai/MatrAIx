  career_goals: In the next five years, Gary aims to earn his Certified Compensation Professional (CCP) credential and complete an MBA with a focus on strategic HR management. He envisions moving into a
    senior compensation manager role where he can shape organization-wide pay philosophies, introduce flexible benefits programs, and champion data‑driven compensation strategies. Long‑term, he aspires
    to become a regional compensation director or HR business partner, influencing corporate culture through innovative reward systems and contributing thought leadership at industry conferences and publications.
