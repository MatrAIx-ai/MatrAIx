persona_description: A historian who specializes in the study of African American and Bahamian history, particularly focusing on the post-slavery period in the Bahamas. He is interested in the political,
  economic, social, educational, religious, and criminal justice aspects of post-emancipation society, and how nonwhites used their majority in the electorate to gain control of the British colony after
  becoming a free society. He is also interested in the role that the islands' racial classification system played in post-slavery society.
