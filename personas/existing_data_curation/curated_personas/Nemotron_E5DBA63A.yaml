  hobbies: '[''fishing'', ''kayaking'', ''beach volleyball'', ''watching classic action movies'', ''reading business biographies'', ''playing acoustic guitar'', ''volunteering at community center'']'
  career_goals: Cleon aims to move up to a district‑manager role within the next five years, overseeing multiple retail locations and driving higher sales metrics through competitive performance initiatives.
    He plans to enroll in an MBA program part‑time to deepen strategic expertise, with a long‑term ambition of launching his own boutique retail concept that blends predictable operational standards with
    the flexibility he values. He also seeks to become a corporate mentor for emerging supervisors, leveraging his practical experience to shape future talent.
