personas:
  professional: Cleon Devoe, an experienced retail operations manager with a toolbox of staff scheduling, inventory control, POS administration, and data‑driven performance analysis, channels their love
    of structure into clear SOPs while allowing enough wiggle room for spontaneous, flexible decision‑making.
  sports: Cleon Devoe, an avid participant in a local beach‑volleyball league and member of the Biscayne Kayak Club, tracks the Miami Heat, Miami Dolphins and Miami Marlins with the same competitive intensity
    they bring to their own weekend matches, favoring early‑morning paddle sessions over gym workouts to maintain a flexible fitness routine.
  arts: Cleon Devoe, a casual acoustic‑guitar player who strums John Mayer's "Gravity" on their porch after binge‑watching classic action icons like Bruce Lee, Sylvester Stallone and the original "Die Hard"
    film, finds that these cinematic heroes shape their personal soundtrack and provide a nostalgic escape from the retail floor.
  travel: Cleon Devoe, who prefers a blend of spontaneous weekend getaways to the Bahamas and Key West and carefully plotted business trips to London for their part‑time MBA, balances their love of sun‑soaked
    waterways with a competitive desire to check off adventurous destinations like Belize and the Dominican Republic before their mid‑40s.
  culinary: Cleon Devoe, an enthusiastic home cook who whips up grilled grouper with mango‑salsa, classic key‑lime pie, and the occasional Cuban sandwich seasoned with pickled onions and mojo sauce, relies
    on a decent set of kitchen tools but often improvises when a fresh catch inspires a spontaneous recipe.
  core: Cleon Devoe, a data‑driven retail veteran who balances a love of structured SOPs with a laid‑back penchant for last‑minute fishing trips, often trades a well‑planned budget for a new fishing reel,
    and silently debates the heroics of classic action stars while strumming an acoustic guitar at dawn.
background:
  cultural: Cleon grew up in a middle‑class white family in the southeastern United States, completing a bachelor's degree in business before moving to South Florida after college. He identifies with mainstream
    American cultural norms, celebrating holidays such as Thanksgiving and the Fourth of July with family and friends. Living in Hollywood, Broward County, he embraces the laid‑back coastal lifestyle while
    respecting the region’s cultural diversity, often incorporating local seafood dishes into his meals and engaging with the multicultural community through volunteer work.
