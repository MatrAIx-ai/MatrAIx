personas:
  professional: Lafonda Brescia, an aspiring young ecologist who blends curiosity with practicality, develops Scratch‑based interactive stories about local wildlife while diligently cataloguing observations
    in a field journal that doubles as a project log for her Girl Scout badge work.
  sports: Lafonda Brescia, a dedicated hiker on the Jackson County Trail Club, spends weekends trekking the Pine Ridge loop, supports the junior soccer team the Jackson County Jaguars, and joins the school’s
    winter cross‑country squad to stay fit while appreciating the quiet of nature.
  arts: Lafonda Brescia, a budding sketch artist, fills spiral notebooks with delicate watercolour landscapes inspired by Claude Monet and the serene scenes of Hayao Miyazaki’s My Neighbor Totoro, while
    her evenings are spent curled up with Maggie Stiefvater’s The Raven Cycle and the indie pop songs of Olivia Rodrigo.
  travel: Lafonda Brescia, an inquisitive explorer, plans weekend trips to the nearby Mount Hood National Forest for bird‑watching, dreams of visiting Iceland’s Blue Lagoon, and keeps a scrapbook of postcards
    from her family’s annual summer road‑trip across the Pacific Northwest, all while balancing the modest budget of a middle‑schooler.
  culinary: Lafonda Brescia, a modest home cook, enjoys whipping up carrot‑and‑ginger soup in honor of her pet rabbit, perfects peanut‑butter‑apple snacks for after‑school hikes, and can recite the steps
    for classic grilled cheese while still learning to bake a proper chocolate chip cookie without burning the edges.
  core: Lafonda Brescia, a quietly curious 12‑year‑old, turns solitary wonder into organized projects, balances worry with meticulous planning, and refuses to let a single misplaced LEGO brick ruin a perfectly
    built model.
background:
  cultural: Lafonda comes from a white, Midwestern‑ancestry family that settled in Central Point, Oregon. The region’s Pacific Northwest culture—characterized by a love of the outdoors, community volunteerism,
    and self‑reliance—shapes her daily life. Family gatherings often feature stories of early settlers and an appreciation for nature, while school and local organizations emphasize environmental stewardship
    and modest, practical values. This blend of heritage and local culture supports her curiosity about the natural world and her practical, organized approach to responsibilities.
