  career_goals: Lafonda aims to graduate high school with strong grades in science and math, then pursue a degree in environmental science or wildlife biology at a university in the Pacific Northwest. Her
    long‑term ambition is to work on conservation projects that protect Oregon’s forests and waterways. Additionally, she hopes to develop a peer‑support initiative at her future school to help classmates
    manage stress, reflecting her desire to combine practical problem‑solving with compassionate outreach.
