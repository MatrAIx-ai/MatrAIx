personas:
  professional: Dawn Hankins, a retired community organizer and genealogist, channels a methodical, detail‑driven approach into budgeting, spreadsheet‑based event planning, and mentoring grandchildren on
    practical life skills, while their critical and competitive nature drives them to ensure every project exceeds exacting standards, and they take pride in seeing each event run flawlessly.
  sports: Dawn Hankins, they stay active through daily garden walks, weekly senior yoga at the St. George Community Center, and avidly follow the Utah Jazz and BYU Cougars, while cheering on the local senior
    walking club that meets at Sunset Park every Saturday.
  arts: Dawn Hankins, they immerse themselves in classic mystery novels by Agatha Christie, historical non‑fiction by David McCullough, and find inspiration in the desert‑inspired paintings of Georgia O'Keeffe
    while knitting geometric patterns to the soft jazz of Ella Fitzgerald.
  travel: Dawn Hankins, they prefer carefully planned road trips to nearby national parks such as Zion and Bryce Canyon, enjoy staying at senior‑friendly lodges, and nurture a long‑standing wish to visit
    the historic libraries of Oxford and the cherry blossoms of Kyoto, balancing wanderlust with a need for comfort and predictability.
  culinary: Dawn Hankins, they delight in crafting quinoa tabbouleh with fresh mint, roasted butternut squash soup, and lavender‑infused honey tea, modestly self‑identifying as a competent home cook who
    keeps a well‑organized pantry of herbs, yet they sometimes over‑season dishes in pursuit of perfect flavor balance.
  core: Dawn Hankins, they blend a lifelong love of order with a quiet competitive streak, turning gardening, knitting, and budgeting into precise crafts while habitually worrying about every detail and
    occasionally hoarding spare change for unexpected garden repairs.
background:
  cultural: Dawn grew up in a mid‑western, white, Protestant family before moving to the inter‑mountain West in early adulthood. Living most of her adult life in Saint George, Utah, she has been immersed
    in the region’s predominantly LDS cultural environment while maintaining a more secular and independent outlook. Her values reflect traditional small‑town American norms—self‑reliance, community service,
    and respect for order—yet her critical, skeptical temperament keeps her at a respectful distance from overt religious rituals. She participates in inclusive community events throughout Washington County
    and preserves her personal heritage through family traditions, holiday celebrations, and regional culinary customs.
