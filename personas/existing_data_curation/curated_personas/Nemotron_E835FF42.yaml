  hobbies: '[''desert gardening'', ''succulent arranging'', ''pruning fruit trees'', ''reading historical non-fiction'', ''reading classic mysteries'', ''crossword puzzles'', ''word searches'', ''knitting'',
    ''quilting'', ''bridge'', ''genealogy research'', ''volunteering at library'']'
  career_goals: Although retired, Dawn remains focused on personal legacy and community contribution. She aims to complete a memoir documenting her family’s history for future generations, and to mentor
    her grandchildren in practical life skills such as budgeting, gardening, and basic home maintenance. She aspires to lead a small seniors’ advisory committee that advocates for improved accessibility
    in Saint George public spaces, and to expand her desert garden so she can donate surplus produce to the local food bank. Maintaining her health and independence through regular exercise and medical
    check‑ups is a priority, as is refining her knitting techniques and occasionally teaching a weekly knitting circle.
