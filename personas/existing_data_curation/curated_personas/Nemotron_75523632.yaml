  career_goals: Ferdinand aspires to turn his hands‑on abilities into a stable career. He envisions becoming an automotive technician or a small‑engine mechanic, where his practical problem‑solving and
    love for working with his hands can thrive. He also dreams of using his musical talent to contribute to his community, perhaps by leading the church youth choir or producing local gospel tracks. In
    the longer term, Ferdinand hopes to earn a certification in automotive technology, gain an apprenticeship at a local garage, and eventually start his own repair shop that can serve his neighborhood
    and provide jobs for other young people. He wants his work to be reliable, community‑oriented, and allow him to support his family while staying connected to the people he cares about.
