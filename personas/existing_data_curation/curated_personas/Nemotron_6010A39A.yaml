  hobbies: '[''recreational basketball league'', ''community bowling night'', ''fishing trips on Duck River'', ''gospel choir participation'', ''community build‑day volunteering'', ''cooking Southern barbecue
    and collard greens'', ''family gatherings and BBQs'', ''DIY woodworking projects'', ''exploring new tools and techniques'', ''attending Tennessee State Fair'']'
  career_goals: Devron aims to obtain a formal contractor's license within the next two years, enabling him to take on larger remodel projects and bid for public contracts. He dreams of opening a modest
    workshop where he can design and produce handcrafted furniture for local customers, blending traditional Southern styles with contemporary designs. He hopes to mentor a few apprentices, sharing his
    practical knowledge while learning newer construction technologies such as prefabricated panels and sustainable materials. Additionally, he wants to improve his business organization—perhaps by adopting
    simple project‑tracking software—to better manage schedules and finances, ensuring a stable income for his wife and children.
