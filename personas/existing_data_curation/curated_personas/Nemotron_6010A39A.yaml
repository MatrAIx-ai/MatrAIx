personas:
  professional: Devron Marshall is a seasoned carpenter with over twenty years of experience who blends practical problem‑solving with a curiosity for new building techniques, and despite a relaxed approach
    to scheduling, they consistently deliver custom woodworking projects and lead crew communication with a competitive edge.
  sports: Devron Marshall plays in a local recreational basketball league, bowls every Thursday with a community crew, fishes on the Duck River during summer weekends, and avidly follows the Tennessee Titans
    and Nashville Predators while occasionally joining a pickup golf round in the spring.
  arts: Devron Marshall sings in the church gospel choir, drawing inspiration from artists like Kirk Franklin and Aretha Franklin, and they enjoy attending the annual Tennessee State Fair for folk art exhibits
    and local blues performances by the band The Blue Harmonics.
  travel: Devron Marshall favors road‑trip adventures to nearby historic towns such as Natchez and Asheville, dreams of experiencing New Orleans’ Mardi Gras and the Great Smoky Mountains’ fall foliage,
    and usually plans trips around family gatherings and workshop downtime.
  culinary: Devron Marshall specializes in slow‑smoked pork ribs, collard greens seasoned with smoked paprika, and homemade cornbread, often experimenting with hickory chips and a secret mustard glaze while
    hosting weekly family barbecues that showcase their love for Southern comfort food.
  core: Devron Marshall is a hands‑on carpenter with a competitive streak, a love for gospel music, a habit of misplacing tools, and a relaxed yet determined approach to building and community life.
background:
  cultural: Devron is a Black man raised in a close‑knit African‑American community in central Tennessee. He grew up attending church regularly, where gospel music and communal support shaped his outlook.
    Family gatherings often revolve around Southern comfort food, storytelling, and celebrations such as Juneteenth and Thanksgiving. While the region is predominantly rural, he has absorbed both the African‑American
    heritage of resilience and the Southern culture of hospitality, outdoor recreation, and a strong work ethic. He values intergenerational lessons passed down from his grandparents about craftsmanship
    and community service, and he stays connected to his roots through church events, local festivals, and mentorship programs for younger Black youth interested in the trades.
