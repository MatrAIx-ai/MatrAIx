  hobbies: '["Organic vegetable gardening", "Traditional Mexican cooking", "Reading literature", "Organizing cultural festivals", "Birdwatching", "Quilting and crocheting", "Hiking local trails", "Genealogy
    research", "Community theater participation"]'
  career_goals: In retirement, Vanessa aims to preserve and share the Mexican‑American heritage of Linn County by creating a community cookbook that pairs cherished family recipes with stories from local
    seniors. She plans to compile a multilingual oral‑history archive of Mexican‑American families in the area and publish selected narratives as a modest memoir. Vanessa is committed to mentoring youth
    through a library reading program, leading workshops on sustainable gardening, and serving on the board of the Albany historical society to safeguard regional history. Her ambition is to foster intergenerational
    connections, promote cultural understanding, and continue learning new disciplines while remaining an active, contributing member of her community.
