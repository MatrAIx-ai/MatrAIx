  career_goals: Ariana aims to advance from a first‑line supervisor to an Operations Manager overseeing multiple farm sites, focusing on water‑wise and climate‑resilient production. She plans to earn a
    Certified Crop Adviser credential and enroll in an associate program in sustainable agriculture to deepen her technical expertise. Long‑term, she envisions launching a community‑driven urban garden
    in North Las Vegas that provides fresh produce to low‑income families while offering mentorship and job‑training opportunities for local youth, especially within the Vietnamese diaspora.
