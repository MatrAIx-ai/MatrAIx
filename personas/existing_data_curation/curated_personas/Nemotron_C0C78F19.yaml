  career_goals: Although retired from formal employment, Jacynth aims to deepen her impact on the local arts scene by volunteering as a docent at the nearby cultural museum, leading a monthly multicultural
    cooking workshop, and developing a community oral‑history project that records stories of Colombian immigrants in Long Island. She also hopes to travel back to Colombia to reconnect with her family
    roots, document traditional recipes, and bring new inspiration to her creative pursuits. Ultimately, she seeks to stay active, socially engaged, and intellectually stimulated while sharing her heritage
    with her neighborhood.
