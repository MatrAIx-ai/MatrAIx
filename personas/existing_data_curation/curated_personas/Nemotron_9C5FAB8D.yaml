personas:
  professional: Parker Ladue, a 17‑year‑old aspiring concept artist, leverages Procreate, Photoshop and basic Premiere video edits to craft surreal sci‑fi character designs while channeling their talkative,
    collaborative spirit into leading community art workshops and improv sessions.
  sports: Parker Ladue, a 17‑year‑old who enjoys staying active, plays pickup soccer with the Macomb County youth league in spring, glides on ice at a local rink for figure skating during winter, follows
    the Detroit Lions and Detroit Red Wings avidly, and uses weekend hikes in the Huron‑Manistee forest as a low‑key way to unwind.
  arts: Parker Ladue, a 17‑year‑old visual storyteller, draws daily inspiration from Octavia Butler, Neil Gaiman and the surreal paintings of H.R. Giger, shares sketch reels to TikTok set to Tame Impala's
    Elephant while jamming acoustic renditions of The Beatles' Blackbird, and regularly attends community theater improv nights to fuel their narrative improvisation skills.
  travel: Parker Ladue, a 17‑year‑old adventure‑seeker, favors spontaneous weekend road trips to nearby Detroit for street art tours, has visited Chicago's Museum of Contemporary Art, dreams of exploring
    Tokyo's Akihabara district for gaming culture, and carefully plans budget‑friendly stays using Hostelworld while balancing school commitments.
  culinary: Parker Ladue, a 17‑year‑old budding home‑chef, loves whipping up ramen with miso broth, avocado toast topped with smoked salmon and spicy chili‑chocolate brownies, experiments with fresh basil
    and lemons in pasta sauces, and often treats friends to improvised jam sessions paired with homemade pizza.
  core: Parker Ladue, a 17‑year‑old imagination‑driven multitasker, sketches surreal worlds, strums acoustic chords, battles anxiety with online art marathons, and can’t resist late‑night game launches
    despite a tight budget.
background:
  cultural: Parker grew up as a White Midwesterner in Macomb, Michigan, an area shaped by its proximity to Detroit's automotive legacy and vibrant Motown music scene. His family traces roots to German and
    Irish immigrants, a heritage reflected in modest, community‑oriented values and a strong work ethic. The suburban environment blends the quiet of residential neighborhoods with easy access to cultural
    hubs like the Detroit Institute of Arts and local music festivals. Parker’s upbringing in a diverse county exposed him to a mix of cultural influences—from classic rock to modern indie sounds—fostering
    an appreciation for artistic expression. He attends a local church on holidays, which reinforces his cooperative and considerate nature, and participates in community youth programs that celebrate creativity
    and social connection.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Concept art and storyboarding'', ''Basic video editing (Premiere)'', ''Public speaking and event facilitation'', ''Social media content creation
    (TikTok, Instagram)'', ''Creative writing (short fiction, poetry)'', ''Collaborative project coordination'', ''Empathy and active listening'']'
  hobbies: '[''Daily sketching and digital painting'', ''Acoustic guitar playing and songwriting'', ''Creative sandbox gaming (Minecraft, Roblox)'', ''Reading speculative fiction and fan‑fiction writing'',
    ''Volunteering at local library art workshops'', ''Improv theater and open‑mic nights'']'
  career_goals: Parker aspires to turn his passion for visual storytelling into a career as a concept artist or multimedia designer for a game studio or advertising agency. He plans to enroll in a community
    college program in Graphic Design, leveraging his self‑taught portfolio to earn an associate degree and later transfer to a four‑year university for a BFA. Long‑term, he dreams of leading a creative
    team that produces immersive digital experiences, while also mentoring younger artists through community workshops. He envisions a side venture creating educational content on YouTube and TikTok that
    blends art tutorials with discussions on imagination and mental wellbeing, using his sociable nature to build an engaged audience.
