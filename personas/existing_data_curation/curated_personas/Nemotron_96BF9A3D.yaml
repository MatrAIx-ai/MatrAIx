  career_goals: Anthony dreams of becoming an astronaut or a scientist who explores space and the natural world, inspired by his visits to the Field Museum and the Adler Planetarium. He also imagines designing
    his own video games or creating comic books that blend art and innovative storytelling. A strong competitor, he hopes to earn a scholarship for soccer and maybe play for a major league team one day.
    Over time, he aspires to combine his love of art, technology, and exploration by studying engineering or architecture, shaping the cityscape he admires while helping others bring their ideas to life.
