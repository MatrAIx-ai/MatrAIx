persona_description: A manufacturing engineer who specializes in the design and implementation of full-mold casting processes, particularly for the production of complex and dimensional-critical parts.
  They have a deep understanding of the physics of vaporization and the use of foam patterns to create accurate and dimensionally accurate castings. They are skilled in the use of advanced materials such
  as aluminium, steel, nickel alloys, and copper alloys, and have experience with the manufacturing of cylinder heads, engine blocks, pump housings, automotive brake components, and manifolds. They are
  also knowledgeable about the advantages and disadvantages of full-mold casting compared to other casting processes, such as investment casting, and have experience with pattern costs and die use in the
  manufacturing process.
