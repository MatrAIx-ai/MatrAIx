  career_goals: At 77, Jacory’s primary career ambition is to maintain a stable, low-stress position that guarantees a dependable income for his family and helps him preserve his retirement savings. He
    hopes to transition gradually to a part-time or advisory role where he can share his decades of bookkeeping knowledge with younger colleagues, receive acknowledgment for his years of service, and keep
    his health benefits intact. A secondary goal is to reduce workplace anxiety by working in a predictable routine and, if possible, securing a modest raise that reflects his loyalty and expertise.
