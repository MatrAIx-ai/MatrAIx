persona_description: A robotic engineer and researcher who specializes in designing algorithms for collaborative robots and human-robot interaction, particularly in the field of control theory and human
  factors engineering. His research focuses on overcoming communication delays in information sharing to enable robots to make good decisions and coordinate their movements in a collaborative task, as well
  as designing algorithms that would enable self-driving cars to collaborate with human drivers and each other, and improving human-robot interaction. He is also working on developing an adaptive control
  box that would make it easier for a human in Location A to control a robot in Location B.
