  career_goals: Christian aims to advance to plant manager within the next few years, overseeing the implementation of Industry 4.0 technologies while preserving a strong safety culture. He is committed
    to mentoring emerging production leaders, launching a sustainability program that cuts waste by at least 20%, and fostering partnerships with local technical schools. In the longer term, he envisions
    transitioning to a consulting role that helps regional manufacturers adopt lean practices and supports community workforce development initiatives.
