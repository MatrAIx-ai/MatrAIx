  hobbies: '[''Desert Hiking'', ''Rock Climbing'', ''Mountain Biking'', ''Wildlife Photography'', ''Home Cooking'', ''Reading Medical Journals'', ''Electronics Tinkering'', ''Community Health Volunteering'',
    ''Acoustic Guitar'', ''Socializing at Breweries'']'
  career_goals: Oscar aims to earn paramedic certification within the next two years, transition into an EMT instructor role to share his practical knowledge, and pursue a supervisory position within Scottsdale's
    EMS department. He envisions developing a community outreach program that educates residents on emergency preparedness and first‑aid skills. In the longer term, he hopes to move into EMS management
    to influence response protocols, improve training standards, and contribute to a more resilient public health infrastructure while achieving financial stability and a balanced work‑life schedule.
