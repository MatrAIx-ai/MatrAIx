  hobbies: '[''Community soccer league'', ''Hiking and trail walking'', ''Reading historical novels'', ''Live music and local concerts'', ''Volunteering at community theater'', ''Cooking experimental dishes'',
    ''Traveling to cultural heritage sites'', ''Participating in debate club'', ''Landscape photography'', ''Board game nights'']'
  career_goals: Shane aims to become a senior project manager within the next three years, securing his PMP certification and expanding his portfolio to larger, multi‑disciplinary initiatives. He aspires
    to lead a corporate Project Management Office, shaping organizational processes that balance efficiency with innovative, human‑centered design. Ultimately, he envisions launching his own consulting
    practice, helping mid‑size firms integrate strategic foresight and agile flexibility while delivering measurable business outcomes.
