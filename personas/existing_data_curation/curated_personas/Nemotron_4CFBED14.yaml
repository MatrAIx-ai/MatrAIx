personas:
  professional: Gayle Cady, a 28‑year‑old freelance visual storyteller, blends watercolor illustration, Python‑driven data visualizations, and meticulous project planning to deliver branding and interactive
    media for small businesses and nonprofit arts programs, while they keep client collaborations calm and conflict‑free.
  sports: Gayle Cady stays active by beachcombing along the Gulf Shore, birdwatching in coastal marshes, and sunrise jogging, while cheering for the Tampa Bay Buccaneers and the Miami Marlins, and occasionally
    joining a local paddle‑board club for summer fitness.
  arts: Gayle Cady engages deeply with the arts, painting in a home studio inspired by watercolorist Agnes Pelton, attending gallery openings featuring works by contemporary Florida artist Lisa Robinson,
    reading speculative fiction by N. K. Jemisin and poetry by Ocean Vuong, and volunteering as a facilitator at community art workshops.
  travel: Gayle Cady favors low‑key, purposeful travel, having explored the historic streets of New Orleans for jazz and cuisine, the misty cliffs of Cinque Terre for sketching, and the tranquil islands
    of the Gulf for beachcombing, while dreaming of a future artist‑retreat visit to Kyoto’s traditional tea houses.
  culinary: Gayle Cady enjoys experimental cooking, often creating Gulf shrimp ceviche with mango and smoky chipotle, crafting vegan ramen infused with matcha broth, and topping dishes with fresh microgreens
    and fermented kimchi, all while modestly mastering the art of short‑bread pastry.
  core: Gayle Cady, the perpetually calm, imagination‑driven planner, turns every brushstroke and data point into quiet community‑focused creativity, though they sometimes hoard art supplies and procrastinate
    on tax filings.
background:
  cultural: Gayle grew up in a middle‑class white family in the coastal towns of the Florida Panhandle. Her upbringing blended the relaxed, community‑oriented lifestyle of the Gulf Coast with a broader
    American cultural exposure through school and travel. Family gatherings emphasized hospitality, self‑reliance, and a love of the outdoors, shaping her appreciation for nature and local traditions. Although
    her ancestry traces back to European roots, she identifies strongly with the regional culture of Navarre—its beach culture, small‑town values, and the emerging arts scene that thrives in nearby Pensacola.
    This background informs her commitment to nurturing community connections and celebrating creativity within a supportive, inclusive environment.
attributes:
  skills: '["Digital illustration (Adobe Photoshop, Procreate)", "Watercolor painting", "Creative writing (short stories, poetry)", "Research and fact‑checking", "Project planning and organization", "Event
