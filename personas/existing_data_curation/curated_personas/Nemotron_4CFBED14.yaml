  hobbies: '["Digital illustration", "Watercolor painting", "Creative writing", "Reading speculative fiction", "Beachcombing and marine nature walks", "Gardening", "Experimental cooking", "Yoga and meditation",
    "Attending local art exhibitions", "Volunteering at community art workshops", "Birdwatching", "Stargazing"]'
  career_goals: Gayle aspires to turn her artistic talents and organized mindset into a sustainable freelance career that blends visual storytelling with data visualization. She envisions launching a boutique
    creative studio that offers illustration, branding, and interactive media for small businesses and nonprofit arts programs. In parallel, she hopes to complete a Master’s degree in Art Therapy, allowing
    her to combine her calm, empathetic nature with her love of creative expression to support mental‑wellness initiatives in her community. Long‑term, she aims to establish a community art center in Navarre
    that provides workshops for youth and seniors, fostering a local culture of imagination and collaboration.
