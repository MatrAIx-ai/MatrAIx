  hobbies: '[''Community Potluck Planning'', ''Recreational Soccer'', ''Mexican Cooking'', ''Hiking'', ''Salsa Dancing'', ''Reading Self‑Development Books'', ''Journaling'']'
  career_goals: Victoria aims to transition from first‑line supervision to plant management within the next five years. She plans to earn a Six Sigma Black Belt and complete a bachelor’s degree in Business
    Administration or Industrial Engineering through part‑time study. Her ambition includes spearheading a continuous‑improvement program that integrates advanced analytics to further reduce waste and improve
    product quality. She also wants to champion initiatives that increase the representation of women and Latinx employees in supervisory roles, ultimately positioning herself as a transformative leader
    who balances operational excellence with inclusive workplace culture.
