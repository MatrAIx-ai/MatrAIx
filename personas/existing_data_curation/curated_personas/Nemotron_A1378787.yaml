    trails'', ''Experimental cooking'', ''Travel blogging'', ''DIY woodworking'']'
  career_goals: Edward aims to move into a senior engineering technologist role where he can lead cross‑functional R&D projects focused on sustainable manufacturing and smart‑factory solutions. Over the
    next five years he plans to obtain a Professional Engineer (PE) license, deepen his expertise in robotics and additive manufacturing, and eventually transition into an engineering management position
    that lets him mentor younger technologists. He also dreams of launching a small consultancy that helps regional manufacturers adopt green technologies and integrate artistic design elements into functional
    products.
