  career_goals: Scot is fascinated by how things work and often asks “why?” about animals, trucks, and the sky. He imagines becoming a scientist who discovers new things, a firefighter who helps people,
    or an architect who builds cool structures. His ambitions are playful and future‑oriented, reflecting a desire to explore, solve problems, and make a positive impact as he grows.
