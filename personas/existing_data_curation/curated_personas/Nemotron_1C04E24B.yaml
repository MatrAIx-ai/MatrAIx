  career_goals: Approaching retirement, Minnie aims to earn a promotion to lieutenant so she can oversee the precinct’s community‑outreach program and formalize a mentorship track for junior officers. She
    wants to introduce a structured, data‑driven approach to patrol scheduling that reduces overtime while enhancing public safety. Additionally, she aspires to serve as a liaison between the police department
    and local churches and civic groups, reinforcing trust and cooperation. Long‑term, she hopes to leave a legacy of a more organized, community‑focused precinct that values routine, reliability, and practical
    problem‑solving.
