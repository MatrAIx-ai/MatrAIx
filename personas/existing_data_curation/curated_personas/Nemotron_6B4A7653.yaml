personas:
  professional: An aspiring municipal office coordinator, Keevan Hall leverages their knack for schedule management, data entry, and conflict resolution to keep city programs humming, all while quietly
    fretting over missed deadlines.
  sports: An avid basketball player, Keevan Hall spends evenings at the neighborhood court and cheers for the Metro City Guardians, while also logging weekly miles with the Forest Park Joggers club to stay
    fit.
  arts: An enthusiastic choir member, Keevan Hall harmonizes with their church group and unwinds listening to R&B icons like H.E.R., hip‑hop legends such as Kendrick Lamar, and reggae classics from Bob
    Marley, while occasionally catching live performances at the downtown music venue.
  travel: A budget‑conscious explorer, Keevan Hall prefers weekend road trips to nearby state parks like Blue Ridge, dreams of vacationing in Jamaica’s coastal towns, and balances meticulous itinerary apps
    with last‑minute detours whenever a friend suggests a new spot.
  culinary: A home‑cooking enthusiast, Keevan Hall frequently prepares soul‑food staples like fried chicken and macaroni‑and‑cheese alongside Caribbean flavors such as jerk chicken and callaloo, deftly
    seasoning with thyme, Scotch bonnet peppers, and a dash of cinnamon.
  core: Keevan Hall blends meticulous routine with community spirit, juggling spreadsheets and choir rehearsals while secretly worrying about every detail, and can’t resist a late‑night basketball game
    even when an early morning jog looms.
background:
  cultural: Keevan is a Black Jamaican‑American who grew up in the Jamaica neighborhood of Queens, a culturally diverse enclave with strong Caribbean and African‑American influences. His family maintains
    traditions from Jamaica, including food, music, and celebrations such as Independence Day and Kwanzaa, while also observing broader African‑American cultural milestones like Juneteenth. He was raised
    in a close‑knit extended family and a church community that emphasizes mutual support, respect, and collective responsibility. This background informs his cooperative nature, his appreciation for routine
    family meals, and his desire to give back through community service.
attributes:
  skills: '[''Time management'', ''Data entry'', ''Basic bookkeeping'', ''Customer service'', ''Microsoft Office Suite (Excel, Word, PowerPoint)'', ''Event coordination assistance'', ''Community outreach'',
