  hobbies: '[''Playing basketball at the local court'', ''Cooking soul‑food and Caribbean meals for family'', ''Listening to R&B, hip‑hop, and reggae music'', ''Jogging in Forest Park'', ''Reading self‑help
    and personal development books'', ''Volunteering at a community center'', ''Singing in his church choir and taking part in outreach events'']'
  career_goals: Keevan aims to secure a stable, routine-driven role that allows him to apply his organizational strengths while contributing to his community. He plans to complete his associate degree in
    Business Administration and earn a Certified Administrative Professional (CAP) credential, targeting positions as an administrative assistant or office coordinator within a municipal agency or local
    nonprofit. His long‑term ambition is to become a trusted operations manager who can create efficient, supportive work environments, balancing reliability with a low‑stress atmosphere.
