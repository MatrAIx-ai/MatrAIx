persona_description: A scientist who is researching the potential applications of optogenetics in controlling heart cells, particularly with the goal of creating a new, more efficient and precise kind of
  pacemaker. They are excited about the prospect of using modified cells that respond to low-energy blue light to stimulate heart tissue to beat, and envision harvesting cells from a patient and genetically
  altering them to respond to light. They are interested in the immediate applications of the technique as a research tool, for probing the workings of heart cells or helping test for possible cardiac side
  effects in drugs. They are also aware of the challenges faced in making sure the pacemaker cells integrate properly with normal cells and the significant hurdles that must be overcome for biological pacemakers
  to outperform regular pacemakers.
