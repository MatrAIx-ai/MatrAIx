personas:
  professional: Shenice Perron is a budding scientist‑artist hybrid who transforms their curiosity about space and folklore into hands‑on projects at the Greensboro Science Center and Weatherspoon Art Museum,
    while methodically planning each mixed‑media artwork with the precision of a young engineer.
  sports: Shenice Perron plays left‑midfield for the Greensboro Youth Soccer Club’s U‑9 team, eagerly cheering on North Carolina FC and the Carolina Hurricanes, and uses soccer practice as a structured
    outlet for their organized mind and to release emotional tension.
  arts: Shenice Perron devotes weekend afternoons to creating vibrant mixed‑media collages inspired by Van Gogh’s Starry Night and the soulful rhythms of Aretha Franklin, often showcasing their latest pieces
    during family art nights at the Weatherspoon Art Museum.
  travel: Shenice Perron dreams of a family road trip to the Kennedy Space Center after saving allowance, while already cherishing day‑long visits to the Greensboro Science Center and occasional weekend
    trips to the Asheville Mountain Art Fair for fresh creative fuel.
  culinary: Shenice Perron tends a small herb garden of basil, mint, and rosemary, then mixes the fresh leaves into homemade pizza sauce and cucumber‑mint water, though they sometimes forget to wash their
    hands after gardening, leading to occasional snack‑time messes.
  core: Shenice Perron is an eight‑year‑old explorer whose meticulous planning fuels artistic experiments and scientific curiosity, while frequent anxiety drives them to seek calm through journaling, dance,
    and a thriving herb garden.
background:
  cultural: Shenice grows up in a close‑knit African American family in Greensboro, North Carolina, where community, tradition, and heritage are celebrated. Family gatherings often feature soul food, storytelling,
    and music that connect her to her cultural roots. She attends a local church where she enjoys choir rehearsals and learning about African American spirituals. Her parents encourage her to explore Black
    history through books, museum visits, and community events such as Juneteenth celebrations and local Black arts festivals. This environment nurtures her appreciation for art, history, and collective
    uplift, while also fostering resilience and a strong sense of identity.
attributes:
  skills: '["reading comprehension", "basic arithmetic", "creative drawing", "digital literacy", "organizational planning", "collaborative teamwork", "leadership in group projects"]'
  hobbies: '["drawing and painting", "visiting science and art museums", "reading chapter books and biographies", "after‑school soccer", "dance to R&B and gospel music", "building LEGO models", "writing
    short stories", "gardening"]'
  career_goals: Shenice dreams of a future where she can combine her love for art and curiosity about the world. She often expresses a desire to become an artist who creates stories through visual media,
    a teacher who inspires other children to explore ideas, or a scientist who discovers new inventions. Occasionally she mentions wanting to be a veterinarian because of her compassion for animals, or
    an astronaut to explore outer space. Her ambitions are guided by a wish to help others, share knowledge, and continue learning throughout her life.
