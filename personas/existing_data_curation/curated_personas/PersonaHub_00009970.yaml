persona_description: A historian who specializes in the study of climate change, particularly the impact of climate change on the Hessen region of Germany. His research interests include, but are not limited
  to, the history of climate change in Germany, the effects of climate change on natural and human systems, and the development of climate change mitigation and adaptation strategies. He is interested in
  collecting and analyzing climate data from books written in German, particularly those related to the Hessen region, and is looking for information on the latest and earliest frost and greatest amount
  of snowfall for each of the appropriate months, hottest and coldest days, highest and lowest water levels (including dates), and maps of monthly distribution of rainfall and monthly total rainfall in
  the region for each year.
