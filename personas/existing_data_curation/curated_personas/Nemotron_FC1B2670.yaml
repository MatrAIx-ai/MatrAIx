personas:
  professional: Jacqueline Hernandez, a budding storyteller and drama club lead, channels their curiosity and love of the spotlight into crafting spontaneous mini‑plays and illustrated comic strips for
    classmates, though their relaxed approach sometimes leaves storyboards scattered across the floor.
  sports: Jacqueline Hernandez plays forward for the Danville Youth Soccer Club, cheers for the Kentucky Wildcats during March Madness, and enjoys weekend bike rides along the nearby Kentucky River Trail,
    approaching fitness with energetic enthusiasm but often forgetting to stretch before games.
  arts: Jacqueline Hernandez delights in drawing vibrant comic panels inspired by the bold colors of Frida Kahlo and the whimsical worlds of Studio Ghibli, sings traditional folk songs like 'La Cucaracha'
    while practicing flamenco steps with a wooden spoon as a makeshift castanet, and frequently quotes lines from Disney's 'Moana' during school talent shows.
  travel: Jacqueline Hernandez loves family road trips to the Great Smoky Mountains and occasional visits to her grandparents’ hometown in a Mediterranean country, dreaming of exploring Barcelona's colorful
    streets while balancing the desire for adventure with the practical limits of school schedules and a modest allowance.
  culinary: Jacqueline Hernandez enthusiastically helps her mom roll dough for churros sprinkled with cinnamon sugar, savors Kentucky fried chicken with a side of coleslaw, and proudly mixes up a simple
    homemade salsa for snack time, though she often leaves a trail of flour and glitter in the kitchen.
  core: Jacqueline Hernandez is a curious, talkative eight‑year‑old who blends flamenco flair with Kentucky charm, turning every school project, soccer game, and snack time into a stage for spontaneous
    creativity and friendly competition.
background:
  cultural: 'Jacqueline comes from a Spanish‑heritage family that settled in Danville, Kentucky. At home, Spanish is spoken alongside English, and her parents keep alive traditions from their homeland—celebrating
    festivals like Semana Santa with special meals, listening to flamenco guitar, and baking pastries such as churros. Family gatherings often feature paella, tapas, and stories about life in Spain, giving
    Jacqueline a strong sense of cultural identity. Living in rural Kentucky, she also embraces local customs: she enjoys Southern comfort foods, attends community events like county fairs, and participates
    in school activities typical of the region. This blend of Spanish warmth and Kentucky hospitality shapes her worldview, making her proud of both her ancestry and her hometown, and she likes to share
    bits of Spanish culture—like teaching friends simple Spanish phrases or dancing a quick flamenco step—during school projects and neighborhood celebrations.'
