  career_goals: Jacqueline dreams of turning her love of art and storytelling into a future career as a multimedia creator. She imagines designing illustrated books, animated short films, or interactive
    games that blend her Spanish heritage with the world around her. She is determined to win school art contests and hopes to one day be recognized as a young artist who inspires other kids to think outside
    the box. Jacqueline also talks about performing on stage—she wants to be an actress or a dancer who can bring stories to life, perhaps using flamenco moves in a modern theater piece. She is eager to
    join the school robotics club and aims to present a project at a regional science fair, showing her ambition to merge creativity with technology. Ultimately, Jacqueline aspires to be a leader in her
    community, using her charismatic personality to organize events that celebrate cultural diversity and encourage peers to explore their own talents.
