    and Event Planning'', ''Bilingual Communication (English/Spanish)'']'
  hobbies: '[''Community theater volunteering'', ''Organizing local Olive and Art Festival'', ''Sketching murals and street art'', ''Playing guitar – traditional Mexican music'', ''Cooking and experimenting
    with Mexican recipes'', ''Hiking and birdwatching in Sierra Nevada foothills'', ''Salsa dancing'', ''Reading modern art and design literature'', ''Attending workshops on public‑service innovation'']'
  career_goals: Antonio aims to transition into a senior regional director role where he can champion digital transformation of administrative services across multiple counties, integrating sustainable
    practices and culturally enriched workplace environments. He aspires to mentor the next generation of administrators, establishing a structured apprenticeship program within his organization. Over the
    next five years, he plans to launch a consultancy focused on helping small municipalities streamline operations while embedding community arts initiatives that boost employee morale and public engagement.
    Ultimately, he hopes to leave a legacy of more adaptable, people‑centered public services in Tehama County and beyond.
