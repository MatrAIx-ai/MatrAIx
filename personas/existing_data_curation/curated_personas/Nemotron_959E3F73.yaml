    (PowerShell, Python)'', ''Documentation and SOP development'', ''Change management'', ''Digital media integration and UI/UX basics'']'
  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Photography (landscape)'', ''Reading science-fiction and historical non-fiction'', ''Gardening native Texas plants'', ''Cooking Tex-Mex and Southern
    cuisine'', ''Small book club participation'', ''Volunteering at community art studio'', ''Exploring AR/VR technologies'', ''Yoga and mindfulness practice'']'
  career_goals: Elizabeth aims to advance to a senior leadership role such as Director of Information Technology or Vice President of Technology within a regional healthcare or education network. She plans
    to earn PMP and CISSP certifications to deepen her project and security credentials. Her long-term ambition is to spearhead a digital transformation initiative that leverages AI and data analytics to
    improve patient outcomes and operational efficiency. She also intends to mentor emerging women technologists, establish a community tech-training program for underserved youth in Jim Wells County, and
    maintain a healthy work-life balance that supports her family and local community involvement.
