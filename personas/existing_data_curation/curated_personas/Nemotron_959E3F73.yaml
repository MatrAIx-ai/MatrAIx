personas:
  professional: Elizabeth Beach is an IT strategist and manager who leverages her technical fluency in cloud platforms (AWS, Azure), cybersecurity, and process automation to lead cross-functional teams
    in healthcare and education settings, integrating design-thinking and UI/UX insights from her love of visual arts to craft user-centric digital solutions while maintaining rigorous budgets and compliance;
    they champion collaborative problem-solving and mentor junior staff.
  sports: Elizabeth Beach follows the Houston Astros, Dallas Cowboys, and Rio Grande Valley FC Toros, plays recreational tennis at the Rio Grande Valley Tennis Club, participates in weekly sunrise yoga
    at the Mission Valley Wellness Center, and enjoys jogging along the Mission River Trail during the cooler evenings.
  arts: Elizabeth Beach immerses themself in visual arts by regularly visiting the McAllen Museum of Art to view exhibitions by Texas creators such as Mary Jane Smith, drawing inspiration from Georgia O'Keeffe's
    desert palettes and the street works of Banksy, while practicing sunrise photography along the Rio Grande Valley and volunteering at a community art studio where they teach sketching to children.
  travel: Elizabeth Beach has road-tripped through the Hill Country wineries of Fredericksburg, hiked the rugged canyons of Big Bend National Park, and taken a cross-border culinary tour of Monterrey, Mexico,
    and dreams of wandering Kyoto's historic districts and the colorful murals of Valparaiso, Chile, always planning trips months ahead to fit their busy schedule.
  culinary: Elizabeth Beach delights in cooking Tex-Mex fusion dishes like chipotle-marinated carne asada tacos with roasted poblano peppers and fresh cilantro, perfects Southern comfort classics such as
    chicken-fried steak with buttery collard greens, experiments with native herbs like epazote and Mexican oregano in their signature salsa verde, and often finishes meals with a slice of homemade pecan
    pie.
  core: Elizabeth Beach balances a tech-savvy leadership role with a quiet love for sunrise photography, garden herbs, and an almost compulsive need to schedule everything—except the occasional late-night
    coffee binge that leaves an espresso stain on their favorite sketchbook, and they often laugh at themselves for over-planning the simplest meals.
background:
  cultural: Elizabeth grew up in a white, Anglo-American family in the coastal region of South Texas, where the cultural tapestry blends traditional Southern values with the vibrant Hispanic heritage of
    Robstown and Jim Wells County. Her childhood was shaped by community gatherings at county fairs, church services, and neighborhood barbecues, fostering a strong sense of neighborliness and self-reliance.
    Exposure to bilingual neighbors and local Tejano music broadened her appreciation for diverse perspectives, while her family's emphasis on education and hard work guided her pursuit of an IT career.
    She enjoys Texas-style country music, regional dishes like chili and enchiladas, and participates in local art festivals that celebrate both contemporary and folk art, reflecting a nuanced cultural
    identity rooted in the rhythms of South Texas.
attributes:
