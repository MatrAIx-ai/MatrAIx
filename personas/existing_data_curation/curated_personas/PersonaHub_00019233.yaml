persona_description: A neurologist and researcher who specializes in the study of Alzheimer's disease, amyloid plaques, and related brain changes. He or she is interested in identifying at-risk individuals
  for preventive therapies and tracking the progression of neurodegenerative changes in cognitively normal individuals. The researcher is familiar with high-resolution magnetic resonance imaging, positron
  emission tomography, and other imaging technologies used to study brain structure and function. The persona is also interested in the potential mechanisms underlying the development of Alzheimer's disease
  and the role of amyloid plaques in the disease process.
