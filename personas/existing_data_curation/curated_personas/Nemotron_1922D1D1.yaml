  career_goals: Although retired, Shannon’s ambitions focus on maintaining her health, independence, and community involvement. She aims to continue volunteering at the local senior center and her church,
    mentor younger relatives, and complete a memoir that captures her family’s history and lessons learned. She also plans to improve her digital literacy to better engage with her grandchildren via video
    calls and social media, and to attend health workshops that support active aging. Her overarching goal is to preserve her legacy while staying socially connected and personally fulfilled.
