  career_goals: Although retired, Sydney aims to stay actively engaged in her community. She plans to continue volunteering at the Livonia Senior Center, where she hopes to lead an intergenerational garden
    project that connects seniors with local schoolchildren. She also aspires to organize monthly literacy workshops for older adults and mentor newer volunteers, using her organizational strengths to ensure
    smooth operations. On a personal level, she seeks to maintain her health through regular walks and to document her family’s stories and recipes in a memoir that can be shared with future generations.
