  hobbies: '[''Pickup Basketball'', ''Community Fitness Boot Camps'', ''Barbecue Cooking'', ''Soul Food/Tex‑Mex Fusion Recipes'', ''Youth STEM Mentorship Volunteering'', ''Science‑Fiction & Tech Non‑Fiction
    Reading'', ''DIY Home Improvement'', ''Hiking in Texas Hill Country'', ''Juneteenth and Cultural Festival Attendance'', ''Jazz and Blues Music Appreciation'']'
  career_goals: Emerson aims to transition from industrial production manager to a plant director role within the next three years, eventually progressing to a regional operations vice‑president position.
    He plans to earn an executive MBA to broaden his strategic acumen and to obtain a Certified Production and Inventory Management (CPIM) credential. A core ambition is to spearhead sustainability initiatives
    that reduce waste and energy consumption while improving productivity. He is also passionate about cultivating a more inclusive workplace, mentoring young Black engineers, and later establishing his
    own consulting firm that helps mid‑size manufacturers adopt lean and digital transformation practices.
