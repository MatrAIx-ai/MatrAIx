personas:
  professional: Filipe Ricano, a seasoned family‑business leader with pragmatic strategic acumen, operational oversight, and bilingual communication, channels his talkative, community‑centered energy into
    motivating diverse teams and steering his company toward regional expansion while embedding robust CSR programs.
  sports: Filipe Ricano, an avid weekend soccer player in the Audrain County Amateur League, follows the St. Louis Cardinals in baseball and the Kansas City Chiefs in football, and balances his love for
    the game with occasional fishing trips to Lake of the Ozarks for relaxation.
  arts: Filipe Ricano, a devoted fan of folkloric marimba ensembles and a regular attendee of live music nights featuring the local jazz trio The Ozark Groove, also enjoys the cinematic works of Alejandro
    González Iñárritu and the paintings of Frida Kahlo, which inspire his community gatherings.
  travel: Filipe Ricano, a spontaneous planner who prefers short road trips over meticulous itineraries, often escapes to the rolling hills of the Ozarks or the historic streets of Antigua, while dreaming
    of a culinary pilgrimage to Oaxaca's bustling markets.
  culinary: Filipe Ricano, a skilled home cook who perfects traditional dishes like pepian, kak'ik, and tamales de elote, often experiments with local ingredients such as heirloom tomatoes, corn masa, and
    fresh cilantro, and enjoys hosting communal meals where salsa verde flows freely.
  core: Filipe Ricano, a sociable strategist who balances routine with spur‑of‑the‑moment gatherings, wrestles with chronic worry, and fuels his days with community cooking, soccer, and a perpetual quest
    for work‑life harmony.
background:
  cultural: Filipe is the son of Guatemalan immigrants and grew up bilingual, celebrating traditions such as Semana Santa, Día de los Muertos, and family festivals with music, dance, and cuisine. His cultural
    identity remains a cornerstone of his daily life, influencing his cooking, community involvement, and the emphasis he places on family solidarity and mutual support within the local Guatemalan diaspora
    in Missouri.
attributes:
  skills: '["Strategic Leadership", "Operational Management", "Financial Oversight", "Bilingual Communication (Spanish/English)", "Public Speaking", "Crisis Management", "Community Engagement", "Negotiation",
