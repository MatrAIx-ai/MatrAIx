  hobbies: '["Cooking Guatemalan cuisine", "Community gatherings", "Soccer", "Live music events", "Fishing trips", "Gardening", "Food bank volunteering"]'
  career_goals: Filipe aims to expand his company from a local operation into a regional brand that retains its personal touch while increasing profitability. He wants to embed stronger corporate social
    responsibility programs, mentor emerging entrepreneurs in Audrain County, and create a sustainable succession plan that preserves his family's legacy. Additionally, he seeks a healthier work‑life balance
    to mitigate stress and protect his emotional well‑being.
