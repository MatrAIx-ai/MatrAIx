  hobbies: '[''Native‑Plant Gardening'', ''Reading Historical Fiction'', ''Literary Criticism'', ''Hiking'', ''Birdwatching'', ''Volunteering at Historical Society'', ''Community‑Theater Attendance'', ''Knitting'',
    ''Seasonal Cooking'']'
  career_goals: Cathe aims to transition from her teaching‑assistant role to a senior curriculum coordinator position where she can shape interdisciplinary humanities programs across the district. She aspires
    to publish articles on inclusive pedagogy, mentor new educators, and lead professional‑development workshops that blend innovative technology with proven teaching methods. While she anticipates retiring
    within the next decade, she wishes to leave a lasting legacy of structured, student‑centered curricula and a supportive community for both learners and colleagues.
