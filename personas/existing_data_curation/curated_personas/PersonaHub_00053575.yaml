persona_description: A historian who specializes in the history of Romania, particularly the history of the Danubian Principalities and the formation of the modern Romanian state. He is particularly interested
  in the role of Focşani in the formation of the Romanian state and the impact of Zionism on the Romanian Jewish community. His research interests include the history of the region, the political and social
  changes, and the cultural heritage of the area. He is also interested in the military history of Romania and the role of Focşani in the formation of the fortifications during World War I.
