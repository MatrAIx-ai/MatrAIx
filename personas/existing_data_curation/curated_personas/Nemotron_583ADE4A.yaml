personas:
  professional: Hayman Viravong, a 20‑year‑old front‑desk clerk at the local visitor center, combines meticulous data‑entry and scheduling expertise with warm, culturally attuned communication, allowing
    them to seamlessly guide tourists while staying flexible enough to handle unexpected visitor surges.
  sports: Hayman Viravong enjoys hiking the Medicine Bow and Wind River ranges, practices trail running in the summer, follows the Wyoming Cowboys football team, and plays on a local co‑ed recreational
    soccer club that meets on Saturday mornings.
  arts: Hayman Viravong expresses creativity through acoustic guitar sessions of folk tunes by The Lumineers and John Hartford, intricate beadwork inspired by ancestral patterns, and a love of historical
    novels by James Michener, while curating storytime sessions at the town library featuring tales by Louise Erdrich.
  travel: Hayman Viravong prefers low‑key, nature‑focused trips, planning weekend hikes in Yellowstone and Grand Teton, while dreaming of a summer backpacking adventure through the Canadian Rockies, all
    balanced against a limited budget and a commitment to family responsibilities.
  culinary: Hayman Viravong enjoys cooking simple, hearty meals like herb‑roasted trout with wild berry compote and quinoa‑based salads, displaying a moderate cooking skill level and a particular fondness
    for locally sourced mushrooms and wild greens.
  core: Hayman Viravong, a 20‑year‑old caretaker of heritage and nature, balances deep curiosity with practical routine, yet often wrestles with worry that fuels both meticulous planning and occasional
    impulsive splurges.
background:
  cultural: Hayman is a descendant of the Eastern Shoshone and Northern Arapaho peoples who have long called the windswept plains and foothills of Wyoming home. Growing up near the Wind River Reservation,
    he was immersed in tribal gatherings, oral storytelling, and a deep respect for the land. These cultural roots shape his worldview, emphasizing harmony, community responsibility, and a strong connection
    to nature. He participates in seasonal powwows, assists with cultural events at the visitor center, and strives to honor his heritage in both his personal life and professional aspirations.
attributes:
  skills: '[''Customer service'', ''Front desk operations'', ''Phone and email communication'', ''Appointment scheduling'', ''Data entry'', ''Office software (Microsoft Office, Google Workspace)'', ''Office
    equipment troubleshooting'', ''Knowledge of local attractions and services'', ''Cultural liaison for Native community events'', ''Team collaboration and conflict resolution'']'
  hobbies: '[''Hiking in local mountain areas'', ''Nature photography'', ''Acoustic guitar playing'', ''Beadwork and traditional crafts'', ''Reading historical and folklore books'', ''Volunteering at the
    community library'', ''Mindfulness meditation'', ''Listening to podcasts on technology, environment, and Indigenous culture'']'
  career_goals: Hayman aims to strengthen his hospitality foundation by completing a certificate program in tourism or community services. He envisions moving into a supervisory role at a visitor or cultural
    center, where he can integrate his practical skills with his passion for sharing Native American history and environmental stewardship. Long‑term, he hopes to develop programs that promote cultural
    education and mental‑wellness outreach for youth in his community, while continuing to grow his own resilience to stress.
