  career_goals: Richard aspires to nurture his passion for art and creativity into a future career. He hopes to attend a specialized high‑school program in visual arts, eventually becoming a professional
    illustrator or concept artist for video games and graphic novels. His competitive streak drives him to win regional art contests and secure scholarships that will support his studies. He also envisions
    using his organizational talents to lead a youth art collective in Jefferson, where he can mentor peers and bring unconventional projects to the community. In the longer term, Richard dreams of founding
    a small studio that blends digital media with local craftsmanship, contributing to both the cultural life of his hometown and the broader creative industry.
