  hobbies: '[''Salsa dancing'', ''Bingo and trivia competitions'', ''Cooking Mexican cuisine'', ''Gardening (vegetables and herbs)'', ''Genealogy research'', ''Photography'', ''Quilting'', ''Church community
    events'', ''Senior center social activities'']'
  career_goals: Maribel aims to continue contributing her organizational expertise by mentoring younger staff members and volunteering as an administrative assistant for local community organizations. She
    hopes to sharpen her digital skills, particularly in using modern cloud-based tools, and to become a liaison between Spanish-speaking community members and local services. While she appreciates stability,
    she also seeks opportunities to apply her competitive spirit in friendly office contests and to lead small projects that improve office efficiency.
