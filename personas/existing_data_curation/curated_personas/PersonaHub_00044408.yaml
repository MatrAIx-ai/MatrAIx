persona_description: A researcher in the field of biophysics, specifically focusing on the study of cell membrane fusion and its role in cell development, disease, and cell-to-cell fusion. They are skilled
  in neutron scattering techniques, particularly small-angle neutron scattering, and have made significant contributions to our understanding of the fusion process through their research. Their work has
  been supported by the DOE Office of Science, and they have used neutron scattering to make direct observations of water in lipid bilayers used to model cell membrane fusion.
