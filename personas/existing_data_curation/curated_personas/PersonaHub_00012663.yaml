persona_description: A scientist who is interested in neuroscience and is actively involved in the BRAIN Initiative. They have expertise in neuroscience and are familiar with the research conducted within
  the initiative. They are likely to be familiar with the concept of neural circuits and their role in brain function. They are also likely to be interested in the development of cheaper, faster technologies
  that can trace connections between individual brain cells and record large networks of cells acting in synchrony. They are also likely to be interested in the principles for how the research within the
  BRAIN Initiative should proceed, such as sharing data publicly and helping researchers learn new skills.
