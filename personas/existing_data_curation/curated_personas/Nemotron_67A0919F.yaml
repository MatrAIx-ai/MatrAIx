personas:
  professional: Mark is a budding LEGO architect who spends hours constructing elaborate castles and bridges, applying a surprisingly practical eye for stability while delighting in spontaneous free‑play
    that often leaves half‑finished towers scattered across the living room, reflecting their curious yet relaxed approach to obligations.
  sports: Mark loves kicking a bright orange soccer ball in the community park, proudly wears a tiny Dallas Cowboys jersey, attends a toddler gymnastics class at the local recreation center, and cheers
    for the Irving Tigers youth soccer team, embodying a high‑energy, competitive spirit with a relaxed attitude toward structured practice.
  arts: Mark delights in dancing to country hits from Luke Bryan and Carrie Underwood while also humming pop tunes by Taylor Swift, loves watching animated films like Toy Story, and spends afternoons drawing
    bold pictures of cowboys and rockets with chunky crayons, reflecting a vivid, sociable artistic side.
  travel: Mark enjoys weekend trips to the Texas State Fair where they ride the Ferris wheel, loves the sensory overload of the Dallas Zoo, and dreams of a future family vacation to Disneyland, preferring
    spontaneous road trips with snack stops over meticulously planned itineraries.
  culinary: Mark prefers chicken nuggets, creamy mac and cheese, and sweet BBQ ribs at family barbecues, eagerly adds apple slices to their lunchbox, yet stubbornly refuses peas, and loves pretending to
    cook pizza using play‑dough, showcasing a selective palate with enthusiastic imagination.
  core: Mark is a curious, energetic three‑year‑old who builds towering LEGO castles, hoards coins, battles mild allergies, and chases soccer balls while humming country hits, all with a relaxed, slightly
    disorganized streak and a competitive sparkle.
background:
  cultural: Mark is being raised in a middle‑class white family in Irving, Texas, a suburb of Dallas County. His household reflects typical Texan cultural elements such as weekend family barbecues, listening
    to country and pop music, and occasional visits to local fairs. The diverse community around him introduces him to Spanish greetings and multicultural neighborhoods, providing a broad, inclusive cultural
    exposure while his family’s traditions remain rooted in mainstream American and Christian practices.
