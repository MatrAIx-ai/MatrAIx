persona_description: Graciela Iturbide is a Mexican photographer known for her work in documenting the lives of marginalized groups and her focus on feminism. Her photography style is based on her interest
  in culture, ritual, and everyday life in Mexico and other countries. Iturbide's work often explores the relationships between man and nature, the individual and the cultural, the real and the psychological,
  and continues to inspire a younger generation of photographers in Latin America and beyond.
