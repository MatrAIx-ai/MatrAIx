personas:
  professional: Misty Moreno, a retired homemaker turned senior‑center volunteer mentor, blends meticulous budgeting skills and a love for genealogy into practical life‑skills workshops while quietly compiling
    a family memoir that mirrors her competitive bridge play and reverence for community heritage.
  sports: Misty Moreno enjoys daily walks along the creek, seasonal bird‑watching hikes, participates in the senior center's low‑impact fitness class, and follows the Atlanta Braves and Georgia Bulldogs
    on television, treating each outing as a gentle competition against personal stamina.
  arts: Misty Moreno channels quiet creativity into knitting heirloom‑patterned scarves, singing in the church choir, and savoring classic country legends like Dolly Parton and Johnny Cash, while finding
    solace in historical fiction set in the American South that fuels her love of narrative without overwhelming social demands.
  travel: Misty Moreno prefers short, well‑planned road trips to historic towns such as Savannah, Charleston, and Asheville, where they can stroll heritage districts, sample local fare, and return home
    in time for regular knitting circles, all while balancing a modest travel budget and limited mobility.
  culinary: Misty Moreno excels at preparing classic Southern comfort foods—crispy fried chicken, slow‑cooked collard greens, and peach cobbler—while swapping out heavy oils for healthier alternatives,
    seasoning dishes with garden‑fresh herbs, and delighting in the occasional indulgent sweet tea with a splash of fresh lemon.
  core: Misty Moreno is a detail‑oriented yet relaxed 73‑year‑old who turns her competitive spirit and high emotional sensitivity into a disciplined rhythm of knitting, gardening, community mentoring, and
    Southern cooking, all while keeping a skeptical eye on the world.
background:
  cultural: Misty is a white Southern woman born and raised in Georgia, deeply rooted in the cultural fabric of Jackson County. Her upbringing emphasized Southern hospitality, strong family ties, and a
    close connection to the local church community, where weekly services and small fellowship gatherings remain central to her social life. Traditional Southern cuisine, seasonal farming cycles, and a
    respect for self‑reliance have shaped her daily rhythms. While she values the predictability of long‑standing customs, she also embraces the modest flexibility needed to adapt to changing family and
    health dynamics. Her cultural identity blends the modest, community‑oriented values of rural Georgia with a personal resilience cultivated over decades of lived experience.
