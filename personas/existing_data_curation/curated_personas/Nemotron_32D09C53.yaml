  hobbies: '[''Yoga'', ''Weight training'', ''5K running club'', ''Jigsaw puzzles'', ''Logic puzzles'', ''Italian cooking'', ''Hiking'', ''Strategy board games (e.g., Catan, chess)'', ''DIY home improvement
    projects'']'
  career_goals: Helen aims to advance from a skilled installer to a crew foreman within the next two years, leveraging her organized work style and proven reliability. She plans to obtain a California Contractor’s
    License and a formal certification in drywall finishing (e.g., NDT‑Certified Drywall Finisher) to broaden her qualifications. In the longer term, Helen envisions founding a small, employee-owned contracting
    firm that specializes in high-quality interior finish work for single-family homes. To support these goals, she also intends to complete her high-school equivalency (GED) and enroll in evening courses
    on construction project management, positioning herself for future supervisory and business-ownership roles.
