  hobbies: '[''Gardening'', ''Cooking'', ''Reading historical fiction'', ''Walking local trails'', ''Volunteering at food pantry'', ''Knitting'', ''Community theater backstage work'', ''Crossword puzzles'']'
  career_goals: Yvette aims to advance into a store manager position within the next two years, leveraging her organizational strengths and leadership potential. She plans to complete a bachelor’s degree
    in Business Administration via online courses to deepen her strategic understanding of retail operations. In the longer term, she aspires to become a district manager or a retail operations consultant,
    focusing on process improvement and staff development across multiple locations. She also hopes to mentor younger employees, fostering a supportive work environment while maintaining the structured,
    predictably efficient operations she values. Balancing career growth with family life, Yvette envisions a gradual transition to a part‑time advisory role as she approaches retirement.
