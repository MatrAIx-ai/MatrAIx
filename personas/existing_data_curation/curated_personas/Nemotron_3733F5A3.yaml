personas:
  professional: Yvette Mann, a veteran retail associate, transforms the store floor into a well‑ordered showcase by leveraging her expertise with POS systems, inventory analytics, and visual merchandising,
    while her practical, community‑focused mindset drives her to train staff, resolve conflicts, and embed seasonal displays that echo the reliability and punctuality she learned from her New England upbringing.
  sports: Yvette Mann follows the Boston Red Sox and the New England Patriots with weekend devotion, runs the Merrimack River trail three times a week as part of the local Merrimack River Runners club,
    and joins a community pickleball league at the senior center, balancing competitive spirit with the low‑impact exercise they need for knee health.
  arts: Yvette Mann enjoys the backstage bustle of community theater productions, delights in the sounds of the Boston Symphony Orchestra, immerses themselves in historical fiction by Hilary Mantel and
    the films of Greta Gerwig, and unwinds by knitting scarves while listening to the folk tunes of Joan Baez, blending artistic appreciation with hands‑on creativity.
  travel: Yvette Mann prefers thoughtfully planned weekend getaways that blend seaside charm and historic intrigue, such as lantern‑lit walks through Salem, lobster‑fest meals on Martha’s Vineyard, and
    an annual pilgrimage to the Scottish Highlands to explore ancestral ties, while they balance travel costs by staying with family friends and using a detailed itinerary spreadsheet to keep each trip
    predictable.
  culinary: Yvette Mann delights in cooking classic New England fare—clam chowder, baked beans, and roasted turkey with sage stuffing—while incorporating fresh heirloom vegetables from their garden, favoring
    rosemary, thyme, and a dash of nutmeg in pumpkin pie, and they never pass up a perfect lobster roll from a trusted local seafood shack.
  core: Yvette Mann blends meticulous organization with a love of local traditions, turning retail aisles, garden beds, and family gatherings into well‑ordered rituals, all while indulging in late‑night
    crossword puzzles and occasional splurges on heirloom seeds.
background:
  cultural: Yvette was raised in a middle‑class New England family with English and Irish ancestry, reflecting the modest, hard‑working values common in the region. Growing up in the suburbs of Massachusetts,
    she internalized a strong sense of community responsibility, punctuality, and practicality. Her family traditions include celebrating Thanksgiving with a classic turkey dinner, participating in the
    annual Tewksbury street fair, and observing seasonal holidays with friends and neighbors. These cultural influences have shaped her appreciation for local history, civic engagement, and the collaborative
    spirit she brings to both her personal life and her role in retail.
attributes:
