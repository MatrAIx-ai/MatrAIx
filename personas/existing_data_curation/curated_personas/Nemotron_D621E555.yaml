  hobbies: '[''visiting art galleries'', ''sketching plating designs'', ''collecting vintage cookbooks'', ''food photography'', ''indoor herb gardening'', ''mindful nature walks'', ''watching culinary documentaries'',
    ''playing indie narrative video games'', ''attending open‑mic poetry events'']'
  career_goals: Marcus aims to formalize his culinary knowledge by earning a certification in culinary arts and eventually an associate degree. His short‑term goal is to become a sous‑chef, overseeing kitchen
    operations and mentoring junior staff. Long‑term, he envisions opening a modest café that merges his love of food with visual art, offering a space where patrons can enjoy thoughtfully plated dishes
    alongside rotating local art exhibits. Additionally, he hopes to create a community‑focused cooking‑class program that uses food preparation as a therapeutic tool for adults coping with anxiety and
    emotional distress.
