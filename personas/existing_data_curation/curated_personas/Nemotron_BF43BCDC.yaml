personas:
  professional: Edgar Pepper, a seasoned retail specialist with over three decades of front‑line cash‑handling and inventory mastery, leverages their meticulous attention to detail and pragmatic skepticism
    to streamline POS operations, de‑escalate customer conflicts, and produce clear shift reports, all while mentoring new staff and positioning themselves for a shift‑supervisor or store‑manager role that
    will later support their goal of co‑owning a convenience store after retirement.
  sports: Edgar Pepper follows ACC college football passionately, cheering on the Clemson Tigers and the Notre Dame Fighting Irish each Saturday, adds the roar of NASCAR races featuring drivers like Chase
    Elliott to their weekend rituals, competes in local fishing tournaments on Lake Worth, and unwinds with occasional pool games at the community bar while maintaining a modest membership in the senior
    softball league; they balance competitive viewing with a quiet appreciation for the sport's strategy.
  arts: Edgar Pepper indulges in historical nonfiction by authors such as David McCullough and classic mystery tales by Agatha Christie, while evening woodworking projects inspired by folk designs reveal
    their creative focus, model‑train setups echo nostalgic 1950s railway scenes, and the melodies of Johnny Cash and Patsy Cline often fill the background at church potluck gatherings; they find solace
    in the detail‑rich worlds of both literature and craft.
  travel: Edgar Pepper favors road‑trip itineraries that blend gentle adventure with historical immersion, regularly driving to the Blue Ridge Parkway for scenic fishing spots, planning weekend retreats
    to Colonial Williamsburg’s reenactments, and dreaming of a future pilgrimage to England’s National Railway Museum to deepen their model‑train passion, all while adhering to a modest travel budget; they
    prefer destinations that offer both quiet reflection and a chance to apply their practical planning skills.
  culinary: Edgar Pepper cultivates fresh tomatoes, basil, and rosemary in their backyard garden, which they transform into hearty marinara sauce, herb‑crusted chicken, and a summer salsa they frequently
    share at church potlucks, and their modest cooking skill shines most when canning pickled cucumbers or whipping up a classic apple pie using a store‑bought crust, all balanced with occasional smoked
    trout from their catches and a penchant for overindulging in the prairie‑style potato salad at gatherings.
  core: Edgar Pepper is a detail‑obsessed, routine‑driven retail veteran whose competitive streak fuels a love of football and NASCAR, while gardening, fishing, woodworking, and puzzles provide a calming
    counterbalance to a skeptical yet dependable outlook on life; they navigate daily decisions with a blend of practicality and quiet ambition.
background:
  cultural: Edgar was raised in a middle‑class, Southern‑Baptist family in central North Carolina, where community, tradition, and practicality are deeply valued. His upbringing emphasized respect for local
    customs, seasonal cycles, and the importance of family gatherings. He carries forward this heritage through his participation in church events, regional holidays like Fourth of July barbecues, and an
    appreciation for Southern culinary traditions. The cultural milieu has shaped his preference for routine, his pragmatic outlook, and his loyalty to the Garner community.
