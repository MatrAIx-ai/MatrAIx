  career_goals: Edgar aims to progress to a shift‑supervisor or store‑manager role within the next few years, leveraging his extensive cashier expertise to mentor younger employees and improve operational
    efficiency. He also hopes to acquire basic business‑management training so that, after retirement, he could possibly co‑own a small neighborhood convenience store with his wife, ensuring a stable income
    and continued community involvement.
