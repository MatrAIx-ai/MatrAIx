persona_description: A person who is interested in economics and finance, particularly in the valuation of assets and the impact of financial markets on the economy. They are curious about the use of mark-to-market
  as a measure of value and the potential for it to be distorted or toxic. They are also interested in alternative measures of asset value and how accounting rules could be set up to allow for other measures
  that would not force people and companies to take economically ruinous actions. They are open to the idea of whether these seemingly ruinous actions are actually good for the economy in the long term
  and how they affect individual people even if the total effect might be good in the long term.
