  career_goals: Dr. Walls aims to become a medical director or department chair, leveraging her leadership to embed health‑equity initiatives across the health system. She plans to secure a major research
    grant focused on racial disparities in chronic disease outcomes and to publish a seminal work linking art‑based interventions with stress reduction in clinical settings. Mentorship is a priority; she
    aspires to create a pipeline for underrepresented medical students and early‑career physicians. Additionally, she envisions developing a sustainable telehealth platform that expands access to rural
    and underserved communities in the Florida Panhandle, while gradually transitioning to a part‑time schedule that balances clinical work, teaching, and her growing involvement in community art programs.
