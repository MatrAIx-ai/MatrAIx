personas:
  professional: Dan Carlin, a four‑year‑old with a vivid imagination, already organizes neighborhood play dates like a tiny project manager, they love to draft elaborate treasure‑hunt maps and practice
    reporting on backyard wildlife.
  sports: Dan Carlin, a four‑year‑old, loves the local youth soccer league, cheers for the Carolina Panthers, spends weekends hiking the Blue Ridge trails with family, and always brings a nerf ball to the
    backyard for impromptu matches, they often challenge friends to friendly races.
  arts: Dan Carlin, a four‑year‑old, draws colorful dinosaurs inspired by cartoons, sings along to folk tunes from a local church choir, and has an unwavering fascination with the bright, animated works
    of Mo Willems, they also love to perform pretend puppet shows for family.
  travel: Dan Carlin, a four‑year‑old, has explored the sandy shores of Myrtle Beach, trekked the Great Smoky Mountains on family camping trips, and dreams of visiting Disney World’s Magic Kingdom next
    summer, they keep a scrapbook of pressed leaves from each adventure.
  culinary: Dan Carlin, a four‑year‑old, adores cheesy macaroni, chicken nuggets, and watermelon slices, enjoys sprinkling cinnamon on oatmeal, and likes to help stir batter for cocoa pancakes on weekend
    mornings, they sometimes sneak a bite of chocolate sprinkles when no one looks.
  core: Dan Carlin, a four‑year‑old whirlwind of curiosity, blends meticulous organization with boundless imagination, loves leading backyard adventures, hoards stickers, and may refuse bedtime for a new
    story, they often negotiate extra playtime by promising to tidy up toys.
background:
  cultural: Dan is raised in Travelers Rest, South Carolina, within a white, Southern, middle‑class family. His upbringing includes regular participation in community and church activities, appreciation
    for local festivals, and frequent outdoor recreation such as hiking and fishing. These Southern cultural influences combine with a modern family environment that encourages curiosity, creativity, and
    social interaction.
