persona_description: A conservation biologist or ecologist who is particularly interested in the conservation status and ecological impacts of rare and threatened coniferous species, particularly those
  found in mountainous regions. This person is likely to have expertise in species identification, habitat assessment, and the use of conservation technologies and strategies to protect and restore these
  species. They may also be knowledgeable about the IUCN Red List and other conservation databases, and may have experience working with organizations dedicated to the conservation of rare species. They
  are likely to be deeply committed to the protection and preservation of biodiversity, and may be actively involved in advocacy efforts to raise awareness about the importance of conservation.
