  career_goals: Leila aims to transition into a supervisory or lead role within the next two years, using her extensive frontline experience to guide a small team of representatives. She is focused on designing
    and implementing streamlined workflows that reduce average handling time while maintaining high satisfaction scores. Additionally, she wishes to formalize a mentorship program for new hires, sharing
    her methodical approach and customer-centric philosophy. As she approaches retirement, Leila envisions a phased-work arrangement that allows her to consult part-time for local small businesses on improving
    customer experience and integrating community-based art initiatives into corporate social responsibility projects. Ultimately, she hopes to leave a legacy of a more empathetic, efficient, and culturally
    aware service culture at her organization.
