  hobbies: '["Sketching & drawing", "Watercolor painting", "Photography (industrial & landscape)", "Visiting art galleries and museums", "Attending regional art fairs", "Fishing in Mobile Bay", "Hiking
    Gulf Coast trails", "DIY woodworking", "Listening to eclectic music", "Reading sci‑fi and popular science", "Playing creative video games"]'
  career_goals: Michael aims to move from his current laborer role to a shift supervisor position within the next two years, while completing a community‑college certification in logistics and supply‑chain
    management. He envisions eventually becoming a warehouse operations manager, leveraging his hands‑on experience and growing technical knowledge. Long‑term, he hopes to launch a small business specializing
    in art transportation and handling, merging his fascination with art and his logistical expertise. Further education, possibly an associate’s degree in supply chain, is part of his plan to broaden career
    prospects.
