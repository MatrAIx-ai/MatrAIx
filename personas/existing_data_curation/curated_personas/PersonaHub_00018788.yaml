persona_description: A global public health expert with expertise in the control and prevention of taeniasis/cysticercosis. This individual has experience in designing and implementing interventions to
  control and eliminate T. solium, and has collaborated with international partners to develop strategies for interrupting transmission and improving case detection and management of neurocysticercosis.
  This individual is interested in the latest research and developments in the field, and is eager to contribute to the ongoing efforts to combat taeniasis/cysticercosis.
