    installations'']'
  hobbies: '[''Abstract painting and mixed-media experimentation'', ''Creative writing (poetry, journaling)'', ''Reading philosophy, speculative fiction, and art history'', ''Walking and nature photography
    in local parks'', ''Attending community theater and live-music performances'', ''Gardening herbs and vegetables for cooking'', ''Cooking Mediterranean and experimental dishes'', ''Playing bridge with
    friends'', ''Volunteering as a museum docent'']'
  career_goals: Although officially retired, Sophia remains driven to deepen her artistic impact and foster cultural vitality within her community. She aspires to launch an annual 'Senior Voices' exhibition
    that showcases the work of older artists across Seminole County, providing a platform for intergenerational dialogue. She also hopes to edit and self-publish a memoir that weaves her personal journey
    with reflections on art, aging, and resilience. In addition, Sophia envisions establishing a modest pop-up studio in Winter Springs where she can offer free, spontaneous workshop sessions on painting,
    collage, and creative writing for local seniors. Ultimately, she seeks recognition as a cultural steward who bridges imagination with everyday community life.
