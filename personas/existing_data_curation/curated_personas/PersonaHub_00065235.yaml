persona_description: A museum enthusiast who is interested in history, technology, and science. They appreciate the museum's efforts in demonstrating the implications of progress in Science, Technology,
  Industry, and Medicine through the ages. They are likely to be interested in the museum's permanent exhibitions on transport and aviation, Norwegian industrial history, energy and electricity, music machines,
  the wood and metal industries, oil, gas and plastics, clocks and watches, calculating machines, computers, and the National Museum of Medicine. They would also be interested in the museum's collection
  of Norwegian computers, such as the first Norwegian computer NUSSE (Norsk Universell Siffermaskin, Sekvensstyrt, Elektronisk).
