  career_goals: Although retired, Amanda aims to become a recognized local historian by curating exhibits at the Fremont historical society and publishing a memoir that highlights mid‑century Midwest life.
    She also aspires to lead a senior‑focused community garden project, securing grants to expand it and organizing friendly competitions to foster intergenerational engagement. Additionally, she hopes
    to mentor younger volunteers in event planning and public speaking, ensuring her practical knowledge is passed on.
