personas:
  professional: Felix Tirado, a retired grocery-store owner turned community consultant, blends his pragmatic budgeting expertise with a genuine curiosity for digital tools, using his bilingual fluency
    and meticulous organization to mentor emerging entrepreneurs while flexibly adapting to the evolving needs of local cultural festivals.
  sports: Felix Tirado spends sunrise mornings casting lines in Cape Coral’s canals, follows the Tampa Bay Rays for baseball and the Miami Dolphins for football, and joins a senior walking group that meets
    thrice weekly at the community center, keeping his stamina for occasional salsa evenings.
  arts: Felix Tirado finds joy in the vibrant salsa beats of Celia Cruz and Marc Anthony, attends community dance showcases featuring traditional choreography, and escapes into historical novels by Ken
    Follett and biographies of Maya Angelou, while occasionally watching classic films starring Rita Moreno.
  travel: Felix Tirado favors low-key excursions, having road-tripped to the historic streets of St. Augustine and the wild beauty of the Everglades, recently explored New Orleans for its jazz parade, and
    dreams of wandering Andalusian villages in Spain and the sun-kissed beaches of the Bahamas.
  culinary: Felix Tirado reveres cooking, perfecting arroz con gandules with pigeon peas, smoked pork, and sofrito, mastering mofongo mashed with plantains and garlic, and grilling fresh snapper seasoned
    with lime, cilantro, and a side of mango-papaya fruit salad.
  core: Felix Tirado, an 89-year-old garden enthusiast and savvy mentor, balances disciplined budgeting with spontaneous salsa nights, often misplaces his glasses while hunting for the perfect fishing lure.
background:
  cultural: Felix was born and raised in a close‑knit Puerto Rican family where Spanish was spoken at home and Catholic traditions guided daily life. He grew up celebrating holidays such as Three Kings
    Day, San Juan, and the vibrant music of plena and bomba. After moving to Cape Coral in his later years, he blended his Caribbean heritage with Floridian coastal culture, maintaining bilingual ties,
    sharing Puerto Rican cuisine, and actively participating in local cultural events that celebrate both his roots and his adopted community.
attributes:
  skills: '["Financial Management", "Budgeting and Cost Analysis", "Strategic Planning", "Bilingual Communication (Spanish/English)", "Community Event Coordination", "Volunteer Program Management", "Bookkeeping",
