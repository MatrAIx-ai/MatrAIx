  hobbies: '["Gardening (tropical & native plants)", "Fishing", "Crossword Puzzles", "Reading Historical Fiction & Biographies", "Cooking Traditional Puerto Rican Cuisine", "Volunteering at Community Center",
    "Participating in Puerto Rican Festivals", "Attending Church Services", "Salsa Dancing", "Walking his dog"]'
  career_goals: Although retired, Felix remains motivated to give back. He aims to mentor younger entrepreneurs in the Puerto Rican community, share his knowledge through a series of informal workshops
    on budgeting and small‑business sustainability, and author a memoir that captures his life's journey from Puerto Rico to Florida. He also aspires to stay physically active, continue learning about sustainable
    gardening, and ensure the preservation of Puerto Rican cultural traditions within his local community.
