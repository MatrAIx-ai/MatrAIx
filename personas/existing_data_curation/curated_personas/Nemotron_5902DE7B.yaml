personas:
  professional: A budding junior storyteller and coder, Arlene Calcutt blends a love for fantasy writing, sketching vivid characters, and constructing LEGO worlds with early proficiency in Scratch, navigating
    projects with a curious yet laid‑back approach that favors creative spontaneity over strict schedules.
  sports: An avid nature enthusiast, Arlene Calcutt joins the neighborhood birdwatching hike club for spring trail outings, cheers on the local Minor League baseball team the River City Rattlers, and occasionally
    signs up for after‑school cross‑country practice, yet they prefer solitary wandering on the trails over organized team sports.
  arts: Immersing themselves in fantasy realms, Arlene Calcutt devours books by J.K. Rowling and Brandon Sanderson, crafts original short stories while sketching characters in the margins of their notebook,
    builds LEGO dragons to match those narratives, and fuels their creativity with the cinematic scores of Hans Zimmer and the folk tunes of Mumford & Sons.
  travel: Preferring spontaneous weekend road trips, Arlene Calcutt explores nearby Willow Creek Preserve for birdwatching, enjoys family visits to the city museum, dreams of hiking the Grand Canyon and
    strolling through the cherry‑blossom streets of Kyoto, and always packs a sketchbook and binoculars for unexpected adventures.
  culinary: Arlene Calcutt’s beginner‑friendly kitchen experiments range from baking chewy chocolate‑chip cookies with a pinch of sea‑salt, to whisking banana‑oat muffins spiked with cinnamon, and assembling
    classic peanut‑butter‑and‑jelly sandwiches on whole‑grain bread, though they sometimes forget to set the timer and end up slightly over‑browned treats.
  core: Arlene Calcutt is a curious feather‑collecting, notebook‑sketching teen who balances a love for fantasy storytelling with a laid‑back habit of forgetting chores, yet always finds the focus to finish
    a LEGO set before bedtime.
background:
  cultural: Arlene comes from a white, Midwestern family in Sidney, Ohio, a close‑knit small‑town community that values friendliness, modesty, and cooperation. Her upbringing includes family meals, participation
    in community events such as the county fair, and frequent trips to the local library and community center. The region’s agricultural heritage has given her familiarity with gardening and caring for
    animals, while school and church groups have reinforced her sense of harmony and helping others. This cultural setting supports her reserved nature, love of small‑group activities, and pragmatic outlook.
attributes:
  skills: '[''Basic computer literacy'', ''Introductory coding with Scratch'', ''Creative writing'', ''Sketching and illustration'', ''Simple cooking and baking'', ''Basic gardening'', ''Pet care'', ''Empathetic
