  hobbies: '[''Reading fantasy novels'', ''Writing short stories'', ''Sketching and doodling'', ''Birdwatching on local trails'', ''Caring for family dog'', ''Baking cookies'', ''Building LEGO creations'',
    ''Creating games in Scratch'']'
  career_goals: Arlene dreams of a career that combines her love of animals, nature, and helping others. She is interested in becoming a wildlife rehabilitator or a veterinarian, seeing these roles as practical
    ways to protect animal welfare. She also considers environmental science or park ranger work, which would let her explore the outdoors while contributing to conservation. To prepare, she plans to focus
    on science courses in high school, seek mentorship at local farms, and maybe use her coding skills to create educational tools about wildlife.
