persona_description: A journalist who covers education policy and social justice issues. The journalist is interested in the impact of racial segregation in schools and the ways in which it affects students'
  educational opportunities and outcomes. They are particularly interested in the issue of school resegregation and its effects on students of different races and ethnicities, as well as the role of school
  segregation in shaping educational opportunities and outcomes. They are also interested in the potential benefits of desegregated schools and the challenges of implementing such policies in the face of
  resistance and opposition.
