  hobbies: '["Gardening", "Cooking fusion Southeast Asian dishes", "Book club participation", "Hiking", "Tai Chi", "Digital photography", "Volunteer event coordination", "Attending cultural festivals",
    "Learning new languages (e.g., Japanese)", "Listening to music (classic and contemporary)"]'
  career_goals: Although retired from formal employment, Marivic seeks to channel her expertise into purposeful volunteer leadership. She aims to serve on the board of a local nonprofit that supports senior
    citizens, lead free workshops on small‑business budgeting for entrepreneurs, and expand a cultural‑exchange program that showcases Southeast Asian traditions to the broader Redmond community. Additionally,
    she hopes to author a series of blog posts sharing her cross‑cultural experiences and to continue learning new skills—such as data analytics and digital marketing—through online courses, ensuring she
    remains both curious and practical.
