  career_goals: Dat aims to build on his reputation for reliability and practical problem‑solving by moving into a supervisory office‑manager role within the next three to five years. He plans to earn the
    Certified Administrative Professional (CAP) credential and deepen his expertise in advanced Excel, project‑tracking software, and workflow automation. By developing leadership and coaching skills, he
    wants to oversee a small administrative team, streamline processes, and serve as the primary contact for internal and external community‑engagement initiatives. Dat also envisions contributing to workplace
    diversity programs that reflect his cultural heritage and sociable nature.
