personas:
  professional: Kyle is a budding junior problem‑solver who channels their curiosity and methodical planning into leading the school’s robotics club for kids, impressively coordinating teammates, troubleshooting
    code, and presenting polished projects with the same reliability they show in building LEGO structures.
  sports: Kyle is a spirited soccer enthusiast who captains the Riverbank Rangers U‑7 team, practices drills with the same precision they apply to LEGO builds, idolizes FC Barcelona forward Lionel Messi,
    and also joins after‑school swim lessons to stay fit during the summer.
  arts: Kyle is a creative cartoonist who sketches whimsical characters inspired by Dr. Seuss’s playful style and the dynamic panels of Marvel’s Spider‑Man, sharing their artwork with friends during recess
    and attending a weekend comic‑making workshop at the local library.
  travel: Kyle enjoys weekend family camping trips to Willow Creek State Park and eagerly anticipates a future visit to the interactive Science Museum in London, preferring hands‑on exploration over long
    flights, though they sometimes get impatient on car rides.
  culinary: Kyle is an eager junior chef who loves assembling pepperoni pizza with mozzarella and homemade tomato sauce, whisking strawberry‑banana smoothies with fresh yogurt, and proudly making peanut
    butter‑jelly sandwiches, though they occasionally over‑season the sauce in their excitement.
  core: Kyle is a relentlessly curious 7‑year‑old who balances methodical LEGO architecture with spontaneous soccer sprints, often getting so absorbed in building a LEGO spaceship that they forget to finish
    a homework assignment.
background:
  cultural: 'Kyle is raised in a white, Midwestern American family in Minneapolis. His household reflects typical Upper-Midwest values: a strong sense of community, appreciation for the outdoors, and participation
    in local traditions such as the Minnesota State Fair, ice-skating in winter, and summer picnics at the lake. He attends a public elementary school where multicultural events are celebrated, giving him
    exposure to the city’s diverse cultural fabric while his family maintains their own regional customs.'
