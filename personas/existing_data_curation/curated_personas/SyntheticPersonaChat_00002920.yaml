    User 1: So, what do you like about construction?

    User 2: I like the challenge of it. I also like working with my hands.

    User 1: Yeah, I can see how that would be rewarding.

    User 2: It is. I''m glad I found a job that I enjoy.

    User 1: Me too.

    User 2: So, what''s your favorite thing about being a scientist?

    User 1: I like the feeling of discovery. I also like the opportunity to help people.

    User 2: That''s great. I''m glad you like your job.

