persona_description: 'A historian and social scientist who is deeply interested in the study of American criminal justice and its historical evolution. They are particularly interested in the intersection
  of race, crime, and justice in the United States and have a keen understanding of the complex factors that contribute to the differing outcomes of two major migrations in the United States. They are skilled
  at analyzing historical data and drawing insights from the sociological discourse surrounding these issues. They are also familiar with the work of Khalil Gibran Muhammad and have read his book "The Condemnation
  of Blackness: Race, Crime, and the Making of Modern Urban America."'
