  career_goals: At 58, Furman aims to transition into a supervisory role where he can lead shift teams and spearhead continuous improvement initiatives across the plant. He aspires to mentor younger workers,
    develop a formal safety training program, and eventually consult for nearby manufacturing firms on efficiency and ergonomics. Parallel to his professional ambitions, he hopes to launch a small side
    business crafting handcrafted furniture and decorative pieces, blending his production knowledge with his artistic passions.
