persona_description: A scientist or engineer who specializes in the study of electrical discharges, particularly in the field of electrostatic discharge (ESD) protection. They are interested in understanding
  the behavior of electrical discharges, their effects on electronic components, and how to improve the performance of ESD protection systems. They have experience with various types of ESD protection systems,
  including air discharge and contact discharge, and are skilled in conducting measurements and experiments to investigate the effects of geometry on the waveforms and characteristics of these discharges.
  They are also familiar with state-of-the-art ESD protection components and are interested in understanding how they affect the behavior of ESD discharges.
