  career_goals: Ruth aspires to turn her love of art and critical thinking into a career that blends creativity with impact. She dreams of becoming a museum curator or art therapist, where she can design
    exhibits that challenge conventional narratives and provide emotional support to young people. In the short term, she aims to build a portfolio of digital artwork, secure a summer internship at a local
    cultural institution, and develop leadership skills through student council. She also envisions pursuing a degree in art history or visual communication while learning counseling techniques to help
    peers manage anxiety and sadness.
