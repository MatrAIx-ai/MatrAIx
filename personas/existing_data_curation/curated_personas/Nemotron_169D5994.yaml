    and brush painting'']'
  career_goals: She aims to progress to a senior leadership position—such as Director of Institutional Sales or Vice President of Wealth Management—where she can shape the firm’s strategy for high‑net‑worth
    clientele, especially those interested in alternative assets like art. Pursuing the CFA charter and advanced certifications in sustainable finance is a near‑term objective. Over the next five years,
    Chunhua intends to build a specialized advisory team that bridges finance and culture, publish thought‑leadership pieces on art‑linked investments, and become a regular speaker at industry conferences.
    She also aspires to mentor emerging women professionals in the financial sector and eventually launch her own boutique advisory practice focused on culturally informed investment solutions.
