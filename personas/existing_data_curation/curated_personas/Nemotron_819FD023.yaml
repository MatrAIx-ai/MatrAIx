  hobbies: '[''Photography'', ''Cooking Mexican Cuisine'', ''Theater and Open‑Mic Performances'', ''Chess'', ''Gardening'', ''Volunteering at Science Fairs'', ''Reading Science Nonfiction'', ''Walking Neighborhood
    Trails'']'
  career_goals: Although retired, Adan is determined to channel his curiosity and competitive drive into fostering the next generation of engineers. He aims to launch a free weekend STEM workshop series
    for underserved youth in North Hollywood, author a practical guide on applying engineering principles to everyday problems, and earn recognition as a community leader by securing a local award for volunteer
    education initiatives. He also plans to complete a personal project—designing and building an automated garden irrigation system—demonstrating his blend of curiosity and practicality while providing
    a structured outlet for his organized mindset.
