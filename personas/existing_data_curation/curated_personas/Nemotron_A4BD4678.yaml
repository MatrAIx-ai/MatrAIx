  hobbies: '[''coloring and drawing'', ''making papel‑picado crafts'', ''playing with dolls'', ''singing bilingual songs'', ''dancing to folkloric music'', ''riding a tricycle'', ''building sandcastles'',
    ''reading picture books'', ''helping with kitchen tasks'']'
  career_goals: Maria dreams of becoming a school helper or teacher because she enjoys guiding friends through daily routines, explaining new ideas in simple steps, and seeing others succeed. She also imagines
    helping families by cooking nutritious meals, reflecting her practical nature and desire to contribute to her community. At her age, she often says she wants to 'teach kids how to read and draw' and
    'make yummy tacos for everyone' when she grows up.
