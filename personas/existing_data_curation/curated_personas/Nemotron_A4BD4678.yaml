personas:
  professional: Maria Ramiro pretends to be a kindergarten teacher during playtime, meticulously arranging storybooks by color, leading circle time with gentle authority, and using their love of routine
    to keep the classroom orderly while staying flexible enough to include spontaneous songs.
  sports: Maria Ramiro dribbles a small soccer ball with the Rockford Little Leaguers U‑6 team, cheers for the Chicago Cubs on game nights, and spends winter afternoons on indoor ice skating lessons, combining
    organized team play with a love for energetic, seasonal activities.
  arts: Maria Ramiro delights in singing the lullabies taught during family celebrations and drawing vivid pictures of colorful papel picado banners, while also enjoying Disney’s Frozen and listening to
    Raffi’s Baby Beluga, reflecting how music and visual art shape their playful imagination.
  travel: Maria Ramiro has visited the bustling Chicago Navy Pier and a quiet countryside farm where they helped roll dough for family treats, and they dream of exploring a sunny seaside town to build sandcastles,
    preferring trips that blend familiar routines with gentle new experiences.
  culinary: Maria Ramiro loves helping stir guacamole, sprinkling cheese on tacos, and shaping tamales with their tiny hands, favoring flavors like cilantro, lime, and mild chilies, and although their cooking
    skill is limited to mixing and garnish, they relish the sensory joy of bright, fresh ingredients.
  core: Maria Ramiro is a routine‑loving five‑year‑old who balances careful saving, allergy vigilance, and organized play with occasional sticker splurges and a shy love for spontaneous song.
background:
  cultural: Maria is a first‑generation Mexican‑American raised in Rockford, Illinois. Her parents immigrated from the state of Jalisco and maintain strong ties to Mexican customs, language, and food. At
    home, Spanish is spoken alongside English, and family meals often feature tacos, tamales, and fresh salsas that Maria helps prepare. The family celebrates traditions such as Día de los Muertos, Mexican
    Independence Day, and Christmas with a blend of Mexican and Midwestern customs, attending the local Catholic parish for Mass and community events. Growing up in a diverse neighborhood, Maria enjoys
    both the vibrant heritage of her Mexican roots and the communal spirit of her Illinois community, fostering an identity that values family, respect (respeto), and cultural pride.
