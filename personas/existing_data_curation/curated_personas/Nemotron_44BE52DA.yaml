  hobbies: '[''Reading African‑American literature'', ''Visiting art galleries'', ''Gardening'', ''Southern cooking'', ''Quilting'', ''Church hymn singing'', ''Volunteering at senior center'', ''Genealogy
    research'', ''Attending community lectures'', ''Birdwatching'', ''Listening to jazz music'']'
  career_goals: Lajean aims to compile a multi‑generational genealogy book and publish a memoir that intertwines her personal story with Mississippi's civil‑rights history. She plans to curate a traveling
    quilt exhibition that narrates Black experiences, mentor younger community members in research and crafts, and establish a modest scholarship fund for local high‑school students interested in the arts
    or history.
