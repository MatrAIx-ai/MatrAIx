persona_description: A researcher and scientist who specializes in the study of gene regulation and evolution. The person is interested in understanding how different species have evolved different strategies
  to ward off cancer and is curious about the potential applications of these findings to human health. The individual is also interested in the balance between genetic mechanisms that prevent fast-growing
  cells and those that enhance cellular repair machinery and is skeptical of the potential for transferring these mechanisms to other species.
