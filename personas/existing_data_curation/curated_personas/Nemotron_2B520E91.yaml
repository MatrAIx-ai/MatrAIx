  career_goals: Christopher aims to deepen his expertise in molding technologies and pursue a supervisory role within the next three to five years. He plans to obtain a Certified Manufacturing Technologist
    (CMfgT) credential and attend advanced training on CNC‑controlled molding systems. Ultimately, he envisions becoming a shift lead or process engineer, where he can mentor new technicians, drive efficiency
    initiatives, and contribute to the plant’s continuous‑improvement programs while maintaining a stable, predictable work schedule that supports his mental‑health needs.
