  career_goals: Cyrus aims to obtain a Construction Management certification and transition into a senior project manager role overseeing larger commercial projects. He dreams of eventually launching his
    own general contracting business focused on residential remodels and sustainable building practices in Todd County. He also wants to mentor younger tradespeople, introduce advanced safety programs,
    and become a recognized leader in his local construction community.
