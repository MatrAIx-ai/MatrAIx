persona_description: A healthcare professional who is knowledgeable about child occupant protection and has experience with developing and evaluating video-based health education programs. They have a strong
  interest in using threat appeals to increase awareness and motivate action in promoting booster seat use among children. They are familiar with the latest research on health risk communication and have
  a passion for using empirical evidence to design effective health education programs. They have a deep understanding of crash testing and simulation techniques and are skilled in using them to create
  compelling visual content that can effectively convey risk and promote high efficacy in booster seat use. They have a track record of successfully implementing and evaluating video-based health education
  programs and are eager to apply their expertise to develop and evaluate the Boost ’em in the Back Seat Video.
