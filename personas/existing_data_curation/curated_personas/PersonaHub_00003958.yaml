  in advanced computer simulations and the development of advanced modeling tools. They have a deep understanding of the human body's complex physiology and anatomy, and are dedicated to advancing the field
  of radiation dosimetry and improving the safety and efficacy of radiation therapy and imaging for pregnant individuals.
