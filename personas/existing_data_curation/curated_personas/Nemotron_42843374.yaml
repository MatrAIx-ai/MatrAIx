  career_goals: Rowena aims to earn her Certified Public Accountant (CPA) designation within the next two years and to progress to a Chief Financial Officer role within a mid‑size organization in Michigan.
    She plans to spearhead a digital transformation of the finance department, introducing automation and data‑analytics tools to improve efficiency. Passionate about mentorship, she wants to establish
    a formal development program for emerging female finance professionals at her company. Outside the corporate sphere, Rowena aspires to serve on the board of a local non‑profit focused on economic development,
    using her financial expertise to guide community initiatives.
