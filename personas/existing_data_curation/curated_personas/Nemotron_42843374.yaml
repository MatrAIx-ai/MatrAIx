personas:
  professional: Rowena Watt, a seasoned financial manager at a mid-size Michigan firm, leverages advanced Excel modeling, Power BI dashboards, and SAP integration to translate complex data into clear narratives
    for stakeholders, while leading cross‑functional teams with the same charisma they bring to community theater productions.
  sports: Rowena Watt is a loyal fan of the Detroit Lions, Detroit Tigers, and Michigan State Spartans, joins a local women's softball league on Saturday mornings, and hikes the Huron‑Clinton Metroparks
    trails as their primary cardio regimen, while they balance team spirit with personal fitness.
  arts: Rowena Watt, an active member of the Mount Pleasant Community Playhouse, seamlessly transitions between starring in Shakespearean productions and coordinating set designs, while they devote evenings
    to listening to the haunting vocals of Sinead O'Connor and the classic film scores of Ennio Morricone.
  travel: Rowena Watt’s travel repertoire includes a nostalgic road trip along the Great Lakes shoreline, a culinary tour of New Orleans’ Cajun cuisine, a sentimental pilgrimage to historic castles in Ireland,
    and an upcoming ambition to trek the southern segment of the Appalachian Trail, all planned with spreadsheets and a penchant for group itineraries that they map out in detail.
  culinary: Rowena Watt translates the garden’s bounty into dishes like roasted beet and goat‑cheese salad, hearty chicken and dumpling stew, and homemade cornbread topped with honey butter, yet they occasionally
    succumb to late‑night pizza takeout on hectic work evenings, rationalizing it as a necessary break from meticulous meal prep.
  core: Rowena Watt blends Midwestern pragmatism with theatrical flair, channeling a love of structure and community into a finance career, vibrant social life, and garden‑to‑table kitchen, while they hoard
    the quirky habit of timing coffee breaks to the exact minute.
background:
  cultural: Rowena grew up in a small Midwestern town near Mount Pleasant, Michigan, in a family of Irish‑German descent. The region’s blend of agricultural roots and manufacturing heritage instilled in
    her a strong work ethic, practicality, and a deep sense of community. Midwestern values of friendliness, reliability, and modesty shape her interpersonal style, while her Irish heritage contributes
    a love of storytelling and social gatherings. As a practicing Christian, she participates in church activities that emphasize service and fellowship, reinforcing her commitment to both personal responsibility
    and communal support.
