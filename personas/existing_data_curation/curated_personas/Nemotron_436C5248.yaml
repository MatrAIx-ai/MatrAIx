  career_goals: William aims to earn a certification in automotive technology within the next two years and secure a full‑time position as a service technician at a local dealership or independent shop.
    He wants to become a respected senior technician, known for his precision and reliability, and eventually open his own auto‑repair garage that offers dependable service to the Rocky Top community. He
    also hopes to mentor younger apprentices, combining his competitive drive with a desire to give back.
