  career_goals: Lynnette dreams of turning her love of art and nature into a career that inspires others. She hopes to become an environmental graphic illustrator or wildlife artist who creates visual stories
    that raise awareness about conservation. She also imagines studying environmental science or sustainable design in high school and college, aiming to blend scientific understanding with creative communication.
    For now, she focuses on building a strong academic foundation and a diverse portfolio of artwork and digital projects.
