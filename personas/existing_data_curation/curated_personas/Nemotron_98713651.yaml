personas:
  professional: Lynnette Torres is an aspiring digital artist and budding game designer who spends afternoons mastering Scratch to weave interactive fairy‑tale narratives, while meticulously organizing
    storyboards and color palettes, reflecting their methodical yet solitary creative drive.
  sports: Lynnette Torres participates in the Willow Creek Youth Swimming Club, favoring early morning laps that provide quiet focus, and enjoys weekend hikes with family to sketch wildflowers, showing
    a preference for low‑key, individual‑oriented physical activity.
  arts: Lynnette Torres draws deep inspiration from the whimsical worlds of Studio Ghibli’s Hayao Miyazaki, the vibrant storytelling of J.K. Rowling, and the bold colors of Vincent van Gogh, channeling
    these influences into elaborate charcoal sketches, digital illustrations, and origami projects that fill their sketchbooks.
  travel: Lynnette Torres loves planning nature‑centric trips, dreaming of exploring the towering redwoods of California’s Redwood National Park and the historic streets of Kyoto, yet relies on parents
    for logistics and uses travel journals to document each journey while quietly soaking in new scenery.
  culinary: Lynnette Torres enjoys helping prepare family‑passed dishes such as steaming tamales filled with seasoned pork and simmering arroz con leche with cinnamon, honing modest cooking skills that
    blend precise measurement with creative plating, while also indulging in a secret love for cheesy pizza slices.
  core: Lynnette Torres is a quiet, curiosity‑driven 11‑year‑old who blends meticulous art creation with gentle ambition, secretly hoarding extra sketchbooks, and battling occasional allergy flare‑ups during
    outdoor sketches.
background:
  cultural: Lynnette is a Mexican‑American raised in Albany, Oregon. At home she speaks Spanish with her family and celebrates Mexican traditions such as Día de los Muertos, the quinceañera preparation
    for older relatives, and cooking family recipes. She participates in community events at the local Hispanic Cultural Center, learning folk art techniques like papel picado and folkloric dance. While
    she embraces the Pacific Northwest’s love of outdoor exploration, her artistic style often incorporates vibrant colors and motifs inspired by Mexican folk art, reflecting a blended cultural identity.
