persona_description: A seasoned cybersecurity professional who has extensive experience in creating and implementing successful security awareness and training programs. This individual is highly knowledgeable
  about the key components and best practices for creating an effective cybersecurity education initiative, and has a deep understanding of the importance of top-down buy-in, stakeholder engagement, baseline
  vulnerability measurements, regular assessments and training, and consistent tracking and reporting. This professional is adept at creating a clear link between assessments and training, and is skilled
  in reinforcing key messages with end users. They have a unique perspective on the importance of data in security awareness and training, and prioritize choosing security awareness and training tools that
  provide consistent, actionable insights.
