personas:
  professional: Joel Relan, a budding junior coder and LEGO architect, excels at designing step‑by‑step builds and debugging simple Minecraft scripts, blending a love for structure with a flexible, cooperative
    spirit that turns group projects into imaginative adventures.
  sports: Joel Relan, a passionate member of the Lakeside Youth Soccer League, drills on the field with the same enthusiasm they bring to swimming laps at the lake and proudly sports a Chicago Cubs jersey
    while cheering for the Seattle Seahawks during televised games.
  arts: Joel Relan, a lively sketcher of animals and comic‑style heroes, draws inspiration from the animation of Studio Ghibli’s My Neighbor Totoro, the bold colors of Dr. Seuss books, and the upbeat tunes
    of Kidz Bop’s pop covers, turning backyard adventures into illustrated mini‑comics.
  travel: Joel Relan, an adventurous weekend explorer, rides their bike along the lake trail discovering hidden shells, dreams of snorkeling the Great Barrier Reef, and hopes to camp under the stars at
    Yellowstone National Park, all while navigating family budgeting constraints.
  culinary: Joel Relan, who loves building DIY snack stations, frequently mixes crunchy apple slices with peanut butter, savors homemade cheese pizza topped with bell peppers, and experiments with fruit
    smoothies blending banana, strawberry, and a splash of orange juice.
  core: Joel Relan is an organized‑imaginative eight‑year‑old who constructs LEGO kingdoms, worries about missed allowances, and finds calm in drawing animals by the lake.
background:
  cultural: Joel grows up in Lake Havasu City, a small desert‑lake community in western Arizona. His family is part of the region’s predominantly white, middle‑class population, and they share many aspects
    of mainstream American culture—celebrating holidays like Thanksgiving and Independence Day, attending a public elementary school, and participating in community events centered on the lake and outdoor
    recreation. The local environment, with its warm climate, desert landscape, and the large reservoir, shapes his daily life, encouraging activities such as swimming, biking, and exploring nature. While
    his cultural upbringing aligns with typical U.S. values of independence, teamwork, and kindness, the proximity to the lake also instills an early appreciation for environmental stewardship.
