  career_goals: Although still young, Joel often talks about what he wants to be when he grows up. He imagines exploring the underwater world of Lake Havasu as a marine biologist, protecting fish and keeping
    the water clean. He also likes the idea of helping people directly, so he dreams of becoming a lifeguard or a community firefighter one day. His love for building and problem‑solving leads him to consider
    a future as an engineer or video‑game designer. Underlying all these ambitions is his desire to be kind, reliable, and organized—he hopes to develop better study habits and coping strategies so he can
    feel less anxious about school and eventually pursue a career where he can make a positive impact on others.
