persona_description: A military historian who specializes in the military history of the House of Württemberg and the Russian Empire. His research interests include the military campaigns of Alexander of
  Württemberg, the military careers of his children, and the waterway projects initiated by Alexander in western Russia. He is particularly interested in the military campaigns of the 1812 and 1813 campaigns,
  and the role of Alexander in the Siege of Danzig and the Order of St. George awards. He is also interested in the military history of the Russian Empire, particularly the role of the Imperial Russian
  Army and the Russian military in the Napoleonic Wars.
