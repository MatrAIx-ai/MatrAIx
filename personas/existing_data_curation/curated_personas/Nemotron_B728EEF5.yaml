  hobbies: '[''Abstract Painting'', ''Digital Illustration'', ''Speculative Fiction Writing'', ''Contemporary Art Gallery Visits'', ''Reading Afro-futurist Literature'', ''Journaling'', ''Hiking'', ''Experimental
    Jazz Listening'', ''Fusion Cooking'', ''Urban Sketching'', ''Photography'', ''Strategic Board Games (Catan, Chess)'', ''Community Murals Volunteering'']'
  career_goals: Shirley aims to ascend to a Director of Operations role within a tech‑driven, socially responsible startup in the next five years, eventually positioning herself as a Chief Operating Officer.
    She plans to augment her business degree with an executive MBA focused on innovation and sustainability. Her long‑term ambition is to launch a consultancy that empowers Black‑owned businesses to streamline
    their operations and adopt circular‑economy models. She also seeks to become a thought leader in the DC metro area, mentoring emerging professionals, influencing sustainable operations policy, and championing
    inclusive workplace cultures.
