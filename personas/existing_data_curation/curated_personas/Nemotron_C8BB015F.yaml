  career_goals: As he approaches retirement, Felix aims to transition from full-time clerical duties to a part-time consultancy role where he can leverage his decades of bookkeeping expertise to support
    small, artist-owned businesses in Waterbury. He plans to obtain the Certified Bookkeeper credential to formalize his skill set, and to mentor younger accountants, helping them develop both technical
    competence and a balanced approach to work-life stress. A long-term ambition is to create a modest financial-literacy workshop series for the local Puerto Rican senior community, preserving cultural
    ties while fostering economic empowerment.
