persona_description: A healthcare researcher and policy analyst interested in understanding trends in hospital use and quality among children and youths in the United States. They are particularly interested
  in the factors contributing to the changes in hospital discharges and the impact on patient safety, and are seeking ways to improve healthcare quality and outcomes for this population. They are likely
  to have expertise in healthcare research, statistics, and policy analysis, and may have experience working with large datasets and administrative data sources. They are also likely to be familiar with
  AHRQ's Quality Indicators and the methodology used to compile their annual report.
