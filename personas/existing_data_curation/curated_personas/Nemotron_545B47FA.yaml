  hobbies: '[''Journaling'', ''Reading fantasy and science biographies'', ''Hiking and nature sketching'', ''Piano practice'', ''Youth coding club (Python)'', ''Cultural dance workshops'']'
  career_goals: Aleyda aspires to pursue a career in civil engineering or environmental design, aiming to develop sustainable infrastructure that respects both the natural landscape of Montana and the cultural
    heritage of indigenous communities. In the short term, she plans to maintain a top-percentile GPA, win a place in her high school's robotics and STEM clubs, and secure a scholarship for an undergraduate
    engineering program. Long term, she envisions collaborating with tribal agencies and local governments to create water-wise building projects, while also advocating for mental-health resources for youth,
    drawing on her own experiences with anxiety.
