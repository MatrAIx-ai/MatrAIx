personas:
  professional: Aleyda Palma is a budding coder and aspiring pianist who leverages her meticulous journaling habit to set weekly coding milestones and piano practice goals, turning structured creativity
    into early career pathways; they showcase their simple games at school talent nights to boost confidence.
  sports: Aleyda Palma hikes the Flathead Lake trails with the local youth outdoor club, follows the community’s junior soccer league, and cheered for the Missoula PaddleHeads baseball team, preferring
    structured activity over spontaneous sports; they often log each hike’s distance and elevation in their journal.
  arts: Aleyda Palma sketches the lake’s sunrise in a weather‑proof sketchbook, practices piano pieces by Ludovico Einaudi and Frédéric Chopin, and attends dance workshops featuring folk choreographies,
    while devouring fantasy series by Brandon Sanderson and biographies of Marie Curie; they find solace in translating narrative arcs into piano phrasing.
  travel: Aleyda Palma loves weekend camping trips around Flathead Lake, dreams of backpacking through Banff National Park, and is saving for a family visit to Kyoto’s bamboo forest, planning each journey
    with detailed itineraries and packing lists; they map each route in a notebook to keep the adventure predictable.
  culinary: Aleyda Palma favors simple, balanced meals like avocado toast with poached eggs, homemade spaghetti carbonara, and occasional homemade tacos, and experiments with “quick‑mix” oatmeal bowls,
    yet often forgets to hydrate between rehearsals; they sometimes skip breakfast due to anxiety about time.
  core: Aleyda Palma channels a hyper‑organized, achievement‑driven mindset into disciplined piano practice, coding, and journaling, while battling vivid anxiety that fuels both her meticulous planning
    and occasional procrastination; they often oscillate between intense focus and moments of distress.
background:
  cultural: Aleyda’s family traces its roots to a mixed Latin American and Indigenous heritage, with ancestors from the Andean highlands and a Pueblo community in the southwestern United States. At home,
    Spanish is spoken alongside a few phrases of the indigenous language her grandparents preserve. She celebrates traditional festivals such as Día de los Muertos and Pueblo Feast Days, and she learns
    traditional crafts and dances through community programs in Kalispell. Living in Montana, she also feels a strong connection to the local landscape and the values of stewardship and respect for nature
    that many indigenous cultures emphasize.
