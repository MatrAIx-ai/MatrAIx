personas:
  professional: Shelley Dotson, a retired volunteer coordinator and seasoned event planner, leverages their meticulous organizational skills and curiosity for art history to run senior‑center exhibitions
    and community fundraising, insisting on high standards while mentoring new volunteers.
  sports: Shelley Dotson enjoys low‑impact fitness, joining the weekly senior walking group at Clearwater State Park and cheering on the local minor‑league baseball team the River Valley Rattlers, while
    occasionally practicing gentle tai chi at the community center to maintain flexibility.
  arts: Shelley Dotson spends weekends wandering the European wing of the Metropolitan Museum, attending productions of Arthur Miller plays at the community theater, and delighting in the watercolors of
    Georgia O’Keeffe, while their own watercolor canvases capture the roses blooming in their garden.
  travel: Shelley Dotson prefers thoughtfully planned trips, having recently toured the rose gardens of Kyoto, the historic vineyards of Bordeaux, and a leisurely river cruise through the Norwegian fjords,
    while dreaming of a future accessible tour of the National Gallery in London.
  culinary: Shelley Dotson’s kitchen is a crossroads of cultures, where they regularly prepare a fragrant Persian saffron rice dish, master a spicy Thai green curry, and bake a classic French tarte Tatin,
    all while sourcing fresh herbs from their own garden.
  core: Shelley Dotson blends relentless organization with a boundless curiosity, curating senior art programs, meticulously budgeting every dollar, and occasionally forgetting to water their prized roses
    after a busy volunteer day.
background:
  cultural: Shelley is a White American born in 1947, part of the early Baby Boomer generation. She grew up in the post‑World War II era in the American South, absorbing values of community, self‑reliance,
    and modest ambition. Her family heritage includes English and German ancestry, and she was raised with a strong emphasis on education, civic engagement, and appreciation for the arts, reinforced through
    visits to local museums and church choirs. Living in Dade City, Florida, she has embraced the slower‑paced, close‑knit small‑town culture, participating in church activities and community events that
    reflect the region's blend of Southern hospitality and Floridian diversity. This cultural backdrop influences her organized approach to community service and her curiosity about the broader world.
attributes:
  skills: '[''Event planning and coordination'', ''Organizational and time-management'', ''Art appreciation and basic art history'', ''Genealogical research'', ''Written communication (newsletter writing,
    grant proposals)'', ''Budgeting and financial management for community projects'', ''Digital literacy (email, social media, research databases)'', ''Volunteer recruitment and training'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Genealogy research'', ''Reading historical biographies'', ''Gardening (roses and native plants)'', ''Bridge (card game) club'',
    ''Volunteering at the local library'', ''Cooking international recipes'', ''Walking nature trails'', ''Attending community theater and lecture series'']'
  career_goals: Shelley's current ambitions focus on lifelong learning and community enrichment. She aspires to lead a senior‑center art program, curating exhibitions that showcase local artists and bring
    intergenerational dialogue. She also hopes to complete a family history book, digitizing records and sharing stories online. Additionally, she aims to obtain a certificate in museum studies to deepen
    her expertise and to mentor new volunteers, ensuring that the programs she helped build remain vibrant. While she has stepped back from paid employment, these goals reflect her enduring drive for achievement,
    organization, and making a lasting cultural contribution.
