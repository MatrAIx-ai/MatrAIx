persona_description: A teacher who implements a personalized and engaging approach to teaching mathematics, emphasizing the relevance of the subject in real-life situations and encouraging children to explore
  their own mathematical lines of inquiry. The teacher uses a variety of teaching methods and resources, including direct teaching sessions, concrete resources, and creative opportunities, to build upon
  mathematical concepts and support children's development of metacognition. The teacher also provides ongoing formative assessment and timely teacher intervention, and is committed to quality first teaching
  in mathematics and the continuous professional development of teachers and teaching assistants.
