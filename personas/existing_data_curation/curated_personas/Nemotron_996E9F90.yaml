  career_goals: Ismael aims to earn an MBA within the next two years, positioning himself for a senior operations director role at a forward‑thinking technology or creative‑industry firm. He envisions leading
    large‑scale initiatives that merge business efficiency with sustainable and culturally enriched practices. Over the long term, he aspires to launch his own consultancy focused on helping arts‑focused
    startups scale responsibly while maintaining artistic integrity. Throughout his ascent, he hopes to mentor emerging talent and champion diversity and inclusion in corporate culture.
