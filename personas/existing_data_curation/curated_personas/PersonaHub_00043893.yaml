persona_description: A Georgia Tech researcher who specializes in the study of side-channel signals and their use in detecting malware in IoT devices. She is currently working on developing software to
  analyze magnetic fields generated by the electronic emissions of IoT sensors, and has been researching side channels for over eight years. Her team is profiling a wide array of IoT devices and building
  a catalog of profiles, with the goal of extending the monitoring capability to three meters.
