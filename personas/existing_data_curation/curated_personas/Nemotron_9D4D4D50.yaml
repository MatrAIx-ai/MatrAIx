personas:
  professional: Stephanie Layton, a 21‑year‑old aspiring housekeeping supervisor, blends systematic cleaning routines, green‑product knowledge, and precise inventory management with a calm, customer‑focused
    demeanor to excel at a regional hotel while pursuing a hospitality associate degree and CPH certification.
  sports: Stephanie Layton enjoys solo hikes along the Cumberland trails for reflection, is a loyal fan of the Nashville Predators and the Tennessee Volunteers football team, and participates in a local
    recreational softball league that meets on weekend afternoons.
  arts: Stephanie Layton expresses creativity through quilting and crochet, sings in her church choir, and finds inspiration in classic country artists like Dolly Parton, Chris Stapleton, and Emmylou Harris,
    while also binge‑watching HGTV home‑improvement shows for organization ideas.
  travel: Stephanie Layton prefers budget‑friendly road trips that combine scenic nature stops—such as the Great Smoky Mountains and a weekend in Asheville, NC—with visits to hometown cousins in Nashville,
    planning each itinerary around affordable lodging and community‑oriented attractions.
  culinary: Stephanie Layton enjoys cooking modest, wholesome meals using herbs from her garden, favoring dishes like herb‑infused fried chicken, cornbread, collard greens, and sweet tea, while her moderate
    cooking skill level shines most when she knits together garden‑fresh ingredients into comforting family‑style plate.
  core: Stephanie Layton is a methodical, community‑rooted 21‑year‑old who balances quilting, precise housekeeping, and tranquil hikes with a steadfast plan to launch an eco‑friendly cleaning venture.
background:
  cultural: Stephanie was raised in Crossville, a small town in the heart of Tennessee's Cumberland County, within a predominantly white, Southern Appalachian community. Her family has deep roots in the
    area, and she grew up attending a local Baptist church, where community service, fellowship, and traditional Southern hospitality were emphasized. The region’s values of self‑reliance, strong family
    ties, and neighborly support have shaped her outlook. She embraces Southern customs such as sharing meals, attending church potlucks, and participating in county fairs. Her heritage includes a love
    for country music, appreciation of the natural landscape of the Cumberland foothills, and a deep respect for the close‑knit community that defines life in rural Tennessee.
attributes:
  skills: '["Floor care", "Deep cleaning", "Laundry and fabric care", "Inventory management", "Green cleaning practices", "Time scheduling", "Customer service", "Basic maintenance", "Housekeeping software"]'
  hobbies: '["Quilting", "Crocheting", "Puzzle solving (crossword, sudoku, jigsaw)", "Gardening", "Cooking/baking", "Hiking", "Church choir", "Volunteering at food pantry", "Watching home‑improvement shows",
    "Listening to classic country music"]'
  career_goals: Stephanie aims to advance from a housekeeper to a supervisory role, such as lead housekeeper or housekeeping manager at a regional hotel or large private estate in the Crossville area. She
    plans to earn the Certified Professional Housekeeper (CPH) credential within the next two years and complete an associate's degree in Hospitality Management or Business Administration at a local community
    college. Long‑term, she hopes to launch her own eco‑friendly residential cleaning business, providing flexible income for her family while creating reliable employment opportunities for others in her
    community.
