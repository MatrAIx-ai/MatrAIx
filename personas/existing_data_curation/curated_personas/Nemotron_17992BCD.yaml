personas:
  professional: Dorotea Jaramillo, a disciplined 15-year-old high-school student, channels her love for structure into solving Sudoku puzzles and writing Python scripts that organize her study notes, envisioning
    a future as an engineer who builds reliable, user-friendly tools.
  sports: Dorotea Jaramillo cycles three times a week through local park trails for cardio, follows the city’s minor-league baseball team the Harbor Owls and the national soccer club FC Portland, and channels
    her competitive drive into the school's track and field 800-meter events where she consistently vies for a top-three finish.
  arts: Dorotea Jaramillo's artistic soundtrack blends Latin pop icons Bad Bunny and Karol G with traditional bomba rhythms by Rafael Hernández, while her leisure reading includes non-fiction works by Malcolm
    Gladwell and biographies of pioneering engineers, forging a creative yet analytical personal aesthetic.
  travel: Dorotea Jaramillo has visited the historic Old San Juan district and swam in a bioluminescent bay on family trips, now dreams of exploring Washington, D.C.'s Smithsonian museums and trekking the
    Inca Trail in Peru when her savings allow.
  culinary: Dorotea Jaramillo's kitchen routine revolves around cooking arroz con gandules, mofongo, and pastelón, seasoning each dish with plantains, sofrito, and adobo, while she refines her technique
    by following YouTube tutorials and proudly serves the meals at family gatherings.
  core: Dorotea Jaramillo is a 15-year-old puzzle-loving, hyper-organized teen who balances coding projects, traditional cooking, and competitive sports, yet battles anxiety-driven perfectionism and a habit
    of late-night over-studying.
background:
  cultural: Dorotea was born and raised in Toa Alta, a municipality within the Bayamón region of Puerto Rico. Her family speaks both Spanish and English, reflecting the island's bilingual environment, and
    she celebrates cultural traditions such as the local Fiestas Patronales, family gatherings centered around comida casera, and the vibrant rhythms of bomba and plena. Growing up in a community that frequently
    confronts natural challenges like hurricanes has shaped her practical outlook and her commitment to resilient infrastructure. While she embraces the warmth and close‑knit nature of Puerto Rican family
    life, Dorotea also navigates the modern pressures of school expectations and social media, balancing cultural pride with her personal drive for achievement.
