  career_goals: Dorotea aims to graduate high school with a top‑class GPA and secure a scholarship to a STEM‑focused university. Her long‑term ambition is to study civil engineering, with a particular interest
    in designing resilient infrastructure that can withstand the hurricanes and floods common to Puerto Rico. She envisions herself leading multidisciplinary project teams that improve community safety
    and sustainability. In the short term, she plans to participate in regional math and engineering competitions to build a strong portfolio and gain experience in competitive problem solving.
