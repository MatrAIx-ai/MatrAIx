  career_goals: Although retired, Teng is driven to share his knowledge and stay intellectually active. He aims to volunteer as a mentor for local high‑school robotics clubs and community college engineering
    workshops, organize art‑focused cultural tours for seniors, and document his life story and reflections on the evolution of technology for future generations. He also hopes to travel to major art museums
    in Europe and Asia, and to remain healthy enough to continue teaching his grandchildren and participating in community events.
