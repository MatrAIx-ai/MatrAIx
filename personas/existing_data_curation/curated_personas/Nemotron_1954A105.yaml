personas:
  professional: Teng Chang is a retired mechanical and electrical engineer who now volunteers as a mentor for high‑school robotics clubs and community college engineering workshops, using their decades
    of problem‑solving expertise, fluency in Python and C, and a charismatic, talkative style to inspire young makers despite a relaxed, loosely organized schedule.
  sports: Teng Chang is an enthusiastic participant in a local tai chi circle, a regular hiker with the Watchung Mountain Hiking Club, and a devoted fan of the New York Yankees and New York Knicks, often
    watching games at the local sports bar while fitting gentle morning walks into their flexible routine.
  arts: Teng Chang is an avid gallery‑goer who delights in the impressionist canvases of Claude Monet, the contemporary installations of Ai Weiwei, and frequently fills the house with the smooth improvisations
    of Miles Davis and the resonant cello of Yo‑Yo Ma, often documenting exhibitions with a digital camera for later sharing.
  travel: Teng Chang pursues art‑focused travel with a spontaneous planning style, having already explored the Louvre in Paris, the Uffizi in Florence, the National Museum of China in Beijing, and dreaming
    of a future visit to London’s Tate Modern, while also enjoying weekend trips to historic Philadelphia and nearby coastal towns with their grandchildren.
  culinary: Teng Chang is a skilled home chef who masterfully prepares soy‑glazed salmon with fresh ginger and five‑spice, experiments with a spicy kimchi‑taco fusion, and perfects family‑style mapo tofu
    using Sichuan peppercorns, often sourcing ingredients at the farmer’s market and sharing meals at community potlucks.
  core: Teng Chang is a curious, sociable retiree who blends engineering precision with artistic flair, constantly snapping photos of gallery walls while occasionally misplacing their glasses and their
    grocery list.
background:
  cultural: Teng Chang was born in Taiwan in 1950 and immigrated to the United States in the early 1970s to pursue his engineering studies. He earned a Bachelor of Science in Mechanical Engineering in the
    U.S. and built his career at a multinational manufacturing firm before retiring. While deeply rooted in Taiwanese cultural traditions—celebrating Lunar New Year, practicing Chinese calligraphy, and
    speaking Mandarin at home—he has also embraced American suburban life in Boonton, New Jersey. His bicultural experience informs his open‑minded curiosity, his emphasis on harmony in social interactions,
    and his appreciation for both Eastern and Western art and ideas.
