  career_goals: Bruce aspires to attend a high school with a strong STEM and arts curriculum, then pursue a degree in industrial design or architecture, where he can blend his artistic eye with his methodical
    planning skills. He also hopes to work on community projects that revitalize public spaces in small-town America, possibly becoming a community event planner or a museum curator. In the short term,
    he aims to win a regional art competition, earn a leadership role in his school's robotics team, and secure a summer internship at a local design studio.
