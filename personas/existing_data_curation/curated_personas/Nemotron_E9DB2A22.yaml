personas:
  professional: A budding digital artist and robotics enthusiast, Bruce Falcon blends their love for cartoon drawing with coding to create interactive animated projects for the school’s art club, methodically
    planning each frame while coordinating with teammates to program simple robots that bring their sketches to life.
  sports: An avid soccer player for the Middle School Mavericks and a regular rider with the Ridge Trail Biking Club, Bruce Falcon idolizes FC Barcelona’s midfield creativity, joins after‑school scrimmages
    with friends, and spends weekends cheering for the local high school football team, the Riverdale Ravens.
  arts: Passionate about drawing cartoons, Bruce Falcon draws inspiration from Bill Watterson’s Calvin and Hobbes and Studio Ghibli’s animation, spends evenings editing short clips with Adobe Animate, attends
    community theater productions of “Little Shop of Horrors,” and curates a mixtape of classic rock legends like The Rolling Stones alongside indie folk artists such as Bon Iver.
  travel: A weekend trail explorer, Bruce Falcon has biked the nearby Pine Ridge Loop, dreams of visiting Japan’s Akihabara district to soak up anime culture, and plans family road trips to the Grand Canyon,
    preferring a mix of adventurous hiking and relaxed sightseeing within their parents’ budget constraints.
  culinary: When not sketching, Bruce Falcon enjoys devouring pepperoni pizza, crafting simple ramen bowls with miso and scallions, and occasionally attempts to bake chocolate chip cookies, though they
    often forget to preheat the oven, leading to unevenly baked treats.
  core: Bruce Falcon is a curiosity‑driven teen who balances methodical art‑tech projects with spontaneous soccer games, a penchant for saving for gadgets, and a habit of forgetting to stretch after workouts.
background:
  cultural: Bruce grew up in Columbia, a small town in Monroe County, Illinois, where Midwestern values of community, modesty, and hard work are emphasized. His family heritage includes generations of farmers
    and factory workers, and he has been raised with a strong sense of local tradition, including participation in county fairs, Fourth of July parades, and the annual harvest festival. The town's close-knit
    school environment and regional emphasis on practical arts have fostered his appreciation for both creativity and organization, while his exposure to local art programs and community service initiatives
    has shaped his collaborative and socially conscious outlook.
