  hobbies: '[''Building wooden block towers'', ''Coloring within lines'', ''Shape‑matching games'', ''Dancing to Mexican folk music'', ''Listening to bilingual storytime'', ''Helping with simple kitchen
    tasks'', ''Watching problem‑solving animated shows'']'
  career_goals: Although only three, Omayra already expresses a clear vision of her future. She often tells her parents she wants to be a teacher because she enjoys organizing activities and helping friends
    learn new things. She also shows an interest in caring for animals, imagining herself as a veterinarian. Her ambitions are shaped by her love for structure and her compassionate side.
