personas:
  professional: Omayra Trabanco, a three‑year‑old bundle of curiosity, treats preschool play as a budding architect’s workshop, meticulously stacking blocks and arranging crayons, demonstrating early organizational
    and methodical skills that hint at a future in design, and they often plan play scenarios ahead of time.
  sports: Omayra Trabanco, a three‑year‑old energetic explorer, regularly attends a toddler gymnastics class at Little Gym, eagerly watches the Los Angeles Dodgers games with family, and they often wave
    a tiny cap while attempting to emulate pitcher throws during backyard play.
  arts: Omayra Trabanco, a three‑year‑old fan of bright visuals, loves singing along to “The Wheels on the Bus” by The Kids’ Songs, dances to Raffi’s “Baby Beluga,” and they delight in the picture books
    of Eric Carle, especially “The Very Hungry Caterpillar.”
  travel: Omayra Trabanco, a three‑year‑old adventurous traveler, has toured the interactive Children’s Museum in Boston, splashed on the family‑friendly beaches of Cancun, and they dream of exploring the
    Magic Kingdom in Orlando to ride Dumbo the Flying Elephant.
  culinary: Omayra Trabanco, a three‑year‑old with a discerning palate, favors creamy macaroni and cheese, sweet banana slices, and peanut‑butter‑spread toast, skillfully stirs a bowl with a plastic spoon,
    and they insist on having their broccoli florets arranged in a smiley face on the plate.
  core: Omayra Trabanco is a meticulously organized three‑year‑old who lines up toys by color, worries about bedtime routines, and they can’t resist a nap after a story, making them a tiny planner with
    a big imagination.
background:
  cultural: Omayra is raised in a Mexican‑American household in Long Beach, where Spanish and English are spoken interchangeably. Her family celebrates traditional holidays such as Día de los Muertos and
    Mexican Independence Day with altars, music, and foods like tamales and pozole. She enjoys listening to ranchera and mariachi songs, and participates in community events at the local Mexican cultural
    center. Catholic traditions also shape her upbringing, with regular attendance at church and celebration of religious festivals.
attributes:
  skills: '[''Following daily routines'', ''Sorting objects by color and shape'', ''Completing simple puzzles'', ''Counting to ten'', ''Reciting days of the week'', ''Singing bilingual nursery rhymes'',
