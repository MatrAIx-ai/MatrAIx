persona_description: A medical professor who specializes in infectious diseases, particularly respiratory infections. He is a researcher in the field of immunology and has expertise in the diagnosis and
  treatment of viral infections. He is a member of the World Health Organization and has extensive experience in the development and implementation of diagnostic tests for COVID-19. He is also a proponent
  of the use of cellular immunity as a more reliable indicator of immunity than antibodies. He is well-versed in the principles of immunology and has published numerous articles on the topic.
