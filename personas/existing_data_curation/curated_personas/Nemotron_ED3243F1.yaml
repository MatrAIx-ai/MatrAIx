    and Presentation'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Oil Painting and Watercolor'', ''Landscape Photography'', ''Hiking and Trail Exploration in the Sangre de Cristo Mountains'', ''Reading Contemporary
    Fiction and Nonfiction about Innovation'', ''Cooking and Exploring Southwestern Cuisine'', ''Participating in Community Theater or Book Club'', ''Yoga and Mindfulness Practice'']'
  career_goals: Deanne aims to transition into senior executive leadership within an organization that bridges scientific research and community enrichment, such as a regional office of Los Alamos National
    Laboratory or a nonprofit dedicated to STEM outreach and arts integration. She wants to shape organizational culture by championing inclusive, flexible work practices that balance accountability with
    creativity. Over the next five years, she plans to obtain PMP certification, mentor emerging female managers, and launch a cross‑disciplinary program that pairs local artists with scientists to foster
    innovative public engagement. Ultimately, she aspires to become a vice‑presidential or director‑level leader who drives strategic growth while nurturing her team’s professional and personal fulfillment.
