persona_description: A Finnish diplomat who is responsible for international cooperation and exchange of views on international law in cyberspace. She is a member of the Foreign Ministry and has extensive
  knowledge of public international law, including its application in cyberspace. She is well-versed in the principles of State sovereignty, due diligence, and the use of force in cyberspace, and has prepared
  a position on cyberattacks in accordance with the principles of international law. She is responsible for publishing the position on 15 October.
