persona_description: A company that specializes in sustainable and responsible aquaculture practices, particularly in the development and implementation of alternative raw materials for fish feed production.
  The company aims to reduce dependence on wild fish stocks and provide consumers with healthy fish products from sustainable fish farming. The company has been in operation for over 20 years and has a
  strong commitment to sourcing fishmeal and fish oil only from managed and sustainable fisheries, and applying a purchasing policy that requires fishmeal and fish oil to be sourced only from managed and
  sustainable fisheries. The company's research and development efforts have led to the development of alternative raw materials, such as vegetable raw materials, to supplement fishmeal and fish oil in
  fish feeds, and the company's research has shown that the conversion ratio of wild fish to farmed fish, such as salmon, is clearly favourable. The company's success in achieving this conversion ratio
  has led to its confidence in continuing growth without depleting the wild fish stocks typically used for fishmeal and fish oil.
