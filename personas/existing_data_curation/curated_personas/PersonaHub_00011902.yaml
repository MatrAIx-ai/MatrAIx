persona_description: A scientist who specializes in solar physics, particularly in the study of solar cycle evolution and its impact on climate change. He/she is involved in the correction of the sunspot
  number series, which is the only direct record of solar activity over multiple centuries. The scientist is responsible for reevaluating existing climate evolution models given the new picture of the long-term
  evolution of solar activity. The scientist is knowledgeable in the use of the Group Sunspot Number and the Wolf Sunspot Number, and is skilled in the analysis and interpretation of solar cycle data. The
  scientist has a passion for unlocking the role of the Sun in climate change over much longer timescales.
