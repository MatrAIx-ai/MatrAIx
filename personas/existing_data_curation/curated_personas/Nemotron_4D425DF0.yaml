personas:
  professional: Dana Whidden, a budding LEGO architect and imaginative illustrator, combines a meticulous, methodical planning style with a vivid imagination to design intricate brick creations and fantastical
    creature drawings that often become the centerpiece of group storytelling sessions.
  sports: Dana Whidden, a spirited participant in the Meadowbrook Rovers youth soccer club, loves tag and group games at the park, and avidly supports the national USWNT women's soccer team while cheering
    for the hometown baseball squad, the Greenfield Giants, during the summer season.
  arts: Dana Whidden immerses themselves in drawing fantastical beasts inspired by Studio Ghibli's Miyazaki films, collects vivid stickers featuring pop artist Takashi Murakami, and dances to the upbeat
    tunes of Kidz Bop and the soundtrack of Disney's Frozen, letting music fuel their creative storytelling.
  travel: Dana Whidden enjoys weekend family trips to the nearby state park's creek and trail system, dreams of exploring the roving dinosaur exhibits at the Smithsonian, and has a wishlist that includes
    a summer vacation to the beaches of Costa Rica and a future adventure to the bustling streets of Tokyo.
  culinary: Dana Whidden prefers simple comfort foods like cheesy macaroni, pepperoni pizza, and chicken nuggets, enjoys topping their dishes with extra mozzarella and sweet corn, and, though their cooking
    skills are limited to assembling a PB&J, they take pride in helping stir batter for homemade cupcakes.
  core: Dana Whidden is an imaginative, organized 7‑year‑old who channels boundless curiosity into LEGO builds, vivid drawings, and competitive playground games while juggling a healthy dose of worry and
    a love for sticker trading.
background:
  cultural: Dana grew up in a middle‑class white family in Appleton, Wisconsin, where community values emphasize politeness, hard work, and participation in local events like the Appleton fairs and school
    programs. She attends a public elementary school that celebrates Midwestern traditions, frequently joins church Sunday school and community library story times, and enjoys outdoor activities typical
    of the region such as hiking, biking, and visits to nearby lakes. Her family encourages curiosity and education, providing her with books, art supplies, and LEGO sets, while also teaching modesty, respect
    for others, and a strong sense of community responsibility.
