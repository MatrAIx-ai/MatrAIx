  career_goals: Yingyi aims to move into a supervisory position within the school transportation system, such as Transport Coordinator or Safety Officer, where she can apply her extensive experience to
    improve fleet efficiency and student safety. She plans to earn certifications in transportation safety management and enroll in logistics or fleet operations courses at a local community college. Additionally,
    she wishes to mentor younger drivers, lead district-wide safety training programs, and implement environmentally friendly practices like reducing bus idling, driven by her competitive desire to set
    the district's safety benchmark.
