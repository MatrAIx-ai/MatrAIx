  career_goals: Although only two years old, Joseph already hints at future aspirations. He loves finger painting and often pretends to explain his pictures, suggesting a dream of becoming an artist or
    illustrator. He enjoys listening to bedtime stories and repeats them, foreshadowing a possible path as a storyteller or teacher. His methodical building with blocks shows an early fascination with design
    and structure, pointing toward a future interest in architecture or engineering. Overall, his ambitions blend creativity, communication, and organized thinking.
