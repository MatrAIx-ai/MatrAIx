personas:
  professional: Kimberly Daigle is a meticulous medical records specialist who deftly manages Epic and Cerner EHRs, applies ICD-10/CPT coding with surgical precision, and leverages their artistic curiosity
    to craft visually engaging data dashboards that earn praise from clinicians, while their competitive streak drives them to consistently surpass departmental accuracy benchmarks.
  sports: Kimberly Daigle starts each morning with sunrise runs alongside the Sarasota Running Club, joins a beach-volleyball league at Siesta Key during summer, follows the Tampa Bay Lightning with casual
    enthusiasm, and follows a methodical strength-training routine at the local YMCA, reflecting their competitive nature and disciplined approach to fitness.
  arts: Kimberly Daigle spends weekends sketching coastal sunsets at the Ringling Museum, curates a personal Instagram gallery inspired by the vibrant palettes of Frida Kahlo and the minimalist aesthetics
    of Agnes Martin, and regularly attends live shows by the indie folk trio The Lone Bellow, melding their love of visual and auditory art to inspire their health‑informatics designs.
  travel: Kimberly Daigle prefers meticulously planned trips, often weekend-hopping to nearby gems like Siesta Key and historic Savannah, while dreaming of immersive, art-rich itineraries in Barcelona and
    Kyoto, balancing a modest travel budget with occasional splurges on boutique hostels and guided museum tours.
  culinary: Kimberly Daigle enjoys cooking Mediterranean-inspired dishes, frequently tossing fresh basil, sun-dried tomatoes, and feta into a quick pasta, relishes Florida staples like stone-crab claws
    and key‑lime pie, and can’t start the day without a perfectly assembled avocado toast topped with poached egg and a sprinkle of chili flakes.
  core: Kimberly Daigle is a curious, art-obsessed data whiz who meticulously perfects health records by night, binge-solves Settlers of Catan on weekends, and habitually forgets to water their succulents,
    leading to a thriving collection of droopy plants.
background:
  cultural: Kimberly comes from a white, middle‑class family with French‑Canadian (Acadian) roots, reflected in her surname Daigle. She was raised in North Port, Florida, where the coastal lifestyle, Southern
    hospitality, and the vibrant arts scene of nearby Sarasota have shaped her worldview. Her upbringing balanced traditional values—such as a strong work ethic and community involvement—with exposure to
    diverse cultural experiences through local festivals, museums, and a growing interest in contemporary art.
attributes:
  skills: '["Electronic Health Records Management", "Medical Coding (ICD-10/CPT)", "HIPAA Compliance", "Medical Terminology", "Accurate Data Entry and Validation", "Record Retrieval and Release", "Health
    Information Systems (Epic, Cerner)", "Quality Assurance Audits", "Process Improvement", "Customer Service", "Time Management", "Analytical Reporting"]'
  hobbies: '["Visiting art museums and galleries", "Sketching and watercolor painting", "Photography (especially beach and nature subjects)", "Reading modern art and health‑tech literature", "Puzzle solving
    (crosswords, sudoku)", "Strategy board games (Settlers of Catan, Ticket to Ride)", "Yoga and mindfulness practice", "Attending live‑music events", "Volunteering at community health fairs"]'
  career_goals: Kimberly aims to earn her Registered Health Information Administrator (RHIA) certification within the next two years and later complete a bachelor's degree in Health Information Management.
    She aspires to move into a supervisory role where she can lead a team of records specialists, design workflow efficiencies, and integrate innovative data‑visualization techniques that merge her artistic
    interests with health informatics. Ultimately, she hopes to become a health‑information manager who shapes hospital policy on data governance while championing user‑friendly, visually engaging medical
    record interfaces.
