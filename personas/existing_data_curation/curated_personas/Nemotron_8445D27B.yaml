  hobbies: '["Drawing and coloring", "Building with wooden blocks", "Playing with dolls", "Listening to children''s music", "Reading picture books", "Nature walks", "Helping with simple cooking tasks"]'
  career_goals: Erica dreams of becoming a teacher or a nurse when she grows up, inspired by her strong desire to help others and keep things harmonious. In the meantime, her main ambition is to master
    kindergarten‑ready milestones—learning to read simple picture books, counting confidently, and becoming more independent in everyday tasks—so she feels ready for school and can continue caring for those
    around her.
