personas:
  professional: Erica Peyton, a budding mini engineer, channels her love for structure into building elaborate Lego constructs during playtime, showcasing early aptitude for systematic problem solving.
  sports: Erica Peyton, a regular in the community’s "Little Eagles" T‑ball squad, thrives on the predictable practice schedule and enjoys the rhythmic drills of throwing and catching, yet often feels nervous
    before games and prefers the calm of the sidelines.
  arts: Erica Peyton, an enthusiastic crayon illustrator, spends afternoons replicating scenes from Dr. Seuss books with meticulous attention to color patterns, and she treasures the occasional puppet show
    at the local library.
  travel: Erica Peyton, an organized little explorer, favors family trips with a detailed itinerary, such as the recent visit to Yellowstone National Park where she meticulously checked off every geyser
    on the checklist before relaxing at the lodge.
  culinary: Erica Peyton, a modest young food enthusiast, loves the comfort of macaroni and cheese with a dash of cheddar, enjoys helping stir banana pancakes, and can be picky about any dish containing
    unfamiliar vegetables, often demanding extra strawberry slices.
  core: Erica Peyton is a methodical, caring, and worry‑prone four‑year‑old who finds security in routines, small‑scale creativity, and the soothing presence of familiar people and objects.
background:
  cultural: Erica is raised in Waynesboro, Pennsylvania, a small town in Franklin County that blends rural Appalachian and suburban Mid‑Atlantic influences. Her family observes common American holidays—Thanksgiving,
    Christmas, Fourth of July—and participates in local traditions such as community fairs, farmers‑market visits, and church gatherings. Growing up in a predominantly white, middle‑class environment, she
    is exposed to values of community, modesty, self‑reliance, and cooperation. Her parents emphasize politeness and helpfulness, and she attends a nearby preschool that incorporates play‑based learning,
    seasonal celebrations, and structured routines.
attributes:
  skills: '["Basic counting (1‑20)", "Letter recognition (A‑Z)", "Simple puzzle solving", "Toy organization", "Following daily routines", "Empathetic interaction", "Cooperative play", "Fine‑motor skills
