  hobbies: '[''Balcony gardening (herbs, chilies, fruit plants)'', ''Playing acoustic guitar'', ''Listening to Salvadoran cumbia and reggae en Español'', ''Volunteering at a community garden'', ''Evening
    park walks'', ''Reading graphic novels'', ''Cooking traditional pupusas for family'']'
  career_goals: Flavio aims to move into a supervisory role within the next three years, becoming a crew foreman who coordinates small teams and ensures projects stay on schedule. He plans to earn a GED
    and later pursue a certification in horticulture or turf management to deepen his knowledge. Long‑term, he dreams of launching his own community‑focused landscaping business that offers affordable green‑space
    maintenance for low‑income neighborhoods in Winston‑Salem, creating jobs for other young immigrants and giving back to the area that supports his family.
