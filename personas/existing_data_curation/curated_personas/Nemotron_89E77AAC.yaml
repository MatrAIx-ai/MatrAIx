personas:
  professional: Flavio Ramirez, a 22‑year‑old landscaping specialist, leverages their hands‑on expertise with power tools, irrigation systems, and bilingual communication to deliver meticulous site work
    while quietly aspiring to a foreman role, balancing their love of structure with a laid‑back, cooperative approach that keeps clients and teammates at ease.
  sports: Flavio Ramirez follows the Winston‑Salem Dash minor‑league baseball team and the Carolina Hurricanes NHL franchise, joins a casual weekend pickup soccer game at a nearby park, maintains a modest
    fitness routine of evening walks and occasional bike rides, prefers low‑key activity over regimented gym sessions, and they enjoy cheering with friends at the local sports bar when the game is on.
  arts: Flavio Ramirez indulges in cumbia by Los Ángeles Azules and reggae en Español from Los Cafres while strumming chord progressions on their acoustic guitar, devotes weekends to reading graphic novels
    like 'Maus' and 'Saga', and they occasionally perform at a community cafe’s open‑mic nights, weaving music and visual storytelling into their solitary creative outlet.
  travel: Flavio Ramirez enjoys budget‑friendly road trips along the Blue Ridge Parkway, frequently visits Asheville for its artisan markets, dreams of exploring the coffee farms of Colombia, and plans
    future trips around affordable hostels while balancing a modest travel fund with family obligations, and they often map out itineraries using a free travel app.
  culinary: Flavio Ramirez cooks pupusas stuffed with mozzarella cheese and refried beans, seasons their balcony‑grown cilantro and oregano to flavor homemade salsa verde, experiments with chilies such
    as ají dulce for spicier sauces, and they occasionally grill marinated skirt steak, revealing a moderate cooking skill set guided by love for heritage dishes and fresh ingredients.
  core: Flavio Ramirez, a practical yet easy‑going landscaping enthusiast, balances careful budgeting, occasional health neglect, low‑key sports enthusiasm, a love for cumbia and graphic novels, modest
    travel ambitions, and a knack for cooking traditional pupusas—while they navigate the tension between structured goals and a laid‑back lifestyle.
background:
  cultural: Flavio is the son of Salvadoran immigrants who settled in North Carolina in the early 2000s. At home, Spanish is the primary language, and the family maintains strong ties to Salvadoran customs—celebrating
    fiestas like Día de la Independencia (September 15) with traditional foods, music, and stories of their hometown. The Salvadoran emphasis on community solidarity and helping one another has shaped Flavio's
    compassionate outlook. He participates in local diaspora events, such as the annual Fiesta Salvadorena in Winston‑Salem, where he connects with other young Salvadorans, shares food, and reinforces his
    cultural identity while adapting to life in the American South.
attributes:
  skills: '[''Lawn mowing'', ''Hedge trimming'', ''Irrigation system installation and maintenance'', ''Plant identification'', ''Power‑tool operation'', ''Basic landscaping design'', ''Equipment maintenance'',
