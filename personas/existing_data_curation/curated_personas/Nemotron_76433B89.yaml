  career_goals: Jessica aims to move into a senior leadership role where she can shape technology strategy for regional public‑service agencies, focusing on user‑centric, sustainable solutions. She is passionate
    about mentoring junior analysts—especially women—and hopes to launch a mentorship program within her organization. Over the next five years she plans to spearhead initiatives that integrate accessible
    tech tools for local nonprofits and eventually publish a guide on pragmatic system analysis that blends innovative thinking with proven best practices.
