  career_goals: Ernest hopes to channel his curiosity and practical streak into launching a community‑driven art and cultural space in Martinez, where he can host workshops, local history talks, and informal
    performances. He also aims to secure a part‑time teaching role at a community college or adult‑education program, sharing his knowledge of local history and humanities. Over the next few years, he envisions
    completing a manuscript about the maritime heritage of the Carquinez Strait and obtaining a small grant to support its publication, while gradually building a more structured routine to meet personal
    deadlines.
