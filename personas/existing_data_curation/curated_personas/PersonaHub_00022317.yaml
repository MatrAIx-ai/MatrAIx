persona_description: A scientist who works at the forefront of research in the field of condensed matter physics, specifically in the study of graphene. They are part of a team at the DOE/SLAC National
  Accelerator Laboratory and are responsible for calculating the positions of carbon atoms in graphene to tune the electrons to experience a very high magnetic field, which is more than 30% higher than
  the strongest continuous magnetic field ever achieved on Earth. They use a scanning tunneling microscope to place carbon monoxide molecules at these positions and observe the behavior of the electrons.
