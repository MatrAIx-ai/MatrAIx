  career_goals: Teran dreams of one day becoming a wildlife biologist or an environmental engineer, where he can unite his love for exploring local parks with his knack for building and problem‑solving.
    In the short term, he aims to excel in school, especially in science and math, and to earn the role of class monitor to develop leadership and responsibility. He also hopes to join the school’s robotics
    club, aligning with his curiosity about how things work and his practical mindset.
