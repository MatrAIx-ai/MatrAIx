personas:
  professional: Teran Kolb is a budding LEGO architect who blends curiosity about complex builds with the practical discipline of following step‑by‑step instructions, often leading their Cub Scout group
    in constructing rope bridges while balancing a knack for organized planning with spontaneous creative tweaks.
  sports: Teran Kolb plays forward for the Lake Villa United Youth Soccer club, idolizes the Chicago Fire's striker Carlos Vela, enjoys weekend matches at local fields, and balances the drive to score with
    a cooperative spirit, though they sometimes forget to stretch after games.
  arts: Teran Kolb devotes free time to sketching original comic strips inspired by Stan Lee’s dynamic heroes and the whimsical worlds of Hayao Miyazaki’s films, while also collecting LEGO sets that echo
    the imaginative architecture of The LEGO Movie, blending visual storytelling with hands‑on creativity.
  travel: Teran Kolb loves weekend family road trips to the nearby Lake County forest preserves and has mapped out a future adventure to Yellowstone National Park, favoring a mix of structured itineraries
    with spontaneous detours to explore hidden lakes, all while balancing school schedules and a modest family travel budget.
  culinary: Teran Kolb enjoys helping in the kitchen by assembling grilled cheese sandwiches with sharp cheddar and sourdough, crafting trail mix of pretzels, dried cranberries, and chocolate chips, and
    experimenting with fruit kebabs featuring apples, grapes, and pineapple, showcasing a budding culinary curiosity tempered by a preference for quick, familiar flavors.
  core: Teran Kolb is a curious, organized nine‑year‑old who balances adventurous exploration with practical projects, occasionally trading focus for snack‑fueled LEGO marathons and a penchant for forgetting
    to clean up afterward.
background:
  cultural: Teran comes from a typical Midwestern white American family in Lake Villa, Illinois. His heritage includes German and Swedish roots, reflected in family traditions such as seasonal garden planting,
    celebrating holidays with a blend of Lutheran and broader American customs, and regular community participation at the local church and town events. Growing up near several lakes and forest preserves
    has fostered his love for outdoor exploration, while the region's emphasis on practical skills and community responsibility shapes his balanced, curiosity‑driven outlook.
