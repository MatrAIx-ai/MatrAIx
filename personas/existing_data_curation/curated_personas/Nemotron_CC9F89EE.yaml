  hobbies: '[''Improv comedy'', ''Community gardening'', ''Hydroponic experiments'', ''Youth robotics coaching'', ''Organizing potluck dinners'', ''Hiking'', ''Vinyl record collecting'']'
  career_goals: At 51, Isaac is focused on advancing into a supervisory or program‑director position within a regional social‑service agency. He aspires to lead a team that designs integrated service models
    that blend behavioral health support with technology solutions, improving client outcomes across Essex County. To solidify his expertise, he plans to earn a certification in clinical social work and
    pursue a master's degree in social work. He also aims to launch a community‑based digital‑literacy initiative that empowers underserved residents to access online resources, and ultimately influence
    policy reforms that expand equitable service access in the metropolitan area.
