persona_description: A person who is sensitive to social cues and is particularly interested in understanding the motivations and intentions of others. They are highly observant and can detect subtle differences
  in body language and tone of voice that others may not be aware of. They are also highly empathetic and can understand the emotional states of others, even if they are not verbally expressing them. They
  are skilled at reading people's behavior and can quickly determine whether someone is being genuine or not. They are also highly analytical and can break down complex social situations into their underlying
  motivations and intentions. They are likely to be inquisitive and curious, and enjoy learning about the nuances of social interactions and relationships.
