  hobbies: '[''Watercolour painting'', ''Visiting art galleries'', ''Gardening native plants'', ''Salsa dancing'', ''Volunteering at community center'', ''Teaching basic hairstyling to seniors'', ''Book
    club (contemporary fiction)'', ''Cooking Mediterranean cuisine'', ''Road trips to cultural festivals'', ''Yoga for stress relief'']'
  career_goals: Monica aspires to open a boutique salon that doubles as an artistic studio, where clients can experience hair styling as a form of personal expression. She dreams of launching her own line
    of natural hair‑care products inspired by Mediterranean ingredients she discovered during her travels. In the next five years, she hopes to become a certified trainer, delivering workshops on avant‑garde
    hair techniques at regional beauty schools and industry conferences. Monica also aims to cultivate a mentorship program for aspiring stylists from under‑served communities in St. Lucie County, combining
    her competitive drive with a desire to give back. While she values flexibility, she plans to implement structured wellness routines to mitigate stress and maintain her creative energy.
