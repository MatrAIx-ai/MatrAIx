personas:
  professional: Monica Large, a veteran hairdresser with over three decades of precision cutting, coloring, and avant‑garde styling, blends their watercolor sensibility into every balayage and up‑do while
    running the salon’s logistics, mentoring junior stylists, and leveraging Instagram reels to attract a clientele eager for artistic hair experiences, all in pursuit of a boutique that doubles as an artistic
    studio.
  sports: Monica Large channels their outgoing energy into twice‑weekly salsa dancing at the Sunrise Salsa Club, evening walks with the Treasure Coast Walking Group, and avidly follows the Miami Dolphins
    and Orlando Magic, while occasionally joining a casual co‑ed softball league that satisfies their competitive streak.
  arts: Monica Large’s artistic life is a tapestry of watercolor sunrise landscapes inspired by Florida’s coast, regular visits to galleries showcasing works by Claude Monet and Georgia O’Keeffe, and a
    deep appreciation for the soulful jazz of Diana Krall and the theatrical flair of Lin‑Manuel Miranda’s Hamilton whenever it tours the nearby auditorium, they find endless inspiration for both hair design
    and personal expression.
  travel: Monica Large curates spontaneous road trips to cultural festivals in New Orleans, the historic streets of Savannah, and the vibrant art fairs of Key West, while dreaming of a Mediterranean cruise
    that blends their love for sun‑kissed ports, local music, and fresh seafood markets, always balancing budget constraints with the desire for immersive experiences.
  culinary: Monica Large’s kitchen is a laboratory of Mediterranean flavors where they perfect Greek moussaka with locally sourced oregano, Spanish paella infused with saffron and fresh shrimp, and Italian
    bruschetta topped with heirloom tomatoes and basil harvested from their own herb garden, all while experimenting with new recipes each week and occasionally over‑salting dishes in moments of creative
    frenzy.
  core: Monica Large is a creatively restless salon veteran who paints sunsets, dances salsa, and battles occasional financial disarray and health anxieties with a competitive spark and a habit of last‑minute
    planning.
background:
  cultural: Monica is a third‑generation white American with ancestry tracing back to Irish and Italian immigrants who settled in the Midwest. She grew up in a small Midwestern town where community values
    and a modest work ethic were emphasized. After completing an associate degree in cosmetology, she moved to Port Saint Lucie, Florida, drawn by the warm climate and the region's vibrant, multicultural
    atmosphere. While she retains the practical sensibilities of her Midwestern upbringing, she has embraced the Floridian lifestyle—enjoying outdoor activities, multicultural cuisine, and a relaxed yet
    socially active community. Her cultural identity blends traditional American family values with an openness to diverse artistic influences that she encounters in her daily life.
