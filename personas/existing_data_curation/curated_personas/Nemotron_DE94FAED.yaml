  hobbies: '[''Hiking'', ''Senior Basketball League'', ''Live Music Events'', ''Gardening'', ''Barbecue Cooking'', ''Volunteer at Animal Shelter'', ''DIY Home Improvement'', ''Travel to Historical Sites'',
