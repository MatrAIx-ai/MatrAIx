personas:
  professional: William Black is a seasoned community‑college business educator who blends meticulous curriculum design and data‑driven financial analysis with a laid‑back classroom style, using Power BI
    and learning‑management systems to create structured yet adaptable entrepreneurship programs while balancing assertive mentorship with a cooperative, student‑centered approach, and they inspire students
    with practical optimism.
  sports: William Black enjoys early‑morning fly‑fishing on nearby rivers, plays a casual round of golf at the local course on weekends, hikes the Kettle Moraine State Forest regularly, and they proudly
    follow the Milwaukee Brewers, Milwaukee Bucks, and Green Bay Packers, using the teams’ seasonal games as a relaxed social outlet.
  arts: William Black regularly attends community‑theater productions of classic plays such as Arthur Miller's Death of a Salesman, they delight in folk singer John Denver's outdoor‑themed albums, and they
    keep a collection of historical nonfiction biographies that inspire both their teaching and personal reflections.
  travel: William Black prefers nature‑focused getaways, having trekked the Adirondack High Peaks and explored Yellowstone's geysers, while also taking a historically rich road trip to Gettysburg and the
    National Mall, and they always plan trips around modest budgets and limited vacation days due to teaching commitments.
  culinary: William Black favors hearty Midwestern fare, often grilling river‑caught trout with lemon‑dill butter, simmering a rustic beef and vegetable stew using heirloom carrots and sweet corn from their
    garden, and they occasionally experiment with homemade apple pie spiced with cinnamon and nutmeg, though they admit to over‑seasoning dishes when stressed.
  core: William Black is a structured yet easy‑going business educator who balances meticulous curriculum design with a love for woodworking, fly‑fishing, and occasional stress‑induced over‑cooking, all
    while they wrestle with chronic worry and a penchant for forgetting appointments.
background:
  cultural: William grew up in a small farming community in central Wisconsin, descending from German and Scandinavian ancestors who settled the region in the late 19th century. Raised in a Lutheran household,
    he internalized values of modesty, hard work, self‑reliance, and community service. The local culture emphasized practical education, seasonal festivals, and a strong sense of neighborly hospitality.
    These Midwestern roots shape his pragmatic outlook, appreciation for simplicity, and commitment to contributing to his community.
attributes:
  skills: '[''Curriculum design for business courses'', ''Financial analysis and budgeting instruction'', ''Instructional technology integration (LMS, Power BI, Excel)'', ''Project‑based learning facilitation'',
    ''Mentoring and career counseling'', ''Public speaking and presentation'', ''Data analysis using Excel and Power BI'', ''Conflict resolution and classroom management'']'
  hobbies: '[''Fly‑fishing on Wisconsin rivers'', ''Woodworking and furniture making'', ''Vegetable gardening'', ''Reading historical non‑fiction'', ''Playing golf'', ''Mentoring youth entrepreneurship
    club'', ''Attending community theater'', ''Hiking in Kettle Moraine State Forest'']'
  career_goals: He aims to become the department chair or program director at his community college, using that role to launch a regional small‑business incubator and entrepreneurship program. William hopes
    to author a practical guide on financial literacy for adult learners and to transition gradually to part‑time consulting for local startups, allowing more flexibility to manage stress. He also plans
    to earn a certification in stress‑management and mental‑health first aid to better support his students' well‑being.
