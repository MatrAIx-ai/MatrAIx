personas:
  professional: Michael Cross is a veteran mechanical maintenance specialist turned part‑time handyman entrepreneur, applying two decades of mining equipment troubleshooting, hydraulic and electrical expertise,
    and disciplined shift‑supervisor leadership to deliver reliable home repairs and community mentorship in Hibbing.
  sports: Michael Cross stays fit through senior‑center bowling, snowmobile outings with the Northland Riders club, and seasonal hunting trips, while cheering on the Minnesota Vikings and attending Hibbing
    High School football games.
  arts: Michael Cross unwinds by listening to classic rock icons like Led Zeppelin and The Rolling Stones, and channels creative expression into woodworking projects inspired by the elegant designs of Sam
    Maloof, often showcasing hand‑crafted furniture at local art fairs.
  travel: Michael Cross prefers meticulously planned road trips that blend outdoor adventure with comfort, such as annual ice‑fishing expeditions to Lake of the Woods in Canada and a long‑awaited drive
    to Norway’s fjord region to experience pristine winter landscapes.
  culinary: Michael Cross loves hearty Midwestern cooking, regularly grilling walleye and venison stew seasoned with juniper berries, perfecting blueberry pancakes topped with locally sourced maple syrup,
    and savoring a bowl of split‑pea soup during cold evenings.
  core: Michael Cross blends a disciplined, hands‑on work ethic with a love for camaraderie, often juggling a toolbox in one hand and a bowling ball in the other, though their habit of over‑scheduling leaves
    little room for spontaneous downtime.
background:
  cultural: 'Michael grew up in the Upper Midwest, steeped in the values of Midwestern small‑town life: self‑reliance, community involvement, and a strong work ethic. His family heritage reflects the region’s
    German‑Scandinavian roots, influencing his appreciation for outdoor recreation, seasonal traditions, and modest, practical living. Living in Hibbing, a historic mining community, he identifies with
    the legacy of labor solidarity and the close‑knit social fabric typical of the area. His cultural outlook combines traditional American Protestant values with a pragmatic, down‑to‑earth perspective
    shaped by the harsh northern climate.'
attributes:
  skills: '[''Mechanical maintenance'', ''Hydraulic and electrical troubleshooting'', ''Industrial safety compliance'', ''Team leadership and crew coordination'', ''Carpentry and woodworking'', ''General
