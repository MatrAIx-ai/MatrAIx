  hobbies: '[''Ice fishing'', ''Snowmobiling'', ''Hunting'', ''Bowling'', ''Community bingo coordination'', ''Woodworking'', ''Classic rock music'', ''Attending high‑school football games'', ''Church charity
    volunteering'']'
  career_goals: Michael aims to transition his technical expertise into a part‑time handyman business serving the Hibbing community, focusing on home repairs, small carpentry projects, and equipment maintenance
    for local farms and small businesses. He also plans to obtain a vocational certification in residential remodeling to broaden his service offerings. Beyond the business, he wants to take on a mentorship
    role, sharing his practical knowledge with younger apprentices through a local trade school partnership. Maintaining a stable income and a predictable daily routine while staying socially engaged are
    central to his ambitions.
