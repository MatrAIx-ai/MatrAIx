  career_goals: Lisa aims to advance to a supervisory or managerial position within the casino, where she can lead a team and oversee compliance and responsible gaming initiatives. She plans to earn a Certified
    Gaming Compliance Professional (CGCP) credential and complete a bachelor's degree in Hospitality Management part‑time. Long‑term, she hopes to transition to a role with a more predictable schedule that
    reduces stress, allowing her to focus on health and community involvement before retirement.
