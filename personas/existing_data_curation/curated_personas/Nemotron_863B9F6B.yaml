personas:
  professional: Lisa Imler is a seasoned casino floor operations specialist with 15+ years of expertise in customer service, cash handling, and gaming compliance, whose meticulous, structured approach and
    calm conflict‑resolution style position them as a natural leader poised for a supervisory role.
  sports: Lisa Imler enjoys leisurely walks along the Indian River, participates in a local senior pickleball league, cheers on the Miami Heat and the Florida Panthers, and joins the community center’s
    weekly low‑impact aerobics class, balancing a love for gentle exercise with occasional attendance at Miami Marlins weekend games.
  arts: Lisa Imler immerses themselves in mystery literature, favoring Agatha Christie and Gillian Flynn, attends the Vero Beach Museum of Art’s monthly watercolor exhibits, delights in classic films starring
    Cary Grant, and enjoys acoustic folk performances by Joan Baez at nearby coffee houses.
  travel: Lisa Imler prefers low‑key, well‑planned trips, having explored the historic streets of St. Augustine, the sun‑kissed islands of the Florida Keys, and a week‑long cruise to the Bahamas, while
    dreaming of a leisurely road‑trip through the vineyards of Tuscany once retirement savings allow more flexibility.
  culinary: Lisa Imler is an avid baker who perfects sourdough loaves, lemon‑blueberry muffins, and key‑lime pie, often incorporating fresh rosemary and thyme from the backyard garden into savory breads,
    and enjoys pairing their homemade desserts with a steaming cup of Earl Grey tea.
  core: Lisa Imler’s life blends disciplined casino expertise, meticulous financial caution, vigilant health monitoring, gentle fitness pursuits, mystery‑driven artistic tastes, modest travel ambitions,
    and a kitchen habit of baking comfort foods, all tinged by an ever‑present worry about staying balanced.
background:
  cultural: Lisa grew up in a middle‑class suburban community on Florida’s east coast, immersed in mainstream American culture with Southern hospitality influences. As a white Floridian, she values self‑reliance,
    community involvement, and a practical outlook shaped by her upbringing in the 1970s‑80s. Her cultural experiences include celebrating traditional holidays, enjoying coastal cuisine, and participating
    in local festivals that reflect the diverse yet familiar fabric of Indian River County.
