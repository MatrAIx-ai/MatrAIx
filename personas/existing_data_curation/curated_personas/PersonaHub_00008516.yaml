persona_description: A person interested in tracking and analyzing the emission of greenhouse gases (GHGs) in the state of California, particularly in the context of the state's GHG inventory and its trends
  over the years from 2000 to 2011. This person may have a background in environmental science, energy policy, or climate change, and is interested in understanding the factors affecting GHG emissions,
  such as the state of the economy, changes in demography, improved efficiency, and changes in environmental conditions. This person may also be interested in comparing the results of the inventory with
  other state GHG inventories or with international inventories.
