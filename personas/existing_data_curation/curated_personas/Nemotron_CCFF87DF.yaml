  career_goals: Kimberly dreams of turning her love for imagination and art into a career as a concept artist or animator for video games and animated films. She aims to attend a specialized art high school
    and later study visual arts or game design at a university. In the long term, she hopes to combine her creative talents with her sensitivity to emotional well‑being by designing therapeutic art programs
    for youth, possibly working in schools or community centers to help peers cope with stress through creative expression.
