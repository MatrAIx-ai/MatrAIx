personas:
  professional: Kimberly Katona, a budding concept artist and teen writer, channels her imagination into digital paintings of fantasy realms while juggling school assignments, and they often volunteer to
    design sets for the local theater, showcasing a blend of artistic skill and reliable teamwork.
  sports: Kimberly Katona plays on her middle‑school’s coed soccer club, the Townville Tigers, enjoys weekend jogging with friends, and is an avid fan of the Los Angeles Lakers, often tuning into NBA games
    on Sunday evenings as a way to unwind.
  arts: Kimberly Katona draws inspiration from Hayao Miyazaki’s animated worlds, paints digital tributes to J.R.R. Tolkien’s Middle‑Earth, strums ukulele covers of Kathryn Calder, and performs in the community
    theater where they admire the stagecraft of Broadway’s ‘Hamilton’ and the choreography of Lin‑Manuel Miranda.
  travel: Kimberly Katona has treasured a road‑trip to the Grand Canyon, a weekend study excursion to the Smithsonian in Washington, D.C., and a family vacation in Edinburgh during the Fringe Festival,
    and they dream of backpacking through Kyoto’s bamboo groves and attending the Icelandic Aurora Tour to experience the Northern Lights.
  culinary: Kimberly Katona loves experimenting with a modest kitchen, frequently whipping up avocado toast topped with feta and chili flakes, perfecting homemade sushi rolls with tuna and pickled ginger,
    and treating themselves to indulgent chocolate chip cookies baked with a dash of sea salt, while their favorite take‑out remains a spicy Szechuan noodle bowl.
  core: Kimberly Katona is a vivid‑imagination teen whose creative bursts in art, stories, and music serve both as an outlet for their frequent worries and a buoy that keeps them socially engaged, albeit
    with occasional bouts of procrastination and snack‑driven insomnia.
background:
  cultural: Kimberly grew up in Lawrenceburg, Indiana, a small Midwestern town with a close‑knit community that values family, local traditions, and community involvement. Her family has deep roots in the
    region, tracing ancestry to German and Irish immigrants who settled in the area generations ago. She participates in typical Midwestern activities such as county fair events, Fourth of July parades,
    and church youth group gatherings. The local culture emphasizes modesty, hard work, and supporting neighbors, which has shaped Kimberly's cooperative yet assertive nature and her desire to give back
    through creative community projects.
