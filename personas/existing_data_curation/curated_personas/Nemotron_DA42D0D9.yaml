personas:
  professional: Taylor Gillette, a budding scientist who transforms backyard discoveries into mini‑experiments, loves asking 'why' about everything, and eagerly shares findings with classmates during circle
    time, because they thrive on curiosity and social interaction.
  sports: Taylor Gillette, an energetic participant in preschool soccer at the Little Kickers Club, idolizes the New York Yankees, cheers with a foam baseball cap, and attends weekly toddler gymnastics
    at Bright Stars, because they love being the center of attention on the field.
  arts: Taylor Gillette, a creative doodler who spends afternoons painting bright rainbows while humming Raffi’s 'Baby Beluga,' dancing to the Frozen soundtrack, and mimicking Bluey’s playful antics, proudly
    displays their artwork on the fridge, because they thrive on artistic expression and social applause.
  travel: Taylor Gillette, a curious traveler who loves family road trips to the Grand Canyon, squeals with delight at the magical lights of Disneyland, and dreams of building sandcastles on Myrtle Beach’s
    sunny shores, because they cherish shared adventures and new experiences.
  culinary: Taylor Gillette, a budding chef who delights in scooping cheesy macaroni, spreading peanut butter on jelly toast, and arranging colorful apple slices with a sprig of mint, proudly declares themselves
    a 'master of the mini kitchen,' yet they sometimes beg for chocolate milk past bedtime.
  core: Taylor Gillette, a talkative, art‑loving four‑year‑old whirlwind who thrives on social play, curious experiments, and sharing, yet often forgets to tidy up their crayons.
background:
