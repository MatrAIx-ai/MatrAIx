  hobbies: '[''Reading historical fiction'', ''Genealogy research'', ''Quilting'', ''Gardening'', ''Birdwatching'', ''Cooking Southern dishes'', ''Walking/hiking'', ''Listening to classic country and gospel
    music'', ''Church small‑group bible study'', ''Playing bridge'']'
  career_goals: Jane hopes to transition into a senior case‑manager role where she can mentor newer staff and develop a small training program on client empowerment and resource navigation. She plans to
    obtain a certification in mental‑health first aid and to lead a pilot support group for isolated seniors in Tallahatchie County. In the longer term, she envisions part‑time consulting after retirement,
    using her experience to help local non‑profits improve service delivery while also authoring a community oral‑history manuscript that highlights the resilience of her hometown.
