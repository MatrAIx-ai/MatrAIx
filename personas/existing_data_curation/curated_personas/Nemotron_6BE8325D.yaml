personas:
  professional: Jane Donahue, a seasoned social and human services assistant in rural Mississippi, blends three decades of case‑management expertise with a relaxed, curiosity‑driven approach, using storytelling
    and meticulous record‑keeping to empower clients while quietly aiming to step into a senior case‑manager role and mentor newer staff, and they cherish the balance between flexibility and responsibility.
  sports: Jane Donahue, a devoted supporter of the Mississippi State Bulldogs and the New Orleans Saints, tracks the Tallahatchie County Senior Walking Club’s weekend strolls and occasionally participates
    in a community bridge league that functions as their social‑sport outlet.
  arts: Jane Donahue, who knits quilts while humming classic country legends like Loretta Lynn and listening to gospel stalwarts such as The Gospel Harmonettes, finds solace in historical novels by Philippa
    Gregory and often attends the small‑town community theater’s productions of Tennessee Williams plays, and they cherish these artistic escapes as quiet gatherings with like‑minded friends.
  travel: Jane Donahue, who prefers relaxed road trips over packed itineraries, frequently visits nearby historic towns like Natchez and Oxford, dreams of a serene weekend in Asheville’s Blue Ridge Mountains,
    and relies on their nephew’s help to book the occasional flight to New Orleans for the annual Jazz & Heritage Festival, and they tend to let their calendar spill over, savoring the spontaneous charm
    of each journey.
  culinary: Jane Donahue, an avid cook of classic Southern fare such as shrimp and grits, collard greens simmered with smoked turkey, and pecan‑streusel banana pudding, cultivates much of their fresh produce—sweet
    potatoes, okra, and heirloom tomatoes—in their garden and maintains a moderate skill level that lets them experiment with a dash of hot sauce in every family dinner.
  core: Jane Donahue is a curiosity‑driven, quietly assertive retiree who blends practical empathy with a relaxed, sometimes disorganized routine, finding comfort in quilting, genealogy, and gentle walks
    while habitually worrying about money and health, and they often seek reassurance through meticulous note‑keeping.
background:
  cultural: Jane is a white Southern native raised in Cascilla, a small town in Tallahatchie County, Mississippi. Her upbringing was shaped by the region’s strong sense of community, church life, and Southern
    hospitality. She grew up with deep family ties, seasonal local festivals, and a respect for the agricultural roots of the area. The history of the Delta—its civil‑rights legacy, music traditions, and
    close‑knit neighborhoods—continues to influence her worldview. Jane values modesty, self‑reliance, and the tradition of helping neighbors, while also embracing the practical wisdom passed down through
    generations of families in the rural South.
