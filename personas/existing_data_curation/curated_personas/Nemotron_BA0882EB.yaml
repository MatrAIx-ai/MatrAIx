personas:
  professional: Brittney Chao is a miniature city planner who builds block towers with precise alignment, and they relish the predictable rhythm of stacking, reflecting their love for structure.
  sports: Brittney Chao is a small‑group playground enthusiast who enjoys toddler gymnastics at the Little Sprouts Gym, and they favor the predictable obstacle course routine while shyly cheering for the
    local Tiny Tigers mini‑soccer team.
  arts: Brittney Chao is a meticulous little artist who fills Crayola coloring books within the lines while humming "Twinkle Twinkle Little Star" and watching Sesame Street, and they find comfort in the
    orderly patterns and familiar melodies.
  travel: Brittney Chao is a tiny explorer who loves short, well‑planned outings to the local aquarium and weekend visits to Grandma’s countryside house, and they dream of a future trip to Disneyland where
    the predictable rides would keep them comforted.
  culinary: Brittney Chao is a picky eater who routinely asks for chicken nuggets, apple slices, and a drizzle of honey on oatmeal, and they keep a secret stash of raisins hidden under their pillow for
    a surprise snack.
  core: Brittney Chao is a structure‑loving three‑year‑old whose quiet curiosity, meticulous routines, and occasional worries paint a portrait of a tiny planner navigating a big world with careful steps.
background:
  cultural: Brittney is raised in a Micronesian household in Tulsa, Oklahoma. Her family maintains traditions from their island heritage, including bilingual exposure to English and a Micronesian language
