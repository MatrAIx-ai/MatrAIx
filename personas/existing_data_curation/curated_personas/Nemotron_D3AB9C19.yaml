  hobbies: '[''Landscape watercolor painting'', ''Botanical sketching'', ''Poetry composition'', ''Quilting'', ''Knitting'', ''Heirloom gardening'', ''Herb foraging'', ''Attending craft fairs'', ''Yoga
    and meditation'', ''Reading magical realism'', ''Community theater attendance'']'
  career_goals: Alberta aims to channel her imagination and compassion into a more formal role as a community arts facilitator, hoping to develop a weekly art‑therapy workshop for seniors and at‑risk youth
    in Fletcher. She also wishes to complete a certificate in expressive arts therapy and eventually volunteer as a grief‑support mentor at the local hospice. On a personal level, she dreams of publishing
    a collection of poems and nature‑inspired sketches, and to create a small line of hand‑crafted home décor that reflects Appalachian folk aesthetics.
