  career_goals: Maryann aims to transform her passion for art and community engagement into a sustainable career. She plans to enroll in a part‑time associate's program in art history or museum studies
    at a nearby community college, with the long‑term goal of securing a curatorial assistant position at the Quad City Museum. In parallel, she hopes to launch a low‑overhead community art studio that
    offers workshops, exhibition space, and mentorship for emerging local artists. By building a reputable online presence through her blog and social media, she also aspires to become a freelance cultural
    writer and consultant for regional arts initiatives.
