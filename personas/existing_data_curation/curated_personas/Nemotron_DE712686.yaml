  hobbies: '[''Playing soccer with local teammates'', ''Skateboarding at the El Paso skate park'', ''Cooking Mexican street‑food recipes'', ''Creating TikTok videos and editing short clips'', ''Attending
    salsa dancing nights'', ''Volunteering at a community youth center'', ''Exploring border cultural festivals'', ''Binge‑watching streaming series with friends'']'
  career_goals: Carlos aspires to obtain his GED within the next year and then enroll in a community‑college program for automotive technology or hospitality management. He wants a career that blends his
    hands‑on curiosity with his people‑oriented personality, such as becoming a certified auto technician who can also run a small, family‑owned repair shop, or working as a restaurant manager with the
    long‑term goal of opening his own taco stand. He aims to earn a certification in ASE (Automotive Service Excellence) and acquire management experience through part‑time jobs, while keeping enough flexibility
    to stay involved in his community and support his family.
