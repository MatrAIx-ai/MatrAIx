persona_description: A researcher or scientist who specializes in the study of vegetation and soil ecology, particularly in the field of trampling and its effects on vegetation and soil. They are interested
  in evaluating the short-term and long-term effects of various trampling intensities on a variety of vegetation types, and generating quantitative models to approximate the relationship between vegetation
  cover after trampling and trampling intensity. They aim to provide concrete information necessary for field management to address concerns about the adverse impacts associated with outdoor recreation.
