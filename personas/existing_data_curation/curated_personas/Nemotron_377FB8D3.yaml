personas:
  professional: Samuel Bajos, a 20‑year‑old certified journeyman electrician, blends rigorous code‑compliant wiring expertise with a flair for creative lighting design, using CAD and LED art to turn residential
    smart‑home projects into interactive installations while meticulously tracking schedules and inventory, and they channel their disciplined organization into mentoring apprentices and drafting proposals
    for renewable‑energy retrofits.
  sports: Samuel Bajos thrives on the soccer field, playing as a midfield pivot for the community’s Saturday league team, the Greenfield Strikers, while cheering for the regional professional club, the
    Dallas FC, and they also follow the occasional NBA season, rooting for the Denver Nuggets; they schedule two to three weekly training sessions, and their competitive drive is balanced by a habit of
    stretching rigorously to prevent injuries.
  arts: Samuel Bajos expresses creativity through LED murals inspired by James Turrell’s light sculptures, digital illustrations channeling the vivid style of Bee Bee Miller, and acoustic guitar arrangements
    that reinterpret folk classics reminiscent of Rhiannon Giddens, while they regularly attend local open‑mic nights and volunteer to design stage lighting for neighborhood festivals, merging technical
    precision with artistic storytelling.
  travel: Samuel Bajos favors weekend road trips that combine hiking in the national parks of Colorado with visits to street‑art‑rich neighborhoods in Berlin, and they have a bucket list that includes exploring
    the aurora borealis in Iceland and attending the Light Festival in Taiwan; they plan trips meticulously using spreadsheet itineraries, yet they sometimes book last‑minute flights to a music festival
    when a friend persuades them.
  culinary: Samuel Bajos enjoys cooking at home, often preparing a smoky grilled corn flatbread topped with slow‑cooked brisket, chipotle‑spiced crema, pickled radish, and a side of char‑grilled cactus
    strips, while they experiment with sous‑vide techniques for doughy parcels filled with seasoned vegetables, reflecting a bold palate that loves smoky, spicy, and tangy flavors.
  core: Samuel Bajos, a 20‑year‑old electrician‑artist, balances disciplined technical mastery with an imaginative streak, turning smart‑home jobs into LED installations, while juggling a budget for gadgets,
    a love of soccer and guitar, and a habit of over‑caffeinating during late‑night design sessions.
background:
  cultural: Samuel is a first‑generation Mexican‑American whose parents moved from Jalisco, Mexico, to Texas in the early 2000s. Raised in a bilingual household, he celebrates traditional Mexican holidays
    such as Día de los Muertos and Las Posadas while also embracing American customs. Family gatherings centered around homemade tamales and mariachi music have instilled a deep sense of community and cultural
    pride. Living in Little Elm, within the diverse Dallas‑Fort Worth metroplex, he participates in local Latino festivals and blends the vibrant aesthetics of Mexican folklore with the entrepreneurial
    spirit of Texas. This cultural mix informs his values of hard work, hospitality, and creativity, which he expresses both in his electrical work and his artistic hobbies.
attributes:
  skills: '[''Residential wiring'', ''Smart home automation'', ''Solar panel installation'', ''Electrical troubleshooting'', ''NEC code compliance'', ''Project planning'', ''Inventory management'', ''Bilingual
    communication (English/Spanish)'', ''CAD drafting'', ''LED lighting design'']'
  hobbies: '[''LED art projects'', ''Digital illustration'', ''Acoustic guitar'', ''Salsa dancing'', ''Amateur soccer'', ''Tech meetups'', ''Science fiction reading'', ''Volunteer electronics workshops'',
    ''Stage lighting design'', ''Cooking Mexican‑Texan fusion'']'
  career_goals: Samuel aims to obtain a master electrician license within the next three years and to specialize further in renewable‑energy solutions and advanced smart‑home technologies. He plans to earn
    certifications such as the NABCEP PV Installation Specialist and to eventually launch his own environmentally focused electrical contracting firm that offers energy‑efficiency consulting, solar retrofits,
    and bespoke lighting installations for residential and commercial clients. He also hopes to mentor the next generation of apprentices, develop community outreach workshops on electrical safety, and
    collaborate on public art projects that showcase his blend of technical expertise and artistic vision.
