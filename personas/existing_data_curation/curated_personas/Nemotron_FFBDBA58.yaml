  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Cooking Southern cuisine'', ''Birdwatching'', ''Walking along the bay'', ''Volunteering at the local church safety committee'',
    ''Community safety education workshops'', ''Crossword puzzles'', ''Sudoku'']'
  career_goals: Kristie aims to advance to a senior safety leadership role within her organization, such as Safety Manager or Director of Health, Safety, and Environment, where she can shape a culture of
    preventive safety across the entire plant. She plans to earn the Certified Safety Professional (CSP) credential and pursue a master’s degree in occupational health to deepen her expertise. Over the
    next five years, she hopes to lead a plant‑wide safety culture transformation that reduces lost‑time injury rates by at least 30% and earns industry recognition for excellence in safety performance.
    Kristie also wants to mentor junior engineers, especially women entering the field, and to develop community outreach workshops that promote workplace safety awareness in the Eastern Shore region.
