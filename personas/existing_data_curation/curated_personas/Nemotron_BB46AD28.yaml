personas:
  professional: Marcus Boudreaux is an aspiring young engineer who blends his love for LEGO architecture, Minecraft world‑building, and Scratch programming into a budding talent for creative problem‑solving,
    while his gregarious nature makes him the go‑to collaborator on school projects and community theater tech crews.
  sports: Marcus Boudreaux dribbles for the Riverside Youth Soccer Club, swims competitively with the Seaside Swim Team, and spends weekends mastering tricks at the Grove Skate Park, all while cheering
    loudly for the New York Knickerbockers and the US Women’s National Soccer Team.
  arts: Marcus Boudreaux passionately drums in the elementary school’s beginner band, idolizes drummer Ringo Starr and guitarist John Mayer, and draws inspiration from theatrical legends Lin‑Manuel Miranda
    and Emma Watson, frequently rehearsing monologues from “Hamilton” and sketching LEGO‑themed stage props.
  travel: Marcus Boudreaux’s travel diary highlights sun‑soaked days at Clearwater Beach, bird‑watching expeditions in Everglades National Park, a family road‑trip to the historic town of Savannah, and
    a dream to snorkel over the coral reefs of the Great Barrier Reef, always planning trips with a mix of maps and parental checklists.
  culinary: Marcus Boudreaux delights in crafting pepperoni pizza with extra mozzarella, savoring tuna melt sandwiches on sourdough, and experimenting with homemade guacamole using ripe avocados, lime juice,
    cilantro, and sea salt, though they sometimes forget to finish veggies after a busy skate session.
  core: Marcus Boudreaux is a sociable, curiosity‑driven 11‑year‑old whose boundless energy fuels creative builds and team sports, yet intense anxiety often shadows their exuberant pursuits.
background:
  cultural: Marcus lives in Largo, Florida, a suburban community near the Gulf of Mexico. He comes from a white, middle‑class family that traces part of its lineage to French‑Cajun roots, an influence reflected
    in family gatherings that sometimes feature dishes like jambalaya or gumbo. Growing up in Florida has given him a strong connection to the beach and marine life, and he often spends weekends at the
    local parks, the beach, or community events organized by the city. His family participates in a local church and values community service, which aligns with his sociable and cooperative nature. At school
    and in his neighborhood, he is exposed to a mix of cultures, from Hispanic and Caribbean neighbors to tourists, shaping his open‑minded outlook while maintaining a broadly mainstream American cultural
    identity.
