  career_goals: Marcus dreams of a future where he can combine his love of the ocean, his knack for storytelling, and his desire to help others. He wants to become a marine biologist who studies and protects
    Florida’s coastal ecosystems, and he also aspires to be a science communicator—creating videos or live demonstrations that make complex topics exciting for kids his age. In the longer term, he envisions
    leading a community program that teaches children about ocean conservation while giving them opportunities to perform, speak, and lead projects.
