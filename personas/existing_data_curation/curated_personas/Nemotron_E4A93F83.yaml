  career_goals: Aleyamma aims to progress to a senior systems analyst role within the next two years, eventually transitioning into product management or technology strategy leadership. She plans to earn
    a PMP certification and enroll in an executive MBA program to deepen her strategic capabilities. Long‑term, she envisions leading cross‑functional teams that drive digital transformation for large enterprises,
    while mentoring junior analysts and advocating for inclusive workplace practices.
