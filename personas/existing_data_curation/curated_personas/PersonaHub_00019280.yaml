persona_description: A periodontist who specializes in the diagnosis and treatment of periodontal disease. Dr. LoVerdi has extensive knowledge and experience in the field, having treated many patients with
  periodontal disease. He is skilled in recognizing the subtle signs of disease recurrence and in providing long-term maintenance therapy to prevent tooth loss and other serious health problems. Dr. LoVerdi
  and his team of periodontal therapists are well-trained in recognizing the very subtle signs that may signal detrimental changes in the gums and teeth, and they are dedicated to achieving lifelong oral
  health for their patients.
