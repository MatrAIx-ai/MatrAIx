  career_goals: Although fully retired, Joyce’s ambition centers on preserving her independence and satisfying unfinished academic interests. She plans to complete the liberal‑arts associate degree she
    began in college, compile and self‑publish a detailed family genealogy book, and share her financial‑management expertise with her grandchildren. Additionally, she aims to broaden her volunteer impact
    at the local senior center, mentor younger volunteers in archival research, and remain an active participant in a small, competitive bridge club where she can indulge her love of friendly rivalry.
