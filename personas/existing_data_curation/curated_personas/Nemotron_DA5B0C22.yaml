  career_goals: Sandra aims to progress from a top-performing insurance sales agent to a senior sales manager overseeing a regional team in South Florida. She intends to earn the Chartered Property Casualty
    Underwriter (CPCU) designation to deepen her expertise and eventually open her own boutique agency focused on serving multicultural communities. Additionally, she hopes to develop a mentorship program
    within her company to help new agents develop both technical competence and interpersonal skills, and she is interested in leading community outreach initiatives that improve financial literacy among
    underserved senior citizens.
