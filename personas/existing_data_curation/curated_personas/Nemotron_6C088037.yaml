  skills: '["home maintenance", "basic carpentry", "garden landscaping", "computer troubleshooting", "budgeting", "project planning"]'
  hobbies: '["vegetable gardening", "river fishing", "scale model ship building", "photography", "reading mystery novels", "self‑help reading", "Southern cooking", "bird‑watching", "community gardening"]'
  career_goals: Norbert hopes to re‑enter the workforce in a low‑stress, part‑time role that leverages his handyman skills, such as a maintenance technician for a small local business or a freelance home‑repair
    contractor. He aims to obtain a vocational certification (e.g., HVAC or plumbing) within the next two years to increase his employability. Long‑term, he envisions running a modest home‑based repair
    service that allows flexible hours, stable income for his family, and the space to manage his anxiety through a balanced work schedule.
