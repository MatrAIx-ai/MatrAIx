personas:
  professional: Demetria Dunbar, a seasoned administrative professional with fifteen years of secretarial experience, leverages their meticulous calendar management, QuickBooks proficiency, and a keen eye
    for arts‑centric event design to orchestrate seamless operations for nonprofit cultural organizations, while they eye a senior office manager role after earning a nonprofit management certification.
  sports: Demetria Dunbar follows the Atlanta Braves and the Atlanta Hawks, roots for the local high school football team the Charleston Tigers, is a member of the Green Trails Hiking Club, and uses weekend
    hikes on nearby nature trails as their primary fitness activity, occasionally joining a community softball league in the spring, which they enjoy as a social outlet.
  arts: Demetria Dunbar immerses herself in the local arts scene by frequenting galleries, attending theater productions, and curating a collection of folk art pieces that celebrate community heritage,
    while they also nurture their own creative practice through watercolor painting, pottery classes, and solving intricate jigsaw puzzles during quiet evenings.
  travel: Demetria Dunbar blends structured planning with spontaneous stops, favoring weekend road trips to historic towns like Savannah, Charleston, and Asheville, occasional short cruises to the Caribbean,
    and a dream itinerary that includes a cultural tour of Dublin, all while they balance a modest travel budget and family obligations.
  culinary: Demetria Dunbar delights in Southern cooking with inventive twists, often preparing shrimp and grits infused with miso, collard greens seasoned with smoked paprika, and herb‑laden garden salads
    featuring basil, thyme, and lavender, while they range from confident home‑cook to experimental flavor‑pairing enthusiast.
  core: Demetria Dunbar is a curious, organized arts enthusiast who balances meticulous scheduling with spontaneous creative pursuits, occasionally overindulges in impromptu art purchases and forgets to
    water their herbs, yet they always return to the garden and community with renewed vigor.
background:
  cultural: Demetria is a Black woman raised in the Deep South, drawing on a rich heritage of African‑American traditions, Southern hospitality, and community faith. Growing up in a close‑knit neighborhood
    in Grenada, Mississippi, she was shaped by church gatherings, family storytelling, and local celebrations such as Juneteenth and the Mississippi Delta Blues Festival. Her cultural identity informs her
    love for African‑American folk art, gospel music, and Southern cuisine, and fuels her commitment to uplifting Black voices in the local arts scene. She respects the region’s history while embracing
    contemporary, progressive perspectives, balancing reverence for tradition with an openness to new ideas.
attributes:
  skills: '[''Calendar management'', ''Travel coordination'', ''Meeting scheduling and minutes'', ''Records management'', ''Microsoft Office Suite'', ''Google Workspace'', ''QuickBooks (basic accounting)'',
    ''Written communication'', ''Presentation design'', ''Office event planning'', ''Problem solving'', ''Conflict resolution'', ''Multitasking'', ''Customer service'', ''Data entry'']'
  hobbies: '[''Visiting art galleries'', ''Attending theater productions'', ''Collecting African‑American folk art'', ''Reading contemporary fiction'', ''Reading historical biographies'', ''Gardening'',
    ''Cooking Southern cuisine'', ''Singing in community choir'', ''Volunteering as literacy tutor'', ''Hiking nature trails'', ''Puzzle solving'', ''Pottery classes'', ''Watercolor painting'']'
  career_goals: She aims to move into a senior administrative or office manager role within a cultural nonprofit or community arts organization, where she can blend her administrative expertise with her
    passion for the arts. To support this, she plans to earn a certification in nonprofit management and take workshops in arts administration. Over the next five years she hopes to lead a team that organizes
    public art exhibitions, educational workshops, and community outreach programs. Long‑term, she envisions establishing a local community art hub that provides free classes, exhibition space for emerging
    Black artists, and mentorship opportunities for young people.
