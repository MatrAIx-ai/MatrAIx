    profiling of Phoenix neighborhoods'']'
  hobbies: '[''Street photography'', ''Visiting art galleries and murals'', ''Reading detective literature'', ''Escape‑room puzzles'', ''Mystery board games'', ''Cooking Mexican cuisine'', ''Salsa and cumbia
    dancing'', ''Yoga and meditation'', ''Volunteer at community art workshops'']'
  career_goals: Josefina aims to obtain her professional private investigator license and pursue certifications in digital forensics within the next two years. She aspires to specialize in art‑theft and
    cultural heritage cases, leveraging her appreciation for visual arts and her Mexican heritage to protect community artifacts. Long‑term, she plans to establish her own boutique investigative firm that
    serves both private clients and non‑profit organizations focused on immigrant rights. She also intends to enroll in a criminology program at a local university to deepen her theoretical knowledge and
    eventually mentor other young women interested in investigative work.
