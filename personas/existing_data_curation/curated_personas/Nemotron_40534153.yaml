personas:
  professional: Josefina Corteslopez, an 18‑year‑old aspiring private investigator in Phoenix, blends her street‑photography instincts, bilingual fluency, and penchant for unconventional problem‑solving
    to conduct discreet surveillance, analyze digital footprints, and produce clear investigative reports while juggling a part‑time gig and college prep.
  sports: Josefina Corteslopez stays active by dancing salsa and cumbia at community nights, following the Phoenix Suns for NBA excitement, cheering on the Arizona Cardinals during football season, and
    hitting the desert trails for early morning jogs that double as photo scouting sessions.
  arts: Josefina Corteslopez immerses herself in Phoenix’s vibrant art scene, attending monthly gallery openings featuring local muralist Mona Caron, hunting street‑art hotspots inspired by Banksy, and
    solving mystery board games after nights of reading classic detectives by Agatha Christie and Raymond Chandler.
  travel: Josefina Corteslopez prefers road trips that blend desert photography with cultural immersion, having explored the red rocks of Sedona, the historic plazas of Oaxaca during Día de los Muertos,
    and the graffiti‑laden alleys of Los Angeles, always planning trips around budget constraints and a desire to capture visual stories.
  culinary: Josefina Corteslopez enjoys cooking traditional Mexican dishes such as tamales, chiles en nogada, and pozole, often experimenting with fresh corn masa, dried chilies, and epazote, while their
    moderate cooking skill shines during community celebrations where they serve flavorful meals to friends and neighbors.
  core: Josefina Corteslopez is a talkative, art‑obsessed teen investigator whose relentless curiosity, competitive edge, and occasional worry fuel a blend of meticulous case work, spontaneous street‑photography
    outings, and a habit of juggling budgets, health, and midnight salsa sessions.
background:
  cultural: Josefina is a first‑generation Mexican‑American raised in a bilingual household in Phoenix. Her family maintains strong ties to Mexican traditions, celebrating holidays such as Día de los Muertos,
    Semana Santa, and Mexican Independence Day, while also embracing the multicultural fabric of the Southwest. Fluent in both Spanish and English, she often bridges cultural gaps in her investigations,
    especially when dealing with immigrant communities. Her upbringing in the vibrant Mexican‑American neighborhoods of Maricopa County has given her deep knowledge of local customs, culinary practices,
    and community dynamics, which she leverages to build trust with clients and witnesses.
attributes:
  skills: '[''Surveillance and covert observation'', ''Digital footprint analysis'', ''Bilingual interviewing (Spanish-English)'', ''Evidence photography and videography'', ''Investigative report writing'',
