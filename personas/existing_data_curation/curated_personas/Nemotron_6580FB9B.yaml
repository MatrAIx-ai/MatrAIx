personas:
  professional: Loretta Beaulac, a retired home economist and longtime church event coordinator, applies her meticulous budgeting, genealogical record-keeping, and hands-on crafting skills to keep senior-center
    gatherings orderly, while her practical, structured nature ensures every detail is predictable, yet she can assertively steer volunteers when needed.
  sports: Loretta Beaulac enjoys gentle morning walks in her garden, participates in the senior center’s shuffleboard league, follows the Detroit Tigers on television, and watches local high school basketball
    games with her friends, yet she never pushes herself beyond a comfortable pace, preferring low‑impact activity to maintain independence.
  arts: Loretta Beaulac spends afternoons listening to classic radio dramas like "The Shadow," knitting patterned scarves while humming Frank Sinatra and Ella Fitzgerald, reads historical fiction by Ken
    Follett, and attends intimate church choir concerts featuring local violinist Marie Dubois, finding solace in these cultured pastimes.
  travel: Loretta Beaulac prefers short, well‑planned road trips, having visited Mackinac Island, the historic streets of Detroit’s Midtown, a cabin retreat in the Upper Peninsula, and a family pilgrimage
    to Quebec City; she values the familiar comforts of known routes and travels mainly with her church group, avoiding lengthy flights.
  culinary: Loretta Beaulac delights in preparing classic Midwest comfort dishes such as chicken pot pie, homemade sauerkraut, apple crisp, and garden‑fresh tomato soup; she skillfully cans preserves using
    heirloom recipes, and she prefers ingredients like butter, fresh herbs (thyme and rosemary), and locally grown root vegetables.
  core: Loretta Beaulac, a 95‑year‑old steward of Midwestern tradition, balances disciplined frugality, quiet community service, and a love of crafts, yet wrestles with chronic worry, occasional stubbornness,
    and a tendency to over‑organize her day.
background:
  cultural: Loretta was born in the late 1920s in Michigan to a family of French‑Canadian descent. She grew up in a predominantly white, Midwestern, Catholic community where modesty, self‑reliance, and
    service to others were core values. Her childhood was shaped by the Great Depression and the home‑front efforts of World War II, fostering a practical, structured outlook. She carries forward traditional
    recipes, craft techniques, and a deep respect for her community’s history and religious traditions.
attributes:
  skills: '["Home cooking", "Hand‑sewing and mending", "Vegetable gardening", "Household budgeting", "Genealogy research", "Oral storytelling", "Event organization", "Crossword puzzles"]'
  hobbies: '["Knitting", "Historical fiction reading", "Classic radio listening", "Birdwatching", "Small tea gatherings", "Flower gardening", "Journaling", "Crossword puzzles", "Senior center craft sessions"]'
  career_goals: Even at 95, Loretta aims to remain independent and self‑sufficient, keep her health stable, and continue contributing to her community in modest ways. She wishes to document and pass on
    her family’s stories to younger relatives, volunteer occasionally at the local church and senior center, ensure her home and garden stay well‑maintained, and leave a small legacy of preserved recipes
    and genealogical records for future generations.
