personas:
  professional: Eddie Raphael, a 32‑year‑old customer service specialist with a knack for data analysis and UI/UX design, leverages their Salesforce and Python expertise to streamline support workflows
    while quietly plotting a transition to a Technical Support Engineer role.
  sports: Eddie Raphael jogs the Pensacola shoreline five mornings a week with the local Pensacola Running Club, roots for the New Orleans Saints and Tampa Bay Rays, and plays pick‑up basketball at the
    community center, balancing solo endurance with occasional team sports.
  arts: Eddie Raphael frequents Gulf Coast galleries showcasing contemporary Black artists such as Kehinde Wiley and Amy Sherald, creates digital illustrations of coastal sunsets in Adobe Illustrator, and
    unwinds at intimate jazz venues featuring the music of John Coltrane and B.B. King, weaving visual and auditory inspiration into daily life.
  travel: Eddie Raphael plans trips with a blend of spontaneity and meticulous budgeting, having explored New Orleans for its music, Charleston for its cuisine, and dreaming of a weekend in Lisbon’s seaside
    districts, all while using travel‑reward points to keep costs low.
  culinary: Eddie Raphael enjoys cooking Southern comfort dishes like shrimp étouffée seasoned with smoked paprika, cayenne, and fresh okra, alongside collard greens simmered with ham hocks, demonstrating
    an intermediate skill set that sometimes leads to overly seasoned plates.
  core: Eddie Raphael fuses a quiet curiosity for art and tech with disciplined work habits, an occasional over‑caffeinated sprint on the beach, and a habit of sketching UI ideas on napkins.
background:
  cultural: Eddie is an African American who grew up in Pensacola, Florida, a city with deep Southern and Gulf Coast roots. His family’s cultural heritage includes traditions of the African diaspora in
    the South, such as church gatherings, community celebrations like Juneteenth, and a love for soulful music and Southern cuisine. He was raised attending a Baptist church where values of compassion,
    resilience, and community service were emphasized. Eddie’s educational journey—earning a STEM bachelor’s degree as a first‑generation college graduate—reflects the importance his family places on academic
    achievement and upward mobility. He remains connected to the local Black community by supporting Black‑owned businesses, participating in cultural festivals that highlight African American history in
    the region, and mentoring young people who share his interest in science and technology. This blend of Southern hospitality, African American cultural pride, and a forward‑looking mindset shapes his
    identity and daily life.
attributes:
  skills: '[''Customer relationship management (CRM) using Salesforce and Zendesk'', ''Technical troubleshooting of consumer electronics'', ''Data analysis with Excel and Python'', ''Effective written and
    verbal communication'', ''Conflict resolution and de-escalation'', ''Process improvement and workflow optimization'', ''Multitasking and time management'', ''Basic UI/UX design principles'', ''Small-group
    collaboration'', ''Adaptability and flexible problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Digital illustration and graphic design'', ''Listening to technology and culture podcasts'', ''DIY electronics projects'', ''Reading science-fiction
    and design non-fiction'', ''Jogging or walking on Gulf Coast beaches'', ''Cooking Southern comfort food'', ''Playing chess'', ''Attending small-group jazz or blues concerts'', ''Mentoring youth in STEM'']'
  career_goals: Eddie aims to transition from a front‑line customer service role into a more technical and strategic position within the tech industry. In the next two to three years, he plans to earn certifications
    in ITIL and Six Sigma to strengthen his expertise in service delivery and process excellence. His long‑term goal is to become a Technical Support Engineer or Product Analyst, where he can blend his
    analytical background with his curiosity for user experience. Eventually, Eddie envisions moving into a Customer Experience Manager or UX Designer role, leading small teams, shaping product policies,
    and mentoring junior staff. He also hopes to launch a side project creating digital artwork and UI mockups for local small businesses, combining his artistic interests with his professional skill set
    while maintaining a healthy work‑life balance for his family.
