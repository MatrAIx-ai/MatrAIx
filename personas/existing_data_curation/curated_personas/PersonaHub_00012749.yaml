persona_description: A person who is interested in developing country situations, especially those related to hygiene practices in the home. They are likely to be interested in the IFH Scientific Advisory
  Board, which is responsible for preparing the guidelines for the prevention of infection and cross-infection in the domestic environment. The guidelines focus on home hygiene issues and provide evidence-based
  information on safe disposal of faeces, household water treatment and safe storage, food hygiene, and other related topics. The guidelines are particularly relevant to developing countries where access
  to proper hygiene practices may be limited due to economic and social factors.
