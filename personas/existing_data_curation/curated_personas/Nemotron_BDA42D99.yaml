personas:
  professional: Antonio Castro, a 36‑year‑old heavy‑duty diesel technician with a decade of hands‑on experience diagnosing engines, hydraulics, and marine equipment, leverages his competitive drive and
    love of structure to mentor junior staff, chase OEM service bulletins, and chart a path toward foreman and ASE Master Technician status while planning a future mobile repair venture.
  sports: Antonio Castro plays forward in a local Charleston soccer league, cheered on by fans of the Charleston Battery, spends early mornings fishing off the Charleston harbor, and supports the New York
    Yankees for baseball while maintaining a modest membership at the South Carolina Fitness Club.
  arts: Antonio Castro immerses himself in regional Mexican music—favoring Los Tigres del Norte and Vicente Fernández—attends annual Cinco de Mayo festivals, devours classic automotive repair magazines
    like Diesel Drill, and evenings are often spent watching documentary series on vintage trucks such as American Heavyweights.
  travel: Antonio Castro, who enjoys weekend getaways, has road‑tripped the Pacific Coast Highway to admire classic pickups, frequents fishing lodges in the Outer Banks, dreams of attending the International
    Truck Show in Dallas, and plans a future coastal cruise to the Gambia for marine equipment insights once his business stabilizes.
  culinary: Antonio Castro specializes in slow‑cooked carne asada, steaming hominy in traditional pozole, hand‑folding corn‑masa tamales with pork and ancho chile, and often experiments with smoked brisket
    using his 1975 Ford pickup's bed as a makeshift smoker, pairing dishes with fresh cilantro, lime, and avocado.
  core: Antonio Castro blends a hands‑on mechanic's precision with a relaxed, competitive spirit, turning diesel diagnostics, vintage truck restoration, and family‑style Mexican cooking into a roadmap for
    a future mobile repair empire.
background:
  cultural: Antonio is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and Mexican customs were woven into daily life. He celebrates Día de los Muertos and other Mexican
    holidays, maintains strong ties with the local Mexican community in Charleston, and frequently participates in cultural festivals. His heritage influences his cooking, music preferences, and the value
    he places on family cohesion, hard work, and respect for tradition.
attributes:
  skills: '["Heavy‑duty diesel engine repair", "Hydraulic and pneumatic system troubleshooting", "Preventive maintenance scheduling", "Electronic diagnostic scan tool operation", "Welding and fabrication",
    "OSHA safety compliance", "Parts procurement and inventory management", "Technical manual interpretation", "Mentoring of apprentice technicians"]'
  hobbies: '["Vintage truck restoration", "Small‑engine tinkering", "Fishing in Charleston harbor", "Playing soccer", "Cooking Mexican cuisine", "Listening to regional Mexican music", "Attending Cinco de
    Mayo festivals", "Reading automotive repair magazines", "Watching classic truck documentaries"]'
  career_goals: Antonio aims to become a shop foreman within the next two years and obtain an ASE Master Technician certification. He plans to enroll in an associate‑degree program in mechanical technology
    to formalize his knowledge. Long‑term, he dreams of starting his own mobile repair business that services coastal and port equipment in the Charleston area, leveraging his expertise in marine‑related
    heavy machinery. He also hopes to become a certified instructor at a local community college, sharing his practical skills with the next generation of technicians.
