personas:
  professional: William Robinson, a data‑driven social‑service professional with a STEM background, leverages his analytical rigor, project‑management discipline, and collaborative spirit to design evidence‑based
    programs that weave technology into rural North Texas service delivery while mentoring multidisciplinary teams toward measurable outcomes.
  sports: William Robinson, an energetic participant in the co‑ed Bonham Softball League, avidly hikes the North Texas trails on weekends, and roots for the Dallas Cowboys while also cheering on the Texas
    Rangers in baseball.
  arts: William Robinson, a regular at the Bonham Community Theater, devours sci‑fi novels by authors like N.K. Jemisin, and fills his playlists with the soulful guitar work of Gary Clark Jr., often discussing
    plot twists over craft beer with friends.
  travel: William Robinson, an organized road‑trip planner, frequently escapes to the Texas Hill Country vineyards, has Santa Fe on his bucket list for its art and Southwestern cuisine, and prefers weekend
    backpacking in nearby state parks over spontaneous overseas flights due to family and financial commitments.
  culinary: William Robinson, a hobbyist chef, loves crafting smoky chipotle‑infused chili con carne, grilled elote topped with cotija cheese and cilantro, and hand‑rolled tortillas, while experimenting
    with a sous‑vide gadget to perfect pork shoulder during weekend gatherings.
  core: William Robinson, a calm yet hyper‑social mastermind, balances meticulous data‑driven work with hands‑on DIY projects, team softball, and spicy Southwest cooking, all while never missing a chance
    to mentor the next generation of socially‑conscious professionals.
background:
  cultural: William grew up in a small-town environment in North Texas, where a culture of neighborly support, self-reliance, and modest ambition is deeply rooted. His white, Texan heritage combines traditional
    Southern hospitality with the state’s growing embrace of technology and entrepreneurship. Family gatherings, community festivals, and local faith-based volunteer groups emphasized service and educational
    achievement. Though never married, he maintains strong ties to his extended family and the broader Bonham community, respecting the diverse cultural influences of Indigenous, Hispanic, and African-American
    neighbors while preserving his own regional identity.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Client Assessment'', ''Data Analysis (R, SPSS)'', ''Program Development'', ''Grant Writing'', ''Community Resource Coordination'', ''Project Management'',
