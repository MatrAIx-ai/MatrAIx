  hobbies: '[''Co-ed Softball'', ''Hiking'', ''DIY Home Improvement'', ''Woodworking'', ''Tech Maker Projects'', ''Cooking (Southwestern cuisine)'', ''Community Garden'', ''Volunteer Work at Food Bank'',
    ''Community Theater'', ''Reading Science Fiction'']'
  career_goals: He aims to advance into a regional director role within a nonprofit or governmental social services agency, where he can design and scale evidence-based programs that integrate technology
    to improve outcomes for underserved rural communities in North Texas. To strengthen his expertise, he plans to pursue a master’s degree in Social Work or Public Health. His long-term ambition is to
    influence state-level policy on rural health and social service delivery, secure sustainable grant funding, and mentor the next generation of socially-conscious, data-savvy professionals.
