personas:
  professional: Bao Yang is a 26‑year‑old pastoral leader who integrates multilingual counseling, community outreach, and structured worship planning, leveraging a practical, routine‑focused mindset while
    they frequently battle disorganization and missed deadlines in administrative tasks.
  sports: Bao Yang plays pick‑up basketball at Flushing’s park, cheers on the New York Knicks during the NBA season, follows the Yankees in baseball and the Mets for occasional summer outings, and they
    treat fitness as a social, energetic outlet despite occasional lapses in consistency.
  arts: Bao Yang sings in a community choir performing hymns by Chris Tomlin and traditional folk arrangements, admires street murals by Banksy and local artist Koby the Fox, and they capture urban life
    through photography inspired by Vivian Maier, while practicing calligraphy in spare moments.
  travel: Bao Yang favors short purpose‑driven trips that honor cultural roots, such as a weekend visit to Seoul for Chuseok and a spring journey to Taipei for the Lantern Festival, and they dream of a
    summer road‑trip through the Pacific Northwest to explore national parks.
  culinary: Bao Yang is a proficient home cook who frequently prepares kimchi, bulgogi, and pork dumplings, savoring gochujang, fermented soybean paste, and fresh cilantro, and they love sharing these dishes
    at community potlucks and church gatherings.
  core: Bao Yang balances a strong love for routine with spontaneous bursts of community‑driven creativity, often forgetting to file paperwork on time while never missing a chance to serve a hot meal to
    friends.
background:
  cultural: Bao Jae was born to East Asian immigrant parents—his father from South Korea and his mother from Taiwan—who settled in New York’s Flushing neighborhood. Growing up bilingual, he absorbed Confucian
    values of respect, harmony, and practicality, while also embracing Christian faith through his family’s church. His upbringing emphasized community cohesion, reverence for ancestors, and participation
    in cultural celebrations such as Chuseok and Lunar New Year. These influences shape his compassionate approach to ministry, his commitment to preserving cultural heritage within a modern urban context,
    and his ability to navigate both American and East Asian social norms.
attributes:
  skills: '[''Pastoral counseling'', ''Public speaking and sermon delivery'', ''Interfaith dialogue facilitation'', ''Community outreach program development'', ''Conflict resolution and mediation'', ''Multilingual
