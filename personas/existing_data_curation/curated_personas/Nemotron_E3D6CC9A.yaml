  hobbies: '[''Cooking traditional Korean/Chinese dishes'', ''Playing basketball'', ''Singing in a community choir'', ''Calligraphy'', ''Volunteering at soup kitchens and homeless shelters'', ''Exploring
    street art and urban photography'', ''Attending cultural festivals'', ''Meditation and mindfulness practice'']'
  career_goals: Bao Jae aspires to become a senior pastor of a multicultural congregation that bridges East Asian heritage with the diverse fabric of New York City. He aims to expand youth and immigrant
    support services, launch interfaith cooperation projects, and eventually serve as a hospital chaplain to reach people in crisis. His long‑term ambition includes authoring a guide on compassionate ministry
    that integrates traditional East Asian values of harmony and practicality with contemporary pastoral practice, and establishing a community center that offers language classes, cultural events, and
    counseling services.
