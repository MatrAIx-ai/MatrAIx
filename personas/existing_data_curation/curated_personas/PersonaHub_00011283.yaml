persona_description: A healthcare professional who is responsible for managing and coordinating the care of patients with hepatitis C virus (HCV) infection. This individual is likely to be interested in
  the CDC Recommended Testing Sequence for Identifying Current HCV Infection, as they are responsible for ensuring that patients receive appropriate testing and treatment for HCV. They may also be interested
  in learning about the importance of testing for HCV RNA or antibody, as well as the potential for false positives. Additionally, they may be interested in understanding how to differentiate past, resolved
  HCV infection from biologic false positivity for HCV antibody, and how to interpret repeat HCV RNA testing results.
