personas:
  professional: Jasmine Sampson, a retired archivist and community historian, channels their meticulous research skills and disciplined, competitive drive into curating traveling exhibitions that illuminate
    local cultural heritage, mentoring high-school students in archival methods, and crafting a memoir that intertwines art analysis with personal reflection, while they constantly seek new archival challenges.
  sports: Jasmine Sampson, a lifelong resident of Lake County, Ohio, follows the Cleveland Guardians and Browns faithfully, walks regularly with a senior fitness group at the local park, and participates
    in the Lake County Birding Club, though they prefer solitary bird-watching over team sports.
  arts: Jasmine Sampson, an avid watercolorist, spends afternoons sketching garden scenes while listening to Miles Davis and Beethoven, draws inspiration from the works of Winslow Homer and Georgia O'Keeffe,
    curates virtual tours of the Cleveland Museum of Art to enrich their own artistic practice, and they often share their insights on dedicated art forums.
  travel: Jasmine Sampson plans trips that blend scholarly purpose with quiet leisure, having already visited the Smithsonian American Art Museum in Washington, D.C., while earmarking future journeys to
    the Cleveland Museum of Art, the National Museum of African American History and Culture, and a serene coastal retreat in Maine to study maritime art and enjoy solitary walks, and they plan each itinerary
    with a meticulous spreadsheet.
  culinary: Jasmine Sampson, a proficient home cook, harvests heirloom tomatoes, basil, and kale from their garden to craft rustic ratatouille and vegetable soup, enjoys baking apple-cinnamon pie with locally
    sourced butter, yet occasionally indulges in rich cream sauces that leave them feeling a little sluggish after meals, and they often experiment with new herb blends to keep the menu interesting.
  core: Jasmine Sampson is a disciplined, curiosity-driven septuagenarian who blends solitary artistic creation, meticulous historical research, and a penchant for quiet organization into a life of thoughtful
    contribution, while they occasionally give in to impulsive art-book purchases and garden-related knee aches.
background:
  cultural: Jasmine’s cultural background is rooted in the African American experience of the Midwest. Her grandparents joined the Great Migration, moving from the Deep South to Ohio in the 1940s and bringing
    with them rich culinary traditions, gospel music, and a strong emphasis on community storytelling. Growing up in a close‑knit Black neighborhood in Lake County, she attended a historically Black church
    where hymns, choral singing, and weekly fellowship shaped her appreciation for music and collective memory. Family gatherings centered around soul‑food cooking—collard greens, cornbread, and fried chicken—served
    as both a culinary and cultural education. As an adult, Jasmine stays connected to her heritage by volunteering with the Lake County Historical Society’s African American archives, participating in
    local cultural events, and preserving oral histories of elders in her community.
attributes:
  skills: '["Archival research", "Cataloguing historical documents", "Project planning and coordination", "Digital research tools (online museum databases, genealogy platforms)", "Critical art analysis",
    "Basic graphic design for exhibit signage", "Gardening", "Traditional cooking", "Knitting", "Budget tracking for community projects"]'
  hobbies: '["Reading art history", "Sketching and watercolor painting", "Gardening (vegetables and native flowers)", "Birdwatching", "Listening to jazz and classical music", "Knitting", "Attending virtual
    museum tours", "Researching local African American history", "Writing memoir excerpts"]'
  career_goals: Although no longer in the paid workforce, Jasmine’s ambitions revolve around preserving and sharing cultural history. She plans to assemble a traveling exhibition showcasing photographs,
    letters, and artworks collected over decades, highlighting the African American experience in Lake County. She hopes to mentor a small group of local high‑school students in archival methods, passing
    on her disciplined approach to research. Over the next five years, she aims to complete a personal memoir that weaves together her life story with reflections on art and community, and to visit three
    major art institutions—such as the Cleveland Museum of Art, the Smithsonian American Art Museum, and the National Museum of African American History and Culture—to deepen her own appreciation of art.
