personas:
  professional: Kevin Perez, a budding robotics enthusiast who combines methodical LEGO Mindstorms builds with early Python coding, channels a love for space and strategic thinking into school’s robotics
    club and science fair projects, and they meticulously document each prototype.
  sports: Kevin Perez, joins a neighborhood soccer squad that practices after school, cheers for the Charlotte Independence while also following the North Carolina Tar Heels basketball team, prefers the
    tight‑knit camaraderie of small‑group drills over large school‑wide sports events, and they often practice penalty kicks alone in the driveway.
  arts: Kevin Perez, finds rhythm in a mixtape of reggaeton hits by Bad Bunny, salsa classics by Marc Anthony, and pop anthems from Ariana Grande, often humming along while constructing LEGO sculptures,
    occasionally sketches sci‑fi scenes inspired by favorite novels, and they keep a sketchbook tucked into their backpack for spontaneous drawing.
  travel: Kevin Perez, explores the world through a blend of local trips to the Cape Fear beaches and family vacations to San Juan, dreams of visiting the Kennedy Space Center and Tokyo’s Akihabara to experience
    both aerospace heritage and anime culture, and they save a portion of their allowance for future travel funds.
  culinary: Kevin Perez, assists in the kitchen by mastering the preparation of arroz con gandules, tostones, and lechón during family gatherings, while also experimenting with making homemade pizza topped
    with mozzarella and pepperoni, showcasing a moderate cooking skill that balances tradition and teen creativity, and they proudly serve the dishes to friends after school.
  core: Kevin Perez, a methodical 13‑year‑old whose curiosity for space drives relentless LEGO robotics projects, yet secretly hoards candy and stays up late to dominate online chess opponents, and they
    often forget to set an alarm.
background:
  cultural: 'Kevin comes from a Puerto Rican family that relocated to Mount Pleasant, North Carolina, when his parents sought work opportunities. At home, Spanish is spoken regularly, and family gatherings
    often feature traditional foods like lechón, tostones, and arroz con gandules, as well as music ranging from bomba y plena to modern reggaeton. He celebrates cultural holidays such as Nochebuena and
    Puerto Rican Independence Day, and his school participates in Latino Heritage Month events where he sometimes shares his heritage through presentations or cultural displays. The blend of Caribbean customs
    with Southern U.S. community life has given Kevin a bicultural perspective: he values familismo and respect for elders while also adapting to the more individualistic environment of his school and extracurricular
    activities. This dual cultural influence enriches his language skills, culinary interests, and his appreciation for diverse musical and artistic expressions.'
attributes:
  skills: '[''Organizational & time‑management'', ''Bilingual Spanish‑English'', ''Pre‑algebra and middle‑school science proficiency'', ''Basic programming (Scratch, introductory Python)'', ''Problem‑solving
    through puzzles and chess'', ''LEGO building and basic robotics'', ''Digital literacy (Google Workspace, Microsoft Office)'', ''Culinary assistance with Puerto Rican cuisine'']'
  hobbies: '[''Reading sci‑fi & tech non‑fiction'', ''Playing chess'', ''Building LEGO models and Mindstorms robots'', ''Coding with Scratch and beginner Python'', ''Playing soccer with a small local team'',
    ''Listening to reggaeton, salsa, and pop music'', ''Cooking Puerto Rican dishes with family'', ''Participating in school robotics and science fair projects'']'
  career_goals: He dreams of turning his curiosity for how things work and his practical, organized mindset into a career in engineering. He is particularly interested in civil engineering, where he could
    design sustainable infrastructure for his local community in North Carolina, as well as software engineering, creating tools that help youth learn coding. He hopes to attend a STEM‑focused high school,
    earn a degree in engineering, and later work on projects that blend technology with community development. Additionally, he aspires to mentor younger students in coding clubs or robotics teams, reflecting
    his cooperative nature and desire to give back to both his Puerto Rican heritage and the broader community.
