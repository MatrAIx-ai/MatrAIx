  career_goals: Zachary is fascinated by space and art, and he often says he wants to become an astronaut who paints pictures of planets and stars when he grows up. He also dreams of being a professional
    artist, creating colorful murals that tell stories. Occasionally he imagines being a teacher, guiding other kids in art projects and group activities, because he enjoys helping friends and being reliable.
    While his imagination is big, he sometimes worries about making mistakes, so he sets small goals like finishing a drawing or learning a new puzzle, aiming to become someone who can blend creativity
    with teamwork.
