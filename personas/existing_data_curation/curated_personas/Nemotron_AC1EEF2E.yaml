  hobbies: '[''gardening'', ''knitting'', ''quilting'', ''reading historical fiction'', ''local history'', ''genealogy'', ''cooking'', ''birdwatching'', ''church choir'', ''board games'', ''road trips'']'
  career_goals: Although retired, Jessie aims to keep learning new digital tools to remain close with her grandchildren, document her family's genealogy and local history for future generations, and mentor
    younger volunteers at the senior center. She also aspires to maintain her health through regular activity, share her cooking and craft skills through community workshops, and continue contributing to
    her church and neighborhood as a reliable, friendly presence.
