persona_description: A researcher who is passionate about developing new treatments for hearing loss and is working on a collaborative project to overcome the bottlenecks that hinder the development of
  such treatments. The researcher is interested in the development of a human cell-based model for the purification of otic progenitor cells derived from human embryonic stem cells, as well as the validation
  of this model in vitro. The researcher is also interested in the development of in vitro assays for the assessment of ototoxicity, otoprotection, and otoregeneration, and the identification of novel biomarkers
  for the purification of otic progenitors. The researcher is looking for a way to use these new tools to directly benefit California-based biotech companies and contribute to the state's economy.
