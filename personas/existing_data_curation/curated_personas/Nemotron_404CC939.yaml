personas:
  professional: Leander Breece is a distinguished clinical psychologist who channels four decades of adult psychotherapy expertise into a methodical, art‑infused practice, integrating watercolor and jazz
    improvisation into trauma‑informed CBT while they meticulously document every case and mentor emerging therapists.
  sports: Leander Breece is a devoted fan of the Philadelphia Eagles and the 76ers, attends select Phillies games, participates in a senior walking club that meets for charity strolls through Fairmount
    Park, and occasionally joins a local community center's pickleball league, opting for gentle exercise that balances their worry‑prone nature.
  arts: Leander Breece finds creative resonance in abstract watercolor works by Helen Frankenthaler, jazz improvisations of Miles Davis and Keith Jarrett on the piano, and the theatrical productions at
    Walnut Street Theatre, often photographing street scenes for personal exhibitions while they discuss the poetry of Pablo Neruda and the photography of Diane Arbus.
  travel: Leander Breece enjoys purposeful travel, having toured the historic cobblestone streets of Charleston, the museums of Florence, and the jazz clubs of New Orleans, while planning a reflective pilgrimage
    to Kyoto’s zen gardens and a weekend retreat in the Blue Ridge Mountains to recharge their imagination.
  culinary: Leander Breece delights in crafting a seasonal ratatouille with basil and heirloom tomatoes harvested from their rooftop garden, savoring a classic Philly cheesesteak with provolone, and occasionally
    mastering a delicate miso‑glazed salmon, all while they pair meals with smooth bebop records to enhance the dining experience.
  core: Leander Breece blends disciplined organization with an imaginative soul, habitually worrying about details yet finding calm through watercolor, jazz, and mindful garden walks; they navigate life
    as a thoughtful therapist, careful investor, and avid cultural explorer.
background:
  cultural: Leander is an African‑American who grew up in West Philadelphia during the post‑civil‑rights era. His family’s roots in the neighborhood’s Black church and community activism shaped his sense
    of responsibility and cultural pride. He draws inspiration from the rich musical traditions of Philadelphia’s Black community, the storytelling legacy of local oral histories, and the ongoing struggle
    for social justice. Leander actively participates in African‑American cultural festivals, supports Black‑owned businesses, and serves on the board of the Philadelphia African American Museum. His professional
    work is deeply informed by his cultural heritage, emphasizing culturally competent care and community empowerment.
attributes:
