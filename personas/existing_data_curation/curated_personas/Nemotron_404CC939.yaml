  hobbies: '["Abstract watercolor painting", "Jazz piano", "Reading (historical fiction, philosophy, poetry)", "Museum and gallery visits", "Walking tours of historic Philadelphia", "Urban gardening", "Mindfulness
    meditation", "Community theater", "Photography", "Volunteering at local cultural centers"]'
  career_goals: As he approaches the later stage of his career, Leander aims to leave a lasting legacy by publishing a memoir that weaves together his experiences as a Black psychologist, his imaginative
    reflections on therapy, and the cultural history of Philadelphia. He aspires to establish a community‑based art‑therapy initiative that provides free mental‑health services to underserved neighborhoods.
    Leader‑ship within the Association of Black Psychologists and formal mentorship of under‑represented graduate students are also central to his goals, as is advocating for policy changes that increase
    funding for culturally responsive mental‑health care.
