    management'', ''Organizational planning'']'
  hobbies: '[''Visiting galleries and museums'', ''Watercolor painting'', ''Sketching'', ''Art blog writing'', ''Toastmasters public speaking'', ''Hosting book club'', ''Organizing community trivia nights'',
    ''Hiking in the Rogue River region'', ''Yoga'', ''Cooking international dishes'', ''Board‑game tournaments'']'
  career_goals: Deborah aims to advance from her front‑desk role to an office manager or administrative supervisor position within the next three to five years, leveraging her organizational strengths and
    leadership potential to oversee a team and streamline operations. Parallel to this, she wishes to integrate her passion for the arts by securing a front‑desk or coordination role at a local gallery,
    museum, or cultural center, where she can help design visitor experiences and develop community art programs. To support these ambitions, she plans to complete a bachelor’s degree in Business Administration
    or Arts Management through evening classes, earn a project‑management certification, and join professional groups such as the Oregon Arts and Culture Association. Ultimately, she hopes to lead initiatives
    that make the arts more accessible in Jackson County while maintaining a balanced workload that mitigates stress.
