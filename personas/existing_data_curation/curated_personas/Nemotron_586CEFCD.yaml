personas:
  professional: Miguel Valiente, a bilingual home-cook-entrepreneur, blends their practical repair know-how and disciplined budgeting to run a low-stress weekend stall at the Queens farmers market, where
    they follow clear recipes while allowing the occasional spontaneous tweak that satisfies their love for structure and flexibility.
  sports: Miguel Valiente enjoys low-impact fitness through daily walks in Flushing Meadows-Corona Park for bird-watching, occasional pick-up soccer with the local seniors' league, supports the New York
    Mets and Knicks on game nights, and they belong to a neighborhood walking club that meets every Saturday.
  arts: Miguel Valiente finds solace in listening to the Andean ensemble Inti-Illimani, admiring the paintings of Frida Kahlo at community exhibitions, and practicing simple photography of garden blooms
    and plated dishes, and they often share the images on a modest Instagram account for friends and family.
  travel: Miguel Valiente prefers thoughtfully planned getaways to mountainous regions like the Colombian Andes and Peru's Sacred Valley, while also cherishing short weekend trips to nearby Long Island
    vineyards, and they favor train travel that leaves room for sketching scenery and sampling local produce.
  culinary: Miguel Valiente, a seasoned home chef, crafts authentic coastal fish ceviche, slow-braised goat stew (seco de chivo), and green-plantain empanadas using fresh cilantro, aji peppers, and locally
    sourced corn, and delights in serving family-style meals at their market stall, though they sometimes forget to de-glaze the pan in haste.
  core: Miguel Valiente balances a disciplined love of routine with a relaxed tolerance for missed deadlines, thriving on solitary gardening, methodical cooking, and careful budgeting, and they occasionally
    succumb to the habit of leaving dishes in the sink too long.
background:
  cultural: Miguel was born and raised in the highlands of Ecuador, where he grew up in a close-knit extended family that celebrated traditional festivals such as Carnaval de Guaranda and the Dia de los
    Difuntos with music, dance, and homemade foods. Spanish is his first language, and he learned the culinary techniques of his grandparents, especially dishes like ceviche, seco de chivo, and empanadas
    de verde. In his early thirties he migrated to the United States, settling in the diverse borough of Queens, where he has kept strong ties to his roots through local Latin American community centers,
    the weekly market where Ecuadorian produce is sold, and by maintaining the practice of cooking and sharing his native cuisine. While he has adopted many aspects of American urban life, his identity
    remains rooted in the values of respect for elders, communal sharing of meals, and a deep appreciation for the natural landscapes of the Andes, which he now expresses through his gardening and love
    of mountain-inspired music.
attributes:
  skills: '[''Spanish (fluent)'', ''English (conversational)'', ''Traditional Ecuadorian cooking'', ''Urban gardening'', ''Basic computer literacy (email, spreadsheets)'', ''Household budgeting and bookkeeping'',
    ''Handyman/DIY maintenance'', ''Woodworking basics'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Urban herb and succulent gardening'', ''Cooking traditional Ecuadorian meals'', ''Listening to Andean music'', ''Park walking and bird-watching'',
    ''Crossword puzzles'', ''Basic food photography'']'
  career_goals: Miguel hopes to translate his culinary passion into a modest, low-stress home-based food venture, such as a weekend stall at a Queens farmers market offering authentic Ecuadorian dishes.
    He plans to obtain a food-handler's certification and refine his business skills through a short community-college course in small-business management. In parallel, he seeks to volunteer at local cultural
    organizations where he can share his cooking knowledge with youth and seniors, and to establish a regular daily routine that incorporates his love for gardening and personal finance management. Long-term,
    he aims for financial self-sufficiency and a balanced, structured lifestyle that still allows flexibility for solitary pursuits.
