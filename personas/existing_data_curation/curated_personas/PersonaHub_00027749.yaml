persona_description: A researcher and educator who is passionate about promoting energy efficiency behaviors among high school students through a theory-driven, school-based intervention. This individual
  is experienced in formative research, including piloting with representative youth, and has developed a theory-driven approach to behavior change through the application of available theoretical frameworks.
  They are interested in the potential mechanisms of change, evaluating intervention delivery variables and their relationships to outcomes, and identifying the most appropriate target audiences for dissemination
  and future studies. This individual is likely to be involved in the development and evaluation of school-based interventions to address climate change and energy security issues, and is interested in
  the potential impact of these interventions on energy efficiency behaviors.
