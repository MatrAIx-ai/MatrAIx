    (English, Mandarin)'', ''Data analysis for sales forecasting'']'
  hobbies: '[''Exploring local food markets'', ''Experimenting with home cooking'', ''Traveling to sample regional cuisines'', ''Reading contemporary fiction and poetry'', ''Practicing calligraphy'', ''Yoga
    and meditation'', ''Volunteering at community food banks'', ''Attending food festivals'', ''Journaling'', ''Language exchange meetups (English ↔ Mandarin)'', ''Urban photography'']'
  career_goals: Mai aims to advance to a regional operations manager role within a dynamic restaurant group, where she can shape multiple venues and mentor emerging talent. She aspires to launch her own
    boutique café that showcases sustainable, farm‑to‑table East Asian-inspired dishes, merging her cultural heritage with modern hospitality practices. To support these goals, she plans to earn ServSafe
    Manager certification, pursue a hospitality management MBA, and develop expertise in sustainable sourcing and menu innovation. Ultimately, Mai wants to influence industry standards for authentic cultural
    representation in food service while fostering inclusive, high‑performing teams.
