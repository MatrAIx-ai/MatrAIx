personas:
  professional: Mai Tan, a 29‑year‑old food service manager in Jersey City, they leverage a humanities‑backed knack for communication and a practical eye for cost control to design menus that fuse Asian
    culinary traditions with contemporary trends, while their spontaneous, curiosity‑driven nature sometimes leads to missed deadlines but fuels innovative problem‑solving and a cooperative, harmony‑focused
    team environment.
  sports: Mai Tan, a 29‑year‑old enthusiast, they follow the New York Knicks in basketball and the New York Rangers in hockey, hike with the Hudson Valley Trail Club each spring, and balance casual weekend
    runs with a yoga practice at the Jersey City Community Center, embodying a flexible yet consistent approach to fitness.
  arts: Mai Tan, a 29‑year‑old culinary enthusiast, they immerse themselves in contemporary poetry by Ocean Vuong and the minimalist music of Ryuichi Sakamoto, practice traditional calligraphy as a meditative
    art, and capture urban life through black‑and‑white street photography, often citing Henri Cartier‑Bresson as inspiration.
  travel: Mai Tan, a 29‑year‑old explorer, they blend meticulous research of regional food markets with spontaneous weekend getaways, having explored the night bazaars of Taipei, the street‑food alleys
    of Oaxaca, and the farm‑to‑table scene in Portland, while budgeting their trips to fund their future café and preferring immersive culinary tours over luxury resorts.
  culinary: Mai Tan, a 29‑year‑old experimental cook, they fuse fermented kimchi, matcha‑infused ramen broth, and slow‑roasted paprika‑spiced pork belly, boasting a confident home‑cook level that lets them
    deconstruct traditional dishes into avant‑garde plates, yet they still enjoy simple joys like a perfectly crisp bánh mì from a Jersey City market.
  core: Mai Tan, a 29‑year‑old food manager, they are a curiosity‑driven professional who balances spontaneous menu experiments with pragmatic cost control, yet often forget to file paperwork on time, finding
    calm in yoga and fuel in street‑food adventures.
background:
  cultural: Mai is a second‑generation East Asian American, raised in an immigrant family with roots in mainland China. She grew up in a multicultural New Jersey community, speaking English fluently and
    maintaining conversational Mandarin at home. Traditional festivals such as Lunar New Year and Mid‑Autumn are celebrated with family recipes and community gatherings, reinforcing values of harmony, respect,
    and collective well‑being. These cultural influences shape her collaborative leadership style and her passion for integrating authentic Asian flavors into the diverse culinary landscape of Jersey City.
attributes:
  skills: '[''Team leadership'', ''Staff scheduling'', ''Inventory management'', ''Cost control and budgeting'', ''Food safety & sanitation compliance'', ''Menu development'', ''Customer service excellence'',
