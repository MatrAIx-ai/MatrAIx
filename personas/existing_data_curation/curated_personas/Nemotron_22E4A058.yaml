  hobbies: '[''Watercolor painting'', ''Reading mystery novels'', ''Herb and tomato gardening'', ''Attending community theater'', ''Playing bridge'', ''Genealogy research'', ''Experimenting with new recipes'',
    ''Volunteering at the senior center'', ''Visiting historic sites in South Jersey'', ''Listening to jazz and classical music'']'
  career_goals: Even though Kathleen is retired, she aspires to solidify her legacy by publishing a memoir that intertwines her personal history with Vineland’s agricultural heritage. She aims to launch
    an intergenerational art workshop that blends abstract concepts with hands‑on craft, hoping to earn recognition from the local historical society for preserving oral histories. Additionally, she dreams
    of organizing an annual senior‑center talent showcase that highlights innovative performances, positioning herself as a catalyst for fresh creative expression within her community.
