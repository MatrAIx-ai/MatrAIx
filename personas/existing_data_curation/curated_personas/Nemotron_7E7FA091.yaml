personas:
  professional: Clarence Ratkovich is an aspiring junior game developer who merges a love for collaborative video games, basic coding in Scratch, and rhythmic drumming to prototype simple, team‑oriented
    interactive experiences for friends.
  sports: Clarence Ratkovich pours energy into playing point guard for the downtown community center basketball league and sprinting the 400‑meter dash with the school track team, cheering on the Philadelphia
    76ers and following the NBA’s Los Angeles Lakers while also volunteering as a junior assistant coach for the junior varsity squad.
  arts: Clarence Ratkovich explores creative rhythm through learning drum patterns to songs by Imagine Dragons, conquering rhythm‑based games like Beat Saber, and crafting colorful, interactive Scratch
    animations inspired by the kinetic art of Takashi Murakami and the comic style of Marvel’s Spider‑Man.
  travel: Clarence Ratkovich enjoys weekend road trips to nearby state parks for group hikes, dreams of attending the Tokyo Game Show in Japan, and has already taken a school‑organized field trip to Washington,
    D.C., where they reveled in the Smithsonian museums.
  culinary: Clarence Ratkovich favors classic teen staples like pepperoni pizza, chicken nuggets, and cheesy mac & cheese, but also loves experimenting with homemade nachos topped with jalapeños, shredded
    cheddar, and a dollop of guacamole when cooking with friends.
  core: Clarence Ratkovich blends a bright curiosity for teamwork‑driven tech and sport with a practical knack for balancing school, community service, and a snack‑filled social life, all while juggling
    a modest allowance and a brief bout of teenage asthma.
background:
  cultural: Clarence comes from a white Southern family that has lived in the Atlanta metro area for several generations. His parents were raised in Georgia, and family gatherings often feature classic
    Southern dishes like fried chicken, collard greens, and peach cobbler. He attends a local Baptist church where fellowship, community service, and hospitality are emphasized. Growing up in Clayton County,
    he is exposed to a diverse cultural mix, which has broadened his appreciation for various musical styles—from hip‑hop to country—and for community traditions such as neighborhood block parties, high‑school
    football games, and the annual county fair. This blend of Southern heritage and multicultural surroundings shapes his values of cooperation, pragmatism, and respect for others.
