  career_goals: Clarence wants a future career that mixes his interest in how things work with a chance to give back to his community. He is drawn to fields like civil engineering or software development,
    where he can design solutions that improve local infrastructure or help people connect. In the near term, he plans to join his school's robotics club, seek mentorship from a local engineering firm,
    and continue volunteering for neighborhood clean‑up and tutoring programs. His long‑term ambition is to earn a degree in engineering or computer science and eventually lead projects that make Atlanta
    a safer, more efficient, and more inclusive place.
