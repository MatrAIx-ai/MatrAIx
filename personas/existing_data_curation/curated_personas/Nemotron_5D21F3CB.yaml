  hobbies: '[''Book club'', ''Senior center volunteering'', ''Gardening'', ''Community choir'', ''Hiking'', ''Road trips to historic sites'', ''Yoga'', ''Cooking classes'']'
  career_goals: Looking ahead, Nancy aspires to transition into a leadership role such as charge nurse or unit manager where she can shape policies that improve patient safety and staff well‑being. She
    is also pursuing certification as a Certified Nurse Educator to teach in a community college program, share her practical knowledge, and mentor the next generation of nurses. Additionally, she hopes
    to spearhead a community health outreach initiative focused on chronic disease prevention for seniors in Henrico County, leveraging her curiosity for new health‑promotion strategies while staying grounded
    in proven practices.
