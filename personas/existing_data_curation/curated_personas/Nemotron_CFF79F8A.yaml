  hobbies: '[''Arduino and Raspberry Pi tinkering'', ''Building small robotics projects'', ''Reading sci‑fi and tech non‑fiction'', ''Cooking Tex‑Mex recipes'', ''Hosting backyard barbecues'', ''Hiking
    at Cedar Ridge'', ''Playing pickup basketball'', ''Volunteering at a community garden'']'
  career_goals: Oliver aims to re‑enter the workforce by first earning CompTIA A+ and Network+ certifications, positioning himself for an entry‑level IT support role in a mid‑size company. He envisions
    leveraging his practical skills to become a trusted technical liaison who can bridge users' needs with reliable solutions. Long‑term, he hopes to combine his IT expertise with his DIY know‑how by launching
    a side business offering tech‑integrated home improvement services, allowing him to maintain a flexible schedule while achieving financial stability.
