  career_goals: Josette aims to solidify her legacy as a mentor and leader within the retail sector by establishing a formal mentorship program for new supervisors in her region. Over the next few years,
    she hopes to transition into a district‑level management position, allowing her to influence broader operational strategies while still championing employee development. Simultaneously, she aspires
    to launch a community cultural initiative that incorporates Cuban traditions and Southern hospitality, creating a space where local artisans and musicians can showcase their work, thereby strengthening
    cultural ties in Russellville.
