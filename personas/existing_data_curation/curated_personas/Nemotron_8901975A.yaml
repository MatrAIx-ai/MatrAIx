    enhancement'']'
  hobbies: '[''Sketching and watercolor painting'', ''Reading speculative fiction and philosophy'', ''Listening to salsa, mambo, and jazz'', ''Playing harmonica'', ''Visiting museums and art galleries'',
    ''Attending community cultural festivals'', ''Balcony gardening (herbs and begonias)'', ''Solving crossword puzzles'', ''Cooking traditional Puerto Rican dishes'']'
  career_goals: As he nears retirement age, Seyed aims to shift from frontline cleaning to a supervisory or training role within facility management. He is pursuing a Certified Professional Cleaner credential
    and plans to complete a GED to formalize his education. His ambition is to become a Lead Maintenance Coordinator for a community institution such as a local school or cultural center, where he can mentor
    younger staff, design efficient cleaning protocols, and contribute to the visual presentation of public spaces. Additionally, Seyed hopes to volunteer as a docent or guide at Harrisburg’s museum, sharing
    his love for abstract art and Puerto Rican cultural exhibitions.
