personas:
  professional: Jason Walker, an organized eight‑year‑old builder, channels a methodical mindset into constructing intricate LEGO sets and mastering chess strategies, earning a reputation among teachers
    and Cub Scout leaders as a reliable problem‑solver who thrives on clear instructions and step‑by‑step challenges; they approach every task with unwavering precision.
  sports: Jason Walker, a member of the Riverside Youth Soccer Club’s U‑9 team, enjoys the structure of weekly practices and game strategies, follows the hometown baseball team the River City Royals for
    inspiration, and prefers low‑key backyard frisbee sessions with a close circle of friends over large crowds; they thrive in environments where rules and schedules are clear.
  arts: Jason Walker, a devoted reader of the Magic Tree House series and an admirer of illustrator Mo Willems, spends free evenings sketching favorite story scenes, attends the local library’s weekly storytelling
    hour, and collects limited‑edition graphic novels featuring the Diary of a Wimpy Kid characters; they find comfort in the familiar narratives and visual styles.
  travel: Jason Walker, who values well‑planned adventures, eagerly revisits the family‑friendly theme park of Disneyland during summer breaks, dreams of exploring the historic museums of Washington, D.C.,
    and prefers meticulously mapped road trips with a detailed itinerary over spontaneous getaways; they feel most at ease when every stop is scheduled.
  culinary: Jason Walker, a budding home‑chef, meticulously follows a chocolate chip cookie recipe using brand‑name vanilla extract and real butter, favors classic Mac & Cheese with sharp cheddar, and proudly
    assembles their own peanut‑butter‑jelly sandwiches while occasionally sneaking extra chocolate chips when no one’s watching; they take pride in following recipes step‑by‑step.
  core: Jason Walker is an eight‑year‑old routine‑lover who builds LEGO kingdoms with surgical precision, saves allowance in color‑coded jars, battles seasonal allergies with disciplined medication, and
    quietly dominates chessboards while keeping a secret stash of extra chocolate chips; they thrive on order and predictability.
background:
  cultural: Jason comes from a Caucasian family rooted in the suburban community of Basking Ridge, NJ. His family celebrates typical American holidays such as Thanksgiving, Fourth of July, and Christmas,
    often with community gatherings and church services. The region’s emphasis on education and extracurricular activities has given him access to public school programs, local library storytimes, and youth
    sports leagues. His household values practicality, punctuality, and modest traditions, reflecting a middle‑class, American‑European cultural mix that encourages responsibility and community involvement.
attributes:
  skills: '["Reading comprehension","Basic arithmetic","Following multi-step instructions","Organizing personal items","LEGO construction","Basic computer navigation","Time‑keeping in group activities"]'
  hobbies: '["LEGO building","Jigsaw puzzles","Reading series (Magic Tree House, Diary of a Wimpy Kid)","Cub Scouts","Chess","Checkers"]'
  career_goals: Jason enjoys dreaming about future careers that involve building, planning, and keeping things orderly. He often talks about wanting to become a civil engineer or architect so he can design
    bridges and houses, and he is also fascinated by the idea of being a firefighter because of the clear routines and teamwork involved. His short‑term ambition is to excel in his school projects and earn
    the next level in his LEGO club, laying a foundation for his long‑term goal of creating functional, well‑organized structures.
