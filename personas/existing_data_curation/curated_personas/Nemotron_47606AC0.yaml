  hobbies: '[''Playing recreational basketball in the local league'', ''Fishing on the Fox River'', ''Visiting the Appleton Farmers Market'', ''Homebrewing craft beer'', ''Woodworking projects'', ''Volunteering
    with the 4-H youth program'', ''Cooking seasonal farm-to-table meals'', ''Cycling on the Fox River State Trail'', ''Cheering on the Green Bay Packers'']'
  career_goals: Motivated by his blend of curiosity and practicality, Arvel is aiming to move into a regional procurement leadership position within the next five years, overseeing multiple sourcing teams
    across the Upper Midwest. He plans to earn a Chartered Institute of Procurement & Supply (CIPS) certification and enroll in a part‑time MBA program focused on supply‑chain innovation. His long‑term
    ambition is to champion sustainable sourcing initiatives—such as reducing food‑waste through better demand forecasting and integrating renewable‑energy‑powered logistics—while fostering a culture of
    mentorship and continuous improvement among younger colleagues. Arvel also hopes to contribute to industry‑wide best‑practice forums and represent his employer at national agricultural conferences.
