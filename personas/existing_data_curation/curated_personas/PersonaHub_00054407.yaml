persona_description: A woman who was a female computer programmer for the U.S. Army during World War II, working on the ENIAC project and later married to an electrical engineer who was also involved in
  the project. She retired after the birth of her first son and later moved to New York with her family. Her expertise and dedication to the project earned her recognition and she is remembered as one of
  the original "computers" of the ENIAC project.
