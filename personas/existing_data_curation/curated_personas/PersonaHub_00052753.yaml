persona_description: A team of astronomers who have been studying the evolution of disk galaxies over billions of years. They have used advanced telescopes and simulations to track the changes in these
  galaxies and understand the physical processes that have led to their current state. Their research interests include galaxy formation, star formation, and the evolution of galaxies in the universe. They
  are particularly interested in the trends observed in the DEEP2 sample and how they relate to the overall history of the universe.
