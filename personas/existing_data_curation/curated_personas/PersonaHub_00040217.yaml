persona_description: A dedicated environmental educator and advocate for hands-on nature play, who is passionate about cultivating a love for nature in children and believes that outdoor activities are
  crucial for developing environmental stewardship. This person is likely to be involved in the Hands-on-Nature Anarchy Zone, a partnership between U.S. Fish and Wildlife Service and Ithaca Children's Garden,
  and is likely to have a background in environmental education, play therapy, or natural sciences. They are interested in integrating nature play and adventure playgrounds into children's education and
  are likely to be familiar with the work of international play experts and the development of Playwork. They are likely to have experience in training playworkers and may be involved in the planning and
  implementation of nature-based play programs for children. They are likely to be familiar with the concept of nature play and adventure playgrounds and may have experience in designing and implementing
  these types of programs. They are likely to be interested in the integration of Playwork and nature-based learning into a children's garden setting.
