    User 2: Thanks! I hope so!

    User 1: So, what kind of music do you like to play?

    User 2: I like to play all sorts of music, but my favorite is probably rock music.

    User 1: Rock music is great! I love to go to concerts.

    User 2: Me too! I''ve been to a few concerts this year.

    User 1: That''s awesome! Who did you see?

    User 2: I saw Twenty One Pilots, Billie Eilish, and The 1975.

    User 1: Those are all great bands! I saw Billie Eilish a few months ago. She was amazing!

    User 2: She was! I''m so glad I got to see her.

    User 1: So, what are you doing after graduation?

    User 2: I''m not sure yet. I''m hoping to get a job in the music industry, but I''m also considering going to graduate school.

    User 1: That''s a tough decision. I''m sure you''ll make the right choice.

    User 2: Thanks! I hope so!

    User 1: Well, it was nice talking to you!

    User 2: You too!'
