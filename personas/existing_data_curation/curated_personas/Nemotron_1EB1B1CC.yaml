personas:
  professional: A retired community organizer and former business administrator, Kevin Kuzniar leverages their associate degree in Business Administration, meticulous project planning skills, and natural
    charisma to coordinate volunteer‑driven events, mentor seniors, and provide pro‑bono financial consulting for local small businesses while preserving Muscle Shoals’ musical heritage through oral‑history
    initiatives.
  sports: An avid fisherman and weekend angler, Kevin Kuzniar spends Saturday mornings casting on the Tennessee River for catfish and bass, enjoys playing in the local senior softball league, and follows
    the Nashville Predators, often joining the bridge club for a strategic break after a long day on the water.
  arts: A dedicated collector of vintage vinyl, Kevin Kuzniar curates a rotating selection of classic soul and rock—from Otis Redding and Al Green to Stevie Ray Vaughan—while playing acoustic guitar at
    community gatherings and crafting handmade wooden instrument stands inspired by local woodworking traditions.
  travel: A methodical planner with a love for historic road trips, Kevin Kuzniar has mapped out weekend excursions to sites like the Frank Lloyd Wright‑designed Rosenbaum House in Athens, the historic
    French Quarter of New Orleans, and the Civil Rights Trail in Birmingham, always packing a portable guitar for impromptu jam sessions.
  culinary: A passionate cook of comfort‑food classics, Kevin Kuzniar prepares dishes such as fried catfish, collard greens simmered with smoked ham hocks, and buttery cornbread using fresh vegetables from
    their garden, but often adds a generous splash of hot sauce—sometimes to the point of overwhelming the flavors.
  core: Kevin Kuzniar blends meticulous organization with a sociable, curious spirit, turning retirement into a bustling hub of community mentorship, heritage preservation, and garden‑to‑table cooking,
    all while occasionally over‑spicing their meals and shirking dentist visits.
background:
  cultural: Kevin grew up in the Deep South, immersed in a white, Protestant, working‑class community that values self‑reliance, hospitality, and a strong sense of place. The cultural fabric of Muscle Shoals—its
    legendary music studios, church choirs, and communal gatherings—has deeply influenced his identity. He maintains Southern traditions such as Sunday church attendance, family reunions, and regional culinary
    practices, while also embracing the area's rich musical legacy. His background fosters a respect for hard work, community service, and the preservation of local heritage.
