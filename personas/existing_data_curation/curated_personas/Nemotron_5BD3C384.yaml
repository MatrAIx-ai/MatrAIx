personas:
  professional: Lily Torbett is a seasoned UI/UX designer who leverages Adobe Creative Suite, Sketch, and Figma to craft accessible, responsive web layouts for municipal services, meticulously building
    design systems and style guides while steering Agile sprints with a methodical, reliability‑driven approach that satisfies her preference for predictability and structured documentation.
  sports: Lily Torbett enjoys low‑impact aerobic activities, joining the local senior cycling club in spring, attending Chicago Cubs games for a nostalgic baseball fix, and practicing gentle yoga twice
    weekly to maintain flexibility, reflecting her methodical yet competitive spirit in staying fit.
  arts: Lily Torbett immerses herself in the arts by quilting with patterns inspired by William Morris, attending community theater productions of classic plays, listening to Yo‑Yo Ma’s cello suites while
    baking, and losing herself in historical mystery novels by C.J. Sansom, all of which echo her love for tradition and meticulous craftsmanship.
  travel: Lily Torbett prefers well‑planned, leisurely trips that balance cultural immersion with garden tourism, having explored the rose gardens of Kyoto, the historic villages of the English Cotswolds,
    and the vineyards of Oregon’s Willamette Valley, while always booking accommodations in advance to alleviate her anxiety about the unknown.
  culinary: Lily Torbett, an adept baker, routinely crafts sourdough loaves, rosemary‑infused focaccia, and seasonal apple‑cinnamon pies using heritage recipes that feature locally sourced heirloom tomatoes,
    fresh thyme, and free‑range butter, and she delights in tasting farm‑to‑table meals at weekend farmers’ markets while occasionally indulging in a rich chocolate mousse for a well‑earned treat.
  core: Lily Torbett embodies a diligent, routine‑oriented designer whose love for orderly gardens, precise quilting, and methodical problem‑solving coexists with a tendency toward worry, a competitive
    edge in professional settings, and an occasional indulgence in nostalgic comforts.
background:
  cultural: Lily grew up in a small upstate New York town within a working‑class, white American family with deep regional roots, tracing ancestry to German and English settlers. Her upbringing emphasized
    self‑reliance, practicality, and active community involvement—values that continue to shape her adult life. The Greater Binghamton area's blend of industrial heritage, strong municipal services, and
    tight‑knit neighborhood networks informs her pragmatic outlook and dedication to reliable, user‑friendly digital solutions for public institutions. Family traditions include celebrating American holidays
    with homemade meals, participating in church events, and preserving local history, reflecting a respect for tradition while embracing measured change.
attributes:
  skills: '[''User Interface Design'', ''Responsive Web Design'', ''Wireframing and Prototyping'', ''User Experience Research'', ''Usability Testing'', ''Accessibility (WCAG) Compliance'', ''Design System
    Development'', ''Adobe Creative Suite'', ''Figma'', ''Sketch'', ''HTML5/CSS3'', ''WordPress Theme Development'', ''Project Planning and Documentation'', ''Stakeholder Communication'', ''Agile Methodology'']'
  hobbies: '[''Gardening (heirloom vegetables and roses)'', ''Baking (traditional breads and pies)'', ''Quilting'', ''Reading historical mystery novels'', ''Crossword puzzles'', ''Gentle yoga'', ''Journaling'',
    ''Volunteer work at the local historical society'', ''Community theatre attendance'', ''Small gatherings with friends and family'']'
  career_goals: Lily aims to become a senior digital experience architect for a regional government agency or a leading local firm, leading a design team and establishing a unified design system for municipal
    services. She plans to earn a Certified Usability Analyst credential to formalize her expertise and to mentor emerging designers in her community. Over the next few years she wants to transition into
    a consultancy role that leverages her practical, reliable design solutions for small businesses while maintaining a predictable work routine. Improving her specialization in accessibility and ensuring
    her work meets the highest standards are central to her ambition. Ultimately she hopes to retire with a strong portfolio and possibly teach design fundamentals part‑time at a community college.
