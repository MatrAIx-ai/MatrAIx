  hobbies: '[''Group fitness classes (spin, yoga)'', ''Community theater improv'', ''Hiking with local outdoor group'', ''Volunteer tax education workshops'', ''Cooking classes and wine tasting'', ''Reading
    non-fiction (economics, tech)'', ''Board game nights'', ''Lakefront kayaking'']'
  career_goals: Carlie aims to progress to a senior supervisory role within the Cook County Revenue Department, eventually directing a team that integrates data‑driven technologies into tax collection processes.
    She seeks certification as a Certified Government Financial Manager and hopes to become a recognized authority on innovative tax compliance strategies, while mentoring emerging women professionals in
    public finance.
