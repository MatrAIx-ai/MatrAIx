personas:
  professional: Carlie Coats is a tax law specialist at the Cook County Revenue Department who uses advanced Excel, SQL, and Python analytics to spot compliance patterns, and they balance a skeptical, competitive
    edge with a community‑focused, collaborative style.
  sports: Carlie Coats keeps fit through spin classes at FitXO, weekly yoga at CorePower, and weekend hikes with the Lake Michigan Trailblazers, while cheering for the Chicago Cubs, Bulls, and Blackhawks
    and they log at least 8,000 steps daily, driven by a competitive streak that pushes them to meet personal fitness goals.
  arts: Carlie Coats is an avid improv performer at The Second City community workshops, a board‑game host who favors Catan and Terraforming Mars, and a devoted fan of Sufjan Stevens’s folk‑indie albums,
    John Malkovich’s theater work, and Monet’s impressionist paintings, weaving artistic appreciation into every social gathering.
  travel: Carlie Coats prefers well‑planned weekend escapes to Lake County, Wisconsin, and annual wine‑focused tours of Tuscany’s vineyards, yet they also relish spontaneous urban adventures in Tokyo’s
    izakayas and the historic streets of Dublin, balancing budget constraints with a love for cultural immersion.
  culinary: Carlie Coats enjoys cooking classes where they master dishes like wild‑mushroom risotto, Korean bibimbap, and lemon‑garlic shrimp scampi, favoring ingredients such as fresh basil, goat cheese,
    and saffron, and they love pairing these meals with curated selections of Pinot Noir and Gewürztraminer.
  core: Carlie Coats blends Midwestern pragmatism with progressive activism, tackling tax compliance with data‑driven precision while staying socially vibrant, health‑conscious, and occasionally over‑indulging
    in boutique wines.
background:
  cultural: Carlie was raised in a middle‑class White family in the Midwest, absorbing values of hard work, self‑reliance, and community responsibility. Living in Evanston, a progressive and culturally
    diverse suburb of Chicago, has blended her Midwestern pragmatism with an inclusive, activist spirit, shaping her worldview and fostering a deep respect for civic engagement and continual learning.
attributes:
  skills: '[''Tax law interpretation'', ''Financial analysis'', ''Data analytics'', ''Compliance auditing'', ''Revenue collection'', ''Risk assessment'', ''Advanced Excel'', ''SQL database management'',
