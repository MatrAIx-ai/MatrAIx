personas:
  professional: As an emerging young visual storyteller, Charlotte Arizmendi blends meticulous landscape sketches with stop‑motion animation, they channel their relentless curiosity and critical eye into
    experimenting with lighting and composition, while their solitary working style ensures focus despite occasional bouts of self‑doubt.
  sports: An avid hiker of Ventura County hills, Charlotte Arizmendi explores the trails solo to observe deer and hawks, they also follow the Los Angeles Dodgers and cheer for the LA Galaxy, and they belong
    to the Ventura Youth Soccer Club’s beginner program, preferring low‑key, skill‑building practices over competitive matches.
  arts: Charlotte Arizmendi, a budding illustrator, devotes afternoons to sketching scenes inspired by Claude Monet and Hayao Miyazaki, they practice piano pieces by Ludovico Einaudi, binge‑watch documentaries
    on Frida Kahlo and the Renaissance, and spend weekends creating stop‑motion stories starring LEGO minifigures, channeling their love for visual narrative into every medium.
  travel: With a notebook full of doodles, Charlotte Arizmendi dreams of trekking the Redwood forests of Northern California and has already taken family trips to San Diego’s zoo and Disneyland, they plan
    future adventures to Kyoto’s bamboo groves, favoring meticulously researched itineraries that balance quiet observation spots with occasional landmark photo‑ops.
  culinary: In the kitchen, Charlotte Arizmendi enjoys assembling simple avocado toast with cherry tomatoes and feta, they love the bright flavors of sushi rolls like California rolls, and they occasionally
    bake chocolate chip cookies, yet they resist broccoli and often barter for extra dessert after completing a complex LEGO set.
  core: Charlotte Arizmendi, a ten‑year‑old puzzle‑loving sketcher, navigates the world with fierce curiosity, solitary focus, occasional anxiety spikes, and an unquenchable appetite for creative challenges.
background:
  cultural: Charlotte comes from a white, middle‑class family in suburban Moorpark, California. Her surname, Arizmendi, reflects Basque ancestry, though she primarily identifies with mainstream American
    cultural norms. Growing up in Ventura County provides her access to coastal beaches, the Santa Susana Mountains, and a vibrant local arts scene, including community museums and after‑school art programs.
    The region's emphasis on individuality, environmental awareness, and creative expression shapes her open‑minded yet solitary artistic pursuits.
