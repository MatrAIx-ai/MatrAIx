  career_goals: Charlotte dreams of becoming a professional graphic novelist or an independent video‑game designer who blends storytelling with visual art. She aspires to develop a personal brand that lets
    her create original, unconventional projects on her own terms, and hopes to someday contribute innovative ideas to both the art and tech communities while continuing to explore scientific concepts through
    creative media.
