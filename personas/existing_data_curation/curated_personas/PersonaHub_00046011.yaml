persona_description: A land manager at the Bureau of Land Management (BLM) in New Mexico, responsible for managing the public lands and balancing the use of these lands for multiple purposes, including
  the development of energy and mineral resources while conserving the multitude of other resources found on public lands. The person is knowledgeable about the BLM's mandate for multiple use of public
  lands, including the management of oil and gas resources, the operation and maintenance of helium storage reservoirs and pipelines, the active solid minerals program, and the restoration of disturbed
  lands. They are also engaged in the development of alternative energy resources on public lands and working with diverse partners to restore lands that were disturbed during energy development.
