  hobbies: '[''Reading science fiction'', ''Model rocket building'', ''Hiking and nature walks'', ''Nature photography'', ''Scratch programming'', ''Robotics club'', ''Playing acoustic guitar'', ''Journaling'']'
  career_goals: Karl dreams of becoming a mechanical engineer who can design eco‑friendly outdoor gear, or a wildlife biologist dedicated to protecting Idaho’s natural habitats. He also hopes to develop
    educational video games that blend his love of coding with his interest in nature. On a personal level, Karl aims to strengthen his coping strategies for anxiety so he can become a reliable peer mentor
    in his school community.
