personas:
  professional: Karl Scarborough, a 12‑year‑old aspiring robotics engineer, blends curiosity about electronics with practical safety habits as they design and program Scratch games and model rockets, while
    their organized yet flexible mindset lets them meet robotics club deadlines without feeling overwhelmed.
  sports: Karl Scarborough stays active by hiking the foothill trails near Pocatello and playing on the local youth soccer team, the Pocatello Panthers, while they also follow the Idaho Vandals basketball
    program and occasionally watch the Utah Jazz, preferring low‑key workouts that blend practical endurance training with their love for nature.
  arts: Karl Scarborough channels creative energy into acoustic guitar renditions of John Denver, captures black‑and‑white nature shots inspired by Ansel Adams, and fuels imagination through Isaac Asimov’s
    sci‑fi novels and weekly board‑game nights featuring Ticket to Ride, shaping a personal aesthetic that balances quiet contemplation with playful storytelling.
  travel: Karl Scarborough prefers carefully planned family road trips that blend low‑key outdoor adventure—like weekend hikes to Craters of the Moon and a summer visit to Yellowstone National Park—with
    dreamful aspirations to explore the Kennedy Space Center and Tokyo’s Miraikan museum, favoring modest budgets and small‑group travel to keep stress at bay.
  culinary: Karl Scarborough enjoys the comfort of cheese‑laden mac and cheese and pepperoni pizza, occasionally helps whip up spaghetti Bolognese with fresh basil, and relies on portable trail snacks like
    granola bars, peanut butter, and dried fruit during hikes, reflecting a beginner‑friendly cooking skill set focused on familiar, hearty flavors.
  core: Karl Scarborough, a thoughtful 12‑year‑old tinkerer, balances relentless curiosity with a cautious streak, often over‑planning model‑rocket launches while secretly hoarding mismatched screws and
    worrying about every upcoming robotics competition.
background:
  cultural: Karl comes from a white, middle‑class family that has lived in the Pocatello area for generations. The region’s blend of modest urban life and expansive outdoor spaces influences his love for
    hiking, fishing, and community events like county fairs. Family traditions include weekend camping trips, backyard barbecues, and attending local high school sports games. His upbringing reflects the
    values of self‑reliance, community cooperation, and an appreciation for the natural environment common in rural Idaho. Although his community is predominantly Protestant, his family practices a broad,
    inclusive form of Christianity that emphasizes personal responsibility and helping others.
