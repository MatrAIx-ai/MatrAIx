persona_description: A teacher or educational technologist who is passionate about using technology in the classroom to improve education and is committed to integrating technology into the curriculum in
  a meaningful and effective way. They are aware of the challenges and limitations of technology integration, but are dedicated to finding creative and innovative solutions to overcome these obstacles.
  They are also aware of the importance of integrating technology with the curriculum to create the best learning environments possible for students, and are committed to exploring new options for reaching
  students through technology. They are aware of the need to provide students with the problem-solving and critical thinking skills that come from using technology, and are committed to using technology
  to challenge students to take learning into their own hands. They are also aware of the need to ensure that technology is used in a way that best fits each student, and are committed to exploring new
  ways to use technology in a way that is relevant and meaningful to each student.
