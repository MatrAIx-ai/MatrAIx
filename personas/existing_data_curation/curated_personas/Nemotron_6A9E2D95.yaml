  career_goals: Alexis aims to transition from an independent freelancer to the owner of a small, locally‑based painting crew that emphasizes sustainable finishes and mentorship. She hopes to create a structured
    apprenticeship program that lets her share practical trade knowledge with younger workers while preserving a flexible, low‑stress work environment. Long‑term, she envisions adding interior design consulting
    services focused on harmonious, people‑centered spaces and eventually partnering with community organizations to lead volunteer renovation projects for affordable housing.
