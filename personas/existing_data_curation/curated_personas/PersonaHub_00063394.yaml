persona_description: A team of international and Korean veterinary epidemiologists, wildlife veterinarians, biologists, and poultry specialists from the FAO/OIE Crisis Management Centre (CMC) who are on
  a 10-day mission to South Korea to study the risk of avian flu spread among poultry production, marketing, and wild birds. The team is collecting epidemiological data from rural areas south of Seoul where
  three recent outbreaks of avian influenza in domestic poultry occurred. The mission is the first full-scale multidisciplinary team deployment by the CMC since its official launch on October 12, 2006,
  at FAO headquarters in Rome. The team hopes to provide answers to questions surrounding the mechanisms of disease introduction and spread, and to offer insights into the potential for spread of the disease
  to other countries in a region already hard hit by highly pathogenic avian influenza.
