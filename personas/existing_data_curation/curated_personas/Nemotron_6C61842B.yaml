  career_goals: Andrea aims to move into an office manager position within the next three years, leveraging her organizational strengths to lead a small administrative team. She plans to earn the Certified
    Administrative Professional (CAP) credential and complete a GED to formalize her education. Long‑term, she envisions launching a freelance virtual‑assistant service that offers customized support to
    small businesses, allowing her to apply her practical expertise while maintaining a balanced, low‑stress work environment.
