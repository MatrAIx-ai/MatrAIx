personas:
  professional: Hector Garayrodriguez, a seasoned plasterer and stucco mason with over three decades of hands‑on experience, excels at mixing, applying, and finishing cement‑based surfaces while leveraging
    his practical problem‑solving mindset and cooperative nature to mentor crew members and maintain harmonious client relationships despite his relaxed attitude toward strict scheduling.
  sports: Hector Garayrodriguez is an avid supporter of the El Salvador national soccer team and follows the Vegas Golden Knights hockey club, joins the local Sparks Soccer Club’s weekend pick‑up games
    when his schedule permits, and balances his fitness routine with early morning fishing trips and occasional hikes in the Sierra Nevada.
  arts: Hector Garayrodriguez enjoys listening to classic Latin ballads by José José, the guitar virtuosity of Carlos Santana, and the poetry of Pablo Neruda, attends quarterly exhibits at the Nevada Museum
    of Art, and finds inspiration for his woodworking projects in the folk art of Salvadoran painter Fernando Llort.
  travel: Hector Garayrodriguez favors modest, family‑oriented road trips to nearby destinations like Lake Tahoe and the Grand Canyon, while treasure‑hunting for cultural immersion during occasional flights
    to San Miguel de Allende and dreams of trekking to Machu Picchu once his business is financially stable.
  culinary: Hector Garayrodriguez is a skilled home‑cook who perfects pupusas stuffed with queso fresco and loroco, deep‑fry yuca frita with a hint of achiote, and experiments with plantain mofongo, often
    pairing his meals with fresh avocado salsa and a cold cerveza after a day on the job.
  core: Hector Garayrodriguez blends a craftsman’s precision with a laid‑back love of fishing, quietly humming classic Latin tunes while fixing plaster, and sometimes forgets to file his paperwork on time
    but never skips a weekend pupusa feast.
background:
  cultural: Hector was born in El Salvador and immigrated to the United States as a teenager. He maintains strong ties to his Salvadoran roots through language, food, and community celebrations such as
    Las Fallas and Día de Los Muertos. Bilingual in Spanish and English, he often acts as a cultural bridge within his workplace and local Latino neighborhood in Sparks. Family loyalty, respect for elders,
    and a cooperative spirit are core values he carries from his heritage, shaping his approach to teamwork and his desire to create harmonious relationships both on the job and at home.
attributes:
  skills: '[''Plaster application'', ''Stucco spraying'', ''Surface preparation'', ''Blueprint reading'', ''Construction safety compliance'', ''Scaffolding setup'', ''Material mixing and ratio calculation'',
