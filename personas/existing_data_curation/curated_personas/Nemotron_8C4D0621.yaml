  hobbies: '[''Fishing'', ''Hiking'', ''Cooking Salvadoran cuisine'', ''Watching soccer'', ''Volunteering at community center'', ''Woodworking'', ''Family gatherings'']'
  career_goals: Hector aims to transition from field work to a supervisory role within the next few years, seeking a foreman position where he can plan projects, schedule crews, and ensure quality control.
    He plans to obtain an OSHA 30‑hour certification and a state‑issued mason’s license to broaden his credibility. Eventually he hopes to launch a modest, family‑run plastering and stucco contracting business
    that can provide flexible hours for his wife and allow him to pass on his trade to younger relatives. Financial stability for his family and the ability to choose projects that align with his values
    of craftsmanship and community service drive his ambitions.
