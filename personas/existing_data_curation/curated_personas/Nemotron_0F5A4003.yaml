  hobbies: '[''Cooking fusion cuisine'', ''Watching/playing basketball'', ''Reading mystery novels'', ''Listening to business podcasts'', ''Jogging'', ''Participating in cultural festivals'']'
  career_goals: Kun aims to transition from a general operations manager to a senior operations leader within the next three to five years, targeting roles that involve strategic planning and cross‑functional
    coordination. He plans to complete a bachelor's degree in Business Administration to strengthen his analytical foundation. Ultimately, he aspires to become a director of operations for a regional retail
    chain or to launch his own small‑scale neighborhood market that blends Asian specialty foods with mainstream convenience, emphasizing efficiency and community engagement.
