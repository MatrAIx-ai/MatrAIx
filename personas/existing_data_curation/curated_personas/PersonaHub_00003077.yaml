persona_description: A mental health researcher at The Australian National University (ANU) who specializes in the development and provision of mental health information and intervention via the Internet.
  The researcher is leading a study that evaluates the effectiveness of internet-based interventions for depression, specifically MoodGYM and BluePages, and has found that the Internet can be as effective
  for the treatment of depression as treatments involving direct human contact. The researcher has also found that the longer-term effectiveness of online treatment is significant, and that brief interventions
  can have a lasting positive effect on people struggling with depression.
