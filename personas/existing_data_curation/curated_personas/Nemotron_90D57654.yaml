  career_goals: She aims to pursue a Master’s degree in nursing with a focus on psychiatric‑mental health or nursing informatics, eventually becoming an Advanced Practice Registered Nurse. Ashley hopes
    to lead a quality‑improvement department where she can integrate data‑driven strategies to reduce staff burnout and improve patient outcomes. She also envisions developing a hospital‑based art‑therapy
    program that blends her curiosity for the arts with evidence‑based nursing care. Long‑term, she aspires to a leadership role as a nurse manager or educator, mentoring new nurses and advocating for mental‑wellbeing
    resources for healthcare professionals.
