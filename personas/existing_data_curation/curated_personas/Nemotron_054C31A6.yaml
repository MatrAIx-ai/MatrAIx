  hobbies: '[''Book club participation'', ''Line dancing'', ''Beachcombing and shell collecting'', ''Genealogy research'', ''Cooking and recipe experimentation'', ''Potluck hosting'', ''Quilting and textile
    arts'', ''Gentle yoga'', ''Mindfulness meditation'', ''Local history tours'']'
  career_goals: Although retired from formal employment, Karen aims to expand her impact in Wilmington by leading a senior‑focused community garden, organizing intergenerational storytelling workshops,
    and completing her associate degree in gerontology. She hopes to publish a memoir that captures her family's Southern heritage, and she plans to travel to visit her adult children and grandchildren
    in nearby states. In the next five years, she aspires to serve on the board of the local historical society and to become a certified volunteer trainer, ensuring that future volunteers have the tools
    to support the community effectively.
