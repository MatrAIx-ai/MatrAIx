persona_description: A quantitative researcher in a business or manufacturing organization, who is familiar with the DMAIC process and its application in quality improvement. They are skilled in statistical
  analysis and have experience with correlation and regression analysis. They are interested in applying the DMAIC process to improve existing processes and identify the root causes of defects. They have
  a strong understanding of critical-to-quality (CTQ) characteristics and how to create an improvement process based on defined measurable goals. They are proficient in using DMAIC to determine the perceived
  cause of prevailing problems and develop a solution to eliminate the gap between existing performance and desired performance level. They are also skilled in creating an implementation plan with a change
  management approach to ensure adaptability and capacity to the new system.
