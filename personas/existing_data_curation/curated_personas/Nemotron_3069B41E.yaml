  career_goals: Benjamin aims to pursue a two‑year associate degree in renewable energy technology or environmental science at a community college, with the long‑term ambition of working as a sustainability
    technician or field technician for a clean‑energy company in western Massachusetts. He hopes to combine his practical mechanical aptitude with his curiosity about sustainable systems, eventually overseeing
    projects that integrate solar installations with local farms. In the meantime, he plans to earn certifications in HVAC repair and solar panel installation, building a portfolio that will support his
    career transition.
