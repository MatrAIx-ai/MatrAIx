persona_description: An experimental physicist who is currently working on the development of quantum information and simulation with superconducting circuits, focusing on the control and manipulation of
  oscillators using Josephson circuits. They are interested in understanding the properties of microwave cavities and how they can be used to enhance the performance and coherence of Josephson circuits.
  They are seeking to develop new architectures for quantum information and simulation with superconducting circuits and are excited about the potential implications of their work for the development of
  highly coherent anharmonic oscillators.
