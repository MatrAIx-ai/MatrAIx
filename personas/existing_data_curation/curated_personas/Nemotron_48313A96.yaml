personas:
  professional: Cordellia, a freshly‑minted preschool team leader, channels their love of structure and sociable spirit into organizing group art projects and snack rotations, showing early signs of leadership
    and practical problem‑solving.
  sports: Cordellia, an enthusiastic participant in the local New Jersey Hurricanes Youth Soccer program, also cheers for the New York Knicks and loves swinging on the playground, balancing structured team
    drills with spontaneous games of tag.
  arts: Cordellia, a budding storyteller who adores drawing bright rainbows and listening to Raffi’s “Baby Beluga” while humming festive São João songs, frequently reenacts scenes from “Frozen” with their
    stuffed friends.
  travel: Cordellia, a curious explorer who loves family road trips to the interactive exhibits at the Smithsonian in Washington, D.C., and dreams of a sunny beach vacation in a European coastal town after
    seeing pictures of pastel‑colored houses and ocean waves.
  culinary: Cordellia, a picky yet adventurous eater, delights in buttery mac & cheese, peanut butter‑jelly sandwiches, and occasionally relishes the sweet custard of pastéis de nata and tiny fish‑shaped
    crackers, proudly insisting on stirring the pancake batter themselves.
  core: Cordellia, a five‑year‑old with a knack for turning playground chaos into organized fun, trades stickers with gusto, negotiates snack choices, and hums festive tunes while keeping a vigilant eye
    on their precious piggy bank.
background:
  cultural: Cordellia is raised in a white, Portuguese‑American family in Farmingdale, New Jersey. Her household blends typical American suburban traditions—celebrating Thanksgiving, Independence Day, and
    Halloween—with Portuguese cultural elements such as occasional Festa de São João gatherings, enjoying dishes like bacalhau and pastéis de nata, and attending a local Catholic church. This multicultural
    environment shapes her values of kindness, cooperation, and community involvement.
