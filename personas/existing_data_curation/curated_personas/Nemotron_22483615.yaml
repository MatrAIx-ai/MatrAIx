personas:
  professional: Johnnie Pittman, a budding builder and imaginative problem‑solver at three, balances curiosity about how things work with a practical habit of sorting blocks by shape and color; they love
    improvising new creations while occasionally leaving a trail of scattered pieces because they value playtime flexibility over tidy planning and enjoy group building projects with other kids.
  sports: Johnnie Pittman, an energetic participant in the Bright Beginnings toddler gymnastics class and a member of the Tiny Tots Soccer Club, loves the rhythmic bounce of a mini trampoline, cheers loudly
    for the Los Angeles Lakers on TV, and enjoys spontaneous tag games in the local park, though they sometimes forget to put away their water bottle after play, reflecting a relaxed approach to obligations.
  arts: Johnnie Pittman, an enthusiastic fan of animated musical movies, sings along to "Let It Go" by Idina Menzel and dances to "Shake It Off" by Taylor Swift, watches Sesame Street with delight, and
    loves finger‑painting bright swirls, often sharing crayons with friends despite occasionally misplacing the art supplies, showcasing their sociable and cooperative nature.
  travel: Johnnie Pittman, a wide‑eyed explorer, has visited Grandma’s farm in the countryside, the local aquarium in the city, and a beachside picnic at the state park, and dreams of a magical trip to
    Disneyland in Anaheim; they prefer short, family‑guided outings where they can run freely and meet other kids, yet they sometimes become uneasy on long car rides, clinging to their favorite blanket.
  culinary: Johnnie Pittman, a picky yet adventurous eater, favors chicken nuggets, creamy mac and cheese, banana slices, and peanut‑butter‑and‑jelly sandwiches, enjoys helping stir the batter for pancakes
    with a wooden spoon, and craves the sweet taste of strawberry yogurt, while consistently turning away from broccoli and green beans, reflecting a flexible yet sometimes disorganized approach to mealtime.
  core: Johnnie Pittman is a curious, sociable three‑year‑old whose boundless energy and love for group play are tempered by frequent worries; they often misplace their favorite stuffed rabbit, a quirky
    habit that adds to their endearing disorganization.
background:
  cultural: Johnnie grows up in a lively African‑American neighborhood in Brooklyn, where family gatherings often feature soulful music, shared meals, and storytelling traditions. He participates in community
    festivals and attends programs at local cultural centers that celebrate Black heritage, exposing him to rhythm, expressive movement, and a strong sense of community belonging.
