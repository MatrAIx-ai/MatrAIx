  career_goals: Even at three, Johnnie frequently imagines becoming a firefighter or a teacher because he loves helping people and sharing what he learns. He talks about rescuing friends or guiding classmates
    during play, showing his early desire to make a positive impact and his caring, cooperative disposition.
