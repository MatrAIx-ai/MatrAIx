  hobbies: '[''Reading contemporary Latin American literature'', ''Creative writing and journaling'', ''Cooking Puerto Rican cuisine'', ''Salsa and bachata dancing'', ''Hiking Connecticut state parks'',
    ''Yoga and mindfulness practice'', ''Volunteering at community cultural center'', ''Photography of festivals and nature'']'
  career_goals: Maria aims to transition from a frontline customer service representative to a supervisory role, such as Team Lead or Operations Coordinator, where she can leverage her coaching experience
    and organizational strengths to mentor a team. She is interested in obtaining a certification in Customer Experience Management to deepen her expertise in quality assurance and process optimization.
    Over the next five years, Maria hopes to blend her passion for cultural advocacy with her professional path by spearheading community outreach initiatives within her organization, promoting bilingual
    support services, and potentially moving into a corporate social responsibility or diversity and inclusion position. She also contemplates pursuing a master's degree in Communication or Organizational
    Leadership to broaden her strategic impact.
