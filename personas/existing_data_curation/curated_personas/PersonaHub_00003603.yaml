persona_description: Jawwad Patel, an engineering student from India who invented a 3D-printed device that produces 2 liters of drinking water every hour from air, and is currently working on the next version
  of the product. He is passionate about water, energy, and healthcare, and seeks to take his products to the rural masses through government channels rather than private companies. He is an inventor at
  heart and became passionate about electronics around the age of 12-13, eventually having his own laboratory to experiment. He is a strict follower of Dr. APJ Abdul Kalam and is currently working on a
  solar-powered water bottle that converts atmospheric moisture to water and a condenser connected to a series of hydrophobic resources that repel water, then collect it.
