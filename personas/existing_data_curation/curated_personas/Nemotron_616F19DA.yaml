    problem solving"]'
  hobbies: '["Fly fishing","Deer hunting","Vegetable gardening","Woodworking","Reading historical non-fiction","Classic country music","Church community service","4‑H youth mentoring","Vintage pickup truck
    restoration","Puzzle solving (crosswords, Sudoku)","Attending local fairs and rodeos"]'
  career_goals: Brian aims to advance to a senior quality‑assurance supervisory role within his company, leading a team of inspectors and overseeing continuous‑improvement initiatives that boost product
    reliability and reduce waste. He plans to obtain the ASQ Certified Quality Engineer (CQE) designation to formalize his expertise. Over the next five years, he hopes to spearhead a company‑wide process‑optimization
    project and develop a mentorship program for entry‑level inspectors. As he approaches retirement, Brian envisions transitioning to a part‑time quality‑consulting role for small local manufacturers,
    while ensuring a stable financial future for his family and possibly expanding his modest hobby farm.
