  hobbies: '[''gardening'', ''church choir'', ''quilting'', ''reading historical fiction'', ''attending cultural festivals'', ''listening to blues and jazz'', ''sharing cooking tips with neighbors'']'
  career_goals: At 68, Ashley aims to cement her culinary legacy by publishing a family‑recipe cookbook that blends traditional African‑American dishes with the experimental twists she’s discovered over
    the years. She dreams of launching a modest pop‑up catering service called "Harper’s Soul Kitchen," focusing on neighborhood gatherings and church events. Additionally, she seeks to mentor younger cooks
    at the local community center, offering hands‑on workshops that emphasize both time‑tested techniques and respectful curiosity for new flavors. Winning a local cooking competition would also fulfill
    her competitive drive and give her broader recognition.
