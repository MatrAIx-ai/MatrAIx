persona_description: A sociologist who specializes in the study of migration and globalization, particularly the ways in which cross-border connections are built and maintained between different societies.
  They are interested in understanding the complex interplay between place of origin, destination, and the broader global context, and how these connections shape the lives of immigrants and their descendants.
  They are also interested in exploring the ways in which migration can be seen as a tool for change and development, and the challenges and opportunities it presents for policy makers and scholars alike.
