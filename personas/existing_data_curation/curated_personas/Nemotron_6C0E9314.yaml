    rock)"]'
  career_goals: Lydia envisions a career that lets her fuse creativity, technology, and cultural storytelling. She aims to study communications, film, or computer science in college, with a long‑term goal
    of becoming a multimedia content creator who highlights Mexican‑American experiences through short films, digital illustrations, and interactive media. She also dreams of launching a small‑scale culinary
    venture—such as a pop‑up food truck or a social‑media‑driven recipe brand—where she can share family recipes with a broader audience. Flexibility and the ability to set her own schedule are important
    to her, so she is interested in freelance or entrepreneurship pathways that allow spontaneous, project‑based work while still providing a stable income.
