personas:
  professional: Touria Bankston is a prodigious 11‑year‑old budding coder, weaving imaginative narratives into interactive Scratch projects while meticulously documenting each iteration in a personal journal,
    showcasing an early blend of artistic vision and disciplined project management.
  sports: Touria Bankston is a quiet fan of the Portland Trail Blazers and Portland Timbers, while regularly training with the Portland Youth Swim Club’s junior team, preferring the solitary rhythm of laps
    over noisy playground games.
  arts: Touria Bankston immerses themselves in fantasy illustration, drawing inspiration from artists like Brian Froud and John Howe, while listening to the evocative piano works of Ludovico Einaudi and
    Frédéric Chopin during practice, and showcasing their own digital paintings in the school’s annual art show.
  travel: Touria Bankston dreams of starlit adventures, having camped under the clear skies of Bryce Canyon and explored the historic streets of Edinburgh, while regularly taking family road trips to Multnomah
    Falls, combining meticulous itinerary planning with a love for quiet, nature‑focused getaways.
  culinary: Touria Bankston enjoys crafting simple yet colorful meals, favoring homemade Margherita pizza topped with fresh basil, rainbow veggie stir‑fry with tofu, and finishing with a warm bowl of vanilla
    bean rice pudding, while their cooking skill sits between enthusiastic experimentation and occasional burnt toast mishaps.
  core: Touria Bankston blends a hyper‑organized mind with a vivid imagination, spending hours building LEGO skylines, coding tiny story games, and stargazing, while managing a strict allowance budget,
    battling mild myopia, and occasionally sacrificing sleep for late‑night puzzles.
background:
  cultural: Touria is a white American girl raised in Phoenix, Arizona, where the desert landscape and Southwest culture shape her everyday life. She celebrates mainstream U.S. holidays such as Thanksgiving,
    Christmas, and Fourth of July, while also embracing regional traditions like attending community summer festivals and exploring nearby natural sites such as the Sonoran Desert and local hiking trails.
    Her family emphasizes academic achievement, organization, and independence, values that align with her personal drive. The multicultural environment of Phoenix exposes her to diverse perspectives, influencing
    her curiosity about different cultures and ideas.
