  career_goals: Touria aspires to become a creator who merges art and technology - she envisions a future as a multimedia storyteller, such as a graphic novelist or video-game narrative designer, where
    she can bring her imaginative worlds to life. She is also fascinated by scientific concepts and imagines pursuing a career in astronomy or theoretical physics, aiming to visualize complex ideas for
    broader audiences. Her long-term ambition is to lead independent projects that combine rigorous research, artistic expression, and innovative design, while maintaining the autonomy she values.
