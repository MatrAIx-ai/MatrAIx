  hobbies: '[''Classic Car Restoration'', ''Woodworking'', ''Fishing'', ''Golf'', ''Historical Non-Fiction Reading'', ''Crossword Puzzles'', ''Community Service (Food Bank)'', ''Gardening'']'
  career_goals: Approaching retirement, Michael aims to solidify his legacy by implementing a company‑wide efficiency program that reduces operational costs by at least 15% over the next two years. He seeks
    to mentor emerging leaders, establishing a formal succession plan for his department. Additionally, he hopes to transition into a senior advisory role where he can provide strategic guidance on process
    improvement and safety compliance, while also pursuing consultancy opportunities after formal retirement. Ensuring financial stability for his family and contributing to his community’s economic development
    remain key motivations.
