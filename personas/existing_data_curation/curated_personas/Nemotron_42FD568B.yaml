personas:
  professional: Michael Beaumont, a veteran operations manager steeped in Lean Six Sigma, advanced Excel analytics, ISO and OSHA compliance, channels his methodical, routine‑driven nature and healthy skepticism
    into meticulously scheduled process overhauls that routinely shave 15% off costs while coaching cross‑functional teams with a competitive edge.
  sports: Michael Beaumont tees off every Thursday at Riverside Country Club with his longstanding golf buddies, logs each round’s stats in a spreadsheet, follows the St. Louis Cardinals each baseball season,
    and stays active with low‑impact strength drills designed to counteract the stiffness from his woodworking and fishing trips.
  arts: Michael Beaumont unwinds to the soulful blues of B.B. King, the classic film noir of Humphrey Bogart, and the tranquil landscapes of Ansel Adams, allowing the disciplined aesthetics of these artists
    to inspire the clean lines of his woodworking projects.
  travel: Michael Beaumont maps each vacation with the precision of a project schedule, favoring leisurely road trips to motor museums in Detroit and historic rail towns across the Midwest, while dreaming
    of a post‑retirement pilgrimage to Scotland’s rugged castles and lochs.
  culinary: Michael Beaumont cooks with carpenter‑like precision, expertly grilling lake‑caught trout seasoned with fresh dill from his garden, simmering a rosemary‑infused pot roast on Sundays, and reserving
    Friday evenings for a classic steak frites at his favorite downtown bistro.
  core: Michael Beaumont blends a lifelong devotion to routine and hands‑on craftsmanship with a competitive streak, habitually checking project metrics before breakfast, never missing a Thursday golf game,
    and occasionally biting his nails when a process won’t align perfectly.
background:
  cultural: Michael comes from an Anglo‑American background rooted in suburban Texas. Raised in a family that valued self‑reliance, tradition, and community service, he grew up attending a local United
    Methodist church and participating in neighborhood events such as county fairs and high school football games. His cultural outlook reflects a blend of Texan pragmatism, Southern hospitality, and conservative
    values that emphasize family, hard work, and practicality. These influences shape his approach to both his professional responsibilities and personal life.
attributes:
  skills: '[''Project Management'', ''Lean Six Sigma Process Improvement'', ''Operations Management'', ''Data Analysis (Excel, SQL)'', ''Team Leadership & Coaching'', ''Budgeting & Financial Planning'',
