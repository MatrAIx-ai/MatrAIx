personas:
  professional: Kelvin Montalbano is a budding maker‑inventor who spends afternoons constructing intricate LEGO mechanisms, coding Scratch projects and launching model rockets, turning curiosity into hands‑on
    engineering while embracing a relaxed, unstructured schedule that lets imagination run free.
  sports: Kelvin Montalbano enjoys solo bike rides through the nearby river trail, participates in the after‑school cycling club, and is an avid fan of the local junior soccer team, the River Rangers, while
    also cheering for the professional basketball team, the Golden State Warriors, on weekend game nights.
  arts: Kelvin Montalbano channels creative energy into sketching futuristic machines inspired by Leonardo da Vinci’s notebooks, the cyber‑aesthetic of H.R. Giger, and the melodic synth‑pop of Daft Punk,
    while occasionally binge‑watching Studio Ghibli films for visual storytelling cues.
  travel: Kelvin Montalbano prefers meticulously planned day trips to nearby nature reserves like the Redwood State Park, has visited the Smithsonian National Air and Space Museum in Washington D.C., and
    dreams of a future expedition to Cape Canaveral to see a real rocket launch.
  culinary: Kelvin Montalbano favors simple, protein‑rich meals such as grilled chicken with quinoa, enjoys assembling homemade pizza topped with rocket‑shaped pepperoni, and snacks on trail mix featuring
    dried apricots, almonds, and dark chocolate, though they often forget to clean the kitchen after cooking.
  core: Kelvin Montalbano is an introspective young tinkerer whose love for rockets, LEGO, and coding is balanced by a habit of misplacing school supplies and a fierce devotion to solitary problem solving.
background:
  cultural: Kelvin comes from an Italian‑American family rooted in the Boston area. His grandparents emigrated from Southern Italy, so he grew up hearing Italian phrases and enjoying traditional dishes
    like pasta al pomodoro and lasagna. The family maintains Catholic traditions, celebrating holidays such as Easter and attending Mass. Living in Roxbury, Kelvin is also exposed to the neighborhood's
    multicultural vibe, encountering diverse music, art, and cuisine at community events. This blend of Italian heritage and the urban Boston environment shapes his worldview, fostering an appreciation
    for both family customs and the broader cultural mosaic of his community.
