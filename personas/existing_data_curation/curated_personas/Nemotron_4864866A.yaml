  career_goals: Kelvin aspires to a career that blends his love of technology, problem solving, and independent work. He dreams of becoming a software engineer or robotics developer, designing autonomous
    systems that tackle real‑world challenges. He also entertains the idea of working as a forensic analyst, using his skeptical, analytical nature to uncover hidden evidence. His immediate goal is to attend
    a specialized STEM high school, followed by a university renowned for engineering, where he can contribute to innovations while maintaining a focused, quiet work environment.
