personas:
  professional: Karina Thomas, a 17‑year‑old visual storyteller, turns imagination into polished digital illustrations using Procreate and Canva, leads her school’s graphic design club with meticulous project
    plans, and constantly pushes herself toward perfection, sometimes micromanaging teammates’ contributions because they fear sub‑par outcomes.
  sports: Karina Thomas channels abundant energy into hip‑hop dance classes at ShineFit Studio, supplements cardio with weekend pickup basketball games while cheering on the Charlotte Hornets and Carolina
    Panthers, prefers high‑intensity interval training over traditional gym workouts, and they sometimes skip cool‑downs in the rush to meet design deadlines.
  arts: Karina Thomas draws inspiration from speculative fiction, modern art exhibitions at the Mint Museum—especially works by Kerry James Marshall and contemporary muralist Ja’ta Brown—and immerses themselves
    in the music of Kendrick Lamar and the poetry of Ocean Vuong, while also acting in their youth theatre group, where they find collaborative storytelling both exhilarating and a source of early‑career
    networking.
  travel: Karina Thomas prefers meticulously planned weekend getaways to nearby cultural hotspots like Asheville’s River Arts District and New Orleans’ French Quarter, dreams of exploring Tokyo’s neon design
    scene and Barcelona’s modernist architecture, but they balance these ambitions against a modest savings plan for college and family commitments.
  culinary: Karina Thomas loves experimenting with bold flavors, often whipping up spicy Korean bibimbap with gochujang, vegan jackfruit tacos seasoned with smoked paprika, and matcha‑infused desserts,
    yet they remain at a confident intermediate cooking level, usually preparing meals for themselves after late‑night design sessions and occasionally trading recipes with friends over Discord.
  core: Karina Thomas is a fiercely competitive, imagination‑driven teen who juggles high‑impact visual projects with late‑night gaming marathons, often sacrificing sleep and over‑scrutinizing work, yet
    they harness relentless organization and community collaborations to keep creative chaos at bay.
background:
  cultural: Karina is an African‑American teenager raised in Charlotte’s vibrant Black community. Her family celebrates Southern traditions and Black cultural heritage, attending church gatherings, Juneteenth
    events, and local festivals that showcase soul food, gospel music, and contemporary R&B. She draws inspiration from Black artists like Jean‑Michel Basquiat and Kara Walker, and she is attuned to the
    social justice issues affecting her community, which inform both her creative work and her ambition to give back through design that amplifies under‑represented voices.
