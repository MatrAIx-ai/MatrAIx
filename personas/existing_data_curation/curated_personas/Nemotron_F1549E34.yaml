  career_goals: Karina aspires to attend a university that offers a strong visual arts or communication design program, ultimately aiming to become a creative director or UX/UI designer. She wants to build
    a portfolio that blends her love for abstract art with user‑centered design, winning industry competitions and scholarships along the way. In the long term, she envisions launching her own design studio
    that serves both commercial clients and community initiatives, using her disciplined approach to keep high standards while fostering inclusive, culturally resonant work.
