  career_goals: Although retired from formal employment, Yiu Ye aims to stay intellectually active by mentoring graduate students, volunteering as a STEM tutor for local high schoolers, and contributing
    occasional articles to professional journals. He aspires to document his experiences in a memoir that blends engineering lessons with reflections on cultural values. Additionally, he wishes to promote
    intergenerational cultural exchange by teaching Chinese calligraphy workshops and supporting community initiatives that enhance senior wellbeing in Ann Arbor.
