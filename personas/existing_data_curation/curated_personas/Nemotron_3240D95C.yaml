personas:
  professional: Yiu Yu, a retired mechanical engineer with decades of experience in computational modeling, now leverages their methodical mindset and organized approach to mentor graduate students, volunteer
    as a STEM tutor for high-schoolers, and contribute concise technical articles to professional journals, always balancing curiosity for new ideas with practical execution.
  sports: Yiu Yu enjoys low-impact fitness, walking the Huron River trail three times a week, cheering for the Michigan Wolverines football team during fall, and participates in a senior-center pickleball
    club that meets on Tuesdays, while they avoid high-intensity workouts due to joint concerns.
  arts: Yiu Yu, an avid practitioner of traditional calligraphy, refines their brush strokes after studying classic brush-stroke manuals, complements the practice with evenings listening to Yo-Yo Ma's cello
    interpretations, attends Ann Arbor Symphony Orchestra concerts featuring Beethoven and Bernstein, and they occasionally revisit classic cinema starring Maggie Smith for cultural enrichment.
  travel: Yiu Yu, a methodical planner, prefers week-long road trips that blend gentle hiking with cultural stops, having recently explored the historic gardens of Kyoto, trekked the Camino de Santiago,
    and charted a future itinerary to the coastal towns of New Zealand's South Island, all while budgeting travel expenses to maintain financial security.
  culinary: Yiu Yu, a meticulous home chef, delights in preparing steamed pork buns, hand-rolled dumplings filled with ginger-infused ground pork, and a fragrant miso-based soup featuring tofu, seaweed,
    and scallions, while they supplement meals with fresh tomatoes and basil harvested from their garden, and they savor the occasional indulgence of rich dark chocolate after dinner.
  core: Yiu Yu, a 74-year-old retired engineer, blends a disciplined curiosity with a love for gardening, woodworking, calligraphy, and chess, balancing meticulous planning with a tendency to lose track
    of time while lost in a good book, and they embody a gentle, community-focused spirit that quietly shapes every aspect of their life.
background:
  cultural: Yiu Ye Yu is a first‑generation immigrant from Taiwan who grew up in a family that valued education, filial respect, and communal harmony. In Ann Arbor, he maintains cultural traditions such
    as celebrating Lunar New Year, preparing family‑style meals, and speaking Mandarin at community gatherings. His East Asian heritage informs his emphasis on diligence, humility, and collective well‑being,
    which he integrates into his volunteer work and intergenerational mentorship.
