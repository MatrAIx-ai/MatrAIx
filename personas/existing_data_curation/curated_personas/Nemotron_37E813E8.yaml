personas:
  professional: Shanara George, a 26‑year‑old registered nurse with an education degree, leverages meticulous assessment skills, curriculum development expertise, and a curiosity for art‑based therapies
    to design patient education workshops while maintaining a methodical, organized approach that sometimes borders on skepticism about institutional policies.
  sports: Shanara George stays fit through early‑morning walks along Rehoboth Bay, joins the Rehoboth Bay Kayak Club for weekend paddles, attends the local adult swim league at the Dover Community Center,
    and roots for the Philadelphia Eagles and Phillies while preferring solitary exercise over crowded gyms.
  arts: Shanara George channels her love for visual arts by painting watercolor seascapes inspired by the works of Georgia O'Keeffe and Kehinde Wiley, regularly visiting the Georgetown Museum, and unwinding
    to the jazz of Nina Simone and contemporary folk of Phoebe Bridgers, which together inform her calm bedside demeanor.
  travel: Shanara George prefers meticulously planned weekend getaways to coastal towns like Cape May and historic cities such as Savannah, balancing a modest travel budget with a desire for quiet reflection,
    and dreams of a solo art‑focused retreat in the Amalfi Coast after saving enough for the trip.
  culinary: Shanara George enjoys cooking light Mediterranean meals, expertly preparing grilled salmon with lemon‑dill sauce, quinoa tabbouleh with fresh mint, and a simple avocado toast topped with heirloom
    tomatoes, while occasionally treating herself to a slice of matcha green tea cheesecake from a local boutique bakery.
  core: Shanara George is a detail‑oriented nurse‑educator who mixes artistic curiosity with a habit of over‑analyzing every decision, often staying up late sketching while worrying about tomorrow’s shift,
    and can’t resist buying a new set of watercolors whenever a sale pops up.
background:
  cultural: Shanara was raised in a close‑knit African‑American family that emphasized education, community service, and cultural expression. Her parents, both first‑generation college graduates, instilled
    the belief that knowledge is a pathway to empowerment. Growing up in the Mid‑Atlantic, she was exposed to Delaware's rich Black heritage, including the legacy of the Underground Railroad and vibrant
    local jazz, gospel, and storytelling traditions. Her cultural identity is reinforced through active participation in the local Black church, where she volunteers in health‑screening outreach programs
    and celebrates family reunions centered around soulful music. This background informs her commitment to reducing health disparities, integrating culturally resonant art into patient care, and fostering
    educational opportunities for other Black youths.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''Wound care'', ''Electronic medical record (EMR) management'', ''Health education program development'', ''Curriculum design for nursing
    education'', ''Adult learning facilitation'', ''Critical thinking and clinical decision-making'', ''Time management and case prioritization'', ''Art-based therapeutic techniques'', ''Stress management
    counseling'', ''Community health outreach'']'
  hobbies: '[''Watercolor painting'', ''Sketching coastal landscapes'', ''Visiting art galleries and museums'', ''Reading nonfiction on psychology, education, and healthcare'', ''Morning walks along Rehoboth
    Bay'', ''Bird-watching'', ''Kayaking'', ''Participating in a small book club'', ''Mentoring high-school students in science fairs'', ''Attending community wellness and stress-reduction workshops'']'
  career_goals: Shanara aims to transition from bedside nursing to a leadership role in nursing education and health equity advocacy. Over the next three years she plans to earn a Master of Science in Nursing
    with a concentration in Nursing Education, followed by certification as a Certified Nurse Educator. Her long‑term ambition is to become a faculty member at a regional nursing program where she can design
    curricula that merge evidence‑based practice with creative therapeutic interventions for underserved Black communities. She also aspires to serve as a clinical preceptor and eventually a nurse manager,
    shaping staffing models that prioritize staff well‑being and reduce burnout. Ultimately, she hopes to launch a community health workshop series that uses art‑based activities to improve mental‑health
    literacy and resilience.
