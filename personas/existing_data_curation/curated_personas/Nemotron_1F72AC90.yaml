personas:
  professional: Grace Tillis, an 80‑year‑old retired senior‑center volunteer and budding community‑garden coordinator, blends her practical horticultural expertise, meticulous budgeting, and gentle mentorship
    with a relaxed, flexible approach that lets her experiment with planting methods while nurturing intergenerational connections.
  sports: Grace Tillis enjoys low‑impact fitness through daily walks along the Arkansas River, participates in the local senior bowling league, and cheerfully roots for the Arkansas Razorbacks football
    team and the nearby Bauxite High School basketball squad, valuing social camaraderie over competitive intensity.
  arts: Grace Tillis finds artistic fulfillment in singing gospel classics by Mahalia Jackson with her church choir, listening to folk legends like Woody Guthrie on her vintage radio, reading historical
    novels by Philippa Gregory, and crafting intricate quilts inspired by the patterns of Southern folk art, while occasionally attending Little Rock Symphony concerts featuring violinist Hilary Hahn.
  travel: Grace Tillis favors relaxed, low‑cost road trips to nearby gems such as Hot Springs National Park and Memphis for blues music, while dreaming of a leisurely cruise to New Orleans to sample Creole
    cuisine, always planning trips around family visits and her modest budget.
  culinary: Grace Tillis, a seasoned Southern cook, delights in whipping up collard greens seasoned with garden‑grown rosemary and smoked turkey, frying catfish with a cornmeal crust, baking sweet‑potato
    pie with a dash of cinnamon, and preserving heirloom tomatoes, all while swapping recipes at community potlucks.
  core: Grace Tillis embodies a gentle, curiosity‑driven spirit that balances thrift, horticultural experimentation, and a penchant for occasionally misplacing knitting needles, all while nurturing community
    bonds through song, garden, and quilt.
background:
  cultural: Grace’s cultural background is rooted in the rural Southern traditions of Arkansas. Growing up in Bauxite, a small town shaped by the bauxite mining industry, she absorbed the values of modesty,
    hospitality, and community cooperation typical of white Southern families. Church life—particularly Baptist worship—has been central, fostering a spirit of generosity and fellowship. Her upbringing
    emphasized Southern cuisine, gospel music, family potlucks, and informal storytelling, all of which continue to influence her daily life and relationships.
