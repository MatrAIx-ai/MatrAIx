  hobbies: '[''Pickup basketball'', ''Fishing on local lakes'', ''Gospel choir singing'', ''Southern barbecue cooking'', ''Gardening (heirloom tomatoes, native herbs)'', ''Building model wooden boats'',
    ''Volunteering with Habitat for Humanity'', ''Attending blues festivals'', ''Reading about American craftsmanship'', ''Birdwatching in local wetlands'']'
  career_goals: Dedrick aims to grow his independent carpentry business into a recognized boutique provider of historic‑preservation projects throughout southwest Georgia. He plans to obtain an official
    contractor’s license and advanced OSHA certification within the next two years, allowing him to bid on larger public contracts. A parallel ambition is to establish a community makerspace where he can
    teach woodworking to local youth and apprentices, preserving craftsmanship traditions while providing a constructive outlet. He also hopes to secure a stable retirement fund that will support his family
    and enable occasional travel to visit relatives in the Caribbean diaspora.
