personas:
  professional: Dedrick Ward, a seasoned carpenter with over three decades of hands‑on experience, blends masterful framing, custom cabinet making, and historic home restoration with a curiosity for new
    tools and a pragmatic approach to project management, leading small crews while mentoring apprentices and envisioning a boutique preservation business.
  sports: Dedrick Ward consistently joins pick‑up basketball games at the local recreation center, supports the Atlanta Hawks and Atlanta Braves, spends weekends fishing on Lake Worth, and remains a member
    of the adult basketball league, using these activities to stay fit and socially engaged.
  arts: Dedrick Ward channels his passion for gospel music through his church choir, attends regional blues festivals featuring legends like B.B. King and modern virtuosos such as Gary Clark Jr., and collects
    vinyl records of soul‑food era artists, letting these sounds shape his evenings after a day of woodworking.
  travel: Dedrick Ward prefers a mix of purposeful trips and relaxed getaways, planning detailed itineraries for historic preservation tours in Savannah and Charleston while also daydreaming of visiting
    family in Jamaica and the Bahamas, balancing travel costs with his retirement savings and a flexible work schedule that permits occasional weekend road trips.
  culinary: Dedrick Ward specializes in Southern barbecue, perfecting slow‑smoked pork ribs with a honey‑chipotle glaze, while also crafting soul‑food staples like collard greens, cornbread, and shrimp
    and grits, often experimenting with heirloom tomatoes from his garden and using locally sourced hickory wood to enhance flavor.
  core: Dedrick Ward is a seasoned carpenter turned community builder who balances a pragmatic work ethic with a love for gospel, blues, backyard fishing, and smoky barbecue, all while juggling a disciplined
    retirement plan and a stubborn habit of over‑seasoning every dish.
background:
  cultural: Dedrick grew up in a close‑knit African‑American family in rural Georgia, where church, family gatherings, and community solidarity were daily pillars. His surname, Kouame, reflects West African
    (and possibly Haitian) ancestry, giving him a deep appreciation for his broader African diaspora roots. He was raised on stories of the civil rights movement and the rich musical heritage of gospel,
    blues, and Southern soul, which shape his social interactions and love for live music. The Southern culinary traditions and a strong work ethic passed down from his grandparents influence his cooking
    and his dedication to craftsmanship. He remains actively involved in his local church, neighborhood association, and regional cultural festivals, blending his heritage with the contemporary Southern
    way of life.
attributes:
  skills: '[''Framing and structural carpentry'', ''Custom cabinetry'', ''Historic home restoration'', ''Blueprint interpretation'', ''Cost estimation and budgeting'', ''Project scheduling'', ''Tool repair
