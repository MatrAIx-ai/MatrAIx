  career_goals: Nury aims to become a software engineer specializing in game development, creating interactive educational games that incorporate bilingual elements and celebrate Salvadoran culture. She
    plans to build a solid foundation in computer science while continuing her artistic practice, and hopes to compete in regional coding hackathons and eventually mentor other young coders from her community.
