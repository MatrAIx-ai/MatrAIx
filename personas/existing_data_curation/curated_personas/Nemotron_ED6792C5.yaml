personas:
  professional: Nury Mohammed is a budding digital creator who blends graphic novel storytelling with Scratch coding, crafting simple interactive games that showcase a strategic mind and a love for structured
    yet playful projects.
  sports: Nury Mohammed rides a mountain bike with the local youth cycling club, cheers for the regional soccer team City FC, and follows the national women's volleyball squad, blending a love for solo
    cycling with occasional pick‑up basketball games at school.
  arts: Nury Mohammed immerses themselves in graphic novels like "Ms. Marvel" and "Runaways", sketches manga‑inspired characters, creates pixel art on a tablet, and tunes into Salvadoran singer Álvaro Torres
    and the cumbia group Los Hermanos Flores for creative inspiration.
  travel: Nury Mohammed prefers spontaneous day trips, often biking to the nearby river park or a weekend visit to the state museum, yet dreams of a future adventure to Tokyo’s Akihabara district to explore
    anime culture and technology exhibits.
  culinary: Nury Mohammed loves helping with family pupusas—especially cheese and loroco fillings—while also mastering a simple cheese quesadilla and occasionally swapping their snack for mango slices with
    chili powder.
  core: Nury Mohammed is a competitively sharp yet disorganized 12‑year‑old who thrives on solitary creative projects, impulsive spending, and a steady calm that masks a skeptical streak.
background:
  cultural: Nury comes from a Salvadoran family that maintains strong ties to its heritage while living in Las Vegas. She speaks Spanish at home and English at school, celebrates cultural traditions such
    as Día de los Muertos and Semana Santa, and enjoys classic Salvadoran foods like pupusas and tamales. Her upbringing blends Salvadoran customs with the diverse, vibrant environment of Las Vegas, giving
    her a unique perspective that influences her interests, language skills, and future aspirations.
