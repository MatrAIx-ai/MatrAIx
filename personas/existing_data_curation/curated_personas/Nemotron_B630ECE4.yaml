personas:
  professional: Thu Yoon, a ten‑year‑old aspiring digital illustrator and budding Scratch game developer, merges meticulous planning with vivid imagination to craft detailed fantasy characters on a tablet
    while writing simple game scripts, and they showcase an organized yet solitary work style.
  sports: Thu Yoon, a fan of the New Jersey Devils and participant in after‑school soccer practice, favors structured weekend bike rides and disciplined yoga sessions over large team gatherings, reflecting
    a blend of team loyalty and personal fitness routine, and they balance team spirit with solitary exercise.
  arts: Thu Yoon, whose artistic influences include Studio Ghibli's Hayao Miyazaki and the vibrant illustrations of Rebecca Sugar, spends hours sketching fantastical creatures, watercolor‑painting whimsical
    landscapes, and creating digital art that mixes pop‑culture motifs with original mythology, and they express their imagination through both traditional and digital media.
  travel: Thu Yoon, who delights in meticulously planned family road trips to historic Boston, the bustling New York City waterfront, and the volcanic scenery of Jeju Island, balances a love for adventure
    with a need for structured itineraries while dreaming of spontaneous beach days, and they appreciate both the comfort of familiar places and the excitement of new horizons.
  culinary: Thu Yoon, skilled enough to roll sushi, stir‑fry bibimbap with gochujang, and mix kimchi with fresh napa cabbage, loves experimenting with bold flavors during family celebrations and also enjoys
    classic American apple pie as a favorite treat, and they take pride in mastering family recipes while exploring new cuisines.
  core: Thu Yoon, an imaginative ten‑year‑old who blends careful planning with boundless creativity across art, code, and puzzles, navigates life with quiet confidence, occasional bedtime procrastination,
    and a love for both solitary sketching and cherished family traditions, and they consistently seek new ways to merge curiosity with discipline.
background:
  cultural: Thu Lin Yoon comes from a Korean‑American family that maintains strong ties to South Korean heritage while embracing the multicultural environment of Glen Rock, New Jersey. At home, Korean is
    spoken alongside English, and the family celebrates holidays such as Lunar New Year and Chuseok, participates in cultural events at the local Korean community center, and enjoys traditional foods like
    kimchi and bibimbap. Growing up in Bergen County, she also experiences a diverse community that fosters an appreciation for different cultures and perspectives.
