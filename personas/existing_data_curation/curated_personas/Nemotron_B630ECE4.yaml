  career_goals: She aspires to become a multimedia artist, combining illustration, animation, and interactive storytelling. Thu dreams of attending a specialized high‑school program in visual arts and technology,
    eventually studying graphic design or game development at college, where she can create immersive worlds that blend artistic imagination with scientific concepts.
