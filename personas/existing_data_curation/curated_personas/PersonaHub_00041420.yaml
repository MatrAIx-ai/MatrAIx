persona_description: A Malaysian herpetologist who specializes in the study of frogs and lizards, particularly those from Peninsular Malaysia. Her expertise includes genetic analysis and the identification
  of new species. She is a native of Malaysia and has a passion for interacting with jungle plants and animals, keeping snakes and lizards as pets, and has published seven species of frogs and three species
  of lizards, all from Peninsular Malaysia, that are new to science. She is known for her fieldwork, which involves collecting specimens in the wild and conducting extensive genetic analysis in the lab.
