personas:
  professional: A budding LEGO engineer and young coder named Didier Peart applies methodical planning and a practical mindset to design intricate motorized LEGO builds and Scratch games, preferring solo
    projects or small collaborations with his dad, while channeling their competitive spirit into chess strategies.
  sports: A spirited youth athlete named Didier Peart plays on the local Clermont Cubs soccer team, roots for the Orlando City SC in MLS and the Orlando Magic in the NBA, and they spend weekends at Lake
    Louisa State Park hiking and doing light jogging, using the activity as a break from their competitive chess and LEGO building.
  arts: An emerging creative mind named Didier Peart immerses themselves in the rhythmic beats of Kendrick Lamar and the smooth improvisations of Miles Davis, practices drumming on a practice pad after
    school, sketches wildlife from Lake Louisa in detailed pencil drawings, and they channel the inspiration from science‑fiction novels like 'Ender's Game' and 'The Hitchhiker's Guide to the Galaxy' into
    imaginative Scratch animations.
  travel: An adventurous explorer named Didier Peart has toured Orlando’s Walt Disney World and the Kennedy Space Center, relishes weekend camping trips to Lake Louisa State Park where they sketch local
    wildlife, and they dream of future travel to Austin, Texas for the annual LEGO fan convention and to Tokyo, Japan to experience the vibrant anime culture that fuels their sci‑fi imagination.
  culinary: A budding foodie named Didier Peart favors classic kid‑friendly meals such as pepperoni pizza, chicken nuggets with ketchup, and spaghetti with marinara sauce, enjoys crafting peanut‑butter‑jelly
    sandwiches during LEGO build marathons, and they snack on apple slices and carrot sticks for a quick burst of energy.
  core: Didier Peart is a meticulous, competition‑driven ten‑year‑old who channels their curiosity into motorized LEGO creations, strategic Scratch coding, and chess battles, and they wrestle with frequent
    worry while preferring solitary, well‑planned pursuits.
background:
  cultural: Didier is an African‑American boy raised in Winter Garden, a suburban community in Central Florida. His family places a strong emphasis on education, church involvement, and preserving cultural
    heritage through annual celebrations such as Juneteenth and family reunions that feature soul‑food cooking and storytelling about ancestors. He grew up hearing a blend of standard American English and
    African‑American Vernacular English, and he frequently attends community events at the local African‑American cultural center, where he participates in youth mentorship programs. The diverse population
    of Lake County and the influence of Southern Floridian culture shape his worldview, instilling a sense of resilience, pride in his roots, and a desire to be a role model for other Black children in
    his neighborhood.
attributes:
  skills: '["basic Scratch programming", "LEGO robotics construction", "strategic board games (chess, checkers)", "project planning and time management", "critical reading (science fiction, nonfiction)",
