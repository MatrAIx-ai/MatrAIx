  hobbies: '["LEGO building (motorized sets)", "Scratch programming", "Reading science‑fiction and science non‑fiction", "Chess and strategy board games", "Exploring nature at local parks", "Sketching wildlife",
    "Listening to hip‑hop and jazz music", "Drumming practice"]'
  career_goals: Looking ahead, Didier aspires to become a robotics engineer or software developer, dreaming of designing autonomous machines that could assist in everyday tasks. He hopes to attend a specialized
    STEM magnet program in high school, earn scholarships, and eventually work for a technology firm or a space agency such as NASA. He is motivated by the desire to prove his capabilities, gain recognition
    among peers, and use his technical skills to contribute positively to his community. Overcoming his worries about performance, he aims to turn his meticulous nature into a competitive advantage in future
    academic and professional challenges.
