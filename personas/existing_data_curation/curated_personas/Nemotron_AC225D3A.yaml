  career_goals: Cassandra aims to advance to a regional manager role within the next three years, overseeing multiple stores and implementing a chain‑wide mentorship program for emerging retail leaders.
    She also envisions launching a boutique pop‑up space that showcases local artists’ work, merging her passion for art with her retail expertise. Long‑term, she hopes to serve as a consultant helping
    retailers adopt resilient, data‑centric strategies while fostering inclusive, high‑performing teams.
