persona_description: A conservationist and wildlife advocate who is passionate about the fight against illegal ivory trade and poaching. They are well-versed in the CITES guidelines and have worked with
  international organizations to raise awareness about the issue. They have experience in policy-making and have successfully lobbied for the destruction of ivory stockpiles in other countries. They are
  also well-versed in the legal and regulatory frameworks related to the ivory trade and have a deep understanding of the cultural and social implications of the issue. They are dedicated to using their
  knowledge and expertise to protect elephants and their habitat.
