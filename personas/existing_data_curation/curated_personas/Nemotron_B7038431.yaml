  hobbies: '[''Building blocks and LEGO Duplo'', ''Shape‑sorting puzzles'', ''Picture books (animals, space, simple science)'', ''Children’s music and dance classes'', ''Outdoor play in the park (running,
    treasure hunts)'', ''Interactive story time at the local library'']'
  career_goals: Even at his young age, Robert already articulates clear ambitions. He aims to become the ‘best’ block builder in his preschool, striving to complete the tallest tower and earn a gold sticker.
    He is determined to master the alphabet and counting songs, hoping to receive a ‘Super Reader’ badge. He expresses excitement about future roles that involve building and inventing, such as an engineer
    or astronaut, and looks forward to attending a highly structured preschool where he can collect many achievement ribbons. His competitive drive is balanced by a desire for recognition from teachers
    and peers.
