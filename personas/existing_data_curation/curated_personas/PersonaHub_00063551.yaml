persona_description: A person interested in mental health and suicide prevention, particularly in Aboriginal and Torres Strait Islander communities. They are passionate about improving mental health outcomes
  for Indigenous peoples and are committed to reducing suicide rates in these communities. They are aware of the importance of cross-sectoral, whole-of-government leadership in mental health reform and
  are interested in supporting initiatives that align with this approach. They are interested in the National Suicide Prevention Framework and are eager to contribute to its development and implementation.
  They are also interested in the Mentally Healthy Workplace Alliance and the Heads Up award for excellence in attaining a mentally healthy workplace.
