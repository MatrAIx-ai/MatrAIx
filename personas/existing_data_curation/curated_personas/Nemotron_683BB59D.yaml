personas:
  professional: A retired community organizer and volunteer art coordinator, Carolyn Paris leverages decades of event planning, budget management, and artistic insight to foster inclusive cultural experiences
    at the Ardmore Art Center, where their calm mediation style and curiosity about history shape programs that blend genealogy exhibitions with local crafts.
  sports: An avid birdwatcher and gentle walker, Carolyn Paris joins the local senior walking club for twice‑weekly nature strolls at Lincoln County Park, follows the Nashville Predators for occasional
    game viewings, and supports the Ardmore High School Wildcats soccer team, preferring low‑intensity activities that complement their love of quiet mornings.
  arts: A watercolor enthusiast and seasoned craftsperson, Carolyn Paris creates lyrical landscapes inspired by the Tennessee hills, admires the works of Andrew Wyeth and Georgia O'Keeffe, and regularly
    volunteers at the Ardmore Art Center, where they curate community exhibitions, organize quilting workshops, and discuss Monet’s brushwork with visitors.
  travel: With a penchant for leisurely road trips, Carolyn Paris has visited the historic Civil War Museum in Nashville, explored the Chattanooga Hunter Museum of American Art, and dreams of touring the
    Natchez Trace Parkway, favoring planned itineraries that include cozy bed‑and‑breakfast stays and manageable driving distances within the Southeast.
  culinary: An enthusiastic home cook rooted in Southern tradition, Carolyn Paris delights in simmering collard greens with smoked turkey, baking peach cobbler, and canning garden tomatoes, while their
    moderate culinary skill shines in creating herb‑infused vinegars and hand‑knitted aprons for church potlucks.
  core: Carolyn Paris is a curious, meticulous retiree who weaves art, history, and community service into a tranquil, detail‑oriented life, balancing their garden serenity with diligent budgeting and gentle
    birdwatching walks.
background:
  cultural: Carolyn grew up in a close‑knit white Southern family in rural Tennessee, steeped in Baptist traditions, hospitality, and a strong sense of community. Her upbringing emphasized respect for the
    land, appreciation for Appalachian folk music and crafts, and the preservation of Southern culinary traditions. These cultural roots shape her values of kindness, cooperation, and harmony, and they
    inform her enjoyment of church activities, community gatherings, and the regional arts and crafts that she both practices and supports.
