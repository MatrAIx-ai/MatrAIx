personas:
  professional: Edna Kurtz, a budding coder who designs simple games on Scratch, blends their curiosity and methodical planning to prototype logical puzzles, while their competitive streak drives them to
    optimize gameplay mechanics.
  sports: Edna Kurtz plays on the local youth soccer team, practices drills twice a week, and follows the Los Angeles Dodgers for inspiration, while they also enjoy weekend hikes in the nearby woods to
    observe wildlife, combining competitive spirit with a love for outdoor activity.
  arts: Edna Kurtz sketches detailed wildlife scenes inspired by Audubon and watches Studio Ghibli films, frequently doodles characters while listening to the music of Yoko Kanno, and their reflective journal
    doubles as a sketchbook, showing how their curiosity and organized nature fuel their artistic growth.
  travel: Edna Kurtz loves weekend explorations in the state forest, has visited the Smithsonian National Museum of Natural History, dreams of trekking the Galápagos Islands, and plans trips meticulously
    using checklists, balancing adventure with the comfort of familiar routines.
  culinary: Edna Kurtz prefers vibrant dishes like mango‑lime salad, homemade vegetable stir‑fry with quinoa, and often experiments with foraged herbs such as mint and sage, but their worry about spilling
    food sometimes leads them to over‑cook pasta to avoid under‑done meals.
  core: Edna Kurtz is an inquisitive 11‑year‑old who channels competitive energy into chess and coding, yet battles persistent anxiety through journaling and meticulous planning.
background:
  cultural: Edna is a White American from Louisburg, a small town in Franklin County, North Carolina. Her family is part of a close‑knit Southern community that values modest living, regular church attendance,
    and local traditions such as harvest festivals and historic town tours. The rural setting and emphasis on nature, community involvement, and educational achievement shape her worldview and interests.
