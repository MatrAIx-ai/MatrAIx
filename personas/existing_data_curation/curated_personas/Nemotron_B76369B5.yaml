  hobbies: '[''Hosting Potluck Gatherings'', ''Facilitating Senior Center Storytelling Sessions'', ''Historical Society Walking Tours'', ''Raised‑Bed Vegetable Gardening'', ''Genealogy Research'', ''Yoga
    and Mindfulness Meditation'', ''Day Hiking on the Appalachian Trail'', ''Fall Foliage Photography'', ''Attending Regional Craft Fairs'', ''Pottery Making'']'
  career_goals: Looking ahead, Jessica plans to transition from day‑to‑day HR administration to a mentorship and strategic consulting role that benefits both her organization and the wider community. She
    aims to create a small‑business employee‑wellness program that integrates mental‑health resources, flexible scheduling, and regular team‑building events. In partnership with the Carbon County Workforce
    Development Board and nearby community colleges, she hopes to design apprenticeship pathways that give local youth hands‑on experience in modern HR practices. Over the next five years she intends to
    scale back routine paperwork, focusing instead on guiding emerging HR professionals, advising senior leaders on inclusive culture strategies, and championing employee‑centred policies that balance practicality
    with innovative ideas.
