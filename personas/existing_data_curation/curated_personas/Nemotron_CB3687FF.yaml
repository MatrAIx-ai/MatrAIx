  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Community theater'', ''Reading (historical fiction, educational psychology, business)'', ''Book club'', ''Cooking experimental recipes'',
    ''Gardening'', ''Hiking in state parks'', ''Volunteering at library reading programs'', ''Pilates'']'
  career_goals: Sarah aims to transition into a district-level curriculum coordinator role where she can expand her interdisciplinary art-and-business programs across schools. She plans to pursue a master's
    degree in educational leadership and eventually step into school administration, such as assistant principal, to influence school culture and community partnerships. In the shorter term, she wants to
    lead a school-wide STEAM initiative, secure grant funding for after-school arts workshops, and mentor new teachers.
