personas:
  professional: Sarah Rottgers, a veteran high school business teacher and curriculum innovator, leverages fifteen years of classroom expertise and graduate business training to weave interdisciplinary
    art projects into STEAM initiatives while championing data‑driven instruction and grant‑funded professional development for peers.
  sports: Sarah Rottgers supports the Dallas Mavericks (NBA) and the Dallas Stars (NHL), participates in the local Trailblazers Hiking Club for weekend treks in nearby state parks, and attends community
    Pilates workshops that supplement their active lifestyle.
  arts: Sarah Rottgers, an avid watercolorist, draws inspiration from Claude Monet and Georgia O’Keeffe, frequents the River City Art Museum’s rotating exhibits, and regularly volunteers backstage for community
    theater productions directed by Samantha Lee, while also curating a monthly book‑club discussion that blends historical fiction with contemporary business insights.
  travel: Sarah Rottgers prefers mixed‑mode travel, meticulously planning weekend road trips to national parks like Great Smoky Mountains and Yosemite while savoring local cuisine, and dreams of a month‑long
    cultural immersion in Tuscany, Italy, to explore Renaissance art and farm‑to‑table cooking.
  culinary: Sarah Rottgers enjoys experimenting with seasonal dishes, often preparing rosemary‑infused roasted chicken, beet and goat‑cheese salad, and saffron risotto, using fresh herbs from their backyard
    garden and sourcing ingredients at the farmer’s market, though they tend to over‑salt dishes when trying new recipes.
  core: Sarah Rottgers blends a disciplined educator’s mindset with a vibrant artistic soul, navigating life with organized curiosity, occasional impulsive splurges, and a steadfast commitment to community‑driven
    learning.
background:
  cultural: Sarah grew up in a middle-class, suburban community in northern New Jersey, shaped by a blend of traditional American holidays, proximity to the cultural vibrancy of New York City, and the region's
    emphasis on education and community involvement. Her family's heritage traces back to Anglo-American roots, with an emphasis on hard work, civic engagement, and seasonal celebrations such as Thanksgiving,
    Fourth of July fireworks, and local farmers-market gatherings. This background informs her appreciation for diverse perspectives while maintaining strong connections to local community traditions.
attributes:
