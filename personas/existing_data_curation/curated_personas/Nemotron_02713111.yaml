  career_goals: Dimitri aspires to turn his love of interacting with people and his practical problem-solving skills into a career that supports his community. In the short term he aims to take on more
    leadership roles in student government and local volunteer groups, while strengthening his academic foundation for high school. Long-term, he envisions becoming a high-school teacher, youth program
    coordinator, or community outreach specialist who can inspire peers, guide younger students, and help them navigate both academic and personal challenges.
