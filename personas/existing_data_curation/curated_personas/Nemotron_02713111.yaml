personas:
  professional: Dimitri Logue is a teenage student-athlete and budding performer; they leverage their curiosity-driven DIY tinkering, natural talkativeness, and cooperative spirit to lead basketball drills,
    direct drama scenes, and mediate debate club discussions.
  sports: Dimitri Logue is a point-guard on the Bowling Green Community Center's youth basketball league, a fervent fan of the Western Kentucky Hilltoppers and Louisville Cardinals, and a weekend member
    of the local bike-repair club that rides the Red River Gorge trails, where they often lead group rides with friends.
  arts: Dimitri Logue merges their love for acoustic guitar - covering The Avett Brothers and Billie Eilish at school talent shows - with an active role in the drama club, often emulating actors like Timothee
    Chalamet in Shakespeare monologues, while preserving a fondness for Appalachian folk tunes played at local festivals.
  travel: Dimitri Logue prefers low-cost family road trips that blend nature and culture, having explored the Kentucky State Fair, hiked the Red River Gorge, and taken a weekend visit to Nashville's music
    scene, while they dream of a future backpacking adventure through the Blue Ridge Parkway.
  culinary: Dimitri Logue enjoys the smoky comfort of barbecue - especially pulled pork sandwiches with coleslaw - loves whipping up banana bread using overripe bananas and walnuts, and they frequently
    help their mom perfect a side of cornbread seasoned with honey and jalapeno, though they occasionally burn the edges of their grilled cheese in a rush.
  core: Dimitri Logue is a hyper-social teen who balances a relentless curiosity for DIY projects with a nervous streak that fuels both meticulous planning and occasional over-worry, all while they never
    miss a chance to be the center of a basketball game or school stage.
background:
  cultural: Dimitri grew up in a middle-class, white family in Bowling Green, Kentucky, a community known for its Southern hospitality, strong church ties, and a love of high-school sports. His upbringing
    includes weekly attendance at a local Baptist church, family barbecues, and participation in community events such as the Kentucky State Fair and local music festivals. The values of friendliness, cooperation,
    and respect for tradition are reinforced at home and school, while also exposing him to the Appalachian folk music and the region’s emphasis on self-reliance and practical skills.
