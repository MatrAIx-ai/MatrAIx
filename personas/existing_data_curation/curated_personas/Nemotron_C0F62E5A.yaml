personas:
  professional: Andrew Carter, a five‑year‑old aspiring junior architect, spends weekends meticulously assembling LEGO City sets, drafting floor plans on graph paper, and confidently presenting his creations
    to friends, balancing curiosity for new designs with a practical, methodical approach.
  sports: Andrew Carter plays for the Little Lions Soccer Club, eagerly practicing drills that emphasize teamwork and precise positioning, while cheering for the Manchester United junior fan club, and enjoys
    swimming at the community pool where his methodical approach helps him master new strokes.
  arts: Andrew Carter delights in drawing characters from Dr. Seuss and Pixar, spending quiet afternoons with crayons and a sketchpad, and sings along to the lively tunes of Disney’s 'Frozen' soundtrack,
    where his balanced mix of imagination and structure fuels his creative expression.
  travel: Andrew Carter loves family road trips to the Grand Canyon, where he maps out stop‑over snack breaks in a handheld travel journal, and dreams of visiting Tokyo’s themed amusement parks, preferring
    organized itineraries that let him explore at his own pace while still sharing moments with his siblings.
  culinary: Andrew Carter favors cheesy macaroni, chicken nuggets shaped like dinosaurs, and fresh apple slices, often helping his mom whisk pancake batter, but he stubbornly refuses broccoli, insisting
    on a ‘no‑green‑on‑plate’ rule that he enforces with polite yet firm persistence.
  core: Andrew Carter is a methodical, curious five‑year‑old who blends organized planning with playful imagination, turning everyday routines into adventures while navigating small‑scale finances, health,
    sports, arts, travel, and food with a charming mix of assertiveness and compassion.
background:
  cultural: Andrew grows up in a close‑knit, rural Southern community in Grant Parish, Louisiana. His family attends a local Baptist church, participates in community picnics and seasonal festivals that
    celebrate Southern traditions, and values family, modesty, and respect for nature. He is regularly exposed to regional foods, country music, and stories about the area's history, which shape his worldview
    and sense of belonging.
