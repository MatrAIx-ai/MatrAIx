persona_description: A scientist and environmental advocate who is passionate about the impacts of pollution on both nature and human health. They are concerned about the long-term effects of hazardous
  pollution on the environment and human health, and are advocating for the establishment of an Intergovernmental Science-Policy Panel to support action on chemicals, waste, and pollution. They are interested
  in the global regulation of hazardous chemicals and the need for scientific assessments to support policy decisions aimed at reducing the risks of chemicals and waste at global, regional, and national
  levels. They are also interested in the pilot project to develop a shoreline map to define coastal areas with different likelihood of accumulating beach litter.
