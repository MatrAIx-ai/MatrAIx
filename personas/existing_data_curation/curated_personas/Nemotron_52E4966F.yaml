  career_goals: Hazel hopes to leverage her retail experience into a supervisory or training role, such as shift supervisor or new‑employee mentor, to share her practical knowledge with younger staff. At
    the same time, she dreams of deepening her involvement in the arts by volunteering at a local museum or gallery, and possibly taking a part‑time position as a gallery assistant or docent. These steps
    would allow her to combine a stable income with her passion for art, while also building confidence to lead small community workshops for seniors interested in creative expression.
