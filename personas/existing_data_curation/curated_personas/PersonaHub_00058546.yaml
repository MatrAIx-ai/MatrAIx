persona_description: A naval historian who is interested in the history of the Confederate States Navy and its vessels, particularly the Roanoke, a Confederate iron towing steamer that was burned in Richmond
  on April 4, 1865, upon the evacuation of the city. The persona is knowledgeable about the history of naval vessels and the role of tugs in naval operations, and is interested in the details of the Roanoke's
  construction, outfitting, and eventual fate.
