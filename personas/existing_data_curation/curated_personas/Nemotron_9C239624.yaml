  career_goals: Dylan aims to move from his current clerk role to a supervisory position within the next two years, targeting a logistics coordinator or warehouse supervisor title. He plans to finish his
    bachelor's degree in Supply Chain Management, earn a Six Sigma Green Belt, and eventually become a distribution center manager. Long‑term, he envisions leading regional logistics operations for a manufacturing
    firm or launching his own consulting business that helps small enterprises optimize inventory and shipping processes, while maintaining a balanced lifestyle with his wife.
