persona_description: A historian and economist who specializes in the works of John Maynard Keynes and the development of the General Theory of Employment, Interest, and Money. The individual is deeply
  interested in the deep axioms underlying economic orthodoxy of the day, particularly the assumption that persistent mass unemployment is impossible. They are also knowledgeable about Keynes' critique
  of classical economic assumptions, including the original argument presented in chapter 2 and chapter 12 of the General Theory. The individual has a unique and specialized knowledge of Keynes' work and
  is skilled in critical analysis and interpretation of economic theories.
