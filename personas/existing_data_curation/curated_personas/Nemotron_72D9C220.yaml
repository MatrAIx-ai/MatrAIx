  hobbies: '[''dancing (hip hop, breakdance)'', ''basketball'', ''street photography'', ''trying new recipes'', ''social media scrolling'', ''attending local concerts'', ''volunteering at community centers'',
    ''listening to podcasts on entrepreneurship'', ''skateboarding'', ''fashion styling'']'
  career_goals: Lynnett aims to turn her love for community storytelling into a career as a digital media producer or social media manager for local Bronx businesses and cultural organizations. She wants
    to earn her GED within the next year and later pursue a certificate in media production, balancing her curiosity for new tech with the practical need for stable income. Long‑term, she envisions launching
    a mobile food‑cart venture that blends her cooking experiments with branding skills, while still staying flexible enough to adapt to the fast‑moving urban environment she thrives in.
