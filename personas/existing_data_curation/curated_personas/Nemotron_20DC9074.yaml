    ''Python Programming'', ''Statistical Analysis'', ''Data Visualization'']'
  hobbies: '[''Spin classes'', ''Hiking in North Georgia'', ''Salsa dancing'', ''Jazz and neo-soul concerts'', ''Tennis'', ''Volunteering at a legal aid clinic'', ''Mentoring high school students in STEM
    and law'', ''Cooking Southern soul food'', ''Celebrating community festivals like Juneteenth and Kwanzaa'', ''Reading science-fiction novels'']'
  career_goals: Denisha aims to become a partner within the next five years, spearheading her firm’s emerging‑technology practice and shaping policy on data‑privacy and innovation in Georgia. She is committed
    to expanding pro‑bono services for under‑represented tech entrepreneurs and mentoring the next generation of Black women lawyers. Long‑term, she envisions launching a boutique firm that blends technology
    law with social impact, while also serving on bar association committees that drive diversity, equity, and inclusion initiatives. Ultimately, she hopes to influence state legislation on emerging technologies
    and, if the opportunity arises, pursue a judicial appointment that reflects her dedication to fair and forward‑thinking jurisprudence.
