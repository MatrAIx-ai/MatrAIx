persona_description: A STEM education advocate who is passionate about the importance of science, technology, engineering, and math education and is actively working to support and promote these subjects
  in the classroom. The individual is knowledgeable about the ESSA bill and its provisions, including the establishment of dedicated federal funding for STEM education, the creation of a STEM master-teacher
  corps, and the integration of engineering concepts into state science assessments. The individual is also aware of the potential for alternative certification and differential pay for STEM teachers and
  is interested in the expansion of federal funding for STEM education.
