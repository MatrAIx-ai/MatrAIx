personas:
  professional: Cynthia Rivera is a seasoned casino security specialist who blends meticulous incident documentation, rapid decision‑making, and bilingual communication with a practical curiosity for emerging
    video‑analytics tools, enabling them to balance firm authority on the floor with flexible, tech‑driven problem solving.
  sports: Cynthia Rivera enjoys hiking the Rio Grande Valley trails and kayaking Laguna Madre, plays recreational softball on Tuesdays with the local community league, follows Rio Grande Valley FC Toros
    in the USL Championship, and they belong to the Rio Grande Valley Trailblazers hiking club, balancing seasonal outdoor activity with occasional attendance at Dallas Cowboys games.
  arts: Cynthia Rivera dances at Charro Days festivals to norteño and banda bands like Los Tigres del Norte, playlists Selena and Vicente Fernández while cooking, devotes weekend evenings to reading Agatha
    Christie and Gillian Flynn mysteries, and they attend the local theater’s monthly productions of classic dramas.
  travel: Cynthia Rivera prefers road‑trip adventures across the Texas Hill Country, weekend getaways to the San Antonio River Walk and the Gulf Coast, dreams of attending a tech conference in Kyoto, and
    they have visited Cabo San Lucas for family gatherings, balancing relaxed itineraries with occasional spontaneous spur‑of‑the‑moment trips.
  culinary: Cynthia Rivera relishes crafting authentic tamales and hearty pozole using masa, dried chilies, fresh cilantro, and hominy, experiments with Tex‑Mex chili con carne, and they often host family
    feasts centered around chiles en nogada, while alternating between meticulous recipe adherence and creative improvisation in the kitchen.
  core: Cynthia Rivera blends disciplined casino security expertise, a love for spicy home‑cooked meals, trail‑hiking vigor, and tech tinkering, while juggling a habit of late‑night mystery reading and
    occasional impulse gadget purchases.
background:
  cultural: Cynthia is a first‑generation Mexican‑American raised in a bicultural environment near the US‑Mexico border. Her family maintains strong ties to Mexican heritage, celebrating Día de los Muertos,
    Semana Santa, and traditional holidays while also participating in local Texan community events. Bilingual Spanish‑English upbringing instilled values of familismo, respect for elders, and community
    reciprocity; these influences shape her compassionate yet self‑reliant approach. Her Catholic faith and community involvement have fostered a deep sense of responsibility toward her neighborhood, which
    she carries into her professional life.
attributes:
  skills: '["Video surveillance operation and monitoring", "Threat assessment and risk analysis", "Incident documentation and reporting", "De‑escalation and conflict resolution", "Bilingual communication
