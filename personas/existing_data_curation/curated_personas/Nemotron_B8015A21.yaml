    and leadership basics", "Customer service and patron interaction", "Adaptation to emerging surveillance technologies"]'
  hobbies: '["Cooking traditional Mexican and Tex‑Mex dishes", "Hiking and nature walks in the Rio Grande Valley", "Reading mystery and crime novels", "Practicing yoga and meditation", "Dancing to norteño
    and banda music", "Attending local festivals such as Charro Days", "Volunteering at community centers teaching basic computer skills", "Exploring home security gadgets and DIY tech projects", "Gardening
    with native plants", "Listening to regional radio and podcasts"]'
  career_goals: As a mid‑career professional, Cynthia aims to advance into a supervisory role such as Surveillance Team Lead or Security Director within a regional casino, leveraging her practical experience
    and curiosity for technology to implement advanced video‑analytics solutions. She plans to complete a bachelor’s degree in criminal justice or security management, obtain certifications in advanced
    surveillance systems, and develop a mentorship program for other Latina security officers. Long‑term, she envisions consulting for smaller gaming venues, helping them establish compliant, culturally
    sensitive security protocols while fostering community safety.
