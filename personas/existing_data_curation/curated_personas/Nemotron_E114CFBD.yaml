  career_goals: Yvonne aims to attend a community college after high school and major in communications or marketing, with the long‑term goal of becoming a community outreach coordinator for a local non‑profit
    or small business in Neenah. She dreams of using her event‑planning talent to organize inclusive community festivals and teen‑focused mental‑health workshops. Ultimately, she hopes to blend her creative
    flair with her practical skills to launch a youth‑empowerment platform that offers peer support and resources for stress‑prone teenagers.
