    ''Active listening and peer counseling'', ''Basic computer and internet navigation'', ''Genealogical research'', ''Oral history documentation'']'
  hobbies: '[''Woodworking'', ''Fishing'', ''Birdwatching'', ''Gardening'', ''Reading Appalachian folklore'', ''Playing harmonica'', ''Genealogy research'', ''Community volunteering'']'
  career_goals: Although officially retired, Calvin’s ambition is to remain a pillar of his tight‑knit community. He hopes to mentor younger residents in practical trades, preserve Appalachian stories by
    compiling a memoir and oral‑history collection, and expand the modest community garden he tends with his wife to provide fresh produce for neighbors in need. He also aspires to stay physically and mentally
    healthy enough to continue volunteering at the local senior center and church, offering compassionate support and fostering harmony among the people he cares deeply about.
