    User 1: Yeah, she''s the best dog.

    User 2: So, what do you like to do with your dog?

    User 1: I like to take her for walks, play fetch with her, and cuddle with her.

    User 2: That sounds like a lot of fun.

    User 1: It is! She''s a great dog.

    User 2: So, what do you do for work?

