  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Creative writing (short stories, poetry)'', ''School drama club acting and production'', ''Playing keyboard/piano'', ''Reading fantasy
    and sci‑fi books'', ''Board games and puzzles'', ''Astronomy (star‑gazing)'', ''Volunteer teaching art to younger kids'', ''Organizing community events'']'
  career_goals: Francine dreams of turning her love for art and storytelling into a career that blends creativity with impact. In the near future she aims to build a strong portfolio of illustrated stories,
    contribute to her school newspaper, and attend summer art and tech camps. Long‑term, she envisions becoming a multimedia creator—whether as a graphic novelist, documentary filmmaker, or creative director—who
    uses visual media to highlight diverse voices and inspire other young people. She also hopes to design community‑focused art programs that empower peers and celebrate African‑American culture. Her ambition
    is to lead projects that fuse narrative, design, and technology while staying true to her roots.
