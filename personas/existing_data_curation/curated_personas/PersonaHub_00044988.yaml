persona_description: A technology and energy consultant who specializes in analyzing and predicting the growth and adoption of renewable energy sources in global electricity networks. They are knowledgeable
  about the latest technologies, trends, and challenges in the renewable energy sector, and have a keen interest in understanding the factors that will drive the growth of renewables in different countries.
  They are also interested in the barriers to the growth of renewable energy, such as high costs and opposition to onshore wind turbines, and how these can be overcome. They are skilled in conducting surveys
  and analyzing data to make informed predictions about the future of the renewable energy sector.
