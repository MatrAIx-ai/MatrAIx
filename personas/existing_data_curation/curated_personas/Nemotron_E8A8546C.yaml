  career_goals: Mariaandrea aims to pursue formal education in visual arts, seeking admission to a community college art program or a specialized art academy. She intends to develop a professional portfolio
    that showcases her unique blend of Mexican folk motifs and contemporary digital art. Her long‑term ambition is to work as a freelance illustrator or graphic designer, focusing on culturally resonant
    projects such as creating educational materials that celebrate Mexican heritage. She also hopes to eventually collaborate with museums or cultural institutions to curate exhibitions that highlight under‑represented
    Mexican‑American artists.
