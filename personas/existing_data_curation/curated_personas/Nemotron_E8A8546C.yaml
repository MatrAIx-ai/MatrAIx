personas:
  professional: Mariaandrea Perez, an aspiring visual artist and future freelance illustrator, channels their meticulous project planning, bilingual fluency, and love for quiet reflection into a distinctive
    portfolio that blends traditional folk motifs with contemporary digital illustration.
  sports: Mariaandrea Perez enjoys solitary morning jogs along nearby nature trails, participates in the local high school cross‑country team, and they follow the Los Angeles Galaxy, preferring low‑key
    fitness over loud stadium crowds.
  arts: Mariaandrea Perez immerses themselves in artistic inspiration, they study the works of Frida Kahlo and Diego Rivera, follow digital illustrator Loish on Instagram, listen to Lila Downs while sketching,
    and volunteer at the community art center’s monthly gallery openings.
  travel: Mariaandrea Perez has trekked ancient Mesoamerican pyramids, spent a weekend camping in Yosemite National Park, and they dream of attending Japan’s Kyoto International Manga Museum exhibition,
    balancing wanderlust with a limited teen budget and family responsibilities.
  culinary: Mariaandrea Perez expertly prepares family‑style pozole, mole poblano, and fresh guacamole, favoring ingredients like dried chilies, epazote, and roasted tomatillos, while they experiment with
    plating techniques that echo their digital art sensibility.
  core: Mariaandrea Perez is a quietly driven teen artist who blends cultural heritage with digital flair, obsessively curates a visual journal, and they occasionally overwork themselves on perfecting every
    brushstroke.
background:
  cultural: Mariaandrea is a Mexican‑American raised in Woodway, Texas, immersed in a bilingual household where Spanish and English intertwine. Her family observes cultural traditions such as Día de los
    Muertos, celebrates Mexican holidays with vibrant food, music, and folk art, and often shares stories of their Mexican roots. This heritage informs her artistic aesthetic, favoring bright colors, symbolic
    motifs, and narrative storytelling reminiscent of Mexican muralist traditions. Growing up in a small Texas town, she balances local Texan customs with her Mexican identity, navigating both cultures
    in school, community events, and daily life.
