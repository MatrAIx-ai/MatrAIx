persona_description: A scientist or pharmaceutical company executive who specializes in the development and production of vaccines, particularly those related to polio. They are highly knowledgeable about
  the process of growing and propagating viruses in cell cultures, and have a deep understanding of the potential risks and challenges associated with using monkey kidney cells as a growth medium. They
  are also aware of the importance of avoiding extraneous viruses and are actively seeking ways to eliminate or detect these contaminants. They have a strong interest in the relationship between poliovirus
  vaccines and the simian viruses that are present in the cells used for production.
