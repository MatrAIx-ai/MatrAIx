  hobbies: '[''Hiking'', ''Fishing'', ''Snowmobiling'', ''Ice hockey'', ''Model airplane building'', ''Scratch coding projects'', ''Reading adventure novels'', ''Wildlife photography'', ''Simple cooking
    with dad'', ''Arduino tinkering'']'
  career_goals: Christopher dreams of a career that blends his love of nature with his practical problem‑solving mindset. He hopes to become a wildlife biologist or park ranger, protecting the forests and
    lakes of northern Wisconsin. He is also fascinated by mechanical engineering and imagines designing durable outdoor equipment for hunters and hikers. In the short term, he aims to earn a spot on his
    high school varsity ice‑hockey team and win a regional science‑fair prize for a simple environmental monitoring project. Ultimately, he wants a profession that lets him work outdoors, use his technical
    skills, and make a tangible contribution to his community.
