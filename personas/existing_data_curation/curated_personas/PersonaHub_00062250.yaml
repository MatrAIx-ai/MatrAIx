persona_description: A researcher in the field of biosensors and lab-on-a-chip devices, focusing on developing sensitive and portable analytical tools for food safety and water quality monitoring. This
  persona is interested in understanding the technical challenges and opportunities in integrating optical waveguides into lab-on-a-chip devices for foodborne pathogen detection, with a particular emphasis
  on the integration of planar optical waveguides for rapid and sensitive analysis. This researcher is likely to have a strong background in materials science, engineering, and biological sensors, and is
  interested in applying advanced optical technologies to improve the performance and sensitivity of biosensors.
