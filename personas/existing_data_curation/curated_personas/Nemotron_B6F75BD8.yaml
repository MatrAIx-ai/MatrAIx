  career_goals: Nelson dreams of becoming an illustrator or animator who can bring his imaginative worlds to life, perhaps creating comics or video games that blend Cuban cultural motifs with sci‑fi adventures.
    He is also intrigued by the idea of designing interactive educational apps that teach kids about art, science, and his heritage. In the longer term, he imagines studying graphic design or game development,
    while keeping space open to explore careers that involve storytelling, such as authoring children's books.
