personas:
  professional: Nelson Hernandez is an aspiring junior game designer who channels their vivid imagination into drawing fantasy characters, building intricate LEGO worlds, and animating stories with Scratch,
    while their reliable yet flexible nature helps them meet school project deadlines and collaborate smoothly with friends.
  sports: Nelson Hernandez is a passionate member of the local youth soccer club, the River Runners, who practices year‑round, idolizes the national team’s striker, and balances their love for the sport
    with weekend nature hikes where they collect shells, while they also cheer for the New York Yankees during baseball season.
  arts: Nelson Hernandez channels their love for fantasy into detailed sketches of dragons and elves, enjoys listening to Celia Cruz and Buena Vista Social Club while dancing salsa at family gatherings,
    and draws inspiration from the cinematic scores of John Williams and the vibrant murals of street artists like Banksy, shaping a colorful artistic identity.
  travel: Nelson Hernandez dreams of exploring the colorful streets of Barcelona after a memorable family trip to Miami Beach, has already collected souvenirs from a weekend camping adventure in the Appalachian
    Trail, and hopes to one day visit the ancient ruins of Machu Picchu to sketch the landscape.
  culinary: Nelson Hernandez loves helping in the kitchen, especially preparing crispy empanadas filled with seasoned meat and crunchy plantain chips, while also perfecting their homemade pizza with extra
    cheese and pepperoni, showing a budding cook’s skill that balances traditional flavors with kid‑friendly favorites.
  core: Nelson Hernandez blends a vivid imagination with a disciplined habit of saving allowance, a love for soccer and salsa, and a tendency to misplace their LEGO pieces after a marathon building session.
background:
  cultural: Nelson grows up in a close‑knit Cuban‑American family in Tampa’s vibrant West Tampa neighborhood, where Spanish is spoken at home and Cuban traditions are celebrated. Family gatherings feature
    classic dishes such as ropa vieja, yuca con mojo, and homemade plantain chips, and music ranging from son to modern salsa fills the house. He participates in local cultural events like the annual Cuban
    Festival at Ybor City, where he learns traditional dance steps and hears stories of Cuban history. This cultural immersion enriches his artistic sensibility, influencing his love for bold colors, rhythmic
    patterns, and storytelling that weaves together his heritage and imaginative worlds.
