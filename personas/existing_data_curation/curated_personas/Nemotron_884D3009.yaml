personas:
  professional: Elizabeth Arganaraz, an aspiring freelance illustrator and graphic designer, blends her strong compositional eye and proficiency with Procreate and Adobe Illustrator with a relaxed, curiosity‑driven
    work style that favors flexible deadlines and collaborative community art projects.
  sports: Elizabeth Arganaraz rides waves at the local surf club, practices beach volleyball in the summer, and avidly follows the Los Angeles Dodgers and the Los Angeles Lakers, embodying a relaxed yet
    active fitness routine.
  arts: Elizabeth Arganaraz immerses herself in the arts, drawing inspiration from illustrators Loish and Pascal Campion, admiring the cinematic worlds of Hayao Miyazaki, listening to indie musicians Tash
    Sultana and King Princess, and quoting poet Rupi Kaur in her own work, weaving these influences into her sketches, digital illustrations, and poetry.
  travel: Elizabeth Arganaraz prefers spontaneous weekend getaways to coastal gems such as Carmel‑by‑the‑Sea and Santa Barbara, while daydreaming about future trips to the turquoise beaches of Bali and
    the historic streets of Kyoto, balancing a limited teen budget with a love for both adventure and relaxation.
  culinary: Elizabeth Arganaraz relishes fresh seafood tacos with lime, avocado, and cilantro, savors acai bowls topped with mango and granola, experiments with sushi rolls using pickled ginger and smoked
    salmon, and occasionally tries her hand at cooking with smoked paprika and coconut milk, though her cooking skills hover around confident beginner.
  core: Elizabeth Arganaraz is a beach‑loving visual storyteller whose curiosity fuels constant art experiments, who procrastinates on budgeting, forgets dental check‑ups, and can’t resist a sunset‑time
    surf session.
background:
  cultural: Elizabeth comes from a White, Anglo‑American background and has spent her entire life in Jacksonville Beach, Florida. Her upbringing reflects the relaxed, outdoors‑oriented culture of the Atlantic
    coast, with a strong appreciation for beach life, marine ecology, and coastal cuisine such as fresh seafood and citrus‑infused dishes. While her family’s cultural roots are primarily European (English
    and Irish ancestry), the diverse multicultural environment of Florida—exposed to Latin, Caribbean, and African‑American influences—has broadened her taste in music, food, and artistic styles. She identifies
    with mainstream American youth culture, valuing independence, creativity, and flexibility, while also participating in community events like the annual Jacksonville Beach art walk and local surf festivals.
attributes:
  skills: '[''Sketching and watercolor painting'', ''Digital illustration (Procreate, Adobe Illustrator)'', ''Basic photography and Lightroom editing'', ''Creative writing (poetry, short fiction)'', ''Social
