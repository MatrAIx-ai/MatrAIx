  hobbies: '[''Beach sketching and watercolor painting'', ''Surfing and beach exploration'', ''Photography of sunsets and street scenes'', ''Digital illustration and creating social media art tutorials'',
    ''Creative writing – poetry and short stories'', ''Reading speculative fiction and fantasy'', ''Attending indie music concerts'', ''Exploring local cafés and trying diverse cuisines'', ''Volunteering
    in youth art workshops'']'
  career_goals: Elizabeth aims to turn her artistic passion into a flexible career. She plans to apply to a community college or art institute to pursue a Bachelor of Fine Arts in Illustration or Graphic
    Design, with the long‑term goal of working as a freelance illustrator and graphic designer. She envisions building a distinctive personal brand on Instagram and TikTok, where she can share her beach‑inspired
    artwork, tutorials, and lifestyle content. In parallel, she is interested in museum education or community art outreach, hoping to combine her cooperative nature and assertiveness to create inclusive
    workshops for youth. Her ambition is to maintain a self‑directed schedule that lets her travel, explore new artistic ideas, and continue learning without being confined to a rigid nine‑to‑five job.
