persona_description: A historian who is interested in the study of Roman history, particularly the period from 13-9 BCE, and the events and figures associated with the Roman Empire during this time. They
  are knowledgeable about the equestrian monument sculpture type, which was developed during the imperial period and is characterized by the ruler being shown triumphantly riding a horse and conveying their
  power through effortless control of the animal. They are also interested in the life of Marcus Aurelius, the emperor who is represented in the equestrian monument, and the influence of this sculpture
  on later artists.
