personas:
  professional: Santa Zito, a 28‑year‑old diesel mechanic in Dallas, blends high‑tech diagnostic expertise with a graffiti‑inspired eye for custom vehicle art, delivering on‑the‑fly repairs while juggling
    a flexible, often chaotic schedule because they thrive on spontaneity.
  sports: Santa Zito follows the Dallas Cowboys with fervor, rides a vintage bike to North Texas hill trails for weekend cardio, and occasionally joins a pickup basketball game at the local community center,
    preferring spontaneous, low‑commitment fitness over regimented gym routines because they find structure stifling.
  arts: Santa Zito channels their love for cumbia and reggaeton into vivid graffiti murals on reclaimed metal, admiring the works of Basquiat and Lautrec while they sketch custom vehicle wraps inspired
    by the rhythmic patterns of neighborhood festivals.
  travel: Santa Zito prefers spur‑of‑the‑moment road trips to nearby Texan hill towns like Wimberley and occasional overseas visits to historic Oaxaca markets for culinary inspiration, balancing limited
    savings with a love for discovering colorful, music‑filled neighborhoods because they crave spontaneous immersion.
  culinary: Santa Zito delights in cooking fluffy pupusas stuffed with cheese and loroco, mastering the perfect homemade masa while pairing meals with fresh lime‑scented agua fresca, yet they often sacrifice
    proper food storage in favor of late‑night snacking on greasy fast‑food after long shifts.
  core: Santa Zito is a 28‑year‑old diesel wizard with a graffiti heart, spontaneous workflow, and a secret stash of pupusas that fuels both their engines and imagination, and they often share their creations
    with friends.
background:
  cultural: Santa is a first‑generation Salvadoran‑American, raised in a tight‑knit Salvadoran community in Dallas. At home, Spanish is spoken and traditional celebrations—such as Día de los Santos and
    festive family gatherings featuring pupusas, tamales, and bachata—have instilled a strong sense of hospitality and collective harmony. This cultural foundation informs his collaborative work style,
    his appreciation for vibrant colors and rhythms, and his desire to weave Salvadoran motifs into his mechanical creations, bridging his heritage with the Texas automotive world.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Turbocharger maintenance'', ''Fuel injection system troubleshooting'', ''Hydraulic system repair'', ''Electrical wiring and ECU programming'', ''MIG/TIG welding
    and metal fabrication'', ''Custom vehicle aesthetic modifications'', ''Use of diagnostic software (e.g., Bosch, Navistar)'', ''Preventive maintenance scheduling'', ''Parts sourcing and inventory control'']'
  hobbies: '[''Vehicle customization art'', ''Industrial photography'', ''Mechanical model building'', ''Cooking Salvadoran dishes'', ''Listening to Latin music'', ''Hiking in North Texas'', ''Attending
    diesel tech workshops'', ''Sketching'']'
  career_goals: Looking ahead, Santa wants to transition from employee to independent diesel specialist, offering mobile repair services to Dallas‑area fleets while maintaining the creative freedom to design
    custom vehicle art. He plans to obtain ASE certification and enroll in targeted diesel‑technology courses at a community college to bolster his credentials. Long‑term, he hopes to open a modest workshop
    where he can mentor apprentices, integrate eco‑friendly fuel retrofits, and showcase Salvadoran‑inspired automotive art that reflects his cultural heritage.
