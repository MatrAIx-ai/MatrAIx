persona_description: A professional engineer who specializes in feature-based modeling and parametric design. This person is skilled in using CAD software for creating and modifying 3D models, and is comfortable
  with hybrid modeling techniques to combine traditional CAD with DSSP software. They are adept at scanning complex surfaces and using photogrammetry to align and merge scan data, and are proficient in
  using Geomagic Studio software to clean and repair scan data. This person is also knowledgeable in using Nurbs-surface functions in Geomagic to quickly surface complex blades in parametric design.
