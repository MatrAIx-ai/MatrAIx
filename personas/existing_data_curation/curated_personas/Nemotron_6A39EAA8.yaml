  hobbies: '[''Visiting art galleries and museums'', ''Collecting Mexican folk art (Talavera pottery, textiles)'', ''Playing acoustic guitar'', ''Reading non-fiction (philosophy, art history, tech)'', ''Spontaneous
    road trips and landscape photography'', ''Cooking traditional Mexican cuisine'', ''Mindful meditation'', ''Attending local cultural festivals'', ''Participating in community jam sessions'', ''Exploring
    sustainable farming practices'']'
  career_goals: He aims to transition from a frontline sales representative to a regional sales manager within the next three years, overseeing a team of reps across Central California. Alex is pursuing
    a sales management certification to formalize his leadership skills and hopes to mentor younger, especially bilingual, salespeople. He is also interested in spearheading a sustainability initiative
    for his company, positioning eco‑friendly products in the market. Long‑term, Alex envisions launching a side business that curates and sells Mexican folk art and handcrafted goods, blending his sales
    expertise with his passion for culture.
