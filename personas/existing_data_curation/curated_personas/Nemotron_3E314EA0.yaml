  career_goals: Carmelito aims to obtain a certification in project management or small‑business entrepreneurship within the next year, leveraging his organizational strengths to launch a reliable home‑maintenance
    service. He also intends to complete his associate’s degree in business administration through online courses, which would open opportunities for stable, full‑time employment that offers predictable
    schedules and benefits. Ultimately, he aspires to provide a secure future for his family while maintaining a balanced life that respects his need for structure and his desire to be present for his spouse
    and children.
