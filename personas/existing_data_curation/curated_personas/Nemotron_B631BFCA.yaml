  career_goals: Although approaching retirement, Esra aims to stay employed part‑time for the next five to seven years to maintain financial stability and a sense of purpose. She hopes to transition into
    a supervisory or mentorship role, such as shift lead, where she can train newer cashiers and streamline store procedures. To support this shift, she plans to enroll in a short bookkeeping or small‑business
    accounting course, opening the possibility of occasional freelance accounting work for local merchants after she fully retires. A key ambition is to secure a predictable schedule that reduces stress
    while still allowing her to contribute her experience to the team.
