personas:
  professional: Charisse Gilliland, a veteran special education teacher in a rural district, combines deep expertise in individualized education programs, assistive technology, and behavior intervention
    with a collaborative mentoring style and a curiosity for new methods, all while aspiring to become the district’s Special Education Coordinator and designing workshops that blend innovation and proven
    practice—though her spontaneous disposition and heightened stress sensitivity often make organization and deadline adherence a challenge.
  sports: Charisse Gilliland stays active through weekly hikes with the Blue Ridge Trail Club, spring bird‑watching excursions, occasional fall 5K charity walks, and avidly supports the West Virginia Mountaineers
    football team while also attending a senior yoga class at the community center to balance her love of nature with structured exercise.
  arts: Charisse Gilliland weaves her love of storytelling into quilt designs she donates to shelters, devours historical fiction by Philippa Gregory and Hilary Mantel during her book club meetings, and
    immerses herself in folk music gatherings where she listens to Alison Krauss, The Avett Brothers, and local Appalachian fiddlers, all of which shape her identity and provide a soothing counterpoint
    to her demanding career.
  travel: Charisse Gilliland prefers low‑key, nature‑focused trips, often planning weekend drives along the Blue Ridge Parkway or hikes in Shenandoah National Park, while dreaming of a cultural pilgrimage
    to Dublin and the Irish countryside, yet she balances these aspirations with a modest travel budget and family obligations that limit longer getaways.
  culinary: Charisse Gilliland enjoys cooking hearty Appalachian fare—such as skillet cornbread, smoked pork shoulder with apple butter, sautéed ramps, and sweet‑potato pie—leveraging her garden’s heirloom
    tomatoes and local honey, and while she is a confident home cook, she occasionally experiments with unfamiliar spice blends that sometimes overwhelm the traditional palate.
  core: Charisse Gilliland, a compassionate educator and avid Appalachian enthusiast, balances relentless curiosity with a penchant for spontaneity, often juggling her love of quilting, gardening, and community
    service against an undercurrent of worry that fuels both her meticulous care for students and occasional lapses in personal organization.
background:
  cultural: Charisse grew up in a multi-generational white family in the rural hills of West Virginia, where community, self-reliance, and a strong work ethic are core values. Influenced by Appalachian
    traditions, she celebrates seasonal festivals, values church fellowship, and respects the region’s storytelling and folk-music heritage. Her graduate education expanded her perspective, yet she maintains
    deep ties to local customs, emphasizing hospitality, collaborative problem solving, and a pragmatic approach to life.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Differentiated instruction'', ''Assistive technology integration'', ''Behavioral intervention planning'', ''Collaborative team facilitation'',
