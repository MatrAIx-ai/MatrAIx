personas:
  professional: Emmett Sonnier, a meticulous retail cashier with a STEM background, uses precise cash handling, spreadsheet-driven inventory tracking, and calm conflict resolution to keep store operations
    humming while eyeing a shift manager role where they can streamline processes and mentor new hires.
  sports: Emmett Sonnier, a fan of the local minor‑league baseball team and a member of the community cycling club "Pedal Pals," enjoys early‑morning rides on weekends, occasional fishing trips on the nearby
    lake, and follows the NFL’s Green Bay Packers, but they prefer low‑impact exercise like walking the dog to avoid aggravating their back.
  arts: Emmett Sonnier volunteers backstage at the community theater, finds solace in the works of playwright Neil Simon, listens to classical piano pieces by Chopin during woodworking, and admires the
    vibrant pop art of Andy Warhol, while they occasionally binge‑watch classic films starring Tom Hanks for relaxation.
  travel: Emmett Sonnier prefers well‑planned, moderately paced road trips, having driven the historic Route 66 and explored the Oregon Coast, they dream of a cultural pilgrimage to Kyoto’s temples and
    a summer cabin retreat in the Adirondacks, balancing adventure with the comfort of familiar routine.
  culinary: Emmett Sonnier enjoys cooking garden‑fresh vegetable stew with heirloom tomatoes, basil, and roasted carrots, has a solid grasp of basic culinary techniques, delights in grilling fresh trout
    with lemon‑dill butter, yet they sometimes over‑season their signature chili and rely on fast‑food pizza for late‑night meals.
  core: Emmett Sonnier blends a love for orderly spreadsheets with hands‑on woodworking and puzzling, crafting a life that values structure, quiet creativity, and occasional indulgence in fishing lore,
    all while wrestling with a penchant for delaying dentist appointments.
background:
  cultural: Emmett grew up in a modest, middle‑class family in the heart of Ohio’s Midwestern culture. The region’s emphasis on hard work, community involvement, and straightforward communication shaped
    his values. He identifies with the traditional Midwestern ethos of reliability, modesty, and a strong work ethic, reinforced by a Protestant upbringing that emphasized responsibility and service to
    others. Living in Marysville, he remains connected to local customs such as high school sports, county fairs, and volunteer initiatives, reflecting a cultural background that balances individual self‑reliance
    with a deep sense of community belonging.
