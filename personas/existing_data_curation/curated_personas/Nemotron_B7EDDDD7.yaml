  career_goals: Emmett aims to move into a supervisory role within the retail environment, such as shift manager or store manager, where he can apply his organizational strengths and technical know‑how
    to streamline operations. He plans to obtain certifications in supply‑chain analytics and project management to leverage his STEM background for a future transition into a data‑driven logistics or loss‑prevention
    analyst position. Ultimately, he envisions a stable, structured career path that provides financial security while allowing him to mentor newer employees and contribute to the local community’s retail
    ecosystem.
