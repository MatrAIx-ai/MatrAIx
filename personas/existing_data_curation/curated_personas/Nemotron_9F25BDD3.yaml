  hobbies: '[''Reading classic and contemporary literature'', ''Journal writing'', ''Photography'', ''Urban sketching'', ''Coffee‑shop script drafting'', ''Yoga and mindfulness'', ''Farm‑to‑table cooking'']'
  career_goals: Nikki aims to secure lead roles in regional theater productions while expanding her presence in independent film. She aspires to direct a small ensemble play within the next two years, using
    her practical production experience to bring a personal script to life. Long‑term, she envisions founding a community‑focused theater company in Champaign that nurtures emerging talent and offers intimate,
    experimental work. She also plans to develop a series of acting masterclasses that blend scholarly research with hands‑on technique, positioning herself as both a performer and an educator. Balancing
    ambition with pragmatism, Nikki seeks steady income through teaching while strategically auditioning for roles that align with her artistic values.
