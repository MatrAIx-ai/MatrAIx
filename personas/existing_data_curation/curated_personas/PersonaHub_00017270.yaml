persona_description: A geodesist or geophysicist who specializes in measuring and monitoring the Earth's size, shape, and exact locations of points on its surface, particularly focusing on calculating the
  Earth's global sea level. Their expertise involves using mathematical models, satellite data, and measurements to determine the height of the global sea level surface and use it as the point of zero elevation
  for determining heights of mountains, the depths of trenches, and even altitudes of objects in space. They are also involved in the continuous monitoring of sea levels over time, particularly with the
  NOAA and NASA's effort to do so through the Jason-3 satellite.
