persona_description: A business development officer with experience in seed production, particularly in East Africa. They are responsible for establishing and stabilizing production and delivery of high-quality
  seed to complement community-based approaches with private sector seed supply. They are skilled in training existing and newly identified farmer out-growers to produce commercial seed to the quality required
  by companies. They are committed to ensuring that basic seed is certified and that seed companies and merchants are licensed to trade. They have a deep understanding of the challenges faced in the East
  African region, including the poor quality of seed and the high proportion of 'foreign' (non-NERICA) varieties in farmer-produced seed, and the resulting reduced grain yields and failure to meet minimum
  quality criteria for export or even to supply local demand. They are also skilled in supporting increased production of basic seed and a shift to full costing of the product, as well as training existing
  and newly identified farmer out-growers to produce commercial seed to the quality required by companies.
