personas:
  professional: Maritza Riveraortiz, a retired mechanical engineer, leverages two decades of AutoCAD and SolidWorks design work, data analysis in Excel and R, and bilingual technical communication to mentor
    high‑school girls in STEM, while engineering an Arduino‑controlled irrigation system for her garden, reflecting her blend of curiosity, practicality, and assertiveness.
  sports: Maritza Riveraortiz stays active with daily walks along the Dublin Hills trails, occasionally joins the Dublin Walkers Club for group hikes, and follows the Oakland Athletics in baseball and the
    Golden State Warriors in basketball, while eschewing high‑impact sports due to her knee osteoarthritis.
  arts: Maritza Riveraortiz finds solace in pottery sessions at a local studio, revels in reading works by Octavio Paz and Juan Rulfo, delights in listening to the soulful voice of Lila Downs and the classic
    compositions of Agustín Lara, and enjoys the golden‑age films of Pedro Infante and the avant‑garde cinema of Guillermo del Toro.
  travel: Maritza Riveraortiz prefers carefully planned, leisurely trips that blend cultural immersion with nature, having already explored the historic streets of Guanajuato and the towering sequoias of
    Yosemite, while her bucket list includes a serene week in the vineyards of Tuscany and a guided pilgrimage to the ancient ruins of Teotihuacan, all arranged with a trusted travel agency that accommodates
    her mobility needs.
  culinary: Maritza Riveraortiz cooks with the confidence of a seasoned chef, turning garden‑fresh tomatoes, chilies, and cilantro into vibrant salsas, mastering the complex layers of mole poblano with
    ancho chilies and cacao, and regularly preparing hand‑made tamales de elote, all while savoring occasional visits to local farmers’ markets for heirloom corn and epazote.
  core: Maritza Riveraortiz is a solitary, curiosity‑driven octogenarian who blends engineering precision with a love for gardening, puzzles, and traditional cooking, yet occasionally hoards garden tools
    and forgets to water the plants during rainy days, believing the clouds will suffice.
background:
  cultural: Maritza was born in Guanajuato, Mexico, into a close‑knit Catholic family that celebrated traditions such as Día de los Muertos, Semana Santa, and family gatherings centered around handcrafted
    foods. She moved to the United States in her early twenties to pursue a degree in mechanical engineering, eventually establishing a career in California’s manufacturing sector. While she has embraced
    life in Dublin, CA, she retains strong ties to her Mexican heritage—speaking fluent Spanish at home, preparing traditional dishes, listening to mariachi and regional folk music, and participating in
    local Mexican‑American cultural events. Her bicultural identity informs her values of family respect, community service, and a blend of pragmatic American outlook with the warmth of Mexican customs.
attributes:
