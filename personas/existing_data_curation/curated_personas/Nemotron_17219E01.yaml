  career_goals: Lorri aims to stay active and engaged within her community. Over the next few years she hopes to expand her role as a volunteer coordinator at the Pensacola Senior Center, launch a small
    community garden project, and complete a short adult‑education course in horticulture. She also aspires to travel along the Gulf Coast, visit historic sites, and document her experiences in a scrapbook
    to share with younger relatives. Maintaining her independence, health, and strong social connections remain her primary ambitions.
