personas:
  professional: Aimee Kidd is a budding young science enthusiast who loves devising simple experiments at home and sketches nature scenes, blending curiosity with practicality; their meticulous organization
    and collaborative spirit make them a reliable leader in the school robotics club, where they help translate imaginative ideas into functional prototypes.
  sports: Aimee Kidd is a midfield dynamo on the local middle‑school soccer team, regularly practicing drills after school and cheering for the nearby professional club FC Metro, while also participating
    in a weekend Girl Scout hiking troop that emphasizes stamina and teamwork.
  arts: Aimee Kidd immerses themselves in digital art on a tablet, drawing inspiration from Studio Ghibli’s ‘Spirited Away’ and the synth‑wave aesthetics of artist K/DA, while their playlists feature an
    eclectic mix of Tame Impala, Billie Eilish, and classic rock band Queen, shaping both their creative projects and study breaks.
  travel: Aimee Kidd favors organized day trips to national parks like Yosemite for sketching sessions, dreams of a backpacking adventure through the Scottish Highlands, and meticulously plans each outing
    with a spreadsheet, though they sometimes procrastinate booking accommodations because of school exams.
  culinary: Aimee Kidd enjoys experimenting with easy‑to‑make dishes like avocado toast with chili flakes and homemade sushi rolls, often adding fresh basil and mango for a tropical twist, but they still
    rely on quick cheese‑pizza deliveries when a science experiment goes awry and the kitchen is a mess.
  core: Aimee Kidd balances a fierce curiosity for science with a compassionate, community‑focused heart, juggling sketchbooks, soccer cleats, and digital playlists while occasionally procrastinating on
    chores and indulging in late‑night comic marathons.
background:
  cultural: Aimee comes from a White Anglo‑American family that has lived in the South‑Central Texas region for several generations. Growing up in San Antonio, she is exposed to a vibrant multicultural
    environment where Hispanic traditions are visible in community festivals, local cuisine, and public celebrations. Her household, however, primarily observes familiar Texan customs—holiday barbecues,
    country music gatherings, and active participation in church and neighborhood volunteer initiatives. This blend of regional pride and cultural diversity influences her values of community service, practical
    responsibility, and a balanced appreciation for both new ideas and established traditions.
