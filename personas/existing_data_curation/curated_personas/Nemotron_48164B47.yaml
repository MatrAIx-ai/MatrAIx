  career_goals: Aimee envisions a future where she can combine her compassion with pragmatic problem‑solving. She aims to pursue a college degree in either nursing or elementary education, hoping to become
    a pediatric nurse or a science teacher who can inspire curiosity while providing reliable care and guidance. In the meantime, she plans to deepen her involvement in youth mentorship programs and volunteer
    health outreach in her community.
