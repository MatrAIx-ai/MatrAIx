  career_goals: Rosa aims to document her family’s culinary heritage in a small cookbook, mentor her grandchildren in cooking and gardening, and expand her volunteer work at the local senior center by teaching
    craft workshops. She also plans to stay physically active through gardening, keep her mind sharp with bridge tournaments, and maintain her independence by learning more advanced digital tools.
