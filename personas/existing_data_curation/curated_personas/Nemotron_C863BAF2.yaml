personas:
  professional: Rosa Sepulveda leads weekly craft workshops at the senior center, merging razor‑sharp budgeting skills with hands‑on horticultural guidance, and they bring a measured curiosity that keeps
    each session practical yet refreshingly adaptable.
  sports: Rosa Sepulveda enjoys daily walks through the nearby park, participates in the community walking club, follows the Harbor City Hawks baseball team with keen interest, and they treat each stroll
    as a low‑impact cardio routine that maintains their independence.
  arts: Rosa Sepulveda sways lightly to salsa classics by Celia Cruz and plena rhythms by Willie Colón while devouring historical novels by Ken Follett, and they cherish these artistic interludes as disciplined
    yet playful counterpoints to daily responsibilities.
  travel: Rosa Sepulveda prefers meticulously planned weekend getaways to historic towns such as Old San Juan and the coastal village of Maunabo, balancing cultural curiosity with a realistic budget, and
    they favor guided walking tours over spontaneous trips.
  culinary: Rosa Sepulveda masters heritage island recipes like arroz con gandules and mofongo, swaps lard for olive oil, adds extra vegetables for health, and they chronicle each tweak in a notebook intended
    for a family cookbook.
  core: Rosa Sepulveda blends practical curiosity, disciplined budgeting, and a garden‑to‑table ethos with a competitive edge in bridge, all while maintaining a quiet, skeptical yet emotionally steady outlook.
background:
  cultural: Rosa was born and raised in the Trujillo Alto area of Puerto Rico, a suburb of San Juan known for its tight‑knit neighborhoods and blend of urban life with surrounding countryside. Her upbringing
    was rooted in the island’s Spanish‑African heritage, Catholic traditions, and a strong emphasis on family and community. She grew up with the rhythms of plena and bomba, the scents of sofrito cooking
    in her family kitchen, and the values of perseverance and humility that characterize many Puerto Ricans. These cultural influences shape her daily habits, her love for food, music, and her commitment
    to preserving local customs.
