persona_description: A scientist with expertise in hydrology, specifically focused on understanding the impact of climate change and glacier recession on water resources in high mountain watersheds. They
  have conducted research in the Cordillera Blanca, Peru, and are interested in the role of groundwater in buffering stream discharge and maintaining baseflow during dry seasons. They are also interested
  in the hydrologic cycle, including the importance of groundwater, and have presented their findings on the synthesis of results based on hydrologic modeling, drilling/piezometers, geophysics, and artificial
  and natural hydrologic tracers.
