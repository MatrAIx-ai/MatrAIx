  hobbies: '[''building wooden block towers'', ''drawing and coloring'', ''singing nursery rhymes'', ''playing in the backyard garden'', ''organizing stuffed animals by size'', ''pretend tea‑party play'',
    ''reading picture books with parents'']'
  career_goals: Even at three, Brittney dreams of future roles that reflect her love of order and helping others. She often says she wants to be a teacher who organizes classroom activities and helps children
    learn, and she imagines herself as a veterinarian caring for animals with gentle, methodical attention. She aspires to master reading by kindergarten and to be recognized for her tidy room and perfectly
    completed coloring projects, showing her early ambition to achieve high standards in any role she pursues.
