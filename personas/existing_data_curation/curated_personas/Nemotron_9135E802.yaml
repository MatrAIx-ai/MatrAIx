personas:
  professional: Brittney Ellisor is a diligent three‑year‑old who, through daily block‑building rituals and color‑sorting games, displays the organized, high‑standard‑focused mindset of an aspiring project
    manager; they turn playtime into a miniature office of meticulous planning and execution.
  sports: Brittney Ellisor is a budding sports enthusiast who attends the Meadowbrook Cubs’ mini‑soccer sessions, proudly wears a tiny River City Reds jersey, and joins weekly tumble‑gym classes at the
    community center, and they balance structured play with an early love for team competition.
  arts: Brittney Ellisor delights in daily sing‑alongs to Laurie Berkner’s We Are the Dinosaurs, colors pages from Mo Willems’ Elephant & Piggie books, and mimics favorite Sesame Street characters during
    pretend‑play, and they weave music, illustration, and performance into a vivid creative routine.
  travel: Brittney Ellisor enjoys family road trips to the nearby marine aquarium, weekend stays at Grandma’s mountain cabin in the Blue Ridge, and a week‑long adventure at Disney World in Orlando, and
    they carefully schedule each outing to include familiar nap times and favorite bedtime stories while allowing brief, exciting new experiences.
  culinary: Brittney Ellisor prefers familiar comforts such as creamy macaroni and cheese, crisp apple slices with peanut butter, and they often pretend to be a chef by stirring batter in a play‑kitchen,
    yet they show a tiny adventurous streak by occasionally sneaking a bite of mildly spicy tomato sauce.
  core: Brittney Ellisor, a meticulously organized three‑year‑old, zealously fills a pink piggy bank, meticulously tracks skin care for eczema, eagerly lines up toys by color, yet repeatedly forgets bedtime
    when a glitter sticker tempts them, and they epitomize a routine‑loving mind with occasional sweet‑tooth indulgences.
background:
  cultural: Brittney is raised in Saline, a close‑knit community in Lenawee County, Michigan. Her family observes traditional Midwestern customs, celebrating holidays such as Thanksgiving and Christmas
    with communal meals, church gatherings, and local fairs. They participate in community events like the town’s summer farmer’s market and seasonal camping trips, emphasizing practicality, politeness,
    and a strong sense of community involvement. Her white heritage reflects a blend of German, English, and Irish ancestry common in the region, influencing family traditions such as baking homemade apple
    pie, attending a local Protestant congregation, and enjoying outdoor activities like hiking and fishing in the nearby lakes.
attributes:
