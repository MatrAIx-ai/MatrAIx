  hobbies: '[ ''Painting (watercolor, acrylic)'', ''Sketching and decorative design'', ''Gardening herbs and chili peppers'', ''Traditional Mexican cooking'', ''Reading poetry, philosophy, and art theory'',
    ''Collecting vintage Mexican postcards and folk‑art figurines'', ''Listening to mariachi and world music'', ''Journaling and creative writing'' ]'
  career_goals: Although retired from formal work, Juan is driven to create a lasting personal legacy. He aims to compile a memoir that weaves together his migration story, family history, and reflections
    on Mexican cultural heritage, illustrated with his own artwork. He hopes to organize a small community exhibition of his paintings, spotlighting the blend of Mexican folk motifs with the Central Valley
    landscape. Juan also aspires to mentor his grandchildren and neighborhood youth in traditional cooking and storytelling, ensuring the transmission of cultural knowledge. Finally, he wishes to develop
    a modest workshop series at the local senior center, teaching basic folk‑art techniques as a way to foster creativity and emotional resilience among peers.
