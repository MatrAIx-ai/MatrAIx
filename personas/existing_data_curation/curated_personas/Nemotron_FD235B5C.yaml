  hobbies: '[''Visiting local art galleries and murals'', ''Hiking and photographing Utah landscapes'', ''Attending live‑music events and community festivals'', ''Participating in improv theater groups'',
    ''Volunteering at youth after‑school programs'', ''Practicing yoga and group fitness'', ''Experimenting with fusion cooking'', ''Pottery and textile crafting'']'
  career_goals: Erika aims to move into a supervisory role within the sales sector, such as a team lead or floor manager, where she can mentor newer associates and shape a supportive team culture. She plans
    to earn a professional sales certification and deepen her digital marketing knowledge to broaden her skill set. Long‑term, she dreams of blending her passion for art with her sales expertise by managing
    a boutique or gallery that showcases local artists, or by becoming a community liaison who connects cultural institutions with the public. She also hopes to launch a small side venture that offers curated
    art‑inspired merchandise, using her network and sales acumen to support local creators.
