personas:
  professional: Frank Bodden, a seasoned commercial cleaning specialist with three decades of experience, leverages systematic floor‑care expertise, OSHA‑certified safety knowledge, and a business administration
    background to run meticulously organized maintenance programs, while their competitive drive pushes them to out‑perform peer facilities and mentor crews with a skeptical eye toward shortcuts.
  sports: Frank Bodden, a dedicated member of the Tellico Plains Community Baseball Club, dominates the Sunday‑morning league with a competitive edge, follows the Nashville Predators for winter hockey,
    supports the Tennessee Volunteers football team, and maintains fitness through weekly hikes in Cherokee National Forest and weekend fishing trips on the Tellico River.
  arts: Frank Bodden, a fervent fan of Appalachian folk traditions, regularly attends the Tellico Plains fall festival to enjoy performances by artists like Doc Watson and The Avett Brothers, collects vintage
    fiddle recordings, reads historical novels by Charles Frazier, and crafts simple wooden instruments for friends, blending personal creativity with cultural appreciation.
  travel: Frank Bodden, an adventurous planner who prefers road trips with a well‑mapped itinerary, explores nearby gems such as Great Smoky Mountains National Park and Asheville's craft breweries, dreams
    of trekking the Scottish Highlands, and balances travel with family responsibilities by scheduling short weekend getaways rather than extended vacations.
  culinary: Frank Bodden, an adept home cook who favors Southern comfort food, frequently prepares smoked catfish with a rosemary‑infused glaze, bakes peach cobbler for the charity bake‑sale using fresh
    orchard peaches, and experiments with seasonal ingredients like wild mushrooms and locally harvested herbs, though they occasionally over‑salt dishes in the pursuit of bold flavors.
  core: Frank Bodden blends a methodical, competitive work ethic with a love for community baseball, woodworking, and folk music, navigating life with calm resilience while occasionally indulging in over‑seasoned
    cooking and procrastinating on dental care.
background:
  cultural: Frank grew up in a multigenerational, white Appalachian family in eastern Tennessee. His heritage is rooted in Scots‑Irish settlers who arrived in the region in the 1800s, and his family has
    long maintained close ties to the local Methodist church, which shaped his values of reliability and service. The rural community’s emphasis on self‑sufficiency, neighborly reciprocity, and respect
    for the surrounding mountains and waterways informs his practical outlook and love for outdoor recreation. He also recognizes the Cherokee history of the Tellico River Valley and participates in local
    heritage events that celebrate both the region’s European and indigenous narratives.
attributes:
  skills: '[''Commercial floor care'', ''Carpet extraction'', ''Strip-and-wax'', ''Hardwood polishing'', ''Inventory management'', ''Budgeting'', ''Staff scheduling'', ''Basic electrical and plumbing repairs'',
    ''OSHA hazardous‑materials handling'', ''Green‑cleaning practices'', ''Preventive maintenance logging'']'
  hobbies: '[''Sunday‑morning baseball league'', ''Volunteer fire department outreach'', ''Hiking in Cherokee National Forest'', ''Fishing on the Tellico River'', ''Woodworking'', ''Community festival organizing'',
    ''Reading Appalachian history'', ''DIY cleaning product experimentation'']'
  career_goals: Frank aspires to move from hands‑on cleaning to a supervisory and eventually facilities‑manager role at a regional hospital or university campus. He plans to earn the Certified Professional
    Cleaner (CPC) credential and complete an advanced OSHA construction safety course. Over the next five years, he hopes to launch a modest, family‑owned cleaning business that emphasizes eco‑friendly
    methods and reliable service for small‑business owners in Monroe County. He also wants to mentor younger workers, sharing his practical knowledge and fostering a culture of accountability and continuous
    improvement.
