personas:
  professional: Matthew Sheen, an aspiring mechanical engineering technician, combines meticulous organization, self‑taught Python coding, and a curiosity for how things work to excel at DIY repairs, model‑kit
    construction, and leading collaborative school projects, laying a practical foundation for future work in sustainable transportation.
  sports: Matthew Sheen, a dedicated basketball player at the local community center and a weekend skateboarder with the downtown crew, follows the Houston Rockets and Houston Dynamo, combines regular shooting
    drills with freestyle skate sessions, and maintains a balanced fitness routine that emphasizes agility and teamwork.
  arts: Matthew Sheen, an avid reader of science‑fiction and fantasy who writes fan‑fiction, immerses themselves in the lyrical world of Arctic Monkeys, Kendrick Lamar, and Imagine Dragons, while also curating
    playlists that fuel their model‑building sessions, and finds inspiration in graphic novels like "Saga" and "The Witcher" series.
  travel: Matthew Sheen, a curious road‑trip enthusiast, plans weekend getaways to the Space Center Houston and coastal escapes at Galveston, dreams of a future visit to the Kennedy Space Center, and prefers
    to map itineraries using spreadsheet tools, balancing school responsibilities with travel ambitions.
  culinary: Matthew Sheen, a modest home cook, favors quick, flavorful meals like chicken tacos with fresh cilantro and lime, enjoys crafting customized pizza toppings while experimenting with smoked paprika
    and jalapeños, and occasionally indulges in craft sodas after long gaming sessions.
  core: Matthew Sheen merges a methodical planner’s discipline with a tinkerer’s curiosity, channeling both into model kits, basketball, and early career ambitions while juggling teen impulsivity and a
    habit of occasional snack binges.
background:
  cultural: Matthew grew up in a middle‑class suburban neighborhood in Houston, Texas. His family is of Anglo‑American heritage, with roots in the Midwest that migrated to Texas in the 1990s for work in
    the energy sector. The household observes Southern cultural traits such as a strong emphasis on family gatherings, backyard barbecues, and community involvement. He attends a local Protestant church
    where he participates in youth group activities, reflecting the prevalent religious landscape of the area. Growing up in the diverse city of Houston, he is exposed to a mosaic of cultures—Mexican, African‑American,
    and Asian influences—which has broadened his outlook and introduced him to some Spanish phrases. The city’s love for sports, especially football, baseball, and the NASA space program, also shapes his
    interests and aspirations.
