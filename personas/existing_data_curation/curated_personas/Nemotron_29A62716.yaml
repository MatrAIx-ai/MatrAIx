  career_goals: He plans to complete his high school equivalency (GED) within the next year, then enroll in a community college program in mechanical engineering or automotive technology. He hopes to earn
    certifications that will allow him to work as a skilled technician, eventually moving into design and development of sustainable transportation solutions. He also considers a future in aerospace engineering,
    inspired by Houston’s connection to NASA. In the short term, he seeks part‑time work or internships that let him apply his practical skills while learning on the job. His ambition is to combine his
    love of hands‑on problem solving with a stable, well‑paid career that supports his family.
