persona_description: A marine biologist who specializes in studying the impacts of oil spills on marine ecosystems, particularly in the Gulf of Mexico. She has conducted research on the effects of the Deepwater
  Horizon/Macondo blowout on Gulf of Mexico pelagic, benthic, and coastal seashore microbial communities. She has published several papers on the subject and has been involved in diving in the Gulf of Mexico,
  including long before the Deepwater Horizon accident.
