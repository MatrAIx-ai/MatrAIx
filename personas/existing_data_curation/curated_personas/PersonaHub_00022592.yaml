persona_description: A company that specializes in the construction and deployment of turnkey, customised, and ruggedized data centres, particularly for the submarine cable industry. They have a strong
  track record of delivering scalable and cost-effective solutions to remote places like Palau and Samoa, and their eCentre cable landing stations are specifically designed for the environment and requirements
  of submarine cable projects. They have a team of experts in modular prefabrication, white space expansion, and environmental design, and their facilities can be easily expanded to provide rack space for
  new colocation services or hosting private clients' equipment, adding additional revenue streams for the operator.
