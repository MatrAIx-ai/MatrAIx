persona_description: A scientist who specializes in the study of developmental disorders, particularly those affecting the central nervous system. He is involved in the Deciphering Developmental Disorders
  (DDD) study, which uses genomics to diagnose children with unknown developmental diseases. The study aims to investigate genetic disorders of the central nervous system, such as developmental brain dysfunction,
  and discover mutations in regulatory elements that can cause neurodevelopmental disorders. The scientist is also interested in the mechanism by which these mutations can cause neurodevelopmental disorders
  and is looking for ways to link individual regulatory elements with specific disorders.
