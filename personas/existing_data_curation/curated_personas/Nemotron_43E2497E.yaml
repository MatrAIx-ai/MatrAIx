  career_goals: Sandra aspires to move into a senior HR leadership role, such as HR Director or Senior HR Business Partner, where she can shape strategic workforce planning for a growing Austin‑based company.
    She aims to champion flexible work policies and holistic employee wellbeing programs that address stress and mental health—areas she feels personally attuned to. To strengthen her strategic acumen,
    she plans to pursue a master's degree in Human Resources or Organizational Development within the next two years. Ultimately, she hopes to mentor emerging HR professionals and, one day, launch a boutique
    consultancy that helps small businesses implement data‑driven, people‑centric HR practices.
