personas:
  professional: Maria Delarosa, a retired community center coordinator in Miami, blends fluency in Spanish and English with a passion for art and horticulture to guide volunteers, curate modest exhibitions,
    and lead oral‑history workshops, all while embracing a relaxed, improvisational approach to planning, and they often rely on spontaneity when timelines shift.
  sports: Maria Delarosa enjoys morning walks with garden tools, plays weekly pickleball at the senior center, follows the Miami Heat and Miami Marlins with enthusiastic fandom, and they occasionally join
    a local seniors' yoga class on the beach.
  arts: Maria Delarosa immerses themselves in the works of Frida Kahlo, Diego Rivera, and contemporary photographer Graciela Iturbide, volunteers as a docent at the Pérez Art Museum Miami, and they curate
    intimate art gatherings that challenge conventional perspectives.
  travel: Maria Delarosa prefers relaxed cultural trips, often taking weekend getaways to Key West, historical tours of St. Augustine, and long‑planned visits to Oaxaca for its culinary scene, balancing
    travel desires with a modest budget and senior travel discounts, and they savor each journey as a quiet escape from daily worries.
  culinary: Maria Delarosa delights in preparing gallo pinto and nacatamales, hand‑crafting masa with fresh corn, incorporating garden‑grown herbs like cilantro and hibiscus, and they informally teach neighbors
    the nuances of authentic spice blends.
  core: Maria Delarosa is a curious, garden‑loving art enthusiast who weaves cultural storytelling into community life, navigating their days with a blend of relaxed spontaneity and occasional worry‑driven
    meticulousness.
background:
  cultural: Maria Judith grew up in a close‑knit Nicaraguan immigrant household in Miami Beach, where Spanish was spoken at home and Catholic traditions marked the family calendar. Her upbringing blended
    Central American customs—such as celebrating La Purísima, preparing tamales for holidays, and listening to marimba rhythms—with the vibrant multicultural fabric of Miami. She maintains strong ties to
    the Nicaraguan diaspora, regularly attending cultural festivals, supporting local Latin American businesses, and sharing stories of her homeland with younger generations. Her heritage informs her values
    of community solidarity, respect for elders, and a deep appreciation for music, food, and storytelling.
attributes:
  skills: '["Spanish-English translation", "Basic computer operation", "Community volunteer coordination", "Nicaraguan cooking", "Gardening", "Art appreciation and museum guiding", "Oral history documentation"]'
  hobbies: '["Art museum visits", "Garden cultivation (tropical plants)", "Traditional Nicaraguan cooking", "Live music gatherings (marimba, salsa)", "Reading historical fiction", "Community library discussion
    groups"]'
  career_goals: Although retired, Maria Judith aims to deepen her involvement in Miami's cultural scene. She hopes to co‑lead a weekly storytelling program that records the oral histories of Nicaraguan
    immigrants, preserving their narratives for future generations. She also aspires to curate a modest community art exhibit that showcases works inspired by Central American motifs, and to mentor younger
    volunteers in organizing inclusive events. Learning digital photography to document her garden and culinary creations is a personal milestone she wishes to achieve within the next year.
