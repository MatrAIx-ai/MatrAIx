persona_description: A historian who specializes in the study of the history of the county of Dassel, particularly the period from the 12th to the 14th century. His research interests include the political
  and social structures of the county, the economic activities of the counts, and the interactions between the counts and other regions in the region. He is particularly interested in the decline of trade
  and agriculture in the county during the Ludolfic period and the reasons behind it. He has a deep understanding of the coat of arms of the counts of Dassel and the history of the town of Dassel.
