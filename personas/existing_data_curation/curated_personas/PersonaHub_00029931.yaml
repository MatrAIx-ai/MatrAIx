persona_description: A historian who specializes in the history of labor unions, particularly the development of the University of Michigan Interns-Residents Association and its subsequent recognition as
  a labor organization within the meaning of PERA (Public Employees Relations Act). The individual is knowledgeable about the history of collective bargaining, the legal framework governing employee representation,
  and the significance of the University of Michigan House Officers Association's incorporation with the state. The persona is interested in the political and social context of the time period, and the
  broader implications of the Association's recognition and subsequent incorporation.
