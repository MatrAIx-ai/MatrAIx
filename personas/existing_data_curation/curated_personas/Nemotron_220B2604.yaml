personas:
  professional: Abdula Thakkar, a budding junior coder and Minecraft world‑builder, applies his love for clear routines and practical problem‑solving to crafting redstone contraptions, though his easy‑going
    attitude often means he skips planned coding club meetings.
  sports: Abdula Thakkar swings a cricket bat for the local Flemington Cricket Club, watches the New York Yankees on baseball season, cheers for the New York Giants during fall football, and hits the reservoir’s
    walking trail for cardio, treating fitness as a flexible routine rather than a strict schedule.
  arts: Abdula Thakkar doodles comic‑style panels inspired by Bollywood dance sequences and indie rock album covers, grooves to A. R. Rahman’s scores and Arctic Monkeys tracks, and streams sci‑fi movies
    like Blade Runner to fuel his storytelling imagination.
  travel: Abdula Thakkar prefers spontaneous weekend road trips, often heading to New York City's bustling streets or the serene hills of the Pocono Mountains, while dreaming of a future family vacation
    to the beachside town of Goa, balancing his wanderlust with school assignments and a modest family budget.
  culinary: Abdula Thakkar, a kitchen‑novice, delights in frying spicy aloo paratha and simmering dal tadka with turmeric and cumin alongside his parents, while also mastering a homemade pepperoni pizza
    topped with extra cheese for movie nights.
  core: Abdula Thakkar blends a love for routine‑driven gaming and cricket with a worry‑prone, yet adaptable mindset, often juggling schoolwork, video‑games, and family traditions in a uniquely balanced
    teen life.
background:
  cultural: Abdula is a second-generation South Asian American whose family traces its roots to Gujarat, India. Raised in a bilingual home where Gujarati (and some Urdu) is spoken alongside English, he
    observes cultural traditions such as Diwali, Eid, and regional festivals, and participates in community events at the local Hindu temple and mosque. Growing up in Flemington, NJ, he blends these heritage
    customs with typical suburban American life, maintaining close ties to an extended family that values education, practicality, and respect for cultural rituals.
