persona_description: An English literature enthusiast who is interested in the history, literature, and cultural context of literature written in the British Isles in English or Scots, including literature
  written in Old English, Middle English, and later periods such as Elizabethan, Jacobean, Restoration, Augustan, Romantic, Victorian, and Edwardian. This person is knowledgeable about the development of
  literature in England and the different styles and movements that emerged throughout history. They are also interested in the cultural and historical contexts in which literature was written, and how
  these contexts influenced the themes, characters, and styles of literature.
