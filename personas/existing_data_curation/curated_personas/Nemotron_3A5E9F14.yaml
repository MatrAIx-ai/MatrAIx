  career_goals: Edwin aims to transition into a senior executive role, such as Vice President of Operations, where he can shape company‑wide sustainability initiatives and drive digital transformation across
    multiple facilities. He is passionate about creating mentorship pipelines for emerging Latino managers, intending to launch a community‑focused leadership program within the next two years. In the longer
    term, he envisions founding an independent consultancy that helps small‑to‑mid‑size manufacturers adopt lean practices while preserving cultural identity in the workplace. His ambition is balanced with
    a desire to leave a legacy of operational excellence that also celebrates creativity and diversity.
