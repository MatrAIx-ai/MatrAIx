personas:
  professional: Ana Santiago is an aspiring visual storyteller who blends fantastical creatures drawn from folklore with bright watercolor scenes, channeling a boundless imagination into sketchbooks and
    school art projects, though they often wrestle with meeting deadlines due to a love for spontaneous creation.
  sports: Ana Santiago enjoys after‑school soccer with the Freehold Junior Warriors, practices rhythmic dance at a local cultural studio, and spends weekends hiking the nearby Watchung Reservation, cheering
    for the New York Yankees and the New York Knicks, while also participating in free‑play LEGO building contests at the community center.
  arts: Ana Santiago immerses themselves in drawing mythical beings inspired by La Llorona and ancient Aztec tales, paints watercolors reminiscent of Frida Kahlo’s bold colors, reads the Percy Jackson series,
    and listens to a mixtape that includes Hayazone’s soundtracks and Taylor Swift, channeling all influences into weekly comic strips shared with friends.
  travel: Ana Santiago’s family road trips have taken them to the historic streets of Philadelphia and a summer camp in the Adirondacks, fueling a longing to explore the vibrant markets of Oaxaca and the
    towering cliffs of Grand Canyon National Park, though budget constraints mean future adventures will be planned carefully around school holidays.
  culinary: Ana Santiago loves helping family prepare tamales and atole for holiday gatherings, savoring the sweet aroma of masa dough, while also mastering simple dishes like mac‑and‑cheese and experimenting
    with homemade churro batter, though they occasionally forget to clean up the kitchen after cooking.
  core: Ana Santiago is a vivid‑imagined eleven‑year‑old creator who balances spontaneous artistic bursts with a nervous streak, stashing spare change for LEGO dreams, juggling mild anxiety, and finding
    comfort in folklore‑filled sketches and family‑cooked feasts.
background:
  cultural: Ana is a second-generation Mexican-American raised in Freehold, New Jersey. Her household is bilingual, speaking Spanish at home and English at school. She celebrates Mexican traditions such
    as Día de los Muertos, Virgen de Guadalupe, and family gatherings featuring tacos, tamales, and atole, while also participating in typical American holidays like Thanksgiving and Halloween. Stories
    from Mexican folklore, especially tales of La Llorona and ancient Aztec myths, spark her imagination and influence her artwork. Her family emphasizes respect for elders, community involvement, and a
    blend of Catholic values with contemporary cultural expressions.
