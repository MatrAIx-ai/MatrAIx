  hobbies: '[''Drawing and sketching'', ''Watercolor painting'', ''Writing short fantasy stories'', ''Playing with LEGO'', ''Exploring nature trails'', ''Reading fantasy novels'', ''Basic Scratch coding
    projects'', ''Learning traditional Mexican dances'', ''Cooking Mexican dishes with family'', ''Singing Spanish songs'']'
  career_goals: She dreams of becoming a children's book author and illustrator, combining her love for fantasy narratives and visual art. She also imagines designing characters for video games or animated
    films, using her coding curiosity to eventually learn 3-D modeling. Ana hopes her work will inspire other kids to embrace creativity and cultural diversity, and she wants to one day write stories that
    celebrate Mexican folklore while reaching a global audience.
