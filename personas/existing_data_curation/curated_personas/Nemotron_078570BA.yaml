  hobbies: '[''Vegetable gardening'', ''Cooking Vietnamese cuisine'', ''Reading historical fiction'', ''Puzzle solving'', ''Tai Chi'', ''Volunteer tax assistance'']'
  career_goals: Myong aims to earn her Certified Public Accountant (CPA) designation within the next two years to formalize her expertise and open pathways to senior leadership. She aspires to become a
    senior audit manager overseeing a small team, where she can drive process improvements through automation and data analytics. She is motivated to mentor junior accountants, especially those from underrepresented
    backgrounds, and to specialize further in nonprofit and small-business accounting, positioning herself as a trusted advisor for community organizations. Long-term, she envisions transitioning into a
    consulting role that leverages her structured, results-oriented mindset to help firms strengthen financial controls and compliance frameworks.
