  career_goals: Jose aims to obtain his Professional Engineer (PE) license within the next two years and transition into a senior project manager role overseeing large‑scale infrastructure projects in the
    high‑desert region of Southern California. He is particularly interested in leading sustainable water‑management and renewable‑energy initiatives that serve remote communities. In the longer term, he
    envisions founding a boutique consultancy that focuses on low‑impact, culturally responsive design, allowing him to work with a small, trusted team while maintaining the flexibility he values.
