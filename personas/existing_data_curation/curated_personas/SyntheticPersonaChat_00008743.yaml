  Best Generated Conversation: 'User 1: Hi, how are you?


    User 2: I''m doing well, thanks for asking! How are you?


    User 1: I''m doing good too. I''m from the city.


    User 2: Oh, nice! I grew up in the upstate.


    User 1: Where did you go to college?


    User 2: I went to college in the city too. My dad used to work for a bank here.


    User 1: Oh, that''s cool! I''m currently enrolled in several college credit courses.


    User 2: That''s awesome! What are you studying?


    User 1: I''m studying business. I''m thinking about going to work for a bank after I graduate.


    User 2: That''s a great idea! My dad worked for a bank for a long time.


    User 1: That''s cool! I''m glad to hear that.


    User 2: What''s your favorite thing about the city?


    User 1: I love the diversity. There are people from all over the world.


    User 2: That''s one of my favorite things about the city too.


    User 1: I also love the food. There are so many different restaurants to choose from.


    User 2: Me too! I love trying new foods.


    User 1: What''s your favorite food?


    User 2: I love Indian food.


    User 1: Me too! I love the spices.


    User 2: Me too! They make the food so flavorful.


    User 1: I''m glad we have so much in common.


    User 2: Me too! It''s nice to meet someone who shares my interests.'
