personas:
  professional: Rosemarie Floresrodriguez is a budding kindergarten architect who eagerly assembles LEGO towers, balancing a boundless curiosity for new shapes with a practical preference for sturdy, easy‑to‑build
    blocks, and often leads their playgroup with a gentle, yet assertive, voice.
  sports: Rosemarie Floresrodriguez is a lively member of the Little Strikers soccer club, loves to chase a bright orange ball at the park, idolizes the local MLS team’s star forward, and occasionally attends
    community swimming lessons for a splash of variety.
  arts: Rosemarie Floresrodriguez is a crayon‑wielding storyteller who fills sketchbooks with unicorns and rainbows, sings along to Disney’s Frozen soundtrack, especially Let It Go, and admires the whimsical
    illustrations of Dr. Seuss.
  travel: Rosemarie Floresrodriguez is a tiny explorer who cherishes trips to Grandma’s countryside cottage, dreams of visiting Disneyland for a day, and prefers spontaneous, short drives over meticulously
    planned vacations.
  culinary: Rosemarie Floresrodriguez is a picky yet adventurous eater who devours chicken nuggets with honey‑mustard, treasures strawberry‑topped pancakes on weekend mornings, and enjoys helping stir avocado‑based
    guacamole while occasionally sneaking a spoonful of chocolate spread.
  core: Rosemarie Floresrodriguez is a curious five‑year‑old who balances imaginative play with occasional messiness, hoards stickers, loves nap time, and can be both shy and surprisingly bossy when choosing
    games.
background:
  cultural: Rosemarie's family is of Mexican heritage, and she grows up in a bilingual household in Dayton, Texas, where Spanish and English are spoken daily. She participates in cultural traditions such
    as celebrating Día de los Muertos with crafts, enjoying family gatherings around traditional foods like tacos and tamales, and attending local community events that blend Mexican customs with Texas
    rural life. Her upbringing emphasizes close‑knit family bonds, respect for elders, and a warm, festive atmosphere.
