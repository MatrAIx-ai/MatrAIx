    educational resources'', ''Adaptive project management'']'
  hobbies: '[''Exploring local art galleries and museums'', ''Participating in community theater improv workshops'', ''Painting and mixed‑media art projects'', ''Hiking and nature photography in the Allegheny
    region'', ''Attending live music and folk festivals'', ''Organizing and joining group travel to cultural events'', ''Reading contemporary fiction and art theory'', ''Volunteering for community mural
    projects'', ''Cooking experimental cuisine with friends'', ''Playing cooperative board games and escape rooms'']'
  career_goals: Kira aims to transition into a senior leadership role—such as director of a regional early childhood education consortium or founder of a nonprofit focused on community arts education for
    children. She envisions scaling her arts‑integration model across multiple schools in western Pennsylvania, influencing state policy to prioritize creative learning, and securing sustainable funding
    through innovative grant strategies. Additionally, she hopes to become a recognized speaker at national early education conferences, sharing her spontaneous, learner‑centered approach and mentoring
    emerging educators who share her curiosity for the arts.
