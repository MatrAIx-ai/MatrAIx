personas:
  professional: Keyon Strong, a practical aspiring handyman with solid plumbing, electrical, and carpentry skills, is channeling his routine‑driven mindset into a home‑based service that leans on flexible
    scheduling—often at the cost of punctuality—while his competitive nature and mild skepticism of clients drive him to prove reliability even as his laid‑back attitude sometimes leads to disorganization.
  sports: Keyon Strong, a devoted fan of the Dallas Cowboys and the Boston Celtics who watches games nightly at the neighborhood sports bar, plays casually competitive pool at the community center’s league,
    and fits occasional cardio runs into his routine to stay fit, yet prefers low‑impact activities that fit his flexible schedule.
  arts: Keyon Strong, who finds solace in gospel legends like Mahalia Jackson and classic soul icons such as Marvin Gaye and Al Green, regularly sings in his church choir, curates a modest collection of
    vinyl records, and occasionally dabbles in songwriting during quiet evenings, using music as both a spiritual anchor and a competitive outlet when comparing playlists with friends.
  travel: Keyon Strong, who prefers budget‑friendly road trips that balance family time with personal reflection, often plans weekend getaways to nearby Asheville, North Carolina for mountain hikes and
    to New Orleans, Louisiana for the vibrant music scene, while dreaming of a longer pilgrimage to Savannah, Georgia’s historic districts and a future cross‑country drive to the Grand Canyon, yet his flexible
    approach sometimes leads to last‑minute itinerary changes.
  culinary: Keyon Strong, an enthusiastic home cook who harvests basil, rosemary, and sweet peppers from his modest garden to whip up herb‑infused grilled fish, roasted chicken with garlic‑and‑lemon, hearty
    sweet‑potato casserole, and family‑style chili seasoned with cumin and smoked paprika, enjoys occasional pot‑luck gatherings, yet sometimes forgets to rest the meat before serving, leading to occasional
    over‑cooked dishes.
  core: Keyon Strong, a routine‑loving, competitively spirited handyman‑in‑training who oscillates between meticulous garden care and occasional impulsive tool‑splurges, battles frequent anxiety while finding
    refuge in gospel music and community service, yet often misplaces his keys and forgets to water plants until a frantic over‑watering rescue saves them.
background:
  cultural: Keyon grew up in a close-knit African-American community in Dallas, Texas. His family traditions are rooted in Southern black culture, with a strong emphasis on church, family gatherings, and
    sharing home-cooked meals. He maintains cultural ties through regular attendance at his local Baptist church, celebrating holidays such as Juneteenth and Kwanzaa, and preserving oral histories shared
    by older relatives. The Dallas urban environment, combined with experiences navigating socioeconomic challenges, has shaped his pragmatic outlook and resilience.
