  skills: '[''home repair'', ''basic car maintenance'', ''home cooking'', ''household budgeting'', ''community event coordination'', ''mentoring youths'', ''gardening'']'
  hobbies: '[''watching football'', ''watching basketball'', ''backyard gardening'', ''listening to gospel and soul music'', ''playing pool'', ''participating in church choir'', ''community service volunteering'']'
  career_goals: Keyon hopes to obtain his GED within the next year, which would open opportunities for part-time or freelance work. He aspires to start a small home-based handyman service to leverage his
    practical skills, aiming to generate a steady supplemental income for his family. He also wants to improve his emotional wellbeing by attending counseling and learning stress-management techniques,
    which he believes will help him become more reliable and organized in both personal and professional settings. Long-term, he envisions establishing a modest, reputable business that allows him to balance
    work with his family responsibilities.
