persona_description: A researcher at Oak Ridge National Laboratory (ORNL) who specializes in the analysis and processing of large amounts of data, particularly in the field of neuroscience. The individual
  is working on developing software to automate the analysis of neuron migration and shape abnormalities in the brains and retinas of young mice, with the goal of predicting and preventing diseases like
  cancer and Alzheimer's and Parkinson's disease. The persona has expertise in image and computational analysis, and is collaborating with neuroscientists at St. Jude Children's Research Hospital to solve
  challenging problems in a unique way.
