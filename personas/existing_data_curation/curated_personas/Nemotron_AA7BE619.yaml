  career_goals: Even at 82, Scott aims to remain a cornerstone of Lufkin’s social fabric. He plans to expand his mentorship of younger volunteers at the local senior center, document his family’s genealogy
    in a self‑published booklet, and spearhead a quarterly “History and Heritage” gathering that showcases local stories. He also hopes to serve on the advisory board of the town’s historic preservation
    committee, ensuring that the town’s past is celebrated while fostering future community projects.
