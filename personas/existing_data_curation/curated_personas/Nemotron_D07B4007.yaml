personas:
  professional: Hang Truong, a 22‑year‑old aspiring program coordinator, combines a knack for public‑speaking, bilingual outreach, and spontaneous event planning into a career goal of curating inclusive
    museum exhibitions and running a freelance creative studio for cultural NGOs.
  sports: Hang Truong, a 22‑year‑old outdoor enthusiast, spends weekends hiking the Lowcountry trails, joins a pick‑up soccer group that cheers for the Charleston Battery, and follows the South Carolina
    Gamecocks football team, preferring low‑key fitness over a structured gym routine.
  arts: Hang Truong, a 22‑year‑old street‑photographer, spends free time roaming Charleston’s mural districts, curates an Instagram feed of local art, reads graphic novels like “Saga” and “Watchmen,” attends
    indie film screenings at the Firefly Cinema, and participates in open‑mic poetry slams and improv workshops, drawing inspiration from artists such as Shepard Fairey and Banksy.
  travel: Hang Truong, a 22‑year‑old spontaneous traveler, favors weekend road trips to nearby cities like Savannah and Asheville, dreams of exploring Hanoi and Ho Chi Minh City, books budget‑friendly accommodations
    on Airbnb, shares travel snaps on Instagram, and balances wanderlust with limited student‑loan funds.
  culinary: Hang Truong, a 22‑year‑old home cook, loves perfecting pho broth with star anise and fish sauce, layering banh mi with pickled daikon and char‑grilled pork, and experimenting with Southern shrimp
    and grits, often hosting communal meals where friends sample a fusion of Vietnamese and Lowcountry flavors.
  core: Hang Truong, a 22‑year‑old charismatic cultural connector, flips from street‑photography to karaoke with equal enthusiasm, thrives on social spontaneity, yet battles mild disorganization and occasional
    procrastination.
background:
  cultural: Hang is a second-generation Vietnamese-American. His parents emigrated from Ho Chi Minh City in the late 1990s, and he grew up bilingual in Vietnamese and English. He celebrates traditional
    holidays such as Tết Nguyên Đán and the Mid-Autumn Festival with his family, while also embracing Southern customs like Charleston’s historic festivals and Southern hospitality. His upbringing blends
    Vietnamese values of family cohesion and respect for elders with the expressive, individualistic culture of the American South, giving him a unique cross-cultural perspective that informs his artistic
    interests and community work.
