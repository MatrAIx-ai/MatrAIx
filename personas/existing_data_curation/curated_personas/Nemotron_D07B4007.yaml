  career_goals: Hang wants to turn his passion for art and community into a career that lets him shape inclusive cultural experiences. Over the next five years he aims to secure a role as a program coordinator
    or associate curator at a museum or community arts center in Charleston, where he can design exhibitions highlighting Southeast Asian and Southern artistic narratives. He also dreams of launching a
    freelance creative studio offering social-media strategy, content creation, and event production for NGOs and cultural festivals, giving him the flexibility to travel, explore new art forms, and keep
    learning.
