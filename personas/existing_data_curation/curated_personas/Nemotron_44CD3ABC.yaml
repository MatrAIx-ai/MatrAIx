  hobbies: '[''LEGO building'', ''Scratch coding'', ''Reading science & adventure books'', ''Basketball'', ''Nature hikes and lake fishing'', ''School science club'', ''Community clean‑up projects'']'
  career_goals: Andrew aspires to become a scientist‑engineer who can invent practical solutions for everyday problems. He dreams of working on robotics or environmental projects that combine his curiosity
    about how things work with his desire to see tangible results. In the near future, he aims to deepen his coding skills, join science fairs, and earn a mentorship with a local engineer or STEM club.
