personas:
  professional: Andrew Davis is an aspiring young engineer who spends weekends building LEGO inventions, coding simple games in Scratch, and leading the school science club, constantly balancing imaginative
    curiosity with the practical step‑by‑step methods they've learned from community projects.
  sports: Andrew Davis dribbles for the Moorhead Cardinals youth basketball team, cheering for the Minnesota Timberwolves and Vikings while also enjoying late‑summer lake fishing trips, balancing team cooperation
    on the court with solo practice sessions that satisfy their need for both social interaction and alone time.
  arts: Andrew Davis dives into creative worlds by constructing detailed LEGO dioramas, devouring adventure novels by Rick Riordan and sci‑fi books by Andy Weir, and listening to pop hits from Taylor Swift
    and the folk tunes that often play at local fairs, letting their curiosity and practicality shape a unique blend of hands‑on artistry and literary appreciation.
  travel: Andrew Davis plans weekend road trips with a hand‑drawn map, frequently visiting the nearby Fargo art festival, camping at Itasca State Park, and dreaming of a class‑chaperoned excursion to Yellowstone,
    balancing meticulous itinerary prep with the spontaneous excitement of discovering hidden lakes.
  culinary: Andrew Davis prefers classic pizza slices, mac and cheese, and the smoky flavor of grilled corn at summer barbecues, yet can proudly claim the title of ‘s’mores champion’ after mastering the
    perfect melt of marshmallow, chocolate, and graham cracker during family camping trips, showing both a love for simple comfort foods and a budding willingness to experiment in the kitchen.
  core: Andrew Davis is a practical dreamer who builds LEGO worlds, budgets allowance with kid‑friendly spreadsheets, handles hay fever like a pro, dominates the basketball court, reads adventure tales,
    plans trips on paper maps, and perfects s’mores—all while occasionally staying up late to code and forgetting bedtime.
background:
  cultural: Andrew comes from a middle‑class White family in Moorhead, Minnesota, where community values emphasize hard work, outdoor recreation, and support for public education. His family celebrates
    typical Midwestern holidays and traditions, such as Thanksgiving gatherings, summer barbecues, and local fairs. The region’s strong emphasis on teamwork, self‑reliance, and connection to nature shapes
    his outlook, encouraging both individual curiosity and practical responsibility.
attributes:
  skills: '[''Mathematics (basic algebra & problem solving)'', ''Science (earth & life sciences)'', ''Reading comprehension'', ''Basic coding with Scratch'', ''LEGO building and simple mechanical design'',
