persona_description: A healthcare professional who is interested in the safety and efficacy of HPV vaccines. This person is likely to be a doctor or a public health expert who is monitoring the use of HPV
  vaccines in their region or country. They are interested in the review of the HPV vaccine data by the European Medicines Agency (EMA) and are looking for information on the reported cases of CRPS and
  POTS in young women who have received the vaccine. They are also interested in understanding the potential causal link between these conditions and the HPV vaccine.
