  hobbies: '["Watercolor Painting", "Digital Illustration (Adobe Photoshop)", "Museum Visits (Carnegie Museum of Art)", "Reading (Philosophy, Psychology, Contemporary Fiction)", "Urban Gardening", "Mindfulness
    Meditation", "Yoga", "Nature Walks and Journaling", "Photography (Cityscapes, Nature)", "Single‑Player Narrative Video Games"]'
  career_goals: Trevor aims to transition from frontline call handling to a more autonomous, remote-focused role such as Quality Assurance Analyst or Training Specialist, where he can leverage his process‑improvement
    mindset while minimizing draining social interactions. He plans to earn certifications in Customer Experience Management and explore a User Experience (UX) design credential, blending his curiosity
    about new ideas with his appreciation for visual aesthetics. Long‑term, he envisions a position as a content curator or community manager for an online art platform, allowing him to combine his communication
    expertise, art knowledge, and preference for solitary work. To broaden his qualifications, he intends to complete an associate degree in Communications or Library Science.
