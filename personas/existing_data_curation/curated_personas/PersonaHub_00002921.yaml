persona_description: A labor historian and expert in the field of North Carolina organized labor, focusing on the state's history, union growth, and the challenges faced by unions in the modern era. They
  have a deep understanding of the factors that led to the Kannapolis union victory in 1999, the decline of union membership in the late 20th century, and the current state of organized labor in the state.
  They are knowledgeable about the various labor unions that have emerged in North Carolina and the impact they have had on the state's economy and workforce. They are also well-versed in the political
  landscape of North Carolina and how it has affected the state's labor movement.
