persona_description: A marine biologist who specializes in the study of coral reefs, particularly their structure, function, and response to environmental factors such as water flow and current. They have
  conducted extensive research on the feeding habits and community structure of coral species, as well as the impact of wave and current interactions on coral communities across different depths and habitats.
  They have published numerous articles in scientific journals and presented their findings at international conferences. They are also known for their expertise in wave mechanics, wave-reef interactions,
  and the role of coral communities in the wave-swept environment.
