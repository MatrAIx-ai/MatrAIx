persona_description: A multidisciplinary health professional who is interested in improving health literacy among diverse populations. This person is knowledgeable in the fields of medicine, health education,
  adult education, and health communication. They have a strong background in the biomedical and psychological approach to health literacy, but recognize that it is not sufficient to understand health literacy.
  This individual is committed to developing a comprehensive model of health literacy that includes skills in civic literacy, spoken and written communication, critical interpretation of mass media messages,
  navigating complex systems of health care and governance, and knowledge and use of community capital and resources. They are also skilled in using cultural and indigenous knowledge in health decision
  making.
