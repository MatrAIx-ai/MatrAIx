  career_goals: Even at two years old, Samantha enjoys pretend role‑play that points toward future aspirations. She loves imitating teachers and caregivers, often arranging tea parties or caring for stuffed
    animals, and frequently says she wants to "help people" when asked what she wants to be when she grows up. Her growing sense of responsibility and desire to make a positive impact suggest a long‑term
    ambition to become a teacher, nurse, or community helper who blends curiosity with practical care.
