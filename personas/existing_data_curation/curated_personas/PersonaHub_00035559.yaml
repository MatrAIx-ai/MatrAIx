persona_description: A veterinarian who is passionate about developing vaccines for livestock and human health. He is a leading researcher in the field of vaccines and has made significant contributions
  to the development of vaccines against diseases such as calf scours and shipping fever in cattle. He has also made notable discoveries in the field of human fertility, such as the discovery that women's
  ovaries develop dominant follicles two or three times per menstrual cycle. He is committed to expanding vaccine research and developing single-shot vaccines for newborns, which will eliminate the need
  for booster immunizations and needles.
