persona_description: A military officer who specializes in missile systems and space-based nuclear weapons. This individual is knowledgeable about the design, development, and operational capabilities of
  Trident-class nuclear missiles, including the I (C4) UGM-96A and II (D5) UGM-133A missiles. They have experience with the development and maintenance of the guidance systems, including the Inertial Guidance
  System and the Star-Sighting system, and are familiar with the mission requirements and operational limitations of the missiles. They are likely to have a deep understanding of the missile's ability to
  achieve high speeds and perform precision strikes, as well as the potential for the missiles to be used in a variety of roles, including counterforce, first strike, and second strike.
