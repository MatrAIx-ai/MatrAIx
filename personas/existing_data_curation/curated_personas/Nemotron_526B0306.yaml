  career_goals: Kimberly dreams of one day working as a marine biologist or a wildlife researcher, inspired by the beaches and marine life she encounters on the Florida coast. She also loves space stories
    and looks forward to possibly supporting scientific projects at the nearby Kennedy Space Center in a quiet, organized role. Her long‑term ambition is to combine her curiosity for the natural world with
    a practical desire to protect ecosystems, while working in small teams where she can contribute thoughtfully and responsibly.
