personas:
  professional: A budding junior naturalist and LEGO architect, Kimberly Moghadam blends curiosity about marine and outer‑space life with the practical steps of building models for school science fairs,
    delivering organized presentations that delight classmates while keeping a tidy workbench.
  sports: An enthusiastic shore‑side explorer, Kimberly Moghadam participates in the local Blue Wave Swim Team, cheerfully supports the hometown baseball club the River Runners, and prefers gentle jogs
    along the shoreline over competitive team sports.
  arts: A vivid illustrator, Kimberly Moghadam fills sketchbooks with watercolors of marine creatures and interstellar scenes, draws inspiration from Dr. Seuss and Eric Carle, and proudly displays LEGO
    sculptures alongside hand‑drawn postcards in a bedroom gallery.
  travel: An adventurous young traveler, Kimberly Moghadam has explored the nearby marine aquarium, taken a family road trip to a national park famous for tide pools, and dreams of visiting the Great Barrier
    Reef to see real coral reefs, always planning trips with a carefully colored map on their wall.
  culinary: A budding snack chef, Kimberly Moghadam enjoys assembling fruit‑kabob skewers of strawberries, banana slices, and grapes, loves the savory crunch of baked cheese‑filled mini‑quiches, and frequently
    experiments with "galactic" smoothies blending blueberries, spinach, and orange juice.
  core: Kimberly Moghadam is a curious, organized 7‑year‑old who balances imaginative creation with disciplined routines, delights in nature and science, and quietly excels in small‑group activities while
    occasionally misplacing socks during board‑game clean‑ups.
background:
  cultural: Kimberly is raised in a predominantly white, middle‑class family in Melbourne, Florida, a community shaped by its proximity to the Atlantic coast and the Space Coast heritage. Her daily life
    is influenced by the beach culture, local wildlife, and the excitement surrounding NASA’s nearby facilities. She attends a public elementary school where she experiences a mix of cultures typical of
    Brevard County, including occasional community festivals and multicultural events. While identifying as white American, she benefits from the region’s emphasis on outdoor activities, environmental awareness,
    and a supportive, collaborative school environment.
