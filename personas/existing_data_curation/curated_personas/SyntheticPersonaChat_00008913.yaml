data:
  user 1 personas: 'Since i have fibromyalgia , the harsher winters here in pa will be rough on me.

    I enjoy doing beadwork and writing my own patterns.

    I love reading.

    I grew up on a large farm.'
  user 2 personas: 'I am not married.

    I love basketball.

    I like to sing.

    I like to hunt.'
  Best Generated Conversation: 'User 1: I love doing beadwork. I''ve been doing it for years and I love coming up with new patterns.

