personas:
  professional: Ida Dubose is a computer systems analyst who blends rigorous data modeling with a love for artistic user experiences, turning business requirements into sleek Power BI dashboards while juggling
    a laid‑back, improvisational work style that often leads to last‑minute sprint planning and occasional missed deadlines.
  sports: Ida Dubose enjoys casual weekend basketball at the Bronx YMCA and follows the New York Knicks and Yankees avidly, participates in the Bronx River Runners running club for early‑morning jogs, yet
    their flexible schedule means gym sessions are sporadic and often swapped for a late‑night art opening.
  arts: Ida Dubose immerses themselves in the Bronx’s vibrant art scene, frequenting galleries showcasing works by Kehinde Wiley, catching experimental theater by The Public Theatre, streaming indie films
    by Ryan Coogler, strumming a ukulele to the chords of Jack Johnson while curating playlists that blend Kendrick Lamar, Kamasi Washington, and the Malian band Tinariwen.
  travel: Ida Dubose prefers spontaneous, budget‑friendly getaways, having road‑tripped to the historic streets of Washington, D.C., savored the street food of Jamaica during a family reunion, and explored
    the culinary delights of Bologna, Italy, while dreaming of future trips to Ghana to connect with ancestral roots and Japan to experience its cutting‑edge tech and tea ceremonies.
  culinary: Ida Dubose cooks at an intermediate level, reimagining classic soul‑food staples such as collard greens sautéed with smoked turkey and a hint of ginger, mac and cheese layered with truffle oil,
    and jerk chicken tacos topped with pickled plantains, all while sourcing fresh okra, Scotch bonnet peppers, and quinoa to fuse tradition with contemporary flavors.
  core: Ida Dubose is a creatively curious systems analyst who balances artistic flair with a laid‑back, sometimes disorganized workflow, often losing track of appointments but never missing a chance to
    remix a playlist or experiment with a new ukulele chord in the middle of a code review.
background:
  cultural: Ida Nicole is a second‑generation African American who grew up in the Bronx, a neighborhood rich in cultural diversity and artistic expression. Her family blends Southern U.S. traditions with
    Caribbean influences, celebrating occasions such as Juneteenth, Kwanzaa, and family reunions that feature storytelling, music, and food. She remains connected to a close‑knit church community that emphasizes
    service and fellowship. The vibrant hip‑hop scene and historic legacy of the Harlem Renaissance inform her appreciation for creative expression, while her upbringing in a supportive, cooperative family
    nurtured her values of harmony, kindness, and community responsibility.
attributes:
  skills: '[''Systems analysis'', ''Requirements gathering'', ''Business process modeling'', ''SQL and relational database management'', ''Data visualization (Power BI, Tableau)'', ''Python scripting'',
    ''Bash scripting'', ''Network troubleshooting'', ''Technical documentation'', ''Agile methodology'', ''Stakeholder communication'', ''User experience design thinking'', ''Cross‑cultural communication'']'
  hobbies: '[''Visiting art galleries'', ''Exploring street‑art murals'', ''Attending experimental theater'', ''Reading speculative fiction'', ''Playing ukulele'', ''Cooking soul‑food'', ''Volunteering
    for STEM outreach'', ''Community gardening'', ''Curating eclectic music playlists'']'
  career_goals: Ida Nicole aims to advance to a senior systems analyst role where she can lead strategic technology initiatives that blend functional efficiency with creative user experiences. She aspires
    to become a solution architect or product manager focused on platforms that integrate art, culture, and technology, championing inclusive design for diverse user groups. Mentorship is central to her
    ambition; she plans to mentor junior analysts and support STEM outreach programs in the Bronx, helping underrepresented youth navigate tech careers. Ultimately, she hopes to influence organizational
    culture toward greater flexibility, empathy, and innovative problem solving.
