  career_goals: Andrea dreams of leveraging her love for technology and community to create real-world solutions. She aims to study engineering—particularly environmental or biomedical—so she can design
    affordable, sustainable products that address challenges faced by her neighborhood in Jackson. Alongside a technical career, she hopes to mentor younger students in coding and robotics, using her natural
    ability to explain concepts in an approachable way. Ultimately, she envisions a future where she can combine her practical mindset with her curiosity to drive innovation while giving back to her community.
