personas:
  professional: Andrea Lopez, a budding robotics enthusiast and sci-fi aficionado, channels curiosity and practicality into after-school STEM workshops by building simple robots and sketching characters
    for TikTok, and they often share tutorials with peers.
  sports: Andrea Lopez, an enthusiastic street-ball player at the neighborhood recreation center, spends afternoons shooting hoops with friends, follows the Los Angeles Lakers for NBA inspiration, and they
    occasionally join the school's co-ed basketball club.
  arts: Andrea Lopez, a digital-art creator on TikTok, blends the beats of Kendrick Lamar, gospel harmonies from Kirk Franklin, and the energy of Latin-pop star J Balvin while sketching sci-fi characters,
    and they often remix these influences into animated short clips.
  travel: Andrea Lopez, an adventurous teen, prefers spontaneous weekend road trips to nearby beaches like Galveston and occasional family vacations to Disney World, yet they dream of a future backpacking
    tour through Japan's anime districts such as Akihabara, balancing their love for familiar comfort with a craving for new cultures.
  culinary: Andrea Lopez, a budding home chef, fuses Southern soul food staples like fried chicken and collard greens with family-style tacos and homemade salsa, often perfecting a spicy mac and cheese
    for neighborhood potlucks, and they love experimenting with fresh cilantro and smoked paprika.
  core: Andrea Lopez is a curiosity-driven teen who juggles robots, rhymes, and recipes, thriving on flexibility but occasionally stumbling over disorganization, making every day a vibrant blend of tech,
    music, and community.
background:
  cultural: Andrea grew up in a close-knit Black community in Jackson, Mississippi, where the legacy of the civil-rights movement and the sounds of gospel and blues shape everyday life. Her family's surname,
    Lopez, reflects an Afro-Latina heritage; at home she hears Spanish interspersed with Southern colloquialisms and enjoys dishes that blend soul food staples like collard greens with Latino flavors such
    as arroz con pollo. Church gatherings, Juneteenth celebrations, and local festivals provide a rhythm of community service and cultural pride that Andrea embraces. These layered traditions foster her
    appreciation for both her African-American roots and her Hispanic lineage, influencing her worldview, food, music, and the values of resilience and relational solidarity she carries forward.
