  career_goals: Roman aims to transition from being a contractor to establishing his own boutique finishing firm that specializes in high‑end interior murals and custom finishes for boutique hotels and
    historic homes in Cincinnati. He is driven to achieve master‑level certification, mentor emerging painters, and integrate his love for art by collaborating with local artists on signature projects.
    Long‑term, he hopes to build a reputation for unparalleled quality, enabling him to secure commissions that blend functional craftsmanship with fine art.
