personas:
  professional: Roman Hawkins, a veteran residential painter and wallpaper installer, leverages meticulous organization and deep color theory expertise to deliver high‑end interior murals and custom finishes
    for boutique hotels and historic Cincinnati homes, while mentoring apprentices and collaborating with local artists on signature projects.
  sports: Roman Hawkins supports the Cincinnati Bengals and Reds, joins a weekend adult pick‑up soccer game at a local park, and winds down with early morning jogs along the Ohio River trail, using these
    activities as a balance to his hands‑on painting work.
  arts: Roman Hawkins channels his love for art through oil paintings of river landscapes, sketches of downtown street murals, curates a personal collection of Miles Davis and B.B. King albums, and leads
    youth workshops where participants emulate techniques of Monet and Basquiat.
  travel: Roman Hawkins travels purposefully, taking weekend road trips to historic towns like Asheville for inspiration, planning annual visits to Florence’s Uffizi to study Renaissance frescoes, yet prioritizes
    family time, so longer vacations are limited to two weeks each year.
  culinary: Roman Hawkins enjoys a palate rooted in Midwestern comfort, often cooking herb‑roasted chicken with rosemary and thyme, adding a side of beet and goat cheese salad, and pairing meals with a
    glass of local Pinot Gris while listening to blues records.
  core: Roman Hawkins blends disciplined craftsmanship with an artistic soul, turning every wall into a canvas while keeping a tight budget, health routine, and a garden balcony as his quiet sanctuary.
background:
  cultural: Roman grew up in Cincinnati’s historically African‑American West End neighborhoods, where church, music, and community activism shaped his worldview. His family traced roots back to the Great
    Migration, blending Southern traditions with Midwestern urban culture. He maintains strong ties to local Black cultural institutions, celebrates Juneteenth, and draws inspiration from the city’s rich
    tapestry of Black artists and musicians. This heritage informs both his disciplined work ethic and his appreciation for artistic expression, fostering a sense of responsibility to give back through
    mentorship and community art initiatives.
