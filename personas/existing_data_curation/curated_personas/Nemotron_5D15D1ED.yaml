    Production (Ableton Live)", "Data Analysis (Pandas, NumPy)", "Machine Learning basics (TensorFlow, PyTorch)"]'
  hobbies: '["Generative art (Processing, p5.js)", "Digital illustration", "Ambient music composition (synthesizer)", "Reading speculative fiction & philosophy", "Hiking in Pennsylvania countryside", "Birdwatching",
    "Tabletop RPGs with close friends", "Meditation and mindfulness", "Journaling", "Participating in indie game jams", "Exploring AR/VR prototypes", "Cooking experimental dishes"]'
  career_goals: Larry aims to become a senior engineer or technical lead on projects that fuse technology with art, such as AI‑driven generative‑design tools or indie game experiences. He dreams of launching
    his own small studio focused on experimental interactive art and hopes to mentor junior developers in creative coding. Over the next five years, he wants to contribute to open‑source libraries for generative
    media, speak at niche tech‑art conferences, and secure a patent for a novel algorithmic‑art platform. At the same time, he seeks a work environment that offers flexible hours and remote options to support
    his mental‑health needs and maintain a balanced lifestyle.
