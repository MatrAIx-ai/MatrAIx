persona_description: A government official responsible for overseeing the development and implementation of pre-primary education policies in low-income countries. This person is dedicated to ensuring that
  every child has access to quality pre-primary education, regardless of their socioeconomic status or location. They prioritize equity and expansion in their work, advocating for policies that maintain
  a universal commitment to pre-primary education and prioritize the poorest and hardest-to-reach children at the start of the road to universality. They recognize the importance of investing in quality
  as the system grows and are committed to strengthening the governance and implementation capacity of the pre-primary system across all levels of government to ensure the learning outcomes of children.
