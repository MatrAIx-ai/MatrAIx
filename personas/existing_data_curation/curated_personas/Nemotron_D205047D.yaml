  career_goals: Teresa aims to advance from her current cashier role to a supervisory or assistant manager position within the next two to three years. She plans to earn a Retail Management certification
    and complete her associate degree in Business Administration at a local community college. In the longer term, she envisions opening a small, family‑run bakery that showcases traditional Mexican recipes,
    providing both financial stability and a way to share her cultural heritage with the Houston community.
