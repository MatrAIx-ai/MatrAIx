personas:
  professional: Teresa Cubero, a diligent cashier at a busy retail store, leverages their fluency in English and Spanish, precise POS handling, and calm conflict‑resolution skills to keep the front line
    running like clockwork while eyeing a supervisory role within three years.
  sports: Teresa Cubero enjoys leisurely walks through Houston’s Hermann Park and occasional community yoga sessions, follows the local NBA team the Houston Rockets, and plays a casual pickup soccer league
    on weekends to stay active, while preferring low‑impact activities over high‑intensity sports.
  arts: Teresa Cubero finds solace in reading historical fiction by authors like Hilary Mantel and biographies of figures such as Frida Kahlo, and appreciates the soulful performances of singers like Natalia
    Lafourcade, often attending intimate live music shows at neighborhood venues.
  travel: Teresa Cubero favors short, well‑planned road trips to nearby cultural sites—such as the historic town of San Antonio and the Hill Country vineyards—while dreaming of a future culinary pilgrimage
    to a renowned southern culinary region celebrated for its traditional mole and corn dishes, balancing limited vacation days with family responsibilities.
  culinary: Teresa Cubero loves crafting tamales and enchiladas from scratch, meticulously seasoning each filling with chilies, corn masa, and aged cheese, while tending a balcony garden that supplies fresh
    cilantro, tomatillos, and jalapeños for their kitchen creations, and enjoys swapping recipes at local potluck gatherings.
  core: Teresa Cubero is a structured, community‑oriented 42‑year‑old who balances meticulous retail work with a passion for homemade comfort food, garden‑to‑table cooking, and quiet, purposeful hobbies,
    all while quietly plotting a bakery future.
background:
  cultural: Teresa is a Mexican‑American who grew up in a bilingual household in Houston. Her parents instilled strong Mexican traditions, celebrating holidays like Día de los Muertos and Cinco de Mayo
    with family gatherings, music, and homemade food. She attends a local Mexican Catholic church and participates in community festivals that keep her cultural ties vibrant. Spanish is spoken daily at
    home, shaping her communication style and reinforcing values of family, community, and harmony. These cultural influences inform her warm, cooperative demeanor and her desire to contribute positively
    to both the Mexican community and the broader Houston area.
