personas:
  professional: Naia Stephens, a veteran casino surveillance specialist with over three decades of experience operating CCTV systems, conducting real‑time threat detection, and preserving incident evidence,
    leverages their methodical, detail‑oriented mindset and competitive drive to design rigorous training programs, and they pursue a supervisory role within security to further shape operational standards.
  sports: Naia Stephens, an early‑morning walker on the Natchez Trace, is a devoted fan of the Memphis Grizzlies and the New Orleans Saints, participates in the Natchez Trail Walkers club for structured
    cardio, and occasionally joins a local senior softball league, approaching fitness with the same disciplined, pattern‑recognizing mindset they apply to surveillance work.
  arts: Naia Stephens, an avid consumer of classic detective cinema, regularly watches films starring Humphrey Bogart and Joan Crawford, collects mystery novels by Agatha Christie, enjoys the folk storytelling
    of Dolly Parton, and they channel their appreciation for craftsmanship into simple woodworking projects that echo the precision of a well‑cut film edit.
  travel: Naia Stephens prefers meticulously planned road trips to historic Southern towns such as Savannah, Georgia and Charleston, South Carolina, where they can explore antebellum architecture and garden
    markets, but balances this with occasional spontaneous visits to nearby state parks for quiet reflection, all while budgeting travel costs to protect their retirement savings.
  culinary: Naia Stephens, a confident home gardener, frequently prepares roasted vegetable medleys featuring heirloom tomatoes, zucchini, and fresh basil, enjoys making classic Southern dishes like shrimp
    and grits with locally sourced shrimp, and treats their wood‑carved cutting board as a prized kitchen tool, though they sometimes over‑season dishes in an effort to mask the blandness of a stressful
    day.
  core: Naia Stephens blends a disciplined, surveillance‑style precision with a solitary love of puzzles, gardening, and early‑morning walks, channeling anxiety into meticulous routines, and they occasionally
    indulge in high‑quality woodworking tools as a personal reward.
background:
  cultural: Naia grew up in rural Mississippi in a close‑knit white, Southern‑Baptist family. Her upbringing emphasized self‑reliance, respect for authority, and a strong sense of community, shaped by church
    gatherings, county fairs, and family meals featuring Southern cuisine. The local culture of modesty and privacy influences her preference for small, familiar social circles. While she values traditional
    Southern customs, her long career in the casino industry has exposed her to a broader, multicultural environment, prompting a pragmatic blend of hometown values with professional standards of safety
    and regulation.
