  career_goals: Naia aims to advance to a supervisory role within the casino’s security department, where she can design and implement structured training programs for new surveillance officers. She aspires
    to obtain a Certified Protection Officer (CPO) credential and eventually transition into a security manager position for the county’s sheriff office, leveraging her experience to improve community safety
    protocols. In the longer term, she envisions consulting for small-town gambling establishments, helping them develop rigorous surveillance procedures that minimize risk and ensure regulatory compliance.
