  hobbies: '[''Improv comedy'', ''Networking mixers'', ''Pickup basketball'', ''Hiking in the Black Hills'', ''Landscape photography'', ''Experimental cooking'', ''Reading business non-fiction'', ''Journaling'',
    ''Mindfulness meditation'', ''Volunteering at local startup incubator'']'
  career_goals: Gerry’s immediate ambition is to secure tenure at his institution and, within the next five years, position himself as a leader in business education. He aims to design and launch an interdisciplinary
    program that combines traditional business strategy with emerging technologies such as AI and data science, reflecting his curiosity about new ideas balanced with practical applicability. He aspires
    to publish a textbook on strategic decision‑making and to become a sought‑after speaker at regional conferences, leveraging his sociable nature and competitive drive. Long‑term, Gerry envisions establishing
    a university‑affiliated entrepreneurship incubator in Sioux Falls, providing mentorship and consulting services to local startups, while continuing to refine his leadership skills and maintain his emotional
    well‑being through disciplined self‑care routines.
