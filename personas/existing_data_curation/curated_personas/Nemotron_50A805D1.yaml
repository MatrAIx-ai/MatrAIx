personas:
  professional: Gerry Garcia is a business professor whose strategic planning expertise and data‑driven mindset shape their dynamic classroom, where their charismatic improv flair makes lectures feel like
    performances and their competitive drive pushes students to excel while they meticulously align curriculum with evidence‑based methods.
  sports: Gerry Garcia’s athletic outlet centers on pickup basketball games at the local community gym where they compete fiercely, and on weekend hikes through the Black Hills, while they cheer for the
    Sioux Falls Skyforce and track the Minnesota Timberwolves, balancing a love of competition with a respect for the outdoors.
  arts: 'Gerry Garcia blends performance art with visual storytelling: they regularly take the stage at city improv nights, devour the sharp wit of John Mulaney, and capture prairie sunsets with a DSLR,
    often citing photographer Ansel Adams for composition inspiration and finding solace in the lyrical piano works of Ludovico Einaudi.'
  travel: Gerry Garcia is a weekend explorer who has trekked the Black Hills, photographed the dunes of Great Sand Dunes National Park, and dreams of backpacking Norway’s fjords, and they prefer meticulously
    planned itineraries that balance adventure hikes with short urban cultural stops in places like Austin and Portland.
  culinary: Gerry Garcia experiments in the kitchen with balanced fusion dishes such as quinoa‑crusted salmon topped with miso glaze, beet‑goat cheese salads, and spicy Korean‑style kimchi tacos, favoring
    fresh herbs like cilantro and dill while still relying on a well‑stocked pantry of olive oil, smoked paprika, and sriracha for quick flavor boosts, and they enjoy pairing meals with crisp Riesling or
    craft IPA.
  core: Gerry Garcia channels competitive curiosity into every facet of life, from data‑driven teaching and strategic investing to high‑energy improv, all while wrestling with intense anxiety that fuels
    both meticulous planning and occasional impulsive splurges.
background:
  cultural: Gerry grew up in a midsize town on the border of Iowa and Minnesota in a middle‑class, Protestant family that prized hard work, modesty, and community involvement. The Midwestern cultural milieu—marked
    by practical problem‑solving, a straightforward communication style, and a strong sense of regional pride—has shaped his organized, reliability‑driven outlook. Living now in Sioux Falls, he embraces
    the city’s blend of small‑town friendliness and growing entrepreneurial spirit, often participating in local events that honor the area’s Sioux heritage while also fostering a diverse student community.
    His cultural background instills in him a pragmatic approach to ideas, a competitive drive to succeed, and a deep appreciation for collaborative, face‑to‑face interaction.
attributes:
  skills: '[''Strategic planning'', ''Financial analysis'', ''Data analytics'', ''Curriculum development'', ''Instructional design'', ''Project management'', ''Budgeting'', ''Stakeholder negotiation'',
