personas:
  professional: Zavian Love, a diligent janitorial specialist with a talent for eco‑friendly facility upkeep, leverages their meticulous time‑management and art‑preservation knowledge to keep gallery spaces
    spotless while eyeing a supervisory role in museum facilities management, and they consistently seek opportunities to blend sustainability with artistic stewardship.
  sports: Zavian Love, a casual fan of the Philadelphia Eagles and the Baltimore Orioles, participates in a local adult swim league at the Seaford community pool and joins a weekend running club that meets
    at the nearby beach, balancing solo cardio workouts with occasional pick‑up basketball games at a friends’ garage, and they relish the occasional post‑game discussion with fellow enthusiasts.
  arts: Zavian Love, an avid visitor to the Delaware Art Museum, draws inspiration from the brushwork of Winslow Homer, the improvisational spirit of Miles Davis, the soulful vocals of Aretha Franklin,
    and the lyrical flow of Kendrick Lamar, while frequently photographing street murals by local artists such as the anonymous ‘Muralist X’ and attending intimate jazz trio shows at a neighborhood speakeasy,
    and they often incorporate these influences into their own watercolor sketches.
  travel: Zavian Love prefers low‑budget, purpose‑driven trips that combine museum tours and coastal hikes, having explored Philadelphia’s historic art districts, taken a weekend road trip to Savannah’s
    riverfront, and dreaming of a future study tour of the National Museum of Modern Art in Kyoto, all while balancing a tight student schedule and a modest cleaning‑job income, and they always keep a small
    sketchbook handy to capture spontaneous scenes.
  culinary: Zavian Love enjoys cooking simple yet sustainable dishes like Chesapeake crab cakes with homemade remoulade, a seasonal vegetable stir‑fry using locally sourced produce, and occasional gumbo‑inspired
    bowls, while their skill level sits at confident home‑cook who experiments with spice blends but they often forget to clean the cutting board promptly.
  core: Zavian Love is a quietly ambitious art‑loving janitor who channels curiosity into meticulous facility care, eco‑friendly habits, and a penchant for late‑night sketching, all while they juggle modest
    finances and an occasional tendency to over‑indulge in watercolor supplies.
background:
  cultural: Zavian grew up in Seaford, Delaware, within a close‑knit African‑American community that blends Southern roots with Mid‑Atlantic coastal culture. His family’s traditions—Sunday church gatherings,
    storytelling, and celebrations of Black heritage—couched him in a strong sense of identity and communal responsibility. The region’s rich history, from the legacy of the Underground Railroad to contemporary
    Black artistic movements in nearby Philadelphia, has shaped his appreciation for cultural expression and social equity. He draws inspiration from both local gospel music and the broader African‑American
    artistic diaspora, and he values inclusivity, resilience, and the pursuit of knowledge passed down through family and community mentors.
attributes:
  skills: '["Commercial cleaning", "Building maintenance", "Health & safety compliance", "Time management", "Problem solving", "Basic digital literacy", "Art handling basics", "Customer service", "Team
    collaboration"]'
  hobbies: '["Sketching", "Watercolor painting", "Visiting galleries", "Reading African American history", "Listening to jazz and hip‑hop", "Photography", "Beach walking", "Board‑game nights", "Volunteering
    at community art events"]'
  career_goals: He aims to advance from entry‑level janitorial work to a supervisory role in facilities management within the next three to five years, pursuing an associate degree in Facility Operations
    or Environmental Safety. Zavian is particularly interested in working for cultural institutions—such as museums, galleries, or community arts centers—where he can combine his cleaning expertise with
    his appreciation for art. In the longer term, he dreams of launching his own eco‑friendly cleaning service that serves local businesses and arts venues, emphasizing sustainable practices and culturally
    inclusive hiring.
