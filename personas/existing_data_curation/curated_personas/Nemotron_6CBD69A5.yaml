  hobbies: '[''gardening'', ''woodworking'', ''fishing'', ''DIY home improvement'', ''reading non-fiction'', ''attending high school football games'', ''cycling'', ''volunteering at the community center'',
    ''playing strategy board games'']'
  career_goals: Over the next several years Jason aims to move into a senior leadership role such as plant manager or regional operations manager, allowing him to shape larger strategic initiatives while
    preserving the orderly environment he values. He plans to complete a Lean Six Sigma Green Belt certification and lead a company‑wide waste‑reduction project targeting a 15 % reduction in non‑value‑added
    activities. Additionally, he seeks to mentor emerging supervisors, develop a formal succession plan for his department, and build a modest rental property portfolio to secure financial stability for
    his family.
