  hobbies: '[''Intramural basketball'', ''Gym workouts (routine cardio and weight training)'', ''Fishing trips with friends'', ''Volunteering at Jacksonville food bank'', ''Weekly church youth group activities'',
    ''Watching NFL games'', ''Listening to classic rock music'', ''Playing online multiplayer video games'', ''Reading practical self‑help books'', ''Journaling for stress management'']'
  career_goals: Edwin aims to solidify his position as a top‑performing sales agent by obtaining his Series 6 and Series 63 licenses within the next year and eventually advancing to a Series 7 certification.
    He envisions growing his client base through trustworthy, routine-driven service, with the long‑term goal of transitioning into a licensed financial advisor role where he can provide comprehensive portfolio
    guidance. Over the next five years, Edwin hopes to assume a team‑leadership position, mentoring new agents while continuing his own education through an associate degree in finance or relevant certifications.
    Ultimately, he seeks financial stability, the ability to purchase a home in Jacksonville, and a balanced life that allows him to manage his stress effectively.
