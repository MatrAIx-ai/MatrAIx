personas:
  professional: Romina Perez is a bilingual development specialist at a leading nonprofit, renowned for designing meticulous fundraising plans and persuasive grant proposals while balancing her preference
    for structure with a relaxed tolerance for last‑minute changes, and she leverages her collaborative style to bridge cultural gaps with donor communities.
  sports: Romina Perez enjoys strolling along Rockaway Beach for cardio, practices gentle yoga three times a week, follows the New York Knicks and New York City FC, and participates in a local community
    cycling club that meets on weekends, preferring low‑impact activities over competitive sports.
  arts: Romina Perez is an avid listener of cumbia and vallenato legends like Carlos Vives and Diomedes Díaz, a regular at neighborhood salsa gatherings, a devoted reader of contemporary Latin American
    authors such as Valeria Luiselli and Daniel Alarcón, and she often revisits the films of Alfonso Cuarón for artistic inspiration.
  travel: Romina Perez loves weekend getaways to the historic streets of Cartagena and the vibrant markets of Oaxaca, dreams of strolling through the lavender fields of Provence, and enjoys day trips to
    nearby Fire Island for beach yoga, balancing her travel plans with family responsibilities and a modest budget.
  culinary: Romina Perez, a confident home cook, delights in preparing arepas with queso fresco, empanadas stuffed with seasoned beef, and hearty sancocho simmered with yucca and corn, while her balcony
    garden yields fresh cilantro, oregano, and rosemary that she seasons into every meal, and she occasionally experiments with fusion twists like avocado lime salsa for classic dishes.
  core: Romina Perez blends structured fundraising expertise with a relaxed, family‑focused lifestyle, habitually juggling meticulous budgets while occasionally misplacing her yoga mat, and she cherishes
    quiet moments gardening and humming cumbia melodies.
background:
  cultural: Romina was raised in a Colombian immigrant household in Queens, where Spanish was spoken at home and Colombian customs were celebrated. Family gatherings centered around food, music, and Catholic
    traditions, reinforcing values of hospitality, solidarity, and respect for elders. Her parents instilled a strong work ethic and pride in Colombian heritage, which she expresses through bilingual communication,
    participation in cultural festivals, and a commitment to supporting Latin‑American communities in New York. Living in Howard Beach, she balances her Colombian roots with the multicultural fabric of
    the city, drawing on both to inform her professional and personal life.
attributes:
  skills: '["strategic fundraising planning", "major gifts cultivation", "grant writing", "donor stewardship", "budget management", "data analysis and reporting", "bilingual communication (Spanish/English)",
    "community outreach", "event coordination", "conflict resolution"]'
  hobbies: '["cooking Colombian cuisine", "yoga and meditation", "reading Latin American literature", "salsa dancing (small group)", "gardening", "walking on the beach", "volunteering at community center",
    "listening to cumbia music"]'
  career_goals: Romina aims to advance to a senior development director or vice‑president of development role within a large nonprofit, leading multi‑million‑dollar capital campaigns that support underserved
    communities. She aspires to mentor emerging fundraisers, develop culturally responsive fundraising strategies, and eventually launch her own consultancy that helps organizations engage diverse donor
    bases while maintaining a flexible schedule that supports her family life.
