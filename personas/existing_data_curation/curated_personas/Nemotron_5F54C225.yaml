  career_goals: Donald aims to progress from a senior mechanical engineer to a lead design engineer within the next three years, targeting roles that allow him to shape product strategy while maintaining
    a structured, routine‑based workflow. He plans to obtain his Professional Engineer (PE) license and a PMP certification to enhance his credibility in both technical and managerial domains. Ultimately,
    he aspires to a department head position where he can drive competitive performance metrics, mentor a high‑performing team, and perhaps launch a side venture focused on custom automotive performance
    parts, leveraging his competitive drive to secure patents and industry recognition.
