personas:
  professional: Donald Khan is a senior mechanical engineer who translates routine‑driven processes into reliable product designs using SolidWorks, ANSYS, and lean manufacturing principles; they excel at
    leading design reviews, mentoring junior staff, and negotiating cross‑functional solutions, while their competitive skepticism continually pushes for efficiency gains.
  sports: Donald Khan plays intramural soccer and basketball every week, cheers for the LA Galaxy and the Los Angeles Dodgers, and maintains a disciplined gym routine focused on weightlifting and occasional
    jogging, treating each workout as a competitive match against personal performance metrics.
  arts: Donald Khan enjoys curating playlists that blend A.R. Rahman's film scores with Foo Fighters' rock anthems, attends live performances at the Pacific Amphitheatre featuring artists like Shankar‑Ehsaan‑Loy,
    and unwinds by binge‑watching Christopher Nolan’s films, allowing his love for rhythm and storytelling to balance his engineering precision.
  travel: Donald Khan prefers meticulously planned road trips in his restored classic Mustang, having already driven the Pacific Coast Highway from San Diego to Monterey, and he dreams of a future pilgrimage
    to Munich’s BMW museum and Japan’s Tsukuba Circuit to soak in automotive heritage, balancing his love for cultural festivals with a competitive desire to clock the fastest mile on each journey.
  culinary: Donald Khan is a confident home chef who regularly prepares butter chicken, sarson da saag, and chana masala using fresh ginger, garam masala, and mustard greens, often inviting friends over
    for a communal dhaba‑style feast where he proudly showcases his skillful balance of spice and technique.
  core: Donald Khan is a routine‑obsessed, socially magnetic engineer who channels competitive skepticism into both his career and classic‑car hobby, yet his habit of over‑analyzing stress triggers occasional
    sleepless nights.
background:
  cultural: Donald is a second‑generation South Asian American with Punjabi roots, raised in the vibrant, multicultural environment of Orange County. His family places a high value on education, discipline,
    and respect for tradition, celebrating festivals such as Diwali, Vaisakhi, and Eid while also embracing broader Californian culture. Bilingual in English and Punjabi, Donald navigates a blend of collectivist
    family expectations and the individualistic drive of his American upbringing. This dual heritage informs his practical, routine‑focused work ethic, his competitive ambition, and his commitment to maintaining
    strong community ties through cultural associations and family gatherings.
