  career_goals: In the near term, William aims to become a senior purchasing analyst, gaining certifications such as CPSM and pursuing advanced training in sustainable procurement. He plans to deepen his
    expertise in integrating emerging technologies—like AI‑driven demand forecasting—into the buying process. Long‑term, he envisions a leadership role as Procurement Director or Chief Supply Chain Officer,
    shaping corporate sourcing strategy around innovation, environmental responsibility, and ethical supplier partnerships. To support these ambitions, he intends to enroll in an MBA program with a focus
    on operations management.
