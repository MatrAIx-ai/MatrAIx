  hobbies: '[''reading historical fiction'', ''writing personal essays'', ''visiting art galleries and museums'', ''sketching and calligraphy'', ''indoor gardening (succulents, herbs)'', ''small book‑club
    gatherings'', ''yoga'', ''mindfulness meditation'', ''experimenting with cooking recipes'']'
  career_goals: Joyce aims to transition from her current cashier role into a supervisory position within retail, seeking additional training in management and team leadership. Long‑term, she hopes to leverage
    her humanities degree to enter museum education or community outreach, possibly obtaining a certification in museum studies. She aspires to achieve financial stability, purchase a modest home in Encino,
    and develop a freelance writing portfolio focused on cultural commentary and local arts. Balancing practicality with curiosity, Joyce plans to enroll in evening courses that blend administrative skill
    development with cultural program design.
