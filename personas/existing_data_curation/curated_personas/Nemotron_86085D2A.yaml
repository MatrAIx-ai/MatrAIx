  career_goals: Looking ahead, Darcus is focused on turning his hands‑on experience into formal credentials. He plans to earn a GED within the next year and pursue an associate‑level certification in Industrial
    Maintenance or CNC Machining to broaden his technical expertise. His immediate career goal is to secure a lead‑operator or shift‑supervisor position, where he can leverage his competitive drive to boost
    team performance and implement more efficient workflow standards. In the longer term, he aims to advance into plant management or launch a small automotive‑repair shop, using his mechanical aptitude
    and community connections to create a stable, higher‑earning future for his family.
