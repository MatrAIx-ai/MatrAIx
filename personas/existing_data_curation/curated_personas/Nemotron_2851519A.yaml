    computer literacy (email, word processing)'']'
  hobbies: '[''Garden tending (vegetable and native plants)'', ''Traditional Polynesian cooking'', ''Lakefront walking'', ''Small group cultural gatherings'', ''Listening to Polynesian music'', ''Ukulele
    practice'', ''Reading local newspaper & history books'', ''Model ship building'', ''Volunteer coordination for community events'', ''Budgeting and personal finance management'']'
  career_goals: Frank aims to deepen his role as a cultural mentor and community supporter while maintaining a structured, purposeful routine. He hopes to obtain a certification as a Home Health Aide to
    assist elderly community members, which aligns with his caring nature and desire for reliable, hands‑on work. He also plans to develop and lead a series of monthly cooking workshops that teach traditional
    Polynesian recipes to younger Chicago residents, preserving his heritage. Additionally, Frank aspires to expand his small garden into a community plot where he can share gardening knowledge and produce
    with neighbors. Over the next few years, he envisions volunteering as a peer counselor at the local community center, offering guidance rooted in his life experience. Ultimately, his ambition is to
    leave a lasting, harmonious impact on the Polynesian diaspora in Chicago, balancing personal growth with service.
