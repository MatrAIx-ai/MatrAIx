  career_goals: Dalila aims to transition from physically demanding line work to a mentorship and supervisory role that leverages her decades of field experience. She plans to obtain a BICSI Registered
    Telecommunications Drafter certification within the next year, solidifying her technical credentials. Her ambition includes establishing a part‑time consulting service that advises small Miami businesses
    on fiber‑to‑the‑home deployments and safety compliance. She also seeks to formalize an apprenticeship program at her company to systematically train the next generation of technicians, especially bilingual
    candidates. Ultimately, Dalila wants a balanced retirement that maintains a modest income, preserves her professional identity, and allows her to give back to the Nicaraguan‑Miami community.
