personas:
  professional: Norkys Blandon is an emerging indie producer and director who levers bilingual communication and Austin’s music network to turn raw concepts into polished visual stories, thriving on spontaneous
    collaborations while often scrambling to meet tight deadlines.
  sports: Norkys Blandon conquers the Texas Hill Country trails on weekends, gets cardio from salsa and bachata dancing, roots for Austin FC in MLS, follows the Austin Spurs in the G‑League, and occasionally
    joins a local hike‑and‑bike club for group fitness.
  arts: Norkys Blandon immerses herself in Austin’s live‑music scene on 6th Street, regularly attends shows by The Bright Light Social Hour and St. Vincent, hones improv skills at the Austin Improvisation
    Workshop, and mentors youth arts programs, letting those influences shape her documentary storytelling.
  travel: Norkys Blandon prefers spur‑of‑the‑moment road trips, camping under Hill Country stars and exploring New Mexico’s art towns, while dreaming of a week‑long cultural immersion in Barcelona, balancing
    limited student‑budget constraints with a craving for vibrant, music‑filled cities.
  culinary: Norkys Blandon experiments in the kitchen, reimagining family staples like chilaquiles with smoked chipotle and avocado crema, whipping up street‑style corn tostadas topped with Korean kimchi,
    and often grills carne asada while pairing dishes with Austin‑brewed craft ales.
  core: Norkys Blandon is a 23‑year‑old bilingual indie filmmaker who channels boundless social energy into spontaneous storytelling, impulsive spending, and a constant battle between creative chaos and
    looming deadlines.
background:
  cultural: Norkys grew up in a bilingual Mexican household in Austin, where family gatherings filled with Día de los Muertos celebrations and homemade tamales shaped her sense of identity. Her parents'
    immigrant experience instilled a deep respect for hard work and community solidarity, which she weaves into her storytelling. She actively participates in the city's Latino art scene, supports local
    cultural festivals, and often incorporates Mexican folklore and visual motifs into her film projects, reflecting a blend of traditional heritage and contemporary Texan culture.
attributes:
  skills: '[''script development'', ''storyboarding'', ''directing actors'', ''bilingual communication (English/Spanish)'', ''budgeting and cost control'', ''production planning'', ''team leadership'',
    ''creative problem solving'', ''network building in indie film community'', ''social media promotion'', ''post‑production coordination'', ''adaptability to spontaneous changes'']'
  hobbies: '[''live music concerts'', ''salsa and bachata dancing'', ''improv comedy workshops'', ''hiking in the Texas Hill Country'', ''cooking modern Mexican cuisine'', ''volunteering in youth arts programs'',
    ''yoga for stress relief'', ''journal writing'', ''photography of Austin street art'']'
  career_goals: Norkys aims to produce a feature‑length documentary that explores Mexican‑American identity and the intergenerational stories of her own family, targeting festivals like SXSW and Tribeca.
    She aspires to establish a boutique production company in Austin that mentors young Latino creators, secures streaming deals for culturally‑rich content, and eventually transitions into directing narrative
    feature films that blend her practical storytelling skills with bold, experimental visual approaches.
