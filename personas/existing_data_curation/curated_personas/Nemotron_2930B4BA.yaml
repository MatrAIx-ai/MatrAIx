personas:
  professional: Robert Thompson, a five-year-old preschooler, builds meticulously stacked block towers, demonstrating early spatial reasoning and an uncanny insistence on aligning each piece, which reflects
    their preference for structure and quiet confidence in small-group activities, while their occasional worries about new puzzles reveal sensitivity to stress.
  sports: Robert Thompson enjoys tee-ball with the Chillicothe Little League, practices kindergarten soccer drills at the community park, watches the Kansas City Chiefs on Sundays with their family, and
    prefers organized, predictable play over chaotic free-run, channeling their need for structure into disciplined practice sessions.
  arts: Robert Thompson loves drawing bright farm animals inspired by the illustrations in Eric Carle's 'The Very Hungry Caterpillar,' singing along to The Wiggles' 'Fruit Salad' during car rides, and quietly
    mimics folk lullabies their grandparents hum at church gatherings, which nurtures their creative side while respecting their reserved nature.
  travel: Robert Thompson prefers family road trips with clear itineraries, relishing visits to the St. Louis Zoo and the Kansas City Science Center, while feeling anxious about the unfamiliar noises of
    airports, so their parents often opt for nearby camping at the Ozark National Forest for weekend escapes that satisfy their sense of routine and curiosity.
  culinary: Robert Thompson favors comforting mac & cheese with extra cheddar, crunchy carrot sticks, and sweet corn dogs at the county fair, proudly assembles their own peanut-butter-and-jelly sandwiches,
    yet sometimes sneaks extra raisins into the mix, and they enjoy helping their mother stir batter for pancakes on weekend mornings.
  core: Robert Thompson, a five-year-old who thrives on routine and meticulous play, balances cautious curiosity with bouts of worry, channeling their quiet resilience into orderly block towers and purposeful
    savings.
background:
  cultural: Robert lives in Chillicothe, Missouri, a small Midwestern town in Livingston County known for its close‑knit community and agricultural heritage. His family follows typical Midwestern values
    that emphasize politeness, hard work, and community involvement. He attends a public preschool where small‑group activities are encouraged, and his family participates in the local church’s Sunday school
    program. Seasonal events such as the county fair, high school football games, and community picnics shape his social experiences. The region’s emphasis on routine, reliability, and modest ambitions
    aligns with Robert’s preference for structure and predictability.
