persona_description: A scholar and Egyptologist who specialized in the decipherment of the Egyptian language, visited Egyptian collections all over Europe and studied lithography and engraving. His work
  on the decipherment of the Egyptian language was influential and his study of Champollion's work on the Egyptian language was comprehensive. After the death of Champollion, Lepsius made a systematic study
  of his Grammaire égyptienne and expanded on Champollion's explanation of the use of alphabetic signs in hieroglyphic writing. His expedition to Egypt and Sudan in 1842 was significant and his publications,
  such as Denkmäler aus Aegypten und Aethiopien, were influential in the field of Egyptology. He was a respected figure in the German Archaeological Institute in Rome and Berlin and was the editor of the
  Zeitschrift für ägyptische Sprache und Altertumskunde.
