persona_description: A development studies scholar who is interested in the intersection of theory and practice in international development. They have a keen eye for identifying gaps and tensions between
  theory and reality, and are skilled at engaging in critical discussion and debate in a group. They have a deep understanding of the changing definitions and contexts of development over the course of
  the twentieth century, and are able to relate these shifting definitions to the changing contexts in which development interventions have occurred. They are also knowledgeable about the key theories and
  theorists in relation to international development, and are able to engage with debates on key substantive issues such as poverty, inequality, gender, and violence. They are also skilled at using empirically-formed
  analysis to identify gaps and tensions between theory and practice, and are able to formulate ideas based upon key readings.
