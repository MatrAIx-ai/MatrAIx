persona_description: A teacher who is interested in developing the interdisciplinary literacy skills of students across various disciplines, particularly in the areas of science, history, and literature.
  This person is dedicated to transforming teaching and learning by understanding the intentional design principles used to develop the 2020 Colorado Academic Standards. They are passionate about engaging
  students in the academic discipline while developing a voice as a member of that community, and they believe that disciplinary literacy is essential to being standards literate. This person is committed
  to teaching students to read, write, think, and communicate like a scientist, historian, writer, musician, artist, engineer, or mathematician, and they are skilled at navigating the diverse and global
  world in which students live.
