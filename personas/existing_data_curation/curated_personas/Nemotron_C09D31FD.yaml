  career_goals: Even at a young age, Ladonna dreams of growing up to help others in a structured setting. She often says she wants to become a teacher or a kindergarten aide because she loves reading picture
    books, enjoys a predictable classroom routine, and likes guiding little friends. She also imagines caring for animals as a veterinarian, reflecting her compassionate side, and hopes to have a job that
    lets her balance routine with creative play.
