  career_goals: Skyler aims to transition from informal consulting to a part‑time business advisory role, focusing on helping other small businesses in Richfield and the wider Sevier County area thrive.
    He plans to earn a Certified Business Coach credential within the next two years to formalize his expertise. Driven by his competitive spirit, he intends to launch a regional “Business Pitch Competition”
    that rewards innovative, community‑focused ideas. Skyler also hopes to develop a cooperative model for local farms and artisans, merging his curiosity about sustainable practices with practical implementation.
    On a personal level, he wants to strengthen his emotional resilience through therapy and mindfulness training, ensuring his high reactivity doesn’t impede his professional ambitions.
