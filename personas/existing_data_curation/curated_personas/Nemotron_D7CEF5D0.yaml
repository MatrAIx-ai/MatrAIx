personas:
  professional: Skyler Dugas is a seasoned business strategist who leverages their expertise in budgeting, Excel analysis, and community networking to provide part‑time advisory services to small enterprises,
    channeling their competitive drive into launching a regional pitch competition while balancing pragmatic solutions with a curiosity for sustainable cooperative models.
  sports: Skyler Dugas hits the red‑rock trails and nearby backroads on a mountain bike every weekend, dominates a local basketball league, roots for the Utah Jazz and follows the BYU Cougars football team,
    and volunteers as a timing official for the county’s summer triathlon, blending competitive spirit with a love for the outdoors.
  arts: Skyler Dugas strums a battered Fender Stratocaster in a garage band that covers classic rock staples like Led Zeppelin and Foo Fighters, frequents the town’s community theater for productions of
    "Our Town," and collects vintage concert posters from the 1970s, letting music and drama temper their analytical mind.
  travel: Skyler Dugas prefers adventure‑filled road trips, having already explored Zion, Moab, and a weekend getaway to Portland, Oregon, while dreaming of a bike‑packed itinerary through Patagonia and
    a cultural immersion tour of Kyoto, always budgeting trips to fit a middle‑aged family’s financial plan.
  culinary: Skyler Dugas experiments with smoky brisket rubs, caramelized pineapple pork ribs, and garden‑fresh roasted vegetables like heirloom carrots and kale, boasting a solid grilling skill set and
    a pantry stocked with hickory chips, hot sauces, and locally sourced honey, yet often forgets to log the calories after a weekend BBQ binge.
  core: Skyler Dugas is a competitive, community‑focused business coach who channels anxiety into meticulous planning, occasionally overcooks their BBQ and forgets sleep, but always finds balance between
    data‑driven pragmatism and a love for outdoor adventure.
background:
  cultural: Skyler is a white male raised in central Utah, where the cultural fabric blends western frontier values with a strong sense of community. He grew up in a small‑town environment that emphasized
    self‑reliance, modest religious participation, and active civic engagement, often through local clubs like 4‑H and the volunteer fire department. This background fostered his practical mindset, love
    of outdoor recreation, and commitment to helping neighbors succeed. While his upbringing was rooted in the traditions of the Intermountain West, Skyler’s business education introduced him to broader
    national trends, creating a cultural outlook that balances local heritage with an openness to new ideas.
