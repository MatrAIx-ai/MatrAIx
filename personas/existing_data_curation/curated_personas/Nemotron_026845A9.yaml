  career_goals: Kian aims to translate his imagination into a sustainable freelance career as a conceptual and visual artist, focusing on immersive installations that explore abstract ideas and mental‑health
    themes. He plans to earn a GED within the next year, then enroll in a community college certificate program for graphic design to formalize his skills. Long‑term, he hopes to open a small community
    art space in Detroit that offers workshops for youth, provides mental‑health resources through art, and showcases work by Black creators. He also aspires to collaborate with local mural collectives
    and eventually exhibit his work in galleries that celebrate avant‑garde African‑American art.
