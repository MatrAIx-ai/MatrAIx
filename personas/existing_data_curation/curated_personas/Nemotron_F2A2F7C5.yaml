personas:
  professional: Wanda Karam, a veteran secondary‑school business teacher with a graduate business degree, leverages their blend of curiosity and practicality to design project‑based curricula that weave
    educational technology and financial‑literacy modules, while their calm, sociable nature makes them a natural mentor and persuasive grant‑writer, positioning them for a future as department chair and
    district‑wide initiative leader.
  sports: Wanda Karam enjoys low‑impact fitness through gentle yoga, weekend walks with the Lancaster County Walking Club, dancing at community socials, and cheering on the Philadelphia Eagles, the Pittsburgh
    Steelers, and the Philadelphia Phillies, while also joining the senior bridge league at the local community center for mental conditioning.
  arts: Wanda Karam leads a lively book club that debates works by Toni Morrison, Margaret Atwood, and Chimamanda Ngozi Adichie, attends performances by the Philadelphia Theatre Company, delights in Joni
    Mitchell’s folk classics and the storytelling of Lin‑Manuel Miranda, and occasionally dabbles in watercolor landscapes inspired by Pennsylvania’s historic towns.
  travel: Wanda Karam prefers culturally immersive trips planned months in advance, relishes guided tours of historic sites like Gettysburg, the cobblestone streets of Florence, and the ancient ruins of
    Athens, balances their love for group travel with occasional solo weekend getaways to the Hudson Valley, and dreams of exploring the museums of Kyoto while staying within a modest travel budget.
  culinary: Wanda Karam cooks eclectic dishes such as Moroccan chicken tagine with preserved lemons, Korean bibimbap with gochujang, and classic Italian tiramisu, delights in sourcing fresh herbs, saffron,
    and miso at the local farmers’ market, and proudly hosts monthly dinner parties where friends sample the new recipes while they rehearse their bridge hands.
  core: Wanda Karam, the organized yet spontaneously curious 60‑year‑old educator, hoards color‑coded index cards of lesson ideas, occasionally forgets to water the garden when a rainstorm arrives, and
    can’t resist a good bridge round after dinner, where they delight in the friendly competition.
background:
  cultural: Wanda grew up in a middle‑class suburban environment in the Philadelphia region, shaped by the Mid‑Atlantic’s blend of Anglo‑American traditions and a strong emphasis on education, self‑reliance,
    and civic engagement. Her upbringing reflects the community‑oriented values of the local Pennsylvania Dutch and Quaker heritage, while embracing the multicultural vibrancy and volunteer spirit of Montgomery
    County.
