  hobbies: '[''Book club'', ''Community gardening'', ''Volunteer work'', ''Historic site tours'', ''Yoga'', ''Social dancing'', ''Cooking'', ''Travel'', ''Bridge'']'
  career_goals: Wanda aspires to become a department chair or instructional coach, lead a district‑wide business education initiative, create a mentorship program that connects students with local entrepreneurs,
    author a high‑school business textbook, and eventually transition to consulting for non‑profits while continuing to volunteer in her school community.
