  career_goals: Even at four, Lamont loves dreaming about big‑world jobs that mix adventure, helping others, and showing off his ideas. He often says he wants to be a firefighter because he admires the
    teamwork and the chance to protect his community, and he also talks about becoming an astronaut to explore space and bring back stories for other kids. In quieter moments, he imagines teaching a class
    of younger children, sharing his favorite songs and stories, which aligns with his sociable, attention‑seeking personality and his desire to turn curiosity into real‑world impact.
