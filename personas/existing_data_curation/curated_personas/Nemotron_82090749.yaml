  career_goals: Dennis aims to transition into EMS leadership within the next five years, targeting a role as a regional operations supervisor or a paramedic training coordinator. He plans to pursue a Master’s
    in Public Health with a focus on emergency management, and to develop a community outreach program that teaches basic life‑saving techniques to schools and senior centers. Long‑term, he envisions opening
    a small urgent‑care clinic in Bulloch County to bridge gaps in rural healthcare.
