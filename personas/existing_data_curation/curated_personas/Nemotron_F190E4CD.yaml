personas:
  professional: A methodical little organizer named Tara Everson spends hours arranging bookshelf rows of picture books and pretends to run a mini‑library, where their love for structure leads them to label
    each shelf and enforce quiet rules, and they enjoy the calm of the quiet library, reflecting a practical, responsibility‑oriented mindset even at five.
  sports: An enthusiastic junior athlete named Tara Everson participates in a local Tumble Tots gymnastics class, cheerfully follows the weekly practice schedule, and avidly watches Los Angeles Lakers games,
    proudly wearing a kids‑Lakers jersey while they prefer small‑group play over chaotic playground scrimmages.
  arts: An imaginative little creator named Tara Everson spends afternoons drawing Elsa from Frozen with perfectly aligned crayons, enjoys music from the Disney soundtrack, and occasionally pretends to
    stage puppet shows for a trusted circle of two friends, and they reveal a reserved yet expressive artistic side.
  travel: An organized explorer named Tara Everson loves family trips to the nearby beach where they build sand castles in a set pattern, dreams of visiting the Grand Canyon next summer, and prefers itineraries
    with clear daily activities rather than spontaneous wanderings.
  culinary: An particular palate owner named Tara Everson favors mac and cheese with extra cheddar, eagerly helps stir pancake batter using a tiny wooden spoon, and has a quirky habit of secretly adding
    a dash of cinnamon to their apple slices, and they indicate both comfort with familiar foods and occasional adventurous taste.
  core: Reserved, structured, and emotionally steady, Tara Everson is a five‑year‑old who thrives on routine, and they obsessively sort crayons, save pennies with precision, and balance quiet solo play
    with assertive bursts during small‑group activities.
background:
  cultural: Tara grows up in the small Midwestern town of Mascoutah, Illinois, in a typical White American family that values community, family meals, and church activities. Local traditions such as the
    annual county fair, seasonal harvest festivals, and holiday parades shape her experiences. Her family often participates in school events and church picnics, fostering a sense of belonging to a close‑knit,
    predominantly English‑speaking community with a touch of French‑Canadian heritage common in St. Clair County.
attributes:
