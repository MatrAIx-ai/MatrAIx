  hobbies: '["Building block towers", "Drawing and coloring", "Reading picture books", "Simple jigsaw puzzles", "Nature walks and leaf collecting", "Singing short songs", "One-on-one playdates"]'
  career_goals: Tara enjoys imagining a future where she helps others learn and cares for animals. She often says she wants to become a teacher in a small classroom because she likes structure and helping
    friends, and she also dreams of being a veterinarian to look after pets.
