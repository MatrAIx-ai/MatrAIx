persona_description: A healthcare educator who is dedicated to developing lifelong learning and critical thinking skills in emergency care providers, emphasizing the importance of self-directed, guided
  exploration of material and the ability to adapt and use knowledge in a dynamic environment. They recognize the limitations of direct teaching methods and advocate for student-centered education that
  focuses on acquiring and demonstrating knowledge, rather than simply acquiring it. They understand the importance of external support and guidance, but also recognize that successful responders learn
  and practice simultaneously with guidance until they can perform independently, sometimes even surpassing their instructor. They are interested in the development of students who want to know what will
  be on the test, rather than what will solve the real-world problem, and believe that the ultimate responsibility for performance lies with the student.
