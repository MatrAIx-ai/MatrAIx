  career_goals: Christina aims to transition from first‑line supervisor to store manager within the next 12‑18 months, focusing on elevating team engagement and implementing innovative experiential retail
    concepts. In the longer term, she aspires to become a district manager overseeing multiple locations, where she can champion data‑driven merchandising and sustainability initiatives across the chain.
    She plans to complete her Bachelor’s in Business Administration and pursue an MBA to deepen her strategic leadership capabilities. Additionally, she envisions launching a side venture—a boutique pop‑up
    that merges contemporary art installations with curated retail experiences—allowing her to blend her managerial expertise with her passion for art.
