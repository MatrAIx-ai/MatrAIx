persona_description: A behavioral leader who is interested in understanding the actions, or behaviors, that define a leader. This individual is likely to have a strong background in organizational psychology
  and is familiar with the work of Robert Blake and Jane Mouton, who developed the theory of behavioral leadership. They are interested in the different styles of leadership and how they can be effective
  in different workplace environments. They may also be interested in the differences between situational theories and behavioral leadership, and how behavioral leadership can better explain why a type
  of leader exists.
