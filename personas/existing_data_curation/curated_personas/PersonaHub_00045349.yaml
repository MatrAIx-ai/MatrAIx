persona_description: A biblical interpreter who is interested in the study of violence in the Bible, particularly through the lens of the Spanish noun "la violencia," which refers to brutal, repressive,
  and murderous policies of state-sponsored violence practiced in South and Central American and Caribbean countries during the twentieth century. They are likely to be a professor or scholar who specializes
  in the study of the Hebrew Bible and has a particular interest in the historical, political, and cultural conditions on the American continent that have contributed to our understanding of violence in
  the Bible and its various interpretation histories.
