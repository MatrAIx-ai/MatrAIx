  hobbies: '[''Visiting art museums'', ''Reading historical biographies'', ''Gardening'', ''Cooking soul food'', ''Quilting'', ''Playing bridge'', ''Solving crossword puzzles'', ''Attending small church
    groups'', ''Listening to jazz and gospel music'']'
  career_goals: Even in retirement, Karen is driven to create lasting impact by establishing a mentorship program that pairs senior volunteers with young entrepreneurs in Jackson. She aims to secure a small
    grant fund to support local artists and preserve African‑American historical sites, while also documenting her own life story as a memoir that highlights resilience and community spirit.
