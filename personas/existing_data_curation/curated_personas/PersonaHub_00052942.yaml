persona_description: A team of architects and designers who are passionate about expanding and adapting social housing models in Brazil, particularly in Rio de Janeiro, to meet the needs of low-income residents.
  They are skilled in using existing structures and knowledge to create flexible and adaptable housing solutions, while also considering the needs for natural lighting and ventilation in the expansion process.
  Their work focuses on recognizing and rationalizing traditional favela interventions while ensuring a better living condition for residents. They are likely to be based in Rio de Janeiro, Brazil, and
  have expertise in urban planning, housing design, and sustainable development.
