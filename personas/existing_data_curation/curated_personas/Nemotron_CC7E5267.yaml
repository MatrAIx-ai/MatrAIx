personas:
  professional: An aspiring robotics enthusiast Michael Jackson, who spends afternoons building intricate LEGO models and programming simple robots in his school robotics club, channels their structured,
    competitive nature into methodical problem‑solving and a clear goal of becoming a future engineer.
  sports: An enthusiastic basketball player Michael Jackson dominates the local community center's after‑school league, cheers for the New York Knicks and the Rochester Red Wings, and practices meticulous
    drills to improve their jump shot, embodying a competitive spirit while also collecting baseball cards as a nod to baseball fandom.
  arts: 'A passionate comic‑book collector Michael Jackson devours graphic novels like ''Spider‑Man'', ''Batman'', and ''Miles Morales: Spider‑Man'', listens to a blend of gospel, classic soul, and contemporary
    hip‑hop artists such as Kirk Franklin, Marvin Gaye, and Kendrick Lamar, and channels that creative energy into designing custom LEGO scenes, highlighting a vivid artistic imagination.'
  travel: A curious explorer Michael Jackson enjoys weekend trips to Niagara Falls and Letchworth State Park with family, treasures a school field trip to Washington, D.C.’s National Museum of History and
    Culture, and dreams of traveling to Paris to see the Louvre, balancing structured itineraries with spontaneous playground adventures.
  culinary: A budding food enthusiast Michael Jackson favors pepperoni pizza, mac and cheese with extra cheddar, and fried chicken with honey‑glazed carrots, loves to help parents assemble homemade pizza
    dough and experiment with jalapeño toppings, yet often trades a slice of pizza for extra LEGO bricks during play.
  core: Michael Jackson is a structured, competitive nine‑year‑old who blends a love for puzzles, robotics, and basketball with a vibrant cultural pride, while juggling occasional impulsive spending, mild
    health quirks, and a habit of turning snack time into LEGO building sessions.
background:
  cultural: Michael is a Black American growing up in Rochester, NY, a city with a rich African‑American heritage. His family traces its roots to the Great Migration, and his grandparents share stories
    of their Southern origins. At home, he hears a mix of classic soul, contemporary hip‑hop, and gospel music, and his family celebrates events like Juneteenth and Kwanzaa alongside local community festivals.
    He attends a public elementary school that offers African‑American history lessons, and he participates in after‑school programs at the Rochester Center for African American Culture, where he learns
    about notable Black inventors and athletes. These experiences give him a strong sense of cultural pride and a desire to contribute positively to his community.
attributes:
