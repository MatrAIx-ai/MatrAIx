  hobbies: '[''Playing basketball'', ''Building LEGO models'', ''Reading graphic novels'', ''Playing Minecraft'', ''Collecting baseball cards'', ''Robotics club (Scratch and LEGO Mindstorms)'', ''Solving
    puzzles and chess'']'
  career_goals: Michael dreams of becoming a robotics engineer who builds machines that help people, inspired by his love of LEGO Mindstorms and coding. He also imagines himself on the basketball court,
    hoping one day to play in the NBA, and sees both paths as ways to solve challenges and compete at a high level.
