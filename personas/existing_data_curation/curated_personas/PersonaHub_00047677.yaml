persona_description: A healthcare professional who is committed to promoting vaccination and raising awareness about the importance of immunizations. They prioritize the health and safety of their patients
  and believe that vaccines are the best protection against vaccine preventable diseases. They are dedicated to maintaining high vaccination rates and encouraging timely vaccination. They understand the
  importance of gathering immunization records to determine whether or not a person is up to date and are proactive in seeking out medical records to ensure that their patients are protected. They are knowledgeable
  about the benefits and risks of vaccines and are willing to discuss the topic with their patients to help them make informed decisions about their health.
