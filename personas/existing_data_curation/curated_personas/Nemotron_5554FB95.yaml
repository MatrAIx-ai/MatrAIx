personas:
  professional: Estela Quan, a bilingual community health worker in training with a solid background in nonprofit program coordination, blends their knack for meticulous event logistics, budget oversight,
    and first‑aid certification to design culturally resonant health‑education workshops for Spanish‑speaking residents of Iowa City.
  sports: Estela Quan channels their competitive edge into cheering for Atlético Nacional and the Iowa Hawkeyes while playing forward for the Iowa City Community Soccer Club’s co‑ed league, and they round
    out their fitness routine with weekend hikes on the Cedar River trail and occasional yoga sessions to stay limber.
  arts: Estela Quan immerses themselves in the arts by leading salsa and cumbia nights to the rhythm of Carlos Vives, devouring Agatha Christie mystery novels, hosting weekly board‑game marathons featuring
    titles like Pandemic, and attending local theater productions whenever the play Our Town runs at the Iowa City Playhouse.
  travel: Estela Quan, an itinerary‑obsessed traveler, alternates between spontaneous weekend trips to the Cascade waterfalls of Washington and meticulously planned cultural tours of Medellín and Cartagena,
    while budgeting to fit their love of both adventure hikes and family reunions in the Midwest.
  culinary: Estela Quan, an avid home chef, perfects classic dishes like bandeja paisa and arepas stuffed with queso fresco while experimenting with Midwestern staples like corn casserole spiced with cumin
    and plantain chips, and they never cook without cilantro, a dash of achiote, and a jar of homemade hogao sauce.
  core: Estela Quan balances a structured, goal‑driven mindset with a contagious love for dance, community, and spice, yet habitually forgets to water their garden until the last minute and can’t resist
    a late‑night board‑game session.
background:
  cultural: Born to Colombian parents, Estela grew up immersed in the rhythms, flavors, and family-oriented values of her heritage. At home, Spanish was the primary language, and celebrations like Carnaval,
    Día de los Reyes, and traditional Christmas feasts reinforced cultural ties. After moving to Iowa City, she blended these customs with Midwestern traditions, becoming an active bridge between the Colombian
    diaspora and the local community. Her bilingual fluency, love of Colombian music, and dedication to sharing cultural foods and dance embody her commitment to preserving her roots while fostering cross‑cultural
    understanding.
