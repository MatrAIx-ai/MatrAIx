  career_goals: Estela aims to re‑enter the workforce in a role that blends her passion for community service with her organizational strengths. She plans to complete a certification as a Community Health
    Worker, which would allow her to deliver health education in Spanish to underserved populations in Iowa City. Simultaneously, she is exploring the launch of a modest home‑based catering business that
    specializes in Colombian comfort food, hoping to serve local events and cultural festivals. Over the next five years, she envisions growing this venture while maintaining a part‑time position in nonprofit
    program coordination, leveraging her competitive drive to achieve measurable impact.
