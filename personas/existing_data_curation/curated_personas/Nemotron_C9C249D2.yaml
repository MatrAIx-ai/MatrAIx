  career_goals: Albert aims to progress to a senior portfolio manager role within his bank, eventually overseeing a regional loan operations team. He plans to earn a Certified Financial Planner (CFP) designation
    to deepen his advisory credentials and to develop a niche expertise in small‑business lending for the Central Florida market. Long‑term, he hopes to mentor junior loan officers, contribute to community‑focused
    financial education programs, and potentially launch his own boutique consulting firm that supports local entrepreneurs with structured financing solutions.
