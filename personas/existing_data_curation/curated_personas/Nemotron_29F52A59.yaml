personas:
  professional: Shannon Taylor is a retired community‑volunteer coordinator who channels their disciplined project‑management skills, archival research expertise, and quiet curiosity into launching a town‑wide
    art exhibition series and a volunteer‑run oral‑history archive, while mentoring younger volunteers and seeking a modest grant from the county historical society.
  sports: Shannon Taylor follows the Tampa Bay Rays in baseball, the Florida Gators in college football, and the Miami Heat in basketball, participates in the Old Town Senior Strollers walking club that
    meets thrice weekly, and they occasionally join a low‑impact water‑ aerobics class at the community center for joint health.
  arts: Shannon Taylor’s artistic life blends watercolor landscapes of native Floridian flora, meticulous quilting inspired by Georgia O’Keeffe’s bold colors, admiration for Monet’s impressionist techniques,
    and regular attendance at local workshops featuring artist Mary Lark, while they keep a collection of vinyl recordings by Ella Fitzgerald and Billie Holiday for creative inspiration.
  travel: Shannon Taylor’s travel style favors meticulously planned weekend road trips to historic sites such as St. Augustine’s colonial district, the Cedar Key Art Center, and Tallahassee’s Museum of
    Florida History, where they prefer guided tours that focus on architectural narratives, and they allocate a modest travel budget funded by their savings account, occasionally dreaming of a longer visit
    to Savannah, Georgia.
  culinary: Shannon Taylor delights in baking pecan pie, peach cobbler, and banana pudding using garden‑fresh butter, cane sugar, and vanilla beans, cooks modest Southern meals like shrimp and grits with
    fresh herbs harvested from their backyard, and they enjoy pairing desserts with a cup of hibiscus tea while occasionally over‑sweetening pastries.
  core: Shannon Taylor, a 71‑year‑old diligent archivist‑artist, blends disciplined organization with quiet curiosity, turning every garden, canvas, and family story into a living legacy, even if they hoard
    receipts and sometimes skip dental floss.
background:
  cultural: Shannon comes from a long‑standing white Southern family with English and Irish ancestry that settled in Florida’s Gulf Coast region generations ago. Raised in a small‑town environment, she
    internalized Southern hospitality, church‑based community service, and a deep respect for family traditions, while her curiosity and lifelong love of the arts have encouraged her to blend those heritage
    values with an openness to new ideas and unconventional thinking. Her cultural identity reflects a balance of traditional Southern values and a modern, inquisitive outlook.
