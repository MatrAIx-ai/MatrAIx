  career_goals: Although officially retired, Shannon aims to create a lasting cultural legacy in Old Town. She plans to launch a community art exhibition series that showcases local artists, establish a
    volunteer‑run oral‑history archive documenting the stories of Dixie County residents, and publish a memoir that weaves her family genealogy with regional history. She also hopes to master digital photography
    to complement her watercolor work, secure a small grant from the county historical society, and mentor a new generation of volunteers in both arts and archival practices.
