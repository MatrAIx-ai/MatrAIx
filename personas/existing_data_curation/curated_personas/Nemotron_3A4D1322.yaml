  hobbies: '["Hiking", "Fishing", "Woodworking", "Puzzle solving (crosswords, Sudoku)", "Target shooting", "Classic car restoration", "Reading non-fiction (history, logistics)", "Volunteer delivery for
    seniors", "Gardening"]'
  career_goals: Looking ahead, Kenton aims to transition from frontline deliveries to a supervisory role that leverages his expertise in route optimization and logistics. He plans to obtain a commercial
    driver’s license and certification in hazardous‑materials handling to broaden his qualifications. Over the next few years he hopes to become a dispatch manager or route planner for a regional courier
    firm, where he can design efficient schedules and mentor junior staff. Additionally, he is exploring the possibility of launching a small niche courier service focused on high‑value local businesses,
    emphasizing reliability and predictable service. His ultimate ambition is to secure a stable, part‑time schedule that provides a steady income as he approaches retirement while maintaining his reputation
    for dependability.
