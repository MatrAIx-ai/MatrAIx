  career_goals: Dorothy aims to earn her Bachelor of Science in Nursing within the next two years while continuing to work full‑time, positioning herself for advanced practice opportunities. She aspires
    to specialize in palliative or hospice care, where she can combine her compassion with her preference for quieter, more intimate patient interactions. Long‑term, she envisions becoming a Family Nurse
    Practitioner to provide comprehensive primary care in a community clinic setting, allowing flexible hours that accommodate her love for solitude and personal projects. Additionally, she hopes to contribute
    to research on patient comfort measures, integrating evidence‑based practice with her curiosity about holistic health.
