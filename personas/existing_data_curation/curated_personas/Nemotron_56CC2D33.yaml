personas:
  professional: Dorothy Lee, a 23‑year‑old registered nurse in Indio, blends meticulous clinical skills—IV catheterization, wound management, and precise EMR documentation—with a curiosity‑driven, holistic
    approach, often integrating patient comfort measures like aromatherapy while navigating the fast‑paced emergency department with calm assertiveness.
  sports: Dorothy Lee enjoys solo desert trail hikes with the local Desert Explorers club, follows the Coachella Valley Firebirds in the AHL and the Los Angeles Lakers for basketball, and attends weekly
    yoga sessions at a nearby studio to maintain flexibility and stress relief.
  arts: Dorothy Lee spends evenings strumming acoustic guitar covers of John Mayer and Bon Iver, captures sunrise vistas of the Colorado Desert through nature photography inspired by Ansel Adams, and attends
    the Coachella Valley Music and Arts Festival to experience immersive installations by contemporary visual artists.
  travel: Dorothy Lee prefers spontaneous road trips to quiet desert getaways like Sedona and Zion National Parks, has backpacked through Mexico’s Yucatán to taste authentic tacos al pastor, and dreams
    of a solo winter retreat in Iceland’s Blue Lagoon, balancing their love for solitude with limited student‑loan‑constrained budgeting.
  culinary: Dorothy Lee cooks healthy meals featuring quinoa bowls with avocado, cilantro‑lime grilled fish, and homemade chilaquiles, often experimenting with chipotle peppers and edible succulents like
    purslane as garnish, and enjoys occasional farm‑to‑table dinner nights with friends where they showcase their skill with a cast‑iron skillet.
  core: Dorothy Lee, a 23‑year‑old nurse with a camera, a guitar, and a penchant for desert solitude, balances meticulous care with occasional succulents‑forgetting moments and a love for spontaneous hikes.
background:
  cultural: Dorothy identifies as a white American who grew up in Indio, California, a region known for its blend of desert culture and a vibrant Hispanic community. Her upbringing was rooted in mainstream
    U.S. traditions—celebrating holidays like Thanksgiving and the Fourth of July—while her daily life was colored by the multicultural atmosphere of the Coachella Valley. This environment fostered an appreciation
    for diverse cuisines, especially Mexican dishes, and an openness to different cultural perspectives. Family values emphasized independence, hard work, and service to the community, influencing her choice
    of a caring profession. Though she maintains a largely individualistic lifestyle, she respects and participates in local events such as the Riverside County Fair and community volunteer drives.
