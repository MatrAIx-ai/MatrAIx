personas:
  professional: Wisteria Bivens, a 32‑year‑old line cook in Little Rock, blends rapid prep precision, grill mastery, and a growing command of sous‑vide and wood‑fire techniques with a competitive drive
    and a skeptical eye toward kitchen hierarchy, and they channel a curiosity‑practical balance into fast, reliable service while quietly orchestrating staff workflow.
  sports: Wisteria Bivens runs early along the Little Rock River Trail, belongs to the community‑focused Little Rock Runners Club, roots for the Arkansas Razorbacks football team during the fall and occasionally
    watches Arkansas Travelers minor‑league baseball games, and they treat each workout as a personal competition against yesterday’s pace.
  arts: Wisteria Bivens finds solace in the blues guitar of B.B. King, the modern soul of Leon Bridges, and the experimental jazz of Kamasi Washington, often playing their albums while plating dishes and
    attending occasional live shows at the Robinson Center, and they rely on music to recharge creative energy.
  travel: Wisteria Bivens meticulously plans short culinary‑focused trips, having already explored the vibrant food markets of New Orleans and the historic eateries of Savannah, while dreaming of a future
    solo adventure to Oaxaca’s spice‑laden streets, and they balance a modest travel budget with a desire for immersive, low‑stress experiences.
  culinary: Wisteria Bivens, a proficient line cook, loves weaving fresh basil, thyme, and collard greens from their herb garden into classic Southern dishes like smoked turkey collard greens and basil‑infused
    shrimp étouffée, experimenting with sous‑vide for perfect textures yet always grounding the plate in reliable flavor balance, and they view each new recipe as a measured experiment that satisfies both
    curiosity and practicality.
  core: Wisteria Bivens is a meticulous, competitive cook who channels curiosity into measured culinary experiments while wrestling with stress‑induced worry, a tight budget, and a habit of over‑checking
    every detail—from pantry inventory to blood pressure, and they often find themselves second‑guessing decisions even after a successful service.
background:
  cultural: Wisteria grew up in a Black family rooted in Arkansas's rich Southern culinary traditions. From an early age, family gatherings centered around soulful dishes like fried chicken, collard greens,
    and sweet potato pie, instilling a deep respect for the flavors and stories behind his heritage. He participates in community events such as Juneteenth celebrations and church potlucks, where food serves
    as a bridge between generations. While honoring these cultural foundations, he also embraces contemporary culinary influences, seeking to blend the comfort of his upbringing with innovative techniques.
    His marriage provides a supportive partnership, and together they navigate the balance between cultural preservation and modern exploration.
attributes:
  skills: '[''Line cooking'', ''Grill and barbecue techniques'', ''Sous‑vide and wood‑fire smoking'', ''Menu development'', ''Food safety compliance'', ''Inventory management'', ''Staff coordination'',
