  hobbies: '[''Herb gardening'', ''Reading culinary history'', ''Watching food documentaries'', ''Mindfulness meditation'', ''Morning river trail runs'', ''Hosting intimate dinner parties'', ''Experimenting
    with new recipes'']'
  career_goals: Wisteria aims to advance from his current role as a cook to an executive chef position within the next five years, eventually opening his own restaurant that showcases a contemporary take
    on classic African‑American Southern cuisine. He is motivated to compete in regional cooking contests to benchmark his skills and gain recognition for his signature dishes. Recognizing his sensitivity
    to stress, he plans to pursue a culinary management certification to acquire leadership techniques that will help him create a more supportive kitchen culture and improve his work‑life balance. Long‑term,
    he hopes to mentor younger chefs from his community, using his competitive drive to inspire excellence while fostering a collaborative environment.
