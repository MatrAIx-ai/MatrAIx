persona_description: A wetland ecologist who specializes in the study of wetland vegetation and their adaptations to different environmental conditions. She is particularly interested in the vegetation
  found in Type 2 and Type 3 wet meadows, shallow marshes, and deep marshes. Her research interests include the effects of flooding on wetland vegetation, the role of wetland vegetation in water quality,
  and the use of wetland vegetation in ecological restoration projects. She is also interested in the potential uses of wetland vegetation in urban and suburban areas, particularly in the management of
  stormwater runoff and the provision of habitat for wildlife.
