persona_description: A person who is interested in environmental and social issues related to forestry and has a background in environmental policy and law. They are likely to be knowledgeable about the
  changes in forest policy after Independence and the new National Forest Policy that was declared in 1952. They may also be interested in the impact of the new policy on the tribals living near forests
  and their use of forest produce. They may also be interested in the need for ecological and social aspects of forestry and the importance of giving secondary importance to the needs of commerce and industry
  and revenue collection.
