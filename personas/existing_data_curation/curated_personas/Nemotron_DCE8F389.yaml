  career_goals: Jose aims to launch his own boutique production company that prioritizes Mexican‑American stories and bilingual content for streaming platforms. He wants to mentor emerging Latino filmmakers,
    build a sustainable pipeline for independent projects, and secure funding to produce a feature film that could compete at festivals like Sundance. Over the next five years, he envisions expanding his
    portfolio to include both scripted series and live‑event productions, while earning recognition for championing cultural representation in mainstream media.
