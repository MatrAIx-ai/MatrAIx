personas:
  professional: Felicia Wallace is an aspiring digital illustrator who blends meticulous museum sketching, jazz-inspired rhythm, and Scratch animation to craft story-driven artwork; they channel their curiosity
    and need for quiet focus while sometimes over-analyzing their designs due to worry.
  sports: Felicia Wallace participates in her school's swim club, finding solace in the steady cadence of lap after lap, and they occasionally watch the Washington Capitals' games with their family, though
    they prefer solitary athletic activities over group sports.
  arts: Felicia Wallace immerses herself in both visual and musical arts, sketching scenes reminiscent of Henri Matisse while listening to Miles Davis and Erykah Badu, and they weave narrative ideas from
    Jacqueline Woodson and Walter Dean Myers into their Scratch animations.
  travel: Felicia Wallace enjoys carefully planned day trips to cultural hotspots like Washington D.C.'s museums, daydreams about a future visit to the Louvre in Paris, and they favor itineraries that include
    quiet gallery time over crowded amusement parks.
  culinary: Felicia Wallace prefers simple comforts such as creamy mac and cheese, avocado toast, and honey-glazed carrots, but they often skip a full lunch when absorbed in digital art, resorting instead
    to trail-mix and fruit gummies as quick snacks.
  core: Felicia Wallace is a quietly curious 11-year-old digital illustrator who channels their love of museums, jazz, and introspective storytelling into solitary creative projects, balancing meticulous
    organization with occasional worry-driven overthinking.
background:
  cultural: Felicia’s Black heritage is a central thread in her identity. Growing up in Washington, DC, she benefits from the city’s rich African American cultural institutions, community festivals, and
    historic neighborhoods, all of which shape her worldview. Her family celebrates African American holidays and traditions, such as Juneteenth and Kwanzaa, and often shares stories of ancestors’ resilience
    and creativity. These experiences nurture Felicia’s appreciation for art that reflects her community’s history and contemporary voices. She feels a strong connection to the legacy of Black artists and
    writers, and she aspires to contribute to that narrative through her own artistic and literary pursuits.
