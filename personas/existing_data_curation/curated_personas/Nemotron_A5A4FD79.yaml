  hobbies: '[''museum visits and sketching'', ''traditional sketching and drawing'', ''digital illustration'', ''reading fiction and African American literature'', ''creative writing and short story crafting'',
    ''basic coding with Scratch'', ''listening to jazz and neo‑soul music'', ''participating in mindful art workshops'']'
  career_goals: Felicia dreams of a future where she can blend her love for art and inquiry. She envisions herself as a museum curator or exhibition designer, especially focusing on African American art
    and history, allowing her to share stories that resonate with her cultural heritage. Alternatively, she is intrigued by the possibility of becoming a graphic novelist, using her drawing and storytelling
    abilities to explore themes of identity, community, and resilience. In the short term, she aims to deepen her artistic techniques, participate in youth art programs at the Smithsonian, and develop a
    portfolio of illustrated short stories that could one day lead to a published children’s book.
