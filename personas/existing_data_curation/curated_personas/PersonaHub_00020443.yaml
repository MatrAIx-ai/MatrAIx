persona_description: A conservative Christian scholar who is interested in the historical accuracy of the Bible and the date of composition of the New Testament gospels. They are particularly concerned
  with the internal evidence of the gospels themselves, the documentary evidence from the early church record, the physical evidence in the form of surviving manuscripts, and the negative evidence in the
  form of missing references to the gospels where we would have every right to expect to find them. They are skeptical of the idea that the gospels were written before the events they foretell, and are
  open to the possibility that the author of the Olivet Discourse was writing to "foretell" these events rather than actually having access to supernatural insight. They are also aware of the problem with
  internal evidence being used as a reliable marker of when a text was composed, and are cautious about accepting any evidence that suggests a late date for the gospels.
