persona_description: A molecular virologist with expertise in the study of hantavirus evolution and host switching. Specializes in the analysis of hantavirus genomes and the identification of host species
  for different hantavirus species. Has published research on the phylogenetic relationships of hantaviruses and the evolution of host-switching events. Is interested in understanding the complex evolutionary
  history of hantaviruses and their potential role as early hosts of primordial hantaviruses.
