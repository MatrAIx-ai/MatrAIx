  career_goals: Miguel aims to move from his current representative role into a team‑lead position within the next two years, leveraging his organizational strengths and assertive collaboration style. He
    plans to earn a certification in conflict resolution and eventually complete an associate degree in business administration to qualify for a supervisory or quality‑assurance manager role. Long‑term,
    his curiosity about entrepreneurship drives a goal to open a modest Mexican‑style food kiosk that blends traditional recipes with the contemporary tastes of Phoenix’s diverse community, providing a
    stable and personally fulfilling income source.
