personas:
  professional: Miguel Cumba, an aspiring customer service team lead, combines their meticulous data‑driven approach with calm bilingual communication to resolve high‑volume calls while proactively streamlining
    CRM workflows.
  sports: Miguel Cumba follows Liga MX passionately, cheering for Club América and Chivas on television, roots for Phoenix Rising FC in the USL Championship, and joins a Saturday morning pickup soccer league
    at Desert Vista Park to stay fit.
  arts: Miguel Cumba pursues desert photography inspired by Ansel Adams, captures sunrise over Saguaro cacti, and unwinds listening to Los Tigres del Norte and Julión Álvarez while occasionally streaming
    indie film festivals featuring Latin American directors.
  travel: Miguel Cumba prefers weekend road trips to nearby natural wonders like Sedona’s red rocks and the Grand Canyon, dreams of exploring Guanajuato’s historic streets, and balances travel planning
    with a modest budget and occasional family commitments.
  culinary: Miguel Cumba excels at preparing tacos al pastor and complex mole using chipotle, pasilla, and locally sourced corn tortillas, experiments with achiote marination, and enjoys pairing dishes
    with fresh prickly‑pear salsa.
  core: Miguel Cumba is a detail‑oriented, stress‑aware bilingual professional who channels curiosity into cooking, photography, and community service while carefully planning a future heritage‑inspired
    food kiosk.
background:
  cultural: Miguel was raised in a Mexican‑American household where family gatherings, Día de los Muertos celebrations, and the aroma of home‑cooked meals were central to daily life. Bilingualism was a
    natural part of his upbringing, giving him fluency in both Spanish and English and a deep appreciation for the cultural nuances of each language. Living in Phoenix, he is part of a vibrant Mexican diaspora
    that blends traditional customs with Southwestern influences— from the popularity of Mexican street food festivals to the integration of Mexican art in local public spaces. This cultural tapestry informs
    his values of community solidarity, respect for elders, and a strong work ethic, while also fostering his love for sharing Mexican traditions with a broader audience.
