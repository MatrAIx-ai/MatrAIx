personas:
  professional: Kellie Cobble, a methodical retail operations specialist with a knack for precise inventory control and visual merchandising, leverages their organized, low‑key demeanor to excel in back‑office
    tasks while quietly navigating customer service challenges.
  sports: Kellie Cobble, a quiet early‑morning jogger who swears by a weekly yoga routine, follows the Seattle Seahawks, Seattle Mariners and Seattle Sounders with a modest fan heart, and hikes with the
    Seattle Hiking Club every other weekend to stay active while keeping social interaction minimal.
  arts: Kellie Cobble, a lover of quiet artistic immersion, spends evenings listening to folk singer Sufjan Stevens, admiring the impressionist works of Claude Monet, and re‑watching period dramas starring
    Judi Dench, finding inspiration for their knitting patterns.
  travel: Kellie Cobble, preferring low‑key, self‑planned trips, has explored the Pacific Northwest’s coastal towns, craved a pilgrimage to the Scottish Highlands to trace the settings of their favorite
    historical novels, and dreams of a quiet retreat in Kyoto, all while budgeting carefully to avoid credit‑card debt.
  culinary: Kellie Cobble, an adept home cook who favors seasonal, garden‑fresh fare, often prepares a hearty roasted vegetable medley with kale, carrots, and rosemary, and treats themselves to a slice
    of homemade rosemary focaccia rather than dining out.
  core: Kellie Cobble balances a methodical retail mind and a solitary creative soul, managing anxiety with meticulous routines while occasionally succumbing to late‑night online shopping sprees for yarn.
background:
  cultural: Kellie grew up in a small town in northeastern Pennsylvania, a region known for its close‑knit communities and a strong work ethic. Her family background reflects modest, self‑reliant values
    rooted in seasonal agricultural cycles and local community gatherings. While she identifies with broader American white cultural norms, her upbringing in Kingsley emphasizes independence, practicality,
    and a deep appreciation for the natural landscape of Susquehanna County.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS system operation'', ''Inventory management'', ''Visual merchandising'', ''Data entry and sales reporting'', ''Time management'', ''Conflict resolution'',
