  hobbies: '[''Reading historical fiction'', ''Gardening (vegetable and flower beds)'', ''Knitting and crocheting'', ''Bird watching'', ''Jigsaw puzzles'', ''Journaling'', ''Nature photography'', ''Listening
    to podcasts on psychology and personal development'']'
  career_goals: She aims to advance to a supervisory or store-manager role within the next three years, where she can oversee inventory and merchandising while limiting front-line customer interaction.
    Long-term, Kellie hopes to open a small home-based online shop selling handmade crafts, allowing her to combine her retail experience with her love for solitary creative work and achieve a more balanced,
    low-stress lifestyle.
