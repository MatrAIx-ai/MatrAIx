persona_description: A political scientist who specializes in energy policy and renewable energy sources. She is interested in the politics of power and how renewable energy can be integrated into the national
  energy mix while balancing the needs of a population that relies on subsidized energy. She is familiar with the challenges of diversifying energy sources and the potential of wind and hydroelectric power
  to meet the target of 20% renewable energy by 2020. She is also aware of the political will needed to make green energy viable and the potential of Egypt's renewable energy resources.
