  career_goals: Magdalena frequently talks about wanting to become a painter who creates bright, fantastical worlds, or an astronaut who explores space and draws the stars she discovers. She dreams of working
    in a museum where she can share her art and learn about new cultures. Her ambitions are shaped by her love of art, new ideas, and the desire for unconventional experiences, even though she sometimes
    worries about whether she will be good enough.
