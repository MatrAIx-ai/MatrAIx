  hobbies: '[''DIY home improvement projects'', ''Vegetable gardening'', ''Reading mystery and historical fiction novels'', ''Hiking local trails'', ''Yoga and mindfulness practice'', ''Cooking experimental
    recipes'', ''Volunteering at animal shelter'', ''Community theater backstage work'', ''Puzzle solving'']'
  career_goals: Mimoza aims to re‑enter the workforce within the next year by completing a Certified Associate in Project Management (CAPM) credential and securing a project coordinator role at a nonprofit
    or small business in the Indianapolis area. Over the next five years she hopes to launch her own consulting boutique that provides organization, budgeting, and workflow optimization services to families
    and local entrepreneurs, achieving financial independence and a stable work‑life balance.
