  career_goals: Harold wants to turn his practical abilities into a stable career. He plans to enroll in a community‑college trade program to become a certified automotive technician, with a long‑term goal
    of opening a small handyman service with his wife. He also hopes to develop better personal organization skills and a routine that supports his mental‑health needs, aiming for a dependable income that
    allows him to support his family and give back to his community.
