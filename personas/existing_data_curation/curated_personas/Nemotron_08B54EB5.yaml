personas:
  professional: Richard Rollins is launching a part‑time handyman service that leverages his solid carpentry, small‑engine maintenance and calm listening style to mediate neighbor disputes while delivering
    predictable, hands‑on repairs on a flexible schedule.
  sports: Richard Rollins enjoys seasonal outdoor activities such as spring fishing at Lake of the Ozarks and fall hunting trips, follows the St. Louis Cardinals and Kansas City Chiefs on television, plays
    in a local adult softball league on weekends, and fits in daily walks while pushing a lawn‑mower to stay fit without a rigid gym routine.
  arts: Richard Rollins finds comfort in classic western novels by Zane Grey, listens to Johnny Cash and Willie Nelson while restoring vintage wooden toys, attends occasional church choir performances and
    the community theater’s production of a classic western play, and admires the work of folk artist Grandma Moses for its simple, hands‑on charm.
  travel: Richard Rollins prefers low‑cost road trips that combine family time and nature, having driven to the Ozark National Scenic Riverways for backpacking, spent a weekend in Branson enjoying live
    country music shows, and dreaming of a future visit to Santa Fe to explore its historic adobe architecture.
  culinary: Richard Rollins cooks simple, garden‑fresh meals like grilled chicken marinated in rosemary and oregano harvested from his backyard, a hearty tomato‑and‑pepper chili served with cornbread, and
    occasional comfort dishes such as meatloaf, always favoring fresh herbs, tomatoes, and a splash of hot sauce.
  core: Richard Rollins blends a hands‑on, modest‑living mindset with steady patience, practical budgeting, occasional procrastination on paperwork, and a quiet love for vintage craftsmanship and community
    ties.
background:
  cultural: Richard was raised in Joplin, Missouri, a small Midwestern community with strong ties to family, church, and local traditions. His cultural upbringing reflects typical Midwestern values of self‑reliance,
    neighborly cooperation, and modesty. He identifies with a white, working‑class background and grew up attending a local Protestant church, which emphasized service, humility, and community involvement.
    The region’s practical, down‑to‑earth ethos has shaped his pragmatic approach to life and his appreciation for simple, hands‑on activities.
attributes:
  skills: '[''Basic carpentry'', ''Home repair and maintenance'', ''Lawn‑equipment and small‑engine maintenance'', ''Basic automotive troubleshooting'', ''First aid and emergency preparedness'', ''Conflict
