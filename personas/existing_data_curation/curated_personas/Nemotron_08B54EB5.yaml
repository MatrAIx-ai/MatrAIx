    potluck participation'']'
  career_goals: Richard aims to formalize his practical skill set into a modest, sustainable livelihood. Over the next year he plans to earn his GED and enroll in a community‑college certificate program
    focused on residential construction or home repair. His short‑term goal is to start a part‑time handyman service for his town and surrounding rural area, allowing him to set predictable work hours while
    maintaining the flexibility to spend time with his family. Long‑term, he hopes to expand the service into a small business that can also provide apprenticeships for local youth, fostering community
    self‑reliance.
