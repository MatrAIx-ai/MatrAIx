    and organizational systems'', ''Strategic planning and goal‑oriented instruction'', ''Assessment creation and rubric development'']'
  hobbies: '[''Reading technical non‑fiction and engineering textbooks'', ''Building scale model railway layouts'', ''Woodworking and furniture making'', ''Solo hiking and nature trail exploration'', ''Solving
    puzzles (Sudoku, crosswords)'', ''Arduino and microcontroller programming'', ''Sous‑vide cooking experiments'', ''Maintaining a strategic journal'', ''Listening to renewable energy and education podcasts'']'
  career_goals: Elijah aims to secure a tenure‑track position and eventually become department chair, where he can shape the strategic direction of the technical programs. He aspires to develop a nationally
    recognized certification pathway that integrates sustainable energy practices, attract external research funding, and publish peer‑reviewed studies on the efficacy of competency‑based training. Over
    the next five years, he plans to complete his associate degree and enroll in a bachelor’s program to solidify his academic credentials, positioning himself for leadership roles within community college
    systems or specialized training institutes.
