  career_goals: Uyen aims to pursue a post‑secondary path in the health‑care field, beginning with a pre‑nursing program at a community college and eventually earning a Registered Nurse (RN) credential.
    She is driven by a desire to provide stable, compassionate care to her community, especially to immigrant families who share her cultural background. In the long term, she hopes to specialize in community
    health or public health nursing, allowing her to design health‑education outreach programs that blend practical medical skills with her strong sense of community service.
