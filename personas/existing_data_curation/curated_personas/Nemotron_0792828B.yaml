personas:
  professional: Uyen Koeun is a high‑school student who leads school event planning and coordinates the soccer team’s logistics, leveraging their meticulous organization, bilingual communication, and reliable
    teamwork to keep everything running like a well‑oiled machine.
  sports: Uyen Koeun is a midfielder on the high‑school soccer squad who trains after class three times a week, rides with the local “Bay Riders” bike club on weekend trails from the Golden Gate Park loop
    to the Marin Headlands, and chants with enthusiasm for the San Jose Earthquakes during the MLS season, balancing competitive spirit with a routine that prioritizes warm‑ups and cool‑downs to stay injury‑free.
  arts: Uyen Koeun performs in the school’s cultural dance ensemble, mastering traditional folk choreography for community festivals, while also leading karaoke sessions where they belt out BTS’s “Dynamite”
    and Ariana Grande’s “Thank U, Next,” and they draw creative inspiration from the choreography of Riverdance and the storytelling of the Broadway hit Hamilton.
  travel: Uyen Koeun explores the Bay Area’s scenic bike routes from Sausalito to Half Moon Bay, spends summer weekends visiting the Redwood National Park, and dreams of a family trip to Kyoto’s historic
    shrines and the Canadian Rockies, planning each adventure with a spreadsheet that lists costs, packing lists, and study‑time buffers to ensure schoolwork stays on track.
  culinary: Uyen Koeun loves cooking the aromatic rice‑noodle soup seasoned with star anise, ginger, and cilantro—often paired with fresh spring rolls filled with shrimp, vermicelli, and mint—while also
    experimenting with avocado toast topped with chili flakes and perfecting bubble‑tea with tapioca pearls, showcasing a skill level that ranges from confident home‑chef to experimental teenager.
  core: Uyen Koeun balances a regimented schedule of soccer practice, dance rehearsals, and budgeting with spontaneous karaoke nights, embodying a pragmatic yet socially vibrant teen who is already charting
    a future in community nursing.
background:
  cultural: Uyen is a second‑generation Vietnamese American raised in Burlingame, California. Her household blends traditional Vietnamese customs—such as celebrating Tet, preparing octopus soup for family
    gatherings, and showing deep respect for elders—with the everyday rhythms of American life. She grew up bilingual, speaking Vietnamese at home and English at school, which has given her a strong sense
    of cultural duality. This background informs her values of hard work, community responsibility, and the importance of family support. She actively participates in local Vietnamese community events,
    helping bridge cultural gaps while also embracing the diverse, inclusive environment of the Bay Area.
