    (crosswords, Sudoku)'']'
  career_goals: Looking ahead, Doris aims to move from on‑site supervision to senior project‑manager and consulting roles where she can shape larger commercial and community‑focused construction initiatives.
    She plans to earn a LEED Accredited Professional credential to deepen her expertise in green building and to position herself as a sustainability advisor for local developers. Doris also hopes to mentor
    the next generation of skilled tradespeople through formal apprenticeship programs and to contribute to historic‑preservation projects in Needham. Ultimately, she envisions establishing a boutique consultancy
    that blends her business background, meticulous project management skills, and passion for innovative, environmentally‑responsible design, while also authoring a practical guide for small‑scale contractors.
