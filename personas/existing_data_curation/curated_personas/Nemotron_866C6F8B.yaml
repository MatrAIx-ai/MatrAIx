personas:
  professional: Jason Curran, an aspiring junior comic illustrator, channels curiosity and a blend of organization and flexibility into hand‑drawn strips and digital sketches on his tablet, using LEGO design
    logic to storyboard narratives while they reliably meet school art deadlines.
  sports: Jason Curran, a member of the Durham Youth Cycling Club, enjoys weekend rides through the American Tobacco Trail, cheers for the Durham Bulls and the North Carolina Tar Heels basketball team,
    and balances competitive spirit with a preference for casual skateboarding in the local park, where they often film tricks for friends.
  arts: Jason Curran, a devoted fan of comic legends like Stan Lee and fantasy author Neil Gaiman, spends afternoons sketching original characters inspired by Van Gogh’s bold colors, attends Saturday art
    workshops featuring local muralist Maya Lin, and practices piano pieces by Ludovico Einaudi to unwind, while they occasionally lose track of time and miss dinner.
  travel: Jason Curran, who loves planning trips with a colorful map spread, has explored the natural wonders of Great Smoky Mountains, dreams of visiting Tokyo’s Akihabara for anime culture, and prefers
    family‑friendly itineraries that balance museum visits—like the Museum of Life and Science—with time for outdoor bike adventures, where they balance curiosity and caution.
  culinary: Jason Curran, who delights in smoky barbecue ribs, homemade mac and cheese, and the challenge of perfecting a pancake flip, frequently experiments with cheese‑filled quesadillas using cheddar
    and jalapeños, while they occasionally forget to eat breakfast before school, leading to mid‑morning cravings.
  core: Jason Curran, an 11‑year‑old comic‑crafting, bike‑riding explorer, blends Southern backyard barbecues, Lego engineering, and a restless curiosity into a quirky habit of sketching storyboards while
    humming piano scales.
background:
  cultural: Jason grew up in a predominantly white, middle‑class family with deep roots in the American South. Living in Durham, North Carolina, he is exposed to a vibrant mix of Southern hospitality and
    the progressive, multicultural atmosphere of a city anchored by Duke University and the Research Triangle. His family values education and community involvement, often attending local festivals like
    the Durham Arts Festival and visiting the Museum of Life and Science. These experiences give him a broad cultural perspective, fostering an openness to diverse ideas while maintaining a connection to
    regional traditions such as weekend barbecues, community volunteering, and seasonal celebrations.
