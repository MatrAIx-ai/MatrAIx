  career_goals: Jason dreams of becoming a video game designer or multimedia artist who can blend storytelling, visual art, and interactive technology. He hopes to create games that teach scientific concepts
    or explore imaginative worlds, leveraging his love for both art and coding. Over the long term, he also envisions contributing to community art programs or STEM outreach, using his creative skills to
    inspire younger kids. His ambition is to be a problem‑solving creative professional who can turn unconventional ideas into engaging experiences.
