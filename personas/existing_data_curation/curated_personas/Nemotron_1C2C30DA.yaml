  hobbies: '[''Visiting art galleries and museums'', ''Watercolor sketching'', ''DIY home‑renovation and upcycling'', ''Gardening (herbs and flowers)'', ''Reading biographies of African‑American artists
    and leaders'', ''Listening to jazz and blues'', ''Walking nature trails'', ''Participating in small craft circles'', ''Exploring local historic sites'']'
  career_goals: Lorraine aims to transition from full‑time maintenance work to a mentorship role, guiding younger apprentices in both technical skills and inventive, resourceful repair methods. She hopes
    to collaborate with local historic‑preservation societies in Greenville, offering her expertise to restore older homes and community buildings while infusing them with artistic touches. Additionally,
    she plans to document her career stories and unconventional solutions in a memoir or oral‑history project, preserving her knowledge for future generations and earning recognition as a community craftsman‑innovator.
