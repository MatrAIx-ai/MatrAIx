personas:
  professional: Lorraine Robinson, a seasoned building‑maintenance specialist with four decades of hands‑on expertise in electrical troubleshooting, HVAC servicing, and carpentry, channels their curiosity
    and improvisational flair into inventive upcycling solutions while mentoring apprentices, though they often chafe against rigid schedules and paperwork.
  sports: Lorraine Robinson, a devoted member of the Greenville Senior Walking Club, enjoys daily nature‑trail walks that double as sketch‑inspiration sessions and follows the Greenville Drive baseball
    team with enthusiasm, occasionally joining a casual senior tennis league in the spring, though they rarely compete for medals.
  arts: Lorraine Robinson, an avid watercolorist who frequents the Greenville Art Museum and draws inspiration from the works of Romare Bearden and Jacob Lawrence, immerses themselves in nightly jazz sessions
    featuring John Coltrane and B.B. King, and curates a small home gallery of upcycled metal sculptures that echo their love of unconventional creativity.
  travel: Lorraine Robinson, who favors leisurely, road‑trip itineraries over fast flights, loves revisiting historic Savannah and Charleston for their architecture, dreams of exploring the art districts
    of Santa Fe and Paris, and often plans trips around local blues festivals, though budget constraints sometimes limit longer excursions.
  culinary: Lorraine Robinson, a competent home cook who grows thyme, basil, and lavender in a modest garden, frequently prepares herb‑infused chicken broth, roasted rosemary potatoes, and occasional jambalaya,
    experimenting with reclaimed kitchen tools while sometimes forgetting to defrost ingredients in advance.
  core: Lorraine Robinson, a resourceful octogenarian maintenance guru turned artistic mentor, blends technical precision with spontaneous creativity, walks the line between frugality and indulgence, and
    remains fiercely independent yet quietly generous.
background:
  cultural: Lorraine grew up as a Black woman in the Jim Crow South, witnessing the civil‑rights movement’s transformation of Greenville. Her family’s church gatherings, gospel music, and Southern cooking
    instilled a strong sense of community and resilience. The heritage of storytelling and oral tradition shaped her appreciation for history and art, while her experience navigating a predominantly white
    trades industry reinforced a pragmatic, competitive spirit. Today, she draws on her Southern Black roots—celebrating soulful music, culinary flavors, and a commitment to mentoring the next generation—as
    a source of inspiration in both her work and personal pursuits.
attributes:
  skills: '[''Electrical troubleshooting'', ''HVAC servicing'', ''Plumbing repairs'', ''Carpentry and woodworking'', ''Equipment diagnostics'', ''Improvisational problem solving'', ''Safety compliance'',
