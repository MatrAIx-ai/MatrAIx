personas:
  professional: Takyia Bennerson, a seasoned CNC fabricator with a flair for artistic design, leverages their deep mechanical expertise and charismatic communication style to lead workshop sessions and
    drive process improvements, balancing relaxed planning with assertive team coordination.
  sports: Takyia Bennerson fuels her love for movement through weekend hikes with the Chapel Hill Trailblazers club and occasional pick‑up basketball games while cheering on the UNC Tar Heels, favoring
    low‑impact cardio over regimented gym routines.
  arts: Takyia Bennerson immerses herself in the local arts scene, regularly attending exhibitions featuring the vivid canvases of Maya Brown, singing soulful harmonies in a community choir that covers
    Nina Simone, and collaborating on interdisciplinary installations inspired by the kinetic sculptures of Phillips & Co.
  travel: Takyia Bennerson prefers spur‑of‑the‑moment road trips, having already explored the jazz‑filled streets of New Orleans and the volcanic trails of Iceland, while dreaming of a culinary pilgrimage
    through Sicily and a cultural exchange program in Kingston, Jamaica.
  culinary: Takyia Bennerson, an enthusiastic home chef, blends Southern comfort with Afro‑Caribbean zest, frequently whipping up gumbo with smoked paprika and okra, or curried goat with scotch bonnet pepper,
    and delights friends with mango‑infused cocktail concoctions.
  core: Takyia Bennerson is a charismatic maker‑artist who balances meticulous CNC craftsmanship with a delightfully chaotic love for spontaneous jam sessions, experimental cooking, and community mentorship,
    all while occasionally misplacing their own tools.
background:
  cultural: Takyia’s cultural background is rooted in the African‑American experience of the American South. Raised in a close‑knit Black family that valued education, church, and community, she grew up
    with a strong sense of resilience and collective responsibility. Family gatherings featured soulful music, storytelling, and home‑cooked dishes that blended Southern and Caribbean flavors, cultivating
    her appreciation for cultural expression. Living in Chapel Hill, she has been immersed in a diverse, university‑town environment that celebrates social justice and the arts, allowing her to connect
    with both historic Black traditions and contemporary movements. Takyia actively participates in local Black cultural festivals, mentors youth through STEM outreach programs aimed at increasing representation,
    and draws inspiration from trailblazing Black women in engineering and the arts. This rich heritage informs her identity, her collaborative work style, and her commitment to creating inclusive spaces
    in both the workshop and the community.
attributes:
