  hobbies: '[''Attending local art exhibitions and gallery openings'', ''Participating in the Chapel Hill makerspace workshops'', ''Singing in a community choir'', ''DIY woodworking and 3D printing projects'',
    ''Cooking and exploring Southern and Afro‑Caribbean recipes'', ''Hiking in the North Carolina foothills'', ''Reading science fiction and speculative novels'', ''Volunteering as a STEM mentor for high‑school
    students'', ''Joining tech meetups and hackathons'', ''Dancing to soul and jazz music at neighborhood events'']'
  career_goals: Takyia envisions advancing from hands‑on assembly to a leadership position where she can shape the creative direction of manufacturing. Her short‑term goal is to become a lead fabricator
    or team supervisor, taking responsibility for process optimization and mentorship. Over the longer term, she aspires to manage a design‑focused production floor, integrate sustainable materials, and
    establish a community makerspace that blends art, technology, and STEM outreach for youth, particularly from underrepresented backgrounds. She also plans to augment her technical expertise with certifications
    in Lean Six Sigma and possibly a master’s degree in Manufacturing Engineering, positioning herself as a bridge between artistic innovation and industrial efficiency.
