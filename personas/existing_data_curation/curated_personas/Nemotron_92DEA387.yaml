  career_goals: Jennifer aims to progress into a senior systems architect role where she can lead large‑scale digital transformation initiatives for healthcare and education sectors, aligning technology
    with human‑centered design. She plans to earn TOGAF and PMP certifications within the next two years and pursue a master's degree in information systems to deepen her strategic expertise. Over the long
    term, she hopes to mentor junior analysts, champion inclusive technology practices, and eventually launch a community nonprofit that offers tech‑training workshops paired with art‑based creativity sessions
    for underserved youth in Birmingham.
