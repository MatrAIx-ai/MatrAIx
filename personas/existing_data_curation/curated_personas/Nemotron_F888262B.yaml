  career_goals: Kyong aims to transition from her current clerical role to a senior supply‑chain planner within the next three years, and ultimately to a supply‑chain manager or director of operations.
    She plans to earn the APICS Certified Supply Chain Professional (CSCP) credential while completing a bachelor’s degree in Business Administration, followed by a master’s in Supply Chain Management.
    Her ambition is to lead a team that blends data‑driven decision making with design‑thinking principles, driving innovative and sustainable production processes. She hopes to present case studies at
    industry conferences, mentor junior planners, and spearhead digital transformation initiatives that leverage AI for predictive scheduling.
