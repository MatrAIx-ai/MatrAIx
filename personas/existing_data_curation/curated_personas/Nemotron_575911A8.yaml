personas:
  professional: Harold Harris is a budding robotics hobbyist and school band snare drummer, whose meticulous routine, love for teamwork, and practical problem‑solving make them a reliable leader in their
    after‑school engineering club and a steady rhythmic backbone in the marching band.
  sports: Harold Harris plays youth soccer for the St. Paul United Eagles and ice hockey with the Twin Cities Storm, follows the Minnesota Vikings, Wild, and Twins avidly, and maintains a disciplined fitness
    routine that blends team practices with off‑season roller‑blading, while occasionally skipping homework for an extra pickup game they love.
  arts: Harold Harris is an enthusiastic snare drummer in their middle‑school band, a fan of classic rock bands like The Beatles and modern film composer John Williams, and spends free time building LEGO
    mazes inspired by the LEGO Architecture series, which satisfies their creative urge and love for precise design.
  travel: Harold Harris prefers short, well‑planned trips that blend outdoor adventure with family time, having explored the Boundary Waters Canoe Area and the Minnesota State Fair, and dreaming of a future
    road‑trip to the Grand Canyon and a cultural visit to Munich, all scheduled around school breaks and their scout badge requirements.
  culinary: Harold Harris enjoys helping their parents bake chocolate chip cookies and assemble classic Minnesota hotdish with tater tots, ground beef, and corn, showing a budding cooking skill that favors
    hearty comfort foods seasoned with dill and pepper, while their favorite snack remains a slice of warm apple‑pie topped with vanilla ice cream.
  core: Harold Harris is a routine‑loving, team‑focused twelve‑year‑old who balances robotics, drumming, and sports with a sweet tooth for cookies and a occasional forgetfulness about homework, which their
    friends tease them about.
background:
  cultural: Harold grows up in a middle‑class white family in the Saint Paul/Washington County suburbs of Minnesota. His household reflects the Upper‑Midwest blend of German‑Scandinavian heritage, emphasizing
    practicality, modesty, community service, and a strong work ethic. He celebrates typical American holidays such as Thanksgiving and Christmas, enjoys regional dishes like hotdish, walleye, and fresh‑baked
    pies, and participates in local community events, youth sports leagues, and church youth groups. The public school environment and the area’s year‑round outdoor culture have shaped his routine‑oriented,
    sociable, and cooperative personality.
