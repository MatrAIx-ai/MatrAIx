  career_goals: Harold wants a future career that blends service, teamwork, and routine. He aspires to become a firefighter or police officer, seeing these roles as ways to protect his community and work
    with a close‑knit team. He also hopes to coach youth soccer and plans to finish high school with solid grades before enrolling in a fire science vocational program. In the short term, he aims to earn
    a leadership position in his school’s student council and achieve his next Boy Scouts merit badge.
