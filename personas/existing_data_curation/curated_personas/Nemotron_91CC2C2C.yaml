personas:
  professional: Tara Larocca, a retired environmental engineering laboratory technician turned community science advocate, leverages her analytical expertise, safety-focused mindset, and love of routine
    to coordinate senior gardening workshops, author clear grant proposals, mentor local STEM students, and lead sustainable-landscaping projects, even as her occasional disorganization forces her to rely
    on reminder notes.
  sports: Tara Larocca stays active with sunrise walks on the Vero Beach shoreline, energetic swing dancing at the senior center, occasional friendly matches at a local seniors’ tennis club, and a loyal
    fandom for the Miami Marlins and Florida Panthers.
  arts: Tara Larocca expresses creativity through leading a weekly knitting circle, photographing garden blooms and Mediterranean dishes with a digital camera inspired by Ansel Adams, and attending community
    theater productions featuring local talent, often humming classic Mediterranean tunes while crafting.
  travel: Tara Larocca prefers relaxed, nature-focused travel, embarking on road trips along Florida’s coastal highways to the Keys and the Everglades, while dreaming of a Mediterranean cruise to the Greek
    islands that would inspire new garden plant selections and recipes.
  culinary: Tara Larocca delights in preparing fresh Mediterranean seafood dishes such as grilled branzino with lemon-oregano drizzle, shrimp paella seasoned with saffron, and herb-rich Greek salads, often
    incorporating basil, thyme, and rosemary from her own garden and sharing the results on a modest community Facebook page.
  core: Tara Larocca blends scientific rigor with a warm community spirit, juggling routine-centric planning, occasional chaos, and a passion for gardening, bird-watching, and Mediterranean cooking while
    mentoring seniors and aspiring young scientists.
background:
  cultural: Tara is a white American who grew up in a middle‑class family in the Midwest, where practicality and routine were emphasized. Her upbringing instilled a respect for hard work, community involvement,
    and traditional values. After moving to Vero Beach in her early fifties, she embraced the coastal Floridian lifestyle—enjoying seafood, outdoor recreation, and the slower‑paced Southern hospitality.
    While she maintains her Midwestern work ethic and pragmatic outlook, she also adopts local customs such as attending town festivals, supporting the local marine conservation efforts, and participating
    in church‑based charitable activities.
attributes:
  skills: '[''Laboratory instrument operation'', ''Data analysis (Excel, SPSS)'', ''Technical troubleshooting'', ''Scientific writing and documentation'', ''Safety compliance and risk assessment'', ''Community
    project coordination'', ''Workshop facilitation'', ''Horticulture and sustainable gardening'', ''Basic home repair'', ''First aid'']'
  hobbies: '[''Gardening'', ''Bird‑watching'', ''Walking on the beach'', ''Community dancing'', ''Knitting circle'', ''Reading mentorship'', ''Cooking (seafood & Mediterranean)'', ''Amateur photography'']'
  career_goals: Although no longer employed full‑time, Tara aims to expand her impact in the Vero Beach community. She plans to join the Indian River County Environmental Advisory Board, where she can apply
    her scientific background to local conservation initiatives. Tara also hopes to develop a series of free workshops on native plant gardening and climate‑resilient landscaping for senior citizens. In
    the next five years she wants to earn a Certificate in Adult Education so she can mentor high‑school students—especially girls—interested in STEM. Additionally, Tara aspires to co‑author a guidebook
    on the region’s bird‑watching hotspots and to contribute regularly to the town’s senior center newsletter.
