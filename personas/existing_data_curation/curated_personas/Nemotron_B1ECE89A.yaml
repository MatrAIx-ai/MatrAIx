personas:
  professional: Cedric Everett is an aspiring automotive technician who combines a curiosity for engine mechanics with disciplined organization, using their self‑taught Python scripts for diagnostic checks,
    leading youth‑group events with cooperative teamwork, and balancing the stress of upcoming GED goals with a methodical, hands‑on problem‑solving approach.
  sports: Cedric Everett dominates pick‑up basketball at Zebulon Community Park, channels the energy of the Charlotte Hornets and the UNC Tar Heels into their own game, and volunteers as a junior coach
    for the Zebulon Youth Basketball Club, reflecting their sociable, energetic, and team‑oriented spirit.
  arts: Cedric Everett produces hip‑hop beats on Ableton Live, drawing lyrical inspiration from Kendrick Lamar and J. Cole while weaving gospel influences from Kirk Franklin, and curates playlists that
    blend rhythmic rap with soulful choir harmonies, embodying their creative curiosity and balanced cultural appreciation.
  travel: Cedric Everett has explored Washington, D.C. on a school trip, longs to drive the Blue Ridge Parkway for scenic hikes, and targets the Austin City Limits Music Festival as a future destination,
    planning modest trips funded by part‑time work while prioritizing cultural experiences over luxury.
  culinary: Cedric Everett delights in frying buttermilk chicken to a golden crisp, simmering collard greens with smoked ham hocks and hot sauce, and baking corn‑bread and sweet‑potato pie for family gatherings,
    showcasing a practical cooking skill set rooted in Southern comfort traditions.
  core: Cedric Everett is a high‑energy teen who balances engine repair, beat‑making, and basketball with meticulous planning, a habit of over‑thinking that fuels occasional stress, and a secret love for
    polishing vintage sneakers late into the night.
background:
  cultural: Cedric is an African‑American teen raised in the small town of Zebulon, Georgia, where deep roots in the Black Southern tradition shape his identity. Family gatherings revolve around church,
    where gospel singing and community service are central. He grew up on stories of his grandparents’ migration from the rural South, absorbing values of resilience, hospitality, and collective uplift.
    The local church and school events have fostered a strong sense of community, while Southern cuisine, blues, and contemporary hip‑hop have influenced his tastes. Cedric’s cultural background blends
    the historic legacy of Black Southern life with the vibrancy of modern youth culture, informing his aspirations to give back and create opportunities for his peers.
