  career_goals: Cedric aims to earn his GED within the next year and enroll in a vocational program for automotive technology. He hopes to achieve ASE certification, eventually opening his own auto repair
    shop that offers affordable services to his community. He also wants to become a mentor for other teens who struggle in school, using his experience to guide them toward trade careers. Long‑term, Cedric
    envisions expanding his business to include a community workshop space where young people can learn practical skills, fostering economic growth and stability in Zebulon.
