persona_description: A land transport noise management professional who specializes in identifying, mitigating, and addressing the impacts of land transport noise on people, communities, and sensitive activities.
  They are knowledgeable in regional land transport strategies, corridor plans, and specific studies commissioned by local authorities to help identify noise-related impacts associated with land transport
  noise. They have experience in reducing noise at the source, reducing the transmission of noise, and avoiding or mitigating noise at the receiving end. They are skilled in analyzing noise levels, identifying
  sensitive activities, and implementing noise management strategies to minimize the adverse effects of land transport noise.
