personas:
  professional: Erick Bachus, a budding visual communicator, leverages strong hand‑sketching talent and emerging digital illustration skills in free software to craft socially conscious designs; their methodical
    planning and reliable nature shine in coordinating school art projects and church youth workshops, positioning them as a promising scholarship candidate for multimedia arts.
  sports: Erick Bachus enjoys low‑impact fitness through weekend bike rides on nearby trails and occasional pickup basketball games at the community center, follows the local high school football team and
    roots for the regional NBA franchise, the Chicago Bulls, while staying loosely affiliated with a youth swim club that meets twice a month.
  arts: Erick Bachus immerses in the arts by sketching rural vistas, listening to Miles Davis, John Coltrane, and Erykah Badu, devouring graphic novels like Alan Moore’s *Watchmen* and Marjane Satrapi’s
    *Persepolis*, and drawing inspiration from illustrator Chris Riddell for their digital compositions.
  travel: Erick Bachus prefers budget‑friendly, nature‑focused trips, having explored Shenandoah National Park on a school hike, taken a weekend road‑trip to Cape Cod to photograph lighthouses, and dreaming
    of a future exchange in Kyoto, Japan to study traditional ink painting and manga culture.
  culinary: Erick Bachus enjoys a simple yet eclectic palate, often making avocado toast with a drizzle of olive oil for breakfast, crafting homemade ramen bowls with miso broth, chili oil, and soft‑boiled
    eggs for dinner, and treating themselves to late‑night pepperoni pizza while experimenting with coffee latte art using cinnamon dust.
  core: Erick Bachus is a quietly curious 16‑year‑old artist who balances meticulous planning with a love for sketching, jazz, and community service, all while navigating typical teen habits and a modest
    financial routine.
background:
  cultural: Erick is a Black teenager raised in Elko, a small rural community in Houston County, Georgia. His family’s traditions are rooted in Southern African American culture, with church serving as
    a central pillar of his upbringing. He grew up hearing stories of Georgia’s civil‑rights history, which fostered a strong sense of social responsibility. Family gatherings feature soul food, gospel
    music, and oral storytelling, nurturing his appreciation for cultural expression. The local community emphasizes mutual support through church youth groups and neighborhood events, shaping his worldview,
    artistic sensibility, and commitment to giving back.
attributes:
  skills: '[''hand sketching'', ''digital illustration'', ''basic graphic design'', ''creative writing'', ''event planning'', ''group project coordination'', ''basic Python programming'', ''time management'']'
  hobbies: '[''hand sketching'', ''reading graphic novels'', ''listening to jazz and blues'', ''playing chess'', ''creative writing (poetry)'', ''volunteering at library teen program'', ''nature photography'',
    ''basic coding for interactive art'']'
  career_goals: Erick aspires to earn a scholarship to study visual communication or multimedia arts at a four‑year college, with the long‑term goal of becoming a graphic designer who creates socially conscious
    artwork. He envisions using his artistic talent and methodical planning skills to launch a youth arts workshop in his hometown, providing a safe space for creative expression. Ultimately, he hopes to
    combine design expertise with community service, perhaps pursuing further training in art therapy to help vulnerable peers find their voices through art while maintaining a reputation for reliability
    and high‑quality work.
