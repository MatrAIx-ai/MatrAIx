personas:
  professional: Dangelo Smith is an aspiring community technology liaison who leverages his knack for troubleshooting basic computer issues, organizing neighborhood events, and strong interpersonal communication
    to envision a future role that bridges local teens and law‑enforcement agencies.
  sports: Dangelo Smith is a dedicated basketball player who spends evenings at the neighborhood park, follows the Los Angeles Lakers and the local high school Warriors team, and participates in the community
    youth league's summer tournament while also joining the school’s track club for sprint workouts during the spring.
  arts: Dangelo Smith channels his love for hip‑hop, R&B, and gospel into writing rap verses inspired by Kendrick Lamar, J. Cole, H.E.R., and Kirk Franklin, while also producing short social‑media clips
    that showcase local events and feature his favorite tracks.
  travel: Dangelo Smith prefers weekend road trips to nearby cities like New Orleans for its vibrant music scene and local cuisine, while dreaming of a future solo backpacking adventure to London to explore
    street art and historic landmarks, balancing a limited family budget with an appetite for cultural immersion.
  culinary: Dangelo Smith enjoys helping prepare soul‑food staples such as fried chicken, collard greens, cornbread, and mac and cheese, displays moderate cooking skills, and loves indulging in spicy jambalaya
    flavored with cayenne pepper and smoked sausage, yet often resorts to quick pizza or ramen during late‑night study sessions.
  core: Dangelo Smith is a tech‑curious, community‑focused teen whose boundless energy on the basketball court matches the rhythm of his rap lyrics, while his habit of impulse spending coexists with a disciplined
    plan to save for a future in cybersecurity and youth mentorship.
background:
  cultural: Dangelo’s cultural background is rooted in the African‑American community of Grand Prairie, Texas, where Southern traditions intersect with urban influences. His family places a strong emphasis
    on church fellowship, music, and community solidarity, reflecting the legacy of resilience that characterizes many Black families in the Dallas‑Fort Worth metro area. He celebrates cultural events such
    as Juneteenth and local Black History Month programs, and his upbringing includes exposure to gospel choirs, hip‑hop dance crews, and neighborhood basketball culture. These experiences shape his values
    of cooperation, kindness, and a desire to give back to his community.
