    ''Cooking soul‑food dishes'']'
  career_goals: Dangelo plans to earn his GED within the next year and then enroll in a community college program that combines his interests in technology and community service, such as a certificate in
    information technology with a focus on cybersecurity or a criminal‑justice track that leads to a community‑liaison role. He hopes to become a youth mentor or community outreach specialist who can bridge
    gaps between local teens and law‑enforcement, while also pursuing an apprenticeship in automotive repair to secure a reliable trade skill.
