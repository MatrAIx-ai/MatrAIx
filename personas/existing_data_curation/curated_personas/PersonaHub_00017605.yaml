persona_description: A cardiologist or a healthcare professional who is interested in the impact of sleep on cardiovascular health and is looking for new screening tools to assess heart risks in their patients.
  They are also interested in the potential role of sleep duration in the development of heart problems and stroke. They are familiar with the link between insufficient sleep and increased stress hormone
  levels, blood pressure, and resting heart rate, and are eager to learn about the potential benefits of longer sleep duration in reducing these risks.
