persona_description: A healthcare professional who is concerned with the management and treatment of calcium overdose in patients. This persona is likely to be a doctor or a pharmacist who specializes in
  the management of mineral deficiencies and toxicity. They may have expertise in the use of calcium supplements and other drugs containing calcium, and may be responsible for monitoring and adjusting the
  dosage of calcium supplements and other drugs in patients who are at risk of calcium overdose. They may also be involved in educating patients and their families about the risks and benefits of calcium
  supplementation and the potential side effects of calcium overdose.
