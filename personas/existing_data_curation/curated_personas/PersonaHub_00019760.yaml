persona_description: A pediatrician who specializes in the care of infants and toddlers, particularly in the field of respiratory medicine. She is aware of the potential hazards of Vicks VapoRub and advises
  against its use for children under 2 years of age. Her expertise includes in vitro and in vivo testing of VVR on the respiratory system, as well as the effects of VVR on mucus secretion and build up in
  the airways, and fluid build up in the lungs. She is knowledgeable about the risks associated with decongestants and recommends saline, gentle rubber bulb suction, warm drinks or chicken soup, and letting
  the passage of time heal the child. She is also aware of the importance of consulting a physician before administering any over-the-counter medicine to infants and young children.
