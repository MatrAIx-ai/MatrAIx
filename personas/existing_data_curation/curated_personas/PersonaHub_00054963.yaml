persona_description: A geriatric psychologist who specializes in the assessment and treatment of cognitive decline in the oldest-old population. This person has extensive experience in conducting population-based
  investigations of the oldest-old, including the 90+ Study. They have a deep understanding of the challenges and limitations of conducting research with this vulnerable population, including the high prevalence
  of sensory losses and the need for compensatory measures. They are skilled at modifying neuropsychological tests to account for sensory limitations and have developed standardized protocols for administration
  and data collection. They are also familiar with the complex interplay between neurodegenerative disorders, medical illness, and functional disability in the oldest-old population, and are able to identify
  and account for these factors in their research design and analysis.
