personas:
  professional: Paul Salopek, a 16‑year‑old aspiring automotive technician, channels his love for structured, solitary work into mastering Python scripts for simple vehicle diagnostics and creating game
    mods, while they excel in high‑school shop class with meticulous model‑making and plan to earn a GED and later certify as a CNC operator.
  sports: Paul Salopek channels their competitive nature into regular walks with the family dog and weekly rides with the local cycling club, while cheering on the nearby River Valley Tigers high‑school
    football team and the Chicago Bulls, preferring structured solo workouts over team sports.
  arts: Paul Salopek, an avid reader of Isaac Asimov’s Foundation and Gillian Flynn’s Gone Girl, finds artistic inspiration while they assemble detailed model kits to the soundtrack of Hans Zimmer, and
    occasionally attend local comic‑con panels featuring guest author Neil Gaiman.
  travel: Paul Salopek prefers low‑key road trips, having explored the scenic trails of Shenandoah National Park and visited the historic model‑maker museum in their hometown, and they dream of saving enough
    to attend the Japan International Robot Expo in Tokyo, balancing a desire for adventure with budget constraints.
  culinary: Paul Salopek, a self‑taught novice cook, favors simple, comforting meals such as spaghetti Bolognese with ground beef and tomato sauce, homemade chicken teriyaki glazed with soy sauce, ginger,
    and garlic, and they enjoy occasional pizza topped with mozzarella, pepperoni, and fresh basil.
  core: Paul Salopek, a meticulous 16‑year‑old with a competitive edge, thrives on solitary, structured pursuits—coding, model building, and chess—while they wrestle with anxiety and a penchant for late‑night
    over‑analysis.
background:
  cultural: Paul grew up in Riverton, a small, predominantly white rural community in Sangamon County, Illinois. The town’s culture emphasizes hard work, self‑reliance, and modesty, with many families involved
    in farming or local manufacturing. Community life centers on school events, county fairs, and church gatherings, reinforcing values of responsibility, orderliness, and straightforward communication.
    These Midwestern influences shape Paul's preference for predictable routines, structured environments, and independent effort.
attributes:
  skills: '[''Introductory Python programming'', ''Mechanical maintenance (bicycles, lawn mowers, basic automotive)'', ''Woodworking and DIY assembly'', ''Computer troubleshooting'', ''Time management and
    project organization'', ''Chess strategic thinking'']'
  hobbies: '[''Coding simple programs and game mods'', ''Reading science‑fiction and mystery novels'', ''Playing chess (online and offline)'', ''Building model kits (airplanes, cars)'', ''Walking the family
    dog'', ''Woodworking DIY projects'']'
  career_goals: Paul aims to earn his GED within the next year and enroll in a technical college program for automotive technology or CNC machining, fields that offer predictable workflows and tangible
    outcomes. He plans to obtain certifications as a certified automotive service technician and later as a CNC operator, securing a stable position in a local manufacturing plant where he can work independently.
    Long‑term, he hopes to open a small repair shop that reflects his meticulous standards and, optionally, take on freelance programming projects that allow him to work from home.
