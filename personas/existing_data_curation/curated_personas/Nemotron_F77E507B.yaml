    ''Conflict Resolution'']'
  hobbies: '[''Fishing on the St. Johns River'', ''Backyard vegetable gardening'', ''Cooking traditional Mexican meals (tamales, pozole)'', ''Woodworking projects'', ''Jogging on Fleming Island trails'',
    ''Reading personal‑finance and self‑improvement books'', ''Participating in a small‑group prayer circle at church'', ''Organizing community service events'']'
  career_goals: Gabriel aims to transition from an individual contributor role to a senior sales leadership position within the next three years. He plans to earn the Certified Professional Salesperson
    (CPS) credential and take a management development course offered by the American Association of Inside Sales Professionals. His ambition is to lead a small, high‑performing sales team that serves the
    mid‑south Florida manufacturing market, improving territory profitability by at least 15 % annually. In the longer term, Gabriel envisions opening his own regional distribution company, leveraging his
    extensive network of suppliers and customers to provide a reliable, family‑focused wholesale operation that can support his children’s education and future retirement needs.
