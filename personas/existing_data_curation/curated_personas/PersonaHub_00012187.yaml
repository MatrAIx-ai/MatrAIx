persona_description: A biochemist who specializes in the study of amino acid racemases and epimerases, particularly those that utilize pyridoxal phosphate as a cofactor for racemization. Her research focuses
  on understanding the structural and mechanistic aspects of these enzymes and how they can be used as potential targets for new antibacterial drugs. She is particularly interested in the mismatched acidity
  and basicity of the thiol/thiolate pair and the evolution of key enzymatic machinery that accomplishes these transformations.
