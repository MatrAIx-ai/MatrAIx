  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Photography'', ''Reading contemporary literature'', ''Listening to Latin jazz'', ''Playing soccer with friends'', ''Cooking traditional Mexican
    dishes'', ''Volunteering at the local community center'', ''Hiking in the plains'', ''Game nights (board games and video games)'']'
  career_goals: Diosdado plans to complete a bachelor's degree in communications or arts administration while gaining experience through internships at local cultural nonprofits. He envisions a career as
    a community arts coordinator, designing programs that celebrate Mexican‑American heritage and provide creative outlets for youth in rural New Mexico. Over the next five years, he hopes to launch a freelance
    graphic‑design side business that supports his financial stability and reduces stress. Long‑term, he aspires to lead a regional arts center, fostering cross‑cultural dialogue and mentorship opportunities.
