personas:
  professional: Diosdado Velazquez, a budding community arts coordinator, leverages their methodical planning, bilingual fluency, and genuine empathy to design inclusive cultural events while constantly
    battling self-imposed perfectionism.
  sports: Diosdado Velazquez, an enthusiastic amateur soccer player, competes weekly with friends in the Clovis Community League, follows New Mexico United passionately, schedules weekend hikes in the surrounding
    plains, yet occasionally skips workouts when anxiety spikes.
  arts: Diosdado Velazquez, a sketch-loving photography enthusiast, frequents the Clovis Community Art Center, draws inspiration from street artist Banksy and photographer Vivian Maier, devotes weekends
    to indie film screenings of Jim Jarmusch and book clubs featuring Haruki Murakami, and crafts event posters using Canva and Photoshop.
  travel: Diosdado Velazquez, a travel-curious 21-year-old, meticulously plans budget trips in Excel, dreaming of a road-trip through the Southwest's art hubs like Santa Fe and Taos, while already ticking
    off nearby hikes in the Plains of San Augustín and a weekend art-focused getaway to Austin, Texas.
  culinary: Diosdado Velazquez, a home-cook with a flair for traditional Mexican cuisine, skillfully prepares tacos al pastor, pozole, and mole using fresh cilantro, masa, and roasted chiles, yet habitually
    forgets to clean the kitchen after midnight cooking sessions, leading to a pile of dishes that fuels their anxiety.
  core: Diosdado Velazquez, a 21-year-old arts-driven community organizer, channels relentless curiosity and meticulous planning into sketchbooks, soccer fields, and late-night binge-watch marathons while
    battling a constant undercurrent of worry.
background:
  cultural: Diosdado grew up in a bilingual Mexican‑American household in Clovis, where both Spanish and English were spoken daily. Family traditions such as Día de los Muertos, quinceañeras, and Sunday
    tamale cooking remain central to his identity, and he actively participates in the town’s Hispanic festivals and mariachi celebrations. His upbringing on the edge of an agricultural region has given
    him an appreciation for hard work and community solidarity. He values the blend of Mexican heritage and Southwestern American culture, which informs his artistic tastes, social interactions, and desire
    to give back to his community.
attributes:
  skills: '[''Event Planning'', ''Graphic Design (Canva, Photoshop)'', ''Bilingual Communication (Spanish/English)'', ''Research and Academic Writing'', ''Public Speaking'', ''Team Coordination'', ''Time
