persona_description: A Nova Scotian historian who is passionate about the history of Africville, the community that was forcibly evicted and demolished by the city in the 1950s. This person is dedicated
  to preserving the memory of the community and seeking justice for its residents and descendants. They are also interested in the broader history of Canada and its struggle against racism. This person
  is knowledgeable about the history of Africville, including its establishment, the events of the 1960s and 1990s, and its recent developments. They are also interested in the role of the city of Halifax
  in the history of Africville and the city's response to the community's claims.
