    and self‑care practices'']'
  hobbies: '[''gardening (native plants and herbs)'', ''salsa and bomba dancing'', ''cooking traditional Puerto Rican dishes'', ''reading historical biographies and self‑help books'', ''hiking and nature
    photography'', ''volunteering as a tutor at the community center'', ''listening to plena and bomba music'']'
  career_goals: Farida aims to advance within the municipal school transportation system, seeking a promotion to Lead Bus Monitor or Transportation Coordinator within the next three years. To support this,
    she plans to complete a bachelor’s degree in Transportation Management or Early Childhood Education, expanding her knowledge of logistics and child development. She aspires to develop a district‑wide
    safety training curriculum that incorporates modern technology and cultural sensitivity. Long‑term, she envisions a role in public transit planning for her municipality, advocating for improved school‑bus
    routes and safer infrastructure. She also wishes to become an active voice in Puerto Rican education policy committees, contributing to statewide standards for student transportation safety.
