persona_description: A medical doctor who has dedicated their life to fighting against the effects of lead poisoning and has been involved in the clean-up operation in Zamfara, Nigeria. They have worked
  with organizations such as Médecins Sans Frontières (MSF) and OK International, and have been involved in the development of a long-term programme to reduce lead poisoning in affected mining communities.
  They have successfully reduced the number of children dying of lead poisoning and have trained miners and community workers on improved standards to prevent exposure to lead. Their work has been recognized
  with the joint effort between local and international agencies that has virtually wiped out lead poisoning cases in the state.
