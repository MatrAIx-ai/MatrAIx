  hobbies: '["Weekly group hikes in Forest Park","Community gardening with scheduled plot maintenance","Yoga and mindfulness sessions","Knitting and crochet circle meeting every Tuesday","Woodworking projects
    on weekends","Classic‑car club monthly meetups","Reading mystery novels","Participating in local potluck gatherings and live‑music events"]'
  career_goals: Gladys aims to advance to a senior maintenance supervisor role where she can blend her hands‑on expertise with leadership responsibilities. She plans to obtain a Certified Maintenance &
    Reliability Technician (CMRT) certification and eventually a Certified Maintenance Manager (CMM) credential. Her long‑term ambition is to develop a structured training program for new mechanics, emphasizing
    safety, precision, and teamwork, while securing a predictable work schedule that reduces stress. She also hopes to become a recognized subject‑matter expert in refractory technology, contributing to
    industry best‑practice guidelines and mentoring other women entering the trade.
