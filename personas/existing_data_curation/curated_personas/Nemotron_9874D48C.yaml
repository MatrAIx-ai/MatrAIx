  career_goals: Guillermo’s primary professional goal is to obtain his Master Electrician license within the next two years, which will enable him to take on larger commercial projects and qualify for a
    state‑issued contractor’s certificate. He hopes to eventually open a modest, family‑run electrical contracting business that specializes in reliable, routine maintenance and modest renewable‑energy
    upgrades for homeowners in his community. He also wants to formalize his role as a mentor, offering structured apprenticeship training so that younger workers can learn the trade in a practical, hands‑on
    environment.
