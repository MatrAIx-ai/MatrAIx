  hobbies: '["Book Club", "Quilting", "Gardening", "Cooking Classes", "Volunteer at Senior Center", "Neighborhood Potluck Organizer", "Historical Society Research", "Bird Watching", "Genealogical Research",
    "Weekend Trips to State Parks"]'
  career_goals: Although retired from formal employment, Susan aims to deepen her impact on the Mount Morris community. She hopes to serve on the board of the local senior center, lead a weekly workshop
    on basic computer skills for seniors, and mentor younger volunteers in organizing community events. She also aspires to complete a memoir of her family's history, incorporating her genealogical research,
    and to travel with her husband to historic sites and national parks. Maintaining her health, she plans to take a low‑impact fitness class and continue learning digital photography to document community
    life.
