persona_description: A galvanizing technician who is responsible for applying galvanizing coatings to steel products, ensuring that the coatings meet the required specifications and standards. They must
  be knowledgeable about the process, its variations, and the effects of handling techniques on the coatings. They must also be able to detect and repair any defects or marks on the galvanized coatings,
  as well as adjust the withdrawal rate from the zinc bath to achieve the desired thickness. They must also be able to recognize and report any variations in coating appearance or finish, and be able to
  explain the reasons for these variations to the client.
