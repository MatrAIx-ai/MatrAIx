  hobbies: '[''LEGO building and custom design'', ''Tide pool exploration and shell collecting'', ''Reading about dinosaurs, space, and marine life'', ''Watching nature documentaries'', ''Jigsaw puzzle
    solving'', ''Drawing geometric patterns'', ''Swimming laps at the community pool'', ''Strategic educational video games (e.g., Minecraft Education Edition)'']'
  career_goals: Vincent dreams of becoming a marine engineer or marine biologist who designs sustainable equipment to protect Hawaii's ocean ecosystems. He pictures himself working on underwater research
    vessels, combining his love of the sea with his knack for building and problem‑solving. He also aspires to be a competitive swimmer, aiming to qualify for local swim meets and possibly represent his
    community in regional competitions. These ambitions reflect his curiosity about the natural world, his practical desire to contribute to tangible solutions, and his competitive drive to achieve high
    standards.
