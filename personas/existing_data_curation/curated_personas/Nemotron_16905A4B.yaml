personas:
  professional: Maribel Villacorta, a seasoned community arts organizer and grant writer, channels their bilingual literary expertise, meticulous planning, and mentorship into curating intergenerational
    art exhibitions and securing funding for cultural programs in Queens.
  sports: Maribel Villacorta stays fit through daily tai chi classes at the senior center, enjoys brisk walks in their community garden, follows the New York Mets on television, and occasionally joins neighborhood
    seniors for leisurely lawn‑bowling outings.
  arts: Maribel Villacorta paints delicate watercolors of cityscapes, draws inspiration from Monet, O’Keeffe, and Rivera, attends exhibitions at the Met and Queens Museum, and weaves poetry influenced by
    Octavio Paz and Langston Hughes into their memoir project.
  travel: Maribel Villacorta has explored the historic streets of Santa Fe, admired the architecture of Barcelona, tasted the coastal charm of Sicily, and dreams of visiting the ancient citadel of Machu Picchu,
    preferring small‑group tours that balance comfort with cultural immersion.
  culinary: Maribel Villacorta delights in crafting tamales, mole sauce, and pozole for holiday celebrations, expertly layering chilies, chocolate, and roasted seeds, while also perfecting flaky empanada
    crusts and fragrant saffron rice pilaf for weekend family meals.
  core: Maribel Villacorta blends disciplined artistry with boundless curiosity, turning late‑night poetry scribbles into community legacy projects while maintaining a calm, compassionate presence that
    steadies everyone around them.
background:
  cultural: Maribel was born in the central highlands of Mexico in 1938 and immigrated to the United States with her family in the early 1960s, settling in Queens, New York. Growing up in a bilingual household,
    she retained strong ties to Mexican traditions, celebrating Día de los Muertos, Mexican Independence Day, and family rituals that emphasize communal harmony. Her Mexican heritage informs her artistic
    sensibility, culinary preferences, and dedication to preserving cultural narratives. In Queens, she integrated into a vibrant Latino community, participating in cultural organizations that promote Mexican
    folk art, music, and storytelling. Her experiences navigating two cultures have shaped her compassionate worldview and drive to bridge generational and cultural gaps within her neighborhood.
attributes:
  skills: '["Spanish-English bilingual communication", "Literary analysis and criticism", "Art history research and curation", "Community event planning and organization", "Mentorship and tutoring", "Grant
    writing for cultural programs", "Public speaking and storytelling", "Digital archiving of oral histories", "Creative writing (poetry and memoir)", "Watercolor painting"]'
  hobbies: '["Reading classic and contemporary literature", "Creative writing (poetry, memoir)", "Watercolor painting", "Visiting museums and art galleries", "Cooking traditional Mexican cuisine", "Community
    gardening", "Practicing tai chi", "Playing chess", "Volunteering as a storyteller for literacy programs", "Attending cultural lectures and tours"]'
  career_goals: Even at 87, Maribel pursues meaningful goals that align with her lifelong values. She aims to complete a memoir that weaves together her Mexican heritage, immigration journey, and the cultural
    evolution of Queens. She also plans to curate a multi-generational art exhibition showcasing works by senior artists from the local Mexican community, securing funding to make it a traveling show across
    New York City libraries and community centers. Additionally, she aspires to mentor a cohort of young Latina writers, establishing a small scholarship fund to support their education. These ambitions
    reflect her desire to leave a lasting creative and cultural legacy while fostering harmony and empowerment in her community.
