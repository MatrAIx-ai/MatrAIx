persona_description: A professional who is responsible for managing and optimizing database performance, specifically focusing on the creation and optimization of indexes. They have expertise in database
  architecture, business logic, and SQL Server Profiler. They are aware of the importance of selecting the right index for a specific column and the potential impact of an incorrect index on query performance.
  They have experience with the Index Tuning Wizard and the SQL Server Profiler to identify the types of queries that will be used and suggest appropriate index creation. They are knowledgeable about the
  common characteristics that determine which type of index is appropriate, such as the frequency of query usage, the size of the table, and the business rules or logic used by the database management system.
  They are also aware of the importance of indexing columns that are frequently used in queries, avoiding indexing columns that contain long data strings or columns that are used in aggregate functions,
  and avoiding indexing columns that have data with changing values. They are skilled in identifying situations where indexes are required, such as for primary keys, foreign keys, and columns used in aggregate
  functions, WHERE clauses, or for small tables.
