  hobbies: '[''Metal sculpture'', ''Guitar playing'', ''Hiking in Stone Mountain Park'', ''Visiting art galleries'', ''Playing basketball'', ''Model kit building'', ''Reading science‑fiction novels'', ''Photography'',
    ''Volunteering at craft fairs'']'
  career_goals: Darrell aims to move into a supervisory or lead‑fabricator role within the next three years, earning certifications such as AWS Certified Welder and Six Sigma Green Belt to bolster his credentials.
    He is motivated to lead process‑improvement projects that integrate his curiosity for new technologies and his competitive drive to outperform industry benchmarks. Long‑term, he envisions opening a
    small custom metal‑art studio where he can blend his technical expertise with his passion for art, creating functional pieces that double as sculptural works. He also hopes to mentor younger apprentices,
    sharing his organized work ethic and commitment to safety.
