  hobbies: '[''Fusion cooking (Chinese‑American)'', ''Balcony gardening'', ''Hiking in Santa Monica Mountains'', ''Volunteer STEM tutoring'', ''Mandarin calligraphy'', ''Attending cultural festivals'',
