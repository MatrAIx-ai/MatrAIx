  career_goals: She aims to re‑enter the workforce in a flexible, data‑driven role that accommodates her family commitments. Her short‑term goal is to obtain a data analytics certification and take on part‑time
    or remote projects, while her long‑term ambition is to become a senior analyst or consultant specializing in health‑tech or environmental data, eventually leveraging her expertise to mentor other women
    returning to STEM careers.
