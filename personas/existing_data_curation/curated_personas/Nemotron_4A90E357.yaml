  hobbies: '[''Fishing'', ''Motorcycle restoration'', ''Scale model building'', ''Vietnamese cooking'', ''Community volleyball'', ''Tech podcasts'', ''Watching baseball'', ''DIY home projects'']'
  career_goals: Mong aims to become a lead technician or foreman within his company, gaining advanced certifications in HVAC, electrical work, and renewable energy installations such as solar panels. He
    aspires to leverage his curiosity by mastering emerging smart‑home technologies, eventually launching his own small business focused on eco‑friendly, high‑efficiency installations. While his competitive
    drive pushes him to outpace colleagues, his worry about job security motivates him to build a diversified skill set and a reputation for reliability and safety.
