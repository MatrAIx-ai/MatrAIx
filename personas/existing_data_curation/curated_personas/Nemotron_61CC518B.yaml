personas:
  professional: Margie Neal, a 57‑year‑old community arts facilitator, leverages their natural talent for connecting people to organize neighborhood workshops that blend storytelling, quilting, and volunteer
    coordination, even as they prefer improvisation over rigid planning due to their relaxed, sometimes disorganized approach.
  sports: Margie Neal, an avid line‑dancer, spends weekends at Raleigh’s community dance socials, supports the Carolina Hurricanes, and joins a local walking club that meets at Lake Johnson, preferring
    low‑impact exercise over competitive sports, and they relish the social camaraderie these activities foster.
  arts: Margie Neal, a lifelong patron of Raleigh’s art galleries, often attends exhibitions featuring artists like Mickalene Thomas and local painter Susan Severson, delights in community theater productions
    of ‘The Glass Menagerie’ and ‘A Raisin in the Sun,’ and they listen avidly to the ‘Art History Babes’ podcast while knitting a tribute scarf.
  travel: Margie Neal, who enjoys weekend getaways, has explored historic Charleston’s cobblestone streets, the Biltmore Estate in Asheville, and the colonial town of Williamsburg, and they dream of a road
    trip through the Southwest’s red‑rock landscapes of Sedona, balancing travel plans around volunteer commitments and a modest budget.
  culinary: Margie Neal, known for hearty potluck feasts, frequently cooks baked mac and cheese, Southern fried chicken, and slow‑cooked beef brisket, seasoning with garden‑grown rosemary, thyme, and fresh
    basil, and they pride themselves on mastering the art of large‑batch casseroles and comforting desserts like pecan pie.
  core: Margie Neal is a sociable, art‑obsessed community champion who anchors neighborhoods with craft, food, and storytelling, yet they often misplace receipts and underestimate planning needs.
background:
  cultural: Margie was raised in a small town in the Piedmont region of North Carolina, growing up in a close‑knit, predominantly white, Protestant (Baptist) community that valued hospitality and mutual
    support. The Southern tradition of sharing food and caring for neighbors shaped her compassionate outlook. Living now in Raleigh, she embraces the city’s growing cultural diversity while preserving
    her Southern roots, blending a love for folk arts with an openness to new ideas.
