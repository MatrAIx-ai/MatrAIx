  hobbies: '[''visiting art galleries'', ''community theater attendance'', ''book club participation'', ''flower gardening'', ''cooking and potluck hosting'', ''knitting and quilting'', ''line dancing'',
    ''listening to art and history podcasts'', ''volunteering at senior centers'', ''storytelling circles'']'
  career_goals: Margie aims to deepen her involvement in Raleigh’s community arts scene by leading workshops that combine storytelling with craft, and by serving on the board of a local arts council. She
    also hopes to mentor younger volunteers, develop a small grant-writing program to secure funding for senior-center activities, and learn basic digital skills to document oral histories of longtime residents.
