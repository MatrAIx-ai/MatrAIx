  career_goals: Although not in the formal workforce, Abigail aims to deepen her involvement with local charitable organizations, aspiring to mentor newer volunteers at the senior center and the food bank.
    She hopes to document oral histories of longtime Bridgeport residents, preserving community heritage. Abigail also plans to enroll in short courses at the community college on topics like sustainable
    gardening and local history, expanding her knowledge while staying engaged with her community.
