persona_description: A researcher and analyst who specializes in the analysis and interpretation of food systems in Southeast Asia. This person has a deep understanding of the different food system types,
  including traditional, modern, and intermediate, and how they have evolved over time in the region. They have experience working with data from various sources, including reports by the U.S. Foreign Agricultural
  Service Global Agricultural Information Network, and have a keen interest in the impact of food systems on the environment and society. This person is likely to be involved in policy-making and advocacy,
  as well as conducting research and analysis to inform decision-making in the food sector.
