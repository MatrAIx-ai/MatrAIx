  career_goals: Although officially retired, Cheryl’s ambitions focus on staying active, sharing her knowledge, and deepening her connections. She aims to maintain her physical health through daily walks,
    gardening, and gentle yoga classes tailored for seniors. She plans to enroll in a community‑college workshop on digital photography so she can document the desert landscape and the lives of fellow seniors.
    Cheryl wishes to expand the senior garden club into an intergenerational mentorship program, pairing older gardeners with local school students. She also intends to record oral histories of long‑time
    Imperial County residents and donate the recordings to the county library. Writing a memoir of her eight decades in the region is another personal goal. Finally, she hopes to keep her independence by
    ensuring her home remains safe and accessible, and by preserving her driver’s license for occasional trips to nearby towns and medical appointments.
