    outreach'',''team leadership and coordinated response under pressure'',''radio communications and incident reporting'',''physical fitness training for operational readiness'',''stress management techniques
    and procedural documentation'']'
  hobbies: '[''weightlifting/strength training'',''mechanical tinkering on fire apparatus'',''fishing at Lake Houston'',''grilling and cooking Southern-inspired meals'',''strategy video games (e.g., SimCity,
    Civilization)'',''reading self‑development and mindfulness books'',''attending local jazz and hip‑hop concerts'',''volunteering for fire safety community events'',''journaling for stress relief'']'
  career_goals: Thomas aims to advance through the fire service hierarchy while deepening his technical expertise. In the near term, he plans to earn Firefighter II, EMT‑Paramedic, and HazMat certifications.
    He is working toward promotion to Engineer, where he will operate and manage fire apparatus, and eventually to Lieutenant and Battalion Chief, overseeing strategic operations for Houston Fire Department.
    Beyond rank, he wants to spearhead targeted fire safety outreach in under‑served Black neighborhoods, create a mentorship program for at‑risk youth, and integrate advanced wellness initiatives for firefighters
    to reduce occupational stress.
