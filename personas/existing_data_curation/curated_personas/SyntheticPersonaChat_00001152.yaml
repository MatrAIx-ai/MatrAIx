    User 2: I know what you mean. I''m looking for a second job, so I don''t have much time for running anymore.

    User 1: That''s too bad. It''s a great way to relieve stress.

    User 2: I know. I''m going to try to start running again when I get a little less busy.

    User 1: That''s great. I hope you do.

    User 2: Thanks. I''m also trying to save up money to start my own restaurant.

    User 1: That''s awesome! What kind of restaurant do you want to open?

    User 2: I''m not sure yet. I''m still thinking about it.

    User 1: Well, I''m sure you''ll figure it out. You seem like a smart person.

    User 2: Thanks. I appreciate that.

    User 1: So, what kind of food do you like to cook?

    User 2: I like to cook everything, but I''m especially good at making grilled food.

    User 1: That''s good. You''ll be a great chef.

    User 2: Thanks. I hope so.

    User 1: So, what do you do for a living?

    User 2: I work as a grill cook at a local restaurant.

    User 1: Oh, that''s cool. I''ve always wanted to be a chef.

    User 2: It''s not as easy as it looks.

    User 1: I can imagine.

    User 2: But it''s a lot of fun.

    User 1: I bet it is.

    User 2: It is.'
