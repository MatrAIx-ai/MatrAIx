personas:
  professional: Anjanette Glover, a senior legal coordinator‑in‑training specializing in elder law, leverages three decades of paralegal expertise in civil and probate matters, meticulous case management,
    and budget‑savvy contract analysis while channeling their dependable, detail‑oriented nature and sociable flair into seamless liaison work between attorneys, seniors, and court staff.
  sports: Anjanette Glover enjoys low‑impact fitness, dancing salsa at senior nights, walking the Atlantic shoreline, and passionately follows the Miami Heat and Miami Dolphins, while also playing weekly
    bridge tournaments with their local club, the Boca Raton Senior Bridge Association.
  arts: Anjanette Glover finds artistic fulfillment singing in their church choir, listening to classic soul icons Aretha Franklin and Caribbean legend Harry Belafonte, and attending stage productions at
    the Boca Raton Museum of Art, especially those starring Viola Davis.
  travel: Anjanette Glover prefers planned, moderate‑budget trips that blend beach relaxation with cultural immersion, having visited the Bahamas, Aruba, and Saint Lucia for family reunions, while dreaming
    of a guided culinary tour of Portugal’s Algarve coast that would satisfy their love of seafood and spices.
  culinary: Anjanette Glover, a confident home cook, delights in preparing soulful Southern collard greens seasoned with smoked turkey, rich Caribbean curried goat, and baked sweet potatoes, using fresh
    herbs like thyme and scotch bonnet peppers, while often hosting communal potlucks where they pair dishes with chilled hibiscus tea.
  core: Anjanette Glover balances meticulous planning with vibrant community engagement, always having a spreadsheet for budgets, a choir rehearsal schedule on their fridge, and a secret habit of humming
    old gospel tunes while garden‑weeding.
background:
  cultural: Anjanette is an African‑American woman whose family roots extend to the Gullah Geechee coastal community of South Carolina and to Jamaican grandparents who settled in Florida in the 1960s. Growing
    up in the South, she embraced the rich traditions of storytelling, gospel music, and communal cooking. In Boca Raton, she remains deeply involved in the local Black church, celebrates Juneteenth, Kwanzaa,
    and Caribbean holidays, and participates in cultural festivals that honor her heritage. Her cultural identity informs her commitment to community service, especially supporting seniors and preserving
    intergenerational family bonds.
