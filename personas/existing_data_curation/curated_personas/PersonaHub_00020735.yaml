persona_description: A nurse who works at Mulago Hospital in Kampala, Uganda, where she has been caring for patients with various neurological disorders. She is responsible for providing care to patients
  with new onset seizures, neuropathy, cerebellitis, and ischemic stroke, and is also responsible for managing the daily operations of the neurology ward. She is skilled in performing laboratory tests,
  such as complete blood counts, erythrocyte sedimentation rates, and ISS testing, and is familiar with the procedures for performing lumbar punctures and head CT scans. She is also knowledgeable about
  the cultural beliefs and practices in the community surrounding Mulago Hospital, and is able to provide support to patients during the procedure.
