personas:
  professional: Maria Bonanno is a 25‑year‑old elementary arts teacher who designs data‑driven interdisciplinary curricula, masterfully integrates Google Classroom to personalize learning, and relentlessly
    refines classroom organization to meet high standards, all while eyeing a future as a curriculum specialist and principal.
  sports: Maria Bonanno is an avid hiker who tackles the Columbia River Gorge trails each weekend, participates in the Portland Running Club’s seasonal 5‑k races, and follows the Portland Timbers and Trail
    Blazers closely, often noting game statistics in a notebook after a long trek.
  arts: Maria Bonanno channels her curiosity into watercolor landscapes that echo the atmospheric depth of Caspar David Friedrich and the light play of Olafur Eliasson, while devouring contemporary art
    theory by Claire Bishop and listening to experimental jazz podcasts featuring Kamasi Washington and Floating Points for inspiration.
  travel: Maria Bonanno prefers meticulously planned solo excursions that blend quiet reflection with artistic discovery, having spent a weekend wandering the indie galleries of Asheville, a two‑week cultural
    immersion in Kyoto to study calligraphy, and now dreaming of trekking New Zealand’s Milford Track once their travel fund reaches its target.
  culinary: Maria Bonanno is a competent home cook who delights in crafting matcha‑infused desserts, miso‑glazed salmon with shiitake mushrooms, and pour‑over coffee, yet admits their most ambitious attempts
    at sourdough often end in a flour‑covered countertop.
  core: Maria Bonanno is a meticulous, curiosity‑driven art educator who hoards vintage watercolor sets, compulsively checks lesson plans at midnight, and can’t resist a challenging logic puzzle before
    bedtime.
background:
  cultural: Maria comes from a second‑generation Italian‑American family that settled in the Pacific Northwest in the 1970s. Her parents emphasized the value of education, community participation, and a
    love of music and food. Growing up in Portland, she absorbed the city's progressive, environmentally conscious ethos while maintaining family traditions such as cooking Sunday pasta dishes, celebrating
    Ferragosto, and occasionally speaking Italian with relatives. This blend of Italian heritage and Northwest culture informs her appreciation for both classic art and contemporary, community‑oriented
    projects.
attributes:
  skills: '[''Integrated arts curriculum design'', ''Differentiated instruction'', ''Data‑driven student assessment'', ''Educational technology integration'', ''Literacy and language arts instruction'',
    ''Project‑based learning facilitation'', ''Classroom organization and time management'', ''Classroom behavior management'', ''Collaborative teacher planning'', ''Mentorship of student art clubs'', ''Cross‑cultural
    content integration'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting small art exhibitions'', ''Reading art theory and philosophy'', ''Hiking'', ''Exploring indie coffee shops'', ''Calligraphy'', ''Reflective
    journaling'', ''Listening to experimental jazz podcasts'', ''Solving logic puzzles'', ''Volunteering at community art workshops'']'
  career_goals: Maria aims to earn a master's degree in educational leadership within the next three years and transition into a lead teacher or curriculum specialist role where she can scale her interdisciplinary
    arts program district‑wide. She aspires to publish research on art integration in elementary education, win a Teacher of the Year award, and eventually become a principal who champions both academic
    rigor and creative exploration. Her long‑term ambition includes establishing a community partnership model that brings local artists into schools to enrich student experiences.
