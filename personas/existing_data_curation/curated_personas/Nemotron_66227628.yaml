personas:
  professional: Mia Harshman is an adaptive office administrator who blends advanced Excel automation and Asana project tracking with a spontaneous, art‑centric approach to event planning, while they sometimes
    let a relaxed attitude toward rigid schedules cause last‑minute scramble, yet their empathy and competitive drive keep the team productive and inspired.
  sports: Mia Harshman embraces the Oregon outdoors, spending weekends hiking the Columbia River Gorge and joining the local Oregon Trail Runners club for trail runs, while they cheer on the Portland Timbers
    soccer team and occasionally practice community yoga at the YMCA.
  arts: Mia Harshman immerses themselves in the arts by painting and sketching at community workshops, collecting works by Indigenous artists, drawing inspiration from painter Emily Carr, listening to indie
    musician Phoebe Bridgers, and attending shows featuring Portland‑based band The Riverfolk, while they also volunteer at local art fairs.
  travel: Mia Harshman prefers flexible, low‑key travel, often planning spontaneous road trips to nearby gems such as Sedona’s red rocks, the coastal town of Cannon Beach, and the tea‑filled streets of
    Kyoto, while they balance a modest travel budget with occasional family commitments.
  culinary: Mia Harshman experiments in the kitchen with moderate skill, favoring dishes like wild mushroom risotto, sourdough bread, and miso ramen, and they relish foraging for fresh mushrooms, rosemary,
    and local citrus to infuse their meals with Pacific Northwest flavors.
  core: Mia Harshman is a creatively driven, slightly disorganized 28‑year‑old who blends art, community, and a competitive edge while they navigate intense anxiety through yoga and spontaneous adventures.
background:
  cultural: Mia identifies as a White American with roots in the Pacific Northwest. Living in Oakland, Oregon, she embraces the region’s emphasis on environmental stewardship and community involvement.
    While her upbringing reflects mainstream American cultural values—self‑reliance, individualism, and a strong work ethic—her frequent engagement with local Indigenous art forms and diverse cultural events
    has broadened her perspective. Married and supported by her partner, she balances her personal drive with a collaborative community spirit, valuing both personal achievement and the enrichment that
    artistic and cultural experiences bring to her life.
