  hobbies: '[''Visiting art galleries and museums'', ''Painting and sketching'', ''Nature photography'', ''Hiking in Oregon forests'', ''Yoga and meditation practice'', ''Reading contemporary fiction'',
    ''Listening to art and psychology podcasts'', ''Experimenting with cooking new recipes'', ''Attending indie music concerts'', ''Participating in community art workshops'']'
  career_goals: Mia aims to complete her bachelor's degree in Business Administration within the next two years and leverage that credential to move into a senior managerial or director role overseeing
    multiple administrative departments. She envisions developing innovative, art‑focused community programs that integrate her love of creativity with operational efficiency. Mia also hopes to champion
    employee wellbeing initiatives, such as flexible scheduling and mental‑health resources, drawing on her own experiences with anxiety. Long‑term, she aspires to mentor emerging professionals and possibly
    launch a nonprofit that supports arts education in rural Oregon communities.
