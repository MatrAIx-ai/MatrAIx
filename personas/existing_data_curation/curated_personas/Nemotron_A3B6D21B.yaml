personas:
  professional: Eneido Garcia, a sprightly two‑year‑old who loves stacking colorful blocks, blends curiosity with a practical eye for balance, and while they approach each tower with imaginative experimentation,
    they remain delightfully relaxed about the inevitable collapses and messy cleanup.
  sports: Eneido Garcia, a curious little mover who idolizes the city’s soccer heroes of the Tigers and thrills at watching the Little Lions’ matches, spends afternoons in a toddler gymnastics class where
    they practice wobbly balance beams, preferring small group play over big stadium crowds.
  arts: Eneido Garcia, a quiet yet imaginative two‑year‑old, hums along to Raffi’s “Baby Beluga” and The Wiggles’ “Fruit Salad” while they dab crayons on paper, finding comfort in the familiar melodies
    and simple stories of Sesame Street that shape their gentle creative world.
  travel: Eneido Garcia, an inquisitive toddler with a modest travel appetite, delights in short family trips to the nearby zoo and the coastal beach resort, while they dream of one day exploring the bright
    lights of Disney World and the sandy dunes of a distant seaside town.
  culinary: Eneido Garcia, a selective eater who adores creamy macaroni and cheese with a sprinkle of cheddar and sweet banana slices, occasionally tolerates avocado toast but often rebels against broccoli
    florets, reflecting a playful yet stubborn approach to dining that they display at every mealtime.
  core: Eneido Garcia, a two‑year‑old whose boundless curiosity meets a relaxed, sometimes messy outlook, prefers quiet play with a few close friends, shares toys kindly, and they navigate small setbacks
    with gentle resilience.
background:
  cultural: Eneido grows up in a Mexican‑American household in Las Cruces, NM, where Spanish and English are spoken interchangeably. His family celebrates Mexican traditions such as Día de los Muertos,
