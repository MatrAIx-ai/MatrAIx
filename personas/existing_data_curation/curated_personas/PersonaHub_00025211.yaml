persona_description: A historian who specializes in the study of witchcraft trials and their historical and social context. They are particularly interested in the similarities and differences between the
  Salem witch trials and the Elizabethan Era England Witch Trials, and how they were both caused by a mass hysteria and executed through mass executions of innocent people. They have a deep understanding
  of the social, political, and cultural factors that led to these trials and the impact they had on the people involved.
