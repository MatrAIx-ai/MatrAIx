persona_description: A teacher who believes in the equal importance of STEM education for both boys and girls and aims to create a safe and supportive environment for all students. They are committed to
  developing students' STEM knowledge, skills, and confidence through a variety of teaching methods and strategies, and encourage students to think critically and creatively about STEM tasks. They value
  process over product and aim to foster a classroom environment that generates interest and curiosity while holding all students accountable for learning. They also emphasize the importance of equal and
  fair student participation and provide appropriate learning support when needed.
