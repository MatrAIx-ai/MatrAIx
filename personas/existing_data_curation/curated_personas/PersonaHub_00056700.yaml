persona_description: A geneticist who specializes in the study of the gene responsible for red hair and fair skin, and the evolutionary history of human populations. His research interests include the selection
  pressures that led to the prevalence of red hair and fair skin in certain populations, and the potential evolutionary benefits of this trait. He is particularly interested in the role of UV radiation
  in the development of melanoma and the impact of genetic factors on melanoma risk.
