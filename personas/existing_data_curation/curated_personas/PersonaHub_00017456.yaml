persona_description: A historical scholar or a person interested in the early history of Canada, particularly in the period from the 16th to the 18th century. They are familiar with the life and works of
  Isaac de Razilly, a French naval officer who played a significant role in the history of Acadia and Quebec. They are also knowledgeable about the Treaty of St. Germain-en-Laye (1632), which led to the
  return of Acadia to France from the English. They have a keen interest in the life and works of de Razilly and are interested in learning more about his contributions to the history of Canada.
