  career_goals: Although retired, Mercedes aims to remain an active contributor to Juncas. She plans to expand the town’s environmental education program by mentoring high‑school students in hands‑on science
    projects, lead a community garden that showcases sustainable agriculture, and document oral histories of the older generation for future archives. She also aspires to master advanced digital photography
    and social media tools to share her work with family abroad and to keep her mind sharp. Maintaining her health through daily walks, dance classes, and regular health check‑ups is also a priority, along
    with traveling to cultural festivals across Puerto Rico to celebrate her heritage.
