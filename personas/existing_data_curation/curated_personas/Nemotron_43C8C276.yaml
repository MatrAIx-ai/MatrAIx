personas:
  professional: Mercedes Cruz, a retired environmental engineer with deep expertise in water resource management, leverages their curiosity and practical mindset to lead community education programs, organize
    sustainable garden projects, and mentor high‑school students, while their competitive streak drives them to secure grants and synthesize data using GIS tools.
  sports: Mercedes Cruz stays active by leading a local senior walking club that traverses the scenic trails around Juncos, participating in weekly salsa and plena dance classes as cardio workouts, and
    cheering on the island’s baseball team, the Cangrejeros, while they occasionally join friendly bridge tournaments that double as mental‑fitness drills.
  arts: Mercedes Cruz embraces artistic expression through digital photography, capturing the island’s landscapes with a vintage Leica, drawing inspiration from musicians like Celia Cruz and Marc Anthony,
    enjoying theatrical performances at the local cultural center, and regularly citing the novels of Esmeralda Santiago as their literary muse.
  travel: Mercedes Cruz prefers culturally immersive trips, having visited Old San Juan’s historic forts, hiked El Yunque’s rainforest trails, and attended the annual Festival de la Calle San Sebastián,
    while they plan future journeys to the bioluminescent bays of Vieques and a family reunion in Florida, balancing careful budgeting with a love for spontaneous photo excursions.
  culinary: Mercedes Cruz’s kitchen is a laboratory for traditional dishes such as arroz con gandules, mofongo relleno, and pastelón, seasoned with recaito, cilantro, and adobo, and they often experiment
    with tropical fruits like guava and passionfruit in sauces, while their cooking workshops showcase these flavors to friends and neighbors.
  core: Mercedes Cruz blends a lifelong curiosity for science with a zest for community dance, gardening, and photography, and they turn their competitive drive into vibrant local projects while juggling
    health checks, modest finances, and a love for island flavors.
background:
  cultural: Mercedes was born and raised in Juncos, a municipality steeped in agricultural tradition and close‑knit community values. Growing up during the 1960s, she witnessed Puerto Rico’s rapid industrialization
    and the resilience of its people. Her family’s Catholic faith, strong emphasis on family gatherings, and love for music—especially bomba, plena, and salsa—have shaped her worldview. She speaks fluent
    Spanish and functional English, reflecting the island’s bilingual education system. Cultural practices such as cooking arroz con gandules, celebrating fiestas patronales, and participating in community
    parrandas are integral to her identity. As a senior, she respects the island’s reverence for elders and strives to pass on cultural knowledge through storytelling, mentorship, and community service.
