personas:
  professional: Evangelina Perez, a 34‑year‑old executive, blends strategic planning, financial oversight, and bilingual communication to translate emerging market trends into actionable initiatives while
    navigating the boardroom with a relaxed, adaptable style that tolerates occasional disorganization.
  sports: Evangelina Perez supports the Houston Astros and Dallas Cowboys, plays in a weekend beach‑volleyball league at Galveston, paddles sunrise kayaks with a local Gulf club, and prefers flexible, social
    workouts over rigid gym routines, often squeezing a quick jog into spontaneous road‑trip stops.
  arts: Evangelina Perez captures candid moments at community festivals with a vintage Fujifilm camera, finds rhythm in salsa dancing to the beats of classic Latin pop and contemporary R&B, and relaxes
    by listening to the soulful lyrics of John Mayer, Adele, and Bob Marley, weaving these artistic influences into the ambience of their dinner gatherings.
  travel: Evangelina Perez plans spontaneous three‑day road trips along the Gulf Coast, stopping in Galveston, New Orleans, and the Texas Hill Country, while also budgeting for longer escapes to Barcelona’s
    art districts and Bali’s surf beaches, balancing a modest travel budget with a craving for cultural immersion.
  culinary: Evangelina Perez experiments with border‑inspired fusion dishes such as smoky chipotle‑marinated brisket tacos topped with cilantro‑lime salsa, roasted poblano‑stuffed corn chowder, and herb‑infused
    guacamole with jalapeño, often showcasing these creations at informal dinner gatherings yet sometimes ordering takeout when a packed workweek leaves little time for cooking.
  core: Evangelina Perez blends entrepreneurial drive with a carefree, slightly disorganized charm, constantly juggling strategic plans, spontaneous road trips, salsa steps, and a habit of leaving fresh
    herbs and chili peppers scattered across the house.
background:
  cultural: As a first‑generation Mexican American raised in Texas, Evangelina maintains a strong bicultural identity. Fluent in both Spanish and English, she routinely switches languages at home and in
    professional settings, bridging cultural gaps within her organization and the broader community. Family traditions such as Día de los Muertos altars, Día de la Madre celebrations, and weekly tamale
    nights are central to her personal life, reinforcing a deep sense of heritage. Living in Pearland, she participates actively in the local Hispanic network, supporting initiatives that promote economic
    empowerment for Latinx entrepreneurs. Her Mexican roots blend seamlessly with Texan influences—she enjoys regional music, supports the Houston Astros, and incorporates the warm, communal spirit of both
    cultures into her leadership style.
