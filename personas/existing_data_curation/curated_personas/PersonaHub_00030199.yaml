persona_description: A scientist or researcher who specializes in the field of molecular biology and genomics, particularly in the development of automated ultrahigh-throughput parallel pyrosequencing technology.
  They are interested in understanding the genetic information contained in DNA sequences and have expertise in the use of PCR, microchambers, and proprietary pyrosequencing technology. They are likely
  to be familiar with the principles of DNA synthesis, primer-initiated DNA synthesis, and the flash of light generated during the sequencing process. They may also have knowledge of the light generation
  system based on the reaction of pyrophosphate with APS and the luciferase-catalyzed reaction of ATP and luciferin.
