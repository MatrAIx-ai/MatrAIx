    coordination'']'
  hobbies: '[''Sketching and watercolor painting'', ''Photography'', ''DIY electronics and Arduino projects'', ''Raspberry Pi home automation'', ''Improvisational comedy'', ''Tabletop role‑playing games'',
    ''Hiking in the Piedmont'', ''Cooking Southeast Asian cuisine'', ''Attending local art galleries and live music events'', ''Tech podcasts and industry webinars'']'
  career_goals: Vu aims to transition from a technician role to a senior engineering technologist position within the next five years, leading R&D projects focused on sustainable manufacturing and product
    design that blends functional engineering with aesthetic appeal. He plans to complete his bachelor’s degree in engineering technology, obtain professional certifications such as Certified Engineering
    Technician (CET) and CNC/PLC specialist credentials, and eventually earn a Professional Engineer (PE) license. Vu envisions launching his own consultancy that helps small manufacturers integrate smart
    automation and design‑driven innovation, positioning himself as a thought leader in the regional tech community while gaining industry recognition.
