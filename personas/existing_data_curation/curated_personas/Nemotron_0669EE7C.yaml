  hobbies: '[''Playing ukulele'', ''Drawing and painting'', ''Exploring tide pools'', ''Building LEGO sets'', ''Reading graphic novels'', ''School art club'', ''Introductory coding projects'', ''Swimming'',
    ''Cooking traditional Hawaiian dishes'', ''Practicing hula dance'']'
  career_goals: Jason dreams of one day becoming a marine biologist who can protect the coral reefs and marine life around Hawaii, while also sharing his love for art by illustrating stories about the ocean
    and his Polynesian heritage. He hopes to combine science and creativity, perhaps by creating educational artwork that raises awareness about environmental stewardship. Jason also feels a strong desire
    to help others manage their emotions, so he imagines future roles as a youth counselor or community mentor, where he can foster harmony and support among his peers. His long‑term ambition is to make
    a positive impact on both the natural world and the people in his community.
