    observation", "Bullet journaling for task management"]'
  hobbies: '["Watercolor painting of New England scenery", "Nature photography", "Hiking and birdwatching in the White Mountains", "Reading art history and contemporary fiction", "Attending small local
    art workshops", "Journaling and bullet journaling", "Mindfulness meditation", "Crocheting blankets", "Community gardening"]'
  career_goals: Tonya aims to advance into a senior supervisory role overseeing the surveillance department at her casino, eventually becoming a Security Operations Manager. She plans to earn professional
    certifications such as the Certified Protection Professional (CPP) and Complete a GED followed by a certificate in Criminal Justice or Security Management. Long‑term, she envisions transitioning to
    a consulting role where she can train new security personnel and advise small businesses on risk assessment, while also seeking a more balanced schedule that reduces night‑shift stress.
