personas:
  professional: Tonya Koch, a veteran casino surveillance officer with a keen eye for detail and a methodical approach, leverages their analytical expertise and calm conflict‑de‑escalation skills to keep
    high‑stakes gaming floors secure while navigating night‑shift stress with disciplined bullet‑journaling.
  sports: Tonya Koch, an avid early‑morning hiker and occasional cross‑country skier, maintains fitness through weekly treks with the local Appalachian Trail crew and roots for the Boston Red Sox and New
    England Patriots, preferring low‑impact endurance activities over competitive leagues.
  arts: Tonya Koch, a devoted watercolorist, spends weekends capturing the white‑capped peaks of the White Mountains in palettes reminiscent of Winslow Homer while listening to Joan Baez and attending intimate
    performances at the historic Concord Art Association, and they fuel their creativity with art‑history tomes by Ernst Gombrich.
  travel: Tonya Koch, who meticulously plans trips in their bullet journal, favors low‑key weekend escapes to New England gems like Acadia National Park and the historic town of Portsmouth, while dreaming
    of a summer hike through the Scottish Highlands when a lighter work schedule allows for longer, slower adventures.
  culinary: Tonya Koch, an intermediate home cook, delights in simmering a classic New England clam chowder with fresh clams, potatoes, and a splash of cream, whipping up maple‑glazed salmon using locally
    harvested maple syrup, and treats themselves to seasonal blueberry crisp baked with farm‑fresh oats, while occasionally indulging in a splurge on a seafood boil at the nearby waterfront restaurant.
  core: Tonya Koch balances a meticulous, bullet‑journal‑driven surveillance career with a quiet passion for watercolor landscapes, but their habit of obsessively checking CCTV feeds at night often fuels
    late‑night worries that they soothe with meditation and a cup of strong black coffee.
background:
  cultural: Tonya is a White American with deep New England roots, raised in a modest, working‑class family in rural Coös County, New Hampshire. Her upbringing reflects the region’s values of self‑reliance,
    privacy, and community involvement. She grew up with exposure to local folk traditions, small-town fairs, and the historic appreciation of New England heritage. While her professional life centers on
    casino surveillance, she balances that with the quiet, nature‑focused lifestyle of northern New Hampshire, blending traditional New England sensibilities with the modern, fast‑paced world of gaming
    security.
attributes:
  skills: '["CCTV and video‑analytics operation", "Live surveillance monitoring", "Incident detection and reporting", "Threat assessment and risk mitigation", "Conflict de‑escalation", "Physical security
