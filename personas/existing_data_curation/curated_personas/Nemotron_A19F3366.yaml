  hobbies: '[''Crossword and Sudoku puzzles'', ''Solo or family hiking in the Cascades'', ''Meal‑prepping with recipe precision'', ''Cold‑brew coffee experimentation'', ''Maintaining a small vegetable garden'',
    ''Attending Women in Tech meet‑ups'', ''Reading non‑fiction on productivity and behavioral economics'']'
  career_goals: Sana’s short‑term goal is to move into a senior lead designer role where she can own end‑to‑end digital product strategies for a mid‑size technology company in the Seattle area. In the longer
    term she aspires to become a Director of Digital Experience, championing organization‑wide design standards, accessibility initiatives, and data‑informed design cultures. She also hopes to mentor junior
    designers—particularly women entering tech—and eventually launch a boutique consultancy that helps regional startups build scalable, user‑centric design systems while preserving her work‑life balance
    for her family.
