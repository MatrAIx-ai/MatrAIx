personas:
  professional: Sana Bernard, a 43‑year‑old UI/UX specialist, leverages a meticulous, data‑centric workflow to build and govern design systems that enforce accessibility and visual consistency, thriving
    in Agile environments where their critical eye and competitive drive push teams toward measurable, user‑focused outcomes.
  sports: Sana Bernard enjoys disciplined weekend hikes with the Pacific Northwest Hiking Club and occasional trail‑run sessions that complement their love of routine, while rooting for the Seattle Seahawks
    in football season and the Seattle Sounders FC in soccer, and they maintain a membership at a local CrossFit box where they track performance metrics with the same precision they apply to design systems.
  arts: Sana Bernard cultivates a curated artistic palate that includes attending Seattle Repertory Theatre productions of contemporary dramas, collecting limited‑edition prints by abstract painter Julie
    Mehretu, and unwinding to the eclectic sounds of Tame Impala, Radiohead, and classical pianist Ludovico Einaudi, which together feed their analytical yet emotionally resonant design sensibility.
  travel: Sana Bernard prefers meticulously planned trips that balance work‑life rhythm with adventure, having mapped out a solo hiking tour of the Canadian Rockies, a cultural immersion in Kyoto’s tea
    houses, and a family getaway to the Oregon Coast, while dreaming of a future expedition to Patagonia’s Torres del Paine once their kids graduate high school.
  culinary: Sana Bernard, an adept home chef, follows precise recipes to perfect quinoa‑stuffed bell peppers, a weekly batch of cold‑brew coffee flavored with cardamom and oat milk, and seasonal ratatouille
    using tomatoes and zucchini harvested from their own garden, while occasionally indulging in artisanal dark chocolate as a structured reward for meeting design milestones.
  core: Driven by order, Sana Bernard obsessively aligns UI pixels at 2 a.m., tracks every calorie, and meticulously plans hikes, yet their chronic worry often turns routine tasks into marathon mental marathons.
background:
  cultural: Sana grew up in a middle‑class, white American family in the suburban outskirts of Seattle, where values of self‑reliance, education, and environmental stewardship were emphasized. The Pacific
    Northwest’s culture of outdoor recreation and sustainability shaped her appreciation for hiking and gardening, while the region’s thriving tech scene influenced her early exposure to computers and coding.
    Her STEM degree cemented an analytical approach to problem‑solving, and her marriage and residence in Renton have reinforced a community‑oriented yet individualistic outlook that balances personal ambition
    with familial responsibility.
