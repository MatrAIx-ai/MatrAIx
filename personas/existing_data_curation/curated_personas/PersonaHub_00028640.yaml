persona_description: A committee member or scientific advisor who has expertise in the field of environmental health, particularly the study of the effects of solvent contamination on water supplies and
  their potential health impacts. They are interested in the quality and limitations of epidemiologic studies on this topic, and how their results can be used to assess the overall evidence and identify
  high-priority outcomes. They are also interested in the specific strategies and approaches used in these studies, such as the use of sophisticated engineering models and the collection of new data. They
  may also be interested in the broader implications of these studies for public health policy and practice.
