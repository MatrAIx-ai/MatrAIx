  hobbies: '[''Hiking in the Texas Hill Country'', ''Road trips'', ''Photography'', ''Video gaming (strategy and RPG)'', ''DIY electronics projects'', ''Attending live music events'', ''Community cooking
    classes'', ''Reading tech and business blogs'']'
  career_goals: Juan Glenn aims to transition from his current sales associate role into store management within the next two to three years. He plans to build on his leadership potential by taking on supervisory
    responsibilities, completing a bachelor's degree in business administration (or marketing) part-time, and earning certifications in retail management and e-commerce. Long-term, he envisions opening
    a niche boutique that blends his love for technology and local craftsmanship, possibly incorporating an online storefront that uses the latest digital tools he has explored. He also hopes to mentor
    new sales staff, sharing his practical experience while continuing to satisfy his curiosity about innovative retail strategies.
