personas:
  professional: Juan Purnell blends his natural charisma, detailed product knowledge, and growing conversational Spanish to create personalized retail experiences, while his curiosity about emerging consumer‑electronics
    trends drives him to experiment with point‑of‑sale shortcuts and social‑media promotions as he prepares for a future store‑manager role.
  sports: Juan Purnell follows the San Antonio Spurs and supports local club Hill Country Trail Runners, enjoys weekend hikes and occasional pickup basketball games, and maintains fitness through spur‑of‑the‑moment
    trail runs while staying modestly competitive.
  arts: Juan Purnell thrills at live blues shows featuring Stevie Ray Vaughan tributes and country concerts honoring George Strait, captures candid landscape photos of the Texas Hill Country, curates a
    modest vinyl collection, and occasionally draws inspiration from indie game soundtracks for his DIY electronics projects.
  travel: Juan Purnell prefers spontaneous road trips across the Texas Hill Country, regularly visits Fredericksburg for its wineries, has a bucket‑list that includes Big Bend National Park and a cultural
    weekend in Mexico City, and balances adventure with budget consciousness by staying in locally‑run B&Bs.
  culinary: Juan Purnell enjoys cooking smoky brisket, chicken fajitas, and chipotle‑lime guacamole, experiments with homemade salsa using fresh cilantro and jalapeños, and rates his culinary skill as intermediate—often
    swapping recipes at community cooking classes while occasionally ordering street‑style tacos from a local food truck.
  core: Juan Purnell is a curiosity‑driven retail associate who blends practical hustle with a relaxed, sometimes disorganized schedule, thriving on spontaneous road trips, DIY tech tinkering, and a love
    for live blues and Tex‑Mex flavors.
background:
  cultural: Juan Glenn grew up in a middle‑class Anglo‑American family in San Antonio, Texas. His upbringing reflects a blend of traditional Texan values—self‑reliance, hospitality, and a strong work ethic—and
    the multicultural vibrancy of the city, where Hispanic, Latino, and other cultural influences are part of daily life. He celebrates classic American holidays such as Thanksgiving and Independence Day,
    while also participating in local events like Fiesta San Antonio and enjoying regional cuisines such as Tex‑Mex and barbecue. This mix of cultural experiences has shaped his flexible outlook, practical
    mindset, and appreciation for both community traditions and new, diverse ideas.
