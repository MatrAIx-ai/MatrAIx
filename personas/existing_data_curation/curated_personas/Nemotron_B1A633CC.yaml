    theater volunteering'',''Reading historical fiction'',''Local book club'']'
  career_goals: Paula aims to transition from a teaching assistant to a full‑time adjunct professor or tenure‑track instructor within the next five years, focusing on expanding the STEM curriculum at the
    community college level. She is passionate about establishing a regional outreach program that introduces middle‑school girls in Medina County to engineering and computer science, hoping to build a
    pipeline of diverse talent. Additionally, she seeks to develop a mentorship framework for junior teaching assistants to reduce turnover and stress. As retirement approaches, she plans to secure a legacy
    through curriculum resources she authors and by mentoring successors, while maintaining a balanced workload that preserves her personal well‑being.
