personas:
  professional: Andre Ford is an aspiring junior engineer who spends afternoons constructing LEGO mechanisms, channeling their curiosity and practical mindset while reliably helping classmates troubleshoot,
    though their intense emotional reactions sometimes make them seek reassurance before tackling complex builds.
  sports: Andre Ford is a midfielder for the Riverbend Rovers youth soccer team, practicing twice weekly during the spring season, where their cooperative nature shines as they organize passes, yet they
    also value solo drills to recharge their energy.
  arts: Andre Ford devotes their free time to sketching original comic strips inspired by Stan Lee and Mo Willems, listening to The Beatles and Kidz Bop while mixing beats on the GarageBand Jr. app, and
    immerses themselves in adventure graphic novels like Amulet and Bone, shaping their creative identity.
  travel: Andre Ford enjoys weekend adventures to Shenandoah National Park and annual family trips to Washington, D.C.'s Smithsonian museums, dreaming of one day exploring the ancient ruins of Machu Picchu,
    all while balancing school obligations and their parents' budget considerations.
  culinary: Andre Ford favors gooey pepperoni pizza, creamy mac and cheese, and strawberry‑banana smoothies, often assisting their mom in the kitchen by whisking batter for pancakes and assembling bite‑size
    veggie quesadillas using fresh cheddar and colorful bell peppers.
  core: Andre Ford is a curiosity‑driven, compassionate eight‑year‑old whose LEGO inventions, soccer teamwork, and vivid imagination are tempered by a tender sensitivity that fuels both creative bursts
    and occasional anxiety, prompting them to seek reassurance from trusted adults when overwhelmed.
background:
  cultural: Andre comes from an African American family rooted in the close‑knit Black community of Enid, Oklahoma. Family gatherings often feature soul food traditions like collard greens, cornbread, and
    sweet potato pie, and stories passed down from his grandparents highlight resilience and pride. He attends a local Baptist church where gospel music, communal worship, and seasonal celebrations such
    as Juneteenth reinforce his cultural identity. The supportive neighborhood and intergenerational mentorship shape his values of compassion, cooperation, and a desire to give back to his community.
