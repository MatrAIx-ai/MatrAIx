  career_goals: Andre dreams of becoming a teacher or a pediatric healthcare professional so he can help other children learn and stay healthy. He is fascinated by the idea of designing games that teach
    science, combining his love for technology with his desire to make learning fun and accessible. He also imagines leading community projects that bring kids together, reflecting his compassionate nature
    and his wish to create safe, supportive environments for his peers.
