  career_goals: Even at his young age, Rolando dreams of growing up to be a helper who combines his love of bright vehicles and hands‑on work. He often points to fire trucks and says "firefighter" while
    also watching his parents prepare meals, expressing a wish to become a firefighter who also enjoys cooking for others. This blend reflects his curiosity about how things work and a practical desire
    to protect and care for his community.
