personas:
  professional: Rolando Chavez, a two‑year‑old budding engineer‑in‑training, builds towering block structures and solves simple puzzles, showing early spatial reasoning and a methodical curiosity that balances
    adventurous exploration with a practical habit of tidying up afterward.
  sports: Rolando Chavez loves toddling around Louisville's community park with a bright red mini soccer ball, participates in the Tiny Tots program at Louisville Soccer Club, cheers for Louisville City
    FC during family game nights, and occasionally mimics the Louisville Bats on backyard baseball play.
  arts: Rolando Chavez delights in finger‑painting to the rhythm of folk lullabies by Carlos Vives, sings along to the classic songs of Luis Miguel, and is captivated by the vibrant animation of "The Book
    of Life," shaping an early artistic identity rooted in music and color.
  travel: Rolando Chavez has explored the Louisville Zoo and the interactive exhibits at the Kentucky Science Center on family outings, and their imagination is sparked by grandparents' stories of the highlands
    and ancient ruins of Tikal, fueling a budding wish to someday visit those far‑away landscapes.
  culinary: Rolando Chavez loves the soft, spiced flavor of tamales and the cheesy crunch of black‑bean pupusas, insists on crunchy apple slices with a drizzle of peanut butter for snack time, and occasionally
    helps stir batter for banana muffins, showing early enthusiasm for cooking and diverse flavors.
  core: Rolando Chavez is a curious two‑year‑old who harmonizes boundless energy with routine, trading stickers for mango slices, occasionally dodging nap time, and charming everyone with unstoppable giggles.
background:
  cultural: Rolando grows up in a bilingual household that celebrates Guatemalan heritage while living in Louisville, Kentucky. Spanish is spoken daily at home, and he hears traditional lullabies, sees
    family photos of Guatemala, and tastes homemade tamales and black‑bean pupusas at meals. The family observes cultural celebrations such as Día de los Muertos and shares stories of Guatemalan festivals,
    fostering a strong sense of identity and community connection within the diverse tapestry of Jefferson County.
