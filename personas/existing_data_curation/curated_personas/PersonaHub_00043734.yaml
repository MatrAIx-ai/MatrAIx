persona_description: A historian who specializes in the study of the early Christian Church, particularly the period of the second century. His research interests include the life and works of Saint Donatian,
  his role as the second Bishop of Chalons-sur-Marne, and the events leading up to the Council of Chalons in 355 AD. He is particularly interested in the historical context of the period and the impact
  of Saint Donatian's teachings on the development of Christianity in Gaul.
