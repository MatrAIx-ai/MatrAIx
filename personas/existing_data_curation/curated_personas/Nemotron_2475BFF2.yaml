  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading (Nonfiction, Economics, Tech)'', ''Listening to History Podcasts'', ''Volunteer Financial Advising'', ''Church Outreach'', ''Attending
    Local Cultural Festivals'']'
  career_goals: Ashwin aims to transition into a senior leadership role, such as chief financial officer or head of audit for a regional firm, within the next five years. He plans to deepen his credentials
    by completing the CPA designation and advanced certifications in data analytics for finance. In parallel, he is interested in establishing a community consulting practice that offers financial literacy
    workshops and pro‑bono advisory services for local nonprofit organizations. Over the longer term, he envisions sharing his practical knowledge as an adjunct instructor at a nearby community college
    while gradually scaling back his full‑time workload toward a semi‑retired, mentorship‑focused phase.
