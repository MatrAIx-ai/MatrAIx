  hobbies: '[''Hiking'', ''Mountain biking'', ''Landscape photography'', ''Scale model building'', ''Yoga'', ''Mindfulness meditation'', ''Tabletop gaming'', ''Home brewing'', ''Community festivals'', ''Technical
    reading'']'
  career_goals: Over the next five years, Mack aims to transition from a drafter to a BIM manager or project coordinator, overseeing larger infrastructure projects in the Front Range region. He plans to
    obtain a professional engineering (PE) license or an architectural technologist certification, and to earn LEED Green Associate credentials to deepen his expertise in sustainable building practices.
    His competitive drive pushes him to become the top-rated drafter in his firm, mentoring junior staff and leading the implementation of new digital workflows. Ultimately, he envisions establishing his
    own consulting practice that offers specialized drafting services for small-scale residential and commercial developments, providing both stability for his family and creative autonomy.
