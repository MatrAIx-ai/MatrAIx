personas:
  professional: Mack Smith, a 27-year-old CAD/BIM specialist, leverages their methodical, detail-oriented nature and competitive drive to produce flawless construction drawings, rigorously enforce code
    compliance, and champion sustainable design while constantly evaluating emerging drafting technologies.
  sports: Mack Smith channels their competitive streak into weekend hikes and mountain-bike rides on Colorado's extensive trail network, trains with the Boulder Trail Club during summer, follows the Denver
    Broncos, Colorado Avalanche, and Colorado Rockies passionately, and squeezes in occasional intramural soccer to keep a balanced fitness routine.
  arts: Mack Smith’s artistic side emerges in meticulous scale-model building and landscape photography inspired by Ansel Adams, while their listening habits favor indie folk icons like The Lumineers and
    Fleet Foxes, and they regularly attend performances at the Denver Center for the Performing Arts.
  travel: Mack Smith favors meticulously planned road trips that blend solitary mountain photography with occasional social stops at farmers' markets, having explored Yosemite and Banff National Parks,
    and they dream of trekking Patagonia's Torres del Paine after saving enough through disciplined budgeting.
  culinary: Mack Smith enjoys experimenting with home-brewing pale ales using Cascade hops, cooks hearty Colorado-style green chili with roasted poblano peppers and roasted corn, and occasionally dines
    at craft-beer-focused gastropubs for a balanced palate, though they sometimes over-season recipes in pursuit of the perfect flavor.
  core: Mack Smith is a hyper-organized, anxiety-prone CAD enthusiast who balances solitary creativity with fierce competition, often over-analyzing both designs and life choices while occasionally neglecting
    self-care in favor of perfection.
background:
  cultural: Mack grew up in the small town of Johnstown, Colorado, a community that blends rural traditions with the growing influence of the Denver metropolitan area. His family’s roots trace back to German
    and Scandinavian immigrants who settled the western plains in the early 20th century, instilling values of hard work, self-reliance, and practical problem solving. Local customs such as Fourth of July
    parades, high-school football games, and seasonal potlucks remain important social touchstones. While he identifies with broader American cultural norms, Mack also respects the region’s emphasis on
    outdoor recreation, environmental stewardship, and a pragmatic approach to both work and family life.
