  career_goals: Crystal aims to combine her curiosity about the natural world with practical problem‑solving in a future career. She aspires to become an environmental scientist or wildlife conservationist,
    focusing on sustainable forest management and local ecosystem preservation. In the short term, she plans to enroll in a high school with strong STEM and environmental programs, join the school's eco‑club,
    and seek internships or volunteer opportunities with nearby conservation groups. Long‑term, she hopes to earn a degree in environmental studies or biology, conduct field research in Maine’s forests
    and coastal areas, and possibly share her knowledge as an educator or outreach coordinator.
