  hobbies: '[''Visiting Worcester Art Museum'', ''Street photography'', ''Attending community theater'', ''Listening to jazz and live music'', ''Participating in church choir'', ''Playing recreational basketball'',
    ''Gardening'', ''Reading African American literature'', ''Volunteering at youth mentorship programs'']'
  career_goals: Henderson aims to transition from a front‑line courier to a supervisory or dispatch role within the next three years, leveraging his deep knowledge of Worcester’s neighborhoods and his leadership
    instincts. He plans to obtain a Commercial Driver’s License to expand his service options and eventually start a small, community‑focused delivery service that integrates art‑tour elements, offering
    curated routes that highlight local galleries and cultural landmarks. Alongside professional advancement, he seeks stable retirement benefits and to develop mentorship programs for younger couriers,
    while also prioritizing mental‑health resources to better manage his anxiety and emotional reactivity.
