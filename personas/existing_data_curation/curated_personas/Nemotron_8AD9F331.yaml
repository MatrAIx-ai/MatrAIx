  career_goals: Cornesia dreams of a future where she can combine her love of helping others with her talent for communication. In the near term, she aims to become the class monitor and organize a buddy‑system
    for new students. Looking ahead, she aspires to become a teacher or a pediatric nurse so she can mentor younger children and support families in her community. She also envisions herself as a community
    organizer who leads neighborhood clean‑up projects and celebrates cultural heritage events in Newark.
