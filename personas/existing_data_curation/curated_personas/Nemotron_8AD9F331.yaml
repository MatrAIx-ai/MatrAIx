personas:
  professional: Cornesia Hayes is a budding junior inventor who transforms LEGO creations into rudimentary prototypes while experimenting with simple science kits, showcasing a blend of curiosity and practicality,
    and naturally steps into the role of group leader with talkative confidence, ensuring projects stay organized yet flexible.
  sports: Cornesia Hayes dazzles on the field with the Hillside Hurricanes youth soccer team, practicing twice a week at the neighborhood park, and they cheer for LAFC in Major League Soccer and the Los
    Angeles Lakers in the NBA, while also joining after‑school gymnastics sessions for added agility.
  arts: Cornesia Hayes blends hip‑hop moves to the beats of Chance the Rapper with soulful choir performances of gospel classics at church, draws inspiration from Beyoncé’s stage presence and the animated
    artistry of Disney’s Moana, and creates vibrant digital drawings on a tablet featuring bold colors and superhero themes.
  travel: Cornesia Hayes loves spontaneous family road trips to the state fair and the local aquarium, dreams of visiting the Eiffel Tower in Paris and the cherry blossoms in Tokyo, and they often map out
    imagined itineraries with crayons, balancing excitement for adventure with the comfort of familiar weekend outings.
  culinary: Cornesia Hayes delights in cooking simple dishes like macaroni‑and‑cheese with a sprinkle of cheddar, assembling homemade pizza topped with pepperoni and mushrooms, and blending fruit smoothies
    with banana, strawberries, and Greek yogurt, though they occasionally forget to clean the kitchen counter after tasting.
  core: Cornesia Hayes is a charismatic seven‑year‑old who blends endless curiosity with practical problem‑solving, leading playground games, saving for big LEGO builds, and humming gospel tunes, all while
    occasionally leaving a trail of LEGO bricks behind.
background:
  cultural: Cornesia comes from an African‑American family rooted in Newark’s vibrant cultural tapestry. Her household celebrates traditions such as Juneteenth, Kwanzaa, and church holidays, and she frequently
    hears stories of local civil‑rights leaders and artists. The neighborhood’s rich musical legacy—ranging from jazz to modern hip‑hop—shapes her love for rhythm and dance. Family gatherings often feature
    soul food and communal cooking, reinforcing a strong sense of community, cooperation, and mutual support that is reflected in her compassionate outlook.
