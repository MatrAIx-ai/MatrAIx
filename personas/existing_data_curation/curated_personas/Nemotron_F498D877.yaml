personas:
  professional: Olga Torres, a 23‑year‑old aspiring master painter, blends meticulous surface preparation with a keen eye for color, leveraging their organized curiosity to deliver eco‑friendly mural projects
    while confidently managing client timelines, safety protocols, and precise cost estimates.
  sports: Olga Torres stays active by jogging along the river trail in spring, attending weekly yoga classes in winter, and playing for the community soccer club, the Riverside Rovers, while cheering on
    the Los Angeles Dodgers and the LA Galaxy as their favorite professional teams.
  arts: Olga Torres fuels their artistic drive by sketching heritage‑inspired motifs, listening to folk musicians like Lila Downs and Natalia Lafourcade, studying the works of Frida Kahlo and Diego Rivera,
    and regularly participating in local mural workshops hosted by acclaimed street artist Carlos Alvarado.
  travel: Olga Torres prefers carefully planned weekend getaways, having explored the vibrant streets of Oaxaca and the natural splendor of Sedona, while dreaming of a sunrise hike in the Atlas Mountains
    of Morocco, always booking budget accommodations and packing a concise checklist to stay within their modest travel fund.
  culinary: Olga Torres, an intermediate home cook, delights in preparing traditional dishes such as tamales, pozole, and chile relleno using fresh herbs like cilantro, epazote, and oregano from their balcony
    garden, balancing authentic flavors with occasional experiments that incorporate locally sourced pork shoulder and corn masa.
  core: Olga Torres is a methodical creator who channels curiosity into sustainable painting projects, savors slow‑cooked family meals, and quietly balances ambitious entrepreneurship with a habit of late‑night
    sketching while they occasionally neglect sleep.
background:
  cultural: Olga is a first‑generation Mexican‑American who grew up in a bilingual household in Ingleway, CA. Her upbringing emphasized family cohesion, respect for elders, and the celebration of Mexican
    traditions such as Día de los Muertos, quinceañeras, and communal cooking. She maintains strong ties to the local Latino community, often participating in church events and neighborhood festivals. These
    cultural roots influence her aesthetic preferences, motivating her to incorporate vibrant colors and traditional patterns into her work, while also fostering a deep sense of responsibility to give back
    to her community.
attributes:
  skills: '[''surface preparation'', ''drywall patching'', ''sanding'', ''priming and painting'', ''wallpaper application'', ''color matching'', ''project estimation'', ''client communication'', ''safety
