  hobbies: '[''personal painting and sketching'', ''cooking Mexican dishes'', ''gardening'', ''listening to traditional music'', ''volunteering at community art programs'', ''attending cultural festivals'',
    ''exploring local nature trails'']'
  career_goals: Olga aims to become a certified master painter and acquire a contractor's license within the next few years. She envisions launching her own small painting and paperhanging business that
    emphasizes sustainable, low‑VOC products and offers culturally inspired mural services reflecting Mexican heritage. Parallel to building her enterprise, she plans to complete her GED and pursue certification
    programs to broaden her technical expertise. Olga also hopes to mentor other young women from the Latino community, helping them enter skilled trades and build stable careers.
