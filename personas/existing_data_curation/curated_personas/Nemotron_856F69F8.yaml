  career_goals: In the near future, Robert aims to maintain a top‑5% GPA, win his middle‑school science fair, and secure a leadership position as co‑captain of the robotics club. He plans to attend a prestigious
    magnet high school in Orange County to deepen his knowledge in STEM subjects, earn scholarships, and eventually study aerospace or environmental engineering at a top university. His long‑term ambition
    is to design innovative, sustainable solutions for coastal communities, possibly founding a technology startup that leverages robotics and data analytics to protect marine ecosystems.
