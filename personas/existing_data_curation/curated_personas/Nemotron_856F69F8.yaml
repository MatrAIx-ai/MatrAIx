personas:
  professional: An aspiring robotics engineer, Robert Pitts combines his love for coding, drone building, and strategic video games into a focused pursuit of engineering challenges, consistently applying
    his organized, achievement‑driven mindset to lead his school’s robotics club and win local competitions.
  sports: A surf‑and‑volleyball enthusiast, Robert Pitts rides the waves at Newport Beach with a local junior surf club, spikes beach volleyball at sunset with his friends, and cheers on the LA Dodgers
    and LA Lakers, while also participating in the high school track and field cross‑country team during the school year.
  arts: A rhythm‑driven creative, Robert Pitts drums in the school marching band, practices set pieces from The Who's Tommy and modern beats inspired by Billie Eilish, and immerses themselves in sci‑fi
    literature from authors like Neal Stephenson, often drawing parallels between percussion patterns and narrative arcs.
  travel: A beach‑centric explorer, Robert Pitts loves weekend road trips to Malibu and family vacations to Hawaii's Maui, where they surf in the mornings and hike the Haleakala crater in the afternoons,
    while dreaming of a future study abroad program in Japan to experience the country's coastal robotics festivals.
  culinary: A surf‑inspired foodie, Robert Pitts favors fish tacos with fresh cilantro and lime, whips up avocado toast topped with smoked salmon for breakfast, and experiments with making mango‑pineapple
    smoothies after surf sessions, though they occasionally over‑salt their pizza toppings in the excitement of cooking with friends.
  core: Robert Pitts is a hyper‑organized surfer‑coder who balances a disciplined study schedule with a relentless drive for beach clean‑ups and robot competitions, occasionally forgetting to hydrate between
    surf sessions.
background:
  cultural: Robert grew up in Newport Beach, an affluent coastal city in Orange County, California. His family is of European descent, with roots in the United States that trace back several generations.
    The region's blend of sunny beach culture, an emphasis on outdoor recreation, ecological awareness, and a strong focus on academic achievement has shaped his values and interests. He has been exposed
    to a diverse community that includes both long‑standing residents and newcomers, fostering an appreciation for multicultural perspectives while maintaining a traditional middle‑American work ethic.
