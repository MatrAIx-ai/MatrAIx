persona_description: A pediatrician who specializes in the diagnosis and treatment of myasthenia gravis in children. She has a large cohort of patients, including both seronegative and antibody-positive
  patients, and is interested in the impact of treatment and genetic testing on the prognosis of the disease. She is also interested in the use of cell-based assays for detecting acetylcholine receptor
  antibodies and in the management of myasthenia gravis in children, including the use of thymectomy as a treatment option.
