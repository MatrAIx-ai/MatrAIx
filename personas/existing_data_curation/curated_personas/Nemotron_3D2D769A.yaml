personas:
  professional: Jankie Gramith, a retired community organizer now spearheading a neighborhood oral-history archive, blends decades of event-planning know-how, a keen visual-arts eye, and horticultural expertise
    to curate volunteer-run exhibitions and weekly art-talks at the Olympia public library, while their relaxed, sometimes forgetful scheduling style keeps the projects delightfully flexible and their empathetic
    mentorship eases the worries of both seniors and young volunteers.
  sports: Jankie Gramith enjoys leisurely hikes along the Puget Sound shoreline with the Olympia Senior Hiking Club, follows the Seattle Seahawks and Seattle Mariners as devoted fans, and occasionally joins
    the community’s senior shuffleboard league at the local recreation center for lighthearted competition.
  arts: Jankie Gramith frequents the Tacoma Art Museum and the Black Box Gallery, draws inspiration from Georgia O'Keeffe and contemporary Pacific Northwest photographer Mark Boles, volunteers at the Olympia
    Repertory Theatre, and reads works by authors such as Margaret Atwood and David Mitchell to challenge conventional ideas.
  travel: Jankie Gramith favors lowkey flexible travel, taking weekend drives to the San Juan Islands and Oregon's coastal towns, dreaming of a future art focused pilgrimage to Florence and Paris, while
    relying on a modest travel fund and a well worn road map rather than rigid itineraries.
  culinary: Jankie Gramith, a confident home cook, delights in preparing seasonal dishes such as cedar smoked salmon with locally foraged fiddlehead ferns, wild mushroom risotto, and a kale and hazelnut
    salad, while savoring a cup of locally roasted Sumatra coffee and occasionally treating friends to a potluck featuring heirloom tomatoes and fresh rhubarb crumble.
  core: Jankie Gramith is a curiosity driven, art loving septuagenarian who balances organized community initiatives with blissful disarray, worries about the future yet finds peace in watercolor mornings,
    bird song hikes, and the gentle hum of a knitting circle.
background:
  cultural: Jankie grew up in a middle‑class family of English and Irish descent in the Pacific Northwest, steeped in the region’s reverence for nature and a modest Protestant upbringing. Her cultural identity
    blends the close‑knit, self‑reliant values of rural Mason County with the progressive, civically engaged spirit of Olympia’s arts community. This background has fostered a lifelong respect for community
    service, environmental stewardship, and the appreciation of both traditional and contemporary cultural expressions.
