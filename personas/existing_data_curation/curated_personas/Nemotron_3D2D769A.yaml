  career_goals: Although retired from formal employment, Jankie aims to deepen her contribution to the Olympia community by launching a neighborhood oral‑history archive that captures stories of long‑time
    residents. She hopes to author a memoir that weaves her personal reflections with local history, and to mentor emerging artists through a weekly art‑talk series at the public library. Maintaining her
    health and managing stress through gentle yoga and mindfulness are also central to her personal ambition, as is preserving and sharing the cultural heritage of the Pacific Northwest with her family.
