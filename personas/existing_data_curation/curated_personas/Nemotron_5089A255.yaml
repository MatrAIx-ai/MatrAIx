  hobbies: '[''LEGO construction'', ''Scratch coding'', ''Minecraft (Survival mode)'', ''Chess'', ''Reading sci‑fi novels'', ''Watching space documentaries'', ''Robotics club'', ''STEM fairs'', ''Rubik’s
