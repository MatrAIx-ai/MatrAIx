  career_goals: He dreams of turning his curiosity into a career in engineering, hoping one day to design robots or mechanical systems that solve real‑world problems. He is especially interested in aerospace
    and hopes to work as an aerospace engineer or astronaut, viewing this as a way to combine his love of space, his practical building skills, and his competitive drive to excel in science competitions.
    He also wants to earn scholarships that will allow him to attend a top STEM‑focused high school and eventually university.
