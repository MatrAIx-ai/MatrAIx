personas:
  professional: Mohamed Rodrigo, an aspiring junior robotics engineer, channels a blend of curiosity and practicality into building intricate LEGO mechanisms, programming Scratch games, and contributing
    to the school’s robotics club, while their competitive streak pushes them to perfect every design despite occasional disorganization.
  sports: Mohamed Rodrigo, an active explorer, hikes the nearby Greenwood State Park trails, participates in a small after‑school cycling club, plays forward for the local youth soccer team Brookside FC,
    and avidly watches the Metro City Bears basketball games, channeling their competitive drive into personal fitness while preferring intimate group settings over large crowds.
  arts: Mohamed Rodrigo, a creative technophile, fills sketchbooks with imagined machines inspired by the futuristic worlds of Isaac Asimov and Orson Scott Card, listens to instrumental scores from Hans
    Zimmer and Ludovico Einaudi while building LEGO, and follows YouTube art tutorials from Art for Kids Hub to refine their drawing technique.
  travel: Mohamed Rodrigo, an inquisitive traveler, embraces flexible weekend getaways to local parks and day trips to the nearby science museum, dreams of family vacations to the Kennedy Space Center in
    Florida and the International Robotics Expo in Tokyo, balancing a modest travel budget with an enthusiastic, occasionally over‑planned itinerary that still leaves room for spontaneous LEGO‑building
    sessions.
  culinary: Mohamed Rodrigo, an adventurous young eater, favors classic pepperoni pizza, homemade spaghetti with tomato sauce and parmesan, chocolate chip cookies, and occasionally helps prepare simple
    fruit kebabs with strawberries, bananas, and honey, often pairing meals with crunchy carrot sticks and ranch dressing as a favorite snack.
  core: Mohamed Rodrigo blends relentless curiosity for building and coding with a competitive yet worry‑prone mindset, preferring solitary projects, meticulous LEGO creations, and strategic games over
    large social scenes, while juggling cautious money habits, health awareness, and a love for spontaneous adventure.
background:
  cultural: Mohamed grew up in Bethesda, Maryland, an affluent, culturally diverse suburb of Washington, D.C. His family, identifying as white, blends American middle‑class values with subtle influences
    from his parents’ mixed heritage—reflected in his name that combines ‘Mohamed’ and ‘Rodrigo.’ The household emphasizes academic achievement, practical problem‑solving, and self‑reliance, while also
    exposing him to a range of cultural experiences, from international cuisine at neighborhood festivals to occasional celebrations of holidays from different traditions. This environment nurtured his
    curiosity, competitive spirit, and pragmatic outlook.
