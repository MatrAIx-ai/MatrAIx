  career_goals: Although he is retired from formal employment, Curtis aims to stay actively involved in his community. He plans to volunteer as a mentor at the local Small Business Development Center, helping
    new entrepreneurs navigate start‑up challenges. He hopes to secure a seat on the board of a senior‑services nonprofit where he can apply his budgeting expertise. Additionally, he wants to lead monthly
    financial‑literacy workshops for older adults, author a series of blog posts sharing his business lessons, and develop a small‑group travel club for seniors interested in cultural tours. He also considers
    taking a short course in digital marketing to better support his volunteer projects.
