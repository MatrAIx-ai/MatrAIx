personas:
  professional: Jorge Diazlopez is a high‑school senior who leverages bilingual communication and meticulous project‑planning skills as a volunteer coordinator at the county food bank while preparing to
    enroll in a technical college automotive technology program, where they aim to apply their systematic troubleshooting and budgeting abilities to become a certified technician and eventually a project
    manager.
  sports: Jorge Diazlopez plays weekly soccer matches with Riverbend Soccer Club at the local park, admires and follows North Carolina FC and D.C. United in the MLS, and they spend weekends hiking the Blue
    Ridge Parkway and fishing in the Roanoke River, using these activities as structured outlets for both competition and solitary relaxation.
  arts: Jorge Diazlopez immerses themselves in the energetic sounds of bandas and norteño groups such as Los Tigres del Norte and La Arrolladora, practices acoustic guitar on evenings after school, reads
    science‑fiction staples like Isaac Asimov’s Foundation and Ursula K. Le Guin’s The Left Hand of Darkness, and they unwind with strategy titles like Civilization VI and XCOM 2, weaving these artistic
    influences into a disciplined creative routine.
  travel: Jorge Diazlopez prefers low‑cost, nature‑focused getaways, having hiked Shenandoah National Park’s Old Rag Loop and fished the James River, while they dream of a solo trek along the Pacific Crest
    Trail and they plan trips months ahead with a spreadsheet to maximize limited student funds and balance school responsibilities.
  culinary: Jorge Diazlopez refines family recipes such as hand‑rolled pork tamales, smoky chipotle salsa, and homemade corn tortillas, applying a methodical step‑by‑step approach that blends traditional
    ingredients like masa harina, dried chilies, and fresh cilantro with precise timing, and they relish experimenting with regional sauces while occasionally over‑seasoning in pursuit of bold flavor.
  core: Jorge Diazlopez is an organized, anxiety‑prone 18‑year‑old who channels their love of structure into soccer, meticulous budgeting, careful cooking of family recipes, and a methodical path toward
    a skilled‑trade career, balancing social responsibility with solitary pursuits, yet sometimes overthinks decisions and they neglect self‑care.
background:
  cultural: Jorge is a first‑generation Mexican American; his parents emigrated from Veracruz, Mexico, bringing with them a strong sense of family, Catholic traditions, and culinary heritage. Growing up
    in Marion, North Carolina, he was raised in a bilingual household where Spanish is spoken at home and English dominates school and community life. He celebrates Mexican holidays such as Día de los Muertos
    and Christmas with a blend of Mexican and Southern customs, and he frequently participates in family gatherings centered around food and music. This bicultural upbringing has given him a deep respect
    for both his ancestral roots and the close‑knit rural community of McDowell County, fostering a sense of responsibility to contribute positively to both cultures.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Organizational planning and time management'', ''Basic computer literacy (Microsoft Office, Google Suite)'', ''Mechanical troubleshooting (bicycles,
    small engines)'', ''Personal budgeting and finance management'', ''Community event coordination'', ''Traditional Mexican cooking'']'
  hobbies: '[''Soccer'', ''Playing guitar and listening to Mexican music'', ''Hiking and fishing in the Blue Ridge Mountains'', ''Reading science‑fiction novels'', ''Strategy video gaming'', ''Volunteering
    at the local food bank'', ''Cooking traditional Mexican dishes (tamales, salsas)'']'
  career_goals: He aims to enroll in a technical college program in automotive technology or HVAC to gain a certification that leads to a stable, well‑structured career in the skilled trades. He hopes to
    secure a position as a certified technician, where clear protocols and predictable work schedules align with his desire for order. Over the long term, he envisions advancing to a supervisory or project‑manager
    role within a local service company, while also obtaining certifications that would allow him to work as an emergency‑services responder, reflecting his wish to help others. He plans to use scholarships
    and part‑time work to fund his education, and he is determined to achieve financial independence to support his family.
