personas:
  professional: Angie Broadway, a seasoned community volunteer turned aspiring events coordinator, leverages their budgeting acumen, public‑speaking flair, and social‑media savvy to mobilize volunteers
    and donors while navigating a competitive streak and occasional stress‑induced perfectionism.
  sports: Angie Broadway enjoys weekend hikes along the Blue Ridge foothills, participates in a local walking club that convenes at the city park, passionately supports the Atlanta Braves and the WNBA’s
    Atlanta Dream, and follows a daily stretching routine to offset the sedentary demands of their event planning work.
  arts: Angie Broadway immerses themselves in jazz giants like John Coltrane and gospel icons such as Mahalia Jackson, curates community exhibitions featuring contemporary artists like Kara Walker, creates
    vibrant abstract paintings and narrative quilts, and regularly attends spoken‑word nights at the downtown cultural center.
  travel: Angie Broadway plans trips with meticulous itineraries, favoring historically significant sites such as the Tuskegee Institute in Alabama and the National Museum of African American History and
    Culture in Washington, D.C., while also seeking spontaneous weekend getaways to New Orleans for its live brass bands and culinary delights, reflecting their love of blending structured exploration with
    spontaneous discovery.
  culinary: Angie Broadway delights in cooking Southern soul‑food staples like fried chicken, smoky collard greens, and sweet‑potato pie, expertly blends spices such as cayenne and paprika, and often hosts
    dinner gatherings where friends sample their signature peach cobbler and homemade hot sauce.
  core: Angie Broadway is a charismatic community organizer whose love for arts, soulful cuisine, and historic travel is tempered by a competitive edge and a habit of over‑committing, leading to occasional
    stress‑driven perfectionism in their many projects.
background:
  cultural: Angie grew up as an African‑American woman in the South, rooted in a close‑knit Black community and a historically Black church that emphasized faith, resilience, and communal support. Her cultural
    heritage blends Southern traditions—such as soul‑food cooking, gospel music, and storytelling—with a strong sense of family and collective identity. She draws inspiration from African‑American artistic
    movements, civil‑rights history, and the vibrant local culture of Spartanburg County, which informs her appreciation for art, her commitment to community service, and her desire to preserve and celebrate
    Black cultural narratives.
attributes:
  skills: '[''Event planning and coordination'', ''Public speaking and facilitation'', ''Interpersonal communication'', ''Volunteer management'', ''Budgeting and household finance'', ''Critical thinking
    and problem solving'', ''Creative writing and storytelling'', ''Art curation and appreciation'', ''Crafting (quilting, sewing)'', ''Social media content creation'', ''Mentoring and peer coaching'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending live theater and spoken‑word performances'', ''Painting and visual arts'', ''Quilting and crafts'', ''Reading contemporary fiction, poetry,
    and biographies'', ''Cooking and experimenting with Southern soul‑food recipes'', ''Hosting dinner gatherings'', ''Participating in church choir and Bible study'', ''Organising community events'', ''Gardening'',
    ''Hiking in the Blue Ridge foothills'', ''Traveling to African‑American historical sites'']'
  career_goals: Angie's primary career ambition is to translate her community leadership into a formal role as a community outreach or events coordinator for a local nonprofit or cultural institution. She
    aims to complete a certificate program in event management and leverage her network to launch a small home‑based arts studio where she can teach quilting and host pop‑up exhibitions. Over the next five
    years she hopes to become the director of a neighborhood cultural center, secure funding for community art programs, and mentor younger residents, while also achieving greater personal stability and
    reducing stress through structured professional growth.
