  career_goals: Kristen dreams of turning her love of art and imagination into a career as a visual storyteller. In the short term she hopes to win a school art contest, create a personal blog where she
    shares her illustrations and stories, and join a youth coding club to expand her digital‑media skills. Long‑term, she envisions studying graphic design or animation in college and eventually working
    as a concept artist for video games or as an author‑illustrator of children’s books. She also hopes to use her talents to mentor other kids in community art programs and to lead collaborative creative
    projects that bring together diverse groups of peers.
