  career_goals: Eric aims to move into a supervisory role on the production floor, such as shift lead or floor manager, within the next three years. To prepare, he plans to obtain a GED and earn an OSHA
    30‑hour certification and a journeyman maintenance certificate. He wants a position that offers more consistent hours, better health benefits, and a modest salary increase to provide greater financial
    security for his wife and children. Long‑term, he hopes to transition into industrial maintenance, where his practical skills can be leveraged in a higher‑paying, less physically demanding capacity.
