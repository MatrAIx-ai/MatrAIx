persona_description: A scientist who is interested in the study of biomass carbonisation, specifically the hydrothermal carbonisation process. They are aware of the potential benefits of using biomass as
  a carbon converter and are exploring the feasibility of accelerating the underlying coalification processes by chemical means. They are familiar with the natural process of peat or coal formation and
  are excited by the possibility of using hydrothermal carbonization as a carbon sequestration scheme. They have a keen interest in soil research and the use of locally generated charcoal for soil improvement.
