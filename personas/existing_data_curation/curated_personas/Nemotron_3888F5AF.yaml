  career_goals: Although Linda is only five, she already dreams of future roles that combine her love of caring for others and her curiosity about the world. She often says she wants to be a teacher so
    she can share stories, a veterinarian because she loves animals, or an artist to create beautiful pictures. As she grows, she is encouraged to explore these interests through school activities and community
    programs, aiming to develop the knowledge and confidence needed for those paths.
