persona_description: A higher education institution administrator who is committed to improving the employability of engineering graduates by focusing on reducing the skill gaps in areas such as integrity,
  reliability, teamwork, entrepreneurship, communication in English, and use of modern tools and technologies. They understand the importance of developing professionals who are responsive to economic,
  social, cultural, technical, and environmental change and can work flexibly and intelligently across business contexts. They are aware of the need for an employability strategy fund, the explicit identification
  of employability skills in all university curriculums, enhanced teaching and assessment of employability skills, and the provision of funding for universities to systematically review their work on developing
  employability skills. They are also aware of the importance of providing academic staff with relevant support and resources, integrating employability skills into curriculum and course design, providing
  students with work placements and exposure to professional settings, and providing advice and guidance through career services.
