personas:
  professional: Liliana Roismendez, an aspiring young storyteller and junior game developer, channels their love for fantasy novels, detailed sketching, and structured LEGO building into crafting narrative‑driven
    Scratch games, balancing a practical need for clear rules with spontaneous bursts of imagination.
  sports: Liliana Roismendez plays on the Bright Horizons Youth Soccer Club, enjoys watching the Miami Marlins during baseball season, and approaches fitness with short, structured bike rides that satisfy
    their need for predictability, though they often skip a session when a new LEGO set or Scratch project takes priority.
  arts: Liliana Roismendez immerses themselves in sketching elaborate fantasy scenes, draws inspiration from the cinematic storytelling of Hayao Miyazaki, admires the literary world‑building of a beloved
    wizarding series author, and listens to a low‑volume mix of salsa, reggaeton, and traditional island rhythms while drawing.
  travel: Liliana Roismendez dreams of traveling to Utah’s Arches National Park to stargaze under pristine night skies, enjoys family visits to Orlando’s theme parks where a detailed itinerary balances
    structured activities and free time, and prefers low‑stress travel planning that lets them bring along a sketchbook and portable telescope.
  culinary: Liliana Roismendez helps in the kitchen by preparing spiced rice with beans, sweet plantain fritters, and homemade tortilla chips, finding the measured chopping and simmering calming, though
    they often leave a small mess on the counter, a reminder of their spontaneous culinary experiments.
  core: Liliana Roismendez is a solitary, imaginative 11‑year‑old who blends a love for structured creative projects with a laid‑back attitude toward chores, frequently losing track of time while sketching,
    coding, and gazing at stars.
background:
  cultural: Liliana comes from a Puerto Rican family rooted in Chicago’s Humboldt Park neighborhood. At home, Spanish and English blend seamlessly, and family gatherings celebrate traditions such as Three
    Kings Day, Noche Buena, and the annual Puerto Rican Day Parade. Her household regularly prepares arroz con gandules, pasteles, and mofongo, linking food to cultural memory. She participates in a local
    cultural center where she learns traditional dance steps, hand drumming, and the history of Puerto Rico. This bicultural environment nurtures her pride in her heritage while exposing her to the city’s
    wider multicultural tapestry, shaping her identity and creative aspirations.
