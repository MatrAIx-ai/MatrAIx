  skills: '[''Bilingual Spanish-English communication'', ''Reading comprehension'', ''Creative writing'', ''Puzzle solving'', ''Digital illustration'', ''Basic coding (Scratch)'']'
  hobbies: '[''Reading fantasy and adventure novels'', ''Sketching and digital illustration'', ''LEGO building'', ''Scratch programming'', ''Listening to salsa and reggaeton'', ''Journaling'', ''Stargazing'',
    ''Family cooking traditional Puerto Rican dishes'']'
  career_goals: Liliana dreams of becoming a children's book author and illustrator who brings vibrant Puerto Rican stories to life. She imagines studying graphic design and digital art so she can create
    picture books and interactive apps that celebrate her heritage. She also hopes to expand her Scratch skills into simple educational games, allowing her to work in a quiet, creative environment while
    sharing cultural narratives with other kids.
