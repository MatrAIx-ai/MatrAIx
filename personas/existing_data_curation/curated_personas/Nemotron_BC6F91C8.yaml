  hobbies: '[''Painting'', ''Community Mural Projects'', ''Attending Art Festivals'', ''Dancing (Hip‑Hop/R&B)'', ''Cooking Soul Food'', ''Hosting Potluck Gatherings'', ''Adult Volleyball League'', ''Youth
    Choir Mentoring'']'
  career_goals: Breanna aims to earn a bachelor’s degree in Early Childhood Education within the next two years and move into a lead teacher or program coordinator role at her daycare. She dreams of launching
    a community‑based after‑school arts and STEAM program that offers free workshops to children in underserved neighborhoods of Lee County. Long‑term, she envisions becoming a director of a regional early‑learning
    network, influencing policy to promote equitable access to quality preschool education, and earning recognition for innovative, culturally responsive curriculum design.
