personas:
  professional: Breanna Howard, a 27‑year‑old early‑childhood educator with an associate degree, leverages their curiosity for art and unconventional ideas to design arts‑rich, developmentally appropriate
    curricula while battling the occasional chaos of missed deadlines due to a spontaneous nature.
  sports: Breanna Howard, a lively participant in an adult volleyball league, frequently cheers for the Lee County Tigers minor‑league baseball team and integrates casual pickup basketball games at the
    community center into their weekly fitness routine.
  arts: Breanna Howard, an avid painter, experiments with acrylics and mixed‑media collages, draws inspiration from contemporary muralists such as Faith47 and the dynamic street‑dance culture set to hip‑hop
    tracks by Missy Elliott, and leads weekend community mural projects celebrating local history.
  travel: Breanna Howard favors spontaneous road trips to regional art festivals like the Asheville Street Art Expo and the Savannah Music Festival, while dreaming of an immersive cultural stay in Oaxaca
    to study traditional crafts.
  culinary: Breanna Howard loves cooking soulful Southern dishes such as shrimp and grits, collard greens, and peach cobbler, often seasoning with fresh thyme and parsley, and delights in hosting potluck
    gatherings where friends contribute complementary sides like black‑eyed‑pea salad.
  core: Breanna Howard balances a vibrant, art‑driven teaching career with a spontaneous, competitive streak, juggling community murals, volleyball matches, and impulsive festival outings while habitually
    juggling deadlines.
background:
  cultural: Breanna’s identity as a Black woman from the Mississippi Delta shapes her worldview and professional approach. She grew up immersed in Southern African‑American traditions—gospel music, storytelling,
    soul food, and strong church community ties—which fostered a deep appreciation for collective resilience and cultural expression. She draws on this heritage by incorporating African‑diaspora art forms,
    rhythm, and oral histories into her childcare curriculum, aiming to give the children she serves a sense of pride in their roots. Her marriage and close‑knit family network provide a supportive foundation
    that balances her ambitious career aspirations with a commitment to community uplift and cultural preservation.
attributes:
  skills: '[''Early Childhood Development'', ''Creative Arts Integration'', ''Improvisational Storytelling'', ''Behavior Management'', ''First Aid & CPR'', ''Parent Communication'', ''Group Activity Facilitation'',
