  career_goals: Shannon aims to merge her analytical expertise with her artistic drive by pursuing a career at the intersection of data science and visual communication. Over the next two years she plans
    to develop a professional portfolio of data-driven visual projects, secure freelance contracts, and complete a UX/UI design certification. Her long-term ambition is to launch a boutique consultancy
    that helps tech startups translate complex data into intuitive visual narratives, and eventually to lead a creative analytics team within an innovative organization. She also intends to stay on the
    cutting edge by exploring emerging technologies such as augmented reality, generative AI, and interactive storytelling platforms.
