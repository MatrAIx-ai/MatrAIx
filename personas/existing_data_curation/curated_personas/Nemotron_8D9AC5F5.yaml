personas:
  professional: Shannon Feldman is a data scientist-visual storyteller who blends rigorous quantitative analysis with a painter’s eye for design, turning complex datasets into interactive visual narratives
    using Python, D3.js, and Tableau while driving projects forward with Agile precision and a competitive drive to out‑innovate peers.
  sports: Shannon Feldman follows the New York Knicks religiously, roots for the New York Yankees in the summer, runs with the Hudson Valley Trailblazers running club on weekend mornings, and engages in
    occasional rock‑climbing sessions at the nearby Westchester gym, balancing competitive fandom with personal fitness pursuits.
  arts: Shannon Feldman frequents gallery openings featuring contemporary mixed media artists like Kehinde Wiley and digital installations by Refik Anadol, draws inspiration from street photographers such
    as Bruce Gilden, and unwinds by listening to the experimental soundscapes of Björk and the indie folk of Sufjan Stevens, weaving these influences into their own digital illustrations.
  travel: Shannon Feldman has explored the historic streets of Boston, the culinary markets of Marrakech, and the serene fjords of Norway, while planning a future trek through the Japanese Alps and a weekend
    getaway to the Hudson Valley’s historic estates, favoring curated itineraries that blend cultural immersion with opportunities for photography.
  culinary: Shannon Feldman experiments in the kitchen with dishes like miso‑marinated black cod, kimchi‑infused ramen, and a saffron‑spiced paella, skillfully balancing precise sous‑vide techniques with
    spontaneous flavor pairings, and often finishes meals with a drizzle of aged balsamic vinegar and a sprinkle of smoked paprika.
  core: Shannon Feldman is a 34‑year‑old data‑driven visual artisan who balances meticulous organization with a relentless curiosity for novelty, channeling competitive ambition into both professional projects
    and personal creative experiments, while occasionally succumbing to impulsive art purchases and late‑night coding marathons.
background:
  cultural: Shannon grew up in a middle-class family in Westchester County, where a blend of suburban stability and easy access to the cultural richness of New York City shaped her worldview. As a white
    American with a STEM education, she was encouraged to pursue academic excellence and self-reliance, while her family's appreciation for the arts fostered her creative side. Living in Yonkers, she is
    exposed to a diverse community and values progressive ideas, yet retains a pragmatic, organized approach to life. Her cultural influences reflect a mixture of suburban Northeastern values, a respect
    for scientific inquiry, and an openness to the artistic and multicultural vibrancy of the nearby metropolis.
