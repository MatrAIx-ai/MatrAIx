personas:
  professional: Helen Webb, a seasoned housekeeper renowned for her eco‑friendly deep‑cleaning expertise, blends meticulous attention to detail with practical curiosity to streamline client spaces, while
    they assertively mentor junior staff and adapt schedules with the flexibility their balanced personality demands.
  sports: Helen Webb follows the Milwaukee Brewers and Green Bay Packers with loyal enthusiasm, participates in the Portage Lakes Trail Club's weekend walks, and occasionally joins a community softball
    league, balancing competitive spirit with a preference for low‑impact, nature‑focused fitness.
  arts: Helen Webb delights in classic country music, regularly listening to Willie Nelson, Dolly Parton, and George Strait while crafting quilts, and they attend local craft fairs to admire works by regional
    artisans, also finding inspiration in mystery novels by Agatha Christie and episodes of Murder, She Wrote.
  travel: Helen Webb prefers meticulously planned road trips that blend relaxation and exploration, often driving to the Great Smoky Mountains and Yellowstone for scenic hikes, while they dream of a cultural
    pilgrimage to the Scottish Highlands to visit historic herb gardens, all within a modest budget that accommodates family visits.
  culinary: Helen Webb enjoys farm‑to‑table cooking, frequently preparing rosemary‑roasted chicken, zucchini lasagna, and fresh basil pesto using herbs harvested from their garden, and they take pride in
    mastering the perfect balance of flavors with ingredients like lemon zest, thyme, and locally sourced tomatoes.
  core: Helen Webb is a detail‑obsessed cleaning professional who mirrors their garden’s orderliness in daily life, enjoys humming classic country tunes while they meticulously plan meals, yet they have
    a quirky habit of double‑booking appointments and occasionally forgetting to water potted herbs.
background:
  cultural: Helen’s cultural background reflects the Midwestern white heritage common in Wisconsin, with ancestral roots likely in German and Scandinavian communities. She grew up in a small-town environment
    that valued hard work, self‑reliance, and modesty. Community and family are central to her identity, and she maintains traditions such as Thanksgiving gatherings, church potlucks, and seasonal celebrations.
    Her upbringing emphasized practicality, a strong work ethic, and an appreciation for simple pleasures like home‑cooked meals and outdoor activities.
attributes:
  skills: '["deep residential cleaning", "commercial cleaning", "eco‑friendly product knowledge", "steam cleaning", "floor polishing", "carpet extraction", "stain removal", "laundry and fabric care", "time
