  hobbies: '["gardening", "herb cultivation", "knitting", "crocheting", "quilt making", "reading mystery novels", "crossword puzzles", "church community events", "volunteer work", "craft fairs", "classic
    country music", "nature walks"]'
  career_goals: Helen aims to advance to a senior housekeeper or supervisory role within a reputable cleaning service, where she can mentor junior staff and oversee larger teams. She is interested in obtaining
    a professional certification in green cleaning to enhance her expertise and marketability. Long‑term, she envisions launching her own small cleaning business focused on environmentally responsible services
    for local families and small businesses in Portage. She also hopes to secure a stable financial foundation to support her family and contribute to her grandchildren’s education.
