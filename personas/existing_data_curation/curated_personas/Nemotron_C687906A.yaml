personas:
  professional: Latasha Mccloud, a budding graphic novelist and debate enthusiast, blends their curiosity and competitive drive to sketch intricate comic characters and wield razor‑sharp rhetoric in school
    tournaments, thriving as the charismatic center of attention while balancing organized planning with spontaneous creative bursts.
  sports: Latasha Mccloud, a competitive point guard for the Little Rock Youth Basketball League, idolizes the Arkansas Razorbacks and Los Angeles Lakers, spends after‑school perfecting cross‑overs and
    three‑point techniques, and tackles weekend hikes up Pinnacle Mountain State Park as personal endurance challenges, logging each route on a fitness app and striving to top personal bests.
  arts: Latasha Mccloud, an avid sketcher and graphic‑novel aficionado, draws inspiration from the bold line work of Alex Ross, the narrative depth of the series 'Saga', and the vibrant murals of Kehinde
    Wiley at the Little Rock Museum of Art, while listening to the soulful beats of Kendrick Lamar and Lauryn Hill to fuel their creative flow.
  travel: Latasha Mccloud, an adventure‑seeking teen, loves spontaneous day trips to Hot Springs National Park for waterfall hikes with friends, dreams of a school‑organized cultural exchange in Washington, D.C.,
    and hopes to one day explore the Louvre in Paris, balancing limited allowance by saving pocket money earned from chess club fundraisers and using student discount travel apps.
  culinary: Latasha Mccloud, a self‑proclaimed snack connoisseur, favors the cheesy stretch of pepperoni pizza, the comforting swirl of mac and cheese, and the sweet crunch of chocolate‑chip cookies, can
    whip up decent banana pancakes and avocado toast with a dash of hot sauce as a signature twist, yet relies on family meals for more elaborate dishes.
  core: Latasha Mccloud is a fiercely curious, socially energized 12‑year‑old who transforms competitive drive into bold comic art, lively debate, and basketball mastery, while juggling a penchant for impulse
    snack purchases and occasional forgetfulness about their inhaler.
background:
  cultural: Latasha grows up in a close‑knit African‑American family in Little Rock’s South Main neighborhood. Family gatherings feature soul food, gospel singing, and oral histories that connect her to
    the broader story of the Great Migration and the civil‑rights movement that shaped the city. She regularly attends a local Baptist church where community service and artistic expression are encouraged.
    The legacy of Little Rock Central High School and nearby Black cultural centers informs her appreciation for social justice, while local artists, jazz clubs, and the city’s vibrant hip‑hop scene influence
    her creative style and identity.
attributes:
  skills: '[''Creative drawing'', ''Digital illustration basics'', ''Public speaking'', ''Team collaboration'', ''Critical thinking'', ''Basic Scratch coding'']'
  hobbies: '[''Sketching'', ''Reading graphic novels'', ''Hip hop dance'', ''School debate club'', ''Basketball'', ''Exploring nature'', ''Visiting art museums'']'
  career_goals: Latasha dreams of turning her passion for art and storytelling into a career as a graphic novelist or visual artist. She aims to earn a spot at a specialized arts high school, win regional
    art competitions, and secure a scholarship for a BFA in illustration. Long‑term, she envisions working with a publishing house or museum where she can create engaging visual narratives and curate community
    art exhibits. She also hopes to launch a youth art program in Little Rock that empowers other kids to explore their creativity and find confident voices.
