personas:
  professional: Feras Sager, a detail‑oriented recreation worker in Walton County, applies their meticulous logistical planning skills while they rigorously enforce safety protocols, using CPR certification,
    data‑driven evaluation, and a disciplined, skeptical mindset to design structured community programs that meet high performance standards.
  sports: Feras Sager, an avid fisherman and hiker who follows the Atlanta Braves and volunteers as a structured youth soccer coach for Conyers Soccer Club, maintains personal fitness through weekly trail
    runs and occasional lacrosse matches with a local recreation league while they prefer solo or small‑group activities that align with their disciplined nature.
  arts: Feras Sager, a lover of traditional folk music and contemporary chess‑themed art, regularly listens to Los Lobos, appreciates the narrative depth of Frida Kahlo’s paintings, and participates in
    community storytelling nights that honor Día de los Muertos, while they channel their competitive mindset into strategic gaming sessions.
  travel: Feras Sager, a methodical planner, prefers curated nature trips such as sunrise hikes in Great Smoky Mountains, weekend fishing expeditions at Lake Lanier, and cultural pilgrimages to Oaxaca’s
    Day of the Dead celebrations, balancing their love of solitude with occasional family visits to historic Savannah, all while they meticulously manage travel budgets.
  culinary: Feras Sager, a skilled home cook, prepares traditional dishes like chicken mole with ancho chilies, corn‑husk‑wrapped tamales, and roasted plantain side dishes for community gatherings, while
    they experiment with precise sous‑vide techniques and source authentic ingredients from local farmers’ markets.
  core: Feras Sager, a 39‑year‑old disciplined planner, blends their love for structured community programs with an intense, anxiety‑driven inner critic, often channeling this tension into meticulous woodworking,
    strategic gaming, and occasional impulsive splurges on high‑end fishing gear, while they constantly assess their own performance.
background:
  cultural: Feras comes from a mixed Latin American and Indigenous background, raised in a bilingual household where Spanish and English were spoken regularly. Family traditions emphasize respect for nature,
    communal storytelling, and celebration of festivals such as Día de los Muertos and indigenous seasonal rites. Although he now resides in Walton County, Georgia, he carries forward these cultural values
    by incorporating nature‑focused activities into his recreation work and by preparing traditional dishes for community gatherings. His heritage instills a strong sense of community responsibility, an
    appreciation for outdoor spaces, and a reverence for disciplined practice, all of which shape his personal and professional identity.
attributes:
  skills: '["Event planning", "Facility scheduling", "Inventory management", "Budgeting", "Safety compliance", "First aid/CPR certification", "Risk assessment", "Program development", "Data tracking and
    evaluation", "Outdoor equipment maintenance"]'
  hobbies: '["Hiking", "Fishing", "Woodworking", "Chess", "Competitive video gaming", "Gardening", "Cooking traditional recipes", "Mindfulness meditation", "Coaching youth soccer (small‑group)", "Listening
    to Latin American folk music"]'
  career_goals: Feras aims to transition from a recreation worker to a recreation program manager within the next three years, seeking a certification in Recreation Management to solidify his credentials.
    He aspires to lead a small team, develop highly structured, outcome‑focused programs for the Conyers community, and eventually oversee a regional recreation center. Achieving measurable improvements
    in participant satisfaction and safety metrics will be his benchmark for success. Parallel to his professional advancement, he intends to complete his GED and pursue continuing education courses that
    reinforce his organizational expertise.
