personas:
  professional: Carlos Tohorton, a veteran customer‑service specialist with four decades of bilingual Spanish‑English relationship management, CRM Salesforce and Zoho expertise, and a knack for designing
    efficient workflows, blends his meticulous organization with a pragmatic curiosity to mentor junior staff and craft consulting solutions for local businesses.
  sports: Carlos Tohorton follows the local baseball team, the San Juan Lions, with unbridled enthusiasm, participates in senior‑center domino tournaments that double as informal strategic drills, and maintains
    fitness through daily heritage‑site walks and a junior membership with the community’s walking club, while eschewing high‑impact sports.
  arts: Carlos Tohorton channels his love for rhythm into weekly salsa nights where he emulates the style of Celia Cruz and Marc Anthony, sharpens his creative eye in evening digital‑photography classes
    inspired by Henri Cartier‑Bresson, and devours historical novels by writers such as Esmeralda Santiago, weaving those narratives into his community storytelling sessions.
  travel: Carlos Tohorton prefers thoughtfully planned short‑haul trips that combine cultural immersion and relaxation, having explored the colonial streets of Old San Juan, the bioluminescent bay of Vieques,
    and embarking on a dream cruise to Barcelona and the historic citadels of Cartagena, all while budgeting his consulting income to fund these adventures.
  culinary: Carlos Tohorton enjoys cooking moderate‑skill dishes like mofongo stuffed with plantains, garlic, and pork cracklings, paired with fresh herbs from his balcony garden such as cilantro and basil,
    and he never passes a chance to savor a perfectly grilled mahi‑mahi seasoned with lime, chili, and adobo, while occasionally treating himself to an espresso after meals.
  core: Carlos Tohorton blends a lifetime of customer‑service mastery, disciplined financial stewardship, and vibrant community involvement—spiced with salsa steps, garden herbs, and a relentless curiosity
    for new tech—into a pragmatic yet passionately engaged 70‑year‑old who mentors, competes, and never shies away from a well‑earned indulgence.
background:
  cultural: Carlos is a native of San Juan, raised in a multigenerational Puerto Rican family that blends Spanish, African, and Taíno traditions. He grew up speaking Spanish at home while learning English
    in school, giving him a bicultural perspective. The island’s vibrant music, cuisine, and communal values shape his daily life; he celebrates fiestas, enjoys lechón and arroz con gandules, and maintains
    strong ties to his extended family and local church. His identity is rooted in the resilience and warmth characteristic of Puerto Rican culture, and he actively preserves these traditions through community
    involvement.
