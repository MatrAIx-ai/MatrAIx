  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Nature photography'', ''Reading graphic novels'', ''Writing poetry'', ''Listening to alternative folk music'', ''Participating in a local
    art club'', ''Collecting vintage postcards'']'
  career_goals: Tifany aims to complete her GED within the next year and enroll in a community college art program, eventually pursuing a bachelor's degree in visual arts or illustration. She dreams of
    becoming a professional illustrator for graphic novels or video games, while also developing a platform that encourages mental‑health awareness among teens through her art. In the longer term, she envisions
    opening a small studio where she can teach workshops and mentor other young artists in her rural community.
