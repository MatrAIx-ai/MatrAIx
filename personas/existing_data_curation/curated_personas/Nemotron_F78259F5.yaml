personas:
  professional: Tifany Mcmaster, a budding illustrator from a small North Carolina town, blends self‑taught digital illustration, watercolor, and photography with a meticulously organized planner to craft
    expressive character designs, while their curiosity and occasional worry drive them toward a future where graphic novels and a teen‑focused mental‑health platform intersect.
  sports: Tifany Mcmaster enjoys solitary hikes along the foothills and participates in the local high school cross‑country team during fall, while cheering on the Carolina Panthers and UNC Tar Heels, and
    occasionally joins a weekend pickup basketball game at the community center, preferring low‑key fitness over crowded gym sessions.
  arts: Tifany Mcmaster devotes evenings to sketching characters inspired by graphic novels like Saga and Monstress, curates an Instagram feed featuring their watercolor studies of Appalachian landscapes,
    draws lyrical influence from alternative folk artists such as Maggie Rogers and Phoebe Bridgers, and actively contributes to a monthly local art club where they exchange ideas with a handful of like‑minded
    peers.
  travel: Tifany Mcmaster plans budget‑friendly weekend trips to the Blue Ridge Parkway and Asheville, has visited Washington DC for a museum day, dreams of studying the cherry blossoms in Kyoto and exploring
    the historic streets of Edinburgh, and prefers itineraries that balance photographic opportunities with quiet reading spots.
  culinary: Tifany Mcmaster’s palate swings between Southern comfort—fried green tomatoes with a drizzle of hot honey—and international flavors like homemade avocado sushi rolls, they experiment with fresh
    basil, mint, and blackberries in simple dishes, and while their cooking skill is limited to breakfast staples and occasional plating experiments, they relish the aesthetic of a well‑presented plate.
  core: Tifany Mcmaster is a quietly ambitious teen artist who channels curiosity, organized planning, and occasional anxiety into heartfelt illustrations, thrift‑postcard collections, and a budding drive
    to uplift peers through art‑based mental‑health awareness.
background:
  cultural: Tifany grew up in Newland, a small town in Mitchell County, North Carolina, within a white, rural Southern community. Her family values traditional Southern hospitality, church involvement,
    and community festivals, but she also accesses a broader cultural world through the internet, which feeds her appreciation for diverse artistic styles and unconventional ideas. While she respects local
    customs, she often blends them with contemporary artistic influences, creating a unique personal expression that reflects both her hometown roots and her curiosity about the wider world.
