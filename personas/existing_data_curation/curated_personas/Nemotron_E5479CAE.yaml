personas:
  professional: Son Im is a veteran wholesale equipment salesperson whose vivid imagination fuels compelling product narratives and whose methodical account management drives record‑breaking sales, and
    they are now fiercely pursuing a final "Salesperson of the Year" award while laying the groundwork for a mentorship program and a modest import venture for handcrafted ceramics.
  sports: Son Im follows the Kentucky Wildcats men's basketball season with devotion, attends the annual Kentucky Derby, and stays active by participating in a local senior walking club and playing casual
    golf on weekends.
  arts: Son Im's artistic life centers on watercolor landscapes inspired by Claude Monet and the rolling hills of their home region, meditative Hangul calligraphy, devouring science‑fiction by Isaac Asimov
    and essays by Simone de Beauvoir, and leading a senior karaoke ensemble where they favor classics by Frank Sinatra alongside contemporary hits like BTS's "Dynamite."
  travel: Son Im prefers meticulously planned trips that blend leisurely garden tours in England's Cotswolds with adventurous hikes in the Great Smoky Mountains, and they dream of attending a traditional
    harvest festival in the Austrian Alps while balancing a fixed retirement budget.
  culinary: Son Im enjoys crafting authentic Korean dishes such as bibimbap, kimchi jjigae, and japchae with garden‑fresh vegetables, while also savoring Kentucky's bourbon‑marinated pork shoulder, and
    they relish sharing these meals during lively karaoke nights, though anxiety sometimes leads them to over‑salt the kimchi.
  core: Son Im is a relentlessly imaginative, socially vibrant senior who channels competitive energy into sales and art while wrestling with bouts of anxiety that fuel both creative bursts and occasional
    over‑thinking.
background:
  cultural: Son Sang Im is a first‑generation Korean‑American whose family immigrated to Louisville, Kentucky, in the early 1960s. He grew up bilingual, speaking Korean at home and English in school, and
    was deeply influenced by Confucian values of respect for elders, hard work, and community harmony. While his formal education concluded before ninth grade—common among many children of immigrant families
    who entered the workforce early—he compensated with on‑the‑job learning and a strong work ethic. His cultural identity is a blend of Korean traditions, such as celebrating Chuseok and Lunar New Year,
    and Southern hospitality, evident in his love for communal gatherings and storytelling. He maintains close ties to the local Korean church, where he contributes to senior outreach programs, and he frequently
    bridges his heritage with his Kentucky surroundings by introducing Korean culinary and artistic experiences to his neighbors.
attributes:
  skills: '[''B2B sales negotiation'', ''Product knowledge of industrial equipment'', ''Strategic account management'', ''Inventory oversight'', ''Sales forecasting'', ''Creative product presentation'',
