  career_goals: Although retired, Maria aims to remain an active contributor to her community. She plans to volunteer as a Spanish language mentor at local schools, offering weekly tutoring sessions for
    students and adults. She wishes to lead workshops that teach traditional Colombian recipes and crafts, preserving her cultural heritage for younger generations. Maria also hopes to compile her life
    stories and family recipes into a memoir that can serve as a resource for her grandchildren and the broader diaspora. Over the next few years, she aspires to establish a modest home‑based catering service
    for community events, providing familiar, comforting meals while maintaining a predictable routine that helps manage her anxiety. Ultimately, she wants to be recognized as a community elder and mentor,
    fostering intergenerational connections and supporting fellow seniors in navigating emotional distress.
