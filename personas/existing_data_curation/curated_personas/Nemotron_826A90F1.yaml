  hobbies: '["Live music attendance", "Acoustic guitar playing", "Mexican cooking", "Hiking in the Smoky Mountains", "Reading Latin American literature", "Community center volunteering", "Youth soccer coaching",
    "Salsa dancing", "Family travel", "Herb and chili gardening"]'
  career_goals: He aims to advance to a senior leadership role—such as Director of Community Engagement or Operations—within a cultural institution or nonprofit that highlights Mexican and broader Latino
    arts in the Nashville region. Over the next five years he plans to earn a PMP certification and an MBA to broaden his strategic toolkit. He also aspires to launch an annual Mexican cultural festival
    that bridges his heritage with Southern traditions, mentor emerging professionals, and maintain a balanced life that allows quality time with his family.
