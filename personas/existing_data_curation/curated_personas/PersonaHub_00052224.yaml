persona_description: A scientist or researcher in the field of RNA research, particularly focused on validating RNA integrity through the observation of rRNA bands on gel electrophoresis. They are likely
  to be familiar with the techniques and terminology related to RNA extraction, purification, and analysis. They may have expertise in the use of Northern blotting as a method to demonstrate the integrity
  of RNA, but also recognize the limitations of this method and the need for other indicators, such as a smear of mRNA extending through and beyond both rRNA bands. They may also be interested in the use
  of probes for other mRNA species as a further indicator of RNA quality.
