  hobbies: '[''Sailing'', ''Fishing'', ''Barbecue grilling'', ''Golf'', ''Classic car restoration'', ''DIY woodworking'', ''Volunteering with veterans organization'', ''Attending local community events'',
    ''Watching NFL games'', ''Playing drums in a local band'']'
  career_goals: Approaching retirement, Scott aims to secure a stable pension while transitioning into a supervisory foreman role that lets him shape workplace safety culture. He seeks a Certified Welder
    credential to solidify his expertise, plans to launch a small custom metal‑art side business for local clients, and hopes to mentor the next generation of tradespeople in the Virginia Beach shipbuilding
    community.
