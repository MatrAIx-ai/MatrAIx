  skills: '[''MIG welding'', ''TIG welding'', ''Arc welding'', ''Brazing'', ''Soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Equipment maintenance'', ''Safety compliance'', ''Apprentice training'',
