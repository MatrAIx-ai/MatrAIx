  career_goals: Krystal aims to channel her curiosity and practical problem‑solving into a data‑focused career, targeting an entry‑level data analyst or market research role within a healthcare or manufacturing
    company in the Midwest. She plans to complete a professional certification in data analytics and, within five years, progress to a senior analyst position where she can lead data‑driven projects and
    mentor junior team members. Ultimately, she hopes to combine her analytical expertise with her communication skills to influence strategic decisions while maintaining a balanced, independent work style.
