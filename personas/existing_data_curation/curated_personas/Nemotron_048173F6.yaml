  career_goals: Maciel imagines becoming an inventor who designs friendly robots to help kids explore the outdoors, and he dreams of traveling to space as an astronaut. He also enjoys the idea of creating
    his own video games and sometimes says he wants to be a professional soccer player when he grows up. These ambitions blend his curiosity about how things work with a practical desire to build and compete.
