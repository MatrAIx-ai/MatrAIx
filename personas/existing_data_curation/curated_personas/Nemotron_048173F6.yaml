personas:
  professional: Maciel Mendez is an aspiring junior architect who transforms LEGO bricks into intricate cityscapes and writes simple Scratch programs, blending a practical eye for detail with spontaneous,
    on‑the‑fly creativity, while often forgetting to clean up the workspace.
  sports: Maciel Mendez dashes around the local park with the Lexington Youth Soccer Club, dreaming of scoring like a star for Atlanta United FC while also cheering for the Cincinnati Reds during baseball
    season, and their competitive streak drives them to practice tricky dribbles even when they neglect to tie their cleats properly.
  arts: Maciel Mendez fills their free time with LEGO sculptures, pixel‑perfect Minecraft builds, and listening to the lively tunes of mariachi ensembles and contemporary artist Juanes, often reenacting
    scenes from the animated film Coco during play and challenging themselves to design new characters in Scratch.
  travel: Maciel Mendez loves day trips to the Red River Gorge for nature hikes, has explored the Grand Canyon on a family road trip, and daydreams about wandering the colorful streets of Oaxaca, preferring
    flexible, adventure‑focused itineraries over strict schedules, even if they argue with siblings about stopping for ice cream.
  culinary: Maciel Mendez enjoys helping in the kitchen by mixing masa for tamales, sprinkling cheese on quesadillas, and adding fresh avocado slices to tacos, favoring bold flavors like chilies and lime
    while occasionally sneaking extra chocolate chip cookies when no one is watching.
  core: Maciel Mendez is a curious, competitive seven‑year‑old who builds LEGO cities, kicks soccer balls, and debates with friends, all while juggling spontaneous ideas and a tendency to misplace their
    favorite toy.
background:
  cultural: Maciel grows up in a Mexican‑American household where Spanish is spoken daily alongside English. His family celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family
    gatherings featuring dishes like tamales and mole. He attends a local community center that offers a Spanish language class for children, and his family maintains connections with a nearby Mexican community
    in Lexington, fostering a blend of Mexican heritage and Midwestern American culture. These cultural experiences shape his identity, culinary tastes, and appreciation for both community rituals and everyday
    life.
