  hobbies: '[''Fishing'', ''Boating'', ''Woodworking'', ''Gardening'', ''Reading Historical Non‑Fiction'', ''Photography'', ''Volunteer Work at Community Garden'', ''Cooking Southern‑Coastal Cuisine'',
