  career_goals: Although not currently in the workforce, Howard aims to stay active and useful. He plans to expand his volunteer work by leading a community home‑repair program for seniors and to launch
    a modest side venture offering handyman services. He also wishes to complete online courses in sustainable gardening and marine safety, eventually becoming a certified volunteer water‑safety instructor.
    On a personal level, he hopes to take a road trip to visit several western national parks and to embark on a sailing adventure along the Gulf Coast.
