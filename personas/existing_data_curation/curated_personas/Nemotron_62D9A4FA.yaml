personas:
  professional: A retired educator and curriculum developer named Fitzgerald Hicks channels three decades of classroom and program design experience into volunteer work on the Leesburg school advisory board,
    where they apply grant‑writing expertise, conflict mediation, and empathetic communication to mentor new teachers and launch intergenerational reading initiatives.
  sports: An avid fisherman and community fitness participant named Fitzgerald Hicks spends early mornings casting lines at local ponds, joins the senior center’s walking club, and roots for the Atlanta
    Braves and Georgia Bulldogs, while they occasionally miss a game due to garden commitments.
  arts: A devoted choir member and folk‑music enthusiast named Fitzgerald Hicks enjoys singing hymns, listening to Johnny Cash and Dolly Parton on their porch, photographing sunrise over cotton fields,
    and attending seasonal festivals that showcase regional storytellers and blue‑grass bands.
  travel: A history‑loving road‑trip planner named Fitzgerald Hicks prefers flexible itineraries that whisk them from Savannah’s historic squares to the battlefields of Vicksburg, with a bucket‑list stop
    at the National Museum of African American History in Washington, D.C., though they often delay bookings until the last minute.
  culinary: A home‑cooking aficionado named Fitzgerald Hicks savors Southern staples like fried catfish, collard greens, and peach cobbler, often incorporating fresh heirloom tomatoes and garden herbs into
    dishes, while they occasionally over‑season with too much salt and forget to set the timer.
  core: Fitzgerald Hicks is a compassionate, curious retiree who blends Southern hospitality with practical ingenuity, juggling gardening, woodworking, and community mentorship while they occasionally misplace
    keys and skip appointments.
background:
  cultural: Fitzgerald grew up in rural Georgia and embodies Southern traditions of hospitality, community service, and a strong Christian faith. His white Southern background includes an appreciation for
    local history, folk music, and the value of education as a pathway to progress. He blends these cultural influences with a curiosity for new ideas, maintaining a practical yet compassionate outlook.
