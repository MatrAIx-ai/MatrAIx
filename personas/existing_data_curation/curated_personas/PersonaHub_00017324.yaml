persona_description: A forensic chemist who specializes in mass spectrometry and forensic analysis of pharmaceuticals, particularly artesunate-based antimalarial drugs. Their research has led to the discovery
  of 16 different counterfeit versions of artesunate with little or no artesunate and the presence of illegal or improper active pharmaceutical ingredients. Their work has led to the international collaboration
  of scientists, police, and health care workers to stop counterfeit production and dissemination, and has led to improved sensitivity of the rapid chemical assay they developed.
