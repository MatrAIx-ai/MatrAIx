  career_goals: Elbert aims to maintain top grades and win his school’s science fair, hoping to spark a future in a STEM field such as aerospace engineering or environmental science. He dreams of designing
    a small robot that could help farmers in his community, blending his curiosity for new ideas with a practical mindset. Over time, he also imagines taking on leadership roles—perhaps as class president
    or, later, a community organizer—so he can motivate peers and influence positive change in Wooton. His ambition is to be recognized for both analytical achievements and the ability to inspire others.
