personas:
  professional: Elbert Johnson is a budding student‑engineer who channels his organized curiosity into building LEGO models and coding simple Scratch games, often leading his school’s tech club projects
    with the same energy they bring to the soccer field.
  sports: Elbert Johnson leads the Leslie County Youth Soccer team as a forward, idolizing Louisville City FC and the Kentucky Wildcats, while also spending weekends hiking the Red River Gorge with family
    and joining the local 4‑H outdoor club, balancing a competitive drive on the field with a love for nature.
  arts: Elbert Johnson energizes the school band as the go‑ahead drummer, frequently jamming along to Imagine Dragons and tracks from the Marvel Cinematic Universe, while evenings are filled with reading
    the Percy Jackson series and drawing fan art of Spider‑Man, reflecting their talkative storytelling flair.
  travel: Elbert Johnson prefers road trips that blend adventure with family time, having camped near the Daniel Boone National Forest and dreaming of visiting the Grand Canyon, yet travel planning often
    hinges on sibling school breaks, leading to spontaneous stops at local diners for pizza.
  culinary: Elbert Johnson’s palate swings between classic chicken nuggets and experimental rocket‑shaped PB&J sandwiches, proudly claims mastery of stovetop mac and cheese, and often snacks on trail mix
    while building LEGO, though they frequently leave a trail of bricks on the kitchen counter after meals.
  core: Elbert Johnson is an organized, talkative nine‑year‑old whose competitive spark drives soccer, LEGO builds, and Scratch coding, while a habit of over‑talking and occasional forgetfulness adds a
    charming, slightly chaotic edge to their disciplined routine.
background:
  cultural: Elbert grew up in Wooton, a close‑knit community in Leslie County, Kentucky, where Appalachian cultural influences shape daily life. His family values self‑reliance, community cooperation, and
    storytelling traditions that often surface during local gatherings and church events. Regional customs such as attending the county fair, enjoying folk music, and participating in outdoor activities
    like hunting and fishing are part of his upbringing. While rooted in these local traditions, Elbert also embraces broader American media, technology, and school culture, creating a blended cultural
    perspective.
