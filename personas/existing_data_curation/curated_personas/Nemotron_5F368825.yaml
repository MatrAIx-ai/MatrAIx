  career_goals: Jaquila aims to advance into a senior supervisory role within the county’s probation department, eventually becoming a director of community corrections. She envisions creating a flagship
    rehabilitative program that integrates restorative justice principles with measurable business outcomes, such as reduced recidivism and efficient resource allocation. She also plans to pursue certification
    as a Certified Corrections Professional and to mentor junior officers, fostering a culture of continuous learning and evidence‑based practice. Long‑term, she hopes to influence policy at the state level
    through research publications and conference presentations.
