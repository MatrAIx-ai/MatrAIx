personas:
  professional: Micah Owen, a 48-year-old facilities specialist with extensive expertise in commercial cleaning, floor care, waste management, and art-gallery maintenance, leverages their methodical planning,
    competitive drive, and curiosity for creative spaces to pursue a supervisory facilities manager role at a museum while working toward Certified Facility Manager certification and a future janitorial
    business for cultural institutions.
  sports: Micah Owen, an avid hiker of the Beartooth and Absaroka ranges, joins a local mountain-climbing club for summer treks, skis cross-country on winter trails near Big Sky, plays in an adult softball
    league that cheers the Billings Outlaws, and follows the Denver Broncos (NFL) and Colorado Rockies (MLB) as their seasonal sports anchors, balancing rugged outdoor pursuits with structured team play.
  arts: Micah Owen, a devoted patron of the arts, routinely visits galleries showcasing Ansel Adams photography and Georgia O'Keeffe paintings, attends community theater productions like 'Our Town' starring
    local actors, collects limited-edition prints of Vincent van Gogh, and channels their curiosity into pottery classes inspired by Bernard Leach, all while occasionally critiquing curatorial choices with
    a skeptical eye.
  travel: Micah Owen, a meticulous planner with modest travel funds, has hiked Yellowstone and Banff National Parks, photographed sunrise over the Grand Teton, dreams of chasing the Northern Lights in Iceland
    and exploring Kyoto's historic temples, and prioritizes trips that combine artistic inspiration with natural scenery while balancing certification study deadlines.
  culinary: Micah Owen, an intermediate home chef with a penchant for farm-to-table flavors, frequently prepares grilled trout with lemon-dill sauce, bison stew seasoned with rosemary and root vegetables,
    and sourdough bread made from whole-wheat flour, yet often skips meal prep planning, leading to late-night indulgences in processed snacks.
  core: Micah Owen blends disciplined facilities expertise with a competitive, art-driven curiosity, tackling stress through mindful breathing while juggling ambitious career goals, financial planning,
    and a love for rugged hikes and creative pursuits.
background:
  cultural: Micah’s cultural roots trace back to German and Irish ancestors who settled in Montana during the early twentieth century. Raised in Billings, he grew up in a community that values self-reliance,
    hard work, and a close connection to the rugged landscape of the Rocky Mountains. Local traditions such as county fairs, outdoor recreation, and a strong support for regional arts have shaped his appreciation
    for both practical skills and creative expression. His modest college experience broadened his worldview, fostering an openness to unconventional ideas while reinforcing a reliable, community-oriented
    character.
attributes:
  skills: '[''Commercial floor care'', ''Chemical safety management'', ''Waste management'', ''Basic HVAC maintenance'', ''Lock and security handling'', ''Inventory control'', ''Schedule planning'', ''OSHA/EPA
    compliance'', ''Organizational and time-management'', ''Problem-solving'', ''Basic business administration'', ''Art handling and gallery maintenance'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Art gallery visits'', ''Community theater'', ''Pottery or watercolor classes'', ''Reading (historical nonfiction, philosophy, art history)'', ''Woodworking'',
    ''Chess puzzles'', ''Mindful breathing exercises'']'
  career_goals: Micah aspires to move into a supervisory role within facilities management, aiming to become a facilities manager for a larger complex or an arts venue within the next five years. He is
    pursuing Certified Facility Manager (CFM) certification and OSHA training to strengthen his credentials. Long-term, he hopes to start his own janitorial service business that specializes in serving
    museums, galleries, and cultural institutions, allowing him to blend his cleaning expertise with his passion for the arts. Completing a bachelor’s degree in Business Administration is also on his roadmap
    to support entrepreneurial ambitions.
