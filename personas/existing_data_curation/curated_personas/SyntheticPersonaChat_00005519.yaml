data:
  user 1 personas: 'I build aquariums for a living.

    My brother in law runs a major hollywood studio.

    My wife is legally deaf.

    I have six brothers.

    My parents are both over age 100.'
  user 2 personas: 'I am a farmer.

    I graduated from college.

    I am the youngest of 4 children.

    I like to hike.'
  Best Generated Conversation: 'User 1: Hi there! What do you do for a living?

    User 2: I''m a farmer.

    User 1: Oh, that''s cool! What kind of farming do you do?

    User 2: I grow corn and soybeans.

    User 1: Wow, that must be a lot of work!

    User 2: It is, but it''s also a lot of fun. I love being outside and working with my hands.

    User 1: I can understand that! I love being outside too.

    User 2: What do you do for a living?

    User 1: I build aquariums for a living.

    User 2: Oh, that''s cool! How did you get into that?

    User 1: I''ve always loved fish and aquatic life. I started out keeping aquariums as a hobby, and then I decided to turn it into a career.

    User 2: That''s awesome! I''m glad you were able to turn your hobby into a career.

    User 1: Me too! I love my job.

    User 2: So, what''s your favorite part about building aquariums?

    User 1: I love getting to create something beautiful and unique. I also love helping people learn about and enjoy aquatic life.

    User 2: That sounds really rewarding.

    User 1: It is! I''m glad I get to do it for a living.

    User 2: So, what''s your most interesting aquarium build?

    User 1: I once built an aquarium for a client who wanted to recreate the Great Barrier Reef. It was a lot of work, but it was also a lot of fun.

    User 2: That sounds amazing! I would love to see that.

    User 1: I''ll have to send you a picture of it sometime.

    User 2: That would be great!

    User 1: So, what do you like to do for fun?

    User 2: I like to hike, bike, and spend time with my family.

    User 1: That sounds like a lot of fun! I like to hike too.

    User 2: Where do you like to hike?

    User 1: I like to hike in the mountains. I live in Colorado, so there are a lot of great hiking trails here.

    User 2: I''ve always wanted to go hiking in the mountains.

    User 1: You should! It''s a lot of fun.

    User 2: I will!

    User 1: So, what else do you like to do for fun?

    User 2: I like to cook, read, and watch movies.

    User 1: I like to cook too! What''s your favorite thing to cook?

    User 2: I love to cook Italian food.

    User 1: I love Italian food too!

    User 2: We should cook dinner together sometime.

    User 1: That would be fun!

    User 2: Great! We''ll have to set a date.

    User 1: Sounds good.'
