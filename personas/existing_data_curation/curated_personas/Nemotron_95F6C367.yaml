personas:
  professional: Tina Acree, a 3‑year‑old who treats the weekly story time at the local library as a mini‑classroom, already practices organizing picture books in a predictable sequence and delights in helping
    other toddlers share toys, hinting at a future as an early‑child educator who will one day guide children with the same calm, collaborative spirit they display now.
  sports: Tina Acree, a budding playground enthusiast who loves the swings and sandpit at the Linden Community Park, participates in a toddler soccer program with the Union County Little Stars and cheers
    for the New York Yankees, embodying their sociable energy and love for flexible, unstructured play.
  arts: Tina Acree, who spends afternoons drawing colorful pictures of rainbows and animals while humming favorite tunes by Raffi and The Wiggles, regularly attends the local library’s story‑time puppet
    show featuring characters from multicultural books, allowing their compassionate nature to shine through shared artistic experiences.
  travel: Tina Acree, who delights in family road trips to nearby destinations like the Liberty Science Center in Jersey City and the Philadelphia Magic Gardens, dreams of visiting Disney World’s Magic
    Kingdom, and prefers short, well‑planned outings with a familiar car seat and a favorite stuffed bunny for comfort, a travel style they find soothing.
  culinary: Tina Acree, who adores mac & cheese, banana pancakes with a drizzle of honey, and bite‑sized veggie sticks, can spread peanut butter on toast with a bit of assistance, and often requests extra
    applesauce at the dinner table, showcasing a practical palate with a hint of adventurous tasting that they proudly share with friends.
  core: Tina Acree, a three‑year‑old bundle of calm curiosity, thrives on predictable routines, loves sharing crayons with new friends, and can’t resist a glittery sticker as a tiny reward they cherish.
background:
  cultural: Tina is raised in a white American household in Linden, New Jersey. Her family lives in a suburban setting of Union County, where community life includes neighborhood parks, local libraries,
    and multicultural events that expose her to a variety of cultural traditions, even as her day‑to‑day experiences reflect mainstream American customs such as celebrating holidays like Thanksgiving, Fourth
    of July, and Halloween. The area's diverse environment subtly informs her openness and cooperative spirit.
