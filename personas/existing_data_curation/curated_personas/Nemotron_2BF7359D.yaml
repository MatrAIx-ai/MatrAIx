personas:
  professional: Shannon Hayman is a full‑stack software developer who leverages Python, JavaScript, React, and AWS to build scalable, accessible web applications, while leading Agile scrum teams, mentoring
    junior engineers, and championing inclusive, mental‑health‑friendly design practices.
  sports: Shannon Hayman enjoys weekend hikes with the Blue Ridge Trail Club, practices yoga at a local studio, follows the Carolina Panthers during football season, supports the Charleston Battery in soccer,
    and maintains a balanced fitness regimen that blends cardio hikes with strength training at the community gym.
  arts: Shannon Hayman captures the subtle light of the South Carolina Lowcountry in her DSLR photography, unwinds with historical fiction by Philippa Gregory, appreciates the lyrical storytelling of Brandi
    Carlile, and engages in board‑game nights featuring titles like Catan and Azul.
  travel: Shannon Hayman plans trips with a blend of detailed itineraries and room for spontaneous detours, favoring nature‑rich destinations such as Asheville’s Blue Ridge Parkway, the historic streets
    of Savannah, and the Scottish Highlands, while budget‑consciously earmarking funds for a future solo trip to Japan’s cherry‑blossom season.
  culinary: Shannon Hayman enjoys cooking Southern comfort staples like shrimp and grits, collard greens, and sweet‑potato casserole, while also experimenting with fusion dishes such as Korean BBQ tacos,
    showcasing a knack for balancing traditional flavors with bold ingredients like gochujang, bourbon‑infused maple glaze, and fresh garden herbs from her backyard.
  core: Shannon Hayman is a disciplined, anxiety‑aware tech leader who merges a love for nature, Southern cooking, and inclusive code with a penchant for meticulous budgeting and a habit of over‑planning
    every hike and sprint.
background:
  cultural: Shannon grew up in a middle‑class, white family in the Lexington area of South Carolina, immersed in Southern hospitality, church gatherings, and community festivals. Her upbringing emphasized
    respect for tradition and close‑knit family ties, yet she was encouraged to pursue STEM education—a path less common for women in her community. This blend of Southern cultural values and a progressive
    mindset fuels her dedication to collaborative harmony, mentorship, and advocating for greater representation of women in technology.
