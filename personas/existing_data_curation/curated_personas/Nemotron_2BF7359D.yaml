  career_goals: Shannon aims to progress into a senior lead engineering role where she can shape technical strategy while fostering a supportive, harmonious team culture. She aspires to become a principal
    engineer overseeing high‑impact, user‑centric products, and to champion inclusive design and mental‑health‑friendly workplace practices. In the longer term, she is interested in deepening her expertise
    in machine learning to develop tools that help users manage anxiety, and she contemplates pursuing a master’s degree in computer science with a focus on AI ethics.
