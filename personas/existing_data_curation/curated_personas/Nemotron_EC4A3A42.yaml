  hobbies: '[''Gardening'', ''Traditional cooking'', ''Watercolor painting'', ''Salsa and bomba dancing'', ''Attending art exhibitions'', ''Listening to music (salsa, plena, jazz)'', ''Playing dominoes'',
    ''Reading memoirs and art history'', ''Volunteering for cultural festivals'', ''Daily walking'']'
  career_goals: Although retired from the formal workforce, Ivan aims to leave a lasting legacy by documenting his life story and the oral histories of his community. He aspires to mentor younger seniors
    and new immigrants, helping them acclimate to life in Florida while preserving Puerto Rican traditions. Ivan hopes to organize an annual cultural showcase at the local senior center that features dance,
    music, and cuisine from Puerto Rico. He also wants to stay physically active, maintaining his health through daily walks and gardening so he can continue contributing to his community for years to come.
