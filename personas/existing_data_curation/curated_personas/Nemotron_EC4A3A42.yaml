personas:
  professional: Ivan Munizmuniz is a veteran community organizer who blends bilingual storytelling, event coordination, and a green thumb to stage senior‑center cultural festivals, document oral histories,
    and mentor volunteers, all while keeping a lively garden as a backdrop for gatherings.
  sports: Ivan Munizmuniz stays active by dancing bomba and salsa with the Eustis Senior Center Dance Club, walking daily with the Lake County Walking Group, cheering on the Orlando Magic in basketball
    season and the Lake County Captains during summer baseball, and occasionally joining a friendly fishing outing on the St. Johns River in the cooler months.
  arts: Ivan Munizmuniz nurtures a lifelong love of the arts by painting watercolors inspired by Claude Monet’s lily ponds, studying Frida Kahlo’s self‑portraits in senior art classes, listening to the
    vibrant sounds of Celia Cruz and Eddie Palmieri, and regularly attending gallery openings at the Lake County Art & History Center.
  travel: Ivan Munizmuniz enjoys leisurely travel with a mix of cultural immersion and relaxation, often taking senior‑discount train trips to St. Augustine’s historic district, weekend cruises to Caribbean
    islands, and planned road trips to New Orleans for its jazz scene, while dreaming of a future visit to Barcelona’s art museums.
  culinary: Ivan Munizmuniz delights in cooking traditional dishes such as mofongo with fried plantains, chicharrón, and sofrito, arroz con gandules seasoned with cilantro and aji dulce, and crisp tostones,
    often harvesting fresh herbs and chilies from their garden to add authentic flavor, though they sometimes over‑season, prompting friendly teasing from neighbors.
  core: Ivan Munizmuniz is a story‑keeping garden‑enthusiast who balances vibrant salsa steps and meticulous event planning with a habit of misplacing their reading glasses on top of a pot of basil.
background:
  cultural: Ivan is a first-generation Puerto Rican who grew up in a bilingual household where Spanish was spoken at home and English at school. He carries the island’s rich Afro-Caribbean heritage, reflected
    in his love for bomba rhythms, plena music, and the communal spirit of Puerto Rican festivals. Deeply rooted in Catholic traditions, he participates in local parish celebrations while also embracing
    the secular cultural festivities that mark his community’s identity in Florida. After moving to Eustis in the early 1970s, Ivan became an integral part of the growing Puerto Rican diaspora in Lake County,
    helping to preserve the island’s culinary, musical, and artistic traditions through community gatherings, storytelling circles, and intergenerational mentorship. His cultural identity informs his values
    of harmony, kindness, and collective well‑being.
attributes:
