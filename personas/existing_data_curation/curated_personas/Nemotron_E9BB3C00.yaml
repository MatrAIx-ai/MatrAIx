  career_goals: Although retired from formal employment, George aims to expand his cultural contributions. He plans to curate a small traveling art exhibit for Ogden’s senior community, write a memoir that
    blends personal history with reflections on mid‑century American art, and serve on the board of the local historical society. He also hopes to take a series of university extension courses in modern
    art appreciation and continue mentoring younger volunteers in project management and creative pursuits.
