persona_description: A monetary economist who is interested in the study of money supply, its impact on economic activity, and the role of monetary policy in managing inflation and unemployment. They are
  likely to have a deep understanding of the monetarist approach, the rejection of fiscal policy in favor of monetary rule, and the importance of steady, moderate growth in the money supply. They are also
  knowledgeable about the history of monetarism and its influence on economic policy in the 1970s and early 1980s.
