personas:
  professional: Jason Goff is a data‑driven retail supervisor who leverages his STEM education and advanced Excel and SQL skills to optimize inventory turnover, directs a team of sales associates with a
    competitive edge, and they constantly weigh innovative automation ideas against the practical limits of a mid‑size Indiana store, while their skeptical eye keeps them vigilant about colleagues’ motives.
  sports: Jason Goff follows the Indiana Hoosiers basketball team and the Indianapolis Colts, watches NFL games weekly with his wife and friends, participates in a local hiking club for cardio, spends weekend
    mornings fishing at nearby lakes, and they occasionally join a recreational basketball league, channeling their competitive drive into both spectating and personal fitness.
  arts: Jason Goff enjoys classic rock legends like The Beatles and Led Zeppelin, spins jazz records from John Coltrane on his vintage turntable, attends occasional live shows at the Indianapolis Cultural
    Trail venues, watches indie films such as those by Christopher Nolan, and they often integrate Arduino‑controlled LED installations into home parties, blending technical curiosity with artistic flair.
  travel: Jason Goff favors road‑trip weekends to Brown County State Park and has explored Chicago’s music scene, dreams of a tech‑focused tour of Japan’s Akihabara district, travels with his wife using
    a mix of meticulous itineraries and spontaneous detours, and they balance a modest travel budget with occasional splurges on unique experiences like a hot‑air balloon ride.
  culinary: Jason Goff has an intermediate cooking skill set, regularly grills catfish with lemon‑pepper seasoning, makes homemade pizza topped with fresh mozzarella and local basil, loves corn on the cob
    slathered in butter from Indiana farms, and they sometimes resort to late‑night takeout burgers when a hobby project runs late.
  core: Jason Goff, a 29‑year‑old data‑savvy retail supervisor, balances a competitive drive with solitary tinkering, impulsively splurges on hobby electronics, and reluctantly skips dentist appointments
    while staying fit through hikes and basketball nights.
background:
  cultural: Jason grew up in a small Midwestern town in Indiana, descended from German and Irish ancestors. His upbringing emphasized hard work, self‑reliance, community involvement, and a practical outlook
    characteristic of the region. He celebrates traditional American holidays, enjoys local high‑school sports, and maintains close ties with his extended family, reflecting the cultural values of a white,
    middle‑class Midwestern background.
