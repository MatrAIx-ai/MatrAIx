  career_goals: Jason aims to advance from first‑line supervisor to store manager within the next two years, leveraging his data‑analysis background to boost store profitability. In the longer term, he
    aspires to become a district manager or corporate retail analyst, where he can design and implement technology‑enabled strategies across multiple locations. He is considering an MBA or a certification
    in retail analytics to complement his STEM degree, and he hopes to mentor future supervisors while championing innovative, evidence‑based practices.
