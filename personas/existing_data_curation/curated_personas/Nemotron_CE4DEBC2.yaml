personas:
  professional: Thomas Orlando, a disciplined full‑stack software developer specializing in Python, Java, and JavaScript frameworks, leverages meticulous documentation, test‑driven development, and a user‑centric
    mindset to build scalable fintech applications while mentoring junior engineers and contributing to open‑source accessibility tools.
  sports: Thomas Orlando, an avid runner who logs 5K routes in Central Park with the NYC Road Runners club and follows the New York Knicks, New York Yankees, and New York City FC, balances cardio workouts
    with yoga sessions to maintain flexibility and mental clarity.
  arts: Thomas Orlando, a sci‑fi aficionado who devours works by Isaac Asimov, Liu Cixin, and Ann Leckie, enjoys the minimalist photography of Henri Cartier‑Bresson, and finds inspiration in the synth‑driven
    scores of Daft Punk and the cinematic compositions of Hans Zimmer, integrating these artistic influences into his coding aesthetics.
  travel: Thomas Orlando, who favors meticulously planned weekend getaways, has explored the tech hubs of Tokyo and Seoul, trekked the volcanic landscapes of Iceland, and regularly escapes to the Hudson
    Valley for hiking, while dreaming of a future cultural immersion trip to Lisbon’s historic neighborhoods.
  culinary: Thomas Orlando, a precision‑oriented home chef, perfects sous‑vide salmon with miso glaze, crafts matcha‑flavored dark chocolate truffles, and regularly mounts a homemade sourdough starter,
    relishing the disciplined process of measuring each gram of ingredient.
  core: Thomas Orlando blends razor‑sharp organization with a compassion‑driven curiosity, often losing track of meals while debugging code, obsessively aligning his bookshelf by color, and juggling a relentless
    drive for technical excellence with nightly chess puzzles.
background:
  cultural: Thomas grew up in a middle‑class, Irish‑American family in the suburban outskirts of New York City. His upbringing emphasized education, responsibility, and community involvement, reflecting
    broader Anglo‑American cultural values. Living in the diverse metropolitan area exposed him to a wide range of cultures, fostering an appreciation for inclusivity and collaborative teamwork. He blends
    a traditional work ethic with the progressive, tech‑savvy mindset of the East Coast, valuing both individual achievement and collective harmony.
attributes:
  skills: '[''Python'', ''Java'', ''JavaScript'', ''React'', ''Node.js'', ''SQL'', ''MongoDB'', ''Git'', ''Docker'', ''Kubernetes'', ''AWS'', ''CI/CD (GitHub Actions)'', ''Agile Scrum'', ''System Design'',
