  hobbies: '[''Chess'', ''Puzzle Solving'', ''Personal Coding Projects'', ''Science Fiction Reading'', ''Running'', ''Yoga'', ''Community Coding Workshops'', ''Urban Photography'', ''Board Game Nights'',
    ''Cooking'']'
  career_goals: Thomas aims to advance to a senior software engineer role within the next three years, focusing on building reliable, high‑performance systems for fintech applications in New York's vibrant
    tech ecosystem. He plans to earn an AWS Solutions Architect certification and eventually transition into a lead engineering or Site Reliability Engineering (SRE) position where he can shape architecture
    and operational standards. Passionate about social impact, Thomas also aspires to mentor emerging developers, contribute meaningful open‑source tools for accessibility, and later launch a startup that
    leverages technology to streamline community services. He is considering part‑time graduate coursework in computer science to deepen his expertise.
