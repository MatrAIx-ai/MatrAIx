  hobbies: '[''Beach Jogging'', ''Yoga'', ''Reading Contemporary Fiction'', ''Reading Historical Biographies'', ''Native Plant Gardening'', ''Watercolor Painting'', ''Art Gallery Visits'', ''Mediterranean
    Cooking'', ''Beach Clean‑ups Volunteering'', ''Community Literacy Volunteering'', ''Travel'']'
  career_goals: She aims to complete a Master’s degree in Education within two years, develop an interdisciplinary sustainability and business program, secure tenure at her community college, publish research
    on adult learning and technology, become department chair, and eventually transition to a university role where she can shape curriculum policy and mentor first‑generation college students while expanding
    online learning offerings.
