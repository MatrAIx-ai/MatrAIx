personas:
  professional: Dianne Norris, a 30‑year‑old community college faculty member, leverages her expertise in curriculum development, instructional technology, and adult learning to design interdisciplinary
    sustainability and business programs, balancing inventive ideas with practical implementation while navigating departmental dynamics with cooperative collaboration and occasional assertive advocacy.
  sports: Dianne Norris greets each sunrise with a 5‑kilometer beach jog, participates in the local Coastal Runners club, plays recreational beach volleyball in summer, and follows the Los Angeles Lakers,
    Dodgers, and Chargers, balancing a competitive edge with a relaxed, community‑oriented fitness philosophy.
  arts: Dianne Norris’s artistic side flourishes in watercolor seascapes that echo J. M. W. Turner's luminous palettes, while weekend visits to the City Art Museum to view works by contemporary photographer
    Nan Goldin and listening to Bon Iver’s indie folk inspire her classroom designs, blending visual and auditory influences into a cohesive creative identity.
  travel: Dianne Norris favors meticulously planned trips that blend cultural depth with personal enrichment, having explored the Moorish alcazars of Seville, the tea ceremonies of Kyoto, and the bustling
    markets of Marrakech during semester breaks, and she often squeezes weekend getaways to nearby coastal towns for sunrise hikes and beach clean‑ups.
  culinary: Dianne Norris delights in preparing Mediterranean cuisine, skillfully combining olive oil, lemon, and fresh herbs into a classic Greek salad, slow‑cooking a chickpea and eggplant ratatouille,
    and crafting mezze platters of hummus and grilled halloumi, though her penchant for perfect seasoning sometimes leads to over‑salting dishes.
  core: Dianne Norris is a curiosity‑driven yet pragmatically grounded educator who blends sunrise beach jogs, watercolor painting, and careful budgeting, with a habit of staying up late polishing recipes
    when deadlines loom.
background:
  cultural: Dianne is a White American raised in a middle‑class family in Palm Beach County, with family roots in the Northeastern United States. Her upbringing blends traditional American values, a strong
    emphasis on education, and the relaxed, coastal lifestyle of South Florida, including exposure to a multicultural community, participation in a local Methodist church, and a commitment to civic engagement
    and environmental stewardship.
