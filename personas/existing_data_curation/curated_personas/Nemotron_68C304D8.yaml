personas:
  professional: Paul Verner, a budding junior engineer, channels his curiosity for sci-fi adventure books and practical knack for following detailed LEGO instructions into early design thinking, often building
    intricate models while staying organized enough to keep his bricks sorted for easy reuse.
  sports: Paul Verner powers through after-school pick-up matches with the Saratoga Springs Youth Soccer Club, proudly wearing jersey number 9 while also biking weekend trails and cheering on the New York
    Mets during summer baseball games, balancing structured team practice with spontaneous outdoor exploration.
  arts: Paul Verner channels his vivid imagination into drawing comic-style heroes inspired by the bold lines of comic artist Jim Lee and the whimsical worlds of Dr. Seuss, while also humming tunes from
    Pixar's Toy Story soundtrack and eagerly binge-watching the LEGO Masters series for creative spark.
  travel: Paul Verner has explored the historic downtown of Saratoga Springs, taken a family road trip to Niagara Falls, and dreams of flying to Disney World in Florida and the Grand Canyon; they plan trips
    with their parents using colorful maps and a tiny suitcase packed with LEGO bricks, favoring a mix of adventurous hikes and relaxed theme-park days.
  culinary: Paul Verner delights in cheesy pepperoni pizza, slurping creamy mac-and-cheese, and assembling peanut-butter-banana sandwiches, often helping their mom stir ketchup-based spaghetti sauce and
    proudly scooping gummy bears for post-dinner snacks, though they sometimes overindulge in sugary cereal.
  core: Paul Verner is a curious, organized 7-year-old who balances LEGO engineering, careful pocket-money saving, teamwork on the soccer field, and a love of drawing, while occasionally succumbing to snack
    cravings and forgetting inhalers.
background:
  cultural: Paul was raised in a middle‑class, predominantly white family in Saratoga Springs, Utah County. His upbringing reflects a blend of mainstream American culture—celebrating holidays like Thanksgiving,
    Christmas, and the Fourth of July—and local community traditions common in Utah, such as attending neighborhood gatherings, participating in school and church events, and enjoying outdoor activities
    like hiking and winter sports. The region’s emphasis on community involvement and appreciation for the natural landscape has nurtured Paul's love for exploring nature and collaborating with peers, while
    his family’s values have reinforced a balance between curiosity, practicality, and responsibility.
