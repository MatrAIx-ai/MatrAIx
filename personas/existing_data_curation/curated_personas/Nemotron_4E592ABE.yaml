  hobbies: '[''Gardening (herbs, vegetables, grape vines)'', ''Cooking and recipe development (Indian-Californian fusion)'', ''Yoga and meditation'', ''Wine tasting and vineyard tours'', ''Birdwatching
    and hiking in Sonoma County'', ''Reading historical fiction'', ''Knitting and crocheting'', ''Attending community theater'']'
  career_goals: Satyawattie aims to remain financially independent while deepening her involvement in the local community. She hopes to mentor younger South Asian women on career and life navigation, publish
    a cookbook that fuses Indian flavors with Sonoma produce, and serve on the advisory board of the Calistoga Senior Center to enhance programming for seniors. She also aspires to become a certified volunteer
    crisis counselor to support those experiencing stress and anxiety, and she plans to continue learning about sustainable gardening and nutrition to model a healthy lifestyle.
