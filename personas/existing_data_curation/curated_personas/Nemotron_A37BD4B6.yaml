personas:
  professional: Brandon Hill is a budding graphic design enthusiast and point guard whose disciplined training routine, methodical planning, and competitive edge drive their dual pursuit of a future scholarship
    in sports management or visual arts.
  sports: Brandon Hill dominates local pick‑up basketball courts as a disciplined point guard while cheering for the Golden State Warriors, rides a skateboard with the downtown skate club, and hits the
    gym three times a week to maintain their agility and endurance.
  arts: Brandon Hill channels their curiosity into digital illustration inspired by street‑art icons like Banksy and comic legends such as Frank Miller, while crafting hip‑hop beats that sample J. Cole
    and Kendrick Lamar, and spends weekends sketching murals for the neighborhood community center.
  travel: Brandon Hill prefers quick road trips to music‑rich cities like New Orleans and Detroit, plans each itinerary on a spreadsheet, yet dreams of attending Coachella and touring European street‑art
    hotspots when finances allow, reflecting their organized yet adventurous spirit.
  culinary: Brandon Hill cooks traditional Southern soul‑food staples—collard greens, fried chicken, and sweet‑potato pie—while experimenting with bold spice blends and perfecting their signature mac‑and‑cheese
    with smoked gouda, balancing family meals with occasional late‑night pizza deliveries.
  core: Brandon Hill is a competitively curious teen who juggles basketball drills, beat drops, and sketch pads, yet habitually stays up past midnight polishing tracks and sometimes forgets to answer texts
    for days, illustrating how they balance passion with occasional procrastination.
background:
  cultural: Brandon was raised in Meridian, MS, a small city in the Deep South with a tight‑knit African‑American community. His family traditions are rooted in Southern gospel and blues, with weekly participation
    in a local Baptist church that emphasizes choir singing and community service. He shares meals of fried catfish, collard greens, and cornbread that reflect the soul‑food heritage of the region. Growing
    up amid the legacy of the Civil Rights Movement, he is aware of the historical struggle for equality and feels a strong sense of responsibility to uplift his peers. Local festivals, Juneteenth celebrations,
    and community basketball leagues have shaped his social world, blending Southern hospitality with the creative vibrancy of Black culture.
attributes:
  skills: '["Basketball (point guard)", "Digital illustration (Procreate/Photoshop)", "Music production (FL Studio)", "Freestyle rap and lyric writing", "Basic web development (HTML/CSS)", "Community event
