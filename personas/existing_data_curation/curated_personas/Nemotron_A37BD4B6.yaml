  hobbies: '["Pickup basketball", "Freestyle rap and beat making", "Digital sketching and mural painting", "Online multiplayer gaming", "Community center volunteering", "Street photography", "Skateboarding",
    "Cooking Southern soul food", "Reading graphic novels", "Exploring new tech gadgets"]'
  career_goals: Brandon aims to earn a full athletic or artistic scholarship to attend a university where he can study graphic design or sports management while simultaneously building a personal brand
    as a hip‑hop producer and visual artist. He envisions launching a community‑focused digital media studio in Meridian that offers mentorship for young Black creatives, providing a platform for music,
    art, and tech education. Long‑term, he hopes to become a recognized producer and visual storyteller, using his influence to advocate for equity in education and create opportunities for the next generation.
