  career_goals: Tony aims to secure a stable, full‑time position that leverages his practical skill set while offering a clear path for advancement. He is interested in roles such as facilities maintenance
    technician, warehouse operations associate, or entry‑level IT support specialist, where his reliability and methodical approach are valued. Long‑term, he hopes to obtain certifications (e.g., HVAC,
    CompTIA A+) that will enable him to move into supervisory or specialist positions, ultimately providing financial security for his family and the flexibility to start a modest side business in home‑improvement
    services.
