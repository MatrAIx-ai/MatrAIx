    (multimeter, leak detector)'']'
  hobbies: '[''Desert hiking and sunrise photography'', ''Reading technical and DIY manuals'', ''Home improvement projects'', ''Model aircraft building'', ''Vintage radio restoration'', ''Acoustic guitar
    playing'', ''Community garden volunteering'', ''Small‑group board game evenings'']'
  career_goals: Kevin aims to achieve Master Technician status through advanced NATE and EPA certifications, and to eventually launch his own small HVAC service focused on energy‑efficient solutions for
    homes and farms in Imperial County. He aspires to become a trusted local resource by offering honest, customer‑first service, and to mentor apprentices, sharing his practical knowledge while fostering
    a supportive workplace culture. Balancing ambition with his need for stability, Kevin plans to grow his business gradually, ensuring he can maintain a manageable workload that mitigates stress and allows
    time for personal interests.
