  hobbies: '[''Digital illustration'', ''Generative art coding'', ''Photography of urban landscapes'', ''Reading science‑fiction and philosophy'', ''Chess'', ''Puzzle solving'', ''DIY robotics'', ''IoT
    device prototyping'', ''Attending small poetry readings'', ''Exploring local art exhibitions'']'
  career_goals: Ulysses aims to enroll in a graduate program—preferably a master’s in Human‑Computer Interaction or Artificial Intelligence—where he can explore how emerging technologies amplify creative
    expression and community storytelling. In the short term he seeks research internships that combine data science with interactive media design, while maintaining a focus on ethical, inclusive product
    development. Long‑term, he envisions a career as a UX researcher or product designer at a tech company that values diversity and socially responsible innovation, eventually launching his own platform
    that empowers underrepresented creators to showcase and monetize their work. Parallel to his professional ambitions, he is committed to mentoring Black high‑school students in STEM, developing outreach
    programs that blend coding with visual arts to expand opportunities within his community.
