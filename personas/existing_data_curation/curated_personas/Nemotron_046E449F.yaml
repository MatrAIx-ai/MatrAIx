personas:
  professional: Duane Wolford, a retired civil engineer, applies his meticulous planning and imaginative flair to mentor high‑school students in a STEM‑arts collaborative, while they orchestrate a community
    exhibition of wood‑carved sculptures and landscape photographs that honors Georgia’s heritage.
  sports: Duane Wolford, a devoted fan of the Atlanta Falcons and the Georgia Bulldogs, spends mornings walking the trails of the Georgia Senior Walking Club and evenings joining gentle tai chi sessions
    at the community center, while they treat weekly chess tournaments at the senior center as their primary competitive sport.
  arts: Duane Wolford, whose oil‑painting style echoes the pastoral hues of Andrew Wyeth and the light studies of Claude Monet, delights in capturing Georgia’s twilight in digital photographs inspired by
    Ansel Adams, while they spend evenings reading Isaac Asimov, listening to James Taylor, and drafting poems that blend scientific curiosity with Southern lyricism.
  travel: Duane Wolford, who prefers meticulously planned itineraries over spontaneous trips, enjoys relaxed drives along the Blue Ridge Parkway, weekend visits to historic Savannah and Asheville, and dreams
    of a pilgrimage to England’s National Railway Museum in York, while they balance their love of heritage travel with senior discount constraints and limited mobility.
  culinary: Duane Wolford, an adept home cook who favors farm‑to‑table meals, relishes preparing heirloom tomato bruschetta with fresh basil, slow‑cooked collard greens seasoned with smoked ham hocks, and
    traditional shrimp and grits, while they occasionally experiment with saffron‑infused risotto to challenge their culinary repertoire.
  core: Duane Wolford is a methodical octogenarian who fuses engineering precision with artistic wanderlust, obsessively cataloguing every garden bloom, train car, and bird sight while they battle a chronic
    worry habit that infuses their creative pursuits with both meticulous care and occasional self‑critique.
background:
  cultural: Duane grew up in post-World-War-II rural Georgia, steeped in the traditions of the American South. His family were small-scale farmers in Floyd County, and values of hard work, community reciprocity,
    and modest hospitality were woven into daily life. He attended a local Methodist church where gospel music and communal gatherings reinforced a sense of belonging. The civil-rights era and subsequent
    social changes left an indelible impression on him, shaping his balanced perspective of cooperation and assertiveness. His white Southern heritage includes a love for regional cuisine—peach cobbler,
    fried chicken, and collard greens—while also fostering an appreciation for folk storytelling and local history. Over the decades he pursued higher education at Georgia Tech, earning a bachelor's degree
    in a STEM field, merging his Southern roots with a progressive, curiosity-driven worldview.
