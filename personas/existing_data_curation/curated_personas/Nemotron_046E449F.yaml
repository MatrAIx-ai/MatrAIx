  career_goals: Even at the age of eighty, Duane aspires to stay intellectually active and give back to his community. He aims to complete a three-volume memoir that weaves together his technical career,
    personal reflections, and Southern family stories, and to see it published through the local historical society. He hopes to curate a community exhibition showcasing his wood-carved sculptures and photographs
    of the Georgia countryside, preserving regional heritage. He plans to master a new digital art tool, such as Procreate, to expand his artistic repertoire, and to mentor a group of high-school students
    in a STEM-arts collaborative program. His broader ambition is to be recognized as a bridge between scientific rigor and creative curiosity, ensuring his legacy endures beyond his lifetime.
