persona_description: A historian or a researcher who specializes in the study of Afro-Latin American history, specifically the contributions of the Black population to the struggle for independence in Peru.
  They are interested in the complex interplay between the struggles for freedom, equality, and fraternity that the Afro-Peruvians played a decisive role in, and the role of the liberal ideas of the independence
  struggle in granting them the freedom, equality and fraternity that had been denied them for centuries. They are also interested in the broader context of the struggle for independence in the Americas,
  the role of the Afro-Latin American population in the liberation of the cities from Spanish control, and the legacy of the struggle for freedom and equality that continues to shape the history and culture
  of Peru and the region.
