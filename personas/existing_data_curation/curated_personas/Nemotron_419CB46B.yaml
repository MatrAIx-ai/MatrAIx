personas:
  professional: Lizette Molina, a 36‑year‑old community organizer and aspiring public administrator, leverages an associate degree in Business Administration, advanced Excel skills, bilingual fluency, and
    a track record of coordinating neighborhood festivals and PTA events to drive nonprofit projects while studying for a PMP certification and a bachelor's in Public Administration.
  sports: Lizette Molina plays forward on a co‑ed community soccer league every Saturday, follows the Los Angeles Galaxy in Major League Soccer, cheers on the Portland Thorns in the NWSL, and stays fit
    by attending weekly salsa dance classes that double as cardio workouts.
  arts: Lizette Molina devotes her evenings to mystery novels by Gillian Flynn and Tana French, sways to the salsa rhythms of Celia Cruz and Marc Anthony, enjoys the vibrant murals at the local cultural
    arts center, and participates in a crossword‑themed book club that meets at the neighborhood library.
  travel: Lizette Molina prefers short, purposeful trips that blend cultural immersion with family visits, having explored Mexico City, hiked the Inca Trail to Machu Picchu, dreamed of a road‑trip along
    the Pacific Coast to Santa Barbara, and now plans a budget‑friendly staycation exploring the historic districts of nearby San Diego while saving for a future European culinary tour.
  culinary: Lizette Molina is an intermediate home chef who perfects traditional family recipes such as ceviche with lime, cilantro and ají, roasted plantains drizzled with panela, and arroz con pollo flavored
    with achiote and peas, and she loves sourcing fresh fish, ripe avocados, and fragrant herbs at the local farmers’ market for her weekend cooking workshops.
  core: Lizette Molina is a meticulous, socially‑charged planner who balances community celebrations, spreadsheet‑driven budgeting, and nightly crossword marathons, yet habitually over‑stocks pantry staples
    and can be fiercely competitive during friendly games.
background:
  cultural: Lizette is a first‑generation Ecuadorian‑American whose family immigrated to New York in the early 1990s. She grew up in a bilingual household where Spanish was spoken daily, and she maintains
    strong ties to the Ecuadorian diaspora in Queens, often attending gatherings at local cultural centers. Traditional celebrations such as Carnaval, Día de los Difuntos, and the feast of Señor de la Cola
    are integral parts of her family life. She brings these customs into her community work, organizing cultural food fairs and Spanish language workshops. Her Ecuadorian heritage also informs her culinary
    passions, especially dishes like ceviche, seco de chivo, and fanesca, which she adapts for her American neighbors while preserving authentic flavors.
attributes:
  skills: '[''Household budgeting and financial planning'', ''Event planning and logistics'', ''Bilingual communication (Spanish/English)'', ''Microsoft Office Suite (Excel, Word, PowerPoint)'', ''Community
    outreach and volunteer coordination'', ''Culinary arts – traditional Ecuadorian dishes'', ''Conflict resolution and problem‑solving'', ''Project scheduling and timeline management'']'
  hobbies: '[''Salsa dancing'', ''Community soccer league'', ''Cooking and sharing Ecuadorian recipes'', ''Neighborhood block parties and cultural festivals'', ''Puzzle solving (crosswords, sudoku)'', ''Reading
    mystery & thriller novels'', ''Balcony gardening'']'
  career_goals: Looking ahead, Lizette aims to transition back into the workforce in a role that leverages her organizational strengths and community ties. She plans to complete a bachelor's degree in Public
    Administration within the next three years, with the long‑term goal of securing a managerial position in a non‑profit organization that serves immigrant families. She also envisions launching a small
    home‑based catering business featuring authentic Ecuadorian cuisine, which would allow her to blend her culinary passion with her entrepreneurial drive. Additionally, she aspires to become a certified
    project manager (PMP) to formalize her project coordination expertise and to mentor other Latina mothers seeking professional development.
