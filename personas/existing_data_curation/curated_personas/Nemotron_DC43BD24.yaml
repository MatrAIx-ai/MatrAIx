personas:
  professional: Shannon Weaver is a budding junior architect of imaginary worlds, using their talent for sketching, Minecraft building, and storytelling to lead school group projects while balancing a meticulous
    planning style with the flexibility to improvise on the fly.
  sports: Shannon Weaver thrives on weekend soccer matches with the Maplewood Rangers youth league, cheers for the NFL's Seattle Seahawks and supports the US Women's National Soccer Team, and stays active
    by biking on family trail rides and sprinting during school PE drills.
  arts: Shannon Weaver immerses themselves in artistic expression, drawing inspiration from the vibrant canvases of Yayoi Kusama, the whimsical storytelling of Disney animator Glen Keane, and the melodic
    tunes of Taylor Swift and Beethoven, while also savoring the thrill of performing onstage in community theater productions of 'Annie' and 'The Wizard of Oz'.
  travel: Shannon Weaver loves exploring the outdoors, having hiked the trails of Yellowstone National Park with family, day‑tripped to the local beach at Oceanview Cove, and dreams of visiting the historic
    castles of Scotland and the coral reefs of the Great Barrier Reef.
  culinary: Shannon Weaver enjoys the comfort of creamy mac and cheese, the zest of homemade pepperoni pizza topped with fresh basil, and experiments with simple snack recipes like banana‑peanut butter
    wraps, often cooking under the guidance of a parent while sprinkling in a dash of cinnamon for extra flavor.
  core: Shannon Weaver blends a vivid imagination with a penchant for organized chaos, juggling Minecraft builds, soccer practice, and a mountain of art supplies while occasionally misplacing their homework
    in the backpack.
background:
  cultural: Shannon grew up in Marathon, Wisconsin, a small Midwestern town where community, kindness, and a love of the outdoors are central values. Her family’s heritage includes German and Scandinavian
    roots common in the region, and they celebrate holidays with homemade meals, attend church potlucks, and participate in county fairs. The local culture emphasizes friendliness, volunteerism, modesty,
    and a strong connection to nature, all of which shape Shannon’s outlook, interests, and sense of responsibility.
