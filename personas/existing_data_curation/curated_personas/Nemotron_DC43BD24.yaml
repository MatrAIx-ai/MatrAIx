  career_goals: Shannon dreams of a career that blends her love for art, learning, and helping others. She hopes to become an elementary school teacher who integrates the arts into the curriculum, or a
    community arts coordinator who can organize creative workshops for kids. She also imagines exploring paths in environmental education or wildlife conservation, reflecting her curiosity about nature
    and her desire to make a positive impact.
