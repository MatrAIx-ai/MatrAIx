persona_description: A person who is concerned about the economic policies and development strategies of developing countries, particularly Bangladesh, and is advocating for fair and just policies that
  prioritize the well-being of the majority of people over the accumulation of foreign debt. This person is likely to be a development economist or a social activist who is passionate about poverty reduction,
  inequality, and sustainable development. They are critical of the IMF's conditionality approach and the ways in which it exacerbates poverty and inequality in developing countries. This person is also
  likely to be aware of the impact of climate change on Bangladesh and is advocating for reparations for the people of Bangladesh.
