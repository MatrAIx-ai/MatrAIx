  career_goals: Patricia aims to advance to a supervisory role within the Mobile County Sheriff's Office, ultimately becoming a training officer responsible for developing community‑focused policing curricula
    that integrate her education expertise. She plans to acquire a Master’s in Public Administration to qualify for strategic leadership positions and to influence policy on youth engagement and mental‑health
    crisis response. Over the next five years, she hopes to spearhead a regional partnership that combines school outreach programs with protective services, reducing juvenile delinquency and fostering
    trust between law enforcement and residents.
