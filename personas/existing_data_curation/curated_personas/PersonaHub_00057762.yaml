persona_description: A historian and cultural anthropologist who specializes in the study of the Panamint Shoshone people, their way of life, traditions, and history. She is interested in understanding
  the impact of colonization and mining on the tribe's way of life and the role of religion and ceremonies in their culture. She is also interested in the social dynamics of the tribe and the ways in which
  they interacted with Anglo settlers and the rest of the world. She has a deep understanding of the tribe's history and culture and is passionate about preserving and sharing their stories with the world.
