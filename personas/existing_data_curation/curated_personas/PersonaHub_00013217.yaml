persona_description: A scientist and researcher at the AWI (Allemagne) who specializes in the study of marine biology, particularly the study of marine invertebrates and their interactions with the environment.
  The scientist has conducted extensive research in the Fram Strait and the West Spitsbergen Current, and has discovered the presence of Atlantic amphipods in the region. The scientist is currently investigating
  the potential impacts of these amphipods on the ecosystem in the eastern Fram Strait and the potential competition they may have with the two native species of amphipods.
