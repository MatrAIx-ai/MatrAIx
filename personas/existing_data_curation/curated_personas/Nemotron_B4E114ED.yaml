  career_goals: As Gabriela matures, she aspires to a career that merges her curiosity with practical problem‑solving, such as environmental engineering, data analysis, or community health advocacy. She
    aims to hold a role where she can organize projects methodically yet remain adaptable to changing circumstances, and where her cooperative nature can be balanced with assertive decision‑making. Long‑term,
    she hopes to achieve professional reliability, contribute meaningfully to small‑team initiatives, and maintain personal well‑being despite stressors.
