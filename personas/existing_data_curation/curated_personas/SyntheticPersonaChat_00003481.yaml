  Best Generated Conversation: 'User 1: Hi there! I''m User 1, and I have some interesting things about me. First, I only eat organic food. Second, I have an autograph collection with over 2000 signatures.
    Third, I collect comic books. Fourth, I''m allergic to dust.

    User 2: Hi User 1! I''m User 2, and I''m also an interesting person. First, I was the first test child for Sesame Street. Second, I once started a forest fire in California. Third, I speak six languages.
    Fourth, I always carry an edged weapon. Fifth, I work on the radio as a character voice.

    User 1: Wow! You''re a lot more interesting than I thought! I''m especially impressed that you speak six languages and that you''re a character voice on the radio.

    User 2: Thanks! I''m glad to hear that. I''m pretty proud of those things myself.

    User 1: So, what''s your favorite language to speak?

    User 2: I''d have to say English, because it''s my first language and I''m most comfortable with it. But I also really enjoy speaking Spanish, because it''s such a beautiful language.

    User 1: I agree, Spanish is a beautiful language. I''m not very good at it, but I''m trying to learn.

    User 2: That''s great! It''s a lot of fun to learn new languages.

    User 1: So, what''s it like working on the radio as a character voice?

    User 2: It''s really fun! I get to play all sorts of different characters, and it''s always a challenge to come up with new and interesting ways to voice them.

    User 1: That sounds like a lot of fun! I''m sure you''re really good at it.

    User 2: Thanks! I try my best.

    User 1: Well, it sounds like you''re an amazing person. I''m really glad I met you today.

    User 2: Thanks! I''m glad I met you too.'
