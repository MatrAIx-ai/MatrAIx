personas:
  professional: Jarvis Wardlaw, a 74‑year‑old self‑taught software developer, channels decades of hands‑on experience in legacy business applications into meticulous code maintenance and modernization,
    employing structured programming, precise debugging, and clear specification writing while reliably delivering stable solutions and mentoring local teens through informal coding workshops at the community
    church.
  sports: Jarvis Wardlaw, a lifelong supporter of the Dallas Cowboys, combines seasonal football excitement with low‑impact fitness by walking with the senior club at the local park and playing weekly pickleball
    matches at the community center to maintain mobility.
  arts: Jarvis Wardlaw, an ardent fan of soulful legends such as Otis Redding and Aretha Franklin, spends evenings savoring vinyl records, regularly attends the community church’s gospel choir concerts,
    and curates a personal library of civil‑rights biographies that fuel his storytelling and mentorship.
  travel: Jarvis Wardlaw, a methodical traveler, crafts detailed itineraries for trips to historic civil‑rights sites like Selma and Montgomery, dreams of a pilgrimage to Ghana’s coastal villages, and balances
    these ambitions with a modest travel budget and a preference for organized group tours.
  culinary: Jarvis Wardlaw, a competent home cook, perfects Southern comfort dishes such as smoked brisket, collard greens simmered with ham hocks, and sweet potato pie, seasoning with smoked paprika and
    cayenne, and often shares these meals at church potlucks, swapping recipes with neighbors.
  core: Jarvis Wardlaw, a meticulous 74‑year‑old coder who worries about every detail, finds balance in chess, vintage model‑train layouts, soulful vinyl, and mentoring teens while preserving legacy systems
    and perfecting collard greens.
background:
  cultural: Jarvis grew up in a close‑knit African‑American family in Texas, shaped by the legacy of the civil‑rights movement and the strong communal ties of the church. His cultural identity is reflected
    in his love for soulful music, traditional Southern cooking, storytelling, and a deep sense of responsibility toward uplifting his neighborhood. He draws on the resilience and resourcefulness of his
    ancestors, which informs both his work ethic and his commitment to mentoring younger Black technologists.
attributes:
  skills: '["Legacy system maintenance (COBOL, Fortran)", "Structured programming", "Debugging and troubleshooting", "Database design and SQL optimization", "System integration", "Software testing and quality
    assurance", "Technical documentation", "Project planning and timeline management", "Team mentorship and knowledge transfer"]'
  hobbies: '["Chess", "Model‑train layout design", "Woodworking", "Logic puzzles and brain teasers", "Reading historical biographies and civil‑rights literature", "Cooking Southern comfort food", "Volunteer
    coding workshops at the community church"]'
  career_goals: At this stage, Jarvis aims to mentor the next generation of programmers in his community, document and preserve critical legacy systems for local government agencies, and gradually transition
    to a consulting role that lets him focus on problem‑solving without high‑pressure deadlines. He also hopes to contribute a small open‑source toolkit that automates routine data‑cleanup tasks for nonprofit
    organizations.
