personas:
  professional: Thomas Hiteshew, a 22‑year‑old HR generalist in a suburban New Jersey firm, blends a love for clear policy structures with genuine compassion, excelling at recruitment, benefits administration,
    and conflict mediation while constantly refining processes to align with New Jersey labor regulations and their goal of becoming an HR business partner.
  sports: Thomas Hiteshew, an avid jogger on the Watchung Reservation and seasonal hiker, plays in a local co‑ed soccer league, follows the New York Mets and New Jersey Devils, and practices yoga twice
    weekly to balance their cardio routine with flexibility training.
  arts: Thomas Hiteshew enjoys winding down with acoustic guitar practice, often covering songs by Sufjan Stevens and Damien Rice, dives into psychology podcasts like The Happiness Lab, and hosts board‑game
    nights featuring titles such as Catan and Azul, while also sketching quick doodles in their journal.
  travel: Thomas Hiteshew prefers meticulously planned weekend trips, having logged visits to the Poconos, Philadelphia’s historic district, and a spring break in Boston, and they often map out itineraries
    in detail while dreaming of a structured backpacking adventure through Iceland’s waterfalls and Reykjavik’s music festivals.
  culinary: Thomas Hiteshew cooks simple, measured meals such as quinoa‑roasted vegetable bowls, lemon‑garlic grilled chicken, and classic spaghetti carbonara, favoring fresh herbs, olive oil, and a splash
    of parmesan, and they enjoy experimenting with avocado toast variations on lazy Sunday mornings.
  core: Thomas Hiteshew is a detail‑oriented HR professional who balances structured ambition with compassionate care, fights anxiety through routine and occasional indulgences, and they quietly curate
    a life of measured progress and self‑improvement.
background:
  cultural: Thomas grew up in a middle-class, suburban New Jersey family with Anglo-American roots. His cultural upbringing emphasized hard work, community involvement, and respect for rules and procedures,
    reflecting typical East-Coast suburban values. He is familiar with the multicultural tapestry of the Greater New York metropolitan area, and his white American background includes traditions such as
    holiday celebrations with extended family, participation in local civic events, and a strong sense of civic responsibility. The blend of his structured upbringing and the diversity of his environment
    informs his inclusive yet orderly outlook.
attributes:
  skills: '[''Employee Relations'', ''Recruitment & Onboarding'', ''Performance Management'', ''Benefits Administration'', ''HRIS (Workday, BambooHR)'', ''New Jersey Labor Law Compliance'', ''Policy Development'',
