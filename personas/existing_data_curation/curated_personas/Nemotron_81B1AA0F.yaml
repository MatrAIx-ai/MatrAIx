  hobbies: '[''Jogging/Hiking'', ''Yoga and Meditation'', ''Volunteer Mentoring'', ''Reading Psychology/Self-Improvement'', ''Podcasts on Emotional Intelligence'', ''Board Games'', ''Guitar Playing'', ''Cooking'',
    ''Journaling'']'
  career_goals: Thomas aims to become a strategic HR Business Partner within the next three to five years, focusing on employee wellness and mental-health support programs. He plans to earn the SHRM-CP
    credential and later pursue an MBA with a concentration in Human Resources. His long-term ambition is to lead an HR department where he can design comprehensive well-being initiatives, champion inclusive
    workplace culture, and mentor junior HR staff. He also envisions establishing a consultancy that helps small-to-mid-size companies implement structured, compassionate HR frameworks.
