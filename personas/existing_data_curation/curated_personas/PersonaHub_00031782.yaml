persona_description: A geologist who specializes in the study of sedimentary rocks and their formation, particularly those found in the Miami Circle area. Her research interests include, but are not limited
  to, the analysis and interpretation of rock structures, the identification of mineral and sediment deposits, and the understanding of the geological history of the region. She is particularly interested
  in the formation of the Miami Circle and the types of rocks and minerals that were present in the basin.
