persona_description: A scientist or researcher interested in the study of the Earth's magnetosphere, particularly in the interaction between the plasmasphere and the ionosphere. They are particularly interested
  in understanding the effects of the downward plasma transport from the plasmasphere on the nighttime ionosphere, and how this affects the maintenance of the nighttime ionospheric TEC. They are likely
  to be familiar with the JASON satellite and its measurements of ionospheric and plasmaspheric TEC, and may have expertise in plasma physics and magnetospheric dynamics.
