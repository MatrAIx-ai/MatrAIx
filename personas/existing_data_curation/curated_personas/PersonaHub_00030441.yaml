persona_description: A molecular biologist who specializes in virology and infectious diseases. This person is interested in the study of RNA viruses, their replication cycle, and the mechanisms of viral
  infection and assembly. They are particularly curious about the linear RNA genome, its structure, and the functions of the viral RNA-dependent RNA polymerase and capsid protein. They are likely to have
  a deep understanding of the infectious properties of RNA viruses and their potential for causing diseases such as HIV, Ebola, and influenza.
