  hobbies: '[''Reading African-American literature'', ''Chess'', ''Walking in Griffith Park'', ''Jazz concerts'', ''Gardening'', ''Cooking traditional Ethiopian dishes'', ''Genealogy research'', ''Photography'',
    ''Volunteer work at community center'', ''Reflective writing'']'
  career_goals: Although retired from the formal workforce, Henok aims to remain intellectually active and socially valuable. He plans to volunteer regularly as a heritage advisor for a local African‑American
    cultural museum, publish a memoir that intertwines his personal history with the broader Black experience in Los Angeles, and serve on the board of a community garden project. He also aspires to mentor
    younger activists, develop a digital archive of oral histories from senior residents, and complete a certification in digital preservation to ensure the longevity of these narratives.
