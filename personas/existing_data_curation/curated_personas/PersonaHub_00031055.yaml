persona_description: A Production Manager who is responsible for overseeing the production process, ensuring that the output is as per the standard and that there is no defect in the units processed. They
  must have a detailed process roadmap and quality check mechanisms in place to ensure predictability of the output. They must also be able to identify and rectify any problems that may arise during the
  production process. In addition, they must have a birds-eye view of the entire production process and be able to execute the entire production process in a way that ensures the final output, even in the
  face of aberrations.
