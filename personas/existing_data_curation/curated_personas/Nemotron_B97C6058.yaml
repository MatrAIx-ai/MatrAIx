  hobbies: '[''Sketching'', ''Watercolor painting'', ''Photography'', ''Hiking in the Ozarks'', ''Visiting art galleries'', ''Reading art theory'', ''Board games'', ''Volunteering at community events'',
    ''Organizing pop‑up art shows'', ''Playing acoustic guitar'']'
  career_goals: Lisa aspires to combine her passion for art with community development by pursuing a degree in Art History or Cultural Management and eventually becoming a museum curator or community arts
    program director in Arkansas. She aims to design accessible cultural initiatives, such as traveling exhibitions and youth art workshops, that bring creative experiences to rural areas. In the long term,
    she hopes to lead a nonprofit organization that supports emerging artists and enriches the cultural life of small towns while also exploring opportunities in digital media strategy for cultural institutions.
