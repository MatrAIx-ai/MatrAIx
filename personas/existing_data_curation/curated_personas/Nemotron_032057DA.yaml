  hobbies: '[''Reading (historical fiction, poetry)'', ''Gardening (native Texas plants)'', ''Watercolor painting'', ''Journaling and poetry writing'', ''Yoga and meditation'', ''Bird-watching'', ''Walking
    nature trails'', ''Attending small art exhibitions and author talks'']'
  career_goals: Melissa aims to move into a senior leadership role—such as Director of Community Programs—where she can shape the strategic direction of a nonprofit serving underserved populations in Denton
    County. She hopes to launch an interdisciplinary arts‑therapy initiative that bridges her humanities background with her community work. Long‑term, she seeks to secure a multi‑year grant to expand services
    to rural neighborhoods, mentor emerging social‑service professionals, and influence county‑level policy on mental‑health accessibility, while also achieving a healthier work‑life balance for personal
    pursuits.
