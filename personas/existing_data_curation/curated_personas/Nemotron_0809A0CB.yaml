personas:
  professional: Derrick Spiller, a 34‑year‑old wildlife behavior specialist, blends systematic positive‑reinforcement training with indigenous animal lore to design data‑driven enrichment programs for equine
    and canine species, while meticulously documenting progress and mentoring aspiring trainers.
  sports: Derrick Spiller, a member of the Beartooth Trail Riders club, hikes the Beartooth Mountains weekly, follows the Montana Grizzlies football team and the Denver Broncos, practices cross‑country
    skiing in winter, and they often join birdwatching outings with the local Audubon Society.
  arts: Derrick Spiller, an avid wildlife sketcher, creates watercolor paintings of Montana's elk and lynx, they practice traditional beadwork and flute playing inspired by the haunting tones of R. Carlos Nakai,
    and draw creative influence from John James Audubon and contemporary artist Yuko Nagayama, often sharing work at community storytelling circles.
  travel: Derrick Spiller, who prefers meticulously planned solo treks over crowded tours, has explored Yellowstone and Glacier National Parks, trekked the fjords of Iceland, and they dream of photographing
    the Galápagos finches while staying in modest eco‑lodges that respect local ecosystems.
  culinary: Derrick Spiller, a competent home cook, favors hearty dishes like elk stew with juniper berries, cedar‑plank salmon seasoned with sage and pine nuts, and roasted root vegetables, and they delight
    in sourcing wild mushrooms and bison meat from local ranchers.
  core: Derrick Spiller, a methodical dreamer, balances precise data‑driven animal training with a restless artistic spirit, often worrying about details while they find solace in sketchbooks, meditation,
    and the quiet of the mountains.
background:
  cultural: Derrick is a member of the Crow Nation, whose ancestral lands encompass the Absarokee area of Montana. Growing up, he was immersed in tribal traditions such as powwows, language lessons, and
    the reverence for horses and the prairie ecosystem. His family practiced traditional crafts like beadwork and leatherwork, and elders taught him the stories that link animal behavior to cultural values.
    This heritage informs his professional ethos, prompting him to honor the land and its creatures, and to incorporate indigenous perspectives on animal stewardship into his training methods. While he
    lives and works within the broader rural community, he remains actively involved in tribal gatherings, language revitalization projects, and youth mentorship programs.
attributes:
  skills: '[''Animal behavior analysis'', ''Positive-reinforcement training'', ''Equine and canine training'', ''Field first-aid for animals'', ''Program design and data tracking'', ''Wilderness navigation'',
    ''Creative enrichment development'', ''Integration of indigenous animal knowledge'']'
  hobbies: '[''Wildlife sketching and watercolor painting'', ''Reading speculative fiction and philosophy'', ''Hiking and birdwatching'', ''Nature photography'', ''Beadwork and traditional flute playing'',
    ''Storytelling circles'', ''Mindfulness meditation'', ''Journaling'']'
  career_goals: He aims to become a senior wildlife behavior specialist, leading a regional program that blends scientific training methods with indigenous knowledge to rehabilitate and train native species.
    Over the next five years, Derrick plans to obtain certification from the International Association of Animal Trainers, publish a field guide on Montana wildlife cognition, and establish a community-based
    training center in Absarokee that offers workshops for local ranchers, youth, and tribal members. He also aspires to mentor apprentices, especially from Native American backgrounds, and to influence
    policy on humane animal handling in the state.
