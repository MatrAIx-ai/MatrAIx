  career_goals: Eugene’s imagination is already reaching toward big dreams. He loves space and often talks about becoming an astronaut, while his fascination with animals fuels a budding interest in marine
    biology or veterinary work. At the same time, his enjoyment of building things steers him toward engineering or inventing toys. He also admires community helpers like firefighters, reflecting his practical
    desire to aid others. For now, his primary ambition is to keep learning—improving his reading, exploring science kits, and discovering new hobbies—so that any future career he chooses will build on
    his curiosity and hands‑on spirit.
