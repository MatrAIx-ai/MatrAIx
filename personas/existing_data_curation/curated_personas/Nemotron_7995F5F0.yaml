personas:
  professional: Eugene Lopez is a budding LEGO architect who merges vivid curiosity with a practical eye for following instructions, often juggling multiple builds while delighting in the freedom to rearrange
    pieces whenever the mood strikes.
  sports: Eugene Lopez dashes across the field as a member of the Coastal Kids Soccer Club, cheering for the San Diego Padres during baseball season and the LA Galaxy in soccer, while their spontaneous
    energy often leads them to forget water bottles but always sprint back for a quick game of hide‑and‑seek during recess.
  arts: Eugene Lopez sketches cartoon heroes like SpongeBob and Mickey Mouse, flips through picture books by Mo Willems, and sings along to the Backyardigans and The Wiggles, letting those colorful influences
    shape their playful imagination.
  travel: Eugene Lopez loves spontaneous road trips to the tide‑pools of Monterey Bay and weekend beach picnics at Santa Monica, dreaming about a future visit to the towering redwoods of Redwood National
    Park and the glittering lights of Disneyland, all while staying within the family’s modest travel budget.
  culinary: Eugene Lopez devours cheesy pizza slices, crunchy chicken nuggets, and spaghetti with meatballs, while proudly helping to stir batter for homemade pancakes that feature fresh blueberries and
    a drizzle of maple syrup, and they often snack on carrot sticks and apple slices for extra energy.
  core: Eugene Lopez is a curiosity‑driven LEGO builder who thrives on spontaneous experiments, juggling a chaotic allowance, occasional sneezes, and endless beach discoveries with a delightfully disorganized,
    yet heartily cooperative spirit.
background:
  cultural: Eugene grows up in a predominantly Anglo‑American community in South Portland, Maine, where New England values of self‑reliance, appreciation for nature, and community participation shape his
    upbringing. His family participates in local traditions such as Fourth of July fireworks, lobster festivals, and seasonal activities like sledding and beach outings. While his ethnic background is listed
    as white, the family name Lopez hints at a Spanish‑heritage lineage, and occasional Spanish words or cultural references may appear at home, adding a subtle multicultural layer to his everyday life.
    Attending a public elementary school, Eugene interacts with peers from diverse backgrounds, fostering an open‑minded outlook while remaining rooted in the close‑knit, coastal culture of his hometown.
