  hobbies: '[''Watching soccer (Liga MX, MLS)'', ''Cooking Mexican cuisine'', ''Family barbecue gatherings'', ''Attending Mexican cultural festivals'', ''Fishing on Lake Michigan'', ''Motorcycle maintenance
    and tinkering'', ''Volunteering for community Spanish classes'']'
  career_goals: Carlos aims to advance into a supervisory or lead operator role within his company, obtaining certifications such as the Certified Forklift Operator (CFO) and OSHA 30‑hour Training. He aspires
    to become a safety trainer, helping crews adopt best practices while staying open to emerging equipment technologies. Long‑term, he envisions starting a small family‑run logistics service that leverages
    his expertise and network, providing stable financial support for his children's education and his family's future.
