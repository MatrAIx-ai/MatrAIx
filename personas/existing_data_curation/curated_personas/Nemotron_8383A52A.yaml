personas:
  professional: Angela Castillo is a bilingual special education teacher with a STEM foundation who designs data‑driven, art‑infused Individualized Education Plans, leverages assistive technologies like
    AAC devices and speech‑to‑text software to make science accessible, and balances meticulous organization with flexible, creative problem‑solving, all while navigating the occasional stress of advocating
    for her students.
  sports: Angela Castillo enjoys solitary hikes in the Texas Hill Country as a member of the Hill Country Trekking Club, attends weekly beginner’s yoga at a Dallas studio, follows the Dallas Mavericks in
    the NBA, and participates in a local 5K charity run each spring, preferring low‑impact, small‑group activities over competitive sports.
  arts: Angela Castillo immerses herself in the Dallas art scene by attending monthly gallery talks at the Dallas Museum of Art, collecting prints by Frida Kahlo and contemporary folk artist Carmen Lomas
    Garza, and channeling inspirations from Mexican‑Central American folk motifs into her own oil paintings of vibrant, symbolic landscapes, often listening to Lila Downs while sketching.
  travel: Angela Castillo favors thoughtfully planned short‑term getaways that blend cultural immersion and nature, having trekked the cloud forests of Monteverde, explored the historic streets of Granada,
    taken a road trip through Texas Hill Country vineyards, while dreaming of a solo pilgrimage to the Maya ruins at Tulum and a future culinary tour of the Basque Country.
  culinary: Angela Castillo’s culinary repertoire centers on home‑cooked Honduran comfort foods such as baleadas stuffed with refried beans, cheese, and avocado, and sopa de caracol seasoned with fresh
    cilantro, lime, and plantain chips, and they possess an intermediate cooking skill level, frequently experimenting with traditional spices while occasionally over‑seasoning dishes in a quest for authentic
    flavor.
  core: Angela Castillo is a detail‑oriented, anxiety‑prone special‑ed teacher who channels stress into oil painting, budgets rigorously yet splurges on art supplies, and finds solace hiking alone in the
    Hill Country.
background:
  cultural: 'Angela is a first-generation Honduran-American who grew up in a close‑knit family that valued community, perseverance, and respect for elders. Raised bilingually, she celebrates Honduran traditions
    such as Semana Santa processions, Día de la Independencia (September 15), and the vibrant Feria de San Isidro, often sharing these customs with her students and colleagues. Her cultural identity informs
    her teaching philosophy: she emphasizes collectivist values, encourages family involvement in education, and integrates culturally relevant examples—like using local agricultural concepts in science
    lessons. Living in Irving, Texas, she navigates the dual identity of preserving her Central American roots while embracing the multicultural tapestry of the Dallas County region.'
attributes:
  skills: '[''Individualized Education Plan (IEP) development'', ''Differentiated instruction for STEM subjects'', ''Assistive technology integration (AAC, speech-to-text)'', ''Behavioral assessment and
    positive behavior support'', ''Bilingual communication (Spanish-English)'', ''STEAM curriculum design'', ''Collaborative co-teaching'', ''Data-driven instruction and progress monitoring'', ''Classroom
    management'', ''Art-based therapeutic techniques'']'
  hobbies: '[''Oil painting'', ''Sketching'', ''Visiting contemporary art galleries'', ''Reading educational psychology literature'', ''Practicing yoga'', ''Cooking traditional Honduran dishes'', ''Hiking
    in the Texas Hill Country'', ''Participating in Spanish-language poetry circles'', ''Journaling'']'
  career_goals: Angela aims to earn a master's in Special Education Leadership within the next two years, positioning herself for a role as a district special‑education coordinator. She is passionate about
    developing a district-wide STEAM curriculum that embeds inclusive design principles, ensuring that students with disabilities can participate fully in hands‑on science and art projects. Long-term, Angela
    envisions founding a community outreach program that offers after‑school STEM workshops for underserved Hispanic youth, bridging educational gaps and promoting cultural pride. She also hopes to mentor
    new special education teachers, sharing best practices for balancing structure with flexibility.
