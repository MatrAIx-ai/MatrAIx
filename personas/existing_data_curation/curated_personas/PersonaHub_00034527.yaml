persona_description: A group of international security experts, primarily from Brussels, who work in the fields of diplomacy, military strategy, security research, and civilian crisis management. They are
  known for their shared knowledge and authoritative claims to policy-relevant expertise in security issues. These experts have been able to influence the trajectory of security integration through their
  shared knowledge and have been successful in shaping the stage of policy choice, using their professional expertise to lay out the consequences of different courses of action as well as of not acting.
  Their causal knowledge about the sources and remedies of a problem contribute to policy formulation as well as policy innovation.
