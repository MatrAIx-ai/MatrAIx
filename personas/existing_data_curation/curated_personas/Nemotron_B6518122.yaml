  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading classic literature'', ''Crossword puzzles and sudoku'', ''Birdwatching'', ''Volunteer work at senior center'', ''Cooking and food preservation'',
    ''Playing chess'', ''Attending church fellowship'', ''Local history research'']'
  career_goals: At 80, Anna's primary ambition is to maintain her independence and physical well‑being through daily routines that support health and mobility. She aims to document and pass on her family’s
    recipes and gardening techniques in a small memoir and recipe book, preserving her heritage for grandchildren. Staying digitally connected is a goal; she intends to improve her online communication
    skills to share stories and photos more regularly. In the community, she aspires to mentor newer volunteers at the senior center, offering structured guidance while ensuring activities remain well organized.
    Finally, she hopes to be recognized locally for her long‑standing contributions to neighborhood events and volunteer coordination.
