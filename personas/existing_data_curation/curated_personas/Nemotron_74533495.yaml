  career_goals: Patricia aims to transition into a senior leadership role—such as Director of Engineering or Head of Innovation—where she can shape product strategy by marrying cutting‑edge ideas with reliable
    engineering standards. She envisions building a flexible, results‑oriented team that values spontaneity and rapid problem solving while meeting performance targets. Over the next five years she plans
    to secure at least two new patents, lead a major cost‑reduction initiative, and launch her own consulting boutique focused on agile product development for midsized manufacturers. Parallel to her professional
    aspirations, she is committed to enhancing her emotional resilience through mindfulness training and to mentoring women and underrepresented groups in STEM.
