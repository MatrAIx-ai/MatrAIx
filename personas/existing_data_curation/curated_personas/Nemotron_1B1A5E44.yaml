  career_goals: Cordilia aims to advance to a regional director of protective services within the next five years, overseeing multiple sites and standardizing security protocols across the organization.
    She plans to obtain the Certified Protection Professional (CPP) credential and to integrate data‑analytics tools for predictive threat modeling. Her ambition includes creating a mentorship program for
    women in protective services, establishing a community‑focused security education initiative in Arlington Heights, and eventually launching her own consultancy to help midsized businesses design cost‑effective,
    routine‑driven security plans. A key personal goal is to balance career advancement with sustainable stress‑management practices to maintain her well‑being.
