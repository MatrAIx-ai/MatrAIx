  hobbies: '[''Reading (non-fiction, mechanics, self‑improvement)'', ''Woodworking and model building'', ''Hiking and nature walks'', ''Photography (landscape)'', ''Cooking (structured recipes)'', ''Playing
    acoustic guitar'', ''Volunteer work at food pantry'', ''Strategy video gaming'']'
  career_goals: Jay is determined to complete his high‑school equivalency, pursue a certification as an Emergency Medical Technician (EMT), and eventually secure a full‑time position in emergency medical
    services or community health coordination. He wants a career that offers clear protocols and predictable schedules while allowing him to help people directly. In the short term, he aims to volunteer
    with the Clinton volunteer fire department to gain field experience, and to enroll in a local community‑college EMT program. Long‑term, he envisions a role where he can plan and manage health‑outreach
    initiatives for underserved residents of Middlesex County, blending his organizational strengths with his compassionate drive.
