  career_goals: Ashley aspires to attend a top‑tier university, preferably in the Ivy League or a premier STEM institution, where she plans to major in biomedical engineering or data science with an eye
    toward developing technology that monitors and alleviates anxiety. She aims to secure internships in research laboratories during college to gain hands‑on experience, eventually becoming a research
    scientist or product developer focused on mental‑health tech. Ashley is also interested in psychology, considering a minor or double major to deepen her understanding of emotional processes and help
    others manage anxiety. She seeks to win academic competitions such as science fairs and math olympiads, take leadership roles in campus clubs, and ultimately become a thought leader who bridges rigorous
    scientific inquiry with compassionate mental‑health solutions.
