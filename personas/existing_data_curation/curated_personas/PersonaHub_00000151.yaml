persona_description: A French post-impressionist painter, Henri Lebasque, whose work is celebrated for its calm and quietude of domestic subject matter. His journey from Angers to Paris, his contacts with
  younger painters, and his radical transformation in South of France all contributed to his unique vision and style. Lebasque's commercial success during his lifetime and his interest in color theory and
  the use of complementary colors in shading make him an interesting figure to explore in the field of art history.
