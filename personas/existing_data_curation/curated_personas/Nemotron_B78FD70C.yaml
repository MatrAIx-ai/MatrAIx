  career_goals: Rebecca aims to advance into a senior advisory role where she can shape enterprise‑wide strategy and mentor emerging analysts. She envisions establishing a boutique consulting practice focused
    on helping small businesses in Queens adopt data‑driven decision‑making while reducing operational stress. Additionally, she hopes to contribute as an adjunct professor at a local community college,
    sharing her practical expertise and fostering a new generation of analytical thinkers.
