  hobbies: '[''Adult soccer league'', ''Karaoke nights'', ''Hiking in Shenandoah'', ''Mindfulness meditation'', ''Cooking Korean cuisine'', ''Board‑gaming gatherings'', ''Volunteer English tutoring'', ''Reading
    sci‑fi and legal thrillers'']'
  career_goals: Jung aims to progress from a paralegal to a senior legal analyst specializing in technology and intellectual property law within the next five years. He plans to obtain the Certified Paralegal
    (CP) credential and complete a part‑time JD program to deepen his legal expertise while maintaining family responsibilities. He is motivated to lead a small team of junior assistants, streamline workflow
    with automation, and become a go‑to resource for complex scientific patent cases at his firm. Long‑term, he envisions influencing policy on data‑privacy compliance and mentoring new immigrants entering
    the legal profession, balancing his ambition with a healthy work‑life rhythm that reduces his worry about stress.
