  career_goals: Although retired from formal employment, Janette aims to deepen her involvement in community service by leading a local oral‑history project that preserves Glenwood’s neighborhood stories.
    She plans to mentor new volunteers at the public library, develop a series of workshops on budgeting for seniors, and write a memoir that reflects on her experiences as a woman navigating work and family
    in mid‑20th‑century America. Continuing education through workshops on genealogy and digital archiving also features in her personal goals.
