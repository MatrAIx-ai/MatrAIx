personas:
  professional: Janette Pollard, a retired school secretary turned community volunteer coordinator, leverages their meticulous bookkeeping and event‑planning expertise to lead Glenwood’s oral‑history project,
    meticulously organizing interview schedules, transcriptions, and archival storage with a methodical precision that reflects their lifelong love of structure.
  sports: Janette Pollard enjoys leisurely morning walks in Riverside Park and participates in the Glenwood Seniors Fitness Club’s low‑impact aerobics class, while cheering on the Chicago Cubs and the Green
    Bay Packers on game days, and they occasionally join the community’s senior softball league for friendly competition.
  arts: Janette Pollard nurtures creative expression through a weekly knitting circle where they share Ravel yarn patterns, immerses themselves in historical fiction by authors like Philippa Gregory and
    Ken Follett, and relaxes to the sounds of Ella Fitzgerald, Frank Sinatra, and the folk tunes of The Chieftains, all of which enrich their appreciation of storytelling and melody.
  travel: Janette Pollard prefers relaxed road trips to historic sites such as Gettysburg, Pennsylvania, and coastal getaways in Cape Cod, and they have fulfilled a lifelong dream by joining a genealogy
    tour of Dublin, Ireland, while future plans include a culturally rich visit to the Black Forest region of Germany, all organized around a fixed travel budget and their desire for leisurely pace.
  culinary: Janette Pollard delights in cooking hearty family recipes like beef stew with carrots and potatoes, shepherd’s pie topped with mashed potatoes, and a traditional apple crumble, often incorporating
    fresh basil, thyme, and rosemary from their vegetable garden, and they relish dining out at the local farm‑to‑table bistro for seasonal dishes such as pan‑seared salmon with lemon‑dill sauce.
  core: Janette Pollard, a methodical yet warm‑hearted gardener‑knitter, transforms community needs into neatly organized plans, even if it sometimes means losing hours to crossword puzzles while sipping
    tea.
background:
  cultural: Janette grew up in a midwestern, white, middle‑class family with German and Irish roots. Raised in a predominantly Protestant community, she values tradition, community cohesion, and modesty.
    Her upbringing in the post‑war era emphasized hard work, reliability, and respect for social norms, shaping her preference for structure and predictability. Living in Glenwood, Illinois, she embraces
    the local culture of neighborly interaction, church involvement, and civic engagement, while maintaining a personal connection to broader American cultural narratives through her interest in history
    and genealogy.
