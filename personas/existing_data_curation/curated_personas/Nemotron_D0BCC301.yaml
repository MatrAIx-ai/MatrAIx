  career_goals: Kedrick aims to move into a supervisory role, such as shift leader or stockroom manager, where he can formalize training programs for new employees and improve workflow efficiency. He also
    dreams of leveraging his love for art and community building by establishing a small co‑op space that showcases local artisans, offers workshops, and provides a gathering spot for residents. To support
    these ambitions, he plans to complete a certification in supply‑chain management and attend workshops on community arts administration. Ultimately, he hopes to blend his logistics expertise with his
    passion for cultural enrichment, creating a more connected and vibrant Dutch Harbor.
