personas:
  professional: Lina Ortiz, a food‑service operations manager with a flair for data‑driven menu engineering, leverages their analytical precision and flexible, people‑first leadership to streamline inventory
    control, implement performance dashboards, and nurture a cooperative kitchen environment, all while staying grounded in the practical rhythms of daily service.
  sports: Lina Ortiz hits the Appalachian trails with the Asheville Trail Runners club for weekend hikes, follows the Carolina Panthers for NFL excitement, and squeezes in weekly spin classes at a local
    gym, balancing solitary endurance workouts with occasional team‑spirit viewing parties.
  arts: Lina Ortiz, a sci‑fi enthusiast, regularly debates the works of Nnedi Okorafor and Liu Cixin at their Spanish‑language book club, while their playlist swings between the jazzy vocals of Esperanza
    Spalding, the electronic soundscapes of Daft Punk, and the cinematic scores of Hans Zimmer, feeding both imagination and cultural curiosity.
  travel: Lina Ortiz prefers thoughtfully planned escapes that blend adventure with relaxation, having trekked the Blue Ridge Mountains, savored weekend getaways in Charleston’s historic district, and dreaming
    of a culinary pilgrimage to the highland farms of Peru where they can study terroir‑driven spice cultivation.
  culinary: Lina Ortiz experiments in the kitchen by pairing smoky brisket with a tamarind‑infused mojo, crafting plantain‑topped collard greens topped with toasted pepitas, and perfecting a ribeye‑and‑aji
    amarillo rub, showcasing a skill level that merges professional catering precision with home‑cooking creativity.
  core: Lina Ortiz blends analytical rigor with a love for quiet solitude, indulges in meticulous budgeting while secretly hoarding quirky kitchen gadgets, and channels their reserved yet compassionate
    nature into pioneering data‑forward hospitality solutions.
background:
  cultural: Lina was born to Colombian parents who emigrated to the United States, and she grew up bilingual, speaking both Spanish and English. Her family traditions—such as celebrating Carnaval, preparing
    arepas, and sharing stories of Colombian folklore—remain a vital part of her identity. Living in Cumming, GA, she blends these traditions with Southern hospitality, often hosting small gatherings featuring
    Colombian‑Southern dishes. Her cultural background informs her values of family cohesion, communal sharing, and respect for diverse perspectives, which she carries into her professional and personal
    life.
attributes:
  skills: '[''Operational planning'', ''Data analysis and reporting'', ''Inventory management'', ''Budgeting and cost control'', ''POS system implementation'', ''Menu engineering'', ''Nutrition and food
    safety compliance'', ''Team leadership and training'', ''Process optimization'', ''Customer service excellence'']'
  hobbies: '[''Fusion cooking'', ''Hiking'', ''Reading science‑fiction'', ''Listening to technology podcasts'', ''Community gardening'', ''Spanish‑language book club'']'
  career_goals: Lina aims to advance to a regional director role overseeing multiple food‑service locations, where she can apply her data‑driven approach to improve efficiency and sustainability across
    the chain. She also plans to launch a boutique restaurant that fuses Colombian flavors with Southern cuisine, integrating technology for a seamless guest experience. Mentoring emerging women leaders
    in the hospitality industry and championing diversity and inclusion initiatives are also central to her long‑term vision.
