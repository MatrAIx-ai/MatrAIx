persona_description: A school administrator responsible for ensuring the safe and responsible use of the internet in Leigh Primary School. This person is knowledgeable about online safety policies, curriculum
  guidelines, and effective strategies for educating students and staff about the risks and dangers of the internet. They are committed to promoting a culture of openness and trust, and to providing clear
  rules and guidelines for staying safe online. They are also knowledgeable about the latest online safety initiatives and tools, such as the Acceptable Use Posters, Purple Online Safety Curriculum, and
  ThinkUKnow scheme, and are actively involved in implementing and promoting these initiatives in the school.
