persona_description: A research scientist who specializes in the development and validation of smart blade technologies, particularly in the field of adaptive leading edge design. He has extensive experience
  in interdisciplinary research and has led several successful projects, including Smart Blades and Smart Blades 2. His expertise lies in the design and analysis of composite materials, and he has a deep
  understanding of the manufacturing processes required to produce smart blades. He is highly skilled in the use of advanced manufacturing technologies, such as highly productive fibre-placement methods
  and sensor-gui, and he is passionate about the potential of these technologies to improve the performance and reliability of wind turbines.
