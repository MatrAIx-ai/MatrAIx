  hobbies: '[''singing nursery rhymes'', ''dancing to music'', ''building block towers'', ''drawing with crayons'', ''pretend play with dolls'', ''exploring the backyard'', ''listening to storytime books'',
    ''playing with peers at the park'', ''collecting leaves and stones'']'
  career_goals: While still a toddler, Sandra shows early interest in helping and teaching others. She often pretends to be a teacher guiding her dolls, imagines being a nurse caring for friends, and loves
    to draw pictures she hopes to share one day. Her parents nurture these aspirations, encouraging her curiosity and kindness as foundations for future roles such as educator, caregiver, or community storyteller.
