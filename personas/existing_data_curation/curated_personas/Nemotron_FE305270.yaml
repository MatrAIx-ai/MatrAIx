personas:
  professional: Sandra Savoy, a 3-year-old with an early fascination for organizing play‑dates and teaching her stuffed animals, blends curiosity with practicality by arranging blocks into orderly towers
    before improvising imaginative stories, showing early signs of a future educator.
  sports: Sandra Savoy, a 3-year-old who swears by her tiny soccer cleats and loves the local junior gymnastics program, eagerly watches the city's baseball team, the River City Roosters, during family
    outings while also participating in weekly tumble‑time classes that balance structured drills with free‑play.
  arts: Sandra Savoy, a 3-year-old enthusiast of colorful storybooks, delights in the illustrations of Eric Carle, sings along to the Sesame Street soundtrack, especially the song "C is for Cookie," and
    enjoys dancing to the upbeat tunes of Disney's Frozen soundtrack, particularly "Let It Go," shaping her playful creative identity.
  travel: Sandra Savoy, a 3-year-old adventure‑curious traveler, loves the routine road trips to her grandparents' farmhouse in the countryside, has explored the interactive exhibits at the Seattle Aquarium,
    and dreams of visiting the sandy shores of Cancun for a family beach day, preferring hands‑on experiences over long flights.
  culinary: Sandra Savoy, a 3-year-old with a budding palate, favors cheesy macaroni, strawberry‑topped pancakes, and bite‑size fruit kebabs featuring grapes and banana, can stir batter with a plastic spoon,
    and insists on adding a pinch of cinnamon to her oatmeal, reflecting her energetic yet organized approach to mealtime.
  core: Sandra Savoy, a lively 3-year-old who constantly asks "why?" while clutching her favorite stuffed rabbit, balances an infectious curiosity with a surprisingly tidy play area and a habit of hoarding
    glitter stickers in her pocket.
background:
  cultural: Sandra is raised in a Black family in Fairmont, a small community in Robeson County, North Carolina. Her upbringing is shaped by Southern Black traditions, including family gatherings around
    soulful gospel music, church attendance, and storytelling that celebrate resilience and community bonds. The multicultural environment of Robeson County, with influences from nearby Lumbee and other
    cultures, adds a rich tapestry of shared celebrations, food, and mutual support, fostering Sandra's appreciation for diversity and harmony.
attributes:
  skills: '[''basic language skills'', ''curiosity-driven questioning'', ''toy organization'', ''block building'', ''crayon drawing'', ''simple counting'', ''sharing and cooperation'', ''following routines'',
