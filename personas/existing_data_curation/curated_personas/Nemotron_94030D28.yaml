  career_goals: Chanda aims to advance within the fire service while staying rooted in the practical, community‑oriented values that drive her. Her short‑term goal is to earn the Fire Captain certification
    and complete the state’s Leadership Development Program, positioning herself for a promotion to Captain within the next two years. Long‑term, she aspires to become a Fire Chief, focusing on improving
    firefighter wellness, diversifying recruitment, and integrating culturally responsive fire‑prevention curricula for Jasper County’s underserved neighborhoods. She also plans to finish an associate’s
    degree in Fire Science and later pursue a bachelor’s in Public Administration to strengthen her strategic planning and budget‑management capabilities. Additionally, Chanda hopes to establish a mentorship
    network that connects experienced Black firefighters with younger recruits, fostering professional growth and community representation.
