persona_description: A researcher who is interested in the history of slavery and its impact on society, particularly in the British Caribbean, Mauritius, and the Cape during the 19th century. They are
  looking for information on the compensation given to slave owners, the distribution of the money, and the proportion of Britain's wealth that was linked to slavery. They are interested in finding evidence
  of slave ownership in their own town or city and observing any patterns or trends in the data. They are also interested in the compensation records and the individuals and companies that received money,
  as well as the process of determining who was entitled to what.
