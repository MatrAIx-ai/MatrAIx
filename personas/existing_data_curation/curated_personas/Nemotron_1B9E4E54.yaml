  career_goals: Ramon aspires to become a robotics engineer who designs affordable assistive devices for people with disabilities. He envisions studying engineering at a university, mentoring younger students
    in STEM, and eventually starting a community makerspace that blends technology with cultural traditions. In the short term, he aims to win his middle school science fair, earn a certification in coding,
    and take advanced robotics courses at a nearby high school.
