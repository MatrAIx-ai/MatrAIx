personas:
  professional: Ramon Espinal is an aspiring robotics enthusiast who spends afternoons at the makerspace building drones and mastering CAD, blending their curiosity for new tech with a practical, organized
    approach to projects while kindly assisting teammates and staying flexible with deadlines.
  sports: Ramon Espinal plays midfield for the Solvang Junior Soccer Club, idolizes Los Angeles Football Club's forward, drills after school on the community field, and they also hike the Santa Ynez Mountains
    with family on weekends, treating each trek as endurance training.
  arts: Ramon Espinal sketches vivid comic panels inspired by adventure games, tunes into norteña rhythms, pop hits from Billie Eilish, and occasional Danish folk melodies at local festivals, and they regularly
    volunteer for set design at the community theater, channeling their cooperative spirit.
  travel: Ramon Espinal dreams of exploring Copenhagen's historic harbor and Norway's fjords, but recent trips have been local—camping at Santa Barbara's beach and hiking the Redwood trails in Northern
    California—each adventure planned with a mix of family input and their own curiosity for new landscapes.
  culinary: Ramon Espinal enjoys helping grandparents prepare tamales with masa dough and pork filling, perfecting the steaming technique, while also experimenting with homemade guacamole and occasionally
    adding cardamom to chocolate chip cookies for a Danish twist.
  core: Ramon Espinal is a curious, organized teen who balances video-game quests with drone builds, soccer drills with family hikes, and comic art with kitchen experiments, all while juggling allowance
    budgeting, occasional allergy sniffles, and a habit of staying up late to finish a level.
background:
  cultural: Ramon is a first‑generation Mexican‑American raised in Solvang, a small town known for its Danish heritage. His household is bilingual, with Spanish spoken at home and English at school, and
    family traditions such as Día de los Muertos, Las Posadas, and cooking homemade tamales are central to his upbringing. The multicultural environment of Solvang, with its Danish architecture and annual
    festivals, has exposed him to a blend of cultural celebrations, fostering openness to diverse perspectives while maintaining strong ties to his Mexican roots.
