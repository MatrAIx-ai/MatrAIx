  career_goals: Shakira aims to advance from frontline supervision to a mid-level management position within the next three to five years, such as Office Manager or Operations Coordinator, ideally in an
    organization that values cultural outreach or community development. She plans to earn a Certified Administrative Professional (CAP) credential and pursue a Master's degree in Public Administration
    or Organizational Leadership. Long-term, she envisions leading a department that integrates administrative excellence with community-focused programs, perhaps at a nonprofit cultural center or a municipal
    agency that serves Tampa's diverse neighborhoods. She also hopes to mentor new employees, especially those from immigrant backgrounds, and to develop a mentorship program that promotes inclusive workplace
    culture.
