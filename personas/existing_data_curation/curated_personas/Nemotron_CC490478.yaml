personas:
  professional: Gilian Ortizmartinez is a high school sophomore who blends a love for contemporary YA literature with a knack for visual storytelling, sketching character designs that they share with friends,
    aspiring to become a graphic novelist, and they approach each creative project methodically while allowing spontaneous twists.
  sports: Gilian Ortizmartinez enjoys cheering for the local football club, the Riverside Rovers, during weekend matches, plays casual volleyball during PE, and they occasionally join a neighborhood skateboarding
    group, preferring low‑key, social sport activities over competitive leagues.
  arts: Gilian Ortizmartinez finds solace in sketching scenes from their favorite YA novels and listening to norteño legends like Jorge Negrete and banda groups such as Banda El Recodo, while also admiring
    graphic novelists like Raina Telgemeier, blending these influences into their own art style.
  travel: Gilian Ortizmartinez loves weekend trips to nearby cultural festivals, such as the annual Harvest Fair in Oakville, and dreams of exploring historic colonial towns like Guanajuato, balancing budget
    constraints with a desire for immersive, community‑focused travel experiences.
  culinary: Gilian Ortizmartinez frequently cooks with their grandmother, perfecting a family‑style pork stew spiced with cumin and oregano, and experimenting with corn masa dumplings and fresh salsa verde,
    while their cooking skill sits at an enthusiastic beginner level, often improvising with pantry staples.
  core: Gilian Ortizmartinez is a thoughtful teen who balances a structured love for storytelling with a relaxed, sometimes disorganized approach to daily life, channeling kindness into community volunteer
    work, while juggling occasional acne, budget‑savvy spending, and a passion for sketching and cooking family recipes.
background:
  cultural: Gilian is a first‑generation Mexican‑American raised in Santa Ana’s vibrant Latino community. She grew up in a bilingual household, speaking Spanish at home and English at school, which has
    given her a strong cultural duality. Family traditions like Día de los Muertos, quinceañera celebrations, and weekend gatherings around shared meals are central to her life. She embraces the cultural
    values of familismo and respeto, prioritizing family cohesion and respect for elders. While honoring her Mexican roots, she also enjoys the multicultural environment of Orange County, blending traditional
    customs with contemporary Californian youth culture.
