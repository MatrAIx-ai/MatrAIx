  career_goals: Gilian aspires to a stable career that lets her serve her community. She plans to graduate high school with strong grades, attend a community college in Orange County, and earn an associate
    degree in nursing. Long‑term, she envisions working as a registered nurse in a clinic that primarily serves Latino families, where her bilingual abilities will be valuable. She also hopes to mentor
    younger students from similar backgrounds, encouraging them to stay in school and pursue higher education.
