  career_goals: Although retired from formal employment, Young aims to remain an active contributor to his community by volunteering as a STEM mentor for local high‑school and college students, leading
    workshops on sustainable engineering practices, and curating collaborative art‑science exhibitions at the San Luis Obispo Museum of Art. He aspires to author a series of essays reflecting on the intersections
    of engineering, art, and aging, and hopes to secure a speaking role at regional conferences where he can share his interdisciplinary perspective. Additionally, he seeks to establish a small nonprofit
    focused on providing low‑cost technical tutoring and creative workshops for underserved seniors, blending his competitive drive with his desire to leave a lasting legacy.
