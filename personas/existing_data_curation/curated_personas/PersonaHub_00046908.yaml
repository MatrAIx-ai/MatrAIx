persona_description: A scientist who specializes in freshwater science, particularly in the areas of water quality, nutrient loading, and the impact of land use on waterways. They have a deep understanding
  of the current state of New Zealand's waterways and are passionate about finding solutions to reverse the current rate of intensification and maintain or enhance aquatic systems. They are a leader in
  the field of freshwater science and have a unique perspective on the importance of applying the same level of technology and thinking to the effluent end of the system as we have done at the production
  end. They are also interested in preventing nutrient loading into waterways upstream and believe that a bigger focus could be made on this issue.
