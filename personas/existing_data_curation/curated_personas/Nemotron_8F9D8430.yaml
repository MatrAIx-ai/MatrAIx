    problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street and landscape photography'', ''Playing pickup soccer games'', ''Hiking the Sandia Mountains'', ''Cooking traditional Mexican cuisine'', ''Collecting
    Mexican folk art (alebrijes)'', ''Attending live music and cultural festivals'', ''Playing casual poker with friends'', ''Volunteering at community safety workshops'']'
  career_goals: Mario aims to move from a floor surveillance officer to a supervisory role overseeing security operations across multiple gaming venues. He plans to complete a bachelor’s degree in security
    management or criminal justice to deepen his strategic expertise. His long‑term ambition is to develop a specialized security consultancy that focuses on protecting cultural and entertainment spaces,
    merging his love for art with his professional skill set. He also hopes to become a trainer for new guards, sharing his knowledge of situational awareness and cultural sensitivity, and to launch a community
    outreach program that educates local youth about safety and career paths in security.
