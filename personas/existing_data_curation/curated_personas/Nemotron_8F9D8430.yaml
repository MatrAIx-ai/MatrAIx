personas:
  professional: Mario Ortizguerra, a 38‑year‑old casino floor surveillance officer, turns multilingual fluency and razor‑sharp situational awareness into a daily routine of interpreting crowd behavior,
    de‑escalating conflicts, and troubleshooting CCTV systems, all while his spontaneous, art‑inspired mindset pushes him to improvise solutions that sometimes clash with strict security protocols, fueling
    his ambition to become a supervisor and eventually launch a consultancy focused on safeguarding cultural and entertainment spaces.
  sports: Mario Ortizguerra fuels his fitness by playing pick‑up soccer with the Albuquerque community league, cheering on New Mexico United, and hiking the Sandia Mountains with the local outdoor club,
    while he also follows the Isotopes during baseball season and occasionally joins a weekend cycling group at the Rio Grande trail.
  arts: Mario Ortizguerra immerses himself in the Albuquerque art scene, sketching exhibits at the Museum of Art, photographing vibrant folk‑art installations, collecting alebrije figures, drawing inspiration
    from Frida Kahlo and Diego Rivera, and unwinding to the sounds of Los Tigres del Norte and Brian Wilson’s surf‑rock harmonies.
  travel: Mario Ortizguerra prefers spur‑of‑the‑moment road trips, having already explored the red cliffs of Sedona, the historic streets of Santa Fe, and the bustling markets of Oaxaca, while his travel
    planning balances a modest budget with a desire to attend cultural festivals, and he dreams of a future trek through Patagonia’s glaciers when his savings allow.
  culinary: Mario Ortizguerra’s kitchen is a labor of love where he crafts mole poblano with ancho chilies, chocolate, and spices, rolls tamales with masa and pork, dishes up chiles en nogada for special
    gatherings, and experiments with fresh corn tortillas, all while his cooking skill hovers between enthusiastic home chef and occasional over‑simmered sauce.
  core: Mario Ortizguerra is a charismatic, art‑obsessed security professional who juggles spontaneous creativity with a penchant for last‑minute spending, mild health quirks, and a relentless drive to
    protect cultural spaces.
background:
  cultural: Mario was born and raised in Albuquerque to Mexican‑immigrant parents, making him fluently bilingual and deeply rooted in both Mexican and Southwestern U.S. cultures. Family traditions such
    as Día de los Muertos, quinceañeras, and weekly home‑cooked meals are central to his identity. He maintains strong ties to the local Latino community, often participating in cultural festivals, mariachi
    performances, and neighborhood gatherings that celebrate heritage and foster communal harmony. The blend of Mexican folk art influences—bright colors, symbolic motifs—and the desert landscape aesthetic
    of New Mexico shapes his appreciation for visual expression. Mario’s upbringing emphasized respect for elders, cooperative spirit, and valuing relationships, which translate into his considerate, harmony‑seeking
    approach at work and in his social life.
attributes:
