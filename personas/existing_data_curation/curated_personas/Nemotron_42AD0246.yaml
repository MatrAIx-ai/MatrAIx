  hobbies: '[''Reading'', ''Journaling'', ''Meditation'', ''Urban gardening'', ''Cooking'', ''Quilting'', ''Crocheting'', ''Community book club'', ''Small church gatherings'', ''Neighborhood block parties'']'
  career_goals: Rosa aims to earn her GED within the next year and enroll in a community college program focused on culinary arts and sustainable agriculture. She envisions launching a small home‑based
    catering service that highlights healthy, culturally rooted meals for neighborhood events and church functions. In parallel, she hopes to expand her urban gardening hobby into a modest micro‑farm, supplying
    fresh produce to local food banks and a weekend farmers market stall. Rosa also aspires to become a mentor for youth in her community, offering after‑school tutoring and hands‑on cooking workshops that
    blend practical life skills with cultural heritage.
