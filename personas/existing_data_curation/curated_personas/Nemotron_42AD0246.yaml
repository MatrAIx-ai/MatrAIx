personas:
  professional: Rosa Smith is an emerging culinary entrepreneur who blends their practical budgeting expertise, garden‑to‑table knowledge, and community‑organizing skills into a home‑based catering venture,
    embodying their curiosity‑driven yet reliable nature by constantly experimenting with seasonal menus while ensuring flawless logistics for small events.
  sports: Rosa Smith favors low‑impact fitness, joining the Sunrise Strollers walking club for early morning laps around their neighborhood, practicing yoga twice a week, and cheering on the Atlanta Braves
    and Georgia Bulldogs while avoiding crowded gyms.
  arts: Rosa Smith immerses themselves in the arts by quilting intricate patterns inspired by the textile designs of Mary Walker, reading contemporary novels by Sally Rooney and Chimamanda Adichie, and
    listening to the soulful blues of Alabama Shakes while occasionally attending community theater productions of Tennessee Williams' A Streetcar Named Desire.
  travel: Rosa Smith plans modest, wellness‑focused getaways, preferring solo retreats to the historic gardens of Savannah, weekend road trips to Asheville’s craft markets, and dreaming of a spring pilgrimage
    to Kyoto’s Zen temples, all while budgeting carefully to accommodate their family’s occasional commitments.
  culinary: Rosa Smith, a self‑taught home chef, delights in fusing Southern comfort with fresh produce, whipping up shrimp‑and‑grits seasoned with heirloom basil, collard greens sautéed with smoked turkey,
    and a signature peach‑glazed pork tenderloin that showcases their love for sweet corn, okra, and locally sourced honey.
  core: Rosa Smith balances a meticulous budget with a boundless love for heirloom seeds, often juggling grocery lists while humming to Alabama Shakes and never leaving home without their trusty garden
    journal.
background:
  cultural: Rosa identifies as African‑American, with family roots that trace back to the Great Migration from the rural South to the Midwest in the mid‑20th century. Growing up in the historic Soulard
    and Near North Side neighborhoods of St. Louis, she was immersed in a vibrant community that celebrates Black cultural traditions through music, food, and church life. Her family maintains a strong
    connection to gospel and blues music, and holiday gatherings often feature classic soul food dishes such as collard greens, smoked turkey, and cornbread, which she prepares with a contemporary twist.
    Rosa’s cultural identity is reinforced by active participation in her local Baptist church, where she volunteers in youth mentorship programs and community service initiatives. She also takes pride
    in the city’s African‑American history, regularly visiting the Old Courthouse Museum and the St. Louis African American Museum to deepen her understanding of the civil‑rights legacy that shapes her
    community’s resilience and solidarity.
