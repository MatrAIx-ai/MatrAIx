persona_description: A researcher and medical professional who is passionate about bioprinting and its potential applications in medicine. They are involved in research at the Wake Forest Institute for
  Regenerative Medicine and have a strong interest in personalized medicine and the use of 3-D bioprinting to create organs for transplant. They are also interested in lung transplant and the University
  of Minnesota's Health Lung Transplant Program, and have contributed to the growth of the lung transplant program by hiring more surgeons, conducting screening programs to ensure no offers are missed,
  and using the "Breathing Lung Concept" to improve the success rate of lung transplants.
