persona_description: A researcher interested in studying the mechanisms and opportunities for intervention in corneal neovascularization and other neovascular disorders, as well as in developing and characterizing
  a highly reproducible rat syngeneic in vitro model of the rat blood brain barrier (BBB) using co-cultures of primary rat brain endothelial cells (RBEC) and astrocytes. They are interested in studying
  receptors involved in transcytosis across the endothelial cell monolayer and in understanding the molecular and cellular flux between the blood and the nervous tissue. They are also interested in studying
  the mechanisms and opportunities for intervention in corneal neovascularization and other neovascular disorders, as well as in developing and characterizing a highly reproducible rat syngeneic in vitro
  model of the BBB using co-cultures of primary rat brain endothelial cells (RBEC) and astrocytes.
