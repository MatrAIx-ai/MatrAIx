  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Model‑train building'', ''Attending acoustic‑guitar concerts'', ''Playing chess at the senior center'', ''Mentoring youth entrepreneurs'',
    ''Scenic drives along the California coast'']'
  career_goals: Although retired from formal employment, David is driven to stay engaged and purposeful. He aims to serve on the board of his local senior center, using his financial and organizational
    skills to improve program funding and operations. He also hopes to launch a weekly workshop at the community library to teach basic budgeting and computer literacy to seniors. Maintaining his health
    is a personal priority, so he plans to complete a senior‑focused fitness program and achieve a consistent walking routine. Additionally, David wants to finish a short memoir documenting his experience
    running a small business in the 1970s and 1980s, preserving family history for future generations.
