persona_description: An animal health official in Texas who is responsible for managing and controlling bovine tuberculosis (TB) outbreaks in the state. They have extensive knowledge and experience in TB
  epidemiology, diagnostic testing, and quarantine procedures. They are also familiar with the potential spread of TB to other species and the importance of preventing its transmission to humans and the
  food chain. They work closely with other government agencies, the dairy industry, and other states to contain TB outbreaks and ensure the safety and health of livestock and the public.
