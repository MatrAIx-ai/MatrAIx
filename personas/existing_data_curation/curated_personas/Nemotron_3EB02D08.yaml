  career_goals: Although retired from the formal workforce, Dylan aims to stay intellectually engaged and give back to his community. He hopes to mentor high‑school students interested in STEM, serve on
    the Crisp County planning commission to improve local infrastructure, and develop a sustainable community garden that combines his engineering background with horticulture. He also plans to author a
    series of easy‑to‑follow manuals on home maintenance for seniors, blending his technical expertise with his desire to help others.
