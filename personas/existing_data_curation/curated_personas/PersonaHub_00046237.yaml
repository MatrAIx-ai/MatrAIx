persona_description: A historian who is interested in the history of Bath and its water springs, particularly the history of the town's connection to the Regency period. She is particularly interested in
  the medical and therapeutic benefits of the town's waters and the history of the town's efforts to accommodate the horses of the gentry on the town common. She is also interested in the social history
  of the town during the 17th and 18th centuries, and how the town's fashionable destination status contributed to its reputation as a restorative spa.
