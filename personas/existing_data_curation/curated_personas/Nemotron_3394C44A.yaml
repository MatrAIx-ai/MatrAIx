  hobbies: '[''Visiting local art galleries and museums'', ''Reading books on Caribbean art and history'', ''Gardening tropical plants'', ''Preparing traditional Puerto Rican dishes'', ''Listening to bomba
    and plena music'', ''Attending small community gatherings'', ''Practicing watercolor painting'', ''Documenting family stories in a digital album'', ''Walking along the coastline and beachcombing'',
    ''Working on jigsaw puzzles'']'
  career_goals: Although retired, Yadira aims to deepen her involvement with the Arecibo community cultural center by mentoring younger volunteers in art curation and oral‑history documentation. She hopes
    to compile a digital memoir of family recipes and stories for future generations, and to master watercolor painting as a new artistic outlet. Travel to historic sites across Puerto Rico, such as Old
    San Juan and the Cueva del Indio, remains a cherished ambition. Maintaining her health through gentle exercise and staying mentally active are also top priorities.
