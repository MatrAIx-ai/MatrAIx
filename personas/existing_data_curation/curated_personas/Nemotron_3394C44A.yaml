personas:
  professional: Yadira Munoz, a retired administrative and bookkeeping professional, now volunteers at the local cultural center where they apply meticulous record‑keeping skills and a relaxed, curiosity‑driven
    approach to curating small art exhibitions and mentoring younger volunteers.
  sports: Yadira Munoz enjoys leisurely walks along Arecibo’s coastline, participates in low‑impact water‑aerobics sessions at the community center, and avidly follows the local baseball team Cangrejeros
    de Santurce, all while treating gardening as a gentle form of daily exercise.
  arts: Yadira Munoz, an avid watercolor painter and frequent gallery visitor, channels the rhythms of bomba and plena into their canvases, curates exhibitions showcasing regional artists at the community
    center, and keeps a prized print by José Campeche as a source of artistic inspiration.
  travel: Yadira Munoz prefers relaxed, small‑group tours of island historic sites such as Old San Juan and Cueva del Indio, travels by car with their spouse, savors sunrise at Cerro del Morro, and dreams
    of occasional mainland museum trips, all while carefully budgeting for modest travel expenses.
  culinary: Yadira Munoz delights in preparing classic island dishes like mofongo, pasteles, and arroz con gandules, skillfully uses fresh herbs—cilantro, culantro, and oregano—from their tropical garden,
    enjoys occasional over‑garnishing of plates with extra parsley, and shares family recipes through digital photo‑albums with relatives.
  core: Yadira Munoz is a reflective, art‑loving retiree who blends meticulous bookkeeping with a relaxed curiosity, tending a herb garden, mastering watercolor, savoring traditional island flavors, and
    quietly mentoring community volunteers while strolling solitary coastlines.
background:
  cultural: Yadira’s identity is rooted in her Puerto Rican heritage, marked by a blend of Spanish colonial, Taíno indigenous, and Afro‑Caribbean influences. She grew up celebrating Catholic traditions,
    participating in fiestas patronales, and partaking in community dances that feature bomba and plena rhythms. The Spanish language is central to her daily life, while she also maintains a functional
    command of English from her formal education. Family ties are paramount, and she upholds the island’s strong sense of community by sharing food, stories, and cultural practices with neighbors and local
    organizations.
