personas:
  professional: Audeliz Arroyo is a budding community organizer and aspiring nursing assistant who leverages bilingual fluency, strong organizational skills, and a love for teamwork to coordinate youth
    events and school projects while preparing for a nursing career.
  sports: Audeliz Arroyo is a weekend soccer enthusiast who plays midfield for a local youth league affiliated with San Antonio FC's community program, regularly watches San Antonio FC games, and maintains
    fitness through daily jogs and dance practice, reflecting their energetic and team-oriented nature.
  arts: Audeliz Arroyo blends cultural pride with humor in short TikTok videos set to cumbia, bachata, and Tejano hits from artists like Selena and Los Tigres del Norte, while also dancing at community
    festivals, reading teen novels by Angie Thomas and John Green, and attending local art walks, underscoring a vibrant creative spirit.
  travel: Audeliz Arroyo prefers short, budget-friendly trips that combine cultural immersion and family visits, such as weekend road trips to the Hill Country vineyards, annual trips to the historic town
    of San Miguel de Allende, and local explorations of San Antonio's River Walk and Fiesta de San Antonio, balancing adventure with financial prudence.
  culinary: Audeliz Arroyo enjoys cooking family recipes like tamales and pozole, often experimenting with chilies such as pasilla and ancho, while also mastering quick teen-friendly meals like tacos al
    pastor, and they proudly share cooking tutorials on TikTok, reflecting a hands-on, community-oriented approach to food.
  core: Audeliz Arroyo is a structured yet socially vibrant teen who fuses bilingual leadership, cultural dance, soccer, and community cooking into a purposeful path toward nursing and outreach, all while
    juggling a balanced budget and managing mild health quirks.
background:
  cultural: Audeliz comes from a Mexican‑American family rooted in San Antonio’s vibrant bicultural community. She grew up speaking Spanish at home and English at school, celebrating traditions such as
    Día de los Muertos, Cinco de Mayo, and the city’s annual Fiesta. Family gatherings centered around homemade Mexican cuisine and Catholic observances have instilled strong values of familismo, respect,
    and community service. The local Tejano music scene, community churches, and neighborhood festivals have shaped her identity and fostered her commitment to giving back to the Mexican‑American community.
