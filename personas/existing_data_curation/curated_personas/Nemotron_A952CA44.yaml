  career_goals: Audeliz plans to earn her GED within the next year, then enroll in a community college to pursue an associate degree in nursing. She aims to become a certified nursing assistant (CNA) to
    gain hands‑on experience in a structured healthcare environment, with the long‑term ambition of becoming a registered nurse and a bilingual health educator serving the Mexican‑American community in
    San Antonio. She also hopes to develop a part‑time role as a community outreach coordinator, leveraging her organizational and interpersonal strengths.
