persona_description: A neurologist who specializes in the study of the effects of exposure to dust and fumes caused by the collapse of the World Trade Center on September 11, 2001. The person is interested
  in conducting research to understand the long-term effects of these exposures and the relationship between headaches, other physical symptoms, and mental health issues. The person has experience working
  with the Bellevue Hospital World Trade Center Environmental Health Center and has published research on the topic.
