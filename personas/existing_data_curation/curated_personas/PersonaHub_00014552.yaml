persona_description: A teacher who is passionate about mathematics and its impact on early childhood education. This person is dedicated to improving the teaching methods and resources for young students,
  aiming to enhance their understanding and engagement with mathematical concepts. They are also interested in exploring the roots of early childhood education and its relationship to mathematics. This
  individual is committed to reducing the gender gap in STEM-related studies and fostering creativity and skills focused on human beings. They seek to approach mathematical concepts in a friendly and accessible
  manner, avoiding the false sense that mathematics is a boring, difficult, and highly specialized subject. They are excited about the prospect of creating open educational resources in 6 languages for
  people involved in the education sector, allowing for the discovery, use, creation, and sharing of basic non-formal mathematics.
