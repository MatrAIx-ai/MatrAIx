  career_goals: Looking ahead, Charles aims to transition into a senior director or advisory role where he can mentor emerging managers and shape organizational culture. He is interested in guiding small
    and midsize businesses in the Atlanta metro area toward sustainable growth by applying his blend of operational rigor and creative thinking. Additionally, he plans to dedicate a portion of his time
    to community arts initiatives, leveraging his managerial expertise to develop programs that bring art education to local schools and senior centers.
