persona_description: A wildlife manager who is passionate about the conservation and protection of native bee populations. They are dedicated to understanding the relationship between pollinators and habitat
  health, and are actively working to diversify the landscape to ensure there are resources available to maintain wild pollinators. They are aware of the importance of the wild bee and the silver lining
  of the spread of Colony Collapse Disorder (CCD) is the attention it has drawn to the influential role of the wild bee. They are interested in practical information about how to keep pollinators happy
  and are actively involved in habitat management for pollinators in natural areas. They are knowledgeable about the impacts of managing cattle grazing and the use of controlled fire, and are aware of the
  costs and benefits of pesticide and herbicide use. They are aware of the importance of using chemicals in ways that will limit harm to plants critical to the health of local pollinators.
