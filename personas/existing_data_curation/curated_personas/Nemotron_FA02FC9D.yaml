  career_goals: Michael aims to graduate high school and pursue a degree in communications or psychology at a community college. His long‑term ambition is to blend his sociable nature and creative storytelling
    into a career as a community outreach coordinator or social‑media strategist for a nonprofit focused on mental‑health awareness. He hopes to use his platform to organize youth events in Rockford, providing
    safe spaces for peers who experience anxiety or sadness, and eventually mentor younger students on emotional wellbeing and effective communication.
