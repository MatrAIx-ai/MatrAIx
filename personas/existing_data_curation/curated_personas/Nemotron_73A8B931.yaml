  hobbies: '[''Reading (fiction and self‑help)'', ''Cooking family recipes'', ''Community gardening'', ''Volunteering at food pantry'', ''Journaling'', ''Yoga / mindfulness'', ''Listening to soul and jazz
    music'', ''Crocheting'', ''Walking in local parks'', ''Church choir participation'']'
  career_goals: Walidah aims to obtain her GED within the next year and enroll in a community‑college program focused on social work or public health. She aspires to become a certified nursing assistant
    or community health worker, roles that let her combine her compassion with practical help for underserved populations. Long‑term, she hopes to work as a case manager or peer‑support specialist, providing
    mentorship to young people in her neighborhood. She also seeks to develop personal resilience and stress‑management tools so she can sustain a stable, fulfilling career while maintaining her well‑being.
