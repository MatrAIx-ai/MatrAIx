personas:
  professional: Eliot Mccormick is an aspiring visual storyteller who merges comic strip creation with short tablet animations, channeling their museum‑inspired curiosity and balanced organization into
    disciplined sketch sessions while their competitive spark drives them to enter local art contests.
  sports: Eliot Mccormick is a basketball enthusiast who practices jump shots at the community park, cheers for the Denver Nuggets, rides with the 'Rocky Ridge Rollers' skate crew at the local skatepark,
    and joins family hikes in the Rockies for seasonal fitness.
  arts: Eliot Mccormick is a frequent explorer of the Denver Art Museum, drawing inspiration from Kehinde Wiley’s vibrant murals and Shaun Tan’s graphic storytelling, while their playlist loops indie rock
    bands like Tame Impala and The Strokes as they sketch comic panels and dabble with simple beats on a beginner drum pad.
  travel: Eliot Mccormick loves family road trips that thread through the awe‑inspiring trails of Rocky Mountain National Park and weekend escapes to Vail, while dreaming of a future pilgrimage to Tokyo’s
    Akihabara district for anime immersion, all balanced against a school calendar that limits extended travel.
  culinary: Eliot Mccormick enjoys the creative crossover of baking chocolate‑chip cookies with a pinch of sea‑salt, mastering homemade pepperoni pizza crusts, and whimsically topping desserts with crushed
    LEGO‑shaped sugar cookies, showcasing moderate cooking skill that mixes favorite ingredients like cocoa, cheese, and fresh basil.
  core: Eliot Mccormick is a curiosity‑driven, art‑obsessed 12‑year‑old who balances competitive energy with a love for community, turning sketchbooks, skateboards, and cookie dough into tools for endless
    self‑expression.
background:
  cultural: Eliot is a white American growing up in Littleton, Colorado, a suburban community within the Denver metropolitan area. His family traces its roots to Irish and German ancestors and lives in
    a middle‑class household that emphasizes education, outdoor recreation, and cultural enrichment. He attends the Littleton Public Schools district, where curricula integrate both STEM and the arts, and
    he participates in community programs such as the Littleton Art & Bizarre Festival and workshops at the Denver Museum of Nature & Science. Seasonal traditions include Thanksgiving, Christmas, and Fourth
    of July celebrations, often accompanied by family hikes in the Rocky Mountains or weekend ski trips. Exposure to local Native American exhibits and multicultural school events has broadened his appreciation
    for diverse artistic expressions while his suburban upbringing fosters a strong sense of community and self‑reliance.
