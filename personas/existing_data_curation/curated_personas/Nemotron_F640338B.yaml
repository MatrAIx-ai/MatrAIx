  career_goals: Eliot envisions a future where his love for visual storytelling and technology intersect. In the short term, he aims to win his middle‑school science fair with an interactive art installation
    that blends simple coding, sensors, and multimedia. Over the next few years, he hopes to launch a YouTube channel that produces short animated videos explaining scientific concepts in a creative, artistic
    way. Ultimately, he aspires to become a multimedia artist or independent game designer, possibly founding his own studio that creates educational games and interactive experiences that push artistic
    boundaries and reach a wide audience.
