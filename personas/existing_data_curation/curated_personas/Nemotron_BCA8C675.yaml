  career_goals: Sanjay aims to first earn his GED and enroll in a community college computer‑science program, then transfer to a four‑year university to study software engineering. He dreams of becoming
    a full‑stack developer, with a long‑term goal of launching his own indie game studio that creates culturally resonant titles for both Western and South‑Asian audiences. He is also motivated by the desire
    to achieve financial stability for his family and eventually mentor younger members of his community in tech skills.
