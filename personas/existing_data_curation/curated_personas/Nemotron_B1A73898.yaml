  career_goals: Carl dreams of turning his love for nature and technology into a future career as a wildlife biologist or an environmental engineer, where he can devise practical solutions to protect local
    habitats. He also imagines working in robotics or video‑game design, combining his curiosity about how things work with creative storytelling. In the near term, he hopes to lead his school’s green club,
    organize community clean‑ups, and eventually coach a youth soccer team, all while continuing to develop his coding and engineering skills.
