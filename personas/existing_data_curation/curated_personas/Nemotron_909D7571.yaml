  career_goals: Mandeep aims to advance to plant director within the next five years, leveraging a Six Sigma Black Belt and an MBA or master’s in industrial engineering to deepen his strategic expertise.
    He is committed to championing sustainable production practices that blend efficiency with artistic design elements, and to creating a workplace culture that prioritizes employee well‑being and mental
    health. Long‑term, he aspires to transition into a consultancy role where he can help other manufacturers embed creativity, environmental responsibility, and inclusive leadership into their operations.
