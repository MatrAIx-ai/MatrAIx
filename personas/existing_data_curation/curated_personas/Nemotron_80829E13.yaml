  career_goals: Even at six, Kimberly imagines a future where she works closely with animals and nature. She dreams of becoming a wildlife biologist or veterinarian, fascinated by how living creatures live
    and heal. She also expresses a gentle desire to be a teacher who can share knowledge in a calm, organized classroom, helping other children learn and feel safe. Her practical side leads her to think
    about studying science and using her curiosity to solve real‑world problems, while her compassionate side hopes to support others who feel anxious or sad.
