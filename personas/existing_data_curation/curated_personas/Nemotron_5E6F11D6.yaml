personas:
  professional: Raymond Argabright, a 19‑year‑old front‑end developer with a flair for visual storytelling, blends React and Vue expertise with p5.js generative art to craft immersive web experiences, channeling
    their boundless imagination into meticulously organized codebases while thriving in the solitude of personal projects.
  sports: Raymond Argabright, an avid solitary hiker and occasional weekend climber at the San Diego Rock Gym, follows the San Diego Padres for spring baseball, keeps track of the LA Lakers during the NBA
    season, and roots for the San Diego Wave in women’s soccer, preferring low‑key cardio on coastal trails over organized team sports while maintaining a personal fitness log in a Notion board.
  arts: Raymond Argabright, whose evenings are spent curating a personal online gallery that showcases generative pieces inspired by Refik Anadol and Beeple, regularly attends intimate indie art shows at
    San Diego’s Museum of Contemporary Art and local maker meetups, while drawing acoustic inspiration from Tame Impala and visual admiration for the surreal paintings of Yayoi Kusama, ultimately letting
    these influences shape their own digital illustrations and experimental guitar riffs.
  travel: Raymond Argabright, a low‑budget solo traveler, has trekked the Grand Canyon’s rim, explored Kyoto’s historic temples, and attended a creative‑coding meetup in Berlin, and now dreams of chasing
    the northern lights in Iceland and hiking Patagonia’s Torres del Paine, preferring meticulously planned itineraries on Notion to spontaneous spur‑of‑the‑moment flights, while balancing limited savings
    with occasional student‑discount travel grants.
  culinary: Raymond Argabright, a self‑taught home chef, regularly experiments with eclectic dishes such as kimchi‑taco bowls, miso‑infused ramen, and za'atar‑spiced grilled halloumi, mastering the art
    of balancing umami and spice while often improvising with fresh basil from their balcony garden and documenting each plate with carefully composed food photography.
  core: Raymond Argabright, a 19‑year‑old digital alchemist, merges code and canvas in solitary bursts of creativity, balancing meticulous organization with spontaneous artistic experiments, all while occasionally
    neglecting sleep for late‑night coding marathons and forgetting to water their houseplants.
background:
  cultural: Raymond grew up in Chula Vista, a multicultural suburb of San Diego, within a family of European‑American (Irish‑Italian) heritage. The Southern California environment exposed him to a blend
    of laid‑back beach culture, the region’s vibrant tech startup scene, and the rich Mexican‑American influences of the border region. He embraces the local emphasis on creativity, outdoor recreation,
    and community diversity, often enjoying Mexican cuisine, local music festivals, and the collaborative spirit of small tech meetups. His cultural identity is rooted in mainstream American values of individualism
    and innovation, while also appreciating the multicultural tapestry that surrounds him.
attributes:
  skills: '["HTML5", "CSS3", "JavaScript (ES6+)", "React", "Vue", "Node.js", "Express.js", "Git", "Responsive Design", "Figma (UI/UX Prototyping)", "Adobe Photoshop", "Adobe Illustrator", "p5.js", "Three.js",
    "WCAG Accessibility", "API Integration", "Kanban (Agile)"]'
  hobbies: '["Digital illustration", "Generative art coding (p5.js, Three.js)", "Reading speculative fiction & philosophy", "Playing acoustic guitar", "Photography (urban & nature)", "Hiking coastal trails",
    "Strategy board games (Chess, Terraforming Mars)", "Attending indie art shows", "Experimenting with cooking", "Participating in online creative coding communities"]'
  career_goals: Raymond aspires to become a lead front‑end engineer or interactive experience designer at a forward‑thinking tech company where art and technology intersect. Over the next few years he plans
    to complete his degree in Computer Science/Interactive Media, deepen his expertise in WebGL, AR/VR, and performance‑optimized progressive web apps, and build a portfolio of immersive web installations
    for galleries and cultural institutions. He envisions launching a freelance studio that creates custom, generative web experiences for indie artists, museums, and non‑profits, while contributing to
    open‑source creative‑coding projects. Long‑term, he hopes to mentor junior developers, speak at design‑tech conferences, and shape the next wave of web‑based digital art.
