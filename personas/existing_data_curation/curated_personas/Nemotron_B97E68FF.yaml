personas:
  professional: Bryan Wentworth is a budding LEGO architect who thrives on constructing intricate builds and programming redstone circuits in Minecraft, channeling their love for structure and predictability
    while balancing the occasional disarray of an unplanned play session.
  sports: Bryan Wentworth joins the Northside Youth Soccer Club, proudly wearing the number 10 jersey for the local park games, while also cheering for Manchester United, and balances structured practice
    drills with spontaneous kick-around games to burn off excess energy.
  arts: Bryan Wentworth devotes weekends to sketching comic strips inspired by Spider-Man and the fantastical worlds of J.K. Rowling, while listening to tunes from Billie Eilish and performing piano pieces
    at church youth group gatherings.
  travel: Bryan Wentworth loves family road trips to the Grand Canyon and the Great Smoky Mountains, dreams of visiting the Wizarding World of Harry Potter in Orlando, and prefers itineraries with clear
    landmarks but leaves room for impromptu LEGO scavenger hunts at rest stops.
  culinary: Bryan Wentworth favors pepperoni pizza, mac and cheese, and chocolate chip cookies, often assembling mini-pizza bites for after-school snacks, yet secretly raids the pantry for hidden gummy
    bears when stress hits.
  core: Bryan Wentworth blends a love for structured LEGO building and fantasy storytelling with a tender heart that often wrestles with anxiety, leading to occasional impulsive snack raids and a penchant
    for spontaneous soccer sprints.
background:
  cultural: Bryan is a white boy growing up in Starkville, Mississippi, a small‑city environment within Monroe County. His family has deep roots in the Southern United States, emphasizing community ties,
    hospitality, and a strong sense of regional pride. Local traditions such as Friday night high school football, church gatherings, and seasonal festivals are part of his upbringing. He often enjoys Southern
    comfort foods like fried chicken and biscuits at family gatherings, and he speaks with a gentle Southern accent typical of the area. The community values kindness, cooperation, and support for one another,
    which aligns with Bryan’s own considerate and collaborative personality.
