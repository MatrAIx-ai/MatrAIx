  career_goals: Bryan dreams of a future where he can help people and work in a structured, team‑oriented environment. He often talks about becoming a firefighter because it blends clear procedures, community
    service, and the excitement of teamwork. He also imagines himself as a park ranger or a teacher, roles that involve caring for nature or guiding younger kids, which align with his kind, cooperative
    nature and desire for predictable, purpose‑driven work. His immediate ambition is to earn good grades, improve his reading speed, and master more complex LEGO builds, building a foundation for his long‑term
    goals.
