personas:
  professional: Francis Kelly, a 52-year-old automotive body specialist with three decades of panel-beating, precision welding, and custom paint artistry, leverages their vivid imagination and love of novelty
    to blend technical repairs with artistic finishes, while their relaxed, sometimes disorganized approach occasionally delays project timelines, yet their cooperative demeanor and talent for mentoring
    junior technicians keep the vision of a boutique, eco-friendly auto-body studio alive.
  sports: Francis Kelly, a 52-year-old auto-body aficionado, follows the New York Yankees and Brooklyn Nets, participates in a weekly Sunday pick-up basketball game at a community center, rides a vintage
    road bike along the Hudson River Greenway for cardio, and attends classic-car rallies as a spectator, preferring a flexible, low-key fitness routine over regimented gym sessions.
  arts: Francis Kelly, a 52-year-old oil painter and street-photographer, captures gritty NYC alleyways and gleaming vintage automobiles, frequents jazz clubs to hear the improvisations of John Coltrane
    and Miles Davis, immerses themselves in speculative fiction by authors such as William Gibson and Neal Stephenson, and translates these visual and narrative inspirations into custom car graphics and
    handcrafted furniture.
  travel: Francis Kelly, a 52-year-old automotive enthusiast, favors spontaneous road trips in his restored 1965 Mustang, having already driven the Pacific Coast Highway to San Francisco, toured Detroit’s
    Henry Ford Museum, and explored the culinary labyrinth of Queens, while their flexible planning often leaves lodging to the last minute, resulting in a mix of adventure and occasional scramble for a
    place to stay.
  culinary: Francis Kelly, a 52-year-old culinary experimenter, delights in crafting homemade gnocchi with ricotta and spinach, smoking brisket with a coffee-bean rub, and exploring the flavors of New York’s
    Asian bodegas with spicy ramen bowls, often pairing meals with Malbec or a crisp Sauvignon Blanc while sketching car designs on napkins.
  core: Francis Kelly, a 52-year-old auto-body master with an artistic soul, blends meticulous craftsmanship, spontaneous creativity, and a laid-back, community-focused lifestyle into everything from custom
    car restorations to oil paintings.
background:
  cultural: Francis grew up in a middle‑class neighborhood of New York City, the son of parents who migrated from the Midwest with Anglo‑American roots. His upbringing reflects a blend of working‑class
    values—hard work, reliability, and community solidarity—and the vibrant, multicultural tapestry of the city. While his family traditions emphasize practicality and modesty, Francis is also drawn to
    the artistic dynamism of New York, from street art to jazz clubs, shaping a outlook that balances tradition with a curiosity for novelty and creative expression.
