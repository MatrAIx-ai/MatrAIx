  career_goals: Francis aspires to transition from employee to owner‑operator by opening a boutique auto‑body studio that emphasizes artistic customizations alongside high‑quality repairs. He aims to incorporate
    new technologies such as 3D‑printed replacement parts and eco‑friendly paint systems. Pursuing advanced ASE certifications and a Master Craftsman credential would solidify his technical credibility.
    Long‑term, he hopes to mentor the next generation of body shop professionals, create a community hub for car enthusiasts, and perhaps publish a guide on blending automotive repair with artistic expression.
