personas:
  professional: Edoardo Moody is a veteran welder and decorative metal artist who leverages four decades of MIG, TIG, and Stick welding mastery to produce custom sculptures for local businesses while informally
    mentoring apprentices, despite a habit of leaving tools scattered and a relaxed attitude toward formal schedules; they plan to transition to part‑time consultancy and pursue a Master Welder certification.
  sports: Edoardo Moody is a loyal fan of the Philadelphia Eagles and Philadelphia 76ers, enjoys occasional pick‑up basketball at the West Philadelphia community center and weekend walks on the Schuylkill
    River Trail, and although they never adhere to a strict workout regimen, they keep fit enough to lift heavy metal pieces without undue strain.
  arts: Edoardo Moody frequents the Philadelphia Museum of Art, draws creative fuel from the city's vibrant murals, spins classic jazz records by Miles Davis, John Coltrane, and Aretha Franklin on a vintage
    turntable, and sketches metal‑art concepts inspired by both contemporary sculptors like Ai Weiwei and local muralist Stephanie Richards, blending visual and auditory influences into each piece.
  travel: Edoardo Moody prefers spontaneous road trips over meticulously planned vacations, has explored the historic jazz clubs of New Orleans, the colonial charm of Savannah, and the rolling farmlands
    of Lancaster, while dreaming of a pilgrimage to Palermo to taste Sicilian cuisine, yet their limited retirement savings keep trips short and often centered around nearby cultural destinations.
  culinary: Edoardo Moody is an avid home cook who masters soul‑food staples such as smoked collard greens, fried catfish, and shrimp‑and‑grits while experimenting with Italian bruschetta topped with fresh
    basil and tomatoes, skillfully using smoked paprika, okra, and black‑eyed peas, though they occasionally over‑salt the gumbo when absorbed in a new welding project.
  core: Edoardo Moody blends four decades of welding expertise with a restless curiosity for jazz, murals, and soul food, juggling a slightly chaotic schedule, a skeptical eye toward commitments, and a
    heartfelt drive to mentor the next generation of metal artisans.
background:
  cultural: 'Edoardo is an African‑American who grew up in the historic North Philadelphia working‑class neighborhoods, where trade skills and community solidarity were highly valued. His family’s roots
    trace back to the Great Migration, and he was raised amid the rich musical, culinary, and artistic traditions of the city’s Black community—including gospel, jazz, and soul food. Exposure to Philadelphia’s
    vibrant mural and public‑art programs sparked his appreciation for visual creativity, while his mixed‑heritage name reflects a family history that includes Italian influences from his paternal side.
    The combination of these cultural currents has shaped his worldview: a deep respect for craftsmanship, a resilient optimism tempered by the realities of systemic inequities, and a commitment to giving
    back through mentorship and community‑focused art.'
attributes:
  skills: '["MIG welding", "TIG welding", "Stick welding", "High-temperature brazing", "Precision soldering", "Blueprint interpretation", "Metal fabrication and repair", "Welding equipment maintenance",
    "OSHA safety compliance", "Metallurgy basics", "Decorative metal art", "Apprentice mentorship", "Troubleshooting and problem solving"]'
  hobbies: '["Visiting art museums and mural tours", "Reading science, history, and philosophy books", "DIY electronics projects", "Walking in Fairmount Park", "Listening to jazz on vinyl", "Cooking soul-food
    dishes", "Sketching metal-art designs", "Building small metal models", "Participating in community art workshops"]'
  career_goals: Edoardo aims to transition from full‑time shop work to a flexible, part‑time consultancy that allows him to focus on his passion for metal artistry. He plans to open a modest studio in West
    Philadelphia where he will produce custom metal sculptures for local businesses, public spaces, and private collectors. He also seeks to achieve the American Welding Society Master Welder certification,
    which would formalize his expertise and provide credibility for teaching workshops at the community college. Over the next five years, he hopes to mentor at least three young apprentices, secure a steady
    stream of commission work, and establish a modest retirement fund that reduces financial stress.
