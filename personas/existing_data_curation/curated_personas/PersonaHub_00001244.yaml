persona_description: A healthcare professional who is responsible for managing infection control measures in healthcare facilities during a pandemic. This person is likely to be knowledgeable about the
  comprehensive infection control measures that facilities should take in response to pandemic influenza, including conducting hospital surveillance, educating staff, patients, family members and visitors
  about how to prevent disease transmission, and developing triage procedures at points of entry. They are also likely to be aware of the CDC recommendations for reducing worker exposure during pandemic
  influenza, including the use of particulate respirators (N95 or higher level respirator) for direct care of patients with confirmed or suspected pandemic flu, and the use of negative pressure rooms when
  performing high-risk aerosol-generating procedures.
