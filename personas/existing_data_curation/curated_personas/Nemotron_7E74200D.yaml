  hobbies: '[''Visiting art museums and galleries'', ''Art collecting (early 20th‑century American paintings)'', ''Attending symphony and theatre performances'', ''Reading biographies and art history'',
    ''Playing chess'', ''Rooftop gardening'', ''Cooking Italian cuisine'', ''Traveling to European cultural capitals'', ''Mentoring university students'', ''Volunteering on community boards'']'
  career_goals: Even at 88, Sam is driven to cement a legacy that blends business acumen with cultural stewardship. He aims to mentor the next generation of CEOs, guiding them toward ethical, sustainable
    leadership. Sam plans to expand his philanthropic footprint by establishing a foundation that funds emerging Chicago artists and provides scholarships for under‑privileged students interested in the
    arts and business. He also intends to serve on the boards of several non‑profit cultural institutions, championing programs that promote mental‑health awareness for executives. Writing a memoir that
    chronicles his corporate journey, personal challenges, and love for the arts is another ambition, allowing him to share lessons learned and inspire both business and creative communities.
