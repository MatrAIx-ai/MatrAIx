    ''Community outreach'', ''Creative problem solving'', ''Time management'', ''Adaptability'']'
  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Hiking local trails'', ''Baking pies and cookies'', ''Quilting'', ''Yoga and meditation'', ''Volunteering at the food bank'', ''Participating
    in church choir'', ''Photography of Missouri landscapes'', ''Playing the ukulele'']'
  career_goals: Emily aims to advance from classroom teacher to instructional coach, leveraging her compassionate approach to mentor new educators and lead school‑wide initiatives on social‑emotional learning.
    She plans to pursue a master's degree in Educational Leadership to eventually become a curriculum coordinator or principal, where she can shape policies that promote equity and harmony. In the short
    term, she hopes to lead a grade‑level team, develop an after‑school reading program, and present her classroom practices at state conferences, all while maintaining a balanced family life.
