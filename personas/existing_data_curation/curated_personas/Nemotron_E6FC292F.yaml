personas:
  professional: Nicole Johnson is a senior electrical and electronics engineer who applies their mastery of power electronics, embedded systems, and signal processing to create ultra‑efficient renewable‑energy
    converters, while their meticulous, organized approach and vivid imagination drive the integration of kinetic‑art installations into technical prototypes, positioning them for a future as a principal
    engineer, patent holder, and technical leader.
  sports: Nicole Johnson enjoys a disciplined fitness routine that includes early‑morning runs with the Cypress Creek Trail running club, weekend yoga at a local studio, a seasonal membership at the Houston
    Country Club for nine‑hole golf, and they passionately cheer for the Houston Astros in baseball, the Houston Texans in football, and follow the Dallas Mavericks for basketball.
  arts: Nicole Johnson channels their artistic flair into kinetic sculptures inspired by Olafur Eliasson and digital paintings echoing James Turrell, while they draw narrative inspiration from Octavia Butler,
    curate playlists featuring Brian Eno’s ambient soundscapes, regularly attend gallery openings spotlighting Texas mixed‑media artists, and participate in the monthly DIY electronics art meetup.
  travel: Nicole Johnson prefers meticulously planned trips that balance professional curiosity and personal rejuvenation, favoring weekend getaways to Austin’s maker festivals, an annual research tour
    of solar installations in Freiburg, Germany, a dream visit to Iceland’s geothermal fields, and occasional family outings to Costa Rica’s rainforest reserves, all while traveling with a modest budget
    and focusing on small‑group experiences.
  culinary: Nicole Johnson enjoys cooking at a moderate skill level, favoring smoky Texas brisket, Gulf shrimp étouffée seasoned with paprika and cayenne, fresh heirloom tomato salads drizzled with basil‑infused
    olive oil, experimenting with matcha‑infused desserts, and brewing homemade kombucha flavored with ginger and hibiscus, while their disciplined budgeting sometimes limits dining out to occasional visits
    to a favored local barbecue joint.
  core: Nicole Johnson is a meticulous engineer‑artist who balances exacting technical precision with a restless imagination, finding calm in yoga and chess while occasionally succumbing to anxiety‑driven
    impulsive component splurges.
background:
  cultural: Nicole grew up in a middle‑class suburban community near Houston, Texas, with deep ties to the regional oil and energy industry that inspired her engineering career. Her family’s cultural heritage
    is rooted in the Anglo‑American traditions of the South, emphasizing self‑reliance, modesty, and community involvement. While identifying as culturally white, she has been shaped by the multicultural
    environment of Harris County, engaging with Hispanic and African‑American neighbors through local farmers' markets and community festivals. Her marriage and long‑term residence in Katy reflect a stable,
    family‑centered lifestyle that values both professional achievement and personal well‑being.
