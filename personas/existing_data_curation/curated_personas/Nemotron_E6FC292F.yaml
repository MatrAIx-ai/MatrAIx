    (competitive)'', ''Gardening (landscape design)'', ''Yoga and meditation'', ''DIY electronics hobby projects'', ''Attending small art exhibitions'']'
  career_goals: Nicole aims to become a principal engineer and technical leader within her company, steering large‑scale sustainable energy projects and securing patents for novel power conversion technologies.
    She plans to earn her Professional Engineer (PE) license and a Six Sigma Black Belt to formalize her disciplined approach. Long‑term, she envisions launching a boutique consultancy that blends engineering
    with interactive art, offering custom installations for public spaces. Mentoring younger engineers and influencing regional renewable‑energy policy are also key ambitions, while maintaining a balanced
    lifestyle to manage her stress sensitivity.
