personas:
  professional: Max Green is a frontline housekeeping supervisor who blends meticulous staff scheduling and safety compliance with a flair for creative workflow design, constantly seeking to infuse public
    spaces with aesthetic touches while mentoring his crew toward greener cleaning practices.
  sports: Max Green is a devoted fan of the Indianapolis Colts and the Indiana Pacers, participates in a Saturday morning intramural soccer league, and hikes with the local “Hoosier Trailblazers” club during
    the fall, balancing team spirit with personal fitness.
  arts: Max Green explores the regional art scene by visiting the Indianapolis Museum of Art to study works by T.C. Steele and Robert Indiana, attending community theater productions such as ‘Our Town’
    at the local playhouse, and experimenting with photography inspired by Ansel Adams, all of which they channel into their own painting and DIY home‑improvement projects.
  travel: Max Green prefers road‑trip adventures in a reliable Subaru, planning weekend escapes to Brown County State Park for leaf‑peeping, a wine‑tasting weekend in Napa Valley, and a cultural pilgrimage
    to Munich’s Oktoberfest, balancing a modest travel budget with a love for spontaneous detours to quirky roadside attractions.
  culinary: Max Green enjoys crafting homemade pretzels and schnitzel for dinner parties, perfects their own hoppy IPA while experimenting with local hop varieties, and frequently cooks seasonal farm‑to‑table
    dishes featuring heirloom tomatoes, corn, and rosemary, though they often over‑season their sauces in the excitement of the moment.
  core: Max Green is a talkative, art‑loving facilities supervisor who balances meticulous cleaning standards with creative home projects, a love for craft beer, and a relentless curiosity that sometimes
    leads to over‑commitment.
background:
  cultural: Max grew up in a middle‑class, white family in rural Indiana, with deep German roots reflected in his surname. Family traditions include celebrating Oktoberfest, enjoying German cuisine like
    schnitzel and pretzels, and valuing punctuality and hard work. The Midwestern community ethos—friendliness, church involvement, and strong family ties—shapes his social interactions. His marriage and
    local community connections reinforce a sense of belonging and responsibility, while his cultural heritage subtly influences his appreciation for craftsmanship and organization.
