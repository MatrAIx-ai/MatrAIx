  career_goals: Max aims to advance to a facilities manager role within the next five years, overseeing larger operations and integrating innovative, eco‑friendly cleaning technologies. He plans to earn
    professional certifications such as the Certified Facility Manager (CFM) and to develop a mentorship program that cultivates leadership among entry‑level housekeeping staff. Long‑term, he envisions
    launching his own boutique cleaning consultancy that blends operational efficiency with aesthetic upgrades for commercial interiors.
