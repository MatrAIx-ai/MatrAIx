personas:
  professional: An experienced postsecondary instructor, Hiep Phom blends curiosity for innovative pedagogy with a practical, methodical approach to curriculum design, leveraging bilingual teaching strategies
    and platforms like Canvas to create culturally responsive courses while they assertively champion inclusive policies and mentor junior faculty.
  sports: An avid supporter of local teams, Hiep Phom roots for the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp, plays in a co‑ed recreational soccer league with the Jacksonville Armada FC alumni
    group, hikes the Timucuan Ecological and Historic Preserve each spring, and complements cardio with yoga sessions, though they sometimes neglect strength training.
  arts: Creative and camera‑savvy, Hiep Phom draws inspiration from street photographers like Vivian Maier and Henri Cartier‑Bresson, fills playlists with jazz pianist Brad Mehldau, indie folk band Fleet
    Foxes, and contemporary cinema by Bong Joon‑ho, and regularly attends a local book club where they debate narrative techniques while sharing their own photo series.
  travel: An organized explorer, Hiep Phom enjoys structured itineraries that weave cultural immersion with nature, having visited the lantern festivals of Hoi An, trekked Banff National Park's glaciers,
    and taken weekend road trips to Savannah, Georgia, they meticulously document each journey in a travel journal and aspire to photograph the rice terraces of Bali next year.
  culinary: Culinary enthusiast Hiep Phom expertly prepares aromatic phở broth, crispy bánh xèo, and fresh gỏi cuốn, thoughtfully layering flavors with star anise, kaffir lime leaves, Thai basil, and cilantro,
    while they experiment with homemade five‑spice blends and host monthly potluck dinners featuring dishes like lemongrass‑infused grilled chicken.
  core: Hiep Phom is a methodical educator, community‑focused advocate, and restless creative who balances disciplined planning with a love for cultural cuisine, photography, and wellness, yet they wrestle
    with persistent anxiety and occasional impulsive spending.
background:
  cultural: Hiep was born to Vietnamese immigrant parents who settled in the United States in the late 1970s. Growing up, she navigated a bicultural environment, speaking Vietnamese at home while attending
    American schools. This dual heritage instilled in her a deep respect for family ties, communal responsibility, and the value of education as a pathway to opportunity. Living in Jacksonville, she remains
    connected to the local Southeast Asian diaspora through cultural festivals, temple celebrations, and volunteer work at the Vietnamese Community Center. Her background informs her teaching philosophy,
    prompting her to embed multicultural perspectives into curriculum and to advocate for inclusive policies that support immigrant and first‑generation students.
attributes:
  skills: '[''Curriculum design'', ''Instructional technology integration'', ''Adult learning theory'', ''Bilingual instruction (Vietnamese/English)'', ''Student advising'', ''Academic assessment'', ''Grant
    writing'', ''Workshop facilitation'', ''Cross‑cultural communication'', ''Project management'', ''Faculty development'']'
  hobbies: '[''Cooking Vietnamese cuisine'', ''Community volunteering'', ''Yoga and meditation'', ''Hiking'', ''Photography'', ''Gardening'', ''Book clubs'', ''Social dancing'', ''Language exchange'']'
  career_goals: Hiep aims to become a department chair or program director for an international or multicultural studies program within the next five years, where she can shape strategic priorities and
    mentor junior faculty. She is seeking a multi‑year research grant to investigate retention and success factors for Southeast Asian immigrant students in community colleges. Additionally, she plans to
    launch a campus‑wide wellness initiative that equips faculty and students with practical stress‑management tools, reflecting her own experience with anxiety and her commitment to pragmatic solutions.
    Long‑term, she hopes to author a textbook on culturally responsive teaching practices that balances innovative ideas with proven, practical methods.
