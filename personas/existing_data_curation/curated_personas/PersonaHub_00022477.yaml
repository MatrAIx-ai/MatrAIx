persona_description: A scholar or practitioner who is interested in legal anthropology, legal sociology, legal history, comparative law, international law, transnational law, jurisprudence, and law and
  development scholarship, and seeks to understand and analyze the coexistence and implications of multiple forms of law in different contexts, including state law, international law, transnational law,
  customary law, religious law, indigenous law, and the law of distinct ethnic or cultural communities. They are interested in the historical development of legal pluralism, its origins in postcolonial
  countries, its manifestations within Western societies, its implications for contemporary transnational legal pluralism, and its problems with current theoretical accounts of legal pluralism. They are
  also interested in developing an approach to legal pluralism that avoids theoretical problems and is useful for social scientists, theorists, and law and development scholars and practitioners.
