  career_goals: Natalie dreams of becoming a teacher because she loves helping other children learn and feel supported. She is also fascinated by animals and imagines herself as a veterinarian one day,
    caring for pets and wildlife. In the future, she hopes to volunteer in community projects that bring her town together and make a positive difference for her neighbors.
