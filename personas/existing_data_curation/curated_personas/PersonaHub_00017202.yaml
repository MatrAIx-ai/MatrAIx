persona_description: A cardiologist who specializes in the study of sudden cardiac arrest, particularly the risk factors and prevention strategies for women. This persona is interested in the latest research
  findings on the differences in risk factors and outcomes for women and men, and how these differences may be related to differences in biology, genetics, and lifestyle factors. They are also interested
  in the potential impact of medications and drugs on the risk of sudden cardiac arrest and the need for caution when recommending these medications to high-risk patients, especially women.
