  career_goals: Although she is not currently in the paid workforce, Thu aims to deepen her involvement in community leadership by establishing a cultural heritage program for seniors at the La Puente Senior
    Center. She hopes to launch a monthly storytelling and cooking series that celebrates East Asian traditions while inviting participants to share their own experiences. Additionally, she plans to enroll
    in a community college course on nonprofit management to strengthen her ability to organize larger events and eventually mentor younger volunteers interested in cultural advocacy.
