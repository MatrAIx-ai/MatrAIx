  career_goals: John aims to transition into a regional construction management role where he can lead larger, multi-site projects and mentor the next generation of skilled tradespeople. He aspires to launch
    a consulting firm focused on improving safety standards and sustainable building practices in the Finger Lakes area. Over the next five years, he plans to earn advanced certifications (e.g., PMP, OSHA-Authorized
    Trainer), expand his professional network, and eventually take on a senior leadership position that merges his operational expertise with his passion for community development.
