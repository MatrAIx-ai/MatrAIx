personas:
  professional: Willoughby Vance, a seasoned Florida sales supervisor with over three decades of experience, channels their competitive drive and healthy skepticism into data‑driven client strategies while
    embracing a relaxed, flexible planning style that sometimes borders on disorganization.
  sports: Willoughby Vance keeps fit through early‑morning fishing outings on Lake Parker with the local senior fishing club, follows the Tampa Bay Buccaneers and Miami Heat with casual enthusiasm, and
    incorporates weekly walks with their church small‑group as low‑impact cardio.
  arts: Willoughby Vance expresses their creativity by crafting furniture inspired by Gustav Stickley, devouring Agatha Christie mysteries and David McCullough biographies, and winding down to the smooth
    jazz of Miles Davis and the folk storytelling of John Prine.
  travel: Willoughby Vance favors low‑key road trips to small‑town antique fairs in places like St. Augustine, FL and Asheville, NC, planning itineraries loosely around fishing seasons, while dreaming of
    a quiet weekend exploring the English Cotswolds to hunt for vintage woodworking tools.
  culinary: Willoughby Vance enjoys simple garden‑fresh meals such as heirloom tomato bruschetta with basil and oregano, often paired with a crisp Florida citrus‑infused white wine, though they occasionally
    indulge in a plate of shrimp étouffée at a beloved waterfront restaurant.
  core: Willoughby Vance is a competitive, curiosity‑driven retiree who blends solitary fishing, woodworking, and strategic chess with a habit of last‑minute bill payments and a lingering worry about market
    shifts.
background:
  cultural: Willoughby grew up in a middle‑class, white family in the central Florida region, absorbing the Southern‑influenced values of hospitality, self‑reliance, and modesty. His upbringing was shaped
    by a Protestant community that emphasized hard work, practical problem‑solving, and modest social rituals. Living his adult life in Lakeland, he appreciates the outdoors, local traditions, and a relaxed
    pace that balances curiosity about new ideas with respect for time‑tested methods. This cultural blend informs his pragmatic approach to work, his preference for small‑group interactions, and his understated
    yet competitive demeanor.
attributes:
