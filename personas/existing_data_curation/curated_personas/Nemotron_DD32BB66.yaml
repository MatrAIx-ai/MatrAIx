  hobbies: '[''Fishing'', ''Birdwatching'', ''Reading Historical Biographies'', ''Woodworking'', ''Antique Collecting'', ''Chess'', ''Gardening'', ''Community Volunteering'']'
  career_goals: Approaching retirement, Willoughby aims to transition from full‑time supervision to a part‑time advisory role where he can mentor emerging sales managers and help his current team adopt
    flexible, technology‑enhanced processes without abandoning the personal touch that has proven successful. He seeks to leave a lasting legacy of practical sales wisdom, ensure his department meets evolving
    market demands, and secure a lower‑stress work rhythm that supports his health and personal interests. Financial stability for his family and a gradual reduction of day‑to‑day obligations are central
    to his plan.
