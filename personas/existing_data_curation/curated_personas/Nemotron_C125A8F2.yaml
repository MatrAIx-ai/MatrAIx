  career_goals: Although still young, Joel dreams of turning his love of art and imagination into a future career. He often talks about becoming an illustrator for storybooks, designing the worlds of video
    games, or inventing playful gadgets that make people smile. He envisions a life where he can combine creativity with kindness, perhaps using art to bring joy to his community or to help others express
    their feelings.
