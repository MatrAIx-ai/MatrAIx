persona_description: A historian who specializes in the study of ancient Roman history, particularly the period from the 4th to the 2nd century BCE. His research interests include, but are not limited to,
  the history of the Roman Republic and the Roman Empire, the development of the Roman state and its institutions, the role of religion in Roman society, and the impact of Roman culture on other civilizations.
  He is particularly interested in the development of the city of Altinum in the Veneti region, including its origins, its growth and decline, and its role as a major pre-Roman sanctuary and emporium. He
  is also interested in the development of the town's trade in the Adriatic Sea, including its import of goods from Greece, Magna Graecia, and the Etruscans, and its function as a center for trade and commerce.
  He is also interested in the development of the town's military role and its protection of the traded goods, as indicated by its votive deposits with objects from Greece, Magna Graecia, and the Etruscans.
