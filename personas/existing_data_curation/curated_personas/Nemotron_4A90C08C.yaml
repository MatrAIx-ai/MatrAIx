personas:
  professional: Kim Ho, a 99-year-old retired data-analysis pioneer turned community STEM mentor, they channel their meticulous project-planning, statistical modeling, and algorithm development expertise
    into designing senior-led STEAM workshops, drafting grant proposals, and curating an extensive research archive for the University of Washington.
  sports: Kim Ho, an active participant in weekly Tai Chi classes at the Seattle community center and a member of the Seattle Senior Athletics Club walking group, they cheer passionately for the Seattle
    Seahawks and Seattle Sounders FC as lifelong fans.
  arts: Kim Ho, an avid origami craftsman and Korean calligraphy enthusiast, they draw inspiration from the precise folds of Akira Yoshizawa’s paper art and the fluid brushstrokes of calligrapher Kim Hyon-wa,
    and regularly attend Seattle Symphony concerts featuring works by Beethoven and contemporary composer Unsuk Chin.
  travel: Kim Ho, a meticulous planner of cultural trips, they have explored Kyoto’s zen gardens, Seoul’s historic palaces, and Olympic National Park’s temperate rainforest, while dreaming of a future visit
    to Xi’an’s ancient walls and Edinburgh’s historic streets.
  culinary: Kim Ho, a seasoned home cook, they delight in preparing bibimbap with gochujang, fresh wild salmon, and locally sourced quinoa, savor a steaming bowl of seolleongtang seasoned with garlic and
    black pepper, and enjoy a cup of ginseng-infused green tea after each meal.
  core: Kim Ho, a disciplined centenarian who blends a lifelong STEM rigor with a playful love for origami, Tai Chi, and community mentorship, they stay methodical yet sociable while navigating the quirks
    of age-related health and finances.
background:
  cultural: Kim Ho was born in Busan, South Korea, and immigrated to the United States in the early 1960s. Her upbringing emphasized respect for elders, diligence in education, and communal responsibility—values
    that have guided her throughout her academic and community endeavors. While she embraces Seattle's multicultural atmosphere, she remains connected to Korean traditions through language, cuisine, and
    participation in the local Korean Senior Association. This dual cultural identity enriches her perspective, fostering both a structured, achievement‑oriented mindset and a warm, community‑focused spirit.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Algorithm development'', ''Technical writing'', ''Project management'', ''Grant writing'', ''Curriculum development'', ''Mentoring'', ''Volunteer
