  hobbies: '[''Gardening'', ''Tai chi'', ''Origami'', ''Korean calligraphy'', ''Chess'', ''Crossword puzzles'', ''Volunteering as STEM speaker'', ''Attending Korean cultural festivals'', ''Museum visits'']'
  career_goals: Even at 99, Kim Ho remains focused on leaving a lasting impact. She plans to compile a memoir of her research experiences and donate her extensive archive of papers and code to the University
    of Washington. She is establishing a scholarship fund for first‑generation Asian women pursuing graduate studies in engineering, and she hopes to expand the senior‑led STEAM mentorship program she founded,
    ensuring that her structured, result‑driven approach continues to benefit future generations.
