  hobbies: '[''Gardening'', ''Baking Southern recipes'', ''Quilting'', ''Nature walking'', ''Church social events'', ''Community center volunteering'', ''Reading self-improvement books'', ''Listening to
    classic country music'', ''Journaling'', ''Puzzle solving'']'
  career_goals: Tatiana aims to advance to an office manager or executive assistant role within the next three to five years. She plans to complete an associate degree in business administration at a local
    community college and obtain a Certified Administrative Professional (CAP) credential. Her long-term ambition is to lead a small office team, improve workflow efficiency, and eventually mentor new reception
    staff while maintaining a stable work-life balance that supports her family.
