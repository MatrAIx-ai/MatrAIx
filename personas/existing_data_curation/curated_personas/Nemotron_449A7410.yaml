personas:
  professional: An aspiring event coordinator, Nini Bui leverages their structured planning, keen eye for detail, and vibrant public‑speaking flair to orchestrate community festivals, while their calm demeanor
    keeps volunteer teams on track and their sociable nature draws crowds.
  sports: A weekend hiker, Nini Bui joins a local club that explores the Santa Cruz Mountains, while cheering for the San Jose Sharks, the Golden State Warriors, and the San Jose Earthquakes, balancing
    casual fitness with group trail walks rather than rigorous gym routines.
  arts: A dynamic performer, Nini Bui shines in a cultural dance troupe that blends traditional festive dances with contemporary moves, frequently showcases karaoke renditions of classic pop ballads, and
    draws inspiration from artists such as BTS, Ariana Grande, and Son Tung M‑TP.
  travel: An eager explorer, Nini Bui prefers meticulously planned weekend getaways, often revisiting the historic streets of Hoi An for family recipe inspiration and dreaming of backpacking through the
    rice terraces of Banaue, while balancing school commitments and a modest budget.
  culinary: A passionate home cook, Nini Bui experiments with family recipes such as bánh chưng, pork adobo, and pho broth, skillfully balancing aromatic lemongrass and soy‑marinated flavors, and they love
    to host small dinner parties where these dishes are paired with fresh spring rolls and jasmine tea.
  core: Nini Bui is a structured, socially vibrant 19‑year‑old who merges cultural traditions with modern event‑planning zeal, juggling meticulous budgeting, community service, and a knack for karaoke‑powered
    networking, all while staying calm and resilient.
background:
  cultural: Nini is a second‑generation Vietnamese‑Filipino American. Her mother immigrated from Vietnam and her father from the Philippines, and they settled in San Jose where she was raised. She grew
    up speaking both Vietnamese and English at home, celebrating Vietnamese Tet and Filipino Christmas and fiestas with her extended family. The family remains actively involved in the local Asian community,
    attending events at the Vietnamese Community Center, participating in Filipino cultural festivals, and supporting the multicultural programming of the San Jose Public Library. This blended heritage,
    coupled with the diverse environment of Silicon Valley, shapes Nini’s values of family cohesion, respect for elders, and a deep appreciation for cultural traditions.
