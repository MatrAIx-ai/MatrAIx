  career_goals: Nini intends to pursue a bachelor’s degree in Communications or Hospitality Management, aiming to combine her love for organizing events with her talent for connecting people. She plans
    to secure internships at event‑planning firms or cultural organizations in the Bay Area to gain hands‑on experience. Her long‑term ambition is to become a lead event coordinator for multicultural festivals,
    eventually overseeing community outreach programs for a nonprofit that promotes Southeast Asian cultural awareness. Alongside this, she hopes to develop leadership skills that enable her to mentor younger
    students and possibly launch a social‑enterprise that offers affordable event‑planning services for community groups.
