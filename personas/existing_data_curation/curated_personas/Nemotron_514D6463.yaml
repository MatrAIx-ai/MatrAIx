personas:
  professional: Rita Mccaskill, a retired community cultural organizer, they channel their methodical planning and competitive spirit into leading intergenerational art workshops, curating local exhibitions,
    and mentoring volunteers at the De Pere library, all while applying their public-speaking confidence and basic digital skills to amplify community engagement.
  sports: Rita Mccaskill supports the Green Bay Packers with steadfast loyalty, joins a local senior bowling league every Thursday night, volunteers as a scorekeeper for the community's summer softball
    tournament, and they participate in low-impact walking clubs to stay active while satisfying their competitive nature.
  arts: Rita Mccaskill immerses themselves in the visual arts, and they paint watercolors of prairie landscapes inspired by Andrew Wyeth, curate community shows featuring regional folk artist Grandma Moses,
    study Ansel Adams' photography, and quilt intricate patterns that echo traditional Midwestern folk motifs.
  travel: Rita Mccaskill enjoys weekend road trips to historic sites such as Gettysburg and the German-heritage town of Hermann, Missouri, and they dream of a summer pilgrimage to the Rijksmuseum in Amsterdam
    and the Hallstatt salt mines, and always plan trips months ahead to fit their budgeting and volunteer schedule.
  culinary: Rita Mccaskill delights in cooking garden-fresh heirloom tomatoes into a caprese salad with mozzarella and basil, perfecting a Sunday pot roast with carrots and potatoes, and hand-rolling pierogi
    stuffed with sauerkraut and cheese, and they often pair meals with a cold locally brewed craft beer.
  core: Rita Mccaskill blends Midwestern practicality with boundless curiosity, orchestrating community art projects, meticulous budgeting, and a lively social calendar - though they sometimes fall prey
    to over-planner fatigue and occasional splurges on museum tickets.
background:
  cultural: Rita was raised in a Midwestern white family of German‑Scandinavian ancestry in Wisconsin. Her upbringing emphasized community involvement, church participation, self‑reliance, and a respect
    for education and the arts. Growing up during the post‑World War II boom, she internalized a practical, methodical approach to life, while the social changes of the 1960s sparked a lifelong curiosity
    about new ideas and unconventional thinking. The strong volunteer tradition of the Upper Midwest and the region’s appreciation for local history continue to shape her values and activities.
