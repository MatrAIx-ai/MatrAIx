  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Quilting'', ''Reading historical biographies'', ''Genealogy research'', ''Traveling to historic sites'', ''Book club participation'', ''Volunteering
    as a library docent'', ''Gardening'', ''Community theater workshops'']'
  career_goals: Although retired from formal employment, Rita aims to deepen her impact on De Pere’s cultural life. She aspires to lead an intergenerational art program that pairs seniors with local students,
    produce a community oral‑history series documenting the county’s Midwestern heritage, and serve on the board of the local historical society. Rita also hopes to complete her college degree in art history,
    write a memoir that intertwines her family’s genealogy with regional history, and raise funds for a small museum wing dedicated to local artists. Her ambitions blend her competitive drive with her desire
    to leave a lasting, organized legacy.
