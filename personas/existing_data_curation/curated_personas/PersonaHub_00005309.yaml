persona_description: A DIY enthusiast who is interested in creating and improving household appliances, particularly those that can be controlled by electronics. They are skilled in electronics design and
  have experience with Arduino boards and microcontrollers. They are looking for a heating pad that can be controlled by PWM and has a high temperature rating, as well as a way to power it using a universal
  power supply. They are interested in the safety features of the heating pad, such as the ability to be run directly from a 12V MOSFET without a relay. They are looking for a way to control the temperature
  of the heating pad using a display and buttons, and are open to adding more functionalities to the firmware.
