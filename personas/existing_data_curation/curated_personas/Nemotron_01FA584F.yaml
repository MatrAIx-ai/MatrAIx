  hobbies: '["Co-ed soccer league", "Improvisational theatre", "Hiking North Shore trails", "Wine-tasting events", "Mentoring high-school journalists", "Sign language basics", "Digital illustration", "Tech
    meetups on captioning and AI"]'
  career_goals: She aims to become a senior manager of a legal transcription services firm, overseeing a team of captioners, and to launch her own boutique captioning company that leverages AI‑assisted
    transcription while maintaining human accuracy. Jenna also plans to obtain the Certified Professional Reporter (CPR) credential and to develop a certification program for new reporters, positioning
    herself as a thought leader who blends her business acumen with technical expertise.
