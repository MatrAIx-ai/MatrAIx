personas:
  professional: Jenna Pollard, a certified court reporter and simultaneous captioner with a 225 wpm stenographic speed, leverages their business‑grade project‑management chops and a healthy dose of skeptical
    competitiveness to streamline multi‑court workflows, mentor new staff, and champion AI‑assisted transcription while never compromising on human accuracy.
  sports: Jenna Pollard plays forward for the co‑ed Boston Irish Soccer Club, cheers the Boston Red Sox and Celtics each season, and squeezes in early‑morning trail runs on the North Shore, treating their
    fitness regimen as a competitive arena where disciplined training meets their sociable love of group challenges.
  arts: Jenna Pollard fuels their creative side at Improv Asylum workshops, sketches digital illustrations inspired by the bold colors of Frida Kahlo, and devours Broadway hits like Lin‑Manuel Miranda’s
    *Hamilton* while sipping pinot noir at Boston’s jazz‑laden venue Wally’s Café, blending performance, visual art, and music into a lively personal collage.
  travel: Jenna Pollard prefers meticulously planned weekend getaways—such as a sunrise hike in Acadia National Park, a food‑tour of Montréal’s cheese shops, and a cultural immersion in Barcelona’s Gothic
    Quarter—balancing a modest travel budget with an insatiable curiosity for new landscapes and cuisines, allowing them to satisfy both competitive wanderlust and reflective downtime.
  culinary: Jenna Pollard, an avid wine‑taster, delights in savoring Boston clam chowder, mastering a home‑cooked seared scallop dish with miso glaze and roasted beet salad, and expanding their palate with
    a daring pairing of aged cheddar and black truffle honey, all while wielding a modest set of kitchen knives and a trusty Instant Pot.
  core: Jenna Pollard fuses a razor‑sharp legal mind with a boundless curiosity, channeling competitive energy into community soccer, AI‑driven captioning, and weekend adventures that keep life anything
    but predictable for them.
background:
  cultural: Jenna grew up in a middle‑class family in the Greater Boston area, identifying as a white New Englander with deep ties to the region’s public‑school system and community organizations. The pragmatic,
    self‑reliant ethos of New England, combined with exposure to the multicultural vibrancy of nearby Boston, informs her value for both tradition and innovation. She celebrates local holidays such as Patriots’
    Day, participates in neighborhood block parties, and maintains a strong sense of regional identity while staying open to diverse perspectives.
attributes:
  skills: '["Real-time stenography (225 wpm)", "Simultaneous captioning", "Legal transcription", "Court reporting software (Stenograph, ProCAT, CaptionMaker)", "Legal terminology expertise", "Project management",
