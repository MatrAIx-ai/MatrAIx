persona_description: A Canadian economist who specializes in the study of immigration economics and its impact on the Canadian economy. He is a professor at Simon Fraser University and a senior research
  fellow at the Fraser Institute. He has conducted studies on the economic effects of immigration and has argued that immigration costs Canadians up to $20 billion a year. He has also cited a study by the
  American government that found that immigration has resulted in a shift in income from workers to employers, with employer earnings seeing a $43.5 billion increase and worker earnings decreasing by $40
  billion.
