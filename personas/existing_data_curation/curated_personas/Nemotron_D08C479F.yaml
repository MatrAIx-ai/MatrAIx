    Problem-Solving'', ''Safety Training and Briefing'']'
  hobbies: '[''Fishing at local lakes'', ''Gardening native Texas plants'', ''Woodworking projects'', ''Reading mystery novels'', ''Hiking nature trails'', ''Attending church potlucks'', ''Yoga and meditation'',
    ''Listening to classic country music'', ''Volunteer community clean-ups'', ''DIY home improvement experiments'']'
  career_goals: Kelly's career ambitions center on moving into a supervisory and training role within the hazardous-materials industry. She plans to earn advanced HAZWOPER trainer certification and complete
    an associate's degree in occupational health and safety, positioning herself to lead a crew and develop on-site safety programs. Over the next five years she hopes to become a lead supervisor who designs
    risk-assessment protocols, mentors newer workers, and advocates for mental-health resources to reduce workplace stress. Ultimately she envisions launching a small, family-run remediation business that
    blends her practical expertise with her desire for greater flexibility and control over her schedule, allowing a healthier work-life balance as she approaches retirement.
