persona_description: A marine biologist who specializes in studying the resilience of fish stocks to overfishing, particularly in the aftermath of decades of overexploitation. He is a postdoctoral scholar
  and assistant professor at Rutgers University, and he has published a study in Science that shows that overfished fish can recover more quickly than expected with effective catch limits. He is interested
  in the adaptation of fish to overfishing and the potential for swift recovery of overexploited species. His research interests include the study of fish stocks, their resilience, and their recovery from
  overfishing.
