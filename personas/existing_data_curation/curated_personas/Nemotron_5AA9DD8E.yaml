personas:
  professional: Thalia Campbell, a seasoned insurance claims specialist in the Florida market, leverages over a decade of expertise in policy analysis, Guidewire, Xactimate, and advanced Excel to design
    meticulous, compliance‑driven workflows, and their structured, disciplined nature shines through as they train new staff, develop SOPs, and champion digital transformation projects.
  sports: Thalia Campbell kicks off each day with a sunrise walk along the Pompano Beach shoreline, attends a weekly Vinyasa session at the Pompano Beach Yoga Studio, participates in the Pompano Beach Running
    Club’s 5K training group, and cheers on the Miami Heat and Miami Dolphins as their favorite NBA and NFL teams.
  arts: Thalia Campbell finds solace in the timeless sounds of John Coltrane’s 'A Love Supreme,' the soulful vocals of Nina Simone and Marvin Gaye, regularly attends live jazz nights at the Broward Center
    for the Performing Arts, and draws creative inspiration from the contemporary paintings of Amy Sherman while also enjoying acclaimed performances by Viola Davis on screen.
  travel: Thalia Campbell spends most holidays exploring the Florida Keys as a relaxing coastal retreat, has visited the historic French Quarter of New Orleans for its music and food, and dreams of a cultural
    immersion trip to Cartagena, Colombia to experience Caribbean heritage firsthand.
  culinary: Thalia Campbell, a proficient home chef, transforms garden‑grown herbs like thyme, cilantro, and scotch bonnet peppers into vibrant Afro‑Caribbean staples such as jerk chicken, shrimp gumbo,
    and collard greens with smoked turkey, while also mastering soulful classics like sweet potato pie and cornbread.
  core: Thalia Campbell blends disciplined claim‑adjusting expertise with a soulful love for tropical gardening, jazz, and community service, all while juggling a meticulous financial plan and a mindful,
    yoga‑centered lifestyle.
background:
  cultural: Thalia’s cultural background is rooted in the African‑American experience of the Southeast United States, with family ties to the Great Migration and a deep connection to the vibrant Black community
    of Broward County. Raised in a close‑knit family where church, music, and storytelling were central, she embodies values of resilience, community service, and pride in her heritage. The multicultural
    tapestry of South Florida, including substantial Caribbean influences, enriches her appreciation for diverse culinary traditions and rhythmic music, while her professional path reflects the high value
    placed on education and upward mobility within the Black middle‑class.
attributes:
  skills: '[''Insurance claims processing'', ''Policy analysis'', ''Regulatory compliance (Florida)'', ''Data entry and documentation'', ''Claims management software (Guidewire, Xactimate, Duck Creek)'',
    ''Advanced Microsoft Excel'', ''Customer service and conflict resolution'', ''Process improvement and SOP development'', ''Training and mentoring'', ''Time management and prioritization'']'
  hobbies: '[''Gardening'', ''Cooking Afro‑Caribbean and soul‑food cuisine'', ''Listening to jazz, soul, and R&B music'', ''Yoga and mindfulness practice'', ''Reading historical fiction and biographies
    of civil‑rights leaders'', ''Beach walking'', ''Volunteering at community food bank'', ''Attending church services'']'
  career_goals: Thalia aims to move into a supervisory or managerial role within the claims department, eventually becoming a certified professional claims adjuster (CPC) and earning a bachelor's degree
    in Business Administration or Insurance. She is passionate about leading digital transformation initiatives that streamline claim workflows and improve customer satisfaction. Long‑term, she hopes to
    mentor other Black professionals in the industry and contribute to community outreach programs that promote financial literacy and insurance education.
