persona_description: A professional geologist who specializes in the study of abandoned mine drainage, particularly the analysis and monitoring of the impact of acidic mine drainage on water bodies. The
  individual has extensive experience in the field of environmental science, with a focus on the effects of mine waste on water resources. They have conducted research on the spill at the Gold King mine
  in Colorado, analyzing the amount of metals that entered the river and the long-term impacts on the river. They have also conducted surveys on the impact of the spill on aquatic life, and have provided
  assessments of the water quality in the affected rivers.
