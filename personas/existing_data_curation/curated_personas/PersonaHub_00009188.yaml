persona_description: A healthcare professional with expertise in pain management and opioid prescribing trends, specifically focusing on the reduction of opioid use and the implementation of national guidelines
  to minimize harm associated with opioid use. This individual is knowledgeable about the impact of opioid prescribing on patients and their families, and the importance of tapering off opioids slowly to
  prevent long-term use. They have experience treating chronic pain patients and are aware of the push-pull aspects of optimal pain management that include education, physical therapy, and other interventions.
  This person is aware of the challenges faced by patients who cannot access comprehensive pain management services and is committed to advocating for their rights and needs.
