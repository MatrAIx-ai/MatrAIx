  career_goals: Although only four years old, Scott already dreams big. He wishes to become an astronaut who can explore the desert sky and paint the stars, a mural artist who can turn walls into colorful
    stories, or a teacher who shares his love of books and nature with other children. His immediate ambition is to learn as much as possible about animals, space, and art, and to create ever taller block
    towers.
