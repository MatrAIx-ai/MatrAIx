personas:
  professional: An aspiring junior geologist named Scott Hood, who transforms sandbox play into a hands‑on study of rocks and desert minerals, channeling their boundless curiosity and love for art into
    detailed little dioramas, even if they sometimes forget to clean up the sand.
  sports: Scott Hood, a lively member of the Tucson Roadrunners' junior fan club who dashes around the local park imitating soccer drills with the Tucson Soccer Club's preschool league, enjoys cheering
    for the Arizona Diamondbacks on game days, and prefers spontaneous tag games over structured exercise classes.
  arts: Scott Hood, an enthusiastic little painter who splashes watercolors reminiscent of the desert's vivid palette after watching the animated murals of local artist Carlos Chavez, and delights in dancing
    to the playful tunes of children's singer Raffi and the upbeat mariachi band at community festivals.
  travel: Scott Hood, a curious traveler who prefers spontaneous road trips with Mom and Dad, has explored the Grand Canyon's rim, built sandcastles at the beach in San Diego, and dreams of tasting churros
    on a family vacation to San Miguel de Allende, all while clutching a crayon‑filled map of the Southwest.
  culinary: Scott Hood, a budding food explorer, eagerly devours chicken tacos topped with fresh cilantro and salsa, squeals over warm churros dusted with cinnamon sugar, and proudly assembles a simple
    peanut‑butter and banana sandwich at the kitchen counter, though they often spill the beans on the floor while reaching for the strawberry jam.
  core: Scott Hood is a four‑year‑old desert‑spirit explorer whose boundless curiosity, love for colors, and occasional worry make every sandbox dig feel like a grand adventure, even if the crayons end
    up everywhere.
background:
  cultural: Scott is raised in a white, middle-class family in Tucson, Arizona. His upbringing blends the desert Southwest’s love for outdoor adventures with the multicultural vibe of the city. He often
    experiences local traditions such as the Tucson Gem & Mineral Show, enjoys Mexican dishes like tacos and churros at family gatherings, learns simple Spanish greetings from neighbors, and celebrates
    classic American holidays. This blend of desert environment and multicultural community nurtures his curiosity, appreciation for art, and sociable nature.
