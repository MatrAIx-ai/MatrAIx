  hobbies: '[''Reading contemporary and classic literature'', ''Attending live theater and concerts'', ''Painting watercolors'', ''Traveling to historic sites in Pennsylvania'', ''Participating in senior
    dance classes'', ''Volunteering at the local community center'', ''Gardening in a community plot'', ''Genealogy research'', ''Playing bridge'', ''Writing a personal memoir'']'
  career_goals: Although retired from formal employment, Victoria pursues a series of personal projects that feel like a second career. She aims to compile a memoir that weaves her own life story with the
    transformation of Pittsburgh’s post‑industrial neighborhoods, and to launch a community oral‑history initiative that records senior residents’ memories for the city’s archives. She hopes to mentor emerging
    writers through a quarterly workshop series at the local library, and to curate a modest annual arts‑and‑heritage festival that showcases local painters, musicians, and historians. On a personal level,
    she plans to learn conversational Italian to connect with her family’s roots and to travel to northern Italy within the next three years. She also sets a modest health goal of walking the Cuyahoga River
    Trail three times a week, viewing it as both a physical challenge and a way to stay engaged with the natural landscape she loves.
