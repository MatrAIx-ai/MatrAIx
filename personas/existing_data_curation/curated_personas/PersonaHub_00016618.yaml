persona_description: A geologist who is interested in the study of Martian craters and their geological processes, particularly those related to the formation of gullies and lobe-like structures. This persona
  is likely to be interested in the High Resolution Imaging Science Experiment (HiRISE) camera on NASA's Mars Reconnaissance Orbiter, which captured images of a variety of processes occurring on the walls
  of Martian craters. This persona is also likely to be interested in the characteristics of the lobe-like structure, such as its long tongue-like shape, dark snout, parallel grooves, and the movement of
  ice-rich material and possibly water. This persona may also be interested in the research conducted by the University of Arizona's HiRISE camera, which was built by Ball Aerospace & Technologies Corp.
