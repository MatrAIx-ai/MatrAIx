  career_goals: Haley aims to leverage her extensive managerial background to mentor emerging health administrators and lead the implementation of a region‑wide electronic health record system that improves
    patient outcomes and operational efficiency. Over the next five years she hopes to serve on the board of a community health coalition, advocate for policies that enhance rural health services, and eventually
    transition into a consulting role that lets her share best practices while maintaining a balanced work‑life routine.
