persona_description: A neuroscientist who specializes in the study of sleep and its effects on memory, particularly the role of slow-wave sleep (SWS) in memory consolidation and REM sleep in memory retrieval
  and concept linking. Her research interests include the hippocampus-neocortex connection, the impact of sleep on creativity and problem-solving, and the relationship between sleep stages and cognitive
  function. She is known for her work on the hippocampus's role in memory replay and the neocortex's role in concept linking during sleep.
