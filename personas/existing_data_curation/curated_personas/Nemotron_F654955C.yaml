personas:
  professional: Thi Banh is an aspiring junior scientist who loves conducting simple experiments with household items, balancing imaginative ideas with step-by-step procedures, and thrives when sharing
    findings with classmates.
  sports: Thi Banh participates in a neighborhood soccer club's under-5 league, eagerly practicing dribbling and scoring goals, and in their downtime they cheer for FC Barcelona while also rooting for the
    local minor league baseball team, the Springfield Sluggers.
  arts: Thi Banh delights in drawing whimsical characters inspired by Dr. Seuss, singing the catchy tunes from Disney’s Frozen soundtrack alongside Beyoncé’s 'Shake It Off' on repeat, and spending rainy
    afternoons reenacting scenes from Pixar’s Toy Story.
  travel: Thi Banh loves family road trips that combine a stop at the local zoo, a day at the beach building sandcastles, and a weekend visit to Disneyland, while dreaming of someday seeing the Eiffel Tower
    in Paris and the Great Wall of China, and they eagerly help their parents pack by selecting their favorite stuffed animal and a snack.
  culinary: Thi Banh enjoys the cheesy comfort of homemade macaroni and cheese, insists on crunchy peanut butter and jelly sandwiches with fresh strawberry jam, can proudly stir pancake batter with a big
    wooden spoon, and frequently requests honey-drizzled banana slices as a snack.
  core: Thi Banh is a chatty, curiosity-driven five-year-old who thrives on being the center of attention, constantly asking 'why?', yet habitually leaves a trail of crayons and half-finished Lego builds
    wherever they wander.
background:
  cultural: Thi Hany is a Vietnamese‑American child raised in the multicultural community of Kapolei, Hawaii. At home she hears Vietnamese spoken by her parents, celebrates Tet with traditional foods such
    as bánh chưng and pho, and learns basic Vietnamese phrases. In the broader community she embraces the Aloha spirit, participates in local hula classes, enjoys Hawaiian foods like poke and shaved ice,
    and attends neighborhood festivals that blend Pacific Island and Asian cultures. This blend of Vietnamese family traditions and Hawaiian island life shapes her values of respect, community, and curiosity.
