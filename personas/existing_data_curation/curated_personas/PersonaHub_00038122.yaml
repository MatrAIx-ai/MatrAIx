persona_description: A researcher and advocate for homeless youth, particularly those who are not with parents or other guardians. Slesnick conducted a study to determine how best to help homeless youth
  who are not with parents or other guardians, and her results showed that a more comprehensive treatment involving individual therapy sessions and HIV education/skills practice sessions was successful
  in reducing drug and alcohol abuse, improving social stability, and addressing the basic needs of food, shelter, and safety. Her approach to treatment was to create a program specifically for homeless
  youth and to offer flexible hours and opportunities for the youth to connect with counselors and services. Her findings suggest that communities can be successful in helping homeless youth, and that the
  cost of such a program is much less than it costs to keep youth in the criminal justice system.
