  hobbies: '[''Volunteering at the food bank'', ''Church youth group activities'', ''Georgia Bulldogs football fan'', ''Hiking and biking on Oconee River Trail'', ''Photography'', ''Crafting home decor'',
    ''Southern cooking and baking'', ''Book club and contemporary fiction reading'']'
  career_goals: Julina aims to complete her GED within the next year and enroll in a community-college business program to study retail management. Her medium-term goal is to be promoted to assistant manager
    of her store, where she can apply her organized and methodical approach to staff scheduling and stock planning. In the longer term, she envisions moving into regional store management or opening her
    own boutique that blends contemporary fashion trends with Southern style. She also hopes to leverage her curiosity about digital tools by learning e-commerce platforms, allowing her to expand her future
    business online.
