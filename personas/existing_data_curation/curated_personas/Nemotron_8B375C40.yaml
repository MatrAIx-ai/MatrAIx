personas:
  professional: Julina Thomas is a retail sales associate at a Milledgeville department store, proficient in customer service, inventory management, and POS systems, who leverages their organized, methodical
    nature and friendly, community‑oriented demeanor to train new hires and experiment with social‑media promotions to boost store visibility.
  sports: Julina Thomas follows Georgia Bulldogs football passionately, attends home games when possible, supports the Atlanta Falcons and Atlanta United, belongs to the Milledgeville Trail Runners club
    for weekly bike rides on the Oconee River Trail, and squeezes in evening jogs to stay fit, even if they occasionally skip a session to finish a shift at the store.
  arts: Julina Thomas enjoys Southern gospel harmonies from the Gaither Vocal Band, classic rock anthems by The Rolling Stones, and contemporary fiction by Celeste Ng, often sharing reflections in their
    local book club, while also crafting homemade décor inspired by Appalachian quilt patterns and snapping sunrise photos for their journal, a hobby that keeps them anchored to the region’s artistic traditions.
  travel: Julina Thomas prefers weekend road trips with a detailed itinerary, having explored Savannah’s historic squares, hiked the Blue Ridge Parkway in Asheville, and dreamed of attending Mardi Gras
    in New Orleans, balancing a modest travel budget with occasional family obligations that shape their penchant for day‑long outings rather than lengthy vacations.
  culinary: Julina Thomas loves baking buttery biscuits and peach cobbler with fresh Georgia peaches, experiments with adding a pinch of cayenne to fried chicken for a Southern kick, and enjoys cooking
    collard greens seasoned with smoked ham hocks, while also treating themselves to a slice of pecan pie at the community bakery, showcasing a solid intermediate cooking skill and a fondness for comfort
    food.
  core: Julina Thomas blends a friendly Southern hospitality with a methodical work ethic, often juggling store duties, volunteer shifts, and weekend hikes, all while occasionally forgetting to charge their
    phone before a shift and indulging in late‑night biscuit cravings.
background:
  cultural: Julina grew up in Milledgeville, a small town in central Georgia that reflects a mix of traditional Southern hospitality and close-knit community values. Her family's cultural roots are Anglo-American,
    with an emphasis on church involvement, family gatherings, and local traditions such as county fairs and Sunday potlucks. She was raised with an appreciation for Southern customs—respect for elders,
    a strong work ethic, and an inherent friendliness toward neighbors. These influences, combined with her exposure to the local music scene (gospel, country, and classic rock) and the region's emphasis
    on supportive community networks, shape her worldview and inform her cooperative, considerate demeanor.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS system operation'', ''Inventory management'', ''Merchandising'', ''Training junior staff'', ''Effective communication'', ''Time management'', ''Problem
