  career_goals: Thomas aims to transition into a senior claims management role where he can lead a team of adjusters and investigators, shaping best practices and integrating emerging technologies like
    AI-driven claim triage. He plans to earn the Chartered Property Casualty Underwriter (CPCU) designation and eventually launch his own consultancy focused on innovative, data-driven claims solutions
    for regional insurers. While advancing professionally, he seeks to maintain a flexible schedule that allows continued pursuit of his artistic interests and community involvement.
