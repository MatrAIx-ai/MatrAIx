personas:
  professional: Salvador Hernandez, age 5, is an aspiring junior architect who loves to organize LEGO bricks with precision while inventing new storylines, showing both his competitive drive and boundless
    curiosity.
  sports: Salvador Hernandez, age 5, sprints for the Little Tigers Soccer Club, swings a bat for the Riverside Kids Baseball League, cheers loudly for the Los Angeles Dodgers during family game nights,
    and loves to challenge friends in tag races at the park.
  arts: Salvador Hernandez, age 5, immerses himself in drawing cartoon characters like Peppa Pig, dances to the upbeat tunes of The Wiggles and Raffi, and raves about Pixar's Toy Story, often insisting
    on recreating scenes with crayons during playtime.
  travel: Salvador Hernandez, age 5, has explored the local zoo and Disneyland with his family, dreams of trekking through Yellowstone National Park’s geysers, and pins a future visit to Paris on his bedroom
    wall, thriving on the blend of structured itineraries and spontaneous playground discoveries.
  culinary: Salvador Hernandez, age 5, adores cheesy macaroni, chicken nuggets, and peanut butter–jelly sandwiches, proudly helps stir batter for banana pancakes, but stubbornly refuses broccoli, claiming
    the green trees on his plate are not for chewing.
  core: Salvador Hernandez, age 5, is a curious, organized whirlwind who balances competitive spirit with artistic flair, often demanding extra crayons while challenging peers to faster tag games, and occasionally
    forgets his inhaler on busy days.
background:
  cultural: Salvador is raised in a Cuban‑American family in Las Vegas. At home, he hears both Spanish and English, celebrates Cuban holidays like Carnaval and Noche de San Juan, enjoys foods such as empanadas,
    plantains, and arroz con pollo, and often hears the sounds of salsa, rumba, and son. The city's vibrant entertainment culture adds exposure to shows, bright lights, and a diverse community, enriching
    his upbringing with a blend of Cuban traditions and Las Vegas energy.
