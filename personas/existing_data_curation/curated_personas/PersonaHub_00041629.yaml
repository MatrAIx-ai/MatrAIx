persona_description: A physicist who specializes in acoustics, particularly the field of sound propagation in closed rooms. His research interests include the study of reverberation times, acoustical design
  of rooms, and the use of acoustics in audio technology. He is particularly interested in developing algorithms that can accurately map the spatial characteristics of a room using only four microphones
  and a finger snap. His work could have significant implications for fields such as architectural acoustics, audio forensics, and virtual reality.
