  career_goals: Mitsy aims to complete a bachelor’s degree in communications or marketing, leveraging her customer service experience to transition into a role that blends her passion for art with strategic
    storytelling. She envisions working in cultural marketing, museum outreach, or brand experience design for creative agencies, eventually leading projects that bring innovative, community‑focused artistic
    experiences to life. Long‑term, she aspires to launch a collaborative art space in Ponce where local artists and audiences can co‑create and showcase experimental works.
