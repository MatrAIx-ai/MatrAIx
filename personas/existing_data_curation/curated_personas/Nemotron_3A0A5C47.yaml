personas:
  professional: Mitsy Aguerrevere, a 19‑year‑old communications student with a customer‑service background, leverages their keen visual aesthetic and spontaneous adaptability to craft community‑focused
    storytelling campaigns, even though they often wrestle with meeting tight deadlines.
  sports: Mitsy Aguerrevere, a 19‑year‑old enthusiast, channels their love for rhythm into small‑group salsa dancing, they support the local Leones de Ponce baseball squad, dabble in beach volleyball during
    summer, and prefer low‑impact yoga sessions over regimented gym workouts.
  arts: Mitsy Aguerrevere, a 19‑year‑old visual storyteller, spends weekends sketching in cafés while listening to a curated mix of indie acts like Phoebe Bridgers and Latin fusion groups such as Calle
    13, they devour graphic novels like Saga, and draw inspiration from murals by artists like Fernando Ríos, shaping their identity through an eclectic blend of contemporary art and philosophy.
  travel: Mitsy Aguerrevere, a 19‑year‑old wanderer, favors spontaneous, culturally immersive short trips—recently exploring the street art of Cartagena and the historic alleys of Old San Juan—while juggling
    a modest student budget, and they dream of a future stay in Barcelona’s Gothic Quarter to study European mural techniques.
  culinary: Mitsy Aguerrevere, a 19‑year‑old culinary explorer, enjoys preparing modern takes on classic island plates—like mofongo infused with roasted cauliflower and citrus‑marinated shrimp, or arroz
    con gandules flavored with coconut milk and cilantro—while they experiment with ingredients like plantain chips and chipotle.
  core: Mitsy Aguerrevere, a 19‑year‑old art‑obsessed storyteller, combines spontaneous creativity with calm resilience, turning everyday moments into vibrant cultural experiences while they occasionally
    forget deadlines and budgeting.
background:
  cultural: Mitsy grew up in Ponce, a city renowned for its colonial architecture and rich artistic heritage. Her Puerto Rican roots blend Spanish, African, and Taíno influences, reflected in the music,
    food, and celebrations that shape her daily life. She speaks Spanish at home and English at school and work, navigating both cultures comfortably. The city’s annual Feria de Artesanías, vibrant bomba‑plena
    rhythms, and local festivals are central to her community identity. While she respects the Catholic traditions of her family, she also embraces the island’s broader spiritual openness. This cultural
    mosaic fuels her appreciation for diverse artistic expressions and her desire to foster connections across different community groups.
