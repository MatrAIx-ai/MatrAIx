personas:
  professional: Thelma Graham, a two‑year‑old explorer of building blocks, demonstrates early organizational skills and a fierce competitive streak, yet they quickly become anxious if a structure collapses,
    reflecting a curious yet emotionally reactive mindset.
  sports: Thelma Graham attends a weekly toddler gymnastics class at the local YMCA and consistently roots for the Chicago Cubs when watching baseball with family, while they also participate in the Little
    Kickers soccer club for short, energetic games.
  arts: Thelma Graham delights in the bright illustrations of Dr. Seuss books, the playful melodies of Raffi, and finger‑painting sessions set to The Wiggles, and they find these experiences shape their
    early artistic identity.
  travel: Thelma Graham has enjoyed a family road trip to the nearby state park, a visit to the city zoo, and a weekend stay at grandparents' farmhouse, and they now dream of exploring Disneyland and the
    beaches of Florida.
  culinary: Thelma Graham prefers creamy macaroni and cheese, sweet banana slices, and apple sauce, and they often attempt to stir with a plastic spoon while delighting in the aroma of melted cheddar.
  core: Thelma Graham is a fiercely curious two‑year‑old whose competitive block‑building games hide a tender heart prone to sudden anxiety, and they love bright art and sugary treats.
background:
  cultural: Thelma is raised in a Black family in Clarion, Pennsylvania. Her parents blend African American cultural traditions—such as gospel music, storytelling, and community church gatherings—with the
    rhythms of small‑town life. Family celebrations often include soul food dishes, rhythmic clapping games, and visits from extended relatives, providing her with a rich sense of heritage while also navigating
    the predominantly rural, mostly White community of Clarion County.
attributes:
  skills: '["scribbling with crayons", "stacking three to four blocks", "identifying basic colors", "following simple daily routines", "using two‑word phrases"]'
  hobbies: '["finger painting", "singing nursery rhymes", "exploring leaf piles in the backyard", "stacking and toppling blocks", "interactive picture book reading"]'
  career_goals: At this stage, Thelma's ambitions are expressed through imaginative play. She often pretends to be a dancer twirling in front of a mirror and occasionally declares she wants to 'help people'
    like her caregiver. These nascent aspirations hint at a future interest in performing arts or caregiving roles, but they remain playful and fluid, shaped by the adults she observes.
