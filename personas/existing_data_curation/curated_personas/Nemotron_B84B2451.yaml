  hobbies: '[''Salsa dancing'', ''Traditional Mexican cooking'', ''Gardening (vegetables and herbs)'', ''Hiking in Angeles National Forest'', ''Attending Los Angeles Dodgers games'', ''Playing chess and
    card games'', ''Volunteering at community senior center'', ''Participating in Dia de los Muertos celebrations'', ''Learning digital photography'', ''Exploring new technology (smartphones, AI assistants)'']'
  career_goals: Although officially retired, Guillermo aims to channel his disciplined drive into personal and community initiatives. He plans to mentor high‑school students from the Mexican‑American community
    through a local entrepreneurship program, sharing the practical lessons he learned from decades of running his shop. He also intends to write a memoir that captures his family’s migration story and
    the cultural heritage of Los Angeles’ Latino neighborhoods, hoping it will serve as a resource for future generations. Guillermo is eager to develop his digital photography skills so he can document
    neighborhood festivals and day‑to‑day life in Carson. Additionally, he aspires to become a certified Spanish‑language tutor at the senior center, helping new immigrants improve their English while preserving
    their native tongue. His overarching ambition is to remain active, purposeful, and connected, setting measurable goals each year for volunteer hours, learning milestones, and community projects.
