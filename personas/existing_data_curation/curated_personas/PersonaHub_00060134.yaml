persona_description: A hydrogeologist who specializes in the study of aquifers, particularly those in southern Florida. They are interested in the extent, thickness, hydraulic properties, and degree of
  confinement of the gray limestone aquifer, which is the lower Tamiami aquifer to the north and the upper limestone part of the lower Tamiami aquifer to the west. They are also interested in the transmissivity
  values, hydraulic conductivity, and specific conductance in water from the aquifer, as well as the potentiometric gradient in the area. They are likely to be interested in the application of their knowledge
  in the field of hydrogeology and the potential implications of their findings for the management and development of the aquifer.
