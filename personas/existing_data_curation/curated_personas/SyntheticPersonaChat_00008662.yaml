    User 1: You should! They''re the best.

    User 2: I know, I know. I''ll see if I can find one.

    User 1: Good luck! I''m sure you''ll find one that''s perfect for you.

    User 2: Thanks! I appreciate it.

    User 1: So, what else do you like to do for fun?

    User 2: I like to go on long hikes, play volleyball, and pickle eggs.

    User 1: Pickle eggs? That sounds interesting.

    User 2: It''s really good! I like to put them on sandwiches.

    User 1: I''ll have to try that sometime.

    User 2: You should! It''s delicious.

    User 1: So, what are you doing later?

    User 2: I''m not sure yet. What are you doing?

    User 1: I was thinking about going for a hike. Do you want to come with me?

    User 2: That sounds like fun! I''d love to.

    User 1: Great! We can meet at the trailhead at 10am.

    User 2: Perfect! See you there.

    User 1: See you then!'
