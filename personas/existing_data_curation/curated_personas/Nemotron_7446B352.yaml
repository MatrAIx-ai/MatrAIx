  career_goals: Although retired, Heejun aims to remain intellectually active by serving as a mentor to his adult children, grandchildren, and local community members interested in entrepreneurship and
    personal finance. He hopes to compile a memoir documenting his family's immigration story and business lessons, preserve Korean cultural values within his household, and volunteer part‑time at a senior
    center teaching budgeting and practical life skills. Maintaining his health and a disciplined daily routine are also central to his personal ambitions.
