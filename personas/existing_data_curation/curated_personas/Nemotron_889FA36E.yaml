personas:
  professional: Angel Garciaberrios, an aspiring junior game developer, enjoys crafting interactive stories in Scratch and building Minecraft realms, merging curiosity with a practical eye for code structure
    while reliably meeting class project deadlines and cheerfully sharing creations with friends.
  sports: Angel Garciaberrios, a lively member of the Lakeside Youth Soccer Club, dazzles on the community field as a forward for the local team and roots for the LA Galaxy, while also joining the school’s
    bird‑watching club in the spring, balancing competitive play with nature‑focused fitness.
  arts: Angel Garciaberrios, an enthusiastic comic‑style illustrator and folk‑dance participant, fills sketchbooks with heroic characters inspired by the Harry Potter series, draws inspiration from Stan
    Lee and Hayao Miyazaki, and practices traditional dances at family celebrations while jamming to Taylor Swift and Shakira on weekends.
  travel: Angel Garciaberrios, an adventurous weekend explorer, loves spontaneous hikes in the nearby countryside to spot birds and collect rocks, recently trekked the Great Smoky Mountains with a school
    group, and dreams of backpacking through the Grand Canyon, always packing extra snacks and a sketchpad for on‑the‑go creativity.
  culinary: Angel Garciaberrios, a budding home chef, skillfully prepares tamales and fresh salsa, experiments by adding pineapple chunks to salsa for a sweet twist, enjoys cooking chicken enchiladas on
    weekends, and sometimes over‑salts dishes in excitement, reflecting a confident yet learning palate.
  core: Angel Garciaberrios blends a curious, practical mind with an outgoing spirit, juggling soccer, coding, and cooking while habitually leaving game consoles on overnight and obsessively cataloguing
    rocks in a backpack.
background:
  cultural: Angel’s family traces its roots to central Mexico, and she grew up in a bilingual household where Spanish is spoken at home while English dominates at school. She celebrates Día de los Muertos,
    Cinco de Mayo, and local Texan festivals with a blend of Mexican traditions—such as making altars, preparing mole, and attending church mass—alongside community events like the North Zulch rodeo. Her
    upbringing emphasizes strong family ties, respect for elders, and a blend of Mexican warmth with the practical, community‑oriented spirit of rural Texas.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Advanced reading comprehension'', ''Fundamental arithmetic'', ''Basic coding using Scratch'', ''Artistic drawing and illustration'', ''Simple
