  hobbies: '[''Soccer'', ''Mexican folk dancing'', ''Cooking traditional dishes (tamales, salsa)'', ''Reading fantasy novels'', ''Drawing comic‑style illustrations'', ''Bird‑watching'', ''Rock collecting'',
    ''Minecraft world building'', ''Scratch coding projects'']'
  career_goals: Angel dreams of becoming a veterinarian who can integrate technology to improve animal health, especially for the livestock her community raises. She also wants to study robotics and coding,
    aiming to design simple tools that help farmers monitor animal well‑being. In the short term, she plans to earn a scholarship to a Texas university, join a STEM club, and start an after‑school coding
    workshop for younger bilingual students in North Zulch, combining her love for science, community service, and cultural heritage.
