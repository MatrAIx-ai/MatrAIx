  career_goals: Approaching the later stage of his career, Kirklin aims to leverage his extensive experience to become a senior strategic advisor within his organization or as an independent consultant,
    focusing on helping mid‑size manufacturers in the Great Lakes region improve operational efficiency. He aspires to mentor the next generation of analysts, championing a culture of curiosity balanced
    with pragmatic execution. Over the next five years, he plans to deepen his expertise in predictive analytics and machine learning to incorporate forward‑looking insights into his recommendations. Simultaneously,
    he is preparing for a gradual transition toward part‑time consulting, allowing more time for community involvement while ensuring his professional legacy is anchored in measurable business impact.
