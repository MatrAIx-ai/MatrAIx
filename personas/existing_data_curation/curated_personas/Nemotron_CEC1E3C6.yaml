  career_goals: Kelly aims to advance from her current software developer role to a senior engineer within the next three years, focusing on leading the design of scalable, maintainable systems for her
    company's financial‑services platform. She plans to obtain AWS Solutions Architect certification and deepen her cloud architecture expertise. In the longer term, she aspires to a technical lead or product
    manager position where she can combine her programming skills with her business education to shape product strategy, improve development processes, and mentor junior developers. Maintaining a predictable
    workload and a healthy work‑life balance is central to her ambitions, given her sensitivity to stress.
