personas:
  professional: Kelly Edwards, a 30‑year‑old full‑stack developer, builds reliable, business‑critical applications using Python, Java, C#, and JavaScript, leverages test‑driven development and CI/CD pipelines,
    and translates strategic business objectives into scalable cloud solutions, and they apply a disciplined, structured approach that mirrors their preference for predictability and their graduate business
    training.
  sports: Kelly Edwards follows the Austin FC soccer team and the Texas Rangers baseball team, attends the Rangers’ weekend games when their schedule allows, and they stay active by practicing yoga three
    times a week at a downtown studio and joining the Austin Runners club for a monthly 5K.
  arts: Kelly Edwards indulges in the arts by listening to the blues of Bonnie Raitt, the contemporary jazz of Kamasi Washington, attending indie film screenings by director Greta Gerwig, and displaying
    prints of Georgia O'Keeffe in their living room, and they use these creative experiences to decompress after structured coding sessions.
  travel: Kelly Edwards favors meticulously planned trips that blend relaxation with cultural immersion, having recently explored the Blue Ridge Mountains of Asheville, the historic waterfront of Charleston,
    and the vineyards of Napa Valley, while they dream of a serene itinerary in Kyoto’s Zen gardens and the sunset cliffs of Santorini, all arranged around their work calendar to minimize stress.
  culinary: Kelly Edwards enjoys crafting multi‑course Southern feasts, from starter shrimp and grits enriched with smoked paprika to main‑course fried chicken seasoned with buttermilk and hot sauce, side
    collard greens sautéed with smoked turkey, cornbread with jalapeño honey butter, and dessert pecan praline pie drizzled with bourbon caramel, and they showcase intermediate cooking skills along with
    a fondness for bold, comforting flavors.
  core: Kelly Edwards blends a data‑driven mind with a gardener’s patience, juggling code, crops, and carefully curated playlists while they wrestle with chronic anxiety that fuels both their meticulousness
    and their need for solitary recharge.
background:
  cultural: Kelly grew up in a middle‑class family in the Piedmont region of South Carolina, where community and hospitality are emphasized. Her upbringing blended typical Southern values—politeness, a
    strong work ethic, and close family ties—with an awareness of broader American cultural diversity. She celebrates local traditions such as spring festivals and enjoys Southern cuisine like fried chicken
    and collard greens, while also appreciating global flavors. Although she identifies as white and does not follow a strict religious practice, she occasionally participates in community church events
    with her family. Her business education at Clemson University expanded her perspective, and living in Rock Hill keeps her connected to both suburban and rural Southern life.
