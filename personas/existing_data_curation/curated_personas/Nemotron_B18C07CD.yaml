personas:
  professional: A biomedical research program manager, Theda Simmons combines rigorous molecular biology expertise with a graduate‑level business perspective, orchestrating multi‑site clinical trials, health‑economics
    analyses, and grant proposals while maintaining meticulous project timelines, transparent stakeholder communication, and a collaborative lab culture that reflects her community‑rooted sense of responsibility.
  sports: An avid hiker and community volunteer, Theda Simmons follows the Atlanta Braves, participates in the Georgia Trail Hikers club for spring mountain treks, and joins a weekly yoga‑focused fitness
    class to balance cardio with flexibility while occasionally coaching a youth soccer team after Sunday services.
  arts: A lover of Southern folk music and classic storytelling, Theda Simmons fills garden evenings with the sounds of Alison Krauss, enjoys Ken Burns documentaries on American history, and displays reproductions
    of Andrew Wyeth’s realist paintings, allowing these artistic touches to shape her reflective downtime.
  travel: A methodical planner, Theda Simmons maps weekend getaways with detailed itineraries, favoring hikes in the Blue Ridge Mountains, cultural tours of Savannah’s historic squares, and dreams of a
    future culinary expedition to Kyoto while balancing family commitments that limit extended overseas travel.
  culinary: A garden‑to‑table enthusiast, Theda Simmons whips up roasted heirloom tomatoes, sweet‑corn succotash, and collard‑green stews using produce from her plot, occasionally treats herself to Southern‑style
    shrimp‑and‑grits at church potlucks, and prides herself on mastering the perfect low‑sugar peach cobbler.
  core: Theda Simmons blends rural Southern community values with data‑driven ambition, meticulously managing biotech projects while habitually over‑watering her garden and skipping dental appointments
    for extra research reading.
background:
  cultural: Raised in a close‑knit, rural community in Dooly County, Theda grew up with Southern hospitality and a strong sense of responsibility to her neighbors. Her family’s emphasis on hard work and
    education propelled her to pursue advanced degrees, while the town’s church and community events nurtured her collaborative spirit. Although she values traditional community ties, her academic experiences
    have broadened her perspective, allowing her to blend local values with a forward‑looking, evidence‑based approach to both science and business.
attributes:
  skills: '[''Molecular biology'', ''Cell culture'', ''Clinical trial design'', ''Biostatistics (R, SAS)'', ''Regulatory affairs'', ''Project management'', ''Strategic planning'', ''Health economics'',
    ''Grant writing'', ''Data visualization'', ''Leadership of cross‑functional teams'']'
  hobbies: '[''Gardening'', ''Yoga'', ''STEM mentorship'', ''Historical nonfiction reading'', ''Jigsaw puzzles'', ''Hiking'', ''Community volunteering'']'
  career_goals: Theda aims to become a senior leader in translational research, eventually overseeing a multidisciplinary team that bridges discovery science with commercial development. She aspires to
    secure major research grants, publish high‑impact findings, and guide a biotech startup from concept to market, leveraging her business acumen to drive sustainable growth and improve patient outcomes.
    In the longer term, she hopes to influence health policy by contributing expert testimony on emerging therapies.
