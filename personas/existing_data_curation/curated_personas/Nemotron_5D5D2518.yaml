  career_goals: Kevin aims to position himself as an innovative educator who bridges STEM and the arts, creating interdisciplinary curricula that spark students' imagination. His short‑term goal is to launch
    a semester‑long course on mathematical visualization and abstract art, supported by a grant for a digital fabrication lab. Over the next five years, he hopes to secure a promotion to senior lecturer
    or department chair, author a textbook on creative approaches to teaching applied mathematics, and lead a regional coalition of community colleges to develop collaborative STEM‑arts initiatives across
    Imperial County. He also strives to expand his research portfolio with peer‑reviewed articles on the impact of artistic integrative methods on student engagement, and to mentor underrepresented students
    pursuing STEM pathways. Ultimately, Kevin envisions contributing to policy discussions on equitable STEM education in rural border regions, while maintaining a balanced lifestyle that mitigates stress.
