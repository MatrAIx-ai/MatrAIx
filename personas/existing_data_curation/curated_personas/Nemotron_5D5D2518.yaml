personas:
  professional: Kevin Henderson is a senior lecturer in applied mathematics who blends computational modeling with abstract art to craft interdisciplinary courses that spark student imagination, leveraging
    their knack for visual analogies, grant writing, and community STEM outreach while balancing a methodical curriculum schedule with spontaneous creative experiments.
  sports: Kevin Henderson is an avid hiker who explores the Imperial Sand Dunes and Anza‑Borrego each spring, plays in the local masters basketball league under the Imperial Valley Heat banner, follows
    the Los Angeles Dodgers and San Diego State Aztecs football, and practices yoga on weekends to balance the physical strain from long treks.
  arts: Kevin Henderson immerses themselves in the regional art scene, creating abstract desert‑inspired paintings, curating digital illustrations influenced by Brian Eno’s ambient textures, performing
    acoustic guitar covers of José González and John Lennon at community improv nights, and drawing inspiration from the works of Frida Kahlo and modernist sculptor David Smith.
  travel: Kevin Henderson prefers purposeful travel that blends solitude and cultural exchange, having camped beneath the stars in Joshua Tree, trekked the Patagonian Andes, explored the historic streets
    of Oaxaca, and plans a future pilgrimage to the ancient desert ruins of AlUla, balancing modest travel budgets with occasional splurges on art‑focused tours.
  culinary: Kevin Henderson enjoys cooking southwestern‑inspired meals, favoring grilled fish tacos with chipotle mayo, quinoa‑stuffed poblano peppers, and avocado‑lime salads, while their pantry staples
    include prickly pear jam, smoked paprika, and fresh cilantro, and they experiment with fermentation techniques to create tangy kimchi.
  core: Kevin Henderson is a boundary‑pushing educator who fuses math, art, and sustainability, carries a healthy dose of anxiety that fuels meticulous planning, yet occasionally lets a stray guitar riff
    or impulsive solar kit purchase derail their schedule.
background:
  cultural: Kevin was raised in a modest, middle‑class family in the agricultural towns surrounding Imperial, California. As a white American growing up on the U.S.–Mexico border, he experienced a blend
    of Southern California rural culture and the vibrant multicultural rhythms of the neighboring Hispanic community. His upbringing emphasized self‑reliance, practical problem‑solving, and a respect for
    hard work on the fields and in local industries. Exposure to the region’s desert environment cultivated an appreciation for wide‑open spaces and a fascination with renewable‑energy technologies. Although
    his heritage is primarily Anglo‑American, Kevin has embraced the cultural diversity of Imperial County, learning Spanish phrases, participating in community festivals, and incorporating inclusive perspectives
    into his teaching. This blend of rural white American values with a borderland’s intercultural awareness informs his worldview, fostering both a pragmatic approach to challenges and an openness to novel,
    cross‑disciplinary ideas.
