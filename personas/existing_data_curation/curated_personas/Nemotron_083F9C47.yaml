  hobbies: '[''Book club (fiction & science)'', ''Co‑ed softball league'', ''Volunteer at food pantry'', ''STEM mentorship for high school students'', ''Attending university public lectures'', ''Arduino
    and DIY electronics projects'', ''Hiking in White Mountains'', ''Landscape photography'', ''Weekly yoga classes'', ''Cooking experimental dishes'']'
  career_goals: Felicie aims to deepen her expertise in intellectual‑property and technology law, leveraging her STEM background to become a senior paralegal specialist in a boutique IP firm or the legal
    department of a biotech startup. She plans to obtain the Certified Paralegal (CP) credential within the next year and enroll in a part‑time paralegal‑to‑law program to eventually earn a JD. In the medium
    term, she envisions leading a legal project management team, implementing workflow optimization, and mentoring junior assistants. Long‑term, she hopes to transition into a compliance officer role or
    launch her own legal‑consulting practice focused on supporting small tech and science enterprises.
