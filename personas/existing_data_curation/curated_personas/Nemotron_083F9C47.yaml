personas:
  professional: Felicie Hastings, a senior paralegal specialist in the making, leverages her STEM training and legal research expertise to master complex IP and environmental litigation, automates routine
    tasks with Python scripts, and coordinates multi‑party communications with meticulous precision, while channeling her sociable, organized nature into leading her boutique firm’s workflow optimization.
  sports: Felicie Hastings, an energetic member of the Wilmington Co‑ed Softball Club and a dedicated weekend hiker in the White Mountains, also follows the Boston Red Sox and New England Patriots, combines
    yoga classes with strength training, and logs their runs and climbs in Strava to maintain a balanced fitness routine.
  arts: Felicie Hastings, a voracious reader who co‑organizes a book club alternating contemporary fiction by Chimamanda Ngozi Adichie with popular science by Carl Sagan, enjoys photographing New England
    fall foliage à la Ansel Adams, and unwinds to indie folk artists like Sufjan Stevens and folk‑rock band The Lumineers.
  travel: Felicie Hastings, a meticulous planner, plots weekend escapes to the White Mountains for photography hikes, has already explored Portland, Maine and Boston’s historic neighborhoods, dreams of
    a spring trip to Kyoto’s cherry blossoms, and balances travel ambitions with a saved‑up travel fund and a limited vacation allowance.
  culinary: Felicie Hastings, a competent home cook, loves crafting creamy New England clam chowder, mastering spicy Thai green curry with fresh lemongrass, prepping quinoa‑black bean salads for the book
    club, and savoring artisanal espresso while occasionally indulging in a decadent chocolate lava cake after a long workday.
  core: Felicie Hastings blends analytical rigor with contagious sociability, turning every legal brief into a well‑orchestrated project, every hike into a photo essay, and every budget into a precise spreadsheet—though
    they can’t resist a late‑night Arduino kit purchase.
background:
  cultural: Felicie grew up in suburban Massachusetts, the daughter of Irish‑American parents who valued education, community service, and self‑reliance. Her family celebrated traditional holidays like
    St. Patrick’s Day and held gatherings that emphasized storytelling and shared meals. She attended public schools in the Middlesex County area, where she was exposed to a diverse mix of cultural perspectives,
    shaping an inclusive outlook. The New England emphasis on civic engagement encouraged her early involvement in volunteer initiatives, and the region’s strong academic culture supported her pursuit of
    a STEM degree at a nearby university. While she identifies as white, she embraces the multicultural fabric of the Greater Boston area, regularly participating in community events, local farmers’ markets,
    and neighborhood associations.
attributes:
