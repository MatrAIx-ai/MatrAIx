persona_description: A scientist who specializes in the study of white blood cells, particularly CARD11 and GAKIN, and their role in immune cell activation and regulation. The scientist has published groundbreaking
  research on the discovery of GAKIN and its role in controlling CARD11 output, which has important implications for developing drugs to enhance the immune system and slow down hyperactive immune cells
  in cases of autoimmunity and cancer. The scientist has received support from grants from the National Institutes of Health and the American Cancer Society, as well as funds from the Johns Hopkins University's
  Institute for Cell Engineering, a Ruth L. Kirschstein National Research Service Award, a Kimmel Scholar Award, and a Rita Allen Foundation Scholar Award.
