    bingo and social events", "Community theater volunteering", "Fishing", "Church choir singing", "Historical tours of Suffolk"]'
  career_goals: Although retired, Dwight aspires to deepen his impact on the Suffolk community. He plans to launch a neighborhood art and history series that brings together seniors and youths to explore
    African American heritage through storytelling, visual arts, and music. He also hopes to expand the community garden he tends, turning it into a collaborative space for food education and intergenerational
    bonding. Additionally, Dwight dreams of writing a memoir that weaves his personal experiences with broader historical narratives, hoping it will serve as a resource for future generations. He remains
    committed to supporting his wife and staying actively engaged in local church and senior programs.
