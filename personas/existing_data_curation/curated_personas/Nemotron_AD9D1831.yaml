  career_goals: Samantha aims to transition back into the professional sphere by establishing herself as a freelance data analytics consultant for small businesses in the Dallas‑Fort Worth area, while also
    launching a community‑focused STEM outreach program for middle‑school students. She plans to earn a professional certification in data science within the next year and leverage her organizational strengths
    to balance her family commitments with a growing consulting portfolio. Ultimately, she aspires to be recognized as a local leader in STEM education and a trusted advisor to regional entrepreneurs.
