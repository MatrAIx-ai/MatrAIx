  hobbies: '[''Softball league'', ''Bowling'', ''Classic car restoration'', ''Fishing'', ''Woodworking'', ''Attending local festivals and charity events'', ''Community chess club'', ''DIY home improvement
    projects'']'
  career_goals: Quinton aims to transition into a senior supervisory role within the next few years, such as shift supervisor or production manager. He plans to earn a Six Sigma Green Belt and an OSHA certification
    to strengthen his expertise in process improvement and workplace safety. He also seeks to lead a cross‑functional team to achieve measurable reductions in downtime and boost overall plant efficiency.
    Long‑term, he envisions leveraging his experience to launch a small home‑based woodworking shop that can supplement his retirement income.
