  hobbies: '[''visiting art galleries and museums'',''reading contemporary fiction and philosophy'',''photography (film and digital)'',''solving puzzles and playing strategy board games'',''gardening (vegetable
    and ornamental)'',''home brewing (beer and cider)'',''volunteering as a museum docent'',''writing personal essays'',''small‑group dinner parties'',''listening to long‑form podcasts'']'
  career_goals: Lawrence aims to re‑enter the workforce through a role that merges his organizational strengths and love of art. He plans to complete a bachelor’s degree in art history or museum studies
    within two years, then pursue a master’s in museum curatorial practice. His long‑term ambition is to become a curator or collections manager at a regional museum or historical society, focusing on community‑focused
    exhibitions that highlight diverse narratives. He also envisions establishing a small consulting practice that helps nonprofit arts organizations streamline programming and fundraising, allowing him
    to maintain a balanced schedule that supports his family life.
