  career_goals: Christine aims to become a senior program director overseeing large‑scale, socially impactful technology initiatives within a forward‑thinking organization. She plans to deepen expertise
    in sustainable tech and inclusive product design, bridging her love for abstract art and technology. Over the next five years she will obtain PMP and Scrum Master certifications, pursue a part‑time
    MBA, and lead a flagship project that leverages digital platforms to empower underrepresented communities. She also aspires to expand her mentorship of women in STEM by establishing a company‑wide mentorship
    network, while integrating mindfulness practices into her leadership style to build resilient, high‑performing teams.
