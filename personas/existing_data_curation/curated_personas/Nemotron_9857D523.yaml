personas:
  professional: An accounting professional with a flair for clear communication, Payal Goyal leverages QuickBooks, SAP and Power BI to produce audit‑ready financial statements while they often improvise
    workflows and mediate between auditors and non‑financial staff, even as they wrestle with tight deadlines.
  sports: Payal Goyal fuels their fitness routine through regular jogs in Grant Park, participates in the Chicago Area Runners club, and cheers on the Chicago Cubs and the Chicago Bulls, while they occasionally
    skip a workout when a deadline looms, preferring a marathon of finance podcasts instead.
  arts: Payal Goyal finds artistic inspiration at the Art Institute of Chicago, regularly attending gallery openings featuring contemporary artists like Kehinde Wiley and Yayoi Kusama, and they often discuss
    the narrative depth of Frida Kahlo’s self‑portraits over coffee with friends, weaving these insights into their own photography of street scenes.
  travel: Payal Goyal blends spontaneous planning with purposeful travel, favoring weekend escapes to nearby wine regions such as Napa Valley and longer cultural immersions in Kyoto and Barcelona, all while
    balancing a modest travel budget and the desire to visit diaspora communities that mirror their own.
  culinary: Payal Goyal delights in cooking traditional Indian dishes such as butter chicken, dal makhani, and chana masala, while also experimenting with fusion creations like paneer‑taco sliders and mango‑coconut
    chutney, using spices like turmeric, cumin, and cardamom, though they sometimes forget to set the timer and end up over‑cooking the rice.
  core: Payal Goyal is a detail‑oriented accountant with a love for yoga, spontaneous culinary experiments, and community finance workshops, whose curiosity drives tech adoption yet whose flexible nature
    occasionally clashes with tight deadlines.
background:
  cultural: Payal was raised in a South Asian (Indian) household that balanced traditional values with the realities of suburban American life in Delaware County. Her family originates from Gujarat, and
    she grew up speaking Hindi and Gujarati at home while attending an English‑medium school. Cultural celebrations such as Diwali, Holi, and Navratri remain central to her family rituals, and she maintains
    strong ties to the local Indian diaspora through community events, temple gatherings, and cultural festivals. These experiences have instilled in her a deep respect for education, communal harmony,
    and service to others, which she weaves into both her professional ethos and her personal pursuits.
attributes:
  skills: '[''Financial statement preparation'', ''Internal audit'', ''Tax compliance (U.S.)'', ''GAAP knowledge'', ''Data analysis with Excel and Power BI'', ''Accounting software (QuickBooks, SAP)'',
