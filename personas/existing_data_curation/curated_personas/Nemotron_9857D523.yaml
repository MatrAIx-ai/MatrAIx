    workshops for immigrant communities'', ''Playing board games and solving puzzles'']'
  career_goals: Payal aims to become a Certified Public Accountant and move into a senior audit manager role within the next five years, where she can lead a diverse team and shape audit strategies that
    incorporate new technologies like AI‑driven analytics. She is also interested in developing a niche expertise in ESG (environmental, social, and governance) reporting, aligning her professional growth
    with her personal commitment to social responsibility. Ultimately, she envisions either advancing to a partnership position at a mid‑size firm or launching her own consultancy that helps small businesses,
    especially within immigrant communities, navigate financial compliance and sustainability reporting.
