personas:
  professional: Aaron Stinson is a seasoned welder and metal-fabrication expert whose three decades of MIG, TIG, and stick welding mastery, meticulous blueprint reading, and safety-first mindset support
    his pursuit of the American Welding Society Certified Master Welder credential and a future boutique shop dedicated to restoring historic New Orleans iron balconies, even as his love for spontaneous
    jam sessions occasionally throws his project deadlines off-track, yet they maintain a generous mentorship style that keeps apprentices motivated.
  sports: Aaron Stinson is a fervent follower of the New Orleans Saints, plays occasional pick-up basketball at the local YMCA, and joins the Bayou Anglers Club for early-morning catfish trips on Lake Pontchartrain
    that double as his fitness routine, though they sometimes miss seasonal training sessions because their preference for routine clashes with spontaneous weekend jam obligations.
  arts: Aaron Stinson channels the city's brass-band soul by trumpeting with the Gentilly Jazz Collective alongside local legends like Kermit Ruffins, attending Preservation Hall shows and Mardi Gras parades,
    and curating playlists of Wynton Marsalis recordings, while they grapple with the anxiety of keeping up with new repertoire and often stay up late rehearsing to perfect a solo.
  travel: Aaron Stinson prefers low-key road trips that blend familiar routine with modest adventure, regularly escaping to Grand Isle's Gulf-shore beaches or the historic streets of St. Louis, and dreams
    of a jazz-themed pilgrimage to Marseille and a spontaneous weekend sailing tour of the Florida Keys whenever work eases up, though they frequently postpone such trips due to a tight budget and lingering
    worry about future expenses.
  culinary: Aaron Stinson is an avid home-chef who builds a dark, velvety roux for gumbo brimming with andouille sausage, shrimp, and okra, masterfully prepares jambalaya loaded with smoked sausage and
    bell peppers, and delights friends with fresh beignets dusted in powdered sugar, yet they sometimes over-season during late-night jam sessions, leading to overly salty dishes that become a running joke
    among the crew.
  core: Aaron Stinson blends a steadfast respect for routine with a spontaneous love of jazz, juggling a welding career, vintage motorcycle restorations, and nightly trumpet sessions while battling chronic
    worry that makes them double-check every bolt, every recipe, and every budget line.
background:
  cultural: Aaron grew up in the Gentilly neighborhood of New Orleans in a working‑class family with deep Southern and French‑Cajun roots. His father worked as a shipyard mechanic and his mother was an
    elementary school teacher, instilling in him a strong work ethic and respect for education. Immersed in the city’s vibrant mix of music, food, and historic architecture, Aaron identifies closely with
    New Orleans’ communal spirit. He regularly participates in local festivals, supports neighborhood brass bands, and takes pride in preserving the city’s historic ironwork. While his ethnic background
    is white, his upbringing exposed him to the multicultural tapestry of the region, giving him a nuanced appreciation for Creole traditions, jazz rhythm, and the collective solidarity of his community.
attributes:
  skills: '["MIG welding", "TIG welding", "Stick welding", "Oxy-fuel brazing", "Blueprint reading", "Pipe fitting", "Metal fabrication", "Equipment maintenance", "Safety compliance", "Team mentorship",
