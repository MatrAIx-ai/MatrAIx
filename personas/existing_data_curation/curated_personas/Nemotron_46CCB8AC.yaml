  hobbies: '["Playing trumpet in a jazz ensemble", "Attending Mardi Gras parades", "Cooking Cajun cuisine", "Fishing in the bayou", "Volunteering to teach metalworking", "Restoring vintage motorcycles",
    "Bowling league"]'
  career_goals: Aaron aims to achieve the American Welding Society Certified Master Welder credential within the next two years, positioning himself for a foreman or lead‑fabricator role at his current
    plant. He also dreams of opening a boutique metal‑work shop that specializes in restoring historic ironwork—balconies, gates, and railings—found throughout New Orleans’ historic neighborhoods. By combining
    his welding expertise with a love for the city’s architectural heritage, he hopes to preserve local landmarks while providing steady work for younger tradespeople he mentors. Long‑term, he seeks a balanced
    lifestyle that offers financial stability, reduced work‑related stress, and more time for community involvement.
