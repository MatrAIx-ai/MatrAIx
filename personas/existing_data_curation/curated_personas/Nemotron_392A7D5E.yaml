  hobbies: '[''Surfing'', ''Hiking volcanic trails'', ''Visiting art galleries and street murals'', ''Playing guitar'', ''Photography'', ''Volunteering at community festivals'', ''Cooking Puerto Rican–Hawaiian
    fusion dishes'', ''Beach volleyball'', ''Attending workshops on creative marketing'', ''Exploring new cafés and food trucks'']'
  career_goals: Luis aims to become a top‑producing insurance professional in Kauai, earning industry credentials such as the CPCU (Chartered Property Casualty Underwriter) and CLU (Chartered Life Underwriter)
    to deepen his expertise. In the next five years he hopes to transition into a leadership role, managing a small team of agents where he can mentor newcomers and shape a collaborative, people‑first sales
    culture. He also dreams of eventually opening his own boutique agency that blends traditional insurance services with creative, community‑focused marketing—using his love of art and local culture to
    design campaigns that resonate with island residents and support local artists. Continuing education through night courses in business management is part of his plan to strengthen his managerial skills
    while maintaining the flexibility he values.
