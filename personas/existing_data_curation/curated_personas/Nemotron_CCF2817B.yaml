  career_goals: Annamarie aims to advance within the manufacturing sector by first earning a certification in Advanced Manufacturing Technology and completing an associate degree in Industrial Engineering.
    She aspires to become a shift supervisor within the next two years, taking on responsibilities for team leadership, training new operators, and driving efficiency projects. Ultimately, she envisions
    a role as a production manager where she can implement lean initiatives, mentor staff, and contribute to strategic planning for the plant's growth while maintaining a supportive workplace culture.
