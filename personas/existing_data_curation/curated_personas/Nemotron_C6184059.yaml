  hobbies: '[''Abstract painting'', ''Sketching'', ''Science-fiction reading'', ''Creative writing'', ''Photography'', ''Synthesizer music'', ''Vinyl record collecting'', ''Hiking'', ''Meditation'', ''Digital
    collage'']'
  career_goals: Stephan aims to move from his current phlebotomy role to a senior supervisory position within the local hospital or a regional laboratory, eventually becoming a certified clinical educator
    who trains new phlebotomists. He plans to pursue an associate degree in medical technology to broaden his clinical knowledge, with a long‑term ambition to design innovative patient‑engagement tools
    that incorporate visual art and interactive media. Outside the medical field, he hopes to develop a side venture selling his abstract artwork and digital collages, merging his professional expertise
    with his creative passions.
