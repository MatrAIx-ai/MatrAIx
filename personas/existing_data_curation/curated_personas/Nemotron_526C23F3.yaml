personas:
  professional: Letha Blackamore, a 25‑year‑old event‑planning specialist, leverages a methodical, data‑driven approach, meticulous budgeting, and relentless negotiation skills to deliver seamless corporate
    conventions, all while maintaining a healthy skepticism toward vendor promises and thriving under pressure, and they consistently transform chaos into order.
  sports: Letha Blackamore, 25, runs regularly on the Schuylkill River Trail as a member of the Philadelphia Trail Runners Club, hits the CrossFit Box for strength training, follows the Philadelphia Eagles
    (NFL) and Philadelphia 76ers (NBA) with an avid fan‑club membership, and seasonally attends Philadelphia Phillies (MLB) games for a balanced sports immersion, and they treat each activity as a data‑driven
    check on personal performance.
  arts: Letha Blackamore, 25, immerses themselves in Philadelphia’s jazz scene by frequenting Chris Scott Jazz Club, curates playlists that dialogue between Miles Davis and Kamasi Washington, draws visual
    inspiration from Kehinde Wiley’s portraiture, and attends off‑Broadway performances of Lin‑Manuel Miranda’s work when touring, and they view art as a catalyst for creative problem‑solving in event design.
  travel: Letha Blackamore, 25, prefers meticulously planned short trips that blend historic exploration and culinary discovery, such as weekend tours of Old City Philadelphia, a spring hike in the Blue
    Ridge Mountains, and a month‑long cultural immersion in Marrakech, Morocco, all balanced against a modest travel budget and career commitments, and they schedule each journey with the same spreadsheet
    precision used for conference logistics.
  culinary: Letha Blackamore, 25, experiments with soul‑food classics like shrimp and grits, collard greens seasoned with smoked paprika, and sweet‑potato pie, sources fresh okra and locally harvested honey
    from Reading Terminal Market, and pairs each dish with a curated jazz soundtrack, and they consider their kitchen a laboratory where disciplined technique meets spontaneous flavor.
  core: Letha Blackamore, a 25‑year‑old event planner, blends razor‑sharp organization with a competitive edge, quiet skepticism, and a weekend habit of soul‑food cooking that often leaves the apartment
    scented with fried chicken and jazz, and they seldom miss a deadline.
background:
  cultural: Letha is a second‑generation African‑American raised in the multicultural fabric of Philadelphia’s Montgomery County suburbs. Her family’s traditions—Sunday church gatherings, Southern soul
    cooking, and annual Juneteenth celebrations—have instilled a strong sense of community and pride in Black heritage. She grew up attending local festivals, church choirs, and community basketball leagues,
    which taught her the value of teamwork and resilience. These cultural touchstones influence her approach to event planning, as she strives to create inclusive spaces that honor diverse voices and reflect
    the vibrant Black culture of her city.
attributes:
  skills: '[''Event logistics coordination'', ''Vendor negotiation'', ''Budget development and control'', ''Timeline and project management'', ''Risk assessment and contingency planning'', ''Client relationship
    management'', ''Use of event management software (Cvent, Social Tables, Asana)'', ''Data analysis for post‑event evaluation'', ''On‑site execution and troubleshooting'', ''Team leadership and delegation'']'
  hobbies: '[''Running'', ''Yoga'', ''Strength training'', ''Reading non‑fiction (leadership, logistics, Black entrepreneurship)'', ''Volunteer STEM tutoring'', ''Exploring Philadelphia’s historic sites'',
    ''Attending jazz concerts'', ''Soul‑food cooking'']'
  career_goals: Letha aims to become a senior director of events within the next five years, overseeing large‑scale national conventions for Fortune‑500 companies. She plans to earn the Certified Meeting
    Professional (CMP) credential and eventually launch her own boutique event‑planning firm that specializes in hybrid experiences that blend live and virtual elements. She is also interested in mentoring
    emerging planners from underrepresented backgrounds and advocating for more inclusive conference programming.
