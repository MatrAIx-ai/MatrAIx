  career_goals: Steven aims to transition from bedside nursing to a leadership role that leverages his organizational strengths. Over the next five years he plans to complete a Bachelor of Science in Nursing
    (BSN) through an online program, obtain a Certified Nurse Manager and Executive (CNME) credential, and move into a nurse manager or clinical educator position at a local hospital or community health
    center. He is passionate about establishing a structured mentorship program for new nurses in Walton County, implementing evidence‑based protocols to improve patient safety, and expanding community
    health outreach—particularly home‑based chronic disease management and flu‑vaccination drives for seniors. Ultimately, he aspires to influence healthcare policy at the county level, advocating for resources
    that support aging populations.
