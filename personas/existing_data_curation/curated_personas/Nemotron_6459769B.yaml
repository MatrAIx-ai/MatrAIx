  career_goals: Dominic is fascinated by how things are built and organized. He often imagines designing bridges and playgrounds that are safe and fun for his community, leading him to express a goal of
    becoming a civil engineer, where he can apply his love for structure and practical problem‑solving. At the same time, his caring nature and enjoyment of helping classmates inspire him to consider a
    future as a teacher, especially one who can support younger children in learning both English and Spanish. He dreams of combining these paths by eventually working on educational infrastructure projects
    that improve schools in his neighborhood.
