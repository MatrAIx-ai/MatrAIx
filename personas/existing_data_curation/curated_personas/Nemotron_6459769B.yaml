personas:
  professional: Dominic Rosario, an 8‑year‑old budding LEGO architect and Scratch coder, shows they thrive on structure by designing intricate cityscapes, assembling simple robotic kits, and scripting short
    interactive stories, all while keeping each piece meticulously cataloged in color‑coded bins.
  sports: Dominic Rosario, an 8‑year‑old member of the neighborhood junior soccer team the Downtown Strikers, enjoys after‑school matches on the local field, idolizes the city’s professional side‑kick team
    Metro United, prefers small‑group drills over large scrimmages, and shows they delight in scoring goals while maintaining good sportsmanship.
  arts: Dominic Rosario, an 8‑year‑old cartoon enthusiast, fills sketchbooks with original comic strips, dances to the rhythmic beats of reggaeton and traditional plena in their room, watches animated films
    by Pixar and Studio Ghibli for inspiration, and often blends storytelling structure with spontaneous doodles, revealing a creative spirit that balances order and spontaneity.
  travel: Dominic Rosario, an 8‑year‑old explorer, favors day trips to the nearby state park where they trail, catalog rocks, and map routes in a pocket notebook, dreams of visiting Yellowstone’s geysers
    and New York City’s towering skyline, and plans each outing with a checklist, combining predictable preparation with a yearning for new horizons.
  culinary: Dominic Rosario, an 8‑year‑old kitchen helper, assists their mother whipping up classic family dishes like arroz con gandules, learns to measure ingredients such as sofrito and cumin, enjoys
    assembling mini pizza bites topped with pepperoni and mozzarella, experiments with adding chocolate chips to cookie dough, yet sometimes rushes and forgets to wash their hands before cooking.
  core: Dominic Rosario, an 8‑year‑old who thrives on orderly LEGO builds and structured Scratch projects while sneaking extra candy when unsupervised, blends a love for soccer camaraderie, spontaneous
    dancing, and meticulous organization into a uniquely balanced childhood routine.
background:
  cultural: Dominic comes from a Puerto Rican family that has lived in Vernon Rockville, Connecticut for several generations. At home, Spanish is spoken alongside English, and he routinely hears stories
    about the island's landscapes, traditions, and festivals. His family celebrates both Puerto Rican holidays—such as Three Kings Day and the Puerto Rican Day Parade in nearby Hartford—and American holidays
    like Thanksgiving and Independence Day, often blending foods from both cultures. Meals often feature staples like arroz con gandules, pasteles, and plantain chips, which Dominic enjoys helping to prepare.
    He has attended local Hispanic cultural events, such as the annual Puerto Rican Festival at the Connecticut Convention Center, where he participated in dance workshops and learned traditional percussion
    instruments. The blend of island heritage and New England community life has shaped his identity, fostering a strong sense of family, bilingualism, and appreciation for cultural diversity.
