  hobbies: '[''Hosting game nights'', ''Potluck barbecues'', ''Community trivia sessions'', ''Maritime history research'', ''Genealogy exploration'', ''Historic preservation volunteering'', ''Fishing on
    the Taunton River'', ''Attending Red Sox games'', ''Watching local high‑school football'', ''Riverfront walks'', ''Gardening'', ''Singing in a community choir'']'
  career_goals: Kishore aims to advance to a supervisory role within the dispatch center, where he can shape shift schedules, implement new dispatch technologies, and formalize a peer‑support program to
    address the mental‑health challenges that dispatchers often face. He is interested in earning a certification in emergency management to broaden his contributions to regional disaster‑planning committees.
    Long‑term, Kishore envisions serving as a community safety liaison, bridging the gap between the dispatcher department, local fire and police services, and neighborhood groups, using his personable
    nature to foster trust and collaborative preparedness initiatives.
