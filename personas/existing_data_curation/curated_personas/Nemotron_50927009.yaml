personas:
  professional: An executive secretary with a flair for arts‑infused organization, Jose Ramos leverages bilingual fluency, Canva design flair, and a love for community arts to transform routine office tasks
    into culturally enriched experiences, while they juggle a spontaneous approach that sometimes clashes with strict deadlines.
  sports: Jose Ramos prioritizes outdoor cardio, joining a local hiking club that explores the Cordillera Central trails and cheering on the Cangrejeros de Santurce baseball team while they occasionally
    play pickup basketball at the community center.
  arts: Jose Ramos immerses themselves in the local art scene, sketching murals inspired by the works of street artist Varela, they curate playlists that blend salsa legend Héctor Lavoe with modern reggaeton
    star Bad Bunny, and they attend gallery openings featuring painter Néstor Daví.
  travel: Jose Ramos favors spontaneous weekend getaways, recently backpacking through the historic streets of Old San Juan and dreaming of trekking the Andes to Machu Picchu, yet they always balance travel
    plans with the modest budget of a young professional.
  culinary: Jose Ramos enjoys cooking traditional arroz con gandules and pasteles with a modern twist, experimenting with plantains and achiote, while they also delight in trying street food like alcapurrias
    when dining out, though they often forget to defrost ingredients in time.
  core: Jose Ramos is a culturally driven, creatively restless young professional who blends administrative agility with artistic passion, wrestles with spontaneous habits and occasional anxiety, and constantly
    seeks vibrant experiences across work, art, and adventure, often feeling they are juggling too many projects at once.
background:
  cultural: Jose Enrique is a 22‑year‑old Puerto Rican from Coamo, a municipality steeped in agricultural heritage, colonial architecture, and renowned for its natural hot springs. He was raised in a close‑knit,
    multigenerational family where Catholic traditions, weekly family meals, and community celebrations like the San José Festival shaped his upbringing. Bilingual in Spanish and English, he embodies the
    island’s cultural duality—honoring Taíno, Spanish, and African influences reflected in local music, cuisine, and folklore. His community values of hospitality, resilience, and collective pride have
    fostered his collaborative spirit and strong sense of local identity. Coamo’s vibrant street art, lively plaza gatherings, and the annual "Feria de la Patilla" have nurtured his appreciation for artistic
    expression and public cultural events, motivating him to integrate these cultural elements into his personal and professional life.
