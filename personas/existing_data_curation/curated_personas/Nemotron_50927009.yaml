  hobbies: '[''Street Photography'', ''Salsa Dancing'', ''Visiting Art Galleries'', ''Sketching'', ''Hiking in the Cordillera Central'', ''Cooking Traditional Puerto Rican Dishes'', ''Reading Contemporary
    Fiction and Art Criticism'', ''Mentoring Youth in Creative Writing'', ''Volunteering at Community Cultural Festivals'', ''Curating Music Playlists (Bomba, Plena, Reggaeton)'']'
  career_goals: Jose Enrique aims to advance from his current executive secretary position to a senior executive assistant role supporting a senior executive in a culturally oriented organization, such
    as a museum, arts foundation, or municipal cultural department. He plans to obtain a Certified Administrative Professional (CAP) credential and enroll in courses in project management and arts administration
    to blend his administrative strengths with his passion for the arts. Over the next five years, he envisions leading a small team of administrative staff, overseeing the planning and execution of community
    art events, and serving as a liaison between artistic creators and municipal sponsors. Ultimately, he hopes to create a niche as a cultural program coordinator where he can apply his organizational
    agility, bilingual communication, and creative eye to foster inclusive artistic experiences in Coamo and beyond.
