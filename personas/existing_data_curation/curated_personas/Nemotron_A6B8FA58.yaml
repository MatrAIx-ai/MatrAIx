  career_goals: Arthur aspires to turn his love for art and helping others into a career. In the next few years, he plans to complete his high school education, pursue a dual focus on visual arts and psychology
    in college, and eventually become an art therapist or community program director. He envisions creating workshops where young people use drawing, digital media, and storytelling to process emotions
    and build resilience. He also hopes to work with local nonprofits in Riverside County to develop after‑school art initiatives that promote mental wellness and cultural expression. His long‑term ambition
    includes establishing a youth art center that blends creative practice with peer support.
