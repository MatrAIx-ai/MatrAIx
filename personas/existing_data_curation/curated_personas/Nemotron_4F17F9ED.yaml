personas:
  professional: Charles Jones is a 28-year-old aspiring technical handyman who bridges hands-on home-repair expertise with emerging smart-home technology, leveraging his organized, adaptable problem-solving
    style to launch a freelance portfolio while pursuing an associate degree in electrical engineering technology, and they consistently present project plans with calm, clear confidence.
  sports: Charles Jones enjoys hiking Red Rock Canyon and weekend fishing at Lake Mead, participates in a 5K run organized by the Henderson Trails Club, follows the Las Vegas Raiders NFL team and the Vegas
    Golden Knights NHL team, and they balance this active lifestyle with occasional pick-up basketball games at the local community center.
  arts: Charles Jones channels his curiosity and practicality into creative pursuits, building detailed model airplane kits while listening to The Smiths, capturing sunrise shots at Red Rock Canyon in the
    style of Ansel Adams, unwinding with retro games like Super Mario Bros. and The Legend of Zelda, and they attend monthly indie-film screenings featuring the work of director Christopher Nolan.
  travel: Charles Jones prefers meticulously planned weekend getaways that blend adventure and relaxation, using a custom spreadsheet to budget trips to nearby gems such as Zion National Park and Moab's
    Arches, while dreaming of a solo journey to Tokyo's Akihabara district to explore cutting-edge electronics and retro gaming culture, and they schedule each departure to maximize daylight hiking time.
  culinary: Charles Jones enjoys a pragmatic yet curious palate, regularly cooking grilled trout with lemon-butter and cumin-spiced chili con carne for his hikes, experimenting with a homemade sourdough
    starter controlled by a Raspberry Pi temperature sensor, and indulging in weekend visits to Las Vegas staples like Lotus of Siam for spicy papaya salad and an In-N-Out burger, while they keep a modest
    collection of specialty hot sauces for added flavor.
  core: Charles Jones is a calm, methodical tinkerer who balances a love for rugged Nevada outdoors with meticulous DIY projects, yet they habitually procrastinate on dental appointments and obsessively
    check their smart-home devices before bedtime.
background:
  cultural: Charles grew up in a suburban middle‑class environment in the Las Vegas metropolitan area, raised by parents of Anglo‑American heritage. His upbringing reflected typical Western American values—self‑reliance,
    community involvement, and respect for individual freedom—while also being shaped by Nevada’s desert culture and the multicultural tapestry of Clark County. He attended the local public high school,
    where he was exposed to a diverse peer group and community events that fostered an inclusive outlook. His cultural identity blends traditional American customs (holiday celebrations, sports fandom)
    with a pragmatic, forward‑looking mindset common among millennials in the Southwest.
attributes:
  skills: '[''Home repair (plumbing, electrical, carpentry)'', ''Computer troubleshooting'', ''Basic Python programming'', ''Spreadsheet and data management'', ''Project planning and time management'',
