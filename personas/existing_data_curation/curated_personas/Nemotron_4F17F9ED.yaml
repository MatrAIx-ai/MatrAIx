  hobbies: '[''Hiking and nature photography'', ''Fishing at Lake Mead'', ''Model kit building (airplanes, RC cars)'', ''Arduino and Raspberry Pi tinkering'', ''Reading non‑fiction (technology, productivity)'',
    ''Board‑game meetups'', ''Volunteer community projects'', ''Retro video gaming'']'
  career_goals: Charles aims to translate his practical abilities into a stable technical career within the next two years. He plans to enroll in a community college associate program in electrical or mechanical
    engineering technology, while simultaneously building a freelance handyman portfolio that showcases his repair and DIY projects. His long‑term ambition is to own a small service business that offers
    affordable home maintenance and smart‑home installation services to residents of Henderson and the broader Las Vegas area. He also hopes to achieve financial independence, allowing him to support future
    personal endeavors such as traveling and potential homeownership.
