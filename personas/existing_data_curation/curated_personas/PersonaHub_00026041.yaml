persona_description: A historian or a Japanese studies scholar who is interested in the history and culture of Japan, particularly the period of the Taika Reforms. They are knowledgeable about the reforms,
  the historical context, and the impact they had on Japanese society and culture. They are also interested in the role of the imperial court and the centralization of power during this time. They may have
  a particular interest in the role of Confucianism in the reforms and its influence on Japanese culture.
