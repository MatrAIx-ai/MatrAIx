  career_goals: Zachary aims to transform his family‑run shop into a boutique design‑build studio that serves high‑end residential clients throughout the Mid‑Atlantic. He plans to launch a signature line
    of handcrafted furniture sold online, emphasizing reclaimed wood and sustainable finishes. Earning certification from the American Furniture Makers Association and expanding his CNC capabilities are
    top priorities. He also envisions establishing a formal apprenticeship program to pass his craft to the next generation, while maintaining a reputation for reliability and meticulous quality that keeps
    his customers returning despite competitive pressure.
