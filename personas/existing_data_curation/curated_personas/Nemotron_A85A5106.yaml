personas:
  professional: Zachary Thompson is a master cabinetmaker who blends traditional mortise‑and‑tenon joinery with cutting‑edge CNC precision, runs an ultra‑organized boutique studio, mentors apprentices with
    a talkative, charismatic style, and uses his competitive, detail‑obsessed nature to secure high‑end residential commissions throughout the Mid‑Atlantic.
  sports: Zachary Thompson follows the Washington Commanders and the Washington Capitals, trains with the local fly‑fishing association, treks sections of the nearby mountain trail each spring, and joins
    a weekend basketball pickup league for a dose of competitive cardio.
  arts: Zachary Thompson showcases their love for regional folk music by playing banjo at bluegrass jam sessions inspired by Bill Monroe and Earl Scruggs, singing in the church choir alongside renditions
    of Alison Krauss, and volunteering as a set builder and occasional actor for community theatre productions such as The Music Man.
  travel: Zachary Thompson prefers meticulously planned road trips that combine rugged hikes on the Blue Ridge Parkway, tasting craft brews in Asheville, exploring historic fairs in Gettysburg, and occasionally
    splurging on a week‑long vineyard tour in Napa Valley, always balancing family time with a desire for new scenic inspiration.
  culinary: Zachary Thompson delights in cooking smoked pork shoulder glazed with apple butter, hearty soup beans with cornbread, and crunchy hush puppies, while honing their home‑brewing skills to pair
    each meal with a custom‑crafted amber ale featuring locally sourced hops and a dash of honey.
  core: Zachary Thompson fuses old‑world craftsmanship with modern tech, lives out loud in community jams and theatre, worries over every detail, and fiercely competes to make every piece and moment a masterpiece.
background:
  cultural: Zachary grew up in a small town near Martinsburg, WV, steeped in Appalachian traditions. His family has deep roots in the region’s working‑class culture—his father was a machinist and his grandparents
    farmed the Shenandoah Valley. Raised in a Baptist household, he participated in church activities and community fairs, developing a strong sense of self‑reliance, craftsmanship, and local pride. He
    attended a community college for a couple of years, studying wood technology before committing to an apprenticeship. The region’s emphasis on storytelling, folk music, and practical ingenuity shapes
    his worldview, balancing curiosity about new techniques with respect for established methods.
