  career_goals: Juan aims to advance to a supervisory or lead position within the logistics and packaging department, where he can oversee larger teams and drive sustainability initiatives. He plans to
    earn a Certified Logistics Associate credential and attend workshops on eco‑friendly packaging materials. Leveraging his artistic interests, he aspires to start a side venture creating custom, culturally
    inspired packaging for local Mexican food producers and artisans. In the longer term, Juan hopes to combine his operational expertise with design sensibilities to influence broader supply‑chain strategies
    that prioritize both efficiency and visual appeal.
