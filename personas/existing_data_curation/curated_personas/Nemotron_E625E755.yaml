personas:
  professional: Juan Hernandezsantiago, a seasoned warehouse packaging specialist with forklift certification and OSHA expertise, channels their curiosity and love for aesthetics into designing visually
    appealing packaging while leading a team with a balanced mix of organization and flexibility, consistently solving problems under pressure.
  sports: Juan Hernandezsantiago hikes the San Gabriel Mountains with a local outdoors club, follows the Los Angeles Lakers and Dodgers for basketball and baseball, and joins weekend pick‑up soccer games
    at a community field, balancing cardio with occasional weight‑training at a nearby gym.
  arts: Juan Hernandezsantiago paints vibrant canvases that fuse California vistas with motifs from their family heritage, frequents the LA Arts District to admire works by Banksy and Jean‑Michel Basquiat,
    and strums acoustic guitar around family gatherings, drawing inspiration from Bob Dylan and John Mayer.
  travel: Juan Hernandezsantiago prefers self‑planned road trips that combine natural wonders like Yosemite and Sedona with cultural stops in Santa Fe and Barcelona, often budgeting trips around family
    obligations and occasionally dreaming of a culinary tour through Oaxaca's markets.
  culinary: Juan Hernandezsantiago enjoys cooking family recipes such as tamales and mole, experimenting with fusion twists that incorporate rosemary‑infused salsas, while their succulent garden supplies
    fresh herbs for dishes like grilled fish tacos with citrus‑lime glaze.
  core: Juan Hernandezsantiago blends logistical precision with a painter’s eye, obsessively organizes their succulent garden, occasionally over‑seasoning dishes, and never misses a chance to sketch a sunset
    after a hike.
background:
  cultural: Juan is a first‑generation Mexican‑American who grew up in a bilingual household in Southern California. He maintains close ties to Mexican traditions, celebrating Día de los Muertos, Mexican
    Independence Day, and family gatherings centered around shared meals. Fluent in both Spanish and English, he often bridges cultural perspectives at work and in his community. His upbringing instilled
    a respect for family, community service, and the rich artistic heritage of Mexico, which he integrates into his everyday life in Covina, California.
attributes:
  skills: '[''Packaging Operations'', ''Inventory Management'', ''Quality Control'', ''Safety Compliance (OSHA)'', ''Forklift Operation'', ''Team Leadership'', ''Process Improvement'', ''Basic ERP Data
