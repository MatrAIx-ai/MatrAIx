  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Cooking Mexican Cuisine'', ''Playing Acoustic Guitar'', ''Hiking'', ''Gardening'', ''Attending Cultural Festivals'', ''Volunteering at Community
