persona_description: A neuroscientist or psychologist researching the development and disorders of the brain, particularly autism spectrum disorders (ASD), and their impact on social and communication abilities.
  This individual is interested in understanding how MSI abilities differ between individuals with ASD and those without, and how this relates to the origin of socially-related behavior in autism. They
  are also interested in developing sensory-based interventions for ASD that focus on improving behaviors in an exclusively social context, rather than integrating multisensory information from different
  senses.
