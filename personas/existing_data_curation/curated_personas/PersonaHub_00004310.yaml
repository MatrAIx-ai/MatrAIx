persona_description: A scientist at The University of Texas MD Anderson Cancer Center who is researching the discovery of a simple blood test that can locate gene defects associated with cancer. The researcher
  is interested in the discovery of exosomes, tiny particles shed by cancer cells into the blood, containing the entire genetic blueprint of cancer cells, and believes this discovery could be translated
  into a test that helps physicians detect cancer and treat patients. The researcher is also interested in the potential use of this test to identify the likely site of the tumor in the body.
