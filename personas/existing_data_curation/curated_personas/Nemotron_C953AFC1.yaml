personas:
  professional: Keyla Brown, a 27‑year‑old civil engineer, blends meticulous project planning and data‑driven design using AutoCAD Civil 3D, Revit, and GIS to craft climate‑resilient, equity‑focused infrastructure,
    leveraging their curiosity and practical mindset to balance innovative sustainable solutions with pragmatic budget constraints, while their organized, assertive communication style ensures clear stakeholder
    collaboration.
  sports: Keyla Brown, 27, enjoys hiking prairie trails at Kickapoo State Recreation Area with the local Trailblazers Hiking Club, practices yoga twice weekly at Serenity Yoga Studio, and loyally supports
    the Chicago Bears and Chicago Bulls while periodically joining a mixed‑gender softball league at Danville Community Park.
  arts: Keyla Brown, a 27‑year‑old guitarist, expresses creative energy through acoustic guitar, improvising blues riffs inspired by B.B. King and Robert Johnson, attending live jazz performances by the
    Danville Jazz Society featuring artists like Brad Mehldau and Esperanza Spalding, and immersing themselves in contemporary fiction such as the novel 'Homegoing'.
  travel: Keyla Brown, 27, prefers thoughtfully planned road trips that blend adventure and relaxation, often exploring Midwest highlights like Badlands National Park and the vibrant music scene of New
    Orleans, while dreaming of a solo pilgrimage to the historic streets of Savannah, all within a modest travel budget shaped by student loan repayments.
  culinary: Keyla Brown, a 27‑year‑old home cook, delights in preparing soulful dishes like collard greens slow‑cooked with smoked turkey, buttery cornbread, and sweet potato pie, showcasing a moderate
    to advanced kitchen skill set while occasionally adding modern twists such as chipotle‑roasted carrots, and frequently hosts community potluck gatherings where these comforting meals become a focal
    point of fellowship.
  core: Keyla Brown, at 27, is a detail‑oriented civil engineer driven to embed equity into climate‑resilient designs, yet their intense anxiety fuels late‑night guitar jams and occasional impulsive spending,
    all balanced by a steadfast commitment to community mentorship and structured planning.
background:
  cultural: Keyla grew up in a close‑knit African‑American community in Danville, where her grandparents were part of the Great Migration that settled in the Midwest. Her family maintains traditions such
    as celebrating Juneteenth, gathering for church potlucks, and sharing oral histories of resilience. She is actively involved with the local NAACP chapter and the historically Black church that runs
    a youth mentorship program, where she leads STEM workshops. Her cultural identity shapes her professional outlook, motivating her to champion equitable infrastructure that serves underserved neighborhoods.
    She also embraces contemporary Black culture through music, literature, and culinary traditions, weaving these influences into her social life and community service.
attributes:
  skills: '["Structural analysis", "Hydrologic modeling", "Transportation design", "AutoCAD Civil 3D", "Revit", "GIS mapping", "Sustainable construction", "Climate‑resilient infrastructure", "Python programming",
    "MATLAB", "Project budgeting", "Regulatory compliance", "Construction documentation", "Methodical problem solving", "Stakeholder communication", "Team coordination"]'
  hobbies: '["Hiking", "Landscape photography", "Yoga", "Guided meditation", "Acoustic guitar", "Soul‑food cooking", "Book club (African‑American literature)", "Live jazz concerts", "STEM mentorship", "Robotics
    workshops"]'
  career_goals: Keyla aims to obtain her Professional Engineer (PE) license within the next two years and transition into a senior project manager role overseeing large‑scale, sustainable infrastructure
    projects in the Midwest. She is passionate about integrating equity‑focused design into municipal water and flood mitigation systems, particularly for historically underserved neighborhoods in Vermilion
    County. Long‑term, she envisions founding a consulting firm that specializes in climate‑adaptable public works while creating mentorship pipelines for Black women in engineering. She also hopes to influence
    local policy by serving on the city planning commission, advocating for inclusive, data‑driven development.
