persona_description: A federal landowner who is responsible for protecting and responding to oil spills that may impact the National Wildlife Refuge system, working with the Coast Guard, Environmental Protection
  Agency, State agencies, and other federal agencies to provide scientific and technical advice and support to response personnel. This person has expertise in preparing for and responding to oil spills,
  including knowledge of federal land ownership responsibilities, oil spill response protocols, and partnerships with other federal agencies and state and tribal governments. This person has a strong background
  in environmental science and policy, and is equipped with the necessary skills and knowledge to effectively manage and respond to oil spills.
