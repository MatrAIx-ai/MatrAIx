persona_description: A scientist who specializes in the study of graphene and its properties, particularly the effects of grain boundaries on its electronic performance. They have conducted research on
  the use of scanning tunneling microscopy and spectroscopy to analyze the orientation angles between pieces of graphene during the growth process and the effects of grain boundaries on the electronic performance
  of graphene. They have also reported on their analysis of the orientation angles between pieces of graphene as they grow together, and found no preferential orientation angle between grains and the GBs
  are continuous across graphene wrinkles and SiO2 topography. They have also found that backscattering and intervalley scattering are the dominant mechanisms responsible for the mobility reduction in the
  presence of GBs in CVD-grown graphene. They have also reported on their findings and analysis of the orientation angles between pieces of graphene as they grow together, and found no preferential orientation
  angle between grains and the GBs are continuous across graphene wrinkles and SiO2 topography.
