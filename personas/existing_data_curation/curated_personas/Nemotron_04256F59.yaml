  hobbies: '["Reading mystery and historical fiction", "Gardening (vegetable and native flower beds)", "Nature hikes in local parks", "DIY home‑repair projects", "Cooking simple, healthy meals", "Knitting
    and crocheting", "Listening to sustainability podcasts", "Attending small community book clubs or neighborhood clean‑up events"]'
  career_goals: Ruby aims to transition from entry‑level cleaning to a supervisory or facilities‑manager role within the next five years. She plans to complete her college coursework in environmental studies
    and earn certifications such as the ISSA Certified Professional Cleaner and OSHA 30‑hour safety training. Ruby is interested in integrating sustainable practices into building maintenance, hoping to
    lead a green‑cleaning initiative for her employer. Long‑term, she envisions starting her own small, eco‑focused cleaning business that serves local businesses and residents, allowing her to mentor new
    staff and apply her practical knowledge in a leadership capacity.
