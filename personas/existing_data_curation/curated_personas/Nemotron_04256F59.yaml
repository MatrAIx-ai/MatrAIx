personas:
  professional: Ruby Curtis, a 30-year-old commercial cleaning specialist, blends meticulous floor-care expertise with a curiosity for eco-friendly solutions, asserting themselves when needed while thriving
    in flexible, improvisational schedules and aiming to lead a green-cleaning initiative as a future facilities manager.
  sports: Ruby Curtis is a devoted fan of the Denver Broncos and Colorado Rockies, joins a local trail-hiking club for weekend excursions, practices yoga once a week at a community center to counteract
    the physical demands of their job, and occasionally participates in a casual pick-up volleyball game at the neighborhood park.
  arts: Ruby Curtis finds creative escape in the haunting prose of Agatha Christie, the lyrical folk of Gillian Welch, and the atmospheric scores of composer Ennio Morricone, attends monthly indie-film
    screenings at a nearby art house theater, and contributes to a small book-club where they discuss mystery and historical fiction.
  travel: Ruby Curtis prefers low-key, nature-focused trips such as a road-trip through Yellowstone National Park and a weekend camping getaway to the Great Smoky Mountains, while dreaming of an eco-tour
    of Iceland’s geothermal sites, planning each journey with meticulous itineraries yet allowing plenty of spontaneous detours.
  culinary: Ruby Curtis enjoys cooking simple, nutrient-dense meals like quinoa-avocado salads, roasted root vegetable medleys seasoned with rosemary and thyme, and occasional chickpea tikka masala, handling
    kitchen tasks at an intermediate skill level and favoring fresh, locally sourced produce and whole-grain ingredients.
  core: Ruby Curtis is a pragmatic eco-enthusiast who turns everyday maintenance into a sustainable hobby, balancing a love for solitary mystery novels with a habit of misplacing keys and a knack for improvising
    green solutions on the fly.
background:
  cultural: Ruby grew up in a small Midwestern community in Ohio, where values such as hard work, modesty, self‑reliance, and neighborliness are emphasized. Her cultural upbringing reflects a practical,
    down‑to‑earth outlook, with a respect for trades and the importance of contributing to local community life. She was likely exposed to a blend of traditional American customs and church‑based community
    activities common in the region, shaping a worldview that balances independence with cooperative spirit. This background supports her pragmatic approach to work, her appreciation for sustainable practices,
    and her preference for close‑knit social settings.
attributes:
