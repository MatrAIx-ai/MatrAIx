    improvement projects'', ''Gardening'', ''Acoustic guitar playing'', ''Visiting local art galleries'', ''Volunteering at community garden'', ''Attending small workshops on eco‑design and crafts'']'
  career_goals: Paula aims to advance to a lead maintenance supervisor role within the next five years, overseeing a small team and managing larger facility projects. She plans to obtain certifications
    such as OSHA safety, HVAC technician licensure, and Energy Auditor credentials to deepen her expertise in sustainable building practices. In the long term, she envisions launching her own eco‑focused
    repair and retrofitting business that blends technical proficiency with design aesthetics, offering homeowners energy‑saving upgrades and environmentally responsible solutions. Continuing education
    through community college courses in green building and smart‑home tech remains a priority, as does mentoring younger apprentices who share her curiosity and drive for excellence.
