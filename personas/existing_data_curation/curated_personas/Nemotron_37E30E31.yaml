personas:
  professional: Paula Bozard is a hands‑on maintenance specialist who blends technical precision with an artist’s eye, using their expertise in electrical troubleshooting, plumbing, HVAC, and carpentry
    to design preventive‑maintenance schedules and smart‑home retrofits, while methodically working toward a lead supervisor role and pursuing OSHA safety, HVAC licensure, and Energy Auditor certifications.
  sports: Paula Bozard enjoys low‑impact fitness through weekend kayaking around Whidbey Island’s shoreline, seasonal hiking in Olympic National Park, and a casual spot on the local adult soccer team, while
    cheering on the Seattle Seahawks in autumn, the Seattle Sounders FC during summer, and the Seattle Mariners in the spring.
  arts: Paula Bozard channels their artistic side through watercolor paintings of Whidbey’s misty coast inspired by Georgia O'Keeffe, detailed nature photography echoing Ansel Adams, and acoustic guitar
    sessions covering Sufjan Stevens and Iron & Wine, while regularly attending gallery openings at the Whidbey Island Museum of Art and participating in local craft‑design workshops.
  travel: Paula Bozard plans trips with meticulous, map‑filled notebooks, favoring nature‑focused getaways such as weekend camps on the San Juan Islands, a coastal road trip through the Pacific Northwest
    to Vancouver and Portland, and a dream itinerary to Iceland’s volcanic landscapes, balancing a modest travel budget with a love for both solo exploration and small‑group photo‑hunting expeditions.
  culinary: Paula Bozard enjoys cooking sustainable meals with a moderate skill level, favoring cedar‑plank salmon, quinoa‑kale bowls, and homemade kimchi using fresh seaweed and ginger, often sourcing
    ingredients from the Whidbey Island farmer’s market, yet they occasionally succumb to late‑night pizza delivery after a long day of DIY projects.
  core: Paula Bozard blends a meticulous, DIY‑oriented mindset with a quiet curiosity for art and nature, juggling a competitive edge at work with a penchant for solitary sketching, occasional credit‑card
    procrastination, and a habit of humming folk tunes while tightening bolts.
background:
  cultural: Paula’s cultural background is rooted in mainstream White American culture of the Pacific Northwest. Growing up in Oak Harbor, she was shaped by the town’s maritime heritage, the nearby naval
    air station, and a community that values self‑reliance, environmental stewardship, and practical problem‑solving. Her family’s multigenerational ties to the region fostered an appreciation for local
    traditions and a modest, down‑to‑earth lifestyle. Exposure to a modest college education broadened her perspective, while the area's vibrant small‑scale arts scene nurtured her curiosity and love of
    creative expression.
