  hobbies: '[''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Cooking family recipes'', ''Walking in local parks'', ''Participating in a small book club'', ''Volunteering at a community food
    pantry'', ''Crossword puzzles'', ''Attending church fellowship events'']'
  career_goals: Callie aims to transition from a clerical role to a senior administrative position, such as Office Manager, within the next two years. Her goal is to streamline existing workflows, implement
    consistent filing procedures, and mentor younger employees to preserve institutional knowledge. She also hopes to develop a small training manual for best‑practice office routines, reflecting her love
    of structure and practicality. As she approaches retirement, Callie plans to shift part of her time to volunteer coordination at a local nonprofit, using her organizational expertise to support community
    outreach while maintaining a balanced, low‑stress work life.
