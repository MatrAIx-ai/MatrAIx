  career_goals: Cheyenne envisions a future where she can continue to serve her community while applying her love of learning. She plans to graduate high school with a focus on health sciences and social
    studies, aiming to pursue a college degree in nursing or education. Her ambition is to become a school counselor or a community health outreach coordinator, roles that let her blend curiosity about
    human well-being with practical problem‑solving. She hopes to earn a scholarship that will allow her to attend a Tennessee university, and later to develop programs that promote mental‑health awareness
    and youth engagement in her hometown.
