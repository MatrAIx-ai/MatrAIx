personas:
  professional: Cheyenne Wimberly is a budding community organizer who serves as captain of the middle school soccer team and stage manager for drama club productions, leveraging their curiosity, practical
    problem‑solving, and calm resilience to keep projects on schedule while fostering inclusive, harmonious group dynamics.
  sports: Cheyenne Wimberly plays midfield for the Midvale Middle Wolves soccer team, trains with the Riverbend Rovers youth club, follows the US Women’s National Soccer Team, and spends weekends hiking
    the nearby state park trails, using a mix of structured drills and spontaneous hill sprints to stay fit.
  arts: Cheyenne Wimberly thrives as a drama club lead, channeling the clever twists of Agatha Christie’s mystery novels into compelling performances, while crafting friendship bracelets to pop hits by
    Billie Eilish and drawing inspiration from Lin‑Manuel Miranda’s Broadway scores.
  travel: Cheyenne Wimberly prefers low‑key, adventure‑focused getaways, often planning weekend hikes with friends to Shenandoah National Park and dreaming of future trips to the Grand Canyon, balancing
    school commitments and a modest allowance by scouting free camping sites and seeking group discounts.
  culinary: Cheyenne Wimberly is an enthusiastic teenage baker who masters chocolate‑chip, snickerdoodle, and oatmeal‑raisin cookies, experiments with dark chocolate chunks, sea‑salt caramel swirls, and
    a dash of espresso powder, and often shares the warm results with teammates and church friends.
  core: Cheyenne Wimberly blends boundless sociability with an almost Zen calm, orchestrating friendships, soccer drills, and cookie batches with meticulous planning yet a playful flexibility that sometimes
    leads to last‑minute “just one more” baking experiments.
background:
  cultural: Cheyenne was raised in Lewisburg, a small town in Bedford County, Tennessee, within a family that values Southern hospitality, close community ties, and church involvement. The local culture
    emphasizes friendliness, generosity, and a strong sense of neighborly responsibility, all of which have shaped her cooperative and considerate outlook. She grew up attending community events such as
    the Bedford County Fair, enjoys regional music like country and bluegrass, and embraces traditional Southern foods that she often helps prepare at home. This cultural environment, combined with the
    modest, practical lifestyle of rural Tennessee, reinforces her calm resilience and practical curiosity.
