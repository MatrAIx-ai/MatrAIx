  career_goals: Although retired, Thanh aims to preserve her independence and contribute meaningfully to her community. She seeks to complete a memoir documenting her family’s Pittsburgh roots, mentor new
    volunteers at the senior center, expand her garden to provide fresh produce for the local food pantry, and maintain a stable health routine that mitigates her anxiety. Additionally, she wants to ensure
    her estate is organized, foster emotional resilience through regular therapy and mindfulness practice, and remain an active participant in neighborhood cultural events.
