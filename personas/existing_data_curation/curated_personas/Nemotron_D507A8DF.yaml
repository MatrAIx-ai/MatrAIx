personas:
  professional: A budding maintenance technician, David Franklin blends a hands‑on curiosity for Arduino gadgets with a community‑first mindset, leading intramural basketball pick‑ups and volunteering at
    local pancake breakfasts while juggling a relaxed approach to scheduling that often leaves them scrambling to meet deadlines, yet they stay motivated by the goal of launching a mobile repair service
    and eventually running youth programs at the town’s community center.
  sports: A socially active athlete, David Franklin spends weekends fishing at Lake B, dominates pick‑up basketball games at the community gym, and passionately supports the LSU Tigers and the New Orleans
    Pelicans, though they sometimes skip scheduled workouts in favor of spontaneous gatherings.
  arts: An acoustic‑guitar‑playing classic‑rock fan, David Franklin jams Led Zeppelin and The Rolling Stones tunes with friends after church youth meetings, curates meme posts on social media for laughs,
    and attends the local Grant Parish Folk Festival where they appreciate folk storytelling as much as electric guitar riffs.
  travel: An impulsive road‑trip enthusiast, David Franklin has road‑traveled to New Orleans for Mardi Gras, spent a weekend at the Gulf Coast beaches, dreams of hiking the Great Smoky Mountains, and prefers
    last‑minute planning that fits their modest student budget, even if they occasionally forget to pack essential gear.
  culinary: A comfort‑food‑devoted home cook, David Franklin favors fried chicken, cornbread, gumbo, and sweet tea at family Sunday dinners, but they also experiment with shrimp po’boys and homemade beignets,
    boasting just enough kitchen skill to grill a perfect steak while still relying on instant noodles for late‑night study sessions.
  core: David Franklin, a 20‑year‑old gadget‑tinkering, community‑oriented multitasker, balances hands‑on projects and social gatherings with a chronic worry streak and a love for spontaneous plans.
background:
  cultural: David grew up in a white, middle‑class family in Pineville, a small town in central Louisiana. His upbringing reflects the Southern hospitality and close‑knit community values common to the
    region. He attended the local public high school, where football games and church youth gatherings were central social hubs. Family traditions include Sunday dinner with fried chicken, cornbread, and
    sweet tea, as well as celebrating local events like the Grant Parish Folk Festival and Mardi Gras parades in nearby Alexandria. The blend of rural Louisiana culture, a strong church presence, and a
    modest economic environment has shaped his pragmatic outlook, love for community, and appreciation for both new ideas and time‑tested ways.
attributes:
  skills: '[''Basic automotive repair'', ''DIY electronics troubleshooting'', ''Carpentry'', ''Team leadership'', ''Public speaking'', ''Social media management'', ''Event coordination'', ''Problem solving'']'
  hobbies: '[''Pickup basketball'', ''Fishing'', ''Playing acoustic guitar'', ''DIY electronics projects'', ''Volunteering at community events'', ''Listening to classic rock'', ''Social media browsing'',
    ''Comedy shows'']'
  career_goals: David aims to translate his curiosity and practical skill set into a stable career that offers both variety and community impact. He plans to enroll in a community college trade program
    to become a certified maintenance technician while also gaining certifications in small‑business management. In the medium term, he hopes to open a mobile repair service that caters to residents of
    Grant Parish, allowing him to combine hands‑on work with flexible scheduling. He also aspires to take on a leadership role at a local community center, using his sociable nature to organize youth programs
    and events. Overcoming his tendency toward worry, he is working on building resilience and stress‑management habits to sustain long‑term professional growth.
