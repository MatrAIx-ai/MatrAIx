  hobbies: '[''watercolor painting'', ''yoga'', ''hiking'', ''reading contemporary fiction'', ''art theory study'', ''gallery visits'', ''indie film screenings'', ''book discussion circle'', ''volunteering
    art instruction'']'
  career_goals: She aims to transition into a senior leadership role, such as director of a cultural institution or head of community impact at a technology firm, where she can shape inclusive arts programming
    that reaches diverse Bay Area audiences. Over the next five years, she plans to secure sustainable funding streams, expand interdisciplinary collaborations, mentor emerging arts managers, and author
    a guide on arts administration in the digital age.
