  career_goals: Aims to blend scientific expertise with artistic expression by pursuing a role in science communication, visual storytelling, or user‑experience design that allows independent, project‑based
    work. Interested in graduate study in science journalism or a multidisciplinary design program, but seeks opportunities that offer flexibility and low‑stress environments. Ultimately hopes to create
    outreach content that demystifies complex STEM topics for diverse audiences while maintaining a schedule that accommodates personal well‑being.
