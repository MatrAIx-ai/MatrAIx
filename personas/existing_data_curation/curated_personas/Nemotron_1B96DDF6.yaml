personas:
  professional: A budding science communicator and visual storyteller, Kelly Tarvin leverages their data analysis and programming skills together with watercolor illustration and acoustic guitar rhythms
    to translate complex STEM topics into accessible narratives, thriving in flexible, project‑based environments but often battling self‑imposed deadline pressure due to spontaneous work habits.
  sports: Kelly Tarvin finds solace on the winding trails of Kent County’s nature preserves, regularly joining the local "Kent Trail Hikers" club for weekend treks, cheering on the Grand Rapids Griffins
    hockey team, and using autumn leaf‑watching walks as a low‑key fitness routine.
  arts: Kelly Tarvin immerses themselves in watercolor landscapes of local wetlands, strums acoustic versions of Joni Mitchell and Sufjan Stevens, creates digital illustrations inspired by Alphonse Mucha,
    and leads community art workshops where they teach printmaking while eagerly learning new mixed‑media techniques, often quoting Maya Angelou for inspiration.
  travel: Kelly Tarvin's travel style blends spur‑of‑the‑moment weekend escapes to Michigan’s Upper Peninsula waterfalls with a bucket‑list dream of trekking New Zealand’s Tongariro Alpine Crossing, favoring
    budget hostels and local hikes over guided tours, yet occasionally splurging on a photography retreat in Iceland when their savings allow.
  culinary: Kelly Tarvin enjoys crafting simple fresh meals like avocado toast with heirloom tomatoes, experimental quinoa salads with roasted beetroot, and occasional homemade sushi rolls, but often ends
    up ordering Thai takeout after an all‑night painting session, citing limited time and a love for bold, spicy flavors.
  core: Kelly Tarvin is a 19‑year‑old visual scientist who turns data into art, thrives on spontaneous creativity, frets over deadlines, and finds balance in sketching, hiking, and mindful journaling.
background:
  cultural: Raised in Sparta, a small Midwestern town in Michigan, Kelly grew up in a middle‑class, predominantly white community that values self‑reliance, modesty, and community involvement. Her family
    emphasized education and encouraged curiosity, exposing her to both traditional Midwestern customs and broader cultural influences through online platforms and travel. This blend of local values and
    an outward‑looking curiosity shapes her modest, cooperative demeanor while fueling her appreciation for diverse artistic and scientific ideas.
