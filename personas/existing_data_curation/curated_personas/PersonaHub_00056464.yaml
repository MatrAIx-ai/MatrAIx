persona_description: A researcher and scientist specializing in plant breeding and organic agriculture. They are interested in developing and coordinating breeding programs to increase the use and potential
  of high genetic diversity (Hi-D) in cereals and grain legumes for organic agriculture. They are currently facing challenges such as increasing weather variability, regulatory hurdles, and agronomic difficulties
  in exploiting Hi-D-based systems. Their goal is to improve organic crop production systems by developing and testing new breeding approaches that can better cope with these challenges.
