personas:
  professional: Joyce Janney, a veteran arts strategist with advanced expertise in strategic planning, grant writing, and digital archiving, leverages their disciplined, process‑oriented mindset and competitive
    edge to orchestrate high‑impact museum exhibitions and secure sustainable funding, while their curiosity drives innovative, inclusive programming.
  sports: Joyce Janney, an avid desert‑trail hiker and regular yoga practitioner, joins the Arizona Hiking Club for weekend treks, supports the Phoenix Suns, Arizona Cardinals, and Arizona Diamondbacks,
    and follows the Arizona State Sun Devils during college football season for both competition and community camaraderie.
  arts: Joyce Janney, deeply embedded in the Scottsdale art scene, curates exhibitions featuring artists like James Turrell, Kehinde Wiley, and Frida Kahlo, attends independent film screenings of works
    by Bong Joon‑ho and Ari Aster, and finds inspiration in the music of Joni Mitchell and Fiona Apple.
  travel: Joyce Janney, who meticulously plans trips around cultural festivals such as the Venice Biennale, Glastonbury in the UK, and the Día de los Muertos celebrations in Oaxaca, balances these adventures
    with weekend getaways to Sedona’s red rocks, yet sometimes postpones trips due to board commitments.
  culinary: Joyce Janney, an enthusiastic seasonal cook, perfects dishes like roasted prickly pear and mesquite‑infused quinoa salad, cinder‑roasted poblano peppers stuffed with quinoa and goat cheese,
    and saffron risotto with roasted butternut squash, often using ingredients such as sage, epazote, and locally sourced cactus.
  core: Joyce Janney, a fiercely organized arts leader with a relentless curiosity, channels competitive drive into curating inclusive cultural experiences while occasionally indulging in spontaneous art
    purchases and neglecting sunscreen on hikes.
background:
  cultural: Joyce grew up in a small Midwestern town with German and Irish family roots, absorbing a blend of European artistic traditions and community values. After completing her graduate studies in
    arts and humanities, she relocated to the Southwest, where the desert’s stark beauty and the rich cultural heritage of Native American and Hispanic communities broadened her aesthetic sensibilities.
    Living in Scottsdale, she integrates this multicultural exposure with her classic liberal arts background, fostering a deep appreciation for both historic masterpieces and contemporary, cross‑cultural
    expressions.
attributes:
  skills: '[''Strategic Planning'', ''Project Management'', ''Budget Oversight'', ''Grant Writing'', ''Fundraising'', ''Exhibition Curation'', ''Arts Programming'', ''Stakeholder Engagement'', ''Public
    Speaking'', ''Negotiation'', ''Data‑Driven Decision Making'', ''Mentoring'']'
  hobbies: '[''Visiting art galleries'', ''Hiking desert trails'', ''Reading contemporary fiction'', ''Practicing yoga'', ''Cooking experimental recipes'', ''Traveling to cultural festivals'', ''Writing
    poetry'', ''Attending live music concerts'', ''Volunteering at local arts organizations'', ''Photography'']'
  career_goals: Joyce aims to transition into a senior leadership role such as museum director or executive director of a regional arts council, where she can shape large‑scale cultural initiatives and
    champion inclusive programming. She is driven to launch a traveling exhibition series that connects Southwestern artists with national audiences, and she aspires to mentor the next generation of women
    leaders in the arts. Long‑term, she hopes to author a book on sustainable arts management and influence policy to secure stable funding for community cultural projects.
