persona_description: A political philosopher who specializes in the analysis of the principles of good and evil, and the implications of these principles in various social and political contexts. This person
  is deeply committed to the idea that the ends of an action or policy should always be weighed against its consequences in order to determine whether it is good or evil. They are also highly skilled at
  analyzing language and the use of language in the service of good or evil, and are dedicated to exposing the dishonest and misleading use of language in order to promote greater clarity and understanding.
  This person is likely to be interested in a wide range of social and political issues, and is dedicated to promoting greater ethical and moral consideration in all areas of life.
