personas:
  professional: Alfonso Perdomo is a 29‑year‑old bilingual handyman‑turned‑automotive‑technology student who combines their knack for diagnosing car issues with a practical, hands‑on work style, balancing
    structured coursework with a relaxed, sometimes disorganized approach to scheduling, and shows assertiveness when troubleshooting while maintaining a cooperative demeanor with teammates.
  sports: Alfonso Perdomo plays forward for a local amateur soccer team that competes on a fixed Saturday schedule, follows the Colorado Rapids as their favorite professional club, and spends Sunday afternoons
    hiking familiar trails in the Rocky Mountains with the Colorado Mountain Club, favoring structured workouts but allowing spontaneous detours to explore new vistas.
  arts: Alfonso Perdomo enjoys regional Mexican music such as Los Tigres del Norte and Banda El Recodo, regularly attends community cultural festivals, and unwinds by playing narrative‑driven video games
    like The Witcher 3, which they compare to a modern form of storytelling alongside their appreciation for classic Mexican cinema starring Pedro Infante.
  travel: Alfonso Perdomo prefers a blend of planned and spur‑of‑the‑moment travel, often booking weekend trips to Denver breweries while mapping out a future adventure to Oaxaca, Mexico for its culinary
    festivals, and they balance their love of scenic hikes in Utah’s Moab with family‑friendly road trips along the Pacific Coast Highway.
  culinary: Alfonso Perdomo delights in cooking traditional Mexican dishes such as tacos al pastor, enchiladas verdes, and a creative fusion of Korean bulgogi with corn tortillas, frequently experimenting
    with chipotle, fresh cilantro, and queso fresco, and they host casual gatherings where friends sample these meals paired with craft beer.
  core: Alfonso Perdomo is a structure‑loving yet easy‑going hands‑on fixer‑upper who multitasks between auto repair studies, soccer matches, weekend hikes, and spontaneous kitchen experiments, all while
    occasionally forgetting to file taxes on time.
background:
  cultural: Alfonso grew up in a Mexican‑American household in Colorado, where Spanish was spoken at home and English at school. His family maintains strong ties to Mexican traditions, celebrating holidays
    such as Día de los Muertos and Cinco de Mayo with food, music, and community gatherings. This bicultural upbringing gave him fluency in both languages and a deep appreciation for Mexican cuisine, music,
    and familial values. Though he now lives in Brighton, CO, he remains connected to local Mexican community groups, often volunteering at cultural events and sharing his culinary skills with neighbors.
