  hobbies: '[''Cooking traditional Khmer cuisine'', ''Backyard vegetable gardening'', ''Hiking in the Santa Cruz Mountains'', ''Playing chess'', ''Reading science‑fiction'', ''Practicing tai chi'', ''Volunteering
    at cultural festivals and health fairs'', ''Exploring health‑tech gadgets'']'
  career_goals: He aims to establish a community health center focused on affordable, culturally competent care for Southeast Asian immigrants in Santa Clara, expand telehealth services to reach underserved
    patients, obtain a Master of Public Health to strengthen his expertise in population health, publish research on diabetes outcomes among Khmer and Vietnamese patients, and eventually serve as a medical
    director overseeing health‑equity programs.
