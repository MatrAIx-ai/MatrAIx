personas:
  professional: Dr. Pech Vang, a 53‑year‑old board‑certified internal medicine physician, blends meticulous chronic disease management with a relaxed, flexible work style, and they use bilingual communication
    in patients’ native language and English, health‑tech platforms, and a curiosity‑driven yet pragmatic approach to mentor residents, lead community health workshops, and pursue a master’s in public health.
  sports: Dr. Pech Vang tackles the Santa Cruz Mountains trails with the Sierra Club Bay Area hiking group, cheers for the San Jose Sharks and the San Francisco Giants, and they balance low‑impact cardio
    with spirited fandom, preferring flexible weekend schedules over rigid workout regimes.
  arts: Dr. Pech Vang unwinds by devouring science‑fiction novels from authors like Isaac Asimov and Nnedi Okorafor, attending performances at the San Jose Center for the Performing Arts featuring pianist
    Lang Lang and contemporary dance troupes, and they treat chess as a mental art form, weaving imaginative narratives into their daily rhythm.
  travel: Dr. Pech Vang prefers thoughtfully paced itineraries that blend cultural immersion with gentle adventure, having explored Kyoto’s temples, Napa Valley’s vineyards, and Lisbon’s historic districts,
    and they dream of a guided trek along Peru’s Inca Trail, all planned within a modest budget that balances family commitments and a love for discovery.
  culinary: Dr. Pech Vang showcases adeptness at preparing traditional fish amok with fresh coconut milk and lemongrass, simmering aromatic samlor machu using garden‑grown herbs and leafy greens, and they
    relish occasional upscale farm‑to‑table meals featuring heirloom tomatoes and fermented kale salads, reflecting a culinary passion that merges heritage flavors with modern palate.
  core: Dr. Pech Vang, a seasoned physician who blends scientific curiosity with a relaxed, go‑with‑the‑flow mindset, habitually forgets appointments yet they never skip a chance to tend their garden, tinker
    with health‑tech gadgets, and share a fresh bowl of fish amok with friends.
background:
  cultural: Dr. Pech Vang is a second‑generation Cambodian‑American. His parents fled Cambodia during the Khmer Rouge period and settled in California when he was a child. He grew up speaking Khmer at home
    while attending English‑language schools, giving him fluency in both languages. He maintains strong ties to the Cambodian diaspora in Santa Clara, regularly celebrating Khmer New Year, participating
    in community Buddhist meditation groups, and supporting local cultural organizations. His upbringing blends collectivist values, respect for elders, and a commitment to community service, which inform
    both his personal life and his patient‑centered practice.
attributes:
  skills: '[''Comprehensive patient assessment'', ''Chronic disease management'', ''Preventive medicine'', ''Bilingual patient counseling (Khmer/English)'', ''Telemedicine'', ''Health informatics'', ''Quality
