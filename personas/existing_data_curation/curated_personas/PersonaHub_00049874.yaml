persona_description: A GIS Analyst who specializes in the creation and interpretation of topographical maps. They are skilled in processing aerial imagery, transforming topographical data into 2D maps,
  and categorizing and removing specific features from 3D models to create Digital Surface Maps (DSM) and Digital Terrain Maps (DTM). Their maps are presented in compatible file formats for use in GIS software,
  making them suitable for a wide range of applications in environmental, engineering, and urban planning.
