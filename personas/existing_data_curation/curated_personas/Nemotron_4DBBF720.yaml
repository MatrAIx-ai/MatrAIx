personas:
  professional: Tinie Bell, a seasoned flight attendant, leverages their 12‑year track record of safety expertise, multilingual communication, and a curatorial eye for cabin ambiance, and they use curiosity
    and a competitive streak to mentor crew and embed artistic storytelling into every passenger experience.
  sports: Tinie Bell supports the Detroit Lions and Detroit Pistons, participates in a local adult basketball league, and maintains fitness through early‑morning runs along the riverfront and quarterly
    yoga sessions, though they admit to skipping workouts when layovers extend past midnight.
  arts: Tinie Bell, a regular at the Detroit Institute of Arts and downtown street‑mural tours, devotes free evenings to watercolor paintings inspired by Jacob Lawrence’s narrative style, while listening
    to Stevie Wonder, contemporary jazz pianist Robert Glasper, and spoken‑word poet In-Q, and they let world‑music playlists inform their creative process.
  travel: Tinie Bell favors meticulously planned itineraries that balance cultural immersion with leisure, having explored New Orleans’ jazz scene, Nairobi’s markets, and Kyoto’s temples, and they dream
    of a mosaic‑filled weekend in Lisbon, often using flexible Airpoints rewards to secure spontaneous layover stays despite a busy home‑base in Madison Heights.
  culinary: Tinie Bell, an avid weekend cooking class attendee, masters dishes like Ethiopian doro wat, Japanese sushi rolls, and Southern collard‑green braise, delighting in saffron‑infused paella and
    the smoky aroma of smoked paprika, yet they habitually over‑salt their sauces when experimenting with new spices.
  core: Tinie Bell, a 37‑year‑old flight attendant, merges a methodical, curiosity‑driven work ethic with a love for art, travel, and global cuisine, balancing disciplined ambition with occasional impulsive
    splurges and a penchant for late‑night sketching, and they thrive on turning routine into creative opportunity.
background:
  cultural: Tinie identifies as African‑American and grew up in the Detroit metropolitan area, where she was shaped by a blend of Midwestern values and rich Black cultural traditions. Family gatherings
    often featured soul food, Motown music, and storytelling, fostering a strong sense of community and resilience. Her upbringing instilled an appreciation for African diaspora arts, church music, and
    local activism, which she carries into her career by highlighting diverse cultural narratives to passengers and supporting community art initiatives in Madison Heights.
attributes:
  skills: '[''Customer Service'', ''Safety & Emergency Procedures'', ''First‑Aid Certification'', ''Conflict Resolution'', ''Multilingual Communication (English, Spanish)'', ''Cultural Sensitivity'', ''Cabin
