  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Travel Photography'', ''Reading Cultural History'', ''World Music Listening'', ''Jazz and Spoken‑Word Events'', ''Cooking Classes (Global
    Cuisine)'', ''Logic Puzzles'', ''Reflective Journaling'', ''Book Club'', ''Youth Mentorship'']'
  career_goals: Tinie aims to advance to a senior lead‑flight attendant role where she can mentor new crew members and develop training modules that incorporate cultural and artistic insights into the passenger
    experience. Long‑term, she plans to transition into airline operations management or a community outreach position that leverages her love of travel and the arts, potentially pursuing a professional
    certification in aviation management while still contributing to her local artistic community.
