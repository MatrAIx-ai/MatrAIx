personas:
  professional: Elizabeth Wilson, a veteran field technician turned senior technical consultant, blends three decades of ATM and copier repair expertise with a burgeoning electrical engineering education
    to deliver bespoke maintenance contracts for regional banks, while channeling her artistic eye into kinetic ATM sculptures and mentoring apprentices through hands‑on, creative problem‑solving workshops
    that they design with a competitive edge.
  sports: Elizabeth Wilson, an avid hiker of the rolling hills around Milton and a member of the Milton Trails Association, enjoys solitary birdwatching hikes in spring and autumn, follows the Milwaukee
    Brewers baseball team for weekend relaxation, and occasional joins a local senior walking club for low‑impact cardio, preferring the quiet of nature over competitive gym environments that they find
    draining.
  arts: Elizabeth Wilson, a devoted watercolorist of rural Wisconsin landscapes, regularly visits the Milwaukee Art Museum and the annual Great Lakes Folk Art Festival, draws inspiration from artists like
    Winslow Homer and contemporary folk illustrator Mary Jo Dooling, scours 'Art in America' and 'Locus' for fresh ideas, and spends evenings documenting her creative process in a handwritten journal while
    they listen to ambient classical playlists.
  travel: Elizabeth Wilson, who favors slow, contemplative travel, plans trips meticulously on paper maps, relishes weekend getaways to the Driftless Area's secluded valleys, dreams of photographing the
    autumn foliage in New England's Berkshires, and hopes to explore the historic art villages of Italy's Umbria region, all while balancing a modest travel budget that they stretch by staying in boutique
    B&Bs and using a compact DSLR for nature photography.
  culinary: Elizabeth Wilson, a home‑cooking enthusiast, prefers simple, seasonal fare such as beet and goat‑cheese salad, pan‑seared lake‑caught perch with fresh dill, and hearty chicken pot pie made with
    locally sourced Wisconsin cheese curds, often experimenting with lavender‑infused honey for glaze, and they relish the ritual of preparing meals as a quiet, meditative counterpoint to their technical
    work.
  core: Elizabeth Wilson is a curious, solitary technologist‑artist who transforms vintage bank hardware into kinetic art, balances a relaxed‑but‑disorganized financial life with a competitive streak, and
    finds peace in quiet hikes, watercolor landscapes, and meticulous journaling.
background:
  cultural: Elizabeth grew up in the small farming community of Milton, Wisconsin, in a family of German‑American heritage that emphasized self‑reliance, practicality, and modesty. Raised in a Lutheran
    environment, she participated in community events that celebrated Midwestern folk traditions and local craftsmanship. Her upbringing in Jefferson County, surrounded by expansive cornfields and close‑knit
    neighborhoods, fostered an appreciation for both the quiet of rural life and the value of hands‑on work. Though she pursued some college coursework in electronics at a regional community college, she
    entered the workforce early, building a career that blends the Midwestern ethic of hard work with a personal curiosity for new ideas, art, and unconventional applications of technology.
attributes:
  skills: '[''ATM hardware repair'', ''Office copier and printer maintenance'', ''Electronic diagnostics'', ''Soldering and circuit board repair'', ''Firmware updates and configuration'', ''Network troubleshooting
    for office equipment'', ''Reading technical schematics and manuals'', ''Cash handling security compliance'', ''Creative problem solving'', ''DIY electronics projects'', ''Basic digital photography'']'
  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Visiting art galleries and folk‑art fairs'', ''Restoring and up‑cycling vintage electronics'', ''Reading science‑fiction and art magazines'',
    ''Hiking and birdwatching'', ''Journaling and reflective writing'']'
  career_goals: At 55, Elizabeth aims to transition from routine field service to a senior technical consultant role, offering specialized maintenance contracts for regional banks and small businesses.
    She plans to complete an associate degree in electrical engineering to formalize her knowledge, obtain CompTIA Network+ certification, and launch a boutique service that repurposes retired ATMs into
    interactive art installations for community spaces. Mentoring younger technicians is also a priority; she envisions a small apprenticeship program that blends rigorous technical training with creative
    problem‑solving workshops. Ultimately, she hopes to achieve a balanced semi‑retirement where she can continue selective consulting while dedicating more time to her artistic and DIY projects.
