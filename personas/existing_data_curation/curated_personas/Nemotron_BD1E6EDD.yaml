personas:
  professional: Jacob Huskey, a disciplined business lecturer, leverages deep finance, marketing, and organizational behavior knowledge to craft data‑driven, case‑rich curricula, methodically integrates
    LMS analytics, experiential projects, and mentorship, and quietly balances the anxiety that accompanies their tenure‑track aspirations.
  sports: Jacob Huskey, an avid weekend hiker, regularly tackles Lake County’s ridge trails while belonging to the Lake County Trailblazers hiking club and a local cycling group, they cheer for the Golden
    State Warriors, the San Francisco 49ers, and the San Jose Earthquakes, and during winter occasionally ski at Lake Tahoe, balancing low‑key fitness with moderate team‑sport fandom.
  arts: Jacob Huskey, a dedicated amateur photographer, draws inspiration from Ansel Adams and Sebastião Salgado for landscape shots and from Edward Hopper for urban architecture, they curate a personal
    playlist featuring Sufjan Stevens, Ludovico Einaudi, and Phoebe Bridgers, they attend the annual Bay Area Film Festival, and they enjoy stage productions like Hamilton, reflecting how visual and musical
    arts shape their reflective leisure time.
  travel: Jacob Huskey, a thoughtfully organized traveler, prefers itineraries that blend structured cultural exploration with spontaneous hiking, they have trekked Banff’s turquoise lakes, explored Iceland’s
    Golden Circle, visited Kyoto’s historic temples, and plan a future Inca Trail adventure, all while budgeting travel savings within a dedicated fund and balancing family obligations.
  culinary: Jacob Huskey, a passionate home chef, loves crafting elaborate meals such as mushroom risotto with truffle oil, sous‑vide pork tenderloin with miso glaze, and coq au vin using heritage carrots
    and pearl onions, they relish fresh basil, lemongrass, and smoked paprika, they often pair dishes with craft beers or a classic Negroni, and they view cooking as a creative outlet that balances their
    analytical work life.
  core: Jacob Huskey, a methodical educator with a curiosity‑driven mind, balances solitary reflection, anxiety‑laden planning, and a love for elaborate cooking and trail photography, they often channel
    nervous energy into meticulous meal prep and weekend hikes.
background:
  cultural: Jacob grew up in the suburban Midwest, raised in a family of German‑Polish heritage common to northern Ohio. His upbringing emphasized modesty, hard work, and community involvement, reflecting
    the values of the Lake County region. He was exposed to Midwestern hospitality, a strong sense of civic duty, and a practical outlook on life, which aligns with his organized and reliable nature. While
    he identifies as culturally white American, he appreciates the diverse cultural fabric of the area, participating in local events such as county fairs and supporting nearby sports teams like the Cleveland
    Browns.
attributes:
  skills: '["Business fundamentals (finance, marketing, management)", "Instructional design and curriculum development", "Learning Management Systems (Canvas, Blackboard)", "Data analysis (Excel, SPSS)",
    "Project management", "Academic advising and mentorship", "Conflict resolution", "Public speaking (small group settings)", "Research methods in business education", "Technology integration for hybrid
    learning"]'
  hobbies: '["Reading non‑fiction (psychology, behavioral economics, productivity)", "Hiking local trails", "Landscape and urban photography", "Online chess", "Cooking elaborate meals", "Volunteering (financial
    literacy workshops)", "Journaling for stress management", "Listening to mindfulness and business podcasts"]'
  career_goals: Jacob aims to transition from a lecturer to a tenure‑track professor, pursuing a master's degree in education and eventually a PhD in business education to deepen his scholarly credentials.
    He aspires to lead a curriculum innovation committee that creates interdisciplinary entrepreneurship modules with local startups, securing grants to support experiential learning. In the longer term,
    Jacob hopes to become department chair, championing faculty development and student success initiatives, while publishing research on the impact of blended learning on business student outcomes.
