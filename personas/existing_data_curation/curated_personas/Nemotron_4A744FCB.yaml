  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Herb and vegetable gardening'', ''Crocheting'', ''Listening to Vietnamese folk music'', ''Attending church services'', ''Participating in community
    festivals'', ''Walking'', ''Reading health articles'', ''Watching classic movies'', ''Doing word-search puzzles'']'
  career_goals: Although retired, Thanh aims to stay active by mentoring younger Vietnamese families, documenting her family's migration story in a modest photo-journal, and leading a weekly cooking class
    at the local senior center. She hopes to learn basic smartphone functions to keep in touch with her grandchildren and to explore new health-friendly recipes that incorporate local produce. She also
    aspires to maintain her independence and health by staying physically active through daily walks and regular health checks.
