  hobbies: '[''Gardening'', ''Knitting'', ''Hiking local trails'', ''Reading historical fiction'', ''Crossword puzzles'', ''Volunteering at the local food pantry'']'
  career_goals: Sasha aims to secure a stable, routine‑focused role in a local manufacturing or agricultural company where she can apply her analytical and quality‑assurance skills. She is interested in
    starting as a Laboratory Technician or Quality Assurance Analyst, with a long‑term goal of advancing to a supervisory position that allows her to refine processes and mentor new staff. To support this
    path, she plans to pursue certifications such as Six Sigma Green Belt or Certified Quality Engineer, and eventually consider a master's degree in Applied Science if it aligns with her career trajectory
    and personal responsibilities.
