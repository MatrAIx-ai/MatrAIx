personas:
  professional: Rafael Quiceno, a methodical logistics veteran with three decades of operational management experience, leverages his bilingual fluency and meticulous SOP documentation to mentor emerging
    leaders and streamline small‑business supply chains.
  sports: Rafael Quiceno enjoys low‑impact fitness through morning walks with the local senior walking club, follows the Dallas Cowboys during football season, and spends quiet weekends fishing on Lake
    Ray Hubbard, occasionally joining the community’s senior pickleball league.
  arts: Rafael Quiceno finds solace in the mariachi classics of Vicente Fernández and the velvety boleros of Luis Miguel, while evenings often include reading biographies of Sam Houston and Porfirio Díaz,
    weaving historical insight into his appreciation for storytelling.
  travel: Rafael Quiceno prefers carefully planned road trips that blend history and nature, having explored the missions of San Antonio, the bird‑rich wetlands of the Gulf Coast, and dreaming of a pilgrimage
    to the colonial town of Guanajuato, all within the comfort of his modest travel budget.
  culinary: Rafael Quiceno’s culinary routine centers on home‑grown tomatoes, fire‑roasted poblano peppers, and fresh cilantro, enabling him to craft simple yet flavorful dishes like salsa verde, grilled
    fish tacos with lime, and herb‑infused vegetable soups, though his modest cooking skills keep him from attempting more elaborate recipes.
  core: Rafael Quiceno blends a disciplined, structured mind with quiet compassion, tending his garden, crafting furniture, and mentoring others while occasionally forgetting to water a cactus and indulging
    in late‑night mariachi tunes.
background:
  cultural: Rafael is a second‑generation Mexican American whose family settled in the Rio Grande Valley before moving to central Texas. He grew up in a bilingual household where Spanish was spoken alongside
    English, and his upbringing was infused with Mexican traditions such as Día de los Muertos, festive cooking of tamales and pozole, and the values of familismo and respeto. Living in Paris, TX, he has
    blended these cultural foundations with the Southern hospitality characteristic of East Texas, participating in local church events, community picnics, and county fairs. His heritage informs his compassionate
    demeanor, his emphasis on harmony within his team, and his dedication to giving back to the community.
attributes:
