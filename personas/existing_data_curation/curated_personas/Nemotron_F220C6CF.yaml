  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical biographies'', ''Listening to mariachi and bolero music'', ''Volunteer tutoring'', ''Birdwatching'', ''Playing chess'', ''Fishing'']'
  career_goals: Rafael’s primary ambition is to ensure the smooth transition of his department to the next generation of leaders by formalizing mentorship programs and documenting best practices. He hopes
    to continue contributing as a trusted advisor, offering his practical expertise to neighboring small businesses and community organizations. Additionally, he aims to volunteer as a career‑counselor
    for young adults at the local community college, sharing his experience to help them achieve stable, ethical employment.
