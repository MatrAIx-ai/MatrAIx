personas:
  professional: John Valls, a licensed therapist specializing in CBT, Motivational Interviewing and DBT basics, leverages his skeptical, data‑driven mindset and strong organizational skills to deliver evidence‑based
    crisis intervention and group therapy while building a boutique practice that blends mindfulness with practical outcomes.
  sports: John Valls spends Minnesota winters cross‑country skiing the Minnesota River Valley trails, hikes the towering bluffs of state parks like Rushford during summer, competes on a recreational soccer
    team affiliated with the Dakota County Soccer Club, and roots for the local Minnesota United FC and Twins while tracking stats like any dedicated fan.
  arts: John Valls channels his creative energy into strumming acoustic renditions of Bon Iver and Mumford & Sons on his guitar, crafting custom furniture in his home workshop inspired by Scandinavian design,
    and immersing himself in the literature of Camus, Dostoevsky, and contemporary psychology authors such as Bessel van der Kolk, which together shape his reflective leisure.
  travel: John Valls enjoys weekend road trips to the North Shore of Lake Superior and the historic streets of St. Paul, has backpacked through the volcanic landscapes of Iceland’s Snæfellsnes peninsula,
    and aspires to visit the Buddhist meditation retreats of Thailand, balancing his love for adventure with the financial realities of launching a private practice.
  culinary: John Valls, an intermediate home cook, prefers hearty Midwestern dishes like pan‑fried walleye, wild‑rice casserole, and huckleberry pancakes, flavors them with fresh dill and locally sourced
    honey, and delights in pairing his meals with craft brews such as a farmhouse ale from Surly Brewery.
  core: John Valls is a pragmatic therapist whose competitive spirit, skeptical eye, and love for solitary creative pursuits drive a balanced life of evidence‑based practice, outdoor adventure, and reflective
    artistry.
background:
  cultural: John grew up in a middle‑class family in the suburbs of Farmington, Minnesota, with deep roots in the region’s German‑Scandinavian heritage. His grandparents were immigrants from northern Europe
    who settled in Dakota County during the early 20th century, bringing values of hard work, community stewardship, and modesty. Raised in a Lutheran community, he experienced a strong sense of communal
    responsibility and an emphasis on punctuality and practicality—traits that continue to shape his professional demeanor. While he respects his Midwestern upbringing, John is also attuned to cultural
    diversity and actively seeks to incorporate culturally competent practices into his therapy work.
attributes:
  skills: '["Cognitive Behavioral Therapy (CBT)", "Motivational Interviewing", "Dialectical Behavior Therapy (DBT) Basics", "Crisis Intervention and Suicide Prevention", "Evidence‑Based Practice Integration",
    "Client Assessment and Diagnostic Interviewing", "Group Therapy Facilitation", "Telehealth Platform Proficiency", "Case Management and Care Coordination", "Data Collection and Outcome Measurement",
    "Cultural Competency in Midwestern Context", "Active Listening and Empathic Communication", "Analytical Thinking and Skeptical Evaluation"]'
  hobbies: '["Cross‑Country Skiing", "Hiking", "Fishing", "Acoustic Guitar Playing", "Woodworking", "Reading Psychology and Philosophy", "Chess", "Recreational Soccer", "Socializing at Local Breweries",
    "Mindfulness Meditation", "Journaling"]'
  career_goals: John aims to deepen his clinical expertise while building a sustainable private practice in Farmington. Over the next three years he plans to obtain full licensure as a Licensed Professional
    Counselor (LPC) and become a certified EMDR practitioner. He envisions opening a boutique practice that blends CBT with mindfulness techniques for adults coping with anxiety and depression, while also
    offering low‑cost services to underserved rural clients. In parallel, John hopes to develop a community outreach program that partners with local schools and churches to provide mental‑health workshops.
    His longer‑term ambition includes pursuing a doctoral degree in clinical psychology to contribute research on pragmatic integration of evidence‑based therapies in primary care settings and eventually
    moving into a leadership role within a regional mental‑health organization to influence service delivery policies.
