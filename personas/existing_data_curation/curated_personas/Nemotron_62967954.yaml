personas:
  professional: Louis Shephard, a veteran personal financial advisor with six decades of experience, blends his curious yet practical mindset with a relaxed, community‑focused workflow, using his gift for
    conversation to simplify retirement income strategies, tax‑advantaged accounts, and estate planning for senior clients while mentoring younger advisors in a cooperative, adaptable style.
  sports: Louis Shephard follows the Chicago Cubs for baseball, watches the Green Bay Packers every fall, and joins a local senior softball league, preferring leisurely walks along the river trail for fitness
    while their fishing trips serve as both recreation and low‑impact cardio.
  arts: Louis Shephard finds solace in classic jazz legends like Miles Davis and Ella Fitzgerald, enjoys Southern country storytelling from Johnny Cash and Dolly Parton, and occasionally sings a baritone
    line during church jam sessions, while they also attend the local theater’s productions of Shakespearean classics.
  travel: Louis Shephard’s travel style blends comfort with curiosity, favoring organized trips to historic Savannah and the music‑rich streets of New Orleans, while spontaneous weekend getaways to the
    nearby lakes for fishing fulfill their love of relaxed adventure.
  culinary: Louis Shephard prefers home‑cooked comfort meals such as chicken pot‑pie with rosemary, garden‑fresh tomato basil soup, and smoked catfish, relishes the occasional Southern shrimp and grits
    at a local diner, and their gardening hobby supplies many of the herbs and vegetables they use in the kitchen.
  core: Louis Shephard is a sociable, curiosity‑driven 91‑year‑old financial sage who balances relaxed routines with thoughtful mentoring, while a penchant for jazz, gardening, and occasional forgetfulness
    makes for an endearing, slightly scatter‑brained senior.
background:
  cultural: Louis grew up in the Deep South during the post‑World War II era, absorbing the region’s strong emphasis on family, community, and church life. His upbringing in rural Alabama instilled a respect
    for tradition and a cooperative spirit that continues to shape his interactions. He experienced the cultural shifts of the civil‑rights movement and the economic changes of the late‑20th century, which
    broadened his perspective and cultivated his balanced curiosity—valuing both established Southern values and new ideas. These influences are evident in his warm, sociable demeanor, his commitment to
    community service, and his pragmatic yet open‑minded approach to financial advising.
attributes:
  skills: '["Retirement Income Planning", "Tax‑Advantaged Investment Strategies", "Cash‑Flow Budgeting", "Estate and Legacy Planning", "Risk Assessment and Portfolio Diversification", "Client Relationship
