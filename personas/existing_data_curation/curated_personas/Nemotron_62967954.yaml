  hobbies: '["Bridge and poker club", "Community gardening", "Weekend fishing trips", "Historical and literary reading", "Book‑club participation", "Listening to classic jazz and southern country music",
    "Informal church music jam sessions", "Volunteering as a financial literacy coach"]'
  career_goals: Even at 91, Louis aims to remain an active, trusted voice in his community’s financial well‑being. His primary goal is to help his longstanding clients secure comfortable retirements while
    guiding their families through generational wealth transfer. He aspires to mentor the next generation of advisors at his firm, sharing both timeless principles and his curiosity‑driven insights on modern
    investing tools. Louis also hopes to author a concise guide on practical retirement planning for seniors, blending his seasoned expertise with an approachable, friendly tone that reflects his cooperative
    nature.
