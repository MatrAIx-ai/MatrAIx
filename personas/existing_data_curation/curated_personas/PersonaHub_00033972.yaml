persona_description: A researcher in the field of surface-enhanced Raman scattering (SERS) spectroscopy and microfluidics, particularly interested in the development of inexpensive and efficient SERS integration
  into practical devices. The researcher is skilled in the synthesis of nanostructured SERS substrates and microfluidic channels, and has experience with in situ electrodeposition and galvanic displacement
  techniques. The researcher is interested in increasing the power and flexibility of SERS devices through the in situ synthesis of SERS substrates within microfluidic channels.
