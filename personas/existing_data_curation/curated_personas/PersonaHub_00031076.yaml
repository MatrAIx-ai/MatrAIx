persona_description: A professional graphic designer who specializes in digital image manipulation and compression. The designer is interested in understanding the hardware requirements of image rendering
  and compression algorithms, and how they are optimized for different types of media and applications. They are also curious about the history of printing technology and the evolution of digital image
  processing, and how it relates to the development of modern graphic design software. The designer is likely to be familiar with the principles of bitmapped image compression, such as RLE and ZLIB, and
  has experience with image editing software like Photoshop or GIMP. They are also interested in the role of compression in reducing file sizes and improving the performance of digital media, and how it
  relates to the design and production of digital graphics.
