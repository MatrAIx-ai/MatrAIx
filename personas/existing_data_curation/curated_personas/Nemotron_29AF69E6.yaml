personas:
  professional: Joyce Mclean is an experienced full‑stack software developer who merges Python, React, and AWS cloud skills to craft scalable tools for creative professionals, while championing inclusive
    engineering practices, leading code‑review sessions, mentoring junior developers, and they frequently translate visual design principles into intuitive user interfaces, also volunteering as a STEM mentor
    for middle‑school girls during community events such as the Pueblo Chile & Frijoles Festival.
  sports: Joyce Mclean enjoys trail running in the Rockies with the Pueblo Trailblazers Running Club, participates in monthly group hikes organized through a local outdoor meetup, supports the Denver Broncos
    in fall football, follows the Colorado Rockies during summer baseball, and occasionally joins a community softball league with friends.
  arts: Joyce Mclean spends weekends oil‑painting landscapes inspired by Ansel Adams and Georgia O'Keeffe, captures urban street scenes with a Canon EOS R5, acts in community theatre productions like 'Our
    Town,' and relaxes at the Pueblo library game nights while listening to Leon Bridges and Iron & Wine.
  travel: Joyce Mclean prefers semi‑planned road trips that blend hiking in Sedona’s red rock canyons, cultural immersion at Santa Fe’s art galleries, European city breaks to Barcelona’s architecture and
    Kyoto’s temples, all while budgeting to fund community STEM workshops back home.
  culinary: Joyce Mclean enjoys cooking southwestern fare such as green chile enchilada casserole, grilled trout with fresh cilantro‑lime sauce, and homemade peach cobbler, has a moderate kitchen skill
    set that includes scrambling a perfect omelet, and often pairs meals with a glass of Pinot Noir while scrolling through art blogs.
  core: Joyce Mclean blends artistic curiosity and technical rigor, leading a balanced life of code, canvas, and community, though they often binge‑watch streaming series into the early hours, neglecting
    the sleep they know they need.
background:
  cultural: Joyce comes from a multigenerational White American family with roots in the Midwest, primarily of German and Irish ancestry. Growing up, her parents emphasized education, self‑reliance, and
    community involvement, values that she carries into her adult life. Living in Pueblo, Colorado, she has absorbed the town’s blend of Western frontier spirit and growing Hispanic influence, which enriches
    her appreciation for diverse cultural expressions. She celebrates traditional holidays like Thanksgiving and Independence Day with family gatherings, while also participating in local events such as
    the Pueblo Chile & Frijoles Festival, which reflects the region’s shared cultural tapestry. Her upbringing and current environment foster a balance of individual achievement and collective well‑being,
    shaping her collaborative and considerate nature.
