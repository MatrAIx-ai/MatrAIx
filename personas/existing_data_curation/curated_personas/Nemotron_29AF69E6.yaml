  career_goals: Joyce aims to transition into a technical leadership role where she can shape product strategy and champion inclusive engineering practices. Over the next five years she plans to become
    a Lead Engineer or Engineering Manager, overseeing cross‑functional teams that build tools for creative professionals. She is passionate about creating a platform that fuses art and technology—such
    as an AI‑assisted design suite—and hopes to launch a side project that becomes commercially viable. Additionally, she wants to expand her influence in the Pueblo tech community by organizing a women‑in‑tech
    meetup, mentoring underrepresented youth through STEM outreach, and eventually contributing to open‑source projects that promote accessibility in software.
