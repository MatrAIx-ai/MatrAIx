  career_goals: Looking ahead, John aims to finish high school with a focus on visual arts and technology. He plans to enroll in a university program that combines graphic design, digital media, or interactive
    storytelling. His ultimate ambition is to work as a multimedia designer, UX/UI specialist, or game developer where he can blend artistic expression with technical problem‑solving. He also hopes to leverage
    his collaborative nature to lead community‑based art initiatives, possibly establishing a youth creative collective that uses art to bring people together and promote inclusive expression.
