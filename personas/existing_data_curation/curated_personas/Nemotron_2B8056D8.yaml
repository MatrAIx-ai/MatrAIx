  career_goals: Miguel aims to advance from customer service representative to team lead within the next two years, seeking formal leadership training, certification in customer experience, and eventually
    a supervisory role. He intends to complete a GED or associate degree, deepen his technical troubleshooting skills, and become a bilingual trainer who can mentor new hires. Long‑term, he envisions a
    stable managerial position that offers predictable schedules, higher earnings to support his family, and opportunities to shape service quality standards.
