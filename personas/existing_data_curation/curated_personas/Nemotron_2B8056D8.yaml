personas:
  professional: Miguel Turushina, a bilingual customer support specialist in Miami, they leverage meticulous CRM data entry, process‑driven troubleshooting, and a competitive drive to consistently exceed
    performance metrics while eyeing a team‑lead role within two years.
  sports: Miguel Turushina follows La Liga fervently, rooting for Real Madrid and FC Barcelona, they support Inter Miami CF locally, jog every morning on the beachfront, and join pick‑up soccer games on
    weekends, balancing competitive fandom with personal fitness.
  arts: Miguel Turushina enjoys flamenco evenings featuring the virtuosity of Paco de Lucía, they dance to the Latin hits of Shakira and Carlos Vives, and regularly host board‑game nights centered on strategic
    games like Settlers of Catan, merging solitary strategic thinking with vibrant cultural rhythms.
  travel: Miguel Turushina prefers meticulously planned trips, having explored Barcelona’s Gothic Quarter and New Orleans’ French Quarter, they favor short, budget‑friendly Caribbean beach escapes that
    fit their family’s schedule and their need for routine.
  culinary: Miguel Turushina expertly prepares paella with saffron, chorizo, mussels, and shrimp, and perfects tortilla española, they often share these dishes with friends while experimenting with chilled
    gazpacho and homemade sangria, reflecting a devotion to traditional Spanish cuisine and social dining.
  core: Miguel Turushina is a structured, competitive bilingual support professional; they balance meticulous work performance, passionate soccer fandom, flamenco rhythms, and occasional health worries
    with disciplined budgeting and a love for cooking traditional dishes.
background:
  cultural: Miguel grew up in a Spanish‑heritage household in Miami, where both Castilian traditions and the vibrant multicultural environment of South Florida shaped his identity. He is bilingual, celebrates
    Spanish holidays such as Semana Santa and San Fermín, and participates in local Latino festivals. The blend of Mediterranean family values and the dynamic, diverse community of Miami informs his communication
    style, work ethic, and personal interests.
attributes:
