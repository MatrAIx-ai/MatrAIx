  hobbies: '[''Intramural soccer'', ''Beach volleyball'', ''Hiking the Pinellas Trail'', ''Reading contemporary fiction'', ''Writing a personal blog'', ''Photography (sunsets, cityscapes)'', ''Cooking seafood
    dishes'', ''Attending local music festivals'', ''Volunteering at community clean‑up events'']'
  career_goals: Nolan aims to earn his bachelor's degree in journalism or communications while gaining more experience in digital publishing. In the next five years he hopes to become a senior editor at
    a regional magazine or online news outlet, eventually moving into a managing editor or content‑strategist role where he can oversee a team and shape editorial direction. He also aspires to launch his
    own lifestyle blog that combines his editorial expertise with his interests in travel, food, and coastal culture, and to develop multimedia storytelling skills that keep pace with evolving media trends.
