  hobbies: '[''visiting art museums and galleries'', ''urban photography'', ''woodworking'', ''DIY home renovation projects'', ''reading biographies of artists and inventors'', ''listening to architecture
    and construction podcasts'', ''playing chess'', ''gardening'', ''attending community theater performances'', ''volunteering for neighborhood clean‑up events'']'
  career_goals: Gregory aspires to transition from laborer to foreman and eventually become a certified general contractor. He plans to earn his GED and complete OSHA and project management certifications
    to strengthen his qualifications. Over the next five years, he hopes to lead larger renovation projects that integrate his interest in art and design, eventually launching his own boutique contracting
    firm that specializes in aesthetically driven remodels for homeowners. Additionally, he seeks to develop stress‑management techniques and leadership training to better support his crew and manage his
    own emotional reactivity.
