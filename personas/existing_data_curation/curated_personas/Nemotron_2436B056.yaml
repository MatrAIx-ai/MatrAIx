personas:
  professional: Gregory Ashley, a seasoned construction laborer who blends meticulous blueprint‑reading skills with a keen eye for aesthetic finishes, is leveraging their curiosity about design and methodical
    work ethic to pursue foreman certification and eventually launch a boutique contracting firm that marries functional craftsmanship with artistic vision.
  sports: Gregory Ashley, an avid supporter of the Chicago Cubs and Bulls, joins a local adult softball league on Saturdays, participates in weekend runs with the Midwest Road Runners club, and maintains
    a low‑impact home‑gym routine to protect their back while staying fit.
  arts: Gregory Ashley, a regular at the Art Institute of Chicago where they admire works by Grant Wood and contemporary photographer Cindy Sherman, frequently attend community theater productions and spend
    evenings photographing urban skylines inspired by Frank Lloyd Wright’s prairie‑style architecture, letting visual art inform their design sensibilities.
  travel: Gregory Ashley, who plans trips with a spreadsheet to balance family time and budget, enjoys weekend getaways to Door County for its lake views, dreams of exploring Florence’s Renaissance architecture,
    and has already visited Asheville for its vibrant maker scene, all while juggling their upcoming certification courses.
  culinary: Gregory Ashley, a pragmatic home‑cook who loves the smoky flavor of a well‑seasoned brisket, often prepares rosemary‑infused roasted vegetables alongside classic Chicago deep‑dish pizza, and
    pairs their meals with locally brewed IPAs while occasionally experimenting with sous‑vide techniques to perfect their weekend roast.
  core: Gregory Ashley balances a hands‑on, methodical work ethic with an artistic curiosity, yet their high emotional reactivity and occasional anxiety drive them to constantly seek structure and creative
    outlets.
background:
  cultural: Gregory grew up in the Midwest, steeped in the values of hard work, reliability, and community that characterize many Midwestern white families. His upbringing in Cook County exposed him to
    a blend of industrial labor culture and the vibrant arts scene of Chicago, fostering both a practical craftsmanship mindset and an appreciation for creative expression. He identifies with a straightforward,
    modest lifestyle, cherishing family ties, union solidarity, and a respect for both the physical labor of construction and the aesthetic possibilities of built environments.
attributes:
  skills: '[''framing'', ''concrete finishing'', ''scaffold assembly'', ''blueprint reading'', ''site safety compliance'', ''heavy equipment operation (forklift, backhoe)'', ''basic electrical wiring'',
