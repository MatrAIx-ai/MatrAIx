persona_description: A logician and mathematician who developed a formal logic system that allowed mathematical expressions to be specified without parentheses by placing the operators before (prefix notation
  or Polish notation) or after (postfix notation) the operands. His work on logic notation and his invention of Polish notation provided a straightforward solution for calculator or computer software mathematics
  and made it profitable for Hewlett-Packard to manufacture RPN calculators. He moved to Ireland in 1946 in protest to the Soviet occupation of Poland and died in 1956.
