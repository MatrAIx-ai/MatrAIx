  hobbies: '[''Reading historical biographies'', ''Woodworking'', ''Car restoration projects'', ''Fishing at local lakes'', ''Playing chess'', ''Listening to gospel and classic R&B music'', ''Cooking Southern
    comfort food'', ''Church volunteering and community clean‑up'', ''Mentoring youth in basic home‑maintenance'', ''Watching documentaries on technology and history'']'
  career_goals: Larry aspires to move into a supervisory role such as lead custodian or facilities manager within the next three years. He plans to earn certifications in HVAC maintenance, building systems,
    and green cleaning practices to broaden his expertise. Long‑term, he hopes to launch a small, family‑run cleaning business that can provide stable income for his wife and children while allowing him
    to maintain a balanced schedule. He also intends to complete his GED and explore vocational training to strengthen his credentials and expand career options beyond custodial work.
