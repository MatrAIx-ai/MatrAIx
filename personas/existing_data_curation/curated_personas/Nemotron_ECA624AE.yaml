  career_goals: Michele aims to earn her GED within the next year and pursue an apprenticeship in carpentry or concrete finishing. She hopes to obtain a Journeyman certification, work her way up to a foreman
    position, and eventually acquire the skills and credentials needed to start a small, family‑run construction business that emphasizes safety, reliability, and community service. Long‑term, she envisions
    providing stable employment for others in Madison and contributing to local infrastructure projects that improve residents' quality of life.
