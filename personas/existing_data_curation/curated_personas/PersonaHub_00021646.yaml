persona_description: A veterinarian who specializes in the treatment and management of canine influenza outbreaks, particularly in the context of greyhound racing tracks. They have extensive experience
  in managing outbreaks, identifying transmission routes, and developing infection control protocols. They are also knowledgeable about the epidemiology of the virus, the clinical signs and course of disease,
  and the appropriate management and treatment options for infected dogs. They are well-versed in the use of vaccines and other preventive measures, and are committed to minimizing the risk of infection
  and preventing further spread of the virus.
