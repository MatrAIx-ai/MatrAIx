  hobbies: '[''Visiting art galleries and museums'', ''Painting and sketching'', ''Photography'', ''Hiking and trail running'', ''Kayaking on Round Lake'', ''Reading science fiction'', ''Attending tech
    meetups and hackathons'', ''Traveling to explore new cultures'', ''Cooking experimental recipes'', ''Volunteering for STEM outreach programs'']'
  career_goals: Jacqueline aims to obtain her Professional Engineer (PE) license within the next two years and advance to a principal engineer or lead project manager role within five years. She aspires
    to spearhead interdisciplinary teams that fuse sustainable engineering practices with artistic innovation, positioning herself as a thought leader in eco‑friendly product development. Long‑term, she
    envisions launching her own consultancy focused on green design solutions while actively mentoring and advocating for women in STEM fields.
