  career_goals: Virginia aims to move from purchasing manager to a senior supply chain leadership role, such as Director of Procurement, where she can champion organization‑wide sustainability initiatives
    and embed advanced analytics in sourcing decisions. She plans to earn the Certified Professional in Supply Management (CPSM) credential, mentor emerging procurement talent within her firm, and establish
    a legacy of measurable cost savings and resilient supplier networks before eventually consulting for nonprofit arts organizations, merging her professional expertise with her passion for the arts.
