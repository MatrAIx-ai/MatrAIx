  career_goals: Over the next five years, Andrew aims to earn a Six Sigma Black Belt and move into a Supply Chain Manager role, overseeing a regional network of distribution centers. He plans to lead large‑scale
    cost‑saving initiatives by integrating advanced analytics and AI into forecasting processes, and to mentor a team of analysts to improve operational performance. Long‑term, he aspires to become Director
    of Operations, shaping strategic logistics policies for his organization and contributing to industry thought leadership on supply chain resiliency. To support these ambitions, he intends to pursue
    an MBA with a concentration in Operations Management and obtain the Certified Supply Chain Professional (CSCP) designation.
