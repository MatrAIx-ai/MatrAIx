personas:
  professional: Dominic Mckenna, a 22‑year‑old municipal court clerk in Dover, blends meticulous filing expertise with quick‑thinking communication, leveraging their administrative acumen and competitive
    drive to streamline case‑tracking while they thrive on public interaction and the community‑spirit of town meetings.
  sports: Dominic Mckenna dominates the Dover intramural basketball league, cheers on the Boston Celtics and New England Patriots during season games, hikes the White Mountains on weekends, and they belong
    to the local Dover Basketball Club, using each workout as a release valve for competitive energy.
  arts: Dominic Mckenna lights up the improv stage at the Dover Improv Collective, binge‑watches true‑crime podcasts for narrative intrigue, and they enjoy live shows by folk singer Sharon Shannon and indie
    rock band The National while quoting lines from Dave Chappelle and keeping a stack of comedy DVDs for weekend laughs.
  travel: Dominic Mckenna prefers spontaneous road trips, often setting off to quirky coastal cafés in Kennebunkport or hiking the Acadia National Park trailheads, and they dream of a future visit to Dublin
    for St. Patrick’s Day celebrations and a laid‑back beach escape in Tulum, balancing budget constraints with a love for weekend getaways.
  culinary: Dominic Mckenna’s palate gravitates toward hearty New England fare—clam chowder, fish and chips, and corned beef on St. Patrick’s Day—while their modest cooking skills let them whip up Irish
    soda bread and a decent scramble, and they never say no to a freshly brewed pour‑over from the local quirky café that uses beans from a micro‑roaster.
  core: Dominic Mckenna is a talkative, competition‑driven court clerk who channels New England community values into a restless pursuit of efficiency, coffee, and spontaneous adventure, and they battle
    anxiety and an occasional binge‑watch habit.
background:
  cultural: Dominic grew up in Dover, a small city in New England with deep colonial roots. His family’s heritage traces back to Irish and English ancestors, and their household celebrated traditional holidays
    such as St. Patrick’s Day, Thanksgiving, and the Fourth of July with community gatherings. The region’s emphasis on civic participation and modest, hard‑working values shaped his respect for public
    service. He is accustomed to the close‑knit community feel of Strafford County, where neighbors often know each other and local events—farmers’ markets, town meetings, and high‑school sports—play a
    central role in social life. This background informs his comfort in public-facing roles and his desire to contribute to the local judicial system.
