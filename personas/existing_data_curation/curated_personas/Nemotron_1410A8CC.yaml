  career_goals: Dominic aims to transform his entry‑level clerk position into a pathway toward supervisory leadership in the municipal court system. Over the next three years he plans to enroll in an associate
    program in criminal justice, obtain the Certified Court Clerk credential, and seek a deputy clerk role. He is particularly interested in championing the adoption of electronic filing technologies and
    streamlining case‑tracking processes, hoping to be recognized as an innovator who balances tradition with modern efficiency. Long‑term, he envisions a senior court administrator role where he can mentor
    new staff and influence policy decisions that improve public access to justice.
