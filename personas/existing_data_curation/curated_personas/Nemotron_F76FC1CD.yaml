  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Solving crosswords'', ''Jigsaw puzzles'', ''Birdwatching'', ''Canning and pickling'', ''Listening to folk and classic
    country music'', ''Walking on local nature trails'']'
  career_goals: Annie’s primary career aim is to keep a stable, routine‑oriented position while gradually taking on more responsibility for training newcomers and overseeing shift changeovers. She hopes
    to earn a forklift certification and eventually step into a senior packager or shift‑lead role that lets her mentor others without heavy administrative burdens. Financially, she wants to boost her earnings
    enough to secure a comfortable retirement and fund occasional visits to see her adult children. Her goals focus on job security, incremental advancement, and maintaining the practical, familiar work
    environment she values.
