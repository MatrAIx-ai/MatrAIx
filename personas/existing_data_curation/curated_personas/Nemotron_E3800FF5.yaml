  hobbies: '["Golf","Fishing","Gardening","Rotary Club community service","Habitat for Humanity volunteering","Senior softball league","Attending Detroit Tigers games","Classic car shows"]'
  career_goals: As he approaches retirement, Robert aims to transition from day‑to‑day site oversight to a senior advisory role where he can mentor the next generation of project managers and share his
    practical knowledge through workshops and community college courses. He is also interested in leading a flagship sustainable development project for a local non‑profit, such as a senior‑center or affordable
    housing complex, that would leave a lasting positive impact on Howell. Additionally, Robert hopes to contribute to his company's strategic planning committee, helping to embed a culture of safety, collaboration,
    and flexible problem‑solving into future projects.
