  hobbies: '[''visiting art galleries'', ''participating in art workshops'', ''historical lectures'', ''detective fiction book club'', ''leading seniors walking group'', ''yoga'', ''reflective journaling'',
    ''crossword puzzles'', ''amateur photography'', ''community theater volunteering'']'
  career_goals: She aims to solve the cold case of the 1990s art theft that remains unsolved in Oneida County, and to establish a formal training program on art‑related crime investigation for the department.
    Mary Ann also aspires to be promoted to senior supervisory detective before retirement, and to author a memoir that shares lessons from her career while highlighting the importance of meticulous investigative
    work and community partnership.
