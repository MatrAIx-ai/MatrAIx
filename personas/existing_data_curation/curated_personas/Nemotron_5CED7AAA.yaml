personas:
  professional: A veteran detective with four decades of experience, Mary Shisko leverages her meticulous crime-scene processing, forensic evidence analysis, and strategic interrogation skills to solve
    complex cases, while they channel their curiosity about art theft and disciplined organization toward the pursuit of the cold 1990s Oneida County art-theft case and the development of a specialized
    training program.
  sports: An avid walker who leads a seniors walking group exploring regional history trails, Mary Shisko follows the New York Knicks and Buffalo Bills, participates in community yoga classes, and they
    also play pickleball at the local senior center during the summer months.
  arts: A regular visitor to the Rome Art Gallery, Mary Shisko admires the works of Georgia O'Keeffe and Vincent van Gogh, participates in community art workshops where they experiment with watercolor inspired
    by Claude Monet, and they enjoy amateur photography capturing historic architecture.
  travel: A methodical planner, Mary Shisko prefers guided heritage tours to European art capitals such as Florence and Paris and domestic trips to the Adirondack Mountains and the Finger Lakes, but they
    often opt for short weekend getaways due to budget constraints and the need to manage health.
  culinary: A competent home cook with a penchant for Mediterranean flavors, Mary Shisko loves preparing chicken piccata with capers and lemon, savoring fresh basil and olive oil in homemade pesto, and
    they also enjoy a cheese board featuring goat cheese, aged cheddar, and locally sourced apple butter.
  core: A meticulous detective whose love of art fuels relentless curiosity, Mary Shisko balances disciplined organization with occasional impulsive art purchases, masters yoga to temper high anxiety, and
    they channel sociable energy into leading community walks, all while battling fleeting forgetfulness about medication refills.
background:
  cultural: Mary Ann grew up in a mid‑20th‑century white, middle‑class family in upstate New York, where community, hard work, and respect for the law were core values. Her upbringing in a small‑town environment
    fostered a strong sense of civic duty and an appreciation for local heritage, which later informed her seamless integration into the Rome, NY police department. Though she completed only a high school
    education, she broke gender barriers in a traditionally male field, drawing on the era’s emphasis on discipline and self‑reliance while also enjoying the region’s modest, church‑centered social life.
attributes:
  skills: '[''crime scene processing'', ''forensic evidence analysis'', ''strategic interrogation'', ''suspect profiling'', ''case management'', ''evidence preservation'', ''courtroom testimony'', ''team
