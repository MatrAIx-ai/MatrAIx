  career_goals: Jacqueline dreams of a future where she works in a structured, predictable environment. She is particularly drawn to becoming a veterinarian because she loves caring for animals and appreciates
    the routine nature of veterinary practice. She also entertains the idea of working as a librarian or elementary school teacher, roles that would let her apply her organizational strengths and enjoy
    a calm, schedule‑driven setting while helping others.
