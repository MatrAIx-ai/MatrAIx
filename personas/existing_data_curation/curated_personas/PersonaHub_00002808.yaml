persona_description: A space scientist and astronomer who specializes in the study of solar activity, particularly coronal mass ejections. Their research interests include the behavior and effects of coronal
  mass ejections on the Earth's magnetic field and the potential consequences of such events on Earth's technology and infrastructure. They are particularly interested in the use of space-based observatories
  like the Interface Region Imaging Spectrograph to study coronal mass ejections in real-time and in high resolution. They have a keen eye for detail and are able to capture stunning footage of these events,
  which they share with the public through videos and other media.
