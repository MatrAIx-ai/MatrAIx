  career_goals: Even at five, James dreams of growing up as someone who can share his love of art and ideas with others. He often says he wants to be a teacher who tells stories, an artist who paints bright
    pictures, or an explorer who discovers new things. His kind and cooperative spirit fuels an ambition to help friends and family, and his curiosity fuels a desire to learn about the world, whether through
    drawing, science, or traveling.
