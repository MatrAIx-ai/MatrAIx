personas:
  professional: James Salinas is a budding storyteller who spends recess narrating elaborate tales about dinosaurs to classmates, weaving in bits of art observed at the town's community gallery, while their
    spontaneous nature keeps ideas fluid but occasionally leaves storyboards messy.
  sports: James Salinas dashes around the Amherst community park participating in the after-school Mini-Soccer league with the Tigers Juniors, fervently cheers for the Boston Red Sox on family game nights,
    and loves trying out gymnastics during the summer camp, though they occasionally forget to stretch before practice.
  arts: James Salinas spends free afternoons sketching colourful creatures inspired by Eric Carle's picture books, sings along to The Wiggles during preschool music time, and eagerly awaits the town's summer
    street-art festival where they admire murals by local artists, while they also love watching classic Disney films for their vibrant animation.
  travel: James Salinas's travel diary includes weekend trips to the sandy shores of Cape Cod, a family road-trip to Boston's Museum of Science for interactive exhibits, and a cherished memory of a holiday
    to Washington D.C.'s Smithsonian museums, sparking a dream to someday explore the castles of Scotland.
  culinary: James Salinas delights in scooping buttery mac & cheese into a bowl, topping it with a sprinkle of cheddar bits, munching on carrot sticks dipped in hummus, and proudly hand-mixing pancake batter
    with a wooden spoon, always asking for extra blueberries as the final garnish.
  core: James Salinas, a talkative five-year-old tornado of curiosity, blends art-loving imagination with a love of friends, yet often leaves crayons scattered when routines demand tidy order.
background:
  cultural: James was born and raised in Amherst, Massachusetts, a New England college town known for its strong emphasis on education, community arts, and cultural events. His family participates in local
    traditions such as Thanksgiving gatherings, Fourth of July celebrations, and community library programs. The presence of Amherst College and nearby cultural institutions exposes him to a diverse range
    of ideas, art exhibitions, and multicultural influences, shaping his appreciation for creativity and his open, inquisitive outlook.
