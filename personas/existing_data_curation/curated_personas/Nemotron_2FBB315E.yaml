  hobbies: '[''Visiting art museums and galleries'', ''Watercolor and acrylic painting'', ''Sketching seaside scenes'', ''Art‑history book club'', ''Gardening'', ''Hiking'', ''Crossword and logic puzzles'',
    ''Chess club'', ''Exploring coffee shops'', ''Attending theater productions'']'
  career_goals: Kelly aims to advance from senior sales associate to store manager within the next two years, leveraging her organized, reliable nature to lead a high‑performing team. She aspires to eventually
    become a district manager overseeing several Virginia Beach locations, where she can implement a regional visual‑merchandising program that integrates local artists and craftsmen. To support this vision,
    she plans to earn a retail‑management certification and a short‑course in visual merchandising design. Long‑term, Kelly envisions launching a boutique consulting service that advises small independent
    retailers on effective, art‑focused store layouts, while also exploring the possibility of opening her own curated shop that showcases regional artwork and handcrafted goods.
