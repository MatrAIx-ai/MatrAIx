personas:
  professional: Ravi Riojas is a senior mechanical engineer who leverages a blend of rigorous product design expertise in SolidWorks, MATLAB, and Agile project leadership with a curiosity for visual arts,
    channeling their meticulous, organized nature and collaborative energy into driving cross-functional teams toward sustainable, low-carbon product solutions.
  sports: Ravi Riojas stays fit by weekend hikes in Hocking Hills and regular rides with the Olentangy Trail cycling group, while cheering for the Columbus Crew and the Ohio State Buckeyes, and occasionally
    joining a local recreational basketball league in winter, reflecting their energetic, sociable nature and love for community sports.
  arts: Ravi Riojas spends afternoons sketching installations at the Columbus Museum of Art, painting watercolors inspired by the palette of Monet and the bold colors of Kehinde Wiley, performing acoustic
    guitar renditions of Woody Guthrie in a community folk band, and acting in local productions of Shakespeare's comedies, weaving their curiosity and collaborative spirit into a vibrant artistic life.
  travel: Ravi Riojas prefers meticulously planned trips that blend outdoor adventure with cultural immersion, having recently trekked the volcanic trails of Iceland, savored street food in Bangkok, and
    organized a weekend art pilgrimage to Barcelona's Picasso Museum, while dreaming of a sustainable eco-tour of New Zealand's fjords once their MBA schedule eases.
  culinary: Ravi Riojas is an avid home chef who experiments with international flavors, regularly cooking Thai green curry with lemongrass and galangal, Moroccan lamb tagine with apricots and preserved
    lemons, and perfecting a classic Italian risotto using Arborio rice and white truffle oil, showcasing their methodical approach and love for diverse cuisines.
  core: Ravi Riojas is a 44-year-old engineering leader who balances a relentless work ethic and meticulous budgeting with a habit of late-night sketching, occasional over-caffeination, and a persistent
    worry that fuels both their drive and insomnia.
background:
  cultural: Ravi was raised in a suburban community in Delaware County, Ohio, within a predominantly white, Midwestern cultural setting. His family lineage includes German and Irish ancestry, reflecting
    the common ethnic mosaic of the region. The Midwestern values of reliability, modesty, and community service have shaped his work ethic and civic engagement. Growing up near Columbus, he was exposed
    to both the city’s industrial manufacturing heritage and its vibrant arts scene, fostering an appreciation for both technical precision and creative expression. This blend of industrial roots and cultural
    curiosity informs his balanced worldview, allowing him to navigate professional engineering environments while actively seeking diverse artistic experiences and community involvement.
