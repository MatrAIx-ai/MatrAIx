  career_goals: Ravi aims to advance into a senior engineering leadership role within the next five years, ideally as a Director of Product Development where he can guide interdisciplinary teams that blend
    engineering rigor with creative design. He is pursuing a part‑time MBA to deepen his strategic and financial acumen, with a particular focus on sustainability and circular‑economy principles. By championing
    greener design practices, he hopes to influence his organization’s roadmap toward low‑carbon products. Parallel to his professional aspirations, Ravi seeks to improve his stress resilience through mindfulness
    training, ensuring he can sustain high performance while maintaining a healthy work‑life balance. He also envisions mentoring junior engineers and partnering with local art institutions to foster innovation
    at the intersection of technology and culture.
