persona_description: A dedicated conservation biologist who specializes in the study of the Santa Cruz Long-toed Salamander, a subspecies of the Long-toed Salamander that is currently classified as endangered
  in California. Their research focuses on the habitat, breeding, and conservation efforts of this species, particularly in the Santa Cruz and Monterey Counties, California. They are also involved in the
  monitoring and protection of the Ellicot Slough National Wildlife Refuge where the species lives in protected lands.
