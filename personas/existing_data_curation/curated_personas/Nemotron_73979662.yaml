personas:
  professional: Roy Mckee is an aspiring junior naturalist who channels his curiosity and practical knack for building LEGO creations into small backyard experiments, while his relaxed attitude toward obligations
    lets him explore the bayou at his own pace, fostering a cooperative spirit when sharing discoveries with friends.
  sports: Roy Mckee loves playing kick‑around soccer with friends in the Maringouin Youth Soccer League, cheering on the New Orleans Saints on weekends, and rides his bicycle to the nearby park for daily
    cardio, although his laid‑back habit sometimes leads him to forget to stretch before games.
  arts: Roy Mckee spends free time sketching comic‑style characters inspired by classic cartoonists like Chuck Jones, hums along to upbeat tunes by early jazz legend Louis Armstrong while cooking gumbo
    with his family, and devours the Magic Tree House series, especially the Pirates of the Caribbean installment, which fuels his imagination.
  travel: Roy Mckee dreams of weekend camping trips to the nearby Atchafalaya Basin and memorable family outings to New Orleans' French Quarter, while his flexible, spontaneous planning means he often darts
    off on bike‑powered explorations of nearby state parks rather than following strict itineraries, and his modest allowance limits longer journeys beyond Louisiana.
  culinary: Roy Mckee enjoys helping stir the simmering shrimp gumbo and spicy Andouille sausage jambalaya in his family's kitchen, proudly topping his beignets with generous dustings of powdered sugar,
    while his budding palate favors the bold flavors of cayenne pepper and okra but he still prefers simple cheese‑pizza slices for quick snacks.
  core: Roy Mckee is a curious, easy‑going eight‑year‑old who swaps LEGO bricks for fishing lures, roams the bayou with a sketchbook in hand, and keeps a steady rhythm of adventure and kindness despite
    occasional forgetfulness about chores.
background:
  cultural: Roy grew up in Maringouin, a small rural community in Pointe Coupee Parish, Louisiana. His family follows the white Southern tradition, with deep roots in the Mississippi River Delta region,
    attends a local Baptist church, and participates in community festivals and family barbecues. He has been immersed in Cajun and Creole culinary traditions like gumbo and jambalaya, and values the modest,
    friendly, and cooperative spirit of his community.
