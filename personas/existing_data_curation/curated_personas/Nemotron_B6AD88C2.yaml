  career_goals: Karina aims to expand her Austin studio into a multi‑disciplinary creative hub that blends photography, visual storytelling, and community events. She envisions publishing a coffee‑table
    book that showcases the cultural tapestry of Central Texas, curating traveling exhibitions, and establishing a mentorship program for emerging photographers, especially women and under‑represented artists.
    Over the next five years, she plans to secure partnerships with local businesses for branded content, offer corporate visual‑identity consulting, and eventually open a gallery‑café space that serves
    as a platform for local artists while generating additional revenue streams for her enterprise.
