  career_goals: Although only six, Jennifer already imagines a future where she can combine her love of learning, caring for animals, and helping others. She dreams of becoming a teacher or a veterinarian,
    inspired by her visits to the local farm and her enjoyment of storytime at the community library. She also loves the idea of exploring science, so she sometimes says she wants to be a scientist who
    discovers new ways to protect the environment. These aspirations reflect her curiosity, practicality, and desire to make a positive impact in her small town.
