personas:
  professional: A veteran elementary and middle-school teacher, Myrta Dejesusrosado, they weave bilingual storytelling, visual arts, and community-based projects into their curriculum, leveraging their
    curiosity and relaxed approach to create flexible, culturally resonant lessons while mentoring new educators.
  sports: A casual outdoor enthusiast, Myrta Dejesusrosado, they hike the Red Rock trails most weekends, join a local wellness group that practices yoga for flexibility, and occasionally watch the Las Vegas
    Golden Knights and the Raiders, preferring small, low-key fitness classes over large gym crowds.
  arts: An avid creator, Myrta Dejesusrosado, they paint acrylic landscapes inspired by folkloric motifs, assemble mixed-media collages while listening to Beethoven’s symphonies and the vibrant rhythms
    of Celia Cruz, participate in community pottery workshops, and draw inspiration from Frida Kahlo and Diego Rivera.
  travel: A purposeful traveler, Myrta Dejesusrosado, they favor intimate cultural immersion trips, having explored the art-laden streets of Santa Fe, the historic plazas of a colorful coastal town famed
    for its open-air markets and mural-covered alleys, and planning a future visit to a renowned pottery hub in Europe, all while budgeting trips around school breaks and family responsibilities.
  culinary: A passionate home chef, Myrta Dejesusrosado, they master mole with ancho chilies, masa-based tamales filled with pork and herbs, and refreshing ceviche seasoned with lime, cilantro, and jalapeño,
    often experiment with quinoa-crusted fish tacos, and tend their herb garden for fresh oregano, cilantro, and epazote to elevate every dish.
  core: Myrta Dejesusrosado, a 51-year-old teacher-artist, they channel relentless curiosity into vibrant classrooms and studios, yet their habit of misplacing receipts and occasional anxiety spikes make
    life a balancing act of creativity and calm.
background:
  cultural: Myrta was raised in a Mexican‑American household where family gatherings, storytelling, and music were central to daily life. She grew up bilingual, speaking Spanish at home and English at school,
    and maintains strong ties to Mexican culinary traditions and celebrations such as Día de los Muertos and Día de la Independencia. These cultural roots shape her teaching philosophy; she regularly incorporates
    Mexican folklore, visual arts, and bilingual resources into lesson plans to reflect the diverse backgrounds of her Las Vegas students. While honoring her heritage, Myrta also embraces Nevada's multicultural
    environment, actively participating in local Mexican cultural centers, organizing cross‑cultural events, and fostering dialogue that bridges Mexican and broader American cultural experiences.
attributes:
  skills: '["Classroom instruction","Curriculum development","Differentiated instruction","Bilingual Spanish–English communication","Educational technology integration (Google Classroom, interactive whiteboards)","Arts
    integration","Social‑emotional learning facilitation","Conflict resolution and mediation","Mentoring new teachers","Community outreach and parent engagement"]'
  hobbies: '["Painting (acrylics and mixed media)","Pottery and ceramics","Cooking traditional Mexican cuisine and fusion recipes","Yoga and guided meditation","Herb gardening","Hiking on Red Rock trails","Reading
    art‑history and contemporary literature","Participating in small community art workshops","Listening to classical and Latin music","Crafting (crocheting, knitting)"]'
  career_goals: Myrta aspires to move into a district‑level curriculum specialist role where she can expand interdisciplinary, arts‑based, and culturally responsive teaching across schools. She plans to
    earn a certification in social‑emotional learning and lead a comprehensive SEL program that supports students experiencing anxiety or distress. Over the next five years, she hopes to launch an after‑school
    art studio that celebrates Mexican and Latino artistic traditions, providing a safe creative outlet for diverse learners. Additionally, she wants to formalize a mentorship cohort for early‑career educators,
    sharing her unconventional lesson‑planning approaches and fostering a collaborative, low‑stress professional culture.
