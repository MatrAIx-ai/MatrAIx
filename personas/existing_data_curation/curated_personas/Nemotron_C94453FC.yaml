personas:
  professional: Minna Garner, a 59‑year‑old interdisciplinary data storyteller, translates complex scientific datasets into vivid visual narratives using Python, R, and Tableau, designs community workshops
    that blend art and analytics, mentors women over 40 seeking to bridge quantitative and creative fields, and serves as a part‑time advisory consultant for local museums to embed interactive data displays
    into exhibitions.
  sports: Minna Garner enjoys gentle fitness activities such as sunrise yoga on the beach, weekly walks with the Boynton Beach Senior Walkers club, occasional pickleball matches at the local community center,
    and follows the Miami Heat and Tampa Bay Buccaneers for a blend of basketball and football excitement.
  arts: Minna Garner frequently visits the Norton Museum, sketches watercolor studies of Monet’s water lilies and O'Keeffe’s desert blooms, volunteers as a docent for community art programs, finds inspiration
    in the jazz of Nina Simone and the vibrant rhythms of Caribbean steel‑pan music, and attends the Sarasota Opera’s seasonal productions, all of which shape her creative outlook.
  travel: Minna Garner plans relaxed yet culturally rich trips, such as a weekend sail to the Florida Keys, a family cruise to the Bahamas, a literary pilgrimage to Savannah’s historic squares, and an adventurous
    solo journey to Oaxaca to explore its vibrant markets and indigenous art, balancing spontaneity with her desire for flexible scheduling.
  culinary: Minna Garner delights in cooking garden‑fresh dishes like herb‑infused grilled zucchini, mango‑cilantro salsa, and pan‑seared shrimp with lemon‑butter sauce, regularly dines at the waterfront
    restaurant Ocean’s Table for its stone‑crab bisque, and occasionally experiments with Caribbean jerk seasoning, reflecting her love for bright flavors and seasonal produce.
  core: Minna Garner is a curious, art‑driven data storyteller who blends science with creativity, embraces flexible routines, sometimes drifts into gentle disorganization, and finds balance through yoga,
    seashell collecting, and mentoring women over 40.
background:
  cultural: Minna grew up in a middle‑class family in the Midwest, where a strong emphasis on education and community service shaped her values. Her parents, both teachers, encouraged an appreciation for
    literature, music, and the natural world, fostering an early love for both the arts and analytical thinking. After completing a BA in humanities, she moved to Florida in her early thirties, drawn by
    the state’s vibrant cultural scene and warm climate. Living in Boynton Beach for the past two decades, she has embraced the diverse, retiree‑friendly atmosphere of Palm Beach County, participating in
    local arts councils, environmental beach clean‑ups, and multicultural festivals that celebrate the region’s blend of Caribbean, Latin, and Southern influences. While she identifies with the broader
    Anglo‑American cultural tradition, her experiences in Florida have broadened her perspective, making her comfortable navigating both traditional and unconventional social settings.
