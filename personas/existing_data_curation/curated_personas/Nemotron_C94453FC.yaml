  hobbies: '["Watercolor painting", "Museum visits", "Beach walks and photography", "Reading (fiction & popular science)", "Yoga", "Vegetable gardening", "Docent volunteering", "Genealogy research", "Public
    lecture attendance", "Exploring new cafés"]'
  career_goals: Minna aims to become a leading catalyst for interdisciplinary collaboration between the sciences and the arts within her community. Over the next five years she plans to design and launch
    a series of public workshops that use data‑driven storytelling to explore visual art, mentor emerging professionals—especially women over 40—who wish to bridge quantitative and creative fields, and
    author a book that chronicles the historical intersections of mathematics and visual culture. She also hopes to secure a part‑time advisory role with local museums to integrate interactive data displays
    into exhibitions, allowing her to maintain a flexible schedule that supports her lifelong learning and family commitments.
