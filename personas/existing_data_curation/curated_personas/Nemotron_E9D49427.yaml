personas:
  professional: James Nix is a bank teller in Chesapeake who leverages their meticulous cash‑handling expertise, proficiency with FIS and NCR systems, and methodical problem‑solving to deliver consistent,
    regulation‑compliant service while quietly mentoring newer staff.
  sports: James Nix enjoys early morning jogs with the Chesapeake Trail Runners, occasional hikes in the Great Dismal Swamp, and regularly attends Norfolk Tides minor‑league baseball games while cheering
    on the Baltimore Orioles during the MLB season.
  arts: James Nix channels their creative side through precise model‑train assemblies and intricate LEGO builds, finds strategic satisfaction in chess matches against local club members, and unwinds listening
    to John Williams’ orchestral scores and classic tracks by The Beatles while admiring Edward Hopper’s paintings.
  travel: James Nix prefers meticulously planned road trips, having explored historic Annapolis and the museums of Washington DC, and now dreams of a weekend getaway to Charleston’s waterfront and a cultural
    tour of London’s British Museum.
  culinary: James Nix enjoys cooking at a moderate level, frequently preparing Chesapeake crab cakes seasoned with Old Bay, whipping up Thai green curry with lemongrass and coconut milk, and occasionally
    indulging in homemade spaghetti carbonara with pancetta and Pecorino.
  core: James Nix balances a love for exacting model‑train construction and disciplined budgeting with a habit of sipping endless coffee while secretly binge‑watching classic detective shows after a long
    teller shift.
background:
  cultural: James grew up in a middle‑class, white American family in Chesapeake, Virginia, where Southern coastal culture blends with Mid‑Atlantic sensibilities. His upbringing emphasized hard work, practicality,
    and community involvement, often shaped by the city’s proximity to military families and the presence of naval installations. He attended local public schools and participates in a Methodist congregation,
    reflecting the region’s modest religious traditions. The cultural environment fostered values of self‑reliance, modest ambition, and a respect for structured routines, all of which continue to influence
    his personal and professional life.
attributes:
  skills: '["Cash handling", "Banking software (FIS, NCR)", "Customer service", "Compliance and AML basics", "Data entry", "Basic financial calculations", "Problem solving", "Conflict resolution", "Time
