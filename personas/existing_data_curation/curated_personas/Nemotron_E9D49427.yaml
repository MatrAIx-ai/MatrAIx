  hobbies: '["Model train building", "LEGO construction", "Fishing", "Jogging", "Hiking", "Reading non‑fiction (history, finance)", "Chess", "Volunteer financial‑literacy workshops", "Attending local baseball
    games"]'
  career_goals: James aims to progress from teller to senior teller and eventually to a shift supervisor or assistant branch manager within the next five years. He plans to enroll in an associate's degree
    program in Business Administration or Finance to deepen his industry knowledge, and to obtain certifications such as Certified Bank Teller (CBT) and Certified Financial Services Counselor (CFSC). Long‑term,
    he envisions a stable banking career that offers leadership opportunities, allowing him to mentor new employees and contribute to improving branch efficiency. He also hopes to achieve financial independence
    to purchase a home in Chesapeake and secure his future.
