personas:
  professional: Robert Hamad is a budding robotics and game‑development prodigy, leveraging their disciplined, detail‑oriented mindset to design LEGO‑based automation projects and prototype small Python
    games, while their curiosity for art fuels a habit of integrating visual aesthetics into their tech creations.
  sports: Robert Hamad is a member of a local youth soccer league with the LA Galaxy Academy’s U‑12 team and an avid fan of the Los Angeles Lakers and the LA Dodgers, balancing their competitive drive with
    disciplined training sessions and preferring to watch games on the big screen when they’re not on the field.
  arts: 'Robert Hamad roams Los Angeles’s street‑art corridors to admire murals by Shepard Fairey and local graffiti crews, visits LACMA to study works by Yayoi Kusama, and spends quiet evenings sketching
    in a style inspired by graphic novels like ‘Saga’ and ‘Batman: The Killing Joke’ while indie playlists featuring Tame Impala and Arctic Monkeys fuel their creative energy.'
  travel: Robert Hamad has explored the San Diego Zoo and the Getty Museum, taken a weekend road trip to Santa Barbara’s coastline, and dreams of a cultural pilgrimage to Tokyo’s Akihabara and a museum‑café
    day at the British Museum in London, favoring well‑planned itineraries that blend educational stops with time for them to sketch new scenes.
  culinary: Robert Hamad loves California tacos with carne asada, enjoys sushi rolls like the California roll, can whip up a decent grilled cheese with sharp cheddar, and often adds avocado, cilantro, and
    a dash of sriracha to their snacks, while they frequently explore food trucks in the Arts District for experimental bowls and artisanal ice‑cream.
  core: Robert Hamad fuses a razor‑sharp, organized mind with an insatiable curiosity for art and technology, constantly sketching new ideas while competitively mastering LEGO robotics and indie game coding,
    yet they occasionally rebel by splurging on the latest gadget or snack.
background:
  cultural: Robert comes from a white, middle‑class family rooted in Anglo‑American traditions, with extended relatives who identify as Irish‑American and Italian‑American. Growing up in Los Angeles, he
    is exposed daily to the city's multicultural vibe—celebrating mainstream holidays such as Thanksgiving and the Fourth of July while also tasting the diverse culinary and artistic influences of his diverse
    neighborhood. His family values education and self‑discipline, encouraging participation in community arts programs and after‑school clubs. The blend of suburban stability and the dynamic, multicultural
    environment of Los Angeles shapes his open‑minded curiosity, appreciation for varied experiences, and competitive spirit.
attributes:
  skills: '[''Organized academic planning'', ''Digital illustration'', ''Basic programming (Scratch, Python)'', ''Strategic board gaming (chess)'', ''Research and fact‑checking'', ''Creative writing'']'
  hobbies: '[''Visiting art museums and galleries'', ''Digital and traditional sketching'', ''LEGO robotics building and programming'', ''Coding mini‑games'', ''Reading science‑fiction and graphic novels'',
    ''Playing chess'', ''Journaling'', ''Attending weekend art workshops'', ''Listening to indie music'']'
  career_goals: Robert aspires to merge his love for art and technology by pursuing a career in multimedia design or video‑game development. He dreams of attending a specialized high‑school magnet program
    focused on visual arts and computer science, building a strong portfolio that could win scholarships. In the longer term, he aims to become a concept artist or creative director, leading innovative
    projects that blend unconventional ideas with polished execution. He also hopes to compete in national art and robotics competitions, using those experiences to refine his craft and possibly launch
    a personal YouTube channel showcasing his creative process.
