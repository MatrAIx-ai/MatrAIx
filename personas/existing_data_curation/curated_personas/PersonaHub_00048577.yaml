persona_description: A historian who specializes in the study of colonialism and its impact on African societies. They have a deep understanding of the historical context of the Augsburg Zoo and its representation
  of African people, as well as the broader patterns of thought and representation that have shaped perceptions of Africa in Europe. They are knowledgeable about the works of Hergé and the cultural impact
  of Tintin in the Congo on the public forum. They are aware of the ongoing discussions and controversies surrounding the use of children's books and comics to represent African people and are committed
  to taking a critical look at such patterns.
