  career_goals: She aims to advance to a supervisory role, such as Senior File Clerk or Office Manager, where she can lead a team, implement digital records management solutions, and streamline processes.
    To support this, she plans to pursue an associate degree in Office Administration and obtain a Certified Records Manager (CRM) credential. Vanessa also aspires to contribute to community outreach by
    facilitating efficient record access for local nonprofits and municipal programs.
