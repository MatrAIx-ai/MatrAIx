persona_description: A historian or archaeologist who is interested in the development of early civilizations in southern China and the relationship between the Yue culture and other Tai speaking populations.
  This person is likely to have a background in archaeology, with a specialization in the study of prehistoric and early state cultures. They are also knowledgeable about the Neolithic and early state period
  in southern China, and have a keen interest in understanding the cultural and linguistic diversity of this region. This person is likely to have access to a wide range of academic journals and publications
  on Chinese archeology, and is likely to be familiar with the works of Heather Peters, the author of the text.
