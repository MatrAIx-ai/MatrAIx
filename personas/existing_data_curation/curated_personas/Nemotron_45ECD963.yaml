  hobbies: '[''Swimming'', ''Reading science fiction and marine biology books'', ''Drawing and comic creation'', ''Playing volleyball'', ''Cooking Mexican dishes'', ''Learning coding projects (Scratch,
    Python)'', ''Volunteering at community library'']'
  career_goals: Hannah aspires to pursue a career in biomedical or environmental engineering, focusing on marine health and sustainable technology. She plans to enroll in a specialized STEM high school,
    earn a scholarship, and later study engineering at a university with strong research programs. In the long term, she aims to develop affordable medical devices or eco‑friendly solutions for coastal
    communities, while mentoring younger students in STEM.
