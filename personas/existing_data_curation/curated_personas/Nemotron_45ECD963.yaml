personas:
  professional: A budding marine‑biology enthusiast and aspiring coder, Hannah Sevilla combines disciplined research habits with a flair for practical problem‑solving, turning their weekend library volunteer
    work into small‑scale data‑collection projects on local tidal patterns.
  sports: On the Gulf Coast, Hannah Sevilla spikes a volleyball for the local youth club, dives into under‑15 swim meets with the Sarasota Dolphins, and passionately roots for the Miami Heat while keeping
    a disciplined morning stretch routine that mixes yoga with freestyle laps.
  arts: With a sketchbook always on hand, Hannah Sevilla channels their love for science‑fiction novels like "The Left Hand of Darkness" into original comic strips featuring marine‑themed superheroes, cites
    graphic‑novel artist Marjane Satrapi as an inspiration, and binge‑watches Studio Ghibli films for visual storytelling cues.
  travel: Balancing a tight school schedule and a modest allowance, Hannah Sevilla plans short weekend getaways to the nearby historic lighthouse and long‑summer trips dreaming of snorkeling the Belize
    Barrier Reef, all while curating a travel journal filled with postcards from the Florida Keys and sea‑shell collections from each shore.
  culinary: In the family kitchen, Hannah Sevilla masterfully prepares tacos al pastor, salsas with roasted tomatillos, and a signature fish ceviche, while also experimenting with tofu stir‑fry to incorporate
    more plant‑based meals, and documents each recipe’s success rate on a cooking spreadsheet.
  core: Organized to a fault, Hannah Sevilla blends curiosity with practicality, juggling marine biology studies, coding projects, and culinary experiments while occasionally over‑committing and forgetting
    to unwind.
background:
  cultural: Hannah grows up in a Mexican‑American household in Dickinson, Texas, where Spanish is spoken at home and family traditions like Día de los Muertos, Mexican cuisine, and mariachi music are celebrated.
    Her upbringing emphasizes respeto, strong family bonds, and the value of education, which motivate her academic drive. The coastal Texas environment blends with her cultural heritage, inspiring her
    interest in marine health and community service.
attributes:
  skills: '[''Bilingual (English-Spanish)'', ''Algebra and geometry proficiency'', ''Effective time management'', ''Project planning and organization'', ''Basic Scratch and introductory Python coding'',
