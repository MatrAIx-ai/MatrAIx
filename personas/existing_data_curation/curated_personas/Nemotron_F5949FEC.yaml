personas:
  professional: Larry Rothering, a college sophomore in Communications, leverages their Photoshop skills and event‑planning experience to craft engaging social‑media campaigns and coordinate community art
    showcases for local nonprofits, balancing meticulous organization with spontaneous creative bursts.
  sports: Larry Rothering, an avid mountain‑biker on the Boise River Greenbelt and a regular intramural basketball player, follows the Boise State Broncos and Boise Hawks, preferring outdoor cardio and
    team sports that blend social interaction with nature, though they occasionally skip workouts during high‑stress weeks.
  arts: Larry Rothering, a dedicated mural photographer and frequent volunteer at Treefort Music Festival, immerses themselves in indie‑film screenings, open‑mic nights, and reads speculative‑fiction works
    like 'The Three‑Body Problem', while drawing inspiration from street artists such as Banksy and musicians like Tame Impala.
  travel: Larry Rothering, a weekend explorer, frequently hikes the Idaho foothills and has road‑tripped to Portland and Seattle for music festivals, dreams of experiencing the vibrant street‑art scene
    of Berlin and the jazz heritage of New Orleans, and prefers budget‑friendly hostels and public transit for travel planning.
  culinary: Larry Rothering, an enthusiastic home‑cook, experiments with recipes ranging from spicy ramen bowls to vegan tacos, favors fresh basil, sumac, and avocado in dishes, and often references YouTube
    chefs while occasionally overcooking the occasional batch of sourdough starter.
  core: Larry Rothering blends artistic curiosity with community‑focused ambition, they navigate anxiety through mindfulness, and they balance spontaneous creativity with disciplined organization in both
    work and play.
background:
  cultural: Larry is a White American raised in Boise, Idaho, in a middle‑class family with German‑English ancestry. Growing up in the Pacific Northwest, he was immersed in a blend of rugged outdoor culture
    and a burgeoning arts scene that values both self‑reliance and community involvement. Family gatherings often featured backyard barbecues and discussions about regional history, while neighborhood festivals
    exposed him early to music, visual art, and civic activism. The local emphasis on environmental stewardship and the city’s progressive, yet modest, cultural vibe have shaped his appreciation for nature,
    his openness to unconventional ideas, and his desire to contribute positively to his community.
attributes:
  skills: '[''Digital communication (Google Workspace, Microsoft Office)'', ''Basic Adobe Photoshop and Lightroom editing'', ''Public speaking and presentation'', ''Research and critical‑thinking'', ''Event
    planning and logistics'', ''Team coordination and conflict resolution'', ''Social media content creation'']'
  hobbies: '[''Photography of urban murals'', ''Hiking and mountain biking'', ''Attending live music and open‑mic events'', ''Volunteering at community art festivals'', ''Intramural basketball'', ''Cooking
    experimental dishes'', ''Reading speculative fiction'', ''Playing video games'', ''Journaling and mindfulness meditation'']'
  career_goals: Larry aims to turn his love for art, community, and communication into a career that blends creativity with people‑focused work. He plans to complete a bachelor's degree in Communications
    or Arts Management, then seek a role as a community outreach coordinator or social media manager for a nonprofit arts organization in Boise or a similar vibrant city. In the longer term, he hopes to
    direct a regional arts festival that highlights emerging local talent while providing inclusive programming for youth. Recognizing his sensitivity to stress, Larry also prioritizes finding a workplace
    that offers supportive mentorship, opportunities for professional development, and a balance between collaborative projects and independent creative work.
