  career_goals: Daysi aims to move into a supervisory or team‑lead role within the customer service department, where she can mentor newer agents, champion a supportive work environment, and implement stress‑reduction
    strategies for her team. She plans to enroll in community‑college courses in business management and customer experience certification to strengthen her leadership toolkit. Simultaneously, she dreams
    of launching a small side business that sells handmade Mexican‑inspired artwork and artisanal food products, blending her love for creativity with entrepreneurial ambition. Ultimately, she seeks a balanced
    career that offers both professional growth and the flexibility to pursue her artistic passions while mitigating stress.
