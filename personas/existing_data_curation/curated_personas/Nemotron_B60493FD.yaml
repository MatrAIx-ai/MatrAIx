  career_goals: Mauricio aims to transition his one‑person operation into a small, family‑run painting and decorative‑finishes studio that can service the greater San Diego area. He plans to earn certified
    contractor status through the Painting Contractors Association, hire two apprentices, and offer design‑consulting services that blend modern aesthetics with vibrant Mexican motifs. A long‑term goal
    is to secure commissions for community murals that celebrate Chula Vista’s cultural heritage, while also establishing a modest teaching program at a local community college or adult‑education center
    where he can share his trade knowledge and artistic perspective. Financially, he targets steady growth that ensures a comfortable retirement for his family and the ability to invest in a modest property
    of his own.
