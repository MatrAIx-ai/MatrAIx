    (PowerBI, Tableau)'', ''Statistical Software (R, Python)'']'
  hobbies: '[''Art Gallery Visits'', ''Photography'', ''Watercolor Painting'', ''Salsa Dancing'', ''Listening to Plena and Bomba Music'', ''Reading Latin American Literature'', ''Community Gardening'',
    ''Youth Mentorship in Data Analytics'', ''Attending Cultural Festivals'', ''Writing Reflections'']'
  career_goals: Angel aims to transition into a senior leadership role within the public sector where she can shape policy through rigorous analysis and drive community development projects in the central
    mountain region of Puerto Rico. Over the next five years she envisions becoming Director of Strategic Planning for the Municipality of Caguas, leading cross‑functional teams to implement sustainable
    economic initiatives, improve public service delivery, and integrate arts and cultural programs into municipal planning. She also aspires to mentor the next generation of analysts, especially women
    and underrepresented groups, and to champion data literacy across community organizations.
