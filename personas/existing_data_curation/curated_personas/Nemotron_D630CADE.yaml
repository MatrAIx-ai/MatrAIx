  career_goals: Matthew aims to pursue a high‑school art and technology magnet program, followed by a degree in visual arts, game design, or interactive media. He envisions a future career as a concept
    artist or narrative designer, creating compelling visual worlds and stories for video games or animated projects. He also hopes to develop his own indie games that blend his love for abstract concepts
    with engaging storytelling, and eventually mentor younger creators in his community.
