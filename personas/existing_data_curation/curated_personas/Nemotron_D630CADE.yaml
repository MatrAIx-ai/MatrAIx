personas:
  professional: An aspiring digital artist and budding coder, Matthew Miller combines a love for speculative fiction with meticulous organization to create intricate Minecraft-inspired LEGO designs while
    volunteering at the community library, where they channel their imaginative curiosity and reliable nature.
  sports: Matthew Miller follows the Miami Heat and the Florida Gators with fervor, plays pickup soccer at the local community center on weekends, and joins the Boca Raton Paintball Club for occasional
    adrenaline bursts, all while preferring small-group drills over large team spectacles.
  arts: Matthew Miller draws inspiration from the ambient soundscapes of Brian Eno, the surreal illustrations of Hayao Miyazaki, and the lyrical storytelling of Neil Gaiman, channeling these influences
    into speculative fiction short stories and experimental digital paintings that blend fantasy with coastal ecosystems.
  travel: Matthew Miller's travel diary boasts weekend trips to the Everglades and annual family cruises to the Bahamas, while dreaming of immersive cultural tours of Kyoto's ancient temples and the futuristic
    architecture of Singapore's Marina Bay, preferring carefully planned itineraries that balance adventure with study time.
  culinary: Matthew Miller relishes homemade fish tacos with fresh mango salsa, expertly chops kale for a weekly quinoa bowl, and experiments with making crispy churro dough after watching cooking videos,
    though they often forget to turn off the oven after late-night snack experiments.
  core: Matthew Miller is a quietly ambitious teen who blends a vivid imagination with disciplined organization, channeling solitary creativity into art and code while navigating the occasional collector's
    impulse and allergy management with a quirky, methodical charm.
background:
  cultural: Matthew grew up in a middle‑class, suburban family in Boca Raton, Florida. His upbringing reflects a blend of typical American values—emphasis on education, community involvement, and celebration
    of national holidays such as Thanksgiving and the Fourth of July—and the relaxed coastal lifestyle of South Florida. Exposure to the multicultural environment of Palm Beach County, including diverse
    arts festivals and beach culture, has broadened his perspective while his family maintains traditions rooted in their European‑origin heritage, such as holiday baking and storytelling. This environment
    nurtures his curiosity, artistic interests, and respect for both individuality and community.
