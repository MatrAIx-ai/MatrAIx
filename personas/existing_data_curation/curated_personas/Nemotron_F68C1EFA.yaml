personas:
  professional: Darlene Zia, a seasoned HVAC technician with EPA Section 608 certification, translates complex schematics into clear client explanations, applying her inventive, out-of-the-box mindset to
    retrofit rural homes for energy efficiency while mentoring apprentices with patient, hands-on guidance.
  sports: Darlene Zia keeps fit through weekly walks with the local Heritage Trail seniors jogging club, plays casual softball on the town's community league, and faithfully cheers for the Cleveland Browns
    and Ohio State Buckeyes while occasionally streaming Cleveland Cavaliers games during the winter months.
  arts: Darlene Zia channels her imaginative spirit into abstract watercolors inspired by Georgia O'Keeffe, builds mixed-media collages reminiscent of Max Ernst, and finds quiet joy in quilting circles
    where she swaps patterns while listening to Bob Dylan and Leonard Cohen on her vintage record player.
  travel: Darlene Zia prefers modest, well-planned road trips that blend scenic stargazing stops—such as Cuyahoga Valley National Park and perched overlooks in Sedona—with visits to family in Michigan's
    Mackinac Island, while dreaming of a future pilgrimage to Cappadocia's cave dwellings for a night of uninterrupted astrophotography.
  culinary: Darlene Zia enjoys crafting hearty Midwestern meals—she kneads sourdough starter for crusty rye bread, simmers chicken pot pie with rosemary-infused gravy, and experiments with roasted beet
    and feta salads featuring locally sourced fennel—while occasionally treating herself to fresh sushi rolls after a weekend market visit.
  core: Darlene Zia is a paradox of precision and day-dreaming, expertly retrofitting rural HVAC systems while her evenings dissolve into watercolor abstractions, and her tendency to worry often leads her
    to double-check every pipe and paint stroke, even if it means missing her favorite TV show.
background:
  cultural: Darlene was raised in a Midwestern, white, working‑class family in northwestern Ohio. Her cultural roots reflect the modesty, self‑reliance, and community spirit typical of small‑town Ohio.
    She grew up attending local church gatherings, county fairs, and community picnics, and values family ties and neighborly support. Her background includes German and Irish ancestry, influencing a respect
    for craftsmanship and practical problem‑solving. The agricultural landscape and close‑knit town life have shaped her appreciation for sustainability and stewardship of local resources.
attributes:
  skills: '["HVAC system installation", "Refrigeration cycle troubleshooting", "Electrical wiring and safety compliance", "Blueprint reading", "EPA Section 608 certification", "Energy efficiency auditing",
