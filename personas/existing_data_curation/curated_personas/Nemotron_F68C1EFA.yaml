  hobbies: '["Abstract watercolor painting", "Mixed‑media collage", "Speculative‑fiction writing", "Science‑fiction reading", "Backyard telescope stargazing", "Quilting", "Woodworking", "Nature walks",
    "Bird‑watching", "Mindfulness journaling"]'
  career_goals: Darlene aims to transition from full‑time service work to a part‑time consultancy, focusing on sustainable HVAC solutions for rural homes. She plans to obtain a Master HVAC Technician designation,
    develop training workshops for young technicians, and launch a small business offering energy‑efficiency retrofits. Additionally, she hopes to document her innovative repair techniques in a guidebook
    and volunteer to maintain heating systems for low‑income families in her county.
