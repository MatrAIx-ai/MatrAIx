  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading contemporary literature'', ''Philosophical essays'', ''Journaling'', ''Nature photography'', ''Solo hiking'', ''Meditation'',
    ''Small book club discussions'', ''Volunteer tutoring'', ''Educational blogging'', ''Listening to indie and classical music'']'
  career_goals: Victoria aims to obtain her Ohio teaching licensure and begin her career as an elementary school teacher with a specialization in art integration and social‑emotional learning. She envisions
    developing interdisciplinary curricula that blend creative expression with core academic subjects, fostering both academic achievement and emotional well‑being. In the longer term, she aspires to become
    a curriculum specialist or instructional coordinator, authoring resources that support teachers in incorporating mindfulness and art‑based strategies into daily instruction. She also hopes to pursue
    a master's degree in special education or educational psychology, eventually founding a community nonprofit that offers after‑school art programs and mental‑health support for underserved youth in rural
    Ohio.
