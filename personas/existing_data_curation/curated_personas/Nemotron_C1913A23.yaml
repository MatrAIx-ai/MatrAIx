personas:
  professional: Victoria Ogle, an aspiring elementary school teacher specializing in art integration and social‑emotional learning, leverages their expertise in curriculum design, differentiated instruction,
    and educational technology while they channel their meticulous organization and occasional worry into high‑standard lesson plans that nurture both academic growth and emotional well‑being.
  sports: Victoria Ogle, an outdoor‑leaning teen, follows the Cleveland Browns and the Cleveland Guardians, participates in a weekend trail‑running club along the Maumee River wetlands, and attends a Monday
    night yoga class at the community center to maintain flexibility, showing they blend competitive fandom with personal fitness.
  arts: Victoria Ogle, a quietly creative soul, frequents the Cleveland Museum of Art to study Monet and O’Keeffe, curates a personal Instagram feed inspired by contemporary watercolorist Yuko Kono, and
    draws motivation from the indie folk sounds of Sufjan Stevens and Iron & Wine while they work on digital illustrations, reflecting a blend of classic reverence and modern inspiration.
  travel: Victoria Ogle, a budget‑conscious explorer, has taken day trips to Hocking Hills State Park and a weekend getaway to Charleston, South Carolina, and dreams of a spring study‑abroad excursion to
    Florence, Italy, where Renaissance frescoes and scenic piazzas would feed their artistic aspirations, which they pursue despite limited funds.
  culinary: Victoria Ogle, an 18‑year‑old who values wholesome meals, loves preparing quinoa bowls with roasted vegetables and lemon‑tahini dressing, delights in watercolor sketches of fresh fruit, but
    often neglects to finish a slice of pepperoni pizza after late‑night study sessions, illustrating they balance disciplined nutrition with occasional indulgent cravings.
  core: Victoria Ogle, an organized yet quietly anxious 18‑year‑old, merges a passion for art, education, and mindfulness into a disciplined routine while they sometimes succumb to perfectionist stress
    and procrastination, revealing a unique blend of meticulous creativity and heartfelt sensitivity.
background:
  cultural: Victoria was raised in West Unity, a close‑knit town in northwestern Ohio. Her family has longstanding roots in the region, attending a Protestant congregation that emphasizes community service,
    modesty, and hard work. Growing up amid the agricultural landscape of Williams County, she participated in local fairs, school events, and church activities, which instilled a strong sense of civic
    responsibility and appreciation for rural simplicity. At the same time, her parents encouraged intellectual curiosity and exposure to the arts, fostering her love for literature, music, and visual culture.
    This blend of Midwestern values and artistic encouragement shaped Victoria's disciplined, cooperative nature and her desire to contribute positively to her community through education and creative expression.
attributes:
  skills: '[''Curriculum design'', ''Lesson planning'', ''Classroom management'', ''Differentiated instruction'', ''Educational technology integration'', ''Google Classroom'', ''Canvas LMS'', ''Data-driven
