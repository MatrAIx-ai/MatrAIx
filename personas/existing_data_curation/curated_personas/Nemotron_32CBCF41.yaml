personas:
  professional: Anita Cummings is an aspiring teenage writer and digital illustrator who channels their love for structured storytelling into weekly contributions for the school literary magazine while
    also allowing impromptu bursts of creativity that sometimes cause them to scramble to meet deadlines.
  sports: Anita Cummings plays basketball for the community park’s after‑school Hoops Club, cheers for the Chicago Bulls, and balances structured practice sessions with spontaneous pickup games, though
    they sometimes skip drills when school projects mount.
  arts: Anita Cummings curates indie playlists featuring Tame Impala, Phoebe Bridgers, and Billie Eilish, sketches characters inspired by Loish’s stylized art, and occasionally performs a spoken‑word piece
    at the local coffee shop’s open‑mic night, letting both music and visual art shape their creative identity.
  travel: Anita Cummings enjoys weekend day trips to nearby state parks and dreams of visiting Tokyo for its music scene and Paris for its art museums, preferring a blend of parent‑planned itineraries and
    spontaneous wanderings while budget constraints sometimes keep them grounded.
  culinary: Anita Cummings loves making homemade margherita pizza and experimenting with vegan avocado toast topped with cherry tomatoes and feta, while also enjoying quick ramen bowls, and they often blend
    smoothie bowls with berries and spinach as a healthy snack after basketball practice.
  core: Anita Cummings is a diligent yet impulsive teen who balances a structured love for writing and community gardening with spontaneous bursts of creativity, occasionally forgetting deadlines and misplacing
    their sketchbook.
background:
  cultural: Anita grew up in the diverse urban landscape of Chicago, Illinois, in a middle‑class neighborhood on the city's North Side. Her family is of white, Midwestern American heritage, celebrating
    traditional holidays such as Thanksgiving and Christmas while also embracing city customs like attending Cubs games and trying Chicago‑style deep‑dish pizza. The multicultural environment of her school
    and community exposes her to a wide range of languages, cuisines, and cultural events, from the annual Chicago Air & Water Show to neighborhood block parties featuring music from various backgrounds.
    This blend of Midwestern values and city vibrancy influences her worldview, fostering both an appreciation for community cohesion and an openness to diverse perspectives.
