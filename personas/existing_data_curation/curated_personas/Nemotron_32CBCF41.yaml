  career_goals: Anita hopes to pursue a career that blends creativity with practical problem‑solving. She is intrigued by graphic design and visual communication, envisioning a future where she can translate
    ideas into compelling digital artwork while working within structured project timelines. She also wants to leverage her community‑oriented nature by mentoring younger students and possibly working in
    youth outreach programs. In the longer term, she sees herself attending a university with a strong design program, completing internships at a Chicago‑based creative agency, and eventually contributing
    to public‑interest campaigns that promote environmental sustainability.
