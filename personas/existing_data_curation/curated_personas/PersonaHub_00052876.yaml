persona_description: A materials scientist who specializes in the sustainable use of materials, particularly in the design and optimization of metal components. He is interested in reducing the amount of
  metal used in products and in making these components more sustainable. He is also interested in reducing the yield losses in the production of metals and in diverting manufacturing scrap. He is looking
  for ways to extend the lives of products and to re-use old components before recycling. He is also interested in the use of recycled materials and in the development of new materials. He is interested
  in the use of technology to improve the sustainability of materials use and in the use of data to inform decision-making.
