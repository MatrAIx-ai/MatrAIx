personas:
  professional: Ernesto Borges is a 23‑year‑old site carpenter in Sacramento who blends hand‑tool craftsmanship with digital design, uses SketchUp and Fusion 360 to produce custom, reclaimed‑wood furniture,
    mentors apprentices with a skeptical eye for shortcuts, and thrives on the flexibility of on‑the‑fly problem solving despite a tendency toward disorganization.
  sports: Ernesto Borges plays pickup basketball for the Sacramento Urban Hoops league, follows the Sacramento Kings and Golden State Warriors avidly, cycles the American River trail three times a week
    with a local bike club, and joins seasonal hiking trips to the Sierra foothills, balancing competitive court play with relaxed, nature‑oriented fitness.
  arts: Ernesto Borges immerses himself in Sacramento’s art scene, regularly touring the Crocker Art Museum’s contemporary exhibits, snapping photos of street murals by local artist Michele Malone, strumming
    acoustic covers of Bob Dylan and Tame Impala at open‑mic nights, and curating a small bookshelf of design‑inspired coffee‑table books by Charles and Ray Eames, all of which fuel his creative furniture
    concepts.
  travel: Ernesto Borges prefers spontaneous road trips along the California coast, has already explored Yosemite, Lake Tahoe, and Portland’s craft‑brew neighborhoods, dreams of visiting the Bavarian forest
    markets and Irish coastal villages to source reclaimed timber ideas, and balances these wanderlust urges with a modest travel budget that nudges him toward off‑season visits and couch‑surfing arrangements.
  culinary: Ernesto Borges loves crafting farmhouse‑style meals like smoked bratwurst with sauerkraut, hand‑rolled sourdough pizza topped with locally foraged mushrooms, and pairing them with his own hop‑infused
    IPAs, while his cooking skill is solid enough for weekend barbecues but still experimental, often swapping reclaimed pine planks for grilling boards.
  core: Ernesto Borges is a curious, craft‑obsessed 23‑year‑old who fuses sustainable carpentry with indie music, competes fiercely on the basketball court, splurges on tools yet sometimes forgets to budget,
    and balances a relaxed, slightly disorganized lifestyle with a relentless drive to turn art into functional design.
background:
  cultural: 'Ernesto grew up in the suburban outskirts of Sacramento, in a family with European ancestry—primarily German and Irish roots—that valued hands‑on craftsmanship and self‑reliance. The region’s
    blend of Midwestern work ethic and California’s progressive, environmentally‑focused culture shaped his outlook: he respects traditional American woodworking while embracing the West Coast emphasis
    on sustainability and artistic expression. Exposure to Sacramento’s diverse art festivals, local farmers’ markets, and outdoor lifestyle fostered his appreciation for community gatherings and eclectic
    creative influences. This cultural mix, combined with his white American identity, informs his open‑minded yet independent approach to life and work.'
attributes:
  skills: '[''Precision measuring and layout'', ''Advanced hand‑tool operation (planes, chisel, hand saw)'', ''Power‑tool proficiency (circular saw, miter saw, table saw, drill press)'', ''Interpreting
    construction drawings and blueprints'', ''Knowledge of wood species and material properties'', ''Finishing techniques: staining, varnishing, low‑VOC coatings'', ''Custom furniture design using CAD software
    (SketchUp, Fusion 360)'', ''Sustainable building practices and reclaimed‑wood usage'', ''On‑site problem solving and improvisation'', ''Safety compliance and OSHA regulations'', ''Project coordination
    and client communication'', ''Mentoring apprentices'']'
  hobbies: '[''Basketball pickup games'', ''Maker‑community club DIY projects'', ''Gallery and street‑art tours'', ''Acoustic guitar playing and open‑mic sessions'', ''Hiking in Sierra foothills'', ''Cycling
    along American River trail'', ''Home‑brewing craft beer'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Ernesto aims to evolve from a site carpenter to an independent custom‑furniture designer and maker‑space founder within the next five years. He plans to complete a professional certification
    in green building and to deepen his design skills through night courses in furniture design and digital fabrication. By blending his love for art with his carpentry expertise, he hopes to develop a
    niche brand known for eclectic, sustainably‑crafted pieces that appeal to both local art collectors and functional‑oriented consumers. He also envisions collaborating with community art projects and
    local theater groups, providing carpentry for set builds while expanding his network. Ultimately, Ernesto dreams of establishing a flexible, collaborative studio where he can take on bespoke commissions,
    run workshops, and experiment with unconventional materials and joinery techniques.
