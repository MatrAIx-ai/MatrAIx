persona_description: A Chinese philosopher who specializes in the study of the Unity of Opposites and Yin and Yang theory, particularly in its application to the medical science of Nei Jing. His research
  interests include the philosophy of the unity of opposites, the logic system of the Unity of Opposites, the struggle of Yin and Yang to maintain balance, and the interdependent relationship between Yin
  and Yang. He is also knowledgeable about the organic structure and physiological functions of the body as explained by the Yin and Yang theory in Traditional Chinese Medicine.
