personas:
  professional: Shaina Zabar, a high school senior with a budding art therapy focus, blends proficient watercolor and digital illustration skills with empathetic peer mediation, and they create community
    art workshops that nurture emotional expression among fellow teens.
  sports: Shaina Zabar, an enthusiastic hiker of the Quabbin Reservoir trails during spring and fall, also follows the regional New England Falcons soccer team and participates in her school's cross‑country
    club to maintain stamina and a connection to nature, and they relish the sense of calm these activities provide.
  arts: Shaina Zabar, a watercolor enthusiast inspired by the delicate tones of John Singer Sargent and the narrative lyricism of indie folk artists like Iron & Wine, curates her own sketchbook with studies
    of Brimfield’s historic farms while they attend intimate acoustic shows at the local coffeehouse.
  travel: Shaina Zabar, whose travel style blends careful budgeting with a craving for quiet countryside retreats, has weekend‑road‑tripped to the historic towns of Salem and Provincetown, and they dream
    of a summer art‑inspired getaway to Asheville’s mountain galleries.
  culinary: Shaina Zabar, a budding home baker who enjoys crafting flaky apple turnovers with a hint of rosemary and experimenting with matcha‑green tea pastries, balances her culinary curiosity with simple
    weekday meals of avocado toast and herb‑infused tea, and they often experiment with seasonal produce from the local farmer’s market.
  core: Shaina Zabar, a quietly ambitious teen artist, stitches together a love for nature, community service, and creative expression while juggling late‑night drawing marathons, and they have a habit
    of over‑organizing their planner.
background:
  cultural: Shaina grew up in Brimfield, a small rural community in Worcester County, Massachusetts, where her family’s roots trace back to Irish and English ancestors who settled in New England generations
    ago. The town’s strong sense of community, seasonal traditions, and the renowned Brimfield Antique Show have shaped her appreciation for history, craftsmanship, and local arts. Her upbringing emphasized
    self‑reliance, modesty, and the value of helping neighbors, reflecting broader New England cultural norms. While she identifies as white American, she also feels a deep connection to the region’s natural
    landscape and the close‑knit, supportive atmosphere that encourages both individual curiosity and collective harmony.
