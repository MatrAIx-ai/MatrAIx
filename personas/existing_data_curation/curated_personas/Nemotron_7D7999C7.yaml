  career_goals: Shaina aims to complete her GED and enroll in a community college art program, eventually pursuing a Bachelor of Fine Arts with a focus on art therapy or community arts coordination. She
    envisions a career that merges her love for visual expression with her desire to support others, perhaps working as an art therapist in schools or leading youth art workshops in her hometown. In the
    short term, she plans to build a portfolio of her work, volunteer at the Brimfield Antique Show and the local library’s art outreach programs, and develop an online presence to sell her illustrations.
    She hopes her future role will allow her to foster creativity while nurturing a supportive environment for other young people.
