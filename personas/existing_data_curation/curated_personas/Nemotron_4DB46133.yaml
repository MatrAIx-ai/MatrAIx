personas:
  professional: Tony Lowery, an experienced plumber‑pipefitter turned mentor, leverages four decades of pipe layout, welding, code compliance, and blueprint interpretation while channeling their curiosity
    and talkative nature into training apprentices, consulting on historic steam‑heat restorations, and leading community safety workshops.
  sports: Tony Lowery, a 69‑year‑old outdoor enthusiast, spends weekends fishing on Lake Murray, follows the South Carolina Gamecocks football and the Greenville Spartan baseball team, and participates
    in a local hunting club that meets each fall, treating fitness as functional activity rather than regimented gym work.
  arts: Tony Lowery, a frequent visitor to the Columbia Museum of Art, regularly enjoys live blues performances by B.B. King and contemporary jazz by Wynton Marsalis, and contributes to a community‑theater
    troupe where they love performing classic monologues, all feeding their curiosity and sociable spirit.
  travel: Tony Lowery, an adventurous yet budget‑conscious senior, prefers road trips in their restored vintage truck to music‑rich cities like New Orleans and Nashville, while also revisiting historic
    Charleston for its architecture, balancing short getaways with occasional extended fishing excursions in the Adirondacks.
  culinary: Tony Lowery, a self‑taught home chef, blends Southern comfort food with garden harvests, often preparing catfish with cornmeal crust, collard greens seasoned with smoked ham hocks, and a signature
    gumbo that features fresh herbs from their vegetable patch.
  core: Tony Lowery, a gregarious, curious retired plumber, fuses hands‑on craftsmanship with a love for art, community storytelling, and spontaneous adventure, while battling occasional anxiety and a habit
    of juggling too many projects at once.
background:
  cultural: Tony grew up in a working‑class white family in the suburbs of Columbia, South Carolina, where Southern hospitality, modesty, and a strong sense of community were core values. Encouraged by
    parents who prized hard work and skilled trades, he entered a plumbing apprenticeship right after high school and built a lifelong career in the regional trade community. Over the years, he has been
    an active participant in church gatherings, local festivals such as the Columbia Festival of Art, and neighborhood camaraderie. While rooted in traditional Southern customs, his curiosity has led him
    to appreciate a broad spectrum of cultural expressions, from gospel and blues music to contemporary visual art, shaping an identity that blends heritage with an open‑minded outlook.
