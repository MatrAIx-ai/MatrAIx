  hobbies: '["Visiting art museums", "Photography of industrial sites", "Community theater participation", "Fishing", "Gardening", "Playing cards and board games with friends", "DIY home improvement projects",
    "Attending local live music (blues/jazz)"]'
  career_goals: Approaching retirement, Tony aims to transition from full‑time field work to a mentorship and consulting role. He plans to obtain master plumber certification, launch a niche business specializing
    in historic building steam‑heat restorations and water‑saving retrofits, and develop a workshop series that helps aging tradespeople adopt modern technologies. Additionally, he hopes to author a practical
    guide on integrating contemporary plumbing solutions with traditional craftsmanship, and to volunteer his expertise with local disaster‑relief teams and community art projects that celebrate industrial
    design.
