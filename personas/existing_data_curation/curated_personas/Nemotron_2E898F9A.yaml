  career_goals: As Leonard looks ahead, his primary ambition is to earn an Associate’s degree in Accounting and eventually become a Certified Public Accountant (CPA). Over the next five years, he intends
    to progress from his entry‑level position to a senior auditor role within the same firm, taking on more complex audit assignments and supervising junior staff. He is also interested in using his financial
    expertise to help small businesses in Bladen County thrive, and he hopes to one day open a community‑focused accounting practice that offers affordable services and financial literacy workshops. Leonard
    values stability and routine, so he aims to build a career path that balances consistent responsibilities with opportunities to mentor others.
