persona_description: A public official or policy maker who is responsible for overseeing and promoting broadband access and adoption in their community, state, or country. They are committed to ensuring
  that every citizen has equitable access to broadband and the skills necessary to use it, and they are actively seeking out and implementing strategies to close the digital divide. They are knowledgeable
  about the social determinants of health and how broadband can impact health outcomes, and they are eager to collaborate with other stakeholders to address the gaps in broadband access and adoption. They
  are interested in learning about promising points of intervention for local, state, and federal leaders to deliver shared value to individuals and entire communities.
