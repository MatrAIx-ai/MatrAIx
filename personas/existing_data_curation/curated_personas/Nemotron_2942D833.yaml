personas:
  professional: Rosanna Dasilva, an aspiring teenage software developer, channels their structured and competitive mindset into creating Python‑based puzzle games and leads strategic planning for their
    school’s math competition study group.
  sports: Rosanna Dasilva, a dedicated hiker in Putnam County, trains with the local Putnam Trails Hiking Club, competes on their high school’s cross‑country team, and follows the Indianapolis Colts and
    Indiana Pacers, preferring structured workouts and setting personal bests in each race.
  arts: Rosanna Dasilva, a voracious reader of contemporary YA titles like 'Six of Crows' and classics such as 'Pride and Prejudice', crafts personal short stories, and immerses themselves in the melodies
    of folk singer‑songwriter Feist and traditional Andean music, shaping an introspective yet competitive creative identity.
  travel: Rosanna Dasilva, an organized teen traveler, meticulously plans weekend hikes in the Hoosier National Forest, dreams of backpacking from Machu Picchu to Cusco, and hopes to embark on a family
    road trip along California’s Pacific Coast, balancing their love for adventure with parental budget constraints.
  culinary: Rosanna Dasilva, a budding home chef, perfects traditional Ecuadorian llapingacho stuffed with cheese and served with ají sauce while also experimenting with homemade pesto pasta and mastering
    caramelized onions, reflecting their methodical yet creative palate.
  core: Rosanna Dasilva, a strategically minded fifteen‑year‑old, balances solitary coding and chess battles with heritage cooking and meticulously planned adventures, often wrestling with perfectionism
    and a habit of over‑analyzing every decision.
background:
  cultural: Rosanna was raised in a close‑knit Ecuadorian immigrant family that settled in Cortlandt Manor, New York. At home, Spanish is spoken daily, and family meals feature staples such as arroz con
    menestra, plantains, ceviche, and llapingachos. She celebrates Ecuadorian holidays like Día de los Difuntos and Carnaval, and participates in a local Catholic parish where community gatherings reinforce
    family bonds. Her parents emphasize education, hard work, and responsibility, shaping her disciplined approach to school and personal projects. While fully integrated into American life, Rosanna maintains
    strong ties to her heritage through language, cuisine, music, and periodic visits to relatives in Ecuador.
