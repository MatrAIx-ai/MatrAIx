  career_goals: Rosanna aspires to a career in civil engineering where she can apply her love of structure, problem‑solving, and sustainable design. She plans to enroll in advanced math and physics courses,
    secure a summer internship with a local engineering firm, and pursue a Bachelor of Science in Civil Engineering. After graduation, she aims to become a licensed professional engineer and work on infrastructure
    projects that enhance safety and environmental resilience in her community and beyond. Her bilingual background also opens the possibility of collaborating on international projects that connect the
    U.S. and Ecuadorian contexts.
