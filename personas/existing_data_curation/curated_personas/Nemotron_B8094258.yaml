  career_goals: Norma aspires to pursue a career that blends her love for art, organization, and helping others. She dreams of becoming a museum curator or archivist, where she can preserve and interpret
    cultural artifacts. She also considers a future in library science or art education, aiming to create inclusive spaces that encourage curiosity and learning. Norma plans to attend a high school with
    strong arts and humanities programs, earn a scholarship, and eventually study museum studies or information science at a university.
