personas:
  professional: Norma Sheehan is a budding visual storyteller who blends watercolor illustration, photography, and beginner coding to craft interactive digital narratives, applying their methodical planning
    and curiosity to school art projects and Scratch mini‑games.
  sports: Norma Sheehan enjoys winter ice skating at the community rink and spring trail jogging with family, cheerfully supporting the local Wildcats hockey team, while preferring solitary low‑impact activities
    over organized team sports.
  arts: Norma Sheehan is an avid participant in the school art club, admiring the works of Studio Ghibli’s Hayao Miyazaki, illustrator Oliver Jeffers, and painter Georgia O’Keeffe; they regularly attend
    community theater workshops and collect graphic novels by Neil Gaiman.
  travel: Norma Sheehan loves family weekend getaways to the nearby state park’s leaf‑covered trails, has visited the city museum in Chicago on a school field trip, and dreams of traveling to Paris to see
    the Louvre and to Kyoto for its autumn foliage, planning each trip with detailed checklists.
  culinary: Norma Sheehan enjoys baking chocolate chip cookies and oatmeal raisin bars with family, experimenting with simple recipes like homemade pizza topped with mozzarella, basil, and sliced strawberries
    for a sweet twist, while their favorite snack ingredient is caramel drizzle.
  core: Norma Sheehan is a methodical young creator who balances art, coding, and nature, saving allowance meticulously, managing mild allergies with routine care, and preferring quiet, solo pursuits over
    large crowds.
background:
  cultural: Norma grows up in a predominantly white, middle‑class suburban community in Inver Grove Heights, Minnesota. Her family’s cultural roots include Northern European (German and Scandinavian) ancestry,
    reflected in family traditions such as celebrating holidays with seasonal foods, attending local county fairs, and participating in outdoor activities like ice skating and lake fishing. The Midwestern
    values of community involvement, self‑reliance, and modesty shape her outlook, while the region’s emphasis on public education and access to cultural institutions like the Minnesota History Center nurtures
    her appreciation for art and learning.
