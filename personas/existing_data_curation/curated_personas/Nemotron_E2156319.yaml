  hobbies: '[''Gardening'', ''Bicycle and car maintenance'', ''Acoustic guitar playing'', ''DIY home repair projects'', ''Reading practical how‑to books'', ''Volunteer work at local food bank'', ''Watching
    classic movies'', ''Playing simulation video games'', ''Hiking in nearby Hill Country'']'
  career_goals: He aims to complete his GED within the next year, then enroll in a vocational program to become a certified EMT or an automotive technician. He envisions a stable career that lets him serve
    his community, possibly working for the local fire department or opening a small auto‑repair shop where he can provide affordable services and continue volunteering.
