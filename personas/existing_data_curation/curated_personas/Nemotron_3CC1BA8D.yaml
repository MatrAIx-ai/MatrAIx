  career_goals: Carmen aims to become a lead biomedical equipment specialist at a major regional hospital, securing advanced certifications in radiologic technology and health informatics. She envisions
    launching a community‑focused health‑tech consulting service that helps local clinics optimize equipment usage and adopt telehealth solutions. Additionally, she is passionate about mentoring underrepresented
    minorities in health‑technology careers and aspires to a leadership role that balances technical oversight with outreach initiatives for Ventura County’s Latino community.
