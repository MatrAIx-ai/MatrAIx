persona_description: A poet who is interested in exploring the traditional Japanese form of poetry called Tanka. They enjoy experimenting with variations and styles of Tanka and enjoy writing in English.
  They are familiar with the rules and schemata of Tanka and often deviate from them when writing. They have a keen interest in the five main senses and use them to describe their imagery in Tanka. They
  are open to experimenting with different images and words and are not afraid to delete unwanted words or repetitions in their poem. They are a skilled writer and have a unique style of writing Tanka.
