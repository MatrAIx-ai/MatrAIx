personas:
  professional: Elizabeth Bailey, an aspiring junior astrophysicist, builds model rockets and devours science books about planets while applying her practical curiosity by meticulously following experiment
    steps and improvising creative solutions during collaborative school projects.
  sports: Elizabeth Bailey, a midfield player for the Heather Park Junior Soccer Club, trains three times a week, joins after-school dance circles for agility, and avidly follows the Houston Dash, showing
    her energetic, sociable nature and love for team-based competition.
  arts: Elizabeth Bailey, a pop-music dance enthusiast, imitates choreography from Taylor Swift's 'Shake It Off' and Ariana Grande's '7 Rings' during school hallways, sketches fallen leaves with colored
    pencils, and proudly displays handcrafted Lego sculptures, highlighting her creative expression and group-oriented fun.
  travel: Elizabeth Bailey enjoys weekend trips to the Houston Museum of Natural Science and day-long nature walks in Hermann Park, dreams of visiting the Space Center Houston and Disney World's Animal
    Kingdom, and prefers spontaneous family outings over rigid itineraries, balancing curiosity with flexibility.
  culinary: Elizabeth Bailey favors mac and cheese, peanut butter and jelly sandwiches, and strawberry banana smoothies, eagerly helps her mom bake chocolate chip cookies, and often mixes Lego-themed snacks
    like brick-shaped fruit kebabs, reflecting her love for comfort foods and playful cooking.
  core: Elizabeth Bailey is a curiosity-driven, group-loving eight-year-old who rockets through science projects, scores goals on the soccer field, and dances to pop hits, but frequently misplaces homework
    and forgets her soccer cleats.
background:
  cultural: Elizabeth is raised in a middle‑class white family in Houston, Texas. Her upbringing reflects Southern Texan customs such as celebrating Thanksgiving and Christmas with extended family gatherings,
    enjoying barbecue and Tex‑Mex cuisine, and rooting for local football teams. The diverse, multicultural environment of Houston introduces her to a variety of foods, festivals, and friends from different
    backgrounds, fostering an open‑minded outlook while still grounding her in the values of community, hospitality, and practical optimism common in her cultural setting.
