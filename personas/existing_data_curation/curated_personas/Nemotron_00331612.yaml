  hobbies: '[''vegetable gardening'', ''heirloom tomato cultivation'', ''birdwatching'', ''reading historical fiction'', ''craft woodworking projects'', ''small book club'', ''church outreach volunteering'']'
  career_goals: Dana aims to transition from primarily on‑site work to establishing a boutique woodworking studio in Oxford that focuses on handcrafted furniture and preservation of historic structures.
    She plans to earn a Certified Construction Manager (CCM) credential, develop a structured mentorship program for women entering the trades, and teach part‑time at the local community college’s carpentry
    program. Long‑term, she hopes to document regional building techniques and create a small archive that supports local heritage preservation.
