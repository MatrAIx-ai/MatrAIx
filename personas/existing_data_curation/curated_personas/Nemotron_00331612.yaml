personas:
  professional: Dana Rollins, a seasoned carpenter with three decades of framing, cabinet making, and historic restoration expertise, marries methodical precision with quiet curiosity, ensuring every project
    is meticulously planned, safety‑first, and infused with respect for traditional building techniques.
  sports: Dana Rollins, an avid member of the Talladega Hiking Club and a seasonal fan of the Alabama Crimson Tide football team, finds balance by trekking the foothills each spring and joining a weekly
    senior bowling league at the local recreation center.
  arts: Dana Rollins, who quietly plays the Appalachian dulcimer after a day in the shop, delights in the storytelling songs of The Carter Family and the minimalist wood sculptures of George Nakashima,
    attending the annual Appalachia Festival to draw inspiration for their own handcrafted furniture.
  travel: Dana Rollins prefers low‑key road trips to historic towns like Savannah, Georgia, and Asheville, North Carolina, planning each journey months in advance to fit around workshop deadlines and budget
    constraints, while dreaming of a summer pilgrimage to the Blue Ridge Parkway’s fall foliage.
  culinary: Dana Rollins, a modest home cook, adores transforming heirloom tomatoes into sun‑dried tomato pesto, baking pecan pie with locally sourced nuts, and seasoning dishes with fresh garden basil
    and cracked black pepper, though they occasionally over‑salt a stew when distracted by a new woodworking blueprint.
  core: Dana Rollins, a calm, methodical artisan who balances a love for historic craft with a stubborn reluctance to delegate, savors garden‑grown flavors while quietly battling a habit of over‑committing
    to community projects.
background:
  cultural: Dana grew up in a small town in Alabama, steeped in Southern Appalachian traditions and a strong work ethic passed down through generations of family tradespeople. Her white Southern heritage
    includes a Baptist upbringing, community solidarity, and an appreciation for regional folk music and craftsmanship. The values of self‑reliance, modesty, and respect for historical continuity shape
    her outlook, and her occasional involvement in local heritage groups reflects a deep connection to the cultural fabric of Talladega County.
attributes:
  skills: '[''framing'', ''cabinet making'', ''custom furniture design'', ''blueprint reading'', ''project scheduling'', ''tool maintenance'', ''safety compliance'', ''historical home restoration'', ''apprentice
