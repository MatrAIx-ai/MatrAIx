persona_description: A researcher or policy maker who is interested in understanding the complex issues surrounding gender-biased sex selection and the underlying social and economic factors that contribute
  to these practices in South Asia. They are particularly interested in the case studies conducted by the Population Council, CREHPA, and the Centre for Research, Environment, Health and Population Activities
  in Nepal, Bangladesh, and India, and are looking for evidence-based approaches to address the adverse sex ratios at birth in these countries. They are also interested in the potential role of educational
  entitlements and communication, advocacy, and community mobilization in promoting gender equality and reducing gender-biased sex selection.
