personas:
  professional: Theresa Kahn, an aspiring freelance illustrator and budding graphic designer, combines meticulous sketching and digital illustration skills with a methodical, event‑planning mindset, turning
    her curiosity about nature into polished visual projects while reliably meeting deadlines for school clubs and community art showcases.
  sports: Theresa Kahn, a devoted member of the Columbia River Hiking Club, spends weekends trekking Cascadian trails and balances this with casual pickup soccer at a local youth league, cheering on the
    Seattle Seahawks in fall football and the Portland Timbers during the MLS season while maintaining a disciplined yet enjoyable fitness routine.
  arts: Theresa Kahn channels her love for the Pacific Northwest landscape into watercolor and acrylic pieces influenced by the lyrical brushwork of Georgia O’Keeffe and the vibrant palettes of Claude Monet,
    while enjoying acoustic sessions of Sufjan Stevens and Bon Iver and drawing inspiration from the regional gallery exhibitions of emerging artists like Emma Grant.
  travel: Theresa Kahn prefers thoughtfully planned, low‑budget road trips that blend hiking adventures in the Columbia River Gorge and evenings at Portland’s art cafés with occasional family visits to
    Seattle, while dreaming of an eco‑focused backpacking journey to Iceland’s volcanic landscapes and a cultural immersion tour of Kyoto’s historic gardens.
  culinary: Theresa Kahn delights in baking simple pastries like blueberry lemon muffins and lavender‑infused scones, skillfully folding fresh Oregon berries and local honey into the batter, while also
    experimenting with homemade salmon bruschetta topped with wild mushrooms and dill, reflecting a palate that balances comfort baking with the region’s seasonal seafood flavors.
  core: Theresa Kahn blends an insatiable curiosity for nature with meticulous organization, yet often trades late‑night sketching sessions for a habit of scrolling art forums until sunrise, illustrating
    a creative soul who thrives on both structure and spontaneous inspiration.
background:
  cultural: Theresa grew up in a predominantly white, rural community in Umatilla, Oregon, where a strong appreciation for the natural environment and self‑reliance is common. Her family has deep Pacific
    Northwest roots, with a mix of German and Scandinavian ancestry that values hard work, community involvement, and modest celebrations of holidays such as Thanksgiving and the Fourth of July. The region's
    close proximity to the Umatilla Tribe has instilled in her a respect for local Native American heritage, and she often participates in community events that honor the area's diverse cultural history.
attributes:
  skills: '["Digital illustration", "Sketching", "Basic photography", "Photo editing (GIMP)", "Event planning", "Garden maintenance", "Basic computer skills", "Volunteer coordination", "Time management",
