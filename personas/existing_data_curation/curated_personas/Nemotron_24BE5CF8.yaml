  hobbies: '["Watercolor painting", "Sketching landscapes", "Reading science fiction and fantasy", "Visiting art galleries", "Hiking local trails", "Journaling poetry", "DIY crafts", "Baking", "Learning
    basic web design", "Playing acoustic guitar"]'
  career_goals: Theresa plans to complete her GED and enroll in a community college program focused on graphic design and visual communication. She aspires to build a portfolio that blends her love for
    nature and art, aiming to become a freelance illustrator or a design assistant for a local museum or community center. Long‑term, she envisions creating a modest studio where she can offer custom artwork,
    digital designs, and workshops for other teens interested in art and organized creativity. She also hopes to integrate her gardening knowledge into eco‑art projects that highlight the Pacific Northwest
    environment.
