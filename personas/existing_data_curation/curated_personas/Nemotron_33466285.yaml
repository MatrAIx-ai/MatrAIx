  career_goals: Although retired, Albert aims to stay active in his community by mentoring budding entrepreneurs at the local Small Business Development Center, providing strategic guidance to the Framingham
    Historical Society board, and volunteering for fundraising campaigns at his church. He also plans to compile a memoir chronicling his experiences in mid‑century New England business, and to explore
    genealogical research as a way of preserving his family’s legacy.
