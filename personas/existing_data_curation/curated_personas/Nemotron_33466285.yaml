  hobbies: '[''Reading Historical Nonfiction'', ''Garden Landscaping'', ''Woodworking'', ''Bridge (Card Game)'', ''Crossword Puzzles'', ''Local History Research'', ''Genealogy'', ''Fishing'', ''Walking
