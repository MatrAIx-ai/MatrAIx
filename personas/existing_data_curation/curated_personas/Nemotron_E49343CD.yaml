  career_goals: While she is content with her current managerial role, Gloria aims to transition into a senior consulting capacity where she can help other mid‑size manufacturers modernize their operations
    and embed sustainable practices. She hopes to mentor the next generation of female leaders in the region, perhaps establishing a mentorship program through the local chamber of commerce. Additionally,
    she plans to champion a community arts partnership that integrates rotating art exhibitions into the workplace, enhancing cultural exposure for employees and the surrounding community. Long‑term, Gloria
    envisions serving on the Lawrence County Economic Development Board to shape regional growth strategies.
