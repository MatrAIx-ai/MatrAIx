  lower blending levels for corn-based ethanol and are actively seeking solutions to address these concerns. This person is likely to be a farmer or a business owner who is invested in the success of the
  renewable fuels industry. They are also likely to be a consumer who is concerned about the impact of higher fuel prices on their budget.
