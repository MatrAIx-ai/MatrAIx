  career_goals: Though retired from formal employment, Zulfiqar aims to channel his organized, altruistic spirit into expanded community leadership. He plans to serve on the board of a local nonprofit focused
    on senior services, develop a mentorship program for newly arrived South Asian immigrants, and lead a series of budgeting workshops for low-income families. He also aspires to complete a short certification
    in digital literacy for seniors, write a memoir that reflects his South Asian-American journey, and maintain his health through regular group walks and yoga.
