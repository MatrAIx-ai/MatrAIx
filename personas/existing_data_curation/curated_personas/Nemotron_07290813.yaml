  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Reading historical non-fiction'', ''Playing acoustic guitar'', ''Gardening'', ''Cooking Southern cuisine'', ''Volunteering at local health fairs'']'
  career_goals: Dr. Morrow aims to expand telehealth services across Montgomery County, creating a sustainable virtual-care hub that improves access for underserved patients. He hopes to become a medical
    director for a regional health network, where he can shape policies that balance innovative care with the practical realities of a rural population. Mentoring the next generation of physicians remains
    a priority, and he plans to author a textbook on practical primary care in resource-limited settings while maintaining a manageable schedule that protects his personal downtime.
