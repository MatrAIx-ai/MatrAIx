  career_goals: Approaching retirement, Somphane aims to transition from day‑to‑day management to an advisory role where he can mentor emerging leaders, especially from underrepresented Asian‑American backgrounds.
    He is passionate about embedding sustainable practices into his organization’s supply chain and championing diversity, equity, and inclusion initiatives. Somphane also envisions establishing a community‑based
    consultancy that helps small immigrant‑owned businesses integrate creative branding and modern digital tools. Ultimately, he hopes to leave a legacy of innovative leadership and cultural empowerment
    within both his industry and the local Vietnamese diaspora.
