  teach computer science and has a passion for creating engaging and hands-on learning experiences. She is dedicated to ensuring that students gain industry-relevant skills and are prepared for future careers
  in technology and the digital economy. Richardson's background in education and her expertise in computer science make her the ideal person to lead the Oracle Raspberry Pi Weather Station project.
