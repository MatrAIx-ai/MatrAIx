personas:
  professional: Irene Schmidt is a certified special‑education teacher known for their methodical design of data‑driven Individualized Education Programs, leveraging assistive‑technology tools while balancing
    curiosity for innovative interventions with a pragmatic, organized approach to classroom management and collaborative team leadership.
  sports: Irene Schmidt fuels their fitness routine with sunrise runs through the St. Lucie Runners Club, weekend paddle‑boarding sessions with the Indian River Paddleboard Association, and weekly yoga
    classes, while cheering on the Miami Heat in basketball, the Tampa Bay Buccaneers in football, and the Tampa Bay Rays during the baseball season.
  arts: Irene Schmidt channels their creative side through sunrise photography inspired by Ansel Adams, devouring mystery novels by Agatha Christie and historical‑fiction works by Hilary Mantel, listening
    to Norah Jones while cooking, and hosting monthly board‑game nights featuring classics like Catan and Carcassonne with a tight‑knit group of friends.
  travel: Irene Schmidt plans each getaway with a detailed itinerary, favoring coastal escapes like Key West and Savannah for sunrise photo sessions, while also dreaming of Mediterranean adventures in Greece
    and Italy, balancing budget‑conscious travel with occasional splurges on boutique hotel stays for a restful recharge.
  culinary: Irene Schmidt, an intermediate home chef, crafts vibrant Mediterranean dishes such as lemon‑garlic grilled sea bass with capers, Greek salad piled with feta, olives, and oregano, and chickpea
    falafel served with tahini, relishing the fresh crunch of cucumber, sun‑dried tomatoes, and extra‑virgin olive oil while experimenting with new spice blends each week.
  core: Irene Schmidt blends methodical precision with adventurous curiosity, balancing a disciplined career in special‑education leadership with early‑morning runs, sunrise photography, Mediterranean cooking,
    and a competitive streak that fuels both their professional ambitions and weekly board‑game battles.
background:
  cultural: Irene descends from German‑American parents who grew up in the Midwest, where values of punctuality, self‑reliance, and community service were emphasized. Relocating to Fort Pierce, FL for her
    teaching career, she has embraced the region’s coastal lifestyle and multicultural environment while retaining a strong work ethic rooted in her heritage. Her cultural background informs her commitment
    to inclusive education, civic involvement, and a balanced blend of practicality and curiosity in both her professional and personal life.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Differentiated instruction'', ''Behavioral intervention planning'', ''Assistive technology integration'', ''Data‑driven assessment and
    progress monitoring'', ''Collaborative team facilitation'', ''Classroom management'', ''Curriculum adaptation for diverse learners'', ''Parent‑teacher communication'', ''Professional development and
    workshop facilitation'']'
  hobbies: '[''Running'', ''Paddle‑boarding'', ''Gardening (native Florida flora)'', ''Yoga'', ''Reading (mystery & historical fiction)'', ''Board‑game nights'', ''Volunteer tutoring'', ''Coastal photography'',
    ''Cooking Mediterranean dishes'']'
  career_goals: Irene aims to earn a master’s degree in Special‑Education Leadership within the next two years and transition into a district‑level role as Lead Special‑Education Coordinator for St. Lucie
    County. She aspires to design a district‑wide inclusive curriculum framework, mentor early‑career special‑education teachers, and champion advocacy initiatives that improve resource allocation for students
    with disabilities. Long‑term, she hopes to influence state policy on inclusive education, publish articles on evidence‑based interventions, and possibly open a community‑based resource center that offers
    after‑school support for families navigating special‑needs services.
