  career_goals: Wanda aims to transition into a senior solutions architect role within the next few years, allowing her to shape the technical direction of larger projects while still staying hands‑on.
    She aspires to lead a small, collaborative development team that delivers community‑focused software solutions for local nonprofits and small businesses in the Kansas area. Mentoring junior developers
    and championing mental‑health awareness in tech are personal priorities, so she plans to organize regular well‑being workshops and advocate for flexible work policies. Ultimately, she envisions launching
    her own boutique consulting practice that combines pragmatic software delivery with a strong emphasis on work‑life balance and social impact, while continuing to contribute to open‑source projects that
    improve accessibility.
