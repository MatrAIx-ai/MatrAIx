personas:
  professional: Wanda Morgan, a seasoned full‑stack engineer with three decades of Java, C#, Python, and cloud expertise, is pivoting toward a senior solutions architect role where they blend pragmatic
    test‑driven development with a talkative, community‑focused presence at meetups and mentorship sessions, all while navigating a relaxed, occasionally disorganized approach to project planning.
  sports: Wanda Morgan keeps fit through weekly hikes on the Konza Prairie, a Thursday yoga class, casual pickleball matches at the community center, and cheering on the Kansas City Chiefs in football season
    and the Royals during baseball, embodying their low‑impact exercise preference and spirited team loyalty.
  arts: Wanda Morgan immerses herself in historical fiction classics by Hilary Mantel and Ken Follett during book club gatherings, fills evenings with folk‑rock from Bob Dylan and The Avett Brothers, and
    unleashes their talkative side at karaoke nights belting out 80s hits, weaving literature, music, and performance into a vibrant social tapestry.
  travel: Wanda Morgan prefers relaxed road trips with their spouse to nearby wonders like the Tallgrass Prairie National Preserve and extended adventures to Yellowstone and Grand Teton, while they dream
    of an Icelandic getaway to chase the Northern Lights once their travel fund reaches its goal.
  culinary: Wanda Morgan, a passionate Midwestern home chef, transforms garden‑grown heirloom tomatoes and sweet corn into a creamy Heritage Corn Chowder, perfects pickled radishes with dill and garlic,
    and experiments with pan‑seared trout topped with lemon‑thyme butter, all while they host communal meals that showcase their signature Kansas‑style BBQ ribs.
  core: Wanda Morgan is a community‑driven tech veteran who juggles code, garden rows, and karaoke mic with a constant undercurrent of worry that drives meticulous health monitoring yet occasionally stalls
    their spontaneous plans, and they channel that tension into purposeful mentorship.
background:
  cultural: Wanda grew up in a suburban Midwestern family in Kansas, with German and Irish ancestry. Her upbringing emphasized community participation, modesty, and practical problem solving—values that
    continue to shape her professional demeanor. After completing some college coursework in computer science, she entered the tech workforce and later built a career in software development while remaining
    deeply connected to the region's traditions, such as county fairs, church gatherings, and volunteerism. Living in Overland Park, she enjoys the blend of suburban comfort and proximity to Kansas City’s
    growing tech scene. She identifies as culturally American, with a strong affinity for Midwestern sensibilities that balance pragmatism, hospitality, and an openness to new ideas.
