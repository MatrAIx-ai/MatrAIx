personas:
  professional: Sherina Merritt is a budding young artist‑event coordinator who channels her curiosity and disciplined organization into designing vibrant school displays, leading drama productions, and
    crafting intricate LEGO installations that impress classmates, all while they thrive as the talkative centre of attention.
  sports: Sherina Merritt channels her energetic curiosity into weekly hikes along the Boise Foothills, practices with the Boise Junior Soccer Club U10 team where they play midfield, cheers on the Boise
    State Broncos football during fall, follows the NHL Vancouver Canucks for inspiration, and they maintain a disciplined workout routine that includes after‑school gymnastics stretches.
  arts: Sherina Merritt immerses herself in creative expression by sketching vibrant characters inspired by Disney’s Frozen, painting watercolors echoing Claude Monet’s garden scenes, composing piano pieces
    by Ludovico Einaudi, performing lead roles in school drama productions of A Midsummer Night’s Dream, and they draw inspiration from LEGO artist Nathan Sawaya’s mixed‑media sculptures.
  travel: Sherina Merritt prefers meticulously mapped weekend road trips that blend adventure with family bonding, having explored Yellowstone’s geysers, trekked Oregon Coast’s Cannon Beach, visited Seattle’s
    Museum of Pop Culture, and they dream‑journal a future trip to the historic castles of Scotland.
  culinary: Sherina Merritt delights in mixing bright fruit smoothies with strawberries, bananas, and a splash of orange juice, whips up colorful macaroni‑and‑cheese topped with rainbow sprinkles for friends,
    apprentices at baking cupcakes using vanilla extract and fresh butter, and they savor a classic pepperoni pizza with extra mozzarella when dining out.
  core: Sherina Merritt is a hyper‑creative, ultra‑organized nine‑year‑old whose boundless curiosity fuels a packed schedule of art, music, and leadership, yet they occasionally trade late‑night sketching
    for a missed bedtime, making them both a prodigious planner and a playful dreamer.
background:
  cultural: Sherina was raised in a middle-class family in Boise, Idaho, within a predominantly white suburban community. Her parents value education, creativity, and community involvement, often encouraging
    participation in local arts programs at the Boise Public Library and the Boise Art Museum. The family celebrates mainstream American holidays such as Thanksgiving, Christmas, and the Fourth of July,
    while also enjoying regional traditions like summer outdoor concerts and winter snow festivals. Exposure to the natural beauty of the Treasure Valley and nearby foothills nurtures her love for hiking
    and outdoor play. Her cultural environment emphasizes a blend of individual achievement and collaborative community spirit, reflecting the broader Pacific Northwest ethos.
