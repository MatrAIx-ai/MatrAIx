  career_goals: Sherina dreams of becoming a future museum curator or an elementary school teacher who designs innovative art programs. She envisions leading community projects that bring creative experiences
    to other kids, perhaps directing a youth art studio or developing interactive exhibits that blend technology and storytelling. She also imagines exploring fields like child-focused event planning or
    youth program coordination, where her organizational talent and love for social interaction can flourish. Long-term, she hopes to be a catalyst for creative learning, inspiring peers to think outside
    the box.
