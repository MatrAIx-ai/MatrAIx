persona_description: Atlee Bernard Ayres was a renowned architect who was born in Texas in 1873 and died in San Antonio in 1969. He was the son of Nathan Tandy and Mary Parsons Ayres and moved to San Antonio
  with his family in 1888. Ayres won first prize in the Metropolitan School of Architecture's annual design competition in 1894 and later moved to Mexico where he practiced until 1900. He then returned
  to San Antonio and formed a partnership with his son, Robert M. Ayres, in 1924. The Ayres firm designed numerous residences in the Spanish Colonial Revival style and also used other revival modes such
  as the Colonial Revival and the English Tudor. Ayres was also a state architect of Texas and designed public buildings such as the Blind Institute, the Texas State Office Building, and the University
  of Texas campus buildings. He was the author of Mexican Architecture and a charter member of the Texas Society of Architects. Ayres was buried in Mission Burial Park.
