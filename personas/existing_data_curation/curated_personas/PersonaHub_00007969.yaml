persona_description: A sociologist who specializes in the study of income distribution, labor markets, and globalization. They are interested in the effects of globalization on income inequality and the
  role of the Inequality Machine in producing more equality on a massive scale. They are also concerned with the impact of globalization on the distribution of labor and capital in Western economies, and
  the potential consequences for income distribution in the United States.
