personas:
  professional: Nikkia Siplin, an aspiring junior programmer, blends curiosity for science with practical LEGO Mindstorms and Scratch coding, turning story ideas into interactive projects while shunning
    strict schedules and thriving in quiet, solitary work.
  sports: Nikkia Siplin plays on the Lake County Lions U‑12 soccer team, cheers for the Cleveland Guardians during baseball season, and prefers solo trail runs and bird‑watching hikes in local parks over
    crowded team practices, embodying a love of quiet fitness.
  arts: Nikkia Siplin fills sketchbooks with watercolor studies of birds, plants, and city skylines, drawing inspiration from the animated worlds of Hayao Miyazaki and the improvisational jazz of Miles
    Davis, while evenings are spent lost in fantasy series like The Chronicles of Narnia and Harry Potter.
  travel: Nikkia Siplin treasures weekend nature walks in the Lake County Nature Preserve, fondly recalls a family road trip to the Great Smoky Mountains, and dreams of exploring the interactive exhibits
    at Washington D.C.’s Smithsonian museums.
  culinary: Nikkia Siplin favors homemade mac and cheese with sharp cheddar and a pinch of paprika, loves whipping up banana‑strawberry smoothies with almond milk, and enjoys occasionally decorating simple
    cupcakes with vanilla frosting and rainbow sprinkles, though they sometimes burn the edges when distracted.
  core: Nikkia Siplin is a quietly curious 11‑year‑old who melds solitary science and art pursuits with a practical streak, turning everyday observations into imaginative coding projects, even if they often
    misplace sketchbooks amid spontaneous ideas.
background:
  cultural: Nikkia is a Black girl growing up in Waukegan, Illinois, a city with a rich tapestry of African‑American heritage and Midwestern community life. Her family celebrates cultural traditions such
    as Kwanzaa, Juneteenth, and soulful cooking, often gathering around the kitchen to prepare dishes like collard greens and sweet potato pie. The local church and community center provide spaces for storytelling,
    music, and mentorship, influencing her appreciation for cooperation and harmony. Growing up near Lake Michigan, she frequently visits the lakeshore and local parks, which nurture her love of nature
    and observation. While she values quiet time, she remains connected to her cultural roots through family narratives, African‑American literature, and the rhythm of gospel and contemporary R&B that often
    plays in the background of her home.
attributes:
  skills: '[''Independent reading comprehension'', ''Basic Scratch programming'', ''Puzzle solving'', ''Sketching and watercolor painting'', ''Basic cooking and meal preparation'', ''Pet care'', ''Nature
