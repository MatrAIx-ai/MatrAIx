  hobbies: '[''Reading fantasy and science books'', ''Sketching and watercolor painting'', ''Scratch programming and LEGO projects'', ''Nature walks and wildlife observation'', ''Keeping a nature journal'',
    ''Listening to instrumental jazz and soft hip‑hop music'', ''Playing the school recorder'', ''Solving puzzles such as Sudoku and logic grids'']'
  career_goals: Nikkia dreams of a future where she can explore the natural world and share what she learns. She hopes to become a wildlife biologist or environmental researcher, working in field studies
    or laboratories that let her observe animals and ecosystems while contributing to conservation efforts. She also imagines writing illustrated science books for children, combining her love of drawing
    with her desire to make complex ideas accessible and promote kindness toward the planet. In the long term she wants to create programs that bring nature education to her community, especially to younger
    students who, like her, thrive in quiet, hands‑on learning environments.
