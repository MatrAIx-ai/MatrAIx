personas:
  professional: A budding preschool news anchor, Aurora Rideau channels their boundless imagination into daily storytelling sessions, weaving bright festival imagery into simple news reports while embracing
    a delightfully chaotic, flexible approach to planning that keeps the drama lively and their little audience engaged, and they love improvising with colorful paper props.
  sports: An enthusiastic little mover, Aurora Rideau darts around the park playing mini-soccer with a bright orange ball, cheers on the El Paso Chihuahuas during family outings, and they enjoy tag games
    that let them expend boundless energy while embracing a carefree, flexible attitude toward organized drills.
  arts: An imaginative little artist, Aurora Rideau splashes watercolor paper with vivid hues inspired by the rhythmic sounds of Carlos Santana and the playful melodies of Disney’s "Moana," often crafting
    tiny papel-picado cutouts that echo the festive decorations she admires at home, and they turn every craft session into a burst of color and rhythm.
  travel: An adventurous little explorer, Aurora Rideau enjoys family road trips to the Guadalupe Mountains and the shimmering lights of Disneyland, often pointing at map stickers with wide-eyed wonder
    and preferring spontaneous stops for ice-cream over rigid itineraries, and they dream of one day wandering the Grand Canyon’s colorful cliffs with their parents.
  culinary: A spirited tiny food lover, Aurora Rideau delights in devouring crunchy tacos with mild salsa, cheese-stuffed quesadillas, and sweet mango slices, often proudly sprinkling grated cheddar onto
    her own plate and giggling while she helps stir batter for banana-flour pancakes, yet they occasionally refuse green beans, showcasing a playful blend of adventurous palate and picky toddler whims.
  core: Radiating boundless curiosity and vivid imagination, Aurora Rideau blends festive colors, spontaneous storytelling, and a joyful defiance of tiny messes into a lively three-year-old perspective
    that turns everyday moments into bright, communal celebrations, and they thrive on the energy of shared laughter.
background:
  cultural: Aurora was born and raised in El Paso, Texas, to Mexican parents who speak both Spanish and English at home. Her family celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo,
    and birthdays with vibrant music, colorful papel picado, and family‑style meals of tacos, tamales, and pozole. The multicultural border environment exposes her to a blend of Mexican and Texan influences,
    fostering a strong sense of community, family closeness, and pride in her heritage. These cultural experiences shape her love for bright colors, rhythmic music, and communal celebrations.
attributes:
  skills: '[''Bilingual early language development'', ''Imaginative storytelling'', ''Basic drawing and coloring'', ''Spontaneous role‑play'', ''Cooperative play'', ''Rhythmic movement'', ''Simple puzzle
    solving'']'
  hobbies: '[''Playground games'', ''Crayon drawing and coloring'', ''Dress‑up and pretend play'', ''Dancing to music'', ''Storytime listening'', ''Inventing stories'', ''Helping with simple cooking'',
    ''Building forts with blankets'']'
  career_goals: She dreams of becoming a painter who fills giant canvases with bright, fantastical scenes, and often says she wants to be a storyteller who shares magical adventures with friends. Aurora
    also imagines exploring far‑away places like outer space or a jungle, combining her love of novelty and art. Her long‑term ambition is to bring joy to other children through colorful creations and playful
    stories.
