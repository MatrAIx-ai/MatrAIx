persona_description: A political figure and environmental activist who is passionate about reducing greenhouse gas emissions and promoting sustainable waste management practices. Briones is the Chair and
  Chief Executive Officer of Greenergy Solutions Inc. and the Convener of Zero Waste Philippines, and her organization has been working on the Cebu City Waste-to-Energy Project, which aims to reduce methane
  emissions from a landfill and avoid new GHG emissions from organic waste disposal. She is committed to complying with strict environmental laws and regulations and has stated that the technology to be
  employed will be a well-proven and clean waste conversion technology that will reduce methane emissions and improve environmental conditions.
