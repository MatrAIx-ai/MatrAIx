  hobbies: '[''Hiking'', ''Horseback riding'', ''Volleyball'', ''Photography'', ''Volunteer work at community events'', ''DIY upcycled crafts'', ''Reading science and technology magazines'', ''Experimenting
    with new cooking recipes'']'
  career_goals: Jacqueline plans to earn her GED within the next year and then pursue a certification as a veterinary technician or farm manager. Her long‑term ambition is to launch a sustainable agricultural
    business that blends modern technology—such as solar‑powered irrigation and data‑driven livestock monitoring—with traditional ranching methods, allowing her to remain competitive while serving her community.
