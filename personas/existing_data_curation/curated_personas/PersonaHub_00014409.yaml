persona_description: A scientist or geologist who is interested in the study of tectonic faulting and its connection to global phenomena such as long-term climate change, evolution, and the opening and
  closure of oceans. They are likely to have a background in geology, earth sciences, or related fields and have a strong interest in understanding the physical and chemical processes that underlie faulting.
  They are also likely to have a background in physics, chemistry, or related fields and have a strong interest in the physical properties of deforming rock and the role of fluids and melt in the formation
  and behavior of faults. They are likely to have a background in remote sensing and have a strong interest in the imaging of faults from Earth's surface to the base of the lithosphere and deeper. They
  are likely to have a background in computer science and have a strong interest in the use of computational tools and methods to study faulting and its impact on the rock record and the human environment.
