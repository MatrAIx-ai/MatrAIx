personas:
  professional: Elfa Torres, an aspiring visual communications student and freelance graphic designer, channels their bilingual fluency, street‑art enthusiasm, and quick‑thinking creativity into eye‑catching
    social media campaigns for local small businesses, while wrestling with deadline pressure and a penchant for spontaneous project pivots.
  sports: Elfa Torres, a casual sports fan, loyally follows the Houston Astros and Rockets, joins Saturday morning pickup soccer games in local parks, and blends weekend hikes in Hermann Park with spontaneous
    bike rides along the Buffalo Bayou to stay active, which they regard as essential for balancing creative stress.
  arts: Elfa Torres, a devoted street‑art explorer, spends weekends sketching murals in Houston’s East End, curates playlists featuring Lila Downs and Bad Bunny, attends live Latin jazz performances at
    Warehouse Live, and frequently contributes to pop‑up art jams inspired by the works of contemporary muralists like Jorge 'Sci‑Fi' Rodriguez, pouring their energy into each piece, which they find cathartic.
  travel: Elfa Torres, an adventure‑seeking teen, prefers spontaneous road trips to nearby Austin for live music festivals, dreams of exploring the colorful markets of Oaxaca on a future study abroad, and
    balances travel plans with a student budget by couch‑surfing and hunting cheap flight deals on Skyscanner, which they consider a thrilling challenge.
  culinary: Elfa Torres, a budding home cook, loves crafting homemade tamales and mole with fresh ancho chilies and chocolate, experiments with fusion tacos that blend quinoa and traditional pork fillings,
    and often hosts informal dinner gatherings where they showcase their latest culinary creations.
  core: Elfa Torres is a vibrant, spontaneous creative who blends bilingual street‑art passion with a competitive edge, juggling artistic ambition against anxiety‑driven stress and occasional financial
    impulsivity, which they manage through nightly sketch sessions.
background:
  cultural: Elfa grew up in a bilingual Mexican‑American household in Houston, where Spanish was spoken at home and English at school. Her family’s traditions—celebrating Día de los Muertos, cooking regional
    dishes from Oaxaca and Veracruz, and dancing to mariachi and cumbia—have shaped her identity. Immersed in Houston’s large Hispanic community, she frequently volunteers at local cultural festivals and
    connects with other young Latinx artists, blending Mexican heritage with the city’s multicultural energy.
