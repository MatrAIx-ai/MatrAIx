    art events)'']'
  hobbies: '[''Street art exploration and mural sketching'', ''Photography of urban landscapes'', ''Listening to Mexican folk and Latin pop music'', ''Cooking traditional Mexican dishes'', ''Attending live
    concerts and dance performances'', ''Participating in improv poetry slams and art jams'', ''Weekend hiking and nature walks'', ''Watching indie films and documentaries'', ''Social media content experimentation'']'
  career_goals: Elfa aims to complete a Bachelor’s degree in Communications or Visual Arts while building a personal brand that showcases contemporary Mexican‑American culture through digital media. She
    plans to secure an internship at a Houston marketing agency or museum to gain professional experience, then launch a freelance consultancy offering graphic design, social media strategy, and event promotion
    for local small businesses. Long‑term, she aspires to become a creative director or cultural program manager, eventually opening a community art space that hosts workshops, pop‑up exhibitions, and cultural
    celebrations.
