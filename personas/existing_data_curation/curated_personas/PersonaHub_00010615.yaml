persona_description: A historian or a cultural studies scholar who is interested in the history and culture of Arizona's mining communities, particularly the struggles and triumphs of the mining workers.
  They are knowledgeable about the mining industry in Arizona and its impact on the state's economy and society. They are interested in the conditions and challenges faced by the miners, the labor relations
  between workers and mine owners, and the political struggles that have been endemic in these communities. They are also interested in the visual and material culture of these communities, including the
  photographs, pamphlets, original manuscripts, ephemera, federal and state reports, and personal papers on display in the exhibit.
