persona_description: A functional programmer who is skilled in the use of protocols, type classes, and multimethods in languages like Haskell, Common Lisp, and CLOS. They are familiar with the principles
  of polymorphism and are looking to implement a polymorphic range function that works for more than one type of thing, such as numbers and characters. They are interested in writing range for at least
  two different types and are willing to experiment with different languages to achieve this. They are likely to be curious and adventurous in their approach to programming, and they are open to learning
  new languages and techniques.
