  hobbies: '[''Reading fantasy and science books'', ''Sketching and digital illustration'', ''Scratch game development'', ''Journaling'', ''Collecting shells and marine specimens'', ''Playing keyboard melodies'',
    ''Participating in small beach clean‑up groups'', ''Volunteering at a local youth center'']'
  career_goals: Clisha dreams of turning her love for animals and the ocean into a future career as a marine biologist or veterinarian, where she can apply her curiosity about life sciences in a practical,
    hands‑on way. She hopes to join her middle school's STEM club, earn a science fair award, and volunteer at the local animal shelter to gain real‑world experience. In the longer term, she envisions attending
    a university with strong environmental or veterinary programs, eventually contributing to wildlife conservation and community health initiatives. She also wants to develop simple apps or digital tools
    that help other kids manage stress, merging her tech interests with her empathy for peers who feel anxious or sad.
