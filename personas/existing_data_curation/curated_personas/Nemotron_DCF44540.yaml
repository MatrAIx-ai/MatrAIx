personas:
  professional: Clisha Adams, a budding game creator, blends storytelling and coding on Scratch, using her curiosity and practicality to design simple interactive adventures while collaborating in a tight‑knit
    youth coding club that mirrors her love for organized yet flexible projects and her community‑focused mindset.
  sports: Clisha Adams enjoys swimming with the Palm Beach Youth Swim Club during the school year, plays casual beach volleyball with friends in the summer, and cheers for the Miami Dolphins and Miami Heat,
    preferring low‑key, small‑group workouts that fit her reserved yet active personality.
  arts: Clisha Adams immerses herself in classic R&B from Alicia Keys, contemporary hip‑hop beats by Kendrick Lamar, and uplifting gospel hymns by Mahalia Jackson, while she spends hours sketching beach
    scenes and fantasy characters using Procreate, devouring graphic novels like "Ms. Marvel" and reading the "Harry Potter" series, and practicing simple melodies on her keyboard.
  travel: Clisha Adams prefers short, family‑oriented trips that blend beach relaxation with light adventure, such as weekend getaways to the Florida Keys and annual visits to the Everglades, while dreaming
    of a future vacation to the Bahamas to snorkel among coral reefs, planning each outing with a detailed journal checklist to balance excitement with her need for organization.
  culinary: Clisha Adams enjoys sampling fresh shrimp po' boys, key lime pie, and tropical fruit salads featuring mango and pineapple, often helping her family whip up simple seafood dishes in the kitchen
    while practicing her budding culinary skills with a fondness for seasoning with lime zest and a pinch of Cajun spice.
  core: Clisha Adams navigates adolescence with a vivid imagination, a love for coding and sketching, a habit of journaling every emotion, and an occasional tendency to binge‑watch animated series late
    into the night, all while balancing her anxious heart with a resilient community spirit.
background:
  cultural: Clisha is an African American girl growing up in West Palm Beach, Florida. Her family places a strong emphasis on education, community support, and cultural pride, often sharing stories of Black
    heritage and participating in local events like the African American Heritage Festival. She enjoys classic R&B and contemporary hip‑hop music playing in her household, and she frequently hears gospel
    songs at the neighborhood church where her family attends services. The diverse, coastal environment of Palm Beach County influences her love for the ocean and marine life, while her community’s emphasis
    on resilience and mutual aid shapes her compassionate yet assertive outlook. These cultural influences intertwine with her personal interests, guiding her aspirations and daily activities.
