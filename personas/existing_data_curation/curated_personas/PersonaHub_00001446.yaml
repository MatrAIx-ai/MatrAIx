persona_description: A missionary priest who founded missions in the American West, particularly in California, and is known for his zeal, industry, and optimistic character. His mission was to find and
  further the Holy Family of the Universal Church by extending the membership of the Holy Family as far as his legs would carry him. He is described as having a unique and special knowledge of group theory,
  particularly the concepts and theorems related to subgroups and isomorphisms. He is also known for his work in the American West, particularly in California, and for his efforts in founding missions there.
