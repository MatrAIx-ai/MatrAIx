personas:
  professional: Katrina Sang, a 31-year-old logistics coordinator, blends their hands-on, routine-loving mindset with a friendly, Southern-hospitality-infused approach to steer regional distribution centers,
    using Excel, SQL, SAP and Oracle WMS to fine-tune inventory, forecast demand, and negotiate with vendors while casually mentoring new teammates during coffee breaks.
  sports: Katrina Sang, an avid fan of the Atlanta Falcons and Georgia Bulldogs, spends weekday evenings cheering on football games with friends, joins a local co-ed softball league during the summer, and
    keeps fit by walking their dog through the community garden and attending line-dancing classes at the county recreation center; they also enjoy casual hikes in the nearby Piedmont hills on weekends.
  arts: Katrina Sang weaves the comforting rhythms of line-dancing to Dolly Parton tunes and the intricate patterns of quilt making into their leisure time, while devouring contemporary romance novels by
    Nora Roberts and attending the annual Strawberry Festival's folk-music stage featuring The Avett Brothers; they also volunteer at the local community theater, occasionally stepping in as a chorus member.
  travel: Katrina Sang prefers low-key weekend getaways, often packing a cooler of peach-cobbler and heading to historic Savannah or the blue-ridge hills of Asheville on a whim, while planning their annual
    family road-trip to the Florida Gulf Coast with a detailed itinerary for farm-stay stays and local market visits; they also keep a travel journal that mixes doodles of farm scenes with sticky-note reminders
    of upcoming events.
  culinary: Katrina Sang is a confident home cook who delights in whipping up Southern staples such as crispy fried chicken with buttermilk brine, collard greens simmered with smoked turkey, and peach cobbler
    featuring fresh Georgia peaches and a flaky biscuit topping, while regularly swapping recipes at potluck gatherings and experimenting with new ingredients like heirloom tomatoes and locally milled cornmeal;
    they often end the night with a slice of pecan pie and a cup of sweet tea.
  core: Katrina Sang is a practical, community-centered logistics pro who balances routine-driven efficiency with a relaxed, sociable vibe, often swapping spreadsheets for quilt patches and potluck plates;
    they thrive on blending order with spontaneity.
background:
  cultural: Katrina grew up in the small‑town culture of Dublin, Georgia, where Southern hospitality, church involvement, and a strong work ethic are central values. Her family’s background in agriculture
    and local manufacturing shaped her practical, hands‑on approach to problem‑solving, while community events like the annual Strawberry Festival reinforced her love for social gatherings. Though rooted
    in traditional Southern customs, she embraces modern professional tools and is comfortable navigating both the close‑knit community life and the broader logistics industry.
attributes:
  skills: '[''Inventory control'', ''Demand forecasting'', ''Route optimization'', ''Supply‑chain coordination'', ''Data analysis (Excel, SQL)'', ''ERP/WMS systems (SAP, Oracle)'', ''Vendor negotiation'',
    ''Team communication'', ''Problem‑solving under pressure'', ''Training and onboarding'']'
  hobbies: '[''Community gardening'', ''Potluck hosting'', ''Line dancing'', ''DIY home improvement'', ''Quilting'', ''Farmers’ market visits'', ''Contemporary romance reading'', ''Crossword puzzles'']'
  career_goals: Katrina aims to move into a senior logistics or supply‑chain manager role within the next three to five years, overseeing a larger regional network and leading a multidisciplinary team.
    She plans to earn the APICS Certified Supply Chain Professional (CSCP) credential to deepen her strategic expertise. Her long‑term ambition is to design and implement sustainable, technology‑enabled
    logistics processes that reduce waste and improve delivery reliability, while mentoring junior logisticians and fostering a collaborative workplace culture.
