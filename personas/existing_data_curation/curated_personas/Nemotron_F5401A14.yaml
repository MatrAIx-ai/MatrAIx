  hobbies: '[''Visiting local art galleries and museums'', ''Senior dance classes (swing & line dancing)'', ''Backyard gardening (vegetables, roses, herbs)'', ''Knitting and crochet for charity'', ''Reading
    historical fiction and biographies'', ''Listening to jazz and classic rock'', ''Weekly book club'', ''Volunteer storytelling for children'', ''Craft workshops'']'
  career_goals: Although retired, Rozzie aims to document her life story in a memoir that captures the cultural shifts of the Rust Belt, to collaborate with local artists on a community mural that celebrates
    intergenerational cooperation, and to mentor younger volunteers at the senior center. She also hopes to learn digital photography to preserve memories, stay physically active through dance classes,
    and continue contributing to charitable knitting projects, all while maintaining her health and independence.
