personas:
  professional: Marlon Gonzalez, a 26‑year‑old painting professional in Palm Beach County, leverages meticulous blueprint reading, sustainable paint tech expertise, and reliable crew coordination to deliver
    eco‑friendly interior and exterior finishes while methodically planning each project timeline.
  sports: Marlon Gonzalez shoots hoops at the neighborhood community center’s Wednesday night league, follows the Miami Heat and the Tampa Bay Buccaneers, and keeps fit with early‑morning fishing trips
    on Lake Okeechobee, blending competitive basketball with relaxed angling.
  arts: Marlon Gonzalez immerses himself in color theory through online courses, draws inspiration from contemporary artists like Yayoi Kusama and Kehinde Wiley, and grooves to the beats of Kendrick Lamar,
    H.E.R., and Machel Montano while curating a wall of abstract art in his living space.
  travel: Marlon Gonzalez plans weekend getaways to the Florida Keys and occasional road trips to New Orleans for its music scene, balancing his love for short, budget‑friendly trips with a dream of exploring
    Caribbean islands like Aruba for deeper cultural immersion.
  culinary: Marlon Gonzalez cooks family recipes that fuse Caribbean spices—think Jerk‑seasoned chicken with scotch bonnet pepper and coconut rice—while experimenting with sustainable, locally sourced fish
    from his lake catches, and enjoys perfecting his homemade hot sauce using mango and habanero.
  core: Marlon Gonzalez blends methodical craft, eco‑conscious ambition, and a calm, curious spirit into a life of sustainable painting, basketball, and Caribbean‑flavored cooking, all while juggling occasional
    back aches and a penchant for impulse tool purchases.
background:
  cultural: Marlon identifies as African American with Afro‑Caribbean heritage; his family traces roots to the Caribbean islands, and his upbringing in the multicultural environment of Wellington, Florida,
    exposed him to a blend of Southern US traditions, Caribbean rhythms, and a strong sense of community. He participates in local cultural festivals, values the emphasis on family and resilience common
    in both African American and Caribbean cultures, and often incorporates those influences into his social life and cooking.
attributes:
  skills: '[''Surface preparation'', ''Interior painting'', ''Exterior painting'', ''Color matching'', ''Finish application'', ''Project planning'', ''Safety compliance'', ''Team coordination'', ''Equipment
