  hobbies: '[''Basketball'', ''DIY home improvement'', ''Reading about color theory and contemporary art'', ''Listening to hip‑hop, R&B, and Caribbean music'', ''Cooking Afro‑Caribbean dishes'', ''Fishing'',
    ''Community volunteering'']'
  career_goals: Marlon aims to advance from a painting worker to a certified painting contractor within the next three years, obtaining OSHA and EPA certifications and completing a construction management
    coursework at a local community college. His long‑term ambition is to launch his own eco‑friendly painting business that serves residential and commercial clients across Palm Beach County, offering
    sustainable paint options and employing a small, well‑trained crew. He also hopes to mentor younger workers and become active in the local trade association.
