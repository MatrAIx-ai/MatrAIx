  hobbies: '[''Woodworking'', ''DIY home repairs'', ''Cycling'', ''Puzzles (Sudoku, crosswords)'', ''Reading sustainability articles'', ''Classic rock music'', ''Volunteer clean‑up events'', ''Facility
    management forums'', ''Fishing (seasonal)'', ''Local brewery visits (moderate)'']'
  career_goals: Ronald aspires to advance from a janitorial role to a supervisory position within facilities management. He aims to obtain certifications such as Certified Professional Cleaner (CPC) or
    Certified Facility Manager (CFM), pursue an associate degree in Facilities Management, and eventually become a Facilities Manager overseeing multiple sites. He is motivated to implement sustainable
    cleaning practices, reduce chemical waste, and lead a team that consistently meets high standards. Long‑term, he envisions starting his own eco‑friendly cleaning business catering to commercial clients
    in the Twin Cities.
