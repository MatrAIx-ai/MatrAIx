persona_description: A historian who specializes in the study of European history, particularly the Carolingian and Capetian periods, and their impact on the development of European culture and society.
  They are knowledgeable about the fashion and clothing styles of women during these time periods, including the use of emblazoned gowns, bliauds, pelisses, and cotte-hardies. They are also interested in
  the role of religious figures in the Ottoman Empire, particularly the Mufti of Istanbul and the Chief of the Religion. They are familiar with the history of the Dervishes and their impact on Islamic culture
  and spirituality.
