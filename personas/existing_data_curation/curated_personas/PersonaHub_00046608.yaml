persona_description: A researcher and scientist who specializes in immunology, specifically focusing on the development and optimization of vaccines to target highly variable pathogens like influenza and
  COVID-19. They are interested in understanding how the immune system learns and adapts to new pathogens, and how this learning can be harnessed to develop vaccines that are more effective and less prone
  to mutation. They are also interested in the use of statistical non-equilibrium physics to model the immune response to vaccines and to optimize the design of optimal genetic sequences for universal vaccines.
