persona_description: A historian who is interested in the study of colonial history and the representation of memory in Angola, particularly in the context of Portuguese colonialism and the creation of
  a multiracial, modernising Angola after the independence war in 1961. This person is likely to have a deep understanding of the cultural and historical dynamics of Angola during the colonial period, and
  an interest in understanding how these dynamics were represented in the media and literature. They may also have expertise in the field of memory studies and the role of commemoration in shaping historical
  narratives.
