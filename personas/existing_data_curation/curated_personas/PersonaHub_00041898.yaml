persona_description: A coastal manager who is interested in public safety and the health impacts of harmful algal blooms (HABs) in the Tampa Bay area. They are familiar with the Beach Hazards Statement
  and the HAB Operational Forecast System, and are interested in expanding public awareness of the potential health effects of HABs through the addition of HAB alerts to Beach Hazards Statements. They are
  also interested in the physical oceanographic real-time system (PORTS®), current surveys, and field projects related to currents in San Francisco Bay and the Florida Keys. They are interested in the new
  experimental Vibrio vulnificus probability model and the NOAA Roadmap effort to improve and expand development and delivery of operational ecological forecasts.
