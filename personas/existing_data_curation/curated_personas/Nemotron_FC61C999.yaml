  career_goals: Sandra aims to progress from her current sales manager role to a regional sales director position within the next five years, overseeing multiple teams and driving larger market initiatives.
    She plans to earn the Certified Professional Sales Leader (CPSL) credential and eventually pursue an MBA to deepen her strategic business acumen. Sandra is also passionate about integrating her appreciation
    for art and unconventional thinking into brand storytelling, with a long‑term ambition to lead a cross‑functional product‑marketing team where she can blend sales insight with creative branding. Ultimately,
    she envisions launching a boutique consultancy that helps emerging companies craft data‑backed, creatively compelling sales strategies.
