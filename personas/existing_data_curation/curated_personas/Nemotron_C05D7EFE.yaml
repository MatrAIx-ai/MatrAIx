  career_goals: Guided by her competitive drive and desire for predictable outcomes, Anne aims to advance to a Technical Lead or Solutions Architect position within the next five years. She plans to obtain
    PMP and AWS Certified Solutions Architect credentials, lead cross‑functional teams that adhere to strict development standards, and mentor junior engineers in best practices. Long‑term, she envisions
    shaping company‑wide technology strategy while introducing structured stress‑management initiatives to foster a resilient work environment.
