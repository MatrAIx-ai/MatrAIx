personas:
  professional: Teresa Oliver is an experienced middle‑school math and literature tutor who designs interdisciplinary lessons weaving visual‑arts projects with STEM concepts, leveraging digital whiteboards
    and interactive platforms while balancing meticulous planning with the flexibility to adapt on the fly, and their competitive drive pushes them to constantly refine student outcomes despite occasional
    self‑criticism.
  sports: Teresa Oliver spends weekends hiking the rocky coastal trails of Acadia National Park and the quiet forests of Baxter State Park, is a member of the Portland Trailheads hiking club, follows the
    Boston Red Sox and Boston Bruins avidly, and in winter swaps the shoes for cross‑country skiing with the local Moosehead Ski Club, always keeping a competitive edge by logging personal best times.
  arts: Teresa Oliver frequents contemporary galleries like the Portland Museum of Art’s Modern Wing, sketches installations by artists such as Yayoi Kusama and Kehinde Wiley, curates a weekly art‑themed
    book club featuring creative nonfiction by Zadie Smith and Mary Oliver, and finds inspiration in the ambient soundtracks of indie folk band Fleet Foxes, which often accompany their own sketching sessions.
  travel: Teresa Oliver plans travel with a blend of meticulous itineraries and spontaneous side‑trips, favoring New England escapes like a weekend in Bar Harbor and a sunrise hike in the White Mountains,
    while dreaming of a cultural immersion in Kyoto’s historic temples and the artistic scene of Barcelona, yet their limited budget and tutoring commitments keep most overseas ventures on a wish‑list.
  culinary: Teresa Oliver embraces seasonal farm‑to‑table cooking, often preparing roasted root vegetables with locally sourced maple‑glazed carrots, pan‑seared cod tossed in a cider‑vinegar reduction,
    and a hand‑crafted blueberry‑ricotta cheesecake, while experimenting with fermenting fiddleheads into a tangy kimchi inspired by their recent reading on Korean cuisine.
  core: Teresa Oliver is a detail‑oriented, art‑loving educator who balances a competitive streak and chronic worry with yoga, hiking, and a penchant for strategic board games, and they always seek to blend
    creativity with analytical rigor.
background:
  cultural: Teresa grew up in a small New England town in Maine, rooted in a predominantly Anglo‑American cultural setting. Her family traditions emphasize self‑reliance, community involvement, and an appreciation
    for the region’s natural landscape. She celebrates local customs such as the annual lobster‑fest, autumn leaf tours, and town fairs. While her heritage is broadly European‑American, she actively engages
    with the broader cultural mosaic of Whitefield by participating in multicultural community events, supporting the local arts scene, and incorporating diverse perspectives into her tutoring practice.
attributes:
  skills: '[''Mathematics tutoring'', ''Literature tutoring'', ''Curriculum design'', ''Lesson planning'', ''Educational technology integration'', ''Arts integration'', ''Individualized instruction'', ''Assessment
    and feedback'', ''Critical thinking facilitation'', ''Stress-management techniques'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Hiking and nature photography'', ''Yoga and mindfulness meditation'', ''Reading philosophy and creative nonfiction'', ''Journaling'',
    ''Cooking experimental seasonal recipes'', ''Playing competitive board games and puzzles'']'
  career_goals: Teresa plans to earn a bachelor’s degree in Education within the next two years and obtain teacher certification. She aims to transition from private tutoring to a full‑time teaching position
    at a progressive middle school where she can implement interdisciplinary curricula that blend arts and STEM. In the long term, she aspires to become a curriculum specialist or director of instructional
    development for a regional school district, overseeing program design and professional development for teachers. Teresa also hopes to publish a guide on integrating visual arts into middle‑school literacy
    instruction and to launch a community tutoring center offering low‑cost academic support and enrichment workshops.
