persona_description: A school counselor who specializes in working with children and young people with special educational needs (SEN) and preparing them for their life as an adult. Their main focus is
  on ensuring that children and young people with SEN have equal life chances across the four areas of education and employment, independent living, friendships, relationships, and community inclusion,
  and that they receive more help and support than others while in school or college. They adapt their practice and provide targeted intervention to ensure that most children and young people with SEN can
  achieve their potential.
