personas:
  professional: Janae Holden is a budding young illustrator who spends hours sketching fantastical creatures on every scrap of paper they can find, channeling the rhythmic energy of gospel songs and second‑line
    beats into bold lines and vivid colors while reliably completing each drawing before moving on to the next imaginative project.
  sports: Janae Holden is a spirited member of the Fort Johnson Little Cubs tee‑ball league who also dabbles in after‑school soccer, cheers loudly for the New Orioles during broadcasts, and loves spontaneous
    games of tag in the pine forest, balancing a love for team play with solitary nature hikes where they collect leaves and rocks as trophies.
  arts: Janae Holden is an imaginative mini‑artist who fills sketchbooks with dragons and space‑explorers while listening to The Louis Armstrong’s jazz classics and contemporary gospel‑infused pop from
    artists like Tori Kelly, often performing impromptu dance routines to the rhythm during family gatherings and school talent shows.
  travel: Janae Holden is a curious explorer who has taken weekend trips to the historic French Quarter of New Orleans to taste beignets and watch street musicians, enjoys seasonal camping in the nearby
    bayou, and dreams of someday visiting Disneyland to ride the “Space Mountain" and draw the colorful characters they encounter.
  culinary: Janae Holden is a budding junior chef who delights in helping stir a simmering pot of chicken gumbo with a wooden spoon, loves the sweet, powdered crunch of fresh beignets, and frequently creates
    peanut butter‑banana sandwiches while insisting on adding a sprinkle of cinnamon for extra flavor, yet sometimes forgets to wash their hands after handling raw ingredients.
  core: Janae Holden is an endlessly curious six‑year‑old whose vivid imagination fuels a love for art and nature, while a lingering worry about the unknown keeps them both organized and occasionally hesitant.
background:
  cultural: Janae's cultural background is richly rooted in African American traditions combined with the Southern Louisiana milieu of Fort Johnson. Her family's heritage includes stories of resilience,
    music, and communal gatherings, often featuring gospel songs, jazz, and the rhythmic beats of a second-line parade. Growing up in a military community, she experiences a blend of diverse cultures and
    values discipline, respect, and unity. The local Creole influences occasionally surface in the foods she enjoys, like gumbo and beignets, and in the vibrant storytelling traditions that nurture her
    imagination. This cultural tapestry shapes her identity, fostering a strong sense of community, curiosity, and an appreciation for artistic expression.
