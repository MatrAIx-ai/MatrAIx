  career_goals: Janae dreams of becoming an astronaut who can explore distant planets, inspired by her love of space books and the novelty of the unknown. She also imagines herself as an artist who creates
    vibrant paintings that tell stories. As she grows older, she hopes to help other children understand and manage their worries, perhaps as a child psychologist or a teacher, combining her compassion
    with her desire to make a positive impact.
