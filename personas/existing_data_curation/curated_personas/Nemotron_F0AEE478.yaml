personas:
  professional: Frank Green, a one‑year‑old 'baby content creator' who delights in posting short videos of his toy‑building adventures, leverages his natural sociability and methodical block‑sorting skill
    to engage a growing parent audience.
  sports: Frank Green, a one‑year‑old enrolled in a parent‑led toddler swimming class at the community pool and a baby gymnastics group, cheers for the Chicago Cubs whenever a family member watches a game,
    and loves bouncing on the indoor play‑centre's mini‑basketball hoop.
  arts: Frank Green, a one‑year‑old who spends mornings dancing to Raffi’s ‘Baby Beluga,’ evenings giggling at Sesame Street with the voices of Elmo and Cookie Monster, and is fascinated by the bright illustrations
    of Dr. Seuss books.
  travel: Frank Green, a one‑year‑old who has taken a family road‑trip to the beaches of Florida, visited grandparents in Texas, and dreams of a future visit to the Eiffel Tower in Paris after watching
    a picture book about it.
  culinary: Frank Green, a one‑year‑old whose palate delights in mashed sweet potatoes, avocado puree, banana oat smoothies, and occasional soft cheese cubes, while he giggles when tasting a spoonful of
    homemade apple sauce with cinnamon.
  core: Frank Green, a precociously curious and sociable one‑year‑old who balances methodical toy sorting with endless chatter, a love for bright colors, and a tiny penchant for splurging on plush toys.
