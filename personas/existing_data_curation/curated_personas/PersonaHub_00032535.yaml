persona_description: A cosmologist who specializes in the study of the cosmic microwave background radiation, particularly the properties and distributions of galaxies at different redshifts. Her research
  interests include, but are not limited to, the cosmic web, galaxy clustering, and the evolution of galaxies over time. She is particularly interested in understanding the properties of galaxies at high
  redshifts, where the effects of dark matter and gravity become more pronounced.
