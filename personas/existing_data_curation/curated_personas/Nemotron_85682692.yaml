  career_goals: Glenda aims to transition from a skilled tradesperson to a lead painter and eventually launch her own boutique painting and decorative‑finishes business in the Denver metro area. She plans
    to earn professional certifications, expand her repertoire in artistic wall treatments, and specialize in eco‑friendly paint solutions. Over the next five years, she hopes to build a portfolio of custom
    murals and high‑end residential projects that showcase her blend of craftsmanship and artistic vision, while mentoring apprentices to foster a collaborative, creative work environment.
