personas:
  professional: Glenda Overton, a 24‑year‑old master painter and paperhanger in Denver, blends meticulous surface‑preparation expertise with a vivid artistic eye, often improvising color schemes on the
    fly and occasionally missing project deadlines due to their spontaneous nature.
  sports: Glenda Overton spends weekends scaling the Rockies with Mile High Climbers, hiking with the Denver Outdoor Adventure Group, and cheering for the Colorado Rockies while they join casual pick‑up
    volleyball games at the local park.
  arts: Glenda Overton devotes evenings to acrylic canvases inspired by Banksy’s street wit and Frida Kahlo’s emotive palettes, frequents Denver Art Museum shows featuring Basquiat, and they find rhythm
    in The Lumineers during group dance classes.
  travel: Glenda Overton plans spontaneous weekend road trips along Colorado’s Alpine Loop, has already trekked Banff National Park’s trails, and they dream of a summer pilgrimage to Florence, Italy to
    study Renaissance frescoes while balancing a modest travel budget.
  culinary: Glenda Overton enjoys crafting vibrant quinoa‑and‑roasted‑vegetable bowls seasoned with smoked paprika, whipping up avocado‑lime salsa for grilled salmon tacos, sipping nightly pour‑over coffee
    brewed with Ethiopian beans, and they occasionally treat themselves to artisanal pizza after a long mural session.
  core: Glenda Overton is a restless creator who channels spontaneous energy into bold murals, yet constantly battles a worry‑laden mind that keeps them burning the midnight oil on both palettes and project
    proposals.
background:
  cultural: Glenda grew up in a typical suburban White American family in the Denver outskirts, where a blend of Midwestern values and Colorado's outdoors‑oriented lifestyle shaped her worldview. Her high‑school
    education in Wheat Ridge exposed her to a modest yet diverse community, fostering an appreciation for both traditional craftsmanship and contemporary artistic expression. The region's strong DIY culture,
    coupled with a growing emphasis on sustainability, influences her professional choices and personal hobbies, while the local art scene and mountain environment nurture her curiosity, sociability, and
    desire for unconventional experiences.
