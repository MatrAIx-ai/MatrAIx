  career_goals: Frank aims to advance into a senior operations or administrative director role within the next five years, overseeing multiple office locations and driving organization‑wide efficiency programs.
    He plans to obtain a professional certification such as the Certified Manager (CM) or Project Management Professional (PMP) to bolster his credentials. A key ambition is to create a workplace culture
    that balances high performance with employee well‑being, reducing turnover and fostering harmony—a reflection of his cooperative nature. He also hopes to mentor emerging supervisors, passing on his
    methodical approach to management while learning stress‑reduction techniques to better handle his own tendency toward worry.
