  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Birdwatching'', ''Knitting'', ''Crossword Puzzles'', ''Local History Walking Tours'', ''Photography'', ''Cooking Family
