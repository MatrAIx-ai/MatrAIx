  career_goals: Danny plans to finish his bachelor’s degree in elementary education and earn his Illinois teaching license within the next year. He aims to pursue a master’s in Curriculum and Instruction
    to deepen his expertise in instructional design. In the medium term, he hopes to become a lead teacher who mentors new faculty and launches a school‑wide maker‑space program. Ultimately, he envisions
    moving into a curriculum coordinator or assistant principal role where he can shape school‑wide teaching practices and foster a collaborative, innovative culture.
