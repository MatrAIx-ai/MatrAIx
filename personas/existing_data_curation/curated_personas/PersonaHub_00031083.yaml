persona_description: A student who is interested in learning Object Oriented Analysis and Design with Unified Modeling Language (OODA&D UML). They are looking for a comprehensive training course that covers
  key concepts and methodologies required to perform quality object-oriented software engineering. They are willing to learn practical techniques such as use-case and CRC analysis, UML diagramming, and
  patterns. They are interested in applying object-oriented analysis during the course to improve software designs and to see how software objects can be altered to build software systems that are more
  robust and less expensive. They are open to practical aspects of project management and implementation from the perspective of experienced object system designers. They are willing to work through the
  course with the instructor's guidance and are eager to apply their skills in labs that are mini design sessions.
