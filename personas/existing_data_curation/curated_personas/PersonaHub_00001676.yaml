persona_description: A member of Congress who is appointed by members of Congress and the Secretary of Education to serve on the Advisory Commission on Accessible Instructional Materials in Postsecondary
  Education for Students with Disabilities. This person is knowledgeable about the Higher Education Opportunity Act of 2008 and has experience in policy-making and legislative charge fulfillment. They have
  a strong background in postsecondary education and are familiar with the current state of accessible materials for students with disabilities in postsecondary education. This person is responsible for
  presenting a report to Congress that outlines specific recommendations for increasing the amount of accessible, cost-effective instructional materials that are available to students with disabilities
  who attend postsecondary institutions.
