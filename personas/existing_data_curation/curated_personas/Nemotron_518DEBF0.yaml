personas:
  professional: Drucilla Bourgeois, a 17‑year‑old aspiring community health aide, blends her natural empathy and knack for quick problem‑solving with a flexible, sometimes disorganized approach to coordinating
    teen‑focused wellness workshops and animal‑shelter volunteer drives.
  sports: Drucilla Bourgeois, a 17‑year‑old who spends weekends cruising the Sylmar skate park with the local skate club, follows the LA Galaxy in MLS, roots for the Los Angeles Dodgers during baseball
    season, and joins co‑ed intramural volleyball at school, balancing her love for active movement with a relaxed routine that often swaps structured workouts for spontaneous skate sessions.
  arts: Drucilla Bourgeois, an avid sketcher of Los Angeles skyline silhouettes, curates indie‑pop playlists featuring Phoebe Bridgers, Clairo, and The 1975 for friends, and devours teen dramas like Euphoria
    and 13 Reasons Why, letting the mix of visual and musical influences shape her expressive outlook and social connections.
  travel: Drucilla Bourgeois prefers spontaneous weekend road trips with friends, having already explored the Griffith Observatory, a surf‑filled day in Santa Barbara, and a cultural snack‑run in Tijuana,
    while dreaming of a spring backpack adventure to Paris and a desert‑camping visit to Marrakesh when finances allow.
  culinary: Drucilla Bourgeois enjoys whipping up easy Mexican fare like fish tacos with cilantro‑lime slaw and fresh guacamole, as well as Mediterranean staples such as falafel wraps drizzled with tahini
    and Greek salad tossed with feta, olive oil, and oregano, relying on YouTube tutorials and a modest kitchen setup to experiment with bold flavors while still favoring quick, crowd‑pleasing dishes.
  core: Drucilla Bourgeois is a compassionate, slightly chaotic teen who blends sketch‑filled city dreams with skate‑park spontaneity, always juggling community service, impulsive spending, and a love for
    indie tunes while secretly hoarding unfinished playlists for later.
background:
  cultural: Drucilla is a White American of French‑Cajun ancestry raised in Sylmar, a suburban enclave in the San Fernando Valley of Los Angeles County. Growing up in a culturally diverse neighborhood,
    she regularly interacts with Hispanic, Asian, and African‑American families, which has broadened her culinary tastes and language exposure. Her family observes Christian traditions and places strong
    emphasis on community service, values that reinforce her compassionate and cooperative nature. The multicultural atmosphere of Los Angeles, combined with the suburban stability of Sylmar, has shaped
    her inclusive worldview and desire to bridge cultural gaps.
attributes:
  skills: '["empathetic listening", "basic digital literacy (Google Docs, email, social media)", "caregiving and basic first aid", "simple meal preparation", "creative problem solving", "conflict mediation",
