  hobbies: '["sketching", "listening to music", "creating playlists", "volunteering at animal shelter", "community gardening", "skate‑park hangouts", "binge‑watching series", "co‑op video gaming", "cooking
    simple recipes"]'
  career_goals: She aims to complete her GED and pursue a career in community health or social services, such as a youth outreach worker or community health aide. Drucilla wants to work for a local nonprofit
    where she can support underserved teens, organize wellness workshops, and later advance to a program coordinator role. Her long‑term ambition is to earn a degree in social work or public health so she
    can design inclusive services that promote harmony and foster collaborative environments.
