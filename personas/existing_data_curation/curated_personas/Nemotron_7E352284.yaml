personas:
  professional: Jason Gentry is a retired community event coordinator who leverages his woodworking, gardening, and digital photography expertise to curate intergenerational art workshops that blend traditional
    Ozark crafts with contemporary ideas, and they apply the same meticulous organization and flexible creativity to mentoring emerging volunteers.
  sports: Jason Gentry is a devoted fan of the Kansas City Royals and the Kansas City Chiefs, participates in the Ozark Trail Walking Club during the milder seasons, and they treat friendly chess tournaments
    as a mental sport that keeps their strategic mind sharp.
  arts: Jason Gentry immerses himself in watercolor painting of Ozark vistas, frequently attends performances at the Kauffman Center featuring the Kansas City Symphony and local theater troupes, and they
    draw inspiration from artists like Winslow Homer and photographer Diane Arbus while curating community exhibitions at the Springfield Arts Council.
  travel: Jason Gentry prefers thoughtfully planned journeys that blend cultural enrichment and relaxation, such as weekend drives to historic Marquette, an annual art‑focused pilgrimage to Paris, and summer
    road‑trips through the Great Smoky Mountains, and they always leverage senior discounts and detailed itineraries to stay within budget.
  culinary: Jason Gentry enjoys experimenting with garden‑fresh cuisine, regularly preparing dishes such as roasted heirloom tomatoes with basil pesto, Kansas City‑style smoked ribs, and spiced beet hummus,
    but they often lose track of timing, leaving the basil simmering longer than intended.
  core: Jason Gentry is a curious, art‑driven 68‑year‑old who blends disciplined volunteer leadership with a playful streak for watercolor, gardening, and mentorship, and they sometimes forget appointments
    in their enthusiasm for new projects.
background:
  cultural: Jason was raised in a mid‑century, white, middle‑class family in the Ozarks region of Missouri. His upbringing was shaped by a Protestant (largely Methodist/Baptist) church community that emphasized
    self‑reliance, neighborly cooperation, and modesty. Growing up during the social changes of the 1960s and 1970s, he absorbed both traditional Midwestern values and a curiosity for broader cultural currents,
    fostering an appreciation for local heritage while remaining open to new artistic and intellectual ideas.
