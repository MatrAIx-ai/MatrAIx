  hobbies: '[''Gardening'', ''Bridge'', ''Book club'', ''Quilting'', ''Community volunteering'', ''Genealogy research'', ''Travel'', ''Church choir'']'
  career_goals: Although retired, Diana’s ambitions focus on legacy and service. She aims to lead a multigenerational community garden that promotes healthy living and intergenerational learning. She plans
    to compile a memoir and a local‑history oral‑history collection, preserving the stories of Winston‑Salem’s senior residents. Additionally, she seeks to expand her digital fluency to host virtual workshops,
    ensuring that both tech‑savvy and less‑tech‑comfortable peers can stay connected. Diana also hopes to mentor younger volunteers, sharing her organizational know‑how while encouraging them to innovate.
