persona_description: A philosopher who is skeptical of the existence of abstract concepts and the unity of objects. They question the validity of the concept of Being and argue that it is an attitude of
  the mind rather than a real existence. They believe that the only unity is a definite object that is one thing, and all comes to an attitude of the mind towards things considered singly. They also question
  the reality of numbers and unity, arguing that they are derived from objects and that the concept of unity is not an attitude or notion that rises in us as a by-product of the objects.
