  hobbies: '["Drawing and coloring", "Reading picture books", "Building LEGO structures", "Exploring the neighborhood park and nature walks", "Soccer practice", "Dancing to music", "Beginner piano lessons",
    "Pretend kitchen play with family"]'
  career_goals: Inspired by her love of animals and curiosity about how things work, Josephine dreams of becoming a veterinarian, caring for pets and wildlife. She also enjoys teaching friends how to build
    with LEGO and tells stories during play, so she imagines a future as a teacher or science educator who combines discovery with practical learning. Her long-term ambition is to blend her curiosity with
    helpful, real-world solutions, whether in a clinic, a classroom, or a community science project.
