  career_goals: Eduardo aims to advance to a supervisory role overseeing municipal park maintenance in Ashland County, where he can apply sustainable landscaping practices on a larger scale. He also aspires
    to earn a Landscape Industry Certified Technician (LICT) credential and eventually launch a small, family‑run landscaping business that emphasizes native plantings and water‑conservation techniques.
    Mentoring younger workers and sharing his blended knowledge of traditional and modern methods are central to his ambition, while he remains committed to maintaining a balanced life that allows quality
    time with his wife and extended family.
