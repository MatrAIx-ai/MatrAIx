personas:
  professional: Eduardo Maya is a seasoned landscaping supervisor who blends three decades of hands‑on expertise in horticulture, irrigation design, and team coordination with a curiosity‑driven yet practical
    mindset, leveraging his sociable, cooperative nature to foster collaborative municipal park projects that honor community values and integrate culturally inspired plantings.
  sports: Eduardo Maya plays as a midfielder for the Ashland United adult soccer league, supports the Green Bay Packers and Milwaukee Brewers with regular game‑day gatherings, enjoys early‑morning fishing
    on Lake Superior for trout and walleye, and maintains a weekly routine of brisk walks along county park trails to keep his knees flexible and his stamina steady.
  arts: Eduardo Maya attends local mariachi performances by Los Arrieros, collects prints of Frida Kahlo, delights in the music of Lila Downs and Carlos Santana, volunteers as a choreographer for neighborhood
    dance gatherings that feature traditional folk steps, and often lights candles on marigold‑laden altars during Día de los Muertos vigils to honor his ancestors.
  travel: Eduardo Maya prefers road‑trip itineraries that blend scenic nature with cultural stops, planning weekend getaways to the Upper Peninsula’s Porcupine Mountains, a summer retreat in Door County’s
    lavender fields, and occasional trips to Santa Fe’s art markets, all while budgeting to ensure he can still fund family gatherings back home.
  culinary: Eduardo Maya is a proficient home chef who regularly prepares mole negro with ancho chilies, chocolate, and agave nectar, hand‑rolled pork tamales made from masa and heirloom corn, and fresh
    salsa verde using tomatillos, jalapeños, cilantro, and lime, often harvesting heirloom tomatoes, poblano peppers, and cilantro from his garden to enhance each dish.
  core: Eduardo Maya is a community‑focused landscaping veteran who turns every project into a cultural showcase, yet habitually over‑waters his indoor houseplants and keeps a secret stash of vintage marigold
    seeds for spontaneous garden art.
background:
  cultural: Eduardo is of Mexican heritage; his parents immigrated to the United States when he was a child, and he grew up in a bilingual household that emphasized family cohesion, hospitality, and respect
    for community. While he was raised in Wisconsin’s Ashland County, he has retained a strong connection to Mexican culture through language, cuisine, music, and celebrations such as Día de los Muertos,
    Cinco de Mayo, and family reunions that feature traditional foods and customs. He often incorporates elements of Mexican flora—such as agaves, ornamental peppers, and vibrant marigolds—into his landscaping
    designs, creating a unique blend that honors his roots while respecting the local environment. Eduardo's cultural identity influences his collaborative work style, his dedication to community service,
    and his commitment to sharing his heritage with neighbors and coworkers.
