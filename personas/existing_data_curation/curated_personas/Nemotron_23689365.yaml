  hobbies: '[''Gardening'', ''Quilting'', ''Painting'', ''Attending gospel and jazz concerts'', ''Cooking Southern and Creole cuisine'', ''Hosting potluck gatherings'', ''Book club (historical fiction &
    African-American literature)'', ''Volunteering at senior center'', ''Genealogy research'']'
  career_goals: Levonne aims to channel her lifelong curiosity and community spirit into a legacy of artistic and cultural preservation. She plans to launch a senior-focused arts workshop at the Monroe
    community center, where she will teach quilting, painting, and storytelling to fellow retirees. She aspires to document and publish a collection of oral histories from older African-American residents
    of Ouachita Parish, capturing their experiences of the civil‑rights era and local traditions. Additionally, she hopes to start a small home-based business selling her handcrafted quilts and specialty
    sauces, allowing her to remain financially independent while sharing her cultural heritage. On a personal level, Levonne seeks to stay active in church leadership, mentor younger volunteers, and complete
    a gardening certification to expand her community garden initiatives.
