persona_description: Ella Baker, a prominent figure in the Civil Rights Movement, dedicated herself to empowering ordinary people to lead themselves and worked behind the scenes to organize the movement.
  She was a strong believer in the power of individual action and the importance of building support for local branches of the Civil Rights Movement. Her words and actions continue to inspire and influence
  people today, particularly in the realm of human rights and social justice.
