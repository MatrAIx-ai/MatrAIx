  hobbies: '[''Hiking coastal trails'', ''Practicing yoga and meditation'', ''Cooking traditional Mexican dishes'', ''Reading contemporary Mexican literature'', ''Writing reflective essays in Spanish'',
    ''Digital photography'', ''Playing strategy board games'', ''Volunteering for STEM outreach'', ''Attending local Latino cultural festivals'', ''Traveling to historic sites'']'
  career_goals: Zenaida aspires to become a senior data scientist and research lead who drives interdisciplinary projects at the intersection of data science and the humanities. She aims to obtain a Ph.D.
    in Computational Social Science within the next three years, which will empower her to design data-driven solutions for social equity and cultural preservation. Her long‑term ambition is to head an
    analytics unit within a public‑policy think‑tank or a tech firm focused on education, where she can mentor junior analysts, shape data‑literacy curricula, and publish influential research on the societal
    impact of emerging technologies. Additionally, she intends to contribute to community initiatives that bring data science skills to under‑represented Latino youth in Orange County.
