personas:
  professional: Titus Bruce, a seasoned construction supervisor with over three decades of hands‑on experience in crew coordination, blueprint interpretation, OSHA safety compliance, and budget management,
    leverages their calm, methodical approach and meticulous daily logs to mentor junior workers while pursuing a construction superintendent credential and planning to launch a family‑run general contracting
    firm focused on affordable, sustainable renovations and consulting.
  sports: Titus Bruce, an avid fly‑fisherman who spends tranquil mornings on Lake Jackson as a member of the Lake Jackson Anglers Association, stays fit through regular gardening and weekend walks, cheers
    on the Atlanta Braves and Falcons, and occasionally joins a local senior softball league for light competition, embodies a low‑key, seasonal approach to sports that balances solitary activity with community
    roots.
  arts: Titus Bruce, who weaves his love of gospel and blues—listening to Mahalia Jackson, B.B. King, and Sister Rosetta Tharpe—into his weekly church choir performances, finds artistic fulfillment in crafting
    handcrafted furniture, and draws inspiration from historical biographies of figures like Abraham Lincoln, integrates these artistic threads into a quiet, reflective leisure life.
  travel: Titus Bruce, a methodical traveler who favors meticulously planned road trips to quiet, historically rich locales such as Savannah’s cobblestone squares, the fishing villages of coastal Maine,
    and the Great Smoky Mountains, while budgeting carefully to accommodate family obligations and saving for his future contracting venture, balances a love for low‑key adventure with a preference for
    relaxation and cultural immersion.
  culinary: Titus Bruce, an intermediate home cook who harvests heirloom tomatoes, sweet corn, and kale from his modest garden and transforms them into hearty Southern dishes such as roasted vegetable medleys,
    pan‑seared trout with lemon‑herb butter, and collard greens simmered with smoked ham hocks, approaches dining with a preference for home‑cooked comfort meals seasoned with fresh rosemary, thyme, and
    garlic.
  core: Titus Bruce blends a calm, methodical work ethic with solitary passions—fly‑fishing, woodworking, and gospel singing—while quietly mentoring the next generation of tradespeople and stewarding a
    frugal, health‑conscious lifestyle.
background:
  cultural: Titus was raised in a close‑knit African‑American community in rural Georgia, where church, family, and hard‑working trades formed the core of daily life. His grandparents were sharecroppers
    who taught him the value of perseverance and community solidarity. Growing up during the latter half of the civil‑rights era, he internalized a strong sense of self‑reliance and mutual support. The
    Southern Black cultural heritage—marked by gospel music, storytelling, and communal gatherings—shapes his values of kindness, cooperation, and harmony. Though he never completed a formal high school
    diploma, his apprenticeship and on‑the‑job learning reflect the tradition of skill‑based mentorship prevalent in his community.
attributes:
  skills: '[''Construction project management'', ''Blueprint reading and interpretation'', ''OSHA safety compliance and site inspections'', ''Crew scheduling and labor coordination'', ''Budgeting and cost
    control'', ''Concrete finishing and masonry'', ''Carpentry and framing techniques'', ''Equipment maintenance and troubleshooting'', ''Conflict resolution and team mediation'', ''Mentoring and apprenticeship
    guidance'']'
  hobbies: '[''Fly fishing at Lake Jackson'', ''Woodworking on custom furniture'', ''Reading construction trade journals and historical biographies'', ''Listening to gospel and blues music'', ''Gardening
    vegetables and herbs'', ''Volunteering to teach basic construction skills at the community center'', ''Participating in the church choir and choir events'']'
  career_goals: Titus aims to formalize his decades of experience with a certified construction superintendent credential and an OSHA 30‑hour certification. He plans to mentor a new generation of Black
    tradespeople in his community, eventually launching a small, family‑run general contracting firm that focuses on affordable home renovations and sustainable building practices in Twiggs County. While
    preparing for a gradual retirement, he hopes to stay active as a consultant and safety trainer for local contractors.
