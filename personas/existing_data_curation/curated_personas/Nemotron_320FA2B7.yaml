personas:
  professional: Laina Mejia, an 80‑year‑old retired part‑time office assistant turned senior‑center mentor, blends practical bookkeeping skills with a knack for improvising craft solutions, while juggling
    a spontaneous learning agenda that often collides with their tendency to resist rigid schedules.
  sports: Laina Mejia, a dedicated walker who tends her vegetable plots and joins a senior‑center yoga class, cheers on the Rochester Red Wings and the Buffalo Bills from her living room, and participates
    in a local walking club for bi‑weekly trips to Letchworth State Park.
  arts: Laina Mejia, a lifelong lover of historical fiction, regularly discusses works by Ken Follett and Philippa Gregory in a close‑knit book‑club, knits while listening to the folk melodies of Joan Baez,
    and volunteers to organize craft workshops featuring patterns inspired by the paintings of Winslow Homer.
  travel: Laina Mejia prefers spontaneous, short‑drive excursions to nearby state parks such as Letchworth and Watkins Glen, dreams of visiting the historic gardens of Sissinghurst in England, and balances
    these wanderlust urges with a fixed budget that limits long‑distance travel.
  culinary: Laina Mejia enjoys farm‑to‑table cooking, frequently prepares heirloom tomato bruschetta, rustic ratatouille, and her grandchildren’s favorite chicken pot pie using fresh basil, thyme, and locally
    sourced cheese, yet sometimes burns the edges of her pies when her mind wanders to upcoming book‑club topics.
  core: Laina Mejia is an 80‑year‑old gardener‑knitter whose curiosity fuels spontaneous learning, but a chronic worry streak sprinkles every hobby with a dash of disorganization and occasional over‑indulgence.
background:
  cultural: Laina comes from a white, long‑established American family with roots in Dutch and German immigrants who settled in the Mohawk Valley in the early 1900s. Growing up in Amsterdam, New York, she
    was immersed in the town’s modest Dutch‑heritage celebrations, the annual Tulip Festival, and the close‑knit community values of the region. Her upbringing emphasized self‑reliance, hard work, and humility,
    while her later life has been shaped by the multicultural fabric of upstate New York, including exposure to a growing diversity of neighbors and a strong sense of local volunteerism.
