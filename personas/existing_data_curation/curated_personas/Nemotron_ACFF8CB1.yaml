personas:
  professional: Minh Vue is a seasoned handyman entrepreneur with an associate’s degree in information technology and ten years of hands‑on renovation experience, who channels their disciplined, detail‑oriented
    nature into precise project scheduling, meticulous documentation, and strategic client negotiations, and they leverage the same tactical thinking honed from chess to outmaneuver competition.
  sports: Minh Vue enjoys weekend pickup basketball at the community center, follows the local football team, the Dallas Cowboys, and the NBA’s Houston Rockets, hikes the nearby Hill Country State Natural
    Area during spring, and they maintain a disciplined home garage gym routine focused on strength training, although they tend to skip cardio sessions during peak work periods.
  arts: Minh Vue is an avid admirer of folk singer Joan Baez, a collector of contemporary woodcraft pieces by artists like Brian Wilson, a regular attendee of the regional theater’s Shakespeare productions,
    and a passionate reader of Haruki Murakami and Neil Gaiman, often drawing creative inspiration for both furniture designs and cooking presentations, and they view each artistic encounter as a puzzle
    to solve.
  travel: Minh Vue prefers practical, goal‑oriented travel, planning weekend road trips to national parks such as Big Bend for inspiration and scheduling annual trips to Japan’s craft villages to study
    traditional joinery while also dreaming of a culinary pilgrimage to the central coast of Southeast Asia to taste iconic rice‑paper crepes, yet family responsibilities often keep travels to short, budget‑conscious
    getaways, and they prioritize trips that double as research opportunities for their upcoming business.
  culinary: Minh Vue is a competent home chef who skillfully recreates bánh xèo with rice flour, turmeric, bean sprouts, and shrimp, and simmers phở broth using star anise, ginger, and beef bones, while
    regularly experimenting with fresh herbs like Thai basil and cilantro, though they occasionally over‑season in enthusiasm and rely on a trusty cast‑iron skillet for most dishes.
  core: Minh Vue blends a meticulous, competition‑driven mindset with hands‑on creativity, turning every home project, budget spreadsheet, and kitchen experiment into a strategic game while they occasionally
    let curiosity override caution.
background:
  cultural: Minh is a second‑generation Vietnamese American whose family immigrated to the United States after the Vietnam War. Growing up in a close‑knit immigrant household in Omaha, he was taught the
    importance of hard work, respect for elders, and preserving cultural traditions such as celebrating Tet, preparing home‑cooked meals, and participating in the local Vietnamese cultural association.
    His bilingual fluency allows him to navigate both the Vietnamese community and mainstream American society, and he values the balance between honoring his heritage and embracing opportunities in his
    adopted country.
