  career_goals: Minh aims to leverage his technical know‑how and organizational talent to launch a small, family‑run home‑services business, such as a handyman service that also offers custom furniture
    building. He plans to obtain a state contractor’s license within the next 12 months, develop a professional website, and secure a steady client base that will provide financial stability for his family.
    In the longer term, he hopes to expand the venture into a boutique renovation firm, mentor younger immigrants, and eventually open a weekend Vietnamese cooking class to share his cultural heritage.
