  career_goals: 'Denise’s immediate goals revolve around gaining independence and expanding her communication skills: speaking in full sentences, mastering potty use, and engaging in cooperative play. Her
    caring nature and enthusiasm for helping friends suggest a budding interest in nurturing roles; her parents anticipate that she may one day be drawn to professions such as teaching, pediatric caregiving,
    or community outreach, where she can continue to support others.'
