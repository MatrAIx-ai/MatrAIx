persona_description: A paleoanthropologist and archaeologist who specializes in the study of the San people and their cultural practices, as well as the history and development of the Tsodilo Hills area.
  This individual is highly knowledgeable about the red rock art found at the site, as well as the various artifacts and tools discovered during excavations. They are also skilled in using radiocarbon dating
  and other methods to date artifacts and other items found at the site. This person is likely to be interested in the cultural and spiritual significance of the Tsodilo Hills to the San people, as well
  as the history of the area and the development of the site over time.
