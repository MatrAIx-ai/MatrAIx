personas:
  professional: Lynette Dills, a retired community engagement specialist with decades of experience curating senior arts programs, uses their keen curiosity and methodical planning to orchestrate volunteer‑driven
    cultural events, lead an oral‑history project, and prepare to serve as a docent at the National Museum of African American History and Culture.
  sports: Lynette Dills, an avid member of the Capitol Hill senior walking club, enjoys daily strolls through the National Mall and follows the Washington Capitals, Nationals, and Commanders, while also
    playing competitive bridge with a local community group.
  arts: Lynette Dills, a passionate patron of the DC arts scene, regularly attends jazz concerts featuring the likes of Kamasi Washington, gallery openings showcasing Kehinde Wiley, and theater productions
    at the Arena Stage, while sketching park landscapes and painting watercolors in their spare moments.
  travel: Lynette Dills, a meticulous planner, favors curated group tours to historic sites such as Savannah’s River Street, New Orleans’ French Quarter, and the Freedom Trail in Boston, balancing a love
    for cultural immersion with a modest travel budget and occasional visits to family in the mid‑Atlantic.
  culinary: Lynette Dills, an intermediate home cook, delights in preparing fresh garden‑sourced dishes like herb‑roasted chicken, beet and goat cheese salad, and Southern‑style collard greens, while savoring
    a weekly indulgence of a slice of strawberry shortcake from a neighborhood bakery.
  core: Lynette Dills blends relentless curiosity with disciplined organization, filling their golden years with art, community service, and an ever‑growing garden, all while occasionally misplacing their
    reading glasses.
background:
  cultural: Raised in Washington, DC during the civil‑rights era, Lynette’s worldview reflects the city's rich Black cultural legacy. Her upbringing included church choirs, neighborhood block parties, and
    community festivals that celebrated African American art, music, and activism. A family emphasis on education, communal responsibility, and preserving heritage drives her dedication to intergenerational
    dialogue and cultural preservation. She identifies strongly with historic African American neighborhoods such as Shaw and Anacostia and draws inspiration from local icons like Duke Ellington and the
    city's civil‑rights history.
