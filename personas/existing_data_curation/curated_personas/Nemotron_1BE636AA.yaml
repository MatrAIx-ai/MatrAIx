  career_goals: Although retired, Lynette aims to deepen her involvement with Washington, DC's cultural institutions. She plans to become a volunteer docent at the National Museum of African American History
    and Culture, mentor younger volunteers in program development, and lead a community‑driven oral history project that captures the experiences of black Washingtonians from the 1960s onward. She also
    aspires to serve on the board of a local senior arts center to ensure inclusive programming for diverse seniors.
