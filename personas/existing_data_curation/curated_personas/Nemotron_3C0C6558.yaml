personas:
  professional: Laura Frederick, a kindergarten wonder who treats classroom activities like projects, meticulously colors within lines, sets ambitious goals for building the tallest block tower, and proudly
    presents their organized showcase to teachers, delighting in the applause they receive.
  sports: Laura Frederick, a pint-size athlete who dashes through preschool T-ball practices with the local Little League Cubs, proudly wears a miniature Boston Red Sox cap, and eagerly tracks their runs
    on a tidy scorecard of personal bests they cherish.
  arts: Laura Frederick, an avid little artist who spends afternoons with crayons replicating the bold swirls of Van Gogh's Starry Night on paper, sings along to Disney's Frozen soundtrack, and curates
    a beloved collection of Dr. Seuss books that they treasure.
  travel: Laura Frederick, an adventurous explorer who has already visited Disneyland in Anaheim, taken a family road trip to the Grand Canyon, and dreams of stepping foot on the sandy shores of Cancun,
    always packing their favorite stuffed giraffe for comfort.
  culinary: Laura Frederick, a budding gourmand who savors the cheesy goodness of mac and cheese, delights in peanut butter and jelly sandwiches, proudly assists in sprinkling cinnamon on apple slices,
    and occasionally refuses broccoli, insisting on a second serving of chicken nuggets they adore.
  core: Laura Frederick is a detail-obsessed four-year-old with boundless curiosity for art, a competitive drive that fuels every game, and an unshakable calm that lets them breeze through new challenges
    while keeping a tidy playroom.
background:
  cultural: Laura was born and raised in Flanders, a quiet suburban community in Morris County, New Jersey. Her family is of Anglo‑American heritage and identifies as white, with parents who value education,
    discipline, and artistic expression. She celebrates typical American holidays such as Thanksgiving, Halloween, and Christmas, and participates in community events like the annual Flanders Fall Festival
    and the county’s spring craft fair. The family frequently visits nearby cultural institutions – the Montclair Art Museum, the New Jersey State Museum, and local botanical gardens – fostering her early
    appreciation for art and nature. Her mother works as a freelance graphic designer, often involving Laura in small creative projects, while her father works in finance and encourages organized routines
    at home. Laura attends a public pre‑kindergarten that blends arts‑integration with early STEM activities, and she is exposed to a modest amount of Spanish through classroom lessons.
