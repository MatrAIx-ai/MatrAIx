  career_goals: Laura frequently talks about growing up to become a museum curator or an art teacher who designs perfectly organized learning spaces for young children. She imagines herself arranging exhibitions,
    planning art‑focused workshops, and setting high standards for creative achievement. Her competitive nature fuels a desire to win a first‑place ribbon at the county’s children’s art fair and later to
    lead a team of educators who inspire peers to excel in both art and early mathematics.
