personas:
  professional: A budding soccer enthusiast and comic creator, Mariano Dsouza blends quick reflexes on the park field with vivid imagination in sketching superhero desert creatures, showing a balance of
    curiosity and practicality in play; they thrive when teamwork meets solo storytelling.
  sports: A passionate youth soccer player, Mariano Dsouza joins the Desert Sun Soccer Club’s under‑8 team, idolizes the local MLS side Phoenix Rising FC and mimics the play style of Lionel Messi in the
    park, while also cheering for the Arizona Cardinals on rainy weekends; they cherish the camaraderie and the excitement of match day.
  arts: A comic‑strip illustrator and music lover, Mariano Dsouza spends afternoons drawing superhero lizards and desert owls while humming to mariachi tunes from Mariachi Los Camperos; they can name their
    favorite cartoonist as Stan Lee and favorite singer as José José, letting rhythm and line art fuel their creativity.
  travel: An adventurous explorer of desert trails, Mariano Dsouza dreams of camping in Saguaro National Park and taking a family trip to the Grand Canyon, while also hoping to visit the historic town of
    Tubac for its art festival; they prefer hands‑on discovery over guided tours, balancing curiosity with a flexible schedule.
  culinary: A junior kitchen helper, Mariano Dsouza loves assembling tacos with seasoned ground beef, fresh cilantro, diced tomatoes, and a dollop of guacamole made from ripe avocados, and they can always
    spot the perfect squeeze of lime on a taco, though they sometimes leave a mess of salsa on the counter.
  core: Mariano Dsouza is an energetic 7‑year‑old who merges a love for soccer, comic art, desert wildlife, and family cooking into a curious yet easy‑going outlook; they often bend rules with playful flexibility.
background:
  cultural: Mariano grows up in a Mexican‑heritage family that lives in Tucson, Arizona. His household is bilingual, speaking Spanish daily while he learns English at school, so he comfortably navigates
    both languages. Family life centers around Mexican traditions such as Día de los Muertos altars, Lotería games, and weekly meals featuring tacos, tamales, and pozole, which connect him to his cultural
    roots. The vibrant multicultural atmosphere of Tucson exposes him to a mix of cultures, but his Mexican background remains a core part of his identity, influencing the music he enjoys, the dances he
    participates in, and the holidays he celebrates. The desert landscape surrounding the city nurtures his curiosity about nature, blending his cultural heritage with a love for the local environment.
