  career_goals: Mariano dreams of becoming a firefighter because he admires how they protect and help people in the community. He also imagines working as a park ranger or desert scientist, exploring the
    desert environment he loves and sharing that knowledge with others. Occasionally, he says he wants to be a teacher like his favorite elementary teacher, so he can help kids learn to read and speak Spanish.
    All of his goals reflect his caring nature and desire to make a positive impact on others.
