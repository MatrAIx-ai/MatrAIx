  career_goals: At 52, Mohammad aims to transition from an individual contributor role to a strategic leadership position within the manufacturing sales arena. He seeks to become a senior sales manager
    or director, responsible for mentoring a small, high‑performing team and shaping the company’s market‑entry strategies for next‑generation technologies. He is also interested in earning a professional
    sales certification and possibly completing an executive MBA to complement his technical background. Ultimately, Mohammad wants to be recognized as an industry thought leader—publishing insights on
    technology adoption in manufacturing and speaking at niche trade events—while securing the financial stability needed after his recent separation.
