persona_description: A professional civil engineer and project manager with expertise in water infrastructure projects, particularly in the design and implementation of water transmission mains and restoration
  of water infrastructure affected by erosion and degradation. This persona has experience working with environmental consultants, government agencies, and contractors to develop and implement restoration
  designs that protect water infrastructure while minimizing impact on the environment and wetlands. They are skilled in the use of natural materials and techniques for armoring and habitat restoration,
  and are well-versed in the latest water infrastructure design standards and practices. This persona is dedicated to ensuring the long-term sustainability and integrity of water infrastructure systems,
  and is committed to minimizing the environmental impact of their work.
