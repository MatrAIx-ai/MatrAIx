persona_description: A historian who specializes in the study of the history of the Iroquois people and the relationships between the Iroquois and the French during the 17th century. Her research interests
  include the interactions between the Iroquois and the French, the role of women in Iroquois society, and the impact of colonialism on the Iroquois people. She is particularly interested in the life of
  Oionhaton, the daughter of Joseph Chihwatenha, who was a convert to Catholicism and a prominent figure in the relationship between the Iroquois and the French. She has conducted extensive research on
  the life of Oionhaton and has written extensively on the topic.
