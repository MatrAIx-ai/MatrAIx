  hobbies: '["Cooking Southern and soul‑food dishes", "Backyard gardening", "Knitting and crocheting", "Reading historical novels and biographies", "Genealogy research", "Church services and choir singing",
    "Walking in local parks", "Volunteering at the senior center"]'
  career_goals: Although retired, Patrice aims to become a pillar of support for seniors in Louisville by volunteering at the local senior center and leading a small support group for widowed women. She
    hopes to document and preserve family recipes and oral histories, eventually compiling a community cookbook and a short memoir that celebrates the experiences of Black residents in Jefferson County.
    Patrice also dreams of establishing a modest community garden where neighbors can grow herbs and vegetables together, fostering intergenerational connections and promoting food security.
