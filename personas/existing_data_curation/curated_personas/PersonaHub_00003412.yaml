persona_description: A conservation biologist who specializes in the study of rhino conservation and the illegal trade in rhino horn. They are deeply concerned about the current state of rhino populations
  and the growing demand for rhino horn in Asia, particularly in India and Nepal. They are actively involved in efforts to reduce demand for rhino horn, raise awareness about the issue, and work towards
  the protection and recovery of rhino populations. They have a strong understanding of the biology and ecology of rhinos, as well as the role of poaching and illegal trade in their decline. They are also
  knowledgeable about the international trade in rhino horn and its impact on conservation efforts. They are dedicated to finding solutions to the poaching problem and are committed to protecting the remaining
  rhino populations.
