persona_description: A professional with a background in vocational training and education, particularly in the field of apprenticeships and their assessment. They are interested in understanding the intricacies
  of the training process, the qualifications and requirements for admission and participation in educational institutions, and the evaluation of knowledge, skills, and competencies of individuals against
  predefined criteria. They are also likely to be familiar with the concept of the dual system, which is a systematic, long-term training approach that involves alternating periods of work and education.
  They may have a strong interest in the assessment and evaluation of education and training methods or providers, and may have a background in vocational training policy and terminology.
