  career_goals: Although retired, Katelyn aims to deepen her community involvement by coordinating a neighborhood garden, leading a volunteer program for Meals on Wheels, and documenting her family's genealogy
    for local historical archives. She also aspires to master digital photography to capture New England’s seasonal landscapes and to share her knowledge through workshops at the senior center.
