  hobbies: '[''Painting'', ''Attending Local Art Exhibitions'', ''Reading Educational Psychology'', ''Salsa Dancing'', ''Cooking Traditional Puerto Rican Cuisine'', ''Hiking in the Sierra de Arecibo'',
    ''Volunteering at Community Literacy Programs'', ''Photography'', ''Traveling to Caribbean Islands'']'
  career_goals: Lilia aspires to become the director of a regional early childhood education network in Puerto Rico, where she can shape policy and champion arts-integrated curricula. She plans to earn
    a Master’s degree in Education Administration to deepen her leadership expertise. Her long‑term ambition includes establishing a community learning hub in Hatillo that offers after‑school art, music,
    and STEM programs, fostering equitable access to quality education for all children in her municipality.
