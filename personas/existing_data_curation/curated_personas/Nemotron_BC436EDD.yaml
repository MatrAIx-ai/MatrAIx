personas:
  professional: Lilia Sannicolas, a bilingual early childhood program manager with a business background, blends meticulous budgeting, data‑driven curriculum design, and a passion for integrating the arts
    into learning spaces, and they lead collaborative teams toward high‑quality childcare outcomes.
  sports: Lilia Sannicolas stays active through weekly hikes on the Sierra de Arecibo trails, joins a local salsa‑dance fitness group, and cheers for the Cangrejeros de Santurce baseball team while occasionally
    playing recreational volleyball at the community center, and they view physical activity as a communal celebration of health.
  arts: Lilia Sannicolas finds inspiration in the vibrant canvases of Frida Kahlo and the rhythmic storytelling of Celia Cruz, regularly visits the Museo de Arte de Puerto Rico, captures candid moments
    with their DSLR, and they channel these artistic experiences into designing immersive, arts‑infused early‑learning environments.
  travel: Lilia Sannicolas prefers carefully planned weekend escapes to nearby Caribbean islands such as Vieques, St. Thomas, and Curaçao, balancing adventure snorkeling with cultural immersion, yet they
    often postpone longer overseas trips due to their master’s program commitments.
  culinary: Lilia Sannicolas, an avid home cook, skillfully prepares classic dishes like arroz con gandules, mofongo, and lechón asado using their own sofrito blend of garlic, cilantro, and recao, while
    they occasionally sprinkle in exotic spices after a trip to the Dominican Republic for a culinary twist.
  core: Lilia Sannicolas is a vibrant, organized, and art‑driven early‑education leader who balances meticulous program management with spontaneous bursts of creativity, salsa rhythm, and a perpetual curiosity
    about people and places, and they constantly seek harmony between structure and spontaneity.
background:
  cultural: Lilia was raised in Hatillo, a municipality renowned for its vibrant festivals, bomba and plena music, and strong family traditions. She is fluent in both Spanish and English, reflecting Puerto
    Rico’s bilingual culture. Growing up, she participated in the annual Fiesta de la Virgen del Carmen, where community cohesion and cultural pride were central. Her upbringing instilled a love for traditional
    Puerto Rican cuisine like lechón asado and arroz con gandules, as well as a respect for the island’s natural beauty. These cultural roots shape her commitment to culturally responsive education and
    her desire to celebrate Puerto Rican heritage within the classroom.
attributes:
  skills: '[''Program Management'', ''Curriculum Development'', ''Budget Planning'', ''Bilingual Communication (English/Spanish)'', ''Arts Integration in Early Childhood Education'', ''Data Analysis and
