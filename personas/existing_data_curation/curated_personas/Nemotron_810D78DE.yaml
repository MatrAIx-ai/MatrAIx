  hobbies: '[''Watercolor painting'', ''Calligraphy'', ''Collecting Mexican folk art'', ''Reading literature (Latin American & classic)'', ''Cooking traditional Mexican dishes'', ''Gardening (herbs and
    succulents)'', ''Yoga and meditation'', ''Attending small art gallery openings'', ''Volunteer work at local museum'', ''Mentoring youth in arts programs'', ''Listening to mariachi and folk music'',
    ''Small book club participation'']'
  career_goals: Rebeca aims to transition into a mentorship and advisory role where she can guide emerging compliance professionals, especially those from underrepresented backgrounds. She aspires to lead
    a cross‑functional initiative that ties ethical compliance to corporate social responsibility, incorporating art‑based programs that celebrate cultural diversity within her organization. As she approaches
    a gradual retirement, she plans to remain active on a part‑time basis, offering strategic counsel and conducting workshops for local non‑profits on regulatory best practices. Additionally, she hopes
    to author a memoir that weaves together her Mexican heritage, love of the arts, and lifelong career in compliance.
