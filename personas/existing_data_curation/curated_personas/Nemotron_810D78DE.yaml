personas:
  professional: Rebeca Navarro, a veteran compliance officer transitioning to part‑time mentorship, blends four decades of regulatory expertise in finance and healthcare with bilingual communication and
    a flair for art‑inspired problem‑solving, while managing their pronounced emotional reactivity through structured yet flexible work habits.
  sports: Rebeca Navarro enjoys low‑impact fitness activities such as morning walks in Hermann Park, occasional tai chi classes at a community center, and follows the Houston Astros, Rockets, and Texans
    from their patio, while avoiding high‑intensity sports because of joint stiffness.
  arts: Rebeca Navarro immerses themselves in Houston’s vibrant art scene, paints watercolors and practices calligraphy, curates a personal collection of Talavera tiles and alebrijes, and frequently visits
    galleries featuring the works of Frida Kahlo, Diego Rivera, and contemporary muralist Juan Cruz, while also reading books by modern authors and volunteering at the local museum.
  travel: Rebeca Navarro prefers thoughtfully planned cultural trips, often traveling with a small group to destinations such as Santa Fe’s historic art districts, Barcelona’s architecture, and the historic
    town of Guanajuato, balancing their love of heritage with a modest travel budget and occasional health‑related travel constraints.
  culinary: Rebeca Navarro delights in preparing traditional dishes like mole, tamales, and pozole, skillfully layering chilies, cacao, and fresh herbs from their succulent garden, while also experimenting
    with plating techniques inspired by their watercolor practice, though they sometimes over‑spice due to heightened sensory perception.
  core: Rebeca Navarro is a detail‑oriented yet creatively inclined former compliance officer who channels their lifelong love of art and disciplined work ethic into mentorship, mindful living, and occasional
    indulgence in richly spiced cooking, all while navigating their emotional intensity with yoga and meditation.
background:
  cultural: 'Rebeca was born in Guanajuato, Mexico, and moved to the United States in her early thirties. She grew up in a family‑oriented, Catholic environment where traditions such as Día de los Muertos,
    quinceañeras, and communal cooking were central. Her Mexican heritage remains a core part of her identity: she speaks Spanish fluently, celebrates Mexican holidays, and maintains strong ties to the
    vibrant Mexican community in Houston. She blends the values of respect, solidarity, and hospitality from her cultural upbringing with the multicultural tapestry of Harris County, using her background
    to foster inclusive workplaces and community initiatives.'
