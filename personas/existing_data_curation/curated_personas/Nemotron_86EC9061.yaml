personas:
  professional: Justin Filer is a budding digital artist and teen game developer who merges his methodical coding skills with a love for sci‑fi storytelling, creating indie‑style interactive demos for school
    showcases while maintaining a disciplined schedule.
  sports: Justin Filer enjoys weekend hiking on the OC coastal trails and follows the Anaheim Ducks and LA Lakers, occasionally joining a local pick‑up basketball game where his competitive streak shines
    despite a preference for solitary activities.
  arts: Justin Filer immerses himself in the indie music scene, collecting vinyl from Tame Impala, Arctic Monkeys, and Mitski, while frequenting the Orange County Museum of Art and sketching urban architecture
    during visits to Laguna Beach galleries.
  travel: Justin Filer plans meticulous day trips to Joshua Tree and San Diego, craving the blend of desert solitude and coastal vibes, yet dreams of a future exchange program in Japan to explore Tokyo’s
    anime districts and Shinjuku’s neon art installations.
  culinary: Justin Filer loves crafting avocado toast with feta and poached eggs, devouring ramen bowls at a local Japanese eatery, and experimenting with simple pesto pasta while often snacking on spicy
    nachos during coding marathons.
  core: Justin Filer is a curious, methodical teen who balances a competitive edge with a penchant for solitary creativity, juggling art, code, and cautious finances while wrestling with frequent bouts
    of anxiety.
background:
  cultural: He grew up in Cypress, a suburban community in Orange County, California, within a predominantly white, middle‑class family. The region’s blend of coastal, suburban, and multicultural influences
    exposed him to diverse artistic and technological experiences—from local art festivals and the nearby Laguna Beach art scene to the tech‑centric culture of Southern California. His household emphasizes
    self‑reliance, education, and practical organization, while his peers and community events foster an appreciation for contemporary art, independent music, and innovative digital media.
