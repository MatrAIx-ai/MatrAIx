personas:
  professional: Thomas Starks is a retired community elder who leverages his storytelling, art curation, and mentorship skills to organize intergenerational cultural workshops and a monthly storytelling
    circle, approaching every project with calm empathy and an open, unconventional curiosity.
  sports: Thomas Starks enjoys leisurely walks with the Hampton Bay Walking Club along the shoreline, cheers for the Norfolk Tides, and participates in a weekly senior‑center pickleball group, favoring
    low‑impact activity over competitive sports.
  arts: Thomas Starks frequents the local art gallery showcasing watercolor works by Claire Whitaker, plays the harmonica at jazz nights featuring Miles Davis tributes, and delights in gospel choir rehearsals
    echoing the soulful sounds of Nina Simone, allowing music and visual art to shape his reflective evenings.
  travel: Thomas Starks prefers spontaneous road trips to historic coastal towns like Charleston, Savannah, and New Orleans, mixing relaxed beachcombing with visits to local museums, and dreams of a future
    summer in Nova Scotia’s lobster shacks, all while staying within a modest travel budget.
  culinary: Thomas Starks crafts soulful dishes such as herb‑roasted snapper with collard greens, black‑eyed pea stew, and cornbread seasoned with fresh thyme from his heirloom garden, demonstrating a seasoned
    home‑cooking skill set that blends Southern comfort flavors with locally foraged herbs like rosemary and sage.
  core: Thomas Starks is a calm, curious storyteller who blends art, music, gardening, and community mentorship into a laid‑back yet purpose‑driven senior life, occasionally forgetting to pay a bill but
    always remembering a good song.
background:
  cultural: Thomas is a lifelong resident of Hampton, Virginia, and part of a multi‑generational African‑American family whose roots trace back to the Great Migration and the historic Black community of
    the Chesapeake region. He grew up attending a close‑knit Baptist church, where music, fellowship, and activism were integral. The local legacy of Emancipation and the Civil Rights Movement, coupled
    with family stories of sharecropping, WWII service, and post‑war industrial work, have shaped his identity. Thomas honors Southern culinary traditions, oral storytelling customs, and the vibrant artistic
    expressions that have defined Black culture in the Hampton Roads area, often weaving these influences into his community engagements and personal pursuits.
attributes:
  skills: '["Storytelling & oral history", "Youth mentorship & informal tutoring", "Soul food cooking", "Basic carpentry & handyman work", "Gardening & horticulture", "Community mediation & conflict resolution",
