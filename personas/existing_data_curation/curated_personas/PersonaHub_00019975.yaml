persona_description: A scholar and researcher interested in African-American history, art, and civil rights, who is passionate about digitizing and making accessible rare and important photographs documenting
  African-American life and struggles. This person is knowledgeable about the Loewentheil Collection of African-American Photographs, which contains a trove of vital information about African-American life,
  and is excited about the digitization of this collection to make it freely accessible to students and scholars around the world. This person is also interested in the broader effort to document the lives
  of Americans in the 19th and 20th centuries, particularly those from underrepresented communities, and is excited about the digitization of the Loewentheil Collection to support teaching and research
  on campus and around the world.
