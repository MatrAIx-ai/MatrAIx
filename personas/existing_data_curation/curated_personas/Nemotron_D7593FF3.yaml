  career_goals: Victor aims to lead the creation of an interdisciplinary entrepreneurship and sustainability program at his institution, positioning himself as a catalyst for experiential business education.
    He plans to publish research on collaborative learning models and secure tenure, eventually moving into a department chair role that allows him to influence curriculum strategy regionally. Additionally,
    he wants to expand partnerships with local startups and incubators, mentoring student ventures and establishing a community‑driven business incubator in Brooklyn.
