  career_goals: George aims to ascend to senior leadership within the next five years, targeting roles such as Director of Operations or Vice President of Business Development. He intends to deepen his
    expertise in scaling complex operations, driving revenue growth, and cultivating high‑performing teams. To support these ambitions, he plans to obtain a Project Management Professional (PMP) certification
    and enroll in a part‑time MBA program focused on strategic management. George also seeks to foster a workplace culture that balances high performance with well‑being, implementing stress‑reduction initiatives
    for himself and his staff while maintaining accountability and clear expectations.
