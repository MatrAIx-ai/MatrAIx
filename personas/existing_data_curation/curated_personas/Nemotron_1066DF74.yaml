  hobbies: '["Gardening (raised‑bed herbs and plantains)","Reading historical biographies and memoirs","Creating family photo scrapbooks","Listening to salsa and plena music","Preparing traditional Puerto
    Rican dishes","Playing card games and jigsaw puzzles with friends","Walking along the Naugatuck River","Organizing cultural evenings at the senior center"]'
  career_goals: Though officially retired, Javed's ambitions focus on leaving a lasting legacy for his family and community. He aims to compile a memoir of his family's migration story and culinary traditions,
    ensuring his grandchildren and great‑grandchildren have a written record of their heritage. He also wishes to maintain his health through daily walks and light woodworking, so he can continue supporting
    his spouse and help organize weekly cultural evenings at the senior center, where he can share recipes and stories. A modest but persistent goal is to reduce his lingering anxiety by establishing a
    predictable daily routine that balances structured meals, medication, and flexible creative time.
