personas:
  professional: An elder handyman and community mentor, Javed Garcia combines decades of mechanical troubleshooting, bilingual communication, and a love for traditional cooking into orchestrating cultural
    evenings at the senior center, where their structured event planning is softened by a flexible, story‑telling approach that balances practicality with occasional disorganization.
  sports: Javed Garcia enjoys leisurely walks along the Naugatuck River, participates in the senior center’s shuffleboard league, and faithfully follows the New England Patriots, Boston Red Sox, and Connecticut
    Huskies, blending low‑impact activity with seasonal fandom that provides both structure and social connection; they cherish the routine and the occasional friendly rivalry.
  arts: Javed Garcia spends evenings listening to the vibrant sounds of Celia Cruz, Willie Colón, and Héctor Lavoe while preparing family recipes, and participates in local senior center performances that
    showcase classic film clips of Rita Moreno, reflecting a deep appreciation for music and storytelling that shapes their cultural identity.
  travel: Javed Garcia has revisited the island of their parents’ origin to celebrate festive traditions, taken road trips to historic New England towns like Mystic and Boston, and dreams of a quiet pilgrimage
    to Granada’s Alhambra—travel plans that balance familiar, predictable routes with a yearning for meaningful cultural immersion, and they often map each journey meticulously before setting out.
  culinary: Javed Garcia passionately cooks arroz con gandules, pernil, and plantain‑based mofongo using fresh cilantro, oregano, and home‑grown plantains from their raised‑bed garden, though they sometimes
    over‑salt dishes in their enthusiasm to preserve authentic flavors during community feasts.
  core: Javed Garcia is a disciplined yet occasionally disorganized elder who weaves tradition, gardening, and storytelling into daily routines, managing health worries and modest finances while nurturing
    community bonds through food and culture.
background:
  cultural: Javed was born to Puerto Rican parents who moved to the mainland United States in the 1940s. He grew up bilingual, celebrating island holidays such as Three Kings Day and Fiesta de San Juan
    while also embracing New England traditions. The strong emphasis on family, respect for elders, and communal meals shaped his worldview, and he has carried those values into his life in Naugatuck, Connecticut.
    His Catholic upbringing contributed to his participation in local parish events, where he often volunteers to prepare traditional dishes for holiday feasts. The melding of his island heritage with the
    modest, close‑knit community of New Haven County gives him a unique perspective that he shares through storytelling, cooking, and mentorship.
attributes:
  skills: '["Traditional Puerto Rican Cooking","Basic Home Repair and Maintenance","Gardening and Plant Care","Bilingual Communication (Spanish/English)","Storytelling and Oral History Preservation","Event
