personas:
  professional: Martha Cleveland, a veteran maintenance technician turned aspiring marina supervisor, leverages two decades of mechanical, electrical, plumbing and carpentry expertise to devise inventive
    on‑the‑spot fixes, mentors apprentices with a competitive eye, and thrives in autonomous projects while occasionally balking at overly rigid schedules.
  sports: Martha Cleveland competes in the Coastal Breeze Bowling League’s 'Anchor' team, roots for the Carolina Hurricanes during hockey season, follows the Charlotte Hornets on basketball nights, and
    joins the Outer Banks Recreational Fishing Club for early‑morning crabbing outings that satisfy her competitive streak.
  arts: Martha Cleveland finds artistic solace in Ansel Adams’ black‑and‑white seascapes, the mystery novels of Agatha Christie, the science‑fiction epics of Isaac Asimov, and the jazz crooning of Billie
    Holiday, often listening to Holiday while restoring vintage tools in her workshop.
  travel: Martha Cleveland prefers low‑key, self‑planned getaways that blend scenic photography with quiet solitude, having captured sunrise over the Outer Banks and dreaming of a road‑trip along the Maine
    coastline, a dive expedition to the Great Barrier Reef, and a weekend retreat at the historic Biltmore Estate.
  culinary: Martha Cleveland favors fresh crab, shrimp and oyster dishes, often making Maryland‑style crab cakes with Old Bay, garlic butter and a dash of lemon, while also grilling shrimp tacos with cilantro‑lime
    slaw and occasionally baking apple crumble with cinnamon and nutmeg.
  core: Martha Cleveland is a fiercely curious, solitary handyman who turns every repair into a friendly competition with herself, hoards vintage tools like trophies, and can’t start her day without a strong
    cup of coffee and a mystery novel, even if that means occasionally misplacing a work order.
background:
  cultural: Martha was raised in the coastal communities of Carteret County, North Carolina, where a blend of Southern hospitality and self‑reliance shaped her outlook. Growing up in a working‑class white
    family with deep ties to the local fishing and maritime trades, she learned early the value of practical skills and independence. She participates in local traditions such as the annual Seafood Festival
    and maintains a modest connection to her Methodist church, though she identifies more with personal responsibility than formal religiosity. Her upbringing in a small‑town environment fostered a preference
    for close‑knit groups, a skeptical eye toward outside motives, and an appreciation for the rhythm of the sea and the seasonal cycles of the coastal landscape.
attributes:
  skills: '[''mechanical troubleshooting'', ''electrical wiring and repair'', ''plumbing maintenance'', ''HVAC system servicing'', ''carpentry and woodwork'', ''preventive maintenance scheduling'', ''safety
    compliance'', ''vendor management'', ''improvisational problem‑solving'', ''equipment diagnostics'']'
  hobbies: '[''fishing'', ''crab catching'', ''hand‑tool restoration'', ''woodworking projects'', ''reading mystery and sci‑fi novels'', ''bowling league'', ''coastal photography'', ''short hikes on beach
    trails'']'
  career_goals: Martha aims to leverage her years of hands‑on experience to move into a supervisory maintenance role at a marina or coastal industrial facility, where she can mentor younger technicians
    while retaining the autonomy she values. She plans to obtain a certified journeyman license in electrical work and an EPA‑approved HVAC certification within the next two years. Long‑term, she envisions
    opening a boutique handyman service that specializes in quick, reliable repairs for boat owners and small businesses, positioning herself as the go‑to professional known for practical ingenuity and
    competitive reliability.
