personas:
  professional: A seasoned retail specialist, Andrea Guerra leverages over 20 years of front‑line experience and a Bachelor’s in Arts and Humanities to blend storytelling, bilingual communication and visual‑merchandising
    expertise into high‑impact store displays that celebrate folk motifs while driving sales, all while mentoring staff with a competitive yet organized edge.
  sports: Andrea Guerra enjoys low‑impact fitness, practicing gentle yoga and walking with a local Avondale photography club, while rooting for the Phoenix Suns and following the Arizona Cardinals game
    highlights on TV, and occasionally joins a community paddle‑tennis league that offers a modest competitive outlet.
  arts: Andrea Guerra immerses herself in mixed‑media painting, drawing inspiration from installation artists like Yayoi Kusama and Banksy, attends monthly poetry readings featuring García Márquez‑style
    magical realism, and frequents galleries showcasing emerging Latin American and contemporary American artists, all of which inform her curatorial vision for future boutique‑gallery spaces.
  travel: Andrea Guerra prefers curated cultural getaways, having explored Oaxaca’s artisan markets and Barcelona’s Gothic Quarter on small‑group tours, while dreaming of a future trip to Kyoto’s traditional
    tea houses; her travel planning balances limited vacation days with a modest budget, often opting for off‑season visits to avoid crowds.
  culinary: Andrea Guerra delights in cooking family recipes such as mole poblano, tlayudas, and chipotle‑infused carnitas, skillfully balancing home‑cooked flavors with a penchant for adding extra chilies
    that sometimes leads to lingering heat, and she enjoys sourcing fresh masa and local chilies at weekend farmers markets while occasionally indulging in upscale Mexican‑fusion tasting menus.
  core: Andrea Guerra fuses a meticulous retail mindset with a vibrant artistic soul, balancing skeptical precision and competitive drive against a propensity for stress‑induced worry and late‑night coffee‑fuelled
    journaling.
background:
  cultural: Andrea is a first‑generation Mexican‑American raised in the vibrant Latino community of the Phoenix metropolitan area. Bilingual and bicultural, she grew up celebrating Día de los Muertos, Semana
    Santa, and local fiestas that blend Mexican traditions with Southwestern influences. Her family places strong emphasis on hospitality, respect for elders, and collective resilience, values that shape
    her interpersonal style. She maintains close ties with extended family in Arizona and Mexico, often sharing recipes, stories, and folk‑art techniques across generations. This background informs her
    love for Mexican folk art, the importance she places on community‑based cultural events, and her desire to integrate those traditions into her professional life.
