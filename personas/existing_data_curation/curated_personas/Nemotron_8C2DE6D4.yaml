  hobbies: '[''Painting (mixed media)'', ''Visiting art galleries'', ''Reading magical realism literature'', ''Cooking Mexican cuisine'', ''Practicing yoga'', ''Journaling'', ''Photography'', ''Participating
    in small cultural workshops'']'
  career_goals: Andrea aims to move into a store‑manager role within the next two years, using that platform to pilot a “culture‑corner” that showcases Mexican‑American crafts and limited‑edition art pieces.
    Long‑term, she envisions launching her own boutique that fuses retail with a curated gallery space, offering workshops that teach traditional techniques such as papel picado and textile embroidery.
    She also plans to complete a certificate in museum studies to deepen her curatorial skills, positioning herself as a bridge between commercial retail and community‑focused cultural programming.
