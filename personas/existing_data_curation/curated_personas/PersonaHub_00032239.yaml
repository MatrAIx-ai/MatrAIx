persona_description: A gardener who is passionate about attracting beneficial insects to their garden and promoting the health of native bees and other pollinators. They are knowledgeable about the importance
  of pollinators in the food industry and have implemented an integrated pest management practice in their garden. They are also skilled in selecting plants suited to their climate and using proper plant
  cultivation to maintain the health of the garden. Additionally, they are dedicated to using an array of flowering plants both for bees and butterflies and planting many native flowers to keep the native
  insects happy. They leave some ground not mulched for ground nesting bees and enjoy leaving parsley to bloom for beneficials.
