personas:
  professional: Johana Agudelo, a 45‑year‑old textile engineer turned sustainable fashion designer, merges a data‑driven approach to trend forecasting and expert use of CLO 3D and Adobe Illustrator with
    an impulsive love for last‑minute fabric experiments, leading collaborative design teams that balance her practical workflow focus with frequent bursts of energetic creativity.
  sports: Johana Agudelo fuels her fitness with salsa and bachata nights, weekend hikes in the Sierra foothills with the local Sierra Trail Club, cheers on the Los Angeles Dodgers in spring and the Golden
    State Warriors in winter, and occasionally joins a recreational co‑ed volleyball league at the community center.
  arts: Johana Agudelo channels her creative energy by dancing to the rhythms of Celia Cruz and Marc Anthony, upcycling vintage garments while listening to the avant‑garde scores of Björk, devouring the
    sci‑fi worlds of N.K. Jemisin and Margaret Atwood, and drawing inspiration from the visual storytelling of Frida Kahlo and the theatrical performances of Lin‑Manuel Miranda.
  travel: 'Johana Agudelo plans her trips around sourcing trips and inspiration: she recently trekked the Andes in Peru for textile research, spent a leisurely weekend in Santa Barbara’s boutique districts,
    dreams of attending Paris Fashion Week, and prefers spontaneous road‑trip detours to hidden roadside farms, yet balances these adventures with the budget constraints of her startup.'
  culinary: Johana Agudelo showcases her cooking prowess by preparing beloved family stews seasoned with roasted chilies and corn masa, perfecting handmade empanadas for festive gatherings, and experimenting
    with plant‑based twists on traditional dishes while maintaining a modest pantry of fresh herbs, organic beans, and heirloom tomatoes.
  core: Johana Agudelo is a structured yet spur‑of‑the‑moment sustainable designer who balances data‑driven precision with nightly salsa spins, occasionally misses deadlines while indulging in vintage‑clothing
    binges and midnight popcorn reads of sci‑fi epics.
background:
  cultural: Born in Guatemala and now based in Visalia, California, Johana maintains deep ties to her Mayan‑influenced heritage, speaking Spanish fluently and celebrating Guatemalan festivals such as Semana
    Santa and Día de los Muertos. Her designs often incorporate traditional weaving patterns and colors, reflecting a blend of family‑rooted artisan techniques with contemporary sustainable fashion.
attributes:
  skills: '[''Pattern Drafting'', ''CAD (CLO 3D)'', ''Textile Engineering'', ''Sustainable Materials Knowledge'', ''Garment Construction'', ''Trend Forecasting'', ''Project Management'', ''Client Relationship
    Management'', ''Team Leadership'', ''Data Analysis for Sales'', ''Wearable Technology Integration'']'
  hobbies: '[''Salsa dancing'', ''Traditional Guatemalan cooking'', ''Hiking'', ''Volunteer sewing workshops'', ''Attending cultural festivals'', ''Reading science fiction'', ''Yoga'', ''Community networking
    events'', ''DIY upcycling projects'']'
  career_goals: Johana aims to launch a premium sustainable line that weaves traditional Guatemalan motifs into tech‑enhanced fabrics, securing placement in boutique stores across California and a strong
    e‑commerce presence. She aspires to showcase her collection at major fashion weeks, partner with local artisans to create job opportunities, and eventually mentor emerging immigrant designers through
    a community studio.
