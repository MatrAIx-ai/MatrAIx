  hobbies: '["Visiting art museums and galleries", "Reading art history and philosophy books", "Crossword and Sudoku puzzles", "Jigsaw puzzles (large scale)", "Digital photography of nature and local landmarks",
    "Volunteering as a museum docent", "Participating in a senior book club", "Assisting community theater productions", "Gardening native perennials", "Listening to podcasts on science and critical thinking",
    "Competitive chess", "Traveling to cultural landmarks"]'
  career_goals: Ashley aims to deepen her expertise in museum studies through an online certificate program and plans to publish a memoir that weaves her personal story with the artistic history of Hornell.
    She aspires to curate an intergenerational traveling exhibition featuring work from local seniors and high‑school students, especially those exploring unconventional media. Mentoring younger volunteers
    to foster critical inquiry and independent thinking is a priority. She also intends to win the regional senior chess tournament, complete a 1,000‑piece jigsaw puzzle series, and visit at least three
    major art museums on the East Coast within the next five years. Finally, she hopes to establish a modest scholarship for a local high‑school senior pursuing an art education.
