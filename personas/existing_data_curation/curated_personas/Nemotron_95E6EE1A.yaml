  hobbies: '[''Watercolor painting'', ''Museum and gallery visits'', ''Live theater'', ''Book club'', ''Yoga'', ''Gardening'', ''Bird‑watching'', ''Volunteer work at community garden'']'
  career_goals: Although retired, Linda aims to leave a lasting legacy in Plainwell by establishing an annual community art fair and a scholarship for local high‑school students interested in the arts.
    She aspires to serve on the board of the Plainwell Historical Society, spearhead a senior‑focused digital literacy program, and author a memoir that captures the town’s mid‑century history. Continuing
    to learn, she plans to enroll in online courses on contemporary art theory and museum studies, and to travel to at least three major art museums in the next five years.
