personas:
  professional: Retail supervisor Jasmine Williams leverages their compassionate, cooperative style and sharp retail analytics to coach sales associates, resolve floor conflicts amicably, and keep visual
    merchandising on point while balancing practical organization with the flexibility demanded by a fast-moving Charlotte store.
  sports: Jasmine Williams stays active by joining a weekend yoga class at a local studio, cheering on the Charlotte Hornets and Carolina Panthers, and they also play pick-up basketball with a community
    league at Independence Park, balancing structured fitness with relaxed social sport.
  arts: Jasmine Williams immerses themselves in Charlotte’s arts scene, attending live performances by Anderson .Paak and H.E.R., collecting vintage photography prints, and re-watching classic films by
    Spike Lee and Greta Gerwig during quiet evenings, letting music and visual storytelling shape their creative mood.
  travel: Jasmine Williams favours spontaneous weekend getaways to Asheville’s Blue Ridge Mountains for hiking, occasional long-haul trips to Lisbon to taste fresh pastries, and they meticulously plan their
    annual tropical vacation to Costa Rica during the off-season to stretch their travel budget while still fulfilling a love for cultural immersion.
  culinary: Jasmine Williams enjoys experimenting with flavors, whipping up Korean-inspired kimchi fried rice with gochujang, perfecting Southern-style shrimp and grits during brunch, and they savor a perfectly
    seared ahi tuna poke bowl topped with sesame seeds and avocado, reflecting their moderate cooking skill and penchant for bold, comfort-fusion dishes.
  core: Jasmine Williams blends compassionate leadership with restless curiosity, juggling meticulous budgeting and occasional impulsive splurges, yoga-fueled resilience, and a habit of late-night journaling
    that sometimes delays sleep; they also tend to stay up scrolling through design inspiration, which cuts into early mornings.
background:
  cultural: Jasmine is an African‑American woman raised in Charlotte’s historically Black neighborhoods, where church, family gatherings, and community solidarity shaped her values. She grew up immersed
    in Southern Black culture, from listening to gospel and hip‑hop to celebrating traditions like Juneteenth and soul‑food cookouts. This cultural foundation reinforces her strong sense of compassion,
    cooperation, and desire to uplift others. She maintains close ties to her extended family and participates in local Black cultural events, which influence both her personal identity and her inclusive
    approach to leadership at work.
