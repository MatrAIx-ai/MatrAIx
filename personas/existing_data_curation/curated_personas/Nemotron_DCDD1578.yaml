  hobbies: '[''Community Mentorship'', ''Yoga & Mindfulness'', ''Live Music & Concerts'', ''Cooking Soul Food'', ''Reading Leadership & Black History Books'', ''Journaling'', ''Photography'', ''Attending
    Local Art Exhibits'']'
  career_goals: Jasmine aims to advance to store manager within the next two years and eventually become a district manager overseeing multiple locations in the Carolinas. She plans to earn her GED and
    pursue an associate degree in business administration to strengthen her strategic skill set. Her long‑term ambition is to develop an inclusive leadership model that improves employee satisfaction and
    sales performance, and she hopes to mentor young professionals from her community, especially those from underrepresented backgrounds, to help them enter the retail industry.
