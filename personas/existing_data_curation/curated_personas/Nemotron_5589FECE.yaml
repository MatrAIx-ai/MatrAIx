  hobbies: '[''Art Gallery Visits'', ''Sketching and Watercolor Painting'', ''Travel Photography'', ''Cooking Fusion Cuisine'', ''Running'', ''Yoga'', ''Community Theater Workshops'', ''Reading Non‑fiction
    (Cultural Theory)'', ''Chess'', ''Puzzle Solving'']'
  career_goals: Kourtney aims to advance into a senior leadership role within airline operations, such as Cabin Services Manager or Training Instructor. She plans to design a mentorship program for new
    flight attendants that integrates cultural competency and artistic enrichment, reflecting her competitive drive for excellence. In the longer term, she envisions launching a boutique travel‑consultancy
    focused on curated cultural immersion trips for Black travelers, blending her industry expertise, love for art, and curiosity about new experiences.
