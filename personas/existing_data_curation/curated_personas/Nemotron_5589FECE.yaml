personas:
  professional: An airline cabin service veteran with fifteen years of flight attendant experience, Kourtney Darville leverages meticulous organization, basic Spanish proficiency, and a competitive drive
    to elevate safety briefings, craft curated cabin atmospheres, and mentor crews, positioning themselves as a future Cabin Services Manager.
  sports: Kourtney Darville follows the Seattle Seahawks and the Portland Trail Blazers, runs five times a week with the Riverside Running Club, practices sunrise yoga at the city park, and joins a seasonal
    adult softball league each summer to stay active.
  arts: Kourtney Darville frequents the contemporary Modern Museum, sketches city skylines inspired by Edward Hopper after evening gallery tours, curates cabin playlists featuring Nico, FKA twigs, and Miles
    Davis, and participates in community theatre workshops that reimagine Shakespeare through immersive multimedia storytelling.
  travel: Kourtney Darville prefers meticulously planned layovers that become mini‑adventures, having captured sunrise over the Taj Mahal, street food scenes in Oaxaca, and a midnight photo shoot at the
    Sydney Opera House, while dreaming of launching a boutique consultancy offering curated cultural immersion itineraries for discerning travelers.
  culinary: Kourtney Darville enjoys crafting fusion dishes such as kimchi‑infused tacos, miso‑marinated salmon with ratatouille, and a signature paella featuring chorizo, saffron, and fresh shucked oysters,
    regularly sourcing ingredients like za'atar, gochujang, and persimmon at the local farmers’ market.
  core: Kourtney Darville is a methodical yet adventurous airline veteran whose love for art, puzzles, and cultural immersion fuels a fiercely competitive drive to curate experiences that delight both the
    skies and the soul.
background:
  cultural: Kourtney grew up in a close‑knit African‑American family in the Atlanta metropolitan area. Her upbringing was steeped in Southern Black traditions, from Sunday gospel services and church choirs
    to family gatherings featuring soul‑food classics. She credits her community’s emphasis on resilience, storytelling, and celebration of creativity for shaping her worldview. As a flight attendant, she
    leverages this foundation to connect with passengers of diverse backgrounds, often sharing elements of her heritage—such as music playlists featuring classic R&B and contemporary Black artists—to foster
    inclusive and welcoming cabin experiences.
attributes:
  skills: '[''Customer Service'', ''Safety & Emergency Procedures'', ''Crew Scheduling & Coordination'', ''Conflict Resolution'', ''First Aid & Medical Response'', ''Multilingual Communication (English,
