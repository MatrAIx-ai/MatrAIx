  career_goals: Christian hopes to turn his passion for art and technology into a career as a video‑game concept artist or interactive media designer. He also dreams of using his compassion to develop community‑based
    art programs that support at‑risk youth, so he plans to explore social‑service or community‑outreach pathways in high school and eventually pursue related studies in college.
