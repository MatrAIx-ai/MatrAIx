  hobbies: '[''Visiting art galleries and museums'', ''Landscape painting'', ''Nature photography'', ''Reading contemporary literature and philosophy'', ''Hiking in the Finger Lakes region'', ''Cooking
    gourmet meals'', ''Wine tasting with close friends'', ''Volunteer work at local theater and arts nonprofit'']'
  career_goals: Driven by a competitive spirit, Jannice aims to ascend to a senior executive role—such as Director of Operations or Vice President—within the next five years, where she can shape enterprise‑wide
    strategy and champion innovation. She is particularly interested in integrating creative thinking and cultural programming into core business processes, positioning her organization as a leader in socially
    responsible growth. Additionally, she plans to earn a PMP certification and develop a mentorship network for emerging women leaders in her region. Long‑term, she envisions launching her own consultancy
    that helps midsize firms harness artistic methodologies for competitive advantage, while continuing to contribute to local arts nonprofits.
