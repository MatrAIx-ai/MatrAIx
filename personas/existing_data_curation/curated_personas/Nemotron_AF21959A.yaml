personas:
  professional: An operations strategist with a flair for the arts, Jannice Howard leverages data‑driven decision‑making and design thinking to steer multi‑departmental projects, negotiate high‑value sponsorships,
    and embed cultural programming into corporate strategy, all while they eye a senior executive role within the next five years.
  sports: A nature‑oriented fitness enthusiast, Jannice Howard hikes the Cayuga Lake shoreline with the Finger Lakes Trail Club, joins a weekend cycling group that rides the Erie Canal towpath, follows
    the New York Knicks and Buffalo Bills for basketball and football, and they splurge on cross‑country ski trips each winter to stay active.
  arts: A devoted cultural participant, Jannice Howard sketches their impressions at the Finger Lakes Museum of Art, draws inspiration from Ansel Adams’ black‑and‑white landscapes, paints in the style of
    Georgia O'Keeffe, curates quarterly art‑themed wine‑tasting evenings featuring works by Kehinde Wiley, and they subscribe to Artforum to stay current on contemporary trends.
  travel: An intentional traveler, Jannice Howard prefers meticulously planned itineraries that blend vineyard tours in Napa and Chianti with art‑focused city walks in Kyoto, they often book boutique B&Bs
    near galleries, have already trekked Iceland’s Golden Circle, and they balance their love of adventure with a realistic budget that reserves weekends for nearby Finger Lakes escapes.
  culinary: A gourmet host, Jannice Howard crafts elaborate meals such as wild‑mushroom risotto with truffle oil, coq au vin with rosemary‑infused broth, and a seasonal roasted root‑vegetable medley, pairing
    each course with curated boutique wines, and they enjoy experimenting with locally sourced heirloom tomatoes from their garden.
  core: Jannice Howard is a 41‑year‑old strategic manager who balances data‑driven precision with an artistic soul, they often sketch in the margins of spreadsheets, indulge in curated wine‑tasting soirées,
    and occasionally procrastinate on budget reports while obsessively tending their garden.
background:
  cultural: Jannice grew up in the rural‑suburban setting of Cayuga County, a region characterized by a blend of agricultural heritage and small‑town community values. Her family’s roots trace back to Irish
    and German immigrants who settled in upstate New York in the early 20th century, instilling a work ethic, self‑reliance, and an appreciation for seasonal traditions like the county fair and apple harvest
    festivals. As a white, middle‑class American, she has been shaped by the regional emphasis on education, civic involvement, and a close connection to the natural landscape surrounding the Finger Lakes.
    These cultural influences have fostered her respect for local arts institutions, community solidarity, and a balance between individual ambition and collective responsibility.
