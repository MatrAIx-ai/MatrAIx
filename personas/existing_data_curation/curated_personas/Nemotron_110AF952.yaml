  hobbies: '[''Reading classic literature'', ''Regional history research'', ''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Birdwatching'', ''Hiking'', ''Attending art exhibitions'',
    ''Listening to folk music'', ''Volunteering at historical society'', ''Cooking Southern cuisine'']'
  career_goals: Melissa aims to mentor younger volunteers, contribute to the preservation of Asheville’s local history, publish a memoir or collection of essays, establish a modest scholarship for local
    arts students, organize an annual community cultural event, and complete a comprehensive family genealogy.
