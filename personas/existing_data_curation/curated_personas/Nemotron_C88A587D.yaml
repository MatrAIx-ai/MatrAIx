personas:
  professional: Jenny Poling is a full‑stack web engineer who blends JavaScript (React, Vue) and Python expertise with a human‑centered UX focus, and they apply meticulous Agile planning, data‑driven decision‑making,
    and thorough code reviews to deliver reliable products while balancing a curiosity for emerging technologies with a practical, methodical work style.
  sports: Jenny Poling hits the trails with the Ocala Trail Runners, paddles with the St. Augustine Kayak Club, attends weekly Vinyasa sessions at Sunrise Yoga Studio, and they keep an eye on the Miami
    Heat and Tampa Bay Rays for a dose of competition, balancing structured workouts with spontaneous outdoor adventures.
  arts: Jenny Poling captures urban geometry through a camera lens inspired by Edward Burtynsky and Henri Cartier‑Bresson, curates personal photo series of historic downtown architecture, unwinds listening
    to folk singer Feist and indie rock band The National, and they regularly devour historical fiction by Hilary Mantel and Philippa Gregory to fuel both creative imagination and analytical thinking.
  travel: Jenny Poling prefers meticulously planned weekend escapes that blend hiking, kayaking, and cultural exploration, having trekked the Ocala National Forest, paddled the Intracoastal Waterway, and
    toured Savannah’s historic squares, while they dream of an extended adventure in Iceland’s geothermal wonders and the ancient temples of Kyoto, all managed within a modest travel budget they track in
    a spreadsheet.
  culinary: Jenny Poling enjoys cooking Mediterranean‑inspired meals such as quinoa salad with feta, Kalamata olives, and roasted cherry tomatoes, masters grilled salmon with a lemon‑dill glaze, occasionally
    bakes banana bread with walnuts, favors fresh heirloom tomatoes from the local farmer’s market, and they treat themselves to gourmet sushi rolls at a downtown restaurant when seeking a culinary indulgence.
  core: Jenny Poling is a methodical full‑stack coder who calms their perpetual worry with yoga, journaling, and weekend hikes, and they secretly hoard an ever‑growing collection of vintage knitting needles
    and board games for occasional escapist nights.
background:
  cultural: Jenny grew up in a middle-class suburb of central Florida as the daughter of second-generation Irish-American parents who emphasized education, community service, and a balanced work ethic.
    Her family's traditions blend typical American celebrations - Thanksgiving, Christmas, and Fourth of July BBQs - with occasional St. Patrick's Day gatherings reflecting her Irish heritage. Living in
    Port Orange exposed her to the laid-back coastal lifestyle, outdoor activities, and the diverse cultural fabric of the Sunshine State. Her liberal arts education broadened her perspective, fostering
    an appreciation for literature, visual arts, and social history, which now informs her user-centered design approach. As a white American, she actively participates in local community events, inclusive
    tech meetups, and volunteer initiatives to respect and engage with the varied cultures of her region.
