  hobbies: '[''Reading Historical Fiction'', ''Hiking'', ''Kayaking'', ''Yoga and Guided Meditation'', ''Photography'', ''Knitting'', ''Board-game Nights'', ''Volunteering at Animal Shelter'', ''Puzzle
    Solving'']'
  career_goals: Jenny aims to move from a mid-level full-stack engineer to a lead engineer or product manager within five years, combining her curiosity for emerging technologies with a practical focus
    on reliable delivery. She plans to earn certifications such as AWS Certified Solutions Architect and Certified ScrumMaster, and to lead cross-functional teams that build user-centric digital products.
    While pursuing these ambitions, she prioritizes realistic timelines and work-life balance to manage her tendency toward stress. She also hopes to mentor other women in tech and eventually launch a side
    venture that provides sustainable, data-driven solutions for small businesses.
