  career_goals: Liliana dreams of becoming a teacher because she loves helping friends learn, and she also imagines being a scientist or a veterinarian, mixing her curiosity about the natural world with
    a desire to care for animals. She sometimes says she wants to 'help people feel happy,' reflecting her kind and supportive personality, while also considering realistic helping roles like a nurse.
