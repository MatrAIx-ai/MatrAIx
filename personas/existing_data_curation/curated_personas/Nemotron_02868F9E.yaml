personas:
  professional: Aleyamma Dsouza, a data‑driven UX researcher in training, leverages Python, R, and Adobe Illustrator to turn complex statistical models into engaging visual narratives, balancing meticulous
    organization with spontaneous creative bursts that keep projects both analytically sound and aesthetically compelling.
  sports: Aleyamma Dsouza, a Bronx‑based fitness enthusiast, joins the Bronx Running Club for weekend 5Ks, plays pick‑up basketball at the local recreation center, follows the New York Knicks and New York
    Yankees, attends weekly yoga classes at a Westchester studio, and hikes the Palisades with a trail‑blazing group during summer months.
  arts: Aleyamma Dsouza, a devoted lover of visual culture, spends weekends sketching at MoMA and the Met, draws creative fuel from the bold street installations of Banksy and the immersive sculptures of
    Yayoi Kusama, weaves Kathakali mask motifs into digital illustrations using Adobe Illustrator, and curates a soundtrack featuring Björk, Sufjan Stevens, and Beyoncé while they work.
  travel: Aleyamma Dsouza, an adventurous urban explorer, has mapped the graffiti‑laden streets of Brooklyn, taken a weekend art‑focused trip to Boston’s Museum of Fine Arts, explored the Louvre’s wings
    during a spring visit to Paris, and now dreams of wandering Marrakech’s colorful souks and Lisbon’s historic azulejo neighborhoods, favoring flexible itineraries booked through budget airlines and staying
    in boutique Airbnb rentals.
  culinary: Aleyamma Dsouza, a self‑taught home chef, loves preparing coconut‑infused fish moilee, spiced lentil stew with tamarind (sambar), and fluffy appam served with mango chutney, often experimenting
    by adding quinoa and kale for a modern twist, and frequently hosts potluck dinners where friends sample these dishes alongside craft tea blends.
  core: Aleyamma Dsouza fuses analytical rigor with artistic flair, juggling data science, digital illustration, and coconut‑scented cooking, while occasionally over‑scheduling and binge‑watching late‑night
    sci‑fi series.
background:
  cultural: Born to a second‑generation Indian Catholic family from Kerala, Aleyamma grew up in a bilingual household where Malayalam and English were spoken. Her parents emphasized academic excellence
    and cultural roots, celebrating Onam, Vishu, Christmas, and Easter with traditional foods and rituals. Living in the Bronx, she is part of a vibrant South Asian diaspora that maintains community ties
    through local temples, churches, and cultural festivals. This hybrid identity gives her a deep appreciation for both Indian artistic traditions—such as Kathakali mask design and classical music—and
    the multicultural energy of New York City. She often blends these influences, for example by incorporating Indian motifs into her digital illustrations.
attributes:
  skills: '[''Programming (Python, Java, R)'', ''Data analysis (Excel, SQL)'', ''Statistical modeling'', ''Molecular biology techniques (PCR, fluorescence microscopy)'', ''Digital illustration (Adobe Illustrator,
    Photoshop)'', ''Project management (Agile, Trello)'', ''Critical thinking'', ''Cross-cultural communication'']'
  hobbies: '[''Visiting art museums (MoMA, Met)'', ''Street photography'', ''Cooking Kerala dishes'', ''Yoga and hiking in Westchester'', ''Reading speculative fiction and tech nonfiction'', ''Volunteering
    in STEM outreach'', ''Exploring New York neighborhoods'', ''Digital sketching and illustration'']'
  career_goals: Aleyamma aims to secure a role that bridges technology and design—such as a data‑driven UX researcher, product analyst in a cultural institution, or research associate in a biotech startup
    focused on personalized medicine. She plans to pursue a master’s degree in Data Science or Human‑Computer Interaction within the next two years while building a portfolio of interdisciplinary projects
    that showcase the integration of analytics and visual storytelling. Long‑term, she envisions leading interdisciplinary teams that develop socially impactful tech solutions, particularly in public‑health
    outreach for immigrant communities.
