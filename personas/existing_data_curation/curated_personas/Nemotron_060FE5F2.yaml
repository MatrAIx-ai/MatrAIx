personas:
  professional: An industrial engineer focused on health and safety, Cherita Michel channels their competitive drive and love for rapid problem‑solving into Lean Six Sigma‑guided process optimization and
    proactive risk assessment, yet they resist rigid deadlines, often creating tension in deadline‑heavy projects.
  sports: Cherita Michel fuels their fitness routine with weekly treks through Wekiwa Springs State Park and membership in the Orlando Trailblazers running club, while they cheer on the Orlando Magic in
    basketball season and the Tampa Bay Lightning in winter, preferring tangible outdoor challenges over repetitive gym sessions.
  arts: Cherita Michel channels their social energy into an improvisational theater troupe at The Improv Playhouse, drawing inspiration from the quick‑wit of Tina Fey, the musical storytelling of Lin‑Manuel
    Miranda, and the experimental sounds of Thundercat; they treat spontaneous performance as both a creative sanctuary and a competitive arena.
  travel: Cherita Michel favors impromptu weekend road trips to Florida’s hidden Gulf Coast beaches and occasional solo backpacking adventures in Costa Rica’s rainforests, balancing limited vacation days
    with a desire for adrenaline‑filled hikes and cultural immersion while they meticulously budget travel expenses to preserve funds for future safety‑tech certifications.
  culinary: Cherita Michel showcases a hobbyist chef’s flair by blending Southern comfort staples—smoky fried chicken, buttery collard greens, and sweet‑potato pie—with Caribbean zest such as jerk‑spiced
    pork, mango‑pineapple salsa, and a dash of Scotch bonnet pepper; they often perfect these dishes during weekend gatherings with friends.
  core: Cherita Michel is a fiercely competitive safety engineer who balances a love for spontaneous outdoor hikes and improv theater with an anxiety‑driven quest for perfection, they often juggle DIY sensor
    projects while fearing missed deadlines.
background:
  cultural: 'Cherita identifies as African American with deep roots in the Black community of Orlando. Her family traditions blend Southern cultural heritage—gospel music, soul food, and church gatherings—with
    influences from Caribbean relatives who introduced her to fresh seafood dishes and vibrant festivals. Growing up, she participated in local Juneteenth celebrations, Black History Month events, and community
    mentorship programs, fostering a strong sense of resilience and collective uplift. This cultural grounding informs her professional ethos: she advocates for equity in workplace safety, ensuring that
    safety protocols consider diverse worker experiences. Cherita maintains close ties with her extended family and church network, which provide emotional support as she navigates the pressures of her
    career.'
attributes:
  skills: '[''Process Optimization'', ''Industrial Safety Compliance (OSHA)'', ''Risk Assessment'', ''Ergonomic Design'', ''Lean Six Sigma Green Belt'', ''Data Analysis (Excel, Minitab)'', ''Project Coordination'',
    ''Hazard Identification'', ''Incident Investigation'', ''Technical Documentation'', ''Safety Training Facilitation'']'
  hobbies: '[''Hiking and nature walks at Wekiwa Springs'', ''Improvisational theater'', ''Cooking Southern and Caribbean dishes'', ''Yoga and mindfulness meditation'', ''DIY electronics and Arduino projects'',
    ''Reading science and technology magazines'', ''Volunteering for community safety workshops'']'
  career_goals: Cherita aims to become a senior safety manager or director within a large manufacturing or aerospace organization in Central Florida, leveraging her expertise to shape a culture of proactive
    safety. She plans to complete a bachelor's degree in industrial engineering and earn a Professional Engineer (PE) license, as well as obtain advanced certifications such as Certified Safety Professional
    (CSP). Her ambitions include leading the implementation of predictive safety technologies—such as IoT sensor networks and AI‑driven risk analytics—to reduce workplace incidents. Recognizing her sensitivity
    to stress, she also seeks mentorship and leadership training to improve her organizational and deadline‑management skills, ultimately balancing her career growth with personal well‑being and family
    life.
