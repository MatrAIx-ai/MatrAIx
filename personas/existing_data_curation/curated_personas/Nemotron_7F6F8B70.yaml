  career_goals: Orlando aims to earn his GED within the next year and then enroll in a vocational program, such as automotive technology or welding, to gain a stable trade skill. Simultaneously, he wants
    to grow a culturally focused YouTube channel that showcases Mexican‑American recipes, local community stories, and youth perspectives, leveraging his sociability and media savvy. In the longer term,
    he envisions opening a small food‑service business—like a taco truck or neighborhood café—that blends his culinary interests with his entrepreneurial drive, while also mentoring younger peers in his
    community about education, media, and cultural pride.
