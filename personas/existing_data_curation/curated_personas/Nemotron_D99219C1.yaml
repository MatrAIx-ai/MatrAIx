    ''Evidence‑based practice'']'
  hobbies: '[''Watercolor painting'', ''Beach photography'', ''Visiting galleries and art fairs'', ''Reading art history and medical humanities'', ''Yoga and meditation'', ''Coastal gardening'', ''Volunteer
    work at senior center'', ''Online learning in digital illustration and holistic nursing'']'
  career_goals: Amanda aims to transition into a Nurse Educator or Clinical Nurse Specialist role, where she can mentor emerging nurses and embed holistic care principles into curricula. She plans to obtain
    advanced certifications such as CCRN and CNE, and eventually pursue a Master’s in Nursing to broaden her clinical scope. Locally, she aspires to design and lead community‑based health programs in Indian
    Rocks Beach that combine art‑therapy workshops, stress‑reduction sessions, and preventive care for seniors and widowed residents. Amanda also seeks to spearhead hospital quality‑improvement initiatives
    that reduce readmissions, enhance patient safety, and integrate patient‑centered artistic experiences. Finally, she is passionate about advocating for mental‑health resources for healthcare staff, drawing
    on her own sensitivity to stress and her commitment to compassionate self‑interest.
