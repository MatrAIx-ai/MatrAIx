personas:
  professional: Amanda Courtney, a seasoned registered nurse with over fifteen years of acute and community care experience, leverages their methodical nature and love of art to integrate holistic, evidence‑based
    practices into patient education, and is actively pursuing CCRN and CNE certifications to transition into a Nurse Educator role.
  sports: Amanda Courtney regularly practices yoga at the Gulf Coast Yoga Collective, participates in early‑morning beach runs along the Indian Rocks shoreline, supports the Tampa Bay Buccaneers and Tampa
    Bay Rays, and occasionally joins the Indian Rocks Beach Paddleboard Club for weekend cardio.
  arts: Amanda Courtney paints watercolor seascapes inspired by Winslow Homer, captures sunrise photography reminiscent of Ansel Adams, frequents the Gulf Coast Art Center and local artisan fairs, and draws
    creative inspiration from Claude Monet and Georgia O’Keeffe.
  travel: Amanda Courtney prefers short, purpose‑driven getaways, often planning weekend trips to the Florida Keys for sunrise shoots, savoring coastal towns like Amelia Island, while dreaming of a summer
    pilgrimage to the Amalfi Coast to photograph cliffside vistas, all balanced against family responsibilities and a modest travel budget.
  culinary: Amanda Courtney enjoys cooking fresh Gulf shrimp ceviche with lime, cilantro, and jalapeño, perfecting lemon‑herb baked cod, and blending Mediterranean quinoa salads with roasted vegetables,
    while tending a small herb garden that supplies basil, thyme, and rosemary for their meals.
  core: Amanda Courtney is a meticulous nurse‑educator‑in‑the‑making whose artistic soul fuels holistic patient care, yet their perpetual worry often drives them to over‑schedule and sip extra coffee at
    night.
background:
  cultural: Amanda was raised in a middle‑class white American family in the Midwest, where Protestant values and a strong emphasis on community service shaped her early worldview. Relocating to Indian
    Rocks Beach, Florida, in her early thirties exposed her to a vibrant coastal culture enriched by Hispanic, Caribbean, and tourist influences. This blend of traditional American upbringing and the multicultural,
    art‑savvy atmosphere of the Gulf Coast has fostered her openness to diverse perspectives, her appreciation for artistic expression, and her commitment to community‑focused health initiatives.
attributes:
  skills: '[''Acute care nursing'', ''Patient assessment'', ''IV therapy'', ''Wound management'', ''Medication administration'', ''Critical‑care monitoring'', ''Health informatics'', ''Electronic medical
