    ''Time management and scheduling'', ''Community networking and outreach'']'
  hobbies: '[''Ballet Folklorico dancing'', ''Cooking traditional Mexican dishes'', ''Attending local community festivals and rodeos'', ''Group hiking and nature walks'', ''Volunteering at the local food
    bank'', ''Playing recreational soccer'', ''Social media content creation for listings'', ''Yoga and mindfulness meditation'', ''Reading real estate trend articles'', ''Participating in neighborhood
    watch programs'']'
  career_goals: Mercedes aims to become a licensed real‑estate broker within the next two years and eventually open her own boutique office in Borger, focusing on serving the growing Latino community. She
    wants to rank among the top five agents in Hutchinson County for sales volume, build a modest portfolio of rental properties for long‑term financial security, and mentor newly licensed agents—especially
    women and minorities. Her ambition extends beyond personal success; she hopes to become a trusted advisor for community development projects and secure a seat on the local Chamber of Commerce board,
    using her position to advocate for affordable housing initiatives.
