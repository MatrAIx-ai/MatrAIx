  career_goals: Marcos aims to earn his Commercial Driver's License and obtain a certified heavy‑equipment technician credential within the next two years. He plans to enroll in an associate‑degree program
    in industrial mechanics at a community college, with the long‑term goal of becoming a team lead or safety trainer at his company. Inspired by his love of novelty and design, he also hopes to transition
    into a role that blends equipment operation with ergonomic or sustainable equipment design, eventually contributing to new, eco‑friendly farming technologies or even starting a small consulting business
    for custom equipment modifications.
