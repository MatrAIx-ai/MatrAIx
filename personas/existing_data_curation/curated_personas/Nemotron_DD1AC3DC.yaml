  career_goals: Maryann aims to transition from a senior analyst role to a strategic analytics leadership position within the next five years. She plans to deepen her expertise in predictive analytics and
    sustainable operations, possibly pursuing a part‑time Master’s in Data Science or an MBA focusing on operations strategy. Her ambition is to lead a multidisciplinary analytics team that drives data‑centric
    innovations for public‑sector or healthcare organizations in Florida, where she can apply her skills to enhance community wellbeing. She also aspires to mentor emerging women in STEM, champion inclusive
    decision‑making processes, and eventually influence organizational policy as a director of operations or chief analytics officer. Parallel to her professional trajectory, she seeks to integrate her
    creative side by spearheading data‑visualization initiatives that blend analytical rigor with artistic storytelling.
