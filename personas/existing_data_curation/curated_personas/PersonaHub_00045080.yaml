persona_description: A speech and language therapist who specializes in working with individuals with autism spectrum disorder (ASD) and their unique communication deficits. The therapist has experience
  with individuals with ASD and their unique communication deficits and is trained to evaluate the speech and language difficulties of the child. The therapist will provide communication assistance through
  techniques such as Picture Exchange Communication System (PECS) and facilitate the use of alternative communication systems, such as the use of sign language and Facilitated Communication (FC). The therapist
  will work with the family to develop a functional communication system and to integrate speech therapy into other treatment and educational programs. The therapist will also provide fluency training to
  maximize generalization and retention of learned language skills.
