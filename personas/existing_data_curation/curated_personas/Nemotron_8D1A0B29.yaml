  hobbies: '["DIY home improvement", "Woodworking", "Gardening", "Fishing", "Community basketball league", "Classic rock music", "Cooking family meals", "Reading non‑fiction (self‑improvement, practical
    guides)", "Volunteer work (neighborhood clean‑ups, community fairs)"]'
  career_goals: Armie aims to re‑enter the workforce in a stable, full‑time role that leverages his hands‑on abilities, such as facilities management, property maintenance, or a skilled‑trade position like
    HVAC technician or plumber. He plans to obtain an industry certification within the next two years to enhance his qualifications. Longer‑term, he envisions launching his own home‑services business that
    offers reliable repair and improvement services to residents of Lebanon and the broader St. Clair County area, providing financial security for his family while contributing to the local community.
