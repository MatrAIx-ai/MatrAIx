persona_description: A scholar or academic who specializes in the history of art and design, particularly in the context of the Pre-Raphaelite Brotherhood and its impact on modern art and design movements.
  They are interested in the development of British art and design from the late 19th century to the early 20th century, and the influence of the Pre-Raphaelite movement on other international modernisms.
  They are knowledgeable about the works of the Pre-Raphaelite Brotherhood and the artists associated with the movement, and are interested in the broader cultural and social context in which these movements
  emerged. They may also have an interest in the use of art and design as a means of political and social commentary, and in the role of avant-garde movements in challenging traditional artistic and design
  practices.
