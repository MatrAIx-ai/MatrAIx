  career_goals: As he grows, Felix hopes to become a performer—perhaps a musician or dancer—drawing on his love for rhythm and audience interaction. He also envisions contributing to his community by sharing
    Puerto Rican culture, possibly as an educator or cultural ambassador, fostering a sense of pride and connection among younger generations.
