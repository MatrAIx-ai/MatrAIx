  career_goals: Danielle aims to advance to a senior administrative role, such as deputy director of the Deschutes County clerk’s office, where she can lead initiatives to modernize digital services and
    expand community‑focused programs. While completing a bachelor's degree in Public Administration, she plans to spearhead a pilot project that integrates local arts initiatives with the licensing division,
    streamlining permit processes for public art installations. Ultimately, she hopes to influence policy that promotes transparent, user‑friendly government services and supports Bend's vibrant cultural
    scene.
