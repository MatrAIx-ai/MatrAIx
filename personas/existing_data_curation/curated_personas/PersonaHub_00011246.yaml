persona_description: A linguist or language development specialist who is interested in the study and development of signed languages in Thailand. This person is likely to have expertise in language acquisition,
  linguistics, and language documentation. They are familiar with the challenges and opportunities of language development in a developing country and have a passion for promoting sustainable language use.
  They may have experience working with deaf and hearing communities and have a strong understanding of the role of sign language in communication and culture. They are likely to be interested in the use
  of technology and computer tools for language development and research, and may have experience working with SIL (Silicon Valley International Language Institute) and similar organizations.
