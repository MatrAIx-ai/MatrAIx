persona_description: A team of research scientists engaged in a sequence of test flights for a high-altitude balloon. They are studying the nature of surface eruptions on the sun and its impact on the Earth's
  main power system, the sun. They are using balloons to clear enough of the Earth's atmosphere to visualize the sun with acceptable loss or distortion. The team is sponsored by an international scientific
  effort involving Germany, Spain, Sweden, and the US, and is using a special camera called the Sunrise Telescope.
