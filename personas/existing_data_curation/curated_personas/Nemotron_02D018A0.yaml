personas:
  professional: Orlando Guerrero, a 44-year-old master carpenter with two decades of custom furniture and sustainable framing experience, blends Spanish woodworking traditions with modern design tools while
    wrestling with deadline pressure due to a spontaneous, improvisational work style.
  sports: Orlando Guerrero, a 44-year-old outdoor enthusiast, hikes the Sandia trails year‑round as primary cardio, belongs to the Albuquerque Hiking Club, follows New Mexico United in the USL Championship,
    and joins a casual weekend pick‑up basketball league at the community center to keep loose joints, all while preferring low‑impact exercise to avoid aggravating his back.
  arts: Orlando Guerrero, a 44-year-old lover of the arts, reads Cervantes’ Don Quixote and García Lorca’s poems, attends intimate folk‑music sessions featuring guitarist Paco de Lucía recordings, and spends
    evenings polishing the wooden guitars they craft, letting the resonant tones of Estrella Morente guide their creative flow.
  travel: Orlando Guerrero, a 44-year-old wanderer who plans trips on a scrap‑paper timeline, favors off‑the‑grid nature escapes, has trekked the Sierra de Guadarrama in Spain and the Canadian Rockies,
    and dreams of a pilgrimage to the historic workshops of Valparaíso, Chile, while balancing family commitments that limit long‑haul vacations.
  culinary: Orlando Guerrero, a 44-year-old culinary hobbyist, expertly prepares paella de mariscos with bomba rice, saffron, fresh mussels, and smoked chorizo, often sourcing locally caught shrimp from
    the Rio Grande’s delta, and enjoys hosting small dinner gatherings where they pair the meal with a crisp Albariño, though they occasionally over‑season in a quest for the perfect flavor balance.
  core: Orlando Guerrero, a 44-year-old solitary craftsman, balances a relentless curiosity for new joinery with a chronic worry that fuels both meticulous woodwork and spontaneous project starts, often
    leaving deadlines in the dust while perfecting the next guitar.
background:
  cultural: Orlando’s cultural background blends his Spanish heritage with the multicultural atmosphere of Albuquerque. He grew up in a bilingual household, where Mediterranean values of family cohesion,
    hospitality, and modesty were emphasized. Living in New Mexico, he has adopted Southwestern customs—appreciating local art, cuisine, and community festivals—while preserving his connection to Spanish
    traditions through language, cooking, and occasional participation in cultural celebrations such as Semana Santa and Día de Los Muertos. This dual cultural identity informs his collaborative approach
    at work and his respect for diverse perspectives.
