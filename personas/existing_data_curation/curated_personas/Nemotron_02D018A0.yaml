  career_goals: Orlando aims to transition from a subcontractor role to running his own small workshop that emphasizes custom, environmentally responsible woodwork. He plans to earn a green‑building certification
    and integrate Spanish woodworking traditions, offering apprenticeships to share his craft while maintaining a flexible schedule that supports his family and managing his stress. Ultimately, he hopes
    his workshop becomes a community hub where quality craftsmanship and cooperative values intersect.
