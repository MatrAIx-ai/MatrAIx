persona_description: A scientist and environmentalist who studies the impact of roads on the spread of invasive weeds and the conservation of natural habitats. They are interested in understanding the factors
  that contribute to the invasion of nonnative plants and the strategies to prevent further spread. They may be involved in research projects or policy discussions aimed at minimizing the construction of
  new roads and the improvement of existing ones in semiarid landscapes to prevent exotic plant invasions.
