persona_description: A scientist who specializes in the study of wasp biology, specifically the parasitism and nesting behavior of paper wasps. This scientist has conducted research on the relationship
  between nest-site characteristics and population dynamics of paper wasps, and has discovered a new nesting site for this species. They are interested in the use of nest boxes as a biological control agent
  for paper wasps and have found that parasitism by a specific wasp species is an important factor in the success of such efforts.
