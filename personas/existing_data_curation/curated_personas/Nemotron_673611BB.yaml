  career_goals: Approaching retirement, Beverly aims to transition into a consulting role that supports nonprofit arts and cultural organizations, helping them achieve financial sustainability while preserving
    their creative missions. She plans to obtain the Certified Financial Planner (CFP) designation to provide personalized financial planning for seniors in her community. Within her current firm, she hopes
    to launch a mentorship program that empowers women and under‑represented accountants. Additionally, she aspires to author a guide on integrating creative thinking into audit methodology, sharing her
    unique blend of analytical rigor and imaginative insight.
