  hobbies: '[''Watercolor painting'', ''Reading historical fiction'', ''Cooking Mexican cuisine'', ''Succulent gardening'', ''Desert hiking'', ''Attending small art lectures'', ''Genealogy research'', ''Volunteering
    for art classes'', ''Journaling'', ''Listening to classical and folk music'']'
  career_goals: Yean aims to mentor younger volunteers at her local cultural center, preserving and sharing her Mexican heritage by documenting her family’s history in a memoir or digital archive. She wishes
    to facilitate small, intimate art workshops that blend traditional Mexican motifs with contemporary techniques, and to continue learning new artistic mediums such as digital illustration. Maintaining
    her health and emotional wellbeing through mindfulness practices and regular, low‑stress community involvement is also a priority.
