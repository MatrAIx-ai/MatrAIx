  hobbies: '["Cooking traditional Mexican cuisine","Gardening (herbs and chiles)","Attending Catholic services and community festivals","Walking her dog","Watching classic Mexican films","Quilting and hand‑crafts","Volunteering
    at a food bank"]'
  career_goals: Rosa aims to advance from her current first‑line supervisory role to store manager within the next two years, eventually progressing to a district manager position overseeing multiple locations.
    She plans to complete a bachelor’s degree in Business Administration to solidify her managerial credentials, develop a mentorship program for new retail employees, and eventually leverage her experience
    and cultural insights to open a boutique that showcases Mexican textiles and crafts in the Lubbock area.
