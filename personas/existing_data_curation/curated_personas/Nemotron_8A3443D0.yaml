personas:
  professional: Rosa Castillo, a retail floor manager in Lubbock, leverages their bilingual communication, meticulous inventory control, and hands‑on performance coaching to keep the store humming while
    balancing routine schedules with the occasional need for quick problem‑solving, and they assert themselves when merchandising decisions clash with their practical sensibilities.
  sports: Rosa Castillo enjoys Saturday morning jogs at Mackenzie Park, is a seasonal fan of the Texas Tech Red Raiders football team, participates in a community basketball league with the Lubbock Runners,
    and prefers low‑impact yoga classes at the local YMCA to stay flexible without risking injury, all of which they schedule around their busy work hours.
  arts: Rosa Castillo’s evenings often feature classic cinema starring Pedro Infante and María Félix, while they collect prints of Frida Kahlo and Diego Rivera, devote weekend afternoons to quilting designs
    inspired by traditional motifs, and sing along to Juan Gabriel during family gatherings.
  travel: Rosa Castillo plans trips with a spreadsheet, favors road‑trips to Texas Hill Country wineries and occasional weekend getaways to San Antonio’s River Walk, dreams of exploring Oaxaca’s markets,
    but balances travel ambitions with the cost of their upcoming bachelor’s degree.
  culinary: Rosa Castillo excels at preparing tamales, mole, and pozole using home‑grown cilantro and chiles from their garden, experiments with smoky chipotle in their mole, and enjoys sharing festive
    meals at their house, though they sometimes over‑season due to an over‑zealous love of chili.
  core: Rosa Castillo is a routine‑driven retail leader who blends practical ambition with a love for handcrafted foods, classic cinema, and community service, all while juggling a lingering coffee habit
    that fuels their late‑night quilting sessions.
background:
  cultural: Rosa was born and raised in Lubbock, Texas, to Mexican immigrant parents who maintained a bilingual household and strong Catholic traditions. Her upbringing emphasized family cohesion, respect
    for elders, and the celebration of Mexican holidays such as Día de los Muertos, Día de la Independencia, and Cinco de Mayo. She blends Mexican cultural values with the Texan community, preserving traditions
    through food, music, and community involvement, while also navigating the broader American cultural landscape.
attributes:
  skills: '["Retail floor management","Team supervision","Staff scheduling","Performance coaching","Inventory control","Loss prevention","Point‑of‑sale operation","Bilingual communication (English/Spanish)","Conflict
