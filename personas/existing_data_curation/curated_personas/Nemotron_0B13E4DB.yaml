  hobbies: '[''Attending local music festivals'', ''Community theatre improvisation'', ''Karaoke'', ''Book club (personal development & retail trends)'', ''Road trips across Texas'', ''Cooking and sampling
    Tex‑Mex cuisine'', ''Yoga'', ''Volunteering at food bank'', ''DIY home décor projects'', ''Gardening'']'
  career_goals: Sue Marie aims to advance from first‑line supervisor to store manager within the next two years, then pursue district or regional management roles. She plans to enroll in a bachelor's program
    in Business Administration to broaden her strategic capabilities. Her ambitions include implementing innovative retail technologies—such as mobile checkout and omnichannel integration—while maintaining
    solid operational foundations. She also wants to formalize a mentorship program for junior supervisors and, eventually, open her own boutique that curates unique, locally sourced products.
