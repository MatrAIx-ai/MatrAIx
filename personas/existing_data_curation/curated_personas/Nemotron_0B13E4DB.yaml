personas:
  professional: Sue Hennessy, a 30‑year‑old retail supervisor in Wichita Falls, merges her curiosity for new tech with a practical, hands‑on style as she coaches front‑line staff, fine‑tunes POS systems,
    designs eye‑catching visual merchandising, and crunches sales data in Excel, all while keeping the floor lively with her talkative, community‑spirit leadership that makes the shop feel like a social
    hub.
  sports: Sue Hennessy regularly cheers on the Dallas Cowboys on Sundays, roots for the Dallas Mavericks during the NBA season, plays on a co‑ed weekend softball league in Archer County, and stays fit through
    sunrise yoga classes and occasional trail runs in the Palo Duro Canyon, favoring a relaxed, social approach to exercise.
  arts: Sue Hennessy immerses herself in community‑theater improv nights, belts out karaoke classics from Beyoncé and Garth Brooks, follows the folk‑rock vibes of The Avett Brothers at local music festivals,
    and leads a book club that often debates Brené Brown’s personal‑development insights, letting her sociable energy shape her artistic palate.
  travel: Sue Hennessy favors spontaneous, low‑budget road trips along the Texas Hill Country, often detouring to Austin’s live‑music venues or the art‑laden town of Marfa, while dreaming of weekend getaways
    to Santa Fe’s galleries and Colorado’s Rocky Mountain National Park, balancing adventure with a modest travel fund.
  culinary: Sue Hennessy enjoys whipping up quick‑fix Tex‑Mex dishes such as shrimp fajitas with fresh cilantro and poblano peppers, savoring smoky brisket tacos, and pairing meals with a perfectly balanced
    chipotle‑lime margarita, yet they admit their kitchen is a half‑organized mess because spontaneity trumps meticulous meal planning.
  core: Sue Hennessy is a sociable, curiosity‑driven retail leader who balances pragmatic problem‑solving with a love for spontaneous fun, even if that sometimes means a cluttered schedule and an occasional
    missed deadline.
background:
  cultural: Sue Marie is a white Texas native raised in Wichita Falls and the surrounding Archer County. Her upbringing reflects Southern hospitality, a strong sense of community, and a blend of Midwestern
    pragmatism with Texan independence. She grew up attending high‑school football games, church gatherings, and community fairs, experiences that fostered her sociable nature. The cultural milieu of the
    Texas Panhandle emphasizes hard work, friendly interaction, and practical problem‑solving, all of which shape her values and worldview.
attributes:
  skills: '[''Retail team leadership'', ''Customer service management'', ''Sales performance analysis'', ''Visual merchandising'', ''Inventory control'', ''POS system operation'', ''Excel data analysis'',
