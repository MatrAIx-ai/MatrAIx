  career_goals: Although currently not in the workforce, Michael aims to stay intellectually active and socially contributive. He seeks opportunities to volunteer his engineering expertise for local nonprofit
    projects, mentor aspiring STEM students, and serve as an advisor for community initiatives that require systematic planning. Michael also wishes to continue learning advanced data science techniques
    through online courses, with the broader ambition of authoring a practical guide on applying engineering principles to community development.
