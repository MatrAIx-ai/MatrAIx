  hobbies: '[''Gardening'', ''Reading Historical Biographies'', ''Reading Classic Literature'', ''Traditional Cooking'', ''Chess'', ''Walking in Local Parks'', ''Attending Small Religious Gatherings'',
    ''Volunteer Tutoring'', ''Documenting Family History'']'
  career_goals: Although retired, Sudesh aims to stay actively engaged by volunteering as a mentor for new teachers in the local school district, offering tutoring for adult learners, and contributing to
    curriculum advisory boards. He also aspires to document his family's migration story, preserve cultural recipes, and support his spouse in maintaining a healthy, independent lifestyle. His overarching
    ambition is to apply his structured, practical approach to benefit his community while honoring his lifetime of educational service.
