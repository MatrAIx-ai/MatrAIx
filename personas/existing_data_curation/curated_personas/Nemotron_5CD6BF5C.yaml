personas:
  professional: Goran Eldridge, a 32‑year‑old construction veteran, leverages his hands‑on expertise in concrete pouring, framing, and heavy equipment operation while using his talkative, competitive nature
    to energize crews, lead daily safety briefings, mentor new laborers, and drive continuous process improvements on residential sites.
  sports: Goran Eldridge, a dedicated weekend fisherman and deer hunter, also coaches the defensive line of his local high‑school football team while cheering for the Dallas Cowboys, the Houston Rockets,
    and Austin FC, and spends evenings playing intramural flag football with a crew called the River Runners.
  arts: Goran Eldridge, an avid guitar‑playing bar regular, draws inspiration from John Mayer’s blues licks, Bruce Springsteen’s storytelling, and the raw energy of the Avett Brothers, and volunteers at
    community fairs where they showcase their own acoustic set.
  travel: Goran Eldridge, who loves the open road, has fished the clear waters of Lake Travis, hiked the red cliffs of Sedona, and dreams of photographing Icelandic volcanic landscapes with their drone,
    while a future trip to Japan’s cutting‑edge construction expos tops their bucket list.
  culinary: Goran Eldridge, a self‑described grill master, excels at smoking mesquite brisket, searing cedar‑plank salmon, and whipping up a tangy corn‑on‑the‑cob salsa, often pairing these meals with a
    cold craft IPA such as Sierra Nevada Pale Ale.
  core: Goran Eldridge is a sociable, competitive construction pro who balances hands‑on building with guitar riffs, grill smoke, and a relentless drive to turn every project into a winning team effort.
background:
  cultural: Goran was raised in a tight-knit, white, Midwestern family in Callaway County, Missouri. The community's emphasis on hard work, self-reliance, and neighborly support shaped his practical outlook.
    He grew up attending church picnics, county fairs, and high-school sports, which fostered his sociable and competitive spirit. While rooted in traditional Midwestern values—respect for local traditions,
    patriotism, and a strong sense of duty—he also embraces curiosity about new technologies and methods, reflecting a blend of heritage and forward-looking ambition.
attributes:
  skills: '["Concrete Pouring", "Framing Carpentry", "Finishing Carpentry", "Heavy Machinery Operation", "Blueprint Reading", "OSHA Safety Compliance", "Site Safety Briefings", "Process Improvement", "Mentoring
