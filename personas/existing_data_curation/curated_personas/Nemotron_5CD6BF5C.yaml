  hobbies: '["Barbecue Grilling", "Playing Guitar", "Coaching High-School Football", "Fishing", "Deer Hunting", "Drone Photography", "DIY Home Renovation", "Attending County Fairs", "Volunteering at Community
    Events"]'
  career_goals: Goran aims to move from laborer to foreman within the next two years, securing an OSHA 30-hour certification and an NCCER journeyman credential. Long-term, he plans to become a site supervisor
    and eventually launch his own small construction firm that specializes in energy-efficient residential builds. He is motivated by the desire to lead a high-performing crew, implement innovative building
    technologies, and be recognized for delivering projects on time and within budget.
