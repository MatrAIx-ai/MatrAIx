  career_goals: Kirk aims to transition from a front‑line representative to a role where he can shape service strategy and process efficiency. Over the next five years, he plans to earn a Six Sigma Green
    Belt and an ITIL certification, positioning himself for a team‑lead or operations‑manager position within the customer‑experience department. He is interested in spearheading data‑driven initiatives—such
    as implementing predictive analytics for ticket triage—to improve response times while maintaining a calm, low‑noise work environment. Ultimately, he envisions leveraging his technical background to
    become a consultant who helps midsize companies optimize their customer support operations, allowing him more control over his schedule and preserving his preference for solitude.
