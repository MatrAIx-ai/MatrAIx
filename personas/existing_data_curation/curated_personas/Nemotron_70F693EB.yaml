personas:
  professional: Elizabeth Green, a tech‑savvy high school senior, channels her boundless imagination into digital illustrations, Python‑driven interactive art pieces, and collaborative school projects,
    reliably leading her art club while balancing meticulous planning with spontaneous creative bursts, all with an eye toward a future as a multimedia designer at a top art university.
  sports: Elizabeth Green keeps fit by tackling rugged coastal trails during spring and summer, joins a local youth surf club in the fall, and roots for the Los Angeles Lakers in basketball and the San
    Jose Sharks in hockey, often using a smartwatch to track steps and heart rate while cheering loudly at every game.
  arts: Elizabeth Green immerses herself in the arts by sketching in the whimsical style of Hayao Miyazaki, listening to Billie Eilish’s evolving catalog while painting, performing in youth theater productions
    of Lin‑Manuel Miranda’s works, and drawing photographic inspiration from Annie Leibovitz’s portraits, all of which fuel her socially‑impactful storytelling vision.
  travel: Elizabeth Green prefers spontaneous weekend road trips to nearby coastal towns like Santa Cruz and retreating to Yosemite’s cliffs, while daydreaming about a cultural immersion in Kyoto, Japan,
    and plans each adventure with a mix of budget‑friendly hostels, a sketch‑filled travel journal, and occasional group hikes with friends.
  culinary: Elizabeth Green enjoys crafting avocado toast topped with smoked salmon, whipping up quick ramen bowls with miso paste and fresh scallions, and experimenting with latte art during Sunday coffee
    runs, yet often neglects cooking dinner after late‑night sketch sessions, opting instead for basil‑and‑mozzarella pizza ordered from the local pizzeria.
  core: Elizabeth Green is a relentlessly curious teen who transforms late‑night anxiety into digital sketches, hoards limited‑edition art supplies like a secret treasure, trades sleep for piano improvisations,
    and balances meticulous planning with spontaneous bursts of creative energy.
background:
  cultural: Elizabeth grew up in a middle‑class white family in Mission Viejo, a suburban enclave of Orange County, California. The region’s blend of coastal lifestyle, multicultural neighborhoods, and
    vibrant arts scene shaped her worldview. She was exposed to a mix of Southern California’s outdoor culture—beach trips, hiking, and community festivals—alongside a diverse student body at her school,
    which sparked her curiosity about different perspectives. Her family values emphasized education, community service, and open‑mindedness, encouraging her to explore novel ideas while staying grounded
    in cooperative, harmonious relationships.
