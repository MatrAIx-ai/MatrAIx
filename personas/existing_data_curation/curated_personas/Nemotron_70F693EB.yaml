  hobbies: '[''Drawing'', ''Digital painting'', ''Poetry writing'', ''Piano'', ''Photography'', ''Live music'', ''Youth theater'', ''Community art volunteering'', ''Hiking'', ''Board games'', ''Tech gadget
    tinkering'']'
  career_goals: She aspires to turn her artistic passions into a career in visual storytelling. Her goal is to attend a renowned art and design university (such as CalArts or USC School of Cinematic Arts)
    and later work as a multimedia designer, animator, or creative director for socially‑impactful campaigns. She hopes to merge technology and art, perhaps in interactive media or game design, while fostering
    inclusive creative communities and using her work to inspire young people.
