personas:
  professional: Marlin Brannock envisions a future as a LEGO architect, leveraging their strong spatial reasoning and love for routine building projects while dazzling peers with lively explanations and
    a knack for turning playtime into collaborative design sessions.
  sports: Marlin Brannock loves sprinting after a soccer ball at the neighborhood park, participates in the Ashburn Kids Soccer League, cheers enthusiastically for the Washington Commanders during football
    season, and regularly watches Washington Capitals games, approaching fitness with boundless energy and a preference for spontaneous tag games over structured drills.
  arts: Marlin Brannock is captivated by the bright melodies of The Wiggles and the playful storytelling of Disney’s Mickey Mouse, often staging impromptu dance performances in the living room while mimicking
    scenes from Paw Patrol and Thomas the Tank Engine.
  travel: Marlin Brannock relishes weekend family road trips to the National Mall in Washington, D.C., and annual visits to Disneyland, preferring packed itineraries that include rides and character meet‑and‑greets,
    yet delights in spontaneous detours to nearby state parks where they can explore hiking trails and splash in creek pools.
  culinary: Marlin Brannock adores hearty macaroni and cheese, tender chicken nuggets, and colorful fruit parfaits, can skillfully spread peanut butter and jelly on toast with surprising precision, and
    insists on sprinkling extra shredded cheese on almost every meal, displaying a love for comfort foods with a dash of gourmet flair.
  core: Marlin Brannock is a sociable, routine‑loving six‑year‑old who turns every LEGO build into a lively show, hoards snacks in a hidden drawer, and thrives on spontaneous playground tag while occasionally
    forgetting to tidy up their masterpieces.
background:
  cultural: Marlin comes from a suburban, middle‑class white family in Ashburn, Virginia. His family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, often with
    community barbecues and fireworks. He attends a local public elementary school where multicultural awareness is introduced through classroom activities, but his daily life reflects a predominantly Anglo‑American
    cultural environment, including exposure to classic children’s literature, school sports, and neighborhood gatherings.
