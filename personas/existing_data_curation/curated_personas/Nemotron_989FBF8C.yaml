  career_goals: Looking ahead, Mari aims to transition into a leadership role that blends her practical nursing skills with her desire to improve workplace well‑being. She plans to complete a Bachelor of
    Science in Nursing (BSN) within the next two years, positioning herself for a charge nurse or nurse manager position on her unit. In that capacity, she hopes to design and implement stress‑reduction
    programs for staff, mentor newly hired nurses, and champion patient‑safety initiatives. Additionally, Mari is interested in expanding her community outreach by coordinating health‑education workshops
    for the Vietnamese senior population in Moreno Valley, focusing on chronic disease prevention and navigation of the healthcare system. Her long‑term ambition is to leave a legacy of compassionate, organized
    care that supports both patients and coworkers.
