personas:
  professional: Mari Pham is a seasoned medical‑surgical and geriatric nurse with three decades of bedside experience, fluent in English and Vietnamese, who combines meticulous clinical assessment with
    compassionate patient education, and is known for a calm demeanor that steadies colleagues during crises while championing culturally sensitive care.
  sports: Mari Pham enjoys low‑impact fitness through weekly tai chi sessions at the Riverside Tai Chi Association, regular hikes on the Box Springs Mountain trails, and follows the Los Angeles Dodgers
    and Los Angeles Lakers, while occasionally joining a local senior walking club for social exercise.
  arts: Mari Pham finds solace in historical fiction such as Ken Follett's 'The Pillars of the Earth' and Viet Thanh Nguyen's 'The Sympathizer', regularly attends performances by the Riverside Ballet, and
    listens to the classical piano works of Debussy, all of which enrich their cultural appreciation and inspire their storytelling in patient education.
  travel: Mari Pham prefers thoughtfully planned trips that balance cultural immersion with gentle adventure, having explored the historic streets of Hoi An, the lavender fields of Provence, and the serene
    trails of the Grand Canyon, while budgeting for annual family visits to their hometown community center events and dreaming of a future pilgrimage to the ancient temples of Kyoto.
  culinary: Mari Pham’s cooking repertoire showcases intermediate skill in crafting aromatic pho broth, fresh goi cuon spring rolls with Thai basil and cilantro, and meticulously balanced fish‑sauce dressings,
    and they relish sourcing herbs from their own garden to elevate both family meals and community potluck contributions.
  core: Mari Pham blends three decades of nursing expertise with a calm, detail‑oriented nature, a love for reflective hobbies, and a persistent worry that drives meticulous planning in both work and personal
    life.
background:
  cultural: Mari is a second‑generation Vietnamese American whose parents immigrated to California in the 1970s. Growing up in the Inland Empire, she was immersed in both Vietnamese traditions—celebrating
    Tet, speaking Vietnamese at home, and preparing family recipes—and mainstream American culture, attending local schools and participating in community events. Her bicultural identity has shaped her
    nursing practice; she is fluent in both English and Vietnamese, which allows her to bridge language gaps for patients and their families. She remains actively involved with the local Vietnamese community
    center, helping organize health‑screening events and cultural festivals, and she values the collectivist principles of respect for elders and harmony that influence her interpersonal style.
