  hobbies: '["Hiking in the Arbuckle Mountains", "Traditional beadwork and basket weaving", "DIY metal sculpture", "3D printing hobby projects", "Playing drums in a local band", "Reading science‑fiction
    literature", "Attending makerspace workshops"]'
  career_goals: She aims to become a senior production supervisor within the next five years, leading a team that integrates advanced manufacturing technologies such as 3‑D metal printing. Jazzmond plans
    to earn AWS Certified Welder and CNC Programming certifications, and eventually open a small boutique workshop that offers custom metal‑art and precision plastic parts. Her competitive drive pushes
    her to benchmark performance metrics and continuously improve process efficiency, positioning her for future roles in operations management.
