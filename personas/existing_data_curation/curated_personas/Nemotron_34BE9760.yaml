personas:
  professional: Jack Fuller, a retired regional sales and marketing veteran turned community arts strategist, leverages three decades of strategic planning, financial analysis, and relationship building
    to mentor small businesses and design senior-friendly art workshops, while his relaxed, sometimes disorganized style and curiosity for emerging media keep his consulting approach fluid yet occasionally
    chaotic.
  sports: Jack Fuller enjoys kayaking and paddleboarding on the St. Johns River with the Jacksonville Kayak Club, goes on seasonal fishing trips for snook, and loyally follows the Jacksonville Jaguars,
    the Jacksonville Jumbo Shrimp, and the local beach volleyball scene, while his relaxed attitude sometimes leads him to skip his weekly fitness routine.
  arts: Jack Fuller, an avid amateur photographer of seascapes and historic architecture and a watercolorist, volunteers at the Jacksonville Beach Art League, regularly attends jazz concerts featuring artists
    like John Coltrane, local theater productions at Riverside Theatre, and gallery openings showcasing works by Monet and regional Florida painters, which together fuel his desire to craft senior‑focused
    art appreciation workshops.
  travel: Jack Fuller dreams of standing before the Mona Lisa at the Louvre, strolling the Uffizi's Renaissance halls, and exploring the Getty's modern collections, while also planning relaxed road trips
    to the historic streets of Savannah and the tranquil beaches of the Florida Keys, balancing his love of culture with a cautious budget and a need for low‑stress itineraries.
  culinary: Jack Fuller delights in cooking seafood dishes like grilled grouper with citrus‑herb salsa, shrimp étouffée seasoned with Old Bay, and crab cakes garnished with mango relish, often sourcing
    fresh catches from local fish markets and incorporating herbs from his native coastal garden, though he sometimes over‑spices in an attempt to replicate restaurant flavors.
  core: Jack Fuller is a curiosity‑driven, retired sales strategist who blends artistic passion with coastal living, mentoring, modest investing, and a habit of occasional disorganization that keeps life
    both vibrant and slightly chaotic.
background:
  cultural: Jack grew up in a middle‑class, post‑war family in the American South, where a combination of Southern hospitality and the emerging modernist culture of the 1960s shaped his worldview. He attended
    public schools in Florida, where exposure to the state's diverse population and tourism economy fostered an appreciation for different perspectives. His bachelor's degree in business from a state university
    reinforced a pragmatic, self‑reliant ethos, while his years living on Jacksonville Beach have ingrained a laid‑back, ocean‑inspired lifestyle. Though ethnically white, he values multicultural expression,
    especially through visual arts, and his personal history—marriage, divorce, and a career transition into community arts—reflects a blend of traditional values and a progressive curiosity.
