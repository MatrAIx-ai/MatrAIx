  career_goals: Although retired from full‑time employment, Jack aims to remain active in his community by mentoring small local businesses and offering strategic guidance to craft‑based entrepreneurs.
    He hopes to develop a series of art‑appreciation workshops tailored for senior citizens, serve on the board of the Jacksonville Beach Art League, and eventually write and self‑publish a memoir that
    weaves together his business experiences, personal reflections, and love of art. A secondary ambition is to travel to a handful of world‑renowned museums—such as the Louvre, the Uffizi, and the Getty—to
    deepen his knowledge of contemporary and historic art, while maintaining financial stability and reducing stress through mindful budgeting and wellness practices.
