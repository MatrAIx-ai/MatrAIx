personas:
  professional: Mario Silva, a retired carpenter and community volunteer, leverages his meticulous carpentry skills, bilingual fluency, and knack for budgeting to organize senior‑center workshops and oversee
    small home‑renovation projects, embodying his preference for structure and reliability.
  sports: Mario Silva is an avid follower of baseball, cheering for the New York Yankees each spring and joining a local senior baseball league that meets on weekends, while also participating in low‑impact
    community walking clubs to stay fit.
  arts: Mario Silva finds solace in reading historical fiction by authors such as Hilary Mantel and biographies of political figures, and enjoys listening to classic boleros and the rhythmic tones of merengue
    during kitchen prep, allowing his appreciation for storytelling and music to enrich his reflective evenings.
  travel: Mario Silva prefers thoughtfully planned trips that balance cultural immersion with comfort, having explored New Orleans' jazz scene and the historic Hudson Valley, and now yearns to revisit the
    Caribbean island of his family's origins, aiming to blend family reconnection with leisurely sightseeing.
  culinary: Mario Silva excels at preparing traditional dishes like sancocho, mangú, and arroz con pollo, skillfully seasoning with cilantro, ají dulce, and plantain leaves, while also experimenting with
    garden‑fresh vegetables to keep his meals both nostalgic and nutritionally balanced.
  core: Mario Silva blends a disciplined, structure‑loving mindset with a quiet love for gardening, cooking, and community service, occasionally slipping into forgetfulness about appointments but always
    returning to his trusted routines.
background:
  cultural: Mario was born in the Dominican Republic and migrated to the United States in the early 1970s, settling in New England. He retains strong ties to Dominican culture through language, music, food,
    and celebration of holidays such as Dominican Independence Day and Semana Santa. Spanish is spoken at home, and he often enjoys merengue and bachata music with his family. While embracing New Hampshire's
    seasonal rhythms and community spirit, he blends these influences by participating in local church activities, supporting neighborhood initiatives, and sharing Dominican traditions with his friends
    and neighbors. His cultural identity is marked by a deep respect for family, hospitality, and the resilience of his immigrant experience.
attributes:
  skills: '[''Carpentry'', ''Home Maintenance'', ''Budgeting and Personal Finance'', ''Spanish‑English Translation'', ''Traditional Dominican Cooking'', ''Volunteer Coordination'', ''Gardening and Landscaping'']'
