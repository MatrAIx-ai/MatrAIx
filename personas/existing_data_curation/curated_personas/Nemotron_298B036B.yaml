  hobbies: '[''Hiking'', ''Landscape Photography'', ''Reading Nonfiction (Technology, Urban Development, Mexican History)'', ''Cooking Mexican Cuisine'', ''Acoustic Guitar Playing'', ''Small‑Group Board
