personas:
  professional: Jose Moralesrodriguez leverages a STEM bachelor’s degree and bilingual fluency to deliver precise real‑estate valuations for DeKalk County, blending GIS mapping, Python predictive scripts,
    and traditional appraisal techniques while navigating a relaxed, occasionally disorganized workflow that reflects their curiosity‑driven yet practical mindset.
  sports: Jose Moralesrodriguez enjoys low‑impact fitness, hiking the Piedmont Park and Chattahoochee River trails weekly, playing casual soccer with the local Atlanta Highlands FC adult league, and follows
    the Atlanta Falcons (NFL) and Atlanta United (MLS) for professional sports, preferring flexible, small‑group activities over competitive training.
  arts: Jose Moralesrodriguez plays acoustic guitar, favoring gentle folk tunes reminiscent of Gillian Welch, John Denver, and Sufjan Stevens, captures urban and natural landscapes with a Nikon DSLR inspired
    by Ansel Adams’ composition, and engages in a multicultural board‑game circle where they discuss strategy over titles like Root and Wingspan, while occasionally attending local art exhibitions featuring
    street muralists.
  travel: Jose Moralesrodriguez favors photography‑focused getaways, having trekked the historic squares of Savannah, taken weekend road trips to Asheville’s Blue Ridge Mountains, and dreaming of wandering
    the colonial streets of Cartagena and the vibrant markets of Oaxaca to capture cultural textures and color palettes for future projects.
  culinary: Jose Moralesrodriguez experiments in the kitchen by hand‑rolling corn‑tortilla tacos, slow‑cooking pork wrapped in banana leaves, and simmering a tangy tomatillo salsa, blending modest cooking
    tools with cherished family recipes that celebrate bold, smoky flavors, often sharing these dishes during board‑game nights with friends.
  core: Jose Moralesrodriguez is a data‑driven property specialist who balances solitary hikes, folk guitar, and community bilingual service, navigating a relaxed yet sometimes chaotic routine while staying
    rooted in curiosity, practicality, and a quiet determination.
background:
  cultural: Jose is a first‑generation American of Mexican descent. He grew up in a bilingual household where family gatherings centered around shared meals, music, and celebrations like Día de los Muertos
    and Mexican Independence Day. These traditions instilled in him a strong sense of community, respect for elders, and an appreciation for cultural diversity. While living in Atlanta, he actively maintains
    his heritage by cooking family recipes, listening to regional Mexican music, and staying connected with relatives in Mexico through regular video calls. His cultural roots shape his cooperative nature,
    his desire to help Spanish‑speaking neighbors navigate property matters, and his pride in bridging Mexican and Southern U.S. cultures.
