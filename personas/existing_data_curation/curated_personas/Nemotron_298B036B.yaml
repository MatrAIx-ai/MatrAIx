  career_goals: Jose aims to become a senior certified appraiser within DeKalk County, earning the Certified Residential Appraiser (CRA) designation and eventually the Certified General Appraiser license.
    He envisions leading a data‑driven appraisal team that integrates predictive analytics to improve accuracy and equity in property tax assessments. Over the next five years, he plans to pursue a master’s
    degree in Real Estate and Urban Planning to broaden his policy expertise, with a long‑term ambition to consult for municipal governments on fair‑housing initiatives and to mentor junior appraisers from
    underrepresented backgrounds.
