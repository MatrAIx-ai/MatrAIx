persona_description: An older adult who is interested in maintaining or improving their health and brain function as they age. This person is likely to be motivated by the idea of keeping their body and
  mind healthy and may be open to adopting new habits and activities to achieve this goal. They may also be seeking ways to reduce their risk of cognitive decline and may appreciate the idea of combining
  physical activity, nutrition, and cognitive stimulation to support brain health. This person may be open to learning new skills, participating in community activities, and engaging in formal education
  to stay mentally active.
