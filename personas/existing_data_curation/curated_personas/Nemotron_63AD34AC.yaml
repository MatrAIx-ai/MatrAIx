    ''Attending art workshops'', ''Trying new foods'']'
  career_goals: Ramon dreams of a future where he can blend creativity with helping others. He imagines becoming a space‑exploration artist who paints the cosmos, an architect designing playful public spaces
    for kids, a video‑game developer who crafts educational adventures, or a museum curator who brings art to life for visitors. His ambition is to keep exploring new ideas and find a career that lets him
    share his love of art, science, and community.
