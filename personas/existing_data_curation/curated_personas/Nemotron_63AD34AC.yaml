personas:
  professional: Ramon is an aspiring junior illustrator who spends weekends sketching characters from graphic novels while building intricate LEGO scenes, channeling their curiosity into a habit of turning
    everyday observations into playful designs.
  sports: Ramon is an energetic park explorer who joins the school’s after‑school soccer program, cheers for the New York Yankees during weekend games, plays pick‑up basketball at the local community center,
    and prefers spontaneous scrimmages over strict training schedules.
  arts: Ramon is a budding art enthusiast who spends Saturday mornings at the Children’s Museum of Manhattan, studies murals by Banksy and works by Andy Warhol on city walls, collects Marvel graphic novels,
    and listens to a mix of classic rock icons like Queen and modern pop stars such as Taylor Swift while doodling.
  travel: Ramon is a curious explorer who loves weekend trips to Central Park’s zoo, a yearly family vacation to Washington, D.C.’s Smithsonian museums, day trips to Brooklyn’s street‑art alleys, and dreams
    of visiting Tokyo’s anime districts and the LEGO House in Billund, preferring spontaneous adventures over rigid itineraries.
  culinary: Ramon is a food‑adventurer who swaps between pepperoni pizza slices at a neighborhood pizzeria, savory pork dumplings at a Chinatown stall, and churros from a street cart, often trying to recreate
    the flavors at home by mixing cheese, tomato sauce, soy sauce, and a dash of cinnamon.
  core: Ramon is a curious, disorganized 8‑year‑old illustrator‑in‑training who balances LEGO towers, graphic novels, and a love for city street food while navigating school life with a calm, cooperative
    spirit and a habit of forgetting homework.
background:
  cultural: Ramon was born and raised in Manhattan’s lively, multicultural environment. While his family’s heritage traces back to European roots, they celebrate traditional American holidays and also embrace
    the city’s cultural mosaic—exposing him to a variety of languages, cuisines, and artistic expressions. Growing up in New York City’s diverse neighborhoods, he experiences a blend of family traditions
    and urban cultural influences, shaping his open‑minded and appreciative outlook.
