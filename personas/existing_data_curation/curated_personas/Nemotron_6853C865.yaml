  career_goals: In the next three to five years William aims to earn his Bachelor of Business Administration while advancing to a senior sales representative role. He seeks to become a regional sales manager,
    leading a multicultural team and championing inclusive sales strategies. Long‑term, he envisions launching his own consultancy that merges sustainable manufacturing solutions with creative branding,
    leveraging his artistic sensibility to help clients differentiate in the market. Throughout his career, he intends to mentor emerging Black professionals in sales, sponsor community youth programs,
    and contribute to initiatives that promote ethical sourcing and environmental responsibility.
