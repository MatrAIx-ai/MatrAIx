  career_goals: Although currently not in the formal workforce, Joseph aims to formalize his woodworking hobby into a modest side business selling handcrafted pieces at local markets. He plans to earn his
    GED to broaden his opportunities and to volunteer at the community center, teaching basic DIY skills to teens and seniors. He also hopes to join the Bartow County historical society to contribute his
    research on local heritage, while maintaining his health through regular walking and gardening.
