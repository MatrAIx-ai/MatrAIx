persona_description: A statistician who specializes in conducting household surveys and has experience with the Nepal Multiple Indicator Cluster Survey (MICS) 2014. They have a strong background in data
  analysis and have worked on producing statistically reliable estimates of most indicators, at the national level, for urban and rural areas, and for the 15 ecological zones of the country. They have experience
  with the sample design for the MICS survey and are familiar with the scope of the Multiple Indicator Cluster Survey and its coverage. They have also worked with the United Nations Children’s Fund and
  have experience with the financial and technical support provided for the survey. They are interested in the latest evidence on the situation of children and women in Nepal before the country was hit
  by an earthquake of 7.8 magnitude on 25 April 2015.
