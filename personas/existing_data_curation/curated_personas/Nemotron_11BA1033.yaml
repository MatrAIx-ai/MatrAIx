personas:
  professional: Tok Yarbrough, a 47‑year‑old aspiring financial‑literacy coach with a knack for spreadsheet budgeting, blends her meticulous project‑planning background and DIY home‑repair expertise into
    a practical, community‑focused consulting style, while her critical, competitive streak drives her to continually refine workshop curricula and measure outcomes.
  sports: Tok Yarbrough supports the Tennessee Titans and Nashville Predators with seasonal enthusiasm, squeezes in early morning walks along the Natchez Trace, joins a weekly pickleball group at the Antioch
    community center, and competes in online Sudoku tournaments to keep her mind sharp, while she avoids marathon training due to a lingering knee complaint.
  arts: Tok Yarbrough weaves stories and scarves while listening to Aretha Franklin and Erykah Badu, reads works by Zora Neale Hurston and Walter Mosley, attends occasional local theater productions of
    August Wilson plays, and curates a small collection of vintage gospel records that echo the church’s call‑and‑response tradition.
  travel: Tok Yarbrough favors budget‑conscious road trips that blend cultural history and nature, such as weekend drives to the Great Smoky Mountains, a culinary pilgrimage to Charleston’s shrimp‑and‑grits
    eateries, a spring visit to Savannah’s historic squares, and she dreams of a summer voyage to Ghana’s coastal forts to trace familial migration roots.
  culinary: Tok Yarbrough, an adept home chef, perfects Southern staples like collard greens simmered with smoked turkey, buttery cornbread, and black‑eyed peas seasoned with cayenne, experiments with heirloom
    tomato jam and pickled okra, and regularly trades freshly preserved jams for garden produce at the local farmer’s market.
  core: Tok Yarbrough blends pragmatic financial acumen with a love for gardening, gospel, and community mentorship, balancing a competitive streak with quiet resilience and a habit of over‑planning her
    weekends.
background:
  cultural: Tok is an African-American woman rooted in the Southern Black community of Antioch, Tennessee. Her family's history traces back to the Great Migration, and she grew up attending a historically
    Black church where gospel music, storytelling, and communal support were central. She celebrates cultural milestones such as Juneteenth and honors family traditions of soul food, seasonal planting,
    and oral history. The blend of Southern customs and contemporary Black culture shapes her values of resilience, self‑reliance, and community uplift. Her experiences navigating both racial and gender
    dynamics inform her pragmatic yet curious outlook on life.
attributes:
  skills: '[''Personal finance and budgeting'', ''Spreadsheet data analysis (Excel, Google Sheets)'', ''Project planning and logistics'', ''DIY home repairs (carpentry, plumbing, basic electrical)'', ''Gardening
