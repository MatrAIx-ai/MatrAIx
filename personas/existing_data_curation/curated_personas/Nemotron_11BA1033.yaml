  hobbies: '[''Reading historical biographies and mystery novels'', ''Gardening vegetables and native plants'', ''Knitting and crocheting'', ''Southern cooking and food preservation'', ''Crossword, Sudoku,
    and chess puzzles'', ''Online learning (finance, entrepreneurship, horticulture)'', ''Participating in small book clubs and gardening workshops'']'
  career_goals: Tok aims to leverage her finance and organizational strengths to secure a part‑time role as a financial‑literacy coach with a local nonprofit, helping low‑income families build budgeting
    skills. Over the next five years she plans to complete a bachelor's degree in Business Administration and obtain a Certified Financial Planner (CFP) certification. Long‑term, she aspires to launch a
    home‑based consulting business that offers budgeting workshops, DIY home‑maintenance training, and small‑scale gardening services. She also hopes to become a recognized community resource for practical
    life‑skills education.
