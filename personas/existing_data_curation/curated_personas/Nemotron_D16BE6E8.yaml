personas:
  professional: Doris Henderson, a 39‑year‑old automotive service technician in rural Alabama, merges razor‑sharp diagnostic expertise with a flair for custom paint‑by‑numbers, and they lead a disciplined
    shop routine that documents every repair while inspiring apprentices with a blend of precision and imagination.
  sports: Doris Henderson follows the Atlanta Falcons and Birmingham Barons, participates in a local car‑club’s weekend track‑day events at Talladega Superspeedway, and they balance this high‑octane enthusiasm
    with regular yoga sessions at a community studio and occasional sunrise hikes in the nearby Appalachian foothills.
  arts: Doris Henderson draws inspiration from sci‑fi illustrators like H.R. Giger and classic car photographers such as Ken Brown, listens to Pink Floyd while hand‑painting custom finishes, and they spend
    quiet evenings sketching vehicle concepts after attending the Birmingham Museum of Art’s modern sculpture exhibit.
  travel: Doris Henderson’s travel style blends meticulous planning with spontaneous road‑trip cravings, having driven the Pacific Coast Highway to attend the Pebble Beach Concours, dreaming of a future
    tech tour of Tokyo’s EV showrooms, while they keep family vacations focused on regional classic‑car rallies in the Southeast due to budget constraints.
  culinary: Doris Henderson enjoys crafting herb‑infused grilled chicken with fresh rosemary and smoked paprika, sides of collard greens, they experiment with a homemade sourdough starter on weekends, and
    they indulge in a nightly bowl of shrimp and grits after a long day in the shop.
  core: Doris Henderson fuses meticulous automotive mastery with boundless artistic imagination, and they navigate stress‑filled workdays through yoga, disciplined budgeting, and a relentless pursuit of
    creative customizations.
background:
  cultural: Doris grew up in Cusseta, a small town in Lee County, Alabama, where Southern hospitality and close‑knit community values shaped her worldview. Her family emphasized self‑reliance, hands‑on
    work, and a strong work ethic, traditions that naturally led her to the automotive trade. Regular church gatherings, family barbecues, and local festivals reinforced her sense of belonging and gave
    her a deep appreciation for Southern cuisine and music. While rooted in these traditions, Doris is also open to modern influences, integrating contemporary automotive innovations with the practical,
    down‑to‑earth mindset of her upbringing.
