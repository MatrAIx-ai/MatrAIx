    and OSHA standards'', ''Time management and workflow scheduling'']'
  hobbies: '[''Custom automotive painting'', ''Sketching and design'', ''Car photography'', ''Attending auto shows'', ''Model car building'', ''DIY electronics projects'', ''Reading science fiction novels'',
    ''Yoga and meditation'', ''Gardening'', ''Community volunteering in automotive skills workshops'']'
  career_goals: Driven by her achievement‑focused nature, Doris aims to become an ASE Master Technician and eventually open her own boutique auto shop that blends high‑performance repairs with artistic
    customization. She aspires to lead a small team of apprentices, mentoring them with the same disciplined, detail‑oriented standards she values. Doris also plans to develop a niche expertise in electric‑vehicle
    conversions and sustainable automotive solutions, positioning herself as a forward‑thinking authority in her rural Alabama community. Long‑term, she hopes to publish a blog showcasing her creative restoration
    projects and to speak at regional automotive conferences, sharing both technical knowledge and her unique artistic perspective.
