personas:
  professional: Celia Malagon is a front‑of‑house specialist at a Southern California entertainment venue, leveraging bilingual fluency, meticulous scheduling, and a competitive edge to streamline ticketing,
    crowd control, and team leadership while balancing innovative event concepts with proven operational protocols, and they consistently follow through on commitments with methodical precision.
  sports: Celia Malagon is an avid hiker with the San Gabriel Trailblazers, a regular participant in yoga classes, a devoted fan of the LA Lakers, LA Dodgers, and LA Galaxy, and also plays beach volleyball
    with the Venice Beach Volleyball Club during summer months, channeling their competitive nature into both personal fitness and team sports.
  arts: Celia Malagon is a salsa and bachata enthusiast who teaches beginners, frequently attends performances by Marc Anthony, Bad Bunny, and Celia Cruz, volunteers at community festivals featuring Los
    Rumberos, and enjoys the theatrical flair of Lin‑Manuel Miranda’s Hamilton, allowing their sociable energy to blend with a deep appreciation for rhythmic and lyrical artistry.
  travel: Celia Malagon prefers a blend of cultural immersion and adventure, meticulously planning trips that combine weekend hikes in the Santa Monica Mountains, visits to the historic streets of Old San
    Juan during the San Juan Festival, and future aspirations to explore Cartagena’s colonial architecture and Kyoto’s cherry‑blossom temples, balancing curiosity with practical budgeting.
  culinary: Celia Malagon is a proficient home cook who masters traditional dishes such as mofongo, arroz con gandules, and tembleque, often seasoning with sofrito, plantains, and adobo, while also experimenting
    with sushi rolls and Mexican street‑taco toppings during gatherings, showcasing their organized yet experimental approach to cuisine.
  core: Celia Malagon blends disciplined organization with vibrant sociability, channeling a competitive spirit into event management, dance instruction, and meticulous budgeting, yet sometimes succumbs
    to impulsive memorabilia splurges that they rationalize as personal enrichment.
background:
  cultural: Celia was raised in a Puerto Rican household that emphasized close family ties, Catholic traditions, and vibrant celebrations such as La Fiesta de San Juan. Bilingual from childhood, she grew
    up listening to salsa, bomba, and plena music, which shaped her love for dance and rhythm. Her family’s roots in Puerto Rico remain a central part of her identity, influencing her cooking, holiday customs,
    and her desire to incorporate Puerto Rican heritage into the entertainment experiences she helps create.
