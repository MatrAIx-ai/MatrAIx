  hobbies: '[''Salsa dancing'', ''Bachata dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking'', ''Yoga'', ''Volunteering at cultural festivals'', ''Attending live music events'', ''Online competitive
    gaming'']'
  career_goals: Celia aims to advance from an attendant role to a senior event‑manager position within the next five years, eventually overseeing larger venues such as convention centers or entertainment
    complexes in Southern California. She plans to obtain a Certified Meeting Professional (CMP) credential and enroll in an associate‑degree program in hospitality management. Long‑term, she hopes to launch
    her own boutique event‑planning business that highlights multicultural festivals, especially those celebrating Puerto Rican culture, and to mentor new entrants in the industry.
