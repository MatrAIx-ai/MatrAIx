  career_goals: Robert dreams of becoming a civil engineer or a robotics designer, envisioning a future where he can build bridges, design rockets, or create functional robots. He is eager to join his school's
    robotics club, win science‑fair projects, and someday serve as captain of his basketball team, using competition as motivation to improve his skills.
