personas:
  professional: Robert Hunt, a budding junior engineer, channels their curiosity and practicality to design intricate LEGO models that solve playful engineering challenges, favoring flexible, improvisational
    building over strict step‑by‑step instructions while still applying systematic problem‑solving skills.
  sports: Robert Hunt, an energetic member of the community center’s after‑school basketball league, frequently shoots hoops to hone quick reflexes, roots for the Los Angeles Lakers and follows the NBA
    season, yet prefers informal desert‑trail running over structured sports, embodying a competitive streak tempered by a laid‑back approach to scheduled practice.
  arts: Robert Hunt, a creative enthusiast who spends weekends drawing comic‑style heroes inspired by Stan Lee and crafting LEGO dioramas reminiscent of Miyazaki’s whimsical worlds, actively participates
    in the school art club and eagerly watches YouTube science channels for artistic inspiration, blending curiosity with practical design skills.
  travel: Robert Hunt, an adventurous explorer who loves to map out spontaneous desert trail excursions near home, has visited the Grand Canyon and dreams of trekking the Sahara, prefers packing a small
    backpack with snacks and a sketchbook over elaborate itineraries, and balances family‑guided trips to Disneyland with solo day‑trips to local rock‑collecting sites.
  culinary: Robert Hunt, a budding snack chef, enjoys assembling DIY nacho plates with melted cheddar, jalapeños, and black beans, attempts simple microwave mug cakes flavored with cocoa and banana, and
    loves the tangy zest of lime in fruit smoothies, yet often forgets to drink enough water after playing video games.
  core: Robert Hunt is a curious, competitive nine‑year‑old who builds LEGO kingdoms, explores desert trails, and balances a disciplined saving habit with occasional video‑game splurges, all while staying
    emotionally steady and occasionally forgetting to water their plants.
background:
  cultural: Robert comes from a white, middle‑class family that has lived in the Central Valley region of Southern California for generations. His parents work in local agriculture and trade, and family
    gatherings often feature community potlucks, county fairs, and outdoor barbecue events typical of the area. He attends a public elementary school in Lancaster, where he interacts with a diverse student
    body, gaining exposure to Hispanic, Asian, and other cultures, while his household celebrates traditional American holidays and seasonal local festivities.
