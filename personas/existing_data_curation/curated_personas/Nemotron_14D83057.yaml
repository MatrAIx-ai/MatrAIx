    and failure analysis'', ''Project management'', ''Cross‑functional team leadership'']'
  hobbies: '[''Contemporary art gallery visits'', ''Photography (industrial and macro)'', ''DIY electronics projects (modular synths, custom keyboards)'', ''Science‑fiction and philosophy reading'', ''Book‑club
    participation'', ''Hiking New England trails'', ''Kayaking on the Providence River'', ''Cooking (international cuisines)'', ''Community hack‑hacks merging tech and art'']'
  career_goals: In the next five years Edmond aims to transition into a senior leadership role such as Director of Hardware Engineering or Technical Fellow, where he can steer strategic R&D initiatives.
    He is particularly interested in pioneering sustainable hardware solutions for the Internet of Things and exploring emerging domains like quantum‑compatible circuitry. He also hopes to obtain multiple
    patents, publish technical papers, and become a frequent speaker at industry conferences. Long‑term, he envisions founding a boutique consultancy that blends cutting‑edge engineering with artistic design,
    helping startups create visually striking, environmentally responsible products.
