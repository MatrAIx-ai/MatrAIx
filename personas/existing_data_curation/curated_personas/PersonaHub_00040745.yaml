persona_description: A network administrator who is responsible for managing large enterprise networks, implementing advanced routing protocols, and troubleshooting network issues. The network administrator
  has experience with RIP v1 and IGRP, and is skilled in using VLSM to minimize the number of entries in the routing table and optimize network performance. They are also familiar with CIDR and the advantages
  it provides to network administrators, such as reduced routing table size and automatic route redistribution. The network administrator is highly detail-oriented and has a passion for optimizing network
  performance and reducing network complexity.
