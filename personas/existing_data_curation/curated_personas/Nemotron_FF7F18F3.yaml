personas:
  professional: Carlos Pardo, an aspiring community development practitioner, blends bilingual communication, peer counseling expertise, and visual storytelling using Photoshop and Canva to craft youth
    outreach initiatives that fuse mural art with mental‑health advocacy, reflecting their sociable, compassionate, and organized nature, and they bring a lively presence to team meetings.
  sports: Carlos Pardo, an avid pickup soccer player and enthusiastic salsa dancer, stays fit through weekly neighborhood matches and dance sessions, while cheering on the Chicago Bulls and Chicago Fire,
    embodying a social, flexible approach to fitness that favors community over solitary workouts, and they never miss a chance to celebrate a win.
  arts: Carlos Pardo, a street‑art enthusiast who sketches murals inspired by Banksy's subversive style, strums acoustic renditions of classic Latin songs by Juanes, devours indie films like Parasite and
    Amélie, and reads graphic novels such as Maus, weaving visual storytelling into their everyday identity, and they often share their sketches on social media.
  travel: Carlos Pardo, a budget‑conscious explorer, has photographed the vibrant streets of New Orleans, soaked in the murals of Oaxaca, and marveled at Barcelona’s modernist architecture, while dreaming
    of future trips to Kyoto’s temples and Buenos Aires’ tango halls, and they meticulously plan each itinerary down to the last bus schedule.
  culinary: Carlos Pardo, a modest home chef, whips up fresh guacamole and salsa for friends, savors tacos al pastor and arepas on street‑food outings, experiments with pho broth using star anise and ginger,
    and appreciates a well‑crafted espresso, reflecting a palate that blends Latin flavors with global comfort foods, and they love to host potluck evenings for friends.
  core: Carlos Pardo, a gregarious 19‑year‑old who melds art, advocacy, and acoustic guitar into a daily rhythm, can’t resist late‑night sketch sessions, habitually overbooks community events, and occasionally
    forgets to eat while chasing the next mural.
background:
  cultural: Carlos is a second-generation Hispanic American whose parents immigrated from Mexico. He grew up in a bilingual household in Marysville, Ohio, where Spanish was spoken at home and English at
    school. Family traditions such as Dia de los Muertos, preparing tamales for holidays, and listening to mariachi music remain central to his identity. At the same time, he embraces Midwestern customs,
    celebrating Thanksgiving and participating in local community events. His dual cultural lens drives his passion for bridging gaps between the Hispanic community and the broader town, often acting as
    a cultural translator in school clubs, volunteer programs, and neighborhood projects.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Public speaking and presentation'', ''Empathy-driven peer counseling'', ''Conflict mediation'', ''Event planning and promotion'', ''Digital illustration
