  hobbies: '[''Sketching and street-art design'', ''Mural painting'', ''Playing acoustic guitar'', ''Salsa dancing'', ''Pickup soccer games'', ''Photography of urban scenes'', ''Watching indie and foreign
    films'', ''Reading graphic novels'', ''Volunteering as a Spanish tutor'', ''Organizing cultural festivals'']'
  career_goals: Carlos aims to pursue an associate's degree in Social Work or Community Development at a nearby community college, with the long-term goal of becoming a licensed social worker specializing
    in youth outreach in his hometown. He also hopes to combine his artistic talent with his community focus by creating public murals that celebrate local heritage and promote mental-health awareness.
    In the future, he envisions working for a non-profit organization that integrates arts programming with social services, and eventually leading initiatives that empower Hispanic youth in the Midwest.
