personas:
  professional: Quiana Dixon is a retired community organizer turned cultural ambassador in Sabine Parish, leveraging their meticulous budgeting skills, charismatic public speaking, and love for intergenerational
    storytelling to coordinate senior‑center events, church fundraisers, and local arts festivals with precision and flair.
  sports: Quiana Dixon enjoys low‑impact fitness through a weekly senior walking club and occasional senior‑friendly tennis at the local community center, while passionately cheering for the LSU Tigers
    football team and the New Orleans Pelicans, and they never miss the annual youth baseball showcase at the parish field.
  arts: Quiana Dixon is a frequent visitor to regional art galleries featuring works by local painter Marie LeBlanc, a regular attendee of live jazz concerts headlined by Wynton Marsalis and gospel performances
    by the Riverbend Choir, and they channel their creativity through quilting vibrant patchwork blankets inspired by classic American folk art.
  travel: Quiana Dixon prefers short, well‑planned trips that blend culture and relaxation, such as weekend getaways to New Orleans for Mardi Gras jazz festivals, historic tours of Savannah’s squares, and
    occasional river cruises along the Mississippi, always booking through their trusted travel agent to accommodate their mobility needs.
  culinary: Quiana Dixon loves experimenting with Creole cuisine, perfecting dishes like jambalaya, chicken and sausage gumbo, and shrimp étouffée, using ingredients such as Andouille sausage, okra, and
    file powder, and they enjoy sharing their culinary experiments at community potlucks despite occasionally over‑seasoning their dishes.
  core: Quiana Dixon blends relentless curiosity with steadfast organization, turning every social gathering into a meticulously planned celebration while delighting in jazz, genealogy, and a habit of forgetting
    to water their heirloom tomatoes.
background:
  cultural: Quiana was born and raised in the Deep South, growing up in Many, Louisiana, within a close‑knit African‑American community. Her upbringing was shaped by church traditions, the rich musical
    legacy of gospel, blues, and jazz, and the communal rituals of potluck gatherings and storytelling. She lived through the civil‑rights movement, which instilled a deep sense of perseverance and community
    solidarity. These experiences influence her values of harmony, collective progress, and a reverence for the cultural arts that celebrate Black Southern heritage.
