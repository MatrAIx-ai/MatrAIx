  career_goals: Although retired from the formal workforce, Quiana aims to expand her impact as a cultural ambassador in Sabine Parish. She plans to launch an intergenerational arts program that pairs seniors
    with local youth to explore painting, music, and oral history. She also aspires to document her family’s narrative through a memoir and to master digital photography so she can capture and share the
    community’s visual heritage online.
