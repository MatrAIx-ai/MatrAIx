personas:
  professional: Luis Rosado, a budding tech‑savvy teen, merges his methodical problem‑solving and love for hands‑on tinkering into a budding career path focused on information‑technology apprenticeships,
    where their self‑taught Python skills, bilingual communication, and reserved yet reliable nature make them a natural troubleshooter on small‑team projects.
  sports: Luis Rosado plays weekend pick‑up soccer with friends in the Northside Youth Soccer Club, keeps fit with quick HIIT routines between study sessions, and follows the Seattle Sounders FC for inspiration,
    balancing their love of strategy gaming with a pragmatic, short‑burst cardio habit.
  arts: Luis Rosado creates digital illustrations inspired by classic science‑fiction novels, draws character concepts while the soothing strings of the Andean folk ensemble Los Kjarkas play in the background,
    and relishes synthwave tracks by Kavinsky, weaving together futuristic visuals with traditional melodies.
  travel: Luis Rosado prefers meticulously planned short trips that combine cultural immersion with tech curiosity, having backpacked through the historic streets of Granada, Spain, and dreaming of a future
    journey to Tokyo’s Akihabara district to source rare Arduino components and explore neon‑lit arcades.
  culinary: Luis Rosado enjoys experimenting in the kitchen, mastering dishes such as quinoa ají de gallina stew and causa limeña layered potato terrine, meticulously seasoning with ají amarillo and fresh
    cilantro, while their methodical approach mirrors their programming mindset.
  core: Luis Rosado is a quietly ambitious teen who balances a love for code, circuitry, and Andean aromas, habitually tuning their gaming headset while secretly fearing missed deadlines, making them both
    a meticulous planner and a spontaneous tinkerer.
background:
  cultural: Luis is a first‑generation Peruvian‑American raised in Paterson, New Jersey, a city with a vibrant Latino community. His household speaks Spanish, and he celebrates Peruvian traditions such
    as Inti Raymi, Día de la Canción Andina, and the Señor de los Milagros procession. Growing up, he has access to authentic Peruvian markets and community events that reinforce his Andean heritage while
    navigating an American urban environment. This bicultural upbringing informs his language skills, culinary interests, and strong sense of family and community responsibility.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Basic computer troubleshooting'', ''Elementary Python programming'', ''Electronics tinkering and repair'', ''Cooking traditional Peruvian dishes'', ''Time management
    for personal projects'', ''Basic mathematical problem solving'', ''Effective collaboration in small groups'']'
  hobbies: '[''Playing strategy and RPG video games'', ''Reading science‑fiction novels and tech blogs'', ''Building Arduino projects'', ''Cooking Peruvian recipes (e.g., ceviche, lomo saltado)'', ''Listening
    to Andean folk music'', ''Playing soccer with a small group of friends'', ''Sketching digital art'', ''Attending local Peruvian cultural festivals'']'
  career_goals: Luis aims to earn his GED within the next two years and then pursue a vocational pathway that bridges his technical curiosity with practical stability. He is interested in an apprenticeship
    in information technology or automotive mechanics, with a long‑term goal of becoming a network support specialist or a certified automotive technician. Ultimately, he envisions launching a small business
    that fuses his cultural heritage with modern tech—perhaps a contemporary Peruvian eatery that also offers a community tech hub. These ambitions reflect his desire for financial independence, the ability
    to support his family, and the flexibility to continue learning.
