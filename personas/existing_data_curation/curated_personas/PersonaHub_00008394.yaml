persona_description: A history professor who specializes in the study of military history, particularly the role of Irish soldiers in the British Army during World War I. He is interested in the political
  and social dynamics that shaped the perception of Irish soldiers in the British Army and the impact of the Easter Rising and the War of Independence on Irish military history. He is also interested in
  the political and social implications of the memorialization of Irish soldiers in the British Army during World War I.
