personas:
  professional: Arthur Sumner, a middle‑school student with a growing fascination for mechanical design, applies his love for routine and methodical planning to meticulously assemble model airplane kits
    and solve deep‑strategy video games, developing precision, systematic problem‑solving, and collaborative teamwork that lay the groundwork for a future as an aerospace engineer.
  sports: Arthur Sumner, an eager member of his middle‑school baseball squad who trains six days a week following the disciplined routine of the Cleveland Guardians, also spends his Saturdays fishing on
    the Scioto River to sharpen his patience and hand‑eye coordination, embodying a balanced approach to teamwork and solitary sport.
  arts: Arthur Sumner, who finds inspiration while assembling model airplanes and listening to John Williams’ orchestral scores, regularly watches FliteTest’s YouTube tutorials and collects vintage aviation
    posters, blending his love of precision craftsmanship with a cinematic appreciation for soaring artistry.
  travel: Arthur Sumner, a planner at heart, prefers meticulously organized weekend road trips to nearby Hocking Hills State Park for hiking and fishing, while pinning future itineraries for a family visit
    to Washington, DC’s museums and monuments, illustrating his blend of nature‑focused adventure and structured exploration.
  culinary: Arthur Sumner, who proudly cooks the vegetables he harvests—roasted carrots, sautéed peas, and fresh garden tomato sauce—and perfects the art of grilling his weekend‑caught catfish with a secret
    herb rub, yet habitually adds an extra pinch of salt, reflecting his methodical yet occasionally over‑zealous kitchen approach.
  core: Arthur Sumner, a methodical 13‑year‑old who thrives on routine‑driven hobbies like model building, fishing, and baseball, balances his compassionate volunteer spirit with occasional forgetfulness
    about his glasses and a penchant for over‑salting his meals.
background:
  cultural: Arthur grew up in Chillicothe, Ohio, a modest Midwestern town with strong agricultural and community roots. His family follows traditional values common in the region, emphasizing hard work,
    reliability, and involvement in local events such as the Pike County Fair and high school sports. Raised in a Protestant (United Methodist) household, he regularly attends church services and participates
    in church‑based youth activities. The town’s culture of self‑reliance, neighborly support, and practical problem‑solving has shaped his worldview, reinforcing his preference for routine, his compassionate
    outlook, and his desire to contribute positively to his community.
