  career_goals: Arthur aspires to a career that blends practicality, routine, and service to his community. He is interested in pursuing a skilled trade such as electrician or HVAC technician, valuing the
    structured work environment and the chance to solve concrete problems. At the same time, his desire to help others fuels his goal of becoming a volunteer firefighter or a veterinary assistant, roles
    that let him protect people and care for animals. Long‑term, he envisions a stable, community‑focused profession where his methodical skills and compassion make a lasting positive impact in Chillicothe.
