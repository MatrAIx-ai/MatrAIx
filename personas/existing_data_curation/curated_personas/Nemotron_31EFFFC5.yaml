  hobbies: '[''video gaming (puzzle/strategy)'', ''fishing'', ''outdoor exploration and hunting'', ''Lego construction'', ''basic woodworking (birdhouse building)'', ''journaling and sketching'', ''church
    youth group activities'', ''volunteering at community events'', ''listening to country and folk music'']'
  career_goals: Billy hopes to finish high school and attend a vocational program where he can learn a trade such as automotive technology or electrical work. He envisions a stable, predictable career that
    lets him use his practical problem‑solving skills to help others, perhaps as a skilled tradesperson or a community service volunteer like a paramedic. He also dreams of one day being able to support
    his family and contribute to his hometown’s small‑business community.
