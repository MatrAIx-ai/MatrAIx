personas:
  professional: Billy Frayne is a budding problem‑solver whose love for strategy and puzzle video games sharpens logical thinking and attention to detail, which they channel into meticulous Lego constructions
    and hands‑on woodworking projects, reflecting a practical, structured mindset balanced by a relaxed approach to obligations.
  sports: Billy Frayne enjoys playing on the co‑ed Friendly Wildcats soccer team during fall, spends weekends fishing the nearby streams and joining short hunting trips with dad, and follows the West Virginia
    Mountaineers football team with fervor, especially cheering on their quarterback while also rooting for the Pittsburgh Steelers during the NFL season.
  arts: Billy Frayne delights in listening to folk and country storytellers such as Molly O'Day, The Avett Brothers, and Chris Stapleton, often humming their lyrical narratives while sketching in a journal,
    and expresses creativity through building intricate Lego sets and crafting small wooden birdhouses, which they view as extensions of the region’s storytelling tradition.
  travel: Billy Frayne prefers modest, family‑oriented road trips that blend nature exploration with a touch of adventure—having already visited Shenandoah National Park and the Great Smoky Mountains, they
    dream of attending a video game convention in New York City but balance this with financial limits, often planning spontaneous weekend camping near local state parks.
  culinary: Billy Frayne favors hearty Appalachian fare such as cornbread, fried catfish, bean soup, and apple pie, enjoys cooking simple meals like buttered trout seasoned with lemon and dill alongside
    his dad, and delights in snacking on fresh berries and homemade peanut butter sandwiches, although they occasionally indulge in sugary snack bars during long gaming sessions.
  core: Billy Frayne is a structured yet relaxed 12‑year‑old who balances a love for puzzles, outdoor fishing, and church community with occasional worry‑driven overthinking, a habit of stashing spare change
    in a piggy bank, and a tendency to splurge on limited‑edition Lego sets.
background:
  cultural: Billy comes from a white, rural Appalachian background in Friendly, West Virginia. His family has deep roots in the area, with generations involved in farming, small‑scale trades, and community
    service. The local culture emphasizes self‑reliance, a strong work ethic, and close family ties. He grew up attending a small local church where music, fellowship, and community events such as potlucks
    and the county fair are central. Appalachian storytelling traditions, respect for nature, and a love of outdoor recreation shape his worldview, while modern technology, like computers and video games,
    also plays an important role in his daily life.
