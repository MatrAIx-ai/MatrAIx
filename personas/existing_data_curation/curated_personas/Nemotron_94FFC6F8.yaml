    design using Canva'', ''Volunteer program development'']'
  hobbies: '[''Visiting local art galleries'', ''Street photography in Humble'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and African-American literature'', ''Journaling personal
    reflections'', ''Volunteering at community centers'', ''Cooking soul food recipes passed down by family'', ''Yoga and mindfulness meditation'', ''Attending small book clubs'', ''Participating in Juneteenth
    community gatherings'']'
  career_goals: Cassie aims to complete her bachelor’s degree—either in social work or arts administration—to bridge her passion for community service with her love of the arts. She envisions a career as
    a community arts facilitator, designing and leading youth mentorship programs that use visual art as a tool for empowerment and personal growth. In the longer term, she hopes to become a program manager
    for a nonprofit organization focused on underrepresented populations in the Houston area, where she can shape policy, secure funding, and expand access to creative resources. Her ambition is to create
    spaces where creativity fuels social cohesion and individual resilience.
