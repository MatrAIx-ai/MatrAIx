personas:
  professional: Cassie Elston, a forthcoming community arts facilitator, blends meticulous event planning, digital photography, and empathetic communication to design youth mentorship programs that harness
    visual art for empowerment, drawing on their balanced organization and flexible creativity.
  sports: Cassie Elston, a yoga-loving Houstonian, attends weekly sunrise classes at Buffalo Bayou, jogs with the Run Houston club during spring, cheers on the Houston Rockets and Astros to unwind, and
    joins occasional weekend pickleball games at a community center, balancing low-impact fitness with team spirit.
  arts: Cassie Elston, an avid visitor of the Menil Collection and chronicler of Houston's street murals by artists such as Gonzo and Ali, curates Instagram features of their own watercolor sketches inspired
    by Kehinde Wiley and Ta-Nehisi Coates, and fuels creative evenings with playlists that blend Nina Simone's soulful jazz with the indie folk of Sufjan Stevens.
  travel: Cassie Elston, an inquisitive traveler who saves for modest getaways, has road-tripped to Austin for its live-music scene, explored New Orleans' French Quarter for jazz and gumbo, dreams of strolling
    Montmartre in Paris to sketch the city's light, but most often opts for short weekend retreats to nearby Hill Country vineyards within a four-hour drive.
  culinary: Cassie Elston, a home chef who masterfully prepares collard greens, smoked turkey, and cornbread laced with smoked paprika, balances culinary experimentation with community potlucks, often improvises
    with seasonal heirloom tomatoes and fresh herbs, yet occasionally burns the edges of a roux when caught up journaling.
  core: Cassie Elston blends quiet curiosity and artistic empathy into community service, channeling soul-food flavors and watercolor hues into mentorship, while secretly hoarding mismatched socks and binge-reading
    mystery novels late into the night.
background:
  cultural: Cassie’s cultural identity is rooted in African‑American traditions of the Gulf Coast and Texas. Growing up in a close‑knit black community in Humble, she was immersed in family stories, church
    gatherings, and neighborhood celebrations that emphasized resilience, collective support, and pride in heritage. Music ranging from gospel and soul to contemporary R&B shapes her daily soundtrack, while
    cultural foods—such as collard greens, black-eyed peas, and sweet potato pie—connect her to family roots. Cassie participates in local Juneteenth events, cherishes the oral histories passed down by
    elders, and values the blend of Southern hospitality with the creative expressions of Black art. This background informs her compassionate outlook, her desire to uplift others, and her appreciation
    for both tradition and innovative cultural expressions.
attributes:
  skills: '[''Active listening'', ''Empathetic communication'', ''Community outreach coordination'', ''Event planning for small groups'', ''Basic art curation'', ''Digital photography and photo editing'',
