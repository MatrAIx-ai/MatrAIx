  hobbies: '[''Reading non-fiction (science, history, self-improvement)'', ''Walking/biking along Tampa Bay waterfront and nature trails'', ''Fishing'', ''Digital photography (urban and natural scenes)'',
    ''Playing chess'', ''Mindfulness meditation'', ''Listening to soul, jazz, and R&B music'', ''Cooking Southern and fusion recipes'']'
  career_goals: Sharer’s immediate career ambition is to convert his informal skill set into a sustainable income stream while maintaining the flexibility he values. He plans to earn a CompTIA A+ certification
    within the next twelve months to formalize his computer repair expertise. Concurrently, he aims to launch a part‑time freelance tech‑support service offering on‑site hardware repairs and basic networking
    for residents of Pinellas County. In the longer term, he envisions expanding this into a modest storefront or mobile repair van, and possibly supplementing it with a side business providing DIY home‑repair
    consulting. To counter his tendency toward missed deadlines, he intends to adopt a simple project‑tracking routine and set incremental weekly goals, which he hopes will also reduce his stress and negative
    emotions.
