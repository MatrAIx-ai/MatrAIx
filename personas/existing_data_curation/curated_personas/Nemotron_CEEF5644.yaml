personas:
  professional: Sharper Nero is a freelance tech‑support specialist who turns a self‑taught knack for diagnosing hardware failures and configuring home networks into a part‑time income, they channel their
    curiosity into rapid problem‑solving while battling deadline anxiety by relying on ad‑hoc checklists and spontaneous work bursts.
  sports: Sharper Nero cycles with the St. Petersburg Cycling Club on weekend rides, follows the Tampa Bay Buccaneers for NFL excitement and the Tampa Bay Lightning for hockey thrills, they enjoy occasional
    Gulf fishing trips that test patience, yet they shy away from a regular gym routine, preferring leisurely waterfront walks to maintain fitness.
  arts: Sharper Nero captures low‑light urban scenes around St. Petersburg with a DSLR, inspired by Henri Cartier‑Bresson’s candid style, they unwind listening to classic soul legends like Aretha Franklin,
    jazz icons such as Miles Davis, and contemporary R&B artists like H.E.R., and they regularly attend photo talks at The Morean Arts Center.
  travel: Sharper Nero favors spontaneous road trips along Florida’s Gulf Coast, often stopping at the Keys for sunset fishing and at Savannah’s historic squares for Southern charm, they dream of chasing
    auroras in Iceland but budget travel carefully to keep a safety net for unexpected home‑repair emergencies.
  culinary: Sharper Nero enjoys preparing shrimp and grits seasoned with smoked paprika and collard greens, they experiment with a Southern‑Asian fusion shrimp taco that blends cajun spices with a soy‑ginger
    glaze, and they relish tasting fresh Gulf oysters at local fish shacks while occasionally dining at upscale bistros for inspiration.
  core: Sharper Nero balances a restless curiosity with meticulous budgeting, yet chronic worry often leads to sleepless nights spent fine‑tuning DIY projects while they neglect larger social gatherings.
background:
  cultural: Sharer identifies as African American, and his upbringing reflects the rich tapestry of Black life in South‑central Florida. His family’s roots trace back to the Deep South, with grandparents
    who migrated to Florida during the Great Migration, bringing with them a strong sense of community, church involvement, and culinary traditions such as soul food. Growing up in Saint Petersburg, he
    was exposed to the city’s historic Black neighborhoods, local gospel choirs, and the annual Juneteenth celebrations that highlight resilience and cultural pride. He maintains close ties to his extended
    family and the local Black church, where communal support and storytelling are central. These cultural influences shape his values of perseverance, mutual aid, and an appreciation for music and food
    that blend Southern and Caribbean flavors.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Operating system installation and configuration'', ''Basic web design (HTML/CSS)'', ''DIY home maintenance (plumbing, basic electrical repair)'', ''Automotive
