  hobbies: '[''Visiting art galleries'', ''Painting and sketching'', ''Street photography'', ''Improv comedy'', ''Karaoke nights'', ''Hiking in nearby state parks'', ''Cooking experimental dishes'', ''Reading
    contemporary fiction'', ''Participating in community theater'', ''Attending live music shows'']'
  career_goals: Benjamin aims to earn his GED and pursue a Certified Records Manager (CRM) certification within the next two years. His short‑term goal is to move from a file‑clerk role to a records‑supervisor
    position in a midsize corporation or a cultural institution such as the Oklahoma City Museum of Art. Long‑term, he dreams of merging his love of art with his organizational talent by becoming a registrar
    for a regional museum or by managing a community art center where he can oversee collections while curating exhibitions. He also hopes to develop leadership skills that will allow him to mentor younger
    staff members and foster a collaborative workplace culture.
