personas:
  professional: Benjamin Milam is a detail‑obsessed file clerk at a midsize firm who leverages his Excel wizardry and budding graphic‑design skills to keep records impeccably organized; they dream of a
    Certified Records Manager certification that will launch them into a records‑supervisor role at a cultural institution where their love of art can inform exhibition planning.
  sports: Benjamin Milam is an avid hiker who regularly tackles the trails of the Great Salt Plains and joins a local hiking club for weekend outings, while also cheering for the Oklahoma City Thunder and
    playing pickup soccer with friends, balancing a love of the outdoors with community sport camaraderie.
  arts: Benjamin Milam frequents the Oklahoma City Museum of Art where they sketch contemporary installations, perform improv with a local troupe, sing karaoke to classic country ballads, and volunteer
    in community theater productions, drawing inspiration from Native American potter Maria Martinez and cowboy folk artist John Kinkead while devouring the latest works of novelist Celeste Ng.
  travel: Benjamin Milam prefers road‑trip adventures that blend art and nature, having driven to Santa Fe to explore its galleries, trekked the dunes of Great Salt Plains, and spent a weekend in Austin
    for its live‑music scene, yet they plan future trips to Asheville’s craft breweries and New Mexico’s Taos Pueblo, balancing modest budget constraints with a craving for culturally rich experiences.
  culinary: Benjamin Milam experiments in the kitchen with a moderate skill set, often whipping up bison chili with smoked paprika, okra gumbo seasoned with cayenne, and Mexican street tacos topped with
    pineapple salsa, favoring ingredients like jalapeño, cumin, and sweet potato, though they sometimes over‑spice dishes in pursuit of bold flavors.
  core: Benjamin Milam blends meticulous record‑keeping, a restless curiosity for art, and a sociable, anxiety‑prone personality into a life where spreadsheets coexist with improv jokes, spontaneous hikes,
    and a perpetual quest for the perfect spice blend.
background:
  cultural: Benjamin grew up in a working‑class white family in the Oklahoma City metropolitan area, absorbing Midwestern values of hospitality, hard work, and community involvement. His upbringing included
    regular church gatherings and neighborhood potlucks, which fostered his cooperative demeanor. While his cultural roots are largely tied to the Southern Plains and the traditions of Oklahoma’s rural
    landscape, he has developed an appreciation for the diverse artistic heritage of the region, including Native American pottery and cowboy folk art. This blend of local tradition and an openness to broader
    artistic influences shapes his identity and worldview.
attributes:
  skills: '[''Physical filing'', ''Electronic document management'', ''Microsoft Office Suite'', ''Data entry'', ''Records retention compliance'', ''Time management'', ''Interpersonal communication'', ''Customer
