persona_description: An engineer and materials scientist who specializes in the development and integration of carbon nanotubes into electronic circuits and devices. He is a professor at Purdue University
  and has published numerous research papers on the topic. He is known for his work on the sandwich process for fabricating carbon nanotubes and has received funding from NASA for his research. He is interested
  in the vertical integration of nanotubes and the use of them in future electronic devices and sensing technologies. He is also interested in the use of carbon nanotubes in wireless computer networks and
  radar technology.
