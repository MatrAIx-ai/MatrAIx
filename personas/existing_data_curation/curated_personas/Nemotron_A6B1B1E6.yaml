  career_goals: Richard aims to graduate high school with top honors and win state‑level science and robotics competitions. In the short term, he plans to secure a spot in a STEM‑focused magnet program
    and earn certifications in coding and graphic design. His long‑term ambition is to pursue a career in software engineering or aerospace engineering, combining his love for technology, problem solving,
    and creative design. He also envisions eventually launching his own tech startup that creates educational game apps, leveraging his competitive drive and entrepreneurial spirit.
