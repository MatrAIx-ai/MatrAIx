personas:
  professional: Richard Cannon, a 14-year-old robotics club captain at Forney High School, blends meticulous organization with a curiosity for unconventional problem‑solving, leading his team to design
    battle‑ready bots while juggling guitar practice and comic sketching, which fuels his competitive edge and drives him to set high standards in every project.
  sports: Richard Cannon plays forward for the Forney Youth Soccer Club, flags football for the school team, and proudly follows the Dallas Cowboys, FC Dallas, and the Dallas Mavericks, channeling his competitive
    spirit into both organized practice and weekend pick‑up games.
  arts: Richard Cannon, an avid guitarist and comic‑strip creator, draws inspiration from artists like Alex Ross and studios such as Pixar, attends community theater productions like "Little Shop of Horrors,"
    and curates a digital gallery of fan art featuring characters from "Star Wars" and "Studio Ghibli".
  travel: Richard Cannon has taken weekend road trips to Austin’s music scene, explored the historic Alamo in San Antonio, dreams of visiting Japan’s Akihabara for anime culture, and hopes to join a school‑organized
    service trip to New Orleans, balancing family budget constraints with a thirst for new experiences.
  culinary: Richard Cannon enjoys devouring Texas‑style brisket tacos with jalapeños, perfects a homemade chicken‑fried steak on family weekends, experiments with sushi rolls after watching anime, and often
    snacks on spicy pecan‑flavored popcorn while sketching.
  core: Richard Cannon is a disciplined teen who merges competitive robotics with a love for guitar, comic art, and Tex‑Mex flavors, yet sometimes procrastinates on homework in favor of video‑game marathons.
background:
  cultural: Richard was raised in Forney, Texas, a suburban community in Kaufman County known for its close‑knit neighborhoods and strong emphasis on school involvement and local traditions. His family
    reflects a typical Anglo‑American heritage with values rooted in hard work, self‑reliance, and community service. He grew up attending local festivals, high school football games, and church‑related
    events, which instilled a sense of camaraderie and civic pride. The region’s blend of Southern hospitality and the growing tech influence of the Dallas‑Fort Worth metroplex has shaped his balanced outlook,
    encouraging both appreciation for artistic expression and a drive toward technical achievement.
