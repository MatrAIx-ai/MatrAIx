personas:
  professional: Elizabeth Biles, a budding visual storyteller, blends watercolor and digital illustration skills while using their talkative, sociable nature to orchestrate after‑school talent shows, foreshadowing
    a future as an interdisciplinary artist who thrives on collaborative, unconventional projects.
  sports: Elizabeth Biles channels their energetic spirit into after‑school dance classes and a community soccer league, while cheering for the New York Knicks and Brooklyn Nets, and they often practice
    street‑style dance moves in the park as a personal fitness routine.
  arts: Elizabeth Biles immerses themselves in art by sketching urban murals reminiscent of Keith Haring, experimenting with watercolor inspired by the dreamy palettes of Studio Ghibli, devouring graphic
    novels such as "Bone" and "The Sandman," and attending Saturday performances of the local children's theater where they admire productions directed by Lin‑Manuel Miranda.
  travel: Elizabeth Biles prefers spontaneous weekend excursions, like their recent family stroll through the Brooklyn Botanic Garden and a day trip to Coney Island’s amusement park, while daydreaming about
    a future summer adventure to the Louvre in Paris and exploring the vibrant street‑art alleys of Berlin.
  culinary: Elizabeth Biles loves the bold flavor of pepperoni pizza topped with fresh basil, often crafts rainbow fruit kebabs using strawberries, blueberries, and kiwi for talent‑show snacks, and despite
    limited cooking experience, enjoys whisking together simple avocado toast with a squeeze of lime and a sprinkle of chili flakes.
  core: Elizabeth Biles is a relentlessly curious ten‑year‑old who trades homework for impromptu stage performances, hoards glittery sketchbooks, and remains serenely unflustered even when their art supplies
    are scattered across the floor.
background:
  cultural: Elizabeth grew up in a multicultural Brooklyn neighborhood where her white, middle‑class family embraces the city's diverse artistic scene. While her household observes traditional American
    holidays like Thanksgiving and the Fourth of July, they regularly visit local museums, cultural festivals, and community events that showcase New York's rich tapestry of cultures. This environment nurtures
    her open‑minded curiosity and appreciation for varied artistic expressions.
