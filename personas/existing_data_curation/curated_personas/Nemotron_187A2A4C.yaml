  hobbies: '[''Gardening'', ''Crocheting and knitting'', ''Reading contemporary fiction and self‑help books'', ''Daily gratitude journaling'', ''Cooking seasonal meals'', ''Yoga'', ''Listening to psychology
    and community‑building podcasts'', ''Volunteering at the animal shelter'']'
  career_goals: Elizabeth aims to enroll in a community‑college associate program in social services or allied health within the next year. She plans to obtain a certification as a mental‑health peer support
    specialist, leveraging her empathy and desire to help others. Her long‑term ambition is to secure a stable, part‑time role as a community outreach coordinator or health‑service aide for a non‑profit
    in Dane County, where she can combine her organizational talent with her caring nature. She also hopes to develop leadership skills that will allow her to launch a local stress‑management workshop series
    for young adults, helping peers handle anxiety and worry in a supportive environment. Flexible scheduling is important to her, as it will enable ongoing self‑care practices like yoga and journaling.
