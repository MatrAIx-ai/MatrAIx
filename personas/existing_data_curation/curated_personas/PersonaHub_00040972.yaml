persona_description: The persona is a GIS manager from the City of Frisco, TX who has over 18 years of experience in local government. They are highly skilled in developing and managing GIS systems, with
  a focus on integrating volumes of data using an intuitive map interface. They have a passion for ensuring the safety of schools and first responders by providing them with the information they need in
  a fast and effective way. The persona is dedicated to reducing operations costs by making relevant information easily accessible in one place, lowering risk and improving situational awareness during
  emergency response. They are recognized for their innovative and successful implementation of the SAFER application, which has earned them the prestigious Esri President's Award.
