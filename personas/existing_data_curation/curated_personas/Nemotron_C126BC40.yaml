    "Community Engagement"]'
  hobbies: '["Urban gardening", "Yoga and meditation", "Reading contemporary fiction and business literature", "Community volunteering at local shelters", "Architecture photography", "Hiking in the Wissahickon
    Valley", "Cooking heritage recipes", "Attending live jazz performances", "Traveling to explore historic neighborhoods", "DIY home improvement projects"]'
  career_goals: Andreane aims to advance to a senior director role overseeing a regional portfolio of mixed‑use developments, where she can integrate sustainable practices and inclusive housing policies.
    She plans to earn the Certified Property Manager (CPM) credential and pursue advanced certifications in real‑estate investment (CCIM) to deepen her strategic acumen. Long‑term, she envisions launching
    her own community‑focused management firm that champions equitable housing, supports resident empowerment, and collaborates with local nonprofit partners. She also seeks mentorship opportunities to
    shape emerging talent from diverse backgrounds within the industry.
