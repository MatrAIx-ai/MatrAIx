personas:
  professional: Faustino Martinez is an aspiring digital illustrator and miniature architect who translates comic characters into vibrant digital sketches, meticulously plans LEGO recreations of real-world
    buildings, and applies his organized, methodical nature to every creative project, while his curiosity drives him to experiment beyond conventional styles.
  sports: Faustino Martinez plays soccer with the Frisco Youth Soccer Club, follows FC Dallas, and practices regularly at the local park, balancing energetic matches with his careful approach to teamwork
    and strategic play.
  arts: Faustino Martinez draws inspiration from comic legends like Stan Lee and graphic novelist Brian K Vaughan, admires the animation of Hayao Miyazaki, enjoys piano renditions of Beethoven's Für Elise
    and the soundtrack of The Greatest Showman, and frequently visits the Frisco Discovery Center to see exhibits ranging from modern sculpture to vintage cartoons.
  travel: Faustino Martinez has explored the Frisco Discovery Center and the Dallas Museum of Art, taken family road trips to Austin's Zilker Park and the historic Alamo in San Antonio, and dreams of visiting
    the Smithsonian in Washington DC as well as the futuristic cityscape of Tokyo to see anime studios.
  culinary: Faustino Martinez enjoys helping prepare tacos with fresh cilantro, lime, and cumin, learning to fold tamales with masa and chiles, and loves cooking simple quesadillas with melted cheese and
    avocado slices, while also savoring pizza topped with pepperoni and basil.
  core: Faustino Martinez blends an architect's eye for structure with a comic-book imagination, meticulously journals their worries while obsessively arranging LEGO sets, yet often forgets to finish homework
    until the last minute.
background:
  cultural: Faustino comes from a Mexican‑American family that maintains strong ties to Mexican traditions while embracing life in Frisco, Texas. Spanish is spoken at home, and he celebrates cultural holidays
    such as Día de los Muertos and Mexican Independence Day with family altar‑building, craft making, and traditional foods. He participates in a school cultural club where he shares Mexican folklore and
    learns about other Latino cultures. His family values respect for elders, community solidarity, and the blending of Catholic customs with contemporary American life. This bicultural environment nurtures
    his artistic sensibility, bilingual skills, and a deep appreciation for his heritage.
