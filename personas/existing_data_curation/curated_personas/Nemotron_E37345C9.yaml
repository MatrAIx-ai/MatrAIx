  career_goals: FAustino dreams of becoming an animator or graphic designer who can blend his love for Mexican cultural motifs with cutting‑edge digital art. He envisions creating animated stories that
    celebrate his heritage while teaching curious kids about science and art. He also hopes to one day design community spaces—like murals or cultural centers—where he can share his artistic vision and
    help preserve Mexican traditions in Frisco. His ambition is driven by his curiosity, his desire for organized achievement, and a wish to make a positive, lasting impact on both his local and cultural
    community.
