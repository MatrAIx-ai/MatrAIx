personas:
  professional: Betty Thomas, a 40‑year‑old construction specialist with strong site‑safety certification and blueprint‑reading expertise, uses their methodical planning, organized coordination, and competitive
    drive to keep renovation crews on schedule while championing low‑VOC paints and energy‑efficient insulation as practical, eco‑friendly solutions.
  sports: Betty Thomas, an avid outdoors enthusiast, spends weekends tackling Cascade trail hikes with the Portland Alpine Club, rides with the Oregon Cycling League in summer, and roots for the Seattle
    Seahawks and Portland Timbers, balancing a disciplined strength‑training regimen with occasional yoga to counter back strain.
  arts: Betty Thomas finds creative release in woodworking and by attending intimate gigs featuring folk‑indie artists like The Decemberists, Brandi Carlile, and Sufjan Stevens, while also enjoying productions
    at Portland Center Stage, which together shape their appreciation for craftsmanship and storytelling.
  travel: Betty Thomas prefers meticulously planned road trips that blend eco‑tourism with hands‑on experiences, such as a recent week‑long cycling tour of the Columbia River Gorge and a future itinerary
    to Iceland’s geothermal villages and Costa Rica’s rain‑forest lodges, balancing a love for adventure with a tight family budget.
  culinary: Betty Thomas, a competent home chef, delights in preparing farm‑to‑table meals like roasted salmon with locally foraged morel mushrooms, quinoa‑kale salads drizzled with Oregon honey, and hearty
    vegetable stews featuring heirloom tomatoes, while occasionally treating themselves to a craft brewery’s seasonal ale.
  core: Betty Thomas is a detail‑oriented, eco‑driven construction pro who channels a competitive streak into every renovation, yet habitually procrastinates on dental appointments and can’t resist a late‑night
    binge of indie folk playlists.
background:
  cultural: Betty grew up in a middle‑class, white family that settled in the Pacific Northwest during the 1980s. Her upbringing blended Midwestern values of hard work, reliability, and modesty with the
    Oregonian emphasis on environmental stewardship and outdoor recreation. Community events, local farmers' markets, and regional festivals shaped her sense of belonging, while her family's practical mindset
    fostered a balanced appreciation for both tradition and new ideas. This cultural mix informs her pragmatic approach to work, her curiosity about sustainable practices, and her modest yet competitive
    drive to excel.
attributes:
  skills: '[''Blueprint reading'', ''Basic framing'', ''Concrete mixing'', ''Hand and power tool operation'', ''Safety compliance'', ''Equipment maintenance'', ''Material handling'', ''Project logistics'',
    ''Sustainable building practices'', ''Team coordination'']'
  hobbies: '[''Hiking in the Cascades'', ''Community gardening'', ''Woodworking projects'', ''DIY home improvement'', ''Volunteering with Habitat for Humanity'', ''Listening to folk and indie music'', ''Reading
    on sustainable construction'', ''Biking on local trails'']'
  career_goals: Betty aims to earn a journeyman certification in carpentry within the next two years and complete an associate degree in construction management. She aspires to become a crew leader or foreman,
    leveraging her organizational strengths to oversee small teams. In the longer term, she envisions launching a boutique residential renovation business focused on eco‑friendly upgrades, where she can
    mentor apprentices and introduce innovative, practical building techniques.
