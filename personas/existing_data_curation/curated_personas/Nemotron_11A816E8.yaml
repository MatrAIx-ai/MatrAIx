  career_goals: Debbie aspires to advance to a senior HR leadership role, such as Director of People or VP of Human Resources, where she can shape strategic workforce planning and champion a culture of
    continuous learning and creativity. She aims to integrate emerging technologies—like AI‑driven talent analytics—into the HR function to improve predictive hiring and employee development. Passionate
    about inclusive workplaces, she plans to launch a company‑wide mentorship program for women and underrepresented groups and to expand art‑based wellness initiatives that boost employee engagement and
    well‑being. Ultimately, she wants to be recognized as a forward‑thinking leader who balances rigorous performance standards with innovative, people‑centric solutions.
