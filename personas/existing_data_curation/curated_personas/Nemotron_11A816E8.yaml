personas:
  professional: Debbie Domangue, a senior HR strategist with over fifteen years of employee‑relations and talent‑analytics experience, merges a data‑driven analytical mindset with a painter‑like eye for
    workplace culture, designing AI‑enhanced workforce plans and art‑infused engagement programs while relentlessly chasing performance metrics.
  sports: Debbie Domangue competes at the Westwood Tennis Club on weekends, tunes into the Los Angeles Dodgers and Lakers as season‑long fandoms, and incorporates sunrise yoga as active recovery to stay
    flexible for both court rallies and mountain hikes.
  arts: Debbie Domangue frequents LACMA and the Getty Center, often pausing by a David Hockney canvas before sketching watercolors that echo the museum’s color palette, and volunteers at a neighborhood
    art hub where they orchestrate youth mural workshops inspired by street‑art icons like Shepard Fairey.
  travel: Debbie Domangue seasons their life with quarterly weekend trips to Santa Barbara’s coastal cliffs, annual explorations of Barcelona’s Gothic Quarter and Marrakech’s souks for culinary inspiration,
    and weekend labyrinths through LA’s eclectic neighborhoods—always balancing a tightly planned itinerary with spontaneous street‑art detours.
  culinary: Debbie Domangue’s culinary repertoire centers on Mediterranean fare—mastering Greek moussaka layered with feta and olive oil, crafting Lebanese tabbouleh bursting with parsley, mint, and sumac,
    and perfecting saffron‑infused Spanish paella—while their kitchen confidence lands at seasoned home‑cook level, and they habitually garnish dishes with fresh basil and a drizzle of extra‑virgin olive
    oil.
  core: Debbie Domangue balances a data‑driven HR leadership style with an artist’s curiosity, tracks performance metrics obsessively yet forgets to water their succulents, and swears that a ten‑minute
    watercolor break can defuse even the toughest workplace conflict.
background:
  cultural: Debbie is a White American who grew up in the Greater Los Angeles area. Her family roots blend Midwestern Irish and German ancestry with the West‑Coast emphasis on individuality, openness, and
    community involvement. Living in Glendale—a city known for its cultural mosaic and a sizable Armenian community—has exposed her to a wide range of traditions and artistic expressions, reinforcing her
    appreciation for diverse cultural narratives. While she identifies with mainstream American values of self‑reliance, optimism, and civic participation, her environment has shaped a progressive outlook
    that values inclusivity, artistic creativity, and the integration of varied cultural perspectives into both her personal life and professional ethos.
