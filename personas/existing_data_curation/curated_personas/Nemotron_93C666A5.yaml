personas:
  professional: Sandy Oleary is a budding problem‑solver with a love for building, who imagines a future as a mechanical engineer, using LEGO constructions and Scratch coding to practice design while balancing
    curiosity with a pragmatic approach to school projects; they often experiment with new ideas and apply established methods during class assignments.
  sports: Sandy Oleary darts onto the soccer field after school, proudly wearing her River Valley Rangers jersey, cheering for the local junior league, and they also follow the Seattle Sounders FC, cheering
    loudly during broadcasts, while weekend hikes on the nearby Green Ridge Trail keep their energy high.
  arts: Sandy Oleary draws whimsical cartoons inspired by Disney’s Moana and Pixar’s Toy Story, composes short piano melodies reminiscent of Beethoven’s ‘Für Elise’ simplified for beginners, bakes cookies
    to the rhythm of Taylor Swift’s ‘Shake It Off’, and they program playful games in Scratch featuring characters like Minecraft Steve and SpongeBob SquarePants.
  travel: Sandy Oleary loves weekend family hikes on the nearby Green Ridge Trail, dreams of visiting Yellowstone National Park’s geysers, and they keep a scrapbook of postcards from Myrtle Beach, while
    planning a future family trip to the Disney World resort in Orlando.
  culinary: Sandy Oleary delights in baking chocolate chip cookies with buttery dough, mixing in vanilla extract and dark chocolate chips, whips up quick cheese quesadillas with cheddar and tortillas, and
    they enjoy snack‑size carrot sticks with hummus, showing a budding culinary curiosity mixed with kid‑friendly comfort foods.
  core: Sandy Oleary is an energetic 9‑year‑old who juggles soccer, LEGO engineering, and spontaneous creativity, thriving on group activities while they occasionally lose track of organization.
background:
  cultural: Sandy grew up in Kaysville, a suburban community in Davis County, Utah, within a predominantly white, middle-class setting that values family, community service, and outdoor recreation. Her
    family often participates in local cultural traditions such as Pioneer Day celebrations, community volunteer events, and church gatherings that emphasize teamwork and service. The region's proximity
    to the Wasatch Mountains encourages frequent family trips to hike, ski, or camp, fostering a strong connection to nature. These influences combine to shape a culture that celebrates self-reliance, friendliness,
    and involvement in group activities.
