  career_goals: Sandy dreams of one day becoming a wildlife biologist or veterinarian so she can explore the natural world and help animals. She imagines herself discovering new ways to protect local habitats
    while also creating fun, educational activities for other kids. Her goal is to blend her love of science with her knack for organizing group projects, perhaps leading a school-based environmental club
    that designs hands-on experiments and community clean-up events. She also enjoys the idea of traveling to national parks and learning about different ecosystems, reflecting her balance of curiosity
    and practicality.
