personas:
  professional: Samuel Gorey, a 61‑year‑old former small‑business IT manager, leverages three decades of Windows network administration, budget stewardship, and vendor contract expertise to launch a part‑time
    consulting practice that blends structured project plans with the flexibility they value, delivering user‑focused solutions for local entrepreneurs while mentoring the next generation of tech staff.
  sports: Samuel Gorey is a devoted Ohio State Buckeyes football fan who never misses a Saturday game, enjoys weekend fishing on the Licking River as a low‑key sport, and participates in the local senior
    walking club that meets after the Buckeyes’ Sunday results, while cheering on the Columbus Crew SC whenever Major League Soccer matches air on their TV.
  arts: Samuel Gorey immerses themselves in classic science‑fiction literature, regularly rereading Isaac Asimov’s Foundation series and Philip K. Dick’s Do Androids Dream of Electric Sheep, while also
    listening to Beethoven’s Symphony No. 9 during woodworking sessions and attending occasional performances by the Ohio Valley Repertory Theatre.
  travel: Samuel Gorey prefers road‑trip itineraries that combine serene fishing spots like the Black River in Michigan, cultural visits to historic sites such as Williamsburg, Virginia, and weekend getaways
    to Acadia National Park, all planned around a modest budget and their desire for leisurely paced exploration.
  culinary: Samuel Gorey delights in cooking garden‑fresh dishes like heirloom tomato and basil bruschetta, pan‑seared catfish seasoned with lemon and dill, and hearty vegetable stew seasoned with garlic
    and rosemary, though they occasionally rely on frozen meals when a woodworking project runs late.
  core: Samuel Gorey blends pragmatic IT expertise with a love for quiet mornings fishing, yet habitually misplaces their reading glasses and forgets to charge their phone before heading out.
background:
  cultural: Samuel was born and raised in central Ohio and has spent most of his adult life in Blacklick, Licking County. His upbringing reflects classic Midwestern values—self‑reliance, hard work, community
    involvement, and modesty. He grew up attending local churches, high‑school sports events, and county fairs, fostering a strong sense of neighborliness and civic pride. Though his ethnic background is
    white, his identity is shaped more by the regional culture of rural Ohio, emphasizing neighborly support, practical problem‑solving, and a commitment to local volunteerism.
attributes:
  skills: '[''Network Administration'', ''Hardware Troubleshooting'', ''Software Installation & Update'', ''Business Process Analysis'', ''IT Budget Management'', ''Vendor Relations'', ''Help Desk Support'',
