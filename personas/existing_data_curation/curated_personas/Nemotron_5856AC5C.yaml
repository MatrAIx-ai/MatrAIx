  hobbies: '[''Fishing on the Licking River'', ''Vegetable gardening'', ''Woodworking'', ''Building birdhouses'', ''Playing chess'', ''Reading classic science‑fiction novels'', ''Following Ohio State football'',
    ''Volunteering to teach computer basics to seniors'']'
  career_goals: Samuel plans to transition into a part‑time consulting role that lets him leverage his practical IT expertise to help local small businesses modernize their systems while maintaining a flexible
    schedule. He aims to lead community workshops on digital literacy, mentor younger IT staff in Licking County, and eventually publish a concise guide on technology basics for non‑technical entrepreneurs,
    balancing his professional contributions with a gradual move toward retirement.
