  career_goals: Lisha aims to transition into a role that blends her retail expertise with her passion for the arts. She hopes to become a part‑time sales trainer or visual‑merchandising consultant for
    a boutique that showcases local artisans, allowing her to apply her aesthetic sensibility while working flexible hours. She is also considering opening a modest shop front that curates handmade items
    and vintage finds, giving her the freedom to arrange displays creatively and interact with a small, loyal customer base. Ultimately, she wants to mentor younger employees and contribute to community‑based
    art programs, such as becoming a docent at the Dayton Art Institute.
