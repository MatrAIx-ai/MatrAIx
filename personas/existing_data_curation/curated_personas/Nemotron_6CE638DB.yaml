  hobbies: '[''Reading mystery and adventure novels'', ''Journaling'', ''Traditional Mexican dancing (Folklorico)'', ''Playing the piano'', ''Sudoku and crossword puzzles'', ''Cooking Mexican dishes with
    family'', ''Science club projects'', ''Volunteer tutoring at community center'']'
  career_goals: Monica aims to pursue a stable, service‑oriented career that leverages her organizational strengths, compassion, and bilingual ability. She plans to become a registered nurse, focusing on
    community health and pediatric care for underserved Hispanic families. After high school, she intends to attend a community college, earn an associate degree in nursing, and transfer to a four‑year
    university to complete a BSN, ideally with a scholarship. Long‑term, she hopes to work in a hospital or community health center in New Jersey, and she also remains open to studying biomedical engineering
    or becoming a bilingual teacher, drawn by the structured problem‑solving aspects of those fields.
