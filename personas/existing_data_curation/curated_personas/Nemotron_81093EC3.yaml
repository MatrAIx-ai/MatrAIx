personas:
  professional: Matthew Downey, a 33‑year‑old master carpenter, blends precise framing expertise with a designer's eye, drafting custom furniture and renovation plans that marry sustainable materials and
    sculptural forms while quietly mentoring a tight‑knit team in their future boutique studio.
  sports: Matthew Downey fuels their fitness by hiking the Hill Country trails around Dallas, joins a local climbing gym’s weekend bouldering crew, and roots for the Dallas Mavericks and Dallas Stars, occasionally
    catching a Texas Rangers game when the schedule permits.
  arts: Matthew Downey immerses in the arts by sketching architectural details at the Dallas Museum of Art, draws inspiration from Frank Gehry’s deconstructivist structures and Ansel Adams’ black‑and‑white
    landscapes, curates ambient playlists featuring Brian Eno and Max Richter while woodworking, and showcases their own photography of wood grain in local gallery pop‑ups.
  travel: Matthew Downey prefers low‑key, design‑focused trips, mapping out weekend getaways to Marfa’s minimalist art installations, a week‑long study tour of Copenhagen’s sustainable architecture, and
    a solo trek through the Japanese Alps, always budgeting meticulously to keep their studio fund intact.
  culinary: Matthew Downey enjoys farm‑to‑table meals, often cooking wood‑smoked brisket with rosemary‑thyme rub, pairing it with roasted root vegetables and a side of miso‑glazed salmon, and hones their
    skill by experimenting with hand‑crafted sourdough loaves and seasonal salads featuring locally sourced kale and heirloom tomatoes.
  core: Matthew Downey is a solitary, detail‑obsessed craftsman whose quiet studio rituals, occasional tool‑hoarding, and relentless pursuit of sustainable design define a life balanced between disciplined
    work ethic and a penchant for solitary creativity that they rarely discuss with others.
background:
  cultural: Matthew grew up in the suburban outskirts of the Dallas‑Fort Worth metroplex in a middle‑class white family with roots in the region's construction trades. The Texan cultural values of self‑reliance,
    practicality, and a respect for skilled craftsmanship have shaped his work ethic. While he appreciates the community’s Southern hospitality, he prefers the independence and quiet that come from the
    western frontier spirit of Texas. His cultural exposure includes attending local craft fairs, historic preservation events, and occasional family gatherings that blend Midwestern modesty with the regional
    pride of North Texas.
attributes:
  skills: '[''Residential framing'', ''Finish carpentry'', ''Custom cabinetry'', ''Blueprint reading'', ''Power tool operation'', ''Wood finishing techniques'', ''Sustainable material sourcing'', ''Basic
