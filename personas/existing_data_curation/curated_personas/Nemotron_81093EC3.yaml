  hobbies: '[''Visiting local art galleries'', ''Sketching and drawing'', ''Woodworking personal projects'', ''Reading design and architecture books'', ''Hiking in nearby state parks'', ''Listening to instrumental
    music'', ''Playing single‑player video games'', ''Exploring sustainable construction practices'', ''DIY home improvement'', ''Photography of natural landscapes'']'
  career_goals: Matthew aims to transition from a hands‑on carpenter to the owner‑operator of a boutique custom‑furniture and renovation studio that emphasizes artistic craftsmanship and eco‑friendly practices.
    Over the next five years he plans to obtain advanced certifications (e.g., NCCER Master Carpenter), expand his client base across the Dallas‑Fort Worth area, and develop a signature line of sculptural
    furniture that merges traditional woodworking with contemporary art influences. He also envisions mentoring a small, highly skilled team while maintaining the quiet, focused studio environment he thrives
    in.
