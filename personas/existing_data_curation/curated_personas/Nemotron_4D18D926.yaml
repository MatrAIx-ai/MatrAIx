  career_goals: Vikram aims to advance to a senior academic leadership role, such as department chair or dean, where he can shape business education at a systemic level. He plans to launch a flagship Global
    Business and Innovation program that leverages his expertise in emerging markets and technology integration. He also seeks to publish a series of case studies on South Asian enterprises, secure research
    grants, and expand his consulting practice to help Chicago startups enter international markets. Mentoring first‑generation college students and increasing diversity in business schools are central
    to his long‑term vision.
