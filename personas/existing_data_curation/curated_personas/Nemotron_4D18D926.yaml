personas:
  professional: Vikram Khatri, a senior business professor at a Chicago university, blends rigorous strategic management expertise with a hands‑on, data‑driven approach, leveraging their obsessive organization
    and talkative charisma to design immersive global‑market case studies that spotlight emerging economies while they mentor first‑generation students toward leadership roles.
  sports: Vikram Khatri, an avid runner, logs daily mile‑long jogs along Lake Michigan, participates in a local running club, attends Chicago Bulls games, follows the White Sox with seasonal enthusiasm,
    and they practice yoga to keep a balanced mindset, merging competitive spirit with community camaraderie.
  arts: Vikram Khatri, a passionate photographer of Chicago’s skyline, frequently captures the city’s historic facades in black‑and‑white reminiscent of Ansel Adams, attends theater productions at Steppenwolf,
    and they curate playlists featuring Ravi Shankar’s sitar fusion alongside modern indie folk, letting visual and auditory art shape their creative downtime.
  travel: Vikram Khatri, an organized explorer, meticulously plans trips that blend business insight and cultural immersion, regularly returning to a vibrant market town for Diwali celebrations, sampling
    street food in Bangkok, and trekking the Canadian Rockies, while they balance family commitments and a tight academic calendar.
  culinary: Vikram Khatri, a home chef who balances tradition with innovation, masterfully prepares butter chicken, spiced lentil dal, and mustard‑leaf saag with a twist of smoked paprika, often pairing
    these dishes with homemade naan or quinoa pilaf, and they delight friends with experimental fusion plates like tandoori‑spiced tacos.
  core: Vikram Khatri, the charismatic, meticulously organized professor who runs, teaches, cooks, and talks with equal passion, is known for their habit of rehearsing speeches in the kitchen while the
    kettle whistles, and they occasionally forget to water houseplants despite their disciplined routine.
background:
  cultural: Vikram was born to Indian parents who immigrated from the Punjab region in the 1970s. Growing up in a bilingual household, he speaks English fluently and retains conversational Punjabi, which
    informs his appreciation of South Asian business practices and cultural nuances. His family placed a strong emphasis on education, hard work, and community service, values that have guided his academic
    and professional path. He actively participates in Chicago’s South Asian diaspora, celebrating Diwali, Holi, and regional festivals, and often incorporates cultural perspectives into his curriculum
    to enrich student learning.
