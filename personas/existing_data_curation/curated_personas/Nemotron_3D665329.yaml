  career_goals: He aims to finish his associate degree in Hospitality Management within the next two years and leverage his cage experience to become a floor supervisor at a major casino. Ultimately, Malik
    aspires to combine his competitive instincts and artistic vision by designing immersive, themed gaming environments—potentially through a partnership with a tech startup focusing on VR casino experiences.
    He also hopes to establish a small boutique lounge in Baltimore that blends live music, street‑art installations, and interactive card games, providing a creative outlet for himself and his community.
    Alongside these professional ambitions, he is committed to cultivating personal resilience, seeking regular therapy and mindfulness practice to manage his emotional reactivity.
