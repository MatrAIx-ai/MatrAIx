personas:
  professional: Jonathan Garrison, a 13‑year‑old budding software tinkerer, channels his love for precision and strategy into building Python scripts that automate his school assignments and track real‑time‑strategy
    game stats, while dreaming of a future in aerospace engineering.
  sports: Jonathan Garrison, a disciplined teen weight‑lifter, trains three times a week at the community youth gym, follows the New York Yankees for baseball and the Los Angeles Lakers for basketball,
    and rides with the County Youth Cycling Club that meets on Saturday mornings.
  arts: Jonathan Garrison, a meticulous model‑builder with an eye for design, spends weekends studying the work of aircraft designer Kelly Johnson, listening to the cinematic scores of Hans Zimmer while
    painting scale‑model liveries, and attending local fairs to admire the kinetic sculptures of artist Theo Jansen.
  travel: Jonathan Garrison prefers low‑key road trips that blend engineering curiosity with nature, having explored the Smithsonian National Air and Space Museum in Washington, D.C., taken a weekend camping
    excursion to the nearby Blue Ridge Mountains, and planning a future visit to the International Aviation Expo in Oshkosh, Wisconsin.
  culinary: Jonathan Garrison enjoys nutrition‑focused meals that match his disciplined routine, often cooking protein‑rich dishes such as grilled chicken breast with quinoa and steamed broccoli, whipping
    up banana‑oat protein pancakes for breakfast, and treating himself to a simple fish‑and‑chips dinner after a successful day of fishing.
  core: Jonathan Garrison is a structured, competition‑driven teen who balances precise model‑building, strategic gaming, disciplined fitness, and methodical budgeting, all while maintaining a calm, solitary
    vibe.
background:
  cultural: Jonathan grew up in Toone, a small unincorporated community in Hardeman County, Tennessee. His family is rooted in the Southern rural tradition, valuing hard work, self‑reliance, and close‑knit
    community ties. Weekly attendance at a local Baptist church and participation in church youth activities have reinforced a sense of moral responsibility and discipline. The region’s cultural fabric
    includes country music, Southern cuisine, and annual county fairs that celebrate agricultural heritage, all of which have shaped his worldview. While he respects these traditions, his pragmatic and
    competitive nature pushes him to seek personal achievement beyond the conventional expectations of his hometown. The blend of modest Southern values with a focus on structured personal development defines
    his cultural background.
