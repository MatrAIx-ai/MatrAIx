  career_goals: Jonathan aims to channel his disciplined, achievement‑driven mindset into a future as a mechanical engineer, with a specific interest in designing efficient agricultural equipment that can
    benefit his rural community. He envisions earning a scholarship to a top engineering program by excelling in science fairs and advanced STEM coursework. Parallel to his engineering ambition, he dreams
