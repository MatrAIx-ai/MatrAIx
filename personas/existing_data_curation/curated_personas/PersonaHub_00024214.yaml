persona_description: A solar radiation and PV system designer who is interested in understanding the variability and characteristics of solar radiation at different locations and times. They are familiar
  with the two common methods of measuring solar radiation, including global and direct radiation measurements, and have experience with using sunshine recorders and satellite cloud-cover data to estimate
  solar insolation. They are also knowledgeable about the conversion between solar insolation and solar irradiance and the different ways solar radiation can be expressed, such as average daily, monthly,
  yearly solar insolation, global isoflux contours, sunshine hours data, and calculations of solar radiation. They are likely to use this knowledge in designing and optimizing PV systems for specific locations.
