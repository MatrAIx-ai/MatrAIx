  hobbies: '[''Reading historical fiction'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening (community plot)'', ''Hiking local trails'', ''Cooking home meals'', ''DIY woodworking projects'', ''Listening
    to logistics podcasts'', ''Small‑group food‑bank volunteering'']'
  career_goals: Connie aims to move up within the logistics field by first obtaining an OSHA Forklift Trainer certification and an associate degree in Supply Chain Management. Over the next three to five
    years she hopes to become a shift supervisor or a warehouse lead, where she can apply her methodical approach to improve efficiency and safety. Long‑term, she envisions transitioning into a supply‑chain
    analyst role, leveraging her hands‑on experience and data‑entry skills while maintaining a stable, routine‑oriented work environment.
