  career_goals: Jeanne aims to advance from her current bookkeeping role to a senior accounting or finance position within the next five years. She plans to earn a bachelor's degree in accounting and pursue
    CPA certification to deepen her technical expertise. Leveraging her imagination and curiosity, she hopes to specialize in financial data analytics, developing innovative reporting tools that translate
    complex numbers into visual insights for decision‑makers. Jeanne also envisions taking on a mentorship role, training junior staff and fostering a collaborative, harmonious work environment. Long‑term,
    she is interested in contributing her financial skills to nonprofit arts organizations, aligning her professional growth with her passion for art and community service.
