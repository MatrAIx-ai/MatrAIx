  career_goals: Victor aspires to re‑enter the workforce by securing a role as a community program coordinator or a small‑business owner offering handyman and maintenance services. He plans to complete
    his associate’s degree in Business Administration and earn a certification in Project Management to formalize his organizing talents. His longer‑term ambition is to establish a locally‑run community
    center that provides job‑training workshops, recreational activities, and support services for youth and seniors in Barceloneta, enhancing both economic stability and social cohesion.
