personas:
  professional: Eleanor Jensen, a 24‑year‑old pipefitter‑steamfitter with an associate degree, merges technical precision and an artistic eye to devise efficient, aesthetically mindful piping solutions,
    excels in welding and safety compliance, and thrives as the calm liaison between clients, contractors, and crew on residential and light‑industrial projects.
  sports: Eleanor Jensen, an avid paddle‑boarder and beach‑volleyball enthusiast, trains with the Coastal Wave Paddleboard Club, competes in the Summer Sandball League, follows the Golden State Warriors
    for inspiration, and bursts into spontaneous beach clean‑up jogs after games.
  arts: Eleanor Jensen, a visual artist who paints seascapes inspired by Turner and sculpts pipe‑themed metal pieces echoing Anish Kapoor, regularly attends improv shows with the Blue Wave Improv Troupe,
    and draws creative fuel from reading N.K. Jemisin’s fantasy novels, while curating installations at local art festivals.
  travel: Eleanor Jensen, who blends adventure with sustainability, has surf‑checked Bali’s beaches and trekked Costa Rica’s cloud forests, dreams of photographing Iceland’s glaciers and kayaking New Zealand’s
    fjords, and plans each trip around off‑season eco‑lodges and a modest travel budget.
  culinary: Eleanor Jensen, a moderately skilled home cook, delights in preparing shrimp ceviche with lime and cilantro, grilling mahi‑mahi with mango salsa, and whipping up soba noodle salads with seaweed
    and sesame oil, favoring fresh, coastal ingredients and occasionally experimenting with smoked paprika in her metal‑sculpture workshop’s breakroom.
  core: Eleanor Jensen, a calm, imaginative pipefitter‑artist who fuses technical craft with seaside creativity, balances rigorous career goals with spontaneous beach adventures, and never lets anxiety
    dim her vibrant, hands‑on outlook.
background:
  cultural: Eleanor identifies as a white American with deep roots in the Gulf Coast region of Florida. She grew up in a middle‑class, coastal community where Southern hospitality and beach culture melded
    with a pragmatic, hands‑on work ethic. Her family has a tradition of skilled trades, which informed her early interest in plumbing, while the vibrant local art scene nurtured her creative side. She
    is accustomed to the laid‑back, community‑oriented lifestyle of Panama City Beach, embracing values of independence, environmental stewardship, and collaborative camaraderie. While predominantly reflecting
    mainstream white Floridian culture, she is also appreciative of the diverse multicultural influences that shape the region’s food, music, and festivals.
attributes:
  skills: '[''Pipe installation and repair'', ''Steam system maintenance'', ''Welding (MIG/TIG)'', ''Soldering and brazing'', ''Blueprint and schematic reading'', ''Building code compliance'', ''Hydraulic
    and pneumatic troubleshooting'', ''Pressure testing and leak detection'', ''Project planning and scheduling'', ''Team leadership and client communication'', ''Creative problem‑solving in system design'',
    ''Safety training (OSHA)'', ''Basic CAD drafting for pipe layouts'']'
  hobbies: '[''Painting (seascapes and industrial subjects)'', ''Sketching architectural details'', ''Metal sculpture and DIY projects'', ''Paddle‑boarding'', ''Beach volleyball'', ''Beach clean‑up volunteer
    work'', ''Improv theater'', ''Reading sci‑fi/fantasy novels'', ''Participating in community art festivals'', ''Makerspace collaborations'']'
  career_goals: Eleanor aims to earn her Journeyman and eventually Master Pipefitter certification within the next three years, positioning herself for senior supervisory roles on larger commercial projects.
    She envisions establishing her own boutique plumbing‑steamfitting firm that specializes in sustainable, energy‑efficient installations for boutique hotels and beachfront properties, integrating functional
    piping with custom aesthetic designs. Additionally, she wants to become a mentor and advocate for women entering skilled trades, speaking at local trade schools and community events. Long‑term, she
    hopes to achieve certification as an OSHA safety trainer and to contribute to green‑building initiatives such as LEED‑qualified mechanical systems.
