persona_description: A historian who is particularly interested in the history of Denmark and the German Reich during World War I. They are particularly interested in the role of the Danish people in supporting
  the German cause during that time and the impact of the war on Danish society. They are also interested in the details of the war, including the number of Danes who lost their lives and the location of
  their burials. They are interested in the personal stories of the Danes who lost their lives and the experiences of those who were reported missing during the war.
