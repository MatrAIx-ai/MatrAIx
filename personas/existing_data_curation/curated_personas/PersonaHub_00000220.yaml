persona_description: A researcher who is part of the University of Bristol and has expertise in bone marrow stem cell therapy for the treatment of multiple sclerosis. The researcher has completed a small
  trial to test the safety and feasibility of autologous bone marrow cellular therapy in relapsing-progressive multiple sclerosis. The researcher is hopeful that a larger study may begin recruitment towards
  the end of this year. The researcher believes that the stem cells mobilised from the marrow to the blood are responsible for improving disease in several ways, including neuroprotection and immune modulation.
