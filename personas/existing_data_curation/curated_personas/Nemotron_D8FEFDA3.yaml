personas:
  professional: Ashley Oliva is a 27‑year‑old carpenter who blends deep expertise in residential framing, custom furniture design, and sustainable wood finishing with a curiosity‑driven willingness to trial
    novel joinery, while their spontaneous, deadline‑averse streak challenges project pacing but their cooperative nature shines when mentoring apprentices and coordinating trades.
  sports: Ashley Oliva spends their summers hiking the Montana plains and mountains, joins a local climbing club for weekend bouldering, follows the Great Falls Voyagers baseball team and the Montana Grizzlies
    football program, and treats fitness as a solitary stress‑relief ritual rather than a competitive pursuit.
  arts: Ashley Oliva expresses their artistic side through calligraphy, often tracing Thoreau passages while listening to folk singer Gillian Welch and indie pop act Phoebe Bridgers, and they draw inspiration
    from the handcrafted ceramics of regional artist Nancy Dorian at the local craft fairs they frequent.
  travel: Ashley Oliva prefers spontaneous, low‑key trips that allow them to explore natural beauty, having trekked Yellowstone and Glacier National Parks, they dream of wandering Patagonia’s Patagonian
    Andes and Kyoto’s cedar forests while carefully budgeting to keep travel expenses modest.
  culinary: Ashley Oliva cooks at a confident intermediate level, favoring seasonal, herb‑forward dishes like rosemary‑infused focaccia, thyme‑scented roasted chicken, and nettle pesto pasta made from herbs
    they cultivate, and they rarely dine out, opting instead for rustic meals at home with locally sourced ingredients.
  core: Ashley Oliva is a solitary, eco‑focused carpenter whose boundless curiosity fuels handcrafted furniture, yet a persistent undercurrent of anxiety makes deadlines feel like looming cliffs.
background:
  cultural: Ashley grew up in a rural white community in the western United States, where self‑reliance, hard work, and community cooperation are core values. Her upbringing emphasized practical skills,
    respect for the natural landscape of Montana, and a family tradition of hands‑on trades, shaping her pragmatic yet curious approach to both work and leisure.
