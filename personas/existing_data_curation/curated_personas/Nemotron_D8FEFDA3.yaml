  hobbies: '[''hiking'', ''vintage furniture restoration'', ''craft fairs'', ''sustainable architecture reading'', ''calligraphy'', ''herb gardening'']'
  career_goals: Ashley aims to become a master carpenter and obtain a journeyman certification through her local union. She plans to open a small workshop in Great Falls that specializes in handcrafted,
    eco‑friendly furniture, mentor other women entering the trades, and integrate sustainable building practices into local construction projects. Over time she hopes to take on supervisory roles that allow
    her to shape project workflows while preserving the flexibility she values.
