personas:
  professional: Patricia Alba, a two-year-old budding architect of block towers, blends boundless curiosity with an emerging practical sense by meticulously arranging colorful bricks while trusting her
    own method over adult suggestions, demonstrating an early competitive streak in every construction challenge.
  sports: Patricia Alba, a two‑year‑old who champions the sandbox sprints at the local park’s ‘Tiny Trotters’ toddler group, idolizes the Seattle Mariners, and competes fiercely with peers to be the first
    to slide down the small plastic slide, embodies a blend of sociable energy and competitive drive.
  arts: Patricia Alba, a budding aficionado of bright visual and auditory stimuli, delights in watching animated classics like Disney’s ‘Moana’, dancing to The Wiggles’ ‘Fruit Salad’, and proudly displaying
    her finger‑painted masterpieces of rainbow unicorns, all while critiquing the color choices of her playmates with a confident, competitive flair.
  travel: Patricia Alba, who has explored the family’s seaside cottage on the Gulf Coast and taken a short road trip to the state’s premier zoo, prefers quick car rides accompanied by her favorite stuffed
    bunny and dreams of someday wandering the magical lanes of Disneyland.
  culinary: Patricia Alba, a two‑year‑old gourmand of simple comforts, relishes banana pancakes drizzled with honey, obsessively sprinkles cinnamon sugar on toast, and proudly declares her love for macaroni
    and cheese, often refusing vegetables unless they’re cut into star shapes.
  core: Patricia Alba, a curious and energetic two‑year‑old who balances playful exploration with an early knack for organization, shows a competitive streak in block building, questions adult directions,
    and can be stubbornly reluctant to share, yet bounces back quickly after a tumble.
