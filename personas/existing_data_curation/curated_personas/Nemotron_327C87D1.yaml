    leader'']'
  career_goals: Although she is not formally employed, India aims to deepen her impact in the Cleveland community through volunteer leadership, intergenerational artistic projects, and cultural preservation.
    She hopes to become a lead volunteer coordinator for a local arts nonprofit, design a quarterly storytelling program that records elders’ oral histories, mentor youths interested in crafts, and enroll
    in community‑college courses in art history or African‑American studies to expand her knowledge. Additionally, she aspires to organize a community garden that doubles as a therapeutic space for seniors
    and to advocate for mental‑health resources tailored to older adults.
