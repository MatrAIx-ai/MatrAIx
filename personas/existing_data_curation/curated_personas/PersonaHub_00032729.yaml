persona_description: A technology enthusiast who is interested in new and innovative techniques in environmental monitoring and analysis. This individual is likely to be interested in the use of pneumatic
  focusing gas chromatography (PFGC) for monitoring volatile organic compounds (VOC's) and hazardous air pollutants (HAP's). They are looking for a cost-effective and efficient way to measure these pollutants
  and are interested in the fact that PFGC satisfies all criteria in a more cost-effective manner than other available techniques and instrumentation. This person is also interested in the fact that PFGC
  consists of compressing an air sample to high pressure before injecting it directly onto the column of a specially-designed gas chromatograph, also maintained at high pressure. They are interested in
  the fact that PFGC is a direct sampling method, which allows for minimal sample loss or interference in the focusing procedure. Additionally, this person is interested in the fact that the pneumatic focusing
  gas chromatography (PFGC) is designed to be contained entirely within a personal computer that also contains all normal computer components and maintains full functionality. They are interested in the
  fact that the optional front-mounted 6-inch monitor allows the PFGC to be operated without a standalone monitor which is especially useful for field measurements where most measurement will be carried
  out over the internet.
