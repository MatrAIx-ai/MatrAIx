persona_description: A paleontologist who specializes in the study of sirenians, particularly the fossil evidence of dugongs and their evolution in the Indopacific region. She is particularly interested
  in the scarcity of dugong fossils in this region and the importance of new finds for gaining a more detailed understanding of sirenian evolution. She is also a supervisor at the Smithsonian Institution
  and a professor at Flinders University.
