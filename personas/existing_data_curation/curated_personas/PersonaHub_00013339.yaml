persona_description: A linguist who specializes in the study of language variation, particularly focusing on the within-language differences in phonology, morphology, syntax, and semantics. They are well-versed
  in the criteria for mutual intelligibility, the distinction between dialects and accents, the distinction between prestige dialects and non-standard dialects, and the various types of language variation.
  They are also knowledgeable about the different ways of expressing the same meaning within a language, and the different ways of expressing the same meaning across languages.
