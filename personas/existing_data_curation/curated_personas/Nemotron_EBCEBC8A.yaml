  hobbies: '[''Basketball league participation'', ''DIY electronics projects'', ''Live music attendance'', ''Community event MC-ing'', ''Hiking and fishing'', ''Photography'', ''Reading popular science'',
    ''Health‑tech podcast listening'', ''Volunteer health screenings'']'
  career_goals: Looking ahead, Craig aims to leverage his hands‑on experience to advance into a licensed practical nursing (LPN) role within the next two years, followed by an associate’s degree in nursing.
    His longer‑term ambition is to become a registered nurse with a specialty in emergency care, allowing him to blend his curiosity for fast‑paced, technology‑driven environments with his practical desire
    to make immediate impacts on patient outcomes. He also hopes to take on a mentorship/leadership position at his clinic, develop community health‑education workshops, and eventually obtain a certification
    in healthcare informatics to help integrate new digital tools into everyday practice.
