personas:
  professional: Craig Brown, a 25‑year‑old medical assistant and clinical technician at a Muncie community health clinic, blends his hands‑on expertise in phlebotomy, EHR documentation, and point‑of‑care
    device troubleshooting with a naturally outgoing, talk‑to‑anyone demeanor that makes him an effective patient educator and a go‑to organizer for clinic workshops, all while eyeing a transition to LPN
    and eventually RN in emergency care.
  sports: Craig Brown is an active member of the Muncie City Basketball League, a devoted fan of the Indiana Pacers, Indianapolis Colts, and Indiana Hoosiers, and spends his weekends fishing at Ball State
    Lake and hiking state park trails, using his home‑built Arduino heart‑rate monitor to gauge workout intensity and relishing the camaraderie of team sports and outdoor adventures.
  arts: Craig Brown channels his love for live music by regularly attending concerts at the Muncie Amphitheatre featuring acts such as Foo Fighters, John Mayer, and The Avett Brothers, volunteers as an
    energetic MC for community events, captures Indiana’s seasonal landscapes through his membership in a local photography club, and draws inspiration from visual artists like Edward Hopper to enhance
    his own creative projects.
  travel: Craig Brown prefers spontaneous, group‑oriented road trips that blend music festivals in Chicago and Nashville with weekend hikes in nearby Hoosier State Parks, while budgeting for future adventures
    such as a photography‑focused tour of Yellowstone, a cultural immersion in New Orleans, and a tropical snorkeling getaway to Costa Rica.
  culinary: Craig Brown enjoys hosting backyard barbecues where he grills smoked pulled pork, honey‑glazed chicken wings, and corn on the cob—often monitored with a custom Arduino temperature sensor—while
    also savoring local Indiana specialties such as pork tenderloin with apple butter, and indulges in craft beers and a well‑made mac & cheese after a long day of volunteering.
  core: Craig Brown is a gregarious, tech‑savvy 25‑year‑old medical assistant who balances a love for community gatherings, DIY electronics, and a relentless curiosity about health tech, even if that means
    occasionally forgetting to update his budgeting app.
background:
  cultural: Craig grew up in a middle‑class family in Muncie, Indiana, where the community’s Midwestern values of friendliness, reliability, and modest ambition shaped his worldview. His ancestry is a mix
    of German and Irish heritage, which he celebrates through family gatherings and occasional participation in cultural festivals at the local heritage center. He was raised attending a Lutheran church
    that emphasized service, which fostered his early interest in healthcare volunteering. The small‑town environment encouraged close‑knit relationships, a strong work ethic, and an openness to change,
    allowing him to comfortably blend traditional community ties with a modern curiosity about emerging health technologies. He identifies with the broader American cultural narrative of seeking personal
    growth while contributing to the common good.
attributes:
