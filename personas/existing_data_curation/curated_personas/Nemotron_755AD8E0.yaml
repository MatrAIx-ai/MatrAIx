personas:
  professional: Ryan Yarborough is a budding team organizer in his local youth soccer league, and they leverage their love of structure to keep practice schedules on a bright whiteboard, mediate teammate
    disputes with their cooperative spirit, and channel occasional worries into double-checking equipment lists, ensuring every game runs smoothly.
  sports: Ryan Yarborough is a forward on the Platte County Pioneers youth soccer team, practices basketball after school with the local Freshman Lakers club, and passionately follows the Kansas City Royals
    and the Kansas City Chiefs, often cheering at community fairs and joining Saturday morning baseball games at the neighborhood park, where they strive to stay active and maintain a balanced fitness routine.
  arts: Ryan Yarborough takes piano lessons twice a week, shines in the school drama club's spring musical by playing a supporting role, and enjoys listening to live jazz at a kid-friendly Kansas City Jazz
    Festival session featuring a saxophonist they admire, while they also binge-watch Disney animated classics for creative inspiration.
  travel: Ryan Yarborough loves family road trips that blend practical planning with spontaneous stops, having visited the St. Louis Gateway Arch and the Ozark National Forest, and eagerly awaits a summer
    vacation to Disney World in Florida where they can follow a detailed park itinerary yet still be open to surprise ice-cream treats, though they sometimes fret about missing a scheduled rest break.
  culinary: Ryan Yarborough favors classic Kansas City-style BBQ ribs and burnt ends served at family gatherings, delights in building LEGO-shaped mini pizzas topped with pepperoni, mozzarella, and a dash
    of oregano at home, enjoys sipping mango-spinach smoothies for a healthy boost, yet they occasionally sneak extra chocolate chip cookies before dinner despite their parents' reminders.
  core: Ryan Yarborough is a structured, socially-savvy nine-year-old who balances teamwork, community traditions, and cautious optimism with occasional worries, and they keep a secret stash of candy for
    after-school snack time.
background:
  cultural: Ryan grows up in a typical Midwestern white family in Kansas City, Missouri, specifically Platte County. His upbringing reflects the region’s emphasis on community, modesty, and practicality.
    Family life often includes gatherings around Kansas City–style barbecued meals and participation in local traditions such as Saturday morning baseball games and community fairs. The family is involved
    in a local church, where values of kindness, service, and cooperation are reinforced. The cultural environment blends suburban and urban influences, exposing Ryan to Kansas City’s jazz heritage as well
    as contemporary pop culture, while fostering polite, courteous interaction that shapes his compassionate and cooperative demeanor.
