  hobbies: '["Soccer", "Basketball", "LEGO building", "Minecraft (cooperative gaming)", "Reading adventure books", "Library volunteer reading", "Piano lessons", "Drama club"]'
  career_goals: Ryan dreams of a future where he can continue to help others in a structured, team‑oriented setting. He is fascinated by firefighters and admires their clear routines and community service,
    so he often says he wants to become a firefighter. He also imagines becoming a teacher or a youth sports coach, roles that let him organize groups and mentor peers. While occasionally entertaining ideas
    of becoming an astronaut, his primary ambition right now is to contribute to his community through service‑oriented jobs that combine structure with compassion.
