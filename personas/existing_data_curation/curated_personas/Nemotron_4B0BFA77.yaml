personas:
  professional: Cristian Gomez is a 14‑year‑old aspiring multimedia artist and budding robotics enthusiast who channels his curiosity and organized mindset into weekly sketching and painting sessions, leads
    his school’s robotics club to craft simple programmable devices, and coordinates art displays at local cultural festivals, all while thriving in collaborative soccer matches and group volunteer activities.
  sports: Cristian Gomez plays forward for the Midtown Tigers youth soccer club, avidly follows Los Angeles FC during MLS season, and supplements his fitness with sprint drills after robotics workshops,
    embracing team camaraderie and disciplined training while maintaining an upbeat, energetic presence on the field.
  arts: Cristian Gomez draws artistic inspiration from Diego Rivera’s narrative murals, Frida Kahlo’s vibrant self‑portraits, and graphic novels such as Saga and Monstress, while practicing guitar renditions
    of traditional folk tunes by Carlos Mejía Godoy and experimenting with Procreate and acrylics to merge classic and digital media in his creations.
  travel: Cristian Gomez dreams of backpacking through the historic streets of Antigua Guatemala and exploring the bustling markets of Mexico City, yet currently opts for weekend trips to the nearby state
    park and local cultural festivals, meticulously sketch‑filled itinerary planning each outing while balancing school obligations.
  culinary: Cristian Gomez enjoys crafting homemade corn‑tortilla quesadillas topped with melted Oaxaca cheese and chipotle salsa, occasionally experimenting with sweet plantain tamales, and, though confident
    at a home‑cook level, frequently relies on YouTube tutorials to broaden his culinary repertoire.
  core: Cristian Gomez is a curious, organized teen who fuses art, robotics, and community spirit, yet habitually stays up late perfecting sketches and sometimes forgets homework deadlines.
background:
  cultural: Cristian is a Guatemalan‑American raised in a bilingual household in Stone Mountain, GA. His family preserves strong ties to Guatemalan traditions, celebrating holidays like Día de los Muertos,
    Semana Santa, and traditional New Year customs. He grew up listening to Guatemalan folk music and learning about textile patterns and story‑telling art forms, which influence his own artistic style.
    The values of family solidarity, respect for elders, and community cooperation are central to his upbringing. Living in a diverse Southern community, he blends his heritage with local cultural experiences,
    resulting in a bicultural identity that shapes his worldview, creativity, and desire to give back through community‑oriented projects.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Digital illustration (Procreate, Photoshop)", "Traditional drawing and watercolor", "Basic coding (Scratch, Python fundamentals)", "Soccer teamwork
    and strategy", "Event planning and organization", "Public speaking and presentation", "Collaborative project management"]'
  hobbies: '["Sketching and drawing", "Digital art creation (Procreate, Photoshop)", "Playing soccer", "Listening to Guatemalan folk music", "Learning guitar", "Attending cultural festivals (e.g., Día de
    los Muertos)", "Reading graphic novels and sci‑fi books", "Participating in school robotics club", "Volunteering at community center teaching art"]'
  career_goals: Cristian aspires to pursue a college degree in graphic design or visual communication, eventually working as a professional illustrator or UI/UX designer. He aims to build a robust portfolio
    that blends modern digital techniques with motifs from Guatemalan folk art, hoping to create culturally resonant designs for brands and interactive media. In the longer term, he envisions mentoring
    younger students through community art workshops and possibly expanding into indie game development that celebrates his heritage. His immediate goals include mastering advanced Photoshop tools, completing
    a summer art internship at a local design studio, and participating in regional art competitions.
