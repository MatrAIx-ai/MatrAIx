  career_goals: Although retired from formal employment, Elizabeth aims to deepen her impact on the Montgomery community by creating a locally accessible archive of Mexican‑American family histories, leading
    intergenerational storytelling workshops, and mentoring volunteers in cultural preservation. She also hopes to travel to her ancestral hometown in Jalisco, Mexico, to collect oral histories and recipes
    for a personal memoir that celebrates her family's journey. Maintaining her health and staying active in her church and senior‑center activities remain central to her long‑term aspirations.
