  career_goals: David aspires to become an executive chef at a flagship farm‑to‑table restaurant in Minneapolis, where he can lead a team that fuses Midwestern ingredients with avant‑garde techniques. In
    the longer term, he plans to launch his own experimental bistro that doubles as an art space, publish a cookbook that explores the intersection of abstract art and gastronomy, and earn recognition such
    as a James Beard Award. To support these ambitions, he intends to complete a bachelor's degree in food science and attend advanced culinary residencies that challenge his creative boundaries.
