personas:
  professional: David Seaman, a 41-year-old culinary innovator with a HACCP certification, blends precise inventory control, experimental molecular gastronomy, and a competitive, imaginative drive to lead
    kitchen teams that push the boundaries of farm‑to‑table cuisine while balancing organization with the flexibility needed for artistic expression.
  sports: David Seaman, a 41-year-old outdoor enthusiast, spends weekends hiking Minnesota’s lakeshore trails, follows the Minnesota Vikings and the Twin Cities Cycling Club, they balance a competitive
    board‑game mindset with a moderate, low‑impact fitness routine, preferring endurance over high‑intensity workouts.
  arts: David Seaman, a 41-year-old culinary artist, paints abstract canvases inspired by Mark Rothko, captures food photography reminiscent of Wolfgang Tillmans, they frequent the Walker Art Center’s contemporary
    exhibitions and indie film screenings at the Minneapolis St. Paul International Film Festival, read speculative fiction by N. K. Jemisin, and play piano to the strains of Radiohead on quiet evenings.
  travel: David Seaman, a 41-year-old chef‑explorer, prefers meticulously planned culinary‑themed trips, they have trekked Iceland’s volcanic landscapes, fallen in love with Kyoto’s kaiseki traditions,
    and dream of a sustainable food retreat in the Tuscan hills, all while budgeting for a future experimental bistro.
  culinary: David Seaman, a 41-year-old culinary strategist, excels at crafting sous‑vide duck breast with miso‑glazed carrots, fermenting kimchi in mason jars, and staging tasting menus that pair local
    Minnesota wild rice with edible flowers, they savor the tactile joy of hand‑kneading artisan sourdough while constantly tweaking recipes to balance avant‑garde flair with nutritional science.
  core: David Seaman, a 41-year-old chef‑painter, fuses avant‑garde gastronomy with abstract art, they compete fiercely yet organize meticulously, and occasionally skip self‑care in pursuit of culinary
    perfection.
background:
  cultural: David grew up in a Midwestern family with deep German‑Scandinavian roots, a heritage common in Minnesota's Ramsey County. Family gatherings often featured hearty comfort foods and seasonal produce
    from local farms, instilling an early respect for community, sustainability, and regional ingredients. Living in the culturally diverse city of Minneapolis, he has been influenced by immigrant culinary
    traditions—particularly Ethiopian, Vietnamese, and Scandinavian fare—which he blends with his own creative vision. This blend of Midwestern pragmatism, heritage cooking, and exposure to a vibrant, multicultural
    food scene shapes both his personal identity and his culinary approach.
