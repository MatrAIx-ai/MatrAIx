  career_goals: Pedro aims to advance to a regional management position within the next five years, overseeing multiple store locations. To support this, he plans to enroll in an evening Business Administration
    program to earn his bachelor's degree and obtain a Certified Manager credential. He also aspires to mentor junior staff, fostering a supportive workplace culture, and eventually launch his own family‑owned
    convenience‑store franchise that blends his operational expertise with his cultural heritage.
