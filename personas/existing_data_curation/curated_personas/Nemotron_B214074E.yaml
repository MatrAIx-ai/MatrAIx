  career_goals: Monica aspires to a career that combines structure, service, and community impact. She envisions becoming a teacher or youth mentor who can create organized learning environments and empower
    other young people. She also expresses interest in public health or community outreach, hoping to support health education in her neighborhood. Her long‑term ambition is to pursue higher education in
    education or health sciences, using her leadership, organization, and compassionate nature to make a positive difference.
