  hobbies: '[''Visiting art galleries and museums'', ''Reading literary and philosophical books'', ''Participating in book clubs'', ''Listening to Cuban music and dancing salsa'', ''Herb and tropical gardening'',
    ''Knitting for charity'', ''Playing bridge and Scrabble'', ''Attending weekly mass'', ''Volunteering as cultural heritage guide in Little Havana'']'
  career_goals: Although retired, Noelia aims to leave a lasting imprint on her family and community. She plans to document her family's migration story and culinary traditions in a handwritten memoir to
    share with grandchildren. She aspires to mentor younger relatives in preserving Cuban cultural practices, especially cooking and music. In the local senior center, she hopes to continue advising the
    art program, helping to curate exhibitions that blend Cuban and contemporary influences. She also wishes to stay mentally active by enrolling in online courses on philosophy and art history, and to
    travel, if health permits, to attend the annual Calle Ocho Festival and revisit places of personal significance in Cuba.
