personas:
  professional: Noelia Negron, a retired household manager turned senior center art program advisor, leverages their budgeting acumen, fluency in Spanish, and sharp eye for composition to curate exhibitions
    and mentor volunteers, while they showcase a competitive edge in strategic board‑game sessions.
  sports: Noelia Negron enjoys gentle daily walks along the Miami River, participates in a senior‑friendly tai chi class, and avidly follows the Miami Marlins during baseball season, though they seldom
    join competitive sports themselves.
  arts: Noelia Negron frequents the Pérez Art Museum and local galleries, admires the works of Frida Kahlo and Diego Rivera, creates hand‑crafted mosaics inspired by Caribbean colors, and spends evenings
    listening to classic boleros and salsa while gently dancing.
  travel: Noelia Negron plans trips that balance cultural immersion with comfort, having toured Little Havana’s historic streets and a recent cruise to Key West, they dream of revisiting the town of Trinidad
    in the Caribbean and attending the Calle Ocho Festival, while preferring to travel with a family companion and a detailed itinerary that includes accessible accommodations.
  culinary: Noelia Negron excels at preparing classic dishes like ropa vieja, arroz con pollo, and picadillo, favors fresh cilantro, oregano, and ripe plantains in their cooking, and enjoys hosting small
    gatherings where they serve homemade black beans and seasoned tropical fruit salads.
  core: Noelia Negron blends a sage’s curiosity with a competitive sparkle, balancing meticulous budgeting and garden stewardship with occasional forgetfulness about appointments and a stubborn love for
    nightly bolero playlists.
background:
  cultural: Born in the mid‑1930s in a small town near Havana, Noelia grew up immersed in Cuban traditions of family solidarity, music, dance, and culinary heritage. She left Cuba with her family during
    the early 1960s and settled in Miami's vibrant Cuban enclave, where she helped build a close‑knit community of exiles. Bilingual and deeply proud of her roots, she celebrates Cuban holidays such as
    Día de la Cultura Cubana and maintains rituals like preparing festín de San Juan. Her identity blends the resilience of her island upbringing with the diaspora experience, making her a bridge between
    generations of Cuban-American life in Miami.
