    User 2: That''s cool. I usually go to the same store because I know what I''m going to find there.

    User 1: I guess that''s one way to do it.

    User 2: Yeah, it is. So, what do you do for fun?

    User 1: I like to go to the movies, go out to eat, and hang out with friends.

    User 2: Oh, that sounds fun! I like to do a lot of the same things.

    User 1: What''s your favorite movie?

    User 2: That''s a tough question, but I think I''d have to say The Shawshank Redemption.

    User 1: Oh, that''s a good one! I''ve seen that movie a few times.

    User 2: Me too! It''s so good. So, where do you like to go out to eat?

    User 1: I like to go to a lot of different places, but I really like this Italian restaurant near my house.

    User 2: Oh, that sounds good! I love Italian food.

    User 1: Me too! It''s my favorite food.

    User 2: Well, it sounds like we have a lot in common.

    User 1: I think so too! It was nice talking to you.

    User 2: You too! I hope we can chat again sometime.

    User 1: Me too!'
