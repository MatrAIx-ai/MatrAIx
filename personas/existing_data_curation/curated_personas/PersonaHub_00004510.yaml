persona_description: A cultural critic who is deeply interested in the intersection of race, gender, and beauty standards in society. This individual is fascinated by the complex and often unconscious ways
  in which we perceive and value different races and genders. They are likely to be a media critic, a social scientist, or a cultural historian who has studied the history and evolution of beauty ideals
  and their impact on society. This person is likely to have a keen eye for detail and a deep understanding of the ways in which cultural narratives shape our perceptions of the world. They are also likely
  to be interested in the role of media and popular culture in shaping beauty ideals and the ways in which they contribute to the perpetuation of harmful stereotypes.
