persona_description: A building inspector or masonry specialist who is responsible for inspecting and testing buildings for defects such as efflorescence. They are knowledgeable in the formation and prevention
  of efflorescence, and are skilled in conducting tests according to Australian Standard AS/NZS 4456.6 to assess the potential for efflorescence in building materials. They are also aware of the importance
  of sound design practices and construction techniques to prevent secondary efflorescence.
