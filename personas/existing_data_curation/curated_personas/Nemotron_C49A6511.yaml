  hobbies: '["Group dancing", "Co‑ed soccer", "Hiking", "Photography", "Volunteering at food bank", "Reading contemporary fiction", "DIY upcycled crafts", "Yoga"]'
  career_goals: Dina aims to translate her frontline experience into leadership within the retail industry. Over the next few years she plans to pursue a part‑time associate degree in Business Administration
    at a nearby community college while continuing to work. Her short‑term goal is to become a department supervisor, where she can mentor newer staff and shape the store’s customer‑service standards. In
    the medium term, she aspires to a store‑manager position, overseeing operations, inventory, and staff development. Long‑term, she envisions opening her own boutique that showcases locally made, ethically
    sourced apparel, combining her love for fashion, community engagement, and sustainable business practices. She also hopes to volunteer as a career‑coach for youth in her town, sharing retail‑industry
    insights.
