  career_goals: Approaching retirement, Brandon aims to transition from full‑time material moving to a mentorship and advisory role within his current company, focusing on safety training and best‑practice
    logistics for younger workers. He plans to obtain a Certified Safety Professional (CSP) credential to formalize his expertise. Simultaneously, Brandon seeks to turn his artistic passions into a modest
    side venture, selling original paintings, prints, and handcrafted woodworking pieces at local fairs and online. He also wishes to volunteer as an art instructor at the community center, organize a senior‑focused
    cultural events series, and eventually compile a memoir that intertwines his personal history with the evolving story of labor and community life in Chenango County.
