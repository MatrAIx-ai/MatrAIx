  career_goals: Although approaching retirement, Qing aims to transition into a part‑time educator role at the local community college, teaching practical nursing skills and cultural competency to the next
    generation of caregivers. He is working toward a certification in geriatric nursing to formalize his expertise. Qing also wants to develop a community‑based senior wellness program that combines routine
    health screenings with culturally relevant activities, such as traditional exercise classes and nutrition workshops. Additionally, he aspires to publish a reflective article on how routine and compassion
    intersect in long‑term patient care, hoping to influence policy on senior health services in Kansas City.
