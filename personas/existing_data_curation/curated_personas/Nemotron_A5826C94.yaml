personas:
  professional: Devon Sanders, a seasoned community organizer and practical budget manager, uses their preference for structure and competitive spirit to coordinate church events and a neighborhood garden
    project, yet they often let flexibility dominate, leading to occasional disorganization and a cautious skepticism about collaborators’ intentions.
  sports: Devon Sanders enjoys leisurely walks along the Mobile Bay waterfront for fitness, follows the University of South Alabama Jaguars football team with avid enthusiasm, and occasionally joins a local
    senior softball league, though their competitive streak sometimes makes them more critical of teammates than supportive.
  arts: Devon Sanders sings gospel with the church choir, relishes listening to classic R&B icons such as Aretha Franklin and Al Green, quilts intricate family heirloom blankets, and devours Agatha Christie
    mysteries, all of which shape their artistic identity and provide a structured yet comforting creative outlet.
  travel: Devon Sanders prefers short road trips to Gulf Coast destinations like New Orleans, Charleston, and Savannah, planning visits around church events and budget constraints, while dreaming of a guided
    cultural tour of Washington, D.C.’s museums but often postpones it due to health worries and family responsibilities.
  culinary: Devon Sanders excels at preparing classic Southern dishes like shrimp‑and‑grits, collard greens seasoned with smoked turkey, and sweet potato pie, frequently experimenting with fresh herbs such
    as thyme and basil, though they sometimes over‑salt the gumbo and indulge in generous pats of butter for comfort.
  core: Devon Sanders is a structured yet flexibly disorganized soul‑food enthusiast who balances community leadership with a skeptical, competitive edge, often worrying about health and finances while
    finding solace in gardening, quilting, and gospel music.
background:
  cultural: Devon is rooted in the African‑American community of Mobile, Alabama, a city with a rich legacy of Gullah influences, Mardi Gras Indian traditions, and a strong church culture. Raised during
    the later years of segregation, she witnessed the civil‑rights movement’s impact on her neighborhood and carries forward stories of resilience and community solidarity. Her family’s culinary practices,
    church involvement, and oral storytelling reflect the deep Southern Black heritage that shapes her values, celebrations, and everyday life.
attributes:
  skills: '[''Traditional Southern cooking'', ''Household budgeting and finance management'', ''Basic computer literacy (email, video calls)'', ''Community event coordination'', ''Gardening (herbs, vegetables)'',
    ''Sewing and quilting'', ''First aid basics'', ''Oral history documentation'']'
  hobbies: '[''Cooking soul‑food recipes'', ''Backyard gardening'', ''Quilting and sewing'', ''Church choir singing'', ''Reading mystery novels'', ''Listening to gospel and classic R&B'', ''Walking along
    Mobile Bay'', ''Attending local festivals and Mardi Gras Indian celebrations'']'
  career_goals: Even though she is not currently employed, Devon aims to remain active, healthy, and influential in her community. She hopes to complete a personal memoir and a family recipe book that capture
    her heritage, volunteer as a mentor for younger Black women in Mobile, and lead a neighborhood garden project that encourages friendly competition. She also aspires to learn more advanced digital tools
    so she can support her grandchildren’s education and maintain regular contact. Maintaining a stable, predictable home environment for her husband while gently expanding her social contributions are
    central to her ambitions.
