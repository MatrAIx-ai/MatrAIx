  hobbies: '["Multiplayer video gaming (e.g., Fortnite, Apex Legends)", "Hip‑hop and cultural dance", "Karaoke sessions", "Cooking family recipes", "Social media video creation (TikTok, Instagram)", "Volunteer
    work at community festivals", "Organizing flash mob performances", "Listening to eclectic music"]'
  career_goals: He aims to complete his GED within the next year, enroll in a culinary arts apprenticeship to master his cooking heritage, and eventually launch a mobile food‑truck that showcases modern
    twists on traditional Southeast Asian street foods. Simultaneously, he wants to grow a personal brand on TikTok and Instagram, using his communication talents to highlight cultural stories and local
    events. Ultimately, his ambition is to become a recognized community entrepreneur who blends food, media, and civic engagement.
