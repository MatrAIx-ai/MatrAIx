  hobbies: '[''Playing basketball'', ''Hiking'', ''Cooking soul food'', ''Attending live music concerts'', ''Participating in tech meetups'', ''Volunteering for STEM outreach'', ''Traveling'', ''Reading
    science fiction'']'
  career_goals: Wilbert aims to become a senior engineer and eventually a project director overseeing large‑scale infrastructure projects that incorporate sustainable design. He plans to obtain his Professional
    Engineer (PE) license within the next two years and earn a PMP certification to solidify his leadership credentials. Long‑term, he envisions launching a consultancy that mentors emerging black engineers
    and partners with municipalities to deliver resilient, community‑focused solutions. His ambition is anchored in a desire to set high standards, achieve measurable impact, and pave a clear path for others
    from underrepresented backgrounds.
