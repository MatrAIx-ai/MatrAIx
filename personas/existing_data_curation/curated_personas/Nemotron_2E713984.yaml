personas:
  professional: Wilbert Frazier, a disciplined mechanical engineer specializing in structural analysis and Lean Six Sigma, leverages their organized, Agile‑driven project leadership to steer multidisciplinary
    teams toward efficient, sustainable infrastructure designs.
  sports: Wilbert Frazier competes in a local Cleveland basketball league, tracks the Cleveland Cavaliers and Browns, hikes the Cuyahoga Valley National Park each spring, and sticks to a structured weekly
    fitness plan that blends cardio, strength training, and mobility drills.
  arts: Wilbert Frazier fuels their creative spark by catching live performances from Miles Davis jazz ensembles to Kendrick Lamar hip‑hop shows, attending Cleveland Play House productions, and revisiting
    sci‑fi classics like The Matrix, all of which inform their innovative engineering solutions.
  travel: Wilbert Frazier crafts detailed itineraries for weekend getaways to Chicago’s architectural districts and New York’s museums, while dreaming of trekking the Scottish Highlands and exploring Kyoto’s
    historic temples, balancing a modest travel budget with a thirst for cultural immersion.
  culinary: Wilbert Frazier showcases intermediate cooking skills by perfecting Southern staples such as shrimp and grits, collard greens, and peach cobbler, seasoning with smoked paprika, cayenne, and
    fresh thyme, and regularly hosts potluck evenings where friends sample their soulful dishes.
  core: Wilbert Frazier blends relentless organization and professional ambition with a Saturday habit of basketball, spontaneous hikes, and an occasional lapse in dental flossing, creating a uniquely disciplined
    yet socially vibrant lifestyle.
background:
  cultural: Wilbert grew up in a close‑knit African‑American family in Cleveland’s historic West Side neighborhoods, where church gatherings, community festivals, and family meals centered around soul food
    forged his sense of identity. His parents emphasized education and community service, instilling pride in his heritage and a responsibility to give back. He celebrates Juneteenth and participates in
    local black cultural events at the Cleveland Museum of Art and the African American Museum. These experiences have nurtured a deep appreciation for black history, music, culinary traditions, and mentorship,
    shaping both his personal values and professional drive.
attributes:
  skills: '[''Structural analysis'', ''CAD modeling (SolidWorks)'', ''Project management (Agile)'', ''Python programming'', ''Data analytics (SQL, Tableau)'', ''Quality assurance'', ''Lean Six Sigma (Green
