personas:
  professional: Sonia Morales, a budding software creator, channels their curiosity and practical mindset into designing interactive stories on Scratch, where they collaborate with classmates to blend code
    with narrative flair.
  sports: Sonia Morales, a dynamic midfielder for the Eastside Hawks youth soccer club, complements their on‑field training with weekly Latin dance classes, and cheers for the national women's soccer team,
    while also participating in the school's intramural track events during spring, and they often organize team drills that emphasize cooperation and fun.
  arts: Sonia Morales, an avid theater enthusiast and sketch artist, draws inspiration from contemporary YA novels and the vibrant choreography of artists like Bad Bunny and Rosalia, often recreating iconic
    scenes in their notebook and starring in school productions that explore diverse cultural narratives.
  travel: Sonia Morales, a curious teen explorer, has trekked the colorful streets of a historic colonial town during a family vacation, dreams of attending the cherry‑blossom festival in Kyoto, and plans
    weekend road trips to nearby national parks where they can combine hiking with impromptu dance sessions.
  culinary: Sonia Morales, an enthusiastic home cook, enjoys mastering family recipes such as tacos al pastor with pineapple, salsa verde made from roasted tomatillos and jalapeños, and fluffy churros dusted
    with cinnamon sugar, often experimenting with fresh cilantro, lime juice, and homemade corn masa in the family kitchen, and they love sharing the meals with friends at school gatherings.
  core: Sonia Morales blends a love for group sports, dance, and coding with an organized yet flexible routine, often staying up late perfecting Scratch projects while occasionally forgetting homework,
    and they balance their energetic social life with a disciplined approach to health and finances.
background:
  cultural: Sonia is a first‑generation Mexican‑American raised in Sylmar, a neighborhood with a vibrant Latino community. At home, she speaks Spanish with her parents and grandparents, celebrating traditions
    such as Día de los Muertos, Las Posadas, and Cinco de Mayo with family gatherings, music, and food. Her Catholic upbringing and close‑knit family shape her values of respect, hospitality, and community
    service. Growing up in Los Angeles County, she blends Mexican cultural heritage with Californian influences, attending bilingual school programs and participating in local cultural events, which reinforce
    her bicultural identity.
