  career_goals: Sonia aspires to pursue a career that combines her love for languages, community service, and technology. She aims to become a bilingual public health educator or a community outreach specialist,
    where she can use her communication and tech skills to promote health and wellness in Latino neighborhoods. In the longer term, she dreams of earning a degree in public health or environmental science,
    and eventually leading programs that empower immigrant families. She also keeps the option open to become a teacher, inspired by educators who make learning engaging and culturally responsive.
