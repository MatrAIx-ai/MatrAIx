  hobbies: '["Visiting local art museums and galleries","Attending community art walk events","Beach and nature walks with sketching","Gardening native plants","Crocheting","Spontaneous road trips to cultural
    sites","Listening to live music at small venues","Open‑mic poetry nights"]'
  career_goals: Frances hopes to move into a supervisory role within the building‑services department, where she can mentor new janitorial staff and help design more efficient cleaning protocols. She is
    interested in taking a short certification course in workplace safety so she can become a certified safety officer. In the longer term, she dreams of starting a small, boutique cleaning business that
    caters to local art studios and galleries, combining her cleaning expertise with her love of the arts. She also plans to enroll in community‑college art classes to deepen her knowledge of painting and
    sculpture, hoping to one day curate a small exhibition of local artists in her neighborhood community center.
