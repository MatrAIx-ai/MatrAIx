personas:
  professional: Frances Sullivan, a seasoned building‑services specialist with over thirty years of commercial cleaning and maintenance experience, leverages a meticulous eye for detail; they also possess
    adept minor‑repair skills and a talent for calm tenant negotiations, and they are building toward a supervisory role while envisioning a boutique cleaning service for art studios.
  sports: Frances Sullivan, an avid walker, joins a local senior fitness group for sunrise beach strolls and enjoys occasional pick‑up games of beach volleyball in summer; they silently root for the Orlando
    Magic, Tampa Bay Buccaneers, and Tampa Bay Rays, and they maintain a casual membership at the Port Orange community pool for low‑impact swimming sessions during winter.
  arts: Frances Sullivan, a devoted participant in Central Florida’s art community, spends weekends sketching coastal shells at Spruce Creek Preserve, volunteers at the Port Orange Art Walk, attends open‑mic
    nights featuring folk singer Ani DiFranco, and draws inspiration from the bold colors of Georgia O’Keeffe and the contemporary installations of local artist Mike Mathieu; they nurture a dream to curate
    a neighborhood exhibition.
  travel: Frances Sullivan, a spontaneous road‑tripper, prefers last‑minute day‑long drives along the Atlantic coast to the historic streets of St. Augustine, the art‑filled alleys of Sarasota, and the
    eclectic music scene of Nashville; they always pack a sketchpad and a small camera to capture unexpected gallery finds and roadside antique treasures.
  culinary: Frances Sullivan, a lover of Floridian flavors, delights in cooking citrus‑marinated grilled grouper with mango‑avocado salsa, whips up key‑lime pie using home‑grown basil, and pauses their
    crochet sessions for coffee at local cafés that serve artisanal espresso paired with freshly baked almond croissants.
  core: Frances Sullivan blends a meticulous cleaning career with a free‑spirited love of art, spontaneous road trips, and garden‑to‑table cooking; they also juggle mild health issues and a habit of impulsively
    buying tickets to open‑mic nights.
background:
  cultural: Frances grew up in a middle‑class, white family in the coastal region of Florida, attending Seabreeze High School. Her upbringing reflected a blend of Southern hospitality and the diverse, tourism‑driven
    culture of the Atlantic coast. She was raised with Protestant values that emphasized hard work, community service, and modesty. Over the years, she has absorbed the multicultural influences of Port
    Orange’s retirees, seasonal workers, and a growing artistic community, which has sparked her curiosity about art and unconventional ideas. While she values the traditional blue‑collar work ethic she
    learned from her parents, she also embraces the eclectic, laid‑back beach lifestyle that encourages spontaneous experiences and appreciation of local creativity.
