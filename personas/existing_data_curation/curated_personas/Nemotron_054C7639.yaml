  hobbies: '["Visiting art galleries", "Photography", "Reading contemporary fiction and poetry", "Gardening", "Cooking traditional Southeast Asian cuisine", "Participating in small book clubs", "Walking
    tours of historic neighborhoods", "Volunteering at local arts festivals"]'
  career_goals: Approaching retirement, Ester aims to transition from full‑time route work to a mentorship role within the postal service, guiding new carriers and sharing best practices for efficient deliveries
    and customer service. She also hopes to dedicate more time to community‑based art projects, such as volunteering at the Worcester Art Museum’s outreach programs and organizing small‑scale photo exhibitions
    that showcase everyday life in her neighborhood. In the longer term, Ester envisions publishing a modest photo‑essay collection that blends her postal routes with the cultural textures of Worcester’s
    diverse communities.
