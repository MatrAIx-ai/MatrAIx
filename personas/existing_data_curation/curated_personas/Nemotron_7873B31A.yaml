  career_goals: Naomi aims to become a senior claims manager within a tribal insurance agency, where she can mentor newer adjusters and shape policies that better serve Navajo communities. She plans to
    earn the Associate Property Claims Adjuster (APCA) certification and to lead a pilot program that integrates digital claim filing with on‑the‑ground inspections, reducing turnaround time while preserving
    cultural respect. Long‑term, she hopes to develop a training curriculum that blends technical claims skills with cultural competency, contributing to more equitable outcomes for tribal members.
