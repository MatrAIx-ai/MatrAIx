  career_goals: Bobby aims to move from his current sales associate role into a supervisory or managerial position where he can shape the visual and cultural identity of the store. He envisions curating
    product lines that reflect artistic themes and local craftsmanship, ultimately opening a boutique that blends retail with gallery‑style exhibitions. In parallel, he hopes to mentor younger staff, share
    his expertise in customer care, and volunteer as a docent or retail associate at a regional museum, merging his professional experience with his passion for the arts.
