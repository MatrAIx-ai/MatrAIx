  career_goals: At 62, Gerald aims to transition from day‑to‑day audit work to a strategic advisory role, leveraging his curiosity about emerging fintech to help midsize firms adopt automation and data
    analytics. He plans to obtain his Certified Fraud Examiner (CFE) credential within the next two years, mentor junior accountants, and eventually serve on the board of a local nonprofit focused on financial
    literacy for seniors. He also envisions a gradual semi‑retirement, using his expertise to consult part‑time while maintaining active involvement in his professional community.
