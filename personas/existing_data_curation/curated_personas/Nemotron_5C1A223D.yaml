  hobbies: '[''Basketball (pickup games)'', ''Skateboarding'', ''Community volunteering (food bank, senior center)'', ''DIY electronics/LEGO building'', ''Multiplayer video gaming'', ''Outdoor hiking'',
    ''Music (country and pop)'']'
  career_goals: James aspires to work in a field where he can combine his love for helping people with his talent for quick, practical problem‑solving. He plans to earn an EMT certification after high school
    and eventually become a paramedic, seeing this as a way to stay active, be part of a team, and provide immediate assistance in crisis situations. He also dreams of further education in community health
    or public safety, possibly joining a local fire department’s volunteer program to continue serving his Oklahoma City community.
