  career_goals: Although officially retired, Jason aims to deepen his impact on the Athens community by leading a neighborhood mentorship program for teens, serving a term on the town council, and launching
    a mobile barbecue catering service for local festivals. He also hopes to complete a small woodworking project each year and continue learning practical skills that keep him engaged and useful.
