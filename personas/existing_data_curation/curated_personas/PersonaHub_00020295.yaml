persona_description: A historian who specializes in the study of the history of the California missions, particularly the history of the Gabrielino people and their role in the California missions. Her
  research interests include the emergence of new theories about the role of Toypurina in the rebellion at Mission San Gabriel in 1785, the longevity of her story, and the impact of the artworks that pay
  tribute to her. She is particularly interested in the placement of these artworks in prominent and populous public spaces, their larger-than-life scale, and the veneration of Toypurina that is their shared
  goal.
