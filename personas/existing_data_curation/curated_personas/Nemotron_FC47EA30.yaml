personas:
  professional: Trevor Proctor, a retired bank clerk and former office manager, now volunteers as the treasurer of the Smithville historical society where he leverages his meticulous bookkeeping, inventory
    control, and spreadsheet mastery to keep community projects on schedule while applying his calm, assertive coordination style to mentor younger volunteers.
  sports: Trevor Proctor keeps active through early‑morning walks with the Smithville Senior Strollers, enjoys occasional Saturday‑night bowling at the local alley, and follows the St. Louis Cardinals and
    the Kansas City Chiefs on television, treating each game as a structured ritual that complements his modest fitness routine.
  arts: Trevor Proctor’s artistic side shines in his weekend classic‑film marathons starring Humphrey Bogart, his fondness for folk ballads by Pete Seeger, and regular visits to the local community theater
    to see productions like "Our Town," all of which provide a quiet cultural anchor to his structured life.
  travel: Trevor Proctor prefers meticulously planned road trips, having already explored historic sites in Washington, D.C., and the Missouri River towns, he now dreams of a restful visit to his grandchildren’s
    home in Orlando, Florida, followed by a curated tour of Colonial Williamsburg that blends family time with his passion for regional history.
  culinary: Trevor Proctor enjoys baking a rustic sourdough loaf each weekend, preparing hearty chicken pot pie with farm‑fresh carrots and corn, and seasoning his dishes with a splash of locally sourced
    honey and rosemary, reflecting both his modest culinary skill and his love for home‑grown flavors.
  core: Trevor Proctor is a methodical, garden‑tending retiree who blends precise bookkeeping, careful financial stewardship, and a quiet love of classic film and woodworking, while occasionally hoarding
    spreadsheets and forgetting to take his blood‑pressure meds after a long day in the workshop.
background:
  cultural: Trevor grew up in a traditional Midwestern, small‑town environment in Clay County, Missouri. His white, working‑class heritage is characterized by values of self‑reliance, community service,
    modesty, and a strong work ethic. He was raised in a Protestant household that emphasized regular church attendance and participation in community events. These cultural influences, combined with his
    long residency in Smithville, have shaped his preference for predictable routines, orderly living, and close‑knit family and neighborhood ties.
