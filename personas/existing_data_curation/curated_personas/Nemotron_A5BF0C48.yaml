personas:
  professional: Cecilia Hendricks, a self‑appointed playground coordinator, uses their love for routine to schedule games down to the minute while their competitive streak pushes them to dominate every
    round of tag, and their skeptical eye keeps friends honest about rule‑breaking.
  sports: Cecilia Hendricks, a regular at the local Brookside Playground, spends afternoons swinging, climbing, and sprinting in games of tag, proudly wears a Chicago Cubs cap while cheering for the neighborhood
    Little League Tigers, and channels their competitive nature into mastering checkers and trying to beat older kids on the soccer field.
  arts: Cecilia Hendricks, who fills sketchbooks with Peppa Pig and My Little Pony characters, belts out 'Let It Go' from Frozen with the same gusto as Idina Menzel during family karaoke nights, and spends
    evenings admiring the whimsical illustrations of Dr. Seuss and the vibrant songs of Disney's Encanto soundtrack.
  travel: Cecilia Hendricks, who has visited Disney World in Orlando and the beach at Myrtle Beach with her family, prefers travel itineraries that repeat familiar activities like the nightly ice‑cream
    stop, yet they feel anxious about long flights and missing bedtime, making weekend road trips to Aunt's house their safest adventure.
  culinary: Cecilia Hendricks, a fan of mac and cheese, chicken nuggets, and strawberry-yogurt parfaits, proudly spreads peanut butter on toast by themselves (though they leave a trail of crumbs), and eagerly
    raids the pantry for Frosted Flakes that come with their beloved cereal‑box stickers.
  core: Cecilia Hendricks, a chatty six‑year‑old who thrives on routine yet secretly craves competition, worries over tiny disruptions, and turns every playground into a stage for performance and sticker‑trading.
background:
  cultural: Cecilia is raised in Smyrna, a close‑knit town in Rutherford County, Tennessee. Her family follows Southern customs such as attending a local Baptist church on Sundays, sharing family meals
    that feature dishes like fried chicken, biscuits, and cornbread, and participating in community events like county fairs and high school football tailgates. The regional culture emphasizes politeness,
    neighborly support, and an appreciation for routine and tradition, all of which influence her daily life and values.
attributes:
  skills: '[''Reading simple picture books'', ''Counting to 100'', ''Writing name and sight words'', ''Following a memorized daily routine'', ''Drawing and coloring familiar characters'', ''Singing nursery
    rhymes'', ''Using educational tablet apps for puzzles'', ''Storytelling during group play'', ''Learning game rules quickly'']'
  hobbies: '[''Crayon drawing and coloring'', ''Karaoke singing at home'', ''Playing on the playground'', ''Board games (Candy Land)'', ''Competitive games (checkers)'', ''Sticker collecting and trading'',
    ''Watching animated series'', ''Church youth gatherings'', ''Pretend imaginative play'']'
  career_goals: Although only six, Cecilia already imagines a future where she can blend her love for routine, performance, and caring for others. She often says she wants to become a teacher so she can
    help younger children master daily schedules and enjoy storytime. She also dreams of being a dancer or singer, enjoying the chance to be the center of attention on stage. Occasionally she mentions wanting
    to be a veterinarian because she likes animals and thinks competing in science projects could be exciting. Her ambitions are guided by a desire for stability, recognition, and opportunities to lead
    and entertain.
