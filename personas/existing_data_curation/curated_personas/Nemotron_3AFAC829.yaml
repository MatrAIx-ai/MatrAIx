  career_goals: Johanna aims to pursue a career that rewards precision, routine, and measurable outcomes. She plans to attend a reputable university where she will major in accounting or finance, maintain
    a top-class GPA, and secure internships with local accounting firms. Her long-term ambition is to become a certified public accountant (CPA) and eventually work in a senior financial analyst or audit
    manager role, where she can apply her disciplined work ethic, analytical skill set, and commitment to high standards.
