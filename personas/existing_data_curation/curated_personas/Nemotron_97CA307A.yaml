  hobbies: '[''Community theater acting'', ''Organizing charity events'', ''Lake Michigan shoreline hiking'', ''Gardening'', ''Trivia nights'', ''Baking'', ''Knitting'', ''Reading mystery novels'']'
  career_goals: She aims to advance from billing clerk to senior billing supervisor within the next three years, earning a Certified Billing Specialist credential and completing an associate’s degree in
    accounting. Annamaria plans to lead a small team, streamline billing processes, and implement efficiency initiatives that reduce errors and processing time. Long-term, she envisions starting a boutique
    bookkeeping consultancy serving local small businesses in Allegan County, leveraging her expertise and strong community connections.
