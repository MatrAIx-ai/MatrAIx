persona_description: A hepatologist who specializes in the diagnosis and treatment of cholangiocarcinoma, with a particular focus on the management of biliary obstruction and the identification of genetic
  drivers of cholangiocarcinoma progression. This persona is knowledgeable about the diverse group of cholangiocarcinomas and their anatomical locations, and has expertise in advanced cytological tests
  such as fluorescence in-situ hybridisation for aneusomy. They are aware of the importance of liver transplantation as a curative option for selected patients with perihilar cholangiocarcinoma, and are
  part of international efforts to identify the genetic drivers of cholangiocarcinoma progression.
