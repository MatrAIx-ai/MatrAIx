  career_goals: Dennis aims to advance into senior loan management, eventually becoming a branch manager or regional credit operations supervisor. He plans to earn a Certified Credit Counselor designation
    and pursue an associate's degree in finance to solidify his expertise. He also hopes to develop a community financial education workshop series in Shelby County, positioning himself as a trusted resource
    for local residents. Long-term, he envisions opening a small independent financial counseling practice that blends personalized service with a focus on underserved populations.
