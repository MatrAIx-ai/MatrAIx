  hobbies: '[''Landscape Photography'', ''Cooking Mexican Cuisine'', ''Hiking'', ''Reading Philosophy and History'', ''Painting'', ''Gardening'', ''Attending Community Theater'', ''Playing Board Games'',
    ''Mindfulness Journaling'']'
  career_goals: Rolando aims to re-enter the workforce in a part-time capacity that leverages his organizational talent and cultural knowledge, such as a community outreach coordinator for a local cultural
    center or a freelance consultant helping small businesses streamline operations. He plans to complete his college degree in Business Administration or Environmental Studies within the next two years.
    Long-term, he hopes to launch a small garden-to-table venture that combines sustainable farming with his love of cooking, while also mentoring youth in the Shenandoah County community about Mexican
    traditions and environmental stewardship.
