  hobbies: '["Playing acoustic guitar", "Attending local live‑music events", "Snowshoeing and cross‑country skiing", "Hiking in the White Mountains", "Weekend car restoration projects", "Homebrewing craft
    beer", "Volunteering at community food drives", "Pickup basketball games", "Video gaming (racing simulators)", "Participating in regional car‑club meet‑ups"]'
  career_goals: Greg aims to earn the ASE Master Technician certification within the next two years and move into a service manager role at his current shop. Long‑term, he plans to open a small, community‑focused
    garage that offers both routine maintenance and classic‑car restoration, while providing apprenticeships for local youth. He also intends to complete a part‑time business management course to strengthen
    his entrepreneurial skills.
