personas:
  professional: Greg Bailey, a 26‑year‑old automotive technician in Sandown, merges hands‑on expertise with a personable approach, diagnosing engine and transmission issues using OBD‑II tools while translating
    complex repairs into clear explanations for customers, and is on track to earn ASE Master Technician certification and transition into a service manager role.
  sports: Greg Bailey is a regular at the New Hampshire Ski Club for cross‑country skiing and snowshoeing in winter, hits the White Mountains for summer hikes, plays pickup basketball at the local gym,
    and follows the New England Patriots, Boston Bruins, and Boston Red Sox while cheering for the regional amateur baseball team, the Sandown Sox.
  arts: Greg Bailey channels creativity through acoustic‑guitar open‑mic nights at Portsmouth’s The Music Hall, draws inspiration from folk‑rock artists like The Avett Brothers and Mumford & Sons, and frequents
    the Portsmouth Arts Center to appreciate local painters such as Sarah Whitaker.
  travel: Greg Bailey prefers meticulously planned road trips that balance adventure and relaxation, having driven the scenic Kancamagus Highway for fall foliage, trekked the Adirondacks in New York, sampled
    craft brews in Portland, Maine, and dreamed of attending the Austin City Limits Music Festival when finances allow.
  culinary: Greg Bailey is an enthusiastic home‑brewer, crafting IPAs with Pacific Northwest hops and stouts infused with local honey, while also cooking hearty New England staples like clam chowder, lobster
    rolls, and rosemary‑roasted chicken using fresh ingredients from the Sandown farmers’ market.
  core: Greg Bailey, 26, blends a New England work ethic with talkative charm, juggling garage ambitions, guitar strings, and a lingering anxiety that fuels both meticulous planning and occasional procrastination.
background:
  cultural: Greg grew up in a working‑class family in Sandown, New Hampshire. His parents, of Irish‑English descent, emphasized hard work, reliability, and community involvement—a hallmark of many New England
    towns. The region’s seasonal rhythms, close‑knit neighborhoods, and a strong local automotive culture shaped his practical outlook. While he identifies with the broader white New England demographic,
    he also cherishes the multicultural influences of nearby Portsmouth’s arts scene and the inclusive atmosphere of local sports leagues.
attributes:
  skills: '["Automotive diagnostics (OBD-II)", "Engine rebuilding", "Brake and suspension repair", "Hybrid/electric vehicle maintenance", "Diagnostic software (Mitchell, Snap-on)", "Parts inventory management",
