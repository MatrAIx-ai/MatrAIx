personas:
  professional: Robert Forment, a budding architect-in-training who spends hours assembling LEGO structures, demonstrates an early knack for spatial reasoning and organization, and channels their energetic
    sociability by inviting friends to collaborative building sessions.
  sports: Robert Forment, a lively three‑year‑old who dashes around the playground with boundless energy, attends the Tiny Tots Soccer Club’s weekly toddler sessions, idolizes the Chicago Cubs for baseball
    and the Los Angeles Lakers for basketball, loves splashing in the summer pool, and insists on a bedtime stretching routine that includes “pretend” yoga poses learned from a children’s video.
  arts: Robert Forment, a budding little artist who spends afternoons finger‑painting vivid rainbows, sings along loudly to The Wiggles’ “Fruit Salad,” watches animated classics by Disney, and proudly displays
    a crayon‑drawn portrait of their favorite superhero, Spider‑Man, on the fridge.
  travel: Robert Forment, an adventurous toddler who loves the rhythmic hum of car rides to the nearby zoo, has already explored the magic of Disneyland, splashed on the sand at Clearwater Beach, and dreams
    of seeing the Eiffel Tower in Paris on a future family vacation, all while insisting on packing their stuffed giraffe as a travel companion.
  culinary: Robert Forment, a picky‑but‑curious eater who devours cheesy macaroni, crispy chicken nuggets, and apple slices with a dab of honey, proudly mixes peanut butter and jelly on toast (often creating
    a messy masterpiece), enjoys helping stir batter for banana pancakes, and insists on a “no‑broccoli” rule at the dinner table.
  core: Robert Forment, a three‑year‑old who thrives on tidy block towers, bursts into spontaneous sing‑along dances, and habitually hides socks in the couch cushions for later surprise retrievals.
background:
  cultural: Robert is raised in a Dominican‑American household in the Bronx, surrounded by a vibrant community that celebrates Dominican culture. His parents speak Spanish at home, and he is exposed to
    traditional music, food, and holidays such as Día de la Independencia and Carnaval. The neighborhood's Dominican diaspora influences his everyday life through local restaurants, community events, and
    bilingual school programs, fostering a strong sense of cultural identity while also integrating into the broader multicultural fabric of New York City.
