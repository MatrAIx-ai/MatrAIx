persona_description: A mountaineer and natural historian who is passionate about studying and preserving the environment, particularly the conservation of seabirds. They are interested in the history, natural
  history, and conservation of Hutton's shearwater, which is a seabird that breeds in an alpine habitat and is one of the only seabirds in the world to breed in an alpine habitat. They are also interested
  in the impact of the Kaikōura earthquake on the mountain colonies of Hutton's shearwaters and are eager to learn more about the birds and their conservation efforts.
