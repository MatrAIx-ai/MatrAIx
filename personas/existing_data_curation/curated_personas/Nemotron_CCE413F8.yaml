  hobbies: '["landscape painting","photography","reading science fiction and philosophy","chess","hiking","fishing","cooking","volunteering for community art workshops","DIY woodworking"]'
  career_goals: Thomas aims to advance his qualifications by obtaining Certified Nursing Assistant (CNA) certification within the next year, followed by pursuing a Licensed Practical Nurse (LPN) license.
    He envisions moving into a supervisory or care‑coordinator role where he can design and implement holistic care plans, including integrating art‑therapy modules for elderly clients. Long‑term, he hopes
    to establish a small home‑health agency that emphasizes personalized, culturally sensitive care and community‑based wellness programs. He is also interested in mentoring new aides, sharing best practices,
    and staying updated on innovative caregiving techniques.
