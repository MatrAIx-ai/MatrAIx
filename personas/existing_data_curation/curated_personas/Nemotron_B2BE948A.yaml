  career_goals: Dwayne plans to earn a bachelor's degree in Education within the next three years, followed by a master's in Educational Leadership to qualify for school‑wide administrative roles. He aspires
    to become a curriculum specialist or assistant principal, where he can lead the development of district‑wide STEM initiatives and mentor fellow educators. He also aims to earn Teacher of the Year recognition,
    establish a formal mentorship program for novice teachers, and continue refining data‑driven instructional strategies while balancing his professional growth with improved stress management techniques.
