  hobbies: '[''watercolor painting'', ''art museum visits'', ''reading historical fiction'', ''gardening'', ''traditional Ecuadorian cooking'', ''listening to music (boleros, folk, jazz)'', ''senior yoga'',
    ''walking in nature'', ''volunteering at senior center'', ''digital photography'']'
  career_goals: While no longer seeking formal employment, Amarylis remains driven by personal growth and community contribution. She aims to complete a memoir that captures her family's migration story
    and cultural heritage, hoping to inspire younger generations. She aspires to expand her mentorship role at the senior center, leading workshops on storytelling and cultural cooking. Additionally, she
    wants to advocate for better accessibility services for seniors in Hazelwood, and continue learning new digital art techniques to blend her love of painting with technology.
