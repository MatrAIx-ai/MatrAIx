persona_description: A historian or social scientist who is interested in colonial Latin America and the history of language. They are particularly interested in the social uses of blasphemic speech in
  colonial Mexico and its complex relationship with gender, class, and race relations. They are also interested in the intersection of religion and politics in colonial Latin America and the impact of the
  Spanish Inquisition on the representation of blasphemy. They have a strong background in research, literature, and archives, and are familiar with the Spanish, Mexican, and U.S. archives and research
  libraries. They are likely to be a scholar or professor, and their work is likely to be published in academic journals or presented at conferences.
