  career_goals: He often shares ambitious daydreams about becoming an astronaut who paints the cosmos, an artist who creates colorful murals inspired by the traditions of his Mexican family, or a scientist
    who discovers new creatures in the desert. He also mentions a desire to help others as a future firefighter or doctor, reflecting his compassionate streak. These goals are expressed through his play,
    drawing rockets, lab coats, and stethoscopes.
