persona_description: A person who is knowledgeable about the care and maintenance of small oak tree seedlings, particularly in regards to transplanting them from their current location to a new location.
  This person has experience in digging transplant holes, removing the seedling from its current location, adjusting the transplant hole as needed, setting the seedling into the new hole, back filling the
  hole with soil, watering the seedling with the garden hose, installing a wooden stake if necessary, and ensuring that the seedling is not weakened by the move. This person is likely to be a professional
  landscaper, horticulturist, or someone who is responsible for maintaining the health and growth of small oak trees.
