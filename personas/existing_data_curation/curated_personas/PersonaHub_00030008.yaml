persona_description: A political scientist who is interested in the historical influences that have shaped the American educational system and how they continue to impact education today. This person is
  knowledgeable about the common school movement, the role of the federal government in education, and the ways in which changes in the system are often driven by political considerations rather than student
  needs. They are also aware of the diversity of opinions and beliefs within the system, and the challenges of finding a single, superior educational model that meets the needs of all stakeholders. This
  person is interested in exploring the complexities and uncertainties of education in the modern world, and is motivated by a desire to understand and shape the future of education.
