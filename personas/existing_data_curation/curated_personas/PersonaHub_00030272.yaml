persona_description: A veterinarian who specializes in the diagnosis and treatment of hemolytic anemias, particularly immune-mediated hemolytic anemias. The veterinarian has extensive experience in the
  clinical assessment and management of bleeding episodes, including the evaluation of physical exam findings, monitored parameters, and laboratory tests. They are skilled in the use of specific breeds
  and coagulopathies to differentiate between acquired and hereditary disorders, and are adept at optimizing assessment based on multiple parameters and the results of physical exam findings. The veterinarian
  is knowledgeable about the environmental history, tick exposure, and the potential for toxic or organic substances to cause bleeding, and is skilled in evaluating the current bleeding episode and characterizing
  the bleed as localized or multifocal. They are also experienced in the use of certain clinical signs to determine the origin of the bleeding episode, and are knowledgeable about the development and progression
  of clinical signs in anemic patients, as well as the importance of monitoring all parameters in unison with one another to assess bleed severity and potentially life-threatening complications.
