  hobbies: '[''Sketching and drawing'', ''Digital photography'', ''Visiting art galleries'', ''Reading (science-fiction, philosophy, technology non-fiction)'', ''Playing acoustic guitar'', ''Hiking and
    nature walks'', ''Coding personal projects in Python'', ''Puzzle solving (crosswords, Sudoku)'', ''Small‑group board game sessions'', ''Local art workshops'']'
  career_goals: Nathan aims to transition into a role that merges his analytical mindset with his creative interests, such as a junior data analyst, digital media specialist, or freelance visual content
    creator. Over the next two years, he plans to enroll in a community‑college certificate program in data analytics or graphic design while building a portfolio of data visualizations and artwork. In
    the longer term, he envisions managing small data‑driven projects for local businesses or cultural institutions, leveraging his methodical approach and competitive drive to deliver high‑quality results
    while maintaining creative autonomy.
