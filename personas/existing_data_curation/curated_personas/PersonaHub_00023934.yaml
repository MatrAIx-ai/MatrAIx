persona_description: A prominent and influential civil rights leader in the United States, Adam Clayton Powell Jr. was a key figure in the desegregation of public schools, military, and the U.S. Capitol.
  He was the preeminent civil rights leader from the 1930s through the 1960s until his passing in 1972. As Harlem's Congressman from 1945 until 1971, his legislative and personal efforts significantly expanded
  opportunities for all Americans in access to higher education, introduced the minimum wage, and formed the cornerstone of the Great Society antipoverty programs.
