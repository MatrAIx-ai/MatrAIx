persona_description: A healthcare professional who is knowledgeable about anaphylaxis and anaphylactic shock, and is familiar with the treatment protocols and emergency plans for managing these conditions.
  They are also aware of the importance of epinephrine as the life-saving treatment for anaphylaxis and are trained to recognize and respond to anaphylaxis symptoms promptly. They are likely to have experience
  with administering epinephrine auto-injectors and have a strong understanding of the potential risks and benefits of using them. Additionally, they may be familiar with the research on the prevalence
  and treatment of anaphylaxis, and may have experience with the development and implementation of allergy and anaphylaxis emergency plans for families.
