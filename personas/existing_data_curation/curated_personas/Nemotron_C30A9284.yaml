  hobbies: '[''Community volunteering'', ''Reading historical fiction'', ''Gardening'', ''Walking coastal trails'', ''Cooking and sharing meals'', ''Playing bridge'', ''Attending local theater'', ''Genealogy
    research'']'
  career_goals: Looking ahead, Amanda hopes to move into a supervisory or lead position within the retail distribution area, where she can guide a team and improve workflow efficiency. She plans to complete
    an associate degree in business administration through a local community college to strengthen her managerial credentials. Additionally, Amanda aspires to earn a certification in supply‑chain logistics,
    which would enable her to take on broader responsibilities such as scheduling deliveries and coordinating with vendors. Ultimately, she aims to retire with a sense of accomplishment, having contributed
    to a supportive workplace culture and possibly mentoring younger employees through a formal training program.
