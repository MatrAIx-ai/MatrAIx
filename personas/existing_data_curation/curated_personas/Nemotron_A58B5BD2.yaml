personas:
  professional: Natashia Kabore, a 19‑year‑old aspiring elementary educator with a bachelor's in education, blends methodical lesson planning, data‑driven instruction, and a collaborative classroom voice
    to design inclusive curricula while volunteering as a tutor and singing in their church choir.
  sports: Natashia Kabore, a 19‑year‑old avid jogger along the York River, joins the local York River Running Club for weekly group runs, supports the Washington Capitals in hockey, cheers for the Virginia
    Cavaliers women's basketball team, and balances aerobic cardio with occasional pick‑up volleyball at the community center.
  arts: Natashia Kabore, an enthusiastic curator of jazz, neo‑soul, and contemporary R&B playlists featuring Miles Davis, Erykah Badu, and H E R, spends weekends reading historical fiction by Philippa Gregory,
    attends local theater productions, and sings soulful harmonies in their church choir, letting music and stories shape their cultural lens.
  travel: Natashia Kabore, a 19‑year‑old history buff, meticulously plans road trips to colonial landmarks like Williamsburg, Savannah’s historic district, and Boston’s Freedom Trail, balances budget travel
    by staying in family‑run B&Bs, and dreams of a semester‑long study abroad in England’s countryside to immerse in Tudor heritage.
  culinary: Natashia Kabore, a budding home chef, blends Southern soul‑food roots with garden‑fresh herb flavors, mastering dishes like fried chicken with buttermilk brine, collard greens seasoned with
    smoked paprika, and sweet potato biscuits, while experimenting with occasional fusion twists like shrimp and grits tacos.
  core: Natashia Kabore, a 19‑year‑old educator‑in‑training, balances a love for history, music, and community tutoring with a disciplined habit of budgeting, mindful jogging, and a quirky obsession with
    collecting vintage jazz records.
background:
  cultural: Natashia is rooted in a close‑knit African‑American family that has lived in the Virginia Peninsula for generations. Her upbringing emphasizes the value of education, community service, and
    faith, with Sunday church gatherings and family meals serving as cultural anchors. She celebrates traditions such as pulling‑up pumpkin pies, soul‑food cooking, and storytelling that honors the history
    of African‑American resilience in the South. Growing up near Williamsburg, she developed a keen appreciation for the region’s colonial history and the contributions of African‑American ancestors to
    that narrative. This blend of Southern heritage, church community, and a strong family emphasis on academic achievement shapes her worldview and informs her commitment to fostering empowerment through
    education.
attributes:
  skills: '["Lesson Planning", "Curriculum Development", "Classroom Management", "Educational Technology Integration", "Student Assessment & Data Analysis", "Tutoring", "Project Management", "Public Speaking",
