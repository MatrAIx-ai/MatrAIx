  hobbies: '["Reading historical fiction", "Visiting Colonial Williamsburg historic sites", "Volunteer tutoring at local community center", "Singing in church choir", "Cooking Southern and soul‑food recipes",
    "Gardening", "Jogging along the York River", "Mindfulness journaling", "Listening to jazz and neo‑soul music", "Participating in book club discussions"]'
  career_goals: Natashia aims to obtain her state teaching certification and secure a full‑time elementary school teaching position in York County within the next year. She plans to pursue a master's degree
    in Curriculum and Instruction to deepen her expertise in inclusive pedagogy and instructional design. Long‑term, she envisions creating a community‑based after‑school tutoring program that blends academic
    support with cultural enrichment, and eventually moving into educational leadership to influence school‑wide policy and teacher development.
