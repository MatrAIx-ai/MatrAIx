personas:
  professional: Eugene Bowyer is a seasoned food‑service manager whose expertise in staff scheduling, inventory forecasting, SOP development, and cost‑control lets them thrive on predictability while their
    relaxed attitude toward rigid obligations inspires a flexible, adaptive approach that they aim to scale into a regional operations manager position for a national restaurant chain.
  sports: Eugene Bowyer plays competitive pickleball as a member of the local Pickleball Club, follows the Jacksonville Jaguars and Miami Dolphins for NFL action, roots for the Tampa Bay Lightning during
    hockey season, and frequently joins community kayak races and weekend fishing outings, blending organized sport with spontaneous water‑based adventure.
  arts: Eugene Bowyer unwinds by listening to classic rock icons such as The Rolling Stones, Led Zeppelin, and Fleetwood Mac, devours mystery novels by Agatha Christie and Gillian Flynn, and regularly attends
    live performances at Jacksonville’s historic Florida Theatre, where local blues and folk acts deepen their appreciation for storytelling through music and literature.
  travel: Eugene Bowyer alternates between meticulously planning weekend road trips to the Florida Keys for night fishing and impromptu getaways to nearby St. Augustine’s historic district, has already
    explored Cartagena, Colombia and dreams of hiking the rainforests of Costa Rica, all while balancing a modest travel budget with a love for coastal adventures.
  culinary: Eugene Bowyer experiments with blackened grouper tacos, citrus‑infused pale ale, mango‑jalapeño salsa, and sourdough bread, brewing seasonal hazy IPAs at home while mastering intermediate cooking
    techniques and favoring fresh Florida seafood, tropical fruit, cilantro, and thyme in dishes that reflect both culinary precision and inventive playfulness.
  core: Eugene Bowyer is a pragmatically structured food‑service professional who balances a love of outdoor paddle sports, craft brewing, and classic rock with a tendency toward last‑minute planning, occasional
    disorganization, and a steadfast, calm approach to stress.
background:
  cultural: Eugene was raised in a middle‑class, white American family with roots in the Midwest and the Southern United States, and he has lived most of his adult life in Edgewater, Florida. Growing up
    in Volusia County exposed him to the state’s multicultural food scene, including Cuban, Caribbean, and Southern influences, which sparked his interest in cooking with fresh local seafood and seasonal
    produce. He values community gatherings, the laid‑back coastal lifestyle, and the blend of traditional American hospitality with the diverse cultural flavors found along Florida’s coastline.
attributes:
  skills: '[''Staff recruitment and training'', ''Shift scheduling'', ''Inventory forecasting'', ''Cost control and budgeting'', ''Menu planning and pricing'', ''POS and kitchen display system operation'',
