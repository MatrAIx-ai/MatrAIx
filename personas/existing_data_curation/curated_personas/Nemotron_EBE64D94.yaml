  hobbies: '[''Paddleboarding'', ''Fishing'', ''Kayaking'', ''Home cooking and recipe experimentation'', ''Homebrewing craft beer'', ''Woodworking'', ''Pickleball'', ''Watching football'', ''Reading mystery
    novels'', ''Listening to classic rock'', ''Business development podcasts'']'
  career_goals: Eugene aspires to move up to a regional operations manager role for a national restaurant chain, where he can apply his blend of systematic planning and flexible execution across multiple
    locations. In the longer term, he dreams of opening a family‑owned bistro in the Edgewater area that showcases locally sourced Florida seafood and seasonal produce, combined with a relaxed dining atmosphere.
    To support these ambitions, he plans to earn a culinary management certification and complete an associate degree in hospitality business, while building a reputation for creating efficient yet adaptable
    kitchen teams.
