personas:
  professional: Alberto Figueroa is a budding robotics enthusiast who channels their love for routine and strategic gaming into building reliable LEGO mechanisms and simple RC cars, and they draw on their
    competitive edge to lead school club projects while carefully balancing organization with occasional doubts about teammates’ commitments.
  sports: Alberto Figueroa is a devoted soccer player on the Brea United youth league who trains five days a week, fuels their competitive drive by cheering for Club América and the LA Galaxy on TV, and
    they treat each match as a routine ritual that balances disciplined conditioning with the occasional stress‑inducing pressure to outperform teammates.
  arts: Alberto Figueroa immerses themselves in regional Mexican music by streaming Los Tigres del Norte and Banda El Recodo while practicing traditional dance steps at community fiestas, and they unwind
    by devouring graphic novels such as Amulet and Bone, which satisfy their love for visual storytelling and strategic plot twists.
  travel: Alberto Figueroa enjoys family road trips to the California coast and occasional weekend visits to Disneyland, but dreams of traveling to Oaxaca to experience Día de los Muertos celebrations and
    to Tokyo for the next major gaming expo, balancing their routine‑loving nature with a yearning for vibrant cultural immersion.
  culinary: Alberto Figueroa loves helping their family in the kitchen to craft homemade tacos al pastor and fluffy tamales seasoned with chipotle and fresh cilantro, proudly boasts a budding cooking skill
    set that includes perfecting guacamole with ripe avocados and lime, yet they often resort to quick pizza slices when their schedule feels too hectic.
  core: Alberto Figueroa balances a competitive, routine‑driven mindset with a love for soccer, robotics, and spicy tacos, though they sometimes over‑worry about performance and spontaneously splurge on
    new video games, revealing a spirited yet anxious twelve‑year‑old.
background:
  cultural: Alberto is a Mexican‑American growing up in Brea, California, in a bilingual household where Spanish is spoken at home and English at school. Mexican cultural traditions—such as celebrating
    Día de los Muertos, enjoying tamales and tacos, and listening to mariachi and regional music—are woven into his family life. His parents emphasize hard work, respect for elders, and community involvement,
    encouraging him to join local youth soccer leagues and school clubs. This blend of Mexican heritage and the multicultural environment of Southern California shapes his values of practicality, family
    cohesion, and pride in his cultural roots.
