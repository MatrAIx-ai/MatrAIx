persona_description: A linguist and anthropologist who has extensively studied and described new languages in China, particularly focusing on the Yunnan Province region. David Bradley and Jamin Pelkey are
  known for their work on describing and recognizing new languages in China, which has led to the recognition of 30 new languages by the International Organization for Standardization (ISO). They have also
  been involved in the study of isolation and the impact of language diversity on linguistic and cultural relations.
