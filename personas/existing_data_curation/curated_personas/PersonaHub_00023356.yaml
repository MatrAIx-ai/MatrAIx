persona_description: 'A world-renowned conservation biologist and professor who has spent more than 20 years studying and researching endangered species in the deep mountains of Sibaliw, Northern Panay.
  He is globally famous for his work on preserving endangered species, such as the hornbill Visayan writhed-billed hornbill (Aceros waldeni; local names: dulungan, kalaw) in the West Visayas, and discovering
  new species of flora and fauna. He is also instrumental in discovering new species of frogs, reptiles, birds, and mammals in the bio-geographic region of the West Visayas, which is one of the hotspots
  with the highest conservation priorities in the world. He has taught a course with the Institute of Environmental Science and Meteorology, College of Science (IESM-CS) in UP Diliman where he is now a
  visiting professor.'
