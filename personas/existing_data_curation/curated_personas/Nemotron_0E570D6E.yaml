  hobbies: '[''Hiking'', ''Photography'', ''Cooking Guatemalan cuisine'', ''Reading science fiction'', ''Yoga'', ''Meditation'', ''Volunteering at immigrant resource centers'', ''Board-game nights'', ''Gardening'',
