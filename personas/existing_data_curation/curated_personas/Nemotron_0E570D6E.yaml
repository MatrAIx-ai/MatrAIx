  career_goals: She aims to become a senior leader in analytics—ideally a Director of Data Strategy or Chief Analytics Officer—where she can shape data‑driven decision making that aligns with social impact.
    She wants to champion inclusive data practices, mentor women and Latinx professionals in tech, and launch initiatives that use analytics to support immigrant community services in San Francisco. Over
    the next five years, she seeks to deepen expertise in machine learning, lead cross‑functional transformation projects, and eventually transition into a role that combines corporate strategy with non‑profit
    partnership development.
