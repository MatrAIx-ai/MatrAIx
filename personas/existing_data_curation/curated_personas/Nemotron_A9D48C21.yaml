personas:
  professional: Santiago Lizcano, a 39‑year‑old hands‑on community organizer in Pomona, leverages fluency in English and Spanish, DIY home‑repair know‑how and event‑budgeting experience to coordinate neighborhood
    festivals that celebrate their family's island traditions while they pursue a GED and a landscaping certification, balancing a preference for predictable tasks with a flexible, on‑the‑fly work style.
  sports: Santiago Lizcano, a 39‑year‑old basketball enthusiast, plays pickup games at the local community center three times a week, hikes the San Gabriel foothills on weekends, and avidly follows the
    Los Angeles Lakers, the LA Dodgers and the LA Galaxy, joining a casual adult league team called the Pomona Pumas, preferring they keep a relaxed yet consistent fitness routine that balances social play
    with solo cardio.
  arts: Santiago Lizcano immerses in Latin rhythms, regularly playing congas to the beats of Marc Anthony, Bad Bunny and traditional bomba ensembles, while also enjoying sci‑fi streaming marathons of series
    like 'The Expanse' and films by Denis Villeneuve, and they often volunteer to set up stages at local cultural festivals, seeing music and visual storytelling as vital threads of their community identity.
  travel: Santiago Lizcano prefers spontaneous road trips that blend family visits and culinary exploration, frequently driving down the Pacific Coast Highway to Santa Barbara, planning occasional weekend
    getaways to Oaxaca for its vibrant food markets, dreaming of a pilgrimage to their family's island for the midsummer fire festival, yet they balance these ambitions with the need to support extended
    relatives, which limits longer overseas vacations.
  culinary: Santiago Lizcano, a confident home cook, delights in crafting mofongo with green plantains, garlic, chicharrón and a splash of sofrito, perfecting arroz con gandules seasoned with annatto and
    pigeon peas, while also experimenting with fusion tacos using adobo‑marinated pork, and they balance their love for hearty family meals with occasional fast‑food runs when time for prep runs short.
  core: Santiago Lizcano is a pragmatic DIY‑enthusiast who blends structured goal‑setting with a laid‑back, improvisational streak, juggling a love for traditional island flavors, community basketball,
    and vintage car shows while they habitually forget to file taxes on time.
background:
  cultural: Santiago is a first‑generation Puerto Rican American whose family migrated to Southern California in the 1980s. Growing up in Pomona’s vibrant Latino community, he was immersed in bilingual
    household dynamics, Catholic traditions, and the island’s music and cuisine. The strong emphasis on family, communal celebrations, and respect for elders shaped his values, while the multicultural environment
    of Los Angeles County broadened his social outlook. He identifies with both his Puerto Rican roots—celebrating festivals like Noche de San Juan—and his California upbringing, which informs his pragmatic
    yet flexible approach to life.
