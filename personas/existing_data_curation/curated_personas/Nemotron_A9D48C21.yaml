  career_goals: Santiago aims to translate his practical abilities into a steady livelihood. He plans to earn his GED within the next year, followed by a vocational certificate in landscaping or culinary
    arts. His long‑term ambition is to launch a small, mobile catering service that offers Puerto Rican street food at local events and to eventually open a modest landscape‑maintenance business serving
    Pomona’s residential neighborhoods. He also hopes to secure a stable income that lets him support extended family members.
