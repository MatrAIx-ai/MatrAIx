personas:
  professional: Sandy Sotolongo, a 31‑year‑old plumber‑pipefitter in Cabo Rojo, blends meticulous blueprint reading, precise welding, and rigorous OSHA‑compliant safety practices with a hands‑on mentorship
    style, using their love of structure to lead diverse crews while pursuing Master Pipefitter certification and a future hurricane‑resilient plumbing business.
  sports: Sandy Sotolongo competes in the local beach‑volleyball league with the Cabo Rojo Waves, hikes the mangrove cliffs each weekend, and passionately supports the regional soccer club Los Toreros while
    also following the Major League Baseball team Miami Marlins, embodying a year‑round commitment to outdoor fitness and community sports.
  arts: Sandy Sotolongo spends evenings salsa dancing to the vibrant sounds of Eddie Palmieri and Marc Anthony, attends live performances by folk singer Maria González, and curates a modest home gallery
    of paintings by island artist Rosa Castillo, letting music and visual art energize their social gatherings.
  travel: Sandy Sotolongo prefers meticulously planned short getaways, having explored the historic streets of Old San Juan, the pristine beaches of Culebra, and a surf retreat in Costa Rica, while dreaming
    of a road trip through Andalusia that balances adventure with cultural immersion.
  culinary: Sandy Sotolongo excels at cooking traditional mofongo with crispy plantain, simmering aromatic arroz con gandules seasoned with sofrito and cilantro, and experimenting with fresh escabeche fish,
    reflecting a skilled home chef who swaps recipes with fellow backyard cooks yet occasionally orders pizza after long workdays.
  core: Sandy Sotolongo is a pragmatic, socially vibrant plumber who counters work stress with yoga, community sport, and disciplined budgeting, yet wrestles with chronic back aches and a tendency to over‑worry.
background:
  cultural: Sandy grew up in the vibrant barrios of Mayagüez and later settled in the coastal municipality of Cabo Rojo. Her Puerto Rican heritage is woven into daily life through bilingual communication
    (Spanish and English), a strong sense of family and community, and participation in local traditions such as the Festival de la Cultura and the patron saint celebrations. The island’s musical rhythms—bomba,
    plena, and salsa—shape her social gatherings, while the cuisine of her childhood—mofongo, pasteles, and alcapurrias—continues to inspire her cooking. The frequent encounter with tropical weather and
    hurricanes has fostered a resilient mindset and a practical approach to problem‑solving, both of which she applies to her trade. She values the concept of compadrazgo, a network of reciprocal support,
    and often contributes to communal projects, reinforcing the collectivist spirit of Puerto Rican culture.
attributes:
  skills: '[''Pipe installation'', ''Welding and soldering'', ''Blueprint reading'', ''Hydraulic system maintenance'', ''Pressure testing and leak detection'', ''Safety compliance (OSHA, PR building codes)'',
    ''Team coordination and mentorship'', ''Customer communication and estimating'', ''Inventory management'', ''Problem solving under tight deadlines'']'
  hobbies: '[''Beach volleyball'', ''Salsa dancing'', ''Hiking in Cabo Rojo'', ''Community volunteer work (beach clean-ups)'', ''Cooking Puerto Rican cuisine'', ''Gardening native plants'', ''Yoga and meditation'',
    ''Attending trade workshops'', ''Mentoring apprentices'']'
  career_goals: Sandy aims to earn Master Pipefitter certification within the next two years, become a licensed general contractor, and eventually launch her own small‑scale plumbing business that specializes
    in hurricane‑resilient and water‑conservation solutions for residential and commercial clients in southwestern Puerto Rico. She wants to lead a diverse crew, create a supportive apprenticeship program
    for women and underrepresented groups, and serve as a liaison in her local union to improve workplace safety and job stability. Balancing her drive for professional advancement with her desire for predictable
    work hours, she also plans to implement systematic scheduling and stress‑management practices to maintain her wellbeing.
