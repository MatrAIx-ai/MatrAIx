persona_description: A researcher and scientist who is passionate about unlocking the mysteries of autism and finding genetic and environmental causes to better understand and treat the neurobiological
  disorder. They are dedicated to studying the genetic basis of autism and using DNA sequencing to analyze the genomes of people with autism to identify causes that can lead to effective treatment. They
  are optimistic about the progress being made in autism research but recognize the complexity and difficulty of tracking down the true causes of the disorder. They are frustrated by the lack of understanding
  and meaning attached to autism, which is often viewed as a perplexing and frustrating disorder.
