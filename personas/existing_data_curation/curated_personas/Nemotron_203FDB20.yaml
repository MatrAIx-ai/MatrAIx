personas:
  professional: Devika Patel is a secondary‑school teacher who leverages her meticulous organization and data‑driven assessment skills to craft differentiated curricula aligned with Texas standards, while
    her cooperative nature ensures seamless parent communication and collaborative team teaching.
  sports: Devika Patel enjoys a structured fitness regimen that blends weekly Pilates classes at Sunrise Pilates Studio with weekend runs supporting the Houston Rockets, follows the Houston Astros during
    spring training, and participates in a community soccer league that plays on Saturday evenings, reflecting her disciplined yet socially engaged approach to sports.
  arts: Devika Patel immerses herself in the arts through a monthly book club that dissects works by Brené Brown and Malcolm Gladwell, attends performances by the Houston Symphony featuring compositions
    by Ravi Shankar, enjoys listening to Taylor Swift and Beyoncé on her commute, and supports the local community theater where she occasionally volunteers for stage management.
  travel: Devika Patel prefers meticulously planned trips, having organized week‑long cultural tours of Austin’s live‑music scene and a culinary weekend in New Orleans, while dreaming of a spring pilgrimage
    to Kyoto’s temples and a family‑friendly adventure in Costa Rica’s cloud forests.
  culinary: Devika Patel, a confident home chef, delights in preparing elaborate Gujarati thalis featuring dhokla, khandvi, and homemade chutney, meticulously chopping fresh cilantro, mint, and fenugreek
    for her herb garden, while also experimenting with Mediterranean dishes like grilled halloumi and saffron risotto during dinner parties.
  core: Devika Patel balances an unwavering love for structure with creative outlets—rigid lesson plans, precise budgeting, yoga‑infused wellness, and a kitchen brimming with meticulously prepared thalis—yet
    occasionally forgets to water her herb garden amidst her packed schedule.
background:
  cultural: Devika comes from a Gujarati Indian family that values education, community, and cultural traditions. Raised in a bilingual household, she speaks Gujarati and English fluently and celebrates
    Hindu festivals such as Diwali and Navratri, integrating them into her family life in Spring, Texas. Her South Asian heritage influences her culinary preferences, community involvement, and a strong
    emphasis on academic achievement, while her American upbringing has fostered an appreciation for individualism and professional development. She skillfully navigates both cultural spheres, bringing
    a culturally responsive perspective to her teaching and community engagement.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Lesson Planning'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Data‑Driven Assessment'', ''Parent‑Teacher
