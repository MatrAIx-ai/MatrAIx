  hobbies: '[''Reading educational research and personal development books'', ''Journaling'', ''Cooking Indian/Gujarati cuisine'', ''Yoga and Pilates'', ''Indoor herb gardening'', ''Book club participation'',
    ''Attending cultural festivals (Diwali, Holi)'', ''Mentoring immigrant families'']'
  career_goals: Devika aims to move into educational leadership within the next three years, targeting a role as a department head or curriculum coordinator for her district. She plans to earn a Master's
    degree in Educational Leadership while completing a Texas Principal Certification. Her ambition includes spearheading a district‑wide initiative for culturally responsive pedagogy and mental‑health
    support, eventually positioning herself as a school principal who can shape policies that promote equity and student well‑being. She also aspires to develop a mentorship program for newly divorced teachers,
    leveraging her personal experience to foster a supportive professional community.
