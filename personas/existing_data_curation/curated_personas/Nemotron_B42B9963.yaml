personas:
  professional: David Owens is a budding LEGO architect whose meticulous planning and curiosity translate into constructing intricate brick masterpieces, foreshadowing a future talent in engineering and
    design.
  sports: David Owens plays midfield for the Green Valley Strikers youth soccer club, idolizes Lionel Messi’s dribbling, and roots for the local professional team, the River City Raptors, while balancing
    weekly hill hikes with family.
  arts: David Owens sketches imaginative scenes inspired by Studio Ghibli’s Spirited Away, enjoys piano pieces like Ludwig van Beethoven’s Für Elise, and reads adventure sagas by J.K. Rowling, letting these
    creative influences shape their playtime narratives.
  travel: David Owens has visited the Grand Canyon on a school field trip and dreams of exploring the coral reefs of the Great Barrier Reef, preferring family‑guided itineraries that blend outdoor exploration
    with hands‑on learning.
  culinary: David Owens favors homemade macaroni‑and‑cheese, loves dipping crunchy carrot sticks in hummus, and proudly makes simple peanut‑butter‑jelly sandwiches, though they sometimes sneak extra cookies
    when no one watches.
  core: David Owens is an organized, curiosity‑driven six‑year‑old who builds LEGO worlds, worries about tiny setbacks, and finds comfort in routine creative bursts.
background:
  cultural: David lives in Roy, Utah, a small town in Weber County where community life centers around family gatherings, church activities, and outdoor recreation. His family participates in local traditions
    such as the summer county fair, community service projects, and seasonal holidays. The cultural emphasis on self‑reliance, practicality, and group cooperation shapes David’s organized approach to tasks,
    his enjoyment of structured group activities, and his balanced mix of social play and quiet, independent pursuits.
