personas:
  professional: Ramon Mora, a seasoned handyman and community volunteer, combines practical woodworking, minor plumbing, and electrical repair skills with a talent for teaching simple crafts, using his
    bilingual fluency to bridge generations as he mentors youth in art and cooking workshops at the local community center.
  sports: Ramon Mora follows the Texas Rangers and the San Antonio Spurs, participates in a local senior walking club that meets on Saturday mornings in the Hill Country, and enjoys occasional pick‑up games
    of softball with neighbors, preferring low‑impact activities that complement their gardening routine.
  arts: Ramon Mora immerses themselves in watercolor landscapes of the Texas Hill Country, frequently sketches folklore scenes inspired by the works of Frida Kahlo and Diego Rivera, listens to Lila Downs
    and Los Tigres del Norte while collecting vintage postcards and artisanal pottery, and visits the San Antonio Museum of Art each quarter for inspiration.
  travel: Ramon Mora favors relaxed, small‑group road trips that blend cultural immersion with scenic drives, having recently explored the historic town of San Miguel de Allende and the vineyards of Fredericksburg
    before planning a future visit to Granada’s Alhambra and a weekend getaway to Austin’s live‑music scene.
  culinary: Ramon Mora delights in cooking mole, fresh corn tortillas, and chiles en nogada using garden‑grown cilantro, chilies, and heirloom tomatoes, often experimenting with Texas smoked brisket in
    a salsa verde glaze, and they regularly host family meals where homemade guacamole and salsa roja are staples.
  core: Ramon Mora is a curious, relaxed handyman‑artist who bridges generations through bilingual workshops, tends a modest garden, and balances careful financial habits with occasional whimsical splurges
    on vintage art treasures.
background:
  cultural: Ramon is a second‑generation Mexican‑American who grew up in a close‑knit Mexican community in the Dallas‑Fort Worth area. He maintains bilingual fluency in Spanish and English, celebrates Catholic
    traditions and cultural holidays such as Día de los Muertos and Las Posadas, and values the family‑centered hospitality of his heritage. His Mexican roots blend with Texan influences, shaping his culinary
    tastes, artistic sensibilities, and emphasis on community harmony.
