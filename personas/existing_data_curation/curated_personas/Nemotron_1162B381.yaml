  career_goals: Tory aims to transition into a part‑time instructional role at the local community center, teaching seniors basic computer and financial literacy. She also wishes to lead an intergenerational
    arts program that pairs older adults with high‑school students, fostering creative exchange. Within her current retail setting, she seeks a shift‑lead or supervisor position to mentor newer cashiers
    and improve operational efficiency. Long‑term, she aspires to curate an annual community art showcase, publish a reflective memoir on lifelong learning and retail evolution, and allocate proceeds to
    scholarships for adult learners.
