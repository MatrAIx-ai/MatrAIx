persona_description: A railway engineer who specializes in the design and construction of railway tracks and switches, with a focus on ensuring safety and durability. He has experience working in Bascoup,
  Belgium, where he oversees the production and installation of rail switches and crossings, as well as the design and manufacture of signalling systems. He is skilled in precision work and has expertise
  in EBP/PLP technology, which he uses to create a route for each section and each train. He is also familiar with the ETCS system and has experience in implementing it in Belgium. He is responsible for
  ensuring the safety of the railway network and is committed to reducing the number of signal boxes down to just 10 by 2022.
