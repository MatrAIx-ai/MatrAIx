  career_goals: Daisy aims to transition from a senior research role to leading her own research program that explores novel materials for renewable energy applications. She aspires to secure a principal
    investigator position within a national laboratory or a university research center, where she can mentor a diverse team of scientists. A key ambition is to increase representation of Black women in
    physical sciences, so she plans to develop outreach programs and scholarship pipelines. Additionally, Daisy envisions creating interdisciplinary exhibitions that fuse physics with visual art, and she
    hopes to author a textbook that integrates abstract scientific concepts with hands‑on learning for high‑school students.
