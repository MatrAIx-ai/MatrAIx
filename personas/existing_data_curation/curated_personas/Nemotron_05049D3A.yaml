personas:
  professional: Aric Vining is an advanced welder and fabricator who combines meticulous blueprint interpretation and OSHA‑level safety rigor with a curious drive to master new welding processes, leveraging
    their organized project‑planning skills to run an efficient shop while quietly perfecting custom LED soldering projects on the side.
  sports: Aric Vining enjoys seasonal outdoor sports—early‑morning deer hunts in the fall and quiet lake fishing in the summer—while cheering on the Atlanta Braves, participating in the local County Outdoor
    Sportsmen’s Association, and joining occasional pickup basketball games at the community center.
  arts: Aric Vining channels creative energy into welding‑based metal sculptures inspired by Richard Serra, while reading William Faulkner’s Southern histories and listening to Lynyrd Skynyrd’s classic
    rock, blending technical precision with a deep appreciation for storied Southern art and narrative.
  travel: Aric Vining prefers meticulously planned road trips to secluded cabins in the Ozark Mountains or a weekend getaway to Hill Country, Texas, where they can fish, hunt, and sample local cuisine,
    balancing adventure with a budget that safeguards future shop capital.
  culinary: Aric Vining loves cooking traditional Southern meals like fried catfish, collard greens seasoned with smoked ham hocks, and buttery cornbread, often using garden‑grown tomatoes and fresh herbs
    while experimenting with a homemade cedar‑plank smoker for weekend barbecues.
  core: Aric Vining is a methodical welder who quietly balances a love for solitary craftsmanship, careful financial planning, and a penchant for Southern comforts, all while wrestling with a persistent
    undercurrent of stress‑induced worry.
background:
  cultural: Aric grew up in rural Smith County, Mississippi, where his family has lived for generations. Raised in a Methodist household, he was steeped in Southern hospitality, community church activities,
    and a strong work ethic rooted in the region’s agricultural and industrial traditions. The local culture of modesty, reliability, and neighborly support shaped his cooperative nature and respect for
    harmony. He appreciates traditional Southern cuisine, country and classic rock music, and participates in local events such as the county fair and church fish‑fry. This blend of Appalachian‑inspired
    diligence and Mississippi Delta community spirit informs both his personal values and his practical skill set.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Precision soldering'', ''High‑temperature brazing'', ''Blueprint reading'', ''Material selection and metallurgy'', ''Metal fabrication
    (cutting, grinding, fitting, finishing)'', ''OSHA safety compliance'', ''Quality inspection'', ''Project planning and scheduling'', ''Inventory management'', ''Technical documentation'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Vintage small‑engine restoration'', ''Scale model metal sculpture building'', ''DIY electronics soldering'', ''Reading technical welding journals'', ''Reading Southern
    historical novels'', ''Cooking Southern cuisine'', ''Gardening'', ''Attending small church gatherings'']'
  career_goals: Aric aims to become a fully certified Journeyman Welder and obtain an AWS Certified Welder credential within the next two years. He plans to complete his associate degree in welding technology
    to deepen his theoretical knowledge and qualify for a supervisory role as a foreman at a regional manufacturing plant. Long‑term, he envisions launching a small, family‑run metal‑fabrication shop that
    serves local farms with custom agricultural equipment and creates commissioned metal art pieces for community spaces. He also hopes to mentor apprentices and eventually teach welding courses at the
    local community college, while maintaining a balanced work schedule that reduces stress and supports his marriage.
