persona_description: A historian who specializes in the study of Ethiopian history, particularly the military history of the Axumite Empire. His research interests include the development and evolution
  of the Axumite armies, the use of swords such as the shotel and Seif, and the techniques and tactics of the Shotelai swordsmen. He is also interested in the cultural and historical context in which the
  shotel was used, including its role in warfare and military strategy.
