  hobbies: '[''Abstract Painting'', ''Experimental Photography'', ''Reading Speculative Fiction'', ''Poetry Writing'', ''Gardening'', ''Coastal Hiking'', ''Art Workshops'', ''Chess'', ''Experimental Cooking'',
    ''Visiting Art Galleries'']'
  career_goals: Ana aims to transition into a senior leadership role such as Director of Operations, where she can steer strategic initiatives that fuse efficiency with creativity. She envisions spearheading
    digital transformation projects that embed AI‑driven automation into everyday workflows, while championing flexible, innovation‑friendly processes across the organization. Long‑term, she hopes to launch
    a boutique consultancy that helps midsize firms adopt agile operational models, and she aspires to write a book that explores the intersection of imaginative thinking and operational excellence.
