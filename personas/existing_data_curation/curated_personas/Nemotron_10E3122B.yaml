  hobbies: '[''Coastal Jogging'', ''Basketball'', ''Reading Historical Non‑Fiction'', ''Philosophy'', ''Playing Saxophone (Jazz)'', ''Fishing'', ''Community Theater'', ''Mentoring At‑Risk Youth'']'
  career_goals: Antonio aims to advance to a supervisory role within the Sussex County Police Department, aspiring to become a sergeant and eventually a lieutenant. He is interested in leading a Community
    Relations Unit that emphasizes partnership building with Ocean View’s multicultural neighborhoods. He also plans to pursue a master's degree in Criminal Justice or Public Administration to deepen his
    strategic understanding of policing policy. Long‑term, he hopes to contribute to departmental reforms that enhance transparency, reduce bias, and improve mental‑health response protocols, leveraging
    his humanities background to integrate ethical considerations into law‑enforcement practice.
