  career_goals: Thieu aims to progress to a senior full‑stack engineer role within the next three years, eventually leading a small, cross‑functional product team. He aspires to design and launch a SaaS
    platform that empowers Vietnamese artisans and small businesses in the Pacific Northwest to sell their products online, merging his technical skills with his cultural heritage. In the long term, he
    envisions founding his own tech consultancy that helps local startups integrate data‑driven strategies and user‑centered design. He also plans to mentor junior developers and contribute to community
    coding workshops, especially for underrepresented groups.
