personas:
  professional: Thieu Tran is a full‑stack engineer with a business strategy background who translates data‑driven insights into clean React and Django applications, leverages bilingual fluency to bridge
    technical and cultural gaps, and balances organized workflows with spontaneous problem‑solving while mentoring junior developers and eyeing a future lead role on a product team for artisan‑focused SaaS.
  sports: Thieu Tran fuels weekends with hikes through the Columbia River Gorge and rides with the Gresham Cycling Club, roots passionately for the Portland Timbers, and occasionally joins a casual pickup
    basketball game at the local community center, maintaining a relaxed fitness regimen that balances adventure with modest cardio.
  arts: Thieu Tran wanders Portland’s independent galleries like Portland Art Works, sketches vibrant murals by local artist Serena V, captures misty river scenes on film, and unwinds listening to Sufjan
    Stevens and The Decemberists, allowing visual and auditory arts to shape their design aesthetic and contemplative mindset.
  travel: Thieu Tran plans trips with meticulous spreadsheets, favoring weekend escapes to the Hoh Rain Forest and longer voyages to Tokyo’s neon districts, blending low‑key nature hikes with urban exploration
    while balancing a modest travel budget and a full‑time tech career.
  culinary: Thieu Tran experiments in the kitchen by fusing traditional bánh mì with smoked salmon and dill, reimagining phở broth with a dash of miso, and perfecting a kale‑and‑pickled‑carrot salad, showcasing
    an intermediate cooking skill set that marries Vietnamese flavor profiles with Pacific Northwest ingredients.
  core: Thieu Tran is a curiosity‑driven full‑stack engineer who lives for quiet hikes, sketchy street‑art sessions, and a relentless quest to merge tech with cultural craft, yet habitually forgets to water
    houseplants and lets a backlog of podcast episodes pile up.
background:
  cultural: Thieu is a second‑generation Vietnamese American. His parents emigrated from Vietnam in the early 1990s, and the household maintained many of the cultural traditions of their homeland, including
    Tet celebrations, Vietnamese language instruction, and home‑cooked dishes such such as phở and bánh mì. Growing up in the Portland metro area, he was exposed to both the close‑knit Vietnamese community
    in the region and the broader progressive, environmentally aware culture of the Pacific Northwest. This dual upbringing fostered a respect for family and communal values, a strong work ethic, and an
    openness to diverse perspectives. He often volunteers at local Vietnamese cultural festivals and community centers, helping bridge the gap between the younger diaspora and older generations.
