  career_goals: Although only six, Nicholas dreams of becoming a creator who blends art and science. He imagines himself as an astronaut who designs colorful space stations or as a museum curator who shares
    stories of the natural world. He hopes to keep learning, traveling to new places, and using his curiosity to solve problems that help others.
