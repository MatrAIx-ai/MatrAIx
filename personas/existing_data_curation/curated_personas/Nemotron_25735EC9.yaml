personas:
  professional: Nicholas Hart is a budding junior illustrator and LEGO architect who channels a methodical, organized mindset into detailed animal sketches and intricate brick constructions, while their
    curiosity for new ideas drives them to explore unconventional storytelling in their creations.
  sports: Nicholas Hart enjoys playing in the South Bend Youth Soccer Academy’s U‑6 league, watches the South Bend Cubs’ baseball games on TV with their family, and joins their parents for gentle hikes
    at Indiana Dunes National Park, preferring low‑pressure, nature‑based activity over competitive sports.
  arts: Nicholas Hart immerses themselves in the arts by drawing in the children’s wing of the South Bend Museum of Art, drawing inspiration from whimsical creators like Dr. Seuss and contemporary artists
    such as Yayoi Kusama, and listening to jazz legends like Miles Davis alongside classic children’s songs like “The Wheels on the Bus,” which together shape their vivid imaginary worlds.
  travel: Nicholas Hart loves short family road trips to nearby destinations such as the Indiana Dunes National Park and the Chicago Museum of Science and Industry, dreams of seeing the Grand Canyon’s red
    cliffs, and prefers carefully planned itineraries with familiar stops and plenty of time for nature walks rather than spontaneous adventures.
  culinary: Nicholas Hart prefers simple, colorful meals like cheesy macaroni with peas, fruit‑topped pancakes drizzled with maple syrup, and lovingly makes their own PB&J sandwiches, often adding a thin
    layer of honey for extra sweetness, while occasionally indulging in a slice of plain pepperoni pizza during birthday parties.
  core: Nicholas Hart is a quietly curious six‑year‑old who blends an organized love for drawing, LEGO building, and nature walks with a habit of worrying about tiny details, finding calm in solitary sketching
    and structured play.
background:
  cultural: Nicholas grows up in a close‑knit African‑American family in South Bend, where traditions of storytelling, gospel music, and community gatherings are valued. His parents celebrate cultural holidays
    such as Kwanzaa and teach him about the achievements of Black artists and scientists. Local community centers offer after‑school art programs and youth mentorship, giving him opportunities to connect
    with his heritage and to see himself reflected in the broader cultural tapestry of the Midwest.
