personas:
  professional: Troy Jara, a 17‑year‑old budding IT support specialist with a CompTIA A+ study plan, blends a curiosity for emerging tech with a practical, hands‑on approach, using their self‑taught troubleshooting
    skills and compassionate mindset to help non‑profits solve everyday tech glitches.
  sports: Troy Jara, an occasional beach‑runner and dedicated fan of the Miami Heat and Florida Atlantic Owls, joins a local youth soccer pick‑up league on weekends and participates in community beach clean‑ups,
    approaching fitness with a relaxed, flexible mindset that balances solitary walks with light competitive play.
  arts: Troy Jara, an indie‑music enthusiast who sketches serene Boca Raton shoreline scenes while listening to Sufjan Stevens and The Lumineers, frequently attends small acoustic gigs at local cafés and
    explores sci‑fi artwork on platforms like ArtStation, letting creative expression temper their analytical mind.
  travel: Troy Jara, a budget‑conscious teen traveler, has explored the historic streets of Washington, D.C., dreams of attending a tech expo in Tokyo, and plans weekend road trips to the Everglades, favoring
    self‑planned itineraries that mix adventure with quiet coastal retreats.
  culinary: Troy Jara, an amateur cook who favors simple, nutritious meals, often prepares grilled fish tacos with avocado and lime, enjoys crafting homemade smoothies with spinach and mango, and treats
    themselves to occasional artisanal coffee while studying robotics projects.
  core: Troy Jara, a curious yet practical 17‑year‑old who balances solitary tech tinkering with community compassion, channels their methodical mindset into both troubleshooting gadgets and supporting
    local animal shelters.
background:
  cultural: Raised in Boca Raton, Florida, Troy grew up in a predominantly white, middle-class suburban setting that is nevertheless shaped by South-Florida's multicultural coastal lifestyle. His family's
    roots trace back to Northern European ancestry, and his upbringing emphasized community involvement, self-reliance, and respect for the diverse cultures present in Palm Beach County. He experienced
    a blend of relaxed beach culture, year-round outdoor activities, and a strong emphasis on education and volunteerism characteristic of the area. These influences have fostered his practical outlook,
    compassion for others, and appreciation for both new ideas and established community traditions.
attributes:
  skills: '[''Computer troubleshooting'', ''Smartphone repair'', ''Basic woodworking'', ''First Aid and CPR'', ''Active listening and empathy'', ''Conflict mediation'', ''Volunteer team coordination'']'
