    to indie/acoustic music'', ''Sketching beach scenes'', ''Beach walks'', ''Volunteering at animal shelter'', ''Tabletop role-playing games'']'
  career_goals: Troy aims to earn his high school equivalency (GED) within the next year, then enroll in a technical college to obtain CompTIA A+ certification and an EMT-Basic certification. In the short
    term, he seeks an entry-level IT support or help-desk role at a local non-profit, allowing him to combine his technical problem-solving skills with his desire to help others. Long-term, he envisions
    becoming a certified emergency medical technician who can respond to emergencies in his community, while also running a modest home-based repair service offering affordable tech support and basic home
    maintenance for neighbors, thereby fostering community resilience.
