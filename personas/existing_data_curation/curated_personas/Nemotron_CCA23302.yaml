  career_goals: Angel aspires to become a professional visual artist and concept designer for video games or animation studios, while also considering a future in architecture or UI/UX design. She aims
    to attend a specialized high school for arts and sciences, earn a scholarship to a university with a strong design program, and eventually create works that blend her Salvadoran cultural heritage with
    futuristic aesthetics. She is driven to develop a portfolio that showcases innovative storytelling through visual media and to contribute to community art projects that celebrate Latino culture.
