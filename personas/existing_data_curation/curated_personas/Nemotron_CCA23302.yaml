personas:
  professional: Angel Munoz, an aspiring concept artist who blends hand‑drawn fantastical landscapes with Procreate mastery and experimental VR art tools, they leverage their highly organized and disciplined
    mindset to maintain a meticulously cataloged portfolio while their quiet, imaginative nature fuels richly detailed speculative worlds that could one day shape video game environments.
  sports: Angel Munoz, a diligent member of the Westside Middle School cross‑country team who rises before sunrise for distance runs to clear the mind, frequents the local skate park for weekend sessions,
    follows the Los Angeles Lakers and Los Angeles Galaxy with devoted fandom, and balances this active lifestyle with a structured weekly stretching regimen that mirrors their organized approach to art.
  arts: Angel Munoz, a dedicated visual storyteller who draws inspiration from the surreal canvases of Salvador Dalí, the cinematic dreamscapes of Hayao Miyazaki, and the lyrical poetry of N.K. Jemisin,
    they channel this imagination into Procreate illustrations and collaborative school murals, while their evenings often feature listening to Ólafur Arnalds' ambient piano pieces and attending the city
    museum’s modern art exhibitions.
  travel: Angel Munoz, a meticulous trip planner who maps out weekend excursions to the nearby botanical gardens and historic Old Town district, saves diligently for a future solo backpacking adventure
    to Kyoto’s bamboo forest and a cultural immersion tour of Barcelona’s Gothic Quarter, yet currently limits travel to affordable day trips and family visits to the Grand Canyon, and they balance wanderlust
    with responsible budgeting.
  culinary: Angel Munoz, an aspiring home chef with intermediate cooking skills who delights in crafting pepper‑infused avocado toast, perfecting a creamy mushroom risotto with Arborio rice and Parmesan,
    and sprinkling fresh mango salsa over grilled fish, while they also savor artisanal dark chocolate from the local boutique and experiment with exotic spices like sumac and smoked paprika during weekend
    cooking sessions.
  core: Angel Munoz, a quiet, hyper‑organized teen who can spend hours sketching alternate universes, stays up past midnight solving Sudoku puzzles, hoards a secret stash of glossy sketchbooks under the
    bed, and occasionally trades disciplined study sessions for late‑night candy binges before bed, they also occasionally miss a deadline when caught up in a particularly immersive digital art project.
background:
  cultural: Angel was born and raised in San Pablo, California, to Salvadoran immigrant parents. She grew up in a bilingual household where Spanish is spoken daily and traditional Salvadoran customs, such
    as celebrating Día de la Independencia and preparing pupusas, are woven into family life. The close-knit Latino community in Contra Costa County provides her with cultural celebrations, dance, and music,
    fostering a strong sense of identity. Her parents emphasize respect for elders, the value of hard work, and the importance of education, while also encouraging her creative pursuits. Angel blends her
    heritage with the multicultural environment of the Bay Area, drawing inspiration from Salvadoran folklore and contemporary American art.
