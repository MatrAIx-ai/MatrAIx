persona_description: A geologist who specializes in the study of carbonate sediments, particularly the identification and interpretation of micrite, a fine-grained carbonate sediment that is often used
  to interpret depositional settings. His research interests include the chemical and biological processes that lead to the formation of micrite, as well as its vertical association with other lithologies
  and its faunal content. He is also aware of the potential confusion that can arise from the presence of micritization, which may lead to the misinterpretation of sedimentary deposits.
