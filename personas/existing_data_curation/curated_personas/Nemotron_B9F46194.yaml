personas:
  professional: Angela Samhoun, a budding storyteller and LEGO architect, channels her vivid imagination and methodical planning into crafting intricate fantasy narratives and towering brick constructions,
    often presenting them to classmates with confident, organized detail.
  sports: Angela Samhoun plays on the local under‑8 soccer team, the Greenfield Guardians, enjoys after‑school gymnastics at the community center, and idolizes the hometown baseball heroes the Springfield
    Sluggers, while preferring to explore the woods for nature ‘boot camps’ on weekends.
  arts: Angela Samhoun immerses herself in the worlds of J.K. Rowling, C.S. Lewis, and the orchestral works of Ludwig van Beethoven, sketching dragons and enchanted forests on ruled notebook paper, performing
    piano pieces like 'Für Elise' for her family, and attending the city’s Saturday children’s theatre where she admires performances by the young troupe 'Little Stars.'
  travel: Angela Samhoun loves weekend adventures to the nearby Redwood State Park for leaf collecting, dreams of visiting the magical Disney World in Orlando and the ancient castles of Scotland, and treasures
    family road trips to the Grand Canyon where she can sketch the vast gorge while listening to her portable speaker.
  culinary: Angela Samhoun delights in homemade pizza topped with pepperoni and extra cheese, especially when she helps spread the sauce, snacks on crunchy apple slices with peanut butter, and proudly bakes
    chocolate chip cookies with the help of her mom, counting each bite as a ‘building block’ of flavor.
  core: Angela Samhoun is an eight‑year‑old imagination powerhouse who balances endless creative quests with disciplined routines, often juggling LEGO projects, fantasy stories, and a vigilant allergy chart,
    all while savoring pizza and dreaming of distant castles.
background:
  cultural: Angela comes from a White American family that has lived in the rural New England region for several generations. Growing up in Saint Johnsbury, Vermont, she participates in typical New England
    traditions such as Thanksgiving potlucks, maple‑syrup harvest celebrations, and community fairs. The town’s proximity to the Québec border adds occasional French‑Canadian influences, like hearing French
    words at school and tasting regional foods such as tourtière during family gatherings. Her upbringing reflects a blend of modest country life, an emphasis on self‑reliance, and a rich appreciation for
    nature and local community.
attributes:
  skills: '["imaginative storytelling", "drawing and sketching", "reading comprehension", "puzzle solving", "basic block-based coding", "organizing schoolwork", "collaborative group play"]'
  hobbies: '["drawing and illustration", "creative writing", "LEGO building", "reading fantasy books", "nature walks and leaf collecting", "science kits", "piano practice", "jigsaw puzzles"]'
  career_goals: Although she is only eight, Angela already envisions a future where she can blend her love for art and curiosity about how things work. She dreams of becoming an author‑illustrator of children's
    books, designing whimsical characters and stories that spark imagination. She also imagines herself as an environmental scientist or inventor, creating sustainable toys or gadgets that protect the natural
    world. In the longer term she hopes to use her organized mindset to lead creative projects that inspire other kids.
