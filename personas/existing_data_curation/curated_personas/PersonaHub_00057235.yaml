persona_description: A biologist who specializes in hatchery management and the conservation of rare and endangered species, particularly the Apache trout. He has extensive experience working with cryopreservation
  and has developed a plan for infusing wild genetics into the captive fish with ease. He is stationed at the White Mountain Apache Tribe hatchery in the White Mountains, where he has been responsible for
  managing the brood stock of the rare Apache trout. He has a unique understanding of the genetics and behavior of the Apache trout, having worked with two other species native to the American Southwest,
  the Rio Grande cutthroat trout and Gila trout.
