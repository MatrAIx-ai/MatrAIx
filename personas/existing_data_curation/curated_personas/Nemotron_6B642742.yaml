  hobbies: '[''Visiting museums and art galleries'', ''Sketching and painting (oil, watercolor, mixed media)'', ''Photography (landscape, architecture)'', ''Hiking and biking in Wichita Mountains'', ''Gardening
    (native plants, herbs)'', ''Cooking and exploring regional cuisines'', ''Reading historical fiction'', ''Listening to classic rock and country music'', ''Community mural projects and volunteer painting'',
    ''DIY home improvement and woodworking'']'
  career_goals: Building on her blend of craftsmanship and artistic vision, Ashley aims to grow her painting and paper‑hanging business into a full‑service interior finish company. Over the next three to
    five years she plans to obtain a state contractor’s license, expand her portfolio to include historic restoration projects and custom mural commissions, and develop a niche in high‑end decorative finishes
    for residential clients in Lawton and surrounding communities. She also aspires to mentor a small team of apprentices, offering workshops on modern paper‑hanging techniques and creative painting methods.
    Ultimately she hopes to open a community studio that doubles as a workshop space and a gallery for local artists, positioning herself as both a trusted contractor and a cultural contributor to her region.
