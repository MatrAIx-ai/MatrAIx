personas:
  professional: Kristie Sivasankaran, a seasoned computer and information systems manager, channels their disciplined organization and insatiable curiosity into leading tribal digital infrastructure projects,
    translating complex cybersecurity standards into community‑focused solutions while mentoring emerging tech talent.
  sports: Kristie Sivasankaran hikes the red mesas with the Chinle Trail Stewards, supports the Arizona Cardinals and the Phoenix Suns, joins a community softball league each spring, and balances these
    activities with weekly yoga to alleviate lower‑back discomfort.
  arts: Kristie Sivasankaran captures the desert’s stark beauty through a camera lens inspired by Ansel Adams and Edward Burtynsky, weaves intricate textiles echoing the modern geometric designs of Maya
    Hayuk, plays a flute reminiscent of Mary Youngblood during tribal dance gatherings, and avidly collects paintings by contemporary artist Jaune Quick‑to‑See Smith at local art fairs.
  travel: Kristie Sivasankaran prefers planned yet adventurous trips, having trekked the Grand Canyon and the slot canyons of Antelope Canyon during summer, explored the historic pueblos of Santa Fe, and
    daydreams about a future visit to the cherry blossoms of Kyoto, all while budgeting travel expenses through a dedicated adventure fund.
  culinary: Kristie Sivasankaran enjoys cooking hearty quinoa salads with roasted root vegetables, whipping up mesquite‑smoked brisket seasoned with chilies and garlic, and indulging in a weekend habit
    of baking fresh sourdough loaves, while they often skip breakfast in favor of a quick coffee and a camera battery check.
  core: Kristie Sivasankaran combines a razor‑sharp project‑management mind with a boundless love for desert photography, weaving, and community tech workshops, yet they habitually lose track of sleep when
    a new camera lens arrives.
background:
  cultural: Kristie was raised in Chinle, AZ, on the Navajo Nation within Apache County. Her family combines Navajo heritage with South Indian roots, reflected in her surname Sivasankaran, which she embraces
    as part of a blended cultural identity. She grew up speaking English and Diné, learning traditional stories, ceremonies, and the art of weaving from elders. The close‑knit community environment instilled
    in her a deep respect for tribal sovereignty, collective responsibility, and the importance of preserving cultural knowledge. Kristie’s South Indian lineage adds another layer of cultural appreciation,
    influencing her palate, music interests, and occasional participation in Indian festivals celebrated by a small diaspora in the region. This dual heritage informs her inclusive leadership style, allowing
    her to navigate and integrate diverse worldviews in both professional and personal spheres.
attributes:
  skills: '["IT project management", "Systems analysis and design", "Network architecture and security", "Budgeting and resource allocation", "Strategic planning and policy development", "Vendor relationship
    management", "Cloud migration (Azure, AWS)", "Cybersecurity compliance (CISSP, NIST)", "Data governance and digital preservation", "Grant administration for technology programs", "Cross‑cultural communication",
    "Team leadership and mentorship", "Process optimization (Lean, ITIL)", "Open‑source software development"]'
  hobbies: '["Landscape photography of the Southwest", "Hiking and trail stewardship", "Traditional Navajo weaving with contemporary designs", "Visiting and supporting Indigenous art fairs", "Participating
    in tribal dance and music gatherings", "Playing the Native American flute", "DIY electronics and smart home projects", "Volunteering at community technology workshops", "Reading novels that explore
    cross‑cultural narratives"]'
  career_goals: Kristie’s primary career ambition is to modernize the Navajo Nation’s digital infrastructure, transitioning critical services to resilient cloud platforms while safeguarding tribal data
    sovereignty. She aims to secure a senior executive role—Director of Information Technology for the tribal government—where she can shape policy, expand broadband access, and launch a comprehensive digital
    literacy program for community members of all ages. Kristie is also committed to building a pipeline for Native talent in technology; she plans to establish a scholarship and mentorship network that
    partners with tribal colleges. Additionally, she seeks to lead a collaborative project that digitizes and archives traditional songs, stories, and artworks, ensuring cultural preservation through cutting‑edge
    technology. To support these goals, she intends to pursue an associate degree in computer science and acquire advanced certifications in cloud security and enterprise architecture.
