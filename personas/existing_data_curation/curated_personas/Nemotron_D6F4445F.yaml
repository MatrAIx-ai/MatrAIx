  career_goals: James imagines a future where he can help and lead others, often speaking about becoming a firefighter who rescues people, a construction worker who builds tall towers, or a teacher who
    organizes story time for younger children. His competitive streak drives him to want to be the fastest runner in his class and to win races during play. He also expresses a desire to have a predictable,
    safe routine in his future job, such as a librarian who maintains order on shelves. These ambitions reflect his preference for structure, desire to be reliable, and his energetic sociability.
