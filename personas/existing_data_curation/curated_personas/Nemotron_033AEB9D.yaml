  hobbies: '["Attending community events and social gatherings", "Acoustic guitar playing and singing", "Baking and recipe experimentation", "Volunteering at local animal shelter", "DIY crafts and upcycling
    projects", "Hiking local trails", "Journaling for stress management"]'
  career_goals: Melba aims to obtain her GED within the next year and then pursue a career that blends her people‑skills with a stable, service‑oriented environment. She envisions working in community outreach
    or youth services, where she can organize programs, mentor peers, and foster a supportive atmosphere. Alternatively, she is intrigued by hospitality management, where her flexibility and knack for making
    guests feel welcome could shine. While she dreams of eventually creating a small online platform sharing lifestyle tips—cooking, DIY projects, and wellness advice—she remains grounded in the practical
    goal of securing a reliable job that provides financial independence and the opportunity to give back to her hometown community.
