  career_goals: Jesse aims to earn a NIMS CNC programmer certification within the next two years, positioning himself for a lead‑machinist or foreman role at his current plant. His longer‑term ambition
    is to open a boutique machine shop that serves local agricultural equipment manufacturers, blending his curiosity for emerging technologies—such as additive manufacturing and simple automation—with
    his practical experience. He wants the business to provide stable, fair wages for his family and future employees, and he hopes to mentor younger workers by offering apprenticeships or teaching part‑time
    at a community college. Financial security for his wife and two teenage children, as well as the ability to retire comfortably while staying active in the trade, are key motivations.
