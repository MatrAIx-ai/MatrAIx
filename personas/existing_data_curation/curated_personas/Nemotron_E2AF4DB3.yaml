personas:
  professional: Jesse Brown, a veteran CNC machinist and welder with a knack for reading G‑code and drafting SolidWorks parts, uses their practical curiosity and competitive edge to streamline shop processes
    even while tolerating a cluttered bench, aiming for a NIMS CNC programmer certification and a future boutique shop leadership role.
  sports: Jesse Brown, a dedicated fan of the Oakland Athletics and member of the San Luis Reservoir Anglers Club, spends summer weekends fishing and winter mornings hiking the Sierra Nevada foothills with
    the Sierra Trail Walkers, while they fit in occasional weekend rides with the local motorcycle club and a modest routine of weight‑lifting at a community gym to counterbalance the physical toll of their
    hands‑on trades.
  arts: Jesse Brown, a vinyl‑collector who spins classic rock legends like Led Zeppelin, The Rolling Stones, Pink Floyd, and AC DC on a vintage turntable, often pairs evening listening sessions with crafting
    custom furniture, and they occasionally attend intimate gigs at The Fillmore, finding music and woodwork both serve as creative outlets that balance their methodical trade mindset.
  travel: Jesse Brown, who loves road‑tripping in their restored ’70 Chevrolet pickup to destinations like Yosemite, the Grand Canyon, and the historic Route 66 towns, plans a future family vacation to
    Japan’s motorcycle museums and the Alpine scenery of the Swiss Alps, favoring self‑planned itineraries that blend adventure with the comfort of familiar pit‑stops.
  culinary: Jesse Brown, an enthusiastic home‑cook who favors grill‑smoked trout caught on a weekend outing, hearty chili simmered with cumin and smoked paprika, and classic BBQ ribs brushed with a hickory‑infused
    glaze, often crafts their own cutting boards from reclaimed wood, balancing a decent culinary skill set with a preference for robust, outdoor‑flavored meals.
  core: Jesse Brown, a hands‑on tinkerer who balances a competitive edge with a laid‑back, slightly chaotic lifestyle, and they often trade a tidy shop for a well‑worn toolbox and a half‑finished vinyl
    side for a fresh batch of fresh‑caught trout.
background:
  cultural: Jesse grew up in a multigenerational white working‑class family in the San Joaquin Valley. The region’s agricultural roots and close‑knit community shaped his values of hard work, self‑reliance,
    and practical problem‑solving. While his cultural identity is grounded in traditional Midwestern‑style American values—emphasizing family, community, and a modest religious background—he has been influenced
    by the diverse cultural fabric of Patterson, where he works alongside Hispanic coworkers and participates in community events like the Harvest Festival. This blend of traditional rural values and exposure
    to a multicultural environment informs his pragmatic outlook and respect for a variety of perspectives.
