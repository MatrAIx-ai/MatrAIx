  hobbies: '[''Hiking in the Pacific Northwest'', ''Landscape Photography'', ''Woodworking'', ''DIY Electronics (Arduino/Raspberry Pi)'', ''Homebrewing'', ''Reading non‑fiction (technology, science, history)'',
