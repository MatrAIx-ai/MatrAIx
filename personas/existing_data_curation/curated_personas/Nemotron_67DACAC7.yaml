  career_goals: Stephen aims to advance to a senior director or vice‑presidential role where he can shape enterprise‑wide digital transformation initiatives and influence long‑term strategic direction.
    He plans to deepen his credentials with an MBA or PMP certification, mentor emerging managers, and eventually establish a boutique consultancy focused on performance improvement for mid‑size technology
    firms while maintaining a competitive edge in the marketplace.
