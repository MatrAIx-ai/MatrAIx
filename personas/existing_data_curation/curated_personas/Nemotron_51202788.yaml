  career_goals: Pranee aims to transition from senior developer to a technical leadership role where she can shape engineering culture and mentor the next generation of developers, especially women and
    underrepresented minorities. She plans to obtain an AWS Solutions Architect certification and expand her expertise in AI‑assisted software tools, but only after validating their reliability for production
    use. Over the next five years she hopes to lead a cross‑functional team building robust agricultural‑tech platforms that serve local farms in Yuba County, leveraging her knowledge of cloud infrastructure
    and data pipelines. She also wants to contribute to open‑source projects that promote secure, maintainable code, and to speak at regional tech meet‑ups about balancing innovation with practical engineering
    rigor.
