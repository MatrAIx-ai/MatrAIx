personas:
  professional: Pranee Suon, a seasoned full‑stack software developer with deep expertise in Python, Java, C# and cloud platforms, leverages their methodical, test‑driven approach to design scalable data‑intensive
    services while championing pragmatic adoption of emerging AI APIs and mentoring women in tech via workshops.
  sports: Pranee Suon, an avid weekend hiker in the Sierra foothills and member of the local hiking club, also follows the Sacramento Kings basketball team and participates in a community yoga class, balancing
    a competitive spirit with a low‑impact fitness regimen suited to their 54‑year‑old schedule.
  arts: Pranee Suon, a lover of world cinema and live theater, frequently attends performances by the Sacramento Theatre Company, rolls through the discographies of pianist Ludovico Einaudi and filmmaker
    Hayao Miyazaki, and they enjoy board‑game evenings that double as social storytelling sessions.
  travel: Pranee Suon, who prefers meticulously planned trips that blend relaxation with cultural immersion, has explored the vineyards of Napa Valley, trekked the misty trails of the Pacific Northwest,
    and they dream of a quiet autumn retreat in Kyoto’s countryside, all while budgeting carefully to fund future open‑source contributions.
  culinary: Pranee Suon, an accomplished home chef, masterfully prepares homemade pad thai with tamarind paste, fish sauce, rice noodles, and fresh garden basil, and perfects mango sticky rice using ripe
    Alphonso mangoes, jasmine rice, and coconut milk, often pairing dishes with locally sourced heirloom tomatoes from their vegetable patch.
  core: Pranee Suon embodies a methodical, curiosity‑driven mind that balances a competitive edge with a penchant for quiet gardening and mindful meditation, and they occasionally succumb to over‑worry
    and meticulous spending habits.
background:
  cultural: Pranee’s family originates from Thailand, and she grew up bilingual in Thai and English. Her cultural upbringing emphasized humility, respect for elders, and a strong work ethic, values she
    carries into her professional life. She stays connected to her heritage by celebrating Songkran and Loy Kraong festivals, preparing traditional meals for community gatherings, and participating in a
    Thai cultural association in the Bay Area. While fully integrated into American life in Marysville, she balances the collective, community‑oriented mindset of her Southeast Asian roots with the individualistic,
    results‑driven expectations of the U.S. tech industry, creating a nuanced identity that informs both her interpersonal style and her approach to problem‑solving.
