personas:
  professional: Jackie Estriplet, a 36-year-old middle school English teacher, merges curiosity-driven curriculum innovation with pragmatic tech integration - leveraging Google Classroom and interactive
    whiteboards - while balancing meticulous planning with flexible classroom management, and they assert they can lead collaborative school initiatives to embed culturally responsive literature across
    subjects.
  sports: Jackie Estriplet, an avid runner living near Atlanta's BeltLine, logs four weekly runs with the Atlanta Road Runners club, follows the Atlanta Falcons, Hawks, and Braves for team spirit, and they
    balance solo long-distance training with community park fitness classes, showcasing an organized yet flexible fitness outlook.
  arts: Jackie Estriplet, a dedicated spoken-word poet and street photographer, regularly performs at local venues sharing original poems inspired by contemporary writers like Zadie Smith and Chimamanda
    Adichie, captures everyday moments reminiscent of Henri Cartier-Bresson, immerses themselves in jazz concerts featuring Kamasi Washington, and they curate visits to the High Museum of Art, reflecting
    a balanced curiosity and social engagement.
  travel: Jackie Estriplet, who prefers a blend of meticulous planning and spontaneous exploration, travels to historically significant sites such as Washington, D.C.'s national monuments, the jazz heritage
    streets of New Orleans, and European capitals like Edinburgh, and they balance weekend trips with occasional longer vacations to destinations like Savannah and the coastal towns of the Pacific Northwest,
    all within a modest travel budget.
  culinary: Jackie Estriplet, an enthusiastic home cook, experiments with modern twists on Southern-inspired dishes - such as miso-glazed shrimp and grits, quinoa-based jambalaya, and sweet-potato pie spiced
    with smoked paprika - favoring ingredients like kale, black-eyed peas, and hot honey, and they enjoy occasional dining out at farm-to-table restaurants to refine their palate.
  core: Jackie Estriplet, a 36-year-old educator and community-oriented creator, balances pragmatic ambition with creative curiosity, and they orchestrate purposeful projects while nurturing personal well-being
    through running, jazz, and culinary experiments.
background:
  cultural: Jackie is a Black woman who grew up in Atlanta's historically Black West End neighborhood and attended Spelman College, an HBCU that reinforced her commitment to community service and cultural
    pride. Her family's deep roots in the Southern Black church and civil-rights legacy shape her worldview, and she actively celebrates traditions such as Juneteenth, Black History Month, and local African-American
    festivals. These cultural influences inform her teaching, where she regularly incorporates African-American literature, oral storytelling, and Southern culinary references into lessons. Jackie’s identity
    at the intersection of race, gender, and profession drives her advocacy for equity, representation, and empowerment within the school and the broader Atlanta community.
attributes:
  skills: '["Curriculum development", "Differentiated instruction", "Classroom management", "Educational technology integration", "Literacy coaching", "Student mentorship", "Culturally responsive pedagogy",
    "Assessment design", "Community outreach", "Workshop facilitation"]'
  hobbies: '["Reading contemporary Black literature", "Creative writing (poetry & short stories)", "Spoken-word performance", "Youth mentorship volunteering", "Urban gardening", "Running", "Cooking modern
    Southern soul food", "Yoga", "Street photography", "Museum and cultural exhibition visits", "Traveling to African-American historical sites", "Listening to jazz and blues"]'
  career_goals: Jackie aims to advance into school leadership by earning a master's degree in Educational Leadership within the next three years. She aspires to become department chair of English and Social
    Studies, where she can champion a district-wide culturally relevant pedagogy framework. Jackie plans to design and launch an after-school program that combines creative writing, digital media, and mentorship
    for underserved students. She also hopes to author a teacher-resource guide on integrating African-American literature across the humanities curriculum and eventually contribute to curriculum policy
    at the district level.
