personas:
  professional: Meiyun Lin, a ten-year-old aspiring comic-artist and budding robotics enthusiast, channels their curiosity and methodical planning into weekly art workshops and building simple machines
    for the school's robotics club, and they competitively strive to perfect every panel while impressing classmates with organized sketches.
  sports: Meiyun Lin, a member of the Edison Soccer Club's U-11 team, passionately follows the New York Red Bulls, trains twice a week, and they approach each match with a competitive mindset, often pushing
    themselves to outrun opponents.
  arts: Meiyun Lin, an avid doodler, draws inspiration from Hayao Miyazaki, Stan Lee, and Naoko Takeuchi, spends evenings experimenting with Procreate on her tablet, and they frequently visit the New Jersey
    State Museum to study both Japanese woodblock prints and contemporary graphic novels.
  travel: Meiyun Lin loves weekend trips to New York City's museums, annual family outings to Shenandoah National Park, and dreams of exploring the lantern-lit streets of Taipei during the Mid-Autumn Festival,
    and they always help plan itineraries with their parents' input.
  culinary: Meiyun Lin enjoys cooking simple dishes like fried rice with peas and carrots, delights in tasting mooncakes and jiaozi during festive gatherings, and they can expertly fold a handcrafted dumpling
    with their grandmother's guidance, though they often prefer pepperoni pizza after a long art session.
  core: Meiyun Lin blends a competitive streak with organized creativity, turning every allowance dollar into art supplies, every soccer drill into a challenge, and they view each cultural celebration as
    a chance to perfect their comic panels.
background:
  cultural: Meiyun is a first‑generation Chinese‑American whose family maintains traditional customs while embracing life in Edison, New Jersey. At home she speaks Mandarin with her parents and grandparents,
    celebrates Lunar New Year and the Mid‑Autumn Festival with special meals and lanterns, and participates in community cultural events at the local Asian cultural center. Her upbringing blends respect
    for education and family values from her East Asian heritage with the diverse, collaborative environment of her American school and neighborhood.
attributes:
  skills: '[''Reading comprehension'', ''Mathematics problem solving'', ''Digital literacy (Scratch, educational apps)'', ''Sketching and digital illustration'', ''Basic Mandarin speaking and writing'',
    ''Beginner piano'', ''Chess strategy'', ''Team sports coordination (soccer)'']'
  hobbies: '[''Drawing and comic creation'', ''Digital art on tablets'', ''Soccer'', ''Robotics club (Scratch projects)'', ''Reading fantasy novels'', ''Visiting museums and art galleries'', ''Piano practice'',
    ''Learning Mandarin songs'', ''Celebrating cultural festivals'']'
  career_goals: Inspired by her love of art and technology, Meiyun aspires to become a visual storyteller—ideally an animator or game designer who creates interactive worlds. She hopes to attend a specialized
    arts high school, compete in national art contests, and later study graphic design or computer science to merge creativity with technical skills. In the long term she wants to lead collaborative projects
    that blend cultural heritage with innovative media, and perhaps mentor other young creators.
