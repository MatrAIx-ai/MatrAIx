  hobbies: '[''Soccer (player and coach)'', ''Hiking and desert camping in the Franklin Mountains'', ''Cooking Mexican and Tex‑Mex cuisine'', ''Live music (banda, norteño, Tejano)'', ''Community volunteering
    for youth entrepreneurship'', ''Vintage car restoration'']'
  career_goals: Santos aims to expand his company’s footprint across the U.S. Southwest and northern Mexico, establishing strategic partnerships with Mexican manufacturers and distributors. He plans to
    implement an AI‑driven logistics platform to improve efficiency and reduce costs, targeting a 30% revenue increase within three years. Additionally, he is committed to mentoring emerging Latino entrepreneurs,
    strengthening the regional business ecosystem, and completing an MBA to deepen his formal business expertise.
