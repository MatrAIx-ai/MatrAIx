personas:
  professional: A seasoned business development leader, Santos Seda leverages bilingual fluency and data‑driven decision‑making to streamline cross‑border supply‑chain operations while championing community‑focused
    growth, and they are preparing an AI‑driven logistics platform to boost regional revenue.
  sports: An enthusiastic soccer player and community coach, Santos Seda competes in the local amateur league, mentors junior teammates, they also hike the Franklin Mountains on weekends, follow El Paso Locomotive
    FC and the Texas Rangers, and they belong to a desert‑run club that meets for early‑morning trail runs.
  arts: A devoted fan of regional music, Santos Seda frequents live shows featuring Los Tigres del Norte, Grupo Monte, and contemporary Tejano artists, they also volunteer at the annual border‑culture arts
    festival, and they collect vintage concert posters from the 1970s.
  travel: A weekend explorer, Santos Seda plans road trips that blend desert camping in the Franklin Mountains with cultural visits to Santa Fe and cross‑border day trips to Ciudad Juárez, they dream of
    a coastal retreat in Cabo San Lucas but balance travel with family responsibilities, and they prefer booking accommodations through local boutique inns.
  culinary: A passionate home chef, Santos Seda perfects classic pozole, chiles rellenos, and a Tex‑Mex breakfast taco with brisket, they favor ingredients like chiles de árbol, fresh cilantro, and corn
    masa, they experiment with fusion sauces while occasionally burning the edges of a tortilla, and they enjoy occasional meals at L&J Café for inspiration.
  core: A driven bilingual entrepreneur with a love for vintage cars, soccer, and community festivals, Santos Seda blends pragmatic ambition with a relentless celebration of border‑region culture, they
    occasionally over‑schedule but never miss a chance to rally friends around a grill.
background:
  cultural: Santos grew up in a bicultural Mexican‑American household in El Paso, fluent in both Spanish and English, and steeped in Mexican traditions such as Día de los Muertos and family gatherings.
    His identity is shaped by the vibrant border community, where he actively participates in the Mexican‑American Chamber of Commerce and celebrates cultural festivals. This heritage informs his collaborative
    leadership style, his commitment to community development, and his appreciation for both heritage cuisine and contemporary border‑region influences.
