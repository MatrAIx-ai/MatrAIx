personas:
  professional: James Brooks, a meticulous IT support specialist, harnesses his methodical mind and ITIL expertise to diagnose cross‑platform technical issues while creating detailed SOPs and training junior
    staff, all with an eye toward moving into a service desk leadership role within three years.
  sports: James Brooks enjoys Saturday morning jogs along the Cooper River, follows the Charleston Battery soccer team, cheers for the Gamecocks during football season, and belongs to a local adult softball
    league that meets each spring, blending routine exercise with community competition.
  arts: James Brooks finds solace in listening to blues legend B.B. King while polishing his woodworking projects, regularly attends Charleston’s annual Spoleto Festival for performances by the Charleston
    Symphony Orchestra, and reads biographies of innovators like Steve Jobs and Elon Musk for inspiration.
  travel: James Brooks prefers meticulously planned short getaways, revisiting historic Charleston neighborhoods and weekend trips to Savannah’s squares, while his bucket list includes a well‑researched
    road trip through the Blue Ridge Parkway and a future cultural immersion tour of Lisbon, Portugal.
  culinary: James Brooks is a competent home cook who transforms garden‑fresh tomatoes, basil, and heirloom chilies into a signature marinara for handmade pasta, while his weekend brunch staples feature
    shrimp and grits seasoned with local Old Bay and a dash of lemon zest.
  core: James Brooks is a methodical technocrat who balances quiet solo pursuits—like fishing and woodworking—with community service, all wrapped in a routine‑driven lifestyle that occasionally splurges
    on high‑tech gadgets.
background:
  cultural: James grew up in a middle‑class white family in North Charleston, where Southern hospitality and a strong sense of community are integral parts of daily life. The Lowcountry culture—characterized
    by modesty, practicality, and respect for tradition—shapes his worldview. He cherishes local customs such as seafood festivals, church gatherings, and the emphasis on family ties. While his upbringing
    is grounded in conventional Southern values, his STEM education and career in technology give him a progressive edge, allowing him to balance traditional cultural norms with a modern, data‑driven perspective.
attributes:
  skills: '[''Technical troubleshooting'', ''Hardware repair and maintenance'', ''Software installation and configuration'', ''Operating system support (Windows, macOS, Linux)'', ''Network configuration
    and troubleshooting'', ''Remote desktop support'', ''Ticketing system management (ServiceNow, JIRA)'', ''ITIL incident and change management'', ''Documentation and SOP creation'', ''Customer service
    and communication'', ''Team training and onboarding'', ''Basic cybersecurity awareness'']'
  hobbies: '[''Fishing (Cooper River & Intracoastal)'', ''Backyard gardening (vegetables & herbs)'', ''Woodworking (furniture building)'', ''Reading non-fiction (technology, history, self‑help)'', ''Chess
    club participation'', ''Volunteer tech support at community center'', ''Church fellowship events'', ''Jogging along waterfront trails'']'
  career_goals: James aims to transition from a front‑line support role into a supervisory position within the next three years, targeting a role as an IT Service Desk Lead or Operations Manager. He plans
    to earn CompTIA Network+ and Security+, followed by a Microsoft Certified Solutions Expert credential to broaden his technical qualifications. His long‑term ambition is to oversee the entire IT service
    delivery function for a mid‑size organization in the Charleston area, implementing efficient processes, mentoring a cohesive support team, and integrating emerging technologies such as cloud services
    and automated ticket routing. He values stability and professional growth that aligns with his practical mindset and preference for structured environments.
