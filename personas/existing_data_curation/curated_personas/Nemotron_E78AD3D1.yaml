  hobbies: '["Soccer (weekly park games)", "Competitive video gaming", "LEGO construction and invention", "Listening to Cuban music and dancing salsa", "Helping cook Cuban family recipes", "Reading comic
    books", "Drawing comic‑style illustrations"]'
  career_goals: Ruben dreams of becoming a professional soccer player, inspired by local youth leagues and the excitement of competition. He also imagines helping his family by mastering the kitchen, hoping
    to one day become a chef who blends Cuban flavors with his own creative twists. In the near future, he aims to improve his organizational skills to balance schoolwork with his sports practice, hoping
    to earn a spot on his school's varsity team and to win local gaming tournaments.
