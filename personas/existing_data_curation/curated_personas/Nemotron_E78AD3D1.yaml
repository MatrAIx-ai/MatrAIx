personas:
  professional: Ruben Espinal, a budding LEGO architect who dreams of becoming a mechanical engineer, channels his love of routine and hands‑on inventiveness into designing intricate builds that he proudly
    presents at weekend neighborhood showcases, all while his competitive streak pushes him to out‑do his peers.
  sports: Ruben Espinal, a spirited member of the local Under‑9 Soccer Club and an avid supporter of the City Raiders, revels in the routine of weekly park matches, models his play after Lionel Messi’s
    dribbles, and balances his competitive drive with occasional nervousness about missing a goal.
  arts: Ruben Espinal, a salsa‑dancing enthusiast who twirls to the rhythms of Celia Cruz at family gatherings, devotes evenings to drawing comic strips inspired by Stan Lee’s heroes, and collects limited‑edition
    comic books that fuel his imagination while he still struggles to keep his sketchbooks organized.
  travel: Ruben Espinal, who has explored the sunny sands of Clearwater Beach with his family and trekked the trails of Green Valley National Park, prefers trips that blend adventure with familiar routines,
    and dreams of visiting the historic streets of Cartagena to sample more local dishes.
  culinary: Ruben Espinal, an enthusiastic kitchen helper, loves crafting arroz con pollo and crisp plantain fritters alongside his relatives, favours bite‑size snacks like mini cheese quesadillas, and
    often experiments by adding a dash of cilantro to his homemade pepperoni pizza.
  core: Ruben Espinal, a routine‑loving, competitive nine‑year‑old who mixes soccer, LEGO engineering, and salsa rhythms into a vibrant yet occasionally worry‑laden world.
background:
  cultural: Ruben comes from a Cuban‑American family that maintains strong ties to its heritage while living in Lehigh Acres, Florida. At home, Spanish is spoken alongside English, and family meals often
    feature Cuban staples such as ropa vieja, black beans, and yuca. He celebrates cultural holidays like Carnaval and enjoys listening to Timba and traditional son music. The local Latino community provides
    a familiar social network, reinforcing his preference for routine and familiar settings. His cultural upbringing emphasizes family closeness, practical skills like cooking and manual work, and a love
    for music and dance, all of which shape his everyday activities and aspirations.
