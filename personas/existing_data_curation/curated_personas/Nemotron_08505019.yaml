  career_goals: Timothy aims to transition from a first‑line supervisor to a district manager role within the next five years, leveraging his analytical abilities and creative approach to retail strategy.
    He is interested in completing a bachelor’s degree in Business Administration through online coursework to strengthen his qualifications. Long‑term, he envisions opening a boutique that blends retail
    with art exhibitions, providing a community space where local artists can showcase work while offering curated merchandise. Throughout his career progression, he is committed to mentoring emerging retail
    professionals and maintaining a work‑life balance that supports his family’s wellbeing.
