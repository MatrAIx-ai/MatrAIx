persona_description: A researcher and writer who focuses on Black British queer history, particularly the stories of Black British gay men who have lived, fought, and loved through the communities they
  have created. This person is passionate about uncovering the social histories of Black queer people and is dedicated to educating others about the rich and diverse history of Black British queer communities.
  They are known for their extensive research and their ability to engage with the community of elders who have lived, fought, and loved through the communities they have created.
