personas:
  professional: Terrel Parsons is a disciplined mechanical engineer who leverages their expertise in SolidWorks, MATLAB, and rapid prototyping to lead cross‑functional R&D teams, blending sleek urban‑inspired
    aesthetics into sustainable product designs while communicating complex concepts with charismatic, talkative flair, and they constantly seek to embed artistic nuance into engineering solutions.
  sports: Terrel Parsons cycles the Three Rivers Heritage Trail weekly, hikes the Laurel Highlands, supports the Pittsburgh Steelers and Penguins with fervor, and joins the local Allegheny Cycling Club
    for group rides while occasionally playing pickup soccer on weekends, where they relish the camaraderie.
  arts: Terrel Parsons immerses themselves in the local arts scene by attending installations by Yayoi Kusama at the Carnegie Museum of Art, theater productions starring Patti LuPone at the Benedum Center,
    and regularly strums acoustic covers of Bob Dylan and Joni Mitchell at informal jam sessions, letting the emotional resonance of these works inform their engineering aesthetic.
  travel: Terrel Parsons meticulously plans trips to tech conferences such as CES in Las Vegas and Milan Design Week, while also carving out leisurely weekends exploring the historic streets of Kyoto and
    the vibrant food markets of Barcelona, where they blend work‑focused learning with a love for cultural immersion.
  culinary: Terrel Parsons enjoys cooking grilled salmon with quinoa, sautéed kale with smoked paprika, and mastering the perfect Pittsburgh‑style sandwich with fresh mozzarella and caramelized onions,
    while their favorite indulgence is a steaming bowl of ramen featuring pork belly, soft‑boiled egg, and a splash of sesame oil, which they savor after a long day of prototyping.
  core: Terrel Parsons blends disciplined engineering precision with a bohemian love for urban photography, turning every project into a canvas while juggling coffee‑fueled late nights and a habit of overcommitting
    to community workshops, which they view as essential to personal growth.
background:
  cultural: Terrel grew up in a middle‑class suburban family in the greater Pittsburgh area, where a strong work ethic and community involvement were emphasized. His parents encouraged both hands‑on problem
    solving and artistic pursuits, leading him to balance engineering studies with regular trips to local museums and community theater. The region’s industrial heritage and the resurgence of a vibrant
    arts scene have shaped his worldview, instilling a respect for practical craftsmanship alongside an appreciation for creative innovation. He identifies with broader American cultural values of self‑improvement,
    collaboration, and civic engagement, while also feeling a deep connection to the Allegheny County community that supports his professional and personal growth.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''Finite Element Analysis (FEA)'', ''MATLAB'', ''Python scripting'', ''Lean Manufacturing'', ''Six Sigma'', ''3D Printing'', ''CNC Machining'', ''Project Management'',
    ''Technical Writing'', ''Public Speaking'', ''Team Leadership'', ''Design Aesthetics'']'
  hobbies: '[''Photography'', ''Art exhibition attendance'', ''Theater performance'', ''Cycling'', ''Hiking'', ''Acoustic guitar playing'', ''Makerspace volunteering'', ''Mentoring robotics teams'', ''Travel
    to tech and design conferences'']'
  career_goals: Terrel aims to transition from a senior mechanical engineering role into an engineering management position where he can lead multidisciplinary R&D teams focused on sustainable product innovations.
    He plans to obtain his Professional Engineer (PE) license within the next two years and later launch his own consultancy that merges mechanical design with artistic design thinking. In the long term,
    he envisions contributing to cutting‑edge projects in renewable energy or aerospace, leveraging his organizational strengths to drive projects from concept through market launch while fostering a collaborative
    and inclusive team culture.
