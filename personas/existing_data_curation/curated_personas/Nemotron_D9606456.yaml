    and critique'']'
  hobbies: '[''Photography (desert and mountain scenery)'', ''Watercolor painting'', ''Collecting Southwestern folk art'', ''Hiking and birdwatching'', ''Gardening (chilies, succulents, heirloom vegetables)'',
    ''Playing bridge and chess'', ''Attending local music and dance festivals'', ''Volunteering for storytelling sessions'', ''Cooking traditional New Mexican cuisine'', ''Reading historical biographies'']'
  career_goals: Although retired, Jordan aims to preserve the oral histories of Taos County's elder residents by recording interviews and compiling them into a community archive. He dreams of curating a
    small rotating exhibit of local folk art in the community center, where he can mentor younger volunteers in event organization. Maintaining his health and independence remains a priority, so he pursues
    regular exercise and balanced nutrition. He also seeks to stay intellectually active by learning about contemporary art movements and participating in senior chess tournaments to satisfy his competitive
    spirit.
