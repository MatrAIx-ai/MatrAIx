personas:
  professional: Carly Tamvakis, an 11‑year‑old budding technologist, merges a love for building LEGO Technic machines with early coding in Scratch and Python, and they channel meticulous planning and a
    competitive edge into designing small games that solve logical puzzles.
  sports: Carly Tamvakis, a quiet member of the local junior chess league, follows the strategic battles of Magnus Carlsen and enjoys analyzing classic opening puzzles, while also cheering for the New York
    Yankees during weekend broadcasts and joining the community swimming club for occasional laps, and they view each match as a mental workout that balances their love of solitary challenge.
  arts: Carly Tamvakis, an aspiring pianist, practices Debussy’s “Clair de Lune” and composes original tunes on a digital keyboard, while also devouring science‑fiction novels by Naomi Novik and sketching
    detailed bird illustrations inspired by Audubon, and they frequently attend local theater shows starring Lin‑Manuel Miranda’s productions to experience storytelling across mediums.
  travel: Carly Tamvakis plans low‑key family trips that blend curiosity and structure, such as a weekend hike in Shenandoah National Park to bird‑watch the red‑tailed hawk, a day at the Exploratorium in
    San Francisco to satisfy their love of hands‑on science, and a future wish to visit the Kyoto Railway Museum to see intricate model trains, and they meticulously map out itineraries to ensure every
    activity aligns with their methodical nature.
  culinary: Carly Tamvakis, a methodical home chef, loves crafting precise dishes like homemade sushi rolls with fresh tuna and avocado, perfecting quinoa‑based salads seasoned with lemon zest, and baking
    chocolate chip cookies with exact measurements, and they document each recipe in a notebook that mirrors their LEGO instruction manuals.
  core: Carly Tamvakis is a solitary, detail‑obsessed eleven‑year‑old who fuses scientific curiosity with competitive puzzles, meticulously plans every hobby and financial move, and they quietly push themselves
    toward mastery in coding, building, and music.
background:
  cultural: 'Carly comes from a Greek‑American family in the suburban community of Allison Park, PA. Her household blends American middle‑class life with Greek traditions: celebrating Greek Orthodox Easter,
    name days, and cooking dishes such as moussaka and baklava, while also observing American holidays like Thanksgiving and the Fourth of July. She occasionally receives basic Greek language lessons at
    home and participates in community youth programs. This bicultural environment emphasizes education, self‑reliance, and a balance between family solidarity and individual achievement.'
