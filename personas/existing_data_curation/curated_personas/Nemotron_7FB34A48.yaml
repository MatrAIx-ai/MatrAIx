  career_goals: Carly aspires to pursue a STEM pathway, aiming to attend a specialized high‑school program in robotics or computer science. She dreams of becoming a robotics engineer or software developer
    who creates practical, innovative tools that improve everyday life. Long‑term, she envisions contributing to sustainable technology solutions, participating in national robotics competitions, and eventually
    earning a degree in engineering or computer science to work on research‑focused projects that blend curiosity with real‑world impact.
