personas:
  professional: Christian Mcgaha, a seasoned construction manager with a 25‑year track record in project planning, budgeting, BIM integration, and safety compliance, they channel their meticulous, organized
    nature and competitive drive into delivering on‑time, zero‑incident builds while mentoring junior staff and steering toward regional leadership.
  sports: Christian Mcgaha, an avid kayaker who rows with the Milwaukee Kayak Club in summer and cross‑country skis on the Northwoods in winter, they cheer for the Milwaukee Brewers, Green Bay Packers,
    and Wisconsin Badgers, and cap their fitness routine with weekly solitary runs along the Wolf River trail.
  arts: Christian Mcgaha, a dedicated visitor to the Milwaukee Museum of Art and admirer of Ansel Adams, Georgia O’Keeffe, and Frank Lloyd Wright, they fuse photography of Wisconsin’s forests with handcrafted
    furniture inspired by Bauhaus, and unwind listening to Fleet Foxes and Beethoven’s Ninth Symphony.
  travel: Christian Mcgaha, a meticulous planner who favors low‑key retreats, they have explored Door County, the Upper Peninsula, and Chicago while dreaming of photographing the Canadian Rockies and New Zealand’s
    South Island, always mapping routes and budgeting down to the last mile.
  culinary: Christian Mcgaha, a competent home cook who favors rustic Midwestern flavors, they often smoke walleye with hickory, braise short ribs with rosemary and thyme, and craft hand‑rolled pierogies
    stuffed with potato and chive, pairing meals with local craft brews and a robust black coffee.
  core: Christian Mcgaha blends the precision of a construction manager with a photographer’s eye, navigating life with disciplined solitude, competitive ambition, and a habit of meticulously cataloging
    every project, trip, and tool.
background:
  cultural: Christian was raised in a small farming community in northern Wisconsin, where his family’s roots trace back to German and Scandinavian immigrants who settled the region in the late 19th century.
    The Midwest’s emphasis on hard work, self‑reliance, and community cooperation shaped his values. He grew up attending a local Lutheran church and participating in community events such as county fairs
    and harvest festivals, which reinforced a sense of local heritage and modesty. While he identifies as white, his cultural identity is grounded in the practical, nature‑oriented lifestyle of rural Wisconsin,
    blending traditional values with an appreciation for the region’s natural beauty and emerging arts scene.
attributes:
  skills: '[''Project planning'', ''Budgeting and cost control'', ''Construction estimating'', ''Building code compliance'', ''Safety management (OSHA)'', ''Team leadership'', ''Contract negotiation'',
