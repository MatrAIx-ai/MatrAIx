  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Woodworking and furniture making'', ''Reading architectural and engineering literature'', ''Model building of historic structures'',
    ''Kayaking on local rivers'']'
  career_goals: Christian aims to transition from site-focused management to a regional leadership role within the next five years, overseeing multiple projects across the Upper Midwest, and eventually
    launch his own construction firm that emphasizes high-quality workmanship, innovative design, and green building techniques. He intends to mentor younger professionals, establish a reputation for zero-incident
    safety records, and expand his expertise in BIM and prefabrication to stay ahead of industry trends. His competitive drive pushes him to achieve industry certifications such as Certified Construction
    Manager (CCM) and LEED Accredited Professional, positioning him as a thought leader in sustainable construction.
