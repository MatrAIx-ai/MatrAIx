persona_description: A team of marine scientists from the United States, United Kingdom, Canada, Austria, France, and Saudi Arabia, who will participate in a scientific expedition to the Farasan Islands
  Marine Protected Area off the coast of Saudi Arabia. The team will focus on assessing the impact of ecotourism, pollution, over-fishing, climate change, and other factors on the coral reefs in the area.
  The expedition will be conducted on the Golden Shadow, a recently refitted 67-meter yacht, and will be supported by a professional film crew. The team is also partnering with organizations such as the
  Saudi Arabian National Commission for Wildlife Conservation and Development, the Regional Organization for Conservation of the Environment of the Red Sea and Gulf of Aden, and the Lantra sector skills
  council to conduct research and conservation efforts.
