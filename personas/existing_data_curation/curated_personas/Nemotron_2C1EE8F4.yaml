  hobbies: '[''Visiting art exhibitions and performances'', ''Participating in community theater (set design, costumes)'', ''Community gardening'', ''Hiking coastal and hill trails in Monterey County'',
    ''Cooking and sharing Salvadoran cuisine'', ''Photography of landscapes and community events'', ''Playing chess at the senior center'', ''Leading storytelling circles'']'
  career_goals: Although retired from formal employment, Alexander seeks to continue contributing to his community. His primary ambition is to create a living archive of Salvadoran oral histories in the
    Soledad area, recording stories from older migrants and sharing them through digital platforms and local exhibitions. He aspires to mentor younger community members, particularly in preserving culinary
    traditions and cultural storytelling. He also hopes to volunteer as a cultural liaison for the Monterey County Arts Council, helping to integrate Salvadoran artistic expressions into regional programming.
    In addition, Alexander plans to enroll in a short‑term online course on digital storytelling to better document and disseminate his work.
