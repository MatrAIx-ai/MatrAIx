personas:
  professional: Alexander Dominguez is a retired community organizer who channels decades of intergenerational mentorship and event planning into a living archive of oral histories, leveraging modest digital
    skills to photograph, edit, and share stories while serving as a cultural liaison for the local arts council, guided by a curious and organized yet flexible mindset that balances cooperative collaboration
    with occasional assertive direction.
  sports: Alexander Dominguez enjoys leisurely hikes along Monterey County’s coastal trails with the Monterey Senior Hiking Club, follows the San Francisco Giants and Golden State Warriors for baseball
    and basketball, occasionally watches San Jose Earthquakes matches, participates in a senior softball league at the community center, and keeps fit through garden work and regular chess sessions that
    double as mental exercise.
  arts: Alexander Dominguez regularly attends gallery exhibitions featuring works by Claude Monet and Frida Kahlo, delights in community theater productions of classic plays, cherishes the poetry of Pablo
    Neruda and the music of Carlos Santana, and often leads informal critique circles where they discuss visual and performing arts with fellow enthusiasts.
  travel: Alexander Dominguez prefers relaxed road trips along the Pacific Coast, has fond memories of visiting Carmel‑by‑the‑Sea and Big Sur, dreams of exploring Oaxaca’s culinary scene and the historic
    streets of Granada, and balances his wanderlust with a modest travel budget by staying in budget inns but occasionally splurges on a guided snorkeling tour in Maui.
  culinary: Alexander Dominguez excels at preparing traditional corn‑based dishes such as pupusas, tamales, and sopa de pata, skillfully hand‑rolling masa with cheese, pork, and achiote, incorporates fresh
    garden herbs like cilantro and epazote, and loves sharing these hearty meals at community potlucks where they swap recipes and stories.
  core: Alexander Dominguez is a curious, sociable 76‑year‑old who weaves community storytelling, art, and cooking into a vibrant tapestry of cultural preservation, all while juggling a modest budget, health
    quirks, and a zest for lifelong learning.
background:
  cultural: Alexander's cultural background is rooted in his Salvadoran heritage and the experiences of the Salvadoran diaspora in California's Central Coast. Born to parents who emigrated from the San
    Salvador region in the early 1960s, he grew up in a bilingual household where Spanish was spoken at home and English at school. The family maintained many Salvadoran traditions—such as celebrating Día
    de los Farolitos, preparing holiday foods like hallacas, and participating in the local Catholic parish—while also integrating aspects of Californian life. Living in Soledad, a town with a significant
    Latino population, Alexander has been an active participant in community events that showcase Salvadoran music, dance, and folklore, often collaborating with organizations like the Central Coast Hispanic
    Arts Council. His appreciation for both his ancestral culture and the broader multicultural environment informs his worldview, fostering a sense of pride in his roots while embracing the diversity of
    his adopted home.
attributes:
  skills: '[''Bilingual communication (Spanish-English)'', ''Community mentorship and youth education'', ''Event planning for cultural festivals'', ''Traditional Salvadoran cooking'', ''Photography and
