persona_description: A Brazilian and European researcher who specializes in nanotechnology and immunology. The researcher has expertise in developing nanotechnology-based compounds for oral and intranasal
  vaccine delivery against hepatitis B, a disease that affects millions of people worldwide. The researcher has published several papers in scientific journals and has received support from Brazilian and
  European research foundations. The researcher is currently developing new antigens to add to the nanotechnology-based vaccine formulation, aiming to create a triple vaccine that also immunizes against
  diphtheria and tetanus.
