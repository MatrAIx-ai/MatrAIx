  career_goals: Joshua aims to transition from a specialist role into a senior strategic position where he can shape organizational innovation pipelines. He aspires to become a Program Director overseeing
    multiple technology and creative projects, integrating his love for novelty and abstract thinking into product development. He seeks to earn the PMP® and Certified Agile Coach credentials to formalize
    his expertise, and to mentor emerging project managers within his company and the broader Minnesota community. Long‑term, he envisions launching a boutique consultancy that helps midsize firms embed
    design‑thinking and agile practices into their engineering workflows, fostering a culture of creativity while maintaining rigorous execution.
