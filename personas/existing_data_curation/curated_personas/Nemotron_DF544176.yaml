personas:
  professional: Man Jo, a 25‑year‑old drywall and ceiling‑tile specialist, combines meticulous finishing techniques with an eye for spatial design, routinely creates 3‑D mock‑ups for client walk‑throughs,
    and they are charting a path toward construction‑management certification and a future boutique renovation firm that blends craftsmanship with artistic interiors.
  sports: Man Jo enjoys weekend trail runs in nearby nature preserves, plays pickup basketball with a small friend group every summer, follows the hometown's baseball team the River City Rivermen, and they
    circulate as a member of the downtown climbing gym's beginner wall‑sport club, favoring functional mobility routines to offset back strain from construction work.
  arts: Man Jo channels their imagination through sketching urban skylines and digital paintings inspired by Beeple, captures architectural nuance in the style of Iwan Baan, and they unwind to the ambient
    soundscapes of Brian Eno and Julianna Barwick while devouring the speculative worlds of Ursula Le Guin and Neil Gaiman during quiet evenings.
  travel: Man Jo prefers meticulously planned weekend getaways to nearby nature trails like the Blue Ridge Mountains and short road‑trip explorations of historic districts in Asheville, while they dream
    of a spring immersion in Kyoto’s art galleries to practice Japanese and an ambitious summer trek across Iceland’s volcanic landscapes, balancing adventure with budget‑friendly travel.
  culinary: Man Jo’s palate leans toward umami‑rich dishes, often whipping up homemade ramen with pork belly, kombu dashi, and soft‑boiled marinated eggs, while their kitchen skill hovers at intermediate
    level—comfortably mastering mushroom risotto with porcini and miso‑glazed salmon, yet they still rely on a trusty Japanese chef’s knife and an occasional order of fresh sashimi from a local market for
    luxe dining.
  core: Man Jo is a quietly driven dreamer who stitches together drywall mastery and digital imagination, juggling meticulous craftsmanship with spontaneous art splurges, a habit of over‑packing sketchpads
    into work trucks, and they maintain a gentle, if occasionally anxious, pursuit of balance.
background:
  cultural: Lexuan is a second‑generation East Asian American, born to South Korean immigrant parents who moved to the Chicago suburbs in the early 2000s. He grew up bilingual, speaking Korean at home while
    attending American schools. The family maintains Korean traditions such as celebrating Seollal (Lunar New Year) and Chuseok, preparing dishes like kimchi and bibimbap, and participating in the local
    Korean community center. His cultural heritage also exposed him to traditional Korean arts—calligraphy, ceramics, and folk storytelling—which have subtly influenced his aesthetic sensibility. While
    fully integrated into Midwestern life, he still values the collectivist emphasis on harmony and respect that his upbringing instilled.
