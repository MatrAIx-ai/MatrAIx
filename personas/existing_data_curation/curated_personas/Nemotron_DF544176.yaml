    communication'', ''Team collaboration'']'
  hobbies: '[''Sketching'', ''Digital painting'', ''Architecture photography'', ''Reading sci‑fi and fantasy novels'', ''Hiking local trails'', ''Listening to experimental/ambient music'', ''Building scale
    model kits'', ''Studying Japanese language'', ''Attending small art workshops'']'
  career_goals: Lexuan aims to deepen his expertise in construction and transition into a supervisory role within the next five years. He plans to obtain certifications in construction management and advanced
    drywall finishing. His long‑term ambition is to launch his own boutique renovation company that blends high‑quality craftsmanship with artistic interior design, allowing him to integrate his imagination
    and love of aesthetics. He also hopes to mentor apprentices, promoting a collaborative and harmonious work culture. Additionally, he is interested in learning sustainable building practices and incorporating
    eco‑friendly materials into future projects.
