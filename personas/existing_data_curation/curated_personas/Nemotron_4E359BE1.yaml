personas:
  professional: Colin Joyner, an 84‑year‑old retired mechanical engineer and former community‑college instructor, channels his CAD mastery, data‑analysis acumen, and love of public speaking into mentoring
    high‑school STEM students, leading vintage‑radio workshops, and delivering spirited science talks that blend practical engineering insight with a skeptical curiosity about emerging AI.
  sports: Colin Joyner, a devoted fan of the Boston Red Sox and the Vermont Lake Monsters, spends his summers hiking the Green Mountains, joins a senior walking club that meets at the town green, and maintains
    a low‑impact fitness routine that balances his competitive spirit with the reality of arthritis.
  arts: Colin Joyner immerses himself in folk tunes by Joan Baez, bakes blueberry pies while listening to classic jazz from Miles Davis, and showcases his woodworking creations at the local historical society’s
    annual craft fair, a hobby that satisfies his creative impulse and love for regional heritage.
  travel: Colin Joyner prefers well‑planned, low‑stress trips, having revisited historic sites in Boston, taken a leisurely cruise to Bermuda, and explored the Canadian Maritimes, yet he often postpones
    longer journeys due to his calendar of volunteer commitments.
  culinary: Colin Joyner enjoys preparing maple‑glazed pork chops, simmering Vermont cheddar apple soup, and baking hearty bean casseroles, showing a solid intermediate cooking skill that centers on seasonal,
    locally sourced ingredients and a nostalgic farmhouse palate.
  core: Colin Joyner, an 84‑year‑old former engineer, blends a competitive, talkative nature with a love for tinkering, history, and maple‑syrup, yet sometimes forgets his medication and overindulges in
    hobby‑related spending.
background:
  cultural: Colin comes from a multigenerational white New England lineage, with ancestors tracing back to early English settlers in Vermont. He grew up in rural Addison County, absorbing the region’s emphasis
    on self‑reliance, environmental stewardship, and civic duty through town meetings and community events. Traditional Vermont customs such as maple sugaring, farmhouse cooking, and a modest Protestant
    heritage have shaped his values, though he now identifies more as a secular community‑oriented individual. His cultural identity blends respect for tradition with a curiosity for new ideas, reflecting
    the balance between old‑world pragmatism and contemporary innovation.
