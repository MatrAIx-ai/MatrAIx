  career_goals: Even in retirement, Colin aims to stay professionally relevant by mentoring high‑school students in STEM, delivering occasional science talks at the local library, and writing a memoir that
    ties together his engineering career with the technological changes he’s witnessed. He hopes to launch a community oral‑history project that captures the intersection of local history and industrial
    development, and he plans to keep his mind sharp by learning emerging technologies such as artificial intelligence. Ultimately, he wants to be recognized as the neighborhood’s go‑to problem‑solver and
    a bridge between past and future for younger generations.
