  career_goals: Hunter aims to complete his bachelor's degree in agricultural science within the next two years, followed by a master's in education to qualify for tenure-track positions. He aspires to
    become a department head or program coordinator at his community college, where he can design innovative, industry‑aligned programs. Long‑term, he hopes to launch a regional outreach initiative that
    connects local farms with students for experiential learning and to promote sustainable practices in Somervell County.
