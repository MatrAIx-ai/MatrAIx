persona_description: A paleoanthropologist who specializes in the study of early human cultures and their burial practices. Dr. Phelps is interested in understanding the social structure and cultural significance
  of burial sites like the Algonkian ossuaries found at the Baum Site. His work involves analyzing the remains and artifacts found, as well as comparing them to other known burial practices and cultural
  contexts. Dr. Phelps has a deep understanding of the physical and cultural characteristics of early human societies and is skilled in interpreting these characteristics through the analysis of burial
  sites. He is also knowledgeable about the environmental and social factors that influenced early human settlements and burial practices, and is interested in using this knowledge to better understand
  the broader cultural and social dynamics of prehistoric societies.
