  career_goals: Kathleen aims to transition from an individual contributor to a strategic technology leader within the next five years. She aspires to become a senior systems architect or digital transformation
    manager, where she can shape enterprise‑wide solutions that integrate data analytics with innovative user experiences. Her long‑term ambition is to lead a technology team at a mission‑driven organization—such
    as a nonprofit or education‑focused startup—where she can mentor junior analysts, champion inclusive design practices, and leverage technology to enhance community services. She also hopes to pursue
    certifications in cloud architecture and enterprise architecture to solidify her expertise.
