persona_description: A historian who is interested in the impact of the First World War on Scotland and the wider world. They are passionate about learning about the stories of heroism and loss, triumph
  and tragedy of the war, and how it changed Scotland and the Commonwealth. They are also interested in the impact of the war on local communities and the experiences of Scottish emigrants to places like
  Australia, New Zealand, and Canada. They are dedicated to ensuring that the international reach and impact of the war are commemorated and celebrated through the exhibition and special events at National
  Museums Scotland.
