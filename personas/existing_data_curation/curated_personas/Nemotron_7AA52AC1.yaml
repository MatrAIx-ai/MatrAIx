  career_goals: Audrea aims to move from hostess to floor manager within the next three years at a boutique café that actively collaborates with local artists. She plans to complete a hospitality management
    certificate and earn a certified barista credential to deepen her technical expertise. In the longer term, she envisions opening her own coffeehouse that doubles as a rotating exhibition space, highlighting
    emerging Chesapeake‑area artists and offering a menu that celebrates seasonal, locally sourced ingredients. Additionally, she hopes to mentor new hospitality staff, design community art‑and‑coffee workshops,
    and cultivate a small, tight‑knit team that delivers culturally enriching guest experiences.
