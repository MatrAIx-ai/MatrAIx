personas:
  professional: Audrea Dantuma is a meticulous hostess at a boutique café in Edgewater, skillfully juggling reservations, cash handling, and latte art while leveraging their calm composure and organized
    mindset to create seamless guest experiences and mentor new staff.
  sports: Audrea Dantuma is an avid walker who logs daily miles along the Chesapeake Bay trail, participates in a local rowing club during summer, and follows the Washington Capitals and Baltimore Ravens,
    occasionally attending a Capitals game at Capital One Arena.
  arts: Audrea Dantuma is a watercolor enthusiast who frequents Edgewater gallery openings showcasing artists like Yao Cheng, draws inspiration from the lyrical songs of Norah Jones, and discusses contemporary
    novels such as Sally Rooney’s ‘Normal People’ at their book club.
  travel: Audrea Dantuma is a deliberate traveler who prefers weekend getaways to the historic streets of Annapolis and the Outer Banks, plans meticulously using a travel app, and dreams of an immersive
    coffee‑culture tour of Oaxaca and a serene retreat in Kyoto.
  culinary: Audrea Dantuma is a home cook who blends fresh herbs from their garden into dishes like basil‑infused avocado toast, lavender‑honey tea, and herb‑crusted salmon, while honing their specialty
    coffee brewing skills with pour‑over methods and experimenting with matcha lattes.
  core: Audrea Dantuma is a calm, curiosity‑driven organizer who balances quiet solo walks with a passion for art and coffee, occasionally forgets to water their herbs but never forgets a regular’s drink
    order.
background:
  cultural: Audrea is a white American whose family lineage includes Irish and German ancestors who settled in Maryland in the early twentieth century. Raised in the suburban community of Edgewater, she
    grew up amid the Chesapeake Bay’s maritime traditions, seafood‑centric cuisine, and seasonal community festivals that emphasize neighborly cooperation. Her upbringing in an Episcopal household fostered
    a respect for service, modesty, and an early exposure to the arts through church choirs and local museum visits. The region’s blend of Mid‑Atlantic liberal values and a strong connection to water‑based
    recreation has shaped her appreciation for both communal gatherings and solitary reflection, aligning with her organized, calm, and curious personality.
