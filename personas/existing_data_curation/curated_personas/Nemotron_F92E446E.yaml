  career_goals: Wendy aims to formalize her expertise with a Certified Bookkeeper credential and become a QuickBooks ProAdvisor. She hopes to advance to a senior bookkeeping or finance supervisor role within
    the next three years, overseeing a small team and handling more complex financial analysis. Long‑term, she envisions launching a boutique bookkeeping service that caters to local artists and creative
    enterprises, merging her accounting acumen with her love for art. She also wants to develop skills in basic tax preparation and data analytics (Power BI) to offer innovative financial reporting for
    her clients. Achieving greater financial stability for her family and reducing workplace stress are central to her ambitions.
