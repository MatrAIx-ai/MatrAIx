personas:
  professional: A hands‑on metal‑fabrication specialist, Rolly Ferguson leverages MIG/TIG welding, CNC milling, and emerging 3‑D printing techniques to lead small production crews, blending sharp technical
    expertise with an outgoing, cooperative style that motivates team collaboration despite occasional disorganization.
  sports: A pickup basketball enthusiast and youth soccer coach, Rolly Ferguson spends Saturday mornings shooting hoops in the Finger Lakes Hoops League, volunteers as head coach for the local U‑12 soccer
    team, roots for the New York Knicks and Buffalo Bills, and hits the trails for cross‑country runs in the summer, though they occasionally skip a gym session when a project deadline looms.
  arts: An amateur acoustic‑guitarist with a love for classic rock, Rolly Ferguson strums Led Zeppelin and The Rolling Stones at community barbecues, crafts wooden guitar stands in their workshop, and frequents
    maker fairs to admire kinetic sculptures by Theo Jansen.
  travel: Rolly Ferguson enjoys spontaneous road trips to nearby gems like the Adirondacks, weekend hikes around the Finger Lakes, and occasional long‑haul drives to Portland, Maine for a woodworking symposium,
    favoring flexible itineraries over rigid bookings, even though budget constraints sometimes keep overseas adventures at bay.
  culinary: Rolly Ferguson favors hearty, outdoor‑friendly meals, often grilling trout with fresh rosemary, smoking pork ribs seasoned with smoked paprika, and assembling fish tacos after a day on the lake,
    boasting solid camp‑fire cooking skills but occasionally ending up with a slightly charred garnish.
  core: Rolly Ferguson blends restless curiosity for new fabrication tech with a laid‑back, sometimes disorganized lifestyle, constantly juggling welding projects, weekend sports, and impromptu bike rides
    while never quite finding a permanent spot for their ever‑growing toolbox.
background:
  cultural: Rolly grew up in a working‑class, white family in Attica, a small community in Wyoming County, New York. His upbringing was shaped by the region’s industrial heritage, with many relatives employed
    in manufacturing and agriculture. The local culture emphasizes self‑reliance, community solidarity, and a modest, down‑to‑earth lifestyle. Raised with traditional Northeastern American values, he attended
    public schools, participated in county fairs and high school sports, and absorbed a strong work ethic. Though his family roots trace back to Anglo‑American Midwest settlers, the rural New York setting
    reinforced practicality, teamwork, and a close‑knit social network.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''CNC machining'', ''Press brake operation'', ''Blueprint reading'', ''Plastic injection molding'', ''Equipment maintenance'', ''OSHA safety compliance'', ''Basic
