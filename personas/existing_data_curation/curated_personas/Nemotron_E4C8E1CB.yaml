  hobbies: '[''Pickup basketball'', ''Fishing'', ''Hiking'', ''Motorcycle restoration'', ''Playing guitar'', ''DIY woodworking'', ''Attending maker fairs'', ''Coaching youth sports'', ''Listening to classic
    rock'']'
  career_goals: Rolly aims to become a certified journeyman welder and advance to a foreman role in a mid‑size manufacturing shop. He plans to earn an OSHA trainer certification and obtain a technical diploma
    in machining while saving enough capital to launch his own custom metal‑fabrication business that serves local farms, small contractors, and community projects. He is also interested in mastering additive
    manufacturing techniques to broaden his services and eventually mentor apprentices, blending his love of learning with long‑term career stability.
