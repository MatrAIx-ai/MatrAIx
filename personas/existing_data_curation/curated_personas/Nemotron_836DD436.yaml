personas:
  professional: Rashaun Clayvon, a retired school maintenance worker turned volunteer handyman, leverages decades of carpentry, plumbing, and electrical know‑how to keep the community’s buildings safe while
    orchestrating church events and mentorship sessions with a talkative, people‑centered style.
  sports: Rashaun Clayvon, an avid Phoenix Suns supporter, watches games on television with a crew of friends, joins a senior‑center basketball‑watching club that meets weekly, and enjoys light backyard
    tossing of a basketball to stay active.
  arts: Rashaun Clayvon, a gospel‑song enthusiast, leads sing‑alongs at church, enjoys classic soul records by Marvin Gaye and Aretha Franklin, participates in beadwork and woodworking workshops, and shares
    stories that blend the community’s rich histories with creative craft sessions.
  travel: Rashaun Clayvon prefers short road trips to nearby lakes for fishing, plans annual visits to Arizona’s national parks using senior discounts, dreams of a weekend in New Orleans for its music and
    cuisine, but balances travel with a modest budget and family obligations.
  culinary: Rashaun Clayvon mixes Southern soul‑food staples with Southwestern spices, perfecting dishes like chipotle‑infused collard greens, jalapeño cornbread, and mesquite‑smoked ribs, and takes pride
    in cooking for community potlucks despite occasional over‑salting.
  core: Rashaun Clayvon is a sociable, routine‑loving elder who blends handyman expertise, soulful music, and community storytelling into a life of service, even as anxiety and health quirks keep them grounded.
background:
  cultural: Rashaun is an African‑American who grew up in the rural South before relocating to Arizona in his thirties for work. He carries deep ties to Black cultural traditions—celebrating Juneteenth,
    cherishing gospel music, and preparing soul‑food classics—while embracing the communal values of his adopted home on the Navajo Nation. His marriage to a longtime resident of Polacca has woven elements
    of Navajo and Hopi respect for elders, harmony, and connection to the land into his daily life. This blended cultural identity shapes his perspective, allowing him to honor his Black heritage while
    actively participating in the multicultural fabric of Southwestern Indigenous communities.
