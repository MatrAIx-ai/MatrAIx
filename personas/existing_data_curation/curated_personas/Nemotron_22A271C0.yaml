personas:
  professional: Cesar Garcia, an aspiring mechanical engineer who excels in high school STEM projects, channels their love of routine and meticulous organization into building precise model airplanes and
    cars while coordinating group assignments with disciplined efficiency.
  sports: Cesar Garcia anchors the midfield for the Eastside Youth Soccer Club, thrives on the structured drills and teamwork of the sport, follows the tactical brilliance of Manchester United, and supports
    the Los Angeles Galaxy during the MLS season, while maintaining a disciplined fitness routine of three weekly practices and weekend matches.
  arts: Cesar Garcia channels their detail‑oriented imagination through strategy games like Civilization and Minecraft, admires the cinematic scores of Hans Zimmer, follows indie pixel‑art creator ConcernedApe,
    and delights in bilingual graphic novels such as 'Maus' and 'Persepolis', treating each as a source of artistic inspiration.
  travel: Cesar Garcia enjoys meticulously planned fishing trips to Lake Pleasant and day‑camps at nearby state parks, and dreams of a future adventure backpacking through the Grand Canyon and exploring
    the historic streets of Barcelona, balancing academic responsibilities with wanderlust.
  culinary: Cesar Garcia takes pride in preparing family staples such as tamales, enchiladas, and salsa verde, skillfully handling corn masa and roasted chiles, but often rushes the simmering step when
    homework looms.
  core: Cesar Garcia is a regimented teen who thrives on routine model‑building and soccer drills, yet their constant worry makes them over‑plan even leisure activities.
background:
  cultural: Cesar is a second‑generation Mexican‑American who grew up in a bilingual household in Crossville, Alabama. His parents emigrated from Mexico, bringing with them traditions such as celebrating
    Día de los Muertos, cooking family recipes, and speaking Spanish at home. These cultural practices instill a deep sense of family loyalty, respect for elders, and pride in his heritage. While he embraces
    Mexican customs, he also participates in Southern community life—attending local church events, enjoying Southern cuisine alongside Mexican meals, and engaging in outdoor activities common in Alabama.
    This blend of Mexican and Southern influences shapes his worldview, reinforcing values of hard work, practicality, and community service.
