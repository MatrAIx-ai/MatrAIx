  career_goals: Cesar dreams of pursuing a career in civil engineering so he can design safe, reliable infrastructure for his community in Crossville and beyond. He plans to maintain a high GPA through
    disciplined study habits, earn a scholarship for a reputable engineering program, and gain hands‑on experience through a summer internship with a local construction firm. Long‑term, he hopes to work
    on projects that improve roads, bridges, and public spaces while staying grounded in the practical, family‑oriented values he was raised with. He also sees the possibility of serving in the Army Corps
    of Engineers as a way to combine his love of structure, routine, and service.
