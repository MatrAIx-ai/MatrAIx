personas:
  professional: Briana Jones, a budding home‑based catering entrepreneur and aspiring Community Health Worker, blends meticulous budgeting, recipe development, and compassionate conflict mediation into
    a flexible venture that thrives on solitary work and occasional community workshops, which they manage with a relaxed yet focused mindset.
  sports: Briana Jones, an avid solitary walker and weekend birdwatcher, supports the Atlanta Falcons and Atlanta Hawks, participates in a local walking club that meets at the city park each Saturday, enjoys
    low‑impact yoga classes at the community center, and prefers gentle cardio over team sports, reserving summer for leisurely hikes in the nearby Appalachian trails, which they find revitalizing.
  arts: Briana Jones, a quiet connoisseur of the arts, immerses themselves in the soulful sounds of B.B. King, Miles Davis, and Mahalia Jackson while devouring mystery novels by Agatha Christie and historical
    sagas by Philippa Gregory, and often watches Ken Burns’ documentary series for inspiration, occasionally attending local jazz brunches at a downtown venue, which they consider a gentle social outlet.
  travel: Briana Jones, a methodical yet spontaneous traveler, prefers short, well‑planned road trips that balance quiet relaxation with cultural immersion, having explored Savannah’s historic squares,
    the culinary delights of New Orleans, and the mountain scenery of Asheville, they now hope to visit the colonial town of Williamsburg and the historic districts of Edinburgh on future vacations.
  culinary: Briana Jones, a resourceful home chef, specializes in nutritious Southern classics like herb‑infused shrimp and grits, collard greens sautéed with smoked turkey, and sweet‑potato gnocchi tossed
    in sage butter, frequently incorporating fresh garden produce such as okra, heirloom tomatoes, and rosemary, and enjoys experimenting with low‑sugar blackberry cobbler using almond flour, which they
    perfect after each garden harvest.
  core: Briana Jones blends a love for solitary creativity and community care, thriving on detailed budgeting and garden planning yet occasionally misplacing their knitting needles during late‑night cooking
    sessions, which they attribute to their compartmentalized focus.
background:
  cultural: Briana is a Black woman whose family has deep roots in the African American community of Georgia. Growing up in Jonesboro, she was immersed in Southern traditions, from soulful church services
    to the rich culinary heritage of soul food, which she now reinterprets with a health‑focused lens. Family gatherings and church events emphasized the importance of community solidarity, storytelling,
    and intergenerational support. These cultural influences shape her values of resilience, hospitality, and a commitment to uplifting her neighborhood. While she cherishes her cultural identity, she also
    navigates contemporary Southern life, balancing respect for tradition with a forward‑looking curiosity about new ideas and opportunities.
attributes:
  skills: '[''Basic computer literacy (Microsoft Office, email, internet research)'', ''Household budgeting and financial management'', ''Event planning and community volunteer coordination'', ''Cooking
