persona_description: A historian and archaeologist who specializes in the study of ancient coastal communities in California, particularly the Coast Miwok and the Miwok people. She is knowledgeable about
  the history, culture, and art of these communities, and has a keen interest in preserving and understanding their contributions to the human experience. She is also interested in the role of art and craft
  in the lives of these communities and the ways in which they have been passed down through generations. She is passionate about the beauty and complexity of California Indian basketry and is eager to
  learn more about the techniques and materials used in the making of these baskets.
