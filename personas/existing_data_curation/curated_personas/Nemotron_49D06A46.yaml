personas:
  professional: Donald Dalton, a seasoned drywall and ceiling‑tile specialist with nearly three decades of hands‑on experience, leverages meticulous blueprint reading, precision cutting, and crew coordination
    while they apply a competitive edge and occasional aversion to rigid schedules to push themselves toward foreman certification and eventually launching a modest residential remodeling business.
  sports: Donald Dalton spends weekends shooting hoops at the Northside gym, swings a bat for the West Valley Softball Club, casts for largemouth bass at Utah Lake, and they avidly follow the Utah Jazz
    and Denver Broncos, balancing competitive play with fan loyalty.
  arts: Donald Dalton spends evenings in his workshop crafting cedar picture frames, restoring a 1968 Chevrolet C10, and they find inspiration in the raw riffs of Bruce Springsteen, the storytelling of
    Johnny Cash, and the local community theater’s quarterly productions, often curating a playlist of classic rock while sanding wood.
  travel: Donald Dalton enjoys road‑trip getaways that blend fishing and hiking, having driven to Moab for red‑rock biking, trekked the Oquirrh Mountains, and fished the waters of Utah Lake, while they
    dream of a summer fishing lodge on Alaska’s Kenai River and a nostalgic pilgrimage to their hometown’s historic county fair.
  culinary: Donald Dalton favors hearty American fare—grilled flank steak marinated in bourbon‑soy, cedar‑plank trout caught at Utah Lake, smoky barbecue ribs with paprika rub, and classic chili—and they
    possess solid intermediate cooking skills that shine during community potlucks where they often bring their famous biscuit‑topped casserole.
  core: Donald Dalton is a pragmatic, competition‑driven tradesperson who balances meticulous work with impulsive social thrills, from drywall mastery to midnight trivia, and they chase retirement stability
    through modest entrepreneurship.
background:
  cultural: Donald grew up in the intermountain West as the son of a modest, working‑class family in Utah. Raised in a predominantly white community with strong Latter‑Day Saints cultural influences, he
    internalized values of self‑reliance, family cohesion, and community service. The region’s emphasis on practical trades and apprenticeship pathways steered him toward a career in construction after
    completing high school. His long‑term residence in Eagle Mountain and marriage reflect the stable, family‑oriented lifestyle typical of Utah County, where conservative social norms, outdoor recreation,
    and church involvement shape daily life.
