  career_goals: Donald aims to advance to a certified foreman role and eventually launch his own modest residential remodeling business, leveraging his decades of hands‑on experience. He plans to obtain
    an OSHA safety certification, mentor apprentices through local trade programs, and build a reliable client base that will provide financial stability for his family’s retirement. While he appreciates
    the predictability of structured work, he also values the flexibility to take on selective projects that align with his competitive drive and desire for personal autonomy.
