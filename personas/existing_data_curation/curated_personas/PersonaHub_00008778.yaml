persona_description: FLENJ is a vision for a New Jersey where multilingual global citizens collaborate and connect to the world as a result of meaningful world language experiences. The organization believes
  that language educators have a professional responsibility to advocate for world language education, language is a universal connector that facilitates cultural understanding, a multi-lingual society
  fosters diversity, respect for others, and greater opportunities for all children, language learning is an integral part of the American education system, and all students can achieve language proficiency
  when taught by a skilled teacher in a well-architected, standards-embedded program. The organization collects and analyzes evidence of student performance to facilitate effective and reflective teaching
  and high-quality professional development is critical to equip educators with the necessary knowledge and skills to enhance student language learning.
