personas:
  professional: Thien Trinh, a 17‑year‑old aspiring concept artist and narrative designer, merges their talent in traditional sketching, digital illustration with Procreate and Photoshop, and a fascination
    for mythic storytelling into a growing portfolio that fuses surreal landscapes with motifs drawn from their family's folklore, all while navigating a relaxed, often disorganized schedule that privileges
    creative flow over rigid deadlines.
  sports: Thien Trinh follows the Seattle Seahawks and the Seattle Sounders FC with casual enthusiasm, joins a weekend pick‑up soccer league at a local park, and spends Saturday mornings hiking the Rainier
    foothills for photo walks, occasionally dabbling in rock‑climbing at a nearby gym to break up long periods of sitting.
  arts: Thien Trinh curates a personal art universe that blends ambient soundscapes from Brian Eno and Tycho with visual inspirations from H.R. Giger, Studio Ghibli, Alex Ross, and digital surrealist Beeple,
    while devouring graphic novels such as "Saga," "Monstress," and the works of Taiyo Matsumoto, and spends evenings sketching character concepts while listening to lo‑fi beats.
  travel: 'Thien Trinh prefers low‑key, self‑planned trips: they have trekked the misty trails of the Washington Cascades, visited Portland’s indie art fair, dream of wandering Kyoto’s cherry‑blossom temples
    and the ancient temples of Angkor to study mythic art, and plan to budget a solo backpacking journey through Southeast Asia after high school to soak in diverse storytelling traditions.'
  culinary: Thien Trinh’s palate leans toward aromatic noodle soups—sipping broth rich with star‑anise, ginger, and fresh herbs—paired with late‑night matcha‑flavored pastries, while they also enjoy crafting
    simple avocado toast, occasional sushi rolls, and ordering pepperoni pizza during marathon gaming sessions.
  core: Thien Trinh is a dreamy, solitary teen who transforms mythic ideas into digital art, juggling impulsive spending and occasional sleep‑deprived nights while staying emotionally steady and kind‑hearted.
background:
  cultural: Thien is a second‑generation Vietnamese American. His family maintains a bilingual household, celebrating Tet, the Mid‑Autumn Festival, and cooking traditional dishes such as phở and bánh chuối.
    Growing up in Renton, Washington, he blends the vibrant multicultural fabric of the Pacific Northwest with his family's heritage, often drawing inspiration from Vietnamese folk tales, Đông Hồ woodcut
    prints, and the lyrical storytelling of his grandparents. This hybrid cultural lens informs his artistic style and his desire to create work that bridges Asian traditions and contemporary digital media.
attributes:
  skills: '[''traditional sketching'', ''digital illustration (Procreate, Photoshop, Clip Studio Paint)'', ''graphic design basics (Canva)'', ''creative writing (short stories, poetry)'', ''storyboarding'',
    ''basic Python programming'', ''Unity game prototyping'', ''peer mediation'', ''active listening'', ''collaborative project facilitation'']'
  hobbies: '[''sketching and drawing'', ''digital painting'', ''creative writing'', ''reading speculative fiction and mythology'', ''playing narrative-driven video games'', ''photography and photo editing'',
    ''collecting graphic novels'', ''listening to ambient/lo-fi music'', ''experimenting with 3D modeling in Blender'']'
  career_goals: Thien aspires to turn his passion for visual storytelling into a career as a concept artist and narrative designer for indie video games or animation studios. He plans to build a robust
    portfolio that blends contemporary digital aesthetics with motifs inspired by Vietnamese folklore, aiming for admission to a specialized art program or apprenticeship after obtaining his GED. In the
    longer term, he hopes to work freelance, creating illustration commissions, graphic novels, and possibly teaching workshops that encourage other young creators to explore cross‑cultural narratives.
