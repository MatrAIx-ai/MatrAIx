  career_goals: Even though he is approaching retirement, Jason hopes to preserve his craftsmanship by mentoring the next generation, documenting his techniques in a handwritten guide, and perhaps opening
    a small community workshop that offers occasional classes for locals. He also aims to transition to creating custom leather goods for family and close friends, focusing on quality over quantity while
    maintaining a flexible, low‑pressure schedule.
