  career_goals: Though retired from formal employment, Maurice aims to remain actively involved in his community. He plans to mentor emerging engineers and high‑school students through local STEM outreach
    programs, lead a volunteer marine‑conservation initiative focused on preserving Spruce Head’s shoreline habitats, and collaborate with the town council on sustainable infrastructure projects. He also
    aspires to document oral histories of longtime residents for the historical society and stay physically active by continuing his sailing adventures.
