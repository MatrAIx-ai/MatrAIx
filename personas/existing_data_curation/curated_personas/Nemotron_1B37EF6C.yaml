personas:
  professional: A retired civil and structural engineer who now channels his decades-long expertise into community projects, mentoring, and marine conservation, Maurice Acosta blends meticulous project
    planning with a hands‑on approach to boat repair and woodworking.
  sports: An avid fan of the Boston Red Sox, the New England Patriots, and the Boston Celtics, Maurice Acosta maintains fitness by walking the rugged coastal trails, sails weekly with the Spruce Head Yacht
    Club, and joins the local curling league during the winter months.
  arts: A passionate lover of maritime folk music, Maurice Acosta enjoys listening to Stan Rogers and The Clancy Brothers, collects Winslow Homer seascape prints, and volunteers as a set carpenter for the
    Spruce Head Community Theatre, where he builds wooden props and occasionally takes the stage for a cameo.
  travel: Preferring low‑key coastal escapes, Maurice Acosta has cruised the Gulf of Maine, trekked Acadia National Park, and visited the historic fishing villages of Cornwall, while dreaming of sailing
    the fjords of Norway and driving the scenic routes of the Canadian Maritimes.
  culinary: A self‑taught seafood enthusiast, Maurice Acosta often prepares grilled sardines with fennel and lemon, hearty New England clam chowder using heritage potatoes, and heirloom tomato salads dressed
    with freshly chopped basil and extra‑virgin olive oil.
  core: Maurice Acosta is a structured yet easy‑going retired engineer who sails, mentors, tinkers with wooden furniture, and occasionally forgets to take his medication on busy days.
background:
  cultural: Maurice grew up in the tight‑knit coastal villages of Maine, where generations of families have relied on the sea for livelihood and identity. While ethnically white with deep Anglo‑American
    roots, his family also carries a heritage of early 20th‑century Irish immigration, which adds a layer of storytelling and community tradition to his upbringing. The culture of Spruce Head emphasizes
    self‑reliance, neighborly cooperation, and a reverence for the natural environment. These values have shaped Maurice’s practical outlook, his commitment to community service, and his appreciation for
    maritime heritage.
