  career_goals: Analiza aspires to become a senior assessor or lead a regional assessment office within Hidalgo County, where she can influence policy to promote equitable property taxation, especially
    for low‑income and minority residents. She aims to obtain the Certified Property Appraiser credential and pursue a master's degree in urban planning or public policy to deepen her understanding of land‑use
    dynamics. Long‑term, she envisions developing a data‑driven platform that enhances transparency in property assessments and mentoring aspiring appraisers from underrepresented backgrounds.
