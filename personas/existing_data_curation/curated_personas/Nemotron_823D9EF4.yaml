    Cooking'']'
  career_goals: Mohammad aims to transition into a senior training or supervisory role within the next two years, becoming a certified bus driver trainer and route supervisor who can lead safety workshops,
    mentor new drivers, and champion stress‑management programs. He also wants to influence his transit agency’s adoption of greener bus technologies, such as electric or hybrid fleets, by participating
    in pilot projects and collaborating with local transportation planners. After retirement, he envisions consulting on regional transit planning and serving on community advisory boards to improve mobility
    for seniors and rural residents.
