personas:
  professional: Dwaine Hagins, a master carpenter with over two decades of experience in residential framing, custom cabinetry, and historic home restoration, combines meticulous project budgeting and blueprint
    interpretation with a curious, artistic flair that shows up in decorative carving, while their organized, compassionate nature shines through mentoring apprentices and delivering client‑focused solutions.
  sports: Dwaine Hagins stays active by playing weekly recreational basketball at the local community center, follows the Atlanta Hawks and Atlanta United, and hikes the Chattahoochee River trails in the
    spring, integrating regular cardio and strength workouts into a balanced fitness routine.
  arts: Dwaine Hagins immerses in the Atlanta blues and jazz scene, frequenting venues like the Blind Pig and Apache Café while admiring musicians such as B.B. King and modern jazz pianist Robert Glasper,
    and captures historic architecture through photography inspired by artists like Jacob Lawrence and Gordon Parks, weaving these influences into his decorative woodwork.
  travel: Dwaine Hagins prefers meticulously planned road trips, having explored the Blue Ridge Mountains and New Orleans for its jazz heritage, and dreams of visiting Santa Fe to study southwestern adobe
    architecture, balancing limited vacation days with a love for both adventure and cultural immersion.
  culinary: Dwaine Hagins enjoys cooking traditional Southern fare such as fried chicken, collard greens, and shrimp‑and‑grits, often incorporating heirloom tomatoes and smoked paprika from his garden,
    and experiments with wood‑smoked flavors in his dishes, showcasing a moderate culinary skill level that delights friends and family.
  core: Dwaine Hagins is a methodical master carpenter who blends sustainable craftsmanship with a deep love for blues, jazz, photography, and community mentorship, while juggling a busy schedule, occasional
    over‑working, and a passion for gardening.
background:
  cultural: Dwaine grew up in a close‑knit African‑American community in Fulton County, Georgia, where church gatherings, family storytelling, and communal support shaped his values. His family’s roots
    trace back to the Great Migration, bringing a blend of Southern traditions and urban resilience. The cultural emphasis on craftsmanship—historically seen in woodworking, quilting, and musical instrument
    making—fostered his appreciation for creating beautiful, functional objects. Cultural celebrations, gospel music, and Southern cuisine are integral parts of his life, reinforcing a sense of identity
    and communal responsibility. This heritage informs his compassionate approach to work, his dedication to mentoring younger generations, and his desire to embed cultural motifs into his woodworking projects,
    preserving and honoring Black Southern artistry.
