  hobbies: '[''Blues and Jazz Music'', ''Photography'', ''Reading Art and Design History'', ''Gardening'', ''Volunteering with Habitat for Humanity'', ''Hiking and Nature Exploration'', ''Recreational Basketball'',
    ''Cooking Southern Cuisine'']'
  career_goals: Dwaine aims to open a boutique woodworking studio in the Atlanta suburbs that blends functional design with African‑American cultural motifs, providing a space for both custom commissions
    and community workshops. He plans to obtain a Master Carpenter certification to solidify his professional credibility and to expand his sustainable building practices. A long‑term ambition is to develop
    a mentorship program for at‑risk youth, partnering with local schools and Habitat for Humanity to teach trade skills and foster teamwork. He also hopes to collaborate with local artists on public art
    installations that celebrate his heritage and to eventually author a guidebook on integrating traditional Southern craftsmanship with contemporary design.
