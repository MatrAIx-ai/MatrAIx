persona_description: A teacher who aims to enhance their students' cross-cultural communication skills through teaching methods that incorporate various conversational situations and role-playing. They
  are interested in teaching strategies and methods to educate children on communication issues and their causes, and are familiar with cultural differences and communication styles. They are experienced
  in teaching business communication and have a deep understanding of silence, feedback, register, distance, culture shock, and non-verbal communication. They are passionate about teaching and have a strong
  desire to improve their students' communication abilities.
