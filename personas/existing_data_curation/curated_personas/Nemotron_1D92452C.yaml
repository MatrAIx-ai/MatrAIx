personas:
  professional: Mallory Smith, a ten‑year‑old aspiring game developer and comic‑style illustrator, channels a blend of sci‑fi curiosity and practical organization into building Minecraft mods and Scratch
    programs while meticulously sketching characters in their ever‑filled sketchbook, and they eagerly share these creations with friends during school breaks.
  sports: Mallory Smith plays forward for the local Columbus Crew SC youth soccer team, enjoys weekend pick‑up matches at the Scioto Mile park, and proudly cheers for the Cleveland Browns and Ohio State
    Buckeyes during football season.
  arts: Mallory Smith immerses in the worlds of JK Rowling and Rick Riordan, sketches comic characters inspired by Stan Lee’s dynamic panels, constructs elaborate LEGO cities, and decorates cupcakes with
    the same color‑theory precision they picked up from watching YouTube craft creator Rosanna Pansino.
  travel: Mallory Smith loves exploring Columbus’s Scioto River trail and Hocking Hills State Park on family outings, dreams of visiting the Wizarding World at Universal Orlando, and hopes to someday trek
    the ancient ruins of Machu Picchu after mastering their reading list.
  culinary: Mallory Smith enjoys baking vanilla cupcakes with buttercream frosting and rainbow sprinkles alongside their mother, experiments with crushed Oreos for extra crunch, and proudly prepares a quick
    grilled cheese after school, though they sometimes burn the edges when distracted by an unfinished Minecraft build.
  core: Mallory Smith is a ten‑year‑old imagination engine who balances a love for structured creativity—like LEGO kits and sketchbooks—with a restless curiosity that fuels endless gaming worlds, yet their
    worry‑prone nature often turns bedtime negotiations into nightly drama.
background:
  cultural: Mallory’s cultural background is rooted in a middle‑class, white Midwestern family living in Columbus, Ohio. Her parents grew up in the region and maintain traditions such as celebrating Thanksgiving
    with a community potluck, decorating for Christmas, and attending local Fourth of July fireworks. The family participates in community activities like the Girl Scouts and the neighborhood library’s
    reading program, reflecting the region’s emphasis on community service and education. While her household is primarily secular, they occasionally attend a local Methodist church, where values of kindness,
    cooperation, and humility are reinforced. The cultural environment blends suburban Ohio customs with exposure to diverse neighborhoods in Columbus, giving Mallory a broad but locally grounded worldview.
