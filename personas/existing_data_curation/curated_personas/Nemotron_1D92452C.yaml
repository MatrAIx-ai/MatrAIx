  career_goals: Mallory dreams of a career where she can help living beings and solve practical problems. She is fascinated by animals and imagines herself as a veterinarian who cares for pets and wildlife,
    motivated by her experiences caring for her own dog. She also expresses interest in becoming a science teacher, hoping to inspire curiosity in younger students. Her goals are shaped by a desire for
    a stable, respected profession that allows her to use her practical problem‑solving skills and her natural kindness. While she sometimes worries about the length of study required, she sets small milestones
    like winning her school’s science fair and learning more advanced biology in middle school.
