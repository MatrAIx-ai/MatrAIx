  hobbies: '[''Intramural Soccer'', ''Dance Classes'', ''Community Association Volunteering'', ''Home Staging'', ''Potluck Hosting'', ''Reading Business & Real‑Estate Books'', ''Podcast Listening'', ''Hiking'',
    ''Photography'']'
  career_goals: Leslie aims to earn her real‑estate license within the next year and pursue the Certified Property Manager (CPM) designation. In the short term, she wants to move from an assistant role
    to a full‑time leasing agent or junior property manager, taking on larger portfolios and improving occupancy rates. Long‑term, she envisions becoming a senior property manager overseeing multifamily
    complexes and eventually launching her own property‑management firm that emphasizes sustainable practices and affordable housing. She also plans to complete a bachelor's degree in Business Administration
    or Real Estate Management and, later, a master's in Business Administration to broaden her strategic leadership capabilities.
