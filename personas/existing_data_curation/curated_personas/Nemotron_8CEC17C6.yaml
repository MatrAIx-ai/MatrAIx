personas:
  professional: Gabriela Schatzman, a budding LEGO architect, channels her love of order into designing intricate builds, follows instructions with precision, and dreams of future careers in engineering
    where they can apply methodical problem‑solving skills.
  sports: Gabriela Schatzman, a member of the local swim club who follows a set Tuesday‑Thursday practice schedule, cheers for the nearby Cityville Cubs baseball team, and spends recess dribbling a basketball
    with a small group of friends, reflects an organized yet low‑key enthusiasm for team and individual athletics, and they cheer quietly from the sidelines.
  arts: Gabriela Schatzman, who delights in drawing mandalas and geometric patterns while listening to Beethoven’s 'Moonlight Sonata' and the whimsical Disney soundtrack from 'Frozen', spends afternoons
    sketching precise designs and practicing piano scales before bedtime, blending structured creativity with classic musical influences, and they often hum the tunes while drawing.
  travel: Gabriela Schatzman, who loves planning trips with colorful maps, has visited the Jacksonville aquarium and the historic forts of St. Augustine with her family, and dreams of exploring the Smithsonian
    museums in Washington, D.C., while preferring short, well‑structured stays that fit their predictable routine, and they eagerly mark each destination on a map.
  culinary: Gabriela Schatzman, who favors neatly arranged meals such as mac and cheese paired with carrot sticks, enjoys assembling fruit kebabs with grapes, strawberries, and banana slices, and they can
    flawlessly follow a simple butter‑cookie recipe alongside an adult, yet occasionally sneak extra chocolate chips when no one watches.
  core: Gabriela Schatzman, a seven‑year‑old who thrives on order, transforms quiet hobbies into miniature masterpieces, and balances a disciplined routine with an occasional sweet‑tooth slip, showing they
    can blend focus with fun.
background:
  cultural: Gabriela grows up in a white, Midwestern family in Dayton, Ohio. Her parents trace their ancestry to German immigrants, and the household occasionally honors traditions such as baking pretzels
    for Oktoberfest and enjoying seasonal holiday meals. The family celebrates mainstream American holidays—Thanksgiving, Christmas, and Independence Day—while emphasizing Midwestern values of punctuality,
    community service, and a strong work ethic. She attends a public elementary school that highlights cultural diversity through multicultural events, giving her exposure to a broader range of customs.
