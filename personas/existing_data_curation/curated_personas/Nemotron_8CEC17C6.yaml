  career_goals: Gabriela dreams of becoming an elementary school teacher, where she can create structured, supportive learning environments for small groups of children. She is also fascinated by animals
    and envisions a future as a veterinarian, attracted by the clear, step‑by‑step care process. In the longer term, she imagines combining her love of order and learning by working as a school librarian,
    curating an organized space that nurtures curiosity and reading.
