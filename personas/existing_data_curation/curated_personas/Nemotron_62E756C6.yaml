  hobbies: '[''Gardening'', ''Nature walking and trail photography'', ''Reading mystery novels'', ''Quilting'', ''Knitting'', ''Listening to classic rock music'', ''Volunteering at food pantry'', ''Cooking'',
    ''Journaling'', ''Vintage‑car restoration (future hobby)'']'
  career_goals: As she approaches retirement age, Roxann aims to transition from full‑time driving to a mentorship and safety‑training role within her company, leveraging her decades of experience to help
    younger operators achieve high safety standards. She hopes to earn a company‑wide safety award for her spotless record and to obtain a certification as a driver trainer. In the longer term she envisions
    starting a small vintage‑car restoration hobby business with her husband and writing a memoir about life on the road to share the lessons she has learned about resilience and practical problem‑solving.
