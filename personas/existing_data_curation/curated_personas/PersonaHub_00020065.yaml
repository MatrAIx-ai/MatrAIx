persona_description: A pediatric oncologist who specializes in the treatment of medulloblastoma in young children, particularly those under the age of 7. The oncologist is interested in exploring the use
  of lower doses and reduced volume of craniospinal therapy (CSI) for this age group. The oncologist is looking for a de-escalation strategy to minimize late cognitive effects while ensuring the best possible
  outcomes for the patients. The oncologist is also interested in evaluating the molecular subgroup of medulloblastoma patients to determine the appropriate treatment dose.
