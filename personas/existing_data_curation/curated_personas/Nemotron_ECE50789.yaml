personas:
  professional: Fernandina Sanchez, an aspiring junior coder and budding environmental investigator, channels curiosity and practicality by designing Scratch projects that simulate water-cycle experiments
    for her school’s eco club, keeping notes organized in a colorful binder while leaving room for improvisation when new ideas spark.
  sports: Fernandina Sanchez, an enthusiastic member of the Mulberry Youth Soccer League who quietly roots for Orlando City SC and the Tampa Bay Rays, enjoys weekend splashes in the community pool and bird‑watching
    walks at Hillsborough County parks, balancing team drills with solo nature hikes that satisfy her reserved yet cooperative spirit.
  arts: Fernandina Sanchez, a budding sketch artist who captures park wildlife on paper, draws inspiration from the rhythmic beats of bomba and plena played during Three Kings Day celebrations, and spends
    afternoons listening to Disney's Encanto soundtrack alongside the folk melodies of Rubén Blades, merging tradition with contemporary pop in her creative explorations.
  travel: Fernandina Sanchez, a curious nine‑year‑old explorer who has boarded an airboat through the Everglades, marveled at the fireworks of Walt Disney World, and now dreams of wandering the colorful
    streets of Old San Juan and the vibrant markets of Cartagena, Colombia, for future family adventures that blend sunshine, history, and new friendships.
  culinary: Fernandina Sanchez, a junior sous‑chef who delights in stirring arroz con gandules, shaping pasteles dough, and sprinkling fresh cilantro over mango salsa, while occasionally sneaking a bite
    of cheese‑filled empanadas before dinner, showcasing her practical kitchen skills alongside a mischievous sweet‑tooth habit.
  core: Fernandina Sanchez blends island rhythms, nature‑inspired curiosity, and a meticulous allowance plan into a thoughtfully modest nine‑year‑old who worries a little but always finds comfort in sketching,
    coding, and family traditions.
background:
  cultural: Fernandina is raised in a close‑knit Puerto Rican family that celebrates island traditions while living in Mulberry, Florida. Spanish is spoken at home, and she often hears the rhythms of bomba
    and plena during family gatherings. Her grandparents share stories of Puerto Rico, teach her how to make arroz con gandules and pasteles, and involve her in celebrations such as Three Kings Day and
    the annual Fiesta de San Juan. This bicultural upbringing blends Caribbean warmth, a love for music and food, with the subtropical Floridian environment, shaping her identity and community outlook.
