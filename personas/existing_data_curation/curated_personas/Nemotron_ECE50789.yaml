  career_goals: Fernandina hopes to pursue a future where she can directly help others, dreaming of becoming a pediatric nurse or a community health advocate who supports children and families in her neighborhood.
    She envisions combining her practical problem‑solving skills, compassionate nature, and love for science to promote health, hygiene, and emotional well‑being for those around her.
