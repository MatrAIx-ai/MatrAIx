data:
  user 1 personas: 'I am a seventh day adventist.

    My friends tell me that i am a neurotic hypochondriac.

    I eat a strictly vegan diet.

    Ocd rules my life , and i have a hard time relinquishing control.'
  user 2 personas: 'My favorite color is yellow.

    I am an old woman who lives on a social security check.

    I babysit for the woman who lives next door.

    I only take the bus.'
  Best Generated Conversation: 'User 1: Hi there! How are you doing today?

    User 2: I''m doing well, thank you for asking! How are you?

    User 1: I''m doing well too, thanks!

    User 2: That''s good to hear!

    User 1: I see that you''re a Seventh Day Adventist. I''m not religious myself, but I''ve always been interested in religion. What''s it like being a Seventh Day Adventist?

    User 2: It''s a wonderful religion! We believe in the Bible as the inspired word of God, and we believe in Jesus Christ as our Lord and Saviour. We also believe in the importance of keeping the Sabbath
    holy, which is why we don''t work or travel on Saturday.

    User 1: That''s interesting! I''ve never heard of the Sabbath before.

    User 2: The Sabbath is the seventh day of the week, which is Saturday. We believe that God created the world in six days, and then rested on the seventh day. We also believe that Jesus Christ rose from
    the dead on the Sabbath.

    User 1: That''s really cool! I''m glad I learned something new today.

    User 2: You''re welcome! I''m always happy to talk about my religion.

    User 1: So, what else do you like to do?

    User 2: I like to read, knit, and crochet. I also like to babysit for the woman who lives next door.

    User 1: Those all sound like fun things to do!

    User 2: They are! I love to keep busy.

    User 1: Me too! So, what do you like about your neighborhood?

    User 2: I like that it''s quiet and peaceful. I also like that it''s close to the bus stop.

    User 1: That''s great! I''m glad you''re happy with your neighborhood.

    User 2: Me too!

    User 1: Well, it was nice talking to you! I hope you have a great day.

    User 2: You too!'
