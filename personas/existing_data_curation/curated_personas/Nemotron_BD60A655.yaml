personas:
  professional: Nelson Villada, a budding junior scientist with a knack for turning LEGO creations and backyard rock collections into tiny experiments, blends boundless curiosity with practical organization
    to explore the world around them.
  sports: Nelson Villada, a spirited participant in the neighborhood soccer league with the City Cubs U‑6 team, also cheers for the hometown Thunder FC, and balances structured practice with spontaneous
    park games, showing an organized yet flexible attitude toward fitness.
  arts: Nelson Villada, who spends afternoons sketching vibrant scenes inspired by traditional folk music and admiring the lively sounds of the mariachi ensemble Los Alegres, also delights in picture books
    by Dr. Seuss and builds colorful LEGO worlds, illustrating a playful and culturally infused artistic spirit.
  travel: Nelson Villada, eager to explore beyond the backyard, has visited the nearby science museum and the Grand Canyon on family trips, and dreams of trekking the coral reefs of the Great Barrier Reef,
    favoring hands‑on experiences over long flights, though budget constraints keep their adventures mostly local.
  culinary: Nelson Villada, who enjoys helping in the kitchen by mashing ripe avocados into guacamole, rolling soft corn tortillas, and sprinkling cheese on a chicken quesadilla, shows a budding chef’s
    enthusiasm for fresh ingredients like cilantro, lime, and mild salsa while still preferring the occasional pizza slice.
  core: Nelson Villada, a curious six‑year‑old who balances imaginative LEGO constructions with a habit of misplacing their favorite blue crayon, embraces kindness, yet sometimes gets lost in daydreams
    during chores.
background:
  cultural: Nelson is raised in a Mexican household in Huntsville, Alabama. Spanish is spoken at home, and his family celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Las Posadas
    with traditional foods like tacos, tamales, and homemade salsa, as well as music and storytelling. He also participates in local Southern traditions, attending community festivals, school events, and
    enjoying Southern cuisine. This blend of Mexican heritage and Southern community life gives him a bilingual advantage, a strong sense of family, and an appreciation for both cultural identities.
attributes:
  skills: '[''basic reading and phonics'', ''counting to 100'', ''simple addition'', ''building with LEGO and blocks'', ''following multi-step classroom instructions'', ''basic Spanish conversational phrases'',
