  hobbies: '[''reading picture books'', ''building LEGO sets'', ''playing soccer'', ''drawing and painting'', ''listening to mariachi music'', ''learning Spanish songs'', ''exploring nature and collecting
    rocks and leaves'', ''solving puzzles and board games'', ''helping with simple cooking'']'
  career_goals: Nelson’s big dreams are shaped by his love of space, helping others, and sharing his culture. He often talks about becoming an astronaut who can explore the stars, an engineer who designs
    cool inventions, or a bilingual teacher who can teach both Spanish and English to classmates. He also imagines being a firefighter to protect his community. These goals reflect his curiosity for new
    ideas, practical desire to solve problems, and his caring nature.
