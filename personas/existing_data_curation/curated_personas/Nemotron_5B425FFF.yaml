  hobbies: '[''Digital Drawing'', ''Sketching'', ''Reading Science Fiction'', ''Playing Video Games (Strategy/Adventure)'', ''Hiking in Trabuco Canyon'', ''Playing Guitar'', ''Creative Writing'', ''Attending
