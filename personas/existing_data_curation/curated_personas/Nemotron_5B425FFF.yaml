personas:
  professional: Dwayne Webb is an aspiring game designer and robotics hobbyist who leverages their vivid imagination and analytical mind to prototype narrative-driven gameplay mechanics while staying organized
    enough to meet school project deadlines, and their competitive edge drives them to excel in regional robotics tournaments.
  sports: Dwayne Webb enjoys weekend hikes through Trabuco Canyon, follows the Los Angeles Lakers and Anaheim Ducks fervently, participates in the middle school track club during spring, and treats fitness
    as a flexible hobby rather than a regimented routine, though their competitive nature pushes them to improve lap times.
  arts: Dwayne Webb spends countless afternoons sketching characters inspired by Studio Ghibli, Hayao Miyazaki, and the graphic novels of Jeff Smith, while learning electric guitar songs by Muse and crafting
    original indie tracks, blending a love for fantasy literature with a relentless drive to experiment across digital painting, comic scripting, and LEGO model building.
  travel: Dwayne Webb prefers spontaneous road trips to coastal state parks like Big Sur and organized visits to sci‑fi conventions in Seattle, balancing a love for stargazing under dark skies with the
    practical limits of school schedules and parental budgeting, while dreaming of a future backpacking trek through Iceland to chase the Northern Lights.
  culinary: Dwayne Webb favors quick meals like spicy ramen topped with soft‑boiled eggs and a dash of chili oil, enjoys crafting homemade pepperoni pizza with fresh mozzarella, and often snacks on trail
    mix containing almonds, dried cranberries, and dark chocolate while sketching, though they rarely venture beyond pizza and ramen without prompting.
  core: Dwayne Webb is a fiercely imaginative teen who juggles art, robotics, and gaming with a competitive streak, a skeptical eye for spending, and a habit of losing track of time while drawing under
    the stars.
background:
  cultural: He was raised in Trabuco Canyon, a suburban community in Orange County, California, within a middle‑class white American family. The region's blend of coastal and inland Southern Californian
    culture, with easy access to natural parks, beaches, and a diverse population, has shaped his appreciation for outdoor recreation, environmental awareness, and multicultural artistic influences. His
    family celebrates traditional American holidays while also embracing the multicultural diversity of the surrounding community, exposing him to a range of perspectives that encourage openness and creativity.
