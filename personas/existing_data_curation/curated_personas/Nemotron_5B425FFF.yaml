  career_goals: Dwayne aims to pursue a career that blends his artistic imagination with technology. He hopes to attend a specialized high school focused on visual arts and computer science, then study
    interactive media, game design, or concept art at university. His long‑term ambition is to become a concept artist and game developer, creating immersive worlds for video games or animated films. He
    also dreams of publishing a graphic novel and possibly launching an independent indie game studio. He plans to build a strong portfolio through school projects, art competitions, and personal coding
    experiments.
