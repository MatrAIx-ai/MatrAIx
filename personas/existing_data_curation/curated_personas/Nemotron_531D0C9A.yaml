  hobbies: '[''Desert hiking'', ''Landscape photography'', ''Watercolor painting'', ''Acoustic guitar'', ''Open‑mic performances'', ''Yoga'', ''Community mural volunteering'', ''Reading design magazines'',
    ''DIY home woodworking'', ''Sustainable living'']'
  career_goals: Mervat aspires to become a certified green‑building painter and eventually launch her own boutique painting and paper‑hanging business focused on eco‑friendly materials in the Inland Empire.
    She plans to complete a state‑licensed contractor program, earn credentials in low‑VOC and zero‑VOC coatings, and build a reputation for high‑quality, client‑centered service. In the medium term she
    hopes to expand into residential interior design consulting, offering coordinated color schemes and sustainable finish options. Long‑term she sees herself mentoring apprentices and contributing to community
    renovation projects.
