personas:
  professional: Cheri Bennett, a seasoned housekeeping specialist with deep cleaning expertise and meticulous organization, leverages their compassionate nature and practical curiosity to lead a senior‑living
    cleaning team while pursuing Certified Professional Housekeeper credentials and an associate degree in hospitality management.
  sports: Cheri Bennett enjoys gentle yoga, long walks on the Natchez Trace Trail, and avidly cheers for the Nashville Predators and the Tennessee Titans while participating in a local walking club that
    meets twice weekly, balancing moderate activity with occasional community softball games where they play third base.
  arts: Cheri Bennett finds solace in the church choir where they harmonize classic gospel songs like Mahalia Jackson’s Rise Up while devouring mystery novels by Agatha Christie and self‑help works by Brené
    Brown, and they regularly attend performances at the historic Tennessee Theatre featuring actors such as Michael B. Jordan and musicians like Chris Stapleton.
  travel: Cheri Bennett favors modest road trips to nearby historic towns such as Savannah, Charleston, and Asheville, planning itineraries months in advance to secure affordable B&Bs, yet occasionally
    dreams of a grand pilgrimage to New Orleans for its music scene, balancing a desire for relaxation with a worry about overspending on travel.
  culinary: Cheri Bennett specializes in Southern comfort cuisine, perfecting fried chicken with rosemary‑infused buttermilk, shrimp and grits seasoned with fresh thyme, collard greens slow‑cooked with
    smoked ham hocks, and baking pecan pie topped with caramelized sugar, while also experimenting with Mediterranean twists using oregano and lemon zest from their herb garden.
  core: Cheri Bennett is a meticulous, compassion‑driven housekeeping veteran who balances a chronic worry about the future with a love for gardening, mystery novels, and spontaneous bursts of over‑cleaning
    that can leave even the dust bunnies baffled.
background:
  cultural: Cheri grew up in a small-town Southern family with deep roots in Tennessee, where values of hospitality, faith, and community are central. Raised in a Baptist tradition, she regularly attends
    church, which reinforces her compassionate and cooperative nature. The local culture of Gallatin, with its emphasis on family gatherings, homemade Southern cooking, and respect for hard work, has shaped
    her practical outlook. Exposure to diverse households through her housekeeping work has broadened her cultural awareness and taught her to adapt to various domestic customs while maintaining her own
    Southern identity.
attributes:
  skills: '[''Residential deep cleaning'', ''Commercial housekeeping'', ''Time management'', ''Organization and decluttering'', ''Safe chemical handling'', ''Laundry and fabric care'', ''Basic home maintenance'',
