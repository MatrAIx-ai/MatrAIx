  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Self-help books'', ''Cooking and baking Southern cuisine'', ''Church choir'', ''Volunteering at community center'', ''Gentle yoga'', ''Walking Natchez
    Trace Trail'', ''Quilting'', ''Birdwatching'', "Visiting farmer''s markets"]'
  career_goals: Cheri aims to move from a housekeeping cleaner role to a supervisory position within a senior living facility or boutique hotel, leveraging her cleaning expertise and compassionate nature
    to lead a small team. She plans to obtain a Certified Professional Housekeeper (CPH) credential and complete an associate degree in hospitality management at a community college. Long-term, she dreams
    of launching her own residential cleaning business focused on environmentally friendly practices, providing reliable service to the Gallatin community while creating stable employment for other women
    seeking flexible work. She also hopes to mentor younger workers, sharing practical knowledge and fostering a supportive workplace culture.
