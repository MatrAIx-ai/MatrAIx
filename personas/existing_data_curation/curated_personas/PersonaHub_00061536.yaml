persona_description: An aerospace engineer and space exploration enthusiast who is interested in the history and development of manned lunar rovers, particularly the Northrop Lunar Logistic System designed
  in 1963. They are knowledgeable about the chronology of lunar rover studies and associated manufacturers and agencies, and are interested in the unique features and capabilities of the RV6 carrier designed
  for limited use and emergency cosmonaut transportation. They are also interested in the broader context of lunar rovers, including their size, shape, and purpose, and are likely to be familiar with the
  work of NASA and Northrop in the development of rockets and spacecraft.
