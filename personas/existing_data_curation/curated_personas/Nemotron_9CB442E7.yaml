personas:
  professional: Diego Sanchez, a seasoned landscaping specialist with a knack for low‑water garden design, leverages deep plant biology knowledge, bilingual communication, and improvisational problem‑solving
    to lead crews, yet often wrestles with keeping schedules tight due to their spontaneous nature.
  sports: Diego Sanchez keeps fit by walking daily with the Pine Creek Hiking Club, follows the Dallas Cowboys and Texas Rangers for football and baseball, and joins a seasonal Lakeside Fishing Association
    that meets on weekends.
  arts: Diego Sanchez unwinds to the mellow guitar of John Mayer, the soulful ballads of Lila Downs, and classic western films starring Clint Eastwood, finding these arts echo the patience and craftsmanship
    of their garden work.
  travel: Diego Sanchez prefers low‑key, nature‑focused getaways, often planning weekend road trips to the nearby Sierra Nevada hiking trails or the historic town of Sedona, while saving for occasional
    international adventures to the ancient ruins of Machu Picchu and the lavender fields of Provence.
  culinary: Diego Sanchez excels at preparing tamales with masa corn, slow‑cooked mole sauce enriched with dried chilies and dark chocolate, and freshly grilled lake trout seasoned with rosemary, often
    experimenting with heirloom tomatoes from their garden.
  core: Diego Sanchez blends a pragmatic green‑thumb expertise with a solitary, improvisational spirit, juggling a love for heritage cooking and woodworking while occasionally slipping into last‑minute
    project shuffles and a tendency to overlook routine paperwork.
background:
  cultural: Diego is a first‑generation Mexican‑American whose family migrated to the United States before he was born. Raised in a household where Spanish was spoken daily and Mexican holidays such as
    Día de los Muertos and Cinco de Mayo were celebrated, he carries forward a strong sense of family loyalty and community. While living in Hartsville, South Carolina, he has blended his Mexican heritage
    with Southern traditions—attending church services, enjoying Southern barbecues, and participating in county fairs. This bicultural experience informs his values of hard work, hospitality, and respect
    for both his ancestral roots and his adopted community.
attributes:
  skills: '["Landscape design and layout planning", "Plant identification and health assessment", "Irrigation system installation and troubleshooting", "Heavy equipment operation (riding mower, mini‑excavator)",
    "Hardscape installation (pavers, retaining walls)", "Bilingual communication (Spanish/English)", "Budget‑friendly material sourcing", "On‑site problem solving and improvisation"]'
  hobbies: '["Home vegetable gardening", "Cooking traditional Mexican cuisine", "Fishing at local lakes", "Evening nature walks", "Woodworking (benches, birdhouses)", "Volunteer work at community garden"]'
  career_goals: Diego’s long‑term ambition is to transition from employee to owner‑operator of a small, community‑focused landscaping firm that emphasizes sustainable, low‑water designs. He plans to earn
    a Certified Landscape Technician credential within the next two years to formalize his expertise and gain credibility with larger commercial clients. In the near term, he hopes to be promoted to crew
    foreman, where he can mentor younger workers, introduce eco‑friendly practices, and streamline workflow without sacrificing the hands‑on flexibility he values.
