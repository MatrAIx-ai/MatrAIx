  career_goals: Ata aims to advance to a regional sales manager position within the next three to five years, leading a team of representatives and expanding market share for sustainable product lines.
    He envisions developing training programs that emphasize ethical, compassionate selling and ultimately launching his own consulting firm to help small manufacturers streamline their sales processes.
    Throughout his career progression, he remains committed to fostering inclusive workplace cultures and mentoring emerging talent.
