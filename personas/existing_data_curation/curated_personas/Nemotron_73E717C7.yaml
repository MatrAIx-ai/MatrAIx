  career_goals: Rosie envisions a future where she can combine her love for art and science. She aspires to become an aerospace engineer or a scientific illustrator, creating visually compelling educational
    materials about space and technology for other curious kids. She also dreams of working as a museum exhibit designer, using her storytelling skills to make complex concepts accessible. Long‑term, she
    hopes to lead community workshops that encourage children to explore creativity and critical thinking, and she thinks about launching a blog or YouTube channel to share her projects.
