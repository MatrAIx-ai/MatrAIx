personas:
  professional: Rosie Edmonds, a budding robotics enthusiast and Scratch programmer, leverages their methodical planning and fierce curiosity to design elaborate competition‑ready bots, while their competitive
    streak pushes them to out‑engineer peers in the after‑school robotics club.
  sports: Rosie Edmonds, a dedicated member of the middle‑school swim team and a weekend participant in local youth soccer leagues, cheers for the Tampa Bay Buccaneers and follows the Pensacola Blue Wahoos,
    while favoring upbeat rehearsals of gymnastics floor routines that satisfy their competitive nature.
  arts: Rosie Edmonds, an avid sketcher of fantastical beasts and a piano hobbyist, draws inspiration from gospel choirs heard on Sunday mornings, the improvisational flair of Miles Davis, and the pop hooks
    of Ariana Grande, often mixing these influences into doodles and improvised piano pieces during quiet evenings.
  travel: Rosie Edmonds, who loves planning trips with a blend of curiosity and budget awareness, has explored the historic forts of St. Augustine, dreamed of sailing to Key West, and longs to visit the
    Smithsonian’s National Air and Space Museum, while always packing a sketchbook for on‑the‑go inspiration.
  culinary: Rosie Edmonds, a fan of Southern Gulf flavors, enjoys devouring shrimp po'boys with Cajun seasoning, collard greens seasoned with smoked turkey, and spicy jambalaya, yet their kitchen skill
    is limited to assembling simple cheese‑tortilla roll‑ups and assisting mom in mixing batter for a Sunday cornbread.
  core: Rosie Edmonds channels a vivid imagination and competitive drive into building intricate LEGO worlds and robotics, while their penchant for worry, love of gospel rhythms, and flair for sketching
    create a uniquely energetic yet introspective 11‑year‑old.
background:
  cultural: Rosie's cultural background is rooted in an African American family that has lived in Pensacola for generations. She was raised with a strong sense of community, attending church services where
    gospel music and storytelling are celebrated. Family gatherings often feature traditional Southern dishes alongside seafood specialties from the Gulf, reflecting the blend of African American and coastal
    Floridian cuisine. Her parents and grandparents emphasize the importance of education and heritage, sharing stories of the civil‑rights movement and celebrating milestones such as Juneteenth and Black
    History Month. These experiences shape her worldview, fostering a respect for cultural history, a love of rhythmic music, and a commitment to giving back to her local community.
