personas:
  professional: Mai Yan, a data‑driven science communicator, leverages Python, R, and Adobe Creative Suite to craft compelling visual narratives for tech audiences, channeling their meticulous organization
    and curiosity into strategic content plans that balance innovative ideas with proven SEO tactics.
  sports: Mai Yan, an avid hiker, spends weekends trekking the Talladega National Forest and joins the Auburn Running Club for 5K runs, while passionately cheering for the Auburn Tigers football team and
    following the NBA’s Boston Celtics for their strategic gameplay.
  arts: Mai Yan, a street photography enthusiast, draws inspiration from the works of Vivian Maier and Sebastião Salgado, captures candid moments at local indie concerts featuring bands like Phoebe Bridgers
    and Tame Impala, and edits short documentaries with a soundtrack of The Strokes’ early albums.
  travel: Mai Yan, a weekend road‑tripper, frequently explores the Blue Ridge Parkway to Asheville’s vibrant art scene, dreams of a solo backpacking journey through Iceland’s volcanic landscapes, and balances
    travel ambitions with a modest budget constrained by student loans.
  culinary: Mai Yan, a self‑taught chef, experiments with Asian‑fusion dishes such as kimchi‑taco bowls and miso‑glazed salmon ramen, relishes the umami of gochujang and shiitake mushrooms, and often hosts
    casual dinner gatherings where friends critique the occasional over‑spiced broth.
  core: Mai Yan fuses data science and visual art into clear storytelling, budgets meticulously yet splurges on gear, balances yoga and hikes for health, and fuels late‑night creativity with coffee, indie
    music, and a dash of spontaneous cooking.
background:
  cultural: Mai is a second‑generation East Asian American, raised in a bilingual household where Mandarin (or Cantonese) was spoken alongside English. Her family maintains traditional celebrations such
    as Lunar New Year and Mid‑Autumn Festival, and passes down culinary traditions like making dumplings and mooncakes. Growing up in Auburn, Alabama, she experienced a blend of Southern hospitality and
    her family’s cultural values emphasizing education, respect for elders, and community cohesion. This bicultural upbringing has given her a nuanced perspective on cross‑cultural communication, allowing
    her to craft messages that resonate with both Western and East Asian audiences. She actively participates in the local Asian cultural association, contributing to multicultural events and serving as
    a bridge between her heritage and the broader community.
