  career_goals: In the next two years, Mai aims to become a senior content strategist for a technology or biotech firm, leading multidisciplinary teams to produce high‑impact scientific storytelling. She
    plans to earn a professional certification in digital marketing and complete a part‑time master’s program in Communication to deepen her strategic expertise. Over the next five to seven years, she envisions
    advancing to a director‑level role, overseeing corporate communications and STEM outreach programs that inspire underrepresented youth. Long‑term, Mai aspires to launch her own media platform dedicated
    to bridging East Asian scientific perspectives with Western audiences, while continuing to mentor emerging communicators and speak at international conferences on data‑driven storytelling.
