  hobbies: '["Competitive video gaming", "LEGO robotics", "Basketball", "Hiking and biking in desert areas", "Mexican cultural cooking", "Traditional folk dancing", "Graffiti art", "Puzzle solving", "Listening
    to music (Latin pop, classic rock)"]'
  career_goals: Wilson dreams of turning his love for gaming into a professional esports career, later transitioning into game design or software engineering where he can create the very experiences he
    enjoys. He also envisions studying robotics or computer engineering in high school and college, aiming to design drones or interactive tech toys. Ultimately, he hopes to launch his own tech startup
    that blends gaming, education, and cultural storytelling, and to mentor other Mexican‑American youth who share his curiosity and competitive spirit.
