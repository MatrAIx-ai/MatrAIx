personas:
  professional: Wilson Suarez is a budding competitive gamer and LEGO robotics enthusiast who applies his tactical reflexes and practical curiosity to devise quick solutions in team‑based esports, while
    his spontaneous nature leads him to shun rigid schedules in favor of on‑the‑fly experimentation.
  sports: Wilson Suarez joins the after‑school Elko Dribblers for pickup basketball, rides with the Desert Trail Club on mountain‑bike trails surrounding the city, and follows the Vegas Golden Knights and
    Los Angeles Lakers, channeling high‑energy competition into both team and solo fitness, though his critical drive occasionally makes him overly aggressive on the court.
  arts: Wilson Suarez fills sketchbook pages with vibrant graffiti art, solves complex jigsaw puzzles, and curates a soundtrack that blends Bad Bunny’s Latin pop beats with Queen’s classic rock anthems,
    letting the eclectic mix fuel his creative bursts, even if it means sacrificing some sleep.
  travel: Wilson Suarez explores the high desert trails around his hometown, plans a future road‑trip along the Pacific Coast Highway for mountain‑bike scenery, and day‑dreams about visiting Tokyo’s Akihabara
    district for its iconic gaming arcades, while his current travel budget confines him to family‑oriented road trips to nearby state parks.
  culinary: Wilson Suarez assists in preparing tacos with corn tortillas, seasoned carne asada, cilantro, onions, and lime, and rolls tamales with masa, pork, and salsa verde, savoring the vivid flavors
    and hands‑on process that echo his LEGO robotics builds, while he tends to snack on leftover guacamole during late‑night gaming.
  core: Wilson Suarez is a calm, competitive 12‑year‑old who fuses gaming tactics, robotics creativity, and vibrant street art into a spontaneous, curiosity‑driven life, balancing teamwork with a penchant
    for impulsive purchases and occasional neglect of routine chores.
background:
  cultural: Wilson is a second‑generation Mexican‑American raised in a bilingual household where Spanish is spoken alongside English. His family celebrates Mexican holidays such as Día de los Muertos, Mexican
    Independence Day, and Christmas with traditional foods, music, and dances, instilling a strong sense of cultural pride. Living in Elko, Nevada, a high‑altitude town known for its ranching and mining
    heritage, he also embraces the frontier spirit of the American West—participating in community events like local rodeos and enjoying the open, rugged landscape. This blend of Mexican familial values,
    bilingual communication, and western community life shapes his calm, resilient demeanor and fuels his curiosity about both modern technology and time‑honored practices.
attributes:
  skills: '["Strategic video gaming", "Basic robotics (LEGO Mindstorms)", "Mechanical tinkering", "Public speaking", "Team basketball", "Critical game analysis", "Bilingual communication (Spanish/English)",
