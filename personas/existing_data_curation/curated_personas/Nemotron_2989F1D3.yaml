  hobbies: '[''Salsa Dancing'', ''Bachata Dancing'', ''Zumba Classes'', ''Recreational Volleyball'', ''Cooking Puerto Rican Cuisine'', ''Community Volunteering'', ''Cultural Festival Participation'', ''Mystery
    Novel Reading'', ''Trivia Night Competitions'', ''Mindfulness Journaling'', ''Yoga'']'
  career_goals: Amanda aspires to transition from cashier to supervisory leadership within retail. In the next two years she plans to earn a shift‑manager certification and complete her associate degree
    in Business Administration at a nearby community college. She aims to become an assistant store manager, mastering staff scheduling, merchandise planning, and loss‑prevention strategies. Long‑term,
    she envisions a store manager position where she can implement innovative customer‑experience initiatives, possibly integrating technology she’s curious about, like mobile checkout and data‑driven inventory.
    Her competitive nature drives her to seek formal retail management credentials (e.g., Certified Retail Management Professional) and eventually explore opening a small boutique that showcases Puerto
    Rican food items and crafts, merging her cultural pride with entrepreneurial ambition.
