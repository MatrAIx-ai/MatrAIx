persona_description: A researcher in the field of grass breeding and perennial grass cultivation, particularly focusing on the development of summer-dormant, perennial grass cultivars in Australia. This
  persona has a deep understanding of the historical background and current state of temperate perennial grass breeding, as well as the potential benefits and challenges of developing summer-dormant grass
  cultivars in response to climate change. They have conducted simulations of summer-dormant grass pastures in both current and predicted climate scenarios, and are currently involved in the breeding and
  commercialization of orchardgrass and tall fescue grass cultivars. This persona has a strong focus on practical application and innovation, and is dedicated to improving the efficiency and profitability
  of summer-dormant grass pastures in Australia.
