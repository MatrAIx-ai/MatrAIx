persona_description: Mario Cardona is a former senior policy advisor for K-12 education on the White House Domestic Policy Council during the Obama administration. He has extensive experience in education
  policy, having previously served as an advisor to senior members of the U.S. Senate and as a research intern for the Massachusetts Secretary of Education. Cardona is a graduate of the University of Texas
  at Austin, the Harvard Graduate School of Education, and the George Washington University Law School. He is currently an attorney in private practice in California.
