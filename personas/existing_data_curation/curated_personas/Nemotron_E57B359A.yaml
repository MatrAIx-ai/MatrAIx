  career_goals: Eddie aspires to transition from an assistant role to a full-time HR Generalist within the next two years, pursuing a bachelor's degree in Human Resources Management and obtaining SHRM-CP
    certification. He aims to lead employee-engagement initiatives that integrate artistic expression, such as workplace art-therapy programs and innovative onboarding experiences. Long-term, Eddie envisions
    becoming an HR Manager or People Operations Partner, shaping organizational culture, driving diversity, equity and inclusion efforts, and mentoring junior HR staff across the Inland Empire region.
