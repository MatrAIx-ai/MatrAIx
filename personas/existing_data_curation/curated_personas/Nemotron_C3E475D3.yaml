  career_goals: Carmen aims to leave a lasting cultural legacy in Moses Lake by establishing a monthly Salvadoran cultural showcase at the local senior center, where she can share food, music, and stories.
    She plans to launch a community garden program that teaches sustainable practices while honoring her heritage’s agricultural roots. She is working on writing and self‑publishing a memoir of her migration
    experience to inspire younger generations. Additionally, she seeks to mentor young Salvadoran immigrants in language, tradition, and navigating life in the Pacific Northwest, and to serve as a cultural
    liaison between the Salvadoran diaspora and local organizations.
