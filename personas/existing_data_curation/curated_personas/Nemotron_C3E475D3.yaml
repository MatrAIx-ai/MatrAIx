personas:
  professional: Carmen Ramirez, a community organizer and bilingual communicator, leverages practical budgeting skills and senior-center dance coordination experience, and they also draw upon deep knowledge
    of traditional cooking to launch a monthly cultural showcase, mentor young immigrant mentors, and author a memoir that preserves their migration story.
  sports: Carmen Ramirez enjoys salsa and cumbia dance classes at the Moses Lake senior center, participates in the local senior pickleball club, follows the Seattle Seahawks and Seattle Mariners avidly,
    and they often walk the lake's perimeter bird-watching to stay active.
  arts: Carmen Ramirez spends afternoons quilting intricate patterns inspired by Faith Ringgold, listening to Celia Cruz, and attending local theater productions featuring Lin-Manuel Miranda, and they use
    these artistic experiences to fuel their creative spirit and community storytelling.
  travel: Carmen Ramirez prefers modest, well-planned trips, often joining group tours to nearby national parks like Mount Rainier, revisiting the San Juan Islands with family, and dreaming of a cultural
    immersion journey to Oaxaca, and they balance limited mobility and a fixed pension while organizing travel arrangements.
  culinary: Carmen Ramirez is an avid home chef who expertly prepares pupusas, tamales, and yuca frita using fresh herbs from their garden, enjoys experimenting with a guajillo-chili glaze on grilled fish,
    and they delight in sharing these dishes at community gatherings, though they can be overly meticulous about seasoning ratios.
  core: Carmen Ramirez blends a lively sociability with a meticulous, sometimes anxious, attention to tradition, constantly juggling community leadership, quilting, cooking, and a fierce competitive streak
    in card games, and they are known for their quick temper when faced with perceived slights.
background:
  cultural: Carmen was born in El Salvador and immigrated to the United States as a young adult, bringing with her the rich traditions of Salvadoran Catholicism, family‑centered values, and a love for community
    celebration. She maintains Spanish as her primary language at home while being fluent in English, allowing her to bridge cultures. Her daily life blends Salvadoran customs—such as preparing pupusas
    for holidays, celebrating Semana Santa, and honoring extended family—with participation in the local Washington community. She actively engages with the regional Salvadoran diaspora, contributing to
    cultural festivals, church events, and intergenerational mentorship, while also embracing the outdoorsy lifestyle of Moses Lake.
