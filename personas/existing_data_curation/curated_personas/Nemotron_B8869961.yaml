  career_goals: Steven aims to solidify his position within his current employer by earning a certified forklift operator credential and completing an OSHA safety refresher course. His primary ambition
    is to move into a lead or shift‑supervisor role, where he can apply his routine‑focused work ethic and people‑centric approach to guide a team while preserving the predictable schedule he values. He
    also envisions establishing a modest weekend side business offering local moving and handyman services, allowing him to leverage his material‑handling expertise while staying close to his community
    and family. Ultimately, his goal is to maintain a stable income that supports his wife and future grandchildren, without sacrificing his health or the flexibility he enjoys in his personal life.
