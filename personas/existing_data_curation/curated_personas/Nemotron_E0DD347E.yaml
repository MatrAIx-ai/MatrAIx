personas:
  professional: Uris Maspoch, a 26‑year‑old carpenter‑designer in San Diego, blends residential framing expertise with fine‑furniture artistry, translating client ideas into custom pieces that fuse Mediterranean
    motifs with California minimalism, while their spontaneous nature sometimes introduces deadline challenges.
  sports: Uris Maspoch plays weekend soccer with the San Diego Recreativa Spanish Expatriate League, follows the San Diego Padres for baseball, surfs at La Jolla Cove during early mornings, and joins the
    local Trail‑Blazers hiking group for Torrey Pines treks, balancing competitive kick‑about with relaxed surf sessions.
  arts: Uris Maspoch spends evenings strolling through the Museum of Contemporary Art San Diego, admiring the vibrant murals at Chicano Park, catching live indie shows at Zum Zum, and draws inspiration
    from artists like Shepard Fairey and musician John Mayer, often sketching furniture concepts on napkins during concerts.
  travel: Uris Maspoch dreams of a study trip to Barcelona’s historic wood workshops and already enjoys weekend getaways to the Monterey Coast, a camping stint in Joshua Tree, and occasional road trips
    along Pacific Coast Highway, favoring budget-friendly Airbnb stays and using local surf camps as base camps.
  culinary: Uris Maspoch excels at home‑cooked paella, crafting a signature seafood paella with saffron, mussels, and mahi‑mahi, while also serving tapas like chorizo‑styled albondigas and patatas bravas,
    and enjoys experimenting with California avocado‑infused gazpacho, though sometimes they over‑season dishes in their culinary zeal.
  core: Uris Maspoch is a creatively restless carpenter who sings folk tunes while sanding wood, impulsively buys new tools, and balances a love for surf, soccer, and experimental paella with the occasional
    back‑ache and budgeting hiccup.
background:
  cultural: Uris was born to Spanish immigrant parents who settled in San Diego before his birth. He grew up in a bilingual household, speaking both Spanish and English, and was immersed in Andalusian traditions
    such as Semana Santa processions and festive family gatherings centered around food and music. His family's workshop heritage—his grandfather was a joiner in Seville—instilled an early respect for craftsmanship
    and the value of hands-on work. While fully integrated into Southern California's multicultural environment, he retains strong ties to Spanish cultural practices, celebrating holidays like Dia de los
    Muertos (blended with local traditions), enjoying flamenco music, and participating in community events organized by the local Spanish cultural center. This blend of Spanish heritage and Californian
    lifestyle shapes his aesthetic sensibilities and collaborative spirit.
