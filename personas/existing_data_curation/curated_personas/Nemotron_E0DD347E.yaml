  career_goals: Uris aims to open his own boutique workshop within the next five years, specializing in handcrafted furniture that blends Spanish Mediterranean motifs with contemporary Californian aesthetics.
    He plans to earn advanced certifications in cabinetmaking and sustainable construction, build a client base that values artistic craftsmanship, and eventually hire a small team of apprentices to mentor.
    He also hopes to travel to Spain to study historic woodworking techniques and incorporate those learnings into his designs. In parallel, he wants to improve his project scheduling skills to meet deadlines
    more reliably.
