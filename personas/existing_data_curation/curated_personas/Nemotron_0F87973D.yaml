personas:
  professional: Mary Ardoin, a retired community volunteer turned senior program coordinator, leverages their precise organizational talent and love for history to design engaging senior reading workshops,
    manage modest library budgets, and mentor newcomers in event planning, all while maintaining a methodical, dependable presence.
  sports: Mary Ardoin, an avid follower of Chicago's baseball and basketball scenes, proudly wears Chicago White Sox caps on spring training days and cheers for the Chicago Bulls during TV games, participates
    in a gentle community walking group that meets thrice weekly at the lakefront as part of the Lakefront Walking Club, and enjoys playing bridge tournaments at the senior center as a strategic mental
    sport.
  arts: Mary Ardoin, a lifelong jazz and blues aficionado, regularly tunes into recordings by Louis Armstrong, Ella Fitzgerald, B.B. King, and modern gospel singer CeCe Winans, attends local performances
    at the historic Chicago Cultural Center, and discusses mystery novels by Agatha Christie and historical fiction by Philippa Gregory with their book club, while also practicing bridge with a regular
    circle of friends.
  travel: Mary Ardoin, who favors modest, well‑planned trips, enjoys relaxing weekend getaways to the historic garden districts of Charleston, revisits family roots in New Orleans during Mardi Gras, and
    dreams of a leisurely cruise to the Bahamas, always arranging travel itineraries in advance and allocating a careful travel budget.
  culinary: Mary Ardoin, an experienced home cook, delights in preparing comfort dishes such as simmered collard greens with smoked ham hocks, baked cornbread with honey butter, and a weekly vegetable stew
    featuring carrots, tomatoes, and beans, while also mastering the art of gingerbread cookie decorating with spices like cinnamon and nutmeg.
  core: Mary Ardoin is a structured, community‑oriented retiree who balances meticulous garden and knitting routines with a love for jazz, genealogy, and steady, low‑risk finances, all while navigating
    the occasional forgetful moment.
background:
  cultural: Mary is a lifelong resident of Chicago's South Side, a descendant of families who migrated north from the rural South during the Great Migration. She grew up immersed in the rich cultural tapestry
    of African-American Chicago, with strong ties to the local church, gospel music, and community solidarity. Her upbringing was shaped by the civil-rights movement of the 1960s, fostering a deep appreciation
    for social justice and collective uplift. Mary's culinary heritage includes traditional soul-food dishes, and she actively participates in neighborhood events celebrating Black history and culture.
    She values intergenerational connections, mentorship, and preserving the stories of her community for future generations.
