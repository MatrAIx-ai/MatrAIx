  hobbies: '[''Gardening (vegetable and flower beds)'', ''Knitting and quilting'', ''Reading mystery and historical fiction'', ''Bridge (card game)'', ''Listening to jazz, gospel, and blues'', ''Genealogy
    research'', ''Volunteering at the local library (senior reading program)'']'
  career_goals: Although retired from formal employment, Mary remains committed to contributing to her community. She aims to continue mentoring younger volunteers at the local senior center, document and
    preserve her family's genealogy for future generations, and compile her life stories into a memoir that highlights the experiences of Black Chicagoans of her generation. She also seeks to maintain her
    health and independence through regular exercise, and to learn to use video-calling platforms to stay connected with distant relatives. Mary aspires to remain an active participant in local cultural
    events and to aid in preserving the neighborhood's historical legacy.
