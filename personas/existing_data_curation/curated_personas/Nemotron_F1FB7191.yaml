  hobbies: '[''Pickup Basketball'', ''Gulf Coast Fishing'', ''Hip‑Hop & R&B Music Listening'', ''Live Concert Attendance'', ''Gym Group Classes (Kickboxing, Circuit Training)'', ''Car Customization'', ''Cooking
    Southern/Family Meals'', ''Community Youth Sports Coaching'', ''Video Gaming (Sports Games)'', ''Local Church Social Events'']'
  career_goals: Willie aims to move into a supervisory role within the next three to five years, targeting a sales supervisor or district manager position in the wholesale sector. He plans to earn a Certified
    Professional Sales Person (CPSP) credential and enroll in evening business courses at a local community college to strengthen his financial and managerial knowledge. His short‑term goal is to expand
    his client portfolio to include regional distributors and consistently exceed his quota, positioning himself for a promotion. Long‑term, he envisions launching his own specialty distribution company
    that leverages his network and his knack for identifying underserved market niches. He also hopes to mentor young professionals from similar backgrounds, demonstrating that success is achievable despite
    limited formal education.
