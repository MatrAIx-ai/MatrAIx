personas:
  professional: Willie Tenny is a proactive wholesale B2B sales representative who combines disciplined CRM territory planning, data‑driven forecasting, and charismatic negotiation to secure high‑margin
    contracts, while using their outgoing demeanor to mentor junior colleagues and nurture community‑focused client partnerships.
  sports: Willie Tenny is a weekend pickup basketball enthusiast who drills at Palmetto Park, a dedicated circuit‑training regular at the local community gym where they attend kickboxing classes, a faithful
    fan of the Orlando Magic and Tampa Bay Buccaneers, and an avid Gulf‑Coast angler who spends early mornings casting for snook and redfish.
  arts: Willie Tenny immerses themselves in contemporary R&B and hip‑hop, regularly streaming Kendrick Lamar, H.E.R., and Leon Bridges while attending live shows at the local amphitheater, and enjoys the
    rhythmic storytelling of community barbershop gatherings where classic soul tracks and spoken‑word performances blend into their cultural soundtrack.
  travel: Willie Tenny favors spontaneous weekend getaways to the Gulf Coast—such as fishing trips to the Florida Keys and soulful road trips to New Orleans—while they plan occasional family visits to hometown
    relatives in Atlanta using budget‑friendly Airbnb stays, balancing low‑cost trips with a desire to experience vibrant music scenes abroad like Kingston, Jamaica.
  culinary: Willie Tenny enjoys cooking soulful comfort dishes—like fried chicken, collard greens with smoked turkey, and Cajun‑spiced shrimp jambalaya—using bold ingredients such as smoked paprika, Scotch
    bonnet pepper, and homemade seasoned butter, while they frequently host backyard barbecues featuring sweet‑potato pie and cornbread, showcasing a confident home‑chef skill set.
  core: Willie Tenny is a disciplined, community‑driven sales dynamo who balances meticulous goal‑chasing with weekend basketball, custom car audio tinkering, and a habit of double‑checking every invoice—often
    to the point of late‑night spreadsheet sessions.
background:
  cultural: Willie is an African‑American who grew up in Palmetto, Florida, within a close‑knit Black community shaped by the legacy of the Great Migration and the multicultural tapestry of central Florida.
    His family’s roots emphasize church involvement, community solidarity, and an entrepreneurial spirit, which have informed his values of hard work and giving back. The blend of Southern hospitality,
    Caribbean influences, and local Gulf Coast culture is reflected in his love for soul food, R&B and hip‑hop music, and social gatherings at barbershops and neighborhood events. Although he did not complete
    formal schooling, his upbringing instilled a strong sense of pride in his heritage and a commitment to self‑improvement, which fuels his ambition to succeed in sales and support his community.
