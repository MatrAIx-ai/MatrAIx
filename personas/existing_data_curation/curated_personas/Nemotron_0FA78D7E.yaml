personas:
  professional: Xavier Maravilla, an 18‑year‑old aspiring software engineer, channels self‑taught Python, HTML/CSS, and the quick pattern recognition honed in League of Legends into prototype indie game
    projects, all while wrestling with a laid‑back attitude toward deadlines that often leads to last‑minute crunches.
  sports: Xavier Maravilla, a skateboarding enthusiast who hangs out at Venice’s skate spot, follows the LA Lakers, LA Dodgers, and LA Galaxy for a dose of team spirit, and squeezes in casual pickup basketball
    games, yet prefers the strategic thrill of esports over structured workouts.
  arts: Xavier Maravilla creates digital fan art and weekly comic strips inspired by street murals, curates playlists mixing Bad Bunny, J Balvin, and classic rock legends like The Rolling Stones, and draws
    heavy influence from comic masters such as Alex Ross while staying skeptical of collaborative projects that might dilute their vision.
  travel: Xavier Maravilla balances spontaneous weekend road trips to Joshua Tree, sunset hangs at Santa Monica Beach, and occasional visits to Guadalajara’s family gatherings with a dream of attending
    Tokyo’s Game Expo and exploring Barcelona’s art districts, all on a shoestring budget and flexible itinerary.
  culinary: Xavier Maravilla enjoys cooking tacos al pastor, guacamole with fresh cilantro, and chiles en nogada on family weekends, showcases moderate kitchen skills while experimenting with ramen broth
    on lazy evenings, and often pairs meals with a side of late‑night snack chips after marathon gaming sessions.
  core: Xavier Maravilla blends a competitive gamer’s mind, a sketch‑pad‑wielding imagination, and a spontaneous skate‑boarding habit with an undercurrent of stress‑driven perfectionism that fuels both
    creative bursts and occasional chaos.
background:
  cultural: Xavier was raised in a close‑knit Mexican‑American family in East Los Angeles. His parents emigrated from Michoacán, and Spanish is spoken at home alongside English, giving him a fluid bilingual
    identity. He grew up participating in neighborhood celebrations such as Cinco de Mayo parades and Día de los Muertos altars, while also absorbing the hip‑hop and skate culture of his city. The blend
    of traditional Mexican values—family loyalty, respect for elders, and communal gatherings—with the individualistic, fast‑paced lifestyle of Los Angeles shapes his worldview, fueling both his pride in
    his heritage and his drive to forge his own path.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic Python programming'', ''HTML/CSS web development'', ''Electronic device troubleshooting'', ''Strategic gameplay analysis'', ''Digital illustration
