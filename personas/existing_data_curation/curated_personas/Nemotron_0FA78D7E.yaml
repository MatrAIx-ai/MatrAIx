  hobbies: '[''Competitive video gaming'', ''Digital fan art and illustration'', ''Skateboarding around LA'', ''Listening to Latin hip‑hop and reggaeton playlists'', ''Cooking traditional Mexican dishes
    with family'', ''Attending cultural festivals (e.g., Día de los Muertos)'', ''Exploring street art and local cafés'', ''Following tech tutorials on YouTube'']'
  career_goals: Xavier is determined to turn his informal technical interests into a formal career. He plans to enroll in an Associate's degree program in Computer Science at East Los Angeles College, aiming
    to transfer to a four-year university to become a software engineer focused on game development or interactive media. His competitive streak drives him to compete in hackathons and local esports tournaments,
    hoping to earn scholarships and internships that will secure his financial independence. Long-term, he hopes to launch an independent game studio or a freelance digital-design business that lets him
    blend his coding and illustration skills while giving him the flexibility to manage his own schedule and mitigate stress.
