personas:
  professional: Sherry Phillip is an aspiring junior robotics engineer who blends her love for artistic storytelling with coding, designing whimsical small machines for her middle school robotics club while
    maintaining a meticulous digital portfolio of prototypes.
  sports: Sherry Phillip plays on the middle school soccer team, joins a youth hiking club for weekend trail runs in Medina County, and follows the Cleveland Browns, the Cleveland Cavaliers, and the Cleveland
    Guardians with the same enthusiasm she brings to her weekly sketching sessions.
  arts: Sherry Phillip channels her curiosity into creating watercolor comic strips and digital illustrations, drawing inspiration from the bold lines of Keith Haring, the whimsical storytelling of Hayao
    Miyazaki, and contemporary installations she discovers during frequent visits to the Cleveland Museum of Art.
  travel: Sherry Phillip favors day trips to Cuyahoga Valley National Park and weekend excursions to Detroit's Eastern Market, dreaming of a future pilgrimage to the Musée d'Orsay in Paris once her family
    saves enough for a budget-friendly student adventure.
  culinary: Sherry Phillip loves experimenting with quick, colorful meals such as avocado toast topped with radish slices, hand-rolling sushi rolls for friends, and blending kale-fruit smoothies to fuel
    her art-filled afternoons.
  core: Sherry Phillip is a curiosity-driven teen who doodles on every scrap of paper, balances robotics code with watercolor comic strips, and compulsively forgets to finish homework before the next art
    project beckons.
background:
  cultural: Sherry grew up in Brunswick, Ohio, a suburban community in Medina County with a predominantly White, middle‑class demographic. Her family values reflect typical Midwestern traits such as hard
    work, modesty, and community involvement. She celebrates traditional American holidays like Thanksgiving and Christmas, often participating in local events and charitable drives. The region’s cultural
    landscape—characterized by a mix of industrial heritage and a growing appreciation for the arts—has exposed her to both practical sensibilities and creative opportunities, shaping her balanced outlook
    on life and fostering her curiosity about diverse ideas and experiences.
