  career_goals: Sherry aims to attend a high‑school program that emphasizes visual arts and technology, eventually pursuing a bachelor’s degree in graphic design, interactive media, or UI/UX design. She
    dreams of combining her artistic eye with her growing technical skills to become a creative director or visual storyteller who crafts engaging digital experiences. While she is open to exploring interdisciplinary
    fields such as museum curation or environmental design, her primary ambition is to work in a role that balances creativity with structured project planning, allowing her to bring innovative ideas to
    life while managing timelines and team collaboration.
