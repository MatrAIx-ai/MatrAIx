persona_description: A professional with expertise in TVET and green skills development, who is actively involved in promoting and implementing transformative actions in the TVET sector to align with the
  Sustainable Development Goals and UNESCO's Education for Sustainable Development 2030 Roadmap. This professional has experience in coordinating actions, developing policy guidance documents, and providing
  technical expertise to support institutional responses to green skills demand. They have a deep understanding of the role of TVET in steering the transition to a low-carbon economy and climate-resilient
  society, and are skilled in embedding sustainability in TVET curricula and training.
