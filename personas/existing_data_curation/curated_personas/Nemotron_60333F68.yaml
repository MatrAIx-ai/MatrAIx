  career_goals: Looking ahead, Jazmon aims to step into senior leadership as a Director of Engineering or Vice President of Operations, where he can steer the development of sustainable products and embed
    digital transformation across the organization. He is committed to championing diversity and inclusion, expanding mentorship programs for underrepresented students, and fostering collaborative cultures
    that value both innovative thinking and proven methods. In the longer term, he envisions establishing a consultancy that advises mid‑size manufacturers on lean practices and renewable‑energy integration,
    while occasionally teaching engineering courses at a local community college.
