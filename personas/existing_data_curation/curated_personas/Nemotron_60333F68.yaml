personas:
  professional: Jazmon Seabrooks is a veteran mechanical engineer and project leader who leverages SolidWorks, ANSYS, and Lean Six Sigma to deliver sustainable manufacturing solutions while mentoring diverse
    talent and championing inclusive engineering cultures.
  sports: Jazmon Seabrooks stays fit by shooting hoops at the local YMCA league, sprinting with the Troy Track Club on Saturday mornings, cheering for the Detroit Pistons and Lions, and occasionally joins
    seasonal pick‑up basketball games at the neighborhood gym to maintain his agility and camaraderie.
  arts: Jazmon Seabrooks nurtures his love for jazz and blues by curating playlists featuring Miles Davis, Ella Fitzgerald, B.B. King, and Stevie Wonder, attending weekly gigs at the Detroit Jazz Festival,
    collecting vintage vinyl, and occasionally dabbling in acoustic guitar to unwind after work.
  travel: Jazmon Seabrooks plans purposeful trips with his wife, favoring well‑researched itineraries that blend historical tours of Washington, D.C., the Civil Rights Trail in Birmingham, and European
    cities like Florence and Berlin, while dreaming of a deep‑dive cultural itinerary in Kyoto that balances museums with quiet garden walks, all while balancing retirement budgeting.
  culinary: Jazmon Seabrooks enjoys cooking soulful Southern dishes such as collard greens simmered with smoked turkey, buttery cornbread, and shrimp étouffée, often seasoning with cayenne, fresh thyme,
    and a splash of hot sauce, while also appreciating fine dining outings that feature farm‑to‑table menus highlighting heirloom tomatoes and locally sourced greens.
  core: Jazmon Seabrooks is a methodical engineer and community mentor whose life revolves around disciplined project work, weekly basketball, vintage vinyl collecting, a habit of checking emails after
    midnight, and a steadfast belief that collaboration fuels innovation.
background:
  cultural: Jazmon is an African‑American who grew up in the Detroit metro area before moving to Troy, Michigan. His family’s roots trace back to the Great Migration, and the values of perseverance, community
    solidarity, and cultural pride were instilled early on. He carries forward the rich traditions of black music—particularly Motown, jazz, and blues—and enjoys cooking dishes that echo his heritage, such
    as collard greens and cornbread. Active in the local church and in professional networks like the National Society of Black Engineers, he mentors young black students and advocates for greater representation
    in STEM fields. His cultural identity shapes his commitment to collaborative success, social responsibility, and creating pathways for the next generation.
