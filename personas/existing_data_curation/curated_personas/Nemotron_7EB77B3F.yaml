  career_goals: She aims to enroll in a community‑college associate program in business administration while taking elective art courses, with the long‑term goal of becoming a retail manager and eventually
    opening a boutique that showcases Guatemalan textiles and contemporary artwork. Julia seeks to earn a retail‑management certification, develop leadership and supervisory skills, and build a freelance
    design portfolio that could supplement her income. Her competitive drive pushes her to pursue promotion within her current store, and her curiosity about cultural heritage inspires plans to travel back
    to Guatemala to collaborate with local artisans and integrate authentic designs into her future shop.
