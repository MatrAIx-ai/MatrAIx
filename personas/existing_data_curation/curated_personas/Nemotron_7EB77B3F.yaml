personas:
  professional: Julia Montenegro, a 22‑year‑old cashier with sharp POS expertise and bilingual fluency, turns quick mental math and creative problem‑solving into smoother checkout lines while eyeing a retail‑management
    certification and dreaming of a boutique that fuses traditional textiles she grew up with and contemporary street‑art.
  sports: Julia Montenegro stays active by practicing yoga three times a week, joins a casual weekend running club at Red Rock Canyon, roots for the Las Vegas Raiders and the Las Vegas Golden Knights, and
    occasionally plays pickup basketball at the community center, balancing solitary wellness with low‑key team spirit.
  arts: Julia Montenegro immerses herself in the neon‑lit mural scene of Las Vegas, sketches walls inspired by the bold graphics of Shepard Fairey and the whimsical forms of Takashi Murakami, edits digital
    illustrations in Photoshop using a palette influenced by the vibrant street‑art of Banksy, and fills free time watching performances by contemporary dancer Ohad Naharin.
  travel: Julia Montenegro dreams of backpacking through the highlands of Central America to collaborate with artisans, while also planning weekend road trips to the Grand Canyon and annual visits to New Mexico’s
    Santa Fe art festivals, balancing a modest student budget with a love for culturally rich, off‑the‑beaten‑path destinations.
  culinary: Julia Montenegro loves to cook family‑style tamales and pepian using masa, roasted pumpkin seeds, and achiote, experiments with spice blends while listening to Tame Impala, and treats herself
    to late‑night sushi rolls or street‑taco stands when inspiration for a new illustration strikes.
  core: Julia Montenegro is a curious, art‑driven cashier who balances competitive ambition with a laid‑back, sometimes disorganized lifestyle, channeling their love for street culture into future boutique
    dreams while juggling impulsive spending and diligent yoga practice.
background:
  cultural: Julia is a second‑generation Guatemalan‑American raised in Las Vegas. Her parents immigrated from the highlands of Guatemala, and she grew up speaking Spanish at home while learning English
    at school, making her fully bilingual. Family traditions such as Día de los Muertos altars, making tamales, and celebrating Semana Santa remain central to her life. She actively participates in the
    local Guatemalan diaspora community, attending cultural festivals and supporting Indigenous artisans. Her artistic sensibility is influenced by the vibrant textiles and folk art of Guatemala, and she
    often incorporates these patterns into her own sketches and digital designs.
