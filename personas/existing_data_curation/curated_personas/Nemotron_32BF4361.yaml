  hobbies: '[''Weekend fishing trips'', ''DIY home improvement projects'', ''Competitive bowling league'', ''Watching Chicago Bears games'', ''First‑person shooter video games'', ''Car maintenance and repairs'',
    ''Barbecue cooking'', ''Model ship building'']'
  career_goals: John wants to move from a laborer to a supervisory role within the next five years. He is working toward an OSHA 30‑hour certification and a forklift‑operator license, both of which would
    qualify him for a foreman position. He dreams of eventually running his own small crew, where he could blend the predictable routine of day‑to‑day work with the flexibility to take on occasional specialty
    projects. Providing a steady income for his wife and future children is his primary motivation, and he is driven to be the most reliable and respected worker on any site, even if the pressure sometimes
    feels stressful.
