personas:
  professional: Karen Franks, a veteran protective service officer in Kingsport, merges their razor‑sharp situational awareness and conflict‑de‑escalation expertise with an imaginative, flexible approach
    to training, crafting off‑the‑cuff drills that keep their team agile even as their own paperwork sometimes ends up in a pile of art supplies.
  sports: Karen Franks tackles the rugged sections of the Appalachian Trail each spring with their local hiking club, roots for the Tennessee Titans on Sundays, squeezes in line‑dancing sessions at the
    community hall for cardio, and flexibly hits the gym for weight‑bearing exercises to keep their osteoarthritis at bay.
  arts: Karen Franks spends evenings dabbling in watercolor studies inspired by Georgia O'Keeffe, shaping clay on their wheel while humming Old Crow Medicine Show tunes, strumming an acoustic guitar with
    the local folk‑music circle, and stepping onto the stage of the Smoky Mountain Amateur Theater to bring Appalachian stories to life.
  travel: Karen Franks favors unscripted road trips along the Blue Ridge Parkway and weekend jaunts to Asheville and New Orleans, using their travel rewards card to splurge on a boutique B&B in Savannah
    while dreaming of a future pilgrimage to the Scottish Highlands to trace the roots of Appalachian ballads.
  culinary: Karen Franks cooks with an intermediate flair, perfecting chicken and dumplings and biscuits with gravy in their hand‑thrown pottery bowls, while occasionally tossing together cauliflower gnocchi
    with pumpkin sage sauce to satisfy their curiosity for novel flavors.
  core: Karen Franks blends a steadfast Appalachian sense of community with a restless imagination, juggling their protective‑service career, artistic hobbies, and a habit of improvising both training drills
    and life plans, even if paperwork sometimes gathers dust.
background:
  cultural: Karen is a white Appalachian woman raised in the hills of East Tennessee, where strong community ties, hospitality, and storytelling traditions run deep. Her family’s roots in the region have
    instilled a respect for Southern customs, church gatherings, and hearty cuisine, while also fostering a love for local folk music and craft. Though grounded in these traditions, Karen’s intellectual
    curiosity pushes her toward novelty and artistic expression, creating a blend of conventional values and progressive, creative outlook that shapes both her personal life and professional approach.
attributes:
  skills: '[''Situational Awareness'', ''Conflict De-escalation'', ''Emergency Response'', ''First Aid & CPR'', ''Firearms Proficiency'', ''Vehicle Patrol Operations'', ''Community Outreach & Engagement'',
