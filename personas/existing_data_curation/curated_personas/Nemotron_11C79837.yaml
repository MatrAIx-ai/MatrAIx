  career_goals: Edward aims to turn his technical interests into a career in cybersecurity or network engineering. He plans to earn industry certifications such as CompTIA A+ and Network+ during the next
    two years, then enroll in a community college program focused on information technology. His long‑term ambition is to work for a federal agency that secures critical infrastructure, where he can apply
    his disciplined, detail‑oriented approach to protect networks. Edward also hopes to continue building expertise through self‑directed projects, eventually becoming a senior analyst who mentors new talent.
