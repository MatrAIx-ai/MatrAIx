personas:
  professional: Lizet Arguello, a 22‑year‑old museum‑studies student and budding curator, leverages their bilingual fluency, Adobe Photoshop and Illustrator expertise, and meticulous yet adaptable project
    coordination style to assist regional museums with Latin American and Caribbean exhibitions, while quietly wrestling with a habit of over‑planning that sometimes fuels their worry.
  sports: Lizet Arguello enjoys solitary fitness pursuits like weekend hikes along the Appalachian Trail sections near the Schuylkill County countryside and early‑morning 5‑kilometer runs with the local
    Schuylkill Striders running club, cheering on the Philadelphia Eagles on Sundays while occasionally catching a Phillies game at Citizens Bank Park during summer.
  arts: Lizet Arguello spends afternoons sketching in a weathered notebook while listening to classic Cuban salsa tracks by Celia Cruz, curates personal photo series inspired by the vibrant street scenes
    of Havana, and finds creative renewal at local galleries showcasing contemporary artists like Kerry James Marshall and Tania Bruguera, often pairing these visits with indie film marathons featuring
    directors such as Jim Jarmusch and Chantal Akerman.
  travel: Lizet Arguello prefers meticulously planned cultural getaways, having already explored the mural‑rich streets of Mexico City and the historic museums of Barcelona on a summer study‑abroad program,
    while saving for a future solo pilgrimage to Havana’s art districts and a weekend retreat in the Vermont Green Mountains, where they can combine low‑key hiking with sketching sessions.
  culinary: Lizet Arguello enjoys honing their intermediate cooking skills by preparing family‑style ropa vieja with simmered flank steak, olives, and capers, complementing it with homemade arroz con gandules,
    while also indulging occasional brunch outings for avocado toast topped with radish and za’atar at a downtown café, and they never shy away from experimenting with fresh cilantro, cumin, and chipotle
    in new recipes.
  core: Lizet Arguello is a quietly ambitious art enthusiast who channels lingering worries into detailed sketchbooks, vintage postcard collections, and nightly budget checks, yet often neglects sleep to
    finish a perfect Photoshop layout.
background:
  cultural: Lizet was raised in a Cuban‑American household where Spanish was spoken at home and Cuban traditions were celebrated year‑round. Family gatherings featured music, dance, and home‑cooked dishes
    that kept her connection to her heritage alive. Growing up in Schuylkill Haven, Pennsylvania, she navigated a bicultural identity, blending the warmth and community focus of Cuban culture with the quieter,
    more individualistic lifestyle of her small‑town environment. This dual perspective fuels her appreciation for diverse artistic expressions and informs her desire to bring Latin American narratives
    into the local arts scene. Her cultural background also underpins her bilingual communication skill set and her commitment to representing under‑represented voices in the arts.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Digital illustration'', ''Photography'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Research and analytical writing'', ''Curatorial assistance'',
    ''Community event planning'', ''Project coordination'', ''Microsoft Office Suite proficiency'']'
  hobbies: '[''Sketching and drawing'', ''Digital photography'', ''Visiting art galleries and museums'', ''Reading contemporary fiction'', ''Listening to Cuban music and salsa'', ''Cooking Cuban cuisine'',
    ''Yoga and mindfulness meditation'', ''Hiking in local nature trails'', ''Writing personal essays/journals'', ''Collecting vintage postcards'']'
  career_goals: Lizet aims to complete a bachelor's degree in museum studies or arts administration, securing internships at regional museums to gain hands‑on curatorial experience. In the medium term,
    she aspires to become a program coordinator or assistant curator focusing on Latin American and Caribbean art, where she can apply her bilingual skills and cultural insight. Parallel to this, she plans
    to build a modest freelance graphic‑design portfolio that provides flexible income while she pursues a stable, full‑time role in a nonprofit arts organization. Ultimately, she hopes to launch community
    workshops that blend visual storytelling with cultural heritage, fostering artistic expression among youth in her hometown.
