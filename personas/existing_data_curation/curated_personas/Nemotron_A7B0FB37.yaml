  career_goals: She dreams of becoming an artist or illustrator, envisioning a future where she can create her own worlds on paper and canvas. Her curiosity also fuels an interest in science, so she imagines
    exploring nature as a young naturalist. She aspires to work independently, valuing solitude and flexibility, and hopes to be recognized for her unique ideas.
