personas:
  professional: Geralyn Jones, a budding naturalist who spends afternoons cataloguing backyard insects and drawing detailed sketches, demonstrates a keen eye for observation and an unstructured, flexible
    approach to learning, channeling their curiosity and competitive drive into solitary exploration rather than organized projects.
  sports: Geralyn Jones, an enthusiastic little fan of the Clemson Tigers football team and the Charleston RiverDogs baseball club, enjoys sprinting backyard races, participates in the Newberry Little Hawks
    preschool soccer program, yet prefers solitary play over organized team drills, channeling their competitive spirit into quick dash contests rather than structured practice.
  arts: Geralyn Jones, a curious young artist who spends rainy afternoons drawing whimsical forest creatures inspired by Appalachian folk art and humming along to the playful tunes of Raffi and the Carolina
    Chocolate Drops, often stages impromptu performances for family gatherings, showcasing their love for quiet creative expression and a penchant for collecting colorful crayons.
  travel: Geralyn Jones, an adventurous four‑year‑old who has explored the historic streets of Charleston, built sandcastles on Myrtle Beach, and marveled at the waterfalls in Great Smoky Mountains National
    Park during a family road trip, dreams of a future visit to Disney World in Orlando while preferring short car rides where they can watch the countryside roll by rather than long flights.
  culinary: Geralyn Jones, a tiny food enthusiast who delights in the smoky taste of pulled pork from family barbecues, the sweet zest of peach cobbler, and the comforting cheesy bite of mac and cheese,
    often helps stir banana pancake batter with a wooden spoon, yet they can be picky, refusing broccoli while demanding extra honey‑drizzled biscuits.
  core: Geralyn Jones, a solitary and curiosity‑driven four‑year‑old who balances intense emotional reactions with a love for quiet backyard exploration, often retreats to sketch insects while clutching
    a beloved stuffed rabbit for comfort.
background:
  cultural: Geralyn is raised in a white Southern family in Prosperity, Newberry County, South Carolina. Her upbringing reflects the region’s close-knit community values, exposure to local traditions such
    as church gatherings, family barbecues, and Southern folk arts. The rural landscape provides frequent opportunities for outdoor exploration, while the cultural emphasis on humility and politeness shapes
    her cautious social demeanor. Despite this, she prefers solitary activities and finds comfort in the quiet rhythm of her small-town environment.
