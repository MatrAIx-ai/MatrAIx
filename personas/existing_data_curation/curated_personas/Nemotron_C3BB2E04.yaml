personas:
  professional: James Oakley, a budding game developer who loves building detailed LEGO creations and coding simple Scratch games, demonstrates a structured yet competitively driven mindset in each project
    they tackle.
  sports: James Oakley, a member of the school's track and field team who specializes in short sprints and long jump, trains with the local youth club Speed Sprinters and follows the Los Angeles Lakers
    and the New York Yankees for inspiration, approaching fitness with a competitive edge yet occasional self-doubt.
  arts: James Oakley, an avid LEGO builder who sees each set as a miniature art project, enjoys listening to the ambient soundtrack of Minecraft by C418, reads the sci-tech series 'The Way Things Work',
    and watches animated films by Studio Ghibli, channeling that creative energy into both digital and tactile creations.
  travel: James Oakley, who dreams of visiting the Lego House in Billund, Denmark, has already explored the local science museum and the nearby state park on family road trips, preferring meticulously planned
    itineraries that balance hands-on learning with enough downtime to recharge after the excitement.
  culinary: James Oakley, a picky eater who favors pepperoni pizza, cheesy macaroni, and chocolate chip cookies, enjoys assembling bite-size fruit snacks that resemble LEGO bricks and can confidently make
    a basic grilled cheese, yet often grabs sugary cereal for quick energy before gaming sessions.
  core: James Oakley blends a love for orderly building and strategic gaming with a fiercely competitive streak, all while navigating intense anxiety that turns small setbacks into monumental challenges.
background:
