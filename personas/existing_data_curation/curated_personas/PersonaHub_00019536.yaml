persona_description: A journalist who covers environmental and geopolitical issues, particularly those related to small transboundary rivers and their disputes between India and Nepal. This person is well-versed
  in the intricacies of water management, water resources, and the dynamics of informal and formal water sharing systems. They are experienced in negotiating and resolving conflicts, and have a keen eye
  for detail in understanding the complexities of small river systems. They are also aware of the broader geopolitical implications of these disputes, and are well-versed in the international legal frameworks
  that govern transboundary water sharing.
