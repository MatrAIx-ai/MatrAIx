personas:
  professional: Angel Wells, a 41‑year‑old eco‑conscious cleaning specialist, leverages meticulous deep‑cleaning expertise, textile care, and an artistic flair for spatial arrangement to launch a boutique
    green‑cleaning and home‑staging service for local artists, small businesses, and senior households in Burlington County, they fuse flexibility and compassionate client communication into every project.
  sports: Angel Wells enjoys low‑impact fitness through morning walks along the Pine Barrens, weekly pickleball matches with the Burlington County Pickleball Club, and occasional weekend hikes in the Hudson
    Valley, while they follow the Philadelphia Eagles and New Jersey Devils as avid spectators, preferring a flexible, unstructured routine that blends casual movement with community engagement.
  arts: Angel Wells immerses themselves in creative expression, sketching watercolor abstracts inspired by Agnes Pelton’s ethereal palettes, listening to Brian Eno’s ambient soundscapes, devouring speculative
    fiction by N.K. Jemisin, and regularly attending exhibitions at the Montclair Art Museum and community theater productions at the Burlington County Playhouse, they weave these artistic influences into
    their daily craft sessions.
  travel: Angel Wells favors eco‑friendly road trips that combine spontaneous detours with modest budgeting, such as weekend drives to the Hudson Valley’s farm‑to‑table festivals, seasonal visits to the
    Pine Barrens’ wildflower blooms, and occasional overseas trips to Copenhagen’s sustainable design districts or Kyoto’s zen gardens, where they stay in community‑run B&Bs and seek local workshops on
    aromatherapy and plant‑based cooking.
  culinary: Angel Wells cooks eclectic meals ranging from roasted vegetable quinoa bowls seasoned with rosemary, lemon, and turmeric to kimchi‑infused bao buns and lavender‑honey glazed salmon, displaying
    a confident home‑chef skill set that blends experimental aromatherapy‑infused teas with a fondness for Mediterranean dishes like spanakopita, while they often improvise with pantry staples when ingredients
    are missing.
  core: Angel Wells is a 41‑year‑old eco‑mindful cleaning virtuoso who channels their imagination into a boutique green‑cleaning business, they balance spontaneous creativity with occasional disorganization,
    and nurture community through compassionate service, aromatic experiments, and a love of watercolor and speculative fiction.
background:
  cultural: Angel grew up in a modest, middle‑class neighborhood in southern New Jersey, where a strong sense of community and seasonal neighborhood events shaped her worldview. Her family, rooted in Anglo‑American
    traditions, emphasized hard work, neighborly support, and an appreciation for the arts, encouraging her early interest in drawing and music. Participation in local volunteer clean‑ups and community
    garden projects fostered her compassionate nature and love for collaborative endeavors. While she identifies with the broader American cultural milieu, she also cherishes the regional values of practicality,
    flexibility, and a quiet openness to new ideas that are characteristic of the Mid‑Atlantic suburban environment.
attributes:
  skills: '[''Deep cleaning'', ''Eco‑friendly product usage'', ''Laundry and textile care'', ''Basic home maintenance'', ''Home organization and staging'', ''Aroma‑based ambiance creation'', ''Customer
