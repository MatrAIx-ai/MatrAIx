  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Reading speculative fiction and philosophy'', ''Visiting art galleries'', ''Attending community theater'', ''Gardening'', ''Aromatherapy experimentation'',
    ''Volunteering at senior center'', ''Cooking eclectic recipes'', ''DIY home décor crafts'']'
  career_goals: Angel aspires to transform her housekeeping experience into a boutique, green‑cleaning and home‑staging business that serves artists, small businesses, and senior households in Burlington
    County. She plans to obtain certification in environmentally safe cleaning practices, develop workshops on mindful cleaning and space harmony, and eventually hire a small team of like‑minded caregivers.
    Long‑term, she hopes to pursue a degree in environmental studies to deepen her expertise in sustainable living and integrate that knowledge into her entrepreneurial venture.
