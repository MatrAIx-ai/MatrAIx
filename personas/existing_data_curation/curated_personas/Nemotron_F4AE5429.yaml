personas:
  professional: Susan Gaskins, a Chicago‑based UI/UX designer and visual strategist, blends a solid STEM foundation with a flair for digital illustration and data visualization to deliver socially resonant
    campaigns for nonprofits, leading interdisciplinary teams with a competitive drive while habitually letting project files pile up on a cluttered desktop, and they often rely on spontaneous brainstorming
    sessions to overcome their disorganized workflow.
  sports: Susan Gaskins cycles the Lakefront Trail year‑round, joins a local climbing gym during Chicago’s icy winters, and roots for the Chicago Cubs while fitting in spontaneous yoga sessions that feel
    more like a mental reset than rigorous exercise.
  arts: Susan Gaskins roams the Art Institute of Chicago admiring works by Grant Wood and Kehinde Wiley, captures evolving street‑art murals by local collectives on their camera, and frequents open‑mic
    comedy nights where they quote Sarah Silverman and hum along to Bon Iver.
  travel: Susan Gaskins prefers weekend art‑focused getaways, often jetting to Oaxaca’s colorful markets for culinary inspiration and plotting a future Icelandic adventure to photograph glaciers, all funded
    through a modest “design‑inspiration” travel stash balanced against their freelance cash flow.
  culinary: Susan Gaskins delights in whipping up Thai green curry with fresh kaffir‑lime leaves, mastering a medium‑level skill set that lets them nail Ethiopian injera on Saturdays and always experiment
    with a pinch of smoked paprika in their signature grilled vegetable medley.
  core: Susan Gaskins is an endlessly curious creative who channels anxiety into yoga, wrestles with a habit of disorganization, and fuels bold design work with a competitive spark and a steady stream of
    espresso.
background:
  cultural: Susan is a native of the Chicago metropolitan area, raised in a middle‑class, predominantly white suburb while regularly visiting the city’s museums and cultural festivals. Growing up in the
    Midwest gave her a pragmatic yet open‑minded outlook, and the city’s rich artistic heritage—particularly the legacy of graphic design firms and the School of the Art Institute of Chicago—shaped her
    aesthetic sensibilities. As a never‑married professional, she embraces the independent lifestyle common among many Chicago creatives, balancing a personal identity rooted in Midwestern work ethic with
    the city’s progressive, multicultural vibe.
