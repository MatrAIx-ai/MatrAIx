  career_goals: Susan aims to transition into a senior creative leadership role, such as a creative director, where she can guide interdisciplinary teams to produce socially resonant design work. She envisions
    launching her own boutique studio that blends her STEM background with graphic design to create data‑driven visual campaigns for nonprofit and tech clients. Mentorship is a key ambition; she plans to
    develop structured training programs for emerging designers to counter her own tendency toward disorganization. Additionally, she seeks to establish a flexible, project‑based workflow that allows her
    to balance high‑impact work with personal well‑being, and to become a recognized voice in Chicago’s design community through speaking engagements and publications.
