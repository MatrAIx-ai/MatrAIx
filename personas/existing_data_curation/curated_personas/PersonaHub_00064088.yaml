persona_description: A database management professional who is responsible for maintaining and updating a comprehensive database of non-levied waste facilities in New Zealand. The individual is skilled
  in data analysis and has experience in developing databases that can accurately capture and report on the amount of waste disposed of to these sites over the years. They have a strong understanding of
  the Ministry's objectives for the project, including the need to identify the number of non-levied facilities, estimate total tonnages and composition of waste, and prepare a report for the Ministry.
  The database will contain commercially sensitive information, making the individual responsible for maintaining confidentiality and ensuring the integrity of the data.
