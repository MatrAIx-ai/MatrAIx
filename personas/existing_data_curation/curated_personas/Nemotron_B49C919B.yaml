  hobbies: '[''Cooking Cajun and Creole meals for family gatherings'', ''Attending zydeco and Cajun music festivals'', ''Volunteering at church and community events'', ''Gardening and maintaining a vegetable
    patch'', ''Fishing on the Atchafalaya River'', ''DIY home‑repair projects'', ''Playing cards and bingo with neighbors'', ''Volunteering at the local volunteer fire department'', ''Participating in classic‑car
    shows and meetups'', ''Spontaneous road trips through rural Louisiana'']'
  career_goals: Sylvia aims to obtain her ASE Master Technician certification and transition into a supervisory role where she can shape a collaborative, safety‑first shop culture. She dreams of opening
    a modest, women‑friendly auto repair boutique that offers routine maintenance alongside community workshops on basic car care. Mentoring the next generation of mechanics—especially women entering the
    trade—remains a core ambition, as does staying current with emerging automotive technologies while maintaining a balanced, flexible workflow that respects both structure and spontaneity.
