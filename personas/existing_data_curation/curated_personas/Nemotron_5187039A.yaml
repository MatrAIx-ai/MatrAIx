  hobbies: '[''Hip‑hop and contemporary dancing'', ''Singing in church choir'', ''Karaoke'', ''Food exploration and cooking'', ''Street photography'', ''Social‑media content curation'', ''Reading contemporary
    Black literature'', ''Documentary watching'', ''Youth mentorship volunteering'']'
  career_goals: Lillian aims to complete her Bachelor’s degree in Communications or Marketing while building a portfolio of community‑focused projects. She hopes to secure a role as a Public Relations or
    Community Outreach Coordinator for a non‑profit or local cultural organization in Jackson, where she can leverage her sociable nature and practical planning skills. Long‑term, she dreams of launching
    her own boutique event‑planning business that emphasizes African‑American cultural celebrations, giving her the balance of structured entrepreneurship and creative spontaneity.
