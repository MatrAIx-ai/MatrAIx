personas:
  professional: Lillian Jackson, an aspiring public relations and community outreach coordinator, leverages her polished public‑speaking and event‑planning expertise to turn spontaneous campus gatherings
    into structured communication campaigns, juggling her talkative, people‑focused energy with the occasional deadline scramble that she resolves through rapid problem‑solving.
  sports: Lillian Jackson fuels her fitness through hip‑hop dance classes, weekend pick‑up basketball at the community center, supports the Mississippi State Bulldogs football and the Memphis Grizzlies
    NBA team, and attends a campus yoga club that satisfies her need for both structured workouts and spontaneous movement.
  arts: Lillian Jackson curates a vibrant Instagram feed of street murals and community events, sings in a church choir that blends contemporary soul and gospel, and draws artistic inspiration from musicians
    such as Adele and Bon Iver as well as filmmaker Greta Gerwig, whose storytelling styles inform her own community narratives.
  travel: Lillian Jackson dreams of a road‑trip down the Mississippi River to historic Natchez, a spring visit to New Orleans for its live music scene, and a budget‑friendly weekend in Austin's food‑truck
    district, yet she usually books youth hostels and relies on rideshares to stretch her student allowance.
  culinary: Lillian Jackson is a self‑taught home chef who masters comfort dishes like fried chicken, mac and cheese, and collard greens while also experimenting with avocado toast topped with poached eggs,
    matcha lattes, and seasonal spices such as smoked paprika and turmeric, balancing her modest pantry budget with frequent visits to trendy cafés.
  core: Lillian Jackson balances a love for structured community outreach with a spontaneous flair for dance, dining, and mural photography, often juggling deadline stress, impulse spending, and a habit
    of snapping every street art she encounters.
background:
  cultural: Lillian grew up in a close‑knit African‑American family in Jackson, Michigan. Her grandparents were part of the Great Migration, bringing Southern traditions that are still celebrated at family
    gatherings—soul‑food cooking, gospel music, and storytelling. The local Baptist church is a cornerstone of her community life, providing a space for worship, choir, and service projects. She participates
    in the annual Jackson African American Heritage Festival and stays connected to regional civil‑rights history through local museums and community dialogues. These cultural roots shape her values of
    community solidarity, resilience, and a deep appreciation for Black artistic expression.
attributes:
  skills: '[''Interpersonal communication'', ''Public speaking'', ''Event planning'', ''On‑the‑fly coordination'', ''Customer service'', ''Conflict resolution'', ''Social media content creation'', ''Basic
