persona_description: A microbiology professor at Oklahoma State University, Dr. Muriana is an expert in foodborne illness outbreaks and has conducted research on the transmission of Salmonella, E. coli,
  and Listeria from various sources including animal feces, contaminated water, and contaminated produce. He has written extensively on the importance of food safety practices and has worked with the Georgia
  Fruit & Vegetable Growers Association to establish recommendations for member farms. Dr. Muriana is known for his advocacy on the need for a "knowing your supplier" policy and for his belief that food
  safety is a top priority in the food industry. He is also a strong advocate for the importance of education and awareness on food safety practices among consumers and farmers alike.
