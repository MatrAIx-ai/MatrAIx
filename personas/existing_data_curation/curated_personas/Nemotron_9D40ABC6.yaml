personas:
  professional: Christina Miller (30) is a seasoned carpenter whose methodical precision, sustainable building ethos, and outgoing mentorship style allow them to excel at custom cabinetry, green remodels,
    and leading collaborative Habitat for Humanity builds while assertively guiding apprentices.
  sports: Christina Miller fuels their love of the outdoors with frequent hikes in Cleveland National Forest, plays recreational volleyball at the Aguanga Community Center, follows the San Diego Padres
    and San Diego Wave FC loyally, and counts salsa dancing classes as a weekly cardio workout, occasionally joining a local rock‑climbing gym in the winter months.
  arts: Christina Miller expresses creativity through experimental woodworking showcased at local craft fairs, draws inspiration from furniture maker Mira Nakashima and ceramicist Betty Wood, sways to the
    rhythms of Celia Cruz and Tito Puente during salsa evenings, and regularly attends performances at the San Diego Civic Theatre, especially Broadway revivals like Hamilton, while listening to The Crafty
    Woodworker podcast for artistic ideas.
  travel: Christina Miller prefers road‑trip adventures that blend hiking, sustainable architecture tours, and cultural immersion, having trekked the trails of Joshua Tree, explored coffee farms in Costa
    Rica, and dreaming of witnessing Norway’s timber fjord cabins, while weekend getaways to Big Bear and Anza‑Borrego satisfy their budget‑conscious wanderlust.
  culinary: Christina Miller delights in cooking Mediterranean‑Mexican fusion dishes such as grilled tilapia tacos with avocado‑lime slaw and quinoa‑tomato salad seasoned with fresh cilantro and smoked
    paprika, skillfully chops on a reclaimed‑wood board, and occasionally bakes sourdough loaves while savoring artisanal cheeses and locally roasted coffee.
  core: Christina Miller blends a pragmatic carpenter’s precision with a vibrant social pulse, turning sustainable woodwork, hiking, and salsa dancing into a lifestyle that balances disciplined ambition
    with spontaneous creativity.
background:
  cultural: Christina was raised in a middle-class white family in Southern California, where a mix of suburban practicality and nearby natural landscapes shaped her values. Her upbringing emphasized a
    strong work ethic, self-reliance, and community involvement typical of small-town Californian cultures. Exposure to the region's growing focus on sustainability and the DIY maker movement during her
    teenage years sparked her interest in hands-on trades. While she identifies with mainstream American cultural norms, she also embraces the local rural Californian spirit of independence, neighborly
    cooperation, and respect for the outdoors.
