  career_goals: Christina aims to advance from skilled carpenter to small business owner within five years. She plans to obtain a journeyman certification, deepen her expertise in green building methods,
    and open a boutique workshop that offers custom, sustainably sourced furniture and selective home remodels for clients in Aguanga and the wider San Diego County. She also wants to mentor other women
    entering the trades by leading community workshops and networking events. Financially, she seeks a stable income that supports her separated household and provides for future family responsibilities.
