  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Walking'', ''Cooking family recipes'', ''Volunteer finance tutoring for non-profits'', ''Knitting'', ''Crossword puzzles'', ''Attending community
    theater'', ''Bird-watching'', ''Yoga for seniors'', ''Genealogy research'']'
  career_goals: Approaching retirement, Cheryl aims to transition into a part‑time consultancy role that allows her to support small businesses and local charities with financial stewardship. She is passionate
    about creating a mentorship program for young accountants in her firm and hopes to author a guide on financial wellness for seniors. Additionally, she aspires to champion workplace well‑being initiatives
    that reduce stress for audit teams, leveraging her own experiences with worry and stress sensitivity to foster a more supportive environment.
