personas:
  professional: Cheryl Johnson is a veteran accountant and auditor who leverages over 35 years of expertise in GAAP, internal controls, and data‑driven financial modeling, while their meticulous, structure‑loving
    nature and compassionate mentorship style foster calm, reliable audit teams and empower junior staff.
  sports: Cheryl Johnson enjoys low‑impact exercise, taking daily walks along the Woodbury waterfront and attending senior yoga sessions, while cheering on the New England Patriots, Boston Red Sox, and
    New York Knicks, and they are a member of the Woodbury Community Walking Club that meets each Saturday.
  arts: Cheryl Johnson finds solace in historical fiction by Philippa Gregory and Ken Follett, participates in community theater productions of classic plays, and regularly listens to the music of Leonard
    Cohen and the piano works of Claude Debussy, which shape their reflective evenings.
  travel: Cheryl Johnson prefers thoughtfully planned, moderate‑duration trips that blend cultural immersion with comfort, having toured historic Boston, the vineyards of Napa Valley, and dreaming of a
    leisurely cruise through the Norwegian fjords, yet they balance travel ambitions with a fixed retirement income.
  culinary: Cheryl Johnson delights in preparing home‑cooked meals like herb‑roasted chicken, New England clam chowder, and apple crisp, favoring fresh garden vegetables and fragrant rosemary, while their
    knitting sessions often double as culinary experiments that occasionally result in overly salted soups.
  core: Cheryl Johnson is a detail‑oriented accountant with a green thumb and a heart for community, who balances a love of orderly spreadsheets with occasional worry‑induced over‑thinking and a secret
    stash of extra yarn.
background:
  cultural: Cheryl grew up in a middle‑class, suburban white family in the Mid‑Atlantic region, with deep roots in New Jersey. Her parents instilled values of hard work, community service, and self‑reliance.
    She attended a local public high school before pursuing a STEM‑focused degree in accounting at a state university. Her cultural identity is shaped by long‑standing ties to the area, participation in
    a Methodist congregation, and a commitment to local traditions such as volunteering at county fairs and supporting neighborhood initiatives.
attributes:
  skills: '[''Financial reporting'', ''Tax preparation'', ''Audit procedures'', ''Regulatory compliance'', ''Risk assessment'', ''Internal control design'', ''Data analysis (Excel, SQL)'', ''Financial modeling'',
