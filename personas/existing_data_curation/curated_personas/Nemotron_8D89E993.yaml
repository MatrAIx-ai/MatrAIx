  career_goals: Miguel aims to move beyond line‑cook duties and earn a position as a sous chef within the next two years, focusing on menu development that blends traditional Mexican flavors with the health‑conscious,
    desert‑inspired cuisine popular in Southern California. He plans to obtain a culinary certificate and a certified food‑safety manager credential to solidify his qualifications. In the longer term, Miguel
    dreams of opening a modest food‑truck or pop‑up concept that serves authentic regional Mexican dishes using locally sourced, sustainable ingredients, while also mentoring young workers from his community.
