personas:
  professional: Beverly Renke, a 2‑year‑old with an uncanny knack for organizing blocks by color, shape, and size, spends hours aligning them into perfect rows, displaying early signs of systematic thinking
    and an appreciation for structure that hints at a future in design, data analysis, or engineering.
  sports: Beverly Renke, a 2‑year‑old, thrives at toddler swim classes at the community center, enjoys the gentle splash of water, and when watching the local minor‑league baseball team, the Springfield
    Sluggers, they prefer to sit on their parent's lap in a quiet corner, absorbing the game’s rhythm without the noise of the crowd.
  arts: Beverly Renke, a 2‑year‑old, delights in finger‑painting using bright hues reminiscent of Eric Carle’s book illustrations, and they spend quiet moments admiring the whimsical mosaic tiles at the
    children’s art museum, reflecting a calm yet curious appreciation for color and pattern.
  travel: Beverly Renke, a 2‑year‑old, enjoys family road trips to the nearby Blue Ridge Trail where they explore stroller‑friendly paths, prefer the predictable routine of scheduled snack breaks over hectic
    airports, and they dream of a future visit to the gentle wonders of Disney’s Fantasyland.
  culinary: Beverly Renke, a 2‑year‑old, favours soft, sweet foods like mashed sweet potatoes and banana slices, and they love arranging tiny broccoli florets into a smiling face on their plate, a quirky
    habit that showcases their love for organized presentation and texture contrast.
  core: Beverly Renke, a 2‑year‑old, blends quiet curiosity with methodical play, turning each day into a calm exploration of colors, textures, and routines.
background:
  cultural: Beverly is raised in Rye, New York, an affluent suburb of Westchester County with a predominantly white, middle‑class community. Her family values early education, exposure to the arts, and
