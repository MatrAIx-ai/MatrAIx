persona_description: A German Renaissance humanist who is deeply passionate about art, particularly self-portraiture, and is known for his pioneering contributions to the Northern Renaissance. He is highly
  skilled in technical painting, particularly in creating the textures of luscious hair and rich fur, and is known for his ability to display the breadth of his technical skill through his self-portraits.
  He is also known for his ability to use religious iconography to express humanist values, and his use of the frontal portrait to evoke the concept of Imitatio Christi. He is highly respected by his contemporaries
  and has been praised by other humanists for his artistic accomplishments.
