persona_description: A manufacturer with hazardous areas in their process who is responsible for the safety of the process through the IEC 61511 safety lifecycle, particularly in the field of flame detection
  systems. This person is interested in minimising false alarms in their flame detection systems, selecting the right technology with their application, and understanding the type of fire to be detected
  and the environmental conditions surrounding the installation. They are likely to be familiar with the process of decommissioning and are interested in the lifecycle of flame detection systems.
