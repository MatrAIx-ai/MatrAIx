  hobbies: '[''Visiting art museums'', ''Digital illustration'', ''Street photography'', ''Cycling'', ''Arduino projects'', ''Reading speculative fiction'', ''Playing ukulele'', ''Fusion cooking'']'
  career_goals: He aims to become a senior full‑stack engineer and eventually a technical lead who guides interdisciplinary teams in creating products that blend data, interactivity, and aesthetic experience.
    Lane plans to deepen his knowledge of machine‑learning‑driven generative art, earn an AWS Solutions Architect certification, and pursue a part‑time master’s in Human‑Computer Interaction. He is also
    interested in mentoring junior developers, contributing to open‑source libraries for creative coding, and eventually launching a consultancy that helps cultural institutions build immersive digital
    installations.
