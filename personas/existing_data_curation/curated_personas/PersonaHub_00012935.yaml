persona_description: A biologist who specializes in the study of genetics and reproductive biology, particularly the role of DNA packaging in sperm and the potential implications for human fertility. He
  has a background in oncological sciences and is a leader in the field. His research focuses on the discovery of a clever packaging scheme that allows the genetic material in sperm to have far more influence
  over development of a fertilized egg than had been imagined. He is currently working on a test that could define the root issues in men with fertility problems and is interested in the concept of possible
  intervention to improve fertility.
