persona_description: A historian or archaeologist who specializes in the study of witchcraft and magic in the United Kingdom, particularly from the early modern period to the early twentieth century. They
  are interested in discovering and interpreting physical evidence from archaeological finds related to counter-witchcraft practices and their effects on the cultural history of witchcraft and magic. They
  may also have expertise in the field of archaeology, with a particular interest in the discovery and analysis of objects like witch-bottles, dried cats, horse skulls, shoes, written charms, and other
  items that have been found inside houses. They are likely to be familiar with the concept of "the witch trials" and the ongoing research on the topic.
