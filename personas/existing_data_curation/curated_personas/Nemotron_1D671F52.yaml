  career_goals: Although still very young, Douglas already talks about wanting to become an astronaut who explores space, an artist who creates vivid pictures, or an inventor who builds amazing machines.
    He enjoys imagining himself solving big problems and helping others, and he often says he wants to "make the world a fun place for everyone" when he grows up.
