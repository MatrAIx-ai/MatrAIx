personas:
  professional: Jeremy Frazier, a seasoned handyman with carpentry, minor plumbing, and low‑voltage electrical expertise, translates his structured yet adaptable mindset into reliable, community‑focused
    property‑maintenance services while leveraging his competitive negotiation style to secure fair pricing for clients.
  sports: Jeremy Frazier maintains his fitness through early‑morning fishing trips at Lake Hartwell, weekend pick‑up basketball games at the community center, and membership in the Travelers Rest Walking
    Club, while avidly supporting the Atlanta Hawks on television and cheering for the Carolina Panthers during football season.
  arts: Jeremy Frazier immerses himself in classic soul and blues, spinning vinyl records by B.B. King, Etta James, and Ray Charles while he tackles woodworking projects, and he occasionally attends local
    blues jam sessions at the town’s community hall.
  travel: Jeremy Frazier prefers low‑key road trips that combine scenic fishing with relaxed exploration, such as weekend drives along the Blue Ridge Parkway, a weekend getaway to the coastal town of Beaufort,
    South Carolina, and a long‑standing dream of casting a line on the pristine waters of Lake Titicaca in Peru.
  culinary: Jeremy Frazier shines as a backyard barbecue chef, perfecting smoky pork ribs with a paprika‑brown‑sugar‑cayenne rub, serving them alongside buttery corn on the cob, tangy coleslaw, and freshly
    baked buttermilk biscuits, while also experimenting with homemade BBQ sauces featuring hickory chips and maple syrup.
  core: Jeremy Frazier balances a competitive handyman spirit with a love for relaxed fishing and soulful blues, often juggling meticulous work schedules with spontaneous backyard cookouts, and occasionally
    letting his skeptical nature delay paperwork.
background:
  cultural: Jeremy's cultural identity is rooted in his Southern African‑American heritage. He grew up in a close‑knit Black community near Greenville, where church gatherings, gospel music, and soul‑food
    traditions shaped his early years. Family storytelling and communal support fostered a strong sense of resilience, while also exposing him to the systemic challenges faced by Black residents in the
    area. Although he now approaches spirituality more individually, the rhythms of gospel and the flavors of traditional Southern cooking remain integral parts of his life. His cultural background informs
    his practical outlook, community orientation, and the pride he takes in passing down skills to the next generation.
attributes:
  skills: '[''Carpentry'', ''Basic Plumbing'', ''Electrical Repairs'', ''Vehicle Maintenance'', ''Landscaping'', ''Garden Care'', ''Negotiation'', ''Problem-Solving'', ''Ad‑hoc Project Management'']'
  hobbies: '[''Fishing'', ''Local Fishing Tournaments'', ''Gardening'', ''Woodworking'', ''Classic Soul & Blues Music'', ''Barbecue Cooking'', ''Card Games (Spades)'', ''Community Barbecues'', ''Basketball
    Watching'']'
  career_goals: Jeremy aims to formalize his handyman capabilities by obtaining a GED and pursuing a certification in residential maintenance. He envisions launching a small, community‑focused property‑maintenance
    business that offers reliable, affordable services to residents of Travelers Rest and surrounding areas. While he values independence, he also hopes to secure occasional municipal contracts for routine
    upkeep, providing a stable income stream. A longer‑term ambition is to mentor younger members of his neighborhood, sharing practical skills and helping them avoid some of the obstacles he faced growing
    up.
