personas:
  professional: James Leggett is an aspiring junior programmer who channels their love for strategy video games and LEGO building into crafting small Python mods for Minecraft, leveraging their practical,
    structure‑seeking mindset while often letting school deadlines slip due to their relaxed approach to obligations.
  sports: James Leggett skates at the community skate park and cycles the Atlantic coastal trail, competes in a small neighborhood skate club that meets twice weekly, roots for the Boston Bruins in hockey
    and follows the New England Patriots in football, and prefers low‑key, small‑group physical activities over crowded team sports, which they enjoy as a calm way to stay active.
  arts: James Leggett’s artistic side shines through their devotion to alternative rock bands like Arctic Monkeys and Twenty One Pilots, their binge‑reading of fantasy epics by Brandon Sanderson, and occasional
    sketching of Minecraft landscapes and LEGO creations, blending music and visual imagination into a personal aesthetic.
  travel: James Leggett enjoys weekend trips to the rugged Atlantic shoreline of Cape Cod, collecting shells at Nauset Beach, and dreams of snorkeling the tide pools of New Zealand’s Abel Tasman National
    Park, favoring flexible, self‑planned itineraries over strict schedules, which they find liberating.
  culinary: James Leggett prefers quick, hearty meals such as pepperoni pizza slices and grilled cheese sandwiches, but when experimenting in the kitchen they whip up fish tacos with fresh cod, cabbage
    slaw, and lime, while their favorite snack is trail mix featuring dried mango, almonds, and dark chocolate chips.
  core: James Leggett is a pragmatic, solitary teen who melds strategic gaming with seaside exploration, often forgets appointments yet always keeps a spare skate deck and a stash of trail mix on hand,
    and they navigate daily life with a calm, flexible attitude.
background:
  cultural: 'James grew up in a middle‑class, suburban White American family in Oceanside, New York, a community on Long Island known for its coastal lifestyle and strong public schools. His upbringing
    reflects typical American suburban values: emphasis on education, neighborly cooperation, and participation in local youth activities such as sports and community service. Proximity to the Atlantic
    has fostered an appreciation for marine environments and beach culture. Family traditions include holiday gatherings, support for local recreational programs, and a respect for tolerance and community
    harmony, all of which shape his considerate and cooperative demeanor.'
attributes:
  skills: '[''Digital Literacy'', ''Basic Python Programming'', ''Video Game Strategy'', ''Bike Maintenance'', ''LEGO Model Building'', ''Analytical Problem Solving'', ''Active Listening'', ''Small‑Group
