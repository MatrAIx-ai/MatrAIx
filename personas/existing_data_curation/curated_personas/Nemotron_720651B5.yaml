  hobbies: '[''Playing strategy video games'', ''Skateboarding'', ''Biking'', ''Reading fantasy novels'', ''Exploring the beach'', ''Building LEGO models'', ''Solving puzzles'', ''Coding small Python projects'',
    ''Listening to alternative rock music'']'
  career_goals: James aims to complete his high school education with solid grades in math and science and then enroll in a community‑college program that combines computer science with environmental science.
    His long‑term ambition is to become a software developer or GIS analyst who creates tools for marine conservation, blending his love of structured, technical work with his appreciation for the coastal
    environment. Alongside his career, he hopes to volunteer for local beach‑cleanup efforts and occasional tech‑support initiatives for community youth, satisfying his desire to help others while maintaining
    a stable, predictable professional path.
