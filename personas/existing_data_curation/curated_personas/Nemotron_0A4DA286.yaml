  career_goals: Michelle aims to move into supervisory roles within retail, seeking promotion to shift supervisor within the next year and store manager within three years. She plans to complete her associate
    degree in business administration, obtain a certification in retail management, and develop leadership skills through mentorship. Long-term, she dreams of opening a small boutique or coffee shop that
    blends her love for community interaction and entrepreneurship, while maintaining a balanced work schedule to support her family.
