personas:
  professional: Michelle Piggott is a diligent retail cashier who leverages her POS expertise, upbeat communication, and knack for de‑escalating customers to pursue a shift‑supervisor role within a year
    and a store‑manager position within three, while nurturing a dream of opening a community‑focused boutique café that blends her love for hospitality and entrepreneurship.
  sports: Michelle Piggott craves the camaraderie of beach‑volleyball meetups with the Suncoast Sand Club, hits the Zumba studio twice a week, follows the Tampa Bay Buccaneers and Tampa Bay Rays passionately,
    and enjoys occasional Orlando Magic game nights, treating fitness as a social ritual rather than a regimented training plan.
  arts: Michelle Piggott relishes live music at the Florida Folk Festival, often dancing to Maggie Rogers and John Mayer while curating indie playlists for her game‑night evenings, and frequently visits
    the New Port Richey Art Walk to admire watercolor exhibits that spark her own dessert‑inspired baking creations.
  travel: Michelle Piggott favors spur‑of‑the‑moment weekend getaways to Florida state parks such as Myakka River and kayaking the Weeki Wachee springs, while saving for a spring trip to Asheville’s vibrant
    arts scene and a sun‑soaked week in Cancun, balancing travel planning with tight budgeting and a full work schedule.
  culinary: Michelle Piggott’s culinary passions orbit around baking—perfecting lemon‑blueberry scones and decadent chocolate mousse for game nights—while she also loves grilling fresh Gulf shrimp at beach
    picnics, experimenting with seasonal farmers‑market finds like heirloom tomatoes and avocado, though her knife skills sometimes wobble under time pressure.
  core: Michelle Piggott blends energetic social vigor with a breezy, go‑with‑the‑flow attitude, turning every cash‑register shift into a chance to practice hospitality, while secretly hoarding the ultimate
    chocolate lava‑cake recipe and habitually misplacing her reusable water bottle.
background:
  cultural: Michelle comes from a White, middle-class background typical of the Gulf Coast region of Florida. Growing up in a suburban community, she was immersed in a blend of Southern hospitality and
    coastal leisure culture—family gatherings centered around holidays, church involvement, and frequent outings to the beach. The regional emphasis on community events, outdoor recreation, and a laid-back
    yet hardworking ethos has shaped her values of friendliness, practicality, and a balanced lifestyle.
