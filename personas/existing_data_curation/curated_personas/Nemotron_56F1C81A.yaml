personas:
  professional: Charlena Brooks, a retired household manager turned volunteer mentor, leverages their meticulous budgeting and event-planning skills to lead small-group workshops on financial literacy and
    digital inclusion for seniors in Baltimore County, blending curiosity with practicality to keep each session well-structured yet adaptable.
  sports: Charlena Brooks enjoys low-impact fitness through daily walks with the Towson Seniors' Walking Club, cheerfully follows the Baltimore Ravens, the Baltimore Orioles, and the Maryland Terrapins
    basketball team, and they occasionally participate in community garden clean-ups that double as gentle strength training.
  arts: Charlena Brooks weaves their love of storytelling into quilts inspired by the brushstrokes of Claude Monet and the narratives of Lin-Manuel Miranda's musicals, while evenings often find them listening
    to Bob Dylan's folk ballads and attending recorded performances of Shakespearean plays starring acclaimed actors.
  travel: Charlena Brooks prefers thoughtfully planned weekend getaways, having explored historic Annapolis, the gardens of Asheville, the coastal charm of Charleston, a culinary tour of New Orleans, and
    they dream of a scenic road trip along the Irish coastline for future retirement adventures.
  culinary: Charlena Brooks delights in farm-to-table cooking, regularly preparing heirloom tomato and basil salad, roasted root vegetables seasoned with rosemary and thyme, and a slow-cooked bean stew
    featuring smoked ham, while their modest kitchen skills blossom into confident sourdough baking during quiet afternoons.
  core: Charlena Brooks blends methodical curiosity with quiet generosity, turning solitary hobbies into community-focused mentorship and preserving family stories through quilting, genealogy, and thoughtful
    stewardship of resources.
background:
  cultural: Charlena was raised in a close‑knit African‑American community in Baltimore County, where church, family, and neighborhood ties shaped her sense of identity. Her upbringing emphasized mutual
    support, respect for elders, and the preservation of cultural traditions such as gospel music, Southern cooking, and storytelling. Participation in local church volunteer groups fostered her collaborative
    spirit and commitment to harmony. The rich history of Black resilience in Maryland influences her interest in genealogy, while the culinary and horticultural practices passed down from her grandparents
    inspire her gardening and cooking hobbies. These cultural foundations continue to inform her values of kindness, cooperation, and dedication to community service.
attributes:
  skills: '[''Budgeting and financial planning'', ''Event coordination for community and church gatherings'', ''Record‑keeping and administrative documentation'', ''Basic computer literacy (email, spreadsheets,
    video calling)'', ''Genealogy research and family history documentation'', ''Home gardening and horticultural maintenance'', ''Quilting and textile arts'', ''Mentoring and peer advising'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Home gardening with heirloom vegetables'', ''Quilting and textile arts'', ''Genealogy research using online databases and oral histories'',
    ''Daily walking in local parks'', ''Listening to jazz and soul music from the 1960s and 1970s'']'
  career_goals: Although retired from formal employment, Charlena aims to expand her impact as a volunteer mentor within the Baltimore County senior network, offering workshops on financial management and
    digital inclusion for older adults. She also aspires to complete a certificate in community health outreach, enabling her to assist local health initiatives focused on preventive care for African‑American
    seniors. A long‑term personal ambition is to compile a memoir that weaves together her family’s genealogical findings with reflections on cultural heritage, preserving these stories for future generations.
