personas:
  professional: A pretend‑play 'teacher' role‑player, Addison Neeley organizes block‑building sessions with tidy rules, gently guides peers through storytime, and displays early signs of an organized, compassionate
    leader; they love arranging toys in perfect rows before bedtime.
  sports: Addison Neeley zooms around the community center’s toddler soccer class, cheering for the Seattle Sounders, and thrives on the structured drills that blend energetic play with reliable routines;
    they love counting the number of times the ball is kicked.
  arts: Addison Neeley sings along to Sesame Street's 'C is for Cookie' and the Beatles' 'Yellow Submarine', delights in drawing with Crayola crayons, and eagerly watches age‑appropriate performances by
    the local children's theater troupe, weaving favorite melodies and colors into daily play; they often hum the songs when self‑soothing.
  travel: Addison Neeley delights in family trips to the nearby aquarium and magical weekends at Disney World, preferring meticulously planned itineraries with familiar snacks and scheduled naps to soothe
    their natural anxiety about new surroundings; they habitually clutch a small plush toy for comfort during travel.
  culinary: Addison Neeley loves dipping crispy chicken nuggets in honey‑mustard, sipping sweet strawberry‑banana smoothies, and proudly stirring mashed potatoes, yet stubbornly refuses broccoli, reflecting
    a selective palate and a budding enthusiasm for kitchen participation; they frequently ask for extra ketchup on the side.
  core: Addison Neeley is a structure‑loving, socially bright three‑year‑old who comforts peers, worries about change, and insists on lining up toy cars in perfect rows before bedtime; they often count
    steps when moving from room to room.
background:
  cultural: Addison comes from a white, middle‑class family living in Orlando, Florida. Her upbringing reflects typical American cultural norms, with celebrations of holidays such as Thanksgiving, Christmas,
    and Fourth of July, often marked by family gatherings and themed decorations. Growing up near major theme parks, especially Disney World, she is regularly exposed to Disney characters and stories, which
    influence her play and imagination. The multicultural environment of Orange County provides her with opportunities to interact with peers from diverse backgrounds, fostering an early appreciation for
    inclusion and cooperation. Her household primarily speaks English, and she participates in a local preschool that incorporates a mix of play‑based learning and community values.
