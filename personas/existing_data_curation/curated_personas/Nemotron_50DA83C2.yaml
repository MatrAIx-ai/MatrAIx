  hobbies: '[''building block towers'', ''coloring pictures'', ''singing nursery rhymes'', ''dancing with friends'', ''playing at the playground'', ''pretend doctor for stuffed animals'', ''storytime with
    parents'', ''watching animated animal shows'', ''helping stir batter in toy kitchen'', ''attending group playdates'']'
  career_goals: Although still in early childhood, Addison already expresses imaginative aspirations shaped by her compassionate and organized personality. She often says she wants to become a teacher so
    she can help other children learn and keep the classroom orderly. She also dreams of being a veterinarian, caring for animals with kindness. The bright lights of Disney in her hometown inspire her to
    imagine being a Disney princess who spreads joy and harmony. These playful ambitions reflect her desire to help others, maintain structure, and create a peaceful environment.
