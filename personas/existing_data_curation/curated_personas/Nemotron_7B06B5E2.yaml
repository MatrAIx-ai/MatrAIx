  hobbies: '[''Reading (self‑help and contemporary fiction)'', ''Photography (street and nature)'', ''Cooking and experimenting with Southern soul‑food recipes'', ''Yoga and mindfulness meditation'', ''Journaling
    and reflective writing'', ''Listening to R&B, neo‑soul, and jazz'', ''Exploring local coffee shops and food trucks'', ''DIY crafts like knitting and upcycling clothing'', ''Mentoring youth at community
    programs'']'
  career_goals: Janecia aims to earn her GED within the next year and enroll in a part‑time associate program in Business Administration or Retail Management at a community college. She plans to obtain
    a retail‑management certification and leverage her supervisory experience to become a store manager within two to three years. Long‑term, she envisions advancing to a district manager role overseeing
    multiple locations, and eventually launching her own boutique that blends contemporary fashion with soul‑food-inspired branding. Additionally, she hopes to mentor young employees, especially those facing
    similar educational challenges, and to promote inclusive, flexible workplace cultures.
