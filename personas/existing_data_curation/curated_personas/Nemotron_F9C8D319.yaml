personas:
  professional: Lasean Welcome orchestrates senior‑center programs and community events with a meticulous, practical mindset, leveraging their articulate public‑speaking and DIY carpentry skills to keep
    gatherings on schedule while they thrive as the conversational hub.
  sports: Lasean Welcome is an avid follower of the Oklahoma Sooners football team and the Oklahoma City Thunder, routinely joining the senior center’s weekly bridge club that doubles as a viewing group
    for Thursday night games, while they also take occasional leisurely walks on the local golf course during the spring to stay active.
  arts: Lasean Welcome shines as a narrator in community theater productions, channeling their love for storytelling while listening to the soulful improvisations of John Coltrane and the gospel power of
    Mahalia Jackson, and they often quote classic lines from Denzel Washington’s performances during rehearsals.
  travel: Lasean Welcome plans trips with methodical itineraries, favoring relaxed road‑caravan visits to New Orleans for jazz festivals, a nostalgic stay in Savannah’s historic district, and seasonal outings
    to the Wichita Mountains for tomato‑picking excursions alongside their grandchildren, and they always book senior‑friendly accommodations well in advance.
  culinary: Lasean Welcome crafts soulful meals with a seasoned hand, perfecting collard greens simmered with smoked ham hocks, a buttery cornbread spiced with jalapeños, and a velvety sweet‑potato pie
    crowned with a drizzle of caramelized pecans, while they proudly share these recipes at church potlucks and family reunions.
  core: Lasean Welcome is a pragmatic yet chatty elder who commands conversation with a competitive edge, the safety of routine, and a penchant for guarding their treasured recipe cards, while they always
    steer community projects toward orderly success.
background:
  cultural: Lasean is a second‑generation African‑American born and raised in Oklahoma City. His parents migrated from the South during the Great Migration, settling in the historic black neighborhoods
    of the city where church and community solidarity were central. He grew up surrounded by gospel music, oral storytelling, and the civil‑rights activism that shaped Oklahoma’s black community in the
    1960s. His cultural identity blends Southern traditions—such as soulful cooking and church fellowship—with Midwestern pragmatism, reflected in his organized, practical outlook. He remains active in
    the local African‑American church, the Oklahoma Black History Museum, and the senior council, preserving and sharing the legacy of black Oklahomans.
