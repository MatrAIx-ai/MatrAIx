  career_goals: Although retired, Lasean aspires to formalize his role as a senior‑advocate on the Oklahoma City Community Advisory Board, where he can shape policies that affect older adults. He hopes
    to compile his life stories and memories of the local African‑American community into a memoir that preserves cultural heritage. He also plans to establish a small scholarship fund at the community
    college he attended, supporting black students pursuing trades or business studies. Finally, he aims to expand the senior‑center’s intergenerational program, pairing seniors with youth for shared learning
    experiences.
