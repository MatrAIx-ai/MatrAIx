persona_description: A technologist and inventor who is passionate about developing innovative solutions to global health problems. With a background in medical technology, he has developed the Portable
  Eye Examination Kit (PEEK) application, which uses a camera to scan the lens of the eye for cataracts and diagnose other eye diseases. He is currently testing the technology in Kenya, where he is paying
  for the treatment of every patient with cataracts, including the cost of a driver to deliver the patient to the hospital, overnight accommodation, and food. His goal is to make eye care more accessible
  and affordable in developing countries, where there is little or no access to eye specialists.
