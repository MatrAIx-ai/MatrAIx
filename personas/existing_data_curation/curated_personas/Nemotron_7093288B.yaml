personas:
  professional: Alex Devos, a retired owner of a family hardware supply firm, now channels four decades of strategic planning, budgeting, and contract‑negotiation expertise into mentoring Naples entrepreneurs
    through the Chamber of Commerce and offering pro‑bono board counsel, all while adhering to a routine that balances organized project timelines with the flexibility of volunteer community service.
  sports: Alex Devos tees off three times a week at Naples Country Club, enjoys early‑morning Gulf of Mexico fishing trips, follows the Tampa Bay Buccaneers and Miami Heat loyally, and participates in the
    Rotary Golf League’s seasonal tournaments, while occasionally joining a winter tennis club to stay active.
  arts: Alex Devos frequents the Naples Philharmonic for evenings of Beethoven and Tchaikovsky, reads classic American literature like Mark Twain and F. Scott Fitzgerald, collects prints of Norman Rockwell,
    and watches classic films starring James Stewart, finding these cultural touchstones a soothing counterpoint to his business‑focused mind.
  travel: Alex Devos prefers leisurely, well‑planned journeys, such as Caribbean cruises to St. Thomas, Grand Cayman, and Barbados with his spouse, and historic road trips to Savannah’s antebellum districts,
    always booking through his trusted travel agent and prioritizing comfortable shore excursions over high‑adrenaline tours.
  culinary: Alex Devos delights in cooking comfort foods like chicken pot pie, shepherd’s pie, and grilled grouper caught on his own boat seasoned with fresh rosemary, lemon, and garlic, while complementing
    meals with garden‑grown tomatoes and zucchini, and finishing with a slice of warm apple‑cinnamon pie.
  core: Alex Devos’s daily rhythm of sunrise fishing, Thursday golf, and evening bingo at the senior center reflects a measured life that values routine, community, and the occasional indulgence of a vintage
    leather wallet that refuses digital modernization.
background:
  cultural: Alex comes from a white, Anglo‑Irish American background raised in a Midwestern town where community and self‑reliance were emphasized. He grew up attending a Protestant church and values the
    traditions of his upbringing, including a strong work ethic and a preference for routine. After retiring, he relocated to Naples, Florida, where he has integrated into the local retiree culture, participating
    in civic groups like the Rotary Club and the Naples Chamber of Commerce. His life reflects a blend of modest Midwestern roots and the laid‑back, community‑oriented lifestyle of Southwest Florida, with
    a steady appreciation for familiar customs and practical, harmonious living.
