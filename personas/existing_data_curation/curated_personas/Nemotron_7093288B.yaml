  career_goals: Although no longer employed full‑time, Alex aims to stay actively involved in the local business ecosystem by mentoring emerging entrepreneurs through the Naples Chamber of Commerce and
    offering pro‑bono advisory services to nonprofit boards. He hopes to write a memoir reflecting on his decades in business, sharing practical lessons for future generations. Maintaining his health and
    supporting his wife’s interests remain top priorities, as does preserving the financial stability of his retirement portfolio. He also looks forward to taking a few leisurely Caribbean cruises with
    his spouse and occasionally speaking at community events about responsible financial planning.
