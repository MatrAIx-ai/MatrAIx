  career_goals: James aims to transition from frontline attendant work to a supervisory or safety‑compliance role within the entertainment industry. Over the next five years he hopes to earn Certified Amusement
    Ride Inspector (CARI) credentials, lead a small team of attendants, and eventually manage a regional entertainment venue or start a niche consultancy that helps smaller parks meet state safety standards.
    He also plans to finish a bachelor’s degree in hospitality management to broaden his managerial qualifications, while seeking a work schedule that offers predictable hours to reduce stress.
