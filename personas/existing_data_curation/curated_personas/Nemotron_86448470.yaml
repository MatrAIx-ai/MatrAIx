personas:
  professional: Stephanie Aguero, a 35‑year‑old full‑stack developer on the path to becoming a technical architect, blends meticulous organization, a love of art history, and a quiet but assertive leadership
    style to design accessible, aesthetically nuanced web applications while habitually annotating code with literary footnotes, and they consistently prioritize clean documentation.
  sports: Stephanie Aguero, a fan of the Seattle Seahawks and Seattle Sounders, spends weekends hiking solo on Cascades trails, practices yoga at home during winter, and joins a local 5K run in spring,
    preferring low‑key, solitary exercise that aligns with their need for quiet reflection, and they often record observations from each hike in a journal to inspire future game narratives.
  arts: Stephanie Aguero finds inspiration in Monet’s impressionist watercolors, the ambient compositions of Max Richter, the poetry of Sylvia Plath, and immerses themselves in museum exhibitions during
    off‑peak hours, while also designing narrative‑driven indie games that weave literary themes into interactive experiences, and they frequently annotate their game prototypes with literary references.
  travel: Stephanie Aguero favors tranquil, off‑season travel, having explored the art‑laden streets of Florence, the serene temples of Kyoto, and the volcanic landscapes of Iceland, and dreams of hiking
    Patagonia’s remote trails while maintaining a modest travel budget that balances solo retreats with occasional weekend getaways to the San Juan Islands, and they prefer crafting itineraries that include
    time for quiet reflection in local libraries.
  culinary: Stephanie Aguero enjoys brewing single‑origin pour‑over coffee and preparing simple yet flavorful dishes like miso‑glazed salmon, quinoa‑chickpea salads, and homemade matcha latte, but admits
    to a habit of late‑night snacking on dark chocolate while annotating literary texts, and they consider themselves a competent home cook who occasionally orders take‑out when deadlines loom.
  core: At 35, Stephanie Aguero merges solitary curiosity, artistic flair, and methodical tech expertise into a unique blend of quiet ambition, obsessive annotation, and a persistent undercurrent of anxiety
    that fuels both creativity and overthinking, and they constantly seek balance between introspection and professional growth.
background:
  cultural: Stephanie identifies as White American and was raised in a multicultural household where her family’s Hispanic heritage influenced her exposure to Spanish language, music, and visual arts. While
    her primary cultural orientation aligns with mainstream American values, she carries an appreciation for the diverse artistic traditions she encountered at home. Relocating to the Pacific Northwest
    has deepened her connection to the region’s emphasis on environmental stewardship, tech innovation, and a contemplative, independent lifestyle. She values the blend of progressive social attitudes and
    the natural beauty of the area, which informs both her professional ethos and personal pursuits.
attributes:
  skills: '["Full‑stack web development", "Python programming", "JavaScript (React, Node.js)", "SQL and database design", "User‑experience (UX) and interface design", "Technical writing and documentation",
