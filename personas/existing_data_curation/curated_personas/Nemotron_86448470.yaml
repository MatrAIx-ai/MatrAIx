  career_goals: Stephanie aims to evolve into a technical architect role where she can shape the overall design of products that bridge technology and the arts. She is motivated to lead cross‑functional
    teams that prioritize thoughtful, user‑centric design while maintaining high code quality. In the next five years, she plans to mentor junior developers, especially those transitioning from non‑technical
    backgrounds, and to contribute to open‑source projects focused on accessibility and inclusive design. She also hopes to spearhead a side project that creates digital tools for artists and curators to
    manage and showcase collections, combining her programming expertise with her passion for visual culture. Balancing career growth with mental well‑being, she seeks a work environment that respects quiet,
    focused work periods and supports flexible scheduling to manage stress.
