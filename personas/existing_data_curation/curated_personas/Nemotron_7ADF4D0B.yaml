  career_goals: Allyson aims to become a principal architect at her firm, leading flagship projects such as the downtown Charleston revitalization and mixed‑use developments that showcase sustainable design.
    She plans to earn her LEED Accredited Professional credential and to win regional design awards that reflect her competitive drive. Over the next five years she wants to mentor junior staff, expand
    her professional network through speaking engagements at architectural conferences, and eventually launch a boutique consultancy that focuses on community‑centered, environmentally responsible architecture
    in the Appalachian region.
