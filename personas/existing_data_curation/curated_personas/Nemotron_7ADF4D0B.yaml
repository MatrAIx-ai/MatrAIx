personas:
  professional: Allyson Hawkins, a 45‑year‑old architect with two decades of hands‑on practice, blends a methodical, process‑driven mindset with a sociable flair to lead complex sustainable design projects,
    expertly wielding AutoCAD and Revit while steering multidisciplinary teams through West Virginia’s building codes, client workshops, and ambitious LEED‑certified goals.
  sports: Allyson Hawkins, an avid hiker of West Virginia’s Ridge and Valley trails, spends summer weekends tackling moderate elevation gains, participates in a community yoga class at Charleston’s Yoga
    on Main, follows the West Virginia Mountaineers basketball season, and supports the Charleston RiverDogs by attending minor‑league baseball games, balancing structured workouts with a competitive edge
    honed through weekly bridge tournaments.
  arts: Allyson Hawkins, a devoted advocate of Charleston’s historic preservation, finds creative solace in bluegrass legends like Sam Bush and The Infamous Stringdusters, draws design inspiration from
    Frank Lloyd Wright’s organic architecture, and regularly attends performances by the Charleston Symphony Orchestra and stage productions of August Wilson’s plays at the Clay Center.
  travel: Allyson Hawkins prefers meticulously planned trips that blend architectural exploration with outdoor adventure, often mapping weekend hikes in Shenandoah National Park and historic tours of Savannah,
    Georgia, while budgeting for annual overseas journeys to Barcelona’s Modernisme landmarks and Kyoto’s traditional machiya houses, yet occasionally splurges on spontaneous weekend getaways to a nearby
    Appalachian resort when a project deadline eases.
  culinary: Allyson Hawkins, an enthusiastic home cook, harvests heirloom tomatoes, sweet corn, and kale from her backyard garden to craft Southern comfort classics like smoked chicken, buttery cornbread,
    and slow‑cooked collard greens seasoned with smoked ham hocks, while also enjoying farm‑to‑table evenings at Charleston’s The Whole Hog, where she relishes shrimp and grits infused with fresh thyme.
  core: Allyson Hawkins blends a razor‑sharp, competition‑driven architectural mind with a warm, sociable spirit, channeling her love for structured planning into both sustainable design and meticulously
    organized dinner parties, though she often battles a habit of over‑booking her calendar and occasional late‑night snacking that disrupts her sleep.
background:
  cultural: Allyson grew up in a middle‑class, white family in the Charleston area, steeped in the Appalachian and Southern cultural mix of West Virginia. Her upbringing emphasized self‑reliance, community
    involvement, and the hospitality typical of the region. Regular participation in a local Methodist church and family gatherings around shared meals reinforced a sense of belonging and respect for tradition.
    The state's rich natural landscape and historic architecture inspire her appreciation for preservation and sustainable building, while the modest, pragmatic values of the region shape her practical,
    structured approach to both work and life.
