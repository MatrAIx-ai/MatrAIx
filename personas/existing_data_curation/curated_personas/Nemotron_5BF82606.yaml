  career_goals: Richard hopes to transition into a supervisory role within the Los Angeles County EMS system, eventually becoming an EMS Shift Supervisor or Training Coordinator. He aims to mentor younger
    EMTs, develop a community disaster‑preparedness program, and integrate emerging tele‑medicine tools into field response to improve patient outcomes. While still valuing hands‑on patient care, he wants
    to shape policy and training standards that emphasize flexibility, compassion, and practical innovation.
