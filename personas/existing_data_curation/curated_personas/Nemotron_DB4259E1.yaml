  career_goals: Although retired from full-time employment, Katie aims to deepen her involvement in the Louisville community. She plans to complete her associate's degree in Business Administration, chair
    the senior programming committee at the local community center, and launch a volunteer mentorship program for younger adults. She also hopes to author a cookbook featuring Kentucky family recipes and
    to travel with her husband to historic sites across the U.S., using these experiences to enrich her volunteer work.
