  career_goals: Lila aims to complete her GED within the next year and enroll in an apprenticeship program that leads to journeyman painter certification. In the medium term, she hopes to become a lead
    painter on larger residential projects, developing supervisory skills while maintaining a supportive work environment. Ultimately, she aspires to launch her own small contracting business focused on
    quality interior finishes, offering reliable, courteous service to her community and providing a stable livelihood for herself and her family.
