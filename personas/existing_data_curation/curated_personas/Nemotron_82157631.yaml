  hobbies: '[''Gardening (vegetables and herbs)'', ''Traditional Peruvian Cooking'', ''Woodworking (small projects)'', ''Reading (history, biographies, folklore)'', ''Bird Watching'', ''Walking Nature Trails'',
    ''Listening to Andean and Afro‑Peruvian Music'']'
  career_goals: Although retired from formal employment, Sebastian aims to stay active by deepening his involvement in local volunteer programs, particularly those that assist seniors and new immigrants.
    He hopes to organize a small community cooking class where he can share Peruvian recipes and teach basic nutrition. A personal ambition is to travel back to Peru to visit his ancestral hometown and
    document family stories for future generations. He also seeks to maintain his health through regular walking, gardening, and mental stimulation, ensuring he can continue to support his wife and neighbors.
