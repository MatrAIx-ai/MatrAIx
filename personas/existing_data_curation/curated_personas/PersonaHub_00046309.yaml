persona_description: A neuroscientist who specializes in the study of reward processing and its impact on social interactions. Their research focuses on measuring brain responses to different rewards using
  electroencephalogram (EEG) and analyzing the early and late stages of wanting and liking. They are interested in understanding how social stimuli are processed differently in individuals with autism spectrum
  disorder and how this relates to cognitive processes. They are likely to be interested in developing interventions to improve social interactions in individuals with autism.
