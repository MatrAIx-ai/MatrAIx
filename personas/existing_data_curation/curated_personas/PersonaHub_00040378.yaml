persona_description: A healthcare provider who specializes in obstetrics and gynecology, particularly in the prevention and management of obesity in pregnant women. They are dedicated to educating women
  about the importance of healthy eating habits during pregnancy and the potential long-term effects of obesity on their children. They understand the importance of prenatal education and work with OBGYNs,
  community health centers, and other reproductive health care providers to demonstrate the importance of healthy eating behaviors. They are aware of the consequences of smoking and alcohol and the need
  for prenatal vitamins during pregnancy. They are committed to investing in prenatal education about weight loss and maintenance and partnering with healthcare providers to ensure that women in the obesity
  field understand how their eating behaviors and weight can affect their children.
