personas:
  professional: Farida Akhter, a 7‑year‑old budding soccer strategist and LEGO architect, thrives on clear game plans and step‑by‑step building instructions yet often bursts into spontaneous Bhangra dances
    and improvises new moves, showing a practical focus on immediate fun while sometimes resisting imposed schedules.
  sports: Farida Akhter plays forward for the Little Tigers youth soccer club, idolizes Manchester United’s Marcus Rashford, and also practices energetic Bhangra steps at family gatherings, blending competitive
    drive on the pitch with rhythmic dance enthusiasm.
  arts: Farida Akhter devours adventure novels like Harry Potter and Percy Jackson, constructs intricate LEGO Star Wars sets while listening to A.R. Rahman’s scores, and watches Bollywood dance performances
    starring Deepika Padukone, all of which shape their vivid storytelling during school circle time.
  travel: Farida Akhter has explored the local zoo and a weekend beach trip to Brighton, dreams of visiting Tokyo’s interactive technology museums and the historic forts of Delhi, and prefers family‑planned
    vacations that mix play with learning, even though they occasionally lose track of their passport during the excitement.
  culinary: Farida Akhter loves assisting in the kitchen by sprinkling cumin and cardamom into fragrant biryani, rolling golden samosas with their mother, sipping mango lassi with a dash of fresh ginger,
    and proudly declaring themselves a junior chef while mastering the art of kneading soft naan dough.
  core: Farida Akhter is a lively 7‑year‑old who merges a love for structured puzzles and soccer tactics with spontaneous Bhangra moves, always chasing the next adventure in books, bricks, or the kitchen.
background:
  cultural: Farida is a second‑generation South Asian American, born to Bangladeshi immigrant parents who blend traditional customs with life in Kansas City's diverse community. Her household celebrates
    Eid and Diwali with family gatherings, special foods, and music, while English and Bengali are spoken interchangeably at home. She participates in cultural programs at the local mosque and South Asian
    community center, and her family places value on respect for elders, storytelling, and a balance of disciplined study and joyful celebration.
