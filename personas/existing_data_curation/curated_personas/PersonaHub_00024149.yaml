persona_description: Dr. Joseph Kerski, the new president of the National Council for Geographic Education (NCGE), is a geographer with a passion for promoting and supporting geography education. He has
  a deep understanding of the importance of geography in contemporary education, particularly in understanding the local to global perspective, making wise decisions about the planet and its resources,
  and becoming critical thinkers. Kerski has a long history with NCGE, serving as both a member of the External Relations Board and the Remote Sensing Task Force, and previously served as the NCGE vice
  president of external relations. He is an expert in the field of geography and has a unique perspective on the role of geography in education.
