  career_goals: Alejandro aims to enroll in an associate degree program in Graphic Design at a local community college, followed by a bachelor's in Visual Arts. He aspires to work as a creative director
    for a cultural nonprofit that promotes Latinx and Cuban heritage, or to build a successful freelance career creating branding, illustration, and digital media for community organizations. A long-term
    ambition is to develop an online platform that showcases emerging Cuban-American artists and provides mentorship opportunities. He seeks a role that balances structured project management—leveraging
    his reliability and methodical approach—with ample creative freedom to explore novel artistic concepts. Alejandro also plans to obtain professional certifications in Adobe Creative Cloud to enhance
    his technical credibility.
