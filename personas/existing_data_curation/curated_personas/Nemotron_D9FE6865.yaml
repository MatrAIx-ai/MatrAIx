personas:
  professional: A budding graphic designer Alejandro Rodriguez blends digital illustration prowess with methodical project planning, leveraging Adobe Photoshop and Illustrator to craft socially resonant
    branding for community nonprofits while mentoring emerging artists, and they thrive in collaborative environments.
  sports: An outdoors‑enthusiast Alejandro Rodriguez enjoys weekend hikes along the South Downs foothills and supports Brighton & Hove Albion FC, while they participate in community running clubs and occasionally
    join a local amateur football league for friendly matches.
  arts: A passionate creator Alejandro Rodriguez immerses themselves in painting and sketching abstract and figurative works, draws inspiration from artists such as Jean‑Michel Basquiat and contemporary
    indie musician Bon Iver, attends live salsa nights featuring Afro‑Cuban jazz bands, and writes poetry that echoes the cadence of Maya Angelou’s verse.
  travel: An adventurous Alejandro Rodriguez prefers meticulously planned short getaways, often exploring coastal towns like Whitby and vibrant cities such as Barcelona, while they dream of wandering the
    colorful streets of Havana for artistic inspiration but balance travel with their limited student budget.
  culinary: A culinary enthusiast Alejandro Rodriguez enjoys coaxing bold flavors from traditional dishes like ropa vieja and sweet fried plantains, often seasoning with cumin, paprika, and fresh cilantro,
    and they relish experimenting with new sauces while occasionally ordering take‑out sushi during busy weeks.
  core: A creatively driven Alejandro Rodriguez channels artistic energy into vibrant illustrations and heartfelt poetry, balances a methodical planner’s mindset with spontaneous art‑supply splurges, and
    combats chronic overthinking with daily mindfulness sessions.
background:
  cultural: Alejandro is a second-generation Cuban American whose parents immigrated from Cuba in the late 1990s. He grew up in a bilingual household where Spanish was spoken daily, and family gatherings
    featured Cuban music, dance, and food, fostering a strong sense of cultural pride. The values of family cohesion, respect for elders, and community service were emphasized, influencing his cooperative
    yet assertive demeanor. While living in Brighton, Colorado, Alejandro actively participates in local multicultural festivals, often contributing artwork that reflects his Cuban heritage. He blends traditional
    Cuban motifs—bright colors, rhythmic patterns, and nostalgic imagery—with contemporary American art trends, creating a hybrid visual language. His bilingual ability enables him to serve as a cultural
    bridge, translating community resources and facilitating dialogue between Cuban-American residents and the broader local population. This cultural duality informs both his artistic expression and his
    desire to promote representation for Latinx voices in the arts.
