  career_goals: Mason aims to move into a senior software architect role within the next three years, where he can lead cross‑functional teams to design enterprise‑grade, cloud‑native solutions. He wants
    to deepen his expertise in distributed systems and edge computing, and eventually launch a boutique consultancy that blends technology with immersive art experiences such as interactive installations
    and AR/VR platforms. Alongside his professional advancement, Mason plans to contribute to open‑source devops projects, speak at regional tech conferences, and mentor junior developers while maintaining
    a healthy work‑life balance for his family.
