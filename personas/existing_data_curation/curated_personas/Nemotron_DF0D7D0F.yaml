  hobbies: '[''Watercolor painting'', ''Knitting and crocheting'', ''Birdwatching'', ''Gardening (vegetables and herbs)'', ''Reading historical fiction'', ''Listening to classic jazz and blues'', ''Solving
    crossword puzzles'', ''Attending small art exhibitions'', ''Writing journal/memoir'']'
  career_goals: Although she is officially retired, Sandra still aims to leave a tangible legacy of her knowledge for the next generation of custodial workers. She hopes to compile a small handbook of cleaning
    best practices and safety tips that can be used by her former building’s staff. Sandra also wishes to remain actively involved in her community by offering occasional informal art‑appreciation talks
    at the local senior center and by volunteering to help preserve the historic façade of the downtown building she cares for. Maintaining her health and independence, staying socially connected in small,
    familiar groups, and being recognized by her peers for a lifetime of dedication are central to her personal ambitions.
