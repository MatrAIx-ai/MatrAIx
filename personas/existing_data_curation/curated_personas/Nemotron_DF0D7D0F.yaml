personas:
  professional: Sandra Pye, a retired building custodian with five decades of expertise in EPA‑compliant cleaning, floor care, minor repairs, inventory management, and staff mentorship, channels their lifelong
    curiosity and relaxed, flexible approach into meticulous art‑preservation advice for the facilities they still tend, even if occasional disorganization leads them to scribble last‑minute notes in a
    well‑worn notebook.
  sports: Sandra Pye enjoys gentle morning walks through the nearby forest preserve and follows the Mississippi Braves baseball team with modest enthusiasm, occasionally joining a senior‑center chair‑yoga
    class that keeps them moving without the strain of high‑impact sports.
  arts: Sandra Pye spends afternoons watercolor‑painting oak‑lined streets inspired by Claude Monet, listens to classic jazz and blues records from Ella Fitzgerald and B.B. King, relishes visits to the
    Mississippi Arts Center to view works by Walter Anderson, and escapes into historical novels by William Faulkner that transport them to the Old South.
  travel: Sandra Pye prefers low‑key road trips in a trusted sedan, often touring nearby historic towns such as Natchez and Oxford, dreaming of a future visit to New Orleans’ French Quarter for its jazz
    heritage, while occasionally joining a senior‑group bus to the Gulf Coast’s quiet beaches for a brief, relaxing escape.
  culinary: Sandra Pye, an adept home cook, often prepares Southern staples like fried catfish with hush‑puppies, collard greens seasoned with smoked turkey, and buttery buttermilk biscuits using fresh
    garden tomatoes, corn, and squash, while savoring a glass of sweet tea and occasionally treating themselves to a comforting blueberry crumble from a local bakery.
  core: Sandra Pye, an 87‑year‑old retired custodian, balances a meticulous eye for cleaning with a gentle, art‑driven curiosity, occasional forgetfulness, and a quiet resolve to share their legacy despite
    lingering worries about health and memory.
background:
  cultural: Sandra was born in the early 1930s to a white, working‑class family in rural Mississippi and spent most of her life in the Deep South. Her upbringing was shaped by Southern Methodist church
    traditions, a strong emphasis on family, community hospitality, and the rhythms of rural life. She grew up during the era of segregation and later witnessed the Civil Rights movement, experiences that
    have given her a nuanced perspective on Mississippi’s social changes. Local customs such as church potlucks, seasonal celebrations, and a love of Southern cuisine—fried chicken, collard greens, cornbread,
    and fresh‑picked tomatoes—remain important to her. The region’s musical heritage of blues, gospel, and country, as well as the natural landscape of pine forests, rivers, and bayous, continue to influence
    her artistic interests and daily life.
