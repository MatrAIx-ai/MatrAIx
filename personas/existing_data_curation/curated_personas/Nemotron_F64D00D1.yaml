  hobbies: '["Fishing", "Hiking", "Classic Car Restoration", "Barbecue Cooking", "Acoustic Guitar", "Reading (History, Technology)", "Community Gardening", "Drone Photography", "Attending Local Music Festivals"]'
  career_goals: Looking ahead, Samuel aims to step into a senior operations leadership role—such as Director of Operations—within a midsize manufacturing or logistics firm in the Austin‑Round Rock corridor.
    He wants to drive large‑scale efficiency programs that marry cost savings with employee well‑being, championing flexible work practices that reflect his own preference for adaptability. Over the next
    five years, he plans to earn a Six Sigma Black Belt and deepen his expertise in digital supply‑chain tools, positioning himself as a bridge between traditional operations and emerging technologies.
    Ultimately, he envisions launching a boutique consulting practice that helps Texas‑based small businesses streamline processes while preserving the community‑first culture he values. Mentorship is also
    central to his ambition; he hopes to formalize a mentorship program to guide emerging managers in balancing curiosity with practical decision‑making.
