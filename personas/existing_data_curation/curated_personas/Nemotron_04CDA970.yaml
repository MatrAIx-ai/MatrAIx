  career_goals: Looking ahead, Michelle aspires to a career that offers stability, clear structure, and the chance to serve her community. Guided by her organized and reliable nature, she envisions becoming
    a school administrator or a health‑care aide where routine and methodical work are valued. Alternatively, she may pursue a role as a library assistant or office manager, positions that allow her to
    apply her natural attention to detail and her caring, compassionate side while maintaining a balanced work‑life routine.
