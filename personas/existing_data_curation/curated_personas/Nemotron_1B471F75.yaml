  career_goals: She aims to progress from cashier to shift supervisor within the next two years, leveraging her associate’s degree to obtain a store manager position. Long‑term, she envisions opening a
    boutique coffee shop that doubles as an art gallery, where she can merge her business acumen with her passion for the arts. To support this, she plans to enroll in a bachelor’s program in Business Management
    while attending workshops in small‑business finance and community arts administration. She also aspires to mentor younger employees, fostering a workplace culture that values both efficiency and creative
    expression.
