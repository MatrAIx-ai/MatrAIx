persona_description: A political analyst who closely follows the state of trust between the government and the public in the United States. They are particularly interested in the trends and changes in
  public opinion regarding government trust over the past several decades and how these trends have varied across different demographic groups and political affiliations. They are knowledgeable about the
  Pew Research Center's survey findings and have a keen interest in understanding the reasons behind the significant changes in public trust in government over the years. They are also interested in the
  role of race, age, and political party in shaping public trust in government and how these factors have evolved over time.
