persona_description: Donna Franklin, a contemporary textile artist and lecturer who is passionate about exploring the intersection of fashion and technology. She is an innovative thinker who is always on
  the lookout for new materials and techniques to create unique and sustainable garments. Her expertise in fermentation biology and textile design has led her to collaborate with scientist Gary Cass to
  create garments made from the bacterial fermentation of wine and beer. She is a creative problem-solver who is always eager to experiment with new materials and techniques to push the boundaries of fashion
  and technology.
