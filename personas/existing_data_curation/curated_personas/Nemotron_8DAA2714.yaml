  career_goals: Michelle aims to leverage her business education and sociable personality into a dynamic career in event marketing and brand promotion. In the short term, she plans to enroll in a bachelor's
    program in Marketing or Communications, secure an internship with a regional agency, and grow a personal lifestyle blog focusing on community events in Findlay. She also wants to obtain certifications
    in digital marketing such as Google Analytics and Meta Blueprint. Long‑term, she envisions becoming a senior event marketing manager, leading large‑scale campaigns for Midwestern brands, or launching
    her own boutique event‑planning consultancy that emphasizes personalized, data‑driven experiences for local businesses and nonprofits. Her ambition includes building a reputation as a go‑to connector
    in her community, merging structured project planning with creative flexibility.
