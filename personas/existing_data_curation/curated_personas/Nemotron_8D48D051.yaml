personas:
  professional: Huy Mai, a 67-year-old facilities maintenance veteran, brings meticulous floor-care expertise, EPA-approved green-cleaning practices, and bilingual mentorship to the role they seek as a
    Facilities Maintenance Coordinator, championing eco-friendly protocols in art galleries.
  sports: Huy Mai, an active 67-year-old senior, joins community dance classes thrice weekly, walks the nearby river trail each morning, cheers for the Charlotte Hornets during games, and they belong to
    a local walking club that meets for weekend hikes in the Blue Ridge Mountains.
  arts: Huy Mai, a dedicated 67-year-old art enthusiast, frequents the Mint Museum and regional exhibitions, studies works by contemporary creators such as Yayoi Kusama and James Turrell, captures street
    scenes a la Steve McCurry with a vintage camera, practices watercolor landscapes, and they draw inspiration from The Rolling Stones' album art and traditional folk melodies for their own creative projects.
  travel: Huy Mai, a curious 67-year-old, plans trips that blend leisure and cultural immersion, prefers modest, self-guided weekend getaways to Asheville's Blue Ridge scenery, yearns for future visits
    to Kyoto's historic temples and Milan's design districts, and they balance travel budgeting with family commitments by using senior discounts and off-season bookings.
  culinary: Huy Mai, a passionate 67-year-old home chef, experiments with fusion dishes like shrimp-and-grits infused with lemongrass broth, pulled-pork sandwiches on crusty baguettes with pickled vegetables,
    and spicy gumbo spiked with star-anise, relies on fresh basil, cilantro, fish sauce, and smoked paprika, and they host weekly family meals that showcase both Southern comfort and aromatic Asian flavors.
  core: Huy Mai, a 67-year-old lifelong caretaker, blends meticulous green-cleaning expertise with an insatiable curiosity for art, grooves to classic rock, mentors junior staff, and they can't resist rearranging
    cleaning supplies by color even when the phone rings.
background:
  cultural: Born to Vietnamese immigrant parents who settled in the Carolinas after the Vietnam War, Huy maintains a strong connection to his Southeast Asian heritage while embracing the Southern culture
    of North Carolina. At home, Vietnamese language, cuisine, and traditions such as Tet (Lunar New Year) and the Mid‑Autumn Festival are celebrated with family and neighbors. He is fluent in both Vietnamese
    and English, often acting as a bridge between the local Vietnamese community and the broader Matthews area. His upbringing emphasized respect for elders, the value of hard work, and communal responsibility,
    which inform his reliable and cooperative personality. Over the years, Huy has integrated Southern hospitality into his daily interactions, enjoying local barbecues, neighborly gatherings, and the slower‑paced
    community life of Matthews, while preserving and sharing his cultural roots through food, language, and participation in cultural events.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care and polishing'', ''Carpet and upholstery extraction'', ''Window washing'', ''Basic plumbing and electrical troubleshooting'', ''Health and safety compliance'',
    ''Inventory management'', ''Scheduling and record‑keeping'', ''Team leadership and training'', ''Bilingual communication (Vietnamese/English)'', ''Art‑sensitive cleaning techniques'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Photography of architecture'', ''Gardening and growing herbs'', ''Cooking Vietnamese and Southern fusion dishes'', ''Mahjong
    with community seniors'', ''Attending Tet and cultural festivals'', ''Volunteering for community event setup'', ''Senior dance classes'', ''Listening to classic rock and Vietnamese folk music'']'
  career_goals: Huy aims to transition into a supervisory role as a Facilities Maintenance Coordinator within his current building, securing a green‑cleaning certification to champion environmentally friendly
    practices. He hopes to mentor younger janitorial staff, formalizing a mentorship program that blends his organized approach with his collaborative spirit. Looking ahead to retirement, he envisions starting
    a part‑time consulting service that offers eco‑conscious cleaning solutions to local art galleries and community centers, allowing him to stay engaged with his love of art while sharing his cultural
    perspective. Additionally, he aspires to participate in community outreach workshops that teach sustainable cleaning methods to senior volunteers and immigrant youth.
