persona_description: An Ethernet network administrator who is responsible for managing and maintaining a network infrastructure that includes both full duplex and half duplex connections. They are skilled
  in implementing and troubleshooting CSMA/CD protocols, and are familiar with the various types of collision domains that can exist within an Ethernet network. They are also aware of the limitations of
  repeaters and bridges, and how they can affect the performance and reliability of a network. They are likely to be working in an office environment, and have a strong interest in network security and
  performance optimization.
