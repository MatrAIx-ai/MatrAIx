personas:
  professional: Portia Jackson, a 32-year-old seasoned carpenter in El Paso, blends a decade of custom furniture design, framing, and sustainable material expertise with a flexible, curiosity-driven approach
    that lets them juggle project timelines despite a relaxed, sometimes disorganized work style, while championing mentorship for women and minorities in the trades.
  sports: Portia Jackson fuels their love of the outdoors by regularly tackling the rugged trails of Franklin Mountains State Park with the El Paso Hiking Club, while cheering on the El Paso Locomotive
    FC in the USL and occasionally joining a weekend pickup basketball game at the local community center.
  arts: Portia Jackson channels their creative energy through acoustic-guitar jam sessions covering B.B. King and Leon Bridges, while soaking up the soulful narratives of Aretha Franklin and the speculative
    depth of Octavia Butler's science-fiction novels, which together inform the lyrical motifs in their custom-carved wooden art.
  travel: Portia Jackson prefers spur-of-the-moment road trips that combine scenic hikes with cultural stops, having already driven to Big Bend National Park and a weekend music festival in Austin, while
    dreaming of a cross-border adventure to Oaxaca to explore its vibrant culinary scene.
  culinary: Portia Jackson experiments in the kitchen as a confident home chef, regularly whipping up chipotle-smoked brisket tacos topped with jalapeno-infused collard greens or southern-style chili cornbread
    with a swirl of honey-roasted sweet potatoes, and savoring the fresh acidity of lime and the smoky depth of mezcal during dinner gatherings.
  core: Portia Jackson blends a restless curiosity for sustainable woodcraft with a laid-back, sometimes forgetful approach to deadlines, channeling a competitive drive into mentoring while habitually misplacing
    tools in their own workshop.
background:
  cultural: Portia identifies as African American and draws strength from the legacy of Black craftsmanship and community solidarity. Growing up in a multicultural neighborhood of El Paso, she has also
    been deeply influenced by Hispanic culture, embracing bilingual communication, local food traditions, and the region's festive spirit. Her family’s roots trace back to the Southern United States, and
    she honors that heritage through storytelling, music, and a commitment to uplifting marginalized voices in the trades.
attributes:
  skills: '[''custom furniture design'', ''framing and structural carpentry'', ''cabinetry installation'', ''finish carpentry'', ''reclaimed material utilization'', ''blueprint reading'', ''basic CAD drafting'',
    ''tool maintenance and sharpening'', ''project timeline coordination'', ''apprentice mentorship'', ''OSHA safety compliance'']'
  hobbies: '[''DIY woodworking projects'', ''hiking in Franklin Mountains'', ''cooking Tex‑Mex and Southern dishes'', ''playing acoustic guitar'', ''listening to soul and blues music'', ''reading science‑fiction'',
    ''volunteering to teach carpentry to youth'']'
  career_goals: Portia aims to open a boutique woodworking studio in El Paso that offers bespoke furniture and eco‑friendly building solutions for the community. She plans to earn a Master Carpenter certification,
    deepen her expertise in sustainable construction practices, and become a recognized mentor for women and minorities entering the trades. Over the next five years, she intends to develop a line of locally
    sourced reclaimed‑wood pieces, secure a small‑business loan, collaborate with regional architects on green projects, and host free workshops that empower youth with basic carpentry skills.
