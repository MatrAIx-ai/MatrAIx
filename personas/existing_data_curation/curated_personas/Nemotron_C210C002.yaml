  hobbies: '[''drawing'', ''digital art'', ''graffiti art'', ''skateboarding'', ''soccer'', ''guitar playing'', ''salsa dancing'', ''video gaming (Fortnite, Minecraft)'', ''photography'', ''vlogging'',
