  career_goals: Hugo aims to develop a professional portfolio that will allow him to attend a renowned art school and eventually work as a multimedia artist, focusing on animation and digital storytelling.
    He hopes to combine his cultural heritage with his creative skills by producing content that showcases Nicaraguan narratives. In the short term, he plans to earn certifications in graphic design software
    (Adobe Photoshop, Illustrator) and create a YouTube channel where he shares tutorials and cultural vlogs. Long‑term, he envisions working for a studio that creates socially conscious media or leading
    community workshops that empower other immigrant teens to express themselves through art.
