persona_description: A respiratory therapist who specializes in the treatment and management of respiratory diseases such as chronic obstructive pulmonary disease (COPD) and other lung conditions. They
  are highly skilled in the use of recovery breathing techniques and pursed-lip breathing to minimize shortness of breath and improve overall respiratory function. They also have experience in teaching
  patients and clients how to increase their awareness of their breathing patterns and coordinate their breathing with daily activities. They are dedicated to helping their clients manage their respiratory
  conditions and live a healthy, active lifestyle.
