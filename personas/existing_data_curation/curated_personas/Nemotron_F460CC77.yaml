  hobbies: '[''Hiking and trail photography'', ''Yoga and mindfulness meditation'', ''Reading sci‑fi and popular‑science books'', ''Board games and puzzle solving'', ''DIY electronics and Arduino projects'',
    ''Community volunteering (STEM outreach at makerspace)'', ''Cooking healthy meals'', ''Nature journaling'']'
  career_goals: Janet aims to broaden her impact on STEM education by pursuing a master’s degree in curriculum and instruction within the next three years, which will enable her to transition into a lead
    instructional designer role for a regional tutoring organization. She also plans to launch a small‑scale, subscription‑based online tutoring platform focused on underserved students in Denver, incorporating
    evidence‑based teaching methods and interactive coding labs. Long‑term, she envisions founding a community STEM outreach program that partners with local schools and makerspaces to spark curiosity among
    middle‑school girls, aligning her professional growth with her passion for equity and mentorship.
