personas:
  professional: Janet Reagan is a seasoned STEM tutor who blends her curiosity for cutting‑edge educational technologies with a methodical, data‑driven approach to curriculum design, delivering clear, step‑by‑step
    lessons in mathematics, physics, and computer science while reliably managing a packed schedule of one‑on‑one sessions and workshops.
  sports: Janet Reagan fuels her fitness routine with weekend hikes on the Rockies, joins a local mountain‑bike club for Sunday rides, participates in seasonal trail‑running races, and cheers on the Colorado
    Avalanche and Denver Broncos while organizing friendly pick‑up soccer games with fellow tutors during spring.
  arts: Janet Reagan channels her creative side through nature photography, sketching alpine vistas, unwinding with science‑fiction novels by Anne Leigh Barrett, indie folk playlists featuring Sufjan Stevens
    and Fleet Foxes, and attending quarterly exhibitions at the Denver Art Museum, where she often discovers inspiration for her STEM lesson visualizations.
  travel: Janet Reagan plans trips with the same precision she uses for lesson plans, favoring meticulously scheduled weekend escapes to Rocky Mountain National Park and Great Sand Dunes, while dreaming
    of a spring trek through New Zealand’s South Island and a tech‑focused cultural tour of Tokyo, balancing budget constraints with the desire for immersive outdoor experiences.
  culinary: Janet Reagan enjoys cooking nutrient‑dense, seasonal meals—like quinoa‑cedar grain bowls with roasted beets, kale, and smoked salmon, or a miso‑glazed trout paired with locally sourced asparagus—leveraging
    her modest culinary skill to experiment with fresh herbs, seasonal produce, and occasional DIY fermented kombucha batches.
  core: Janet Reagan is a methodical STEM mentor who balances a love for mountain trails and gadget tinkering with disciplined budgeting, occasional lower‑back aches, and a habit of sketching every sunrise
    she catches on a hike.
background:
  cultural: Janet identifies as a white American raised in Denver, Colorado. Her upbringing reflects the region’s blend of suburban Midwest values and the progressive, outdoor‑oriented culture of the Rocky
    Mountain West. She grew up celebrating traditional American holidays such as Thanksgiving and Christmas while also participating in Denver’s multicultural festivals, which fostered an appreciation for
    the city’s diverse communities, including the Indigenous peoples whose histories shape the area. This background informs her respect for environmental stewardship, community involvement, and a commitment
    to inclusive education.
attributes:
  skills: '[''Mathematics (calculus, algebra)'', ''Physics (mechanics, electricity & magnetism)'', ''Computer Science (programming fundamentals, Python)'', ''Curriculum Development'', ''Differentiated Instruction'',
