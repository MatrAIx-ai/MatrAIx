  career_goals: Jacqueline aspires to attend a top STEM university, major in computer engineering or data science, and eventually become a software engineer specializing in cybersecurity or artificial intelligence.
    She is motivated to develop technology solutions that address inequities in her community, mentor other Black girls in STEM, and perhaps launch a startup focused on educational tech tools. Her long‑term
    ambition includes earning a master's degree and contributing to research that blends data science with public health.
