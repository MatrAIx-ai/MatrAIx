  hobbies: '[''Programming (Python, JavaScript)'', ''Arduino Electronics Projects'', ''Chess (Puzzle Solving)'', ''Science‑Fiction Reading'', ''Creative Writing (Short Stories, Poetry)'', ''Digital Art
