personas:
  professional: Jacqueline Lee is an aspiring teen technologist who fuses their curiosity for Arduino hardware with a disciplined, detail‑oriented coding style, channeling their competitive streak into
    school robotics competitions and their critical eye into rigorous debugging, while their penchant for solitary focus and occasional worry drives them to meticulously document every project in a structured
    journal.
  sports: Jacqueline Lee is a disciplined teen athlete who devotes early mornings to solo basketball drills at the local YMCA, follows the LSU Tigers football and New Orleans Pelicans basketball teams for
    strategic inspiration, and balances a structured cardio‑and‑strength routine with occasional participation in school track meets, though they often skip larger team socials due to their preference for
    focused, low‑key training environments.
  arts: Jacqueline Lee is a budding digital illustrator and poet who draws creative fuel from jazz legends Miles Davis and Ella Fitzgerald, hip‑hop poet Kendrick Lamar, R&B vocalist H.E.R., and sci‑fi author
    N.K. Jemisin, channeling those influences into weekly sketches of futuristic Creole cityscapes and verses that blend Southern folklore with speculative themes, and they often share their artwork on
    a school Discord channel for feedback.
  travel: Jacqueline Lee is a meticulous teen traveler who maps out weekend road trips to the historic French Quarter of New Orleans and the oak‑lined grounds of Oak Alley Plantation using a color‑coded
    spreadsheet, while secretly yearning to spend a summer abroad in Kyoto to explore its blend of tradition and technology, though they frequently postpone bookings because school projects and budget worries
    steal their focus.
  culinary: Jacqueline Lee is an eager teen home chef who perfects Creole classics like shrimp étouffée, jambalaya with smoked andouille sausage, and sweet beignets dusted with powdered sugar, mastering
    the art of a dark roux and balancing the heat of cayenne and hot sauce, while they occasionally over‑season and laugh at the extra spice that makes their family reach for extra water.
  core: Jacqueline Lee is a precision‑driven, curiosity‑fueled teen who balances a love for tinkering and poetry with a habit of over‑planning and occasional worry, and they turn solitary pursuits into
    meticulously organized projects that reflect both Southern community roots and a competitive spark.
background:
  cultural: Jacqueline is an African‑American teenager raised in Baton Rouge, Louisiana. She grows up in a close‑knit family that values church, community, and the rich cultural heritage of the South. Her
    upbringing blends Southern traditions—such as Mardi Gras celebrations, Creole cuisine, and gospel music—with the legacy of the civil‑rights movement that shaped Baton Rouge’s Black neighborhoods. She
    is proud of her ancestry, participates in Juneteenth events, and draws inspiration from local Black artists, musicians, and scholars. The multicultural environment of East Baton Rouge Parish, with its
    French‑Creole influences and strong sense of community resilience, informs her worldview and fuels her ambition to give back to her community through technology and mentorship.
attributes:
