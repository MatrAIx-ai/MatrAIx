  career_goals: Although not currently in the workforce, Franklin aims to channel his curiosity and love of art into community‑focused projects. He hopes to volunteer as a local history guide for the Osceola
    County Historical Society and eventually curate a small traveling exhibition of regional folk art. He also plans to develop a modest online presence—perhaps a blog or photo gallery—to share his photography
    and historical insights. A longer‑term ambition is to mentor younger hobbyists in DIY woodworking and gardening, turning his eclectic skills into a modest side‑business that remains flexible and low‑stress.
