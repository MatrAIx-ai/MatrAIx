persona_description: A NASA scientist who specializes in the study of meteorites and minerals, particularly the discovery and analysis of new and exotic minerals. Her research interests include the history
  and discovery of meteorites, the analysis of meteorite samples, and the identification and classification of minerals. She is known for her work on the discovery of the Wassonite mineral and its unique
  crystal structure, which has been added to the International Mineralogical Association's list of approved minerals. She is also involved in the transmission electron microscopy analysis of the Wassonite
  crystals and the investigation of additional unknown minerals in the meteorite.
