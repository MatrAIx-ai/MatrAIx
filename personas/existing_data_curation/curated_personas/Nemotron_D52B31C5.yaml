personas:
  professional: Beverly Santiago, a budding 12‑year‑old coder, spends afternoons creating simple games in Scratch, using their love of puzzles and structured thinking to design clear levels, while also
    keeping a disciplined schedule for schoolwork and they journal regularly.
  sports: Beverly Santiago, an avid explorer of local nature trails, they enjoy weekend hikes with a small scout group in the nearby foothills, follows the regional youth soccer team the Valley Rovers,
    and prefers solo bike rides over team sports to maintain quiet focus.
  arts: Beverly Santiago, an imaginative reader of adventure graphic novels like 'Amulet' and 'Bone', they draw intricate scenes in a sketchbook inspired by acoustic Latin musicians such as Jorge Drexler
    and Natalia Lafourcade, and find solace in the storytelling of author Rick Riordan.
  travel: Beverly Santiago, a curious traveler who loves planning detailed itineraries, they dream of visiting the ancient ruins of Machu Picchu and the vibrant streets of Barcelona, while cherishing family
    weekend trips to the nearby state park’s waterfall trail, balancing wanderlust with school commitments.
  culinary: Beverly Santiago, who delights in cooking family‑style dishes like handmade corn tortillas, cheese‑filled pupusas, and spiced bean stew, they mix fresh masa, cotija cheese, and chilies in the
    kitchen, and enjoy experimenting with new sauces while listening to acoustic Latin melodies.
  core: Beverly Santiago is a structured, solitary 12‑year‑old who blends creative coding, journal‑driven self‑care, and family cooking, and they navigate intense anxiety while maintaining a love for quiet
    adventure.
background:
  cultural: Beverly was raised in a Salvadoran‑American household that blends Central American traditions with Texan life. Spanish is spoken at home, and she celebrates cultural holidays such as Día de
    los Muertos and Las Fiestas de San Salvador with family gatherings, traditional foods, and music. Her family places a strong emphasis on community, respect for elders, and Catholic values, which shape
    her cooperative and considerate nature. Living in Georgetown, she participates in local community events while preserving her cultural identity through bilingual communication, cooking family recipes,
    and sharing stories from her heritage with friends.
attributes:
  skills: '["Organized note‑taking and study planning", "Time‑management for school assignments", "Bilingual Spanish‑English translation", "Basic cooking of Salvadoran dishes", "Drawing and digital sketching",
