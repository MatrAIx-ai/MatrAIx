  hobbies: '["Reading adventure and graphic novels", "Drawing and sketching", "Journaling for self‑reflection", "Cooking Salvadoran dishes with family", "Listening to acoustic Latin music", "Exploring nature
    trails in Georgetown", "Solving puzzles and brain teasers", "Creating simple games in Scratch"]'
  career_goals: Beverly dreams of a future where she can combine her love of structure, quiet environments, and helping others. She aims to pursue a degree in library science and become a school librarian,
    creating organized, calm spaces for students to read and study. She also hopes to develop a bilingual collection that reflects her Salvadoran heritage, allowing younger students to see their culture
    represented in school libraries. In the longer term, she envisions mentoring younger children and possibly volunteering in community literacy programs.
