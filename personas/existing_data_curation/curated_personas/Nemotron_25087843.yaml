  hobbies: '["Gardening", "Knitting", "Reading historical fiction", "Hiking in the Berkshires", "Baking", "Visiting farmers'' market", "Volunteering at community garden", "Book club", "Playing piano", "Quilting"]'
  career_goals: Mary aims to deepen her expertise in quality assurance and eventually move into a senior supervisory role where she can lead a small team of inspectors. She is interested in obtaining a
    Certified Quality Engineer (CQE) credential from the American Society for Quality to formalize her skills. While she values stability and a predictable work schedule, she also hopes to mentor younger
    employees and contribute to continuous improvement initiatives at her plant. Long‑term, she plans to transition into a part‑time consulting role in quality compliance, allowing her more flexibility
    for her personal interests and family life as she approaches retirement.
