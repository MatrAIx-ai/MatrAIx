  hobbies: '[''motorcycle restoration'', ''custom woodworking'', ''hunting'', ''fishing'', ''hiking'', ''photography'', ''skeet shooting'', ''chess'', ''strategic board games'', ''historical nonfiction
    reading'', ''genealogy research'', ''classic rock vinyl collection'']'
  career_goals: Kyle aims to turn his hands‑on abilities into a modest handyman business focused on rural homeowners, pursuing certification as a solar installer and possibly an HVAC technician. He also
    plans to complete the remaining credits toward an associate's degree in business management, so he can better market his services. Additionally, he hopes to qualify for the regional skeet shooting championships,
    using the competition as a personal benchmark of skill and perseverance, and to mentor younger hobbyists in practical trades.
