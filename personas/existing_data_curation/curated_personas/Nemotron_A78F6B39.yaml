personas:
  professional: Kyle Callis, a 51‑year‑old aspiring handyman entrepreneur, leverages his mechanical, carpentry, and DIY electronics expertise to launch a modest rural‑home services business while pursuing
    solar‑installer certification, an HVAC technician credential, and an associate’s degree in business management, and they approach each project with a blend of skeptical curiosity and practical perseverance
    that makes them both a reliable fixer and a competitive bid‑winner in local contracts.
  sports: Kyle Callis combines a love for the outdoors with a competitive edge, they hunt elk in the Wasatch range during fall, fish for trout in early summer, regularly compete in local skeet shooting
    tournaments while cheering for the Utah Jazz and Utah Utes football, and maintain fitness through weekend hikes, occasional cross‑country skiing, and a modest home gym where they practice bodyweight
    exercises.
  arts: Kyle Callis curates a growing collection of classic‑rock vinyl—from Led Zeppelin to The Rolling Stones—while spinning records on a vintage turntable, they enjoy photographing mountain vistas during
    hikes, indulge in historical nonfiction by authors like David McCullough, and occasionally unwind by playing acoustic guitar along to their favorite tracks, all of which shape their creative downtime.
  travel: Kyle Callis prefers road‑trip adventures that blend photography, fishing, and modest camping, they have already explored Yellowstone and the Colorado Rockies, dream of a winter trek to Patagonia,
    and generally plan itineraries on the fly, balancing budget constraints with a desire to capture stunning landscapes and test new gear in remote settings.
  culinary: Kyle Callis delights in cooking hearty, outdoors‑inspired meals—grilling wild‑caught trout with lemon‑dill butter, simmering elk stew with root vegetables, and perfecting a smoky brisket using
    a backyard smoker—while they experiment with wood‑smoked paprika and fresh herbs, though they often neglect dishwashing until the next day.
  core: Kyle Callis is a hands‑on, competitively curious 51‑year‑old who blends rugged outdoor hobbies with a pragmatic, slightly disorganized lifestyle that fuels both their handyman business ambitions
    and their love for vintage motorcycles, classic‑rock vinyl, and spontaneous mountain photography.
background:
  cultural: Kyle grew up in rural Davis County, Utah, within a white, second‑generation farming family that valued self‑reliance, hard work, and outdoor recreation. While his community had strong ties to
    the local LDS culture, his upbringing emphasized practical independence over formal religious affiliation. This frontier‑pioneer legacy shapes his appreciation for rugged individualism, community fairs,
    and a conservative work ethic, while also fostering a respect for the natural landscape of the Intermountain West.
