  hobbies: '[''Community softball league'', ''Fishing on the Lehigh River'', ''Vintage car restoration'', ''Stagehand for community theater'', ''Hiking the Appalachian Trail'', ''Live music at local venues'',
    ''Backyard barbecues'']'
  career_goals: Looking ahead, Thomas hopes to earn a commercial driver's licence (CDL) and complete the DOT's safety certification program to qualify for a supervisory shift-lead position at the transportation
    hub. He is interested in mentoring newer attendants, developing a mentorship program, and eventually moving into a logistics coordinator role that would let him design more efficient passenger routes.
    He also dreams of starting a weekend side business fixing and restoring classic cars, merging his curiosity for mechanics with a practical income stream.
