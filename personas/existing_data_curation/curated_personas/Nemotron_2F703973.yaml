    and stakeholder briefing'', ''Team collaboration in fast-paced settings'']'
  hobbies: '[''Running (local 5K races)'', ''Community soccer league'', ''Board game nights'', ''Escape room challenges'', ''Tech meetups and cybersecurity conferences'', ''Cooking experimental meals'',
    ''Vegetable gardening'', ''Yoga and mindfulness meditation'', ''Volunteer teaching coding and online safety to middle-school students'', ''Traveling to explore new cities'']'
  career_goals: Leneta aims to move from an analyst role to senior leadership in cybersecurity within the next five to seven years. She plans to earn CISSP, CISM and OSCP certifications, deepen her expertise
    in cloud security and AI-driven threat hunting, and ultimately lead a Security Operations Center or serve as a Chief Information Security Officer. Her competitive drive pushes her to be recognized as
    a regional expert, presenting at conferences and publishing threat research. She also hopes to mentor junior analysts, build a culture of proactive security within her organization, and maintain a flexible
    schedule that supports her personal well-being and family life.
