persona_description: A conservation scientist and researcher who specializes in the study of the impacts of climate change on the ecosystem, particularly on the northern jarrah forests of Western Australia.
  She is concerned about the ongoing tree die-offs and the potential for pests to invade the area due to the high heat and low rainfall. Her research focuses on the impact of climate change on forest health
  and the effectiveness of conservation efforts to protect the area. She is also interested in the role of human activities, such as deforestation and land use changes, in exacerbating the situation.
