  hobbies: '[''Basketball'', ''Soccer'', ''Robotics club'', ''Scratch programming'', ''Science‑fiction reading'', ''LEGO building'', ''Community center volunteering'', ''Hip‑hop and R&B listening'', ''Sketching/drawing'']'
  career_goals: Derrick aspires to pursue a career in civil engineering or urban planning, aiming to design safe, sustainable community spaces that improve the quality of life in his neighborhood. He also
    envisions a future role as a mentor or youth leader, sharing his love of STEM and collaborative teamwork with younger students. Long‑term, he hopes to blend technical expertise with community service,
    potentially leading projects that address local infrastructure needs while fostering inclusive, supportive environments.
