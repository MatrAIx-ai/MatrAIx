personas:
  professional: Daniel Peters, a veteran project manager turned senior consultant, blends three decades of manufacturing and construction expertise with a methodical, schedule‑driven approach, using their
    personable communication style to mentor junior staff and steer local infrastructure initiatives while maintaining a reputation for reliable, results‑oriented delivery.
  sports: Daniel Peters stays active through a weekly men’s bowling league, follows the Detroit Lions and Detroit Tigers loyally, casts a fishing line at Lake Orion during summer weekends, and participates
    in a local senior fitness class that emphasizes low‑impact cardio and balance exercises.
  arts: Daniel Peters volunteers as stage manager for the community theater, enjoys classic movie nights featuring films like Casablanca, and regularly listens to Frank Sinatra and Louis Armstrong, finding
    both the theatre’s backstage hustle and timeless jazz soothing to their sociable, talkative nature.
  travel: Daniel Peters prefers meticulously planned road trips, often visiting historic Michigan sites such as Mackinac Island and the Henry Ford Museum, while dreaming of a guided tour of colonial Williamsburg
    and a relaxed cruise to the Caribbean once retirement provides more free time.
  culinary: Daniel Peters loves cooking hearty Midwestern comfort dishes—pot roast, chicken‑and‑dumplings, and homemade apple pie—using fresh herbs from their backyard garden and occasionally grilling lake‑caught
    perch, though they sometimes over‑salt their casseroles in the rush of hosting family gatherings.
  core: Daniel Peters is a routine‑driven, talkative senior consultant who blends meticulous project planning with community theater stage‑craft, yet can’t resist a late‑night snack of over‑salted casserole
    and tends to forget to stretch before woodworking.
background:
  cultural: 'Daniel was born and raised in the suburban Detroit area and has spent his entire adult life in Oakland County, Michigan. His family’s roots trace back to German and Irish immigrants who settled
    in the Great Lakes region in the early 20th century. He grew up with Midwestern values: hard work, practicality, community involvement, and a strong sense of loyalty to family and friends. He regularly
    attends a local Presbyterian church, where fellowship and service are emphasized. The regional culture of modesty, reliability, and appreciation for seasonal traditions—like county fairs, fishing trips,
    and community theater—has shaped his worldview and daily habits.'
