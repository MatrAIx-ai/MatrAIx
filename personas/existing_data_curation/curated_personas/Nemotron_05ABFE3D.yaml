  hobbies: '[''Pick‑up basketball'', ''Live R&B and hip‑hop concerts'', ''Exploring coffee shops and food trucks'', ''Improv comedy workshops'', ''Reading contemporary African‑American literature'', ''Competitive
    video gaming'', ''Weekend road trips with friends'', ''Volunteer event organization at local festivals'']'
  career_goals: In the short term, Jarvis aims to earn a Six Sigma Green Belt and take on lead‑coordinate projects that let him apply his process‑improvement ideas. Over the next three to five years, he
    hopes to advance to an Operations Manager role within a fast‑growing tech or e‑commerce firm in Texas, where he can shape strategy, mentor junior staff, and drive measurable efficiency gains. Long‑term,
    Jarvis envisions launching his own consulting practice focused on agile, people‑centric operations that help small businesses and nonprofit organizations streamline workflows while preserving a culture
    of flexibility and innovation. He plans to pursue an MBA to deepen his strategic and financial expertise, and he sees his competitive nature as a catalyst for continual professional advancement.
