  career_goals: Miguel aims to become a senior audit manager within the next five years and eventually attain a partnership position at a regional accounting firm. He plans to obtain his CPA license (if
    not already) and a Certified Internal Auditor (CIA) designation to bolster his credentials. He also hopes to launch a boutique forensic accounting consultancy that helps small businesses in the Florence
    area navigate financial fraud and tax issues, leveraging his curiosity for new investigative tools. Balancing his drive for professional advancement with his desire for a more flexible schedule, he
    seeks a role that allows him to mentor younger accountants while maintaining a healthier work‑life balance to manage his anxiety.
