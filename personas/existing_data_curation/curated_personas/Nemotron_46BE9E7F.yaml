personas:
  professional: Miguel Leal is a seasoned accountant and auditor who blends GAAP expertise, advanced Excel and Python audit analytics, and a curiosity for blockchain and AI to deliver meticulous financial
    reporting while mentoring junior staff with the same energetic, sociable flair they bring to community events.
  sports: Miguel Leal plays forward for the River Rambles in a local weekend soccer league, dances salsa at the community cultural center, fishes Shoal Creek on Saturdays, hikes the Muscle Shoals Trail,
    and avidly follows the Birmingham Barons and Nashville Predators, balancing casual competition with social fitness while they enjoy group camaraderie.
  arts: Miguel Leal strums acoustic guitar after work, draws inspiration from John Mayer, the Buena Vista Social Club, and James Brown, and regularly attends the RiverJazz Festival and local theater productions,
    letting music and performance shape their lively community presence.
  travel: Miguel Leal prefers spontaneous road trips to nearby Gulf Coast beaches, Nashville music festivals, and annual visits to New Orleans for Mardi Gras, while dreaming of an adventurous trek through
    Patagonia’s mountains, balancing budget‑friendly drives with occasional splurges for tech conferences.
  culinary: Miguel Leal is an advanced home cook who blends Mexican and Southern flavors, perfecting dishes like carnitas with collard greens, shrimp and grits with chipotle, and homemade tamales seasoned
    with cumin and coriander, and enjoys sourcing fresh fish at the local market for their signature fish tacos.
  core: Miguel Leal is a charismatic, anxiety‑prone 53‑year‑old accountant who fuels their life with soccer, salsa, guitar riffs, and a relentless curiosity for tech, often juggling meticulous work with
    occasional disorganized impulses to chase new hobbies.
background:
  cultural: Miguel is a first‑generation Mexican American who grew up bilingual, balancing the vibrant traditions of his Mexican heritage with the Southern culture of Alabama. He celebrates holidays such
    as Día de los Muertos and Cinco de Mayo with family gatherings, traditional foods, and music. His Catholic upbringing influences his community involvement and value of family. Living in Florence, he
    has adapted local Southern customs, enjoying regional cuisine, attending church events, and participating in community festivals, creating a blended cultural identity that informs his social interactions
    and personal values.
