personas:
  professional: Brianna Wilkes, a veteran sales manager with over thirty years of experience, blends data‑driven analysis with a curious eye for emerging market trends, leading her team to exceed revenue
    targets while fostering a collaborative, harmony‑focused culture and mentoring junior staff toward lasting success.
  sports: Brianna Wilkes enjoys leisurely nature walks along the Cypress trails, participates in a local tai chi circle, and cheers on the Los Angeles Dodgers and Los Angeles Lakers at community watch parties,
    balancing gentle exercise with her love of sports fandom.
  arts: Brianna Wilkes immerses herself in historical fiction by Ken Follett, memoirs by Maya Angelou, and stitches intricate quilts while listening to folk legend Tracy Chapman, finding creative solace
    that flavors her social gatherings and book club discussions.
  travel: Brianna Wilkes travels with her spouse on a relaxed schedule, favoring culinary destinations such as Chiang Mai, Oaxaca, and Tuscany, where they relish spontaneous food tours over rigid itineraries
    and keep a well‑worn notebook of recipes collected from each trip.
  culinary: Brianna Wilkes excels at cooking authentic Pad Thai, fragrant Thai basil chicken, and inventive lemongrass‑infused fish tacos, drawing fresh herbs like cilantro, Thai basil, and mint from her
    modest garden to create flavorful fusion dishes that become the centerpiece of family gatherings.
  core: Brianna Wilkes is a curious yet practical mentor who balances meticulous sales strategy with spontaneous garden‑fresh cooking, all while navigating retirement with a love for gentle movement and
    heartfelt community ties.
background:
  cultural: Brianna’s family originates from Vietnam, where her grandparents emigrated to the United States in the 1970s. Growing up in a bilingual household in the Houston suburbs, she was immersed in
    Vietnamese language, cuisine, and values emphasizing family cohesion, respect for elders, and communal harmony. These cultural roots have shaped her cooperative nature, her appreciation for ritual and
    celebration, and her love of sharing food as a way to build community. Living in Cypress, Texas, she blends her Southeast Asian heritage with the Southern hospitality of her neighborhood, participating
    in both Tet celebrations and local Texan gatherings, and often serves as a cultural bridge within her workplace and community.
