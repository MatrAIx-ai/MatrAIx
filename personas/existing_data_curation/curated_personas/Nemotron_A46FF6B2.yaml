  career_goals: As she approaches retirement, Brianna aims to leave a lasting legacy by mentoring the next generation of sales professionals and formalizing a training program that captures her blend of
    practical sales methodology and curiosity‑driven innovation. She aspires to transition into a consulting role where she can advise regional teams on building collaborative, high‑performing cultures,
    and to earn recognition as a top sales mentor within her company. Additionally, she hopes to balance her professional aspirations with personal flexibility, ensuring she can devote time to family, community
    service, and her own well‑being.
