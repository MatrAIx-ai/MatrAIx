personas:
  professional: John Goutreaux is a budding young naturalist and tinkerer who spends afternoons exploring the creek, collecting rocks and insects, and repurposing household items into makeshift inventions,
    and they balance curiosity with a practical, hands‑on approach.
  sports: John Goutreaux is a spirited member of the Coxs Creek Cubs youth soccer team, loves cheering for the Kentucky Wildcats during March Madness, and on weekends swaps soccer drills for energetic tag
    games with friends in the creek meadow.
  arts: John Goutreaux enjoys sketching backyard expeditions, listening to Bill Monroe’s bluegrass fiddles and Dolly Parton’s country hits, and flipping through Spider‑Man comic books, which together fuel
    their vivid imagination and love for storytelling.
  travel: John Goutreaux loves spontaneous creek‑side picnics, has explored the underground wonders of Mammoth Cave, dreams of visiting Nashville for a country music festival, and hopes to trek the geysers
    of Yellowstone with family next summer.
  culinary: John Goutreaux prefers classic Southern comfort foods like buttery biscuits with honey, crispy fried chicken, and a slice of homemade apple pie, enjoys peanut‑butter‑and‑jelly sandwiches and
    building pumpkin‑seed trail mix, yet their cooking skills are limited to stirring batter under careful supervision.
  core: John Goutreaux is a curious and often anxious seven‑year‑old who trades LEGO bricks for creek treasures, splurges on comic books, finds solace in bluegrass tunes, and frequently forgets to tidy
    their room.
background:
  cultural: 'John is raised in the small, close‑knit community of Coxs Creek, Kentucky. His family follows Southern rural traditions: attending a local church, participating in county fairs and community
    picnics, and valuing hospitality, self‑reliance, and respect for the land. The surrounding farmland, forests, and the nearby creek shape his love for outdoors and wildlife. Local culture includes bluegrass
    and country music, storytelling about the region’s history, and seasonal celebrations like Fourth of July fireworks and Thanksgiving gatherings. These influences give John a strong sense of family,
    community, and a deep appreciation for nature.'
