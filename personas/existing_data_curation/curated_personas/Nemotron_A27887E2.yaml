  hobbies: '[''Exploring nature (rocks, insects, birds)'', ''LEGO building'', ''Reading adventure books'', ''Drawing and storytelling'', ''Soccer'', ''Minecraft (tablet gaming)'', ''Watching nature documentaries'',
    ''Pet care (dog walking)'']'
  career_goals: John dreams of one day working closely with animals and the outdoors. He often says he wants to become a veterinarian or a wildlife biologist so he can help injured animals he finds in the
    woods. He also imagines himself as an inventor who creates simple tools to make farm work easier, inspired by his curiosity for how things work. Ultimately, he hopes for a career that lets him explore
    nature, help others, and still have the freedom to tinker and learn new things.
