  career_goals: He aims to advance from laborer to foreman within the next three to five years, earning an OSHA 30‑hour certification and a City of Los Angeles Construction Supervisor credential. Over the
    longer term he plans to complete a community‑college certificate in Construction Management or a trade apprenticeship in plumbing or electrical work, giving him the credentials to launch his own small
    residential remodeling business. Increasing his income stability will allow him to provide better educational opportunities for his children and support his wife’s aspirations. He also hopes to mentor
    younger workers from immigrant backgrounds, passing on practical trade skills and promoting a culture of safety and teamwork.
