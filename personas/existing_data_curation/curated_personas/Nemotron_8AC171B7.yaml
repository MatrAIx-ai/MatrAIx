  hobbies: '[''Abstract Acrylic Painting'', ''Creative Writing (speculative fiction & poetry)'', ''Salsa & Bachata Dancing'', ''Curating Music Playlists (Reggaetón, Jazz, Indie)'', ''Cooking Traditional
    & Fusion Puerto Rican Cuisine'', ''Visiting Art Galleries & Exhibitions'', ''Community Storytelling & Open‑Mic Events'', ''Hiking in Scioto Mile and Local Parks'', ''DIY Home Décor Crafts'']'
  career_goals: She aims to move into a supervisory or team‑lead position within her call center, where she can coach agents on empathy-driven service and cultural awareness. Over the next few years she
    plans to earn her GED and enroll in evening courses in communications or arts, eventually pursuing a bachelor’s degree in Creative Writing or Media Studies. Carmen also envisions creating a community‑focused
    initiative that offers free language‑exchange workshops and art‑therapy sessions for Puerto Rican families in Columbus, blending her professional experience with her artistic interests.
