  hobbies: '[''Visiting art galleries'', ''Street-art tours'', ''Sketching and digital illustration'', ''Cooking Spanish cuisine'', ''Yoga and meditation'', ''Open-mic poetry nights'', ''Spontaneous road
    trips'', ''Reading contemporary fiction'', ''Listening to tech podcasts'', ''Volunteering at cultural festivals'']'
  career_goals: Dailyn aims to move beyond entry-level clerical work toward a supervisory role in billing or accounting. She plans to enroll in a community college program to earn an associate’s degree
    in accounting and eventually obtain the Certified Bookkeeper credential. Her long-term ambition is to manage the finance department of a creative-focused organization, such as a gallery or media studio,
    where she can combine her love of art with her financial expertise. She also envisions launching a freelance bookkeeping service that caters to small artists and cultural entrepreneurs, giving her the
    flexibility she values.
