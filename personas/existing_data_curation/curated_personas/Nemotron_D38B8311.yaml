  hobbies: '[''Visiting art galleries'', ''Digital photography'', ''Gardening'', ''Cooking Mexican dishes'', ''Reading mystery novels'', ''Solving crossword puzzles'', ''Volunteering to teach computers
    to seniors'', ''Celebrating Día de los Muertos'', ''Walking nature trails'']'
  career_goals: Zoe aims to transition into a mentorship and community‑outreach phase of her career. Over the next few years she hopes to formalize a mentorship program within her firm, guiding junior analysts
    and sharing her practical, user‑focused approach. She also plans to launch a series of free workshops at the local senior center, teaching basic computer skills and safe internet practices to older
    adults. A long‑term ambition is to collaborate with a nonprofit to design technology solutions that reflect the cultural and accessibility needs of Spanish‑speaking seniors in rural Vermont. While she
    intends to scale back her full‑time workload, Zoe wants to stay engaged in projects that blend her technical expertise with her love of art and community service.
