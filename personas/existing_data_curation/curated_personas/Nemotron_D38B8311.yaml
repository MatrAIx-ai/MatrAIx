personas:
  professional: Zoe Delgado, a seasoned systems analyst with deep expertise in workflow mapping, SQL, and Python scripting, blends a relaxed, low‑structure work style with a keen empathy that makes them
    the go‑to translator of complex technical requirements into user‑friendly designs, while quietly building a mentorship program to guide junior analysts and launch community tech workshops.
  sports: Zoe Delgado enjoys low‑impact fitness through weekday walks along the Connecticut River, occasional community yoga classes, and supports the regional New England Patriots football team and the
    Brattleboro basketball club, while preferring the calm of a leisurely garden stroll over high‑intensity sports.
  arts: Zoe Delgado, a devoted visitor to Brattleboro’s galleries and a digital photographer capturing the kaleidoscope of Vermont foliage alongside vibrant folk art displays, also immerses themselves in
    mystery novels by Agatha Christie and solves crossword puzzles, finding that the interplay of visual and literary mystery fuels their creative imagination.
  travel: Zoe Delgado favors relaxed, culturally rich trips, having explored the historic streets of Santa Fe, the lavender fields of Provence, and the serene lakes of the Adirondacks, and dreams of a slow‑paced
    pilgrimage to a small mountain village in Oaxaca to study traditional craft techniques.
  culinary: Zoe Delgado delights in preparing elaborate family meals for Día de los Muertos gatherings, expertly layering flavors with garden‑grown herbs such as cilantro and epazote in dishes like tamales,
    mole sauce, and pan de muerto, while their modest kitchen skill blends professional precision with a love for sharing food as a communal celebration.
  core: Zoe Delgado weaves together a curious, art‑infused technical mind, a gentle mentorship spirit, and a habit of mild disorganization that fuels both creative spontaneity and occasional worry.
background:
  cultural: Zoe grew up in a bicultural household; her parents emigrated from the state of Oaxaca, Mexico, and she was raised speaking both Spanish and English. Family gatherings centered around shared
    meals, storytelling, and the vibrant festivals of her heritage, such as Día de los Muertos and Las Posadas. These traditions instilled a deep respect for community, reverence for ancestors, and a love
    of folk art, which she continues to display in her home. After moving to Brattleboro in her thirties, Zoe blended Mexican customs with New England’s seasonal rhythms, participating in local farmers’
    markets and volunteering at town events while preserving her cultural practices. She remains actively involved in the small Mexican‑American community in Windham County, attending language‑exchange
    groups and cultural celebrations, and she often incorporates Spanish language and Mexican culinary motifs into her teaching and community outreach.
attributes:
  skills: '[''Systems analysis'', ''Requirements gathering'', ''Process modeling'', ''Data visualization'', ''SQL querying'', ''Technical documentation'', ''User training & support'', ''Basic scripting
