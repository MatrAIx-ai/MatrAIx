  career_goals: Although not currently in the paid workforce, Thuyha aims to transform her culinary and organizational talents into a modest home‑based business selling traditional Vietnamese pastries and
    prepared meals at local farmer’s markets. She also plans to attain a GED to solidify her reading and writing skills, enabling her to manage finances more independently and support her adult children’s
    endeavors. A long‑term ambition is to mentor younger women in the Vietnamese community, sharing her structured approach to household management and encouraging entrepreneurial initiatives.
