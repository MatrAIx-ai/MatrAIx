  career_goals: As she approaches retirement age, Janell aims to transition into a part‑time supervisory role within her store, mentoring newer cashiers and assisting with shift scheduling. She also hopes
    to obtain a GED to formalize her education, and perhaps take a short community college course in business fundamentals or culinary arts to support a small side venture selling homemade preserves at
    the local farmers’ market. Ultimately, she values stability and flexible hours that allow her to spend more time with family and community activities while maintaining a calm, steady work rhythm.
