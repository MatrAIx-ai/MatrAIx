  career_goals: Angela aims to complete her GED within the next year and then enroll in a community‑college certificate program in office administration or health‑care support. Her short‑term ambition is
    to secure a stable entry‑level position, such as a records clerk or certified nursing assistant, where she can apply her organizational strengths, practical problem‑solving, and careful attention to
