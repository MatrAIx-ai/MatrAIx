personas:
  professional: Angela Barone, a newborn nurtured in a close‑knit rural community, already shows a blend of curiosity and practicality that suggests a future in community development, where their skill
    in organized planning and gentle assertiveness will help them design sustainable local projects.
  sports: Angela Barone, though only an infant, enjoys weekend family fishing trips and backyard hikes, already cheers for the Carolina Panthers and UNC Tar Heels, and is expected to join a Little League
    baseball program as they grow.
  arts: Angela Barone, while still a baby, finds comfort in the gentle strumming of Appalachian folk lullabies and the warm crooning of Dolly Parton, and early exposure to classic John Wayne films and the
    Carolina Ballet nurtures a budding appreciation for storytelling and performance that they carry with them.
  travel: Angela Barone, at a few weeks old, already embarked on a family road trip to the Outer Banks and dreams of one day exploring Savannah’s historic streets and Asheville’s mountain vistas, a wanderlust
    they carry into the future.
  culinary: Angela Barone, currently nourished by breast milk and occasional sweet‑potato puree, delights in the aroma of simmering chicken‑and‑dumplings and will grow to love collard greens, fried catfish,
    and homemade peach cobbler, flavors they associate with comfort and family gatherings.
  core: Angela Barone is a quiet, curious infant who tends to worry, finds solace in soft lullabies and family gatherings, and holds a deep‑seated love for community, comfort food, and gentle rhythms that
    they carry with them.
background:
  cultural: Angela comes from a White, Southern background in the rural outskirts of Fayetteville, Hoke County, North Carolina. Her upbringing reflects the region’s emphasis on close‑knit community ties,
    family gatherings, and modest, practical living. Local traditions such as church involvement, shared meals featuring Southern comfort foods, and appreciation for outdoor activities have shaped her values
    of self‑reliance, hospitality, and respect for both traditional practices and new ideas. This cultural setting has contributed to her balanced outlook, combining curiosity about the wider world with
    a pragmatic, grounded approach to daily life.
