  career_goals: Duc aims to become a portfolio manager at a leading investment firm, specializing in sustainable and data‑driven strategies. Over the next five years he plans to deepen his expertise in
    ESG investing and quantitative portfolio optimization, earn the CFA charter, and lead a cross‑functional team that develops innovative investment products. Ultimately, he aspires to launch a fintech
    platform that democratizes access to sophisticated, algorithmic investing tools, leveraging his curiosity for unconventional ideas and his strong network in the Bay Area tech community.
