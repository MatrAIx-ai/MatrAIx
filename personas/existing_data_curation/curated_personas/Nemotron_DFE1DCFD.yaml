personas:
  professional: Duc Nguyen is a 25‑year‑old quantitative analyst at an investment firm, harnessing Python, R, and Bloomberg Terminal to construct ESG‑focused predictive models, and they bring a curiosity
    for contemporary art into client presentations, weaving data into visual narratives.
  sports: Duc Nguyen plays forward for a co‑ed recreational soccer league in Sunnyvale, follows the San Jose Earthquakes with fervor, hits the gym for functional training in the winter, and they join the
    local 5 K run organized by the Bay Area Running Club each spring, preferring a flexible schedule over strict regimens.
  arts: Duc Nguyen frequents contemporary art galleries such as SFMOMA, often drawn to works by Kerry James Marshall and Ai Weiwei, attends indie concerts featuring Ty Segall and Japanese Breakfast, and
    they fill their camera roll with street photography inspired by Nan Goldin, using their artistic curiosity to unwind from data‑driven work.
  travel: Duc Nguyen prefers spontaneous, culturally immersive trips, having backpacked through Hanoi during Tết, road‑tripped along the Pacific Coast Highway to Big Sur, and explored the street art districts
    of Berlin, balancing limited vacation days with weekend getaways that feed their curiosity for new ideas.
  culinary: Duc Nguyen enjoys experimenting in the kitchen, mastering the balance of fish sauce and lime in pho broth while adding quinoa for a modern twist, frequently grilling lemongrass‑marinated pork
    belly, and they savor sushi rolls from a Bay Area izakaya paired with a craft IPA when dining out.
  core: Duc Nguyen is a data‑driven finance enthusiast with a restless curiosity for art and world flavors, who balances late‑night coding with impromptu soccer matches, and they often forget to file tax
    receipts until the last minute.
background:
  cultural: Duc was born to Vietnamese immigrant parents who moved to the United States in the early 1990s. Growing up in the multicultural environment of the Bay Area, he is fluent in both English and
    Vietnamese and celebrates traditional holidays such as Tết (Lunar New Year) with his extended family. His cultural upbringing emphasized respect for community, hard work, and the importance of education,
    which guided his pursuit of a STEM degree and a career in finance. The vibrant Vietnamese‑American community in Sunnyvale exposed him to a blend of Eastern and Western artistic and culinary traditions,
    fueling his appreciation for diverse experiences.
