  hobbies: '[''Beach Walks'', ''Cooking Soul‑Food'', ''Volunteering (STEM Mentorship)'', ''Yoga'', ''Mindfulness Meditation'', ''Reading Contemporary Fiction'', ''Reading Historical Biographies'', ''Live
    Jazz and R&B Concerts'', ''Book Club'']'
  career_goals: Latoya aims to advance within the analytical and strategic planning track. In the next five years, she seeks promotion to senior management analyst or team lead, overseeing larger projects
    and mentoring junior staff. She plans to obtain a professional certification such as PMP or a Master’s in Business Administration to broaden her strategic perspective. Long‑term, she hopes to become
    a director of operations or a chief strategy officer, focusing on data‑driven decision‑making that promotes equitable outcomes for the community she serves. She also aspires to contribute to initiatives
    that improve socioeconomic conditions in Broward County, using her analytical expertise to support public‑private partnership projects.
