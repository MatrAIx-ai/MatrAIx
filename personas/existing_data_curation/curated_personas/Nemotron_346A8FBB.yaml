  skills: '[''Data Analysis'', ''Statistical Modeling'', ''Python'', ''R'', ''SQL'', ''Excel'', ''Power BI'', ''Process Improvement'', ''SOP Development'', ''Financial Modeling'', ''Budgeting'', ''Performance
