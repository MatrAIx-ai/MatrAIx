personas:
  professional: Latoya Knox, a 31‑year‑old management analyst, leverages her quantitative analysis, statistical modeling, and process‑mapping expertise to streamline operations while her compassionate,
    routine‑driven nature ensures stakeholder meetings feel collaborative and predictable.
  sports: Latoya Knox enjoys playing beach volleyball with a local Pompano club in the summer, follows the Miami Heat for basketball, jogs with the Suncoast Running Group for her cardio, and participates
    in a seasonal adult softball league.
  arts: Latoya Knox regularly attends live jazz performances featuring the Marcus Roberts Trio and R&B shows by H.E.R., curates an eclectic vinyl collection that includes Nina Simone and Kamasi Washington,
    and contributes to a downtown book club discussing contemporary fiction by Colson Whitehead and historical biographies by Doris Kearns Goodwin.
  travel: Latoya Knox prefers thoughtfully planned getaways that blend leisure and learning, favoring weekend trips to Charleston’s historic district, longer retreats to the Bahamas’ Exuma Cays, and dreaming
    of a cultural immersion tour of Kyoto’s temples.
  culinary: Latoya Knox, an avid home cook, reimagines soul‑food classics like baked collard greens with smoked paprika and quinoa‑infused cornbread, always stocking sweet potatoes, black‑eyed peas, and
    fresh herbs to create nutritious, comfort‑filled meals for friends.
  core: Latoya Knox blends analytical precision with sunrise beach walks, soulful cooking, a midnight habit of checking work emails, and a steadfast commitment to community equity through data‑driven initiatives.
background:
  cultural: Latoya identifies as an African‑American woman rooted in the cultural tapestry of South Florida. She grew up in a close‑knit Black family that emphasized church involvement, community service,
    and celebration of heritage through events like Juneteenth, Kwanzaa, and family reunions featuring gospel music and Southern cuisine. Living in Pompano Beach, she is also influenced by the Caribbean
    diaspora and the vibrant multicultural atmosphere of Broward County, which enriches her culinary tastes and social circles. Her cultural background instills a strong sense of responsibility toward uplifting
    the Black community, fostering mentorship, and championing equity in her professional life.
