  career_goals: Looking ahead, Nathan aims to step into a senior executive role—such as Director of Operations or Vice President of Manufacturing—within the next five years, focusing on digital transformation
    and sustainability initiatives that modernize traditional processes. He aspires to design and launch a formal leadership‑development program to mentor emerging managers, leaving a lasting legacy at
    his organization. Simultaneously, he is exploring the possibility of establishing an independent consulting practice that helps small manufacturers adopt lean practices while preserving the flexible,
    people‑centric work style he values.
