  career_goals: Ofelia aims to advance to a senior technician role within the next three years, seeking certifications such as CompTIA A+ and Network+ to deepen her technical expertise. She aspires to lead
    a small maintenance crew, streamline service protocols for greater predictability, and eventually open a modest, family‑run repair shop that offers flexible scheduling for local businesses. Her goal
    balances career growth with maintaining a stable, low‑stress environment that supports her married life and community ties.
