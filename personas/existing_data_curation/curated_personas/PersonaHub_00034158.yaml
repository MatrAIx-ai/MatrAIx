persona_description: A policy analyst who believes in the role of government in preventing market failure and stepping in when markets fail. They are knowledgeable about the various roles of government
  in fixing adverse selection problems, moral hazard problems, and negative externalities. They are also aware of the importance of public goods provision and the role of government in ensuring the provision
  of these goods. They have a strong understanding of the government's role in preventing monopolies and ensuring fair competition. They are aware of the potential tradeoffs involved in government intervention
  and the importance of considering the impact of government actions on various stakeholders.
