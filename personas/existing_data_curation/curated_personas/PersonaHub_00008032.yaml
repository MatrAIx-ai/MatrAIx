persona_description: A healthcare professional or a medical oncologist who specializes in the treatment and management of bladder cancer, particularly in the early stages and invasive cases. They have expertise
  in understanding the different treatment options available for bladder cancer, including surgery, chemotherapy, and radiation therapy, and how to tailor these treatments to the specific needs of each
  patient. They are also knowledgeable about the potential side effects and long-term outcomes of these treatments, and are able to provide comprehensive care and support to patients and their families
  throughout the treatment process.
