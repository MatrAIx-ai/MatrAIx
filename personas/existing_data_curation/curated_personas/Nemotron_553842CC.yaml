personas:
  professional: Carlos Gener leverages their bilingual charisma and hands‑on AV know‑how to keep crowds moving smoothly at local festivals, while their spontaneous problem‑solving and mentorship style fuels
    a growing ambition to supervise and design culturally vibrant community events.
  sports: Carlos Gener dashes onto the soccer field every Saturday for the Hanford Hombres recreational league, cheers loudly for the Los Angeles Dodgers during spring training, pedals through Central Valley
    farms in summer, and holds a season ticket for the LA Galaxy, mixing community play with passionate fandom.
  arts: Carlos Gener strums traditional corridos on a worn guitarra, sings along to Vicente Fernández and Carlos Santana at neighborhood fiestas, glides through salsa and cumbia dances during local celebrations,
    and unwinds by watching classic cinema such as 'Los Olvidados' and 'Casablanca', letting music and film shape their evenings.
  travel: Carlos Gener loves spontaneous weekend bike rides across the Central Valley’s golden fields, dreams of strolling through the bustling markets of Oaxaca, revisits the historic plazas of San Miguel
    de Allende, and saves for a road‑trip to the Pacific coast where a surf‑side taco stand awaits, balancing limited savings with a desire to experience vibrant festivals beyond home.
  culinary: Carlos Gener whips up mole verde with dried chilies, epazote, and fresh cilantro, perfects handmade tamales and sizzling carne asada on a backyard grill, and frequently experiments with chiles
    en nogada for friends, earning a reputation as the go‑to host for flavorful, home‑cooked feasts.
  core: Carlos Gener, a 52‑year‑old event crew veteran, blends spontaneous salsa steps with last‑minute deadline scrambles, fuels a habit of nightly coffee, tends a thriving garden, and dreams of a community
    venue where music, dance, and food converge.
background:
  cultural: Carlos is a first‑generation Mexican American whose family emigrated from Jalisco in the 1970s. Raised in Hanford’s tight‑knit Latino neighborhood, he grew up celebrating Día de los Muertos,
    Mexican Independence Day, and local quinceañeras, while also participating in broader community events like the Tulare County Fair. His bilingual upbringing and close ties to Mexican music, dance, and
    cuisine shape his worldview and inform his desire to integrate cultural traditions into his professional life.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Customer service and guest relations'', ''Crowd management'', ''Improvisational problem‑solving'', ''Basic audio‑visual equipment operation'',
    ''Cultural storytelling and event programming'', ''Team coordination and mentorship'', ''Basic food preparation for catering'']'
  hobbies: '[''Playing guitar'', ''Singing traditional Mexican songs'', ''Dancing salsa and cumbia'', ''Cooking Mexican cuisine'', ''Volunteering at community festivals'', ''Playing recreational soccer'',
    ''Cycling through rural roads'', ''Gardening vegetables'', ''Watching classic movies'']'
  career_goals: Carlos aims to move beyond day‑to‑day attendant duties into a supervisory or event‑planning role within the Hanford community. He plans to earn his GED and complete a certificate in hospitality
    or event management, with the long‑term ambition of directing local cultural festivals that celebrate his Mexican heritage while fostering inclusivity. He also dreams of opening a small venue where
    live music, dance, and traditional cuisine can bring people together.
