  career_goals: She aims to advance into a facilities‑manager role within a large organization, obtaining certifications such as Certified Maintenance & Reliability Technician (CMRT) and LEED Green Associate
    to integrate sustainable practices. Over the next five years she plans to lead a maintenance team, develop a preventive‑maintenance program that reduces downtime by 15%, and eventually launch her own
    small contracting business focused on eco‑friendly repairs and retrofits.
