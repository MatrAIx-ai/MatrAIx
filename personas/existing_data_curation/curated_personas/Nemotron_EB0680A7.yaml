personas:
  professional: Sarah Spears, a seasoned facilities maintenance specialist with a decade of hands‑on expertise in mechanical, electrical, and plumbing systems, leverages their methodical, reliability‑driven
    mindset and curious eye for sustainable innovation to streamline preventive‑maintenance schedules, mentor junior technicians, and scrutinize cost‑effectiveness, all while maintaining a competitive edge
    that sometimes makes them appear skeptical of colleagues’ proposals.
  sports: Sarah Spears, an avid hiker of the Cascades and Olympic Peninsula and a regular yogi at a downtown studio, channels their competitive streak into tracking summit times and completing quarterly
    half‑marathons, while rooting for the Seattle Seahawks and Seattle Sounders FC and belonging to the Seattle Alpine Club.
  arts: Sarah Spears immerses herself in Seattle's vibrant arts scene, drawing creative inspiration from the bold street murals of local artist Shepard Fairey and the contemporary installations at the Frye
    Art Museum, while finding solace in the lo‑fi melodies of Phoebe Bridgers and the theatrical productions of the Seattle Repertory Theatre.
  travel: Sarah Spears prefers meticulously planned road trips that blend rugged hiking adventures with cultural stops, such as a solo trek through Banff National Park followed by a weekend gallery crawl
    in Portland, and dreams of an eco‑focused backpacking expedition to Patagonia's Torres del Paine, all while balancing travel expenses with a disciplined savings strategy.
  culinary: Sarah Spears, a competent home cook with a penchant for sustainable gastronomy, often transforms leftover veggie scraps into vibrant kale‑tempeh stir‑fries and miso ramen bowls, while treating
    herself to a handcrafted oat‑milk latte at Capitol Hill's specialty coffee roasters.
  core: Sarah Spears is a methodical maintenance expert who curates art‑filled upcycled furniture, obsessively tracks every budget line and heart‑rate, yet frequently battles self‑criticism and stashes
    spare screws in every drawer for peace of mind.
background:
  cultural: Sarah grew up in a middle‑class family in the Midwest before moving to Seattle for work after high school. Her upbringing emphasized self‑reliance, practicality, and community involvement, values
    that mesh with Seattle’s progressive, environmentally conscious culture. Though she identifies as white American, she has embraced the city’s diverse influences— from the Pacific Northwest’s love of
    outdoor recreation to its thriving indie art scene— shaping a worldview that blends pragmatic work ethic with an appreciation for creative, unconventional ideas.
