  career_goals: Vy aims to complete her high school education through a GED and enroll in a college art program, with the long‑term goal of becoming a multimedia artist or graphic designer in the entertainment
    industry. She hopes to build a personal brand on social media that showcases her East Asian heritage and contemporary teen culture, eventually securing freelance design work. Vy also dreams of leading
    community art projects in Milwaukee that bridge cultural gaps and inspire other young creators, and she envisions one day directing inclusive visual media campaigns.
