  hobbies: '[''Community theater'', ''Multicultural dance'', ''Gardening'', ''Vietnamese cooking'', ''Hiking'', ''Art museum docent work'', ''Poetry readings'', ''Yoga and meditation'', ''STEM story‑time
    volunteering'']'
  career_goals: Phuong aims to lead a multidisciplinary research center focused on sustainable materials and energy solutions that incorporates cultural perspectives into scientific inquiry. She seeks to
    secure major federal and private funding to expand a community‑based STEM outreach program targeting underrepresented youth in Richland County, especially Southeast Asian and African‑American students.
    Over the next decade, she plans to mentor a pipeline of women and minority physicists, publish a landmark monograph on the intersection of scientific visualization and art, and serve on national advisory
    panels shaping inclusive science policy. Ultimately, she envisions transitioning to an emeritus role while continuing as a consultant and public speaker, championing the integration of curiosity‑driven
    research with practical societal impact.
