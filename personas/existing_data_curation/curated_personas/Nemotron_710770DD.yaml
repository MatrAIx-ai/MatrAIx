  hobbies: '[''Gardening'', ''Baking Southern Desserts'', ''Quilting'', ''Reading Historical Fiction'', ''Church Attendance'', ''Walking'', ''Crossword Puzzles'', ''Genealogy Research'', ''Listening to
    Classic Big Band Music'']'
  career_goals: Despite being retired, Jessica aims to preserve her independence and reduce stress by establishing a consistent daily routine that balances structure with flexibility. She hopes to complete
    a memoir of her life in Gastonia, share stories of the town’s past with local schoolchildren, and continue volunteering at the senior center, especially teaching basic computer skills. Maintaining her
    garden, staying physically active, and fostering close ties with her grandchildren are also top priorities.
