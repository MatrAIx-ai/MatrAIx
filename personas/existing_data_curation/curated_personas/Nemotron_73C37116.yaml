personas:
  professional: April Bradsher, a veteran building inspector with nine years of experience in New Hanover County, combines technical mastery of NC building codes, blueprint analysis, and digital inspection
    platforms with a keen eye for historic architecture, using their assertive communication skills to mediate compliance issues while dreaming of a senior supervisory role and future adaptive‑reuse consulting.
  sports: April Bradsher energizes weekends by playing third base in the co‑ed Wilmington Harbor Softball League, joins sunrise beach‑run groups on the Carolina Beach trail, avidly supports the Carolina
    Panthers and Charlotte Hornets, and occasionally hikes the Outer Banks’ sand dunes to stay fit without committing to a rigid gym routine.
  arts: April Bradsher cultivates creativity through pottery classes at the Wilmington Clay Studio, watercolor workshops at the Art & History Society, photographs historic downtown buildings for a personal
    Instagram portfolio, and fills evenings with live gigs by local folk band The Dandelion Players as well as occasional shows by John Coltrane tribute ensembles.
  travel: April Bradsher prefers spontaneous road trips along the North Carolina coast, often detouring to explore the historic streets of Charleston, the cool mountain air of Asheville, and the vibrant
    art scene of New Orleans, while keeping a travel journal that lists future wishes like strolling Lisbon’s Alfama district and kayaking in the Bahamas.
  culinary: April Bradsher delights in Southern-inspired cooking, regularly whipping up shrimp‑and‑grits with Gulf shrimp, collard greens seasoned with smoked turkey, and pimento cheese dip, experiments
    with buttermilk biscuits and fresh okra, and showcases their dishes at weekend potlucks where friends rave about the homemade blueberry cobbler.
  core: April Bradsher blends a meticulous inspection mind with a free‑spirited love for art, community, and spontaneous adventures, often juggling sticky‑note‑filled to‑do lists while hosting lively potluck
    gatherings that occasionally run over budget.
background:
  cultural: April grew up in the coastal suburbs of New Hanover County, immersed in the Southern Atlantic culture of Eastern North Carolina. As a white, third‑generation American, her upbringing blended
    traditional Southern values of hospitality, community responsibility, and a strong work ethic with an appreciation for the region’s rich maritime history and eclectic artistic scene. She attended a
    local public high school, where she participated in vocational workshops that sparked her interest in construction trades. Family gatherings often centered around church services, holiday meals, and
    outdoor activities like beach picnics and seafood boils. Growing up near Wilmington’s vibrant arts district exposed her to gallery openings, live music, and historic preservation efforts, shaping her
    curiosity for art and unconventional design ideas. Her cultural identity is rooted in a respect for both the hardworking, blue‑collar roots of her community and the creative expressions that thrive
    along the North Carolina coast.
attributes:
  skills: '[''Building code interpretation (NC)'', ''Blueprint and plan reading'', ''On‑site structural inspection'', ''Digital inspection reporting (iAuditor, Procore)'', ''Construction material assessment'',
    ''Safety hazard identification'', ''First aid/CPR certification'', ''Hazardous material awareness (asbestos, lead)'', ''Conflict mediation and stakeholder communication'', ''Public speaking and community
    outreach'', ''Basic carpentry and repair techniques'', ''Sustainable building practices awareness'']'
  hobbies: '[''Community art walks organization'', ''Pottery and watercolor classes'', ''Co‑ed softball league'', ''Coastal trail hiking'', ''DIY home‑improvement projects'', ''Historic building photography'',
    ''Live music concerts'', ''Southern cuisine cooking and potluck host'', ''Volunteer at local historical society'', ''Gardening'']'
  career_goals: Eager to blend her technical acumen with her love of design, April aims to advance into a senior supervisory role within the New Hanover County Building Inspection Department over the next
    five years. She plans to obtain the International Code Council’s Certified Building Official (CBO) credential and complete an associate degree in construction management to broaden her leadership capabilities.
    Long‑term, she dreams of launching a niche consulting firm that specializes in adaptive reuse projects, helping historic coastal structures retain their cultural character while meeting modern safety
    standards. Additionally, she hopes to develop and lead a community education program that demystifies the permitting process for local homeowners and small‑scale developers, fostering greater appreciation
    for safe, aesthetically thoughtful construction.
