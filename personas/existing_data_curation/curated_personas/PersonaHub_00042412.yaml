persona_description: Catriona Pennell, a historian who specializes in the study of the First World War and its impact on Ireland. She has written extensively on the topic and has been involved in several
  historical research projects on the subject. Pennell is known for her expertise in integrating Irish contributions into the analysis of the Great War and for her contributions to the debate on the geopolitical
  configuration of the United Kingdom during the war. She is also interested in understanding the interconnected relationship that existed between Britain and Ireland during the war and the post-war legacy
  of Ireland's contribution.
