personas:
  professional: Elaine Restrepo, a seasoned barber in Middlesex County, blends classic cutting techniques with contemporary trends while managing shop operations with meticulous organization and flexible
    creativity, and strives to be recognized as one of the top barbers in the region.
  sports: Elaine Restrepo enjoys hiking the nearby conservation trails with the Middlesex County Trail Runners, follows the Boston Red Sox and New England Patriots closely, and practices yoga twice weekly
    to maintain flexibility for long hours at the barbershop.
  arts: Elaine Restrepo fills her shop with classic rock from Led Zeppelin and the soulful strings of Paco de Lucía, unwinds with Agatha Christie mysteries and Ken Follett’s historical epics, and captures
    natural vistas on her camera, channeling Ansel Adams’s compositional style.
  travel: Elaine Restrepo prefers carefully planned weekend road trips to New England gems like Bar Harbor, Martha’s Vineyard, and Portsmouth, yet harbors a dream of a rugged adventure trekking Patagonia’s
    Torres del Paine when finances allow.
  culinary: Elaine Restrepo crafts a signature sweet‑potato and black‑bean shepherd’s pie that blends New England comfort with Latin spices, seasons her clam chowder with cilantro and chipotle for a subtle
    kick, and enjoys experimenting with plant‑based twists on classic baked beans, reflecting a solid but ever‑evolving cooking skill set.
  core: Elaine Restrepo is a competitive, detail‑oriented barber who balances a skeptical, pragmatic outlook with a curiosity for new trends, finding solace in gardening, photography, and community mentorship.
background:
  cultural: 'Elaine grew up in a predominantly white New England community but carries the Restrepo surname through her marriage to a partner of Colombian heritage. This blend gives her a unique cultural
    perspective: she embraces the New England values of hard work, self‑reliance, and community involvement while also appreciating Latin American traditions such as festive gatherings, seasonal foods,
    and occasional Spanish phrases in daily conversation. Though English is her primary language, she occasionally incorporates Spanish words when interacting with clients or preparing meals. Her cultural
    identity is reflected in her community‑oriented mindset, her culinary experiments, and the inclusive atmosphere she fosters in her barbershop.'
attributes:
  skills: '["haircutting (men''s, women''s, children''s)", "razor shaves", "beard grooming", "hair coloring and highlighting", "scalp treatments", "client consultation and style recommendation", "appointment
