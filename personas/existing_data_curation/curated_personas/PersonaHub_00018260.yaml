persona_description: A geographer who specializes in the study of sea level changes and their causes, particularly focusing on the northern and southern hemispheres. They are interested in understanding
  the differences in sea level rise rates between these hemispheres and the factors contributing to these differences. They are likely to be interested in using tide gauge records to determine global climate-related
  contributions to sea level change and the use of observations from the Global Positioning System to correct for vertical land motion. They may also be interested in using the findings to challenge widely
  accepted values for global sea level rise for the 20th century.
