personas:
  professional: Giovanni Siman, a budding junior builder who spends afternoons constructing LEGO space stations and tinkering with Scratch projects, blends curiosity and practicality by testing new designs
    while preferring the flexibility of play over rigid schedules.
  sports: Giovanni Siman, a lively member of the Comal County Youth Soccer League, dribbles for the Red Rovers team, idolizes the local professional soccer club’s star forward, and enjoys watching the Dallas
    Cowboys on weekends, while preferring informal backyard games when the weather is nice.
  arts: Giovanni Siman, an enthusiastic dancer at family gatherings, moves to rhythmic folk tunes while helping roll tortillas for tacos and tamales, delights in reading adventure series like "Percy Jackson"
    and listening to classic video‑game scores from "Super Mario", often mimicking their favorite characters in play.
  travel: Giovanni Siman, a curious explorer of nearby nature spots such as Enchanted Rock State Natural Area and Guadalupe River, loves weekend hikes collecting rocks, dreams of visiting the Space Center
    Houston to see rockets up close, and favors day‑trips over long vacations due to school schedule.
  culinary: Giovanni Siman, a budding kitchen helper, enjoys assembling tacos with seasoned al pastor meat, fresh cilantro, and lime, loves the crunchy texture of tamales, and often experiments with creating
    simple rock‑shaped cookie treats during after‑school snack time.
  core: Giovanni Siman, an energetic eight‑year‑old who fuses hands‑on building, soccer, and lively folk dancing into a flexible, curiosity‑driven life, even if their pockets and plans are occasionally
    chaotic.
background:
  cultural: Giovanni grew up in a bilingual Mexican‑American household in Schertz, Texas, where Spanish and English flow interchangeably at home. His family celebrates Mexican traditions such as Día de
    los Muertos, Cinco de Mayo, and Christmas posadas, often cooking homemade tamales, enchiladas, and fresh salsa together. He participates in local community events at the nearby San Antonio cultural
    centers, where mariachi bands and folklórico dance groups perform. The vibrant Mexican heritage blends with the broader Texan environment, giving him a love for both spicy Tex‑Mex cuisine and Texas‑style
    barbecues. His upbringing emphasizes close family ties, respect for elders, and a collective spirit, while also encouraging curiosity and practical learning through school and community programs.
