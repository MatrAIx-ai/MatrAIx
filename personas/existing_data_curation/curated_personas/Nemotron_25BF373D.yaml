  career_goals: Giovanni dreams big while staying grounded. He imagines soaring into space as an astronaut, inspired by his love of stars and rockets, but also sees himself on a soccer field as a professional
    player, channeling his energetic teamwork. He is fascinated by animals and hopes to become a wildlife biologist or veterinarian one day, motivated by his curiosity about nature. At the same time, his
    early experiments with Scratch spark an ambition to design video games that tell adventurous stories for other kids. He balances these lofty dreams with a practical desire to help his community, hoping
    to volunteer at local animal shelters and school events when he grows older.
