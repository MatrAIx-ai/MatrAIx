  career_goals: Although currently not in the formal workforce, Judy aims to channel her curiosity and practical skills into meaningful community‑based endeavors. She hopes to lead a neighborhood heritage‑preservation
    project that combines her love of local history with hands‑on activities like guided walking tours and oral‑history recordings. Concurrently, she plans to pursue a part‑time certification in nonprofit
    management to strengthen her ability to secure funding and organize volunteer programs. Long‑term, she envisions launching a small boutique offering handcrafted home décor and garden accessories, leveraging
    her DIY expertise while maintaining the flexibility she values. She also aspires to write a memoir‑style blog reflecting on mid‑life transitions, sharing insights on balancing family, personal growth,
    and community involvement.
