personas:
  professional: Judy Aspen is an emerging community heritage coordinator who blends a humanities‑backed talent for research, storytelling, and grant writing with hands‑on DIY know‑how, navigating projects
    with a relaxed‑about‑deadlines style that lets curiosity lead while occasionally misplacing paperwork.
  sports: Judy Aspen enjoys low‑impact fitness like walking the trails at Weedon Island Preserve, follows the Tampa Bay Buccaneers in the NFL and the Tampa Bay Rays in MLB, and occasionally joins a community
    senior paddle‑board club during the warm months.
  arts: Judy Aspen finds creative fulfillment in knitting, pottery, and attending live folk‑rock performances by artists like The Avett Brothers and local flamenco guitarist Carlos García, while their literary
    palate favors historical fiction by Marjorie Kinnan Rawlings and Mediterranean poetry translations.
  travel: Judy Aspen prefers short road‑trip getaways that blend historic exploration and culinary curiosity, having already toured Savannah’s riverfront and explored Barcelona’s Gothic Quarter, and now
    dreaming of a weekend pilgrimage to Seville’s Alcázar, all while balancing a modest travel budget and family commitments.
  culinary: Judy Aspen’s kitchen is a crossroads of Southern comfort and Mediterranean flair, where they regularly whip up shrimp and grits with locally sourced okra, simmer a saffron‑infused paella using
    garden‑grown tomatoes and bell peppers, and experiment with fresh herbs like rosemary, thyme, and oregano.
  core: Judy Aspen is a curiosity‑driven, slightly disorganized mid‑life historian who hoards vintage seed packets, forgets appointments but never forgets a good story, and balances community service with
    a love for crafting and gardening.
background:
  cultural: Judy identifies as a white American who grew up in the Midwest before relocating to Wesley Chapel, Florida. Her upbringing emphasized values of self‑reliance, family cohesion, and community
    participation, which mesh naturally with the Southern hospitality and multicultural flavor of the Sunshine State. She celebrates traditional American holidays—Thanksgiving, Fourth of July, and Christmas—while
    also embracing Florida’s regional customs, such as seafood festivals and Spanish‑influenced celebrations. Her involvement in a local Methodist congregation reflects a modest religious background, and
    she values preserving and sharing the area’s history through volunteer work and informal storytelling.
