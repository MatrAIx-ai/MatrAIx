persona_description: A historian and archaeologist who specializes in the study of Norse history and archeology in Canada, particularly focusing on the discovery of Viking artifacts in Baffin Island and
  Labrador. She has extensive knowledge and experience in the field and has made significant contributions to the understanding of the history of the Norse in Canada. She is known for her meticulous research
  and attention to detail, and has been stripped of her emeritus status by the Canadian Museum of Civilization after uncovering clear evidence of the presence of Vikings in Canada. Her work has been widely
  recognized and her findings have had a significant impact on the field of archaeology and the study of Norse history in Canada.
