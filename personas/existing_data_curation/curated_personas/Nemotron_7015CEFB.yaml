  hobbies: '[''Strategic video gaming'', ''RC car building and racing'', ''Reading practical manuals and mystery novels'', ''Robotics club participation'', ''Cooking traditional Mexican food'']'
  career_goals: Alberto hopes to graduate high school with strong grades in math and science, then enroll in a vocational program to become a certified automotive technician. He aims to earn an apprenticeship
    at a local garage in Pauls Valley, where he can further develop his mechanical expertise. In the longer term, he dreams of owning his own auto repair shop that serves both the Hispanic community and
    the broader town, providing reliable, affordable services. His competitive nature also fuels an interest in pursuing a scholarship for a collegiate robotics or engineering program, which would blend
    his love for structured problem-solving with hands-on technical work. Additionally, he is considering joining the Army Reserve after high school, seeing it as a way to gain discipline, further technical
    training, and serve his country.
