personas:
  professional: Alberto Figueroa, a 15‑year‑old budding technologist, channels his love of structure and competitive strategy into designing and programming RC car upgrades and taking a lead role in his
    school robotics club, where they apply meticulous planning and a practical mindset to drive project timelines.
  sports: Alberto Figueroa, a devoted fan of the Los Angeles Dodgers and LA Galaxy, channels their competitive spirit into weekly pickup soccer matches and maintains a disciplined sprint routine with their
    high school track club, preferring structured workouts over casual gaming breaks.
  arts: 'Alberto Figueroa immerses themselves in the intricate mysteries of Agatha Christie, the cinematic tension of Hans Zimmer’s scores, and the retro synth vibes of Daft Punk’s Tron: Legacy soundtrack,
    shaping their creative problem‑solving with a blend of literary intrigue and auditory design.'
  travel: Alberto Figueroa, who has taken weekend road trips to the coastal town of Santa Barbara and a school field trip to Washington D.C., now dreams of attending the international robotics exhibition
    in Shanghai and a summer camping adventure in the Rocky Mountains, where they hope to blend tech exploration with outdoor renewal.
  culinary: Alberto Figueroa, a self‑taught junior cook, loves crafting flavorful tacos with char‑grilled carne asada, fresh cilantro, lime, and jalapeño salsa, and perfecting tamales stuffed with masa,
    pork, and red chile, turning family gatherings into methodical culinary experiments they approach with precision.
  core: Alberto Figueroa blends a razor‑sharp competitive drive in gaming and RC racing with a disciplined, methodical approach to school robotics, yet they often forget to stretch after long sessions and
    succumb to late‑night snack binges.
background:
  cultural: Alberto comes from a Mexican-American family that settled in Pauls Valley, Oklahoma, after his parents immigrated from the state of Jalisco. The household is bilingual, with Spanish spoken at
    home and English at school, creating a bicultural perspective. Traditional celebrations like Día de los Muertos and Mexican Independence Day are observed, often with communal meals and music. His family
    runs a small food stall at the local farmers market where they sell homemade tacos, reinforcing his connection to Mexican culinary traditions. While adapting to the Midwestern environment, Alberto also
    embraces local customs, such as attending the Garvin County Fair and participating in community volunteer events. This blend of Mexican heritage and Oklahoma small-town life shapes his values of hard
    work, community responsibility, and family loyalty.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic automotive maintenance'', ''Project planning and organization'', ''Computer troubleshooting'', ''Microsoft Office proficiency'', ''Introductory
