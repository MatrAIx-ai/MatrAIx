persona_description: A member of the Iroquois' Onondaga nation who has dedicated his life to the sport of lacrosse, particularly as a goalie and as a professor emeritus at State University of New York Buffalo.
  He has played in Onondaga's first lacrosse game of the season and is known for his expertise in the sport and his role as an Iroquois Nationals board member. He believes that lacrosse is a gift from the
  creator to be played for the creator and that the game serves medicinal, physical, and diplomatic purposes for Native Americans.
