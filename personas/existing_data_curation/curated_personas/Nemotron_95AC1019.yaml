personas:
  professional: Osvaldo Segebre, a veteran computer hardware engineer with three decades of hands‑on circuit design and a graduate business degree, leverages their imaginative curiosity and disciplined
    project management to steer multidisciplinary teams toward sustainable IoT hardware solutions while mentoring junior engineers and translating technical ideas into strategic business narratives.
  sports: Osvaldo Segebre finds fitness in solo pursuits, regularly hiking the Watchung Mountains, joining the local ‘Watchung Trailblazers’ hiking group in spring, and following the New York Mets for a
    touch of competitive spirit while maintaining a low‑impact routine that balances their love for nature with their desk‑bound profession.
  arts: Osvaldo Segebre fuels their artistic side by devouring speculative fiction by Neal Stephenson and philosophy by Susan Sontag, sketching abstract digital pieces inspired by James Turrell’s light
    installations, and composing ambient soundscapes that echo Brian Eno and Aphex Twin while quietly observing local maker fairs and gallery openings.
  travel: Osvaldo Segebre plans trips with the precision of a circuit layout, having already journeyed to Tokyo for custom switch sourcing, explored Berlin’s vibrant maker scene, and now eyeing a sustainable‑technology
    retreat in Copenhagen, balancing adventure with a modest travel budget that prioritizes experiential workshops over luxury resorts.
  culinary: Osvaldo Segebre channels their cultural comfort into the kitchen, expertly preparing gallo pinto, ceviche, and arroz con pollo with fresh cilantro, lime, and locally sourced beans, while experimenting
    with molecular‑gastro twists like smoked paprika foam, reflecting their high‑skill, experimental culinary approach.
  core: Osvaldo Segebre is a solitary, curiosity‑driven hardware visionary who fuses meticulous engineering with avant‑garde maker arts, navigating life with competitive zeal, strategic precision, and a
    penchant for quiet, hands‑on creation.
background:
  cultural: Osvaldo was born in Costa Rica and grew up immersed in the country’s pura vida outlook, a blend of optimism, community, and appreciation for nature. Bilingual in Spanish and English, he maintains
    strong ties to his heritage through family celebrations, traditional foods, and occasional trips to visit relatives. Living in Morristown, New Jersey, he has integrated into a multicultural environment
    while preserving his cultural identity—participating in local Latin American festivals, supporting the Costa Rican community in the New York‑New Jersey area, and following soccer passionately, especially
    the national team. His background informs his collaborative style, valuing clear communication and a balanced approach to work–life harmony.
attributes:
  skills: '[''Analog and digital circuit design'', ''High-density PCB layout (Altium Designer)'', ''Embedded firmware development (C, C++)'', ''System integration and validation'', ''Hardware prototyping
