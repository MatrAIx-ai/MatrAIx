  hobbies: '[''Watercolor painting'', ''Poetry writing'', ''Reading classic literature'', ''Philosophy study'', ''Genealogy research'', ''Garden tending'', ''Birdwatching'', ''Crossword puzzles'', ''Sudoku
    puzzles'', ''Chess'', ''Classical music listening'', ''Virtual museum tours'', ''Knitting'']'
  career_goals: Amanda's current ambitions focus on leaving a lasting creative and intellectual legacy. She aims to complete and publish a memoir for her grandchildren, compile a small poetry collection,
    organize a community exhibition of her artwork at the Naperville Public Library, curate a digital archive of her family's genealogy, and volunteer as a mentor for the local senior art program. She also
    hopes to learn a new digital illustration technique on a tablet and, for personal enjoyment, master simple songs on a ukulele.
