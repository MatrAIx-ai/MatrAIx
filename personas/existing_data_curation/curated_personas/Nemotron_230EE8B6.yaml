personas:
  professional: Jennie Mays, a data‑analytics aspirant with a solid foundation in laboratory techniques and retail operations, combines their Excel‑and‑Python prowess with a designer’s eye for visual storytelling,
    using their meticulous bullet‑journal habits to orchestrate project timelines while occasionally getting lost in art gallery visits that delay code reviews, and they never miss a chance to apply analytical
    rigor to everyday problems.
  sports: Jennie Mays, a hiking enthusiast who captures sunrise vistas on Pine Mountain, is a regular member of the Allegheny Outdoor Explorers, follows the Pittsburgh Steelers and Penguins with weekend
    watch parties, and they participate in the Pittsburgh Women’s Running Club’s 5K training runs each spring.
  arts: Jennie Mays, a frequent visitor to the Carnegie Museum of Art, sketches in oil and digital media inspired by Yayoi Kusama and Banksy, curates playlists featuring Alt‑J and Max Richter, and they
    volunteer at a community art‑therapy studio where they help middle‑school girls explore visual storytelling.
  travel: Jennie Mays, an adventurous planner who maps trips in their bullet‑journal, prefers weekend road‑trips to nearby national parks like Shenandoah and dreams of an overseas journey to Kyoto for its
    blend of technology museums and traditional tea houses, balancing a modest travel budget with a desire for cultural immersion, and they often schedule travel hacks in spare evenings.
  culinary: Jennie Mays, an experimental home cook, masters Thai green curry using fresh lemongrass and kaffir lime, bakes sourdough loaves on Saturday mornings, and they frequently improvise quinoa‑based
    bowls with roasted cauliflower, avocado, and tahini, while occasionally indulging in dessert pastries from local bakeries.
  core: Jennie Mays, a meticulously organized curiosity‑driven analyst who merges data science with artistic flair, often juggles bullet‑journaling, puzzle‑solving, and spontaneous coffee‑shop detours,
    and they never miss a chance to apply analytical rigor to everyday problems.
background:
  cultural: Jennie grew up in a white, middle‑class Southern family in Dallas, Georgia. Her upbringing emphasized Southern hospitality, close‑knit community ties, and a strong value on education and self‑reliance.
    Family traditions included church gatherings and local festivals, while her college experience introduced her to diverse ideas and artistic expression. This blend of regional heritage and broader cultural
    exposure shapes her appreciation for both traditional Southern values and innovative, unconventional perspectives.
