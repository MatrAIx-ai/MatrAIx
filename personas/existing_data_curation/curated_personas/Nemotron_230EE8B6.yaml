  career_goals: Jennie aims to transition from her current cashier position into a data‑analytics or research role that leverages her STEM background and disciplined work style. Over the next 12–18 months
    she plans to complete a professional data‑analytics certificate, build a portfolio of visual analytics projects, and secure an entry‑level data analyst position at a regional healthcare or technology
    firm. Long‑term, she aspires to become a senior analyst or project manager, overseeing data‑driven initiatives that blend scientific insight with compelling visual storytelling. She also intends to
    pursue a master’s degree in data science and eventually contribute to community STEM outreach programs.
