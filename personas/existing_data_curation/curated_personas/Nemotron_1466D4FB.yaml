personas:
  professional: Nancy Cubero, a 27-year-old arts enthusiast with a knack for organization and community engagement, leverages their strong communication, event‑planning, and digital project‑management skills
    to coordinate inclusive art shows and fundraisers while dreaming of a future arts director role.
  sports: Nancy Cubero, a 27‑year‑old yoga devotee and salsa dancer who hikes the Bluegrass State trails each weekend, follows the Kentucky Wildcats basketball and the Cincinnati Bengals football teams,
    and balances active pursuits with a relaxed fitness philosophy that prioritizes enjoyment over competition.
  arts: Nancy Cubero, a 27‑year‑old avid museum goer and community‑theater participant, draws inspiration from Ansel Adams’ landscapes and Vivian Maier’s street photography while savoring the novels of
    Chimamanda Ngozi Adichie and the performances of Lin‑Manuel Miranda, often curating Instagram galleries that blend these influences with their own quilting designs.
  travel: Nancy Cubero, a 27‑year‑old who prefers curated weekend getaways that mix hiking in the Appalachians with cultural immersion, has explored Asheville’s art scene, spent a weekend in New Orleans
    for its jazz and cuisine, and now dreams of wandering the colorful souks of Marrakech while keeping travel costs low through off‑season planning.
  culinary: Nancy Cubero, a 27‑year‑old home‑cooker who loves hearty Southern fare, expertly prepares shrimp and grits with smoked paprika, collard greens seasoned with ham hocks, and sweet corn‑bread,
    while also experimenting with fresh heirloom tomatoes from the farmer’s market in their weekly dinner parties.
  core: Nancy Cubero, a 27‑year‑old organized creative who blends community service with a passion for the arts, lives by a schedule of gallery visits, yoga flows, and spontaneous DIY projects, even if
    they sometimes binge‑watch reality TV when deadlines loom.
background:
  cultural: 'Nancy grew up in Lexington, South Carolina, a tight‑knit Southern town where hospitality, community, and tradition are core values. Her upbringing was shaped by family gatherings, church involvement,
    and local festivals that celebrate Southern cuisine, folk music, and crafts like quilting. While she embraces these cultural roots, her college experience broadened her perspective, fostering an appreciation
    for diverse artistic expressions and progressive ideas. This blend of Southern warmth and curiosity informs her worldview: she values harmony and community service, yet seeks innovative, inclusive ways
    to enrich the cultural life of her region.'
attributes:
  skills: '["Effective communication", "Event planning and coordination", "Project management", "Social media content creation", "Basic graphic design (Canva)", "Research and information synthesis", "Customer
    service", "Volunteer recruitment and coordination", "Time management and organization", "Hospitality and guest relations"]'
  hobbies: '["Visiting art galleries and museums", "Participating in community theater workshops", "Photography (street and nature)", "Reading contemporary fiction and non‑fiction", "Yoga and group fitness
    classes", "Salsa dancing", "Hiking local trails", "Cooking and hosting dinner parties", "Volunteer work at local community center", "DIY crafts and quilting"]'
  career_goals: Nancy aims to transition into a full‑time role in arts administration or nonprofit program coordination, ideally with a community arts center or local museum in the Lexington area. She plans
    to complete her bachelor’s degree in communications or arts management while obtaining a nonprofit management certification. Her short‑term goal is to secure a program coordinator position where she
    can design inclusive community events, develop grant‑writing skills, and lead fundraising initiatives. Long‑term, she aspires to become an arts director, shaping regional cultural programming and fostering
    partnerships that bring diverse artistic experiences to her Southern community.
