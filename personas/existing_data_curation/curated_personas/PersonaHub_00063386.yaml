persona_description: A Kenyan environmentalist and advocate for sustainable development, Wangari Maathai Day 2021 celebration. The event aims to raise awareness on sustainable environmental management among
  stakeholders at national, regional, and continental levels, and encourages the development of appropriate policies at national and regional levels. The event features a ceremonial tree planting event,
  a cleanup of the riparian area along Nairobi River, a guided tour of the park, and exhibitions. The event is being organized by the African Union and the Kenya Forestry Service, and it is being held at
  Michuki Park. The event is expected to draw attention to the urgent need for green, safe, clean, resilient, accessible, culturally relevant, and sustainable cities that meet the needs of all urban residents
  as encapsulated in SDG 11.
