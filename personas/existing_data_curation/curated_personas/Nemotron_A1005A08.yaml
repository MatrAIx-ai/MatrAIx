personas:
  professional: Giovanni Kodary, an information systems manager with a decade of experience overseeing AWS and Azure cloud environments, leverages bilingual communication and high emotional intelligence
    to calm tense team moments, yet their love of flexible routines sometimes leads to spontaneous, ad‑hoc solutions that keep operations humming.
  sports: Giovanni Kodary, a weekend hiker and avid angler on the prairie lakes near Fort Supply, regularly joins the local Outdoor Recreation Club, cheers for the Oklahoma City Thunder and Dallas Cowboys,
    and occasionally plays pickup soccer with the Fort Supply Community League during spring.
  arts: Giovanni Kodary, a dedicated acoustic guitarist, spends evenings learning classic corridos and modern ballads from artists like José Alfredo Jiménez and Alejandro Fernández, regularly attends performances
    by local mariachi ensembles, and finds inspiration in thriller novels by Gillian Flynn and the cinematic storytelling of Alfonso Cuarón.
  travel: Giovanni Kodary, an explorer who balances spontaneous road trips with carefully planned getaways, prefers weekend escapes to the nearby Wichita Mountains and has a bucket‑list that includes a
    cultural pilgrimage to Oaxaca for its Día de los Muertos festivities and a sunrise hike in Patagonia’s Torres del Paine.
  culinary: Giovanni Kodary, an enthusiastic home chef, masters dishes such as chicken tinga, homemade corn tortillas, and smoky chipotle mole, using fresh cilantro, roasted chile de árbol, and masa harina,
    while occasionally treating friends to a paella‑inspired feast that showcases their love for bold, layered flavors.
  core: Giovanni Kodary blends technical mastery with a community‑first spirit, juggling structured IT leadership, spontaneous guitar riffs, and a constant quest for calm amid swirling anxiety.
background:
  cultural: Giovanni is of Mexican descent and grew up in a bilingual household where Spanish and English were spoken interchangeably. His cultural roots emphasize community, family ties, and respect for
    tradition, which manifest in his cooperative demeanor and his love for Mexican music, food, and celebrations such as Día de los Muertos and Cinco de Mayo. Living in Fort Supply, Oklahoma, he blends
    these traditions with the local Midwestern ethos, fostering connections across cultural lines and serving as a bridge between his heritage and the broader community.
attributes:
  skills: '["IT infrastructure management", "Cloud services (AWS, Azure)", "Network design and troubleshooting", "Data backup and disaster recovery", "Budget planning and cost control", "Vendor negotiation
