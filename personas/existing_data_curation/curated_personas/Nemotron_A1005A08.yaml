    "Conflict resolution and team building", "Emotional intelligence and crisis de‑escalation"]'
  hobbies: '["Hiking and nature walks in the Oklahoma plains", "Fishing at nearby lakes", "Playing acoustic guitar and learning traditional Mexican songs", "Cooking authentic Mexican cuisine", "Casual multiplayer
    video gaming (RPGs, strategy games)", "Volunteering to teach basic computer skills at community centers", "Reading thriller novels", "Mindfulness meditation and journaling", "Attending local Mexican
    cultural festivals"]'
  career_goals: Giovanni aims to advance to a regional IT director role where he can shape digital transformation strategies across multiple sites. He plans to earn professional certifications such as CISSP
    and PMP to bolster his credibility in security and project management. While he values flexibility, he wants to introduce more sustainable, structured processes that still allow his team to adapt quickly
    to changing demands. Additionally, he hopes to launch a mentorship program for Hispanic youth in Oklahoma to inspire interest in technology, and to complete a GED or associate degree in information
    technology to formalize his education.
