    community events'']'
  career_goals: Although retired, Wendy aims to stay actively engaged in her community by mentoring younger volunteers at the senior center, leading a small community‑garden initiative, and documenting
    her family’s genealogy in a memoir. She wants to preserve local history through the historical society, maintain her independence and health, and continue learning new skills that keep her mind sharp
    and her curiosity satisfied.
