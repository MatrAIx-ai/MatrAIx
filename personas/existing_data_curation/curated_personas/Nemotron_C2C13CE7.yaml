personas:
  professional: Wanda Johnson, a seasoned artisan baker with over four decades of experience, blends traditional Southern techniques with contemporary pastry design, applying a methodical recipe‑development
    process, meticulous inventory control, and a compassionate mentorship style that nurtures community workshops and charitable food events; they pride themselves on precision and kindness.
  sports: Wanda Johnson, an avid walker, joins the Auburn Senior Strollers club for weekly park walks, cheers on the Auburn Tigers football team each fall, and enjoys watching the Atlanta Braves baseball
    games on television, preferring low‑impact exercise that complements her garden work; they value steady, low‑stress activity over competitive sports.
  arts: Wanda Johnson, a watercolor enthusiast, captures still‑life pastries and garden blooms in soft pastel palettes, admires the works of Claude Monet and Georgia O'Keeffe, quilts inspired by Amish patterns,
    collects vintage copper pots, and performs in community theater productions of 'Our Town' while singing hymns in her church choir, finding solace in both visual and performing arts; they consider creativity
    a daily meditation.
  travel: Wanda Johnson, a meticulous planner, enjoys leisurely road trips to historic towns like Charleston, Savannah, and Asheville, has a bucket‑list visit to the patisserie schools of Paris and the
    lavender fields of Provence, and prefers staying at charming bed‑and‑breakfasts that allow her to sample local pastries and gather limited‑edition kitchenware, while budgeting carefully for her fixed
    retirement income; they weave travel dreams into their culinary aspirations.
  culinary: Wanda Johnson, an expert baker, excels at crafting sourdough loaves, lemon‑lavender shortbread, pecan praline tarts, and herb‑infused biscuits, using fresh thyme, rosemary, almond flour, and
    vanilla beans from her garden, and enjoys serving friends at her home‑cooking gatherings where their vintage cast‑iron skillet takes center stage; they view each pastry as a canvas for storytelling.
  core: Wanda Johnson blends meticulous organization with a boundless curiosity for culinary art, turning her quiet garden and vintage kitchenware into a sanctuary of pastries, quilts, and community kindness,
    even as they occasionally hoard recipes and forget to schedule their own dentist visits.
background:
  cultural: Wanda grew up in Auburn, Alabama, in a close-knit white Southern family that prized hospitality, hard work, and community bonds. Her childhood was steeped in Southern culinary traditions—biscuits,
    pecan pie, and comfort foods—shared around church gatherings and family meals. Living through the civil-rights era and the social changes of the 1960s and 1970s fostered in her a deep sense of compassion,
    cooperation, and a desire to bridge divides, shaping her commitment to volunteer service. Today, she balances reverence for Southern heritage with an openness to new ideas, reflecting a blend of traditional
    values and curious, unconventional thinking.
attributes:
  skills: '[''Artisan bread and pastry baking'', ''Cake decoration and sugar artistry'', ''Recipe development and flavor experimentation'', ''Food safety and ServSafe compliance'', ''Inventory management
