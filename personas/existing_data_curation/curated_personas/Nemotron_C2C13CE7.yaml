  hobbies: '[''Watercolor painting'', ''Reading historical fiction'', ''Herb and vegetable gardening'', ''Quilting'', ''Attending local art exhibitions'', ''Volunteering in church choir'', ''Participating
    in community theater'', ''Collecting vintage kitchenware'', ''Walking nature trails'']'
  career_goals: Wanda hopes to preserve her family’s baking legacy by publishing a cookbook that blends classic Southern recipes with her own creative twists. She also aspires to open a small community
    bakery-café in Auburn that serves as a gathering place for neighbors, offers baking classes for youth, and supports local farmers through sustainable sourcing. Additionally, she aims to participate
    in regional culinary competitions and explore new techniques such as gluten-free and vegan pastries, while continuing her volunteer work at the local food bank.
