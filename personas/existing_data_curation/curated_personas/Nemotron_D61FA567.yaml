  career_goals: Looking ahead, Manuel aims to transition into a foreman or crew‑lead position where he can formalize his leadership while still enjoying the hands‑on aspects of construction. He plans to
    earn OSHA certification and a heavy‑equipment operator credential to boost his credibility. Ultimately, he envisions starting a small, family‑run contracting business that combines his Mexican culinary
    flair with community‑focused projects, securing a stable retirement for his wife and children while maintaining his reputation as a competitive yet respected figure in the local trade.
