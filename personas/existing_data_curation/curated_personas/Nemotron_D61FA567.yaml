personas:
  professional: Manuel Rooney, a seasoned construction specialist with three decades of hands‑on experience, blends a pragmatic mastery of framing, concrete work, and heavy‑equipment operation with a restless
    curiosity for emerging building technologies, steering crews through informal yet fiercely competitive leadership that thrives on their sociable, talkative presence on the job site.
  sports: Manuel Rooney, a devoted fisherman on the Chippewa River, also plays for a local recreational softball league, roots for the Minnesota Vikings and the Milwaukee Brewers, and belongs to a weekend
    pickup‑truck club that organizes off‑road rallies, approaching fitness with a laid‑back yet competitively spirited attitude.
  arts: Manuel Rooney, an avid acoustic‑guitar player at the town pub, leads sing‑alongs of traditional Mexican corridos with a Midwestern twist, admires the storytelling of Johnny Cash and the passionate
    vocals of Vicente Fernández, and occasionally volunteers at community theater productions, letting music and performance shape their social identity.
  travel: Manuel Rooney prefers spontaneous road trips in their pickup, often heading to the Badlands or the lakes of northern Minnesota for weekend fishing, while dreaming of a culinary pilgrimage to Oaxaca
    to explore authentic mole recipes, yet family responsibilities and a modest budget keep most of their travel within the Upper Midwest.
  culinary: Manuel Rooney, a self‑taught chef, expertly prepares tacos al pastor, mole poblano, and chiles en nogada for Día de los Muertos gatherings, delights in grilling marinated carne asada on their
    smoker, and blends fresh corn tortillas with locally sourced chilies, all while experimenting with sous‑vide techniques for perfectly tender carnitas.
  core: Manuel Rooney is a talkative, competition‑driven construction veteran who juggles spontaneous BBQ parties, relentless curiosity for new tools, and a skeptical yet sociable streak, all while secretly
    hoarding extra fishing lures and neglecting paperwork.
background:
  cultural: Manuel’s Mexican heritage is a cornerstone of his identity, reflected in his fluency in Spanish, devotion to family gatherings, and celebration of holidays such as Día de los Muertos and Cinco
    de Mayo. While rooted in Mexican traditions—like sharing homemade tamales and playing mariachi‑inspired music—he has also embraced the Midwestern values of community involvement and love for the outdoors
    that are common in Eau Claire, Wisconsin. This blend of cultures fuels his sociable nature, his appreciation for both established customs and new ideas, and his desire to contribute positively to both
    his ethnic community and his local neighborhood.
