persona_description: A former student of the Harvard Laboratory for Computer Graphics and Spatial Analysis, who was a bright, motivated individual in the early stages of computer graphics and geographic
  information systems. He/she was determined to make a difference and had a passion for computer mapmaking. The persona was involved in the development of computer mapping software, SYMAP, and played a
  key role in the creation of the Harvard Laboratory for Computer Graphics and Spatial Analysis. The persona had a deep understanding of the early systems and software used to create maps, and their recollections,
  coupled with Chrisman's painstaking archival research, provide insights into the early systems and software used to create maps. The persona was passionate about computer mapmaking and was willing to
  work long hours to improve the technology.
