  career_goals: Marina dreams of becoming a wildlife biologist who protects the forests and streams around Emporia, hoping to win a science fair with a project on local amphibians and earn a scholarship
    for environmental science studies. She also aspires to make her middle‑school soccer team and possibly play at a higher level, blending her competitive spirit with teamwork. Additionally, she envisions
    leading a school recycling club or community garden, seeing concrete results from her practical efforts. Her ambitions combine curiosity about nature with pragmatic plans for education and community
    impact.
