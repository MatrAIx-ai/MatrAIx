personas:
  professional: Marina Sutherland, a budding junior naturalist, blends curiosity about insects with a pragmatic talent for constructing LEGO habitats, turning field observations into detailed comic‑style
    journals; they approach each discovery with a competitive spark while keeping their methods flexible and loosely organized.
  sports: Marina Sutherland, an enthusiastic midfielder for the Riverdale Kids Soccer Club, spends Saturdays sprinting across the local field while cheering for the nearby professional team the Lakewood
    Lions and rooting for the national Women’s Soccer squad, and they also dabble in weekend bike rides and imaginative freeze‑tag games with neighborhood friends.
  arts: Marina Sutherland, a comic‑strip creator who devours adventure novels by Rick Riordan and mystery tales by Sharon M. Draper, fills their sketchbooks with illustrated insects and LEGO scenes while
    dancing to the pop hits of Taylor Swift and the country twang of Kacey Musgraves, letting music and storytelling fuel a vivid, competitive imagination.
  travel: Marina Sutherland prefers spontaneous day‑trips to nearby state parks such as Greenwood Forest and the sparkling Willow Creek trail, often wandering off the beaten path to collect wild leaves
    and bugs, and dreams of camping under the stars at Yellowstone National Park, balancing curiosity‑driven wanderlust with the practical limits of a school schedule and family budget.
  culinary: Marina Sutherland, a budding baker, mixes chocolate chips, lavender, and toasted oat crumbs to craft experimental cookie batches in the kitchen, proudly sharing their creations with friends
    after soccer practice, yet sometimes burns the edges due to a tendency to lose track of time while daydreaming about LEGO builds.
  core: Marina Sutherland is a curious, competitive ten‑year‑old who toggles between exploring woods, building LEGO worlds, and impulsively splurging on video game upgrades, all while juggling a breezy
    approach to chores and a habit of misplacing school supplies.
background:
  cultural: Marina is a white American girl growing up in Emporia, a small town in Southampton County, Virginia. Her family traces its roots to English and Scots‑Irish ancestry and maintains Southern traditions
    such as Sunday church, family barbecues, and community festivals. The rural setting gives her regular exposure to agriculture, hunting culture, and local wildlife, which fuels her interest in nature.
    While she enjoys modern media—TV shows, video games, and popular music—she also values the close‑knit community feel of Emporia, where neighbors frequently gather for potlucks and school events. Her
    upbringing blends relaxed Southern hospitality with a practical, hands‑on approach to daily life.
