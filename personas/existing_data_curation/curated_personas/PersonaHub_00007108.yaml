persona_description: A pharmacist who is passionate about improving cancer awareness and treatment options. They are dedicated to increasing early detection and treatment rates for oesophago-gastric cancer,
  a disease that has a high mortality rate and can be prevented with early diagnosis. The persona is well-versed in pharmacology and has a strong understanding of the potential role of pharmacists in healthcare.
  They are committed to educating patients about the symptoms of oesophago-gastric cancer and advocating for earlier diagnosis and treatment.
