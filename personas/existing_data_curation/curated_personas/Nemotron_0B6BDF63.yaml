  hobbies: '[''Reading theology and poetry'', ''Journaling'', ''Playing piano/gospel music'', ''Photography of historic Charleston'', ''Cooking soul‑food'', ''Coastal walking and meditation'', ''Participating
    in community basketball games'']'
  career_goals: Charles aspires to deepen his theological knowledge by enrolling in an accredited seminary program, aiming to earn a Master of Divinity while balancing his current pastoral duties. He hopes
    to become the senior pastor of his congregation, guiding its growth and expanding its social‑service footprint across Charleston County. Passionate about mental health, he plans to develop a church‑based
    counseling center that integrates faith‑based support with evidence‑based therapy techniques, targeting young adults who struggle with anxiety and depression. Long‑term, Charles envisions mentoring
    future clergy from underserved Black communities, fostering a new generation of compassionate leaders who blend tradition with innovative pastoral practices.
