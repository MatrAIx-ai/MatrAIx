  hobbies: '["Visiting art museums and galleries", "Gardening", "Quilting and patchwork", "Cooking Southern cuisine", "Reading biographies and local history", "Listening to blues and jazz music", "Writing
    memoirs and reflections", "Volunteering at the senior center", "Attending small church gatherings"]'
  career_goals: Although retired, Deanna aims to deepen her impact as a community elder. She plans to develop an intergenerational art and garden program at the local senior center, where seniors can share
    stories and craft with younger participants. She also hopes to document and publish a collection of family and neighborhood histories, preserving Memphis’s African-American cultural legacy. Continuing
    her own learning, Deanna wants to explore new art techniques such as pottery and to take occasional workshops. Ultimately, she aspires to remain a compassionate guide, helping widowed and isolated seniors
    build supportive networks while maintaining her own health and independence.
