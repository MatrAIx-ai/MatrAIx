personas:
  professional: Kimbley Sheard, an aspiring home‑based caterer currently enrolled in a culinary arts certification, leverages their keen organizational talent and community‑focused mindset to craft nutritious
    Southern‑style menus while flexibly adapting to last‑minute event changes.
  sports: Kimbley Sheard enjoys weekend walks along Spring Hill nature trails with their dog, participates in a local women's walking club, ardently supports the Nashville Predators and the Tennessee Titans,
    and treats community clean‑up events as a form of low‑impact cardio.
  arts: Kimbley Sheard, a devoted church choir member, sings gospel harmonies, dances to classic R&B icons like Marvin Gaye and contemporary artists such as H.E.R., and frequently attends cultural heritage
    festivals featuring performances by local jazz ensembles.
  travel: Kimbley Sheard prefers road trips to culinary hotspots like New Orleans and Asheville, plans day‑long hikes in the Great Smoky Mountains when holidays allow, and dreams of an immersive cooking
    tour in Oaxaca, balancing travel aspirations with family and business responsibilities.
  culinary: Kimbley Sheard, a seasoned home cook, experiments with collard greens and quinoa‑infused gumbo, sweet potato pie sweetened with coconut sugar, and pepper‑crusted shrimp over cauliflower grits,
    using ingredients such as okra, turmeric, and fresh garden produce to craft healthier twists on traditional Southern dishes.
  core: Kimbley Sheard blends curiosity with practicality, turning a love for Southern cooking, community service, and organized flexibility into a budding home‑catering venture while juggling family, budget,
    and occasional health challenges.
background:
  cultural: Kimbley was raised in a close‑knit African American family in Central Florida, where church, family gatherings, and community solidarity are central pillars. Her grandparents migrated from the
    Deep South during the Great Migration, bringing soul‑food traditions, storytelling, and a strong work ethic that shaped her upbringing. She values self‑reliance, mutual support, and the celebration
    of Black heritage that characterize the Spring Hill Black community. Kimbley actively participates in local cultural events such as Juneteenth celebrations, Black History Month library programs, and
    church socials featuring gospel music and cook‑offs. Her cultural identity blends Southern roots, contemporary Floridian influences, and a commitment to preserving and sharing her community’s history
    and traditions.
