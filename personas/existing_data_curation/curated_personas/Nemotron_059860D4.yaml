personas:
  professional: Zachary Gregory is a high‑school junior who channels his methodical mind into building custom PC rigs and coding small scripts, aspiring to become a mechanical‑software engineer, and applies
    his disciplined, self‑reliant upbringing to meticulously plan each project while quietly competing in online coding challenges.
  sports: Zachary Gregory follows the Arkansas Razorbacks football team on game nights, occasionally joins a youth fishing club that practices catch‑and‑release on Lake Ouachita, and maintains personal
    fitness by doing solo calisthenics in their garage, preferring structured, solitary workouts over team sports.
  arts: Zachary Gregory is an avid model‑kit painter who draws artistic inspiration from the intricate sculptures of H.R. Giger and the sweeping film scores of Hans Zimmer, often listening to classic rock
    legends like Bob Dylan while meticulously painting, and they occasionally attend local art fairs at the county fair.
  travel: Zachary Gregory has taken weekend trips to Hot Springs National Park and a family road‑trip to Austin, Texas, and dreams of visiting the tech museums of Tokyo and the historic shipyards of Bilbao,
    preferring meticulously planned itineraries that balance quiet nature hikes with occasional exposure to bustling city tech scenes.
  culinary: Zachary Gregory prefers hearty Southern comfort food like fried catfish with cornmeal batter, homemade baked beans seasoned with smoked paprika, and occasionally experiments with making sourdough
    bread using rye flour, but they often neglect balanced nutrition in favor of rapid, high‑protein snack bars while binge‑coding.
  core: Zachary Gregory is a meticulous, solitary teen who balances a relentless drive for technical mastery with quiet anxiety, often channeling nervous energy into precise model‑painting, coding, and
    solitary hikes, while occasionally slipping into late‑night snack binges and over‑planning every detail.
background:
  cultural: Zachary grew up in Barling, Arkansas, within a white, middle‑class Southern family that values self‑reliance, hard work, and community ties. His upbringing includes regular attendance at a local
    Protestant church, exposure to Southern outdoor traditions such as hunting and fishing, and participation in community events like county fairs. Though he prefers solitude, the cultural emphasis on
    responsibility and practical skills has shaped his disciplined, methodical approach to life.
attributes:
  skills: '[''Organizational planning'', ''Computer hardware troubleshooting'', ''Basic Python programming'', ''Strategic gaming (chess, real‑time strategy)'', ''Woodworking and model‑kit construction'']'
  hobbies: '[''Model kit building'', ''Custom PC assembly'', ''Python coding projects'', ''Chess'', ''Reading non-fiction (science/technology)'', ''Fishing and nature walks'', ''Wood‑carving'']'
  career_goals: He aims to pursue a career in software development or engineering where he can apply his systematic thinking and love for structure. In the next few years he plans to earn his high school
    diploma, acquire certifications in computer hardware (CompTIA A+) and programming, and eventually attend a technical college to become a software engineer or mechanical engineer. He also dreams of starting
    a small business customizing PCs for gamers and hobbyists, leveraging his technical expertise.
