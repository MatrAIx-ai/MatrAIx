  career_goals: Adonias aims to move into a senior or lead developer role where he can influence system architecture and mentor younger talent. He is passionate about creating culturally inclusive software,
    especially tools that serve the Mexican‑American community in the Midwest. Over the next few years he hopes to launch a bilingual tech‑education program for adults and to contribute to open‑source projects
    focused on accessibility. While pursuing these ambitions, he plans to streamline his workload to achieve a healthier work‑life balance and reduce stress, allowing him to continue giving back to his
    community through volunteer tech workshops and cultural initiatives.
