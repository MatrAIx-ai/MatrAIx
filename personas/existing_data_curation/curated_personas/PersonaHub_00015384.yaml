persona_description: A scientist who is interested in marine ecosystems and their dynamics, particularly in the Gulf of Maine and the Atlantic Ocean. They are interested in collecting and analyzing plankton
  data through the use of the Hardy Continuous Plankton Recorder (CPR) and the Acoustic Doppler Current Profiler (ADCP), and are familiar with the use of XBTs and thermosalinographs for temperature and
  salinity measurements. They are interested in the long-term trends and patterns in the ecosystem and are looking for ways to improve the accuracy and reliability of the data collected.
