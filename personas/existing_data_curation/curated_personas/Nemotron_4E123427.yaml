personas:
  professional: Maria Haripersaud, a seasoned radiologic technologist with three decades of expertise in CT, MRI, and radiation safety, leverages their curious and competitive nature to lead dose‑reduction
    research, mentor junior staff, and integrate health‑informatics data into quality‑improvement initiatives while balancing meticulous organization with creative flexibility.
  sports: Maria Haripersaud fuels their love of the outdoors by joining the El Yunque Trailblazers hiking club for weekend treks, while cheering on the Cangrejeros de Santurce baseball team in winter and
    participating in a senior circuit tennis league that emphasizes low‑impact cardio and friendly competition, all within intimate, supportive group settings.
  arts: Maria Haripersaud immerses themselves in visual arts by frequenting the Museum of Art of San Juan, drawing inspiration from the vibrant street photography of David Galindo, the mixed‑media canvases
    of Lucia Ortiz, and the soulful salsa rhythms of Tito Puente, which they weave into their own experimental paintings that blend traditional motifs with contemporary abstraction.
  travel: Maria Haripersaud prefers meticulously planned, culturally immersive trips that blend photography expeditions with quiet retreats, having recently captured sunrise over Cartagena’s historic walls,
    while dreaming of tasting Tuscan wines among rolling vineyards and trekking the Canadian Rockies on a future solo adventure, all balanced against a modest retirement budget.
  culinary: Maria Haripersaud delights in reinventing classic Caribbean cuisine, skillfully fusing roasted plantains, garlic‑infused pork, and a daring dash of dark chocolate into a signature mofongo, while
    also perfecting citrus‑bright ceviche with cilantro and experimenting with heirloom tomatoes, smoked paprika, and locally sourced herbs in their kitchen laboratory.
  core: Maria Haripersaud, a fiercely curious radiology veteran with a competitive edge, channels solitary afternoons into mixed‑media art, hoards vintage camera lenses like a hobbyist, and habitually checks
    radiation‑dose charts on the kitchen counter while sipping espresso, a ritual that mirrors their blend of precision and creative wanderlust.
background:
  cultural: Maria was born and raised in the vibrant neighborhoods of San Juan, a city where African, Taino, and Spanish heritages intertwine. She grew up bilingual, speaking Spanish at home and mastering
    English through her college education at the University of Puerto Rico, Río Piedras. The rhythm of bomba, plena, and salsa, along with the island’s culinary staples—mofongo, arroz con gandules, and
    tostones—shaped her daily life. Witnessing the community’s resilience after Hurricane Maria reinforced her sense of responsibility toward public health and fueled her commitment to improving access
    to quality medical imaging in underserved areas. Maria’s cultural identity blends a respect for traditional customs with a forward‑looking curiosity, driving her to honor her roots while embracing innovative
    ideas in both her professional and personal pursuits.
