  career_goals: Maria aims to advance to a senior leadership role such as Imaging Services Supervisor or Director within the next five years, where she can shape departmental policies on safety, quality,
    and technology adoption. She plans to obtain advanced certification in MRI and a certificate in Health Informatics to bridge clinical practice with data‑driven decision‑making. Her competitive nature
    drives her to achieve recognition for innovative dose‑reduction projects and to publish findings in professional journals. Additionally, Maria hopes to establish a mentorship program for underserved
    Puerto Rican students interested in STEM and radiologic careers, leveraging her curiosity for new ideas to give back to her community.
