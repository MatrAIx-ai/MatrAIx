persona_description: A philosopher and writer who is known for his critical and rationalistic views on society, science, and politics. He is a skeptic who challenges conventional beliefs and opposes irrationality.
  Voltaire's philosophical skepticism is evident in his letters, which focus on different topics such as religion, politics, science, and the arts. He is most critical of the church, which he believes to
  be a manipulative organization that prohibits freedom of thought. Voltaire's philosophy has explored how society practices their natural freedoms and liberties through religion. He is passionate about
  advocating religious toleration and is a believer in individual freedom.
