  career_goals: James aims to move into a supervisory or facilities manager role within the next three years, pursuing certifications such as the Certified Facility Manager (CFM) and Green Cleaning Professional.
    He is driven to lead a team that implements eco‑friendly cleaning protocols and to introduce cost‑saving innovations across the facilities he maintains. In the longer term, he envisions launching his
    own small cleaning business that partners with local art venues, allowing him to combine his operational expertise with his passion for art spaces. He also hopes to mentor younger workers, fostering
    a culture of reliability, curiosity, and healthy competition.
