  hobbies: '[''Salsa dancing'', ''Soccer'', ''TikTok video creation'', ''Volunteering at community center'', ''Participating in school club events'', ''Reading young adult fiction'', ''Listening to Puerto
    Rican music'']'
  career_goals: Elizabeth aims to graduate high school with strong grades and earn a scholarship that will allow her to pursue a vocational program in emergency medical services or nursing, fields where
    her organizational abilities and desire to help others can thrive. In the short term, she plans to obtain CPR certification and gain experience volunteering at the local health clinic. Long‑term, she
    envisions becoming a certified EMT or registered nurse and eventually establishing a community health outreach center in Naranjito that provides affordable care and health education for youth. Her competitive
    nature pushes her to seek leadership roles in future work settings, while her structured mindset ensures she sets clear milestones and follows through on each step.
