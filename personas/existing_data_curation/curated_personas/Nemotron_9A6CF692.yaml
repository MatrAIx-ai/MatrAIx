personas:
  professional: Elizabeth Martez is an organized high‑school junior who channels their methodical scheduling, bilingual translation ability, and basic first‑aid training into leading the girls’ soccer team’s
    logistics and volunteering at the community health clinic, and they view this as the first step toward a future EMT career.
  sports: Elizabeth Martez is a competitive midfielder for the Naranjito Girls Soccer Club who trains five days a week, follows the Puerto Rico women’s national soccer team and the San Juan Bayamón baseball
    club for inspiration, and they blend structured workouts with spontaneous salsa‑driven cardio sessions to stay energized.
  arts: Elizabeth Martez expresses their cultural flair by choreographing TikTok dances to Bad Bunny’s reggaeton hits and classic plena rhythms from Los Pleneros de la 21, while also immersing themselves
    in contemporary YA novels by Angie Thomas and the vibrant performances of salsa legend Victor Manuelle.
  travel: Elizabeth Martez prefers meticulously planned weekend trips, having explored Old San Juan’s historic forts and the misty trails of El Yunque, and they now dream of a budget‑friendly cultural tour
    of Seville and Rome that balances family obligations with their craving for new experiences.
  culinary: Elizabeth Martez is a capable home cook who masters arroz con gandules using their abuela’s secret sofrito, lovingly assembles pasteles for the annual fiesta, and experiments with mango‑avocado
    salsa on grilled lechón, while they occasionally treat themselves to pepperoni pizza with extra cheese on study nights.
  core: Elizabeth Martez is a fiercely organized, socially energetic teen who balances competitive soccer, meticulous planning, and vibrant dance with a steady undercurrent of anxiety that drives them to
    over‑prepare for every challenge.
background:
  cultural: Elizabeth is a Puerto Rican teenager from Naranjito, a close‑knit municipality in the island's central mountains. Her family follows Catholic traditions and actively participates in the town's
    annual fiestas patronales honoring San José, where music, dance, and communal meals are central. She grew up speaking Spanish at home while receiving English instruction at school, giving her a bilingual
    foundation. The local culture blends Spanish, African, and indigenous Taino influences, evident in the cuisine she loves—arroz con gandules, lechón, and pasteles—and the vibrant rhythms of bomba and
    plena that shape her musical tastes. The strong sense of family and neighborhood solidarity fuels her sociable and competitive spirit, while the proximity to San Juan's urban environment exposes her
    to contemporary trends and opportunities, inspiring her ambitions for education and community service.
