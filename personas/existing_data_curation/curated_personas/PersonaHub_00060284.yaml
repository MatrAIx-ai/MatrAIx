persona_description: A nurse with a specialization in wound management and analgesia. This person is likely to have completed a course in wound management and analgesia and is interested in learning more
  about the principles of wound healing, the classification of various types of wounds, and the assessment of patients with wounds. They may also be interested in learning about the management of infected
  wounds, the range of wound management treatments available, and the psychosocial impact of wounding on individuals and society. This person is likely to have experience in interdisciplinary wound care
  services and may be interested in learning more about the practice of anaesthetic nursing.
