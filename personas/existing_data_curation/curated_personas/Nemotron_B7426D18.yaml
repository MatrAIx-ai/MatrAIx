personas:
  professional: Steven Martin, an aspiring automotive service technician, blends his hands‑on aptitude for oil changes and electrical troubleshooting with a natural knack for rallying community members
    at local events, turning his practical curiosity into a reputation for reliable garage work and charismatic shop floor camaraderie.
  sports: Steven Martin, a regular participant in pickup basketball games at the local community center and a devoted fan of the Michigan Wolverines college football team, supports the Detroit Lions on
    Sundays, blends weekend tailgating with casual gym sessions, and keeps a flexible fitness routine that prioritizes social play over solitary workouts.
  arts: Steven Martin, an avid music streamer who cycles through classic rock legends like Led Zeppelin and modern hip‑hop artists such as Kendrick Lamar while also channeling DIY creativity after watching
    Bob Ross tutorial videos, finds personal expression in crafting custom BBQ grill signage and curating spontaneous jam sessions at church potlucks.
  travel: Steven Martin, a spontaneous weekend traveler who prefers budget road trips to places like the Great Smoky Mountains and the vibrant streets of New Orleans, dreams of a future road‑trip across
    the Southwest's national parks but currently balances travel aspirations with the financial constraints of college tuition and a budding BBQ venture.
  culinary: Steven Martin, a self‑taught Southern barbecue enthusiast who obsessively refines a signature rub of smoked paprika, brown sugar, and cayenne pepper to perfect pulled pork ribs and occasionally
    experiments with gelato‑style banana pudding, balances home‑cooked feasts with late‑night fast‑food runs after marathon gaming sessions.
  core: Steven Martin is a social, down‑to‑earth future auto tech who juggles nightly gaming marathons, backyard grill experiments, and a laid‑back attitude toward plans, often forgetting appointments but
    never missing a pickup basketball call.
background:
  cultural: Steven grew up in a white, Southern family in Albany, Georgia, a region steeped in agricultural roots and close‑knit community life. His upbringing was shaped by frequent church attendance,
    Sunday family meals, and the rhythm of small‑town events like county fairs and high‑school football games. He was raised with Southern hospitality values—friendliness, helping neighbors, and a respect
    for tradition—while also being encouraged to stay curious and practical, a balance reflected in his love for both tried‑and‑true family recipes and new, hands‑on projects. The local culture’s emphasis
    on community support and self‑reliance has informed his interpersonal style and his desire to contribute to the town’s social fabric.
