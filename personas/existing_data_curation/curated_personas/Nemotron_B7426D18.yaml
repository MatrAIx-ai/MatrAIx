  career_goals: Steven aims to transform his practical skill set into a stable career. Over the next two years he plans to enroll in the local community college’s automotive technology program to earn a
    certification as a vehicle service technician. He hopes this will lead to a full‑time position at a nearby auto shop, giving him a reliable income and a clear career track. Simultaneously, he dreams
    of launching a small mobile barbecue stand that can serve weekend crowds at local festivals and farmers’ markets, leveraging his cooking talent and community connections. In the longer term, he envisions
    expanding that venture into a family‑run eatery or a catering business, potentially pairing it with a future associate‑degree in business administration to sharpen his managerial skills.
