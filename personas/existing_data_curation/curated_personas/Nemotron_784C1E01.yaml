personas:
  professional: Shon Buell, a 59‑year‑old facilities specialist, leverages decades of hands‑on cleaning and maintenance expertise to supervise small crews, champion eco‑friendly cleaning protocols and streamline
    operations, while balancing a pragmatic curiosity that drives them to constantly test new sustainable products against tried‑and‑true methods.
  sports: Shon Buell, a loyal supporter of the local high school football team and a fan of the Washington Commanders, attends Friday night games with a group of friends, cheers for the Marlins during spring
    training, participates in weekend fishing trips on the Chesapeake Bay, and is a member of a community fishing club that meets at the pier, while occasionally playing pickup softball at the park to stay
    active.
  arts: Shon Buell immerses themselves in classic rock, regularly listening to Led Zeppelin, The Rolling Stones, and The Doors on a vintage turntable, collects Civil War memorabilia and reads authors like
    Shelby Foote, and often attends local historical society lectures and museum exhibitions, letting the narratives of past conflicts shape their appreciation for disciplined, detail‑oriented work.
  travel: 'Shon Buell favors practical, low‑stress getaways: they spend summers exploring historical sites such as Gettysburg and Antietam, take weekend canoe trips on the Potomac River, and plan vacations
    around community service opportunities like park clean‑ups in the Blue Ridge Mountains, avoiding overly crowded tourist traps and preferring destinations with a blend of nature and history.'
  culinary: Shon Buell loves farm‑to‑table cooking, growing tomatoes and peppers in raised beds, grilling fresh Chesapeake Bay striped bass with a homemade lemon‑herb rub, and preparing hearty stews flavored
    with smoked paprika and fresh rosemary; they are competent in the kitchen but often skip the cleanup, letting the lingering scent of wood smoke serve as a reminder of their woodworking projects.
  core: Shon Buell blends a competitive, detail‑driven work ethic with a love for hands‑on hobbies, balancing eco‑conscious professionalism with a stubborn reluctance to delegate, often swapping a meticulous
    cleaning schedule for an impromptu woodworking sprint.
background:
  cultural: Shon is a white American of Irish and German ancestry, raised in a working‑class family in the Mid‑Atlantic region of Maryland. The blue‑collar culture of his community emphasized hard work,
    modesty, and self‑reliance, shaping his pragmatic outlook. He celebrates traditional American holidays, enjoys regional dishes like crab cakes and Old Bay‑seasoned seafood, and participates in church
    gatherings that reinforce communal ties. The maritime heritage of Harford County fostered his love of fishing and appreciation for the Chesapeake Bay. These cultural influences blend with his practical
    curiosity, making him both grounded in tradition and open to incremental innovation.
attributes:
  skills: '["Commercial cleaning", "Floor stripping and waxing", "Carpet extraction", "Restroom sanitation", "Chemical safety and handling", "OSHA compliance", "Minor plumbing repairs", "Electrical fixture
    replacement", "HVAC filter maintenance", "Inventory management", "Team supervision", "Green cleaning practices", "Time scheduling"]'
  hobbies: '["Woodworking", "Fishing", "Gardening", "Reading historical non-fiction", "Volunteer park clean-up", "Attending high school football games", "Classic rock music", "DIY home repairs"]'
  career_goals: Shon aims to leverage his decades of hands‑on experience into a supervisory or facilities‑manager role before retirement, seeking a Certified Facility Manager (CFM) credential within the
    next two years. He hopes to lead a small team, improve operational efficiency, and introduce sustainable cleaning protocols across his building portfolio. In parallel, he plans to start a part‑time
    consulting service offering eco‑friendly cleaning and basic maintenance for local churches, community centers, and small businesses, allowing him to stay active and financially secure while mentoring
    younger workers. Ultimately, he wants to be recognized for his reliability, practical expertise, and contribution to healthier work environments.
