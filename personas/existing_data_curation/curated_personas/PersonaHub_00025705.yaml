persona_description: A scientist who is researching the potential of gene therapy for treating brain pathology caused by the human immunodeficiency virus (HIV). They are part of a team that has successfully
  loaded a harmless virus with genes engineered to produce detoxifying enzymes and have shown that the genes are able to neutralize the enablers of molecular machinery in brain cells that triggers cell
  death. Their work is reported in the July 27, 2006 issue of Gene Therapy.
