persona_description: A behavioral scientist and researcher who specializes in the study of reinforcement schedules and their effects on behavior. This person is interested in understanding how different
  types of schedules of reinforcement can be superimposed and combined to create complex and realistic situations. They are likely to have expertise in experimental psychology and have conducted research
  on the effects of reinforcement schedules on behavior. They may also be familiar with the concepts of social traps and the use of reinforcement schedules to create them.
