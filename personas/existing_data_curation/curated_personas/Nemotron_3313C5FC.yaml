  career_goals: Looking ahead, Linda aims to leverage her disciplined approach and competitive drive into a career that blends technical problem‑solving with leadership. She aspires to earn a scholarship
    to a STEM‑focused high school and later study civil or mechanical engineering, with a long‑term goal of designing sustainable infrastructure for her hometown and the Great Lakes region. Parallel to
    her academic ambitions, she hopes to secure a varsity swimming scholarship, eventually competing at the collegiate level. Linda also envisions taking on leadership roles in student government or community
    service organizations, using her organizational expertise to spearhead projects that improve local public spaces. She plans to continue building her programming skills, aiming for internships in robotics
    or software development to broaden her technical portfolio.
