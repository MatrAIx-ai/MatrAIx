personas:
  professional: Linda Delucia is an aspiring robotics engineer and debate enthusiast who leverages their ultra‑organized nature to write clean code for competition robots after swim practice, craft airtight
    argument outlines for tournament rounds, and lead school fund‑raisers with precision, and they constantly seek new challenges.
  sports: Linda Delucia is a varsity swimmer for New London High School, training five days a week under Coach Andrews, a proud supporter of the Cleveland Browns, Cavaliers, and Guardians, and a member
    of the Lorain County Aquatics Club, where they compete in regional relays during the spring season, and they channel competitive energy into every lap.
  arts: Linda Delucia is a piano hobbyist who enjoys playing Beethoven's "Für Elise" and contemporary pop songs by Taylor Swift, devours mystery novels by Agatha Christie and Gillian Flynn, solves Rubik's
    Cubes for stress relief, attends community theater productions starring local actors like Jenna Hart, and streams animated series featuring voice work by Tom Hanks, and they often use musical interludes
    as a mental reset between robotics sessions.
  travel: Linda Delucia is an adventure‑curious teen who spends summer weekends at Cedar Point amusement park, has road‑tripped with their family to Washington D.C. for the National Museum of American History,
    dreams of visiting the robotics expo in Tokyo, hopes to explore Boston’s historic streets, all while balancing a limited travel budget, and they meticulously plan each trip using a printable itinerary.
  culinary: Linda Delucia is a budding cook who favors classic Midwestern comfort foods like mac and cheese with sharp cheddar and a breadcrumb topping, crafts homemade pepperoni pizza with fresh basil
    and mozzarella, bakes apple pie with a flaky crust and cinnamon, occasionally experiments with sushi rolls using avocado, cucumber, and soy sauce after watching online tutorials, and they keep a notebook
    of recipes organized by color‑coded tabs.
  core: Linda Delucia blends Midwestern diligence with a competitive edge, juggling varsity swim laps, robotics code, debate prep, and meticulous budgeting while secretly hoarding late‑night snack wrappers
    and obsessively color‑coding their planner, and they never miss a chance to lead a group activity.
background:
  cultural: Linda comes from a middle‑class, white family in New London, a small town in Lorain County, Ohio. The community reflects traditional Midwestern values that emphasize hard work, punctuality,
    and a strong sense of neighborly responsibility. Family gatherings often revolve around holidays such as Thanksgiving and the Fourth of July, with local traditions including fair visits, community picnics,
    and volunteer projects at the town’s public library. The local church and the annual Lorain County Fair influence her appreciation for community service and seasonal celebrations. This environment nurtures
    her respect for structure, her competitive spirit in school athletics, and her penchant for organized group activities.
