persona_description: A poet who writes about the struggles and injustices faced by the native Australian Aboriginal people, particularly those who are exploited by the mining industry. She uses vivid imagery
  and powerful language to convey her anger and bitterness towards the greed and destruction of the environment. Her poem, "Time is Running Out," is a powerful call to action for the indigenous people to
  stand up and defend their land against the mining industry. The poem is emotionally charged and thought-provoking, encouraging the reader to reflect on the consequences of human greed and exploitation.
  The poem's form and meter create a sense of urgency and urgency, underscoring the need for immediate action to protect the environment and preserve the natural world.
