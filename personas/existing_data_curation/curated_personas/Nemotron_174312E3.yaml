  career_goals: Teresa dreams of becoming someone who can blend art and science, envisioning futures like an astronaut exploring new worlds, a video game designer crafting immersive stories, or an inventor
    who creates playful educational tools. She is motivated to keep learning, wants to study space science and digital art, and hopes to share her creations with a wide audience.
