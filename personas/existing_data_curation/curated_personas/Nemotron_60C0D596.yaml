personas:
  professional: Jose Narvaez, an aspiring comic artist and future game designer, merges hand‑drawn sketches, digital art apps, and LEGO robotics to prototype imaginative worlds, channeling their curiosity
    and spontaneous creativity while constantly battling a dislike for rigid schedules.
  sports: Jose Narvaez, a passionate soccer player for the Berks County Youth Soccer Club, dribbles the ball after school while cheering for the Philadelphia Eagles on weekends, and spends free afternoons
    biking the local trails to stay fit.
  arts: Jose Narvaez, a budding visual storyteller, devours graphic novels like 'Saga' and 'Bone', studies the panel layouts of Jeff Smith, draws inspiration from the rhythms of Bad Bunny and Shakira, and
    practices guitar chords to the pop hooks of Charlie Puth, weaving these influences into their own comic creations.
  travel: Jose Narvaez, an adventurous weekend explorer, prefers spontaneous bike rides to nearby Lancaster County parks, dreams of wandering the Smithsonian museums in Washington, D.C., and hopes to someday
    bike along the coastline of Cape May, balancing limited family funds with a curiosity for new sights.
  culinary: Jose Narvaez, a kitchen apprentice, loves helping their family prepare aromatic rice with peas and pork, sprinkles fresh cilantro on homemade tacos, and experiments with pizza topped with pepperoni,
    pineapple, and mozzarella, showing a budding skill set that mixes traditional comfort foods with bold flavor combos.
  core: Jose Narvaez, a curious and spontaneous 11‑year‑old, fuses comic art, soccer, and LEGO robotics into a vibrant tapestry of ideas, yet often forgets deadlines and misplaces sketches.
background:
  cultural: Jose is raised in a close‑knit Puerto Rican family in Reading, Pennsylvania. At home, Spanish is spoken alongside English, and cultural customs such as celebrating Three Kings Day, preparing
    arroz con gandules, and dancing to salsa and bomba are part of his upbringing. He participates in local Latino community events and attends a church that incorporates both Caribbean and American traditions.
    The blend of island heritage and his suburban American environment shapes his worldview, fostering a strong sense of cultural pride and curiosity about both his roots and the broader world.
