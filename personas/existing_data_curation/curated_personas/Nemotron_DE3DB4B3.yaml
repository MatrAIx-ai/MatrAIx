  career_goals: Brendan aims to complete a bachelor's degree—preferably in computer science or environmental science—and secure a stable, technically focused role such as a software developer or data analyst.
    He hopes to work on technology solutions that benefit agriculture or small businesses in his hometown, blending curiosity with practicality. Additionally, he wants to deepen his understanding of mental
    health, possibly volunteering as a peer counselor, and eventually open a small tech repair and consultancy shop in Cassatt that serves the local community while providing him with a reliable income.
