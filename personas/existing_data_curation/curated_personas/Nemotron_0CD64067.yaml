  hobbies: '[''Fishing'', ''Hiking'', ''Acoustic guitar'', ''Homebrewing'', ''Reading (science & history)'', ''Volunteering at food pantry'', ''Board games'', ''Arduino/Raspberry Pi tinkering'']'
  career_goals: Nicolas aims to progress from a senior management analyst to a director of strategy within Montgomery's regional government or a consulting firm that supports public‑sector clients. He seeks
    to lead a multidisciplinary team, influence policy decisions that improve community services, and develop data‑driven frameworks for sustainable growth. To support this path, he plans to obtain a certification
    in project management (PMP) and possibly a master's degree in public administration, while maintaining a flexible work style that allows him to balance professional advancement with personal pursuits.
