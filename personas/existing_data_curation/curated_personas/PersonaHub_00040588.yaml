persona_description: A researcher or health professional who is interested in understanding the prevalence and factors associated with extreme thinness in adolescent boys and girls, and how this relates
  to health behavior and family factors. They are likely to be familiar with the Journal of Advanced Nursing and the work of Mason et al. (2016), and may be interested in using the results to inform planning
  and evaluation of adolescents' health check-ups or interventions in weight management, health behavior, or exercise. They may also be interested in applying the findings to nursing and other healthcare
  professions, and to healthcare policy makers.
