  hobbies: '[''Abstract Watercolor Painting'', ''Generative Art Coding'', ''Hiking'', ''Kayaking'', ''Organic Gardening'', ''Farm-to-Table Cooking'', ''Improvisational Theater'', ''Speculative Fiction Reading'',
    ''Puzzle Solving'', ''Stargazing'']'
  career_goals: Lorie aims to establish a research program that fuses mathematical rigor with artistic expression, creating data‑driven visual installations that illuminate environmental change on the Puget
    Sound. She hopes to secure a tenure‑track position at a regional university where she can lead an interdisciplinary lab, attract graduate students, and publish in top-tier journals. Parallel to her
    academic ambitions, she is committed to mentoring the next generation of women in STEM through local outreach, scholarships, and informal science cafés on Vashon Island. In the longer term, Lorie envisions
    creating a community‑focused data hub that equips local farmers and policymakers with predictive tools for sustainable land use, thereby translating her scholarly work into tangible civic impact.
