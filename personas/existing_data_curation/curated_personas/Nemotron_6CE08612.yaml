personas:
  professional: Lorie Bayse, a mathematics professor specializing in differential equations, stochastic processes, and numerical analysis, blends rigorous computational research with generative art and
    community outreach, leveraging their relaxed curiosity to mentor students and translate complex data into striking visual installations that illuminate environmental change.
  sports: Lorie Bayse, an avid hiker and weekend kayaker on Vashon Island, participates in the Vashon Hiking Club, follows the Seattle Seahawks, Seattle Sounders FC, and the Seattle Storm with spirited
    enthusiasm, and fits in a weekly yoga session at a community studio to stay limber.
  arts: Lorie Bayse, a passionate abstract watercolorist who also codes generative art, regularly attends improv sessions with the Vashon Players, draws inspiration from artists like Yayoi Kusama and James
    Turrell, and finds solace in the ambient soundscapes of Björk and the folk storytelling of Joni Mitchell.
  travel: Lorie Bayse, a lover of both tranquil retreats and bold adventures, frequently escapes to the San Juan Islands for kayaking, has trekked Iceland’s volcanic terrain to study fractal basalt formations,
    dreams of solo travel through Japan’s Shikoku pilgrimage routes, and prefers low‑key, eco‑friendly planning over rigid itineraries.
  culinary: Lorie Bayse, an enthusiastic home chef, cultivates heirloom tomatoes and kale in a backyard garden, whips up farm‑to‑table dishes like wild mushroom risotto with foraged chanterelles, smoked
    salmon with dill‑infused cream cheese, and a spiced apple crumble that showcases a love of seasonal, organic ingredients.
  core: Lorie Bayse, a mathematically‑minded environmental storyteller who weaves art into data, lives sustainably, forgets to file taxes on time but never forgets a starlit night on the water, and they
    stay curious about the world.
background:
  cultural: Lorie comes from a white American background, with family roots tracing back to German and Scandinavian immigrants who settled in the Pacific Northwest during the early 20th century. Raised
    in the Seattle metropolitan area, she absorbed the region’s strong environmental ethic, a love for outdoor recreation, and a flourishing arts scene. The eclectic, community‑oriented culture of Vashon
    Island—known for its blend of artisans, activists, and independent thinkers—has further shaped her values of collaboration, sustainability, and openness to unconventional ideas. While she identifies
    with mainstream American cultural norms, she also embraces the region’s progressive attitudes toward gender equity in STEM and the integration of creative expression into everyday life.
