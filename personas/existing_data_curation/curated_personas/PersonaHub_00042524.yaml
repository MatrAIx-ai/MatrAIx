persona_description: A historian who specializes in the study of European history, particularly the era from the 15th to the 18th century. His research interests include the history of the New World, the
  Spanish and Portuguese explorations, the spread of Protestantism, the religious wars in Europe, the French and English Reformation, the Dutch revolt against Spain, and the political and social developments
  in the Netherlands. He is particularly interested in the lives and works of key historical figures such as Christopher Columbus, Martin Luther, Ulrich Zwingli, Henry VIII, Henry VIII, Elizabeth I, and
  Henry IV. He is also interested in the development of the scientific method and the role of the Catholic Church in shaping European history.
