personas:
  professional: Sara Hernandez is a veteran construction specialist with over two decades of hands‑on experience in concrete finishing, carpentry, and heavy‑equipment operation, whose methodical, organized
    nature and quiet curiosity drive her toward a forewoman role while championing sustainable, energy‑efficient building practices in her hometown.
  sports: Sara Hernandez enjoys low‑impact fitness through daily solitary walks along historic streets, participates in a community volleyball league at the local youth center, and follows the Leones de
    Ponce baseball team with avid seasonal enthusiasm, reflecting her preference for modest, steady activity over high‑intensity sports.
  arts: Sara Hernandez immerses herself in the island’s musical heritage by collecting recordings of plena groups like Plena Libre and bomba ensembles such as Bomba y Plena All Stars, joining informal jam
    sessions on weekends, and crocheting decorative blankets inspired by traditional patterns for donation to shelters.
  travel: Sara Hernandez prefers meticulously planned short getaways, often visiting nearby colonial towns like Old San Juan for architecture photography, dreaming of a future trip to Barcelona to study
    modernist structures, while balancing travel costs against her goal of launching a sustainable contracting business.
  culinary: Sara Hernandez delights in preparing aromatic island staples such as mofongo, arroz con gandules, and pastelón, seasoning them with fresh cilantro, oregano, and plantain flowers harvested from
    her balcony garden, and she prides herself on mastering the art of slow‑cooked sofrito that infuses every dish with depth.
  core: Sara Hernandez blends quiet curiosity with methodical pragmatism, channeling her solitary habits and occasional worry into diligent craftsmanship, sustainable advocacy, and a steady collection of
    cultural music while nurturing a garden on a modest balcony.
background:
  cultural: 'Sara’s cultural background is deeply rooted in Puerto Rican traditions, particularly those of the southern city of Ponce, known as “La Perla del Sur.” Growing up in a close‑knit extended family,
    she was immersed in the island’s Spanish‑African‑Taino blend of customs: the vibrant rhythms of plena and bomba, the communal preparation of dishes like lechón asado and arroz con gandules, and the
    Catholic festivals that mark the town’s calendar. The historic architecture of Ponce, with its colorful facades and ornate balconies, sparked her early fascination with built environments. While she
    has never married, she maintains strong connections with her parents, siblings, and cousins, who often gather for weekend meals and cultural celebrations. Her bilingual fluency (Spanish and English)
    reflects the island’s colonial history and modern economic ties. Sara’s identity as a Puerto Rican woman in a traditionally male‑dominated trade shapes her commitment to mentoring other women in construction,
    honoring the resilient spirit of her community.'
