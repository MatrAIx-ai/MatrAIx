  hobbies: '[''Historical architecture photography'', ''Balcony gardening (herbs and tropical plants)'', ''Cooking traditional Puerto Rican cuisine'', ''Listening to plena and bomba music'', ''Volunteer
    work with historic preservation society'', ''Crocheting blankets for community shelters'', ''Stargazing'']'
  career_goals: Sara aims to advance from construction laborer to crew foreman within the next two years, pursuing an associate’s degree in construction management and certifications such as OSHA 30‑hour
    and NCCER. She wants to lead a small crew, improve site‑safety metrics, and champion the adoption of greener building methods in the Ponce region. In the longer term, she envisions launching a modest
    contracting firm that specializes in energy‑efficient residential renovations, providing mentorship opportunities for other women entering the construction trades. Her curiosity drives her to attend
    workshops on emerging technologies such as prefabricated modular components and advanced concrete additives, while her concern for stress reduction motivates her to implement clear safety protocols
    and realistic scheduling practices.
