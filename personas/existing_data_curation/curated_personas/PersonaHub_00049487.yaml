persona_description: A district leader who is responsible for managing the transition to the Next Generation Science Standards (NGSS) in their school district. This person is looking for resources and guidance
  to help them effectively manage the implementation process. They are interested in learning about the indicators of successful NGSS implementation, the challenges and issues associated with implementation,
  and the key questions, timelines, decisions, and considerations for district leaders. They are also interested in the experiences of early implementer districts in California, specifically those that
  participated in the California NGSS K-8 Early Implementation Initiative.
