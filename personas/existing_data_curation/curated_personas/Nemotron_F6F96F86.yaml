  career_goals: Brenda aims to advance to a Director of Operations role within the next five years, where she can shape enterprise‑wide efficiency initiatives and mentor emerging talent. She is passionate
    about championing diversity and inclusion, planning to spearhead programs that support Black‑owned businesses in Indianapolis. Long‑term, she envisions launching a boutique consulting firm that offers
    operational best‑practice services to midsize companies, particularly those seeking to embed structured, sustainable growth strategies.
