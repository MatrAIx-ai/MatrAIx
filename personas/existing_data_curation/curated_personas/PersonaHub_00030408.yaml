persona_description: A dedicated and passionate educator who is passionate about improving the literacy skills of Limited English Proficient (LEP) students in Charlotte Mecklenburg Schools (CMS). With a
  background in teaching and a proven track record of success in implementing literacy programs, this person is committed to ensuring that these students have the opportunity to reach their full potential.
  They have a deep understanding of the unique educational needs of ELLs and the importance of providing them with the support and resources they need to succeed. This person is highly skilled in small-group
  learning and has experience working with experienced CMS teachers to provide a full-day program that is free for all students. They have a strong commitment to providing summer literacy education to CMS
  students, and have contributed their expertise and gained classroom experience in the process.
