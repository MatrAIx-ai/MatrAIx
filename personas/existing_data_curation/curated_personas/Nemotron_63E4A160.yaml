personas:
  professional: Jose Casas, a seasoned line cook with over a decade of fast‑paced kitchen experience, they leverage meticulous knife work, precise inventory control, and a calm, cooperative demeanor to
    mentor junior staff while developing menus that fuse traditional Puerto Rican flavors with contemporary American and Italian twists.
  sports: Jose Casas enjoys early‑morning jogs along the South Shore beach, they supplement the routine with weekly yoga at a local studio, and they cheer for the New York Mets and Long Island Ducks as
    a member of the Suffolk Beach Runners club.
  arts: Jose Casas finds creative inspiration in the rhythmic beats of salsa legend Willie Colón, bomba rhythms from the Taller de Arte collective, and contemporary Latin jazz from Arturo O’Farrill, they
    often pair listening sessions with food‑photography projects that capture the vibrant colors of their plated dishes.
  travel: Jose Casas favors culinary‑focused trips, they have explored the street‑food stalls of San Juan and the gumbo kitchens of New Orleans, and now they dream of weekend getaways to Oaxaca’s vibrant
    markets and Barcelona’s tapas bars, planning each voyage around seasonal produce and modest budgets.
  culinary: Jose Casas channels their love of heritage and seasonal produce into home‑cooked experiments like cilantro‑infused mofongo with adobo‑marinated pork, oregano‑sprinkled pasta primavera, and recao‑brightened
    arroz con gandules, they document each dish with meticulously styled food photography that highlights texture and color.
  core: Jose Casas blends disciplined kitchen expertise with a cautious, curiosity‑driven mindset, they balance a meticulous approach to cooking, finances, and health while quietly wrestling with stress‑driven
    worries and a penchant for late‑night culinary tinkering.
background:
  cultural: Jose was born to Puerto Rican parents who migrated to New York in the early 1980s. Growing up in a bilingual household in Long Island, he was immersed in the island's culinary traditions—Sunday
    family meals featuring arroz con gandules, pernil, and pasteles—while also experiencing the multicultural influences of the New York area. He celebrates key Puerto Rican holidays such as Fiesta de San
    Juan and maintains close ties with the local Puerto Rican community through church events and cultural festivals. His cooking reflects a fusion of his heritage and the flavors of his Suffolk County
    surroundings, and he values the island's emphasis on family, hospitality, and sharing food as a way to bring people together.
attributes:
  skills: '["Puerto Rican cuisine", "American comfort cooking", "Italian pasta dishes", "Knife skills", "Food safety (ServSafe)", "Menu planning", "Inventory management", "Cost control", "Bilingual communication
