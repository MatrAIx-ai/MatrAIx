  hobbies: '["Home recipe experimentation", "Herb gardening", "Food photography", "Listening to Latin music (salsa, bomba, jazz)", "Reading culinary books", "Jogging on the beach", "Yoga", "Small potluck
    gatherings", "Volunteer cooking for community shelter"]'
  career_goals: Jose aims to become a sous chef within the next two years, using his strong foundation in kitchen operations to eventually assume a head chef role at a community‑focused restaurant in Suffolk
    County. He wants to open a modest eatery or food‑truck that showcases modern Puerto Rican flavors, emphasizing locally sourced ingredients and sustainable practices. To support this, he plans to enroll
    in a culinary arts program part‑time to earn an associate degree and obtain a Certified Chef de Cuisine credential. He also hopes to host small cooking workshops for neighborhood groups, sharing his
    love of heritage dishes while building a loyal clientele. Ultimately, his ambition is to create a stable, low‑stress environment where he can balance his professional passion with personal well‑being.
