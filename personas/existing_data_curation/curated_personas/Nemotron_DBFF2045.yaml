  career_goals: Raymond aims to advance from site‑level management to a regional operations director overseeing multiple construction projects across upstate New York. He plans to earn a PMP certification
    and complete a bachelor’s degree in construction management to complement his hands‑on experience. In the long term, he hopes to launch his own boutique contracting firm focused on green building and
    energy‑efficient design. He also wants to develop a mentorship program for younger tradespeople while improving his stress‑management techniques, so he can maintain a healthier work‑life balance.
