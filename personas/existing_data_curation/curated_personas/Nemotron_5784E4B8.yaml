personas:
  professional: Andrea Odonnell, a veteran geriatric nurse with three decades of frontline experience, combines meticulous charting and evidence-based wound care with a reserved yet assertive mentorship
    style, channeling her love of structure into part-time clinical education while allowing occasional flexibility for her garden and birdwatching pursuits.
  sports: Andrea Odonnell, a devoted fan of the New Jersey Devils and the Philadelphia Eagles, maintains her fitness through early shoreline walks, seasonal bird-watching hikes, and a weekly pickleball
    session at the senior center, preferring low-impact group play over high-intensity sports while still cheering loudly during playoff games.
  arts: Andrea Odonnell finds creative refuge in watercolor seascapes reminiscent of Winslow Homer and in knitting scarves inspired by coastal colors, often donating her art to local charities, while also
    enjoying the folk tunes of James Taylor and attending the intimate productions at Cape May Stage.
  travel: Andrea Odonnell prefers structured day trips to historic coastal towns like Newport and Savannah, planning itineraries that leave room for spontaneous shell-collecting pauses, and dreams of a
    calm sailing cruise to the Bahamian islands once her retirement schedule eases.
  culinary: Andrea Odonnell delights in cooking seasonal seafood dishes such as clam chowder and lobster rolls, seasoning them with garden-fresh herbs like rosemary and thyme, while her habit of over-salting
    and occasional late-night snack of peppered popcorn reveals a modest indulgence.
  core: Andrea Odonnell is a meticulous, service-driven nurse who balances a structured professional life with a solitary love of nature, yet wrestles with occasional disorganization, lingering worry, and
    a stubborn habit of over-planning her garden layout.
background:
  cultural: Raised in a modest, middle‑class family on the New Jersey coast, Andrea grew up immersed in the traditions of the Mid‑Atlantic region. Her parents, a schoolteacher and a small‑business owner,
    instilled values of self‑reliance, community service, and modesty. She was active in her local Protestant church, celebrated classic American holidays, and participated in town events such as the Cape
    May Volunteer Fire Department’s annual fundraiser and the historic Victorian Festival. Andrea’s cultural identity reflects a blend of New England and Atlantic coastal influences, evident in her appreciation
    for seasonal seafood cuisine, historic preservation, and community health initiatives. Her long career in nursing has reinforced a pragmatic, service‑oriented worldview, while her English‑American heritage
    shapes a respectful, understated social demeanor.
