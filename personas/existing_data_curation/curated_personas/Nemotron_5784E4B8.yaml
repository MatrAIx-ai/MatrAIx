  hobbies: '[''Shoreline walking and shell collecting'', ''Backyard gardening (herbs, roses, native plants)'', ''Birdwatching at Cape May Bird Observatory'', ''Reading historical fiction and biographies'',
    ''Crossword puzzles and sudoku'', ''Knitting scarves for charity'', ''Watercolor painting of seascapes'', ''Volunteering as a historical docent at Emlen Physick Estate'', ''Participating in a small
    book club'', ''Genealogy research'', ''Cooking healthy meals for family and friends'']'
  career_goals: In the next few years Andrea aims to transition into a part‑time clinical educator role at Cape May Hospital, focusing on training new nurses in geriatric best practices and patient safety.
    She plans to obtain a Certified Hospice and Palliative Nurse (CHPN) credential to better serve the aging community in her town. Andrea also hopes to lead a small patient‑safety committee, championing
    evidence‑based interventions that reduce medication errors. Balancing her desire for structure with her need for flexibility, she intends to continue volunteering with the local senior center, delivering
    health workshops on chronic disease management. Ultimately, she seeks a more predictable schedule that eases her stress while allowing her to mentor the next generation of nurses.
