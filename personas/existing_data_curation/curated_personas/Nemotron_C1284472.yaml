personas:
  professional: Luan Stevens, a budding game creator who builds simple Scratch games after school, channels their curiosity and practicality into structured coding projects while they eagerly share prototypes
    with classmates, balancing detailed planning with spontaneous design twists.
  sports: Luan Stevens, a dedicated midfielder for the Sandy Hook Youth Soccer Club, cheers for New York City FC and the New York Knicks, and they combine regular after-school practices with weekend matches,
    using a competitive drive to improve stamina while occasionally fretting over losing streaks.
  arts: Luan Stevens, a spirited dancer at the local Rhythm Moves studio, draws inspiration from pop icons like Taylor Swift and Billie Eilish, and they spend evenings sketching LEGO-themed fan art of Harry
    Potter scenes, blending artistic flair with a love for structured storytelling.
  travel: Luan Stevens, who loves weekend explorations of Sandy Hook tide pools and annual family trips to the historic streets of Williamsburg, Virginia, dreams of visiting the Great Barrier Reef to study
    marine life and they plan future adventures to the Harry Potter theme park in Orlando.
  culinary: Luan Stevens, an enthusiastic kitchen helper, enjoys crafting pepperoni pizza slices, assembling crunchy veggie wraps with hummus, and whipping up strawberry-banana smoothies, yet they sometimes
    forget to clean up, leaving a perpetually sticky countertop.
  core: Luan Stevens is a curiosity-driven, competitively spirited ten-year-old who balances organized projects with spontaneous play, they often worry about outcomes while thriving in group activities.
background:
  cultural: 'Luan comes from a white Anglo‑American family living in the suburban coastal community of Sandy Hook, Connecticut. Her family celebrates typical American holidays such as Thanksgiving, Christmas,
    and Fourth of July, and they attend a local Methodist church where community service is emphasized. Growing up in Fairfield County, she is exposed to a blend of New England cultural values: a strong
    emphasis on education, environmental stewardship of the nearby Long Island Sound, and a love of outdoor recreation like beach trips and hiking. Her parents encourage curiosity and practical learning,
    often taking her on weekend museum visits and science fairs.'
