persona_description: A psychologist who specializes in the study of stereotype threat and its impact on academic achievement and motivation. The individual is interested in understanding the psychological
  processes that contribute to the achievement gap between minority and white students and is actively researching interventions to reduce this gap. They have published research on the effects of stereotype
  threat on African American college students, the academic self-knowledge of African-American students, and the impact of attributional ambiguity on stereotype vulnerability. The individual is also interested
  in the cultural malleability of the racial/ethnic hierarchy of intelligence and how this relates to stereotype threat and academic achievement.
