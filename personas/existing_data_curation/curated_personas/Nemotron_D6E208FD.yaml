  hobbies: '["Sailing in Biscayne Bay", "Cooking traditional Puerto Rican dishes", "Photography of historic architecture", "Reading architectural history", "Rooftop gardening", "Playing Spanish guitar",
    "Volunteering at community design workshops", "Model ship building", "Walking the beach at sunrise", "Tennis"]'
  career_goals: Jorge aims to leverage his blend of curiosity and practicality by steering his organization toward cutting‑edge, resilient design solutions for coastal developments. In the next five years,
    he plans to obtain his professional engineering license, transition into a senior consultancy role focused on sustainability and community‑centred projects, and mentor the next generation of architects
    and engineers. He also aspires to spearhead a firm‑wide initiative to lower carbon emissions and create a legacy of harmonious, stress‑aware workplaces that prioritize well‑being for both clients and
    staff.
