personas:
  professional: Jorge Santana, a seasoned architectural and engineering manager in Miami, blends meticulous BIM coordination, hurricane‑resilient design, and bilingual client liaison to deliver sustainable,
    code‑compliant coastal projects while nurturing a collaborative, harmony‑focused team culture.
  sports: Jorge Santana, a dedicated member of the Biscayne Bay Sailing Club, spends weekends racing sailboats, follows the Miami Heat and Miami Marlins avidly, and balances their active routine with low‑impact
    tennis at the local community center, favoring structured workouts that fit their organized schedule.
  arts: Jorge Santana finds artistic refuge in playing Spanish guitar pieces by Andrés Segovia, curating black‑and‑white photographs of Miami Modernist structures reminiscent of Julius Shulman, and devouring
    architectural histories by John Ruskin, often attending performances at the Adrienne Arsht Center to fuel their design imagination.
  travel: Jorge Santana plans meticulously for sailing excursions to the Florida Keys and the Bahamas, dreams of a sustainable architecture tour in Copenhagen, and revisits Puerto Rico’s historic Old San
    Juan each year, balancing a love for structured itineraries with occasional spontaneous weekend trips to nearby art‑rich cities that they discover through travel forums.
  culinary: Jorge Santana, a competent home chef, regularly prepares traditional Puerto Rican dishes such as mofongo, arroz con gandules, and pastelón using fresh plantains, sofrito, and adobo, while experimenting
    with seafood paellas on their rooftop grill, yet often over‑salts the sofrito in a quest for the perfect flavor balance.
  core: Jorge Santana’s life is a symphony of precise design, strategic sailing, and a persistent worry that drives them to double‑check every blueprint, weather forecast, and retirement projection before
    sunrise.
background:
  cultural: 'Jorge is a first‑generation Puerto Rican‑American who was raised in a close‑knit diaspora community in Miami. He grew up bilingual, celebrating island traditions such as Noche de San Juan,
    bomba music, and cooking family recipes passed down from his grandparents. His cultural identity informs his professional ethos: a strong sense of family, community responsibility, and a respect for
    the resilience that characterizes Puerto Rican heritage. He actively participates in local Puerto Rican festivals and supports cultural preservation initiatives within the Miami area.'
attributes:
  skills: '["Architectural design", "Structural analysis", "Project management", "BIM coordination", "LEED certification", "Miami‑Dade building code compliance", "Team leadership", "Budgeting and cost estimation",
