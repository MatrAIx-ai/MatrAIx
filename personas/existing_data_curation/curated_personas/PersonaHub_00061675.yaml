persona_description: A group of Georgia Tech electrical engineering students who have developed a heads-up-display for firefighters that measures vital signs and helps them determine when they are overexerting
  themselves and at risk for cardiac arrest. The invention won first place in the Georgia Tech InVenture Prize and will represent the Institute in the inaugural ACC InVenture Prize. The students, Tyler
  Sisk and Chris Braun, previously worked together on Science Olympiad projects and built a robotic arm. They were inspired by health bar displays found in video games and wanted a way to share this information
  with officials on the scene. They moved the heads-up-display inside the mask and used a near-eye display, which is meant to be looked at up close. They fine-tuned and improved the design through Tech's
  Idea to Prototype class and spent nearly every weekend visiting fire departments to learn from firefighters how to improve the device. They are still talking with firefighters and plan to remove the flashlight
  currently on the device.
