personas:
  professional: Reyna Capo, a 43‑year‑old dental hygienist known for her lively patient‑education sessions and competitive drive for high satisfaction scores, leverages a curious yet practical skill set
    in dental prophylaxis and periodontal assessment while often juggling a flexible schedule that sometimes lets paperwork slip through the cracks, and they actively mentor newer staff using their talkative,
    bilingual communication style.
  sports: Reyna Capo stays active by salsa dancing three nights a week, joining a local adult soccer league that cheers for Orlando City SC, attending weekend yoga sessions, and passionately rooting for
    the Orlando Magic during NBA season while occasionally following the Tampa Bay Lightning for a winter sports fix.
  arts: Reyna Capo channels her vibrant personality into karaoke nights where they belt out hits by Shakira and Marc Antonio, host DIY décor projects inspired by Frida Kahlo’s bold colors, and unwind watching
    telenovelas starring Gabriela Spanic and Sebastián Rulli, all of which reinforce her love of expressive, communal art.
  travel: Reyna Capo balances spontaneous weekend getaways to Key West and annual pilgrimages to the historic town of Cartagena with carefully budgeted road trips across Florida, preferring flexible plans
    that can accommodate family responsibilities and the occasional impromptu festa with friends.
  culinary: Reyna Capo, an enthusiastic home chef, perfects gallo pinto and nacatamales for neighborhood potlucks while also crafting vibrant salads with avocado, black beans, and quinoa, and they relish
    exploring the flavors of ceviche and pupusas at local food festivals, though they occasionally indulge in late‑night fast‑food tacos after a long shift.
  core: Reyna Capo is a charismatic dental hygienist who spins salsa moves and karaoke performances into a competitive, talk‑filled life, juggling caring instincts with occasional disorganization and a
    relentless worry that keeps them both proactive and on edge.
background:
  cultural: Reyna grew up in a close‑knit Nicaraguan immigrant family in Kissimmee, where Spanish was spoken at home and Catholic traditions shaped daily life. Family gatherings centered around music, dance,
    and hearty meals, instilling a love for community and celebration. She maintains strong ties to Nicaragua through regular video calls, remittances, and participation in cultural events like La Purísima
    and the Nicaraguan Independence Day parade in Central Florida. Her heritage influences her culinary preferences, bilingual communication style, and a deep sense of responsibility toward both her local
    community and her relatives abroad.
attributes:
  skills: '[''Dental prophylaxis'', ''Periodontal charting'', ''Fluoride application'', ''Patient education'', ''Infection control'', ''Basic dental software (Dentrix)'', ''Spanish language proficiency'',
    ''Interpersonal communication'', ''Team mentoring'', ''Scheduling and patient flow management'']'
  hobbies: '[''Salsa dancing'', ''Cooking Nicaraguan cuisine'', ''Karaoke nights'', ''Gardening'', ''Volunteering at church food pantry'', ''Watching telenovelas'', ''Attending community festivals'', ''DIY
    home décor'']'
  career_goals: Reyna aims to advance to a lead dental hygienist role where she can influence clinic protocols and mentor a larger team. She is considering earning a GED and later an associate degree to
    formalize her education, with a long‑term ambition to develop a community‑focused oral‑health outreach program for low‑income families in Osceola County. She also wants to become certified in dental
    health coaching, allowing her to offer personalized wellness plans beyond the clinic. Financial stability for her family and the ability to support her extended relatives in Nicaragua remain central
    motivators, prompting her to seek leadership positions that offer higher pay and professional recognition.
