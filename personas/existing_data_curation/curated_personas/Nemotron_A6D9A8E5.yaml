  career_goals: Because of his blend of curiosity and practicality, R R imagines future careers that let him explore and solve problems while staying active with friends. He dreams of becoming an astronaut
    who can discover new worlds, a professional soccer player who leads a team to victory, or a wildlife biologist who studies animals in the field. He often talks about wanting to build the coolest LEGO
    spaceship and then fly it, reflecting his desire to turn imaginative ideas into tangible results.
