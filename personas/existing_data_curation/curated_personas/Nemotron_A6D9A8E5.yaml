personas:
  professional: R Lincoln, a budding junior LEGO architect, spends afternoons constructing elaborate brick structures that blend imaginative designs with practical building techniques, often volunteering
    to lead group projects at the community center, showing curiosity, competitiveness, and a laid‑back attitude toward strict schedules.
  sports: R Lincoln dashes through weekend soccer practices with the local under‑5 team, cheers for the St. Louis Cardinals during summer evenings, rides their bike around Maryland Heights park, and claims
    a spot on the rotating roster of the community’s youth baseball game, embodying high energy and a love for competition.
  arts: R Lincoln sketches comic‑strip heroes inspired by classic Saturday morning cartoons, dances to upbeat gospel choirs at church youth gatherings and pop hits from Taylor Swift and BTS, and eagerly
    re‑watches animated movies like "Moana" and "The Incredibles," letting music and visual storytelling shape their imaginative play.
  travel: R Lincoln dreams of exploring the Ozark trails after weekend trips to nearby Creve Coeur Lake and the St. Louis Zoo, hopes to visit Disney World in Florida, and prefers spontaneous day‑out adventures
    over meticulously planned vacations, often packing a snack of popcorn and a baseball cap.
  culinary: R Lincoln chows down on toasted ravioli and tangy barbecue ribs at family barbecues, loves crunchy apple slices with peanut butter, enjoys building their own mini pizza with mozzarella and pepperoni,
    and occasionally insists on adding ketchup to their macaroni, revealing a playful, experimental palate.
  core: R Lincoln is a curiosity‑driven six‑year‑old who balances imaginative LEGO building with a competitive spirit, a relaxed attitude toward schedules, and a love for outdoor play, music, and tasty
    treats.
background:
  cultural: 'R R grows up in Maryland Heights, a suburban community in St. Louis County, Missouri. His family’s cultural backdrop is typical of Midwestern white American families: attending local public
    schools, taking part in community events such as Fourth of July fireworks, neighborhood block parties, and weekend trips to nearby state parks. Gospel and pop music, baseball on summer evenings, and
    regional foods like toasted ravioli and barbecue often feature in family gatherings. The local library, community center, and church youth groups provide structured yet flexible environments that support
    his curiosity, social play, and emerging competitive spirit.'
