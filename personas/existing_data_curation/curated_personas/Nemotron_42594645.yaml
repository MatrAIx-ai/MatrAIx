personas:
  professional: Jeneka Jones is an accomplished senior executive who blends data‑driven strategic insight with pragmatic operational expertise, steering her company through growth initiatives, digital transformation,
    and inclusive culture building while channeling their competitive edge into mentoring the next generation of diverse leaders.
  sports: Jeneka Jones follows the Grand Rapids Griffins in hockey, the Detroit Lions in football, and plays weekly pickleball at a community center, they treat each match as a strategic exercise akin to
    chess, yet their competitive streak sometimes leads them to overexert during seasonal marathons.
  arts: Jeneka Jones immerses themselves in jazz evenings featuring the soulful sounds of Wynton Marsalis and the avant‑garde improvisations of Esperanza Spalding, while they devour biographies of iconic
    social justice advocates and occasionally experiment with playing the piano, their artistic pursuits offering a calm counterbalance to their high‑stakes executive role.
  travel: Jeneka Jones enjoys curated trips that blend historical reflection with leisure, such as touring the historic French Quarter in New Orleans, exploring the coastal vineyards of Michigan’s Lake
    Michigan Shore, and visiting the colonial forts of Ghana’s Cape Coast, they prefer meticulously planned itineraries but leave room for spontaneous musical discoveries.
  culinary: Jeneka Jones cooks at an ambitious intermediate level, masterfully preparing soul‑food classics like smoked turkey collard greens, sweet‑potato casserole with maple glaze, and bourbon‑infused
    peach cobbler, they love experimenting with modern twists such as quinoa‑based black‑eyed pea hummus and adding smoked paprika to traditional okra stew, while their penchant for perfecting each dish
    sometimes leads to a lingering aroma of over‑roasted spices in the kitchen.
  core: Jeneka Jones combines a serene, resilient composure with a fiercely competitive spirit, steering corporate growth while cultivating a garden, perfecting soulful cuisine, and mentoring future leaders,
    they often mask their skepticism with a gracious smile.
background:
  cultural: Jeneka grew up as part of Grand Rapids' tight‑knit African American community, a lineage that traces back to her grandparents' migration from the Deep South during the Great Migration. Her upbringing
    was steeped in the traditions of church fellowship, gospel music, and communal storytelling, which instilled a strong sense of resilience and collective responsibility. Family gatherings centered around
    Southern soul cuisine and the sharing of oral histories about civil‑rights struggles, shaping her appreciation for cultural heritage and social equity. In adulthood, she has remained deeply involved
    in local cultural festivals, such as the Grand Rapids African American Festival, and she champions initiatives that preserve and celebrate Black history in Michigan. This cultural foundation informs
    her professional commitment to diversity, equity, and inclusion and fuels her dedication to giving back to the community that nurtured her.
