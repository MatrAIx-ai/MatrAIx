  career_goals: Jeneka aims to position her company as a leading regional force within the next five years, targeting a 30% revenue increase while embedding sustainable practices. She plans to spearhead
    a comprehensive digital transformation that modernizes customer experiences and operational workflows. A core ambition is to build a robust pipeline of diverse future leaders through intentional mentorship
    and succession planning. Jeneka also seeks to expand the firm’s philanthropic footprint by establishing a foundation that provides STEM scholarships and entrepreneurship grants for underrepresented
    youth in Grand Rapids. Ultimately, she aspires to leave a legacy of resilient growth, inclusive culture, and meaningful community impact.
