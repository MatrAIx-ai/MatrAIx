personas:
  professional: Nicole Hewlett, a 22‑year‑old heavy‑equipment operator with a knack for mechanical troubleshooting and OSHA compliance, blends their energetic teamwork style and curiosity for sustainable
    fuel tech to lead on‑site logistics while eyeing a future as a certified fleet supervisor.
  sports: Nicole Hewlett, an avid hiker and weekend kayaker, member of the Mississippi River Canoe Club, follows the Mississippi State Bulldogs basketball season, cheers on the New Orleans Saints during
    the NFL, and keeps fit with trail runs and impromptu soccer matches at the local community field.
  arts: Nicole Hewlett, a frequent visitor to Jackson’s art galleries and sketcher of riverbank scenes, immerses themselves in blues legends like Gary Clark Jr., indie acts such as Phoebe Bridgers, and
    draws inspiration from contemporary painter Sarah Elizabeth Wright, while also dabbling in street‑art photography.
  travel: Nicole Hewlett prefers spontaneous road trips across the Deep South, having already explored Nashville’s music scene, the Great Smoky Mountains for hiking, and a weekend getaway to New Orleans
    for its culinary and blues culture, while dreaming of a future solo trek through Iceland’s fjords to combine kayaking with Northern Lights spotting.
  culinary: Nicole Hewlett loves cooking Southern comfort dishes like shrimp‑and‑grits and collard greens, experiments with fusion recipes such as gumbo‑sushi rolls and Cajun‑taco tacos, and frequently
    hosts potluck nights featuring homemade pecan pie and hot chicken, all while favoring fresh herbs like thyme and smoky chipotle.
  core: Nicole Hewlett blends a rugged love for heavy equipment with a free‑spirited streak for art, music, and spontaneous adventures, often juggling just‑in‑time budgeting and a habit of misplacing tools
    when the next concert call arrives.
background:
  cultural: Nicole grew up in a small town in Covington County, Mississippi, within a white Southern family that values community, hospitality, and a strong work ethic. Her upbringing included regular attendance
    at church and participation in county fairs, high‑school football events, and local music festivals that celebrate blues and gospel traditions. While her roots are firmly Southern, her curiosity and
    openness have exposed her to a broader cultural spectrum through college, travel, and online communities, shaping a blend of traditional values and contemporary artistic appreciation.
attributes:
  skills: '[''Heavy Equipment Operation'', ''Mechanical Troubleshooting'', ''Routine Equipment Maintenance'', ''OSHA Safety Compliance'', ''Logistics Coordination'', ''Inventory Management'', ''Team Communication'',
