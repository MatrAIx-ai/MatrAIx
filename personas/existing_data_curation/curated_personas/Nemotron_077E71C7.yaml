  hobbies: '[''Sketching'', ''Visiting Art Galleries'', ''Live Music Concerts'', ''Community Dancing'', ''Hiking'', ''Kayaking'', ''Camping'', ''Cooking Southern Fusion Cuisine'', ''Hosting Potluck Gatherings'',
    ''Playing Narrative Video Games'', ''Reading Speculative Fiction'']'
  career_goals: Nicole aims to become a certified fleet supervisor within the next three years, earning advanced certifications in heavy‑equipment operation and safety management. She plans to attend a
    vocational program to complete her associate degree in Industrial Technology. Long‑term, she imagines launching a locally owned equipment rental service that emphasizes eco‑friendly practices and community
    partnerships. She also hopes to mentor new operators, sharing her love for innovative problem‑solving and encouraging a culture of continuous learning on the shop floor.
