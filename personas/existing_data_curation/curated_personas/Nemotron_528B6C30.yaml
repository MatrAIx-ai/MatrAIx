  career_goals: Gregg aims to become a lead developer at a studio that fuses technology with art, driving the creation of immersive interactive experiences. Within the next five years he plans to launch
    his own indie game or digital‑art startup, leveraging his creative coding expertise to produce experimental titles and installations. He also seeks industry certifications (e.g., AWS Certified Developer,
    Unity Certified Programmer) to solidify his professional credibility, and he aspires to mentor other self‑taught developers from non‑traditional backgrounds, reflecting his own journey.
