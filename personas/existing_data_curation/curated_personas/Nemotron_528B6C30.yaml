personas:
  professional: Gregg Robbins, a 32‑year‑old creative technologist, channels their proficiency in Python, C# and Unity3D into experimental game prototypes that fuse generative art with narrative depth,
    using an Agile‑Scrum cadence and a competitive edge to steer projects toward immersive, award‑winning experiences.
  sports: Gregg Robbins fuels their fitness routine with early‑morning hikes through the forests around Redgranite and joins the local cross‑country skiing club in winter, cheering on the Milwaukee Bucks
    and Green Bay Packers while occasionally playing pickup basketball at the community center.
  arts: Gregg Robbins dives into the avant‑garde by crafting digital paintings inspired by Refik Anadol, programming generative soundscapes reminiscent of Brian Eno and Aphex Twin on analog synths, and
    citing the cinematic scores of Jóhann Jóhannsson as a soundtrack for their indie game experiments.
  travel: Gregg Robbins prefers off‑beat journeys that blend solitude and inspiration, having trekked the misty trails of Iceland’s Landmannalaugar, camped under the aurora in Finnish Lapland, and planned
    a future road trip along the Pacific Coast Highway to capture sunrise light for a new art project.
  culinary: Gregg Robbins enjoys a semi‑vegetarian palate, often whipping up wild‑mushroom risotto with black garlic and smoked trout sashimi, while their limited cooking confidence keeps them from attempting
    complex dishes beyond a well‑executed ramen broth.
  core: Gregg Robbins is a fiercely competitive, midnight‑coding visionary who trades sleep for generative art experiments, hoards coffee mugs, habitually forgets to water houseplants, and thrives on turning
    abstract ideas into playable pixels.
background:
  cultural: Gregg grew up in the rural heartland of Wisconsin, within a predominantly white, Midwestern community that values self‑reliance, modesty, and a strong connection to the outdoors. Family traditions
    featured seasonal hunting, fishing, and lake activities, alongside community gatherings like county fairs and church events. The local German and Polish heritage is reflected in regional cuisine and
    festivals, which shaped his cultural experiences. While his upbringing emphasized a pragmatic work ethic and modesty, his innate curiosity led him toward technology and the arts, creating a blend of
    traditional Midwestern values with a modern, creative outlook.
