  career_goals: He aims to transition from a solo contractor to the owner of a small, licensed painting and paper‑hanging firm that serves both residential and light commercial clients in the Houston area.
    Over the next five years, he plans to obtain a Texas Contractor’s License, expand his crew to three reliable apprentices, and secure contracts for multi‑unit housing renovations. He also aspires to
    develop a training program for new tradespeople, leveraging his practical knowledge to mentor the next generation while achieving financial independence after his divorce.
