  career_goals: Ying aspires to advance from front‑line courier work to a logistics coordinator role within the next three years, focusing on route planning and team management. She plans to earn a professional
    certification in supply‑chain management (e.g., APICS CSCP) and eventually become a dispatch manager overseeing a fleet of riders. Long‑term, she hopes to leverage her operational experience and entrepreneurial
    spirit to launch her own same‑day delivery startup that connects local businesses with efficient, eco‑friendly couriers across the city.
