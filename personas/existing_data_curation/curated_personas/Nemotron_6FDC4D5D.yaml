personas:
  professional: Martha Lee is a hands‑on farm manager who blends practical equipment expertise with community‑focused outreach, leading CSA tours, coordinating barn‑dance events, and experimenting with
    sustainable crop rotations, all while they charm crew members with a talkative, flexible style.
  sports: Martha Lee enjoys leisurely activities such as Saturday morning jogs around the farm, community softball games, and cheering for the Mower County Thunder football team, while they occasionally
    join a local hiking club for weekend trail walks, balancing their love of nature with light competition.
  arts: Martha Lee indulges in seasonal photography inspired by Ansel Adams, they sing gospel classics like "This Little Light of Mine" with the church choir, and they stitch quilts patterned after historic
    American patchwork tradition, showcasing a vibrant blend of visual and musical arts that anchors their community identity.
  travel: Martha Lee prefers spontaneous road trips to nearby agritourism spots such as the Iowa Organic Farm Festival, weekend stays at a historic inn in Savannah, Georgia, and occasional pilgrimages to
    the National Folk Festival in Bloomington, Indiana, while they balance a love of discovery with the need to stay close to family and farm responsibilities.
  culinary: Martha Lee is a proficient farm‑to‑table cook who transforms heirloom tomatoes into sun‑dried sauces, pickles cucumbers and carrots for winter preserves, and bakes rustic sourdough loaves, favoring
    fresh herbs like rosemary and thyme, and they occasionally experiment with fermented kombucha for a probiotic twist.
  core: Martha Lee is a sociable, garden‑savvy farm enthusiast who balances spontaneous creativity with practical stewardship, often drifting between communal celebrations and meticulous seed experiments,
    all while they juggle a modest budgeting habit and a tendency to misplace farm tools.
background:
  cultural: Martha grew up in a multigenerational white farming family in rural Minnesota, with deep roots in German and Scandinavian immigrant traditions that are common in the state. Her upbringing emphasized
    modesty, hard work, and a strong sense of community—values reinforced by weekly church attendance, church‑based service, and participation in local traditions such as fish‑fries, barn dances, and the
    annual Mower County Fair. The Midwestern emphasis on friendliness, pragmatic problem‑solving, and neighborly assistance shapes how she interacts with others, while the region’s agricultural heritage
    fuels her lifelong connection to the land. Though she now lives in Austin, MN, she maintains close ties to extended family, local church groups, and the broader farming network of the area.
