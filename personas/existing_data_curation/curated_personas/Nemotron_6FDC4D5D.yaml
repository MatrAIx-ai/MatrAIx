  hobbies: '[''Backyard vegetable gardening and heirloom seed experimentation'',''Home cooking and food preservation (canning, pickling)'',''Farm photography and sharing images at community events'',''Attending
    and participating in barn dances and county fairs'',''Singing in the church choir and line‑dancing'',''Volunteering with the local 4‑H club as a mentor'',''Quilting and knitting'',''Reading about sustainable
    living and organic farming'',''Hiking and birdwatching in nearby natural areas'',''Participating in community theater or storytelling evenings'']'
  career_goals: Martha envisions turning her broad farm experience into a leadership role that blends sustainable production with community engagement. Over the next five years she aims to acquire a small
    diversified parcel of land where she can practice organic crop rotation and humane livestock management, eventually launching a community‑supported agriculture program that supplies fresh produce to
    neighbors and local schools. She also hopes to become a regular host of farm‑education workshops and seasonal festivals, positioning herself as a go‑to resource for agritourism in Mower County. While
    pursuing these goals, Martha wants to continue learning about precision‑farming technologies and advanced soil‑health techniques through extension courses, all while maintaining the flexible schedule
    that lets her stay present for her family and community.
