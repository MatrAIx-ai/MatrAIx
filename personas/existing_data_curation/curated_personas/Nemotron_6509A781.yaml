personas:
  professional: Lita Lafavor is an aspiring culinary entrepreneur who blends hands-on cooking with disciplined organization, and they channel their competitive edge and curiosity into a practical plan to
    launch a healthy soul-food catering service while eyeing a future role as a medical-assistant trainee.
  sports: Lita Lafavor enjoys pick-up basketball at the local park, follows the Kentucky Wildcats football team avidly, and they occasionally play for the Sunday soccer league at church, using these activities
    to sharpen reflexes and relieve tension.
  arts: Lita Lafavor writes poetry and freestyle rap inspired by the soulful harmonies of their church choir, the lyrical mastery of Kendrick Lamar, and the storytelling of Langston Hughes, and they craft
    digital illustrations on GIMP that blend street-art aesthetics with classic literary motifs.
  travel: Lita Lafavor prefers budget-friendly road trips, having explored Nashville's music venues and Charleston's historic districts, and they dream of a spring visit to New Orleans to soak in its jazz,
    Creole cuisine, and vibrant cultural festivals.
  culinary: Lita Lafavor cooks with a focus on nutritious soul-food, mastering dishes like oven-baked collard greens seasoned with smoked paprika, sweet-potato cornbread, and a health-conscious fried chicken
    using panko-crusted turkey, and they love incorporating kale, quinoa, and fresh herbs into every meal.
  core: Lita Lafavor blends fierce lyrical competition, strategic chess prowess, and a deeply rooted sense of community responsibility, all while navigating a persistent undercurrent of worry that fuels
    their drive for self-reliance, and they constantly seek balance between curiosity and practicality.
background:
  cultural: Lita is a Black teenager raised in Hopkinsville, Kentucky, a region where African‑American cultural traditions intertwine with Southern heritage. Her family places strong emphasis on church
    life, gospel music, and community gatherings, which have shaped her values of resilience and mutual support. Culinary traditions from her grandparents—soul‑food dishes seasoned with Southern spices—are
    central to family meals and her own cooking interests. She celebrates Juneteenth and observes the narratives of the Civil Rights Movement, which inform her desire to mentor peers facing similar socioeconomic
    hurdles. While she navigates being part of a minority in a predominantly white, rural setting, Lita draws strength from a close-knit extended family that upholds storytelling, rhythmic poetry, and the
    legacy of perseverance passed down through generations.
attributes:
  skills: '[''Basic cooking and meal planning'', ''Computer literacy (Windows, Microsoft Office, HTML/CSS basics)'', ''Lawn care and garden maintenance'', ''Childcare and informal tutoring'', ''Budgeting
