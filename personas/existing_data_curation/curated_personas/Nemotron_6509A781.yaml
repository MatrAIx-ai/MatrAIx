  hobbies: '[''Reading speculative fiction'', ''Freestyle rap and songwriting'', ''Chess (competitive)'', ''Digital art with GIMP'', ''Church choir (solo vocals)'', ''Fortnite competitive gaming'']'
  career_goals: Lita aspires to earn her GED and enroll in a community‑college culinary program that emphasizes healthy soul‑food cooking. Her long‑term ambition is to open a modest catering service that
    provides nutritious meals to her neighborhood and to mentor other at‑risk teens who have left school early, showing them that practical skills can lead to stable careers. She also envisions a backup
    path as a medical‑assistant trainee, attracted by the blend of hands‑on work and structured learning that aligns with her organized yet adaptable nature. Ultimately, she wants to achieve financial independence
    that eases her worry about the future while securing a respected role within her community.
