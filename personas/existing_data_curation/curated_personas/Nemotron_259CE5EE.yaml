  career_goals: Dani aims to pursue a bachelor’s degree in communications or arts administration at a regional university, with the long‑term goal of working in community arts programming or event management.
    He hopes to leverage his organizational talents to produce inclusive cultural festivals that bring together diverse groups in Albion and the broader Jackson County area. In the short term, he plans
    to secure an internship with a local museum or nonprofit arts organization, develop his digital content creation skills, and eventually obtain a full‑time position as a program coordinator or social
    media manager for a cultural institution.
