persona_description: A geologist who is fascinated by the study of planetary impacts and the impact of these impacts on the surfaces of rocky planets and moons. They are particularly interested in the fluidised
  nature of the ejected material and the pattern of multiple layer ejecta deposits. They are also curious about the region's watery past, particularly the drainage basin of a lake, and how this can be inferred
  from the presence of small channels to the south.
