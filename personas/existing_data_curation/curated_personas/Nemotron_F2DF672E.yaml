personas:
  professional: Katherine Wood is a veteran courtroom bailiff who leverages her first‑aid certification, defensive‑tactics expertise, and knack for de‑escalation to keep legal proceedings orderly, while
    her spontaneous, community‑focused spirit drives her to mentor new officers through informal workshops that blend practical security protocols with the collaborative problem‑solving she honed in her
    hometown.
  sports: Katherine Wood stays active through weekly Zumba classes at the Hamilton County Community Center, seasonal hikes with the Shawnee Forest Trailblazers, and by cheering on the St. Louis Cardinals
    and the Chicago Bulls on game nights, while she occasionally joins a local recreational softball league that meets on summer Saturdays.
  arts: Katherine Wood energizes her evenings with improv performances at the local community theater, reveres the quick‑witted humor of Tina Fey and the lyrical storytelling of Lin‑Manuel Miranda, and
    enjoys unwinding with classic films starring Tom Hanks, all of which inform her spontaneous yet thoughtful approach to everyday conversations.
  travel: Katherine Wood prefers short, road‑trip getaways that blend outdoor adventure and cultural immersion, such as weekend hikes in the Shawnee National Forest, a music‑festival road‑trip to Austin,
    Texas, and a nostalgic visit to the historic town of Galena, while she dreams of an extended trek to Machu Picchu, balancing meticulous planning for safety with the spontaneity of last‑minute detours.
  culinary: Katherine Wood enjoys crafting hearty potluck dishes like fried chicken with homemade biscuits, apple‑cinnamon crumble, and grilled vegetable medley seasoned with rosemary and garlic, showcases
    a solid intermediate cooking skill set in the kitchen, and frequently seeks out fresh produce at the Hamilton County farmers market, though she sometimes forgets to defrost meat until the last minute.
  core: Katherine Wood is a community‑driven bailiff whose practical curiosity, spontaneous generosity, and steadfast composure make her the dependable, albeit occasionally disorganized, cornerstone of
    both courtroom order and neighborhood gatherings.
background:
  cultural: Katherine grew up in the small‑town environment of southeastern Illinois, where Midwestern values of hard work, self‑reliance, and neighborly support are deeply ingrained. Her family has lived
    in Hamilton County for generations, with roots in farming and local business, fostering a strong sense of community responsibility. She participated in church youth groups and local school events, which
    nurtured her collaborative and considerate nature. The region’s close‑knit social fabric influences her emphasis on harmony, cooperative problem solving, and her desire to give back through public‑service
    roles.
