  hobbies: '[''Group fitness classes (Zumba)'', ''Weekend hiking'', ''Community theater improvisation'', ''Potluck dinner hosting'', ''Gardening'', ''Reading true‑crime and historical nonfiction'', ''Volunteer
    tutoring for middle‑school students'', ''Attending county fairs and music festivals'']'
  career_goals: She aims to advance to a supervisory bailiff position within the next five years, where she can shape policy and develop a structured mentorship program for new officers. Leveraging her
    education degree, Katherine plans to create community workshops that demystify legal processes and promote civic engagement, especially for teenagers. She is also considering a master's in criminal
    justice to broaden her administrative expertise, with a long‑term vision of moving into court administration or a regional public‑safety education role.
