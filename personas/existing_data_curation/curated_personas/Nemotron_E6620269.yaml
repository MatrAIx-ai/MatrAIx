  career_goals: Brandy aims to advance into a senior safety leadership role within an innovative manufacturing or technology firm, ultimately becoming a Director of Health, Safety, and Wellness. She plans
    to earn a Master’s degree in Occupational Health and Safety to deepen her expertise and to pursue CSP certification. In the next five years, she hopes to lead organization‑wide safety culture initiatives
    that integrate ergonomic design with mental‑health support, leveraging her passion for mindfulness to develop comprehensive wellness programs. She also aspires to publish thought‑leadership articles
    on human‑centered safety engineering and to present at industry conferences, positioning herself as a bridge between technical safety practice and creative, employee‑focused design.
