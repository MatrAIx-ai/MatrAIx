personas:
  professional: An aspiring young technologist, Suchit Jiwani combines a love for building intricate LEGO mechanisms with beginner‑level Scratch programming to prototype simple autonomous toys, channeling
    their curiosity and practicality while often juggling project deadlines with a relaxed, sometimes chaotic, approach to planning, and they enjoy sharing their creations with friends.
  sports: A low‑key athlete, Suchit Jiwani spends Saturday mornings training with the Downtown Junior Soccer Club, watches the Thunderbolts compete in the national basketball league, and participates in
    an after‑school swimming class, preferring relaxed fun over intense competition, though they sometimes miss practices due to lingering homework worries.
  arts: A budding visual storyteller, Suchit Jiwani fills sketchbooks with comic‑style panels inspired by artists like Jim Lee and the playful spirit of The LEGO Movie, watches classic Studio Ghibli animations
    such as Spirited Away, and they often hum along to Billie Eilish’s pop‑rock tunes while drawing, letting the blend of music and illustration shape their creative downtime.
  travel: A curious explorer, Suchit Jiwani loves weekend trips to the local science museum and nearby Riverside Park for nature walks, dreams of visiting the Kennedy Space Center in Florida and the historic
    town of Kyoto, and prefers spontaneous day‑trips over meticulously planned vacations, though they sometimes overpack, adding extra weight to their backpack.
  culinary: An enthusiastic junior chef, Suchit Jiwani delights in assembling homemade pepperoni pizza topped with mozzarella, basil, and oregano, expertly stirring mom’s sweet rice pudding flavored with
    cardamom and raisins during festivals, yet they often forget to clean the kitchen counters promptly, leading to crumbs that attract their pet.
  core: Suchit Jiwani is a curious, quietly kind 11‑year‑old who blends a love for LEGO engineering and sci‑fi storytelling with a laid‑back, sometimes disorganized approach to school, savings, and self‑care,
    while they battle a gentle undercurrent of worry that fuels their mindfulness routines.
background:
  cultural: Coming from a South Asian family, Suchit’s household blends American and South Asian traditions. He celebrates festivals such as Diwali and Eid with family gatherings, special foods, and cultural
    songs. His parents encourage academic achievement while also teaching respect for elders and community responsibility. He grew up hearing stories from his grandparents in Hindi, which gave him basic
    language skills and an appreciation for South Asian folklore. The mix of the close‑knit community in Seymour and his family’s cultural heritage shapes his values of cooperation, humility, and a desire
    to contribute positively to both his local and cultural communities.
