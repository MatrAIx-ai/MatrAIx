  career_goals: He dreams of becoming a robotics engineer or software developer who designs tools that help people. He wants to study engineering in high school and later at a university, focusing on renewable
    energy technologies. He also hopes to volunteer with local environmental clubs, combining his technical interest with his desire to help his community. Although he sometimes worries about fitting in,
    he aims to build confidence in group settings and become a leader who creates inclusive projects.
