persona_description: A food enthusiast who prioritizes freshness, quality, and proper storage techniques for perishable foods to maintain their nutritional value and extend their shelf life. They are particularly
  interested in the specific recommendations for storing fruits, vegetables, and dairy products, as well as the precautions against cross-contamination and the importance of maintaining a clean refrigerator.
  They are also aware of the risks associated with storing certain foods at low temperatures, such as the accelerated deterioration of citrus fruit, tropical fruit, tomatoes, and cucumbers, and the importance
  of storing them at temperatures of 7°C or higher.
