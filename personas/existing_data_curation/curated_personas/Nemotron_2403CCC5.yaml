personas:
  professional: Helen Maurelli, a one-year-old explorer of the sensory world, demonstrates budding problem-solving skills while rattling shape sorters, humming to toy music boxes, and turning everyday play
    into mini experiments that hint at a future in creative design.
  sports: Helen Maurelli, a one-year-old, delights in toddling across the community playground's soft foam soccer field where the Little Strikers youth club practices, waves a miniature flag for the city's
    baseball team the Riverbank Ducks while watching games on the living-room TV, and eagerly joins parent-guided stroller jogs, embodying a whimsical, discovery-driven approach to movement.
  arts: Helen Maurelli, a one-year-old, mesmerizes herself with the vibrant swirls of a Claude Monet print hanging in the nursery, giggles to the soothing piano lullabies of Ludovico Einaudi, and loves
    finger-painting with oat-based paints, turning early exposure to high art into a daily sensory ritual.
  travel: Helen Maurelli, a one-year-old, explores the world through stroller strolls at the neighborhood botanical garden, day trips to the seaside aquarium in Monterey, and family visits to grandma's
    cottage in the countryside, preferring short, sensory-rich outings that feed their curiosity while staying within the safety net of parental supervision.
  culinary: Helen Maurelli, a one-year-old, favors soft mashed sweet potatoes and ripe banana slices, enjoys occasional avocado puree, and shows a growing fondness for gentle chickpea hummus on soft pita,
    although they rely entirely on caregivers for meal preparation and often smudge food across the high chair in a playful mess.
  core: Helen Maurelli, a curious one-year-old with a love for colors, music, and tiny adventures, balances a relaxed, slightly chaotic routine with bursts of creative exploration, turning everyday moments
    into playful experiments.
