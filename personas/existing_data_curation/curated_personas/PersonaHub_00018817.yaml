persona_description: A scholar or academic who is interested in the Vietnam War, Asian-Pacific Studies, and the theme of racial and cultural identity. They are likely to have a background in Asian studies
  or history and have a deep understanding of the history of the Vietnam War and the experiences of Vietnamese Americans. They are also interested in the theme of racial and cultural identity and the way
  in which Asian Americans are perceived by White America. They may have a particular interest in the book "The Sympathizer" by Viet Thanh Nguyen and may be interested in discussing the theme of the way
  Asians and Asian-Americans are perceived as 'other' by White America.
