  hobbies: '[''Hiking'', ''Mountain Biking'', ''Intramural Basketball'', ''Live Music Concerts'', ''Barbecue Grilling'', ''Community Volunteering'', ''Landscape Photography'', ''Card Games'', ''Competitive
    Video Gaming'']'
  career_goals: Matthew aims to complete his bachelor’s degree in Business Administration while climbing the retail management ladder. In the next three years he plans to become a full‑time store manager
    for a regional outdoor‑gear retailer, earn a certified retail manager credential, and consistently rank among the top sales performers. Long‑term, he aspires to a district or regional manager position,
    and eventually to open his own boutique outdoor‑equipment shop in Flagstaff that leverages his knowledge of the local market and his love for the outdoors. His competitive nature fuels his desire to
    lead high‑performing teams and achieve measurable growth each year.
