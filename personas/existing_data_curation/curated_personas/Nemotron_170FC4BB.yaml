personas:
  professional: Maili Garcia is a shuttle driver who leverages bilingual fluency, meticulous route optimization, and a calm, compassionate demeanor to deliver safe, punctual rides for seniors while mentoring
    new drivers toward supervisory roles, and they take pride in keeping every schedule on track.
  sports: Maili Garcia enjoys weekend hikes in the Sierra foothills, practices yoga for balance, plays in a casual soccer league, and avidly follows the Sacramento Kings, the San Francisco 49ers, and the
    Oakland Athletics while cheering from the local community center, and they never miss the halftime show at the local high school games.
  arts: Maili Garcia immerses themselves in cumbia and mariachi dancing at local festivals, collects vintage car memorabilia while admiring the tunes of Carlos Santana and Los Tigres del Norte, and unwinds
    with classic road‑trip films such as Thelma & Louise and Little Miss Sunshine, and they often quote lines from those movies while driving.
  travel: Maili Garcia prefers meticulously planned road‑trip adventures, often mapping out scenic routes on a vintage GPS, enjoys weekend escapes to Lake Tahoe and the coastal town of Monterey, dreams
    of driving a classic convertible along Route 66 to the Grand Canyon, and balances these trips with a modest student‑budget that limits longer vacations, and they keep a travel journal to track every
    mile.
  culinary: Maili Garcia has honed a respectable home‑cooking skill set centered on tamales and mole, layering smoky chilies, toasted cacao, and fresh masa, delights in sharing these meals with friends
    over homemade salsa verde, yet occasionally over‑spices the mole attempting to perfect the balance, and they proudly serve extra portions to anyone who shows up early.
  core: Maili Garcia combines a schedule‑obsessed work ethic with a heartfelt devotion to seniors, a secret stash of vintage car postcards in the glovebox, and a habit of triple‑checking every route before
    departure, and they never skip a morning coffee before the first shift.
background:
  cultural: Maili is a first‑generation Mexican‑American raised in Modesto, CA. Her household blends Mexican traditions with California life, celebrating Día de los Muertos, Cinco de Mayo, and Catholic
    holidays alongside local community events. Bilingualism is a core part of her identity, allowing her to connect with both her family's Spanish roots and the broader English‑speaking community. Family
    gatherings often center around shared meals and storytelling, reinforcing values of hospitality, respect, and communal support. She remains actively involved in the local Mexican community, participating
    in cultural festivals, church activities, and neighborhood outreach programs.
attributes:
  skills: '[''Safe driving'', ''Route planning and optimization'', ''Vehicle inspection and basic maintenance'', ''Bilingual communication (English/Spanish)'', ''Customer service and hospitality'', ''Cash
    handling and accounting'', ''First aid and emergency response'', ''Conflict de‑escalation'', ''Schedule management'', ''Logistical coordination'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Dancing to cumbia and mariachi'', ''Volunteering as a driver for senior center outings'', ''Hiking in local hills and parks'', ''Practicing yoga'', ''Watching
    classic road‑trip movies'', ''Collecting vintage car memorabilia'']'
  career_goals: Maili aims to obtain a commercial driver’s license (CDL) and pursue advanced driver training to qualify for supervisory roles. She envisions becoming a fleet supervisor or logistics coordinator
    for a regional transportation company, where she can mentor new drivers and improve operational efficiency. Long‑term, she hopes to launch a community‑focused shuttle service that provides reliable
    transportation for seniors and people with limited mobility in Stanislaus County, integrating her compassion for others with her organizational strengths.
