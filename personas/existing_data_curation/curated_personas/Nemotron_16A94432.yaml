personas:
  professional: Cory Bosse, a 36‑year‑old project manager with a business administration degree and hands‑on experience in architectural and engineering design, blends strategic planning, stakeholder communication,
    and sustainable design processes while leveraging charismatic negotiation skills, yet their spontaneous streak sometimes leads to overlooked deadlines and a desk cluttered with sketches.
  sports: Cory Bosse, an avid cyclist who rides the Ohio River Trail multiple times weekly as a member of the Cincinnati Cycling Club, follows the Bengals and Reds passionately, joins pick‑up basketball
    games at local parks on weekends, and mixes spontaneous bike rides with occasional yoga sessions to maintain flexibility.
  arts: Cory Bosse, a dedicated participant in Cincinnati’s vibrant arts scene, regularly visits the Contemporary Arts Center, sketches Frank Lloyd Wright’s architectural details, photographs the Roebling
    Bridge at golden hour, plays acoustic guitar at improv comedy nights, and contributes to community murals inspired by the bold colors of Yayoi Kusama and the stencil humor of Banksy.
  travel: Cory Bosse, who plans road trips on a whim, has driven to Taliesin West, toured the Guggenheim Bilbao, dreams of exploring the Mori Art Museum in Tokyo, and prefers itineraries that combine architectural
    landmarks with local culinary discoveries, while fitting conference speaking engagements into the schedule.
  culinary: Cory Bosse, a self‑taught home chef, hosts themed dinner parties featuring dishes like Sichuan mapo tofu, handmade gnocchi with sage butter, and classic Cincinnati chili, sources heirloom tomatoes
    and fresh herbs from Findlay Market, enjoys experimenting with spice levels, yet occasionally over‑spices dishes in the excitement of entertaining.
  core: Cory Bosse, a charismatic, art‑obsessed project leader who thrives on spontaneous creativity, balances a bustling social calendar with a calm resilience, but often juggles a cluttered schedule and
    occasional budget splurges.
background:
  cultural: Cory was raised in the suburban neighborhoods surrounding Cincinnati in a middle‑class white American family that valued hard work, community involvement, and modesty—hallmarks of Midwestern
    culture. The city’s historic German influence, renowned brewing tradition, and thriving arts district have instilled in him an appreciation for craftsmanship, social gathering, and cultural expression.
    He embraces the pragmatic, resilient ethos of the Midwest while drawing inspiration from Cincinnati’s eclectic neighborhoods, where diverse artistic and culinary scenes fuel his curiosity and desire
    for new experiences.
