  hobbies: '[''Visiting Contemporary Art Galleries'', ''Sketching Architectural Details'', ''Urban Photography'', ''Spontaneous Road Trips to Architectural Landmarks'', ''Playing Acoustic Guitar'', ''Improv
    Comedy'', ''Hosting Themed Dinner Parties'', ''Cycling along the Ohio River Trail'', ''Community Mural Volunteering'', ''Exploring Local Breweries and Craft Beer Scenes'']'
  career_goals: Cory aims to step into a senior executive role where he can shape the strategic direction of a multidisciplinary design firm, championing innovative and sustainable architecture that integrates
    art and technology. He envisions launching a boutique consultancy that partners with local municipalities and cultural organizations to create community‑focused, experiential spaces. Over the next decade,
    he hopes to become a recognized thought leader—speaking at national conferences, publishing articles on design psychology, and mentoring emerging architects and engineers. He also plans to develop a
    mentorship program within Cincinnati that connects students with industry professionals, fostering the next generation of creative builders.
