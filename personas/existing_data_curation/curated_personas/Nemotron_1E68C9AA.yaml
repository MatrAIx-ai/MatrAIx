personas:
  professional: Jeannette Mills, a 39‑year‑old quantitative finance strategist, leverages advanced Python modeling, Tableau visualizations, and AI‑driven forecasting to craft data‑centric financial roadmaps
    for tech firms, while channeling her sociable, talkative nature into dynamic workshops that unite CFOs, engineers, and designers around high‑performance, inclusive finance.
  sports: Jeannette Mills, an avid hiker with the Santa Cruz Mountain Club, also runs weekend 5K races, plays recreational tennis at the Bay Area Tennis League, and roots for the San Francisco 49ers and
    Golden State Warriors, balancing cardio workouts with mindfulness yoga to sustain her high‑energy professional life.
  arts: Jeannette Mills curates a personal collection of contemporary works by artists like Yayoi Kusama and Kerry James Marshall, leads informal gallery tours at SFMOMA and local pop‑up spaces, and fuels
    her dinner‑party conversations with references to avant‑garde installations and the intersection of art and AI.
  travel: Jeannette Mills favors culturally immersive trips, having explored Kyoto’s cherry‑blossom temples, Barcelona’s Gaudí architecture, and the culinary markets of Marrakech, while planning a future
    sustainable‑design retreat in Copenhagen to blend art, tech, and eco‑tourism.
  culinary: Jeannette Mills enjoys experimenting with sous‑vide salmon, Thai green curry, and Peruvian ceviche, often incorporating ingredients like miso paste, saffron, and truffle oil into dinner parties
    where she pairs dishes with pinot noir or natural wines, though she occasionally burns the garlic when multitasking.
  core: Jeannette Mills is a 39‑year‑old finance technophile who balances a disciplined analytical mindset with a passion for contemporary art, high‑energy social gatherings, and occasional coffee‑induced
    insomnia, constantly seeking to fuse data, design, and diversity.
background:
  cultural: Jeannette is a white American of European ancestry who grew up in suburban California. Her upbringing emphasized education, community involvement, and progressive values. Living in Mountain
    View, she is immersed in a multicultural, tech‑centric environment that celebrates diversity, environmental stewardship, and creativity. This setting has shaped her open‑minded outlook, appreciation
    for varied cultural experiences, and commitment to inclusive collaboration in both her professional and personal life.
attributes:
  skills: '[''Financial analysis'', ''Quantitative modeling'', ''Data visualization'', ''Python programming'', ''R statistical analysis'', ''SQL database querying'', ''Advanced Excel'', ''Risk management'',
