  hobbies: '[''Modern art gallery visits'', ''Contemporary art collecting'', ''Tech meetups'', ''Hackathon participation'', ''Traveling'', ''Cooking international cuisine'', ''Hiking'', ''Yoga'', ''Mentoring
    girls in STEM'', ''Hosting dinner parties'']'
  career_goals: Jeannette aims to become a senior finance leader—ideally a VP of Finance or CFO—at a technology‑driven company where she can shape financial strategy using AI‑powered analytics. She plans
    to champion diversity and inclusion initiatives within finance, mentor women pursuing careers in tech and finance, and eventually launch her own fintech venture that democratizes access to investment
    tools. Her ambition is to be recognized as a thought leader, speaking at industry conferences and publishing insights on the intersection of finance, technology, and sustainability.
