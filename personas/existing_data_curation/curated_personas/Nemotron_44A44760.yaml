personas:
  professional: Alfredo Bedoya, a retired carpenter and handyman, leverages decades of hands‑on expertise in carpentry, plumbing, and electrical troubleshooting to teach practical home‑maintenance skills
    at the local senior center, and they blend practical curiosity with a patient, community‑oriented approach.
  sports: Alfredo Bedoya enjoys brisk morning walks in Hesperia’s parks, follows the Los Angeles Dodgers in spring and the LA Rams in fall, and participates in a local senior walking club that meets twice
    weekly, viewing fitness as a practical way to stay active for gardening.
  arts: Alfredo Bedoya immerses in classic ranchera music by Vicente Fernández, attends monthly performances by the local Mariachi Vargas de Tecalitlán, and admires the paintings of Frida Kahlo, finding
    that music and visual art deepen their connection to family stories.
  travel: Alfredo Bedoya prefers relaxed, well‑planned trips that blend family visits with cultural immersion, having journeyed to Oaxaca for its markets and to Yosemite National Park for its scenery, and
    they hope to explore the historic missions of California next, always packing their DSLR to capture each moment.
  culinary: Alfredo Bedoya skillfully prepares mole poblano, fresh corn tortillas, and tamales using garden‑grown cilantro, epazote, and roasted chiles de árbol, and they delight in sharing these authentic
    dishes during Día de los Muertos gatherings, often pairing them with homemade horchata.
  core: Alfredo Bedoya blends a lifelong devotion to family and faith with practical curiosity, often found gardening at dawn while humming ranchera classics, occasionally forgetting to water indoor plants
    but never missing a Sunday Mass.
background:
  cultural: Alfredo was born in a small town in the state of Michoacán, Mexico, and migrated to the United States in his early twenties. He carries deep respect for Mexican traditions, Catholic faith, and
    family solidarity. He celebrates Día de los Muertos, Cinco de Mayo, and major religious holidays with his extended family in Hesperia. His bilingual upbringing allows him to navigate both Mexican and
    American cultural contexts, and he often serves as a bridge between generations, sharing stories, recipes, and values rooted in his heritage.
