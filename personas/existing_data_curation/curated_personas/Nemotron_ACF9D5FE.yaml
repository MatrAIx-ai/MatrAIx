  career_goals: Danielle aims to translate her business degree and retail experience into a managerial role that offers both autonomy and creative input, such as visual merchandising or boutique management.
    In the medium term she envisions opening an online shop that curates and sells artwork and culturally resonant products, allowing her to blend entrepreneurial ambition with her love of art. She plans
    to pursue part‑time courses in retail leadership and digital design while seeking mentorship from seasoned small‑business owners.
