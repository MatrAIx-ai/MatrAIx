personas:
  professional: Yue Leung is a certified pharmacy technician who expertly handles prescription processing and medication compounding using QS/1 and PioneerRx, and their meticulous yet flexible mindset—shaped
    by a love of detail and a healthy dose of skepticism—makes them a trusted bilingual counselor for Cantonese‑English patients while they design eye‑catching educational pamphlets for the pharmacy.
  sports: Yue Leung is an enthusiastic fan of the New York Knicks, the New York Yankees, and New York City FC, they join a weekend running group at Flushing Meadows Corona Park, hike its trail network for
    solitary cardio sessions, and occasionally play pick‑up basketball at a local community center, balancing competitive spirit with personal fitness goals.
  arts: Yue Leung spends evenings sketching watercolors inspired by the bold street murals of Banksy and the intricate installations of Ai Weiwei, regularly visits exhibitions featuring Yayoi Kusama and
    Liu Dan, and unwinds listening to a mixtape that blends J‑pop hits by Hikaru Utada with indie folk from Phoebe Bridgers.
  travel: Yue Leung prefers a blend of carefully plotted itineraries and spontaneous detours, having explored the historic temples of Kyoto, the vibrant night markets of Taipei, and the street‑art districts
    of Berlin, while dreaming of a week‑long hike along the Pacific Crest Trail and a cultural immersion program in Lisbon.
  culinary: Yue Leung enjoys fusing classic dim sum flavors like char siu and shrimp with Mexican taco shells, often creating a char siu bao taco topped with pickled radish and cilantro, and they also master
    a simple miso‑glazed salmon seasoned with ginger and scallions for a comforting weeknight dinner.
  core: Yue Leung blends a meticulous pharmacy mind with an artistic soul, juggling a skeptical eye for detail while sketching watercolors in break‑room moments, and they can’t resist a midnight matcha
    latte before a study session.
background:
  cultural: Yue is of East Asian (Chinese) heritage, raised in a Cantonese‑speaking immigrant family in Flushing, Queens. She grew up celebrating Lunar New Year and the Mid‑Autumn Festival, and she maintains
    strong ties to traditional values such as respect for elders and community cohesion. Bilingual in Cantonese and English, she navigates both Chinese cultural customs and broader American society, giving
    her a nuanced perspective on identity. This bicultural experience fuels her appreciation for both Eastern and Western art forms and informs her commitment to serving a multicultural community through
    culturally sensitive healthcare.
attributes:
  skills: '[''Prescription processing'', ''Medication compounding'', ''Pharmacy software operation (QS/1, PioneerRx)'', ''Inventory management'', ''Drug interaction checking'', ''Regulatory compliance'',
    ''Patient counseling (bilingual Cantonese/English)'', ''Attention to detail'', ''Critical thinking'', ''Creative problem solving'', ''Basic graphic design'', ''Certified Pharmacy Technician (CPhT)'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting local art galleries and museums'', ''Experimenting with fusion cooking'', ''Practicing yoga'', ''Hiking in Flushing Meadows Corona Park'',
    ''Learning Japanese language'', ''Volunteer health education at community fairs'', ''Exploring Asian cinema'', ''Reading science fiction'', ''Digital illustration using Procreate'']'
  career_goals: Yue aims to enroll in a BS Pharmacy program to become a licensed pharmacist within the next five years. She aspires to specialize in clinical pharmacy, focusing on chronic disease management
    for the diverse population of Queens. Long‑term, she hopes to lead a community pharmacy, integrating health education with culturally relevant art to improve medication adherence. Yue is also interested
    in pursuing certifications in medication therapy management and exploring opportunities to develop outreach programs that combine health services with creative workshops for seniors and youth.
