  hobbies: '[''Art museum visits'', ''Live music concerts (jazz, gospel)'', ''Gardening'', ''Cooking traditional soul food'', ''Knitting and quilting'', ''Reading African-American literature'', ''Storytelling
    circles'', ''Senior dance classes'', ''Community volunteer work'']'
  career_goals: Although retired, Erica aims to deepen her role as a cultural ambassador in Cincinnati. She plans to launch an oral‑history project that records stories of older Black residents and to host
    monthly art‑appreciation gatherings at the local senior center. She hopes to learn digital archiving tools to preserve photographs and recordings of family heritage. Erica also aspires to write a memoir
    that weaves together her life experiences, recipes, and reflections on the civil‑rights era, and to mentor younger volunteers in community outreach and storytelling.
