  career_goals: Teresa aspires to turn her passion for art and storytelling into a career. She hopes to attend a university with a strong fine arts or graphic design program, eventually becoming a professional
    illustrator or concept artist for games and animation. She is also intrigued by the idea of merging technology with art, such as creating interactive media or pursuing a career in digital media production.
    In the long term, Teresa dreams of establishing a community art space in Dyersburg where local youth can explore creative projects, and she envisions mentoring younger students to foster a supportive
    artistic community.
