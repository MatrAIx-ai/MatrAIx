personas:
  professional: Teresa Decastro, a 15‑year‑old sophomore at Dyersburg High School, channels their imagination into a budding freelance illustration career, offering custom character sketches on platforms
    like Etsy while balancing school assignments and art club responsibilities with a disciplined yet flexible schedule.
  sports: Teresa Decastro enjoys playing on the school’s intramural volleyball team during fall, follows the Memphis Grizzlies and Tennessee Titans on TV, cycles through local park trails on weekends, and
    balances a love of movement with occasional bouts of procrastinated workouts after marathon TikTok filming sessions.
  arts: Teresa Decastro immerses themselves in watercolor landscapes inspired by Yayoi Kusama’s bold patterns, crafts digital fantasy portraits using Procreate after listening to Taylor Swift’s ‘Lover’
    album, performs soprano parts in the school choir alongside renditions of Beyoncé’s ‘Halo’, and draws narrative inspiration from J.K. Rowling’s Harry Potter series.
  travel: Teresa Decastro dreams of road‑tripping to the Great Smoky Mountains to sketch sunrise vistas, has already taken a family weekend to Nashville to attend a live country concert, plans a future
    backpacking adventure through Kyoto’s cherry‑blossom season, and prefers budget‑friendly stays at relatives’ homes or youth hostels when exploring new cities.
  culinary: Teresa Decastro enjoys whipping up simple avocado toast topped with cherry tomatoes and feta, occasionally cooks homemade taco bowls spiced with cumin and lime, experiments with ramen broth
    using miso and soy sauce, and shares quick cooking tutorials on TikTok that showcase their love for bright, fresh ingredients.
  core: Teresa Decastro blends relentless creativity with a habit of midnight snacking on candy, turning everyday moments into colorful stories while occasionally forgetting homework in favor of a new art
    project.
background:
  cultural: Teresa grew up in Dyersburg, a small city in West Tennessee, within a predominantly white, Southern‑American cultural setting. Her family’s traditions reflect the values of community, hospitality,
    and close family ties common to the region. She participates in local events such as county fairs, high school football games, and church gatherings, and she enjoys Southern cuisine like barbecue and
    homemade biscuits. While she embraces the regional emphasis on community and togetherness, Teresa also draws inspiration from a broader range of artistic influences, blending the local cultural heritage
    with contemporary global art trends.
