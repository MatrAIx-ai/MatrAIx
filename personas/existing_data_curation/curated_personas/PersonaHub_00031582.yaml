persona_description: A researcher who specializes in the study of animal behavior, particularly flock dynamics and flocking behavior in birds. They have conducted experiments on measuring the shape of flocks
  of birds and analyzing the deviation of global velocity. They have published research on the 3D positions of animal groups, particularly of flocks of birds, and have contributed to the development of
  a model-based hypothesis. They have also worked on the measurement of school shape, turning flock behavior, and flocking behavior in birds. They have collaborated with the self-organisation group and
  are grateful to Eize Stamhuis and the self-organisation group for their discussion.
