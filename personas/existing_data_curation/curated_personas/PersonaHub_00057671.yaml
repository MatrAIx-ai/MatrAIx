persona_description: Gordon Bonan, a senior scientist and head of the Terrestrial Sciences Section at the National Center for Atmospheric Research, Boulder, Colorado. His research focuses on the interactions
  of terrestrial ecosystems with climate using models of Earth's biosphere, atmosphere, hydrosphere, and geosphere. He has published more than 120 peer-reviewed articles on land-atmosphere coupling and
  how changes in vegetation alter climate. He is a member of the American Geophysical Union, American Meteorological Society, and Ecological Society of America. He is a Fellow of the American Geophysical
  Union and has served on advisory boards for numerous national and international organizations and as an editor for several journals.
