  career_goals: Dona dreams of turning her love for animals and the outdoors into a career as a veterinarian or wildlife biologist. She wants to study animal science in high school and later pursue a college
    degree that lets her work with local wildlife, perhaps volunteering at the nearby animal shelter or the Minnesota Department of Natural Resources. She also imagines helping younger kids learn about
    nature through school clubs or community programs, combining her cooperative spirit with her interest in structured learning.
