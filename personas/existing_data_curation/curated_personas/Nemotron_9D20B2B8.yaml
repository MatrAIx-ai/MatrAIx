personas:
  professional: An aspiring young naturalist, Dona Boscia spends afternoons journaling bird sightings around Forest Lake, using their knack for structure to catalog species while their relaxed approach
    to planning leaves room for spontaneous sketching.
  sports: A member of the Greenfield Girls' Soccer Club, Dona Boscia enjoys weekend matches and cheers for the Seattle Storm, but prefers off-season nature hikes and occasional family bike rides to structured
    team practices, reflecting a balanced love of light competition and personal fitness.
  arts: An enthusiastic recorder player, Dona Boscia often practices Bach’s Minuet in G while also drawing birds in the style of John James Audubon and citing Beatrix Potter as a beloved author, blending
    music and illustration into their creative routine.
  travel: When planning family trips, Dona Boscia favors flexible itineraries that include a visit to Yellowstone National Park and a day in the nearby town of Lake Placid, balancing their love of nature
    with spontaneous photo stops, yet they sometimes forget to pack their binoculars.
  culinary: A fan of simple, crunchy snacks, Dona Boscia delights in making homemade granola bars with oats, honey, and dried cranberries, enjoys a hearty bowl of mac and cheese after LEGO sessions, and
    occasionally experiments with a blueberry cheesecake slice despite being a picky eater about vegetables.
  core: Dona Boscia is a nature‑obsessed ten‑year‑old who blends a love for structured observation with a relaxed, solitary streak, often forgetting to finish chores while meticulously cataloguing every
    feathered friend they encounter.
background:
  cultural: Dona comes from a white Midwestern family with German‑Scandinavian roots common in Minnesota. Her household values modesty, hard work, and community involvement, often attending a local Lutheran
    church and participating in seasonal traditions like ice‑fishing, snowshoeing, and summer lake swimming. The family celebrates regional events such as the Minnesota State Fair and Emancipation Day community
    picnics. Growing up in Forest Lake, Washington County, she has been raised with a strong appreciation for the outdoors, respect for nature, and a practical, down‑to‑earth outlook that reflects the values
    of the broader Minnesota cultural landscape.
