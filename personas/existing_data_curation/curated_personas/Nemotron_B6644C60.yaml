  career_goals: Although retired, Nestor aims to keep expanding his personal legacy. He plans to complete a series of landscape paintings that capture Wyoming’s vistas through the lens of his Mexican heritage,
    and to compile a memoir that intertwines family stories with the history of the American West. He also hopes to develop a community workshop where older adults can learn basic digital photography and
    Spanish-language storytelling, fostering intergenerational connections. In addition, he is exploring the installation of a small solar array to power his workshop, reflecting his openness to unconventional,
    sustainable ideas.
