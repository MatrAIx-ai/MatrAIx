  career_goals: In the next five years, Jeannette aims to earn the CFA credential and advance to a senior investment analyst role, eventually leading a high-performing research team. She aspires to develop
    proprietary quantitative strategies that outperform benchmarks, and she is open to pursuing a Master's in Finance or an MBA to deepen her strategic expertise. Her competitive drive pushes her to be
    recognized as a top performer within her firm, and she seeks opportunities that allow her to work autonomously without excessive bureaucratic constraints.
