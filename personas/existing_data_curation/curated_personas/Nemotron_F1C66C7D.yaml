  career_goals: Although retired, Michael aims to continue contributing meaningfully to his community and personal legacy. He plans to publish a memoir that weaves his personal story with the evolution
    of the oil industry in Cushing, and to curate a small exhibition of his paintings at the local community center. He hopes to launch a limited line of handcrafted wooden boxes and to mentor youth interested
    in pipeline safety through an apprenticeship program. Michael also seeks a board position with the Cushing Historical Society, enroll in online courses on digital illustration, and travel to regional
    art festivals to broaden his creative horizons.
