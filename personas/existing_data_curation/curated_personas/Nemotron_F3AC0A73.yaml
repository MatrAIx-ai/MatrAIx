personas:
  professional: Anthony Isambert, a budding LEGO architect, leverages their methodical planning, competitive spirit, and reliable work ethic to design intricate brick structures that consistently earn applause
    from classmates.
  sports: Anthony Isambert, an energetic member of the San Diego Soccer Academy, spends after‑school hours honing dribbling drills and scoring goals on the community field, proudly cheering for the San
    Diego Padres and the Los Angeles Lakers while maintaining a structured training routine that satisfies their competitive nature.
  arts: Anthony Isambert, a creative cartoonist in the making, fills sketchbooks with vibrant Mickey Mouse‑style characters while dancing to the lively beats of Mariachi Los Camperos and cumbia hits by
    Ricky Martin, and finds inspiration in picture books by Dr. Seuss and the colorful illustrations of Eric Carle.
  travel: Anthony Isambert, a curious young explorer, relishes family road trips to the San Diego Zoo and weekend visits to the Grand Canyon, has already marveled at the historic streets of Mexico City,
    and dreams of wandering the Eiffel Tower in Paris and the neon lights of Tokyo, always insisting on a color‑coded itinerary that satisfies their love for structure.
  culinary: Anthony Isambert, an enthusiastic kitchen helper, mixes diced tomatoes, cilantro, and lime into fresh guacamole, assembles tacos al pastor with marinated pork, onions, and pineapple, and proudly
    adds a sprinkle of shredded cheese to quesadillas, all while mastering the art of precise measuring with a kid‑friendly measuring cup.
  core: Anthony Isambert, a methodical yet exuberant six‑year‑old, balances a competitive drive for perfect LEGO builds with a lovable habit of hoarding stickers in every pocket, even if it sometimes means
    forgetting to brush their teeth before bedtime.
background:
  cultural: Anthony is raised in a Mexican-American household in Conroe, Texas, where Spanish is spoken at home and English at school. He participates in cultural celebrations such as Día de los Muertos
    and Cinco de Mayo, enjoys traditional foods like tacos, tamales, and fresh fruit, and attends community events at the local church. His family emphasizes close-knit relationships, respect for elders,
    and bilingual education, shaping his identity and worldview.
