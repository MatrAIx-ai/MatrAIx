  career_goals: Anthony dreams of becoming an engineer or architect one day, inspired by his love for building and organizing things. He also imagines playing on a professional soccer team, where his competitive
    spirit and teamwork can shine. In the short term, he aims to win a school science fair with a project about building sturdy bridges, and to become the captain of his soccer group, leading his friends
    to victories.
