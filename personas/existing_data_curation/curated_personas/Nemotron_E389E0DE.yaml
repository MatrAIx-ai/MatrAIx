    pressure'', ''Basic bookkeeping'', ''Logistics coordination'', ''Adoption of emerging transportation tech'']'
  hobbies: '[''Fishing on Lake Martin'', ''Woodworking'', ''Classic truck restoration'', ''Church choir and potluck gatherings'', ''Poker at the senior center'', ''Gardening'', ''Cooking Southern soul food'',
    ''College football (Alabama Crimson Tide) fan'', ''Genealogy research'', ''Attending local cultural festivals'']'
  career_goals: Even at 70, Kirk aims to cement his legacy by transitioning from daily driving to a mentorship and consultancy role. He plans to obtain a certified commercial driver trainer designation
    so he can coach younger drivers, launch a small logistics consulting service for local businesses, and establish a side venture selling automotive parts and offering delivery for churches and community
    groups. He also aspires to secure financial stability for his grandchildren, pass on his prized 1970s Peterbilt truck, and become an active voice in the Tallapoosa County African‑American business association,
    balancing his competitive drive with community service.
