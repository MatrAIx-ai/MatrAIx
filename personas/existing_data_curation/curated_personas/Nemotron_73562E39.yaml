  career_goals: Lisa aims to move from her current stocker role into a supervisory position within the next two to three years, such as shift lead or warehouse team coordinator. She plans to complete a
    forklift operator certification upgrade and pursue an associate's degree in supply chain or logistics to broaden her knowledge of inventory automation and distribution planning. Long‑term, she envisions
    a career in logistics coordination, where she can blend her curiosity about new technologies with practical, hands‑on problem solving, while still maintaining the flexible schedule she values.
