  career_goals: Sean aims to blend his love for art and technology by pursuing a future in video game design or interactive media. He hopes to attend a specialized STEM/arts high school, develop a strong
    portfolio, and eventually study graphic design or computer science in college. He also envisions contributing to environmental education through graphic storytelling.
