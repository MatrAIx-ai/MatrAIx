personas:
  professional: Sean Brady, an aspiring junior game developer who creates simple Scratch games, designs intricate LEGO builds, and sketches storyboards, channels their organized, methodical nature into
    detailed project planning and their curiosity into experimenting with new coding techniques.
  sports: Sean Brady, a member of the Warminster Youth Soccer Club and a seasonal participant in the local baseball league, enthusiastically follows the Philadelphia Phillies and Eagles while spending Saturday
    mornings hiking the nearby Neshaminy State Park trails to stay fit.
  arts: Sean Brady, an avid sketcher who admires the vivid colors of Van Gogh, the dynamic panels of Jim Lee, and practices piano pieces by Beethoven and Yiruma, regularly visits the Philadelphia Museum
    of Art and the Barnes Foundation, letting their creative storytelling evolve through each visit.
  travel: Sean Brady, who plans family road trips with a map‑filled notebook, prefers nature‑filled getaways like the Amish countryside of Lancaster County and the historic streets of Philadelphia’s Independence
    Hall, yet dreams of seeing the dinosaurs at the Smithsonian’s National Museum of Natural History.
  culinary: Sean Brady, who delights in making cheesy macaroni, homemade pizza with fresh mozzarella, and savoring a classic Philadelphia cheesesteak, enjoys experimenting with farm‑fresh apples and cinnamon
    for a seasonal apple crisp, yet occasionally over‑indulges on chocolate chip cookies after a LEGO marathon.
  core: Sean Brady blends methodical planning, calm resilience, and boundless curiosity into a youthful life of coding, sketching, and exploring, while occasionally forgetting to do chores in the rush of
    new projects.
background:
  cultural: Sean is raised in a white, middle‑class family in suburban Warminster, Pennsylvania. His upbringing blends typical American suburban life—school activities, community fairs, and local sports—with
    family traditions such as holiday gatherings and an appreciation for the region’s historical sites. The surrounding Bucks County environment, with its parks, farms, and nearby Philadelphia museums,
    influences his interests in nature, art, and local history.
