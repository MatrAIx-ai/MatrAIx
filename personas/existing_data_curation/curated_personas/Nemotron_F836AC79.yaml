personas:
  professional: Curtis Sloan leads front‑line retail teams by applying data‑driven decision making with Excel and PowerBI, expertly managing inventory control, sales forecasting, and staff scheduling while
    cultivating a predictable yet adaptable store environment that satisfies their practical need for structure and their occasional desire for flexibility, and they consistently reinforce a culture of
    reliability.
  sports: Curtis Sloan fuels a passion for trail running and fly‑fishing by training with the Boise Trail Runners Club, cheering on the Boise State Broncos football team, coaching youth basketball at the
    community center, and joining the local fly‑fishing club that meets at reservoirs every weekend, blending competitive spirit with community camaraderie, and they often organize weekend group outings
    to share their enthusiasm.
  arts: Curtis Sloan unwinds by strumming acoustic guitar to songs by Jason Mraz and Mumford & Sons, curates board‑game nights featuring Terraforming Mars and Catan, and attends the Idaho Shakespeare Festival,
    allowing creative expression to balance their data‑focused professional life, and they sometimes record their own acoustic covers for personal enjoyment.
  travel: Curtis Sloan prefers meticulously planned road trips to destinations like Yellowstone, the Canadian Rockies, and the coastal towns of Oregon, yet they leave room for spontaneous detours to local
    hot springs, combining their love for structure with a need for occasional adventure, and they keep a travel journal to document each trip’s highlights and lessons learned.
  culinary: Curtis Sloan enjoys cooking pan‑seared trout with lemon‑dill butter, huckleberry jam on toasted sourdough, and brewing craft IPA at home, boasting a solid intermediate skill level that lets
    them experiment while still relying on reliable recipes to keep stress low, and they often host tasting evenings for friends to share their latest culinary creations.
  core: Curtis Sloan is a data‑driven retail supervisor who balances a love for outdoor pursuits, meticulous planning, and occasional stress‑driven splurges, all while navigating a tendency toward worry
    with a steady dose of DIY problem‑solving and community service, and they regularly reflect on how each facet contributes to personal growth.
background:
  cultural: Curtis was raised in a middle‑class, white family in the Mountain West region of the United States, specifically the Boise metropolitan area. His upbringing emphasized a strong work ethic, self‑reliance,
    and community participation, reflecting the values common in Idaho’s suburban culture. He attended public schools and earned his STEM graduate degree from a regional university, where analytical thinking
    and practical problem‑solving were reinforced. These cultural influences, combined with his exposure to the area's outdoor lifestyle and a modest, family‑oriented environment, shape his pragmatic outlook
    and preference for structured, predictable settings.
