  career_goals: Curtis aims to advance from his current first‑line supervisory role to a district manager position within the next five years, seeking a broader scope of responsibility while preserving
    the structured environment he values. He plans to enroll in a part‑time MBA program to deepen his strategic management knowledge and to spearhead data‑analytics initiatives that streamline retail performance
    across multiple locations. Ultimately, he envisions leading a regional operations team where he can shape a supportive, predictable culture for his staff and secure a stable future for his family, while
    also reducing the stress associated with unpredictable retail challenges.
