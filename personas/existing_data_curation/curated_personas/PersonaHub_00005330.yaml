persona_description: A professor who leads an interdisciplinary team of researchers to develop CyberGIS, a comprehensive software framework that harnesses the power of cyberinfrastructure for GIS and associated
  applications. The team includes geographers, computer scientists, and researchers from various fields such as disaster preparedness, urban planning, and resource management. The project aims to establish
  CyberGIS as a fundamentally new software framework that can handle the huge volumes of data and complex analysis required for modern applications. The project is part of NSF's Software Infrastructure
  for Sustained Innovation program and involves partnerships among academia, government, and industry with an international scope. The team is led by Shaowen Wang, a professor of geography and a senior
  research scientist at the National Center for Supercomputing Applications. The project aims to empower high-performance, collaborative geospatial problem solving, such as advancing the understanding of
  disaster preparedness and response and impacts of global climate change.
