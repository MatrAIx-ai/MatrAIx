persona_description: A team of researchers in the Republic of Korea who specialize in developing biosensors for rapid detection of infectious diseases such as COVID-19. They are focused on using field-effect
  transistors to detect the SARS-CoV-2 spike protein on graphene, which allows for direct analysis of nasopharyngeal swabs without sample preparation. The team aims to improve the signal-to-noise ratio
  of their biosensor for faster and more accurate detection of the virus.
