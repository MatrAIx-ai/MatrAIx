  career_goals: While currently focusing on family and community, Concepcion aims to transition into a part‑time business consulting role for local small enterprises, helping them streamline finances and
    adopt digital tools. She also dreams of launching an online boutique featuring handcrafted home goods, blending her entrepreneurial spirit with her love for design and sustainability.
