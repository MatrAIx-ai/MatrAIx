personas:
  professional: Betzabe Perez, a veteran elementary educator with three decades of classroom experience, blends their business acumen and bilingual fluency to design STEAM‑rich, culturally responsive curricula
    while championing data‑driven instruction and community partnerships, all driven by a curious, competitive spirit that pushes colleagues toward innovative, inquiry‑based teaching.
  sports: Betzabe Perez, an avid hiker who joins the Montgomery Village Trail Club for weekend treks on Catoctin Ridge and roots for the Washington Capitals during the hockey season, combines seasonal outdoor
    activity with regular attendance at local soccer matches with friends, balancing competitive enthusiasm with a love for nature.
  arts: Betzabe Perez, a devoted patron of the Montgomery County Arts and Humanities Council's gallery openings, captures everyday Montgomery Village moments with a vintage Leica, performs with a local
    folkloric dance troupe inspired by the works of Diego Rivera and Frida Kahlo, and immerses themselves in magical‑realist novels by Gabriel García Márquez, letting these artistic experiences fuel their
    board‑game gatherings.
  travel: Betzabe Perez, who plans each year’s vacation around a family reunion in Mexico balanced with a weekend getaway to the historic streets of Cartagena, Colombia, blends meticulous itineraries using
    travel apps with spontaneous detours to local farmer’s markets in the Shenandoah Valley, reflecting a curious yet organized travel style that values cultural reconnection and new experiences.
  culinary: Betzabe Perez, an experimental home chef who weaves flavors like chipotle, masa, epazote, and cacao into traditional dishes from their family’s homeland while reinventing classics such as mole‑infused
    tacos and corn‑crusted salmon, regularly hosts board‑game nights where friends sample these fusion creations alongside craft sodas and homemade salsa.
  core: Betzabe Perez, a socially vibrant, curiosity‑driven educator who balances meticulous planning with spontaneous creativity, competes gently in every project, and fuels life with art, dance, and daring
    culinary experiments, all while occasionally forgetting to file taxes on time.
background:
  cultural: Betzabe is a first-generation Mexican-American who grew up in a bilingual household that celebrated Día de los Muertos, Cinco de Mayo, and family gatherings centered on food and music. Living
    in Montgomery County, MD, she blends Mexican traditions—such as storytelling, vibrant visual arts, and a strong sense of familial duty—with the multicultural, suburban American lifestyle. This bicultural
    perspective informs her teaching, allowing her to incorporate Latino cultural references, Spanish language resources, and inclusive classroom practices that validate the identities of her diverse students.
attributes:
  skills: '[''Bilingual (English-Spanish) communication'', ''Elementary and middle school instruction'', ''Curriculum development (STEAM and financial literacy integration)'', ''Arts integration'', ''Project-based
