    mediation'', ''Data-driven assessment and program evaluation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Photography of everyday life'', ''Cooking Mexican and fusion cuisine'', ''Board-game nights with friends'', ''Folkloric dance performance'', ''Community
    tutoring and volunteer work'', ''Reading magical-realist literature'', ''Hiking local trails'', ''Traveling to Mexico to visit family and cultural sites'']'
  career_goals: Betzabe aims to transition into a district-level curriculum specialist role where she can expand her STEAM-and-financial-literacy program across schools. She plans to design a bilingual,
    arts-rich curriculum kit for elementary teachers and lead professional-development workshops that empower colleagues to adopt unconventional, inquiry-based approaches. Over the next five years she hopes
    to earn a master's in education leadership, mentor new teachers, and eventually consult for nonprofit organizations that provide after-school entrepreneurship and cultural arts programs to underserved
    Latino youth.
