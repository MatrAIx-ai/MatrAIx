personas:
  professional: Eddy Nieto, a retired municipal administrator, they apply decades of meticulous record‑keeping, bilingual coordination, and calm dispute mediation to organize community events and guide
    the senior center’s financial stewardship with unwavering discipline.
  sports: Eddy Nieto, an early‑morning hill‑walker in Aguas Buenas, they cheer on the Caguas Criollos baseball team, participate in a senior softball league each spring, and enjoy occasional paddle‑ball
    matches at the community center.
  arts: Eddy Nieto, a devoted listener of classic bomba and salsa legends like Celia Cruz and Bobby Valentín, they capture island landscapes with a vintage film camera, while woodworking birdhouses inspired
    by local folk art and admiring the paintings of Rafael Tufiño.
  travel: Eddy Nieto, who prefers structured road trips, they visit nearby coastal towns such as Rincón and Vieques each summer, and make annual trips to see their children in Orlando, balancing leisurely
    scenery with careful itineraries.
  culinary: Eddy Nieto, an accomplished home chef, they delight in preparing arroz con gandules and pasteles for family celebrations, experiment with passion‑fruit glazes for grilled fish, and nurture a
    modest garden of plantains, herbs, and passion fruit that flavors their kitchen.
  core: Eddy Nieto is a disciplined archivist‑turned‑community historian whose love of order, quiet walks, and island traditions fuels a lifelong quest to preserve memory while savoring simple pleasures.
background:
  cultural: Eddy’s roots are firmly planted in Puerto Rican culture, shaped by the Afro‑Spanish traditions of Aguas Buenas and the bustling municipality of Caguas. He was raised in a Catholic household
    where family gatherings, the aroma of festive meals, and community festivals were central. His bilingual upbringing and love for local music, dance, and cuisine reflect a deep respect for the island’s
    heritage, while his commitment to community service embodies the island’s collectivist values.
attributes:
  skills: '[''Financial record-keeping'', ''Administrative document management'', ''Community event coordination'', ''Bilingual communication (Spanish/English)'', ''Conflict mediation'', ''Tropical gardening'',
