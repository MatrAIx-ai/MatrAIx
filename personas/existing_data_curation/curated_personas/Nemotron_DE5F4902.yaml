  hobbies: '[''Morning walks'', ''Gardening tropical fruit and herbs'', ''Reading historical novels'', ''Crossword and Sudoku puzzles'', ''Cooking traditional Puerto Rican dishes'', ''Woodworking (birdhouses,
    small furniture)'', ''Photography of local scenery'', ''Listening to bomba, plena, and salsa music'']'
  career_goals: Although retired, Eddy remains goal‑oriented. He aims to compile a written memoir and oral histories of his Aguas Buenas neighborhood to preserve its cultural heritage. He also volunteers
    to organize the senior center’s monthly activities, mentor local youths interested in agriculture and crafts, and advise the local church on financial stewardship. Ultimately, he wishes to leave a legacy
    of organized community support and cultural continuity.
