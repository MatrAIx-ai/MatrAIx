    outreach coordination"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and painting cityscapes", "Reading contemporary fiction and philosophy", "Urban photography", "Attending jazz and soul concerts", "Gardening
    on a balcony", "Cooking and experimenting with soul-food recipes", "Volunteering at a community center (arts and crafts workshops)", "Exploring historic neighborhoods of Detroit", "Participating in
    small book clubs"]'
  career_goals: Eva aims to advance into a facilities management role where she can shape policy and champion sustainability across service areas. She plans to complete her bachelor’s degree in business
    administration or community development, obtain a Certified Facility Manager credential, and design a city‑wide training program emphasizing eco‑friendly cleaning techniques and employee wellness. Additionally,
    she hopes to mentor younger workers, advocate for equitable wages and benefits for custodial staff, and eventually launch a consulting firm that helps small businesses implement high‑quality, culturally
    sensitive housekeeping standards.
