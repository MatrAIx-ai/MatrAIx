personas:
  professional: Eva Lucas, a seasoned custodian supervisor in Detroit, they merge their meticulous inspection skills, conflict‑mediation talent, and eco‑friendly cleaning expertise to lead a diverse custodial
    team, while their curiosity and compassionate nature inspire flexible, community‑oriented policies that prioritize staff well‑being over rigid procedures.
  sports: Eva Lucas stays active by joining the Detroit Urban Walkers club for early river‑front jogs in spring, they cheer on the Detroit Tigers during baseball season and the Lions in the fall, and they
    play casual pickup basketball at a community center in summer, using movement as a calming counterpoint to their supervisory duties.
  arts: Eva Lucas immerses themselves in Detroit’s vibrant art scene by frequenting the Detroit Institute of Arts to study works by Diego Rivera and Jean‑Michel Basquiat, sketching twilight cityscapes in
    their notebook, and attending intimate jazz concerts featuring saxophonist Marcus Miller and soul vocalist Lenny Kravitz’s tribute band, while drawing creative inspiration from contemporary authors
    such as Colson Whitehead and Chimamanda Ngozi Adichie.
  travel: Eva Lucas favors spontaneous, culturally rich city getaways—spending a weekend exploring Chicago’s museum district and planning a future month‑long immersion in Kyoto’s historic temples—while
    they balance a modest travel budget and family obligations, opting for boutique lodgings that allow quiet reflection after their active days.
  culinary: Eva Lucas, an enthusiastic home chef, they perfect soul‑food staples like smoked turkey collard greens, sweet‑potato pie, and freshly baked cornbread flavored with garden‑grown rosemary, while
    also experimenting with African‑inspired spice blends on grilled okra and pairing meals with craft brews from Detroit microbreweries.
  core: Eva Lucas blends a disciplined custodial career with a quiet passion for Detroit’s art, jazz, and soul‑food cooking, they habitually misplace their keys among garden pots and champion eco‑friendly
    workplace practices.
background:
  cultural: Eva identifies as African‑American and is deeply rooted in Detroit’s Black community, a city shaped by the Great Migration, Motown music, and a strong tradition of labor activism. Growing up
    in a neighborhood where church, family, and neighborly ties provided support, she internalized values of resilience, mutual aid, and cultural pride. Her daily life reflects the city’s rich artistic
    heritage, from the murals that line the streets to the soulful sounds that echo in local clubs. She celebrates African‑American holidays, supports Black‑owned businesses, and actively participates in
    community initiatives aimed at improving living conditions for working‑class families. This cultural background informs her compassionate work style and her commitment to fostering inclusive, supportive
    environments for both her team and the broader community.
attributes:
  skills: '["Team supervision", "Staff training and development", "Quality assurance and inspections", "Inventory control", "Safety compliance (OSHA, CDC guidelines)", "Customer service and complaint resolution",
