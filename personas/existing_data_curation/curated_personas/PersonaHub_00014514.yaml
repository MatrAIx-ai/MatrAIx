persona_description: A global health expert who is interested in the control of foodborne diseases, particularly Salmonella and Campylobacter. They are knowledgeable about microbiological risk assessment
  and have experience working with the Food and Agriculture Organization of the United Nations (FAO) and the World Health Organization (WHO) on similar projects. They are interested in contributing to the
  development of scientific advice to inform an update of the Codex Alimentarius guidelines for the control of Campylobacter and Salmonella in chicken meat. They are aware of the importance of minimizing
  uncertainties and gaps in global data on these diseases and are willing to contribute to the collection of relevant scientific information on Salmonella and Campylobacter in poultry meat.
