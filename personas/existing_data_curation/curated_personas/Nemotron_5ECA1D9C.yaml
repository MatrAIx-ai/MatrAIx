personas:
  professional: Mickey Larmeu, a data‑analysis specialist who blends Python, R, and MATLAB expertise with hands‑on Arduino and Raspberry Pi prototyping, thrives in remote, flexible roles that let them turn
    complex datasets into actionable insights for sustainability projects while juggling occasional freelance consulting gigs and a budding plan to launch a local data‑driven consultancy.
  sports: Mickey Larmeu, an avid hiker and weekend fisherman who belongs to the Finger Lakes Trail Club, plays recreational softball for a community league, follows the Buffalo Bills, Buffalo Sabres, and
    New York Knicks with enthusiastic regional pride, and squeezes in cross‑country skiing trips during winter.
  arts: Mickey Larmeu, a nature photographer and acoustic‑guitar hobbyist who captures Finger Lakes sunsets in the style of Ansel Adams, strums folk‑rock tunes inspired by Fleet Foxes and Mumford & Sons
    during campfire gatherings, and reads sci‑fi novels by Ted Chiang and non‑fiction tech books for creative spark.
  travel: Mickey Larmeu, a spontaneous road‑trip planner who prefers loose itineraries, has backpacked through Iceland’s volcanic landscapes, explored Kyoto’s temples, enjoys weekend drives to the Adirondacks,
    and dreams of trekking Patagonia’s Torres del Paine while balancing a modest travel budget.
  culinary: Mickey Larmeu, a moderately skilled home cook who blends farm‑to‑table freshness with global flavors, whips up mushroom risotto with locally foraged wild mushrooms, cooks Korean bibimbap with
    gochujang after a trip to Seoul, and perfects grilled trout seasoned with rosemary and lemon from the Finger Lakes region.
  core: Mickey Larmeu, a curious, practical 26‑year‑old who balances data‑driven work, outdoor adventures, and spontaneous creativity, while occasionally misplacing keys and letting bills slip through the
    cracks.
background:
  cultural: Mickey grew up in a middle‑class family in upstate New York, where the blend of New England work ethic and the relaxed, community‑oriented atmosphere of the Finger Lakes region shaped his outlook.
    His heritage includes Irish and German ancestry, with family traditions emphasizing self‑reliance, education, and outdoor recreation such as weekend fishing trips and county fairs. The small‑town environment
    of Geneseo fostered a strong sense of community involvement and an appreciation for the natural landscape, while proximity to SUNY Geneseo and nearby colleges exposed him to diverse ideas and a culture
    of lifelong learning. These influences contribute to his pragmatic yet curious personality, his cooperative yet assertive interaction style, and his comfort balancing individual pursuits with group
    activities.
attributes:
