  hobbies: '["Hiking", "Nature photography", "Arduino and Raspberry Pi projects", "Maker space collaboration", "Reading science‑fiction and tech non‑fiction", "Playing acoustic guitar", "Experimental cooking",
    "Community volunteering (food drives, STEM workshops)"]'
  career_goals: Mickey aims to secure a flexible, remote position that leverages his data‑analysis and prototyping expertise, such as a data analyst, research associate, or freelance technical consultant.
    He plans to earn additional certifications in machine learning and geographic information systems to broaden his skill set. In the longer term, he envisions founding a modest consultancy that helps
    local businesses and community organizations adopt data‑driven decision‑making, especially in sustainability and environmental monitoring projects. He values work that offers autonomy, creative problem‑solving,
    and the ability to maintain his personal projects and outdoor lifestyle.
