personas:
  professional: George Deo, a 22‑year‑old data‑science enthusiast, they leverage Python, R, MATLAB, and Arduino prototyping to fuse quantitative analysis with creative visual storytelling, channeling their
    curiosity and competitive mindset into interdisciplinary AI projects.
  sports: George Deo, who enjoys solitary hikes on the trails of Pinckney State Recreation Area and occasionally joins pickup basketball games at the local community center, they root for the Michigan State
    Spartans and Detroit Lions, run with the Lansing Trailblazers club in the spring, and follow a disciplined weekly gym routine focused on core strength.
  arts: George Deo, a regular at the MSU Broad Museum and the Lansing Art Fair, they draw inspiration from the data‑driven installations of Refik Anadol, the glitch soundscapes of Aphex Twin, and the abstract
    color fields of Mark Rothko, and contribute digital illustrations to the local zine "Canvas Lansing".
  travel: George Deo, who prefers meticulously planned weekend road trips, they have hiked the dunes of Indiana Dunes National Park, explored the historic streets of Quebec City, and dream of a future immersion
    in Tokyo’s neon districts, yet their student‑loan constraints keep most international travel on a wish‑list.
  culinary: George Deo, an autodidact in the kitchen, they favor hearty farm‑to‑table dishes like roasted beet salad with goat cheese, experiment with sous‑vide chicken thighs seasoned with smoked paprika,
    and indulge in occasional midnight pizza topped with prosciutto and arugula as a reward after late‑night coding sessions.
  core: George Deo, a curious yet solitary 22‑year‑old data‑science enthusiast, they fuse analytics with digital art, obsessively track health metrics, and can’t resist buying the newest Arduino kit even
    when their budget is tight.
background:
  cultural: George was raised in a middle‑class family in the Greater Lansing area, with deep roots in the Midwest. His ancestry traces back to German and Irish immigrants who settled in Michigan in the
    early 20th century. Growing up, he experienced the region’s blend of practical work ethic and community‑oriented modesty, while also being exposed to the vibrant cultural offerings of the university
    town—such as theater, art festivals, and tech meetups. This environment fostered his appreciation for both technical rigor and creative expression, shaping a worldview that values independence, analytical
    thinking, and an openness to diverse ideas.
attributes:
  skills: '["Python", "R", "Machine Learning", "MATLAB", "Electronics Prototyping", "Circuit Design", "3D Modeling (Fusion 360)", "Digital Illustration", "Technical Writing"]'
  hobbies: '["Sketching and digital illustration", "Visiting art galleries and museums", "Listening to experimental/indie music", "Reading science-fiction novels", "Chess", "Arduino/Raspberry Pi tinkering",
    "Hiking and nature photography", "Puzzle solving (e.g., Sudoku, logic puzzles)"]'
  career_goals: George aims to secure an entry‑level data science or machine‑learning engineer role that lets him merge quantitative analysis with creative problem solving. He is particularly drawn to positions
    at innovative tech firms or research labs where interdisciplinary work—such as developing AI-driven visualizations or interactive media—can flourish. In the medium term, he plans to pursue a master’s
    degree in Human‑Computer Interaction or Computational Creativity to deepen his expertise at the nexus of technology and art. Ultimately, George aspires to lead projects that leverage data and AI to
    produce compelling visual narratives, and perhaps launch a startup focused on AI‑enhanced creative tools.
