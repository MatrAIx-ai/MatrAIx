  career_goals: Esperanza aims to earn a Master Stylist certification and specialize further in color correction and trichology. She envisions opening a boutique salon in Upland that fuses modern beauty
    trends with Mexican cultural motifs, offering a welcoming space that celebrates her heritage. Long‑term, she plans to launch a bilingual YouTube channel and online academy to teach hair care and styling
    techniques to Spanish‑speaking audiences, while eventually expanding her brand to multiple locations across Southern California.
