personas:
  professional: Esperanza Rivera is a bilingual hairdresser and cosmetologist in Southern California who blends advanced coloring techniques like balayage and ombre with a spontaneous, client‑centered approach,
    using digital scheduling tools and social‑media content creation to grow a boutique salon vision while juggling master‑stylist certification studies.
  sports: Esperanza Rivera enjoys weekend hikes in the Angeles National Forest, follows the Los Angeles Lakers for basketball, cheers for LA Galaxy during the soccer season, and occasionally joins a local
    co‑ed recreational volleyball league in Upland.
  arts: Esperanza Rivera finds creative inspiration dancing to cumbia and reggaeton, photographing client transformations, and attending art festivals where they admire works by Frida Kahlo and street muralists
    like Shepard Fairey, while staying updated through fashion magazines featuring designers like Alexander McQueen.
  travel: Esperanza Rivera favors spontaneous road trips to coastal cities like Santa Barbara and San Diego, dreams of exploring Oaxaca’s culinary markets, and balances travel aspirations with a limited
    budget by planning low‑cost weekend getaways and using travel‑deal apps.
  culinary: Esperanza Rivera loves preparing tamales, mole with dark chocolate and almonds, and fresh salsa with tomatillos, displaying intermediate cooking skills that shine during family gatherings where
    they meticulously roll masa and blend chilies for authentic flavors.
  core: Esperanza Rivera blends a vibrant love for hair artistry, dance, and community gatherings with a spontaneous yet caring nature, often juggling creative projects and occasional impulsive spending
    while staying deeply rooted in cultural traditions.
background:
  cultural: Esperanza is a second‑generation Mexican‑American raised in a close‑knit family in Upland. She grew up speaking Spanish at home and celebrates traditions such as Día de los Muertos, Cinco de
    Mayo, and family reunions. The values of "familismo" and community service shape her compassionate approach to client care. Her Mexican heritage influences her aesthetic choices, from vibrant color
    palettes in salon décor to incorporating traditional floral hair ornaments. She draws inspiration from Mexican folk art and contemporary Latino fashion, weaving these cultural elements into her styling
    and brand identity.
