personas:
  professional: Kalley Suarez is a bilingual electrician in Port Saint Lucie, known for her expertise in residential wiring, solar photovoltaic installations, and smart‑home technology; they combine meticulous
    code compliance with a spontaneous, hands‑on problem‑solving style, often juggling client projects while dreaming of launching a community‑focused green‑retrofit firm, even though they sometimes struggle
    with scheduling deadlines.
  sports: Kalley Suarez fuels their fitness routine with salsa and bachata nights at the local Latin club, weekend hikes along the St. Lucie River trail, and early‑morning kayaking with the St. Lucie Paddlers
    crew; they cheer on the Miami Dolphins on Sundays, follow the Florida Panthers, and occasionally join a community yoga class for cross‑training.
  arts: Kalley Suarez immerses themselves in the arts by dancing to the rhythms of Marc Anthony, Bad Bunny, and classic salsa legends, attending the local parade performances, and supporting the St. Lucie
    Art Walk where they often discuss the vibrant murals of street artist Shepard Fairey.
  travel: Kalley Suarez prefers a mix of adventure and cultural immersion, opting for short, budget‑friendly trips to nearby Key West for snorkeling, extended vacations to the Dominican Republic to enjoy
    Afro‑Caribbean festivals, and occasional city breaks in New York for theater shows; they often plan trips last‑minute, driven by spontaneity, while steadily building a travel fund through freelance
    side‑jobs.
  culinary: Kalley Suarez delights in cooking arroz con gandules, mofongo relleno, and lechón as weekend feasts, frequently experimenting by infusing smoky chipotle or tropical mango salsa into traditional
    recipes, and they source fresh plantains, sofrito, and adobo from the local farmer’s market while proudly serving these dishes at community potlucks.
  core: Kalley Suarez blends hands‑on electrical expertise, spontaneous creativity, and deep community ties into a life driven by curiosity, compassionate problem‑solving, and a constant dance between order
    and improvisation.
background:
  cultural: Kalley’s cultural identity is rooted in her Puerto Rican heritage, which she celebrates through language, food, music, and community ties. Raised in a bilingual household, she grew up speaking
    both Spanish and English, allowing her to move fluidly between the two cultures. Family gatherings centered around lechón, arroz con gandules, and bomba music instilled a deep appreciation for hospitality
    and collective support. In Port Saint Lucie’s growing Latino enclave, she participates in festivals such as the Puerto Rican Day Parade and local ferias, where she shares her culinary skills and enjoys
    dancing to salsa, merengue, and reggaeton. The island’s emphasis on resilience and communal solidarity shapes her compassionate outlook, driving her to give back through volunteer work and mentorship.
    While she embraces American customs, she maintains the Puerto Rican values of respeto, familia, and alegría, which influence her personal and professional relationships.
attributes:
  skills: '["Residential wiring and rewiring", "Commercial electrical installation", "Electrical code compliance (NEC) and inspection", "Troubleshooting and diagnostics of electrical systems", "Conduit
    bending and installation", "Low-voltage and smart-home wiring (e.g., Zigbee, Wi-Fi thermostats)", "Solar photovoltaic (PV) system installation and maintenance", "Electrical safety training and OSHA
    compliance", "Bilingual communication (English/Spanish) with clients and crew", "Customer service and conflict resolution", "Team collaboration and informal mentorship", "DIY electronics tinkering and
    prototype building"]'
  hobbies: '["Salsa and bachata dancing", "Cooking traditional Puerto Rican cuisine", "DIY electronics and smart-home tinkering", "Hiking and kayaking in St. Lucie County", "Volunteering at senior/community
    centers", "Yoga and meditation for stress relief", "Reading tech news and science podcasts", "Listening to reggaeton and Latin jazz"]'
  career_goals: Kalley aims to earn her Master Electrician license within the next three years, complemented by certifications in solar PV installation and energy‑storage systems. She envisions launching
    her own small‑scale contracting firm that specializes in green residential retrofits and smart‑home upgrades for families in Port Saint Lucie, especially those in the Hispanic community. By creating
    job‑training opportunities for women and under‑represented minorities, she hopes to foster greater diversity in the trades. In the longer term, Kalley aspires to become a trusted community resource
    for energy efficiency, offering free workshops and collaborating with local nonprofits, while preserving a flexible schedule that supports her marriage and personal well‑being.
