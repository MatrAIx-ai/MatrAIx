  hobbies: '[''Visiting art galleries'', ''Street photography'', ''Playing basketball'', ''Online multiplayer strategy games'', ''Cooking Spanish cuisine'', ''Learning Flamenco dance'', ''Attending indie
    concerts'', ''Reading philosophy and psychology'', ''Traveling to Spain'', ''Journaling for emotional processing'']'
  career_goals: Pablo aims to complete his bachelor's degree in Visual Arts or Communication within the next two years, securing a senior internship at a creative agency or a nonprofit arts organization
    in Kansas. He aspires to become a creative director or brand strategist who can fuse multicultural visual storytelling with social impact, eventually launching his own boutique studio focused on mental‑health‑focused
    campaigns and community art projects. In the longer term, he hopes to curate interdisciplinary exhibitions that celebrate both his Spanish heritage and Midwestern experiences, while mentoring younger
    artists to develop resilience and creative confidence.
