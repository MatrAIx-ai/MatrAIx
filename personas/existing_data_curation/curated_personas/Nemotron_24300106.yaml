personas:
  professional: Pablo Ceballos, a senior visual arts student adept with Adobe Photoshop, Illustrator, and Premiere Pro, channels their meticulous project‑planning skills and competitive drive into crafting
    bold brand narratives that weave surrealist motifs with community‑focused storytelling for local nonprofits.
  sports: Pablo Ceballos, a dedicated member of the Derby Community Basketball League, spends weekday evenings shooting hoops and follows the Kansas City Chiefs, Kansas City Royals, and the University of
    Kansas Jayhawks, balancing their love for team sport with strategic online multiplayer gaming that fuels their competitive spirit.
  arts: Pablo Ceballos, an avid visitor to Derby’s downtown galleries and a street‑photography enthusiast, draws inspiration from Salvador Dalí’s surrealism, the flamenco rhythms of Paco de Lucía, and live
    indie shows by The Strokes, frequently curating spontaneous pop‑up visual installations that merge bold color palettes with emotional storytelling.
  travel: Pablo Ceballos, who has backpacked through Seville and Granada during summer breaks and dreams of exploring the turquoise coasts of Valencia, prefers spontaneous, budget‑friendly trips that blend
    cultural immersion—like attending Semana Santa processions—with quick photo‑journalism sessions, while balancing the constraints of a student loan budget.
  culinary: Pablo Ceballos, an intermediate home chef, loves to whip up saffron‑infused paella with chorizo, mussels, and peas for their friends, experiments with gazpacho and patatas bravas on weekends,
    and makes a point of sourcing fresh local produce while occasionally over‑seasoning in a quest for authentic flavor.
  core: Pablo Ceballos blends a restless curiosity for surreal art and strategic games with a deep‑seated anxiety that fuels both relentless creativity and occasional self‑sabotage, making them a passionate
    but sometimes overly competitive collaborator.
background:
  cultural: Pablo is a first‑generation Hispanic American of Spanish descent. He grew up bilingual, speaking both English and Castilian Spanish at home, and his family maintains traditions such as celebrating
    Semana Santa, cooking paella, and sharing stories of their hometown in Andalusia. Living in Derby, Kansas, he blends this heritage with Midwestern values—community involvement, modesty, and a love for
    local sports. He enjoys mixing Spanish artistic influences, like surrealist painting and flamenco rhythms, with the pragmatic, collaborative spirit of his Midwest upbringing, creating a unique cultural
    lens through which he perceives the world.
