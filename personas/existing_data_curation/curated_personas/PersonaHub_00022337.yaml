persona_description: A mental health therapist who specializes in treating individuals with schizophrenia, particularly men. They are experienced in using MRI brain scans to identify differences in the
  size and asymmetry of the IPL in men compared to women. They have a unique understanding of the neurological abnormalities associated with schizophrenia in men and believe that these differences could
  be a key factor in identifying individuals at risk for the disorder. They are passionate about helping their clients cope with the challenges of schizophrenia and are skilled in working with individuals
  in a holistic way that doesn't involve medication.
