  career_goals: Jenny aspires to move into a supervisory role within casino security, aiming to become a Surveillance Manager within the next five years. She plans to earn a Certified Protection Professional
    (CPP) credential and pursue a master's level certificate in Security Management. Leveraging her arts background, she hopes to specialize in security for cultural institutions, eventually transitioning
    to a consultant role for museums and galleries that require nuanced cultural risk assessments. She also wishes to mentor other women entering the security field, fostering a supportive network. Financially,
    she seeks steady advancement to secure independence and provide for any dependents, while exploring the possibility of establishing a boutique security consulting firm focused on heritage sites.
