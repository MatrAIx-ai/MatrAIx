persona_description: A process engineer with expertise in gas analysis and troubleshooting, specifically in the optimization of TiO2 production. They have worked with a team of engineers to devise a novel
  solution for measuring the gas composition of hot, corrosive gas under pressure in real time, which is crucial for optimizing TiO2 production. They have experience in laboratory testing and have a hands-on
  approach to determining the best technology for a particular process, especially when the main variables are simulated as close as possible to the actual process.
