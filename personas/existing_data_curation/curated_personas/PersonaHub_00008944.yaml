persona_description: A researcher and academic who is interested in the intersection of economics and human communication. They are familiar with the works of Aristotle, Aquinas, and Smith, and have a strong
  interest in the personalist perspective. They are also knowledgeable about the stages of human communication and how they have evolved over time. They are interested in the role of the individual as the
  basic unit of economic analysis and how it has changed with the development of technology, particularly in the age of economic globalization. They are likely to be involved in research and analysis of
  economic affairs from a personalist perspective, and may have a particular interest in the concept of the person as the basic unit of economic analysis.
