personas:
  professional: Lina Figueroa, an 18‑year‑old recreation worker in Merced, leverages bilingual fluency, first‑aid certification, and graphic‑design skills to design vibrant arts‑and‑sports programs that
    reflect their boundless imagination and natural ability to energize groups.
  sports: Lina Figueroa enjoys informal soccer matches with the Merced United youth club, follows the Sacramento Kings and San Jose Earthquakes on TV, hikes the Sierra foothills each spring, and approaches
    fitness with a blend of competitive spirit and community camaraderie.
  arts: Lina Figueroa channels a love for vibrant acrylic murals inspired by Día de los Muertos, sketches futuristic cityscapes, creates digital illustrations for friends, and draws artistic inspiration
    from Frida Kahlo, Diego Rivera, indie Latin band Café Tacvba, and indie rock act Tame Impala, often spending evenings at community art workshops.
  travel: Lina Figueroa plans weekend getaways to the Sierra Nevada—having trekked Yosemite’s Mist Trail—and dreams of a cultural immersion trip to Oaxaca to witness local Day of the Dead celebrations,
    balancing tight student‑budget constraints with a love for spontaneous road trips and detailed itineraries.
  culinary: Lina Figueroa blends family recipes of tamales, mole with dark chocolate, and chilaquiles with modern twists like avocado‑lime quinoa bowls, cooks at an intermediate skill level using fresh
    cilantro, chilies, and masa harina, and delights in sharing homemade dishes at community potlucks while occasionally over‑indulging in sugary churros.
  core: Lina Figueroa is an imaginative, sociable 18‑year‑old who fuses artistic flair with community spirit, splurges on creative supplies, occasionally forgets health routines, and dreams of turning Merced
    into a vibrant cultural hub.
background:
  cultural: Lina is a second‑generation Mexican‑American raised in Merced, California. Her household blends traditional Mexican customs—such as celebrating Día de los Muertos, cooking family recipes like
    tamales and mole, and speaking Spanish at home—with the vibrant, multicultural environment of the Central Valley. She participates in local Latino festivals and volunteer events, which have deepened
    her appreciation for community solidarity and cultural expression. This bicultural upbringing fuels her desire to create inclusive programs that honor her heritage while inviting diverse community members
    to share in artistic experiences.
attributes:
  skills: '[''Event planning'', ''Group facilitation'', ''Bilingual communication (English/Spanish)'', ''First aid certification'', ''Conflict resolution'', ''Graphic design (Canva, Adobe Photoshop)'',
    ''Social media content creation'', ''Creative décor design'', ''Time management'', ''Team leadership'']'
  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Sketching'', ''Folklórico dance'', ''Listening to indie and Latin music'', ''Hiking'', ''Soccer'', ''Reading speculative fiction'', ''Creative
    writing (short stories, poetry)'']'
  career_goals: Lina aims to pursue an associate degree in Recreation Management or Community Arts at a local community college, followed by a Bachelor’s in Creative Arts Administration. Her long‑term ambition
    is to become a program director for a community recreation center where she can integrate innovative art‑based initiatives—such as pop‑up mural projects and interactive storytelling workshops—into youth
    services. She also dreams of launching a youth‑led cultural hub in Merced that celebrates Mexican heritage while encouraging artistic experimentation and cross‑cultural collaboration.
