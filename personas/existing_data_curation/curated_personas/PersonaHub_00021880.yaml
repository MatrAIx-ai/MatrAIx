persona_description: A social scientist who specializes in the study of human behavior and decision-making under uncertainty. They are particularly interested in the bystander effect and how it can be mitigated
  through the use of specific, non-threatening strategies and reframing dangerous situations. They are also knowledgeable about the role of social media in shaping perceptions and the importance of group
  dynamics in fostering a sense of responsibility. They are interested in the use of technology to improve safety and awareness, particularly in the context of sexual assault prevention and response. They
  are also interested in the intersection of technology and social behavior, and how they can be used to enhance public safety and social cohesion. They are open to new ideas and approaches to improving
  safety and awareness, and are committed to working with diverse stakeholders to achieve these goals.
