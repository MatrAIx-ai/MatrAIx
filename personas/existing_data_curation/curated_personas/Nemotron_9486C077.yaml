  hobbies: '[''Watercolor painting'', ''Quilting'', ''Reading historical fiction and biographies'', ''Visiting museums and art workshops'', ''Gardening heirloom vegetables'', ''Cooking Southern and Caribbean
    fusion dishes'', ''Poetry reading and writing'']'
  career_goals: Although retired, Toni aspires to mentor younger members of her community, especially those interested in the arts and local history. She aims to launch a quarterly art showcase at the Columbus
    community center that highlights emerging Black artists and traditional crafts. Additionally, she hopes to compile and self‑publish a memoir that weaves her personal experiences with the civil‑rights
    era in Georgia, preserving her family’s stories for future generations. Toni also seeks to secure a grant to expand the senior‑center garden program, fostering intergenerational learning and food security.
