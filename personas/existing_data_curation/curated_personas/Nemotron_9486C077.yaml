personas:
  professional: A retired community organizer and arts advocate, Toni Daniels leverages their lifelong event-planning experience, budgeting acumen, and fine-art techniques to mentor young creators and coordinate
    a quarterly showcase of emerging artists at the Columbus community center.
  sports: Toni Daniels enjoys gentle morning walks in the Columbus Botanic Garden, participates in a senior bowling league at the local community center, and faithfully cheers for the Columbus Crew soccer
    team each MLS season, using these activities to stay active without straining joint arthritis.
  arts: Toni Daniels immerses themselves in watercolor painting inspired by the abstractions of James Turrell and the palettes of Georgia O'Keeffe, crafts quilts echoing Romare Bearden's storytelling, routinely
    attends lectures at the Columbus Museum of Art, and shares reflective verses in a local poetry circle that honors the works of Maya Angelou and Langston Hughes.
  travel: Toni Daniels balances leisurely weekend drives to nearby historic towns like Charleston and Columbus’s German Village with a long-standing dream of strolling Savannah’s historic squares, and they
    hope to someday sail to Jamaica to explore its cultural festivals and culinary markets.
  culinary: Toni Daniels delights in cooking Southern classics such as collard greens and smoked turkey, reinvents them with Caribbean influences like Scotch bonnet-spiced jambalaya, and frequently experiments
    with coconut milk, plantains, and home-grown heirloom tomatoes and basil to add fresh flavor to every meal.
  core: Toni Daniels, a 73-year-old watercolor enthusiast and community mentor, channels an ever-curious mind and fierce competitive streak into vibrant art, meticulous garden planning, and occasional anxiety-driven
    over-thinking that fuels both their creative brilliance and sporadic sleepless nights.
background:
  cultural: Toni is an African American woman who grew up in the Deep South during the transformative 1960s and 1970s, witnessing the civil‑rights movement firsthand. Her family roots trace back to the
    Great Migration, with grandparents who moved from rural Alabama to Georgia in search of better opportunities. The Black church community has been a cornerstone of her upbringing, instilling a strong
    sense of fellowship, gospel music, and communal service. She carries forward Southern culinary traditions while incorporating Caribbean influences from family connections. Toni’s cultural identity is
    deeply interwoven with the rich history of Black arts in Georgia, and she remains actively involved in preserving and celebrating that heritage through community programs and personal creative pursuits.
