  hobbies: '["Urban cycling around Cambridge", "Street photography", "Reading mystery novels", "Listening to automotive tech podcasts", "Yoga for stress relief", "Cooking Mediterranean dishes", "Volunteering
    at local food banks", "Solving puzzles (Sudoku, crosswords)", "Attending live music and cultural events", "DIY car maintenance and tinkering"]'
  career_goals: She aims to move from a driver‑sales role into a logistics coordinator or fleet manager position within the next three to five years, pursuing a bachelor's degree in supply chain management
    and acquiring certifications such as the Hazardous Materials endorsement. Ashley is passionate about integrating sustainable transportation options—like electric trucks—into her company's operations
    and hopes to lead efficiency‑driven initiatives that improve route planning and driver wellbeing. Ultimately, she wants to mentor new drivers, blending her curiosity for emerging tech with a desire
    for stable, upward career growth.
