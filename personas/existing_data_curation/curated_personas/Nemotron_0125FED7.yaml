personas:
  professional: Ashley Dossantos blends her hands‑on commercial driving experience with a data‑driven curiosity for logistics, excelling at route optimization, DOT compliance, and customer negotiations
    while maintaining a practical, organized yet flexible approach that positions her for a future as a fleet manager championing sustainable electric‑truck initiatives.
  sports: Ashley Dossantos cycles through Cambridge’s bike lanes as part of the Cambridge Cyclists Club, follows the Boston Celtics in winter, cheers the New England Patriots on Sundays, and joins a weekend
    adult softball league to balance the sedentary demands of driving with high‑energy cardio.
  arts: Ashley Dossantos captures candid street scenes with a vintage Leica, devours mystery novels by Agatha Christie and Tana French, and seeks out live shows by Hozier and Mitski at The Sinclair, letting
    these artistic outlets fuel a curiosity‑driven yet pragmatic worldview.
  travel: Ashley Dossantos plans weekend getaways that blend scenic bike rides along the Hudson River Valley with occasional road trips to the Pacific Coast Highway, preferring off‑peak travel to stretch
    a modest budget while dreaming of a future electric‑truck‑powered cross‑country tour.
  culinary: Ashley Dossantos whips up Mediterranean staples like grilled halloumi drizzled with honey, lemon‑garlic falafel, and a fresh tabbouleh starring bulgur, parsley, and pomegranate molasses, cooking
    at an intermediate level while occasionally improvising with locally sourced herbs and a splash of extra‑virgin olive oil.
  core: Ashley Dossantos is a detail‑oriented, curiosity‑fueled truck driver who balances a love for sustainable tech, relentless problem‑solving, and a habit of over‑analysing fuel prices with a pragmatic
    drive toward a logistics leadership role.
background:
  cultural: Ashley is a second‑generation American of Portuguese descent, raised in the Boston suburbs. Her family blends traditional Portuguese customs—such as celebrating festas and preparing seafood
    meals—with broader New England values of community engagement and hard work. Growing up in the multicultural environment of Cambridge, she embraces both her heritage and the pragmatic, curious outlook
    characteristic of her upbringing.
