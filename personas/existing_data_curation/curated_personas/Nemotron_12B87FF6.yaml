  career_goals: Nicholas aims to climb the compliance ladder by first securing a senior compliance manager role within the next two years, where he can lead a company‑wide risk‑based monitoring program.
    He plans to earn the Certified Compliance & Ethics Professional (CCEP) and later a Certified Regulatory Compliance Manager (CRCM) credential to bolster his expertise. Over the next five to seven years,
    his ambition is to become a chief compliance officer for a regional or national corporation, implementing AI‑driven compliance analytics that increase efficiency while maintaining rigorous controls.
    He also aspires to speak at industry conferences, publish articles on pragmatic compliance frameworks, and mentor emerging professionals, eventually leveraging his experience to launch a boutique consulting
    firm that helps mid‑size firms build resilient compliance cultures.
