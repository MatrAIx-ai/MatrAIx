  career_goals: John aims to evolve from a frontline sales representative into a regional sales manager, overseeing a team of reps while fostering a collaborative and flexible sales culture. He is eager
    to deepen his expertise in emerging manufacturing trends such as automation, IoT‑enabled equipment, and sustainable production processes, positioning himself as a trusted advisor to his clients. Over
    the next five years, he plans to lead data‑driven sales initiatives, increase his team's quota attainment, and develop mentorship programs for newer sales staff. Ultimately, John envisions moving into
    a senior leadership role—either as a director of sales or as an independent consultant—where he can shape sales strategy while preserving a work schedule that accommodates quality family time and personal
    pursuits.
