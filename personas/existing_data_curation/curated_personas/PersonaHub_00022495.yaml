persona_description: A scholar of economics and finance who is interested in the history and analysis of financial crises, particularly those that have occurred since the eighteenth century. They are interested
  in understanding the common patterns related to sources, propagation mechanisms, and resolution of financial crises and are familiar with the basic economic concepts that are indissoluble from financial
  crises, including pricing, resource allocation, efficiency, market failure, risk, uncertainty, information, regulation, and leverage. They are also interested in the paradigmatic divide in economics concerning
  how markets work and the scope for government regulatory intervention in markets.
