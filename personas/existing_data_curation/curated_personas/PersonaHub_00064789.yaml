persona_description: A naval commander who specializes in the study of weather patterns and their impact on amphibious operations in the Western Mediterranean. He is particularly interested in the effects
  of local topography on sea and surf conditions and has conducted extensive research in the field of swell and surf forecasting. He is also experienced in meteorology and has conducted research in the
  field of aerological conditions in the projected theater of operations. He is skilled in weather analysis and has issued weather forecasts for training maneuvers. He has also trained aerological and communication
  personnel in codes, ciphers, weather broadcasts, and conditions peculiar to the theater of operations. He is aware of the importance of weather conditions in determining the success of amphibious operations
  and has prepared aerological equipment for easy mobility in order to set up a forecasting service on short notice.
