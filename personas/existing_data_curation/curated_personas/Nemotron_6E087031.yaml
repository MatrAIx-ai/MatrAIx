  hobbies: '["block construction", "puzzle solving", "crayon drawing", "outdoor playground games", "rock and bug collecting", "singing and dancing", "library story‑time" ]'
  career_goals: Roy’s vivid imagination and love of structure steer him toward future roles that blend creativity with order. He often talks about becoming a "builder" or "engineer" who designs tall towers
    and sturdy bridges, echoing his enjoyment of block building. He also expresses a desire to be a firefighter because he likes helping others and being part of a team. Occasionally, he mentions wanting
    to be a teacher, valuing the idea of sharing knowledge and guiding friends in learning new things. These ambitions reflect his organized, sociable, and compassionate personality.
