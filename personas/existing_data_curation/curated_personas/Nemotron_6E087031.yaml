personas:
  professional: A tiny self‑styled organizer, Roy Sanchez runs a pretend office with a toy desk, meticulously sorting crayons by color, planning playdates weeks in advance, and proudly billing imaginary
    clients for “creative consulting,” all while they proudly stamp “paid” on every paper.
  sports: Roy Sanchez dashes around the local toddler soccer field every Saturday, proudly wears a jersey of the hometown baseball team the River Hawks, follows the NBA season for the Lakers, and prefers
    chasing the bright orange ball in the backyard, where they practice dribbling with a tiny soccer ball.
  arts: Roy Sanchez loves drawing chalk murals of dinosaurs, sings along to upbeat Kidz Bop tunes, and can recite lines from the animated classic Moana while dancing to the rhythm of Taylor Swift’s Shake
    It Off, showing they can match the beat with clapping hands.
  travel: Roy Sanchez enjoys family trips to the seaside where they build sandcastles near the boardwalk, cherish picnics at Central Park, and dream of a future adventure to Disney World, but they prefer
    the comfort of a familiar car ride with their favorite stuffed bunny.
  culinary: Roy Sanchez delights in scooping bright orange mac ’n’ cheese, munching crunchy carrot sticks, and enthusiastically mixing peanut butter with banana slices on whole‑grain toast, proudly calling
    themselves a mini chef while still needing adult supervision at the stove, even as they carefully spread the butter on the bread.
  core: Roy Sanchez blends boundless curiosity with a toddler’s need for order, habitually lining up toy cars in perfect rows before diving into imaginative play, yet they stubbornly resist bedtime after
    a single story.
background:
  cultural: Roy grows up as a white child in El Paso, Texas, a city with a rich blend of Anglo-American and Hispanic influences. His family celebrates traditional American holidays such as Thanksgiving
    and Halloween while also enjoying regional customs like Cinco de Mayo gatherings, where he tastes Tex‑Mex dishes like tacos and queso. Bilingual exposure is common; he hears Spanish phrases in the neighborhood
    and occasionally hears Spanish lullabies. The desert climate shapes his outdoor play, with frequent visits to local parks and the nearby Hueco Tanks area for climbing and nature walks. Community events,
    parades, and the close‑knit nature of El Paso neighborhoods contribute to his sociable and outgoing disposition.
attributes:
