personas:
  professional: Mark Rosa, a veteran pipefitter with over 20 years of hands‑on experience, blends meticulous blueprint reading, SMAW and TIG welding, and strict safety adherence to lead complex industrial
    steam projects while pursuing Master Pipefitter certification, foreman responsibilities, and a future specialty contracting firm that integrates BIM and sustainable retrofits.
  sports: Mark Rosa enjoys the calm rhythm of early‑morning fishing on Lake Springfield with the local Anglers' Guild, follows the Chicago Cubs for baseball and the St. Louis Cardinals for spring training,
    and participates in a bi‑weekly senior bowling league at the Springfield Community Center to stay active.
  arts: Mark Rosa channels creative energy into detailed scale model train layouts and handcrafted furniture, finds inspiration in classic pulp heroes like Doc Savage, the brushwork of Norman Rockwell,
    and the blues harmonica of Muddy Waters, and often attends local historical society lectures on early 20th‑century American industry.
  travel: Mark Rosa prefers meticulously planned road trips that blend historical sites and rail heritage, having driven the Blue Ridge Parkway to visit the Great Smoky Mountains, toured the National Railway
    Museum in York, England, and scheduled a future pilgrimage to the historic steam shops of New Brunswick, Canada, all while balancing budget constraints with a modest family allowance.
  culinary: Mark Rosa favors hearty, precisely measured meals such as pan‑seared trout with lemon‑butter sauce, classic beef brisket seasoned with smoked paprika, and a no‑knead sourdough loaf using a starter
    cultured from wild yeast, often cooking on a cast‑iron skillet and pairing dishes with locally sourced herbs and root vegetables.
  core: Mark Rosa is a disciplined, predictability‑driven pipefitting master who balances solitary craftsmanship with quiet compassion, channeling meticulous work habits into both professional leadership
    and precise hobby pursuits.
background:
  cultural: Mark grew up in a working-class family in the Madison County region of Illinois, where Midwestern values of hard work, reliability, and community support are deeply ingrained. The local culture
    emphasizes modesty, practicality, and a strong sense of reciprocity—principles that shaped his disciplined approach to work and his willingness to help neighbors. While he is not married, he maintains
    close ties with extended family and local churches that foster a supportive, cooperative environment. His upbringing in the small-town atmosphere of Cottage Hills reinforced his preference for stability,
    routine, and small-scale social connections.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''Welding (SMAW/TIG)'', ''Blueprint reading'', ''Hydraulic system maintenance'', ''Industrial safety compliance'', ''Project scheduling'', ''Team leadership'',
