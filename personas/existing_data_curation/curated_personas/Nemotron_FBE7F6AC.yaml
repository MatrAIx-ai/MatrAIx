  hobbies: '[''Model train building'', ''Woodworking'', ''Restoring vintage hand tools'', ''Fishing'', ''Reading technical manuals'', ''Historical nonfiction reading'', ''Volunteer plumbing projects'',
    ''Classic pulp magazine collecting'']'
  career_goals: Mark aims to achieve Master Pipefitter certification within the next two years, transition into a foreman role managing a crew on large industrial projects, and eventually launch his own
    specialty pipefitting contracting firm that focuses on sustainable retrofits for older buildings. He is also committed to establishing a formal apprenticeship program at a local trade school, where
    he can pass on his meticulous craftsmanship and safety-first mindset to the next generation. Additionally, he plans to integrate emerging technologies such as BIM and digital pipe layout software to
    improve project efficiency and documentation.
