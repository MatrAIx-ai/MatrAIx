  hobbies: '["Painting", "Pottery", "Gallery visits", "Live music events", "Coastal nature walks", "Quilting", "Gardening", "Bird watching", "Book club", "Wine tasting", "Road trips", "Improvisational theater"]'
  career_goals: Aiming to deepen her involvement in Corpus Christi’s vibrant arts scene, Jeanie plans to pursue a leadership role within the local Art Council, spearheading annual festivals that highlight
    emerging artists and foster community pride. She aspires to launch a community studio where seniors and youth collaborate on craft projects, drawing on her love for quilting, painting, and storytelling.
    Recognizing the importance of digital platforms, she intends to acquire intermediate digital media skills to create virtual exhibitions and share regional art history online. Jeanie also hopes to travel
    to renowned art destinations—such as New Mexico’s pueblo communities and historic East Coast museums—to gather fresh inspiration. Ultimately, she seeks to be recognized as a catalyst for cultural vibrancy
    in her hometown, leveraging her competitive drive to secure grants and partnerships that amplify the impact of her initiatives.
