persona_description: A Functional Communication Trainer who specializes in teaching children with Autism Spectrum Disorder (ASD) the most meaningful vocabulary in the most naturalistic way. They are skilled
  in implementing various strategies such as natural environment training, verbal behavior, discrete trial training, picture exchange communication system protocol, American Sign Language or Sign Exact
  English, differential reinforcement, contriving motivating operations, and errorless learning. Their goal is to encourage children to communicate and talk while improving their motivation and generalization
  skills. They work closely with other members of the treatment team, including autism behavioral therapists, to determine the most effective communication strategies for each child.
