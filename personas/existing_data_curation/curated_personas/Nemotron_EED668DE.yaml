  hobbies: '["Gardening", "Birdwatching", "Crossword puzzles", "Bridge (card game)", "Historical fiction reading", "Knitting", "Traditional Southern cooking", "Genealogy research", "Community garden volunteering"]'
  career_goals: Although retired, Tessa aims to stay physically independent and mentally sharp, continue volunteering at the local senior center, become a mentor for younger volunteers, and preserve her
    family’s history by completing a memoir and compiling a genealogy archive for future generations. She also hopes to help establish a small community garden where she can share her gardening expertise
    and foster modest competition among participants, ensuring her contributions are recognized within her tight‑knit circle.
