personas:
  professional: Janet Castro, a 23‑year‑old interior painting and decorative finishes specialist, blends a rigorous understanding of color theory, blueprint reading, and sustainable paint technologies with
    a vivid imagination, delivering custom mural projects that fuse folk motifs with contemporary abstraction while juggling the competitive drive to launch her own boutique studio within three years.
  sports: Janet Castro finds balance on the trails of the Texas Hill Country, joining the Hill Country Hiking Club for weekend treks, competing in local 5 K fun runs when personal bests feel within reach,
    and supporting the San Antonio Spurs and Texas Rangers from their living room, while occasionally playing pickup volleyball at the community center.
  arts: Janet Castro’s artistic world spins around acrylic canvas work, mural projects, and digital illustration; they draw inspiration from the chaotic drip techniques of Jackson Pollock, the narrative
    richness of Frida Kahlo’s self‑portraits, and the street‑level wit of Banksy, regularly attending exhibitions at the New Braunfels Art Museum, participating in mixed‑media workshops led by local painter
    Carla Miller, and curating a personal Instagram feed that showcases their evolving abstract–folk hybrid style.
  travel: Janet Castro’s travel style blends intentional research with spur‑of‑the‑moment road trips; they’ve explored the artistic enclaves of Marfa, the historic streets of Fredericksburg, and the vibrant
    murals of Santa Fe, while dreaming of a future pilgrimage to Barcelona’s Gothic Quarter to study Gaudí’s colored tiles, preferring DIY itineraries that leave room for unexpected sketch‑sessions at roadside
    vistas.
  culinary: 'Janet Castro cooks with a love for reinventing traditional corn‑based dishes: they craft hand‑made masa tortillas draped in smoky chipotle‑marinated pork, pair them with fresh avocado salsa
    and a splash of lime, and experiment by folding the fillings into gourmet tacos topped with edible flowers and queso fresco, while their kitchen shelves boast a collection of region‑grown chilies, local
    heirloom tomatoes, and a trusty stand‑mix for perfect batter consistency.'
  core: Janet Castro, a 23‑year‑old color‑obsessed painter‑entrepreneur, balances relentless artistic ambition with occasional procrastination, channeling competitive drive into bold murals while juggling
    finances, health, and a love for hill‑country hikes and late‑night sketch sessions.
background:
  cultural: Janet’s Mexican heritage is a cornerstone of her identity. Raised in a bilingual household in New Braunfels, she grew up celebrating Día de los Muertos, Cinco de Mayo, and local Tex‑Mex festivals,
    absorbing the vibrant colors, patterns, and storytelling traditions of Mexican folk art. Her grandparents taught her traditional recipes and the symbolism behind motifs like papel picado and Talavera
    tiles, which she often incorporates into her decorative finishes. While she identifies strongly with Mexican culture, she also embraces the multicultural fabric of Central Texas, blending German‑Texan
    influences from New Braunfels with her own heritage to create a uniquely hybrid aesthetic.
