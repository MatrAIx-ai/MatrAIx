  career_goals: Janet aims to transition from a contractor’s assistant to an independent owner‑operator specializing in high‑end artistic painting and custom wall finishes. Over the next three years she
    plans to obtain a professional painting contractor license, complete a certification in decorative finishes, and build a portfolio of murals for local businesses and cultural events. She envisions opening
    a boutique studio in New Braunfels that offers both traditional painting services and commissioned artworks, collaborating with architects and interior designers. Long‑term, she hopes to be recognized
    regionally for integrating Mexican folk motifs with contemporary abstract designs, and to mentor other young artisans from her community.
