  career_goals: Although officially retired, Kimberly aims to deepen her impact on the Topeka community. She hopes to expand the local senior‑center’s outreach program by establishing a weekly “Comfort
    Kitchen” where volunteers prepare and deliver nutritious meals to homebound seniors. She also wishes to mentor younger volunteers, sharing her practical knowledge of gardening and community organizing.
    A personal ambition is to complete a memoir that weaves together her family history, experiences of widowhood, and the lessons she’s learned about resilience and compassion. Finally, she aspires to
    learn digital photography to document the changing seasons in her garden and the stories of her neighbors.
