personas:
  professional: Maria Santos, an aspiring community arts program coordinator, blends their digital illustration mastery in Photoshop and Illustrator with an organized, compassionate approach to design free
    workshops for at‑risk youth, while their talkative charisma makes them a magnetic facilitator in multicultural settings.
  sports: Maria Santos stays active by attending lively salsa and bachata classes at a downtown studio, joining pick‑up soccer games with a local youth league during the cooler months, and cheering for
    the Miami Heat and Miami Marlins, treating both dance and team sports as essential stress‑relief outlets.
  arts: Maria Santos finds artistic inspiration in Frida Kahlo's surreal color palettes, Banksy's social‑political street murals, and Carlos Vives's rhythmic guitar, regularly visits Wynwood Walls to study
    urban murals, and fuels their own poetic narratives with speculative fiction by N.K. Jemisin.
  travel: Maria Santos prefers meticulously planned weekend getaways that blend cultural immersion with affordability, having explored New York City's museum district and a coastal Caribbean town on a family
    holiday, while dreaming of wandering Barcelona's Gothic Quarter and trekking Patagonia's Torres del Paine once finances allow.
  culinary: Maria Santos enjoys crafting homemade baleadas with refried beans, melty queso fresco, and ripe avocado, perfecting sweet tamales seasoned with achiote and served with pineapple, while they
    experiment with plantain fritters, fresh cilantro‑lime rice, and occasionally savor a classic Cuban sandwich in Little Havana.
  core: Maria Santos is a bright‑eyed, detail‑driven dreamer who channels relentless curiosity into art and community service, yet often battles late‑night coffee binges and over‑thinking that fuels both
    creative bursts and sleepless nights.
background:
  cultural: Maria is a second‑generation Honduran‑American raised in the multicultural neighborhoods of Miami, Florida. At home, Spanish is spoken regularly, preserving her family's Honduran traditions,
    Catholic holidays, and the rhythms of punta and garífuna music. She maintains strong ties with relatives in Tegucigalpa, often visiting during holidays and participating in family remittance cycles.
    The vibrant Latino diaspora of Miami exposes her to a blend of Central American, Caribbean, and broader American cultures, shaping an identity that honors her Honduran heritage while feeling fully integrated
    into the diverse cultural fabric of her city.
attributes:
  skills: '[''Digital illustration (Adobe Photoshop, Illustrator)'', ''Graphic design'', ''Visual storytelling through sketching and painting'', ''Creative writing (poetry, short fiction)'', ''Public speaking
    and workshop facilitation'', ''Bilingual communication (English/Spanish)'', ''Peer counseling and conflict mediation'', ''Event planning and coordination'', ''Social‑media content creation'']'
  hobbies: '[''Sketching and painting'', ''Digital illustration'', ''Creative writing (poetry, short stories)'', ''Playing acoustic guitar'', ''Salsa and bachata dancing'', ''Cooking Honduran cuisine'',
    ''Volunteering at community centers'', ''Visiting art galleries and museums'', ''Street‑scene photography'', ''Reading speculative fiction'']'
  career_goals: Maria aims to complete a bachelor’s degree in Fine Arts or Art Therapy, building on her associate’s studies. Her long‑term ambition is to become a community arts program director or licensed
    art therapist who designs free workshops and therapeutic art sessions for at‑risk youth, especially within the Honduran diaspora in Miami. She envisions launching a nonprofit that blends cultural heritage,
    creative expression, and mental‑health support, while also pursuing opportunities to collaborate with museums and cultural institutions on interactive exhibits that celebrate Central American art. Ultimately,
    she hopes to expand her impact internationally by fostering artistic exchange programs between Miami and Honduras.
