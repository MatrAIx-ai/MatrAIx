persona_description: A student from the Benjamin M. Statler College of Engineering and Mineral Resources at West Virginia University who is participating in NASA's Reduced Gravity Education Flight Program.
  The student is part of a team that is conducting research on the role of gravity in the heat removal performance of spray cooling in a microgravity environment. The student is expected to experience weightlessness
  during the flight and will be conducting experiments aboard the "Weightless Wonder" aircraft. The student is a senior electrical engineering major from Huntington, Maryland, and is part of a team of students
  from other universities who are also participating in the program. The student is excited about the opportunity to conduct research and gain hands-on experience in a weightless environment.
