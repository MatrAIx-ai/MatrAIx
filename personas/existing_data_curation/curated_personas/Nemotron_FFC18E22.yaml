  hobbies: '[''Woodworking'', ''Home‑improvement projects'', ''Gardening'', ''Fishing'', ''Hiking'', ''Reading non‑fiction'', ''Board games'', ''Church community service'']'
  career_goals: Forrest aims to secure a full‑time position in operations or facilities management within a mid‑size company in the Charlotte area, leveraging his organizational strengths. In the next three
    to five years he hopes to become a logistics coordinator or site supervisor, eventually earning enough capital and experience to launch his own handyman and home‑improvement service, allowing him to
    blend his hands‑on skills with his penchant for structure.
