persona_description: A scientist or researcher who is passionate about plant-based science, knowledge, and expertise, particularly in the fields of medicinal plants, biodiversity conservation, and sustainable
  sourcing. They are interested in the use of plants in cosmetics, herbal medicines, functional foods, potpourri, dyes, and pet products, as well as bio-fuels. They are also interested in the economic aspects
  of plant use and the challenges of habitat loss due to changes in land use and climate change. They are likely to be involved in initiatives such as the authentication of Chinese medicinal plants, the
  collection of raw materials and artefacts from useful plants, and the provision of consultancy and scientific services. They are also likely to be involved in the development of new analytical methods
  for identifying species of plants being traded and assessing their quality.
