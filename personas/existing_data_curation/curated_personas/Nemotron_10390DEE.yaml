personas:
  professional: Shadi Jaikaran is a veteran elementary educator who blends culturally responsive curriculum design with meticulous grant‑writing and workshop coordination, guiding intergenerational language
    projects while savoring solitary reflection on her craft.
  sports: Shadi Jaikaran enjoys low‑impact fitness through daily prairie walks, occasional senior yoga classes, follows the Oklahoma City Thunder on television, and volunteers as a time‑keeper for the local
    senior bowling league.
  arts: Shadi Jaikaran expresses herself through watercolor landscapes of the Oklahoma prairie, beadwork inspired by traditional ribbon motifs, and quilting that echoes folk‑art patterns, while regularly
    listening to the ambient recordings of R. Carlos Nakai and admiring the work of Georgia O'Keeffe.
  travel: Shadi Jaikaran prefers quiet, purposeful travel, meticulously planning weekend trips to the Tallgrass Prairie Preserve, the Great Smoky Mountains, and a recent pilgrimage to the historic pueblos
    of New Mexico, balancing limited senior travel funds with a love for solitude.
  culinary: Shadi Jaikaran enjoys farm‑to‑table meals, often preparing herb‑infused quinoa salads, roasted sweet potatoes with sage, and wild berry compote using produce from her native‑plant garden, though
    she admits to over‑seasoning dishes with extra salt when distracted.
  core: Shadi Jaikaran is a curious, organized senior whose solitary watercolor sessions, meticulous grant applications, and habit of journaling each evening reveal a life devoted to preserving heritage
    while occasionally forgetting where she placed her spectacles.
background:
  cultural: Shadi identifies as a member of the Muscogee (Creek) Nation, a tribe with deep roots in the Oklahoma region. Raised in a bilingual household, she grew up hearing Creek stories, songs, and participating
    in seasonal ceremonies such as the Stomp dance. The values of respect for the land, community storytelling, and intricate craftsmanship—especially beadwork and ribbon work—have shaped her worldview.
    Living in Bixby, she remains connected to the broader Muscogee community through the tribal cultural center, attending workshops, and contributing to preservation efforts. Her upbringing blends Cherokee
    and Creek influences, reflecting the multicultural tapestry of eastern Oklahoma.
