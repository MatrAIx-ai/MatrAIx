  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Beadwork (ribbon work)'', ''Quilting'', ''Gardening (native plants)'', ''Reading historical fiction and art history'', ''Listening to tribal
    music'', ''Genealogical research'', ''Journaling'', ''Nature walks'']'
  career_goals: Shadi's primary ambition is to document and share her family's tribal history through a written memoir and an accompanying exhibition of her artwork at the local tribal cultural center.
    She aims to design and lead occasional workshops on traditional crafts and storytelling for younger members of the Muscogee community, while also pursuing a short-term certificate in archival studies
    to better preserve oral histories. Additionally, she seeks modest grant funding to support intergenerational language projects and hopes to continue her lifelong learning by attending seminars on contemporary
    art and indigenous education.
