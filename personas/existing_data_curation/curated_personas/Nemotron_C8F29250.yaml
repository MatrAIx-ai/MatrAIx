  career_goals: Roxana aims to transition from her current gap in formal employment to a role that leverages her business acumen and people‑focused strengths. In the next two to three years she hopes to
    secure an entry‑level marketing or business development position at a small to midsize company in the Pittsburgh region, where she can help grow brand presence and build client relationships. She aspires
    to develop expertise in integrated digital campaigns and eventually lead a cross‑functional team. Long‑term, she envisions founding her own boutique consulting firm that assists local entrepreneurs
    with market entry strategies, while also pursuing an MBA to deepen her strategic leadership skills.
