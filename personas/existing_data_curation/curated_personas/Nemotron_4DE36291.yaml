  career_goals: In the next five years Michael aims to earn Certified Safety Professional (CSP) and Certified Industrial Hygienist (CIH) credentials, positioning himself for a senior regional safety manager
    role where he can shape enterprise-wide safety culture. He is passionate about integrating predictive analytics into injury prevention and plans to pilot a data-driven safety dashboard across multiple
    sites. Michael also seeks to champion mental-health awareness in the workplace, developing programs that address anxiety and stress among front-line staff. Long-term, he envisions transitioning to an
    independent safety consultancy, authoring a practical guide on occupational health for small-to-mid-size manufacturers, and mentoring the next generation of safety professionals.
