    familiarity (e.g., HubSpot)'', ''Event support and community outreach'', ''Creative problem solving'', ''Adaptability to fast-changing environments'']'
  hobbies: '[''Visiting art galleries and mural tours'', ''Street photography'', ''Sketching and watercolor painting'', ''Cooking Mexican and fusion cuisine'', ''Reading contemporary fiction'', ''Listening
    to indie and Mexican folk music'', ''Folkloric dance classes'', ''Hiking in local nature trails'', ''Yoga and meditation'', ''Volunteering for community cultural events'', ''Exploring local coffee shops'']'
  career_goals: Maricela aims to advance from her current secretary role to an office manager or executive assistant position within a creative or cultural organization, where she can blend her administrative
    expertise with her passion for art. She plans to complete a bachelor's degree in Business Administration or Arts Management through community college courses, and to earn certifications in project management
    (CAPM) and digital marketing. Long‑term, she hopes to lead community arts events, coordinate exhibitions, and possibly launch a small boutique gallery or event‑planning consultancy that showcases Mexican
    and contemporary art. Improving her time‑management and stress‑relief techniques is also a personal priority to support her professional growth.
