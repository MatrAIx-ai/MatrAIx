personas:
  professional: Maricela Cardona is a bilingual administrative professional in San Bernardino who leverages their knack for creative problem‑solving and meticulous calendar management to keep a bustling
    cultural nonprofit’s operations humming, even as their spontaneous nature sometimes leads to last‑minute scramble and competing priorities.
  sports: Maricela Cardona enjoys hiking the San Bernardino foothills on weekends, practices yoga at a downtown studio, follows the Los Angeles Lakers for basketball, the Dodgers for baseball, and runs
    with a local community running club that meets every Saturday morning.
  arts: Maricela Cardona immerses themselves in the local art scene by frequenting galleries like the San Bernardino Museum of Art, snapping street photographs of vibrant murals by artists such as Diego
    Rivera and local muralists, sketching and painting watercolors that weave traditional folk motifs with contemporary styles, and attending indie folk concerts featuring performers like José González
    and Phoebe Bridgers.
  travel: Maricela Cardona plans trips with a blend of spontaneous weekend getaways to places like Joshua Tree and Big Bear for hiking, and longer voyages to cultural hubs such as Oaxaca and Mexico City
    to explore markets, murals, and culinary traditions, all while balancing a modest travel budget and occasional visa paperwork stress.
  culinary: Maricela Cardona loves cooking home‑made tamales, enchiladas with chipotle sauce, and mole‑infused dishes while experimenting with fusion flavors like miso‑glazed fish, and they relish tasting
    fresh avocado, cilantro, and roasted corn masa in their own kitchen, often pairing meals with artisanal espresso from an Ethiopian single‑origin roast.
  core: Maricela Cardona is a creative‑driven, art‑loving administrative professional whose spontaneous spirit fuels both vibrant cultural projects and occasional organizational chaos, while they juggle
    coffee‑fuelled workdays, anxiety‑management rituals, and a restless curiosity for new experiences.
background:
  cultural: Maricela is a first‑generation Mexican‑American who grew up in a bilingual household in the Inland Empire. She celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and family
    gatherings featuring home‑cooked meals. Her family maintains strong ties to their heritage, speaking Spanish at home and participating in local cultural festivals like the San Bernardino Mexican Festival.
    Her Mexican roots influence her aesthetic preferences, favoring bright colors, mural art, and rich culinary flavors. She values community, family cohesion, and the resilience of her immigrant background,
    which inspires her involvement in cultural preservation initiatives within her community.
attributes:
