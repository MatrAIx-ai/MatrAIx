persona_description: A healthcare professional who is involved in the resuscitation and anaesthesia of patients, particularly in emergency situations. They are skilled in performing cardiopulmonary resuscitation,
  preparing for general anaesthesia, and managing the airway of patients during resuscitation and surgery. They are familiar with the use of cricoid pressure, a technique used to prevent regurgitation and
  aspiration of gastric contents during resuscitation. They are also knowledgeable about the potential complications of cricoid pressure, including retching and death, and are skilled in managing these
  complications.
