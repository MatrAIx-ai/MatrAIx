  career_goals: Although retired from formal employment, Joshua aims to remain a catalyst for local economic vitality. He plans to volunteer as a financial advisor for the Clovis Chamber of Commerce’s small‑business
    incubator, mentor first‑time entrepreneurs, and serve on the board of the community garden project. He also aspires to author a memoir that blends business lessons with personal anecdotes, and to continue
    learning about sustainable practices and emerging digital tools to stay relevant in advisory roles.
