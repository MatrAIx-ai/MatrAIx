  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Model railroading'', ''Chess'', ''Board‑game nights'', ''Attending concerts'', ''Genealogy research'', ''Cooking'']'
  career_goals: Even at 83, Rasikbhai aims to leave a lasting legacy by documenting his engineering experiences in a memoir and contributing articles to local engineering societies. He seeks to mentor high‑school
    and college students through volunteer tutoring and hands‑on workshops, particularly focusing on encouraging underrepresented youth to pursue STEM. He also aspires to support his grandchildren’s education
    by funding STEM kits and championing community projects that promote renewable energy and sustainable infrastructure in Indianapolis. His calm resilience fuels a steady pursuit of learning, keeping
    abreast of new technologies while advocating for practical, proven solutions.
