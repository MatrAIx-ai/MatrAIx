persona_description: A health expert who specializes in the study of influenza viruses, particularly the new pig flu virus that has infected 153 people in the United States this summer. This expert is knowledgeable
  about the symptoms, transmission, and treatment of the disease, and is advising the public on how to prevent infection. They have experience with the current flu vaccine and are aware of the potential
  risks of the new virus. This expert is highly concerned about the potential impact of the new virus on public health and is urging people to get vaccinated.
