  hobbies: '[''Quilting'', ''Watercolor Painting'', ''Gardening'', ''Cooking'', ''Reading'', ''Dancing'', ''Volunteer Work'', ''Book Club'', ''Card Games'', ''Genealogy Research'', ''Nature Walks'']'
  career_goals: Although retired from formal employment, Sheila is driven to leave a lasting legacy in her community. She aims to launch a local seniors’ storytelling circle that records and preserves the
    oral histories of African American families in Goliad County. She also hopes to expand the neighborhood community garden, teach quilting and watercolor classes to youth, and complete a memoir that weaves
    her personal journey with the broader civil‑rights history of rural Texas. Through these efforts, Sheila wants to serve as a bridge between generations, foster cultural pride, and inspire younger volunteers
    to continue community service.
