  hobbies: '["watercolor painting", "sketching", "digital illustration", "gallery visits", "poetry slams", "hiking", "kayaking", "board game nights", "reading speculative fiction", "exploring philosophy"]'
  career_goals: David aspires to transition from a dishwasher to a line cook, leveraging his curiosity about food and flavors to master culinary techniques. He dreams of enrolling in a community culinary
    program to deepen his skill set and eventually become a sous chef who can incorporate artistic presentation into dishes. Long‑term, he envisions opening a modest eatery that doubles as a community art
    space, where he can curate exhibitions and host creative workshops, blending his love for food, art, and social harmony.
