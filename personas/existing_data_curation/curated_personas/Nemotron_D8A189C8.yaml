personas:
  professional: David Mckenzie, a diligent dishwasher at a bustling La Crosse restaurant, leverages meticulous sanitation expertise and an imaginative eye to keep the kitchen spotless while habitually sketching
    menu concepts on break, dreaming of one day translating those ideas into line‑cook creations.
  sports: David Mckenzie enjoys kayaking the Mississippi River in summer, hikes the nearby bluffs with the Midwest Trailblazers Hiking Club during autumn, follows the Green Bay Packers and the La Crosse
    Loggers for football and baseball, but prefers solo fitness routines over team sports, treating occasional board‑game nights as their primary social athletic outlet.
  arts: David Mckenzie immerses themselves in visual and literary arts, drawing inspiration from watercolorist John Singer Sargent, listening to the melancholic folk of Bon Iver, devouring the speculative
    poems of Ocean Vuong, and regularly attending performances at the Grand Theater while contributing digital illustrations for local gallery events.
  travel: David Mckenzie favors weekend escapes to New Orleans for its vibrant food scene, seasonal road trips along the Great River Road to admire river bluffs, long‑planned pilgrimages to Kyoto to study
    traditional tea ceremonies, yet often postpones international travel due to budget constraints and a penchant for spontaneous local adventures.
  culinary: David Mckenzie, while still mastering dishwasher duties, delights in experimenting with seasonal foraged mushrooms in a rustic wild‑mushroom risotto, perfects a pan‑seared salmon with dill beurre
    blanc at home, and frequently savors farm‑to‑table breakfasts featuring heirloom tomatoes, locally sourced cheese, and freshly brewed black coffee, all while envisioning artistic plating for future
    menu designs.
  core: David Mckenzie is a kitchen‑bound dream‑weaver who swaps soap suds for watercolor strokes, hoards sketchbooks, habitually forgets appointments, and constantly juggles the pull of artistic novelty
    with the grind of restaurant chores.
background:
  cultural: David is a white Midwesterner of Scottish‑Irish descent, reflected in his surname McKenzie and family traditions of storytelling and modest hospitality. Growing up in La Crosse, Wisconsin, he
    absorbed the region's values of community cooperation, humility, and appreciation for natural beauty. Local customs—such as seasonal cheese festivals, river‑front gatherings, and a supportive arts scene—have
    shaped his sense of belonging. While his heritage highlights a respect for heritage and perseverance, his personal outlook blends these roots with a contemporary embrace of artistic experimentation
    and flexible living.
