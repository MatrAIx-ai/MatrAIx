  hobbies: '[''soccer'', ''LEGO building'', ''reading adventure/science‑fiction books'', ''drawing cartoon characters'', ''basic digital art'', ''cooking Mexican dishes with family'', ''community nature
    walks'', ''introductory Scratch coding'']'
  career_goals: Ramon dreams of one day becoming an engineer who designs safe play spaces and community structures, blending his love for building with a desire to give back to his neighborhood. He is fascinated
    by how bridges and playgrounds are constructed and hopes to study civil engineering in the future. Inspired by the firefighters he admires in Lewisville, he also envisions a role where he can help protect
    and serve his community. Although he is only nine, he sets short‑term goals to excel in school, join a robotics club, and continue developing his coding skills, believing that these steps will lay the
    groundwork for his larger ambition of creating functional, inclusive spaces for families like his own.
