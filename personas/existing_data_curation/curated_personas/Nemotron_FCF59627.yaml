  career_goals: Martin dreams of becoming a multimedia storyteller—one day a comic‑book artist, video‑game designer, or filmmaker who can blend visual art, narrative, and technology. He wants to create
    characters and worlds that reflect his own experiences and inspire other kids in his community. He aims to win state‑level art contests, lead a youth digital‑arts club at his school, and maybe earn
    a scholarship that lets him study graphic design and computer science in high school. His competitive spirit pushes him to set high standards, while his curiosity fuels a lifelong love of learning.
