personas:
  professional: Martin Powell is an aspiring digital storyteller who blends sketching, LEGO engineering, and Scratch programming to craft interactive fantasy worlds, channeling a competitive curiosity that
    drives them to master new tools while keeping school projects organized.
  sports: Martin Powell spikes the ball for the Saturday Youth Basketball League at the community center, idolizes the Memphis Grizzlies for their hustle, and blends competitive drills with weekend hikes
    on Lookout Mountain to keep both mind and body sharp.
  arts: Martin Powell channels their imagination into sketching mythical beasts inspired by the jazz improvisations of Miles Davis and the beats of Kendrick Lamar, building LEGO dioramas that echo the storytelling
    of graphic novels like "Amulet," and animating them in Scratch projects that pulse to the rhythms of H.E.R.
  travel: Martin Powell’s travel style mixes a checklist of nature stops—such as hikes through Great Smoky Mountains and Lookout Mountain—with spontaneous family trips to New Orleans for its vibrant street
    music, favoring low‑budget road trips that let them sketch new landscapes on the backseat.
  culinary: Martin Powell loves the comfort of creamy mac and cheese drizzled with smoked paprika, the zest of homemade baked sweet‑potato fries, and the smoothness of chocolate‑cocoa milkshakes, and can
    whip up a decent batch of seasoned cornbread using a family‑handed recipe, though they occasionally burn toast while day‑dreaming about a new LEGO design.
  core: Martin Powell is a fiercely curious 11‑year‑old who juggles epic LEGO constructions and Scratch animations while secretly hoarding spare bricks and battling occasional budget‑blitz splurges on graphic
    novels.
background:
  cultural: Martin is a Black boy growing up in Chattanooga, Tennessee, a city with a deep civil‑rights legacy and a vibrant African‑American cultural scene. His family values church traditions, soulful
    music, community gatherings, and storytelling. He is influenced by local Black artists, the blues and jazz heritage of the South, and the emerging hip‑hop culture in his neighborhood. The supportive
    community and its history of resilience shape his worldview, encouraging him to explore social justice themes in his art while staying grounded in his cultural roots.
attributes:
