  career_goals: Andy envisions a future where his love for technology and problem‑solving translates into a career as a software developer or a community‑focused engineer. He hopes to create apps or tools
    that make everyday life easier for his family and neighborhood, such as a bilingual tutoring platform that bridges language gaps. He also considers becoming a mental‑health advocate or a youth mentor,
    using his own experiences with worry and stress to support other kids. While he values flexibility and creative freedom, he also recognizes the importance of a stable career that can provide for his
    loved ones.
