personas:
  professional: Andy Maldonadodiaz, a 12‑year‑old aspiring digital storyteller, merges curiosity with practicality as they design elaborate Minecraft survival challenges, draft comic panels inspired by
    graphic novels, and practice conversational Spanish with grandparents, while often shunning rigid school projects in favor of spontaneous, self‑directed creation.
  sports: Andy Maldonadodiaz, a 12‑year‑old basketball enthusiast, joins pickup games at the Prospect Park court with a tight‑knit group of friends, and they idolize the New York Knicks while following
    the NBA season closely, also dabbling in skateboarding during summer weekends.
  arts: Andy Maldonadodiaz, a 12‑year‑old comic‑strip sketcher, spends afternoons emulating the line work of Alex Ross and the narrative pacing of Marjane Satrapi, browses street murals in Prospect Park
    for inspiration, and they tune into a mixtape that blends reggaeton hits by Bad Bunny with classic salsa legends like Celia Cruz.
  travel: Andy Maldonadodiaz, a 12‑year‑old aspiring explorer, has taken day trips to the historic Brooklyn Bridge and the Smithsonian National Air and Space Museum in Washington, D.C., dreams of visiting
    the vibrant streets of Barcelona to see Gaudí’s architecture, and they prefer backpack‑style planning that leaves room for spontaneous detours.
  culinary: Andy Maldonadodiaz, a 12‑year‑old junior kitchen assistant, loves collaborating with their mother to simmer a fragrant sofrito base for a hearty rice and bean stew, perfects homemade empanadas
    filled with seasoned ground meat, and they enjoy crafting chocolate chip pancakes on weekend mornings.
  core: Andy Maldonadodiaz, a curious yet procrastination‑prone 12‑year‑old, balances an inventive spark in Minecraft, comics, and cooking with frequent worries about deadlines, finances, and health, navigating
    the world through small‑group collaborations and spontaneous creativity.
background:
  cultural: Andy grew up in a close‑knit Puerto Rican household in Brooklyn’s Kings County. His family maintains strong ties to their heritage, celebrating holidays such as Three Kings Day and participating
    in community events featuring bomba, plena, and salsa music. At home, Spanish is spoken alongside English, and traditional foods like arroz con gandules and pasteles are common. The multicultural neighborhood
    exposes him to other Latino cultures and a diverse urban environment, shaping his identity as a bilingual, bicultural young person who values family, community, and the blend of Puerto Rican traditions
    with New York City life.
