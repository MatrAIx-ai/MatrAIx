  hobbies: '[''Hiking and trail exploration'', ''Landscape photography'', ''Watercolor painting'', ''Art gallery visits'', ''Reading science-fiction and environmental literature'', ''Book club participation'',
    ''Yoga and meditation'', ''Crossword puzzles'', ''Board games (strategic)'', ''Volunteer citizen science'', ''Cooking Mediterranean cuisine'']'
  career_goals: Although retired, Grace aims to author a richly illustrated book that weaves her scientific insights on Moab’s geology with her photography, to establish a scholarship for under-represented
    high-school students pursuing STEM, to expand her volunteer work with local art museums and environmental groups, and to develop a mindfulness-based workshop for seniors that addresses anxiety and emotional
    well-being. She also hopes to collaborate with the nearby Native American community on projects that preserve and celebrate their cultural heritage.
