  career_goals: Juliana aims to transition from a front‑line cashier role to a supervisory position within the next three years, intending to enroll in a part‑time retail management certificate program
    at a community college in Dallas. She is motivated to leverage her compassion and organizational strengths to mentor new employees and improve store-wide customer satisfaction. In the longer term, she
    envisions opening a small neighborhood market that highlights Mexican‑Texan food products, combining her cultural heritage with her practical business sense. She also hopes to volunteer her time as
    a financial literacy tutor at the local community center, helping other residents manage their household budgets.
