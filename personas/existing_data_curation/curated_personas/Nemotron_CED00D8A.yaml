personas:
  professional: Juliana Rodriguez is a bilingual retail cashier in Waxahachie who leverages flawless cash handling, POS mastery and natural compassion to turn busy checkout lines into moments of personal
    connection, while they thrive on flexible schedules despite occasional disorganization.
  sports: Juliana Rodriguez is a devoted Dallas Cowboys fan who never misses a Sunday game, follows the Dallas Mavericks during basketball season, and they play pickup softball on weekends with the Waxahachie
    Community Recreational Softball League, using those sessions as their primary cardio workout.
  arts: Juliana Rodriguez's artistic palate mixes the vibrant brass of mariachi group Los Tres Reyes with the catchy beats of Latin pop star Karol G, and they often revisit classic films starring Gael Garcia
    Bernal during quiet evenings, finding both music and cinema essential to their cultural expression.
  travel: Juliana Rodriguez prefers spur-of-the-moment weekend getaways, often road-tripping to Austin's live music venues or the Hill Country's lavender fields in Fredericksburg, while a long-held dream
    is to wander the food markets of Oaxaca, a trip they hope to fund once their neighborhood market is up and running.
  culinary: Juliana Rodriguez excels at crafting family-style fusion meals, blending traditional tamales and pozole with Texan smoky chipotle and brisket infusions, while their herb garden supplies fresh
    cilantro, oregano, and jalapeno for seasoning, and they proudly showcase their culinary experiments at neighborhood potlucks.
  core: Juliana Rodriguez navigates life with a compassionate yet easy-going rhythm, turning grocery aisles into opportunities to connect, spicing up meals with spontaneous herb experiments, and they juggle
    a love for community service with a charming habit of forgetting where they parked their car.
background:
  cultural: Juliana grew up in a Mexican‑American household in Texas, where Spanish and English were spoken interchangeably. Her family maintains strong ties to Mexican traditions, celebrating Día de los
    Muertos, Cinco de Mayo, and a vivid Christmas Posada, while also embracing Texan customs such as county fairs and local high‑school football games. Raised Catholic, she frequently attends community
    mass and values the sense of support that the church provides. Her upbringing instilled a deep appreciation for familismo—the importance of family and community solidarity—which continues to shape her
    compassionate outlook and collaborative nature. As a second‑generation Mexican-American, she navigates both cultures effortlessly, using this bicultural perspective to relate to a wide range of people
    in her personal and professional life.
