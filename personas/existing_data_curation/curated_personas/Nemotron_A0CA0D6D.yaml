  career_goals: Olivia often talks about growing up to help others learn and care for animals. She imagines herself as a teacher who makes lessons fun, a veterinarian who helps pets feel better, or a community
    volunteer who organizes neighborhood clean-ups. She is drawn to careers that let her share knowledge, solve practical problems, and work with people and animals. While still young, she sets small goals
    like mastering her spelling words, improving her soccer skills, and leading a group project in class, seeing these as steps toward her future ambitions.
