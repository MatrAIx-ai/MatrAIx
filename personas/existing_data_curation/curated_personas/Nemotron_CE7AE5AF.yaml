  career_goals: As she approaches retirement, Joanna aims to transition from full‑time store management to part‑time consulting for small businesses seeking operational efficiency. She is passionate about
    mentoring younger managers, especially those from underrepresented backgrounds, and hopes to establish a mentorship program at her former employer. Additionally, she wants to volunteer as a cultural
    coordinator for the local senior center, creating events that celebrate Mexican traditions and foster intergenerational connections. Long‑term, she envisions compiling a family‑style Mexican‑Texan cookbook
    that merges her culinary curiosity with her cultural heritage.
