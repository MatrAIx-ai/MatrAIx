persona_description: A person who is passionate about building meaningful and authentic relationships with others. They believe in the power of generosity and the importance of nurturing and maintaining
  connections. They are zealous in their belief that an exceptional experience in clinical care, the human(e) experience, is achievable through meaningful and authentic relationships with others. They have
  served in executive positions, integrating people with process and purpose, and successfully aligning the ideas of the team with a compelling vision. Their coaching philosophy, The Malcolm Method, is
  rooted in trust and supportive accountability. Through thought-provoking conversations, they strive to deepen the awareness of their physician clients and further their actions, thereby helping them to
  thrive as they lead.
