  career_goals: Although officially retired, Scott aims to remain intellectually and socially active. He aspires to mentor emerging engineers through local maker spaces and university outreach programs,
    while also contributing his art‑appreciation expertise as a volunteer docent at Brooklyn museums. He hopes to author a series of essays exploring the intersection of technology and visual arts, and
    plans to travel to major cultural capitals (Paris, Florence, Tokyo) to deepen his artistic knowledge. Ultimately, Scott wishes to leave a legacy of interdisciplinary curiosity, fostering collaborative
    projects that blend STEM innovation with creative expression.
