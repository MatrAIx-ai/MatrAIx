personas:
  professional: Krizia Scott is a retail cashier turned aspiring arts administrator, leveraging their POS expertise, meticulous inventory tracking, and empathetic customer service to organize pop‑up art
    showcases while completing an Art History degree to secure a role as a gallery assistant.
  sports: Krizia Scott enjoys weekend hikes in Tilden Regional Park, follows the San Francisco Giants and Golden State Warriors loyally, and participates in a local community yoga group that doubles as
    a low‑impact fitness circuit, favoring outdoor activity over team sports.
  arts: Krizia Scott is a devoted art enthusiast who frequents the UC Berkeley Art Museum, draws inspiration from contemporary creators like Yayoi Kusama and Olafur Eliasson, edits digital photographs of
    Bay Area street scenes in Lightroom, and relishes indie film screenings by directors such as Greta Gerwig while discussing them at their local book club.
  travel: Krizia Scott prefers carefully planned short getaways that blend artistic discovery and nature, such as weekend trips to the murals of Wynwood in Miami, a sunrise hike in Yosemite, and a cultural
    immersion week in Mexico City’s vibrant art districts, balancing travel costs with part‑time work constraints.
  culinary: Krizia Scott favors specialty coffee drinks—espresso with oat milk and a dash of cinnamon—paired with avocado toast or a quinoa‑powered bowl, enjoys experimenting with homemade matcha lattes,
    and often selects dishes like ramen or shakshuka when cooking for themselves after a day of gallery research.
  core: Krizia Scott blends meticulous organization with creative curiosity, juggling cashier duties and art projects while habitually curating photo collections, over‑indulging in coffee, and modestly
    procrastinating on their degree paperwork.
background:
  cultural: Krizia grew up in a middle‑class white family in the Bay Area and later moved to Berkeley for college, where she was immersed in the city’s progressive, multicultural environment. Though her
    personal heritage is European‑American, her upbringing has been shaped by the region’s emphasis on inclusivity, social activism, and artistic expression. Living in Berkeley has exposed her to a diverse
    array of cultural perspectives, which she integrates into her appreciation for the arts and community involvement. Her marriage reflects shared values of cooperation, empathy, and a commitment to fostering
    harmonious relationships within both family and broader social circles.
