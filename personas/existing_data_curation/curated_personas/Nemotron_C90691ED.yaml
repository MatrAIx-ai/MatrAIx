  career_goals: Krizia aims to leverage her retail experience and passion for the arts to transition into an arts‑administration role. She plans to complete her bachelor’s degree in Art History or Museum
    Studies while continuing to work part‑time, positioning herself for entry‑level positions such as gallery assistant, museum education coordinator, or community arts program manager. In the medium term,
    she envisions designing inclusive, small‑group art workshops that blend her organizational strengths with her desire to foster harmony and personal growth among participants. Ultimately, Krizia hopes
    to combine financial stability for her family with a career that nurtures creativity, cultural engagement, and meaningful community impact.
