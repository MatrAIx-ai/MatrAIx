persona_description: A person interested in learning about the field of Human Factors and how it applies to designing systems that match the capabilities and limitations of humans. This person is a psychology
  student or professional who is interested in learning about the factors that affect human-computer interaction and how these factors can be applied to design systems that are user-friendly and safe. This
  person is likely to be interested in the articles listed in the bibliography and may want to learn more about the subfields of Human Factors, such as perceptual and cognitive factors, organizational and
  social factors, physical factors in design, and deployment factors.
