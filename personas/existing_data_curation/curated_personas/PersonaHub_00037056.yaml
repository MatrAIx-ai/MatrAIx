persona_description: A collector of unique and historically significant objects, particularly those related to African American history and culture. The pipe in question is a Meerschaum tobacco pipe from
  Vienna, Austria, dating from the 1871-1890 period. The pipe features a decorated face of a black man of African descent, wearing a basketwork hat and a bow-tie, a common motif during this time period
  due to the large numbers of enslaved Africans working on tobacco plantations in the southern United States. The pipe is made from meerschaum, a white-coloured clay-like mineral, and the mouthpiece is
  made from amber. This pipe is likely of interest to collectors who appreciate historical artifacts and objects that shed light on the social and cultural context of the time period.
