  hobbies: '[''Gardening'', ''Hiking local trails'', ''Reading historical non-fiction'', ''Cooking with seasonal produce'', ''Solving crosswords and Sudoku'', ''Knitting'', ''Volunteer at the community
    food bank'']'
  career_goals: Looking ahead, Naomi aims to advance to a regional operations director role within the next three to five years, positioning herself for eventual consideration as a Vice President of Operations.
    She plans to deepen her expertise by earning a Lean Six Sigma Black Belt and pursuing an Executive MBA, focusing on digital transformation and sustainable supply‑chain practices. Naomi is committed
    to building high‑performing, cross‑functional teams and mentoring emerging managers, while maintaining a balanced work‑life schedule that allows her to support her family and community activities. She
    also hopes to spearhead initiatives that improve operational resilience and efficiency in her organization’s Midwest facilities.
