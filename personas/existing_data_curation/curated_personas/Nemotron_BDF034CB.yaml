personas:
  professional: Daybel Ortiz is a bilingual customer support specialist who leverages strong communication and CRM expertise in Zendesk and Salesforce to streamline ticket resolution, and they channel a
    competitive drive into training new agents while pursuing a supervisory role within three years.
  sports: Daybel Ortiz competes in a local amateur soccer league every Saturday, organizes post‑match gatherings for teammates, avidly follows Houston Dynamo FC, and hikes the nearby Sam Houston National
    Forest on weekends to stay fit.
  arts: Daybel Ortiz immerses themselves in live performances by regional bands such as Los Tigres del Norte and La Mafia, frequently streams Tex‑Mex music, and enjoys streaming action movies while discussing
    plot twists with friends online.
  travel: Daybel Ortiz prefers weekend getaways in the Southwest, having explored Santa Fe’s art districts and the desert trails of Big Bend National Park, and dreams of a future road trip across the Pacific
    Northwest's coastal highways.
  culinary: Daybel Ortiz excels at cooking traditional dishes like mole, tamales, and chiles rellenos, masterfully balances flavors with ingredients such as ancho chilies, corn masa, and fresh cilantro,
    and routinely hosts dinner nights featuring homemade salsa verde and carnitas for friends.
  core: Daybel Ortiz blends a routine‑oriented, competitive mindset with a sociable spirit, juggling soccer, community volunteering, and flavorful home‑cooked meals while meticulously tracking finances
    and health metrics.
background:
  cultural: Daybel is a first‑generation Mexican‑American whose family moved to the Chicago area before his birth. Growing up in a bilingual household, he celebrates Mexican traditions such as Día de los
    Muertos and the Feast of Our Lady of Guadalupe while also embracing Midwestern American customs. His cultural identity influences his strong sense of family, community involvement, and appreciation
    for Mexican cuisine, music, and language, which he integrates into his daily life and social circles in Midlothian, Illinois.
