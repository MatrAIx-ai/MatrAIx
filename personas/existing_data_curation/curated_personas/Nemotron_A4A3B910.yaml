personas:
  professional: Basheer Menard is a seasoned landscape architect who leverages advanced CAD/GIS skills and a deep love for prairie ecology to design low‑maintenance, pollinator‑rich public spaces, while
    meticulously managing multidisciplinary teams to meet tight deadlines and uphold high design standards.
  sports: Basheer Menard enjoys weekend hikes across the Kansas prairie and participates in the Geary County Birdwatchers’ Walk Club, while cheering for the Kansas City Chiefs in the fall and the Kansas
    Jayhawks during March Madness, and occasionally joins a local soft‑ball league for light competition.
  arts: Basheer Menard channels their curiosity for art into watercolor paintings of Kansas sunsets inspired by Monet and O'Keeffe, frequents the Flint Hills Discovery Center’s rotating exhibitions featuring
    modern sculpture, and draws creative inspiration from the regional folk art of John Steuart Curry.
  travel: Basheer Menard prefers road‑trip adventures that blend nature and heritage, having trekked the Tallgrass Prairie National Preserve and taken a seasonal drive to Santa Fe’s historic Plaza, while
    planning future visits to the Badlands for sunrise photography and to a European botanical garden in the Netherlands.
  culinary: Basheer Menard delights in farm‑to‑table cooking, often preparing grilled trout seasoned with rosemary, sautéed wild mushrooms, and roasted corn on the cob, while occasionally indulging in a
    perfectly smoked Kansas City burnt end and a crisp herb‑infused salad featuring home‑grown basil and mint.
  core: Basheer Menard blends disciplined project management with a spontaneous love for watercolor sunsets, a habit of humming while irrigating garden beds, and an occasional tendency to over‑schedule
    their week, creating a uniquely balanced life of precision and creative flow.
background:
  cultural: Basheer grew up in a small Midwestern town in Kansas, raised in a family with deep German‑Scandinavian roots that value community, hard work, and a close connection to the land. The region’s
    agricultural heritage and the open prairie landscape fostered his appreciation for natural beauty and sustainable land use. While identifying as white American, his cultural experiences are shaped by
    the modest, cooperative spirit of rural Kansas, a strong sense of neighborliness, and participation in local church and community events that emphasize harmony and collective well‑being.
attributes:
  skills: '[''Site analysis'', ''Native plant selection'', ''CAD drafting (AutoCAD, SketchUp)'', ''GIS mapping'', ''Stormwater management'', ''Sustainable landscape design'', ''Project management'', ''Budget
    estimation'', ''Client liaison'', ''Construction documentation'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Watercolor painting'', ''Hiking'', ''Visiting art galleries'', ''Historical preservation volunteering'', ''Reading horticulture and folk art literature'']'
  career_goals: Basheer aims to expand his practice into a boutique firm that specializes in community‑focused, ecologically responsible public spaces across Geary County and neighboring regions. He aspires
    to obtain LEED‑ND certification for his projects, mentor emerging designers through apprenticeships, and eventually author a guidebook on prairie‑based landscaping that showcases the integration of
    art and ecology. In the longer term, he hopes to spearhead a signature demonstration garden in Chapman that serves both educational and recreational purposes for the local community.
