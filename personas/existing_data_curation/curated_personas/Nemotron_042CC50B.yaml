personas:
  professional: An aspiring community-oriented visual artist, Sara Roper blends charcoal sketches of Dubuque’s riverfront with grassroots event coordination, using their natural empathy to mentor peers
    and envision a future as a museum educator or freelance designer for nonprofits.
  sports: Sara Roper stays active by cycling the Mississippi River trail during summer, cheering on the Iowa Hawkeyes football team each fall and the Chicago Cubs in spring, and occasionally joining a local
    co‑ed pick‑up basketball game at the community center, preferring fun over competition.
  arts: Sara Roper immerses themselves in the indie folk world of 'Bon Iver', 'The Lumineers', and 'Sufjan Stevens', while drawing inspiration from graphic novels like 'Saga' and the moody urban paintings
    of Edward Hopper, regularly attending Dubuque’s art walks to discover emerging local muralists such as Maya Torres.
  travel: Sara Roper prefers spontaneous weekend getaways, often hopping on a train to Chicago for live music at the Old Town School of Folk Music, dreaming of a summer road trip to Asheville’s Blue Ridge
    Mountains and a future cultural immersion in New Orleans to explore its street art and jazz heritage, all while navigating a teen budget and school schedule.
  culinary: Sara Roper enjoys crafting fresh garden‑to‑table meals like avocado‑toasted ciabatta with goat cheese and heirloom tomato salad, experimenting with homemade pesto using basil from the community
    garden, and indulging in sweet treats such as strawberry shortcake after binge‑watching indie documentaries, though they sometimes neglect to clean the kitchen in the excitement of a new art project.
  core: Sara Roper is a curious, socially‑driven teen who balances a passion for sketching riverfront vistas with occasional disorganization, a tendency to splurge on art supplies, and a habit of turning
    community gardens into creative sanctuaries.
background:
  cultural: Sara grew up in a typical Midwestern white family in Dubuque, Iowa, a city that blends river‑commerce heritage with a strong sense of community. Her ancestry traces back to German and Irish
    immigrants who settled the region in the 19th century, and family gatherings often feature home‑cooked comfort foods and a reverence for seasonal farming cycles. The town’s Catholic school environment
    (though she now attends a public high school) and participation in town festivals like Riverfest have instilled in her an appreciation for communal celebration and modest, neighborly values. The landscape
    of rolling hills, cornfields, and the Mississippi River shapes her artistic sensibility and fuels her curiosity about nature and local history.
