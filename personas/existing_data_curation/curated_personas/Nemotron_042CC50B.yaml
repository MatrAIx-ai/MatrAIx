  hobbies: '["sketching urban and natural scenes","photography of Dubuque’s riverfront","visiting art galleries and museum exhibits","playing acoustic guitar","participating in jam sessions with friends","volunteering
    at a community garden","reading graphic novels and indie literature","light yoga and mindfulness practice","attending local indie music concerts"]'
  career_goals: Looking ahead, Sara dreams of turning her love for art and community into a career that blends creativity with service. She hopes to study visual arts or art education at a liberal‑arts
    college, eventually working as a museum educator, community arts program coordinator, or freelance graphic designer who can collaborate with local nonprofits. She also entertains the idea of becoming
    an art therapist, using her empathetic nature to help peers express emotions through creative media. Flexibility and the ability to keep learning remain central to her professional aspirations.
