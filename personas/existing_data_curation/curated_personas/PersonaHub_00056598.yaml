persona_description: A forester or wood scientist who is knowledgeable about the formation and characteristics of wood, particularly the distinction between sapwood and heartwood, and their role in the
  structure and function of trees. This individual is interested in understanding the processes that lead to the formation of these wood types and how they can be used to identify and classify different
  types of wood. They may also be interested in the discolorations and other factors that can affect the color of wood, and how these factors can be used to distinguish between sapwood and heartwood.
