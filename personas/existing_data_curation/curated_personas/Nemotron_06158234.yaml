  hobbies: '[''Improv and karaoke performances'', ''Hiking and bike rides'', ''Street and nature photography'', ''Cooking and hosting dinner parties'', ''Board-game and trivia nights'', ''Volunteer work
    at a community garden'', ''Attending tech meetups and networking events'', ''Listening to podcasts (tech, psychology, personal development)'', ''Yoga for flexibility and mindfulness'', ''Participating
    in local charity runs'']'
  career_goals: Kevin aims to transition back into the workforce within the next year by securing a role that leverages his people‑centric strengths, such as a community manager or program coordinator for
    a nonprofit or tech startup. He is enrolling in online courses to earn a certificate in Digital Marketing and a short program in Event Management. His longer‑term ambition is to lead a community engagement
    department or launch his own boutique event‑planning business that focuses on inclusive, culturally diverse gatherings in the Bay Area. He also hopes to mentor younger volunteers, expanding his impact
    beyond his own career.
