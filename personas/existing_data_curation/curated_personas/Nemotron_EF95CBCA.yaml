  career_goals: Inspired by her love of art, helping others, and exploring new ideas, Carrie often talks about growing up to be an artist who paints bright murals that make people smile, a teacher who can
    share stories and help friends learn, or a scientist who discovers how the world works. She dreams of a future where she can combine creativity with caring for her community.
