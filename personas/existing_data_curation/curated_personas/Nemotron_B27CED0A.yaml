  hobbies: '[''Gardening (succulents, desert plants)'', ''Reading (mystery and historical fiction)'', ''Quilting'', ''Knitting'', ''Cooking comfort meals'', ''Short desert hikes'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Small book club participation'', ''Visiting local museums and historical sites'']'
  career_goals: Vicki aims to earn an Arizona teaching credential within the next three years so she can transition from a teaching assistant to a certified elementary classroom teacher. She plans to specialize
    in literacy instruction, leveraging her strength in structured, routine‑driven teaching methods. In the longer term she aspires to take on a leadership role such as grade‑level chair or curriculum coordinator,
    where she can design organized instructional programs and mentor new paraprofessionals. To stay competitive, she intends to complete professional development courses in classroom technology integration
    and special‑education support.
