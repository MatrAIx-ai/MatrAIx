personas:
  professional: Vicki Frady, a detail‑oriented teaching assistant at a Tucson elementary school, leverages her meticulous record‑keeping and fluency with Google Classroom, Canvas, and PowerSchool to design
    structured literacy lessons, quietly mentors students and fellow paraprofessionals, and maintains a steady rhythm of routine‑driven classroom management.
  sports: Vicki Frady, an avid desert hiker who joins the Tucson Trail Runners Club for weekend trail walks, roots for the Arizona Diamondbacks during baseball season, and attends a weekly yoga class to
    keep her routine balanced, embraces a modest yet steady fitness regimen.
  arts: Vicki Frady, a quiet enthusiast of southwestern arts, frequently visits the Tucson Museum of Art to admire Georgia O’Keeffe’s paintings, listens to John Denver while quilting, and discusses Agatha
    Christie mysteries with her book club, allowing creative expression to quietly shape her leisure time.
  travel: Vicki Frady, whose travel style relies on detailed itineraries and modest budgets, enjoys weekend road trips to Sedona and the Grand Canyon, dreams of exploring Santa Fe’s historic plaza and Kyoto’s
    serene gardens, and carefully saves for each journey while balancing family commitments.
  culinary: Vicki Frady, a competent home cook, perfects comfort dishes such as chicken tortilla soup with roasted chilies and baked apple crumble, experiments with prickly pear jam and mesquite‑flavored
    BBQ ribs, and meticulously measures ingredients to maintain the consistency she values.
  core: Vicki Frady, a methodical educator who blends desert‑inspired hobbies, frugal finances, and a penchant for quiet routine, occasionally indulges in late‑night crossword marathons and a secret stash
    of chocolate chips.
background:
  cultural: Vicki is a white woman who grew up in Tucson, Arizona, in a middle‑class family with traditional Anglo‑American values and regular church involvement. Living in a region with strong Mexican
    and Native American influences, she developed an appreciation for Southwestern cuisine, outdoor desert activities, and local history, though her household primarily observed customary American holidays
    and customs. She attended a public high school that emphasized community service and civics, and she maintains ties to her neighborhood through her church, local volunteer events, and participation
    in community gardening projects.
attributes:
  skills: '[''Classroom management'', ''Student data management'', ''Educational technology (Google Classroom, Canvas, PowerSchool)'', ''Lesson material preparation'', ''One‑on‑one tutoring (reading and
