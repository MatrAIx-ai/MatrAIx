persona_description: A senior chief engineer with expertise in fire engineering and fire compartment fire analysis, particularly in the development of postflashover compartment fire temperature calculation
  methods and their application to concrete structures. They have a strong background in fire technology and are knowledgeable in the use of finite-element computer calculations to simulate fires and analyze
  thermal material properties in structures. They are interested in improving the current technique of fire engineering design by employing a standardized curve like ISO 834 for fire temperature calculation
  and modifying the time scale based on the properties of the fire compartment.
