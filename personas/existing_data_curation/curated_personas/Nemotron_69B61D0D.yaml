    ''First aid/CPR'']'
  hobbies: '[''Hiking local trails'', ''Landscape photography'', ''DIY home‑improvement projects'', ''Reading construction trade magazines and technical manuals'', ''Bullet journaling and productivity planning'',
    ''Gardening in a small backyard plot'', ''Model building (scale houses)'', ''Playing strategy video games'', ''Learning Finnish language basics'', ''Practicing sustainable living practices'']'
  career_goals: Nicole aims to transition from laborer to foreman within the next three years, leveraging her strong organizational skills and high performance record. She plans to earn an OSHA 30‑hour
    certification, NCCER credentials, and complete an associate degree in construction management at a community college. Her long‑term ambition is to become a certified construction superintendent and
    eventually start her own contracting firm that emphasizes reliable, high‑quality work and sustainable building practices. She is motivated by the desire to be recognized for meeting exacting standards,
    leading teams that outperform expectations, and achieving financial independence after her recent separation.
