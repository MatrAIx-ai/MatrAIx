  career_goals: Approaching retirement, John aims to consolidate his legacy by authoring a textbook on structured curriculum development and mentoring emerging faculty. He aspires to serve as departmental
    chair or lead the college’s accreditation review, ensuring the program’s continued compliance and excellence. Additionally, he wishes to develop a partnership with local industry to create applied learning
    experiences for students, and ultimately transition into an emeritus role that allows occasional lecturing while focusing on community education initiatives.
