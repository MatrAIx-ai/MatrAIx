  career_goals: Looking ahead, Jennifer aims to transition into a mentorship and consultancy role, guiding new nurses and health professionals in delivering holistic, patient‑centered care. She plans to
    complete a gerontological nursing certification and develop community workshops that integrate health education with creative arts, especially for seniors. Jennifer also aspires to contribute to local
    health policy discussions on elder care, author a memoir reflecting on her decades of service, and volunteer as a health consultant for senior centers in Sacramento, ensuring her lasting impact emphasizes
    compassion, lifelong learning, and innovative thinking.
