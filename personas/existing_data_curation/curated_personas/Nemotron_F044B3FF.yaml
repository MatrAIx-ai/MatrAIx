  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Fishing'', ''Community garden volunteer work'', ''Reading DIY and home‑repair manuals'', ''Playing acoustic guitar at local events'']'
  career_goals: John aims to obtain his GED within the next year, followed by a vocational certification in agricultural equipment maintenance or forklift operation. He envisions securing a stable, full‑time
    position with a local farm or a warehouse that values reliability and safety. In the longer term, he hopes to launch a small handyman service focused on home repairs and garden maintenance for his community,
    allowing him to blend his practical skills with his desire to help neighbors. He also aspires to become a mentor for other young adults in Escalon who have taken non‑traditional educational paths, sharing
    his experience of building competence through hands‑on work.
