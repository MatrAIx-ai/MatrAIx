  hobbies: '[''Playing soccer'', ''Tag and other park games'', ''Ballet/Dance class'', ''Arts and crafts (painting, collages)'', ''Building LEGO sets'', ''Reading picture books'', ''Exploring nature (collecting
    leaves and insects)'', ''Educational tablet games'', ''Singing karaoke'']'
  career_goals: Although still young, Ingrid dreams of growing up to be a teacher who can share the excitement of learning with other children, a wildlife explorer who discovers and protects animals in
    the Pacific Northwest, or a veterinarian who cares for pets. In the short term, she aims to improve her reading fluency, learn to write her own short stories, and become a better teammate on her soccer
    team.
