personas:
  professional: Otilio Nazario, a 60‑year‑old seasoned community handyman and aspiring solar‑energy installer, leverages his carpentry, electrical, and marine‑engine expertise while applying his curiosity‑driven
    practicality and competitive spirit to mentor neighbors through organized yet adaptable workshops.
  sports: Otilio Nazario, a 60‑year‑old avid early‑morning fisherman and dedicated member of the Ceiba Fishing Club, keeps fit with daily beach walks, cheers for the Cangrejeros de Santurce baseball team,
    and channels his competitive edge into weekly domino tournaments at the community center.
  arts: Otilio Nazario, a 60‑year‑old lifelong aficionado of salsa, bomba, and plena, fills his portable radio with classics from Celia Cruz, Willie Colón, and Ismael Rivera, and occasionally joins local
    gatherings to play the guiro and dance to the rhythms of the folk group Bomba y Plena del Este.
  travel: Otilio Nazario, a 60‑year‑old who favors low‑key adventures, frequently sails to nearby Culebra for quiet fishing, enjoys weekend trips to San Juan’s historic Old Town, and dreams of exploring
    Costa Rica’s solar farms, always planning travel around a modest budget and a desire to bring sustainable ideas back to his community.
  culinary: Otilio Nazario, a 60‑year‑old accomplished home chef, perfects mofongo with green plantains, garlic, and chicharrón, crafts arroz con gandules using pigeon peas, sofrito, and annatto, and rolls
    pasteles with seasoned pork, all while adjusting salt and fat content to suit health considerations.
  core: Otilio Nazario, a 60‑year‑old, blends fierce curiosity, meticulous organization, and a competitive spirit into a lifelong role as the town’s go‑to handyman, fisherman, and domino champion, all while
    hoarding vintage radios and never missing a community fiesta.
background:
  cultural: Otilio was born and raised in Ceáña, a small coastal town on Puerto Rico’s east coast. His family roots trace back several generations on the island, intertwining Spanish colonial heritage,
    African rhythmic influences, and the indigenous Taino reverence for the land and sea. Growing up in a bilingual household, Spanish is his primary language, though he learned basic English through school
    and community interactions. Catholicism and the town’s strong sense of community shaped his values; he participates in the annual patron saint festivities, parrandas, and neighborhood block parties.
    The local diet, music, and storytelling—especially the art of 'jíbaro' folk songs—are integral to his identity. Ceáña’s fishing and agricultural lifestyle taught him a deep respect for the ocean and
    the land, which he carries forward in his daily practices and in the way he passes traditions to younger generations.
attributes:
  skills: '[''Carpentry'', ''Basic Electrical Work'', ''Minor Plumbing Repairs'', ''Small Engine Maintenance'', ''Horticulture (Fruit Tree Pruning and Organic Gardening)'', ''Traditional Puerto Rican Cooking'',
    ''Fishing Techniques and Fish Preservation'', ''Bilingual Spanish/English Communication'', ''Community Event Planning'', ''Domino Strategy'']'
  hobbies: '[''Early Morning Fishing'', ''Organic Gardening'', ''Traditional Puerto Rican Cooking'', ''Dominoes Playing'', ''Listening to Salsa/Bomba/Música Tradicional'', ''Attending Patron Saint Festivals'',
    ''Beach Walks and Photography'', ''Tinkering with Vintage Radios and Solar Gadgets'', ''Community Volunteering (Home‑Repair Workshops)'', ''Reading About Practical Tech'']'
  career_goals: Although Otilio is not currently employed, his ambition is to stay active and useful within his community. He plans to earn his GED and a vocational certificate in solar‑panel installation
    so he can help neighbors transition to renewable energy, a goal that blends his curiosity about new technology with his practical mindset. He also aims to formalize his role as a mentor, offering hands‑on
    workshops on home repair, gardening, and fishing at the Ceiba community center. Winning a local fishing competition and leading his domino team to the municipal league championship are personal milestones
    that satisfy his competitive drive. Ultimately, he hopes to compile his life’s practical knowledge and recipes into a small booklet that can be shared with future generations, preserving his cultural
    heritage while reinforcing his reputation as a reliable, knowledgeable elder.
