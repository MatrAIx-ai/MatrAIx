  career_goals: Alysia aspires to transition from an unoccupied status to a flexible, home‑based role that leverages her practical curiosity and calm resilience. She envisions launching a small online shop
    selling handmade garden accessories or offering freelance consulting for sustainable gardening and home‑maintenance projects. To enhance credibility, she plans to pursue a certification in horticulture
    or home safety inspection, while maintaining a schedule that honors her love of spontaneity. Additionally, she hopes to become more involved in community resilience initiatives, coordinating local preparedness
    workshops.
