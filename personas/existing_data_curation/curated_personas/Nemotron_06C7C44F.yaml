personas:
  professional: Adam Johns, a middle‑school robotics enthusiast, blends meticulous LEGO building with beginner‑level Python coding to design farm‑inspired automation projects, balancing curiosity with practical
    problem‑solving while navigating occasional anxiety spikes during presentations; they love turning classroom challenges into hands‑on prototypes.
  sports: Adam Johns, a member of the Des Moines Youth Soccer Club and an avid fan of the Iowa Hawkeyes football team, spends Saturday mornings on the soccer field, hikes the Walnut Creek Trail during summer,
    and flies a homemade kite at the state fair, channeling structured teamwork with bursts of spontaneous outdoor play.
  arts: Adam Johns, who sketches cartoons in the margins of sci‑fi graphic novels like "Saga" and streams the music of Imagine Dragons and Billie Eilish while building LEGO, blends visual storytelling with
    contemporary pop culture, using art as a calming outlet for their intense emotions; they often capture moments of anxiety in quick doodles.
  travel: Adam Johns, who loves road trips that combine farm‑state pit‑stops with visits to the Iowa State Fair and weekend excursions to Chicago’s Museum of Science and Industry, prefers itineraries that
    mix hands‑on learning with relaxed downtime, and dreams of one day hiking the geysers of Yellowstone; they enjoy planning trips with family while keeping a notebook of travel ideas.
  culinary: Adam Johns, who enjoys cooking simple dishes such as mac & cheese with a sprinkle of cheddar, homemade apple pie with cinnamon, and LEGO‑shaped chicken nuggets, often experiments with fresh
    corn and strawberries from the family garden, but can be forgetful about cleaning up after snack time, leading to occasional clutter on the kitchen counter.
  core: Adam Johns, a 12‑year‑old tinkerer, balances relentless curiosity and organized LEGO engineering with bouts of anxiety, turning mindfulness journaling into a daily ritual that steadies their inventive
    spirit; they cherish community values while navigating teenage emotions.
background:
  cultural: Adam grew up in a suburban neighborhood of Des Moines, Iowa, in a family with German‑Irish roots that reflects the broader Midwestern cultural mosaic. His upbringing emphasizes community, modesty,
    and a strong work ethic. Family weekends often involve visits to local farms, participation in the Iowa State Fair, and DIY projects like gardening or building a birdhouse. The community’s values of
    practicality and curiosity have encouraged Adam to explore technology while staying grounded in his county’s agricultural heritage. He attends a public middle school where he engages in clubs that blend
    his interests in robotics and environmental stewardship.
attributes:
  skills: '[''Scratch programming'', ''Basic Python'', ''LEGO Technic building'', ''Robotics kit assembly'', ''Project planning'', ''Team collaboration'', ''Creative writing'', ''Public speaking'', ''Emotional
    self‑regulation'']'
  hobbies: '[''LEGO building'', ''Minecraft'', ''Scratch coding'', ''Science‑fiction reading'', ''Soccer'', ''Hiking'', ''Journaling'', ''Drawing cartoons'', ''Mindfulness exercises'', ''Robotics club'']'
  career_goals: Adam imagines a future where he combines his love for technology with his desire to help others manage stress. He hopes to study computer science and robotics in high school and eventually
    become a robotics engineer or a developer of wearable mental‑health devices. In the meantime, he plans to deepen his coding skills, participate in his school’s robotics club, and volunteer as a peer
    mentor to younger students who struggle with anxiety. His long‑term ambition is to create practical tools that make everyday life easier for both farmers in Iowa and his peers dealing with emotional
    challenges.
