persona_description: A Batak priest who specializes in the creation and control of supernatural sculptures and magic potions, often used in rituals to protect communities from harm and to launch attacks
  on enemies and natural disasters. His expertise lies in the manipulation of spirits and souls, and his knowledge of the past includes the use of human sacrifice in the creation of the magic potions. He
  is known for his mastery of the art of sculpture and his ability to imbue them with powerful allies and spirits.
