persona_description: A computer graphics specialist who is knowledgeable about the principles of gamma correction and its application in image processing. This person is proficient in understanding the
  differences between linear and non-linear image representations and the need for gamma correction in order to maintain the integrity of images when converted from real-world scenes to computer graphics.
  This individual is also skilled in using display programs and image formats that support gamma correction and in modifying gamma settings in image viewers and utilities to suit their specific display
  requirements.
