persona_description: A Spanish university professor who specializes in the study of sexuality, particularly in the psychology of sexuality, evolutionary psychology of sexuality, and the sociology of sexuality.
  She has recently started a master's degree program in human sexuality at the Universidad Nacional de Educación a Distancia (UNED) and is involved in planning to incorporate diverse viewpoints on sexuality
  into the Licenciatura programs at various universities. Her research interests include the psychology of sexuality, evolutionary psychology of sexuality, and the sociology of sexuality, and she has published
  several articles and books in these fields. She is also involved in various private institutions, schools, associations, and clinical centers with diverse orientations outside of the university domain,
  offering programs in sexology.
