persona_description: A person who is deeply affected by the legal and ethical issues surrounding inheritance and estate distribution, particularly in cases involving intestate succession and will disinheritance.
  They are knowledgeable about the laws and procedures involved in probate court proceedings and are skilled at navigating the complexities of family law and estate administration. They are likely to have
  a strong interest in the legal rights and responsibilities of heirs and beneficiaries, and are committed to ensuring that all individuals, regardless of their relationship to the decedent, are treated
  fairly and according to the terms of their will or intestacy laws.
