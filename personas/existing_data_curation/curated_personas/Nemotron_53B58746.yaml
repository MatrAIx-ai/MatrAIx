    ''Cooking experimental dishes'']'
  career_goals: She aims to build a professional portfolio of visual artwork and illustrations that will enable her to secure freelance design commissions and eventually transition to a full‑time role as
    an independent illustrator or graphic designer. Bridgett also hopes to enroll in a BFA program or a related degree to deepen her artistic practice, and she is interested in working part‑time at a local
    gallery or community arts center where she can blend her love for art with community engagement. Her long‑term ambition is to create a flexible career that allows her to balance solitary creative work
    with occasional collaborative projects, while maintaining the freedom to explore new ideas and travel.
