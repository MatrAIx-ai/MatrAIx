personas:
  professional: Theresa Larkin combines her practical curiosity and assertive yet cooperative nature to thrive as a school bus driver, expertly handling defensive driving, route optimization, daily vehicle
    inspections, on‑the‑spot mechanical fixes, and mentoring new drivers while maintaining calm during emergencies.
  sports: Theresa Larkin starts her days with early‑morning jogs along the Bayou, trains with the New Orleans Marathon Training Club for longer runs, follows the New Orleans Saints and Pelicans avidly,
    and joins weekend hikes at Jean Lafitte National Historical Park while occasionally playing pick‑up basketball at the local community center.
  arts: Theresa Larkin channels her outgoing spirit into acoustic guitar jam sessions with friends, leads community karaoke nights featuring classics from Beyoncé, the Neville Brothers, and Otis Redding,
    and enriches her evenings with historical nonfiction by Erik Larson and transportation safety podcasts by Rolf Krajewski, weaving music and learning into her identity.
  travel: Theresa Larkin prefers spontaneous weekend road trips, often cruising down the Gulf Coast to the Gulf Islands National Seashore, has explored Austin’s live‑music venues, dreams of wandering Savannah’s
    historic squares, and balances travel on a modest budget by staying with church friends rather than regular hotels.
  culinary: Theresa Larkin is a confident home cook who perfects gumbo with Andouille sausage, shrimp, and okra, whips up jambalaya using a rich roux, and crafts po’boys loaded with fried catfish, always
    sourcing fresh produce from the local farmer’s market and occasionally indulging in a late‑night beignet binge.
  core: Theresa Larkin blends practical curiosity with a love for community, juggling bus routes, guitar chords, and gumbo pots while occasionally misplacing the keys to her own schedule.
background:
  cultural: Theresa grew up in Hammond, Louisiana, a small town in Livingston Parish known for its close‑knit Southern community and blend of Anglo‑American and Cajun traditions. Her family has deep roots
    in the area, with generations who worked in local schools, small businesses, and agriculture. She was raised with an emphasis on hospitality, church involvement, and community festivals such as the
    annual Living Fest. While she identifies as white and grew up in a predominantly Caucasian environment, she embraces the regional flavor of Louisiana—enjoying local music, foods, and the laid‑back yet
    resilient spirit that characterizes the parish’s residents.
