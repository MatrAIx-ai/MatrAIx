  career_goals: Theresa aims to advance within her school district's transportation department. In the next five years she hopes to become a lead driver and mentor new drivers, eventually moving into a
    transportation coordinator role where she can design safer routes and oversee fleet management. She plans to complete her associate degree in logistics and obtain a commercial driver safety certification,
    with a long‑term ambition to advocate for improved student transportation policies at the parish level.
