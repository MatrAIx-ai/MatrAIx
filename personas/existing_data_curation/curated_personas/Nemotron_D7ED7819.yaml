  hobbies: '[''Salsa and Bachata Dancing'', ''Beach Volleyball'', ''Paddle‑boarding'', ''Cooking Mexican and Fusion Cuisine'', ''Tech Blog Reading'', ''Attending Hackathons'', ''Mentoring Teens in STEM'',
    ''Organizing Cultural Festivals'']'
  career_goals: Marilourdes aims to progress from first‑line supervisor to Regional Sales Director within the next five years, overseeing multiple market segments across the Southeast. She plans to deepen
    her expertise in data analytics and digital sales transformation, potentially earning an MBA with a focus on technology management to complement her STEM background. Her long‑term ambition includes
    establishing a mentorship program for women and Latinx professionals in tech sales, fostering a pipeline of diverse talent. She also envisions leveraging her leadership experience to launch a boutique
    consulting firm that helps midsize companies build data‑driven sales operations.
