personas:
  professional: Marilourdes Stone is a bilingual sales leader with a STEM foundation; they leverage data-driven decision-making, CRM analytics, and strategic playbooks to coach high-energy teams while balancing
    curiosity for new tech with pragmatic process optimization.
  sports: Marilourdes Stone dominates weekend beach volleyball matches with the Miami Beach Volleyball Club, paddles sunrise on the ocean, spins salsa and bachata on the dance floor, and roots for the Miami
    Heat, Dolphins, and Panthers; they also occasionally join a local triathlon training group.
  arts: Marilourdes Stone draws creative inspiration from the salsa rhythms of Marc Anthony, the storytelling of Lin-Manuel Miranda, and the vibrant murals of Wynwood; they regularly attend performances
    at the Adrienne Arsht Center and curate playlists for cooking gatherings, blending music and flavor.
  travel: Marilourdes Stone plans trips with a mix of meticulous research and spontaneous weekend getaways; they have explored the historic streets of Cartagena, the beaches of Tulum, and the jazz scene
    of New Orleans, while dreaming of a culinary tour through Tokyo and a cultural immersion in Buenos Aires.
  culinary: Marilourdes Stone experiments in the kitchen, perfecting fusion dishes like chipotle-marinated ahi tacos with mango salsa and miso-glazed pork carnitas; they favor ingredients such as fresh
    cilantro, jalapeño, avocado, and smoked paprika, and often host themed dinner parties to showcase their creations.
  core: Marilourdes Stone is a data-savvy sales strategist who dances through life with salsa steps, beach boards, and a skillet full of inventive recipes; they constantly mentor others while chasing regional
    leadership and an MBA.
background:
  cultural: Marilourdes grew up in a Mexican‑American household where family gatherings, music, and food were central to everyday life. Her parents instilled a strong work ethic and respect for community,
    while also encouraging bilingual proficiency and pride in her heritage. Living in Miami Beach, she blends Mexican traditions—such as celebrating Día de los Muertos and cooking pozole—with the vibrant,
    multicultural fabric of South Florida. This bicultural perspective informs her social ease, her appreciation for diverse viewpoints, and her commitment to giving back to both the Mexican community and
    the broader Miami area.
attributes:
  skills: '[''Leadership'', ''Team Management'', ''Bilingual Communication (Spanish/English)'', ''CRM Proficiency (Salesforce, HubSpot)'', ''Data Analysis (Excel, Power BI)'', ''Strategic Planning'', ''Process
