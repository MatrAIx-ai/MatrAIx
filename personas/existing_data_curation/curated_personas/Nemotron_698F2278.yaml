  career_goals: Carlos aims to progress from a first‑line supervisor to a district manager overseeing multiple stores within the next five years. He seeks to lead initiatives that improve operational efficiency
    and customer satisfaction while developing mentorship programs for emerging leaders. Ultimately, he envisions launching his own retail consulting firm that helps small businesses implement data‑driven
    sales strategies, though he is mindful of the stress such ventures may entail.
