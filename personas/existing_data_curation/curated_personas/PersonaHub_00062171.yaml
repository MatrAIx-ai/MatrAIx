persona_description: A college administrator responsible for managing the College's communicable disease and accident prevention program. This individual is responsible for establishing and implementing
  action plans to manage potential risk factors, ensuring the on-campus response to such risk factors, and working to ensure a healthy and safe environment for the College community. This person is also
  responsible for ensuring compliance with applicable local and state requirements and regulations, and for developing protocols and procedures with the assistance of a team. The role of this person includes
  representing all College components, coordinating with the Emergency Response Team, and involving College staff in the investigation of incidents.
