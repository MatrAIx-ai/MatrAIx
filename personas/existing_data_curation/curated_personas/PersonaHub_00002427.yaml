persona_description: A biologist who specializes in the study of retroviruses, particularly those that have oncogenic properties. She has expertise in the identification and characterization of viral oncogenes
  and their expression in cells. Her research interests include the molecular mechanisms underlying viral transformation and the development of therapeutic strategies against cancer. She has experience
  in the use of recombinant DNA technology to express foreign DNA sequences in E. coli and has published several papers on the identification and characterization of viral oncogenes.
