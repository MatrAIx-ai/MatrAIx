personas:
  professional: Kenny Glenn, a 39‑year‑old mechanical engineer with over 15 years of hands‑on experience in manufacturing and facilities maintenance, translates their love of routine into dependable preventive‑maintenance
    schedules, expertly drafts in SolidWorks and AutoCAD, programs CNC mills, and they lead small crews with a cost‑effective, safety‑first mindset, all while eyeing a senior maintenance management role
    and a CMRP certification.
  sports: Kenny Glenn, a devoted fan of the Tampa Bay Buccaneers and the local high‑school football team, spends weekend afternoons cheering in the bleachers, joins a community fishing club that meets at
    Lake Apopka, and they occasionally play in a recreational softball league, blending predictable community sports rituals with a love for outdoor competition.
  arts: Kenny Glenn, who grew up with classic rock and country on the radio, delights in spinning vinyl records from Lynyrd Skynyrd, Johnny Cash, and John Mellencamp while restoring his Impala, and they
    attend the annual county‑fair art exhibit featuring folk painters, finding creative inspiration in both music and local craftsmanship.
  travel: Kenny Glenn, preferring low‑key road trips over elaborate itineraries, has driven the Florida Turnpike to the Keys for a weekend fishing charter, visited historic St. Augustine for its colonial
    charm, and they keep a list of dream destinations that includes the Gulf Coast islands of the Bahamas, balancing a love of familiar routes with occasional adventurous aspirations.
  culinary: Kenny Glenn, a competent grill master who loves cooking fresh‑caught catfish and pairing it with home‑grown tomatoes and citrus marinades, enjoys making classic shrimp po’boys and homemade biscuits,
    and they experiment with a touch of smoked paprika on their signature BBQ ribs, reflecting a blend of Southern comfort flavors and practical cooking skills.
  core: Kenny Glenn, a 39‑year‑old mechanical engineer who blends a love of routine with hands‑on creativity, lives by the rhythm of early‑morning fishing trips, Impala restorations, and community mentorship,
    while they juggle a laid‑back approach to finances and health.
background:
  cultural: Kenny grew up in Wildwood, Florida, in a working‑class white family with deep roots in central Florida's small‑town culture. His upbringing emphasized self‑reliance, a strong work ethic, and
    community involvement, values reinforced by regular attendance at a Southern Baptist church. He was raised around outdoor traditions such as fishing, hunting, and county fairs, and developed a fondness
    for local sports and regional music. This background fosters his practical outlook, appreciation for routine, and commitment to helping neighbors while maintaining personal independence.
attributes:
  skills: '["SolidWorks CAD", "AutoCAD 2D drafting", "CNC machine operation", "Hydraulic & pneumatic systems maintenance", "Preventive maintenance scheduling", "Troubleshooting & root‑cause analysis", "MIG/TIG
    welding", "Project coordination", "Budget estimation", "Technical documentation"]'
  hobbies: '["Freshwater fishing", "Classic car restoration (1965 Chevrolet Impala)", "Woodworking (furniture, cabinetry)", "Attending local high‑school football games", "Volunteer tool‑skills tutoring",
    "Gardening (vegetables, citrus)", "Listening to classic rock and country music", "DIY home repair projects"]'
  career_goals: Kenny aims to move into a senior maintenance management role within the next three to five years, where he can design and oversee plant‑wide reliability programs. He plans to earn the Certified
    Maintenance & Reliability Professional (CMRP) credential to formalize his expertise. Long‑term, he dreams of opening a small mechanical‑service shop that specializes in custom fabrication and repairs
    for local boat owners, fishermen, and small‑scale farmers, integrating energy‑efficiency upgrades and sustainable practices. Mentoring apprentices and giving back to the community through on‑the‑job
    training are also central to his career aspirations.
