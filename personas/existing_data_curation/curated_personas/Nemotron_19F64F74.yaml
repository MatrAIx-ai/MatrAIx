  hobbies: '[''Travel photography'', ''Cooking international dishes'', ''Hiking'', ''Yoga'', ''Karaoke nights'', ''Trivia contests'', ''Community volunteering'', ''Book club'', ''Softball league'']'
  career_goals: Angela aims to advance to a purser or in‑flight manager role within the next five years, leveraging her experience to lead cabin crews, develop training programs, and enhance passenger experience.
    She plans to complete a degree in aviation management and eventually transition into a corporate safety or training position at the airline's headquarters. Additionally, she hopes to author a guidebook
    on sustainable tourism, sharing her insights from a career that balances curiosity with practicality.
