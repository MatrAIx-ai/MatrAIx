persona_description: A person interested in Buddhist history and rituals, particularly those related to cremation, thathas, and the commemoration of deceased individuals. This person may be a Buddhist monk,
  nun, or layperson who has studied or participated in Buddhist ceremonies and rituals. They may be interested in learning more about the history and significance of these practices, as well as the cultural
  and religious significance of cremation and thathas in Thai society. They may also be interested in learning more about the history of the Thai cremation volume published in 1917.
