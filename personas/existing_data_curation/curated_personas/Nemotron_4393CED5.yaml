personas:
  professional: Sentrell Jackson, a three‑year‑old budding architect of block castles, channels a natural knack for organization and methodical planning into building elaborate LEGO structures, showing
    early signs of spatial reasoning, meticulous sequencing, and a love for systematic creativity.
  sports: Sentrell Jackson enjoys weekly toddler gymnastics at the community center and splash‑down swim lessons, while cheering for the local minor league baseball team, the River City Tigers, and occasionally
    practicing kicking a soft soccer ball with the 'Little Kickers' club that meets on Saturday mornings.
  arts: Sentrell Jackson delights in finger‑painting bright abstract shapes, claps along to the catchy tunes of The Wiggles and Disney’s 'Frozen' soundtrack, and watches Pixar shorts featuring characters
    like Wall‑E, which fuels their curiosity for storytelling and color.
  travel: Sentrell Jackson has already visited Orlando’s Magic Kingdom on a family road trip, built sandcastles on a weekend getaway to Cape Cod, and dreams of seeing the towering giraffes at a zoo in Nairobi,
    though they prefer traveling by car with a favorite stuffed rabbit in the back seat.
  culinary: Sentrell Jackson favors cheesy macaroni, crunchy chicken nuggets with honey mustard, and the classic peanut‑butter‑and‑jelly sandwich, proudly scooping the spread with a plastic spoon and insisting
    on a side of apple slices, while occasionally sneaking bites of the family’s homemade banana bread when no one’s watching.
  core: Sentrell Jackson, a three‑year‑old explorer with a penchant for building meticulous block towers, saving every glittery coin in a piggy bank, and humming Disney melodies while cautiously navigating
    the world in a quiet, inquisitive stride.
background:
  cultural: Sentrell is raised in a Black family in Arlington Heights, Illinois, where his parents blend Midwestern suburban life with rich African‑American traditions. Family gatherings often feature soulful
    gospel music, storytelling about ancestors, and meals that include Southern comfort foods. He attends a local preschool that celebrates cultural diversity, and on holidays such as Kwanzaa and Juneteenth,
    he experiences community events that teach pride in Black heritage. The proximity to Chicago’s vibrant Black cultural institutions, like the DuSable Museum, sometimes shapes his exposure to art and
    history, reinforcing a sense of belonging and curiosity about his cultural roots.
attributes:
  skills: '["crayon drawing and coloring", "block stacking", "color and shape naming", "simple puzzle solving", "following daily routines", "cooperative play"]'
