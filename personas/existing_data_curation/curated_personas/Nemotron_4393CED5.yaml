  career_goals: Although only three, Sentrell already talks about wanting to read books on his own, draw pictures like the ones he sees, and help his parents with small chores. He expresses a budding dream
    of becoming a teacher or a scientist who discovers how things work, and later imagines helping his community as a firefighter or a caregiver. His curiosity and love for art guide his ambition to keep
    learning, explore new ideas, and share what he discovers with others.
