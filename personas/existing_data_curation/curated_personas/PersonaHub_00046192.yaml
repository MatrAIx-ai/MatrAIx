persona_description: A sustainability consultant who is focused on the adoption of plant-based burgers as a sustainable alternative to beef in the United States and globally. They have extensive knowledge
  and experience in the field of sustainability, including the impact of livestock production on the environment, and the potential benefits of transitioning to plant-based diets. They are well-versed in
  the use of plant-based burgers as a sustainable alternative to beef and have conducted research on the potential benefits of the PBB in reducing GHG emissions, mitigating the impacts of reactive nitrogen
  runoff, and reducing the stress on the planet's bio-geochemical cycles. They have also considered the role of the human factor in the adoption of the PBB, including the difficulty of changing diets and
  the potential for importing countries to source ground beef from more impactful locales.
