personas:
  professional: Delores Yamada, a high school senior in Aurora, combines meticulous planning with visual storytelling, leveraging proficiency in Adobe Photoshop, Procreate, and HTML/CSS to craft compelling
    digital mockups while they channel their competitive debate mindset into persuasive design pitches.
  sports: Delores Yamada enjoys joining the Aurora high school cross-country team in the fall, shoots free-throws at the community basketball league in winter, and follows the St. Louis Cardinals and Kansas
    City Chiefs religiously, though they prefer solitary evening runs over organized club sports.
  arts: Delores Yamada immerses herself in both classic and avant-garde art, drawing inspiration from Frida Kahlo, Banksy, and the cinematography of Wes Anderson, while they regularly volunteer at the county
    fair's art booth and attend live performances by local theater troupe The Aurora Players.
  travel: Delores Yamada favors meticulously planned road trips that blend scenic drives through Missouri's Ozarks with cultural stops in St. Louis and Chicago, yet they dream of backpacking through Paris
    and Kyoto, balancing limited college-fund budgets with an appetite for both urban museums and quiet countryside retreats.
  culinary: Delores Yamada, a self-taught home cook, loves experimenting with fresh basil pesto on hand-made gnocchi and perfecting a smoky Texas-style brisket at family gatherings, while they also indulge
    in the local fried chicken sandwich from Auntie's Diner, showcasing a palate that balances comfort food with artisanal experimentation.
  core: Delores Yamada's unique blend of disciplined organization, relentless curiosity, and a habit of over-analyzing every color palette makes them the teen who can draft a UI prototype at midnight while
    simultaneously debating the philosophical implications of digital minimalism.
background:
  cultural: Delores grew up in Aurora, a small town in Stone County, Missouri, embedded in a close‑knit Midwestern community that emphasizes self‑reliance, practical problem‑solving, and community involvement.
    Her family is of white American heritage, with cultural roots tracing back to German and Irish ancestors who settled in the region during the late 19th century. The local culture includes annual county
    fairs, high school sports events, and community theater productions, all of which have shaped her appreciation for both traditional and contemporary forms of expression. While Aurora offers limited
    access to large metropolitan art scenes, the regional emphasis on DIY creativity and support for local artists has encouraged Delores to pursue her own artistic projects and seek out broader artistic
    experiences online and during occasional trips to nearby cities.
