  career_goals: Delores aspires to attend a four‑year university where she can major in Visual Communication Design or a related field such as User Experience (UX) Design. She envisions combining her artistic
    talents with her analytical strengths to create intuitive, aesthetically compelling digital products. In the long term, she aims to work as a UI/UX designer or creative director for a tech‑forward company,
    eventually leading cross‑functional teams that develop innovative design solutions. She also keeps a secondary ambition of curating contemporary art exhibitions, seeing it as a way to merge her love
    of art with her organizational expertise.
