personas:
  professional: Helen Sellers, a 43‑year‑old seasoned management analyst with fifteen years of experience, leverages advanced quantitative analysis, predictive dashboard creation in PowerBI and Tableau,
    and Lean Six Sigma process improvement to deliver data‑driven strategic recommendations, all while applying her methodical planning and upbeat, collaborative style to keep cross‑functional teams on
    track.
  sports: Helen Sellers, at 43, fuels her love of the outdoors by hiking the Ice Age Trail around Lake Mendota, kayaking in summer, and playing third base for the Madison Community Softball League, while
    cheering on the Milwaukee Brewers and the Green Bay Packers on game days.
  arts: Helen Sellers, a 43‑year‑old, immerses herself in the arts by helping stage‑manage productions at the local Madison Stage Co., discussing contemporary non‑fiction titles like 'The Age of Surveillance
    Capitalism' in her book club, and curating playlists that blend Sufjan Stevens’ indie folk with classic Broadway numbers from 'Hamilton' for post‑rehearsal wind‑downs.
  travel: Helen Sellers, at 43, prefers weekend escapes that blend historic charm with outdoor adventure, having already toured the historic streets of Madison’s Capitol Square, taken a road trip to Door
    County’s lighthouses, and planning a future pilgrimage to Boston’s Freedom Trail and a spring hike in the Great Smoky Mountains.
  culinary: Helen Sellers, a 43‑year‑old, delights in farm‑to‑table cooking, mastering dishes such as roasted root vegetable medley with locally sourced cheese curds, grilled trout with lemon‑dill butter,
    and a weekly sourdough starter she tends while swapping recipes at Madison’s farmers’ market, yet she occasionally forgets to defrost meat, leading to last‑minute microwave dinners.
  core: Helen Sellers, at 43, is a data‑driven strategist who balances meticulous planning with a contagious zest for community, often swapping spreadsheets for kayak paddles, while guarding a guilty pleasure
    for late‑night snack runs after marathon coding sessions.
background:
  cultural: Helen grew up in a middle-class, white Midwestern family with deep roots in the German-Scandinavian immigrant communities that shaped Wisconsin's cultural fabric. The region's emphasis on hard
    work, community involvement, and modesty influenced her organized and reliable nature. Living in Madison, a progressive university town, has reinforced values of education, civic participation, and
    environmental stewardship. She embraces traditional Midwestern hospitality—friendly, inclusive, and collaborative—while also appreciating diverse perspectives through her professional network and the
    city's vibrant cultural scene.
