persona_description: A medical doctor who specializes in training and educating rural Ethiopian farmers in permaculture techniques. She is skilled in both English and Oromifa, the local language, and has
  a good sense of humour to match. She is able to translate scientific concepts into understandable language for the trainees and is able to challenge their self-perception about the value of their work
  and the need for improvement. She is aware of the issues of aid and the need for sustainable development, and is able to address them in a practical and effective way.
