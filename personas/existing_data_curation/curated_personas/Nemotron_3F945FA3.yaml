  skills: '[''Data analysis'', ''Statistical modeling'', ''Python programming'', ''Technical writing'', ''Mentoring'', ''DIY home improvement'', ''Gardening'', ''Problem solving'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Southern cooking'', ''Reading science fiction'', ''Playing bridge'', ''Volunteering as a tutor'', ''Woodworking'']'
  career_goals: Though retired, Bessie aims to leave a lasting impact by establishing a community STEM mentorship program for middle‑school students in Mobile, authoring a memoir that intertwines her scientific
    career with Southern life, and contributing articles to local science outreach newsletters. She also hopes to complete a series of woodworking projects that showcase sustainable design, merging her
    engineering knowledge with creative craftsmanship.
