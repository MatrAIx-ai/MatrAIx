personas:
  professional: Bessie Ennis, a retired applied mathematician and engineer, channels their curiosity‑driven analytical mind and hands‑on practicality into mentoring middle‑school students, authoring clear‑cut
    technical articles, and crafting data‑rich community STEM programs, all while embracing a flexible, sometimes disorganized schedule and a healthy dose of competitive spiritedness.
  sports: Bessie Ennis enjoys low‑impact fitness through daily garden walks, weekly senior bridge tournaments that double as mental aerobics, and cheering for the New Orleans Saints while occasionally joining
    a local walking club that meets at the Mobile Bay shoreline for sunrise laps, reflecting a relaxed yet competitive spirit.
  arts: Bessie Ennis finds creative solace reading classic sci‑fi from Asimov and Le Guin, listening to blues legends like B.B. King while knitting, and crafting rustic birdhouses inspired by folk artist
    Mary Meigs, all of which shape their identity and provide a quiet counterpoint to their analytical career.
  travel: Bessie Ennis prefers spontaneous road trips to nearby Gulf Coast gems such as Gulf Shores and the historic district of Natchez, occasionally dreaming of a leisurely train journey through the Scottish
    Highlands, but their travel plans remain loosely organized, balancing senior discounts with a desire for relaxed, nature‑focused escapes.
  culinary: Bessie Ennis delights in turning garden harvests into Southern comfort dishes like fresh tomato‑basil gazpacho, shrimp and grits with locally sourced shrimp, and sweet potato biscuits, seasoning
    with thyme, cayenne, and a dash of smoked paprika, while modestly experimenting with homemade pickles and artisanal preserves.
  core: Bessie Ennis blends a curious, competitive mind with a laid‑back, sometimes disorganized lifestyle, tending a thriving garden, mentoring youth, building birdhouses, and savoring Southern flavors,
    all while maintaining a skeptical eye on new trends and a resilient spirit in the face of age‑related challenges.
background:
  cultural: Bessie grew up in a middle‑class white Southern family in Mobile, steeped in the region’s traditions of hospitality, church involvement, and community festivals like Mardi Gras. Her upbringing
    emphasized respect for heritage while encouraging academic achievement, leading her to pursue a graduate degree in a STEM field—a rarity for women of her generation. Today, she blends Southern values
    of family, storytelling, and neighborly service with her lifelong love of science, reflecting both the cultural richness of Mobile and the progressive spirit that guided her career.
