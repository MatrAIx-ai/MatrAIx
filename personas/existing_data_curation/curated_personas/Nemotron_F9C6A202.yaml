  hobbies: '[''Church attendance and choir'', ''Bingo and card game nights (bridge, rummy)'', ''Community gardening'', ''Cooking soul food and Southern recipes'', ''Listening to gospel and blues music'',
    ''Watching college football'', ''Volunteer community clean‑up projects'', ''Storytelling and oral history sessions'']'
  career_goals: Although retired, Richard aims to deepen his involvement in community service. He plans to take on a leadership role at the local senior center and church, expanding volunteer programs for
    seniors. He aspires to mentor youth in apprenticeship programs focused on skilled trades, sharing his practical knowledge. Richard also wishes to contribute to preserving local African‑American history
    by recording oral histories and assisting the regional historical society. He hopes to launch an intergenerational community garden project that blends his love of routine gardening with social interaction.
    Maintaining his health and independence remains a personal priority, and he is open to occasional advisory roles for nonprofit organizations that align with his values.
