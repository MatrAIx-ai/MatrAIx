  hobbies: '[''Salsa and bomba dancing'', ''Traditional Puerto Rican cooking'', ''Gardening tropical fruits and herbs'', ''Walking groups in local parks'', ''Volunteering to teach DIY home-repair workshops'',
    ''Listening to plena and salsa music'', ''Reading home-improvement magazines'', ''Participating in parish Mass and choir'']'
  career_goals: Although retired from full-time employment, Sulaine aims to cement her legacy by formalizing a preventive-maintenance handbook for multi-unit housing in Bayamón, which she hopes the municipal
    housing authority will adopt. She seeks municipal recognition—such as the Outstanding Service Award—for her decades of reliable work. Mentorship remains a priority; she plans to guide at least five
    younger maintenance professionals, with a focus on encouraging women in trades. Additionally, she wishes to expand her community outreach by leading a series of free home-repair workshops at the local
    senior center, empowering fellow elders to safely manage minor repairs. If opportunities arise, she would consider completing a certification in HVAC systems to validate her expertise officially before
    transitioning to a part-time consulting role for neighborhood associations.
