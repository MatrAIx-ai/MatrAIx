personas:
  professional: Cameron Mazzawi, a seasoned groundskeeper turned aspiring sustainable landscaping entrepreneur, leverages hands‑on expertise in low‑maintenance design, irrigation troubleshooting, integrated
    pest management, and heavy‑duty equipment operation while navigating a natural tendency toward flexible planning and occasional disorganization with a compassionate, client‑focused approach.
  sports: Cameron Mazzawi, an avid trail‑hiker and occasional pick‑up soccer player, is a devoted fan of the Denver Broncos, Colorado Rockies, and Denver Nuggets, and belongs to the Colorado Mountain Club’s
    Aurora Chapter, where they organize seasonal group hikes and weekend trail runs.
  arts: Cameron Mazzawi, who relaxes by playing acoustic guitar and photographing native wildflowers, admires the folk sounds of John Denver and the atmospheric photography of Ansel Adams, and regularly
    attends performances at the Aurora Playhouse featuring local actors like Sarah Henley.
  travel: Cameron Mazzawi, an adventure‑seeking yet budget‑conscious traveler, prefers weekend road trips to nearby destinations such as Rocky Mountain National Park, the historic streets of Santa Fe, and
    the lavender fields of Grand Junction, while dreaming of a future cultural pilgrimage to Jordan’s ancient sites.
  culinary: Cameron Mazzawi, a modest home chef with a green thumb, delights in crafting heirloom tomato salads with feta and basil, preparing mezze platters of hummus, tabbouleh, and freshly baked flatbread,
    and savoring strong Arabic coffee alongside Colorado craft beers during quiet evenings.
  core: Cameron Mazzawi blends a pragmatic, nature‑focused career with a compassionate heart, juggling flexible planning, occasional financial laxity, and a lingering worry that fuels both meticulous garden
    experiments and a relentless drive to give back to the community.
background:
  cultural: Cameron was raised in Aurora, Colorado, in a household that blends mainstream Midwestern American culture with traditions from his family’s Lebanese heritage. While his outward appearance is
    typically identified as white, his parents emigrated from Lebanon in the 1980s, bringing a respect for family cohesion, hospitality, and a love of fresh, home‑grown food. Growing up in a diverse, working‑class
    neighborhood, Cameron adopted the values of hard work and self‑reliance common to the region, while also celebrating occasional cultural gatherings with extended family, such as shared meals featuring
    mezze and Arabic coffee. This mixed cultural backdrop contributes to his compassionate nature and his desire to support community initiatives.
attributes:
  skills: '[''Landscape design'', ''Plant selection and identification'', ''Irrigation system installation and troubleshooting'', ''Heavy equipment operation and maintenance'', ''Soil testing and amendment'',
