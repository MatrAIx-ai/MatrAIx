  career_goals: George often talks about becoming a firefighter because he likes the idea of helping and protecting others, enjoys structured teamwork, and appreciates the clear routines of the job. He
    also mentions wanting to be a teacher one day, inspired by his love for helping friends learn new things and his appreciation for organized classroom environments.
