personas:
  professional: George Garlington is a budding builder who turns every LEGO set into a structured project, carefully following step‑by‑step instructions and arranging the bricks in a methodical grid, while
    also helping classmates in the after‑school art class by sharing supplies and keeping the workspace tidy.
  sports: George Garlington loves riding their blue bike around the neighborhood on Saturday mornings, cheers for the local youth soccer team the Meadowbrook Tigers, and occasionally joins the community
    swimming club for free‑swim sessions, preferring structured play over spontaneous games.
  arts: George Garlington expresses creativity through drawing simple pictures of dinosaurs and space rockets in the after‑school art class, adored by peers for their organized color palettes, and dances
    to the rhythmic beats of Kidz Bop songs while humming tunes from classic cartoons like Mickey Mouse and Sesame Street.
  travel: George Garlington enjoys family road trips to the nearby state park’s nature trail, dreams of seeing the giant pandas at the Chengdu Research Base in China, and keeps a scrapbook of stickers from
    each destination, preferring trips with a clear itinerary and scheduled playtime.
  culinary: George Garlington likes snacking on bite‑size carrot sticks from the backyard garden, makes a perfect peanut‑butter‑and‑jelly sandwich with the help of Mom, and treats pizza with extra cheese
    as a celebratory meal after completing a LEGO masterpiece.
  core: George Garlington is a methodical six‑year‑old who blends a love for LEGO engineering with routine‑driven garden chores, a sprinkle of cartoon‑inspired dance moves, and an earnest quest to save
    allowance for the next big build, all while occasionally forgetting to take their allergy meds during play.
background:
  cultural: George comes from an African‑American family with deep roots in California history, tracing back to grandparents who settled in the state during the 1970s. His parents emphasize cultural pride,
    community involvement, and education. At home they celebrate traditions such as Kwanzaa and Juneteenth, share stories of family heritage, and enjoy a mix of gospel, R&B, and contemporary music. He participates
    in a local church Sunday school where he learns about his cultural legacy and engages in community service. Growing up in Burbank, within the diverse tapestry of Los Angeles County, George interacts
    with peers from many backgrounds, which broadens his perspective while his family maintains core values of respect, humility, and collective well‑being.
