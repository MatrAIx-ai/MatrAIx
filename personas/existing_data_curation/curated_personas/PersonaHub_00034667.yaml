persona_description: A government official or economist who is responsible for managing the food and agriculture sector during the COVID-19 pandemic. They must balance the health crisis, economic shock,
  and the functioning of the food system while accelerating transformations to build resilience against future challenges, including climate change. They need to have a deep understanding of the sector's
  supply chain, demand, and policy responses to ensure that the food supply remains secure and accessible to consumers. They must also be able to communicate complex issues and policy responses to stakeholders
  in the food and agriculture sector.
