persona_description: A scientist or environmental scientist who is interested in the fate and behaviour of persistent organic pollutants (POPs) in the Arctic environment, specifically focusing on the legacy
  organochlorine pesticides like endosulfan. They are likely to be knowledgeable about the physical-chemical properties, environmental partitioning, degradation, and distribution of endosulfan in temperate
  and Arctic environments. They would also be interested in the effects of endosulfan on Arctic biota, including biomagnification factors and trophic magnification, and the long-range transport of endosulfan
  to remote locations. They would be interested in the assessment of endosulfan's persistence and toxicity, and the impact of ongoing use of endosulfan pesticides on the Arctic environment.
