  career_goals: Lisa imagines a future where she can work in a structured, people‑focused environment. She is drawn to becoming a teacher or a school librarian because both roles allow her to organize information,
    create predictable routines, and support others' learning. She also expresses interest in pediatric nursing, seeing it as a way to care for children in a calm and orderly setting.
