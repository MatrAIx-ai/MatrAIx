personas:
  professional: Lisa Rivera is a budding young engineer who channels her love for methodical problem‑solving into building intricate LEGO structures and completing jigsaw puzzles, and they often imagine
    designing bridges for their school’s science fair, approaching each project with a meticulous, step‑by‑step plan.
  sports: Lisa Rivera plays on the Riverfront Ravens youth soccer team, practices gymnastics at the neighborhood community center, and they cheer for professional teams like the Seattle Seahawks and the
    Portland Trail Blazers while also enjoying weekend nature hikes in local parks.
  arts: Lisa Rivera loves reading the 'Percy Jackson' adventure series by Rick Riordan, drawing scenes inspired by Disney’s 'Moana' and 'Frozen' while listening to their soundtracks, and they often reenact
    favorite moments from Pixar’s animated films during playtime.
  travel: Lisa Rivera enjoys weekend trips to the nearby Willow Creek Nature Preserve for leaf collecting, has visited Washington, D.C.’s Smithsonian museums with her family, and dreams of exploring the
    Grand Canyon and Disneyland in California someday.
  culinary: Lisa Rivera favors comforting meals like creamy macaroni and cheese, peanut‑butter‑and‑jelly sandwiches, and bright fruit salads with strawberries, blueberries, and melon, and they love helping
    in the kitchen by sprinkling shredded cheese on homemade pizza and attempting to bake chocolate‑chip cookies with enthusiastic, if sometimes messy, effort.
  core: Lisa Rivera blends meticulous curiosity with a gentle heart, turning puzzles and nature walks into a calm yet sometimes anxious quest for order, and they often seek comfort in structured routines.
background:
  cultural: Lisa lives in Weston, a suburban town in Middlesex County, Massachusetts, and is part of a typical white New England middle‑class family. Her upbringing includes celebrating American holidays
    such as Thanksgiving, Christmas, and the Fourth of July, and participating in community events like town festivals and school activities. She attends a public elementary school that emphasizes academic
    achievement, civic responsibility, and extracurricular involvement. Family values emphasize punctuality, organization, and community service, reflecting the broader cultural norms of suburban Massachusetts.
attributes:
