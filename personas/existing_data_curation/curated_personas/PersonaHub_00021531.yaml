persona_description: A technical expert and radiation scientist who specializes in the analysis and estimation of radiation exposure to individuals in nuclear energy and radiation facilities. They are responsible
  for developing technical basis documents for Atomic Weapons Employers (AWE) facilities, which are defined as entities that processed or produced material for use in atomic weapons, excluding uranium mining
  and milling. The documents are used to estimate dose to individual claimants in the Energy Employees Occupational Illness Compensation Program (EEOICP) claims process. The persona has expertise in radiation
  exposure assessment, dose-response modeling, employee exposure assessment, and work environment analysis. They are highly skilled in reconstructing exposure conditions and generating technical basis documents
  for AWE facilities, which require extensive data reconstruction and analysis.
