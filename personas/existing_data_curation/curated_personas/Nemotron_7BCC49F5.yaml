  career_goals: Alexander aims to transition into a technical leadership role, first as a lead developer and eventually as a chief technology officer of a boutique studio that merges technology with art—such
    as immersive AR/VR experiences or platforms for independent creators. He wants to spearhead interdisciplinary teams that blend software engineering, interactive design, and storytelling. Over the next
    five years, he plans to earn advanced cloud certifications, contribute to open‑source creative‑coding libraries, and become a regular speaker at tech‑art conferences. Long‑term, he envisions launching
    his own venture that empowers artists with intuitive, code‑driven tools while fostering a supportive community of makers.
