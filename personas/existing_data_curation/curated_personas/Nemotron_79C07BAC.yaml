  career_goals: Henry aims to advance from his current analyst role to become a senior systems architect and eventually lead a multidisciplinary technology team within a forward‑thinking organization. He
    is motivated to spearhead large‑scale cloud migration initiatives, drive operational efficiencies, and foster a culture of innovative problem solving. Over the next five years, he plans to obtain advanced
    certifications (e.g., AWS Solutions Architect Professional, TOGAF) and to mentor junior engineers, while keeping the option open to launch his own consultancy focused on flexible, client‑centric digital
    transformation services.
