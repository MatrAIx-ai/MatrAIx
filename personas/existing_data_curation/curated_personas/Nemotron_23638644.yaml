personas:
  professional: Mirna Vanegas, a retired household manager who now coordinates weekly nutrition workshops at the local senior center, blends meticulous budgeting skills, organized planning, and a love for
    traditional family meals into her volunteer role, ensuring each session runs on schedule and features recipes that honor long‑standing communal rituals.
  sports: Mirna Vanegas enjoys low‑impact fitness, joining a senior walking club that explores the desert trails near Palmdale each weekend, cheering quietly for the Los Angeles Dodgers on game days and
    favoring seasonal activities like spring bird‑watching hikes over high‑intensity sports.
  arts: Mirna Vanegas finds artistic solace in classic bolero recordings by Luis Miguel and Pedro Infante, occasional local mariachi ensemble concerts, and decorating her knitting projects with motifs inspired
    by Frida Kahlo prints that echo the vibrant storytelling of her family’s visual traditions.
  travel: Mirna Vanegas prefers thoughtfully planned, low‑stress trips, often visiting nearby historic towns like Santa Fe for their adobe architecture, taking leisurely drives along the Pacific Coast Highway
    to stop at seaside cafés, and dreaming of a family pilgrimage to the famed cathedral city of Seville, where she hopes to photograph the festive processions.
  culinary: Mirna Vanegas, a master of traditional cuisine, spends mornings perfecting mole negro with dark chocolate and chili pods, shaping tamales with corn masa and pork fillings for holiday feasts,
    and baking pan de muerto dusted with orange‑zest sugar, all while sourcing fresh herbs from her own garden and experimenting with regional spices like ancho and epazote.
  core: Mirna Vanegas is a methodical, solitary soul whose devotion to time‑honored family rituals, disciplined budgeting, and gentle community service intertwines with a quiet love for garden birds, vintage
    boleros, and meticulously crafted recipes, though they sometimes procrastinate on updating their photo albums.
background:
  cultural: Mirna is a first‑generation Mexican American who grew up in a close‑knit family that valued Catholic traditions, family meals, and community celebrations. She was raised speaking Spanish at
    home and continues to use the language with relatives and in religious services. Her cultural identity is expressed through daily rituals such as preparing mole, tamales, and pan de muerto for holidays,
    observing Día de los Muertos with altars honoring ancestors, and maintaining ties to Mexican customs while adapting to life in Palmdale, California. She balances her Mexican heritage with the multicultural
    environment of Los Angeles County, contributing to local cultural events and sharing her traditions with neighbors.
