    ''Participating in cultural festivals'']'
  career_goals: Although Mirna is no longer in the formal workforce, she strives to maintain independence and contribute to her community. Her main ambitions are to preserve and pass on her culinary and
    cultural knowledge to younger relatives, expand her garden to include a small herb plot for cooking, continue volunteering at the senior center by leading a weekly nutrition workshop, and complete a
    short online course on digital photography to document family gatherings. She also wishes to write a small family recipe booklet that blends Mexican traditions with her own adaptations, aiming for a
    self‑published memoir of her life experiences.
