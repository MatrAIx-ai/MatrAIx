personas:
  professional: A budding robotics enthusiast, Jose Ramoshernandez combines their love for LEGO engineering with hands‑on coding in the school robotics club, showing balanced curiosity and practicality,
    reliable teamwork, and a cooperative spirit that drives them to design simple yet functional autonomous bots for class challenges.
  sports: Passionate about soccer, Jose Ramoshernandez trains after school with the Hemet Youth Soccer Club, cheers for LAFC during televised matches, and enjoys weekend pick‑up games at Lake Hemet, showcasing
    a team‑oriented, energetic approach to fitness.
  arts: Creative at heart, Jose Ramoshernandez fills sketchbooks with comic‑strip characters inspired by classic cartoons like Looney Tunes and Marvel’s Stan Lee, while devouring adventure novels by Rick
    Riordan and science books by National Geographic, forming an artistic identity that fuels their imagination.
  travel: An adventurous explorer, Jose Ramoshernandez spends weekends hiking the trails around Diamond Valley Lake, has visited Disneyland and the San Diego Zoo with family, and dreams of a summer road
    trip to the Grand Canyon, balancing careful planning with spontaneous curiosity despite a modest family travel budget.
  culinary: Enthusiastic in the kitchen, Jose Ramoshernandez assists with making simple quesadillas filled with melty cheese and jalapeños, whips up fresh guacamole using ripe avocados, lime, cilantro,
    and tomato, and enjoys learning to roll tamales with masa and shredded pork, reflecting a budding interest in flavors and family traditions.
  core: Jose Ramoshernandez is a curious, cooperative nine‑year‑old who balances structured LEGO engineering with spontaneous outdoor adventures, keeping a tidy piggy bank and a calm demeanor while tackling
    challenges.
background:
  cultural: Jose comes from a Mexican‑American household in Hemet, California. He grows up bilingual, speaking Spanish with his parents and grandparents while using English at school. Family traditions
    such as celebrating Día de los Muertos, Cinco de Mayo, and sharing homemade tamales are central to his life. The strong emphasis on family cohesion, respect for elders, and community involvement influences
    his cooperative nature. Exposure to both Mexican cultural values and the diverse environment of Riverside County gives him a balanced perspective that blends heritage pride with broader American experiences.
