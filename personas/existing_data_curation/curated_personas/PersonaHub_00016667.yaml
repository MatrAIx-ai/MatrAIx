persona_description: A researcher or practitioner interested in evaluating and implementing community-based interventions aimed at promoting physical activity among young people. This persona is likely
  to have expertise in health promotion models, particularly those related to enhancing self-efficacy, and has experience working with diverse populations, particularly those in rural communities. This
  person is also likely to have a strong interest in the design and implementation of physical activity programs and has experience with evaluating the effectiveness of such programs through quantitative
  and qualitative research methods. They are likely to be familiar with the YRBS and have experience with using questionnaire items to measure psychosocial variables related to physical activity.
