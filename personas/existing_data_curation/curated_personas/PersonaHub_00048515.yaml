persona_description: An administrator of a large organization, such as a city police department or a university, who is responsible for setting up and managing operational zones, work zones, and teams within
  the organization. This person is tasked with creating and assigning teams to work in specific areas, ensuring that all work zones are covered and that officers are dispatched quickly and efficiently in
  case of an emergency. The administrator must have a strong understanding of the organization's structure and operations, as well as the ability to effectively manage and oversee the creation and management
  of operational zones, work zones, and teams.
