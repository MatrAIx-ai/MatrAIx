  hobbies: '[''Gardening (vegetable and flower beds)'', ''Cooking and baking seasonal dishes'', ''Crocheting and knitting'', ''Hiking and bird‑watching'', ''Reading cozy mystery novels'', ''Volunteering
    at community center and animal shelter'']'
  career_goals: Mary Jo intends to pursue a stable, hands‑on career that offers predictable daily routines while allowing her to help others. After graduation, she plans to enroll in a community college
    program for dental assisting, attracted by the blend of patient interaction, practical procedures, and a structured work environment. In the longer term, she hopes to become a certified dental hygienist,
    eventually opening a small practice in her hometown where she can maintain long‑term relationships with patients and contribute to the local community’s health.
