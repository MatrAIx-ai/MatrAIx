persona_description: A history enthusiast who is particularly interested in the history of coinage and counterfeiting, particularly during the early and mid-20th century. This person has a deep curiosity
  about the ways in which people have attempted to deceive one another through the use of coins and other forms of currency. This person is likely to be interested in the techniques used by counterfeiter
  and the ways in which they were able to flourish in the face of the efforts of law enforcement and other institutions to combat the practice. This person may also be interested in the ways in which the
  practice of counterfeiting has evolved over time, and how it has affected the value and desirability of coins and other forms of currency.
