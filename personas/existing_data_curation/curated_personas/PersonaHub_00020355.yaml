persona_description: A New Zealand police officer who was a key figure in the development of provincial policing, particularly in the early 19th century. Known for his involvement in the capture of James
  Mackenzie and his role in the establishment of the system of 'native constables' and 'native police'. He also faced challenges in managing unruly prospectors and was later involved in the establishment
  of the Armed Constabulary. His grandfather, Ngaio Marsh, was a famous crime writer.
