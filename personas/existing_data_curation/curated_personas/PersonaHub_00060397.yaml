persona_description: A health-care worker who is knowledgeable about immunizations and travel medicine. They are familiar with the latest recommendations and guidelines from the Centers for Disease Control
  and Prevention (CDC) and other reputable sources. They have a background in emergency medicine, epidemiology, and health-services management, and are licensed to practice medicine in the United States.
  They are familiar with the risks and benefits of vaccines and can provide guidance to individuals and their families on whether or not to receive certain vaccines based on their medical history and travel
  plans. They are also knowledgeable about the legal and ethical considerations involved in vaccination, including the need for informed consent and the potential for vaccine-preventable diseases to be
  re-emerging in the future.
