personas:
  professional: David Gonzalez, a budding junior LEGO architect, channels curiosity and practicality into constructing intricate brick creations, using their collaborative spirit to lead group building
    sessions at school while staying relaxed about deadlines.
  sports: David Gonzalez thrives on the soccer field with the Little Eagles Youth Soccer Club, cheering for the city's professional MLS team, the Metro United, while also dominating tag games at school
    recess, showing boundless energy and a love for teamwork.
  arts: David Gonzalez delights in dancing to upbeat merengue and bachata tracks by artists like Juan Luis Guerra, drawing cartoon characters inspired by classic Disney films and the humor of Matt Groening,
    and singing along to classic Latin pop hits while rehearsing simple choreography for family gatherings.
  travel: David Gonzalez prefers family-focused trips that blend adventure and relaxation, such as weekend outings to Central Park's playgrounds, a sunny beach day at Clearwater, and a recent visit to the
    interactive children's museum in Chicago, always planning with a crayon-drawn itinerary that leaves room for spontaneous park explorations.
  culinary: David Gonzalez enjoys helping stir the mash for mangú, sprinkling cheese on mac and cheese, and crafting banana-pancake faces, boasting a budding skill set that includes measuring out cereal
    for snack bowls and a penchant for licking the spoon after every cooking adventure.
  core: David Gonzalez is a lively, curiosity-driven six-year-old who balances spontaneous play with a love for building, dancing, and family food, yet often misplaces their allowance and forgets to tidy
    up LEGO bricks.
background:
  cultural: David is raised in a Dominican household in New York City, where Spanish and English flow together in everyday conversation. His family celebrates Dominican holidays such as Independence Day,
    enjoys foods like mangú, plantains, and arroz con gandules, and participates in community events at local Hispanic cultural centers. This blend of Caribbean traditions and the diverse fabric of New
    York gives David a rich cultural perspective that influences his language, music, food, and community values.
