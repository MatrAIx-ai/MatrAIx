personas:
  professional: Briana Domingue, a two‑year‑old budding block architect, showcases early methodical planning and inquisitive curiosity by meticulously stacking colorful cubes, a habit reflecting their organized
    and resilient nature that hints at a future in design.
  sports: Briana Domingue, a tiny enthusiast of toddler gymnastics at the community center and a regular participant in parent‑led soccer sessions with the Little Cubs club, also cheers for the Chicago
    Cubs during game days, embodying a calm yet assertive approach to early physical activity.
  arts: Briana Domingue, an appreciative little art lover, delights in the bold illustrations of Eric Carle’s *The Very Hungry Caterpillar*, sings along to Laurie Berkner’s playful songs, and watches the
    animated adventures of Pixar’s *Toy Story*, all of which nurture their curiosity and organized imagination.
  travel: Briana Domingue, a two‑year‑old who enjoys family road trips to the beach, a weekend cabin getaway in the Smoky Mountains, and a recent visit to Disneyland, prefers well‑planned itineraries with
    short, predictable stops, and dreams of someday seeing the Eiffel Tower with their parents.
  culinary: Briana Domingue, a picky yet adventurous eater, loves creamy macaroni‑and‑cheese with sharp cheddar, munches on banana slices, can proudly stir oatmeal with a plastic spoon, and occasionally
    requests avocado toast with a sprinkle of sesame seeds, reflecting a developing palate and playful curiosity.
  core: Briana Domingue, a calm two‑year‑old explorer, meticulously lines up stuffed animals, hoards glitter stickers, and calmly resists new vegetables while eagerly building block towers, showcasing a
    blend of curiosity, organization, and occasional stubbornness.
background:
  cultural: Briana is an African‑American child growing up in Olive Branch, Mississippi, within a close‑knit family that celebrates Southern Black traditions. Her household regularly attends church services
    where gospel music and spirituals are central, and family gatherings feature soul food, storytelling, and the sharing of community histories. She is exposed to the rich musical legacy of the Mississippi
    Delta, including blues and R&B, as well as local art festivals that showcase African‑American artists. These cultural experiences nurture her appreciation for art, music, and community, embedding a
    sense of pride in her heritage and a respect for collective values.
