    local live music events'', ''Nature photography'', ''DIY home improvement projects'']'
  career_goals: Shirley aims to move into a store management role within the next two years, leveraging her organizational strengths and people-focused mindset to lead a team effectively. She plans to pursue
    a retail management certification and, eventually, an associate degree in business administration to broaden her strategic capabilities. Long-term, she envisions opening a boutique that emphasizes locally
    sourced products and community engagement, while also mentoring younger employees.
