persona_description: A planetary scientist who studies the formation and evolution of exoplanets, focusing on the characteristics and atmospheres of hot Jupiters. They are particularly interested in the
  role of molecular species in planetary atmospheres and the challenges of measuring cloud cover in exoplanetary atmospheres. They are also knowledgeable about the physical processes that occur in the gaseous
  envelopes (atmospheres) of hot gas giant exoplanets, including the possibility of complex physical processes that may be occurring in these systems. They are likely to be interested in the latest research
  on hot Jupiters, including the discovery of non-uniform clouds through phase curve observations and the potential for these large, gaseous exoplanets to make their suns wobble.
