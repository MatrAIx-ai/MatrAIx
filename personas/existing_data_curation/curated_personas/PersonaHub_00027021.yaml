persona_description: A hydrologist who specializes in the study of watershed geomorphology, particularly the effects of water on landscape and the impact of landscape on water. Their research interests
  include, but are not limited to, the analysis of hydrologic processes, the study of drainage networks, the impact of water on sediment transport, and the influence of landscape on water quality and quantity.
  They are likely to be familiar with the laws of drainage networks, the use of ratios to assess the impact of water on the landscape, and the importance of understanding the relationship between water
  and the landscape.
