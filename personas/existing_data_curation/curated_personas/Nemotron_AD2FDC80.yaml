  hobbies: '[''Herb gardening'', ''Lowcountry cooking'', ''Quilting'', ''Crocheting'', ''Bridge'', ''Church choir'', ''Historical walking tours'', ''Genealogy research'', ''Waterfront walking'', ''Senior
    center volunteering'']'
  career_goals: Even though she is retired, Lydia aims to continue contributing to her community. She hopes to lead a heritage preservation project documenting Gullah stories in Beaufort, serve on the board
    of the local senior center, organize cultural cooking workshops for younger residents, and mentor grandchildren and local teens in practical life skills. Maintaining her health to stay active and traveling
    to visit family in neighboring states are also personal ambitions.
