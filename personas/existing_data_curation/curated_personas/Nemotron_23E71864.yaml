  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading historical fiction and folklore'', ''Cooking traditional Mexican cuisine'', ''Birdwatching at Laguna Madre'', ''Gardening native
    heirloom vegetables'', ''Visiting local art galleries'', ''Meditation and quiet walks'']'
  career_goals: Arleen aims to leverage her extensive technical background to mentor the next generation of technologists in the Rio Grande Valley while transitioning to a part‑time consulting role that
    helps small businesses adopt secure cloud solutions. She dreams of launching a community‑focused digital archive that records oral histories, photographs, and recipes from local Mexican‑American families,
    blending her tech skills with her passion for cultural preservation. Over the next five years, she also hopes to complete a certificate in digital arts to further integrate artistic expression into
    her technology projects, and eventually retire with a portfolio of interactive exhibits that showcase the intersection of technology, art, and heritage.
