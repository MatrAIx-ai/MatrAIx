  career_goals: Daniel aims to pursue a degree in visual arts or multimedia design at a university that encourages interdisciplinary exploration. He dreams of working as a concept artist for video games
    or film, or as a museum curator who creates immersive, interactive exhibits. He also envisions launching an online platform that showcases emerging artists and fosters creative collaboration. Long‑term,
    he hopes to stay flexible, blending art, technology, and community projects, and to contribute to public art initiatives that enrich the cultural landscape of his hometown.
