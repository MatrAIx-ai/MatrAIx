personas:
  professional: Daniel Merlo is an aspiring visual artist who blends sketching, 3D printing, and photography to capture Colorado's mountain landscapes, channeling curiosity and a relaxed, improvisational
    workflow into collaborative school murals and solo projects.
  sports: Daniel Merlo enjoys weekend hikes along the foothills of Colorado Springs and occasionally joins a local trail‑running club, while cheering for the Denver Broncos, Colorado Avalanche, and the
    Colorado College Tigers, and they play pickup basketball at the school gym during free periods.
  arts: Daniel Merlo immerses themselves in the Colorado art scene, frequently visiting the Fine Arts Center and drawing inspiration from Ansel Adams' landscapes, the surreal works of Salvador Dalí, and
    listening to indie bands like Arcade Fire, Tame Impala, and St. Vincent while sketching, merging traditional drawing with experimental 3D‑printed sculptures.
  travel: Daniel Merlo favors spontaneous road trips that balance adventure and relaxation, having explored Rocky Mountain National Park, the Great Sand Dunes, and a summer camp in Santa Fe, while dreaming
    of a future backpacking tour of the European Alps and the Japanese countryside, planning each outing with a loosely sketched itinerary rather than a strict schedule.
  culinary: Daniel Merlo prefers hearty Colorado comfort foods such as green‑chili‑topped burritos, wild mushroom risotto, and locally sourced trout, experimenting with basic cooking techniques like searing
    and baking, and they often snack on energy‑dense granola bars while sketching on the trail.
  core: Daniel Merlo is a curious, laid‑back teen who fuses mountain‑inspired art with indie music, spontaneous hikes, and a flexible budget, all while juggling the occasional acne breakout and a tendency
    to lose track of deadlines.
background:
  cultural: Daniel grew up in Colorado Springs, a city that blends a rugged Western heritage with a vibrant arts scene. His family background includes Italian and Irish ancestry, though they have embraced
    the regional focus on outdoor recreation, public art, and community festivals. He has been shaped by local traditions such as the Colorado Springs Arts Festival and the city’s emphasis on preserving
    natural landscapes. Exposure to the diverse cultural tapestry of the area—including Native American history and the influence of nearby Hispanic communities—has broadened his appreciation for varied
    artistic expressions and reinforced his value of harmony and cooperation.
