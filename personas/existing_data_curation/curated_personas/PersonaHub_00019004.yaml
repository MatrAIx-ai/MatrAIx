persona_description: A university instructor who teaches Shakespeare courses and has experience with the integration of technology in the classroom. They have a background in film studies and have worked
  with electronic texts to engage students in the study of Shakespeare's plays and their film adaptations. They are familiar with the challenges of teaching Shakespeare and have developed strategies to
  overcome them, such as using embedded video clips and extra-credit reader's theater sessions. They are interested in the potential of technology to enhance the learning experience and are open to exploring
  new ways of teaching Shakespeare using digital tools.
