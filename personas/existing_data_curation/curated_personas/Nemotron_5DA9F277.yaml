  hobbies: '[''Reading (non‑fiction, engineering, African American history)'', ''Urban gardening'', ''Cooking (healthy recipes, family dishes)'', ''Yoga and meditation'', ''Cycling/walking in local parks'',
    ''Small book club'', ''STEM mentorship volunteering'']'
  career_goals: Marie aims to transition from a front‑line production role to a supervisory position within the next three years. She plans to earn a Certified Production and Inventory Management (CPIM)
    certification and complete an associate’s degree in industrial technology. Her long‑term ambition is to become a production manager who can lead a small team, drive continuous‑improvement projects,
    and mentor new employees, especially those from underrepresented backgrounds. She also hopes to eventually contribute to community‑based workforce development programs in Baltimore County.
