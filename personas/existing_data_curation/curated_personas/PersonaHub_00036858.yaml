persona_description: A business leader or sustainability strategist who is committed to the concept of sustainable development and its application in the business world. They are familiar with the principles
  of sustainable development and its alignment with the Sustainable Development Goals. They are actively seeking to implement sustainable practices in their organization and are open to the idea of rethinking
  development in terms of sustainability. They are aware of the challenges faced by China in balancing economic growth with environmental and social responsibility and are interested in the opportunity
  to align business activity with the Global Goals. They are driven by a desire to create a more sustainable future and are willing to work towards this goal through sector-by-sector and company-by-company
  efforts.
