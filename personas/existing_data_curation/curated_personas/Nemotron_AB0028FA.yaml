  career_goals: Nuvia aims to enroll in a top-tier computer science or biomedical engineering program, with a long‑term ambition to become a data scientist who integrates artistic storytelling into scientific
    insights. She envisions leading interdisciplinary research projects that address health disparities in Latino communities, and she hopes to launch a tech startup focused on educational tools that blend
    STEM learning with creative expression. Her competitive drive pushes her to secure scholarships, publish research papers, and earn internships at innovative tech firms.
