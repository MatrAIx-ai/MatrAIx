persona_description: A professional working for Cisco Systems, specifically within the LISP (Leveraging Internet Standard Protocol) team. This individual is involved in the development and implementation
  of LISP, a protocol for addressing hosts on the Internet. They are responsible for minimizing end-customer changes and deployment complexities while ensuring the interoperability between LISP and non-LISP
  sites. The persona is actively involved in the development of LISP standards within the IETF LISP Working Group and has contributed to the development of LISP software for both Cisco IOS and NX-OS platforms.
  They have gained experience with LISP through the deployment and operation of a public LISP network. The persona is committed to resolving the issues facing the Internet today and believes that a healthy
  and growing Internet benefits everyone, including Cisco.
