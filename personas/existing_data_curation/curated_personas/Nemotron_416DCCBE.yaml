personas:
  professional: Jorge Velasquez is a retired self‑taught woodcarver and abstract watercolor painter whose decades of mastering mountain pine and guayacán wood produce masks that fuse traditional island
    motifs with daring abstract forms, and whose calm, imaginative nature lets them mentor younger artisans at a leisurely pace while loosely sketching plans for a traveling exhibition.
  sports: Jorge Velasquez enjoys morning hikes on the forest trails surrounding Jayuya with the local Jayuya Hiking Club, follows the Cangrejeros de Santurce baseball team on weekends, occasionally joins
    casual bocce games with neighbors, and treats physical activity as a gentle, rhythmic ritual rather than a demanding regimen.
  arts: Jorge Velasquez spends afternoons sketching verdant landscapes and carving figurines while listening to plena recordings by Rafael Cortijo and bomba rhythms of Ismael Rivera, draws inspiration from
    the abstract canvases of Carmen Herrera and the poetry of Julia de Burgos, and occasionally strums the cuatro in impromptu jam sessions reminiscent of maestro Edwin Colón Zayas.
  travel: Jorge Velasquez prefers spontaneous day trips to nearby natural wonders such as El Yunque and the bioluminescent bay in Fajardo, dreams of exploring the historic streets of Old San Juan and the
    art museums of Barcelona, and plans his limited journeys around school holidays to accompany his grandchildren, always packing a sketchbook and a bundle of wild herbs for inspiration.
  culinary: Jorge Velasquez enjoys cooking hearty sancocho with root vegetables and pork, loves the garlicky richness of mofongo relleno, experiments with fresh guava glaze on grilled fish, and often infuses
    his dishes with wild mountain herbs like guava leaves, though they sometimes over‑season in their enthusiasm for aromatic complexity.
  core: Jorge Velasquez is a serene, curious 71‑year‑old artisan who blends traditional island crafts with abstract imagination, mentors the next generation at a leisurely pace, and navigates life with
    flexible finances, modest health challenges, and a perpetual love for storytelling.
background:
  cultural: Jorge grew up in Jayuya, a mountainous municipality in the heart of Puerto Rico known for its coffee farms, vibrant patron saint festivals, and a strong tradition of woodcraft. His family lineage
    reflects the island’s blend of Spanish colonial, African, and Taino indigenous roots, an influence that surfaces in his art through abstracted cemi symbols and rhythmic musical phrasing. The close‑knit
    community, Catholic celebrations infused with folk customs, and the oral transmission of legends have shaped his worldview, fostering a deep respect for cultural heritage while encouraging him to reinterpret
    it through his own imaginative lens.
attributes:
  skills: '["Wood carving and mask making", "Abstract watercolor and mixed-media painting", "Folk storytelling and oral history", "Knowledge of medicinal and culinary plants", "Cuatro (Puerto Rican folk
    instrument) playing", "Informal mentorship and community teaching"]'
  hobbies: '["Hiking and nature sketching", "Abstract watercolor painting", "Wood carving (small figurines & masks)", "Playing the cuatro", "Listening to plena and bomba music", "Reading poetry and philosophical
    texts", "Storytelling to family and community"]'
  career_goals: Though retired from formal work, Jorge aims to create a traveling exhibition of his sculptures and paintings that celebrates the fusion of traditional Puerto Rican art with contemporary
    abstract expression, and to compile a small book of collected local legends and plant lore for use in schools. He also hopes to establish a low-key workshop in Jayuya where senior residents can share
    craft skills, and to mentor the next generation of artists, all while maintaining the flexibility to follow new creative inspirations as they arise.
