  hobbies: '["Painting and acrylic art","Sketching abstract concepts","Reading speculative fiction and philosophy","Photography (urban and nature)","Journaling","Cooking traditional Honduran cuisine","Listening
    to marimba and regional music","Volunteering at immigrant resource center"]'
  career_goals: Gabriela aims to advance to an office manager position within the next two years, followed by a transition into operations management. She plans to earn the Certified Administrative Professional
    (CAP) credential and enroll in an associate degree program in Business Administration to deepen her strategic skill set. In the long term, Gabriela dreams of starting a consulting boutique that assists
    small non‑profits and immigrant‑owned businesses in streamlining their administrative processes. She also hopes to mentor younger members of the Honduran diaspora, helping them navigate the local job
    market and develop professional confidence.
