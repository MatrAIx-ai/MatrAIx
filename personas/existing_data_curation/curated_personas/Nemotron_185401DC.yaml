  hobbies: '[''Abstract painting'', ''Wildlife photography'', ''Hiking in the Cascades'', ''Acoustic guitar playing'', ''Cooking traditional Latin American cuisine'', ''Reading speculative fiction'', ''Participating
    in community art workshops'', ''Volunteering at animal rescue shelters'', ''Salsa dancing'']'
  career_goals: Looking ahead, Pascual aims to transition into a senior leadership role as a lead veterinary technologist, spearheading an exotic‑animal care team at a Seattle animal hospital. He plans
    to earn the Veterinary Technician Specialist (VTS) certification in Animal Rehabilitation and to deepen his expertise in alternative enrichment methods, integrating art‑based therapy into routine animal
    welfare programs. Driven by his cultural roots, he aspires to launch a bilingual community outreach initiative that provides low‑cost preventive care workshops and pet‑health education for Spanish‑speaking
    residents in Seattle’s immigrant neighborhoods. In the longer term, Pascual envisions authoring a bilingual handbook on pet wellness and collaborating with local universities on research projects that
    explore the impact of creative enrichment on animal stress reduction.
