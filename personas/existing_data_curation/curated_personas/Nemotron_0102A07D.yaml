  career_goals: Miguel aims to steer his company toward sustainable, long-term growth while embedding social and environmental responsibility into its core strategy. He envisions expanding the firm’s market
    presence beyond the Midwest, leveraging his cultural fluency to build partnerships in Latin America and the Caribbean. A key ambition is to establish a corporate-wide mentorship program for Latino entrepreneurs
    and emerging professionals, thereby increasing representation at senior levels. He also aspires to transition to a board-level role that influences public policy on diversity, equity, and economic development
    in the Cleveland region, and ultimately to leave a legacy of a financially robust, ethically grounded organization that prioritizes employee well-being and community enrichment.
