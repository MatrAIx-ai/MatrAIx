personas:
  professional: Courtney Urban is a 20‑year‑old apprentice maintenance technician who combines hands‑on expertise in electrical, HVAC, and plumbing with a methodical, yet curious mindset, and they confidently
    lead small projects at the local school district while mentoring peers and planning for a future eco‑focused repair business.
  sports: Courtney Urban enjoys casting lines on the East Fork at sunrise with the West Bend Trout Club, supports the Iowa Hawkeyes football team on Saturdays, and they maintain personal fitness through
    weekly weight‑lifting sessions at the county gym, balancing solo outdoor activity with occasional pickup basketball games.
  arts: Courtney Urban nurtures a love for speculative worlds through late‑night reads of Kim Stanley Robinson and Isaac Asimov, unwinds with acoustic folk playlists featuring The Avett Brothers and Gillian
    Welch, and they occasionally volunteer to set up lighting for the county’s community theater productions, blending technical skill with artistic appreciation.
  travel: Courtney Urban favours road‑trip itineraries that weave through Iowa’s Loess Hills State Forest and nearby Nebraska sand dunes, plans budget‑friendly weekend getaways to Chicago’s museums, and
    they dream of a summer exchange in Norway to explore renewable‑energy projects, always mapping routes on a paper atlas and budgeting each mile.
  culinary: Courtney Urban, a competent home cook, delights in preparing a classic Midwest fish fry with seasoned catfish, a rosemary‑infused pork tenderloin, and a fresh corn and heirloom tomato salad,
    often sourcing ingredients from the local farmers’ market and fine‑tuning recipes with a cast‑iron skillet and hand‑crafted spice blends, and they relish sharing these meals at community potlucks.
  core: Courtney Urban blends Midwestern thrift with a restless curiosity, juggling late‑night tool‑building sessions, diligent budgeting, and a deep sense of community duty that drives both personal projects
    and professional ambitions, and they occasionally hoard surplus screws for future improvisations.
background:
  cultural: Courtney was raised in West Bend, a small, predominantly white community in Kossuth County, Iowa. Her family traces roots back to German and Scandinavian settlers who emphasized hard work, self‑reliance,
    and community support. The midwestern values of modesty, thrift, and neighborly cooperation shape her outlook. Local traditions such as church gatherings, potluck dinners, and the annual county fair
    have reinforced a strong sense of belonging and responsibility to her community.
attributes:
  skills: '["Electrical troubleshooting", "HVAC maintenance", "Plumbing repair", "Blueprint reading", "Preventive maintenance scheduling", "Hand and power tool operation", "OSHA safety compliance", "Customer
    service", "Team coordination"]'
  hobbies: '["Woodworking", "Engine tinkering", "Reading (science‑fiction and sustainability topics)", "Fishing", "Volunteering at the local food bank", "Attending county fairs"]'
  career_goals: Courtney aims to earn a Journeyman Electrician certification within the next two years and to complete a vocational certification in HVAC/R technology. She envisions moving into a lead maintenance
    technician role at a regional school district or a small manufacturing plant in central Iowa, where she can mentor newer staff. Long‑term, she hopes to launch her own eco‑focused repair and maintenance
    service, incorporating renewable energy solutions for rural homes, while ensuring stable income to support her marriage and future family.
