personas:
  professional: Lovell Mabie, a meticulous community event manager with a flair for digital photography and a competitive edge that drives strategic planning, leverages Trello and Adobe tools to orchestrate
    festivals, and is channeling this discipline into launching a nonprofit arts hub in St. Charles.
  sports: Lovell Mabie, a basketball‑savvy member of the St. Louis Community Basketball League and a weekend pickup soccer player for the St. Charles Soccer Club, fiercely competitive on the court, tracks
    performance stats, and never misses a Cardinals game on game day.
  arts: Lovell Mabie, a frequent visitor to the Museum of Contemporary Art St. Louis and the St. Charles Museum of History, sketches inspired by Basquiat’s bold lines and Kahlo’s vibrant self‑portraits,
    and hosts lively trivia nights where they channel their art‑history knowledge into winning arguments.
  travel: Lovell Mabie, an avid road‑tripper who has hiked the Katy Trail, explored the music scene in New Orleans, wandered the historic streets of Charleston, and dreams of attending the Edinburgh Festival
    Fringe, always planning itineraries with spreadsheets to maximize cultural immersion while staying within a modest travel budget.
  culinary: Lovell Mabie, an experimental home‑cook who blends miso‑glazed carrots with smoked paprika, perfects a sourdough starter on weekends, and routinely crafts artisanal flatbreads topped with kimchi
    and goat cheese after browsing the St. Charles farmers market for fresh ingredients.
  core: Lovell Mabie, a hyper‑organized, art‑obsessed community planner whose competitive streak fuels ambitious nonprofit dreams, yet whose anxiety often triggers last‑minute over‑preparation and occasional
    caffeine‑driven insomnia.
background:
  cultural: Lovell grew up in a Midwestern, predominantly white community in the Greater St. Louis area, with family roots in German and Irish ancestry. Raised in a modest Methodist household, he internalized
    values of hard work, community service, and modesty. His upbringing included frequent participation in county fairs, high school sports, and church events, fostering his sociable, energetic, and competitive
    nature. The river culture of Missouri and the growing local arts scene shaped his appreciation for both traditional and contemporary artistic expression, while his Midwestern pragmatism informs his
    disciplined, achievement‑oriented approach to life.
attributes:
  skills: '[''Project coordination and event planning'', ''Digital photography and photo editing (Adobe Lightroom, Photoshop)'', ''Advanced proficiency with productivity tools (Microsoft Office, Trello,
    Google Suite)'', ''DIY home improvement and basic carpentry'', ''Public speaking and group facilitation'', ''Contemporary art knowledge and critique'', ''Competitive sports strategy (basketball, trivia)'',
    ''Conflict mediation and negotiation'', ''Time management and disciplined workflow'']'
  hobbies: '[''Visiting art galleries and museums'', ''Digital photography and photo walks'', ''Team sports (basketball, soccer)'', ''Trivia nights and competitive board games'', ''Volunteering as museum
    docent'', ''Reading philosophy and psychology'', ''Cooking experimental dishes'', ''Hiking and nature walks'', ''Participating in online art forums'']'
  career_goals: Lovell aims to acquire a certificate in community arts administration and launch a nonprofit arts hub that offers workshops, gallery space, and youth programs in St. Charles. He wants to
    transition from volunteer roles to a full‑time community event manager, eventually becoming the lead organizer of the region’s annual arts and music festival. Parallel to this, he plans to develop a
    side business providing professional photography services for local events and small businesses. On a personal level, he is committed to mastering anxiety‑management techniques through structured self‑improvement,
    and he aspires to qualify as a peer‑support facilitator to help others facing similar emotional challenges.
