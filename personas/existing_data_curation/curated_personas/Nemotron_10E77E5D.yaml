personas:
  professional: Rachel Zurita, an 84‑year‑old retired household manager turned senior‑center volunteer coordinator, leverages her decades of budgeting, garden‑cultivation, and culinary expertise to orchestrate
    intergenerational workshops, while her blend of curiosity and practicality fuels meticulous planning and her competitive streak drives her pursuit of top honors in the county garden contests.
  sports: Rachel Zurita enjoys low‑impact walking through her garden and around the neighborhood, participates in the senior walking club that meets twice weekly, and follows the regional baseball team,
    the Riverdale Rebels, while occasionally tuning into televised senior‑friendly yoga classes for gentle stretching.
  arts: Rachel Zurita finds creative solace quilting vibrant blankets featuring traditional floral motifs while listening to classic boleros by Agustín Lara and Julio Jaramillo, and she devotes Sunday afternoons
    to reading historical novels by Isabel Allende, letting the stories shape her sense of cultural continuity.
  travel: Rachel Zurita prefers modest, well‑planned trips that blend family visits with cultural enrichment, such as a yearly weekend getaway to the local botanical garden in Austin, a pilgrimage to the
    historic ruins of Machu Picchu, and a relaxed cruise through the Mediterranean islands, balancing curiosity with the practicalities of mobility and health.
  culinary: Rachel Zurita is a master of family‑style cooking, drawing on her garden’s fresh tomatoes, heirloom chilies, and aromatics like epazote to craft dishes such as smoky chiltepín salsa, simmered
    black‑bean stew, and hand‑rolled tamales, while documenting each recipe alongside personal anecdotes for her memoir project.
  core: Rachel Zurita, an 84‑year‑old garden‑obsessed storyteller with a competitive streak, a fondness for bolero music, a tendency to hoard vintage quilting supplies, and a skeptical eye toward strangers,
    weaves her life into a tapestry of tradition and curiosity.
background:
  cultural: Rachel is the daughter of Mexican immigrants who settled in the Gulf Coast region after World War II. She grew up bilingual, celebrating Día de los Muertos, Las Posadas, and Mexican Independence
    Day with her family, while also adopting Floridian customs like beach trips and gardening with native plants. Her Catholic faith and strong sense of familial duty remain central, and she often shares
    Mexican folklore and recipes with her grandchildren, blending her heritage with her life in Hobe Sound.
