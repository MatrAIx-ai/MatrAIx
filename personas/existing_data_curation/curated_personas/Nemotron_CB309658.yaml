  career_goals: Stephen aims to progress from his current managerial role to senior leadership, ideally as a Director of Operations or a Head of Product Development within the next five years. He plans
    to obtain PMP certification and an MBA to deepen his strategic and financial acumen. His ambition is to drive digital transformation initiatives that blend emerging technologies with proven business
    practices, positioning his organization at the forefront of innovation while fostering a culture of mentorship and continuous learning. He also hopes to champion sustainability projects that align with
    the community values of Roanoke.
