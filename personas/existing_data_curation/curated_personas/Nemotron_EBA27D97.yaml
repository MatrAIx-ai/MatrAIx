  career_goals: 'Maurice’s budding ambitions are expressed through the classic wishes of a toddler: he often says he wants to be a firefighter, an astronaut, or a superhero when he grows up. He loves the
    idea of helping others, exploring new places, and using his curiosity to solve problems, so his imagined future careers reflect a blend of adventure, service, and discovery.'
