persona_description: A managerial economist who specializes in analyzing economic trends and contributing to the decision-making processes of a company or industry. They have expertise in interpreting government
  policies, industry expectations, and political expediency to advise top management on business strategies. They also perform sales forecasting, industrial market research, economic analysis of competitors,
  pricing problems of the industry, and provide advice on trade and public relations. They are skilled in gathering economic data, analyzing information about the business environment, and preparing position
  papers on industry issues. Their job requires alertness and the ability to work under pressure.
