  hobbies: '[''Fan art illustration'', ''Original manga character drawing'', ''Short story writing'', ''Narrative video gaming'', ''Visiting modern art museums'', ''Chinese calligraphy'', ''Puzzle solving
    (Sudoku, Rubik Cube)'', ''Attending Lunar New Year festivals'']'
  career_goals: Nhi aims to build a competitive portfolio that will earn her a place in a specialized visual‑arts high‑school program or a community‑college art track, followed by a BFA in Visual Communication
    or Game Art. In the short term she plans to secure an internship with a game studio to gain professional experience. Her long‑term ambition is to become a concept artist for major interactive entertainment
    titles and eventually lead a creative team as a creative director, while also publishing her own illustrated graphic novel series.
