  career_goals: Stacey dreams of becoming a veterinarian because she loves caring for pets and is fascinated by animal science. She also has a budding interest in teaching, hoping to guide younger kids
    in school clubs or after‑school programs. In the near future she aims to earn the junior lifeguard badge, join the science club, and improve her grades so she can attend a summer camp focused on wildlife
    conservation.
