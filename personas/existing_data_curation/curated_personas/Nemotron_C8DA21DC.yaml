personas:
  professional: Stacey Dorsey, a 10‑year‑old who balances the structured tactics of captaining her school’s soccer team with the free‑form creativity of Minecraft world‑building, showcases pragmatic leadership
    and spontaneous problem‑solving that hint at a future as a youth sports coach and game designer.
  sports: Stacey Dorsey plays forward for the Collin County Youth Soccer Club, idolizes the FC Dallas senior squad, and complements their athletic routine with hip‑hop dance lessons that blend agility with
    rhythm, while also cheering for the Dallas Mavericks during basketball season.
  arts: Stacey Dorsey spends afternoons crafting friendship bracelets while dancing to Beyoncé’s ‘Single Ladies’ and Lil Nas X’s ‘Old Town Road’, and devours adventure series such as Rick Riordan’s ‘Percy Jackson’
    and Anthony Horowitz’s ‘Alex Rider’, channeling the narratives into imaginative Minecraft builds.
  travel: Stacey Dorsey enjoys spontaneous weekend road trips to the Texas Hill Country’s wildflower fields and the bustling San Antonio River Walk, favoring flexible, unstructured adventures over rigid
    itineraries, and dreams of camping under the stars at Grand Canyon National Park with friends.
  culinary: Stacey Dorsey loves baking chocolate chip cookies and banana bread with family, mastering basic measuring skills but often forgets to set the timer, resulting in occasional burnt edges, and
    swears by melted butter and vanilla for the perfect treat.
  core: Stacey Dorsey is a 10‑year‑old whirlwind of soccer kicks, Minecraft builds, and bracelet‑making, who thrives on spontaneous group fun, can be chaotic with schoolwork, yet always saves a coin for
    the next big adventure.
background:
  cultural: Stacey grows up in a middle‑class, white family in McKinney, Texas, a suburban community in Collin County. Her upbringing reflects a blend of classic Texan values—friendliness, community involvement,
    and a love for outdoor activities—combined with typical American traditions like celebrating Thanksgiving, Halloween, and Fourth of July fireworks. She regularly attends a local church, where she participates
    in Sunday school and youth group events, and she embraces the school’s emphasis on sports, especially football and soccer. These cultural influences shape her social outlook, teamwork orientation, and
    appreciation for both structure and spontaneous play.
