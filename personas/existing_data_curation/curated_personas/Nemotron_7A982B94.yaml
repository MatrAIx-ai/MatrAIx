  hobbies: '[''Painting'', ''Art gallery visits'', ''Gardening'', ''Birdwatching'', ''Hiking'', ''Reading buddy volunteering'', ''Bridge nights'', ''Cooking and fusion recipes'', ''Philosophy reading'',
