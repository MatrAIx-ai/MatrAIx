  hobbies: '[''Gardening'', ''Cooking soul‑food and Caribbean dishes'', ''Church choir participation'', ''Walking in Flushing Meadows‑Corona Park'', ''Crossword puzzles and Sudoku'', ''Bridge and card games'',
    ''Knitting and quilting'', ''Collecting vintage transportation postcards'', ''Listening to classic R&B and gospel music'', ''Watching 1970s movies'', ''Volunteering at the community food pantry'']'
  career_goals: Even at 72, Kimberly aims to transition from daily hands‑on supervision to a mentorship and advisory role within her company. She hopes to formalize a senior‑worker apprenticeship program
    that pairs experienced staff with younger employees, preserving institutional knowledge and improving safety culture. Kimberly also wants to serve on the union safety committee, championing updated
    protocols that reduce workplace injuries. On a personal level, she seeks to secure a stable retirement income that covers health‑care costs while allowing her to reduce work‑related stress. She envisions
    using her remaining years to give back to her community—volunteering at the local senior center, leading workshops on basic vehicle safety for neighborhood residents, and documenting the oral histories
    of long‑time Queens workers for future generations.
