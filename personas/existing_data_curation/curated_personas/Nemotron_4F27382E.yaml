  career_goals: Although retired, Kevin is driven to stay intellectually active and give back. He aims to volunteer as a STEM mentor for high‑school and college students, especially those from underrepresented
    backgrounds, by leading workshops on basic electronics and coding at his local community center. He also hopes to document his family’s migration story and his engineering experiences in a memoir to
    preserve cultural heritage for future generations. Additionally, Kevin wishes to support the local Vietnamese community by helping organize cultural events, language classes, and occasional technical
    consulting for non‑profits that need guidance on simple technology projects.
