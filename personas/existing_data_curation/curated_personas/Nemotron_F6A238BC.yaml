  hobbies: '[''Sketching'', ''Digital painting'', ''Reading speculative fiction'', ''Philosophy'', ''Art theory'', ''Journaling'', ''Writing poetry'', ''Writing flash fiction'', ''Listening to ambient music'',
    ''Hiking'', ''Mindfulness meditation'']'
  career_goals: Thomas aspires to move beyond the cashier role into a career that merges his artistic passion with his desire to help others. He plans to enroll in a community college art program to gain
    formal training in illustration and graphic design, with the longer-term goal of becoming an art therapist or community arts coordinator. He envisions creating workshops that use visual art as a tool
    for emotional expression and stress relief, especially for underserved populations in the Bay Area. While he values flexibility and prefers non-rigid schedules, he is motivated to build a sustainable
    livelihood that aligns with his compassionate outlook and love for creative novelty.
