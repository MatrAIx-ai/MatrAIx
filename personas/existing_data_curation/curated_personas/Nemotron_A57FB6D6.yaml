  career_goals: Inspired by his desire to help others and his fascination with science, Daniel hopes to pursue a career in health care or community service. He envisions becoming a pediatrician or a community
    health worker who can combine his scientific curiosity with compassionate care. In the short term, he aims to take on leadership roles in his school’s science club and volunteer at the local community
    garden, building experience that will support his long‑term ambition to improve the well‑being of his neighborhood.
