personas:
  professional: Alejandro Raffo, a 28‑year‑old facilities specialist, leverages meticulous cleaning expertise, bilingual communication, and a curiosity for sustainable practices to streamline building operations
    while preferring solitary, low‑stimulus tasks and quietly pursuing supervisory roles.
  sports: Alejandro Raffo, who lives in Queens, follows the New York Knicks and Mets avidly, jogs solo along Flushing Meadows in the spring, participates in the Flushing Running Club's weekend runs, and
    attends weekly Vinyasa yoga sessions at a local studio to stay fit.
  arts: Alejandro Raffo immerses themselves in visual art by sketching watercolors of Flushing’s streets, capturing candid urban moments in the style of Henri Cartier‑Bresson, discussing modern movements
    from Rothko to Banksy, and enjoying vinyl evenings featuring ambient soundscapes by Brian Eno and traditional folk melodies.
  travel: Alejandro Raffo designs low‑key itineraries centered on museum visits and quiet cafés, having explored the historic barrios of Seville, the art districts of Berlin, and the tea houses of Kyoto,
    and dreaming of a future solo trip to Patagonia’s remote valleys for landscape sketching.
  culinary: Alejandro Raffo enjoys cooking family‑heritage dishes like ceviche with fresh lime, cilantro, and chili, and encocado featuring coconut milk and plantains, honing culinary skills through nightly
    experiments with aromatic herbs such as epazote and hoja santa, while also mastering the basics of sustainable cooking.
  core: Alejandro Raffo is a solitary, curiosity‑driven 28‑year‑old who blends meticulous cleaning expertise with a passion for art, mindful yoga, and eco‑conscious living, though they often drift into
    disorganization and impulsive splurges on creative supplies.
background:
  cultural: Alejandro is a first‑generation American of Ecuadorian descent; his parents emigrated from Guayaquil in the early 1990s. Raised in a bilingual household, he grew up celebrating Ecuadorian holidays
    such as Carnaval and Día de los Difuntos, and maintaining culinary traditions that connect him to his heritage. Living in Flushing, Queens, he is immersed in a vibrant, multicultural community that
    reinforces his fluency in Spanish and his appreciation for Latin American art and music. He frequently visits local Ecuadorian community events and markets, where he shares stories of his family’s journey
    and sustains strong ties with extended relatives. This bicultural upbringing shapes his worldview, blending a respect for communal values from Ecuador with the individualism and competitive spirit of
    his urban New York environment.
attributes:
  skills: '[''Commercial floor care (stripping, waxing, polishing)'', ''Carpet and upholstery cleaning'', ''Waste management and recycling procedures'', ''Safe handling of cleaning chemicals (OSHA compliance)'',
    ''Basic plumbing repairs (faucet leaks, pipe clogs)'', ''Minor electrical troubleshooting (light fixture replacement)'', ''Inventory control of supplies and equipment'', ''Operation of industrial cleaning
    equipment (floor scrubbers, steam cleaners)'', ''Bilingual communication (Spanish fluency, English proficiency)'', ''Self‑taught photography (composition, digital editing)'', ''Basic art appraisal knowledge
    (styles, materials, artists)'']'
  hobbies: '[''Watercolor sketching'', ''Street photography'', ''Reading art‑history books and speculative fiction'', ''Listening to ambient music and Ecuadorian folk vinyl'', ''Cooking traditional Ecuadorian
    dishes (ceviche, encocado)'', ''Puzzle solving and solo strategy board games'', ''Mindful yoga practice'']'
  career_goals: Alejandro aims to leverage his curiosity and competitive drive to move from a janitorial role into a supervisory position within facilities management, eventually becoming a building operations
    manager. He plans to earn certifications such as the ISSA Certified Cleaning Technician and a certificate in Facilities Management from a community college. Long‑term, he envisions launching his own
    eco‑friendly cleaning service that caters to art galleries and cultural institutions, combining his expertise in sustainable cleaning practices with his passion for art and quiet work environments.
    He also hopes to secure a custodial role at a museum where he can contribute to preserving cultural artifacts while engaging with artistic spaces.
