    Management'']'
  hobbies: '[''Hiking in the Ozark foothills'', ''Gardening (vegetables and herbs)'', ''Reading historical nonfiction and philosophy'', ''Playing chess'', ''Volunteering as a stage manager for community
    theater'', ''Cooking Midwest comfort dishes'', ''Listening to jazz and blues music'', ''Mentoring youth soccer teams'', ''Participating in local food bank drives'', ''Journaling and reflective writing'']'
  career_goals: Mark aims to transition into a senior HR leadership role within the next five years, targeting positions such as HR Business Partner Manager or Director of Human Resources for a mid‑size
    company in the Midwest. He plans to earn the SHRM‑SCP credential and enroll in an executive MBA program to deepen his strategic and financial acumen. His long‑term ambition is to become a Chief Human
    Resources Officer who shapes an inclusive, data‑informed culture while mentoring the next generation of HR professionals. He is also interested in consulting on organizational development projects for
    nonprofit organizations in the Columbia area.
