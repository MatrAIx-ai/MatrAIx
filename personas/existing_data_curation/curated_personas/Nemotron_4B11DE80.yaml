personas:
  professional: Mark Hollifield is a seasoned HR strategist with over ten years of people‑management experience, blending a humanities‑rooted curiosity with data‑driven analytics, strategic talent acquisition,
    and calm, empathetic mediation to foster inclusive, high‑performing teams.
  sports: Mark Hollifield is a dedicated weekend hiker on the Ozark foothills, a youth soccer coach with the Columbia Soccer Club, and an ardent fan of the St. Louis Cardinals, the Kansas City Chiefs, and
    the St. Louis Blues, balancing structured team training sessions with spontaneous nature treks.
  arts: Mark Hollifield channels their love of narrative as a stage manager for the Columbia Community Theatre, coordinating productions ranging from Arthur Miller’s Death of a Salesman to Lin‑Manuel Miranda’s
    In the Heights, while their personal soundtrack includes folk‑rock singer Brandi Carlile, jazz pianist Bill Evans, and occasional binge‑watching of classic films by Ingmar Bergman.
  travel: Mark Hollifield prefers thoughtfully planned road trips that fuse outdoor adventure with cultural immersion, having explored the Great Smoky Mountains, the historic streets of Edinburgh, and the
    vineyards of Napa Valley, while their bucket list features a solo trek through Patagonia’s Torres del Paine and a culinary tour of Italy’s Emilia‑Romagna region.
  culinary: Mark Hollifield embraces hearty Midwestern cooking, expertly preparing slow‑braised pot roast with rosemary‑infused root vegetables, creamy chicken‑and‑dumpling soup, and homemade cornbread,
    often seasoning dishes with fresh herbs like basil, thyme, and cilantro from their garden, and they relish pairing meals with locally brewed Missouri craft beers.
  core: Mark Hollifield is a calm, community‑oriented HR leader who balances meticulous planning with spontaneous hikes, a love for theater, and a disciplined yet occasional splurge‑prone approach to finances.
background:
  cultural: Mark grew up in a small town in central Missouri, steeped in Midwestern values of hospitality, modesty, and a strong work ethic. His white, heartland upbringing combined with a graduate degree
    in arts and humanities has given him a deep appreciation for literature, history, and cultural diversity. These influences shape his collaborative, considerate demeanor and his commitment to fostering
    inclusive environments. He and his spouse, both college‑educated, maintain close ties to local community institutions such as the public library, the church, and regional volunteer organizations.
attributes:
  skills: '[''Talent Acquisition'', ''Employee Relations'', ''HR Policy Compliance'', ''Training & Development'', ''Performance Management'', ''Organizational Development'', ''HRIS Management'', ''Data-Driven
