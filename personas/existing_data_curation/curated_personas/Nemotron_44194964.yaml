  career_goals: Luis's primary ambition is to maintain a stable, low‑stress routine that supports his health and his wife's wellbeing. He aims to keep his garden thriving, continue cooking and sharing family
    recipes with his grandchildren, and document these recipes in a handwritten cookbook. He wishes to volunteer part‑time at the local senior center, where he can offer simple repairs, garden advice, and
    cooking lessons, providing a quiet, helpful presence that aligns with his cooperative nature. Luis also hopes to learn to use video‑calling apps so he can stay connected with relatives in Mexico, reducing
    his anxiety about isolation. In the longer term, he would like to be remembered as someone who kept the family's traditions alive and who contributed quietly to the neighborhood's sense of harmony.
