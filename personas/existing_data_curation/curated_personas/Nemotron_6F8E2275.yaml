personas:
  professional: Michael Dalton, a retired mechanical engineer with deep expertise in thermodynamics, fluid mechanics, and HVAC design, now channels his hands‑on woodworking skill and budding Python data‑analysis
    hobby into developing an AI‑driven home‑energy tracker for seniors, all while navigating a spontaneous work style that often sidesteps tight deadlines but leverages their cooperative nature to mentor
    adult learners.
  sports: Michael Dalton stays active by joining the Carroll County Senior Walking Club for morning strolls, playing weekly lawn‑bowling matches at the local community center, and cheering on the Baltimore
    Ravens on Sundays, while occasionally watching Washington Capitals games on television during the winter season.
  arts: Michael Dalton's evenings often feature the folk melodies of Joan Baez, the classical piano recordings of Glenn Gould, and classic Hollywood films starring Cary Grant, while their own creative outlet
    manifests in digital astrophotography inspired by Ansel Adams and handcrafted wooden sculptures that echo Mid‑Century modernist furniture designs.
  travel: Michael Dalton prefers low‑key, historically rich trips such as a weekend pilgrimage to Gettysburg National Military Park, a spring visit to the Cotswolds villages in England, and a summer cruise
    along the Chesapeake Bay, all booked through senior‑friendly travel agencies that balance their love of spontaneity with the need for accessible accommodations.
  culinary: Michael Dalton favors hearty, garden‑to‑table meals like roasted root‑vegetable stew with fresh carrots, parsnips, and sage, homemade cornbread drizzled with local honey, and occasional quinoa
    salads featuring roasted cherry tomatoes and feta, reflecting their moderate cooking skill and a penchant for seasonal, wholesome flavors.
  core: Michael Dalton is a curiosity‑driven octogenarian who blends engineering precision with woodworking artistry, yet their perpetual worry prompts them to double‑check every bolt, budget line, and
    health reading, making them both meticulously prepared and occasionally paralyzed by over‑analysis.
background:
  cultural: Born in the Midwest shortly after World War II, Michael grew up within the baby‑boomer generation, shaped by the space race, civil‑rights movement, and a familial emphasis on education and self‑reliance.
    His ancestry includes German and Irish roots, reflected in family traditions of holiday cooking and storytelling. After moving to Maryland in his thirties for work, he adopted the Mid‑Atlantic values
    of modesty, community involvement, and practical ingenuity. Though raised in a Protestant household, his current spiritual practice is personal, focusing on gratitude and service. Living in Westminster,
    a town known for historic farms and tight‑knit neighborhoods, reinforces his appreciation for preserving local heritage and contributing to community welfare.
attributes:
  skills: '["Mechanical engineering", "Thermodynamics analysis", "Fluid mechanics", "HVAC system design", "CAD modeling (AutoCAD, SolidWorks)", "Technical writing", "Mentoring & teaching", "Woodworking
    & carpentry", "Basic Python programming", "Troubleshooting electrical/mechanical systems"]'
  hobbies: '["Woodworking", "Gardening", "Local history research", "Astronomy", "Online learning (technology & photography)", "Reading scientific biographies", "Puzzle solving", "Bridge (card game)", "Volunteer
    home repair", "STEM mentorship"]'
  career_goals: 'Michael seeks to stay intellectually active by exploring emerging technologies such as AI‑driven energy monitoring and renewable‑energy solutions, with the aim of creating a simple home‑energy
    tracker for seniors. He plans to compile his professional lessons and life stories into a memoir‑style guide for retirees interested in DIY projects. Mentoring remains a priority: he wants to regularly
    volunteer with Carroll County high‑school STEM outreach programs to pass on his knowledge. Maintaining health, managing stress, and supporting his wife’s interests also shape his personal ambitions
    for the coming years.'
