persona_description: A researcher who studies the impact of land use change on microorganism communities in the Amazon rainforest, focusing on nitrogen fixation and its role in carbon sequestration. The
  researcher is interested in measuring changes in the diazotrophic microbial community composition in response to deforestation and the effects of grazing on nitrogen fixation. The persona is likely to
  have expertise in DNA analysis, particularly nifH gene sequencing, and is conducting research in Brazil.
