personas:
  professional: A budding young scientist and community organizer, Justin Dunn channels his curiosity and practicality into leading his school's science club projects while eagerly tutoring classmates in
    math, balancing structured experiments with the spontaneous organization of beach clean-ups.
  sports: A wave-chasing enthusiast, Justin Dunn rides the local breakers with the Pacific Coast junior surf team, skate-boards along the boardwalk while cheering for the hometown Seaside Mariners minor-league
    baseball team, and completes tri-weekly swim drills with the junior varsity swim squad, often dreaming of catching a wave like Kelly Slater.
  arts: A budding guitarist and photographer, Justin Dunn strums along to the sounds of The Beach Boys and Ed Sheeran during school music club rehearsals, captures golden-hour coastal shots inspired by
    Ansel Adams, and loses themselves in adventure novels by Rick Riordan, often sketching Minecraft landscapes during downtime.
  travel: An adventurous explorer, Justin Dunn plans weekend trips to tide pools in Monterey Bay, dreams of surfing the legendary breaks on Oahu's North Shore, and hopes to trek the red rocks of Sedona
    and wander the historic streets of Lisbon with their family.
  culinary: A seafood-savvy youngster, Justin Dunn devours fish tacos with mango salsa, grilled shrimp kebabs, and pineapple-infused rice after surf sessions, tries to replicate the tangy taste of Hawaiian
    poke bowls at home using soy sauce, sesame oil, and fresh seaweed, and occasionally indulges in cheesy pepperoni pizza while debating the merits of extra-cheese.
  core: Justin Dunn is a talkative, beach-loving eleven-year-old who balances curiosity with a worry-prone heart, constantly juggling surfboards, Minecraft worlds, and a relentless urge to help anyone in
    need, even if it sometimes leads to over-committing and forgetting homework.
background:
  cultural: Justin comes from a White, middle‑class Southern Californian family that has lived in Encinitas for several generations. The coastal lifestyle, surf culture, and strong environmental values
    of the area shape his daily routines. Encinitas’s diverse community, with influences from nearby Hispanic and Asian neighborhoods, has exposed him to a variety of cultural traditions and perspectives,
    reinforcing his compassionate and cooperative nature.
