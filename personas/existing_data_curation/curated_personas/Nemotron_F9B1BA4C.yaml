  career_goals: Justin dreams of becoming a marine biologist or environmental scientist who can protect the coastal ecosystems he loves, and he also envisions a future as a science teacher who can spark
    curiosity in other kids. He seeks a career that combines hands‑on problem solving, compassion for living beings, and a tangible positive impact on his community.
