personas:
  professional: An 81‑year‑old retired laboratory manager named Trisha Cortes applies her analytical rigor and compassionate mentorship to volunteer as a STEM outreach mentor for local middle‑school girls
    and to help the Louisville Science Center design interactive exhibits, blending meticulous data‑driven thinking with the warm, cooperative spirit cultivated by decades of church‑based community service.
  sports: Trisha Cortes enjoys leisurely walks through Cherokee Park and a weekly pickleball match at the local senior center, while cheering on the Louisville Cardinals basketball team and following the
    annual Kentucky Derby, embodying a quiet yet enthusiastic approach to both personal fitness and regional sporting traditions.
  arts: Trisha Cortes captures the subtle beauty of Louisville’s riverfront with digital photography, knits scarves inspired by the color palettes of Georgia O’Keeffe’s floral paintings, and finds solace
    in listening to Emmylou Harris and reading historical mysteries by Ellis Peters, weaving these artistic passions into their solitary yet socially connected routine.
  travel: Trisha Cortes favors low‑key, well‑planned trips such as a weekend cabin retreat in the Blue Ridge Mountains, a cultural tour of Savannah’s historic squares, and a river cruise on the Ohio River,
    always ensuring accommodations are comfortable for occasional joint‑mobility challenges while satisfying a curiosity for Southern heritage sites.
  culinary: Trisha Cortes delights in cooking classic Southern comfort dishes like shrimp and grits and collard greens seasoned with garden‑fresh herbs, while also experimenting with rose‑infused desserts
    and mastering the art of perfectly steeped black tea, reflecting a blend of traditional flavors and refined palate.
  core: Trisha Cortes is an 81‑year‑old analytical mind with a compassionate heart, who balances meticulous scientific curiosity with Southern‑rooted community service, gentle yoga, and a penchant for knitting
    perfect scarves while occasionally forgetting to take their pills on time.
background:
  cultural: Trisha was raised in a middle‑class White Protestant family in Louisville, Kentucky. The Southern hospitality of her community, along with the emphasis on church fellowship and family gatherings,
    shaped her values of compassion and cooperation. Growing up during the 1960s and 1970s, she witnessed the gradual opening of educational doors for women, which inspired her pursuit of a STEM degree—a
    path less common for her generation. This blend of Southern cultural traditions and a respect for academic rigor informs her balanced, practical outlook on life.
