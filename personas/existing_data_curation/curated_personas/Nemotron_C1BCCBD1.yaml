  career_goals: Although retired, Trisha aims to continue contributing her expertise by volunteering as a STEM outreach mentor for local middle‑school girls, assisting the Louisville Science Center with
    exhibit development, and chronicling her life experiences in a memoir that highlights perseverance and community service. She also aspires to foster intergenerational dialogue through small discussion
    circles at her church, promoting harmony and knowledge sharing.
