  hobbies: '[''Sketching street scenes'', ''Digital collage creation'', ''Hip‑hop dance'', ''Listening to R&B and neo‑soul'', ''Playing piano and singing'', ''Organizing block parties'', ''Reading graphic
    novels'', ''Volunteering as a reading buddy'']'
  career_goals: Christy dreams of turning her love for art and community into a career that bridges creativity and social impact. In the short term she aims to lead a school club that combines visual arts,
    music, and peer support, while volunteering at the local community center to run after‑school creative workshops. Long‑term, she hopes to study visual arts and sociology in college, eventually becoming
    a community arts facilitator or youth outreach coordinator. She envisions creating sustainable art programs that give marginalized voices a platform, possibly integrating art therapy techniques or multimedia
    storytelling to advocate for social justice within the St. Louis area.
