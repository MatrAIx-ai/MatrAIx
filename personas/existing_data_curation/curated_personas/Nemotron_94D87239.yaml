personas:
  professional: Christy Murray is a high‑school freshman who blends street sketching, digital collage, and hip‑hop choreography into vibrant visual storytelling projects, leveraging their curious, spontaneous
    nature and compassionate teamwork to lead art‑club initiatives and community block‑party designs.
  sports: Christy Murray channels energetic hip‑hop and African‑inspired dance routines into fitness through the school’s dance crew, while cheering on the New York Knicks in winter and the New York Yankees
    in summer as their favorite professional teams.
  arts: Christy Murray loves sketching street scenes with bold chalks, curates digital collages inspired by Kendrick Lamar’s album art and Banksy’s street murals, and draws creative energy from graphic
    novels like Maus and Saga, all of which shape their artistic identity.
  travel: Christy Murray prefers spontaneous weekend road trips to vibrant city neighborhoods—exploring street‑art hotspots in New York, the music‑rich French Quarter in New Orleans, and the mural‑laden
    lanes of Berlin—while dreaming of a family cruise to the Caribbean for a blended dose of adventure and relaxation.
  culinary: Christy Murray enjoys bold, colorful meals, frequently whipping up jalapeño‑spiked mac and cheese, avocado‑beet smoothies, and mango salsa tacos, yet their cooking skill tops at enthusiastic
    but occasionally messy middle‑school kitchen experiments.
  core: Christy Murray is a curious, spontaneous 14‑year‑old who stitches together street art, hip‑hop dance, and community spirit, but often forgets homework deadlines while juggling an ever‑growing stash
    of chalk.
background:
  cultural: Christy is a Black teenager growing up in Florissant, a suburb of St. Louis, Missouri. Her family maintains Southern African‑American traditions such as Sunday gospel gatherings, soulful cooking,
    and storytelling that celebrate resilience and community. She participates in local Juneteenth celebrations, neighborhood block parties, and Midwest Black cultural events like the St. Louis Jazz Festival,
    which reinforce a sense of pride in her heritage. The multicultural fabric of the St. Louis area, with its rich history of Black art, music, and activism, shapes her worldview and fuels her desire to
    use creativity for social good. While embracing the broader Midwestern suburban lifestyle, Christy stays deeply connected to the values of togetherness, mutual support, and the vibrant creativity rooted
    in the Black community around her.
