persona_description: A biologist or a developmental biologist who is interested in the study of parental care and its effects on individual variation. This person is likely to be interested in understanding
  how individual variation in parental care affects the number and quality of chicks at hatching, and how this variation is related to maternal fitness. They may also be interested in the physiological
  mechanisms underlying individual variation in parental effort, such as the timing of onset, intensity, and constancy of incubation behavior.
