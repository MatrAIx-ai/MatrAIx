persona_description: A scientist or researcher who specializes in the study of turbulence, specifically the movement of microscopic particles in turbulent flows. They use high-speed cameras and a very bright
  laser to map the movement of these particles and test Batchelor's mathematical theories on particle movement, which are nearly perfect for most turbulent flows on Earth. They are likely to be based in
  Germany, working at the Max Plank Institute for Dynamics and Self-Organization in Gottingen, where they have been conducting research on turbulence for many years.
