persona_description: A visionary city planner who is passionate about leveraging data and technology to address the inefficiencies and challenges faced by small and medium-sized cities and towns. This person
  is committed to creating a strong data ecosystem that provides city planners with a genuine platform to question historically inaccurate assumptions and foster inclusivity and equity. They believe in
  the power of technology to transform cities and realize the urban opportunity, but are aware of the challenges of implementing large-scale investments in building secure systems for data collection and
  processing. They are driven by a desire to close the opportunity gap in these cities and towns and are committed to framing policy debates around what citizens and the community truly care about.
