personas:
  professional: Felix Prieto is a highly proficient pipelayer whose systematic work process, OSHA certifications, and competitive mindset drive him to refine pipe installation efficiency, lead crews, and
    pursue advanced trenchless technologies.
  sports: Felix Prieto kicks off each sunrise with a regimented jog around Lake Minneola, plays midfield for a local community soccer league named the Minneola Mavericks, lifts weights aiming for incremental
    PRs at the nearby gym, and follows the Orlando City SC roster for inspiration.
  arts: Felix Prieto channels his detail‑oriented nature into building scale model train and pipeline kits, finds creative release listening to progressive rock bands like Rush and cinematic scores by John
    Williams, and visits the annual Central Florida Maker Faire to showcase his work.
  travel: Felix Prieto favors low‑key, self‑planned getaways—such as weekend fishing trips to Lake Eustis and a recent industry conference in Tampa—while dreaming of a future professional trip to Japan’s
    trenchless technology expo and a leisure visit to the historic canals of Amsterdam.
  culinary: Felix Prieto delights in cooking tacos al pastor and mole poblano, perfecting the smoky chilies, roasted tomatillos, and a hint of chocolate, and often pairs these dishes with fresh cilantro
    and corn tortillas while hosting intimate dinner nights for close friends.
  core: Felix Prieto is a precision‑driven pipelayer whose competitive edge fuels his work, model building, early‑morning jogs, and late‑night gaming, all balanced by disciplined finances and a love for
    cooking bold Mexican flavors.
background:
  cultural: Felix is a first‑generation Mexican‑American raised in central Florida. His parents immigrated from Jalisco, and he grew up bilingual, speaking Spanish at home and English at school. He celebrates
    Mexican cultural traditions such as Día de los Muertos and Cinco de Mayo with his family, and maintains strong ties to the local Mexican community through neighborhood festivals and church gatherings.
    The Mexican values of hard work, family loyalty, and craftsmanship are reflected in his diligent approach to his trade. While he respects these traditions, Felix also embraces the individualistic and
    competitive aspects of American work culture, blending both influences to shape his identity as a reliable, goal‑oriented professional who honors his heritage.
attributes:
  skills: '[''Blueprint reading'', ''Pipe installation (ductile iron, PVC, HDPE)'', ''Excavator and backhoe operation'', ''MIG welding'', ''OSHA 10 safety compliance'', ''Confined space entry certification'',
    ''Trench shoring and soil stability assessment'', ''Material estimation and budgeting basics'', ''Project scheduling and crew coordination'', ''Quality control and process optimization'']'
  hobbies: '[''Jogging'', ''Fishing'', ''Weightlifting'', ''Competitive video gaming'', ''Scale model building'', ''Cooking Mexican cuisine'', ''Small‑group soccer'', ''Reading construction trade magazines'']'
  career_goals: Felix aims to advance from a crew member to a foreman within the next two years, securing a journeyman certification in pipefitting and completing an associate degree in construction management.
    He is driven to lead larger municipal water and wastewater pipeline projects, and he plans to specialize in trenchless technologies such as horizontal directional drilling and pipe bursting to stay
    ahead of industry trends. Long‑term, Felix aspires to establish his own subcontracting firm focused on sustainable pipeline solutions, leveraging his reputation for precision, reliability, and competitive
    performance to win contracts and mentor the next generation of pipelayers.
