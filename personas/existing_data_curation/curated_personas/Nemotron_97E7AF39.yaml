  career_goals: Although only four, Matilde already imagines future roles that reflect her love of structure and helping others. She often says she would like to be a teacher who creates a tidy classroom
    schedule, a nurse who follows clear care procedures, or a veterinarian who organizes a calm animal clinic. These ambitions blend her competitive spirit with a desire for orderly, caring professions.
