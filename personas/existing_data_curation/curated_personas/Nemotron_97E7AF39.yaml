personas:
  professional: Mathilde Lantigua, a budding junior architect, spends hours stacking colorful building blocks into precise, multi‑storey towers while meticulously noting floor counts on a notebook, proudly
    declaring each structure a masterpiece to eager playmates.
  sports: Mathilde Lantigua energizes every Saturday at the Bright Kids Soccer Club, dribbling the ball with determined focus, and cheers for the nearby River Rapids baseball team, often shouting 'Go Rapids!'
    during televised games with a competitive spark.
  arts: Mathilde Lantigua delights in drawing whimsical animals with crayon scribbles, sings along to Raffi’s 'Baby Beluga' while dancing in the living room, and attends weekly storytime sessions at the
    local library, where she eagerly quotes lines from her favorite picture book, 'Where the Wild Things Are'.
  travel: Mathilde Lantigua cherishes family trips to the city zoo, where she maps out routes on a handheld map, and dreams of experiencing the magic of Disneyland, eagerly flipping through brochures and
    marking the 'Space Mountain' ride with a shiny sticker.
  culinary: Mathilde Lantigua loves the comforting bite of macaroni and cheese, proudly adds extra grated cheddar with a tiny spatula, and enjoys assembling bite‑size fruit kebabs of grapes and banana slices,
    though she habitually sneaks a few extra gummy bears when her mother isn’t looking.
  core: Mathilde Lantigua is a miniature planner with a competitive edge, thriving on routines, tiny spreadsheets of stickers, and a relentless quest to stack her world in orderly, colorful layers.
background:
  cultural: Matilde is raised in a Mexican‑American household in Menifee, California. Her family speaks both Spanish and English at home, and she participates in cultural traditions such as Día de los Muertos
    altars, quinceañera preparations, and weekend family meals featuring tacos and tamales. The bilingual environment and community celebrations reinforce her sense of identity, while her parents emphasize
    respect for elders, close family bonds, and the value of hard work. Growing up near a diverse population in Riverside County, she also experiences a blend of broader American customs alongside her Mexican
    heritage.
