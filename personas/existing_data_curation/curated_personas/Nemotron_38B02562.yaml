  hobbies: '[''Visiting art galleries and street art festivals'', ''Watercolor painting and sketching'', ''Cooking traditional Mexican and fusion recipes'', ''Hiking in the San Bernardino Mountains'', ''Practicing
    yoga'', ''Attending wine‑tasting events'', ''Volunteering at community cultural workshops'']'
  career_goals: Luisa aspires to advance from waiter to restaurant manager within the next three years, leveraging her organizational talent and bilingual skill set. She plans to complete a degree in Hospitality
    Management at a community college while taking night courses in culinary arts. Long‑term, she dreams of opening a boutique café that fuses Mexican culinary traditions with an art‑gallery atmosphere,
    offering rotating exhibitions by local artists and menu items inspired by her travel experiences.
