personas:
  professional: Luisa Medina is a bilingual front‑of‑house professional who leverages meticulous scheduling, inventory tracking, and customer‑service flair to streamline restaurant operations, and they
    are actively pursuing a hospitality management degree with the goal of becoming a manager and eventually opening a boutique café that doubles as an art gallery.
  sports: Luisa Medina enjoys weekend hikes on the San Bernardino trails with the local Outdoor Explorers club, practices yoga at Sunrise Flow Studio for balance, and follows the Los Angeles Lakers, Los
    Angeles Dodgers, and the LA Galaxy, occasionally cheering them on at games with friends.
  arts: Luisa Medina immerses herself in the Inland Empire’s vibrant art scene, sketching watercolors of street‑art festivals inspired by murals reminiscent of Diego Rivera, attending gallery openings featuring
    emerging artists like Maya Ortiz, and drawing creative inspiration from musicians such as Lila Downs and indie band Khruangbin.
  travel: Luisa Medina prefers culturally immersive trips, having explored Oaxaca’s culinary markets, the historic neighborhoods of San Miguel de Allende, a weekend wine‑tour in Napa Valley, and a solo
    backpacking adventure through the Pacific Northwest, always planning itineraries that blend art galleries, local festivals, and budget‑friendly hostels.
  culinary: Luisa Medina loves cooking traditional mole poblano, street‑style tacos al pastor, and inventive fusion dishes like quinoa‑stuffed chiles, frequently experimenting with ingredients like fresh
    cilantro, roasted pepitas, and aged Oaxacan cheese while pairing meals with crisp Sauvignon Blanc or robust Malbec.
  core: Luisa Medina is a curious, organized twenty‑eight‑year‑old who balances her love for art, food, and fitness with a disciplined work ethic, a penchant for budgeting, and a habit of turning every
    spare moment into a creative sketch or culinary experiment.
background:
  cultural: Luisa was raised in a bicultural Mexican‑American household where family gatherings centered around homemade enchiladas, papel picado decorations, and celebrations of Día de los Muertos. Her
    parents emphasized the value of community, respect, and perseverance. Growing up in Southern California, she blended these traditions with the diverse influences of the region, speaking both Spanish
    and English fluently, and participating in local festivals that showcase Latinx heritage. This rich cultural tapestry informs her culinary tastes, artistic sensibilities, and her commitment to fostering
    inclusive spaces wherever she works.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (English/Spanish)'', ''Cash Handling'', ''Food Safety Compliance'', ''Menu Knowledge (Mexican & American cuisines)'', ''Wine Pairing Basics'',
