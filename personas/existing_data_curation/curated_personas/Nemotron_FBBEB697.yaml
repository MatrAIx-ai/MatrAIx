personas:
  professional: Tywan Thomas, a 16-year-old self-taught digital illustrator, uses Photoshop and Illustrator to craft album covers and social-media graphics for local musicians while applying meticulous
    bullet-journal-style project planning and a competitive drive that pushes them to meet tight deadlines and exceed client expectations.
  sports: Tywan Thomas plays pick-up basketball with friends at the local community center, follows the Alabama Crimson Tide football team and the Birmingham Barons baseball club, and maintains a disciplined
    workout routine that blends cardio drills with strength training on weekends, viewing competition as a way to sharpen the strategic mindset honed through chess.
  arts: Tywan Thomas frequently visits the Birmingham Museum of Art to study exhibits featuring local artists who explore the city's civil-rights legacy, draws inspiration from jazz legends like John Coltrane
    and gospel greats such as Mahalia Jackson, and channels that influence into both their digital illustrations and beat-making projects.
  travel: Tywan Thomas enjoys planning weekend road trips to culturally rich Southern cities like New Orleans for its jazz festivals and Savannah for its historic squares, while dreaming of a future study-abroad
    stint in London to experience street art and museum collections, all within a modest budget that balances school responsibilities.
  culinary: Tywan Thomas loves the comfort of collard greens cooked with smoked turkey, buttermilk fried chicken, and sweet tea, often experimenting by adding a homemade hot-pepper glaze to the chicken
    while occasionally trying new dishes like sushi rolls when friends host multicultural potlucks.
  core: Tywan Thomas blends disciplined organization, a love for jazz-infused digital art, and a skeptical yet curious mindset into a teen life driven by strategic creativity and community-focused ambition.
background:
  cultural: Tywan grew up in Birmingham’s historically rich Black neighborhoods, where the legacy of the civil rights movement and a vibrant music scene shape daily life. His family attends a Southern Baptist
    church that emphasizes gospel singing, community service, and storytelling, reinforcing a strong sense of solidarity and cultural pride. He participates in youth programs at the Birmingham‑Jefferson
    County Public Library and attends workshops hosted by the Alabama Jazz Hall of Fame, deepening his appreciation for blues, jazz, and soul traditions. Family gatherings feature Southern cuisine such
    as collard greens, fried chicken, and sweet tea, and intergenerational conversations often highlight the city’s role in the struggle for equality. Contemporary Black culture, including hip‑hop, street
    art, and social media discourse, also influences his identity, creating a blend of Southern heritage and modern expression.
