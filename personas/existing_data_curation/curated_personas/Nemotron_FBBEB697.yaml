  hobbies: '[''Digital illustration'', ''Listening to jazz and blues'', ''Beat making'', ''Chess'', ''Science fiction reading'', ''Street photography'', ''Bullet journaling'', ''Pick-up basketball'', ''Visiting
    local art exhibits'', ''Exploring African-American cultural history'']'
  career_goals: Tywan aims to earn his GED within the next year and then enroll in a community college program focused on graphic design or multimedia arts. He intends to develop a robust digital art portfolio
    that will allow him to secure freelance commissions or join a design studio after completing his studies. Parallel to his visual‑art aspirations, he plans to refine his music production skills and eventually
    launch a YouTube channel that blends art tutorials with original beats. Long‑term, he envisions creating a community art space in Birmingham where local youth can learn digital creation tools, fostering
    the same curiosity and disciplined learning he values. He also remains open to exploring a career in indie game design, leveraging his coding basics and artistic sensibility.
