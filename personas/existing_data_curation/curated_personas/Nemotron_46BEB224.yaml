personas:
  professional: Ana Redrick is a hands‑on maintenance technician who combines a methodical, safety‑first mindset with a competitive drive to streamline building operations, regularly logging HVAC, electrical,
    and plumbing work, reading blueprints, and leading small repair crews, all while charting a path toward HVACR, NATE, and OSHA certifications and a future facilities‑manager role where they can mentor
    emerging trade professionals.
  sports: Ana Redrick is a regular on the River City Co‑ed Softball League, playing third base, and participates in weekly weight‑lifting challenges at the IronWorks Gym; they follow their hometown's professional
    baseball team, the River City Rangers, and the local basketball squad, the Tigers, using the games as performance benchmarks while incorporating baseball conditioning drills into their fitness routine.
  arts: Ana Redrick cultivates a love for gospel and R&B, often listening to Aretha Franklin, Marvin Gaye, and Kirk Franklin while working on projects, and balances this with a habit of reading non‑fiction
    science and technology books by authors such as Neil deGrasse Tyson and Mary Roach, which fuels their curiosity and informs their DIY innovations.
  travel: Ana Redrick enjoys planning road trips that blend technical curiosity with relaxation, favoring destinations like Austin, Texas for a renewable‑energy summit, Boulder, Colorado for hiking, New
    Orleans for soul‑food tastings, and Seattle for tech museum tours; they typically book budget‑friendly Airbnb stays, use airline miles, and prefer self‑driven journeys that let them inspect local building
    practices and fuel their love of sustainable design.
  culinary: Ana Redrick is an avid home cook who balances family‑rooted Southern soul food like fried catfish, collard greens seasoned with smoked paprika, and sweet potato pie with experimental dishes
    such as quinoa‑infused jambalaya, using a well‑worn cast‑iron skillet and a secret blend of cayenne, thyme, and garlic to add a modern twist to traditional flavors.
  core: Ana Redrick is a methodical, competitive DIY enthusiast who blends hands‑on maintenance expertise with a love for Southern cooking, gospel rhythms, strategic finances, and community mentorship.
background:
  cultural: Ana identifies as African‑American and grew up in the Southern United States, where church, family gatherings, and community solidarity shaped her early life. Her upbringing emphasized a strong
    work ethic, respect for elders, and the importance of mentorship. She celebrates Black cultural traditions through music, food, and participation in local heritage events, while also embracing the broader
    Southern culture of hospitality and community service. Living in Clarksville, a diverse yet predominantly white region, has inspired her to be an ambassador for Black representation in the trades and
    to bridge cultural gaps through outreach and education.
attributes:
  skills: '[''HVAC troubleshooting'', ''Electrical wiring and fault diagnosis'', ''Basic plumbing repairs'', ''Preventive maintenance planning'', ''Blueprint reading'', ''Hand and power tool operation'',
    ''Minor welding'', ''Inventory management'', ''Safety compliance (OSHA, EPA)'', ''Project coordination'', ''Basic energy efficiency assessment'']'
  hobbies: '[''DIY home automation projects'', ''Restoring vintage furniture'', ''Reading science and technology non‑fiction'', ''Co‑ed softball league'', ''Community renewable‑energy workshops'', ''Chess
    club'', ''Weight‑lifting competitions'', ''Cooking Southern soul food'', ''Listening to gospel and R&B music'']'
  career_goals: Ana aims to advance from a general maintenance worker to a certified facilities manager within the next five years. She plans to earn certifications such as HVACR, NATE, and OSHA 30, and
    to complete a bachelor's degree in facilities management or engineering technology. Her competitive drive pushes her to seek supervisory roles, lead larger maintenance teams, and eventually start her
    own maintenance consulting business focused on sustainable building practices. She also wants to mentor other young Black professionals entering the trades, fostering a supportive community and promoting
    diversity in the field.
