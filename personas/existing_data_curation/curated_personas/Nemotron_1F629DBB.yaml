  hobbies: '[''Reading speculative fiction'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening'', ''Birdwatching'', ''Hiking on local trails'', ''Yoga/meditation'', ''Building Arduino projects'', ''Playing
    strategy video games'', ''Knitting'', ''Volunteering as science fair judge'']'
  career_goals: Kellyn aims to become the district STEM coordinator within the next five years, establishing a network of after‑school robotics and maker clubs that serve both elementary and middle‑school
    students. She plans to earn a doctorate in education focused on teacher agency, resilience, and innovative assessment methods, and to publish a guide on balancing curiosity‑driven learning with practical
    evaluation. Long‑term, she aspires to influence state education policy to promote equitable STEM access while preserving teacher autonomy, and eventually to mentor new teachers in evidence‑based, flexible
    instructional practices.
