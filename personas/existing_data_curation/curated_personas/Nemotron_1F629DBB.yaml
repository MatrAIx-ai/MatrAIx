personas:
  professional: Kellyn Marroquin, a seasoned STEM educator with a mechanical engineering background, designs inquiry‑based curricula that weave hands‑on Arduino labs and flexible, curiosity‑driven lessons
    into the elementary and middle‑school classroom, consistently questioning conventional assessments while occasionally scrambling to meet district deadlines.
  sports: Kellyn Marroquin, an avid hiker of the Loess Hills and birdwatcher, follows the Iowa State Cyclones football team and occasionally joins the local community running club for weekend trail runs,
    while preferring solo nature walks over organized team sports.
  arts: Kellyn Marroquin, a speculative‑fiction aficionado who devours works by N.K. Jemisin and Ted Chiang, enjoys listening to folk‑rock artist Sufjan Stevens and classic albums by Neil Young, and attends
    the Denmark community theater’s production of “Our Town” whenever possible, finds inspiration for classroom projects in the visual storytelling of Ansel Adams photography.
  travel: Kellyn Marroquin, who favors low‑key, nature‑focused trips, has road‑tripped to Badlands National Park and spent a weekend exploring Copenhagen’s bike‑friendly streets, while planning future visits
    to the Pacific Northwest’s volcanic landscapes, all within a modest travel budget that balances family obligations and anxiety‑related travel constraints.
  culinary: Kellyn Marroquin, a modest home cook who cultivates tomatoes, kale, and beans in a small garden, delights in preparing fresh ratatouille, herb‑roasted chicken with rosemary and thyme, and buttery
    cornbread, experiments weekly with new garden‑to‑table recipes, yet avoids overly spicy dishes and occasionally over‑salts meals when stressed.
  core: Kellyn Marroquin, a 46‑year‑old introspective STEM teacher, channels relentless curiosity and anxiety into inventive classroom tech, quietly wrestles with deadlines, and finds solace in solitary
    garden tinkering and speculative‑fiction reading.
background:
  cultural: Kellyn grew up on a family farm near Des Moines in a predominantly white, Midwestern community with Danish and German ancestry. The town’s slow‑paced, community‑oriented culture fostered values
    of self‑reliance, modesty, and a strong work ethic. Her parents emphasized education, encouraging her to pursue a STEM degree at Iowa State University, where she earned a bachelor's in mechanical engineering.
    After graduating, she transitioned to teaching, driven by a desire to share her curiosity with younger learners. Living in Denmark, IA—a tight‑knit town of roughly 7,000—she participates in local volunteer
    traditions, such as the county fair and the school’s parent‑teacher association, while maintaining a quiet independence. Her cultural identity blends pragmatic Midwestern sensibility with a quiet, personal
    curiosity about the broader world.
attributes:
  skills: '[''STEM curriculum development'', ''Differentiated instruction'', ''Classroom technology integration'', ''Project‑based learning facilitation'', ''Data‑driven assessment'', ''Problem‑solving
