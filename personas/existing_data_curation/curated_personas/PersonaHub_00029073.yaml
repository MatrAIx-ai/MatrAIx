persona_description: A GIS application developer who specializes in the development of software tools for ecosystem service assessments and social value mapping. They are skilled in using geographic information
  systems (GIS) and have experience with software such as ArcGIS. They are familiar with the needs of decision-makers and researchers in evaluating the social value of ecosystems and facilitating discussions
  among diverse stakeholders regarding the tradeoffs among different ecosystem services in a variety of physical and social contexts. They are interested in extending the functionality of existing software
  tools and developing new tools that can be used to map and quantify social values associated with ecosystem services. They are also interested in using software tools to evaluate the social value of ecosystems
  and facilitate discussions among diverse stakeholders.
