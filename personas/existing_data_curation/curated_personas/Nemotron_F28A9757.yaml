personas:
  professional: Carol Espinales, a retired household manager turned community volunteer, leverages their meticulous budgeting, sewing, and event‑planning skills to coordinate senior‑center cooking classes
    and neighborhood festivals, all while channeling their competitive edge into leading card‑game gatherings.
  sports: Carol Espinales, an avid walker who joins the senior aerobics class at the community center, follows the River City Mariners baseball team each spring, and participates in a weekly low‑impact
    tennis group for seniors, preferring gentle cardio over high‑intensity workouts.
  arts: Carol Espinales, a dedicated crocheter and folk‑dance enthusiast, fills evenings with the melodies of singer Lila Torres, devours the telenovela "Corazón Valiente", and volunteers in the church
    choir that sings traditional hymns, letting these artistic outlets shape their social identity.
  travel: Carol Espinales, a pragmatic traveler who plans trips months ahead, enjoys weekend getaways to the nearby Redwood National Park and the cultural festival in Santa Fe, prefers group tours with
    fellow seniors, and dreams of a leisurely cruise through the Mediterranean, balancing limited pension funds with a love for new experiences.
  culinary: Carol Espinales, a master of traditional corn‑based tamales, fragrant pozole stew, and hand‑rolled tortillas, blends masa, pork, dried chilies, and fresh cilantro with precision, and enjoys
    experimenting with seasonal vegetables while maintaining a modest home‑cooking routine for community events.
  core: Carol Espinales, a routine‑driven yet socially vibrant 69‑year‑old, balances competitive card games, meticulous budgeting, and heartfelt community cooking, while wrestling with bouts of anxiety
    that fuel both their zeal and occasional impulsive splurges.
background:
  cultural: Carol was raised in a Mexican‑American household in El Paso, Texas, where Spanish and English intertwine. Her family life centers on Catholic traditions, Día de los Muertos celebrations, and
    communal cooking that honors Mexican heritage. The border city’s blend of Mexican customs and Texan influences shapes her identity, fostering a deep respect for cultural rituals while embracing the
    practical realities of everyday life in a multicultural community.
