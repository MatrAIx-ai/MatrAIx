  career_goals: Julio’s primary career ambition is to transition from senior developer to technical leader who can shape product strategy while still rolling up his sleeves to code. Over the next five years
    he aims to become a lead engineer or architect at a forward-thinking tech firm, spearheading initiatives that combine cutting-edge cloud microservices with real-world impact—particularly tools that
    serve underrepresented communities. He also dreams of launching his own startup that leverages AI-driven analytics to improve access to health resources for Mexican-American families in the Mountain
    West. Parallel to these goals, Julio wants to mentor Latinx youth through coding bootcamps, speak at conferences about balancing rapid innovation with reliability, and earn recognition as a contributor
    to high-impact open-source projects.
