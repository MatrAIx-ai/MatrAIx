  career_goals: Taylor envisions a future where she can combine her love for people and practical skills in a stable, community‑focused role. She is interested in becoming a school counselor or a community
    health aide, careers that allow her to help others while staying rooted in familiar routines. She also dreams of eventually managing a local family‑run business, such as a café or craft shop, where
    she can apply her organizational abilities and nurture a welcoming environment for neighbors.
