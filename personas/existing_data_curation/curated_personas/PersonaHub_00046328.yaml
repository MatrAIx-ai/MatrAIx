persona_description: A researcher in the field of retinal gene therapy, specifically investigating the use of gene therapy to preserve retinal function in children with late infantile Batten disease (CLN2
  disease). The researcher is particularly interested in the potential of single intravitreal injections of gene therapy to address the disease manifestations and preserve vision in this canine model of
  CLN2 disease. The researcher is skilled in conducting clinical trials, analyzing imaging data, and interpreting results to support the use of gene therapy as an adjunct treatment to central nervous system-targeting
  therapy.
