  career_goals: Although still in kindergarten, Pilar dreams of a future where she can share her love for art and community. She imagines becoming an artist who creates colorful murals for her town, a teacher
    who encourages kids to explore ideas, or even a scientist who invents fun inventions. Her main ambition is to make people smile and work together on creative projects.
