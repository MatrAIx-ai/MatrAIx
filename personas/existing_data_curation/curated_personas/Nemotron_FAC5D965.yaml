personas:
  professional: Julie Hernandez is a budding junior architect who channels her curiosity and practicality into building LEGO sets, often designing her own modifications while staying organized enough to
    follow instructions and flexible enough to improvise when pieces don’t fit; they proudly showcase their creations at Girl Scouts STEM sessions.
  sports: Julie Hernandez loves playing soccer at the neighborhood park, where they coordinate passes with teammates, cheer for the LA Galaxy’s youth academy, and practice dribbling drills after school,
    balancing cooperative play with occasional assertive goal‑calling on the field.
  arts: Julie Hernandez expresses love for nature through vibrant watercolor paintings of forest scenes inspired by the works of Claude Monet and the whimsical illustrations of Shaun Tan, and they keep
    a neatly labelled sketchbook while also allowing spontaneous splatters that betray a playful, slightly messy side.
  travel: Julie Hernandez enjoys weekend hikes on the nearby ridge trail, has a treasured memory of visiting Yosemite National Park’s giant sequoias, and dreams of a future family road trip to the Grand
    Canyon, balancing careful planning with the spontaneous curiosity to explore hidden creek crossings.
  culinary: Julie Hernandez favors homemade pizza topped with pepperoni, mozzarella, and fresh basil, loves helping whisk taco filling with shredded chicken, corn, and cilantro, and often experiments in
    the kitchen by adding extra cheese, while occasionally sneaking candy bars from the pantry when no one watches.
  core: Julie Hernandez is an eight‑year‑old LEGO‑builder, soccer enthusiast, and nature‑artist who balances meticulous planning with spontaneous creativity, but can’t resist a midnight cookie crumb trail.
background:
  cultural: Julie is raised in a middle‑class white family in Salt Lake City, Utah. Her upbringing reflects the region’s emphasis on family togetherness, outdoor recreation, and community involvement, often
    shaped by the local LDS cultural environment. Family gatherings, school events, and seasonal outdoor activities like hiking and skiing are integral parts of her cultural experience.
