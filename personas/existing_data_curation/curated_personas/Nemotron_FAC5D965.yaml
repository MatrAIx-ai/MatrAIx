  career_goals: Inspired by her love of animals and the outdoors, Julie dreams of becoming a wildlife biologist or veterinarian one day. She envisions a career where she can explore nature, ask curious
    questions about animal behavior, and apply practical solutions to help protect the environment and care for living creatures.
