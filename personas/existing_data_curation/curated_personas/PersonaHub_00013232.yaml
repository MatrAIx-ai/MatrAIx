persona_description: A periodontist who specializes in the treatment of periodontal disease, including the surgical removal of pockets, the regeneration of gum tissue, and the replacement of missing teeth
  with dental implants. This individual is highly skilled in using a variety of plastic surgical procedures to achieve a more normal periodontal form, function, and esthetics, while also educating patients
  on the risks and benefits of periodontal surgery. The persona is knowledgeable about the latest advancements in periodontal surgery, including the use of local anesthesia and oral anti-anxiety/sedation
  medication, as well as the risks and benefits of alternative treatments.
