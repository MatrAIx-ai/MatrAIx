personas:
  professional: A seven‑year‑old aspiring engineer named Chun Hu builds intricate LEGO structures, turning each project into a miniature blueprint, and approaches problem‑solving with the same methodical,
    routine‑driven precision that makes them a reliable partner for school science fair teams.
  sports: Chun Hu joins the local youth soccer club, the River Rapids U‑7 team, loves the fast‑paced drills that mirror the strategic thinking they use in chess, and cheers for the professional team the
    Metro City Eagles, while also taking part in weekend swimming lessons at the community pool.
  arts: Chun Hu spends quiet afternoons practicing simple calligraphy strokes passed down through generations, channels that precision into LEGO sculpting, and enjoys listening to traditional folk instrument
    music by artists such as the Silk Strings Ensemble, while their imagination soars through fantasy novels by authors like J.K. Rowling, which inspire their own storytelling sketches.
  travel: Chun Hu's family weekend trips include visits to the nearby science museum and the regional botanical garden, and the child dreams of exploring the ancient stone citadel of Machu Picchu one day,
    but prefers the comfort of well‑planned itineraries that balance structured activities with a few unstructured play moments.
  culinary: Chun Hu loves the warm comfort of noodle soup with thin carrots and soy‑based broth, enjoys assembling simple steamed dumplings with fillings of ground chicken and finely chopped vegetables,
    and, while still a novice chef, proudly helps whisk egg‑drop mixtures for breakfast, often seasoning dishes with a pinch of ginger and a drizzle of sesame oil.
  core: A methodical seven‑year‑old builder named Chun Hu turns routine into adventure, meticulously managing coins, calligraphy, and LEGO creations while quietly challenging friends at chess and savoring
    noodle soups.
background:
  cultural: Chun is raised in a Chinese‑heritage immigrant family in Westland, Michigan. At home, he hears both English and Mandarin, and his family celebrates cultural events such as Chinese New Year and
    the Lantern Festival. The household emphasizes diligence, respect for elders, and academic achievement, reinforcing Chun's preference for routine, organization, and practical goals. He attends a public
    elementary school that offers a bilingual program, participates in weekend calligraphy classes, and occasionally joins community activities like lion‑dance rehearsals, all of which blend his East Asian
    cultural roots with his life in the United States.
