  career_goals: Although still young, Chun dreams of becoming a robotics or engineering professional who designs reliable, well‑ordered machines. He aims to participate in school science fairs and robotics
    competitions, hoping to place among the top winners. His competitive streak fuels a desire to be recognized as a top student in math and science, and he imagines one day creating robots that help with
    everyday tasks.
