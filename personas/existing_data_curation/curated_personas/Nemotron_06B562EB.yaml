personas:
  professional: A seasoned community craftsman and volunteer docent, Joshua Currie merges his woodworking expertise, desert watercolor painting, and genealogical research to lead intergenerational art workshops
    at the senior center, and they approach each event with a relaxed, sociable style that tolerates a certain degree of disorganization.
  sports: A member of the senior center walking club and local pickleball league, Joshua Currie enjoys gentle daily strolls along the Rio Grande, friendly pickleball matches, and cheering on the El Paso
    Chihuahuas baseball team while they comfortably blend activity with passive sports viewing.
  arts: An avid watercolorist inspired by Georgia O'Keeffe’s desert scenes, a devoted volunteer docent at the El Paso Museum of Art, and a jazz‑and‑blues enthusiast who harmonica‑accompanies the melodies
    of John Coltrane and B.B. King, Joshua Currie weaves these artistic passions into community theater outings and informal music gatherings, and they cherish the creative exchange.
  travel: A spontaneous road‑tripper who favors short drives to Carlsbad Caverns, White Sands National Park, and Santa Fe’s historic adobe district, Joshua Currie plans outings loosely around senior center
    events and budget constraints, and they delight in sharing the journey with fellow retirees.
  culinary: A capable home cook of southwestern fare, Joshua Currie delights in preparing green chile enchiladas, carne asada tacos, and hearty posole seasoned with fresh nopales, roasted chile verde, cumin,
    and masa harina sourced from the local farmers market, and they often experiment with new spice blends out of sheer curiosity.
  core: Joshua Currie, an 85‑year‑old desert‑loving watercolorist, jovial harmonica player, and community‑centric handyman, blends curiosity with a relaxed, slightly disorganized lifestyle to keep art,
    history, and friendships thriving in his later years, and they never miss a chance for a good crossword puzzle.
background:
  cultural: Joshua’s cultural background is rooted in an Anglo‑American family lineage—his grandparents emigrated from England and Ireland to the Midwest, where he was raised with a blend of Protestant
    work ethic and small‑town community values. After serving in the U.S. Army during the early 1950s, he settled in Texas and, in his later years, made El Paso his home. Living on the U.S.–Mexico border
    has immersed him in a vibrant Hispanic culture; he enjoys Mexican‑American cuisine, participates in local fiestas, and has learned basic Spanish to converse with neighbors. While he identifies as a
    white American, his daily life reflects a hybrid of Southwestern customs, frontier independence, and a deep respect for the multicultural tapestry of the Rio Grande region.
