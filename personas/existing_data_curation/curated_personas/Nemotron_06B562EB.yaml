  career_goals: Joshua aims to compile a memoir and a digital archive of his family’s oral histories for his grandchildren, deepen his involvement with the El Paso Museum of Art as a volunteer docent, learn
    conversational Spanish to better engage with his Hispanic neighbors, and continue organizing intergenerational art workshops at the senior center. He also hopes to maintain his health through regular
    walks along the Rio Grande and stay socially active, ensuring his later years are filled with learning, creativity, and community contribution.
