persona_description: A historian who specializes in the study of the history of the Christian church, particularly the events leading up to and following the ascension of Jesus Christ from Jerusalem. They
  are particularly interested in the role of Jerusalem in the life and teachings of Jesus, as well as the significance of Jerusalem in the formation of the early Christian church and its missionary activities.
  They are also knowledgeable about the geography of the region and the cultural and historical context in which the events described in the text took place.
