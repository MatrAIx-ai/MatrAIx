personas:
  professional: Mariana Gonzalez, a bilingual pastoral counselor and community arts coordinator at her church, leverages her graduate arts training, meticulous grant-writing abilities, and outgoing, curious
    nature to weave heritage-rich art and music into worship services while navigating funding challenges with assertive yet compassionate leadership.
  sports: Mariana Gonzalez enjoys gentle weekend hikes on nearby nature trails, participates in a senior walking club, and follows the Tampa Bay Buccaneers and the local women's soft-ball league, preferring
    low-impact activity that sustains her energy without overexertion.
  arts: Mariana Gonzalez spends afternoons painting watercolor vistas of her hometown bay, sings salsa and son classics by Celia Cruz and Buena Vista Social Club in her church choir, and draws artistic
    inspiration from Frida Kahlo, Diego Rivera, and the poetry of Pablo Neruda, weaving these influences into her community workshops.
  travel: Mariana Gonzalez prefers organized, culturally immersive trips with her faith group, having explored Havana's historic plazas, the colonial charms of Granada, Spain, and the sun-kissed streets
    of Key West, while dreaming of a quiet pilgrimage to the Santiago de Compostela cathedral.
  culinary: Mariana Gonzalez, an adept home chef, regularly prepares hearty ropa vieja, crisp plantain fritters, and aromatic moros y cristianos seasoned with cumin, garlic, and fresh cilantro from her
    garden, and occasionally indulges in a rich chocolate mousse at local bistros.
  core: Mariana Gonzalez, a 64-year-old bilingual pastor-artist, channels boundless curiosity and community spirit into watercolor and choir, yet battles chronic worry that fuels midnight snacking on plantain
    chips.
background:
  cultural: Mariana was born and raised in Cuba, absorbing the island's vibrant blend of Spanish, African, and Caribbean influences. Her family upheld Catholic traditions infused with Afro‑Cuban syncretic
    practices, fostering a deep appreciation for ritual, music, and storytelling. After immigrating to the United States, she settled in Tampa's historic Ybor City, a hub of Cuban exile culture, where she
    became an active member of the local Cuban-American community. She maintains strong ties to Cuban cuisine, dance, and visual arts, and she often incorporates these cultural elements into her religious
    work to create inclusive, resonant experiences for congregants of diverse backgrounds. Her bilingual fluency and cultural fluency allow her to bridge generational gaps, supporting both first‑generation
    immigrants and younger Cuban-Americans navigating dual identities.
attributes:
  skills: '[''bilingual Spanish-English communication'', ''pastoral counseling'', ''conflict mediation'', ''community outreach coordination'', ''event planning and execution'', ''cultural programming and
