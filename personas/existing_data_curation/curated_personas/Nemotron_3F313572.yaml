  hobbies: '[''watercolor painting'', ''listening to and dancing to Cuban salsa music'', ''cooking traditional Cuban dishes'', ''reading theological and literary works'', ''visiting art museums and galleries'',
    ''gardening'', ''walking in local nature trails'', ''volunteering at community senior centers'', ''singing in the church choir'', ''knitting'', ''genealogy research'']'
  career_goals: Mariana aims to deepen the integration of art and cultural heritage within her faith community, establishing a dedicated cultural arts center attached to her church that offers workshops,
    exhibitions, and music performances celebrating Cuban traditions. She aspires to mentor the next generation of religious leaders, particularly those from immigrant backgrounds, fostering a supportive
    network for intercultural ministry. Writing a memoir that weaves together her personal faith journey, Cuban roots, and experiences as a senior religious worker is also a priority. Additionally, she
    seeks to secure sustainable funding for mental‑health counseling programs within her congregation, addressing the stress and worry that she knows many members face.
