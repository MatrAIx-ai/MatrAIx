persona_description: A geoscientist who specializes in geodetic surveying and positioning, particularly using the International Terrestrial Reference Frame (ITRF) and the WGS84 reference frame to accurately
  measure and adjust geocentric coordinates around the Earth's surface. The geoscientist works with data from GPS satellites and astronomical observations to compute latitudes, longitudes, and heights,
  and uses these coordinates to establish a reference frame and datum for accurate work. The geoscientist is familiar with the complexities of tectonic plate movement and continental drift, and uses these
  concepts to define reference times and epochs for positions established using the reference frame and datum. The geoscientist is highly skilled in using mathematical adjustments and geometric transformations
  to turn geocentric coordinates into latitude, longitude, and height above the Ellipsoid ⁄ Spheroid.
