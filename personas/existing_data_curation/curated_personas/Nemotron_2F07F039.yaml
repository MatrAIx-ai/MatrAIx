personas:
  professional: Juan Riyad is a network architect and cloud solutions leader whose vivid imagination fuels user-centric digital platforms that weave indigenous visual motifs into seamless experiences, and
    their relaxed, sometimes disorganized approach to deadlines is balanced by deep empathy for teammates and a commitment to mentoring emerging technologists within their community.
  sports: Juan Riyad is an avid solo hiker who spends weekends traversing the Mesa-surrounding desert trail and belongs to the Desert Trail Hikers Club, while cheering on the Arizona Cardinals in football
    and the Phoenix Suns during the NBA season, and they occasionally practice light rock-climbing at local crags to maintain flexibility.
  arts: Juan Riyad devotes evenings to digital painting and 3D visualizations inspired by native mythologies, often channeling the hyperreal aesthetic of Beeple and the ambient soundscapes of Brian Eno
    and Tycho while penning speculative short stories that echo the magical realism of Neil Gaiman, and they regularly attend local immersive art installations and virtual-reality showcases.
  travel: Juan Riyad prefers solitary, contemplative journeys, having trekked the red rocks of Sedona and the night skies of the Grand Canyon, and they dream of remote cultural immersion trips to the ancient
    ruins of Machu Picchu, the aurora-lit landscapes of Iceland, and the tribal festivals of Oaxaca, often planning trips on a whim with minimal itineraries to preserve flexibility.
  culinary: Juan Riyad enjoys cooking at an intermediate level, favoring southwestern flavors such as chile verde enchiladas and cactus (nopales) tacos, while their favorite dish to perfect is a smoky quinoa-and-avocado
    salad dressed with lime, cilantro, and roasted corn, and they relish savoring freshly roasted amaranth-infused street tacos during community gatherings.
  core: Juan Riyad is a 42-year-old tech visionary who blends deep network expertise with vivid artistic imagination, prefers solitude, and navigates life with compassionate mentorship, occasional disorganization,
    and an undercurrent of worry.
background:
  cultural: Juan is an American Indian who grew up in the rural community of Aztec, New Mexico, within San Juan County. His heritage ties him to the Pueblo peoples of the Southwest, whose cultural values
    emphasize harmony with nature, storytelling, and community cooperation. He was raised steeply in the traditions of oral history, native crafts, and seasonal ceremonies, which inform his deep respect
    for cultural preservation. Though he left formal schooling early, he pursued self‑directed learning and leveraged his cultural roots to bridge technology with tradition, often volunteering to digitize
    tribal archives and create multimedia resources that keep his people's language and narratives alive.
attributes:
  skills: '[''Network infrastructure design and maintenance'', ''Server and cloud services administration (AWS, Azure)'', ''IT project coordination'', ''User‑centric UI/UX design with cultural motifs'',
    ''Digital storytelling and multimedia production'', ''Cybersecurity basics and risk assessment'', ''Cross‑cultural communication and community outreach'', ''Technical mentorship and training'', ''Data
    management and archival systems for indigenous records'', ''Problem‑solving under flexible, low‑stress constraints'']'
  hobbies: '[''Digital painting and 3D modeling inspired by indigenous mythologies'', ''Composing ambient electronic music'', ''Writing speculative fiction that merges tech and folklore'', ''Solo hiking
    and desert photography'', ''Stargazing and astrophotography'', ''Studying tribal oral histories and languages'', ''Learning new programming languages as a hobby'', ''Mindfulness meditation and stress‑relief
    practices'']'
  career_goals: Juan aims to lead a digital transformation for his tribal community, creating accessible technology that preserves language and heritage while narrowing the digital divide. He envisions
    developing a suite of culturally‑tailored applications—such as a language‑learning app and a communal health‑monitoring platform—that empower elders and youth alike. In the next five years, he hopes
    to become the chief technology officer of the tribal council, mentor a cadre of younger indigenous technologists, and gain recognition for innovative, user‑friendly solutions that blend modern design
    with traditional aesthetics. He also seeks to maintain a flexible schedule that protects his mental wellbeing.
