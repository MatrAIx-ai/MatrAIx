personas:
  professional: An aspiring auditor, Jonathan Brock leverages his advanced Excel, VBA macro, and SAP FI expertise, disciplined organization, and curiosity for creative industries to deliver meticulous audit
    engagements at a Big Four firm.
  sports: A weekend hiker and casual soccer player, Jonathan Brock joins the North Carolina Hiking Club for trail treks in Umstead State Park, follows the Charlotte Hornets and UNC Tar Heels, and plays
    intramural soccer on Saturdays, balancing fitness with strategic thinking.
  arts: A contemporary art enthusiast, Jonathan Brock spends weekends at the North Carolina Museum of Art, sketches observations in a personal sketchbook, and performs acoustic guitar at Java City open‑mic
    nights, drawing creative inspiration from artists like Banksy and musicians such as Bon Iver.
  travel: A curious traveler, Jonathan Brock has explored Asheville’s vibrant art scene, trekked the coastal trails of Vancouver, and plans a future trip to Kyoto’s historic temples to experience the blend
    of tradition and modernity, preferring itineraries that mix cultural immersion with outdoor adventure.
  culinary: An eager home cook, Jonathan Brock favors quick yet flavorful dishes such as shrimp and grits seasoned with Cajun spice, homemade pesto pasta with fresh basil and garlic, and spicy kimchi fried
    rice with gochujang, while often resorting to late‑night pizza takeout during intensive study sessions.
  core: Jonathan Brock is a detail‑obsessed accounting enthusiast who balances spreadsheets with sketchbooks, finds solace in meditation and hikes, and battles a perpetual inner critic that fuels both ambition
    and anxiety.
background:
  cultural: Jonathan grew up in a middle‑class, suburban family in Cary, where his parents—both college‑educated professionals—emphasized the value of hard work, community involvement, and education. The
    town’s blend of Southern hospitality and the progressive atmosphere of the Research Triangle has given him exposure to diverse cultural events, from local craft fairs to tech meet‑ups. Attending a public
    high school with a strong arts program fostered his appreciation for visual art, while his Catholic upbringing instilled a sense of cooperation and service to others. Living in Wake County, he benefits
    from a multicultural environment that encourages open‑mindedness, yet his family’s roots in the Mid‑Atlantic region keep him grounded in traditional white American customs—such as celebrating holidays
    with family gatherings, enjoying seasonal outdoor activities, and valuing modesty and courtesy. This mixture of Southern‑influenced community values, academic ambition, and exposure to the region’s
    innovative spirit shapes his worldview.
