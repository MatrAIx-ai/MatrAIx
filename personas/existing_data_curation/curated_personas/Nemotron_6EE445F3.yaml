  career_goals: Jon aims to earn his CPA license within the next two years, followed by a Master of Accounting to deepen his technical expertise. His short‑term goal is to secure a full‑time analyst position
    at a Big Four firm, where he can hone his audit and advisory skills across diverse industries, including the creative and tech sectors that fascinate him. In the medium term, he aspires to become a
    senior auditor, leading teams on complex engagements and mentoring junior staff. Ultimately, Jonathan envisions a transition into a strategic finance role—such as finance manager or chief financial
    officer—in an organization that values sustainability and artistic innovation, allowing him to fuse his financial acumen with his passion for creative enterprises. He also plans to obtain certifications
    in data analytics (e.g., CPA’s Analytics Credential) to stay at the forefront of finance technology.
