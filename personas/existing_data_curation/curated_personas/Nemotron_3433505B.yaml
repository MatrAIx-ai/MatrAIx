  career_goals: Courtney dreams of one day becoming a marine biologist who helps protect the Gulf’s coastal ecosystems, a goal that merges her curiosity about nature with a practical desire to solve real‑world
    problems. In the near term, she aims to win her middle‑school science fair, improve her math grades, and earn a spot in the school’s advanced STEM program. She also entertains the possibility of pursuing
    music professionally, inspired by New Orleans’s rich jazz heritage, and hopes to use her trumpet skills to contribute to community performances. Ultimately, she envisions a career that allows her to
    combine scientific inquiry, community service, and artistic expression.
