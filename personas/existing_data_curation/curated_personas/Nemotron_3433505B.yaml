personas:
  professional: Courtney Fils, an aspiring multimedia storyteller, blends a love of graphic novels and scientific curiosity by illustrating comic‑style educational pieces for the school library and creating
    simple interactive games on Scratch, balancing independent research with collaborative feedback sessions in a way that reflects their organized yet flexible personality, and they eagerly seek new ways
    to integrate storytelling with technology.
  sports: Courtney Fils participates in youth soccer with the Crescent City Soccer Club, enjoys cheering for the New Orleans Pelicans during the NBA season, and balances solitary jogs around Audubon Park
    with occasional pickup basketball games at the community center, reflecting a reserved yet adaptable attitude toward staying active, and they appreciate the sense of camaraderie when the team scores
    a goal.
  arts: Courtney Fils, an avid fan of graphic novel creators such as Kazu Kibuishi and Jillian Tamaki, spends weekends sketching the ornate arches of the French Quarter while listening to jazz legends like
    Louis Armstrong and pop icons like Billie Eilish, merging classic and contemporary influences into a uniquely eclectic artistic palate, and they often capture the rhythm of the music in their illustrations.
  travel: Courtney Fils, whose travel bucket list includes a family road trip to the Grand Canyon and a future dream of exploring the historic streets of Paris, prefers carefully planned weekend getaways
    that blend educational museum visits with relaxed picnic stops, reflecting an organized yet flexible approach to adventure, and they meticulously research each destination using library resources.
  culinary: Courtney Fils enjoys preparing simple Creole staples like gumbo with andouille sausage, okra, and a dark roux, as well as experimenting with herb‑infused butter for baked potatoes using basil
    and thyme from their balcony garden, demonstrating a practical cooking skill set coupled with a curious taste for flavor layering, and they love sharing their dishes with friends during informal dinner
    parties.
  core: Courtney Fils is a quiet, curiosity‑driven 11‑year‑old who blends meticulous organization with spontaneous creativity, whether sketching cityscapes, coding games, or perfecting a trumpet note, all
    while maintaining a steady allowance budget and a disciplined health routine, and they often pause to reflect on their next creative project.
background:
  cultural: Courtney is rooted in the African‑American community of New Orleans, a city celebrated for its jazz, brass bands, and vibrant Mardi Mardi traditions. Her family participates in local second‑line
    parades and church gatherings that emphasize storytelling, music, and communal support. She has grown up tasting Creole and Cajun cuisine, learning the cultural importance of food as a bridge between
    generations. The city's history of resilience after Hurricane Katrina and its emphasis on community activism inspire Courtney’s interest in environmental stewardship. Through school and neighborhood
    programs, she is exposed to the rich tapestry of African‑American art, literature, and oral history that shape her identity and worldview.
