personas:
  professional: Miriam Riveracolon is a precision hair stylist in Austin who blends advanced balayage techniques with bold acrylic‑inspired color palettes, using empathic client consultations and bilingual
    fluency to create art‑like looks while efficiently running salon operations with meticulous scheduling and inventory management.
  sports: Miriam Riveracolon enjoys weekend hikes in the Texas Hill Country with a local trail club, supports Austin FC by attending live matches at Q2 Stadium, and participates in salsa‑dance fitness sessions
    that double as cardio, while occasionally joining friends for pick‑up basketball games at the community center.
  arts: Miriam Riveracolon immerses herself in Austin's indie art scene, frequently paints acrylic canvases inspired by vibrant textile patterns, admires the works of Frida Kahlo and Jean‑Michel Basquiat,
    curates Instagram stories featuring live performances by local bands such as Black Pumas, and coordinates monthly gallery tours for fellow stylists.
  travel: Miriam Riveracolon prefers curated road trips, having explored the desert towns of New Mexico and the historic streets of Oaxaca, while planning a future visit to Kyoto's art districts, balancing
    travel itineraries with budget constraints and occasional weekend getaways to Hill Country vineyards.
  culinary: Miriam Riveracolon recreates heritage flavors by mastering baleadas with refried beans, salsa, and cheese, crafting tamales with seasonal corn husks, experimenting with plantain‑based sauces,
    and enjoys sharing these dishes at neighborhood potlucks, though she often forgets to set timers and ends up with slightly over‑cooked rice.
  core: Miriam Riveracolon is a meticulously organized, art‑infused stylist who channels her anxiety into creative expression, balancing disciplined savings with impulsive artistic splurges while nurturing
    community through hair‑cutting workshops and vibrant cultural gatherings.
background:
  cultural: Born to Honduran parents who immigrated to the United States, Miriam grew up in a bilingual household where Spanish and English intertwined. Her family preserved traditions from Honduras, celebrating
    holidays such as Día de la Virgen de Suyapa with music, dance, and customary dishes, fostering a deep appreciation for her cultural roots. The rich tapestry of Honduran folklore, resonant marimba rhythms,
    and bright textile patterns informs her aesthetic sensibility. Living in Austin, she embraces the city's eclectic cultural landscape, participating in the vibrant Latinx community and blending Central
    American influences with Texan hospitality. This multicultural upbringing shapes her inclusive approach to client care, her love for vibrant color palettes, and her commitment to community service.
attributes:
  skills: '[''Precision hair cutting'', ''Advanced hair coloring (balayage, ombré)'', ''Color theory application'', ''Multi‑texture hair care (curly, coily, wavy)'', ''Client consultation and narrative
    styling'', ''Scalp health assessment'', ''Salon operations management (scheduling, inventory)'', ''Bilingual communication (English/Spanish)'', ''Social media content creation (photography, graphic
    design)'', ''Art‑inspired styling concepts'', ''Basic makeup artistry'', ''Stress‑aware client interaction'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Painting (acrylic, vibrant colors)'', ''Photography (portrait and urban)'', ''Yoga and meditation'', ''Cooking Honduran cuisine (baleadas, tamales)'',
    ''Salsa dancing classes'', ''Hiking in Texas Hill Country'', ''Volunteering with free hair‑styling workshops'', ''Reading contemporary fiction'', ''Attending live indie music concerts'']'
  career_goals: Miriam aims to open a boutique salon in Austin that emphasizes inclusive care for diverse hair types while blending artistic expression with her Honduran cultural heritage. She aspires to
    become a recognized stylist on fashion runways, collaborating with local designers, and to develop a signature line of organic hair‑care products rooted in Central American botanical traditions. Over
    the next five years, she plans to obtain advanced certifications in color theory, attend art residencies to refine her aesthetic, and teach masterclasses at community colleges and beauty schools. Miriam
    also seeks to mentor emerging Latinx stylists, fostering a supportive network that reflects her values of kindness and collaboration, and to integrate wellness practices such as guided meditation for
    clients to address the stress sensitivity she experiences personally.
