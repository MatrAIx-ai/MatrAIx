personas:
  professional: Shayne Tappan, a retired electrical engineer and veteran project manager, channels three decades of expertise in MATLAB‑driven system design, AutoCAD schematics, and multidisciplinary budget
    oversight into volunteer STEM mentorship, while their methodical, reliability‑focused, and sociably talkative nature turns technical workshops into lively collaborative sessions.
  sports: Shayne Tappan, an avid senior swimmer at Cypress Springs Aquatics Club and a devoted Tampa Bay Buccaneers fan, complements their aquatic workouts with daily park walks, weekly pickleball matches
    in the local senior league, and occasional trips to see the Miami Heat, and they also enjoy swapping sports statistics at neighborhood gatherings.
  arts: Shayne Tappan, a lifelong lover of stage and song, fills evenings with productions at the Brevard Center for the Arts—from August Wilson dramas to modern musicals—and enjoys live performances by
    Bob Dylan tribute bands and soulful jazz evenings featuring the music of Aretha Franklin at intimate downtown venues, and they often discuss the shows afterward over coffee with friends.
  travel: Shayne Tappan, a meticulous road‑trip planner, has toured historic St. Augustine and Savannah’s charming districts, and now pursues a bucket‑list pilgrimage to U.S. heritage sites such as Gettysburg,
    Boston’s Freedom Trail, and the National Mall in Washington, D.C., favoring mid‑week museum visits and boutique bed‑and‑breakfast stays, and they often log each stop in a handwritten travel journal.
  culinary: Shayne Tappan, a competent home cook who harvests heirloom tomatoes, bell peppers, and basil from their backyard garden, delights in grilling fresh Florida snapper with mango‑coconut salsa,
    crafting key lime pie from locally sourced limes, and experimenting with roasted sweet potatoes seasoned with rosemary and smoked paprika.
  core: Shayne Tappan, a 67‑year‑old retired engineer who blends methodical problem‑solving with a love for community gatherings, tends a thriving garden, builds intricate model‑railroads, and meticulously
    balances a conservative investment portfolio, while they occasionally splurge on vintage woodworking tools.
background:
  cultural: Shayne grew up in a middle‑class Midwestern household during the post‑war baby‑boom era, where values of hard work, community service, and respect for tradition were emphasized. His ancestry
    traces back to English and German immigrants, and his family maintained a blend of American holidays, classic patriotic celebrations, and seasonal gatherings centered around home‑cooked meals. After
    a career in engineering, he retired to Orange Park, Florida, where he embraced the cultural diversity of the region while retaining the modest, neighborly ethos of his upbringing. He participates in
    local civic groups, volunteers at the senior center, and enjoys longstanding American pastimes such as Fourth of July fireworks, baseball outings, and community volunteerism, all of which reflect a
    balance between his cultural roots and an openness to new ideas.
