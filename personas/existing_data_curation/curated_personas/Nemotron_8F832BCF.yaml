  hobbies: '[''Gardening (vegetable and native plants)'', ''DIY woodworking projects'', ''Hosting dinner parties and game nights'', ''Birdwatching and nature walks'', ''Model railroad building'', ''Volunteering
    at the local senior center'', ''Playing bridge and community card tournaments'', ''Traveling to historic sites'', ''Reading historical non-fiction'', ''Attending local theater and music performances'']'
  career_goals: Even though he is retired from full‑time work, Shayne remains driven to apply his experience for community benefit and personal growth. He aims to serve as a volunteer technical advisor
    for the county’s high‑school robotics and STEM clubs, helping students translate ideas into functional prototypes. He hopes to lead a neighborhood sustainability project that combines solar‑panel installation
    with community garden planning, leveraging his engineering background and love of horticulture. Shayne also wishes to author a practical guide on home energy efficiency for seniors, sharing his knowledge
    through local libraries and online forums. On a personal level, he aspires to travel with his wife to historic sites across the United States, maintain his health through regular swimming and walking,
    and establish a modest scholarship for under‑privileged students interested in STEM.
