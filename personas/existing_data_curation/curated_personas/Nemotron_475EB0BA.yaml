    ''Data organization and spreadsheet management'']'
  hobbies: '[''Reading contemporary Black literature and poetry'', ''Journaling and reflective writing'', ''Yoga and mindfulness meditation'', ''Attending spoken‑word and poetry slam events'', ''Volunteering
    at community garden and food pantry'', ''Cooking soulful, health‑conscious meals'', ''Creating digital collages and mood boards'', ''Listening to jazz, neo‑soul, and hip‑hop'', ''Biking in Prospect
    Park'', ''Visiting art galleries and museum exhibitions'']'
  career_goals: Earlean aims to translate her humanities background and community‑focused skills into a career that blends cultural storytelling, outreach, and mental‑health advocacy. In the near term,
    she seeks an entry‑level position as a community outreach coordinator or program assistant with a nonprofit that serves Black youth and promotes emotional well‑being. She plans to pursue a master’s
    degree in social work or public policy within the next three to five years to deepen her impact. Her long‑term ambition is to design and lead community‑based mental‑health workshops that incorporate
    art, literature, and personal narrative, eventually moving into a program‑director role overseeing city‑wide initiatives.
