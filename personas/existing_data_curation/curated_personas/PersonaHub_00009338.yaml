persona_description: A researcher who studies phytoremediation, particularly the use of plants in treating contaminated soils. She is interested in the effectiveness of phytoremediation processes and the
  use of microbiological indicators to measure soil health. She has conducted research on the ability of pseudometalophyte plants to tolerate and accumulate metals, and has found that combining plants with
  chemistry can be effective in treating contaminated soils. She has also studied the potential of certain plants, such as the Alpine pennycress, for extracting metals from contaminated soils. Her research
  has shown that phytoremediation plants can improve soil health and function, but more time is needed for the phytoremediation to clean up the contamination left by metals in the soil.
