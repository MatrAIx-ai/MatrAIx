  hobbies: '[''Intramural Basketball'', ''Improv Comedy'', ''Board Games'', ''Cooking (Mediterranean recipes)'', ''Hiking'', ''Volunteer Financial Workshops'', ''Live Music Concerts'', ''Social Networking
    Events'']'
  career_goals: Stephen aims to become a Certified Public Accountant (CPA) within the next three to four years and to advance from his current clerk role to senior accountant and eventually accounting manager
    at his firm. He seeks to specialize in financial analysis for tech startups and develop expertise in forensic accounting. Long‑term, he envisions leading a small team to improve operational efficiency
    and, perhaps, launching his own boutique bookkeeping consultancy that offers personalized services to local businesses while mentoring junior staff.
