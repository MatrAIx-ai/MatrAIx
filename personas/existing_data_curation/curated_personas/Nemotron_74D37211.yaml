  career_goals: Melissa aims to advance into a senior procurement leadership role where she can shape organization‑wide sourcing strategies and mentor emerging talent. She is particularly interested in
    spearheading sustainability and ethical sourcing initiatives that align cost efficiency with environmental responsibility. Over the next few years, she plans to develop a streamlined, data‑centric procurement
    framework for her department and to earn certifications such as Certified Professional in Supply Management (CPSM). Eventually, Melissa hopes to transition into a consulting capacity or part‑time instructor
    role at a local community college, sharing her practical knowledge with the next generation of supply chain professionals while maintaining a balanced work‑life schedule as she approaches retirement.
