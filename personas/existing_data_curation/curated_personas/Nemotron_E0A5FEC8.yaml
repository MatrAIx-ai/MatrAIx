personas:
  professional: Carlos Mora, a two‑year‑old budding architect who meticulously aligns wooden blocks into symmetrical towers during playtime, quietly plans each step, and occasionally insists on a “meeting”
    with their stuffed audience before beginning construction, and they proudly explain the design to imaginary colleagues.
  sports: Carlos Mora, a mini‑soccer fan who kicks a soft foam ball around the community park every Saturday, proudly wears a jersey bearing the colors of the local baseball club—the River Runners—and also
    splashes around in a parent‑led swim class at the neighborhood pool, and they always line up their water bottle before joining the others.
  arts: Carlos Mora, an appreciative little viewer of bright animation like 'Sesame Street' and a budding crayon artist who fills sketchbooks with bold swirls after trips to the children's museum, often
    humming Mozart’s 'Eine kleine Nachtmusik' while drawing, and they love to show their creations to the family cat.
  travel: Carlos Mora, a curious explorer who enjoys short family outings to the nearby zoo and the sandy beach, keeps a favorite stuffed giraffe for comfort, dreams of a future visit to Disneyland, and
    prefers meticulously packed diaper bags over spontaneous trips, and they always ask for the front seat in the car.
  culinary: Carlos Mora, a selective diner who champions chicken nuggets, apple slices, and creamy avocado mash, skillfully dips peas into a tiny ranch dip bowl, yet stubbornly resists broccoli despite
    gentle coaxing from caregivers, and they proudly proclaim the chicken nuggets as the best meal in the house.
  core: Carlos Mora, a calm and methodical two‑year‑old who balances a love for organized block towers, coin sorting, and quiet drawing with occasional snack‑time meltdowns and a steadfast curiosity about
    the world, and they never miss a chance to ask 'why?'
background:
  cultural: Carlos is a Mexican‑American toddler raised in a bilingual household in San Antonio, Texas. Both Spanish and English are spoken at home, and he participates in cultural traditions such as Día
    de los Muertos altars, family meals featuring tacos and tamales, and community festivals in Bexar County. His upbringing blends Mexican values of family closeness and respect with the diverse, multicultural
    environment of his city, influencing his early appreciation for art, music, and shared experiences.
attributes:
  skills: '[''Basic motor coordination'', ''Crayon scribbling'', ''Block stacking'', ''Simple language acquisition'', ''Recognition of colors and shapes'', ''Memory of short songs'', ''Following simple
    routines'', ''Early problem solving'']'
  hobbies: '[''Crayon drawing'', ''Building block play'', ''Listening to music'', ''Storytime with picture books'', ''Outdoor nature exploration'', ''Simple puzzles'']'
  career_goals: In the near future, Carlos aims to expand his vocabulary, speak in full sentences, and confidently walk and run. He looks forward to attending preschool where he can socialize in small groups,
    learn to read simple books, and further develop his artistic side through drawing and painting. Long‑term, he dreams of becoming a storyteller or artist who can share his cultural heritage through vivid
    pictures and songs.
