personas:
  professional: Mark Whitmire, a 17‑year‑old self‑taught programmer and digital illustrator, channels curiosity into building indie game prototypes with Python and JavaScript while offering friendly tech
    help to peers, despite a tendency to let unfinished code linger on their desktop.
  sports: Mark Whitmire enjoys low‑key sports, joining a community center pick‑up basketball league on weekends and cheering for the Chicago Bears in the NFL while occasionally following the LA Galaxy during
    the off‑season.
  arts: Mark Whitmire finds creative solace in digital illustration of sci‑fi characters, listening to indie musicians Mitski and Tame Impala, binge‑watching Blade Runner 2049, and attending local comic‑con
    panels featuring creator Brian K. Vaughan.
  travel: Mark Whitmire has explored the Grand Canyon on a school field trip and dreams of wandering Tokyo’s Akihabara district, preferring self‑planned itineraries that blend video‑game themed attractions
    with quiet nature hikes within a modest budget.
  culinary: Mark Whitmire experiments in the kitchen with spicy ramen bowls featuring kombu broth, soft‑boiled eggs, sriracha, and a side of homemade pepperoni pizza topped with fresh mozzarella, basil,
    and a crisp crust.
  core: Mark Whitmire, a 17‑year‑old tech‑savvy dreamer, blends curiosity with practicality in indie game creation, balances cautious finances with occasional impulse buys, manages mild anxiety through
    structured creative work, and prefers solitary or small‑group pursuits over crowded scenes.
background:
  cultural: Mark grew up in Whittier, a suburban city in Los Angeles County with a predominantly white, middle‑class population. His family’s cultural roots are typical of West‑coast American families,
    with occasional ties to Midwestern values of self‑reliance. The local community is shaped by a blend of Southern California’s laid‑back lifestyle, access to diverse media from nearby Los Angeles, and
    a modest degree of Hispanic influence common to the region. Mark’s upbringing emphasized personal responsibility, school‑based extracurriculars, and community service, while his exposure to digital
    culture and popular entertainment has been largely shaped by internet platforms and mainstream American media.
