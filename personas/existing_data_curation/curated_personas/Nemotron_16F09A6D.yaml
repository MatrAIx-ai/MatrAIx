  career_goals: Mark aspires to translate his technical and creative abilities into a career that offers flexibility and low‑stress remote work. He plans to obtain his GED, enroll in a community‑college
    program in computer science or graphic design, and eventually work as a freelance indie game developer or UI/UX designer, where he can blend coding with visual storytelling. He also hopes to build a
    small portfolio of apps or games that convey thoughtful, emotionally nuanced experiences, reflecting his sensitivity. In the longer term, Mark would like to be financially independent enough to support
    his family and contribute to community projects, such as tutoring younger kids in basic computer skills.
