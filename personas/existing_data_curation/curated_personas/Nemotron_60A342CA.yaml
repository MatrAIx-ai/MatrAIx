  career_goals: As she looks ahead, Rosa hopes to turn her love for art into a career that blends creativity with community impact. She aims to attend a specialized high school for visual arts, followed
    by a Bachelor of Fine Arts in Graphic Design or Multimedia Arts. In the long term, Rosa envisions working as a graphic designer or visual storyteller for cultural organizations, creating murals and
    digital campaigns that celebrate Puerto Rican heritage. She also dreams of launching a youth arts program in Volusia County where she can mentor other teens, using her calming demeanor and collaborative
    spirit to foster inclusive creative spaces. Travel and exposure to global art scenes are also on her radar, as she believes that varied experiences will enrich her work.
