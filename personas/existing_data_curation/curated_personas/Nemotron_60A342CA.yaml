personas:
  professional: Rosa Rodriguez is a teenage visual storytelling enthusiast who blends painting, digital illustration, and community mural projects, leveraging their curiosity and calm resilience to experiment
    freely despite a habit of leaving supplies scattered around their workspace.
  sports: Rosa Rodriguez enjoys playing ultimate frisbee with a local youth league, roots for the Orlando Magic in basketball, and occasionally tunes in to the Tampa Bay Buccaneers for football, balancing
    a laid‑back fitness routine with a love for community‑spirit sports.
  arts: Rosa Rodriguez immerses themselves in street art by sketching vibrant Caribbean‑inspired motifs, draws inspiration from artists like Banksy and Frida Kahlo, and frequently listens to musicians such
    as Bad Bunny, Beyoncé, and Lin‑Manuel Miranda while creating reels for Instagram.
  travel: Rosa Rodriguez prefers spontaneous weekend trips, having explored the historic streets of St. Augustine and the art districts of Miami, while dreaming of visiting Barcelona’s murals, Mexico City’s
    vibrant neighborhoods, and the galleries of Berlin on a future art‑focused study abroad.
  culinary: Rosa Rodriguez loves bold flavors, often cooking mango‑salsa tacos, spicy arroz con pollo, and experimenting with plantain‑based dishes, yet their cooking skill level hovers at enthusiastic
    beginner, leading them to rely on quick recipes and occasional take‑out of sushi rolls and pizza.
  core: Rosa Rodriguez is a curious, calm teen who turns every stray moment into a splash of color, even if it means a messy studio and a half‑finished homework assignment.
background:
  cultural: Rosa was raised in a bilingual Puerto Rican household that honors the island’s rich traditions while navigating life in Deland, Florida. Spanish is spoken at home, and family gatherings are
    filled with homemade staples like mofongo, arroz con gandules, and pastelón, accompanied by salsa, reggaetón, and classic Caribbean music. She participates regularly in local celebrations such as the
    annual Puerto Rican Heritage Festival, where she helps with mural projects and dance performances. The close‑knit family values, communal solidarity, and storytelling tradition have shaped her compassionate
    and cooperative outlook. Drawing inspiration from both her island roots and the multicultural fabric of Central Florida, Rosa blends Caribbean color schemes and motifs into her artwork, and she often
    uses her bilingual abilities to bridge cultural gaps in community initiatives.
