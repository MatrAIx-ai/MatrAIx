  hobbies: '["Abstract painting with Dominican motifs", "Reading philosophy and Latin American literature", "Playing competitive chess", "Gardening herbs and tropical plants", "Listening to merengue, bachata,
    and salsa music", "Collecting vintage vinyl records", "Attending community theater performances", "Traveling to Dominican Republic to visit family and explore culinary traditions"]'
  career_goals: Despite being retired from formal employment, Pedro remains driven to make a lasting impact. He aims to compile his family’s recipes and culinary insights into a published cookbook that
    celebrates Dominican heritage. He envisions establishing a monthly community cooking workshop where he mentors younger members of the Dominican diaspora, fostering intergenerational knowledge transfer.
    Pedro also plans to spearhead an annual Dominican arts and music festival in Lawrence, leveraging his event‑planning expertise to showcase musicians, dancers, and artisans. On a personal level, he seeks
    to achieve a senior master ranking in local chess clubs, demonstrating his competitive spirit. Additionally, he aspires to write a memoir chronicling his immigration journey, cultural adaptation, and
    the lessons learned from a life of disciplined creativity. Each goal reflects his desire to blend imagination with organization, ensuring his legacy endures.
