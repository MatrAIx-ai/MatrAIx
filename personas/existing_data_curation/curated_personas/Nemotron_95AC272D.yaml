personas:
  professional: Juana Alvarez is a proactive high school student who leverages her organized mindset and cooperative spirit to lead the soccer team as captain while coordinating her school's food pantry
    volunteer program, sharpening leadership, time-management, and community outreach skills.
  sports: Juana Alvarez plays midfield for her high school’s varsity soccer team, trains with the local youth club River City United, and passionately follows the nearby professional Major League Soccer
    side River City FC, attending matches with friends whenever possible.
  arts: Juana Alvarez channels her creative energy through folkloric dance performances that celebrate traditional stories, immerses herself in teen fiction by authors such as Sarah J. Maas and John Green,
    and finds inspiration in musicians like Selena Gomez and the indie band Vampire Weekend.
  travel: Juana Alvarez prefers structured family trips, having explored the vibrant markets of Oaxaca on a summer vacation, trekked the Redwood National Park during a school field trip, and now dreams
    of visiting the historic streets of Seville, Spain, balancing her desire for cultural immersion with the constraints of a modest teen budget.
  culinary: Juana Alvarez enjoys baking sweetpan de muerto and cinnamon‑sugar churros with her family, mastering the art of folding masa dough for corn tamales, and delights in experimenting with fresh
    strawberries and dulce de leche as toppings, though she sometimes over‑sweetens the pastries in her enthusiasm.
  core: Juana Alvarez is a diligent, socially‑oriented teen who balances school leadership, community service, and a love for baking, while navigating anxiety through journaling and meticulous planning,
    occasionally succumbing to over‑indulgence in sweets and gaming.
background:
  cultural: Juana is a first‑generation Mexican‑American whose household maintains strong ties to Mexican traditions. She speaks Spanish fluently at home while using English at school, allowing her to navigate
    both cultures. Family gatherings often feature Día de Los Muertos altars, Mexican holiday foods, and Catholic celebrations, fostering a sense of community and respect for elders. Living in Clifton,
    Illinois, she also embraces Midwestern values of hard work and neighborliness, creating a blended cultural identity that values family, education, and community service.
