  career_goals: Jonathan aims to secure a stable, full‑time position that leverages his organizational strengths and practical know‑how—ideally in logistics, warehouse operations, or entry‑level construction
    management. He plans to earn a certification in OSHA safety and a community‑college associate degree in business administration within the next two years. His competitive drive pushes him to seek supervisory
    responsibilities, with the long‑term ambition of running his own small handyman or home‑improvement business that can provide reliable services to his Colorado community. He also hopes to develop a
    secondary income stream through custom woodworking projects.
