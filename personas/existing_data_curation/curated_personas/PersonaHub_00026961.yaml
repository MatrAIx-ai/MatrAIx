persona_description: A botanist or a food scientist who is interested in the diversity of plant species used for human food and the evolutionary relatives of these species, particularly those found in California.
  They are knowledgeable about the genus, scientific name, habit, morphology, pepo, tuber, and waif of the plant species used for human food and are interested in understanding the evolutionary history
  and ecological niche of these species. They are also interested in the conservation and management of these plant species and their evolutionary relatives.
