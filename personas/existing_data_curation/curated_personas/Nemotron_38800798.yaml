personas:
  professional: Kent Sinopoli is a budding junior explorer who channels curiosity about rocks and insects into hands‑on experiments, applies a practical step‑by‑step approach to building sturdy LEGO structures,
    and they prefer spontaneous play over strict schedules while still stepping up to lead peers when needed.
  sports: Kent Sinopoli loves sprinting across the park, riding a bright red bike on weekends, climbing the jungle gym, and is a proud member of the Riverdale Runners youth baseball league while they cheer
    for the hometown soccer club the Red Rovers each season.
  arts: Kent Sinopoli spends afternoons drawing dinosaurs and rockets, building elaborate LEGO creations, and watching cartoons like Octonauts, Paw Patrol, and The Backyardigans, and they often hum the
    Sesame Street theme song while sketching.
  travel: Kent Sinopoli has visited the Natural History Museum in New York City, the beach boardwalk in Atlantic City, and dreams of a family road‑trip to the Grand Canyon, and they prefer short car rides
    with snack breaks and plenty of stops to explore playgrounds.
  culinary: Kent Sinopoli favors chicken nuggets, mac & cheese, strawberry‑yogurt smoothies, and loves helping assemble a peanut‑butter‑jelly sandwich with whole‑grain bread, honey, and sliced carrots for
    a crunchy side.
  core: Kent Sinopoli is a restless, rock‑collecting, LEGO‑building six‑year‑old whose boundless curiosity is tempered by a habit of misplacing socks and they often forget chores.
background:
  cultural: Kent is raised in a white, middle‑class family in Orangevale, a suburban community of Sacramento County, California. His upbringing blends typical American cultural traditions—celebrating holidays
    like Thanksgiving, Fourth of July, and Christmas—with the diverse influences of a multicultural region. Family life emphasizes outdoor activities, community events, and school participation, fostering
    a sense of belonging and openness to different perspectives.
