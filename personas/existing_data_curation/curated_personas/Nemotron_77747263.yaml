  career_goals: He intends to secure a stable, structured career path that capitalizes on his practical abilities and disciplined work ethic. Kristopher plans to earn his GED within the next year, then
    enroll in a vocational program at a community college to become a certified automotive technician or an IT support specialist. He is also considering enlisting in the U.S. Army National Guard after
    high school, attracted by the clear hierarchy, defined responsibilities, and opportunities for technical training. In the shorter term, he aims to win local e‑sports tournaments in strategy games to
    fund his equipment upgrades and possibly attract sponsorship. His long‑term ambition is to combine his technical expertise and competitive drive by becoming a network administrator for a security‑focused
    firm, where precise, methodical work is valued.
