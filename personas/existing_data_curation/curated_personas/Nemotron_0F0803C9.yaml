  career_goals: Although retired, Kelly remains driven by a desire to leave a lasting legacy. She plans to compile a memoir that weaves her personal history with the cultural evolution of Chicago’s neighborhoods,
    and to publish a family‑recipe cookbook preserving her culinary heritage. She hopes to establish a modest scholarship fund for local high‑school students pursuing visual arts, reflecting her lifelong
    love of creativity. Kelly aims to launch a weekly art‑and‑craft workshop at the senior center, encouraging fellow elders to explore painting, collage, and textile arts. She also aspires to mentor her
    grandchildren and great‑grandchildren, teaching them budgeting, storytelling, and the value of disciplined organization. In the coming years, she wishes to continue serving on the senior council, fostering
    inclusive community programs, and to travel with family to cultural landmarks such as the Art Institute of Chicago’s special exhibitions and historic sites in the Midwest.
