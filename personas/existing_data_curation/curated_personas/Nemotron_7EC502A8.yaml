  career_goals: He aims to move from his current role as a financial manager to a senior finance executive within the next five to seven years, with the ultimate target of becoming chief financial officer
    of a regional manufacturing group. To support that trajectory, he plans to obtain the CPA designation and deepen his expertise in strategic financial planning and mergers & acquisitions. Andrew also
    wants to build a reputation as a top‑performing finance leader by consistently beating departmental KPIs and earning recognition in industry circles. Outside the corporate ladder, he hopes to leverage
    his financial acumen to launch a boutique consulting practice that helps small businesses in central Indiana improve cash flow and navigate regulatory challenges, providing a stable, diversified income
    stream for his family and an opportunity to give back to his community.
