  career_goals: Edwin aims to ascend to a district or regional management role where he can shape broader retail strategies and mentor multiple store teams. He is also intrigued by the prospect of launching
    a boutique consultancy that blends data‑backed retail optimization with artistic merchandising concepts, helping brands create immersive shopping experiences. Additionally, he aspires to champion mental‑health
    awareness in the workplace, implementing supportive programs that address employee anxiety and emotional wellbeing.
