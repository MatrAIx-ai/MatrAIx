  hobbies: '[''Art Museum Visits'', ''Community Theater'', ''Acoustic Guitar'', ''Hiking'', ''Book Club'', ''Recreational Soccer Coaching'', ''Volunteer Counseling'', ''Cooking'', ''Gardening'', ''Cultural
    Travel'']'
  career_goals: Gary aims to advance to a department chair position within the next five years, where he can champion interdisciplinary initiatives that blend education with the visual and performing arts.
    He seeks a major research grant to develop a compassionate, stress‑reduction curriculum for college students, and plans to author a book on empathetic teaching methods. Additionally, he is committed
    to mentoring junior faculty, expanding community‑based learning partnerships in Omaha, and creating online courses that reach underserved adult learners.
