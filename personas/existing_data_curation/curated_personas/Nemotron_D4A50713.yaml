personas:
  professional: Gary Abbott, a veteran postsecondary educator specializing in higher education pedagogy, curriculum design, and adult learning theory, leverages their methodical organization and deep curiosity
    about the arts to develop interdisciplinary, outcome‑aligned courses, while their compassionate nature fosters inclusive classrooms and their frequent worry drives exhaustive preparation for every lecture
    and grant proposal.
  sports: Gary Abbott, a hiking enthusiast with the Midwest Trails Association, coaches the Omaha United recreational soccer league, follows the Omaha Storm Chasers and the Nebraska Cornhuskers, and maintains
    a routine of weekend trail runs in the Loess Hills, complemented by winter indoor rock climbing at the Omaha Climbing Center.
  arts: Gary Abbott, a frequent visitor to the Omaha Museum of Art and participant in the local community theater troupe, channels curiosity into acoustic guitar renditions of Bob Dylan and Joni Mitchell
    at open‑mic nights, while drawing creative inspiration from Frida Kahlo’s vibrant paintings and contemporary installations by local artist Sarah Smith.
  travel: Gary Abbott, an avid planner of culturally immersive trips, has attended the Edinburgh Fringe Festival, the Salzburg Festival, and the Day of the Dead celebrations in Oaxaca, combines these journeys
    with spontaneous weekend drives to the nearby Badlands for photography, and balances a modest travel budget by prioritizing festivals that align with interdisciplinary teaching interests.
  culinary: Gary Abbott, a home‑cooking enthusiast with an intermediate skill set, loves preparing mushroom risotto flavored with fresh thyme from his garden, mastering Ethiopian injera served with doro
    wat, and experimenting with rich mole poblano, all while budgeting carefully for organic produce and occasional splurges on artisanal cheese.
  core: Gary Abbott blends a disciplined, curiosity‑driven academic career with a bustling social calendar of arts, hiking, and community service, all while juggling hypertension, anxiety, and a habit of
    over‑committing to both work and pleasure.
background:
  cultural: Gary was raised in a middle‑class, white family with German‑Irish ancestry in Omaha, Nebraska. The Midwestern environment instilled values of hard work, modesty, and community service, reinforced
    by his involvement in a mainline Protestant church. He grew up surrounded by the region's agricultural heritage and a vibrant local arts scene, which nurtured his appreciation for both tradition and
    creative expression. These cultural influences shape his collaborative, compassionate approach both in his personal life and professional teaching career.
