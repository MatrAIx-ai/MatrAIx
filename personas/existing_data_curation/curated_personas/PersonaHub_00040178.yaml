persona_description: A professional educator who is committed to the development of the SEK Future Learning Model and values diversity in learning approaches, environments, and spaces. This individual is
  passionate about creating a holistic view of the Intelligent Classroom and integrating it into the IB and ACE Learning frameworks. They are dedicated to providing accessible information to parents and
  others, nurturing student motivation and agency, and facilitating student involvement and transfer of knowledge, skills, and understanding through technology. They are skilled in technology and have experience
  in implementing the learning and teaching model through collaboration and co-creation, with the necessary tools to facilitate the process. They value ongoing teacher training and are committed to research
  and innovation in education. This individual is knowledgeable about the SEK International Schools in Pontevedra, Spain, and is interested in learning more about their educational model and the quality
  of education provided by the school.
