persona_description: A researcher studying the angling and fishing habits of the Kispiox River steelhead, specifically focusing on the origin and distribution of anglers, their catch, fishing methods, effort,
  and life history. The persona is likely to be interested in the ecological and biological aspects of the fishery, and is likely to have expertise in fisheries management, angling techniques, and the life
  history of fish. They may also have knowledge of the Branch publication "Steelhead Harvest Analysis" and be familiar with the use of creel census data to compare and analyze the results.
