personas:
  professional: Yaritza Cusimano, a one‑year‑old who spends countless minutes aligning wooden blocks, demonstrates early logistical aptitude and a practical, routine‑driven mindset that hints at a future
    career as an operations manager or logistics specialist.
  sports: Yaritza Cusimano enjoys the rhythmic tumbling of her parent‑led toddler gymnastics class on Saturday mornings and cheers on the nearby FC Metro soccer team from the couch, while her parents have
    enrolled her in a community swim lesson to foster early physical confidence.
  arts: Yaritza Cusimano delights in singing along to 'Let It Go' from Frozen and creates vivid finger‑paint splashes that echo Van Gogh’s 'Starry Night,' all while classic cartoons starring Mickey Mouse
    and Charlie Chaplin play in the background, nurturing her budding artistic appreciation.
  travel: Yaritza Cusimano’s travel style centers on carefully planned family road trips—such as weekend beach boardwalk outings and a memorable week‑long vacation to Disney World—where a predictable routine
    of naps and snack breaks keeps her comfortable and happy.
  culinary: Yaritza Cusimano, a budding connoisseur of pureed carrots, banana mash, and occasional chicken nuggets seasoned with a pinch of mild paprika, eagerly points at the bright orange of carrots and
    the sweet scent of ripe mangoes, while her parents introduce her to family‑style dishes like arroz con pollo.
  core: Yaritza Cusimano, a routine‑loving one‑year‑old who insists on arranging every toy by color and fiercely competes to build the tallest block tower, is also irresistibly drawn to bedtime stories,
    even when it means staying up a few minutes longer than scheduled.
background:
  cultural: Yaritza is of Mexican descent and is raised in a bilingual home in Liberal, Kansas. Her family actively maintains Mexican cultural traditions, including celebrating Día de los Muertos, preparing
    foods such as tamales, quesadillas, and atole, and speaking Spanish alongside English. She is regularly exposed to traditional Mexican music and stories, and family gatherings often feature cultural
    customs and values that emphasize community, respect for elders, and a strong sense of heritage. These influences shape her language exposure, dietary preferences, and early worldview.
