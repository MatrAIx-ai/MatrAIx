  hobbies: '[''Experimenting with recipes'', ''Balcony herb gardening'', ''Reading mystery novels and historical biographies'', ''Knitting scarves, blankets, and baby garments'', ''Playing bridge at the
    senior center'', ''Listening to big‑band, 50s rock‑and‑roll, and salsa music'', ''Walking along the Miami shoreline'', ''Birdwatching'', ''Attending weekly church services'', ''Gentle chair yoga'',
    ''Watching cooking shows'']'
  career_goals: Although retired, Halie’s ambitions focus on personal fulfillment and community service. She hopes to write and publish a memoir that weaves together her family’s immigration story, recipes,
    and life lessons for future generations. She aims to become comfortable using a tablet for video calls, online banking, and digital photo albums. Halie plans to launch a weekly cooking class for seniors
    at the community center, sharing both classic Italian techniques and local Miami twists. She wishes to champion mental‑health resources for older adults by joining a city seniors’ advisory board. Maintaining
    her physical health through regular chair yoga, gentle walking along the Miami waterfront, and routine health check‑ups is also a priority, ensuring she can stay active and independent.
