personas:
  professional: Juvier Mandujano, retired construction foreman and seasoned automotive mechanic, channels their three decades of hands‑on leadership, meticulous budgeting, and bilingual communication into
    mentoring apprentices and offering part‑time home‑repair services while maintaining rigorous schedules and high quality standards.
  sports: Juvier Mandujano, an avid follower of Liga MX, never misses a Club América match on the weekends, participates in a casual Saturday morning soccer kick‑about with friends at the neighborhood field,
    and roots for the local high‑school team during the fall season, using the sport as a social outlet while keeping physical exertion moderate.
  arts: Juvier Mandujano, a devotee of classic folk music, often tunes into the songs of Juan Gabriel and Vicente Fernández while working in the garage, attends the weekly church choir performances, and
    sketches woodworking plans inspired by the intricate patterns of traditional folk art, though they rarely explore contemporary visual art.
  travel: Juvier Mandujano, a planner‑oriented traveler, prefers detailed itineraries and mid‑range accommodations, dreams of revisiting their familial hometown in central Mexico to reconnect with relatives,
    and periodically explores nearby national parks like Big Bend and local historic towns during long weekends, balancing adventure with comfort.
  culinary: Juvier Mandujano, a seasoned home cook, prepares tamales with masa harina, pork shoulder, and ancho chilies and simmers hearty pozole using hominy, pork ribs, and fresh cilantro, boasting solid
    culinary skills but rarely ventures beyond these family‑rooted recipes, and enjoys sharing the meals at community church gatherings.
  core: Juvier Mandujano is a disciplined, routine‑driven retired tradesman whose hands‑on expertise, love of traditional food, and competitive spirit shape a life centered on mentorship, careful budgeting,
    and preserving cultural pride.
background:
  cultural: Born to Mexican parents who emigrated from Jalisco, Juvier grew up in a bilingual household where Spanish and English were both spoken daily. Family gatherings centered around food, music, and
    Catholic celebrations such as Día de los Muertos and Navidad. He remains closely connected to Mexican cultural practices through cooking, church involvement, and participation in local Hispanic community
    events in Fort Worth, while also embracing Texan traditions.
