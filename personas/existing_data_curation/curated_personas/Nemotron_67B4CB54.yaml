personas:
  professional: Sofia Duval, a retired STEM graduate, leverages her analytical mind and bilingual fluency to simplify scientific concepts for community workshops, while they assertively coordinate small
    neighborhood events and casually troubleshoot technology for friends.
  sports: Sofia Duval enjoys gentle daily walks through Marietta’s historic district, cheers on the Atlanta Braves during baseball season, and participates in the Marietta Senior Strollers walking club,
    favoring low‑impact activity over competitive sports.
  arts: Sofia Duval spends quiet afternoons listening to classic boleros by Armando Manzanero, salsa classics from Celia Cruz, occasional jazz from Ella Fitzgerald, and reading historical fiction by Isabel
    Allende and Gabriel García Márquez, letting these artistic influences color her storytelling and community teaching style.
  travel: Sofia Duval has already explored Oaxaca’s markets and the Blue Ridge Mountains of Georgia, and now longs to travel back to her family’s ancestral village in Mexico for a cultural reunion, yet
    they plan trips around a modest budget and preferred slow‑paced itineraries.
  culinary: Sofia Duval, an enthusiastic home cook, crafts hand‑made tamales with corn masa, slow‑cooked mole infused with dried chilies, and fresh salsa verde using tomatillos, cilantro, and jalapeños,
    though they sometimes forget to refrigerate leftovers, resulting in occasional waste.
  core: In a world balanced between curiosity and practicality, Sofia Duval weaves her love of science, heritage recipes, and gentle community ties into an adaptable, quietly assertive life that embraces
    both orderly plans and spontaneous moments.
background:
  cultural: Sofia Duval is a first‑generation American whose parents migrated from rural Mexico to Georgia in the early 1960s. Growing up in a bilingual household in the Atlanta metropolitan area, she celebrated
    Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings built around meals of tamales, pozole, and homemade tortillas. The warmth of Southern hospitality blended with the vibrancy
    of Latino culture, shaping her identity as a bridge between communities. Throughout her life, Sofia has remained active in local Hispanic organizations in Marietta, participating in cultural festivals,
    language‑preservation groups, and charity events. Her dual heritage influences her daily life, from the spices in her cooking to her fluency in Spanish and English, and informs her commitment to fostering
    intergenerational connections.
