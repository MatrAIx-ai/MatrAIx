    "Genealogy research"]'
  career_goals: Even in retirement, Sofia pursues projects that satisfy her blend of curiosity and practicality. She aims to compile a family cookbook that preserves cherished recipes and the stories behind
    them, hoping to share this cultural legacy with her grandchildren. Sofia also plans to expand her informal tech‑teaching role, offering weekly workshops at the local library to help seniors and youth
    navigate digital tools. Learning basic photography is another goal, allowing her to document family gatherings and the natural beauty of her garden. While she values flexibility over rigid schedules,
    she intends to adopt simple organizational habits—like a weekly planner—to keep these initiatives moving forward. A long‑term ambition is to travel back to her ancestral region in Mexico for a cultural
    reunion, strengthening her connection to her roots.
