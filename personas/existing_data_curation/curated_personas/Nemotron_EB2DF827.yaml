  career_goals: Berenice aims to become a senior portfolio manager within five years, leading a team that specializes in integrating sustainable and culturally resonant investments, such as supporting Puerto
    Rican creative industries and Caribbean fintech startups. She plans to earn the CFA charter and pursue an executive MBA to deepen her strategic leadership capabilities. Long‑term, she envisions launching
    her own boutique fund that leverages her analytical rigor and artistic sensibility to identify high‑impact, novel asset classes. She also aspires to mentor emerging women analysts in Puerto Rico, fostering
    a more inclusive finance community. Balancing her ambition with her emotional wellbeing, she seeks roles that value work‑life balance and provide resources for mental health.
