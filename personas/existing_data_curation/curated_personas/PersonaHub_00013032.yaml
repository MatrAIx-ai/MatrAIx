persona_description: A researcher at the Hospital de Bellvitge in Barcelona who specializes in the neurofunctional basis of moral sensitivity in patients with obsessive-compulsive disorder (OCD), particularly
  focusing on the role of the orbitofrontal cortex in decision making processes and the development of moral sentiment. The researcher has published their findings in the journal Archives of General Psychiatry
  and has been recognized for expanding further on the characterisation of altered cerebral mechanisms in OCD.
