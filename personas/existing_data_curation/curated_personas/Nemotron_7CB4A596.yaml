personas:
  professional: William Landrum, a budding young explorer‑scientist, fuses a competitive curiosity for rock formations with disciplined sketching, tablet photography, and Scratch game‑design to virtually
    map canyon trails, all while balancing organized study sessions with spontaneous outdoor adventures.
  sports: William Landrum stars for the Moab Kids Soccer Club, idolizes Real Salt Lake midfielders, and channels their competitive edge into weekly hill sprints and rock‑climbing drills, ensuring they stay
    fit while embracing the rugged outdoor spirit of their community.
  arts: William Landrum captures sunrise over sandstone cliffs on a tablet with a style reminiscent of Ansel Adams, practices watercolor sketches inspired by Van Gogh’s bold colors, builds intricate LEGO
    landscapes like miniature canyons, and pumps up creativity by listening to Imagine Dragons while drawing.
  travel: William Landrum prefers family‑run road trips that blend camping under the starry sky at Arches and Canyonlands with impromptu sketch‑sessions, and dreams of trekking Patagonia’s glacial valleys
    and exploring Petra’s ancient rock‑cut tombs, balancing adventurous wanderlust with a modest allowance.
  culinary: William Landrum relishes classic chicken nuggets and mac and cheese, but also crafts his own red‑rock trail mix of pumpkin seeds, dried cranberries, and pretzel sticks, whips up simple blueberry
    pancakes for breakfast, and adds a dash of spicy salsa to his lunch wraps, showcasing a budding kitchen confidence mixed with a love for portable snack energy.
  core: William Landrum sees the world as a living blueprint of stone and code, constantly sketching cliff silhouettes, bragging about Minecraft high scores, and habitually forgetting to wear socks before
    shoes, a quirky mix of curiosity, competitiveness, and endearing absent‑mindedness.
background:
  cultural: William was raised in Moab, Utah, a small town framed by iconic red‑rock formations and national parks. His family, of European‑American heritage, embraces the region’s outdoor‑focused culture—weekend
    hikes, rock‑climbing trips, and community events tied to tourism and local art galleries. The local school emphasizes environmental stewardship and hands‑on learning, which reinforces his appreciation
    for nature, creativity, and self‑reliance. While his community reflects broader Western American values, it also celebrates a vibrant artistic scene that nurtures his interest in drawing and photography.
