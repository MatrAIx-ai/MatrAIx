  hobbies: '[''exploring red rock canyons'', ''sketching landscapes'', ''building LEGO models'', ''playing soccer'', ''coding on Scratch'', ''reading adventure novels'', ''playing chess'', ''Minecraft world
    building'', ''rock and mineral identification'']'
  career_goals: William dreams of turning his love of the outdoors and art into a future career where he can work as a wildlife photographer or a park ranger in one of Utah's national parks. He also envisions
    designing interactive exhibits for a science museum or studying environmental science and engineering to help protect the red‑rock ecosystems he treasures. His competitive spirit fuels an ambition to
    excel in these fields and earn recognition for creative problem‑solving.
