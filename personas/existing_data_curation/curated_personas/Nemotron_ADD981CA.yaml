  hobbies: '[''Vegetable gardening'', ''Korean cooking and kimchi fermentation'', ''Knitting'', ''Reading historical fiction'', ''Walking nature trails'', ''Senior‑center craft circles'', ''Celebrating
    cultural holidays'']'
  career_goals: Although retired, Jinhee aims to stay active by continuing her volunteer work at the local senior center, mentoring younger volunteers in cultural activities, preserving and documenting
    her family's Korean heritage for future generations, maintaining her health through regular check‑ups and a structured exercise routine, and learning to use new health‑monitoring apps to stay independent.
