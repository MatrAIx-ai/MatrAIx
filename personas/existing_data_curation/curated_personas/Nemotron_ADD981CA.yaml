personas:
  professional: Jinhee Yeh, a retired textile manager turned senior‑center volunteer coordinator, leverages meticulous budgeting, bilingual communication, and methodical event planning to run weekly cultural
    craft circles, ensuring each session follows a detailed schedule that satisfies their love of structure while gently guiding younger volunteers.
  sports: Jinhee Yeh, a fan of the Los Angeles Dodgers and the Los Angeles Lakers, enjoys gentle morning walks along the nearby river trail, participates in a low‑impact water‑aerobics class at the senior
    center each summer, and follows the NBA season religiously while keeping an eye on the team's defensive statistics.
  arts: Jinhee Yeh, an avid reader of historical novels such as Hilary Mantel’s 'Wolf Hall' and a devoted listener of the folk ensemble Arirang, regularly attends performances by the local community theater
    starring veteran actor John Wood and finds solace in the piano works of Claude Debussy while knitting to classic jazz recordings by Miles Davis.
  travel: Jinhee Yeh, who prefers low‑key journeys that blend garden tours with historic sites, has taken day trips to the United States Botanic Garden in Washington, D.C., enjoys the cherry‑blossom festival
    at the Tidal Basin, and dreams of a gentle cruise along the Norwegian fjords, but generally limits travel to weekend getaways with their adult children due to mobility considerations.
  culinary: Jinhee Yeh, an accomplished home cook, prepares kimchi in five‑liter batches using napa cabbage, gochugaru, garlic, and fermented seafood, masters a classic beef bulgogi recipe with sesame oil,
    soy sauce, and pear, delights in baking sweet‑potato bread, yet sometimes forgets to refrigerate leftovers, leading to occasional spoilage.
  core: Jinhee Yeh, a methodical 83‑year‑old whose life revolves around garden calendars, precise knitting patterns, and careful budgeting, balances a gentle worry about health with a steadfast love for
    cultural rituals and community service.
background:
  cultural: Jinhee is a Korean‑American who was born in South Korea and immigrated to the United States in the early 1970s, settling eventually in Loudoun County, Virginia. She grew up navigating the values
    of Confucian respect for family and community while assimilating into American suburban life. Her daily routines reflect a blend of Korean tradition—such as observing Chuseok, Lunar New Year, and maintaining
    Korean language in the household—and American customs, like volunteering at local organizations and participating in community events. This bicultural perspective informs her nurturing approach to family,
    her etiquette in social interactions, and her dedication to preserving cultural heritage for her grandchildren.
attributes:
