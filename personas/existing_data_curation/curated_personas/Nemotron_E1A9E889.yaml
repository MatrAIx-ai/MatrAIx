personas:
  professional: Steven Collins, a 14-year-old budding engineer, applies their methodical mindset to building wooden birdhouses, programming modest Python projects, and solving chess puzzles, demonstrating
    how their organized, practical nature translates into early technical proficiency.
  sports: Steven Collins cycles weekly with a small local riding group, favors the calm of countryside routes, keeps an eye on the professional cycling team Ineos Grenadiers, and cheers for the nearby minor-league
    baseball team the Columbus Clippers during summer outings.
  arts: Steven Collins channels their creative impulse into woodworking and model building, enjoys listening to the folk-rock duo The Lumineers and watching the documentary series Modern Marvels, and collects
    vintage mechanical puzzles by Vadim Kotelnikov, which shape their aesthetic appreciation.
  travel: Steven Collins prefers low-key road trips, having explored the historic sites of Philadelphia, the Appalachian Trail segment near their hometown, and dreaming of a future visit to the woodworking
    museums of Sapporo, Japan, all planned with a careful budgeting spreadsheet.
  culinary: Steven Collins favors straightforward meals like homemade mac and cheese with sharp cheddar, chicken quesadillas with cilantro, and keeps a secret stash of chocolate chip cookies they bake using
    a simple oven-top method, while occasionally experimenting with building a mini wooden pizza oven.
  core: Steven Collins is a methodical teenage tinkerer whose love for structure drives their woodworking, coding, chess, and disciplined savings, yet they occasionally succumb to impulsive snack cravings.
background:
  cultural: Steven was raised in a white, middle‑class family in Rochester, New Hampshire, a small town with a strong New England heritage. The community emphasizes self‑reliance, punctuality, and a practical
    approach to daily life. Family traditions include attending a local Protestant church, celebrating holidays such as Thanksgiving and Independence Day with informal gatherings, and enjoying regional
    activities like hiking, maple‑syrup harvest festivals, and winter sports. The town’s modest size fosters close‑knit relationships, where personal privacy and reliability are valued, shaping Steven’s
    preference for structured routines and small‑group interactions.
attributes:
  skills: '[''Microsoft Excel'', ''Scratch programming'', ''Basic Python'', ''Mechanical tinkering'', ''Organizational skills'', ''Time management'']'
