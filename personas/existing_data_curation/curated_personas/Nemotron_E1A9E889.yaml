  career_goals: Steven aims to attend a regional vocational‑technical program after high school, focusing on automotive technology or computer systems support. He is drawn to careers that offer clear structures,
    predictable workflows, and tangible results, such as becoming an automotive technician, an IT help‑desk specialist, or a maintenance technician for a local government facility. In the longer term, he
    hopes to earn certifications (e.g., ASE for automotive or CompTIA A+ for IT) and secure a stable, well‑organized job that allows him to apply his practical problem‑solving abilities while contributing
    reliably to his community.
