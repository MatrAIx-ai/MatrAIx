  career_goals: Tim hopes to transition from laborer to crew foreman within the next three years, securing a journeyman carpenter certification and an OSHA 30‑hour safety certification. He wants to develop
    leadership skills to manage small crews, improve jobsite efficiency, and build a reputation for safety and on‑time delivery. Ultimately, he aims to start his own subcontracting business focused on residential
    remodeling, giving him more control over scheduling while still leveraging his practical expertise.
