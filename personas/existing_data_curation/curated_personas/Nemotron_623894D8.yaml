personas:
  professional: Timothy Borges is a seasoned construction crew member in Lexington who leverages a decade of hands‑on experience in concrete finishing, framing, and equipment operation to deliver projects
    on schedule, while their competitive streak fuels a relentless focus on productivity and their preference for structure ensures meticulous blueprint interpretation despite a relaxed attitude toward
    paperwork.
  sports: Timothy Borges follows college basketball with devotion to the Kentucky Wildcats, participates in a local hunting club for seasonal deer outings, spends early mornings fishing the Kentucky River,
    and they occasionally root for the Lexington Legends minor‑league baseball team when time permits.
  arts: Timothy Borges finds artistic outlet in restoring a 1970s Chevrolet while listening to classic rock icons like Led Zeppelin and country legends such as Johnny Cash, and they enjoy flipping through
    Fine Homebuilding and This Old House magazines for design inspiration.
  travel: Timothy Borges prefers low‑key road trips that blend work and recreation, having driven the scenic byways of the Appalachians to Asheville, North Carolina, and they are planning future hunting
    expeditions to Montana’s Flathead Valley while budgeting travel around their emerging subcontracting business.
  culinary: Timothy Borges favors hearty, protein‑rich meals—grilling fresh river trout, slow‑cooking venison stew with root vegetables, and serving homemade cornbread alongside coleslaw—and their DIY ethic
    translates into a modest skill set that lets them prep meals on a portable grill in the backyard.
  core: Timothy Borges is a 33‑year‑old construction pro who balances a competitive work ethic and love of solitary outdoor pursuits with a penchant for impulsive tool purchases and occasional paperwork
    procrastination, and they often justify the latter as "just one more project."
background:
  cultural: 'Timothy was born and raised in Lexington, Kentucky, in a family with deep roots in the region. While his paternal ancestors trace back to Portuguese immigrants who settled in the Midwest generations
    ago, his upbringing reflects the values of central Kentucky: a strong work ethic, close‑knit family ties, and community involvement through the local church and neighborhood gatherings. He celebrates
    traditional Southern holidays, enjoys regional foods such as bourbon‑infused barbecue and country cooking, and maintains a blend of Portuguese family traditions—like occasional Portuguese cuisine at
    family meals—within the broader American Southern cultural context.'
