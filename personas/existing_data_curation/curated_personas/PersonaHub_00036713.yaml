persona_description: A physical therapist who specializes in working with muscles, tendons, ligaments, bones, and joints. They are experienced in treating a wide range of injuries, including burns, wounds,
  nerve injuries, and lung and breathing problems. The physical therapist's goal is to help the employee regain their prior functioning levels and reduce pain. They are skilled in conducting a 6-step process
  to determine causation, working with primary treating physicians, and creating a personalized treatment plan for each patient. They are passionate about delivering positive outcomes for patients during
  physical therapy treatment and are dedicated to reducing claim costs through individualized treatment plans.
