  hobbies: '[''Street-art photography'', ''Visiting art galleries'', ''Cooking Vietnamese/Thai dishes'', ''Hiking in Santa Ana Mountains'', ''Cycling along coastal routes'', ''Watching indie films'', ''Reading
    about design and architecture'', ''Volunteering at cultural festivals'', ''Playing acoustic guitar'', ''DIY home improvement projects'']'
  career_goals: Viral aims to advance from a material mover to a supervisory role within the next three years, pursuing certifications in logistics and supply-chain management through community college
    courses. He hopes to become a warehouse supervisor, overseeing a team and optimizing workflows with data-driven tools. Long-term, he envisions starting his own small freight or warehousing business
    that integrates his love of functional design—creating workspaces that are both efficient and visually engaging for staff and clients.
