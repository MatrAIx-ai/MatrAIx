personas:
  professional: Viral is a 30‑year‑old warehouse logistics specialist with forklift certification and WMS expertise who blends meticulous organization with a designer’s eye for spatial aesthetics, using
    their curiosity and calm under pressure to streamline inventory flow, and they plan to step into a supervisory role within three years.
  sports: Viral cycles with the OC Urban Cyclists club on the coastal bike path, hikes the Santa Ana Mountains each weekend, supports the Los Angeles Lakers and the Los Angeles Dodgers, plays in a recreational
    5‑a‑side soccer league during summer, and they enjoy the social camaraderie of the team.
  arts: Viral spends free evenings photographing the colorful murals of downtown Santa Ana, curates a personal collection of prints by graffiti artist RETNA, attends indie film screenings featuring Greta Gerwig’s
    work, and they volunteer teaching traditional lantern‑making at the local cultural center.
  travel: Viral prefers short, budget‑friendly road trips to coastal California towns like Carmel and Big Sur, has explored the street‑food scene of Taipei, dreams of a culinary pilgrimage to Bali’s Ubud,
    and they meticulously plan itineraries using a spreadsheet to fit hiking, photography, and family visits.
  culinary: Viral is an intermediate home cook who masters dishes such as phở, bánh chưng, and lemongrass chicken, experimenting with fish sauce, Thai basil, and kaffir lime, often hosting dinner parties
    where they pair fresh bánh xèo with a selection of craft beers.
  core: Viral blends a warehouse worker’s precision with a photographer’s curiosity, balancing disciplined budgeting and health monitoring while they secretly hoard limited‑edition art prints and forget
    dental appointments.
background:
  cultural: Viral is a first-generation American of Vietnamese descent, raised in a tight‑knit Southeast Asian community in Orange County. He grew up bilingual, speaking Vietnamese at home and English at
    school, and maintains strong family bonds that emphasize respect for elders and community support. Traditional celebrations such as Tet (Lunar New Year) and the Mid‑Autumn Festival are central to his
    family life, while he also embraces the multicultural environment of Southern California, blending Vietnamese culinary and artistic traditions with contemporary American culture.
