persona_description: A researcher working on the development of new antimalarial drugs, specifically targeting the parasite Plasmodium parasites. The individual has expertise in screening and identifying
  compounds that can act against malaria parasites in multiple stages of their lifecycle, including the liver. They are also interested in the development of new compounds that are chemically unrelated
  to existing antimalarial drugs and have a strong track record of successfully identifying compounds that can provide complete protection against the parasite in the liver. The individual is highly skilled
  in using an automated system to analyze data and has a unique approach to drug discovery, including the use of an imaging apparatus to monitor the growth of malaria parasites in the lab.
