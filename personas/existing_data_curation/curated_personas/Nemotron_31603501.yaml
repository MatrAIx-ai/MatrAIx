  career_goals: Kim dreams of a future where she can design and build things she loves, so she aspires to become an engineer or architect. She also entertains the idea of being a teacher, sharing knowledge
    and helping others succeed. In the short term, she aims to win her school’s science fair, place top in a local LEGO building contest, and become a spelling‑bee champion, reflecting her competitive drive
    and love for structured challenges.
