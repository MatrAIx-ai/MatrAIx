  hobbies: '[''Playground games'', ''LEGO building'', ''Drawing and coloring'', ''Reading picture books'', ''Educational cartoons'', ''Helping with chores'', ''Storytime'', ''Sing‑along sessions'', ''Beachcombing'']'
  career_goals: Austin dreams of being a helper who makes a difference. He often says he wants to become a firefighter who rescues people, a doctor who cares for sick children, or an astronaut who explores
    space. His fascination with how things work hints at future interests in engineering or science. His ambition is to keep learning, stay kind, and find ways to help others as he grows.
