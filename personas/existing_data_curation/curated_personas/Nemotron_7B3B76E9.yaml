  career_goals: Although officially retired, Zachary aims to remain an active contributor to Tulsa’s cultural and business ecosystems. He aspires to mentor young business owners through local chambers of
    commerce, while also championing the arts by serving on the board of the Philbrook Museum of Art. He hopes to launch a small nonprofit that provides grant‑writing assistance and financial counseling
    to emerging artists, fostering interdisciplinary collaborations. Additionally, Zachary plans to author a memoir that intertwines his business insights with reflections on his lifelong love of art and
    community service.
