  career_goals: Gary wants to earn his GED within the next two years and enroll in a community‑college automotive technology program. He sees a stable career as a certified automotive technician or a small‑business
    mechanic as a way to gain the predictable structure he values while applying his practical problem‑solving skills. Simultaneously, he dreams of creating a side channel on YouTube where he shares gaming
    tips and skateboarding tricks, hoping to turn his hobbies into a modest source of income. He hopes this blend of a reliable trade and a creative outlet will give him financial independence and lessen
    his anxiety about the future.
