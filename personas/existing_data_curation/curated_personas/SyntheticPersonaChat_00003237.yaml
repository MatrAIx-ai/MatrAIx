    User 2: It can be, but it''s also very rewarding.

    User 1: I''m sure it is. What do you like to do for fun when you''re not taking care of your daughters?

    User 2: I love to go mountain climbing.

    User 1: Mountain climbing? That sounds like a lot of fun! Have you ever been to any interesting places while mountain climbing?

    User 2: I have! I once climbed a mountain in the Himalayas.

    User 1: That must have been amazing! How tall was the mountain?

    User 2: It was about 29,000 feet tall.

    User 1: Wow! That''s so high! I''m impressed.

    User 2: Thank you. I''m glad you''re impressed.

    User 1: Me too. It sounds like you''ve had a lot of interesting experiences in your life.

    User 2: I have, and I''m glad to share them with you.

    User 1: I''m glad to hear that. I''m sure your daughters are very lucky to have you as their mother.

    User 2: Thank you. I love being their mother.

    User 1: That''s very sweet. It sounds like you''re a very good mother.

    User 2: I try my best.

    User 1: I''m sure you do. Thank you for talking to me today.

    User 2: No problem. It was nice talking to you too.'
