personas:
  professional: Angelica Morris, a meticulous commercial‑cleaning veteran with over twenty years of hands‑on building‑maintenance expertise, leverages their keen eye for detail and love of historic architecture
    to pursue a supervisory role at a community college, where they can blend systematic facility management with artistic‑space stewardship.
  sports: Angelica Morris enjoys weekend hikes along the Fox River Trail, is an avid member of the Ogle County Outdoor Club, roots for the Chicago Cubs and follows the Chicago Bulls, and balances their
    love of nature with a low‑impact cardio routine that includes brisk walks and occasional community‑organized yoga in the park, where they find both physical fitness and mental calm.
  arts: Angelica Morris spends afternoons sketching the limestone facades of Ogle County courthouses, exhibits their watercolor series of seasonal barns at the local heritage museum, curates a personal
    Instagram feed of barn‑renovation photography, and finds inspiration in the folk melodies of Sufjan Stevens, the lyrical storytelling of Gillian Welch, and the classic brushwork of Claude Monet, all
    of which they integrate into their creative identity.
  travel: Angelica Morris prefers carefully planned road trips that blend artistic pilgrimage with relaxed exploration, having mapped a summer itinerary that includes weekend stays in the Chicago Art Institute
    district, a boutique gallery tour in Indianapolis, and a nostalgic visit to Marfa, Texas for a desert‑photography workshop, all while budgeting to keep their future cleaning‑business fund intact, and
    they relish the anticipation of each new destination as a source of fresh perspective.
  culinary: Angelica Morris loves farm‑to‑table cooking, often transforming fresh heirloom tomatoes, basil from their garden, and locally sourced goat cheese into a summer caprese salad, while their go‑to
    comfort dish is a slow‑cooked chicken pot pie spiced with rosemary and thyme, and they sometimes over‑season everything with a generous dash of smoked paprika, a quirk they humorously call their 'signature
    kick.'
  core: Angelica Morris balances a razor‑sharp eye for facility detail with a boundless curiosity for art, channeling a competitive, slightly skeptical drive into mentoring younger workers while indulging
    in weekend hikes, watercolor sketches, and spontaneous folk concerts, and they view each day as an opportunity to fuse order with creative spontaneity.
background:
  cultural: Angelica grew up in a modest, white, Midwestern family in Ogle County, Illinois, where values of hard work, self‑reliance, and community service were emphasized. Her upbringing included church
    involvement, county fairs, and a strong sense of neighborhood loyalty. While her family’s traditions are rooted in the rural heartland, Angelica’s natural curiosity led her to explore broader cultural
    experiences, such as regional art festivals and community workshops. This blend of traditional Midwestern steadiness and a willingness to embrace unconventional ideas shapes her worldview, balancing
    respect for heritage with an appetite for new artistic and intellectual pursuits.
attributes:
  skills: '["Commercial cleaning", "Facility maintenance", "Health and safety compliance", "Time management", "Attention to detail", "Inventory management", "Customer service", "Team collaboration", "Basic
