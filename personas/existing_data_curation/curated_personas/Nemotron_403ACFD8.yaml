  hobbies: '["Watercolor painting", "Visiting art galleries", "Architectural photography", "Reading art history", "Community theater attendance", "Gardening", "Knitting", "Hiking local trails", "Cooking
    with farm‑to‑table ingredients", "Listening to indie‑folk music"]'
  career_goals: Angelica aspires to transition from a frontline janitor to a supervisory or facilities‑manager role within a community college or cultural center, where she can blend her operational expertise
    with her love of the arts. She plans to complete an associate’s degree in business administration or arts management, leveraging community‑college courses she started earlier. Long‑term, she hopes to
    launch a small, employee‑owned cleaning business that services local arts venues, giving her the flexibility to mentor younger workers while staying connected to the creative scene. She also dreams
    of volunteering as a docent or curator for a local gallery, using her keen eye for detail to help design exhibitions.
