  career_goals: Ercilia aims to transition into a senior advisory role where she can mentor the next generation of HR professionals and champion inclusive, arts‑infused workplace cultures. She hopes to
    develop a legacy program that integrates employee wellness with community art initiatives, and to serve on local nonprofit boards that promote cultural enrichment. In the next five years she plans to
    earn an SHRM‑Senior Certified Professional credential, lead a diversity and inclusion strategy at her organization, and eventually shift to part‑time consulting to support small businesses across the
    Eastern Shore.
