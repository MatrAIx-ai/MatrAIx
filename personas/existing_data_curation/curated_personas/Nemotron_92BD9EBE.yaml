  hobbies: '[''Landscape photography'', ''Fly fishing'', ''Woodworking'', ''Attending local art exhibitions'', ''Playing acoustic guitar'', ''Reading science and technology magazines'', ''Tinkering with
    vintage truck engines'', ''Volunteer set design for community theater'', ''Hiking in the Columbia River Gorge'']'
  career_goals: Joseph aims to become a certified heavy‑equipment trainer and earn an advanced OSHA safety instructor credential, eventually leading a small team at his current employer. He also hopes to
    launch a side business restoring vintage tractors and creating bespoke wooden furniture, blending his mechanical skillset with his artistic interests. In the longer term, he envisions teaching equipment
    operation courses at the local community college and advocating for greener, electric‑powered machinery in regional agriculture.
