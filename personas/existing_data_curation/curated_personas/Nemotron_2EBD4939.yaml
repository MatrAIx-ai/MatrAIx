    structures & algorithms'', ''Bilingual communication (English/Spanish)'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Reading science‑fiction'', ''Hiking in Texas Hill Country'', ''Yoga and meditation'', ''Attending small women‑in‑tech meetups'', ''Contributing to open‑source
