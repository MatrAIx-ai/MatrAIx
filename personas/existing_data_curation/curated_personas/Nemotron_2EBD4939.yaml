  career_goals: Jacqueline aims to become a senior full‑stack developer within the next three years, focusing on leading small, cross‑functional teams that build user‑centric products for underserved communities.
    She hopes to deepen her expertise in cloud‑native architectures and obtain an AWS Solutions Architect certification. Parallel to her technical growth, she wants to develop stronger project‑management
    and organizational skills to mitigate her tendency toward disorganization. Long‑term, she envisions a role as a technical lead or software architect where she can mentor junior developers, especially
    women and Latinx talent, while maintaining a flexible work schedule that supports her mental‑well‑being.
