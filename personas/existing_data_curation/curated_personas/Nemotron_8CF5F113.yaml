    in state forests'', ''Exploring historic sites'', ''Reading art history and psychology books'', ''Practicing mindfulness meditation'', ''Journaling'', ''Yoga'']'
  career_goals: Ryan aims to transition from his current non-working status into a part-time consultancy role where he can advise local non-profits and small cultural organizations on financial sustainability
    and program development. He aspires to launch a community art hub in Boalsburg that offers workshops, exhibition space, and mentorship for emerging artists, blending his business expertise with his
    love for the arts. To support this vision, he plans to pursue a certificate in non-profit management and to deepen his skills in digital media design. Long-term, Ryan hopes to become a recognized catalyst
    for cultural enrichment in Central Pennsylvania, while also prioritizing his mental-health resilience through continued therapy and mindfulness practice.
