personas:
  professional: Jesus Devega is a technology‑savvy attorney specializing in intellectual property and data privacy; they leverage their curiosity and artistic appreciation to craft innovative legal arguments
    while their relaxed, sometimes disorganized approach forces them to rely on flexible workflows and last‑minute brainstorming in the courtroom and at industry conferences.
  sports: Jesus Devega follows the Oklahoma City Thunder and the Dallas Cowboys with seasonal enthusiasm, joins a local weekend hiking club for plains treks, and occasionally plays pickup soccer at the
    community park, but they often let their competitive streak drive them to overcommit to friendly matches, leaving their knees sore.
  arts: Jesus Devega immerses themselves in street mural photography, draws inspiration from Frida Kahlo and Banksy, attends indie film screenings featuring directors like Greta Gerwig, and channels their
    creative curiosity into playing acoustic guitar while they occasionally hum the haunting tunes of Los Lobos.
  travel: Jesus Devega prefers flexible road trips that blend cultural festivals—like the Día de los Muertos celebration in Oaxaca—and outdoor adventure, has visited the historic towns of San Miguel de
    Allende and Santa Fe, and dreams of a solo trek through Patagonia, yet they balance travel with the steady demands of their law practice and a modest budget.
  culinary: Jesus Devega cooks traditional tamales and mole poblano with a modern twist, savoring ingredients like ancho chilies, epazote, and fresh corn husks, enjoys experimenting with regional sauces
    while their cooking skill sits between home‑chef and food‑blogger, and they often end evenings with a side of freshly brewed café de olla.
  core: Jesus Devega is a curious, art‑infused lawyer who balances competitive ambition with anxiety‑driven stress, loves spontaneous creativity, and they navigate life through flexible routines, occasional
    disorganization, and a hunger for both legal innovation and cultural expression.
background:
  cultural: Jesus grew up in a bilingual Mexican‑American household in Texas before moving to Guymon, Oklahoma. His parents immigrated from Jalisco and instilled in him the customs of Mexican heritage—celebrating
    Día de los Muertos, preparing tamales, and speaking Spanish at home—while also participating in the broader ranching and agricultural culture of the Oklahoma Panhandle. He identifies with both the communal,
    family‑oriented values of his Mexican roots and the independent, pragmatic ethos of the high‑plains community. This bicultural perspective informs his empathetic approach to clients, his appreciation
    for diverse artistic expressions, and his ability to navigate the legal needs of a multicultural clientele.
attributes:
  skills: '["Legal research", "Contract drafting", "Litigation strategy", "Intellectual property law", "Technology and data privacy compliance", "Technical document analysis", "Critical thinking", "Negotiation",
    "Persuasive writing", "Public speaking", "Creative problem solving"]'
  hobbies: '["Visiting art galleries and museums", "Street photography", "Hiking and camping in the high plains", "Playing acoustic guitar", "Reading science‑fiction and philosophy", "Cooking traditional
    Mexican cuisine", "Attending tech and startup meet‑ups", "Watching independent films", "Practicing mindfulness meditation"]'
  career_goals: He aims to become a partner in a regional law firm or launch his own boutique practice that specializes in technology, intellectual property, and arts‑related law. He wants to be recognized
    as a thought leader on the intersection of law and emerging tech, publishing articles, speaking at conferences, and advising startups. He also hopes to develop a pro bono program serving low‑income
    artists and rural entrepreneurs in the Texas County area, balancing his competitive drive with a desire for impact while preserving enough flexibility to manage his stress and personal interests.
