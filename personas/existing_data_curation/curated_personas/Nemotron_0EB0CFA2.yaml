  career_goals: Looking ahead, Gabriel aims to leverage his extensive practical knowledge to transition into a senior consulting role where he can guide large‑scale energy‑efficiency and sustainability
    projects for Minnesota businesses. He plans to earn his Professional Engineer (PE) license within the next two years to formalize his credentials. Mentoring the next generation of technicians is a priority,
    so he intends to develop a structured apprenticeship program at his firm. In parallel, Gabriel hopes to author a handbook on electrical safety for community volunteers and to gradually reduce his full‑time
    workload to focus on part‑time consulting and community outreach.
