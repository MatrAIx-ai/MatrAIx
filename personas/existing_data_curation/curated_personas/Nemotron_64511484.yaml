personas:
  professional: Ana Quinones, an inventive architect, merges advanced BIM workflows and parametric design with a passion for sustainable, community-focused projects, harnessing her curiosity and relaxed,
    flexible mindset to lead collaborative workshops that blend artistic detail with technical precision while fluently navigating client dialogues in both English and Spanish.
  sports: Ana Quinones regularly paddles in the surf at Zuma Beach, competes in a co-ed league with the Santa Monica Beach Volleyball Club, follows the Los Angeles Dodgers for baseball, cheers for the LA
    Galaxy in soccer, and stays energized by playing casual pickup basketball with friends at the local rec center.
  arts: Ana Quinones immerses herself in the arts by attending exhibitions featuring Ai Weiwei's installations and Frida Kahlo's paintings, enjoying contemporary performances by Bill T. Jones, drawing creative
    inspiration from the vibrant murals of Shepard Fairey, and listening to a rotating playlist of Los Lobos, Ximena Sariñana, and modern jazz pianist Brad Mansfield while sketching cityscapes.
  travel: Ana Quinones favors flexible, adventure-laden trips that combine surf sessions with cultural immersion, having explored the coastal trail of Big Sur, the ancient ruins of Tulum, and the historic
    plazas of Seville, while planning a sustainable design retreat in Reykjavik to blend work and wanderlust within a modest budget.
  culinary: Ana Quinones delights in cooking family recipes that fuse traditional flavors with modern twists, such as chilaquiles with smoked pasilla chilies, fish tacos garnished with pickled red onion
    and avocado, and a sophisticated mole de Puebla enriched with dark chocolate and toasted nuts, while also seeking out Omakase sushi experiences and experimenting with heirloom corn and fresh cilantro
    in her kitchen.
  core: Ana Quinones blends a sunrise surf-to-sketch routine with an improvisational work style that leaves half-finished blueprints on her desk yet fills her life with spontaneous salsa nights, vibrant
    community projects, and a persistent knack for turning disorganized ideas into sustainable design marvels.
background:
  cultural: Ana is a second‑generation Mexican‑American who grew up in a bilingual household where family gatherings, traditional festivals, and Mexican culinary customs were central. She carries the warmth
    and collectivist values of her heritage, which inform her collaborative design approach. The rich visual language of Mexican muralism and vernacular architecture inspires her to incorporate colour,
    pattern, and cultural narratives into her projects, while living in Laguna Niguel gives her a deep appreciation for California’s coastal aesthetic and sustainability ethos.
attributes:
  skills: '["Architectural design", "Sustainable building design", "BIM (Revit & Navisworks)", "AutoCAD & SketchUp", "Conceptual sketching", "Parametric modeling (Grasshopper)", "Project coordination and
    client communication", "Spanish (bilingual)", "Graphic design basics", "Photography for site analysis"]'
  hobbies: '["Modern art museum visits", "Surfing and beach volleyball", "Cooking traditional Mexican dishes with a modern twist", "Hiking coastal trails", "Photography (urban & landscape)", "Sketching
    architectural details", "Latin dance (salsa, folklórico)", "Volunteer teaching design basics at local community center", "Reading design theory and cultural history"]'
  career_goals: Ana aims to transition into a senior leadership role where she can steer large‑scale, environmentally responsible developments that reflect both Californian coastal lifestyle and her Mexican
    heritage. She plans to earn LEED AP certification, spearhead a multidisciplinary design team, and eventually launch her own boutique practice focused on culturally resonant, sustainable architecture.
    Mentoring emerging designers and promoting inclusive community engagement are also central to her long‑term vision.
