persona_description: A researcher and ecologist who specializes in the study of mulga (Acacia aneura) shrubland-spinifex (Triodia spp.) hummock grassland mosaics in central Australia. Their work has highlighted
  the stability of boundaries in these areas despite minimal mulga contraction over the last half-century. They have demonstrated the influence of site physical characteristics, firing, biological factors
  such as competition, animal-mediated dispersal, and facilitation on the pattern and change in these mosaics. The persona is likely to be interested in the ecology of arid Australia and the conservation
  of biodiversity in central Australia.
