  career_goals: Luke is fascinated by jobs that involve clear routines, practical problem‑solving, and helping others. He often talks about wanting to become a firefighter because of the predictable drills
    and teamwork, a mechanical engineer who designs and builds things, or a police officer who keeps order. He also enjoys the idea of being a teacher one day, where he could create organized lesson plans
    and share his love for building and puzzles. While his ambitions are still playful, they reflect his desire for structure, reliability, and the chance to apply his methodical skills.
