persona_description: A maritime engineer who specializes in the study of shipworms, their biology, and the techniques used to prevent or mitigate their damage. They have a deep understanding of the intricate
  relationship between shipworms and the wood they feed on, and are skilled in applying pressure treatments, composite plastics, and naturally resistant tropical wood to protect wooden ships from the voracious
  appetite of the shipworm. They are also knowledgeable about the history and evolution of shipworms, as well as the techniques used to combat their destructive force in the past and present.
