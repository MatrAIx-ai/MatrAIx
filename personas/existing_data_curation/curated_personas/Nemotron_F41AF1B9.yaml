  hobbies: '["Reading contemporary fiction", "Hiking in Kisatchie National Forest", "Landscape photography", "Volunteering at after‑school STEM clubs", "Cooking Southern-inspired dishes", "Playing acoustic
    guitar", "Attending local live music events"]'
  career_goals: Nicole aims to become a senior educational technology strategist within a K‑12 school district or higher‑education consortium, eventually overseeing a team that designs inclusive digital
    learning ecosystems. She plans to earn certifications in data analytics and project management, publish case studies on technology integration, and mentor junior analysts. Long‑term, she envisions launching
    her own consultancy that helps small schools adopt accessible, data‑driven instructional platforms while maintaining a focus on equity.
