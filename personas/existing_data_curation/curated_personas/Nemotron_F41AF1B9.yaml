personas:
  professional: Nicole Anderson is an educational technology strategist with a graduate background in education, skillfully designing scalable software for K‑12 districts while applying their methodical,
    data‑driven approach and compassionate focus on learner equity.
  sports: Nicole Anderson is an avid weekend hiker in Kisatchie National Forest, a member of the Louisiana Outdoor Adventure Club, a loyal supporter of the LSU Tigers basketball team and the New Orleans
    Saints, and squeezes in weekly yoga sessions to maintain flexibility.
  arts: Nicole Anderson channels creativity through landscape photography, acoustic‑guitar songwriting, and reading contemporary fiction like Erin Morgenstern’s The Night Circus, while drawing inspiration
    from musicians such as Jason Isbell and photographer Maggie Steber.
  travel: Nicole Anderson prefers thoughtfully planned road trips that blend nature and culture, having explored the Great Smoky Mountains, New Orleans’ French Quarter, and Barcelona’s architecture, and
    dreams of a future photography expedition to Iceland’s northern lights.
  culinary: Nicole Anderson enjoys cooking Southern‑inspired dishes like shrimp étouffée and fried green tomatoes, often experimenting with Cajun spices and a splash of bourbon in marinades, while also
    perfecting sourdough loaves on weekends, though they sometimes over‑salt their recipes.
  core: Nicole Anderson blends analytical precision with heartfelt compassion, balancing data‑driven ed‑tech innovation, disciplined budgeting, mindful health habits, and creative pursuits in photography
    and music, all while keeping a well‑honed curiosity and an occasional tendency to stay up too late.
background:
  cultural: Nicole was raised in Calhoun, a small town in Lincoln Parish, Louisiana. Her family’s roots trace back to generations of European settlers who have lived in the Deep South for decades, giving
    her a blend of traditional Southern values—hospitality, close‑knit community ties, and a respect for local customs—and an openness to cultural diversity. Growing up in a region where Catholic and Protestant
    traditions coexist, she participated in community festivals, enjoyed regional music such as Zydeco and jazz, and developed an appreciation for Louisiana’s culinary heritage. Her white Southern background
    informs her sense of place and community responsibility, while her academic and professional experiences broaden her perspective beyond regional norms.
