personas:
  professional: Mary Erickson, a retired community historian and avid genealogist, leverages their meticulous garden record-keeping skills and sharp budgeting acumen to organize local history projects,
    mentor junior volunteers, and run a modest home-based business selling preserves and handcrafted items, all while they maintain a flexible, skeptical yet collaborative approach.
  sports: Mary Erickson enjoys low-impact fitness through daily walks along the Patuxent River, follows the Baltimore Orioles and Washington Capitals on game nights, and competes fiercely in senior bridge
    tournaments, treating the card game as their mental sport of choice.
  arts: Mary Erickson devotes their evenings to knitting and crocheting charity blankets, immerses themselves in historical fiction by authors such as Hilary Mantel, and regularly attends performances by
    the Baltimore Symphony Orchestra, drawing inspiration for their digital wildlife photography.
  travel: Mary Erickson dreams of road-tripping to heritage sites such as Colonial Williamsburg, Gettysburg, and the National Museum of African American History and Culture, meticulously planning each outing
    around their garden schedule and modest budget while favoring the occasional seaside retreat in the Outer Banks.
  culinary: Mary Erickson’s kitchen is filled with the aroma of Chesapeake Bay crab cakes, Old Bay-seasoned oysters, and fresh heirloom tomato salsa, and they skillfully transform surplus garden harvests
    into simmering tomato preserves, though they sometimes over-salt their dishes in enthusiasm for bold flavors.
  core: Mary Erickson blends a lifelong curiosity for history with practical gardening expertise, competitive bridge instincts, and a love of Chesapeake seafood, and they navigate retirement with a relaxed,
    slightly disorganized, yet resilient spirit.
background:
  cultural: Mary Anna grew up in the Mid‑Atlantic region in a middle‑class, Protestant family with German‑American roots. Her upbringing emphasized self‑reliance, practicality, and community involvement.
    Family traditions include annual Thanksgiving meals, holiday church services, and summer trips to the Chesapeake Bay. Living in Howard County, she has absorbed the area’s blend of suburban life and
    strong historic ties to colonial America, fueling her interest in genealogy and local history. While she identifies as white American, her cultural identity is shaped by Mid‑Atlantic customs, a love
    of seasonal gardening, and a reverence for the region’s natural landscapes.
