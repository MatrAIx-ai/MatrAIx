  hobbies: '[''Organic gardening'', ''Birdwatching'', ''Historical fiction reading'', ''Knitting and crocheting'', ''Bridge tournaments'', ''Puzzle solving (crosswords, sudoku)'', ''Cooking (seafood recipes)'',
    ''Digital photography'', ''Local library book club'', ''Volunteer work at senior center'']'
  career_goals: Although retired from formal employment, Mary Anna aims to deepen her contributions to the community and personal fulfillment. She plans to expand her genealogy archive and publish a family
    history book, mentor younger volunteers at the local historical society, and develop a modest home‑based business selling homemade preserves and handcrafted items. She also aspires to master advanced
    digital photography to document local wildlife and seasonal changes, stay physically active through gardening, and travel to heritage sites across the United States to enrich her historical perspective.
