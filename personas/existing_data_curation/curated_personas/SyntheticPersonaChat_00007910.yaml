    User 1: I also really admire your passion for makeup. It''s clear that you love what you do.

    User 2: Thank you! I do love makeup. It''s a great way to express myself and to make myself feel more confident.

    User 1: I can definitely relate to that. I always feel more confident when I wear makeup.

    User 2: Me too!

    User 1: So, what''s your favorite thing about makeup?

    User 2: I love the way it can transform your look. You can go from looking completely natural to totally glam in just a few minutes.

    User 1: Me too! I love that I can change my look depending on my mood or the occasion.

    User 2: Exactly!

    User 1: So, what are your plans for the future?

    User 2: I''m not sure yet. I''m still in medical school, so I''m focused on that for now. But I''m definitely thinking about continuing to do makeup tutorials after I graduate.

    User 1: That would be awesome! I''m sure you would be great at it.

    User 2: Thank you!

    User 1: Well, it was nice talking to you! I''m sure I''ll be watching more of your videos in the future.

    User 2: Thanks! I hope you do!'
