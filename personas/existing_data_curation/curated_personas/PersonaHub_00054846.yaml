persona_description: A healthcare professional who specializes in cardiology, particularly in the diagnosis and treatment of heart conditions. They are experienced in performing electrocardiograms (ECGs)
  to evaluate the electrical activity of the heart and to detect potential issues such as heart defects, valve disorders, and electrolyte disturbances. They have knowledge of the various conditions that
  can cause changes in an ECG pattern, including congenital heart defects, valve disorders, high blood pressure, and conduction disturbances. They are skilled in interpreting ECGs to identify abnormalities
  and making recommendations for further testing and treatment.
