  career_goals: Loreta aims to advance from floor technician to supervisory role, leading a small team of fabricators while championing continuous improvement initiatives. She envisions launching a weekend
    atelier where she can produce bespoke metal‑art pieces for local galleries and community projects, merging her technical skill with her love for abstract art. In the long term, she hopes to mentor apprentices
    from underrepresented backgrounds, creating pathways into skilled trades for the Bronx’s youth.
