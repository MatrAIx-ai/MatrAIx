personas:
  professional: Loreta Tran melds twenty years of MIG/TIG welding, CNC milling, and injection‑molding expertise with a razor‑sharp artistic vision, delivering precision‑engineered components that double
    as kinetic art while they prepare to lead a small fabricating team, champion continuous improvement, and mentor under‑represented apprentices.
  sports: Loreta Tran favors low‑impact fitness, attending weekly yoga at the Bronx Community Studio, joining the local adult softball league at Pelham Bay Park, and cheering on the New York Yankees and
    New York Knicks during the baseball and NBA seasons, while they balance competitive play with a preference for small‑team camaraderie.
  arts: Loreta Tran immerses themselves in avant‑garde creation, painting abstract canvases inspired by Wassily Kandinsky, sculpting metal forms that echo Anish Kapoor, devouring speculative fiction by
    N.K. Jemisin, and listening to Björk’s ethereal soundscapes while they curate intimate monthly exhibitions with the Bronx art collective.
  travel: Loreta Tran prefers meticulously planned, off‑peak weekend getaways that fuel artistic inspiration—such as sunrise hikes in the Catskills, gallery tours in Berlin, and a quiet yoga retreat in
    Bali—while they balance a modest travel budget that keeps frequent international trips on a wish‑list rather than a routine.
  culinary: Loreta Tran delights in cooking traditional Southeast Asian dishes like lemongrass chicken with fresh Thai basil, fragrant pho broth, and simmered coconut‑milk curry, skillfully blending their
    rooftop‑grown herbs into each recipe, and they treat the kitchen as another studio where experimentation meets comfort.
  core: Loreta Tran is a pragmatic artisan who fuses welding precision with abstract metal sculpture, yet they secretly binge‑watch sci‑fi series late into the night and often forget to water the rooftop
    garden.
background:
  cultural: Loreta’s family emigrated from Vietnam in the early 1990s, bringing with them a deep appreciation for craftsmanship, community, and respect for elders. Growing up in the Bronx, she absorbed
    the vibrant multicultural tapestry of the neighborhood, fluently speaking both Vietnamese and English. Her cultural heritage influences her work ethic, emphasizing precision, humility, and cooperation,
    while her exposure to the borough’s artistic scene nurtures her imagination and love for abstract expression. She often incorporates traditional motifs into her metal art, honoring her roots while celebrating
    her adopted city.
