personas:
  professional: Omelia Mejia is an aspiring elementary school teacher who blends lesson planning, curriculum design, and interactive technology with a curiosity for the arts, using their compassionate and
    flexible nature to craft differentiated, arts-integrated learning experiences that nurture creativity and harmony in the classroom.
  sports: Omelia Mejia embraces the outdoors by hiking the Flint Hills with the local Flint Hills Hiking Club, practices yoga for flexibility, and follows the Kansas City Royals and Chiefs for seasonal
    excitement, while occasionally playing intramural volleyball at the community center to keep active.
  arts: Omelia Mejia channels creative energy through watercolor painting of prairie landscapes, sketches inspired by the works of Georgia O'Keeffe, listens to indie folk artists like Sufjan Stevens and
    Joni Mitchell, and finds literary solace in contemporary novels by Sally Rooney, all of which shape their artistic identity.
  travel: Omelia Mejia favors low-key, spontaneous getaways, frequently spending weekends exploring the craft-filled streets of Portland, Oregon, the artistic enclave of Santa Fe, New Mexico, and dreaming
    of a future retreat to Kyoto, Japan to study traditional ceramics, all while balancing a modest travel budget and a desire for meaningful cultural immersion.
  culinary: Omelia Mejia enjoys cooking simple, wholesome meals like herb-infused quinoa salads, fresh basil pesto pasta, and roasted vegetable tacos, drawing fresh ingredients from their garden and mastering
    intermediate skills such as hand-made macramé-inspired tortilla twists, yet often forgets to defrost food in time, leading to last-minute frozen pizza nights.
  core: Omelia Mejia is a quietly curious, arts-driven educator who balances a love for nature and creativity with a flexible, sometimes disorganized lifestyle, and whose compassionate heart drives every
    project from the classroom to the garden.
background:
  cultural: Omelia was raised in Augusta, a small town in Kansas, where Midwestern values of community, modesty, and self‑reliance are prominent. Her family is of European descent, with generations who
    settled on the Great Plains, and she was brought up with traditions such as church involvement, seasonal community festivals, and an appreciation for American folk art. Although she identifies as white,
    the Hispanic origin of her surname reflects a multicultural lineage that she honors through an openness to diverse cultural expressions, especially in the arts. The close‑knit social fabric of her hometown,
    combined with a love for nature and hospitality, has shaped her compassionate, cooperative, and collaborative outlook.
