  hobbies: '[''Sketching'', ''Watercolor painting'', ''Visiting art galleries'', ''Reading contemporary fiction'', ''Listening to indie folk music'', ''Hiking'', ''Gardening'', ''Cooking'', ''Yoga'', ''Volunteer
    tutoring'', ''Book club'', ''DIY crafts'']'
  career_goals: Omelia aims to become a certified elementary school teacher with a specialty in arts‑integrated learning. She plans to complete her teaching licensure and pursue a master's degree in curriculum
    and instruction to deepen her expertise. Long‑term, she hopes to develop after‑school programs that combine creative arts and STEM for underserved youth in rural Kansas, and eventually lead a nonprofit
    organization that expands access to arts education. She also envisions taking on mentorship and student‑wellbeing roles, such as a school counselor, while maintaining a flexible schedule that supports
    her marriage and community ties.
