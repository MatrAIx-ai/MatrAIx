personas:
  professional: Catherine Wagner, a 52‑year‑old full‑stack software developer with 25 years of experience, leverages their business graduate background, Python and React expertise, and keen UI/UX eye—shaped
    by their love of contemporary art—to lead hackathon workshops, drive data‑driven product strategy, and aggressively pursue a senior technology leadership role while mentoring women in tech, despite
    their occasional skepticism and competitive streak.
  sports: Catherine Wagner energizes their fitness routine by leading weekend hikes with the Cascades Hiking Club, joining a summer cycling group that follows the Seattle Sounders FC schedule for post‑ride
    celebrations, cheering the Seattle Seahawks on football Sundays, and occasionally hitting the slopes at Snoqualmie Pass during winter, all while balancing a competitive spirit inherited from their chess
    club days.
  arts: Catherine Wagner frequents the Seattle Art Museum to study the immersive installations of James Turrell and the vibrant pop‑culture prints of Yayoi Kusama, while they channel that inspiration into
    their own watercolor landscapes of the Puget Sound, and they volunteer to digitize exhibition catalogs for the Marysville Arts Council, often attending performances by the Seattle Symphony and concerts
    by local indie folk band The Head and the Heart.
  travel: Catherine Wagner prefers meticulously planned cultural getaways, having already explored the galleries of Barcelona’s El Barris and the tea houses of Kyoto, while they dream of a leisurely road
    trip along the Pacific Northwest’s coastal towns such as Cannon Beach and Port Townsend, balancing their love of art‑focused itineraries with a modest family budget and occasional work‑travel constraints.
  culinary: Catherine Wagner, a competent home cook, relishes crafting cedar‑plank salmon with miso glaze and fresh dill while also indulging in aromatic pho and spicy paneer tikka at local food festivals,
    and they often experiment with seasonal Pacific Northwest ingredients like fiddlehead ferns and wild mushrooms in their own watercolor‑inspired culinary presentations.
  core: Catherine Wagner is a curiosity‑driven tech veteran whose competitive edge fuels both hackathon triumphs and relentless worry, and they balance a disciplined work ethic with a penchant for watercolor
    escapism, mindfulness journaling, and occasional impulsive art‑supply splurges.
background:
  cultural: Catherine is a white American who grew up in the Pacific Northwest in a family of mixed German and Irish ancestry. Her upbringing blended small‑town community values—hard work, reliability,
    and a close‑knit family network—with the region’s progressive, environmentally conscious, and tech‑forward culture. She earned her business degree at the University of Washington and has lived most
    of her adult life in Snohomish County, where she has embraced the local love of nature, cultural arts, and collaborative community initiatives.
attributes:
