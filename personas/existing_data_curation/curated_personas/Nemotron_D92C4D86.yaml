    ''Stakeholder communication and presentation'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Watercolor painting'', ''Participating in local coding meetups and hackathons'', ''Playing competitive chess'', ''Hiking in the Cascade
    foothills with friends and family'', ''Mindfulness meditation and journaling'', ''Volunteering as a tech advisor for the Marysville Arts Council'', ''Exploring diverse cuisines at food festivals'']'
  career_goals: Leveraging her unique blend of business acumen and technical depth, Catherine aims to move into a senior technology leadership role—such as VP of Engineering or Chief Technology Officer—where
    she can drive the creation of socially impactful digital products that celebrate art and community engagement. She plans to earn an AWS Certified Solutions Architect credential within the next year,
    lead a cross‑functional team to launch a platform that connects local artists with patrons, and speak at at least three regional tech or business conferences about the intersection of technology, art,
    and entrepreneurship. Additionally, she hopes to mentor more women in tech and eventually launch a boutique consultancy that helps nonprofit arts organizations digitize their operations.
