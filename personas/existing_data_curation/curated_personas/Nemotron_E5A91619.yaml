    (vegetable and herb cultivation)", "Cultural storytelling and heritage preservation"]'
  hobbies: '["Cooking and recipe experimentation", "Gardening (vegetables, herbs, and ornamental plants)", "Dancing to mariachi and folkloric music", "Attending church services and choir involvement", "Knitting
    and quilting", "Watching classic Mexican cinema and telenovelas", "Reading and participating in a senior book club", "Walking in local parks with her husband", "Volunteering at community events", "Cultural
    storytelling and sharing family histories"]'
  career_goals: Although retired from formal employment, Valentina is driven to channel her experience into meaningful community contributions. She aspires to volunteer regularly at the local senior center,
    leading cooking workshops that teach traditional Mexican recipes to both seniors and younger participants. She hopes to become a peer support facilitator for older adults dealing with anxiety and depression,
    drawing on her own emotional resilience. Valentina also wishes to mentor youth from Mexican immigrant families, helping them navigate school and cultural adaptation, and to organize intergenerational
    events that celebrate Mexican holidays. Long term, she dreams of establishing a small cultural garden in her neighborhood where elders can gather, share stories, and cultivate herbs used in Mexican
    cuisine, fostering a sense of belonging and mental well‑being.
