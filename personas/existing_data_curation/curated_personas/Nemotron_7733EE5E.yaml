personas:
  professional: Master carpenter Emilia Lira, with over fifty years of structural framing and high‑finish woodworking experience, translates their love of structure, predictability, and competitive craftsmanship
    into meticulous blueprint interpretation, flawless mortise‑and‑tenon and dovetail joinery, rigorous OSHA‑compliant safety planning, and budget‑tight project estimates, all while methodically mentoring
    apprentices in a community‑focused apprenticeship program.
  sports: Active senior Emilia Lira walks the wetlands near Modesto each morning, participates in weekly tai chi classes at the senior center, volunteers as a bench‑coach for the local senior softball league,
    and cheers on the Modesto Nuts baseball team during the summer season, all while staying mindful of their joint health.
  arts: Creative quilter Emilia Lira channels Mexican textile patterns into hand‑stitched blankets while they listen to ranchera icons like Vicente Fernández and the Mariachi Vargas de Tecalitlán, embracing
    both functional craft and cultural music as daily inspiration.
  travel: Adventurous Emilia Lira enjoys road‑tripping to historic sites such as San Miguel de Allende, revisiting their family’s roots, and takes yearly cruises to the Pacific Northwest, while also savoring
    weekend visits to California’s wine country and coastal redwood forests, all planned with their knack for detailed itineraries.
  culinary: Passionate home chef Emilia Lira cultivates heirloom tomatoes, fire‑roasted chiles, and fresh cilantro for authentic mole, tamales, and pozole, expertly balancing smoky pasilla, sweet ancho,
    and bright cilantro flavors, and loves sharing these feasts with neighbors and grandchildren, reflecting their generous spirit and love of communal meals.
  core: Emilia Lira blends meticulous carpentry, disciplined finances, a garden‑fueled culinary flair, and a steadfast commitment to community mentorship, all driven by a structured yet warmly competitive
    spirit that they carry into every facet of life.
background:
  cultural: Emilia was born to Mexican immigrant parents who settled in the Central Valley during the 1950s. Raised in a bilingual household, she grew up with Spanish spoken at home, Mexican holidays such
    as Día de los Muertos celebrated alongside local American customs, and a strong Catholic faith that informs her community involvement. The craftsmanship traditions she learned from her father—a carpenter
    who built homes for migrant workers—instilled a respect for durable, purpose‑driven work. Living in Modesto, she blends these Mexican roots with Californian pragmatism, often incorporating traditional
    folk motifs into her carpentry and sharing cultural recipes at neighborhood gatherings. Her identity is a bridge between Mexican heritage and the diverse fabric of Stanislaus County.
attributes:
  skills: '[''Carpentry (structural framing and finish work)'', ''Blueprint reading and interpretation'', ''Precision joinery (mortise‑and‑tenon, dovetail)'', ''Project planning and timeline management'',
