persona_description: A historian who specializes in the study of colonialism and environmental policies, particularly in Bhutan, India, and Tanzania. His research interests include the impact of colonial
  exploitation of forest land for "scientific management of forest land" and the importance of avoiding such exploitation. He is knowledgeable about the key differences between colonialism and post-colonialism,
  and the application of lessons from one to the other. His expertise in environmental conservation and social justice in these countries is particularly valuable in understanding the interlinkages between
  forest cover and climate change mitigation.
