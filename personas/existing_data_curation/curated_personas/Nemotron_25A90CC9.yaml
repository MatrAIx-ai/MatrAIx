personas:
  professional: Jang Chung, a 39‑year‑old B2B wholesale specialist, blends a methodical, data‑driven sales process with a curiosity for emerging tech, excelling at strategic account development, high‑value
    contract negotiation, and seamless supply‑chain coordination while their competitive nature keeps them skeptical of rivals and drives relentless pipeline optimization.
  sports: Jang Chung plays badminton at the local community center, follows the New York Giants (NFL) and New Jersey Devils (NHL), hikes the Palisades on weekends with a regional hiking club, and keeps
    a modest subscription to the New York Knicks for occasional basketball insights.
  arts: Jang Chung enjoys reading contemporary novels by Haruki Murakami, listening to the melodic rock of Fleetwood Mac, and attending quarterly gallery openings that showcase mixed‑media installations
    by artists like Ai Weiwei, while also indulging in Christopher Nolan’s sci‑fi thrillers.
  travel: Jang Chung prefers meticulously planned trips, has explored New York City, Washington DC, and Toronto, dreams of hiking Iceland’s volcanic landscapes and strolling through Kyoto’s historic temples,
    and balances a moderate travel budget with occasional family‑oriented beach getaways in the Caribbean.
  culinary: Jang Chung experiments with fusion dishes that blend fermented chili paste and soy‑based sauces with classic New Jersey deli fare, such as a quinoa‑based bowl topped with pork roll, scallions,
    and a miso‑infused dressing, while regularly sourcing fresh basil, ginger, and locally caught fish for inventive home‑cooked meals.
  core: Jang Chung, a 39‑year‑old sales strategist with a competitive edge, balances curiosity‑driven tech tinkering, disciplined financial planning, and occasional gadget indulgences, all while maintaining
    a methodical, skeptical, yet resilient outlook on life.
background:
  cultural: Jang was raised in a Korean-American household in Union City, New Jersey. His parents immigrated from South Korea in the late 1980s, instilling values of hard work, respect for education, and
    familial responsibility. He grew up bilingual, speaking Korean at home while attending English-language schools, and later studied Mandarin and Spanish to broaden his professional reach. Cultural traditions
    such as Chuseok, Lunar New Year, and the celebration of Korean cuisine remain central to his family life. Living in a diverse community, he has also absorbed elements of the local Hispanic culture,
    which informs his appreciation for multicultural perspectives and his conversational Spanish. This blend of Korean heritage and American upbringing shapes his disciplined work ethic, his methodical
    approach to challenges, and his respect for both collective and individual achievement.
attributes:
  skills: '["B2B wholesale sales strategy", "Negotiation and contract management", "Strategic account development", "CRM proficiency (Salesforce, HubSpot)", "Data analysis and sales forecasting (Excel,
