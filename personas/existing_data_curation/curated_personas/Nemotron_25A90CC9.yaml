    of sales technology (AI-driven lead scoring)"]'
  hobbies: '["Badminton", "Reading (business, technology, Korean literature)", "Cooking fusion cuisine", "Hiking (Palisades, local parks)", "DIY electronics and IoT projects", "Mentoring high-school students"]'
  career_goals: He aims to advance to a regional sales manager position within the next three years, overseeing a team of representatives across the Mid-Atlantic. To prepare, he plans to earn a Certified
    Professional Sales Leader credential and deepen his knowledge of sustainable manufacturing solutions, positioning himself as a trusted advisor for eco-focused clients. Long-term, Jang envisions launching
    his own wholesale distribution venture that supplies environmentally responsible products to manufacturers, leveraging his extensive network and industry expertise. He is also motivated to mentor junior
    sales staff, fostering a high-performance culture within his organization.
