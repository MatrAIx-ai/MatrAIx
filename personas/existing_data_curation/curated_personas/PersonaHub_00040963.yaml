persona_description: An archaeologist with expertise in the study of ancient military fortifications and the history of the Timna Valley. She is particularly interested in the complex defense system and
  trade links of the ancient communities and the biblical accounts of wars between Israel and the Edomites. She is also interested in the discovery of evidence of military conflicts in the copper mines
  of Timna at this period and the implications of these findings for the biblical accounts. She is likely to have a deep understanding of organic remains found within the fortification's donkey stables
  and the analysis of pollen, seed and fauna in the dung. She is also likely to have a strong interest in the preservation of organic material and clothing discoveries.
