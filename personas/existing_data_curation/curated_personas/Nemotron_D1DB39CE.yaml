personas:
  professional: Miah Litz is a 21‑year‑old youth sports coach and regional scout who blends a humanities education with hands‑on coaching, designing flexible training drills, spotting raw talent, and delivering
    motivational feedback while navigating a laid‑back, slightly disorganized schedule and a competitive edge; they thrive on community mentorship and ambitious career goals.
  sports: Miah Litz is an avid outdoor enthusiast who hikes the Ozark trails, volunteers at the Lawrence County Lightning youth soccer club, follows the Missouri Tigers basketball, Kansas City Chiefs football,
    and St. Louis Cardinals baseball teams, and balances a routine of yoga, sprint intervals, and weekly volunteer coaching sessions to stay fit; they view fitness as both a personal outlet and a model
    for the athletes they mentor.
  arts: Miah Litz is an acoustic guitarist who finds solace in playing Sufjan Stevens and John Mayer tunes, collects vintage sports posters, reads biographies like 'Open' by Andre Agassi and 'The Creative
    Habit' by Twyla Tharp, and watches indie films such as 'Lady Bird' to fuel creative inspiration; they often let music and storytelling inform their coaching philosophy.
  travel: Miah Litz is a road‑trip lover who spends weekends exploring the Ozark National Scenic Riverways, dreams of hiking the Appalachian Trail, and occasionally travels to Nashville for scouting events,
    preferring budget motels and hostels that let them stretch their scouting network while staying within a modest travel budget; they relish the mix of familiar Midwest scenery and new horizons.
  culinary: Miah Litz is a kitchen experimenter who blends Southern comfort food with global flavors—crafting dishes like shrimp and grits with harissa, quinoa salad with pomegranate and feta, and butter
    chicken tacos—while relying on fresh herbs like rosemary, cilantro, and smoked paprika, though they sometimes order fast‑food pizza when time‑pressed, reflecting both culinary curiosity and occasional
    convenience.
  core: Miah Litz is a curious, slightly disorganized 21‑year‑old coach who balances Midwestern modesty with a competitive drive, worries often, yet channels that energy into innovative training, frugal
    finances, and eclectic hobbies; they embrace both tradition and new ideas.
background:
  cultural: Miah grew up in a small, close‑knit community in Republic, Missouri, a town with deep Midwestern values of self‑reliance, modesty, and community involvement. Her family background is predominantly
    white, with generations of residents who participated in local high‑school sports, church gatherings, and county fairs. These traditions fostered a strong sense of local identity, an appreciation for
    teamwork, and an informal mentorship culture. While she respects the conservative norms of her hometown, her humanities studies and coaching experiences have broadened her worldview, encouraging her
    to blend traditional Midwestern hospitality with a curiosity for new ideas and diverse perspectives.
attributes:
  skills: '["Talent identification", "Adaptive training program design", "Motivational coaching", "Sports psychology basics", "Event logistics coordination", "Community networking", "Analytical observation",
    "Basic sports injury prevention", "Interpersonal communication", "Strategic game analysis"]'
  hobbies: '["Hiking in the Ozarks", "Reading contemporary biographies", "Acoustic guitar playing", "Cooking experimental recipes", "Yoga and meditation", "Journaling", "Volunteering at youth sports clinics",
    "Collecting vintage sports memorabilia", "Listening to psychology podcasts"]'
  career_goals: Miah aims to become the head coach of a high‑school varsity team within the next three years, earning her state coaching certification and eventually pursuing a master's in sports management.
    She envisions launching a community‑focused youth development academy that blends traditional Midwest sports culture with cutting‑edge performance analytics. Long‑term, she hopes to transition into
    a regional scouting role for a Division I college program, using her reputation for thorough talent evaluation and her network of local coaches to bridge grassroots athletes with higher‑level opportunities.
    Throughout, she wants to maintain a flexible schedule that allows her to stay connected to her hometown and manage her personal stress levels.
