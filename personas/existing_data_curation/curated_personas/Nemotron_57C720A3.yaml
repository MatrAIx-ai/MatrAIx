  hobbies: '[''sketching'', ''visiting local art galleries'', ''listening to jazz and hip‑hop music'', ''reading urban fiction and philosophy'', ''playing pick‑up basketball'', ''hiking local trails'',
    ''cooking soul food'', ''leading art workshops for senior residents'']'
  career_goals: Byron aims to earn a bachelor’s degree in health services administration and become a certified Geriatric Care Manager within the next three years. His long‑term ambition is to advance to
    the role of director of a senior‑living facility that integrates art‑based therapeutic programs, or to launch his own boutique personal‑care consultancy focused on holistic well‑being for underserved
    African‑American seniors. He also seeks to mentor more staff members and advocate for policies that improve quality of care and cultural enrichment in his community.
