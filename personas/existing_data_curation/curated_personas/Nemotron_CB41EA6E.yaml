  career_goals: Naomi aims to shift from daily call‑center duties to a mentorship and community liaison role within her organization, where she can coach agents and design customer‑experience workshops.
    She hopes to volunteer as a cultural ambassador for local museums, leading guided tours and educational programs that combine her love of art with her communication skills. In the longer term, Naomi
    envisions launching a small artisan studio offering personalized crafts and hosting community art events, blending her customer‑service expertise with her creative passions.
