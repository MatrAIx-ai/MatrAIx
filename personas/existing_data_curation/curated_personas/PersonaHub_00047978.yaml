persona_description: A researcher or statistician who specializes in the study of social and demographic data, particularly in the Philippines. They are interested in the Bicol River Basin Development Program
  (BRBDP) and its impact on the Bicol Region. They are familiar with data collection methods and have experience working with administrative records and household surveys. They are interested in studying
  the physical aspects of the barangay, the use of social services, and the impact of the BRBDP and outside influences on the barangay. They are also interested in the physical characteristics, community
  services, medical services, social services, sanitation, and educational systems available within the barangay.
