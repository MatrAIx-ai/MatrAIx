personas:
  professional: John Mahmoud, 29, is a first‑line supervisor at a high‑volume manufacturing plant who blends lean‑manufacturing expertise with a visual artist’s mindset, building Python‑driven dashboards
    and CAD‑based process redesigns to turn bottlenecks into elegant, KPI‑crushing workflows while championing crew‑generated innovative ideas.
  sports: John Mahmoud, 29, stays active by shooting hoops at local pick‑up basketball games, cheering on the Dallas Mavericks and the Texas Rangers, playing weekend intramural soccer with a downtown club,
    and joining a seasonal ladder‑tennis league in the spring, while occasionally testing the limits of his stamina with cross‑fit circuits at the gym.
  arts: John Mahmoud, 29, channels his imagination into oil paintings inspired by Frida Kahlo’s vibrant storytelling, creates digital speculative‑fiction storyboards that echo the biomechanical surrealism
    of H.R. Giger, performs in improv comedy nights that channel the quick‑wit of Tina Fey, and curates board‑game meet‑ups featuring titles like Gloomhaven and Terraforming Mars, all of which fuel his
    artistic identity.
  travel: John Mahmoud, 29, plans trips with a blend of meticulous research and spontaneous detours, having trekked the Texas Hill Country, explored the neon streets of Tokyo for an anime convention, and
    road‑tripped through New Mexico’s art colonies, while dreaming of soaking in Reykjavik’s geothermal spas and wandering the misty cliffs of Ireland’s Cliffs of Moher, all within a budget that balances
    his love of craft‑beer tastings and workshop visits.
  culinary: John Mahmoud, 29, is an adventurous home‑cook who mixes Texas‑style brisket rubs with smoked paprika and cumin, frequently experiments with making his own sourdough starter and crafting sushi
    bowls featuring ahi tuna, avocado, and pickled ginger, while pairing meals with local craft‑brew releases like a hoppy IPA brewed with citrus zest, reflecting his moderate cooking skill and palate for
    bold flavors.
  core: John Mahmoud, 29, is a lean‑manufacturing supervisor whose imagination fuels oil paintings and maker‑space projects, yet a persistent worry‑track keeps him obsessively spreadsheet‑driven in both
    finances and fitness, often rewarding himself with craft‑beer indulgences after a day of relentless KPI hunting.
background:
  cultural: John grew up in Denton, Texas, a college town where Southern‑Texan work ethic meets a lively academic atmosphere. His family’s white, middle‑class background emphasized self‑reliance, community
    participation, and a love for local traditions such as BBQ, country music, and high‑school football. At the same time, the proximity to the University of North Texas exposed him to diverse cultural
    events, maker fairs, and progressive art scenes, shaping a hybrid identity that blends pragmatic Texas values with an openness to new ideas and multicultural experiences.
