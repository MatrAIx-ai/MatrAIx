  career_goals: John aims to move from first‑line supervision to a plant‑manager role within the next five years, overseeing multiple shifts and leading a transformation toward Industry 4.0 technologies
    such as IoT‑enabled equipment and predictive maintenance. He plans to earn a master's degree in Industrial Engineering to deepen his expertise in systems design and sustainability. Long‑term, he envisions
    founding a consulting practice that helps midsize manufacturers implement innovative, low‑cost automation while integrating ergonomic and artistic design principles to improve worker satisfaction and
    product aesthetics.
