personas:
  professional: Richard Alter, a senior instructional designer and aspiring L&D leader, blends rigorous data-driven analysis with vivid visual storytelling, orchestrating enterprise e‑learning solutions
    on Cornerstone and SAP SuccessFactors using Articulate Storyline and Adobe Captivate while championing AR/VR prototypes and gamified micro‑learning to deliver measurable ROI.
  sports: Richard Alter, an energetic member of the Steel City Flyers ultimate‑frisbee league, also roots for the Pittsburgh Steelers and Penguins, participates in a Saturday morning run club along the
    Three Rivers Trail, and uses weekend bike rides to combine fitness with scenic photography.
  arts: Richard Alter, a versatile creator, pours imagination onto acrylic canvases and digital tablets, unwinds at the piano playing Debussy, devours science‑fiction works by Isaac Asimov and William Gibson,
    philosophical treatises by Kant and Camus, and design‑thinking books by Tim Brown, while regularly visiting the Andy Warhol Museum and catching live shows by indie band The Dandelion Wine.
  travel: Richard Alter, a meticulous planner who balances a demanding career with a love for art‑centric travel, budgets for annual trips to culturally rich cities such as Berlin, Barcelona, and Kyoto,
    often combining museum tours with spontaneous street‑art explorations, while preferring short‑haul flights to maximize weekend getaways.
  culinary: Richard Alter, a moderately skilled home cook, favors grilled salmon with fresh dill, creamy mushroom risotto using arborio rice, and handcrafted pierogi stuffed with potatoes and cheese, often
    seasoning with smoked paprika and experimenting with sous‑vide techniques, while occasionally over‑indulging in late‑night pizza deliveries after a long design sprint.
  core: Richard Alter, a 35‑year‑old creative strategist, balances disciplined project leadership with a restless imagination, often juggling midnight sketch sessions, impulse art‑supply purchases, and
    a habit of checking email during dinner.
background:
  cultural: Richard grew up in the suburban community of Oakmont, a middle-class enclave in Allegheny County, Pennsylvania. His family’s roots are primarily Anglo-American, with ancestors who settled in
    western Pennsylvania during the early industrial era. The regional culture emphasized a strong work ethic, modesty, and community involvement—values reflected in his disciplined approach to professional
    life. Simultaneously, the proximity to Pittsburgh’s vibrant arts scene exposed him to museums, galleries, and live theater, fostering his appreciation for creativity and novelty. He celebrates holidays
    such as Thanksgiving and Christmas in a blend of traditional Protestant and secular customs, enjoys tailgating for Steelers games, and often spends weekends hiking the nearby state parks. This combination
    of a diligent, community-oriented Mid-Atlantic upbringing and an early immersion in cultural and artistic experiences shapes his worldview and personal identity.
attributes:
  skills: '[''Instructional Design (ADDIE)'', ''Curriculum Development'', ''Learning Management Systems (Cornerstone, SAP SuccessFactors)'', ''E‑learning Authoring (Articulate Storyline, Adobe Captivate)'',
