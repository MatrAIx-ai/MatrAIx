    & Visual Storytelling'', ''Creative Problem Solving'', ''Facilitation & Public Speaking'', ''Stakeholder Engagement'']'
  hobbies: '[''Painting (acrylic and digital)'', ''Photography (urban and nature)'', ''Reading (science fiction, philosophy, design thinking)'', ''Playing piano'', ''Ultimate Frisbee'', ''Community theater
    (acting and production)'', ''Visiting museums and cultural festivals'', ''Experimenting with AR/VR tech'', ''Mentoring youth leadership programs'', ''Designing gamified learning prototypes'']'
  career_goals: Richard aims to progress to a senior leadership role such as Director of Learning and Development within the next five years, eventually positioning himself as a Chief Learning Officer.
    He wants to champion innovative learning modalities—augmented reality, virtual reality, and gamified micro-learning—to keep his organization at the cutting edge. He plans to earn the ATD Certified Professional
    in Learning and Performance (CPLP) and pursue a master’s degree in Organizational Development. By publishing articles, speaking at industry conferences, and building a signature leadership development
    program, he hopes to become a recognized thought leader in the field. In the long term he envisions establishing his own consultancy that helps companies embed creativity and experiential learning into
    their talent development strategies.
