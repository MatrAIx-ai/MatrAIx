persona_description: A historian who specializes in the study of the American West, particularly the events and figures related to the establishment and administration of the United States' territorial
  and state boundaries. The individual is deeply interested in the political, social, and economic aspects of this period, and is knowledgeable about the Boundary Commission and its role in the development
  of American boundaries. They are also likely to be familiar with the Treaty of Guadalupe Hidalgo and its provisions regarding the acquisition and treatment of captives.
