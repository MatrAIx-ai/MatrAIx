personas:
  professional: Daniela Santanaroman, an imaginative community agriculture leader with decades of hands‑on field expertise and bilingual mediation skills, designs garden beds in folk‑art patterns, bridges
    crew communication, and, despite a relaxed approach to paperwork, they passionately drive the upcoming urban garden hub for youth in Pacoima.
  sports: Daniela Santanaroman stays active through weekly ballet folklórico rehearsals, casual jogs around their garden, and cheering on the Los Angeles Dodgers and LAFC while they occasionally join the
    Pacoima Community Soccer Club’s weekend pick‑up games.
  arts: Daniela Santanaroman channels imagination into large‑scale murals inspired by Diego Rivera, delights in reading Lorna Dee Cervantes’s poetry, they sway to the music of Los Lobos and Selena at neighborhood
    jam sessions, and they craft papel picado for festivals, blending visual and auditory art into a vibrant personal narrative.
  travel: Daniela Santanaroman prefers spontaneous road trips to culturally rich sites like Oaxaca’s market streets and Catalina Island’s coastal trails, they plan most journeys on a shoestring budget using
    community travel co‑ops, and they dream of exploring the historic gardens of Seville when finances allow.
  culinary: Daniela Santanaroman experiments in the kitchen by fusing traditional tamales with mango salsa, crafting quinoa‑based chiles en nogada, and seasoning dishes with epazote, roasted corn, and dark
    cacao, they showcase an intermediate but adventurous cooking skill that turns every meal into a cultural tasting adventure.
  core: Daniela Santanaroman is a talkative, garden‑loving storyteller who blends folk art with community activism, often loses track of appointments while they passionately champion local harvests.
background:
  cultural: Daniela was raised in a Mexican‑American household where farming and family traditions were interwoven. Her grandparents brought knowledge of traditional Mexican agricultural practices, seasonal
    celebrations, and Catholic rituals to the United States, shaping her deep connection to heritage. Growing up in the vibrant Latino community of Pacoima, she has been immersed in bilingual daily life,
    celebrating Día de los Muertos, Cinco de Mayo, and local fiestas with music, food, and communal art. These cultural roots inform her values of family solidarity, collective well‑being, and respect for
    nature. She proudly maintains customs such as preparing tamales, creating papel picado, and participating in community dances, while also navigating the multicultural mosaic of Los Angeles, blending
    Mexican traditions with the diverse influences of her neighborhood.
attributes:
  skills: '[''planting, pruning, and harvesting of diverse crops'', ''irrigation system management and water‑conservation techniques'', ''organic pest management and soil health assessment'', ''maintenance
    and repair of farm tools and equipment'', ''bilingual communication (Spanish‑English) for crew coordination'', ''conflict mediation and team‑building among agricultural workers'', ''creative garden
    design integrating art and cultural motifs'', ''traditional Mexican cooking and recipe development'', ''craftsmanship in papel picado and embroidery'', ''storytelling and community event facilitation'',
    ''mentoring youth in agricultural practices'', ''flexible problem‑solving and improvisation in field tasks'']'
  hobbies: '[''painting murals inspired by Mexican folklore'', ''performing ballet folklórico dance'', ''cooking experimental fusion dishes with Mexican ingredients'', ''growing a personal vegetable garden'',
    ''crafting papel picado and decorative crafts for festivals'', ''reading contemporary poetry and abstract fiction'', ''attending local art exhibits and cultural festivals'', ''volunteering as a storyteller
    at community centers'', ''participating in neighborhood gardening workshops'', ''engaging in informal music jam sessions with friends'']'
  career_goals: Daniela aspires to move from labor‑intensive field work to a leadership role in community agriculture. She plans to obtain a horticulture certification and use her sociable, compassionate
    temperament to launch an urban garden hub in Pacoima that serves as a learning space for local youth and a gathering place for neighbors. In the long term, she dreams of establishing a cooperative market
    that showcases Mexican heritage produce, crafts, and cuisine, creating jobs for her community and preserving cultural traditions. She also hopes to become an advocate for farmworker rights, using her
    natural ability to speak before groups to influence local policy and support networks.
