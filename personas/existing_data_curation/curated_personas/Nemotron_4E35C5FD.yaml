personas:
  professional: Patricia Bueford is a budding junior game developer who writes simple interactive games on Scratch, leveraging their methodical planning skills and love for group collaboration to design
    projects that friends can test together.
  sports: Patricia Bueford plays on the middle school basketball and soccer teams, practices drills after school, cheers for the local Wildcats, and often organizes team snack runs, balancing competitive
    play with a strong sense of teamwork.
  arts: Patricia Bueford showcases hip‑hop and R&B dance moves at school talent shows, sings in the church youth choir, and draws inspiration from artists like Beyoncé and Lin‑Manuel Miranda while spending
    weekends crafting DIY scrapbook pages.
  travel: Patricia Bueford enjoys weekend trips to the nearby state park for hiking and camping, has visited Washington, D.C. on a school field trip to explore the museums, and dreams of exploring the historic
    castles of Scotland during a future exchange program.
  culinary: Patricia Bueford loves making peanut butter and banana sandwiches, baking chocolate chip cookies with their mom, and experimenting with simple chicken quesadilla recipes, though they sometimes
    forget to clean up the kitchen promptly.
  core: Patricia Bueford is a structured, energetic middle schooler who balances organized schoolwork, team sports, and creative hobbies, yet occasionally procrastinates on chores and indulges in mystery
    novels.
background:
  cultural: Patricia comes from an African‑American family rooted in Chicago’s South Side, where strong community bonds, church involvement, and celebration of Black culture shape daily life. Her family
    emphasizes education, resilience, and service, often participating in local festivals, block parties, and Black History Month programs. Growing up, Patricia listened to gospel, R&B, and hip‑hop, and
    learned about local civil‑rights leaders like Ida B. Wells and Harold Washington. This cultural backdrop informs her identity, fuels her passion for community advocacy, and nurtures her appreciation
    for collective achievement.
