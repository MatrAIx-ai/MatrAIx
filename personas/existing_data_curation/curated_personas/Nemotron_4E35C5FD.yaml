  career_goals: Patricia dreams of becoming a community health worker or a teacher who can support other children in her neighborhood. She hopes to study public health or education in the future, aiming
    to develop programs that help kids stay organized and succeed academically. Patricia also aspires to create educational apps that blend technology with learning, leveraging her early coding experience.
    In the short term, she plans to join her middle school’s student council, develop her leadership skills, and continue volunteering in community projects, all with the goal of giving back to Chicago’s
    South Side.
