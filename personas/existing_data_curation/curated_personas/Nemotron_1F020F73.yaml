personas:
  professional: Donnie Wilson, a budding marine‑science enthusiast, channels their strategic mind into building detailed LEGO seascapes and drafting factual reports, and they approach each project with
    methodical precision, laying the groundwork for a future career as a marine biologist.
  sports: Donnie Wilson competes on the local Junior Swim Club, practices structured lap drills thrice weekly, cheers for the Los Angeles Dodgers and the Seattle Kraken, and they see swimming as both a
    disciplined sport and a strategic competition.
  arts: Donnie Wilson immerses themselves in marine‑themed creativity, building intricate LEGO shipwrecks while listening to Jacques Cousteau’s documentaries, admiring the artwork of LEGO master Nathan
    Sawaya, and they enjoy the upbeat tunes of The Aquabats after completing a puzzle.
  travel: Donnie Wilson prefers meticulously planned coastal getaways, has visited the Monterey Bay Aquarium and the tide pools of Cape Cod, dreams of snorkeling in the Great Barrier Reef, and they favor
    trips that combine structured learning with brief bursts of adventure.
  culinary: Donnie Wilson enjoys assembling simple meals like grilled salmon with lemon, tuna sushi rolls, and cheese pizza, relishes sea‑salted popcorn and carrot sticks, and, while a novice cook, they
    can follow step‑by‑step recipes with an eye for precision.
  core: Donnie Wilson, a nine‑year‑old strategic thinker, blends a love for marine facts with meticulous LEGO building, they worry about perfection, and subtly channel competitive energy into solo pursuits.
background:
  cultural: Donnie comes from a white family that has lived in Honolulu for several generations. While his household follows mainstream American customs, his upbringing includes exposure to Hawaii’s multicultural
    environment through school celebrations of local Hawaiian traditions, such as basic hula movements and ukulele music. The island’s natural surroundings and community activities influence his interest
    in marine science, though his daily life reflects typical mainland American values.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''LEGO building'', ''Logic puzzles'', ''Educational app usage'']'
  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Strategic video games'', ''Reading nonfiction about ocean life'', ''Tide‑pool exploration with small group'', ''Swimming drills'', ''Writing factual
    reports on marine creatures'']'
  career_goals: Although he is nine, Donnie already envisions a career that offers clear steps and measurable achievement. He aspires to become a marine engineer or oceanographer, drawn by the structured
    nature of engineering and his fascination with the ocean around Honolulu. He also dreams of creating an educational video game about marine ecosystems, aiming to be among the top competitors in school
    science fairs and coding contests. He sets specific milestones and worries about staying on track, which drives his disciplined study habits.
