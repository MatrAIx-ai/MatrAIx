  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Gardening'', ''Knitting and crochet'', ''Genealogy research'', ''Attending local art fairs and museum events'', ''Cooking and baking Midwestern
    dishes'', ''Volunteering at the senior center craft program'']'
  career_goals: Although no longer employed full‑time, Amber aims to deepen her community impact and personal growth. She aspires to become a volunteer docent at the local history museum, lead intergenerational
    art workshops that blend crafts with storytelling, complete a family genealogy manuscript, learn digital photography to document her garden and local landscapes, and enroll in a part‑time art‑history
    course at a nearby community college. Her goals reflect a desire to share knowledge, stay intellectually active, and leave a lasting cultural legacy in Roscommon.
