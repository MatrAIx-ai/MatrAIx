  hobbies: '[''Herb gardening'', ''Farmers market visits'', ''Venezuelan music listening'', ''Cooking for friends and family'', ''Watching culinary shows'', ''Puzzle solving'', ''Salsa dancing'', ''Reading
    contemporary fiction'']'
  career_goals: Olivia aims to become head chef at a family‑run restaurant in Kansas City that showcases Venezuelan comfort food, allowing her to design a stable, repeatable menu that honors her heritage.
    In the longer term, she dreams of opening a modest neighborhood eatery that blends Venezuelan flavors with Midwestern staples, offering a predictable yet warm dining experience. She also hopes to lead
    occasional cooking workshops to teach traditional recipes, preferring roles that provide structured routines and a calm, resilient work environment.
