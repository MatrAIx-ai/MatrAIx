    workshops'']'
  career_goals: Edna aims to advance to senior executive leadership within a major health‑system, eventually serving as Chief Operating Officer or Vice President of Patient Experience. She wants to champion
    innovative, art‑infused healing environments and technology‑enabled care models that improve equity and outcomes for diverse Houston communities. Pursuing a doctorate in Health Services Administration
    or an executive MBA is part of her plan, as is mentoring emerging health‑service managers and leading community health initiatives that blend evidence‑based practice with creative design thinking.
