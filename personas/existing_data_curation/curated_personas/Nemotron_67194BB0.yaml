personas:
  professional: Edna Mckay, a senior health-care operations manager at a major Houston health system, harnesses Lean Six Sigma, strategic planning, and data-driven quality improvement while infusing their
    quiet curiosity and love of art into patient-experience design, mentoring small teams with a harmonious, solution-focused style.
  sports: Edna Mckay, an avid weekend hiker of Brazos Bend State Park trails and a casual runner with the Houston Running Club, supports the Houston Astros and follows the Houston Dynamo, opting for low-impact
    activities that complement their meditative lifestyle.
  arts: Edna Mckay, a dedicated visitor of the Houston Museum District, sketches urban textures, experiments with black-and-white photography inspired by Michael Kenna, paints still-life scenes echoing
    Georgia O'Keeffe, and finds personal resonance in the improvisational sounds of Kamasi Washington and the poetry of Ocean Vuong during intimate jazz nights.
  travel: Edna Mckay, who prefers immersive, low-key getaways, enjoys weekend road trips to Austin's live-music scene, has explored Santa Fe's art galleries, and dreams of wandering the historic streets
    of Oaxaca and the tranquil gardens of Kyoto, often planning trips around off-peak seasons to stretch a modest travel budget.
  culinary: Edna Mckay, an experimental home cook, regularly crafts Tex-Mex fusion dishes like cilantro-lime fish tacos with chipotle-marinated carnitas, quinoa-filled burritos with roasted cauliflower
    and epazote, and mole-infused enchiladas, showcasing a confident skill level that blends traditional flavors with bold ingredients like smoked paprika and charred corn.
  core: Edna Mckay, a 38-year-old health-care operations leader, balances analytical rigor with artistic curiosity, turning quiet reflection and disciplined habits into a uniquely harmonious approach to
    work, finance, wellness, and creative pursuits.
background:
  cultural: Edna is a White American who grew up in a suburban Texas community where Southern hospitality and a strong work ethic were core values. Her parents—an engineer and a high‑school science teacher—instilled
    a respect for both analytical rigor and lifelong learning. Relocating to Houston for her graduate studies exposed her to the city’s rich multicultural tapestry, influencing her appreciation for diverse
    cuisines, music, and artistic expressions. While she identifies with mainstream U.S. cultural norms, her experiences in a highly diverse metropolitan area have shaped an inclusive worldview that values
    collaboration across cultural lines, especially within the health‑care sector.
