personas:
  professional: Maria Vidal is a budding graphic design student who leverages their strong composition skills in Photoshop and Procreate to deliver freelance illustration projects, meticulously organizing
    client briefs while infusing speculative fiction motifs into their work.
  sports: Maria Vidal enjoys weekend hikes up the Sandia Mountains, practices yoga at a local studio, and follows the New Mexico Lobos basketball team, balancing active outdoor pursuits with occasional
    casual soccer games with art meetup friends.
  arts: Maria Vidal actively participates in Albuquerque art meetups, draws inspiration from Frida Kahlo, Salvador Dalí, and contemporary illustrator Loish, spends evenings creating mixed‑media desert landscapes,
    and frequently revisits classic Spanish literature such as Don Quixote for narrative ideas.
  travel: Maria Vidal’s travel style blends meticulous planning with spontaneous detours, having explored Santa Fe’s art districts and planning a dream trip to Barcelona’s Gothic Quarter and Arizona’s Monument
    Valley to photograph desert vistas.
  culinary: Maria Vidal favors southwestern flavors, often cooking green chile stew with roasted corn and pueblo cheese, while experimenting with vegan paella featuring saffron, chickpeas, and diced prickly
    pear for a colorful twist.
  core: Maria Vidal is an organized, imagination‑driven 19‑year‑old artist who balances diligent planning with occasional sketch‑induced procrastination, turning desert photography into vibrant illustrations
    while navigating student life on a frugal budget.
background:
  cultural: Maria’s family originates from southern Spain, and she grew up speaking Spanish at home while embracing the multicultural environment of Albuquerque. She celebrates traditional Spanish holidays
    like Día de los Reyes and participates in regional Hispanic festivals such as New Mexico Hispanic Heritage Days. Her culinary tastes blend Spanish dishes like paella with New Mexican foods like tamales
    and green chile, reflecting a fusion of her heritage and local culture. The legacy of Spanish art, literature, and folklore heavily influences her creative style, and she often incorporates motifs from
    Spanish mythology into her work. Living in the American Southwest, Maria also identifies with the broader Hispanic and Native American cultural influences that shape the community around her.
