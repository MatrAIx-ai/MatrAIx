  career_goals: Maria aims to enroll in a community college program in graphic design or visual communication, with the goal of becoming a freelance illustrator and eventually an art director for cultural
    organizations. She hopes to blend her artistic talent with community service by leading creative workshops for youth in Albuquerque that celebrate Hispanic heritage and contemporary abstract art. In
    the long term, she aspires to curate exhibitions that highlight Spanish and Southwestern artistic traditions, and to secure a leadership role in a museum or cultural center.
