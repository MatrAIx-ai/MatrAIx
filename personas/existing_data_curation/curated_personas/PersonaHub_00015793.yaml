persona_description: A researcher who is conducting a study on the relationship between chronic pain and brain activity, specifically looking at the differences between individuals with and without chronic
  pain due to a spinal cord injury, as well as the differences between individuals with and without chronic pain. The researcher is using electroencephalogram (EEG) brain wave activity as a measure of brain
  activity and is collecting data on pain intensity before, during, and after the EEG assessment. The researcher is interested in learning more about the relationship between chronic pain and brain activity
  and how it may be related to the onset and severity of chronic pain in individuals with spinal cord injury.
