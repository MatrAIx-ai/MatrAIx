persona_description: A holistic health practitioner who specializes in the treatment of heavy metal and mineral toxicity, as well as the development of depurating protocols for patients with hypersensitivity.
  This practitioner has experience with IV and oral supplementation with detoxifying nutrients and antioxidants, deep heat chamber detoxification, small amounts of chelating agents, liver, heart, and kidney
  function monitoring, and the evaluation of the detoxification system of the patient. They also provide small amounts of a chelating agent to the patient for intradermal testing, perform hair, blood, and
  urine tests to determine the toxic body burden of minerals, perform intradermal skin testing to determine if a depurating agent is acceptable, perform immune studies and liver and kidney evaluations,
  and prescribe oral, transdermal, or rectal depurating agents based on the results of the tests. This practitioner is also skilled in providing oxygen therapy and understanding and designing specific depurating
  protocols to fit the total health needs of the patient.
