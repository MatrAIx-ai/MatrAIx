personas:
  professional: Heather Taste is a high‑school visual artist and aspiring graphic designer who combines hand‑drawn sketches with digital tools like Procreate and Photoshop, leads her school’s art club events,
    and plans to study visual arts in college to become a multidisciplinary artist and future art director.
  sports: Heather Taste plays point guard on the local youth basketball league, cheered on by friends while following the Houston Rockets and the University of Texas Longhorns, and joins the school’s intramural
    volleyball games during the spring.
  arts: Heather Taste frequents the Houston Museum of Fine Arts and community festivals, draws inspiration from artists like Kara Walker, Jean‑Michel Basquiat, and street artist Banksy, and curates a digital
    collage series that blends jazz album covers with poetry.
  travel: Heather Taste dreams of a weekend road trip to New Orleans for jazz festivals, a spring visit to New York City’s MoMA, and summer camping at Galveston beaches, planning trips around school breaks
    and limited family budget.
  culinary: Heather Taste enjoys preparing spicy tacos with cilantro and lime, experimenting with avocado toast topped with poached eggs, and snack‑hunting for caramel popcorn while listening to hip‑hop
    beats during study sessions.
  core: Heather Taste is an imaginative teen who balances vibrant art projects with school commitments, a love for basketball, and a habit of staying up late sketching to soulful music.
background:
  cultural: Heather is a second‑generation African‑American raised in Houston’s Third Ward, a neighborhood celebrated for its musical and artistic legacy. Her family embraces Southern Black traditions such
    as gospel music, soul food, and Juneteenth celebrations while encouraging community involvement through church youth groups and local cultural events. Growing up in a city with a vibrant Afro‑Texan
    scene, she has been shaped by mural projects, hip‑hop dance crews, and the annual Houston Black Heritage Festival, all of which influence her artistic voice and sense of identity.
attributes:
  skills: '["Hand‑drawing and sketching","Digital illustration (Procreate, Photoshop)","Creative writing (poetry, short stories)","Project planning and organization","Team collaboration and event coordination","Basic
