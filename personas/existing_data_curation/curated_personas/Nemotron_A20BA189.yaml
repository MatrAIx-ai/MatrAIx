  career_goals: Heather plans to pursue a university degree in visual arts and graphic design, aiming to become a multidisciplinary artist and eventually an art director. She aspires to create work that
    celebrates Black culture and sparks community dialogue, and she hopes to launch an online platform that highlights emerging Houston artists. Long‑term, she envisions working as a creative strategist
    for socially‑focused brands while continuing to mentor youth through community art programs.
