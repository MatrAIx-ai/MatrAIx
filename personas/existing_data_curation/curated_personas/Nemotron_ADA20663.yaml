  career_goals: Kathy aims to advance to a senior managerial or partnership role within her accounting firm, with a long‑term ambition of becoming a CFO at a midsized Florida corporation. She plans to complete
    her CPA certification (if not already held) and develop niche expertise in forensic accounting and ESG (environmental, social, governance) reporting. Leveraging her love of routine, she seeks to implement
    technology‑driven, streamlined workflows that reduce manual stress and free up time for personal well‑being. Mentoring younger accountants, leading a high‑performing audit team, and spearheading community
    financial‑literacy initiatives are integral parts of her professional vision.
