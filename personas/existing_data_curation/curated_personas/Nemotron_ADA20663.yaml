personas:
  professional: Kathy Mckinney, a seasoned accountant, leverages her STEM‑grounded analytical mindset and love of routine to deliver meticulous financial reporting, tax preparation, and forensic audit work,
    while her outgoing nature makes them a natural mentor and community‑focused leader who drives technology‑enabled workflow optimizations in her firm.
  sports: Kathy Mckinney stays active through Zumba, yoga, and line dancing classes, enjoys weekend walks along Siesta Key beach and hikes in Myakka River State Park, and cheers for the Tampa Bay Buccaneers
    and the Florida Gulf Coast Eagles while occasionally joining a local recreational softball league.
  arts: Kathy Mckinney contributes backstage to the community theater, finds inspiration in the works of Lin‑Manuel Miranda and the classic Southern novelist Eudora Welty during the local book club, and
    enjoys movie nights featuring films by director Ava DuVernay, blending collaborative performance with a love of storytelling.
  travel: Kathy Mckinney prefers low‑key, friends‑driven getaways, planning spontaneous day trips to nearby destinations like Key West, Sanibel Island, and Savannah while dreaming of a longer cultural immersion
    trip to New Orleans, balancing a modest travel budget with a love for coastal relaxation and historic Southern charm.
  culinary: Kathy Mckinney’s culinary repertoire features Southern comfort dishes such as shrimp and grits, chicken and dumplings, and Floridian specialties like key lime pie and conch fritters, which they
    often prepare using fresh herbs from their garden—basil, mint, and rosemary—and share at neighborhood potlucks.
  core: Kathy Mckinney is a routine‑driven, socially vibrant accountant who balances meticulous financial precision with a penchant for spontaneous board‑game splurges, community theater backstage work,
    and occasional stress‑fuelled worry.
background:
  cultural: Kathy grew up in a middle‑class, primarily Anglo‑American household in the Midwest before relocating to Sarasota in her late twenties. Her cultural identity blends traditional American values—emphasis
    on hard work, practicality, and self‑reliance—with the relaxed, sun‑soaked lifestyle of Florida’s Gulf Coast. She identifies with mainstream white, Protestant cultural norms, celebrating holidays like
    Thanksgiving and the Fourth of July with family traditions, while also embracing Sarasota’s multicultural vibrancy, which includes a thriving arts scene and a diverse mix of retirees, tourists, and
    seasonal residents. Her active involvement in church and local charities reflects her cooperative, compassionate outlook, and her unmarried status underscores a strong sense of independence and personal
    agency.
