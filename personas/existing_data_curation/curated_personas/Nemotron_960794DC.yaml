  hobbies: '[''Soccer'', ''Basketball'', ''Acoustic guitar'', ''Open‑mic performances'', ''Hiking'', ''Library volunteer tutoring'', ''Educational podcasts'', ''Mindfulness meditation'', ''Journaling'',
    ''Video gaming'']'
  career_goals: Robert aims to become a certified elementary teacher within the next two years, focusing on inclusive education and special needs support. He aspires to pursue a master's degree in educational
    leadership to eventually serve as an instructional coach or school principal, where he can implement evidence‑based teaching practices and foster a collaborative, supportive school culture. He also
    hopes to develop a mentorship program that pairs college‑age students with younger learners in Boone County, blending his curiosity for innovative ideas with practical community impact.
