personas:
  professional: Carl Perrone, an aspiring graphic designer and visual storyteller, channels a blend of sketching, digital illustration, and event organization into freelance comic commissions and community
    mural projects while balancing school deadlines with a curious, flexible mindset.
  sports: Carl Perrone, an avid skateboarder who rolls with the local crew “Ramp Rollers” at the downtown skate park, joins pickup basketball games at the community center on weekends, and passionately
    cheers for the Atlanta Hawks and Atlanta United FC, using sport as both a social outlet and a creative reset button.
  arts: Carl Perrone, a comic‑style artist inspired by Alex Ross’s heroic realism, Eiichiro Oda’s manga dynamism, and the atmospheric synths of Tame Impala, regularly attends live shows by the indie band
    “The Neon Glyphs”, volunteers at the Lawrenceville Arts Center, and performs in community theater productions where they integrate visual storytelling with stage design.
  travel: Carl Perrone, who has explored the National Gallery of Art in Washington, D.C., roamed Berlin’s Kreuzberg street‑art scene on a school exchange, and now daydreams of the neon manga districts of
    Tokyo and the frescoes of Florence, plans most trips during summer workshops, opting for budget airlines and couch‑surfing to stretch a limited teenage allowance.
  culinary: Carl Perrone, a self‑taught kitchen dabber, can whip up a pepperoni pizza, a steaming bowl of tonkotsu ramen, and avocado toast topped with sriracha‑glazed chicken, favors bold flavors like
    spicy nachos, and occasionally overindulges in energy drinks and candy while gaming into the early hours.
  core: Carl Perrone blends teen curiosity, skateboard grit, and comic‑book flair into a creative whirlwind that fuels late‑night art sessions, spontaneous spending splurges, and a relentless quest for
    fresh inspiration.
background:
  cultural: Carl grew up in Lawrenceville, a suburban community in Gwinnett County, Georgia, in a family of mixed European heritage—his paternal line includes German roots (Snowberger) and his maternal
    side has Italian ancestry (Perrone). Raised in a typical Southern environment, he experienced the region’s emphasis on hospitality, church gatherings, and local festivals, while also being exposed to
    the growing cultural diversity of Gwinnett County’s neighborhoods. This blend of Southern traditions and multicultural influences nurtured his appreciation for art, music, and diverse perspectives,
    shaping an open‑minded outlook that values both community ties and new experiences.
