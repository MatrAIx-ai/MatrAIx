  career_goals: He aims to turn his artistic passion into a career, aspiring to become a professional graphic designer or visual storyteller. He plans to earn his GED, attend a community college program
    in digital media, and eventually work with advertising agencies or independent studios. Carl also dreams of using his creative skills to support community initiatives in Lawrenceville, such as mural
    projects or youth art workshops, and hopes to travel to experience different cultures for artistic inspiration.
