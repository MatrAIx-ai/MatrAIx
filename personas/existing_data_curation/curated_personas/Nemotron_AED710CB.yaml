  hobbies: '[''Community soccer league'', ''Fishing on the San Antonio River'', ''Barbecuing and cooking Mexican cuisine'', ''Coaching youth sports at his parish'', ''Attending cultural festivals (Día de
    los Muertos, Cinco de Mayo)'', ''Woodworking and furniture making'']'
  career_goals: Rafael aims to transition from a laborer to a foreman within the next two years, securing OSHA 30‑hour certification and a CPC (Certified Professional Contractor) credential. He aspires
    to mentor apprentices, improve safety culture on job sites, and eventually establish a family‑owned small contracting firm that specializes in home remodels and sustainable building practices in Bexar
    County. His long‑term ambition includes building a reputation for reliability, high standards, and community‑focused projects while providing stable employment for his own children.
