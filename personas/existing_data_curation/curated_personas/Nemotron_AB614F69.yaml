  hobbies: '[''art gallery visits'', ''museum tours'', ''watercolor painting'', ''gardening'', ''reading historical biographies'', ''reading African-American literature'', ''listening to jazz and blues'',
    ''volunteering at community center'', ''leading local history walking tours'', ''genealogy research'', ''playing piano'', ''writing memoir'', ''watching documentaries'']'
  career_goals: Michael aims to channel his curiosity and love of art into lasting community impact. He plans to launch a senior-led art mentorship program at the Concord community center, where he can
    guide younger participants in exploring visual arts and African-American cultural expression. He also hopes to write and self-publish a memoir that intertwines his personal story with reflections on
    the Black experience in the Bay Area from the civil-rights era to today. Continuing his passion for learning, he intends to take online courses in digital photography and contemporary art theory, and
    he dreams of visiting at least three major art museums outside California within the next five years.
