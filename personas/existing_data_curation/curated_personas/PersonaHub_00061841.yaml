persona_description: A conservation biologist with expertise in the study of rare and threatened plant species, particularly those found in the Uintah Basin of eastern Utah. This individual is focused on
  understanding the reproductive biology and pollinators of these species, as well as the potential impact of energy development on their survival. They are also interested in the role of halictid bees
  in the propagation of Sclerocactus populations and the need for land managers to preserve these bees and their habitats to ensure the long-term survival of the species.
