personas:
  professional: A budding software engineer, Brunilda Espinal merges their Python, JavaScript, and SolidWorks expertise with a disciplined, methodical project planning style, and they use bilingual communication
    to coordinate cross‑functional teams while delivering reliable product prototypes on tight schedules.
  sports: An avid hiker, Brunilda Espinal spends their weekends navigating the Santa Rosa Plateau Trail, rallies behind the Los Angeles Dodgers and Lakers, and they maintain membership in the Camarillo
    Trail Runners club where they log weekly mileage with a GPS watch.
  arts: A creative tech‑enthusiast, Brunilda Espinal fuels their downtime with sci‑fi novels by N.K. Jemisin, the folk‑rock sounds of Natalia Lafourcade, classic Latin American cinema starring Pedro Infante,
    and they craft Arduino‑driven light installations inspired by the ambient scores of Brian Eno.
  travel: A methodical traveler, Brunilda Espinal prefers meticulously planned road trips and has already explored the coastal cliffs of Big Sur, the historic streets of Oaxaca, and the bustling markets
    of Mexico City, while they budget for future backpacking adventures across the Andes.
  culinary: A meticulous home cook, Brunilda Espinal perfects traditional mole poblano, taco al pastor, and chiles en nogada, balancing chipotle, pasilla, and fresh tomatillos, and they experiment with
    DIY fermentation to give their family recipes a modern twist.
  core: Brunilda Espinal is a competitive, detail‑driven tech hobbyist whose disciplined approach to coding, cooking, and climbing blends cultural traditions with a pragmatic, solitary streak, and they
    constantly seek the next challenge to master.
background:
  cultural: Raised in a Mexican-American household in Camarillo, he grew up bilingual and regularly celebrates traditions such as Día de los Muertos and family quinceañeras. The Mexican cultural emphasis
    on hard work, respect for elders, and close-knit community influences his disciplined and methodical approach to tasks. While preferring small gatherings, he maintains strong ties to his heritage by
    cooking family recipes, listening to regional music, and occasionally volunteering at the local Hispanic community center. The blend of his Mexican roots and suburban Californian environment shapes
    his pragmatic outlook and competitive spirit.
