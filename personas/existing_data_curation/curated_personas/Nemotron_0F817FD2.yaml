  career_goals: Vincent’s primary career ambition is to transition into a senior leadership role—such as Director of Mechanical Engineering or Vice President of Engineering—within the next five years, where
    he can steer large‑scale projects that emphasize reliability, sustainability, and continuous improvement. He aims to earn his Professional Engineer (PE) license, champion the adoption of advanced simulation
    and additive manufacturing across his organization, and mentor junior engineers to cultivate a culture of precision and accountability. Long‑term, he envisions establishing an engineering consultancy
    that helps midsize manufacturers implement lean and resilient operations.
