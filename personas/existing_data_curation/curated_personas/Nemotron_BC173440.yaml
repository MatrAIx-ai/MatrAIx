personas:
  professional: Norma Hernandez, a retired mechanical engineer with a background in environmental science, leverages her methodical, organized nature and curiosity to mentor senior volunteers through hands‑on
    workshops on home maintenance, using her CAD expertise and bilingual communication to bridge technical gaps and foster community resilience.
  sports: Norma Hernandez walks her garden daily and holds a weekly spot in the Golden Years Walking Club, while rooting for the Los Angeles Dodgers in baseball season and the Los Angeles Lakers during
    basketball season, reflecting her preference for low‑impact exercise and gentle fandom.
  arts: Norma Hernandez enjoys listening to the smooth saxophone of Charlie Parker, timeless ballads of Julio Iglesias, and modern jazz of Norah Jones while cooking, reads mystery novels by Agatha Christie,
    relishes classic films starring Ingrid Bergman, and volunteers at the community theater to stitch costumes for productions of "Our Town" and "The Miracle Worker."
  travel: Norma Hernandez prefers low‑key, purpose‑driven trips, having revisited her ancestral town in Oaxaca, Mexico and explored the Grand Canyon’s rim on a senior‑friendly tour, she dreams of a leisurely
    river cruise along the Rhine in Germany but plans to keep future travel within a modest budget and close to family.
  culinary: Norma Hernandez is a skilled home cook who perfects family‑style tamales wrapped in corn husks, fragrant arroz con pollo seasoned with saffron and peas, and fresh heirloom tomato salads dressed
    with olive oil, lime, and epazote, often pairing meals with homemade salsa verde made from garden‑grown chilies.
  core: Norma Hernandez blends a lifelong engineer’s precision with a quiet curiosity, tending her garden, documenting data, and worrying about every detail while secretly binge‑reading mystery novels and
    occasionally forgetting to floss.
background:
  cultural: Norma was born to Mexican immigrants who settled in central Florida in the 1950s. Growing up in a bilingual household, she celebrated both American holidays and Mexican traditions, such as Día
    de los Muertos, Las Posadas, and family reunions featuring Mexican cuisine. Her Catholic faith and strong family ties shaped her values of respect, cooperation, and community service. Living in Clermont,
    she blends her Mexican heritage with the Floridian lifestyle, participating in local cultural festivals, supporting Hispanic community organizations, and preserving the Spanish language through regular
    conversation with her grandchildren. This rich bicultural background informs her perspective, fostering a blend of pragmatic American work ethic and the communal warmth of Latin culture.
attributes:
  skills: '["Mechanical engineering design", "Infrastructure project management", "Computer‑aided design (CAD)", "Statistical data analysis (Excel, SPSS)", "Technical documentation", "Bilingual Spanish‑English
    communication", "Volunteer program coordination", "Organizational planning and record‑keeping", "Risk assessment", "Gardening and horticulture basics"]'
  hobbies: '["Vegetable gardening", "Reading scientific magazines and mystery novels", "Knitting and crochet", "Crossword puzzles and Sudoku", "Cooking traditional Hispanic dishes", "Listening to Latin
    music and jazz", "Genealogy research", "Volunteering at the community library"]'
  career_goals: Although retired from her engineering career, Norma aims to remain intellectually active and to give back to her community. She plans to mentor younger volunteers at the local senior center,
    share her technical knowledge through workshops on simple home maintenance, and assist families in navigating digital resources. She also hopes to compile a written memoir of her family's migration
    story, preserving her cultural heritage for future generations. Maintaining her health, independence, and emotional well‑being is a central ambition, as is learning to use new technology such as video‑calling
    platforms to stay connected with distant relatives.
