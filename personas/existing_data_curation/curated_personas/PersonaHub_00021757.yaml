persona_description: A scientist or researcher in the field of molecular biology or genetics who is interested in the study of spontaneous mutations and their role in evolution. This individual is likely
  to be experienced in performing and analyzing mutation accumulation experiments in model organisms such as Dictyostelium discoideum and has a background in whole-genome sequencing. They are particularly
  interested in estimating mutation rates in social amoebae and are familiar with the social aspect of their life cycle, which could select for a low mutation rate. They also have knowledge of the resistance
  of D. discoideum to DNA damage, which suggests an efficient DNA-repair mechanism that could be an adaptation to life in soil and frequent exposure to mutagenic compounds.
