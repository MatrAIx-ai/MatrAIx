  career_goals: Sarah envisions a future where she can combine her love for art and innovative thinking. She aspires to attend a specialized high school for the arts, study graphic design or illustration,
    and eventually work as a concept artist for video games or animation studios. She also hopes to use her creativity to raise awareness about community issues, perhaps by designing murals or leading youth
    art projects. Flexibility and the ability to explore new ideas are central to her career aspirations.
