personas:
  professional: Sarah Moore is a teenage aspiring concept artist who blends hand‑drawn character sketches with digital illustration tools, harnessing their curious eye for storytelling and a relaxed, improvisational
    workflow that often turns school projects into experimental art experiments.
  sports: Sarah Moore enjoys weekend hikes in the local state park to photograph wildlife, follows the Cleveland Browns and Ohio State Buckeyes for a sense of community pride, and plays recreational soccer
    on the middle school’s club team, though they occasionally skip practice in favor of sketching in the bleachers.
  arts: Sarah Moore, an avid comic‑book reader, draws inspiration from indie musicians like Phoebe Bridgers and The 1975, studies graphic novels by Alan Moore and Marjane Satrapi, and spends afternoons
    in the school art club creating character designs that blend classic storytelling with modern digital techniques, which they share with a small circle of friends.
  travel: Sarah Moore loves spontaneous nature walks in nearby Amish country and the Hocking Hills, has taken a family road trip to Chicago’s museum district, and dreams of visiting Tokyo’s Akihabara to
    soak up manga culture, preferring budget‑friendly, unstructured trips over meticulously planned itineraries, which they find more freeing.
  culinary: Sarah Moore enjoys homemade apple‑cinnamon pancakes and simple garden‑fresh salads with cherry tomatoes and feta, attempts beginner‑level sushi rolls for fun, and while their cooking skill is
    modest, they relish the quiet of the kitchen as a space for reflection.
  core: Sarah Moore is a curious, quietly creative teen who balances sketchbooks and garden plots, occasionally forgets deadlines, and finds solace in indie tunes and spontaneous wildlife photos.
background:
  cultural: Sarah grew up in Seven Mile, a small town in Butler County, Ohio, immersed in a typical Midwestern white community. The local culture emphasizes close family ties, community gatherings like
    county fairs and church events, and a deep appreciation for simple, earnest living. While rooted in these traditions, Sarah’s curiosity has led her to explore broader artistic influences through online
    platforms and school programs, blending her Midwestern upbringing with a global artistic perspective.
