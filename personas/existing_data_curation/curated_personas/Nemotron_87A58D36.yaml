  career_goals: Chet aims to advance to a regional sales director role within the next three years, overseeing multiple markets and integrating digital sales tools to increase efficiency. He is committed
    to mentoring emerging sales managers, creating a supportive culture that reduces stress and promotes mental well‑being, and eventually launching his own consultancy focused on sales strategy and workplace
    resilience for mid‑size firms in the Midwest.
