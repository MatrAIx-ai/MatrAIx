  hobbies: '["Building with LEGO and wooden blocks", "Drawing rockets, dinosaurs, and portraits", "Reading picture books about space and nature", "Organized games of tag with rules", "Singing nursery rhymes
    in groups", "Helping with simple cooking tasks", "Collecting rocks and leaves on nature walks", "Puzzling with jigsaw puzzles", "Pretend doctor play", "Participating in family craft projects"]'
  career_goals: Even at five, Karen talks about her future with vivid imagination. She dreams of becoming a scientist or engineer who invents practical solutions, citing her love for figuring out how toys
    work and building things that last. She also mentions wanting to be a teacher because she enjoys sharing ideas and leading group activities. Her competitive streak fuels a desire to win science fairs
    and be recognized for clever inventions, while her curiosity drives her to explore any question that catches her interest.
