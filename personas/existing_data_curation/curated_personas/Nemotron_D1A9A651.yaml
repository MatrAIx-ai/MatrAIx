    assessment analysis"]'
  hobbies: '["Acrylic painting", "Sketching", "Visiting art galleries and museums", "Cooking Mexican cuisine and fusion recipes", "Salsa dancing", "Volunteering at cultural festivals", "Hiking", "Reading
    contemporary fiction and educational research", "Gardening (native herbs and ornamental plants)", "Participating in book clubs"]'
  career_goals: In the near term, Merida aims to earn her state teaching certification and transition to a full‑time elementary or middle‑school classroom teacher, focusing on literacy and arts education.
    Over the next five years, she plans to pursue a master’s degree in educational leadership with a specialization in multicultural curriculum development. Her long‑term ambition is to become a district
    curriculum coordinator who champions inclusive, culturally responsive instruction, especially incorporating Mexican and broader Latino perspectives. She also envisions establishing a community after‑school
    art and bilingual workshop program that celebrates cultural diversity and provides mentorship opportunities for underserved youth.
