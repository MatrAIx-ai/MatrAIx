personas:
  professional: Merida Alvarado, a 33‑year‑old bilingual teaching assistant with a graduate background in education, blends arts‑integrated curriculum design, proficiency in Google Classroom, Kahoot, and
    Nearpod, and a collaborative, curiosity‑driven approach to mentor diverse learners while orchestrating community outreach projects and applying data‑driven assessment to tailor instruction, and they
    consistently champion student voice.
  sports: Merida Alvarado fuels her energetic personality by hiking the North Georgia foothills each weekend, dancing salsa with a local troupe, cheering on Atlanta United FC, and joining casual pick‑up
    soccer games, and they prefer cardio‑rich group activities over solitary gym workouts.
  arts: Merida Alvarado channels her curiosity into acrylic painting inspired by Frida Kahlo’s vibrant self‑portraits and Diego Rivera’s muralism, they frequent the High Museum of Art for Georgia O’Keeffe
    exhibitions, enjoy listening to Carlos Santana’s guitar riffs, and participate in open‑mic nights featuring spoken‑word poet José Eduardo, weaving cultural rituals like Día de los Muertos motifs into
    their work.
  travel: Merida Alvarado plans low‑key, culture‑rich trips such as weekend getaways to Asheville’s art galleries, spontaneous Blue Ridge hikes, and annual pilgrimages to Guanajuato to partake in Día de
    los Muertos celebrations, and they balance meticulous itineraries with spontaneous detours.
  culinary: Merida Alvarado’s kitchen fuses traditional mole poblano with Southern smoked pork to craft a smoky fusion taco, they season dishes with fresh cilantro and epazote from her herb garden, perfect
    homemade salsa verde and horchata, yet they occasionally over‑spice their creations in enthusiasm for bold flavors.
  core: Merida Alvarado, a 33‑year‑old bilingual educator and acrylic painter, lives at the intersection of organized ambition and spontaneous creativity, they constantly weave cultural traditions into
    teaching, cooking, and community work while occasionally succumbing to impulsive art‑supply splurges.
background:
  cultural: Merida Alvarado is a first‑generation Mexican‑American who grew up in a bilingual household in Mexico before moving to the United States as a teenager. Her Mexican heritage is a cornerstone
    of her identity; she celebrates Día de los Muertos, Mexican Independence Day, and family gatherings rich with traditional music and food. Fluent in both Spanish and English, she weaves Mexican folklore,
    language, and cultural references into her teaching to foster pride and belonging among Latino students. Residing in Buchanan, GA, Merida bridges her Mexican roots with Southern community life, actively
    participating in local Latino networks, and contributing to cross‑cultural dialogues that enrich the district’s educational environment.
attributes:
  skills: '["Classroom management", "Curriculum development support", "Instructional design", "Bilingual communication (English/Spanish)", "Arts integration into lessons", "Educational technology (Google
