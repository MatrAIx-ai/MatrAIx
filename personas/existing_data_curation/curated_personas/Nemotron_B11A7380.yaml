  hobbies: '[''Birdwatching'', ''Wildlife Photography'', ''Mystery Novel Reading'', ''Book Club'', ''Quilting'', ''Heirloom Gardening'', ''Community Watch'', ''Hiking'']'
  career_goals: Grace aims to solve at least two long‑standing cold cases in Newton County before retirement, cementing her reputation as the go‑to private investigator in the region. She also hopes to
    mentor younger detectives through a quarterly workshop series, publish a memoir that blends case anecdotes with lessons on resilience, and eventually transition to a consultancy role that allows her
    to choose cases that align with her values and curiosity.
