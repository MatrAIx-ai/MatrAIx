personas:
  professional: Grace Jefferis, a 61‑year‑old private investigator in Newton County, blends classic gumshoe instincts with modern forensic photography, using discreet surveillance, tactical interviewing,
    and pattern analysis while navigating her relaxed yet occasionally disorganized approach to cases and her healthy skepticism toward suspects.
  sports: Grace Jefferis enjoys low‑impact fitness through weekly pine‑forest hikes with binoculars, occasional lawn‑mower yoga sessions, and is a loyal fan of the Newton County Wildcats baseball team,
    while occasionally joining a local senior badminton club during the summer.
  arts: Grace Jefferis reads Agatha Christie and Flannery O'Connor, collects vintage black‑and‑white prints reminiscent of Ansel Adams, quilts intricate patterns inspired by the designs of Mary Schafer,
    and regularly attends performances by the Newton County Playhouse where she enjoys shows starring regional star Marcus Lee.
  travel: Grace Jefferis prefers planned weekend getaways to nearby pine‑filled state parks like Tallulah Gorge and historic towns such as Savannah, balancing her love for solitary bird‑watching excursions
    with occasional road trips to the Grand Canyon, all while keeping travel costs modest to fund her consulting ambitions.
  culinary: Grace Jefferis delights in cooking with her heirloom tomatoes, crafting fresh salsa with jalapeños and cilantro, preparing Southern shrimp and grits on rainy evenings, and savoring farm‑to‑table
    meals at the local Harvest Table restaurant, though she occasionally overindulges in sweet pecan pie during holidays.
  core: Grace Jefferis, a seasoned private eye with a penchant for midnight photography, a garden of heirloom tomatoes, and an ever‑growing stack of unsolved cold cases, balances fierce curiosity with a
    habit of misplacing her own keys.
background:
  cultural: Grace grew up in a middle‑class, suburban family in the Atlanta metropolitan area, steeped in Southern hospitality and Methodist church traditions. Her upbringing emphasized self‑reliance, respect
    for elders, and a strong sense of community, while her adult life in Conyers has exposed her to the county’s diverse history and shifting demographics. These roots give her a practical outlook, a love
    for Southern foods and music, and an appreciation for both the stability of tradition and the intrigue of new ideas.
attributes:
