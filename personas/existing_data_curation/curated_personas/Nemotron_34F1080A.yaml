personas:
  professional: Shannen Kelly, a seasoned nursing assistant with over twenty years of bedside experience, blends methodical organization with a genuine curiosity for the latest infection‑control practices,
    and they channel this disciplined energy into training new aides, leading a quality‑improvement project on elder‑care best practices, while eyeing a Certified Nursing Assistant credential and eventually
    a patient‑care coordinator role.
  sports: Shannen Kelly stays active through line dancing at community events and daily walks in Tower Grove Park, proudly cheering for the St. Louis Cardinals and St. Louis Blues, and they belong to a
    senior walking club that meets twice a week, using the exercise as both social time and a modest fitness routine.
  arts: Shannen Kelly's artistic life thrives in the church choir where they deliver gospel classics by Aretha Franklin and Mahalia Jackson, they enjoy quilting with intricate patterns while listening to
    classic jazz, and they unwind with historical fiction novels such as 'The Book Thief' and 'All the Light We Cannot See,' which inspire their appreciation for storytelling across mediums.
  travel: Shannen Kelly prefers well‑planned group tours that combine cultural heritage and relaxation, having explored the French Quarter of New Orleans for its music and cuisine, the historic battlefields
    of Gettysburg, and dreaming of a serene weekend in Asheville's Blue Ridge Mountains, they balance travel ambitions with budgeting constraints and family commitments.
  culinary: Shannen Kelly's kitchen blends tradition and health, serving collard greens seasoned with smoked turkey, baked catfish with a lemon‑herb crust, and sweet potato casserole topped with a light
    oat crumble, while they experiment by swapping regular oil for avocado oil and adding quinoa to soul‑food staples, reflecting both a love for classic flavors and a curiosity for nutritious twists.
  core: Shannen Kelly is a disciplined, talkative caretaker who fuses organized professionalism with a vibrant community spirit, channeling curiosity into healthier cooking, meticulous budgeting, and a
    steadfast commitment to senior wellness despite occasional over‑commitment.
background:
  cultural: Shannen is an African‑American woman rooted in the rich cultural tapestry of East St. Louis. Her family’s lineage traces back to the Mississippi Delta, where stories of resilience, music, and
    communal support shaped her values. The church has been a cornerstone of her life, providing a space for worship, social connection, and activism. She embraces the traditions of gospel music, soulful
    cuisine, and oral storytelling, while also confronting the challenges of racial and economic disparities in her community. This background fuels her commitment to empathetic care, community uplift,
    and the preservation of cultural heritage for future generations.
attributes:
  skills: '[''Patient care and assistance'', ''Vital signs monitoring'', ''Basic wound care'', ''Medication assistance'', ''Infection control practices'', ''Accurate documentation'', ''Patient advocacy
    and communication'', ''Family liaison'', ''Emergency response basics'', ''Team coordination and training'', ''Quality improvement initiatives'', ''Health education for patients'']'
  hobbies: '[''Gospel choir singing'', ''Soul food cooking'', ''Backyard vegetable gardening'', ''Quilting'', ''Reading historical fiction'', ''Walking in local parks'', ''Volunteering at senior center'',
    ''Line dancing at community events'', ''Genealogy research'']'
  career_goals: Shannen aims to formalize her expertise by earning a Certified Nursing Assistant (CNA) credential and, if possible, pursuing an LPN license. She wants to leverage her strong organizational
    abilities to lead a quality‑improvement project within her facility, focusing on elder‑care best practices. Long‑term, she dreams of becoming a mentor and trainer for new nursing assistants, developing
    community‑based health‑education workshops for seniors in East St. Louis, and eventually taking on a patient‑care coordinator role where she can influence policy and improve care standards for vulnerable
    populations.
