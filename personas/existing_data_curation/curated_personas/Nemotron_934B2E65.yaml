  hobbies: '["Reading poetry and African American literature", "Watercolor painting", "Knitting and crocheting", "Birdwatching", "Local history research", "Cooking soul food", "Church choir singing", "Walking
    in the pine forests", "Genealogy tracing", "Volunteer tutoring"]'
  career_goals: Although retired, Betty aims to create a living archive of African‑American oral histories in Hancock County by recording interviews with elders and publishing them in a community‑run booklet.
    She dreams of launching a neighborhood garden program that pairs seniors with schoolchildren to teach sustainable gardening while fostering intergenerational bonds. Betty also hopes to lead weekly craft
    workshops where participants can learn quilting, knitting, and other hand‑making techniques, preserving cultural artistry for future generations. Her overarching ambition is to nurture a supportive,
    creative network that celebrates heritage, encourages curiosity, and strengthens communal harmony.
