personas:
  professional: Betty Young is a retired community chronicler and volunteer mentor who weaves oral histories, preserves handcrafts, and mediates local disputes with empathetic storytelling and improvisational
    flair, and they use their imagination to inspire intergenerational projects.
  sports: Betty Young is an avid early‑morning birdwatcher who joins the local senior walking club and cheerfully roots for the Hancock County High School Tigers football team each fall, preferring gentle
    walks and occasional community yoga sessions over strenuous exercise.
  arts: Betty Young is a watercolor painter and quilter who finds inspiration in the works of Claude Monet and contemporary folk artist Faith Ringgold, while their choir rehearsals echo the gospel stylings
    of Mahalia Jackson and Aretha Franklin, and they often incorporate poetic verses into their artistic pieces.
  travel: Betty Young prefers short, purposeful trips, such as weekend visits to historic Savannah, Georgia, and annual pilgrimages to the Blue Ridge Scenic Railway, loosely planning itineraries around
    church schedules and family gatherings, and they delight in exploring local museums and botanical gardens.
  culinary: Betty Young delights in cooking soulful Southern meals, often preparing collard greens simmered with smoked turkey, buttery cornbread, and sweet potato pie seasoned with nutmeg, while their
    garden yields fresh tomatoes and okra for seasonal stews, and they occasionally experiment with a touch of hot sauce for extra zing.
  core: Betty Young blends boundless imagination with relaxed organization, turning community storytelling, garden wisdom, and handcrafts into a living tapestry of heritage, even as they occasionally misplace
    knitting needles and forget appointments.
background:
  cultural: Betty was born and raised in the Black community of rural Georgia during the era of segregation, and her childhood was shaped by the civil‑rights movement, the church, and a close‑knit extended
    family. Her family traditions are steeped in Southern cuisine, gospel music, and the oral storytelling style that has long been a cornerstone of African‑American culture in the South. Her faith in the
    Baptist church has fostered a strong sense of service and communal responsibility, while her grandparents' migration from the Deep South instilled a reverence for perseverance and cultural pride. Betty’s
    cultural identity is reflected in her love of soul food, her participation in church choirs, her dedication to preserving local Black histories, and her ongoing commitment to sharing these traditions
    with younger generations.
