persona_description: A professional in the field of environmental analysis and remediation, particularly in the use of field filtration techniques for the analysis of dissolved metals. They are interested
  in the impact of co-precipitation of dissolved metals with iron and the recommended field filtration techniques for the analysis of dissolved ferrous iron. They are familiar with the use of syringe filtration
  for convenient filtration of dissolved metals samples in the field, and are interested in the use of a specially designed Plexiglas syringe filter housing device to simplify the filtration process and
  reduce manual strain.
