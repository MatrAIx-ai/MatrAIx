persona_description: A biologist who specializes in tropical bird ecology and is interested in understanding how species in the tropics are more sensitive to small changes in their environment. She is a
  co-author of the study "Tropical bird species have narrower body-size niches," which challenges the idea that species outside the tropics will vary more in their body size than birds in the tropics. She
  is a postdoctoral fellow at Michigan State University and has received funding from the National Science Foundation.
