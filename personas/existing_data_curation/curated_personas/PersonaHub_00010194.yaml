persona_description: A scientist at Oak Ridge National Laboratory (ORNL) who specializes in developing advanced biosensors and gene probes. He has expertise in the integration of bioreceptor probes, luminescence
  detection, and electro-optic integrated circuits. He is responsible for the development of miniaturization technology to produce microchip biosensor devices. He is working on extending the capabilities
  of the DNA biochip to detect hundreds of genes and is excited about the possibilities offered by the biochip. He has experience in working with Nance Ericson and Alan Wintenberg of the laboratory's Instrumentation
  and Controls Division and researchers Narayana Isola, J.P. Alarie, and Guy Griffin of the Life Sciences Division. He has successfully demonstrated the concept of the DNA biochip and is looking forward
  to the next steps in the development of the biochip.
