  career_goals: Jerrell aims to move from mail carrier to a supervisory role, such as shift supervisor or postmaster, within the next five years. He plans to pursue certifications in supply‑chain management
    and consider a part‑time public administration program to broaden his leadership skills. Long‑term, he envisions launching a niche courier service that caters to local businesses and creating a blog
    or podcast that highlights everyday stories of postal workers and Nebraska’s community life, merging his practical experience with his passion for storytelling.
