  hobbies: '[''Urban and nature photography'', ''Improv comedy'', ''Short story writing (speculative fiction)'', ''Escape-room challenges'', ''Strategy board games'', ''Live music attendance (indie rock,
    jazz)'', ''DJing'', ''Visiting art museums'', ''Water conservation community outreach'', ''Graphic design for visual projects'']'
  career_goals: John aims to progress from his current operator role to a senior supervisory position within the next five years, targeting a Plant Manager or Regional Operations Manager role overseeing
    multiple treatment facilities. He plans to obtain the Certified Water Operator (CWO) credential and pursue an associate degree in Environmental Engineering to solidify his technical expertise. Long‑term,
    John aspires to become a recognized leader in sustainable water management, championing the adoption of innovative treatment technologies such as membrane bioreactors and AI‑driven process optimization.
    He envisions establishing a consulting practice that helps municipalities implement water‑reuse projects and conducting workshops that blend technical training with interactive visual media. John also
    seeks to expand his professional network through industry conferences, speaking engagements, and participation in local water‑resource advocacy groups.
