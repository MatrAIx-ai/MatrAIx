personas:
  professional: John Molteni is a water‑treatment operator whose methodical mastery of SCADA, EPA compliance, and mechanical troubleshooting is amplified by an imaginative visual storytelling flair and
    a charismatic improv background, enabling them to train crews, lead safety briefings, and drive competitive, data‑driven improvements toward a future plant‑manager role.
  sports: John Molteni stays fit by playing weekly pick‑up basketball at a local Dallas Mavericks fan league and joining a co‑ed indoor soccer team affiliated with FC Dallas, while they follow the Texas
    Rangers in spring and attend Dallas Stars hockey games for the occasional adrenaline rush, preferring high‑intensity interval training over low‑key gym routines.
  arts: John Molteni immerses themselves in the arts by shooting long‑exposure cityscapes for the Dallas Museum of Art’s Instagram feed, performing improv sketches at the Dallas Comedy House, DJ‑mixing
    tracks from indie rock icons The Strokes and Tame Impala while riffing on jazz legends Kamasi Washington and Nina Simone, and they draw creative spark from contemporary installations by Olafur Eliasson
    and Yayoi Kusama.
  travel: John Molteni prefers meticulously planned weekend getaways to Texas Hill Country wineries and spontaneous week‑long water‑themed adventures abroad—having already trekked Iceland’s geothermal lagoons,
    snorkeled the Great Barrier Reef, and wandered Venice’s canals—and they balance a modest travel budget with a craving for immersive, photo‑ready landscapes that fuel both their speculative‑fiction writing
    and the next community‑outreach presentation.
  culinary: John Molteni enjoys crafting medium‑level culinary creations such as black‑ened catfish tacos with mango‑avocado salsa, saffron shrimp risotto, and craft coffee brewed with Ethiopian beans,
    and they often swap recipes with improv troupe mates while occasionally splurging on upscale sushi rolls from a Houston chef‑owned ramen bar.
  core: John Molteni is a methodical water‑operator with a boundless imagination, who channels competitive energy into escape rooms, improv stages, and innovative sustainability ideas, all while juggling
    a camera, a DJ deck, and a reluctant habit of late‑night coffee, and they constantly seek the next creative challenge.
background:
  cultural: John grew up in the suburban neighborhoods of Dallas, Texas, in a mixed cultural setting that blends Southern hospitality with the traditions of his Italian‑American family. His grandparents
    emigrated from northern Italy, and family gatherings often featured homemade pasta, Mediterranean music, and stories of the old country, giving him a strong sense of his heritage. At the same time,
    the Dallas environment exposed him to the city’s diverse cultural scene, from Tex‑Mex cuisine and country‑music festivals to a vibrant arts community. This combination of pragmatic Texan values—self‑reliance,
    hard work, and community service—and an appreciation for artistic expression and storytelling shaped John’s worldview. He identifies with the regional pride of Texas while also honoring his Italian
    roots through food, occasional language practice, and annual family celebrations.
attributes:
  skills: '[''Process control'', ''SCADA systems operation'', ''Water quality testing'', ''Regulatory compliance (EPA, TCEQ)'', ''Mechanical maintenance'', ''Electrical troubleshooting'', ''Data analysis
