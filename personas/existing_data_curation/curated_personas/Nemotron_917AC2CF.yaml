personas:
  professional: A budding team‑oriented leader, Carlos Ojeda channels their love for soccer and drama club into organizing playground games and school skits, preferring clear rules but allowing enough flexibility
    for spontaneous fun.
  sports: An enthusiastic youngster, Carlos Ojeda plays forward for the neighborhood “Little Tigers” soccer team, cheers for Manchester United on TV, and spends Saturday mornings practicing drills with
    friends at the local park.
  arts: A lively performer, Carlos Ojeda enjoys group skits in school drama club, sings along to Enrique Iglesias’ hits, and dances to mariachi‑style tunes at family gatherings, drawing inspiration from
    the upbeat rhythms of regional Mexican music.
  travel: A curious explorer, Carlos Ojeda loves family road trips to the beach in Santa Monica and annual visits to the Grand Canyon, preferring itineraries that balance scheduled museum stops with free‑play
    time in nature.
  culinary: A budding home‑chef, Carlos Ojeda helps in the garden and assists with making guacamole, cheese quesadillas, and fresh fruit salads, delighting in chopping cilantro and sprinkling lime juice
    while still mastering the art of using a stove safely.
  core: Carlos Ojeda blends an organized mind with a love for spontaneous group play, often juggling LEGO projects, soccer matches, and drama rehearsals while occasionally forgetting homework.
background:
  cultural: Carlos is raised in a Mexican‑American household in San Benito, Texas, where Spanish is spoken at home and English at school, giving him a bilingual upbringing. His family observes traditional
    celebrations such as Día de los Muertos, Cinco de Mayo, and religious holidays like Christmas and Easter with Catholic customs. He participates in community events at the local church and enjoys Mexican
    cuisine, especially tacos and tamales, prepared by his grandparents. The border town’s close ties to Mexico influence his identity, blending Mexican heritage with American school life and fostering
    a strong sense of family, community, and cultural pride.
