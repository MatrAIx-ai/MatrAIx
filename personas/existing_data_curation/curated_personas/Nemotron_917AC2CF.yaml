  career_goals: Although still in elementary school, Carlos dreams of becoming a firefighter one day because he admires the teamwork, the chance to help his community, and the excitement of responding to
    emergencies. He also enjoys watching soccer matches and secretly hopes to play professionally, reflecting his love for sport. In the short term, he aims to improve his reading level, win the school’s
    science fair, and be a leader in his soccer team.
