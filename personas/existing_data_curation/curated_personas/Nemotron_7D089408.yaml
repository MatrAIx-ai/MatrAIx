  hobbies: '[''drawing and watercolor painting'', ''listening to merengue and bachata music'', ''dance play'', ''reading picture books'', ''retelling stories to toys'', ''building with wooden blocks and
    LEGO Duplo'', ''nature walks and collecting natural materials'', ''watching art‑related educational videos'']'
  career_goals: Maria often talks about wanting to become an artist who paints bright pictures of her family and the island she hears stories about. She imagines opening a small studio where she can teach
    younger children to draw and share her love of colors. She also expresses a budding interest in becoming a kindergarten art teacher, helping kids explore imagination while also keeping a calm, organized
    classroom. In the future, she dreams of learning to play the tambora and performing traditional merengue at community festivals, combining visual art with music and dance.
