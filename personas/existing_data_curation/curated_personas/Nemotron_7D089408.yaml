personas:
  professional: Maria Lopez imagines herself as a future astronaut, channeling their curiosity into building LEGO rockets and meticulously organizing their space‑themed books while they stay open to unconventional
    ideas about the cosmos.
  sports: Maria Lopez plays on a local under‑5 soccer team called the Little Tigers, cheering for the regional Raptors while they practice kick drills after school, and prefers quiet solo play with a jump
    rope on rainy days.
  arts: Maria Lopez loves drawing vibrant pictures of rainbow unicorns, humming along to The Wiggles and kid‑friendly songs by Lin‑Manuel Miranda, and they often watch the animated series Bluey for artistic
    inspiration.
  travel: Maria Lopez enjoys family trips to the nearby botanical garden and dreams of visiting Disneyland, preferring carefully planned itineraries that include a quiet spot for sketching, yet they sometimes
    get anxious about crowded amusement rides.
  culinary: Maria Lopez enjoys nibbling on cheese‑filled quesadillas, mac and cheese, and strawberry slices, often helping Mom stir pancake batter and sprinkling cinnamon sugar on toast, though they sometimes
    hide extra cookies for later.
  core: Maria Lopez is a curious, organized five‑year‑old who balances a love for art and science with a tendency to worry, while they keep an orderly playroom and a secret stash of glitter stickers.
background:
  cultural: Maria was born and raised in Orange, New Jersey, in a close‑knit Dominican family. At home, Spanish is spoken alongside English, giving her a bilingual foundation. Her household celebrates Dominican
    traditions such as Carnaval, Día de la Restauración, and the weekly communion of family meals featuring dishes like mangú, plátanos maduros, and rice with beans. The vibrant rhythms of merengue, bachata,
    and salsa fill the home, and her mother often teaches her simple dance steps during family gatherings. Maria attends a local preschool with a modest Latino student population, where she meets other
    Dominican children and learns about shared cultural stories. Her grandparents regularly share folk tales from the Dominican Republic, and she has visited relatives in the greater New York Dominican
    community, strengthening her connection to the island’s heritage. These cultural influences shape her love for bright colors, rhythmic music, and storytelling, all of which are woven into her everyday
    life.
