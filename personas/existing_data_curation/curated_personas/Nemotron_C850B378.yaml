personas:
  professional: Hieu Ngo, a 33‑year‑old operations specialist, they leverage meticulous financial forecasting, process mapping, and data‑analysis skills to design airtight SOPs while their disciplined routine
    and assertive empathy keep cross‑functional teams on schedule and morale high.
  sports: Hieu Ngo, an avid weekend runner and basketball league participant, they train with the Des Moines Road Runners, support the Iowa Cubs during baseball season, and blend strength training with
    regular pick‑up games at the local gym to stay fit and socially engaged.
  arts: Hieu Ngo, a culture‑curious enthusiast, they attend monthly performances at the Des Moines Civic Center, enjoy the soulful piano of Brad Mehldau, unwind listening to classic rock icons like Bruce
    Springsteen, and occasionally join community celebrations featuring traditional drumming and folk music.
  travel: Hieu Ngo, an organized explorer, they plan trips with a spreadsheet, favor weekend getaways to Kansas City for live music, annual family vacations to a coastal town in Southeast Asia renowned
    for its street‑food scene, and dream of a summer hike through the Canadian Rockies, balancing cost‑effectiveness with cultural immersion.
  culinary: Hieu Ngo, a disciplined home chef, they master the simmering broth of phở bò, roll delicate shrimp spring rolls with rice paper, experiment with fresh herbs like cilantro and Thai basil, and
    harvest crisp lettuce and chilies from their garden to brighten every dish.
  core: Hieu Ngo, a 33‑year‑old routine‑driven dynamo, they juggle disciplined work processes, weekly basketball, meticulous budgeting, and late‑night coffee runs, while occasionally over‑planning even
    the simplest meals.
background:
  cultural: Hieu was born to Vietnamese immigrant parents and grew up in a bilingual household that emphasized respect for elders, family cohesion, and the value of education. Traditional celebrations such
    as Tết (Lunar New Year) and Mid-Autumn Festival remain central to his family's life, and he continues to prepare and share customary dishes with relatives and friends. Though he has assimilated to American
    culture—graduating from a U.S. university and settling in Des Moines—he retains a strong connection to the Vietnamese diaspora community, participating in cultural events, language preservation activities,
    and community service. This blend of Southeast Asian heritage and Midwestern living informs his pragmatic outlook, sense of duty to family, and appreciation for both collective harmony and individual
    achievement.
