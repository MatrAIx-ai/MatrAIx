  career_goals: Hieu aims to re-enter the professional arena with a role that capitalizes on his organized, results-driven approach. He is targeting positions such as Operations Manager, Business Process
    Improvement Lead, or Senior Financial Analyst within a stable, midsize company in the Des Moines area. Securing a professional certification—PMP or CPA—within the next two years is a concrete milestone.
    In the longer term, he envisions launching a modest family-owned Vietnamese café that blends his cultural heritage with his business acumen, providing a reliable income stream and a community gathering
    spot. Throughout his career progression, Hieu seeks to mentor junior colleagues, build a dependable network, and maintain a work schedule that supports his family's routine and well-being.
