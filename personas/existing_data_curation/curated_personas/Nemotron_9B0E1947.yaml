  hobbies: '[''Sketching'', ''Visiting art galleries and museums'', ''Exploring coffee shops in NYC'', ''Listening to indie music'', ''Playing acoustic guitar'', ''Photography (candid street and portrait)'',
    ''Creative songwriting'', ''Volunteering at the local library'', ''Attending open‑mic and theater workshops'', ''Organizing teen art exhibitions'']'
  career_goals: Jessica envisions a future where she can blend her love for the arts with her talent for social interaction. She aspires to become a creative director or a content strategist for a lifestyle
    brand, using her eye for aesthetics and her knack for storytelling to shape engaging campaigns. Alternatively, she is drawn to roles in event production or community arts programming, where she can
    curate experiences that bring people together. In the longer term, she might explore a career as a social media influencer or a television host, leveraging her comfort in the spotlight to inspire and
    connect with a broader audience.
