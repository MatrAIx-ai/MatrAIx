personas:
  professional: Shawn Robinson, a 72‑year‑old retired small‑retail business manager, channels decades of budgeting and staff‑mentoring expertise into leading community‑center financial‑literacy workshops,
    where their competitive streak and love of routine drive meticulous lesson plans and spirited group challenges.
  sports: Shawn Robinson, a 72‑year‑old sports enthusiast, loyally follows the Seattle Seahawks and Edmonds High School football team, attends weekend games with their spouse, and recently joined the local
    seniors’ basketball league where they relish friendly competition despite a lingering knee ache.
  arts: Shawn Robinson, a 72‑year‑old soul and jazz aficionado, regularly tunes into Marvin Gaye and Miles Davis, sings in the church choir, and often hums saxophone solos while cooking, blending music
    into everyday moments.
  travel: Shawn Robinson, a 72‑year‑old low‑key traveler, favours scenic road trips across the Pacific Northwest, having driven Highway 101 to explore the San Juan Islands and treasured a family reunion
    in Portland, while dreaming of a relaxed cruise on the San Juan archipelago to share stories with grandchildren.
  culinary: Shawn Robinson, a 72‑year‑old cooking enthusiast, delights in preparing Southern comfort foods like baked mac and cheese, fried catfish, and peach cobbler, seasoning with smoky paprika and fresh
    thyme, and often hosts potluck gatherings where friends swap family recipes for collard greens.
  core: Shawn Robinson, a 72‑year‑old blends a competitive, routine‑loving spirit with a warm, sociable heart, tackling community finance, garden rows, and bingo nights with equal zest, even as occasional
    worries and knee aches keep life interesting.
background:
  cultural: Shawn was raised in a close‑knit African‑American family in the Pacific Northwest, where church, family gatherings, and community solidarity shaped his values. His upbringing emphasized respect
    for elders, self‑reliance, and the importance of sharing knowledge, especially in financial matters. The legacy of the civil‑rights movement and the black business community in Seattle inspired his
    practical, entrepreneurial spirit. He maintains traditions such as Sunday gospel services, cooking family recipes like collard greens and cornbread, and mentoring younger black professionals, blending
    his cultural heritage with the coastal, laid‑back lifestyle of Edmonds.
