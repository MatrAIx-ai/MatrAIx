  career_goals: Although retired, Shawn aims to stay active by volunteering as a financial‑literacy mentor at his local community center, helping both younger adults and seniors manage their finances. He
    hopes to support his church’s outreach programs, possibly chairing a senior advisory board. He also wants to maintain his health through regular walks along the Edmonds waterfront and join a local seniors’
    basketball league for friendly competition. He remains skeptical of quick‑fix financial programs and focuses on tried‑and‑true advice. Traveling within the Pacific Northwest to visit family and establishing
    a modest scholarship fund for black students pursuing business studies are additional long‑term ambitions.
