    and mentoring new staff'']'
  hobbies: '[''Reading historical fiction'', ''Urban balcony gardening'', ''Cooking traditional Vietnamese dishes'', ''Walking along the Hudson River waterfront'', ''DIY home improvement projects'', ''Mindfulness
    meditation'']'
  career_goals: Quyen seeks a stable career path that allows growth while preserving flexibility for family time. Her primary goal is to advance into a lead or supervisory role within facilities management,
    overseeing cleaning crews and green‑cleaning initiatives. She plans to earn a Certified Professional Cleaner (CPC) credential and later complete an associate degree in Facilities Management or Environmental
    Health. Long‑term, she hopes to specialize in sustainable building practices and perhaps manage a green‑certified building’s cleaning operations, blending her practical expertise with her interest in
    eco‑friendly solutions.
