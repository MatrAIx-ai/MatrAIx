    techniques'', ''Digital photography'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading literary fiction and art books'', ''Visiting museums and galleries'', ''Digital photography'', ''Birdwatching'', ''Gardening'', ''Journaling'',
    ''Crossword puzzles and Sudoku'', ''Listening to classical and folk music'']'
  career_goals: Rachel aims to leverage her extensive retail experience into a supervisory role within the next two years, seeking a shift-lead position where she can mentor new cashiers, streamline checkout
    procedures, and contribute to staff training on customer service excellence. She plans to enroll in a community college bookkeeping certificate program to qualify for part-time administrative or data-entry
    work that offers a quieter, more solitary environment. Parallel to her professional aspirations, Rachel is cultivating an online presence for her watercolor and photography work, hoping to open a modest
    Etsy shop to sell original pieces and prints. Long-term, she envisions a balanced retirement where she continues occasional retail consulting, volunteers as a docent assistant at the Milwaukee Art Museum,
    and dedicates time to her creative pursuits.
