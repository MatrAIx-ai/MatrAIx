  career_goals: Jeimy aims to leverage her STEM education to move into a senior administrative or research coordination role within a technology or scientific organization. She plans to obtain the Certified
    Administrative Professional (CAP) credential and a project management certification to formalize her process‑improvement expertise. Over the next five years, she hopes to become an office manager or
    executive assistant who can design digital workflow solutions, mentor junior bilingual staff, and act as a liaison between technical teams and executive leadership. She also seeks a balanced schedule
    that preserves quiet evenings at home and supports her family's needs.
