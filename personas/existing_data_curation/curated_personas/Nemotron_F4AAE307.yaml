  hobbies: '["Gardening", "Knitting", "Church Activities", "Walking", "Birdwatching", "Big Band Music", "Reading Historical Fiction", "Senior Center Crafts", "Bingo"]'
  career_goals: Although retired, Cynthia’s main ambition is to preserve her family’s history by recording oral stories and eventually publishing a small memoir about life on the Great Plains and the Black
    Hills. She aims to stay physically independent, continue contributing to her church’s outreach programs, and pass on her knitting and gardening skills through workshops for teenagers at the senior center.
    Additionally, she hopes to travel modestly within South Dakota to visit historic sites she’s read about but never explored, reinforcing her lifelong love of learning and local heritage.
