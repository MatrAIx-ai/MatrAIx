  career_goals: Naved aims to progress to a senior compliance leadership role within the next five years, ultimately positioning himself as a Chief Compliance Officer for a mid‑size technology firm. He
    seeks to deepen his expertise in cybersecurity and data‑privacy regulations, obtain advanced certifications such as CISA and CIPP/E, and lead the development of a proactive compliance culture that integrates
    risk management into product development. Naved also aspires to mentor junior analysts, contribute to industry best‑practice publications, and serve on advisory panels for regulatory bodies.
