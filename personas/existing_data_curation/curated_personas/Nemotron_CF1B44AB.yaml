  hobbies: '[''Gardening'', ''Cooking and baking'', ''Book club participation'', ''Volunteer work at community kitchen'', ''Riverfront walking'', ''Church social events'', ''Yoga and mindfulness'', ''Knitting
    for charity'', ''Local dancing events'']'
  career_goals: Allison aims to re‑enter the education sector in a role that leverages her strengths in routine and practical application while allowing her to help others. She is pursuing a part‑time position
    as an adult‑education or community‑college instructor, with a long‑term ambition to become a program director for an after‑school or youth‑development nonprofit in Jacksonville. She also plans to obtain
    a state endorsement in special education to broaden her teaching credentials, and hopes to eventually launch a small, locally‑run tutoring cooperative that provides affordable support for underserved
    families.
