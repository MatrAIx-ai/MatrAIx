  hobbies: '[''Vegetable gardening'', ''Bird‑watching'', ''Fishing'', ''Historical non‑fiction reading'', ''Arabic poetry exploration'', ''Woodworking'', ''Mindfulness meditation'', ''Journaling'', ''Church
    food pantry volunteering'']'
  career_goals: Ahmed aims to formalize his education by earning a GED and pursuing an associate degree in office administration or health information management. Building on his disciplined approach, he
    aspires to move into an Office Manager role for the county government, where he can design streamlined processes that reduce staff stress and improve service quality. He also plans to obtain a certification
    in health‑records management, which will broaden his expertise and open pathways to supervisory positions. On a personal level, Ahmed is committed to developing stronger coping strategies for his anxiety,
    including regular therapy and mindfulness training, so he can sustain his high standards without compromising his well‑being.
