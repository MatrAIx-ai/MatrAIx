  career_goals: Juan aspires to turn his artistic talent and deep sense of community into a career as a community arts facilitator or cultural outreach coordinator. He hopes to develop programs that bring
    art workshops to underserved youth in Dorado and Vega Alta, possibly through an apprenticeship with a local art collective. In the longer term, he envisions establishing a social enterprise that sells
    handcrafted items to fund community projects, while advocating for the preservation of Puerto Rican cultural heritage and mentoring emerging artists.
