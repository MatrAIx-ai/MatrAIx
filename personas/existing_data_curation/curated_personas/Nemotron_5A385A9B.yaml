  hobbies: '[''Street art exploration'', ''Sketching and drawing'', ''Vinyl record collection'', ''Jazz and hip‑hop listening'', ''Reading speculative fiction'', ''Food photography'', ''Home culinary experimentation'',
    ''Chess'', ''Museum and gallery visits'', ''Podcast listening'']'
  career_goals: Marvin aims to transition from managing a single location to overseeing multiple venues as a regional manager for a boutique hospitality brand. Concurrently, he is drafting plans for his
    own intimate pop-up restaurant that showcases a fusion of Caribbean, Southern, and modernist culinary art, catering to small groups who appreciate curated experiences. He intends to earn an associate
    degree in culinary arts and obtain advanced certifications in menu design and food styling. Long-term, Marvin aspires to be recognized as a thought leader in Brooklyn's experimental food scene, publishing
    a blog that explores the intersection of food, visual art, and culture, and eventually opening a permanent space that serves as both a restaurant and an art gallery.
