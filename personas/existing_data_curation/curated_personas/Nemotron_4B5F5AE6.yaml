  hobbies: '[''reading speculative fiction'', ''visiting art galleries'', ''DIY crafts'', ''cooking Mexican cuisine'', ''hiking in the Cascades'', ''journaling'', ''practicing yoga'', ''volunteering at
    community center'']'
  career_goals: Helena aspires to turn her artistic passions into a modest freelance venture, such as selling hand‑crafted home décor and original artwork through online platforms like Etsy. She hopes to
    obtain an associate degree in Fine Arts or Community Development through part‑time online courses, which would qualify her to teach art workshops at the local community center. Over the next five years,
    she envisions establishing a small studio where she can host creative classes for children and adults, preserving and sharing Mexican cultural art forms while building a supportive network that helps
    her manage stress and anxiety. She also wants to deepen her involvement in cultural‑heritage events, eventually coordinating the town’s annual multicultural festival.
