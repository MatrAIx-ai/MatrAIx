personas:
  professional: Carlos Figueroa is a 26‑year‑old retail sales associate who leverages bilingual fluency and a calm, problem‑solving demeanor to forge strong customer relationships, while they also channel
    curiosity about product trends into creative upselling despite a relaxed approach to scheduling that sometimes forces last‑minute plan changes.
  sports: Carlos Figueroa follows soccer passionately, cheering for FC Dallas in the MLS and their home country's national team, while they also join a weekly pick‑up football group at a Dallas community
    field and unwind with solo hikes in Kiker Park to stay fit.
  arts: Carlos Figueroa relaxes by streaming Latin pop from Bad Bunny and J Balvin, curating eclectic playlists that blend reggaetón with classic boleros, and occasionally attending live acoustic sets at
    the Dallas Arts District, allowing their love for rhythm to influence both their cooking tempo and personal brand.
  travel: Carlos Figueroa prefers low‑key road trips over crowded tours, having explored the colonial charm of Antigua, Guatemala and the vibrant streets of Oaxaca, while they dream of weekend adventures
    in Austin’s live‑music scene and a future cultural immersion trip to Buenos Aires.
  culinary: Carlos Figueroa enjoys mastering pupusas filled with cheese and loroco, often experimenting by adding Texas‑style brisket, chipotle aioli, or avocado slices, and they regularly source fresh
    masa, cilantro, and locally harvested herbs from Dallas farmers’ markets to fuel their weekend kitchen creations.
  core: Carlos Figueroa balances a curious mind with a relaxed, sometimes disorganized routine, often swapping meticulous sales scripts for spontaneous kitchen experiments and solitary hikes that provide
    the quiet recharge they cherish.
background:
  cultural: Carlos was raised in a Salvadoran‑immigrant household in Mesquite, Texas. His parents emigrated from El Salvador in the early 1990s, bringing strong familismo values, a close‑knit community
    ethic, and Catholic traditions. Growing up, he celebrated Salvadoran holidays such as Día de la Independencia (September 15) and participated in local festivals featuring pupusas, marimba music, and
    folkloric dances. Bilingual communication is a daily norm, and he maintains ties to the broader Salvadoran diaspora in Dallas, often attending church gatherings and community events. These cultural
    roots shape his sense of responsibility toward family and community, his preference for collaborative environments, and his pride in sharing Salvadoran cuisine and customs.
attributes:
