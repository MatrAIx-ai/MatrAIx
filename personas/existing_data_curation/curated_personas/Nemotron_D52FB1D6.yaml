  hobbies: '[''Cooking traditional Salvadoran dishes (pupusas, tamales)'', ''Playing strategy and RPG video games'', ''Watching soccer matches (Salvadoran national team and local clubs)'', ''Reading self‑improvement
    and business books'', ''Listening to Latin music and curating playlists'', ''DIY electronics and gadget projects'', ''Hiking local trails and nature walks'']'
  career_goals: Carlos aims to advance into a sales supervisory role within the next three years, eventually becoming a store manager or regional sales coordinator. He plans to earn his GED and enroll in
    community‑college courses in business management to strengthen his leadership capabilities. Long‑term, he hopes to open a small boutique or online store that caters to the Salvadoran and broader Latino
    community in the Dallas area, offering culturally relevant products and personalized service. He values flexibility, so he also explores opportunities for remote sales consulting and freelance merchandising
    projects.
