personas:
  professional: Melissa Wood is a Business Administration student with a knack for organized event coordination, leveraging her strong interpersonal skills and detail‑oriented mindset to manage volunteer
    schedules, budgets, and social‑media promotion for campus clubs, while aiming to transition into a nonprofit project coordinator role that blends structure with community impact.
  sports: Melissa Wood balances an active lifestyle with weekly intramural volleyball matches for the campus Blue Wave club and salsa lessons at the Rhythm & Motion studio, while cheering on the Chicago
    Bulls during the NBA season and hitting the lakefront trail for morning runs to stay fit.
  arts: Melissa Wood cultivates a vibrant arts life by snapping street photos inspired by Henri Cartier‑Bresson, frequenting live shows at The Empty Bottle to see indie acts like Mitski, browsing contemporary
    exhibitions at the Art Institute of Chicago featuring Georgia O’Keeffe, and unwinding with novels by Sally Rooney on rainy evenings.
  travel: Melissa Wood prefers short, budget‑friendly getaways, often planning weekend road trips to Milwaukee’s lakeside breweries or New Orleans for its music‑rich French Quarter, while keeping a detailed
    Instagram travel log of their favorite Chicago neighborhood haunts and dreaming of a future backpacking adventure through Barcelona’s eclectic streets.
  culinary: Melissa Wood is a curious food explorer who frequently hunts for the city’s best deep‑dish pizza at Lou Malnati’s, sips spicy ramen at a hidden Korean spot, and experiments at home with easy
    avocado‑toast brunches sprinkled with feta and chili flakes, favoring fresh basil, cherry tomatoes, and a dash of sriracha.
  core: Melissa Wood channels a project‑manager’s precision into a socially‑driven life, mixing meticulous budgeting with spontaneous salsa spins, occasional sleepless nights, and a habit of snapping candid
    street photos before they even say “cheese.”
background:
  cultural: Melissa was raised in a middle‑class white family on the South Side of Chicago. Her parents emphasized Midwestern values of hard work, community involvement, and respect for diversity. Growing
    up in a multicultural city, she was exposed to a wide range of cultural traditions, foods, and artistic expressions, which fostered an appreciation for inclusivity while maintaining her own family’s
    holiday customs, such as celebrating Thanksgiving and Christmas with extended family gatherings. This blend of local Chicago culture and broader American traditions informs her cooperative outlook and
    desire to contribute positively to her community.
