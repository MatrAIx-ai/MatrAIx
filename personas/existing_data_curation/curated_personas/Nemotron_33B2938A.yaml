  career_goals: Melissa intends to complete a Bachelor’s degree in Business Administration with a concentration in Project Management or Community Development. She aims to secure an entry‑level role as
    a project coordinator or community outreach specialist at a nonprofit organization in Chicago, where she can apply her organizational strengths and people‑focused mindset. Over the next five years,
    she aspires to lead larger community programs, eventually moving into a program director position or launching her own social‑impact event planning firm that emphasizes inclusive, collaborative experiences.
