persona_description: A molecular biologist who specializes in the study of membrane proteins and membrane biology. Their research interests include the evolution of lipid bilayers, the co-evolution of membrane
  proteins and membrane bioenergetics, and the development of permeable and impermeable membranes. They use molecular dynamics simulations to understand how membrane proteins and translocases evolved from
  a stand-alone hydrophobic α-helix and how ATPases function as efficient ATP synthases in eukaryotic and bacteria mitochondria and chloroplasts.
