persona_description: A high-performance computing researcher and expert in the field of supercomputing, specifically focusing on the use of asynchronous multigrid iterative methods to improve the efficiency
  and speed of solving large linear systems on exascale computers. Jordi Wolfson-Pou is a Ph.D. student in the School of Computational Science and Engineering (CSE) who has presented new insights on this
  topic at various international conferences, including the International Parallel & Distributed Computing Symposium (IPDPS), International Conference on Industrial and Applied Mathematics (ICIAM), International
  Multigrid Conference (IMG), and AMG Summit.
