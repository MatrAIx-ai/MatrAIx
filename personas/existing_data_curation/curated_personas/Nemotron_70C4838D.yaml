  hobbies: '[''line dancing'', ''community gardening'', ''soul‑food festival organization'', ''blues and gospel concerts'', ''book club on African American history'', ''DIY home improvement'', ''weekly
    walking group'', ''traveling with friends'', ''cooking Southern‑African fusion dishes'', ''volunteering at local shelters'']'
  career_goals: Shaunette plans to transition from full‑time field inspections to a senior advisory role that blends consulting with mentorship. She aims to earn a Certified Safety Professional credential
    within the next two years, so she can offer freelance safety audits to local contractors and community development projects. A long‑term ambition is to establish a yearly workshop for women and minorities
    entering construction trades, leveraging her network to create a supportive pipeline. She also hopes to contribute to local building code revision committees, ensuring the standards reflect practical
    realities and community needs.
