personas:
  professional: Shaunette Lede is a veteran building inspector with over three decades of hands-on experience interpreting the International Building Code, local Tennessee safety regulations, and accessibility
    standards, who blends a curious eye for emerging sustainable construction methods with a relaxed, collaborative style to produce clear, conflict-mediating reports, mentor junior staff, and strategically
    plan a transition to senior advisory work and a Certified Safety Professional credential to launch freelance safety audits and community workshops for women and minorities, and they approach each inspection
    with calm resilience that earns the respect of contractors and owners alike.
  sports: Shaunette Lede stays active through a local line-dancing club and weekly senior walking group, while cheering on the Nashville Predators and the Tennessee Titans, and they occasionally join a
    community bowling league at the senior center.
  arts: Shaunette Lede is a devoted fan of blues and gospel music, regularly attending concerts featuring legends like B.B. King, Mavis Staples, and contemporary gospel artist Kirk Franklin, and channels
    their love of storytelling into leading a book club that explores American civil-rights narratives and cultural history, while also expressing creativity through choreographed line-dance routines.
  travel: Shaunette Lede prefers road-trip adventures that blend cultural enrichment with relaxation, having explored the jazz-filled streets of New Orleans, the historic charm of Savannah and Charleston,
    the scenic vistas of the Great Smoky Mountains, and they dream of future visits to the coastal town of Tulum, Mexico, and the historic sites of Granada, Spain.
  culinary: Shaunette Lede is an enthusiastic home cook who blends Southern comfort foods like shrimp-and-grits and collard greens with West African-inspired flavors such as berbere spice and palm oil,
    regularly preparing dishes like gumbo-style jambalaya, sweet potato pie with ginger, and black-eyed pea salads tossed with smoked paprika, and they showcase a moderate skill level that balances experimentation
    with family recipes.
  core: Shaunette Lede merges decades of building-inspection expertise with a sociable, relaxed demeanor, channeling curiosity into sustainable mentorship, while juggling community festivals, line-dancing,
    and a penchant for spontaneous concert tickets, all underpinned by an effortless calm that keeps them resilient.
background:
  cultural: Shaunette identifies as an African American woman raised in the Deep South. Her cultural roots are reflected in her reverence for church community, gospel music, and soulful cooking traditions
    that combine Southern comfort food with ancestral flavors. Growing up in Jackson, TN, she has witnessed the resilience of the Black community and draws strength from that history. Her professional path
    as a building inspector has been shaped by navigating a predominantly male industry, and she embraces her role as a mentor and advocate for greater inclusion of Black women in construction trades.
