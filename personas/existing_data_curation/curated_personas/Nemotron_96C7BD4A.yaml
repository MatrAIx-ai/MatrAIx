personas:
  professional: Tabitha Seigler, a budding LEGO architect, designs intricate brick layouts and sketches floor‑plan doodles, channeling their love for clear rules and predictability into structured play
    while also allowing spontaneous tweaks that satisfy their flexible side.
  sports: Tabitha Seigler, an eager participant in the Oakridge Little Tigers U‑6 soccer club, loves sprinting for the golden boot, passionately cheers for the New York Yankees in baseball and the New York
    Knicks in basketball on family TV nights, and tries beginner ice‑skating lessons in winter, mirroring their competitive drive and love for structured team sport.
  arts: Tabitha Seigler, a dedicated doodler, fills sketchbooks with vibrant rainforest scenes inspired by Dr. Seuss’s whimsical illustrations and Disney’s Frozen, hums the catchy chorus of ‘Let It Go’
    while coloring, and delights in the playful melodies of Sesame Street, blending their desire for vivid, organized art with boundless imagination.
  travel: Tabitha Seigler, who adores family road trips to Willow Creek State Park’s campsite and annual visits to Disneyland in California, eagerly plans their next adventure to Paris’s Eiffel Tower while
    proudly displaying a collection of souvenir stickers from each destination, balancing their love for familiar routines with an emerging wanderlust.
  culinary: Tabitha Seigler, a self‑declared macaroni‑and‑cheese connoisseur, thrills at strawberry‑yogurt parfaits, spreads peanut butter on whole‑grain toast with precision, helps stir banana‑pancake
    batter using a bright orange spatula, and insists on a pinch of cinnamon in their muffins, reflecting their practical palate and occasional adventurous seasoning experiments.
  core: Tabitha Seigler blends a meticulous love for LEGO blueprints with spontaneous sticker‑hunting bursts, balancing structure and whimsy in every playful moment as they explore.
background:
  cultural: Tabitha is raised in a White, Midwestern American family in Athens, Ohio. Her household observes traditional American holidays such as Thanksgiving, Halloween, and the Fourth of July, often
    participating in community gatherings and local fairs. The region’s Appalachian surroundings foster a love for outdoor activities and a close‑knit neighborhood feel. Her upbringing blends rural traditions,
    school‑centered events, and family customs, giving her a sense of community, appreciation for nature, and a grounded, practical outlook.
