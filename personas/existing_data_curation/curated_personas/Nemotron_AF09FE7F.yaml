  career_goals: She aspires to attend a university with a renowned fine‑arts and digital‑media program, aiming to earn a degree in graphic design or interactive media. Joelys hopes to secure a scholarship
    that acknowledges both her artistic talent and academic excellence. Long‑term, she envisions working as a UX/UI designer creating inclusive and visually compelling digital experiences, while also establishing
    a youth art mentorship program in San Bernardino that celebrates cultural expression and creative skill development.
