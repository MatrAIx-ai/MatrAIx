personas:
  professional: Joelys Gomezcolon is a budding STEAM prodigy who merges disciplined digital illustration on a tablet with methodical robotics projects, channeling their competitive drive and meticulous
    organization into school competitions and community mural collaborations.
  sports: Joelys Gomezcolon fuels energetic fitness through a tri‑weekly regimen that blends early‑morning skate sessions at Riverside Skate Plaza, after‑school salsa and hip‑hop rehearsals with the school
    dance troupe, and weekend viewings of LA Lakers games for basketball inspiration, while competing in the Los Angeles Skate Club’s regional contests and cheering the LA Dodgers in spring.
  arts: Joelys Gomezcolon channels a love of graphic storytelling into vibrant digital murals inspired by Katsuhiro Otomo and Shantell Martin, while their playlist swings from Bad Bunny’s reggaetón beats
    to Misty Copeland’s ballet performances, and weekend trips to local galleries often end with sketching scenes from iconic sci‑fi films like Blade Runner.
  travel: Joelys Gomezcolon prefers meticulously planned weekend getaways that blend adventure and culture—recently exploring the street‑art corridors of Mexico City on a family trip, cruising the surf‑filled
    beaches of San Diego, and now day‑dreaming about a future backpacking stint in Tokyo’s Akihabara district to chase manga inspirations.
  culinary: Joelys Gomezcolon flips effortlessly between novice chef and confident home cook, mastering the slow‑cooked layers of chicken mole poblano with chilhuacatsin and hominy, perfecting crunchy fish
    tacos with fresh cilantro, and they never miss a chance to blend avocado‑infused guacamole into post‑skate snacks.
  core: Joelys Gomezcolon blazes through life with the precision of a robotics code, the rhythm of a dance floor, and a relentless curiosity that fuels late‑night sketch marathons, even if it means forgetting
    homework until the very last minute.
background:
  cultural: Joelys was raised in a Mexican‑American household in San Bernardino, where Spanish and English are spoken daily. Her family celebrates Mexican traditions such as Día de los Muertos and Semana
    Santa, and they often gather for meals featuring dishes like tamales and pozole. Proud of her bicultural identity, she incorporates Mexican motifs and color palettes into her artwork. The vibrant Latino
    community in San Bernardino provides her with opportunities to participate in cultural festivals, bilingual school programs, and community art projects, fostering both her heritage and her creative
    aspirations.
