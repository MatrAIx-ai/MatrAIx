  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Cooking Vietnamese and Thai cuisine'', ''Reading literary fiction and poetry'', ''Yoga and mindfulness meditation'', ''Hiking in the Blue
    Hills'', ''Photography'', ''Volunteering at community cultural festivals'']'
  career_goals: Kareen aims to earn a Master’s degree in Educational Leadership within the next three years, focusing on equity‑focused curriculum design. She aspires to become a curriculum specialist in
    her district, championing art‑infused STEAM programs that nurture creativity and critical thinking. Long‑term, she envisions a role as a school administrator or education consultant where she can implement
    systemic supports for students’ mental wellbeing, especially for those from immigrant families. She also hopes to create a community after‑school arts studio offering low‑cost workshops and cultural
    storytelling sessions.
