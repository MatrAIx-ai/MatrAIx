personas:
  professional: Kareen Tran, a 32‑year‑old third‑ and fifth‑grade teacher in Massachusetts, blends solid classroom management with a curiosity‑driven, art‑infused STEAM curriculum, leveraging bilingual
    support and digital tools while mentoring novices, all aimed at equity‑focused curriculum design.
  sports: Kareen Tran channels their love of the outdoors into weekend hikes up the Blue Hills and participation in a local trail‑running club, while cheering on the Boston Celtics and Boston Red Sox and
    occasionally joining a community softball league that provides a social outlet balanced with solitary nature walks.
  arts: Kareen Tran finds artistic fulfillment in watercolor painting inspired by contemporary artists like Yayoi Kusama and Jean‑Michel Basquiat, frequent visits to the Institute of Contemporary Art Boston,
    and weekly poetry readings featuring Ocean Vuong and Tracy K. Smith, which together inform their creative teaching methods and personal reflection.
  travel: Kareen Tran’s travel style blends purposeful planning and spontaneous curiosity, having explored the historic streets of Kyoto for culinary inspiration, the vibrant markets of Bangkok for spice
    profiles, and New England coastal towns like Portland for art festivals, while dreaming of a weekend retreat in the Tuscan countryside that balances budget constraints with a need for cultural immersion.
  culinary: Kareen Tran delights in cooking pho broth, lemongrass‑infused pad thai, and lobster‑roll mash‑ups, skillfully balancing traditional Vietnamese and Thai flavors with New England seafood, often
    experimenting with fresh herbs like cilantro and Thai basil, yet occasionally over‑spices dishes in a quest for the perfect fusion.
  core: Kareen Tran is a curiosity‑driven educator who paints with watercolors, worries about tomorrow’s lesson plans, and finds peace in yoga, all while nurturing a dream of an inclusive arts studio.
background:
  cultural: Kareen is a second‑generation Vietnamese‑American. Her parents immigrated to the United States after the Vietnam War and settled in the Boston area before moving to Brockton, where a close‑knit
    Southeast Asian community formed. She grew up speaking Vietnamese at home, celebrating Tet with traditional foods, lanterns, and folk performances, and attending a local Buddhist temple. These cultural
    experiences give her a deep appreciation for storytelling, communal responsibility, and respect for elders, which she weaves into her classroom through bilingual books, Vietnamese folk tales, and cross‑cultural
    projects. While fully embracing American educational norms, she deliberately highlights her heritage to foster inclusivity and cultural pride among her students.
