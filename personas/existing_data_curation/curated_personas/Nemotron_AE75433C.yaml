  skills: '[''Gardening'', ''Horticulture'', ''Knitting'', ''Quilting'', ''Pottery'', ''Photography'', ''Research'', ''Critical thinking'', ''Small‑group workshop facilitation'', ''Empathetic listening'']'
  hobbies: '[''Nature walks'', ''Photography'', ''Gardening'', ''Knitting'', ''Quilting'', ''Visiting local galleries'', ''Reading historical fiction'', ''Philosophy'', ''Journaling'']'
  career_goals: Mildred hopes to transition from informal activities to a structured yet flexible role within the local arts community. She aims to volunteer and eventually secure a part‑time position as
    an arts coordinator at the Franklin County Historical Museum, where she can curate exhibitions and lead hands‑on craft workshops. She also dreams of turning her quilting and pottery into a modest home‑based
    business, selling pieces at regional craft fairs and through an online store. Additionally, she is considering enrolling in a short‑term certificate program in community arts education to deepen her
    expertise and expand her impact on local seniors and youth.
