personas:
  professional: Torri Johnson is a seasoned special‑education specialist who blends graduate‑level STEM expertise with data‑driven IEP development, guiding multidisciplinary teams to embed adaptive technology
    into inclusive curricula while balancing meticulous planning with the flexibility needed to respond to classroom realities.
  sports: Torri Johnson enjoys low‑impact fitness through gentle yoga and weekend walks in the community park, follows the Atlanta Falcons and Atlanta Hawks with spirited enthusiasm, and participates in
    a local adult recreational tennis league each spring, finding team camaraderie in small‑group settings.
  arts: Torri Johnson channels creative curiosity into late‑night knitting sessions inspired by the intricate patterns of Mary Walker’s yarn designs, delves into science‑fiction novels by Octavia Butler
    and Isaac Asimov, and savors the soulful sounds of Billie Holiday and John Coltrane while reflecting on journal entries.
  travel: Torri Johnson prefers thoughtfully planned getaways that combine cultural immersion and relaxation, having explored the historic streets of Savannah, the mountain trails near Asheville, and the
    coastal charms of New Orleans, while dreaming of a future pilgrimage to the botanical gardens of Kyoto and the literary cafés of Edinburgh.
  culinary: Torri Johnson delights in cooking Southern soul‑food classics such as collard greens simmered with smoked turkey, crispy fried chicken, and sweet potato pie, often incorporating heirloom tomatoes
    and fresh basil from their garden into a vibrant garden‑harvest salad, and they consider themselves an intermediate home chef who loves experimenting with spice blends.
  core: Torri Johnson is a meticulous yet adaptable educator who channels anxiety into organized planning, finds solace in solitary crafts, and balances a frugal financial outlook with occasional indulgences
    in yarn and travel.
background:
  cultural: Torri is an African American woman raised in the Atlanta metro area, with deep roots in Southern Black church and community traditions. Her family emphasized education as a pathway to advancement,
    fostering a strong sense of resilience and social responsibility. Growing up, she experienced the intersection of race, gender, and disability, which shaped her commitment to equity and culturally responsive
    teaching. She participates in church gatherings, celebrates local African American cultural festivals, and draws inspiration from gospel music, spoken‑word poetry, and Southern culinary heritage. These
    cultural influences inform her advocacy for Black students with disabilities and her dedication to representation, community empowerment, and intergenerational knowledge sharing.
attributes:
  skills: '["Individualized Education Plan (IEP) development","Behavior intervention planning","STEM curriculum adaptation for diverse learners","Assistive technology integration","Data-driven instructional
    decision making","Collaboration with multidisciplinary teams","Classroom management and flexible lesson planning","Special education law compliance (IDEA, Section 504)","Grant writing for inclusive
    program funding","Professional development facilitation"]'
  hobbies: '["Reading (Educational Psychology, African American History, Science Fiction)","Gentle yoga and mindfulness meditation","Journaling","Gardening (heirloom vegetables)","Knitting and crocheting","Monthly
    book club (small group)","Cooking Southern soul‑food for friends and family","Community garden volunteering"]'
  career_goals: Torri aims to become the district Special Education Coordinator for DeKalb County, where she can lead the design and implementation of an inclusive STEM curriculum that serves Black students
    with disabilities. She plans to pursue an Ed.D. focusing on culturally responsive special education and to publish research on stress‑resilience strategies for special‑education teachers. Over the next
    five years, she hopes to secure funding for a community‑based after‑school STEM lab, mentor emerging special‑education teachers, and advocate for policy changes that increase representation of Black
    educators in her field.
