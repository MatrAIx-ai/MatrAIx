  career_goals: Although officially retired, Daffin seeks to channel his leadership and organizational strengths into lasting community impact. He aims to expand the senior mentorship program at his local
    church, develop a quarterly newsletter that captures local African-American history, and author a memoir that intertwines personal experiences with the civil‑rights era in Ohio. He also hopes to become
    proficient with emerging digital tools so he can guide peers in navigating online services, and he plans to travel to significant cultural sites linked to his ancestry, preserving stories for future
    generations.
