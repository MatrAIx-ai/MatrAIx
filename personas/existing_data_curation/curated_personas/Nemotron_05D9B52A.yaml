  hobbies: '[''Visiting art exhibitions and murals'', ''Attending live jazz and hip‑hop shows'', ''Playing basketball'', ''Street photography'', ''Open‑mic poetry and spoken‑word'', ''Reading Afrofuturist
    and Black literature'', ''Youth mentorship volunteering'', ''Cooking soul‑food dishes'', ''Exploring cultural festivals in nearby cities'']'
  career_goals: Johnny aims to complete a bachelor’s degree in communications or arts administration, with the long‑term ambition of becoming a community arts program director or nonprofit outreach coordinator.
    He envisions building inclusive, interdisciplinary art events that foster cultural dialogue and empower local youth. He also hopes to launch a grassroots art collective in Hanover that provides mentorship,
    exhibition space, and collaborative projects for emerging Black artists.
