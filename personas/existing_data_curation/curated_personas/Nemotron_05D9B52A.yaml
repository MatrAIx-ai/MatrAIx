personas:
  professional: Johnny Ross, a 21‑year‑old budding arts‑administration student, leverages their natural charisma, talkative flair, and knack for informal event planning to mobilize community volunteers
    and curate pop‑up art showcases that blend jazz, hip‑hop, and street mural tours, even if they sometimes scramble to keep deadlines straight.
  sports: Johnny Ross, an enthusiastic pick‑up basketball player, spends weekends shooting hoops at the Hanover Community Center, follows the Baltimore Ravens and Washington Wizards for NFL and NBA thrills,
    and they add casual soccer games at nearby Patapsco Valley State Park to stay active during the spring.
  arts: Johnny Ross, a dedicated art‑scene regular, immerses themselves in local street‑mural tours, attends live performances by jazz virtuoso Kamasi Washington and hip‑hop artist Kendrick Lamar, and they
    share original spoken‑word pieces inspired by the rhythms of poet Sarah Kay at community open‑mic nights.
  travel: Johnny Ross, a cultural explorer, prefers spontaneous weekend trips by Amtrak to New Orleans for its jazz heritage, Washington, D.C. for historic museums, and Asheville for its thriving arts scene,
    while they dream of a future backpacking adventure through Ghana’s coastal towns to trace ancestral roots.
  culinary: Johnny Ross, a home cook with a growing palate, loves crafting soulful dishes like fried chicken bathed in buttermilk, collard greens simmered with smoked turkey, sweet potato pie spiced with
    cinnamon and nutmeg, and they hunt down the best crab cakes seasoned with Old Bay at Baltimore’s waterfront eateries.
  core: Johnny Ross, a 21‑year‑old talkative community‑minded creative, blends a relaxed approach to scheduling with relentless curiosity, often juggling multiple art projects while occasionally forgetting
    to pay rent on time.
background:
  cultural: Johnny grew up in a Black family in Hanover, Maryland, with ancestral roots that trace back to the Great Migration. His upbringing blended Southern traditions—such as church choirs, Sunday family
    gatherings, and soul‑food cooking—with the diverse cultural landscape of Anne Arundel County. He is familiar with Maryland’s historic African‑American sites, like the Banneker‑Douglass Museum, and is
    influenced by contemporary Black art, hip‑hop culture, and community activism. His cultural identity emphasizes community solidarity, storytelling, and preserving heritage while embracing new artistic
    expressions.
