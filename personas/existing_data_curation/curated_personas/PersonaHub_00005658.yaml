persona_description: An African political scientist who specializes in the study of African politics, particularly the role of colonialism and its impact on African societies. She is interested in the differential
  interpretation of treaties of protection and the military resistance against colonial domination. Her research interests include African political and diplomatic responses, military encounters, and the
  role of technologies in the future of Canadian history. She is also interested in the impact of colonialism on African societies and the development of specialized manufactured goods from Earth.
