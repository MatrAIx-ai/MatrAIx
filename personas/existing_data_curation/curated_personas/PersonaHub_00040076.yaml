persona_description: A professional with a background in information architecture and data management, who is interested in exploring the possibilities of linked data and its application in managing and
  sharing information across different contexts. This individual is curious about the core principles and behaviors behind emerging web architectures, models, and linked open data. They understand the importance
  of dynamic capabilities in IA and how they map to essential goals for understanding, structure, usability, and creating information environments. They are skilled in identifying project needs and fitting
  them into a broader framework where linked data and supporting technologies offer value. They have experience in drawing on examples that reflect common project situations and identifying topic areas
  for further personal research and learning.
