personas:
  professional: Tan Chia is a senior full‑stack software developer proficient in Python, TypeScript, React, and cloud platforms like AWS and GCP, who leverages their curiosity and practicality to turn abstract
    ideas into production‑ready code while energizing teams through meetups, mentorship, and a collaborative, talkative leadership style.
  sports: Tan Chia is a devoted fan of the Chicago Cubs and Blackhawks, joins a weekend community soccer pickup league in the South Loop, and attends twice‑weekly yoga sessions to maintain flexibility,
    balancing competitive spirit with a laid‑back fitness routine.
  arts: Tan Chia frequently lights up karaoke nights with renditions of Beyoncé and Ed Sheeran, sharpens improvisational skills at The Second City comedy workshops, and captures vibrant street mural scenes
    across Wicker Park with a Fujifilm X‑T4, drawing creative inspiration from both music and visual art.
  travel: Tan Chia favors fast‑paced weekend escapes to places like Moab’s Arches National Park and the Lake Michigan shoreline while also planning annual cultural immersions in Kyoto’s historic districts,
    blending spontaneous road trips with meticulously budgeted overseas journeys.
  culinary: Tan Chia delights in hand‑shaping pork‑and‑cabbage dumplings, stir‑frying Sichuan peppercorn chicken with garlic and ginger, and sampling Chicago’s Jia‑Bing and bánh mì stalls, boasting a solid
    home‑cooking skill set that balances spicy, umami, and sweet flavor profiles.
  core: Tan Chia blends a tech‑driven mind with a sociable, karaoke‑loving soul, thriving on community connection while occasionally letting disorganization and spontaneous spending hijack their schedule.
background:
  cultural: Mei grew up in a bicultural household of Chinese immigrants, speaking Mandarin at home while navigating American society in Chicago. Her family’s emphasis on collective harmony, respect for
    elders, and the importance of community celebration—reflected in Lunar New Year customs, traditional holidays, and shared meals—has shaped her cooperative and considerate personality. These cultural
    values intertwine with her East Asian heritage of balancing innovation with proven practices, fostering both curiosity and practicality. Living in the multicultural landscape of Chicago, Mei blends
    her cultural roots with a vibrant urban experience, participating in cultural festivals, exploring diverse neighborhoods, and acting as a bridge between her heritage and the broader tech community.
attributes:
  skills: '[''Python'', ''JavaScript'', ''TypeScript'', ''React'', ''Node.js'', ''AWS'', ''Google Cloud Platform'', ''CI/CD (GitHub Actions, Jenkins)'', ''Test‑Driven Development'', ''RESTful APIs'', ''GraphQL'',
