  hobbies: '[''Attending tech meetups and hackathons'', ''Hosting coding workshops'', ''Karaoke nights with friends'', ''Exploring Chicago’s food scene'', ''Cooking traditional East Asian recipes'', ''Urban
    photography'', ''Board game evenings'', ''Yoga and mindfulness classes'', ''Volunteering for tech education programs'', ''Traveling to East Asia for family visits and cultural festivals'']'
  career_goals: Mei aims to evolve from a senior developer into a technical leader who bridges innovation with reliable delivery. She aspires to become an engineering manager or lead architect, championing
    a culture of psychological safety, open communication, and shared ownership. Leveraging her love for community, she hopes to spearhead internal developer advocacy programs and organize external meetups
    that nurture networking and knowledge exchange. Mei also plans to deepen her expertise in cloud architecture by earning advanced AWS certifications and to contribute to high‑impact open‑source projects.
    Long‑term, she envisions launching a consultancy that helps small businesses in the Chicago area adopt inclusive, user‑centric digital solutions while maintaining flexible work practices that respect
    personal well‑being.
