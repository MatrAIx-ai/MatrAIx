  hobbies: '[''Fishing'', ''Hiking'', ''Visiting art galleries'', ''Metal‑art docent work'', ''Model boat building'', ''Watercolor painting'', ''Vintage radio restoration'', ''Chess club'', ''County fair
    participation'', ''Folk music listening'', ''Local history research'']'
  career_goals: At 72, Robert’s primary professional ambition is to pass on his decades of trade knowledge by establishing a semi‑formal apprenticeship program through the local vocational school. He hopes
    to create a small line of custom metal art pieces—such as decorative garden gates, wildlife sculptures, and functional furniture— that celebrate the natural beauty of northern Wisconsin. He also aspires
    to author a short memoir that blends his life story with practical tips for hobbyist metalworkers, and to stay physically active enough to continue part‑time contract work on specialty welding projects
    for local farms and historic restoration sites.
