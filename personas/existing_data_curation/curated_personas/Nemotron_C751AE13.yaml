  skills: '[''MIG welding'', ''TIG welding'', ''Brazing'', ''Precision soldering'', ''Sheet‑metal fabrication'', ''Blueprint reading'', ''Small‑engine repair'', ''Hydraulic system troubleshooting'', ''Metal
