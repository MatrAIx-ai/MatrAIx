  career_goals: Viet aims to position his company as a market leader in sustainable technology solutions within the next five years, while embedding a culture of continuous innovation and ethical governance.
    He plans to spearhead AI-driven product lines, expand into international markets—particularly Southeast Asia—and develop a pipeline of future leaders through mentorship programs. Ultimately, he envisions
    transitioning to a board advisory role to influence industry standards and champion philanthropic initiatives supporting STEM education for underrepresented youth.
