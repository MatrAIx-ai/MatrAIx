persona_description: A Slovak-based technology integration partner that specializes in the development and deployment of mobile radiation source tracking systems, the PNNL MSTS technology, to secure and
  enhance the security of industrial radiography sources used in the non-destructive testing industry in Slovakia and Eastern Europe. The company works closely with businesses that utilize industrial radiography
  and non-destructive technologies to ensure the safety and security of radiological materials while not interfering with the daily operations of participating companies. The company's technology is designed
  to prevent thefts and assist in the recovery of radiological materials, and it is being deployed in many places in the United States with funding from the US National Nuclear Security Administration.
  The company's technology is a key to success for MSTS programs around the world. The company's general manager, Ing. Pavol Kučík, is a mathematics professor who specializes in the study of group theory
  and the theory of group automorphisms.
