  career_goals: Quyen dreams of a career that merges her artistic talents with her desire to support and uplift others. She aspires to become a children's book author and illustrator who uses inclusive,
    emotionally resonant stories to foster empathy and mental well-being among peers. In the longer term, she hopes to lead community-arts programs that provide safe creative spaces for youth, especially
    those navigating cultural identity and stress. To achieve this, she plans to attend a specialized arts high school, study visual communication and psychology in college, and eventually work as a multidisciplinary
    creator and youth advocate.
