  hobbies: '[''Reading medical journals and sci-fi novels'', ''Photography (urban and nature)'', ''Jogging'', ''Cooking Southern and experimental dishes'', ''Gardening'', ''Chess'', ''DIY electronics and
    PC building'', ''Listening to jazz'', ''Small group board games'']'
  career_goals: Colby aims to earn the Registered Radiologic Technologist (RRT) certification and later complete a bachelor’s degree in health informatics, followed by a master’s focused on AI integration
    in diagnostic imaging. He seeks a leadership role where he can guide the implementation of AI‑driven image analysis tools to improve diagnostic accuracy and workflow efficiency. Over the next five years,
    he plans to lead quality‑improvement projects, mentor junior technologists, and eventually launch a consulting practice that helps hospitals adopt tele‑radiology and data‑driven patient safety protocols.
    He balances his ambition with a realistic view of work‑life balance, preferring steady progression over rapid, high‑risk moves.
