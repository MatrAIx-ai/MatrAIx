personas:
  professional: Colby Paulchek is a certified medical imaging technologist who balances meticulous patient positioning and radiation safety with a curiosity for AI‑assisted diagnostics, leveraging their
    practical mindset to train new staff, lead quality‑improvement projects, and chart a path toward RRT certification and a future consulting practice in tele‑radiology.
  sports: Colby Paulchek maintains a solitary jogging routine through Piedmont Park three times a week, cheering quietly for the Atlanta Hawks and Falcons on game days, while occasionally joining a local
    running club’s early‑morning trail runs and indulging in a casual weekend pick‑up soccer match with a close group of friends.
  arts: Colby Paulchek captures Atlanta’s evolving skyline with a DSLR inspired by Edward Burtynsky’s industrial aesthetic, unwinds after work listening to Miles Davis and John Coltrane, and indulges in
    weekly board‑game nights that echo the strategic depth of his online chess pursuits.
  travel: Colby Paulchek prefers meticulously planned weekend escapes, having already hiked the Blue Ridge Parkway in Asheville and explored the historic French Quarter in New Orleans, while dreaming of
    a future solo trek through Iceland’s geothermal landscapes and a tech‑focused tour of Tokyo’s Akihabara district.
  culinary: Colby Paulchek, an adept home‑cook, routinely perfects Southern staples like fried chicken, shrimp and grits, and collard greens seasoned with smoked paprika, while also experimenting with Korean‑inspired
    bulgogi tacos and homemade sourdough, often sourcing heirloom tomatoes and sweet potatoes from the farmer’s market.
  core: Colby Paulchek blends a pragmatic, self‑reliant work ethic with a quiet curiosity, navigating life through solitary jogs, DIY health tech, and a penchant for late‑night Photoshop edits of Atlanta’s
    skyline, all while occasionally indulging in impulsive gadget splurges and skipping scheduled dental visits.
background:
  cultural: Colby comes from a white, middle‑class American background with German and Irish ancestry. He was raised in a small Midwestern town where community gatherings, church involvement, and self‑reliance
    were emphasized. Moving to Atlanta for his career exposed him to a vibrant, multicultural Southern environment, shaping his appreciation for Southern hospitality and diverse perspectives while retaining
    his pragmatic, individualistic values. He celebrates traditional holidays such as Thanksgiving and Christmas with family, enjoys regional cuisine, and respects the city’s rich cultural tapestry, though
    he typically engages in smaller, more intimate social settings.
