  career_goals: Charles aspires to lead a multi‑asset research team within a top investment firm, eventually stepping into a Chief Investment Officer role where he can shape the firm’s strategic direction
    toward innovative, socially responsible investments. He also envisions launching a boutique advisory practice that blends quantitative analysis with artistic insight, offering clients unconventional
    perspectives on asset allocation and emerging market opportunities. To support these ambitions, he plans to earn the CFA charter, deepen his expertise in ESG and fintech, and build a professional network
    that bridges finance, technology, and the creative industries.
