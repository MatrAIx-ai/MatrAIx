personas:
  professional: Regla Soto, a seasoned patient care specialist with an associate's degree in health sciences, channels three decades of bilingual direct-care experience, rigorous documentation habits, and
    a competitive drive for efficiency into leading training sessions and quality-improvement audits, positioning themselves for a supervisory role within Lehigh Valley Health Network.
  sports: Regla Soto stays fit by dancing salsa and merengue at weekly cultural gatherings, joining the local senior walking club for morning strolls along the Lehigh River, and cheering on the Lehigh Valley
    IronPigs while occasionally attending Bethlehem Steel FC matches as a dedicated fan.
  arts: Regla Soto's artistic side thrives on dancing to classic salsa hits by Marc Anthony, listening to conga rhythms of Celia Cruz, and immersing themselves in mystery novels by Agatha Christie and historical
    biographies by Doris Kearns Goodwin, often discussing the stories at lively book-club gatherings.
  travel: Regla Soto favors thoughtfully planned trips that blend cultural immersion and family time, such as weekend getaways to historic Bethlehem, annual cruises to the Caribbean islands, and a dream
    itinerary to explore the historic plazas of Seville, Spain, all balanced against a modest retirement budget.
  culinary: Regla Soto is an adept home chef who transforms garden-grown peppers and herbs into authentic mangú, hearty sancocho, and golden pastelitos, while also experimenting with garlic-infused paella
    and fresh ceviche, showcasing a palate that values both traditional comfort foods and occasional culinary adventures.
  core: Regla Soto blends relentless organization, a competitive spark, and a love for salsa-driven social gatherings, yet often procrastinates on personal health appointments when the rhythm of community
    events calls.
background:
  cultural: Regla was born in the Dominican Republic and immigrated to the United States as a young adult, settling in Bethlehem, Pennsylvania. Her Dominican roots are central to her identity, shaping her
    values of family solidarity, hospitality, and respect for elders. She grew up in a bilingual household, making Spanish her first language and English her professional medium. Dominican cultural practices—such
    as celebrating carnaval, sharing meals with extended family, and the rhythmic vitality of merengue and bachata—infuse her daily life and community interactions. While she honors these traditions, Regla
    also embraces the practical, achievement‑focused mindset of her American environment, blending curiosity about new ideas with a disciplined approach to work and personal goals. Her cultural awareness
    enables her to provide culturally competent care, bridging gaps between patients' heritage and the healthcare system.
attributes:
  skills: '["Patient Care Assistance", "Vital Signs Monitoring", "Bilingual Spanish-English Communication", "Electronic Health Record (EHR) Management", "Infection Control and Compliance", "Medical Supply
    Inventory Management", "Staff Training and Mentorship", "Quality Improvement Auditing", "Health Education and Community Outreach", "Administrative Scheduling and Coordination"]'
  hobbies: '["Salsa and Merengue Dancing", "Cooking Traditional Dominican Cuisine", "Gardening", "Reading Mystery and Historical Biography Books", "Community Volunteer Work (Senior Center, Church Events)",
    "Attending Live Music and Cultural Festivals", "Participating in Local Book Clubs", "Learning New Health and Technology Trends"]'
  career_goals: Regla aims to advance into a supervisory position, such as Patient Care Coordinator or Unit Lead, within the Lehigh Valley Health Network, where she can apply her organizational rigor and
    bilingual expertise to raise care standards and patient satisfaction. She plans to earn a Certified Case Manager (CCM) credential to broaden her impact on care planning for complex cases. A core ambition
    is to launch a bilingual community‑health outreach program that delivers culturally tailored education on chronic disease management to Dominican seniors in Bethlehem and surrounding areas. Additionally,
    she seeks to mentor younger healthcare workers, champion quality‑improvement initiatives, and serve as an advisory voice on cultural competency for the hospital’s diversity and inclusion office.
