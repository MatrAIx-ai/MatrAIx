personas:
  professional: Brianne Mace, a Kansas City‑based customer service specialist, leverages their keen empathy, lightning‑fast multitasking across Zendesk, Freshdesk, and live channels, and a healthy skepticism
    for fraud to consistently top performance metrics while channeling their competitive drive into mentorship of new hires.
  sports: Brianne Mace fuels their competitive spirit on the court by playing in the Mid‑Town Spike Volleyball Club’s recreational league, supplementing it with weekly yoga, and rallying behind the Kansas
    City Chiefs and Royals as their go‑to professional sports teams, and they never miss a post‑game analysis with friends.
  arts: Brianne Mace immerses themselves in Kansas City’s vibrant arts scene, curating acrylic and mixed‑media pieces inspired by the bold street murals of Shepard Fairey, snapping photographs of local
    installations, strumming the ukulele to the folk‑rock vibes of The Avett Brothers during weekend jam sessions, and volunteering as a mentor at community workshops where they share their love for contemporary
    artists like Yayoi Kusama and Jean‑Michel Basquiat.
  travel: Brianne Mace prefers spontaneous weekend road trips, charting routes to eclectic destinations like the Ozark National Forest, Austin’s music districts, and the historic cafés of New Orleans, while
    balancing a modest travel budget that prioritizes group experiences over luxury accommodations, and they relish the camaraderie of traveling with friends.
  culinary: Brianne Mace delights in crafting a rosemary‑gin fizz and mastering latte art at their favorite downtown coffee roasters, while at home they whip up quick yet colorful avocado‑toast salads topped
    with feta and cherry tomatoes, and indulge in occasional spicy chicken bánh mì for a flavorful kick.
  core: Brianne Mace is a curiosity‑driven, art‑obsessed go‑getter whose competitive edge fuels both their customer‑service excellence and their habit of juggling multiple creative projects, even if it
    means sacrificing sleep for late‑night coffee and craft cocktails, and they often stay up past midnight perfecting a new painting.
background:
  cultural: 'Brianne is a White Midwesterner, raised in Kansas City, Kansas, with family roots that trace back to German and Irish ancestry. Her upbringing reflects the values of the Kansas City metro area:
    community involvement, modesty, and an appreciation for both the region’s jazz and visual‑arts heritage. Local celebrations such as the Plaza Art Fair and the city''s vibrant mural scene fostered her
    love for artistic expression. Growing up in a public‑school environment, she participated in community service programs and library workshops that emphasized curiosity and collaborative learning. The
    Midwestern focus on reliability and civic engagement, combined with exposure to a diverse cultural landscape, shapes her balanced perspective on work and personal pursuits.'
