  career_goals: Brianne aims to become a top‑performing customer service representative and leverage her consistent high metrics to secure a team lead position within the next two years. She plans to enroll
    in a part‑time associate’s degree program in Business Management to deepen her leadership and operational knowledge. Long‑term, she aspires to transition into a supervisory or manager role overseeing
    a customer experience department, and eventually combine her passion for the arts by moving into community outreach or marketing for a local cultural institution. She also envisions launching a small
    online boutique featuring her own artwork and curated local crafts, using her customer insights and competitive drive to build a successful brand.
