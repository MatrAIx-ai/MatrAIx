persona_description: A dentist who specializes in endodontic therapy, root canal treatment, and has a special interest in using microscopic endodontics to ensure complete infection removal and higher success
  rates. Dr. Brion Weinberg, D.D.S., PA., is a Jupiter dentist who has treated many patients with damaged or diseased pulps and has a strong commitment to saving teeth that would otherwise be lost. He compares
  the new X-rays with those taken prior to treatment to determine the success level of a root canal. Dr. Weinberg performs root canals at Weinberg Dentistry in Juno Beach and offers his patients greater
  comfort and an even higher success rate with microscopic endodontics.
