personas:
  professional: Angelitta Choi is a 31-year-old construction specialist with hands‑on expertise in carpentry, heavy equipment operation, and sustainable building practices, who blends disciplined project
    management with a creative eye for indigenous‑inspired design, aiming to become crew foreman and later launch a design‑build consultancy.
  sports: Angelitta Choi enjoys weekend hikes along the Cascades and coastal trails, capturing sunrise photos and joining a local trail‑running club that meets at Green Lake, while cheering for the Seattle
    Seahawks and the Seattle Sounders FC, balancing solitary outdoor exercise with occasional friendly soccer matches with coworkers.
  arts: Angelitta Choi spends evenings watercolor‑painting the misty forests of the Pacific Northwest and creating digital illustrations inspired by Emily Carr and Jaune Quick‑to‑See Smith, frequently visiting
    the Seattle Art Museum to study contemporary tribal art, while knitting beadwork pieces that echo traditional motifs and woodworking small furniture for art shows.
  travel: Angelitta Choi prefers thoughtfully planned trips that blend adventure with cultural immersion, such as a week‑long biking tour of the Olympic Peninsula’s tide‑pools, a weekend hike in the Canadian
    Rockies, and a dream itinerary to explore New Zealand’s fjords and Māori architectural sites, always budgeting for sustainable lodging and local guide services.
  culinary: Angelitta Choi delights in cooking with foraged ingredients such as chanterelle mushrooms and cedar‑smoked salmon, often perfecting a wild‑berry sourdough starter, while occasionally over‑seasoning
    a pine‑nut pesto in pursuit of bold flavors, and they frequently seek out farm‑to‑table restaurants that celebrate Pacific Northwest cuisine.
  core: Angelitta Choi is a meticulous construction professional who channels a quiet curiosity into sustainable building, watercolor landscapes, and a disciplined hobbyist life, all while juggling occasional
    back aches and a penchant for splurging on art supplies.
background:
  cultural: Angelitta is of Coast Salish descent, belonging to a tribal community whose ancestral territories span the Puget Sound and the western foothills of the Cascades, including present-day Mason
    County. Growing up, she was immersed in stories that emphasize respect for the land, stewardship of natural resources, and communal responsibility. She learned traditional crafts such as beadwork and
    cedar carving, and she participates in seasonal gatherings and language revitalization programs. These cultural values shape her commitment to sustainable building, her interest in integrating tribal
    design motifs into modern construction, and her dedication to mentoring other Native American youth in the trades.
attributes:
  skills: '["Carpentry", "Concrete Formwork", "Heavy Equipment Operation", "Blueprint Reading", "OSHA Safety Certification", "First Aid/CPR", "Project Scheduling", "Inventory Management", "Sustainable Building
    Practices", "Indigenous Construction Techniques", "Digital Sketching", "Basic AutoCAD"]'
  hobbies: '["Watercolor sketching", "Digital illustration", "Visiting art galleries and museums", "Hiking and nature photography", "Traditional beadwork", "Woodworking projects", "Sustainability and cultural
    heritage book club", "Volunteer for Native American arts events"]'
  career_goals: Angelitta aims to move from construction laborer to crew foreman within two years, completing an associate's degree in construction management and obtaining a Washington State contractor's
    license. She aspires to specialize in sustainable and culturally-informed building practices, integrating indigenous construction methods and green building standards such as LEED. Long-term, she envisions
    launching a small consulting firm that offers design-build services for community projects on tribal lands and mentoring young Native American apprentices in the trades.
