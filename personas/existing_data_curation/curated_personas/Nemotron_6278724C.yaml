personas:
  professional: An emerging youth leader and forward on their middle‑school soccer team, Maria Puckett blends a practical focus on immediate results with a love for group collaboration, directing the library’s
    reading‑buddy program while navigating a delightfully chaotic schedule that reflects their relaxed approach to obligations.
  sports: Forward for the Cedar Rapids Middle School Tigers soccer squad and a member of the Cedar Rapids Youth Soccer Club, Maria Puckett also follows the Iowa State Cyclones football team and the Chicago
    Cubs, balancing vigorous team practices with weekend hikes in the nearby Maquoketa Caves State Park to stay fit, though they sometimes skip a cooldown after games.
  arts: When not on the field, Maria Puckett channels their creativity into sketching comic strips inspired by Kate Beaton, rehearsing hip‑hop choreography to Megan Thee Stallion’s beats, strumming ukulele
    covers of Jack Johnson’s song Upside Down, and devouring young‑adult novels by Angie Thomas and John Green, weaving pop culture into their artistic identity.
  travel: With a penchant for spontaneous group outings, Maria Puckett has explored the Iowa State Fair and hiked the scenic trails of Pikes Peak State Park with friends, while dreaming of a future road
    trip to Yellowstone National Park and a cultural exchange visit to Tokyo, often letting their friends handle the itinerary to avoid stressful planning.
  culinary: Experimenting in the kitchen whenever their friends gather for school events, Maria Puckett whips up red‑velvet cupcakes crowned with cream‑cheese frosting, batches of chewy chocolate‑chip cookies
    using premium Dutch‑process cocoa, and lemon‑zest mini tarts flavored with fresh basil, showcasing a budding baker’s flair despite occasional over‑mixing of batter.
  core: Maria Puckett is a sociable, structure‑loving teen who thrives on group projects, toggles between soccer, ukulele, and cupcake baking, yet wrestles with chronic worry and a habit of last‑minute
    planning.
background:
  cultural: Maria grows up in a predominantly white, middle‑class family in Cedar Rapids, Iowa, where Midwestern values of community, modesty, and self‑reliance are deeply embedded. Her family celebrates
    traditional holidays such as Thanksgiving, Fourth of July, and Easter with emphasis on family meals and local festivities like the Cedar Rapids Freedom Festival. While her cultural environment is largely
    homogenous, she is exposed to the region’s agricultural heritage and the town’s strong support for school sports and community events. Her upbringing includes occasional church attendance, reinforcing
    a sense of service and neighborly kindness, and her parents encourage independence, curiosity, and involvement in local volunteer opportunities.
