  hobbies: '[''Soccer (forward)'', ''Hip‑hop dance'', ''Co‑op video gaming (Minecraft)'', ''Reading YA novels'', ''Sketching comic strips'', ''Playing ukulele'', ''Library reading‑buddy volunteer'', ''Community
    garden volunteer'', ''Baking cupcakes'', ''Nature hikes in local parks'']'
  career_goals: Maria dreams of a future where she can combine her love for people and community with practical problem‑solving. She aspires to become a youth program coordinator or middle‑school teacher,
    roles that let her design engaging activities, mentor classmates, and create supportive environments. She is also intrigued by the idea of working in community outreach for a local nonprofit, helping
    teens manage stress and develop life skills. In the longer term, Maria hopes to launch a media platform—like a podcast or YouTube channel—focused on teen mental‑health tips, creative storytelling, and
    local event coverage, merging her communication strengths with her passion for helping others.
