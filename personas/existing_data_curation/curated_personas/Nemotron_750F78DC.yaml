personas:
  professional: Maurice Thomas is a veteran automotive body‑repair specialist who blends meticulous welding, paint‑matching, and frame‑straightening expertise with a curiosity for new adhesives, while running
    a small, well‑organized shop and mentoring high‑school apprentices with a down‑to‑earth, assertive yet cooperative style.
  sports: Maurice Thomas enjoys seasonal fishing on Long Island Sound, plays bridge competitively at the senior center, supports the New York Mets with fervent fandom, and participates in a local sailing
    club that races small yachts each summer.
  arts: Maurice Thomas immerses himself in vintage soul, R&B, and gospel, frequently listening to Aretha Franklin, Marvin Gaye, and Sam Cooke, while also singing in his church choir and attending the annual
    Long Island Jazz Festival to stay connected to live performance.
  travel: Maurice Thomas favors road trips that combine automotive heritage and coastal relaxation, having toured the Henry Ford Museum in Detroit, taken a weekend cruise to the Bahamas, and planning a
    future pilgrimage to Savannah’s historic district to sample Southern hospitality and classic car culture.
  culinary: Maurice Thomas excels at cooking Southern comfort dishes such as fried chicken with crispy buttermilk coating, collard greens simmered with smoked turkey, and buttery biscuits, often seasoning
    with paprika and cayenne, and enjoys sharing these meals at family gatherings and church potlucks.
  core: Maurice Thomas blends a lifelong love for classic cars, gospel singing, and community mentorship into a uniquely balanced outlook, juggling curiosity about new repair methods with a pragmatic respect
    for tradition, while occasionally indulging in a stubborn refusal to upgrade his beloved Impala’s original parts.
background:
  cultural: Maurice grew up as part of the African‑American community in Brooklyn during the post‑war era, experiencing the rise of the civil‑rights movement and the vibrant cultural renaissance of the
    1960s. His upbringing emphasized family bonds, church involvement, and a deep appreciation for soulful music and storytelling. Relocating to Island Park in the 1970s, he integrated into a diverse suburban
    setting while preserving his heritage through weekly gospel services, soul music gatherings, and cooking family recipes passed down from his grandparents. His cultural identity is reflected in his emphasis
    on mentorship, community service, and the celebration of African‑American contributions to automotive craftsmanship.
