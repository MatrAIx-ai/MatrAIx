    students'', ''Participating in church choir and gospel gatherings'', ''Walking with his wife along the beachfront boardwalk'']'
  career_goals: Even at 85, Maurice aims to leave a lasting legacy in the automotive community of Island Park. He plans to formalize a mentorship apprenticeship program that pairs seasoned technicians with
    local high‑school students interested in trades. He also hopes to document his decades of body‑shop knowledge in a pocket guide for hobbyist restorers. A personal ambition is to complete the restoration
    of his beloved 1965 Chevrolet Impala as a tribute to his late mentor, showcasing it at the annual Long Island classic car show. Additionally, Maurice wants to ensure his modest shop can continue under
    the stewardship of his son or grandson, securing both family stability and community service.
