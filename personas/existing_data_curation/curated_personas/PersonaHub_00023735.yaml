persona_description: A researcher in the field of environmental science, particularly interested in the impacts of mercury exposure on bird populations. She is focused on using isotope analyses of feathers
  to understand the exposure levels and reproductive success of Carolina Wrens in eastern North America. Her work also includes monitoring the long-term mercury exposure of saltmarsh sparrows in Maine,
  Massachusetts, and New York, USA, and studying the effects of breeding ground mercury exposure on the survival of migratory songbirds. She is known for her work on the impacts of atmospheric mercury deposition
  to forests in the eastern USA, as well as her research on the health of wild birds, mammals, and fish exposed to environmental methylmercury.
