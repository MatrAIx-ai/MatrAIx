personas:
  professional: A budding junior explorer, Jerry Mitchell, at four, combines boundless curiosity with practical play by dismantling toy blocks to understand how they fit together while meticulously cataloguing
    findings in a color‑coded notebook, and they proudly present their discoveries to friends and family.
  sports: A kinetic play‑maker on the local “Little Rangers” soccer squad, Jerry Mitchell dashes across the field with unbridled energy, idolizes the Los Angeles Dodgers’ outfielders during backyard baseball,
    proudly wears a Seattle Seahawks cap from family game night, and they eagerly join seasonal activities like sledding in winter and swimming in summer.
  arts: An imaginative mini‑artist, Jerry Mitchell spends hours drawing vibrant dinosaurs while humming tunes from Disney’s “Moana”, can recite the entire theme song of “Cocomelon” in perfect rhythm, and
    they love performing impromptu dances for delighted parents during family gatherings.
  travel: A curious globe‑trotter in training, Jerry Mitchell’s most treasured journeys include a family road trip to the Grand Canyon, a splashy weekend at Disney World’s Magic Kingdom, and a pretend voyage
    to Paris via storybooks and a play‑kitchen passport, and they prefer trips that blend hands‑on exploration with familiar faces and the comfort of home‑cooked meals.
  culinary: A budding food enthusiast, Jerry Mitchell loves the cheesy comfort of macaroni and cheese, the crunchy sweetness of apple slices with peanut butter, insists on stirring the batter for chocolate
    cupcakes, yet stubbornly refuses broccoli, claiming the green trees are “yucky”, and they delight in sharing snack plates with friends during playdates.
  core: Jerry Mitchell is a four‑year‑old whirlwind of curiosity, practical play, and social energy, who balances meticulous toy‑building with spontaneous sticker trades, occasional health hiccups, and
    a passionate love for soccer, music, and sweet treats.
background:
  cultural: Jerry is raised in a white, Midwestern family in Colony, Kansas, a small rural community with close‑knit neighborhood ties. His family participates in typical local traditions such as community
    picnics, county fair events, and church‑based activities, where he attends Sunday school and seasonal celebrations. The surrounding agricultural landscape and seasonal outdoor life shape his appreciation
    for nature and community cooperation, while the values of self‑reliance, friendliness, and modest practicality common to the region influence his upbringing.
