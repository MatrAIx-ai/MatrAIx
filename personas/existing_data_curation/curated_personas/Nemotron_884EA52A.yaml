  hobbies: '[''Building with Duplo blocks'', ''Drawing and coloring'', ''Singing and dancing'', ''Outdoor playground games (tag, hide‑and‑seek)'', ''Nature exploration (bugs, leaves, rocks)'', ''Storytime
    and picture books'', ''Simple puzzles'']'
  career_goals: Even at four, Jerry imagines future roles that combine his curiosity and practicality. He loves hearing stories about teachers and firefighters, and often says he wants to "help people".
    He aims to learn to read confidently, enjoys building things, and dreams of becoming a teacher, a builder or an engineer, or a community helper like a firefighter, reflecting his desire to contribute
    and explore how things work.
