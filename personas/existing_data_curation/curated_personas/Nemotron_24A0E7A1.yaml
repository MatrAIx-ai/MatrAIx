personas:
  professional: Jodi Johnson, an 82‑year‑old senior community coordinator and volunteer historian, they combine their knack for organizing lively tea‑and‑conversation circles with a sharp bridge strategy
    and emerging digital photography skills, turning curiosity into practical projects that preserve local stories while keeping the room buzzing with their talkative, competitive energy.
  sports: Jodi Johnson stays active by hiking sections of the Appalachian Trail and joining a senior walkers club while cheering on the Atlanta Braves, the Clemson Tigers, and the Greenville Drive, they
    treat weekly bridge tournaments as mental workouts, yet they avoid high‑impact sports, favoring low‑impact gardening and occasional senior bowling league matches for physical activity.
  arts: Jodi Johnson expresses herself through quilting heirloom blankets and storytelling at the Oconee County Historical Society, they regularly listen to bluegrass legends like Bill Monroe and contemporary
    country icons such as Dolly Parton, and they admire folk painter Grandma Moses, often attending local craft fairs featuring artisans from the Asheville Folk Art Guild.
  travel: Jodi Johnson prefers relaxed, family‑oriented trips that blend history and nature, having toured historic Charleston, taken a scenic drive along the Blue Ridge Parkway, and explored the Smithsonian
    museums in Washington, DC, they dream of a gentle pilgrimage to Gettysburg to trace ancestors, yet they usually plan outings around the senior center calendar and a modest travel budget.
  culinary: Jodi Johnson, a seasoned Southern baker, they expertly prepare peach cobbler, buttermilk biscuits, and collard greens seasoned with garden‑grown thyme and sage, and they love hosting tea‑and‑conversation
    circles where they serve homemade sweet tea brewed with fresh mint, while occasionally experimenting with a dash of cayenne in classic cornbread for a surprising kick.
  core: Jodi Johnson, an 82‑year‑old community storyteller, they blend relentless curiosity with pragmatic competitiveness, turning tea circles, bridge games, and digital photography into vibrant threads
    of local heritage.
background:
  cultural: Jodi was born and raised in Seneca, South Carolina, a small town in the foothills of the Blue Ridge Mountains. Her upbringing reflects the traditional Southern culture of the Upstate region—strong
    family ties, deep involvement in the local Methodist church, and a reverence for community hospitality. She grew up hearing stories of the region’s textile mills and mountain farming, and she carries
    forward those values through her cooking, quilting, and storytelling. The cultural mix of Southern hospitality, a respect for historical continuity, and an emerging openness to technology shapes her
    worldview, allowing her to blend old‑world traditions with new ideas in everyday life.
