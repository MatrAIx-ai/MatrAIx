  hobbies: '[''Hosting tea-and-conversation circles'', ''Bridge club participation'', ''Storytelling at historical society'', ''Vegetable and herb gardening'', ''Southern baking and cooking'', ''Quilting'',
    ''Church choir singing'', ''Listening to bluegrass and country music'', ''Hiking Appalachian trails'', ''Genealogical research'']'
  career_goals: Jodi’s primary ambition is to leave a lasting, tangible record of her family’s stories and the community’s heritage. She plans to complete a memoir that blends personal anecdotes with genealogical
    findings, and to publish a small collection of cherished Southern recipes with accompanying photographs she will capture using her new digital skills. She also hopes to continue mentoring younger volunteers
    at the senior center, to remain an active hub of social interaction, and to stay physically healthy enough to attend church services and family gatherings. While realistic about her age, she remains
    curious about learning basic video editing to create a short documentary of local history.
