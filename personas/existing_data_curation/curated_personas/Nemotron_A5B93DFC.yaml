  career_goals: Javier aims to transition into a senior technical leadership role where he can steer the development of sustainable launch technologies, such as reusable micro‑propulsion platforms and low‑emission
    rocket engines. He envisions leading an interdisciplinary innovation hub at his company that blends aerospace engineering with cutting‑edge materials science and AI‑driven design. Parallel to his corporate
    aspirations, Javier is committed to expanding STEM outreach within the Latino community in Los Angeles, establishing mentorship pipelines, and fostering greater representation of Mexican‑American engineers
    in the aerospace sector. Over the next five years, he hopes to publish influential research on green propulsion, earn recognition as a thought leader, and launch a community‑focused engineering academy.
