personas:
  professional: Javier Medina is a seasoned aerospace engineer specializing in propulsion systems, fluid dynamics, and structural analysis, who leverages their bilingual communication skills and collaborative,
    mentorship‑driven style to lead cross‑functional teams while embracing a relaxed, flexible approach that sometimes leads to last‑minute deadline crunches.
  sports: Javier Medina enjoys weekend hikes in the Santa Monica Mountains, participates in a local salsa dancing club that doubles as cardio exercise, follows the Los Angeles Lakers and LA Galaxy with
    fervor, and maintains a flexible workout routine that prefers spontaneous outdoor activities over rigid gym schedules.
  arts: Javier Medina is an avid supporter of contemporary art, regularly attending gallery openings featuring artists like Kehinde Wiley and mural tours inspired by the works of Shepard Fairey, while also
    playing classical guitar repertoire ranging from traditional folk tunes to jazz standards by Wes Montgomery, and dancing salsa to performances by Celia Cruz and Marc Anthony.
  travel: Javier Medina favors flexible, experience‑driven travel, often planning spur‑of‑the‑moment road trips along the Pacific Coast Highway, revisiting the vibrant markets of Oaxaca and the historic
    plazas of Guanajuato, while also dreaming of stargazing in Chile’s Atacama Desert and exploring the contemporary art scene in Berlin.
  culinary: Javier Medina loves experimenting with regional dishes such as cochinita pibil, mole negro, and tacos de camarón, skillfully preparing them in a well‑stocked home kitchen while also sampling
    street‑food tacos al pastor and ramen bowls at Los Angeles’s Grand Central Market, showcasing a balanced palate that blends deep‑rooted flavors with global cuisines.
  core: Javier Medina blends a curiosity for science and art with a sociable, talkative nature, often juggling multiple projects and spontaneous creative pursuits while occasionally misplacing tools and
    forgetting minor appointments.
background:
  cultural: Rooted in a Mexican heritage, Javier grew up in a bilingual household where family gatherings, music, and storytelling were central. He celebrates traditions such as Día de los Muertos and Semana
    Santa, often weaving these cultural moments into his social life in Los Angeles. The values of community, respect for elders, and collective responsibility inform his collaborative work style and his
    commitment to mentorship. Javier’s Mexican identity also fuels his pride in representing Latino engineers in a predominantly non‑Latino industry, and he actively participates in cultural exchange events
    that highlight Mexican contributions to science and the arts.
