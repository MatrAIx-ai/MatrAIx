persona_description: A professional surveyor and 3-D laser scanner operator, who has extensive experience in capturing high-resolution, dimensionally accurate 3-D digital models of historical monuments,
  buildings, and ancient sites. The individual has a strong background in surveying, laser scanning, and point-cloud processing, and is skilled in using software tools such as Geomagic Studio to create
  highly accurate, 3-D digital polygon-mesh models of the individual stones and the surrounding landscape. The persona is dedicated to preserving and interpreting the history of these sites, and is passionate
  about using the latest technology to achieve this goal.
