  career_goals: Adrian dreams of becoming an astronaut who can explore distant planets, or a comic‑book artist who creates vivid worlds for others to imagine. He also imagines designing his own video games
    and building robots that solve puzzles. He is eager to win school science fairs and art contests, seeing these achievements as stepping stones toward a future where he can blend art, storytelling, and
    scientific discovery.
