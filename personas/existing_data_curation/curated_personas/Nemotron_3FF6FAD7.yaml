personas:
  professional: Adrian Rivas is a budding junior illustrator and imaginative storyteller who transforms fantastical creature sketches into storyboard ideas, leveraging a natural curiosity and balanced discipline
    to keep their art supplies organized while daringly experimenting with abstract concepts.
  sports: Adrian Rivas is a spirited soccer enthusiast who plays in the neighborhood under-8 league, emulating the style of LA Galaxy's star striker, and also cheers for the Los Angeles Lakers when off
    the field, balancing fierce competition on the pitch with a playful attitude that can lead to heated debates over fair play.
  arts: Adrian Rivas is a creative thunderbolt who devours the Magic Tree House adventures by Mary Pope Osborne, sketches creatures inspired by Hayao Miyazaki's Studio Ghibli films, and hums along to the
    whimsical tunes of Pixar's Toy Story soundtrack, letting those influences shape their own fantastical narratives.
  travel: Adrian Rivas plans travel like a mini explorer, recalling vivid hikes in the Grand Canyon and a magical weekend at Disney World, dreaming of sailing the canals of Venice and trekking the ancient
    ruins of Machu Picchu, yet always requires a parent's itinerary schedule and a packed snack list.
  culinary: Adrian Rivas enthusiastically helps slice fresh cilantro, mash ripe avocados for guacamole, and assemble crispy cheese quesadillas and beef tacos, often insisting on adding extra salsa and a
    sprinkling of lime, while also delighting in pepperoni pizza slices and the occasional chocolate chip cookie.
  core: Adrian Rivas is a fiercely imaginative seven-year-old who blends a competitive spark with thoughtful curiosity, turning every puzzle, notebook, and backyard discovery into a chance to out-think,
    out-draw, and out-play the world around them.
background:
  cultural: Adrian comes from a Mexican‑American family in Pacific Palisades. He grows up speaking both Spanish and English, celebrating traditions such as Día de los Muertos and Las Posadas with his extended
    family. The home is filled with Mexican music, colorful artwork, and the aromas of tacos and tamales, fostering his appreciation for vibrant colors and flavors. Living in a diverse Los Angeles suburb,
    he also participates in community events and school activities that reflect a blend of Mexican heritage and broader American culture, giving him a unique multicultural perspective.
