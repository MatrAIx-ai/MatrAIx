personas:
  professional: Joseph Hyde, a 56‑year‑old retired handyman turned side‑business owner, leverages his methodical repair skills, budget‑savvy from college business courses, and a competitive drive from local
    car shows to launch a reliable handyman service while studying for residential building‑inspector certification.
  sports: Joseph Hyde spends his weekends fishing at Perry Lake with the Leavenworth Senior Fishing Club, supports the Kansas City Chiefs and Royals with the same competitive spirit he applies to his car
    restorations, and maintains a modest fitness routine by walking the local veterans’ support group’s weekly circuit in his neighborhood.
  arts: Joseph Hyde finds creative solace in reading Civil War histories, listening to the folk‑rock sounds of John Denver and the classic country twang of Johnny Cash, and volunteering at the Leavenworth
    Historical Society, where he helps curate exhibits featuring Grant Wood’s Americana paintings.
  travel: Joseph Hyde prefers road‑trip adventures in his restored 1965 Chevrolet, planning meticulous itineraries that include stops at historic sites like Gettysburg, a weekend hike in the Badlands, and
    a culinary pilgrimage to Kansas City’s renowned barbecue joints, all while keeping travel costs within his carefully saved budget.
  culinary: Joseph Hyde enjoys cooking hearty Midwestern fare such as chicken and dumplings, cornbread with a dash of brown sugar, and Kansas City BBQ ribs, often harvesting fresh tomatoes and sweet corn
    from his garden to add to his recipes, and he prides himself on mastering the cast‑iron skillet for perfect sears.
  core: Joseph Hyde, a 56‑year‑old stickler for routine, blends his hands‑on craftsmanship, meticulous budgeting, and quiet competitive streak into a modestly ambitious life tempered by occasional worry
    and a love for tinkering.
background:
  cultural: Joseph grew up in a small town in Kansas and has spent most of his adult life in the Leavenworth area of Wyandotte County. He identifies with the Midwestern white working‑class culture that
    values practicality, self‑reliance, and community service. Raised in a Protestant (Methodist) family, he regularly observes traditional holidays and community gatherings. The presence of the U.S. Army
    installation and the federal prison in Leavenworth has contributed to a community that respects order and routine, resonating with his personal preferences. He maintains ties to local heritage through
    participation in the Leavenworth Historical Society and through family traditions that emphasize loyalty, hard work, and modest ambition.
