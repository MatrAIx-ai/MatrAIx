personas:
  professional: Mark Bartlett is a seasoned wholesale and manufacturing sales strategist who leverages three decades of experience, a humanities‑rooted storytelling flair, and a methodical, data‑driven
    mindset to craft compelling proposals, negotiate complex contracts, and lead cross‑functional teams, while their curiosity and occasional stress‑induced perfectionism push them to continually refine
    their sales narratives and mentor junior reps.
  sports: Mark Bartlett is a devoted fan of the Nashville Predators and the Tennessee Titans who stays active by playing weekly tennis at the Belle Meade Tennis Club, hiking the Great Smoky Mountains each
    fall, and attending a Saturday morning yoga class at their local YMCA to manage stress and maintain joint health.
  arts: Mark Bartlett immerses themselves in the arts by regularly attending live jazz sets featuring John Coltrane tributes at The Bluebird Café, country‑folk shows by Emmylou Harris at The Station Inn,
    and by studying the paintings of Georgia O'Keeffe and the photography of Annie Leibovitz, which inspire their own amateur photography and vintage furniture restoration projects.
  travel: Mark Bartlett plans their travel with the meticulousness of their sales forecasts, favoring well‑researched road trips to the Great Smoky Mountains and weekend getaways in Asheville and New Orleans
    for music and scenery, while also dreaming of an art‑focused pilgrimage to Florence, Italy, where they hope to photograph Renaissance architecture and sample Tuscan cuisine.
  culinary: Mark Bartlett enjoys Southern comfort food, frequently cooking Nashville hot chicken with a smoky paprika rub, shrimp and grits seasoned with fresh thyme and lemon zest, and a bourbon‑glazed
    brisket that showcases their growing confidence in the kitchen, while they also relishes dining out at local farm‑to‑table restaurants that serve dishes like beet‑root salad with goat cheese and candied
    pecans.
  core: Mark Bartlett blends methodical precision with a restless curiosity, channeling their love for art, music, and storytelling into a career and lifestyle where meticulous planning coexists with occasional
    stress‑driven overthinking and a penchant for vintage furniture restoration.
background:
  cultural: Mark grew up in a middle‑class family in the suburbs of Cincinnati, Ohio. His parents were high school teachers who emphasized a love for literature, history, and the arts, inspiring his humanities
    degree at a liberal arts college. After college, he relocated to Nashville in his late twenties to pursue a career in manufacturing sales. Over the years, he has embraced Southern hospitality, regional
    cuisine, and the city’s rich musical heritage while retaining his Midwestern work ethic and emphasis on education. He identifies with a cultural blend that values community gatherings, appreciation
    for country and blues music, and a lifelong curiosity about art and new ideas.
attributes:
  skills: '[''Strategic sales planning'', ''Negotiation and contract management'', ''Client relationship building'', ''Technical product translation'', ''CRM (Salesforce, HubSpot)'', ''Data analysis (Excel,
    Power BI)'', ''Market research'', ''Team leadership and training'', ''Artistic design integration'', ''Cross‑functional coordination'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending live music performances (jazz, country‑folk)'', ''Photography (architectural and landscape)'', ''Reading historical nonfiction and literary
    fiction'', ''Chess club participation'', ''Woodworking and vintage furniture restoration'', ''Volunteer mentoring in community arts program'', ''Hiking in the Great Smoky Mountains'']'
  career_goals: Mark aims to move into a senior regional sales manager role within the next two to three years, overseeing a larger territory and a team of representatives. He plans to develop a niche portfolio
    focused on custom‑designed manufacturing solutions that blend functionality with aesthetic appeal, leveraging his art appreciation. He also seeks to become a sales trainer, sharing his methodical approach
    and storytelling techniques with newer staff. Long‑term, Mark envisions transitioning to a consulting practice that helps manufacturing firms incorporate design thinking into their product lines, and
    eventually establishing a boutique consultancy serving art‑focused retailers. Alongside professional aspirations, he is focused on securing a comfortable financial future for his family and preparing
    for an early retirement around age 60.
