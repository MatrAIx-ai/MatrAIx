  career_goals: Even at her young age, Teresita enjoys imaginative role‑play. She often pretends to be a teacher who sings lullabies to baby dolls and a dancer who twirls to upbeat Latin rhythms. She expresses
    a desire to help others feel happy and to move freely, hinting at whimsical ambitions of becoming a caring educator or a joyful performer in the future.
