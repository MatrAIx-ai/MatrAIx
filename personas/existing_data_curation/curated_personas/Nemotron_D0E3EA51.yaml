personas:
  professional: Teresita Singh, a two‑year‑old in a preschool environment, approaches early learning with a blend of love for predictable routines—like nap time and snack schedule—and sudden bursts of imaginative
    play, making them a curious and adaptable junior explorer of language and motor skills.
  sports: Teresita Singh, a two‑year‑old who loves toddling around the community playground, participates in a local Mommy‑and‑Me soccer clinic, cheerfully waves at the city's minor league baseball team
    during games, and enjoys the rhythmic movement of a kids' gymnastics class, preferring small groups to large crowds.
  arts: Teresita Singh, a two‑year‑old who delights in finger‑painting bright colors, humming the melodies of Disney's Frozen soundtrack and Raffi's Baby Beluga, and watching animated shorts by Pixar, finds
    artistic expression a soothing outlet for intense emotions, often sharing a cherished stuffed rabbit as a muse.
  travel: Teresita Singh, a two‑year‑old who thrives on short family road trips to the nearby zoo and beach, has already visited Disneyland during a summer vacation, loves the sensory excitement of train
    rides, and dreams of a future visit to the Grand Canyon, though every journey requires a stroller and a familiar caregiver's hand.
  culinary: Teresita Singh, a two‑year‑old with a picky palate, prefers soft macaroni‑and‑cheese, banana slices, and chicken nuggets, delights in sprinkling shredded cheese over everything, and frequently
    engages in messy self‑feedings that leave a trail of food on the floor, while occasionally refusing vegetables with a stubborn pout.
  core: Teresita Singh, a two‑year‑old who balances a love for predictable routines with sudden bursts of spontaneous play, navigates the world with gentle kindness, intense emotional reactions, and endearing
    quirks like hoarding crayons.
background:
  cultural: Teresita grows up in a Venezuelan‑American household in Fort Lauderdale, where Spanish is spoken at home and English at school and in the community. Family traditions include celebrating Carnaval
    with music and colorful costumes, preparing hallacas and arepas for holidays, and sharing stories of Venezuelan folklore. She participates in local community events that highlight Latin dance and cuisine,
    and her parents integrate cultural values of warmth, community, and respect for elders into daily life, shaping her gentle and cooperative demeanor.
