  career_goals: Clive aims to move beyond entry‑level sales into a role that blends his love for art and commerce, such as visual merchandising or brand strategy for a boutique lifestyle brand. He hopes
    to design immersive retail experiences that integrate storytelling, art installations, and digital interactivity. In the longer term, he aspires to launch an independent online shop featuring curated
    artistic products and locally sourced Kentucky crafts, emphasizing sustainable sourcing and community collaboration while maintaining the flexibility he values.
