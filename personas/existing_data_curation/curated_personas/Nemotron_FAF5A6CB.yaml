personas:
  professional: Clive Rich is a 19‑year‑old retail sales associate in Lexington who leverages their knack for persuasive storytelling and basic design skills to craft compelling product narratives, while
    dreaming of transitioning into visual merchandising roles that blend art installations and digital interactivity for boutique lifestyle brands.
  sports: Clive Rich prefers solitary hikes through the rolling Bluegrass fields and occasional jogs with the Lexington Trail Runners club, while cheering for the Kentucky Wildcats basketball team and attending
    the annual Keeneland horse races for a touch of local tradition.
  arts: Clive Rich spends weekends wandering the Lexington Art League gallery, sketching cityscapes, and curating digital illustrations inspired by avant‑garde indie music groups like Animal Collective
    and visual artists such as Yayoi Kusama, which feed their experimental literary taste.
  travel: Clive Rich favors low‑key road trips to nearby bourbon distilleries and historic horse farms, but also dreams of a design‑focused pilgrimage to Amsterdam’s Van Gogh Museum and a quiet retreat
    in Kyoto’s zen gardens, always planning itineraries on a whim with a basic spreadsheet.
  culinary: Clive Rich enjoys cooking comfort dishes like bourbon‑glazed chicken and peach cobbler with locally sourced ingredients, while also experimenting with edamame ramen and charcuterie boards, and
    often pairs meals with craft beers from local breweries.
  core: Clive Rich is a curious, solitary 19‑year‑old who balances a relaxed, slightly disorganized lifestyle with a deep appreciation for art, design, and Southern‑rooted community values, all while dreaming
    of turning creative impulses into a boutique brand.
background:
  cultural: Clive was raised in a middle‑class, white family in Lexington, Kentucky. His upbringing combined traditional Southern hospitality and the horse‑country heritage of the Bluegrass region with
    exposure to the city’s growing arts scene through community programs and college courses. Family values emphasized modesty, community support, and an appreciation for both nature and the arts. This
    blend of Midwestern pragmatism, Southern cultural touchstones, and progressive artistic influences shapes his curiosity, his preference for quiet, reflective spaces, and his collaborative yet introspective
    outlook.
