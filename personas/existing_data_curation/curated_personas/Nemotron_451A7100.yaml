    walks'', ''Watching local high school sports'', ''Cooking traditional Midwestern meals'']'
  career_goals: Colleen aims to deepen her clinical knowledge and take the next step in her nursing career. She plans to enroll in a community college program to earn a Certified Nursing Assistant (CNA)
    certification if she hasn't already, and eventually pursue an Associate Degree in Nursing (ADN) to become a Licensed Practical Nurse (LPN). Over the next five years, she hopes to move into a supervisory
    or charge‑nurse role within her current facility, overseeing a team of assistants and contributing to quality‑improvement initiatives. She also aspires to lead community health outreach programs for
    seniors in Mason County, reflecting her commitment to compassionate care and local service.
