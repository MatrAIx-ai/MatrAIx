personas:
  professional: Colleen Dove, a seasoned nursing assistant with a meticulous eye for protocol, leverages her organized nature to excel at documentation, medication scheduling, and training newcomers, and
    they are now pursuing CNA certification and a future supervisory role that blends patient advocacy with quality‑improvement projects in Mason County.
  sports: Colleen Dove enjoys cheering on the Mason County High School Panthers during Friday night football, follows the Chicago Cubs religiously, and they supplement this fandom with weekly 5‑mile lakeshore
    walks with the local senior walking group, keeping fit without the pressure of organized sports.
  arts: Colleen Dove weaves stories into quilts inspired by the colors of their garden while they listen to Bob Dylan and The Chicks during knitting sessions, discuss practical nonfiction by Atul Gawande
    and Michael Pollan at the book club, and occasionally catch performances at the Mason County Community Playhouse.
  travel: Colleen Dove plans meticulously for weekend getaways, favoring scenic drives to Door County’s cherry orchards and the historic charm of Mackinac Island, and they balance these trips with a modest
    travel budget by staying at family‑run B&Bs and prioritizing visits to local farmer’s markets.
  culinary: Colleen Dove cooks hearty Midwest staples like chicken pot pie, cornbread, and beef stew, frequently incorporates garden harvests of tomatoes and sweet corn into meals, and they excel at canning
    pickled cucumbers, beets, and homemade jam, treating the kitchen as an extension of their orderly garden.
  core: Colleen Dove blends disciplined organization with creative hands‑on pursuits, turning routine nursing duties, garden calendars, and quilting patterns into a life where predictability fuels personal
    expression and community service, and they thrive on the balance between structure and spontaneity.
background:
  cultural: Colleen grew up in a small town in Michigan, rooted in a Midwestern white, working‑class heritage with German‑Irish ancestry. Her family emphasized hard work, reliability, and community involvement,
    values that have shaped her practical outlook and organized lifestyle. She identifies with the region’s modest, friendly culture, participating in local traditions such as county fairs, church potlucks,
    and seasonal celebrations. The close‑knit nature of Custer and Mason County reinforces her sense of responsibility toward neighbors and seniors, informing both her professional dedication as a nursing
    assistant and her volunteer activities.
