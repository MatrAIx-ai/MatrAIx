personas:
  professional: Fernando Sawal, a 16‑year‑old aspiring automotive technician, leverages bilingual fluency and a knack for fixing skateboards, bikes, and Arduino projects to help friends while eyeing a community‑college
    ASE certification and a future workshop that serves immigrant families.
  sports: Fernando Sawal catches waves at Ventura’s Surfer’s Point when the swell is right, spends afternoons at the local skate park with the Ventura Skate Crew, and roots for the Los Angeles Dodgers,
    Lakers, and Rams while occasionally joining beach volleyball pick‑ups.
  arts: Fernando Sawal blends mechanical sketches with sunset photography, crafts digital posters on Canva and GIMP, and fills playlists with reggaeton star J Balvin, vallenato legend Carlos Vives, and
    pop icon Taylor Swift, shaping an aesthetic that fuses tech and rhythm.
  travel: Fernando Sawal prefers spontaneous weekend getaways, often hopping on a bus to Santa Barbara’s pier or taking a short road trip to the Redwood forests, while dreaming of a backpacking adventure
    through the Andes after graduation.
  culinary: Fernando Sawal finds comfort in whipping up family‑style arepas, empanadas stuffed with cheese and meat, and hearty sancocho featuring yucca, plantain, and corn, showcasing an intermediate cooking
    skill that mixes tradition with experimental seasoning.
  core: Fernando Sawal is a curious, hands‑on teen whose love for surf, skate, and tinkering drives community‑focused ambitions, even as their spontaneous nature and chronic disorganization keep life delightfully
    unpredictable.
background:
  cultural: Fernando was raised in a Colombian immigrant household in Ventura, California. His parents emigrated from Bogotá, bringing with them strong family values, a love for traditional cuisine, and
    a deep appreciation for Colombian music and celebrations. At home, Spanish is spoken daily, and family gatherings often feature Colombian dishes, salsa dancing, and stories about life in Colombia. Growing
    up in Ventura, Fernando also absorbs the coastal lifestyle—surfing, beach outings, and a multicultural community. He participates in the local Colombian cultural center's events, such as small gatherings
    for Día de la Independencia, which blend his heritage with his Californian surroundings. This bicultural upbringing shapes his bilingual communication skills, his respect for community harmony, and
    his desire to give back to both his Colombian and broader Ventura communities.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Basic computer troubleshooting'', ''Arduino DIY electronics'', ''Bicycle and skateboard repair'', ''Graphic design using Canva/GIMP'', ''Creative
