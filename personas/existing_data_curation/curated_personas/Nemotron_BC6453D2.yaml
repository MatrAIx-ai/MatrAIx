  hobbies: '[''Surfing at Ventura beach'', ''Skateboarding at local park'', ''Playing strategy and puzzle video games'', ''DIY electronics projects with Arduino'', ''Cooking Colombian dishes such as arepas,
    empanadas, and sancocho'', ''Listening to reggaeton, vallenato, and contemporary pop music'', ''Drawing mechanical sketches'', ''Photography of Ventura sunsets'']'
  career_goals: Fernando plans to complete his high school education through a GED within the next year, then enroll in a community‑college automotive technology program to earn an ASE certification. In
    the short term, he hopes to secure an apprenticeship at a local garage in Ventura where he can apply his mechanical aptitude. Long‑term, he dreams of opening his own small workshop that offers affordable
    vehicle and bike repairs, especially catering to fellow immigrant families. He also wants to launch a bilingual YouTube channel that provides simple tech‑repair tutorials and basic electronics projects,
    merging his curiosity with practical help for his community.
