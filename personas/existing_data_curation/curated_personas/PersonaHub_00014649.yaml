persona_description: A public health researcher who specializes in the study of blood disorders, particularly Sickle Cell Disease (SCD). Their research interests include the natural course of SCD, its variability
  in clinical manifestations, and the impact of limited access to comprehensive care, treatment options, and surveillance systems. They have experience managing a state-wide, population-based surveillance
  system for SCD and have played a role in the opening of new SCD clinics, educating health care providers, and enhancing federally-funded activities across HHS. Their expertise and experience in managing
  and analyzing data related to SCD will be invaluable in the implementation of a state-wide SCD surveillance system.
