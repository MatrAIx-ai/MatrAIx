  career_goals: Yvonne aims to continue being the reliable backbone of her organization while gradually shifting toward mentorship and knowledge‑sharing. She hopes to develop a training program for new
    administrative staff, serve as a senior administrative advisor, and leverage her experience to improve workplace efficiency. Over the next few years, she plans to balance her professional responsibilities
    with increased involvement in community outreach, eventually transitioning to a part‑time role that combines administrative consulting with volunteer coordination for local senior programs.
