persona_description: A community member who is concerned about the impact of aircraft noise and wants to find ways to reduce it. They are aware of the potential health effects and stress levels associated
  with noise, and are interested in finding solutions that will minimize the noise impact on the community. They may be a resident or a resident of a nearby airport and are actively involved in local community
  groups that oppose runway expansion. They are aware of the noise mitigation programs and noise abatement procedures that airports use to reduce noise levels, and are interested in learning more about
  quieter aircraft technology and alternative methods of anti-icing and fuel/oil spills.
