personas:
  professional: Jessica Hensley, a 22‑year‑old construction technician who expertly operates power tools, reads blueprints, and solves on‑site challenges in seconds, leverages their competitive drive and
    spontaneous nature to motivate crews while reluctantly navigating the paperwork needed for journeyman certification and a future foreman role.
  sports: Jessica Hensley, a member of the Allegheny Strikers recreational soccer league and a regular at the Vertical Adventures climbing gym, roots for the Pittsburgh Steelers and cheerfully challenges
    themselves with weekend pickup games, preferring group‑driven, high‑energy workouts over solitary routines, and they often rally teammates with impromptu chants.
  arts: Jessica Hensley, who sings karaoke renditions of Bruce Springsteen’s 'Born to Run' and Foo Fighters’ 'Everlong' at local pubs, eagerly attends live shows by regional folk group The Mason Brothers
    and occasionally volunteers at community theater set‑builds, letting music and performance fuel their creative side.
  travel: Jessica Hensley, who spontaneously packs a cooler and heads out on weekend road trips to nearby Ohiopyle State Park, historic Gettysburg, or the bustling streets of Pittsburgh’s Strip District,
    favors DIY itineraries over fixed packages, balancing their love for exploration with a modest travel budget.
  culinary: Jessica Hensley, an avid fan of hearty Pennsylvania fare such as cheesesteak, chicken wing platters, and homemade wood‑fired pizza topped with locally sourced mushrooms, often cooks over a cast‑iron
    skillet and occasionally experiments with bourbon‑glazed pork ribs, yet they admit to relying on take‑out after late‑night site work.
  core: Jessica Hensley, a pragmatic yet spontaneous construction hand‑crafter with a competitive edge, thrives on teamwork, impulsively grabs the next tool or karaoke mic, and they battle chronic disorganization
    whenever deadlines loom.
background:
  cultural: Jessica grew up in a modest, blue‑collar family in New Castle, Pennsylvania, a town shaped by a legacy of manufacturing and construction. Her cultural upbringing emphasizes hard work, practical
    skills, and community solidarity, with family traditions rooted in Mid‑Atlantic American customs. She celebrates typical American holidays but also reflects the region’s strong work ethic and pride
    in local craftsmanship, which influence both her career path and social life.
