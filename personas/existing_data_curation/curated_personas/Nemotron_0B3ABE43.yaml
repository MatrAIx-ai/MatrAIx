  career_goals: Jessica aims to climb the construction ladder by earning a journeyman certification within the next two years and completing an OSHA 30‑hour safety course. She aspires to become a foreman
    or project supervisor, leveraging her competitive drive to lead crews efficiently. In the longer term, she dreams of launching her own boutique renovation business focused on sustainable, community‑centered
    projects, and plans to take night classes in construction management to prepare for that transition.
