  hobbies: '[''Watching Cincinnati Bengals games'', ''Video gaming (strategy games)'', ''Model kit building'', ''Jogging'', ''Church attendance'', ''Volunteer work at local food bank'', ''Journaling'',
    ''Listening to R&B and gospel music'', ''Reading self‑help books'']'
  career_goals: Tevin aims to secure a stable, full‑time position in a structured environment such as logistics, manufacturing, or facilities maintenance, where his reliability and routine‑focused skills
    are valued. He plans to obtain his GED within the next year, followed by certifications like forklift operation and basic HVAC maintenance to increase his employability. His long‑term ambition is to
    advance to a supervisory role that allows him to mentor others while maintaining a predictable schedule and steady income, reducing his current financial stress.
