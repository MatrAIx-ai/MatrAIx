personas:
  professional: Jorge Cana, a one-year-old, treats the living-room floor like a mini laboratory, stacking wooden blocks and pressing buttons on toy gadgets with a natural curiosity that hints at a future
    in design engineering, while their relaxed, flexible approach lets them explore without needing strict schedules.
  sports: Jorge Cana, a toddler, enjoys weekly baby swim sessions at the local recreation center, delights in crawling through the indoor play area of 'Little Movers' gym, and often watches the Minnesota
    Vikings games while nestled on a parent's lap, cheerfully waving a tiny foam helmet as a sign of early team spirit.
  arts: Jorge Cana, a one-year-old, is mesmerized by the vibrant papel picado swaying from the ceiling and claps along to folk melodies from the family radio, occasionally humming the gentle tunes of Raffi
    while scribbling bold strokes with chunky crayons, showing an early love for color, sound, and tactile creativity.
  travel: Jorge Cana, at one year old, loves short family road trips to the cabin by Lake Superior where they splash in shallow water, recently delighted in the bright lights of the Dallas holiday festival,
    and dreams, through storybooks, of experiencing the snowy streets of Quebec when they are older.
  culinary: Jorge Cana, a curious one-year-old, relishes soft tamales with mild spices, mashed sweet potatoes sprinkled with cinnamon, and small avocado cubes, often reaching for the shiny silver spoon
    while occasionally refusing broccoli, reflecting a budding adventurous palate tempered by typical toddler picky-eating habits.
  core: Jorge Cana, a calm and curious one-year-old, balances a love for bright colors, gentle folk tunes, and the tactile thrill of rolling coins, navigating each day with relaxed resilience and a hint
    of adorable disorganization.
background:
  cultural: Jorge is raised in a bilingual Mexican household in Minneapolis, Minnesota. At home, Spanish is spoken alongside English, and family traditions such as celebrating Día de los Muertos, preparing
    tamales, and sharing Mexican folk music are woven into everyday life. His parents incorporate Mexican art motifs like vibrant colors and papel picado in the home décor, fostering his early appreciation
    for visual aesthetics. Living in Minneapolis, Jorge also experiences Midwestern customs, cold winters, and the city's multicultural community, which offers exposure to diverse cultural festivals and
    public art. This blend of Mexican heritage and Midwestern environment shapes his worldview, enriching his curiosity, openness to new ideas, and collaborative spirit.
