  hobbies: '[''Watercolor painting of island scenes'', ''Charcoal sketching of wildlife'', ''Canoe fishing and nature photography'', ''Organic gardening with heirloom varieties'', ''Visiting art museums
    in Detroit'', ''Reading biographies of African‑American artists'', ''Listening to jazz and blues'', ''Philosophy and unconventional ideas reading'', ''Woodworking with reclaimed driftwood'']'
  career_goals: Travon aspires to channel his curiosity and community spirit into meaningful volunteer work. He aims to curate a modest rotating gallery of island‑inspired artwork at the Harsens Island
    community center, where he can also lead occasional art‑making workshops for local youth. He hopes to partner with the county historical society to digitize oral histories of long‑time residents, preserving
    them for future generations. Writing a memoir that weaves together his personal narrative, African‑American heritage, and the unique island lifestyle is another long‑term ambition. Though he is not
    seeking paid employment, Travon wants to remain an active contributor, using his skills to foster cultural appreciation and environmental stewardship on the island.
