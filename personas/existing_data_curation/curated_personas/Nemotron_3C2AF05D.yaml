  career_goals: Rachel aims to advance from first‑line supervisor to an Office Manager or Operations Manager role within the next three years, focusing on building a high‑functioning, low‑stress team. She
    plans to earn the Certified Administrative Professional (CAP) credential and lead a department‑wide digital transformation project that reduces paperwork by 30 %. Additionally, she hopes to mentor junior
    staff and eventually transition into a consulting role helping small businesses streamline their administrative processes, allowing her to balance career fulfillment with a gradual move toward semi‑retirement.
