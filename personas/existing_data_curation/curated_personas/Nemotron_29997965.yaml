  career_goals: Marta dreams of turning her love for animals and science into a future career as a veterinarian or marine biologist, where she can apply her curiosity to understand and protect living creatures.
    She also envisions herself as a community youth mentor, organizing flexible after‑school clubs that blend science experiments with cultural celebrations, allowing her to use her outgoing nature and
    practical problem‑solving skills. In the long term, she hopes to pursue a degree in environmental science, aiming to design projects that improve the quality of life in her border community.
