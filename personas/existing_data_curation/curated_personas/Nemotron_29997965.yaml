personas:
  professional: Marta Arias, a budding junior astrophysicist, channels her curiosity and practical mind into leading the school’s science club experiments, building LEGO rockets, and answering classmates’
    space questions while they juggle a delightfully disorganized schedule.
  sports: Marta Arias, a lively nine‑year‑old soccer enthusiast, scores goals on the neighborhood field after school, charges the sidelines with improvised game variations, and they cheer for El Paso Locomotive
    FC whenever they watch the weekend matches on TV.
  arts: Marta Arias, an imaginative comic‑strip creator, spends afternoons sketching heroic characters, dances to the rhythm of folk groups like Lila Downs at community workshops, and they can recite the
    lyrics of Los Tigres del Norte while drawing, letting music fuel their artistic flair.
  travel: Marta Arias dreams of weekend road trips to White Sands National Park and occasional family visits to San Miguel de Allende, balancing their love for adventure with a modest allowance that directs
    them to free‑entry museums and local festivals over costly overseas tours.
  culinary: Marta Arias, a kitchen helper with an emerging talent, loves rolling masa for sopes, sprinkling queso fresco on tamales, and mixing fresh mango salsa, while they also master the art of making
    perfect grilled cheese for their after‑school snack.
  core: Marta Arias mixes boundless curiosity with a delightfully messy schedule, turning soccer fields into labs, LEGO bricks into rockets, and family recipes into weekend art projects, all while they
    juggle an ever‑growing stash of candy wrappers and a missing inhaler.
background:
  cultural: Marta is a first‑generation Mexican‑American raised in El Paso, Texas. Her household is bilingual; Spanish is spoken at home while English dominates school and community interactions. She celebrates
    Mexican traditions such as Día de los Muertos and Cinco de Mayo, participating in family altar building, making papel picado, and sharing traditional foods like tamales and sopes. The vibrant mix of
    Mexican heritage and American culture shapes her identity, fostering a strong sense of family loyalty, community involvement, and pride in her bicultural roots. Growing up near the border, Marta is
    aware of both cultures' contributions to her daily life, from the music on the radio to the flavors on her plate.
