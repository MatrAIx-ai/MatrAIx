personas:
  professional: Ethel Ivory, a seasoned sales supervisor with a talent for building high‑performing inside‑sales teams, merges curiosity‑driven data analysis and agile frameworks to outpace quotas while
    maintaining a skeptical eye for hidden motives, and channels these competitive instincts toward a regional manager role that will champion a data‑driven, agile culture across multiple Deep South markets.
  sports: Ethel Ivory, an avid sports fan, loyally follows the Atlanta Falcons and Memphis Grizzlies, joins a local 5K walking club that meets at the city park on Saturday mornings, and occasionally competes
    in a community softball league, blending a competitive spirit with a love for regional team culture.
  arts: Ethel Ivory, a devoted arts enthusiast, weaves the soulful sounds of B.B. King and the improvisational genius of John Coltrane into her quilting sessions, devours mystery novels by Agatha Christie
    and historical sagas by Philippa Gregory, and regularly attends seasonal productions at the downtown theater, letting the rhythm of music and narrative shape her evenings.
  travel: Ethel Ivory, a spontaneous traveler, prefers impromptu weekend road trips that blend cultural immersion with culinary exploration, often heading to Charleston’s historic district, New Orleans
    for its jazz festivals, or the Great Smoky Mountains for hiking, while budgeting trips around the cost of family gatherings and their upcoming degree tuition.
  culinary: Ethel Ivory, a culinary explorer, delights in perfecting Southern‑style dishes such as shrimp and grits, fried catfish with hushpuppies, and pecan pie, experimenting with locally sourced collard
    greens, smoked paprika, and fresh‑picked herbs from their garden, while balancing a love for rich flavors with mindful portion control to manage cholesterol concerns.
  core: Ethel Ivory blends a competitive, data‑driven sales mindset with a love for solitary gardening, improvisational jazz, and spontaneous road trips, all while navigating the tension between curiosity
    and a resistance to rigid structures.
background:
  cultural: Ethel grew up in Jackson, Mississippi, in a close‑knit African‑American community where church, family, and music played central roles. Her upbringing blended the rich traditions of Southern
    Black culture—storytelling, soul food, and the legacy of the civil‑rights movement—with the pragmatic values of hard work and self‑reliance. She attended Jackson State University for several years before
    entering the workforce, maintaining strong ties to her extended family and local church. This cultural foundation informs her resilience, her competitive drive, and her commitment to uplifting other
    Black professionals in the corporate world.
attributes:
  skills: '["Sales strategy development", "Team leadership and coaching", "Performance metrics analysis", "CRM management (Salesforce)", "Negotiation", "Prospecting and lead qualification", "Conflict resolution",
    "Data analysis (Excel, Power BI)", "Agile sprint planning", "Cross‑functional communication", "Training facilitation"]'
  hobbies: '["Gardening", "Cooking Southern comfort food", "Reading mystery and historical fiction", "Listening to blues and jazz music", "Quilting", "Participating in a small book club", "Volunteer mentoring
    at a community center", "Exploring new technology gadgets", "Spontaneous weekend road trips"]'
  career_goals: Ethel aims to earn a Bachelor’s degree in Business Administration within the next three years, leveraging her curiosity for structured learning. Professionally, she aspires to move into
    a regional sales manager role, overseeing multiple markets across the Deep South. She wants to champion a data‑driven, agile sales culture that balances innovation with practical execution. Additionally,
    she hopes to mentor emerging Black women leaders in the sales field and eventually launch a consultancy that helps mid‑size companies redesign their sales processes for greater efficiency.
