  career_goals: Katia's future aspirations are still forming, but she already shows a budding desire to help others and explore the world. She enjoys copying caregivers in tasks like tidying up, hinting
    at an early interest in caregiving or community service. Visits to the local petting zoo spark fascination with animals, and she often pretends to be a veterinarian, suggesting a potential interest
    in science or healthcare. She sometimes declares she wants to be a "teacher" during storytime, reflecting her love for learning and sharing ideas. While she has no concrete career plans yet, her curiosity,
    practicality, and social orientation suggest she may gravitate toward roles that combine caring for others with hands‑on problem solving.
