  hobbies: '["Cooking and recipe experimentation", "Gardening", "Knitting and textile crafts", "Listening to gospel and Zydeco music", "Reading historical fiction", "Walking in nature", "Community bingo"]'
  career_goals: Although retired, Rachel aims to preserve her family's culinary legacy by compiling a handwritten cookbook of traditional recipes, mentor younger neighbors in quilting and gardening, document
    and archive the oral histories of Black residents in Vermilion Parish for future generations, and ensure her grandchildren inherit both cultural knowledge and practical life skills for financial independence.
