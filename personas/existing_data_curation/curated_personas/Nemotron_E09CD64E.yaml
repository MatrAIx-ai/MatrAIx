  hobbies: '[''Gardening'', ''Knitting'', ''Hiking'', ''Birdwatching'', ''Reading historical fiction'', ''Book club'', ''Volunteering at food pantry'', ''Community theater'', ''Cooking'', ''Mentoring'']'
  career_goals: Although retired from full‑time teaching, Vicki aims to channel her experience into community‑focused roles. She plans to mentor new teachers through a local education nonprofit, develop
    a neighborhood intergenerational garden that promotes healthy eating and social connection, and lead literacy workshops at the senior center. She also hopes to earn a volunteer facilitator certification
    so she can design and run small‑group workshops that foster harmony and mutual support within her community.
