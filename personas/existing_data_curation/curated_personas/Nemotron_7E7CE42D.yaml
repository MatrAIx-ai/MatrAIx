personas:
  professional: Donna Lindsey is a first‑line office supervisor who leverages her analytical Excel expertise and people‑management skills to streamline workflows while balancing a structured approach with
    the flexibility demanded by her team’s dynamic needs.
  sports: Donna Lindsey is a devoted fan of the New Orleans Saints and Pelicans, joins a weekend kayaking club on Bayou Lafourche, participates in a local adult softball league called the Bayou Belles,
    and practices weekly yoga to maintain flexibility, balancing competitive spirit with community camaraderie.
  arts: Donna Lindsey enjoys Zydeco music by Clifton Chenier, dances at the annual Cajun Festival, reads mystery novels by Tana French and Gillian Flynn in her book club, and occasionally attends performances
    by the Louisiana Symphony, weaving music and literature into her social life.
  travel: Donna Lindsey prefers road trips that blend relaxation and cultural immersion, often weekend‑driving down to the historic French Quarter of New Orleans, kayaking on the Atchafalaya, and dreaming
    of a spring visit to the lavender fields of Provence after saving for a family vacation.
  culinary: Donna Lindsey delights in cooking gumbo, jambalaya, and crawfish étouffée using home‑grown thyme and basil, perfects blackened catfish for potluck nights, but sometimes forgets to restock pantry
    staples because her grocery lists get lost amid event planning.
  core: Donna Lindsey balances a structured, analytical mind with a love for lively community gatherings, occasionally sacrificing personal downtime for potlucks and spreadsheets, yet remains resilient
    through yoga and a steadfast commitment to her Southern roots.
background:
  cultural: Donna grew up as a white Southern woman in Thibodaux, Louisiana, immersed in the unique blend of Cajun, Creole, and broader Southern traditions that characterize Terrebonne Parish. Her family
    celebrated both Catholic holidays and local festivals, fostering a strong sense of community and hospitality. The region’s emphasis on resilience—particularly around hurricane preparedness—shaped her
    practical, structured outlook, while the vibrant music, food, and dance scene nurtured her outgoing, sociable nature. She values the close‑knit relationships typical of small‑town Louisiana, and she
    often draws on these cultural roots in her work, emphasizing teamwork, mutual support, and a balance between tradition and flexibility.
attributes:
  skills: '[''Team leadership'', ''Office administration'', ''Microsoft Office Suite (Excel, Word, Outlook, Teams)'', ''Budgeting and expense tracking'', ''Schedule coordination'', ''Process improvement'',
