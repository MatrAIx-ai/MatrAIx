  hobbies: '[''Visiting contemporary art galleries'', ''Photography of urban and natural landscapes'', ''Reading art history and design theory'', ''Cooking traditional Mexican cuisine'', ''Hiking in the
    Front Range'', ''Playing chess at local cafes'', ''Curating personal illustration projects'', ''Collecting vintage design magazines'']'
  career_goals: Miguel aims to transition from senior graphic designer to creative director within a firm that values culturally informed branding, ultimately founding his own boutique studio that blends
    Mexican folk aesthetics with modern digital experiences. He is driven to mentor emerging designers through workshops and one‑on‑one coaching, publish a thought‑leadership piece on sustainable visual
    identity, and earn recognition as a go‑to expert for multicultural brand strategies in the Rocky Mountain region.
