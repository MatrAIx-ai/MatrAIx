  hobbies: '[''Visiting regional art galleries and museums'', ''Photography (landscape and candid portrait)'', ''Reading non‑fiction about psychology and art history'', ''Sketching and watercolor painting'',
    ''Weekend hikes and birdwatching around Lake Winnebago'', ''Gardening (vegetable and flower beds)'', ''Cooking with local ingredients, especially cheese dishes'', ''Board game nights with close friends
    and spouse'', ''Volunteering for community art projects and senior center activities'']'
  career_goals: Scott aims to deepen his clinical expertise while preserving the flexibility he values. He plans to obtain a Certified Nursing Assistant (CNA) credential if he does not already hold it,
    and subsequently pursue an LPN (Licensed Practical Nurse) certification to broaden his scope of practice. In parallel, he aspires to integrate his passion for art into his work by initiating small‑scale,
    art‑based therapeutic activities for patients, fostering a more holistic healing environment. Additionally, he hopes to become a mentor for new nursing assistants, promoting a cooperative and supportive
    workplace culture.
