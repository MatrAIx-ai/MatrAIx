personas:
  professional: Donna Arza, a detail‑oriented aspiring bookkeeping professional, leverages their household budgeting expertise, Microsoft Office mastery, and reputation for reliability to excel in administrative
    assistant roles at the Gage County school district, where their preference for routine and practical problem‑solving ensures smooth scheduling and accurate record‑keeping.
  sports: Donna Arza stays fit by walking the Homestead Trail three times a week, participates in the local senior softball league, and cheers on the Nebraska Cornhuskers football team and the Omaha Storm
    Chasers baseball club, blending routine exercise with community sports spirit.
  arts: Donna Arza finds creative release in quilting patterned blankets inspired by the works of quilter Faith Ringgold while enjoying historical fiction by Philippa Gregory and listening to folk‑rock
    singer Lucinda Williams during their craft sessions.
  travel: Donna Arza prefers meticulously planned road trips, having explored the historic Bismarck fortifications and the scenic Badlands of South Dakota, and they dream of a guided tour of historic castles
    in the Loire Valley, balancing their love for heritage with a budget‑friendly itinerary.
  culinary: Donna Arza’s culinary repertoire centers on family‑heritage stew, fresh garden salad with heirloom tomatoes and basil, homemade cornbread, and occasional indulgence in cinnamon‑spiced apple
    crisp, reflecting their moderate cooking skill and penchant for seasonal, homegrown ingredients.
  core: Donna Arza is a routine‑driven, community‑oriented planner who balances meticulous budgeting with a love for gardening, quilting, and occasional crossword‑puzzle marathons, yet occasionally battles
    a guilty pleasure of late‑night streaming true‑crime podcasts.
background:
  cultural: 'Donna was raised in a small Midwestern town in Nebraska, coming from a family of German and Irish ancestry that settled on the plains in the early 20th century. Her cultural background reflects
    traditional rural Midwest values: practicality, self‑reliance, respect for routine, and a strong sense of community tied to local church and agricultural heritage. She participates in regional festivals,
    values family gatherings such as Thanksgiving, and embraces the steady, work‑oriented ethic characteristic of her upbringing.'
attributes:
  skills: '["Household budgeting", "Schedule planning", "Data entry", "Microsoft Office Suite", "Gardening", "Basic carpentry", "Volunteer coordination", "Project coordination", "Event planning", "Meal
    planning"]'
  hobbies: '["Gardening", "Quilting", "Historical fiction reading", "Cooking family‑heritage recipes", "Church potluck participation", "Volunteer work at food bank", "Walking the Homestead Trail", "Crossword
    puzzle solving", "Meal planning"]'
  career_goals: Donna aims to re‑enter the workforce in a role that offers clear structure and predictable responsibilities. In the short term she plans to obtain a bookkeeping certification and secure
    an administrative assistant position at the Gage County school district or the local health clinic, where she can apply her budgeting and scheduling expertise. Over the next five years she aspires to
    advance to an office manager or community center coordinator, eventually overseeing programs that support families in her town.
