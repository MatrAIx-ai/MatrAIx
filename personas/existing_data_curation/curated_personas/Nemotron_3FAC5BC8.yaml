  hobbies: '[''Hiking in the Sonoran Desert'', ''Meditation and yoga'', ''Photography (landscape and street)'', ''DIY electronics and modular synth building'', ''Reading science‑fiction'', ''Playing strategy
    video games'', ''Volunteering as a music production mentor'']'
  career_goals: Jason aims to release a full-length concept album that fuses his love of progressive rock with innovative electronic textures generated through custom-built synth modules. He plans to open
    a home recording studio in Mesa that doubles as a collaborative space for emerging local artists, offering production services and mentorship. Leveraging his STEM background, he aspires to develop an
    AI‑assisted composition tool that helps musicians experiment with new harmonic ideas while maintaining artistic control. Long‑term, he hopes to secure a regular residency at a Mesa venue, build a sustainable
    income stream from music licensing, and eventually launch a music‑technology startup that bridges the gap between creative expression and technical innovation.
