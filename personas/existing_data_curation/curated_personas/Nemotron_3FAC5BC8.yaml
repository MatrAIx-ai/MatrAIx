personas:
  professional: Jason Moon, a 38‑year‑old vocalist‑engineer, merges progressive‑rock songwriting with handcrafted modular synths, using their curiosity‑driven precision and anxiety‑tempered reliability
    to coordinate studio sessions, mentor local talent, and meet tight release deadlines.
  sports: Jason Moon, a 38‑year‑old desert enthusiast, regularly hikes with the Mesa Hiking Club, follows the Arizona Cardinals and Phoenix Suns for seasonal motivation, and balances cardio treks with yoga
    sessions to maintain flexibility and stamina.
  arts: Jason Moon channels the epic guitar narratives of Pink Floyd, the glitch‑laden textures of Aphex Twin, and the stark monochrome vistas of Ansel Adams, curating playlists that include Tool and Koji Kondo
    while capturing long‑exposure street scenes that echo the cinematic moods of director Christopher Nolan.
  travel: Jason Moon prefers meticulously planned desert adventures, having explored the Sonoran dunes near Tucson, trekked the iconic canyons of Monument Valley, and photographed the volcanic landscapes
    of Iceland, while dreaming of a future trip to Tokyo's Akihabara district to immerse themselves in Japan's synth‑culture scene.
  culinary: Jason Moon, an inventive home cook, delights in Southwestern dishes like carne asada tacos topped with fresh cilantro, lime, and roasted poblano, experiments with Mediterranean quinoa bowls
    spiced with za’atar and feta cheese, and pairs meals with hand‑brewed cold‑brew coffee flavored with a hint of cinnamon.
  core: Jason Moon is a restless creator who blends technical precision with artistic wanderlust, constantly battling perfectionist nerves while hoarding synth modules and desert trail maps.
background:
  cultural: Jason grew up in a middle‑class white family in the American Southwest, where the cultural mix of desert living, Southwestern hospitality, and a thriving independent music scene shaped his worldview.
    His parents emphasized education and self‑reliance, encouraging him to pursue a STEM degree while nurturing his early love for guitar and vocal performance in church and school choirs. The multicultural
    vibe of Mesa, with its blend of Native American, Mexican, and urban influences, exposed him to diverse musical styles and community values of cooperation and inclusivity, reinforcing his kind, collaborative
    nature.
attributes:
  skills: '[''Vocal performance'', ''Songwriting'', ''Music production (Ableton Live, Pro Tools)'', ''Audio engineering and mixing'', ''Music theory'', ''Guitar (acoustic and electric)'', ''Keyboard/piano'',
