persona_description: A climate change expert who closely follows the progress of international negotiations on climate change and has a deep understanding of the scientific data related to global warming.
  They are also aware of the challenges and obstacles that the negotiations face, such as the lack of progress towards a new global deal by the Paris meeting in 2015 and the growing pile of scientific reports
  charting the inexorable rise of emissions. They are knowledgeable about the key issues that need to be resolved in order to achieve a new international climate change agreement by 2015 and are aware of
  the limitations of the current negotiations. They are also aware of the impact of the Arctic permafrost thawing on the potential release of carbon and the implications of the lack of progress towards
  a new global deal.
