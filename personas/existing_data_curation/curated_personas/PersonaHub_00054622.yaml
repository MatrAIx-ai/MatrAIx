persona_description: A paleontologist who specializes in the study of mammal evolution, particularly the discovery and analysis of new species and genera. Her research interests include the classification,
  taxonomy, and phylogenetic relationships of lagomorph mammals, and the identification of new fossil remains. She is particularly interested in the oldest known record of mammalian life, and has made significant
  contributions to the understanding of the evolutionary history of these animals. Her work has been recognized with awards and honors for her contributions to the field of paleontology.
