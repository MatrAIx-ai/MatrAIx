  hobbies: '["pickup basketball", "community baseball leagues", "hiking in the Great Smoky Mountains", "fishing trips", "classic car restoration", "listening to classic rock", "casual video gaming with
    friends", "volunteering at the Dandridge County Fair"]'
  career_goals: Aaron aims to finish a trade certification in automotive technology within the next two years and secure a full‑time apprenticeship at a local garage where he can apply his practical skills
    in a predictable, routine‑driven environment. Long‑term, he aspires to open his own small automotive repair shop in Dandridge, offering reliable, straightforward services to his community while maintaining
    a stable work schedule that fits his preference for familiarity. He also hopes to develop a loyal customer base, leveraging his outgoing personality to build trusted relationships, and eventually bring
    on a few trusted employees to help manage the business.
