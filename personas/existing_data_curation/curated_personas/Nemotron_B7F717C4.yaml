personas:
  professional: Aaron Gober is an aspiring automotive technician who leverages hands‑on engine troubleshooting skills, a personable competitive streak, and a love for routine to build a reliable local client
    base, though their relaxed approach to planning sometimes leads to forgotten appointments that they compensate for with strict shop checklists.
  sports: Aaron Gober stays active through pickup basketball games with the Dandridge Community Hoops club, a spot on the local amateur baseball league, weekend hikes and fishing trips organized by the
    Smoky Mountain Outdoor Club, and by cheering on the Nashville Predators and Tennessee Titans, while their competitive edge drives them to push harder in workouts despite occasional lapses in scheduling.
  arts: Aaron Gober unwinds by blasting classic rock legends like Led Zeppelin, The Rolling Stones, and Lynyrd Skynyrd while also streaming country‑folk performances by John Prine at the annual Dandridge
    County Fair’s stage, letting the blend of rhythm and community storytelling shape their weekend downtime.
  travel: Aaron Gober prefers low‑key road trips that blend familiar regional scenery with adventure, having already explored the Great Smoky Mountains and taken a weekend drive to Asheville’s Blue Ridge
    Parkway, they now daydream about a budget‑friendly camping excursion to the Grand Canyon while carefully budgeting each mile in a handwritten travel ledger.
  culinary: Aaron Gober favors hearty home‑style fare, often firing up the grill to perfect smoked brisket seasoned with paprika, brown sugar, and cayenne, pairing it with buttery biscuit‑corn casserole
    and a post‑hike snack of smoked trout and trail‑mix, though their cooking confidence stays mostly within backyard BBQ and quick skillet meals.
  core: Aaron Gober lives by the steady rhythm of engines, fishing lines, and classic rock, embracing routine with a grease‑stained hand while their habit of misplacing tools and quiet worry over every
    detail gives them an endearingly earnest, if occasionally frazzled, vibe.
background:
  cultural: 'Aaron grew up in a traditional, family‑oriented Southern environment in Dandridge, Tennessee. His upbringing reflects the values of the Appalachian region: practicality, hospitality, and a
    strong work ethic rooted in community and faith. He was raised in a middle‑class household that regularly attended a local Baptist church, where Sunday services, potlucks, and church‑run outings reinforced
    communal bonds. Regional traditions—such as the county fair, hunting season, and 4‑H club activities—have shaped his appreciation for routine, self‑reliance, and local heritage. While he is open to
    broader cultural influences through music and digital media, his core cultural identity remains tied to the modest, pragmatic, and socially connected lifestyle of his hometown.'
attributes:
  skills: '["basic automotive repair", "handyman tasks", "event planning and coordination", "customer service", "cash handling", "inventory management", "basic computer troubleshooting", "Microsoft Office
