personas:
  professional: Gregory Betz is an aspiring cartoonist and junior coder who blends detailed LEGO city designs with Scratch animations, and they thrive on turning imaginative stories into interactive digital
    sketches.
  sports: Gregory Betz plays midfield for the Riverside Elementary Soccer Club, cheering for the Detroit Lions as their favorite NFL team, and they squeeze in weekend kickabout matches with friends while
    also following the excitement of the FIFA World Cup.
  arts: Gregory Betz is a vibrant member of the school art club who sketches cartoons inspired by classic adventure novels, grooves to pop hits from Taylor Swift and country tunes by Luke Combs while practicing
    simple drum beats on a practice pad, and they often quote lines from favorite fantasy series while sketching.
  travel: Gregory Betz loves weekend trips to nearby amusement parks like Six Flags, dreams of visiting Legoland in Denmark, and they prefer family road trips with frequent stops for snack breaks, balancing
    adventure with a love for familiar comfort zones.
  culinary: Gregory Betz enjoys munching on pepperoni pizza and homemade mac ‘n’ cheese, attempts to bake chocolate chip cookies with a trusty kitchen timer, and they delight in assembling fruit kebabs
    with watermelon, grapes, and strawberries as a healthy snack.
  core: Gregory Betz is a nine‑year‑old imagination engine who merges cartoon sketches with LEGO builds, they juggle school responsibilities, friends, and creative projects while occasionally forgetting
    to tidy up their art supplies.
background:
  cultural: Gregory was raised in Beaumont, Texas, within a Southern, family‑oriented community that values hospitality, community gatherings, and outdoor activities. He experiences local traditions such
    as Friday night high‑school football tailgates, backyard barbecues, and community festivals that blend Gulf‑Coast and Cajun influences. The diverse cultural mix of his neighborhood—including elements
    of Hispanic and African‑American cultures—has fostered his respect for harmony, kindness, and cooperation while grounding him in a broadly American, Texan upbringing.
