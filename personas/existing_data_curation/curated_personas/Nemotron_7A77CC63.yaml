  hobbies: '[''Gardening'', ''Cooking'', ''Reading contemporary fiction'', ''Knitting'', ''Crossword puzzles'', ''Sudoku'', ''Gentle yoga'', ''Nature walks'', ''Book club'', ''Board game nights'', ''Health
    app exploration'']'
  career_goals: Lisa aims to deepen her clinical expertise by becoming a Certified Diabetes Educator and pursuing a Master of Science in Nursing (MSN) with a focus on chronic disease management. She envisions
    a role that blends routine patient care with emerging telehealth technologies, allowing her to support stable patients remotely while preserving a predictable schedule. Over the next five years, she
    hopes to mentor junior nurses, lead a small multidisciplinary team in a community health clinic, and achieve a balanced work-life arrangement that reduces stress. Ultimately, she wants to be recognized
    as a compassionate clinical specialist who fosters harmony and continuity of care.
