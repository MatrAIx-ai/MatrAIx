personas:
  professional: Lisa Evans, a 29‑year‑old registered nurse known for delivering consistent, routine‑driven patient care, leverages her expertise in medication administration, IV therapy, wound care, and
    health‑informatic documentation while using systematic checklists to offset occasional disorganization, and she brings a calm, harmony‑focused demeanor to mediating unit conflicts.
  sports: Lisa Evans, a low‑key fan of the Seattle Sounders and Seattle Kraken, incorporates gentle movement into her routine by attending a twice‑weekly yoga class at a neighborhood studio and joining
    a Saturday morning walking group that explores Discovery Park’s trails, viewing fitness as a calming habit rather than competitive sport.
  arts: Lisa Evans nurtures her creative side by crocheting while listening to the mellow folk of Iron & Wine and the soothing piano of Norah Jones, and she devours contemporary fiction such as Sally Rooney’s
    'Normal People' and Celeste Ng’s 'Everything I Never Told You,' which fuels lively discussion in her small book club.
  travel: Lisa Evans prefers low‑stress weekend getaways that blend relaxation with gentle adventure, planning trips to nearby natural escapes like Olympic National Park and savoring a solo weekend in Kyoto
    for its tranquil gardens, using a travel‑budget spreadsheet and planning apps to keep everything organized and avoid last‑minute anxiety.
  culinary: Lisa Evans enjoys preparing simple comfort meals like chicken pot pie, creamy mushroom risotto, and homemade tomato basil soup, skillfully seasoning with garlic, fresh rosemary, and a sprinkle
    of pepper, and she relishes eating her creations at the kitchen table while scrolling through a recipe app for new variations.
  core: Lisa Evans fuses a love of routine, quiet creativity, and gentle anxiety into a dependable yet occasionally scattered caregiving style, relying on meticulous checklists and health‑tracking apps
    while sometimes procrastinating on less structured tasks.
background:
  cultural: Lisa grew up in a middle-class, suburban White American family in the Bay Area, where practicality and community involvement were emphasized. Her upbringing included typical American holidays
    such as Thanksgiving and Christmas, and she was exposed to a blend of West Coast progressive attitudes and traditional values. Living in San Jose, she is familiar with Silicon Valley's tech culture
    but holds a conventional, routine-focused outlook. Her cultural background informs her respect for diverse patients, a cooperative spirit, and a preference for stable, harmonious environments.
attributes:
  skills: '[''Medication administration'', ''IV therapy'', ''Vital signs assessment'', ''Wound care management'', ''Electronic health record documentation'', ''Patient education'', ''Clinical triage'',
