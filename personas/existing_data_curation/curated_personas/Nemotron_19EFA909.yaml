personas:
  professional: Christine Breth, age 4, serves as the unspoken project manager of her sandbox construction crew, using neat rows of toy blocks (organizational skill) and flexible improvisation (practical
    curiosity) while gently asserting leadership in their small group of playmates.
  sports: Christine Breth, age 4, delights in backyard soccer sessions with the junior Cubs Soccer Club, cheers for the Chicago Cubs during family TV nights, and prefers free‑play tag over organized team
    drills, balancing a love for movement with the need for personal space.
  arts: Christine Breth, age 4, spends afternoons coloring sketches from Mo Willems’ books and dancing to the playful tunes of Raffi while secretly mimicking the expressive faces of animated characters
    from Disney’s Frozen, weaving a vivid personal gallery that reflects both curiosity and quiet confidence.
  travel: Christine Breth, age 4, enjoys family road trips to the nearby state park where they collect pinecones, dreams of seeing the Eiffel Tower after watching a cartoon about Paris, and prefers short,
    itinerant adventures over long flights, balancing their love of novelty with the comfort of familiar routines.
  culinary: Christine Breth, age 4, prefers mac and cheese with hidden peas, delights in strawberry‑filled yogurt, and insists on spreading peanut butter evenly on whole‑grain bread, while their cooking
    skill is limited to stirring batter under close supervision, reflecting a practical taste and selective curiosity.
  core: Christine Breth, a curious‑yet‑practical 4‑year‑old who meticulously lines up toys, saves coins for a superhero cape, and swings between shy solitude and bright bursts of assertiveness.
background:
  cultural: Christine comes from a Black family rooted in the Louisville, Kentucky area. Her parents nurture a blend of Southern African-American traditions, including weekend visits to the local church
    where gospel music and community fellowship are central. Family gatherings feature classic soul and R&B songs, home-cooked dishes like fried chicken, collard greens, and cornbread, and storytelling
    that connects her to her grandparents' experiences in the Great Migration. In Oldham County, she also participates in community events such as the Louisville Zoo's early-learning programs and the public
    library's multicultural storytimes, which reinforce a sense of pride in her heritage and encourage curiosity about her cultural roots.
