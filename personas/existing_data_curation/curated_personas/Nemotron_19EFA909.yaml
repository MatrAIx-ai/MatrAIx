  hobbies: '[''drawing animals'', ''building block constructions'', ''backyard nature exploration'', ''listening to library storytime'', ''dancing to music'', ''baking with family'']'
  career_goals: Although only four, Christine already voices big dreams. She often says she wants to be a teacher to share stories, a doctor to help people feel better, or a firefighter who rescues others.
    She is eager to learn new words, explore nature, and later, maybe work in a community garden to care for the environment. Her goals blend her curiosity about the world with a practical desire to help
    and protect those around her.
