persona_description: An electrical engineer who specializes in the development and implementation of high-quality, cost-effective, and reliable wiring solutions for a wide range of applications, including
  appliances, HVAC systems, automotive electronics, and other consumer electronics. They are familiar with the RAST connector technology and its benefits, and are actively involved in the adoption of this
  technology in North American appliance manufacturing. They have experience with both handheld and benchtop IDC terminating machines, and are familiar with the process of retrofitting existing wire harness
  designs to accommodate a dramatically different technology. They are aware of the challenges and obstacles associated with the adoption of RAST technology, but are confident that it will eventually become
  the standard in the appliance industry.
