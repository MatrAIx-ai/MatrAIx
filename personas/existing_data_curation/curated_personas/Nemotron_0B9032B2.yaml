personas:
  professional: Terry Parham, a 22‑year‑old CNC enthusiast, blends methodical expertise in G‑code, CAD/CAM software like Fusion 360 and SolidWorks, and hands‑on troubleshooting of multi‑axis machines with
    a curiosity for systems design, positioning themselves as a reliable junior programmer who meticulously plans each machining step while aspiring to become a senior CNC programmer and eventually a manufacturing
    engineer leading process‑improvement initiatives.
  sports: Terry Parham, a 22‑year‑old outdoor enthusiast, regularly rides with the Denver Cycling Club on rugged mountain‑bike trails, follows a disciplined weekly regimen of cardio and strength workouts,
    and fervently supports the Denver Broncos, Colorado Rockies, and Colorado Avalanche, viewing sports as both a social outlet and a benchmark for personal performance.
  arts: Terry Parham, a 22‑year‑old guitarist and hobby photographer, strums acoustic renditions of John Denver and Fleet Foxes while capturing black‑and‑white Rocky Mountain vistas reminiscent of Ansel Adams,
    and sporadically attends local open‑mic nights and gallery openings to fuel creative inspiration.
  travel: Terry Parham, a 22‑year‑old adventure‑oriented planner, maps weekend getaways to Colorado’s high country—such as Rocky Mountain National Park and the San Juan Mountains—while daydreaming about
    a spring trek through Patagonia’s Torres del Paine and a tech‑focused tour of Munich’s maker scene, balancing a modest travel budget with a craving for rugged exploration.
  culinary: Terry Parham, a 22‑year‑old practical cook, favors high‑protein meals like grilled flank steak seasoned with smoked paprika and rosemary, whips up quick quinoa‑bean bowls with avocado and lime
    for pre‑hike fuel, and treats themselves to a craft‑brew burger with caramelized onions on weekends, all while keeping a streamlined kitchen that mirrors their lean, no‑frills lifestyle.
  core: Terry Parham, a 22‑year‑old, merges a disciplined, detail‑oriented work ethic with a playful obsession for building virtual factories in Factorio and real‑world CNC programs, yet sometimes forgets
    to water houseplants and stays up late debugging code at the expense of sleep.
background:
  cultural: Terry grew up in Aurora, Colorado, in a middle-class family with deep roots in the American West. His heritage reflects a blend of European ancestry (German, Irish, and English) common among
    many white families in the region. He was raised with values of hard work, self-reliance, and community involvement, participating in local high-school extracurriculars and community events. The outdoor
    culture of Colorado and the growing tech-driven manufacturing scene in the Denver metro area have shaped his outlook, fostering a pragmatic yet curious mindset.
attributes:
