  career_goals: Terry aims to become a senior CNC programmer and later transition into a manufacturing engineering role where he can lead process-improvement initiatives. Over the next five years he plans
    to earn an associate degree in manufacturing technology, obtain certifications such as the CNC Machinist Certification and Six Sigma Green Belt, and gain experience in additive manufacturing and Industry
    4.0 technologies. Ultimately, he envisions managing a CNC production line or launching his own small-scale precision-machining shop that integrates both subtractive and additive processes.
