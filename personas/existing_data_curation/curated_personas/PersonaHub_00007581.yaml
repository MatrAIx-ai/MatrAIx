persona_description: A researcher in the field of construction history and stonework, particularly focused on the analysis and revival of stony vaulted systems. This individual has a deep understanding
  of the original designer's intentions, the "rule of art" deduced from specific treatises, and the fundamental elements for "knowledge building" that guide a philological reconstruction. They have experience
  in the restoration and recovery of buildings, and have developed practical workshops/laboratories to teach students/future designers a "know-how" that can be applied in professional benefits. They have
  conducted research on the first stereotomy genesis and executive phase, and have published their findings on the topic.
