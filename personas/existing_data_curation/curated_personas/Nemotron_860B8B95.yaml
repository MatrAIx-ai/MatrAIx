personas:
  professional: Mee Jiang, a retired senior‑center activity coordinator turned cultural ambassador, leverages their meticulous event‑planning finesse, bilingual fluency in Mandarin and Cantonese, and sharp
    strategic thinking honed at the bridge table to design a quarterly multicultural arts showcase and mentor volunteers, while their skeptical eye ensures no detail slips through the cracks.
  sports: Mee Jiang channels their competitive drive into weekly line‑dancing sessions at the Delmar Community Center, fervent support for the New York Knicks and New York Yankees, and a strategic spot
    at the Delmar Senior Bridge Club where they mentor younger players while maintaining a light jog in their local park each morning.
  arts: Mee Jiang, an avid watercolorist of local landscapes and regular visitor of the Metropolitan Museum’s Impressionist wing, draws inspiration from Monet’s delicate light, Ai Weiwei’s bold concepts,
    and the vibrant brushwork of Zhang Daqian, often discussing new exhibitions over tea with fellow enthusiasts at the senior center.
  travel: Mee Jiang prefers meticulously planned trips that blend cultural immersion with leisurely pace, having explored the historic streets of Beijing and the serene gardens of Kyoto, and they dream
    of a relaxed cruise along the Gulf Coast of Florida and a future visit to the national parks of Utah’s Bryce Canyon.
  culinary: Mee Jiang, a master of elaborate banquet cooking, delights in preparing Peking duck with crisp skin, braised pork belly glazed with star anise and soy, aromatic lotus root soup seasoned with
    fresh ginger and garlic, and occasionally fuses these with Southern barbecue ribs, always sourcing premium ingredients like Sichuan peppercorns and fresh cilantro to impress their guests.
  core: Mee Jiang blends a lifelong curiosity with a competitive edge, orchestrating vibrant community events, watercolor art, and hearty banquets, all while vigilantly managing their health, finances,
    and the occasional worry that fuels their meticulous planning.
background:
  cultural: Mee Ha Jiang was born to Chinese immigrant parents who settled in Maryland in the post‑World War II era. Growing up in a bilingual household, she internalized traditional East Asian values such
    as respect for elders, filial duty, and the importance of community harmony, while also navigating the broader American cultural landscape of the 1960s and beyond. Her family celebrates Chinese holidays—Lunar
    New Year, Mid‑Autumn Festival—and integrates them with local customs, creating a hybrid cultural identity that honors her heritage and embraces her American surroundings. This dual perspective informs
    her passion for sharing Chinese art, cuisine, and language with her neighbors, and drives her commitment to fostering cross‑cultural understanding in Delmar’s diverse community.
