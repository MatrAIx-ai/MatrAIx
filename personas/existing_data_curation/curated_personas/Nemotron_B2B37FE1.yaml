personas:
  professional: Jose Teissonniere is a senior full‑stack developer with two decades of self‑taught mastery in Python, JavaScript, and C#, who channels an artistic sensibility into creative coding projects
    using React, Node.js, and .NET to prototype interactive installations, while their spontaneous work style and competitive edge often clash with strict deadlines but fuel relentless performance optimization
    and mentorship through pair‑programming.
  sports: Jose Teissonniere fuels their energy with weekend bike rides along the river trail, a regular spot on a downtown adult basketball league, and a passionate fandom for the Los Angeles Lakers, while
    they occasionally join a salsa‑dance class as an unconventional cardio workout.
  arts: Jose Teissonniere immerses themselves in the art world by frequenting gallery openings featuring works by Frida Kahlo and street‑art tours spotlighting Banksy, attending improv theater showcases
    starring local troupes, and devouring experimental jazz and Latin fusion from Esperanza Spalding and John Zorn, which together shape their creative coding aesthetic.
  travel: Jose Teissonniere embarks on spontaneous road trips to cultural festivals—most memorably the Día de los Muertos celebration in Oaxaca and the Montreal Jazz Festival—while dreaming of exploring
    Kyoto’s cherry‑blossom season, preferring loosely planned itineraries that allow for serendipitous detours despite occasional budget constraints.
  culinary: Jose Teissonniere, a confident home chef, delights in crafting traditional Mexican recipes such as mole poblano, chiles en nogada, and elote with aromatic epazote and ancho chilies, while also
    experimenting with sushi rolls and artisanal coffee, often hosting dinner gatherings where they pair dishes with mezcal and craft cocktails.
  core: Jose Teissonniere blends a vibrant artistic soul with a restless tech mind, channeling spontaneous creativity into code and cuisine, yet wrestles with deadline anxiety and occasional impulsive spending
    that fuels both their brilliance and their inner turbulence.
background:
  cultural: 'Jose grew up in a bilingual Mexican‑American household, speaking Spanish at home while learning English in school. His Mexican heritage is a daily presence: family celebrations feature colorful
    traditions like Día de los Muertos, quinceañeras, and communal meals of tacos and pozole. The strong emphasis on family, respect for elders, and community solidarity shaped his sociable and outgoing
    personality. Living in Cisco, Illinois, he bridges his cultural roots with Midwestern values, often introducing Mexican art motifs into his software designs and volunteering at the local cultural center
    to teach coding to youth. This blend of Mexican pride and American adaptability informs both his professional creativity and his personal worldview.'
