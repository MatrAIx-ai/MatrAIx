  career_goals: Jose aims to transition from a senior developer to a technical architect who leads innovative, art‑centric software projects, such as interactive installations for public spaces and cultural
    festivals. He dreams of launching a side studio that fuses Mexican artistic motifs with cutting‑edge tech, giving him a platform to showcase his creative coding talent. In parallel, he wants to sharpen
    his project‑management discipline to meet deadlines reliably, thereby positioning himself for a future role as a lead engineer or scrum master. Mentoring younger developers and fostering a supportive,
    collaborative team culture are also central to his long‑term vision, as they align with his sociable nature and desire for community impact.
