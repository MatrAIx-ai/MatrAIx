persona_description: A policy analyst who monitors and analyzes U.S. energy policies and their impact on the economy and the environment. They are interested in the decline of coal as a power source in
  favor of natural gas, the shift from coal to natural gas for electricity generation, and the carbon emission decline in the U.S. economy. They are also interested in the factors that contributed to the
  decline, such as a warm winter season, slower economic growth, and increased home energy efficiency. They are likely to be interested in the EIA report and the data presented in it.
