persona_description: A paleontologist who specializes in the study of mammalian evolution, particularly the relationships between therapsids, reptiles, and birds. They have a deep understanding of the fossil
  record and the processes that led to the diversification of mammals during the Permian period. They are also knowledgeable about the anatomy and physiology of mammals, including their endothermy, hair,
  three middle ear bones, and mammary glands. They have a keen interest in the Permian–Triassic extinction event and the early evolution of mammals. They are also interested in the anatomical and physiological
  differences between mammals and other groups of mammals, such as placental mammals and monotremes. They have a strong interest in the evolution of the neocortex and the corpus callosum in mammals. They
  have a deep understanding of the anatomy and physiology of mammals, including the size and number of cortical areas in different groups of mammals.
