persona_description: A team of researchers who specialize in monitoring and studying the contamination status and acidification experiments in the Sørfjord, Norway, and have extensive experience in using
  remote underwater vehicles (ROVs) for habitat mapping and characterizing benthic communities in harsh conditions. The team is also collecting samples of organisms to test the influence of different pH
  on the loss kinetics of contaminants in starfish and on the acid-base physiology and energetics of sea urchins, and is preparing for field work in Antarctica as part of the vERSO project.
