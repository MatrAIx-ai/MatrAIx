  career_goals: Carlos aims to become a lead detective within the Bridge City Police Department, eventually specializing in homicide and cybercrime investigations. He aspires to develop a community outreach
    program that educates at‑risk youth about safety and the legal system, fostering greater trust between law enforcement and the Salvadoran diaspora. In the longer term, he hopes to earn a bachelor's
    degree in criminal justice to deepen his strategic impact and possibly transition into a training role, where he can mentor new investigators with his organized, high‑standard approach.
