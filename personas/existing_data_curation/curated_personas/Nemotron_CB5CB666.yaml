  career_goals: Kendrick aims to leverage his practical experience and curiosity to move up the culinary ladder. In the next two years he plans to complete an associate degree in culinary arts or hospitality
    management, earn a kitchen manager certification, and transition to a line‑cook role. Long‑term, he envisions becoming a sous chef or kitchen manager at a community‑focused restaurant that highlights
    Southern-inspired dishes with a California twist, ultimately opening his own small catering venture or food truck that serves his family and neighborhood. He is also motivated to build a stable financial
    foundation for his wife and children and to mentor younger workers from Inglewood, sharing the practical skills he has mastered.
