persona_description: A researcher and environmental scientist who is interested in the impacts of climate change on forest ecosystems, particularly in the Mediterranean region. They are particularly interested
  in the Atlas Cedar (Cedrus atlantica) and its decline in response to drought stress. They are also interested in the effects of logging and overgrazing on the decline of Atlas cedar trees and the replacement
  of these trees by other species such as holm oak and prickly juniper. They have expertise in tree characteristics, stand structure, and climate analysis, and are interested in understanding the long-term
  decline of Atlas cedar trees in the Moroccan Middle Atlas Forests.
