  career_goals: Even as she approaches retirement, Alicia remains driven to leave a lasting imprint on the field of arts‑infused education. She aims to mentor emerging school administrators, offering guidance
    that balances operational precision with creative risk‑taking. Alicia is intent on launching a city‑wide intergenerational arts initiative that pairs senior volunteers with elementary classrooms, fostering
    mutual learning and community cohesion. She also hopes to author a memoir that chronicles her journey through decades of educational change, and to establish a scholarship fund for under‑represented
    students pursuing arts education. Ultimately, Alicia aspires to be recognized as a champion of lifelong learning and to influence local policy in favor of sustained arts funding.
