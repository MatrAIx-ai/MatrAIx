personas:
  professional: Alicia Bennett, a veteran educational administrator with nearly five decades of experience, blends meticulous budgeting and grant writing with an imaginative flair for arts‑integrated curricula,
    and they now mentor emerging leaders while championing a city‑wide intergenerational arts initiative in Houston.
  sports: Alicia Bennett stays active with gentle morning walks around Hermann Park, weekly senior yoga at the community center, and enthusiastic attendance at Houston Astros baseball games, while they
    also participate in a low‑key bridge club that doubles as a light cardio social activity.
  arts: Alicia Bennett channels their love of abstraction into watercolor paintings inspired by the bold hues of Houston’s street murals, shares original poetry at a neighborhood circle, attends exhibitions
    featuring artists like Kerry James Marshall, and they find solace playing classical piano pieces by Debussy during garden breaks.
  travel: Alicia Bennett favors thoughtfully planned, leisurely journeys that blend cultural immersion with creative inspiration, having explored the historic German‑influenced town of Fredericksburg and
    the art‑rich streets of Santa Fe, and they dream of a future trip to the vivid murals of San Miguel de Allende while balancing limited mobility and senior travel discounts.
  culinary: Alicia Bennett enjoys reinventing Tex‑Mex classics, such as grilling carne asada tacos topped with homemade salsa verde and freshly harvested cilantro from their butterfly garden, while they
    also experiment with smoky chipotle‑infused enchilada sauces and jasmine‑infused aguas frescas for a refreshing twist.
  core: Alicia Bennett, a 78‑year‑old lifelong learner, fuses relentless creativity with disciplined organization, turning every brushstroke, budget line, and garden seed into a vivid testament to curiosity,
    community, and a touch of delightful eccentricity, and they embody both resilience and occasional forgetfulness when appointments clash.
background:
  cultural: Alicia Bennett was raised in a middle‑class white family in a modest town in East Texas during the 1940s and 1950s, where Southern hospitality and Methodist traditions shaped her early worldview.
    Her parents valued education and encouraged her to pursue a university degree, leading her to relocate to Houston for college where she earned a Bachelor of Arts in Humanities. The multicultural tapestry
    of Houston’s neighborhoods exposed Alicia to Hispanic, African‑American, and Asian cultural expressions, which she later incorporated into her work in arts‑focused education. She maintains fluency in
    conversational Spanish and a deep appreciation for Texan culinary and musical traditions. While she identifies with her Anglo‑American heritage, Alicia’s identity is also informed by the diversity and
    collaborative spirit of the Houston community she has called home for most of her adult life.
