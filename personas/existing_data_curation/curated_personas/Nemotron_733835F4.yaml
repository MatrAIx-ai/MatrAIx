    ''Participating in cultural festivals'', ''Mentoring young women interested in firefighting'']'
  career_goals: Angelica aims to advance within the Houston Fire Department by earning the Firefighter II certification and completing the Fire Officer I program within the next three years, positioning
    herself for a future as a captain. She plans to pursue a bachelor's degree in emergency management to broaden her strategic expertise. Passionate about community outreach, she hopes to lead the department’s
    bilingual public‑education program, creating culturally relevant fire safety workshops for Houston’s Hispanic neighborhoods. Additionally, she wants to become a certified paramedic to enhance her medical
    response capabilities and mentor other women who aspire to join the firefighting profession.
