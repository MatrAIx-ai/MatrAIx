personas:
  professional: Emery Cole, a 39‑year‑old first‑line sales supervisor, blends data‑driven B2B strategy, expert CRM administration in Salesforce and HubSpot, and a visual flair for presentations to coach
    a competitive team while navigating negotiations with a balance of meticulous planning and an openness to unconventional ideas.
  sports: Emery Cole stays active through weekend hikes in the Ouachita hills, participates in the Tulsa Runners club’s 5K races, and follows the Oklahoma City Thunder and the Tulsa Roughnecks with a competitive
    edge that fuels her own cardio regimen and occasional yoga sessions.
  arts: Emery Cole, an avid watercolorist capturing the subtle hues of the Ozarks, draws inspiration from artists such as Yuko Koyama and Ansel Adams, while listening to Leonard Cohen’s albums and The Art
    History Babes podcast as she curates small exhibitions at the Tulsa Art Center and the Cherokee Heritage Center.
  travel: Emery Cole favors low‑key weekend getaways, having explored the Blue Ridge Parkway near Asheville and the vibrant art districts of Santa Fe, and she dreams of a spring trip to the tulip fields
    of Keukenhof, all planned with a meticulous spreadsheet that balances her love for nature hikes with a modest travel budget.
  culinary: Emery Cole, a confident home cook, delights in crafting seasonal dishes such as roasted beet and goat‑cheese salads, pan‑seared trout with lemon‑dill butter, and garden‑fresh pesto topped with
    heirloom tomatoes, while occasionally rewarding herself with a steak dinner at a downtown Tulsa bistro.
  core: Emery Cole balances a competitive, data‑driven sales career with solitary creative pursuits, a meticulous yet flexible budgeting habit, and a quiet resilience that fuels weekend hikes, watercolor
    painting, and a habit of double‑checking spreadsheets before bedtime.
background:
  cultural: Emery is a white woman raised in rural Stilwell, Oklahoma, within a close‑knit farming community that instilled a strong Midwestern work ethic and self‑reliance. The region’s proximity to the
    Cherokee Nation has given her an appreciation for Native American cultural events and local art traditions, which she incorporates into her personal interests. She values independence and practical
    problem‑solving, yet remains open to diverse ideas and unconventional thinking, reflecting the blend of traditional Oklahoma values with a curiosity about broader cultural influences.
attributes:
  skills: '["Team Leadership", "B2B Sales Strategy", "CRM Management (Salesforce)", "Performance Metrics Analysis", "Training & Coaching", "Negotiation", "Budgeting & Forecasting", "Conflict Resolution",
    "Presentation Design (PowerPoint)", "Data Visualization (Excel)", "Basic Graphic Design (Canva)", "Project Coordination", "Strategic Planning"]'
  hobbies: '["Watercolor Painting", "Landscape Photography", "Hiking", "Reading", "Art Gallery Visits", "Podcast Listening", "Chess", "Gardening", "Cooking", "DIY Home Projects"]'
  career_goals: Emery aims to advance to a regional sales manager position within the next three to five years, leveraging her supervisory track record to oversee multiple teams across the state. She plans
    to complete a Bachelor of Business Administration to solidify her business knowledge and to earn the Certified Professional Sales Leader (CPSL) credential. Long‑term, she envisions leading an innovation
    task force that integrates creative thinking into sales processes, while also mentoring emerging sales talent. Additionally, she hopes to launch a side venture—a curated online gallery that showcases
    local Oklahoma artists—blending her commercial expertise with her passion for the arts.
