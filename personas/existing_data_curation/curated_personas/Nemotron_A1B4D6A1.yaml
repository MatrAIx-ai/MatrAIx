personas:
  professional: Jorge Ruiz, a disciplined 13‑year‑old budding technologist, channels curiosity and strategic thinking into leading the school robotics club while simultaneously sharpening teamwork and tactical
    skills as a midfield soccer player.
  sports: Jorge Ruiz plays midfield for the school’s soccer club, relishing the blend of strategy and camaraderie, and avidly follows Real Madrid, modeling positional awareness after the Spanish giants
    while maintaining a disciplined training regimen three times a week.
  arts: Jorge Ruiz dances salsa every Thursday with family, immerses themselves in sci‑fi epics from authors like N.K. Jemisin and Isaac Asimov, and draws inspiration from performers such as Taylor Swift
    and the cinematic flair of Blade Runner, letting these artistic currents color their weekend festival preparations.
  travel: Jorge Ruiz prefers carefully planned weekend getaways, having explored Washington, D.C.’s Air and Space Museum and a family beach trip to Santa Monica, while secretly yearning to attend a robotics
    expo in Tokyo once their parents’ budget permits.
  culinary: Jorge Ruiz enjoys crafting homemade pizza with pepperoni, mushrooms, and extra cheese, whipping up chicken tacos seasoned with cilantro and lime, and experimenting with spaghetti carbonara,
    showing an intermediate kitchen skill that thrives during festival prep sessions.
  core: Jorge Ruiz is a fiercely organized teen whose love for strategy—from soccer midfield to robotics code—coexists with high‑octane salsa moves, a competitive edge, and a lingering anxiety that fuels
    both meticulous planning and occasional stress‑induced procrastination.
background:
  cultural: Jorge is a first‑generation Cuban‑American raised in Orlando’s vibrant Cuban community. His household speaks both Spanish and English, preserving traditional customs such as family meals with
    arroz con pollo, celebrating Carnaval and the Fiesta de la Cultura Cubana. He frequently visits local Cuban bakeries and attends community events that showcase Cuban music, dance, and art. While his
    parents emphasize the importance of cultural heritage, they also encourage integration into broader American society, fostering his bilingual proficiency and his appreciation for both Cuban traditions
    and Floridian diversity.
