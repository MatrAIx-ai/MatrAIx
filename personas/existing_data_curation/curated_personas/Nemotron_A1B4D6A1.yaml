  career_goals: In the short term, Jorge aims to maintain top grades in STEM subjects, secure a spot in a competitive youth robotics program, and earn a scholarship for a summer coding camp. Long‑term,
    he dreams of becoming a software engineer who designs educational technology tools, especially for bilingual and under‑represented students, while also keeping open the possibility of pursuing a professional
    soccer career. His competitive drive and high personal standards motivate him to seek roles that blend technical innovation with leadership, such as a future project manager in tech or a community organizer
    advocating for Cuban‑American youth empowerment.
