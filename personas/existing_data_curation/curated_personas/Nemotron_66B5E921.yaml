personas:
  professional: Lisette Kendrick, a 31‑year‑old registered nurse with a humanities background, leverages her expertise in IV therapy, wound care, EHR management, and health‑promotion initiatives to drive
    patient safety and staff engagement, while her curious‑practical mindset, sociable kindness, and organized‑yet‑flexible approach make her a natural mentor and community health advocate.
  sports: Lisette Kendrick fuels her active lifestyle by hiking Baylor Creek Trail on weekends, attending weekly yoga classes at Sunrise Studio, cheering on the Houston Astros and Rockets, and running with
    the local Spring Striders club, all while adapting her fitness routine to the ebb and flow of rotating nursing shifts.
  arts: Lisette Kendrick satisfies her artistic cravings by frequenting Texas music festivals featuring Leon Bridges, The Avett Brothers, and local folk bands, devouring historical fiction novels by Hilary
    Mantel and Philippa Gregory in her book club, and catching occasional Broadway‑style productions of “Hamilton” and “The Lion King,” which inspire her storytelling and community outreach.
  travel: Lisette Kendrick plans her trips with a blend of spontaneity and spreadsheet precision, favoring weekend escapes to Austin’s live‑music scene, annual camping trips to Big Bend National Park, past
    vacations in Asheville, North Carolina, and dreaming of culinary pilgrimages to Oaxaca, Mexico, and cultural immersion in Barcelona, Spain, all balanced against a modest travel fund and limited vacation
    days.
  culinary: Lisette Kendrick, an enthusiastic home chef, creates Tex‑Mex fusion delights such as chipotle‑marinated shrimp tacos with mango‑cilantro salsa, quinoa‑filled enchiladas topped with avocado crema,
    and smoky black‑bean chili served with fresh corn tortillas, often experimenting with chipotle peppers, epazote, and lime zest while hosting lively dinner parties—though she sometimes leaves the kitchen
    a mess and compensates with a quick take‑out pizza night.
  core: Lisette Kendrick, a 31‑year‑old nurse with a passion for community health, Tex‑Mex cooking experiments, and weekend hikes, balances a curious, sociable, and pragmatic spirit with a habit of occasional
    procrastination on bill payments and a love for spontaneous dance playlists.
background:
  cultural: Lisette grew up in a predominantly white, middle‑class suburb of Houston, Texas, where Southern hospitality and community involvement were core values. Her family emphasized education and the
    arts, which led her to earn a Bachelor’s degree in Arts and Humanities before pursuing nursing. She identifies with the cultural blend of traditional Texan customs—such as weekend barbecues, church
    gatherings, and a love for outdoor activities—while also embracing the broader spectrum of American multiculturalism through her patient interactions and community work. This background informs her
    inclusive approach to healthcare, where she respects diverse viewpoints but remains rooted in the practical, down‑to‑earth mindset typical of her Texas upbringing.
attributes:
  skills: '[''Clinical assessment'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic Health Records (EHR) management'', ''Triage and urgent care'', ''Health education and patient
    counseling'', ''Quality improvement initiatives'', ''Team leadership'', ''Cultural competency'', ''Mental health first aid'', ''Conflict resolution'', ''Community health outreach'']'
  hobbies: '[''Hiking'', ''Yoga'', ''Cooking Tex‑Mex fusion dishes'', ''Book club (historical fiction)'', ''Volunteer at animal shelter'', ''Organizing community health fairs'', ''Attending live music festivals'',
    ''Travel planning'']'
  career_goals: Lisette aims to transition into a nurse manager role within the next three years, focusing on improving patient safety and staff engagement. She plans to pursue a Master of Science in Nursing
    (MSN) with a specialization in Family Nurse Practitioner, allowing her to provide primary care in underserved communities around Spring, TX. Her long‑term ambition is to lead a community health clinic
    that integrates holistic health approaches, leveraging her humanities background to address social determinants of health. She also hopes to mentor new nurses, develop health education curricula, and
    contribute to policy advocacy for equitable healthcare access.
