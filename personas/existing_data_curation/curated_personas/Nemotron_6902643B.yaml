personas:
  professional: Rodrigo Vu, a senior operations supervisor with over twenty years of experience in office and administrative management, leverages advanced Excel modeling, Power BI dashboards, and ERP platforms
    such as Microsoft Dynamics and SAP Business One to engineer data‑driven workflow improvements, while their disciplined, curiosity‑driven mindset balances practical process rigor with innovative automation
    prototypes pioneered on Raspberry Pi.
  sports: Rodrigo Vu, an avid hiker in the North Georgia mountains and weekend fisherman on Lake Lanier, regularly plays 18‑hole rounds at the Warner Robins Country Club to network with colleagues, and
    supports the Atlanta Falcons, Atlanta Braves, and Atlanta Hawks as his favorite professional sports teams.
  arts: Rodrigo Vu, a dedicated reader of leadership books and historical fiction such as Ken Follett's The Pillars of the Earth, enjoys the melodic blend of traditional Vietnamese cải lương and Filipino
    kundiman with contemporary jazz, attends the Warner Robins Arts Council's monthly theatre productions—including classics like Death of a Salesman—and collects prints of local folk art, allowing cultural
    rhythm to inform both their professional and personal narratives.
  travel: Rodrigo Vu, a methodical planner who prefers road‑trip adventures, regularly escapes to the Appalachian Trail and the sandy banks of Lake Lanier for weekend hikes and fishing, dreams of a culinary
    immersion tour in Hoi An to refine his Vietnamese recipes, and is eager to explore Barcelona’s architecture before retirement, all while balancing travel expenses against contributions to his future
    consulting venture.
  culinary: Rodrigo Vu, a proficient home chef, transforms classic Vietnamese phở and Filipino adobo into healthier versions by swapping rice noodles for shirataki, using low‑sodium soy sauce and extra
    vegetables, while their love for fresh herbs like Thai basil, cilantro, and kaffir lime drives weekly experiments with lemongrass‑infused grilled fish and mango‑coconut desserts.
  core: Rodrigo Vu, a disciplined 51‑year‑old operations leader who blends tech‑savvy automation with a passion for hiking, fishing, golf, and culinary experimentation, balances meticulous planning with
    occasional indulgent quirks like late‑night gadget tinkering.
background:
  cultural: Rodrigo’s cultural roots trace back to a Vietnamese father and a Filipino mother, both of whom migrated to the United States in the 1970s. Raised in a bilingual household in the Southeast, he
    fluently speaks English and Vietnamese, and has conversational knowledge of Tagalog. Family traditions such as celebrating Tet, the Mid‑Autumn Festival, and Filipino Christmas gatherings remain integral
    to his identity. He maintains a modest home altar honoring ancestors, a practice that reinforces respect for family lineage. Living in Warner Robins, he has embraced Southern hospitality and actively
    participates in the local Catholic parish, where multicultural services reflect his blended heritage. This fusion of Southeast Asian values—discipline, respect for education, and communal responsibility—with
    Southern community spirit informs his interpersonal style and worldview.
