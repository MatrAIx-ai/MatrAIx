  career_goals: Rodrigo aims to advance into senior management, targeting roles such as Operations Manager or Director of Administrative Services within the next five years. He plans to earn a Project Management
    Professional (PMP) certification and a Six Sigma Black Belt to deepen his expertise in process improvement. He is driven to lead a digital transformation initiative that modernizes the department’s
    workflow through automation and data analytics. Mentorship is also a priority; he wants to establish a structured leadership development program for junior staff. Long‑term, Rodrigo envisions launching
    a boutique consulting firm that helps small businesses in the Southeast adopt efficient administrative practices while promoting inclusive workplace cultures.
