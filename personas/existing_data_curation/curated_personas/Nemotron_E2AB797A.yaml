personas:
  professional: A budding junior coder and storyteller, Sarahmae uses her curiosity and methodical planning to craft interactive adventure games in Scratch, while applying her organized mindset to school
    projects and LEGO engineering challenges.
  sports: Sarahmae thrives on the soccer field as a forward for the Greenfield Goalies youth club, eagerly cheering on FC Barcelona in the Champions League while also keeping a seasonal watch on the local
    high school basketball team, the Riverdale Raptors, for inspiration.
  arts: Sarahmae immerses herself in artistic pursuits, drawing wildlife inspired by the vivid colors of Disney's Moana, painting landscapes reminiscent of Van Gogh's Starry Night, and dancing to the latest
    pop hits from Taylor Swift and BTS while dreaming of performing on a stage like Zendaya.
  travel: Sarahmae loves weekend family trips to the nearby Oakwood State Park, where she collects rocks and leaf specimens, and harbors a big‑screen dream of visiting the Grand Canyon's rim and exploring
    the coral reefs of the Great Barrier Reef on a future vacation.
  culinary: Sarahmae enjoys hands‑on baking, confidently whisking butter, brown sugar, chocolate chips, and rainbow sprinkles into perfect chocolate‑chip cookies, while also craving pepperoni pizza and
    experimenting with simple pasta dishes topped with fresh basil and mozzarella.
  core: Sarahmae is an organized, curiosity‑driven nine‑year‑old who balances a love for LEGO engineering and soccer with a penchant for spontaneous cookie‑decorating marathons, occasionally forgetting
    chores when a new Scratch project captures her imagination.
background:
  cultural: Sarahmae comes from a white Midwestern family in Monroe City, Missouri. Her family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July with community
    gatherings and church activities. She attends a local public elementary school where she participates in school events and community service projects. The local culture emphasizes friendliness, community
    involvement, and a balance of independence and family support, shaping her sociable, cooperative, and energetic nature.
