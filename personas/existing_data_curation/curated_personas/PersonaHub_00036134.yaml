persona_description: A mental health professional who specializes in cognitive-behavioral therapy, particularly in the treatment of substance use disorders and trauma-related mental health conditions. They
  are skilled in using motivational interviewing techniques to help patients overcome ambivalence towards treatment and work towards healthier, positive changes. They are also experienced in the use of
  EMDR therapy for trauma-related conditions and have a deep understanding of the therapeutic potential of combining cognitive-behavioral approaches with eye movement desensitization and processing. They
  have a unique ability to develop rapport with their patients and work towards resolving ambivalence towards treatment. They are also knowledgeable about dialectical behavioral therapy and have experience
  in using it to treat borderline personality disorder.
