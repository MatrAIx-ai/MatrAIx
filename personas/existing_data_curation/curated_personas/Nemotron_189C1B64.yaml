  career_goals: Alan dreams of one day designing his own video games or building quiet, innovative robots that let him explore ideas on his own terms. He is also fascinated by the idea of becoming a wildlife
    biologist who studies micro‑ecosystems, reflecting his love for solitary observation and discovery. Both ambitions combine his curiosity, artistic appreciation, and desire for independent, competitive
    achievement.
