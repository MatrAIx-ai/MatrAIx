persona_description: A pediatrician who specializes in treating children with cough and cold symptoms, and is concerned about the over-prescription of cough and cold medication (CCM) by child specialists.
  They are concerned about the potential side effects of CCMs and the lack of evidence supporting their effectiveness as cures. They are aware of the Canadian mandatory labelling requirement and the recent
  decline in CCM use among young children due to the cautionary step. They are interested in evidence-based medicine and are concerned about the lack of awareness among doctors and the public about the
  risks associated with CCMs.
