  hobbies: '[''Visiting art galleries and murals'', ''Hiking and nature photography'', ''Watercolor painting and sketching'', ''Community soccer league'', ''Board‑game nights with friends'', ''Cooking classes
    exploring world flavors'', ''Volunteering at art‑therapy workshops'', ''Yoga and mindfulness practice'']'
  career_goals: Joel aims to complete his Associate’s degree in Nursing and become a Registered Nurse within the next three years, leveraging his current experience to specialize in community health. He
    is particularly interested in integrating arts‑based interventions into patient wellness programs, envisioning a role that blends health education with creative outreach in Asheville’s vibrant community.
    Long‑term, Joel aspires to earn a Bachelor of Science in Nursing, obtain certification as a Nurse Practitioner, and eventually lead a multidisciplinary team that designs preventive health initiatives
    that incorporate local culture, music, and visual art to promote holistic well‑being.
