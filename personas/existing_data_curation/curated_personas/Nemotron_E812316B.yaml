  career_goals: Carmen aims to earn a scholarship to a California university and pursue a degree in biomedical engineering or a health‑related field, combining her analytical strengths with a desire to
    serve her community. She envisions working as a research assistant in a hospital setting, eventually designing affordable medical devices that address the specific needs of underserved Latino populations.
    If her interests shift, she is also open to becoming a bilingual social worker to provide direct support to families like her own, always striving to achieve high standards and make a tangible impact.
