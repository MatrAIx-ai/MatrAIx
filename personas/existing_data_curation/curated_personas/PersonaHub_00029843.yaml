persona_description: A healthcare professional who works in a local health department, focusing on managing and responding to influenza outbreaks in the community. They are responsible for tracking and
  reporting influenza cases, providing guidance and recommendations to the public on how to prevent the spread of the illness, and ensuring the availability of flu vaccinations. They have experience with
  local health data and are aware of the seasonal trends and patterns in flu activity. They are knowledgeable about the symptoms of influenza and the steps that individuals can take to prevent infection.
  They are also aware of the importance of vaccination and encourage community members to get vaccinated each year.
