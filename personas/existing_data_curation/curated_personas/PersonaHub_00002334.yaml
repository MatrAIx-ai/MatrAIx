persona_description: A dermatologist who specializes in the use of antioxidants and free radical scavengers to protect and rejuvenate the skin. Dr. Dendy Engelman is a dermatologist and dermatologic surgeon
  at MDCS, known for her expertise in the use of vitamins C, Alpha Tocopherol, and Ferulic Acid to neutralize free radicals and protect the skin against environmental aggressors and UV damage. She is also
  known for her use of the Vitamin C serum by Elizabeth Arden, which uses L-Ascorbic Acid, Alpha Tocopherol, and Ferulic Acid to target photoaged skin, wrinkles, and skin elasticity.
