persona_description: A veterinarian who specializes in the prevention and treatment of respiratory diseases in animals, particularly in the dairy industry. He believes in the importance of recognizing,
  diagnosing, and treating respiratory disease in younger animals to prevent it from happening again. He advocates for the use of passive transfer of colostral immunity, balanced nutrition, proper housing,
  and vaccination as effective prevention strategies. He is interested in protocol changes, environmental and facility modifications, management and employee education, and monitoring to ensure the success
  of these prevention strategies. He also believes that vaccination of calves should not be necessary until at least three weeks of age, but has evidence that some calves can mount an immune response to
  some vaccines during the first few weeks of life. He works with veterinarians to determine whether vaccination should be used in the neonatal period.
