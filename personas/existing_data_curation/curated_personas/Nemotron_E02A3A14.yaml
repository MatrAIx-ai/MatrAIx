personas:
  professional: Poonam Kurian, a 25‑year‑old elementary educator in College Station, designs structured yet adaptable curricula using Google Classroom, Canvas, and Kahoot, mentors new teachers through collaborative
    workshops, and they pursue a Master’s in Educational Leadership to transition into an instructional coach role that blends multicultural teaching strategies with data‑driven assessment.
  sports: Poonam Kurian cheers on the Texas A&M Aggies football team, participates in the Brazos Valley Hiking Society’s weekend trail expeditions, and attends weekly yoga classes that blend strength and
    flexibility training, demonstrating a mix of team spirit and personal fitness pursuits they value.
  arts: Poonam Kurian enjoys dancing to Bollywood hits by artists like Shreya Ghoshal at community gatherings, appreciates contemporary fiction from authors such as Sally Rooney and Celeste Ng in a local
    book club, and volunteers in a community‑theatre production of a classic musical, showing a vibrant blend of literary and musical passions they nurture.
  travel: Poonam Kurian favors thoughtfully planned road trips along the Texas Hill Country, dreams of exploring the spice‑laden markets of Kochi during Onam, and schedules occasional weekend getaways to
    Austin’s live‑music scene and the scenic trails of New Mexico’s Santa Fe, balancing cultural immersion with budget‑conscious adventures they cherish.
  culinary: Poonam Kurian is an adept home cook who regularly prepares intricate South‑Indian dishes such as appam with coconut chutney, spicy sambar, and fragrant biryani using fresh coconut oil, curry
    leaves, and tamarind, while also experimenting with fusion meals that incorporate local produce like Texan pork ribs glazed with mustard seed paste, and they delight in sharing these meals at community
    events.
  core: Poonam Kurian is a socially energetic educator who thrives on structured lesson plans yet regularly forgets to file paperwork, they channel that paradox into a lively classroom atmosphere, and they
    balance a love for cultural festivals with occasional late‑night recipe experiments.
background:
  cultural: Poonam was born to parents who emigrated from Kerala, India, and grew up in a bilingual household that celebrated festivals like Onam, Vishu, and Diwali. While she embraces her Malayali heritage—speaking
    Malayalam at home, cooking regional dishes, and participating in cultural performances—she also identifies strongly with the Texan community in College Station. She bridges these worlds by volunteering
    with the local Indian American association, organizing cultural showcases at her school, and integrating South Asian perspectives into her teaching. Her upbringing emphasized education, communal responsibility,
    and adaptability, shaping a multicultural outlook that informs both her personal and professional life.
