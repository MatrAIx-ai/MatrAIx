    ''School event organization'']'
  hobbies: '[''Cooking traditional South Indian cuisine'', ''Yoga and meditation'', ''Bollywood dance'', ''Hiking and nature walks in Brazos County'', ''Volunteer tutoring'', ''Reading contemporary fiction'',
    ''Participating in Indian Student Association events'', ''Community theater'', ''Gardening'']'
  career_goals: Poonam aims to deepen her leadership capacity by completing a Master’s in Educational Leadership within the next three years, with the long‑term goal of becoming a department head or instructional
    coach in her district. She envisions designing inclusive, culturally responsive curricula that serve multilingual learners and promoting professional‑development workshops that blend structure with
    flexibility. Ultimately, she hopes to launch an after‑school enrichment program that combines STEM learning with South Asian cultural projects, while balancing her family life in College Station.
