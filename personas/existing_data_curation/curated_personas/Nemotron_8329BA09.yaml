  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Sketching/drawing'', ''Live music concerts'', ''Improvisational theater'', ''Hiking and trail running'', ''Exploring new restaurants
    and food trucks'', ''Spontaneous road trips'', ''Reading (psychology, design, philosophy)'', ''Collecting vinyl records'']'
  career_goals: Raymond aims to advance to a regional sales director role within the next three years, overseeing multiple territories and expanding his influence on corporate sales strategy. He seeks to
    champion innovative, art‑inspired marketing campaigns that blend storytelling with data analytics, positioning his organization as a creative market leader. In the longer term, he envisions launching
    his own boutique sales consultancy that helps emerging brands develop unconventional growth tactics while mentoring the next generation of sales professionals. Balancing his ambition with personal fulfillment,
    he also aspires to achieve a healthier work‑life equilibrium that allows more spontaneous travel and artistic pursuits.
