  career_goals: Although retired from formal employment, Nicole aims to leave a lasting cultural imprint on Wadmalaw Island. She plans to develop a permanent community art and history program that combines
    local storytelling, exhibitions, and hands‑on workshops for children and seniors. She hopes to complete a digital archive of the island’s oral histories and photograph its natural landscapes, eventually
    publishing a coffee‑table book. Additionally, she aspires to compete in regional senior art contests, launch a small line of handcrafted home décor items, and travel to three major art museums—such
    as the Getty, the Met, and the Smithsonian—to deepen her appreciation of art and bring new ideas back to her community.
