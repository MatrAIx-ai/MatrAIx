personas:
  professional: Nicole Brown is a retired community organizer who leverages their strong interpersonal communication, meticulous budgeting, and basic digital media skills to coordinate island events, while
    their innate curiosity and competitive drive inspire them to develop a permanent art and history program, digitize oral histories, and pursue senior art contest titles.
  sports: Nicole Brown is an energetic early‑morning walker who belongs to the Wadmalaw Island Kayak Club, cheers on the Charleston Battery soccer team, plays occasional senior softball with the Lowcountry
    Legends league, and incorporates gentle stretching and water‑based exercises to keep their arthritis manageable.
  arts: Nicole Brown channels their love for watercolor into sunrise scenes inspired by Monet, sways to the soulful blues of B.B. King, volunteers at the Charleston Community Arts Center guiding seniors
    in folk‑dance inspired quilting, and regularly attends performances by the Charleston Symphony Orchestra.
  travel: Nicole Brown prefers meticulously planned cultural trips, having already explored Charleston’s historic district, Savannah’s riverfront, and the Getty Museum in Los Angeles, while their love for
    art fuels dreams of future pilgrimages to the Met in New York, the Smithsonian in Washington, and a week wandering the galleries of Florence.
  culinary: Nicole Brown revels in reinventing classic Lowcountry dishes like shrimp and grits and crab cakes by infusing garden herbs such as thyme, lemon balm, and dill, skillfully prepares dark‑spiced
    gumbo for friends, and indulges nightly in a slice of sweet potato pie, while their sweet tooth occasionally rewards them with a glass of local Muscadine wine after a successful community event.
  core: Nicole Brown is a curious, competitive community champion who habitually double‑checks every event flyer before committing, yet can’t resist a midnight replay of their favorite blues record and
    a second helping of pecan pie.
background:
  cultural: Nicole was raised in a small town in the Lowcountry of South Carolina, steeped in Southern hospitality, church community, and a deep connection to the coastal environment. Her family emphasized
    traditional values such as family gatherings, seasonal cooking, and respect for nature. Growing up near Charleston, she developed an appreciation for the region’s rich history, including the Gullah
    heritage that surrounds her island home. While identifying as a white Southern American, Nicole actively embraces the multicultural tapestry of Wadmalaw Island—celebrating local festivals, supporting
    community arts, and honoring the oral histories of both longtime residents and the neighboring African‑American communities.
