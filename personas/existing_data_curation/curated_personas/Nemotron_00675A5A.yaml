personas:
  professional: Gabriela Feliu, a retired community volunteer and seasoned home chef, harnesses their vivid imagination to co‑lead intergenerational storytelling circles, organize cultural celebration events,
    and mentor youth in cooking and crafts, all while embracing a flexible, occasionally disorganized approach to planning.
  sports: Gabriela Feliu enjoys daily waterfront walks, participates in a senior walking club that meets at the local promenade, casually follows the Los Angeles Dodgers and the Los Angeles Lakers on game
    nights, and occasionally joins low‑impact stretch classes at the community center.
  arts: Gabriela Feliu practices watercolor painting of botanical subjects, creates intricate papel picado banners, draws inspiration from Georgia O'Keeffe’s floral studies and the expressive self‑portraits
    of Frida Kahlo, and often relaxes to the romantic ballads of José José and the classic boleros of Lucho Gatica.
  travel: Gabriela Feliu prefers leisurely trips to coastal towns such as Santa Barbara, the historic missions of San Juan Capistrano, and the seaside villages of the Mediterranean, planning most journeys
    on a whim with a modest budget, while also enjoying virtual journeys through poetry and photography.
  culinary: Gabriela Feliu loves cooking traditional regional dishes like a complex dark sauce made with chilies and chocolate, stuffed corn husk parcels, and citrus‑marinated fish, skillfully adapting
    recipes for a senior palate by reducing spice levels and emphasizing fresh herbs such as cilantro, epazote, and hoja santa, while also experimenting with herb garden harvests like oregano and spearmint
    to create new flavor combinations.
  core: Gabriela Feliu is a gentle, imaginative elder whose days weave watercolor, fragrant herbs, cherished stories, and occasional forgetfulness about appointments into a steadfast commitment to preserving
    their family’s legacy.
background:
  cultural: Gabriela was born to Mexican immigrant parents who settled in Southern California during the 1940s. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Semana
    Santa, and quinceañeras with reverence. Bilingual in Spanish and English, she grew up in a household where Mexican folklore, Catholic rituals, and communal meals were central. Living in Long Beach,
    she participates in the vibrant Mexican‑American community, attending local festivals at the Long Beach Plaza and contributing to cultural programs at the senior center. Her identity blends the rich
    heritage of her Mexican roots—especially the culinary and artistic customs of her parents' home region—with the multicultural influences of Southern California, fostering a deep respect for familial
    bonds and community harmony.
