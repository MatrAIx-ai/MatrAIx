  hobbies: '["Watercolor painting","Papel picado and textile crafting","Herb gardening","Reading poetry and magical realism","Traditional Mexican cooking","Listening to boleros and mariachi music","Walking
    along the waterfront","Small-group storytelling sessions"]'
  career_goals: Although retired from formal employment, Gabriela aims to deepen her artistic practice by learning mixed‑media techniques and to complete a memoir that weaves together her family’s migration
    story, culinary traditions, and the cultural changes she has witnessed in Long Beach. She wishes to mentor her grandchildren and nearby youth in both cooking and crafts, helping preserve Mexican heritage.
    Gabriela also aspires to co‑lead a community mural project that celebrates Día de los Muertos and to serve as an informal cultural liaison at her local senior center, ensuring that older Mexican‑American
    residents feel heard and valued.
