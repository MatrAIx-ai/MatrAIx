  hobbies: '[''Building LEGO sets'', ''Reading Magic Tree House books'', ''Drawing and coloring'', ''Playing soccer'', ''Helping in the kitchen'', ''Attending library storytime'', ''Doing puzzles'', ''Listening
    to children’s music'']'
  career_goals: Peggy dreams of becoming a teacher because she loves the order of a classroom, enjoys helping classmates understand new ideas, and wants to create a safe, predictable environment where every
    child feels supported. She also imagines caring for animals as a veterinarian, appreciating the clear step‑by‑step care plans. Her long‑term ambition is to grow into a caring professional who combines
    her love for structure with empathy, helping others feel secure and understood.
