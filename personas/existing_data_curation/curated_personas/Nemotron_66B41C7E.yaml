personas:
  professional: Peggy Anderson, a budding LEGO architect in training, channels their love for clear plans and detail into designing intricate models, while their practical mindset and need for predictability
    make them reliable contributors to group projects at school.
  sports: Peggy Anderson thrives in organized soccer games with the neighborhood U‑8 league, cheering for the local team the River City Rapids and idolizing Lionel Messi, and during the off‑season practices
    basic gymnastics at the community center to stay active.
  arts: Peggy Anderson expresses creativity through detailed drawings of feelings, enjoys listening to The Wiggles and Disney’s “Frozen” soundtrack, and often re‑creates scenes from Mo Willems' books, finding
    comfort in the familiar rhythms and bright colors of these artists.
  travel: Peggy Anderson loves family road trips to nearby state parks for weekend hikes, dreams of visiting the LEGO House in Billund, Denmark, and frequently revisits the local children's museum, preferring
    structured itineraries that include time for drawing in new surroundings.
  culinary: Peggy Anderson helps in the kitchen by measuring flour for chocolate chip cookies, mixing pancake batter, and enjoys savoring simple dishes like mac and cheese, buttered toast with jam, and
    their favorite vegetable—sweet peas—while sometimes forgetting to clean up their spills promptly.
  core: Peggy Anderson is a structured, detail‑oriented 7‑year‑old who balances creative LEGO builds and soccer with occasional anxiety spikes and a habit of stashing spare change for future treats.
background:
  cultural: Peggy is raised in a middle‑class white family in Milwaukee, Wisconsin, reflecting typical Midwestern values of community involvement, punctuality, and a respect for routine. Her household celebrates
    seasonal holidays such as Thanksgiving, Christmas, and Halloween, and often participates in local events like summer fairs and neighborhood block parties. The family occasionally enjoys Milwaukee’s
    German heritage through foods like bratwurst and pretzels and may attend a local church for community gatherings. At her public elementary school, Peggy experiences a diverse environment while her home
    life emphasizes structure, politeness, and a balanced mix of individual time and family activities.
attributes:
  skills: '[''Early reading'', ''Basic addition and subtraction'', ''Following structured daily routines'', ''Organizing school supplies'', ''Drawing and coloring to express emotions'', ''Building LEGO
