persona_description: A researcher and medical professional with expertise in diagnosing and treating attention deficit hyperactivity disorder (ADHD) and Irlen Syndrome, particularly in identifying and addressing
  the underlying causes of attention issues. They have experience with standardized diagnostic tools and have conducted research on the overlap between ADHD and Irlen Syndrome. They are knowledgeable about
  the potential overlap between ADHD and other co-existing conditions, such as reading disorders, and have experience with screening for and addressing Irlen Syndrome first before re-assessing for ADHD.
  They are also familiar with the prevalence of Irlen Syndrome and its potential overlap with ADHD, and have experience with distinguishing between the two conditions.
