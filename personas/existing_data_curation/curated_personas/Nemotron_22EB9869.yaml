  career_goals: Looking ahead, John aims to transition into senior operational leadership, such as Plant Manager or Director of Operations, where he can shape safety culture and drive efficiency across
    a portfolio of assets. He seeks professional licensure as a Professional Engineer and intends to spearhead the adoption of advanced drilling technologies, including automated rig controls and data‑driven
    predictive maintenance, to reduce operational risk. Over the next five years, he plans to mentor the next generation of engineers, build a reputation as an industry expert on sustainable production
    practices, and set the stage for a consultancy role after retirement, focusing on risk management and cost optimization for mid‑size energy firms.
