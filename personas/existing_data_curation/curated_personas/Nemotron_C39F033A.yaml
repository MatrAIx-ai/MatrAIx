  hobbies: '[''Visiting art galleries and museums'', ''Volunteering as a docent'', ''Watercolor painting'', ''Photography of desert landscapes'', ''Gardening (succulents and herbs)'', ''Senior book club
    (art history, mystery, self‑help)'', ''Experimental cooking and recipe sharing'', ''Gentle desert hiking'', ''Chair yoga for stress relief'', ''Knitting for charity'']'
  career_goals: As she approaches retirement, Diana aims to transition to a part‑time advisory role where she can mentor younger sales professionals and share her proven methodologies. She hopes to formalize
    a mentorship program within her company and become a senior consultant for service‑industry sales strategies. Additionally, she plans to establish a community‑based art workshop that blends her love
    of art with her organizational skills, offering weekly classes for seniors in Laveen. Financial security and a balanced lifestyle are also priorities, so she seeks to reduce workplace stress by delegating
    routine tasks and focusing on high‑impact, legacy‑building projects before fully retiring.
