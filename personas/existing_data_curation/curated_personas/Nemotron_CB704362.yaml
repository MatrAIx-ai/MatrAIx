personas:
  professional: Juan Sulca, an industrial engineer specializing in occupational health and safety and lean manufacturing, leverages his analytical background and advanced CAD and data tools to design ergonomic
    workstations and drive continuous improvement while balancing curiosity for emerging safety tech with a practical, results‑oriented approach.
  sports: Juan Sulca, a dedicated cyclist with the Bartow County Cyclists club, rides the local mountain trails six times a week, joins weekend hikes in the Appalachian foothills, and avidly follows the
    Atlanta Falcons, Atlanta Hawks, and Atlanta United FC, while occasionally playing pick‑up soccer with his community group.
  arts: Juan Sulca immerses himself in the rhythmic world of merengue and bachata, regularly streaming Juan Luis Guerra, Aventura, and Romeo Santos, while also appreciating the visual storytelling of Lin‑Manuel
    Miranda’s Broadway productions and the soulful murals of Diego Rivera, which feed his cultural pride and creative respite.
  travel: Juan Sulca prefers meticulously planned family road trips, having explored Asheville, North Carolina, Savannah, Georgia, and Charleston, South Carolina, and dreams of vacationing in Barcelona,
    Spain, and Lisbon, Portugal, balancing adventure with comfort by booking boutique hotels that offer kid‑friendly amenities.
  culinary: Juan Sulca, an accomplished home chef, expertly prepares traditional dishes like mangú, sancocho, and arroz con habichuelas using plantains, yuca, and cilantro, enjoys experimenting with adobo
    and achiote for flavor depth, but admits to a habit of over‑salting sauces when distracted by his latest DIY project.
  core: Juan Sulca blends a data‑driven safety engineering career with a love for cycling, cooking Dominican classics, and understated cultural celebrations, all while juggling disciplined finances, occasional
    health neglect, and a quiet, sometimes stubborn, personality.
background:
  cultural: Juan Pedro was born to Dominican parents who immigrated to the United States when he was a child. Growing up in a bilingual household, he retains fluency in Spanish and a deep appreciation for
    Dominican music, food, and family values. The strong emphasis on communal support, respect for elders, and celebration of cultural traditions shapes his interpersonal style and sense of responsibility.
    Living in Acworth, GA, he blends Caribbean heritage with Southern hospitality, participating in local Dominican festivals and volunteering with church groups, while also adapting to the regional work
    ethic and community ethos.
