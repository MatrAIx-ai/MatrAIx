  career_goals: Juan Pedro aims to become a senior safety engineering leader within the next five years, obtaining the Certified Safety Professional (CSP) credential and a Professional Engineer (PE) license.
    He plans to spearhead enterprise-wide safety culture initiatives, integrate IoT-enabled monitoring systems, and mentor junior engineers. Long-term, he envisions launching his own consulting practice
    that helps midsized manufacturers in the Southeast adopt sustainable, lean, and safe operations while maintaining profitability. He also wants to balance career advancement with family stability, ensuring
    his children have access to quality education.
