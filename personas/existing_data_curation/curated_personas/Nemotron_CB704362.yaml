  hobbies: '[''Cooking Dominican Cuisine'', ''Playing Güira'', ''Listening to Merengue & Bachata'', ''Cycling'', ''Hiking'', ''DIY Home Improvement'', ''Reading Engineering & Safety Journals'', ''Community
