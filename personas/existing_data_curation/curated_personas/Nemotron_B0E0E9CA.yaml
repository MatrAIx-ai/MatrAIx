  hobbies: '[''Digital painting'', ''Experimental photography'', ''Arduino/Raspberry Pi tinkering'', ''Reading science‑fiction and philosophy'', ''Journaling'', ''Gardening'', ''Volunteering for senior
    tech workshops'', ''Board‑game nights with friends'', ''Visiting local art museums'']'
  career_goals: Approaching retirement, Kyle aims to transition from day‑to‑day ticket resolution to a mentorship and consulting role. He hopes to design and lead a community‑based digital‑literacy program
    for seniors in the St. Louis area, while offering part‑time freelance support to small local businesses that need a bridge between technology and business strategy. Additionally, he envisions collaborating
    on a small‑scale art‑tech project that merges his love of abstraction with interactive digital installations for local galleries.
