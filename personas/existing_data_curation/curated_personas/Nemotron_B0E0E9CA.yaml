personas:
  professional: Kyle Watts, a 64-year-old veteran computer support specialist, blends three decades of hardware diagnostics, network configuration, and business-savvy scripting with an imaginative curiosity
    that fuels innovative mentorship programs, while they occasionally let project timelines become loosely organized due to a laid-back attitude.
  sports: Kyle Watts, an avid supporter of the St. Louis Cardinals and occasional follower of the St. Louis Blues, spends weekends strolling through Forest Park, joins a senior pickleball league at the
    nearby YMCA, and occasionally participates in local charity walks that benefit community health programs.
  arts: Kyle Watts, a digital painting and experimental photography enthusiast, frequents the St. Louis Art Museum and the Contemporary Art Museum, draws creative inspiration from abstract expressionist
    Jackson Pollock and black-and-white photographer Ansel Adams, and fills evenings listening to classic blues legends like B.B. King and local jazz quartets while sketching futuristic sci-fi landscapes.
  travel: Kyle Watts prefers relaxed, self-driven road trips across the Midwest, having explored Nashville's music scene, Austin's tech community, and the scenic Ozark foothills, where they pause often
    to capture experimental photographs before planning a future pilgrimage to the historic jazz districts of New Orleans.
  culinary: Kyle Watts, an adept backyard grill master, relishes St. Louis-style pork ribs, toasted ravioli, and fresh garden tomatoes tossed into a simple bruschetta, enjoys crafting homemade salsa with
    locally grown peppers, and occasionally dabbles in sous-vide fish, though they admit to favoring straightforward, smoky flavors over intricate culinary techniques.
  core: Kyle Watts, a curious and compassionate 64-year-old technologist, blends digital art, gardening, and senior mentorship into a warm, community-focused life, while habitually misplacing their glasses
    and letting paperwork pile up until the last minute.
background:
  cultural: Kyle grew up in the suburbs of St. Louis, Missouri, in a family of German‑American heritage that valued hard work, community, and modesty. The Midwestern cultural milieu—marked by a friendly,
    down‑to‑earth demeanor, a love for regional barbecue, and devotion to the St. Louis Cardinals—shaped his relaxed, cooperative outlook. His upbringing in a predominantly Protestant environment emphasized
    service to others, which dovetails with his compassionate nature. These regional and familial influences blend with the diverse cultural fabric of the St. Louis area, giving him an appreciation for
    jazz, blues, and the city’s immigrant history, while grounding him in the practical sensibilities of a Midwestern professional.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Network diagnostics'', ''Data backup and recovery'', ''Business process analysis'', ''Technical documentation'',
