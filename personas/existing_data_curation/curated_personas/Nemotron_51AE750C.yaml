  career_goals: Although nearing traditional retirement age, Gregory plans to shift toward part‑time consulting, offering his expertise to local builders focused on historic preservation. He aims to establish
    a small community workshop where he can teach traditional woodworking techniques to a new generation, preserving Kentucky’s craftsmanship heritage. He also hopes to co‑author a guidebook on sustainable
    carpentry practices for rural homeowners and to ensure a comfortable financial future for his wife, possibly passing his tools and knowledge to a trusted former apprentice.
