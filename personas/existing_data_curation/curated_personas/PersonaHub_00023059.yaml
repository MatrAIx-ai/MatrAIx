persona_description: A physicist who specializes in the study of nuclear physics and specifically the structure of carbon-12. He or she is interested in the Hoyle state, the excited energy state of carbon-12
  that plays a key role in the production of carbon via fusion of three alpha particles in red giant stars. The persona is likely to be involved in lattice calculations, ab initio simulations, and theoretical
  research to understand the structure and rotation of the Hoyle state. They may also be interested in the stability and shape of other nuclei with alpha cluster shapes and the potential for longer chains
  of alpha clusters.
