personas:
  professional: Ahad Kalaria, a veteran heavy equipment operator in Queens, blends decades of hands‑on machinery expertise with meticulous adherence to safety protocols and a pragmatic, routine‑driven work
    ethic, making them the go‑to person for on‑site repairs and reliable project scheduling.
  sports: Ahad Kalaria follows cricket passionately, cheering for the Kolkata Knight Riders and the Pakistan national team, attends occasional New York Mets baseball games, participates in weekly morning
    walks at Socrates Sculpture Park, and joins a local seniors’ badminton group at the Astoria community center.
  arts: Ahad Kalaria relaxes to classic Bollywood and Urdu melodies by legends such as Lata Mangeshkar, Kishore Kumar, and Ghulam Ali, enjoys watching Raj Kapoor’s films on television, and attends cultural
    performances by South Asian dance troupes during Astoria’s heritage festivals.
  travel: Ahad Kalaria prefers well‑planned, short‑duration trips that blend family time and cultural immersion, having visited Delhi and Toronto for cousin reunions while dreaming of a leisurely pilgrimage
    to the historic shrines of Mecca with their adult children when health permits.
  culinary: Ahad Kalaria takes pride in preparing aromatic biryani with saffron, basmati rice, and marinated chicken, and hand‑rolled roti using whole‑wheat dough, regularly flavors dishes with cumin, cardamom,
    and fresh cilantro, while also experimenting with roasted balcony herbs like mint and rosemary for side salads.
  core: Ahad Kalaria blends decades of gritty construction know‑how with a steadfast love for family‑centered cooking, cricket chants, and meticulous routines, yet occasionally forgets to water their balcony
    garden when a repair job runs late.
background:
  cultural: Ahad belongs to a South Asian Muslim family, originally from Pakistan, that settled in Queens during the 1980s. His upbringing emphasized respect for elders, strong family ties, and adherence
    to religious practices such as Ramadan fasting and celebrating Eid al‑Fitr and Eid al‑Adha. Fluent in Urdu and English, he balances the values of his heritage—discipline, hospitality, and practicality—with
    the multicultural environment of Astoria. He remains closely connected to the local South Asian community, participating in cultural gatherings, supporting neighborhood businesses, and passing on traditions
    to his children while embracing the broader American way of life.
attributes:
  skills: '[''Heavy equipment operation (excavators, backhoes, bulldozers, skid‑steer loaders)'', ''Preventive maintenance and minor mechanical repairs'', ''Safety compliance and OSHA regulations'', ''Basic
    blueprint and work order interpretation'', ''Team coordination and communication on site'', ''Load management and logistics'', ''Basic welding and metalwork'', ''Equipment inspection and documentation'',
    ''Effective time management'', ''Mechanical troubleshooting'']'
  hobbies: '[''Watching cricket'', ''Cooking traditional South Asian meals'', ''Gardening herbs and vegetables'', ''Attending community and mosque events'', ''Walking in local parks'', ''Reading newspapers'',
    ''DIY home‑repair projects'', ''Listening to Bollywood and Urdu music'']'
  career_goals: Approaching retirement, Ahad aims to transition from full‑time operation to a mentorship role, formally training younger apprentices within his crew and sharing his practical expertise.
    He is interested in part‑time consulting for small contractors, helping them select and maintain equipment efficiently. Additionally, he hopes to start a modest equipment‑rental side business that leverages
    his network, providing a steady supplemental income while allowing him to maintain a routine that supports his health and family responsibilities.
