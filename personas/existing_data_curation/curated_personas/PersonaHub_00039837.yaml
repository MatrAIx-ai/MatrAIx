persona_description: A voice teacher who specializes in teaching singing and breathing techniques, and has a deep understanding of the connection between the two. She has experience working with singers
  and has found that many of them struggle with breathing correctly, leading to poor singing tone and breath control. She is knowledgeable about the anatomy of the vocal cords and how they are related to
  breathing, and has developed a prescription for singers to relax their passageway and keep it open. She is passionate about helping singers improve their singing technique and breathing skills, and is
  dedicated to teaching them how to breathe with a free and natural flow.
