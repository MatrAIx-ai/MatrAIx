personas:
  professional: Jermaine Montoban is a retired systems engineer with a Ph.D. in applied physics, and they now channel three decades of avionics and control‑systems expertise into home‑automation inventions,
    DIY electronics repair, and mentorship at the Columbia makerspace, balancing their relentless curiosity with a laid‑back, sometimes disorganized, project‑planning style.
  sports: Jermaine Montoban enjoys weekly pickleball matches at the Columbia Senior Sports Club, follows the Carolina Panthers and the Charlotte Hornets, and they compete in seasonal fishing tournaments
    on Lake Murray during the summer, while occasionally joining a local senior golf league in the cooler months.
  arts: Jermaine Montoban frequently attends live jazz sets by the Palmetto Jazz Ensemble and blues nights featuring local talents like Deacon Blue, and their bookshelf is filled with science‑fiction classics
    from Isaac Asimov, Arthur C. Clarke, and Octavia Butler, while they occasionally watch classic films starring Gene Wilder and modern sci‑fi blockbusters starring Keanu Reeves.
  travel: Jermaine Montoban has road‑tripped to New Orleans for its vibrant jazz scene, explored the historic streets of Washington, D.C., hiked the Blue Ridge Mountains near Asheville, and they dream of
    witnessing the aurora borealis in Iceland, though their fixed retirement income and desire for family time keep most trips within a few hours’ drive of Columbia.
  culinary: Jermaine Montoban relishes cooking Southern barbecue, perfecting a dry‑rubbed pork shoulder smoked with hickory chips, pairing it with collard greens, cornbread, and a tangy vinegar‑based slaw,
    while they also experiment with homemade pickles and occasionally brew craft beer to accompany their weekend fish‑taco gatherings.
  core: Jermaine Montoban blends a lifelong engineer’s curiosity with a relaxed, sometimes chaotic, approach to life, turning vintage radios and model rockets into community projects, and they never miss
    a chance to fire up the grill and argue the merits of the latest AI‑driven renewable‑energy hack.
background:
  cultural: Born and raised in the heart of the American South, Jermaine grew up in a close‑knit African‑American community where church, family, and resilience shaped his identity. He is steeped in the
    traditions of gospel music, Southern soul food, and the oral histories of the civil‑rights era that his parents experienced. The communal values of hospitality and mutual support, combined with a strong
    emphasis on self‑reliance, have informed his pragmatic outlook. While he values the cultural heritage of the Black Southern South—including storytelling, barbecuing, and the legacy of historically Black
    schools—he also embraces his role as a bridge between his cultural roots and the modern STEM world, often volunteering to inspire the next generation of Black engineers.
