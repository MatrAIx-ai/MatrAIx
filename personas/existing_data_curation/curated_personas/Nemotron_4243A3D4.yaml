  hobbies: '["Model rocket building", "Vintage radio restoration", "Vegetable gardening", "Chess", "Reading science fiction and popular science", "Live jazz and blues concerts", "Fishing on Lake Murray",
    "Southern barbecue cooking", "DIY home automation projects"]'
  career_goals: Jermaine aims to leverage his decades of engineering experience to give back to his community by establishing a neighborhood makerspace where seniors and youth can collaborate on practical
    tech projects. He also plans to document his personal research on integrating AI with small‑scale renewable energy systems for home use, with the goal of publishing a whitepaper. Additionally, he hopes
    to mentor at least ten high‑school students from under‑represented backgrounds each year, and to launch a YouTube channel showcasing step‑by‑step DIY projects that blend curiosity with real‑world utility.
