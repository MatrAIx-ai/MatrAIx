  career_goals: William aims to transition into a senior technical leadership role—such as Solutions Architect, Tech Lead, or CTO—where he can guide digital transformation initiatives for regional businesses
    in Cabarrus County. He wants to champion the adoption of cloud‑native and AI‑driven solutions while keeping projects practical and aligned with business goals. Mentoring is a core ambition; he plans
    to expand community coding workshops and perhaps author a technical guide on balancing innovation with reliability. Recognizing his sensitivity to stress, he also seeks a balanced work environment that
    offers flexibility, remote work options, and a healthy work‑life integration.
