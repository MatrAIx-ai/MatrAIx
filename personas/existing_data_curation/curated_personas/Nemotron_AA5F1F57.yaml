personas:
  professional: An aspiring visual artist, Blanca Valdes, blends manga‑style characters with watercolor prairie scenes, channeling her curious, organized yet flexible mindset into school art projects and
    her role as an after‑school art mentor.
  sports: A weekend sports enthusiast, Blanca Valdes plays intramural soccer for her high school, follows the Kansas City Chiefs and the Dallas Mavericks, and participates in community badminton sessions,
    though she often prefers a quiet art studio over extended practice.
  arts: A passionate creative, Blanca Valdes spends evenings drawing manga‑inspired heroes, painting watercolor landscapes that weave folk motifs with prairie vistas, devouring speculative fiction like
    "The Fifth Season" and graphic novels such as "Saga," while listening to regional folk ballads, indie bands like Vampire Weekend, and classic Latin ballads, and mentors younger children in art classes.
  travel: An inquisitive traveler, Blanca Valdes enjoys weekend trips to nearby state fairs and family road trips to border towns for cultural festivals, dreams of exploring Oaxaca’s vibrant celebrations
    and Kyoto’s historic temples, and prefers to plan itineraries with hand‑drawn maps while balancing school responsibilities.
  culinary: A budding home chef, Blanca Valdes delights in preparing tamales and sopes with masa, chilies, beans, and avocado, experiments with colorful plating, and also savors Kansas barbecue brisket
    and fresh corn, though she occasionally overcooks the rice.
  core: Blanca Valdes fuses vibrant folk patterns with prairie hues, mentors young artists with quiet dedication, and loses track of time whenever her sketchbook opens, all while juggling school, savings,
    and seasonal allergies.
background:
  cultural: Blanca was raised in a bilingual Mexican household in Olathe, Kansas. She grew up celebrating Día de los Muertos, Las Posadas, and Mexican Independence Day with her parents and grandparents
    while also participating in local American holidays. The vibrant Mexican traditions, combined with the Midwestern environment, shaped her artistic sensibilities, leading her to incorporate bright colors,
    folkloric patterns, and prairie motifs into her work. She values family cohesion, community service, and the blending of two cultures, which informs her perspective on identity, creativity, and her
    desire to contribute positively to both her Mexican heritage and her Kansas community.
attributes:
  skills: '["Digital illustration (Krita, Procreate)", "Traditional sketching and watercolor", "Conversational Spanish", "Small-group activity coordination", "Time management and self‑directed learning"]'
  hobbies: '["Watercolor painting", "Digital sketching and illustration", "Listening to Mexican folk and indie music", "Reading speculative fiction and graphic novels", "Cooking traditional Mexican dishes
    with family", "Volunteering as an assistant art mentor at the community center"]'
  career_goals: Blanca aims to graduate high school with a robust art portfolio and earn a scholarship to study graphic design or illustration at a university. She dreams of creating culturally informed
    visual storytelling that supports community organizations, and eventually hopes to mentor younger children in her Hispanic community through after‑school art workshops. In the long term, she envisions
    a career that bridges her Mexican heritage and contemporary design practice, possibly working as a graphic designer for cultural nonprofits or a freelance illustrator for multicultural publications.
