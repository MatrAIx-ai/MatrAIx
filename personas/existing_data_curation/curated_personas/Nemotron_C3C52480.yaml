  career_goals: Crystal aims to enroll in an associate degree program in graphic design at a local community college, building a professional portfolio that merges her love of fine art with digital media.
    In the short term she hopes to secure a part-time internship at a design studio or a nonprofit arts organization where she can apply her event-planning experience and refine client communication skills.
    Long-term, she envisions a career as a graphic designer or visual communications specialist for a museum or community arts nonprofit, eventually leading community-engagement programs that use art as
    a therapeutic tool. She also plans to develop a modest freelance business offering custom illustrations and photography services, providing financial independence while maintaining flexibility.
