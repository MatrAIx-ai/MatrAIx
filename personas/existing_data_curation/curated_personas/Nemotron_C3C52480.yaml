personas:
  professional: A budding graphic designer, Crystal Dion blends watercolor and charcoal techniques with Procreate and Adobe Illustrator to craft community‑centric visuals, while her organized yet flexible
    approach and compassionate assertiveness shine in planning art fairs and managing freelance client communication, even as she battles occasional anxiety about meeting tight deadlines.
  sports: An outdoor‑enthusiast, Crystal Dion spends weekends hiking the Hocking Hills and joining a local trail‑running group, follows the Columbus Crew SC for soccer and cheers the Ohio State Buckeyes
    during football season, and balances her fitness routine with bi‑weekly yoga classes, preferring low‑impact activities that soothe her anxiety rather than intense gym sessions.
  arts: A fervent participant in Columbus’s art scene, Crystal Dion frequents the Wexner Center for the Arts, sketches plein‑air inspired by Van Gogh’s brushwork, curates Instagram stories featuring local
    muralist projects, playlists indie folk icons like Iron & Wine and Sufjan Stevens while painting, and draws creative inspiration from the poetic films of Greta Gerwig.
  travel: A budget‑savvy explorer, Crystal Dion has day‑tripped to Ohio’s Hocking Hills and weekend‑escaped to Asheville’s art districts, dreams of strolling the Louvre in Paris and the Uffizi in Florence,
    plans trips using Google Flights and Airbnb while juggling freelance gigs, and prefers a blend of structured itineraries and spontaneous photo‑walks to capture everyday moments.
  culinary: A modest home‑cook with a farm‑to‑table palate, Crystal Dion loves preparing quinoa‑avocado bowls, roasting beet hummus with fresh herbs, brewing single‑origin pour‑over coffee in the mornings,
    and experimenting with seasonal produce from the Columbus Farmers Market, though she occasionally over‑spices dishes in her zeal for bold flavors.
  core: Crystal Dion, a 23‑year‑old creative spirit, balances a habit of over‑buying art supplies with meticulous budgeting, channels her anxiety into yoga‑fueled art, and dreams of turning community art
    into a therapeutic career.
background:
  cultural: Crystal grew up in a middle-class, predominantly white Midwestern family in Columbus, Indiana. Her upbringing was shaped by small-town values of community, modesty, and self-reliance, with strong
    ties to local churches and school sports events. Family gatherings around holidays such as Thanksgiving and Christmas emphasized togetherness, home-cooked meals, and tradition. The region’s appreciation
    for folk art, local theater, and community festivals nurtured her artistic curiosity. While rooted in Midwestern culture, she also embraces broader American art movements through school art classes,
    online tutorials, and occasional visits to museums in Indianapolis.
