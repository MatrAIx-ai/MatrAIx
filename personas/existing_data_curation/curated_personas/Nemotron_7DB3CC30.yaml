personas:
  professional: Colby Reyna, a 66‑year‑old security veteran with decades of casino surveillance expertise, blends methodical pattern analysis with a calm, competitive edge while they mentor junior guards,
    draft meticulous incident reports, and pursue an advanced electronic surveillance certification to transition into a part‑time consulting role.
  sports: Colby Reyna, an avid supporter of the Seattle Seahawks and Seattle Mariners, rows the Lakeside Anglers Association’s boats for weekend fishing outings, and they join the community center’s senior
    chess league, blending competitive drive with a laid‑back approach to recreation.
  arts: Colby Reyna, a devoted bluegrass enthusiast, regularly attends performances by the Del McCoury Band and Steve Martin & the Steep Canyon Rangers, and they unwind with historical nonfiction by authors
    like David McCullough, weaving these artistic tastes into quiet evenings at home.
  travel: Colby Reyna, a meticulous planner, favors self‑driven road trips to historic sites such as Colonial Williamsburg and the Grand Canyon, enjoys the occasional Mediterranean cruise, yet they balance
    travel ambitions with a modest retirement budget and a strong preference for staying within a few hours’ drive of home.
  culinary: Colby Reyna, a competent home cook, relishes preparing grilled trout with fresh dill and lemon, slow‑cooked brisket seasoned with smoked paprika, and a garden‑fresh salad of heirloom tomatoes
    and basil, and they often pair meals with a cold craft beer from a local brewery.
  core: Colby Reyna, a methodical 66‑year‑old security expert who channels curiosity into woodworking, classic car restoration, and disciplined finance, balances competitive drive with calm composure, a
    penchant for bluegrass, and they maintain a meticulous, occasionally frugal lifestyle.
background:
  cultural: Colby was born and raised in Bowling Green, Kentucky, in a close‑knit, working‑class family with deep ties to the region. His upbringing emphasized self‑reliance, community involvement, and
    respect for local traditions such as county fairs and bluegrass music. Growing up in a predominantly White, rural‑suburban environment, he was influenced by the values of modesty, practicality, and
    a strong work ethic. He identifies with the cultural heritage of western Kentucky, where family gatherings, church participation, and regional cuisine are integral parts of daily life.
attributes:
  skills: '[''Surveillance camera operation'', ''Incident reporting'', ''Risk assessment'', ''Conflict de‑escalation'', ''First aid'', ''Defensive tactics'', ''Emergency evacuation procedures'', ''Data
