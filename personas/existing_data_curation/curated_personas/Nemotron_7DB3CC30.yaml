  hobbies: '[''Woodworking'', ''Classic car restoration'', ''Fishing'', ''Historical non‑fiction reading'', ''Chess'', ''Volunteer work at food bank'', ''Gardening'', ''Bluegrass music festivals'']'
  career_goals: Although nearing retirement age, Colby aims to transition into a mentorship and training role within the security field. He plans to obtain an advanced certification in electronic surveillance
    and to lead a small team of junior guards at the local casino. He is also interested in part‑time consulting for local small businesses seeking risk‑management advice, and hopes to volunteer with the
    county sheriff’s office to support community safety initiatives.
