personas:
  professional: Dea Logan, a seven‑year‑old aspiring junior scientist and puzzle‑solver, blends curiosity with practicality by dissecting mystery books, constructing LEGO robotics, and coding simple games
    for the school science club, all while their competitive nature pushes them to beat siblings at chess.
  sports: Dea Logan plays under‑8 soccer with the Capital City Youth Soccer club, attends weekly swimming lessons at the Washington Aquatic Center, cheers for the Washington Capitals and DC United, and
    treats each practice as a chance to outscore opponents in a competitive spirit.
  arts: 'Dea Logan spends after‑school hours sketching superhero comics, coloring with Crayola sets, binge‑watching Disney Pixar’s Toy Story and the animated series “Avatar: The Last Airbender”, admires
    the illustrations of Oliver Jeffers, and enjoys kid‑friendly pop songs from artists like Kidz Bop and Taylor Swift.'
  travel: Dea Logan loves exploring Washington, DC’s Smithsonian museums, takes nature walks in Rock Creek Park, has visited Boston’s Museum of Science on a school field trip, dreams of a family vacation
    to Disney World in Orlando, and occasionally plans imaginary voyages to the Great Barrier Reef after reading adventure books.
  culinary: Dea Logan prefers macaroni and cheese, chicken nuggets with honey mustard, enjoys helping to make homemade pizza topped with pepperoni, olives, and fresh basil, but is picky about vegetables
    and often hides broccoli in a blended carrot sauce.
  core: Dea Logan is a fiercely curious seven‑year‑old who balances methodical puzzle‑solving with a competitive edge, yet can be surprisingly skeptical about strangers and sometimes forgets to take their
    allergy medication.
background:
  cultural: Dea is a white American child raised in Washington, DC, immersed in a vibrant, multicultural urban environment. While her family’s heritage is predominantly Anglo‑American, she celebrates typical
    American holidays such as Thanksgiving and the Fourth of July and participates in community events. Exposure to the city’s rich cultural institutions, diverse neighborhoods, and a family that values
    education and civic engagement shapes her worldview and day‑to‑day experiences.
