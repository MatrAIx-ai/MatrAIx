  career_goals: Dea dreams of becoming a scientist or engineer who creates useful inventions, and she is fascinated by the idea of exploring space as an astronaut. She hopes to win school science fairs
    and chess tournaments, and looks forward to helping her community by solving everyday problems with practical solutions.
