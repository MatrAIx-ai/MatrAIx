    antique postcards'']'
  career_goals: Even at 96, Clayton’s ambition centers on staying mentally engaged and physically active, preserving his health, and sharing his wealth of experience with younger family members and community
    peers. He aims to finish a memoir documenting his life from the Great Depression to modern times, compile a detailed family genealogy, and continue volunteering as a mentor at the senior center, teaching
    DIY projects and offering historical perspectives on Texas culture.
