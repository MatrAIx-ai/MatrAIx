persona_description: A NASA microbiologist and biochemist who specializes in the identification and sequencing of unknown biological samples in space using miniPCR and the MinION devices. She is passionate
  about advancing space exploration through molecular biology research and aims to increase the scientific capacity of the ISS. Her research interests include the identification of microbial contaminants
  in space stations and the development of new technologies to improve the efficiency and accuracy of space-based molecular biology research.
