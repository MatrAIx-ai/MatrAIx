personas:
  professional: Louis Rivet, a 64‑year‑old master carpenter in Luzerne County, blends four decades of framing, custom cabinetry, and historic restoration expertise with a pragmatic curiosity for sustainable
    wood and CNC precision, meticulously plans every project, mentors apprentices, and ensures every job meets local building codes while honoring the region’s tradition of quality craftsmanship.
  sports: Louis Rivet is a loyal fan of the Philadelphia Phillies and follows the local Pittston high‑school baseball team every Friday night, participates in a community bowling league at the local alley,
    and stays fit through early‑morning fishing on the Susquehanna River and occasional weekend walks on nearby hiking trails.
  arts: Louis Rivet finds creative renewal in classic rock vinyls—from Led Zeppelin to Bruce Springsteen—spins them on his record player while hand‑crafting wooden bowls, attends the annual regional folk
    arts fair, and admires the work of contemporary wood artist Maya Lin, which inspires his own wood‑turning designs.
  travel: Louis Rivet prefers road trips in his restored 1965 Ford pickup, exploring the Appalachian foothills of Virginia, the historic battlefields of Gettysburg, and the leaf‑laden highways of New England
    in autumn, while dreaming of a future fishing lodge retreat on the shores of Lake Ontario.
  culinary: Louis Rivet delights in hearty, farm‑to‑table meals such as mushroom‑barley soup seasoned with thyme, butter‑basted pork chops, and apple‑cabbage dumplings, frequently cooking with fresh herbs
    from his garden, and he takes pride in perfecting a crusty sourdough loaf on weekends.
  core: Louis Rivet is a disciplined, curiosity‑driven carpenter who balances rugged hands‑on work with meticulous planning, a modest yet purposeful financial outlook, a proactive health routine, and a
    love for classic rock, community sports, and seasonal, home‑cooked comfort food.
background:
  cultural: Louis grew up in a working‑class, predominantly Irish‑Polish family in the anthracite coal region of northeastern Pennsylvania. The community’s strong work ethic, close‑knit family ties, and
    Catholic traditions shaped his values of reliability, cooperation, and self‑reliance. Local customs—such as seasonal mushroom festivals, a pride in preserving historic homes, and a love for hearty,
    home‑cooked meals—remain central to his identity. This cultural backdrop blends practical craftsmanship with a curiosity about preserving the region’s heritage, influencing both his professional life
    as a carpenter and his personal pursuits.
