  career_goals: Looking ahead, Louis plans to gradually shift from full‑time physical labor to a consulting and teaching role, offering apprenticeship workshops and publishing a guide on traditional and
    sustainable carpentry techniques. He hopes to grow his small business into a boutique shop that produces high‑end custom furniture while still taking on select historic‑preservation projects in the
    Luzerne County area. Ultimately, he seeks a comfortable retirement that still allows him to share his craft, support community restoration efforts, and leave a lasting legacy of quality workmanship
    for his children and local trade peers.
