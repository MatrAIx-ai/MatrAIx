    and collaboration'', ''Patient advocacy'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Camping'', ''Hiking'', ''Woodworking'', ''Restoring classic cars'', ''Gardening'', ''Country music listening'', ''Acoustic guitar playing'', ''Southern cooking'',
    ''Church volunteer work'', ''Community events'']'
  career_goals: Wyatt aims to build on his structured work habits by advancing his credentials. Over the next three years he plans to enroll in a community college program to become a Licensed Practical
    Nurse (LPN) and eventually pursue an associate’s degree to qualify as a Registered Nurse (RN). In the short term, he seeks a shift‑supervisor role where he can lead a team of nursing assistants, implement
    quality‑improvement projects, and mentor new staff. Long‑term, he dreams of opening a small home‑health agency that serves the elderly population in Banks County, allowing him to combine his compassion
    for patients with his entrepreneurial drive.
