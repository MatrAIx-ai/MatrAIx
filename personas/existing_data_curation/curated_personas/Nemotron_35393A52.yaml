personas:
  professional: Wyatt Rinelli is a nursing assistant in a rural clinic whose methodical approach to patient care, meticulous vital‑sign monitoring, and rigorous infection‑control habits have earned them
    a reputation as a dependable team member, and they are now poised to step into a shift‑supervisor role while pursuing LPN certification and an eventual RN degree.
  sports: Wyatt Rinelli is an avid member of the Banks County Hunting and Fishing Club, spends early Saturday mornings bass‑fishing on Lake Lanier, follows the Atlanta Braves for baseball and the Atlanta
    Falcons for football, participates in a monthly pickup basketball league at the community center, and maintains a weekly routine of light weight‑lifting and back‑strengthening exercises to counteract
    the physical demands of nursing and woodworking.
  arts: Wyatt Rinelli finds creative outlet in strumming an acoustic guitar to the tunes of Dolly Parton, Alan Jackson, and the bluegrass legends Bill Monroe and the Del McCoury Band, often performing at
    local Baptist church socials and the county fair’s bluegrass showcase; they also enjoy watching classic country films starring George Jones and collecting vintage vinyl records of Patsy Cline.
  travel: Wyatt Rinelli prefers meticulously planned road trips, such as a two‑week summer drive through the Great Smoky Mountains and onward to Yellowstone National Park, camping at state parks and fishing
    in remote lakes, while weekend escapes to New Orleans allow them to savor jazz music and Creole cuisine; they keep a modest travel budget that prioritizes domestic adventures but maintain a long‑term
    dream of visiting the Scottish Highlands to explore ancestral roots.
  culinary: Wyatt Rinelli is a competent home chef who spends Saturday afternoons perfecting Southern comfort dishes like buttermilk‑fried chicken, collard greens simmered with smoked turkey, and peach
    cobbler made with garden‑picked ripe peaches, and they also experiment with shrimp and grits seasoned with Cajun spice, fresh herbs from their modest garden, and a splash of hot sauce.
  core: Wyatt Rinelli is a methodical, community‑oriented nursing assistant who balances structured career ambitions with hands‑on hobbies, a love for Southern traditions, and a steady pursuit of personal
    and professional growth.
background:
  cultural: Wyatt was raised in Gillsville, a tight‑knit town in rural Georgia, within a white working‑class family steeped in Southern tradition. His upbringing emphasized family loyalty, church involvement
    (Baptist), and community service. He grew up with the values of self‑reliance, hospitality, and respect for local customs, such as honoring elders and participating in county fairs. These cultural influences
    shape his practical outlook, his commitment to serving neighbors, and his appreciation for Southern cuisine, music, and outdoor recreation.
attributes:
  skills: '[''Patient hygiene assistance'', ''Mobility support'', ''Feeding and nutrition assistance'', ''Vital sign monitoring'', ''Basic wound care'', ''Infection control'', ''Medical documentation'',
