    to Vietnamese folk music'']'
  career_goals: Nhung aims to advance to a senior leadership position within his insurance firm, such as Senior Claims Manager or Director of Risk Management, where he can oversee complex multi‑line claim
    portfolios while maintaining the structured routines he values. He plans to earn professional designations like the Certified Professional Claims Adjuster (CPCA) and Chartered Property Casualty Underwriter
    (CPCU) within the next three years. Ultimately, he hopes to leverage his experience to mentor junior adjusters and possibly establish a boutique consulting practice that helps small businesses navigate
    insurance claims, allowing him to blend his business background with his practical expertise.
