  career_goals: James aspires to merge his love for art and technology into a future career as a multimedia designer or video game developer. He dreams of attending a specialized high school focused on
    visual arts and computer science, winning design and coding competitions, and eventually creating immersive interactive experiences that blend storytelling, animation, and environmental themes. He also
    hopes to contribute to educational technology that inspires other curious kids to explore science and creativity.
