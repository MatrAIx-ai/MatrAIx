personas:
  professional: James Lentini, an aspiring multimedia creator, blends hand‑drawn comic panels with basic programming in Scratch and Minecraft, and they channel their competitive curiosity into innovative
    storytelling and interactive game designs while keeping up with school responsibilities.
  sports: James Lentini, a member of the local junior soccer league and the Desert Rocks climbing club, spends after‑school hours sprinting on the field, scaling the Organ Mountains’ boulder routes, and
    they cheer for the New Mexico State Aggies football team and the Los Angeles Dodgers baseball club, all while channeling their competitive edge into every match.
  arts: James Lentini, an enthusiastic participant in the community art club, sketches fantastical landscapes reminiscent of James Gurney, strums acoustic guitar chords inspired by Clairo and Phoebe Bridgers,
    devours graphic novels like ‘Saga’ and ‘Ms. Marvel’, and they curate a personal playlist of indie music that fuels their creative bursts.
  travel: James Lentini, an adventure‑seeking pre‑teen, explores the desert hills and rock formations around Las Cruces, has road‑tripped with family to Carlsbad Caverns and the Grand Canyon, dreams of
    photographing the Northern Lights in Iceland, and they meticulously plan weekend photo‑walks to capture sunset hues despite limited pocket money.
  culinary: James Lentini, a budding kitchen experimenter, loves assembling homemade burritos with seasoned beef, black beans, fresh pico de gallo, and shredded cheese, and they enjoy whipping up caramelized
    banana pancakes for breakfast while insisting on savoring a buttery croissant from the local bakery as a weekend treat.
  core: James Lentini is an imaginative 11‑year‑old who channels competitive curiosity into art, code, and science projects, battles occasional anxiety with sketching and sunsets, and they can’t resist
    a midnight Minecraft session even if it makes mornings groggy.
background:
  cultural: James grew up in the culturally rich environment of Las Cruces, New Mexico, where Anglo‑American traditions blend with strong Hispanic influences. His family celebrates typical American holidays
    like Thanksgiving and Fourth of July, while also joining community events such as Las Cruces Riverfest and local Cinco de Mayo celebrations. He frequently hears Spanish spoken in the neighborhood, and
    has picked up basic phrases. The surrounding desert landscape, Native American pottery, and regional cuisine—especially dishes featuring green chile—shape his daily life. At school, he learns about
    Southwestern history and art, which complements his curiosity about abstract concepts and novelty.
