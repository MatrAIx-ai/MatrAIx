  career_goals: Pedro aims to open his own barbershop that serves as a cultural hub for the Bernalillo community, featuring Mexican-inspired décor and hosting local events. He plans to earn a Master Barber
    certification, attend advanced training workshops, and eventually launch a line of grooming products that reflect his heritage. Over the next five years, he hopes to complete a business degree, franchise
    a small chain of shops across New Mexico, and establish a mentorship program for aspiring barbers from under‑represented backgrounds. Giving back through free‑cut events for veterans and youth is also
    a core ambition.
