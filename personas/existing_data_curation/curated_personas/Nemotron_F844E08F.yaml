personas:
  professional: Pedro Vazqueznavarro, a 27‑year‑old barber with a knack for precision fades and classic taper cuts, leverages their partial business education to run a meticulously organized shop while
    mentoring junior barbers, blending their curiosity for new grooming trends with a pragmatic approach to operations.
  sports: Pedro Vazqueznavarro regularly joins the Bernalillo Pick‑Up Soccer Club for weekend matches, cheering on New Mexico United while also logging hikes on the Sandia Mountains; they value functional
    fitness over gym routines, using soccer drills and trail runs to stay agile, and occasionally follow the Albuquerque Isotopes’ baseball season for a relaxed weekend wind‑down.
  arts: Pedro Vazqueznavarro captures the gritty street style and sun‑kissed textures of Bernalillo through a vintage Leica, drawing inspiration from Henri Cartier‑Bresson and modern Instagram photographer
    Alex Strohl; their playlists feature regional Mexican icons like Los Tigres del Norte and modern crossover acts such as Café Tacvba, shaping a visual‑auditory aesthetic that informs their barbershop
    décor.
  travel: Pedro Vazqueznavarro plans weekend road trips on their restored ‘70s motorcycle, alternating between the art‑laden streets of Santa Fe, the high desert of Sedona, and occasional cross‑border excursions
    to Oaxaca for culinary inspiration, preferring flexible itineraries over rigid bookings while balancing a modest travel budget with a desire to experience vibrant street cultures.
  culinary: Pedro Vazqueznavarro experiments in the kitchen with a solid intermediate skill set, perfecting carnitas glazed with orange‑citrus juice, smoky chiles rellenos stuffed with cheese and corn masa,
    and hand‑rolled tamales seasoned with annatto and epazote, and they often pair meals with fresh lime, cilantro, and homemade salsa verde.
  core: Pedro Vazqueznavarro is a curiosity‑driven barber‑entrepreneur who balances meticulous shop management with spontaneous motorcycle tinkering, occasional financial splurges, and a steadfast love
    for Mexican street food and photography, all while juggling mild health quirks and a desire to give back to their community.
background:
  cultural: Pedro was raised in a bilingual Mexican‑American household in Bernalillo, New Mexico. Family traditions such as Día de los Muertos, Cinco de Mayo, and local fiestas with mariachi music and folkloric
    dance are central to his upbringing. His parents hail from Jalisco, and he often incorporates the state’s vivid colors, ornate patterns, and traditional barber symbols into his shop’s décor. The blend
    of Mexican heritage and the broader New Mexican cultural landscape informs his values of familismo, hospitality, and community service, shaping both his personal interactions and his professional ethos.
attributes:
  skills: '[''Hair cutting'', ''Beard trimming and shaping'', ''Hair coloring and highlighting'', ''Traditional Mexican hairstyle techniques'', ''Customer service and consultation'', ''Appointment scheduling
