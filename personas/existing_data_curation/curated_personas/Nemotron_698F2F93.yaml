  hobbies: '["Reading adventure and nature books", "Sketching wildlife", "Beadwork and bracelet making", "Exploring local woods and birdwatching", "Collecting rocks", "Scratch coding projects", "Playing
    cooperative board games with small groups"]'
  career_goals: Martha dreams of one day working with animals and the outdoors, envisioning a future as a wildlife rehabilitator or a park ranger. She is drawn to careers that have clear daily routines—such
    as caring for rescued animals or maintaining trails—while still allowing her to respond flexibly to the needs of the creatures she helps. She also hopes to become a community mentor, teaching younger
    children about the natural environment and sharing stories from her American Indian heritage.
