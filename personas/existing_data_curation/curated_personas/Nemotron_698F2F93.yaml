personas:
  professional: Martha is a budding junior naturalist and coder who uses Scratch to build interactive wildlife simulations, blending her love for detailed sketching with a preference for structured yet
    flexible learning environments, and thriving in her small after‑school coding club where she can cooperate and assert her ideas.
  sports: Martha enjoys weekend hikes with her local nature club and plays on a community soccer team, cheering for the Buffalo Bills and Buffalo Sabres while favoring solo bird‑watching trips that satisfy
    her love for the outdoors, though she sometimes forgets her water bottle due to her relaxed attitude toward planning.
  arts: Martha spends afternoons sketching birds in the style of John James Audubon and crafting friendship bracelets patterned after traditional designs taught by an elder, while reading adventure classics
    like The Secret Garden and listening to folk tunes by the Avett Brothers, showing how creative expression intertwines with her love of nature and cultural storytelling.
  travel: Martha loves spontaneous weekend forays into the nearby woods and day trips to Letchworth State Park and Niagara Falls, while dreaming of a future family road trip to Yellowstone National Park,
    preferring nature‑focused travel that balances modest planning with the freedom to wander.
  culinary: Martha enjoys making simple trail‑mix snacks with peanuts, dried blueberries, and dark chocolate chips, helps her family bake apple crisp with fresh orchard apples and cinnamon, and often adds
    a pinch of sage to her favorite butternut squash soup, reflecting a budding kitchen confidence centered on wholesome, nature‑inspired flavors.
  core: Martha is a quiet, nature‑obsessed ten‑year‑old who can spend hours sketching a squirrel in perfect detail yet often forgets to finish her homework, balancing meticulous curiosity with a laid‑back
    approach to obligations.
background:
  cultural: Martha comes from an American Indian family with roots in the Seneca Nation, which has a presence near the Cattaraugus Reservation close to Lancaster, NY. Her upbringing includes listening to
    elders tell Haudenosaunee creation stories, attending seasonal community gatherings, and learning the importance of living in balance with nature. While she primarily uses English at school, she retains
    a connection to her heritage through language lessons, traditional crafts, and participation in local cultural events that emphasize respect for the environment and community cooperation.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Elementary writing", "Scratch programming", "Organizing personal items", "Nature observation", "Basic first‑aid knowledge", "Introductory Seneca
