persona_description: A researcher at New York University, particularly focused on the link between non-medical use and abuse of prescription opioids and the rise in heroin use, and the factors contributing
  to this phenomenon among teenagers, especially those in small towns. The researcher is interested in understanding the risk factors for both opioid and heroin use, as well as the potential implications
  for public health policy and treatment programs. The researcher is also likely to be knowledgeable about the CDC's $20 million program to tackle the opioid abuse epidemic and the use of data analysis
  to study the prevalence and trends of opioid use among teenagers.
