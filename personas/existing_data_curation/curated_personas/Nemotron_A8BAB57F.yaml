personas:
  professional: David Harmon combines two decades of mechanical engineering experience, mastery of SolidWorks and Python-driven process optimization, and a farmer‑rooted sense of self‑reliance to design
    sustainable precision‑farming robotics, while their curiosity for speculative science‑fiction and an artist’s eye for elegant solutions fuels a measured yet ambitious pursuit of senior engineering leadership.
  sports: David Harmon cheerfully backs the Iowa Hawkeyes football and basketball teams, jogs with the Des Moines Running Club each Saturday morning, joins the Iowa Fly‑Fishing Association for summer river
    trips, hikes the Loess Hills trail in autumn, and balances these activities with occasional garage weight‑lifting, preferring small‑group camaraderie over large crowds.
  arts: David Harmon paints tranquil watercolors of rolling fields inspired by Andrew Wyeth, attends performances at the Des Moines Community Theatre with their spouse, collects vinyl records of Joni Mitchell
    and Bob Dylan, and reads sci‑fi classics like Ursula K. Le Guin, allowing artistic immersion to spark creative solutions in their engineering work.
  travel: David Harmon favors carefully planned road trips that blend quiet sketching stops—such as a sunrise over Badlands National Park—with cultural visits like a weekend on Mackinac Island and a future
    two‑week tour of Denmark’s sustainable farms, always budgeting to ensure the journey doesn’t jeopardize the research grant they rely on.
  culinary: David Harmon enjoys cooking farm‑fresh meals like heirloom tomato‑corn chowder, grilled trout with dill, and hand‑kneaded sourdough bread, often pairing dishes with locally brewed apple cider,
    and while their cooking skill is solidly intermediate, stress sometimes leads them to over‑salt a pot or forget to let dough rise fully.
  core: David Harmon is a reserved, curiosity‑driven engineer who melds farm‑rooted practicality with an artist’s eye, cautiously invests for the future while wrestling nightly with worries that sharpen
    both meticulous work and a quiet passion for watercolor skies.
background:
  cultural: David was raised in a tight‑knit farming community in the American Midwest, where values such as self‑reliance, modesty, and community responsibility are deeply ingrained. His heritage reflects
    generations of Midwestern agricultural life combined with a Protestant work ethic. While honoring these traditional roots, David has cultivated an openness to broader cultural experiences, especially
    in the arts and intellectual realms, allowing him to blend practical, down‑to‑earth perspectives with an appreciation for creative and unconventional thinking.
attributes:
  skills: '[''Mechanical Design'', ''CAD (SolidWorks, AutoCAD)'', ''Python Programming'', ''Data Analysis'', ''Project Management (Agile/Scrum)'', ''Lean Manufacturing'', ''Creative Problem Solving'', ''Technical
    Writing'', ''Process Optimization'', ''IoT Integration'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Reading (science fiction, philosophy)'', ''DIY woodworking'', ''Fly fishing'', ''Hiking'', ''Small-town theater'']'
  career_goals: David aims to transition into a senior engineering leadership role where he can guide cross‑functional teams to develop sustainable agricultural technologies, such as precision‑farming robotics
    and renewable‑energy‑integrated equipment. He plans to pursue a graduate certificate in engineering management to sharpen his strategic and people‑management skills. Over the next five years, he hopes
    to secure at least one patent for an innovative farming device, mentor junior engineers in his community, and establish a reputation as a bridge between practical engineering and forward‑thinking design.
