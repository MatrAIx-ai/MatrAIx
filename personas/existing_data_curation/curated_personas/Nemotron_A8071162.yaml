  hobbies: '["Vegetable gardening", "Reading African‑American history and memoirs", "Listening to jazz and soul music", "Quilting", "Quilting competitions", "Birdwatching", "Walking in South Mountain Reservation",
    "Attending community theater", "Genealogy research", "Writing reflective essays"]'
  career_goals: Juanita’s primary ambition is to stay intellectually engaged while making a tangible impact on her community. She plans to complete a digital storytelling workshop at the county library
    so she can archive oral histories of Newark’s Black elders and share them with the Verona Historical Society. She also aims to earn a gerontology certificate through a community‑college program to better
    support peers at the senior center. Additionally, she hopes to secure a seat on the Verona Senior Advisory Board, where she can advocate for inclusive services and represent the perspectives of long‑time
    Black residents. Maintaining her health through the local walking group and entering her quilts in regional competitions are also personal goals.
