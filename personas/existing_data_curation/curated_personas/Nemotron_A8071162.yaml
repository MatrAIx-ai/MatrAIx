personas:
  professional: Juanita Edwards, a seasoned community volunteer with a background in retail cash handling and administrative support, blends meticulous budgeting, basic tech tutoring, and grassroots event
    coordination to empower seniors while they pursue a gerontology certificate and a digital storytelling workshop.
  sports: Juanita Edwards enjoys weekly walks in South Mountain Reservation with a senior walking group, delights in birdwatching for migrating warblers, loyally follows the New York Giants during football
    season, and occasionally joins a local senior softball league for friendly competition, while they value staying active and social.
  arts: Juanita Edwards weaves intricate quilts for regional competitions, draws creative inspiration from classic jazz legends like Ella Fitzgerald and soul icons such as Marvin Gaye, and pens reflective
    essays for the neighborhood newsletter, merging visual and literary storytelling while they channel a competitive yet reflective energy.
  travel: Juanita Edwards prefers low‑key road trips to historic towns such as Gettysburg and Savannah, often timing visits around family reunions and budget-friendly museum passes, while they dream of
    a cultural pilgrimage to New Orleans’ vibrant music district.
  culinary: Juanita Edwards delights in preparing collard greens simmered with smoked turkey, fresh tomato relish, herb‑infused cornbread, and a slice of peach cobbler, while they occasionally experiment
    with thyme‑laden roasted vegetables to complement their Southern‑style meals.
  core: Juanita Edwards blends pragmatic thrift, competitive quilting, community advocacy, and a curious spirit into a steady, slightly skeptical but deeply engaged senior life, while they continuously
    seek new ways to contribute.
background:
  cultural: Juanita was born in Newark, New Jersey, in 1957, during a period of significant civil‑rights activity. Raised in a close‑knit Black community, she grew up with church gatherings, family reunions,
    and neighborhood block parties that emphasized storytelling, gospel music, and soul cooking. Her parents instilled values of self‑reliance, education, and cultural pride. Relocating later to the predominantly
    white suburb of Verona, she navigated being one of the few Black residents, which sharpened her awareness of cultural dynamics and fostered a healthy skepticism toward others’ intentions. This experience
    fuels her competitive drive to demonstrate competence and contributes to her commitment to mentoring younger Black women, preserving heritage recipes, and participating in local Black cultural events.
attributes:
  skills: '["Cash handling", "Customer service", "Record‑keeping", "Microsoft Office (Word, Excel)", "Community event coordination", "Introductory computer instruction", "Home gardening", "Basic plumbing
