  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Creative Writing (Short Stories & Poetry)'', ''Speculative Fiction Book Club'', ''Zumba/Dance Classes'', ''Board Game Nights'', ''Exploring Local Restaurants
    & Farmers Markets'', ''Volunteering as Museum Docent'', ''Pottery'', ''Photography'', ''Weekend Trips to Coastal Towns'']'
  career_goals: Caroline aims to advance into a supervisory or managerial position within customer experience, such as a Team Lead or Customer Experience Manager, within the next three years. She plans
    to earn a Certified Customer Service Professional (CCSP) credential and attend leadership workshops offered by local community colleges. She also aspires to design a customer service training program
    that incorporates creative storytelling techniques, leveraging her artistic interests to make learning more engaging. In the longer term, she dreams of launching a community arts outreach initiative
    that partners with her employer’s corporate‑social‑responsibility program, providing art workshops for youth in Wake County. Enhancing her data‑analytics skills to interpret customer trends and influence
    strategic decisions is also a key ambition.
