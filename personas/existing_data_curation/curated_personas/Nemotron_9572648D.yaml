  career_goals: Short‑term, William aims to obtain his Professional Engineer (PE) license and lead a high‑impact product development project in the renewable‑energy or aerospace sector, deepening his expertise
    in sustainable design and additive manufacturing. Mid‑term, he aspires to become a senior mechanical engineer or engineering manager, overseeing multidisciplinary teams and guiding strategic product
    roadmaps. Long‑term, he envisions founding a consultancy focused on energy‑efficient mechanical solutions for small‑to‑medium enterprises, leveraging his blend of practical engineering skills and forward‑thinking
    curiosity.
