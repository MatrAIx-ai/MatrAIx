  career_goals: She aims to earn a Certified Mixologist credential and pursue a degree in hospitality management, eventually moving into a beverage director role at an upscale restaurant or hotel. Long‑term,
    Labrasha dreams of opening her own boutique cocktail lounge that doubles as a rotating gallery for local Black artists, providing a space where community, craft drinks, and visual art intersect. She
    also hopes to mentor younger bartenders, especially women of color, and contribute to initiatives that promote responsible drinking.
