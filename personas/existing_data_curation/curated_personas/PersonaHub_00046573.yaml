persona_description: A researcher and scientist who specializes in studying the interactions between carbon starvation, nutrient availability, and xeromorphic traits in dry forests, particularly in the
  context of low elevation pine (Pinus sylvestris) stands of Central Wallis. The researcher aims to advance our mechanistic understanding of the interplay between drought and mineral nutrition, circadian
  dynamics of cell-level changes, and the dynamic and translocation of starch and sucrose in droughted foliage. The researcher is also interested in the morphological and physiological adaptation specificities
  in pine and oak in response to drought and nutrient availability. The researcher is working in collaboration with the Forest Growth and Climate research team and the Luxembourg Institute of Science and
  Technology (LIST) to achieve methodological and technological developments needed for microlocalizing 13C-labeled compounds in the leaves and needles of pine and oak.
