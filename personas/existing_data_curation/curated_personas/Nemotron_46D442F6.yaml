personas:
  professional: Cheryl Mason, a budding junior programmer and LEGO architect, channels her curiosity about nature into building interactive Scratch games and intricate brick creations, while her relaxed,
    flexible approach lets her experiment without strict deadlines, and her competitive streak drives her to out‑design friends' projects.
  sports: Cheryl Mason, a member of the local Park Rangers U9 soccer team who also loves tree‑climbing and competitive capture‑the‑flag games, roots for the New York Yankees and the Golden State Warriors,
    and approaches fitness with a playful, exploratory style that mixes structured practice with spontaneous park adventures.
  arts: Cheryl Mason, an enthusiastic piano player practicing Beethoven’s Für Elise twice weekly, a cartoon sketcher inspired by Bill Watterson’s Calvin and Hobbes, and an avid reader of Ender’s Game and
    the Harry Potter series, weaves her love for sci‑fi storytelling into her drawings and musical interpretations, while her competitive edge pushes her to master challenging pieces despite occasional
    procrastination.
  travel: Cheryl Mason, who prefers spontaneous day‑trips to nearby nature spots like Redwood State Park and weekend visits to the interactive science museum in Seattle, dreams of exploring the Grand Canyon
    and the Great Barrier Reef, plans trips loosely with her family, and balances her love of adventure with the reality of a modest family travel budget.
  culinary: Cheryl Mason, a budding kitchen assistant who can whip up a no‑bake chocolate oat cookie and a microwave mug cake, loves pizza topped with pepperoni and olives, enjoys spaghetti carbonara with
    extra parmesan, and delights in snacking on apple slices with peanut butter while sketching cartoons, yet often leaves a trail of flour on the kitchen counter.
  core: Cheryl Mason is a curious, tree‑climbing, LEGO‑loving 9‑year‑old who blends a competitive spark with a laid‑back love of spontaneous adventures, even if it means occasional forgotten chores and
    half‑finished projects.
background:
  cultural: Cheryl grows up in a typical suburban Southern environment in Garner, North Carolina. Her family celebrates mainstream American holidays such as Thanksgiving, Christmas, and Independence Day,
    often with community gatherings and church involvement. She participates in school events, local soccer leagues, and church youth activities, reflecting a blend of modest Southern hospitality and contemporary
    suburban culture. Her upbringing includes exposure to both traditional values and modern technology, shaping her open yet grounded perspective.
