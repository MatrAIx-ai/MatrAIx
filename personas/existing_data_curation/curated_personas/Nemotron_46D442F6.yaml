  career_goals: Cheryl envisions a future where she can explore both discovery and helping others. She dreams of becoming an astronaut to venture into space and satisfy her curiosity about the universe,
    while also considering a career as a veterinarian because she loves caring for animals. She sees herself eventually studying science, excelling in school, and using her competitive spirit to top her
    class, aiming to lead projects that blend creativity and practical problem‑solving.
