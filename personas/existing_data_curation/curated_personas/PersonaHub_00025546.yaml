persona_description: A scientist or environmentalist who is concerned with the impact of pesticides on bees and other pollinators, and is interested in the Purdue study on neonics and corn pollen. They
  are likely to be skeptical of the claims made by Bayer and the EPA regarding the toxicity of neonics to bees and the lack of impact on bee health. They are also likely to be interested in the study's
  findings on the high levels of neonics and other pesticides in corn pollen and the presence of neonics in dead bees and pollen stored in the hive. They are likely to be concerned about the long-term effects
  of neonics on bee populations and the broader ecosystem.
