  hobbies: '[''Building towers with blocks'', ''Coloring and drawing with crayons'', ''Dancing to salsa and reggaetón'', ''Playing in the park and playground'', ''Singing Spanish children’s songs'', ''Listening
    to storytime at the library'', ''Mimicking cooking activities'', ''Group playdates with peers'']'
  career_goals: Even at two, Deeanna shows early signs of ambition by frequently telling adults that she wants to become a teacher who reads stories to children, or a dancer who performs on stage, reflecting
    her love of music and her natural inclination to guide peers in play. She also enjoys helping her family in the kitchen, hinting at a future interest in cooking or community service. These aspirations
    blend her curiosity about the world, her practical desire to help others, and her energetic, competitive spirit.
