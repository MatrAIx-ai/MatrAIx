personas:
  professional: Deeanna Arellano is a curious toddler who loves tinkering with building blocks, balancing inventive ideas with practical problem-solving, often arranging structures haphazardly because they
    value flexibility over strict tidiness, and they eagerly share creations with friends at playgroup even while being a bit competitive about who builds the tallest tower.
  sports: Deeanna Arellano dashes around the local preschool playground, proudly cheering for the Los Angeles Dodgers on a tiny jersey while participating in a Little Kickers soccer class on Saturdays,
    often preferring freestyle running over structured drills and displaying a competitive streak when racing peers.
  arts: Deeanna Arellano delights in dancing to The Wiggles and singing along with Sesame Street, loves watching Disney's Moana and drawing crayon pictures of animals, and they eagerly collect stickers
    of Disney Princesses, channeling their energetic sociability into creative play while being picky about the music they deem too 'quiet'.
  travel: Deeanna Arellano prefers family road trips to the beach in Santa Monica, enjoys the sensory overload of a weekend visit to Disney World in Orlando, and dreams of a future train ride through the
    Swiss Alps, but their flexible nature means they're happy to nap in the car and don't demand a rigid itinerary.
  culinary: Deeanna Arellano favors cheesy macaroni, banana slices, and chicken nuggets, proudly attempts to spread peanut butter on toast despite a messy kitchen countertop, and they obsessively ask for
    extra ketchup, showing a pragmatic yet chaotic approach to mealtime.
  core: Deeanna Arellano is an energetic, curious two-year-old who mixes playful competition with a laid-back attitude, thriving on group activities while rarely getting upset, even when their tidy-up plans
    go awry.
background:
  cultural: Deeanna is a Puerto Rican child growing up in Caguas, a city known for its artistic community and close‑knit neighborhoods. She is raised in a bilingual household where Spanish is spoken at
    home, and she hears English in school and media. Family gatherings often include traditional dishes such as arroz con gandules and pasteles, and celebrations feature música bomba, plena, and salsa that
    invite her to dance. Community festivals like the Festival del Cedro and local patron saint celebrations expose her to communal rituals and a strong sense of cultural identity. The warm, family‑centered
    environment of Caguas nurtures her sociable nature and fosters respect for cultural heritage.
attributes:
  skills: '[''Basic Spanish language proficiency'', ''Early English vocabulary exposure'', ''Gross motor coordination (running, climbing, jumping)'', ''Fine motor skills (stacking blocks, using crayons,
