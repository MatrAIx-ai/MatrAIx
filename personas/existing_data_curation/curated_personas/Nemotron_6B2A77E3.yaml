  career_goals: Victor aims to transition from senior management analyst to a director‑level role overseeing corporate strategy and innovation. He envisions leading a multidisciplinary team that integrates
    data‑driven decision making with artistic insights to launch breakthrough products. In the longer term, he aspires to launch his own boutique consultancy that helps forward‑thinking firms embed design
    thinking and strategic foresight into their core operations. He is also committed to mentoring junior analysts, championing data literacy, and establishing well‑being practices within his organization
    to mitigate the stress he knows all too well.
