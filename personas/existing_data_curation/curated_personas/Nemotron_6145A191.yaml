  hobbies: '[''Reading historical non‑fiction'', ''Genealogy research'', ''Gardening (native prairie and vegetable)'', ''Woodworking'', ''Model train building'', ''Birdwatching'', ''Volunteering at the
    public library'', ''Senior center card evenings'', ''Local history society involvement'']'
  career_goals: Even in retirement, Allan aims to stay intellectually active by mentoring new teachers through a local teacher‑pre‑service program and by helping the senior center develop an intergenerational
    learning series that pairs students with seniors for shared projects. He hopes to author a series of short articles on the educational history of Owatonna for the town newspaper, preserving local stories
    for future generations. Additionally, he aspires to expand the community garden’s demonstration plots, testing sustainable gardening methods that combine new research with the tried‑and‑true practices
    he values. These goals reflect his desire to blend curiosity with practical contributions to his community.
