personas:
  professional: Necole Collins leverages a solid production‑floor background and a business degree to streamline manufacturing workflows with lean principles and basic Six Sigma tools, while their spontaneous
    nature sometimes leads to missed deadlines, their strong interpersonal skills bridge shop‑floor workers and management as they mentor new hires and drive continuous‑improvement initiatives.
  sports: Necole Collins follows the New York Knicks, cheers for the New York Yankees, participates in a Westchester Community Center pick‑up basketball league each weekend, and maintains fitness by jogging
    along the Hudson River during warmer months.
  arts: Necole Collins sings in a gospel choir, dances salsa to the rhythms of Celia Cruz, swings to the classics of the Count Basie Orchestra, captures street life through a camera inspired by Annie Leibovitz,
    and reads business self‑development books by Brene Brown, weaving artistic expression into their community engagements.
  travel: Necole Collins prefers spontaneous, budget‑friendly trips that blend cultural immersion and family time, such as weekend road‑trips to Hudson Valley wineries, a fall visit to Savannah, Georgia
    for historic tours, and an annual getaway to New Orleans for its music and cuisine, planning most details on the fly.
  culinary: Necole Collins enjoys cooking soulful dishes like shrimp and grits, collard greens with smoked ham, and herb‑infused roasted chicken, often using fresh basil, thyme, and cilantro from their
    rooftop garden, and they delight in potluck gatherings where recipes are shared and stories exchanged.
  core: Necole Collins is a community‑driven production specialist who blends lean‑process rigor with spontaneous salsa nights, cultivates a rooftop herb garden, mentors youth, and occasionally forgets
    to file tax paperwork on time.
background:
  cultural: Necole’s cultural identity is rooted in a rich African‑American heritage passed down through generations of families who migrated from the South to the Bronx and later settled in Mount Vernon.
    Growing up in a tight‑knit community, she was shaped by church traditions, family storytelling, and celebrations like Juneteenth and Black History Month. These experiences instilled in her a deep sense
    of resilience, communal responsibility, and pride in her roots. She actively participates in local Black cultural organizations, mentors young Black professionals, and celebrates culinary traditions
    that blend Southern comfort food with contemporary flavors. Her background influences her collaborative work style, her commitment to uplifting others, and her desire to see greater representation and
    opportunity for Black workers in manufacturing.
attributes:
  skills: '["Production line operations", "Machinery troubleshooting and maintenance", "Quality control inspection", "Lean manufacturing principles", "Six Sigma basics", "Inventory management", "OSHA safety
    compliance", "Team leadership and mentoring", "Conflict resolution", "Effective communication", "Problem solving", "ERP system usage (SAP, Oracle)", "Advanced Microsoft Excel", "Budgeting and cost control",
    "Customer service", "Training new employees"]'
  hobbies: '["Salsa and swing dancing", "Gospel choir singing", "Cooking soul food", "Youth mentorship volunteering", "Attending/organizing cultural festivals", "Walking/hiking along the Hudson River",
    "Street photography", "Reading business and self‑development books", "Recreational basketball", "Rooftop gardening"]'
  career_goals: Necole aims to transition from a production worker to a supervisory role within the next 12‑18 months, targeting a shift‑lead position where she can apply her lean‑process knowledge and
    people‑management skills. Over the next five years, she aspires to become a production manager overseeing multiple lines, with a focus on continuous improvement initiatives and workforce development.
    She plans to earn a Six Sigma Green Belt certification and consider an MBA part‑time to broaden her strategic capabilities. Ultimately, she dreams of launching a small consulting boutique that helps
    local manufacturers adopt efficient, culturally aware practices while mentoring younger Black women entering the manufacturing sector.
