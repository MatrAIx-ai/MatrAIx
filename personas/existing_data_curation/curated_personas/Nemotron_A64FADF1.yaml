  hobbies: '[''Hiking and Birdwatching'', ''Community Theater Acting'', ''Model Train Building'', ''Vintage Radio Restoration'', ''Bridge and Darts'', ''Reading about Emerging Delivery Tech'', ''Genealogy
    Research'']'
  career_goals: At 84, Joseph aims to preserve his extensive knowledge of last‑mile delivery by documenting his experiences for the Fremont County historical society and creating a mentorship program for
    new couriers. He wants to serve on the advisory board of the local courier union to improve safety standards and incorporate technology like drone delivery in a practical, community‑focused way. Additionally,
    he plans to stay physically active by leading a weekly senior walking group on the nearby Rampart Range trails, ensuring he remains a vital, engaged member of Canon City’s community.
