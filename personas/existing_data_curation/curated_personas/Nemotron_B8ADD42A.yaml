  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Yoga'', ''Baking'', ''Volunteer work at local library'', ''Traveling to historic sites'', ''Community theater'', ''Birdwatching'']'
  career_goals: Alma aims to translate her technical background into community impact. She plans to launch a volunteer-led STEM enrichment program for middle school students in Howard County, serve as a
    part-time consultant for local schools on curriculum development, and further her own knowledge of advanced data analytics through online courses. Additionally, she hopes to author a guidebook combining
    her career experiences with practical advice for women re-entering the workforce.
