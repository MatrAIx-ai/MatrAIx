  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Reading speculative fiction'', ''Classical and avant‑garde music appreciation'', ''Poetry readings'', ''Urban exploration of historic Philadelphia'',
    ''Indoor gardening'', ''Chess'', ''Volunteering for creative science workshops'']'
  career_goals: Mary aims to launch a community‑based STEM‑art outreach program in Philadelphia that brings creative science workshops to under‑served neighborhoods. She hopes to author a guidebook on integrating
    imagination into science teaching, mentor a new cohort of tutors, and serve as a guest lecturer at local institutions such as the Franklin Institute. While planning a gradual transition toward a semi‑retired
    advisory role, she also dreams of publishing a memoir reflecting on lifelong learning and the joy of interdisciplinary exploration.
