personas:
  professional: Mary Rubino, a 62‑year‑old physicist‑mathematician turned interdisciplinary educator, leverages their graduate‑level expertise and love for abstract art to craft visual STEM workshops that
    blend scientific rigor with creative freedom, thriving in small‑group settings while occasionally wrestling with disorganized lesson planning.
  sports: Mary Rubino stays fit through leisurely walks along Philadelphia’s historic districts and weekly yoga classes at the community center, while cheering on the Philadelphia Phillies and Eagles on
    game days and participating in the “Historic Mornings Walkers” senior club that meets every Saturday.
  arts: Mary Rubino’s artistic life is a tapestry of watercolor landscapes inspired by fractal patterns, abstract sketches echoing quantum diagrams, a voracious appetite for speculative fiction authors
    like Octavia Butler and China Miéville, evenings spent listening to Mozart, Stravinsky, and John Cage, and regular attendance at intimate poetry readings featuring voices such as Ocean Vuong.
  travel: Mary Rubino prefers spontaneous, low‑key travel, favoring urban explorations like a weekend stroll through Oxford’s historic colleges and a sun‑lit afternoon in Berlin’s Museum Island, while dreaming
    of a quiet autumn visit to Kyoto’s zen gardens and an adventurous aurora‑hunting trip to Reykjavik, all within a modest retirement budget that balances occasional flights with local weekend getaways.
  culinary: Mary Rubino delights in cooking simple Mediterranean dishes, often plating heirloom tomato‑basil bruschetta with a drizzle of extra‑virgin olive oil, preparing herb‑infused tea using mint and
    chamomile from their indoor garden, and occasionally experimenting with a saffron‑infused paella that showcases their penchant for bright, aromatic ingredients.
  core: Mary Rubino, a 62‑year‑old physicist‑artist, fuses scientific precision with artistic whimsy, drifts through obligations with relaxed disorganization, and channels boundless curiosity into community‑focused
    STEM‑art outreach.
background:
  cultural: Raised in a middle‑class white family in Philadelphia, Mary grew up with an emphasis on education, public library visits, and community involvement. Her German‑Irish ancestry brought traditions
    such as Thanksgiving feasts and holiday gatherings that reinforced values of curiosity, self‑reliance, and civic duty. She maintains strong ties to the city's cultural institutions, including the Philadelphia
    Museum of Art and the Franklin Institute, reflecting a blend of American heritage and appreciation for the region's diverse artistic and scientific legacy.
attributes:
  skills: '[''Advanced Physics'', ''Higher Mathematics'', ''Interdisciplinary Curriculum Design'', ''One‑on‑One Tutoring'', ''Small‑Group Instruction'', ''Digital Learning Tools'', ''Creative Problem Solving'',
