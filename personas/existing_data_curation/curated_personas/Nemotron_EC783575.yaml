  career_goals: Ivanna aims to stay actively engaged in her community by mentoring younger volunteers, leading heritage cooking classes, and preserving family recipes. She plans to complete a senior‑focused
    digital‑literacy course, write a memoir of her life, and maintain her independence through regular gardening and walking groups. Travel to visit her children and grandchildren, as well as staying physically
    healthy, remain central ambitions.
