persona_description: A researcher or scientist who is interested in ecological studies, particularly those related to the distribution of species and their interactions. They are particularly interested
  in the Vanuatu avifauna and the Antillean bat communities, and are looking for evidence to support or refute the idea that their species distributions are a product of random colonisation. They are likely
  to be familiar with the concept of checkerboard distributions and the C-score statistic, and may have expertise in statistical analysis. They are also likely to be interested in the use of control groups
  and alternative modes of enquiry.
