  career_goals: Jazmina aims to pursue higher education with a focus on bilingual education and community outreach. She dreams of becoming an elementary school teacher who can create inclusive, structured
    classrooms for both English- and Spanish-speaking students. In the longer term, she hopes to design after‑school programs that blend academic support with cultural enrichment, possibly working with
    local nonprofits to assist immigrant families. She plans to earn a scholarship to the University of Oregon’s College of Education and eventually become a mentor for other young people navigating bicultural
    identities.
