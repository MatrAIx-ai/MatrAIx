personas:
  professional: Jazmina Ruiz is a middle‑school student who fuses a passion for midfield soccer strategy with a budding knack for robotics programming, leading her club’s weekly challenge with methodical
    planning, reliable teamwork, and an energetic drive to solve problems on both the field and the circuit board.
  sports: Jazmina Ruiz plays midfield for the Medford Middle School soccer squad, draws inspiration from the Portland Timbers’ pressing style, trains with the Cascades Youth Soccer Club on Saturdays, and
    completes weekly hikes on the Oregon Trail to maintain stamina, all while cheering on the Oregon Ducks during the college football season.
  arts: Jazmina Ruiz channels kinetic energy into folk‑dance rehearsals and hip‑hop freestyles, spends evenings sketching characters from the graphic novels 'Saga' and 'Monstress', devours YA fantasy series
    like 'Six of Crows', and blasts a playlist featuring BTS, Ariana Grande, and the indie folk sounds of Mumford & Sons, letting these artistic influences shape the rhythm of their daily life.
  travel: Jazmina Ruiz spends summer weekends hiking the misty cliffs of Multnomah Falls and the rugged Oregon Coast, while day‑dreaming about future trips to Tokyo’s neon districts, the ancient citadel
    of Machu Picchu, and a family road‑trip to the Grand Canyon, balancing school responsibilities with a modest allowance and tight scheduling.
  culinary: Jazmina Ruiz loves rolling masa for homemade tamales, simmering chipotle‑infused salsa with fresh tomatillos and cilantro, and experimenting with a sweet corn‑coconut pudding, yet often rushes
    the final garnish, resulting in a few burnt edges—a quirky reminder of their busy schedule.
  core: Jazmina Ruiz is a hyper‑organized teen who juggles midfield tactics, code snippets, salsa‑spiced snacks, and a meticulous allowance ledger, all while occasionally forgetting to finish homework until
    midnight.
background:
  cultural: Jazmina is a first‑generation Mexican‑American who grew up in a bilingual household in Beaverton. Her parents emigrated from Jalisco, and Spanish is spoken at home alongside English, giving
    her fluency in both languages. She participates in cultural celebrations such as Día de los Muertos and Mexican Independence Day festivals organized by the local Hispanic community. Her family’s traditions—home‑cooked
    meals, storytelling, and weekly visits to a nearby Catholic church—blend with the broader multicultural environment of the Pacific Northwest. This bicultural upbringing shapes her values of family cohesion,
    community service, and pride in her heritage while embracing the inclusive ethos of her Oregon community.
