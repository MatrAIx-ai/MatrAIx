persona_description: Sophie Greene is a highly skilled and dedicated professional working for the Minnesota Pollution Control Agency (MPCA), where she is the PFAS Coordinator. Her expertise lies in the
  unique and complicated chemistry of per- and poly-fluoroalkyl substances (PFAS), which are ubiquitous in Minnesota waters and are suspected to cause health problems in humans. Greene is responsible for
  ensuring interdepartmental staff, such as air monitoring scientists and water quality scientists, reach compatible remediation strategies for the cleanup of PFAS. Her goal is to inform the public on which
  policies will provide the most bang for their buck in protecting our health and environment. Greene's first year with the agency has been challenging but rewarding, as the government is working hard to
  make sure the exposure people have to PFAS-containing compounds is as limited as possible.
