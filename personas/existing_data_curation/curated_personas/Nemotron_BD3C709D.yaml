  career_goals: Maria aims to earn a promotion to sergeant within the next two years, then advance to lieutenant, and ultimately become a community‑relations commander focused on strengthening ties between
    law enforcement and the Mexican‑American community in Phoenix. She also plans to complete her bachelor's degree in criminal justice and become a certified crisis negotiation trainer, using her skills
    to mentor new officers and improve departmental response protocols.
