personas:
  professional: Maria Seda, a methodical police officer in Phoenix, leverages their fluency in Spanish and deep community ties to excel in crisis de‑escalation, investigative reporting, and data‑driven
    policing, while approaching each shift with the same organized planning they use for their weekly true‑crime book club.
  sports: Maria Seda, an avid soccer enthusiast who plays midfield for a local Phoenix Rising FC women's league, routinely hikes the Saguaro National Park trails on Saturdays, cheers for the Arizona Cardinals
    on Sundays, and follows a structured fitness routine that blends interval training with after‑work salsa classes, reflecting their love for team camaraderie and personal resilience.
  arts: Maria Seda, a lifelong participant in regional folk‑dance circles and salsa nights, curates a weekly true‑crime book club featuring authors such as Gillian Flynn, captures desert sunsets through
    analog photography, and attends seasonal performances by the Phoenix Symphony, all of which enrich their sense of community and narrative storytelling.
  travel: Maria Seda, who plans trips with meticulous spreadsheets, prefers weekend road‑trips to desert‑land destinations like Sedona and Santa Fe for sunrise hikes, dreams of a cultural immersion in a
    historic colonial town renowned for vibrant street art, yet balances their wanderlust with the practical demands of family obligations and a police schedule.
  culinary: Maria Seda, an enthusiastic home cook, perfects family recipes such as slow‑cooked carnitas, tangy pozole, and sweet churros, enjoys sourcing heirloom chilies and masa at local farmer’s markets,
    and balances their culinary experiments with a practical habit of meal‑prepping protein‑rich salads for night‑shift breakfasts.
  core: Maria Seda is a structured, community‑focused police officer who channels their energetic sociability into desert hikes, soccer, folk dancing, and meticulous budgeting, while occasionally indulging
    in spontaneous novel purchases and late‑night cravings for homemade tamales.
background:
  cultural: Maria is a first‑generation Mexican‑American. Raised in a bilingual household in Phoenix, she grew up immersed in Mexican traditions—celebrating Día de los Muertos, quinceañeras, and other cultural
    holidays—while also embracing the broader Southwestern culture. Her family values of respect, community, and hard work shape her approach to policing and community service. Fluent in Spanish and English,
    she serves as a cultural bridge in her department, helping to foster trust with the city's sizable Latino population.
