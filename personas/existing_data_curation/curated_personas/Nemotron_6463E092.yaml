personas:
  professional: Justin Mccall leverages their OSHA-certified safety expertise, concrete finishing and blueprint‑reading skills, and their charismatic, talkative nature to keep construction crews motivated
    and projects on schedule, making them a natural leader on site.
  sports: Justin Mccall enjoys playing pickup basketball at the downtown Detroit YMCA league, often in a crowd of Detroit Pistons fans, volunteers as a youth soccer coach for the Grosse Pointe community
    center, and never misses a Detroit Tigers home game at Comerica Park, where they often rally coworkers for group outings.
  arts: Justin Mccall spends their evenings at local craft breweries listening to live sets by Leon Bridges and The White Stripes, collects vintage Midwestern furniture which they restore as functional
    art, and draws creative inspiration from home‑improvement shows hosted by Bob Vila.
  travel: Justin Mccall prefers short, spontaneous road trips across Michigan's Upper Peninsula and neighboring states, mapping out routes to breweries in Grand Rapids, Cleveland, and Milwaukee, while they
    dream of a future sustainable‑building showcase tour in Iceland.
  culinary: Justin Mccall blends their love for grilled fish with a side of cedar‑plank smoked salmon topped with dill and lemon, enjoys crafting the perfect cheese‑laden Detroit‑style pizza with provolone
    and pepperoni, and they often experiment with homemade bourbon‑glazed pork ribs using brown sugar and smoked paprika.
  core: Justin Mccall is a talkative, hands‑on construction foreman‑in‑training who swaps blueprints for basketball courts and brewery tours, always juggling tools, sports, and a growing list of DIY projects,
    and they occasionally indulge in late‑night pizza while stubbornly over‑committing to community events.
background:
  cultural: Justin grew up in a middle‑class, white working‑family in the Detroit metropolitan area, with deep roots in the region's manufacturing and construction heritage. His ancestry traces back to
    German and Polish immigrants who settled in Michigan in the early 20th century, instilling values of hard work, reliability, and community involvement. He was raised in a modest suburban neighborhood
    where church gatherings, local fairs, and neighborhood barbecues were staples of social life. This Midwestern upbringing emphasized practicality, modesty, and a warm hospitality that influences his
    interpersonal style. While he respects traditional norms, his curiosity drives him to adopt new ideas, especially those that improve efficiency and sustainability in his trade.
attributes:
  skills: '["Concrete finishing","Formwork and masonry","Blueprint reading","Operation of backhoe and skid‑steer loader","Welding (MIG/TIG)","OSHA safety compliance","Project coordination","Cost estimating","Client
