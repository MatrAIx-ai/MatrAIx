  hobbies: '["DIY home improvement projects","Custom woodworking in garage shop","Pickup basketball games","Attending Detroit Tigers games","Fishing on Lake Erie","Exploring Michigan craft breweries","Volunteer
    youth soccer coaching","Reading construction trade magazines","Listening to sustainable building podcasts"]'
  career_goals: Justin aims to move from a miscellaneous construction worker to a crew foreman within the next two years, leveraging his organizational strengths and people‑skills to lead larger teams.
    He plans to earn a journeyman carpenter certification and complete the OSHA 30‑hour program, then pursue a licensed general contractor credential. In the longer term, he dreams of founding his own small‑scale
    residential contracting firm that specializes in energy‑efficient retrofits and eco‑friendly materials, positioning his business as a trusted, community‑focused alternative to larger franchises. He
    also hopes to mentor younger workers, sharing his blend of practical know‑how and openness to innovation.
