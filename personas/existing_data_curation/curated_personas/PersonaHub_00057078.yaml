persona_description: A person who is interested in bioregions, ecological conservation, and the management of natural resources. They are knowledgeable about the unique cultural identity of a bioregion
  and the importance of local communities in decision-making. They are also familiar with the various conservation tools and technologies needed to ensure sustainable development in bioregions. They have
  a passion for the interactive and dynamic nature of bioregions and are interested in the innovative forms of institutional integration and social cooperation needed to meet the needs of all interests
  involved. They are also interested in the various conservation methods and technologies that can be brought to bear in bioregions, such as protected-areas management, ex situ technologies, and sustainable
  management of resources.
