    films'']'
  career_goals: In the near term, Dylan aims to assemble a compelling portfolio of concept art and narrative pieces that will secure freelance commissions or an apprenticeship at an indie game studio in
    the Phoenix metro area. He plans to obtain his GED within the next two years and then enroll in a community‑college program or a specialized digital‑arts bootcamp to formalize his skills. Long‑term,
    he envisions launching his own boutique studio that blends visual storytelling, interactive game design, and experimental music, creating immersive experiences that explore abstract philosophical ideas.
    He also hopes to compete in regional e‑sports tournaments to hone his strategic mindset and build connections within the gaming industry.
