  career_goals: Harrison dreams of becoming an astronaut who explores space, an artist whose drawings fill galleries, or an inventor who creates new gadgets. He aspires to win a school science fair, be
    the best player on his soccer team, and later, possibly a teacher who inspires other kids to ask big questions. His goals are fluid, driven by his curiosity for novelty and his desire to be recognized
    for his achievements.
