personas:
  professional: A budding junior illustrator and LEGO architect named Harrison Keely channels their vivid imagination and competitive spark into detailed cartoon drawings and intricate magnetic‑tile constructions,
    showcasing early skill in visual storytelling and spatial problem‑solving.
  sports: An energetic kid‑soccer enthusiast named Harrison Keely plays forward for the Sherwood Little Strikers, chases tag games after school, proudly sports a Green Bay Packers cap while cheering the
    Milwaukee Brewers during family outings, and they revel in the roar of the crowd.
  arts: A creative doodler named Harrison Keely fills sketchbooks with cartoon characters inspired by Mo Willems and Eric Carle, sings along to Kidz Bop versions of contemporary pop hits, eagerly watches
    Pixar’s ‘Toy Story’ series, and they find inspiration for their own water‑colour fairy‑tale scenes.
  travel: An adventurous explorer named Harrison Keely prefers spontaneous day‑trips with family, relishes picnicking by Lake Geneva, has enjoyed a weekend visit to Chicago’s Navy Pier, and they dream of
    trekking through Yellowstone National Park’s geysers and later experiencing the magic of Disney World.
  culinary: A budding foodie named Harrison Keely loves buttery popcorn, cheesy macaroni, and fresh strawberry shortcake slices, helps stir pancake batter with a wooden spoon, proudly assembles peanut‑butter‑and‑jelly
    sandwiches, and they can always be found requesting extra cheese on their homemade pizza topped with sliced pepperoni and green bell peppers.
  core: Harrison Keely is a six‑year‑old whirlwind of imagination who balances a competitive drive with a love for collaborative play, turning every sticker, LEGO set, and sketch into a personal adventure,
    and they never miss a chance to share their creations.
background:
  cultural: Harrison is raised in a white Midwestern family in Sherwood, Wisconsin, a small town surrounded by farms, lakes, and tight‑knit neighborhoods. His ancestry reflects the common German‑Scandinavian
    heritage of the region. The family participates in local traditions such as the Calumet County fair, church Sunday school, community potlucks, and celebrates national holidays like Thanksgiving and
    the Fourth of July. He attends the local public elementary school where multicultural events are celebrated, but his cultural experience is grounded in mainstream American values of friendliness, modesty,
    hard work, and a love for outdoor recreation.
