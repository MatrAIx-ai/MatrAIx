  career_goals: Samantha aims to pursue a degree in visual arts or art therapy at a community college and later transfer to a four‑year university, with the long‑term goal of working as a freelance graphic
    designer for nonprofit organizations or becoming a certified art therapist. She also hopes to develop a portfolio that combines her love for illustration and social impact, secure internships at local
    museums or community art centers, and eventually establish a small studio that offers art workshops for youth and adults while maintaining a work‑life balance that supports her mental well‑being.
