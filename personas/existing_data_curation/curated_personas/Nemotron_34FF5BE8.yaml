personas:
  professional: Tahlia Dickey, a junior LEGO architect, blends curiosity with practicality by designing whimsical animal‑themed structures that follow clear step‑by‑step plans, while their reliable yet
    flexible nature lets them adapt when building with friends in school projects.
  sports: Tahlia Dickey, a member of the Sunrise Soccer Club’s under‑seven team in the spring and a budding swimmer at the community pool in summer, cheers for the Chicago Cubs and the Golden State Warriors,
    and approaches fitness with playful enthusiasm, balancing organized practice drills with spontaneous backyard obstacle races.
  arts: Tahlia Dickey channels their love for drawing animals into colorful sketches inspired by Eric Carle and Dr. Seuss, sings gospel and R&B classics like 'Amazing Grace' and 'Ain’t No Mountain High
    Enough' with family, and enjoys watching performances by Misty Copeland, shaping a vibrant creative identity that blends imagination and rhythm.
  travel: Tahlia Dickey prefers family road trips that combine nature hikes at the nearby state park with visits to kid‑friendly museums like the Children's Discovery Center, has explored Disney World on
    a summer vacation, and dreams of seeing the towering redwoods of California and the bustling streets of London, all while staying within a modest family travel budget.
  culinary: Tahlia Dickey loves the sweet smell of chocolate chip cookies they help bake, delights in homemade macaroni and cheese with a sprinkle of broccoli, can skillfully stir batter with a wooden spoon,
    and often requests strawberry slices and peanut butter as snack favorites during playtime.
  core: Tahlia Dickey is a curious, organized six‑year‑old who balances block‑building brilliance with gentle kindness, occasionally loses focus on chores but quickly bounces back with a bright smile.
background:
  cultural: Tahlia grows up in a close‑knit African‑American family in Winnabow, North Carolina, where community, church, and family gatherings are central. She experiences Southern traditions such as Sunday
    church services with gospel music, family meals featuring collard greens, cornbread, and fried fish, and community events like the Brunswick County Fair. Her cultural environment emphasizes kindness,
    cooperation, respect for elders, and a strong sense of belonging, shaping her thoughtful and harmonious personality.
