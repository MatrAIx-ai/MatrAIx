personas:
  professional: Tyler Uria, a retired small‑scale manufacturing specialist turned home‑renovation consultant, leverages their carpentry mastery, budgeting acumen, and pragmatic problem‑solving to deliver
    structured project plans that they can spontaneously adapt, while their competitive drive pushes apprentices toward high standards even as they sometimes wrestle with tight deadlines.
  sports: Tyler Uria stays active through early‑morning walks along the Eastern Promenade, occasional kayaking with the Portland Yacht Club, and weekend fishing trips in Casco Bay, and they cheer for the
    Portland Sea Dogs and the Boston Red Sox while occasionally joining a senior softball league at the local community center.
  arts: Tyler Uria enriches their evenings by drumming at local folk music gatherings, where they enjoy the sounds of Pete Seeger, Bob Dylan, and regional fiddler Maggie McGirr, while also frequenting the
    Portland Museum of Art to admire Winslow Homer seascapes and diving into New England maritime history books by authors such as Nathaniel Philbrick.
  travel: Tyler Uria prefers modest, well‑planned road trips along the New England coast, visiting Bar Harbor, Acadia National Park, and historic Portland, yet they also relish spontaneous weekend getaways
    to Halifax, Nova Scotia, and dream of sailing to Reykjavik to explore Viking maritime heritage, all while balancing a fixed retirement income.
  culinary: Tyler Uria enjoys cooking hearty New England fare, often preparing lobster rolls, creamy clam chowder, and cedar‑plank smoked cod seasoned with fresh thyme and dill, while they swap garden‑grown
    carrots and potatoes into rustic stews and occasionally experiment with sourdough bread baking.
  core: Tyler Uria is a pragmatic, competitively‑driven retiree who balances meticulous carpentry and budgeting with spontaneous fishing and drum‑filled folk sessions, and they occasionally wrestle with
    disorganized deadlines while nurturing a stubborn love for the Maine coastline.
background:
  cultural: Tyler grew up in a working‑class white family in coastal Maine, shaped by the region’s maritime heritage and New England self‑reliance. His upbringing emphasized modesty, practical skills, and
    a respect for the natural environment, reflected in his love of the sea, forestry, and local community traditions. He has deep ties to neighborhood institutions such as the town library, a modest Methodist
    congregation, and the local volunteer fire department, where community service and personal independence are highly valued. This cultural foundation informs his pragmatic outlook, competitive spirit,
    and balanced need for both social interaction and solitary reflection.
attributes:
  skills: '["Carpentry", "Basic Electrical Repair", "Plumbing Maintenance", "Small Engine Repair", "Budget Management", "Inventory Control", "Ad‑hoc Problem Solving", "Apprentice Mentoring"]'
  hobbies: '["Seasonal Gardening", "Fishing Trips", "Woodworking", "Cedar Sailboat Construction", "Local History Research", "Folk Music Sessions", "Crossword Puzzles", "Garage tinkering"]'
  career_goals: Although retired from full‑time work, Tyler aims to stay active and financially independent by offering occasional consulting on home‑renovation projects and small‑business budgeting. He
    envisions establishing a community workshop in Portland where he can share his skills with local youth, combining his structured approach to teaching with the flexibility to take on spontaneous community
    projects. He also hopes to complete a personal legacy project—a handcrafted cedar sailboat—to enjoy the Maine coastline and demonstrate his craftsmanship before he fully steps back from active work.
