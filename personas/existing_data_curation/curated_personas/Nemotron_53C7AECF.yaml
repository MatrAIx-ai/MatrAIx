  hobbies: '[''Gardening (vegetable garden)'', ''Reading historical fiction'', ''Community theater attendance'', ''Hiking and walking trails'', ''Genealogy research'', ''Quilting and craft projects'', ''Cooking
    and baking'', ''Volunteering at local library/senior center'']'
  career_goals: Sofia aims to advance from her current receptionist role to a senior front-desk manager or office manager position within the municipal office, where she can oversee a small team and streamline
    daily operations. She plans to pursue a certificate in office administration to formalize her existing expertise and to lead a digitization project that will transition paper records to a secure electronic
    system. Additionally, Sofia hopes to develop a mentorship program for new clerical staff, fostering a supportive workplace culture. In the longer term, she is interested in taking on a community-outreach
    liaison role, helping to coordinate local events and improving public access to city services.
