  career_goals: Although only two years old, Vanessa already shows a budding sense of purpose. She loves storytime and frequently tells adults she wants to "write my name" and "help in the kitchen." Her
    curiosity about how things work, combined with a practical appreciation for routine, fuels a gentle ambition to become a teacher or community helper who can share stories and songs from her Mexican
    heritage. In the near future she looks forward to mastering writing her name, assisting her parents with simple cooking tasks, and later, guiding younger children in play.
