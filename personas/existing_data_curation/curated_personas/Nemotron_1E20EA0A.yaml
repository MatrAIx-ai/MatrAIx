personas:
  professional: Marriam Naber is a hands‑on construction specialist whose expertise in concrete finishing, heavy‑equipment operation, and OSHA compliance is amplified by a competitive drive that pushes
    crews toward safety excellence, while their laid‑back, sociable nature keeps the job site lively despite a penchant for spontaneous planning.
  sports: Marriam Naber dominates the local beach volleyball scene at Ventura Shores, hikes the Santa Monica Mountains every Saturday, competes in the co‑ed softball league with the Ventura Vipers, squeezes
    in weekend tennis matches, and cheers on the Los Angeles Dodgers, Lakers, and trains with the Ventura Volleyball Club.
  arts: Marriam Naber fuels evenings with classic rock anthems from The Rolling Stones, Led Zeppelin, and AC/DC, hosts impromptu karaoke battles that showcase their love for Queen’s Bohemian Rhapsody, and
    attends occasional gigs at the historic Granada Theatre, letting music and performance amplify their sociable energy.
  travel: Marriam Naber prefers spontaneous road‑trip itineraries along the Pacific Coast Highway, balancing weekend surf sessions at Santa Cruz with longer hikes in Yosemite, and dreams of a summer escape
    to Cabo San Lucas, all while budgeting around a modest household income and a busy work schedule.
  culinary: Marriam Naber enjoys cooking grilled fish tacos with fresh cilantro, lime, and smoky chipotle mayo, casually tosses avocado salad into weekend barbecues, and experiments with upcycled rustic
    tables to serve farm‑to‑table dishes, reflecting a moderate cooking skill that favors simple, coastal flavors.
  core: Marriam Naber is a fiercely competitive yet easy‑going construction enthusiast who balances heavy‑equipment mastery with spontaneous social gatherings, a love for classic rock, and a habit of leaving
    toolboxes half‑organized while dreaming of launching a green‑building venture.
background:
  cultural: Marriam grew up in a middle‑class, predominantly white suburb of Southern California, where a strong work ethic and community involvement were emphasized. Her family traditions include celebrating
    major American holidays with potluck meals and a love for outdoor activities typical of coastal California. Living in Ventura has exposed her to a blend of surf‑side leisure culture and the rugged,
    blue‑collar construction community, shaping a pragmatic yet sociable worldview. She identifies with mainstream American values—self‑reliance, competitiveness, and a friendly, laid‑back attitude—while
    also valuing the collaborative spirit of local volunteer projects.
attributes:
  skills: '[''Concrete finishing'', ''Framing'', ''Demolition'', ''Heavy equipment operation (skid‑steer, back‑hoe)'', ''Blueprint reading'', ''OSHA safety compliance'', ''Material handling and logistics'',
    ''Team coordination'', ''Equipment troubleshooting'', ''Site cleanup'']'
  hobbies: '[''Beach volleyball'', ''Coastal hiking'', ''Softball league'', ''Tennis'', ''DIY home improvement'', ''Furniture upcycling'', ''Karaoke'', ''Community barbecues'', ''Habitat for Humanity volunteering'',
    ''Classic rock listening'']'
  career_goals: She aims to become a certified foreperson within the next three years, obtaining OSHA 30‑hour certification and a heavy‑equipment operator license. Long‑term, she dreams of launching a small
    subcontracting firm with her husband, focusing on residential remodels and green building projects. She is driven to lead crews, improve efficiency, and be recognized for safety excellence. She also
    plans to take night classes for a construction management certificate to broaden her career prospects.
