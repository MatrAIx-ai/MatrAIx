personas:
  professional: Maria Davila, an 11‑year‑old budding visual artist and novice coder, merges curiosity with meticulous organization as they sketch vibrant Salinas street scenes and program simple Arduino
    robots, often collaborating with classmates to turn their drawings into interactive art‑tech projects while staying mindful of teammates' feelings.
  sports: Maria Davila, an enthusiastic participant in the Salinas United Soccer Club and a regular fan of the San Jose Sharks and the Oakland Athletics, they balance active play on the field with weekend
    bike rides through farm lanes, preferring fun‑filled practice sessions over competitive pressure.
  arts: Maria Davila, who spends afternoons sketching street vistas inspired by artists like Frida Kahlo and Banksy, loses themselves in graphic novels such as Amulet and The Arrival, sways to traditional
    Mexican folk songs by Lila Downs alongside contemporary pop hits from Billie Eilish, and proudly performs folkloric dances at school cultural celebrations, they embody a vibrant blend of visual and
    auditory creativity.
  travel: Maria Davila, who dreams of exploring the Pacific Coast Highway on a family road trip, has already visited the Monterey Bay Aquarium and Yosemite National Park with school field trips, and hopes
    to one day journey to Mexico City’s historic center to taste street‑food tacos, they prefer carefully planned itineraries that blend adventure with familiar comforts.
  culinary: Maria Davila, an eager young cook who confidently rolls homemade tamales and chops cilantro for fresh salsa while experimenting with guacamole and grilled corn, they consider their kitchen skill
    level intermediate—able to follow family recipes and add a personal twist, often improvising with spices like cumin and chili powder.
  core: Maria Davila, an 11‑year‑old curious sketcher, coder, and salsa‑maker, balances artistic ambition with frequent worries, and they find calm in garden work, journaling, and lively folk dances.
background:
  cultural: Maria comes from a Mexican‑American family that maintains strong ties to its roots while living in Salinas, a city with deep agricultural and Latino heritage. Her household celebrates Día de
    los Muertos, Día de la Independencia, and traditional holidays with altars, marigold decorations, and shared meals of enchiladas, tamales, and pozole. Spanish is spoken at home, and she often hears
    stories of her grandparents' migration and farming life, which shape her sense of identity. The vibrant Mexican community in Monterey County provides her with a supportive environment of cultural events,
    music, dance, and bilingual education, fostering a prideful connection to both her Mexican ancestry and her American upbringing.
