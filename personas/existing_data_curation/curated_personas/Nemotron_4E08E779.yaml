  hobbies: '[''sketching local landscapes'', ''listening to Mexican folk and pop music'', ''reading graphic novels'', ''cooking family recipes'', ''gardening with grandparents'', ''journaling'', ''after‑school
    robotics club'', ''folkloric dancing'']'
  career_goals: Maria dreams of becoming a multidisciplinary artist who can blend visual art with storytelling to celebrate her Mexican heritage and raise awareness about environmental issues in her community.
    She is also curious about working as an educator or community outreach coordinator, where she can share art and cultural knowledge with younger children and help promote sustainable farming practices
    in Salinas. While she recognizes her current age, she sets short‑term goals of developing a strong portfolio, participating in school art exhibits, and volunteering at the local community garden.
