  hobbies: '[''Book Club'', ''Community Fair Volunteering'', ''Community Theater (Backstage)'', ''Gardening'', ''Line Dancing'', ''Yoga'', ''Crossword Puzzles'', ''Sudoku'', ''Cooking Comfort Food'', ''Potluck
    Participation'']'
  career_goals: Sandra aims to advance to a supervisory role within the dispatch center, eventually becoming a Shift Supervisor or Dispatcher Manager. She seeks to implement stress-reduction protocols and
    mental health support for her team, and to develop a community outreach program that educates residents on emergency preparedness. Long-term, she aspires to obtain a bachelor's degree in Emergency Management
    and transition into a county-level emergency planning position, where she can shape policy and improve public safety infrastructure.
