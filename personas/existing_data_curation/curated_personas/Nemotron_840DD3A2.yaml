personas:
  professional: Anthony Boyd is an aspiring young coder and LEGO engineer who blends his curiosity for new ideas with meticulous planning, spending afternoons crafting Scratch animations and building intricate
    LEGO robotics while journaling each project step to keep his mind organized.
  sports: Anthony Boyd plays forward on his neighbourhood soccer team, the North Nashville Thunder, follows the Nashville SC with enthusiasm, joins summer swimming lessons at the community pool, and keeps
    a disciplined after‑school routine of stretching and cardio, though occasional nervousness before matches sometimes leads them to over‑practice penalty kicks.
  arts: Anthony Boyd is a budding visual artist who spends weekends sketching charcoal portraits at the Frist Art Museum, draws inspiration from country legends like Dolly Parton and classic‑rock icons
    such as Bruce Springsteen, experiments with watercolour scenes of Appalachian hills, and eagerly awaits the Nashville Film Festival to discuss animation techniques with fellow young creators.
  travel: Anthony Boyd loves weekend road trips to the Great Smoky Mountains, has a budding wish to explore the Smithsonian in Washington, D.C., and plans each family outing with a hand‑drawn map and checklist,
    preferring nature hikes that end with a picnic of fried chicken and watermelon, yet carefully balances travel excitement with school responsibilities.
  culinary: Anthony Boyd enjoys Southern comfort foods—biscuit‑and‑gravy breakfast, smoked pulled pork sandwiches, and homemade mac & cheese—while also experimenting with simple dishes like veggie‑filled
    quesadillas, often practicing his culinary skills by chopping carrots for his family’s Sunday dinner and savoring the aroma of fresh‑baked chocolate chip cookies his mother makes.
  core: Anthony Boyd combines a methodical, curiosity‑driven mind with a love for art, LEGO, and soccer, meticulously planning each hobby while battling occasional worries that make them over‑prepare and
    over‑think the simplest tasks.
background:
  cultural: Anthony comes from a White American family rooted in Nashville, Tennessee. His upbringing reflects Southern cultural traditions, including attending a Baptist church, celebrating Thanksgiving
    and the Fourth of July with family barbecues, and listening to country and bluegrass music at home. He enjoys local cultural events such as the Nashville Film Festival and visits to the Frist Art Museum,
    which nurture his appreciation for the arts. His family values education, community involvement, and a blend of traditional Southern hospitality with the vibrant, diverse artistic scene of Nashville.
