  hobbies: '[''Watercolor painting'', ''Sketching'', ''LEGO building'', ''Scratch coding'', ''Reading fantasy novels'', ''Playing piano'', ''Soccer'', ''Science club experiments'', ''Museum visits'', ''Journaling'']'
  career_goals: Anthony dreams of becoming a multidisciplinary creator - perhaps an architect or video game designer - who can blend his love for art, storytelling, and technology to build imaginative and
    sustainable worlds. He also hopes to share his passion for science and creativity by volunteering as a youth mentor or eventually teaching STEM subjects to younger children. His long-term ambition is
    to design spaces or experiences that inspire curiosity and community connection.
