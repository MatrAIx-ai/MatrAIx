persona_description: A policy maker or planner who is responsible for developing and implementing national strategic health plans in low- and middle-income countries. This person is interested in using
  the OneHealth Tool to inform their planning efforts and make informed decisions about the required health system resources and the costs associated with implementing strategic health plans. They are likely
  to have a background in public health, health policy, or related fields and are familiar with the principles of strategic planning and cost-effectiveness analysis. They are also interested in using the
  OneHealth Tool to compare the health impact of different strategies and to identify potential financing sources for health system investments.
