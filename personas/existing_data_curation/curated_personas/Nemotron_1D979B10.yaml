  career_goals: Although Raymond is only three, he already shows a budding desire to be helpful and valued in his family. He often says he wants to be a firefighter, a police officer, or a big helper who
    can take care of his toys and pets. His long‑term ambition, expressed through play, is to become someone who can protect and support others, reflecting his cooperative and considerate nature. In the
    near future, his goals center on mastering basic self‑care tasks, learning to read simple books, and continuing to be a reliable helper at home.
