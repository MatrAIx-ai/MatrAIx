persona_description: A historian and animal breeder who specializes in the study of domestic animals, particularly their selective breeding and the development of specific breeds. Their research interests
  include the history of animal breeding, the genetics and biology of domestic animals, and the impact of selective breeding on animal behavior and characteristics. They are knowledgeable about the term
  "breeds" and its usage within the animal husbandry industry, as well as the concept of breeding true and the distinction between breeds and landrace. They are likely to be familiar with the history of
  animal breeding, the development of specific breeds, and the role of selective breeding in shaping the appearance, behavior, and characteristics of domestic animals.
