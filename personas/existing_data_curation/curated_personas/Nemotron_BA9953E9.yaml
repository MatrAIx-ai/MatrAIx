  career_goals: Even at 71, Diana aims to leave a lasting legacy by mentoring the next generation of nurses and establishing a community health outreach program focused on the Mexican‑American senior population
    in Lake Charles. She hopes to obtain a palliative‑care certification to better support end‑of‑life patients and to organize culturally sensitive health workshops at local churches. Additionally, she
    wishes to compile her decades of nursing stories into a memoir that highlights resilience, cultural pride, and the importance of compassionate care.
