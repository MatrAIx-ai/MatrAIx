personas:
  professional: Diana Duque, a veteran registered nurse with over four decades of geriatric and acute care experience, channels her talkative, competitive spirit and meticulous documentation into mentoring
    younger staff, championing bilingual patient advocacy, and designing culturally sensitive health workshops that balance curiosity with practical care.
  sports: Diana Duque, who maintains fitness by strolling the bayou with her husband, dancing salsa at community events, and participating in the senior bowling league at the Lake Charles Lions Club, follows
    the Louisiana Ragin’ Cajuns football season with enthusiastic potluck gatherings, viewing exercise as both a social ritual and a practical way to manage her arthritis.
  arts: Diana Duque, an exuberant voice in her church choir that blends gospel hymns with classic boleros by Juan Gabriel and contemporary Latin pop from Gloria Estefan, spends evenings watching telenovelas
    starring Jorge Luzardo and Angelique Bergere, letting the drama and melody weave into her storytelling at family gatherings.
  travel: Diana Duque, who prefers meticulously planned trips that weave family visits with cultural immersion, frequently revisits New Orleans for its music festivals and has journeyed to the historic
    missions of San Antonio, while dreaming of a future cruise to the Yucatán Peninsula to explore ancient ruins and savor regional flavors, balancing limited budget constraints with a deep yearning for
    meaningful experiences.
  culinary: Diana Duque, an accomplished home chef celebrated for her hand‑rolled tamales, rich mole made with ancho chilies, and a cajun‑inspired shrimp étouffée seasoned with okra and andouille sausage,
    delights friends and neighbors by pairing fresh garden herbs like cilantro and epazote with traditional dishes, turning each meal into a lively cultural exchange.
  core: Diana Duque, a spirited 71‑year‑old nursing veteran who balances relentless mentorship and salsa dancing with a habit of late‑night coffee over health‑policy drafts, embodies compassionate pragmatism
    tempered by a healthy dose of competitive flair.
background:
  cultural: Born to Mexican parents and raised with strong family and Catholic values, Diana retains deep ties to her heritage, celebrating Día de los Muertos, Las Posadas, and other Mexican holidays. Her
    bilingual upbringing enables her to navigate both Mexican and Southern Louisiana cultures, often blending Mexican cuisine with local Cajun flavors. She emphasizes respect for elders, community solidarity,
    and the importance of sharing food and stories, which she carries into her professional and personal life in Jefferson Davis Parish.
