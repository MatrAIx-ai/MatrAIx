personas:
  professional: Todd Markley, a budding mechanical tinkerer with a knack for troubleshooting tech, blends curiosity and practicality as they lead small community tech projects, balancing organization with
    flexibility to deliver reliable solutions.
  sports: Todd Markley shoots hoops at the Lilburn Community Park, rides his bike along the Sugar Hill trail, cheers for the Atlanta Falcons and the Atlanta Hawks, and plays on the Lilburn High School Panthers
    junior basketball team, balancing casual fitness with a competitive spark.
  arts: Todd Markley devotes free evenings to classic rock legends like Led Zeppelin and country icons such as Dolly Parton, attends local library author talks, and sketches robot concepts while humming
    the Rolling Stones, weaving music and imagination into his creative downtime.
  travel: Todd Markley prefers road‑trip adventures, having driven to the Georgia Aquarium and a robotics expo in Columbus, Ohio; they dream of a future visit to Tokyo’s Akihabara district to soak up cutting‑edge
    tech while budgeting each trip like a project plan.
  culinary: Todd Markley enjoys cooking simple, hearty meals like homemade pizza topped with pepperoni and fresh basil, perfecting a grilled cheese with sharp cheddar, and experimenting with BBQ chicken
    wings seasoned with smoked paprika and honey.
  core: Todd Markley is a curiosity‑driven teen who balances building robots with bike repairs, meticulously budgets for Lego kits while binge‑coding at midnight, and never skips a high‑school football
    game despite occasional sleep‑deprivation.
background:
  cultural: Todd was raised in a middle‑class, suburban family in Lilburn, Georgia, within Gwinnett County. His upbringing blends traditional Southern values—such as community hospitality, church involvement
    (often attending a local Methodist congregation), and a love for weekend football games—with modern digital influences from online tutorials and gaming. Family gatherings feature classic Southern cuisine
    like fried chicken, barbecue, and peach cobbler, and his social circle reflects the county’s growing diversity while remaining largely rooted in the local white, suburban culture. This mix shapes his
    practical mindset, collaborative spirit, and appreciation for both established methods and new ideas.
attributes:
  skills: '[''Basic computer and smartphone troubleshooting'', ''Beginner Python and Scratch programming'', ''Graphic design using Canva'', ''Woodworking and basic carpentry'', ''Bicycle maintenance and
