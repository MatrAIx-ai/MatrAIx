  hobbies: '[''Building model kits (Lego Technic, RC cars)'', ''Beginner coding (Python, Scratch)'', ''Playing basketball'', ''Biking around Lilburn'', ''Woodworking projects'', ''Arduino electronics tinkering'',
    ''Reading science and technology magazines'', ''Listening to classic rock and country music'', ''Volunteering at the community library tech desk'', ''Attending local high‑school football games'']'
  career_goals: Todd aims to earn his GED within the next year and pursue a technical education at a community college, focusing on mechanical engineering or information technology. He dreams of one day
    designing functional prototypes—such as small robotic devices or custom bike accessories—and eventually opening a modest workshop where he can combine his love for hands-on building with customer service.
    In the long term, he hopes to secure a stable engineering or IT support role that lets him continue learning new technologies while contributing practical solutions to his community.
