    training'', ''Safety compliance and OSHA regulations'', ''Energy‑efficiency retrofitting'']'
  hobbies: '[''Fishing trips'', ''Hunting outings'', ''Golf league'', ''Woodworking and furniture making'', ''Restoring vintage motorcycles'', ''Mentoring vocational‑training apprentices'', ''Attending
    community fairs and live music events'', ''Participating in church and community gatherings'', ''Gardening (vegetable garden)'', ''Playing classic rock music'']'
  career_goals: Approaching retirement, Michael aims to leverage his decades of experience by transitioning into a mentorship and consulting role. He plans to obtain the NATE Master Technician certification,
    continue training the next generation of HVAC technicians through a local community‑college apprenticeship program, and eventually establish a small boutique service business focused on energy‑efficient
    installations for seniors in his area. He also hopes to serve as a safety auditor for local contractors, ensuring best practices and code compliance.
