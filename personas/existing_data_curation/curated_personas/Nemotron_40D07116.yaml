personas:
  professional: Michael Malcolm, a veteran HVAC mechanic with 35+ years of hands‑on experience, combines meticulous, code‑driven problem solving with a personable, apprentice‑focused mentoring style as
    they pivot toward consulting and senior‑focused energy‑efficiency retrofits.
  sports: Michael Malcolm cultivates fitness through weekly rounds at the Lakeview Senior Golf Club, roots for the Cleveland Guardians in baseball and the Cleveland Browns in football, and balances their
    outdoor enthusiasm with seasonal deer hunts and lake‑side fishing trips that keep their stamina sharp.
  arts: Michael Malcolm’s evenings are often filled with classic rock anthems from The Rolling Stones, Led Zeppelin, and Bruce Springsteen, while their weekends include visits to local artisan fairs showcasing
    woodworking sculptures and folk painting, and occasional attendance at community theater productions of ‘Our Town.’
  travel: Michael Malcolm prefers road‑trip adventures that combine fishing in the Ozark lakes, hunting in the Appalachian foothills, and cultural stops at Nashville’s music scene, with a bucket‑list yearning
    to explore the Canadian Rockies and the historic streets of Prague during their retirement years.
  culinary: Michael Malcolm enjoys grilling ribeye steaks seasoned with rosemary and garlic, crafting hearty chili loaded with kidney beans, cumin, and fresh garden tomatoes, and perfecting a Sunday brunch
    omelet infused with cheddar and chopped basil, yet they admit a guilty pleasure for indulgent chocolate lava cake at the town bakery.
  core: Michael Malcolm is a methodical, community‑oriented handyman who balances a meticulous work ethic with a love for classic rock, occasional over‑indulgence in high‑calorie grill fare, and a stubborn
    habit of collecting vintage motorcycle parts.
background:
  cultural: Michael was raised in the Appalachian‑influenced region of Kentucky, where a strong work ethic, self‑reliance, and close‑knit community values are central. As a white Southern American, his
    cultural identity is shaped by the traditions of rural Kentucky—church involvement, hospitality, and an appreciation for the outdoors. Living in Crestwood, an edge‑of‑Louisville suburb, he blends this
    heritage with a modest suburban lifestyle, participating in local events, supporting local businesses, and maintaining ties to his family and long‑time friends. His background reflects the blend of
    blue‑collar pride and evolving modern sensibilities of the mid‑South.
attributes:
  skills: '[''HVAC system installation'', ''Commercial and residential refrigeration repair'', ''Preventive maintenance'', ''Diagnostic troubleshooting using multimeters and pressure gauges'', ''System
