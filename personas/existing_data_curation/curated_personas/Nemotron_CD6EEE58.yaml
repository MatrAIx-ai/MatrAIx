  career_goals: Karen aims to become a top scholar and eventually a research scientist or engineer, focusing on solving real‑world problems. She aspires to attend a competitive high school, win science‑fair
    awards, and earn scholarships that will enable her to study in a STEM field. She also envisions mentoring younger students, using her disciplined approach to help them achieve high standards.
