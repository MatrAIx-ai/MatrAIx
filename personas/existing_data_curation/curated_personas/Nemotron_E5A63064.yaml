  career_goals: Looking ahead, Daniel hopes to combine his love of technology and his desire to help others by pursuing a career in user experience (UX) design or game development, fields that let him structure
    creative projects while considering the emotional impact on users. He also dreams of earning a degree in psychology or counseling to become a youth mentor, providing support for peers dealing with anxiety.
    Ultimately, he seeks a profession that offers clear, step‑by‑step processes but also room for spontaneous, empathetic interaction.
