personas:
  professional: Daniel Gibson, a 14‑year‑old aspiring digital comic artist, blends a love for structure with spontaneous bursts of imagination, using Procreate and Blender to craft detailed superhero sketches
    while often struggling with deadlines due to organization challenges.
  sports: Daniel Gibson plays pickup basketball at the Oakwood Community Center, follows the Los Angeles Lakers for LeBron James' teamwork, cheers for the Denver Nuggets during the NBA season, and participates
    in his middle‑school varsity squad during the winter months.
  arts: Daniel Gibson spends evenings drawing comic‑style heroes inspired by Stan Lee and Neil Gaiman, experiments with digital brushes like Greg Capullo, sings in his church youth choir performing contemporary
    pop songs by Billie Eilish and classic Broadway tunes by Lin‑Manuel Miranda, and writes short fantasy stories to process emotions.
  travel: Daniel Gibson dreams of exploring the Grand Canyon’s cliffs and Tokyo’s Akihabara district, but currently limits travel to weekend road trips with his parents to the nearby state park, using a
    budget‑friendly travel app to plan low‑cost adventures.
  culinary: Daniel Gibson favors quick‑fix meals such as pepperoni pizza, spicy pork‑belly ramen, and avocado toast topped with feta, often cooking while listening to lo‑fi beats, yet sometimes skips breakfast
    before school due to late‑night gaming sessions.
  core: Daniel Gibson is a quietly ambitious teen whose passion for comic art and basketball clashes with anxiety‑driven impulse spending, missed deadlines, and a habit of doodling in journal margins during
    meditation breaks.
background:
  cultural: Daniel’s cultural background is rooted in African American traditions passed down through his family, who moved from Detroit to Howell seeking a quieter environment while keeping strong ties
    to the Black community. He grew up listening to a mix of hip‑hop, R&B, and jazz, and family gatherings often feature soul food dishes like collard greens and cornbread. The local church plays a central
    role in his life, providing a space for music, mentorship, and community service. He values the storytelling and resilience that are hallmarks of African American culture, and he integrates these influences
    into his art, music preferences, and his commitment to supporting peers.
