  career_goals: Edison aims to become a lead engineer in product design, focusing on socially responsible and culturally resonant technology. He plans to pursue a Master’s in Engineering Design within the
    next three years to deepen his expertise in sustainable design. Long‑term, he envisions founding an interdisciplinary design studio that merges engineering rigor with artistic expression, creating products
    that reflect the narratives of Chicago’s Black communities. He also hopes to mentor underrepresented youth through STEM outreach programs and influence corporate culture toward greater inclusion and
    empathy.
