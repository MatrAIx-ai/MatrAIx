personas:
  professional: Edison James, a 22‑year‑old product design engineer, blends SolidWorks proficiency and Python automation with a deep appreciation for jazz‑inspired storytelling, using their methodical planning
    and curiosity to craft sustainable prototypes that echo the city’s cultural narratives.
  sports: Edison James jogs along the lakefront with the Chicago Lakefront Runners, follows the Chicago Bulls and the Chicago White Sox with fervor, plays pick‑up basketball at a community center on weekends,
    and balances their fitness regime with yoga to counteract stress.
  arts: Edison James immerses themselves in the city’s street‑art scene, sketching murals inspired by Shepard Fairey while regularly attending live sets by jazz legends Miles Davis and contemporary blues
    artist Gary Clark Jr., and they unwind by reading Octavia Butler’s speculative fiction.
  travel: Edison James prefers meticulously planned weekend getaways, having explored New Orleans for its immersive jazz heritage and the architectural marvels of Barcelona, while dreaming of a spring pilgrimage
    to Ghana’s coastal villages to trace family migration stories.
  culinary: Edison James enjoys cooking soul‑food classics like collard greens simmered with smoked turkey and mastering the perfect Chicago deep‑dish pizza, often pairing meals with a side of homemade
    hot sauce infused with jalapeños and garlic.
  core: Edison James is a curious, jazz‑driven design engineer who meticulously prototypes sustainable products while habitually over‑analyzing every detail, often staying up late sketching murals and worrying
    about the next deadline.
background:
  cultural: Edison is African American, raised on Chicago’s South Side where his family’s roots trace back to the Great Migration. His upbringing was steeped in the city’s rich legacy of blues, jazz, and
    the Black Arts Movement. Family gatherings often featured discussions of African American literature, civil rights history, and community activism, shaping his sense of social responsibility. He regularly
    participates in local cultural festivals like the Chicago Black Arts Festival and takes pride in the city’s iconic architecture, which fuels his fascination with design. This cultural context informs
    his desire to create engineering solutions that honor and uplift Black narratives and address systemic inequities.
