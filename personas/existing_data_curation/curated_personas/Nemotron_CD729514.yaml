  career_goals: Sandra dreams of becoming a veterinarian because she loves animals and wants to care for them. She also hopes to combine her artistic talent with science by creating illustrated educational
    books about wildlife. In the future she plans to volunteer at animal shelters and eventually start a community outreach program that teaches kids about responsible pet care and environmental stewardship.
