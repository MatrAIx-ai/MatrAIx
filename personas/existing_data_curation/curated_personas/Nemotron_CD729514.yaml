personas:
  professional: Sandra Ayala is a middle‑school student who channels her curiosity for fantasy worlds into creative writing projects and detailed wildlife sketches, preferring flexible study routines over
    strict planning while allowing their imagination to steer school assignments.
  sports: Sandra Ayala plays spirited pick‑up soccer with friends at Baldwin Park’s community field as a member of the Baldwin Park Youth Soccer Club, cheering on LAFC during the MLS season while favoring
    casual weekend runs over regimented training sessions.
  arts: Sandra Ayala immerses herself in the worlds of Harry Potter and Percy Jackson while drawing wildlife scenes reminiscent of John James Audubon, and she balances playlists of Ariana Grande, Bad Bunny,
    and lively mariachi ensembles to fuel her creative afternoons.
  travel: Sandra Ayala enjoys spontaneous weekend trips to the Baldwin Park Community Garden and day outings at the Los Angeles County Arboretum, dreaming of future hikes in Yosemite National Park and curious
    explorations of the historic streets of Guanajuato, while relying on her parents’ car and a flexible itinerary.
  culinary: Sandra Ayala delights in preparing simple Mexican snacks like guacamole and cheese quesadillas, deftly mashing ripe avocados with lime, cilantro, and a pinch of jalapeño for a personal kick,
    though they often forget to clean up the kitchen after cooking.
  core: Sandra Ayala is a curious, softly rebellious twelve‑year‑old who balances fantasy‑driven imagination with a laid‑back approach to school, soccer, and snack‑making, often misplacing homework in a
    sketchbook and dreaming of wildlife adventures.
background:
  cultural: Sandra comes from a Mexican-American family rooted in the vibrant Latino community of Baldwin Park. She grew up speaking both Spanish and English at home and celebrates traditions such as Día
    de los Muertos, family gatherings centered around homemade Mexican cuisine, and community festivals. Her cultural identity is reinforced through church involvement, neighborhood events, and a strong
    emphasis on family solidarity, respect for elders, and collective responsibility.
