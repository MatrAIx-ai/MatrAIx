    stylists and workshop facilitation'']'
  hobbies: '[''Oil painting'', ''Portrait and street photography'', ''Visiting local art exhibitions and galleries'', ''Bourbon tasting tours'', ''Hiking in nearby parks and nature trails'', ''Herb gardening'',
    ''Cooking Southern cuisine'', ''Playing acoustic guitar'', ''DIY home improvement projects'', ''Volunteering for community charity hair‑makeover events'']'
  career_goals: Franklin aims to transition from a skilled stylist to a salon owner who curates an artistic, community-focused space in Shepherdsville. He aspires to launch his own line of natural, locally-sourced
    hair care products that reflect his appreciation for sustainable ingredients. Long‑term, he hopes to be recognized as a go‑to stylist for regional fashion events and photo shoots, and to mentor aspiring
    stylists through certified workshops and apprenticeship programs.
