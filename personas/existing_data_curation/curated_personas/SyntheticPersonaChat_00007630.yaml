    User 1: Maria is a great role! She''s such a strong and independent woman.

    User 2: She is! I loved playing her.

    User 1: I''m sure you were great in the role.

    User 2: Thank you! I think I did pretty well.

    User 1: I''m sure you did! So, what kind of roles are you looking for in LA?

    User 2: I''m open to anything, but I would love to play a lead role in a musical.

    User 1: I''m sure you''ll get your chance. You just have to keep working hard and never give up on your dreams.

    User 2: I won''t give up! I''m determined to make it as an actor.

    User 1: That''s great! I''m rooting for you.'
