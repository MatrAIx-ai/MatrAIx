  career_goals: Bruce aims to transition from subcontracting to owning a boutique carpentry firm that specializes in historic preservation and environmentally responsible building. He plans to earn a certified
    green builder credential and develop a small line of handcrafted furniture using reclaimed wood. Over the next five years, he hopes to expand his client base beyond Hickman County, build a reliable
    team of journeymen, and establish a mentorship program for local youths interested in the trades. Financially, he seeks stability to support his daughter’s college education and eventually retire with
    a well‑maintained workshop where he can focus on artistic woodworking projects.
