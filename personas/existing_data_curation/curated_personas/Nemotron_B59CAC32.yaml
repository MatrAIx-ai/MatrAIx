personas:
  professional: Bruce Everson, a 47‑year‑old master carpenter with 25 years of residential and small‑commercial framing, finish carpentry, and historic restoration expertise, they blend meticulous hand‑tool
    craftsmanship with modern code compliance, mentor apprentices with patience, and channel their disciplined, organized nature into running a boutique preservation firm while pursuing green‑builder certification.
  sports: Bruce Everson, an avid outdoorsman, they spend early mornings fishing the Duck River with the local Anglers Association, join a weekend hunting group for deer in the hills, follow the Dickson
    County High School football team and the Nashville Predators, and occasionally attend a weekly bowling league at the community center to stay active.
  arts: Bruce Everson, a creative craftsman, they channel artistic energy into wood‑turning decorative bowls inspired by early American craft, strum acoustic renditions of Johnny Cash, Lynyrd Skynyrd, and
    The Eagles at church potlucks, and spend evenings reading biographies of historic artisans while humming Dolly Parton classics.
  travel: Bruce Everson, a careful planner, they favor weekend road trips to the Great Smoky Mountains and Asheville’s craft markets, dream of a heritage tour of Edinburgh to trace family roots, and squeeze
    in occasional longer getaways to New Orleans for jazz, always balancing travel costs with their daughter’s college expenses.
  culinary: Bruce Everson, a Southern cuisine enthusiast, they enjoy smoked catfish with hush‑puppies, slow‑cooked pork ribs glazed with apple cider, fresh cornbread, and occasional venison stew from their
    hunts, cooking at a respectable skill level in their workshop kitchen, and relish experimenting with locally sourced herbs like sage and thyme.
  core: Bruce Everson, a disciplined, community‑focused carpenter, they balance heritage‑rich craftsmanship with modern sustainability while nurturing family, faith, and a love for the outdoors.
background:
  cultural: Bruce grew up in a white, Southern, Scotch‑Irish community in Dickson and Hickman County, Tennessee. Raised in a Protestant (Baptist/Methodist) household, he absorbed the region’s strong emphasis
    on self‑reliance, hospitality, and community service. Local traditions such as church potlucks, county fairs, and 4‑H projects shaped his cooperative nature. The Appalachian heritage of handcrafted
    woodwork inspired his career choice, while the rural landscape fostered his love for fishing, hunting, and the outdoors. He values the Southern work ethic, modesty, and the enduring importance of family
    and neighborly support.
