personas:
  professional: Jovan Phillips, a self‑taught full‑stack developer who blends a curious eye for design with an organized, methodical workflow, leverages React, Vue, Node.js, Python/Django, PostgreSQL, MongoDB,
    and AWS to deliver clean, well‑documented code while mentoring youth, and they are strategically positioning themselves for a senior‑engineer role that merges technical leadership with product strategy
    for community‑focused digital storytelling.
  sports: Jovan Phillips, a devoted fan of the Nashville Predators and Nashville SC, regularly joins downtown pick‑up basketball games and runs with the Music City Trail Club for early‑morning 5‑k runs,
    they view these activities as essential counterpoints to coding marathons and a way to stay physically and mentally refreshed.
  arts: Jovan Phillips, who immerses themselves in Nashville’s arts scene by frequenting the Frist Art Museum, snapping street photos inspired by Henri Cartier‑Bresson, creating bold digital illustrations
    in Procreate reminiscent of Kehinde Wiley’s palettes, and playing electric guitar with a jazz‑neo‑soul vibe echoing Robert Glasper, they channel these experiences into a curated playlist featuring Kamasi
    Washington and Sade.
  travel: Jovan Phillips, an avid planner who maps weekend road trips using Google My Maps, loves exploring the nearby Appalachian peaks, has already visited New Orleans for its music festivals and Austin
    for its food trucks, they dream of backpacking through Iceland’s geothermal landscapes while balancing travel costs with a modest side‑hustle of freelance coding.
  culinary: Jovan Phillips, who balances a love of smoky Nashville hot chicken and low‑country shrimp‑and‑grits with a weekend habit of crafting mushroom risotto and avocado toast topped with radish and
    feta, they enjoy experimenting with fresh herbs like rosemary and cilantro, and often source locally roasted tomatillos for homemade salsa.
  core: Jovan Phillips merges a methodical coder’s precision with an artist’s curiosity, treating each line of code as a brushstroke on a digital canvas while juggling guitar riffs, hiking trails, and community
    mentorship.
background:
  cultural: Jovan grew up in a close‑knit African‑American community in Nashville, where church gatherings, gospel music, and family barbecues shaped his early worldview. He carries forward traditions of
    storytelling, community support, and culinary heritage, often cooking soul food with a Southern twist for friends and family. His cultural identity fuels his commitment to representation in tech, prompting
    him to engage with local Black professional networks and celebrate milestones like Juneteenth and Kwanzaa. This blend of Southern Black culture and the vibrant artistic scene of Nashville informs both
    his personal passions and his professional drive to create inclusive digital experiences.
attributes:
  skills: '[''JavaScript'', ''React'', ''Vue'', ''Node.js'', ''Python'', ''Django'', ''PostgreSQL'', ''MongoDB'', ''AWS'', ''Git'', ''UI/UX design'', ''Data visualization'', ''Agile Scrum'']'
  hobbies: '[''Street photography'', ''Digital illustration'', ''Live music appreciation'', ''Electric guitar (jazz/neo‑soul)'', ''Hiking'', ''Coding mentorship'', ''African‑American cultural festivals'',
    ''Graphic design'']'
  career_goals: Jovan aims to become a senior software engineer within the next three years, deepen his cloud architecture expertise, and transition into a technical lead role that blends engineering with
    product strategy. He is passionate about building technology that amplifies underrepresented voices, dreaming of launching a startup focused on community‑driven digital storytelling platforms. To support
    these ambitions, he plans to earn the AWS Solutions Architect certification, complete his Bachelor’s in Computer Science, and mentor aspiring Black technologists in Nashville.
