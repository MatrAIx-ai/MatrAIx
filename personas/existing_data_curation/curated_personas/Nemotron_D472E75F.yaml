  hobbies: '[''woodworking'', ''vegetable gardening'', ''model train building'', ''reading mystery novels'', ''listening to classic rock'', ''volunteering at community garden'', ''birdwatching'']'
  career_goals: Approaching retirement, Maxwell aims to secure a part‑time schedule that allows him to continue earning while preserving his health. He plans to obtain a state‑issued HVAC certification
    to broaden his service offerings and to formalize his expertise. He also hopes to start a modest side business providing reliable home‑repair services to fellow seniors in the Portland area, emphasizing
    trust and consistency. Additionally, he is interested in mentoring a small group of younger maintenance workers, passing on his practical knowledge and fostering a culture of dependable craftsmanship.
