personas:
  professional: A self‑taught coder and aspiring game developer, Alexander Mizell, they blend their love for desert sketching and Python programming to prototype interactive story‑driven games, leveraging
    meticulous organization and a fierce competitive spirit to iterate quickly and out‑design peers in school hackathons.
  sports: As an avid hiker and occasional youth soccer player, Alexander Mizell, they train with the local Prewitt Trail Club, follow the New Mexico United soccer team for tactical inspiration, and squeeze
    in weekend runs with friends while avoiding organized basketball leagues because of a preference for solitude.
  arts: A desert‑inspired visual storyteller, Alexander Mizell, they draw daily sketches of Pueblo pottery motifs and sweeping mesas while listening to Brian Eno’s ambient albums, study the works of Georgia O’Keeffe
    and the cinematic scores of Hans Zimmer, and often quote Tolkien’s prose when crafting their own fantasy narratives.
  travel: Driven by meticulous planning and a love for stark landscapes, Alexander Mizell, they have trekked to the ancient cliff dwellings of Bandelier National Monument, road‑tripped to Santa Fe for its
    art markets, and now dream of backpacking through Iceland’s volcanic terrain to experience the same raw beauty that fuels their art.
  culinary: A budding chef in the family kitchen, Alexander Mizell, they enjoy cooking chicken tortilla soup with roasted green chilies and homemade corn tortillas, experiment with honey‑glazed carrots
    in lunchboxes, but habitually burn the edges of pizza crust when multitasking between sketching and baking.
  core: A solitary, competitive dreamer, Alexander Mizell, they channel desert solitude into intricate LEGO builds and Python games, while occasionally over‑indulging in late‑night snack runs that leave
    a trail of crumbs on their sketchbooks.
background:
  cultural: Alexander was raised in Prewitt, a sparsely populated community in Cibola County, New Mexico. His family, of European descent, has lived in the high desert for several generations, balancing
    ranching life with a strong emphasis on self-reliance and education. The region’s cultural tapestry includes nearby Pueblo communities and Hispanic traditions, which Alexander experiences through local
    festivals, storytelling gatherings, and the distinctive Southwest art motifs that appear in public murals and crafts. These multicultural influences have nurtured his appreciation for visual storytelling,
    natural landscapes, and the blend of tradition with modern creativity.
attributes:
  skills: '["digital illustration", "traditional sketching", "creative writing", "basic Python programming", "strategic board games (chess)", "model building", "critical analysis of literature"]'
