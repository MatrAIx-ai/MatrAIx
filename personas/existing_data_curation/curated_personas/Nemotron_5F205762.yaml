    to ambient music"]'
  career_goals: He aims to channel his creativity into a career as a concept artist or visual storyteller for video games or film, intending to attend a specialized high school for visual arts and later
    pursue a BFA in illustration. He also harbors an interest in combining his coding skills with art, envisioning a future as a game developer who designs both the narrative and the visual aesthetics.
    Alexander plans to enter regional art contests and national science fairs to build a portfolio that will open doors to internships or mentorships with professional artists.
