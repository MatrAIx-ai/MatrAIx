  career_goals: Jeremy aims to transition from a senior analyst role to a portfolio manager position within the next three years, focusing on ESG‑focused funds that blend traditional securities with alternative
    cultural assets such as art and collectibles. He aspires to become a chief investment officer at a boutique firm where he can shape investment philosophy around innovative, data‑driven strategies. Long‑term,
    he envisions launching his own advisory practice that offers high‑net‑worth clients tailored wealth‑management solutions integrating financial performance with cultural investment. He also seeks to
    mentor emerging analysts, contribute thought‑leadership articles to industry journals, and speak at conferences on the intersection of finance and the arts.
