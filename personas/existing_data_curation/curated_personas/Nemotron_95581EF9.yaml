  hobbies: '[''Community bar trivia'', ''Organizing social gatherings'', ''Competitive darts'', ''Bowling leagues'', ''Fishing at Sam Rayburn Reservoir'', ''Vintage car restoration'', ''Model train building'',
    ''Live country music concerts'', ''Tech gadget exploration'', ''Reading science magazines'', ''Youth mentorship volunteering'']'
  career_goals: David aims to earn his GED and enroll in an associate degree program in industrial technology to formalize his knowledge. He plans to obtain a plant supervisor certification and target a
    shift‑leadership role where he can drive a zero‑incident safety record. Over the next five years, he hopes to implement efficiency improvements that boost plant output by at least ten percent, gaining
    recognition for operational excellence. Ultimately, he envisions either becoming a plant manager overseeing multiple sites or launching his own consulting firm that helps small manufacturing facilities
    optimize their processes.
