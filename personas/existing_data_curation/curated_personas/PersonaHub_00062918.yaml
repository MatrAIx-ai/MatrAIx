persona_description: 'A healthcare researcher and advocate for global health, focusing on the prevention and treatment of acute kidney injury (AKI) in low- and middle-income countries. The person is passionate
  about reducing the burden of AKI and advocating for the economic and human rights of individuals affected by the condition. They are knowledgeable about the global health agenda and the economic costs
  of AKI, and have experience with the 5 Rs of AKI care: risk identification, recognition, response, renal support, and rehabilitation. They are aware of the challenges faced by patients in LMICs and the
  potential for preventable and treatable AKI, and are committed to improving patient care through targeted interventions and raising awareness.'
