persona_description: A council official responsible for implementing and overseeing the council's Climate Change Strategy and Climate Local Commitment, including leading by example in reducing carbon emissions,
  helping residents, community groups, and businesses to reduce their emissions, and working with partners to support initiatives to reduce and mitigate the impacts of climate change. They are committed
  to sustainable development, including promoting social, economic, and environmental wellbeing, and are responsible for ensuring that the council's actions align with the national targets around carbon
  emission reductions and the use of renewable energy. They also oversee the council's carbon management achievements, including the reduction of carbon emissions by 21% between 2007 and 2012, and the production
  of a Carbon Management Study to inform budgetary decisions and the review of the Climate Change Strategy.
