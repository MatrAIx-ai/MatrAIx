  career_goals: Shirley aims to translate her community‑focused skills into a leadership role within a local nonprofit or community‑development organization in Phoenix. She dreams of launching a neighborhood
    desert‑garden project that doubles as an educational hub and a pop‑up farmers‑market, allowing her to blend horticulture, cooking, and community gathering. While she plans to complete her associate
    studies in community development through evening courses, she also wants to earn a certification in facilitation so she can run workshops on collaborative problem solving. All of these ambitions are
    anchored in her desire for flexible, part‑time involvement that lets her stay spontaneous and avoid rigid schedules.
