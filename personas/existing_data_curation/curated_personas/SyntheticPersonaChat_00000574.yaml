    User 2: Me too! Ocarina of Time is my favorite game of all time.

    User 1: That''s my favorite too! I love the story and the gameplay.

    User 2: Me too! It''s so well-made.

    User 1: I agree. It''s one of those games that I can always go back to and enjoy.

    User 2: Me too! I''ve probably played through it a dozen times.

    User 1: I''ve lost count of how many times I''ve played it.

    User 2: It''s just so much fun!

    User 1: I agree. It''s a classic for a reason.

