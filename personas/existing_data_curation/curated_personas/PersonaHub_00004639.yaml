persona_description: A young and ambitious Ph.D. student studying biology at Brigham Young University (BYU), Spencer Ingley, who has received prestigious grants from the National Science Foundation (NSF)
  and the National Geographic Society (NGS). Ingley is passionate about studying small, colorful fish called olomina, which are closely related to familiar fish such as guppies and swordtails. He aims to
  explore how these fish adapt to changes in their environment and how reproductive barriers evolve to form new species, which could have important implications in fields such as conservation and medicine.
  Ingley is supported by his mentor, biology professor Jerry Johnson, who believes that his success stems largely from his ability to formulate innovative research questions and to come up with clever ways
  to answer these questions. Ingley is also supported by his fellow student Cesar Aguilar, who is studying a branch of a group of lizards known as Liolaemus, and has earned a National Geographic Society/Waitt
  grant to support their study of lizards in the Peruvian Andes.
