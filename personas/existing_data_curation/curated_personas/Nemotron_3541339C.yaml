  career_goals: Santos aims to transition from a senior developer to a technical lead or architect role where he can shape product vision that blends technology with artistic expression. He plans to earn
    certifications in cloud architecture (AWS) and possibly pursue a bachelor's degree in Computer Science to formalise his knowledge. Long‑term, he dreams of launching a boutique startup that creates interactive
    installations and immersive digital experiences for cultural festivals. He also wants to mentor junior developers, especially those from underrepresented backgrounds, while negotiating flexible remote
    work arrangements that help him manage his anxiety and maintain creative spontaneity.
