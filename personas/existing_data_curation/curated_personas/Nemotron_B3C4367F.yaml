  career_goals: Danielle aims to transition from a data entry specialist to a supervisory or operations role where she can blend her practical data-management skills with her business education. Over the
    next three to five years she plans to earn certifications such as Microsoft Office Specialist and Certified Administrative Professional, and to complete a part-time business data-analytics certificate.
    Her goal is to become an Office Manager or Operations Coordinator at a mid-size company in the Raymore area, overseeing a small team, streamlining workflow, and implementing efficiency projects. She
    also wishes to mentor new employees and introduce wellness initiatives that help her and her coworkers manage workplace stress.
