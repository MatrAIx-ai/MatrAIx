  career_goals: She aims to advance to a district‑manager role within the next three to five years, overseeing multiple stores while introducing innovative, data‑centered sales strategies that blend proven
    retail practices with emerging technology. Rose also wants to mentor emerging retail leaders, possibly by establishing a formal training program or launching a consulting boutique focused on improving
    store performance. Ultimately, she dreams of opening a small specialty shop that reflects her love of community, personalized customer experiences, and her competitive drive to set new sales benchmarks.
