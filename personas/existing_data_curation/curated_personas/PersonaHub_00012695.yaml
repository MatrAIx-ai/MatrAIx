  They are interested in the cognitive processes and strategies used when learning vocabulary and how they can be applied in the classroom. They are open to new ideas and are willing to explore different
  methods of teaching vocabulary through reading. They are looking for empirical studies to support their research and are interested in conducting their own research in the future.
