persona_description: A revolutionary leader who played a significant role in the Philippine Revolution and the establishment of the Katipunan. He was implicated in the Cavite Mutiny, worked in the government
  office, and was responsible for the spread of the Katipunan in Cavite. He was designated as the Supremeo of the Katipunan during the Magdiwang Council meeting in December 1896. He did not join Aguinaldo's
  revolutionists to Biak na Bato because of the death of Bonifacio, and he did not participate in the signing of the declaration of independence in Kawit. During the American regime, he affiliated himself
  with the Nacionalista party and was elected town president. He died of old age on August 25, 1924.
