personas:
  professional: Evelyn Marino, a 20‑year‑old front‑of‑house bartender in Otis, blends curiosity‑driven mixology with practical bar management, using quick reads of patrons’ moods to craft inventive seasonally‑inspired
    cocktails while juggling cash handling, inventory tracking and occasional first‑aid duties, all while dreaming of a head‑bartender role and a sustainable boutique lounge.
  sports: Evelyn Marino fuels fitness by surfing on windy Oregon days, hiking the rugged coastline with the local surf‑and‑hike club, loyally cheering the Portland Timbers and Oregon Ducks, yet they often
    skip post‑session stretching, leading to occasional shoulder strain.
  arts: Evelyn Marino channels performance energy into karaoke nights, volunteering for community theater productions, snapping high‑contrast seascapes inspired by Ansel Adams, and diving into mystery novels
    by Gillian Flynn, while their playlists echo Tash Sultana and The Decemberists, showcasing a love for eclectic music and visual storytelling.
  travel: Evelyn Marino plans spontaneously, grabbing last‑minute ferry tickets to Vancouver, road‑tripping up the Pacific Coast Highway to Redwood National Park, and dreaming of surf‑rich retreats in New
    Zealand’s Raglan, all while they balance a modest bartender’s budget and a yearning to capture sunrise shots on new horizons.
  culinary: Evelyn Marino’s palate favors Pacific Northwest seafood—clam chowder, smoked salmon and fish tacos—paired with home‑crafted bitters using citrus peel and rosemary, while they experiment with
    avocado‑miso toast and occasional mole sauce, proudly sharing photos of their inventive cocktails and dishes on Instagram.
  core: Evelyn Marino is a socially magnetic, curiosity‑driven mixology enthusiast who wrestles with anxiety, impulsive spending, and a fierce competitive streak, and they turn every bar shift into a stage
    for creative cocktails and lively conversation.
background:
  cultural: Evelyn is a white American who grew up in a small, close‑knit town in Tillamook County, Oregon. Her family traces its roots to Midwestern settlers of Irish and German descent, and she was raised
    with a blend of modest, hard‑working values and a deep appreciation for the Pacific Northwest’s natural beauty. The local culture of outdoor recreation, craft brewing, and a DIY ethos has shaped her
    love for sustainable, locally‑sourced food and drink, while the town’s emphasis on community gatherings nurtured her sociable, talkative nature.
