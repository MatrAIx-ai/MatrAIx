  career_goals: Evelyn aims to become a head bartender within the next two years, mastering advanced cocktail techniques and earning a certified mixologist credential. She plans to transition into bar management,
    learning staff leadership and budgeting, and eventually launch her own boutique cocktail lounge that showcases locally‑sourced spirits and sustainable practices. Competing in regional mixology contests
    fuels her competitive drive, and she hopes to build a reputation as a creative yet reliable hospitality professional.
