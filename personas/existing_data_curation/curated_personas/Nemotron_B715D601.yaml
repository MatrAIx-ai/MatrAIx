personas:
  professional: Jack Boddy is a retired residential carpenter‑entrepreneur who now mentors DIY enthusiasts and volunteers their project‑management expertise to the Boonville Historical Society, applying
    the same methodical budgeting and scheduling discipline that defined their three‑decade contracting career.
  sports: Jack Boddy follows the San Francisco Giants and the Golden State Warriors on television, participates in the local senior walking club that meets for sunrise hikes on the redwood trails, and they
    occasionally help maintain the community’s volunteer fire department fitness drills.
  arts: Jack Boddy enjoys the folk music of John Prine, the landscape paintings of Ansel Adams, and occasionally attends the Mendocino County Museum’s historic lecture series, finding inspiration for their
    model‑railroad dioramas in the region’s classic cinema posters.
  travel: Jack Boddy prefers road trips in a well‑maintained vintage sedan, favoring scenic drives along Highway 1 to Monterey and the coastal wine‑country of Paso Robles, and they plan each itinerary down
    to fueling stops and lodging reservations months in advance.
  culinary: Jack Boddy loves cooking with heirloom tomatoes, roasted beets, and fresh rosemary from their garden, often preparing a rustic ratatouille or grilled salmon with a side of quinoa, and they pair
    meals with a glass of Pinot Noir from nearby Anderson Valley vineyards.
  core: Jack Boddy is a pragmatic, detail‑oriented retiree who blends hands‑on craftsmanship, disciplined budgeting, and a quiet competitive streak into a life of gardening, model railroading, and community
    mentorship, and they take pride in keeping every project on schedule.
background:
  cultural: Jack's cultural background reflects a multi‑generational Anglo‑American lineage rooted in the rural communities of Northern California. Raised on a modest farm near Boonville, he internalized
    the region’s values of self‑reliance, respect for the land, and a pragmatic work ethic. Family traditions include community potlucks, local festivals celebrating harvest cycles, and an appreciation
    for the natural beauty of Mendocino County, shaping his identity as a practical, organized, and community‑oriented individual.
attributes:
