personas:
  professional: Robert Wilhite is an aspiring junior game developer who creates whimsical ocean-themed games in Scratch, blending their curiosity about marine life with a practical knack for coding, while
    also being known for their scattered LEGO pieces whenever they pause to daydream.
  sports: Robert Wilhite plays soccer with the Corpus Christi Hurricanes youth league, swims regularly at Padre Island beach, and cheers for the Houston Astros, Dallas Cowboys, and Houston Dynamo, while
    also proudly wearing a jersey of their favorite local swim club, the Corpus Christi Lifeguard Swim Team.
  arts: Robert Wilhite draws detailed marine animals inspired by Jacques Cousteau documentaries, enjoys watching Studio Ghibli's 'Ponyo' and listening to the 'Finding Nemo' soundtrack by Thomas Newman,
    and frequently visits the local marine museum to admire exhibits by marine artist Stephen Hillenburg.
  travel: Robert Wilhite dreams of snorkeling the Belize Barrier Reef and has already explored the Texas Gulf Coast, the San Antonio River Walk, and Padre Island National Seashore, preferring spontaneous
    day trips over rigid itineraries while their parents' budget keeps overseas travel to occasional family vacations.
  culinary: Robert Wilhite loves fish tacos topped with fresh cilantro and lime, enjoys cooking shrimp pasta with garlic and tomatoes at home, and snacks on gummy sea creatures and goldfish crackers while
    playing video games.
  core: Robert Wilhite is a curious, sociable ten‑year‑old whose love for the ocean fuels their LEGO builds, Scratch games, and beach clean‑ups, even as their relaxed approach leads to occasional disorganization
    and impulse spending.
background:
  cultural: Robert is a white Texan growing up in Corpus Christi, a coastal city with a blend of Southern and Gulf‑Coast cultures. His family traditions include weekend fishing trips on the Gulf, enjoying
    Texas‑style barbecues, and celebrating holidays with a mix of Anglo‑American and local Hispanic influences, such as sharing tamales and listening to Tejano music. He attends a public elementary school
    where the student body reflects the region’s diversity, giving him exposure to Spanish language basics and multicultural community events. The warm, laid‑back atmosphere of the Texas coast, combined
    with a strong sense of community and respect for the marine environment, shapes his outlook and daily life.
