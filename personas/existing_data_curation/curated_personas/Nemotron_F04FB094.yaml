  career_goals: Robert dreams of a future where he can blend his love for the ocean with his problem‑solving skills. He imagines becoming a marine biologist or an environmental engineer who designs solutions
    to protect the Gulf of Mexico’s ecosystems. At the same time, his passion for sports and teamwork inspires him to consider coaching a youth soccer team or becoming a teacher who incorporates hands‑on
    projects into the classroom. He is open to exploring different paths and values a career that lets him stay curious, help others, and stay connected to his community.
