personas:
  professional: Chad Green, a seasoned meat cutter and charcutier in Grand Rapids, blends meticulous USDA-compliant processing with a curious flair for experimental curing, using their organized, methodical
    mindset to train staff and build lasting customer relationships through personalized cut recommendations.
  sports: Chad Green, a regular midfielder for the Grand Rapids United soccer league, maintains fitness through weekly matches and early-morning jogs along Lake Michigan, follows the Detroit Lions in football
    season and the Detroit Pistons in basketball, and they occasionally join friends for recreational fishing tournaments on the Muskegon River.
  arts: Chad Green, an avid photography enthusiast who captures Michigan's shoreline with an eye inspired by Ansel Adams, regularly attends gallery openings featuring local painter Taylor Shaw and supports
    community theater productions starring actors like Kelsey Worth, while they unwind listening to the folk-rock sounds of Wilco and the cinematic scores of Hans Zimmer.
  travel: Chad Green, who plans trips with the same meticulous checklists they use in the butcher shop, loves weekend getaways to Mackinac Island and the Upper Peninsula's Pictured Rocks, and dreams of
    a culinary tour through the wine regions of Tuscany and the smoked fish markets of Reykjavik, balancing adventure with the need to stay within a modest family budget.
  culinary: Chad Green, a home chef who rates themselves an intermediate smoker, constantly refines rubs mixing smoked paprika, brown sugar, and coriander for Texas-style brisket, experiments with maple-glazed
    pork ribs, and savors creating apple-cinnamon desserts, while they source fresh produce from their garden and local farms for farm-to-table meals.
  core: Chad Green, a methodical meat-maverick who balances a love of precision cutting with a habit of over-seasoning every dish, finds equal joy in a perfectly trimmed beef cut and a sunrise fishing line,
    all while keeping a meticulous ledger of sauce experiments on the back of receipts.
background:
  cultural: Chad grew up in Sumner, a tight‑knit town in Montcalm County, Michigan, within a family of German‑Polish descent that valued hard work, community service, and modesty. Raised in a Protestant
    (Lutheran) household, he attended church regularly and participated in local traditions such as the annual county fair and community potlucks. The Midwestern ethos of self‑reliance, neighborliness,
    and respect for the land shaped his worldview. While his upbringing emphasized practical skills and a strong work ethic, his parents also encouraged artistic appreciation, exposing him to museum trips
    in nearby Grand Rapids and supporting his early interest in drawing and music. This blend of cultural heritage and regional values informs Chad’s balanced approach to life—combining reliability with
    curiosity and a desire to contribute positively to his community.
attributes:
  skills: '[''Meat cutting and trimming'', ''Deboning and portioning'', ''Charcuterie preparation (curing, smoking, sausage making)'', ''Food safety compliance (USDA FSIS)'', ''Industrial equipment operation
    (band saw, grinder, slicer)'', ''Inventory management and stock rotation'', ''Quality control and inspection'', ''Customer service and cut consultation'', ''Team training and mentorship'', ''Basic photography'',
    ''Woodworking'']'
  hobbies: '[''Photography (landscape and food)'', ''Fishing on local lakes and rivers'', ''Woodworking (furniture, smoker building)'', ''Home cooking and experimental smoking'', ''Attending art galleries
    and local theater'', ''Community soccer league'', ''Volunteering at the county food bank'', ''Gardening'', ''Reading food science and art history'', ''Participating in county fairs'']'
  career_goals: Chad aims to transition from employee to owner by opening a boutique butcher shop that specializes in locally sourced, ethically raised meats and artisanal charcuterie. He plans to earn
    a Certified Meat Cutter credential and complete a short-term culinary arts program focused on charcuterie. Over the next five years, Chad hopes to expand his business to include a small on‑site farm,
    offer community workshops on meat preparation, and become a mentor for younger workers in the industry. He also envisions taking a leadership role in his local Chamber of Commerce to promote sustainable
    food practices in Montcalm County.
