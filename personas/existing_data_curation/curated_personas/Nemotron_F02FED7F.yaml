personas:
  professional: Luciana Comptis, a 9‑year‑old budding visual storyteller, channels their vivid imagination into sketching magical creatures and writing short comic strips, balancing a disciplined after‑school
    art routine with spontaneous bursts of creativity that keep their school projects fresh and their friends excited, and they proudly display each new page on the fridge.
  sports: Luciana Comptis, a 9‑year‑old who enjoys the rhythmic drills of youth soccer with the local Houston Tigers club and the splash of community swimming lessons at the municipal pool, cheers for the
    Houston Astros and Houston Dynamo, and they approach fitness with a low‑key routine of after‑school playground games, preferring small‑team activities over large crowds.
  arts: Luciana Comptis, an imaginative sketch artist, fills their sketchbook with dragons inspired by the works of Hayao Miyazaki and the whimsical illustrations of Mary Blair, devours fantasy series by
    J.K. Rowling and Neil Gaiman, practices ukulele chords from Los Lobos' mariachi tunes, and they regularly attend after‑school art classes where they emulate techniques from Pixar concept art.
  travel: Luciana Comptis, a curious nine‑year‑old explorer, prefers carefully planned family road trips to nearby destinations like the Galveston beach, Austin’s music scene, and the Smithsonian’s Natural
    History Museum, while dreaming of a future adventure to Disney World’s Magic Kingdom, and they always pack a sketchbook to capture new inspirations on the journey.
  culinary: Luciana Comptis, who assists their mother in the kitchen, enjoys helping roll corn tortillas, stir black bean salsa with fresh cilantro and tomatoes, and garnish tacos with shredded cheese and
    lime, demonstrating beginner‑level cooking skills and a growing confidence that sometimes leads them to over‑season dishes in their eagerness to experiment.
  core: Luciana Comptis, a nine‑year‑old imagination powerhouse, balances disciplined art creation with a habit of worrying over unfinished sketches, often staying up late to perfect details at the expense
    of sleep.
background:
  cultural: Luciana is raised in a Mexican‑American household in Houston, Texas. Spanish is spoken at home, and she grows up celebrating traditions such as Día de los Muertos, Mexican holidays, and family
    gatherings centered around foods like tacos, tamales, and pozole. The vibrant colors and motifs of Mexican folk art influence her drawings, and she often incorporates papel picado patterns and traditional
    symbols. Houston’s multicultural environment provides her with opportunities to attend cultural festivals, bilingual programs, and community events that reinforce her bicultural identity. Her family's
    values blend Mexican customs of close‑kin relationships and respect for elders with the broader Texan community spirit.
attributes:
  skills: '[''Creative storytelling'', ''Fantasy illustration'', ''Bilingual English‑Spanish communication'', ''Basic digital art using tablet apps'', ''Introductory block‑based coding (Scratch)'', ''Reading
    comprehension'', ''Puzzle solving and LEGO building'', ''Organizational skills for school tasks'']'
  hobbies: '[''Sketching magical creatures'', ''Reading fantasy books'', ''Creating comic strips'', ''Building LEGO models'', ''Visiting museums (e.g., Houston Museum of Natural Science)'', ''Listening
    to and learning Mexican music (ukulele)'', ''Helping with cooking traditional Mexican dishes'', ''After‑school art classes'', ''Playing educational puzzle games'', ''Journaling ideas'']'
  career_goals: Luciana dreams of turning her imagination into a career that merges art, storytelling, and curiosity. She aspires to become a children’s book author and illustrator, creating vibrant stories
    that celebrate Mexican heritage and inspire wonder. She also imagines designing imaginative spaces as an architect or exploring the mysteries of the universe as a future scientist, drawn to abstract
    concepts. Whatever path she chooses, she hopes to use her bilingual abilities to share culturally rich narratives and encourage other children to embrace creativity.
