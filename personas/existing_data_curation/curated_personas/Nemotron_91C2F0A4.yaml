personas:
  professional: Steve Vidal, a 64‑year‑old board‑certified internal‑medicine physician, blends their diagnostic acumen and geriatric expertise with a curious yet practical mindset; they lead multidisciplinary
    teams while fostering mentorship and patient‑centered counseling through organized yet flexible clinical workflows.
  sports: Steve Vidal stays active through weekly tennis matches at the Potomac Tennis Club, Saturday golf outings at Avalon Golf Club, and regular hikes on the Mount Vernon Trail; they cheer on the Washington
    Capitals and Washington Nationals while sailing a modest sloop on the Potomac River whenever weather permits.
  arts: Steve Vidal regularly attends jazz concerts featuring the legacy of Miles Davis at the Kennedy Center and enjoys theater productions by the Shakespeare Theatre Company; they spend their evenings
    reading biographies of figures like Dr. William Osler and admiring the impressionist canvases of Claude Monet at the National Gallery of Art.
  travel: Steve Vidal and their wife plan meticulous cultural itineraries, having trekked through the historic streets of Rome, sampled sushi in Kyoto, and explored the vineyards of Bordeaux; they now dream
    of sailing the Greek Islands and strolling through the markets of Marrakech.
  culinary: Steve Vidal loves crafting Mediterranean feasts, expertly preparing dishes such as grilled branzino with olives and sumac, slow‑cooked lamb tagine with preserved lemons, and fresh tomato‑basil
    shakshuka; they relish pairing these meals with a curated selection of Chianti and Rioja wines.
  core: Steve Vidal is a seasoned physician who balances a relentless curiosity for medical innovation with a sociable love for tennis, jazz, and Mediterranean cooking, yet occasionally forgets to lock
    their office door after late‑night chart reviews; they attribute the oversight to their habit of staying too late perfecting patient notes.
background:
  cultural: Steve Vidal is a white American of Irish-American descent, raised in the Mid-Atlantic region. Growing up in a family that valued education, community service, and hard work, he developed a strong
    sense of civic responsibility. Living in Alexandria, a city steeped in colonial and Civil-War history, he has absorbed the cultural heritage of the area, often participating in local historic preservation
    events. His upbringing combined traditional American values with a curiosity about diverse cultures, which he expresses through his love of travel, culinary exploration, and engagement with the multicultural
    community of the Washington, D.C. metropolitan area.
