  hobbies: '["Metal sculpture", "Woodworking", "Digital photography", "Science-fiction reading", "Philosophy study", "Model‑train building", "Gardening", "Acoustic guitar", "Sketching and design", "Art
    workshops"]'
  career_goals: At 51, Herndon aims to leverage his deep technical expertise into a senior leadership role, such as a lead machinist or production supervisor, where he can institutionalize his process‑improvement
    methods and coach the next generation of craftsmen. He is pursuing an advanced CNC certification and intends to design a small line of artisanal metal‑art products—custom signage, decorative furniture,
    and kinetic sculptures—that merge his precise machining background with his love for abstract art. Ultimately, he hopes to launch a modest studio on the outskirts of Chapel Hill that serves both as
    a source of supplemental income and a therapeutic outlet for his anxiety, while also offering workshops that blend practical shop skills with creative expression.
