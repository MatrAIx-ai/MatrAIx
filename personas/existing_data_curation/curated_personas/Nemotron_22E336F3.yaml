personas:
  professional: Aika Chang is a ten‑year‑old budding naturalist and robotics enthusiast who spends afternoons sketching birds and mammals in a field journal, builds simple programmable bots during after‑school
    club sessions, and eagerly shares her discoveries and inventions with classmates, balancing scientific curiosity with a methodical, organized approach to projects.
  sports: Aika Chang participates in the school’s cross‑country running team and the local youth ice‑hockey program affiliated with the Anchorage Seawolves junior league, enjoys sledding down nearby hills
    in winter, follows the Seattle Seahawks for football and the Vancouver Canucks for hockey, and practices weekend hikes on the nearby trails to stay fit, reflecting a love of team sports, seasonal outdoor
    activities, and community fandom.
  arts: Aika Chang shines as a charismatic member of the school drama group, performing modern plays and traditional dances taught by her grandparents while learning Dena’ina phrases and drum rhythms, draws
    inspiration from Lin‑Manuel Miranda’s storytelling, admires the wildlife paintings of artist Mickey Huggins, and regularly contributes illustrations of local fauna to the school’s art showcase, blending
    performance, visual art, and cultural appreciation.
  travel: Aika Chang dreams of camping under the midnight sun in Denali National Park, fondly recalls a family trip to the coastal trails of British Columbia, has visited the historic Gold Rush town of
    Skagway, and plans to explore the ancient ruins of Machu Picchu next summer, combining a love for local wilderness adventures with a curiosity about far‑flung historic sites.
  culinary: Aika Chang loves preparing honey‑glazed salmon fillets, blending wild blueberries into smoothie bowls topped with granola, helps tend the community garden where she harvests carrots, potatoes,
    and kale, and can whip up a quick grilled cheese sandwich with sharp cheddar and tomato soup for comfort, showcasing a modest cooking skill set and a palate that appreciates both fresh local produce
    and classic comfort foods.
  core: Aika Chang is a ten‑year‑old explorer‑artist who balances a fierce curiosity for wildlife and robotics with stage‑craft confidence, yet often worries about unfinished projects and occasionally over‑indulges
    in snack breaks.
background:
  cultural: Aika is an Alaska Native child raised in Anchorage, belonging to the Dena’ina Athabascan community. Her family maintains strong ties to traditional practices while also navigating modern urban
    life. She grows up hearing stories of the land's ancestors, participates in community events such as the Alaska Native Heritage Festival, and learns traditional crafts like beadwork and carving under
    the guidance of elders. At home, English is spoken, but her grandparents teach her Dena’ina words and cultural values, emphasizing respect for the environment, reciprocity, and community harmony. The
    blend of urban schooling and cultural immersion shapes Aika's worldview, giving her a deep appreciation for both modern science and the wisdom passed down through generations.
attributes:
  skills: '["Organizational planning for school projects", "Effective verbal communication", "Public speaking and group facilitation", "Reading comprehension (science and nature)", "Basic computer literacy
    (Google Classroom, introductory coding)", "Storytelling of Alaska Native folklore", "Basic first‑aid knowledge", "Team collaboration and conflict resolution"]'
  hobbies: '["Exploring local trails and wildlife observation", "Sketching nature scenes in a journal", "After‑school robotics club projects", "Participating in school drama and Native dance performances",
    "Learning and practicing Dena’ina language phrases", "Playing traditional drum rhythms", "Reading adventure and science books", "Helping in the community garden", "Collaborating with friends in group
    games"]'
  career_goals: Although still in elementary school, Aika dreams of a future where she can combine her love for nature, science, and her cultural heritage. She hopes to become a wildlife biologist or environmental
    scientist who studies Alaska's unique ecosystems, especially the animals and plants she sees on local hikes. She also imagines herself as a community educator, teaching younger children both scientific
    principles and traditional Alaska Native knowledge, such as language, stories, and stewardship practices. Aika's ambition includes advocating for the protection of her hometown's natural habitats and
    encouraging her peers to care for the environment, reflecting her practical mindset and desire to make a positive impact.
