  hobbies: '[''Community theater'', ''Improv workshops'', ''Playing guitar'', ''Cooking'', ''Gardening'', ''Fitness classes'', ''Blood drive volunteering'', ''True‑crime podcasts'', ''Dallas sports fandom'']'
  career_goals: Ollie aims to obtain Certified Phlebotomy Technician (CPT) certification within the next year and transition into a lead phlebotomist role at his Dallas clinic, overseeing a small team and
    standardizing procedures for safety and efficiency. Over the next five years, he aspires to move into clinical laboratory supervision, leveraging his organizational strengths to improve patient experience
    and staff well‑being, and eventually launch a community‑focused mobile phlebotomy service that provides home visits for seniors and underserved populations.
