personas:
  professional: Madison Garnier, a seasoned installation and maintenance worker in Bakersfield, blends solid expertise in electrical wiring, HVAC servicing, and basic plumbing with a routine‑driven, safety‑first
    mindset, allowing them to troubleshoot unexpected issues while calmly mentoring junior crew members despite a lingering anxiety about meeting deadlines.
  sports: Madison Garnier stays active by walking the Kern River trail, attending weekly yoga classes, playing casual softball with the local community league, and cheering on the Bakersfield Condors while
    they occasionally watch the Oakland Athletics games on television.
  arts: Madison Garnier finds solace in classic country and Bakersfield sound legends like Buck Owens, Merle Haggard, and Dwight Yoakam, and they also enjoy mystery novels by Agatha Christie and Kate Ruth
    Watson, which together shape their evenings of quiet reflection.
  travel: Madison Garnier prefers low‑key road trips that balance scenic relaxation with manageable budgets, having explored Yosemite, Joshua Tree, and Napa Valley, and they hope to visit Sedona and the
    Grand Canyon for a blend of desert serenity and gentle adventure.
  culinary: Madison Garnier delights in cooking garden‑fresh meals such as rosemary‑roasted chicken with zucchini and carrot medley, baking family‑favorite apple pie with a flaky crust, and experimenting
    with homemade sourdough using locally sourced wheat, while they occasionally splurge on a weekend BBQ at a favorite local eatery.
  core: Madison Garnier is a routine‑loving, hands‑on fixer who balances practical expertise with anxiety‑driven caution, often juggling DIY projects, garden harvests, and quiet moments of classic country
    music while occasionally forgetting to pay a bill on time.
background:
  cultural: Madison was raised in a working‑class, white‑American family in the Central Valley. The cultural atmosphere of Bakersfield and Kern County emphasizes hard work, self‑reliance, and close‑knit
    community ties. Family gatherings, church attendance, and local events such as county fairs and high‑school sports are central to her upbringing. The region’s agricultural and oil‑production heritage
    has fostered a practical, no‑nonsense outlook, while the local 'Bakersfield sound' of country music and a tradition of straightforward communication shape her preferences. These influences reinforce
    Madison’s conventional values, appreciation for routine, and focus on providing stable support for her family.
attributes:
  skills: '[''Electrical wiring'', ''HVAC maintenance and repair'', ''Basic plumbing repairs'', ''Interpretation of technical schematics'', ''Use of hand and power tools'', ''Preventive maintenance scheduling'',
