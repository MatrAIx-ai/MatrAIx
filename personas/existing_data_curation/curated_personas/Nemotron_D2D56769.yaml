  hobbies: '[''Gardening'', ''Cooking and baking'', ''Walking/hiking'', ''Yoga/meditation'', ''DIY home improvement projects'', ''Listening to classic country music'', ''Reading mystery novels'', ''Volunteering
    at community food bank'', ''Attending church socials'']'
  career_goals: Madison aims to turn her practical experience into formal credentials. Within the next two years she plans to earn a journeyman electrician license and become a certified safety officer.
    She hopes to advance to a lead‑technician or maintenance supervisor role, where she can guide a crew while maintaining the stable, routine‑focused environment she values. Long‑term, Madison envisions
    opening a small, family‑run repair service that emphasizes reliable, on‑time service for Bakersfield neighborhoods. Parallel to these professional goals, she wants to develop coping strategies such
    as stress‑management workshops and regular counseling to better handle her anxiety and emotional reactivity.
