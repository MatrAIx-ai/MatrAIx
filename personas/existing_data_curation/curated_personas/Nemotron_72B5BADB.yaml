  hobbies: '[''Listening to merengue and bachata'', ''Dancing at community events'', ''Playing soccer in a local league'', ''Gym workouts and weightlifting'', ''Vehicle tinkering and customization'', ''Exploring
    GPS and telematics apps'', ''Road trips and scenic drives'', ''Cooking Dominican dishes (e.g., mangú, sancocho)'', ''Attending cultural festivals'', ''Watching motorsports'', ''Reading personal development
    books'', ''Playing video games for relaxation'']'
  career_goals: Jose aims to leverage his practical experience and competitive drive to move beyond the driver‑sales position into a logistics coordinator role, then advance to fleet manager. He plans to
    obtain a hazardous‑materials endorsement and a certification in logistics management. Ultimately, he aspires to own a small, family‑run trucking company that blends efficient operations with personalized
    customer service, providing financial stability for himself and the ability to invest in property and community projects in East Orange.
