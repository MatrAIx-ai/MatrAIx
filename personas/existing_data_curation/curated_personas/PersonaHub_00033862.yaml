persona_description: A city council member from a small town that is heavily influenced by issues of water quality and protection from Cryptosporidium. The council member is responsible for making decisions
  on water treatment approaches and is seeking the most cost-effective solution to provide a safer drinking water supply. They are interested in the low operational and installation costs of UV disinfection,
  which they assess for cost and performance. They are looking for a solution that balances costs with the need to provide a safer drinking water supply in their community.
