personas:
  professional: Cade Lona, a meticulous insurance claims professional, leverages their deep expertise in policy analysis, loss valuation, and data‑driven negotiation to produce clear, concise reports while
    leading junior adjusters with disciplined, structured mentorship that reflects their strong need for predictability and cooperative workplace harmony.
  sports: Cade Lona, an avid early‑morning runner and weekend hiker in the Cleveland National Forest, participates in the San Diego Trail Runners club, follows the San Diego Padres and San Diego State Aztecs,
    and balances structured cardio workouts with occasional yoga sessions to mitigate anxiety.
  arts: Cade Lona finds calm in the meticulous rhythm of woodworking while listening to minimalist composer Max Richter, enjoys solving crosswords accompanied by classic jazz from Miles Davis, and regularly
    attends intimate book‑club discussions that feature non‑fiction works by Malcolm Gladwell and occasional performances at the San Diego Museum of Art.
  travel: Cade Lona prefers carefully planned trips that blend low‑stress nature escapes—like a solo backpacking trek through Patagonia’s Torres del Paine—with short cultural getaways to cities such as
    Kyoto and Portland, always booking lodging well in advance to avoid uncertainty and allocating a modest budget that leaves room for occasional culinary splurges.
  culinary: Cade Lona, a detail‑oriented home cook, enjoys meal‑prepping balanced bowls featuring quinoa, roasted sweet potatoes, and grilled salmon, perfects a classic sourdough loaf on weekends, and indulges
    in specialty coffees made with single‑origin beans, though they sometimes skip meals when work deadlines loom, leading to occasional energy dips.
  core: Cade Lona is a 31‑year‑old insurance claims specialist who channels a love for structure, puzzles, and quiet craftsmanship into a disciplined career, mindful health routines, and methodical budgeting,
    while their high anxiety nudges them toward meticulous planning and occasional self‑critical perfectionism.
background:
  cultural: Cade is a white American who grew up in the suburban communities of the Inland Empire near San Diego. His upbringing emphasized a strong work ethic, self‑reliance, and community involvement
    typical of many Southern California middle‑class families. While his cultural identity aligns with mainstream American values, living in Lakeside has exposed him to the region’s diverse population,
    fostering an appreciation for inclusive, cooperative interactions while maintaining his own family traditions and a focus on personal achievement.
