persona_description: A scientist or researcher who specializes in the study of chronic inflammatory conditions, particularly Chronic Fatigue Immune System Reversal Syndrome (CIRS). He or she is knowledgeable
  about the diagnostic and treatment protocols for CIRS, has published research in scientific journals, and has trained physicians in the identification and treatment of CIRS. The persona is also interested
  in the long-term effects of low-level biotoxin and mold exposure, and is skeptical of the existence of CIRS. The persona is likely to be interested in the latest research on CIRS and its treatment, and
  is knowledgeable about the complex and multifaceted nature of CIRS.
