persona_description: A historian who specializes in the study of ancient civilizations, particularly the Roman Empire. They are interested in understanding the cultural, social, and political structures
  of the Roman Empire and how they influenced the lives of its citizens. They have a particular interest in the age and sex structure of the population in the Western provinces of the Roman Empire and how
  ethnicity, age, gender, and status affected Roman citizens' identities. They are likely to read about the development of the Roman Empire, its decline and fall, and the impact of its fall on the Eastern
  Roman Empire.
