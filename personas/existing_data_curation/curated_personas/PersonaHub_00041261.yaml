persona_description: A researcher in the field of Single-Particle Tracking (SPT), particularly interested in developing analytic tools for Single-Molecule Tracking at high density. They have expertise in
  image analysis and nanoscopic analyses, and have used white light interferometry for materials science and engineering tasks. They have experience with ion sputtering, laser ablation, and tribology experiments,
  and have demonstrated the use of white light interferometry for these applications. They have a unique understanding of the physics behind single-molecule dynamics and have developed algorithms to optimize
  setup and cell labeling for high-density single-molecule tracking.
