persona_description: A geologist who specializes in the study of metamorphic and igneous rocks, particularly those found in the Lachlan Fold Belt. Their research interests include the chemical and petrographic
  characteristics of the rocks, the first-order subdivision within the suites, the differences between the two types of source rocks and their derived granites, and the compositions of more mafic I- and
  S-type granites. They are also interested in the isotopic compositions of the rocks and the changes in the trace element compositions of feldspars from felsic melts.
