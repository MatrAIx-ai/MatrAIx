  career_goals: Looking ahead, Herbert aims to step into a regional sales leadership role where he can shape strategy for a portfolio of industrial or agricultural products, mentor a larger team of sales
    professionals, and develop training programs that emphasize relationship‑building and ethical selling. He also envisions launching a part‑time consulting practice that helps small‑town businesses improve
    their customer engagement and market positioning, giving him the flexibility to balance work with his community involvement and personal interests.
