personas:
  professional: Scott Elder is an aspiring warehouse supervisor who leverages their meticulous inventory tracking experience, proficiency with Microsoft Office and Google Workspace, and hands‑on mechanical
    aptitude to excel in structured environments, aiming to earn a CompTIA A+ certification and eventually run a specialty PC‑building service.
  sports: Scott Elder is a devoted member of the San Diego Wave FC fan club, follows the Padres' baseball season religiously, rides with the Southern California Mountain Bike Association on weekends, and
    they combine this with a disciplined strength‑training schedule that includes three weekly HIIT sessions to maintain the agility needed for surfing at La Jolla.
  arts: Scott Elder unwinds by streaming strategy‑heavy video games like 'Civilization VI' and listening to the progressive rock of Tool, while regularly attending live shows by local indie band 'The Honorable'
    at the Soda Bar and they visit the Museum of Contemporary Art San Diego to explore modern installations that inspire their PC‑case designs.
  travel: Scott Elder prefers road‑trip itineraries that balance predictable routes with occasional surf spots, having mapped a coastal drive from San Diego to Santa Cruz, dreaming of a surf‑focused adventure
    in Portugal's Nazaré, and they schedule weekend hikes in the red‑rock canyons of Sedona when budget permits.
  culinary: Scott Elder enjoys cooking protein‑rich meals such as grilled salmon tacos with cabbage slaw and quinoa bowls topped with avocado and lime, has a moderate skill level that lets them assemble
    a perfect omelet, and they regularly indulge in a post‑workout smoothie packed with banana, spinach, and whey protein.
  core: Scott Elder blends a competitive, structure‑driven mindset with a love for surf‑side challenges, methodical budgeting, and a disciplined fitness routine, and they maintain a quirky habit of obsessively
    fine‑tuning their PC builds.
background:
  cultural: Scott grew up in a middle‑class, Anglo‑American family in the suburban neighborhoods of San Diego. His household emphasized self‑reliance, practical work ethic, and the value of routine, reflecting
    broader West Coast middle‑class cultural norms. Exposure to the local beach lifestyle and outdoor recreation shaped his appreciation for activities like surfing and hiking, while mainstream American
    media and community events reinforced values of independence and personal responsibility. Though he identifies with the broader U.S. cultural context, his specific experiences in Southern California
    have infused his outlook with a laid‑back yet goal‑oriented demeanor.
