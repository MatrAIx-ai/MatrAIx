  career_goals: Scott is determined to transition from his current period of unemployment into a stable, skill‑based career. He plans to enroll in a community‑college vocational program, targeting certifications
    such as forklift operation, CompTIA A+ IT support, or automotive service technician. His short‑term goal is to secure a position in a structured environment—such as a warehouse, tech help desk, or auto
    repair shop—where his reliability and attention to detail are valued. Over the next five years he aims to advance to a supervisory or lead role, leveraging his organizational strengths. Ultimately,
    he hopes to combine his mechanical interests and competitive drive by opening a small specialty service business, like a bike‑repair shop or custom PC build service.
