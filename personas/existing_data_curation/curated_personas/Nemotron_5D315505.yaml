  hobbies: '[''Painting and sketching'', ''Digital illustration for personal blog'', ''Visiting art galleries and museums'', ''Attending live music and poetry events'', ''DIY home-decor and upcycling projects'',
    ''Experimenting with Southern-inspired cooking'', ''Reading contemporary fiction and African-diaspora literature'', ''Mindfulness meditation'', ''Volunteering with youth arts programs'', ''Gardening
    (herb and flower garden)'']'
  career_goals: Malaka aspires to turn her passion for art into a flexible, sustainable career that fits her family life. She plans to complete a certificate in graphic design or a BFA in visual arts while
    building a freelance portfolio of illustrations, prints, and custom home-decor pieces. Her medium-term goal is to launch an online shop and a local pop-up studio where she can host art-and-craft workshops
    for youth in Guilford County, especially programs that celebrate Black artistic heritage. She also hopes to develop a community art initiative that collaborates with local schools and cultural centers,
    allowing her to merge creativity with social impact while maintaining a schedule that respects her marital and family commitments.
