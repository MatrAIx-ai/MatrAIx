personas:
  professional: Malaka Oliver is a freelance visual artist and budding graphic designer in their late twenties, who blends hand‑drawn illustration with digital tools like Procreate and Adobe Photoshop to
    create vibrant community‑focused prints and custom home‑decor pieces, leveraging strong research and outreach abilities while thriving on a flexible schedule despite occasional disorganization; they
    channel curiosity and a desire to uplift local voices into every project.
  sports: Malaka Oliver enjoys early morning jogs along the Reedy Creek Trail, follows the Charlotte Hornets and Carolina Panthers on television, plays in a local co‑ed adult soccer league on weekends,
    and occasionally attends community yoga classes, which they value for the social connection of team sport while preferring low‑key fitness routines that fit their creative schedule.
  arts: Malaka Oliver draws inspiration from muralists like Kehinde Wiley and historic figures such as Jacob Lawrence, while listening to the soulful rhythms of Lauryn Hill and Janelle Monáe during studio
    sessions, and regularly attends poetry slams featuring spoken‑word artists like Sarah Kay, which they weave into their mixed‑media work.
  travel: Malaka Oliver plans journeys with a blend of research and spontaneity, favoring road trips to nearby historic towns such as Asheville and Charleston, dreaming of immersive cultural stays in Lisbon
    and Marrakech, and recently enjoying a weekend at a family‑owned vineyard in North Carolina and a month‑long art retreat in Oaxaca, Mexico, which they balance with limited budget and family commitments.
  culinary: Malaka Oliver loves reinventing Southern classics, whipping up shrimp and grits with smoked paprika, collard greens seasoned with smoked turkey and a splash of apple cider vinegar, and experimental
    sweet‑potato brownies infused with rosemary from their herb garden, and they consider themselves an intermediate home cook who enjoys casual dinner parties and occasional visits to local eateries like
    The Grey for a modern take on comfort cuisine.
  core: Malaka Oliver is a curious, free‑spirit creator who fuses Southern roots with contemporary art, juggling a vibrant freelance practice, spontaneous budgeting, and mindful self‑care while occasionally
    letting disorganization slip through; they thrive on flexibility and community connection.
background:
  cultural: Malaka identifies as African American and grew up in the cultural tapestry of the South, drawing on family traditions rooted in North Carolina's Black community. Her upbringing was shaped by
    church gatherings, family cookouts, and storytelling that emphasized resilience, creativity, and communal support. She actively participates in local cultural events such as Juneteenth celebrations
    and community art festivals, and she seeks inspiration from African American artistic movements—from the Harlem Renaissance to contemporary Black muralists. This heritage informs her visual style, her
    preference for soulful cuisine, and her commitment to uplifting Black voices through community art initiatives. While she embraces the broader Southern culture, she also maintains a personal connection
    to the diverse narratives of the African diaspora, integrating these perspectives into her creative and social endeavors.
