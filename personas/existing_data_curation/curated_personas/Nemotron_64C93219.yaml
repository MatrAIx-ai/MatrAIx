personas:
  professional: Teresa Barnett is an administrative services manager who leverages meticulous budgeting and empathetic staff mentorship to streamline office operations while championing sustainability initiatives,
    balancing their natural curiosity for new tech with proven procedural rigor, and they regularly pilot small process improvements that align with their values.
  sports: Teresa Barnett hikes the Mark Twain National Forest each weekend, joins the local community running club for occasional 5K events, and follows the St. Louis Cardinals, using sports as a way to
    combine fitness with community camaraderie, and they often volunteer to organize group hikes.
  arts: Teresa Barnett devotes evenings to quilting intricate patterns inspired by folk art, reads historical fiction from authors like Hilary Mantel, and attends monthly performances at the regional theater,
    letting creative expression reinforce their compassionate outlook, and they occasionally host informal art swap nights for neighbors.
  travel: Teresa Barnett favors road trips through Missouri’s small‑town gems such as Hermann and Branson, has visited Asheville’s craft fairs, and dreams of a culinary pilgrimage to Tuscany, planning trips
    around budget constraints and volunteer commitments, and they tend to map routes with a focus on scenic countryside stops.
  culinary: Teresa Barnett cultivates heirloom tomatoes, peppers, and herbs to season their homemade sourdough loaf, rosemary focaccia, and strawberry rhubarb pie, wielding a stand mixer with confidence
    while occasionally over‑salting dishes in their enthusiasm, and they love to share surplus produce with the local food bank.
  core: Teresa Barnett blends meticulous organization with heartfelt community service, nurturing gardens, budgets, and relationships alike, while occasionally letting a love of heirloom seeds and quilting
    sidetrack deadlines, and they always return to their core mission of sustainable care.
background:
  cultural: Teresa is a White American raised in the rural heartland of Missouri. Her family traces roots to German and Irish immigrants who settled in the Midwest in the early 20th century. Growing up
    in Stoddard County, she was immersed in Midwestern values of modesty, hard work, and neighborly support. She attended a local Methodist church, participating in community events such as county fairs,
    church potlucks, and high school sports. Her cultural upbringing emphasizes practicality, self‑reliance, and a strong sense of community, which continue to shape her perspectives and interactions.
