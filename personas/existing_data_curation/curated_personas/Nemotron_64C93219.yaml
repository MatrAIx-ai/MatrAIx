  career_goals: Teresa aims to advance to a senior leadership role such as Director of Administrative Services or Operations Manager within the next five to seven years. She plans to complete a bachelor’s
    degree in Business Administration, earn a Certified Administrative Professional (CAP) credential, and pursue Project Management Professional (PMP) certification. Her ambitions include implementing employee‑wellness
    initiatives, developing a mentorship program for new hires, and championing sustainability practices—like waste reduction and energy‑efficient office operations—within her organization. She also hopes
    to use her position to strengthen community partnerships and volunteer programs.
