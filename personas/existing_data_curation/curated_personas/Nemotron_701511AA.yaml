  career_goals: Although officially retired, Charles aims to leave a lasting legacy of community service and knowledge sharing. He hopes to expand the neighborhood garden he helped start, mentor a new generation
    of volunteers, and compile a memoir that weaves together his personal history with the evolving story of Portland. He also aspires to support his grandchildren’s education by teaching them practical
    skills, and to maintain his health and emotional well‑being so he can remain a steady, compassionate presence for his wife and friends.
