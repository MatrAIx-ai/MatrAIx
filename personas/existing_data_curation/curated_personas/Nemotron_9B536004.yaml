personas:
  professional: Sue Burrowes, a veteran business professor at a coastal community college, channels her disciplined, data‑driven approach into designing interdisciplinary curricula that fuse sustainable
    business practices with local economic development, while mentoring junior faculty through structured peer‑coaching and securing grants that align with community uplift.
  sports: Sue Burrowes enjoys low‑impact fitness through daily waterfront walks, weekly senior‑friendly yoga at the community center, follows the Charleston Battery soccer team and the South Carolina Gamecocks
    football squad, and volunteers as a time‑keeper for the senior division of the historic Charleston Marathon.
  arts: Sue Burrowes finds artistic inspiration in the lyrical poetry of Rita Dove, the jazz piano of Diana Krall, and the classic films of Greta Gerwig, often attending the Spoleto Festival and crocheting
    hospital blankets while listening to folk crooners like John Prine.
  travel: Sue Burrowes curates travel experiences that blend relaxed coastal retreats on Kiawah Island with cultural pilgrimages to historic sites such as Williamsburg, Virginia, and Bath, England, favoring
    meticulously organized itineraries that allow solitary reflection and occasional group outings with her book club.
  culinary: Sue Burrowes delights in preparing garden‑fresh heirloom tomato bruschetta, shrimp and grits seasoned with smoked paprika, and seasonal carrot‑ginger soup, often pairing meals with locally sourced
    sweet tea infused with mint and lemon.
  core: Sue Burrowes, a methodical 61‑year‑old educator, harmonizes a disciplined academic career with a nurturing love for gardening, community mentorship, and reflective historic reading, while maintaining
    orderly budgets and a quiet, introspective demeanor.
background:
  cultural: Sue’s cultural background is rooted in the traditional Southern United States, shaped by a upbringing in a modest, predominantly white community that values hospitality, church involvement,
    and strong family ties. Growing up during the civil rights era, she witnessed significant social change, which cultivated a respect for both heritage and progress. Her Southern identity is reflected
    in her appreciation for regional cuisine, participation in local festivals, and a conversational style that balances politeness with directness. While her education and career have given her a national
    perspective, she remains deeply connected to the rhythms of Charleston County, integrating its historic charm and communal spirit into both her professional and personal life.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''Adult Learning Strategies'', ''Project Management'', ''Budgeting and Financial Analysis'', ''Data‑Driven Decision Making'', ''Mentoring
    and Academic Advising'', ''Grant Writing'', ''Community Partnership Development'', ''Technology‑Enhanced Teaching'']'
  hobbies: '[''Gardening'', ''Historical Fiction Reading'', ''Waterfront Walking'', ''Birdwatching'', ''Book Club Participation'', ''Volunteer Career Workshops'', ''Crocheting'']'
  career_goals: Looking ahead, Sue aims to spearhead the creation of an interdisciplinary course that integrates sustainable business practices with local economic development, positioning the program as
    a regional model. She aspires to mentor a new generation of faculty, establishing a structured peer‑coaching program that blends her organized methodology with her collaborative spirit. Sue also seeks
    to author a textbook that captures her practical approach to business education, combining scholarly rigor with real‑world case studies. While contemplating a phased retirement, she wishes to leave
    a lasting legacy through a scholarship fund for underrepresented students pursuing business degrees, aligning her commitment to harmony and community uplift.
