personas:
  professional: Ramon Espino, a methodical maintenance technician with a toolbox spanning plumbing, electrical, HVAC, and welding, leverages their curiosity and safety‑first mindset to design preventive‑maintenance
    schedules that keep NYC residential towers humming while patiently mentoring apprentices.
  sports: Ramon Espino bolts onto the basketball courts of Clove Lakes Park each Thursday night, suiting up for the Staten Island Vipers community league while cheering on the New York Knicks and the New
    York Yankees during the regular season, and they supplement the fast‑paced games with weekend hikes on the Greenbelt trails to stay limber.
  arts: Ramon Espino unwinds to the rhythms of Marc Anthony, Bad Bunny, and classic island folk ballads while perusing the latest issue of Mechanical Engineering Magazine, and they never miss the annual
    waterfront arts festival where local muralists and dancers showcase vibrant performances.
  travel: Ramon Espino prefers short, well‑planned road trips that blend nature and nostalgia, having mapped out hikes in the Adirondacks, a weekend of jazz in New Orleans, and a future getaway to Asheville’s
    Blue Ridge Mountains, and they keep an eye on airfare deals to keep travel within a modest budget.
  culinary: Ramon Espino delights in the kitchen, skillfully whipping up mofongo with fried plantains and garlic, simmering arroz con gandules seasoned with sofrito and annatto, and they often experiment
    with smoked paprika and fresh cilantro while pairing the meals with a crisp local craft beer.
  core: Ramon Espino merges a handyman’s curiosity with a community‑first ethos, juggling a relentless DIY streak, occasional overspending on power tools, and a habit of postponing dentist appointments
    while they steadfastly climb the facilities‑management ladder.
background:
  cultural: Ramon is a first‑generation Puerto Rican‑American who grew up in a bilingual household in Staten Island. Family gatherings centered around music, food, and stories of the island, instilling
    a strong sense of community, respect for tradition, and pride in his heritage. He fluently switches between English and Spanish, which helps him communicate effectively with diverse residents and coworkers.
    The vibrant Puerto Rican community in New York—its parrandas, bomba dancing, and patron saint celebrations—continues to shape his values of generosity, cooperation, and harmony, reinforcing his desire
    to give back through reliable service and mentorship.
attributes:
  skills: '["Plumbing repair and maintenance","Electrical troubleshooting","HVAC system servicing and diagnostics","Carpentry and cabinetry work","Welding and metal fabrication","Blueprint reading and building‑code
