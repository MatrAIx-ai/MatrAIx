  hobbies: '["DIY home improvement and woodworking","Basketball at local parks","Cooking Puerto Rican cuisine","Listening to salsa and reggaetón music","Hiking Staten Island nature trails","Reading trade
    magazines and technical blogs","Participating in Puerto Rican cultural festivals"]'
  career_goals: Ramon aims to advance from a general maintenance technician to a senior facilities manager within a large residential or commercial property portfolio in New York City. He plans to earn
    journeyman certifications in electrical and HVAC, complete the Certified Facility Manager (CFM) credential, and eventually launch his own small‑scale maintenance contracting business that emphasizes
    reliability, sustainability, and community‑focused service. He also hopes to mentor younger tradespeople, especially those from Latino backgrounds, to foster greater representation in the skilled‑trade
    workforce.
