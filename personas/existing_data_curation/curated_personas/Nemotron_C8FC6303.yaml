  career_goals: Vanessa dreams of a future where she can blend creativity with structure. She imagines becoming an architect who designs beautiful, functional spaces, or a scientist‑engineer who invents
    solutions to real‑world problems. She also feels drawn to helping others, considering roles such as a veterinarian or an elementary school teacher, and she is determined to study hard now to make those
    ambitions possible.
