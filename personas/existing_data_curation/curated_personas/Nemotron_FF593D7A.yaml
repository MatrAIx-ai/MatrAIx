personas:
  professional: Glenda Hall, a 38‑year‑old engineering technologist in the Twin Cities, leverages their expertise in mechanical and electrical systems, CAD drafting, and preventive maintenance to streamline
    shop‑floor reliability while mentoring junior staff and championing inclusive engineering initiatives.
  sports: Glenda Hall enjoys weekend hikes on the Superior Hiking Trail with their family, supports the Minnesota Vikings and Minnesota Twins, belongs to a local running club that meets for 5K runs, and
    stays active by dancing to Afro‑beat and swing at community socials.
  arts: Glenda Hall participates in a community theater troupe where they perform in seasonal productions, relishes dancing to Afro‑beat and swing music at local clubs, and draws inspiration from performers
    like Gregory Porter, Beyoncé, and the Minnesota Orchestra's chamber concerts.
  travel: Glenda Hall favors spontaneous road trips to national parks such as Glacier and Yellowstone, enjoys weekend getaways to Chicago and Milwaukee, and plans family vacations that balance outdoor adventure
    with cultural visits, often using a mix of last‑minute deals and loyalty points.
  culinary: Glenda Hall cooks soul‑food staples—crispy fried chicken, seasoned collard greens, and buttery cornbread—while experimenting with spice rubs and seasonal vegetables, frequently sharing their
    dishes at neighborhood potlucks and seeking fresh produce at the Midtown Farmers Market.
  core: Glenda Hall blends engineering pragmatism with a love for community theater, hiking, and soul‑food cooking, juggling structured career goals with a laid‑back approach to planning and occasional
    financial procrastination.
background:
  cultural: Glenda grew up in a close‑knit African‑American family that emphasized faith, music, and community service. Her parents migrated from the Southern United States, bringing with them rich traditions
    of gospel singing, soul cuisine, and storytelling that she continues to celebrate in Minneapolis. She is an active member of the local Black church, where she participates in choir and organizes cultural
    events such as Juneteenth celebrations. Glenda’s heritage informs her values of cooperation, resilience, and mentorship, driving her commitment to uplift underrepresented voices in engineering and her
    dedication to building harmonious relationships both at work and in her community.
attributes:
  skills: '[''CAD (SolidWorks, AutoCAD)'', ''Electrical troubleshooting'', ''Instrumentation and control systems'', ''Preventive maintenance planning'', ''Process optimization'', ''Technical documentation'',
    ''Team collaboration'', ''Training and mentoring'', ''Problem solving under pressure'', ''Quality assurance and compliance'']'
  hobbies: '[''Community theater'', ''STEM mentorship for youth'', ''Hiking in Minnesota state parks'', ''Urban gardening'', ''Cooking and sharing soul‑food dishes'', ''Social dancing (Afro‑beat, swing)'',
    ''Volunteering at local non‑profits'', ''Family travel and cultural festivals'']'
  career_goals: Glenda aims to earn a bachelor's degree in engineering technology within the next three years to qualify for senior technologist roles. She envisions leading a multidisciplinary maintenance
    team at a manufacturing plant in the Twin Cities, where she can design and implement reliability‑centered maintenance programs. In the longer term, she hopes to become a project manager overseeing plant
    upgrades, while also championing diversity and inclusion initiatives that encourage more Black women to enter the engineering trades. She is also interested in obtaining certifications such as Certified
    Maintenance & Reliability Professional (CMRP) to deepen her expertise.
