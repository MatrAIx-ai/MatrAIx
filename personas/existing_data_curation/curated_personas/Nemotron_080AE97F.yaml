personas:
  professional: Eric Holland is a seasoned vending and arcade equipment technician with deep mechanical aptitude, expertise in PLC programming and diagnostic tools, and a knack for turning chaotic service
    calls into smooth customer experiences thanks to their outgoing nature and talent for conflict resolution.
  sports: Eric Holland enjoys playing pickup basketball at the neighborhood park, cheering on the Atlanta Braves at Truist Park, and casting a line at Lake Allatoona on weekends, while staying fit through
    weekly jogging and occasional swims at the local YMCA’s adult league.
  arts: Eric Holland has a passion for vintage arcade culture, restoring classic cabinets from companies like Atari and Namco, and unwinds by listening to synthwave artists such as Kavinsky and classic
    chiptune soundtracks from games like Pac‑Man, while also attending community theater productions featuring classic Americana plays.
  travel: Eric Holland prefers road trips that blend leisure and nostalgia, having driven the Blue Ridge Parkway to visit family in Asheville, taking a weekend getaway to New Orleans for its jazz scene,
    and dreaming of a future pilgrimage to Tokyo’s Akihabara district to hunt for rare arcade components, all while balancing the time and budget constraints of family commitments.
  culinary: Eric Holland loves Southern comfort food, frequently grilling smoked brisket and chicken thighs at community barbecues, cooking fresh tomato‑based sauces and peach cobbler from their home garden
    harvest, and considers themselves an intermediate home cook who insists on using fresh basil, smoked paprika, and heirloom tomatoes.
  core: Eric Holland blends a practical, hands‑on work ethic with a love for community gatherings, vintage arcade restoration, and spontaneous BBQs, all while juggling a slight disorganization and a habit
    of postponing paperwork until the last minute.
background:
  cultural: Eric grew up in the suburban South, deeply rooted in the traditions of Marietta and Cobb County, Georgia. His upbringing reflects the values of Southern hospitality, community involvement, and
    a strong work ethic. He identifies with the regional culture of family gatherings, church participation, and a love for outdoor recreation such as fishing and gardening. While he is broadly assimilated
    into mainstream American culture, his daily life is colored by Southern cuisine, local high‑school football rituals, and a commitment to supporting his neighborhood through volunteer work and friendly
    social networks.
attributes:
  skills: '["Mechanical repair of vending and arcade machines", "Electrical diagnostics and schematics reading", "Computerized diagnostic software usage", "PLC programming basics", "Inventory management
    and parts ordering", "Customer service and vendor relations", "Team coordination and junior staff training", "Basic welding and metal fabrication", "Service report documentation"]'
  hobbies: '["Fishing at Lake Allatoona", "Attending Atlanta Braves baseball games", "Community barbecues and church potlucks", "Restoring vintage arcade cabinets", "Pickup basketball with neighbors", "Gardening
    (tomatoes, peaches)", "Volunteering equipment repair for senior center"]'
  career_goals: Eric aims to move from field service into a supervisory role within the next three years, eventually overseeing a regional team of technicians. He plans to obtain industry certifications
    such as the Certified Service Technician (CST) and to deepen his knowledge of IoT‑enabled vending systems. In the longer term, he envisions launching his own small‑scale repair shop that not only services
    machines but also offers consulting for modernizing legacy arcade equipment. Balancing his preference for structure with his flexibility, he wants to create a business that provides reliable service
    while allowing him to maintain a healthy work‑life balance with his family.
