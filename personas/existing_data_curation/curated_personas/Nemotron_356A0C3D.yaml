  hobbies: '[''Bachata and merengue dancing'', ''Cooking traditional Dominican cuisine'', ''Volunteering at church food pantry'', ''Attending church services and choir'', ''Gardening'', ''Playing dominoes'',
    ''Walking in local parks'', ''Reading mystery novels'', ''DIY home organization'', ''Participating in block parties'']'
  career_goals: Karoll aims to translate her lifelong dedication to routine, reliability, and community service into a part‑time or volunteer leadership role within a Bronx non‑profit focused on cultural
    outreach or health education. She plans to pursue a Community Health Worker certification and consider completing a bachelor’s degree in Social Services or Public Administration to broaden her impact.
    Her ambition includes overseeing annual Dominican cultural festivals, mentoring younger volunteers, and eventually securing a position as a community program coordinator where she can apply her organizational
    talents while maintaining the stability she values for her family.
