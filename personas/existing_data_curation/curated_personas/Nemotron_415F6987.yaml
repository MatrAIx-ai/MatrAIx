  hobbies: '["Salsa dancing","Cooking Puerto Rican cuisine","Hiking in North Georgia","Rooftop gardening","Reading science‑fiction","DIY electronics projects","Volunteering at food pantry","Attending cultural
    festivals"]'
  career_goals: Amelia aims to move into a supervisory role on the assembly floor within the next two years, obtaining certifications in CNC programming and welding to broaden her technical credibility.
    She plans to enroll in an associate’s degree program in Manufacturing Technology at a local community college, while also completing an online lean‑six‑sigma Green Belt course. Long‑term, she hopes
    to lead a process‑improvement team that integrates sustainable manufacturing practices and, eventually, launch a small side‑business creating custom metal art pieces that reflect her Puerto Rican heritage.
