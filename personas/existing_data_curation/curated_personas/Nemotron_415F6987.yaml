personas:
  professional: Amelia Retamar is a proficient assembly technician at a regional manufacturing facility, adept at interpreting technical drawings, operating CNC machines, welding, and troubleshooting equipment,
    and she channels her curiosity‑driven practicality and laid‑back flexibility into informal mentorship and on‑the‑fly process tweaks as she pursues a supervisory position and Lean Six Sigma certification.
  sports: Amelia Retamar tackles weekend hikes with the Georgia Hiking Club, supports the Atlanta Falcons and Braves as her go‑to NFL and MLB teams, and trains with the Atlanta Trail Runners during the
    spring and fall, balancing endurance cardio with the occasional weekend bike ride.
  arts: Amelia Retamar expresses her creative side through salsa dancing to energetic beats and by listening to a mix of pop icons like Beyoncé, John Legend, and Coldplay, while also enjoying graphic novels
    and attending local theatre productions, letting music and storytelling fuel her imagination.
  travel: Amelia Retamar plans her getaways with a blend of spontaneous weekend road trips to the Blue Ridge Mountains and meticulously budgeted international adventures, dreaming of hiking Iceland’s volcanic
    trails and exploring the vibrant food markets of Osaka, while often squeezing in a long‑day hike in Savannah’s historic squares when time permits.
  culinary: Amelia Retamar enjoys crafting aromatic meals like adobo‑spiced chicken paired with cilantro‑lime rice and sweet plantain mash, showcasing a knack for melding fresh herbs such as oregano, thyme,
    and cilantro with bold flavors, and they often experiment with homemade salsas and marinades while alternating between quick skillet dishes and weekend feasts for friends.
  core: Amelia Retamar is a hands‑on problem‑solver who blends a love of metalcraft with salsa rhythms, juggling a laissez‑faire approach to schedules with a relentless curiosity for new tools, yet often
    misplaces their own screwdriver set and lets laundry pile up.
background:
  cultural: Amelia was raised in a bilingual Puerto Rican household in the Atlanta metropolitan area. Her family placed a strong emphasis on togetherness, music, and food, celebrating traditions such as
    San Sebastián and Noche de San Juan. Spanish is spoken at home, while she is equally comfortable with English in professional settings. The cultural values of respect, cooperation, and community service
    shape her interactions at work and in her volunteer activities, and she often incorporates elements of her heritage—like rhythmic movement and flavorful cooking—into her everyday life.
