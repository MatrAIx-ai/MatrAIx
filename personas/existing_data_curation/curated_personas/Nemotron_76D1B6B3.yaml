  hobbies: '[''Cooking traditional Mexican dishes'', ''Backyard gardening (tomatoes, chilies, herbs)'', ''Reading self‑help and personal finance books'', ''Walking in local parks'', ''Meditation and mindfulness
    practice'', ''Crocheting blankets and shawls'', ''Participating in small church gatherings'', ''Volunteering at community center (cooking workshops)'', ''Attending Mexican cultural festivals'']'
  career_goals: Maria aims to translate her home and community expertise into a part‑time role that balances financial needs with her family responsibilities and wellness. In the next two years she plans
    to obtain a certified food handler and basic culinary arts certificate, enabling her to launch a modest home‑based catering service that specializes in nutritious Mexican meals for small gatherings.
    She also envisions volunteering as a nutrition educator at the local adult school, eventually moving into a paid community health worker position that emphasizes food security and budgeting for low‑income
    families. Throughout this process she seeks to improve her stress‑management techniques and build confidence in professional settings, while remaining an active supporter of her husband's endeavors
    and her children's education.
