  career_goals: Even in retirement, Jane’s ambition is to stay active, independent, and engaged with her community. She aims to continue her volunteer work at the local library and church, document and
    preserve her family’s genealogy for future generations, maintain her health through daily walks and garden care, and someday compile a memoir of her experiences from the Great Depression through the
    civil‑rights era to share with her grandchildren.
