  career_goals: Nganha aims to transition from full‑time development to a senior technical leadership role that allows her to shape engineering processes and champion a culture of reliability and mentorship.
    She hopes to spearhead initiatives that modernize legacy systems for small‑to‑mid‑size enterprises, especially within Seattle's East‑Asian business community. Over the next few years, she plans to author
    a practical guide on sustainable software engineering for senior developers and to establish a mentorship program that connects seasoned engineers with underrepresented youth. Ultimately, she envisions
    a gradual shift toward part‑time consulting and community‑focused work, ensuring her expertise leaves a lasting, structured legacy while maintaining a balanced, predictable schedule that respects her
    personal pace.
