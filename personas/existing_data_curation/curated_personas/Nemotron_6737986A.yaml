personas:
  professional: Nganha Cheng, a 60‑year‑old software veteran, leverages three decades of mainframe to cloud expertise to lead engineering teams toward test‑driven, well‑documented, scalable backend solutions
    while mentoring junior developers and championing inclusive, reliability‑focused cultures, and they approach each project with a meticulous, step‑by‑step mindset.
  sports: Nganha Cheng enjoys weekend hikes in the Cascades, practices Tai Chi at Green Lake Park, and follows the Seattle Seahawks and Seattle Sounders FC, and they often join community runs organized
    by the local park district.
  arts: Nganha Cheng collects first‑edition classic science‑fiction novels like Asimov’s Foundation, finds inspiration in minimalist composer Philip Glass, attends Seattle Symphony performances, and they
    occasionally participate in calligraphy workshops.
  travel: Nganha Cheng prefers carefully planned journeys that blend cultural immersion with relaxation, such as revisiting Kyoto’s historic temples during cherry blossom season, exploring Vancouver’s coastal
    trails, and taking short getaways to Oregon’s Crater Lake, and they always schedule trips around family holidays.
  culinary: Nganha Cheng delights in preparing traditional dishes like pork dumplings, ginger‑scallion bok choy, and meticulously crafted mooncakes using fresh ginger, soy sauce, and fermented black beans,
    while they also experiment with modern fusion recipes on weekends.
  core: Nganha Cheng is a methodical technologist who balances a disciplined work ethic with the tranquil rhythms of gardening, tea, and Tai Chi, and they occasionally hoard vintage tech manuals while indulging
    in late‑night sci‑fi marathons.
background:
  cultural: Nganha is a second‑generation East‑Asian American, born to parents who emigrated from China and South Korea. She was raised in a bilingual household, speaking Mandarin and Korean at home while
    attending public school in the Seattle area. Her upbringing emphasized collectivist values, respect for elders, and a high regard for education—principles that continue to shape her collaborative work
    style and dedication to mentorship. She celebrates cultural holidays such as Lunar New Year, Chuseok, and the Mid‑Autumn Festival, often preparing family‑style meals and participating in local Asian
    community events. These cultural ties inform her sensitivity to user experience across diverse markets and her commitment to fostering inclusive, harmonious environments both at work and in the broader
    Seattle community.
