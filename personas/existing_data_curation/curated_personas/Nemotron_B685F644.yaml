personas:
  professional: Charmi Cannon, a finance analyst and educator, blends rigorous budgeting, risk assessment, and data visualization skills with a nurturing teaching style, and they lead nonprofit financial
    training programs while charting a path toward a CFO position.
  sports: Charmi Cannon fuels fitness with early‑morning yoga sessions, weekend hikes through the Sipsey Wilderness, and enthusiastic support for the Alabama Crimson Tide football team and the Birmingham
    Barons baseball club, and they balance disciplined training with a love for relaxed, nature‑focused recreation.
  arts: Charmi Cannon expresses creativity through a gospel and jazz choir at the local church, devouring classic recordings by Ella Fitzgerald, Nina Simone, and John Coltrane, and they find inspiration
    in historical fiction by Walter Mosley and Ann Patchett, weaving music and literature into their community rhythm.
  travel: Charmi Cannon plans trips with careful itineraries, favoring historic Southern towns like Charleston, Savannah, and New Orleans and nature escapes such as the Great Smoky Mountains, and they balance
    budget‑conscious weekend getaways against family responsibilities, while a long‑term dream is to explore the Smithsonian museums in Washington, D.C.
  culinary: Charmi Cannon enjoys cooking soulful meals, often preparing collard greens simmered with smoked turkey, sweet‑potato casserole topped with marshmallows, and buttery cornbread, using fresh okra,
    smoked paprika, and a pinch of cayenne to create comforting flavors for close friends and family, and they consider each dish a tribute to their cultural roots.
  core: Charmi Cannon balances meticulous financial mastery with a quiet, reflective soul‑anchored lifestyle, turning stress into gardening, gospel singing, and purposeful community service, and they find
    comfort in their disciplined routines.
background:
  cultural: Charmi is an African‑American woman raised in Leroy, Alabama, a small town where church, family, and community ties are strong. Her upbringing was shaped by the traditions of the Black Southern
    church, with regular participation in worship, gospel music, and community service. Family gatherings emphasized storytelling, cuisine, and the celebration of cultural milestones like Juneteenth and
    Kwanzaa. She values the legacy of her ancestors’ perseverance and integrates that pride into her professional life, seeking to uplift other Black professionals. Her educational journey, supported by
    her parents’ emphasis on learning, led her to a degree in education and later a career in finance. She remains actively involved in local cultural events, mentors youth through after‑school programs,
    and maintains a deep connection to Southern Black culinary and musical heritage.
