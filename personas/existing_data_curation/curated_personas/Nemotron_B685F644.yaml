  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Cooking Southern cuisine'', ''Yoga'', ''Hiking'', ''Volunteer tutoring'', ''Church choir'', ''Genealogy research'', ''Jazz listening'', ''Crossword
    puzzles'']'
  career_goals: She aims to advance to a senior executive role, such as Chief Financial Officer, within a regional healthcare or education nonprofit. Over the next five years, she plans to earn a CPA and
    pursue an MBA to deepen her strategic acumen. She also aspires to launch a boutique financial consulting practice focused on supporting small businesses and community organizations in the rural South,
    particularly those led by women and minorities. Mentorship is a core ambition; she wants to create a mentorship network for aspiring Black women in finance, offering workshops and one‑on‑one guidance.
    Ultimately, she seeks to influence policy on equitable funding for underserved schools and community programs.
