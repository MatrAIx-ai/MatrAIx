  career_goals: Although retired from formal employment, Jin Ok Zheng aims to deepen his engagement with the arts by volunteering as a docent at the Pasadena Museum of History, where he can share his nuanced
    perspectives with small, intimate groups. He aspires to curate a modest community exhibition that showcases works by local senior artists, fostering intergenerational dialogue while respecting his preference
    for low‑key, solitary interaction. He also hopes to compile a memoir that weaves together his family’s immigrant journey, artistic passions, and reflections on a life of quiet curiosity. Maintaining
    health and mental acuity through regular yoga, meditation, and mindful walking remains a personal ambition, as does occasional travel to tranquil cultural sites such as the gardens of Kyoto and the
    tea houses of Hangzhou.
