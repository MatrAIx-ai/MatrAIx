personas:
  professional: Vinh Chen is an aspiring indie game developer who blends their love for Minecraft modding with structured programming skills, channeling their meticulous nature into creating detailed worlds
    while balancing school responsibilities.
  sports: Vinh Chen enjoys watching the 'Los Angeles Lakers' and 'Manchester United' on TV, follows the local high school esports league, and participates in a weekend community swimming club for low‑impact
    exercise, though they rarely join team sports due to a preference for solitary activities.
  arts: Vinh Chen expresses creativity through digital sketches of fan characters from Studio Ghibli films and original concept art, listening to lo‑fi artists like Nujabes and Joji, while also collecting
    LEGO sets and building intricate scale models as a tactile extension of their artistic vision.
  travel: Vinh Chen prefers structured family trips that blend cultural sites like the Smithsonian Museum and amusement destinations such as Orlando’s Universal Studios, and dreams of a solo itinerary to
    Kyoto’s quiet temples, balancing their need for calm with occasional adventure.
  culinary: Vinh Chen enjoys cooking simple dishes like fresh spring rolls, bánh mì with pickled vegetables, and stir‑fried rice, mastering the balance of flavors while experimenting with ingredients like
    lemongrass and sriracha, though they often over‑season in the excitement of trying new recipes.
  core: Vinh Chen is a solitary, structure‑loving teen who channels intense emotions into gaming, drawing, and cooking, carefully budgets their allowance yet occasionally gives in to impulsive splurges,
    and navigates anxiety through journaling and quiet hobbies.
background:
  cultural: Vinh is a second‑generation Vietnamese‑American whose family migrated from Vietnam in the early 2000s. At home, Vietnamese is spoken alongside English, and family traditions such as celebrating
    Tet, cooking pho and bánh chưng, and practicing filial respect are regularly observed. His father’s Chinese‑Vietnamese heritage adds occasional celebrations like the Mid‑Autumn Festival. Living in Carson
    City, Michigan, Vinh navigates a blend of Midwestern American life and Southeast Asian cultural values, balancing community school activities with family gatherings that emphasize education, perseverance,
    and harmony. This dual cultural immersion shapes his worldview, work ethic, and personal interests.
attributes:
  skills: '[''Basic Python programming'', ''Digital illustration with Procreate'', ''Video editing with Adobe Premiere Rush'', ''Organizational planning and time‑management using digital calendars'', ''Bilingual
    communication (Vietnamese & English)'', ''Logical puzzle solving (Sudoku, brain‑teasers)'']'
  hobbies: '[''Playing single‑player video games (e.g., Minecraft, RPGs)'', ''Reading fantasy & science‑fiction novels'', ''Journaling and reflective writing'', ''Digital and traditional sketching'', ''Building
    LEGO and scale model kits'', ''Cooking simple Vietnamese dishes (e.g., spring rolls)'', ''Listening to lo‑fi and ambient music'']'
  career_goals: Vinh aims to complete his high school education and pursue a degree in computer science or software engineering, with a long‑term ambition to work remotely as a software developer or indie
    video‑game creator. He values careers that provide clear expectations, structured workflows, and minimal daily social pressure, allowing him to focus on problem‑solving and creative coding. Over time,
    he hopes to combine his technical expertise with his artistic interests by designing interactive experiences that emphasize thoughtful storytelling. He also wants to develop coping strategies for anxiety
    and eventually mentor younger students who share similar challenges.
