persona_description: A German church architect who specialized in the design of churches and was known for his work with the architect Dominikus Böhm on the prize-winning unexecuted design for a church
  in Frankfurt. He published a work on church design in 1938 and designed several churches after the 1939–45 war, including St Anna in Düren, St Michael in Frankfurt, and the Church of the Holy Family in
  Oberhausen. His work emphasized the desirability of bringing the congregation into a more intimate relationship with the altar. He was involved in the reconstruction of several German cities after the
  war, notably Cologne, and designed the Wallraf-Richartz Museum in Cologne.
