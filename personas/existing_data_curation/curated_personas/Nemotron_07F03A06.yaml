personas:
  professional: Ratavious Hurdle is a 22‑year‑old maintenance technician at a Miami industrial facility who blends meticulous hydraulic, pneumatic, and welding expertise with basic PLC programming, logs
    every task in CMMS, and quietly channels their curiosity into designing custom drones that automate routine equipment inspections, and they take pride in ensuring every bolt is torqued to spec.
  sports: Ratavious Hurdle starts each day with solo sunrise jogs along Miami Beach, tracks mileage on a Garmin, occasionally joins the Miami Beach Runners club for weekend group runs, follows the Miami
    Heat for motivation, and they play casual beach volleyball with neighbors in the evenings.
  arts: Ratavious Hurdle spends evenings immersed in science‑fiction novels by Octavia Butler and Isaac Asimov while letting the smooth sounds of Miles Davis, Erykah Badu, and Buju Banton shape the creative
    atmosphere that fuels their 3‑D‑printed artistic projects, and they frequently visit Wynwood Walls to study vibrant street murals.
  travel: Ratavious Hurdle prefers low‑key, self‑planned getaways that blend technical curiosity with cultural immersion, having road‑tripped the Florida Keys and spent a weekend exploring Old San Juan
    in Puerto Rico, and they dream of a solo adventure to Tokyo to experience cutting‑edge robotics and Akihabara’s anime scene.
  culinary: Ratavious Hurdle delights in cooking homemade jerk chicken seasoned with scotch bonnet peppers, paired with cilantro‑lime rice and fried plantains, often experimenting with 3‑D‑printed spice
    racks, and they frequently dine at Little Haiti’s J&J Caribbean Café to sample authentic callaloo and rice‑and‑peas.
  core: Ratavious Hurdle is a solitary‑minded tech tinkerer who balances sunrise jogs with drone‑building, constantly seeks reliable solutions while humming to jazz and devouring sci‑fi marathons, and they
    habitually neglect routine dental check‑ups.
background:
  cultural: Ratavious grew up in a close‑knit Black community in Miami‑Dade County, where Afro‑American and Caribbean influences intersect. His family’s roots trace back to the Southern United States and
    the Caribbean, giving him a blend of traditions such as church gatherings, community barbecues, and vibrant Afro‑Caribbean festivals. The multicultural environment of Miami exposed him to Spanish language
    and Latin rhythms, enriching his cultural identity. His heritage emphasizes resilience, mutual support, and a strong work ethic, which he carries into his professional life and community service.
attributes:
  skills: '[''industrial machinery troubleshooting'', ''hydraulic and pneumatic maintenance'', ''MIG/TIG welding'', ''blueprint reading'', ''preventive maintenance planning'', ''electrical diagnostics'',
    ''basic PLC programming'', ''refractory material handling'', ''CMMS data management'', ''OSHA safety compliance'']'
  hobbies: '[''reading science-fiction novels'', ''electronics tinkering'', ''drone building'', ''3D printing'', ''early morning jogging'', ''listening to jazz and neo-soul'', ''exploring Afro-Caribbean
    cuisine'', ''volunteering for appliance repair'']'
  career_goals: He aims to earn certifications such as the Certified Maintenance & Reliability Technician (CMRT) and NACE corrosion specialist, advance to a senior lead mechanic role, and eventually transition
    into a field service engineering position where he can design maintenance solutions. Long‑term, Ratavious hopes to establish a community training program for young Black tradespeople in Miami, combining
    his technical skills with his desire to help others and promote harmony.
