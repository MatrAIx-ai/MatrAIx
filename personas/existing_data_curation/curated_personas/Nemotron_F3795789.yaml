  career_goals: Randal aims to earn his GED within the next year and then enroll in a community college program focused on automotive technology or logistics. He is interested in pursuing a career as an
    automotive technician or a supply chain coordinator, where his organizational skills and hands‑on aptitude can be applied. He also hopes to start a small side business offering mobile car detailing
    or lawn care services for neighborhood clients, giving him early entrepreneurial experience while supporting his education.
