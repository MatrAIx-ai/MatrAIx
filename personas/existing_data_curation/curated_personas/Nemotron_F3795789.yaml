personas:
  professional: Randal Copeland, a high‑school junior with a knack for structured teamwork, leads the robotics club’s simple mechanism projects, coordinates peer tutoring sessions at the library, and they
    channel their organizational talent into a budding mobile car‑detailing side business while planning to study automotive technology or logistics at community college.
  sports: Randal Copeland, an energetic team player, spends winter skating for the city’s junior hockey league while rooting for the NHL’s Boston Bruins, shoots hoops for the high‑school basketball squad
    during spring and backs the NBA’s Golden State Warriors, and they hit local hiking trails like Pine Ridge with friends to maintain overall fitness.
  arts: Randal Copeland, a socially inclined teen with a flair for creative expression, streams classic rock bands such as Foo Fighters, binge‑watches Marvel movies starring Chris Evans, and they edit short
    gaming highlight reels with friends for Discord, occasionally sketching comic characters during downtime.
  travel: Randal Copeland, an adventurous planner, prefers weekend road trips to nearby state parks like Yellowstone and the Great Smoky Mountains for hiking, but they also dream of a backpacking trek across
    the Canadian Rockies, balancing travel ambitions with a budget funded by their detailing side hustle.
  culinary: Randal Copeland, a moderately skilled home cook, can expertly grill a bacon‑cheeseburger and whip up a hearty chili con carne using ground beef, canned beans, cumin, and smoked paprika, and
    they often grab quick meals such as pizza rolls and protein bars between practices and gaming sessions.
  core: Randal Copeland, a structured yet sociable teen, balances a relentless love for team sports and multiplayer gaming with a budding entrepreneurial spirit, obsessively tracking their schedule on a
    whiteboard, and they never miss a chance to tinker with the family’s car.
background:
  cultural: Randal grew up in Bloomfield Hills, an affluent suburb of Detroit in Oakland County. His family is part of the region’s predominantly white middle‑class community, with roots tracing back to
    German and Irish immigrants who settled in Michigan in the early 20th century. The local culture emphasizes academic achievement, involvement in extracurricular activities, and a strong sense of community
    service. These values, combined with the suburban environment’s access to organized sports, clubs, and higher‑education resources, shape his outlook and aspirations.
