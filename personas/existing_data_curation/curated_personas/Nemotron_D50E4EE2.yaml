personas:
  professional: Selita Baker is a community leader and cultural ambassador in New Orleans, using their practical curiosity and flair for storytelling to organize neighborhood festivals, run Creole cooking
    workshops at the community center, mentor emerging women entrepreneurs, and mediate disputes with calm empathy while balancing meticulous planning with spontaneous creativity.
  sports: Selita Baker enjoys cheering on the New Orleans Saints during football season and the Pelicans in winter, participates in a senior walking club that meets twice a week in City Park, swims laps
    at the community pool for low‑impact exercise, and occasionally joins a local senior volleyball league, balancing team spirit with personal fitness goals.
  arts: Selita Baker immerses themselves in the vibrant arts scene by performing in a gospel choir at their church, attending live jazz sets at Preservation Hall featuring Wynton Marsalis, crafting Mardi
    Gras masks with beadwork, knitting cozy shawls while listening to classic blues artists like B.B. King, and sharing stories from Southern history at community storytelling evenings.
  travel: Selita Baker's travel style mixes careful planning through social media groups with a love for spontaneous road trips, favoring weekend getaways to historic Charleston, the music‑filled streets
    of Austin, and coastal retreats in Gulfport, while budgeting for affordable stays with church groups and dreaming of a future pilgrimage to New Orleans' sister city, Montpellier, France.
  culinary: Selita Baker's kitchen is a hub of Creole flavor where gumbo simmered with homemade stock, jambalaya spiced with thyme and bay leaves, and fresh beignets dusted with powdered sugar are routine,
    and their habit of snipping garden‑grown basil straight into dishes often leads to an occasional over‑seasoned pot they proudly serve to friends despite a lingering fear of the stove burning out.
  core: Selita Baker is a talkative, community‑focused mentor who balances meticulous budgeting with generous splurges, manages hypertension through garden‑based cooking, cheerfully supports local sports,
    and channels creative energy into jazz, gospel, and handcrafted Mardi Gras art, all while occasionally forgetting to turn off the stove.
background:
  cultural: Selita is a Black woman whose life is deeply intertwined with the cultural tapestry of New Orleans. Growing up in a close‑knit Creole‑influenced neighborhood, she absorbed the rhythms of jazz,
    the flavors of Southern cuisine, and the traditions of African‑American church life. Her upbringing emphasized community solidarity, oral storytelling, and the celebration of heritage through events
    like Mardi Gras and second‑line parades. Selita’s family lineage includes connections to the historic French Quarter’s Creole community and the African diaspora’s musical and culinary contributions.
    These cultural roots shape her values of hospitality, resilience, and the importance of preserving collective memory for future generations.
attributes:
  skills: '[''Community outreach'', ''Event planning'', ''Culinary arts (Creole cooking)'', ''Oral communication'', ''Conflict mediation'', ''Basic budgeting'', ''Home repair'', ''Mentoring younger neighbors'',
