  hobbies: '[''Cooking Creole dishes'', ''Herb gardening'', ''Listening to jazz and blues'', ''Participating in church choir'', ''Reading historical biographies'', ''Storytelling at community events'',
    ''Knitting and crocheting'', ''Walking tours of historic neighborhoods'', ''Volunteering at local food banks'', ''Mardi Gras parade participation'']'
  career_goals: Although she is currently not employed, Selita aims to channel her curiosity and practicality into expanded community leadership. She plans to volunteer as a cultural ambassador for local
    heritage festivals, teaching Creole cooking classes at the community center and documenting oral histories of longtime residents. Selita also hopes to mentor younger women exploring entrepreneurship
    in food and crafts, and to develop a small educational podcast series that highlights the stories of New Orleans’ African‑American neighborhoods. Ultimately, she envisions preserving and sharing the
    city’s traditions while fostering intergenerational connections.
