personas:
  professional: An aspiring sustainability consultant, Lillian Yilmaz leverages their environmental studies research, data‑analysis and project‑planning skills to design data‑driven climate‑action strategies
    for Hudson Valley nonprofits, while their practical curiosity and calm competitiveness keep their proposals both innovative and grounded.
  sports: A trail‑hiking enthusiast, Lillian Yilmaz regularly explores the Hudson Valley’s network of footpaths, is a member of the Hudson Valley Trail Runners club, roots for the New York Mets, and occasionally
    joins casual soccer games with friends, and they treat fitness as both competition and connection to nature.
  arts: A folk‑inspired musician and photographer, Lillian Yilmaz writes original acoustic songs influenced by 'Sufjan Stevens' and 'Sezen Aksu', captures sunrise over the Hudson in Ansel Adams‑style monochrome,
    and they frequent exhibitions at Dia:Beacon featuring contemporary artists like Kehinde Wiley.
  travel: A purposeful wanderer, Lillian Yilmaz spends weekend trips exploring the Catskills, plans a spring pilgrimage to Cappadocia for its rock‑formed landscapes, dreams of a summer stint in Dublin’s
    literary cafés, and they always book eco‑friendly accommodations that support local economies.
  culinary: A seasonal‑ingredients chef, Lillian Yilmaz fuses Turkish and Irish flavors by preparing dishes such as lamb stew with colcannon spiced with sumac, hand‑rolled borek stuffed with kale and feta,
    and sourcing heirloom vegetables from the community garden, while they hone their sourdough starter skills.
  core: An environmentally driven, competitively curious 20‑year‑old, Lillian Yilmaz blends pragmatic research with artistic expression, remains calmly resilient, and they pursue sustainable impact through
    disciplined budgeting and strategic health habits.
background:
  cultural: 'Lillian identifies as white and is a second‑generation American with a mixed heritage: her father’s family emigrated from Turkey and her mother’s roots are Irish‑American. Raised in Rhinebeck,
    NY, she grew up amid the town’s historic Dutch‑settler legacy, vibrant arts scene, and close‑knit farming community. Her household blends cultural traditions—celebrating Turkish Republic Day and cooking
    Turkish dishes alongside Irish folk music and American holidays. The Hudson Valley’s emphasis on environmental stewardship and community involvement has shaped her progressive outlook, while the region’s
    pragmatic, self‑reliant ethos reinforces her practical, resilient personality.'
