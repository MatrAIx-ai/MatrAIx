  hobbies: '[''hiking'', ''nature photography'', ''sustainable cooking'', ''reading nonfiction'', ''meditation'', ''acoustic guitar'', ''community gardening'', ''local art exhibitions'', ''strategic board
    games'', ''learning Turkish'']'
  career_goals: Lillian aims to complete a Bachelor of Science in Environmental Studies with a focus on sustainable business practices. She aspires to work as a sustainability consultant or program manager
    for a nonprofit that advances climate‑action initiatives in the Hudson Valley. Long‑term, she hopes to launch a social‑enterprise that supports local farms through farm‑to‑table distribution networks
    and education on regenerative agriculture. She plans to deepen her expertise in environmental policy, grant writing, and interdisciplinary team leadership, leveraging her analytical and organizational
    strengths to drive measurable impact.
