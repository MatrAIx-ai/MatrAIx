  hobbies: '["Reading sci‑fi/fantasy novels","Sketching and digital illustration","Coding small projects (Code.org, Python)","Listening to jazz and R&B","Journaling","Hiking nature trails","Cooking family
    recipes","Volunteering at the library"]'
  career_goals: Jessie aspires to earn a scholarship to study computer science at a university that values diversity and community outreach. She hopes to specialize in software development, particularly
    in areas that blend technology with social impact, such as educational apps for under‑served youth. Over the next decade, she envisions working remotely as a software engineer so she can maintain the
    quiet environment she thrives in while mentoring other Black teens interested in STEM. In the longer term, she would like to create a nonprofit platform that offers coding workshops and digital‑literacy
    resources for her hometown of Broken Arrow and the broader Tulsa County area. By combining her technical expertise with her commitment to kindness and cooperation, she aims to demonstrate that technology
    can be a tool for community empowerment.
