personas:
  professional: Jessie Harris, an aspiring teen coder, merges curiosity with practicality by building Python scripts and Code.org mini‑games, applying meticulous organization to project planning while leaving
    room for creative improvisation, which makes them a reliable yet innovative member of their school's technology club.
  sports: Jessie Harris, a member of the local Trail Seekers hiking club, spends weekends traversing the Ridgeview Trail and cheering for the Springfield Sluggers baseball team, while preferring solitary
    jogs over organized team sports, which aligns with their love for quiet, reflective activity.
  arts: Jessie Harris cultivates artistic expression through figure drawing in a sketchbook, digital illustrations on a tablet, and listening to jazz legend Kamasi Washington, R&B icon Erykah Badu, and
    instrumental composer Ludovico Einaudi while journaling, weaving these influences into a personal aesthetic inspired by sci‑fi and fantasy literature.
  travel: Jessie Harris dreams of exploring national parks like the Great Smoky Mountains and cultural hubs such as Kyoto’s cherry blossom avenues, meticulously planning trips with budget spreadsheets and
    prioritizing nature hikes over crowded festivals, yet their limited school schedule and allowance shape a cautious, low‑key travel style.
  culinary: Jessie Harris enjoys cooking family staples like collard greens and sweet potato pie, experiments with spicy ramen and quinoa bowls, and demonstrates moderate kitchen confidence by mastering
    cinnamon roll frosting, all while savoring the aroma of fresh basil and ground cumin in their culinary experiments.
  core: Jessie Harris is an introspective teen who blends disciplined curiosity with quiet creativity, juggling code, art, and nature while occasionally succumbing to late‑night reading marathons and impulsive
    art‑supply splurges.
background:
  cultural: Jessie is an African‑American teenager whose family roots trace back to the Great Migration, with grandparents who settled in Oklahoma after moving from Arkansas and Mississippi. Growing up
    in Broken Arrow, she is aware of Tulsa’s rich Black heritage, including the history of the Greenwood District and the legacy of the 1921 race massacre, topics that are discussed during school’s Black
    History Month programs and family conversations. Her household celebrates cultural traditions such as Juneteenth, listening to gospel music on Sundays, and cooking Southern comfort foods that have been
    passed down through generations. At church and community events, she has observed the importance of mutual support and education, which fuels her desire to give back to her community. While she embraces
    the broader American culture of the Midwest, she also maintains a strong connection to the narratives and values of the Black community that shape her identity and outlook.
