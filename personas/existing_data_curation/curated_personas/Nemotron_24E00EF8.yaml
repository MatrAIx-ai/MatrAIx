  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading mystery novels'', ''Volunteering for digital literacy'', ''Walking her dog'', ''Puzzling (sudoku, crosswords)'']'
  career_goals: She aspires to transition into a senior security architect role within a healthcare organization, guiding strategic security initiatives and mentoring junior analysts, especially women and
    Latinx professionals. Over the next five years she plans to earn CISSP and CISM certifications, lead a cross‑functional security program, and eventually aim for a CISO position that balances technical
    rigor with organizational harmony.
