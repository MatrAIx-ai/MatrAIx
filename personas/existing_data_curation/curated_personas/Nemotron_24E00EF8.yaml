personas:
  professional: Elizabeth Camejo, a network security specialist with a keen analytical mindset, leverages their practical risk management expertise and disciplined documentation to design robust security
    solutions, while their compassionate nature fuels mentorship of junior analysts—especially women and underrepresented professionals—as they pursue a senior security architect role in healthcare and
    ultimately a CISO position.
  sports: Elizabeth Camejo enjoys walking their border collie through Dallas’s Klyde Warren Park and White Rock Lake, participates in the local 5K “Run for Safety” charity race, follows the Dallas Cowboys
    (NFL) and Dallas Mavericks (NBA) avidly, and practices yoga twice a week to balance their desk‑bound security role.
  arts: Elizabeth Camejo immerses themselves in contemporary mystery novels by Tana French and Gillian Flynn, tunes into the soulful melodies of Joni Mitchell, appreciates the striking cinematography of
    Denis Villeneuve, and attends occasional Dallas Museum of Art exhibitions featuring modernist works.
  travel: Elizabeth Camejo prefers well‑planned road trips to nearby nature retreats like Big Bend National Park and the Texas Hill Country wine region, enjoys occasional international escapes to Lisbon
    for its historic neighborhoods and pastry shops, but balances travel with family responsibilities and a mid‑life budget.
  culinary: Elizabeth Camejo, an adept home chef, delights in preparing traditional Mexican dishes such as chicken pozole, pork carnitas, and homemade salsa verde using garden‑grown tomatoes, chilies, and
    cilantro, while also experimenting with farm‑to‑table salads and mastering the art of slow‑cooked mole sauce.
  core: Elizabeth Camejo blends a meticulous security mind with a love for solitary gardening, mystery reading, and compassionate mentorship, constantly battling a worry‑prone streak while finding calm
    in quiet routines.
background:
  cultural: Elizabeth grew up in a bicultural Mexican‑American household where Spanish and English were spoken interchangeably. Family traditions such as Día de los Muertos altars, Sunday tamale gatherings,
    and strong familial reciprocity shaped her values of respeto and familismo. Living in Dallas' vibrant Mexican community, she participates in local cultural festivals, supports Mexican‑owned businesses,
    and maintains close ties with extended family across the border, integrating these cultural ties into her collaborative and compassionate professional approach.
attributes:
  skills: '[''Network Security'', ''Vulnerability Assessment'', ''Threat Modeling'', ''Incident Response'', ''Security Information and Event Management (SIEM)'', ''Risk Assessment'', ''Regulatory Compliance
