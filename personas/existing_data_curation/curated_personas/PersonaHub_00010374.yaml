persona_description: A researcher at the National Renewable Energy Laboratory in Golden, Colorado who is working on developing a software tool, Simulator for Wind Farm Applications (SOWFA), to improve the
  efficiency of wind turbines and wind plants. The researcher is counting on SOWFA to provide the necessary additional boost in efficiency to achieve cost parity with fossil fuels and push wind energy into
  the mainstream. The researcher is using supercomputers to carry out extensive simulations and analyzing the complex models to arrive at the most accurate forecasts of wind energy production before the
  turbines are erected. The researcher is interested in the insight provided by the software to guide where wind farms are sited and where the individual turbines are positioned, and to control the individual
  turbines to reduce wake fatigue and maximize plant-wide output. The researcher is dedicated to advancing wind energy technology and improving its efficiency.
