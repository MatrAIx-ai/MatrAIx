  career_goals: Lorraine aims to advance into a senior data‑science or research‑lead role where she can spearhead interdisciplinary projects that fuse mathematics with visual arts, such as data‑driven installations
    and interactive exhibitions. She plans to pursue a master's degree in data science or applied mathematics to deepen her expertise and to publish research that explores the mathematical underpinnings
    of perception and aesthetics. Mentoring and advocating for women and under‑represented groups in STEM is a core ambition, and she hopes to develop community workshops that teach mathematical concepts
    through creative media. Ultimately, she seeks a balance between innovative, flexible work and her personal life, allowing her to continue exploring new ideas while maintaining a supportive family environment.
