persona_description: A TEDx speaker who has dedicated his life to protecting and preserving the rainforest, particularly in the Amazonian region. He has worked with indigenous communities to form associations
  and protect their rainforest, and has implemented a model called Cool Earth that offers an alternative to selling trees for short-term cash. He has run a childcare charity, managed a research group, and
  spent 15 years in investment banking. He is passionate about the importance of protecting the rainforest and its inhabitants, and has worked tirelessly to raise awareness about the issue.
