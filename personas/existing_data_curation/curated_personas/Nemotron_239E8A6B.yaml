  career_goals: As he approaches the end of his active service, Merwin aims to earn a promotion to lieutenant, where he can shape department policy to emphasize community‑centered policing and officer wellness.
    He also hopes to establish a mentorship program for new recruits, create a neighborhood watch partnership in Boonville, and eventually transition to a civilian role as a consultant or trainer for regional
    law‑enforcement agencies. Retirement plans include volunteering as a reserve officer and serving on the local public‑safety advisory board, ensuring his decades of experience continue to benefit the
    community.
