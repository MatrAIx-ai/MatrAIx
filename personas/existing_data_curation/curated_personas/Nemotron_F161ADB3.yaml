    Techniques'', ''Conflict Resolution'', ''Case Management'', ''Mentorship for Young Counselors'', ''Bilingual Counseling (English and Hindi/Gujarati)'']'
  hobbies: '[''Reading classic South Asian literature (e.g., Tagore, Rumi)'', ''Gardening (herb and flower beds)'', ''Cooking traditional Indian dishes'', ''Attending small gatherings at the local temple'',
    ''Walking in local parks'', ''Mindfulness meditation'', ''Knitting and crocheting'', ''Solving crosswords and jigsaw puzzles'', ''Volunteer mentoring at senior centers'']'
  career_goals: Although approaching retirement, Priyanka remains driven to leave a lasting impact. She aims to establish a structured, culturally tailored support program for widowed and senior South Asian
    adults in Fair Lawn, ensuring that the program can operate sustainably beyond her involvement. She also seeks to mentor a new generation of counselors, offering regular supervision sessions and developing
    a handbook on culturally competent grief counseling. Over the next few years, Priyanka hopes to collaborate with local temples and senior centers to expand mental-health awareness workshops, and to
    publish a reflective guide that blends her counseling expertise with traditional Indian concepts of resilience and harmony.
