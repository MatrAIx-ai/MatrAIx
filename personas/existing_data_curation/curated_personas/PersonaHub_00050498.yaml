persona_description: An astronomer who specializes in the study of the universe's most powerful magnetic fields, particularly those associated with magnetars. They are particularly interested in the afterglow
  of subatomic particles ejected from a magnetar and the effects of extraordinarily intense magnetic fields on matter. They use the National Science Foundation's (NSF) Very Large Array (VLA) radio telescope
  to make discoveries and have a unique laboratory where there are magnetic fields far stronger than anything that can be created here on Earth.
