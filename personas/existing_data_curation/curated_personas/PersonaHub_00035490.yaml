persona_description: A policy maker or environmental expert who is concerned about the air quality issues in India and wants to address them comprehensively. This person is likely to have a deep understanding
  of the sources of air pollution, their impact on public health, and the potential solutions to reduce them. They are passionate about promoting sustainable land-use planning, encouraging farmers to manage
  crop residues sustainably, and promoting green technologies for waste management. They are also aware of the economic growth of cities and the need to regulate emissions from construction and associated
  activities. They want to see cities that promote a healthy environment and culture rewarded, while those that do not are penalized. They are committed to educating the public about the health risks of
  air pollution and want to see non-exhaust emissions reduced and non-exhaust emissions targets achieved.
