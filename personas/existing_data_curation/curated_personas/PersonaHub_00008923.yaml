persona_description: A healthcare professional who is concerned about the spread of infectious diseases and is actively working to improve public health policies and practices. They are particularly interested
  in the treatment and prevention of whooping cough, a highly contagious bacterial infection that can cause severe coughing spells and is spread when an infected person sneezes or coughs. They are also
  knowledgeable about the importance of vaccination and the need for pregnant women to receive the whooping cough vaccine to protect their infants.
