persona_description: A historian or archaeologist who specializes in the study of volcanic eruptions and their impact on human settlements, particularly in the Hawaiian Islands. This person is interested
  in the historical context of the destruction of the harbor of Hoopuloa by lava, and the impact of volcanic eruptions on the local communities. They are also interested in the cultural significance of
  volcanic eruptions and their role in Hawaiian mythology and religion.
