personas:
  professional: Roberto Aragon is a budding digital artist and robotics enthusiast who channels their curiosity and methodical nature into intricate character sketches and precise robot prototypes, often
    competing in school contests with a competitive yet organized edge.
  sports: Roberto Aragon sneakers up for after‑school soccer with the Longview Youth Soccer Club, cheers for the Dallas Cowboys and the Texas Rangers, and follows a disciplined routine of weekend bike rides
    and trail hikes with the Gregg County Nature Explorers, as they balance competitive spirit with methodical training.
  arts: Roberto Aragon spends evenings sketching vibrant characters inspired by Frida Kahlo’s bold palette and comic artist Adrian Alphona, mixes digital brushwork with traditional papel picado for Día
    de los Muertos altars, and fills their playlists with Mariachi Vargas de Tecalitlán, Ranchera legend Vicente Fernández, and contemporary Tex‑Mex band Los Lonely Boys, letting these influences shape
    their creative identity.
  travel: Roberto Aragon follows a meticulously planned itinerary when family road‑trips take them to the historic River Walk in San Antonio, the sprawling dunes of Big Bend National Park, and weekend visits
    to grandparents in Laredo, while dreaming of a future adventure to the ancient ruins of Teotihuacan and the coral beaches of Cancún, balancing budget constraints with a love for both nature and cultural
    exploration.
  culinary: Roberto Aragon eagerly helps craft hand‑made tamales with masa, pork, and ancho chilies for Día de los Muertos, relishes the smoky tang of Texas brisket topped with cumin and cilantro, and proudly
    perfects a simple guacamole using ripe Hass avocados, lime juice, and jalapeños, showcasing a growing skill set that blends traditional authentic flavors with Tex‑Mex barbecue flair as they experiment
    in the kitchen.
  core: Roberto Aragon is a curious, methodical 11‑year‑old who blends art, tech, and tradition, juggling competitive passions with a streak of worry that fuels meticulous planning and occasional over‑thinking,
    as they navigate school and hobbies.
background:
  cultural: Roberto comes from a Mexican‑American family that maintains strong ties to its roots in central Mexico, speaking Spanish at home and celebrating traditions such as Día de los Muertos, quinceañeras,
    and Mexican Independence Day. Living in Longview, TX, he balances this heritage with the cultural influences of the Southern United States, participating in local Hispanic community events and incorporating
    Texan customs like barbecue gatherings. His bilingual upbringing and exposure to both Mexican and Texan festivals enrich his artistic perspective, prompting him to blend vibrant Mexican motifs with
    contemporary American styles in his creations.
