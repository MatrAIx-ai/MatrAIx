  career_goals: Roberto aspires to combine his love for art and technology by becoming a video game designer or an animator who creates culturally rich stories. He aims to win regional coding and art competitions,
    earn a scholarship for a specialized high‑school arts and STEM program, and eventually develop games that celebrate Mexican heritage while promoting creativity and critical thinking among young players.
