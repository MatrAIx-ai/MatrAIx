  career_goals: Brenda aims to transition into a senior leadership role where she can steer large‑scale, community‑focused infrastructure projects that prioritize sustainability, equity, and aesthetic value.
    She plans to complete her professional engineering (PE) licensure and finish her bachelor's degree to deepen her technical credentials. Long‑term, she envisions establishing a mentorship program for
    underrepresented youth in STEM, advocating for inclusive design policies on the city planning board, and creating a signature series of public‑art‑enhanced streetscapes that reflect Rocky Mount’s cultural
    heritage while embracing innovative engineering solutions.
