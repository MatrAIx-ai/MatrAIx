personas:
  professional: Brenda Amadasun, a 52‑year‑old civil engineer with 25 years of structural design experience, blends rigorous technical mastery in AutoCAD, Revit, GIS, and sustainable infrastructure with
    a compassionate, community‑focused leadership style, meticulously planning large‑scale projects while mentoring emerging women engineers and wrestling with the anxiety of meeting ambitious equity goals.
  sports: Brenda Amadasun, an avid hiker, joins the local Appalachian Trail Club for weekend treks, practices yoga thrice weekly, and roots for the Carolina Panthers, attending occasional games when her
    schedule permits, while preferring low‑impact cardio over high‑intensity gym routines.
  arts: Brenda Amadasun spends evenings painting abstract canvases inspired by the color palettes of Kehinde Wiley, attends quarterly exhibitions at the local contemporary art museum featuring works by
    Amy Sherald, and regularly watches productions by the Players' Guild, where she admires the performances of Viola Davis in touring shows, allowing her to blend engineering precision with artistic inspiration.
  travel: Brenda Amadasun prefers thoughtfully planned trips that blend cultural immersion with moderate adventure, having recently explored the historic districts of Savannah and the coastal trails of
    the Outer Banks, while aspiring to trek the volcanic landscapes of Iceland and revisit the vibrant markets of Port of Spain, all while balancing project deadlines and a modest travel budget.
  culinary: Brenda Amadasun’s kitchen is a hybrid of Southern comfort and Caribbean flair, where she routinely masters shrimp and grits, slow‑cooked oxtail stew, and aromatic jerk chicken seasoned with
    scotch bonnet peppers, while her favorite garnish remains fresh thyme harvested from her garden, though she often over‑spices dishes when experimenting with new fusion recipes.
  core: Brenda Amadasun is a methodical engineer who channels her curiosity for art into community‑focused designs, balances disciplined budgeting with occasional splurges on garden tools, and combats chronic
    worry with yoga, yet still loses track of time sketching in the midday sun.
background:
  cultural: Brenda is an African‑American professional whose family has deep roots in the Upper South, enriched by cultural ties that trace back to the Caribbean through the Amadasun lineage. Raised in
    a close‑knit church community in North Carolina, she values collective support, storytelling, and celebration of traditions such as Juneteenth gatherings and gospel music. These cultural influences
    shape her work ethic, emphasizing perseverance, collaboration, and a commitment to equity. They also inspire her to incorporate African‑American artistic motifs into public‑space designs, ensuring that
    her engineering projects reflect the diverse narratives of the communities they serve.
attributes:
