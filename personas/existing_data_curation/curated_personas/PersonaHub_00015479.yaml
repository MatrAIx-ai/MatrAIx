persona_description: A researcher at Wageningen University in the Netherlands and elsewhere who specializes in the study of plant viruses, arboviruses, and insect viruses, with a focus on understanding
  molecular and ecological mechanisms underlying virus-host and virus-vector interactions. Their work aims to contribute to the development of new technologies and durable strategies for disease management,
  including in vector control and biotechnology, and in the development of vaccines and insect biocontrol. Their research has the potential to fundamentally change how, and how quickly, vaccines can be
  developed in response to new public health threats.
