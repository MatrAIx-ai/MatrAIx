  career_goals: Jettie's short‑term ambition is to maintain high grades and earn a place in her high school’s health‑science magnet program, where she can explore anatomy and first‑aid training. She plans
    to volunteer at the local children’s hospital to gain hands‑on experience and earn a CPR certification by age sixteen. In the longer term, she envisions a career as a registered pediatric nurse, drawn
    by her desire to care for children and her methodical nature that suits the demands of medical practice. She also hopes to combine her organizational talent with community health by eventually coordinating
    health‑education workshops for youth in Tacoma.
