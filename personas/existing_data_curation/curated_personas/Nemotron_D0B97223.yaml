personas:
  professional: Jettie Rogers, an aspiring robotics enthusiast, blends basic coding skills with methodical planning to design functional mechanisms for her school’s robotics club, where her curiosity and
    practicality drive meticulous documentation and reliable teamwork.
  sports: Jettie Rogers, an avid hiker on the Pacific Northwest’s lush Tacoma trails and a member of the Tacoma Outdoor Adventure Club, balances casual cross‑country runs at school with cheering for the
    Seattle Seahawks, Seattle Mariners, and Seattle Sounders FC during weekend games.
  arts: Jettie Rogers, a budding digital illustrator who contributes whimsical artwork to the school newspaper, spends evenings drawing inspirations from Hayao Miyazaki’s animation and Neil Gaiman’s storytelling
    while playing piano pieces by Ludovico Einaudi to unwind.
  travel: Jettie Rogers, who dreams of backpacking through Olympic National Park after weekend trips to Seattle and Portland, carefully maps each outing on a paper planner and hopes to someday explore Kyoto’s
    historic temples on a family‑funded cultural exchange.
  culinary: Jettie Rogers, a beginner cook who loves experimenting with homemade ramen broth flavored with miso, ginger, and soy sauce, also enjoys making simple margherita pizza topped with fresh basil
    and mozzarella, and bakes chocolate chip cookies using oat flour on rainy afternoons.
  core: Jettie Rogers, a meticulous daydreamer, balances a love for sci‑fi worlds with an anxious need to over‑organize schedules, often scribbling to‑do lists on sticky notes while forgetting to drink
    enough water.
background:
  cultural: Jettie comes from a family of German‑Irish ancestry that settled in the Pacific Northwest generations ago. Growing up in Tacoma, she has been shaped by the region’s outdoor culture, where weekend
    hikes, bike rides, and a community focus on environmental stewardship are commonplace. Her parents emphasize the importance of education, modesty, and civic responsibility, values reflected in her involvement
    with local volunteer groups. The diverse cultural fabric of Pierce County, including acknowledgment of local Coast Salish indigenous heritage, has fostered in her an appreciation for multicultural perspectives
    and a respect for the land. School curricula and community events often highlight sustainability, indigenous art, and collaborative projects, further influencing her worldview.
