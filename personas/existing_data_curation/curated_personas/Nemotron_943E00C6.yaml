  hobbies: '[''Reading mystery and sci‑fi novels'', ''Sketching landscapes'', ''Listening to indie folk music'', ''Bike riding along the Elizabeth River'', ''Shell collecting'', ''Wildlife photography'',
    ''Book club participation'', ''Volunteer tutoring'', ''Community gardening'']'
  career_goals: Caitlin aspires to combine her curiosity about science with her strong desire to help others. She aims to study environmental science or public health in college, with the long‑term goal
    of becoming a community health worker or environmental educator who designs programs to improve local water quality and promote healthy lifestyles in Newport News. In the near future she plans to increase
    her volunteer involvement with local NGOs, earn a scholarship for a STEM‑focused high school, and develop leadership skills through small‑group projects.
