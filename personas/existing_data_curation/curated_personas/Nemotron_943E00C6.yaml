personas:
  professional: Caitlin Hawkins, a 15‑year‑old sophomore with a budding fascination for marine ecology, channels curiosity into science fairs and local wildlife photography while balancing practical schoolwork
    and sketching coastal landscapes, and their compassionate nature drives them to volunteer at the community garden and mentor younger peers in science clubs.
  sports: Caitlin Hawkins, an avid cyclist who rides the Elizabeth River trail every weekend and occasionally participates in the local youth rowing program, cheers for the Norfolk Tides baseball team,
    and enjoys casual pick‑up basketball at the community center, preferring low‑key fitness over competitive sports.
  arts: Caitlin Hawkins, a solitary sketcher of river landscapes who devours mystery novels by Gillian Flynn and sci‑fi epics by Neal Stephenson, and immerses in indie folk playlists featuring Sufjan Stevens
    and Phoebe Bridgers, often shares their drawings at the book club and volunteers to tutor younger kids in creative writing.
  travel: Caitlin Hawkins, who loves spontaneous weekend trips to the Chesapeake Bay’s hidden inlets, plans low‑budget getaways to Washington D.C.’s museums and dreams of backpacking through the Scottish
    Highlands, balancing a love for nature with limited family resources and school responsibilities.
  culinary: Caitlin Hawkins, a modest home‑cook who enjoys preparing crab cakes with fresh Chesapeake Bay crabs, buttery Virginia ham sandwiches, and occasional shrimp chowder, experiments with simple herb
    rubs and loves the tang of lemon zest but often forgets to clean the kitchen promptly after cooking.
  core: Caitlin Hawkins, a nature‑loving, curious teen who sketches solitary scenes, volunteers compassionately, but wrestles with disorganized habits and a tendency to procrastinate on chores.
background:
  cultural: Caitlin comes from a middle‑class white family in Newport News, Virginia, with deep ties to the Hampton Roads region. Her upbringing includes attending a public middle school, involvement in
    a local church youth group, and family traditions such as summer trips to the Chesapeake Bay, celebrating holidays with regional foods like Virginia ham and crab cakes, and attending community festivals.
    She identifies with the coastal Southern culture of the area, valuing community connections, modesty, respect for nature, and a pragmatic approach to everyday life.
