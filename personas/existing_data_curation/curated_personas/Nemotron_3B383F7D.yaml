  career_goals: Ramona aims to become a certified green‑cleaning specialist and use that credential to launch a boutique eco‑friendly cleaning service that caters to environmentally conscious households
    in Murrieta. She plans to complete a short‑term certification program in sustainable housekeeping and, in the next two years, transition from full‑time employee to a part‑time consultant who trains
    other cleaners in green practices. Long‑term, she hopes to supervise a small team, mentor younger workers, and secure a comfortable retirement by building a modest client base that provides steady supplemental
    income.
