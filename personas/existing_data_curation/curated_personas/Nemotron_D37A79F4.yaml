personas:
  professional: Jose Pena, a 32‑year‑old engineering technologist, combines his CAD and PLC expertise with a methodical approach to preventive maintenance, using his natural compassion to mentor junior
    technicians while steering projects toward reliable, safety‑compliant outcomes.
  sports: Jose Pena, an avid soccer enthusiast, follows both a hometown Latin American club and the MLS’s Houston Dynamo, joins weekly pickup games at Memorial Park, and proudly wears jerseys of his favorite
    players while also cheering for the Dallas Mavericks during basketball season.
  arts: Jose Pena finds creative respite in the rhythm of classic salsa, the poetry of spoken‑word artist Lin‑Manuel Miranda, and the vibrant murals of local street artists, often attending Houston’s Bayou
    City Art Festival and streaming films by Alfonso Cuarón to stay connected to a broad artistic palette.
  travel: Jose Pena prefers well‑planned weekend getaways, exploring culinary hotspots like New Orleans and the coffee farms of Colombia, while budgeting for a long‑term dream trip to Patagonia’s glaciers,
    balancing his love of adventure with a practical eye on savings.
  culinary: Jose Pena, an intermediate home chef, perfects pupusas and tamales passed down through family tradition, experiments with fusion dishes like kimchi‑topped tacos, and frequently samples Houston’s
    famed brisket and fresh pho, all while sourcing fresh masa and quality cheese from local markets.
  core: Jose Pena is a meticulous, compassion‑driven technologist who channels his structured mindset into community STEM mentorship, combats stress with yoga, and balances disciplined savings with an occasional
    splurge on robotics, all while staying rooted in his culinary heritage.
background:
  cultural: Jose grew up in a bilingual household in Houston, the son of Salvadoran immigrants who settled in the city’s vibrant Hispanic community. He retains strong ties to Salvadoran customs, celebrating
    holidays such as Día de los Farolitos and Semana Santa, and speaking Spanish fluently at home. The Salvadoran emphasis on family, community support, and hard work has shaped his compassionate and cooperative
    nature. Living in the multicultural environment of Harris County, he has absorbed Texan hospitality and a respect for diversity, which is reflected in his ability to navigate both Latino and mainstream
    American social circles. His cultural identity influences his values of loyalty, humility, and service, guiding his personal and professional interactions.
attributes:
  skills: '[''CAD (SolidWorks, AutoCAD)'', ''PLC programming (Allen‑Bradley, Siemens)'', ''Mechanical and electrical troubleshooting'', ''Preventive maintenance'', ''Root‑cause analysis'', ''Technical documentation'',
    ''Quality control & inspection'', ''OSHA safety compliance'', ''Data acquisition and analysis'', ''Process optimization'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Robotics hobby projects'', ''Soccer (playing and watching)'', ''Cooking Salvadoran cuisine'', ''Yoga and mindfulness meditation'', ''Exploring Houston food scene'', ''Attending cultural festivals'',
    ''Volunteering in STEM outreach for youth'']'
  career_goals: Jose aims to earn the Certified Engineering Technician (CET) credential within the next year and eventually transition to a senior technologist role where he can lead small project teams.
    He is interested in specializing in renewable energy systems, particularly solar panel installation and maintenance, to contribute to sustainable development in Texas. Over the next five years, he hopes
    to complete a master’s degree in engineering management, which will enable him to move into project‑manager positions. He also wants to mentor junior technicians and volunteer in local STEM outreach
    programs for Hispanic youth, combining his technical expertise with his compassionate desire to help others succeed.
