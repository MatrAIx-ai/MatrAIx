  career_goals: Approaching retirement, Jeanna aims to cement her legacy within the county fire safety community. She plans to develop a county-wide fire prevention curriculum tailored to the unique challenges
    of rural and historic properties, and to publish a concise guidebook on protecting historic homes from fire. She also seeks election to the Burleson County Fire Commission, where she can influence policy
    and advocate for modern fire detection technologies such as IoT-enabled smoke sensors. Mentoring remains a priority; Jeanna intends to formalize a mentorship program for new inspectors, ensuring rigorous
    standards are upheld. In the longer term, she envisions transitioning to a part-time consultant role, providing expert reviews for large agricultural projects and assisting neighboring counties in improving
    their fire safety programs.
