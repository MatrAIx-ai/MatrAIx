personas:
  professional: Jeanna Thorne, a veteran fire inspector in Burleson County with three decades of expertise in Texas fire safety codes, leverages their methodical, detail‑oriented mindset to produce meticulous
    risk‑assessment reports, mentor junior inspectors through hands‑on workshops, and champion a county‑wide fire‑prevention curriculum that balances strict compliance with practical solutions for historic
    and rural properties.
  sports: Jeanna Thorne, a low‑impact fitness enthusiast, spends sunrise walks along Hill Country trails bird‑watching, participates in the local "Hill Country Strollers" walking club, avidly follows the
    Dallas Cowboys and Texas Rangers, and enjoys occasional friendly competition in senior center chess tournaments as a mental workout.
  arts: Jeanna Thorne, an avid watercolorist who captures the rolling vistas of the Texas Hill Country and historic adobe structures, draws inspiration from Georgia O'Keeffe’s palette and Andrew Wyeth’s
    attention to detail, frequently visits the Texas Heritage Museum to study regional art history, and channels their creativity into hand‑stitched quilts featuring traditional appliqué patterns learned
    from community quilting circles.
  travel: Jeanna Thorne, a deliberate traveler who prefers curated road trips to historically rich locales such as Fredericksburg’s German heritage sites, the antebellum town of Nacogdoches, and a weekend
    pilgrimage to Charleston, South Carolina, plans each itinerary with detailed maps and modest budgeting, yet dreams of an overseas tour of European heritage towns like Bruges and Siena.
  culinary: Jeanna Thorne, a Southern‑comfort food aficionado who perfects chicken fried steak, collard greens simmered with smoked ham hocks, and peach cobbler infused with basil from their garden, balances
    traditional recipes with experimental twists like adding native Texas prickly pear glaze, and relishes the ritual of hand‑crafting biscuits on Saturday mornings.
  core: Jeanna Thorne blends a fire‑inspector’s precision with an artist’s curiosity, navigating retirement, finances, and health with methodical care, occasional skepticism, and a steady stream of watercolor
    paints, quilts, and Southern dishes.
background:
  cultural: Jeanna grew up in a modest, multigenerational farmstead near Caldwell, Texas, in a family that valued self-reliance, hard work, and community service. As a white Texan from a rural setting,
    she was raised with Southern hospitality tempered by a natural reserve, reflecting the close-knit nature of small-town life. Her upbringing emphasized practical skills over formal education; after graduating
    from the local high school, she entered the fire service and learned on the job. Church and local civic organizations have been steady fixtures in her life, shaping a sense of duty to protect her neighbors.
    While she identifies with traditional Texan values—pride in local heritage, respect for the land, and a pragmatic outlook—her lifelong curiosity has led her to seek out art, history, and new ideas beyond
    her immediate surroundings. This blend of traditional rural culture and an open-minded, inquisitive temperament informs both her professional diligence and her personal pursuits.
