persona_description: A professional from the Environmental Protection Agency (EPA) who is responsible for overseeing and implementing new and modified primary copper, zinc, and lead smelter performance
  standards. This persona is likely to be interested in the detailed analysis of various extraction processes, control systems, and emissions of sulfur oxides and particulate matter associated with the
  smelting processes. They would be responsible for evaluating the economic impact of the proposed standards, understanding the environmental and energy-consumption effects of the processes and control
  systems, and ensuring that the standards are derived from best demonstrated existing technology.
