  hobbies: '[''competitive multiplayer video gaming'', ''digital sketching and comic creation'', ''listening to and exploring various music genres'', ''freestyle rap and beatboxing'', ''skateboarding'',
    ''cycling'', ''organizing pickup basketball games'', ''attending local live music shows'', ''reading graphic novels'', ''DIY bike and skateboard modifications'']'
  career_goals: His immediate goal is to earn a GED and enroll in a community‑college program focused on media production or graphic design, so he can merge his love for visual art and storytelling. In
    the longer term, Dennis aspires to become a digital content creator—producing comedy sketches, music videos, and live streams that showcase his improvisational talent and gaming expertise. He also dreams
    of launching a youth‑focused event brand that hosts local concerts, pop‑up art showcases, and gaming tournaments, leveraging his sociable nature and competitive drive to build a vibrant community hub.
