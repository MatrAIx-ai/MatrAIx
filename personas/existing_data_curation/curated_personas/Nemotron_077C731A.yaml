  career_goals: Andres aims to become the top‑selling service representative in the El Paso region within the next two years, surpassing the 90th percentile of sales performance and securing the company's
    Senior Sales Mentor designation. He plans to transition that expertise into a part‑time consulting role that assists small businesses with telecommunications contracts, leveraging his bilingual abilities
    to serve cross‑border clients. Long‑term, he aspires to launch a modest brokerage focused on bilingual service offerings, creating a passive‑income stream that supports a financially secure retirement
    while also providing health‑care stability. Throughout these ambitions, he remains focused on building trustworthy professional relationships to counteract his natural skepticism.
