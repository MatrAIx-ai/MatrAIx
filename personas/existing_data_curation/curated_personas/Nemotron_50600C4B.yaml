  career_goals: Tri aims to advance to a senior engineering role where she can lead a small, cross‑functional team that values collaboration and psychological safety. She aspires to shape products that
    improve educational outcomes for underserved communities, leveraging her technical expertise to build accessible learning platforms. Over the next five years she plans to acquire an AWS Solutions Architect
    certification and deepen her knowledge of AI‑driven personalization. Ultimately, she hopes to launch a nonprofit tech initiative that offers free coding workshops to local high‑school students, combining
    her professional growth with her strong desire to help others.
