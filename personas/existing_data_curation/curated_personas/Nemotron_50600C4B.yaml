personas:
  professional: Tri Ho is a full‑stack software developer who crafts test‑driven Python, Java, and TypeScript applications, orchestrates Docker‑based deployments on AWS, and channels their methodical, compassionate
    nature into meticulous code reviews and mentorship that foster psychological safety despite an ever‑present undercurrent of worry.
  sports: Tri Ho is a weekend hiker who explores Nichols Arboretum trails, occasionally joins a local adult soccer league with the Ann Arbor Strikers, supports the Detroit Lions and Detroit Pistons, uses
    a structured weekly yoga routine to complement cardio, and prefers small‑group activities over large gym crowds.
  arts: Tri Ho is an avid reader of contemporary fiction and mindfulness non‑fiction, participates in a close‑knit board‑game circle that often plays Catan and Azul, and finds artistic inspiration in the
    music of indie singer Mitski, the photography of Nan Goldin, and the films of director Bong Joon‑ho.
  travel: Tri Ho is a meticulous planner who prefers low‑key, culturally immersive trips such as weekend getaways to the Upper Peninsula’s Pictured Rocks, three‑day visits to Kyoto’s temples, and exploring
    Taiwan’s night markets, balancing a modest travel budget with a desire for personal growth while occasionally postponing longer trips to focus on local community commitments.
  culinary: Tri Ho is an advanced home cook who reveres traditional dishes like phở broth simmered with star anise, ginger, and lemongrass, and banh xèo crisped with rice flour and turmeric, while also
    experimenting with Michigan‑fresh rainbow trout, heirloom tomatoes, and micro‑herbs, often sourcing ingredients at local farmer’s markets to fuse seasonal harvests with family recipes.
  core: Tri Ho is a detail‑oriented coder with a quiet, compassionate streak, who balances structured work and meditation yet constantly battles a habit of over‑analyzing both code and life.
background:
  cultural: Tri Ho is a first‑generation Vietnamese‑American. Her parents immigrated to the United States in the early 1990s, and she grew up in a bilingual household in Michigan, celebrating Tet, Mid‑Autumn
    Festival, and other Vietnamese traditions. The values of family cohesion, respect for elders, and community harmony—rooted in Confucian and Vietnamese cultural norms—have shaped her compassionate and
    cooperative outlook. At the same time, her education and career in the U.S. have nurtured an independent, pragmatic mindset. This bicultural background informs her approach to teamwork, where she balances
    structured, efficient processes with a deep sensitivity to interpersonal dynamics.
