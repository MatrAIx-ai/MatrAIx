  hobbies: '[''Gardening (tropical plants)'', ''Bridge (card game)'', ''Attending cultural festivals'', ''Knitting and crocheting'', ''Walking in Liliuokalani Gardens'', ''Cooking Hawaiian dishes'', ''Volunteer
    work at senior center'', ''Documenting local oral histories'']'
  career_goals: Even at 91, Britan is determined to remain an active pillar of the Hilo community. She aims to expand the senior-center mentorship program, documenting oral histories of longtime residents
    to preserve local heritage. She also seeks to lead a quarterly garden-share initiative that pairs seasoned gardeners with newcomers. Maintaining her health and independence so she can attend weekly
    social gatherings remains a personal priority, and she hopes to receive a community service award recognizing her lifelong dedication.
