persona_description: A researcher in the field of radiation biology, particularly interested in the use of cobalt as a gamma emitter in experimental biology and cancer therapy. She has conducted extensive
  research on the effects of cobalt on the cardiovascular system and has published several papers on the subject. She is also knowledgeable about the risks associated with high levels of cobalt exposure,
  including pulmonary edema, allergy, nausea, vomiting, hemorrhage, and renal failure. She is well-versed in the proper collection and handling of specimens, as well as the use of special specimen collection
  tubes and ultraclean facilities. She is familiar with the use of mass spectrometry detection and the potential interference of gadolinium and iodine with most metals tests. She is cautious when ordering
  the test, as it should not be used to assess vitamin B12 activity.
