persona_description: A technology expert who is interested in the social aspects of new technologies, particularly in the areas of privacy, automation, and ethics of outsourcing. They are passionate about
  understanding how new technologies affect our habits, social possibilities, and values, and how they can be used to create a "technology literacy" within science, society, and policy-making. They are
  also interested in the ethical and political challenges of outsourcing and delegating human behavior and labor to machines, and how these technologies can radically reshape or reinforce our habits and
  create new social possibilities and loopholes.
