  hobbies: '[''Watercolor painting and sketching'', ''Visiting art galleries and museums'', ''Collecting vintage art prints'', ''Reading contemporary fiction'', ''Reading popular science on neuroscience'',
    ''Hiking and nature walks along the Oconee River trail'', ''Gardening'', ''Cooking Southern‑inspired meals'', ''Mindfulness meditation'', ''Listening to mental‑health and therapy podcasts'']'
  career_goals: Frances aims to deepen her expertise in mental‑health program development with a focus on integrating creative arts into treatment plans for mood and anxiety disorders. She plans to obtain
    certification as a Certified Psychiatric Technician Specialist and later move into a supervisory role where she can mentor junior staff and lead quality‑improvement projects. In the long term she hopes
    to earn a master’s degree in Clinical Mental Health Counseling to expand her clinical scope and eventually open a community‑based counseling practice that emphasizes holistic, art‑infused therapy.
