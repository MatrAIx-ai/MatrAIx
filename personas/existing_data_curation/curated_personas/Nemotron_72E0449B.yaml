personas:
  professional: Frances Luciano, a seasoned psychiatric technician in Evans, GA, blends scientific rigor with a love for visual arts to design and facilitate art‑therapy modules for patients with mood and
    anxiety disorders, while quietly navigating the chaos of a busy unit with a relaxed, flexible approach to scheduling and an ever‑growing curiosity about emerging therapeutic modalities.
  sports: Frances Luciano, a devoted weekend walker, regularly strolls the Oconee River trail for quiet reflection, participates in a local bird‑watching club that meets for early‑morning hikes, and occasionally
    catches a Braves game on TV while cheering for the Georgia Bulldogs during college football season.
  arts: Frances Luciano, an avid watercolorist and sketcher, fills evenings with delicate landscapes inspired by Georgia O'Keeffe, collects vintage prints by Romare Bearden, and finds solace at the Evans
    Arts Center while listening to The Infamous Stringdusters' bluegrass tunes.
  travel: Frances Luciano, a reflective traveler in her late forties, favors spontaneous road trips to historic Southern towns like Savannah and Asheville, plans loosely around local food festivals and
    art fairs, and dreams of a quiet retreat in the Blue Ridge Mountains where she could paint sunrise over the misty hills.
  culinary: Frances Luciano, a modest home chef, enjoys cultivating heirloom tomatoes and fresh herbs in her garden to craft Southern‑inspired dishes such as shrimp and grits, fried green tomato BLTs, and
    collard greens sautéed with garlic, while occasionally experimenting with a splash of Cajun spice in traditional recipes.
  core: Frances Luciano, a 49‑year‑old psychiatric technician, balances a quiet love for art and science with a tendency to procrastinate on obligations, a chronic worry about stress, and a deep commitment
    to community‑centered empathy.
background:
  cultural: Frances grew up in a middle‑class white family in the rural‑suburban South, where a strong sense of community, hospitality, and respect for tradition shaped her early values. Her upbringing
    introduced her to Southern folk arts such as quilting and bluegrass music, yet her parents encouraged academic curiosity, leading her to pursue a STEM degree at a state university. Relocating to Evans,
    GA, she has embraced the region’s blend of historic charm and growing cultural diversity, which informs her appreciation for varied artistic expressions and progressive mental‑health practices. While
    she maintains a private, introspective demeanor, she remains connected to her heritage through occasional participation in local food festivals and church‑based volunteer outreach.
