persona_description: A researcher and educational expert who is interested in the relationship between genetics and educational success, particularly in the context of the 1970 Birth Cohort Survey. They
  are intrigued by the findings of the study, particularly the evidence of a strong predictor of future educational success at just 22 months of age. They are also interested in the impact of social class
  on educational outcomes and the potential for children to overcome their initial ability levels. They are likely to be a professor or researcher in the field of education or psychology, and have a background
  in quantitative research methods.
