  hobbies: '[''fishing'', ''boat maintenance'', ''cooking traditional dishes'', ''playing acoustic guitar'', ''listening to norteño/tejano music'', ''reading DIY guides'', ''watching maritime documentaries'',
    ''volunteering for bay clean-ups'']'
  career_goals: He aims to translate his practical skills into a sustainable self-employment venture, such as a mobile handyman service or a small seafood stand at the Port Lavaca waterfront. To support
    this, he plans to complete a GED, enroll in a local vocational program for welding or marine mechanics, and obtain the necessary permits. He also hopes to become a certified community volunteer coordinator
    to help organize local festivals and support youth programs.
