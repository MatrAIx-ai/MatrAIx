personas:
  professional: Juan Franco, a 33‑year‑old handyman‑in‑training and maritime enthusiast, blends practical carpentry, boat‑engine repair, and bilingual communication into a budding mobile service venture
    while they balance the curiosity of new welding techniques with the reliability of a community‑first ethos.
  sports: Juan Franco enjoys weekend fishing expeditions on the Gulf, plays casual beach volleyball with friends, avidly follows the Houston Astros and the Houston Texans, and they are a member of the Port
    Lavaca Community Boating Club, balancing competitive spirit with relaxed recreation.
  arts: Juan Franco finds creative release in strumming an acoustic guitar to norteño staples like Los Tigres del Norte and Tejano classics such as Selena, they attend local folk dance nights featuring
    performances of regional storytellers, and they collect vintage vinyl records of Buddy Holly, weaving music into their social gatherings.
  travel: Juan Franco prefers road trips that blend family visits to Veracruz with spontaneous weekend getaways to Galveston’s historic pier; they plan itineraries around local seafood festivals while budgeting
    for fuel and occasional overnight stays in modest beachfront motels.
  culinary: Juan Franco’s kitchen is a hub for grilling freshly caught shrimp into tacos al pastor, preparing tangy fish ceviche with lime, cilantro, and jalapeño, and perfecting arroz con camarones, and
    they showcase moderate cooking skill and an unwavering love for bold, coastal flavors.
  core: Juan Franco is a pragmatic, community‑oriented 33‑year‑old who alternates between hands‑on boat repairs, impromptu guitar sessions, and meticulous budgeting, and they juggle an ambitious plan to
    turn their DIY talents into a sustainable waterfront venture.
background:
  cultural: Juan’s family traces its roots to Mexican immigrants who settled in coastal Texas generations ago. He grew up bilingual, celebrating traditions such as Día de los Muertos, Cinco de Mayo, and
    local Tex‑Mex festivals. The close-knit community of Port Lavaca, with its blend of Hispanic heritage and coastal lifestyle, has shaped his values of family, cooperation, and respect for nature. He
    maintains strong ties with extended family in both Texas and Mexico, often visiting relatives during holidays and contributing to cultural events in the town.
attributes:
  skills: '[''basic carpentry'', ''home repairs'', ''boat maintenance'', ''small engine troubleshooting'', ''traditional Mexican‑Texan cooking'', ''bilingual (Spanish/English)'', ''basic computer literacy'',
