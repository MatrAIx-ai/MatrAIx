persona_description: A researcher in the field of communication neuroscience, particularly in the use of brain imaging to predict behavioral responses to advertising and political campaigns. They have expertise
  in functional magnetic resonance imaging (fMRI) and have conducted studies on the neural responses of heavy smokers to anti-smoking ad campaigns. They are interested in using this research to design more
  effective health campaigns and to understand why certain behaviors and ideas go viral on social media. They have received support from the National Science Foundation and the National Institutes of Health.
