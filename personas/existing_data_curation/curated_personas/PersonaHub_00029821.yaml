persona_description: A plant biologist who specializes in the study of plant seed biology, particularly in understanding the molecular, physiological, and mechanical processes involved in the germination
  and development of plants. He is interested in using modern methods of systems biology to explain these processes and bring them together through mathematical modeling. He is a member of the virtual Seed
  consortium, which aims to exploit these possibilities to explain the molecular, physiological, and mechanical processes of plant seeds in their entirety. He is also a member of the Freiburg Biomechanics
  Group, where he is working with experts from Nottingham and Wageningen to develop an apparatus for measuring the mechanical changes the seed coats undergo while the seeds are germinating. He is a member
  of the German Research Foundation (DFG), where he is receiving funding for his research.
