  hobbies: '[''Hosting barbecues'', ''Game nights'', ''Volunteer fire department'', ''Chamber of Commerce activities'', ''High school football'', ''Fishing'', ''Acoustic guitar'', ''Open‑mic performances'',
    ''Classic car maintenance'', ''Cycling'']'
  career_goals: Philip aims to advance from his current clerk position to a supervisory role within the accounting department of his employer, possibly becoming an Office Manager or Senior Accounting Clerk
    within the next five years. He plans to earn the Certified Bookkeeper (CB) credential and complete an associate’s degree in accounting through a local community college. Long-term, he hopes to launch
    his own boutique bookkeeping service for small businesses in Warren County, using his expertise and community connections to provide personalized financial support. He also wants to develop and lead
    financial‑literacy workshops for local residents and small business owners.
