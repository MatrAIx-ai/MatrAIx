  hobbies: '[''Playing soccer in a local adult league'', ''Cooking traditional Mexican dishes'', ''Hosting backyard barbacoa gatherings'', ''Attending community festivals and live music events'', ''Volunteering
    at a food pantry'', ''Hiking in Prince William Forest Park'', ''Following automotive technology forums'', ''Practicing mindfulness meditation'']'
  career_goals: Francisco aims to advance from day‑to‑day delivery work to a supervisory role in logistics, eventually becoming a fleet manager or owner‑operator who can mentor new drivers. He hopes to
    earn certifications in logistics management and pursue part‑time coursework in business administration to launch a community‑focused delivery service that assists seniors and families in his area. Balancing
    his need for flexibility with financial stability, he wants a career path that lets him support his family while maintaining a supportive, harmonious work environment.
