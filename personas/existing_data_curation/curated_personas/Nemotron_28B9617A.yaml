personas:
  professional: Francisco Zaldivar, a 32-year-old seasoned truck driver with a commercial driver’s license, blends practical route planning with a curiosity for new navigation tools, leverages bilingual
    fluency to de‑escalate customer issues, and aspires to transition into a logistics supervisory role while mentoring new drivers.
  sports: Francisco Zaldivar, a 32-year-old soccer enthusiast, plays forward in a local adult league, cheers on the Washington Commanders and D.C. United, and mixes weekend hikes in Prince William Forest
    Park with occasional pickup basketball games to stay active.
  arts: Francisco Zaldivar, a 32-year-old community‑oriented fan, regularly attends live shows by regional Mexican bands such as Los Tigres del Norte and Banda El Recodo at Manassas festivals, while also
    enjoying spontaneous karaoke nights that showcase their love for music and social connection.
  travel: Francisco Zaldivar, a 32-year-old weekend traveler, plans spur‑of‑the‑moment road trips to nearby towns like Alexandria and historic sites such as Colonial Williamsburg, dreams of a culinary pilgrimage
    to Oaxaca, but balances these ambitions with a modest budget and family responsibilities.
  culinary: Francisco Zaldivar, a 32-year-old home chef, delights in preparing traditional Mexican dishes like tacos al pastor, pozole, and slow‑cooked barbacoa, mastering the perfect balance of chilies,
    cilantro, and corn tortillas, while frequently hosting backyard feasts that double as lively social gatherings.
  core: Francisco Zaldivar, a 32-year-old driven by curiosity and compassion, juggles truck routes, family barbecues, and mindfulness practices, all while wrestling with anxiety that fuels both meticulous
    planning and occasional disorganization.
background:
  cultural: Francisco’s family emigrated from Jalisco, Mexico, bringing with them a strong sense of family, community, and Catholic traditions. Raised bilingually, he preserves Mexican customs through celebrations
    like Día de los Muertos and weekly family meals featuring tamales and mole. Living in Manassas, VA, he blends these traditions with American suburban life, participating in local holidays and neighborhood
    events while keeping close ties to the Mexican community through cultural festivals, Spanish‑language radio, and a network of friends who share similar heritage.
