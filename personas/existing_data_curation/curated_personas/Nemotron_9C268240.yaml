  career_goals: Jessica aims to advance into senior analytics leadership, eventually taking on a data science manager or chief analytics officer role where she can shape strategic initiatives and mentor
    emerging talent. She plans to deepen her expertise through a master’s in data science and professional certifications in project management and advanced optimization. Long‑term, she envisions leading
    cross‑functional teams that blend quantitative rigor with creative design, developing innovative analytics solutions for education technology firms and public‑sector resource planning. She also hopes
    to publish research on the intersection of operations research and instructional design, and to contribute to professional societies as a speaker and thought leader.
