  career_goals: Jensie plans to earn her GED within the next year and enroll in a community‑college graphic design program. She aims to build a professional portfolio that merges street‑art aesthetics with
    digital media, win local art contests, and secure a junior designer role at a cultural nonprofit or an advertising agency targeting diverse audiences. Long‑term, she envisions founding her own creative
    studio that offers branding services and runs free art workshops for under‑served youth in Cape Coral, while continuing to produce public murals that celebrate Black heritage and community resilience.
