persona_description: A biomedical engineer who has developed a new method for performing cardiopulmonary resuscitation, which promises to be more effective than standard CPR because it increases nourishing
  blood flow through the heart by 25 percent over the current method. The new CPR alternative, called "only rhythmic abdominal compression," or OAC-CPR, eliminates both risks associated with standard CPR,
  including the risk of breaking ribs if the rescuer pushes too hard and the risk of transferring infection with mouth-to-mouth breathing. The research paper detailing the findings will be published in
  the American Journal of Emergency Medicine.
