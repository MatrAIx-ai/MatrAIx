  career_goals: Seanna aims to transition from full-time clinical practice to a mentorship and community outreach role. She plans to obtain a certification in geriatric dental hygiene to better serve Ohio's
    aging population, and to launch a joint oral-health and art-appreciation program at local senior centers. Over the next five years, she hopes to become a trusted advisor for younger hygienists, offering
    workshops on patient communication and integrating creative approaches into preventive care. She also aspires to contribute articles to dental journals and local newsletters, sharing her insights on
    how curiosity and artistic engagement can enhance patient outcomes.
