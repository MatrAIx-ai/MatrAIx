personas:
  professional: A veteran dental hygienist with thirty years of clinical experience, Seanna Vaughn leverages their meticulous organizational skills and curious artistic sensibility to transform senior oral‑health
    visits into engaging, creative workshops, mentors emerging hygienists, and pursues geriatric certification to deepen their community outreach.
  sports: An avid low‑impact fitness enthusiast, Seanna Vaughn walks the Hilliard trail network several times a week, captains a senior softball team at the local community center, and follows the Cleveland
    Browns and Columbus Blue Jackets, balancing gentle cardio with occasional yoga sessions that nourish both body and spirit for them.
  arts: An enthusiastic arts aficionado, Seanna Vaughn frequents regional galleries showcasing Ohio artists like Jane Smith, enjoys live productions at the Ohio Theatre—including a recent staging of ‘Our
    Town’—and devotes evenings to painting watercolor landscapes inspired by the changing seasons, drawing creative fuel from musicians such as Yo‑Yo Ma and visual masterpieces by Salvador Dalí, an immersion
    that constantly revitalizes their artistic spark.
  travel: A curious explorer with a penchant for cultural immersion, Seanna Vaughn has road‑tripped to Hocking Hills State Park, spent a week touring Charleston’s historic district, and taken guided tours
    of the Smithsonian museums in Washington, D.C., while dreaming of a future pilgrimage to Florence, Italy, to study Renaissance frescoes up close, a vision that fuels their travel planning.
  culinary: A creative home chef, Seanna Vaughn revels in experimenting with global flavors—perfecting Tuscan ribollita soup, Thai green curry with fresh kaffir lime, and a rustic Ohio apple‑cinnamon crumble—often
    using herbs like rosemary and sage from their garden, though their occasional tendency to over‑season sauces has earned them the affectionate nickname ‘the Flavor Alchemist’ among book‑club friends.
  core: Seanna Vaughn, a seasoned dental hygienist turned art‑driven community mentor, blends meticulous organization with boundless curiosity, channeling calm resilience into creative health workshops,
    occasional impulsive art‑supply splurges, and a steadfast love for watercolor landscapes and garden‑fresh cooking, a combination that defines their unique approach to life.
background:
  cultural: Seanna was raised in a middle-class, predominantly white suburb of Columbus, Ohio. Her family's roots trace back to Anglo-Irish immigrants who settled in the Midwest in the early 20th century.
    Growing up in the heartland, she internalized values of community involvement, modesty, and a strong work ethic. The Midwest's emphasis on volunteerism and support for local arts shaped her lifelong
    appreciation for cultural activities and public service. While her upbringing was traditionally Protestant, she later embraced a more eclectic spiritual outlook, drawing on the region's broad-minded,
    progressive currents. Her cultural identity blends classic Midwestern sensibilities—practicality, friendliness, and respect for tradition—with an openness to new ideas and artistic expression.
