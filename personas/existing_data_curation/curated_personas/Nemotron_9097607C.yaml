personas:
  professional: Stephanie Duncan, an 18-year-old high-school senior with a talent for graphic design and event coordination, merges her curiosity for visual arts with methodical planning to lead school
    drama productions, design eye-catching posters using Canva and Adobe Photoshop, and organize community art-craft workshops, all of which lay the groundwork for her aspiration to become a museum curator's
    assistant and eventually direct inclusive cultural events.
  sports: Stephanie Duncan, an avid intramural soccer player at Erie High School, routinely hikes the Presque Isle State Park trails for cardio, follows the Buffalo Bills, Erie SeaWolves, and Erie BayHawks
    for weekend sports fandom, and participates in a local youth soccer club that meets on Tuesday evenings, blending competitive spirit with a love for outdoor adventure.
  arts: Stephanie Duncan, a watercolor enthusiast, draws inspiration from the impressionist works of Claude Monet and the bold colors of Georgia O'Keeffe, captures candid community moments in the style
    of Henri Cartier-Bresson, and curates playlists featuring Lorde, The National, and Billie Eilish while attending Erie Art Museum exhibitions and watching contemporary theater productions such as Hamilton.
  travel: Stephanie Duncan, a travel-curious teen, has taken day trips to Niagara Falls and Philadelphia, explored the historic streets of Boston on a school field trip, and dreams of backpacking through
    Paris, Tokyo, and Barcelona, preferring budget-friendly hostels and group itineraries that allow her to photograph local art scenes and meet fellow creatives.
  culinary: Stephanie Duncan, a café-hopper with a penchant for brunch, often orders avocado toast with poached eggs and a matcha latte, enjoys experimenting with homemade acai smoothie bowls topped with
    fresh berries and granola, and occasionally indulges in sushi rolls and ramen, though she admits to consistently leaving a half-eaten slice of pumpkin cheesecake on the plate when studying.
  core: Stephanie Duncan, an organized yet impulsively curious 18-year-old, balances a love for art, community events, and meticulous planning while occasionally overcommitting and forgetting to unwind.
background:
  cultural: Stephanie grew up in Girard, PA, a tight‑knit borough in Erie County with a heritage rooted in German, Polish, and other Central European immigrant families. Her household reflects a blend of
    traditional Midwestern values—emphasis on hard work, reliability, and community service—and contemporary openness to new ideas. Family gatherings often feature Sunday dinners, holiday celebrations like
    Thanksgiving and the local Erie County Fair, and participation in the nearby Catholic parish, where she volunteers for youth events. The region’s proximity to Lake Erie and its seasonal festivals have
    shaped her appreciation for outdoor recreation and communal art initiatives. This cultural milieu nurtures her curiosity, sociability, and organized approach to both personal and community projects.
attributes:
  skills: '[''Effective public speaking'', ''Event planning and coordination'', ''Time management'', ''Basic graphic design (Canva, Photoshop)'', ''Research and critical analysis'', ''Team leadership and
    mediation'']'
  hobbies: '[''Sketching and watercolor painting'', ''Photography'', ''School drama club (acting and backstage)'', ''Hiking at Presque Isle State Park'', ''Intramural soccer'', ''Visiting art museums and
    galleries'', ''Reading contemporary sci‑fi/fantasy'', ''Volunteering at community‑center art workshops'', ''Exploring local cafés and culinary scenes'']'
  career_goals: Stephanie aims to attend a four‑year university—preferably a state school in Pennsylvania—majoring in Communications or Visual Arts. She aspires to merge her love for art with her organizational
    strengths by pursuing a career as a museum curator’s assistant or community arts program director, eventually launching her own boutique event‑planning firm that focuses on culturally enriching experiences.
    Her long‑term ambition is to create inclusive art initiatives that bring together her hometown’s residents and highlight emerging artists, while also continuing her personal growth through lifelong
    learning and travel.
