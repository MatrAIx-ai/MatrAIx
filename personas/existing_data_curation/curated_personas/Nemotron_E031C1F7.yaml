  career_goals: Tri aims to deepen her expertise in learning experience design while positioning herself as a leader in inclusive workplace training. In the next two to three years she plans to obtain the
    ATD Certified Professional in Learning and Performance (CPLP) credential and pursue a master's degree in Instructional Design or Human Development. She aspires to become a Senior Learning Experience
    Designer, overseeing end-to-end program development and mentoring junior facilitators. Long-term, Tri envisions directing a corporate L&D department as a Chief Learning Officer, where she can embed
    cultural-competence and harmony-focused curricula across the organization. She is also interested in exploring immersive technologies such as virtual-reality simulations to create experiential learning
    for diverse employee populations. Ultimately, she hopes to launch a boutique consultancy that offers culturally responsive training solutions for both startups and established firms, leveraging her
    bilingual background and passion for harmonious team dynamics.
