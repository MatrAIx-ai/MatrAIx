personas:
  professional: Tri Son, a 26‑year‑old learning experience designer, merges a humanities‑grounded curiosity with pragmatic ADDIE and Bloom’s taxonomy expertise, delivering bilingual, culturally responsive
    workshops that feel like collaborative art installations while often juggling a delightfully messy schedule.
  sports: Tri Son enjoys weekend trail hikes along the Pacific coastline, participates in a small local yoga circle, and roots for the Los Angeles Lakers, Los Angeles Dodgers, and the San Francisco 49ers,
    while occasionally joining a beginner’s kayaking club at Marina del Rey during summer.
  arts: Tri Son practices watercolor painting and origami as meditative outlets, finds inspiration in Monet’s Impressionist series and the minimalist compositions of Agnes Martin, and regularly streams
    Sufi saxophonist Khruangbin’s albums while attending the annual Cherry Blossom Festival for its subtle artistic performances.
  travel: Tri Son prefers low‑key, culturally rich trips that blend hiking and food discovery, such as a recent solo trek through the redwoods of Humboldt County followed by a culinary weekend in Kyoto’s
    Nishiki Market, and they keep a running list of future destinations like the lavender fields of Provence and the coastal walk of the Camino del Rey in Spain.
  culinary: Tri Son loves experimenting in the kitchen, fusing traditional Korean kimchi jjigae, Chinese bao buns, and Japanese matcha tiramisu with Californian staples like avocado and locally sourced
    herbs from their balcony garden, resulting in a signature dish of kimchi‑infused avocado toast paired with a splash of soy‑ginger vinaigrette.
  core: Tri Son, a 26‑year‑old bilingual L&D designer, balances intellectual curiosity with a relaxed, slightly chaotic lifestyle, turning everyday disorganization into creative, harmony‑focused learning
    experiences.
background:
  cultural: Tri Son is a second-generation Asian-American whose parents immigrated from South Korea and Taiwan. Growing up in a bilingual household in Southern California, she became fluent in both English
    and Mandarin, while also learning conversational Korean. Family gatherings centered around traditional celebrations such as Lunar New Year, Chuseok, and the Mid-Autumn Festival, reinforcing values of
    respect, modesty, and communal harmony. These cultural roots shaped her emphasis on collective well-being and her sensitivity to cross-cultural dynamics in the workplace. Tri maintains connections with
    the local Korean and Chinese community through language meet-ups and cultural events, and she often incorporates elements of her heritage—such as storytelling techniques and the concept of jeong (deep
    relational empathy)—into her training programs.
