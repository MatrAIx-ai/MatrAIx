  career_goals: Won aims to advance into a senior analytics leadership role within the next five years, such as Director of Business Analytics or a Principal Management Consultant, where he can shape enterprise‑wide
    strategic initiatives. He aspires to build a reputation for driving measurable performance improvements while mentoring junior analysts and championing data‑driven culture. Ultimately, he envisions
    establishing his own boutique consulting firm focused on helping midsize organizations in New England adopt lean, data‑centric processes, balancing his entrepreneurial drive with a desire for stable,
    high‑impact work that aligns with his high personal standards.
