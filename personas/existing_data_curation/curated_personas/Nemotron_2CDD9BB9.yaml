personas:
  professional: Won Cui, they are a senior business analytics leader in a mid‑size New England firm, leveraging advanced Excel, SQL, and Power BI to build robust financial models and risk dashboards, while
    applying Lean Six Sigma rigor, detail‑oriented compliance checks, and a competitive, skeptical edge to drive measurable process improvements and mentor junior analysts.
  sports: Won Cui, they play forward for the Milton Strikers amateur soccer squad, train twice weekly, join the Blue Hills Hiking Club for weekend treks, and passionately follow the Boston Red Sox, New
    England Patriots, and Boston Bruins, balancing high‑intensity cardio with disciplined strength routines.
  arts: Won Cui, they frequently attend Boston Symphony Orchestra performances—especially works by Leonard Bernstein—and enjoy violinist Hilary Hahn’s recordings, while also appreciating contemporary cinema
    by directors such as Christopher Nolan, and occasionally experiment with music production in Ableton to unwind after data‑heavy days.
  travel: Won Cui, they plan trips with spreadsheet precision, favoring a blend of cultural immersion and relaxation, revisiting Kyoto’s historic temples and exploring the coastal trails of Acadia National
    Park, while budgeting annual vacations that include a New England weekend on Martha’s Vineyard and a family‑friendly cruise to the Caribbean.
  culinary: Won Cui, they are an intermediate home chef who delights in crafting east‑west fusion dishes such as miso‑glazed salmon tacos, gochujang‑infused mac and cheese, and matcha‑panna cotta, regularly
    sourcing shiitake mushrooms, za’atar, and fresh ginger from the local farmer’s market to add depth to their culinary experiments.
  core: Won Cui, they are a disciplined, data‑obsessed strategist who balances relentless curiosity with a competitive streak, habitually over‑analyzes decisions, worries about outcomes, yet finds solace
    in early‑morning tai chi and weekend soccer matches.
background:
  cultural: Born to East Asian parents who emigrated to the United States, Won grew up in a bicultural household that blended traditional Confucian values—such as discipline, respect for education, and
    collectivism—with the individualistic ethos of suburban New England. This heritage has instilled a strong work ethic and a reverence for structured learning, while his American upbringing fostered openness
    to new ideas and social engagement. He celebrates cultural festivals like Lunar New Year with his family and community, and incorporates elements of his heritage—such as a focus on harmony, persistence,
    and continuous improvement—into both his professional and personal life.
