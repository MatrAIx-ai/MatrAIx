  career_goals: Approaching the later stage of his career, Mark aims to transition from full‑time employment to a boutique consultancy that specializes in strategic branding for small‑ to medium‑size enterprises
    in the New York metro area. He intends to codify his design process into a proprietary methodology that marries business analytics with visual storytelling, author a guidebook on "Design for Business
    Success," and build a portfolio of licensed artwork that generates passive income. Mentoring emerging designers through one‑on‑one coaching and structured workshops is also a core ambition, allowing
    him to leave a lasting professional legacy while maintaining the structured, independent work environment he values.
