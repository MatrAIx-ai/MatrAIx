personas:
  professional: Irma Caballero is a front‑desk specialist skilled in bilingual phone etiquette, calendar coordination, and meticulous data entry, who leverages they calm demeanor and practical problem‑solving
    to keep the office running smoothly while quietly juggling occasional last‑minute schedule chaos.
  sports: Irma Caballero enjoys early morning jogs on rural trails, occasional beach volleyball, follows the Miami Heat (NBA) and Inter Miami CF (MLS) for excitement, and trains with the local Green Trails
    Running Club to stay fit during the summer months.
  arts: Irma Caballero finds solace in listening to a blend of Latin pop by Rosalía, salsa classics from Marc Antonio, and indie folk tunes by Bon Iver while reading contemporary fiction by Chimamanda Adichie,
    and they occasionally attend small community theater performances featuring local actors like Carlos Molina.
  travel: Irma Caballero prefers spontaneous weekend road trips to coastal towns such as the Florida Keys, Cartagena, or Asheville, balancing a modest travel budget with a love for exploring vibrant food
    markets and quiet beaches, while dreaming of a longer cultural immersion in Lisbon.
  culinary: Irma Caballero delights in cooking family‑heritage dishes like arroz con gandules and pasteles, perfectly seasoned with sofrito and adobo, yet they admit to over‑relying on canned beans when
    time is short, and they relish experimenting with fresh herbs like cilantro and cumin in their garden‑to‑table meals.
  core: Irma Caballero is a structured yet slightly disorganized dreamer who anchors their day with methodical work routines, mindful journaling, and spontaneous culinary experiments, all while tending
    to a garden and worrying about tomorrow’s to‑do list.
background:
  cultural: Irma was born to Puerto Rican parents who immigrated to the United States, and she grew up speaking both Spanish and English at home. Family traditions such as celebrating Three Kings Day, preparing
    lechón, and sharing stories of island life remain central to her identity. Though she lives in Rural Hall, NC, she maintains strong ties to the Puerto Rican diaspora through the local Hispanic community
    church and by participating in cultural festivals in nearby cities. Her cultural upbringing emphasizes close‑knit family bonds, hospitality, and a resilient work ethic, which influence her approach
    to both her personal life and her role as a receptionist.
attributes:
  skills: '[''Front‑Desk Management'', ''Bilingual Communication (English/Spanish)'', ''Customer Service'', ''Appointment Scheduling'', ''Microsoft Office Suite (Outlook, Word, Excel)'', ''Data Entry'',
    ''Record Keeping'', ''Basic Office Equipment Troubleshooting'', ''Professional Phone Etiquette'', ''Conflict Resolution'']'
  hobbies: '[''Reading (fiction & self‑help)'', ''Gardening'', ''Cooking Puerto Rican cuisine'', ''Walking/hiking'', ''Mindfulness journaling'', ''Listening to music (Latin pop, salsa, indie folk)'', ''Dog
    walking'', ''Small community gatherings'']'
  career_goals: She aims to advance to an Office Manager or Administrative Supervisor role within the next three to five years, seeking to obtain a Certified Administrative Professional (CAP) credential
    and to strengthen her organizational systems. Irma also hopes to enroll in a community‑college associate program in Business Administration to broaden her career options and increase her earning potential,
    while maintaining a work schedule that supports her family life.
