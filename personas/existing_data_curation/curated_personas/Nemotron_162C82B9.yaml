  career_goals: Although retired, Regina aims to leave a lasting impact on the next generation of scientists, especially young women, by developing a mentorship program at the local community college. She
    aspires to author a memoir that chronicles her journey as a woman in STEM during the 1960s and 70s, highlighting both challenges and triumphs. Additionally, she hopes to curate a small interdisciplinary
    exhibit that fuses art and science, fostering curiosity among local schoolchildren. Volunteering at the Monterey Park Museum of Art’s education department and contributing to senior‑friendly coding
    workshops are also central to her ongoing ambitions.
