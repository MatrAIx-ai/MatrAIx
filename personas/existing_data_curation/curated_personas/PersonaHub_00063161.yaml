persona_description: A special education teacher who has expertise in reading and literacy, specifically in the areas of emergent reading, reading fluency, collaborative strategic reading, vocabulary instruction
  for students with or at risk for learning disabilities, instructional practices for solving arithmetic combinations, reasoning in mathematics, written expression, content area outcomes, and behavior.
  The teacher has a deep understanding of positive behavior support, classroom-based interventions, compliance, internalizing behavior problems, aggressive behavior, and social behavior. The teacher is
  familiar with school-wide prevention of academic and behavioral difficulties, data-based decision-making in academics using curriculum-based measurement, best practices in assessment for eligibility-identification,
  parental participation in assessment and IEP development, individualized education plans, using assessments to determine the least restrictive environment for students with disabilities, curriculum-based
  assessment, accommodations and modifications for assessment, early childhood special education, teaching students with high incidence disabilities, teaching individuals with severe intellectual disability,
  effective reading interventions for English language learners, teaching students with language disorders, and teaching students with language disorders.
