personas:
  professional: Rodrigo Ayala, a senior‑project‑engineer‑in‑training who blends mechanical and HVAC design expertise with an artist’s eye, leverages AutoCAD and SolidWorks to craft sustainable building
    systems while letting gallery visits spark unconventional engineering solutions; they coordinate fluid timelines, communicate fluently in Spanish and English to bridge multicultural teams, and channel
    their curiosity into smart‑building tech and eventually a consultancy that fuses eco‑friendly precision with public art installations.
  sports: Rodrigo Ayala, an avid hiker who spends weekends trekking the Hudson Valley’s Catskill trails and joining the local climbing gym, follows the New York Mets in baseball, the Buffalo Bills in football,
    and the New York Knicks in basketball, and also participates in a seasonal community running club that gathers for half‑marathon training in spring.
  arts: Rodrigo Ayala, a devoted lover of contemporary art who frequents the Dia:Beacon and local Hudson Valley galleries, captures urban textures through street photography inspired by Garry Winogrand
    and Vermeer’s light, strums acoustic guitar to the folk sounds of Iron & Wine and Sufjan Stevens, and cites installations by Yayoi Kusama as catalysts for innovative engineering concepts.
  travel: Rodrigo Ayala, a curious explorer who blends purposeful trip planning with spontaneous detours, has trekked the Icelandic highlands, savored the historic streets of Barcelona, and revisited Kyoto
    for its blend of tradition and tech, while dreaming of a sustainable retreat in Patagonia, always researching eco‑lodges and using a mix of Airbnb stays and local hostels to stretch a moderate travel
    budget.
  culinary: Rodrigo Ayala, a culinary experimenter who modernizes Salvadoran classics by infusing pupusas with goat cheese and truffle oil and crafting tamales with quinoa and roasted chiles, enjoys cooking
    with masa harina, sumac, and fresh herbs from farm‑stand stalls, and pairs his dishes with crisp Sauvignon Blanc while occasionally indulging in elaborate brunch spreads featuring avocado toast and
    espresso.
  core: Rodrigo Ayala merges engineering precision with artistic curiosity, juggling flexible work habits, sustainable living, and a penchant for improvisational cooking and spontaneous adventures.
background:
  cultural: Rodrigo grew up in a Salvadoran household where Spanish was spoken daily and family gatherings centered around pupusas, salsa music, and stories of El Salvador. The values of community, resilience,
    and hospitality he inherited shape his interactions in Poughkeepsie. He actively participates in the local Hispanic community, volunteering with immigrant‑support organizations, celebrating Salvadoran
    holidays such as Día de la Independencia (September 15) and Día de la Madre, and sharing his culture through food and music. At the same time, he embraces the multicultural fabric of Dutchess County,
    blending his heritage with the diverse influences of his New York surroundings.
attributes:
  skills: '["Mechanical engineering", "HVAC system design", "AutoCAD", "SolidWorks", "Project coordination", "Technical troubleshooting", "Bilingual communication (Spanish/English)", "Creative problem solving",
    "Basic programming (Python, Arduino)", "Sustainable design principles"]'
  hobbies: '["Contemporary art appreciation", "Street photography", "Acoustic guitar", "Cooking (Salvadoran cuisine)", "Hiking", "Arduino/electronics tinkering", "Attending cultural festivals", "Reading
    sci‑fi and tech blogs"]'
  career_goals: Rodrigo wants to advance to a senior project engineer role where he can lead large‑scale sustainable building initiatives in the Hudson Valley. He plans to earn LEED AP certification and
    deepen his expertise in smart‑building technologies. Eventually he hopes to launch his own consultancy that blends engineering precision with artistic public installations, offering eco‑friendly design
    solutions for community spaces. He also aspires to mentor young engineers, especially those from immigrant backgrounds, and to champion inclusive practices within his industry.
