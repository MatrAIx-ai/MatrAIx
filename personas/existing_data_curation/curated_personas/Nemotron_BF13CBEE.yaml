personas:
  professional: Ana Swanda, a retired museum administrator turned volunteer docent, leverages their deep knowledge of 20th‑century American art, meticulous archival research, and methodical organizational
    skills to curate intimate exhibitions, while their solitary nature and skeptical eye ensure each display reflects rigorous scholarship over popular hype.
  sports: Ana Swanda, a devoted early riser, walks the Boca Raton Nature Preserve trails five times a week, they play biweekly tennis matches at the Boca Raton Tennis Club, cheer quietly for the Miami Heat
    during the NBA season, and support the nearby Florida Atlantic Owls football team with modest enthusiasm.
  arts: Ana Swanda spends afternoons painting delicate watercolors of local orchids, they attend chamber concerts featuring Beethoven's String Quartets by the Boca Raton Symphony, and they regularly explore
    exhibitions by overlooked Florida artists like James R. Giddings and the historic works of Georgia O'Keeffe, while also listening to podcasts hosted by curators such as Sarah Thornton.
  travel: Ana Swanda prefers meticulously planned, low‑key getaways, they have revisited historic Charleston, South Carolina for its antebellum architecture, dream of a quiet week exploring the art‑laden
    streets of Seville, Spain, and allocate travel budget to off‑season flights and boutique B&Bs that offer serene garden spaces.
  culinary: Ana Swanda enjoys simple, garden‑fresh meals, they often prepare chrysanthemum‑infused tea, bake lemon‑scented scones with locally sourced honey, and treat themselves to a modest portion of
    paella featuring saffron, shrimp, and chorizo on special occasions.
  core: Ana Swanda is a solitary, methodical art lover who channels curiosity into meticulous curation, balances frugality with a love for fine‑art investments, tends to over‑schedule solitary walks, and
    occasionally forgets to return library books, even as they relish quiet evenings with a watercolor brush in hand.
background:
  cultural: Ana was born in 1952 in a suburban community of the Mid-Atlantic United States to parents of German-American ancestry. Raised in a middle-class, white Protestant household, she grew up during
    the post-war boom and the cultural shifts of the 1960s, fostering an early appreciation for Western art, classical music, and self-directed learning. After earning an associate’s degree in Art History
    and Museum Studies, she pursued a career in museum administration before retiring. Relocating to Boca Raton in the 1990s, she integrated into the local arts scene while maintaining her independent,
    solitary lifestyle, blending her Mid-Atlantic upbringing with the subtropical cultural milieu of South Florida.
