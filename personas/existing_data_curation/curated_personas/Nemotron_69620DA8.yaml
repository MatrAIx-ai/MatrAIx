  career_goals: Larry aims to advance to a team‑lead or shift‑manager role within his call center, leveraging his performance metrics to earn a formal supervisory position. He plans to obtain a Certified
    Customer Service Professional credential and develop a training program for new agents. Over the longer term, he hopes to transition to part‑time consulting or a modest home‑repair side business that
    offers greater flexibility before retirement.
