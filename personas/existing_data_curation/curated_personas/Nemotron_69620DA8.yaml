personas:
  professional: Larry Hulmes is a veteran customer service representative who leverages strong verbal communication, conflict‑de‑escalation skills, and mastery of Zendesk and Salesforce to coach new agents,
    while their practical curiosity and relaxed, occasionally disorganized approach keep them adaptable and constantly seeking incremental improvements.
  sports: Larry Hulmes is an avid outdoorsman who spends weekends fishing and hunting, participates in a local softball league, and follows the Indianapolis Colts and Indiana Pacers with fervor, often wearing
    their gear while cheering at the local bar after a game.
  arts: Larry Hulmes is a classic‑rock enthusiast who frequently listens to Led Zeppelin and The Rolling Stones while devouring detective novels by Raymond Chandler, attends community theater productions
    starring local talent, and keeps a stack of Indiana history books on their nightstand, reflecting a blend of nostalgia and curiosity.
  travel: Larry Hulmes is a road‑trip‑oriented traveler who prefers loosely planned weekend getaways to places like the Wisconsin Dells, the Indiana Dunes, or a spontaneous stop at the Kentucky Bourbon
    Trail, balancing a love of new experiences with family budget constraints and a tendency to book the last minute.
  culinary: Larry Hulmes is a modestly skilled home cook who favors classic Midwestern comfort foods such as pork ribs slathered in a homemade barbecue sauce, corn on the cob, fried catfish, and apple pie,
    often experimenting with seasonings like smoked paprika and chipotle while occasionally overcooking the ribs due to their relaxed approach in the kitchen.
  core: Larry Hulmes is a pragmatic, curiosity‑driven 55‑year‑old who balances a relaxed, slightly disorganized lifestyle with a competitive edge, turning everyday challenges into opportunities for hands‑on
    problem solving.
background:
  cultural: Larry grew up in a small Indiana town, embodying Midwestern values of self‑reliance, neighborliness, and modesty. He was raised in a Protestant (Methodist) family that emphasized community service
    and regular church attendance. He celebrates traditional holidays such as Thanksgiving, Independence Day, and local county fairs, and he maintains close ties with extended family and longtime friends
    in Morgan County. His background blends a practical, down‑to‑earth work ethic with a curiosity for new ideas, shaped by the region’s agricultural and industrial heritage.
