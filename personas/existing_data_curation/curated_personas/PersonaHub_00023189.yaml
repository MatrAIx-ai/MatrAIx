persona_description: An environmental geologist interested in the Quaternary geology of the Osage Plains and Interior Highlands, focusing on the differences and similarities between these two regions, their
  geology, vegetation, and soils. They are likely to be interested in paleoclimates, dating methods, volcanism, tephrochronology, and Pacific margin tephrochronologic correlation. They would be interested
  in studying the Quaternary stratigraphy of the Interior Highlands and comparing it to the Appalachian Highlands, and would be familiar with the geologic map of the Lower Mississippi Valley and the correlation
  charts and cross-sections related to other chapters. They would also be interested in the regional synthesis covering the Pacific margin, Columbia Plateau, Snake River Plain, major pluvial lakes of the
  Great Basin, Basin and Range in California, Arizona, and New Mexico, Colorado Plateau, Southern and Central Rocky Mountains, Northern and Southern Great Plains, Osage Plains, and Interior Highlands, as
  well as the Lower Mississippi Valley and Gulf of Mexico Coastal Plain and Florida. They would have a unique and special knowledge of group theory and its applications in the study of subgroups and isomorphisms,
  and would be familiar with the structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
