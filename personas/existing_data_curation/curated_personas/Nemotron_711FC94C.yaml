personas:
  professional: Hermes Mendez, a nine‑year‑old budding visual storyteller, merges curiosity‑driven watercolor sketches with simple digital art tools to draft original fantasy characters, while their spontaneous
    nature keeps them sketching whenever inspiration strikes, even if projects remain unfinished.
  sports: Hermes Mendez thrives on the kinetic energy of the Northside Strikers youth soccer league, roots for the LA Dodgers and the Los Angeles Lakers, and hones stamina through Saturday bike rides with
    the Adventure Riders junior club, while also dabbling in swimming lessons at the local community pool.
  arts: Hermes Mendez fuels their creative spark by emulating comic legend Stan Lee, anime director Hayao Miyazaki, and muralist Diego Rivera, while swaying to traditional mariachi strings and contemporary
    pop icons like Billie Eilish during sketch sessions, and they regularly attend the community art center’s weekly drawing workshop.
  travel: Hermes Mendez explores the hidden creek behind their house, has trekked the awe‑inspiring cliffs of the Grand Canyon on a family vacation, dreams of standing before Machu Picchu’s ancient terraces,
    and hopes to wander Tokyo’s Akihabara district to chase futuristic video‑game design inspiration.
  culinary: Hermes Mendez delights in mastering family recipes like cheese‑filled quesadillas with roasted poblano peppers, perfecting chocolate chip cookies with a sprinkle of sea salt, and inventing avocado
    toast topped with lime‑juiced cilantro and a dash of chili powder, often experimenting while their parents supervise.
  core: Hermes Mendez is a curious, quietly creative nine‑year‑old who flips between watercolor worlds, LEGO constructions, and spontaneous art bursts, yet often battles a lack of organization that leaves
    sketches half‑finished.
background:
  cultural: Hermes comes from a Mexican‑American family that maintains strong ties to its heritage while living in the agricultural community of Dos Palos, California. Spanish is spoken at home, and he
    celebrates traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around homemade tacos, tamales, and pozole. He attends a local school where he learns both English and
    Spanish, and he participates in community events like the annual Latino heritage festival, where he enjoys folk dances and music. The farm‑rich landscape of Fresno County influences his love for the
    outdoors, and the close‑knit family environment nurtures his kindness and cooperative spirit.
