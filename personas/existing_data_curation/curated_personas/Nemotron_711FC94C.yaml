  hobbies: '[''drawing and sketching'', ''watercolor painting'', ''digital art with Tux Paint'', ''reading comic books'', ''building LEGO sets'', ''exploring nature trails'', ''listening to Mexican and
    pop music'', ''playing Minecraft'', ''family cooking'', ''learning Spanish songs'']'
  career_goals: Although still young, Hermes dreams of turning his love for art into a future where he can illustrate stories that celebrate his Mexican heritage and the adventures he imagines. He envisions
    becoming an illustrator or a graphic novelist who shares vibrant characters and cultural tales. He also feels fascinated by how things work, imagining a role as a museum curator or a science communicator
    who can blend visual storytelling with scientific concepts. Above all, he hopes to use his creativity to bring joy to others and help his community.
