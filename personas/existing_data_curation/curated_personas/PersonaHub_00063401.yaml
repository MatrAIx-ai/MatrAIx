persona_description: A mediator who specializes in alternative dispute resolution processes, particularly in commercial, family, and employment law disputes. They are skilled in facilitating voluntary,
  non-binding, non-adversarial, and without prejudice dispute resolution processes that allow parties to find a mutually acceptable outcome without the need for litigation. They are known for their independence,
  neutrality, and ability to build rapport with both parties. They are highly trained, accredited, and evaluated, and their role as an independent facilitator is crucial in ensuring that the opportunity
  for settlement is not lost and that the process is conducted in a constructive manner. They are willing to consider referring the matter to Mediation when the parties are of a like mind and the employer
  is willing to consider referring the matter to Mediation.
