  hobbies: '[''Knitting'', ''Crocheting'', ''Quilt making'', ''Gardening'', ''Reading historical fiction'', ''Listening to classical Indian music'', ''Walking on Pompano Beach'', ''Attending community cultural
    festivals'']'
  career_goals: Although retired from full‑time factory work, Parul aims to keep her skills active by offering informal workshops at the local senior center, passing on her knowledge of hand‑sewing and
    fabric care to younger enthusiasts. She hopes to develop a modest home‑based line of embroidered garments that blend South Asian motifs with Floridian beachwear, preserving cultural heritage while staying
    practical. Maintaining her financial independence, staying socially connected, and preserving her health through purposeful activity are central to her long‑term ambitions.
