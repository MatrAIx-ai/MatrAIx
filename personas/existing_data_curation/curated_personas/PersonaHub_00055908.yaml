persona_description: A global advocate for HIV/AIDS awareness and prevention, Dr. Kevin Harvey is a Caribbean Regional Director of the AIDS Healthcare Foundation (AHF) Jamaica. He is passionate about educating
  the public on the truth about HIV/AIDS, educating them about the symptoms and treatments of the disease, and remaining steadfast with the effort to end the stigma attached to an HIV/AIDS diagnosis. Dr.
  Harvey believes that removing the stigma is one of the main reasons people are reluctant to get tested, disclose their HIV status, and take antiretroviral drugs. He is also an advocate for the AHF, offering
  free walk-in HIV and STI tests which are accurate, anonymous, and rapid. Dr. Harvey is committed to spreading awareness about the disease and encouraging people to take action to end the stigma.
