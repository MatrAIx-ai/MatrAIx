  career_goals: Son Viral aims to graduate high school with strong STEM grades and earn a scholarship to study electrical engineering or computer science at a reputable university. He envisions a career
    that blends his love for systematic problem solving with practical impact, such as designing energy‑efficient automotive components or developing reliable software for industrial automation. He also
    hopes to support his family’s small business—potentially a family‑run restaurant—by applying technical skills to improve operations. Long‑term, he seeks a stable, well‑structured professional life that
    allows him to give back to his community through mentorship and volunteer work.
