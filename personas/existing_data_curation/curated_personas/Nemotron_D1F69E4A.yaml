personas:
  professional: Son Cheah is an aspiring pianist who follows a strict daily practice schedule, a chess enthusiast who relishes structured tactical battles, and a meticulous model‑kit builder, all of which
    blend into a reliable, detail‑oriented student who often volunteers to lead group projects and peer‑tutoring sessions, reflecting a balanced approach of routine and creative problem‑solving that they
    apply across all endeavors.
  sports: Son Cheah participates in the school badminton club, follows the local professional soccer team known as the Tigers, and maintains a personal habit of jogging every Saturday morning, which they
    use to complement their mental focus from chess and piano practice.
  arts: Son Cheah immerses themselves in classical music, performing Beethoven’s Für Elise and Chopin’s Nocturnes on piano, while also appreciating contemporary visual art such as Yayoi Kusama’s installations
    and the imaginative animation of Studio Ghibli, which they draw upon to inspire intricate details in their model‑kit projects.
  travel: Son Cheah favors well‑planned travel itineraries, having explored nearby cultural hubs like Singapore and Bangkok on family trips, and dreams of a meticulously organized European tour to visit
    historic cities such as Prague and Vienna, balancing their love for new sights with the comfort of familiar routines they cherish.
  culinary: Son Cheah enjoys recreating beloved family recipes, expertly whipping up fried rice with shrimp, soy sauce, and scallions, hand‑folding dumplings seasoned with ginger and pork, and occasionally
    experimenting with homemade matcha cookies, showing a modest yet growing confidence in the kitchen that they nurture during weekend cooking sessions.
  core: Son Cheah blends disciplined piano practice, strategic chess play, meticulous model‑building, and a love for traditional cooking into a teenage life guided by routine, gentle cooperation, and occasional
    perfectionist quirks that they navigate with quiet confidence.
background:
  cultural: Son Viral comes from a Malaysian‑Chinese family that maintains strong ties to East Asian traditions while adapting to life in the United States. At home, Mandarin and some Cantonese are spoken,
    and the family observes cultural holidays such as Lunar New Year and the Mid‑Autumn Festival, complete with traditional foods, red envelope customs, and lion‑dance performances. He was raised with values
    of respect for elders, academic diligence, and harmony within the family and community—principles common in many East Asian cultures. Living in Macomb County, Michigan, he blends these traditions with
    typical American experiences, attending a public middle school, playing sports with classmates, and celebrating holidays like Thanksgiving. This bicultural environment gives him a flexible yet rooted
    identity, allowing him to navigate both cultures comfortably.
