  career_goals: Although retired from formal employment, Yainara aspires to compile a memoir that chronicles her family's migration story and cultural legacy. She aims to curate a community exhibition of
    Latin American art, mentor a youth creative writing workshop, and learn digital photography to document local natural habitats. Yainara also hopes to expand the neighborhood garden program she helped
    organize, ensuring it serves as an intergenerational space for learning and fellowship.
