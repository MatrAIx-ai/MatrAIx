personas:
  professional: Wanda Stagman, a former classroom teacher turned community arts facilitator, designs intergenerational workshops, coordinates museum outreach, and leverages digital literacy to empower seniors,
    all while navigating a competitive drive to secure a board seat at the San Jose Museum of Art.
  sports: Wanda Stagman enjoys gentle yoga sessions at the senior center, walks the local shoreline trails with a bridge club, and cheers for the San Jose Giants, viewing fitness as a soothing counterbalance
    to artistic intensity.
  arts: Wanda Stagman, a dedicated watercolorist, attends weekly studio classes, frequents the San Jose Museum of Art, delights in live jazz performances by the Mariachi Brass Band, and draws inspiration
    from Monet, O'Keeffe, and the improvisational spirit of Miles Davis.
  travel: Wanda Stagman plans trips around art festivals, having explored the Aspen Snowmass Art Fair and the Texas Hill Country Folk Art Show, while dreaming of strolling the galleries of Paris and Florence
    but constrained by a modest travel budget.
  culinary: Wanda Stagman experiments with global cuisines, often cooking Thai green curry with garden-grown basil, Italian ribollita using fresh tomatoes, and Spanish paella, while occasionally over‑spicing
    dishes in pursuit of bold flavor pairings.
  core: Wanda Stagman blends a lifelong educator's curiosity with a competitive, emotionally reactive spirit, channeling anxieties into vibrant community art initiatives and eclectic culinary experiments.
background:
  cultural: Wanda grew up in a small Midwestern town in a white, middle‑class family where community service and education were core values. After earning her BA in education at a state university, she
    moved to the San Jose Bay Area in the 1980s to raise a family. Over four decades in California, she has embraced the region’s rich cultural mosaic, regularly participating in Asian New Year celebrations,
    Latin American festivals, and the vibrant local art scene. While she retains the modesty, work ethic, and love of learning from her Midwestern roots, she also embodies the progressive, multicultural,
    and environmentally conscious ethos of the Bay Area, which shapes her worldview and community involvement.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Adult Learning Facilitation'', ''Community Art Event Coordination'', ''Volunteer Program Management'', ''Public Speaking'', ''Mentoring'',
    ''Digital Literacy Training for Seniors'', ''Intergenerational Program Design'', ''Storytelling'']'
  hobbies: '[''Watercolor Painting'', ''Museum and Gallery Visits'', ''Live Theater'', ''Jazz Concerts'', ''Bridge (Card Game)'', ''Gardening'', ''Gentle Yoga'', ''Travel to Art Festivals'', ''Reading (Philosophy,
    Science, Art History)'', ''Volunteering at Senior Center (Art Workshops)'', ''Cooking Experiments'']'
  career_goals: Wanda aims to leave a lasting imprint on the Bay Area’s cultural community. She hopes to join the board of the San Jose Museum of Art, launch an intergenerational art mentorship program
    that pairs senior volunteers with local school students, and author a reflective memoir on lifelong learning. She also aspires to speak at conferences about anxiety and mental health in older adults,
    travel to European art capitals for personal enrichment, and host quarterly art workshops for seniors. Advocacy for expanded mental‑health resources for seniors in her community is a central part of
    her ambition.
