  career_goals: Eloy aims to graduate high school and pursue a degree in business administration or sports management at a community college, with a long‑term goal of launching a digital platform that promotes
    local Mexican‑American street food vendors. He also dreams of playing semi‑professional soccer while building a personal brand as a content creator on TikTok and YouTube, leveraging his charisma and
    video‑editing skills. In the nearer future, he hopes to obtain his driver’s license, secure a part‑time apprenticeship in an auto‑repair shop to deepen his mechanical expertise, and eventually start
    his own small automotive service business.
