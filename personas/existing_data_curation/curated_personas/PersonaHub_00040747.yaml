persona_description: A healthcare professional who is passionate about asthma management and has a strong background in asthma research and clinical practice. They are knowledgeable about the latest international
  guidelines and best available evidence, and are skilled in delivering effective asthma care through efficient and practical methods. They are committed to improving asthma control and have a deep understanding
  of the essential elements of good asthma care, including accurate diagnosis, identification of risk factors and triggers, objective assessment of airway inflammation and severity, practical and convenient
  measurement of lung function, effective delivery of inhaled medication, and the recommended stepwise approach to asthma treatment. They are also skilled in recognizing and treating acute asthma attacks
  and individualized management plans and patient education.
