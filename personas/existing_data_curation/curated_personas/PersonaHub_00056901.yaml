persona_description: A geotechnical engineer with expertise in slope stability analysis and field testing methods, particularly those involving the use of in-place instrumentation and advanced survey techniques.
  The individual is interested in the development and application of advanced survey techniques for monitoring slope stability and failure processes, and has experience in using 3-D laser scanning to capture
  and analyze surface movement and crack formation during slope failure. The person is likely to be involved in the design and implementation of slope stability assessments, as well as the interpretation
  of the data collected using these advanced survey techniques.
