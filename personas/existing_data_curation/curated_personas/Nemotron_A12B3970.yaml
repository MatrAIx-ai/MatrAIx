    and shift leadership'', ''Technical troubleshooting of surveillance equipment'', ''Basic photography and visual documentation'']'
  hobbies: '[''Community soccer league'', ''Street photography of Queens murals'', ''Attending art walks and gallery openings'', ''Cooking traditional Ecuadorian cuisine'', ''Salsa and reggaeton dancing'',
    ''Exploring new neighborhoods and food scenes'', ''Listening to Latin music and live concerts'', ''Reading mystery and crime novels'', ''Playing recreational poker'', ''Volunteering to teach self‑defense
    workshops'']'
  career_goals: Rene aims to advance to a supervisory role within casino security, eventually becoming a security manager responsible for overseeing a large team and shaping comprehensive safety protocols.
    He plans to earn a bachelor’s degree in Security Management or Criminal Justice to deepen his theoretical foundation. Drawing on his artistic curiosity, he hopes to design a training program that uses
    visual storytelling and photography to improve situational awareness among security staff. Additionally, Rene is passionate about mentoring younger Latinx employees, and he envisions launching a community
    outreach initiative that links security professionals with local youth art and mentorship programs, blending his expertise in safety with his love for culture and creativity.
