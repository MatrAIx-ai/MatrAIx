  career_goals: Teodora aims to earn Certified Financial Planner (CFP) certification renewal and eventually pursue the Chartered Financial Analyst (CFA) designation to deepen her investment expertise. She
    plans to launch a boutique advisory firm that specializes in serving the growing Latino community in Nassau County, leveraging her cultural fluency to bridge language gaps. Over the next five years,
    she envisions establishing a mentorship pipeline for young women in finance, expanding community outreach through free financial literacy seminars, and taking on a leadership role within the Financial
    Planning Association's New York chapter to influence industry best practices.
