personas:
  professional: Antoine Evans, a retired carpenter and community volunteer, blends his decades of woodworking, heirloom gardening, and local history passion into mentoring younger neighbors while quietly
    assembling a digital archive of elder stories, all guided by a calm, curiosity-driven approach that values harmony over strict project timelines.
  sports: Antoine Evans, a longtime fan of the Mississippi State Bulldogs football and the Covington County high school baseball team, participates in the town's senior walking club each morning and prefers
    low-impact activities like gardening over intensive sports, while cheering from the stands whenever the local teams play.
  arts: Antoine Evans, an avid watercolorist capturing pine-forest sunsets, regularly visits Covington's community art shows and finds inspiration in the folk melodies of R.L. Burnside and the stories of
    Southern troubadours, blending visual and musical traditions into a quiet creative routine.
  travel: Antoine Evans, who favors leisurely road trips to historic towns such as Natchez, Savannah, and the Appalachian foothills, plans travel with friends from his book club, opting for modest accommodations
    that allow ample time for photography and local storytelling.
  culinary: Antoine Evans, an enthusiastic heirloom gardener, delights in simmering a tomato-okra gumbo seasoned with fresh basil and cayenne, crafting homemade cornbread, and canning tomatoes for winter,
    though he sometimes forgets to label his jars, leading to occasional mix-ups.
  core: Antoine Evans, a 77-year-old retired craftsman, lives by a curious yet relaxed philosophy, nurturing community history, art, and a garden while occasionally misplacing tools and overlooking schedules.
background:
  cultural: Antoine grew up in the rural South of Mississippi, where a blend of Southern hospitality, church-centered community life, and a deep reverence for local traditions shaped his worldview. The
    modest, close‑knit atmosphere of Collins instilled in him a respect for neighborly cooperation and a willingness to help others. He was exposed to regional music such as blues and gospel, and to folk
    art forms like quilting and wooden folk carvings, which sparked his lifelong appreciation for aesthetics. While rooted in these Southern cultural norms, Antoine’s curiosity has led him to explore ideas
    beyond his hometown, embracing diverse artistic expressions and contemporary perspectives. This mixture of tradition and openness defines his cultural identity.
