personas:
  professional: Jon Woodfin is a veteran automotive technician with five decades of hands‑on expertise in gasoline, diesel, and electric power‑trains, they mentor apprentices with meticulous service records,
    they volunteer at a community center to run a modest “Cars & Coffee,” and they are gearing up for a part‑time advisory role at the local community college while drafting a memoir that weaves automotive
    history with watercolor paintings.
  sports: Jon Woodfin stays active by walking the prairie reserves on weekends, playing nine‑hole rounds at the Livingston County Senior Golf Club, and joining a casual bowling league, they are a lifelong
    fan of the Detroit Tigers and Detroit Lions, and they approach fitness methodically, logging each walk and round of golf in a leather‑bound notebook while balancing their love of classic cars with low‑impact
    exercise.
  arts: Jon Woodfin is a regular at the Pontiac Art Center, where they admire the realist works of Andrew Wyeth and the muted palettes of Edward Hopper, they channel that aesthetic into watercolor scenes
    of vintage automobiles, they listen to Bob Dylan and Miles Davis while painting, and they occasionally write poetry inspired by the sleek lines of classic cars.
  travel: Jon Woodfin prefers road trips in his 1965 Mustang, especially to automotive museums like the Henry Ford Museum in Dearborn, the Georgia Automobile Museum in Mellenville, and the Porsche Museum
    in Stuttgart, they plan each journey meticulously, budgeting every expense, they favor calm, low‑traffic scenic routes over crowded airports, and they dream of a serene getaway to the Scottish Highlands
    where historic castles meet open roads.
  culinary: Jon Woodfin enjoys cooking hearty Midwestern meals such as braised short ribs, homemade cornbread, and apple pie, they skillfully season a well‑seared steak with smoked paprika, fresh rosemary,
    and a drizzle of maple‑glazed butter, they source fresh herbs and heirloom tomatoes from the local farmer’s market, and they love sharing these dishes with friends at their modest ‘Cars & Coffee’ gatherings.
  core: Jon Woodfin is a methodical, art‑loving classic‑car mechanic whose curiosity and gentle anxiety drive a life of meticulous restoration, quiet mentorship, and watercolor reflections on the road,
    and they often find solace in meditation and a well‑kept journal.
background:
  cultural: Jon grew up in a working‑class family on a modest farm outside Pontiac, Illinois, within a predominantly white, Midwestern community with strong German and Irish roots. The region’s values of
    self‑reliance, pragmatism, and community cooperation shaped his dependable, methodical nature. Local church gatherings, high‑school vocational programs, and a neighborhood mechanic shop provided early
    exposure to hands‑on trades and the importance of helping neighbors. These cultural influences fostered Jon’s respect for craftsmanship, his modest yet curious worldview, and his commitment to harmony
    within his small social circles. His lifelong connection to the Midwest’s plains and small‑town rhythm continues to inform his appreciation for both the practical and aesthetic dimensions of everyday
    life.
attributes:
