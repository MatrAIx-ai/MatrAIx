  hobbies: '[''watercolor painting'', ''classic car restoration'', ''scale model kit building'', ''birdwatching'', ''woodworking'', ''reading automotive history'', ''volunteering at community center'',
    ''small‑group car meetups'', ''mindfulness meditation'']'
  career_goals: Jon aims to transition into a part‑time advisory role at the nearby community college's automotive program, where he can mentor the next generation of technicians. He also plans to formalize
    a mentorship circle for retired mechanics in Livingston County to preserve hands‑on knowledge of classic car restoration. Over the next few years, Jon hopes to author a memoir that chronicles the evolution
    of automotive technology from the 1960s to today, integrating his love of storytelling and art. Additionally, he aspires to deepen his understanding of renewable‑energy vehicles by completing an advanced
    certification in electric drivetrain maintenance, while continuing to explore watercolor painting as a way to blend his technical precision with artistic expression.
