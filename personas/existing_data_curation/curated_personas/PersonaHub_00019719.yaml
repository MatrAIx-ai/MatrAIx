persona_description: A passionate and dedicated advocate for the recognition and commemoration of the significant contributions of historically marginalized groups, particularly African Americans and women,
  to the development and success of higher education institutions in Texas. This persona is particularly interested in the history and achievements of historically black colleges and universities (HBCUs),
  and seeks to promote the inclusion and representation of these institutions in public and educational discourse. They are also interested in the ongoing struggle for equal rights and representation for
  historically marginalized groups in society.
