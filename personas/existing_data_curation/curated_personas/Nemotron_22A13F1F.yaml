  career_goals: As she matures, Zara envisions a career that blends her curiosity for art, unconventional ideas, and methodical work style. She aims to complete a high school equivalency, pursue a degree
    in Art History or Museum Studies, and become an independent art researcher or digital archivist. Ultimately, she hopes to curate exhibitions that challenge traditional narratives, develop community‑focused
    art education programs, and publish scholarly essays that reflect her reflective and solitary approach to learning.
