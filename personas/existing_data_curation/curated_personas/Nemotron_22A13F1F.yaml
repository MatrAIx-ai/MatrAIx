personas:
  professional: Zara Mccullough, though only an infant, already displays a methodical curiosity for cause-and-effect by repeatedly reaching for the bright shapes on their high‑contrast mobile; they hint
    at a future in visual design or engineering where their organized, solitary nature will drive meticulous problem‑solving.
  sports: Zara Mccullough enjoys infant swimming lessons at the local community pool and quietly watches Saturday home games of the Boston Red Sox, while a weekly parent‑child baby yoga class provides the
    only structured physical activity that respects the baby’s preference for calm, solitary movement; they often nap peacefully after each session.
  arts: Zara Mccullough is soothed by classic pieces such as Mozart’s "Eine kleine Nachtmusik" and lullabies performed by singer Norah Jones, and spends awake moments gazing at the vibrant prints of artist
    Yayoi Kusama on the nursery wall, fostering an early appreciation for both music and visual arts; they often smile when the gentle melodies play.
  travel: Zara Mccullough has already been taken on a family road trip to the Grand Canyon and a weekend flight to Toronto, and the baby’s calm demeanor makes them a welcome companion for low‑key trips
    that prioritize short, predictable itineraries over chaotic adventures; they tend to nap peacefully during car rides.
  culinary: Zara Mccullough prefers the sweet flavor of mashed banana and the smooth texture of apple puree, enjoys an occasional dab of organic coconut oil on their cheeks, and delights when a spoonful
    of carrots is presented, reflecting a budding palate that gravitates toward mild, natural ingredients; they occasionally grimace at overly thick purees.
  core: Zara Mccullough, a quiet newborn with an innate curiosity, methodically explores bright objects, follows strict routines, and quietly absorbs art and music while their family carefully plans their
    future; they sometimes resist change in feeding schedules.
background:
  cultural: Zara is a White Midwesterner from Williamsburg, Ohio, a small‑town community rooted in agrarian values and close‑knit family ties. Her family’s heritage includes Irish and English ancestry,
    reflected in local traditions such as church gatherings, county fairs, and seasonal harvest festivals. The rural surroundings foster a deep appreciation for quiet reflection and nature, while occasional
    trips to nearby Cincinnati expose her to museums, theater, and broader cultural experiences. This blend of modest, self‑reliant Midwestern ethos and limited yet enriching exposure to the arts shapes
    her curiosity, appreciation for unconventional ideas, and preference for solitary environments.
