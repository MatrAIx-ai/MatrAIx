  career_goals: Javier dreams of attending an arts‑focused high school to deepen his abilities in graphic design and animation. Long‑term, he hopes to become a multimedia artist or video game designer,
    creating games and digital content that celebrate his Mexican heritage while reaching a broad audience. He also aspires to give back to his community by leading youth art workshops and helping preserve
    local cultural traditions.
