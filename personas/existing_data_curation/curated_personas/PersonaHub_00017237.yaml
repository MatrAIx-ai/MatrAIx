persona_description: Linda Hecker, a Lead Educational Specialist with extensive experience in teaching and research, is presenting two topics at the 2013 Brain Symposium in Honolulu, Hawaii. She is a founding
  faculty member of Landmark College and will be introducing classroom-tested strategies to foster self-regulation among students lacking essential study skills. Her workshops focus on teaching study skills,
  reading and writing strategies, and the challenges presented by these tasks for students with learning disabilities and attention disorders. She will also be exploring effective reading and writing instructional
  practices that promote academic success for secondary and postsecondary students with learning disabilities and attention disorders. Her workshops are part of the annual Brain Symposium hosted at Punahuo
  School in Honolulu, Hawaii.
