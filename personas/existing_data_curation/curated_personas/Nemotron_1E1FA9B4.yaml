personas:
  professional: Cecilia Lefebvre, an aspiring junior comic writer and illustrator, blends vivid storytelling, detailed LEGO design, and beginner Scratch coding skills, using their boundless imagination
    and sociable nature to lead group projects, and they captivate classmates during school presentations.
  sports: Cecilia Lefebvre enjoys after‑school soccer with the local junior Tigers club, practices swimming at the community pool, proudly cheers on the nearby professional basketball team the Chicago Bulls,
    and values active play during recess, though they sometimes neglect warm‑up stretches before games.
  arts: 'Cecilia Lefebvre devotes hours to drawing comic strips inspired by the dynamic panels of ''Avatar: The Last Airbender'' and the witty humor of Mo Willems, reads fantasy novels by JK Rowling, acts
    in school plays channeling the expressive style of Lin‑Manuel Miranda, and they fill their playlists with kid‑friendly pop tracks like Taylor Swift’s ''Shake It Off''.'
  travel: Cecilia Lefebvre has explored the local science museum, taken a family road trip to Washington DC's National Air and Space Museum, dreams of visiting the Harry Potter Studio Tour in London and
    the coral reefs of Fiji, and prefers travel itineraries that mix organized museum tours with spontaneous beach sandcastle contests, which never fail to excite them, and they always request another destination
    for the next trip.
  culinary: Cecilia Lefebvre loves classic pizza with pepperoni, makes their own cheesy mac‑and‑cheese using elbow pasta and cheddar, enjoys assembling strawberry‑banana smoothies with Greek yogurt, and
    has recently mastered simple scrambled eggs seasoned with a pinch of salt, though they still often leave a trail of flour on the kitchen counter.
  core: Cecilia Lefebvre is a nine‑year‑old imagination powerhouse who turns everyday moments into epic comic adventures, balances meticulous LEGO constructions with lively volunteering at the library,
    and occasionally hoards crayons while neglecting bedtime, leaving them bleary‑eyed at school, and they often rely on a glass of milk before drifting off.
background:
  cultural: Cecilia grew up in the suburbs of Joliet, Illinois, a Midwestern community known for its friendly, close‑knit neighborhoods and strong emphasis on community involvement. Her family celebrates
    typical American holidays such as Thanksgiving and the Fourth of July, and also embraces a touch of French‑Canadian heritage reflected in occasional traditional dishes and stories passed down through
    generations. She participates in local cultural activities like the Joliet Art Fair, visits the Area Historical Museum, and attends a public elementary school where she interacts with a diverse group
    of classmates, fostering an appreciation for different cultures and communal harmony.
attributes:
  skills: '[''Creative writing'', ''Illustration'', ''Storytelling'', ''Basic programming (Scratch)'', ''Group activity facilitation'', ''Empathy and conflict mediation'', ''Organizational skills'', ''Reading
    comprehension'']'
  hobbies: '[''Drawing and illustration'', ''Creative writing (stories and comics)'', ''Reading fantasy and mystery books'', ''Building LEGO structures'', ''School drama club and acting'', ''Strategy board
    games'', ''Simple coding with Scratch'', ''Science experiments (volcano, slime)'', ''Community volunteering (library events)'']'
  career_goals: While still young, Cecilia dreams of becoming a children's author and illustrator who can bring fantastical worlds to life, hopes to one day work in a museum or community center where she
    can blend art and education, and aspires to lead creative projects that bring people together and celebrate imagination.
