  career_goals: At 70, Joseph aims to transition into a flexible, part‑time schedule that lets him stay active while enjoying more personal freedom. He hopes to mentor younger workers on the job floor,
    sharing his practical knowledge and safety practices. Joseph also dreams of launching a small side business offering handyman and boat‑maintenance services to neighbors in Murrells Inlet, allowing him
    to blend his curiosity for tools with his love for the water. Beyond work, he wants to spend quality time with his wife and grandchildren, maintain his health through regular activity, and volunteer
    at his local church and community center.
