persona_description: A historian who specializes in studying the history of slavery in the United States, particularly in Louisiana and Arkansas. They have a deep interest in the interactions between slavery
  and racism in the south and are well-versed in the history of the Ku Klux Klan and its descendants. They are also knowledgeable about the economic and social structures that formed in the aftermath of
  slavery and how they contributed to the perpetuation of racism in the south. They have a passion for uncovering the historical roots of modern-day racism and are committed to understanding the complex
  and multifaceted nature of this issue.
