  career_goals: Jenny aims to remain an active, independent member of her community while deepening her contributions. She plans to expand her volunteer work at the local senior center, eventually leading
    a wellness‑program for older adults that combines gentle exercise, nutrition advice, and social activities. She hopes to mentor younger volunteers, sharing her organized approach to event planning and
    caregiving. Continuing her curiosity, she wants to improve her digital skills to stay connected with distant family and to digitize her family’s photo albums and genealogical records. She aspires to
    document her life story in a memoir or scrapbook that preserves her family’s heritage for future generations, and she seeks to advocate for senior safety measures in Boone County by joining a local
    advisory board.
