personas:
  professional: Ileana Olavarria is a cost estimator who transforms construction drawings into exhaustive Excel models and specialized software forecasts, leveraging bilingual Spanish‑English fluency to
    negotiate with diverse vendors while balancing their love for structured processes with a flexible, cooperative approach to shifting project realities.
  sports: Ileana Olavarria paddles with the Indian River Kayak Club on weekends, supports the Miami Heat and Miami Marlins as an avid fan, and keeps fit through sunrise yoga and occasional beach volleyball
    games with a small circle of friends, preferring low‑impact, socially intimate sport activities that suit their reserved disposition.
  arts: Ileana Olavarria paints tranquil watercolors of the Florida coast inspired by the palette of Georgia O'Keeffe, finds solace in reading historical fiction by Ken Follett, and regularly visits the
    Norton Museum of Art to study works by contemporary Latin American painters, allowing the visual arts to inform their creative problem‑solving at work.
  travel: Ileana Olavarria prefers spontaneous day trips to nearby natural gems like the Everglades and the Key West artist colonies, while dreaming of an organized cultural immersion in Oaxaca and a serene
    pilgrimage to Kyoto's tea gardens, balancing travel budgets with their savings goals for certification.
  culinary: Ileana Olavarria cooks traditional dishes such as cochinita pibil and chile‑ripe enchiladas, often fusing them with Floridian seafood like shrimp ceviche with mango salsa, displaying an intermediate
    culinary skill level that shines in their modest garden’s fresh cilantro, tomatoes, and native herbs.
  core: Ileana Olavarria blends disciplined cost‑estimating expertise with a laid‑back love for watercolor art, kayaking, and bilingual mentorship, navigating life with structured ambition tempered by a
    delightfully relaxed, sometimes disorganized, personal rhythm that they readily embrace.
background:
  cultural: Ileana is the daughter of Mexican immigrants who settled in Florida when she was a child. Raised bilingual, she celebrates Mexican holidays like Día de los Muertos and enjoys sharing traditional
    foods with friends and coworkers. Her cultural heritage informs her work ethic—valuing reliability, family‑like teamwork, and clear communication. She often leverages her Spanish fluency to bridge language
    gaps between contractors and suppliers, fostering trust and smoother project negotiations. While she has built a life in Indiantown, she maintains regular connections with her extended family in Mexico
    through video calls and visits, and she participates in local Latinx community events that celebrate her heritage.
attributes:
  skills: '[''Cost Estimation methodologies'', ''Construction blueprint interpretation'', ''Excel & advanced spreadsheet modeling'', ''Data analysis and statistical forecasting'', ''Budget development and
    control'', ''Vendor and subcontractor negotiation'', ''Technical report writing'', ''Bilingual communication (Spanish/English)'', ''Estimating software (Sage Estimating, Procore, RSMeans)'', ''Collaborative
    team coordination'']'
  hobbies: '[''Reading historical fiction'', ''Watercolor painting'', ''Kayaking in the Indian River Lagoon'', ''Cooking Mexican cuisine'', ''Yoga practice'', ''Volunteer Spanish tutoring'', ''Gardening
    native plants'', ''Visiting local museums and galleries'']'
  career_goals: Ileana aims to become a certified professional estimator within the next three years, obtaining the AACE Certified Estimating Professional (CEP) credential. She plans to lead a regional
    cost estimating team for a mid‑size construction firm in South Florida, focusing on sustainable residential projects. In the longer term, she envisions launching a boutique consultancy that helps small
    developers and remodelers incorporate green building practices while maintaining cost efficiency. She also wants to mentor junior estimators, especially those from bilingual backgrounds, to broaden
    industry diversity.
