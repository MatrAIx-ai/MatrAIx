    and mural coordination'', ''Photographic documentation of site work'']'
  hobbies: '[''Street photography'', ''Visiting murals and galleries'', ''Small‑engine restoration'', ''Scale model building'', ''Cooking Mexican cuisine'', ''Participating in Día de los Muertos festivals'',
    ''Hiking in Angeles National Forest'', ''Listening to regional Mexican music'', ''Reading mechanical and engineering manuals'', ''Volunteering for community art installations'']'
  career_goals: Jose aims to earn a Certified Equipment Operator credential and move into a foreman role, overseeing larger crews while mentoring younger operators. He plans to eventually launch a modest
    equipment‑rental business that also supports community art projects, such as providing machinery for local mural installations and public sculptures. Securing enough savings for a comfortable retirement
    and purchasing a small workshop space for hobby projects are also key goals. He hopes to combine his technical expertise with his love of art by collaborating with local artists and cultural organizations.
