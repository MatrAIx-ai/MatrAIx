personas:
  professional: A seasoned heavy‑equipment operator named Jose Nahmad leverages three decades of excavator, bulldozer and crane expertise, meticulous OSHA‑compliant maintenance routines, and a methodical,
    curiosity‑driven eye for visual composition to position machinery for large‑scale mural installations while steadily guiding a small crew toward his foreman ambitions.
  sports: An avid hiker and occasional recreational cyclist, Jose Nahmad regularly tackles the trails of Angeles National Forest, follows the LA Dodgers baseball season religiously, and, when time permits,
    joins a senior‑friendly basketball pickup league that includes fans of the LA Lakers.
  arts: A passionate chronicler of Los Angeles’ street art, Jose Nahmad spends weekends photographing murals by artists such as Shepard Fairey and emerging local talents, volunteers to set up scaffolding
    for community mural projects, and unwinds to the sounds of regional Mexican bands like Los Tigres del Norte while attending Día de los Muertos festivals.
  travel: A methodical planner with a love for solitary reflection, Jose Nahmad prefers road‑trip itineraries that blend scenic drives along the Pacific Coast Highway with stops at cultural hotspots such
    as Oaxaca for its vibrant culinary scene and the desert expanses of Joshua Tree, while he dreams of future visits to Barcelona to study its famed mural districts.
  culinary: An intermediate home cook, Jose Nahmad regularly prepares tamales stuffed with pork and chilies, slow‑simmered mole negro using dried pasilla and ancho chiles, and experimental masa‑based street‑food
    fusions, favoring fresh corn masa harina, roasted cacao, and a pinch of cinnamon to honor family flavors while occasionally treating himself to upscale Mexican‑fusion restaurants.
  core: Jose Nahmad merges a meticulous, safety‑first construction mindset with a restless curiosity for street art, juggling heavy‑machine precision and mural‑photography on weekends while habitually checking
    equipment manuals and, at times, neglecting his own health check‑ups.
background:
  cultural: Jose grew up in a Mexican‑American household in the Los Angeles area, speaking Spanish at home and English at work. The strong community ties of Rosemead and nearby East Los Angeles exposed
    him to traditional celebrations like Día de los Muertos, quinceañeras, and local festivals that blend Mexican heritage with Southern California culture. His family emphasized hard work, humility, and
    respect for elders, values that shaped his reliable and methodical approach to his job. While he never completed formal schooling beyond the eighth grade, he learned trades on the job and through mentorship.
    The vibrant mural tradition of the city sparked his appreciation for visual art, and he often incorporates that perspective into his work, especially when positioning equipment for public art projects.
    Catholic traditions and family gatherings remain a central part of his life, reinforcing his connection to his roots.
