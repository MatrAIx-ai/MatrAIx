  hobbies: '[''Painting'', ''Pottery'', ''Visiting art museums'', ''Reading art and science books'', ''Gardening'', ''Hiking'', ''Community theater volunteering'', ''Craft workshops'', ''Book club'', ''Baking
    artisanal breads'', ''Traveling to cultural sites'', ''Library storytime volunteering'', ''Zumba classes'']'
  career_goals: Eva aims to become a lead teacher and curriculum specialist within her district, championing a district‑wide STEAM program for preschool and kindergarten classrooms. She plans to pursue
    a master's degree in early childhood education to deepen her expertise in developmental psychology and teacher wellness, hoping to develop resources that help educators manage stress and foster resilience.
    Long‑term, she envisions opening a community‑based early learning center that emphasizes inclusive, art‑rich, and inquiry‑driven learning, while also mentoring new teachers and advocating for policies
    that support mental health in early education settings.
