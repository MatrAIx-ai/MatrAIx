personas:
  professional: Eva Etzold, a seasoned early childhood educator, merges STEAM curriculum design with meticulous lesson planning; they channel their artistic curiosity and organized mindset into immersive,
    inquiry‑driven classrooms while assertively championing teacher wellness across the district.
  sports: Eva Etzold hikes the Cuyahoga Valley trails, leads energetic Zumba sessions at the community center, and avidly follows the Cleveland Guardians, Browns, and Cavaliers; they also join a weekend
    cycling group that explores Lake Erie’s shoreline.
  arts: Eva Etzold spends Saturdays painting watercolors of Monet’s lily pads, evenings shaping pottery inspired by Georgia O'Keeffe, and volunteers backstage for local productions of "The Music Man"; they
    regularly attend exhibitions at the Cleveland Museum of Art and enjoy folk‑rock tunes by Maggie Rogers.
  travel: Eva Etzold favors meticulously planned cultural trips, having toured the Louvre in Paris, the Zen gardens of Kyoto, and Tuscany’s vineyards, while also savoring weekend retreats to Ohio’s Amish
    farms and the Green Mountains of Vermont; they balance these adventures with family responsibilities and a modest travel budget.
  culinary: Eva Etzold bakes sourdough loaves with heirloom flours, crafts garden‑fresh bruschetta with tomatoes, basil, and garlic, and experiments with kimchi‑style fermented carrots, showcasing an intermediate
    culinary skill set that blends homegrown produce with global flavors.
  core: Eva Etzold is a curiosity‑driven, organized community advocate who blends art, education, and gardening into a vibrant life, even as they grapple with worry‑induced over‑planning and occasional
    back‑pain.
background:
  cultural: Eva was raised in a Midwestern white family with deep German roots, reflected in her surname Etzold. Growing up in Akron, Ohio, she absorbed the region's values of hard work, community involvement,
    and appreciation for both industrial heritage and natural landscapes. Family traditions include celebrating Oktoberfest with homemade pretzels and music, and a strong emphasis on education and civic
    responsibility. Her cultural identity blends the pragmatic, friendly spirit of the Rust Belt with an appreciation for German cultural expressions, informing her inclusive teaching style and community‑oriented
    activities.
