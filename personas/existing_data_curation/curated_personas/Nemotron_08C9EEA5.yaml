  career_goals: Even at three, Mary often talks about wanting to "help the trees" and imagines herself as a forest ranger or a caretaker who protects nature. She also enjoys showing her stuffed animals
    how to build forts, hinting at a future interest in teaching or guiding others. Her ambitions are guided by a blend of curiosity about the natural world and a desire for flexible, hands‑on roles that
    let her stay close to the outdoors.
