personas:
  professional: A budding problem solver named Mary Davis loves exploring cause-and-effect through building blocks, balancing imaginative experiments with practical constraints like fitting pieces together,
    and proudly declares themselves a 'mini engineer' while they insist on nap time when play gets too chaotic.
  sports: A three-year-old like Mary Davis enjoys the sandbox and toddler-sized soccer sessions with the local community center's 'Mini Kickers' club, cheering for the nearby professional baseball team
    the Chicago Cubs, while they prefer to play in small, supportive groups rather than large crowds.
  arts: Mary Davis loves watching the animated series 'Bluey', dancing to the catchy tunes of the child-friendly album 'Songs from the Playground' by Jazz Kids, and frequently recreates simple drawings
    of dinosaurs, which fuels their creative expression and shapes their playful identity, and they often perform impromptu concerts for family members.
  travel: Having taken a weekend road trip to the seaside with her family, Mary Davis collected seashells, splashed in shallow waves, and now dreams of visiting Disneyland, cherishing the excitement of
    new environments while they prefer short, familiar journeys over long, solitary travels.
  culinary: A fan of mac and cheese, strawberry slices, and chicken nuggets, Mary Davis eagerly helps stir batter in the kitchen, but often spills milk on the floor, reflecting a love for tasty comfort
    foods paired with a slightly messy approach to cooking, and they proudly claim the mess is part of the fun.
  core: Mary Davis is a curious yet laid-back three-year-old who balances creative play with the comfort of routine, often drifting between intense focus and day-dreaming, and their habit of leaving toys
    scattered mirrors a relaxed approach to obligations, and they happily embrace each new discovery.
background:
  cultural: Mary is a White child raised in Cave Junction, a small town in Josephine County, Oregon, where the Pacific Northwest’s forested landscape heavily influences daily life. Her family participates
    in local community traditions such as seasonal fairs, berry‑picking outings, and hiking trips, fostering a strong appreciation for nature and self‑reliance. While celebrating common American holidays,
    they also value modest, close‑knit family bonds and an outdoors‑oriented lifestyle that shapes Mary’s worldview and nurtures her love of the natural world.
