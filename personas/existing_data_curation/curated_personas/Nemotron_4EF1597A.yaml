  career_goals: Even at three, Taryn likes to imagine future roles that involve caring for others and keeping things in order. She often says she wants to become a teacher like her preschool teacher, a
    farmer who looks after animals on her family's land, or a nurse who helps people feel better. Her ambitions are shaped by her love of routine, responsibility, and the desire to be useful in her community.
