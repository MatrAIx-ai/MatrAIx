personas:
  professional: An early architect in training, Taryn Bye, a three-year-old with a love for routine, meticulously lines up bright building blocks in perfect rows; they demonstrate methodical planning and
    a reliable, organized spirit that hints at a future in design.
  sports: A budding athlete, Taryn Bye, a three-year-old, sprints around the local playground, proudly wears a tiny New York Yankees cap, attends the Tiny Tots Soccer Club (U4) on weekend mornings, and
    they eagerly mimic their favorite player’s high-five celebration, all while balancing energetic play with occasional quiet nap time.
  arts: A miniature art lover, Taryn Bye, a three-year-old, spends hours finger-painting rainbows beside a chalkboard adorned with crayons, sings along to Sesame Street's C is for Cookie, and they curate
    a tiny collection of favorite storybooks featuring Dr. Seuss, Pixar's Toy Story, and the whimsical songs of The Wiggles, reflecting a vibrant creative spark guided by routine bedtime story sessions.
  travel: A curious explorer, Taryn Bye, a three-year-old, delights in weekly family trips to the local zoo, reminisces about a magical weekend at Disneyland, and they eagerly point to pictures of Paris'
    Eiffel Tower in storybooks, dreaming of future adventures while preferring familiar routes and the comfort of their stroller.
  culinary: A selective foodie, Taryn Bye, a three-year-old, adores cheesy macaroni, chicken nuggets dipped in honey mustard, and strawberry slices, but they stubbornly refuse broccoli, proudly mastering
    the skill of stirring batter with a plastic spoon, and they insist on eating meals at a tidy, child-size table arranged exactly as per their routine.
  core: Taryn Bye, a three-year-old routine-loving builder, obsessively lines up blocks in perfect rows, hoards crayons, and they cling to a stuffed rabbit for comfort, turning everyday moments into meticulous
    mini-projects.
background:
  cultural: 'Taryn grows up in a white, Midwestern family in interior Pennington County, South Dakota. Her upbringing reflects the practical, community‑oriented values common in rural South Dakota: a focus
    on self‑reliance, respect for routine, and an appreciation for the outdoors. Family gatherings often involve simple homemade meals and local traditions such as the county fair and school holiday celebrations.
    The local culture emphasizes modesty, cooperation, and a connection to the land, which shapes her early worldview.'
