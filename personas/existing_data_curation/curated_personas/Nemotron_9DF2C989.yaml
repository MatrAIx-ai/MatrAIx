  career_goals: Daniel aims to re-enter the workforce in a role that capitalizes on his analytical strengths and curiosity for innovative ideas, such as a business analyst or strategy consultant at a forward-thinking
    firm or a tech-driven startup. Within the next year he plans to earn a Project Management Professional (PMP) certification and deepen his data-science skill set. His longer-term ambition is to launch
    a culturally-focused e-commerce platform that connects Mexican artisans with U.S. consumers, blending his appreciation for art with his business acumen. He envisions progressing to a senior strategist
    position, and eventually becoming the founder and CEO of his own socially responsible venture.
