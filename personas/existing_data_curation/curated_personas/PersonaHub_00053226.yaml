persona_description: A planetary scientist with expertise in mass spectrometry, particularly in the development and implementation of new instrumentation for small spacecraft payloads. This person has experience
  with mass spectrometry in spacecraft missions, including the Rosetta lander Philae and the Beagle2 mission, and is currently working on developing a new generation of mass spectrometers for future missions.
  They are focused on reducing the mass and power requirements of these instruments, and are interested in using smaller instruments to explore the surface of Europa and permanently shaded lunar regions.
