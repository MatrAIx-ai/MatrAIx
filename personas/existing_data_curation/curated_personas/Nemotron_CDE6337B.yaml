personas:
  professional: Reginald Peoples is a 27‑year‑old computational mathematician and engineering professor at a Midwestern university who blends advanced data analytics with contemporary visual art, designing
    interdisciplinary curricula, securing NSF grants, and leading vibrant research labs while thriving as a charismatic public speaker and mentor.
  sports: Reginald Peoples, a devoted fan of the Milwaukee Bucks and Chicago Bears, spends weekends shooting hoops in the university intramural basketball league, trekking the Driftless Area’s bluffs with
    the local Driftless Trailblazers hiking club, and follows the Chicago White Sox’s spring training while regularly attending community pick‑up games.
  arts: Reginald Peoples, an avid saxophonist in a local jazz ensemble and improv actor at Chicago’s iO theater, regularly attends openings featuring Theaster Gates and Julie Mehretu at the MCA Chicago,
    captures the Driftless Area’s misty bluffs through digital photography reminiscent of Ansel Adams, and curates personal playlists of John Coltrane and Miles Davis to fuel their creative workflow.
  travel: Reginald Peoples, a spontaneous planner who balances tight research budgets with a thirst for cultural immersion, frequently explores the Upper Peninsula’s Lake Superior shoreline, weekend‑hikes
    the Ozark mountains, has toured New York’s museum district, and dreams of photographing Kyoto’s temples and the Dolomites’ limestone peaks while sampling Southern cuisine in New Orleans.
  culinary: Reginald Peoples, a competent home chef, often prepares Southern‑inspired feasts of shrimp and grits, smoked collard greens, and Cajun jambalaya seasoned with smoked paprika, dried thyme, and
    cayenne, while exploring modern twists like beet‑infused biscuits and pairing meals with craft microbrews from Wisconsin’s local breweries.
  core: Reginald Peoples is a relentlessly curious, talk‑heavy academic who fuels interdisciplinary work with late‑night hackathon marathons, a habit of over‑booking gallery openings, and a competitive
    streak that sometimes overshadows collaborative spirit.
background:
  cultural: Reginald identifies as African American and draws on a family legacy rooted in the civil‑rights era South, with traditions of gospel music, storytelling, and communal support. Raised in a multigenerational
    household that prized education and resilience, he now blends that heritage with the small‑town Midwestern culture of Darlington, Wisconsin. He actively participates in local Black cultural events,
    mentors Black undergraduate students in STEM, and weaves his identity into his teaching by highlighting contributions of Black scientists and artists. His worldview melds the rich tapestry of African‑American
    cultural identity with the pragmatic, community‑oriented spirit of rural Wisconsin.
attributes:
  skills: '[''Computational Modeling'', ''Data Analytics (Python, R, MATLAB)'', ''Applied Mathematics'', ''Curriculum Design (STEM‑Art Integration)'', ''Public Speaking'', ''Grant Writing'', ''Research
