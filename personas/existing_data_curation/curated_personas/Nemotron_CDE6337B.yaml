  hobbies: '[''Contemporary Art Gallery Visits'', ''Saxophone (Jazz Ensemble)'', ''Improv Theater'', ''Digital Photography'', ''Hiking (Driftless Area)'', ''Intramural Basketball'', ''Hackathons'', ''Generative
    Art Coding'', ''Southern Cooking'', ''Community STEM Mentorship'']'
  career_goals: Reginald aims to launch a flagship interdisciplinary course that marries algorithmic design with digital art, secure a multi‑year NSF grant to establish a research lab focused on creative
    computing, and publish a series of peer‑reviewed articles on the pedagogy of art‑infused STEM education. In the next five years he envisions promotion to associate professor with tenure and taking on
    a leadership role as program coordinator for undergraduate research initiatives. Long‑term, he aspires to become department chair or director of a regional STEM‑arts innovation hub, and eventually spin
    out a start‑up that delivers immersive educational‑technology tools for underrepresented students.
