  hobbies: '[''Gardening'', ''Quilting'', ''Birdwatching'', ''Reading historical fiction'', ''Cooking'', ''Walking trails'', ''Community volunteering'', ''Genealogy research'', ''Digital photography'',
    ''Church choir'']'
  career_goals: While retired, Karina continues to set meaningful goals that reflect her curiosity and practical mindset. She aims to expand her volunteer leadership at the local senior center, mentor younger
    volunteers, and develop a community garden program for seniors. She wishes to complete a memoir that interweaves her family's genealogy with stories of Springfield, and to learn digital photography
    to document her garden and local events. Karina also hopes to travel to neighboring historic sites and state fairs, and to maintain her health and independence through regular walking and balanced nutrition.
