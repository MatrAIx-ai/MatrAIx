  hobbies: '["Reading historical nonfiction and literary fiction","Gardening (vegetable and herb garden)","Baking artisan breads and pastries","Gentle yoga and mindfulness practice","Weekend nature walks
    along the Charles River","Photography of Cambridge architecture and seasonal scenes","Volunteering at a community food pantry","Small‑group book club meetings"]'
  career_goals: Paula aims to attain a senior management role, such as Regional Sales Manager or Director of Sales Operations, where she can influence broader strategy and mentor emerging talent. She plans
    to complete her bachelor's degree in Business Administration and acquire the Certified Professional Sales Leader (CPSL) credential. Long-term, she hopes to transition part of her career into the nonprofit
    sector, applying her sales expertise to fundraising and community outreach, while continuing to champion women’s professional development.
