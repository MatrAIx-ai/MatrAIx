  career_goals: Although retired, Ting is motivated to remain mentally active and to make a tangible impact on her community. She aims to design and lead intergenerational STEM workshops at the Saint Paul
    Public Library, mentor senior volunteers who wish to acquire new tech skills, and publish a set of accessible guidebooks that blend practical engineering problem-solving with everyday household projects
    for older adults. Ting also aspires to secure a small community grant to fund a garden-based science program for local schools, and to travel to her ancestral hometown in China to document family history
    and culinary traditions before she retires fully from active projects. Maintaining her health through regular tai chi practice and mindfulness is a personal priority.
