personas:
  professional: James Hinton, a 17‑year‑old aspiring automotive technician, blends his self‑taught small‑engine repair talent, woodworking knack, and love for practical problem‑solving with a relaxed, improvisational
    attitude, making them the go‑to teen for quick fixes and experimental solar‑powered charging prototypes in their rural community.
  sports: James Hinton, a high‑school basketball player, drills at the town gym after school, follows the Mississippi State Bulldogs, hunts deer in the fall, casts their line on the Yazoo River for weekend
    fishing trips, and drops by the local skate park on their skateboard to stay agile and unwind.
  arts: James Hinton, an avid listener of Delta blues legends like Muddy Waters and country icons such as Johnny Cash, strums a second‑hand acoustic guitar at family gatherings, snaps rustic sunrise photos
    of the Yazoo River on their phone, and shares short DIY video tutorials that blend folk storytelling with modern social‑media flair, reflecting their creative hands‑on spirit.
  travel: James Hinton prefers spur‑of‑the‑moment road trips over meticulous itineraries, has spent school breaks cruising the Natchez Trace to the Gulf Coast beaches, and hopes to one day fish the icy
    waters of Alaska’s Kenai River once their mobile repair business funds the adventure.
  culinary: James Hinton, who favors hearty Southern comfort food, often cooks fried catfish with hush‑puppies and coleslaw using a seasoned cast‑iron skillet, experiments with a pinch of Cajun spice on
    backyard BBQ ribs, and relies on simple step‑by‑step recipes they found online while occasionally ordering pizza after late‑night gaming sessions.
  core: James Hinton, a 17‑year‑old fishing‑obsessed, guitar‑strumming, DIY‑minded teen, balances a laid‑back, slightly disorganized lifestyle with a keen drive to turn their hands‑on passions into a future
    mobile auto‑service venture.
background:
  cultural: James is a white Southern teenager raised in Bentonia, Mississippi, a small community in the heart of the Delta. His family’s roots are tied to the region’s agricultural and blues traditions,
    and he grew up attending the local Baptist church where community and hospitality are core values. The historic blues heritage of Bentonia influences his musical taste and his appreciation for storytelling
    through song. The rural setting instills a strong work ethic, self‑reliance, and a pragmatic outlook shaped by limited local economic opportunities. While he embraces the tight‑knit, faith‑centered
    community spirit, he also looks outward, curious about new technologies and broader career paths.
attributes:
  skills: '[''basic automotive repair'', ''lawn‑mower and small engine troubleshooting'', ''woodworking and basic carpentry'', ''simple cooking techniques'', ''basic computer and smartphone troubleshooting'',
