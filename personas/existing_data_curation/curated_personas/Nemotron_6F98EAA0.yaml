personas:
  professional: Rebecca Ragland, a 48‑year‑old security and surveillance officer with a background in education, fuses meticulous CCTV monitoring, real‑time threat assessment, and first‑aid expertise with
    a natural talent for public speaking to mentor casino staff and spearhead a training curriculum that blends technical vigilance with compassionate conflict de‑escalation.
  sports: Rebecca Ragland stays fit by hiking the rolling trails of northern Indiana with the Indy Trail Runners club, joins a co‑ed indoor pickleball league at the local community center, roots for the
    Indianapolis Colts on Sundays, catches Pacers games on weeknights, and cheers on the Indianapolis Indians during spring training.
  arts: Rebecca Ragland expresses her curiosity through watercolor landscapes inspired by Georgia O'Keeffe, captures moody urban nightscapes reminiscent of Gregory Crewdson, drinks tea while listening to
    Joni Mitchell and The War on Drugs, and attends monthly exhibition openings at the Indianapolis Museum of Art to stay connected to both classic and contemporary creators.
  travel: Rebecca Ragland plans her trips with spreadsheets that schedule guided museum tours in Paris and Florence, slots a weekend road‑trip to the Great Smoky Mountains, reserves a night‑time photography
    workshop in Reykjavik, and balances these cultural pursuits with spontaneous stays at the Indiana dunes, always aiming for a mix of art immersion and natural adventure while keeping an eye on the travel
    budget.
  culinary: Rebecca Ragland, a competent home cook, masters rosemary‑infused grilled salmon with quinoa and roasted beets for a healthy dinner, delights in whipping up a raspberry cheesecake for gatherings,
    treats herself to nacho platters loaded with jalapeños after poker nights, and regularly dines at farm‑to‑table bistros where heirloom tomatoes, fresh basil, and locally sourced artisanal cheeses star
    on the menu.
  core: Rebecca Ragland balances a meticulously organized security mind with a thriving artistic soul, over‑analyzes risks by day while chasing city lights with her camera at night, and habitually double‑checks
    every checklist—except the one reminding her to get enough sleep.
background:
  cultural: Rebecca grew up in a small Midwestern town in Indiana within a white, working‑class family that valued community, modesty, and a strong work ethic. Her upbringing reflected traditional Midwestern
    Protestant roots, emphasizing neighborliness, self‑reliance, and participation in local events such as county fairs and high‑school sports. These cultural influences fostered her sociable nature and
    commitment to helping others, while the region’s appreciation for folk art and craftsmanship nurtured her curiosity about visual arts. Although grounded in local traditions, Rebecca remains open to
    broader cultural currents, blending her regional identity with a lifelong appetite for new ideas and unconventional perspectives.
attributes:
  skills: '[''CCTV operation and monitoring'', ''Real‑time threat assessment'', ''Incident reporting and documentation'', ''Conflict de‑escalation'', ''First aid and mental‑health first aid'', ''Staff training
    and mentorship'', ''Public speaking and presentation'', ''Community outreach and communication'', ''Attention to detail and pattern recognition'', ''Adaptable problem‑solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Urban photography'', ''Toastmasters public speaking'', ''Volunteering at a crisis helpline'', ''Yoga and mindfulness meditation'',
    ''Reading contemporary fiction and psychology'', ''Playing poker and card games'', ''Participating in trivia nights'', ''Hiking regional trails'']'
  career_goals: Rebecca aims to advance to a supervisory or managerial role within a casino‑surveillance department, where she can shape security policy and lead a team. She plans to earn a Certified Loss
    Prevention Professional (CLPP) credential and develop a specialized training curriculum that blends technical surveillance skills with compassionate communication and stress‑management techniques. Long‑term,
    she envisions transitioning into museum or cultural‑venue security consulting, allowing her to protect artistic works while indulging her love of art, and eventually launching a community‑focused safety
    education consultancy.
