  career_goals: At 69, John aims to transition from full‑time adjusting to a consulting and mentorship role, offering expert testimony in court and training programs for new adjusters in Florida. He seeks
    to codify best‑practice guidelines for handling natural‑disaster claims, contributing to industry standards and helping his agency adopt more predictable, streamlined processes. He also plans to author
    a practical handbook on claim appraisal that blends his engineering background with real‑world insurance experience, ensuring his knowledge is preserved for future generations.
