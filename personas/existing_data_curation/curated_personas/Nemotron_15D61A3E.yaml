  hobbies: '["Birdwatching", "Gardening", "Model Shipbuilding", "Woodworking", "Reading Historical Non-Fiction", "Crossword Puzzles", "Sudoku", "Nature Photography", "Early Morning Beach Walks", "Stargazing",
