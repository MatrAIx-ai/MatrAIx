  career_goals: Over the next few years, Brandon aims to move into a senior market‑research manager role where he can lead an insights team and shape strategic direction for a mid‑size firm. He also envisions
    building a side consultancy that offers flexible, freelance research services to local startups, allowing him to balance financial stability with the freedom he values. In the longer term, he hopes
    to author a practical guide on consumer insights for non‑technical audiences and perhaps teach part‑time at a community college, leveraging his collaborative nature while easing the stress of high‑pressure
    corporate deadlines.
