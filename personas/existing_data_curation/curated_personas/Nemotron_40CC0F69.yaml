personas:
  professional: Brandon Glade, a market‑research veteran with 20+ years of hands‑on experience, leverages advanced Excel, SPSS, and basic R to translate survey data into consumer‑focused narratives while
    delighting stakeholders with their talkative, improv‑honed storytelling style, even as their relaxed approach to deadlines occasionally leads to last‑minute scramble.
  sports: Brandon Glade is a die‑hard fan of the Columbus Blue Jackets and Columbus Crew, regularly attending games at Nationwide Arena and Lower.com Field, while they also join the local darts league at
    the neighborhood bar and head to Lake Erie’s shoreline for occasional bass fishing with a trusty spinning rod.
  arts: Brandon Glade thrives on community‑theater stages and improv workshops, frequently performing sketches inspired by classic comedians like Tina Fey and Dave Chappelle, and they are known to quote
    lines from mystery novels during rehearsals, blending their love for mystery narratives with on‑stage spontaneity.
  travel: Brandon Glade favors short, spontaneous road trips to Ohio’s Hocking Hills and Shenandoah National Park, balancing a love for nature with a modest travel budget, yet they keep a bucket list that
    includes a planned week‑long hike through Yellowstone, which they hope to fund with side‑consulting earnings.
  culinary: Brandon Glade delights in sampling food‑truck favorites such as Korean BBQ tacos, truffle‑infused mac & cheese, and fresh fish‑taco wraps, while at home they can skillfully grill a Lake Erie
    perch using lemon, herbs, and a dash of Cajun spice, though they occasionally overindulge in late‑night snack runs after improv sessions.
  core: Brandon Glade is a data‑driven marketing analyst who balances curiosity with a laid‑back, talkative personality, channeling their love for improv, sports, and food‑truck flavors into a socially
    active life that’s tempered by occasional worry and procrastination.
background:
  cultural: Brandon grew up in central Ohio, part of the Midwestern heartland. His family traces its roots to German and Irish immigrants who settled in the region in the late 19th century. Raised in a
    modest, working‑class household, he internalized values of hard work, community involvement, and Midwestern hospitality. Though he never completed a high school diploma, the practical, hands‑on learning
    environment of his community helped him develop the skills needed for a successful career in market research. The blend of traditional Midwestern values with the diverse urban culture of Columbus informs
    his pragmatic yet curious outlook.
attributes:
