persona_description: A professional involved in the development and implementation of food safety and quality standards in the fisheries sector, with a focus on coordinating international efforts and promoting
  mutual recognition of certification schemes. They are likely to be knowledgeable about the ISO, Codex Alimentarius Commission, FAO, OIE, and GFSI organizations and their respective roles in the development
  and enforcement of standards and schemes. They would also have experience in organizing and participating in regional workshops and discussions on food safety and quality issues, and in developing and
  implementing action plans to address the identified issues. They would be interested in promoting sustainable trade practices and the importance of harmonizing requirements for food safety and quality
  through mutual recognition of certification schemes.
