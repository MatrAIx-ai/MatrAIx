personas:
  professional: Mikala Tillman is a flooring specialist‑in‑training who leverages meticulous measurement, precise cutting, and low‑noise tool usage to deliver quiet, high‑quality installations, and they
    thrive on the predictable rhythm of solitary project work.
  sports: Mikala Tillman enjoys low‑impact fitness through early‑morning trail runs with the Lakeland Running Club, weekly yoga sessions at a local studio, and quietly cheering for the Tampa Bay Buccaneers
    during football season, preferring solitary exercise over crowded gyms.
  arts: Mikala Tillman finds solace in the suspense of Agatha Christie mysteries and the depth of Ken Follett’s historical sagas, while they unwind with acoustic playlists from Iron & Wine and Ben Howard,
    and capture subtle forest light in nature photography that echoes Andrew Wyeth’s quiet realism.
  travel: Mikala Tillman plans modest road‑trip getaways to Florida’s Everglades and the historic streets of Savannah, while dreaming of a solo hike through Iceland’s volcanic landscapes once finances allow,
    and they favor relaxed itineraries over packed tours.
  culinary: Mikala Tillman cooks simple, health‑focused meals such as grilled salmon with quinoa and roasted sweet potatoes, perfects avocado‑lime salads and banana‑oat muffins, and they favor fresh basil,
    lemon zest, and locally sourced citrus in their kitchen.
  core: Mikala Tillman balances a practical, structure‑loving work ethic with a solitary, quiet‑hearted lifestyle, often channeling calm through yoga, knitting, and meticulous flooring projects, while occasionally
    slipping into relaxed disorganization.
background:
  cultural: Mikala was raised in Lakeland, Florida, in a working‑class white family with deep roots in the American South. Her upbringing emphasized practicality, hard work, and community respect, values
    common among the region’s Anglo‑American populations. Attending the local public high school, she was exposed to a diverse neighborhood but maintained cultural ties to traditional Southern customs,
    such as church attendance and family gatherings centered around home‑cooked meals. The Florida environment fostered an appreciation for outdoor activities and a laid‑back lifestyle, while the local
    labor market guided her toward a skilled trade career. These cultural influences shape her cooperative nature, her preference for orderly work, and her appreciation for quiet, solitary moments.
attributes:
  skills: '[''Carpet installation'', ''Tile cutting and fitting'', ''Laminate and vinyl flooring'', ''Subfloor preparation'', ''Measuring and layout planning'', ''Blueprint reading'', ''Use of power tools
    (sanders, saws, pneumatic nail guns)'', ''Adhesive application and sealing'', ''Moisture testing and surface leveling'', ''Safety compliance'', ''On‑site problem solving'', ''Customer communication
    (quiet, respectful)'']'
  hobbies: '[''Reading mystery and historical fiction'', ''Bird‑watching and nature photography'', ''Hiking local trails'', ''Yoga and meditation'', ''Knitting scarves and blankets'', ''Cooking healthy
    meals'', ''Listening to acoustic music'', ''DIY home‑improvement projects'']'
  career_goals: Mikala aims to become a certified flooring specialist and eventually lead her own small contracting business that focuses on high‑quality, low‑impact installations for residential clients.
    She plans to earn NADCA certification in carpet installation and pursue additional training in sustainable flooring materials. Over the next five years, she hopes to transition from being a crew member
    to a project supervisor, allowing her to schedule work that fits her preference for solitary, quiet projects. She also aspires to develop a niche in eco‑friendly tile and vinyl installations, leveraging
    her technical skills and desire for predictable, structured work environments.
