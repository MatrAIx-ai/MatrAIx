persona_description: A researcher who is studying the effects of vitamin B12 and folate imbalances on fetal growth and metabolic development, particularly in pregnant women with gestational diabetes. She
  is particularly interested in the role of intrauterine programming in these effects and is looking for ways to prevent or mitigate the risk of metabolic diseases in later life. She is also interested
  in the implications of vitamin B12 and folate deficiencies in pregnancy on the development of diabetes, obesity, and metabolic syndrome.
