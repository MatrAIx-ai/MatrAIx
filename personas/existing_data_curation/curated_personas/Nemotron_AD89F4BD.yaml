personas:
  professional: David Hanna, a 47‑year‑old custodial veteran with expertise in systematic floor care, green‑cleaning protocols, and OSHA compliance, they leverage their methodical, detail‑oriented nature
    and competitive drive to consistently exceed cleaning standards while quietly tracking metrics and proposing efficiency improvements.
  sports: David Hanna, an outdoor‑oriented enthusiast, they spend weekends fishing at J. Percy Priest Lake with the Murfreesboro Bass Club, hike the Cumberland Trail, support the Tennessee Titans in football,
    root for the Nashville Predators during hockey season, and occasionally jog with the Murfreesboro Runners.
  arts: David Hanna, a devoted patron of the Murfreesboro Art Center, they immerse themselves in watercolor studies inspired by Monet, collect prints by Edward Hopper, and attend live jazz performances
    by Wynton Marsalis at local venues, while regularly participating in gallery openings and community theater productions.
  travel: David Hanna, a careful planner with a love for quiet discovery, they prefer road trips that blend art and nature, such as a weekend drive to Asheville’s River Arts District, a spring pilgrimage
    to Paris’s Musée d’Orsay to study impressionism, and seasonal escapes to the Great Smoky Mountains for hiking and fishing, always budgeting each journey to stay within modest limits.
  culinary: David Hanna, a modest home chef, they regularly prepare grilled catfish with lemon‑dill sauce, simmer beef chili spiced with smoked paprika, and bake rosemary‑infused sourdough loaves, while
    savoring Nashville’s hot‑chicken sandwiches from Prince’s and enjoying farm‑to‑table dinners featuring heirloom tomatoes and fresh basil.
  core: David Hanna is a methodical custodial professional turned aspiring facilities manager whose quiet curiosity fuels disciplined pursuits in art, fishing, and budgeting, all tempered by a competitive
    edge and a lingering worry over stress.
background:
  cultural: David grew up in a middle‑class white family in the greater Murfreesboro area, where Southern hospitality and community values were emphasized. His upbringing blended traditional Appalachian
    modesty with a work‑ethic rooted in his parents’ blue‑collar professions. Although raised within a Baptist cultural framework, he maintains an open‑minded outlook, appreciating the region’s folk art,
    music, and storytelling traditions while also seeking new ideas through art and literature. Community events such as county fairs and local volunteer clean‑up days shaped his sense of civic responsibility,
    yet his reserved personality leads him to favor intimate gatherings over large social gatherings. This cultural mix informs both his dedication to reliable, hard‑working service and his curiosity for
    broader artistic experiences.
attributes:
  skills: '[''Commercial Cleaning'', ''Floor Care & Polishing'', ''HVAC Filter Replacement'', ''Safe Chemical Handling'', ''Green‑Cleaning Practices'', ''Inventory Management'', ''Facility Maintenance'',
    ''OSHA Safety Compliance'', ''Time Management'', ''Schedule Coordination'', ''Attention to Detail'', ''Security Monitoring'']'
  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Scale Model Building'', ''Fishing'', ''Hiking'', ''Chess'', ''Trivia Nights'', ''Journaling'', ''Meditation'']'
  career_goals: David aims to transition from frontline custodial work to a supervisory or facilities‑management role within the next five years. He plans to obtain a Certified Facility Manager (CFM) credential
    and pursue additional training in sustainable building operations. His long‑term ambition is to lead a green‑cleaning program for a cultural institution, such as a museum or art gallery, where he can
    blend his professional expertise with his passion for the arts. Alongside career advancement, David hopes to complete his associate degree in Business Administration to strengthen his managerial and
    budgeting skills, ultimately securing a position that offers greater stability and reduced physical strain.
