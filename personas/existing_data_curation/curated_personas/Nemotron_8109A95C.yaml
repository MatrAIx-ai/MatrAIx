  career_goals: At 86, Doris's primary ambition is to maintain her independence and health so she can continue to support her family and community. She aims to complete a written memoir of her life story
    for her grandchildren, preserve family recipes, and organize her extensive genealogy research into a tribute book for her late husband. Doris also wants to finalize her estate planning, ensuring her
    home in Northbrook is transitioned smoothly. Volunteering remains important; she intends to keep coordinating the senior lunch program at the local community center and mentor younger volunteers, fostering
    the same structured, reliable environment she values.
