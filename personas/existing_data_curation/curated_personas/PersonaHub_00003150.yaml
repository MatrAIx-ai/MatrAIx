persona_description: A team of researchers and engineers from the University of Colorado Boulder who specialize in developing innovative solutions to environmental and health concerns, particularly those
  related to sanitation and water treatment. They are part of a larger effort by the Bill & Melinda Gates Foundation to save the lives of 700,000 children worldwide who die from illnesses caused by water
  contaminated with fecal matter. Their work focuses on developing self-contained, solar-powered, waterless toilets that can be used by four to six people a day and are designed to bring the cost down to
  five cents a day.
