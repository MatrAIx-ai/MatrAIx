  hobbies: '[''Watercolor painting'', ''Reading historical biographies'', ''Garden tending'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Classical music appreciation'', ''Small group book discussions'',
    ''Visiting local art galleries'', ''Oral history recording'']'
  career_goals: Although retired, Judy aims to leave a lasting personal and community legacy. She plans to complete a written memoir of her family’s history and compile a curated booklet of local historic
    photographs for the Chesterfield County library. She hopes to mentor a younger volunteer in event coordination at the senior center, secure a modest grant to enhance a community garden project, and
    develop a small exhibition of senior‑produced artwork at a nearby gallery. Additionally, she intends to enter a regional senior writing contest and explore pastel drawing as a new artistic technique.
