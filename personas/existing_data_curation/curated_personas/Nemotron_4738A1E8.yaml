personas:
  professional: Xiaoming Cho is a veteran locomotive engineer whose mastery of diesel‑electric controls, safety protocols, and crew coordination is matched by a charismatic, competitive drive that fuels
    their pursuit of senior supervisory roles within the rail industry.
  sports: Xiaoming Cho is an avid hiker who leads weekend treks in the nearby mountain range, plays competitive mahjong tournaments as a mental sport, follows the local baseball team the Providence PawSox,
    and joins a seasonal adult softball league each spring, channeling their competitive spirit into both physical and strategic games.
  arts: Xiaoming Cho’s artistic side shines during weekly karaoke nights where they belt out classics by BTS, enjoy building intricate model‑railway dioramas inspired by historic steam lines, and attend
    local performances of traditional Chinese opera, all of which satisfy their love for performance, craftsmanship, and cultural expression.
  travel: Xiaoming Cho prefers meticulously planned rail‑focused vacations, such as a Trans‑Siberian adventure and a weekend getaway on Japan’s Shinkansen to Kyoto, yet they also enjoy impromptu weekend
    hikes in the Blue Ridge Mountains, balancing structured itineraries with spontaneous detours.
  culinary: Xiaoming Cho delights in cooking Korean kimchi jjigae and Chinese mapo tofu, expertly wielding gochujang and Sichuan peppercorns, yet they often resort to quick stir‑fry meals after long shifts,
    occasionally overindulging in late‑night ramen while experimenting with fusion twists.
  core: Xiaoming Cho blends rigorous rail expertise with flamboyant social energy, turning every schedule, kitchen, or karaoke stage into a competitive arena while maintaining an unflappable calm that masks
    a penchant for occasional impulsive splurges.
background:
  cultural: Xiaoming’s family emigrated from South Korea in the early 1970s. Although his given name, Xiaoming, reflects Chinese influence, he was raised in a Korean-Chinese bilingual household, preserving
    both languages and customs. He grew up in the Midwest, where he blended the collectivist values of his East Asian heritage—such as respect for elders, hard work, and community solidarity—with the openness
    and neighborliness of Indiana life. He actively participates in local Korean-American and Chinese cultural events, celebrates Lunar New Year and Chuseok, and often shares traditional dishes with friends
    and coworkers.
