  career_goals: Xiaoming aims to advance from his current engineer position to a senior locomotive supervisor within the next three years, leveraging his technical mastery and leadership abilities. He plans
    to obtain advanced FRA certifications and transition into a rail safety manager role, where he can design and implement safety protocols across the network. Ultimately, he aspires to become a regional
    operations manager or an independent rail-industry consultant, shaping policy and training programs. His competitive drive motivates him to achieve top safety performance metrics, and he envisions mentoring
    younger engineers and serving as a union representative to advocate for crew interests.
