personas:
  professional: An experienced network and systems administrator, Kerri Vanlenten leverages deep expertise with Cisco and Juniper routing, VMware virtualization, and PowerShell automation to methodically
    design resilient infrastructures, while they channel a curiosity for emerging SD‑WAN and cloud networking into innovative solutions and mentorship of junior staff.
  sports: An avid hiker, Kerri Vanlenten regularly tackles the trails of Hoosier National Forest with the Bloomington Hiking Club, follows the Indiana Pacers and Indianapolis Colts for seasonal excitement,
    and they join weekend pick‑up soccer games at the local park to stay active.
  arts: Immersed in watercolor, macro photography, and speculative fiction, Kerri Vanlenten draws inspiration from Monet’s impressionist palettes, the poetic verses of N.K. Jemisin, and the haunting music
    of Sufjan Stevens, while they often curate visual network dashboards for community theater productions that blend technical precision with artistic flair.
  travel: Preferring meticulously planned road trips that balance adventure and mindfulness, Kerri Vanlenten has explored the rolling hills of the Blue Ridge Parkway, the wildflower meadows of the Canadian
    Rockies, and they dream of a sensory‑rich pilgrimage to Kyoto’s botanical gardens, all while budgeting each journey within a modest savings plan.
  culinary: Kerri Vanlenten, a modest home baker, revels in crafting artisanal sourdough loaves flavored with rosemary and wildflower honey, while their vegetable garden supplies heirloom tomatoes for rustic
    caprese salads and they eagerly seek seasonal mushroom risotto seasoned with fresh thyme and Parmesan.
  core: A meticulous network architect who balances analytical precision with a quiet artistic soul, Kerri Vanlenten navigates stress through watercolor meditations, strategic board games, and they occasionally
    over‑indulge in coffee‑fueled late‑night coding sessions.
background:
  cultural: Kerri is a white Midwestern American raised in a small town near Bloomington, Indiana. Her family’s German and Irish ancestry instilled values of hard work, modesty, and community involvement.
    Growing up in a Methodist household, she participated in church activities, county fairs, and local volunteer projects, which fostered a cooperative spirit. The regional culture emphasizes reliability,
    practicality, and a deep respect for nature—traits reflected in her organized, methodical approach and her love for outdoor hobbies. Exposure to the arts came early through her mother’s painting and
    school art programs, nurturing an appreciation for creativity alongside her STEM pursuits. Kerri celebrates typical Midwestern traditions such as Thanksgiving potlucks, Fourth of July fireworks, and
    high school sports gatherings, blending a pragmatic upbringing with an enduring curiosity for new ideas and artistic expression.
attributes:
  skills: '[''Network design and architecture'', ''Cisco router and switch configuration'', ''Juniper network devices'', ''Firewall setup and management'', ''Server administration (Windows, Linux)'', ''Virtualization
    (VMware, Hyper‑V)'', ''Scripting for automation (PowerShell, Bash)'', ''Network monitoring and performance analysis (SolarWinds, PRTG)'', ''Documentation and change management'', ''Troubleshooting and
    incident response'', ''Security best practices (ACLs, VPNs)'', ''CompTIA Network+ certification'', ''Cisco CCNA certification'', ''Project coordination'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Nature photography'', ''Reading speculative fiction'', ''Board games with close friends'', ''Puzzle solving (crosswords, Sudoku)'', ''Hiking'', ''Gardening'',
    ''Baking'', ''Volunteer technical support for community theater'', ''Attending small tech meetups'', ''Visiting local art galleries'', ''Mindfulness journaling'']'
  career_goals: Kerri aims to progress to a senior network architect role where she can lead the design of cloud‑based SD‑WAN solutions and integrate security by design. She plans to earn a Cisco CCNP and
    an AWS Certified Advanced Networking certification, while pursuing a master’s degree in cybersecurity part‑time. Mentorship is important to her; she wants to guide junior staff in both technical skills
    and work‑life balance. She also hopes to merge her love for art and technology by developing visual network dashboards for local arts organizations and possibly contributing her technical expertise
    to community theater productions. A flexible or remote work arrangement that reduces daily stress and supports her mental well‑being is a key ambition.
