  career_goals: Jacqueline dreams of combining her love for the ocean and creativity by becoming a marine biologist who also designs educational comics about marine life. She aspires to lead an environmental
    club at school and eventually work on sustainable coastal architecture. In the short term, she aims to win a local science fair and contribute artwork to community murals.
