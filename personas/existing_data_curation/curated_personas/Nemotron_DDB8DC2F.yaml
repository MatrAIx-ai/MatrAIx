personas:
  professional: Jacqueline Howell, an aspiring digital storyteller and marine illustrator, channels their disciplined curiosity and competitive edge into Scratch projects that blend vivid sea‑scape drawings,
    manga‑style characters, and logical puzzles, and they always insist on flawless execution even when peer feedback feels skeptical.
  sports: Jacqueline Howell, a ten‑year‑old, plays forward for the Coastal Waves Youth Soccer Club, practices laps at the Sunnyvale Community Pool where they admire Olympic swimmer Caeleb Dressel, and roots
    for the Seattle Sounders FC and the Los Angeles Lakers during weekend game nights.
  arts: Jacqueline Howell, a ten‑year‑old, spends afternoons sketching marine scenes inspired by Hokusai’s wave prints and manga characters modeled after Akira Toriyama’s Dragon Ball heroes, and they also
    collect prints from Hayao Miyazaki’s Studio Ghibli films while listening to Yiruma's piano pieces for creative focus.
  travel: Jacqueline Howell, a ten‑year‑old, has explored the tide pools of Monterey Bay and the sandy beaches of Maui, and they dream of snorkeling the Great Barrier Reef and strolling through the historic
    canals of Venice, and they prefer meticulously planned day trips over spontaneous long‑haul vacations due to school schedules.
  culinary: Jacqueline Howell, a ten‑year‑old, favors seafood‑centric meals like salmon sushi rolls with avocado and cucumber, creamy New England clam chowder, and shrimp tacos seasoned with lime and cilantro,
    while their cooking skills hover at a confident amateur level, and they often assemble simple dishes under parental supervision.
  core: Jacqueline Howell, a ten‑year‑old marine‑art enthusiast and competitive coder, blends disciplined curiosity with a love for seashell collecting, soccer, and LEGO, and they occasionally let skepticism
    and a habit of hoarding supplies color their interactions.
background:
  cultural: Jacqueline was raised in a white, middle‑class family in Oceanside, California, a coastal community known for its surf culture, outdoor recreation, and multicultural influences. Her upbringing
    includes regular visits to the beach, participation in local art festivals, and exposure to a diverse population through school and community events. Family values emphasize education, discipline, and
    community involvement, shaping her organized and achievement‑driven personality.
