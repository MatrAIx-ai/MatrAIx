persona_description: A solar energy engineer who specializes in the design and installation of photovoltaic systems. They are familiar with the principles of photovoltaic cells, their types, and their applications
  in solar panels and modules. They have experience in calculating the optimal number and type of photovoltaic cells needed for a given solar installation, and in designing and installing photovoltaic systems
  that maximize power output while minimizing cost and environmental impact. They are also skilled in troubleshooting and repairing photovoltaic systems, and in conducting research and development in the
  field of photovoltaics.
