  career_goals: Delores aims to transition into a lead data scientist role within the next three years, overseeing cross‑functional analytics projects that drive operational efficiency for Indiana’s manufacturing
    sector. She plans to earn a master’s degree in data science or applied statistics to deepen her expertise in advanced machine‑learning and causal inference. A long‑term ambition is to establish a regional
    STEM outreach initiative that encourages high‑school girls to pursue careers in mathematics and data science, leveraging her competitive spirit to organize hackathons and mentorship programs. Simultaneously,
    she aspires to author a case‑study series on practical applications of predictive modeling in supply‑chain optimization, positioning herself as a thought leader who bridges rigorous research with real‑world
    impact.
