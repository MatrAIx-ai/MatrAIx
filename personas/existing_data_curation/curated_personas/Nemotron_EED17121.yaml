personas:
  professional: Delores Rochette, a senior data analyst at a Hamilton County manufacturing firm, leverages her applied mathematics and computer science background to build rigorous predictive models in
    Python and Tableau, leading internal analytics competitions while mentoring junior staff with a methodical, competitive edge.
  sports: Delores Rochette captains a community 5K running club, trains for the Indianapolis Half Marathon with the local Indianapolis Road Runners group, cheers for the Indianapolis Colts and Pacers, and
    spends weekends hiking White River State Park trails to stay fit.
  arts: Delores Rochette performs improv with the McCordsville Community Theater, draws inspiration from the work of Tina Fey, regularly attends the Indianapolis Symphony Orchestra, and collects vintage
    vinyl records of The Beatles and Stevie Wonder for her post‑work relaxation.
  travel: Delores Rochette prefers road‑trip adventures, having explored the historic neighborhoods of Chicago, the bourbon trails of Kentucky, and the coastal cliffs of Maine, while dreaming of a family
    vacation to Kyoto's cherry‑blossom season once her kids finish high school.
  culinary: Delores Rochette enjoys experimenting with Thai green curry, Moroccan chickpea tagine, and Korean bibimbap, yet balances these with pragmatic weekly meal prep featuring grilled chicken, roasted
    garden vegetables (zucchini, tomatoes, kale), and a reliable batch of chili using ground turkey.
  core: Delores Rochette blends Midwestern pragmatism with a relentless curiosity, channeling her competitive spirit into data science, community theater, and marathon training while managing a family,
    a garden, and a meticulous budget.
background:
  cultural: Delores was raised in a suburban Midwestern environment near Indianapolis, where the cultural climate emphasizes humility, reliability, and community involvement. As a second‑generation American
    of European ancestry, she grew up with traditions of celebrating local holidays such as Fourth of July parades and county fairs, and she maintains close ties with her extended family. The region’s pragmatic
    ethos – valuing hard work, straightforward communication, and practical problem solving – resonates with her own methodical and curiosity‑driven mindset. Her marriage and involvement in local community
    groups reflect the Midwestern value of building strong social bonds, while her competitive spirit is nurtured by the local enthusiasm for high school sports and community contests.
