  career_goals: Iliana hopes to transform her passion for art and culture into a modest, community-focused venture. She aims to open a home‑based studio where she can teach watercolor and embroidery classes
    to seniors and young adults, while also offering cooking demonstrations of Nicaraguan cuisine. She is working toward building an online presence—a blog and Instagram page—to share her artwork, recipes,
    and stories, hoping to connect with a wider diaspora and generate supplemental income through small sales of handmade crafts and digital art prints. In the longer term, she envisions partnering with
    local cultural centers to develop a regular art‑therapy program for adults dealing with stress, leveraging her empathy and assertiveness to create a supportive space. Though she prefers flexible, low‑pressure
    arrangements, Iliana is determined to keep learning new techniques and to remain an active cultural ambassador within her community.
