personas:
  professional: Iliana Valentin is a community‑focused art facilitator who blends bilingual communication, event coordination experience, and a relaxed, curiosity‑driven approach to run flexible watercolor,
    embroidery, and cooking workshops for seniors and young adults, capitalizing on they natural flexibility despite occasional disorganization.
  sports: Iliana Valentin enjoys leisurely morning walks, participates in a senior swim club at the Hialeah Community Center, cheers for the Miami Heat and Miami Marlins, and treats salsa and cumbia classes
    as a cardio‑rich dance sport that keeps they active and socially connected.
  arts: Iliana Valentin immerses they in watercolor painting, decorative embroidery, and basic digital design, draws inspiration from the poetry of Pablo Neruda and the murals at the Pérez Art Museum, follows
    contemporary folk artist Ana Teresa Barboza, and regularly visits the local museum’s sculpture garden to fuel they creative expression and relieve stress.
  travel: Iliana Valentin prefers spontaneous weekend road trips to nearby coastal towns like Key Largo, enjoys cultural tours of historic Charleston, dreams of exploring Tuscany’s vineyards and Oaxaca’s
    markets, balances a modest travel budget with a desire for immersive experiences, and always carries a sketchbook to capture new scenery.
  culinary: Iliana Valentin specializes in cooking aromatic rice‑and‑bean dishes such as gallo pinto, spiced arroz con pollo with fresh cilantro and achiote, experiments with mango salsa twists, cultivates
    herbs on they balcony for garnish, and frequents the local bistro "La Esquina" for inspiration, while occasionally indulging in sugary pastries for ‘creative fuel’.
  core: Iliana Valentin is a curiosity‑driven, community‑oriented creative who balances artistic passion with occasional disorganization, worries about stress, yet finds solace in painting, cooking, dancing,
    and modest entrepreneurship.
background:
  cultural: Iliana was born to Nicaraguan parents who migrated to Florida in the early 1970s. Growing up in Hialeah, a vibrant multicultural enclave, she was raised bilingual, speaking Spanish at home and
    English at school. Family gatherings revolve around traditional Nicaraguan foods, music, and Catholic celebrations such as La Purísima and Semana Santa, which she continues to observe. Her cultural
    identity is reinforced through participation in local Latino festivals, the preservation of folk stories, and the transmission of recipes to younger relatives. Iliana also draws on the communal spirit
    of the Nicaraguan diaspora, valuing solidarity, resilience, and a shared love of storytelling, which informs her artistic expression and community involvement.
