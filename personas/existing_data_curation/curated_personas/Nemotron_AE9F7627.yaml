  hobbies: '[''listening to R&B and neo‑soul music'', ''salsa dancing'', ''cooking Southern and Caribbean dishes'', ''volunteering at community youth centers'', ''reading personal development books'', ''urban
    photography'', ''exploring Philadelphia street art'']'
  career_goals: Janita aims to progress from an individual sales representative to a senior sales manager overseeing a regional territory within the next five years. She aspires to become a top performer
    recognized for revenue growth and client retention, earn certifications in sales strategy and data analytics, and eventually transition into a leadership role where she can mentor new sales talent.
    Balancing her ambition with her need for flexibility, she also envisions launching her own boutique consultancy focused on helping small manufacturers build sustainable sales pipelines while preserving
    a harmonious work‑life balance.
