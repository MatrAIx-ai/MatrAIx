personas:
  professional: Janita Allison leverages her relationship‑driven sales expertise in the wholesale and manufacturing sector, using Salesforce, market research and on‑the‑fly problem solving to craft compelling
    product presentations and close deals, all while they maintain a personable, cooperative demeanor that belies their spontaneous struggle with strict deadlines.
  sports: Janita Allison fuels her fitness through salsa dancing at the local studio, weekly pickup basketball with the Philly Youth Center Hoops league, and running with the Philly Run Club, while they
    also cheer for the Philadelphia Eagles, Flyers and 76ers whenever the teams play.
  arts: Janita Allison immerses herself in Philadelphia’s jazz and neo‑soul scene, frequenting Chris’ Jazz Café and the Roxy, while they photograph street art inspired by Vivian Maier and listen to Esperanza
    Spalding and Robert Glasper, a habit that balances her love for visual and auditory creativity.
  travel: Janita Allison favors spur‑of‑the‑moment weekend trips, often jetting to New Orleans for its music heritage, San Juan for Caribbean culinary inspiration or Asheville for mountain hikes, while
    they plan just enough to stay within a modest budget and satisfy their curiosity.
  culinary: Janita Allison enjoys experimenting with Southern and Caribbean comfort dishes such as shrimp étouffée, oxtail stew, collard greens with smoked turkey and plantain fufu, while they regularly
    incorporate ingredients like Scotch bonnet peppers, coconut milk, okra and allspice into their kitchen creations.
  core: Janita Allison blends restless curiosity with practical ambition, closing wholesale deals in a flash, dancing salsa at midnight, and habitually losing track of deadlines while they juggle community
    mentorship and a love for jazz.
background:
  cultural: Janita identifies as African‑American and grew up in a close‑knit family in Philadelphia that values community, faith, and cultural pride. Her upbringing was infused with the rhythms of Gospel
    and soul music, shared meals featuring collard greens and fried plantains, and annual celebrations that honor African‑Diaspora traditions. This cultural backdrop shapes her collaborative spirit, deep
    empathy for others, and a strong sense of responsibility to give back to the community. It also informs her communication style—warm, expressive, and attentive to the nuances of interpersonal dynamics.
attributes:
  skills: '[''client relationship management'', ''negotiation'', ''product knowledge (industrial goods)'', ''CRM software (Salesforce)'', ''market research'', ''presentation and public speaking'', ''problem
