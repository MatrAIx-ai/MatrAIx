  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading art history'', ''Photography'', ''Knitting'', ''Gardening'', ''Hiking'', ''Journaling'', ''Listening to folk music'', ''Creative writing'']'
  career_goals: Clementine aims to earn her GED within the next year and enroll in a Certified Nursing Assistant (CNA) program to qualify for more advanced clinical responsibilities. She plans to leverage
    the CNA credential to pursue a Licensed Practical Nurse (LPN) qualification, eventually moving into a supervisory role at a home‑care agency serving Clay County. Simultaneously, she wishes to formalize
    her interest in therapeutic arts by completing a short course in art‑therapy basics, enabling her to offer structured creative‑enrichment sessions for seniors. Over the next five years she hopes to
    lead a team of caregivers and launch a community‑based program that integrates personal care with arts‑based activities to improve the well‑being of older adults in her hometown.
