  career_goals: Crystal aspires to build a career that merges visual art with mental‑health advocacy. In the short term, she aims to enroll in a specialized magnet high school for the arts, where she can
    refine her illustration and design skills while taking electives in psychology. She hopes to earn a BFA in illustration and a minor in psychology, eventually working as a graphic designer or visual
    artist who creates projects that raise awareness about emotional well‑being. Long‑term, Crystal envisions founding a community art studio in Houston that offers free workshops for teens coping with
    stress, integrating creative practice with peer support. She also plans to develop an online platform where she shares her artwork, mental‑health resources, and personal journaling insights, becoming
    a youth influencer who promotes resilience and artistic expression.
