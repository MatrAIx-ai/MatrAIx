personas:
  professional: Crystal Smith is a budding visual artist and aspiring gallery curator who channels her curiosity and organizational flair into staging school art exhibitions, designing immersive mixed-media
    installations, and leading collaborative projects with classmates, all while managing her natural worry through meticulous planning and reflective journaling.
  sports: Crystal Smith enjoys the kinetic energy of hip‑hop dance workshops and participates in the school's after‑school basketball club, cheering for the Houston Rockets and the Astros while balancing
    a preference for expressive movement over traditional competitive sports.
  arts: Crystal Smith immerses herself in Houston's contemporary arts scene, frequenting the Contemporary Arts Museum Houston and sketching murals by local artists like Stephen Powers, while drawing inspiration
    from speculative fiction authors such as N.K. Jemisin and poets like Ocean Vuong, and channeling this eclectic taste into collaborative Minecraft art installations and school drama improv.
  travel: Crystal Smith dreams of a weekend road trip to Austin's South Congress for live music and street art, and a future solo adventure to Barcelona's vibrant graffiti districts, yet their travel plans
    are shaped by school schedules, parental budgeting, and the desire to capture photo‑journalistic moments for her sketchbooks.
  culinary: Crystal Smith delights in experimenting with global flavors, mastering homemade ramen broth, Mexican tacos al pastor, and Ethiopian injera at home, while juggling a beginner's cooking skill
    set that often leads to mis‑measured spices and occasional kitchen mishaps, which they view as creative experiments.
  core: Crystal Smith blends a restless curiosity for art and culture with a habit of over‑thinking, turning daily worry into meticulous sketchbooks, spontaneous video‑game builds, and a perpetual quest
    for the perfect spice blend.
background:
  cultural: Crystal is a white Texan raised in Houston's diverse, urban environment. Her family has deep roots in the Texas Gulf Coast region, embodying a mix of suburban middle‑class values and Southern
    hospitality. Growing up in Houston, she has been exposed to the city's multicultural tapestry—including Mexican‑American, African‑American, and Asian influences—through community festivals, food, and
    the vibrant arts scene. Her upbringing includes regular church gatherings and family get‑togethers that emphasize community service and togetherness. While she identifies with the broader American white
    cultural narrative, her daily experiences in a richly diverse city have fostered an appreciation for cultural variety and an openness to unconventional ideas.
