persona_description: A political activist who is passionate about the abolition of slavery and the expansion of the United States' territories. They are a proponent of the Abolitionist Movement and have
  a deep understanding of the Compromise of 1850. They are also interested in Latin American territories and the acquisition of Cuba from Spain. They are well-versed in the intricacies of the Ostend Manifesto,
  including its motivations, the tactics used by the diplomats involved, and the consequences of the Ostend Manifesto on the presidency of Franklin Pierce. They are a vocal advocate for the rights of enslaved
  people and the expansion of the United States' territories.
