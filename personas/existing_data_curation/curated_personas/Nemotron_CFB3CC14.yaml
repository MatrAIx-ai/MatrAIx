personas:
  professional: Aylisa Johnson, a retired home economist turned senior‑center volunteer coordinator, leverages her decades of expertise in budgeting, meal planning, and textile crafts to design structured
    craft workshops, mentor new volunteers, and meticulously archive family recipes, ensuring each project runs on a predictable schedule that satisfies her need for order while nurturing her compassionate
    drive to help neighbors.
  sports: Aylisa Johnson enjoys daily walks with her dog and participates in the senior center’s weekly walking club, follows the local baseball team the Riverside Ravens with unwavering loyalty, occasionally
    watches the city’s professional soccer club the Metro Strikers on television, and practices low‑impact water aerobics at the community pool to stay active.
  arts: Aylisa Johnson sings in her church choir, draws inspiration from gospel legends like Mahalia Jackson and folk storytellers such as Bob Dylan, immerses herself in historical fiction by authors Philippa
    Gregory and Hilary Mantel, and regularly attends quilting exhibitions featuring artists like Faith Ringgold, which together shape her creative identity and leisurely pursuits.
  travel: Aylisa Johnson prefers well‑planned, low‑stress road trips, relishes visits to historic sites such as Colonial Williamsburg and Savannah’s riverfront, has recently explored the museums of Washington,
    D.C., and dreams of traveling to York, England, to walk its medieval streets, all while coordinating travel around her caregiving responsibilities and limited budget.
  culinary: Aylisa Johnson harvests heirloom tomatoes, zucchini, and basil from her garden to create sun‑dried tomato pesto, canning jars of her signature tomato‑basil sauce and pickled beets, delights
    in home‑cooked chicken pot pie and sourdough bread, and favors flavors of rosemary, thyme, and cumin, while her knitting projects often inspire quick, comforting tea‑time snacks like cucumber sandwiches.
  core: Aylisa Johnson is a structured, compassionate retiree who channels her nurturing spirit into community quilting, gardening, and volunteering, yet she often worries about details, over‑plans her
    days, and occasionally lets self‑care slip in favor of caring for others.
background:
  cultural: Aylisa was raised in the coal-mining region of northeastern Pennsylvania, in Luzerne County, within a white family of mixed Irish and German ancestry. Her upbringing in a modest, close-knit
    community emphasized hard work, church involvement, self-reliance, and mutual aid. Local traditions such as community potlucks, seasonal festivals, folk music, and handcrafts have shaped her values
    of cooperation, responsibility, and a deep respect for heritage.
