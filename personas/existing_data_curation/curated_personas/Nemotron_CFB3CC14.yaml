  hobbies: '[''Gardening'', ''Canning and preserving'', ''Knitting'', ''Crocheting'', ''Reading historical fiction'', ''Bridge (card game)'', ''Church choir'', ''Walking with dog'', ''Volunteer craft workshops
    at senior center'']'
  career_goals: Even in retirement, Aylisa aims to deepen her contribution to the local community by training new volunteers at the senior center, documenting and preserving family recipes and stories for
    future generations, and launching a modest home-based venture selling handmade quilts whose proceeds support charitable causes. She also focuses on maintaining her health, staying organized in her daily
    routine, and providing steady guidance and academic support to her grandchildren.
