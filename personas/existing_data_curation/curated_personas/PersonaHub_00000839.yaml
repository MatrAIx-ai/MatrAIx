persona_description: A general healthcare professional who is interested in kidney disease prevention and management. This persona is likely to be interested in the above text because they are looking for
  ways to protect their own kidneys and potentially improve the health of their patients with non-dialysis kidney failure. They may also be interested in the research and recommendations provided by the
  German Society for Nephrology (DGfN) and the German Society for General and Family Medicine S3. This persona may also be interested in the potential benefits of a healthy diet for kidney health and the
  importance of early detection and timely therapy for chronic kidney disease.
