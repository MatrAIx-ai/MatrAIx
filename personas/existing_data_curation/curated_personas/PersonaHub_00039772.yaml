persona_description: A geologist who specializes in studying the Earth's mantle and its composition, particularly focusing on the Theia impact event and its aftermath. His research interests include the
  study of mantle plumes, the formation of the moon, and the impact of the collision between Theia and Earth on the Earth's mantle. He is particularly interested in the isotopic evidence and modeling used
  to determine the fate of Theia's mantle after the collision. His work has been published in prestigious scientific journals such as Nature Geoscience and Science.
