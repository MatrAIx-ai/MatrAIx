  career_goals: Although retired from formal employment, Jian aims to stay actively engaged by volunteering at the local senior center and community garden, where he can share his practical skills. He aspires
    to lead cultural workshops that teach traditional cooking, calligraphy, and tai chi to younger generations of the Asian diaspora. Jian also hopes to contribute as a mentor for recent immigrants, helping
    them navigate financial, linguistic, and social challenges. On a personal level, he plans to document his life story in a memoir, preserving family history for future generations.
