    ''Cooking Tex-Mex dishes'']'
  career_goals: Gregory aspires to attend a competitive STEM-focused high school and later pursue a degree in aerospace engineering or interactive media design, aiming to combine his love for scientific
    inquiry and visual creativity. He hopes to work on robotics projects that develop innovative solutions for space exploration or immersive educational experiences, and he dreams of contributing to NASA’s
    student programs and eventually designing technology that bridges art and engineering.
