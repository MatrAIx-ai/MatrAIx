persona_description: A professor of history at Duke University, who specializes in the study of modern French history, particularly the social and cultural history of the period from the 18th century to
  the present. He has a Ph.D. from the University of Chicago, where he received his degrees, and has been awarded various fellowships and awards for his research and teaching. His research interests include
  the social history of industrialization, comparative social history of the modern era, the history of emotions and gender identities in France since 1750, theories of culture, and theories of emotions.
