  career_goals: Even at 88, Denia’s aspirations center on legacy and lifelong learning. She aims to complete a memoir that weaves together her family’s genealogy, personal experiences of the civil‑rights
    era, and the rich cultural tapestry of Hampton’s African‑American community. She hopes to expand the oral‑history archive she helped start, training a new generation of volunteers to continue collecting
    and digitizing stories. Denia also wishes to deepen her appreciation of visual art by taking an online art‑history course focused on African‑American artists and visiting nearby museum exhibitions when
    possible. Finally, she aspires to mentor her grandchildren and great‑grandchildren in cooking, gardening, and storytelling, ensuring her heritage endures.
