persona_description: A geopolitical analyst who specializes in the study of Middle Eastern and North African politics, with a particular focus on the Syrian and Iraqi conflicts. This person is knowledgeable
  about the dynamics of the Syrian Civil War, the relationship between Turkey and its rebel proxies, and the ongoing battle between IS and other extremist groups in Syria. They are also familiar with the
  recent developments in the Mosul operation, including the role of the Iraqi Popular Mobilization Units and the potential involvement of Turkish forces. This person is interested in the potential outcomes
  of the Mosul operation and the future of IS's control in Syria and Iraq.
