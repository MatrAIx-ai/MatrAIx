  career_goals: Reginald dreams of becoming a creative innovator who blends art, storytelling, and technology. He often imagines designing his own video games that let players explore fantastical worlds,
    and he sees himself in the future as a multimedia artist or inventor of interactive museum exhibits. He is also drawn to the idea of leading a team, so he envisions a career as a museum curator or educator
    who inspires other kids through hands‑on science and art projects. Although he sometimes worries about making mistakes, his competitive spirit fuels a desire to be recognized for original ideas and
    to earn scholarships for inventive projects.
