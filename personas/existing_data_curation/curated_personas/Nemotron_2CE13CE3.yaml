  career_goals: Christopher aims to earn a Bachelor’s degree in Marketing or Business Administration and secure a role as a marketing coordinator or sales representative within the sports or entertainment
    sector. He envisions advancing to brand manager for a local sports team or regional venue, leveraging his event‑planning and social‑media expertise. He also entertains the idea of launching a small
    digital‑media agency that helps local businesses with online presence, valuing a career that offers both structured progression and the flexibility to travel for industry events and conferences.
