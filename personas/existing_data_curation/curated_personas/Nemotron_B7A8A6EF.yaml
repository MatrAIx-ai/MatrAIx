personas:
  professional: Pedro Estrada, a 14‑year‑old high‑school sophomore, channels a budding talent for digital illustration and graphic design into freelance social‑media artwork for local neighborhood events,
    applying a practical, structure‑loving approach while still allowing the flexibility to juggle school assignments and spontaneous creative spurts, and they often schedule work sessions in a planner
    to maintain balance.
  sports: Pedro Estrada spends afternoons shooting hoops at the neighborhood park, idolizes the Brooklyn Nets and the New York Knicks, participates in an AAU pickup league that sharpens competitive instincts,
    and they balance team camaraderie with personal solo drills to stay fit.
  arts: Pedro Estrada sketches vibrant Brooklyn street scenes, experiments with digital illustration in Procreate, draws inspiration from street artists like Banksy and Shepard Fairey, freestyles rap verses
    over beats by Daddy Yankee and Aventura, and they dance to Bad Bunny and Ozuna during weekend hangouts, weaving together visual and musical creativity.
  travel: Pedro Estrada explores emerging Brooklyn neighborhoods such as Bushwick and Red Hook, seeks out hidden murals and hole‑in‑the‑wall eateries, has visited the Queens Night Market and dreams of traveling
    to historic port towns in Europe like Porto and to bustling Asian street markets in Tokyo to experience global street culture firsthand.
  culinary: Pedro Estrada enjoys cooking family‑passed recipes like mashed plantains with sautéed onions, garlicky rice and beans, and seasoned chicken stew, skillfully handling ingredients such as ripe
    plantains, fresh cilantro, and a robust sofrito, though they sometimes forget to clean up the kitchen after a lively cooking session.
  core: Pedro Estrada blends a love for basketball, beat‑driven dance, and digital art into a vibrant teen life, yet they often procrastinate on homework, forget to tidy up after cooking, and balance a
    structured saving habit with impulsive gaming splurges, revealing a quirky mix of discipline and spontaneity.
background:
  cultural: Pedro grows up in a close‑knit Dominican household in Brooklyn, where Spanish is spoken at home and English at school. His family maintains traditions such as celebrating Dominican Independence
    Day, enjoying sazona and plantains, and attending church services that reflect Catholic heritage. Community ties are strong; he participates in local events at the Dominican cultural center, where music,
    dance, and food bring neighbors together. The dynamic blend of Caribbean rhythms and New York city life shapes his identity, influencing his language, cuisine preferences, and artistic expressions.
    These cultural influences intersect with his daily experiences in Queens and Brooklyn, fostering a sense of pride in his roots while adapting to the multicultural urban environment.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Basic computer literacy (word processing, internet research)'', ''Introductory programming (Scratch, Python)'', ''Basketball fundamentals and teamwork'',
    ''Cooking Dominican dishes (mangú, sancocho)'', ''Graphic design basics (Canva, GIMP)'', ''Neighborhood navigation and public transit knowledge'']'
  hobbies: '[''Playing basketball'', ''Listening to reggaeton/merengue/bachata'', ''Video gaming (Minecraft, Fortnite)'', ''Sketching and digital illustration'', ''Cooking Dominican recipes'', ''Freestyle
    rap and songwriting'', ''Exploring Brooklyn street art and local eateries'']'
  career_goals: Pedro aims to finish high school with a focus on art and technology, eventually pursuing a degree or certification in graphic design or digital media. He dreams of becoming a visual content
    creator who blends his Dominican heritage with the urban vibe of Brooklyn, producing illustrations, short videos, or social media campaigns that celebrate Caribbean culture. In the short term, he wants
    to improve his coding skills, build a portfolio of digital artwork, and secure a summer internship at a local media studio or community art center. He also harbors a secondary interest in food blogging,
    hoping to share family recipes and cooking tutorials online.
