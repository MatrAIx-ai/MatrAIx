persona_description: A historian who is interested in the bicentennial of the American Revolution and its impact on the country's culture and society. The person is likely to be familiar with the Smithsonian
  Institution and its programs, as well as the National Park Service. They may also be interested in the arts, music, and cultural heritage, and may have an interest in the history of Kentucky, Native American
  cultures, and working Americans. The person may also have an interest in the British Isles and the United States, and may have a particular interest in the Tamburashi and British Isles Music, Song, and
  Dance Traditions.
