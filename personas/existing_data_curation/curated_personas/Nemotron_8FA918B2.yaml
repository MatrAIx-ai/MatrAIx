personas:
  professional: Benny Oquinn, a seasoned painting contractor with three decades of expertise in interior and exterior painting, paper‑hanging, and drywall repair, applies their practical, structure‑loving
    mindset, meticulous cost estimating, and safety‑first approach to deliver high‑quality renovations, mentor apprentices, and champion low‑VOC, sustainable practices for community murals.
  sports: Benny Oquinn, an enthusiastic member of the Austin Senior Bowling League who also enjoys weekend fishing on Lake Austin, stays fit by walking the lake’s shoreline, supports the Dallas Cowboys,
    the Houston Astros, and the Texas Longhorns, and they maintain a casual membership in the Austin Community Fitness Club for occasional group workouts.
  arts: Benny Oquinn, who spends evenings immersed in classic rock legends like The Rolling Stones, Led Zeppelin, and Bruce Springsteen while reading historical novels set in the American Midwest and crafting
    small furniture pieces inspired by folk art, lets music and literature shape their creative outlook and provides a soothing backdrop to their woodworking hobby.
  travel: Benny Oquinn, preferring well‑planned road trips that balance scenic adventure with comfortable lodging, has driven to the Grand Canyon and Yellowstone National Park, dreams of strolling historic
    New England towns such as Cape Cod, and they regularly enjoy weekend getaways to Hill Country vineyards in Texas for relaxed wine tasting.
  culinary: Benny Oquinn, an easygoing home cook who favors Texas barbecue, often prepares brisket seasoned with smoked paprika, cumin, and garlic, whips up hearty chili with beans and jalapeños, and they
    love pairing these meals with homemade cornbread and fresh herbs harvested from their prairie garden.
  core: Benny Oquinn blends a meticulous, structure‑loving work ethic with a sociable, community‑focused spirit, juggling paintbrushes, fishing rods, and classic rock playlists while their penchant for
    perfection sometimes leads to extra overtime and a stubborn reluctance to delegate.
background:
  cultural: Benny was raised in a traditional Midwestern small-town environment where self-reliance, neighborly assistance, and a strong work ethic are valued. His cultural influences reflect the blend
    of German, Scandinavian, and broader American rural traditions common in Minnesota, shaping his appreciation for seasonal outdoor activities, community gatherings, modest living, and a practical, cooperative
    outlook.
attributes:
  skills: '[''Interior Painting'', ''Exterior Painting'', ''Paper Hanging'', ''Surface Preparation'', ''Drywall Repair'', ''Color Matching'', ''Cost Estimating'', ''Project Scheduling'', ''Customer Communication'',
