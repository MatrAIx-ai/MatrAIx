personas:
  professional: Lisa Tiemann, a seasoned facilities maintenance specialist with over three decades of cross‑disciplinary trade expertise, blends hands‑on curiosity with pragmatic efficiency, orchestrates
    small crews through safety‑compliant repairs, mentors junior technicians, and pushes energy‑saving retrofits toward LEED certification while balancing organization and flexibility.
  sports: Lisa Tiemann follows the San Francisco Giants and the San Jose Earthquakes, participates in a weekend walking club on local trails, enjoys occasional indoor climbing sessions at a Bay Area gym,
    and favors low‑impact fitness that complements her hands‑on hobby schedule.
  arts: Lisa Tiemann restores vintage radios as a tactile art form, captures detailed macro photographs of native flora, listens avidly to folk artists like Joanna Newsom and contemporary acoustic guitarist
    Andy McKee, and attends intimate performances at the Millbrae Community Center and occasional shows at the San Francisco Symphony.
  travel: Lisa Tiemann prefers eco‑conscious travel itineraries, relishes weekend getaways to Napa’s organic vineyards, hikes Yosemite’s Mariposa Grove, and dreams of a sustainable design tour in Kyoto,
    while always booking accommodations that support local stewardship and using a well‑planned packing list to avoid last‑minute stress.
  culinary: Lisa Tiemann enjoys cooking farm‑to‑table meals, frequently prepares roasted beet and goat cheese salad with locally sourced arugula, whips up a weekly ratatouille featuring garden‑grown zucchini
    and eggplant, and experiments with a homemade focaccia using rosemary harvested from her herb box.
  core: Lisa Tiemann is a pragmatic, curiosity‑driven maintenance veteran who balances meticulous organization with a competitive edge, turns sustainability into a personal mission, and finds solace in
    quiet hobbies, garden walks, and the steady hum of a well‑tuned vintage radio.
background:
  cultural: Lisa grew up in a middle‑class white family in the San Francisco Bay Area, completing high school locally before entering the skilled‑trade workforce. Her upbringing emphasized self‑reliance,
    a pragmatic work ethic, and an appreciation for community responsibility, values that align with the region's progressive, environmentally aware culture. While she resides in the diverse suburb of Millbrae,
    she maintains a more reserved and pragmatic outlook, preferring small, familiar social circles. Her cultural identity blends traditional American middle‑class sensibilities with the Bay Area's emphasis
    on sustainability and continual learning.
