  career_goals: At 56, Lisa aims to move into a supervisory or facilities‑management role where she can oversee a small team and champion green‑building initiatives for her employer or a larger property‑management
    firm. She plans to earn a professional facilities‑management certification and a LEED‑related credential to deepen her expertise in sustainable operations. Lisa is also interested in mentoring the next
    generation of technicians, sharing her blend of time‑tested methods and emerging technologies. In addition, she envisions launching a part‑time consultancy that offers energy‑retrofit services to local
    homeowners and small businesses, positioning herself as the most reliable and forward‑thinking maintenance specialist in the Millbrae area.
