personas:
  professional: Raymond Davila, a 25‑year‑old cleaning specialist, combines expert knowledge of eco‑friendly residential and commercial cleaning with a design‑savvy eye, using digital scheduling tools to
    run efficient operations while offering clients subtle interior‑styling suggestions.
  sports: Raymond Davila, a 25‑year‑old outdoor enthusiast, hikes the Rock River trail every weekend, plays pickup soccer with friends at the local park, follows the Chicago Bulls and Chicago Blackhawks,
    and they occasionally join a community yoga class to improve flexibility.
  arts: Raymond Davila, a 25‑year‑old art aficionado, frequents the Rockford Art Museum, sketches downtown murals, curates indie‑music playlists featuring Phoebe Bridgers and Tame Impala, attends live shows
    at the Rockford Music Hall, and they draw creative inspiration for their occasional watercolor pieces.
  travel: Raymond Davila, a 25‑year‑old wanderer, prefers short road trips to nearby cultural hubs like Milwaukee and Chicago, plans annual backpacking adventures to the Rocky Mountains for hiking, dreams
    of a future culinary tour of Oaxaca to sample regional flavors, and they budget these travels through a dedicated savings fund.
  culinary: Raymond Davila, a 25‑year‑old culinary experimenter, masters traditional mole, tamales, and ceviche in their kitchen, frequently fuses these flavors with local Midwestern ingredients such as
    corn and maple‑glazed pork, and they enjoy sourcing fresh cilantro, chipotle, and lime at the farmer’s market for vibrant, home‑cooked meals.
  core: Raymond Davila, a 25‑year‑old detail‑driven cleaner with a passion for art, music, and sustainable living, balances frugal budgeting with occasional indulgences, navigates mild back pain and allergies,
    and they dream of turning eco‑cleaning expertise into a design‑focused business.
background:
  cultural: Raymond was raised in a Mexican immigrant family in Rockford, where Spanish was spoken at home and English at school. His parents instilled a strong sense of familismo, celebrating holidays
    such as Día de los Muertos, Cinco de Mayo, and Christmas with traditional foods, music, and storytelling. He grew up helping with family meals, learning to prepare dishes like pozole and chiles rellenos,
    which reinforced his connection to Mexican culinary heritage. The bicultural environment shaped his bilingual fluency and gave him an appreciation for both Mexican folk art and contemporary American
    culture. He maintains ties with the local Mexican‑American community through church events, community festivals, and informal gatherings at neighborhood taquerías, blending these influences into his
    daily life and worldview.
attributes:
  skills: '[''Residential and commercial cleaning'', ''Carpet and upholstery deep cleaning'', ''Eco‑friendly chemical handling'', ''Inventory management'', ''Digital scheduling and task management'', ''Minor
    handyman repairs'', ''Bilingual communication (English/Spanish)'', ''Attention to detail and organization'', ''Customer service problem solving'', ''Basic interior design awareness'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Cooking Mexican cuisine and fusion dishes'', ''Listening to indie music and attending concerts'', ''Urban photography'',
    ''Hiking local trails'', ''Playing board games'', ''Exploring street murals'']'
  career_goals: Raymond aims to earn his GED within the next year and enroll in a community‑college program in hospitality management or sustainable facilities operations. He aspires to move into a supervisory
    role within a hotel or large‑scale property, eventually managing a team of housekeepers and implementing green‑cleaning protocols. Long‑term, he dreams of launching his own environmentally conscious
    cleaning business that also offers design‑consultation services, leveraging his appreciation for art to help clients create aesthetically pleasing, healthy living spaces. He is also interested in obtaining
    certifications such as the Green Seal or LEED Housekeeping Specialist and plans to network with local Mexican‑American business owners for mentorship.
