personas:
  professional: Ellen Hilliard is an aspiring pediatric nursing student who leverages her polished communication skills, Excel-savvy event planning experience from the student council, and calm, routine-oriented
    nature to coordinate volunteer health drives and streamline clinic schedules.
  sports: Ellen Hilliard cheered on the Logan High School varsity volleyball team, follows the Utah Jazz and Real Salt Lake for professional sports thrills, and spends Saturday mornings hiking the Wasatch
    Range with a local friends club to stay fit and enjoy the mountain air, while they occasionally join informal pickleball matches at the community center.
  arts: Ellen Hilliard unwinds by streaming upbeat pop hits from Ariana Grande and Dua Lipa, binge‑watching light‑hearted series like Ted Lasso and The Office, while they craft DIY knit scarves inspired
    by tutorial videos from YouTube creators such as Knittty and attend the annual community theater production of Grease.
  travel: Ellen Hilliard prefers short, well‑planned road trips, revisiting Zion and Bryce Canyon National Parks for weekend hikes, dreaming of a spring backpacking adventure through the Rocky Mountains
    of Colorado, and saving for a future study‑abroad semester in Austin, Texas, where they can explore live music venues.
  culinary: Ellen Hilliard delights in baking classic chocolate chip cookies, lemon drizzle cake, and oatmeal raisin muffins, often adding a pinch of sea salt and almond extract for depth, while they enjoy
    cooking a hearty beef chili for family gatherings and occasionally splurge on avocado toast at the local café despite a self‑imposed limit on brunch‑inducing carbs.
  core: Ellen Hilliard is a routine‑loving, community‑driven teen who balances school, cheerleading, volunteering, baking, and meticulous planning into a vibrant life, they occasionally over‑commit but
    always return to their reliable, caring core.
background:
  cultural: Ellen was raised in Cedar Valley, Utah County, a predominantly Latter‑Day Saints community where family, church involvement, and community service are central values. Growing up in a white,
    middle‑class household, she was immersed in a culture that emphasizes practicality, reliability, and a strong work ethic. Local traditions such as Sunday school, community fairs, and outdoor recreation
    in the surrounding mountains have shaped her appreciation for routine, group cohesion, and outdoor activities. While retaining a modern outlook, Ellen's background reflects the conservative yet warm
    social fabric typical of many Utah small towns.
attributes:
  skills: '["Interpersonal communication", "Event planning and coordination", "Microsoft Office and Google Workspace proficiency", "Basic first aid certification", "Cooking and meal preparation", "Time
    management", "Teamwork and collaboration"]'
  hobbies: '["Church youth outreach", "Hiking with friends", "Volunteering at food bank", "Baking and cooking", "Cheerleading/volleyball", "DIY crafting (knitting, crocheting)", "Listening to pop music",
    "Streaming TV series"]'
  career_goals: Ellen aims to enroll in a state university to pursue a degree in nursing, with the long-term goal of becoming a pediatric nurse who can combine her practical skills and caring nature to
    support families in her community. She also considers a backup path in early childhood education, reflecting her interest in nurturing young minds. In either field, she hopes to work in a stable, community-focused
    setting that values routine, reliability, and teamwork. Ellen envisions staying in Utah after graduation to remain close to her family and continue contributing to local service initiatives.
