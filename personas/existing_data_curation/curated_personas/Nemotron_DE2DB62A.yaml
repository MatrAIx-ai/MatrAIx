  hobbies: '[''Coding small projects'', ''Model kit building'', ''Electronics tinkering'', ''Fishing'', ''Cooking Southern dishes'', ''Basketball'', ''Skateboarding'', ''Community clean‑up volunteering'',
    ''Listening to classic rock'', ''Streaming video games'']'
  career_goals: He plans to earn his GED within the next year and then enroll in a vocational program for automotive technology or electrical work, where he can blend his curiosity for how things work with
    marketable, hands‑on skills. In the longer term, he dreams of launching a mobile repair service that offers bike, scooter, and small‑engine maintenance to residents of Savannah, while also developing
    a side business creating custom graphics for local shops. He is motivated by the desire to be self‑reliant, contribute to his community, and turn his practical expertise into a sustainable career.
