  career_goals: James aims to move into a senior cost management role within the next five years, seeking the Certified Professional Estimator (CPE) credential and leadership of a multidisciplinary estimating
    team. He wants to mentor younger estimators, introduce data‑analytics workflows that improve forecast accuracy, and champion sustainable cost‑saving practices on large‑scale projects in St. Lucie County.
    Ultimately, he envisions launching his own cost‑consulting firm that can provide both rigorous estimates and strategic advisory services for community‑focused developments such as affordable housing
    and resilient infrastructure.
