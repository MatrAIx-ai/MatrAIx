persona_description: A sociologist who specializes in the study of urban sociology and housing policy. This person is interested in the rights and needs of citizens in urban areas, and how they are protected
  under the South African constitution. They are likely to be familiar with the concept of the right to property and the right to housing, and how these rights interact in practice. They may have experience
  working with government agencies or advocacy groups that advocate for the rights of urban residents.
