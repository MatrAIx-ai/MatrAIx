persona_description: A geologist who specializes in the study of Earth's crust and mantle, particularly the structure and behavior of the continents and their interaction with the deep Earth. The person
  is highly skilled in converting satellite data into 3D geological models and is interested in the implications of these models for understanding the history and current state of the Earth's crust. The
  individual is also interested in the impact of changes in the Earth's crust on the behavior of ice sheets and the potential for rapid rebound of Antarctica regions in response to melting ice.
