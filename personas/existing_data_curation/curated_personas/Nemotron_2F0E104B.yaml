  career_goals: Martha dreams of one day becoming a veterinarian because she loves animals and wants to help them stay healthy. She is also fascinated by how things work, so she imagines designing eco‑friendly
    inventions that protect wildlife. While she enjoys exploring many possibilities, she hopes to combine her love for nature with practical problem‑solving, perhaps by studying biology or environmental
    science in the future. Her ambition is to keep learning, stay curious, and use her talents to make a positive impact on both her community and the natural world.
