personas:
  professional: An aspiring junior developer and storyteller, Martha Pulcha blends her curiosity about the natural world with a practical knack for building LEGO creations and coding simple Scratch games,
    channeling her competitive spark into designing interactive adventures that celebrate both imagination and structure.
  sports: Martha Pulcha dashes through soccer drills with the Riverside Junior Soccer Club, idolizing the local youth team’s fast‑paced play and cheering for the professional women's side ‘Seattle Reign’,
    while channeling their competitive edge into friendly matches and weekend pick‑up games at the community park.
  arts: Martha Pulcha’s artistic side flourishes through sketching adventures inspired by the classic tales of C.S. Lewis and the whimsical lines of Beatrix Potter, while dancing to vibrant tropical rhythms
    and listening to pop icons like Shakira during family gatherings, infusing every drawing with a splash of color and rhythm.
  travel: Martha Pulcha’s wanderlust is shaped by spontaneous weekend hikes in Willow Creek State Park and a school field trip to the Grand Canyon, dreaming of future adventures to the misty Redwood Forest
    and the sun‑kissed beaches of Costa Rica, often planning trips on a crayon‑drawn map that balances family budgeting with a love for nature.
  culinary: Martha Pulcha enjoys mixing into family‑style traditional pastries—like spiced sweet biscuits and fruit‑filled empanadas—while mastering the art of folding cheesy dumplings, savoring flavors
    of mango, cinnamon, and cheese, and proudly presenting their creations at school potlucks.
  core: Martha Pulcha balances a boundless imagination with a practical, competitive streak, turning every rock‑find, LEGO build, and Scratch code into a tiny adventure, even if they sometimes misplace
    their homework in the process.
background:
  cultural: Martha lives in Mount Morris, Michigan, but she grew up in a vibrant Ecuadorian household where Spanish is spoken daily and family traditions are celebrated. Her parents maintain cultural customs
    such as preparing empanadas, celebrating Carnaval with colorful decorations, and sharing stories about their hometown in the Andes. She participates in community events at the local Hispanic cultural
    center, learning traditional dances and music. While attending a Michigan public school, Martha balances American classroom expectations with her Ecuadorian heritage, often acting as a cultural bridge
    for classmates curious about Latin American food and holidays. This blend of influences nurtures her curiosity, flexibility, and competitive drive, shaping a unique perspective that values both her
    roots and the opportunities of her new environment.
