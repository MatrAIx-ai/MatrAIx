  hobbies: '[''Reading historical novels'', ''Traditional Guatemalan cooking'', ''Gardening (herbs & vegetables)'', ''Woodworking'', ''Birdwatching'', ''Listening to marimba music'', ''Playing dominoes
    with family'', ''Volunteering at community cultural center'']'
  career_goals: Rigo aims to transition into a supervisory or safety‑officer role within his current warehouse, leveraging his extensive operational knowledge to lead a small team. He plans to earn a Certified
    Logistics Associate (CLA) credential and explore emerging inventory technologies such as RFID tagging, balancing his curiosity for new ideas with his practical approach to proven methods. Over the next
    two years, he hopes to launch a mentorship program for younger employees, especially those from the local Latino community, fostering professional growth while preserving his legacy of reliability.
    In parallel, he seeks to implement modest sustainability initiatives—reducing packaging waste and optimizing load planning—to leave a positive environmental imprint before he retires comfortably and
    focuses on his family garden and cultural pursuits.
