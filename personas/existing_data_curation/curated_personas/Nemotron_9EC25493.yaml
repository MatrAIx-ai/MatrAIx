personas:
  professional: Rigo Pascual is a veteran warehouse clerk turned logistics specialist who leverages three decades of inventory control expertise, bilingual communication, and advanced Excel proficiency
    to design efficient SOPs, and they balance a curiosity for emerging RFID technology with a practical, methodical approach to safety and team mentorship.
  sports: Rigo Pascual maintains a modest fitness routine by walking his dog along San Antonio’s Mission Reach Trail, participates in the senior division of the local San Antonio Hiking Club during spring
    and fall, follows the San Antonio Spurs and San Antonio FC with enthusiasm, and they join occasional weekend pickup softball games at the community center, reflecting a low‑key but community‑connected
    approach to sport.
  arts: Rigo Pascual deepens their cultural roots by reading works of Miguel Ángel Asturias and James Michener, listening to the rhythmic marimba performances of Los Cielos, attending local Guatemalan dance
    festivals where Lila Downs’ songs echo, and they admire Frida Kahlo’s paintings at the regional museum, which together shape their reflective artistic identity.
  travel: Rigo Pascual prefers low‑key, culturally immersive trips, having explored the Maya ruins of Tikal, the tranquil shores of Lake Atitlán, and the colonial streets of Antigua, they plan future visits
    to Cusco, Peru and Oaxaca, Mexico, carefully budgeting each journey in a spreadsheet and favoring small‑group tours that accommodate a dog‑friendly pace and a desire for solitude.
  culinary: Rigo Pascual relishes preparing traditional pepian, hand‑wrapped tamales, and warm atole, often adding fresh cilantro, epazote, and a pinch of ancho chili from his backyard herb garden, and
    they boast moderate cooking skills that have earned them the reputation of the neighborhood’s go‑to chef for intimate family gatherings.
  core: Rigo Pascual is a methodical logistics veteran who balances solitary curiosity with practical mentorship, savoring cultural traditions through woodwork, marimba, and herb‑spiced cooking while quietly
    navigating retirement plans and occasional budgeting splurges.
background:
  cultural: Rigo was born in the highlands of Guatemala and emigrated to the United States in his early twenties. He carries forward a strong sense of familial duty, Catholic faith, and a deep appreciation
    for Guatemalan customs such as celebrating Día de la Independencia on September 15 and participating in Semana Santa processions. Fluent in Spanish and English, he bridges both cultures by cooking traditional
    meals for his family and sharing them with neighbors in Davenport, FL, where a vibrant Central American community thrives. His bachelor's degree in arts and humanities deepened his love for literature
    and history, reinforcing his connection to his heritage while shaping a reflective, curious worldview. This bicultural identity informs his career ethic—practical, organized, yet open to new ideas—and
    his personal life, where he balances solitary pursuits with close‑knit family and community gatherings.
