personas:
  professional: Ronald Firmin, a 17‑year‑old budding multimedia artist, merges self‑taught mastery of Procreate, Photoshop, DaVinci Resolve, and basic Python with a collaborative spirit nurtured by community
    workshops, and they organize projects through Trello while delivering polished concept sketches and video edits for local art meet‑ups.
  sports: Ronald Firmin, who plays pick‑up soccer with friends at the neighborhood field on Saturdays and cheers loudly for the New York Islanders during the hockey season, fits their fitness routine into
    early‑morning jogs through the pine‑filled community park and occasional surfing sessions at Jones Beach in the summer heat.
  arts: Ronald Firmin, a regular at local art workshops, channels the storytelling vibes of Guillermo del Toro and the melancholic chords of Phoebe Bridgers into their digital illustrations, while they
    draw inspiration from Edward Hopper’s urban solitude and experiment with sound‑design reminiscent of Daft Punk’s synth‑wave tracks.
  travel: Ronald Firmin, who meticulously plans weekend road trips using Notion and savors budget‑friendly escapes to Block Island’s lighthouse and the surf‑filled shores of Jones Beach, they also dream
    of an immersive cultural adventure through Kyoto’s historic temples and the neon streets of Tokyo after college.
  culinary: Ronald Firmin, who often crafts a simple pepperoni pizza with homemade tomato‑basil sauce and oregano‑sprinkled crust, also enjoys blending peanut butter and banana smoothies with chia seeds
    for a post‑sketching snack, yet they frequently skip meal prepping due to late‑night creative bursts.
  core: Ronald Firmin, a quietly ambitious 17‑year‑old visual storyteller, balances meticulous organization with late‑night artistic spontaneity, thrives on sunrise hikes through pine woods, and they occasionally
    over‑indulge in snack‑fueled coding marathons.
background:
  cultural: Ronald grew up in Levittown, a post‑war suburban community on Long Island, where middle‑class American values shape daily life. His family, of European descent, observes traditional holidays
    such as Thanksgiving and the Fourth of July with neighborhood barbecues and occasional church gatherings, fostering a sense of community harmony. The suburban setting, with its planned streets, public
    parks, and communal spaces, has reinforced his appreciation for cooperation and consideration of others. Access to a well‑stocked public library, local community center, and early broadband internet
    sparked his curiosity for art, technology, and global cultural influences, allowing him to explore beyond the homogeneity of his immediate environment while maintaining a strong connection to his local
    roots.
