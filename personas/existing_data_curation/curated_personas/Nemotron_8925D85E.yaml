  hobbies: '["Riding a bike around the neighborhood", "Playing on the playground and exploring creeks", "Building LEGO models", "Drawing and coloring (animals, space)", "Reading picture books about community
    helpers", "Playing cooperative games (Simon Says, Red Light, Green Light)", "Puzzles and educational tablet apps", "Watching wildlife and space educational shows", "Participating in family activities
    at the county fair"]'
  career_goals: Even at six, America shows a clear fascination with roles that combine order, helping others, and adventure. He often talks about becoming a firefighter because the structured training and
    the chance to protect his community appeal to his desire for predictability and service. He also dreams of caring for animals as a veterinarian, inspired by visits to a local farm and his love for creatures,
    which would let him apply his compassionate side. Occasionally, he imagines exploring space as an astronaut, reflecting his curiosity about the unknown while still craving a clear mission. Overall,
    his ambitions are shaped by the need for stable, purposeful careers that also allow him to help others and stay within a predictable framework.
