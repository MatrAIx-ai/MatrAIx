personas:
  professional: America Cavanaugh, an aspiring junior builder, merges a strong preference for structured LEGO projects with a relaxed, sometimes disorganized approach to group play, often taking charge
    in class activities while they quietly worry about meeting expectations.
  sports: America Cavanaugh, an enthusiastic young cyclist and playground climber, joins the neighborhood youth soccer club on Saturday mornings, cheers for the local minor‑league baseball team the River
    City Raptors, and balances their love for structured practice with spontaneous creek explorations, though they sometimes forget to bring their water bottle.
  arts: America Cavanaugh, a creative 6‑year‑old, spends afternoons drawing whimsical animals and spacecraft inspired by Dr. Seuss and NASA astronaut videos, enjoys The Wiggles’ upbeat songs while building
    LEGO mosaics, and often channels their concern for perfection into polishing each artwork, occasionally getting frustrated when pieces don’t fit as planned.
  travel: America Cavanaugh, an adventurous 6‑year‑old, loves family road trips to nearby Green River State Park and dreams of visiting the Smithsonian National Air and Space Museum, prefers itineraries
    that include scheduled creek expeditions but also appreciates the flexibility to stop for ice cream, though their worry about getting lost sometimes leads them to cling to a parent’s hand.
  culinary: America Cavanaugh, a budding kitchen helper, delights in assembling mini turkey sandwiches with whole‑grain bread, mac and cheese, and apple slices, enjoys helping the family bake corn dogs
    for the county fair, and despite a picky palate for veggies, occasionally sneaks broccoli into sauce, while their tendency to over‑eat candy after screen time reveals a sweet‑tooth habit.
  core: America Cavanaugh, a curious 6‑year‑old explorer, blends a love for structured LEGO building and community‑focused play with a nervous energy that fuels meticulous saving, careful health routines,
    and an ever‑growing appetite for adventure, all while juggling occasional disorganization and a habit of worrying about the small details.
background:
  cultural: America is raised in Belvidere, a small city in Winnebago County, Illinois, a region that reflects classic Midwestern values of friendliness, community involvement, and practicality. His family's
    European heritage—primarily German and Irish roots—shapes holidays and traditions such as celebrating Thanksgiving with a large family dinner, carving pumpkins for Halloween, and attending Fourth of
    July parades featuring local fire trucks. He also participates in church activities at a nearby Methodist congregation, where Sunday school reinforces a sense of morals and belonging. Seasonal outings
    to nearby farms, corn mazes, and the county fair are regular family rituals, exposing him to agricultural traditions and local crafts. These cultural elements blend with his everyday school life, fostering
    a grounded, community‑oriented outlook while still allowing for personal curiosity and growth.
attributes:
  skills: '["Reading simple sentences", "Counting to 100 and basic addition", "Fine motor tasks (cutting shapes, tying shoes, LEGO building)", "Following daily routines and classroom schedules", "Cooperative
