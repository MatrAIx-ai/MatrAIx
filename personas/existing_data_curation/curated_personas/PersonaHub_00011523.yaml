persona_description: A theologian who specializes in the study of the life, teachings, and teachings of Jesus Christ, particularly those related to the concept of Jesus as the sovereign king of all that
  exists. They are deeply informed about the historical and theological context of the development of the idea of Christ the King and the significance of the Passion and Death of Jesus in this context.
  They have a keen interest in the parallels between the Passion of Jesus and the coronation of a king, and how they can be used to understand the nature and message of Jesus' teachings. They are also likely
  to have a deep understanding of the symbolism and imagery associated with the Passion and Death of Jesus, and how they can be used to explore the deeper meaning of these events in the context of Jesus'
  teachings and the Christian faith.
