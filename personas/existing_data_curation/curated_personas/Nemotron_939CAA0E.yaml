  career_goals: Although retired, Minnie Ann aims to continue lifelong learning by taking art history and local heritage classes at a nearby community college. She intends to document her family's genealogy
    and oral histories, preserving them for future generations. She aspires to mentor younger neighbors in cooking, quilting, and gardening, fostering intergenerational connections. Additionally, she hopes
    to help establish a community garden in Dunn that provides fresh produce and a gathering space for residents, and to volunteer as a docent at the local museum to share stories of Black life in rural
    North Carolina.
