personas:
  professional: Minnie Davis, a retired volunteer coordinator, channels her gardening, quilting, and cooking expertise into planning community garden projects and museum docent tours, applying a calm, organized
    yet adaptable approach to budgeting, scheduling, and logistics.
  sports: Minnie Davis follows the Dunn High School Tigers football team and the Charlotte Hornets basketball squad on TV, participates in a neighborhood walking club that meets twice weekly, and occasionally
    joins a senior softball league, preferring low‑impact activity that blends social interaction with gentle exercise.
  arts: Minnie Davis delights in reading Southern historical fiction, painting watercolor landscapes of the local hills, singing gospel hymns in the church choir, and attending community theatre productions
    of classics like Our Town, while drawing inspiration from artists such as Winslow Homer, poet Mary Oliver, and vocalist Aretha Franklin.
  travel: Minnie Davis enjoys weekend road trips along the Blue Ridge Parkway, day trips to Asheville’s River Arts District, and annual family visits to Charleston’s historic district, favoring destinations
    that offer quiet gardens, local museums, and opportunities to trace ancestral roots through genealogy archives.
  culinary: Minnie Davis perfects soul‑food staples such as collard greens simmered with smoked ham hocks, cornbread baked with buttermilk, and sweet‑potato pie spiced with nutmeg, while also experimenting
    with low‑salt gumbo and seasonal garden harvests, often sharing dishes at church potlucks and mentoring younger cooks.
  core: Minnie Davis blends a love for heritage gardening, soulful cooking, and community storytelling into a quiet life of stewardship, marked by a habit of humming hymns while stitching quilts and a penchant
    for misplacing favorite garden gloves.
background:
  cultural: Minnie Ann was raised in a close‑knit Black community in Johnston County, where the legacy of Southern farming, church life, and oral storytelling shaped her worldview. Her grandparents were
    sharecroppers who instilled values of hard work, hospitality, and resilience during the era of segregation and the civil‑rights movement. The Baptist church has been a cornerstone of her cultural identity,
    providing a space for worship, music, and communal support. Family recipes, seasonal gardening, and quilting traditions reflect a blend of African‑American heritage and Southern rural life, influencing
    her daily practices and the way she connects with her community.
