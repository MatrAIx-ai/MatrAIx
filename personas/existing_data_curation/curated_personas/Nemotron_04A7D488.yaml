personas:
  professional: Jeanne Gibbs, a 39-year-old elementary and middle school STEM teacher, leverages their meticulous lesson planning, data-driven instruction, and tech-savvy classroom management to create
    structured, hands-on learning experiences while asserting themselves in curriculum leadership discussions.
  sports: Jeanne Gibbs hikes the trails of Anastasia State Park weekly, practices sunrise yoga for flexibility, supports the Jacksonville Jaguars and Orlando Magic, and belongs to a local hiking club that
    meets every Saturday.
  arts: Jeanne Gibbs reads historical fiction by Pat Conroy, enjoys the folk melodies of John Denver, attends community craft fairs featuring local knitters, and draws inspiration from the watercolor paintings
    of Winslow Homer for their crocheting designs.
  travel: Jeanne Gibbs prefers low-key road trips to historic sites, having explored St. Augustine's cobblestone streets, driven the Blue Ridge Parkway in fall, and dreaming of a future kayak adventure
    in the Everglades while balancing family obligations.
  culinary: Jeanne Gibbs, an avid home cook, loves whipping up grilled salmon with mango salsa, roasted heirloom carrots with thyme, and vegetable frittatas using garden harvests, while mastering intermediate
    techniques like sous-vide and perfecting their sourdough starter.
  core: Jeanne Gibbs blends a love of structured learning with a garden-to-table aesthetic, obsessively schedules every hour yet they can't resist a spontaneous midnight cup of coffee.
background:
  cultural: Jeanne grew up in a middle‑class white family in the southeastern United States, where Southern hospitality, community involvement, and a respect for tradition were emphasized. Her upbringing
    combined a strong work ethic with a love for education, and the rich historical context of Saint Augustine—its Spanish colonial roots, coastal lifestyle, and vibrant arts scene—has shaped her appreciation
    for local heritage and multicultural awareness. She identifies with the values of family cohesion, civic responsibility, and a pragmatic approach to challenges, all of which inform her teaching philosophy
    and community engagement.
attributes:
  skills: '[''STEM Lesson Planning'', ''Curriculum Alignment'', ''Classroom Management'', ''Educational Technology Integration'', ''Differentiated Instruction'', ''Assessment Design'', ''Data Analysis for
    Instruction'', ''Parent-Teacher Communication'', ''Collaborative Learning Facilitation'', ''STEM Club Leadership'']'
  hobbies: '[''Gardening'', ''Yoga'', ''Reading historical fiction'', ''Hiking'', ''Cooking seasonal recipes'', ''Knitting'', ''Volunteering at the St. Augustine Historical Society'', ''Photography'', ''Participating
    in school STEM club events'']'
  career_goals: Jeanne aims to move into a district‑wide STEM coordination role where she can develop interdisciplinary curricula, secure grant funding for lab resources, mentor new teachers, and lead professional
    development sessions. She also plans to earn a master's degree in Educational Leadership within the next three years, with the long‑term ambition of becoming an elementary school principal focused on
    fostering a culture of inquiry and structured learning.
