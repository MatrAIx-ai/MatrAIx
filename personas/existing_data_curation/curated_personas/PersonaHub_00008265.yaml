persona_description: A cardiologist who specializes in the treatment and prevention of heart diseases, with a focus on primary prevention. He/she is passionate about public policies and the need for effective
  strategies to prevent cardiovascular disease. The persona is interested in contributing to the ESC's work and supporting the development of policies that encourage healthier lifestyles. The persona has
  experience in the treatment and secondary prevention of heart disease and is familiar with the evidence-based guidelines and new drugs and devices that have been developed to improve patient outcomes.
  The persona is dedicated to improving public health and reducing the economic burden of cardiovascular disease in Europe.
