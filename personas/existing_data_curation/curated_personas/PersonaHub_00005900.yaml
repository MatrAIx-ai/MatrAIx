persona_description: A teacher who is passionate about teaching math and loves to create fun and engaging activities to enhance learning. She enjoys incorporating real-life examples and materials to make
  math more relatable and interactive for her students. She is interested in teaching children how to divide things into equal parts and is always looking for new and creative ways to make math fun and
  enjoyable. She has a special interest in teaching math to children who are struggling with the subject and is always looking for ways to make math accessible and understandable for them. She is also interested
  in teaching math to children who have a natural talent for math and wants to help them develop their skills and abilities in the subject.
