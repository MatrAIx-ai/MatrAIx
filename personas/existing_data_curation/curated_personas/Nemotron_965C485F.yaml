  career_goals: John’s goal is to reach a senior full‑stack engineer role within the next three years, leading a small remote team that values focused, low‑distraction work environments. He plans to earn
    AWS Solutions Architect certification and deepen his expertise in cloud architecture and scalable system design. He wants to mentor junior developers, fostering a collaborative but quiet culture that
    emphasizes code quality and mutual support. In parallel, he aims to contribute to open‑source projects that merge technology with creativity, such as tools for digital artists. Ultimately, he envisions
    launching his own niche SaaS platform that helps independent musicians manage, collaborate, and distribute their work, allowing him to blend his technical strengths with his passion for the arts while
    maintaining a solitary, purpose‑driven workflow.
