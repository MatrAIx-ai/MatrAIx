personas:
  professional: John Valencia, a 27‑year‑old full‑stack engineer proficient in Python/Django and React, merges his methodical coding standards with a minimalist eye for UI/UX to craft clean, well‑documented
    web applications while quietly leading a remote team and mentoring junior developers in a low‑distraction environment.
  sports: John Valencia enjoys low‑impact fitness, hiking the gentle trails of Clinton County with the local Trailblazers Club each spring and fall, playing pickup basketball on Thursday nights at the town
    gym while cheering for the Indianapolis Colts and Indiana Pacers, and occasionally cycling the quiet backroads that wind past nearby Amish farms.
  arts: John Valencia finds solace in painting watercolor landscapes of cornfields and sunset skies while listening to Sufjan Stevens, Gillian Welch, and the indie folk duo The Staves on his vinyl turntable,
    and he frequently visits the modest county art gallery to admire works by regional watercolorist Mary Lou McMurray, as well as attending indie film screenings showcasing directors like Greta Gerwig
    and Jim Jarmusch.
  travel: John Valencia prefers meticulously planned road trips that blend scenic solitude with cultural stops, having driven historic Route 66 to explore small‑town cafés in Oklahoma and Missouri, spent
    weekend hikes in Asheville’s Blue Ridge Mountains, and dreaming of a future trek across New Zealand’s South Island after saving enough to fund independent travel without compromising his modest budget.
  culinary: John Valencia, a competent home cook, often prepares simple Midwestern comfort meals such as herb‑roasted chicken with rosemary potatoes, fresh corn succotash, and apple‑cinnamon crumble using
    locally sourced produce from the farmer’s market, and he delights in pairing craft beers with sharp cheddar while occasionally experimenting with homemade kombucha and a meticulously crafted kebab board.
  core: John Valencia, a quiet yet curious coder‑artist, channels his small‑town work ethic into meticulously clean code, watercolor landscapes, and a disciplined savings plan, all while wrestling with
    a habit of checking GitHub notifications at midnight.
background:
  cultural: John grew up in Frankfort, a small town in Clinton County, Indiana, within a predominantly White Midwestern community that places high value on hard work, modesty, and close‑knit family ties.
    The agricultural setting and nearby Amish farms have reinforced his preference for quiet, contemplative spaces and self‑reliance. Though his formal education concluded with high school, he pursued programming
    through online courses and a local coding bootcamp, embodying a cultural emphasis on resourcefulness. He participates in community events such as the county fair, supports the town’s modest arts scene,
    and enjoys folk and indie music gatherings that reflect the region’s creative spirit.
