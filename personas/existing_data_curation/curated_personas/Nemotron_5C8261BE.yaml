  career_goals: Even at four, Hilda loves dreaming about the future. She often says she wants to become a painter who creates magical pictures, a teacher who tells stories to help friends learn, or a community
    helper who cares for animals. These aspirations reflect her love for art, her sociable nature, and her desire to make others happy.
