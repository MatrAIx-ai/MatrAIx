personas:
  professional: Hilda, a four‑year‑old pretend‑play designer, channels their boundless imagination and meticulous planning into creating elaborate sandbox kingdoms, while their talkative, sociable demeanor
    makes them the de‑facto leader of classroom games, ensuring every friend feels included and the story stays on track.
  sports: Hilda, a tiny sports enthusiast, sprints through weekly toddlers' soccer sessions with the Little Explorers FC, proudly wears a cap of the Los Angeles Dodgers, and loves cheering in the stands
    at a nearby Little League game, where their energetic presence keeps their teammates motivated.
  arts: Hilda, a budding mini‑artist, spends afternoons with crayons replicating Monet’s water lilies on oversized paper, delights in singing along to Rachel Platten’s \"Fight Song\" on rewind, and never
    misses a Saturday morning \"Sesame Street\" marathon, where the vibrant puppets fuel their own vivid stories.
  travel: Hilda, an adventurous four‑year‑old, deems family trips to Disneyland and the local aquarium as grand expeditions, meticulously packing their tiny backpack with a plush giraffe and a sticker‑filled
    passport, while harboring a vivid daydream of visiting the cherry‑blossom festivals in Kyoto someday.
  culinary: Hilda, a culinary explorer in training, adores cheesy macaroni, honey‑drizzled banana slices, and mini chicken nuggets, proudly prepping a peanut‑butter‑banana sandwich with the help of an adult,
    yet squeals in dismay when presented with broccoli, illustrating both their willingness to help in the kitchen and their selective palate.
  core: Hilda blends boundless imagination with meticulous planning, turning everyday play into organized adventures while navigating intense emotions with a heart that craves both attention and harmony.
background:
  cultural: Hilda is raised in a Honduran‑American household in Lynn, Massachusetts. She speaks both Spanish and English, hears traditional Honduran lullabies and marimba rhythms at home, and celebrates
    cultural events such as Día de la Independencia de Honduras with family gatherings and foods like pastelitos and platanitos. The vibrant Latinx community in Lynn provides her with opportunities to attend
    cultural dance classes, community festivals, and bilingual storytimes at the public library, all of which shape her identity and interests.
