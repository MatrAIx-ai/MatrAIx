  hobbies: '[''Classic car restoration'', ''Fishing'', ''Weight‑lifting at the community gym'', ''Attending local high school football games'', ''Reading automotive repair manuals'', ''Watching DIY mechanic
    videos'', ''Family gatherings and BBQs'', ''Model car building'']'
  career_goals: Timothy aims to become a Master ASE‑certified technician within the next three years, positioning himself as the lead specialist in his shop. He wants to expand his expertise to hybrid and
    electric vehicle systems, giving him a competitive edge as the market evolves. Long‑term, he envisions opening a family‑run garage that emphasizes reliable, routine‑based service for the Springfield
    community, providing a stable income and legacy for his wife and future children.
