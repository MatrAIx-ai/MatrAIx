  career_goals: Charles aspires to turn his love for building and coding into a career as a robotics engineer or software developer. He hopes to create affordable tech solutions that benefit his community,
    such as low‑cost environmental monitoring devices. In the short term, he aims to lead his high school robotics team to a regional competition win and secure a summer internship at a local tech firm
    or makerspace.
