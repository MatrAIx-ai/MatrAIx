  career_goals: John aims to become a senior associate and eventually a partner at his firm, focusing on building a practice that integrates traditional litigation with alternative dispute resolution. He
    aspires to lead a pro bono program that provides legal assistance to low‑income families in Middlesex County, and he hopes to teach a part‑time course on legal ethics at a local law school. Over the
    next five years, he envisions launching a boutique consultancy that advises small businesses on regulatory compliance while also advocating for policy reforms that promote access to justice.
