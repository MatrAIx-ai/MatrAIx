  career_goals: Although still young, Francisco dreams of a future where he can combine his love for the ocean, his curiosity about how things work, and his desire to help others. He aspires to become a
    marine biologist or environmental engineer, hoping to protect the coastal ecosystems near Aptos and develop sustainable solutions for his community. He also imagines teaching younger kids, sharing his
    knowledge of science and technology, and learning how to make a positive impact.
