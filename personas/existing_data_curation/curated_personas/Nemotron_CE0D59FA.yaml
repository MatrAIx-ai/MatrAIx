personas:
  professional: Francisco Rosario, a budding young technologist, combines a love for reading science books and building intricate LEGO creations with methodical problem‑solving skills, channeling curiosity
    and practicality into Scratch programming projects that animate stories while they reliably meet school deadlines.
  sports: Francisco Rosario, a spirited member of their elementary school's soccer team, spends weekends playing midfield for the local youth club while cheering for Club América, and they balance a love
    for teamwork with a personal routine of daily beach jogs collecting shells to stay fit.
  arts: Francisco Rosario, an avid comic‑strip creator, draws inspiration from the bright storytelling of Stan Lee and the expressive panels of Art Spiegelman, while also enjoying the lively melodies of
    mariachi bands during cultural festivals, and they blend visual art and music into a personal creative outlet.
  travel: Francisco Rosario, an enthusiastic explorer, loves family beach trips to Playa del Carmen where they hunt tide‑pool critters and dream of visiting the historic ruins of Chichén Itzá, and they
    balance relaxed sand days with a curiosity for ancient history while maintaining a cautious budgeting approach.
  culinary: Francisco Rosario, a kitchen apprentice, enjoys preparing tacos al pastor, homemade salsa roja with fresh chilies, and tamales during family gatherings, skillfully following traditional recipes
    while often adding a pinch of cinnamon for fun, though they sometimes forget to wash their hands after handling raw meat, prompting gentle reminders from their parents.
  core: Francisco Rosario is a methodical, curious ten‑year‑old whose love of LEGO, science, and soccer is tempered by a vivid imagination and a touch of anxiety that drives both meticulous planning and
    occasional over‑thinking, and they often find comfort in organized routines.
background:
  cultural: Francisco was raised in a Mexican-American household in Aptos, California, where Spanish is spoken at home and English at school. His family maintains strong ties to Mexican traditions, celebrating
    holidays such as Día de los Muertos, Mexican Independence Day, and family gatherings featuring mariachi music and traditional foods like tamales and pozole. The coastal setting and the multicultural
    community of Santa Cruz County have exposed him to environmental stewardship values. He identifies with both his Mexican heritage and his Californian upbringing, blending bilingual communication, cultural
    pride, and a respect for nature.
