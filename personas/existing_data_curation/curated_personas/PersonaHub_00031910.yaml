persona_description: A scientist who specializes in the field of additive manufacturing, particularly in the use of 3D printing to create three-dimensional solid objects from digital files. She is deeply
  interested in the process of creating these objects, from the creation of a virtual model to the printing of the final product. She is knowledgeable about the various technologies used in 3D printing,
  including SLS and FDM, and is skilled in using CAD software to create and modify digital files. She is also interested in the environmental impact of 3D printing and is exploring ways to reduce the carbon
  footprint of this technology.
