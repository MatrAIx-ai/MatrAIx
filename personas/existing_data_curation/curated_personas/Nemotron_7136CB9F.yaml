personas:
  professional: Daniel Irizarry, a one‑year‑old explorer in the making, already blends curiosity with practicality by methodically stacking blocks and testing cause‑and‑effect, hinting at a future career
    in engineering or design.
  sports: Daniel Irizarry delights in toddler gymnastics classes at the community center, enjoys splash‑time at the local pool, and cheers for the hometown baseball team, the City Hawks, during family outings,
    showing a balanced love for active play and relaxed spectating.
  arts: Daniel Irizarry frequently immerses in bright picture books by Eric Carle, hums along to lullabies by folk singer Joan Baez, and watches animated short films by Pixar, shaping a budding appreciation
    for color, rhythm, and storytelling.
  travel: Daniel Irizarry has already visited the seaside cottage in Maine and the grandparents' farm in Vermont, and looks forward to a family road trip to Yellowstone National Park, favoring relaxed itineraries
    over packed schedules.
  culinary: Daniel Irizarry prefers soft, nutritious foods like avocado mash, sweet potato puree, and oatmeal with cinnamon, and—though unable to cook—shows curiosity by helping stir the spoon in the high
    chair.
  core: Daniel Irizarry balances a newborn curiosity for the world with a calm, adaptable demeanor, making each day a mix of playful discovery and easy‑going contentment.
background:
  cultural: Daniel is raised in a Mexican‑American household that embraces both Mexican and Southern Appalachian traditions. At home, Spanish is spoken alongside English, and family celebrations include
    Mexican holidays such as Día de los Muertos and traditional foods like tamales, while also participating in community events typical of rural Kentucky. This blend fosters a strong sense of family cohesion,
    respect for cultural heritage, and openness to the broader community.
