persona_description: A volunteer acupuncturist who has recently traveled to Guatemala to teach and train indigenous health care promoters in basic diagnosis and acupuncture treatment modalities. This person
  is curious about the cultural differences between modern patients and those who lived closer to the land, and is eager to learn more about the ancient theories of environmental interaction that apply
  to patients who have great control over their environments. This person is also interested in challenging themselves and spreading the gospel according to the Nei Jing.
