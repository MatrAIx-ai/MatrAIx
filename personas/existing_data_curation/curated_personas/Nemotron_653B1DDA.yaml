  hobbies: '["Coastal photography", "Watercolor painting", "Kayaking", "Hiking", "Reading food history", "Visiting art galleries", "Home recipe experimentation", "Volunteer work at food festivals"]'
  career_goals: Kenneth aims to become a head chef at a respected fine-dining restaurant on the Outer Banks, where he can shape the menu around locally sourced seafood and present dishes as edible art.
    In the longer term, he hopes to open his own farm-to-table bistro that blends Southern coastal flavors with creative, unconventional techniques he discovers through travel and culinary research. He
    also plans to earn a formal culinary certification and eventually mentor the next generation of cooks, emphasizing teamwork and artistic expression.
