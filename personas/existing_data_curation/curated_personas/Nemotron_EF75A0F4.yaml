  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Book club'', ''Crocheting'', ''Hiking'', ''Community service'', ''Church activities'']'
  career_goals: Juliet aims to advance to a store manager position within the next two years, with a longer‑term goal of becoming a district manager overseeing multiple locations. To prepare for these roles,
    she plans to enroll in an associate’s program in Business Administration at a community college and pursue certifications in retail management and leadership. She is also interested in developing a
    mentorship program for entry‑level sales associates at her store, improving staff retention, and implementing data‑driven sales strategies to boost profitability. Ultimately, she envisions leveraging
    her experience to open a boutique focused on locally sourced products, contributing to her community’s economic vitality.
