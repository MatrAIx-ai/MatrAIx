  hobbies: '[''LEGO building'', ''DIY robotics'', ''Soccer'', ''Reading adventure and sci‑fi books'', ''Watching educational videos about space and technology'', ''Writing short stories'', ''Volunteering
    at the community library'']'
  career_goals: Ilia dreams of becoming an engineer or inventor who creates practical solutions to everyday problems, such as designing safer playground equipment or eco‑friendly gadgets. He is particularly
    fascinated by robotics and hopes to study mechanical engineering in high school and later at university. At the same time, his outgoing nature makes him imagine a role that involves helping others,
    like a community outreach coordinator for a science museum, where he could share his love of discovery with younger kids. He aims to balance his technical interests with his desire to work in teams
    and make a positive impact on his neighborhood while developing resilience to manage the worries he sometimes feels.
