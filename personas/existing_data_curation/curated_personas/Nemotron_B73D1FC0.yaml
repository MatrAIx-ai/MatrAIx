personas:
  professional: Ilia White is a budding ten‑year‑old robotics enthusiast who channels a love for complex LEGO builds and a DIY robotics kit into early engineering problem‑solving, blending curiosity with
    a practical, organized approach while eagerly collaborating with peers on school projects; they often document each build with sketches and notes.
  sports: Ilia White is an energetic member of the Townsville Youth Soccer Club, loves cheering for Manchester United and the local women's basketball team, and balances after‑school drills with weekend
    park games, while sometimes worrying about missing a goal and they keep a sports journal to track progress and boost confidence.
  arts: Ilia White immerses themselves in creative storytelling by writing short sci‑fi tales inspired by authors like Jules Verne and watching The LEGO Movie, while also enjoying the music of Imagine Dragons
    and drawing comic panels during free time, and they often share their sketches with friends at the library reading program.
  travel: Ilia White dreams of visiting the Kennedy Space Center after a virtual tour of the International Space Station sparked their fascination with space, and they have already explored nearby state
    parks and the city’s science museum, preferring a mix of hands‑on activities and guided tours; they keep a travel scrapbook to record each adventure.
  culinary: Ilia White enjoys assembling homemade mini‑pizzas topped with pepperoni and extra cheese, whipping up fruit smoothies with banana and strawberries, and confidently making a basic spaghetti carbonara,
    though they occasionally forget to eat vegetables and they rely on snack breaks during long LEGO sessions.
  core: Ilia White is a curious, organized ten‑year‑old who balances a love for building robots and soccer with lingering worries, channeling anxiety into journal writing and meticulous LEGO design; they
    often rehearse presentations for family gatherings.
background:
  cultural: Ilia grows up in Mount Prospect, a suburban community in Cook County, Illinois, where Midwestern values of friendliness, community involvement, and practicality are emphasized. His family observes
    common American holidays such as Thanksgiving, Independence Day, and Christmas, and they participate in neighborhood events like block parties and local park clean‑ups. The local school system encourages
    participation in extracurricular clubs, especially STEM and sports, which aligns with Ilia’s interests. The cultural milieu blends a suburban American lifestyle with a strong emphasis on education,
    teamwork, and civic responsibility.
