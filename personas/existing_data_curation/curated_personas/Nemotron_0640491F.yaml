personas:
  professional: Elisha Stallworth, an eight‑year‑old budding urban designer, channels their love for LEGO cityscapes and meticulous planning into sketching futuristic skylines, approaching each project
    with methodical precision, a friendly competitive spark, and the calm resilience of a seasoned architect in training.
  sports: Elisha Stallworth, an enthusiastic member of the Patapsco Valley Youth Soccer League, cheers for the Baltimore Ravens on game nights, practices soccer drills on weekends, and balances competitive
    spirit with solo trail runs at Patapsco Valley State Park, often timing themselves against personal bests while they document leaf collections for fuel.
  arts: Elisha Stallworth, a creative prodigy, spends afternoons drawing cartoons inspired by classic Disney animators, painting watercolors of the park’s foliage like a miniature Monet, composing piano
    pieces that echo the jazzy improvisations of Billie Holiday and the soulful rhythms of Sam Cooke, and exploring digital art on a tablet with a curiosity for unconventional storytelling, and they often
    share their creations with family.
  travel: Elisha Stallworth, an adventurous eight‑year‑old, loves family road trips to the historic streets of Annapolis, the bustling markets of Philadelphia, and weekend hikes in Shenandoah National Park,
    preferring to plan nature journal entries before each outing while they balance the excitement of discovery with the practical limits of school schedules and a modest travel allowance.
  culinary: Elisha Stallworth, a budding home chef, delights in mixing fresh strawberries with vanilla yogurt for snack time, whipping up cheesy pasta bites reminiscent of classic mac & cheese, and experimenting
    with simple sushi rolls during a weekend cooking class, all while they insist on arranging their plate artfully like a mini‑canvas.
  core: Elisha Stallworth, a calm yet fiercely competitive eight‑year‑old, blends boundless curiosity for art and puzzles with a methodical habit of organizing every LEGO piece, a tendency to double‑check
    allowance totals, and an occasional habit of lingering over unfinished sketches long after bedtime, and they often replay the day’s challenges in their mind before sleeping.
background:
  cultural: Elisha comes from a proud African‑American family rooted in Maryland’s rich Black history. Her parents grew up in Baltimore and instilled in her a respect for the civil‑rights legacy of the
    region, celebrating Juneteenth and Kwanzaa with family gatherings, storytelling, and traditional foods like collard greens and sweet potato pie. She attends a local Baptist church where the choir and
    community service programs reinforce a sense of belonging. Elisha’s grandparents share oral histories about the Great Migration, which fuel her curiosity about her heritage. Through school and community
    events, she participates in cultural showcase days that highlight African‑American art, music, and literature, reinforcing a strong connection to her cultural identity while encouraging her to be a
    role model for other young Black girls.
attributes:
  skills: '["Advanced reading comprehension", "Creative drawing and digital illustration", "Block‑based coding (Scratch)", "Basic piano playing", "Organizational and time‑management skills", "Logical puzzle
    solving", "Small‑group leadership"]'
  hobbies: '["Drawing and watercolor painting", "Digital illustration (tablet)", "LEGO model building", "Piano practice", "Reading mystery/adventure books", "Puzzle solving", "Chess", "Nature journaling",
    "Community garden volunteering"]'
  career_goals: Elisha dreams of turning her love of art and technology into a future career as a graphic designer or video‑game creator, where she can blend storytelling, illustration, and coding. She
    also aspires to become a scientist‑astronaut, hoping to one day participate in a space mission and share her experience with other children. In the near term, she is determined to win her school’s art
    contest, place in the regional math competition, and qualify for a youth chess tournament, seeing each achievement as a step toward a lifelong goal of inspiring other kids—especially girls of color—to
    pursue creative and STEM fields.
