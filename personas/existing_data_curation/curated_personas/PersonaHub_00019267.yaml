persona_description: A historical archaeologist who specializes in the study of industrial heritage sites, particularly those related to the production of lime. The individual is interested in the history
  and development of lime kilns and the techniques used to produce lime, as well as the impact of these sites on the local economy and society. They are likely to have a deep understanding of the technical
  details of lime kilns, such as the layout of the kiln, the materials used, and the methods of production. They may also have a keen interest in the social and cultural significance of these sites, and
  how they have been used and interpreted over time.
