personas:
  professional: Sean Roberts is a methodical instructional designer specializing in data-driven curricula for adult learners, leveraging their prowess in Python, R, and LMS platforms like Canvas to craft
    clear lesson plans and formative assessments that cater to solitary learners, and they balance curiosity for emerging pedagogical tools with the practicality of meeting accreditation standards.
  sports: Sean Roberts enjoys solitary fitness pursuits, such as early-morning hikes along the Santa Monica cliffs and weekend trail runs that culminate in photographing sunrise vistas, while casually following
    the LA Dodgers and supporting the local beach volleyball club even though they rarely join team drills, preferring the quiet rhythm of solo cardio.
  arts: Sean Roberts finds creative solace in acoustic guitar, often strumming folk songs by Nick Drake and Joni Mitchell while composing reflective poetry inspired by Mary Oliver, and they capture coastal
    light in photographs reminiscent of Chris Burkard, frequently attending indie film screenings at the LACMA's Small Cinema for a dose of visual storytelling.
  travel: Sean Roberts prefers low-key, solo travel itineraries that blend mindful exploration with budget constraints, having trekked the John Muir Trail, explored Kyoto's Zen gardens, and planning a future
    trip to the Cinque Terre to photograph cliffside villages, they meticulously plan each journey on Google Docs and avoid crowded tourist hotspots in favor of quiet beaches.
  culinary: Sean Roberts enjoys brewing pour-over coffee with Ethiopian Yirgacheffe beans using a Hario V60, and balances their diet with simple meals like avocado toast, quinoa bowls with roasted vegetables,
    and occasional sushi rolls, though they admit to overcooking pasta when distracted by a new coding project, and they experiment occasionally with homemade granola.
  core: Sean Roberts is a solitary, curiosity-driven instructional designer who blends methodical precision with creative reflection, often found lost in chess puzzles or coastal photography while they
    quietly plan their next data-driven lesson.
background:
  cultural: Sean identifies as a white American raised in Southern California, shaped by the region’s blend of coastal lifestyle, progressive environmental values, and multicultural exposure. Growing up
    in a middle‑class family, he internalized a strong work ethic, independence, and respect for personal space. The diverse, open atmosphere of Santa Monica has fostered his appreciation for different
    perspectives and his curiosity about education and technology. While traditionally grounded in mainstream American cultural norms, he also embraces the West Coast’s emphasis on health, sustainability,
    and community involvement, often participating in local beach clean‑ups and attending public lectures on social issues.
