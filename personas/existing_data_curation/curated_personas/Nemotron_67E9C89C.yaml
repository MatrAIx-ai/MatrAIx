  career_goals: Sean aims to complete a bachelor's degree in Education or his subject area within the next 2-3 years, followed by obtaining teaching credentials. He aspires to become a full-time faculty
    member at a community college, specializing in data-driven instructional design. He wants to develop and publish open educational resources that support solitary learners. Long term, he envisions leading
    a curriculum development department or founding an online tutoring platform focused on self-paced, evidence-based learning, integrating his curiosity for new pedagogical methods with practical implementation.
