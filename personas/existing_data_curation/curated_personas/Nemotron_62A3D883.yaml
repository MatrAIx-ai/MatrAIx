personas:
  professional: Leticia Hughes leverages their 30‑year Houston taxi expertise and channels their boundless curiosity about art into piloting a community‑focused ride service that doubles as a mobile gallery
    tour, while they chat up passengers with the enthusiasm of a seasoned storyteller.
  sports: Leticia Hughes cheered the Houston Astros and the Houston Rockets from the end of the taxi queue, participates in a weekend community yoga class at a local park, and they squeeze in evening walks
    with their dog to keep their back healthy while occasionally joining a casual softball league.
  arts: Leticia Hughes frequents the Menil Collection and the Museum of Fine Arts while humming to Wynton Marsalis and Sam Cooke, attends midnight open‑mic nights at the Continental Club, and they love
    quoting lines from August Wilson’s plays during rides to keep passengers immersed in artistic conversation.
  travel: Leticia Hughes dreams of a road‑trip along the Gulf Coast, has already explored New Orleans’ French Quarter for its Creole cuisine, spent a weekend in Austin’s live‑music scene, and they plan
    a future visit to Savannah’s historic squares while budgeting each adventure through a meticulous travel fund.
  culinary: Leticia Hughes whips up gumbo with okra, shrimp, and Andouille sausage for friends, perfects collard greens seasoned with smoked turkey, and they indulge in sweet tea and a dash of Tabasco,
    while occasionally treating themselves to a beignet from a downtown café.
  core: Leticia Hughes transforms each taxi journey into a rolling art lecture, hoards spare change for a future cultural‑rides fleet, and despite their organized schedule, habitually forgets to water their
    garden tomatoes until the last possible moment.
background:
  cultural: Leticia is a Black woman whose family roots trace back to the Southern United States, with cultural traditions that blend African‑American heritage and the distinctive flavors of Texas. Growing
    up in a close‑knit community, she was immersed in church life, gospel music, and storytelling that emphasized resilience, togetherness, and respect for elders. Her upbringing in the Houston metro area
    exposed her to a rich tapestry of Black cultural expression—from soul food and Southern cooking to jazz clubs and historic Black neighborhoods. These experiences have shaped her values of harmony, community
    service, and celebration of artistic creativity. She draws strength from the legacy of Black women who have navigated and thrived in the transportation and service industries, and she strives to honor
    that lineage through her work and community involvement.
attributes:
  skills: '[''Navigation and route planning'', ''Safe defensive driving'', ''Customer service and conflict resolution'', ''Ride‑hailing app proficiency'', ''Basic vehicle maintenance'', ''Cash handling'',
    ''First‑aid basics'', ''Cultural knowledge of local art and events'', ''Effective communication and storytelling'', ''Community outreach'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending community theater and open‑mic nights'', ''Listening to jazz, blues, and R&B'', ''Gardening'', ''Cooking Southern and Creole cuisine'', ''Participating
    in neighborhood block parties'', ''Reading biographies of artists and innovators'', ''Volunteering at an adult literacy program'']'
  career_goals: Leticia aims to transition from driving for a single company to owning a small, community‑focused transportation fleet that emphasizes courteous service and cultural enrichment. She plans
    to earn her GED within the next year and enroll in a community college course on small‑business management. Long‑term, she hopes to create a “cultural rides” program that pairs her taxi service with
    curated tours of local art exhibits, historic sites, and music venues, fostering greater appreciation of the arts among residents and visitors. Additionally, she wants to mentor younger drivers, especially
    women of color, sharing her expertise in safety, customer care, and navigating the industry.
