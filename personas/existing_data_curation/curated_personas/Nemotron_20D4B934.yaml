    art creation (Processing, p5.js)'', ''Mentoring and teaching'']'
  hobbies: '[''Watercolor painting'', ''Generative art programming (Processing, p5.js)'', ''Hiking in the Sierra Foothills'', ''Vegetable gardening'', ''Reading historical fiction'', ''Reading science nonfiction'',
    ''Classical music concerts'', ''Playing piano'', ''Volunteer coding workshops for seniors'', ''Small book club'', ''Mindfulness meditation'', ''Yoga'', ''Journaling'']'
  career_goals: Farah aims to transition into part‑time consulting focusing on building accessible digital tools for local nonprofits and community arts projects. She aspires to lead workshops that empower
    seniors to use technology confidently, and to contribute open‑source libraries that simplify inclusive UI design. Over the next few years she hopes to author a memoir reflecting on her journey as a
    woman in tech, and to curate an interdisciplinary hackathon that merges code with visual arts. While she plans to gradually reduce full‑time coding commitments, she remains driven to leave a lasting
    positive impact on her community and the broader tech field.
