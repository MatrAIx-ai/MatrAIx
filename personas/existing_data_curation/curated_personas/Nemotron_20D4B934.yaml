personas:
  professional: A veteran full-stack developer and agile project lead, Farah Barker leverages four decades of Python, JavaScript, and UI design expertise to craft accessible digital tools for nonprofits,
    while mentoring seniors and infusing their love of watercolor aesthetics into clean, well-documented code.
  sports: An avid hiker and seasonal trail runner, Farah Barker belongs to the Sierra Foothills Hiking Club, follows the San Francisco Giants and Golden State Warriors on game nights, and dedicates Saturday
    mornings to forest treks that balance their love of nature with a low-impact fitness routine.
  arts: A watercolor enthusiast and generative-art coder, Farah Barker regularly visits the Nevada City Art Center, draws inspiration from Ansel Adams' landscapes and the music of Leonard Bernstein, and
    curates mini-exhibitions that blend code, brushstrokes, and folk motifs, reflecting their appreciation for both classic and contemporary artistic expressions.
  travel: A methodical planner with a penchant for nature, Farah Barker has photographed Yellowstone, hiked Yosemite's misty trails, and hopes to explore Iceland's geothermal lagoons and Kyoto's historic
    temples, always budgeting trips around their volunteer commitments and preferring low-key itineraries.
  culinary: A garden-to-table cook, Farah Barker delights in simmering heirloom tomato gazpacho, roasting beet-goat cheese salads, and seasoning dishes with fresh rosemary and citrus, though they occasionally
    over-spice in a quest for bold flavor.
  core: Farah Barker is a meticulous tech veteran who melds code with canvas, worries about every detail yet finds calm in mindful hikes and community workshops.
background:
  cultural: Farah grew up in a middle‑class white family in the American West, absorbing the values of independence, community service, and a respect for nature typical of the region. Her upbringing emphasized
    education and self‑reliance, while frequent family trips to national parks fostered an early love of the outdoors. After earning a STEM bachelor's degree, she entered the burgeoning tech industry of
    the 1980s, navigating a male‑dominated environment with resilience. Settling in Nevada City, a historic gold‑rush town now known for its vibrant arts scene and progressive community, she blends her
    Western American roots with a deep appreciation for the local cultural fabric, including folk art, environmental stewardship, and collaborative community initiatives.
