persona_description: A researcher and educator who is passionate about promoting understanding and respect towards older people. They are experienced in organizing workshops and events aimed at engaging
  children in discussions about age stereotypes and promoting intergenerational relationships. They are knowledgeable about the government guidelines for social education and the impact of media on perceptions
  of age. They are skilled in facilitating discussions and activities that challenge stereotypes and promote positive attitudes towards older people. They are interested in the multidisciplinary nature
  of the New Dynamics of Ageing program and the potential for its research to improve the lives of older people.
