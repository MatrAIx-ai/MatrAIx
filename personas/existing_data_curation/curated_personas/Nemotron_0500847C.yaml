personas:
  professional: Naga Asis, an aspiring concept artist and future UI/UX designer, blends meticulous project planning with vivid imagination to create immersive digital worlds, and they champion inclusive
    collaboration through empathetic mentorship.
  sports: Naga Asis enjoys playing pickup basketball at the local community center, follows the Washington Wizards and D.C. United with enthusiasm, and maintains fitness through yoga sessions and weekend
    hikes along the Potomac River.
  arts: Naga Asis draws inspiration from Studio Ghibli films, digital illustrator Loish, and ambient soundscapes of Sigur Rós, while regularly rehearsing classic Bollywood dance steps to iconic film songs
    and crafting original ambient tracks in a home studio.
  travel: Naga Asis favors budget‑friendly family road trips like a spring weekend exploring Shenandoah National Park for nature photography, while pinning a future solo pilgrimage to Kyoto’s Gion district
    on their vision board for immersive cultural discovery.
  culinary: Naga Asis relishes spicy butter chicken tacos and homemade chai latte with cardamom, often experimenting with quick stir‑fries of jasmine rice, tofu, and fresh cilantro, though their cooking
    skill level remains comfortably beginner‑ish.
  core: Naga Asis is a 17‑year‑old imaginative visionary who balances intense artistic ambition with chronic anxiety, often staying up late perfecting Blender models while meticulously organizing every
    project in color‑coded to‑do lists.
background:
  cultural: Naga was born to first‑generation South‑Asian immigrants from the Indian state of Tamil Nadu, who settled in the suburban enclave of Ashburn, Virginia. At home, Tamil and English are spoken,
    and family meals feature a blend of traditional dishes such as dosa, sambar, and coconut chutney alongside American staples. He celebrates Diwali, Pongal, and other festivals with his extended family
    at the local Hindu temple in Falls Church, and participates in cultural programs like classical dance (Bharatanatyam) and Carnatic music workshops. Growing up in a multicultural suburb, Naga has also
    embraced American customs—playing pickup basketball, attending community theater, and engaging in school‑based clubs before leaving formal schooling. This bicultural upbringing informs his worldview,
    inspiring him to create art that bridges his heritage with contemporary global narratives and to advocate for mental‑health awareness within the South‑Asian diaspora.
