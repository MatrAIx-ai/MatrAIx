  career_goals: Naga aspires to transform his passion for visual storytelling into a professional career. In the short term he plans to earn his GED, build a robust digital art portfolio, and secure an
    apprenticeship or internship at a design studio or indie game studio in the Washington, DC area. He aims to pursue a BFA in Graphic Design or Interactive Media, while also taking courses in psychology
    to deepen his understanding of human emotion. Long‑term, he envisions working as a UI/UX designer or concept artist where he can blend his methodical project‑management style with his imagination, eventually
    leading a creative team that produces inclusive, culturally resonant media. Parallel to his creative ambitions, Naga wishes to develop community workshops that teach stress‑relief techniques through
    art for South‑Asian teens, merging his artistic talent with his empathy for others.
