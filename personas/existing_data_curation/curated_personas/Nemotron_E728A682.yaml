personas:
  professional: Kamille Barney, a 13‑year‑old aspiring esports competitor, blends a love of fast‑paced games like Fortnite and Minecraft with a disciplined yet sometimes haphazard practice routine, using
    quick reflexes and strategic thinking to climb the ranks while coping with school obligations and occasional anxiety spikes.
  sports: Kamille Barney spends afternoons at the community center’s Eastside Hoops Club playing pick‑up basketball, idolizes NBA star LeBron James and WNBA guard Sabrina Ionescu, follows the Los Angeles
    Lakers on TV, and approaches fitness with a high‑energy style that mirrors her gaming tactics, though she occasionally forgets to stretch, resulting in a nagging ankle.
  arts: Kamille Barney, a choir member, blends gospel harmonies inspired by Kirk Franklin with contemporary R&B vibes à la Beyoncé, while sketching digital comic strips reminiscent of Adventure Time, journaling
    poetry after reading fantasy epics such as The Mistborn series, weaving these artistic outlets into her emotional processing.
  travel: Kamille Barney enjoys family‑guided trips that blend excitement and relaxation, having explored Disneyland, a weekend road‑trip to the Great Smoky Mountains, and a cultural excursion to Washington
    DC, while dreaming of an overseas adventure to Tokyo for an anime convention and the chance to sample authentic sushi.
  culinary: Kamille Barney favours comfort foods like pepperoni pizza, chicken nuggets, and cheesy mac & cheese, yet also experiments with simple cooking projects such as ramen topped with a soft‑boiled
    egg and scallions, and delights in making chocolate chip pancakes on weekend mornings, often seasoning snacks with jalapeño slices or chocolate syrup.
  core: Kamille Barney is a competitively driven teen who channels fierce gaming instincts into creative comics and choir music, yet oscillates between hyper‑focused planning and relaxed disorganization,
    with a knack for sudden anxiety spikes and a habit of hoarding in‑game skins.
background:
  cultural: Kamille is a Black teenager raised in Durham, North Carolina, a city with a deep African‑American history and strong ties to historically Black institutions like North Carolina Central University.
    Her family is active in the local church, where she learns gospel music, community service values, and stories of the Great Migration that shaped many families in the area. She regularly attends the
    Durham Juneteenth celebration and the Durham Hip‑Hop Festival, events that blend music, food, and activism. These cultural experiences influence her love for soulful music, community involvement, and
    an awareness of social‑justice issues affecting the Black community.
attributes:
