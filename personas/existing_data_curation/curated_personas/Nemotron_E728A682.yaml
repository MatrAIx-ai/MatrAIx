  hobbies: '[''Competitive video gaming (Fortnite, Minecraft)'', ''Pick‑up basketball'', ''Singing in church choir (gospel & R&B)'', ''Digital comic‑strip drawing'', ''Reading fantasy novels'', ''Poetry
    & journaling'']'
  career_goals: Kamille dreams of a career that combines caring for others with a clear, structured path. She plans to pursue a high‑school STEM track and ultimately become a registered nurse, valuing the
    practical, hands‑on nature of the profession and its stability. Simultaneously, she is intrigued by graphic design and game development as a way to channel her competitive spirit and creativity, hoping
    to design games that promote mental‑wellness. In the short term, she aims to earn a first‑aid certification, join her school’s student council, and seek mentorship opportunities that build leadership
    experience.
