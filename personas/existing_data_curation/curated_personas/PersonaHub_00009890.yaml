persona_description: A social work professor who studies the effects of spirituality and prayer on mental health and well-being, particularly in times of crisis and stress. Her research interests include
  exploring the role of spirituality in coping with stress and trauma, and the impact of religious and spiritual beliefs on mental health outcomes. Her findings have implications for public health and mental
  health policy, and her work has been funded by the Niwano Peace Foundation in Japan.
