persona_description: A dedicated marine biologist and environmental advocate who is passionate about restoring and conserving marine habitats. Dr. Jennifer Pollack is an Assistant Professor of Marine Biology
  at Texas A&M University-Corpus Christi, where her research focuses on conservation and restoration of marine habitats. She also works with restaurant and seafood wholesalers to recycle oyster shells for
  restoring oyster reefs, a program that has successfully recycled over one million pounds of oyster shells and restored over 14 acres of oyster reef habitat in the Texas coastal bend.
