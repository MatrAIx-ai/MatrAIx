  hobbies: '["Herb and vegetable gardening", "Cooking traditional South Asian cuisine", "Reading scientific and historical literature", "Playing chess (local tournaments)", "Solving puzzles (Sudoku, logic
    games)", "Woodworking", "Stargazing", "Volunteering at senior centers (tech assistance)", "Attending Indian cultural festivals"]'
  career_goals: At 70, Krishna’s primary ambition is to remain intellectually active and give back to his community. He hopes to mentor young engineers through local STEM outreach programs, author a series
    of reflective essays on the evolution of engineering practice, and develop a modest home‑automation system tailored for seniors. He also aims to complete a personal sustainability project that integrates
    his engineering skills with his love for gardening, and to publish a short memoir that captures his cross‑cultural experiences and lessons learned. Managing his health and stress through regular check‑ups
    and mindful routines is also a central goal.
