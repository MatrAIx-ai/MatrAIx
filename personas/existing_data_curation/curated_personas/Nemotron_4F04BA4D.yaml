personas:
  professional: Gladys Boykins, a meticulous aspiring Certified Nursing Assistant, channels her Excel budgeting expertise and proven volunteer coordination skills into streamlining patient schedules and
    community health initiatives, and they keep a cautious eye on efficiency and reliability.
  sports: Gladys Boykins stays fit by taking disciplined daily walks with her dog in the nearby park, occasionally joining the Riverdale Seniors Walking Club, while cheering on the Atlanta Falcons and Atlanta
    Hawks from the comfort of her living room, and they avoid crowded gyms in favor of predictable, low‑impact exercise.
  arts: Gladys Boykins finds artistic solace in crocheting vibrant blankets while listening to the soulful harmonies of Aretha Franklin and the contemporary R&B of H.E.R., devouring the latest fiction from
    Colson Whitehead, and attending monthly gospel performances featuring Kirk Franklin, which together shape her calm yet purposeful creative rhythm.
  travel: Gladys Boykins prefers meticulously planned, low‑key road trips—like her recent weekend getaway to historic Savannah and her upcoming solo visit to Washington, D.C. to explore the National Museum
    of American History's civil‑rights exhibits—while dreaming of a future heritage tour of Ghana that would blend genealogy research with cultural immersion, all balanced against a modest travel budget.
  culinary: Gladys Boykins, a proficient home cook, balances her love for classic Southern comfort—like collard greens simmered with smoked turkey, crispy fried chicken, and buttery cornbread—with garden‑fresh
    herbs such as thyme and basil, regularly crafting large family‑style meals and occasionally splurging on a bite of restaurant‑style shrimp and grits as a treat.
  core: Gladys Boykins is a detail‑driven, quietly competitive soul who finds solace in crochet, Excel spreadsheets, and disciplined routines, yet occasionally lets a mischievous craving for extra yarn
    or a late‑night binge of contemporary fiction disrupt her otherwise orderly life.
background:
  cultural: Gladys is an African-American woman raised in Riverdale, Georgia, whose upbringing reflects the Southern Black community’s emphasis on family ties, church fellowship, and culinary tradition.
    She actively participates in her local Black church, where gospel music, communal service, and storytelling are central. Her cultural identity is shaped by the legacy of Southern soul food, the celebration
    of Juneteenth, and the intergenerational transmission of oral histories. These influences inform her values of resilience, self-reliance, and community support.
attributes:
  skills: '[''Microsoft Office (Excel, Word, PowerPoint)'', ''Budgeting and Excel spreadsheet management'', ''Basic bookkeeping'', ''Time-management and workflow planning'', ''Volunteer coordination'',
