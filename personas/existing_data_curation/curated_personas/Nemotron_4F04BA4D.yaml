  hobbies: '[''Crocheting and knitting'', ''Reading contemporary fiction and self-help books'', ''Herb and vegetable gardening'', ''Volunteering at church food pantry'', ''Walking in local parks'', ''Listening
    to R&B and gospel music'', ''Family genealogy research'']'
  career_goals: She aims to obtain a Certified Nursing Assistant (CNA) credential within the next 12 months, positioning herself for a reliable entry-level role in a nearby assisted-living facility. Parallel
    to that, she is exploring community health worker programs to leverage her caregiving experience and her knack for organization. Long-term, she envisions launching a home-based health-support service
    focused on senior residents of Riverdale, or possibly a small catering business that showcases traditional Southern soul food, allowing her competitive drive to turn her practical skill set into a sustainable
    income.
