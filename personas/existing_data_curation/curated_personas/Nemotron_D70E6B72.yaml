  career_goals: Floyd dreams of becoming an aerospace engineer who designs rockets, inspired by his love of space‑exploration books and LEGO space sets. He also hopes to one day compete at a national robotics
    competition and win a science‑fair award for an innovative project. In parallel, his competitive spirit fuels an ambition to earn a scholarship for soccer and perhaps play professionally. As he grows,
    Floyd envisions merging his technical skills with creativity by developing his own video games. His overarching goal is to excel in fields that combine practical problem‑solving with imaginative design.
