personas:
  professional: Floyd Gleason, an aspiring robotics enthusiast and budding game developer, leverages their practical curiosity and calm focus to design functional LEGO robots and prototype simple Scratch
    games while balancing meticulous organization with a willingness to experiment.
  sports: Floyd Gleason, an energetic member of the St. Louis Youth Soccer League and avid fan of the St. Louis Cardinals, practices soccer at the local park with a calm, competitive mindset that helps
    them stay composed during penalty shootouts and game‑day cheers.
  arts: Floyd Gleason, a budding pianist who practices Beethoven’s "Für Elise" and enjoys Pixar films, adventure novels by Rick Riordan, and LEGO sculptures by Nathan Sawaya, draws creative inspiration
    from both classical music and modern pop icons like Taylor Swift, and they often incorporate rhythmic patterns into their Scratch game designs.
  travel: Floyd Gleason, an adventurous traveler who has explored the St. Louis Zoo and the Gateway Arch, dreams of a road trip to LEGOLAND Discovery Center in Carlsbad and a future space‑camp visit to
    Kennedy Space Center, balancing hands‑on learning with school schedule constraints, and they eagerly plan each outing with a detailed checklist.
  culinary: Floyd Gleason, who loves pepperoni pizza with extra cheese, chicken nuggets with honey‑mustard dipping sauce, and homemade spaghetti with meatballs, can assemble a simple veggie pizza using
    pre‑made dough, mozzarella, tomato sauce, and bell peppers, though they sometimes indulge in sugary cereal for breakfast and occasionally skip the vegetables on their plate.
  core: Floyd Gleason, a calm‑yet‑competitive ten‑year‑old, blends a curiosity for building and coding with a love for soccer and video‑games, staying organized while rarely showing anxiety, and they approach
    every challenge with measured confidence.
background:
  cultural: Floyd grew up in a middle‑class white family in St. Louis, Missouri, where Midwestern values of community, hard work, and practicality are emphasized. His family celebrates traditional American
    holidays—Independence Day fireworks, Thanksgiving dinner—and also participates in local events like the St. Louis Mardi Gras and the Fair St. Louis Art Fair. He attends a public elementary school with
    a diverse student body, exposing him to a mix of cultural traditions while maintaining a primarily Protestant cultural heritage at home. The city’s strong sports culture, especially the Cardinals and
    Blues, and its rich museum and zoo offerings have shaped Floyd’s love for team activities, exploration, and friendly competition.
