personas:
  professional: Javier Nito is an aspiring junior engineer, delighting in building intricate LEGO creations and sketching mechanical dinosaurs, blending curiosity with a practical eye for detail while staying
    reliably organized and always ready to help classmates when they need a hand.
  sports: Javier Nito plays on the local Little Kickers Soccer Club, laces up the bright blue jersey each afternoon, and watches FC Barcelona matches on TV, trying to emulate Lionel Messi's footwork while
    they cheer for the hometown high school basketball team during weekend games.
  arts: Javier Nito fills sketchbooks with vibrant drawings of T-rex and Spider-Man, draws inspiration from comic legend Stan Lee and animator Hayao Miyazaki, and they sway to lively mariachi tunes, humming
    the catchy theme from 'The Incredibles'.
  travel: Javier Nito enjoys weekend hikes in the nearby county park, has visited the desert dunes of Arizona's Grand Canyon on a family road trip, dreams of exploring the ancient ruins of Machu Picchu
    and the bustling streets of Tokyo, and they eagerly plan how to fit a souvenir in their backpack for the next adventure.
  culinary: Javier Nito loves helping slice avocado, mash beans, and sprinkle fresh cilantro while making chicken tacos and guacamole, proudly claims they can whisk salsa faster than anyone, yet often leaves
    a trail of tortilla crumbs and occasional spilled salsa on the kitchen floor.
  core: Javier Nito is a curious, organized seven-year-old who blends the disciplined focus of a budding engineer with a love for soccer, sketches, and messy taco adventures, balancing kindness with a delightfully
    stubborn streak when it comes to finishing LEGO towers, and they never miss a chance to share their latest creation with friends.
background:
  cultural: Javier grows up in a Mexican‑American household in Bakersfield, where Spanish is spoken at home alongside English. His family honors traditions such as creating Día de los Muertos altars, preparing
    family recipes like tacos al pastor, and celebrating cultural festivals with music and dance. The local Latino community provides a strong sense of belonging, and he often participates in school events
    that showcase Mexican art and folklore. These experiences shape his values of family cohesion, respect, and community service while giving him a bicultural perspective.
attributes:
  skills: '[''Reading (2nd grade level)'', ''Basic addition and subtraction'', ''Bilingual conversation (English/Spanish)'', ''Teamwork and cooperation'', ''Organizing school supplies'', ''LEGO building'',
