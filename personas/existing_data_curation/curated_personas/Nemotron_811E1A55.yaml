  hobbies: '[''Soccer'', ''Drawing and painting'', ''LEGO building'', ''Reading adventure books'', ''Exploring local parks and trails'', ''Helping in the kitchen (making tacos)'', ''Listening to mariachi
    music and dancing'']'
  career_goals: Javier dreams of a future where he can share his love of stories and languages as a teacher, help his community as a firefighter, or explore the stars as an astronaut. He also thinks about
    cooking tasty meals for his family like his mom does. He wants to keep learning new things, stay practical in solving problems, and always remember his Mexican roots while making a positive impact on
    the people around him.
