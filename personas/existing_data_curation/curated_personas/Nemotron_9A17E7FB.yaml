  career_goals: Emanuel aims to transition into a technical leadership role where he can shape inclusive engineering cultures and champion products that address social equity. Over the next five years,
    he envisions becoming a lead engineer or engineering manager at a company focused on community‑focused tech—such as educational platforms for underrepresented youth or health‑care tools that improve
    access in underserved neighborhoods. He is also committed to building a mentorship pipeline for Black and minority developers, contributing to open‑source projects that prioritize accessibility, and
    eventually founding a startup that leverages data‑driven solutions to strengthen local community services while maintaining a healthy work‑life balance.
