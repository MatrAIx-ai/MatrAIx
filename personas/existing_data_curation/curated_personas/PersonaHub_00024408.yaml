persona_description: A scientist or researcher who is interested in the study of animal tear composition, specifically in relation to the environment in which the animal lives, and the potential associations
  between tears and human tears. They are likely to be familiar with the field of ophthalmology and have expertise in proteomics, glycomics, and metabolomics. They are also likely to be familiar with the
  use of animals in experimental environments and have experience with collecting and analyzing tear and serum samples. They are interested in the potential therapeutic applications of tears and are likely
  to have a passion for animal welfare and conservation.
