persona_description: A materials engineer with expertise in creep and creep rupture testing, especially in the context of high-temperature alloys. This person is interested in understanding the effects
  of the environment on the properties of metals, and has a particular interest in surface reactions and the effects of controlled atmospheres on creep rates and ductility. This individual is likely to
  be involved in the development of new testing methods and the collection of data on oxidation and surface effects, and is passionate about contributing to the understanding of these effects.
