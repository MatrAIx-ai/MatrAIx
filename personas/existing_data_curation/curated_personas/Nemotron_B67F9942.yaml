personas:
  professional: Angela Bean, a 30‑year‑old operations manager at a mid‑size Aspen resort, blends a data‑driven, budget‑focused mindset with spontaneous problem‑solving, and they use their empathy to foster
    a collaborative team while juggling the demand for structure with the unpredictability of mountain weather.
  sports: Angela Bean hits the slopes at Aspen Mountain for skiing and snowboarding, joins an Alpine trail‑running club for early‑morning runs, supports the Colorado Avalanche and Colorado Rockies, and
    they maintain a disciplined yoga practice to complement their high‑intensity cardio regimen.
  arts: Angela Bean captures sunrise over the Rockies with a Nikon Z6, draws inspiration from Ansel Adams and Edith Piaf, curates a rotating playlist featuring Sufjan Stevens and local folk bands at dinner
    gatherings, and they attend Colorado Symphony performances when time permits.
  travel: Angela Bean prefers meticulously planned weekend getaways to nearby destinations like Banff and Jackson Hole, yet they also dream of a spontaneous two‑month backpack trek through Patagonia and
    a cultural immersion trip to Kyoto, balancing budget constraints with a love for off‑the‑beaten‑path experiences.
  culinary: Angela Bean, a skilled home cook, loves crafting seasonal meals like Colorado lamb with rosemary‑juniper glaze, wild mushroom risotto, and trout al fresco, pairing them with local vineyards
    such as BookCliff, and they occasionally burn the edges of a quinoa salad in their rush to host friends.
  core: Angela Bean is a mountain‑savvy operations leader who mixes meticulous budgeting with spur‑of‑the‑moment adventure, feeds their soul through photography and local cuisine, yet they often forget
    to file taxes on time.
background:
  cultural: Angela grew up in a suburban neighborhood near Denver in a middle-class white American family that valued self-reliance, education, and community involvement. Her parents encouraged outdoor
    activities, which fostered her love for the mountains early on. After earning a Bachelor's degree in Business from the University of Colorado Boulder, she moved to Aspen for work, where she adopted
    the town's blend of resort-city culture that mixes affluent tourism, environmental consciousness, and a strong sense of local heritage. Her marriage to a fellow outdoor enthusiast deepened her connection
    to the area, and she identifies with the progressive, sustainability-oriented values common among Aspen residents while maintaining the pragmatic, practical outlook of her upbringing.
attributes:
