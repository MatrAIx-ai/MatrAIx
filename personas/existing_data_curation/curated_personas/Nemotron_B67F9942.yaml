  hobbies: '[''Skiing'', ''Snowboarding'', ''Hiking'', ''Yoga'', ''Trail Running'', ''Cooking with Local Ingredients'', ''Wine Pairing'', ''Landscape Photography'', ''Volunteer Trail Maintenance'', ''Community
    Event Planning'']'
  career_goals: Angela aims to advance to a regional operations director role within the next three to five years, overseeing multiple mountain-resort properties across the Rockies. She plans to deepen
    her expertise in sustainable tourism by leading initiatives that reduce waste and carbon footprints while maintaining guest satisfaction. Long-term, she envisions launching her own boutique eco-lodging
    venture that combines luxury hospitality with a strong community focus. To support these ambitions, she intends to pursue an MBA with a concentration in Sustainable Business and to mentor emerging managers,
    especially women, in the hospitality industry.
