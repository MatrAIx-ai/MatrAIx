personas:
  professional: Shawn Roy, an inquisitive 8‑year‑old with a knack for detailed LEGO engineering, dreams of becoming a nature‑themed architect, turning school projects into miniature ecosystems and meticulously
    sketching fantasy landscapes as part of their imaginative design process.
  sports: Shawn Roy participates in the local youth soccer league with the Riverside Rangers, enjoys weekend scouting hikes in nearby woods, and spends free time building a miniature obstacle course for
    LEGO figures, balancing team play with solitary nature exploration.
  arts: Shawn Roy thrives on drawing intricate forest sprites and dragon realms while listening to The Beatles' "Here Comes the Sun", Johnny Cash's "Ring of Fire", and Yanni's "Santorini", and frequently
    re‑creates scenes from Studio Ghibli's "Spirited Away" in both sketches and LEGO dioramas.
  travel: Shawn Roy loves short family trips to places like the Redwood National Park, the seaside campground at Point Reyes, and the historic sites of Washington, D.C., and dreams of a grand adventure
    to the Grand Canyon and the bamboo forests of Kyoto, preferring nature‑rich destinations over crowded amusement parks.
  culinary: Shawn Roy enjoys crafting easy recipes like veggie kebabs, peanut butter‑banana smoothies, and custom trail‑mix snacks, relishes the crunch of carrot sticks and the sweet tang of apple slices,
    and occasionally sneaks extra chocolate chips into their homemade cupcakes, showing a playful yet growing confidence in the kitchen.
  core: Shawn Roy is an organized, curious 8‑year‑old who blends a love for nature, LEGO engineering, and quiet creativity, yet can be overly cautious about trying new foods and sometimes over‑schedules
    playtime with elaborate projects.
background:
  cultural: Shawn was raised in Forney, Texas, a growing suburban community in Kaufman County that emphasizes Southern hospitality, community gatherings, and family‑centered traditions. His family celebrates
    local customs such as backyard barbecues, small church events, and attending Dallas‑area sports games, while also encouraging education and creative expression through art classes and museum visits.
    Growing up in a predominantly white, middle‑class Texan environment, Shawn experiences a blend of traditional Southern values and the diverse cultural influences of the nearby Dallas‑Fort Worth metroplex.
attributes:
