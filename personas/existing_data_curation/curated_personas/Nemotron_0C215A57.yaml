  career_goals: Shawn dreams of becoming an architect or designer who creates imaginative, functional spaces, merging his love for drawing, building, and methodical planning. He also expresses excitement
    about exploring space as an astronaut or illustrating wildlife for scientific publications, hoping to combine his curiosity about the world with artistic expression. His ambition is to follow a path
    that lets him think creatively while contributing thoughtfully to community projects.
