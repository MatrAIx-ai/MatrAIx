persona_description: A historian who specializes in the history of Lancaster, England, particularly the period from the 1670s to the 19th century. His research interests include the development of the port
  of Lancaster, the role of the town in the Jacobite Rebellion, the history of the town's furniture industry, and the architectural history of Lancaster Castle. He is also interested in the history of the
  town's artists, particularly those who returned from London to paint scenes of Lancashire.
