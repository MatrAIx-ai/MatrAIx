personas:
  professional: Teri Murphy is a toddler who delights in arranging shape sorters and building simple towers, demonstrating early engineering curiosity that suggests a future path as a product designer,
    and they approach each new challenge with the same organized yet flexible mindset they habitually display.
  sports: Teri Murphy participates in parent‑led water‑play sessions at the community pool and loves crawling on the warm sand at La Jolla Shores, cheering on the San Diego Padres during family game nights,
    embodying an early love for active, outdoor play.
  arts: Teri Murphy is captivated by the bold colors of street murals by local artist Shepard Fairey and the interactive exhibits at the San Diego Museum of Art, often dragging caregivers to point‑and‑look
    at playful installations while they giggle at vibrant patterns.
  travel: Teri Murphy enjoys short family road trips to the San Diego Zoo and weekend beach outings at Coronado, while their parents plan a future vacation to the Redwood forests, reflecting an early affinity
    for nature‑filled explorations.
  culinary: Teri Murphy favors smooth pureed avocado and sweet potato meals, delights in teething biscuits flavored with cinnamon, and often squeals with joy when a tiny bite of banana melt‑in‑mouth reaches
    them.
  core: Teri Murphy is a curious one‑year‑old who thrives on tactile exploration, quiet observation of vibrant street art, and routine comfort, though they can become stubbornly insistent when bedtime rituals
    are altered.
background:
  cultural: Raised in a white, middle‑class family in San Diego, California, Teri is immersed in the laid‑back coastal lifestyle of Southern California while also experiencing the city's rich multicultural
    influences. Her upbringing includes typical American traditions and occasional celebrations of Western holidays, frequent visits to local museums and community art events, exposure to the vibrant street‑art
    scene along the seacoast, and a strong appreciation for the natural environment of beaches and parks.
