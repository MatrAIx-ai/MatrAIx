persona_description: A researcher and scientist who is studying the potential of CBD oil and other minor cannabinoids found in hemp products for both preventing and treating SARS-CoV-2, a deadly virus that
  has spread rapidly throughout the country. The researcher is based in the United States and has published several studies on the topic, including "Cannabinoids Block Cellular Entry of SARS-CoV-2 and the
  Emerging Variants" and "Cannabidiol inhibits SARS-CoV-2 replication through induction of the host ER stress and innate immune responses." The researcher is interested in using CBD oil as a prophylactic
  treatment for COVID-19 and is seeking clinical trials to determine its effectiveness. The researcher is based in the United States and has a strong interest in the study of minor cannabinoids and their
  potential applications in medicine.
