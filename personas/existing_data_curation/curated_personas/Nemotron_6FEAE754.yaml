personas:
  professional: Thomas Cordero, a veteran civil engineer with a flair for integrating public art into infrastructure, leverages their bilingual communication skills and community‑focused leadership to deliver
    sustainable, climate‑resilient projects, and they often channel anxiety into over‑communication and mentorship of younger engineers.
  sports: Thomas Cordero stays active by joining the Tampa Outdoors Club for weekend hikes in Hillsborough County, cheering on the Tampa Bay Buccaneers during fall football season and the Tampa Bay Lightning
    in winter, and they also take light cardio salsa dance classes, reflecting an energetic yet low‑impact fitness routine.
  arts: Thomas Cordero channels their love for Afro‑Cuban jazz by attending live performances of Arturo O'Farrill and Celia Cruz tributes, paints delicate watercolors of Clearwater Beach inspired by Winslow
    Homer, volunteers with the Tampa Riverwalk Arts Program to install community murals, and they find that each creative outlet fuels their sociable, curious spirit.
  travel: Thomas Cordero prefers spontaneous, culturally immersive trips, frequently hopping on short flights to Havana to reconnect with family recipes, exploring the Florida Keys by road, dreaming of
    a future pilgrimage to Barcelona’s modernist architecture, and they plan these adventures with a loosely‑structured itinerary that leaves room for last‑minute salsa nights.
  culinary: Thomas Cordero, an avid home chef, expertly prepares ropa vieja, mojo‑marinated shrimp, and sweet plantain fritters using garlic, cumin, and fresh cilantro, often hosting neighborhood potlucks
    where the aroma of café con leche and the clink of glasses become the centerpiece of social bonding, and they relish the communal joy these meals inspire.
  core: Thomas Cordero blends a lifelong civil‑engineering mind with a painter’s eye, juggling community art projects, salsa nights, and spontaneous travel while battling chronic anxiety that fuels both
    meticulous mentorship and occasional forgetfulness in budgeting and scheduling, and they remain driven by an unquenchable curiosity.
background:
  cultural: Thomas grew up in Tampa’s historic Ybor City, a vibrant enclave of Cuban immigrants. His parents fled Cuba in the early 1960s, bringing with them a strong sense of family, Catholic faith, and
    culinary traditions that still shape his daily life. Bilingual in Spanish and English, he celebrates Cuban holidays such as Día de la Virgen de la Caridad and participates in the annual Carnaval de
    Tampa. The music, dance, and community solidarity of the Cuban diaspora have profoundly influenced his values of collectivism, resilience, and joy. While fully integrated into American society, Thomas
    maintains deep ties to his heritage through language, cuisine, and active involvement in local Cuban cultural organizations.
attributes:
  skills: '[''Structural analysis and design'', ''Water resources and flood mitigation'', ''Sustainable and green infrastructure'', ''Project budgeting and scheduling'', ''Community outreach and stakeholder
