    ''Risk assessment and resilience planning'']'
  hobbies: '[''Salsa dancing and Afro‑Cuban music'', ''Watercolor painting'', ''Guitar lessons'', ''Volunteer coordination for public art projects'', ''Group hiking and bird watching'', ''Science fiction
    and modern art book club'', ''Cooking traditional Cuban cuisine'', ''Traveling to Cuba and exploring heritage sites'', ''Attending community theater performances'', ''Participating in local senior fitness
    classes'']'
  career_goals: Looking ahead, Thomas aims to channel his engineering background into projects that enrich Tampa’s public realm, such as designing climate‑resilient parkways that feature local Cuban art.
    He aspires to mentor emerging civil engineers through a partnership with the local community college, and to serve as an adjunct professor at the University of South Florida, teaching design thinking
    and sustainability. Additionally, he wishes to author a handbook on emotional well‑being for engineers, drawing on his own experiences with anxiety, and to establish a scholarship for Cuban‑American
    students pursuing STEM degrees.
