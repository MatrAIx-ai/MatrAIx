  hobbies: '["Watercolor Painting", "Creative Writing", "Hiking", "Nature Photography", "Home Brewing", "Seasonal Canning", "Yoga", "Mindfulness Journaling", "Farmers Market Volunteering", "Tutoring in
    Coding and Nutrition"]'
  career_goals: Tracy aims to transition from managing a single establishment to becoming a regional consultant who helps independent restaurants adopt data‑driven sustainability practices. She dreams of
    opening a boutique farm‑to‑table café that doubles as a community workshop space where she can teach culinary creativity and basic food‑tech concepts. Over the next five years, she also plans to mentor
    emerging food‑service leaders, champion mental‑wellness initiatives in hospitality, and contribute to local policy discussions on food waste reduction in Weld County.
