persona_description: A mental health expert who is concerned with the mental health standards and the progress of enlistees with preexisting mental health conditions during their first term of enlistment.
  The expert is interested in understanding the prevalence of mental health issues among youth in the United States and the effects of mental health conditions on an individual's ability to function in
  a military context. The expert is also interested in the prevalence of attention deficit hyperactivity disorder among youth and its relationship with adolescent substance use.
