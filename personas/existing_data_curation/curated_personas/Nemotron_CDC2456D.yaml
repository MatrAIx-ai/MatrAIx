  career_goals: Cheryl aims to advance from frontline surveillance to a senior surveillance analyst role within the next two years, pursuing certifications such as Certified Protection Officer (CPO) and
    Certified Surveillance Professional (CSP). She plans to complete a bachelor’s degree in security management or criminology to broaden her strategic expertise. Long-term, she hopes to transition into
    security consulting for cultural institutions—museums, galleries, and performance venues—where she can marry her passion for art with her security background. She also aspires to mentor new guards and
    develop a training curriculum focused on ethical surveillance practices and technology integration.
