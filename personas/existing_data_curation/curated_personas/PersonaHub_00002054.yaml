persona_description: A space astronomer who is excited about the discovery of new exoplanets beyond our Solar System and the potential for unexpected discoveries in the outer solar system. They are interested
  in the study of planetary formation and the birth environment of our Sun. They are eager to learn about the Kuiper Belt and TNOs and are interested in addressing outstanding questions about these objects.
  They are also interested in the financial aspects of the Rubin Observatory project and are open to new opportunities to contribute to scientific research.
