personas:
  professional: An aspiring architect, Xiuyun Choe builds intricate LEGO cities and draws detailed animal habitats, turning playtime into a structured design workshop; they love turning the living room
    floor into a construction site and meticulously follow instruction manuals, reflecting a keen eye for order.
  sports: An energetic playground enthusiast, Xiuyun Choe explores the schoolyard with methodical routes, swings on monkey bars, practices basic dribbling for the local youth soccer club the River Rapids,
    and cheers for the nearby baseball team the City Cubs during weekend games.
  arts: A budding artist, Xiuyun Choe sketches vivid animals and nature scenes in crayon, enjoys playing simple piano pieces like "Twinkle Twinkle Little Star" and listening to Beethoven's Für Elise, and
    sings along to songs by The Wiggles and the Disney soundtrack of Mulan, letting creativity flow across mediums.
  travel: An inquisitive little traveler, Xiuyun Choe has explored the city zoo, wandered through the botanical garden, spent a weekend at the seaside town of Monterey, and dreams of visiting the Great
    Wall and a family cruise to Okinawa, preferring trips that blend hands‑on learning with familiar family rituals.
  culinary: A discerning young foodie, Xiuyun Choe adores dumplings with pork filling, mooncakes with lotus‑seed paste, and peanut butter toast with banana slices, enjoys helping stir‑fry vegetables at
    home, and sometimes insists on arranging food on the plate in symmetrical patterns before eating.
  core: Xiuyun Choe is a structured six‑year‑old who fuses LEGO engineering with animal art, balances playful curiosity with ritualistic celebrations, and approaches life with a blend of order, kindness,
    and occasional stubbornness about bedtime.
background:
  cultural: Xiuyun comes from an East Asian family with roots in Taiwan/China. She grows up speaking Mandarin at home while learning English at school, and her family places strong value on respect, harmony,
    and collective well-being. They celebrate traditional festivals such as Lunar New Year and the Mid-Autumn Festival, and share cultural foods like dumplings and mooncakes. Living in Pasadena, she experiences
    a multicultural community that blends her heritage with diverse American influences.
