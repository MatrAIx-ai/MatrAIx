personas:
  professional: David Hogsten, a seasoned retail supervisor with a STEM background, leverages data‑driven inventory modeling and compassionate team coaching to keep store operations running smoothly, while
    balancing his penchant for flexible planning with a steadfast commitment to safety and employee harmony.
  sports: David Hogsten, a devoted fan of the Kentucky Wildcats basketball team and the Louisville Bats minor‑league baseball club, spends spring weekends fishing the Kentucky River and hikes the Daniel
    Boone National Forest in summer, maintaining fitness through low‑impact walking and occasional volunteer trail‑maintenance, while eschewing intense gym workouts.
  arts: David Hogsten finds solace in the acoustic storytelling of Gillian Welch and the cinematic grandeur of classic historical dramas like The Bridge on the River Kwai, using these artistic windows to
    complement his love of history and science.
  travel: David Hogsten favors low‑key road trips in his pickup, often exploring the Blue Ridge Parkway, the historic streets of Savannah, and the limestone caves of Mammoth Cave, while dreaming of a quiet
    pilgrimage to the Scottish Highlands, balancing his love of solitude with a modest travel budget.
  culinary: David Hogsten enjoys preparing homestyle meals featuring Kentucky‑grown heirloom tomatoes, sweet corn, and bourbon‑glazed pork chops, showing a competent but not gourmet cooking skill, and often
    pairs dinner with locally sourced bourbon or craft beer while indulging in the occasional take‑out pizza when lost in a woodworking project.
  core: David Hogsten is a steady‑hand steward who blends analytical precision with quiet compassion, channeling his love of woodworking and gardening into a life that values predictable routines, modest
    indulgences, and community service, all while occasionally forgetting to pay his own bills on time.
background:
  cultural: David grew up in a modest, white, middle‑class family in central Kentucky, where values of hard work, self‑reliance, and community interdependence were emphasized. His parents encouraged education,
    leading him to earn a STEM degree from a state university—a path less common in his hometown. The Southern hospitality and tight‑knit social fabric of Georgetown shaped his cooperative and compassionate
    disposition. While he identifies with broader Midwest cultural traits such as practicality and modesty, he also embraces local traditions like the county fair, church gatherings, and a strong sense
    of neighborly support. This blend of regional heritage and academic exposure informs his balanced view of structure and flexibility in both work and personal life.
attributes:
