  hobbies: '[''woodworking'', ''gardening'', ''reading historical non-fiction'', ''reading popular science'', ''small book club participation'', ''fishing'', ''hiking'', ''volunteering at food bank'']'
  career_goals: David aims to move from first‑line supervision to a regional retail management position within the next three years, where he can apply his analytical background to improve multiple store
    performances. He is eager to design a structured onboarding and mentorship program that balances efficiency with employee well‑being, reflecting his desire for harmony. Long‑term, he envisions transitioning
    to part‑time consulting for small businesses in Georgetown, offering guidance on inventory control and staff development while maintaining a flexible schedule that supports his personal interests and
    community volunteer work. Early retirement is a goal, but he plans to stay actively involved in local charitable initiatives, especially those that provide job training for underserved youth.
