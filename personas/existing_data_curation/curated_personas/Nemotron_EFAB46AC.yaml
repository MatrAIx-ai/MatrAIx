  career_goals: Melinda plans to enroll at the University of North Texas to pursue a Bachelor of Science in Nursing. She is drawn to the blend of hands‑on patient care and the scientific rigor of the program.
    After obtaining her RN license, she hopes to specialize in pediatric nursing, motivated by her desire to nurture and protect children’s health. Recognizing the value of technology in modern healthcare,
    she intends to take elective courses in health informatics and eventually earn a certification in medical data management. Long‑term, Melinda aspires to lead a patient‑safety or quality‑improvement
    team within a hospital, using her methodical mindset to streamline workflows and reduce medical errors. She also envisions staying involved in community health outreach, mentoring high‑school students
    interested in health careers.
