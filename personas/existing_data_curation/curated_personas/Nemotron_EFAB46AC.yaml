personas:
  professional: Melinda Seabolt, an aspiring pediatric nursing student, leverages their meticulous bullet‑journal organization, Excel budgeting savvy, and public‑speaking confidence to excel in clinical
    rotations while they habitually double‑check protocols to soothe their underlying anxiety.
  sports: Melinda Seabolt embraces weekend hikes at Ray Roberts Lake State Park with the Denton Trail Runners, follows the Dallas Cowboys' football season religiously, enjoys watching the Dallas Mavericks
    during the NBA season, and joins casual pick‑up volleyball games, treating fitness as a balanced blend of cardio adventure and social fun.
  arts: Melinda Seabolt strums acoustic guitar to the tunes of John Mayer and Phoebe Bridgers while attending weekly open‑mic nights in the Denton arts district, they devote evenings to knitting scarves
    inspired by the pastel palettes of Monet, and they regularly curate a Canva‑styled playlist of sci‑fi movie soundtracks featuring Hans Zimmer.
  travel: Melinda Seabolt prefers low‑key road trips to nearby Austin and spontaneous day‑hikes in the Texas Hill Country, yet they dream of backpacking through the ancient temples of Kyoto and exploring
    the historic streets of Edinburgh during a future gap‑year, always planning itineraries in their bullet‑journal down to the budgeted coffee stops.
  culinary: Melinda Seabolt loves experimenting with homemade lemon‑thyme roasted chicken, creamy spinach lasagna, and vegan chocolate avocado mousse, they pride themselves on mastering the perfect flaky
    croissant using butter and cold‑water technique, but they often over‑salt dishes when stressed, remedying it with a splash of citrus.
  core: Melinda Seabolt is a methodical, curiosity‑driven 19‑year‑old who balances organized ambition with an undercurrent of anxiety, turning bullet‑journaling into both a roadmap and a coping tool.
background:
  cultural: Melinda is a white Texan raised in Denton, a vibrant college town in Denton County. Her family traces its roots to German and Irish immigrants who settled in North Texas in the early 20th century,
    bringing a blend of Midwestern work ethic and Southern hospitality. Growing up, she celebrated traditional Texas customs such as high school football games and barbecue gatherings, while also being
    exposed to the eclectic music and arts scene that characterizes Denton. The presence of the University of North Texas and Dallas College has fostered a progressive, multicultural atmosphere, encouraging
    her appreciation for diverse perspectives. Her upbringing emphasized community involvement, modesty, and self‑reliance, shaping her courteous and cooperative demeanor.
