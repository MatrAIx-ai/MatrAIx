personas:
  professional: Sonalee Do, a seven‑year‑old aspiring illustrator‑engineer, transforms quiet afternoons into disciplined yet imaginative projects by sketching St. Lucie wetlands, constructing intricate
    LEGO models, and programming simple robotics kits, reflecting her curious, organized yet flexible personality.
  sports: Sonalee Do enjoys swimming with the St. Lucie Aquatics Club during the summer, plays on the local youth soccer team at St. Lucie County Soccer Academy in the fall, and follows the Miami Heat and
    Florida Panthers avidly, preferring structured solo workouts like laps over chaotic team games, though she occasionally joins friends for a casual game of backyard soccer.
  arts: Sonalee Do finds inspiration in classical composers like Beethoven and Mozart while drawing, admires the impressionist brushwork of Claude Monet and the whimsical storytelling of Disney’s animated
    films, and spends weekends at the St. Lucie County Art Center observing local art exhibits, allowing her love of quiet creative expression to shape her identity.
  travel: Sonalee Do loves quiet family road trips to coastal spots like Hutchinson Island and nature‑focused destinations such as the Everglades, dreams of exploring the Great Barrier Reef, and prefers
    meticulously planned itineraries that include time for sketching and shell‑collecting, constrained by her parents’ budget and school schedule.
  culinary: Sonalee Do delights in simple, fresh fare like grilled shrimp tacos with mango salsa, homemade macaroni and cheese, and strawberry‑banana smoothies, enjoys helping her mother roll mini pizza
    bites topped with basil and mozzarella, and often snacks on seaweed crisps while savoring the familiar scent of citrus from the kitchen.
  core: Sonalee Do is a seven‑year‑old quiet‑storm of curiosity, sketching, and careful saving, who channels competitive chess energy into meticulous LEGO builds, worries about tiny details, and hoards
    seashell treasures like secret trophies.
background:
  cultural: Sonalee was raised in a suburban family of European descent in Port Saint Lucie, Florida. Her upbringing blends typical Midwestern American values—such as emphasis on education, self‑reliance,
    and community involvement—with the unique Floridian exposure to coastal ecosystems and multicultural community events. She participates in local library story hours, nature walks through the nearby
    Atlantic coastal habitats, and occasional art workshops offered by the city's cultural center, which together shape a cultural identity rooted in both her family traditions and the vibrant, nature‑rich
    environment of St. Lucie County.
