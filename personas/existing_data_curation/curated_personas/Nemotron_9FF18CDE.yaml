  career_goals: At seven, Sonalee imagines a future where she can blend art and science, dreaming of becoming a marine illustrator who travels to Florida's coastal habitats to draw and document sea life.
    She also fantasizes about being a wildlife researcher who discovers new species, motivated by her love for learning and her competitive spirit to uncover unique insights. In the short term, she aspires
    to win local art contests and master more advanced coding projects, aiming to build a portfolio of creations she can share with others.
