personas:
  professional: Kon Min leads first-line B2B sales teams at a tech firm, blending data‑driven forecasting in Excel, Power BI and Salesforce with hands‑on mentorship, leveraging their reserved listening
    style and assertive decision‑making to negotiate contracts and bridge cultural gaps through bilingual English‑Mandarin communication.
  sports: Kon Min cycles the Boston Emerald Path, hikes the White Mountains each weekend, follows the Boston Celtics and the New England Revolution, maintains membership in the Boston Cycling Club’s weekend
    ride group, and joins a casual intramural soccer league each spring.
  arts: Kon Min captures Boston’s urban textures and New England foliage through street photography inspired by the works of Steve McCurry and Henri Cartier‑Bresson, curates a rotating display of their
    prints at a local coffee shop, and unwinds listening to Mitski, RADWIMPS and Sufjan Stevens while occasionally attending performances at the Boston Symphony Orchestra.
  travel: Kon Min prefers meticulously planned weekend escapes to natural spots like Acadia and the White Mountains, while also budgeting for annual trips to Tokyo and Seoul to explore language‑exchange
    circles and culinary scenes, balancing the desire for adventure with a modest travel fund that excludes expensive long‑haul tours.
  culinary: Kon Min experiments with Asian‑fusion dishes at home, often combining gochujang, miso, and lemongrass to create mapo tofu tacos or miso‑glazed salmon bowls, and enjoys sourcing fresh shrimp
    and shiitake mushrooms at the Boston Public Market before inviting a small group of friends over for a tasting session.
  core: Kon Min’s life is a disciplined blend of data‑driven sales leadership and solitary creative pursuits, navigating professional ambition with a love for photography, cycling, and culinary experiments,
    all while balancing meticulous planning with a quiet, adaptable spirit.
background:
  cultural: Kon was raised in a bilingual household where his parents instilled East Asian values of respect for education, family cohesion, and community service, while also embracing the multicultural
    environment of Boston. He celebrates Lunar New Year with traditional dishes and family gatherings, and stays connected to the broader Asian‑American community through local festivals, volunteer mentorship
    programs for immigrant youth, and occasional visits to cultural centers. This blend of heritage and urban American life shapes his worldview, emphasizing both collective responsibility and personal
    initiative.
