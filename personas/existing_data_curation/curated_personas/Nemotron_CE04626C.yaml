  career_goals: Kon aims to advance to a regional Sales Director role within the next five years, leveraging an upcoming MBA to deepen strategic and financial acumen. He aspires to design data‑driven sales
    strategies that expand the company's footprint into emerging Asian‑American markets while championing diversity and inclusion initiatives. Long‑term, he envisions leading a global business development
    unit, fostering innovation across product lines, and serving as a mentor for young professionals from underrepresented backgrounds.
