personas:
  professional: Willie Dorneval, a seasoned manufacturing veteran turned community cultural facilitator, leverages their hands‑on mechanical expertise, public‑speaking flair, and digital storytelling skills
    to mentor youth and co‑curate local art exhibitions.
  sports: Willie Dorneval stays active by walking the Scioto Mile trail, participates in the Columbus Senior Running Club’s spring 5k, cheers on the Columbus Blue Jackets in hockey season and the Columbus
    Crew during summer, and joins a weekend pick‑up basketball league at the community center.
  arts: Willie Dorneval cherishes evenings at the Ohio Theatre watching performances by jazz legend Wynton Marsalis, blues pioneer Buddy Guy’s recordings, gospel choir renditions by the Mighty Clouds of
    Joy, and often photographs street murals featuring works by local muralist Martine Larkin.
  travel: Willie Dorneval prefers purpose‑driven travel, blending organized itineraries with spontaneous cultural immersion; they have visited historic sites like Montgomery’s Civil Rights landmarks, plan
    a forthcoming pilgrimage to Ghana’s Cape Coast Castle, and dream of a soulful culinary tour of New Orleans’ French Quarter.
  culinary: Willie Dorneval’s kitchen is a hub of soul‑food experimentation, where they simmer collard greens with smoked turkey, fry catfish with cornmeal crust, perfect sweet potato pie, and frequently
    add fresh herbs from their garden such as thyme, rosemary, and cilantro.
  core: Willie Dorneval, a charismatic 64‑year‑old storyteller, blends a boundless curiosity for art and history with a habit of misplacing their harmonica during gigs, yet always finds a way to turn every
    mishap into a lively community anecdote.
background:
  cultural: Willie is an African‑American born into a family that migrated north during the Great Migration, settling in Columbus where the local Black church and community organizations have long been
    central to his identity. His upbringing was steeped in traditions of storytelling, gospel music, soul‑food cooking, and a collective emphasis on resilience and mutual support. He celebrates cultural
    milestones such as Juneteenth and honors the legacy of civil‑rights activism in the city. The blend of Southern roots, Midwestern experiences, and a vibrant local Black cultural scene informs his values,
    perspectives, and his commitment to preserving and sharing this heritage.
