  career_goals: Willie aims to deepen his impact on the Columbus community by launching a mentorship bridge that pairs senior volunteers with at‑risk youth, co‑curating a permanent exhibition of African‑American
    artists at a neighborhood cultural center, and documenting oral histories through a series of short videos. He also hopes to master video editing and storytelling software to preserve local narratives,
    serve on the board of a nonprofit arts organization, and eventually travel to key sites of African diaspora heritage such as Ghana and New Orleans to enrich his own understanding and share those experiences
    with his peers.
