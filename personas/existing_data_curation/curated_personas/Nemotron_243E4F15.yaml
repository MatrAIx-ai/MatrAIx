  career_goals: She aims to ascend to a senior executive role, such as Vice President of Operations, where she can steer large‑scale transformation initiatives that improve profitability and sustainability.
    Elizabeth also seeks to build a legacy of leadership by establishing a formal mentorship program for emerging women leaders in her industry. Over the next five years, she plans to champion diversity,
    equity, and inclusion initiatives, drive operational excellence across the organization, and position herself for a future board‑level appointment or consulting partnership that leverages her deep business
    acumen while allowing more flexibility for family and community engagement.
