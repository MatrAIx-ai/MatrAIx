persona_description: A health professional who is responsible for managing and responding to infectious diseases, particularly those that are new or emerging. They are knowledgeable about the latest developments
  in coronaviruses, including their origin, spread, and potential effects on public health. They are also familiar with the development and implementation of pandemic flu response plans, as well as the
  resources available for individuals and families to prepare for and respond to pandemic flu. They are likely to be involved in the development and dissemination of information about the latest updates
  on COVID-19 and the steps that individuals and communities can take to protect themselves and their communities from the spread of the virus.
