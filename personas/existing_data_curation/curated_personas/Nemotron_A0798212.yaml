  hobbies: '[''Reading mystery and historical fiction'', ''Gardening (vegetables and native flowers)'', ''Cooking Southern cuisine and baking'', ''Knitting and quilting'', ''Yoga and meditation'', ''Nature
    walks and birdwatching'', ''Volunteer work at animal shelter'']'
  career_goals: Jori aims to advance to a senior leadership role, such as Regional Sales Manager or Director of Business Development, within the next five years. She intends to deepen her expertise in data‑driven
    sales strategy, obtain Certified Professional Sales Leader (CPSL) accreditation, and lead a high‑performing team while preserving a calm, supportive work environment. She also plans to design and implement
    structured sales processes that improve forecasting accuracy and reduce administrative burden, ultimately positioning herself as a trusted strategic partner for her organization and its clients. In
    the long term, she envisions establishing a boutique consultancy focused on helping small businesses in northwest Louisiana streamline their sales operations.
