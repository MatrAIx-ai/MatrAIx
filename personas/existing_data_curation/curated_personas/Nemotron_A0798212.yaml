personas:
  professional: Jori Mcgee is a B2B sales specialist who blends methodical pipeline forecasting, expert Salesforce CRM management, and calm, solution-oriented negotiation to build lasting client relationships
    while championing structured process improvements.
  sports: Jori Mcgee avidly follows the New Orleans Saints and LSU Tigers, joins the local Pine Forest Trail Club for solo weekend hikes, and incorporates weekly gentle yoga sessions at the parish community
    center to maintain flexibility.
  arts: Jori Mcgee immerses herself in mystery novels by Agatha Christie and historical fiction by Hilary Mantel, crafts intricate quilts inspired by Southern folk art, and unwinds to the soulful sounds
    of Brandi Carlile and Alison Krauss while knitting.
  travel: Jori Mcgee prefers low-key, self-guided trips that prioritize solitude and nature, such as a spring weekend in the Great Smoky Mountains and a future solo journey to New Zealand’s South Island,
    always planning itineraries far in advance to secure off-peak rates.
  culinary: Jori Mcgee delights in preparing Southern comfort dishes like shrimp-and-grits, chicken-fried steak, and pecan pie, often using garden-fresh tomatoes, okra, and herbs, and treats family gatherings
    as opportunities to showcase her meticulous pie-baking skills.
  core: Jori Mcgee is a methodical sales strategist who finds calm in solitary gardening, never misses a yoga session, and can’t resist a second slice of pecan pie after a quiet night with a mystery novel.
background:
  cultural: Jori was raised in Bossier Parish, Louisiana, in a middle‑class, white family with deep roots in the Southern United States. Her upbringing was shaped by the traditions of Southern hospitality,
    a strong emphasis on family and community, and regular participation in church life (Methodist). The region’s cultural tapestry — from local festivals celebrating Cajun and Zydeco music to the importance
    of high‑school football Saturdays — provided a backdrop of communal pride while she gravitated toward quieter, more personal pursuits. Growing up on the outskirts of Bossier City, she learned practical
    skills such as gardening and cooking classic Southern comfort foods from her parents, fostering an appreciation for the land and regional cuisine. These experiences have instilled in her a respect for
    hard work, self‑reliance, and a calm, resilient outlook that aligns with the measured pace of her hometown.
attributes:
  skills: '[''B2B sales strategy'', ''CRM management (Salesforce)'', ''Data analysis and forecasting'', ''Negotiation and contract development'', ''Customer relationship management'', ''Process optimization'',
