  career_goals: Rasheed aims to transition from full‑time field work to a mentorship and consultancy role within the next two years. He plans to obtain the NATE Master Specialist certification and launch
    a small apprenticeship program that partners with local community colleges to train underserved youth in HVAC trades. Additionally, he hopes to work on energy‑efficiency upgrades for affordable‑housing
    projects in Cincinnati, leveraging his technical background to reduce utility costs for low‑income families while leaving a lasting professional legacy before he eases into a semi‑retired schedule.
