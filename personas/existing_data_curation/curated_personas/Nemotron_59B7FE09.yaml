  career_goals: In retirement, Rodney aims to share his lifelong knowledge by mentoring local students, volunteering as a docent at the Shorewood Art Museum, and authoring a memoir that explores the intersection
    of engineering and art. He also aspires to develop a community STEM outreach program that integrates artistic creativity, and to continue learning new subjects such as digital photography and modern
    art trends.
