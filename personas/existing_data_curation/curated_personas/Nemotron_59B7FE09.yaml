  hobbies: '[''Visiting Art Exhibitions'', ''Theater Attendance'', ''Traveling'', ''Photography'', ''Bridge'', ''Community Gardening'', ''Woodworking'', ''Book Club'', ''Science Museum Volunteering'', ''Jazz
