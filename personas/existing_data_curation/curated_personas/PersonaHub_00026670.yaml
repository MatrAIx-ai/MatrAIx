persona_description: A researcher interested in the study of aging and its impact on the immune system in humans and nonhuman primates. They are particularly interested in the potential health benefits
  of a low-calorie diet and the molecular mechanisms by which this diet impacts the immune system. They are also interested in the potential use of this knowledge to develop new therapies for those with
  compromised immune systems, such as AIDS patients and elderly individuals.
