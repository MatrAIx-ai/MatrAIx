  career_goals: Sally hopes to study biology in college and eventually work as a wildlife rehabilitator or veterinary technician, combining her love of animals with a practical, stable career that lets
    her stay connected to her community. She also dreams of using her writing and digital skills to create educational content about local ecology, hoping to raise awareness and inspire peers to protect
    their environment.
