personas:
  professional: Sally Chong, a budding wildlife illustrator and freelance short‑story author, blends a curiosity for ecosystems with pragmatic sketch‑techniques, they often swap school projects for field
    journals, navigate the chaos of a disorganized timetable, and occasionally assert themselves in the environmental club’s leadership decisions.
  sports: Sally Chong, a casual cross‑country runner on the high school track team, keeps fit by jogging prairie trails, occasionally joins the community’s ‘Prairie Rovers’ soccer club for Saturday matches,
    and roots for the Kansas City Chiefs in football season and the Kansas City Royals during summer baseball.
  arts: Sally Chong, an avid reader of Ursula K. Le Guin’s speculative worlds and Neil Gaiman’s dark fantasies, spends afternoons sketching prairie horizons and meadow wildlife, captures sunset hues with
    their phone like a budding photographer, and fills the house with folk‑indie tunes from Mumford & Sons, Phoebe Bridgers, and Bon Iver, all of which shape their creative storytelling.
  travel: Sally Chong, an impulsive day‑trip planner who prefers spontaneous escapes over rigid itineraries, has hiked the Badlands and camped near Yellowstone’s geysers, dreams of witnessing Iceland’s
    midnight sun, and navigates family budget limits by swapping rides with friends for weekend prairie excursions.
  culinary: Sally Chong, a garden‑to‑table enthusiast, loves whipping up zucchini fritters with fresh basil, tossing herb‑infused goat cheese salads featuring carrots and kale from their backyard plot,
    and baking warm apple crumble topped with cinnamon, often sharing these meals with the family dog and neighbor’s goat after a long bird‑watching session.
  core: Sally Chong, a curious yet fretful teen, trades organized schedules for spontaneous bird‑watching and storytelling, they hoard vintage indie vinyls and an ever‑expanding stash of field guides, and
    they often over‑think the smallest decisions.
background:
  cultural: Sally was raised in a predominantly white, rural community in Baca County, Colorado, where family farms and ranches shape daily life. The local culture emphasizes self-reliance, appreciation
    of the open landscape, and strong community ties, often centered around school events, church gatherings, and seasonal agricultural activities. While she absorbs traditional Western values of hard work
    and neighborly support, she also navigates broader American youth culture through the internet, music, and social media, blending her small-town roots with contemporary influences.
