  hobbies: '[''Gardening (vegetables, herbs, succulents)'', ''Traditional Mexican cooking'', ''Knitting and crafting'', ''Church choir singing'', ''Senior center activities (bingo, crafts)'', ''Walking
    and hiking in local parks'', ''Listening to bolero and mariachi music'', ''Family storytelling and oral history sessions'', ''Volunteer work at community festivals'']'
  career_goals: Even at 81, Maria Paola remains motivated to give back. She aims to mentor younger volunteers at the senior center, helping them develop leadership and organizational skills. She hopes to
    document and share her family’s oral histories in a small booklet for future generations, preserving cultural traditions. She also aspires to lead a monthly “Cultural Café” where seniors can showcase
    music, stories, and recipes, fostering intergenerational connections. Maintaining her health and independence, she plans to continue walking daily and expanding her garden, while staying actively involved
    in her church and local Hispanic community.
