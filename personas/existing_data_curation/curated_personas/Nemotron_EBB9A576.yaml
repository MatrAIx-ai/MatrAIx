  hobbies: '[''Gospel choir singing'', ''Women’s softball league'', ''Community health workshops'', ''Southern cooking'', ''Gardening'', ''Juneteenth celebrations'', ''Board game nights'', ''Zumba classes'']'
  career_goals: Rani aims to transition into a nurse manager or clinical educator role within the next three years, leveraging her practical expertise and competitive spirit to lead a high‑performing unit.
    She plans to complete her bachelor’s degree in nursing and obtain a certification in quality improvement. Her long‑term ambition is to develop a community health outreach program that provides preventive
    care workshops and health screenings for underserved residents of Richmond Hill, aligning her routine‑focused skills with a flexible, community‑centered initiative.
