persona_description: A power engineer who is interested in understanding how to convert kilovolt-amps (kVA) to watts for electrical calculations. They are familiar with the formula P = 1000 × S(kVA) × PF,
  where P is the real power in watts, S is the apparent power in kilovolt-amps, and PF is the power factor. They may also be interested in understanding the real power in watts when the apparent power is
  3 kVA and the power factor is 0.8.
