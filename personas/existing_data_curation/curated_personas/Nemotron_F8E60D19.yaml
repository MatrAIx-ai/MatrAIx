  hobbies: '[''Reading mystery novels'', ''Drawing and sketching wildlife'', ''Journaling'', ''Gardening'', ''Bird-watching'', ''Walking the family dog'', ''Science club projects'', ''Building LEGO models'',
    ''Playing piano'', ''Volunteering at animal shelter'']'
  career_goals: Nancy aspires to a career that combines her love for animals, her caring nature, and her practical mindset. She hopes to become a veterinarian, striving to help animals and support her community's
    farms. She also imagines one day teaching science to younger students, sharing curiosity while providing reliable guidance. In the short term, she plans to excel in high school science courses, join
    the Future Farmers of America club, and volunteer at the local animal shelter to build relevant experience.
