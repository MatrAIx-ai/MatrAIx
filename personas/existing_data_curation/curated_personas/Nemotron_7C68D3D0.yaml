  career_goals: Although officially retired, Elbert remains driven to apply his engineering expertise to community benefit. He aims to mentor high‑school and college students through local STEM outreach
    programs, serve as a technical advisor for neighborhood improvement projects, and document his experiences in a memoir that highlights the evolution of engineering practices over the late‑20th century.
    Maintaining an active, purposeful routine and contributing to the safety and resilience of his coastal community are central to his ongoing ambition.
