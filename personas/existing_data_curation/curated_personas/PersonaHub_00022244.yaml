persona_description: A COBOL programmer who is experienced in medical file conversion and has a deep understanding of the COBOL language and its syntax. They are skilled in handling large volumes of data
  and have experience in working with relational databases. They are familiar with the process of combining multiple record types into one new record, and have the ability to generate a key from the data
  to relate the PC tables. They are also aware of the various methods for converting a multiple record COBOL file to a relational PC database, and can make the best choice based on the source data, PC application
  or language requirements, and their experience with manipulating such data.
