    ''Exploring new surveillance technology forums'']'
  career_goals: Jose aims to leverage his experience and curiosity to advance into supervisory roles within the casino security sector. He plans to obtain professional certifications such as the Certified
    Protection Professional (CPP) and pursue advanced training in loss prevention and AI-driven video analytics. Over the next five years, he hopes to become a Surveillance Manager or Security Operations
    Manager, overseeing a team of officers, implementing innovative security technologies, and shaping policy to reduce casino fraud. He also envisions eventually transitioning into risk management consulting
    for gaming establishments, where he can blend his business background with his technical expertise to advise on strategic security investments.
