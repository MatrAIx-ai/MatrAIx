personas:
  professional: Sarita Gonzalez is a meticulous home‑based caterer and community event coordinator who blends their expert traditional cooking, precise budgeting, and bilingual liaison skills to deliver
    comforting meals at local festivals and private celebrations, and they are currently pursuing a caregiving certification.
  sports: Sarita Gonzalez stays active through salsa and cumbia dance classes at a local community center, they walk the Miami Beach boardwalk five times a week, and they are a devoted fan of the Miami
    Heat basketball team, occasionally joining a neighborhood walking club that meets at Bayfront Park.
  arts: Sarita Gonzalez enjoys listening to Vallenato, tropical, and reggaetón beats from artists like J Balvin and Maluma while knitting colorful blankets for community drives, and they unwind by watching
    telenovelas such as 'La Reina del Sur' and attending live performances at the Little Havana cultural theater.
  travel: Sarita Gonzalez prefers short trips that blend cultural immersion and relaxation, frequently visiting nearby Caribbean islands like Puerto Rico for their vibrant street festivals, planning a future
    pilgrimage to a famous salsa festival in Cali, and they cherish weekend getaways to the Everglades to photograph native flora for their garden.
  culinary: Sarita Gonzalez’s culinary passion shines in their methodical preparation of bandeja paisa, arepas filled with cheese and chicharrón, and simmered ajiaco, where they meticulously balance spices
    such as cumin, annatto, and cilantro, while mastering the art of shaping dough by hand and experimenting with seasonal herbs from their own garden.
  core: Sarita Gonzalez balances a routine‑driven life of cooking, caregiving, and community dancing with vivid bursts of anxiety, and they use structured habits and vibrant social ties to stay grounded
    while pursuing a modest catering dream.
background:
  cultural: Sarita grew up immersed in Colombian traditions, where family bonds, Catholic faith, and a love for flavorful cuisine are central. She carries forward the Colombian emphasis on hospitality,
    often preparing large communal meals and hosting gatherings that celebrate music, dance, and storytelling. Her upbringing instilled a respect for routine and practicality, traits that help her navigate
    daily life in Miami's dynamic, multicultural environment. Living in Miami's vibrant Colombian diaspora, she blends her heritage with the city's diverse influences, maintaining Spanish as her primary
    language while gradually incorporating English. Her cultural identity is expressed through participation in local Colombian festivals, church events, and community volunteer work, all of which reinforce
    her sense of belonging and purpose.
attributes:
  skills: '[''Traditional Colombian Cooking'', ''Household Management'', ''Budgeting and Expense Tracking'', ''Bilingual Communication (Spanish/English)'', ''Community Event Coordination'', ''Volunteer
