  hobbies: '[''Cooking Colombian dishes'', ''Salsa and Cumbia dancing'', ''Church involvement'', ''Gardening'', ''Knitting and crocheting'', ''Listening to music (Vallenato, Reggaetón)'', ''Walking in neighborhood
    parks'', ''Watching telenovelas'', ''Volunteering at community events'']'
  career_goals: Sarita aspires to turn her culinary talents into a modest home‑based catering business that serves Colombian specialties at local festivals and private celebrations, providing both financial
    independence and a platform to share her heritage. She also aims to obtain a caregiver certification through a community college program, enhancing her ability to support vulnerable neighbors and potentially
    secure part‑time employment. Improving her English proficiency is a personal goal, as is becoming a peer support volunteer for other women dealing with anxiety and emotional distress, leveraging her
    own experiences to foster a supportive network.
