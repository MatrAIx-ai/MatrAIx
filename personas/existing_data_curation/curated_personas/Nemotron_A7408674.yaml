personas:
  professional: Michelle Eastin is a retail operations manager with a knack for coaching frontline staff and using data-driven merchandising, who blends curiosity about emerging tech with a flexible, people‑first
    leadership style that often sidesteps rigid procedures, even if deadlines occasionally slip.
  sports: Michelle Eastin is an avid hiker and trail runner who participates in the Parker Trail Runners club, follows the Colorado Avalanche and Denver Broncos, and spends winter weekends snowshoeing in
    the foothills, using these activities as both stress relief and a way to stay physically grounded.
  arts: Michelle Eastin finds solace in watercolor painting, drawing inspiration from artists like Alvaro Castagnet, attends the Telluride Bluegrass Festival to enjoy live sets by Mumford & Sons and St.
    Paul & The Broken Bones, and captures daily reflections in a journal that doubles as a creative sketchbook.
  travel: Michelle Eastin loves spontaneous road trips, often heading up the Peak to Peak Scenic Byway to Estes Park or down to Santa Fe for a weekend of art and cuisine, preferring to book last‑minute
    stays in boutique B&Bs while balancing travel costs with a modest vacation budget.
  culinary: Michelle Eastin experiments with seasonal Colorado farmers market finds, whipping up dishes like roasted beet and goat cheese salad, Colorado lamb stew seasoned with rosemary, and grilled trout
    with citrus glaze, while their intermediate cooking skill is complemented by a hobby of crafting lavender‑scented candles for home ambience.
  core: Michelle Eastin is a curiosity‑driven retail leader who combats chronic worry with hikes, watercolors, and spontaneous getaways, yet often battles deadline fatigue and impulsive spending.
background:
  cultural: Michelle grew up in a suburban Midwestern‑Western family that valued self‑reliance, community involvement, and a solid work ethic. Her white American heritage blends traditional Mid‑America
    values with the outdoor‑oriented lifestyle of Colorado, where appreciation for nature and a casual, friendly demeanor are common. She maintains close ties with extended family gatherings, local church
    events, and community volunteer groups, reflecting a cultural emphasis on family, neighborhood support, and a pragmatic approach to life.
