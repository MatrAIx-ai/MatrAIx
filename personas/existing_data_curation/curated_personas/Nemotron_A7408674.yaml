  career_goals: She aims to advance to a district or regional manager role within the next three to five years, overseeing multiple stores and shaping broader retail strategies. Michelle is especially interested
    in leading initiatives that integrate emerging retail technologies such as mobile checkout and AI‑driven inventory forecasting. To support this trajectory she plans to complete a certification in project
    management and attend leadership workshops focused on emotional resilience and time‑management. A personal priority is to create a work environment that balances high performance with employee well‑being,
    reducing the stress she often feels in fast‑paced settings.
