  hobbies: '[''Bowling league'', ''Line-dance classes'', ''County fair volunteering'', ''Genealogy research'', ''Mystery novels'', ''Photography'', ''Hiking on state park trails'', ''Gentle yoga'', ''Journaling'',
    ''Classic rock music listening'']'
  career_goals: Before she retires, Diane aims to transition into a senior mentor role, training new bus drivers and sharing her practical knowledge of route planning and vehicle care. She hopes to qualify
    for a part-time dispatcher position, applying her curiosity about scheduling software to improve on-time performance on local routes. Diane also aspires to be recognized by the transit authority for
    her safety record and to champion initiatives that make public transportation more accessible for seniors in Bradford County. Ultimately, she would like to volunteer as a community driver for local
    charities, keeping her sense of competition alive by organizing driver safety workshops.
