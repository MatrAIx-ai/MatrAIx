personas:
  professional: Diane Helton, a seasoned commercial bus driver with over three decades behind the wheel in rural Pennsylvania, leverages their practical curiosity to master route navigation and emerging
    transit technologies while mentoring new drivers with a friendly de‑escalation style and a competitive drive to preserve an immaculate safety record.
  sports: Diane Helton competes in the local “River Runners” bowling league, hits the line‑dance floor every Thursday while cheering for the Wilkes‑Barre/Scranton Penguins, and joins weekend hikes on the
    trails of Ricketts Glen State Park to stay fit, often encouraging their fellow participants with upbeat banter.
  arts: Diane Helton indulges in Agatha Christie mysteries, captures golden Susquehanna sunsets with a Canon EOS Rebel, and enjoys line‑dance evenings set to Dolly Parton and bluegrass, while occasionally
    attending the county’s community theater productions of classic plays, where their keen eye for detail also finds clues in set designs.
  travel: Diane Helton prefers road‑trip adventures that combine genealogy stops in the Amish countryside of Lancaster County, sunset photography sessions in the Pocono Mountains, and occasional weekend
    visits to the historic streets of Philadelphia’s Old City, all planned with a flexible, last‑minute itinerary that reflects their spontaneous spirit.
  culinary: Diane Helton favors hearty Pennsylvania Dutch fare like chicken and dumplings and apple crisp, often experimenting with fresh trout caught from the Susquehanna, while their cooking skill ranges
    from reheating frozen pot pies to painstakingly perfecting a family‑secret bratwurst recipe.
  core: Diane Helton blends a competitive, curiosity‑driven bus‑driving career with a lively social calendar of bowling, line‑dancing, and genealogy, all while juggling their worry‑induced financial scrambles
    and a penchant for sunset photography.
background:
  cultural: Diane grew up in a small, close-knit community in northern Pennsylvania, where the values of hard work, self-reliance, and neighborly support are central. Her family's ancestry traces back to
    German and Irish immigrants who settled in the region generations ago, shaping a cultural backdrop that includes a love for local festivals, high school sports, and church gatherings. The rural Pennsylvania
    lifestyle has reinforced her practical approach to problem-solving and her appreciation for outdoor recreation. While she identifies with a predominantly white, Midwestern American cultural heritage,
    Diane also respects the growing diversity of Bradford County and welcomes new ideas that enhance community cohesion.
attributes:
  skills: '[''Commercial Driver License (Class B)'', ''Safe driving'', ''Route navigation'', ''Customer service'', ''Vehicle inspection'', ''Basic mechanical troubleshooting'', ''Conflict de-escalation'',
