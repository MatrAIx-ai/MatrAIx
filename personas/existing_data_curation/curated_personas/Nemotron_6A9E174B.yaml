    ''Participating in community cultural celebrations (Cinco de Mayo, Día de los Muertos)'']'
  career_goals: Although officially retired, Alejandro aims to deepen his impact on the Alvin community. He plans to complete the final credits of his undergraduate degree in History or Cultural Studies,
    using the achievement to enrich a series of oral‑history workshops for local seniors. He aspires to lead a multicultural arts program at the senior center, curating exhibitions that celebrate Mexican‑American
    contributions. Alejandro also hopes to write and self‑publish a memoir that preserves his family’s immigrant story for future generations, and to mentor at‑risk youth by teaching them cooking, gardening,
    and the value of cultural pride.
