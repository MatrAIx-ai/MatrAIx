persona_description: A health department official or public health professional who is responsible for developing and implementing COVID-19 case investigation and contact tracing plans in their jurisdiction.
  They are familiar with the CDC's basic principles of contact tracing and have experience working with community organizations to communicate about contact tracing for COVID-19. They are interested in
  learning about new tools and technologies that can assist in the contact tracing process and are eager to improve their knowledge and skills as a contact tracer or case investigator. They are also interested
  in learning about emerging modeling data regarding timeframes for case investigation and contact tracing effectiveness in high-burden jurisdictions.
