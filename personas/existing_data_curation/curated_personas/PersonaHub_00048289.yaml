persona_description: A sports science researcher and expert in the field of catastrophic sports injuries, particularly in high school football. He is the director of the University of North Carolina's National
  Center for Catastrophic Sports Injury Research and has been collecting brain-injury stats since 1984. He is concerned about the increasing rates of catastrophic brain injuries in high school football
  and the potential long-lasting health consequences of full-contact sports. He believes that coaches should be teaching proper tackling techniques and that officials should be enforcing the rules more
  strictly to minimize the risk of brain injuries.
