    art programs'', ''Effective written and verbal communication'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Yoga and meditation'', ''Reflective journaling'', ''Hiking (West Rock Ridge Trail)'', ''Bicycle riding along the shoreline'',
    ''Reading contemporary fiction'', ''Experimental cooking'', ''Attending live music shows'']'
  career_goals: Emma aims to earn a full teaching credential and transition into a classroom teacher role within the next two years. She aspires to specialize in arts‑integrated education, developing a
    school‑wide program that uses visual and performing arts to enhance literacy and STEM learning. Long‑term, she plans to pursue a master’s degree in Educational Leadership to become an instructional
    coach or curriculum specialist, with a particular focus on mental‑health‑aware pedagogy. Emma also hopes to launch a community partnership that provides after‑school art workshops for at‑risk youth
    in West Haven, fostering both creative expression and emotional resilience.
