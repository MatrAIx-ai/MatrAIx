personas:
  professional: Gabriela Larriega, a three‑year‑old with a natural knack for organized play, treats the sandbox as a miniature workshop, methodically arranging buckets and shells, guiding their friends
    while confidently directing the construction of a sandcastle, a clear early sign of future architectural curiosity and practical problem‑solving.
  sports: Gabriela Larriega, a lively three‑year‑old, participates in a toddler gymnastics class at the community center, loves joining neighborhood T‑ball games on weekends, and proudly waves a miniature
    flag of the local minor‑league baseball team, the River City Rangers, embodying their energetic, sociable, and organized approach to fitness.
  arts: Gabriela Larriega, a curious three‑year‑old, spends afternoons drawing bold crayon pictures, humming along to Raffi’s 'Baby Beluga', dancing to the Peppa Pig theme song, and watching animated short
    films by Studio Ghibli, which together shape their emerging creative identity and love for vibrant storytelling.
  travel: Gabriela Larriega, at age three, delights in family road trips to the beach where they build sandcastles, enjoys a summer visit to the Grand Canyon National Park on a stroller‑friendly trail,
    and dreams of exploring a Disneyland park, balancing excitement for new adventures with the comfort of familiar routines.
  culinary: Gabriela Larriega, a three‑year‑old food explorer, adores chicken nuggets with honey mustard, cheesy mac ‘n’ cheese, fresh apple slices, can spread peanut butter on toast with a little help,
    yet often leaves a trail of crumbs across the kitchen floor, reflecting both their enthusiastic curiosity and occasional messiness.
  core: Gabriela Larriega, a three‑year‑old whirlwind of curiosity and methodical play, balances tidy sandcastle building with spontaneous sticker collections, sociable group games, and the occasional bedtime
    protest, embodying an organized yet energetic spirit that they proudly display.
background:
  cultural: Gabriela is raised in a Cuban‑American household in Durham, North Carolina. At home, Spanish is spoken alongside English, and family gatherings feature traditional Cuban dishes such as ropa
    vieja and picadillo. She celebrates culturally significant days like Carnaval and enjoys listening to classic Cuban rhythms. The vibrant multicultural environment of Durham introduces her to Southern
    hospitality and a diverse community, enriching her sense of identity.
