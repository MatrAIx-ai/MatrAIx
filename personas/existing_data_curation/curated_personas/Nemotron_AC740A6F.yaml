  career_goals: While still a toddler, Gabriela expresses budding ambitions through imaginative play. She loves pretending to be a teacher guiding her stuffed friends, a doctor caring for a doll, and a
    dancer moving to lively Cuban rhythms. These play scenarios hint at future aspirations to help others, learn continuously, and share her cultural heritage.
