  career_goals: Ricardo dreams of becoming a marine biologist one day, inspired by his love for the ocean and his desire to protect marine life for his family’s future. At the same time, his practical side
    imagines a future where he can lead a community soccer team or become a teacher, using his natural knack for bringing people together and his caring nature to help others learn and grow. He often talks
    about exploring the seas, building robots, and coaching friends, reflecting the blend of curiosity and practicality that defines his ambitions.
