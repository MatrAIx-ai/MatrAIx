personas:
  professional: Luis Perezjimenez is a data‑entry specialist with a lightning‑quick 80 wpm typing speed, advanced Excel and basic SQL expertise, and bilingual fluency, who leverages their curiosity and
    artistic eye to turn routine metadata tagging into visual puzzles, though their laissez‑faire approach sometimes leads to missed deadlines.
  sports: Luis Perezjimenez enjoys hiking the Wasatch foothills, follows the Utah Jazz on NBA nights, supports Real Salt Lake in the MLS, and they occasionally join the Wasatch Hiking Club’s weekend outings,
    preferring low‑impact endurance over competitive sports.
  arts: Luis Perezjimenez spends evenings photographing Utah’s red rock canyons, sketching the same vistas, and attending gallery openings that feature works by Ansel Adams, Georgia O’Keeffe, and contemporary
    folk singer Lila Downs, seamlessly weaving visual and musical inspiration into their creative practice.
  travel: Luis Perezjimenez plans trips that alternate between exploring national parks like Zion and Bryce Canyon and traveling to his parents' hometown region for cultural festivals, while dreaming of
    a future art‑focused pilgrimage to Barcelona and a hiking expedition to Patagonia.
  culinary: Luis Perezjimenez frequently prepares pupusas stuffed with cheese, refried beans, or chicharrón and tamales wrapped in banana leaves, pairing them with fresh trout fillets seasoned with lime
    and cilantro, showcasing a blend of traditional flavors and Utah’s local bounty.
  core: Luis Perezjimenez is a curious data specialist who fuses artistic passion with technical precision, navigates life with spontaneous flexibility, yet occasionally wrestles with organization and a
    penchant for creative indulgences.
background:
  cultural: Luis was raised in a bilingual Salvadoran household in the United States, preserving the language, traditions, and Catholic faith of his parents while adapting to life in Clearfield, Utah. He
    celebrates Salvadoran holidays such as Día de la Independencia and the feast of Nuestra Señora de la Merced with family gatherings, traditional foods, and music. Active in the local Salvadoran diaspora,
    he volunteers at cultural festivals and helps organize community workshops on preserving family histories. At the same time, he embraces Utah’s outdoor lifestyle and community values, finding a balance
    between his Central American heritage and the broader American cultural milieu.
attributes:
  skills: '[''Fast typing (80 WPM)'', ''Data validation and cleaning'', ''Microsoft Excel (advanced formulas & pivot tables)'', ''Basic SQL queries'', ''Bilingual Spanish-English communication'', ''OCR
    software operation'', ''Basic graphic editing (Adobe Photoshop)'', ''Creative problem solving'', ''Adaptability in dynamic workflows'', ''Attention to detail'']'
  hobbies: '[''Photography'', ''Sketching'', ''Listening to Salvadoran folk music'', ''Cooking Salvadoran cuisine (pupusas, tamales)'', ''Hiking Utah trails'', ''Visiting local art galleries'', ''Reading
    art history'', ''Exploring data visualization tools (Tableau, Power BI)'', ''Playing puzzle games'', ''Participating in community cultural events'']'
  career_goals: Luis aims to move from a data‑entry position into a data‑analysis or data‑quality specialist role within the next three to five years. He plans to earn a professional certification such
    as the Google Data Analytics Professional Certificate or a Microsoft Power BI certification, deepen his SQL and data‑visualization skills, and eventually lead projects that preserve cultural heritage—particularly
    digitizing and curating Salvadoran art and historical records for museums or community archives. While pursuing these advancements, Luis seeks to maintain a flexible schedule that supports his family
    life and his artistic pursuits.
