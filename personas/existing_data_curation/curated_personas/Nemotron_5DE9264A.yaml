  hobbies: '[''Visiting art museums & galleries'', ''Street photography'', ''Playing acoustic guitar (songwriting)'', ''Reading contemporary art theory'', ''Writing poetry and short stories'', ''Exploring
    local music scene (jazz, salsa)'', ''Cooking traditional Puerto Rican dishes'', ''Hiking in El Yunque rainforest'', ''Playing basketball with friends'', ''Attending dance workshops (salsa, bomba)'']'
  career_goals: Driven by his curiosity for art and desire to impact his community, Gustavo aims to complete a bachelor's degree in Visual Communications or Digital Media within the next two years. He envisions
    a career as a multimedia designer or cultural program coordinator for a museum, cultural center, or nonprofit in Puerto Rico, where he can blend his creative skills with his organized, project‑management
    strengths. He also plans to build a freelance portfolio that serves local artists and NGOs, and ultimately hopes to launch a community‑based art hub in Carolina that offers workshops, exhibitions, and
    mentorship for emerging creators.
