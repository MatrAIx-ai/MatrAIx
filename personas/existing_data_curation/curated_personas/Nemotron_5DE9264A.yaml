personas:
  professional: Gustavo Millet, a 22‑year‑old visual communications student, showcases their methodical project planning alongside a curious eye for island art, delivering polished digital illustrations
    and social‑media campaigns using Photoshop, Illustrator, and Premiere while juggling bilingual research presentations and dreaming of coordinating cultural programs for local museums.
  sports: Gustavo Millet, a 22‑year‑old basketball enthusiast, plays weekly pick‑up games with friends, roots for the island’s professional team the Coastal Cyclones, and they spend weekends hiking rainforest
    trails to keep fit and clear their mind.
  arts: Gustavo Millet, a 22‑year‑old creative, frequently photographs vibrant street murals by renowned local artist Santiago López, writes poetry inspired by the rhythmic beats of salsa and bomba, and
    strums acoustic guitar covers of classics by legendary singer Lila Rivera, weaving these influences into their visual storytelling.
  travel: Gustavo Millet, a 22‑year‑old adventure seeker, plans trips to historic Cartagena, surf retreats in Tamarindo, and dreams of exploring Havana’s old town, using Notion to organize itineraries while
    balancing their tight student budget and a love for spontaneous cultural immersion.
  culinary: Gustavo Millet, a 22‑year‑old home cook, delights in preparing traditional island dishes like mofongo with shrimp, arroz con gandules seasoned with sazon, and tostones with garlic aioli, often
    experimenting with homemade adobo rubs, but they occasionally burn the edges of roasted chicken when they multitask between music practice and video editing.
  core: Gustavo Millet, a 22‑year‑old organized creator who mixes photography, poetry, and basketball, follows a meticulous schedule, they sometimes forget to take vitamins, and they fuel curiosity with
    every new cultural experience.
background:
  cultural: Gustavo was raised in Carolina, a suburban municipality on the northeast coast of Puerto Rico, where the rhythm of daily life blends urban development with strong ties to island traditions.
    Growing up in a bilingual household, he speaks Spanish at home and English at school, giving him a bicultural perspective. The local fiestas patronales, vibrant street art, and the island’s culinary
    heritage have shaped his appreciation for communal creativity. He identifies with the broader Puerto Rican diaspora, valuing family solidarity, respect for elders, and a deep connection to the island’s
    music—from bomba and plena to contemporary reggaetón. This cultural tapestry informs his artistic sensibilities and his desire to contribute to the island’s cultural vitality.
attributes:
