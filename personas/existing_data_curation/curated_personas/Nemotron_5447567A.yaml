  career_goals: Looking ahead, Laura aims to transition into a senior administrative coordinator role where she can mentor junior staff and lead process improvement initiatives. She plans to earn a Certified
    Administrative Professional (CAP) credential and deepen her expertise in project‑management platforms such as Asana, positioning herself as a consultant for small businesses seeking to streamline their
    back‑office operations. Ultimately, she hopes to secure a part‑time, flexible schedule that allows her to balance work with her growing interest in community volunteering and personal pursuits.
