persona_description: A teacher and educator who specialized in the field of education for the deaf and dumb, particularly focusing on the teaching of writing and speech to individuals who are deaf and mute.
  He was known for his success in teaching a boy named Charles Sherriff to speak and for establishing an academy in Edinburgh that taught the deaf and mute to read, write, and practice arithmetic. His work
  was recognized by Dr. Johnson and he was supported by the king of Scotland.
