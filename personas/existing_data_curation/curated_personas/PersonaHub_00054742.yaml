persona_description: A researcher and scientist with a keen interest in the study of the human brain and its interactions with various neurotransmitters, particularly nicotine. They are particularly interested
  in understanding the role of specific nAChR subtypes in nicotine discrimination and the mechanisms of the subjective effects of nicotine withdrawal. They are also interested in exploring the role of behavioral
  factors in drug cross-substitution and the relation between interoceptive and reinforcing effects and individual differences in vulnerability to tobacco dependence. They have a strong background in molecular
  biology and pharmacology and are familiar with the latest advances in the field of neuroscience.
