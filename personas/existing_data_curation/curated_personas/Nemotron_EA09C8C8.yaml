personas:
  professional: Salim Buchanan, a 30‑year‑old mechanical and software engineer, leverages data‑driven analysis, rapid‑prototype 3D printing, and DIY electronics to craft sustainable urban IoT solutions,
    thriving in agile teams where their curiosity‑driven yet pragmatic mindset and relaxed attitude toward deadlines fuel innovative product strategies while mentoring junior engineers.
  sports: Salim Buchanan channels competitive energy into indoor rock climbing at The Cliffs LIC, weekly 5‑mile runs through Central Park, and occasional pick‑up basketball games while cheering for the
    New York Knicks and following the New York Rangers, balancing the thrill of personal challenges with a loyal fanhood for local teams.
  arts: Salim Buchanan fuels his creative side by photographing New York’s hidden alleys with a vintage Leica, devouring science‑fiction classics from William Gibson and Neal Stephenson, and curating eclectic
    playlists featuring Daft Punk, Aphex Twin, and J‑J Carter, which together shape a visual‑and‑auditory aesthetic that inspires his maker projects.
  travel: Salim Buchanan prefers spontaneous, tech‑focused urban getaways—last year he packed a weekend trip to Berlin’s maker fairs, earlier he explored Reykjavik’s geothermal labs, and he now dreams of
    a month‑long stay in Singapore to study its smart‑city infrastructure, all while juggling the limited budget of his fledgling venture.
  culinary: Salim Buchanan’s kitchen experiments often blend sushi‑style rice with smoked beet‑infused aioli on a homemade ramen broth, featuring ingredients like miso, quinoa, and sriracha, while his modest
    culinary skill shines most when he plates visually striking dishes inspired by his urban photography aesthetic.
  core: Salim Buchanan is a curious yet laid‑back 30‑year‑old engineer who juggles rapid‑prototype tinkering with fierce competition, a tendency to procrastinate on obligations, and an unrelenting worry
    that fuels both his drive and his nightly insomnia.
background:
  cultural: Salim is a white American of mixed Irish and English ancestry, raised in a middle‑class suburb of New York City. His family emphasized self‑reliance, pragmatism, and individual achievement,
    values that shape his practical yet curious mindset. Growing up near the cultural mosaic of NYC, he absorbed diverse viewpoints, which fostered an open‑minded yet competitively driven outlook. He identifies
    with mainstream American cultural norms while appreciating the city's vibrant diversity, influencing his flexible work style and his balanced social‑alone time preferences.
