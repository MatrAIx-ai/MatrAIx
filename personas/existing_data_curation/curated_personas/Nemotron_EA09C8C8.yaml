  career_goals: Salim aims to become a principal engineer or technical lead focused on sustainable urban technologies, eventually launching his own venture that combines pragmatic engineering with emerging
    IoT and renewable‑energy solutions. He seeks to mentor junior engineers, shape product strategy, and cultivate a flexible work culture that balances high performance with personal well‑being, while
    continuously improving his ability to manage stress and uncertainty.
