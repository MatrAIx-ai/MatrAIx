  career_goals: Orpah aims to become a senior systems analyst within five years, focusing on streamlining IT workflows for small businesses in Roanoke. She hopes to earn certifications such as CompTIA Network+,
    Cisco CCNA, and eventually complete a bachelor's degree in Information Technology. She also envisions leading community tech workshop series to help locals develop digital literacy and fostering mentorship
    programs for aspiring tech professionals.
