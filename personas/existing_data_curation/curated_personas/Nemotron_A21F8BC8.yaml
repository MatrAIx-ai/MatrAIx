personas:
  professional: Prasong Perez, a 27‑year‑old pipefitting and welding specialist in Austin, leverages meticulous diagnostics, advanced MIG/TIG welding, and a curiosity for sustainable design to deliver high‑pressure
    steam line installations that double as functional metal art, all while maintaining a competitive drive to out‑perform peers and a flexible approach to on‑site problem solving.
  sports: Prasong Perez stays fit by tackling rugged Hill Country hikes, jogging along Lady Bird Lake three times a week, and joining a weekend community basketball league, all while cheering for Austin FC
    and occasionally attending Texas Longhorns football games for a burst of team spirit.
  arts: Prasong Perez channels their curiosity into urban photography inspired by Edward Burtynsky, creates metal pipe sculptures echoing the aesthetic of Austin muralist Stephanie Miller, and unwinds to
    the ambient electronica of Tycho while sketching design concepts for future installations.
  travel: Prasong Perez prefers meticulously planned solo trips that blend outdoor adventure with design inspiration, having trekked New Mexico’s red‑rock canyons and Colorado’s alpine trails, and now dreaming
    of exploring Iceland’s geothermal sites and Japan’s minimalist architecture for fresh sustainable ideas.
  culinary: Prasong Perez, an avid home chef, frequently recreates fragrant lemongrass noodle soup and smoky grilled fish with tamarind glaze using family‑passed recipes, experiments with balancing sweet,
    sour, and spicy flavors, and has engineered a custom copper‑lined coffee system to brew barista‑grade espresso at home.
  core: Prasong Perez blends a relentless drive for precision in plumbing with a quiet love for industrial art, often staying up late welding sculptures while obsessively tracking every tool expense and
    occasionally skipping social events to prioritize the next blueprint.
background:
  cultural: Prasong was born to immigrant parents from the Philippines who settled in Texas in the early 2000s. He grew up in a bilingual household, speaking English and Tagalog, and was immersed in Filipino
    cultural practices such as celebrating Pangangaluluwa and cooking traditional dishes like adobo and sinigang. Family gatherings emphasized respect, hard work, and communal love of food, shaping his
    appreciation for culinary arts and community service. Though he identifies strongly with his Southeast Asian heritage, he also embraces the eclectic culture of Austin, mingling his roots with the city’s
    vibrant music, art, and tech scenes. He participates in local Filipino community events, such as the annual Pista sa Pilipinas festival, and maintains a connection to his heritage through food, language,
    and occasional visits to family back home.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''Residential/Commercial Plumbing'', ''MIG/TIG Welding'', ''Brazing'', ''Blueprint Reading'', ''3D CAD Modeling (AutoCAD Plant 3D)'', ''Code Compliance (IMC,
    Texas Plumbing Code)'', ''Hydraulics and Pneumatics'', ''Basic Electrical Diagnostics'', ''Pressure Testing'', ''Preventative Maintenance'', ''Smart‑Home Plumbing Integration'', ''Sustainable Water‑Conservation
    Solutions'', ''Artistic Metal Fabrication'']'
  hobbies: '[''Urban Photography'', ''Metal Sculpture Crafting'', ''Science‑Fiction Reading'', ''Sustainable Design Literature'', ''Home Cooking (Southeast Asian Cuisine)'', ''DIY Coffee System Building'',
    ''Hill Country Hiking'', ''Small‑Group Board Gaming'', ''Attending Local Art Openings'']'
  career_goals: Prasong aims to attain Journeyman Pipefitter certification within the next year and eventually earn Master Plumber licensure. He aspires to lead a small, high‑performing crew on complex
    commercial projects, focusing on green‑building installations and smart‑plumbing technologies. In the longer term, he plans to launch his own specialty contracting firm that offers both conventional
    plumbing services and custom industrial‑art installations for boutique venues in Austin. He also hopes to become a certified safety inspector and mentor apprentices, leveraging his competitive drive
    to set industry benchmarks for efficiency and sustainability.
