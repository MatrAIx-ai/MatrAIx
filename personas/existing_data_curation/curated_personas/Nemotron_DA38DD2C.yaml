personas:
  professional: Ethel Berryhill, a 30‑year‑old shuttle driver in the Pittsburgh area, blends eight years of safe passenger transport and minor mechanical troubleshooting with a curiosity‑driven knack for
    route optimization, and they are actively pursuing a commercial driver’s licence and trainer certification to someday manage a boutique electric‑shuttle fleet.
  sports: Ethel Berryhill cheers on the Pittsburgh Steelers in the fall, the Penguins during hockey season, and the Pirates in summer while they keep fit by hiking the Allegheny National Forest trails on
    weekends, joining a community softball league, and attending weekly yoga classes at the local YMCA.
  arts: Ethel Berryhill nurtures their creative side through a weekly quilting circle, weekends at open‑mic nights listening to folk legends like Bob Dylan and John Prine, and quiet evenings studying Thomas
    Moran landscape paintings while their road‑map collection fuels a nostalgic love of classic automotive design.
  travel: Ethel Berryhill favors flexible, spur‑of‑the‑moment road trips guided by their vintage map collection, having explored the Pennsylvania Scenic Byways, Shenandoah Valley, and Asheville's art scene,
    and they dream of driving the Pacific Coast Highway and sipping wine in Bordeaux next summer.
  culinary: Ethel Berryhill delights in farm‑to‑table cooking, often crafting heirloom tomato‑based sauces, Pennsylvania Dutch chicken pot pie, and pierogi topped with fresh rosemary and basil, while their
    gardening hobby supplies the main ingredients for their weekly potluck dinners.
  core: Ethel Berryhill is a curious, easy‑going shuttle driver who blends a love for community service, gardening, and vintage road trips with a practical ambition to lead a sustainable boutique fleet.
background:
  cultural: Ethel is a white American raised in the suburban communities of western Pennsylvania. Her family’s roots trace back to a mix of German and Irish heritage, typical of the region’s immigrant history.
    Growing up in the modest, close‑knit environment of Butler County instilled values of self‑reliance, community service, and modest practicality. The local culture—shaped by a blend of Rust Belt work
    ethic and Appalachian hospitality—has influenced her down‑to‑earth demeanor, love of seasonal produce, and appreciation for small‑town gatherings. She celebrates traditional holidays with her extended
    family, enjoys regional foods like pierogies and apple butter, and takes pride in the area’s rich outdoor recreation opportunities.
attributes:
  skills: '["Professional Driving (CDL-Level)", "Route Optimization", "Customer Service & Hospitality", "Vehicle Maintenance & Basic Repairs", "Safety & Compliance Knowledge", "Local Geographic Knowledge
    (Cranberry Township to Pittsburgh Metro)", "Adaptive Problem Solving", "Effective Communication", "Time-Flexible Scheduling", "Use of Navigation Technology"]'
  hobbies: '["Gardening", "Hiking/Nature Walks", "Cooking/Recipe Exploration", "Collecting Vintage Road Maps", "Reading Classic Car Magazines", "Volunteer Work at Food Pantry", "Quilting Circle", "Attending
    Open‑Mic Music Nights", "Photography of Local Landscapes", "Road Trip Exploration"]'
  career_goals: Ethel aims to upgrade her licence to a full commercial driver’s licence with a passenger endorsement within the next year. She hopes to become a certified driver trainer, enabling her to
    mentor new chauffeurs at the company. In five years she envisions managing a small fleet that offers boutique shuttle services for local hospitals, corporate campuses, and weekend tourism trips, possibly
    incorporating electric‑powered shuttles to align with her curiosity about sustainable transport. She also wants to earn a certification in small‑business management to eventually launch her own family‑run
    shuttle company.
