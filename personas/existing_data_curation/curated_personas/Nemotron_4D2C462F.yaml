personas:
  professional: An experienced database professional transitioning toward senior architecture, Judith Nerys applies her methodical, detail‑oriented mindset to designing resilient relational schemas, automating
    maintenance with PowerShell and Bash, and championing data‑governance practices, while her solitary work style and cautious optimism help her mentor junior staff without the high‑stress pressure of
    large corporations.
  sports: Preferring low‑intensity activity, Judith Nerys joins the Riverside Birdwatching Walking Club for daily riverside strolls, casually cheers for the River City Mariners baseball team, and attends
    a weekly senior‑friendly yoga class to keep her flexibility after gardening.
  arts: An avid reader of historical fiction and true‑crime memoirs, Judith Nerys finds solace in the storytelling of Hilary Mantel and Ann Rule, while her evenings are often filled with the acoustic melodies
    of Joan Baez and The Milk Carton Kids, and she occasionally knits scarves inspired by the textile designs of Faith Ringgold.
  travel: Combining meticulous planning with a love for quiet escapes, Judith Nerys has explored the salmon‑rich streams of the Pacific Northwest on a solo road trip, and dreams of wandering the historic
    alleys of Seville, Spain, where she hopes to photograph the local markets and sample tapas in a relaxed, low‑key manner.
  culinary: An accomplished home cook, Judith Nerys blends the smoky heat of chipotle with freshly harvested garden tomatoes to create a signature chicken enchilada casserole, frequently prepares cilantro‑lime
    black‑bean soup and roasted corn salad with cotija cheese, and treats herself to a simple yet expertly seasoned grilled steak on weekend evenings.
  core: Judith Nerys balances a relentless curiosity for data architecture with a penchant for solitary puzzle‑solving, a lingering worry that fuels meticulous budgeting, and a habit of knitting scarves
    while listening to folk tunes to unwind from work‑day stress.
background:
  cultural: Judith is a Mexican‑American from Laredo, Texas, where bilingual Spanish‑English communication and cross‑border traditions are integral to daily life. She grew up attending Catholic services,
    celebrating Día de los Muertos with family altars, and participating in community festivals that showcase mariachi music and folklórico dance. Her cultural identity shapes her cooking, language use,
    and strong sense of community responsibility, even as she values solitude and personal privacy.
attributes:
  skills: '[''SQL Server'', ''Azure SQL Database'', ''Data Modeling'', ''Performance Tuning'', ''Backup and Recovery'', ''Data Security'', ''ETL Design'', ''PowerShell Scripting'', ''Disaster Recovery Planning'',
    ''Documentation'', ''Compliance (HIPAA, PCI)'', ''Cross‑Platform Migration'', ''Linux Administration'']'
  hobbies: '[''Vegetable gardening'', ''Historical fiction reading'', ''True‑crime memoirs'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Mexican folk music'', ''Cooking Tex‑Mex dishes'', ''Guided
    meditation'', ''Birdwatching'']'
  career_goals: Judith aims to transition from day‑to‑day administration to a senior database architect role where she can shape long‑term data strategies and mentor junior staff. She hopes to obtain a
    GED and additional certifications to formalize her knowledge, while also building a niche consulting practice that helps small businesses modernize their data infrastructure without the high‑stress
    demands of a corporate environment. Reducing manual workload through automation and championing data‑governance initiatives are top priorities.
