personas:
  professional: Dustin Ginzburg, a middle school tech enthusiast, blends his curiosity for Raspberry Pi robotics with the practical discipline of school science fairs, yet often shirks deadlines and prefers
    spontaneous tinkering over structured projects.
  sports: Dustin Ginzburg dominates the local Oakridge Middle School Cougars' junior football drills, plays shortstop for the Willow Creek Baseball Scrimmage League, rides with the Trailblazers biking club
    on Saturday mornings, roots for the hometown baseball team the Riverview Raptors, and values competition over teamwork, often challenging peers to sprint races after practice.
  arts: Dustin Ginzburg builds intricate LEGO sculptures inspired by artist Nathan Sawaya, creates pixel art in Minecraft after watching tutorials by YouTuber Grian, enjoys upbeat tracks from Imagine Dragons
    and Billie Eilish while coding robots, and occasionally sketches comic panels of his gaming adventures.
  travel: Dustin Ginzburg prefers spontaneous weekend road trips to nearby state parks like Greenridge Preserve for hiking and fishing, dreams of visiting Orlando’s Disney World for thrill rides, and maps
    out his next adventure on Google Earth while balancing family budget constraints and a yearning for epic fan conventions.
  culinary: Dustin Ginzburg favors pizza and chicken nuggets after soccer practice, experiments with homemade trail mix using pretzels, dried fruit, and chocolate chips, once proudly built a DIY s’mores
    kit for a camping night, and often forgets to brush away ketchup stains from his favorite blue t‑shirt.
  core: Dustin Ginzburg is a restless 12‑year‑old who channels competitive energy into robotics, sports, and gaming, juggling curiosity and impulsivity while occasionally losing track of organization and
    money.
background:
  cultural: Dustin grew up in Sylacauga, a small town in Coosa County, Alabama, where Southern hospitality, family gatherings, and community traditions such as the Alabama marble festival and high‑school
    football games are central to life. His family attends a local Baptist church, enjoys backyard barbecues and church potlucks, and often helps neighbors with yard work and small repairs. The surrounding
    outdoors—creeks for fishing, woods for biking, and the nearby marble quarries—have fostered a practical, hands‑on attitude, while the town’s emphasis on teamwork and friendly competition shapes his
    social outlook.
attributes:
  skills: '[''Scratch programming'', ''team sports (football, baseball)'', ''handyman basics'', ''LEGO building'', ''quick problem solving'', ''social communication'']'
