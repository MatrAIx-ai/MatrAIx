  career_goals: Although still in middle school, Dustin already dreams of making the varsity football team and eventually playing college football, with the long‑term ambition of a professional sports career.
    He also wants to study mechanical engineering so he can design sports equipment or practical tools for his community. In the near future, he hopes to take on a leadership role in his school’s robotics
    club and start a small summer lawn‑care or bike‑repair business to fund his hobby projects.
