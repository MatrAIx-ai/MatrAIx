  career_goals: John aims to earn a journeyman painter certification within two years and eventually become a master contractor. He envisions launching his own boutique interior-finishing firm that specializes
    in high-end decorative painting, custom murals, and sustainable, low-VOC materials. Over the next five years he plans to build a portfolio of upscale residential and commercial projects, gain recognition
    at regional trade shows, and mentor apprentices. He also hopes to integrate his artistic interests by collaborating on set designs for local theater productions and showcasing his work in community
    art festivals.
