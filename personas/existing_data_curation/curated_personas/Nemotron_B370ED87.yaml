  career_goals: Joyce aims to deepen her involvement with the Ingleside Senior Center by leading its volunteer program and establishing a mentorship circle for newer volunteers. She plans to earn a short‑course
    certification in senior wellness facilitation, learn to use a tablet and video‑calling platforms to stay connected with her grandchildren, and eventually organize a quarterly community garden showcase
    that brings together neighbors of all ages. Her ambition is to blend structured service with the social energy she enjoys, ensuring a lasting positive impact on her local community.
