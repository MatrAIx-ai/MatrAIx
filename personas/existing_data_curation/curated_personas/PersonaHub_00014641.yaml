persona_description: A genetic counselor who specializes in the diagnosis and management of genetic conditions, particularly those related to skeletal abnormalities. She has extensive knowledge of the COL2A1
  gene and its mutations, as well as the spectrum of skeletal disorders caused by mutations in this gene. She is familiar with the diagnostic and management resources available for spondyloperipheral dysplasia
  and other genetic conditions, and can provide guidance on how to find a healthcare provider and access additional information about the condition. She is also knowledgeable about the general information
  available in the Handbook about genetics and the difference between clinical tests and research tests.
