  career_goals: Although retired from formal employment, Sachin aims to remain intellectually active and socially influential. He plans to mentor undergraduate engineering students through local university
    outreach programs, volunteer as a technical advisor for non‑profit STEM initiatives, and lead a senior‑citizen speakers’ series at the El Dorado County community center. He also aspires to deepen his
    knowledge of digital art tools, curate a small exhibition of Indian contemporary artworks for a regional gallery, and author a memoir that intertwines his engineering experiences with the cultural journeys
    of his South Asian heritage.
