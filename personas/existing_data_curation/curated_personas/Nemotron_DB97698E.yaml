    fundamentals'', ''Mentoring and small-group training'', ''Process optimization for support workflows'']'
  hobbies: '[''Hiking in the Smoky Mountains'', ''Fly-fishing on the Clinch River'', ''Reading non-fiction (technology history, astrophysics, Civil War biographies)'', ''Building scale model trains'', ''Repairing
    vintage radios'', ''Listening to tech podcasts'', ''Participating in a small book club'', ''Home-brewing craft beer'']'
  career_goals: David aims to earn senior-level certifications such as CompTIA Security+, Cisco CCNA, and VMware VCP to qualify for a senior systems architect or IT manager role within his organization.
    He is motivated to lead a small, high-performing support team, implement proactive monitoring solutions, and streamline ticket resolution times by 20% over the next two years. Additionally, he wishes
    to author a series of technical articles on efficient troubleshooting methods for regional IT forums and eventually launch a part-time consulting practice focused on cybersecurity best practices for
    local small businesses.
