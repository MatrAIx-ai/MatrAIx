  hobbies: '[''Sailing'', ''Woodworking'', ''Classic Car Restoration'', ''Gardening'', ''Historical Non-fiction Reading'', ''Chess'', ''Volunteering for Cybersecurity Awareness Workshops'', ''Cooking Italian
    Cuisine'', ''Attending Live Music in Asbury Park'']'
  career_goals: Looking ahead, Travis aims to transition into a senior leadership role, such as Chief Information Security Officer or senior cybersecurity consultant, within the next five years. He is focused
    on building a legacy of robust, repeatable security processes that can be handed off smoothly as he approaches retirement. Travis plans to spearhead a regional cyber‑resilience initiative for Monmouth
    County, partnering with local businesses and government agencies to elevate security posture. He also aspires to become a recognized subject‑matter expert in threat intelligence, publish articles in
    industry journals, and speak at conferences, while continuing to mentor the next generation of security professionals.
