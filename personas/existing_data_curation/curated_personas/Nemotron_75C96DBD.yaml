  career_goals: Even as a toddler, Derrick’s curiosity and love of art shape a vivid picture of his future. He often points to picture books featuring firefighters, astronauts, and painters, expressing
    a desire to "be a fire‑man" or "make big pretty pictures." Influenced by his competitive nature, he imagines becoming a recognized artist whose work stands out. As he grows, he may be drawn to fields
    that blend creativity with problem‑solving, such as design, architecture, or community arts leadership, where he can explore new ideas and share his artistic vision with others.
