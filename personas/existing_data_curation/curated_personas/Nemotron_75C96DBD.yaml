personas:
  professional: Derrick Laster, a curious two-year-old who already shows a knack for pattern recognition during building‑block play, is on a fast‑track to become a future visual designer, and they use their
    natural organizational balance and competitive streak to meticulously arrange colors while staying flexible enough to experiment with unconventional shapes.
  sports: Derrick Laster, a toddler who adores the weekly tumble‑time gymnastics class at the local community center and cheers for the hometown baseball team, the Riverdale Reds, while using a mini‑basketball
    hoop at home to channel their competitive spirit, and they love scoring the most hoops before nap time.
  arts: Derrick Laster, a two-year-old who avidly watches Sesame Street and sings along to the Beatles’ "Yellow Submarine" on a toy keyboard, delights in finger‑painting with bright crayons, collects picture
    books by Dr. Seuss, and they find comfort in the vibrant art that fuels their curiosity.
  travel: Derrick Laster, a curious toddler who prefers short car rides over long flights, has already explored the sandy beaches of Florida’s Gulf Coast, marveled at the elephants at the San Diego Zoo,
    dreams of a future family vacation to Tokyo’s cherry‑blossom parks, and they always follow a parental itinerary peppered with frequent snack breaks.
  culinary: Derrick Laster, a picky eater with a love for creamy mac and cheese, banana slices, and crunchy carrot sticks, they can barely stir a pot of oatmeal with a wooden spoon but delight in building
    mini‑sandwiches with peanut butter and jelly, while politely refusing broccoli unless it’s hidden under cheese.
  core: Derrick Laster, an inquisitive two‑year‑old whose relentless curiosity is matched by frequent worries, a competitive streak, and a love for bright colors, they often oscillate between meticulous
    block‑building and sudden tantrums when faced with new strangers.
background:
  cultural: Derrick is raised in an African‑American family in Omaha, Nebraska. His parents weave the rich heritage of Black culture into daily life, sharing stories of the Great Migration, local civil‑rights
    milestones, and celebrating Juneteenth and Kwanzaa. He is exposed to a blend of traditional African rhythms, gospel music, and contemporary hip‑hop through family gatherings and community programs at
    the nearby African‑American cultural center. Weekend visits to the Omaha Community Playhouse and local art fairs introduce him to Black artists and visual storytelling. This cultural environment nurtures
    his appreciation for art, music, and community resilience, shaping his identity as a young Black child in the Midwest.
