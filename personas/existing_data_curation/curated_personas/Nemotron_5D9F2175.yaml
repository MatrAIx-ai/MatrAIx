personas:
  professional: Kathy Culler, a budding speech‑language pathologist completing their bachelor's degree, merges meticulous clinical assessment and evidence‑based treatment of articulation, language and voice
    disorders with an outgoing, group‑focused approach honed through volunteering at a community theater and church speech clubs, leveraging cultural competence in Southern dialects while balancing a preference
    for structured plans with the flexibility demanded by a dynamic clinic.
  sports: Kathy Culler hits the Appalachian foothills on weekends as a member of the Alabama Appalachian Hiking Club, cheers on the Alabama Crimson Tide football team and follows the Birmingham Barons minor‑league
    baseball squad, while also playing casual co‑ed soccer in a local recreation league and practicing yoga for stress relief, blending competitive fandom with community‑based fitness.
  arts: Kathy Culler’s artistic life centers on volunteering at a community theater for children’s speech workshops, belting out country‑rock hits by Chris Stapleton and Kacey Musgraves at karaoke nights,
    strumming acoustic covers of John Mayer and Dolly Parton on guitar, and curating playlists that feature the soulful storytelling of the Avett Brothers, reflecting a deep connection to Southern musical
    heritage and performance.
  travel: Kathy Culler enjoys short road trips to Asheville, North Carolina and the historic district of Savannah, Georgia, has visited Washington, D.C. for a congressional tour, dreams of exploring the
    music scene of Nashville, Tennessee, and hopes to someday trek the Scottish Highlands, all while planning trips on a modest budget that balances weekend getaways with their student finances.
  culinary: Kathy Culler bakes classic Southern desserts such as peach cobbler, pecan pie, and banana pudding with a knack for perfecting flaky crusts using butter, brown sugar and a splash of bourbon vanilla,
    while also experimenting with homemade biscuits and collard greens, though they sometimes over‑bake the edges when caught up in conversation or a rush to host friends.
  core: Kathy Culler is a socially vibrant, structure‑loving future speech‑language pathologist who balances meticulous clinical ambition with a habit of spontaneous splurges, stress‑induced worry, and
    a penchant for baking, hiking, and karaoke.
background:
  cultural: Kathy grew up in Arab, Alabama, a small town steeped in Southern hospitality and tight‑knit community values. Her family’s heritage traces back to German and Scotch‑Irish settlers common in
    Cullman County, and she was raised in a Southern Baptist environment that emphasized service, fellowship, and faith. Local traditions—such as the annual Cullman County Fair, high‑school football games,
    and church potlucks—shaped her appreciation for community gatherings and collaborative effort. The region’s cuisine, especially comfort foods like fried chicken, biscuits, and peach cobbler, features
    prominently in her family meals, reinforcing a strong connection to her Southern roots.
attributes:
  skills: '["Articulation and phonology assessment", "Language development intervention", "Stuttering therapy", "Voice hygiene counseling", "AAC device training", "Dysphagia screening", "Evidence‑based
    treatment planning", "Group therapy facilitation", "Interdisciplinary collaboration", "Telepractice platform navigation", "Documentation and EMR management", "Cultural competence with Southern dialects"]'
  hobbies: '["Community theater volunteering", "Church speech clubs for children", "Hiking in the Appalachian foothills", "Yoga and mindfulness practice", "Baking Southern desserts", "Attending country‑rock
    concerts", "Karaoke and acoustic guitar playing", "Journaling", "Crochet and craft projects"]'
  career_goals: Kathy aims to complete her master’s degree in Speech‑Language Pathology and attain CCC‑SLP certification within the next year. She is driven to specialize in pediatric autism spectrum disorders,
    developing early‑intervention programs for rural Alabama communities. Long‑term, she envisions establishing a private clinic that offers both in‑person and telehealth services, while also mentoring
    future SLP students as an adjunct faculty member at a regional university. Kathy hopes to become an advocate for speech‑language services in school settings, influencing policy to ensure equitable access
    for underserved children.
