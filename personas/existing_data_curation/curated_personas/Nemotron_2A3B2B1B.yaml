personas:
  professional: Charles Rahbar is a 23‑year‑old welder who combines MIG, TIG, and stick expertise with a hands‑on, routine‑driven mindset, leading small teams on shop floor projects while relying on tried‑and‑true
    methods and stepping in to troubleshoot defects on the fly, all while quietly eyeing the AWS Certified Welder badge and local competition trophies.
  sports: Charles Rahbar follows the Tennessee Titans and Nashville Predators, participates in a local fishing club that meets at Percy Priest Lake each spring, and maintains a modest fitness routine at
    the community center’s weight room, preferring solitary treadmill runs and occasional pickup basketball games that let him stay active without the pressure of large crowds.
  arts: Charles Rahbar channels his love of classic rock into evenings of Led Zeppelin and Lynyrd Skynyrd while meticulously assembling scale model kits of 1960s Mustangs and WWII fighter planes, and attends
    intimate performances at a downtown acoustic bar, finding solace in the precise craftsmanship of both music and miniature reproductions.
  travel: Charles Rahbar prefers road‑trip adventures that balance nostalgia and relaxation, having driven to the Great Smoky Mountains for weekend hikes, visited Detroit for the annual classic car show,
    and planning a future pilgrimage to the German village of Rothenburg to trace his family’s immigrant roots.
  culinary: Charles Rahbar’s palate favors Southern comfort foods like smoked brisket, fried catfish, and barbecue ribs, and he enjoys cooking simple dishes such as bourbon‑glazed pork chops and skillet‑fried
    green beans, often seasoning with smoked paprika and hickory chips while occasionally experimenting with homemade jerky.
  core: Charles Rahbar is a routine‑loving, anxiety‑prone welder who finds calm in solitary hands‑on projects, competitive welding contests, and classic rock, yet sometimes lets disorganization and emotional
    reactivity hijack his planning.
background:
  cultural: Charles was born and raised in Mount Juliet, a suburban community in Rutherford County, Tennessee. His family traces its roots to English and German immigrants who settled in the South generations
    ago, and they have long been part of the region’s working‑class fabric. Growing up in a modest, predominantly Christian household, he was taught the value of hard work, self‑reliance, and respect for
    tradition. The local culture, with its emphasis on community gatherings, outdoor recreation, and a strong manufacturing presence, shaped his practical outlook and guided him toward a trade career in
    welding.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''SMAW (stick) welding'', ''Brazing'', ''Electronic soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Pipe fitting'', ''Welding equipment maintenance'',
    ''OSHA safety compliance'', ''Troubleshooting welding defects'', ''Basic CNC operation'']'
  hobbies: '[''Scale model kit building'', ''Woodworking'', ''Fishing'', ''Vintage motorcycle restoration'', ''Listening to classic rock music'', ''Reading technical manuals'', ''Strategy video games'',
    ''Small maker‑space meet‑ups'']'
  career_goals: Charles aims to become a certified journeyman welder and eventually secure a supervisory position in a reputable fabrication shop. He plans to earn his AWS Certified Welder credential and
    complete an apprenticeship that will enable him to lead small teams on routine production projects. Long‑term, he hopes to open his own modest welding and metal‑repair business, where he can apply his
    practical skills and maintain a predictable work environment that helps manage his anxiety. He is also motivated to win local welding competitions and be recognized as the top welder in his county.
