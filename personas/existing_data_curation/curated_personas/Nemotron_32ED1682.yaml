personas:
  professional: Juan Hicks is an inventive middle‑schooler who dreams of becoming a robotics engineer, merging their love for LEGO's programmable creations with a methodical, organized approach to problem‑solving,
    and they habitually sketch circuit diagrams in their notebook.
  sports: Juan Hicks kicks off each weekend with River Valley Soccer Club’s U‑11 squad, practicing drills inspired by FC Barcelona’s possession style while they cheer for the senior squad on television
    and swap soccer trading cards with friends.
  arts: Juan Hicks spends afternoons playing piano pieces by Ludovico Einaudi, loses themselves in sci‑fi classics like Asimov’s Foundation, and they design LEGO art installations that echo the futuristic
    aesthetics of artists such as James Turrell, all of which fuel their imagination for future inventions.
  travel: Juan Hicks loves weekend hikes along nearby forest paths, has captured the geysers of Yellowstone on a family photo album, and they dream of exploring the ancient streets of Barcelona and the
    neon districts of Tokyo on a future school field trip, balancing a careful itinerary with the excitement of spontaneous discovery.
  culinary: Juan Hicks hones their culinary chops by chopping fresh tomatoes, stirring saffron‑infused rice for paella, and whisking chilled gazpacho with crisp cucumbers, and they proudly claim a budding
    talent for balancing bold flavors with the precision of their LEGO‑inspired building mindset.
  core: Juan Hicks is a methodical LEGO mechanic who playlists Hans Zimmer while scouting forest treasures, multitasks piano practice with paella prep, and they occasionally forget to ask for an extra napkin
    at dinner because they’re too focused on the next invention.
background:
  cultural: Juan grows up in a Spanish‑heritage household in Salem, Virginia. His parents maintain Spanish traditions, speak Spanish at home, celebrate holidays such as Día de los Reyes and Semana Santa,
    and serve Mediterranean cuisine regularly. He attends a local public school where he participates in multicultural events and is proud of his bilingual identity. The blend of Spanish cultural values
    like family cohesion, respect for tradition, and a love of community, alongside American influences, shapes his worldview and daily life.
