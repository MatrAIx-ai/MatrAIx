  career_goals: At 92, his ambitions center on preserving his family's cultural heritage, sharing his life stories with younger generations, staying physically active and socially engaged, mentoring his
    grandchildren, helping to organize Chinese New Year celebrations at the local senior center, and eventually recording his memoirs for future family members.
