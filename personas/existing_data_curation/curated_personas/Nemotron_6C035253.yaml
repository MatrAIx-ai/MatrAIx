personas:
  professional: Kevin Linda, a veteran landscape supervisor with three decades of hands‑on experience, blends meticulous design of low‑maintenance native plantings with pragmatic crew management, using
    their humanities background to craft clear reports and champion safety while quietly pushing for sustainable practices.
  sports: Kevin Linda enjoys early morning fishing on Lake Minnetonka, weekend hikes along the Chain of Lakes trails, and cheerfully follows the Minnesota Twins and Vikings while belonging to a local walking
    club that meets every Saturday for a 5‑mile trek.
  arts: Kevin Linda finds solace at folk‑music festivals featuring artists like Joan Baez and Gregory Alan Isakov, spends evenings woodworking small furniture pieces to the sound of Neil Young, and devours
    historical fiction by Hilary Mantel, letting the narratives shape their appreciation of regional heritage.
  travel: Kevin Linda prefers road trips that combine nature and history, having driven to Itasca State Park to stand at the headwaters of the Mississippi, exploring the historic streets of St. Paul, and
    dreaming of a summer sailing adventure on the Canadian Shield’s expansive lakes.
  culinary: Kevin Linda delights in harvesting heirloom tomatoes, rainbow carrots, and sweet corn from their garden to create fresh garden salads, tangy pickles, and hearty stew, while occasionally treating
    themselves to a pan‑seared trout caught on the lake, seasoned with dill and lemon, showcasing a solid but not gourmet level of cooking skill.
  core: Kevin Linda, a structured yet easy‑going horticultural veteran, rises at sunrise to tend heirloom vegetables, mentors crews with gentle authority, and balances a love for history with spontaneous
    fishing trips to clear their mind.
background:
  cultural: Kevin grew up in a suburban neighborhood of Minneapolis in a family of Norwegian‑German descent. Raised in a Lutheran household, he carries Midwestern values of hard work, modesty, and community
    service. The region’s strong outdoor culture—lake recreation, hunting, and the tradition of caring for land—shaped his appreciation for nature. He participates in local traditions such as the Minnesota
    State Fair, summer porch concerts, and community clean‑up events, reflecting a blend of Scandinavian heritage and the diverse urban influences of the Twin Cities.
attributes:
  skills: '[''Landscape design'', ''Horticultural knowledge'', ''Irrigation system installation'', ''Pesticide application'', ''Equipment maintenance'', ''Crew scheduling'', ''Budget management'', ''Safety
    compliance'', ''Conflict resolution'', ''Client communication'', ''Report writing'', ''Community outreach'', ''Historical site preservation'']'
  hobbies: '[''Home gardening'', ''Fishing'', ''Hiking'', ''Historical society involvement'', ''Reading historical fiction'', ''Attending folk music festivals'', ''Woodworking'']'
  career_goals: Kevin aims to lead his company toward more sustainable practices by increasing the use of native species and water‑wise irrigation, and he plans to earn the Certified Landscape Professional
    (CLP) credential within the next two years. He wants to develop a formal mentorship program for younger crew members and launch a safety‑first initiative that reduces workplace incidents. Looking ahead
    to retirement, he hopes to transition into a consulting role focused on historic park stewardship and volunteer as a mentor for the local horticultural society.
