personas:
  professional: Pedro Sanmartin is a 21‑year‑old truck driver and sales associate who blends defensive driving expertise, bilingual customer service, and meticulous record‑keeping to ensure on‑time deliveries,
    and they aim to earn a CDL and advanced logistics certifications.
  sports: Pedro Sanmartin cuts loose on weekends playing forward for a local Chicago recreational soccer league, follows the Chicago Fire FC with fervor, and they keep a routine of early‑morning runs while
    occasionally cheering on the Cubs at Wrigley Field.
  arts: Pedro Sanmartin unwinds by streaming Los Tigres del Norte and Bad Bunny, attending the annual Fiesta Mexicana where they dance to cumbia rhythms, and they maintain a small collection of vintage
    vinyl that fuels their occasional DJ mixes for friends.
  travel: Pedro Sanmartin embraces budget‑friendly weekend road trips, mapping out scenic drives to Chicago’s Pilsen and Logan Square neighborhoods before saving for a longer haul to Austin and a future
    culinary pilgrimage to Mexico City, and they balance spontaneity with careful planning to stretch their modest savings.
  culinary: Pedro Sanmartin, a confident home cook, masters tacos al pastor with pineapple, chipotle‑laden mole rojo, and fresh cilantro, often pairing meals with avocado slices and hand‑pressed corn tortillas,
    and they proudly host weekly dinner gatherings where friends sample their experimental salsa verde.
  core: Pedro Sanmartin blends a pragmatic drive for structure with a love for communal music and food, juggling early‑morning routes with late‑night soccer matches, and they can’t resist a fresh batch
    of tacos after a long haul, even if it means staying up past their usual bedtime.
background:
  cultural: Pedro grew up in a Mexican immigrant household in Chicago’s Pilsen neighborhood, where Spanish was spoken at home and Mexican traditions were celebrated. He participates in cultural observances
    such as Día de los Muertos and Mexican Independence Day, maintains close ties with extended family, and values the community’s emphasis on hospitality, respect, and solidarity. His bicultural experience
    shapes his worldview, fostering a blend of Mexican cultural pride and adaptation to the urban environment of Chicago.
