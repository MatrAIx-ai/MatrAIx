  career_goals: Pedro aims to obtain his Commercial Driver’s License (CDL) and pursue advanced certifications in hazardous-material handling and logistics management within the next two years. He plans
    to complete his high-school equivalency (GED) to strengthen his qualifications. In the longer term, he aspires to advance to a fleet supervisor or logistics coordinator role, and eventually launch his
    own small trucking business focused on serving local Mexican community retailers. He also hopes to develop mentorship skills to help other young drivers from immigrant backgrounds.
