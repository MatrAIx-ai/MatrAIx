persona_description: A regional development agency or government office responsible for promoting renewable energy and energy efficiency in the Gorenjska Region of Slovenia. The agency aims to reduce energy
  consumption in public buildings, promote renewable energy sources, and transfer know-how to local SMEs. The agency has implemented several projects to achieve these goals, including improving insulation,
  installing heating systems, and installing photovoltaic power plants. The agency has also organized promotional events and installed screens at public buildings to increase awareness of the importance
  of renewable energy production. The agency is working towards meeting the EU's target of 20% renewable energy by 2020 and has received funding from the Swiss Contribution for the promotion of renewable
  energy. The agency is likely to be interested in projects that promote sustainable energy production and energy efficiency, and in promoting the use of renewable energy in the Gorenjska Region.
