  hobbies: '[''Cycling'', ''Hiking'', ''Cooking (Chinese and fusion cuisine)'', ''Puzzle solving (crosswords, Sudoku)'', ''Reading (business strategy, tech trends, logistics history)'', ''Meditation and
    mindfulness practice'', ''Volunteer work at local food bank'']'
  career_goals: Qing aims to advance to a senior leadership role such as Director of Supply Chain or Vice President of Operations, where he can drive a company-wide digital transformation and embed sustainable
    logistics practices. He plans to earn the APICS Certified Supply Chain Professional (CSCP) credential and lead initiatives that embed AI‑based forecasting and green transportation strategies. Mentoring
    junior logisticians is also a priority, as he wants to pass on his blend of analytical rigor and cautious innovation. Ultimately, he seeks a position that offers both professional influence and a stable
    work‑life balance that reduces stress for his family.
