personas:
  professional: John Demarco, a 40-year-old Charleston police patrol officer, blends their practical investigative skill set with a sociable, talkative style to excel in community de‑escalation, mentor
    junior officers, and pursue a promotion to sergeant while championing a mental‑health crisis response program.
  sports: John Demarco, a 40-year-old police sergeant‑in‑training, is a regular at Charleston High School football games, roots for the West Virginia Mountaineers, participates in a weekend amateur softball
    league with fellow officers, and spends Saturday mornings fishing the Kanawha River while tackling sections of the Appalachian Trail for fitness.
  arts: John Demarco, a 40-year-old policeman, strums an old acoustic guitar in a local bluegrass jam, belts out karaoke hits from Garth Brooks to Dolly Parton, and devours detective novels by Agatha Christie,
    Michael Connelly, and Tana French, weaving these artistic outlets into their community‑centered identity.
  travel: John Demarco, a 40-year-old officer, enjoys spontaneous weekend getaways to Shenandoah and the Great Smoky Mountains for hiking and camping, has already visited New Orleans for its live jazz and
    creole BBQ, and balances a modest travel budget with family commitments while longing to tour historic Civil War sites in Virginia.
  culinary: John Demarco, a 40-year-old law‑enforcement professional, masters charcoal‑smoked pork ribs with a bourbon‑glaze and hickory chips, regularly grills river‑caught catfish, and while their culinary
    skill sits at confident home‑chef level, they often over‑sauce dishes and accompany meals with cold beers, delighting friends and family at backyard gatherings.
  core: John Demarco, a 40-year-old Charleston officer, balances a structured police career with a gregarious, outdoors‑loving lifestyle, often juggling community duties, bluegrass jam sessions, and spontaneous
    BBQ cook‑outs, all while occasionally slipping into disorganized spending and a love for vintage motorcycles.
background:
  cultural: John grew up in a small-town community in the heart of West Virginia's Appalachian region. His family has deep roots in the coal-mining and farming traditions that shape the area's work ethic
    and close-knit social bonds. He was raised with a strong emphasis on self-reliance, church attendance (Methodist), and community service, values that continue to influence his approach as a police officer.
    The local culture of storytelling, bluegrass music, and outdoor recreation informs his hobbies and his commitment to preserving harmony and safety in Charleston.
