  career_goals: John aims to move up the department hierarchy, seeking promotion to Sergeant within the next three years, then to Lieutenant. He wants to spearhead a community-policing initiative that strengthens
    relationships between the police and Charleston neighborhoods, especially focusing on mental-health crisis response. He also plans to complete his GED and enroll in a community-college criminal-justice
    program to broaden his theoretical knowledge. Long-term, he envisions becoming a certified police trainer, teaching de-escalation, cultural competence, and wellness strategies to officers statewide.
