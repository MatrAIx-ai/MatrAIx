persona_description: A journalist who specializes in education and social justice issues. The person is passionate about uncovering and addressing systemic racism and profiling in the education system,
  particularly with regards to racial disparities in school discipline and outcomes. They are dedicated to reporting on the impact of racial profiling on minority students, particularly those from Hispanic
  and African American backgrounds, and are committed to advocating for policies and practices that promote equity and justice in education. They are also interested in exploring the psychological and emotional
  effects of racial profiling on students and their families, and how these experiences can contribute to the cycle of poverty and disadvantage.
