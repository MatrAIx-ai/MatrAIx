personas:
  professional: Jessica Meegan, a 59‑year‑old salon owner and master stylist, combines three decades of precision cutting, advanced balayage, and corrective coloring with a methodical, data‑driven approach
    to inventory, scheduling, and staff mentorship, and they maintain a calm, resilient business environment that consistently exceeds client expectations.
  sports: Jessica Meegan, a 59‑year‑old outdoor enthusiast, regularly hikes the Lake Winnebago trails with the Stevens Point Trail Runners club, plays casual doubles at the local women's tennis club, and
    passionately supports the Green Bay Packers, Milwaukee Brewers, and Milwaukee Bucks during the respective seasons, and they treat each workout as both a social outing and a personal challenge.
  arts: Jessica Meegan, an avid reader of contemporary fiction and memoirs by authors such as Ann Patchett and Tara Westover, channels the candid storytelling style of photographer Annie Leibovitz into
    their own portfolio, while they also attend local theater productions featuring plays by August Wilson and listen to folk‑rock musician Sufjan Stevens during creative breaks.
  travel: Jessica Meegan prefers meticulously planned road trips that combine scenic hikes and cultural stops, having already explored the historic charm of Prague, the vineyards of Napa Valley, and the
    lakeside serenity of Mackinac Island, while they dream of an eco‑focused adventure through the Swedish archipelago once their retirement fund is secured.
  culinary: Jessica Meegan, an enthusiastic home baker, perfects classic Wisconsin butter pie and tangy rhubarb crisp using locally sourced berries, while they frequently season their signature vegetable
    quinoa salads with garden‑grown basil, thyme, and roasted heirloom tomatoes.
  core: Jessica Meegan, a methodical yet outgoing salon veteran, balances an unquenchable curiosity for new hair trends with a competitive, skeptical edge, and they calmly hoard spare color swatches in
    a locked cabinet while rarely letting stress show.
background:
  cultural: Jessica was raised in a mid‑western white family with deep roots in Wisconsin’s German‑Scandinavian heritage, instilling values of hard work, reliability, and community service. Growing up in
    a small town near Stevens Point, she absorbed the region’s pragmatic outlook and friendly demeanor, which continue to influence her professional style and personal life. Her background includes participation
    in church‑linked socials, local festivals such as the Stevens Point Riverfest, and a strong connection to the University of Wisconsin–Stevens Point’s cultural events. These experiences have fostered
    an appreciation for regional traditions, a respect for sustainable living, and an emphasis on building lasting relationships within her community.
