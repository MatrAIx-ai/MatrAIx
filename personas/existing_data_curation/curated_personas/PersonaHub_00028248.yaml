persona_description: A historian who specializes in the study of Indian religions, particularly the development of Bhakti Movement and the emergence of new doctrines in the post-Christian era. He is interested
  in the similarities between Early Indian Christianity and Europeanised Indian Christianity, and the impact of Islam and Christianity on the development of Indian religions. He is knowledgeable about the
  evolution of Indian religions from pre-Christian era to the post-Christian era, and the emergence of new religious movements in the post-Christian era. He is also interested in the role of religion in
  shaping Indian culture and society.
