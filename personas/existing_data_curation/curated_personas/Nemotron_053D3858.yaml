  hobbies: '["Visiting art galleries and mural tours", "Photography", "Recreational soccer", "Cooking Mexican and fusion cuisine", "Attending live music events", "Participating in block parties and trivia
    nights", "Collecting vintage vinyl records", "DIY home improvement projects"]'
  career_goals: David aims to move into a supervisory role, such as shift supervisor or warehouse manager, within the next few years. He plans to obtain formal certifications in supply chain management
    and forklift safety to strengthen his qualifications. He wants to lead process‑improvement initiatives that reduce errors and increase efficiency, mentor new hires, and eventually explore opportunities
    that blend his logistics expertise with his passion for art, such as managing shipments for local galleries or starting a boutique logistics consulting service for creative businesses.
