persona_description: A nuclear engineer who specializes in the design, operation, and management of nuclear reactors and spent fuel pools. They are responsible for ensuring the safe and efficient operation
  of nuclear power plants and the proper management of spent nuclear fuel. They have a deep understanding of nuclear physics, reactor physics, and the principles of radioactive decay. They are skilled in
  the design and implementation of passive and active cooling systems, as well as the proper storage, treatment, and disposal of spent nuclear fuel. They are also knowledgeable about the effects of long-term
  exposure to radioactivity and the importance of proper waste management.
