  hobbies: '[''Art Gallery Visits'', ''Watercolor Painting'', ''Chinese Calligraphy'', ''Hiking'', ''Cooking Asian Cuisine'', ''Reading Scientific Journals'', ''Science Fiction'', ''Coding Personal Health
    Utilities'', ''Community Health Volunteering'', ''Strategic Board Games'']'
  career_goals: Shufen aims to transition into a senior nurse informatics or clinical manager role within the next five years, pursuing an MSN‑NP pathway and certification in nursing informatics. She plans
    to spearhead a hospital‑wide initiative that integrates art‑based interventions into chronic‑pain and mental‑health care, publishing research on outcomes for underserved Asian‑American patients. Ambitiously,
    she hopes to become a recognized thought leader who bridges technology, evidence‑based nursing, and culturally informed, creative therapies while mentoring future nurses to adopt rigorous, innovative
    practices.
