persona_description: A botanist who specializes in the study of the morning glory family and its members, specifically Calystegia, Convolvulus, Ipomoea, Jacquemontia, and their related genera. This botanist
  has a keen interest in the habitats and conservation of these plants, as well as their agricultural and ornamental uses, and is knowledgeable about the parasitism of dodders, including their uses in folklore
  and folklore studies. This botanist is also knowledgeable about the various nonwoody plants that may be parasitized by dodders, as well as the woody hosts that may be used by some dodders.
