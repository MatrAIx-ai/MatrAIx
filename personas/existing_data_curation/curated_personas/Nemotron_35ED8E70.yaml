personas:
  professional: Andrew Pino is a seasoned handyman who leverages their carpentry, automotive restoration, and basic business administration skills to launch a flexible side venture offering home‑improvement
    and small‑scale renovation services while coordinating community workshops on DIY repairs, reflecting their blend of curiosity and pragmatic problem‑solving.
  sports: Andrew Pino stays active by hiking the Kettle Moraine State Forest trails, playing weekend pickup softball with their community fire department, cheering for the Milwaukee Brewers and Milwaukee
    Bucks, and they maintain a membership in the local cycling club that rides the scenic routes around Lake Michigan during the summer.
  arts: Andrew Pino channels their creative side through landscape photography inspired by Ansel Adams, enjoys folk and rock classics like Bob Dylan and Johnny Cash, attends performances at the Pabst Theater
    and the Milwaukee Symphony Orchestra, and they participate in improv workshops that let them blend storytelling with their hands‑on problem‑solving mindset.
  travel: Andrew Pino favors road‑trip adventures that combine nature and small‑town charm, having explored Door County’s orchards, the Upper Peninsula’s waterfalls, and a weekend getaway to Asheville,
    North Carolina, while they dream of a future drive along the Canadian Rockies to capture sunrise photos from the mountain passes.
  culinary: Andrew Pino loves cooking hearty Midwestern fare such as bratwurst with sauerkraut, fish fries featuring perch, and cheese‑curd snacks, often seasoning with smoked paprika, fresh thyme, and
    honey mustard, and they regularly harvest vegetables from their community garden to add to their weekend family barbecues.
  core: Andrew Pino blends a pragmatic Midwestern work ethic with a restless curiosity, turning hands‑on projects into community‑focused ventures while carving out time for solitary crafts, family gatherings,
    and occasional indulgences, and they remain grounded by their cooperative spirit.
background:
  cultural: Andrew was raised in suburban Waukesha County, an area shaped by German, Polish, and broader Northern European immigration. His family maintains modest Midwestern traditions such as seasonal
    barbecues, church gatherings, and community service through the local volunteer fire department. He grew up valuing pragmatism, self‑reliance, neighborliness, and a cooperative spirit, hallmarks of
    the regional culture. While respecting these roots, his curiosity has led him to explore new ideas, from DIY technology projects to cultural events in Milwaukee’s diverse neighborhoods, blending tradition
    with openness to innovation.
