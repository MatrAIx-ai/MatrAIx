  career_goals: Andrew aims to turn his practical abilities into a flexible side business offering home‑improvement and small‑scale renovation services, allowing him to work on his own schedule. He plans
    to complete his bachelor’s degree in Business Management or obtain a certified trades qualification to formalize his expertise. Additionally, he seeks to expand his role as a community organizer, leading
    workshops that teach basic home repair and DIY skills to neighbors, especially younger families. His long‑term ambition is to contribute to neighborhood revitalization projects in Milwaukee and Waukesha
    County while maintaining a balanced life that accommodates family time and personal interests.
