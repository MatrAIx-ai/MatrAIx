  hobbies: '[''abstract painting'', ''industrial photography'', ''custom metalworking and fabrication'', ''DIY electronics projects'', ''improv theater and open-mic performances'', ''community mechanics
    workshops for youth'', ''gardening'', ''reading speculative fiction and philosophy'', ''tabletop role-playing games'']'
  career_goals: Looking ahead, Tucker aims to transition from a shop floor specialist to a recognized leader in sustainable heavy-vehicle solutions. He plans to earn EPA 609 certification and obtain advanced
    training in hybrid and electric drivetrain conversions, positioning himself as a consultant for municipal transit agencies seeking greener fleet upgrades. Over the next five years, he hopes to open
    a boutique garage that balances high-quality diesel service with creative eco-retrofit projects, offering a workspace where apprentices can learn both technical skills and innovative thinking. Tucker
    also aspires to develop a community outreach program that teaches high-school students the trade, fostering a supportive network that reflects his compassionate nature. Ultimately, he envisions his
    shop becoming a hub for collaborative problem-solving, where technical excellence and artistic curiosity intersect.
