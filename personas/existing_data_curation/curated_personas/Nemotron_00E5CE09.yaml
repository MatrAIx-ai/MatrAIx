  career_goals: Now retired, Jeff’s primary ambition is to remain intellectually engaged and to give back to his community. He aims to document oral histories of longtime De Pere residents for the local
    historical society, and to compile a memoir that captures the region’s social and economic changes over his lifetime. He also hopes to mentor a few emerging volunteers at the community center, offering
    hands‑on guidance with home‑maintenance projects. Maintaining good health to continue fishing trips on the Fox River and to attend family gatherings is another personal goal. A modest travel ambition
    includes visiting nearby Great Lakes coastal towns he has long read about.
