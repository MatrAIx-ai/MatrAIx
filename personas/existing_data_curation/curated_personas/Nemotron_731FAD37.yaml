  career_goals: Looking ahead, Arnold wants to shift from day-to-day coding toward a technology-leadership role where he can shape architectural direction, champion inclusive development practices, and
    mentor the next generation of engineers. He is exploring part-time teaching at a community college, leading open-source projects that deliver low-cost digital tools to local nonprofits, and eventually
    co-founding a social-impact consultancy that helps small businesses adopt cloud solutions responsibly.
