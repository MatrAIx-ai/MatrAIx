personas:
  professional: Shonteka Jones, a retired mechanical engineer with PMP certification and a reputation for skeptical, data‑driven decision‑making, channels their methodical mindset into mentoring aspiring
    engineers, leading community STEM workshops, and authoring a practical guide on navigating late‑career STEM pathways, while they insist on evidence‑based approaches to every project.
  sports: Shonteka Jones, driven by competition and routine, participates in senior tennis leagues at the local community center, follows the New York Knicks with a strategic eye, and they log daily brisk
    walks through the Tioga State Forest, treating each workout as a precisely timed project.
  arts: Shonteka Jones, who balances analytical curiosity with creative appreciation, regularly attends jazz performances featuring Nina Simone, enjoys regional productions of August Wilson plays, and they
    curate a small Impressionist print collection, often researching the historical context before each visit.
  travel: Shonteka Jones, preferring meticulously planned itineraries, recently toured Savannah’s historic districts and Washington, D.C.’s cherry blossoms, and they dream of an AI conference in Tokyo,
    balancing cultural immersion with a comfortable pace suited to their age and structured travel style.
  culinary: Shonteka Jones, a competitive home chef, blends Southern comfort staples like collard greens with smoked turkey and experimental flavors such as miso‑glazed carrots, harvests fresh herbs from
    their garden to perfect a quinoa‑sweet‑potato pilaf, and they meticulously record each recipe adjustment in a data‑styled logbook.
  core: Shonteka Jones is a structured, competitive retiree who applies engineering precision to community mentorship, disciplined finances, proactive health monitoring, and a garden‑to‑table culinary hobby,
    all underscored by a skeptical eye for unproven claims and a penchant for over‑planning, and they thrive on turning complex challenges into organized solutions.
background:
  cultural: Shonteka is an African‑American woman whose family roots trace back to the Southern United States, with a strong heritage of church involvement and community activism. Growing up during the
    civil‑rights era, she internalized the value of education as a pathway to advancement. In Vestal, she remains connected to her cultural identity through participation in local African‑American cultural
    festivals, celebrating Juneteenth, and sharing family recipes. Her experiences as a Black professional in STEM have shaped her commitment to mentorship and advocacy for diversity in science and engineering.
attributes:
  skills: '[''Mechanical Engineering'', ''Statistical Data Analysis'', ''Project Management (PMP)'', ''Technical Writing'', ''Process Optimization'', ''Grant Writing'', ''STEM Mentorship'']'
  hobbies: '[''Gardening'', ''Chess'', ''Crossword Puzzles'', ''Sudoku'', ''Volunteer STEM Workshop Coordination'', ''Cooking'', ''Walking/Hiking'', ''Attending Cultural Events'']'
  career_goals: Although retired from formal employment, Shonteka aims to leverage her expertise to empower the next generation of engineers, especially those from underrepresented backgrounds. She plans
    to mentor high‑school and college students through local STEM outreach programs, serve on the board of a regional nonprofit focused on science education, and author a practical guide on navigating STEM
    careers later in life. Additionally, she hopes to stay current with emerging technologies like artificial intelligence, complete advanced coursework in data science, and contribute her analytical skills
    to community environmental projects in the Tioga region.
