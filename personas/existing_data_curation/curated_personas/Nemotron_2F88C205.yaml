  hobbies: '[''Reading science fiction and popular science'', ''Building model kits (airplanes, cars, robotics)'', ''Journaling project notes and reflections'', ''Hiking and trail navigation'', ''Birdwatching
    and nature observation'', ''Participating in 4‑H projects'', ''Playing chess'']'
  career_goals: Catherine aspires to pursue a career in engineering, with a particular interest in environmental and sustainable design. She aims to attend a high‑performing STEM high school, secure scholarships
    for advanced coursework, and eventually study mechanical or civil engineering at a research‑intensive university. Her long‑term ambition is to develop renewable‑energy solutions and resilient infrastructure
    for rural communities like Twin Rocks, blending her curiosity about new technologies with a practical commitment to improving her hometown’s environmental footprint. She also hopes to lead a future
    4‑H or community engineering mentorship program, encouraging other young students to embrace systematic, hands‑on problem solving.
