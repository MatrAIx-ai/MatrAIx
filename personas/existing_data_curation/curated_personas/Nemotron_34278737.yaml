  hobbies: '[''Vintage automobile restoration'',''Woodworking'',''Gardening'',''Bowling league participation'',''Reading mechanics and equipment magazines'',''Grilling and cooking'',''Fishing on local lakes'',''Church
    youth outreach volunteering'']'
  career_goals: Tamara aims to transition into a senior equipment supervisor role where she can oversee multiple machines and coordinate crew schedules. She plans to earn a crane operator certification
    and complete a bachelor's degree in construction management within the next five years. Long‑term, she hopes to launch a small equipment‑rental and maintenance business that emphasizes safety training
    for female operators, positioning herself as a recognized leader in her field while maintaining a better work‑life balance for her family.
