personas:
  professional: Jeneen Clark, a dedicated nursing assistant with over two decades of hands‑on clinical experience in a rural health setting, leverages her practical curiosity and competitive drive to mentor
    new aides, streamline bedside workflows, and pursue LPN certification to gain greater autonomy and lead quality‑improvement projects on patient safety, even though they sometimes struggle with organization
    and spontaneous task juggling.
  sports: Jeneen Clark, an avid weekend hiker along the Potomac River trail, joins a local walking club, follows the Washington Capitals and Washington Football Team, and in the fall participates in a senior‑friendly
    pickleball league, all while they relish the quiet of nature over crowded stadiums.
  arts: Jeneen Clark, who unwinds by crocheting blankets for the senior center, draws inspiration from folk singer Joan Baez, delights in the medical mystery novels of Tess Gerritsen, and occasionally attends
    community theater productions featuring local playwrights, which they find balances their critical mind with creative expression.
  travel: Jeneen Clark, a methodical planner with a modest travel budget, prefers short road trips to Shenandoah National Park and historic Williamsburg, dreams of exploring the vineyards of Tuscany, and
    schedules their vacations around low‑stress periods at work to avoid burnout, which they meticulously map out in a travel journal.
  culinary: Jeneen Clark, a garden‑to‑table enthusiast, delights in canning heirloom tomatoes into sun‑dried salsa, prepping roasted beet and goat cheese salads with fresh thyme, and perfecting classic
    chicken pot pie, they regularly swap recipes with fellow seniors at the community center and experiment with new herbs like rosemary and sage.
  core: Jeneen Clark, a pragmatic yet restless 52‑year‑old nursing assistant, balances a competitive drive with a love for solitary gardens, puzzles, and community knitting, while they wrestle with occasional
    stress‑induced worry and a penchant for spontaneous, low‑key adventures.
background:
  cultural: Jeneen grew up in a working‑class Appalachian family in West Virginia, where self‑reliance, close‑knit family ties, and a modest, pragmatic outlook are core values. Her family’s roots trace
    back to generations of coal‑miners and small‑farmers, and the community’s traditions of church attendance, bluegrass music, and county fair gatherings have shaped her cultural identity. Although she
    did not finish high school, she internalized a strong work ethic and a respect for practical knowledge, often turning to local folklore and community elders for advice. Living in Martinsburg, she blends
    this heritage with the modest urban‑rural mix of the Shenandoah Valley, participating in church potlucks and volunteering at the county’s senior services.
