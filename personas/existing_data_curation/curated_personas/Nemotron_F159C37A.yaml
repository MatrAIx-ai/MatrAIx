  career_goals: Although Jeneen enjoys the hands‑on nature of her current role, she aims to deepen her qualifications and take on more responsibility. Over the next three years she plans to complete her
    GED, earn a certified medication aide credential, and enroll in an associate‑degree program to become a Licensed Practical Nurse (LPN). She hopes this progression will give her greater clinical autonomy,
    reduce the stress of ambiguous tasks, and position her for a supervisory or charge‑assistant role on her unit. She also aspires to become a patient‑advocate specialist within the hospital, helping seniors
    navigate discharge planning and community resources. Her competitive streak drives her to seek recognition, so she targets "Employee of the Month" awards and aims to lead a quality‑improvement project
    focused on reducing falls among long‑term patients.
