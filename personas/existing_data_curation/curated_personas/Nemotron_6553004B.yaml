  career_goals: Alejandra aims to pursue a career that blends her practical nature with her desire to help her community. She is interested in enrolling in a vocational program after high school, focusing
    on medical assisting or community health work, where she can apply her organizational strengths and bilingual abilities to support immigrant families. In the longer term, she envisions gaining certifications
    in health administration or social services, eventually working in a community health center in Queens that offers culturally competent care. She also hopes to obtain a scholarship that would allow
    her to continue her education while contributing financially to her household.
