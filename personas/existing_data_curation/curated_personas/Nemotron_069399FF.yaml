personas:
  professional: An aspiring junior explorer, Wendy Forbes treats every school project like a mission, using her methodical knack for planning and love of routine to meticulously chart experiments, keep
    detailed logs, and present findings with tidy slide decks.
  sports: An organized member of the local youth soccer league, Wendy Forbes practices drills on Tuesdays and Thursdays, cheers for the Washington D.C. United women’s team on TV, and enjoys friendly weekend
    hikes with the Girl Scouts, treating each trek as a badge‑earning adventure.
  arts: A detail‑oriented sketcher, Wendy Forbes fills the pages of her sketchbook with meticulous drawings of Shenandoah flora, draws inspiration from the classic children’s illustrator Mary Cassatt, and
    spends rainy afternoons recreating scenes from her favorite \"Magic Tree House\" books.
  travel: A routine‑loving explorer, Wendy Forbes prefers family trips with a printed itinerary, fondly recalls a weekend outing to Luray Caverns, dreams of a guided tour of the Smithsonian museums, and
    always packs a reusable water bottle and a pressed‑flower scrapbook kit.
  culinary: A budding cook in Girl Scouts, Wendy Forbes enjoys assembling simple recipes like trail‑mix granola bars, mastering the perfect peanut‑butter‑and‑jelly sandwich, and experimenting with seasonal
    ingredients such as fresh strawberries and pine nuts for snack plates.
  core: Wendy Forbes blends a love for structure with creative curiosity, turning everyday routines into mini‑adventures while secretly hoarding extra glitter for late‑night crafts.
background:
  cultural: Wendy grows up in Staunton, Virginia, a small city nestled in the Shenandoah Valley with a predominantly white, historically Southern community. Her family places a strong emphasis on tradition,
    community involvement, and practical values. Weekly church attendance, school events, and local festivals like the Shenandoah Apple Blossom Festival shape her sense of belonging. The region's close‑knit
    neighborhoods and the natural beauty of the surrounding mountains influence her love for routine outdoor activities and appreciation for local history. This blend of Southern hospitality, community
    service, and a respect for orderly, practical living informs Wendy's character and daily life.
attributes:
  skills: '[''Reading comprehension (grade 2‑3 level)'', ''Basic addition and subtraction'', ''Organizing school supplies and personal planner'', ''Following step‑by‑step instructions'', ''Cooperative group
