  hobbies: '[''Reading chapter‑book series (e.g., Magic Tree House)'', ''Sketching and drawing'', ''Friendship‑bracelet making'', ''LEGO building'', ''Jigsaw puzzles'', ''Girl Scouts badge activities (knot
    tying, basic cooking)'', ''Family hikes in Shenandoah National Park'', ''Flower pressing and scrapbook crafting'']'
  career_goals: Although still young, Wendy dreams of a future where she can help others in a structured setting. She frequently says she wants to become a teacher or a librarian because she loves books,
    enjoys keeping things organized, and likes the idea of guiding younger children through learning. Her love for animals also sparks occasional thoughts of becoming a veterinarian, but she consistently
    emphasizes the importance of routine and caring for others as her guiding motivations.
