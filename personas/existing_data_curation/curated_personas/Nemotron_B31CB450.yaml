  career_goals: Beatrice aims to complete her high‑school diploma and enroll in a community‑college program that leads to a bachelor’s degree in business administration with a focus on event management
    or nonprofit leadership. She envisions a career where she can blend her love for organized planning with community service—such as coordinating youth programs, local festivals, or sustainability‑focused
    events. In the long term, she hopes to become a program director for a youth‑center or an event‑planning firm, and she also aspires to mentor peers on stress‑management and academic achievement through
    workshops or peer‑leadership initiatives.
