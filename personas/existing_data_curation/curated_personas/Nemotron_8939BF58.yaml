personas:
  professional: Caleb Marasco is an aspiring user-experience designer who channels their vivid imagination, disciplined work ethic, and natural knack for group facilitation into crafting intuitive digital
    prototypes and leading collaborative design workshops for campus tech initiatives, and they thrive on turning abstract concepts into user-friendly experiences.
  sports: Caleb Marasco stays active by sprinting with the Ann Arbor Track Club in the spring, shooting hoops at the local recreation center during the winter, and they cheer fervently for the Michigan
    Wolverines football and basketball teams as well as the Detroit Lions, while preferring low-impact cardio over heavy weightlifting.
  arts: Caleb Marasco immerses themselves in the Ann Arbor creative scene by painting mixed-media collages inspired by the surreal colors of Yayoi Kusama, snapping urban photographs à la William Eggleston,
    and they attend open-mic nights that feature indie folk acts like Sufjan Stevens and local jazz trio The Bad Plus.
  travel: Caleb Marasco prefers budget-friendly road trips that blend cultural discovery and scenic photography, having explored the historic streets of Boston and the vibrant murals of Mexico City, and
    they dream of a future solo backpacking adventure to Reykjavik to chase the Northern Lights while balancing student loan obligations.
  culinary: Caleb Marasco, a modestly skilled home cook, frequently whips up herb-infused spaghetti carbonara with pancetta, fresh basil, and a touch of smoked paprika, while they relish sampling Ann Arbor’s
    farm-to-table food trucks for dishes like Korean-style kimchi tacos and seasonal beet salads.
  core: Caleb Marasco is a hyper-creative, meticulously organized 18-year-old who channels boundless imagination into art and tech projects, yet habitually postpones laundry until the pile becomes a makeshift
    art canvas.
background:
  cultural: Caleb was raised in a suburban neighborhood of Washtenaw County, just outside Ann Arbor, within a family of Northern European descent—primarily German and Irish ancestry. His parents emphasized
    the importance of education, community involvement, and appreciation for the arts, a value that aligns with the vibrant cultural scene of the university town. Growing up, he celebrated traditional holidays
    like Christmas and St. Patrick’s Day while also embracing the diverse cultural festivals and art events that Ann Arbor hosts throughout the year. This blend of Midwestern groundwork and exposure to
    a multicultural campus environment has shaped his inclusive outlook and his drive to contribute to the local creative community.
