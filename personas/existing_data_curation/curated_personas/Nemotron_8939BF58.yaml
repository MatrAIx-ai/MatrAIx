  hobbies: '[''Drawing and digital illustration'', ''Mixed‑media collage'', ''Photography'', ''Open‑mic and improv comedy'', ''Local music festival outings'', ''Board‑gaming club'', ''Acoustic guitar'',
    ''Volunteer art‑center workshops'', ''Reading speculative fiction and tech philosophy'']'
  career_goals: Caleb aims to merge his love for art and technology by becoming a user experience designer and creative technologist for an innovative media or education startup. He envisions developing
    immersive, interactive experiences that blend storytelling, visual art, and emerging tech. Over the next five years, he hopes to secure a junior UX role at a company that values interdisciplinary collaboration,
    then progress to a lead designer position where he can mentor peers and steer projects from concept to launch. Ultimately, he dreams of founding his own studio that creates community‑focused art installations
    and digital experiences, fostering creative dialogue in Ann Arbor and beyond.
