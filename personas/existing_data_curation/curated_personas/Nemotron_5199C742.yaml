  career_goals: Brian aims to step into a senior executive role—Director or Vice President of Operations—where he can champion digital transformation and embed data‑driven decision making across the enterprise.
    He seeks to lead a company‑wide continuous‑improvement program that leverages AI and IoT for predictive maintenance and supply‑chain optimization, while also fostering a culture that prioritizes employee
    well‑being and work‑life balance. Over the next five years, he plans to earn a Six Sigma Black Belt, mentor emerging managers, and eventually transition into a strategic consulting capacity that allows
    him to apply his pragmatic curiosity on a broader scale.
