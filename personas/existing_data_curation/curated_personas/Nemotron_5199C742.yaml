  hobbies: '["Home Automation", "Woodworking", "Gardening", "Golf", "Craft Brewing Events", "Reading (Tech/Business Non‑Fiction)", "Podcast Listening (Innovation & Leadership)", "Hiking (Cuyahoga Valley)",
