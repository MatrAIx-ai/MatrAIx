  career_goals: Andreina’s current ambitions focus on leaving a lasting cultural legacy. She aims to compile and publish a memoir that weaves together her migration story, family genealogy, and reflections
    on Nicaraguan traditions. She also plans to curate a modest exhibit of folk art at a local senior center, using her art knowledge and photography skills. Additionally, she hopes to mentor youth volunteers
    in oral-history projects and to master simple video editing tools to preserve community stories for future generations.
