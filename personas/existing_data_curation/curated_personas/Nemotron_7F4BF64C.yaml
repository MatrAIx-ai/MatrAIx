  career_goals: Although retired, Erika aims to deepen her impact on her neighborhood by establishing a multicultural senior arts circle that offers workshops in painting, crafts, and storytelling. She
    hopes to mentor younger volunteers, document her family’s immigration history in a memoir, and travel to her hometown in Mexico to reconnect with relatives and traditional festivals. Additionally, she
    aspires to become proficient in digital photography to capture community events and share them online, strengthening intergenerational ties.
