personas:
  professional: Jordan Crowdis, a 30‑year‑old postsecondary art history instructor, leverages meticulous curriculum design, grant‑writing success, and a magnetic, talkative presence to energize seminars,
    coordinate museum collaborations, and advance a planned Center for Contemporary Art and Social Justice, and they consistently model disciplined scholarly rigor for students.
  sports: Jordan Crowdis, a fan of the Brooklyn Nets and New York Knicks, joins the Prospect Park Runners club for weekly 5K group runs, participates in seasonal pick‑up basketball games at local community
    centers, and enjoys weekend kayaking on the East River when the weather permits, and they relish the post‑run coffee at a nearby café.
  arts: Jordan Crowdis immerses themselves in Brooklyn’s avant‑garde scene, curates visits to exhibitions by artists like Kerry James Marshall and Tania Bruguera, collects vintage Miles Doe and Thelonious
    Monk vinyl, performs improvised piano pieces at open‑mic nights, and regularly cites the influence of poet Amiri Baraka and filmmaker Ai Weiwei on their creative philosophy, and they often discuss these
    influences during faculty meetings.
  travel: Jordan Crowdis prefers immersive cultural trips, having documented street art festivals in Berlin, the La Sape movement in Kinshasa, and the Día de Los Muertos celebrations in Oaxaca, while planning
    a future photography pilgrimage to Naples for its vibrant murals, always balancing modest travel budgets with the desire for authentic experience, and they keep a digital archive of each trip's photographs.
  culinary: Jordan Crowdis, an adventurous home cook, experiments with avant‑garde techniques such as fermentation and spherification to reinvent dishes like miso‑glazed cauliflower steak with umeboshi‑infused
    vinaigrette, while also savoring classic vegan ramen with mushroom broth and shiso, and modestly collects rare ingredients like black garlic and edible flowers for their weekly experimental dinner parties,
    and they also share recipes on a modest blog.
  core: Jordan Crowdis is a relentlessly curious art scholar whose boundless social energy fuels a bustling Brooklyn life, but whose chronic worry drives obsessive budgeting, nightly spreadsheet checks,
    and a habit of over‑committing to projects at the expense of sleep, and they often find themselves staying up late to finish grant proposals.
background:
  cultural: Jordan is a white American of Irish‑Scottish heritage, raised in a middle‑class family in upstate New York where his parents fostered a love of literature, museum visits, and liberal‑arts education.
    Moving to Brooklyn for graduate school immersed him in a multicultural environment that blends African‑American, Caribbean, Jewish, and Latino cultural traditions. He identifies with progressive, secular
    values and celebrates mainstream American holidays, while also participating in neighborhood cultural festivals such as the West Indian Day Parade and the Brooklyn Museum’s community programs. This
    blend of a traditional Western upbringing and the diverse artistic landscape of Brooklyn shapes his worldview and informs both his teaching and personal interests.
attributes:
  skills: '["Curriculum development", "Art history expertise", "Critical theory analysis", "Public speaking", "Academic research", "Grant writing", "Digital pedagogy (Canvas, Zoom, Moodle)", "Project management",
    "Community outreach", "Spanish language proficiency"]'
  hobbies: '["Visiting contemporary art exhibitions", "Attending poetry slams and open mic nights", "Traveling to cultural festivals", "Reading modern literature", "Writing blog posts on art theory", "Playing
    jazz piano", "Participating in improv comedy groups", "Street photography", "Cooking experimental dishes", "Yoga and mindfulness practice"]'
  career_goals: Jordan aims to achieve tenure within the next three years while establishing an interdisciplinary Center for Contemporary Art and Social Justice at his institution. He plans to publish a
    monograph on urban street art and secure a major NEH research grant to fund collaborative projects with local museums. His ambition includes designing a hybrid undergraduate curriculum that blends digital
    media, critical theory, and community engagement, and launching a podcast series that brings emerging artists into dialogue with scholars. He aspires to become department chair, where he can implement
    faculty‑wellness initiatives that address stress and promote work‑life balance. Mentoring students from underrepresented backgrounds and expanding scholarship opportunities are central to his long‑term
    vision.
