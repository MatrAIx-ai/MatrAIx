  career_goals: Inspired by his love for art, technology, and storytelling, Jose Luis aims to become a video game designer or digital animator, creating immersive worlds that reflect diverse cultures. He
    hopes to attend a high school with a strong STEM and arts program, join a robotics or game development club, and eventually study computer science and graphic design at a university. His competitive
    spirit drives him to participate in coding competitions and art showcases, where he can refine his skills and build a portfolio for future creative careers.
