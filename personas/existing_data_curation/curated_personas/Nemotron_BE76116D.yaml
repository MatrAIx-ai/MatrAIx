personas:
  professional: Sarah Stuart, a budding classroom helper at her preschool, meticulously arranges art supplies, follows the daily schedule with clockwork precision, quietly guides a small circle of friends
    through puzzles, and they take pride in maintaining order while embodying a disciplined, achievement-driven mindset even at five.
  sports: Sarah Stuart proudly dons the mini-soccer kit for the neighborhood Tiny Tigers league, practices dribbling every Thursday, cheers for the Boston Red Sox during spring games, and they prefer structured
    drills to spontaneous tag games.
  arts: Sarah Stuart immerses themselves in drawing whimsical animals inspired by Beatrix Potter, giggles to Mo Willems' Elephant & Piggie stories read aloud, and they pretend to perform as Elsa from Disney's
    Frozen in their living room, using a glittery microphone for showtime.
  travel: Sarah Stuart relishes the predictability of family road trips to the nearby Cape Cod beach and the annual summer stay at Grandma's lakeside cabin, while daydreaming about future visits to Disneyland
    in California, and they always insist on a detailed itinerary complete with snack breaks.
  culinary: Sarah Stuart favors creamy macaroni and cheese topped with extra cheddar, delights in making banana-peanut butter sandwiches on whole-grain bread, meticulously separates their green peas from
    carrots on the plate, yet they have a habit of smearing strawberry jam on their chin during breakfast.
  core: Sarah Stuart is a five-year-old routine-obsessed planner who meticulously organizes their toys, money, and health charts, shuns spontaneous chaos, yet they occasionally indulge in a mischievous
    jam-smearing smile.
background:
  cultural: Sarah grew up in the small town of Franklinton in Washington Parish, Louisiana, within a white, Southern Christian family that values tradition, community, and modesty. Her household attends
    church regularly, celebrates local festivals such as the Fourth of July parade, and enjoys regional foods like fried catfish and cornbread. The modest rural setting encourages close family ties, respect
    for elders, and a practical, down-to-earth outlook. While the area is influenced by broader Southern and Cajun cultures, Sarah’s upbringing emphasizes punctuality, orderly routines, and the simple pleasures
    of small-town life.
attributes:
