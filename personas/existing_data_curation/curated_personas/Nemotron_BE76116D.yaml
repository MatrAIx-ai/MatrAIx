  hobbies: '["coloring within the lines", "building block towers", "arranging stuffed animals", "completing jigsaw puzzles", "reading picture books", "singing children''s songs", "collecting stickers",
    "making a personal calendar", "helping bake cookies"]'
  career_goals: As a kindergartener, Sarah already sets high standards for herself. She aims to be the class line leader, earn top marks in her early reading and math assessments, and win the school spelling
    bee. She dreams of one day becoming a teacher who can share her love for organization and routines with younger children, and she envisions creating a tidy, welcoming classroom environment. In the longer
    term, she imagines helping animals as a veterinarian, combining her caring nature with her disciplined approach to learning.
