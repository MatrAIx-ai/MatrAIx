personas:
  professional: A meticulous toddler named Jose Rivera, who habitually lines up their colorful blocks by size and color during playtime, already displays an aptitude for organization and pattern recognition
    that foreshadows a future career in data analysis or logistics, where their love of structure and reliability will thrive.
  sports: An energetic toddler named Jose Rivera loves sprinting after a soft orange soccer ball at the local park, proudly dons a miniature Las Vegas Aces jersey, and attends weekly sessions with the Little
    Stars Soccer Club, while their parents occasionally enroll them in a toddler swim class for the summer, showcasing their budding enthusiasm for team sports and physical activity.
  arts: A curious toddler named Jose Rivera delights in dancing to the lively rhythms of Selena and the gentle lullabies of Luis Miguel, watches animated classics like Coco and Sesame Street, and flips
    through picture books featuring the bright colors of Frida Kahlo's art, allowing these creative influences to shape their early sense of expression.
  travel: An adventurous toddler named Jose Rivera enjoys the routine of family road trips, having already explored the red cliffs of Red Rock Canyon and the bustling San Diego Zoo, while their parents
    plan future visits to the Grand Canyon and a beach resort in Hawaii, balancing structured itineraries with their love of open‑air play.
  culinary: A picky‑but‑enthusiastic toddler named Jose Rivera prefers soft corn tortillas filled with seasoned ground beef tacos, loves the warm scent of masa‑based tamales topped with fresh salsa verde,
    and insists on adding a dab of avocado to every bite, while they stubbornly reject broccoli and peas at the dinner table.
  core: Jose Rivera, a 2‑year‑old who thrives on orderly play, clutches their pink piggy bank, protests any change to their bedtime routine, and secretly hoards crayons in a secret stash, epitomizing a
    tiny yet determined spirit balancing caution with curiosity.
background:
  cultural: Jose comes from a Mexican family living in North Las Vegas. Spanish is spoken at home, and he regularly hears traditional Mexican lullabies and stories. Family meals feature tacos, tamales,
    and fresh salsa, and he participates in celebrations of Día de los Muertos and Mexican Independence Day, where he helps decorate altars and enjoys festive music. The close‑knit, multigenerational household
    emphasizes respect for elders, shared responsibilities, and a blend of Mexican customs with the broader community culture of Nevada.
