personas:
  professional: Luis Ramos, a 19‑year‑old strategic marketing analyst in training, leverages strong financial modeling, market research, and data visualization skills with a design‑thinking approach, channeling
    their curiosity for art and competitive streak into crafting culturally resonant brand narratives while maintaining disciplined solo project work.
  sports: Luis Ramos, 19, is a casual fan of the San Diego Padres and follows the San Diego Wave FC soccer season with enthusiastic but low‑key support, while personally participating in sunrise beach runs
    and occasional surf sessions with the local Surf Club, preferring solo workouts over team sports and treating fitness as a grounding ritual to temper anxiety.
  arts: Luis Ramos, 19, immerses themselves in contemporary art by sketching murals influenced by the social commentary of Banksy and the vibrant storytelling of Frida Kahlo, attends indie film screenings
    of directors like Guillermo del Toro, and curates playlists featuring experimental musicians Tim Hecker and Nils Frahm, letting these influences shape their own visual and narrative style.
  travel: Luis Ramos, 19, prefers low‑cost, purpose‑driven trips that blend cultural immersion with personal reflection, meticulously planning weekend getaways to places like Oaxaca’s Day of the Dead festivals,
    the street‑art alleys of Valparaíso, Chile, and the tranquil beaches of Tulum, while balancing a modest travel budget with a yearning for new visual experiences.
  culinary: Luis Ramos, 19, enjoys moderate‑level cooking at home, frequently experimenting with chilaquiles topped with avocado crema, mole‑infused tacos, and smoky mezcal‑marinated pork, while also appreciating
    the simplicity of a perfectly seared ahi tuna bowl with pickled radish, cilantro, and lime.
  core: Luis Ramos, a 19‑year‑old bilingual strategist, channels restless curiosity and a competitive edge into art‑infused marketing while juggling intense anxiety and a disciplined solo work ethic.
background:
  cultural: Luis grew up in a bilingual Mexican‑American household in San Diego, where Spanish was spoken at home and English at school. His family celebrates traditional Mexican holidays such as Día de
    los Muertos and Las Posadas, and they maintain strong ties to Mexican cuisine, music, and folk art. At the same time, the multicultural environment of Southern California exposed him to a blend of Chicano
    street art, Pacific‑Northwest surf culture, and a vibrant immigrant community. This bicultural upbringing instilled in him a sense of familismo, respect for elders, and an appreciation for the rich
    visual storytelling tradition of Mexican muralism, which now informs his creative and professional outlook.
attributes:
  skills: '["Financial modeling", "Market research", "Strategic planning", "Data visualization (Excel, Tableau, Python)", "Bilingual communication (Spanish/English)", "Creative problem solving", "Design
    thinking", "Presentation and pitching", "Independent research", "Competitive case analysis"]'
  hobbies: '["Visiting art galleries", "Sketching and photography", "Reading philosophy", "Listening to experimental music", "Journaling and mindfulness", "Board game nights with friends", "Indie film screenings",
    "Cooking Mexican fusion dishes", "Following tech and business trends", "Participating in community entrepreneurship workshops"]'
  career_goals: Luis aims to secure a strategic marketing analyst position at a forward‑thinking agency or tech startup where he can merge his business acumen with his passion for art and culture. Over
    the next five years, he intends to develop a niche in brand storytelling for Latinx audiences, eventually launching his own boutique consultancy that helps small Mexican‑American businesses articulate
    authentic visual identities. He also plans to pursue a graduate certificate in UX design to deepen his ability to create user‑centred experiences and to become a mentor for students dealing with anxiety,
    promoting mental‑health awareness in corporate environments.
