personas:
  professional: Mary Benatti, a 27‑year‑old elementary and middle school teacher, blends inquiry‑driven STEAM instruction with flexible, empathy‑focused classroom management, channeling their spontaneous
    curiosity and concern for harmony into dynamic lessons that keep students engaged despite occasional struggles with organization and deadlines.
  sports: Mary Benatti, a 27‑year‑old fitness enthusiast, fuels their energy with weekly Zumba at the Huntsville YMCA and hikes with the Monte Sano Trail Club, while cheering on the Alabama Crimson Tide
    football squad and the Huntsville Havoc ice‑hockey team whenever the season rolls around.
  arts: Mary Benatti, a 27‑year‑old teacher, finds artistic fulfillment singing with the Huntsville Community Choir, devouring children’s books by Mo Willems, crafting DIY classroom décor inspired by Joanna
    Gaines, and attending the Huntsville Music Festival to see acts like Brandi Carlile and The Avett Brothers.
  travel: Mary Benatti, a 27‑year‑old teacher who loves spontaneous weekend road trips, often drives the Blue Ridge Parkway to Asheville, samples Nashville’s hot chicken, stargazes at the U.S. Space & Rocket
    Center in Huntsville, and earmarks savings for a future adventure to the Grand Canyon.
  culinary: Mary Benatti, a 27‑year‑old teacher and avid amateur baker, regularly whips up lemon‑blueberry muffins with fresh berries and almond flour, perfects a buttery croissant‑style cinnamon roll,
    and delights in tasting local farm‑to‑table dishes like grilled peach salad with goat cheese at Huntsville’s Food Truck Park.
  core: Mary Benatti is a spontaneous, community‑driven teacher who balances curiosity with practicality, yet their worry‑prone nature often leads to last‑minute planning and occasional overcommitment.
background:
  cultural: Mary grew up in the heart of Alabama, absorbing Southern hospitality, strong family ties, and a community‑oriented outlook. Raised in a Methodist household, she participated in church youth
    activities and values kindness, cooperation, and modesty. The distinctive aerospace culture of Huntsville, known as "Space City," sparked her curiosity about science and technology, influencing her
    STEAM‑focused teaching style. While she cherishes traditional Southern cuisine and music, she also embraces the growing cultural diversity of Madison County, attending local multicultural festivals
    and being comfortable in varied social settings.
attributes:
  skills: '[''Lesson Planning'', ''Classroom Management'', ''Differentiated Instruction'', ''Early Literacy Development'', ''STEAM Integration'', ''Educational Technology'', ''Collaborative Group Activities'',
