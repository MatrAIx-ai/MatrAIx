  hobbies: '[''Zumba/Group Fitness'', ''Hiking'', ''Community Garden Volunteering'', ''Children’s Book Club'', ''DIY Crafts'', ''Choir Singing'', ''Baking'', ''Music Festivals'', ''Board Game Nights'',
    ''Stargazing/Astronomy'']'
  career_goals: Mary aims to deepen her pedagogical expertise by pursuing a master’s degree in educational leadership and eventually transitioning into a curriculum specialist role where she can design
    innovative STEAM programs for her district. She hopes to mentor new teachers, lead professional-development workshops, and create after-school enrichment activities that extend learning beyond the classroom.
    In the long term, she envisions taking on an instructional coordinator or principal position that values collaborative culture, supportive staff well‑being, and community engagement, allowing her to
    combine her love of teaching with her desire to foster a nurturing school environment.
