  hobbies: '[''Basketball'', ''Soccer'', ''Hiking'', ''Photography'', ''Acoustic guitar'', ''Live music'', ''Community theater'', ''Volunteering at festivals'', ''Cooking'', ''Woodworking'', ''Reading nonfiction'']'
  career_goals: Kenneth aims to complete his associate degree in Business Administration with a concentration in social entrepreneurship, then transfer to a four‑year university for a bachelor's in Sustainable
    Business. He aspires to launch a community‑focused cooperative farm or food‑access program in Creston, blending his passion for environmental stewardship with practical business skills. Long‑term, he
    envisions a career in nonprofit management or social‑enterprise leadership, where he can create sustainable solutions for rural communities while fostering local employment and food security.
