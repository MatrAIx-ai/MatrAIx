  career_goals: He dreams of someday becoming a robotics engineer or environmental scientist, roles that let him design solutions that improve everyday life and protect the natural world. He also hopes
    to mentor younger kids, sharing his love of discovery and teamwork. In the short term, he aims to excel in his school’s STEM programs, win a regional science fair, and take on leadership roles in his
    extracurricular clubs.
