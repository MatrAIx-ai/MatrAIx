  hobbies: '[''sketching/drawing'', ''digital illustration'', ''photography'', ''reading sci‑fi novels'', ''playing chess'', ''strategy video gaming'', ''short story writing'', ''mindfulness journaling'',
    ''visiting art museums'', ''attending local music gigs'']'
  career_goals: Inspired by his love for visual storytelling and his methodical mindset, Matthew aims to enroll in a specialized visual arts high school program and later pursue a bachelor's degree in User
    Experience (UX) Design or Digital Media at a university. His long‑term ambition is to work as a UX designer or concept artist at a forward‑thinking creative agency or video‑game studio, where he can
    blend artistic expression with analytical problem‑solving. He also hopes to build a freelance portfolio of illustrations and digital designs, enabling him to manage his own schedule and reduce stress.
    In the meantime, he seeks scholarships and mentorship opportunities that align with his competitive drive and academic reliability.
