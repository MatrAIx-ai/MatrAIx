personas:
  professional: Matthew Wilson, a 16-year-old aspiring visual storyteller, leverages their proficiency in Photoshop and Procreate alongside a methodical project-planning skill set to create concept art
    and user-experience mockups that blend narrative depth with analytical precision.
  sports: Matthew Wilson follows the Chicago Bulls and the Los Angeles Lakers, and they play midfield for their high school soccer club, while also competing in regional chess tournaments, channeling their
    strategic mindset into both physical and mental sports despite occasionally skipping practice when school pressures mount.
  arts: Matthew Wilson immerses themselves in the vibrant illustrations of James Jean, the animated worlds of Studio Ghibli, and the indie sounds of Tame Impala, while regularly attending community theater
    productions such as 'The Curious Incident of the Dog in the Night-Time' to fuel their creative vision.
  travel: Matthew Wilson meticulously plans weekend family trips to museums in Washington, D.C.; they dream of a solo backpacking art tour through Kyoto and Paris, and they use Google Sheets to budget each
    journey, balancing curiosity with parental constraints and school commitments.
  culinary: Matthew Wilson enjoys crafting avocado toast topped with smoked salmon, reheating ramen with a matcha-infused broth, and perfecting homemade pepperoni pizza, showcasing intermediate cooking
    skills and a penchant for bold, umami-rich flavors that they frequently share with friends.
  core: Matthew Wilson, a methodical teen artist with a competitive edge and a chronic worry habit, channels anxiety into disciplined sketch-marathons and strategic game sessions, consistently relying on
    their organized mindset to stay ahead.
background:
  cultural: Matthew comes from a middle‑class, predominantly white family in Middletown, Delaware, with roots tracing back to German and Irish ancestors. Growing up in New Castle County, he has been shaped
    by a blend of suburban Mid‑Atlantic culture and local traditions, such as the Delaware State Fair, Fourth of July fireworks on the Brandywine River, and pumpkin festivals in the fall. His family values
    education, self‑reliance, and community involvement, often volunteering at the town library and participating in church‑based service projects. Exposure to the nearby Philadelphia art scene and occasional
    trips to regional museums have deepened his appreciation for visual arts. At school, he interacts with a diverse student body, giving him a broader perspective on cultural expression while maintaining
    strong ties to his own heritage.
