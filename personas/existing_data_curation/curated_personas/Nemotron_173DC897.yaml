  hobbies: '[''Reading (Fantasy & Historical Non‑Fiction)'', ''Puzzle Solving (Jigsaw, Sudoku, Crossword)'', ''Chess Club Participation'', ''Strategic Video Gaming (Turn‑Based Strategy)'', ''Journal Writing'',
    ''Sketching/Nature Drawing'', ''Gardening (Vegetable & Herb Plot)'', ''Baking/Cooking (Precise Recipes)'', ''Attending Local History Tours'', ''Listening to Classical Music'']'
  career_goals: Marilyn is drawn to career paths that offer clear structure, measurable outcomes, and a high degree of responsibility. She aims to graduate high school with a strong GPA, earn a scholarship,
    and pursue a bachelor's degree in Computer Science with a focus on Cybersecurity, attracted by the field's systematic problem‑solving, precise protocols, and competitive nature. In the long term she
    envisions working as a cybersecurity analyst for a federal agency or a reputable private firm, where she can apply her meticulous attention to detail and competitive drive to protect critical data.
    She also keeps a secondary interest in veterinary technology, appreciating the procedural rigor and the opportunity to work with animals in a hands‑on, stable environment.
