  hobbies: '[''Watercolor painting'', ''Reading speculative fiction'', ''Vegetable gardening'', ''Quilting'', ''Attending folk and blues music events'', ''Poetry writing'', ''Walking the San Joaquin River
    trail'', ''Church choir singing'']'
  career_goals: Briyah aims to channel her artistic imagination into a community mural that celebrates the multicultural heritage of Mendota, launch a monthly storytelling circle at the local library to
    document elders' experiences, develop a small online boutique for her quilts and paintings, and pursue a certificate in digital photography to expand her visual storytelling toolkit. She also hopes
    to formalize her mentorship role by partnering with the local elementary school’s after‑school program, and to learn basic coding to create an interactive digital archive of local oral histories.
