  hobbies: '["Hiking", "Birdwatching", "Vegetable Gardening", "Woodworking", "Reading Historical Nonfiction", "Puzzle Solving (Crosswords, Sudoku)", "Blogging", "Chess"]'
  career_goals: Although no longer in the formal workforce, Fred aims to remain intellectually engaged by mentoring STEM students at the local community college and volunteering as a technical advisor for
    a nearby maker space. He plans to earn a certification in sustainable building practices and to author a memoir that captures his engineering career and lessons on disciplined problem‑solving. Travel
    to national parks, documenting his experiences through photography, and maintaining his health and independent living are also key ambitions.
