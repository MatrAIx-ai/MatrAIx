personas:
  professional: Timothy Derouen, a 9‑year‑old aspiring engineer who transforms LEGO sets into intricate prototypes, channels their curiosity‑practical balance into methodical building, yet their relaxed,
    slightly disorganized nature means they often begin new projects before fully completing previous ones.
  sports: Timothy Derouen, who plays forward for the Beloit Youth Soccer Club during the spring and summer, enjoys weekend runs through local wetlands for fitness, cheers on the Milwaukee Bucks and Green
    Bay Packers on game nights, and balances their love of team sport with occasional missed practices due to their laid‑back approach to scheduling.
  arts: Timothy Derouen, an avid sketcher of turtles and ducks who draws inspiration from wildlife artist John James Audubon, practices piano pieces by Ludwig van Beethoven like ‘Für Elise’, and enjoys
    watching Pixar films such as ‘Finding Nemo’ and listening to the upbeat pop tunes of BTS, weaving these artistic influences into their creative play.
  travel: Timothy Derouen, who prefers spontaneous day trips over rigid itineraries, loves exploring the wetlands of the Horicon Marsh and has taken family outings to Milwaukee, Chicago’s Museum of Science
    and Industry, and the Wisconsin Dells water parks, while dreaming of a future adventure to Disneyland in California and a curiosity‑driven visit to the Natural History Museum in London.
  culinary: Timothy Derouen, a budding kitchen helper who can confidently melt cheese for grilled cheese sandwiches, whip up spaghetti Bolognese with ground beef, tomato sauce, and basil, and delights in
    munching on carrot sticks and apple slices, often mixes in LEGO‑shaped fruit snacks for fun, though they sometimes forget to eat vegetables without a reminder.
  core: Timothy Derouen, a 9‑year‑old LEGO‑building explorer with a curious yet laid‑back mind, constantly balances new ideas with unfinished projects, forgets to file away allowance cash, and can spend
    hours sketching wildlife while occasionally misplacing their soccer cleats.
background:
  cultural: Timothy comes from a white Midwestern family in Beloit, Wisconsin, with roots that trace back to French‑Belgian ancestry. His upbringing reflects typical Midwestern values of kindness, cooperation,
    and practicality, reinforced by participation in community events, his local church, and school activities. The region’s strong connection to agriculture and natural spaces fosters his love for the
    outdoors, while family traditions include modest celebrations of heritage foods and occasional French phrases.
