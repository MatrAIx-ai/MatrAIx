  career_goals: Linda aspires to combine her curiosity about marine life with her practical mindset by pursuing a career in marine biology or environmental science. She aims to graduate high school with
    honors, earn a scholarship to a Florida university, and secure an internship at a coastal research center. In the long term, she hopes to work on marine ecosystem conservation projects, design educational
    outreach programs for youth, and possibly lead citizen-science initiatives that protect the Gulf of Mexico's wildlife.
