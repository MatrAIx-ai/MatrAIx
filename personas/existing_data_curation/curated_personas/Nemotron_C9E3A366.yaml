personas:
  professional: Linda Lancaster, an aspiring junior game developer, channels their organized, methodical approach into creating Scratch games that blend scientific curiosity with practical storytelling,
    while their cooperative nature shines when they collaborate with classmates on school tech clubs.
  sports: Linda Lancaster, a member of the Crestview Youth Volleyball Club and a starter on their middle school’s varsity volleyball team, spends weekends practicing beach volleyball on the Gulf shore,
    follows the Tampa Bay Buccaneers for football inspiration, cheers for the Orlando Magic during the NBA season, and balances their active routine with weekly jogs along the coastal trail.
  arts: Linda Lancaster, an avid piano player who practices classical pieces by Mozart and contemporary songs by Taylor Swift, fills their sketchbook with detailed wildlife drawings inspired by Audubon,
    and devotes their free evenings to reading sci‑fi novels from authors like Isaac Asimov while listening to film scores by Hans Zimmer, blending artistic appreciation into their daily rhythm.
  travel: Linda Lancaster, who loves sun‑kissed weekends at the Gulf Coast and has taken family road trips to St. Augustine’s historic district and Disney World’s Magic Kingdom, dreams of snorkeling in
    the Bahamas and exploring the coral reefs of Belize, preferring a balanced itinerary that mixes organized tours with spontaneous beachcombing, and they often plan their trips with a detailed notebook.
  culinary: Linda Lancaster, who favors Gulf‑inspired dishes such as shrimp po'boys with fresh lime and mango salsa and delights in baking key‑lime pie from scratch, enjoys experimenting in the kitchen
    with simple recipes like grilled fish tacos seasoned with Cajun spice, though they often forget to pre‑heat the oven and rely on their mom’s reminders.
  core: Linda Lancaster blends a community‑focused Southern upbringing with a curious, tech‑savvy spirit, balancing organized school responsibilities, beachside adventures, and creative pursuits while they
    occasionally succumb to impulsive snack cravings and forget to finish a piano piece.
background:
  cultural: Linda was raised in Crestview, a small community in Okaloosa County, Florida, where Southern hospitality and close-knit neighborhood ties are prominent. Her family places a strong emphasis on
    education, community service, and church involvement, which has shaped her cooperative and considerate nature. Growing up near the Gulf Coast, she has been exposed to beach outings, fishing trips, and
    environmental awareness programs that foster a love for the local marine environment. The blend of traditional Southern values—respect for elders, politeness, and a communal spirit—with the modern,
    active lifestyle of a Florida suburb informs her outlook and daily life.
