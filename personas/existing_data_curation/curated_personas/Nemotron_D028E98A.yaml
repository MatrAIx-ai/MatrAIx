personas:
  professional: William Corripio, a one‑year‑old explorer of early childhood milestones, shows a practical curiosity by repeatedly testing cause‑and‑effect toys such as shape sorters while they maintain
    a relaxed attitude toward structured routines, letting them drift from one activity to the next without fuss, reflecting a gentle, disorganized approach to early learning.
  sports: William Corripio, a toddler who delights in weekly baby‑swim sessions at the community pool and proudly waves a miniature New York Yankees cap during family outings to the baseball stadium, prefers
    small‑group play dates over large park gatherings, and they favor gentle splash play rather than competitive games, reflecting their reserved nature.
  arts: William Corripio, an infant who enjoys the soothing lullaby of the Beatles’ 'Hey Jude' and the upbeat 'Baby Shark' by Pinkfong, often bangs a wooden xylophone with soft mallets, showing a kind,
    cooperative spirit but they become upset if the music stops abruptly, reflecting high emotional reactivity.
  travel: William Corripio, having visited the nearby botanical garden, the grandparents’ cottage in the countryside, and a short trip to the city zoo, now daydreams about the bright lights of Disneyland
    in California, yet they prefer familiar faces and keep travel plans short, low‑key, and centered around family.
  culinary: William Corripio, a picky eater who loves smooth mashed sweet potatoes, soft banana slices, and occasional avocado toast, enjoys being fed with a tiny spoon but they often throw the spoon when
    a new texture is introduced, showcasing both curiosity about flavors and a practical aversion to unfamiliar foods.
  core: William Corripio is a one‑year‑old who balances inquisitive play with a laid‑back, disorganized routine, shows kindness to peers, experiences intense emotional swings, and they find comfort in simple
    tunes and soft foods.
background:
  cultural: William grew up in Muncie, Indiana, within a predominantly white, Midwestern community that values modesty, self‑reliance, and close neighborhood ties. Family traditions include celebrating
