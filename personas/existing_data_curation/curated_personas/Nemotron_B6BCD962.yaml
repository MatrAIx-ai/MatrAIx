personas:
  professional: Tannis Thompson, a community arts coordinator‑in‑training with a knack for empathetic listening and a spontaneous approach to planning, they blend their love of watercolor painting, storytelling,
    and urban gardening into part‑time workshops for seniors and families, often improvising lesson structures while battling a natural aversion to strict deadlines.
  sports: Tannis Thompson, a devoted fan of the Cleveland Guardians and Browns, they enjoy leisurely weekend walks with their garden club, participate in a co‑ed community softball league, and attend low‑impact
    yoga sessions at the neighborhood studio, preferring gentle movement over high‑intensity gym workouts.
  arts: Tannis Thompson, an avid patron of the Cleveland Museum of Art and regular attendee of independent film screenings, they draw creative inspiration from Monet’s watercolors and Nan Goldin’s photography,
    spend evenings painting Lake Erie vistas in watercolor, and weave literary quotes from Virginia Woolf into their reflective journaling and community workshop narratives.
  travel: Tannis Thompson, a planner who still embraces spur‑of‑the‑moment detours, they have explored Dublin’s historic districts during a family reunion, trekked through Washington’s Hoh Rainforest, and
    dream of returning to Tuscan vineyards to combine garden‑centric workshops with wine‑country scenery, balancing modest airfare finds with occasional splurges on local culinary tours.
  culinary: Tannis Thompson, a garden‑to‑table enthusiast, they frequently prepare beet‑and‑goat‑cheese salads using home‑grown beets, hand‑roll pierogi stuffed with fresh potatoes and onions, simmer chicken
    tikka masala with basil and cumin harvested from their backyard, and experiment with fermented sauerkraut as a nod to family traditions.
  core: Tannis Thompson, a quietly dynamic community caretaker, they blend art, gardening, and modest spontaneity into a compassionate yet occasionally disorganized lifestyle, often losing track of time
    while painting and planning.
background:
  cultural: Tannis grew up in a middle‑class white family in Cleveland, with deep Midwestern roots that blend German, Irish, and English ancestry. Her upbringing emphasized community solidarity, modesty,
    and a strong work ethic typical of the Cuyahoga County region. Exposure to the city’s industrial history and rich cultural institutions fostered a pragmatic yet open‑minded worldview. Family traditions
    include holiday gatherings centered on shared meals and local festivals, reinforcing her appreciation for communal harmony and collaborative activities.
