  hobbies: '[''visiting art galleries'', ''painting'', ''gardening'', ''reading historical fiction'', ''knitting'', ''cooking ethnic dishes'', ''volunteering at community center'', ''listening to podcasts
    about art and philosophy'']'
  career_goals: Although currently not in the formal workforce, Tannis aspires to channel her compassion and artistic curiosity into a part‑time role as a community arts coordinator for a local nonprofit
    or neighborhood cultural center. She hopes to develop and lead small workshops that blend visual arts, storytelling, and gardening, fostering inclusive creative spaces for families and seniors. In the
    longer term, she dreams of establishing a modest community studio where residents can gather for collaborative art projects, monthly exhibitions, and skill‑sharing sessions, all while maintaining her
    responsibilities at home.
