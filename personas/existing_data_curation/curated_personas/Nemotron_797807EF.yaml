    and active listening", "Problem solving under pressure", "Process improvement and operational efficiency", "Cash handling and financial reconciliation"]'
  hobbies: '["Hiking in the Boise foothills", "Landscape photography", "Fishing on the Boise River", "Playing acoustic guitar", "Reading non-fiction (psychology, productivity)", "DIY electronics projects
    (Raspberry Pi, Arduino)", "Volunteering at the community food bank", "Board-game nights with close friends", "Attending intimate live-music events", "Meditation and mindfulness practice"]'
  career_goals: Floyd aims to become a store manager within the next year, leveraging his organizational strengths and compassionate leadership style. In the longer term, he aspires to advance to a district‑manager
    role, overseeing multiple locations and implementing systematic, employee‑focused processes. He plans to enroll in an associate‑degree program in business administration and obtain a retail‑management
    certification to deepen his strategic expertise. Ultimately, he wishes to lead a retail operation that integrates sustainable practices, advanced technology, and a culture of teamwork, while mentoring
    emerging supervisors.
