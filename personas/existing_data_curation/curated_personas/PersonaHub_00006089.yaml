persona_description: A person who is concerned with environmental health issues and has a deep understanding of the potential health risks associated with environmental hazards, particularly those associated
  with military installations. They are knowledgeable about the contaminated water supply at Camp Lejeune and have a passion for advocating for those who were exposed to these hazards during their military
  service. They are also interested in the recent changes made by the VA to establish presumptions of service connection for certain conditions and disabilities caused by exposure to contaminated drinking
  water at Camp Lejeune.
