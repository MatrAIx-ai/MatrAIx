persona_description: A mining engineer who specializes in the design and selection of AC induction motors for applications in the cement industry. They are familiar with the torque characteristics of motors
  and understand the distinction between the running and starting load conditions of the driven equipment. They have experience with the National Electrical Manufacturers Association (NEMA) classifications
  of motors and are able to select the appropriate motor enclosure for the application. They are aware of the potential for excessive stall conditions in crushers and mills and have experience in designing
  motors with appropriate protection against these conditions.
