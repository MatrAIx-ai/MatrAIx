    at senior center'', ''Family storytelling'']'
  career_goals: Although retired, Kyong’s ambitions focus on deepening her service to the community. She aims to expand the senior‑center wellness program, launch intergenerational cooking workshops that
    teach Chinese culinary traditions, and mentor younger volunteers in organizational and caregiving skills. She hopes to compile a family recipe book and preserve cultural stories for her grandchildren.
    Maintaining her health through gentle yoga, mindfulness, and regular walks is also a priority, helping her manage stress and stay emotionally balanced while supporting her husband.
