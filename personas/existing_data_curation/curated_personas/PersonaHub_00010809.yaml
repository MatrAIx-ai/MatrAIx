persona_description: A social scientist who specializes in qualitative research methods, particularly in the field of sociology and anthropology. They are experienced in collecting and analyzing data over
  a long period of time, often focusing on the analysis of qualitative data rather than the immediate news cycle. They have a deep understanding of the detailed process of sociological or anthropological
  examination and are skilled in bringing in context through in-depth features. Their publications are directed at other academics and are written in a style and structure different from those written by
  journalists, who write for the general public.
