personas:
  professional: A construction laborer with five years of hands‑on site experience, Linda Hill excels in safety enforcement, heavy‑equipment operation, and blueprint reading, and leverages her curiosity
    for sustainable building methods while balancing a laid‑back, sometimes disorganized approach to project planning as she works toward a foreman certification.
  sports: Linda Hill’s athletic pursuits revolve around hiking the Front Range trails with the Rocky Mountain Hiking Club, weekend snowshoeing in winter, and cheering on the Colorado Broncos and Avalanche,
    while she also enjoys casual yoga classes and community 5K runs.
  arts: Linda Hill finds creative release in pottery at the local ceramics studio, listening to folk and acoustic artists like Fleet Foxes, The Lumineers, and Bob Dylan, and attending seasonal performances
    at the Civic Theatre, which together enrich her relaxed yet inquisitive spirit.
  travel: Linda Hill prefers spur‑of‑the‑moment road trips to nearby mountain escapes like Rocky Mountain National Park and plans longer dream vacations to Sedona’s red rocks and New Zealand’s trekking
    routes, balancing her love for nature with a modest travel budget and occasional family constraints.
  culinary: Linda Hill enjoys farm‑to‑table cooking with home‑grown vegetables, favoring dishes such as roasted beet and quinoa salad, homemade sourdough, and kimchi, and possesses an intermediate skill
    level that lets her experiment with herb‑infused oils and seasonal recipes at local farmers' markets.
  core: Linda Hill blends practical construction know‑how with a love for gardening, pottery, and folk music, navigating life with a curious yet easy‑going mindset, a touch of anxiety, and a commitment
    to sustainability.
background:
  cultural: Linda grew up in a small‑town, white working‑class family on Colorado’s Front Range, inheriting a Midwestern‑style work ethic combined with the outdoors‑oriented, community‑focused culture of
    Loveland and Larimer County. Her upbringing emphasized hard work, self‑reliance, and cooperation with neighbors. She celebrates mainstream American holidays such as Thanksgiving and the Fourth of July,
    and participates in regional traditions like the Colorado State Fair and local church gatherings. These cultural roots shape her practical mindset, her appreciation for teamwork, and her desire to maintain
    harmony in both her personal and professional life.
attributes:
  skills: '[''Construction site safety'', ''Concrete mixing and pouring'', ''Framing and carpentry assistance'', ''Basic plumbing and electrical tasks'', ''Heavy equipment operation (backhoe, forklift)'',
