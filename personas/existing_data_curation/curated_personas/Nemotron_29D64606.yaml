  hobbies: '[''Hiking in the Front Range'', ''Gardening'', ''DIY home‑improvement projects'', ''Pottery and ceramics'', ''Listening to folk and acoustic music'', ''Attending community fairs and farmers
    markets'', ''Yoga and meditation'', ''Journaling'', ''Reading construction industry blogs and podcasts'']'
  career_goals: Linda aims to become a certified foreman within the next three to five years, obtaining OSHA certification and a journeyman carpenter or trade certificate. She wants to lead small crews,
    mentor new workers, and champion safety and green‑building practices on her projects. At the same time, she values a flexible schedule that allows her to support her husband and maintain a low‑stress
    home life, so she is exploring part‑time evening courses that would qualify her for specialized roles in sustainable construction or project coordination.
