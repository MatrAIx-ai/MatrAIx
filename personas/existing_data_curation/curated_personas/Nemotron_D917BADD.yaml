  career_goals: James aims to achieve tenure and advance to associate professor within the next five years, while building a research program that secures multi‑year funding and produces interdisciplinary
    publications. He aspires to develop a community partnership initiative that connects university resources with local K‑12 STEM outreach, author a textbook on applied data science, and eventually serve
    as department chair, shaping policies that promote inclusive, evidence‑based teaching.
