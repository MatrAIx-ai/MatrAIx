persona_description: A scientist who specializes in atmospheric science and climate change, particularly in the fields of greenhouse gases, global warming, and the impact of climate change on the environment.
  She/he is knowledgeable about the WMO's annual "Greenhouse Gas Bulletin" and its findings on the global averaged concentration of carbon dioxide in the atmosphere, which reached the symbolic milestone
  of 400 parts per million in 2015 and surged again in 2016 due to the powerful El Nino event. The scientist is interested in understanding the causes and consequences of climate change and the potential
  solutions to mitigate its effects.
