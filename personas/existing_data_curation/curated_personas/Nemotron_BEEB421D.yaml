personas:
  professional: Carlos Fernandez is an aspiring creative director who blends hand‑drawn comic characters with digital illustration tools like Photoshop and Illustrator, leveraging their methodical planning
    skills and charismatic stage presence to lead school art‑club events and community mural projects.
  sports: Carlos Fernandez enjoys playing pick‑up basketball at the local court, follows the Cangrejeros de Santurce baseball team and the San Juan basketball franchise, practices with a youth soccer club
    Cataño FC a few times a week, but often prioritizes eSports tournaments over conventional workouts, treating physical fitness as a secondary competitive outlet.
  arts: Carlos Fernandez immerses themselves in manga and comic art, drawing inspiration from Osamu Tezuka, Jim Lee, and Stan Lee, while remixing reggaeton tracks by Bad Bunny, Marc Anthony, and Rosalía,
    and regularly attends local salsa concerts featuring Nicky Jam, creating fan posters and stage designs that blend Caribbean rhythms with graphic storytelling.
  travel: Carlos Fernandez favors vivid short trips that blend adventure and culture, having explored Old San Juan’s historic districts, camped on Rincón’s surf‑lined beaches, visited the bioluminescent
    bay in Vieques, and dreams of attending the Tokyo International Comic Fair to connect with global manga creators.
  culinary: Carlos Fernandez, an enthusiastic home cook, loves crafting mofongo with chicharrón, perfecting pastelitos de guayaba, experimenting with sushi rolls featuring avocado and spicy tuna, and often
    snacking on arroz con pollo while sketching new characters.
  core: Carlos Fernandez is a hyper‑creative, organized teen who channels competitive energy into art, music remixes, and eSports, sometimes overspending on gadgets and neglecting sunscreen, yet constantly
    dreaming of turning street art into cultural narratives.
background:
  cultural: Carlos grew up in the closely‑knit municipalities of Toa Alta and Toa Baja on the island of Puerto Rico, immersed in a bilingual environment where Spanish is spoken at home and English is learned
    at school. His family maintains traditions such as celebrating the fiestas patronales, preparing arroz con gandules, and playing bomba and plena drums during community gatherings. The vibrant urban
    art scene, graffiti murals, and Caribbean rhythms that echo through the streets have shaped his aesthetic sensibility. He identifies strongly with his Puerto Rican heritage, feeling pride in the island’s
    resilience, its mix of Taino, African, and Spanish roots, and the island’s contemporary pop culture, from reggaeton to local indie art. This cultural immersion informs his artistic themes, his desire
    to uplift local stories, and his commitment to giving back to his community.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Poster and social‑media graphic creation'', ''Project planning and event coordination'', ''Public speaking and
    debate'', ''Improvisational rap and spoken‑word performance'', ''Strategic gaming (chess, eSports)'', ''Critical analysis and research'']'
  hobbies: '[''Sketching and digital painting'', ''Street photography'', ''Listening to and creating reggaeton/salsa music'', ''Dancing'', ''Reading sci‑fi and fantasy'', ''Philosophical podcasts'', ''Coding
    simple interactive art'', ''Chess club'', ''Online eSports tournaments'', ''Volunteering at local festivals'', ''Stage management and performance'']'
  career_goals: He aspires to channel his creative and organizational talents into a career where he can shape visual narratives for his community. In the short term, Carlos plans to complete his secondary
    education through an alternative high‑school program, develop a portfolio of digital art and community‑project designs, and secure an apprenticeship with a local graphic‑design studio or cultural center.
    Long‑term, he dreams of becoming a creative director or multimedia artist specializing in projects that celebrate Puerto Rican heritage, such as public murals, interactive installations, and culturally‑focused
    media campaigns. He also envisions launching a youth‑led art collective that mentors peers, produces street‑art events, and leverages social media to amplify Caribbean cultural stories.
