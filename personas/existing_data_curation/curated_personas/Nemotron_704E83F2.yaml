  hobbies: '[''Journaling'', ''Reading contemporary fiction'', ''Yoga'', ''Hiking local trails'', ''Volunteer work at animal shelter'', ''Neighborhood clean‑up events'', ''Baking'']'
  career_goals: Marie aims to pursue a Bachelor of Social Work or a related health‑service degree within the next two years, building on her practical experience in community volunteering. Her long‑term
    ambition is to become a case manager or community health coordinator, where she can blend her organizational strengths with her compassion for helping others. She envisions working for a local nonprofit
    or healthcare provider in Southern New Jersey, creating programs that improve access to mental‑health and wellness services for underserved populations, while maintaining a balanced, structured work
    environment.
