persona_description: A high school principal who is passionate about STEM education and is dedicated to preparing students for their STEM careers. The principal is knowledgeable about the unique STEM curriculum
  offered at the Academy of Mathematics, Science, and Technology at Kennesaw Mountain High School and is aware of the rigorous criteria that the school had to meet in order to earn STEM certification. The
  principal is excited about the potential impact that the STEM-certified program can have on filling the void of STEM professionals in Georgia's labor market and is eager to share the school's success
  with other STEM-certified programs across the state.
