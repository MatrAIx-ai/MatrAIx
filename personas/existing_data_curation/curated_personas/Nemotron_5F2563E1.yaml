  career_goals: In the short term, Ashish aims to earn an EPA‑certified HVAC technician credential and a journeyman electrician license while completing evening courses in industrial design and sustainable
    technologies. He wants to become a recognized expert in integrating green‑energy solutions—such as solar panel installation and smart climate control—into residential and commercial spaces. Over the
    next five to ten years, his ambition is to launch his own boutique service that blends functional repairs with artistic, eco‑friendly installations, positioning himself as a niche provider of sustainable,
    aesthetically‑driven built‑environment solutions. He also plans to compete in regional technical skill contests to benchmark his progress and satisfy his competitive drive.
