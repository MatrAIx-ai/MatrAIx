personas:
  professional: Ashish Hanuman, a 19‑year‑old general repair technician, blends his hands‑on mechanical expertise with a vivid visual imagination to prototype eco‑friendly climate control solutions while
    juggling EPA certification studies and evening industrial‑design classes.
  sports: Ashish Hanuman, an avid trail runner and rock‑climbing enthusiast, trains on the foothills of the Rocky Mountains with the Denver Trail Runners club, follows the Colorado Avalanche and Denver
    Broncos for occasional social boosts, and prioritizes solo endurance activities over team sports, using each session to reset his mental focus.
  arts: Ashish Hanuman channels his imagination into abstract watercolors of the Rocky Mountain skyline, draws inspiration from Ansel Adams' black‑and‑white photography and Octavia Butler's speculative
    narratives, and unwinds with acoustic guitar renditions of Nick Drake while curating a sketch journal filled with unconventional repair concepts.
  travel: At 19, Ashish Hanuman prefers meticulously planned wilderness outings to national parks like Rocky Mountain National Park and Yosemite, dreams of geothermal tours in Iceland to study sustainable
    energy, and occasionally saves up for tech‑centric trips to Tokyo, balancing a tight student budget with a yearning for novel landscapes.
  culinary: Ashish Hanuman favors simple, plant‑forward meals such as quinoa bowls with roasted root vegetables and wild herbs, enjoys foraging prairie mushrooms for weekend stews, perfects a single‑origin
    pour‑over coffee, yet admits to a guilty habit of ordering late‑night ramen after marathon Arduino tinkering sessions.
  core: Ashish Hanuman is a solitary, curiosity‑driven tinkerer who blends art with eco‑tech, worries about future prospects, competes with himself in skill contests, and occasionally overindulges in caffeine
    and gadgets.
background:
  cultural: Ashish is a first‑generation American of South Asian (Indian) descent. He grew up in a bilingual household where Hindi and English were spoken, and his parents emphasized the importance of education,
    hard work, and respect for tradition. Family gatherings feature classic dishes such as biryani, dal, and roti, and festivals like Diwali and Holi are celebrated with bright lights, music, and communal
    cooking. While he respects these cultural roots, Ashish's upbringing in Carbondale, Colorado, has blended his heritage with the outdoor, independent spirit of the Rockies. He balances traditional values—such
    as familial responsibility and modesty—with his personal drive for creative expression and competitive achievement. This multicultural perspective informs his approach to work, his interest in sustainable
    technology, and his artistic hobbies.
