personas:
  professional: Kellie Hlavac is a pharmacy technician who leverages systematic checklists, inventory control expertise, and a business degree to streamline medication preparation and budgeting, while they
    love routine and also show a willingness to improvise when unexpected prescription issues arise.
  sports: Kellie Hlavac enjoys cheering on the Chicago Bears, Bulls, and Cubs from the couch on game days, occasionally joins a co‑ed recreational softball league at a local park for weekend fitness, and
    they balance this passive fandom with a personal routine of morning yoga sessions that keep their flexibility and stress levels in check.
  arts: Kellie Hlavac channels creative energy into knitting colorful scarves and blankets while they listen to Sufjan Stevens and the Chicago Symphony Orchestra, unwinds with board game nights featuring
    Settlers of Catan, and draws inspiration from business‑focused podcasts and self‑help audiobooks, integrating art and practicality into their leisure time.
  travel: Kellie Hlavac prefers low‑key weekend getaways planned in advance, such as a breezy bike‑tour of Milwaukee’s lakefront, a cozy cabin stay in Door County, and a culinary trip to New Orleans, while
    they dream of a future European itinerary that includes a month‑long culinary tour of Tuscany, all balanced against a modest travel budget and family commitments.
  culinary: Kellie Hlavac enjoys cooking simple, family‑friendly meals like pesto‑tossed spaghetti using basil from their balcony garden, sheet‑pan lemon‑rosemary chicken, and homemade veggie pizza topped
    with fresh mozzarella and oregano, while they showcase a moderate cooking skill set that blends practical meal‑prep efficiency with occasional culinary experimentation.
  core: Energetic yet routine‑oriented, Kellie Hlavac balances a practical pharmacy career with a love for gardening, knitting, and Chicago sports, while they navigate occasional disorganization and a penchant
    for spontaneous, tactile projects.
background:
  cultural: Kellie was raised in a middle‑class, Midwestern family of European descent (her parents are of Polish‑German heritage) in the suburbs of Chicago. Her upbringing emphasized practicality, reliability,
    and community involvement, with traditions such as holiday gatherings, church attendance, and local volunteerism. Growing up in the diverse Chicago area gave her an appreciation for the city’s multicultural
    food scene and sports culture while her family values remain rooted in modesty and a strong work ethic. These influences shape her pragmatic outlook, her dedication to family life, and her comfort with
    both familiar routines and occasional community‑driven spontaneity.
attributes:
  skills: '[''Medication preparation & compounding'', ''Prescription data entry & verification'', ''Inventory management & ordering'', ''Pharmacy software operation (e.g., PioneerRx, QS/1)'', ''Drug interaction
    and dosage calculation knowledge'', ''Customer service and patient counseling'', ''Financial budgeting and cost analysis'', ''Process improvement using Lean methodology'', ''Project coordination for
    new product rollouts'', ''Data analysis with Excel and Tableau'', ''Team collaboration'', ''Assertive communication'', ''Conflict resolution'']'
  hobbies: '[''Meal planning & home cooking'', ''Herb gardening'', ''Morning yoga'', ''Volunteer work at health fairs'', ''Watching Chicago sports (Cubs, Bears, Bulls)'', ''Board game nights'', ''Reading
    business/self‑help books'', ''Listening to health and business podcasts'', ''Knitting and crafting'']'
  career_goals: Kellie's primary ambition is to move from a pharmacy technician role into a supervisory or management position within the next three to five years, leveraging her business degree to oversee
    operations, improve efficiency, and control budgets. She plans to earn the Certified Pharmacy Technician (CPhT) credential and complete a pharmacy management certification program. In the longer term,
    she hopes to transition into a healthcare business analyst or operations manager role for a regional pharmacy chain or health system, where she can design workflow automation and contribute to community
    health initiatives while maintaining a schedule that accommodates her family life and preference for predictable routines.
