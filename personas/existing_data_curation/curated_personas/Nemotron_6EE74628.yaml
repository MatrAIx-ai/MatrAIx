  career_goals: John dreams of turning his love for art and abstract ideas into a future career. In the short term, he hopes to attend an art‑focused high school program where he can deepen his drawing
    and digital design skills. Long‑term, he aspires to become a concept artist or graphic novelist, creating immersive visual stories that inspire others. He is also intrigued by the intersection of science
    and art, imagining a path that could lead to scientific visualization or video‑game design, where he can blend his imaginative storytelling with technology.
