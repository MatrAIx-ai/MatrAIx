personas:
  professional: John Henderson, an aspiring visual storyteller, blends watercolor techniques with digital illustration on his tablet, channeling their love for fantasy worlds into interactive Scratch animations
    that showcase their knack for turning solitary sketches into lively, story‑driven projects.
  sports: John Henderson follows the Greenwood Strikers youth soccer club, enjoys watching the New York Knicks during the winter season, and embraces weekend hikes in Riverside Park for cardio, preferring
    low‑impact activities over organized team sports, yet occasionally neglects consistent stretching.
  arts: John Henderson, a budding fantasy illustrator, draws inspiration from the imaginative worlds of J.K. Rowling and the cinematic scores of Hans Zimmer, practices piano pieces by Yiruma to match their
    artwork moods, and reveres classic watercolor masters like John Singer Sargent while collecting limited‑edition prints from contemporary comic artist Jim Lee.
  travel: John Henderson plans family road trips with a map‑filled notebook, relishes weekend excursions to the nearby state wildlife preserve for sketching, dreams of traveling to Kyoto’s bamboo forest
    and Iceland’s Aurora Borealis, and prefers budget‑friendly stays that allow time for drawing in quiet cafés where they can unwind.
  culinary: John Henderson favors creative snacks like avocado toast topped with chili flakes, bakes chocolate brownies for school fundraisers, enjoys the simple comfort of spaghetti carbonara, experiments
    with beginner sushi rolls using fresh salmon and cucumber, and often over‑salts their sauces.
  core: John Henderson is a quietly curious 12‑year‑old who transforms solitary fantasy sketches into digital stories, juggling a love for music, code, and LEGO while they habitually lose track of bedtime.
background:
  cultural: John grew up in a middle‑class, predominantly white family in suburban Canton, Georgia, a community shaped by Southern hospitality and close‑knit neighborhood ties. His family observes traditional
    holidays such as Thanksgiving, Fourth of July fireworks, and local festivals that celebrate Georgia's agricultural heritage. While the household reflects mainstream American customs, it also values
    respect for elders, community involvement, and a love of the outdoors, influences that subtly inform his artistic sensibilities and his emphasis on harmony and cooperation with peers.
