persona_description: A scientist who studies the interaction between periodontal pathogens, such as Porphyromonas nigrescens, and the development of atherosclerosis. She has a particular interest in the
  mechanisms by which P. nigrescens contributes to the pathogenesis of periodontal disease and the potential role it plays in the development of atherosclerosis. Her research aims to establish a cause-and-effect
  relationship between P. nigrescens and periodontitis, which could be used as a marker for gum disease through more rigorous and long-term research.
