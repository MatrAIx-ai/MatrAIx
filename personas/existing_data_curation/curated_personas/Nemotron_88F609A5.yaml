personas:
  professional: Donald Hockman, a 16‑year‑old high‑school junior, is an aspiring graphic designer who blends self‑taught digital illustration skills with a hands‑on, improv‑style problem‑solving mindset,
    channeling his curiosity and love for indie culture into a growing portfolio of freelance sketches, concept art for local indie game developers, and community‑center mural projects.
  sports: Donald Hockman, a dedicated skateboarder, spends afternoons rolling through the town’s skate park and local abandoned plazas, idolizes pro skaters like Yuto Horigome and Jamie Foy, occasionally
    cheers on the regional basketball team the Riverdale Raptors, and maintains a casual bike‑maintenance habit that doubles as low‑impact cardio.
  arts: Donald Hockman, an avid creator, fills sketchbooks with comic‑style characters inspired by graphic novels such as Saga and Monstress, spins vinyl records from indie acts like Alvvays, Mac DeMarco,
    and The Shins while sketching, attends live shows at the downtown venue The Lantern, volunteers at the community art center teaching mural techniques, and caps evenings with indie films like Moonrise
    Kingdom and The Grand Budapest Hotel that fuel their eclectic visual aesthetic.
  travel: Donald Hockman, who prefers spontaneous day trips over structured tours, often explores nearby abandoned barns and historic railway stations for photography, dreams of a backpacking adventure
    through the Pacific Northwest’s rain‑soaked forests, and hopes to someday visit Japan’s manga districts, while budgeting trips with saved earnings from art sales and relying on rideshare apps for local
    travel.
  culinary: Donald Hockman, an experimental home cook, loves whipping up avocado toast topped with smoked paprika, crafting quick ramen bowls with fresh basil and soft‑boiled eggs, and baking sweet potato
    brownies, while their go‑to snack after skate sessions is a spicy honey‑glazed pretzel, reflecting a palate that mixes comfort foods with bold, indie‑flavor twists.
  core: Donald Hockman, a 16‑year‑old skate‑loving illustrator with a penchant for vintage vinyl, navigates life through spontaneous creativity, occasional procrastination, and a relentless curiosity for
    the off‑beat.
background:
  cultural: Raised in Troy, a small town in Miami County, Ohio, Donald grew up in a predominantly white, Midwestern environment where community ties, high school sports events, and county fairs are central
    to social life. His family’s roots lie in the agricultural and manufacturing heritage of the region, exposing him to a blend of modest, practical work ethic and friendly, self‑reliant values. Local
    Protestant traditions emphasized humility and community service, which are reflected in his volunteer work at the art center. While he embraces these regional traditions, his curiosity drives him to
    explore broader artistic subcultures online, blending the Midwestern sensibility of practicality with contemporary creative influences.
