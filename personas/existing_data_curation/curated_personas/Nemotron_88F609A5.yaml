  career_goals: Donald aspires to turn his artistic passion into a sustainable career. He plans to enroll in a community college or vocational program for graphic design or multimedia arts, building a strong
    portfolio that can attract freelance illustration gigs, concept‑art work for indie video games, or local business branding projects. He also aims to develop an online presence—through platforms like
    Instagram and YouTube—to showcase his creations, and ultimately hopes to open a small studio that merges his love for art with community workshops and collaborative projects.
