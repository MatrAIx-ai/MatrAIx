  hobbies: '[''Canoeing and kayaking in local bayous'', ''Fishing on Lake Pontchartrain'', ''Pickup basketball league'', ''Community clean-up and habitat restoration volunteering'', ''Cooking Cajun and
    Creole cuisine'', ''Attending zydeco and jazz concerts'', ''Hiking in wildlife refuges'', ''Nature photography'', ''Reading popular science books on climate change'', ''Playing acoustic guitar'']'
  career_goals: He aims to become a senior environmental engineer leading large-scale coastal restoration and climate adaptation projects in Louisiana, influence regional environmental policy, obtain a
    master’s degree in environmental engineering or sustainability, eventually move into a director-level role overseeing environmental services for a regional agency, and mentor the next generation of
    engineers while fostering community education on resilience.
