  career_goals: Although not yet in the workforce, Astrid’s emerging interests point toward future paths that combine her curiosity, practical problem‑solving, and desire to help others. She envisions a
    career where she can use her bilingual background and hands‑on skills—such as early childhood education, community health outreach, or environmental stewardship—to nurture learning and well‑being in
    her community. Her competitive nature fuels an ambition to excel academically and eventually lead collaborative projects that benefit both her cultural community and the wider society.
