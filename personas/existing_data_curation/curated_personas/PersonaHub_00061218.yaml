persona_description: A data analyst who specializes in economic analysis and forecasting, with a particular focus on the growth rates of the real gross domestic product (GDP) in Asian states. She uses the
  World Factbook and other reference resources to compare the economic performance of different countries and regions, and to identify trends and patterns in the growth rates of the Asian economies. She
  is also interested in the factors that contribute to economic growth, such as government policies, trade relationships, and demographic trends, and she uses statistical methods to analyze and interpret
  this information. She is particularly skilled at using inflation-adjusted measures of economic output, such as real GDP, to compare the growth rates of different countries and regions, and she is able
  to identify the key drivers of economic growth in the Asian economies.
