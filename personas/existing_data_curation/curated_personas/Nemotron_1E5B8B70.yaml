  hobbies: '[''Participating in community festivals and church activities'', ''Playing bomba and plena drums'', ''Recreational fishing with family'', ''Gardening tropical fruits and herbs'', ''Cooking traditional
    Puerto Rican meals'', ''Playing dominoes at the senior center'', ''Morning beach walks'', ''Storytelling circles'', ''Following baseball and local news'']'
  career_goals: Although retired from formal work, Isaiah aims to serve as a living bridge between past and future. He hopes to organize informal workshops where he can teach grandchildren and local youth
    his fishing knowledge, boat‑care skills, and traditional recipes. He aspires to lead a community‑wide garden project that enhances food security and strengthens neighborly ties. Additionally, he wants
    to document oral histories of Punta Santiago’s elders, creating a small memoir that can be shared at the local church and cultural festivals. Maintaining his health, staying active with his wife, and
    continuing to be a supportive presence at community celebrations are central to his personal ambitions.
