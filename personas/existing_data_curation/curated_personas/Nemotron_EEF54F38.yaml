  career_goals: Even at 97, Amanda’s ambition is to leave a lasting legacy for her grandchildren and the Council Bluffs community. She plans to compile a memoir that weaves together personal memories, family
    recipes, and local history, and to donate her handwritten journals to the Pottawattamie County Historical Society. Additionally, she hopes to mentor younger volunteers at the senior center, teaching
    them practical skills like gentle caregiving, budgeting, and community storytelling. Her overarching goal is to ensure that her lived experience continues to benefit future generations.
