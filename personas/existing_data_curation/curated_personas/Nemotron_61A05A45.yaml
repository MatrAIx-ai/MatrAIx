  career_goals: Robert aims to move into a supervisory role within the next few years, leveraging his experience to oversee a warehouse team and improve operational efficiency. He is interested in obtaining
    a certification as a Certified Logistics Associate and eventually managing a small regional moving or freight service of his own, allowing him to combine his competitive drive with stable income for
    his family. He also plans to improve his formal education by completing a GED to broaden future opportunities.
