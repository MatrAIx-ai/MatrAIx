  hobbies: '[''Hiking'', ''Trail Biking'', ''Yoga'', ''Meditation'', ''Japanese Tea Ceremony'', ''Calligraphy Workshops'', ''Cooking Fusion Cuisine'', ''Volunteer at Food Pantry'', ''Book Club (Contemporary
    Fiction & Philosophy)'', ''Community Theater'']'
  career_goals: Kuniko aims to advance to a senior leadership role such as HR Director or Chief People Officer within the next five years, where she can shape a people‑first culture that blends structured
    processes with flexibility. She is passionate about expanding diversity, equity, and inclusion initiatives, particularly for Asian‑American employees, and plans to launch a mentorship program for mid‑career
    women. Long‑term, she envisions consulting on cross‑cultural workplace integration and authoring a guide on harmonious conflict resolution.
