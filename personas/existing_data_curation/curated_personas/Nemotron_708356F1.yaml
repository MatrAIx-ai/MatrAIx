personas:
  professional: Kuniko Do, a senior HR strategist with 20 years of expertise in employee relations, talent acquisition, and performance analytics, they leverage bilingual fluency and a meditation‑honed
    calm to mediate disputes while they balance a love for structured processes with occasional spontaneous, people‑first initiatives that sometimes stretch deadlines.
  sports: Kuniko Do, an avid hiker and trail‑biker who joins the Colorado Mountain Club’s monthly summit outings, they regularly practice yoga at Flow Yoga studio, cheer on the Denver Broncos in the fall
    while also following the Colorado Rockies and Denver Nuggets during baseball and basketball seasons, and occasionally attend Colorado Avalanche games for a winter night out.
  arts: Kuniko Do, a calligraphy workshop facilitator who finds tranquility in the tea ceremony, they regularly attend performances at the Boulder Summer Shakespeare Festival, draw inspiration from the
    ambient piano works of Ryuichi Sakamoto and the folk‑rock storytelling of Sufjan Stevens, and indulge in contemporary novels by Haruki Murakami and Margaret Atwood during book‑club meetings.
  travel: Kuniko Do, who balances meticulous itineraries with spontaneous weekend getaways, they often retreat to the alpine trails of Rocky Mountain National Park and Aspen for skiing, savor the historic
    tea gardens of Uji, explore the sushi‑laden streets of Osaka, and wander the vineyards of Tuscany, always ensuring the travel budget aligns with their commitment to the Lafayette food pantry.
  culinary: Kuniko Do, a proficient home chef, they delight in crafting Colorado‑Japanese fusion plates such as miso‑glazed bison ribs with roasted beet‑carrot mash, matcha‑infused quinoa salads, and sushi‑style
    burritos featuring locally caught trout, while regularly sourcing organic kale, heirloom tomatoes, and shiso leaves from the Lafayette farmers’ market and occasionally treating friends to a tea‑ceremony‑themed
    dinner.
  core: Kuniko Do, a 50‑year‑old bilingual HR veteran who blends zen calm with occasional deadline‑dashing spontaneity, they channel a love for mountains, tea, and equitable workplaces into a life of structured
    compassion while occasionally over‑indulging in premium matcha and artisanal bike gear.
background:
  cultural: Kuniko was born to Japanese immigrant parents and grew up bilingual, deeply rooted in the values of respect, harmony, and group cohesion characteristic of Japanese culture. While living in Lafayette,
    Colorado, she has embraced the region’s outdoorsy lifestyle and the American emphasis on individuality and egalitarianism. She actively participates in the Colorado Japanese Association, celebrates
    traditional holidays such as Obon and New Year, and incorporates practices like the tea ceremony and ikebana into her personal life. These cultural influences shape her professional ethos, emphasizing
    empathy, collaborative problem‑solving, and a balanced approach that honors both structured processes and flexible adaptation.
attributes:
  skills: '[''Employee Relations'', ''Conflict Resolution'', ''Talent Acquisition'', ''Onboarding'', ''Performance Management'', ''Learning & Development'', ''HR Policy Development'', ''Benefits Administration'',
