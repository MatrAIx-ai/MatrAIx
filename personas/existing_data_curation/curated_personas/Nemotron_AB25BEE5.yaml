personas:
  professional: Evelyn Carandang, a newborn, already delights in exploratory play, waving colorful toys and babbling rhythmic sounds, hinting at a future path as a creative thinker who thrives on novelty
    and collaborative environments.
  sports: Evelyn Carandang, a newborn participates in parent‑led baby yoga sessions, giggles during family movie nights when a soccer ball rolls across the floor, and already shows a fledgling fandom for
    the Chicago Cubs, proudly waving a team flag in the playpen.
  arts: Evelyn Carandang, a newborn responds energetically to the warm tones of Nina Simone’s jazz recordings and the vivid colors of Van Gogh’s Starry Night prints displayed in the nursery, often cooing
    in rhythm and reaching for soft, textured toys, embedding a love for music and visual art early on.
  travel: Evelyn Carandang, a newborn who has already visited the family’s countryside home, experienced a weekend road trip to the beach, and is slated to accompany parents on a summer vacation to New
    York City’s Central Park, preferring car rides with soothing music over the bustle of airports.
  culinary: Evelyn Carandang, a newborn delights in the silky smooth texture of sweet potato puree and the occasional hint of cinnamon in homemade oatmeal, while her parents rotate between formula feeding
    and freshly milled rice cereal, fostering a palate that favors gentle, mildly sweet flavors.
  core: Evelyn Carandang, a newborn whose boundless curiosity, spontaneous giggles, and intense emotional swings make each day a delightful yet demanding adventure for her loving family.
background:
  cultural: Evelyn is raised in Akron, Ohio, within a white American family that reflects Midwestern values of community, modesty, and hospitality. Her upbringing includes participation in local traditions
