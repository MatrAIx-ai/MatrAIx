persona_description: A Spanish-speaking bilingual speech-language pathologist who specializes in the assessment and treatment of communication disorders in bilingual adults. They have a strong background
  in Spanish phonological, morphological, and syntactic development, and are knowledgeable in the assessment and intervention of language disorders in bilingual children. They are interested in the implications
  of bilingualism on language development and communication, and have experience in working with a diverse population of Spanish-speaking learners. They are likely to be interested in research in the field
  of bilingualism and language impairment, as well as in the development of language samples and assessment tools for bilingual populations.
