personas:
  professional: Linda Achong, a 17-year-old high school student, is a volunteer coordinator who leverages their exceptional organizational skills, confident public speaking, and sociable nature to run after-school
    workshops and community events, and they plan to turn this experience into a future career in communications and social work.
  sports: Linda Achong, 17, plays pickup basketball at the community center during the fall, follows the Detroit Pistons and Michigan State Spartans closely, belongs to the local youth sports club where
    they prioritize teamwork over competition, and they schedule practice sessions around school and volunteer commitments with meticulous timing.
  arts: Linda Achong, 17, participates in the school choir, where they delight in performing songs by Beyoncé and John Legend, sketches contemporary streetwear fashion inspired by designers like Virgil
    Abloh, and creates short TikTok performance clips that blend choreography with study-tip narratives, reflecting their love for performance and visual creativity, and they often share these videos with
    friends for feedback.
  travel: Linda Achong, 17, dreams of a structured spring break trip to Washington, D.C., having already visited the nearby Great Lakes region and the National Museum in Chicago, and they plan future travel
    itineraries using spreadsheet templates to ensure budget compliance while balancing family commitments, and they favor destinations that offer educational tours and organized group activities.
  culinary: Linda Achong, 17, experiments with family recipes such as garlic-butter chicken thighs and homemade sushi rolls, enjoys incorporating fresh basil, feta cheese, and roasted red peppers, rates
    themselves as an intermediate cook who delights in sharing meals during community events, and they often film cooking tutorials for TikTok to combine culinary skill with social engagement.
  core: Linda Achong, 17, is an ultra-organized, socially vibrant teen who juggles community leadership, creative TikTok content, and a habit of late-night editing, and they occasionally neglect sleep in
    pursuit of perfection.
background:
  cultural: Linda identifies as Black and embraces a rich cultural heritage that blends African‑American traditions with Caribbean influences from her family’s Jamaican roots. Growing up in Dearborn, she
    is exposed to a multicultural environment that broadens her perspective, yet she maintains strong connections to her community through church, family gatherings, and local cultural festivals. Music,
    dance, and food from her heritage play a central role in her life, while the city’s diverse neighborhoods foster an appreciation for varied cultural expressions and community solidarity.
