  career_goals: Linda aspires to pursue a degree in communications or social work after completing high school, aiming to build a career in community outreach and public relations. She envisions herself
    as a program director for a youth empowerment nonprofit in Dearborn, where she can design and implement mentorship initiatives that provide structured support for at‑risk teens. Long‑term, she hopes
    to become a recognized champion for civic engagement, using her organizational talents and sociable nature to foster inclusive community development.
