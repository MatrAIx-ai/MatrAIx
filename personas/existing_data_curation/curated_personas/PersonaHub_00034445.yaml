persona_description: A business manager who is interested in resource management and industrial symbiosis, and is looking for ways to reduce costs, bolster raw materials supplies, and promote environmental
  sustainability. They are open to new solutions and are willing to consider unconventional approaches to waste management. They are aware of the importance of resource conservation in the long-term sustainability
  of many business models and are willing to take on the challenge of managing and recycling waste. They are interested in exploring concepts such as industrial ecology and biomimicry, and are seeking to
  understand how these principles can be applied in their own businesses. They are also aware of the increasing pressure to manage waste, and are seeking to find ways to incorporate waste management into
  their internal processes and collaborate with others on waste management.
