persona_description: A geologist who specializes in the study of paleontology, particularly in the identification and chemical analysis of fossil pigments and their effects on preservation. They are interested
  in understanding the preservation mechanisms of pigments in fossils and the implications for the reconstruction of ancient animal behavior and evolution. They are likely to be familiar with the use of
  time-of-flight secondary ion mass spectrometry for the identification of melanin in fossils and the potential for diagenetic alteration of pigments in the fossil record.
