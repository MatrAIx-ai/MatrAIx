personas:
  professional: Jorge Jimenez, a bilingual middle‑school educator renowned for designing interdisciplinary curricula that blend visual art, cultural storytelling, and technology, they leverage meticulous
    lesson planning and compassionate mentorship to foster inclusive classrooms while pursuing a path toward district‑wide curriculum leadership.
  sports: Jorge Jimenez, an avid hiker, they join the Lakeview Trail Club for weekend treks along the shoreline, follow the Chicago Bulls during the basketball season and support the Chicago Cubs in baseball,
    and choose paddle‑boarding in summer to complement their cardio routine.
  arts: Jorge Jimenez, a painter of bright landscapes that fuse family‑rooted folk motifs with the wide‑open skies of the Midwest, they strum acoustic guitar to folk‑rock favorites like John Denver, capture
    street scenes through a vintage 35mm camera, and curate monthly visits to local galleries featuring artists such as Georgia O’Keeffe and Claude Monet.
  travel: Jorge Jimenez, a purposeful traveler, they prefer weekend road trips to destinations like Santa Fe for its adobe architecture and New Orleans for its vibrant music scene, meticulously plan itineraries
    using travel forums, and dream of exploring the historic streets of Barcelona to study its mosaics and plazas.
  culinary: Jorge Jimenez, a home chef, they frequently cook traditional stews and corn‑based dishes such as mole, tamales, and chiles en nogada, delight in grinding fresh chilies and roasting cacao nibs
    for complex sauces, and pair each meal with a curated selection of regional craft beers.
  core: Jorge Jimenez, a disciplined yet empathetic educator, they mix meticulous lesson plans with spontaneous paint‑splattered hikes, never miss a chance to blend cultural flavors into work, study, and
    leisure.
background:
  cultural: Raised in a Mexican‑American household, Jorge grew up celebrating Día de los Muertos, Semana Santa, and family gatherings centered around shared meals and storytelling. Bilingual from childhood,
    he navigates both Mexican and American cultural norms, often acting as a bridge between the two communities in Wadsworth. He incorporates Mexican artistic traditions, such as papel picado and mural
    techniques, into his lesson plans, fostering cultural pride among his students and promoting cross‑cultural understanding within the broader community.
attributes:
  skills: '["Bilingual Spanish‑English communication", "Classroom management", "Curriculum development with arts integration", "Digital education tools (Google Classroom, interactive whiteboards)", "Student
    mentorship and counseling", "Organizational planning and assessment", "Culturally responsive teaching"]'
  hobbies: '["Painting (folk and contemporary styles)", "Playing acoustic guitar", "Hiking local lake trails", "Cooking traditional Mexican dishes", "Photography (street and nature)", "Reading contemporary
    literature", "Visiting art galleries and museums", "Participating in cultural festivals"]'
  career_goals: Jorge aims to advance from his current teaching role to become a lead curriculum specialist focused on arts integration within the district, eventually pursuing a master's degree in Education
    Administration. He envisions establishing a community‑based after‑school arts program that celebrates Mexican heritage and multicultural dialogue, and hopes to mentor new teachers in inclusive pedagogical
    practices. Long‑term, he aspires to influence district‑wide policy on culturally responsive education while maintaining his direct impact on student growth.
