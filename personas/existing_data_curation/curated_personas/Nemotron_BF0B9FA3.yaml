personas:
  professional: Marian Montgomery, an aspiring naturalist and junior field journalist, blends curiosity with practicality by meticulously documenting wildlife in a nature journal, sketching the countryside,
    and volunteering at the county animal shelter, where their compassionate and cooperative spirit drives collaborative projects with peers.
  sports: Marian Montgomery enjoys weekend hikes in the nearby hills, participates in the local youth cross‑country team, and cheers on the State Wildcats baseball squad and the County Tigers soccer club,
    balancing adventurous trail runs with a love for watching professional basketball games on Saturday evenings.
  arts: Marian Montgomery fills sketchbooks with inked scenes of local wildlife, strums a ukulele to folk tunes by Pete Seeger and Joan Baez at community gatherings, and draws inspiration from the illustration
    style of Emily Carroll and the fantasy worlds of J.K. Rowling, weaving music and drawing into their everyday leisure.
  travel: Marian Montgomery explores the region through family road trips to Great Smoky Mountains National Park and coastal Bar Harbor, savoring the adventure of mapping trailheads, while dreaming of future
    travels to Yellowstone’s geysers and the historic castles of Scotland’s Highlands when a school anniversary trip is organized.
  culinary: Marian Montgomery loves to help harvest carrots, zucchini, and basil from the garden and whip up a simple sautéed vegetable medley with garlic, or stir fresh tomato soup, and occasionally treats
    the family to a warm apple crumble using farm‑grown apples and cinnamon, though they often forget to set a timer and end up slightly overcooking the veggies.
  core: Marian Montgomery is a curiosity‑driven, compassionate 12‑year‑old who blends nature journaling, ukulele folk songs, and garden‑to‑table cooking into a flexible, sometimes disorganized, yet heartfelt
    approach to life.
background:
  cultural: Marian comes from a white, multigenerational family rooted in the small, close‑knit community of Crab Orchard, Kentucky. Her upbringing is shaped by Appalachian cultural traditions that value
    storytelling, folk music, and a deep respect for the land. The family regularly attends a local Southern Baptist church, where community service and hospitality are emphasized. Seasonal events like
    county fairs, bake‑sales, and church potlucks reinforce her sense of belonging and collective responsibility. While she appreciates the heritage of her rural surroundings, Marian also embraces modern
    influences through school, online learning, and contemporary music.
attributes:
