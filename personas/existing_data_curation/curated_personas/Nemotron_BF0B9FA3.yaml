  hobbies: '[''Reading fantasy and science books'', ''Creative writing'', ''Drawing and painting nature scenes'', ''Birdwatching'', ''Nature journaling'', ''Gardening vegetables and flowers'', ''Caring
    for family pets'', ''Playing the ukulele'', ''Volunteering at the animal shelter'', ''Participating in 4‑H club projects'']'
  career_goals: Marian dreams of a career that lets her combine her love of science with her deep desire to help others. She is most intrigued by becoming an elementary school teacher, where she can foster
    curiosity and kindness in younger students while creating a supportive classroom atmosphere. At the same time, she is exploring the path to a nursing degree, hoping to serve her rural community’s health
    needs as a pediatric nurse. In either role, she envisions staying close to Crab Orchard and contributing to local wellness and education initiatives.
