personas:
  professional: Frederick Howard is an aspiring comic‑artist and digital content creator whose talent for sketching and video editing shines in school theater productions, while their spontaneous, talkative
    nature fuels bold storytelling but often clashes with deadlines and organization.
  sports: Frederick Howard enjoys weekend hikes along the nearby Appalachian Trail, cheers loudly for the Tennessee Titans and Nashville Predators, participates in a local youth soccer club named the Farragut
    Fireflies, and swears by morning basketball drills despite a habit of forgetting their water bottle.
  arts: Frederick Howard immerses themselves in creative expression by drawing comic‑style heroes inspired by Stan Lee and Alex Ross, strumming a ukulele to songs by Taylor Swift, The Beatles, and Chris Stapleton,
    and editing short, meme‑filled videos that reference TikTok stars like Charli D'Amelio, all while collecting limited‑edition Funko Pop! figures.
  travel: Frederick Howard dreams of spontaneous road trips to the Great Smoky Mountains, weekend visits to Nashville’s music scene, and a future adventure to Tokyo’s Akihabara district, preferring last‑minute
    planning and a backpack full of sketchbooks over meticulous itineraries.
  culinary: Frederick Howard loves the comfort of fried chicken, buttery biscuits, and maple‑glazed mac and cheese, enjoys crafting homemade pizza with pepperoni and extra cheese, and often experiments
    with blending sweet honey butter into their morning oatmeal.
  core: Frederick Howard is a curiosity‑driven, talkative 12‑year‑old who blends comic art and ukulele tunes, fuels their imagination with video games, yet battles impulsiveness, anxiety, and a knack for
    forgetting homework.
background:
  cultural: Frederick grows up in Farragut, Tennessee, a tight‑knit community in Loudon County with deep Southern roots. His family shares traditions of church gatherings, Sunday family meals featuring
    Southern comfort foods like fried chicken and biscuits, and occasional outings to local music festivals where bluegrass and country tunes are celebrated. While he embraces this heritage—enjoying community
    events, Southern hospitality, and regional folklore—he also absorbs broader American pop culture through streaming services, internet memes, and national music charts. This blend of local Southern identity
    and modern, global influences shapes his outlook, giving him a respect for tradition alongside an eagerness to explore new ideas and artistic expressions.
