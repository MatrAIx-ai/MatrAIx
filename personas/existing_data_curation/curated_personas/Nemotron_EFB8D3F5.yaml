  career_goals: Frederick dreams of turning his love for art, performance, and technology into a career as a multimedia storyteller—perhaps as a filmmaker, video‑game designer, or content creator who can
    blend visual art, music, and narrative. In the short term, he wants to lead his school’s theater club or debate team, improve his ability to meet project deadlines, and develop a personal YouTube or
    TikTok channel where he can share short films and skits. Long‑term, he envisions a role where his charisma and creative vision shape engaging experiences for audiences, while also using his empathy
    to help peers navigate the emotional challenges he knows well.
