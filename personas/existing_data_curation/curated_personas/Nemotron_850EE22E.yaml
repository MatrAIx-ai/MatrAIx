personas:
  professional: Ushaben is a mechanical engineer with expertise in advanced CAD modeling, fluid‑dynamics simulation, and rapid‑prototype fabrication who leverages their methodical, detail‑oriented mindset
    and vivid imagination to bridge engineering teams and artists, and they aim to become a senior R&D leader in renewable‑energy or advanced‑mobility while pursuing a PE license and a boutique consultancy
    for eco‑friendly kinetic art.
  sports: Ushaben participates in a Saturday morning cycling club, practices yoga three times a week, hikes with a local outdoor group during the summer, and is an avid supporter of the Seattle Sounders
    FC, and they prefer low‑impact, community‑oriented fitness activities that align with their reserved yet disciplined disposition.
  arts: Ushaben spends evenings creating abstract watercolor paintings and digital illustrations inspired by the kinetic sculptures of Theo Jansen and the immersive light installations of James Turrell,
    attends monthly gallery openings featuring contemporary abstract artists like Julie Mehretu, and they find solace in the ambient soundscapes of Brian Eno while reading speculative fiction by N.K. Jemisin.
  travel: Ushaben meticulously plans eco‑focused trips, having explored Iceland’s geothermal landscapes, trekked New Zealand’s Milford Track, and attended a tea ceremony in Kyoto, while balancing a desire
    for solo adventure with family responsibilities, and they dream of an upcoming pilgrimage to Patagonia’s glacial parks.
  culinary: Ushaben experiments with modern fusion cuisine, crafting dishes such as spiced cauliflower tikka tacos, coconut‑curry ramen, and cardamom‑infused beet salad, skillfully blending traditional
    aromatic spices like tamarind and miso, while also enjoying progressive tasting menus at lab‑style restaurants, though time constraints sometimes push them toward quick takeout meals and they often
    rely on a reliable meal‑prep routine.
  core: Ushaben is a methodical, imaginative engineer‑artist who relentlessly refines sustainable designs, over‑thinks every detail, and they alternate between disciplined productivity and moments of creative
    escapism.
background:
  cultural: Ushaben was born to Gujarati‑Indian parents who immigrated to the United States in the early 1990s. Raised in a bilingual household where Hindi and Gujarati were spoken alongside English, she
    celebrated Diwali, Navratri, and community gatherings in the Dallas‑Fort Worth area. Her upbringing emphasized academic excellence, respect for tradition, and close family ties, which she balances with
    the progressive, multicultural atmosphere of The Colony, Texas. She integrates Indian culinary traditions, music, and cultural values into her daily life while fully participating in American professional
    and social circles.
attributes:
  skills: '[''SolidWorks / CATIA CAD modelling'', ''Finite Element Analysis (ANSYS)'', ''Computational Fluid Dynamics (CFD)'', ''Project Management (Agile & Lean)'', ''Technical Writing and Documentation'',
