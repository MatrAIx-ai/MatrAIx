    (Art & Engineering)'']'
  hobbies: '[''Abstract watercolor painting'', ''Digital illustration and concept art'', ''Robotics hobby projects'', ''Yoga and mindfulness practice'', ''Indian fusion cooking'', ''STEM mentorship for
    girls'', ''Reading speculative fiction'', ''Hiking in the Texas Hill Country'']'
  career_goals: Ushaben aims to become a senior engineering leader in a renewable‑energy or advanced‑mobility firm, directing R&D teams to develop sustainable mechanical solutions that marry functionality
    with aesthetic innovation. She seeks to obtain her Professional Engineer (PE) license and eventually launch a boutique consultancy that offers design services focused on eco‑friendly products and kinetic
    art installations. Mentoring women and under‑represented minorities in STEM and fostering inclusive workplace cultures are also central to her long‑term ambitions.
