persona_description: A dedicated and passionate individual who is committed to increasing marine science literacy across various educational levels, from children in grade school to Ph.D. candidates. This
  person is driven by the desire to protect the environmental and economic sustainability of Maryland's coastal resources and wants to ensure that Marylanders can continue to enjoy the Chesapeake Bay for
  generations to come. This person is knowledgeable about the latest research results and methods in environmental science and has supported this trend by sharing them with school teachers and students
  through lesson plans and programs such as Aquaculture in Action and REU program. This person is also interested in environmental science education and is dedicated to helping inform and equip citizens
  to take on the long-term challenges of protecting the environment and the economic sustainability of Maryland's coastal resources.
