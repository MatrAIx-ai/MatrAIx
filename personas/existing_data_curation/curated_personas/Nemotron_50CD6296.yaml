  career_goals: Andy aims to translate his hands‑on experience into a supervisory position such as Office Manager within the next two years. He plans to complete his associate degree in Business Administration
    at a local community college and obtain the Certified Administrative Professional (CAP) credential. Additionally, he is exploring remote virtual‑assistant opportunities that would allow him to broaden
    his client base and gain more flexibility. Ultimately, he wants to build a reputation for efficiency and reliability, positioning himself as a go‑to problem‑solver in his organization.
