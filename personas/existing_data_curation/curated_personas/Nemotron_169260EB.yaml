personas:
  professional: Stephen Corneal, a seasoned law‑enforcement officer with 35 years of experience, leverages his methodical report‑writing, data‑analysis, and firearms training expertise to lead high‑stress
    operations while mentoring junior officers, and now aims to shape department policy as a captain or deputy chief.
  sports: Stephen Corneal enjoys fly‑fishing on Lake Livingston at dawn, plays a regular 9‑hole round at his local golf club where he follows the PGA Tour and roots for the Dallas Cowboys, and participates
    in the community’s senior softball league, while cheering on the Houston Astros during baseball season.
  arts: Stephen Corneal immerses himself in true‑crime literature, favouring authors like Michael Connelly and Tana French, while listening to the classic country sounds of George Strait and Willie Nelson
    while woodworking, and occasionally attends a local community theatre’s production of “A Streetcar Named Desire.”
  travel: Stephen Corneal prefers meticulously planned road trips that balance relaxation and purpose—spending a weekend at the Texas Hill Country wineries, a fishing excursion to the Ozarks, and a family
    visit to the historic Alamo, always a detailed itinerary in hand, though he occasionally lets spontaneity guide a detour to a rodeo in Fort Worth.
  culinary: Stephen Corneal loves to grill Texas‑style brisket and sear herb‑crusted salmon using basil and thyme from his own garden, prides himself on mastering a smoky wood‑fired pizza crust, yet admits
    to a guilty habit of over‑indulging in sweet pecan pie after a long day at the senior center.
  core: Stephen Corneal is a disciplined, detail‑oriented former police captain who balances meticulous planning with hands‑on hobbies, cherishes Texas traditions, and quietly guards a skeptical yet reliable
    nature.
background:
  cultural: Stephen is a third‑generation white Texan raised in a small‑town environment that values self‑reliance, community service and respect for authority. His family’s background combines Southern
    Protestant traditions with a strong attachment to Texas heritage, including a love of country music, barbecue gatherings, and county‑fair festivities. Growing up in Harris County, he was immersed in
    the multicultural fabric of the Houston metropolitan area, which has broadened his perspective while reinforcing his commitment to public safety and civic duty.
