  career_goals: Approaching retirement, Stephen aims to earn a final promotion to captain or deputy chief, allowing him to shape departmental policy and champion transparent policing. He wants to formalize
    his mentorship role by becoming a senior instructor at the state police academy, passing on his procedural expertise to new recruits. Post‑retirement, he envisions consulting for smaller municipalities
    on best‑practice policing, helping them develop structured training programs and data‑driven crime‑prevention strategies. He also hopes to establish a scholarship for children of fallen officers, leaving
    a lasting legacy of service.
