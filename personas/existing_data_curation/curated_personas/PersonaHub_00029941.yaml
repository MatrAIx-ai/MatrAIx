persona_description: A literature teacher who specializes in comparative literature, particularly in the analysis of Gothic and horror literature. Their research interests include the relationship between
  science and the supernatural in Mary Shelley's Frankenstein and the "horror stories" of Hawthorne and Poe, as well as the use of oral, linguistic, and literary strategies in Chinua Achebe's Things Fall
  Apart. They have a deep understanding of Lewis Carroll's imaginative visions of childhood and the cultural significance of masks, and have conducted extensive research on the role of masks in various
  African cultures. They are also knowledgeable about the literary approach to storytelling and have a keen interest in exploring the differences between the storyteller's voice and the writer, who was
  a contemporary of Whitman and Douglass.
