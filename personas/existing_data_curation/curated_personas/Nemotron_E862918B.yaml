  career_goals: In the next few years, Agnes aims to earn the rank of fire captain, using the role to champion innovative training methods such as augmented‑reality simulations and drone‑assisted incident
    assessment. She plans to complete an associate degree in fire science and an advanced EMT certification to deepen her technical knowledge. Long‑term, she envisions transitioning into a fire‑prevention
    specialist position that blends her disciplined operational background with her passion for education, developing bilingual, art‑infused outreach programs that make fire safety concepts memorable for
    Mexican‑American families. Additionally, she hopes to establish a peer‑support network within the department to address the emotional distress firefighters often face.
