    User 1: Oh, that sounds interesting! I''ve never sold paper products before.

    User 2: It''s a lot of fun! I get to meet a lot of different people and learn about their businesses.

    User 1: That sounds like a great job!

    User 2: It is! I love it.

    User 1: What do you like to do for fun?

    User 2: I love to cook! I''m a great cook.

    User 1: That''s awesome! I love to cook too. I''m not as good as you are, though.

    User 2: I''m sure you''re better than you think!

    User 1: Maybe. I''m not sure.

    User 2: Well, I''m sure we could cook together sometime and you can show me your skills.

    User 1: That would be fun!

    User 2: Great! I''d love to.

    User 1: So, what do you like to do for fun when you''re not cooking?

    User 2: I like to go out to movies, read books, and spend time with my friends and family.

    User 1: That sounds like a lot of fun! I like to do those things too.

    User 2: It sounds like we have a lot in common.

    User 1: Yeah, we do! It''s nice to meet someone I can relate to.

    User 2: Me too! I''m glad we met.

    User 1: Me too!'
