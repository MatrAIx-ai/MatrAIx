persona_description: A researcher interested in the study of animal behavior, particularly in the field of rodent behavior and the use of wheel-running behavior as an indicator of activity and wake-time.
  This persona is likely to be interested in understanding the physiological and psychological mechanisms behind wheel-running behavior in rodents, as well as its role in the development of exercise and
  voluntary activity in these animals. They may be particularly interested in studying the neurotransmitter systems involved in wheel-running behavior, including changes in dopaminergic and serotonergic
  tone, and the role of the endocannabinoid system in this behavior. They may also be interested in the effects of voluntary exercise on metabolism, obesity, and pain, and the potential of wheel-running
  behavior as a tool for studying these phenomena in rodents.
