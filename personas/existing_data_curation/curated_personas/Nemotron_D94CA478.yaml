  hobbies: '[''Reading'', ''Gardening'', ''Hiking'', ''Birdwatching'', ''Chess'', ''Puzzle solving'', ''Baking'', ''Journaling'', ''Yoga'', ''Classical music listening'']'
  career_goals: Juanita aims to transition into a district‑level instructional coaching role where she can influence curriculum design and teacher effectiveness on a larger scale. She plans to earn a specialist
    certification in literacy and STEM integration to strengthen her expertise. Over the next five years, she hopes to lead a school‑wide data‑analysis initiative that raises standardized‑test performance
    and to be recognized as a Teacher of the Year candidate. Ultimately, she envisions a part‑time consultancy creating custom curriculum packages for schools seeking evidence‑based, practical solutions,
    while maintaining a balanced workload to manage her stress levels.
