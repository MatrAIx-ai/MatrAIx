personas:
  professional: Nicole Jefferson, a veteran metal and wood assembler with three decades on Myrtle Beach production lines, fuses meticulous technical expertise with a natural knack for mentorship, aiming
    to step into a supervisory role while launching a community workshop that teaches teens hands‑on craftsmanship.
  sports: Nicole Jefferson stays fit through daily beach walks, weekly senior‑center line‑dance classes, and cheering on the Myrtle Beach Pelicans while also supporting the Carolina Panthers, blending low‑impact
    cardio with community spirit.
  arts: Nicole Jefferson, a devoted member of their church choir, harmonizes traditional gospel classics by Mahalia Jackson with contemporary Southern soul tracks from The Staple Singers, and finds inspiration
    in local folk‑art fairs where they often exchange handcrafted scarves for painted pottery.
  travel: Nicole Jefferson prefers relaxed road trips to coastal destinations like the Outer Banks and historic Charleston, plans itineraries with detailed checklists for scenic beach walks and local eateries,
    but also dreams of a pilgrimage to Nashville's Gospel Music Hall of Fame.
  culinary: Nicole Jefferson excels at cooking Southern soul‑food, regularly preparing dishes such as collard greens seasoned with smoked paprika, honey‑glazed sweet‑potato pie, and shrimp and grits, while
    experimenting with heirloom tomatoes from their garden and occasionally over‑salting their famous cornbread.
  core: Nicole Jefferson blends a lifelong love of hands‑on craftsmanship with community spirit, discipline, and a heartfelt devotion to music and food, all while juggling the quirks of a garden‑forgetful,
    choir‑humming retiree.
background:
  cultural: Nicole’s cultural background is rooted in the African-American heritage of coastal South Carolina. Her family traces its lineage to the Gullah Geechee community, which has preserved distinct
    language, culinary traditions, and storytelling practices. Growing up in Horry County, she was immersed in church life, community gatherings, and the oral history of resilience and solidarity. The rhythm
    of Southern gospel music, the flavors of collard greens, cornbread, and seafood, as well as the strong emphasis on family and mutual support, continue to shape her worldview. Living in Myrtle Beach,
    she balances the town’s tourism-driven economy with a deep commitment to preserving the local Black cultural legacy through active participation in church events, cultural festivals, and mentorship
    programs for the next generation.
