  career_goals: Nicole aims to transition into a supervisory or trainer role within the next two years, where she can formalize her mentorship of younger workers and shape safety and quality standards on
    the shop floor. She is also planning to launch a community-based after-school workshop that teaches basic woodworking and metal-fabrication skills to local teens, especially encouraging participation
    from under-represented youth. Ultimately, she hopes to leave a lasting legacy of skilled craftsmanship and collaborative workplace culture before fully retiring.
