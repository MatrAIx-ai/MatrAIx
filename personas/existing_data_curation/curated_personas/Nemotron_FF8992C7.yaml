personas:
  professional: Elizabeth Dunn, a budding young game developer, combines her curiosity for storytelling with practical Scratch coding skills, building simple interactive adventures while keeping her projects
    organized in neat folders and bright sticky notes.
  sports: Elizabeth Dunn plays spring soccer with the Willow Creek Kids Soccer Club, follows the Portland Timbers and the Portland Trail Blazers for inspiration, and balances structured team practices with
    solo nature walks that keep her fit and grounded.
  arts: Elizabeth Dunn delights in sketching woodland creatures while listening to the whimsical scores of composer John Powell and watching animated classics by Studio Ghibli, often recreating scenes from
    "My Neighbor Totoro" in her own drawings.
  travel: Elizabeth Dunn prefers low‑key family trips that blend exploration and learning, such as a weekend camping adventure in Mount Hood National Forest and a hopeful future visit to the Grand Canyon,
    while carefully plotting routes on hand‑drawn maps with her crayons.
  culinary: Elizabeth Dunn enjoys helping make homemade pizza topped with fresh mozzarella, basil, and sliced bell peppers, and loves crafting simple fruit parfaits layered with strawberries, blueberries,
    and crunchy granola, though she occasionally forgets to rinse her hands before cooking.
  core: Elizabeth Dunn is a quietly inquisitive 9‑year‑old who balances organized creativity with gentle kindness, often lost in a sketchbook or LEGO set while keeping a tidy ledger of savings and a meticulous
    health log.
background:
  cultural: Elizabeth was born and raised in Green Bay, Wisconsin, in a family with deep Midwestern roots and a mix of German and Polish ancestry common to the region. Her household values modesty, hard
    work, and community involvement—principles reflected in local traditions such as attending Packers games, sharing cheese curds at family gatherings, and participating in seasonal fairs. The community
    emphasizes outdoor recreation, so weekend trips to the Fox River, forest trails, and Bay Beach park are regular parts of her life. Growing up in a predominantly Lutheran neighborhood, she has been exposed
    to reflective values and service‑oriented activities, which reinforce her kind, cooperative nature while nurturing a balanced curiosity about the world around her.
