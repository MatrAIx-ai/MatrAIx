  career_goals: Elizabeth dreams of a future where she can protect wildlife and promote environmental stewardship. She hopes to become a wildlife biologist or a veterinarian who cares for local animals,
    blending her love for nature with her practical mindset. To reach these goals, she plans to excel in science and math throughout elementary and middle school, participate in science fairs, and join
    environmental clubs. She also imagines studying at a university with a strong conservation program, eventually working with Wisconsin’s natural resources or community animal shelters. Her ambition is
    guided by a desire to help others and make tangible contributions to her community, while staying grounded in realistic steps she can take now.
