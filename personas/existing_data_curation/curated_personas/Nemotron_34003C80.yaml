personas:
  professional: Alana Johnson is a budding preschool classroom organizer who, at five, applies a love of structure to direct daily clean‑up drills, assign roles during play, and use their competitive spark
    to be the first to finish puzzle challenges, while balancing flexibility with peers.
  sports: Alana Johnson dashes across the field as a forward for the local Little League’s “Tumble Tigers,” thriving on the predictable Friday practice schedule, relishing the chance to outscore opponents,
    and also twirls in weekend ballet class, where they channel their competitive drive into both sports.
  arts: Alana Johnson spends afternoons sketching Disney’s Frozen characters and humming Let It Go, proudly collecting Mickey Mouse stickers, and displays their latest crayon masterpiece on the refrigerator,
    where they organize the drawings by color like a tiny curator.
  travel: Alana Johnson loves family road trips that follow a clear itinerary, especially the yearly seaside visit to Monterey where they count tide‑pool crabs, collect shells, and dream about a future
    adventure to the glittering lights of Paris.
  culinary: Alana Johnson delights in building towering peanut butter and jelly sandwiches, prefers cheesy macaroni, stirs homemade banana smoothies with a wooden spoon, and often sneaks extra rainbow sprinkles
    into their yogurt, creating a sweet mess they reluctantly clean up.
  core: Alana Johnson is a meticulously organized, competition‑driven five‑year‑old who thrives on routine, loves leading group games, but secretly hoards glitter stickers and occasionally forgets to finish
    their vegetables.
background:
  cultural: Alana lives in Loveland, Ohio, a suburb of Cincinnati known for its family-friendly neighborhoods and community events. Her family participates in typical Midwestern traditions such as Fourth
    of July picnics, seasonal fairs, and local library story times. The neighborhood values punctuality, politeness, and community involvement. Alana's upbringing blends everyday suburban life, attending
    a local preschool, visiting nearby parks, and celebrating holidays with extended family, with an emphasis on teamwork, fair play, and respect for rules, reflecting the broader cultural norms of the
    American Midwest.
