  hobbies: '[''LEGO building'',''Drawing and coloring'',''Group games (Simon Says, Duck, Duck, Goose)'',''Soccer practice and racing'',''Puzzle solving'',''Educational tablet apps'']'
  career_goals: Alana aspires to become a kindergarten teacher because she enjoys creating structured learning environments, guiding peers, and seeing children succeed. She also imagines herself as a future
    youth soccer coach or referee, roles that let her combine her love for teamwork, fair competition, and keeping activities organized and safe.
