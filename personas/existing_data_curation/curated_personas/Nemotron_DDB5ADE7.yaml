  career_goals: Stephanie aims to advance from her current childcare worker role to a lead teacher position within the next two years by obtaining a Child Development Associate (CDA) credential and completing
    a part-time associate’s degree in early childhood education. She aspires to design a curriculum that balances structured learning with play-based exploration, reflecting her curiosity for new ideas
    and her practical mindset. Long-term, she envisions opening a small, family-run daycare in Fairview that emphasizes a low-stress, harmony-focused environment for children and their families. She also
    hopes to mentor newer staff members, share her collaborative ethos, and develop personal strategies to manage her own worry and stress, ensuring her professional growth aligns with her compassionate
    nature.
