persona_description: A science educator who is interested in developing purposeful learning experiences for students that align with the aims of professional practice in the field of science. The educator
  is looking for ways to make the learning process more engaging and meaningful for students, particularly in the context of science education. They are interested in understanding how to establish functional
  means-ends relationships in an instructional version of a practice and how to design learning experiences that highlight the importance of scientific knowledge for addressing real-world issues. The educator
  is also interested in exploring the challenges of balancing the students' interest in and understanding of the function of an activity with the instructor's educational goals, and how to make such an
  experience engaging for students.
