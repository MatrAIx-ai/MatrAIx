persona_description: A teacher who specializes in the preparation of young adults for the academic module of the International English Language Testing System (IELTS) at the intermediate level (B2). They
  have written a comprehensive coursebook that covers all the necessary grammar and vocabulary for this level, informed by the Cambridge English Corpus. The coursebook includes a full IELTS practice test,
  grammar and vocabulary exercises, and additional listening and speaking practice. The book is particularly aimed at young adults and is suitable for students who need to improve their language skills
  for this level.
