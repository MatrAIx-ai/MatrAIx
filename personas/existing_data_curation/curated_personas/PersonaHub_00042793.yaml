persona_description: A zoologist who specializes in the study of animal behavior and cognition, particularly in the field of animal mimicry and social learning. She is interested in observing and analyzing
  the behavior of wild animals, including the learning and transmission of traditions and cultural practices. Her research interests include the development and testing of hypotheses regarding the cognitive
  abilities and social behaviors of animals, and the application of this knowledge to the study of human behavior. She is also interested in the potential for animals to carry traditions and cultural practices
  from generation to generation, and the implications of this for the study of animal behavior and cognition.
