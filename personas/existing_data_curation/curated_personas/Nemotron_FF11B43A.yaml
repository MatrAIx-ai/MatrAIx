personas:
  professional: A seasoned community liaison who blends curiosity with practicality, Cheryl Mungal leverages bilingual fluency and decades of volunteer coordination to design culturally resonant programs,
    while their organized yet flexible approach ensures budgets stay on track even when unexpected needs arise.
  sports: Cheryl Mungal stays active by walking the nearby Mattapan parks each morning, cheering for the Boston Red Sox and Boston Celtics, playing in a local senior softball league that practices at the
    community center, and joining a seasonal kayaking club on Cape Cod during summer.
  arts: Cheryl Mungal intertwines textile craft, guitar strumming, and digital photography, weaving vibrant blankets inspired by traditional Andean patterns while they practice folk songs by Violeta Parra
    and Joan Baez on a simple acoustic guitar, and they capture neighborhood life through a DSLR, drawing artistic influence from Dorothea Lange and contemporary muralist Maya Hayuk.
  travel: Cheryl Mungal prefers purposeful travel that blends cultural immersion with family ties, having explored Oaxaca’s markets, the historic streets of Puerto Rico, and the coastal towns of Maine,
    while they dream of visiting Machu Picchu and the Galápagos Islands, planning trips meticulously but often delaying bookings due to budget constraints.
  culinary: Cheryl Mungal approaches cooking as both a science and a storytelling medium, skillfully preparing ceviche with fresh lime and jalapeño, slow‑simmered lentil stew seasoned with oregano, and
    hand‑made tamales wrapped in corn husks, while they experiment with quinoa‑infused New England chowder, using balcony‑grown cilantro and chilies to add a personal punch.
  core: Cheryl Mungal is a 65‑year‑old community champion who balances herb gardening with high‑tech photography, never misses a grant deadline but often misplaces their reading glasses on the kitchen counter.
background:
  cultural: Cheryl was born to a mother of Peruvian Quechua descent and a father of Mexican mestizo heritage, and she grew up in a bilingual household where Spanish, some Quechua phrases, and English were
    spoken interchangeably. Family gatherings were rich with Andean music, traditional festivals like Dia de los Muertos and Inti Raymi, and the scent of home-cooked foods passed down through generations.
    After moving to Mattapan, Massachusetts, she integrated into a vibrant Latino and Caribbean diaspora, while maintaining strong ties to her indigenous roots through storytelling, craftwork, and community
    cultural events. Her identity is a blend of Latin American warmth, indigenous resilience, and the communal spirit of her Boston neighborhood.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Community outreach and coordination", "Event planning and grant writing", "Basic bookkeeping and budgeting", "Senior care assistance and health
    navigation", "Traditional Latin American cooking", "Handcraft weaving and knitting", "Digital literacy (email, video calls, social media)"]'
  hobbies: '["gardening", "cooking traditional dishes", "reading historical fiction", "walking in local parks", "knitting and weaving", "playing guitar", "volunteering at community center", "digital photography"]'
  career_goals: Although officially retired, Cheryl is driven to deepen her impact on the community she loves. She plans to complete her associate's degree in Community Development to formalize her knowledge,
    and to launch a mentorship program that pairs Latino and Indigenous youth with seniors for cultural exchange. She also aims to document her family's oral histories and publish a cookbook that blends
    Andean, Mexican, and New England flavors. Learning advanced digital photography and video editing is a personal ambition, enabling her to create a visual archive of local traditions and share them through
    community exhibitions and online platforms.
