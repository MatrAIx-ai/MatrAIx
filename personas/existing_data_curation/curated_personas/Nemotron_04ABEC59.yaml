personas:
  professional: Miguel Hassel, a 21‑year‑old aspiring medical assistant, combines strong organizational talent, basic computer troubleshooting, and bilingual communication to excel in volunteer health screenings,
    while his methodical planning and compassionate nature ensure each patient interaction is both efficient and empathetic.
  sports: Miguel Hassel, a 21‑year‑old hiker and weekend trail explorer, follows the local Chester County Hiking Club, joins pick‑up soccer games with friends in the fall, roots for the Philadelphia Phillies
    during baseball season, and tracks steps on Saturday hikes with a Fitbit.
  arts: Miguel Hassel, an avid photographer of landscapes and urban streets, draws inspiration from Ansel Adams and Walker Evans, spends evenings editing images in Lightroom, and unwinds with indie folk
    playlists featuring Sufjan Stevens and Iron & Wine.
  travel: Miguel Hassel, who prefers meticulously planned weekend getaways, has explored Shenandoah National Park and the historic streets of Philadelphia, dreams of visiting the ancient ruins of Machu Picchu,
    and balances travel costs by using discount student travel cards and off‑peak flights.
  culinary: Miguel Hassel, a self‑taught home chef, delights in preparing family‑heritage dishes such as mole‑style braised chicken, tamale‑filled masa, and aromatic pozole, often using chilies, corn, and
    fresh herbs, sharing these meals at small gatherings while occasionally over‑seasoning in the pursuit of bold flavor.
  core: Miguel Hassel, a 21‑year‑old organizer of detail‑driven health volunteer projects, balances a love for solitary model‑building, photography, and community service with a habit of over‑budgeting
    trips and occasional impulse purchases of tech gear.
background:
  cultural: Miguel was raised in a Mexican‑American household where Spanish was spoken daily and Mexican traditions were celebrated alongside American holidays. His parents immigrated from Jalisco, and
    family gatherings often feature Día de los Muertos altars, homemade tamales, and lively música ranchera. Growing up in Pottstown, PA, he has blended these cultural roots with the customs of the local
    community, attending the annual Mexican festival at the county fair and participating in church events that emphasize service. This bicultural upbringing gives him a strong sense of identity and motivates
    his desire to support the Latino community in his region.
attributes:
  skills: '["Basic computer troubleshooting", "Spreadsheet management (Microsoft Excel)", "Bilingual Spanish–English communication", "Community volunteer coordination", "First aid & CPR certified", "Basic
    carpentry and woodworking", "Event planning and logistics", "Time management and organization"]'
  hobbies: '["Reading non-fiction (technology and history)", "Building model kits (airplanes, trains)", "Hiking local trails", "Photography (landscapes and street scenes)", "Cooking traditional Mexican
    dishes", "Volunteering at the local food bank", "Playing strategy video games", "Practicing Spanish language improvements"]'
  career_goals: Miguel aims to enroll in a nearby community college’s health‑services program to become a certified medical assistant, blending his curiosity for science with practical, stable employment.
    In the longer term, he aspires to work as a community health worker serving underserved Latino families in Chester County, eventually helping to develop outreach programs that combine health education
    with cultural support. He also dreams of leveraging his organizational skills to launch a small nonprofit hub that offers free health screenings and wellness workshops, ensuring his work benefits both
    his local community and his cultural heritage.
