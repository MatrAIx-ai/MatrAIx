personas:
  professional: Maria Vazquez, a 59-year-old former data analyst turned community workshop leader, leverages her SPSS, R, and Python expertise, meticulous project planning, and bilingual facilitation skills
    to design interdisciplinary art-science programs for seniors and youth, channeling her curiosity and compassionate nature into every collaborative session.
  sports: Maria Vazquez stays active by dancing salsa at the Sabor Latino nightly socials, joining the Miami Beach Senior Fitness Club for gentle beach-side yoga sessions, cheering the Miami Heat and Inter
    Miami CF, and occasionally playing casual volleyball at South Beach during the winter months, treating movement as both social connection and personal therapy.
  arts: Maria Vazquez, an avid patron of Miami's vibrant art scene, frequents gallery openings showcasing works by Wifredo Lam and contemporary artist Carmen Herrera, attends performances by the Miami Repertory
    Theatre, participates in storytelling circles that echo the narrative style of Isabel Allende, and dances to the timeless salsa rhythms of Celia Cruz and Gloria Estefan, weaving these cultural threads
    into her own curatorial vision.
  travel: Maria Vazquez plans her travel with the meticulous care of a seasoned organizer, spending summer months in an extended family visit to her hometown of Havana to document cultural sites, while
    dreaming of a spring trip to Barcelona to explore its mosaic architecture, and preferring a mix of guided tours and spontaneous beach walks that balance cultural immersion with relaxed downtime.
  culinary: Maria Vazquez, a confident home chef, delights in preparing classic Cuban staples like ropa vieja, picadillo, and tostones, while experimenting with fusion twists such as adding miso glaze to
    pork shoulder or incorporating quinoa into black-bean salads, savoring the aromatic blend of cumin, garlic, fresh cilantro, and ripe plantains, and often hosts friends for lively dinner gatherings that
    blend comfort food with inventive flavors.
  core: Maria Vazquez, a 59-year-old curiosity-driven community catalyst, weaves art, science, and salsa into vibrant workshops for all ages, yet she sometimes overcommits, letting anxiety flare when her
    packed schedule leaves little room for rest.
background:
  cultural: Maria is a first‑generation Cuban American who was raised in Miami's vibrant Little Havana neighborhood, immersing her in Spanish language, Catholic traditions, and the rhythmic pulse of Afro‑Cuban
    music. Family gatherings centered around celebrations such as Noche Buena, Carnaval, and the annual Calle Ocho festival have reinforced a strong sense of collectivism, hospitality, and intergenerational
    solidarity. Her bilingual fluency enables her to navigate both Cuban cultural nuances and mainstream American contexts, often acting as a bridge between her community and broader society. The values
    of resilience, close‑knit family ties, and a deep appreciation for art, music, and cuisine continue to shape her identity and inform her community involvement.
attributes:
  skills: '[''Scientific research design'', ''Data analysis (SPSS, R, Python)'', ''Project planning and event coordination'', ''Bilingual communication (Spanish/English)'', ''Group facilitation and conflict
    mediation'', ''Mentorship and active listening'', ''Art curation and exhibition planning'', ''Mindfulness and stress‑reduction techniques'']'
  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing and Cuban music sessions'', ''Cooking traditional Cuban dishes'', ''STEM mentorship volunteering'', ''Gardening and horticulture'', ''Reading
    science and biography books'', ''Beach walks and mindfulness meditation'', ''Community theater and storytelling'', ''Traveling to Cuban cultural sites'']'
  career_goals: Maria aims to shift her focus from formal employment to meaningful volunteer leadership, designing interdisciplinary workshops that combine science, art, and cultural heritage for senior
    citizens and youth in Miami. She aspires to mentor Cuban‑American students—especially girls—in STEM fields, fostering curiosity and community engagement. Over the next few years she hopes to become
    a resident curator at a local cultural center, showcasing contemporary Cuban art while integrating scientific themes. Maria also plans to author a memoir or blog that weaves her scientific background
    with personal stories of Cuban culture, and to secure a small grant to create a community garden that serves as an outdoor classroom for ecology and sustainable practices. Travel to her hometown in
    Cuba and documenting those experiences for community talks is another long‑term ambition.
