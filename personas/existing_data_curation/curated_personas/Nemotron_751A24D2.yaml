personas:
  professional: Jenny Belitz, an aspiring block architect who meticulously builds towering Lego structures during playdates, channels their methodical planning and outgoing energy into collaborative projects
    with peers.
  sports: Jenny Belitz attends the Tiny Tigers toddler soccer club on Saturday mornings, loves splashing in the community pool during summer, and cheers enthusiastically for the New York Yankees whenever
    a game is on TV.
  arts: Jenny Belitz delights in drawing bright rainbow animals, sings along to Raffi's 'Baby Beluga' and Disney's 'Let It Go' from Frozen, and watches The Wiggles for inspiration, letting these artists
    fuel their boundless imagination.
  travel: Jenny Belitz enjoys family road trips to the nearby county zoo and the seaside splash park, dreams of visiting Disneyland and the Grand Canyon, and always carries a tiny passport sticker book
    to plan future adventures.
  culinary: Jenny Belitz loves creamy mac and cheese, peanut butter-banana sandwiches, and strawberry slices with yogurt, eagerly helps stir pancake batter with a wooden spoon, and they never say no to
    a bite of honey-glazed carrots.
  core: Jenny Belitz is a hyper-curious, worry-prone three-year-old who builds intricate Lego towers, saves every coin in a pink piggy bank, and they often cling to their blanket when the world feels too
    noisy.
background:
  cultural: Jenny is raised in a white, middle‑class family in Tampa, Florida. Her upbringing blends typical American childhood experiences with the vibrant, multicultural atmosphere of South‑Florida, where
    community events, beach outings, and a love for outdoor activities are common. Her family values education, artistic expression, and social interaction, encouraging her curiosity and involvement in
    group activities.
