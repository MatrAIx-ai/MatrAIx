  career_goals: Aida aims to move into a senior operations manager role where she can shape a workplace culture that prioritizes employee well‑being and collaborative problem solving. She hopes to lead
    a small team of specialists, introduce flexible scheduling policies, and establish a mentorship program for staff with non‑traditional educational backgrounds. Long‑term, she envisions launching a boutique
    consulting service that helps other small businesses streamline operations while fostering supportive, humane work environments.
