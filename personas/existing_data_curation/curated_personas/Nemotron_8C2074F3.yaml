personas:
  professional: Aida Pollard coordinates office logistics as an operations specialist, leveraging their tech-savvy curiosity, calm crisis communication, and natural empathy to resolve conflicts and streamline
    workflows while often juggling a chaotic schedule with a relaxed attitude toward strict planning.
  sports: Aida Pollard spikes for the local Chickies Beach Volleyball Club in the summer, follows the Los Angeles Lakers and Los Angeles Dodgers for basketball and baseball thrills, and joins a weekly salsa
    dance class that doubles as a lively cardio workout.
  arts: Aida Pollard finds artistic escape in graphic novels by Marjane Satrapi, rehearses community theater productions that channel the stage presence of Lin-Manuel Miranda, and dances to the salsa rhythms
    of Celia Cruz while crafting DIY décor inspired by vibrant street art.
  travel: Aida Pollard loves quick weekend escapes to coastal towns like Santa Barbara, has trekked the misty Hoh Rainforest, and dreams of salsa-filled nights in Havana, blending spontaneous road trips
    with a modest travel budget that favors cultural immersion over luxury.
  culinary: Aida Pollard curates collaborative pot‑luck feasts featuring spicy shrimp tacos with fresh cilantro, rosemary‑infused quinoa salads harvested from their herb garden, and cinnamon‑spiced arroz
    con leche, showcasing a modest cooking skill set anchored in bold flavors and shared meals.
  core: Aida Pollard is a compassionate operations wizard who thrives on group energy, juggles chaotic schedules with flexible planning, and battles an inner storm of anxiety through yoga and creative outlets.
background:
  cultural: Aida is a white American who grew up in a working‑class family in the Long Beach‑San Pedro area. The multicultural vibrancy of Los Angeles County—especially the nearby Hispanic and Asian influences—shaped
    her palate, language snippets, and appreciation for diverse community events. She maintains family traditions such as weekend barbecues, church gatherings, and local festivals, while also embracing
    the laid‑back beach culture that defines her hometown.
