  career_goals: Devine aims to advance from cashier to a supervisory position within the next two to three years, seeking a retail management certification and completing a bachelor's degree in Business
    Administration to strengthen her leadership credentials. She envisions becoming a store manager for a regional grocery chain, later moving into district management where she can mentor staff across
    multiple locations. In the longer term, Devine aspires to open a small boutique coffee shop in Compton that doubles as a community hub, offering job‑training workshops and financial‑literacy sessions
    for local youth. She also hopes to leverage her experience to volunteer as a youth mentor, encouraging financial responsibility and career planning among at‑risk teenagers.
