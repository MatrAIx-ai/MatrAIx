    environment'']'
  hobbies: '[''Acrylic painting'', ''Metal jewelry making'', ''Salsa and cumbia dancing'', ''Cooking Guatemalan cuisine'', ''Hiking'', ''Volunteer workshop facilitation'', ''Attending art galleries and
    live music shows'', ''Maker space projects'']'
  career_goals: Maria aims to advance from skilled fabricator to a supervisory role where she can integrate design and production, ultimately becoming a product‑development specialist focused on sustainable
    materials. She plans to complete an associate degree in industrial technology, obtain advanced welding and CNC programming certifications, and lead initiatives that introduce recycled metal and greener
    plastics into her company's supply chain. Long‑term, Maria dreams of establishing a community workshop that offers free training in metal arts to underserved youth and recent immigrants, combining her
    technical knowledge with her strong desire to help others and foster harmony. She sees herself as a bridge between manufacturing and the arts, curating collaborative installations that showcase local
    craftsmanship while promoting social cohesion.
