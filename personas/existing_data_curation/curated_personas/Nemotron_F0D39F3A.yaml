  career_goals: Although retired from formal employment, Aroldo aims to leave a lasting legacy by mentoring emerging entrepreneurs and fostering cultural exchange in his community. He aspires to co‑found
    a small nonprofit art space in Vista that showcases Mexican and Chicano art while offering business workshops for artists. Additionally, he wants to serve on the board of a local seniors' advocacy group,
    using his business acumen to improve financial literacy and support services for seniors. Aroldo also hopes to write a memoir that weaves together his professional journey, artistic passions, and family
    stories, thereby preserving his heritage for future generations.
