  hobbies: '[''Surfing'', ''Woodworking'', ''Cooking Polynesian cuisine'', ''Reading maritime history'', ''Ukulele playing'', ''Coastal hiking'', ''Chess'', ''Volunteer teaching at cultural center'']'
  career_goals: Randy’s primary career ambition is to become a department head and curriculum coordinator, where he can shape school‑wide instructional policies and embed structured, evidence‑based practices.
    He is actively pursuing a bachelor’s degree in education to formalize his credentials and eventually a master’s in educational leadership. Randy aims to develop a Pacific Islander cultural liaison program
    that partners with community organizations to support students’ academic and social needs. He also hopes to lead a school‑wide overhaul of the assessment system to boost student achievement metrics,
    and ultimately earn recognition as a model teacher within the Los Angeles County district.
