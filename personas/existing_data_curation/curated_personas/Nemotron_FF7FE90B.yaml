  career_goals: Cynthia aims to become a certified professional painter and obtain a journeyman license, eventually launching her own boutique painting and paper‑hanging business that specializes in eco‑friendly
    finishes for historic homes in Tucson. She plans to enroll in community‑college courses on construction management and sustainable design to broaden her expertise. Long‑term, she envisions expanding
    her services to include interior design consulting, allowing her to blend her artistic interests with practical trade skills while contributing to the revitalization of the Southwest’s architectural
    heritage.
