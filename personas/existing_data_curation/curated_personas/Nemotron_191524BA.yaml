  career_goals: Although retired from formal employment, Graciela aims to deepen her involvement in Detroit’s cultural and senior‑services initiatives. She plans to lead cooking workshops that teach traditional
    Mexican recipes, document oral histories of Mexican‑American elders, and collaborate with the local museum on a heritage exhibit. Her long‑term ambition is to compile a memoir of family stories and
    recipes that will preserve her cultural legacy for future generations while advocating for improved resources for low‑income seniors in the community.
