personas:
  professional: Graciela Gomez is a retired community organizer who leverages their bilingual fluency, meticulous budgeting skills, and hands‑on craft abilities to lead cooking workshops, mentor younger
    neighbors, and co‑create a heritage exhibit at the local museum, balancing a love for structure with a laid‑back attitude toward deadlines.
  sports: Graciela Gomez enjoys leisurely walks in Belle Isle Park and volunteers as a cheer for the senior fan club of the Detroit Tigers, they also join a gentle walking group at the senior center and
    watch Detroit Pistons games on TV, reflecting a preference for low‑impact, community‑centered activity.
  arts: Graciela Gomez is a devoted fan of folk music, especially the sounds of Los Lobos and Lila Downs, they frequently attend local theater productions at the Michigan Theater, and they proudly display
    their hand‑stitched quilts at community art fairs, blending social engagement with creative expression.
  travel: Graciela Gomez prefers short, budget‑friendly trips that blend cultural immersion and family time, they annually visit historic Mackinac Island, enjoy weekend outings to the Hispanic Heritage
    Festival in Chicago, and hold a long‑standing wish to explore Oaxaca’s vibrant markets when health permits.
  culinary: Graciela Gomez excels at preparing classic corn‑based dishes such as tamales, pozole, and homemade tortillas, they season with cilantro, dried chilies, and epazote, often experimenting with
    garden‑grown herbs, and they lovingly teach these techniques in community kitchen workshops.
  core: Graciela Gomez blends structured budgeting with a relaxed outlook, knits community ties through cooking, storytelling, and garden‑fresh meals, while navigating senior‑health quirks, a love for low‑key
    sports, and folk melodies.
background:
  cultural: Graciela was born in Michoacán, Mexico, and moved to Detroit with her family at age ten. She grew up in the vibrant Mexican‑American community of Southwest Detroit, where she absorbed Mexican
    customs such as Día de los Muertos, Catholic traditions, and traditional cuisine, while also embracing the multicultural rhythm of the city. She remains deeply connected to her Mexican roots, regularly
    participating in cultural celebrations, volunteering at the local Hispanic community center, and preserving Spanish language and customs within her daily life.
