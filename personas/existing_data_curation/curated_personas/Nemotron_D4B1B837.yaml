personas:
  professional: Loraine Murray, an aspiring young coder and budding animal-care enthusiast, blends her love of Scratch game development with hands-on volunteering at the local animal shelter, applying practical
    problem-solving skills and a competitive drive, and they aim to create interactive pet-care simulations.
  sports: Loraine Murray, a forward on her middle-school girls’ soccer team, spends weekends sprinting on the county fair’s 5‑k track, cheering for the Ohio State Buckeyes football squad, and biking the
    local rail‑trail, and they channel their competitive spirit into both organized sport and informal fitness.
  arts: Loraine Murray, a devoted reader of fantasy series like 'Percy Jackson' and a sketch artist who fills notebooks with woodland creatures, frequently streams the Harry Potter film scores and draws
    inspiration from singer‑songwriter Taylor Swift’s storytelling lyrics, and they often doodle scenes while listening to the music.
  travel: Loraine Murray favors short road trips to nearby state parks such as Cuyahoga Valley and family visits to the Rock and Roll Hall of Fame in Cleveland, while dreaming of a future summer camp adventure
    in the Swiss Alps after reading about castles in her books, and they love planning weekend bike rides on the local trail network.
  culinary: Loraine Murray enjoys buttery popcorn during gaming sessions, loves crafting spaghetti with fresh tomato sauce from garden-grown tomatoes, and delights in baking chocolate chip cookies with
    a pinch of cinnamon alongside her mom, and they claim the secret to perfect cookies is a dash of patience.
  core: Loraine Murray is a 12-year-old with a restless curiosity for science and coding, a competitive love of soccer, and they often juggle school obligations with a flexible, sometimes chaotic schedule
    that fuels both achievements and occasional disorganization.
background:
  cultural: Loraine comes from a white Midwestern family that has lived in Tuscarawas County for several generations, with roots in German and Irish ancestry. The region’s close‑knit community, church gatherings,
    and seasonal county fairs shape her social life. Values of friendliness, modesty, and hard work are emphasized at home, while the local school culture celebrates sports—especially soccer and football—and
    encourages participation in clubs. This backdrop blends a practical, community‑oriented mindset with an openness to new ideas, giving Loraine both a strong sense of belonging and a curiosity about the
    wider world.
attributes:
  skills: '[''Simple scientific experimentation'', ''Basic mechanical repair (bike, small tools)'', ''Team sports coordination'', ''Digital literacy (Scratch coding, Google Suite)'', ''Effective verbal
