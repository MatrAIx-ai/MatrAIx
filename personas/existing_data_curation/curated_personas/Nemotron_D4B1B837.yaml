  hobbies: '[''Soccer'', ''Animal shelter volunteering'', ''Science club projects (crystals, circuits)'', ''Scratch coding'', ''Sketching wildlife'', ''Reading fantasy novels'', ''Biking on local trails'',
    ''Gardening with family'', ''Participating in county fair youth competitions'', ''Strategic video gaming (e.g., Minecraft, Fortnite)'']'
  career_goals: Loraine dreams of turning her love for animals and science into a career as a wildlife veterinarian or environmental biologist. She wants to pursue a high school STEM track, lead the science
    club, and eventually study veterinary medicine at a university. In parallel, she hopes to stay connected to her community by coaching a youth soccer team and organizing local conservation projects.
    Her competitive streak drives her to aim for leadership positions, while her sociable side ensures she wants to inspire peers and younger children.
