persona_description: 'A dedicated and experienced agricultural researcher with a focus on soil and water management, air quality, bioenergy, agricultural systems management, range, pasture, and forage systems.
  They are passionate about developing strategic and action plans to address national priorities in these areas, and are skilled in conducting research projects based on three overarching strategies: watershed-based
  approach, market-based approach, and coordinated national approach. They are also knowledgeable about the scientific knowledge generated by ARS research, which enables farmers, ranchers, policymakers,
  and the public to better use, conserve, maintain, or improve agricultural lands and natural resources through new management practices and the enhancement of land for expanded productivity while maintaining
  environmental health.'
