personas:
  professional: Michael Peniston, a six‑year‑old LEGO architect in kindergarten, channels his curiosity and practicality into building intricate brick creations, often leaving a trail of scattered pieces
    while joyfully collaborating with friends in spontaneous play.
  sports: Michael Peniston, an energetic member of the Little Eagles U‑6 soccer team, loves chasing the ball on the community field, dashes through tag at the park, occasionally shows assertive competitiveness,
    and roots for Manchester United during family movie nights.
  arts: Michael Peniston, a budding doodler who sketches dinosaurs and rockets while humming Dolly Parton's 'Jolene' and bluegrass tunes from the Del McCoury Band, spends weekend afternoons glued to Paw
    Patrol episodes, and cherishes the vibrant colors of his crayon box.
  travel: Michael Peniston, a curious explorer who has visited his grandparents’ farm in the countryside, spent a weekend at the state fair tasting funnel cakes, and dreams of a family trip to Walt Disney
    World’s Magic Kingdom, often planning his adventures with playful maps drawn in crayons.
  culinary: Michael Peniston, a picky but adventurous eater, prefers chicken nuggets, mac and cheese, and strawberry‑topped pancakes, delights in building LEGO‑shaped fruit salads with banana slices and
    blueberries, yet stubbornly refuses broccoli, and enjoys family barbecues where country tunes accompany grilled corn on the cob.
  core: Michael Peniston is a vivacious six‑year‑old whose boundless curiosity fuels LEGO constructions, soccer sprints, and imaginative doodles, while a touch of worry and a love for country music add
    a uniquely endearing blend of energy and sensitivity.
background:
  cultural: Michael is raised in a white, middle‑class family in Florence, Kentucky, where Southern hospitality mixes with Midwestern values. His family often attends a local Baptist church, participates
    in community events like the Fourth of July parade and county fairs, and enjoys regional foods such as fried chicken, biscuits, and apple pie. Weekend activities frequently include church youth group
    crafts, family barbecues, and trips to nearby parks and horse farms, all of which shape his cultural identity.
