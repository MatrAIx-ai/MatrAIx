    statutes and traffic law)'']'
  hobbies: '[''Basketball'', ''Weightlifting'', ''Tactical Video Gaming'', ''True Crime Reading'', ''Law Enforcement Podcasts'', ''Street Photography'', ''City Hiking/Urban Exploration'', ''Youth Mentorship
    Volunteering'', ''Chess'', ''Journaling and Mindfulness Practices'']'
  career_goals: Jacoby aims to complete his associate degree in criminal justice and eventually earn a bachelor's degree while advancing through the ranks to become a detective. He is especially interested
    in joining a specialized unit such as SWAT or the K‑9 team, where his competitive drive and tactical skills can shine. Long‑term, he hopes to take on a leadership role that allows him to implement innovative,
    community‑focused policing strategies and to mentor new officers on mental‑health resilience. He also envisions creating a youth outreach program in Philadelphia that bridges gaps between law enforcement
    and underserved neighborhoods.
