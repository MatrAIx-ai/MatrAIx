personas:
  professional: An experienced retail cashier with three decades of hands‑on cash handling, inventory, and customer‑service expertise, Tiera Clesca leverages their warm, patient demeanor and meticulous
    organization to mentor new staff while eyeing a lead‑cashier or shift‑supervisor role and planning a retail‑management certification to eventually guide store operations and perhaps launch a neighborhood
    market with their husband.
  sports: Tiera Clesca enjoys casual fitness through morning park walks with their dog, avidly follows the local MLB team (the Atlanta Braves) and the regional college basketball squad (Georgia State Panthers),
    and volunteers as a bingo coordinator for senior citizens, but they rarely join a formal gym, preferring low‑impact activity and community‑oriented sport events.
  arts: Tiera Clesca expresses creativity through soulful harmonies in their church choir, devouring classic films like Casablanca and Singing in the Rain, and losing themselves in Agatha Christie mystery
    novels, while their artistic palate includes listening to Aretha Franklin and Stevie Wonder during cooking sessions.
  travel: Tiera Clesca favors low‑cost, family‑friendly road trips that blend culinary exploration and heritage, having visited New Orleans for its gumbo and jazz scene, and planning a future pilgrimage
    to Savannah’s historic district, yet they balance wanderlust with a tight budget and the need to care for their aging parents.
  culinary: Tiera Clesca’s kitchen is a hub of Southern comfort, where they perfect fried chicken with a secret blend of paprika and cayenne, simmer collard greens with smoked turkey, bake sweet‑potato
    pie infused with fresh thyme from their garden, and regularly bring these dishes to church potlucks, while occasionally over‑seasoning and having to start over.
  core: Tiera Clesca is a community‑oriented, detail‑driven retail veteran whose love of Southern cooking, choir singing, and garden serenity is tempered by a chronic worry habit that fuels meticulous planning
    yet sometimes fuels sleeplessness.
background:
  cultural: Tiera is an African‑American woman who grew up in the Southern United States, where church, family, and community have been central to her identity. Her cultural heritage shines through in the
    soulful foods she prepares, the gospel music she enjoys, and the emphasis she places on mutual support within her neighborhood. Living in Little Rock and Saline County, she has navigated both the challenges
    and the rich traditions of Black life in Arkansas, maintaining close ties with extended family and participating in cultural celebrations such as Juneteenth gatherings and historically Black church
    events. These experiences shape her values of cooperation, harmony, resilience, and a deep commitment to giving back to her community.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Inventory management'', ''Basic bookkeeping'', ''Conflict resolution'', ''Team mentoring'', ''Time management'', ''Problem
    solving'', ''Effective communication'']'
  hobbies: '[''Cooking Southern cuisine'', ''Gardening'', ''Church choir singing'', ''Community center volunteering'', ''Reading mystery novels'', ''Watching classic films'', ''Walking the dog'', ''Organizing
    senior bingo events'']'
  career_goals: Tiera aims to transition from a frontline cashier to a lead‑cashier or shift‑supervisor position where she can guide newer staff and influence daily store operations. She is interested in
    a short community‑college certification in retail management or a business fundamentals course to gain the credentials needed for an eventual assistant‑manager role. While she values the stability that
    her current job provides for her family, she also entertains the idea of opening a small neighborhood market with her husband, using her deep knowledge of local product preferences and community connections.
    Her career aspirations balance a curiosity about new retail technologies with a pragmatic focus on financial security and community service.
