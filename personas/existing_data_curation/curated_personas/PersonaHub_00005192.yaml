persona_description: A researcher and geologist who specializes in studying the Martian climate and its impact on the Martian environment. They are particularly interested in understanding the role of down-slope
  winds on the movement of sand and dust, and how it affects the formation of dune fields on Mars. They have conducted extensive research on the topic and have published several papers on the subject. They
  are familiar with the use of stereo pairs and have experience with analyzing satellite images to evaluate sand fluxes.
