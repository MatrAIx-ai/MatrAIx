personas:
  professional: Minnie Fleurant is an aspiring multimedia storyteller who channels their curiosity and love for unconventional ideas into sketching vivid characters set to hip‑hop rhythms, and they harness
    their talkative confidence to share poetry at school open‑mic nights while meticulously organizing each draft in a color‑coded binder.
  sports: Minnie Fleurant competes as a point guard for the Riverside Rockets in the Eastside Youth Basketball League, thriving on the friendly competition that fuels their competitive streak, while cheering
    for the nearby NBA team, the Chicago Bulls, and joining a weekend bike‑ride club that explores the city’s mural‑filled streets, balancing organized practice with spontaneous rides.
  arts: Minnie Fleurant immerses themselves in creative expression, sketching characters inspired by hip‑hop icons like Kendrick Lamar and soul legends such as Aretha Franklin, writing poems echoing the
    lyrical depth of J. Cole, performing gospel harmonies in a church choir reminiscent of Mahalia Jackson, admiring street murals by artists like Shepard Fairey, and devouring graphic novels by Raina Telgemeier
    and Neil Gaiman during quiet afternoons.
  travel: Minnie Fleurant plans trips with a doodle‑filled travel journal, mixing weekend bike rides to explore neighborhood murals with family vacations to the Great Smoky Mountains and a memorable weekend
    in Washington, D.C., and they dream of backpacking through Paris to see the Eiffel Tower, strolling along the Seine while sketching cafés, all while navigating a modest family budget that guides careful
    itinerary choices.
  culinary: Minnie Fleurant, a budding home chef, enjoys mixing cinnamon, nutmeg, and brown sugar into sweet‑potato pies for holidays, while also mastering simple recipes like homemade pizza topped with
    fresh basil and guacamole made from ripe avocados and lime, often improvising with seasonal fruits and documenting each culinary experiment in a colorful scrapbook.
  core: Minnie Fleurant is a talkative, art‑obsessed 12‑year‑old whose competitive spark fuels both basketball victories and sketch‑book challenges, while their skeptical streak keeps them questioning motives,
    and a sweet‑tooth for sweet‑potato pies ensures a constant supply of sugary fuel for late‑night poetry sessions.
background:
  cultural: Minnie is a Black girl raised in Richland, Mississippi, where her family’s Southern African-American heritage is woven into daily life. She grew up attending a close‑knit church that emphasizes
    gospel music and community service, and she celebrates cultural milestones such as Juneteenth and Black History Month with storytelling and cooking soul‑food dishes. Her parents have instilled pride
    in the legacy of the civil‑rights movement that shaped Mississippi, and she often hears stories of local Black leaders. This cultural grounding fuels her artistic interests, as she seeks to represent
    the vibrant traditions, resilience, and creativity of her community in her work.
attributes:
  skills: '["drawing", "watercolor painting", "creative writing", "public speaking", "Scratch coding", "basketball", "group activity planning"]'
  hobbies: '["sketching", "short story writing", "poetry", "basketball", "bike riding", "photography of murals", "church choir singing", "baking sweet potato pie"]'
  career_goals: Minnie dreams of becoming a multimedia artist who can blend illustration, animation, and interactive design to tell stories that reflect her community’s experiences. She aspires to study
    graphic design and animation in high school and later pursue a degree in visual communications. In the long term, she hopes to launch a youth art program in Richland that offers workshops in drawing,
    digital art, and storytelling, giving other kids a platform to share their voices. She also imagines working as a game designer, creating games that celebrate African-American culture and Southern folklore.
