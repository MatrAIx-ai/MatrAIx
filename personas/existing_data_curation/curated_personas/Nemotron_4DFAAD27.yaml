  career_goals: Even at 94, Yvonne aims to stay a vibrant contributor to her community. She plans to finish a memoir that records her family’s wartime experiences and the changing life of Millmont, and
    to organize a small exhibition of her quilts at the senior center. She hopes to lead a weekly art‑appreciation discussion group at the local library, sharing her curiosity for new ideas and unconventional
    perspectives. Yvonne also intends to continue volunteering as a liaison for the senior center, offering informal technology tutorials so her peers can stay connected via video calls. Maintaining her
    health through gardening, gentle walks, and regular social interaction remains a central personal ambition.
