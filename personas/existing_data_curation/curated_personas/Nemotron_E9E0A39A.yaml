personas:
  professional: Raj Davis, a bright two‑year‑old, already exhibits a budding engineer’s mindset; they methodically stack building blocks, explain the purpose of each piece to anyone who watches, and balance
    imaginative curiosity with a practical, step‑by‑step approach.
  sports: Raj Davis, an energetic two‑year‑old, drags a mini soccer ball to the backyard each afternoon, proudly sporting the jersey of Metro FC and attending the Tiny Strikers kids’ soccer club; they cheer
    loudly and mimic goal celebrations with infectious enthusiasm.
  arts: Raj Davis, a talkative two‑year‑old, dances to the upbeat rhythms of Disney’s "Let It Go," imitates the spirited moves of Lin‑Manuel Miranda from Hamilton, and colors sprawling doodles inspired
    by Eric Carle’s vibrant collages; they often narrate the story behind each drawing to anyone nearby.
  travel: Raj Davis, a curious two‑year‑old, loves family road trips to Sunny Beach where they chase seagulls and short flights to Aspen’s mountain cabin where they clutch a stuffed giraffe and demand a
    seat by the window; they thrive on the change of scenery and the excitement of new sounds.
  culinary: Raj Davis, a sociable two‑year‑old, delights in scooping creamy mac and cheese, crunching peas, and spreading avocado on whole‑grain toast, often insisting on helping stir the pancake batter
    with a bright yellow spoon while bragging about the secret ingredient—banana slices; they proudly claim they’re the "master chef" of the kitchen.
  core: Raj Davis, a vivacious two‑year‑old, blends methodical curiosity with nonstop chatter; they turn everyday moments into lively, organized performances that leave everyone smiling.
