persona_description: A business process engineer who is responsible for creating and managing process models, including EPC diagrams, for SAP R/3 systems. This person is skilled in using EPC diagrams to
  document business processes and is familiar with the use of Edraw software to create professional-looking diagrams. They have experience with the building blocks used in EPC diagrams, including functions,
  events, and connectors, and are able to use Edraw symbols to represent complex process structures. This person is also skilled in using EPC diagrams to identify media interruptions and to describe the
  business processes involved in a process model.
