  career_goals: At 62, Tylette’s primary career goal is to secure a stable, part‑time schedule that supports her retirement planning while allowing her to continue contributing at work. She hopes to become
    a trusted trainer for younger cashiers, sharing her practical knowledge and reinforcing a culture of reliability. Additionally, she aims to volunteer more in her community, especially through her church’s
    outreach programs, and to ensure financial security for her family’s future.
