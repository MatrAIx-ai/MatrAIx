personas:
  professional: Tylette Whitehurst, a veteran retail cashier with two decades of precise cash‑handling and inventory tracking expertise, channels their love of routine and meticulous organization into smooth
    checkout flows and reliable mentorship of new staff, making them the go‑to trainer for dependable service.
  sports: Tylette Whitehurst stays active through a weekly senior walking group at the community recreation center, joins a seasonal shuffleboard league during winter, and loyally roots for the hometown
    baseball club, the Greenwood Gators, while also cheering on the regional women's basketball team, the Lakeview Lady Hawks, balancing low‑impact exercise with a love of local sports camaraderie.
  arts: Tylette Whitehurst finds artistic fulfillment in quilting circles where they stitch patterns inspired by the melodies of Aretha Franklin, joins the church choir to rehearse gospel standards by Mahalia
    Jackson, and spends evenings revisiting classic film performances of Denzel Washington, all of which nurture a deep appreciation for soulful storytelling.
  travel: Tylette Whitehurst prefers meticulously planned road trips that blend scenic relaxation with cultural stops, having already explored the historic streets of Savannah, the gardens of the Great
    Smoky Mountains, and the jazz heritage of New Orleans, while dreaming of a future pilgrimage to the serene blue lakes of the Canadian Rockies.
  culinary: Tylette Whitehurst boasts a home‑grown vegetable garden that fuels their expert preparation of collard greens seasoned with smoked turkey, sweet potato pie infused with nutmeg, and cornbread
    crisped with honey, while they also delight in sourcing fresh herbs like thyme and rosemary for weekly church potluck dishes.
  core: Tylette Whitehurst blends steadfast routine with a soft spot for spontaneous crossword challenges, occasionally over‑spending on vintage fabric at thrift stores despite a disciplined budget, embodying
    a reliable guardian of community traditions with a quietly mischievous streak.
background:
  cultural: Tylette is an African‑American woman who grew up in a close‑knit Black neighborhood of St. Louis, where church, family, and community gatherings shaped her values. Her heritage is rooted in
    the Great Migration story, and she maintains strong ties to the city’s rich musical and culinary traditions. Active in her local African Methodist Episcopal congregation, she regularly partakes in cultural
    celebrations, volunteers at the food bank, and preserves family recipes and oral histories, embodying the resilience and communal spirit of St. Louis’s Black community.
