  career_goals: James dreams of growing up in a role where he can help others and be part of a team. He frequently talks about becoming a firefighter because he loves the bright trucks and the idea of protecting
    his community. He also imagines being a police officer for the clear structure of the job, or an astronaut to explore space, reflecting his fascination with adventure and teamwork.
