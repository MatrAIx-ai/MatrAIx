    new drivers'']'
  hobbies: '[''Church choir singing'', ''Senior center bingo and bridge games'', ''Gardening (tomatoes, herbs, roses)'', ''Knitting and quilting'', ''Walking and birdwatching along the Delaware River trail'',
    ''Reading local history books'', ''Cooking family recipes and hosting potlucks'', ''Volunteering for senior transportation services'', ''Participating in community festivals and parades'']'
  career_goals: Though approaching retirement, Karen aims to continue providing a safe and dependable ride for the students of Phillipsburg for as long as she is able. She hopes to take on an informal mentorship
    role, sharing her practical knowledge with newer drivers and helping the school district improve its transportation safety protocols. Karen also plans to serve on the district’s transportation safety
    committee to champion child-safety initiatives. After she eventually retires, she intends to volunteer her driving skills for local senior‑citizen programs and stay actively involved in community outreach,
    ensuring that her experience benefits the neighbourhood well beyond her working years.
