personas:
  professional: Mi Barragan, a seasoned construction laborer who masterfully operates backhoes, excavators and mini‑cranes while meticulously reading construction drawings, leverages their disciplined,
    detail‑oriented mindset—shaped by building scale bridge models—to coordinate crews, maintain safety logs, and pursue OSHA‑30 certification on a clear path toward a supervisory role, and they consistently
    meet project milestones on time.
  sports: Mi Barragan, an early‑morning runner along the Pacific coastline who logs weekly miles with the San Diego Running Club, they tackle weekend hikes in Torrey Pines, passionately support the San
    Diego Padres and the Wave FC, and occasionally join a local beach‑volleyball league for cross‑training.
  arts: Mi Barragan, who channels their competitive edge into strategy board games like Terraforming Mars, they admire the cinematic scores of Hans Zimmer, attend monthly performances at the La Jolla Playhouse,
    and sketch historic bridge designs inspired by the works of photographer Ansel Adams and artist Maya Lin.
  travel: Mi Barragan, a meticulous planner who prefers weekend road trips to nearby gems like La Jolla and Big Sur, they savor the balanced mix of adventure and relaxation, dream of trekking Patagonia’s
    Torres del Paine, and routinely budget travel expenses to keep vacations within a modest $2,000 annual limit.
  culinary: Mi Barragan, a competent home cook who delights in crafting fusion dishes such as tangy fermented‑pepper adobo with a sweet‑sour glaze, they routinely experiment with fresh cilantro, rice noodles,
    and fermented peppers, and balance their culinary creativity with regular visits to the local seafood market for sustainably sourced fish.
  core: Mi Barragan, a disciplined construction professional who merges a competitive drive with meticulous bridge‑model building, they fuel every sunrise run with a cup of black coffee, and habitually
    check work emails late into the night, despite striving for balance.
background:
  cultural: Mi is a first‑generation Asian‑American with a mixed Filipino and Korean heritage, raised in the vibrant multicultural neighborhoods of San Diego. Her family emphasized diligence, respect for
    elders, and communal responsibility, values that have shaped her disciplined work ethic and pragmatic outlook. While she maintains fluency in English, she often uses bits of Tagalog and Korean at home,
    especially during cultural celebrations like Lunar New Year and the Philippine Independence Day parades, which keep her connected to her roots. The blend of these traditions with the laid‑back Southern
    Californian lifestyle informs her balanced approach to career ambition and personal well‑being.
attributes:
  skills: '[''Heavy Machinery Operation'', ''Concrete Formwork & Finishing'', ''Blueprint Reading'', ''Site Safety Compliance'', ''Material Inventory Management'', ''Crew Coordination'', ''Project Scheduling'',
    ''Quality Assurance'']'
  hobbies: '[''Coastal Running'', ''Hiking'', ''Scale Model Building'', ''Tai Chi'', ''Strategy Board Games'', ''Korean‑Filipino Fusion Cooking'', ''Community Garden Volunteering'']'
  career_goals: Mi aims to advance from a laborer to a certified construction supervisor within the next three years, targeting OSHA 30‑hour certification and a foreman’s apprenticeship. Her long‑term ambition
    is to become a project manager overseeing mid‑size commercial builds, and eventually launch her own general contracting firm that specializes in sustainable, low‑impact construction methods in the San
    Diego region. She is motivated by the competitive nature of the industry and seeks to blend her strong organizational skills with leadership responsibilities to drive high‑performance teams.
