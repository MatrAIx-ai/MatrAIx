  career_goals: Although retired, Dinh’s primary ambition is to preserve his independence and continue contributing practical knowledge to his family and community. He plans to keep his home in good repair,
    expand his garden, and write a memoir that records his family’s migration story for future generations. He hopes to mentor his grandchildren in cooking and budgeting, volunteer occasionally at the local
    senior center to teach simple home‑maintenance skills, and stay physically active through regular walks in nearby parks. He also aims to enter senior‑level chess tournaments to satisfy his competitive
    side while keeping his mind sharp.
