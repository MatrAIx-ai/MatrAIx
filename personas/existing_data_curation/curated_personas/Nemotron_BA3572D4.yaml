    exhibitions"]'
  career_goals: Kimtuyen aspires to turn her passion for visual storytelling and technology into a career that offers creative freedom. In the short term, she plans to apply to a specialized high‑school
    arts program and deepen her skills in digital illustration and interactive media. Long‑term, she aims to study graphic design or interactive media at university, work as a concept artist or creative
    director for video games or animated films, and eventually launch her own independent studio or online gallery that showcases experimental art and provides tools for other young creators. She also imagines
    publishing a series of illustrated short stories and running a YouTube channel where she critiques art and culture from a skeptical yet appreciative perspective.
