  career_goals: Rebecca aims to solidify her reputation as a dependable leader while positioning herself for a senior operations director role within the next five years. She plans to complete her bachelor’s
    degree in business administration through evening courses, which will enhance her strategic perspective. Additionally, she seeks to mentor emerging managers, fostering a culture of accountability and
    support in her department. Maintaining a healthy work‑life balance remains a priority, so she is looking for ways to streamline her responsibilities and delegate more effectively.
