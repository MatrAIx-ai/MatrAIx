  career_goals: Lawrence dreams of one day designing robots that can help people, so he hopes to become a robotics engineer or technologist. He is also fascinated by space and imagines being an astronaut
    who builds equipment for missions. At school he aims to join the robotics club, win a regional science fair, and eventually study engineering in college. His practical side keeps him focused on mastering
    the fundamentals—math, science, and hands‑on building—while his curiosity drives him to explore new ideas and projects.
