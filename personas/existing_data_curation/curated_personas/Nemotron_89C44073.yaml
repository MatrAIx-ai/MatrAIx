personas:
  professional: Nolan Radabaugh, an organized 8‑year‑old comic creator, channels their curiosity into detailed colored‑pencil illustrations, Scratch animated stories, and precision‑driven LEGO architecture
    builds, treating each project like a miniature studio, and they insist on a step‑by‑step plan before picking up a tool.
  sports: Nolan Radabaugh enjoys watching the Chicago Cubs on TV and cheering for the Chicago Bulls, occasionally plays in the East River Kids Soccer Academy after school, prefers quiet solo bike rides
    in the park over team sports, and they keep a small notebook to record personal best lap times.
  arts: Nolan Radabaugh devotes afternoons to sketching panels inspired by Stan Lee’s dynamic heroes, studies animation techniques from Hayao Miyazaki’s films, practices piano pieces by Ludwig van Beethoven
    and Ludovico Einaudi, and they often borrow graphic novels from the local library to fuel their storytelling.
  travel: Nolan Radabaugh loves meticulously planned weekend trips, has visited the Natural History Museum in Washington, D.C., the Redwood National Park in California, and dreams of seeing the International
    Space Station exhibit in Zurich, and they always carry a field journal to sketch landmarks and note wildlife sightings.
  culinary: Nolan Radabaugh’s favorite meals include homemade macaroni and cheese with a sprinkle of cheddar, thin‑crust pepperoni pizza topped with extra mozzarella and black olives, and they enjoy snacking
    on fresh strawberries and carrot sticks, often attempting to draw a tiny comic strip on each plate before eating.
  core: Nolan Radabaugh is a quietly ambitious eight‑year‑old who transforms solitary moments into elaborate comic worlds, hoards spare pencils like treasure, worries about unfinished projects, and quietly
    sneaks extra minutes of cartoon watching when no one’s looking.
background:
  cultural: Nolan comes from a middle‑class, white, Midwestern family in Des Plaines, Illinois. His parents, both professionals, emphasize education, community involvement, and appreciation for the arts.
    The family regularly visits the Art Institute of Chicago and the Field Museum, experiences that have nurtured Nolan’s artistic curiosity and scientific interest. They celebrate traditional holidays
    such as Thanksgiving, Christmas, and the Fourth of July with gatherings that include home‑cooked meals and storytelling. Nolan’s ancestry includes German and Irish roots, reflected in occasional cultural
    recipes and community events in the suburb. He attends a public elementary school where multicultural awareness is encouraged, and he participates in the local library’s after‑school reading and coding
    clubs. The suburban setting provides ample green spaces for his nature observations, and the diverse neighborhood exposes him to a variety of cultural perspectives, fostering an open‑minded outlook.
