  career_goals: While still at elementary school, Nolan dreams of a future where he can combine his love for art, organization, and solitary inquiry. He envisions becoming a scientific illustrator, creating
    accurate and beautiful images that explain natural phenomena, or perhaps a museum curator specializing in interactive exhibits that let visitors explore science and art at their own pace. He is also
    intrigued by the idea of a wildlife biologist who spends time in the field documenting species, with the work offering both independent research and opportunities to preserve environmental heritage.
    Nolan’s long‑term ambition includes mastering coding to develop educational software that can teach other children through visually rich, structured lessons. He hopes to work in an environment that
    values thoughtful, meticulous work and offers quiet spaces for deep focus.
