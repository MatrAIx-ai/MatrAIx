persona_description: A scientist who is interested in the discovery and exploration of new materials and their applications. They are particularly drawn to organic materials, which are often overlooked
  due to their non-metallic behavior. They are driven by the potential for these materials to be used in practical applications, such as stretchable electronics and bio-integrated devices. They are skilled
  in conducting experiments and analyzing data, and are interested in the fundamental aspects of organic materials that have not been fully explored. They are curious about the potential for organic metals
  to exhibit metallic behavior at low temperatures, and are eager to learn more about the Fermi-liquid theory and its applications.
