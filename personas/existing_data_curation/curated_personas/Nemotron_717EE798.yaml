  hobbies: '[''Group Fitness Classes (Spin, Zumba)'', ''Exploring St. Louis Food Scene'', ''Live Music and Concerts'', ''Volunteer Work at Community Garden'', ''Technology Meetups & Reading about Emerging
    Tech'', ''Traveling to New Cities'', ''Cooking Classes'', ''Networking Events'']'
  career_goals: Marilynn aims to transition into a senior operations leadership role, such as Director of Operations or Vice President of Operations, within the next five years. She plans to pursue an MBA
    to broaden her strategic perspective and is keen on leading sustainability and digital transformation initiatives that enhance efficiency while reducing environmental impact. Over the long term, she
    envisions launching her own consulting firm focused on operational excellence for small and medium-sized businesses in the Midwest, integrating her curiosity for emerging technologies with practical
    implementation.
