  hobbies: '["Zumba and line‑dance classes","Hiking in the Sonoran Desert","Volunteering at a food bank","Community gardening","DIY home organization projects","Reading about sustainable packaging","Cooking
    and hosting potluck gatherings","Attending local community theater"]'
  career_goals: Keri aims to advance to a supervisory role within the packaging department, such as Shift Lead or Operations Coordinator, where she can apply her organisational strengths and mentor staff.
    She plans to obtain an OSHA Forklift Operator certification and a Green Belt in Lean Six Sigma to broaden her technical credentials. Long‑term, she hopes to transition into a quality‑assurance or process‑improvement
    position that allows her to influence sustainable packaging practices while reducing the physical strain of floor work, thereby improving her work‑life balance and stress levels.
