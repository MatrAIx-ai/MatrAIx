persona_description: A scientist at Washington University School of Medicine in St. Louis, Benjamin D. Humphreys, MD, PhD, is leading a study that implicates a type of stem cell in the calcification of
  blood vessels in patients with chronic kidney disease. His research aims to guide future studies into ways to block minerals from building up inside blood vessels and exacerbating atherosclerosis, the
  hardening of the arteries. The study, published in the journal Cell Stem Cell, has implications for the treatment of vascular calcification, a major killer of patients with kidney disease. Humphreys is
  continuing to focus on the kidney in studying ways to guide Gli1 cells away from bone-building osteoblasts and toward vessel-healing smooth muscle cells.
