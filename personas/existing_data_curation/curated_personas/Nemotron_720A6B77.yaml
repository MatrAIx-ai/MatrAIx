    events'']'
  hobbies: '[''Vegetable gardening'', ''Canning and preserving'', ''Knitting'', ''Reading mystery novels'', ''Prairie walks'', ''Church social events'', ''Quilting'', ''Community potluck cooking'', ''Listening
    to classic country music'']'
  career_goals: Diana aims to secure a leadership role as lead cook or head chef at the local diner or community center, where she can implement consistent, high‑quality menu offerings. She plans to obtain
    a Certified Food Protection Manager credential to deepen her expertise. Over the next few years she hopes to launch a modest weekend bakery featuring classic Nebraska breads and preserves, allowing
    her to share family recipes while maintaining a predictable schedule. Additionally, she wishes to mentor younger kitchen staff, passing on her practical knowledge and dedication to routine.
