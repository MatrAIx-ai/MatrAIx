personas:
  professional: Diana Cagle is a methodical 57‑year‑old culinary specialist whose deep knowledge of Midwestern food safety, precise inventory management, and steadfast routine enables them to lead a local
    diner’s kitchen with consistent menus while gently mentoring staff in a supportive, harmony‑focused environment.
  sports: Diana Cagle is an avid participant in community walking clubs and a dedicated fan of the Nebraska Cornhuskers football team, regularly attending games at Memorial Stadium and joining a low‑impact
    senior softball league, while they occasionally feel guilty for skipping prairie jogs when bakery preparations run late.
  arts: Diana Cagle is a devoted mystery‑novel reader who enjoys Agatha Christie and Gillian Flynn, a passionate quilter who meets weekly with friends to stitch intricate prairie‑inspired patterns, and
    a lover of classic folk music by Johnny Cash and John Denver, finding comfort in the structured narratives that mirror their methodical life.
  travel: Diana Cagle is a meticulous planner who prefers road trips to nearby gems like the Badlands, Yellowstone, and Kansas City, often staying at cozy B&Bs and using a detailed itinerary to balance
    family visits with culinary workshops, yet they hesitate to book flights due to lingering travel‑related anxiety.
  culinary: Diana Cagle is a seasoned Midwestern cook who expertly transforms home‑grown tomatoes, sweet corn, and beans into preserves, artisanal sourdough loaves, and hearty hot‑dish casseroles, employing
    precise measurements, strict food‑safety protocols, and budget‑conscious sourcing to uphold a dependable kitchen rhythm.
  core: Diana Cagle is a 57‑year‑old routine‑driven chef who blends meticulous garden‑to‑table cooking, caring mentorship, and a quietly anxious yet deeply reliable nature into every aspect of their life.
background:
  cultural: Diana grew up in Ogallala, Nebraska, a tight‑knit Midwestern community with roots in German‑Russian farming heritage. Her family emphasized self‑reliance, hard work, and straightforward values,
    often expressed through home‑cooked meals and community gatherings. The local culture, shaped by agriculture, the plains, and a strong sense of neighborly support, informs her practical outlook, preference
    for tradition, and dedication to preserving regional culinary customs.
attributes:
  skills: '[''Culinary arts (grilling, roasting, sautéing)'', ''Food safety and sanitation compliance'', ''Menu planning and recipe development'', ''Budget management and cost control'', ''Inventory tracking
