  career_goals: Jamie aims to advance from her current bartender role to a head bartender or beverage manager position within the next three years, seeking certifications in advanced mixology and bar‑management.
    She envisions eventually opening her own neighborhood gastropub that highlights Southern‑inspired drinks and locally sourced food, while also completing her GED and pursuing hospitality studies to deepen
    her managerial expertise.
