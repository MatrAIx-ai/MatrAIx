persona_description: A public health practitioner with knowledge of basic epidemiologic and public health concepts, including epidemiologists, infectious disease investigators, public health nurses, environmental
  health specialists, sanitarians, laboratorians, and MPH students. They are interested in investigating and addressing public health problems related to Salmonella infection in the Caribbean, and are familiar
  with the epidemiology of the disease, the steps used to investigate and address a public health problem, and the desired characteristics of a surveillance system for a disease. They have experience in
  analyzing public health data, interpreting the results of case-control studies, and using subtyping information in foodborne disease investigations. They are also skilled in the evaluation of a surveillance
  system and in using surveillance data to identify and characterize public health problems and to monitor control measures.
