  hobbies: '[''Painting abstract watercolors'', ''Writing speculative fiction'', ''Fusion cooking'', ''Yoga and meditation'', ''Hiking'', ''Visiting art galleries'', ''Listening to avant‑garde jazz'', ''Participating
    in storytelling circles'']'
  career_goals: She aims to build a community‑centered coaching academy that fuses athletics with the arts, providing holistic development for youth and emerging artists. In the next five years she hopes
    to become the director of a regional talent development program, publish a guide on creative coaching techniques, and mentor other coaches to adopt flexible, imagination‑driven methodologies. Long‑term,
    she envisions influencing national sports and arts curricula to embed mindfulness and artistic expression.
