    training)'']'
  hobbies: '[''Watercolor painting'', ''Art gallery visits (off‑peak hours)'', ''Reading (modern art, African American history, biographies)'', ''Balcony gardening'', ''Knitting and crocheting'', ''Jigsaw
    puzzles'', ''Crossword puzzles'', ''Jazz listening'', ''Meditation and yoga'', ''Volunteer mentorship for youth'', ''Experimenting with world cuisines'']'
  career_goals: Seon aims to leverage her extensive supervisory experience to mentor the next generation of production leaders. Over the next few years she plans to earn a Six Sigma Green Belt, implement
    a department‑wide lean initiative that reduces waste by at least fifteen percent, and establish a structured mentorship program pairing seasoned crew members with newer hires. She also aspires to transition
    into a part‑time safety consulting role within the Brooklyn manufacturing community, using her organized and compassionate approach to improve workplace well‑being. Ultimately she hopes to retire with
    confidence that the teams she has nurtured will continue to thrive.
