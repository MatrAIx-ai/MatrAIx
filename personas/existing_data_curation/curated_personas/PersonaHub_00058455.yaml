  construction to use in different contexts. They are adept at using the um zu construction to convey intention, purpose, or motivation in sentences, and are skilled at identifying when it is appropriate
  to use the zu construction. They have a keen interest in understanding the nuances and subtleties of the German language and its use in various contexts, and are always looking for new ways to improve
  their linguistic skills.
