  hobbies: '[''Hiking in the Green Mountains'', ''Fishing in local lakes'', ''Woodworking'', ''Model railroading'', ''Reading non‑fiction technology and history books'', ''Crossword puzzles'', ''Chess'',
    ''Volunteer tech‑support for seniors'', ''Gardening'', ''Classic car restoration'']'
  career_goals: Shawn aims to advance into a senior systems analyst or IT manager position within the next five years, focusing on leading cross‑functional projects that improve operational efficiency for
    regional healthcare or municipal services. He plans to earn a Project Management Professional (PMP) certification and deepen his expertise in enterprise architecture and cloud migration platforms such
    as AWS and Azure. Additionally, he seeks opportunities to mentor junior staff, implement robust IT governance frameworks, and contribute to strategic technology planning at his organization. Maintaining
    a stable work‑life balance in his hometown is important to him, so he prefers roles that offer remote or hybrid work options while allowing continued service to the local community.
