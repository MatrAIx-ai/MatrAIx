  hobbies: '[''Hiking (Camelback Mountain and nearby deserts)'', ''Salsa dancing'', ''Exploring Phoenix food scene'', ''Instagram content creation'', ''Volunteering at community gardens'', ''Youth mentorship'',
    ''Reading mystery novels'', ''Digital photography of desert landscapes'']'
  career_goals: In the short term, Donielle aims to secure a role as a community outreach assistant or event coordinator within a local nonprofit or coworking space, where she can apply her organizational
    skills and outgoing nature. She plans to enroll in a community‑college program in communications or marketing to formalize her knowledge and expand her career options. Long‑term, she envisions becoming
    a community engagement manager or launching her own boutique fitness studio that blends group exercise with social networking, leveraging her competitive drive and love for group activities to build
    a thriving, people‑focused business.
