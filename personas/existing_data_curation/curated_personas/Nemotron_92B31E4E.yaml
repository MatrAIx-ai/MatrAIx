personas:
  professional: Donielle Williams leverages their strong interpersonal skills and knack for logistics to orchestrate community events, using tools like Trello and Excel to keep volunteer projects on track
    while infusing a competitive edge that pushes the team to exceed outreach goals.
  sports: Donielle Williams combines weekend hikes up Camelback Mountain with energetic salsa dancing classes, proudly roots for the Phoenix Suns and Arizona Diamondbacks, and occasionally joins a local
    co‑ed soccer league that meets at Phoenix Rising FC’s community field, where they enjoy the camaraderie of team play.
  arts: Donielle Williams captures the stark beauty of the Sonoran desert through digital photography inspired by Edward Burtynsky, curates their Instagram feed with vibrant salsa performances, and unwinds
    with mystery novels by Tana French while bopping to the salsa rhythms of Celia Cruz.
  travel: Donielle Williams prefers spur‑of‑the‑moment road trips to places like Sedona’s red rocks and Oaxaca’s bustling markets, using a blend of budget‑friendly hostels and occasional boutique stays,
    and always packs a compact camera to document the journey, where they capture sunrise over the desert horizon.
  culinary: Donielle Williams delights in the smoky tang of al pastor tacos, the crisp bite of freshly made guacamole with lime and cilantro, and experiments with homemade chipotle salsa, boasting an intermediate
    cooking skill set that lets them host weekend taco nights for friends.
  core: Donielle Williams is a socially driven, adventure‑seeking organizer who mixes competitive ambition with community spirit, often juggling event logistics, spontaneous taco hunts, and desert photo
    shoots, where they thrive on the buzz of group energy.
background:
  cultural: Donielle was raised in a middle‑class, suburban Phoenix family with Anglo‑American roots. Her upbringing reflects mainstream American customs—celebrating holidays like Thanksgiving and the Fourth
    of July—while also being shaped by the Southwest’s multicultural environment. She was exposed to Mexican cuisine, local festivals, and a diverse community through school and church youth groups. This
    blend of traditional American values and the vibrant, desert‑city culture of Phoenix informs her worldview and social interactions.
attributes:
