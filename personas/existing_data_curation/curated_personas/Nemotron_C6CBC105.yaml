  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical and theological non‑fiction'', ''Chess'', ''Hiking in Wisconsin state parks'', ''Cooking and baking for church events'', ''Volunteer work
    at a local shelter'', ''Listening to classical music'']'
  career_goals: Alvin aims to become the senior pastor of a larger congregation within the next five years, guiding the church toward sustainable growth through systematic planning. He plans to launch a
    church‑based community education center that offers adult literacy, job‑skill workshops, and theological study groups. He also intends to pursue a Master of Divinity to deepen his theological foundation
    and author a practical devotional guide for laypeople. Building a mentorship program for emerging clergy and expanding the church’s outreach services—such as a food pantry and counseling clinic—are
    key components of his long‑term vision.
