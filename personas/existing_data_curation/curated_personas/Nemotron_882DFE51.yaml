personas:
  professional: Andre Lewis, a retired handyman turned community mentor, uses decades of home‑repair, plumbing, and electrical troubleshooting expertise alongside strong budgeting skills to volunteer at
    a local after‑school program and serve as a part‑time docent, melding practical problem‑solving with storytelling about Chicago’s civil‑rights landmarks.
  sports: Andre Lewis enjoys leisurely walks through Chicago’s historic neighborhoods, follows the Chicago Cubs and Chicago Bears with avid enthusiasm, participates in a senior fitness class at the community
    center, and occasionally joins local bridge tournaments, balancing low‑impact exercise with the camaraderie of team fandom.
  arts: Andre Lewis has an ear for classic soul, blues, and jazz, regularly listening to recordings by Aretha Franklin, B.B. King, and Miles Davis while contributing tenor harmonies to the church choir,
    and they frequently attend the Chicago Blues Festival and local theater productions, letting music and performance shape their leisure.
  travel: Andre Lewis favors organized, budget‑friendly trips that blend history and leisure, having visited New Orleans for its jazz heritage, Washington, D.C. to tour civil‑rights sites, and the nearby
    historic town of Galena for weekend walking tours, while preferring short flights or train rides that accommodate their comfortable pace.
  culinary: Andre Lewis delights in cooking garden‑fresh salads with heirloom tomatoes, sweet corn succotash, and roasted root vegetables, pairs them with seasoned chicken stew seasoned with thyme and bay
    leaf, and occasionally treats themselves to a slice of New York‑style cheesecake, reflecting a modest yet imaginative palate rooted in seasonal ingredients.
  core: Andre Lewis blends a pragmatic handyman’s mindset with a historian’s curiosity, staying organized yet flexible, nurturing community ties through mentorship, music, and gardening while occasionally
    splurging on vintage vinyl and forgetting to take their blood pressure medication.
background:
  cultural: Andre grew up in the South Side of Chicago, immersed in the vibrant African‑American culture of the area. His family emphasized church involvement, storytelling, and resilience during times
    of social change, shaping his values of community service and self‑reliance. He witnessed the local impact of the civil‑rights movement and maintains strong ties to the Black church, gospel music, and
    community gatherings. Traditions of soul food cooking, barbershop conversations, and neighborhood solidarity continue to influence his daily life and worldview.
