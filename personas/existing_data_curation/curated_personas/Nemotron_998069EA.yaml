personas:
  professional: Jason Grogan is a 22‑year‑old database engineer who designs, tunes, and secures relational and NoSQL data platforms using Python, Bash, and cloud services, and they apply a critical, skeptical
    mindset to rigorously test every schema change while channeling a competitive drive to out‑perform peers in hackathons.
  sports: Jason Grogan hikes the Flint Hills every other weekend, runs with the Topeka Road Runners Club for cardio, cheers on the Kansas City Chiefs and Royals on game days, and they occasionally join
    a local pickup soccer league to stay skilled yet competitive.
  arts: Jason Grogan immerses themselves in contemporary art by visiting Topeka’s Hiss Gallery, sketches street scenes inspired by Banksy’s stencils, plays electric guitar covers of Tame Impala and Sufjan
    Stevens at open‑mic nights, and they capture the interplay of light and architecture through photography reminiscent of Henri Cartier‑Bresson.
  travel: Jason Grogan prefers meticulously planned trips that leave room for spontaneous photo expeditions, having explored the music scene of Austin and the canyons of Grand Canyon National Park, and
    they dream of chasing the northern lights in Iceland while attending a tech conference in Tokyo.
  culinary: Jason Grogan enjoys moderate‑skill cooking, frequently whipping up spicy ramen bowls with miso and sriracha, savoring Kansas City‑style BBQ ribs on weekends, and they often cap late‑night gaming
    sessions with pepperoni pizza and a cold craft beer.
  core: Jason Grogan is a curiosity‑driven, competitively minded techie who balances meticulous data work with spontaneous art and hiking, yet they habitually hoard Raspberry Pi parts and forget to water
    their plants.
background:
  cultural: Jason grew up in a middle‑class family in Topeka, Kansas, with mixed German and Irish ancestry. His upbringing reflected Midwestern values of hard work, humility, and community involvement.
    He was raised in a United Methodist household, celebrating both traditional American holidays and regional events such as the Kansas State Fair and local farmer's markets. The modest, practical ethos
    of the plains combined with his personal curiosity has given him an appreciation for both the grounded, neighborly culture of the Midwest and a willingness to explore new ideas through art, technology,
    and travel.
