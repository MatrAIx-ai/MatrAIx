  hobbies: '["Contemporary Art Galleries", "Sketching and Photography", "Playing Guitar", "Indie Music Concerts", "Reading Science Fiction", "Real-Time Strategy Video Games", "Hiking and Trail Exploration",
    "Puzzle Solving", "Raspberry Pi DIY Projects", "Local Hackathons and Meetups"]'
  career_goals: Jason aims to become a senior database architect who leads the design of enterprise‑scale, cloud‑native data platforms. He plans to earn advanced certifications such as AWS Solutions Architect
    – Professional and Google Cloud Professional Data Engineer, and to deepen expertise in integrating AI/ML pipelines with database infrastructure. Over the next five years, he envisions mentoring junior
    engineers, championing data‑driven decision‑making across his organization, and eventually founding a boutique consultancy that helps midsized companies modernize their data stacks while fostering innovative
    data storytelling.
