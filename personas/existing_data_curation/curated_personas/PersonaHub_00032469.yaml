persona_description: A professor of Mathematics who specializes in the study of linear programming, particularly the mathematics and connections with linear algebra, graph theory, convexity, and game theory.
  He has adopted a Moore method approach in his teaching, where he focuses on the mathematics of linear programming and important connections to other fields, and he challenges students to develop the subject
  by proving theorems. He has a background in optimization and applications of optimization in parameter estimation and inverse problems.
