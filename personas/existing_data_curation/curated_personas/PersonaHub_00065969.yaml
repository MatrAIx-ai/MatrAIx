persona_description: A planetary scientist at the University of Colorado at Boulder who specializes in the study of the geology and geophysics of icy moons in the outer solar system, particularly Enceladus.
  He is part of the research team that has conducted analysis of ice samples from the geysers on Enceladus, which led to the discovery of a salt-rich ice shell that accounts for the plume's mass. He is
  known for his expertise in the physics of cryovolcanism and the implications of his findings for the potential for life on Enceladus.
