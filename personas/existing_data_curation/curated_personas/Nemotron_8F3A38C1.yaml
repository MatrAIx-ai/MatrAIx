personas:
  professional: Marc Anderson, a 16‑year‑old aspiring agricultural mechanic, leverages his hands‑on farm experience and leadership as former basketball captain to excel in troubleshooting farm equipment,
    coordinating community service projects, and mentoring younger peers, all while balancing a strong sense of routine and compassion.
  sports: Marc Anderson stays active through youth soccer with the Stone County Thunder club in the spring, basketball pick‑up games in the summer, and hunting trips in the fall, while cheering on the St. Louis
    Cardinals and the Kansas City Chiefs for inspiration, and applies a disciplined yet sociable routine of daily stretching, weekend conditioning drills, and community clean‑up runs to maintain fitness.
  arts: Marc Anderson channels their outgoing energy into drumming for the church worship band, drawing rhythmical inspiration from Keith Moon, John Bonham, and contemporary worship leaders like Chris Tomlin,
    while also enjoying occasional screenings of classic westerns starring John Wayne and singing along to country classics from Johnny Cash at local potlucks.
  travel: Marc Anderson prefers short road trips planned with a simple checklist and a sprinkle of spontaneity, having already explored the Ozark National Forest, taken a family fishing weekend to Lake
    of the Woods in Canada, and attended a music festival in Nashville, while dreaming of a future camping expedition to Yellowstone and a cultural pilgrimage to Washington, D.C. to see the National Museum
    of American History.
  culinary: Marc Anderson enjoys cooking for large groups, confidently grilling BBQ brisket, fried catfish, and cornbread seasoned with garlic and paprika at county fairs, while also perfecting simple one‑pot
    chicken and dumplings and experimenting with homemade trail mix featuring peanuts, dried cranberries, and pretzel sticks, though they occasionally over‑salt dishes when excited.
  core: Marc Anderson blends farm‑grown practicality with a drum‑beat heart, trading routine tool repair for community rallies, occasional over‑cooking, and a steadfast love of fishing, soccer, and mentorship.
background:
  cultural: Marc comes from a multi‑generational white family rooted in the rural Midwest, specifically Stone County, Missouri. His upbringing reflects the traditional values of small‑town America—self‑reliance,
    neighborly support, and a strong connection to the land. The community is predominantly Protestant, with his family attending a local evangelical church that emphasizes service, modesty, and fellowship.
    Local customs such as county fairs, church potlucks, and seasonal hunting and fishing traditions play a central role in his life. While the region displays conservative cultural leanings, Marc’s outgoing
    nature and participation in diverse community groups give him a broader appreciation for cooperation across different backgrounds within his town.
attributes:
  skills: '[''Livestock care and feeding'', ''Small‑engine maintenance and repair'', ''Basic carpentry and fence construction'', ''Team leadership and conflict mediation'', ''First‑aid and CPR certification'',
