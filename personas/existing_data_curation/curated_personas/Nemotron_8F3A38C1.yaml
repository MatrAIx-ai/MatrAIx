  hobbies: '[''Playing drums in church band'', ''Youth soccer player and volunteer coach'', ''Fishing and hunting trips'', ''Cooking for community potlucks'', ''Building model kits and woodworking'', ''Participating
    in county fair activities'']'
  career_goals: Marc aspires to build a stable, community‑focused career that leverages his practical strengths and desire to help others. His immediate goal is to obtain his GED within the next two years
    and enroll in a vocational program for automotive or agricultural mechanics at a nearby trade school. He dreams of becoming a certified mechanic who can service farm equipment and local vehicles, eventually
    opening a small repair shop that serves the Aurora and Stone County community. Long‑term, Marc hopes to combine his technical expertise with his passion for mentorship by offering apprenticeships to
    younger teens, teaching them hands‑on skills and emphasizing the importance of cooperation and community service. He also intends to continue volunteering as a youth mentor at his church.
