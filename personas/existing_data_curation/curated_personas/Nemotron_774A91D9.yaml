  hobbies: '[''Visiting art museums and galleries'', ''Volunteering as a docent for community art workshops'', ''Playing pick-up basketball'', ''DIY woodworking and carpentry projects'', ''Fishing at local
    reservoirs'', ''Photography of urban street art and architecture'', ''Reading books on modern art and logistics'']'
  career_goals: He aims to earn a Certified Logistics Associate credential and progress to a supervisory or logistics coordinator role within his current company, where he can lead safety initiatives and
    drive efficiency. Simultaneously, he wishes to launch a boutique moving service that specializes in transporting artwork and antiques, blending his logistics expertise with his passion for the arts.
    In the longer term, he envisions establishing a small community space that doubles as a warehouse and gallery, offering local artists affordable storage and exhibition opportunities.
