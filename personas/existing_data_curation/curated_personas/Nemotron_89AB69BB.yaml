    Solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Cooking traditional Latin American dishes'', ''Practicing yoga and meditation'', ''Hiking in the Bay Area'',
    ''Volunteering for community financial literacy workshops (Spanish)'', ''Listening to tech and philosophy podcasts'', ''Playing acoustic guitar (Latin jazz)'']'
  career_goals: Alina aims to transition from her current financial specialist role into a senior portfolio manager position focused on sustainable and culturally resonant investments. She plans to obtain
    the CFA charter within the next two years and pursue an ESG certification to deepen her expertise in responsible finance. Long‑term, she envisions launching a boutique advisory firm that provides financial
    literacy workshops for Latinx communities in the Bay Area while also curating investment products that blend traditional finance with art and cultural assets. She seeks leadership opportunities that
    allow her to mentor diverse junior analysts and shape inclusive corporate finance strategies.
