persona_description: A professional who is responsible for managing and coordinating the use of LROC narrow angle camera (NAC) images and digital elevation models (DEMs) covering the Apollo 15 landing site,
  as well as the LRO Lunar Orbiter Laser Altimeter (LOLA) data, to connect them to the lunar laser ranging (LLR) coordinates. This involves determining the positions of LROC images and digital elevation
  models, comparing them to LROC and LOLA data, and ensuring that all other LROC and past U.S. and international mission data are in the same LLR coordinate frame for consistent human exploration planning
  and associated science activities.
