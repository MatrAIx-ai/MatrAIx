personas:
  professional: Tekisha Mcqueen, a retired humanities scholar and prolific storyteller, channels her methodical organization, vivid imagination, and refined craftsmanship into leading community workshops,
    curating historically resonant exhibitions at the local historical society, and mentoring younger writers and artists, all while balancing solitary writing sessions with collaborative choir rehearsals.
  sports: Tekisha Mcqueen enjoys gentle morning walks with the local senior walking club, cheers on the Atlanta Braves, Atlanta Falcons, and Atlanta Hawks, participates in weekly bridge games for mental
    agility, and attends a low‑impact yoga class at the community center to maintain flexibility.
  arts: Tekisha Mcqueen expresses herself through abstract watercolors inspired by Kandinsky, reads poetry by Maya Angelou and Virginia Woolf, delights in jazz records by John Coltrane and gospel classics
    by Mahalia Jackson, and weaves these influences into intricate quilts patterned after the bold geometry of Piet Mondrian.
  travel: Tekisha Mcqueen prefers meticulously planned short trips, such as a weekend garden tour in Savannah, a literary pilgrimage to Boston’s historic libraries, and a leisurely cruise along the Mississippi
    River, budgeting each outing from a dedicated travel fund while relying on family assistance for longer journeys.
  culinary: Tekisha Mcqueen delights in preparing herb‑infused roasted chicken with rosemary and thyme from her garden, simmering lavender honey tea, baking peach cobbler with fresh heirloom peaches, and
    crafting sourdough bread, though she sometimes over‑season dishes in pursuit of bold flavor.
  core: Tekisha Mcqueen is a 91‑year‑old imaginative chronicler who blends art, poetry, and community service into daily life, yet her habit of misplacing favorite brushes reveals a charming, occasionally
    forgetful, side.
background:
  cultural: Tekisha was born in 1934 in the Atlanta metropolitan area and grew up in a close-knit Black community that navigated segregation and the civil‑rights movement. Her family’s traditions are rooted
    in Southern soul food, gospel music, and oral storytelling passed down through generations. She remains active in her Baptist church, celebrates Juneteenth and other African‑American cultural commemorations,
    and supports local Black artists. Her life reflects the resilience and creativity of Southern Black women who have preserved cultural heritage while adapting to change.
