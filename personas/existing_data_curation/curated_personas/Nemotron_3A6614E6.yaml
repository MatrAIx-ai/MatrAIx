  hobbies: '[''Abstract Painting'', ''Poetry Writing'', ''Reading (Classics & Speculative Fiction)'', ''Gardening'', ''Quilting'', ''Church Choir'', ''Jazz & Gospel Listening'', ''Bridge'', ''Volunteer
    Reading'', ''Genealogy Research'']'
  career_goals: Although officially retired, Tekisha aims to finish a memoir that weaves personal memory with the broader African-American experience of the 20th century, and to publish a collection of
    her poetry. She aspires to launch a quarterly community art and storytelling workshop at the Mableton Library, curate a local exhibition on Black history for the Cobb County Historical Society, and
    continue mentoring emerging artists and writers through the neighborhood’s senior-center program.
