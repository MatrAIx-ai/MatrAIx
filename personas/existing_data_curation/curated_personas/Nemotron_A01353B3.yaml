  hobbies: '[''Ice fishing'', ''Snowshoeing'', ''Sled dog sledding'', ''Karaoke'', ''Improv comedy'', ''Photography of the aurora borealis'', ''Community volunteering'', ''Playing guitar'', ''Cooking Alaskan
    cuisine'']'
  career_goals: Milton aims to become a senior insurance advisor within the next two years, earning his Chartered Property Casualty Underwriter (CPCU) certification to deepen his technical expertise. He
    aspires to lead a small team of agents as a regional sales manager, designing specialized coverage packages for remote Alaskan communities. In the longer term, Milton envisions opening his own boutique
    agency that blends structured service delivery with a personable, community‑focused approach, while mentoring new agents who share his commitment to reliability and kindness.
