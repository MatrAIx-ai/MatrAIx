  hobbies: '[''visiting art galleries'', ''sketching and painting'', ''participating in community mural projects'', ''playing acoustic guitar'', ''cooking Salvadoran cuisine'', ''hiking in local parks'',
    ''cycling along the Delta trails'', ''watching documentaries'', ''attending cultural festivals'', ''exploring sustainable cleaning technologies'']'
  career_goals: Fernando aims to move from frontline cleaning to a supervisory role in facility management within the next three years. He plans to obtain a Certified Facility Manager (CFM) credential and
    complete a short‑course program in sustainable building operations. Long‑term, he dreams of launching his own small cleaning business that emphasizes eco‑friendly practices and integrates his artistic
    interests—offering services like customized mural cleaning and decorative wall treatments for local businesses. He also hopes to finish his associate degree, focusing on environmental health, to deepen
    his technical expertise and open pathways to higher‑level operational positions. Balancing family responsibilities, he seeks career growth that provides stability while allowing flexibility to pursue
    community art projects and cultural events.
