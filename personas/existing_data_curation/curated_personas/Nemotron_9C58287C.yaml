personas:
  professional: Fernando Claros, a 37‑year‑old commercial cleaning and building maintenance professional, combines OSHA‑certified safety expertise, bilingual Spanish‑English communication, and hands‑on
    skills in floor care, carpentry, and low‑VOC green cleaning to improvise eco‑friendly solutions on the fly, even as his relaxed attitude toward strict schedules sometimes leads to last‑minute adjustments,
    while his competitive drive fuels his ambition to become a certified facility manager within three years.
  sports: Fernando Claros enjoys weekend hikes in Mount Diablo State Park and rides with the Delta Trail Riders cycling club along the Sacramento‑San Joaquin Delta, roots for the San Francisco 49ers and
    Golden State Warriors, and approaches fitness with a laid‑back mindset, favoring spontaneous outdoor activity over rigid gym schedules despite occasional lapses due to work demands.
  arts: Fernando Claros frequents Solano County art galleries to sketch urban scenes, contributes to community murals inspired by the bold street‑art style of Banksy and the vibrant colors of Frida Kahlo,
    plays acoustic guitar at neighborhood gatherings while listening to world‑music icons like Manu Chao and Buena Vista Social Club, and lets these artistic influences fuel both their personal creative
    outlet and their vision for integrating art into future eco‑friendly cleaning services.
  travel: Fernando Claros prefers spur‑of‑the‑moment road trips to nearby wine country in Napa Valley and weekend getaways to coastal towns like Santa Cruz, while dreaming of longer adventures to Oaxaca’s
    vibrant markets and the historic streets of Granada, balancing a modest travel budget with a flexible itinerary that allows for last‑minute mural commissions or festival participations.
  culinary: Fernando Claros, an enthusiastic home chef, skillfully prepares pupusas filled with fresh cheese and loroco, tender tamales wrapped in banana leaves, and quinoa salads with avocado and lime,
    often hosting potluck evenings where friends sample their fusion of traditional family recipes and contemporary twists.
  core: Fernando Claros blends a laid‑back yet fiercely curious mindset with a love for gritty urban art, green cleaning hacks, and spontaneous culinary experiments, all while occasionally forgetting to
    file a tax receipt and over‑committing to community projects.
background:
  cultural: Fernando comes from a Salvadoran family that immigrated to California in the early 1990s. Growing up in a bilingual household, he retained a strong connection to his roots through language,
    cuisine, and community traditions. He celebrates Salvadoran holidays such as Día de la Madre and the festive Semana Santa processions with his extended family in the Bay Area. The values of close family
    ties, respect for elders, and communal solidarity are central to his identity. While he embraces American customs—participating in local holiday parades and community service—he also maintains Salvadoran
    cultural practices, often cooking traditional meals for his wife and children and sharing stories of his parents' journey. This blend of cultures informs his worldview, giving him a deep appreciation
    for diverse artistic expressions and a desire to bridge cultural gaps through his work and creative pursuits.
