personas:
  professional: Maryann Beaton, a senior database administrator poised to become a senior data architect, blends their methodical precision and curiosity about art to design resilient, ethically‑aligned
    data ecosystems for cultural institutions, excelling in SQL Server, Oracle, cloud migrations, Terraform‑driven infrastructure as code, and metadata stewardship for digital collections.
  sports: Maryann Beaton, a dedicated member of the Wasatch Hiking Club and occasional participant in the Salt Lake City Road Runners, follows the Utah Jazz and Real Salt Lake, embraces early‑morning trail
    runs in summer and ski trips to Park City in winter, balancing social camaraderie with solitary nature immersion.
  arts: Maryann Beaton, a frequent visitor of Intermountain galleries, curates photo essays of exhibitions featuring Georgia O'Keeffe, Ansel Adams, and Maya Lin, draws inspiration from the music of Bon Iver,
    the poetry of Mary Oliver, and the films of Wes Anderson, and volunteers to manage metadata for a regional digital art archive.
  travel: Maryann Beaton, who prefers meticulously planned cultural road trips, has explored Yellowstone, Sedona, and Kyoto's historic districts, while dreaming of a summer pilgrimage to the art‑laden alleys
    of Barcelona, balancing adventure hikes with leisurely museum weekends.
  culinary: Maryann Beaton, an enthusiastic home chef with a flair for experimental fusion, frequently cooks lamb tagine with apricots, miso‑glazed salmon, and beet‑infused risotto using fresh heirloom
    tomatoes, locally foraged sage, and exotic spices, while occasionally treating themselves to fine‑dining experiences at Salt Lake City's upscale restaurants.
  core: Maryann Beaton, a 38‑year‑old data‑driven art enthusiast, merges meticulous spreadsheet budgeting with spontaneous art‑supply splurges, tends to forget where they parked after hikes, and habitually
    curates photo essays of every museum visit.
background:
  cultural: Maryann grew up in a middle‑class, predominantly white community in the Mountain West, where family gatherings and community volunteerism were central. Her upbringing in Utah exposed her to
    the region’s pioneering history and a strong appreciation for the outdoors, while her humanities education nurtured a broader understanding of Western art, literature, and cultural heritage. She identifies
    with American values of individual responsibility and collaborative spirit, and she respects the local traditions of neighborly support and modesty. Though not closely affiliated with any specific religious
    community, she values the inclusive, service‑oriented aspects of the area’s cultural fabric, which informs her cooperative personality and her drive to contribute to public cultural projects.
attributes:
  skills: '[''SQL Server Administration'', ''Oracle Database Architecture'', ''Data Modeling (ER diagrams)'', ''Database Performance Tuning'', ''High‑Availability & Disaster Recovery'', ''Data Security
    & Compliance'', ''Cloud Database Services (AWS RDS, Azure SQL)'', ''Scripting (Python, PowerShell)'', ''ETL Development'', ''Infrastructure as Code (Terraform)'', ''Technical Documentation'', ''Cross‑Functional
    Communication'', ''User Training & Support'', ''Data Visualization (Power BI, Tableau)'', ''Digital Collections Management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading literature and attending book clubs'', ''Watercolor painting'', ''Landscape photography'', ''Hiking in the Wasatch Range'', ''Community data‑literacy
    workshops'', ''Cooking experimental dishes'', ''Participating in local cultural events'']'
  career_goals: Maryann aims to transition into a senior data architect role where she can lead strategic data initiatives at a regional cultural institution or a forward‑thinking enterprise. She aspires
    to develop integrated data governance frameworks that align technical excellence with the ethical stewardship of information, drawing on her humanities background. Over the next five years, she intends
    to earn certifications in cloud architecture such as AWS Certified Solutions Architect and data governance through DGPC. She also hopes to mentor junior DBAs, contribute to open‑source database tooling,
    and spearhead projects that digitize and preserve local art and historical archives, thereby merging her technical expertise with her passion for the arts.
