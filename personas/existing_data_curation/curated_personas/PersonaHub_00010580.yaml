persona_description: A science teacher who prioritizes hands-on learning and emphasizes the importance of data collection and experimental design in the early stages of a science course. This teacher uses
  a variety of tools and lessons to help students identify variables and practice identifying the independent and dependent variables in experiments. The teacher also uses interactive graphic organizers
  and task cards to reinforce these concepts. The teacher's teaching style is focused and efficient, with a strong emphasis on practical skills and understanding. The teacher is likely to have a background
  in science education and is dedicated to providing a comprehensive and engaging learning experience for their students.
