  hobbies: '["Reading picture books", "Drawing and coloring", "LEGO building", "Backyard nature exploration", "Basic piano practice", "Singing gospel and country music", "Playing memory and matching games
    with family"]'
  career_goals: Jessica dreams of helping animals one day, imagining herself as a veterinarian who cares for neighborhood pets and farm animals. She is also fascinated by the night sky and often talks about
    becoming an astronaut or a scientist who discovers new planets. Occasionally she mentions wanting to be a teacher so she can share the things she learns with other kids. These aspirations reflect her
    curiosity about the world, practical desire to help living things, and love for learning.
