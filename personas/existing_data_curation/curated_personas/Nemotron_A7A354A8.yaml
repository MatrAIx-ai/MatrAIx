personas:
  professional: Jessica Oke is a curious kindergarten‑age builder who loves snapping LEGO bricks together, already showing early spatial reasoning and a knack for turning picture‑book ideas into simple
    structures, while their relaxed approach lets them experiment without worrying about perfect results.
  sports: Jessica Oke dabbles in the community’s after‑school soccer program with the Old Hickory Kids United team, cheers on the Nashville Predators during family movie nights, and spends Saturday mornings
    hopping on a small bike to explore the neighborhood park, preferring low‑key play over organized competition.
  arts: Jessica Oke fills sketchbooks with bright crayon drawings of squirrels and butterflies, hums along to gospel classics by Aretha Franklin and country tunes by Dolly Parton while practicing piano
    basics, and can recite lines from Mo Willems’ picture books, letting music and illustration shape their imaginative play.
  travel: Jessica Oke loves weekend trips to the Great Smoky Mountains where they collect pine cones and leaf samples, dreams of visiting the historic sites of Washington, D.C., and enjoys short family
    road trips to nearby Nashville museums, balancing curiosity with the comfort of familiar surroundings.
  culinary: Jessica Oke delights in helping stir the pot of collard greens with a pinch of smoked ham, enjoys the crumbly taste of homemade cornbread with a dab of honey butter, and swaps between munching
    on apple slices and shaping LEGO‑inspired cookie cutters into tiny animal shapes during snack time.
  core: Jessica Oke is a bright‑eyed, quietly inquisitive six‑year‑old who balances a love for building, drawing, and community rituals with a relaxed, sometimes disorganized, approach to daily tasks.
background:
  cultural: Jessica is part of a Black Southern family rooted in the Nashville area. Her upbringing is infused with the warm hospitality of Old Hickory, where family gatherings often revolve around soul‑food
    dishes like collard greens, cornbread, and fried chicken, and the melodic sounds of gospel music at church. She participates in church youth activities, which include singing in the choir and learning
    stories of African‑American heritage. Her family celebrates Juneteenth and honors the legacy of local Black leaders, fostering a sense of pride in her cultural identity. The blend of Southern traditions,
    church community, and stories passed down from grandparents shapes Jessica’s worldview, encouraging both her curiosity about the wider world and her practical, community‑focused aspirations.
attributes:
