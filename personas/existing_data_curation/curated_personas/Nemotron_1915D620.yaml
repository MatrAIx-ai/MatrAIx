  career_goals: Joan aims to transition from working in a commercial bakery to opening her own boutique bakery in Green Bay that highlights seasonal, farm‑to‑table baked goods. She dreams of publishing
    a cookbook that combines traditional Midwestern recipes with her experimental twists, and she hopes to become a mentor for aspiring bakers through community classes and apprenticeship programs. Over
    the next five years, she also wants to establish a partnership with local farms and growers to create a line of signature breads and pastries that celebrate the region’s agricultural heritage.
