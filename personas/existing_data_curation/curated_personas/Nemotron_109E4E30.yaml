  career_goals: Joseph aims to earn a teaching credential and transition into a full‑time high school art and humanities instructor in his home region. Over the next five years, he plans to develop a STEAM
    program that merges visual arts with science and technology, positioning himself as a curriculum specialist for the Sullivan County school district. Long‑term, he aspires to become a department head,
    mentor new teachers, and author a collection of poetry and short stories that reflect Appalachian culture while advocating for mental‑health awareness in schools.
