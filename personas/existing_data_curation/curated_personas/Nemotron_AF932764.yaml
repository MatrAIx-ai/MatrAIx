  hobbies: '["Watercolor painting", "Reading historical fiction", "Herb and flower gardening", "Hiking", "Quilting", "Local theater", "Folk and bluegrass music", "Photography", "Volunteer story time", "Cooking"]'
  career_goals: Rose aspires to turn her lifelong love of arts and community service into a purposeful role. In the next few years she plans to enroll in a part‑time certificate program in Community Arts
    Management at a nearby community college, launch an online shop showcasing her handcrafted quilts and embroidered linens, and volunteer as a facilitator for art‑based workshops at the Clarksville public
    library. Ultimately she hopes to open a modest community art studio where local residents can gather for classes, collaborative projects, and seasonal exhibitions.
