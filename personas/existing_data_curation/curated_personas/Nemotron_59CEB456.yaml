personas:
  professional: Maynard Mirambell is a budding multimedia storyteller who blends hand‑drawn sketches with digital art tools and interactive Scratch projects, channeling their curiosity and calm focus into
    imaginative narratives that often feature marine ecosystems.
  sports: Maynard Mirambell enjoys kayaking at St. Lucie Inlet with the local youth marine club, plays on the Fort Pierce Junior Soccer League’s U‑12 team, and practices occasional beach volleyball with
    a small group of friends, preferring low‑pressure, nature‑centric activities over competitive leagues.
  arts: Maynard Mirambell immerses themselves in the world of graphic novels, drawing inspiration from artists like Alex Ross and storytellers such as Neil Gaiman, while honing guitar basics to the accompaniment
    of instrumental composers like Ludovico Einaudi, and spends weekends exploring Procreate tutorials and sketching local wildlife.
  travel: Maynard Mirambell dreams of exploring the coral reefs of the Florida Keys and the historic streets of Kyoto, but usually opts for weekend trips to nearby nature reserves like the Everglades and
    occasional family visits to Orlando’s theme parks, planning each outing with a carefully drawn map and a list of must‑see shells.
  culinary: Maynard Mirambell favors simple yet vibrant meals like shrimp tacos with homemade salsa, avocado toast topped with garden‑fresh herbs, and occasional fish‑and‑chips after a beach day, experimenting
    with basic cooking on the family stove while still relying heavily on parents for more complex dishes.
  core: Maynard Mirambell is a calm, curious 12‑year‑old who crafts digital stories, hoards shells, and balances a disciplined allowance with occasional artistic splurges, all while quietly mastering guitar
    chords and avoiding anxiety.
background:
  cultural: Maynard grows up in a middle‑class, white family in Port Saint Lucie, a suburban city on Florida’s east coast. The community blends typical Southern‑U.S. hospitality with the diverse, multicultural
    atmosphere of South Florida, where Spanish and Caribbean influences are common. Family traditions include weekend beach outings, barbecues with neighbors, and visits to local museums and the nearby
    Atlantic Ocean. His school reflects a mix of cultures, exposing him to Hispanic and Caribbean peers, while his household maintains a primarily Anglo‑American cultural identity, emphasizing politeness,
    modesty, and a strong work ethic. The coastal environment shapes his appreciation for marine life and environmental stewardship.
