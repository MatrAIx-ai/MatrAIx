  career_goals: Maynard hopes to attend a specialized high‑school program that blends visual arts with environmental science. In the long term, he envisions a career that fuses his love for art and the
    natural world—such as becoming a marine‑focused concept artist or documentary filmmaker who creates visual stories to raise awareness about ocean conservation. He also dreams of earning a degree in
    marine biology or environmental design and later contributing to community education programs in Port St Lucie, inspiring other young people to appreciate both art and the environment.
