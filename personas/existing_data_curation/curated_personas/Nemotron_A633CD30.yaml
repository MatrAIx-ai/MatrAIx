  hobbies: '[''Basketball'', ''Running'', ''Hiking'', ''Cooking Southern cuisine'', ''Tech meetups'', ''Online gaming'', ''Board games'', ''Saxophone'', ''Reading sci‑fi'', ''Coding mentorship'']'
  career_goals: In the next three to five years, Stafford aims to transition into a Solutions Architect role where he can design scalable, reliable cloud platforms for enterprise clients. He also aspires
    to lead a diverse engineering team, champion inclusive hiring practices, and influence product strategy through data‑driven decision making. Long‑term, he envisions launching a nonprofit coding academy
    in central Arkansas that provides free technical training to Black youth, boosting representation in tech. Ultimately, he hopes to become a CTO of a mission‑driven technology company that balances business
    success with social impact.
