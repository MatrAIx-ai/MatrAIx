    governance advising'', ''Compliance technology implementation'', ''Conflict resolution and negotiation'', ''Project and program management'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending live music and jazz performances'', ''Participating in improv comedy workshops'', ''Cooking and hosting themed dinner parties'', ''Yoga and
