    ''Networking with professional women’s groups'', ''Playing board games with friends'']'
  career_goals: In the next few years, Casey aims to step into a senior compliance leadership role, overseeing a multi‑disciplinary team and shaping the company’s risk‑management strategy. Her long‑term
    ambition is to become a Chief Compliance Officer for a major energy or technology firm, where she can influence industry best practices and champion ethical innovation. She also aspires to mentor emerging
    compliance professionals—particularly women—and to contribute thought leadership through speaking engagements, publications, and participation in regulatory advisory panels. Ultimately, Casey envisions
    integrating her passion for the arts into corporate social responsibility initiatives that use creative programming to strengthen employee engagement and community ties.
