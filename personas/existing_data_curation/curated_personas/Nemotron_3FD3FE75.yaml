personas:
  professional: Tonya Hopson is a seasoned education specialist who combines curriculum design expertise, meticulous event‑planning skills, and a community‑oriented mindset to develop after‑school enrichment
    programs, while they also integrate educational technology and hands‑on learning for middle‑school students.
  sports: Tonya Hopson enjoys hiking the Minnesota River Valley State Trail on weekends, participates in a local walking club, and is an avid supporter of the Minnesota Vikings and the Minnesota Twins,
    attending games whenever schedules allow, while they also organize seasonal community fitness challenges for youth.
  arts: Tonya Hopson immerses themselves in historical fiction and educational theory through a book club that recently discussed works by Doris Kearns Goodwin and Ken Burns, finds creative solace in quilting
    while listening to folk singer Judy Collins, and volunteers at the local theater where they appreciate productions of Neil Simon and Lin‑Manuel Miranda.
  travel: Tonya Hopson favors weekend road trips that blend farm‑to‑table experiences with cultural exploration, having toured the Hudson Valley’s artisan farms, the Amish countryside of Lancaster, Pennsylvania,
    and dreaming of a summer stay in Sonoma County’s vineyards, yet they plan travel around school calendars and a modest vacation budget.
  culinary: Tonya Hopson delights in farm‑to‑table cooking, regularly growing heirloom tomatoes, rainbow carrots, and purple potatoes to feature in dishes like roasted beet salad with goat cheese, quinoa
    pilaf seasoned with fresh rosemary and thyme, and a signature summer gazpacho, while they also experiment with fermentation to make homemade sauerkraut and kombucha.
  core: Tonya Hopson blends organized pragmatism with a curious love for community, juggling gardening, quilting, and volunteer tutoring while habitually over‑planning their day and secretly hoarding vintage
    seed packets.
background:
  cultural: Tonya comes from a Midwestern white family with deep roots in Minnesota, tracing ancestry to German and Scandinavian immigrants who settled the state in the late 19th century. Growing up in
    the small town of Jordan, she was raised with values of self-reliance, community involvement, and a strong emphasis on education. Her family traditions include celebrating holidays such as Thanksgiving,
    St. Luther’s Day, and midsummer gatherings that feature homemade foods and folk music. The local Lutheran church has been a central cultural anchor, shaping her sense of service, modesty, and cooperative
    spirit. This background informs her practical outlook, love of seasonal cycles in gardening, and commitment to fostering harmonious relationships within her community.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Educational Technology Integration'', ''Classroom Management'', ''Differentiated Instruction'', ''Event Coordination'', ''Project Scheduling'',
