  hobbies: '[''Gardening'', ''Farm-to-table Cooking'', ''Volunteer Tutoring'', ''Book Club'', ''Historical Fiction Reading'', ''Quilting'', ''Hiking'', ''Church Community Service'', ''Potluck Planning'']'
  career_goals: Although Tonya is currently not employed full-time, she aims to re-enter the education field in a capacity that leverages her strengths in organization and community engagement. She plans
    to obtain a teaching endorsement for adult literacy and to launch a part-time tutoring service focused on reading and math support for middle-school students in Jordan. In the longer term, she aspires
    to become a coordinator for after-school enrichment programs at the local school district, and to pursue a master’s degree in Educational Leadership to qualify for a leadership role on the district
    board. She also hopes to mentor younger parents through a community parenting workshop series that blends practical life-skills with evidence-based child development insights.
