personas:
  professional: Jacob Nelson, a master carpenter in Dayton, Ohio, leverages his meticulous blueprint interpretation, structural framing expertise, and disciplined project scheduling to deliver flawless
    custom remodels while using his natural tendency toward structure and his considerate leadership style to keep crews harmonious and clients satisfied.
  sports: Jacob Nelson, a modest fitness enthusiast, spends early mornings fishing at Buckeye Lake, joins the Dayton Archers club for weekend target practice, and follows the Cleveland Browns and Ohio State
    Buckeyes with a loyal, if reserved, fan fervor, while maintaining a weekly routine of light weight‑training at the local gym.
  arts: Jacob Nelson, an avid admirer of maritime art and folk music, spends quiet evenings listening to the gentle strummings of John Denver and the storytelling lyrics of Bob Dylan, perusing the works
    of maritime painter Winslow Homer, and attending seasonal performances at Dayton’s historic Victoria Theatre, all of which fuel the aesthetic details in his scale ship models.
  travel: Jacob Nelson, a methodical planner, prefers structured road trips that balance work and leisure, having explored the historic shipyards of Gdańsk, the scenic landscapes of Mackinac Island, and
    the mountain trails of Colorado, while eyeing future voyages to Norway’s fjords and Japan’s woodworking museums, all within a two‑week window to accommodate family commitments.
  culinary: Jacob Nelson, a competent home cook, enjoys preparing herb‑marinated grilled trout harvested from local lakes, slow‑cooked beef pot roast with root vegetables from his garden, and hearty pierogi
    stuffed with potatoes and cheese, while occasionally rewarding himself with a quarter‑pound cheeseburger after a demanding project.
  core: Jacob Nelson, a structured yet quietly anxious carpenter, channels his love for precision into flawless woodworking, disciplined finances, and carefully planned leisure, but tends to over‑schedule,
    worry about imperfections, and occasionally indulges in late‑night fast‑food cravings.
background:
  cultural: Jacob grew up in the suburban neighborhoods of Dayton, Ohio, in a working‑class white family with deep Midwestern roots. His upbringing emphasized a strong work ethic, self‑reliance, and community
    involvement, often shaped by local church and neighborhood gatherings. Though not overtly religious, he values the tradition of modesty, punctuality, and mutual support that characterizes many Midwestern
    communities. His family's heritage includes German and Irish ancestry, which he honors through practical skills passed down from older relatives, such as woodworking and seasonal gardening.
attributes:
  skills: '[''structural framing'', ''custom cabinetry'', ''finish carpentry'', ''blueprint interpretation'', ''project scheduling'', ''budget management'', ''OSHA safety compliance'', ''tool maintenance'',
