  hobbies: '[''woodworking'', ''scale model ship building'', ''vegetable gardening'', ''fishing'', ''reading non-fiction (woodworking, sustainability)'', ''puzzle solving'', ''chess'', ''volunteering with
    Habitat for Humanity'', ''DIY home improvement projects'', ''jogging in nature'']'
  career_goals: Jacob aims to earn a Master Carpenter certification and eventually become a foreman for a reputable construction firm in the Dayton area. He also envisions opening a boutique remodeling
    business focused on high‑quality, custom residential projects that allow him to maintain tight control over quality and schedule. Balancing professional growth with family stability, he plans to pursue
    continuing education in small‑business management to ensure his venture can support his wife and future children while reducing the stress that comes from unpredictable workloads.
