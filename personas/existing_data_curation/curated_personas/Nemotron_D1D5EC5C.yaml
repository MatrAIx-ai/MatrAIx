  career_goals: Even though retired, Frankie remains driven to apply her business acumen in ways that benefit her community. She aims to mentor a cohort of young entrepreneurs in Sioux Falls through a quarterly
    workshop series and one‑on‑one coaching, while serving on the board of a local nonprofit that promotes financial literacy among seniors. Frankie also wishes to author a guidebook on practical retirement
    planning, drawing on her own experiences to help others navigate the transition to retirement with confidence. Additionally, she hopes to establish a modest consulting practice that helps small local
    businesses streamline operations and improve profitability, providing her with a competitive outlet and a sense of purpose. Recognition such as the city’s ‘Community Business Advocate’ award would validate
    her contributions, and she aspires to leave a lasting legacy of empowered seniors and thriving small enterprises.
