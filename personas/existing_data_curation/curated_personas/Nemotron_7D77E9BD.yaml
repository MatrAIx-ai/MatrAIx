  career_goals: Although retired from formal employment, Steven aims to stay mentally and physically active by mentoring younger volunteers at the local historical society, leading DIY workshops for seniors,
    and completing a written memoir that captures the changing social fabric of Harford County. He also hopes to travel with his wife to visit family roots in Ireland and to maintain his health through
    regular walks on local trails, ensuring he can continue to contribute to community gatherings for years to come.
