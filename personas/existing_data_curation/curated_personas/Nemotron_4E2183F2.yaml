  hobbies: '[''Preparing traditional Vietnamese dishes'', ''Cultivating a vegetable garden'', ''Reading historical biographies'', ''Researching family genealogy'', ''Attending Vietnamese cultural festivals'',
    ''Walking in local parks'', ''Quilting and embroidery'', ''Listening to traditional music'', ''Practicing Tai Chi'']'
  career_goals: Although retired from formal employment, Thanhxuan aims to deepen her impact on the Vietnamese-American community in Houston. She aspires to record oral histories of elder neighbors, creating
    a digital archive that preserves cultural narratives for future generations. She plans to mentor young Vietnamese professionals through a scholarship fund she hopes to establish with local Asian-American
    partners. Continuing her personal growth, she seeks to master digital storytelling tools to share recipes and cultural customs online. Maintaining her health and independence remains a priority, so
    she also intends to expand her involvement in senior wellness programs and yoga classes tailored for older adults.
