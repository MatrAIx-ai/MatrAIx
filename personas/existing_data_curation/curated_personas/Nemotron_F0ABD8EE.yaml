personas:
  professional: Stanley Banzon, a 17‑year‑old aspiring automotive/HVAC technician, leverages their hands‑on knack for following detailed manuals and assembling mechanical kits to excel in part‑time garage
    work, thriving in small, clearly defined teams where their methodical problem‑solving and reliability shine.
  sports: Stanley Banzon enjoys early‑morning fishing at Lake Texoma, joins a weekend hiking group that explores the trails of Cedar Hill State Park, and faithfully follows the Allen High School Eagles
    football games, occasionally cheering for the Dallas Cowboys on Sundays.
  arts: Stanley Banzon finds creative satisfaction in assembling model kits while listening to the instrumental scores of Hans Zimmer and the synth‑heavy tracks of Daft Punk, and appreciates documentaries
    about automotive restoration, which reinforce their passion for precision and craftsmanship.
  travel: Stanley Banzon prefers structured, budget‑friendly trips such as road‑cooking expeditions to the Hill Country for hiking, and dreams of visiting Tokyo’s Akihabara district to hunt rare model kits,
    planning each itinerary down to fuel stops and lodging reservations.
  culinary: Stanley Banzon cooks simple, protein‑rich meals like grilled chicken with quinoa, fish tacos after a day on the lake, and hearty chili using beans, potatoes, and cheddar, favoring readily available
    ingredients and relying on YouTube tutorials to refine their culinary technique.
  core: Stanley Banzon is a disciplined teen who balances a love for methodical model building and fishing with a modest budget, occasional sleep‑depriving gaming marathons, and a clear vision of becoming
    a future repair‑shop owner.
background:
  cultural: Stanley grew up in the suburban community of Allen, Texas, within a middle‑class, white family that values reliability, community involvement, and modest ambition. His upbringing combined typical
    Texan cultural touchstones—high‑school football Saturdays, barbecues, and a strong sense of local community—with a broader American mainstream media environment. He attended the local elementary school
    and left formal schooling before ninth grade, but his family emphasized practical skills, self‑reliance, and participation in local church and neighborhood activities. This blend of suburban Texas culture
    and a focus on tangible, orderly work has shaped his worldview and aspirations.
attributes:
  skills: '[''Basic computer use (Microsoft Office, email)'', ''Fundamental automotive maintenance (oil changes, tire rotations)'', ''DIY furniture assembly and small home repairs'', ''Simple cooking and
