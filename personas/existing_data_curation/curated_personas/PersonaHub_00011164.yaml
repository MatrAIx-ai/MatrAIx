persona_description: Beth Ross, a postdoctoral research associate who is currently conducting research on the demographic and ecological impacts of conservation programs and land use practices on lesser
  prairie-chickens, a species of prairie chicken found in Kansas and eastern Colorado. Ross is particularly interested in the interaction between land use and climate change, and how changes in these factors
  are affecting the lesser prairie-chicken population. She is collaborating with Dr. David Haukos and Dr. Christian Hagen to evaluate the impacts of CRP and other conservation practices on the lesser prairie-chicken
  population. Ross's research is relevant to a wide range of stakeholders, including land managers, conservation organizations, and policymakers, who are interested in understanding the ecological and demographic
  impacts of conservation programs and land use practices on lesser prairie-chickens and other wildlife species.
