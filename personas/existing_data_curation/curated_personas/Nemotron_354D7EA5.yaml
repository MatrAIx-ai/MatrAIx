  career_goals: Billy aims to move from a territory sales representative to a regional sales manager within the next three years, overseeing a team of reps across multiple counties. He is driven to become
    the top‑performing salesperson in his company, earn the annual President's Club award, and eventually launch his own wholesale distribution venture focused on sustainable manufacturing products. To
    support these ambitions, he plans to refine his organizational skills, pursue targeted sales leadership training, and implement data‑driven processes to enhance team performance.
