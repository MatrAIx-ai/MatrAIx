personas:
  professional: Dakota Silva, a seasoned IT support specialist with over two decades of hands‑on experience in desktop and network troubleshooting, blends a curiosity for emerging cloud‑IoT solutions with
    a practical, well‑documented approach, leverages strong communication to translate tech jargon for end‑users, drives competitive first‑call‑resolution metrics, and pursues a senior analyst role while
    mentoring junior staff.
  sports: Dakota Silva, a recreational volleyball player in the Rutherford County league, dances enthusiastically at local country‑music barn events, avidly follows the Nashville Predators and Tennessee
    Titans, and hikes the Blue Ridge foothills with a walking club for both fitness and stress relief.
  arts: Dakota Silva, a board‑game aficionado who hosts weekly Catan nights, finds inspiration in country icons like Garth Brooks and Dolly Parton during barn‑dance spin‑sessions, and unwinds with classic
    films starring Morgan Freeman, weaving these artistic threads into their social fabric.
  travel: Dakota Silva, a meticulous yet adventure‑seeking traveler, has explored Asheville’s art scene, soaked the historic streets of Savannah, trekked the Great Smoky Mountains, and now dreams of a road
    trip to Banff and a cultural tour of Edinburgh, always balancing budget spreadsheets with spontaneous detours.
  culinary: Dakota Silva, a garden‑to‑table enthusiast, harvests backyard tomatoes, basil, and lavender to craft zesty salsa, herb‑infused pesto, and rustic rosemary‑roasted chicken, relishing Southern‑style
    BBQ ribs on weekends, though they sometimes over‑salt dishes in their quest for bold flavor.
  core: Dakota Silva, a technically savvy community‑leader with a competitive edge, balances curiosity and practicality while navigating stress‑filled workdays, garden‑grown meals, and vibrant social circles.
background:
  cultural: Dakota grew up in a modest, working‑class family in the foothills of western North Carolina. Although her surname reflects Portuguese ancestry—her grandparents immigrated to the United States
    in the mid‑20th century—her upbringing was steeped in Southern Appalachian traditions. She internalized the region’s emphasis on self‑reliance, community reciprocity, and hospitality. Church gatherings,
    county fairs, and local festivals have been central to her social life, fostering strong ties with extended family across the Carolinas. This blend of Appalachian practicality and respect for her European
    heritage shapes Dakota’s pragmatic problem‑solving style and her commitment to giving back to the community.
attributes:
  skills: '[''Troubleshooting hardware and software'', ''Windows and macOS administration'', ''Network configuration and basic security'', ''Customer service and communication'', ''Ticketing systems (ServiceNow,
