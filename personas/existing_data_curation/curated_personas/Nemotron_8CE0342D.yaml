    365 administration'', ''Mentoring and training'', ''Process improvement and metrics analysis'']'
  hobbies: '[''Community tech meet‑ups'', ''Board‑game nights'', ''Volunteering teaching computer basics'', ''Country‑music dancing'', ''Recreational volleyball'', ''Gardening (tomatoes, herbs, native wildflowers)'',
    ''Raspberry Pi and PC building projects'', ''Mindfulness meditation'', ''Journaling'', ''Hiking the Blue Ridge foothills'']'
  career_goals: Dakota aims to advance to a senior support analyst or team‑lead position within the next two to three years, leveraging her experience to shape service‑delivery processes. She plans to earn
    additional credentials such as CompTIA Security+ and ITIL Foundation to broaden her expertise in security and service management. Her immediate goal is to spearhead a knowledge‑management initiative
    that reduces resolution times and improves first‑call success rates. Long‑term, she envisions launching a boutique IT support consultancy that serves small businesses throughout Rutherford County, combining
    her practical troubleshooting skills with a competitive drive for rapid, high‑quality service. She also seeks to champion employee well‑being programs at her workplace to mitigate stress and promote
    a healthier work environment, while building a stable financial foundation for a comfortable retirement and possibly investing in a small hobby farm.
