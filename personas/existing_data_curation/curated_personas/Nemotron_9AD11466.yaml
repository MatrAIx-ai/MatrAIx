personas:
  professional: Raquel Alejandro, a teen digital creator who blends meticulous planning and a competitive drive honed on the soccer field with a curious yet practical approach to animation, crafts short
    stories in Procreate and Scratch while volunteering to streamline event logistics at community festivals.
  sports: Raquel Alejandro is a forward for the local youth soccer club Dynamo Juniors, idolizes the tactical play of Manchester City and the resilience of the women's national team, trains three times
    a week, and channels their competitive spirit into sharpening positioning and finishing drills.
  arts: Raquel Alejandro merges their love for cumbia and salsa rhythms with visual storytelling, drawing inspiration from digital illustrators like Loish and animated shorts by Studio Ghibli, while turning
    pages of Gabriel García Márquez and Malcolm Gladwell to fuel narrative ideas for Procreate sketches and Scratch animations.
  travel: Raquel Alejandro loves quick weekend trips to the nearby mountains for soccer drills, and sets their sights on future adventures to Mexico City’s museums, Buenos Aires’s tango halls, and Kyoto’s
    cherry‑blossom festivals, balancing family budget constraints with a yearning for immersive cultural experiences.
  culinary: Raquel Alejandro gravitates toward vibrant flavors, often whipping up quick arepas filled with cheese and avocado, snack‑preferring crunchy plantain chips, and experimenting with homemade salsa
    verde for their occasional taco nights, while savoring a bowl of hearty lentil soup when studying.
  core: Raquel Alejandro is a methodical teen who balances a fierce competitive streak on the soccer field with a quiet love for digital animation, yet often forgets to hydrate between practice sessions.
background:
  cultural: Raquel comes from a Colombian family originally from the Antioquia region. Her parents emigrated to Miami seeking better opportunities while preserving traditions such as weekend family meals
    featuring bandeja paisa, celebrating Colombian holidays like Día de la Independencia, and listening to vallenato and reggaeton. Growing up bilingual, she attends a public middle school with a vibrant
    Latino student body and participates in the local Colombian community center's events. The blend of Colombian cultural values—family cohesion, respect for hard work, and a love for music and dance—intertwines
    with Miami's multicultural environment, shaping her identity and worldview.
