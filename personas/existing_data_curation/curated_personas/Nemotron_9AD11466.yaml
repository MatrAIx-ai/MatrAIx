  career_goals: Raquel aims to graduate high school with honors and pursue a degree in civil engineering or computer science—fields that blend her curiosity for building practical solutions with her interest
    in technology. She hopes to earn a scholarship to a Florida university, become a leader in student engineering clubs, and eventually work on sustainable infrastructure projects that protect Miami's
    coastal neighborhoods. Alongside her professional aspirations, she wants to stay connected to her Colombian heritage by designing community spaces that celebrate Latin American culture.
