  hobbies: '[''sketching'', ''watercolor painting'', ''digital drawing'', ''reading graphic novels'', ''journaling'', ''beach exploration and shell collecting'', ''Minecraft creative mode'', ''hand drum
    practice'', ''listening to bomba and plena music'']'
  career_goals: Daisy dreams of turning her love for visual creation into a professional career. She hopes to earn a scholarship to a specialized arts high school where she can deepen her skills in illustration
    and concept design. Her long‑term ambition is to become a concept artist for video games or an independent graphic novelist, showcasing her work in galleries and online platforms while earning recognition
    in national art competitions. She also aspires to study marine biology in college, combining her curiosity about the sea with artistic documentation of coral reefs, aiming to publish illustrated scientific
    guides. Her competitive nature drives her to win the annual school art contest and eventually represent Puerto Rico in island‑wide youth art festivals.
