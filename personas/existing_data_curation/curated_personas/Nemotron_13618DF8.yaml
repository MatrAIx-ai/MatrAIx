personas:
  professional: Daisy Mercado, an 11-year-old budding visual storyteller, merges delicate watercolor sketches of beach and mangrove scenes with vibrant digital illustrations on their tablet; they structure
    each project with a meticulous outline before allowing spontaneous fantasy characters to emerge, reflecting a curious mind that balances organization with creative flexibility.
  sports: Daisy Mercado participates in the Clearwater Bay Junior Surf Club, where they practice solitary board drills, supports the local soccer team Coastal United during weekend matches, and follows
    the national women's soccer squad with enthusiasm, preferring the calm of early-morning beach workouts to team sports.
  arts: Daisy Mercado draws inspiration from Studio Ghibli's Hayao Miyazaki, graphic novelist Gene Luen Yang, and the rhythmic beats of Los Pleneros de la 21 while they sketch mangrove canopies, create
    fantasy scenes on their tablet, read graphic novels like 'Bone' and 'Amulet', and occasionally practice simple hand-drum rhythms to accompany their art sessions.
  travel: Daisy Mercado enjoys quiet, low-key travel, having explored the mangrove reserve of South Bay and the historic lighthouse on Isla del Sol, while they dream of snorkeling the Great Barrier Reef,
    wandering the bamboo forests of Kyoto, and collecting sea glass on the secluded shores of Palawan.
  culinary: Daisy Mercado loves helping in the kitchen, especially preparing grilled fish tacos with lime, cilantro, and mango salsa, making mango sticky rice with coconut milk, and blending bright fruit
    smoothies with pineapple and coconut water, though their cooking skill is still at a beginner level, and they often learn recipes from their mother's notebook.
  core: Daisy Mercado is a solitary, curiosity-driven 11-year-old who turns worry into detailed watercolor art, digital fantasy worlds, and meticulous journal-keeping; they balance a competitive edge with
    a love for quiet exploration.
background:
  cultural: Daisy was born and raised in Loíza, a coastal municipality on the northeastern coast of Puerto Rico known for its vibrant Afro‑Puerto Rican heritage. Her family celebrates traditional festivals
    such as the Carnaval de Loíza and the annual Bomba y Plena gatherings, where she has learned the distinctive rhythms and dances that define the community. Growing up in a bilingual household, she speaks
    Caribbean Spanish fluently and is taught English at school, giving her a mixed linguistic perspective. The daily cuisine at home includes mofongo, alcapurrias, and fresh seafood, reflecting the island’s
    agricultural and maritime roots. The warm, humid climate, the sound of waves crashing on the nearby beaches, and the lush mangrove ecosystems shape her appreciation for nature. Catholic traditions also
    play a role in family celebrations, especially around Christmas and Three Kings Day. These cultural influences nurture her artistic sensibility, provide rich visual and auditory material for her creations,
    and reinforce a strong sense of pride in her Puerto Rican identity.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration'', ''basic Scratch programming'', ''organizational skills'', ''bilingual Spanish-English'', ''research and information evaluation'',
