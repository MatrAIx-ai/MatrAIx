  career_goals: Victor aims to move from his current sales representative role to a senior sales associate within the next year, then to a team lead or regional sales manager within three years. He plans
    to increase his territory's revenue by at least 20% through upselling and new client acquisition. In the longer term, he intends to earn a GED and pursue an associate degree in business administration,
    eventually launching his own service-consulting firm that helps local small businesses improve their customer engagement. He also hopes to mentor new sales reps and become a recognized community leader.
