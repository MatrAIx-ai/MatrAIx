persona_description: A teacher or educational researcher interested in the development of educational software and virtual environments aimed at promoting empathy, social skills, and conflict resolution
  among children. The person is knowledgeable about the psychology of bullying, the development of synthetic characters, and the use of virtual dramas in education. They are interested in the latest research
  in the field of artificial intelligence and the integration of emotional agents into educational software. The person is familiar with the eCircus European project and the FearNot! application, and is
  interested in the project's goals and objectives.
