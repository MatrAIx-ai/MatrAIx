  career_goals: Taylor aims to expand her interdisciplinary program into a certificate series that explores contemporary art and social change, providing a bridge between the college and the wider Mapleton
    community. She hopes to mentor a cohort of junior faculty in using flexible, student-centered teaching methods and to secure a small grant for a traveling exhibition of student artwork across rural
    North Dakota. In the next five years she plans to author a reflective memoir on lifelong learning and to establish a legacy scholarship for non-traditional students.
