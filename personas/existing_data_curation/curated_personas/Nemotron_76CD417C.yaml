personas:
  professional: Taylor Murphy, a seasoned community college humanities professor, leverages three decades of interdisciplinary teaching expertise and a relaxed, curiosity‑driven style to design flexible,
    project‑based curricula that empower adult learners while navigating occasional disorganization and emotional reactivity.
  sports: Taylor Murphy, an enthusiastic supporter of the North Dakota State Bison football team and a member of the Mapleton senior walking club, enjoys gentle prairie nature walks each spring and occasionally
    joins community softball games, valuing social interaction over intense competition.
  arts: Taylor Murphy, a watercolour painter and avid digital photographer, draws creative inspiration from Grant Wood, Ansel Adams, and folk singer Brandi Carlile, regularly participates in the town’s
    quilting circle and attends productions at the Black Hills Playhouse, where the blend of visual and performing arts fuels their interdisciplinary teaching.
  travel: Taylor Murphy, a curious traveler who favors off‑beat cultural festivals, has visited the International Folk Festival in Grand Forks, the St. Paul Winter Carnival, and a summer art retreat in
    Santa Fe, while dreaming of a pilgrimage to the historic architecture of Prague and the prairie landscapes of Alberta’s Badlands.
  culinary: Taylor Murphy, an adventurous home cook with a penchant for Midwestern comfort foods, loves preparing hearty chicken‑and‑dumplings with fresh dill and local honey, while also experimenting with
    Mexican street‑taco toppings like cilantro and lime, and often explores farmers’ market stalls for heirloom tomatoes and squash.
  core: Taylor Murphy, a charismatic 67‑year‑old educator, balances a lifelong love of art and community with occasional disorganization and an undercurrent of anxiety that fuels both creative bursts and
    moments of intense self‑doubt.
background:
  cultural: Taylor was raised on a family farm near Mapleton, North Dakota, in a community with deep German-Scandinavian roots. The region’s strong emphasis on self-reliance, community involvement, and
    seasonal celebrations shaped her values of cooperation and local engagement. While identifying as white American, she embraces the multicultural tapestry of the Upper Midwest, often incorporating Indigenous
    storytelling and immigrant narratives into her teaching. Her lifelong participation in the town’s church choir and annual harvest fair reflects a blend of traditional Midwestern customs and a curiosity
    for evolving cultural expressions.
