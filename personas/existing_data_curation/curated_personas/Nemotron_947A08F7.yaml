  career_goals: Kenneth aims to leverage his technical knowledge and communication strengths to move into a supervisory or team‑lead position within the contact‑center environment within the next three
    years. He plans to obtain certifications such as the Certified Customer Service Professional (CCSP) and ITIL Foundation to broaden his expertise in service‑delivery processes. Ultimately, he aspires
    to a role where he can design training programs, mentor new agents, and influence process improvements while preserving the routine and structure he values. He is also considering a master's degree
    in Business Administration or Management to expand his leadership prospects.
