personas:
  professional: Kenneth Neck, a 32‑year‑old contact‑center specialist with a STEM background, leverages their technical fluency and knack for translating jargon into friendly language to streamline SOPs,
    coach new hires, and quietly eye a supervisory role that blends routine structure with opportunities to design training programs.
  sports: Kenneth Neck plays forward in a Saturday morning recreational soccer league, hikes the Umstead State Park trails on weekends, and loyally follows the Carolina Panthers, the Charlotte Hornets,
    and the local Durham Bulls, often joining friends for trivia‑filled game‑day gatherings.
  arts: Kenneth Neck thrives on improv comedy workshops, karaoke performances of Tom Jones and Beyoncé, and frequent viewings of classic sitcoms like *The Office* while collecting vintage model‑building
    kits, citing performers such as Tina Fey and John Mulaney as artistic inspirations.
  travel: Kenneth Neck prefers planned weekend getaways to nearby Asheville’s arts district and the Great Smoky Mountains, while dreaming of a spring trip to New York City to see a Broadway musical, balancing
    their love for familiar routines with occasional adventurous spurts.
  culinary: Kenneth Neck enjoys hearty pub fare such as fish‑and‑chips and craft beers during trivia nights, but also delights in cooking homemade chicken tikka masala and perfecting a Sunday‑morning stack
    of blueberry pancakes, favoring ingredients like garlic, cumin, and fresh basil.
  core: Kenneth Neck blends routine‑driven efficiency with a high‑energy social streak, juggling anxiety with yoga, and channeling their talkative nature into both customer support leadership and improv
    comedy.
background:
  cultural: Kenneth grew up in the suburban outskirts of Raleigh, North Carolina, in a middle‑class, predominantly White community. His upbringing reflects the Southern‑mid‑Atlantic blend of practical,
    down‑to‑earth values and a strong sense of community. Family gatherings, church involvement, and local sports events played a central role in his early life, instilling a respect for routine, reliability,
    and hospitality. Living now in Cary, he stays connected to the Research Triangle’s tech‑oriented culture, benefiting from exposure to diverse professional networks while maintaining the pragmatic, modest
    ethos of his hometown.
