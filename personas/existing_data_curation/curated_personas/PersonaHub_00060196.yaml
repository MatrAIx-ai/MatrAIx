persona_description: A computational biologist with expertise in metagenomics and bioinformatics, particularly in the study of environmental organisms and their role in the spread of antimicrobial resistance
  (AMR). The individual has experience in assembling microbial genomes, mapping and annotating metagenome sequences, and identifying AMR genes in pathogen genomes. They are interested in using this knowledge
  to understand the role of the environment as a reservoir for pathogen AMR, and are looking for a PhD project that will allow them to apply their skills to this area. They are also interested in gaining
  hands-on experience through a placement in a research laboratory.
