  career_goals: Although retired, Bruce aims to stay actively engaged in his community by curating rotating art displays at the local senior center and establishing a mentorship program that pairs senior
    artists with high‑school students. He aspires to develop his own portfolio of mixed‑media paintings, eventually showcasing a retrospective in the Alden community hall. Bruce also hopes to author a collection
    of personal essays recounting his life experiences and the cultural history of Genesee County, contributing to the town’s historical archive. A secondary ambition is to serve on the town’s cultural
    advisory board, influencing broader arts initiatives within the region.
