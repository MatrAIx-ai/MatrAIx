personas:
  professional: Eric Fulton is a budding visual artist and beatmaker who leverages free digital tools and street-art techniques to create murals, album covers, and social media graphics, while their spontaneous
    nature leads them to juggle projects without strict deadlines, relying on their curiosity and collaborative spirit to turn every commission into a community-focused experiment.
  sports: Eric Fulton is a regular participant in pickup basketball games at the local park, where they cheer for the New Orleans Pelicans and casually follow the Shreveport Mudbugs hockey team, while also
    riding with the Red River Skate Club and joining the Shreveport Youth Basketball League during the spring season, treating fitness as a flexible outlet that complements their creative energy.
  arts: Eric Fulton immerses themselves in the city's street-art scene, drawing inspiration from legends like Jean-Michel Basquiat and contemporary graffiti collective Kolorful while curating playlists
    that weave together Kendrick Lamar, Miles Davis, and Erykah Badu, attending open-mic nights at the Shreveport Arts Festival and contributing murals that echo the vibrant narratives of their neighborhood.
  travel: Eric Fulton prefers spontaneous weekend getaways, often hitching rides to Austin for live music and to New Orleans to explore French Quarter murals, while dreaming of a European street-art pilgrimage
    to Berlin's Kreuzberg district, balancing limited teen budget constraints with a love for affordable bus tours and couch-surfing among friends.
  culinary: Eric Fulton enjoys mixing bold flavors, regularly ordering gumbo and shrimp po'boy from downtown eateries, experimenting with homemade tacos al pastor seasoned with adobo and cayenne pepper,
    and boasting a modest kitchen skill set that can pull together a satisfying ramen bowl topped with a soft-boiled egg and sriracha, all while keeping a stash of hot sauce for extra kick.
  core: Eric Fulton is a curious, spontaneous 17-year-old who fuses graffiti, beatmaking, and skate culture into a community-centric creative hustle, juggling impulsive spending with a budding savings mindset,
    and navigating teen life with a laid-back yet empathetic outlook.
background:
  cultural: Eric was raised in the African‑American community of Shreveport and Bossier Parish, where church gatherings, gospel music, and familial storytelling play central roles in daily life. He grew
    up listening to soulful choirs and the rhythmic beats of Southern hip‑hop, influences that shaped his artistic voice. Family meals often feature Southern comfort foods such as gumbo, fried catfish,
    and collard greens, reflecting a blend of Creole and traditional Southern cuisine. Community events like Juneteenth parades, local block parties, and neighborhood art festivals have fostered a strong
    sense of cultural pride and a commitment to preserving and evolving Black artistic expression in the region.
