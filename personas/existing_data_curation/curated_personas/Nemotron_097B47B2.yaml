  career_goals: Eric aims to turn his artistic passions into a sustainable career. His immediate goal is to earn his GED within the next year, followed by enrollment in a community college program focused
    on graphic design or visual arts. He envisions working as a freelance illustrator and music producer, creating album covers, visual branding, and custom murals for local musicians and businesses. Long‑term,
    he hopes to establish a community art hub in Shreveport that offers workshops, mentorship, and exhibition space for emerging Black artists and at‑risk youth. He also plans to leverage his collaborative
    nature to mentor younger neighborhood members, helping them discover creative outlets and build confidence.
