persona_description: Professor Lester-Irabinna Rigney is a renowned educator and researcher with over 20 years of experience in Aboriginal Education. He has a Doctorate PhD by Research and has held various
  positions in education, including Dean Indigenous Education at the University of Adelaide and Director of Wirltu Yarlu Aboriginal Education. His expertise lies in the field of Aboriginal education, with
  a focus on Indigenous knowledge and the research methods used in Indigenous communities. He is a Professor of Education and has a special interest in the role of researchers in informing broader educational
  concerns.
