  career_goals: Even at four, Julie envisions a future where she can explore and understand the natural world on her own terms. She dreams of becoming a wildlife researcher or conservation biologist who
    spends quiet mornings in the field observing animals, collecting data, and designing solutions to protect habitats. Her competitive streak fuels an ambition to be a leading scientist who discovers new
    species or invents tools for outdoor exploration. Julie also imagines herself as an engineer or architect, designing sturdy play structures that blend creativity with practicality, allowing her to build
    and test her ideas independently.
