  career_goals: Although retired, Jie aspires to mentor younger members of his cultural community, contribute oral histories for a local museum archive, develop a memoir that weaves personal experiences
    with the Korean‑American journey, and help coordinate cultural festivals at his neighborhood center to preserve traditions for future generations.
