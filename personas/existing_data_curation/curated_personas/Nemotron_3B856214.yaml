personas:
  professional: Desiree Wyatt merges meticulous organization with compassionate caregiving, leveraging their CPR certification, vital signs monitoring expertise, and home safety assessments to deliver high‑quality
    home health support while they methodically pursue CNA and LPN credentials.
  sports: Desiree Wyatt enjoys early morning walks on nature trails with the Bibb County Birdwatchers Club, plays casual pickleball at the community center, and passionately roots for the Atlanta Braves
    during baseball season, though they prefer low‑impact activities to intense gym sessions.
  arts: Desiree Wyatt immerses themselves in historical fiction by Philippa Gregory, health essays by Atul Gawande, and the soulful sounds of Dolly Parton and Mahalia Jackson, while they channel creativity
    into quilting patterns inspired by local craft fair artists.
  travel: Desiree Wyatt plans trips meticulously, favoring modest getaways to nearby historic towns like Savannah and Charleston, scenic hikes in the Great Smoky Mountains, and occasional bird‑watching
    excursions to Costa Rica's Monteverde Cloud Forest, while they always balance travel costs with preparations for their eventual home‑health business launch.
  culinary: Desiree Wyatt expertly prepares buttermilk fried catfish, slow‑cooked collard greens seasoned with smoked turkey, and homemade peach pie using tomatoes, peppers, and fresh herbs from their garden,
    while they showcase a solid home‑cook skill set that blends Southern comfort with garden‑to‑table freshness.
  core: Desiree Wyatt is a methodical, garden‑loving caregiver who balances quiet devotion to others with a penchant for Southern comfort cooking, meticulous budgeting, and a habit of overwatering plants
    when they are stressed.
background:
  cultural: Desiree was raised in a close‑knit, working‑class white community in rural Alabama, where Southern Baptist values and hospitality shaped her worldview. Family gatherings, church picnics, and
    potluck meals emphasized the importance of community, respect for elders, and mutual support. These cultural influences fostered her caring, cooperative nature and preference for small, intimate groups
    over large gatherings. The region’s traditions—such as a love for gardening, Southern cooking, and gospel music—continue to inform her daily life and personal interests.
attributes:
  skills: '[''Patient care and assistance'', ''Vital signs monitoring'', ''Basic wound care'', ''Medication administration support'', ''Infection control'', ''Electronic health record documentation'', ''CPR
