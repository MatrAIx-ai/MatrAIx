  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking Southern cuisine'', ''Quilting and crochet'', ''Volunteering at church food pantry'', ''Walking nature trails'', ''Birdwatching'', ''Attending
    craft fairs'', ''Listening to classic country and gospel music'', ''Participating in small book clubs'']'
  career_goals: Desiree aims to advance her professional qualifications by obtaining a Certified Nursing Assistant (CNA) credential within the next year, followed by pursuing Licensed Practical Nurse (LPN)
    training at a local community college. She aspires to specialize in dementia and geriatric care, eventually moving into a supervisory or case management role within a home health agency. Long‑term,
    she dreams of launching her own small home health service that emphasizes compassionate, culturally sensitive care for seniors in Bibb County, while also securing financial stability for her future.
