  hobbies: '[''Skiing and snowboarding'', ''Hiking and bird‑watching'', ''Science reading (National Geographic Kids, ecology)'', ''Drama and school theater'', ''Piano practice'', ''Digital video creation
    and editing'', ''Minecraft (creative building)'', ''Birdhouse woodworking'', ''Journaling and mindfulness'', ''Volunteering at wildlife rescue'']'
  career_goals: Katrina dreams of merging her love of science, the outdoors, and storytelling. She aspires to become a wildlife biologist or environmental journalist who can explain complex ecological concepts
    to a broad audience, perhaps through videos or a kids’ nature show. She also envisions herself as a future ski instructor who teaches safety and environmental stewardship to younger children. In the
    medium term, she aims to attend a STEM‑focused high school, join a youth robotics club, and earn a spot on her middle school’s student council to advocate for sustainability projects at school.
