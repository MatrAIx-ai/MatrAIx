personas:
  professional: Katrina Holloman, an aspiring junior content creator and budding scientist, combines their love of science books, Minecraft engineering, and video editing to craft educational ski‑run vlogs
    that showcase practical problem‑solving while delighting friends with lively commentary.
  sports: Katrina Holloman, a member of the local youth ski club and avid summer hiker, spends weekends carving runs at Park City Mountain, hiking the Wasatch Range for bird‑watching, and they cheer enthusiastically
    for the Utah Jazz during the basketball season.
  arts: Katrina Holloman, who shines as a lead in school plays and practices piano daily, draws inspiration from Lin‑Manuel Miranda’s Broadway scores and Yiruma’s piano pieces, while also crafting birdhouses
    and building elaborate Minecraft structures that reflect their creative flair.
  travel: Katrina Holloman, a budding explorer, treasures winter trips to Colorado ski resorts and summer backpacking hikes in Yellowstone and Bryce Canyon, and they dream of a future adventure to the Canadian
    Rockies to capture snow‑capped peaks on video.
  culinary: Katrina Holloman, whose cooking skill is modest but enthusiastic, frequently whips up hot chocolate with marshmallows after ski sessions, mixes homemade trail mix with almonds, dried cranberries,
    and dark chocolate, and they experiment with simple bird‑seed blends to fill the birdhouses they build.
  core: Katrina Holloman blends boundless curiosity, a talkative spark, and occasional worry into a vibrant life of science‑infused video making, snowy adventures, and earnest journaling that keeps both
    their mind and heart in motion.
background:
  cultural: Katrina grew up in Park City, Utah, a mountain community known for its ski culture, Sundance Film Festival, and strong emphasis on outdoor recreation. Her family’s heritage is European‑American,
    reflecting the region’s settlement history. The local culture values self‑reliance, environmental stewardship, and community involvement, which shapes her respect for nature and eagerness to help neighbors.
    Seasonal events like holiday festivals, community snow‑play days, and school‑organized ski trips are integral to her upbringing, providing a blend of traditional American customs with a distinctive
    mountain‑town lifestyle.
attributes:
