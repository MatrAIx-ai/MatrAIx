personas:
  professional: Annette Broady, a 28‑year‑old aspiring curatorial assistant, combines meticulous inventory tracking and point‑of‑sale expertise from retail with a humanities background in art history; they
    apply an organized, methodical approach to streamline exhibition logistics and a collaborative, kind nature to nurture community outreach in Atlanta museums.
  sports: Annette Broady stays fit through weekly yoga classes, pick‑up basketball games at the local community center during spring, runs with an Atlanta Marathon training group in summer, and regularly
    cheers for the Atlanta Hawks and Falcons, while also volunteering as a coordinator for the city’s Saturday morning jogging club.
  arts: Annette Broady immerses themselves in contemporary visual art, often guiding visitors through exhibitions featuring Kara Walker and Kehinde Wiley, curating community spoken‑word nights that echo
    the lyrical storytelling of Nina Simone, and drawing inspiration from vibrant murals in the historic West End.
  travel: Annette Broady prefers thoughtfully planned weekend getaways that blend cultural immersion with relaxation, having explored the civil‑rights landmarks of Montgomery, the musical heritage of New Orleans,
    and the bustling galleries of New York’s Chelsea district, while dreaming of a semester abroad in Paris to deepen museology expertise.
  culinary: Annette Broady loves cooking Southern‑inspired dishes such as collard greens seasoned with smoked turkey and sweet‑potato pie spiced with nutmeg, frequently experimenting with ramps and honey‑glazed
    pork ribs in fusion recipes, and balances this culinary curiosity with a habit of ordering indulgent pizza after late‑night art projects.
  core: Annette Broady is a detail‑oriented, art‑loving strategist who channels community spirit into curating experiences, yet can’t resist a midnight coffee and often overcommits to volunteer events,
    balancing disciplined planning with spontaneous creativity.
background:
  cultural: Annette is an African‑American woman raised in the vibrant cultural landscape of Atlanta. Her upbringing reflects the rich traditions of the Black South, including strong ties to church communities,
    family gatherings centered around food and music, and participation in local celebrations like the Atlanta Black History Month events. She draws inspiration from the city’s historic civil‑rights sites,
    such as the Martin Luther King Jr. National Historic Site, and incorporates the storytelling and resilience of Black cultural heritage into her artistic interests and community involvement.
attributes:
  skills: '[''Cash handling'', ''Point‑of‑sale system operation'', ''Inventory management'', ''Customer service'', ''Conflict resolution'', ''Art history knowledge'', ''Critical analysis'', ''Event planning'',
