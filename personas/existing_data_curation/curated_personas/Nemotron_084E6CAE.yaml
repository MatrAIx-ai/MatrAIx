  hobbies: '[''Visiting art galleries and museums'', ''Volunteering as a docent'', ''Reading cultural and literary works'', ''Writing essays and poetry'', ''Attending spoken‑word events'', ''Practicing
    yoga'', ''Cooking Southern African‑American dishes'', ''Participating in community art projects'']'
  career_goals: Annette aims to transition from retail to the arts sector by securing a position such as a curatorial assistant or gallery coordinator at a local museum or cultural institution in Atlanta.
    She plans to leverage her organizational strengths and curiosity about art to support exhibition planning and community outreach. In the next five years, she intends to pursue a master's degree in Museum
    Studies or Arts Administration, ultimately aspiring to a leadership role that blends her passion for art with her methodical and collaborative work style.
