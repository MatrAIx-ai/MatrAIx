personas:
  professional: Samantha Mcintyre, a budding animal enthusiast who spends afternoons in the garden pretending to care for farm creatures, dreams of becoming a veterinarian and approaches their pretend care
    with the same orderly routine they apply to daily chores.
  sports: Samantha Mcintyre rides their pink bike to the neighborhood park for regular playdates, joins the Little T‑ball league with the Sunnyville Cubs youth team, and cheers for the city’s professional
    basketball squad, the Northside Knights, during family movie nights.
  arts: Samantha Mcintyre channels their creativity into drawing farm scenes inspired by Eric Carle’s vibrant illustrations, sings along to the Sesame Street soundtrack, and stages imaginative tea parties
    with dolls while listening to Disney’s 'Let It Go' from Frozen as background music.
  travel: Samantha Mcintyre loves family road trips to the nearby lake for picnics, has visited Grandma’s farmhouse in the countryside, and daydreams about traveling to Disneyland in California for a magical
    adventure; they enjoy planning the itinerary with colorful stickers.
  culinary: Samantha Mcintyre delights in homemade mac and cheese, sprinkles fresh strawberry slices onto yogurt, and proudly assists in making banana‑blueberry muffins, always insisting on adding a dash
    of cinnamon for extra flavor; they relish the sense of order that comes with following a simple recipe.
  core: Samantha Mcintyre is a calm, routine‑loving six‑year‑old who blends imagination with meticulous order, turning everyday chores into playful adventures while nurturing a gentle, cooperative spirit;
    they find comfort in the predictable rhythm of their day.
background:
  cultural: Samantha is raised in Cross Plains, a small town in Robertson County, Tennessee. Her family reflects a traditional Southern white upbringing, regularly attending a local Baptist church and participating
    in community events such as the county fair, church potlucks, and holiday celebrations featuring classic Southern foods. The local culture emphasizes hospitality, respect for elders, close‑knit neighborhood
    ties, and a love of country and gospel music. She learns Southern customs like saying "bless your heart" and enjoys the regional emphasis on manners, modesty, and community service.
attributes:
  skills: '["Read simple storybooks", "Count to 100", "Basic addition and subtraction", "Tie shoes independently", "Organize toys and books", "Follow daily routines without prompts", "Assist with setting
    the dinner table", "Care for a pet rabbit", "Mediate play disputes among peers"]'
  hobbies: '["Reading picture books", "Drawing and coloring", "Crafting with stickers", "Playing with dolls and tea‑party games", "Building LEGO sets", "Bike riding", "Helping in the garden", "Singing in
    Sunday school"]'
  career_goals: Samantha frequently talks about wanting to become a teacher because she loves the structured environment of a classroom and enjoys helping her friends learn new things. She is also fascinated
    by veterinarians who care for animals, reflecting her affection for her rabbit. In the future, she imagines a calm, organized career that lets her contribute to her community, such as a teacher, librarian,
    or veterinarian, and values stability and the ability to help others.
