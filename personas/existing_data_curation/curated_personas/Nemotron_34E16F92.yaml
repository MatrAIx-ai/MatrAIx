  hobbies: '[''Volunteer story‑time at local library'', ''Weekly book club'', ''Community gardening'', ''Cooking Southern cuisine'', ''Hiking the Palmetto Trail'', ''Yoga classes'', ''Church social events'',
    ''Attending local art festivals'']'
  career_goals: Victoria aims to transition into a district‑wide director role overseeing early childhood education initiatives across Lexington County. She envisions spearheading a regional network that
    shares best practices for inclusive, play‑based learning while securing sustainable funding through public‑private partnerships. Over the next five years, she plans to earn a Master’s in Educational
    Leadership to deepen her strategic expertise, mentor emerging administrators, and publish articles on balancing innovation with practical implementation in schools. Long‑term, she hopes to launch a
    consulting firm that helps schools adopt flexible, evidence‑based curricula without sacrificing fiscal responsibility.
