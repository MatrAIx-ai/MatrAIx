    to detail", "Strategic planning", "Critical thinking", "Creative problem solving", "Data visualization"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor sketching of architecture", "Digital photography of urban and natural scenes", "Reading non-fiction (science, philosophy, art theory)", "Hiking
    solitary trails in Orange County", "Collecting vintage postcards", "Experimenting with cooking inventive dishes", "Playing solo strategy board-game variants", "Coding personal data analysis scripts
    in Python", "Meditation and mindfulness practice", "Listening to avant-garde music"]'
  career_goals: Quoc aims to progress to a senior investigative role within the insurance sector, eventually leading a specialized fraud‑detection unit. He plans to earn the Chartered Property Casualty
    Underwriter (CPCU) designation and pursue advanced training in data analytics and AI‑driven loss estimation. Over the next five years, he hopes to design and implement a predictive modeling system that
    streamlines claim triage, reducing processing time while maintaining accuracy. He also aspires to share his expertise at industry conferences and publish articles on innovative investigative techniques.
    In the longer term, he envisions launching an independent consulting practice that advises insurers on risk assessment, process optimization, and technology integration.
