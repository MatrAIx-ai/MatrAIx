personas:
  professional: Quoc Duong is a methodical insurance claims investigator with a STEM background, leveraging Python automation, GIS mapping, and Xactimate expertise to uncover fraud, while aspiring to lead
    a data‑driven fraud detection unit and earn the CPCU designation.
  sports: Quoc Duong prefers solitary fitness activities, hiking the quiet Orange County coastal trails with the Irvine Hiking Club, occasionally joining weekend trail runs, follows the LA Dodgers, Los
    Angeles Lakers, and Anaheim Ducks, and maintains a disciplined routine of stretching and yoga to complement the low‑intensity endurance focus.
  arts: Quoc Duong is an avid watercolor sketcher of architectural details, a digital photographer inspired by Ansel Adams and William Kentridge, and an avant‑garde music enthusiast who collects vinyl of
    John Zorn and Aphex Twin, regularly visiting LACMA and the Laguna Art Museum for fresh inspiration.
  travel: Quoc Duong plans trips with the same analytical rigor as a claim investigation, preferring off‑peak, low‑crowd destinations where they can photograph austere landscapes; they have trekked the
    Big Sur coastline, explored Kyoto’s historic temples, and dream of photographing Iceland’s geothermal fields and Patagonia’s glacial fjords, always budgeting the journey as a project with a detailed
    itinerary.
  culinary: Quoc Duong experiments in a modest kitchen, mastering inventive dishes such as miso‑glazed salmon with sumac, hand‑rolled ravioli stuffed with roasted cauliflower and saffron, and a fermented
    kimchi‑infused ramen broth, while favoring fresh, seasonal ingredients like heirloom tomatoes and citrus, treating each plate as a canvas for artistic expression.
  core: Quoc Duong is a solitary, curiosity‑driven insurance investigator who balances meticulous data analysis with avant‑garde art, meditation, and nightly hikes, often obsessively tracking everything
    from expenses to blood pressure.
background:
  cultural: Quoc was born to Vietnamese immigrant parents who settled in Southern California shortly after the Vietnam War. Raised in a bilingual household, he is fluent in both English and Vietnamese and
    grew up celebrating traditional festivals such as Tết and Mid‑Autumn, while also embracing the multicultural environment of Anaheim. His family's emphasis on education and diligence guided his pursuit
    of a STEM degree and a career in the insurance industry. Vietnamese cultural values of respect for privacy, humility, and close family ties influence his preference for quiet, solitary spaces and his
    strong sense of responsibility toward his wife and extended family. At the same time, the vibrant Little Saigon community provides him with access to Vietnamese cuisine, art, and community events, which
    enrich his artistic interests and offer occasional social connections.
attributes:
  skills: '["Quantitative risk assessment", "Statistical data analysis", "Forensic property investigation", "Claims management software (Xactimate)", "GIS mapping and spatial analysis", "Python programming
