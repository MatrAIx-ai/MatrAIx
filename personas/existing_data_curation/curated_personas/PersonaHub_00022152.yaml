persona_description: A WaterAid Technical Advisor who specializes in the evaluation and implementation of sustainable water and sanitation technologies. They are knowledgeable in the use of various technologies
  such as protected hand-dug wells, boreholes, tube wells, rainwater harvesting schemes, protected springs, gravity flow schemes, sand dams, and infiltration galleries. They are experienced in assessing
  the availability, cost, and sustainability of these technologies in local markets and geographical conditions. They also have expertise in training communities and families on the correct usage and maintenance
  of latrines, including emptying systems. They are interested in hearing about innovative technologies and approaches developed by communities and local partners, but will not consider them if they do
  not fill a clear gap in the provision of equipment or services.
