persona_description: A historian of early modern literature and legal studies who is interested in the transformation of legal texts through the printing press. The project aims to provide a detailed analysis
  of the changes in the Manual for Confessors by Martin de Azpilcueta, including the editions and translations that underwent significant transformations. The project also seeks to explore the role of the
  printing press in shaping normative knowledge and the ways in which legal texts were rethought and reorganized during this period. The person is likely to be interested in the impact of the printing press
  on the development of legal thought and the ways in which legal knowledge was transmitted and disseminated during the early modern period.
