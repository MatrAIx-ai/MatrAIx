    de muerto) with family", "Practicing folklórico dance", "Playing Minecraft Education Edition"]'
  career_goals: She envisions a future where she can fuse art and technology, aiming to become a concept artist, video-game designer, or author of illustrated books. Elizabeth hopes to attend a STEAM-focused
    high school that offers advanced courses in visual arts and computer science, win regional art and coding competitions, and earn a scholarship to study graphic design or interactive media. Her competitive
    nature drives her to seek recognition through contests and to eventually lead creative projects that bring original, imaginative ideas to life.
