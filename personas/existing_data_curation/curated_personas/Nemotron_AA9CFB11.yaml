personas:
  professional: Elizabeth Gonzalez, an aspiring junior digital illustrator and budding coder, blends their methodical planning with a boundless imagination to create detailed fantasy landscapes on their
    tablet, often sketching storyboards that integrate folk motifs and Pacific Northwest textures.
  sports: Elizabeth Gonzalez loves folklórico dance and plays forward for the Cowlitz County Youth Soccer Club, follows the Seattle Sounders and Seattle Kraken avidly, balances competitive drills with weekend
    hikes in the Cascades, and treats each practice as a chance to prove their stamina and precision.
  arts: Elizabeth Gonzalez fills their sketchbook with vibrant scenes inspired by Frida Kahlo’s bold color palette, Hayao Miyazaki’s whimsical worlds, and the rhythmic flair of ranchera legends like Vicente
    Fernández, while they devour graphic novels by Jim Lee and write poetry that they share in the school art club.
  travel: Elizabeth Gonzalez dreams of backpacking through the moss‑laden trails of Olympic National Park and the bustling markets of Mexico City, has already taken family trips to Vancouver and the Cowlitz
    County Fair, and prefers to plan each outing with hand‑drawn maps and a list of must‑see murals and natural landmarks.
  culinary: Elizabeth Gonzalez delights in helping their family roll sweet tamales filled with roasted chicken and chipotle, whisking arroz con leche with cinnamon and vanilla, and experimenting with avocado‑lime
    salsa on homemade pizza, but they often forget to clean the kitchen afterward, leaving a trail of flour and crayons.
  core: Elizabeth Gonzalez is a vivid day‑dreamer who meticulously plans elaborate art projects, yet they habitually worry about every detail, procrastinate by reorganizing their LEGO creations, and can
    be found humming ranchera tunes while sketching forest textures.
background:
  cultural: Elizabeth grows up in a Mexican-American household in Woodland, Washington. Spanish is spoken at home alongside English, and she regularly celebrates traditions such as Día de los Muertos, Las
    Posadas, and family gatherings featuring tamales, arroz con leche, and aguas frescas. Her grandparents share Mexican folk stories and música ranchera, which inspire her artistic sensibility and love
    for vibrant colors. While she participates in local community events like the Cowlitz County Fair, she also embraces the natural surroundings of the Pacific Northwest, often incorporating forest textures
    and native flora into her artwork. Her cultural identity is shaped by a blend of Mexican family values, Catholic traditions, and the multicultural environment of her school and community.
