personas:
  professional: Bertila Llama, a seasoned retail operations veteran with three decades of experience, blends sharp analytical skills in inventory control and sales analytics with a vivid artistic sensibility,
    designing eye‑catching store displays that double as canvases and mentoring bilingual teams while championing creative problem‑solving in a calm, solitary work style.
  sports: Bertila Llama, a quiet enthusiast of gentle movement, spends mornings practicing tai chi at her local community center, tends to follow the Miami Marlins baseball season for its relaxed atmosphere,
    and attends weekly gentle water aerobics classes at the senior center, preferring low‑impact activities that complement her garden work over high‑intensity sports.
  arts: Bertila Llama, an imaginative watercolor painter and poet, draws inspiration from the vivid hues of Caribbean seascapes and the rhythmic cadences of merengue and bachata, stitches intricate crochet
    pieces featuring folklore motifs, and frequently cites Frida Kahlo and Maya Angelou as artistic influences while leading senior craft workshops at her neighborhood art studio.
  travel: Bertila Llama, a reflective traveler who values quiet, culturally resonant experiences, enjoys revisiting the lush gardens of St. Lucia, plans a future getaway to the lavender fields of Provence,
    and prefers solo journeys that allow ample time for sketching and journaling in serene natural settings.
  culinary: Bertila Llama, a devoted home cook, lovingly prepares traditional family recipes such as mangú made with ripe plantains, hearty sancocho laden with root vegetables and seasoned chicken, and
    aromatic arroz con habichuelas, while experimenting with fresh herbs like cilantro and oregano to infuse her dishes with vibrant Caribbean flavors.
  core: Bertila Llama, a 64‑year‑old retiree who intertwines meticulous retail expertise with a solitary artistic spirit, balances careful financial stewardship with occasional splurges on craft supplies,
    manages early‑stage osteoarthritis through routine exercise, prefers low‑impact sports, immerses herself in watercolor and poetry, travels for quiet inspiration, and occasionally wrestles with worry‑induced
    overthinking.
background:
  cultural: Bertila was born to Dominican parents and grew up bilingual, navigating both Spanish‑speaking Dominican traditions and American culture in Florida. Family gatherings revolve around Dominican
    cuisine, music, and Catholic celebrations such as Semana Santa and Dominican Independence Day. She maintains close ties with the Dominican community in Kissimmee, participating in cultural festivals
    and supporting a local Dominican cultural association. Her heritage influences her artistic style, evident in her vibrant color palettes and the inclusion of Caribbean motifs in her visual merchandising
    work. The values of family solidarity and resilience she learned from her upbringing shape her compassionate yet assertive leadership approach.
attributes:
  skills: '[''Retail team leadership'', ''Staff coaching and development'', ''Inventory management and loss prevention'', ''Creative visual merchandising'', ''Sales performance analysis'', ''Conflict resolution'',
