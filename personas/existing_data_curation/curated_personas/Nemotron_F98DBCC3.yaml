    communication'']'
  hobbies: '[''Watercolor painting'', ''Poetry writing and journaling'', ''Tropical gardening'', ''Knitting and crocheting'', ''Listening to merengue and bachata'', ''Cooking Dominican dishes'', ''Attending
    local art workshops'', ''Reading historical and literary novels'', ''Traveling to the Dominican Republic to visit family and explore heritage sites'']'
  career_goals: As she approaches retirement, Bertila aims to transition into a mentorship and consulting role within the retail chain, sharing her expertise with emerging supervisors and helping to implement
    creative visual merchandising standards across multiple locations. She also hopes to allocate more time to her own artistic practice, planning a community art exhibition that celebrates Dominican culture
    and organizing workshops for senior citizens interested in painting and crafts. Ultimately, she seeks a balanced schedule that reduces daily stress while allowing her to leave a lasting legacy of both
    operational excellence and cultural enrichment.
