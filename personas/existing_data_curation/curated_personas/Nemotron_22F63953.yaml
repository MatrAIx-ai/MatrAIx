  hobbies: '["Gardening (native Californian plants)", "Bridge tournaments", "Zumba/low‑impact fitness classes for seniors", "Contemporary fiction book club", "Cooking and baking classes", "Traveling to
    national parks", "Nature photography", "Volunteer work at senior center", "Church choir participation", "Community outreach events"]'
  career_goals: Even in retirement, Rebekah aims to stay active, contribute to her community, and continue personal growth. She aspires to expand the senior center's intergenerational mentorship program,
    take on a leadership role in the local garden club, and complete a series of advanced workshops on sustainable horticulture. She also hopes to travel to three historic U.S. sites each year, learn basic
    Spanish to better connect with the diverse neighborhoods around Los Angeles, and maintain her physical health through regular fitness classes.
