  hobbies: '[''Painting (watercolor, mixed media)'', ''Visiting art galleries and museums'', ''Hiking in the Texas Hill Country'', ''Cooking (Tex-Mex and experimental cuisine)'', ''Reading science fiction
    and historical non-fiction'', ''Community gardening and environmental education'', ''Photography (street murals, nature)'', ''Participating in a book club'', ''Yoga and mindfulness journaling'', ''Volunteering
    for STEM outreach programs'']'
  career_goals: Sarah aims to deepen her impact on education by earning a Master's in Educational Leadership and transitioning into a district STEM coordinator role. She plans to develop a grant‑funded
    after‑school STEAM program that targets underrepresented students in San Antonio, author a children's book that demystifies science concepts, and eventually assume a school principal position where
    she can champion equity and innovative teaching practices. Throughout her career, she is committed to mentoring educators, influencing curriculum policy, and expanding opportunities for Black students
    in STEM fields.
