personas:
  professional: Sarah Upshaw is a veteran elementary and middle school teacher who designs inquiry‑based STEM curricula, integrates coding platforms and robotics, blends art into STEAM projects, and mentors
    new educators, using her curiosity, methodical organization, and cooperative spirit to foster equitable learning environments.
  sports: Sarah Upshaw enjoys weekend hikes through the Texas Hill Country, participates in a local women’s walking club, follows the San Antonio Spurs during basketball season and the Texas Rangers in
    baseball, and incorporates daily yoga sessions to maintain flexibility and low‑impact fitness.
  arts: Sarah Upshaw frequently visits the San Antonio Museum of Art, draws creative inspiration from Georgia O’Keeffe and contemporary muralist ROE, spends evenings mixing watercolors with collage techniques,
    and curates a small home gallery featuring works by local Texan artists like James J. Hatt.
  travel: Sarah Upshaw prefers immersive road‑trip adventures that blend natural scenery and cultural sites, having explored Santa Fe’s art markets, toured Hill Country vineyards, and vacationed in Oaxaca,
    Mexico, while dreaming of hiking the Grand Canyon and joining a heritage tour of Barcelona’s architecture.
  culinary: Sarah Upshaw is an enthusiastic home cook who experiments with Tex‑Mex flavors, regularly preparing homemade carne asada tacos, chile rellenos with roasted Hatch chilies, and mole poblano, while
    mastering fresh guacamole with lime, cilantro, and cotija cheese, and occasionally indulges in fine‑dining sushi nights.
  core: Sarah Upshaw blends a teacher’s curiosity with an artist’s eye, balancing disciplined planning and community‑focused compassion while navigating occasional budget slip‑ups and a lingering lower‑back
    ache through humor and hill‑top hikes.
background:
  cultural: Sarah is an African American woman raised in San Antonio, whose family history includes roots in the Great Migration and Southern cultural traditions. She is active in the local Black community,
    celebrating Juneteenth, Kwanzaa, and church gatherings that emphasize family, resilience, and collective advancement. Her heritage informs her dedication to educational equity, drawing inspiration from
    historic Black educators and artists. She enjoys African American literature, jazz, and soul music, and frequently weaves cultural references and diverse perspectives into her lesson plans to honor
    and empower all students. Sarah also collaborates with community organizations focused on youth empowerment and expanding STEM opportunities for underrepresented groups.
attributes:
  skills: '[''STEM curriculum design'', ''Inquiry-based science instruction'', ''Project-based learning facilitation'', ''Technology integration (coding, robotics, interactive media)'', ''Differentiated
