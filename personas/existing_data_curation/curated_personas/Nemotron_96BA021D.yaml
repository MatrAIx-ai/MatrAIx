  career_goals: Ashley aims to deepen her expertise in fabrication while maintaining a stable, predictable work environment. Over the next few years she plans to obtain the Certified Production Technician
    (CPT) credential and pursue an associate degree in Industrial Technology to formalize her knowledge. Her primary ambition is to advance to a shift‑lead or team‑lead role where she can mentor newer workers,
    streamline routine processes, and ensure safety standards are upheld. In the longer term, she envisions potentially starting a small side business offering custom metal‑fabrication projects for local
    homeowners, allowing her to blend her practical skills with a modest entrepreneurial venture.
