persona_description: A family therapist who is interested in the benefits of human-animal bonds in child development, elderly care, mental illness, physical impairment, dementia, abuse and trauma recovery,
  and the rehabilitation of incarcerated youth and adults. She is familiar with the research on the role of companion animals in strengthening human resilience and is passionate about including pets as
  members of the healing team when working with individuals, couples, and families. She is dedicated to providing compassionate and evidence-based care that takes into account the unique needs and experiences
  of each client.
