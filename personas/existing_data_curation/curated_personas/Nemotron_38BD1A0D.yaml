  career_goals: At this stage, Phillip aims to shift toward part-time clinical practice that allows more time for mentorship of younger physicians and residents. He plans to develop an integrative art-therapy
    program for elderly patients, publish research on the impact of visual arts on health outcomes, and contribute to curriculum development at the local medical school. He also aspires to serve as a medical
    director for a community health center in Rosemead, championing culturally competent care and expanding preventive health services for the diverse neighborhood.
