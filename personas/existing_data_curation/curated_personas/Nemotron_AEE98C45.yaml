  hobbies: '[''Abstract painting'', ''Visiting art galleries'', ''Listening to jazz and Afrobeat'', ''Reading speculative fiction and philosophy'', ''Fusion cooking (Nigerian‑Creole cuisine)'', ''Yoga and
