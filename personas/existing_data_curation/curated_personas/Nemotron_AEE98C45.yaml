  career_goals: She aims to advance to a senior executive role, such as Director of Health Services or Vice President of Operations for a regional health system in Louisiana. To support this trajectory,
    she plans to complete a Master’s in Health Administration while championing initiatives that embed art and culturally tailored programs into patient care. Nkemdilim is passionate about reducing health
    disparities in underserved Black communities, expanding telehealth services for rural areas, and establishing a center of excellence for innovative, patient-centered care.
