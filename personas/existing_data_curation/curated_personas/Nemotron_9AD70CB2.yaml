  hobbies: '[''Reading science fiction and non‑fiction'', ''Playing the violin'', ''Robotics club activities'', ''Volunteering at an animal shelter'', ''Journaling'', ''Hiking prairie trails'', ''Coding
    simple games in Scratch'']'
  career_goals: Valarie aims to graduate at the top of her class and earn a scholarship to a competitive high‑school program focused on STEM and health sciences. She dreams of becoming a pediatric physician,
    combining her love of science with her deep desire to help children and families. In the long term she hopes to lead community health initiatives in Wichita, using her organizational talent to design
    outreach programs that promote preventive care and nutrition education. She also aspires to continue mentoring younger students, fostering a supportive learning environment.
