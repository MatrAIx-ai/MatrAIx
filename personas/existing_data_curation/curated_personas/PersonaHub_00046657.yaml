persona_description: A researcher studying the prevalence of endoparasites in rodents collected from the University of New Mexico's Long Term Ecological Research station on the Sevilleta National Wildlife
  Refuge in Socorro County, New Mexico. This researcher is interested in understanding how host characteristics and abiotic factors such as season, habitat, and precipitation affect the prevalence of each
  parasite species in these rodents, and how these prevalences vary independently and complexly across different hosts and parasites.
