  hobbies: '[''Painting'', ''Street photography'', ''Reading science fiction'', ''Jazz listening'', ''Gallery visits'', ''Community theatre'', ''Yoga'', ''Journaling'', ''Gardening'', ''Cooking soul food'']'
  career_goals: Johnnie aims to leverage his creative flair and deep retail experience to transition into a visual merchandising or store-design position within a regional chain, where he can shape the
    visual identity of multiple locations. He also dreams of opening a small boutique that showcases works by local black artists and craftsmen, providing a community-focused space for cultural exchange.
    Additionally, he seeks to mentor younger employees, improve his work-life balance to reduce stress, and achieve greater financial security for his family as he approaches retirement.
