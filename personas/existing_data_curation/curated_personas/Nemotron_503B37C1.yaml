  career_goals: As he moves toward high school, Ceasar is focused on a career that blends his love of practical, hands‑on work with his tendency to follow routine and reliable structures. He aims to enroll
    in a vocational program at Austin Community College where he can earn certifications in automotive technology or electrical trades. In the longer term, Ceasar envisions becoming a certified automotive
    technician or electrician, running his own small business that can provide stable income for his family. He also hopes to leverage his bilingual abilities to serve the growing Mexican‑American community
    in Austin, perhaps offering mobile repair services that communicate fluently in both languages. Throughout his education, he plans to maintain high academic performance, especially in math and science,
    and to take leadership roles in technical clubs, positioning himself for apprenticeship opportunities after graduation.
