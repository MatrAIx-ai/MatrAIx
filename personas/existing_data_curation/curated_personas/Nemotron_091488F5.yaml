  hobbies: '[''Visiting museums and galleries'', ''Attending theater and live music performances'', ''Photography'', ''Watercolor painting'', ''Writing an art-and-finance blog'', ''Reading contemporary
    literature and philosophy'', ''Traveling to historic cultural destinations'', ''Practicing yoga'', ''Hiking in Wissahickon Valley'', ''Volunteering with youth art programs'']'
  career_goals: Margaret aims to achieve CPA certification within the next two years and advance to a senior auditor role at a reputable firm. She aspires to specialize in finance for cultural institutions,
    eventually becoming the finance director or CFO of a museum or arts nonprofit in Philadelphia. She also seeks to deepen her expertise in data analytics and emerging audit technologies, and to mentor
    junior accountants while championing ethical financial stewardship in the arts sector.
