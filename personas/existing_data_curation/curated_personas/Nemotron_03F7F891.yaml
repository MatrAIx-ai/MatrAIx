  hobbies: '["Visiting art galleries and museums", "Digital illustration and graphic design", "Playing acoustic guitar", "Landscape and street photography", "Cooking traditional Mexican cuisine", "Kayaking
    and paddleboarding", "Hiking nature trails", "Attending tech meetups and hackathons", "Reading business and technology books", "Volunteer coding mentor for youth"]'
  career_goals: Luis aims to advance into senior leadership roles such as Director of Product Development or VP of Technology, where he can lead cross‑functional teams to deliver innovative, user‑centric
    solutions. He wants to combine his business acumen with his artistic sensibility to launch products that blend functionality with elegant design, possibly building a startup that offers a digital platform
    for creators. Luis also seeks to mentor emerging talent, champion sustainable technology practices, and maintain a balanced work‑life routine that supports his family and personal growth.
