personas:
  professional: Luis Porras, an Agile‑savvy product strategist with deep UX and graphic design chops, leads cross‑functional squads to craft tech solutions that marry functional rigor with elegant visual
    storytelling, and they eagerly mentor junior developers while eyeing a future as a Director of Product Development.
  sports: Luis Porras, an avid paddleboarder and weekend kayaker who competes in local Florida river races, supports the Miami Heat and Tampa Bay Rays, and they belong to the Orlando Paddle Club while maintaining
    a disciplined hiking routine in the state parks.
  arts: Luis Porras, a devoted visitor of Miami Art Basel and the Orlando Museum of Art, creates watercolor landscapes and digital illustrations inspired by Ansel Adams and Frida Kahlo, strums acoustic
    guitar to the melodies of Rodrigo y Gabriela, and they regularly curate pop‑up galleries for emerging local artists.
  travel: Luis Porras, who blends careful itinerary planning with spontaneous weekend road trips, has explored Oaxaca’s culinary scene, trekked the Everglades, attended a design summit in Barcelona, and
    they long to experience Japan’s tech‑innovation hubs while balancing family time.
  culinary: Luis Porras, who proudly prepares chiles en nogada, tamales, and grilled shrimp tacos seasoned with fresh citrus, enjoys sourcing heirloom corn from local farmers markets, and they experiment
    with fusion dishes that meld traditional spices such as chipotle and ancho with Floridian seafood.
  core: Luis Porras, a 34‑year‑old tech‑savvy creative who balances methodical project leadership with a love for art, outdoor adventure, and family‑rooted cooking, often juggling ambitious career goals
    with a penchant for late‑night guitar sessions, and they occasionally over‑indulge in art supplies.
background:
  cultural: Luis grew up in a Mexican‑American household where Spanish was spoken alongside English, and family gatherings centered around shared meals and cultural traditions such as Día de los Muertos
    and Día de la Independencia. While living in Niceville, FL, he blends the warm hospitality and strong family values of his heritage with the entrepreneurial spirit of the Gulf Coast region. He actively
    participates in local Mexican community events, contributes to multicultural festivals, and brings a respect for communal support and collaborative effort to his professional life.
attributes:
  skills: '["Project Management (Agile/Scrum)", "Business Process Analysis", "Data Analytics (Python, SQL)", "Technical Writing", "Stakeholder Communication", "Budget Planning", "Risk Management", "User
