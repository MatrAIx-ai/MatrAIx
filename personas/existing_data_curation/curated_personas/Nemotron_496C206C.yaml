personas:
  professional: Roberto Cadena, a senior operations‑research analyst, combines mastery of linear, integer and stochastic optimization in Gurobi and Julia with Lean Six Sigma methodology to overhaul supply‑chain
    logistics, while their calm, methodical nature and chess‑honed strategic thinking enable precise problem decomposition and steady mentorship of junior analysts.
  sports: Roberto Cadena stays active by joining the Manhattan Track Club for weekend long‑distance runs, playing pick‑up soccer with the NYC Futsal Club during the summer, and follows the New York Knicks,
    New York Yankees, and New York City FC faithfully, while their organized routine blends early morning runs along the Hudson River with occasional strength training at a boutique gym.
  arts: Roberto Cadena immerses themselves in modern art by regularly visiting exhibitions of Basquiat, Kahlo and Botero at MoMA and the Guggenheim, delights in the sounds of Miles Davis, Celia Cruz and
    contemporary Latin jazz ensembles, and values the storytelling of Lin‑Manuel Miranda’s Hamilton, which together fuel their creative problem‑solving and occasional sketching of architectural details.
  travel: Roberto Cadena prefers meticulously planned trips that mix cultural immersion with quiet contemplation, having explored Cartagena’s historic walls, Medellín’s street art, and a weekend retreat
    in the Hudson River Valley timed with a vibrant Manhattan celebration of Carnaval de Barranquilla, while dreaming of trekking to Machu Picchu and savoring sushi in Tokyo, all balanced against a demanding
    career that limits travel to one or two extended vacations per year.
  culinary: Roberto Cadena, an adept home chef, honors tradition by perfecting arepas stuffed with chicharrón and bandeja paisa brimming with beans, pork belly and ripe plantains, while experimenting with
    fusion creations like smoked‑salmon arepas drizzled with lime‑infused crema, and they relish sourcing fresh avocado, cilantro, and ají for nuanced flavor profiles.
  core: Roberto Cadena is a calm, methodical strategist who balances a relentless curiosity for data‑driven optimization with a quiet love for coffee‑fuelled chess games and weekend culinary experiments,
    all while gifting their community with patient mentorship.
background:
  cultural: Roberto was raised in a Colombian household that prized close family bonds, vibrant celebrations, and a love of music and food. He grew up speaking Spanish at home and retains a deep appreciation
    for Colombian traditions such as Carnaval de Barranquilla, Semana Santa, and the ritual of sharing freshly brewed coffee. Moving to New York for his education and career, he has blended his heritage
    with the city's multicultural fabric, participating in local Latino community groups and navigating the bilingual environment of Manhattan’s professional landscape. His cultural identity influences
    his culinary tastes, musical preferences, and a strong sense of responsibility to give back to both his Colombian and New York communities, fostering a bridge between his roots and his adopted home.
attributes:
  skills: '["Mathematical modeling", "Stochastic optimization", "Linear & integer programming", "Nonlinear programming", "Simulation modeling", "Statistical inference & hypothesis testing", "Time‑series
    forecasting", "Python (pandas, NumPy, SciPy, scikit‑learn)", "R (tidyverse, caret)", "MATLAB", "Julia", "SQL & NoSQL databases", "Data visualization (Tableau, Power BI, Matplotlib, Seaborn)", "Gurobi
    & CPLEX", "Lean Six Sigma Green Belt", "Project management (Agile, Jira)", "Technical report writing & stakeholder presentations", "Bilingual communication (Spanish, English)"]'
  hobbies: '["Visiting modern art museums", "Playing chess at local clubs", "Cooking traditional Colombian cuisine and experimental fusion dishes", "Street photography of New York architecture", "Hiking
    in the Hudson River Valley", "Reading philosophy and popular science", "Listening to jazz, salsa, and cumbia music", "Attending intimate live music or art events with close friends", "Volunteering to
    tutor elementary‑school students in mathematics", "Learning to play acoustic guitar"]'
  career_goals: In the short term, Roberto aims to become a senior operations‑research analyst, leading high‑impact optimization projects and mentoring junior analysts. He plans to deepen his knowledge
    of AI‑augmented decision‑making by completing an advanced certification in machine‑learning‑enabled optimization. Over the next five years, he envisions stepping into a team‑lead role, shaping strategic
    initiatives for a multinational logistics or technology firm, and publishing case‑study papers at INFORMS conferences. Ultimately, Roberto aspires to a director‑level position—such as Director of Operations
    Research or Chief Analytics Officer—where he can integrate analytical rigor with business strategy, influence industry best practices, and champion diversity and inclusion within the STEM workforce.
