personas:
  professional: Willie Wiggins, a seasoned telecommunications technician with three decades of RF, fiber‑optic and microwave expertise, blends a practical problem‑solving mindset with a deep curiosity for
    emerging 5G and IoT technologies, and they are now transitioning toward a supervisory role where they can lead a regional team, design service standards, and mentor apprentices while championing occupational
    safety.
  sports: Willie Wiggins hits the Eastside Community Center for weekly pickup basketball, cheers on the Chicago Bulls during the season and the Green Bay Packers on Sundays, and they occasionally jog the
    local park trails to stay limber, while their competitive nature often fuels friendly trash‑talk on the court.
  arts: Willie Wiggins enjoys the soulful sounds of Miles Davis and Wynton Marsalis at the downtown Blue Note jazz club, participates in the church choir where they harmonize classic gospel hymns, and they
    occasionally collect vintage vinyl records, feeding a curiosity for musical history that balances their technical mind.
  travel: Willie Wiggins prefers road‑trip adventures planned months in advance, using their restored classic car to navigate to ham radio conventions in Dayton, Ohio, the scenic Blue Ridge Parkway for
    leisurely drives, and a weekend getaway to Asheville, North Carolina, while they balance travel costs against family obligations, often inviting grandchildren along for short stays.
  culinary: Willie Wiggins is a backyard barbecue aficionado who slow‑cooks brisket with a sweet‑smoky rub of brown sugar, paprika, and coffee, serves sides of grilled corn, coleslaw, and garden‑fresh tomato‑basil
    salad, and they take pride in swapping recipes for homemade BBQ sauce that blends ketchup, apple cider vinegar, and chipotle powder.
  core: Willie Wiggins combines lifelong curiosity for radio technology with a practical, safety‑first work ethic, sociable yet competitively skeptical demeanor, and a habit of worrying about deadlines
    while finding solace in jazz, basketball, and smoky barbecues.
background:
  cultural: Willie is a second‑generation African‑American from the Bay Area. He grew up immersed in the rich musical and oral traditions of his family—gospel, blues, and jazz—while his parents emphasized
    the importance of hard work and community service. The civil‑rights era of his youth instilled a strong sense of resilience and advocacy, which he carries into his mentorship of younger workers. He
    celebrates cultural holidays such as Juneteenth and participates in local Black History Month events. Community ties, church involvement, and family gatherings featuring soul food are central to his
    identity, shaping both his social outlook and his commitment to uplifting the next generation.
attributes:
  skills: '["RF signal testing", "Antenna alignment", "Fiber‑optic splicing", "Microwave link installation", "FCC licensing and compliance", "BICSI Installer certification", "OSHA safety procedures", "Project
    coordination", "Mentoring and training", "Emerging wireless technologies (5G, IoT)"]'
  hobbies: '["Amateur (ham) radio", "Pickup basketball", "Jazz concerts", "Church choir", "Vintage radio restoration", "Classic car electrical repair", "Barbecuing", "Gardening", "Tech tutoring at senior
    center"]'
  career_goals: Willie aims to transition from hands‑on installation to a supervisory role where he can lead a team of technicians and shape service standards for a regional telecom provider. He is working
    toward the BICSI Design Engineer credential and hopes to earn a bachelor’s degree in electrical engineering part‑time. Over the next five years, he plans to launch a small consulting firm that offers
    specialized radio‑frequency site surveys and training workshops for younger workers. He also wishes to be recognized as a safety champion in his county, advocating for improved occupational health practices.
