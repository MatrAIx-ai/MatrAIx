  hobbies: '[''Soccer'', ''Basketball'', ''Competitive video gaming (e.g., Fortnite, Rocket League)'', ''Biking'', ''Fishing'', ''LEGO building'', ''Electronic tinkering'', ''Social events and group activities'']'
  career_goals: John dreams of turning his love for competition and sports into a future career as a professional athlete, ideally in soccer or basketball, and envisions eventually becoming a coach or trainer
    who can lead a team. He is also attracted to hands‑on trades like automotive or marine mechanics, where his practical problem‑solving skills can be applied. In the longer term, he hopes to gain recognition
    for his achievements and possibly start a YouTube or Twitch channel to share gaming strategies and highlight his sports pursuits.
