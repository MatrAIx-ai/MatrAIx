personas:
  professional: John Heller is a budding tinkerer who spends afternoons building LEGO robotics kits, experimenting with simple electronic circuits, and dreaming of a future as an electrical engineer, all
    while adhering to a routine that mixes structured projects with the flexibility of spontaneous play.
  sports: John Heller is a core player on the Port Orange Junior Soccer Club, idolizes Orlando City SC’s forwards, shoots hoops after practice to emulate the Orlando Magic’s fast‑break style, follows the
    Tampa Bay Rays on summer game days, and treats each season as both a competitive arena and a social gathering with friends.
  arts: John Heller devotes his free time to constructing LEGO Ninjago models while blasting Billie Eilish and Imagine Dragons, watches the latest Marvel movies on weekend family movie nights, and curates
    a personal playlist of video‑game soundtracks that shape his creative mood.
  travel: John Heller has biked along the Port Orange waterfront, visited Disney World and Cocoa Beach with his family, dreams of exploring New York City’s Times Square and the Grand Canyon’s rim, and prefers
    spur‑of‑the‑moment bike trips over meticulously planned vacations, though his parents set budget limits.
  culinary: John Heller enjoys pepperoni pizza, mac and cheese, and helps his dad grill fish tacos seasoned with lime, cilantro, and a dash of hot sauce, but his cooking skill stays at assembling simple
    snacks, and he often sneaks extra cookies from the pantry when no one is watching.
  core: John Heller is a routine‑loving, competitive twelve‑year‑old who thrives on group games, misplaces LEGO pieces, forgets homework after spontaneous bike rides, and balances a skeptical streak with
    a love for social fun.
background:
  cultural: John comes from a white, middle‑class family rooted in mainstream American suburban culture. Growing up in Port Orange, Florida, he is exposed to coastal leisure activities such as beach outings,
    fishing, and water sports, while also participating in the community’s strong focus on school athletics and local festivals. His family’s values emphasize practicality, routine, responsibility, and
    friendly competition, reflecting a down‑to‑earth outlook typical of many families in the region.
