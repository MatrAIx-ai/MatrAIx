persona_description: A mission scientist who specializes in the exploration of Venus, particularly in the study of its atmosphere and its circulation patterns. She is experienced in conducting research
  on the composition of the planet's atmosphere and its circulation patterns using various means, including acoustic and electrical activities in the Venusian skies, as well as the use of microprobes for
  atmospheric sampling. She has expertise in the development and execution of experiments on the surface of Venus, including soil analysis, and is familiar with the use of innovative vehicles such as the
  "vetrolet" and the "wind flyer" for long-duration exploration of the planet. She has experience in the use of Proton and Angara launch vehicles for missions to Venus, and has discussed possible Russian-Chinese
  cooperation on a mission to Venus with representatives of the Russian space agency.
