  career_goals: Looking ahead, Kimberly aims to ascend to a senior leadership position within her insurance firm—specifically as Regional Claims Manager or Senior Investigator—where she can shape policy,
    drive performance metrics, and lead a high-performing team. She plans to earn the Chartered Property Casualty Underwriter (CPCU) designation and additional certifications in forensic investigation to
    deepen her expertise. Kimberly also wishes to design and implement a comprehensive training program for new adjusters, drawing on her background in education, and to become a recognized speaker at industry
    conferences. While pursuing these professional milestones, she seeks a balanced schedule that preserves time for her family and community involvement.
