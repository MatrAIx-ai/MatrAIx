personas:
  professional: Hoa Vu, a meticulous 26‑year‑old teaching assistant with a STEM background, leverages her data‑analysis skills in Python and MATLAB to design structured lab curricula, deliver precise technical
    writing, and mentor first‑generation students while championing bilingual, culturally responsive instructional materials.
  sports: Hoa Vu, a 26‑year‑old outdoor enthusiast, hikes the Hill Country trails every Saturday with her local Friends of the Trails club, plays in a co‑ed recreational soccer league in Austin, and avidly
    follows the Dallas Cowboys and Texas Rangers, applying the same systematic routine to her fitness regimen.
  arts: Hoa Vu, a creatively inclined 26‑year‑old, enjoys singing in her church choir during Tet celebrations, performs karaoke renditions of songs by My Le and Justin Timberlake, knits scarves while listening
    to classical Vietnamese folk music, and appreciates the cinematic works of Ang Lee and the visual storytelling of graphic novelist Marjane Satrapi.
  travel: Hoa Vu, a 26‑year‑old meticulous planner, has backpacked through Da Nang and the surrounding Central Vietnam region, trekked the limestone karsts of Ha Long Bay, dreams of hiking New Zealand’s
    Milford Track, and prefers itineraries that balance cultural immersion with structured daily schedules, often cataloguing each trip in a detailed spreadsheet.
  culinary: Hoa Vu, a 26‑year‑old culinary enthusiast, masters authentic Vietnamese pho using star anise, fish sauce, and charred ginger, crafts bánh mì with homemade pâté and pickled daikon, and occasionally
    experiments with Tex‑Mex tacos, preferring hands‑on cooking in her kitchen garden where she harvests cilantro and lemongrass for fresh flavor.
  core: Hoa Vu, a 26‑year‑old organized educator and avid gardener, fuses methodical precision with a love for Vietnamese traditions, competitive ambition, and a disciplined, routine‑driven approach to
    life.
background:
  cultural: Hoa Noel Vu is of Vietnamese descent, born to parents who immigrated to the United States in the early 1990s. She grew up in a bilingual household, speaking Vietnamese at home and English at
    school, and actively participated in community activities at a local Vietnamese Catholic church. Her cultural identity is shaped by traditional values such as respect for elders, emphasis on family
    cohesion, and celebration of festivals like Tet, where she helps organize communal meals and cultural performances. While embracing her Southeast Asian heritage, she has also integrated Texas customs,
    celebrating Thanksgiving and engaging in regional community events, creating a hybrid cultural perspective that values both preservation of heritage and adaptation to her local environment.
attributes:
  skills: '["Data analysis with Python and MATLAB", "Statistical modeling and hypothesis testing", "Laboratory safety protocol implementation", "Curriculum design for undergraduate labs", "Technical writing
    and documentation", "Student mentorship and tutoring", "Classroom management and grading systems", "Bilingual instructional support (Vietnamese/English)"]'
  hobbies: '["Vegetable gardening with seasonal planning", "Cooking traditional Vietnamese cuisine", "Sudoku and jigsaw puzzle solving", "Reading historical and self‑improvement literature", "Hiking local
    trails in Van Zandt County", "Participating in church cultural events and choirs", "Knitting scarves", "Karaoke with friends"]'
  career_goals: Short‑term, Hoa aims to complete a graduate certificate in Teaching and Learning, secure a full‑time adjunct faculty position at a community college, and launch a structured mentorship program
    for first‑generation STEM students. Mid‑term, she aspires to become a tenure‑track professor, lead curriculum development for introductory engineering courses, and obtain certification as a STEM outreach
    coordinator. Long‑term, her ambition is to serve as department chair or director of a regional STEM outreach initiative, creating bilingual resources and systematic pipelines that bring consistent,
    high‑quality STEM education to rural Texas schools while maintaining a stable and predictable career trajectory.
