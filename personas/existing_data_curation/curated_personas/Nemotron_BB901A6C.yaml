  career_goals: At 50, Joseph aims to transition his carpentry business into a boutique design‑build firm that specializes in eco‑friendly renovations of historic Brooklyn brownstones. He plans to obtain
    the Master Craftsman certification from the NYC Department of Buildings, author a guide on integrating traditional joinery with modern sustainable practices, and establish a weekend apprenticeship program
    for local youth. Joseph also seeks to secure the financial stability needed for a comfortable retirement while ensuring his workshop can be handed down to his children as a lasting family legacy.
