  hobbies: '[''reading books'', ''drawing and sketching'', ''building LEGO models'', ''jigsaw and logic puzzles'', ''playing piano'', ''cooking Mexican snacks'', ''caring for pet goldfish'', ''nature walks'',
    ''Spanish language club'', ''junior science club'']'
  career_goals: Ania aspires to become a bilingual elementary school teacher who can combine her love of structure with a desire to support other children's learning. She dreams of graduating high school
    with honors, studying education and child development, and eventually leading a classroom where she can teach reading, math, and Spanish in a supportive, organized environment. In the meantime, she
    sets short-term goals such as earning the school's Student of the Month award, joining the junior science club, and volunteering to care for the classroom's fish tank. She also entertains a future interest
    in veterinary science, imagining a day when she could care for animals while teaching kids about kindness.
