personas:
  professional: Ania Morenomunoz, a budding junior architect, channels their love for step‑by‑step LEGO builds and meticulous sketching into designing miniature cardboard houses, applying a methodical,
    organized mindset that foreshadows a future in engineering or design.
  sports: Ania Morenomunoz, a budding junior hiker who spends weekends trekking the trails of Red Rock Canyon while cheering for the Las Vegas Golden Knights, also participates in the Little Rockets Soccer
    Club, where their methodical nature shines during structured drills and small‑sided games.
  arts: Ania Morenomunoz, a budding pianist diligently learning Beethoven’s Für Elise and a sketchbook enthusiast who fills pages with scenes inspired by the sci‑fi artistry of Chris Riddell and the whimsical
    worlds of Dr Seuss, blends music and illustration to bring the adventures from their chapter books to life.
  travel: Ania Morenomunoz, a meticulous planner even at nine, enjoys family vacations that follow a clear agenda—having already trekked the red cliffs of Sedona, explored the dinosaur fossils at Dinosaur
    National Monument, and now yearning to wander the bustling markets of Barcelona while balancing schoolwork and weekend routines.
  culinary: Ania Morenomunoz, a kitchen apprentice who can mash ripe avocados into silky guacamole, perfectly grill cheese‑filled quesadillas, and proudly bake chocolate‑chip cookies using a measured recipe,
    blends their methodical nature with a love for bold flavors like fresh cilantro and smoky chipotle.
  core: Ania Morenomunoz, a structured nine‑year‑old who balances disciplined LEGO engineering, daily piano practice, meticulous budgeting, and quiet adventures in desert trails and family kitchens with
    a gentle, organized curiosity.
background:
  cultural: Ania comes from a Mexican family that maintains strong cultural traditions while living in Las Vegas. Spanish is spoken at home, and she celebrates holidays such as Dia de los Muertos, where
    her family creates a small altar with photos, papel picado, and favorite foods of loved ones. She enjoys Mexican festivals, eats home-cooked dishes like tamales and pozole, and sometimes visits relatives
    in Mexico, hearing stories about her grandparents' hometown. In her community, she participates in a local Mexican cultural center's dance and art workshops, which reinforce her heritage. At school,
    she shares bilingual stories with classmates and embraces a blend of Mexican family values—respect, cooperation, and communal harmony—and the diverse, dynamic environment of Las Vegas.
