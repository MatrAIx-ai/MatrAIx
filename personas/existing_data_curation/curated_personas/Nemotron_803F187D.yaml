personas:
  professional: A budding digital illustrator, Barbara Moul channels their methodical planning and vivid imagination into mixed‑media landscapes, seamlessly blending hand‑drawn sketches, digital painting,
    and interactive storytelling code, while reliably leading school art‑club projects and meeting every deadline.
  sports: A nature‑oriented athlete, Barbara Moul runs on the middle‑school cross‑country team during the fall, hikes the Appalachian Trail with family on weekends, enjoys cheering for the Nashville Predators
    (NHL) and Tennessee Titans (NFL), and they also practice beginner yoga to improve flexibility after piano rehearsals.
  arts: An imaginative storyteller, Barbara Moul splits time between sketching Smoky Mountain vistas, creating digital paintings inspired by Hayao Miyazaki, penning fantasy flash fiction reminiscent of
    Neil Gaiman, playing piano pieces by Ludwig van Beethoven and contemporary songs by Billie Eilish, and taking part in community theater workshops where they portray characters like Hermione Granger,
    all of which fuel their growing portfolio displayed on a personal Instagram art feed.
  travel: An adventure‑seeker with a love for the great outdoors, Barbara Moul has hiked the Great Smoky Mountains, visited Washington D.C.’s Smithsonian museums on a family trip, dreams of exploring Iceland’s
    geothermal lagoons and hiking the Laugavegur trail, and they plan a future summer trek through Acadia National Park, preferring itineraries that blend scenic trails with sketch‑inspired stops.
  culinary: A budding home chef, Barbara Moul delights in whipping up fluffy buttermilk pancakes topped with fresh blueberries, crafting avocado toast with a drizzle of lemon juice and chili flakes, and
    perfecting a cheesy baked mac‑and‑cheese seasoned with smoked paprika, though they often over‑cook the pancakes when they get distracted by a new art idea.
  core: Barbara Moul, a 13‑year‑old imaginative artist, balances meticulous project planning with spontaneous creativity, a love of hiking, and an occasional tendency to over‑cook pancakes, and they always
    keep a sketchbook handy.
background:
  cultural: Barbara grew up in a suburban neighborhood of Knoxville, Tennessee, in a family that values community, hospitality, and an appreciation for the natural beauty of the Appalachian region. Family
    traditions include holiday barbecues, church youth activities, and annual trips to the Great Smoky Mountains, which nurtured her love of storytelling and outdoor exploration. While she enjoys Southern
    folk music and regional cuisine, she also embraces contemporary youth culture through streaming platforms, online art communities like DeviantArt, and social media. This blend of local Appalachian influences,
    community service, and modern digital experiences shapes her worldview and fuels her creative pursuits.
attributes:
  skills: '[''pencil sketching'', ''watercolor painting'', ''digital illustration (Procreate)'', ''creative writing'', ''storyboarding'', ''basic Python programming'', ''project planning'', ''public speaking'']'
  hobbies: '[''sketching nature'', ''digital art creation'', ''creative writing'', ''reading graphic novels'', ''playing piano'', ''hiking'', ''photography'', ''school art club'', ''coding puzzles'']'
  career_goals: Barbara aspires to become a professional concept artist or illustrator, ideally working in animation or video‑game design. In the short term, she plans to attend a summer art camp, build
    a strong portfolio, and enroll in a specialized high‑school visual‑arts program. Long‑term, she envisions studying graphic design or fine arts at a college, then moving into a role where she can combine
    her imagination with her methodical planning skills, such as an art director or creative project manager. She is also interested in creating illustrated children’s books that blend storytelling with
    environmental themes.
