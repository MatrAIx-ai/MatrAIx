  hobbies: '[''Storytime with Picture Books'', ''Building and Tearing Down Block Towers'', ''Dress-up and Role-play'', ''Singing Nursery Rhymes'', ''Dancing to Children’s Music'', ''Exploring Backyard Nature'',
    ''Simple Puzzles'', ''Water Play'']'
  career_goals: At two years old Mona does not have formal career aspirations, but she frequently imitates adult roles—pretending to cook, clean, and care for a stuffed doll—indicating an early interest
    in nurturing and community‑helping activities. Her parents nurture this by offering pretend‑play tools, so she may grow toward ambitions such as becoming a teacher, nurse, or community volunteer when
    she is older.
