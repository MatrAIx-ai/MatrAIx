personas:
  professional: Mona Thornton runs daily tea parties with her stuffed guests, insisting on a strict ritual of arranging cups and napkins while delightfully improvising the menu, revealing her early flair
    for organizing social gatherings despite occasional scattered focus.
  sports: Mona Thornton loves cheering for the Portland Timbers, pretends to kick a foam soccer ball in the backyard, attends a weekly toddler gymnastics class at the local community center, and enjoys
    splashing in the park’s summer splash pad.
  arts: Mona Thornton sings along to Jack Johnson's acoustic songs while finger‑painting bright suns and clouds, delights in watching the Seattle Children’s Theatre productions on DVD, and often re‑creates
    scenes from the animated film “Moana” with her crayons.
  travel: Mona Thornton has explored the Oregon coast’s tide pools on a family road trip, collected seashells at Cannon Beach, visited Crater Lake National Park’s snow‑capped rim on a stroller‑friendly
    trail, and dreams of seeing the giant redwoods of California’s Redwood National Park.
  culinary: Mona Thornton favors strawberry‑yogurt parfaits, mac‑and‑cheese with a sprinkle of cheddar, and buttery pancakes topped with maple syrup, often helping stir batter with a tiny wooden spoon and
    sticking a bite of banana into a spoonful of peanut butter.
  core: Mona Thornton, a two‑year‑old social whirlwind, thrives on daily routines, chatty play, and comforting familiarity while quietly battling occasional worries and a penchant for disorganized snack
    piles.
background:
  cultural: 'Mona is raised in a white, middle‑class family in Hillsboro, Oregon, a suburb of the Portland metropolitan area. Her family’s cultural orientation reflects typical Pacific Northwest values:
    appreciation for the outdoors, participation in local community events, and an emphasis on practicality and routine in daily life. Growing up near parks, farms, and the Willamette Valley, she is often
    exposed to seasonal activities such as berry picking, nature walks, and community fairs, which shape her early worldview. Her household places importance on family togetherness, polite interaction,
    and modest, down‑to‑earth attitudes.'
