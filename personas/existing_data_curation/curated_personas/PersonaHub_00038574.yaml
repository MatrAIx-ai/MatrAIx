persona_description: A NASA researcher and project manager who specializes in the development of aircraft concepts and technologies to reduce the impact of aviation on the environment during the next 30
  years. The individual is based at NASA's Langley Research Center in Hampton, Va., and is responsible for unveiling the project's next steps, which include large-scale demonstrations, at the 51st American
  Institute of Aeronautics and Astronautics Aerospace Sciences Meeting. The individual is likely to be interested in the project's focus on aircraft drag reduction, weight reduction, fuel and noise reduction,
  emissions reductions, and fuel consumption and community noise reduction.
