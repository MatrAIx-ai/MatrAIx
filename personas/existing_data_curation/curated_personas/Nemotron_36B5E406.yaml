personas:
  professional: Kimberly Harris, a 21‑year‑old aspiring event manager, leverages her methodical planning and natural sociability to coordinate community fundraisers, club events, and youth sports clinics
    while balancing a part‑time retail job that funds her Business Administration studies.
  sports: Kimberly Harris competes in her town's recreational volleyball league, volunteers as a youth sports coach, hikes the trails of the Columbia River Gorge on weekends, and roots for the Seattle Seahawks
    and Portland Trail Blazers while maintaining a disciplined weekly cardio schedule at the local gym.
  arts: Kimberly Harris is a regular attendee of the Vancouver Playhouse productions, occasionally assists with set design, captures sunrise shots on her DSLR inspired by Annie Leibovitz, and fills her
    playlists with indie folk artists like Bon Iver and Phoebe Bridgers.
  travel: Kimberly Harris prefers well‑planned road trips, having explored the Oregon Coast, the historic streets of Portland, and the alpine vistas of Mount St. Helens, while dreaming of a summer backpacking
    adventure through Yellowstone and the Grand Canyon.
  culinary: Kimberly Harris enjoys experimenting with Mediterranean‑inspired dishes such as lemon‑herb grilled salmon and spinach‑feta stuffed chicken, perfects her signature banana‑bread bake‑sale treats,
    and often over‑seasoning while juggling multiple potluck preparations.
  core: Kimberly Harris is a hyper‑organized social planner who thrives on coordinating community events, yet habitually overbooks her calendar and forgets to pause for self‑care.
background:
  cultural: Kimberly grew up in Springfield, Ohio, a Midwestern town with a predominantly white population and a strong sense of community. Her family’s roots trace back to a mix of German and Irish ancestry
    common in the region, and she was raised with values emphasizing reliability, hard work, and modesty. Local traditions such as the annual county fair, Fourth of July parades, and neighborhood block
    parties have shaped her appreciation for collective celebrations and civic engagement. The practical, straightforward mindset of the Midwest, combined with supportive church and school community activities,
    has reinforced her preference for structure, teamwork, and community service.
