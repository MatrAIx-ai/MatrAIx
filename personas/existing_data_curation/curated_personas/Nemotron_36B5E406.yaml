  career_goals: Kimberly aims to enroll in a bachelor’s program in Business Administration with a focus on Event Management or Nonprofit Leadership. In the short term, she plans to secure a part‑time role
    in hospitality or retail to fund her studies while gaining professional experience. She aspires to become a project manager for community events, eventually leading larger nonprofit initiatives that
    strengthen local neighborhoods. Her long‑term ambition is to launch her own community‑focused event planning firm that combines her love of structure with her sociable, outgoing nature.
