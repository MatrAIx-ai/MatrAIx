  career_goals: Inspired by his love of how things work and his desire to help others, Mark dreams of growing up to be a scientist‑engineer who creates helpful inventions, or a firefighter who protects
    his community. He also expresses curiosity about space and occasionally says he wants to be an astronaut, reflecting his balanced curiosity and practical wish to serve.
