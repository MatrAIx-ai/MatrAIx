personas:
  professional: Mark Welton is a budding junior architect who assembles intricate LEGO cities with methodical precision yet joyfully improvises when new pieces appear, reflecting a balance of curiosity
    and practicality in their play, and they proudly showcase their creations to friends and family.
  sports: Mark Welton bats at the Torrington Tykes Little League, practices gymnastics at the YMCA, and cheers for the New England Patriots on game days, balancing structured team practice with spontaneous
    backyard play, and they often trade baseball cards with teammates during breaks.
  arts: Mark Welton loves drawing scenes from Disney's 'The Little Mermaid', sings along to Raffi's 'Baby Beluga', and enjoys watching puppet performances at the local children's theater, letting creativity
    flourish in both solitary sketching and group storytelling, and they proudly display a crayon‑filled sketchbook on their bedroom wall.
  travel: Mark Welton enjoys weekend trips to Connecticut's coastal beach, day excursions to Boston's Museum of Science, and dreams of exploring the fairy‑tale castles of Transylvania, preferring family‑guided
    adventures that mix excitement with security, and they keep a travel journal where they paste ticket stubs and stickers.
  culinary: Mark Welton delights in nibbling warm cheese‑filled banitsa handcrafted by grandma, slurping cheesy macaroni, crunching carrot sticks with hummus, and proudly stirring batter for chocolate chip
    cookies, showcasing a playful palate and budding kitchen confidence, and they often request extra sprinkles for desserts.
  core: Mark Welton blends a quiet curiosity with practical play, keeps a tidy piggy bank, monitors their allergies, loves LEGO building, and is never without a crayon or a cookie, and they sometimes hum
    a tune while stacking blocks.
background:
  cultural: 'Mark is raised in a culturally blended household in Torrington, Connecticut. His family’s Eastern European heritage—traced to Bulgarian ancestors—adds occasional traditions such as celebrating
    Easter with painted eggs and baking banitsa, while also speaking some Bulgarian phrases at home. At the same time, his upbringing reflects typical New England values: participation in community events,
    appreciation for the seasonal changes, and a focus on school readiness. This combination encourages respect for family harmony, practical skills, and a connection to both his heritage and the broader
    American community.'
