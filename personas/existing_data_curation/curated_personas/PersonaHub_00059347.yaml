persona_description: A financial services professional with expertise in credit card processing, fraud detection, and payment security. They are well-versed in the Payment Card Industry Data Security Standard
  (PCI DSS) and understand the importance of using the Card Security Code (CSC) as a security measure against fraud. They are familiar with the different types of cards and their respective security codes,
  and have experience in implementing and managing payment systems. They are also aware of the risks associated with phishing scams and the effectiveness of the CSC as an anti-fraud device in the context
  of "card not present" transactions.
