personas:
  professional: Esther Lanzas, a meticulous vehicle‑fleet cleaning specialist, combines bilingual fluency, rigorous health‑and‑safety compliance, and an uncanny eye for hidden grime with a sociable, teamwork‑focused
    leadership style to streamline workflows and nurture a supportive work environment; they thrive on clear processes while still enjoying spontaneous dance breaks with the crew.
  sports: Esther Lanzas follows the New York Yankees avidly, plays in a local recreational softball league, runs with the “Fit Fam” community running club on weekends, and cheers for the city’s semi‑professional
    soccer team; they use these activities as both social outlets and stress relief.
  arts: Esther Lanzas enjoys dancing merengue and bachata to the rhythms of Juan Luis Guerra, Romeo Santos, and Marc Anthony, attends occasional live salsa performances at the neighborhood cultural center,
    and curates a personal collection of classic Afro‑Latin albums that inspire both their cooking and community gatherings; they often share their favorite tracks during family meals.
  travel: Esther Lanzas loves family road trips to the Great Smoky Mountains, weekend getaways to Puerto Rico’s historic Old San Juan, and dreams of a cultural tour through Spain’s Andalusia region, planning
    trips around school holidays with a mix of structured itineraries and spontaneous beach stops; they seek a balance between adventure and relaxation, often choosing destinations that offer both cultural
    immersion and family‑friendly activities.
  culinary: Esther Lanzas savors preparing mangú with fried plantains, hearty sancocho simmered with yucca and root vegetables, and crispy tostones seasoned with recaito and garlic, often sharing these
    dishes at community potlucks while occasionally over‑salting the sauces in their enthusiasm; they consider each meal a celebration of flavor and community.
  core: Esther Lanzas is a socially vibrant, detail‑obsessed cleaning professional who blends a love for Latin dance and family‑centered cooking with big entrepreneurial dreams, while letting schedules
    drift and hoarding extra spices like a secret treasure; they navigate life with a mix of disciplined work ethic and relaxed spontaneity.
background:
  cultural: Esther was raised in a bilingual Dominican household, preserving the island’s vibrant music, food, and family traditions while adapting to life in Bridgeport. Dominican culture’s emphasis on
    close family ties, lively celebration, and respect for elders shapes her values and daily routines. Her Catholic upbringing influences her participation in church activities and community service. She
    balances her heritage with American customs, often blending Dominican recipes with New England ingredients and celebrating both Dominican Republic Independence Day and U.S. holidays.
attributes:
  skills: '[''Vehicle cleaning'', ''Equipment sanitation'', ''Health and safety compliance'', ''Attention to detail'', ''Bilingual communication (Spanish/English)'', ''Inventory management'', ''Task scheduling'',
    ''Team collaboration'', ''Problem solving'']'
  hobbies: '[''Dancing (merengue/bachata)'', ''Cooking Dominican cuisine'', ''Church outreach volunteering'', ''Balcony gardening'', ''Watching baseball (NY Yankees)'', ''Evening walks with family'']'
  career_goals: She aims to move into a supervisory role within a vehicle‑fleet cleaning operation, overseeing a small team and improving workflow efficiency. Over the next few years she plans to obtain
    a certification in industrial cleaning and safety, and eventually start her own mobile cleaning service that caters to local businesses and community members. She also hopes to take night classes to
    earn an associate degree in facilities management, expanding her career options beyond hands‑on cleaning.
