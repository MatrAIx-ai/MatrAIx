  career_goals: He hopes to gradually shift from full-time contract work to running a modest, flexible carpentry studio where he can take on selective projects, mentor a handful of younger carpenters, and
    preserve Marietta’s historic homes. Michael also aims to document his woodworking techniques in a small handbook for his local community and eventually enjoy a semi-retired lifestyle with occasional
    commissions that allow him to work at his own pace.
