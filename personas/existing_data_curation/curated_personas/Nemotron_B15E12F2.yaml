  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries and museums'', ''Listening to jazz and blues music'', ''Gardening'', ''Woodworking'', ''Reading historical biographies'', ''Journaling
    and reflective writing'']'
  career_goals: As he approaches retirement, Reginald aims to transition into a part‑time safety trainer role, earning an OSHA trainer certification to formally teach equipment safety to new workers. He
    also hopes to volunteer as a mentor at the local community college’s construction program, sharing his decades of practical knowledge. Additionally, he plans to document his personal and family stories
    in a memoir focused on the experiences of Black construction workers in Indiana, preserving that heritage for future generations. Finally, he seeks to contribute to the Lafayette arts community by assisting
    with workshops that combine his love of art and craftsmanship.
