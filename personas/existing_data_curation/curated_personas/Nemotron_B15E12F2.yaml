personas:
  professional: Reginald Goodrum, a veteran heavy‑equipment operator with three decades of excavator, bulldozer and crane expertise, is pivoting toward part‑time OSHA safety training and mentorship at the
    local community college, where their methodical checklist‑driven approach and quiet authority make them a trusted guide for new crews.
  sports: Reginald Goodrum supports the Purdue Boilermakers basketball team and the Indiana Pacers, participates in a senior walking club that meets at the local park each spring, and plays weekly shuffleboard
    at the Lafayette Senior Center, finding low‑impact activity a comfortable complement to their gardening routine.
  arts: Reginald Goodrum channels their love of gospel storytelling and jazz into watercolor landscapes of Lafayette’s historic streets, regularly visits the Dancing Rabbit Art Center, and finds inspiration
    from artists like Jacob Lawrence, Ella Fitzgerald, and Miles Davis, often sketching while listening to vintage vinyl.
  travel: Reginald Goodrum prefers meticulously planned trips that blend cultural immersion and relaxation, having revisited New Orleans for its soulful music scene, explored the blues heritage of Memphis,
    and taken serene drives through Indiana’s Brown County, while future dreams include a pilgrimage to the historic jazz clubs of Chicago.
  culinary: Reginald Goodrum enjoys cooking with garden‑fresh vegetables, frequently preparing dishes like collard greens sautéed with smoked turkey, shrimp and grits seasoned with a dash of Creole spice,
    and sweet potato pie, showing an intermediate skill level that balances Southern comfort flavors with Midwestern ingredients.
  core: Reginald Goodrum is a methodical, art‑loving craftsman who balances a quiet, reflective life with a deep commitment to safety, community mentorship, and the soulful sounds of jazz, even as anxiety
    sometimes shadows their steady routine.
background:
  cultural: Reginald is a second‑generation African‑American whose family migrated from the rural South to Indiana during the Great Migration. Raised in Lafayette’s close‑knit Black community, he grew up
    attending church services where gospel music and oral storytelling were central. These cultural roots fostered a deep respect for perseverance, community solidarity, and artistic expression. His identity
    blends Southern heritage, Midwestern work ethic, and a lifelong engagement with African‑American artistic traditions, influencing both his professional discipline and his personal appreciation for art
    and music.
attributes:
  skills: '[''Excavator operation'', ''Bulldozer operation'', ''Front‑loader operation'', ''Crane operation (basic)'', ''Heavy equipment maintenance and troubleshooting'', ''Site safety compliance (OSHA)'',
