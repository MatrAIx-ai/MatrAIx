  career_goals: Even at his young age, Simon enjoys imagining future roles that combine helping others with clear structure. He often talks about becoming a firefighter who rescues people, a doctor who
    cares for sick children, or a teacher who shares knowledge in a supportive classroom. These ambitions reflect his love for order, his practical mindset, and his strong desire to make a positive impact
    on his community.
