personas:
  professional: Simon Lanuza is a preschool explorer who orchestrates daily building‑block projects, applying his love for structure and teamwork to create towering castles that delight his classmates.
  sports: Simon Lanuza cheers loudly for the Los Angeles Dodgers, runs weekly drills with the Huntington Beach Little League baseball team, and joins a Saturday morning beach sandcastle fitness club that
    blends playful digging with core‑strength activities, all while they eagerly wear a Los Angeles Lakers cap.
  arts: Simon Lanuza loves watching Pixar’s "Coco", singing along to Luis Miguel’s ballads, and crafting colourful Día de los Muertos masks with his aunt, finding inspiration in the vibrant murals at the
    local community center and the whimsical sketches of Dr. Seuss.
  travel: Simon Lanuza has already built sandcastles at the San Diego Zoo’s Safari Park, dreams of kayaking along the turquoise waters of Maui, and hopes to explore the ancient Mayan ruins of Tikal someday,
    all while they prefer short family road trips over long flights due to their love of routine.
  culinary: Simon Lanuza delights in helping his mother roll pupusas, devours cheesy nachos with fresh salsa and avocado slices, and insists on adding a splash of lime to his morning fruit bowl, though
    they sometimes fling peanut butter onto the kitchen floor in excitement.
  core: Simon Lanuza is an exuberant four‑year‑old who blends structured play with spontaneous creativity, fiercely protects his tiny piggy bank, and radiates compassionate energy.
background:
  cultural: Simon is raised in a Guatemalan household within the vibrant multicultural setting of Huntington Beach, Orange County. His family blends Guatemalan traditions—such as speaking Spanish at home,
    celebrating Día de los Muertos and Cinco de Mayo, and enjoying foods like pupusas and tamales—with the beach‑side lifestyle of Southern California. This dual cultural exposure nurtures his appreciation
    for both his heritage and the diverse community around him, fostering a sense of belonging, respect for family elders, and an openness to sharing his culture with friends.
