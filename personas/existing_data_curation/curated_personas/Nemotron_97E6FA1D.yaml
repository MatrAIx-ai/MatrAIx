  career_goals: Even at four, Marci loves to imagine future careers. She frequently tells adults she wants to be an artist who paints bright pictures, a scientist who discovers how things work, or an astronaut
    who travels to space. She also mentions wanting to be a teacher because she enjoys helping friends learn new songs and games. Her organized nature leads her to imagine roles that involve planning, such
    as a future event organizer or a doctor who follows clear steps to help patients. These ambitions are guided by her curiosity, love of art, and desire to be good at what she does.
