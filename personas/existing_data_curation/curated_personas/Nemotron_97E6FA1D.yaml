personas:
  professional: Marci Green, a budding preschool architect who loves arranging building blocks into intricate cityscapes, meticulously plans each tower before the first piece is set, and proudly declares
    a "construction schedule" for playtime, while they channel their competitive streak into outbuilding friends during group activities.
  sports: Marci Green, an exuberant member of the Duluth Kids Soccer Club who also enjoys Saturday T-ball with the Gwinnett Little Aces, cheers loudly for the Atlanta Braves during spring baseball outings,
    mimics the Atlanta Falcons' plays during backyard football, and follows a daily stretch routine that they treat like a mini-training camp.
  arts: Marci Green, a bright-eyed storytime enthusiast who devours picture books by Eric Carle, sings along to The Wiggles' upbeat tunes, watches Disney's Frozen for colorful animation, and recreates Van
    Gogh's Sunflowers with finger paints, channeling their curiosity and love for art into every creative burst.
  travel: Marci Green, a curious little explorer who loves family road trips to the Georgia Aquarium and weekend picnics at Stone Mountain Park, dreams of visiting the magical realms of Disney World in
    Orlando and the Eiffel Tower in Paris, and prefers itineraries that blend organized museum stops with spontaneous playground detours.
  culinary: Marci Green, a budding kitchen helper who prefers creamy mac and cheese, crunchy chicken nuggets, strawberry-banana smoothies, and helps stir pancake batter with a wooden spoon, delights in
    sprinkling cheddar cheese on broccoli (even if they sometimes push it aside), and treats each mealtime as a colorful adventure on their plate.
  core: Marci Green, a curious, organized, and hyper-social four-year-old who turns every playground into a bustling project site, saves coins like a mini-banker, battles allergies with a brave grin, and
    never says no to a song or a snack, all while out-competing peers in every game.
background:
  cultural: Marci is raised in Duluth, a suburban community in Gwinnett County, Georgia. Her family reflects the Southern hospitality common in the region, emphasizing close family ties, weekend gatherings,
    and community events such as local festivals and library storytimes. Growing up in a diverse county, she is exposed to neighbors from many cultural backgrounds, which encourages an early appreciation
    for different traditions and languages. The neighborhood’s emphasis on outdoor play, shared meals, and group activities shapes her sociable and cooperative nature while also exposing her to the broader
    multicultural fabric of modern Georgia.
attributes:
  skills: '["basic color identification", "pre‑numeracy (counting to 10)", "letter recognition", "fine motor skills (drawing, cutting with safety scissors)", "social interaction (group play, sharing)",
