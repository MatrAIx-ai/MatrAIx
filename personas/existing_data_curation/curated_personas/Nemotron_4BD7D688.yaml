personas:
  professional: Erika Gaines, a seasoned real‑estate advisor in Zephyrhills, combines decades of market analysis, negotiation, property valuation, and home staging expertise with a pragmatic curiosity that
    drives her to blend traditional relationship‑building with the latest listing technologies while mentoring younger agents and championing senior‑friendly housing.
  sports: Erika Gaines enjoys leisurely walks along the New River with her senior walking club, cheers on the Tampa Bay Buccaneers during football season, follows the Tampa Bay Rays for summer baseball,
    and occasionally bowls at the community center, favoring low‑impact exercise that keeps her joints supple.
  arts: Erika Gaines finds inspiration in quilting circles where she stitches modern patchwork influenced by gospel legends like Aretha Franklin and Kirk Franklin, attends Sunday gospel services, and immerses
    herself in historical fiction and memoirs by authors such as Maya Angelou and James Baldwin, letting these narratives color her artistic sensibility.
  travel: Erika Gaines prefers relaxed road‑trip itineraries that blend heritage sites and natural scenery, having savored the historic streets of Savannah, the vibrant markets of New Orleans, and the Appalachian
    vistas of Asheville, while she dreams of a quiet weekend exploring Charleston’s historic homes, always planning trips around her garden’s harvest calendar and family visits.
  culinary: Erika Gaines delights in cooking traditional Southern fare, expertly preparing shrimp and grits with fresh Gulf shrimp, collard greens simmered with smoked turkey, and peach cobbler topped with
    a buttery crumble, while she cultivates garden tomatoes, okra, and sweet potatoes to star in her meals, showcasing a solid home‑cooking skill set tempered by occasional over‑seasoning.
  core: Erika Gaines balances a pragmatic curiosity with Southern hospitality, mentoring the next generation of agents while never missing a Sunday gospel service, a garden watering, or a second slice of
    peach cobbler.
background:
  cultural: Erika is an African‑American who grew up in the South during the civil‑rights era, shaping a strong sense of community, resilience, and family. Her cultural identity is reflected in her deep
    involvement with her local Black church, love of gospel music, and commitment to preserving the heritage of historically Black neighborhoods in Pasco County. She values intergenerational connections,
    storytelling, and the tradition of communal support that has guided her personal and professional life.
attributes:
  skills: '[''Residential property valuation'', ''Negotiation'', ''Market analysis'', ''Client relationship management'', ''Home staging'', ''Zoning and property tax navigation'', ''Community outreach'',
