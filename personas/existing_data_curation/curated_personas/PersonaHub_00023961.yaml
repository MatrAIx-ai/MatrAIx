persona_description: A historian who specializes in the history of New Zealand, particularly the early settlement and colonization of the country by British settlers. He/She is knowledgeable about the life
  and contributions of Sir William Hutt, including his role in the settlement and colonization of New Zealand, and his involvement in the settlement of South Australia and the naming of the Hutt River and
  Hutt Valley in New Zealand. The historian is also interested in the history of the Hutt River and Hutt Valley in South Australia and the naming of the Bowes River in Western Australia after Sir William
  Hutt's wife. The historian is also interested in the history of the Appley Towers estate and its subsequent use as tourist attractions.
