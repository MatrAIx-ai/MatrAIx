persona_description: A material scientist at the University of British Columbia's Stewart Blusson Quantum Matter Institute (Blusson QMI) who is leading a team to study new topological features in a superconducting
  material called KTaO3. The team's research aims to engineer exotic phases in two-dimensional materials and push the boundaries of Noisy Intermediate Scale Quantum (NISQ) computing by focusing on quantum
  materials. The team is supported by National Key R&D Program of China Grant, National Natural Science Foundation of China (NSFC), Key Research Program of Frontier Sciences, and Beijing Natural Science
  Foundation. The team also collaborates with Prof. Marcel Franz's group and other experimental groups at Blusson QMI to confirm the findings of their study.
