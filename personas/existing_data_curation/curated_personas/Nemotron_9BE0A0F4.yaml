personas:
  professional: Cristina Otamendi, a 19‑year‑old aspiring hospitality management student, leverages their bilingual communication, meticulous scheduling, and event‑planning expertise to coordinate church
    food‑pantry rosters and community‑garden projects, embodying a methodical and reliable approach that positions them for a future role as a nonprofit project coordinator or restaurant management trainee.
  sports: Cristina Otamendi, a 19‑year‑old Miami resident, treats their weekly salsa classes at the local community center as their primary cardio routine, follows the Miami Heat and Inter Miami CF with
    enthusiasm, and joins a seasonal beach‑volleyball pickup group each summer to balance structured dance practice with occasional competitive play.
  arts: Cristina Otamendi, a 19‑year‑old lover of the arts, fills their evenings with boleros by Los Panchos and modern Cuban pop from Gente de Zona while devouring contemporary romance novels by Nora Roberts,
    and regularly attends live salsa performances at the Little Havana cultural center to stay connected to music and dance.
  travel: Cristina Otamendi, a 19‑year‑old who prefers meticulously planned trips, spends their weekends exploring the Florida Keys and South Beach before budgeting for their dream cultural immersion in
    Cartagena, Colombia, using a spreadsheet to track expenses and ensuring each journey fits their modest student budget.
  culinary: Cristina Otamendi, a 19‑year‑old organized cook, expertly prepares classic Cuban staples like ropa vieja, arroz con pollo, and caramel‑topped flan—seasoning with mojo, cumin, and bay leaf—while
    also experimenting with fresh plantains and tropical fruit desserts, always keeping their kitchen stations tidy and their recipe cards alphabetized.
  core: Cristina Otamendi, a 19‑year‑old detail‑oriented planner, blends their love for routine, bilingual communication, and flavorful Cuban cooking into a life where spreadsheets share a table with salsa
    steps, even if they occasionally forget to water their garden.
background:
  cultural: Cristina was born to Cuban immigrant parents who settled in Miami's Little Havana neighborhood. Her upbringing blends Cuban traditions—such as celebrating Nochebuena, enjoying Afro-Cuban rhythms,
    and preparing family recipes—with the multicultural vibrancy of South Florida. She grew up speaking Spanish at home and English at school, fostering a bicultural identity. Family gatherings, respect
    for elders, and a strong sense of community are central to her values. While she embraces the practical, routine-oriented aspects of her Cuban heritage, she also adapts to the diverse, fast‑paced environment
    of Miami, balancing cultural preservation with contemporary American life.
attributes:
  skills: '["Bilingual Spanish-English", "Microsoft Office proficiency", "Event planning and volunteer coordination", "Traditional Cuban cooking", "Budgeting and personal finance basics", "Data entry",
