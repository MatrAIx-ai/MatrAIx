  hobbies: '["Cooking traditional Cuban dishes", "Salsa dancing", "Listening to Cuban music", "Beach walks", "Volunteering at a food pantry", "Reading romance novels", "Home organization", "Community gardening",
    "Watching telenovelas"]'
  career_goals: Cristina aims to enroll in a community college program in Business Administration, with a focus on hospitality management. She hopes to leverage her organizational strengths and bilingual
    abilities to become a project coordinator for a local cultural nonprofit or a management trainee at a family-run restaurant. In the longer term, she aspires to open a small, family-oriented Cuban café
    that offers a familiar, routine-friendly environment for the neighborhood, allowing her to blend her love for cooking with her desire for a stable, predictable business operation. She also plans to
    obtain a Certified Administrative Professional (CAP) credential to strengthen her prospects in office management.
