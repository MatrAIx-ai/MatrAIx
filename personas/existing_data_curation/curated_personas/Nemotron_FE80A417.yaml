personas:
  professional: Kennedy Haywood, an aspiring licensed cosmetologist specializing in hair cutting, braiding, and makeup artistry, leverages a meticulous, structured workflow and a calm, empathetic demeanor
    to consistently deliver polished, personalized client experiences while maintaining rigorous sanitation standards, and they ensure every appointment reflects this disciplined approach.
  sports: Kennedy Haywood, a solitary fitness enthusiast, schedules morning jogs in the local park and weekly yoga sessions at a nearby studio, supports the Atlanta Falcons, Hawks, and Braves as a dedicated
    fan, occasionally joins a community badminton club for low‑key, structured exercise, and they find these routines sustain both physical health and mental calm.
  arts: Kennedy Haywood, a lover of classic R&B and soul, fills her evenings with playlists featuring Marvin Gaye, Aretha Franklin, and Erykah Badu, attends occasional live shows at Atlanta’s Tabernacle,
    immerses herself in fashion magazines and beauty documentaries for creative inspiration, and they let music and visual art fuel their aesthetic vision.
  travel: Kennedy Haywood, an organized planner, favors short, budget‑friendly trips with detailed itineraries, has explored Savannah’s historic district and the coastal charm of Hilton Head, dreams of
    a future solo pilgrimage to Paris for runway shows and haute‑cuisine experiences, and they approach each journey as a structured learning adventure.
  culinary: Kennedy Haywood, a modest home chef, enjoys crafting quinoa‑and‑kale salads with avocado, preparing shrimp and grits with fresh cajun spices, experimenting with homemade lavender‑infused oatmeal
    cookies, reserves occasional evenings for soul‑food comfort dishes like fried chicken and collard greens, and they view cooking as a meditative extension of their creative discipline.
  core: Kennedy Haywood balances a disciplined, solitary routine of practicing hairstyles late into the night with a habit of forgetting to water her garden plants, embodying a calm, detail‑oriented personality
    that occasionally over‑schedules itself, and they often reward themselves with a quiet cup of tea after a long session.
background:
  cultural: Kennedy grew up in Lithonia, a suburb of Atlanta, within a close‑knit African‑American community that values family, faith, and mutual support. Her upbringing was shaped by church gatherings,
    community events, and the rich cultural heritage of the Atlanta Black Belt, exposing her to traditions of hair and beauty care that celebrate natural textures and personal expression. She draws inspiration
    from her mother’s and aunt’s meticulous hair‑care routines and maintains a strong sense of responsibility to give back to her neighborhood through mentoring and community service.
attributes:
  skills: '[''Hair cutting'', ''Hair styling'', ''Braiding and weaving'', ''Makeup application'', ''Basic skincare'', ''Client consultation'', ''Sanitation and hygiene'', ''Inventory management'', ''Appointment
