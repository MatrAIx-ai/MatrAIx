  hobbies: '[''Hair styling practice on mannequins'', ''Makeup experimentation'', ''Reading beauty/fashion magazines'', ''Knitting'', ''R&B and soul music listening'', ''Gardening'', ''Journaling'', ''Watching
    documentaries on Black culture and entrepreneurship'']'
  career_goals: Kennedy aims to obtain a Georgia cosmetology license within the next year, expand her skill set to include advanced color techniques and specialized care for curly and natural hair textures,
    and build a loyal client base in her community. Long‑term, she envisions opening a modest boutique salon in Lithonia that offers affordable, high‑quality services and provides a supportive space for
    young women seeking confidence through personal appearance. She also hopes to mentor local teenagers by offering workshops on grooming, self‑esteem, and entrepreneurship.
