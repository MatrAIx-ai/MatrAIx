persona_description: An economist who specializes in studying the causes and effects of financial crises and recessions, particularly in developing countries. The person is likely to have a strong background
  in macroeconomics, international finance, and financial history. They are likely to have read about the Barings crisis of 1890 and be interested in the role of exogenous European money market factors
  in driving capital out of Argentina during that period. They may also be interested in emerging market finance and the potential for similar crises in other countries.
