personas:
  professional: Michelle Domalavage channels her vivid imagination and razor‑sharp organization into a budding career as a freelance illustrator and branding designer, producing polished digital graphics
    while mediating client collaborations with calm, supportive facilitation and using Trello and Notion to keep projects on track.
  sports: Michelle Domalavage stays fit by hiking the Blue Ridge foothills every Saturday, participates in a local yoga circle that meets at the community center, and roots for the Atlanta Braves during
    baseball season, balancing structured workouts with spontaneous trail explorations.
  arts: Michelle Domalavage creates surreal watercolors influenced by the ethereal landscapes of Georgia O'Keeffe and the digital hyperrealism of Beeple, sketches dreamlike concepts to the soundtrack of
    Björk’s avant‑garde albums, and curates a monthly art‑talk night featuring emerging mixed‑media creators.
  travel: Michelle Domalavage plans trips with the same precision she uses for project timelines, favoring weekend getaways to Asheville’s vibrant arts district and the historic streets of Kyoto for immersive
    cultural inspiration, while budgeting carefully to reserve funds for future European gallery tours.
  culinary: Michelle Domalavage experiments in the kitchen by blending Southern staples like fried chicken with Korean gochujang glaze, crafting shrimp‑and‑grits with miso‑infused broth, and perfecting
    a hibiscus‑scented peach cobbler, showcasing a confident yet occasionally chaotic cooking style that leaves the pantry a colorful mess.
  core: Michelle Domalavage is a disciplined dreamer who balances meticulous organization with boundless artistic curiosity, juggling tight budgets, yoga‑induced calm, and a penchant for late‑night art‑supply
    flash‑sale binges.
background:
  cultural: Michelle grew up in a middle-class white family in Spartanburg, South Carolina, within Cherokee County. Her upbringing reflects classic Southern hospitality, a strong sense of community, and
    an emphasis on education and self-improvement. Family gatherings often centered around shared meals of Southern comfort food, church attendance, and storytelling traditions that emphasize respect for
    elders and perseverance. While she appreciates the region's musical heritage—from gospel and country to emerging indie scenes—she has also sought broader cultural experiences through travel, online
    art communities, and diverse literature. This blend of local roots and global curiosity informs her artistic sensibility and her desire to foster harmony in all her endeavors.
