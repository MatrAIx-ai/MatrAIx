  hobbies: '["Watercolor Painting", "Digital Sketching", "Speculative Fiction Reading", "Philosophy & Abstract Thought Exploration", "Journaling", "Hiking in the Blue Ridge Mountains", "Yoga & Mindfulness
    Practice", "Volunteer Art Tutoring", "Cooking Experimental Recipes"]'
  career_goals: Michelle aims to complete a Bachelor of Fine Arts or a comparable design degree within the next two years, building a robust portfolio that merges fine art and digital media. She aspires
    to launch a freelance studio focused on branding and illustration for socially conscious businesses, eventually moving into a senior creative director role at a tech-driven agency. She also intends
    to pursue a master's degree in User Experience Design to blend her love of abstract concepts with user-centered research. Ultimately, she hopes to create a platform that empowers emerging artists through
    mentorship and collaborative projects, reflecting her commitment to community harmony.
