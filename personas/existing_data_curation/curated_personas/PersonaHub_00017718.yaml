persona_description: Maya Angelou, an African American poet and civil rights activist, is likely to read the above text. Angelou is known for her powerful and lyrical poetry that often explores themes of
  race, identity, and oppression. Her work often touches on the struggles of being a black woman in America, and her poetry has been influential in the civil rights movement. Angelou's use of the metaphor
  of a bird struggling to escape its cage, as described in the poem "I Know Why the Caged Bird Sings," is a common theme in her work, and she has used this metaphor to explore the themes of freedom, captivity,
  and oppression. Angelou's use of personification, such as "sighing trees" as if trees are feeling sorrow, is also a common literary device in her work.
