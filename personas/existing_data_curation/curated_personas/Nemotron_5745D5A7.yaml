  hobbies: '[''Cooking Dominican cuisine'', ''Bachata and merengue dancing'', ''Gardening'', ''Hiking and nature walks'', ''Reading health and self‑improvement books'', ''Mindfulness meditation'', ''Volunteering
    at senior center'']'
  career_goals: Laurys aims to earn a Certified Nursing Assistant (CNA) credential within the next year, followed by an Associate’s Degree in Nursing (ADN) to become a registered nurse. She aspires to move
    into a supervisory role as a Lead Home Health Aide, eventually managing a team of caregivers in the Berks County area. She also dreams of establishing her own culturally-sensitive personal care service
    that integrates Dominican holistic health traditions with evidence‑based practices. Her competitive drive pushes her to achieve measurable improvements in client satisfaction scores and to develop a
    training program for new aides.
