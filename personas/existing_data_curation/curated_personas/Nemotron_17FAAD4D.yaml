  hobbies: '["Gardening", "Cooking", "Hiking", "Community church participation", "R&B/Jazz music listening", "Crocheting", "Reading mystery novels", "Volunteering at food pantry", "Exploring farmers markets",
    "Casual video gaming"]'
  career_goals: Jessielee aims to advance to a shift supervisor or lead packer role within the next two years, seeking certification as a forklift operator and completing a safety‑leadership training program.
    She plans to deepen her knowledge of lean packaging techniques and eventually transition into a logistics coordination or warehouse management position. Continuing education, such as obtaining a GED
    or vocational courses, is also part of her long‑term goal to broaden career opportunities and achieve greater financial stability.
