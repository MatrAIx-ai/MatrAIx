personas:
  professional: Jose Hernandeznava is a multidisciplinary visual artist and educator who blends acrylic painting, mixed-media sculpture, and digital illustration with community-focused program design, steering
    the creation of a free arts hub in Jayuya while leveraging grant-writing expertise and a calm, resilient mindset to guide youth mentors and public art collaborations.
  sports: Jose Hernandeznava hikes the rugged ridges of Jayuya with the local Jayuya Trailblazers club, follows the Cangrejeros de Santurce baseball team and the Puerto Rico Islanders soccer squad, and
    caps off active weekends with a yoga session at the community center, blending a love of nature with team spirit.
  arts: Jose Hernandeznava immerses themselves in creating Caribbean-inspired abstract paintings, draws inspiration from Wifredo Lam, Frida Kahlo, and Puerto Rican muralist Rafael Tobón, curates community
    installations, mentors emerging artists, and regularly attends the Festival de las Artes in San Juan, where they adore performances by musicians like Gilberto Santa Rosa.
  travel: Jose Hernandeznava favors spontaneous weekend getaways to mountainous towns such as Constanza in the Dominican Republic and historic sites like Granada, Spain, while planning annual cultural immersions
    to Cartagena, Colombia, balancing modest travel budgets with a curiosity for colonial architecture and Caribbean folklore.
  culinary: Jose Hernandeznava enjoys cooking Dominican sancocho infused with Puerto Rican sofrito, mastering mofongo with plantain crust and cilantro-lime seasoning, and perfecting a side of tostones,
    all while skillfully juggling a cast-iron skillet and a vintage turntable that spins bachata classics.
  core: Jose Hernandeznava blends boundless imagination with disciplined community activism, habitually shows up early for workshops, collects vintage camera lenses, and occasionally forgets to water the
    succulents they keep on their studio windowsill.
background:
  cultural: Jose’s cultural background blends Dominican roots with his life in Puerto Rico’s mountain community. Raised in a bilingual household, he grew up celebrating Dominican festivals such as Día de
    la Altagracia and the vibrant music of merengue and bachata, while embracing Puerto Rican traditions like the Fiestas de San Sebastián and the island’s Taino heritage. This dual identity informs his
    art, which often fuses Dominican motifs and Puerto Rican symbols, and his commitment to fostering cross-cultural dialogue through community projects.
