  career_goals: Ngoc‑chan aims to move into a regional operations manager role within the next three years, leveraging his PMP certification and a Six Sigma Black Belt to drive sustainable, energy‑efficient
    mechanical installations. He plans to launch a consulting practice that advises construction firms on green‑building standards, and to establish a nonprofit apprenticeship program that offers hands‑on
    training and mentorship to under‑represented youth in Prince William County. He also seeks to be recognized as a thought leader in safety culture and community outreach within the trade industry.
