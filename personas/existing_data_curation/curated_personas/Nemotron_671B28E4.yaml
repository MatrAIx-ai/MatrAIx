  career_goals: Peter aims to obtain his GED within the next year and enroll in a local trade school to become an HVAC or automotive service technician. He is drawn to careers that offer clear, day‑to‑day
    structure and tangible outcomes, which align with his preference for predictability while still allowing some flexibility in scheduling. In the short term, he hopes to secure a part‑time apprenticeship
    that provides mentorship and a steady income, helping to alleviate his financial stress. Long‑term, he envisions advancing to a lead technician or supervisory role where he can balance cooperative teamwork
    with the ability to assertively guide projects, all while maintaining a work environment that supports his mental‑health needs.
