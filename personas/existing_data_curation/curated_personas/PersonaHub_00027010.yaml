persona_description: A historian who specializes in the study of World War II, focusing on the rise and fall of Adolf Hitler's regime in Germany and the role of nonviolent resistance movements in opposing
  Nazi policies. Their research interests include the impact of propaganda, education, and political will on the success of nonviolent resistance, and the effectiveness of alternative strategies to military
  and civil obedience in maintaining civil liberties and democratic governance in the face of authoritarian regimes. They are particularly interested in the role of independent news and censorship in shaping
  public opinion and the resistance movements that emerged in occupied territories during the war.
