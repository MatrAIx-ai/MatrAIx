  hobbies: '[''visiting art museums'', ''watercolor painting'', ''knitting and quilting'', ''community gardening'', ''crossword and Sudoku puzzles'', ''experimenting with international cooking'', ''attending
    docent-led tours'', ''reading art books'']'
  career_goals: Despite being 60, Anna remains ambitious about her professional future. She aims to transition from a floor-level stocker to a senior inventory coordinator or shift supervisor, leveraging
    her expertise to oversee stockroom operations across multiple store locations. Anna plans to obtain a supply‑chain certification through a community college program to formalize her knowledge, which
    would also position her for training or consulting roles. She is also exploring the possibility of launching a small side business selling curated vintage décor items online, merging her keen eye for
    product presentation with her love of art. Long‑term, Anna's goal is to secure a stable, less physically demanding role that reduces stress while providing enough income to support her retirement savings
    and occasional art‑related pursuits.
