personas:
  professional: John Gibson merges their doctorate‑level STEM expertise with their role as a Brooklyn pastor, crafting data‑driven sermons that blend scientific insights, improvisational jazz phrasing,
    and vivid street‑art imagery while navigating a spontaneous schedule that often sidesteps formal planning.
  sports: John Gibson plays pick‑up basketball on Brooklyn courts, cheers for the New York Knicks and Brooklyn Nets, and participates in weekend 5k runs organized by their church’s youth group, balancing
    a competitive spirit with community camaraderie.
  arts: John Gibson frequents Brooklyn’s mural corridors, galleries such as the Brooklyn Museum, and live jazz venues like Bar Lunàtico, where they play saxophone alongside local musicians, drawing inspiration
    from muralists like Futura, musicians like Kamasi Washington, and poets such as Langston Hughes.
  travel: John Gibson enjoys weekend getaways to the Hudson Valley for hiking, has visited Montreal’s vibrant music scene, and dreams of a pilgrimage to Jerusalem, yet travel plans are often constrained
    by church duties and budget considerations.
  culinary: John Gibson loves cooking eclectic dishes like shrimp étouffée with quinoa, beet and kale salads dressed with miso‑ginger vinaigrette, and savors a perfectly brewed pour‑over from Stumptown,
    while regularly grabbing a slice of classic New York pizza after evening rehearsals.
  core: John Gibson is a curiosity‑driven pastor‑scientist who improvises sermons like jazz solos, juggles spontaneous plans, and channels artistic energy into community service, even as they wrestle with
    occasional disorganization and financial splurges.
background:
  cultural: John Jerrell Gibson grew up in Brooklyn’s historically Black neighborhoods, immersed in the rich traditions of the African-American church that blend gospel music, spirited preaching, and a
    strong emphasis on community activism. His family traces its roots to the Southern United States, where stories of the Great Migration and the civil‑rights struggle shaped his sense of identity and
    resilience. The multicultural tapestry of Kings County—home to Caribbean, Latinx, and immigrant communities—exposed him to diverse artistic expressions, from reggae rhythms to spoken‑word poetry, which
    he now weaves into his ministry. He celebrates Juneteenth, Black History Month, and Caribbean festivals, and his cultural competency reflects an awareness of systemic inequities that informs his social‑justice‑focused
    preaching. This blend of Black heritage, urban Brooklyn life, and a progressive theological outlook fuels his commitment to bridge faith, science, and art in service of his congregation and the broader
    community.
