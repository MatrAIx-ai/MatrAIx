    music performances (jazz, hip-hop)'', ''Exploring new coffee shops and craft breweries'', ''Reading speculative fiction and theological works'']'
  career_goals: John Jerrell Gibson aspires to become a nationally recognized thought leader who bridges faith and science, using his STEM background to foster dialogue between religious communities and
    the scientific world. He aims to develop an innovative urban ministry model that integrates STEM mentorship for Brooklyn youth, establishing a nonprofit that offers after-school robotics workshops alongside
    spiritual guidance. In his own congregation, he seeks to expand its impact through multimedia worship experiences and culturally resonant art programming, eventually stepping into a senior pastor role
    at a historic Black church where he can mentor emerging clergy. He also plans to author a book that explores the intersection of theology, technology, and social justice, positioning himself as a competitive
    voice in contemporary religious discourse.
