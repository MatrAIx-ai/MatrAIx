    ''Team leadership and shift scheduling'', ''Knowledge of sports betting odds and pricing'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Classic car restoration'', ''Woodworking'', ''Poker night'', ''Chess'', ''Fantasy football'', ''Model ship building'', ''Reading historical non-fiction'', ''Volunteering
    at local fire department'']'
  career_goals: Michael aims to advance from his current floor-level role to a casino operations manager position within the next five years, overseeing multiple gaming areas and leading compliance initiatives.
    His long-term ambition is to become a regional director of gaming services, where he can shape policy, mentor staff, and implement systematic improvements across several properties. He is also exploring
    the possibility of launching a consulting firm that advises small-to-mid-size gaming establishments on regulatory compliance, risk management, and technology integration, providing a stable and predictable
    career path for his family while satisfying his competitive drive for professional recognition.
