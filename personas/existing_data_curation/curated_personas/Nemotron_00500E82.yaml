  career_goals: Hilda aims to transition into a mentorship and education role within her hospital, becoming a preceptor for new nurses and eventually an adjunct instructor at a local community college.
    She is passionate about integrating art‑based interventions into standard nursing care, and hopes to launch a pilot program that uses visual arts and music therapy to reduce patient anxiety in the oncology
    unit. Recognizing her love for lifelong learning, she plans to pursue a master's degree in nursing education while maintaining a flexible, part‑time schedule that balances her professional responsibilities
    with family and personal pursuits. Hilda also aspires to champion staff wellness initiatives, such as mindfulness workshops and peer‑support groups, to address the emotional strain she has experienced
    throughout her career.
