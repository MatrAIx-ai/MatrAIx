personas:
  professional: Hilda Belida, a seasoned registered nurse with expertise in acute patient assessment, IV therapy, wound care, and electronic health records, channels their curiosity and spontaneous, art‑infused
    mindset into creative patient education and mentorship, while often wrestling with organization of deadlines.
  sports: Hilda Belida stays active by hiking the trails of Great Falls Park, participates in the senior‑friendly DC Trail Walkers club, enjoys seasonal tai‑chi sessions at the community center, and they
    cheer on the Washington Capitals, Washington Wizards, and D.C. United while occasionally joining a friendly pickleball league on weekends.
  arts: Hilda Belida blends their love for watercolor with an admiration for Monet’s seasonal palettes, attends community theater productions of August Wilson’s plays, revels in the melodies of Yo‑Yo Ma’s
    cello suites, and they find inspiration in the storytelling of author Ken Follett and biographer Walter Isaacson, all of which fuel their art‑therapy approach to nursing.
  travel: Hilda Belida prefers relaxed, culturally immersive trips— they’ve explored the Prado Museum in Madrid, the tranquil gardens of Kyoto, and frequently escape to historic Alexandria, Virginia for
    weekend strolls, while they plan a future pilgrimage to Puebla, Mexico to practice their budding Spanish, all balanced against a modest travel budget and part‑time work commitments.
  culinary: Hilda Belida, an enthusiastic home chef, loves experimenting with fusion dishes like paella‑style jambalaya and miso‑glazed salmon, often incorporates fresh rosemary, smoked paprika, and locally
    sourced heirloom tomatoes, and they delight in sharing these meals at potlucks while occasionally over‑seasoning in their quest for bold flavors.
  core: Hilda Belida is a curious, art‑driven nurse who transforms patient care with watercolor‑inspired empathy, yet they’re habitually forgetful about appointments, over‑book museum visits, and quietly
    worry about every detail while finding solace in the gentle hum of their camera shutter.
background:
  cultural: Hilda is a White American with Irish and German ancestry, raised in a suburban community near Washington, D.C. She grew up celebrating traditional American holidays such as Thanksgiving, Fourth
    of July, and Christmas, while also honoring her family's Irish customs, like St. Patrick's Day gatherings and folk music sessions. Living in Fairfax County, a highly diverse region, she has developed
    a deep respect for multicultural perspectives, which she brings into her nursing practice. Hilda is an active member of her local church and participates in volunteer programs that serve both longtime
    residents and newcomers from varied cultural backgrounds. Her upbringing emphasized community service, modesty, and the value of lifelong learning, shaping her compassionate approach to both her professional
    and personal life.
