persona_description: A historian who is interested in the political and constitutional aspects of the United States, particularly the origins and development of the Constitution. They are knowledgeable
  about the Articles of Confederation, the weaknesses of the system, and the efforts to create a more powerful and independent national government. They are also interested in the compromise between the
  states and the federal government, the division of powers among the branches of government, and the role of the Electoral College and the judicial branch in the system. They are likely to be knowledgeable
  about the history of the United States, the political landscape of the time, and the debates and discussions surrounding the creation of the Constitution.
