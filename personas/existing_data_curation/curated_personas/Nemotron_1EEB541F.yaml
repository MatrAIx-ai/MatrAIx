personas:
  professional: Cody Watt is a civil engineer who blends structural analysis expertise, BIM curiosity, and storytelling flair to keep multidisciplinary teams aligned while occasionally letting project timelines
    slip due to a relaxed approach to scheduling.
  sports: Cody Watt hits the trails for weekend mountain‑bike rides with the Kanawha River Bike Club, splashes the paddles on the New River Gorge in summer, joins a local pickup softball league, and cheers
    on the West Virginia Mountaineers football team every fall, treating each activity as both social bonding and personal fitness.
  arts: Cody Watt weaves storytelling into their acoustic guitar jams at town coffee houses, covering Bob Dylan, Gillian Welch, and the Avett Brothers, while also attending community theater performances
    of Appalachian narratives and keeping a vinyl collection of Brandi Carlile and Jason Isbell for nightly listening.
  travel: Cody Watt favors spontaneous weekend road trips to nearby gems like Asheville’s Blue Ridge Parkway and Shenandoah National Park, but dreams of a longer trek through Patagonia’s Torres del Paine,
    balancing limited savings with a knack for finding discount campgrounds and last‑minute train deals.
  culinary: Cody Watt, a competent home cook, often grills smoked pork shoulder with a dry rub of paprika and brown sugar, tops it off with homemade apple butter, pairs it with locally foraged ramps and
    buttermilk biscuits, and enjoys a cold brew coffee after a river‑caught trout dinner.
  core: Cody Watt is a community‑focused civil engineer who juggles bridge projects and mountain‑bike rides, strums folk songs at local jam sessions, and habitually lets paperwork pile up, trusting that
    a flexible, story‑driven mindset will always pull things together.
background:
  cultural: Cody grew up in a small, close‑knit community in Fayette County, steeped in Appalachian traditions. His family’s roots trace back several generations of coal‑mining and farming families, and
    he was raised with a strong sense of self‑reliance, hospitality, and respect for the land. The region’s Protestant (Baptist) heritage and frequent church‑centered events shaped his values around community
    service and modesty. Exposure to local folk music, storytelling, and regional cuisine fostered his appreciation for cultural preservation, which he carries into his professional life by advocating for
    infrastructure projects that honor the area’s history and environment.
