  hobbies: '[''Hiking in the Appalachian foothills'', ''Mountain biking on local trails'', ''Kayaking on the Kanawha River'', ''Playing acoustic guitar at community jam sessions'', ''Volunteering with the
    Rainelle historical society'', ''Participating in local folk festivals'', ''Attending community barbecues'', ''Playing pickup softball'']'
  career_goals: Cody aims to earn his Professional Engineer (PE) license within the next two years and move into senior project management, overseeing larger regional infrastructure projects such as bridge
    replacements and flood‑mitigation works. He wants to integrate green infrastructure practices and smart‑city technologies into his designs, positioning himself as a go‑to engineer for sustainable public
    works in Appalachia. In the longer term, he envisions founding a boutique consulting firm that blends engineering solutions with community‑focused planning, helping rural towns improve connectivity
    while preserving local heritage.
