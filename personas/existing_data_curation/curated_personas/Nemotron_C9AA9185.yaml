  career_goals: Bianca aims to complete her associate's degree in construction management within the next two years, followed by obtaining an OSHA 30-hour certification and NCCER credentials. In the short
    term, she seeks promotion to crew lead or foreman, where she can apply her organizational strengths and foster a collaborative, safety-first culture on site. Long-term, she envisions running her own
    small residential contracting firm that specializes in energy-efficient, eco-friendly homes, leveraging the latest building technologies while keeping projects grounded in practicality and cost-effectiveness.
