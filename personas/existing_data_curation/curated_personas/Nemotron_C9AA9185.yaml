personas:
  professional: Bianca Szymkowiak, a 22‑year‑old on‑site construction laborer with solid framing and concrete mixing skills, combines a pragmatic safety‑first mindset with a curious drive to incorporate
    sustainable building methods as they work toward a crew‑lead role.
  sports: Bianca Szymkowiak, a 22‑year‑old outdoor enthusiast, enjoys hiking the trails of Oak Point Park with the local McKinney Trail Club, follows the Dallas Cowboys and Dallas Stars, and fits in solo
    weekend runs to stay fit, preferring low‑key, solitary workouts over team sports as they value quiet physical release.
  arts: Bianca Szymkowiak, a 22‑year‑old creative mind, spends quiet evenings sketching floor plans, draws inspiration from Frank Lloyd Wright and Ansel Adams, listens to indie folk artist Bon Iver, and
    occasionally watches Greta Gerwig films, letting artistic exposure shape sustainable design ideas as they unwind alone.
  travel: Bianca Szymkowiak, a 22‑year‑old road‑trip planner, favors low‑stress getaways to the Texas Hill Country vineyards, the Colorado Rockies, and the historic market square of a Central European city
    visited with grandparents, plans each outing with a spreadsheet and modest budget, and dreams of an eco‑tourism retreat in Scandinavian villages as they balance adventure with financial prudence.
  culinary: Bianca Szymkowiak, a 22‑year‑old kitchen hobbyist, enjoys cooking rustic meals such as roasted root vegetables and hand‑made pierogi learned from grandparents, often forages fresh herbs at the
    local farmer’s market, experiments with low‑VOC finishes on DIY woodworking projects, and occasionally indulges in sourdough baking, blending tradition with sustainable practice as they savor quiet
    kitchen moments.
  core: Bianca Szymkowiak, a 22‑year‑old solitary, detail‑oriented builder, balances curiosity for sustainable design with a pragmatic, safety‑first work ethic, often losing themselves in plans, tools,
    and quiet hikes as they navigate both tradition and innovation.
background:
  cultural: Bianca comes from a Polish-American family that settled in Texas generations ago. While she was raised in the predominantly Anglo-American culture of McKinney, she grew up with Polish traditions
    such as celebrating Wigilia on Christmas Eve and learning a few phrases of Polish from her grandparents. Her family practices Catholicism, which influences holidays and values of community and modesty.
    The Texan environment contributes a strong work ethic, respect for independence, and hospitality, shaping her pragmatic yet open-minded outlook. She blends these cultural threads by valuing both tradition
    and innovation in her personal and professional life.
