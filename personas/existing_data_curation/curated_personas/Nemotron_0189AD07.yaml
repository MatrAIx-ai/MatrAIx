  career_goals: Jason dreams of a future where he can combine his love for the outdoors with scientific curiosity. He hopes to become a marine biologist studying the tide‑pools and salmon runs of the Pacific
    Northwest, or an environmental engineer designing sustainable community projects. To reach these goals, he aims to excel in science classes, join the school’s robotics and ecology clubs, and develop
    his leadership skills by taking on more responsibilities in group activities.
