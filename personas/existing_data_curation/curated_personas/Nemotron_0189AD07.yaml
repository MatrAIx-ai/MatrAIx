personas:
  professional: Jason Philips, a budding young engineer and game designer, channels their curiosity and practicality into building intricate LEGO constructions and scripting simple Scratch animations, demonstrating
    an early blend of mechanical intuition and digital storytelling that hints at future tech pursuits.
  sports: Jason Philips plays forward for the River Valley Rangers U11 soccer team, attends twice‑weekly drills, cycles the family’s mountain‑bike trails, explores tide‑pools at Seacliff Beach on weekends,
    and cheers for the hometown baseball club, the Coastal Mariners, while idolizing soccer star Lionel Messi and the local high‑school basketball team the Eagles.
  arts: Jason Philips showcases their rhythmic talent on a small drum at school talent shows, grooves to The Wiggles’ 'Fruit Salad' and the cinematic scores of Star Wars, curates LEGO masterpieces inspired
    by designer Nathan Sawaya, devours adventure novels like Rick Riordan’s 'Percy Jackson' series, and creates animated stories on Scratch, blending hands‑on building with digital creativity.
  travel: Jason Philips loves day‑long expeditions to Pinewood Forest’s hidden trailheads, tide‑pool forays at Seacliff, and weekend bike rides along the riverbank, plans their outings with hand‑drawn maps,
    dreams of visiting Yellowstone National Park and the Great Barrier Reef, and balances spontaneous exploration with their parents’ practical travel guidelines.
  culinary: Jason Philips enjoys classic kid‑friendly fare such as pepperoni pizza, cheesy mac & cheese, and chicken nuggets, delights in crafting peanut‑butter‑jelly sandwiches and fruit kebabs with strawberries
    and grapes, brings homemade mini meatballs to the community potluck, and occasionally sneaks an extra cookie from the dessert tray, showcasing both simple cooking skills and a love for tasty experimentation.
  core: Jason Philips, a 10‑year‑old soccer‑loving LEGO builder with a curious yet practical mind, balances energetic group play with occasional impulsive splurges and a habit of forgetting their inhaler.
background:
  cultural: 'Jason grew up in a multi‑generational white family that settled in the Pacific Northwest from the Midwest. His household reflects typical small‑town American values: a strong emphasis on community,
    respect for hard work, and an appreciation for the natural surroundings of Grays Harbor County. Family traditions include celebrating holidays like Thanksgiving and the Fourth of July with community
    gatherings, while local school events and outdoor recreational activities shape his social experiences. He is also taught to respect the region’s Native American heritage and the environmental stewardship
    that is part of the local culture.'
