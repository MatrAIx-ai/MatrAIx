  career_goals: Carla aims to transform her passion for learning into a part‑time role as a science‑communication specialist, creating multimedia content that makes complex topics accessible to a broader
    audience. She envisions launching a community hub in Saint George that blends a makerspace with an art gallery, serving as a platform for interdisciplinary collaboration. Over the next few years, she
    hopes to publish a series of illustrated articles on emerging technologies, mentor local youth in coding and digital art, and develop a modest online boutique for her own digital prints and photography.
    While she values flexibility, she is driven to leave a tangible legacy that nurtures curiosity and creativity in her community.
