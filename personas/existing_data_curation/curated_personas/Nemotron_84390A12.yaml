personas:
  professional: Carla Berezuk leverages a computer science background and a keen eye for visual storytelling to create multimedia science‑communication pieces for research institutes and community workshops,
    applying their analytical rigor and competitive edge while often embracing flexible, last‑minute deadlines that reflect a relaxed, occasionally disorganized approach to project planning.
  sports: Carla Berezuk tackles weekend treks through the red‑rock canyons with the St. George Trailblazers Hiking Society, cheers the Utah Jazz on basketball nights and Real Salt Lake on soccer Sundays,
    and treats competitive chess tournaments as a mental sport, reflecting that they thrive on both physical endurance and strategic challenge.
  arts: Carla Berezuk frequents the Tuacahn Center for the Arts and the Red Cliffs Museum, draws inspiration from digital visionaries like Refik Anadol and avant‑garde painters such as Yayoi Kusama, and
    they curate their own gallery‑style displays of speculative sci‑art, illustrating how a critical eye and competitive drive push creative boundaries.
  travel: Carla Berezuk prefers spontaneous road trips across Utah’s national parks—especially Zion and Bryce—while also dreaming of a technophile pilgrimage to Tokyo’s Akihabara district and a cultural
    retreat in the Scottish Highlands, and they balance a flexible planning style with a relentless hunger for novel experiences.
  culinary: Carla Berezuk delights in roasting cauliflower steaks glazed with tahini, experimenting with pomegranate‑glazed lamb, and savoring a meticulously pulled espresso at Café Moka, yet they often
    abandon the kitchen mid‑recipe to edit a photo or patch a code bug, leaving many culinary experiments unfinished.
  core: Carla Berezuk is a restless 50‑year‑old technophile who blends scientific rigor with abstract digital art, habitually swaps deadlines for a late‑night hike, and they can’t resist buying a new tablet
    every time a tech trend peaks, even if the previous one still works.
background:
  cultural: Carla grew up in a mid‑western family of German‑Polish descent before moving to Utah in her early twenties for college. While her upbringing emphasized self‑reliance and a pragmatic work ethic,
    her long residence in Saint George exposed her to a tightly knit community with strong ties to local traditions and outdoor recreation. She balances respect for the region’s cultural heritage—such as
    seasonal festivals and community service—with a personal affinity for progressive ideas in art and technology. Her white ethnic background and marriage have rooted her in the area's social fabric, yet
    her educational and artistic pursuits keep her perspective globally oriented and open to unconventional thinking.
