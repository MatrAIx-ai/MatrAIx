  career_goals: Michael aims to transition from a senior technologist role into an engineering manager position where he can lead larger, interdisciplinary projects focused on sustainable manufacturing.
    He plans to achieve a Six Sigma Black Belt and pursue a Professional Engineer (PE) license to broaden his credibility. Long‑term, he envisions founding a consultancy that helps mid‑size factories in
    New England adopt energy‑efficient automation while mentoring junior engineers and technologists. His ambition balances a desire for innovation with a pragmatic commitment to measurable results and
    organizational reliability.
