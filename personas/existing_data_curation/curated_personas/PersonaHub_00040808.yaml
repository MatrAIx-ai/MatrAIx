persona_description: A Navajo tribal member who has lived a nomadic life, learned silversmithing from Mexican settlers, and survived the forced relocation to a reservation. The individual has a deep understanding
  of Navajo culture, traditions, and language, and has adapted to the changing times while maintaining a connection to their heritage. The person has a strong sense of identity and pride in their heritage,
  and is committed to preserving and promoting Navajo culture for future generations. They have a wealth of knowledge about Navajo history, politics, and society, and are actively involved in efforts to
  educate others about their culture and heritage. The individual is also deeply committed to the protection and preservation of Navajo lands and resources, and is actively involved in efforts to protect
  and restore these important areas.
