personas:
  professional: Natalia McLeod, a 31‑year‑old library science specialist, merges meticulous cataloging expertise with a flair for creative programming, using their methodical project‑management skills and
    natural charisma to design interdisciplinary learning hubs that fuse visual arts, digital media, and community storytelling, and they consistently champion inclusive services.
  sports: Natalia McLeod hikes the Spokane River Trail almost every weekend, volunteers with the Spokane Outdoor Hikers Club for trail maintenance, and they passionately support the Spokane Indians Minor
    League Baseball team and the Seattle Seahawks during the football season.
  arts: Natalia McLeod, a watercolor enthusiast and poet, draws inspiration from Georgia O'Keeffe’s desert palettes and the experimental installations of Chiharu Shiota, and they regularly attend gallery
    openings featuring local artist Maya Thompson, while also contributing backstage as a stage manager to community theatre productions of classic plays by Tennessee Williams.
  travel: Natalia McLeod prefers meticulously planned weekend escapes that blend urban culture and nature, having explored Portland’s independent bookstores, trekked the rugged cliffs of Grand Teton National
    Park, and they dream of attending the Edinburgh International Book Festival to soak in literary heritage.
  culinary: Natalia McLeod delights in cooking Mediterranean‑inspired meals like roasted eggplant mezze and lemon‑herb quinoa, while also treating themselves to fresh sushi rolls with toro and a cup of
    single‑origin pour‑over coffee, though they occasionally over‑season sauces in the pursuit of bold flavor.
  core: Natalia McLeod is a creatively driven, hyper‑organized community catalyst who thrives on collaborative art, yet battles persistent worry that fuels meticulous planning and occasional over‑thinking.
background:
  cultural: Natalia identifies as a white American of Scottish‑Irish ancestry, raised in a small town in eastern Washington before moving to Spokane for college. Her family emphasized reading, music, and
    community service, fostering her love for libraries and the arts. She feels a deep connection to the Pacific Northwest's landscapes and cultural heritage, and actively incorporates local Indigenous
    history and contemporary tribal art into her library programming to honor the Spokane Tribe's contributions. Her upbringing blends mainstream American cultural norms with an appreciation for the region's
    diverse cultural tapestry.
attributes:
  skills: '["Information organization and cataloging (MARC, RDA)", "Digital resource curation and database management", "Instructional design and curriculum development", "Workshop facilitation and blended
    learning", "Public speaking and presentation", "Community outreach and partnership building", "Event planning and program evaluation", "Conflict resolution and collaborative facilitation", "Graphic
    design (Adobe Creative Suite)", "Basic web development and digital storytelling"]'
  hobbies: '["Watercolor painting", "Poetry and short‑story writing", "Reading speculative fiction and literary novels", "Attending local art gallery openings", "Volunteering with community theatre", "Hiking
    the Spokane River Trail and state parks", "Playing board games and trivia nights", "Yoga practice", "Photography (urban and natural scenes)"]'
  career_goals: Natalia aims to advance to a senior leadership role within the Spokane Public Library system, ultimately serving as Library Director or Head of Community Programs. She plans to earn a Master
    of Library and Information Science (MLIS) to deepen her expertise in emerging information services. Her ambition is to launch a city‑wide interdisciplinary learning hub that fuses visual arts, digital
    media, and humanities, offering makerspace workshops, artist residencies, and collaborative research projects. She also seeks to become a recognized speaker at national library and education conferences,
    contributing thought leadership on innovative, inclusive programming that bridges art and technology. Long‑term, she envisions authoring a guidebook on creative library outreach and mentoring emerging
    librarians.
