  career_goals: Jennifer aims to transition into a supervisory role within the next two years, leveraging her keen eye for detail and her competitive nature to improve workflow efficiency and reduce medication
    errors. She plans to obtain a Pharmacy Technician Specialist (PharmTech) certification and lead a small team of technicians, implementing standardized SOPs that reinforce the routine she values. Long‑term,
    she hopes to secure a part‑time position that offers a predictable schedule, allowing her to manage her anxiety while maintaining a stable income for retirement. She also seeks mentorship opportunities
    to pass her expertise to younger technicians, reinforcing a sense of personal achievement.
