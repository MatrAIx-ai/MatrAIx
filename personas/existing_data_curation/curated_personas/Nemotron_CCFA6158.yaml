  career_goals: Ellen hopes to become a master ASE‑certified technician within the next three years and to earn manufacturer‑specific certifications (e.g., Ford, GM). She aspires to take on a lead technician
    role where she can mentor newer mechanics, blending her love for social interaction with her practical expertise. Ultimately, she dreams of opening a community‑focused auto repair shop that emphasizes
    transparent communication, flexible scheduling, and a supportive workplace culture. She also envisions participating in local car‑club events and possibly teaching basic car‑maintenance workshops for
    neighborhood residents.
