personas:
  professional: Ellen Moss is a hands‑on automotive service technician who blends deep diagnostic expertise with a knack for translating complex engine issues into friendly conversation, often stepping
    into informal mentor roles while juggling multiple repair projects in a lively shop environment.
  sports: Ellen Moss enjoys seasonal hikes on the Missouri River Trail, belongs to a local running club that meets for Saturday morning jogs, catches St. Louis Cardinals baseball games on summer evenings,
    and practices yoga twice weekly to keep flexible for the physically demanding work at the garage.
  arts: Ellen Moss lights up improv theater nights with quick‑wit sketches, sings karaoke classics from Queen and Dolly Parton at local bars, and finds inspiration in the comedic stylings of Tina Fey and
    the storytelling of John Prine, which fuels their creative problem‑solving in the garage.
  travel: Ellen Moss prefers road‑trip adventures in a restored classic Mustang, charting weekend routes to the Ozark mountains, Detroit’s annual auto show, and the historic St. Louis County Fair, balancing
    the thrill of new scenery with a modest travel budget that leaves room for spare parts and fuel.
  culinary: Ellen Moss’s kitchen revolves around comfort dishes like slow‑cooked beef chili, maple‑glazed pork chops, and homemade apple pie, which they prepare for friends after a day at the shop, while
    occasionally experimenting with vegan black‑bean brownies to accommodate dietary preferences.
  core: Ellen Moss is a sociable, talkative auto‑tech who blends practical know‑how with curiosity, worries about future plans but thrives on community connections and the occasional DIY fix.
background:
  cultural: Ellen grew up in the Midwestern United States, where a blend of small‑town values, practicality, and community spirit shaped her outlook. Raised in a predominantly white, suburban environment
    in Missouri, she was taught the importance of hard work, modesty, and friendliness. Her family’s long‑standing interest in cars—her father was a mechanic—instilled an early appreciation for automotive
    work. While she identifies with mainstream American culture, she also participates in regional traditions such as county fairs, local festivals, and church gatherings, which reinforce her cooperative
    and harmony‑seeking nature. The cultural emphasis on flexibility and personal connections complements her sociable, people‑oriented personality.
