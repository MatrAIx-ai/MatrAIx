personas:
  professional: Ashtin Sherrod, a senior software quality assurance analyst in Chattanooga, designs rigorous test strategies using Selenium, Cypress, and Playwright, mentors junior engineers, and they channel
    a competitive, methodical mindset into accelerating reliable releases through CI/CD pipelines.
  sports: Ashtin Sherrod runs half‑marathons with the Lookout Mountain Trail Running Club, supports the Tennessee Titans and Chattanooga FC, dominates strategic board games like Twilight Struggle, and they
    channel that same competitive spirit into salsa dancing nights that double as a cardio workout.
  arts: Ashtin Sherrod creates abstract expressionist oil paintings inspired by Jackson Pollock, captures street moments à la Henri Cartier‑Bresson with a DSLR, curates a personal collection of works by
    Tame Impala’s visual team, and they regularly attend openings at the Chattanooga Art Museum and the annual Riverbend Arts Festival.
  travel: Ashtin Sherrod plans trips on a spreadsheet, enjoys weekend road trips to Asheville and New Orleans, dreams of exploring the art neighborhoods of Kyoto and Barcelona, and they balance a love for
    cultural immersion with a modest budget that still allows occasional splurges on boutique hotels.
  culinary: Ashtin Sherrod favors Southern comfort dishes like shrimp and grits and pimento cheese, experiments with Korean bibimbap and Mediterranean mezze, perfects an Ethiopian pour‑over coffee ritual,
    and they often host potluck dinners where friends sample both classic and avant‑garde flavors.
  core: Ashtin Sherrod fuses a data‑driven, competitive edge with a relentless curiosity for art and community, always juggling a sketchbook, a coffee cup, and a spreadsheet, and they turn every challenge
    into a creative puzzle.
background:
  cultural: Ashtin grew up in a close‑knit Black community in the American South, where family gatherings, soulful music, and storytelling were vital parts of daily life. Her upbringing blended Southern
    hospitality with rich African‑American cultural traditions, including church involvement, community service, and a strong emphasis on education as a pathway to empowerment. She carries forward this
    heritage by celebrating Juneteenth, cooking classic Southern dishes with a modern twist, and supporting local initiatives that amplify Black artists and technologists. Living in Chattanooga, she values
    the city’s burgeoning tech scene while staying rooted in her cultural identity, using her platform to advocate for greater diversity and inclusion within the tech industry.
attributes:
  skills: '[''Test planning and strategy'', ''Automated UI testing with Selenium, Cypress, and Playwright'', ''API testing with Postman and RestAssured'', ''Performance testing using JMeter'', ''Scripting
    in Python, JavaScript, and Java'', ''CI/CD integration with Jenkins and GitHub Actions'', ''Agile and Scrum methodology'', ''Defect tracking and root cause analysis'', ''Accessibility compliance testing
    (WCAG 2.1)'', ''Data‑driven testing and test matrix design'', ''Cross‑functional communication and stakeholder management'', ''Mentoring and coaching junior QA staff'']'
  hobbies: '[''Oil painting (abstract expressionism)'', ''Photography (street and nature)'', ''Salsa dancing'', ''Hosting a weekly speculative‑fiction book club'', ''Improv comedy workshops'', ''Strategy
    board games (Catan, Terraforming Mars)'', ''Running half‑marathons'', ''Mentorship for Black girls in STEM'', ''Participating in local hackathons'', ''Attending gallery openings and art festivals'']'
  career_goals: Ashtin aims to transition from senior QA analyst to QA lead within the next two years, overseeing a multidisciplinary testing team and shaping quality standards across the product lifecycle.
    Long‑term, she envisions becoming a QA architect, driving the adoption of AI‑assisted testing frameworks and championing inclusive, accessibility‑first development practices. She is also interested
    in launching a community‑focused mentorship program that empowers Black women and other underrepresented groups to pursue careers in software engineering and quality assurance. Ultimately, Ashtin wants
    to blend her competitive drive with her love for innovative problem‑solving to influence industry best practices and create products that are both reliable and socially responsible.
