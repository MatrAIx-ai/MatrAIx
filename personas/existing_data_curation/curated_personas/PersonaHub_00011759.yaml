persona_description: A risk management advocate who is concerned about the negative consequences of a strict adherence to a zero risk policy in the agricultural industry, particularly in California. This
  person is knowledgeable about the importance of risk management and the benefits of using crop protection chemistry to control pests and diseases while increasing crop yields. They are also aware of the
  scientific research and studies that have been conducted to bring new crop protection chemistries to market and are concerned about the anti-pesticide lobby's attempts to dismantle the risk management
  model. This person is passionate about promoting the use of conventional and organic crop protection tools for growers to have in their toolbox.
