  hobbies: '[''Car restoration'', ''Model kit building'', ''Fishing'', ''Gardening'', ''Listening to classic rock/country music'', ''Watching classic movies'', ''Playing video games with close friends'',
    ''Reading DIY/How‑to books'', ''Watching DIY YouTube channels'']'
  career_goals: Paul aims to secure a stable, routine‑driven job that offers predictable hours and clear expectations. Over the next year he plans to obtain his GED and enroll in a local apprenticeship—ideally
    in automotive technology, HVAC, or general maintenance. His short‑term goal is to become a qualified service technician or maintenance worker for a small business in Monroe, providing reliable income
    and a structured work environment. Long‑term, he hopes to advance to a senior technician or foreman role, where he can mentor others while maintaining a steady work routine and supporting his family
    in the future.
