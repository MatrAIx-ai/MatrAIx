  hobbies: '[''Country line dancing'', ''Salsa dancing'', ''Recreational softball'', ''Volunteering with Habitat for Humanity'', ''DIY home improvement projects'', ''Exploring Houston’s food scene'', ''Gardening'',
    ''Attending music festivals and outdoor concerts'']'
  career_goals: Ursula aims to move from laborer to crew foreman within the next three to five years, seeking a leadership role where she can mentor new workers and ensure safety standards are upheld. She
    plans to earn an NCCER certification and a journeyman-level trade credential to strengthen her technical knowledge. Long‑term, Ursula dreams of starting a modest family‑run construction business focused
    on residential remodeling and energy‑efficient upgrades, allowing her to combine her curiosity about sustainable building practices with her love for hands‑on work while maintaining a flexible schedule
    for her husband and future children.
