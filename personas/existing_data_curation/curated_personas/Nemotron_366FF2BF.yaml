personas:
  professional: Felix Maddix, a seasoned wholesale manufacturing sales strategist, leverages two decades of consultative selling, data‑driven market forecasting, and cross‑cultural communication while infusing
    their artistic curiosity into client presentations and sustainable‑technology pitches, balancing meticulous pipeline management with spontaneous creative problem‑solving.
  sports: Felix Maddix, an avid hiker who trails the Ocala National Forest and joins a Saturday morning running group at Lake Eola, follows the Orlando Magic in the NBA and cheers for Orlando City SC during
    the soccer season, balances cardio with weekend improv‑driven yoga sessions, and they use a fitness tracker to log mileage, though they occasionally forgo workouts after a demanding sales quarter.
  arts: Felix Maddix nurtures their artistic side by sketching murals during visits to the Orlando Museum of Art, playing saxophone in a weekend jazz‑funk jam group that covers John Coltrane and Parliament‑Funkadelic,
    curating a collection of vintage vinyl, and regularly attending performances by the local theater troupe The Orlando Repertory, which fuels their imaginative approach to business presentations.
  travel: Felix Maddix plans their trips with a blend of meticulous itinerary mapping—such as a week‑long culinary tour of Kyoto’s Nishiki Market—and spontaneous detours, evidenced by last‑minute jazz festivals
    in New Orleans, and they aspire to explore the vibrant souks of Marrakech and the geothermal pools of Reykjavik, balancing limited vacation days with a drive to sample local cuisines and capture street
    art.
  culinary: Felix Maddix, a moderately skilled home cook with a penchant for experimental recipes, frequently prepares spiced shrimp jambalaya seasoned with Andouille sausage and Cajun paprika, experiments
    with miso‑glazed black cod using fermented soybeans, seeks out farm‑to‑table dishes featuring heirloom tomatoes and basil, while their love for vintage vinyl often pairs with late‑night dining at jazz‑themed
    restaurants where they order bourbon‑glazed pork belly.
  core: Felix Maddix merges a sales executive’s data‑driven mindset with a saxophonist’s improvisational spirit, habitually sketching murals during conference breaks, occasionally overindulging in salty
    cheese after gigs, and they relentlessly chase the next green‑tech opportunity while never missing a season of jazz vinyl.
background:
  cultural: Felix is an African American who grew up in the culturally diverse suburbs of Orlando, Florida. His family migrated from the rural South in the 1970s, bringing a strong work ethic, storytelling
    traditions, and a love for gospel music and soul food. Immersed in a vibrant Black community, he participated in church choirs, community festivals, and local mentorship programs that emphasized resilience
    and collective uplift. These experiences fostered his appreciation for both heritage and the multicultural tapestry of Central Florida. Felix maintains ties with the African-American Chamber of Commerce
    and often volunteers at community arts initiatives, where he blends his cultural roots with a modern, open-minded outlook on creativity and entrepreneurship.
attributes:
  skills: '["Consultative selling", "Key account management", "Contract negotiation", "Market research and analysis", "CRM software (Salesforce, HubSpot)", "Presentation design (PowerPoint, Canva)", "Public
