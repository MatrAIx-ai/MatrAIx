    "Digital marketing basics", "Team collaboration"]'
  hobbies: '["Visiting contemporary art galleries and museums", "Sketching urban scenes and portrait studies", "Listening to jazz and funk vinyl collections", "Playing the saxophone", "Reading about emerging
    technologies and design innovations", "Traveling to explore different cultures and cuisines", "Hiking in Florida''s state parks and nature preserves", "Cooking experimental fusion dishes", "Participating
    in local improv comedy workshops", "Mentoring aspiring sales professionals through community programs"]'
  career_goals: Felix aims to move into a regional sales leadership role within the next three to five years, overseeing a multi-state team of representatives and shaping sales strategy for sustainable
    manufacturing solutions. He plans to complete his bachelor's degree in Business Administration, followed by an executive MBA focused on innovation management. Felix wants to become a recognized thought
    leader in the industry by speaking at conferences, publishing whitepapers on green supply-chain practices, and mentoring junior sales staff through the local African-American Chamber of Commerce. Long-term,
    he envisions launching his own consultancy that helps midsize manufacturers integrate creative design thinking with efficient sales processes, bridging his love of art and business.
