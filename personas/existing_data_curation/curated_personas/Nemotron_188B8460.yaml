personas:
  professional: Jany Cedeno, a proactive teen volunteer at the local community center, leverages bilingual communication, meticulous bullet‑journal planning, and a caring, methodical temperament to mentor
    younger peers and lay the groundwork for a future career as a community health worker or bilingual medical assistant.
  sports: Jany Cedeno enjoys weekend hikes with the Denver Youth Hiking Club in the Rocky Mountains, punctuated by pick‑up soccer games and dedicated viewership of the Denver Broncos and Colorado Avalanche,
    while maintaining a personal fitness routine of yoga and trail runs that balances their love for solitude with a light competitive spark.
  arts: Jany Cedeno channels creativity into bullet‑journal illustrations and short TikTok cooking videos, drawing inspiration from the vibrant murals of Denver’s Art District on Santa Fe, as well as the
    musical blends of regional Mexican star Selena and pop artist Billie Eilish, shaping a cultural‑rich artistic identity.
  travel: Jany Cedeno prefers low‑cost road trips that mix hiking adventures with cultural immersion, having explored Santa Fe’s historic plaza and the Grand Canyon’s rim, while dreaming of a future backpacking
    journey through Oaxaca’s culinary scene and the Canadian Rockies once college finances allow.
  culinary: Jany Cedeno, a budding home chef, delights in preparing mole poblano, homemade tamales stuffed with pork and ancho chilies, and quick guacamole with fresh cilantro and lime, often sourcing organic
    corn masa at the local farmers market and documenting each culinary experiment in their bullet journal before sharing bite‑sized tips on TikTok.
  core: Jany Cedeno blends meticulous organization with spontaneous creativity, juggling bullet‑journal planning, evening TikTok edits, and a habit of hoarding stray craft supplies that clutter their desk,
    while occasionally running late because a new recipe captivates their attention.
background:
  cultural: Jany grows up in a Mexican‑American household in Denver's Adams County, where Spanish is spoken at home and Mexican traditions are celebrated, such as Día de los Muertos, quinceañeras, and weekend
    family meals featuring tamales and mole. Her family maintains strong ties to their roots while integrating into the broader Colorado community, participating in local festivals and cultural exchange
    events. She identifies as a second‑generation Mexican American, balancing the values of family loyalty, respect, and community service from her heritage with the independence and outdoor lifestyle of
    Colorado. This blend influences her bilingual communication, love for Mexican cuisine, and commitment to supporting immigrant families in her city.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Basic culinary arts (Mexican cuisine)", "Organizational planning (bullet journaling)", "Time management and scheduling", "Basic computer literacy
    (social media, MS Office)", "Peer mentorship and tutoring", "DIY crafting and problem‑solving", "Simple financial budgeting"]'
  hobbies: '["Cooking traditional Mexican dishes", "Drawing and sketching", "Hiking in the Rocky Mountains", "Listening to regional Mexican and pop music", "Creating TikTok videos about food and culture",
    "Volunteering at community center after‑school programs", "Playing Minecraft and other creative video games", "Bullet journaling and DIY crafts"]'
  career_goals: Jany aims to complete her GED within the next year and enroll in a vocational program that blends her love for community service and health. She aspires to become a certified community health
    worker or a bilingual medical assistant, leveraging her organizational skills and cultural background to improve health outcomes for immigrant families in Denver. In the longer term, she dreams of pursuing
    a degree in public health or nursing, with the ambition of advocating for equitable healthcare access, while also keeping a door open for culinary school to share her heritage through food.
