persona_description: A regulatory scientist who specializes in the development of new approaches to evaluating the safety of products regulated by the Food and Drug Administration (FDA) and the creation
  of data sets that substantiate and guide regulatory decisions. The person is knowledgeable in multidisciplinary teams of researchers who partner with colleagues in other government agencies, industry,
  and academia to tackle personal and public health issues, including those affecting women and minorities, foodborne pathogens, and personalized nutrition and medicine. The person has developed technologies
  that could one day transform healthcare, including RAPID-B, a portable system that can instantly detect live pathogens, and Bioinformatics, the use of computers and math to answer questions about biology.
  The person is interested in the state of Arkansas to create a virtual Center for Regulatory Science, which will be conducted in both state and federal facilities.
