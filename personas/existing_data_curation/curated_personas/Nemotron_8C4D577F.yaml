  hobbies: '[''Visiting art galleries and indie theaters'', ''Hiking and birdwatching in the Willamette National Forest'', ''Landscape photography'', ''Woodworking'', ''Native plant gardening'', ''Reading
    science‑fiction and technology nonfiction'', ''Small‑group book discussion'', ''Playing chess'']'
  career_goals: Although officially retired, Frank aims to stay intellectually active and give back to the community. He plans to mentor engineering students at the local community college, offering hands‑on
    guidance in design projects. He hopes to serve on the advisory board of the Eugene Museum of Art, bridging his technical expertise with his love for visual culture. Frank also wants to lead workshops
    on sustainable product design for neighborhood makerspaces and write a series of articles that explore the intersection of engineering and art. Ultimately, he aspires to publish a memoir that reflects
    on his interdisciplinary career and the unconventional ideas that shaped his professional journey.
