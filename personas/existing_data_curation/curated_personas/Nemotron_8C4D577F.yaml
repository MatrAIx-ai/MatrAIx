personas:
  professional: A retired mechanical engineer with three decades of consumer product design experience, Frank Arce leverages their SolidWorks, MATLAB, and Agile expertise to mentor engineering students,
    advise the Eugene Museum of Art, and lead sustainable product design workshops at local makerspaces, all while crafting precise technical documentation and weaving art criticism into engineering narratives.
  sports: An avid hiker and birdwatcher, Frank Arce frequently joins the Eugene Trail Club for Willamette National Forest treks, supports the Oregon Ducks football team on game days, and maintains a weekly
    chess match at the community center where their competitive edge often proves decisive.
  arts: A dedicated patron of experimental art and independent theater, Frank Arce regularly visits the Oregon Contemporary Art Center, attends avant-garde performances at the Falcon Theater, and contributes
    thoughtful critiques to a small book-discussion group that explores works by William Gibson and Octavia Butler, all while serving on the advisory board of the Eugene Museum of Art.
  travel: A methodical planner with a penchant for low-key adventure, Frank Arce enjoys weekend road trips to Crater Lake, dreams of hiking the Scottish Highlands, and carefully budgets each journey to
    fit within a modest fixed-income lifestyle, preferring solo or small-group travel over crowded tourism.
  culinary: A farm-to-table enthusiast, Frank Arce delights in preparing cedar-plank salmon with dill, wild mushroom risotto featuring locally foraged chanterelles, and seasonal heirloom tomato salads,
    while their intermediate cooking skills occasionally lead to over-salting soups and a lingering habit of keeping a spice rack organized by color.
  core: Frank Arce, a 68-year-old retired engineer, blends meticulous craftsmanship with restless curiosity, spending afternoons in the workshop, hunting hidden art gems, and guarding a spreadsheet-laden
    wallet that balances frugality with selective tech-focused investments.
background:
  cultural: Frank is a White American with German and Irish ancestry, raised in a Midwestern town where hard work, self‑reliance, and a strong emphasis on education were core family values. Growing up during
    the post‑World War II era exposed him to the excitement of the space race and the early computer revolution, sparking his lifelong interest in STEM fields. After moving to Eugene, Oregon, he embraced
    the Pacific Northwest’s culture of environmental stewardship, progressive community activism, and vibrant arts scene. His marriage of 45 years reflects a traditional partnership grounded in mutual respect,
    shared love for nature, and a curiosity about the world. Frank’s cultural identity blends classic Western individualism with the inclusive, collaborative ethos of the Eugene community.
