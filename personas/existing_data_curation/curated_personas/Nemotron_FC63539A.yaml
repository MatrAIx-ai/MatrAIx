  hobbies: '[''visiting art exhibitions'', ''reading contemporary fiction and memoirs'', ''salsa dancing'', ''community gardening'', ''traditional cooking and recipe experimentation'', ''volunteering as
    a festival judge'', ''genealogy research'']'
  career_goals: Livia is determined to document and share her family's culinary heritage through a self‑published cookbook, while also leading an intergenerational art workshop series at the Orlando cultural
    center. She aspires to become a recognized mentor for younger Puerto Rican women, guiding them in preserving cultural traditions and navigating community leadership roles. Maintaining her health, she
    plans to complete a walking program for seniors and eventually travel back to Puerto Rico to reconnect with relatives and visit historic sites. In the long term, she hopes her contributions will inspire
    a lasting appreciation for Puerto Rican arts within the broader Orlando community.
