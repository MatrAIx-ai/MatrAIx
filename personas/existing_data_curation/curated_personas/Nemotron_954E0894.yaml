  hobbies: '[''Reading African American literature and art books'', ''Watercolor painting'', ''Quilting'', ''Gardening'', ''Attending small museum tours and gallery openings'', ''Listening to jazz and gospel
    music'', ''Cooking family recipes'', ''Genealogical research'']'
  career_goals: Although retired from formal employment, Marvia aims to deepen her impact as a community mentor and cultural steward. She plans to volunteer as a docent for small tours at the Indianapolis
    Museum of Art, develop an intergenerational art workshop that pairs seniors with local youth, and continue documenting her family's oral histories and genealogy for future generations. Writing a memoir
    that weaves together her experiences of the civil‑rights era, the Great Migration, and her lifelong love of art is also a cherished ambition.
