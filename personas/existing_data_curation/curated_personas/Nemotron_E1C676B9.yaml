  hobbies: '["Gardening (native Texas herbs and roses)", "Reading historical fiction", "Quilting circle", "Church choir participation", "Community potluck organization", "Walking with her Labrador", "Baking
    Southern desserts", "Bridge (small‑group club)"]'
  career_goals: As she approaches retirement, Gloria’s primary ambition is to transition from full‑time teaching to a mentorship role within the district, guiding new educators and sharing her proven classroom
    routines. She aims to lead a small cohort of teachers in developing culturally responsive curricula that integrate local Texas history and African‑American heritage. Additionally, Gloria hopes to obtain
    a special‑education endorsement so she can volunteer as a literacy tutor for adult learners in the community, ensuring that her love for education extends beyond the school walls. She also envisions
    serving on the school board’s advisory committee for social‑emotional learning, advocating for policies that sustain a supportive, stable environment for both students and staff.
