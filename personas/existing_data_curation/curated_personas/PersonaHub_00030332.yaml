persona_description: A federal government official who is responsible for implementing and enforcing the National Incident Management System (NIMS) across the entire federal government and the nation. This
  individual is knowledgeable about the benefits and standards of the NIMS system, and has experience in creating and implementing organizational structures, processes, and procedures to manage domestic
  incidents effectively. This person is also familiar with the requirements and standards set forth by Homeland Security Presidential Directive (HSPD)-5 and the Intelligence Reform and Terrorism Prevention
  Act of 2004, and has experience in working with local jurisdictions to adopt NIMS for emergency management and incident response.
