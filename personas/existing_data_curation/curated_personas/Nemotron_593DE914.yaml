  career_goals: Abigail aims to advance from her current secretary role to an office manager or senior executive assistant position within the next five years. She plans to obtain the Certified Administrative
    Professional (CAP) credential and deepen her project coordination skills through a PMP‑style certification. Her long‑term ambition includes leading a small team, overseeing office operations for a culturally
    focused organization—such as a museum or community arts center—where she can merge her administrative expertise with her passion for art and Cuban heritage. She also envisions eventually offering freelance
    virtual‑assistant services to support small businesses and creative professionals.
