personas:
  professional: Gladys Tadesse is a preschool explorer who channels a practical curiosity into building tidy block towers, methodically sorting toys while quietly preferring solo play and gently guiding
    peers when needed; they thrive on quiet organization.
  sports: Gladys Tadesse enjoys the South Bend Tigers junior soccer practice, delighting in short bursts of running and kicking while often opting to watch from the sidelines with a small circle of friends;
    they appreciate organized play but feel overwhelmed by crowded fields.
  arts: Gladys Tadesse loves singing along to Raffi's 'Baby Beluga', drawing bright suns after listening to drum rhythms during family coffee ceremony storytelling, and they often mimic simple dance moves
    in their bedroom, preferring quiet creative sessions over large group performances.
  travel: Gladys Tadesse has explored the highland city where grandparents host a New Year coffee ceremony, savored family picnics at Lemon Lake, and they dream of a sunny adventure to Disney World, balancing
    a love for familiar comforts with curiosity about faraway places.
  culinary: Gladys Tadesse favors the soft texture of injera paired with mild chicken stew, enjoys stirring a small pot of lentil soup under parental supervision, and they feel comforted by the fragrant
    aroma of roasted coffee beans during family gatherings, often asking for extra pieces of flatbread.
  core: Gladys Tadesse is a cautious, curiosity-driven three-year-old who thrives on orderly play, quietly observes the world, yet often worries about sudden changes and clings to familiar routines, and
    they sometimes throw tiny tantrums when faced with unexpected noise.
background:
  cultural: Gladys is raised in a Black Ethiopian‑American household in South Bend, Indiana. At home, Amharic words mix with English, and family traditions such as coffee‑ceremony storytelling and Ethiopian
    holiday celebrations are woven into daily life. She attends a local early‑learning center where she experiences Midwestern community values and participates in church activities that emphasize togetherness
    and respect. This blend of Ethiopian heritage, Black American cultural influences, and Midwestern upbringing shapes her worldview, language exposure, and the foods, music, and celebrations that enrich
    her childhood.
attributes:
