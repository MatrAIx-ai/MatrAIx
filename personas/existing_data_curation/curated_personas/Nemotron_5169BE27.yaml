  career_goals: Gladys often talks about wanting to become a teacher or a doctor when she grows up. She imagines herself reading books to other children, helping them learn numbers and letters, and caring
    for people who are sick. Her practical side makes her eager to master reading and writing first, so she can share stories confidently. She also dreams of keeping her classroom or play area neat and
    organized, reflecting her desire for order and reliability.
