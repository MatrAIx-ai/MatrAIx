personas:
  professional: Kaki Wong is a budding junior botanist who explores the backyard garden with a magnifying glass, cataloguing insects and leaf patterns with childlike curiosity, yet they frequently abandon
    their tidy field notebook for spontaneous play with friends, reflecting a blend of practical observation and a resistance to rigid structure.
  sports: Kaki Wong loves kicking a soccer ball for the Little Lions preschool league and practicing cartwheels at the community gym, cheers loudly for the Metro City Mariners baseball team during TV games,
    and eagerly joins the seasonal ice‑skating class, though they often drift away from structured drills in favor of free play.
  arts: Kaki Wong delights in drawing bright cartoon dinosaurs, dancing to Kidz Bop’s lively rendition of "Uptown Funk," belting out Idina Menzel’s "Let It Go" from Frozen, and re‑enacting scenes from Peppa
    Pig with stuffed animal friends, making artistic expression a core part of their daily routine.
  travel: Kaki Wong thrills at family outings to the local aquarium and the sunny beaches of Santa Cruz, has marveled at the dinosaur exhibit in Washington, D.C., and dreams of a future adventure to see
    the Eiffel Tower in Paris, yet prefers short car rides with a familiar playlist over long, structured vacations.
  culinary: Kaki Wong adores crunchy chicken nuggets with honey‑mustard dip, creamy mac and cheese sprinkled with cheddar, and strawberry‑banana smoothies blended with fresh banana and a splash of milk,
    often helping to measure ingredients with a tiny wooden spoon while humming favorite songs.
  core: Kaki Wong is a curious, high‑energy five‑year‑old who toggles between spontaneous play and tidy chores, worries about missing out, forgets to put toys back, and thrives on noisy, colorful group
    activities.
background:
  cultural: Kaki’s family maintains East Asian traditions while living in Chelmsford, Massachusetts. At home, Mandarin is spoken alongside English, and they celebrate Lunar New Year with family gatherings,
    dumplings, and red decorations. She attends a preschool that values multicultural inclusion, and her parents encourage respect for elders, communal harmony, and appreciation for both Chinese heritage
    and the broader American community.
