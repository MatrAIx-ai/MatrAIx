  career_goals: Kaki often talks about becoming a teacher because she loves sharing what she learns with friends, or a veterinarian because she cares for animals; she also imagines exploring space as an
    astronaut, reflecting her curiosity about new ideas while wanting a practical way to help others. She hopes to use her bilingual skills to connect with both her family’s heritage and her community.
