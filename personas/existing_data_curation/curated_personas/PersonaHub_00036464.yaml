persona_description: A scientist or environmental expert who is knowledgeable about the impact of oyster farming on marine ecosystems, particularly in the Drakes Bay Oyster Company's shellfish farm in Drakes
  Estero. This individual is interested in evaluating the potential environmental impacts of extending the permit for the company's operations and comparing it to the alternative of converting the site
  to full wilderness status. They are also interested in reviewing the Park Service's evaluation of the draft Environmental Impact Statement and making suggestions for improving the report's methodology
  and evaluation of impacts for various resource categories.
