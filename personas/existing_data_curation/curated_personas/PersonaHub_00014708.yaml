persona_description: A historian who specializes in the study of trade and commerce in medieval Hungary, particularly the rights of towns and their interactions with one another. They are interested in
  the details of the trading process, the establishment of legal roads and the enforcement of the thirtieth tax, and the impact of these factors on the economy and society of the time. They are also interested
  in the role of intermediaries and the role of local workers in the process of goods exchange. They are likely to be familiar with the extant written sources on the subject and to have a deep understanding
  of the historical context.
