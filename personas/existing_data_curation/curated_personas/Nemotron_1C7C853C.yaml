  hobbies: '["Traditional cooking and recipe experimentation", "Balcony herb gardening", "Mahjong in small groups", "Tai Chi practice at the park", "Reading Chinese historical novels and classic poetry",
    "Family photo album curation", "Volunteer work at senior center", "Exploring local cultural festivals and markets"]'
  career_goals: Her primary goal is to remain an active contributor to the Flushing community by volunteering as a senior‑center mentor, offering workshops on budgeting and scam awareness, and preserving
    her family’s culinary heritage in a written cookbook. She also aims to improve her digital literacy to stay in touch with her grandchildren, manage her affairs independently, and gradually take on a
    leadership role in her local cultural association.
