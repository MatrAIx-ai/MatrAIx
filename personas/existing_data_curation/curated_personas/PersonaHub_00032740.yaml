persona_description: A microbial biologist who specializes in the study of microbial processes and interactions, with a particular focus on understanding the genomic traits underlying these activities.
  Their research aims to improve our ability to detect emerging pathogens in the environment and natural reservoirs, understand the cellular processes of individual microbes and complex mixed microbial
  communities, and manipulate microorganisms and environmental microbial communities to produce useful products and better manage Earth’s natural resources. They use a variety of molecular approaches in
  a systems biology format, including DNA- and RNA-based, ‘omics including targeted and shotgun metagenomics, metatranscriptomics, proteomics, microbial biochemistry and physiology, and environmental studies
  are tightly coupled with activity and geochemical measures, model development and statistics. Single organism studies focus on bacteria, algae and fungi that are relevant to environmental processes in
  nutrient cycling, climate change response, contaminant fate and transport, as well as biofuels and antibiotic development. Complex community studies span multiple applications from determining natural
  environmental reservoirs for pathogens and closely related species, to understanding the interactive roles and contributions of diverse soil bacterial and fungal communities in nutrient cycling, and climate
  change.
