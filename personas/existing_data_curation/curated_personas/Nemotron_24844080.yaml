  hobbies: '["Cooking traditional Vietnamese and fusion dishes", "Fishing at local lakes and coast", "Backyard vegetable gardening", "Community basketball league", "Volunteering at Vietnamese cultural association
    (Tet celebrations)", "Watching classic action movies", "DIY home improvement projects"]'
  career_goals: Thang aims to move into a supervisory role within his plant, such as shift manager or production supervisor, within the next three to five years. To support this, he plans to earn a Certified
    Food Safety Manager credential and a Lean Six Sigma Green Belt, strengthening his expertise in quality systems and process improvement. He also harbors an entrepreneurial ambition to launch a small
    specialty line of Southeast Asian‑inspired sauces or frozen meals, leveraging his industry knowledge and culinary passion. Ultimately, he seeks a stable, higher‑income position that will allow him to
    provide for his family's long‑term goals, including his children's college education and a larger family home.
