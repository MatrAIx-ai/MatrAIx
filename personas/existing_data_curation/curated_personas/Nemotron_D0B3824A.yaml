  hobbies: '["Metal sculpture (abstract)", "Pickup basketball", "Reading science-fiction and philosophy", "Woodworking", "Cooking Texas barbecue", "Attending live music (jazz, R&B)", "Hosting neighborhood
    gatherings", "Mentoring youth entrepreneurship", "Participating in community art fairs", "Exploring emerging metal-fabrication technologies"]'
  career_goals: Adrian aims to obtain a Certified Welding Inspector (CWI) credential within the next two years, positioning himself for supervisory roles in a large manufacturing facility. Simultaneously,
    he plans to launch a boutique metal-art studio that blends his welding expertise with his love for abstract design, offering custom sculptures, decorative furniture, and community art installations.
    He wishes to mentor the next generation of welders through a local trade-school partnership and eventually transition into a consulting role that advises small manufacturers on process optimization
    and workforce development. Long-term, he hopes to secure a comfortable retirement while leaving a legacy of both technical excellence and creative contributions to his community.
