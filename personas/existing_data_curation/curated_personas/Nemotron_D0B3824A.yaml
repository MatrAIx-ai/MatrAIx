personas:
  professional: Adrian Harris, a veteran welder and metal fabricator with three decades of MIG, TIG, and stick expertise, blends meticulous technical precision with an imaginative flair for abstract sculpture,
    leveraging their business acumen to run cost‑effective projects while competitively mentoring apprentices as they chase the Certified Welding Inspector credential.
  sports: Adrian Harris dominates the local community center’s pick‑up basketball scene every Thursday night, cheering for the Dallas Mavericks while also following the Houston Texans in the NFL and playing
    in a senior‑league softball match during summer, using the sport as a social outlet that satisfies their energetic and competitive nature.
  arts: Adrian Harris channels a lifelong love of sci‑fi and philosophy into metal sculpture, finds inspiration in the angular forms of Isamu Noguchi and the kinetic work of Alexander Calder, while regularly
    attending live jazz sets featuring Miles Davis and contemporary R&B concerts headlined by H.E.R., and participates in a woodworking club that crafts furniture echoing the clean lines of mid‑century
    modern designers.
  travel: Adrian Harris prefers road‑trip adventures that blend artistic discovery with hands‑on learning, having driven to the Santa Fe Art Market and the National Bronze Sculpture Symposium in Baltimore,
    while dreaming of a future trek to the Kitakyushu Museum of Ceramic Art in Japan and a culinary pilgrimage through the barbecuing regions of Texas Hill Country and the steel‑rich Ruhr Valley in Germany.
  culinary: Adrian Harris boasts a seasoned grill‑master reputation, expertly slow‑smoking brisket with a rub of smoked paprika, brown sugar, and cumin over mesquite wood, pairing it with classic sides
    like jalapeño‑infused baked beans and coleslaw, while also experimenting with Texas‑style chili and occasionally over‑salting his creations in the pursuit of the perfect BBQ flavor.
  core: Adrian Harris is a fiercely competitive, 57‑year‑old welder‑artist who merges steelwork precision with abstract imagination, fuels every project with a love of outdoor basketball, smoky barbecue,
    and late‑night sci‑fi debates, and stubbornly balances savings for retirement against a habit of splurging on reclaimed metal.
background:
  cultural: Adrian is a second‑generation African‑American who grew up in the Greater Houston area and now lives in Spring, Texas. His family’s roots trace back to the Great Migration, and the values of
    resilience, community, and faith have been central to his upbringing. He regularly attends a historically Black Baptist church, where gospel music, fellowship, and community service play a key role
    in his life. The rich traditions of Southern African‑American cuisine, storytelling, and music—particularly blues, jazz, and contemporary R&B—inform his social gatherings and artistic inspirations.
    Living in Montgomery County, he balances the Southern hospitality of Texas with the cultural pride of the Black community, often participating in Juneteenth celebrations, local church events, and neighborhood
    block parties. These cultural influences shape his collaborative spirit, his respect for mentorship, and his desire to give back through art and education.
