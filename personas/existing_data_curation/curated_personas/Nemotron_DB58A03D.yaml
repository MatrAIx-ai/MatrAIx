personas:
  professional: David Manlapaz is a meticulous civil litigator and IP counsel whose methodical case preparation meets an imaginative, speculative-fiction-inspired flair for novel legal arguments, enabling
    them to translate abstract concepts into concrete strategies while navigating complex entertainment and emerging-tech disputes, and they are known for turning abstract ideas into winning arguments.
  sports: David Manlapaz fuels his fitness routine with early morning hikes in the San Bernardino foothills as a member of the Jurupa Valley Hiking Club, follows the Los Angeles Dodgers and Los Angeles
    Lakers each season, and plays weekend soccer for a local co-ed amateur league, balancing competitive drive with a need for reflective solitude, and they often log their mileage in a digital journal
    to track progress.
  arts: David Manlapaz cultivates a vibrant artistic life by painting abstract watercolors, curating a small collection of limited‑edition prints by Banksy and Yayoi Kusama, attending gallery openings featuring
    artists like Marina Abramović, and immersing in the soundscapes of Björk and Tame Impala while devouring speculative-fiction works from N.K. Jemisin and Neal Stephenson, and they draw direct inspiration
    from these creators to inform their legal storytelling.
  travel: David Manlapaz prefers meticulously planned cultural trips that blend artistic inspiration with adventure, having explored the historic temples of Siem Reap, the bustling night markets of Manila,
    and the sublime fjords of Norway, while dreaming of a winter photography safari in Iceland and a spring culinary tour of the Mediterranean, and they keep a detailed sketchbook of each locale’s visual
    motifs.
  culinary: David Manlapaz enjoys cooking at an intermediate level, blending traditional dishes like adobo with pineapple‑jalapeño glaze and pho broth enriched with lemongrass and local kale, while experimenting
    with fusion recipes that marry Californian avocado and citrus zest with classic regional flavors, often pairing his meals with craft IPA or oolong tea, and they confess to a habit of improvising sauces
    late into the night.
  core: David Manlapaz is a detail‑driven litigator whose vivid imagination fuels a passion for art and speculative fiction, whose disciplined budgeting coexists with occasional splurges on original prints,
    and who balances rigorous hikes with midnight chess battles, and they maintain a skeptical yet strategic edge in professional and personal pursuits.
background:
  cultural: David grew up as the child of Southeast Asian immigrants—his mother from the Philippines and his father from Vietnam—who settled in Southern California before he was born. Bilingual in English
    and Tagalog, he also understands basic Vietnamese, reflecting his family's commitment to preserving cultural roots. Family gatherings are centered around communal meals, traditional festivals such as
    Tet and Sinulog, and a blend of Catholic and Buddhist rituals that shaped his values of respect, perseverance, and community service. His parents emphasized education and a strong work ethic, which
    guided his pursuit of a legal career despite only completing high school locally before attending community college and law school. Living in Jurupa Valley, he actively participates in local cultural
    associations, celebrates heritage holidays, and mentors youth from similar backgrounds. This multicultural upbringing informs his empathy for immigrant clients, his interest in protecting artistic expression,
    and his appreciation for the fusion of diverse artistic traditions.
