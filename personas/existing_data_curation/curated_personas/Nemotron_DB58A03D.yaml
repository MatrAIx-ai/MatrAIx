  career_goals: David aims to become a partner at a boutique firm that focuses on art, entertainment, and emerging‑technology law, positioning himself as a thought leader at the intersection of creativity
    and legal practice. He plans to build and lead a practice group that devises novel dispute‑resolution frameworks for digital media and intellectual property cases. Over the next five years, he intends
    to publish scholarly articles on the legal implications of AI in the arts, mentor junior attorneys, and launch a legal‑tech startup that uses AI to streamline legal research. Ultimately, his long‑term
    ambition is to serve as a judge or a policy advisor where he can shape jurisprudence that supports innovative creators and protects immigrant artists.
