persona_description: A researcher or health professional who is interested in the impact of nutrition and physical activity on the development and persistence of frailty in elderly people. They are particularly
  focused on understanding the role of protein intake and physical activity in the broader concept of frailty and are looking for evidence to support these associations. They are also interested in exploring
  the potential benefits of physical activity and the limitations of protein intake as a factor in frailty.
