  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Community festival volunteering'', ''Lakefront jogging'', ''Reading mystery novels'', ''Church outreach'', ''Attending Chicago Cubs games'']'
  career_goals: Priscilla aims to move into a store manager role within the next two years, using her extensive sales record and leadership skills to drive team performance. She plans to pursue a Retail
    Management certification to strengthen her strategic planning capabilities and eventually advance to a district manager position overseeing multiple locations. Long‑term, she hopes to open a boutique
    that showcases authentic Mexican artisan products, allowing her to blend her cultural heritage with her retail expertise. Alongside career advancement, she seeks financial stability that will enable
    her to support her adult children and contribute to community initiatives.
