persona_description: A UN global blockchain expert who specializes in the study of digital currencies, particularly central bank digital currencies (CBDCs). He has been the UN's resident expert on fintech
  and blockchain for nearly 10 years and has been involved in a series of crypto-related initiatives, such as sending aid to Syria via Ethereum and enabling crypto donations for UNICEF. He is aware of the
  challenges and limitations of public blockchains and believes that central banks issuing funds directly to private citizens would be the most disruptive option.
