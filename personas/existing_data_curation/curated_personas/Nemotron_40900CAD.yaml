  career_goals: Yee aspires to turn her culinary passion into a small home‑based catering service offering fusion meals for neighborhood gatherings, while exploring part‑time opportunities in community
    outreach or early childhood education to support local families. She also hopes to deepen her Mandarin proficiency and obtain a certification in nutrition or child development to broaden her contributions.
