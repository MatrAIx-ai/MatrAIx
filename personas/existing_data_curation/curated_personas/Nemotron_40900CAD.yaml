personas:
  professional: Yee Mui is a culinary enthusiast who leverages their knack for blending East‑Asian flavors with Southern comfort to launch a modest home‑based catering venture while flexibly volunteering
    in community outreach and pursuing child‑development certification, balancing curiosity with a laid‑back, sometimes disorganized, planning style.
  sports: Yee Mui enjoys leisurely walks in local parks, occasional pick‑up softball games with the Duluth community league, follows the Atlanta Falcons and Atlanta Hawks, and participates in a Saturday
    yoga class at a nearby studio to stay flexible.
  arts: Yee Mui immerses themselves in creative pursuits like knitting, DIY home décor, and reading historical fiction, while also savoring concerts by Taylor Swift and Lin‑Manuel Miranda’s Broadway recordings,
    and they volunteer at the local community theater for set design.
  travel: Yee Mui dreams of weekend getaways to the Blue Ridge Mountains, savors culinary tours in Savannah, and has already explored the bustling night markets of Taipei, balancing a love of adventure
    with a modest travel budget that favors short trips over long vacations.
  culinary: Yee Mui's culinary palate blends ginger‑infused soy‑glazed chicken wings with Southern peach‑sweet tea barbecue, perfects shrimp‑and‑grits with a subtle miso twist, and routinely cooks spinach‑tofu
    dumplings alongside collard greens, showcasing a moderate skill level that thrives on experimenting with fresh herbs, peanuts, and cornmeal.
  core: Yee Mui is a pragmatic dreamer who harmoniously fuses flavors, community care, and quiet curiosity, even if they sometimes forget where they placed their knitting needles.
background:
  cultural: Born to Chinese parents who immigrated to the United States, Yee grew up in a bilingual household where Mandarin and Cantonese were spoken alongside English. Living in Duluth, GA, she blends
    her family's East Asian traditions—celebrating Lunar New Year, preparing dumplings, and honoring ancestor rites—with the hospitality and Southern culinary influences of the Atlanta metropolitan area.
    The vibrant Asian diaspora community in Gwinnett County provides a supportive network that reinforces her cultural identity while she embraces the local Southern lifestyle.
