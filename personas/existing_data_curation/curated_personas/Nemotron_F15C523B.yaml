  career_goals: Edna’s ambitions focus on staying active, sharing her knowledge, and leaving a lasting community legacy. She aims to expand the intergenerational story‑exchange program at the local library,
    ensuring that seniors’ memories are recorded and shared with young families. She plans to launch a weekly senior‑friendly cooking class that blends classic recipes with occasional modern twists, fostering
    both tradition and curiosity. Edna is also working to raise funds for renovating the community‑center garden, hoping to create a therapeutic space for residents. On a personal level, she wants to maintain
    her health through regular walking groups, reduce stress through mindfulness journaling, and sharpen her digital skills to create an online photo archive for her grandchildren. While competitive by
    nature, she seeks to mentor other seniors in bridge tournaments, encouraging a spirit of healthy competition.
