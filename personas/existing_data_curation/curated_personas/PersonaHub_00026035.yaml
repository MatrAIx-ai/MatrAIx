persona_description: A scientist who is interested in understanding the immune system and developing effective therapies for cancer and AIDS. Her research focuses on engineering the immune system to fight
  cancer and AIDS by manipulating blood cells. Her previous work has shown that immune cells can be engineered to promote an immune response against cancer, and her current research builds upon her past
  work to translate these discoveries into clinical uses. She is a member of a multi-disciplinary and multi-institutional research group called the Translational Consortium in Engineered Immunity, which
  includes UCLA clinicians and scientists as well as researchers from California Institute of Technology (Caltech) and University of Southern California.
