personas:
  professional: Paula Dwiggins, a retired farm‑hand turned community arts advocate, leverages their folk‑art mastery in painting, quilting, and photography along with a talent for organizing small‑scale
    events, while their relaxed attitude toward deadlines and critical, competitive nature drive them to create senior‑focused workshop series that push participants to think beyond tradition.
  sports: Paula Dwiggins stays active by walking the trails of the Red River Valley with a senior walking club, tending their vegetable garden for low‑impact strength training, cheering on the Fargo‑Moorhead
    RedHawks during baseball season, and regularly competing in bridge tournaments at the senior center, treating the card game as their preferred mental sport.
  arts: Paula Dwiggins immerses themselves in folk and landscape art, drawing inspiration from Ansel Adams’ photography, Bob Ross’s soothing painting tutorials, and Grandma Moses’s prairie scenes, while
    they regularly attend live performances by regional folk musicians such as Molly O’Neil at the local café and participate in book clubs that dissect works by art historians like Sarah M. Robbins.
  travel: Paula Dwiggins favors spontaneous road trips that combine museum visits with scenic drives, having already toured the Art Institute of Chicago and the Walker Art Center in Minneapolis, while dreaming
    of a future pilgrimage to the National Gallery of Art in Washington, D.C., and still delighting in weekend excursions to nearby Badlands National Park for its stark beauty.
  culinary: Paula Dwiggins, an adept home cook, delights in turning their garden’s heirloom tomatoes, sweet corn, and fresh basil into vibrant dishes such as roasted vegetable ratatouille, corn‑and‑zucchini
    chowder, and a signature basil‑infused pesto pasta, while also indulging in occasional trips to local diners for a hearty slice of apple pie.
  core: Paula Dwiggins, a 66‑year‑old art‑loving retiree, couples a skeptical, competitive edge with a relaxed, social spirit, often misplacing their paintbrushes while planning impromptu community workshops
    and garden picnics.
background:
  cultural: Paula is a fifth‑generation North Dakotan of German‑Scandinavian heritage. Raised in a Lutheran household in rural Cass County, she grew up with traditions of church potlucks, barn dances, and
    a strong sense of community self‑reliance. Her family’s farm roots instilled a respect for the land and seasonal rhythms, while exposure to local Dakota cultural events fostered an appreciation for
    the region’s Indigenous history. These influences shape her warm, outgoing demeanor, her love for folk arts, and her commitment to giving back to the community.
