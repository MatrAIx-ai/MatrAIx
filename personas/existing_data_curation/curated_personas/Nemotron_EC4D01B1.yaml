personas:
  professional: Jennifer Lima is a budding science‑fiction writer and novice programmer who channels her methodical curiosity into creating interactive story games, while also volunteering at the community
    garden, where her organized approach hints at a future in marine biology or environmental design.
  sports: Jennifer Lima enjoys snorkeling along the San Diego coastline and is a member of the La Jolla Junior Surf Club, supports the San Diego Wave in women's soccer, and runs cross‑country for her high
    school to keep fit.
  arts: Jennifer Lima spends evenings composing piano renditions of Ludovico Einaudi’s minimalist pieces, curates digital collages inspired by the ocean using Photoshop, and draws inspiration from mystery
    authors like Agatha Christie and sci‑fi writer N.K. Jemisin, while their favorite musicians include the ambient duo Tycho and indie folk artist Sufjan Stevens.
  travel: Jennifer Lima favors low‑key family road trips to coastal tide‑pools and marine reserves, dreaming of a future scuba‑diving expedition to the Great Barrier Reef, yet budget constraints mean their
    most frequent getaway is the weekend surf camp at Catalina Island.
  culinary: Jennifer Lima enjoys cooking simple seafood dishes such as grilled lemon‑garlic shrimp and sautéed seaweed salad, frequently experiments with making homemade sushi rolls using sushi‑grade tuna
    and avocado, and loves indulging in sweet treats like matcha‑flavored macarons.
  core: Jennifer Lima blends methodical curiosity with a quiet love for marine mysteries, turning every puzzle—whether a crossword, a digital art project, or a coding challenge—into a personal quest for
    order amid lingering worry.
background:
  cultural: Jennifer is a 14‑year‑old White American raised in a suburban neighborhood of San Diego, California. Growing up on the Pacific coast has immersed her in the region’s beach lifestyle, surf culture,
    and a strong community emphasis on marine conservation. While her family’s traditions reflect typical Western holidays and values, the multicultural tapestry of Southern California—particularly the
    influence of nearby Mexican‑American communities—has exposed her to diverse cuisines, bilingual signage, and local festivals. Her school environment encourages participation in extracurricular clubs
    such as science, art, and environmental groups, fostering a blend of individual curiosity and collaborative spirit that shapes her personal and academic outlook.
