  hobbies: '[''Beachcombing and shell collecting'', ''Creative writing and short‑story drafting'', ''Digital photo editing'', ''Nature journaling with marine sketches'', ''Piano playing'', ''Puzzle solving
    (crosswords, Sudoku)'', ''Reading mystery and sci‑fi novels'', ''Simple coding projects (interactive story games)'', ''Snorkeling excursions'', ''Volunteering at community garden'']'
  career_goals: Jennifer aspires to turn her love of the ocean and scientific inquiry into a career in marine environmental science. She dreams of studying marine biology or coastal ecology at a university
    with a strong research program, eventually becoming a marine conservationist who devises practical solutions to protect San Diego’s shoreline ecosystems. She is also interested in leveraging her technical
    skills to develop data‑driven tools for habitat monitoring. While she remains open to other science‑related paths, her overarching ambition is to combine her analytical abilities with a commitment to
    environmental stewardship and community education.
