  career_goals: Mark aims to scale his company, a Montana-based clean-tech startup, into a national leader in sustainable outdoor technology within the next five years, targeting series-C funding and expanding
    the product line to include AI-enhanced environmental monitoring devices. He aspires to build a resilient, mission-driven organization that balances innovative research with market viability, and to
    mentor emerging entrepreneurs through local incubators. Long-term, he envisions influencing policy on renewable energy adoption in the Rocky Mountain region and establishing a foundation that supports
    STEM education for underserved youth. Throughout, he seeks to preserve his personal balance of curiosity and practicality, ensuring that growth never compromises his commitment to responsible leadership.
