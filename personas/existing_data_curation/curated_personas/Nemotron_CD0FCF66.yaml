personas:
  professional: Mark Alderson, a 28‑year‑old clean‑tech entrepreneur and full‑stack engineer, leverages their data‑driven decision‑making, IoT prototyping expertise, and calm, assertive leadership to steer
    their Montana‑based startup toward series‑C growth while mentoring cross‑functional teams and championing sustainable product innovation.
  sports: Mark Alderson, an avid back‑packer and snowboarder, frequents the Bitterroot Range and Big Sky Resort, competes in local fly‑fishing tournaments with the Missoula Outdoor Club, and roots for the
    University of Montana Grizzlies while following the Denver Broncos for professional football.
  arts: Mark Alderson channels their creative side through acoustic guitar sessions inspired by Bob Dylan and Sufjan Stevens, captures sunrise vistas in the style of Ansel Adams, and enjoys attending live
    performances by Bon Iver at intimate Montana venues, blending folk improvisation with technical precision.
  travel: Mark Alderson plans rugged trips with meticulous checklists, favoring adventure destinations like Iceland’s volcanic landscapes, Banff’s alpine trails, and domestic getaways to Yellowstone and
    the Great Sand Dunes, yet they balance their explorations with budget constraints and a desire to return home for community volunteer projects.
  culinary: Mark Alderson, an intermediate home cook, delights in preparing pan‑seared trout with lemon‑butter sauce, huckleberry pancakes, and smoked bison burgers seasoned with juniper berries, while
    often dining at farm‑to‑table eateries that showcase locally sourced rye and wild mushrooms.
  core: Mark Alderson, a calm, curiosity‑driven tech founder, merges wilderness immersion with disciplined entrepreneurship, occasionally over‑packs for trips, and habitually checks their smartwatch for
    health metrics during a coffee break.
background:
  cultural: Mark grew up in a middle-class white family in the Pacific Northwest, the son of a civil engineer and a high-school science teacher. Early exposure to hands-on projects and an emphasis on self-reliance
    fostered his curiosity for how things work, while his parents' community-oriented values instilled a sense of civic responsibility. Moving to Missoula for college, he adopted the region's outdoor culture—hiking,
    skiing, and a deep respect for the natural environment—shaping both his personal lifestyle and his professional focus on sustainable technology. He identifies with the broader cultural tapestry of western
    Montana, which blends independent frontier spirit with a collaborative, progressive community ethos.
