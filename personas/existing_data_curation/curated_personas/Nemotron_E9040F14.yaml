personas:
  professional: James Jenks, a 48‑year‑old teller with over two decades of experience at a regional bank in Grand Rapids, blends meticulous cash‑handling expertise and regulatory know‑how with a laid‑back
    attitude toward scheduling, frequently juggling mentor duties and spontaneous coffee‑break tutoring sessions for new staff while dreaming of a lead‑teller promotion that would let them structure the
    branch’s daily rhythm.
  sports: James Jenks, an enthusiastic supporter of the Grand Rapids Griffins, regularly attends home games, participates in a local bowling league at West Shore Lanes, and follows the West Michigan Whitecaps
    baseball team, balancing his love for team sports with solo weekend hikes along the Lake Michigan shoreline.
  arts: James Jenks enjoys the vibrant ArtPrize festivals, often quoting lines from the films of Christopher Nolan and humming classic folk tunes by Bob Dylan while strumming a battered acoustic guitar
    at neighborhood gatherings, and they regularly stream concerts by the folk‑rock duo The Lumineers for inspiration.
  travel: James Jenks prefers short road trips that blend nature and small‑town charm, having explored Door County’s lighthouse trails and the historic streets of Quebec City, while harboring a wish to
    drive the Pacific Coast Highway from California to Washington next summer.
  culinary: James Jenks loves hearty Midwestern fare, regularly cooking salmon with dill and lemon, preparing buttery corn on the cob, and enjoying a well‑cooked steak with a side of smoked gouda‑topped
    mashed potatoes, though they often forget to defrost meat in time, leading to last‑minute take‑out orders.
  core: James Jenks, a sociable yet surprisingly disorganized bank teller, balances a love for community activities and steady routine with occasional impulsive splurges on fishing gear and karaoke nights.
background:
  cultural: James grew up in a working‑class white family in the Grand Rapids area, with German and Irish ancestry that reflects the demographic makeup of the region. The Midwestern cultural values of modesty,
    hard work, and community solidarity shaped his outlook. He was raised in an environment where church gatherings, local fairs, and high‑school sports were central to social life, and the city’s Dutch
    heritage and craft‑beer scene further influenced his appreciation for local traditions and community events. This cultural backdrop reinforces his sociable, cooperative nature and his preference for
    stable, predictable routines balanced with flexible, friendly social interactions.
