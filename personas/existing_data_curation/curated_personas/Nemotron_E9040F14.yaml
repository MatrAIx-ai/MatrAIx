  hobbies: '[''Bowling'', ''Farmers market visits'', ''Grand Rapids Griffins hockey fan'', ''Barbecues'', ''Karaoke'', ''ArtPrize festivals'', ''Fishing'', ''Hiking'', ''Volunteering at food pantry'', ''Playing
    guitar'']'
  career_goals: While James appreciates the routine of teller work, he is motivated to advance within the banking sector. His immediate goal is to become a lead teller or assistant branch manager within
    the next three years, a role that would let him oversee daily operations and mentor junior staff. He plans to earn a Certified Bank Teller credential and complete night courses toward an associate degree
    in business administration. Ultimately, he aims to transition into a personal banking position where he can combine his strong people skills with deeper financial advising responsibilities, while maintaining
    the stable and predictable work environment he values.
