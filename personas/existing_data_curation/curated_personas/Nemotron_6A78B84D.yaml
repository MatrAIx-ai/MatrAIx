personas:
  professional: Jovel Mederos is a seasoned plumber‑pipefitter who combines meticulous blueprint reading, MIG/TIG welding, and bilingual communication with a structured, solution‑focused work ethic, and
    they are pursuing Master Plumber certification to lead sustainable contracting projects while mentoring apprentices.
  sports: Jovel Mederos relaxes after work by casting a line on nearby lakes, maintains a modest weight‑lifting routine at the local gym, roots for the Chicago Cubs and the Chicago Bulls, and occasionally
    joins a weekend adult softball league with the Chicago Lakeside Softball Club.
  arts: Jovel Mederos unwinds by strumming an acoustic guitar while listening to the rhythmic cadences of Juan Luis Guerra, Aventura, and the folk storytelling of Bob Dylan, and they sometimes attend intimate
    live performances at neighborhood cultural venues.
  travel: Jovel Mederos prefers meticulously planned solo getaways that blend cultural immersion with industrial history, having explored the iron‑working museums of Ironbridge in England and the historic
    shipyards of Baltimore, while they dream of a future trip to the geothermal hot springs of Iceland to study sustainable heating technologies.
  culinary: Jovel Mederos delights in preparing mangú with butter and sautéed onions, a slow‑cooked sancocho featuring yucca, plantain, and oxtail, and crisp plantain fritters seasoned with garlic and cumin,
    often garnishing with fresh cilantro, oregano, and lime harvested from their balcony herb garden, and they enjoy sharing these meals with close friends over a cold local brew.
  core: Jovel Mederos, a pragmatic 41‑year‑old plumber‑turned‑entrepreneur, stitches together a hands‑on love of woodworking, acoustic guitar, and home‑cooked comfort food, and they carry a quiet, compassionate
    drive to mentor apprentices and give back to the community.
background:
  cultural: Jovel grew up in a close‑knit Dominican household in New Jersey, where Spanish was spoken at home and family gatherings centered around food, music, and shared stories. His parents instilled
    values of hospitality, community responsibility, and respect for tradition. While he never married, he maintains strong ties with extended family members who visit from the Dominican Republic, and he
    participates in local cultural events such as Dominican Independence Day celebrations and church festivals. These experiences shape his bilingual communication style, his love for Dominican culinary
    arts, and his commitment to helping neighbors, especially through volunteer work that reflects the communal spirit of his heritage.
attributes:
  skills: '[''Pipe installation and repair'', ''Steamfitting'', ''Blueprint reading and interpretation'', ''MIG/TIG welding'', ''Pipe threading and soldering'', ''Hydraulic and pneumatic system troubleshooting'',
    ''NJ Building Code compliance'', ''OSHA safety procedures'', ''Preventive maintenance scheduling'', ''Apprentice mentorship and training'', ''Emergency response and problem solving'', ''Bilingual customer
    service'']'
  hobbies: '[''Woodworking and DIY home projects'', ''Cooking traditional Dominican cuisine'', ''Playing acoustic guitar'', ''Fishing at local lakes'', ''Reading technical manuals and engineering biographies'',
    ''Listening to bachata and merengue music'', ''Model building (scale steam engine models)'', ''Urban gardening'']'
  career_goals: Jovel aims to earn a Master Plumber/Steamfitter certification and eventually transition into a foreman role where he can lead larger projects while continuing to mentor younger tradespeople.
    He aspires to start a small, locally‑owned contracting business that emphasizes sustainable plumbing solutions, such as low‑flow fixtures and energy‑efficient steam heating, serving both residential
    clients and community‑focused nonprofit projects. He also hopes to formalize a volunteer program that provides pro‑bono plumbing services for low‑income families in his neighborhood, leveraging his
    compassionate nature to give back to the community.
