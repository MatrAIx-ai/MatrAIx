  career_goals: Although retired, Michael aims to publish a memoir that weaves together his experiences in education and the arts, offering insights on lifelong learning. He plans to launch a community
    workshop series for senior citizens focused on creative writing and painting, providing a structured yet imaginative outlet. He also wishes to serve as an informal advisor to the local school board
    on curriculum innovation, mentor emerging educators through a retired‑teachers association, and help create a digital archive of Manchester’s local history for public access.
