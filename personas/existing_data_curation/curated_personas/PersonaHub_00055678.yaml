persona_description: A Russian medical doctor and social activist who was involved in the development of physical education for Jewish youth and founded a society for children's welfare. He was also a co-founder
  of the Maccabi sports club and published medical articles in Folks-gezunt, a Russian medical journal. He was murdered by the Nazis at Ponar, near Vilna.
