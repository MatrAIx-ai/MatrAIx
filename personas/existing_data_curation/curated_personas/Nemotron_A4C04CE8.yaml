personas:
  professional: A curious three‑year‑old architect named Linda Wynne builds intricate tower cities from wooden blocks, balancing imaginative designs with the practical habit of sorting each piece back into
    its container, and they take pride in completing the tidy workspace before moving to the next creation.
  sports: An independent backyard athlete named Linda Wynne loves solo ball‑tossing into a small net she assembled, cheering quietly for the hometown minor‑league baseball team, the River Rapids, from the
    porch, and they prefer these solitary games over group play at the park.
  arts: A budding finger‑painter named Linda Wynne creates vibrant primary‑color canvases while humming tunes from The Wiggles and watching Pixar’s 'Finding Nemo', and they cherish the whimsical storytelling
    of Dr. Seuss books that inspire their imaginative sketches.
  travel: An aspiring explorer named Linda Wynne has enjoyed a family road trip to the Grand Canyon and dreams of building sandcastles on Santa Monica Beach, and they favor short car rides with familiar
    snacks over long flights due to their need for routine and quiet.
  culinary: A selective eater named Linda Wynne delights in apple slices with peanut butter and perfectly crispy chicken nuggets, proudly assembles their own peanut butter‑banana sandwich, and they firmly
    reject green beans, insisting on familiar flavors during meals.
  core: Linda Wynne is a solitary, curiosity‑driven three‑year‑old who balances creative block‑building with meticulous tidying, hoards stickers in a piggy bank, fusses over a mild eczema rash, prefers
    solo backyard ball games, revels in finger‑painting and Pixar shorts, dreams of beach vacations, and insists on peanut butter‑banana sandwiches while they negotiate fiercely for snack choices.
background:
  cultural: Linda is raised in a modest, middle‑class household in Palmdale, Southern California. Her family’s cultural life reflects mainstream American customs—English is spoken at home, and holidays
    such as Thanksgiving, Christmas, and the Fourth of July are celebrated with typical traditions. The desert‑adjacent landscape and the region’s proximity to aerospace facilities subtly influence her
    environment, providing occasional exposure to space‑related themes in books and media. Her family emphasizes self‑reliance and encourages independent play, aligning with her natural preference for solitude.
attributes:
  skills: '["Fine motor coordination (stacking blocks)", "Basic shape and color recognition", "Simple puzzle completion", "Vocabulary of approx. 200 words", "Imitative play with household items"]'
  hobbies: '["Stacking wooden blocks", "Sorting shape puzzles", "Reading picture books independently", "Observing insects in the garden", "Coloring with crayons"]'
  career_goals: Even at three, Linda frequently talks about building tall towers, constructing things with her hands, and exploring the stars. She imagines herself as a future builder, architect, or astronaut
    who can create and discover on her own terms. Her competitive streak fuels a desire to be the 'best' at finishing a puzzle quickly or making the highest block tower, and she aspires to master reading
    and counting so she can understand how things work and eventually contribute to real‑world projects.
