  career_goals: Although retired, Ricardo’s primary ambition is to ensure that his scientific expertise and cultural heritage are passed on to younger generations. He aims to compile a bilingual (English‑Penobscot)
    compendium that integrates tribal ecological knowledge with modern climate‑change data, to be used by local schools and policy makers. He also hopes to establish a small grant fund for Penobscot youth
    pursuing STEM studies, drawing on his network of former colleagues. Additionally, he wishes to finish a series of abstract‑geometry paintings that visually explore mathematical concepts, and to exhibit
    them alongside traditional art at the tribal cultural center. Finally, he aspires to author a memoir that reflects on the intersecting paths of science, art, and indigenous identity, preserving his
    personal narrative for his grandchildren and the broader community.
