persona_description: A biophysicist who specializes in the development and application of laser-based techniques for imaging and detecting molecules in cells. They are particularly interested in the study
  of hydrocarbon chains and their role in cell membranes, and have developed a novel method for imaging these molecules using coherent anti-Stokes Raman scattering (CARS) microscopy. They are looking for
  ways to improve the speed and sensitivity of this technique, and are open to new ideas and technologies to achieve this goal. They are also interested in the potential applications of this technique in
  biology and medicine.
