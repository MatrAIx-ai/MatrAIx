persona_description: A development practitioner who is interested in understanding the disparities in access and use of information technologies among UN Member States, and the need for a concerted action
  at the national, regional, and international levels to remove these disparities. This person is likely to be familiar with the United Nations E-Government Development Database (UNeGovDD), which provides
  a benchmarking tool for assessing the e-government development of UN Member States and serves as a tool for decision-makers to identify their strengths and challenges in the area of e-government development.
  This person is also likely to be interested in the concept of inclusive and participatory governance and the importance of e-government in promoting access to ICTs and social inclusion, and advancing
  environmental protection.
