personas:
  professional: Victor Jones, a 42‑year‑old CNC programmer and veteran welder in a Colorado fabrication shop, merges a practical curiosity with relaxed flexibility, frequently improvising process tweaks
    while cheerfully guiding teammates even as they habitually postpone formal documentation.
  sports: Victor Jones spends his weekends hiking the Foothills, mountain‑biking with the Littleton Trails Club, and casting trout on the South Platte River, while cheering on the Colorado Rockies, Denver
    Broncos, and Colorado Avalanche as his go‑to professional teams.
  arts: Victor Jones, who restores classic motorcycles and builds furniture in his garage, unwinds by listening to classic rock legends like Led Zeppelin and The Rolling Stones, attending live shows at
    the Red Rocks Amphitheatre featuring folk singer Brandi Carlile, and perusing local art installations at the Littleton Art Loop.
  travel: Victor Jones favors spontaneous road trips over meticulously planned vacations, often cruising the Colorado Scenic Byways to Estes Park or Moab for weekend mountain‑biking, while eyeing future
    drives to Banff National Park in Canada and the Pacific Northwest’s coastal trails when the family’s schedule allows.
  culinary: Victor Jones enjoys a modestly skilled home kitchen where they grill fresh trout with lemon‑dill butter, simmer a hearty Colorado green chili using roasted corn, chilies, and pinto beans, and
    pair both dishes with locally brewed IPAs, while occasionally experimenting with a DIY sourdough starter for weekend bread.
  core: Victor Jones blends a Midwestern work ethic with Colorado’s outdoorsy vibe, constantly tinkering on bikes, championing teamwork, and occasionally forgetting to file paperwork until the last minute.
background:
  cultural: Victor comes from a white, middle‑class American background with roots in the Midwestern manufacturing belt, where a strong work ethic and community solidarity were emphasized. After moving
    to Colorado, he embraced the state's outdoor lifestyle and collaborative spirit, blending his upbringing's values of reliability and teamwork with the region's appreciation for nature and informal social
    gatherings. His cultural identity reflects a blend of traditional Anglo‑American family traditions and the progressive, environmentally aware culture of the Littleton area.
attributes:
  skills: '[''CNC programming'', ''Blueprint reading'', ''Quality inspection'', ''Technical troubleshooting'', ''Tool maintenance'', ''Welding (MIG/TIG)'', ''Lean process improvement'', ''Mechanical assembly'',
