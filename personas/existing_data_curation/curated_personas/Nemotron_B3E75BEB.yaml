  hobbies: '[''Camping'', ''Craft beer tasting'', ''DIY woodworking'', ''Fishing'', ''Hiking'', ''Motorcycle restoration'', ''Mountain biking'', ''Neighborhood clean‑ups'', ''Popular science reading'',
    ''Volunteering at farmers market'']'
  career_goals: Victor aims to grow from a skilled fabricator into a team lead or shop supervisor, where he can mentor newer employees and champion continuous‑improvement initiatives. He plans to earn a
    certified welder credential and pursue a Lean Six Sigma Yellow Belt to formalize his process‑optimization knowledge. Ultimately, he envisions launching a small custom‑fabrication side business that
    blends his love for hands‑on creation with the latest fabrication technologies, while preserving the flexible schedule that lets him stay involved with his family and community.
