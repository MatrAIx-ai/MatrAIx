personas:
  professional: Felicia Jackson, a one-year-old explorer of early learning, demonstrates a methodical approach to shape‑sorting toys and building block towers, thriving on the predictable rhythm of daily
    routines and delighting in structured play that mirrors the organized values of her family.
  sports: Felicia Jackson enjoys energetic weekend outings to the local community recreation center where she participates in toddler gymnastics classes, cheerfully waves at Washington Wizards games on
    TV with the family, and practices crawling races with the District Heights Little Kickers club, blending social play with solitary exploration.
  arts: Felicia Jackson is captivated by the soulful sounds of Marvin Gaye and the rhythmic claps at neighborhood block parties, often swaying with her parents and mimicking dance steps, while also immersing
    in illustrated folk storybooks during quiet moments, shaping her budding creative identity.
  travel: Felicia Jackson has already taken short family trips to the historic streets of Annapolis and the sandy shores of Ocean City, relishes the planned route of car rides with scenic stops at local
    parks, and dreams of visiting the Smithsonian National Museum of American History, reflecting both a love for adventure and the comfort of familiar routines.
  culinary: Felicia Jackson shows a distinct palate for the gentle flavors of pureed collard greens and sweet cornbread crumbs, eagerly reaches for mashed banana and giggles when offered a whiff of fried
    chicken aroma at family gatherings, while also enjoying the tactile fun of playing with a plastic spoon.
  core: Felicia Jackson is a structured, routine‑loving infant whose curiosity and early assertiveness shine through methodical play, cultural rhythms, and a budding appreciation for savings, health, and
    community experiences.
background:
  cultural: Felicia is an African-American child raised in District Heights, Maryland, a community with deep roots in Prince George's County's Black heritage. Her family participates in local church gatherings,
    celebrates holidays with soul-food dishes such as collard greens, cornbread, and fried chicken, and values storytelling traditions that connect her to ancestors. Community events like the District Heights
    Summer Fest and neighborhood block parties expose her to music, dance, and communal support, reinforcing a sense of belonging and cultural pride.
attributes:
