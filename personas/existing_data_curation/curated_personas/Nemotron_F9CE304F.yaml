  hobbies: '["building block towers","shape-sorting toys","listening to nursery rhymes","clapping and dancing to music","outdoor park walks","interactive push-button storybooks","quiet cuddling with family"]'
  career_goals: Although only a toddler, Felicia's caregivers nurture her curiosity about helping others and learning. She is often told stories about teachers, nurses, and community helpers, which seed
    an early ambition to become a caring professional—perhaps a teacher or a health worker—so she can support other children and families. Her immediate goal is to become more independent in daily tasks
    and continue exploring learning environments at preschool and community centers.
