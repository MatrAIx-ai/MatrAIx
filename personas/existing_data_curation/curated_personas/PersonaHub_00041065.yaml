persona_description: A pharmaceutical engineer who specializes in the development of new technologies and processes to ensure that drug manufacture is lean and efficient. His research interests include
  the monitoring and control of crystal formation during the manufacturing process, with a focus on the use of image analysis tools such as the In-Situ Particle Viewer (ISPV) and Morphologi®. He aims to
  develop high quality "Six Sigma" manufacturing processes for the pharma sector, mirroring the approaches already adopted by high-tech sectors such as microelectronics.
