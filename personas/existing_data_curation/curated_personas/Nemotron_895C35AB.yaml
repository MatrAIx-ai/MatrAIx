personas:
  professional: An independent visual artist and self‑published zine creator, Suzanne Smith leverages her methodical planning, solitary focus, and avant‑garde sensibility to craft abstract journals, limited‑edition
    prints, and a modest online portfolio while they actively pursue grant funding and a solo exhibition at a Brooklyn community space.
  sports: An early‑morning jogger and occasional paddle‑boarder, Suzanne Smith favors solitary fitness routines, tracks the Brooklyn Nets and New York City FC for their competitive spark, and they practice
    gentle yoga at a modest neighborhood studio to complement their introspective lifestyle.
  arts: A fervent curator of experimental soundtracks featuring Brian Eno, William Basinski, and Tim Hecker, Suzanne Smith draws visual inspiration from Agnes Martin, Mark Rothko, and the vibrant street
    murals of the Bushwick Collective, while they weave Wallace Stevens’ poetry into their hand‑bound journals.
  travel: A meticulous solo traveler, Suzanne Smith has captured the aurora borealis over Iceland’s Þingvellir, wandered the historic lanes of Dublin during a St. Patrick’s Day stay, and they dream of a
    solitary retreat in the mist‑shrouded Scottish Highlands to sketch the lochs and refine their abstract practice.
  culinary: A modest home cook, Suzanne Smith savors rosemary‑infused potato soup, perfects a humble shepherd’s pie, and brews single‑origin pour‑over coffee, all while they nurture fresh basil and thyme
    from an indoor herb garden.
  core: Suzanne Smith is a disciplined solitary dreamer who blends storytelling traditions and Brooklyn’s avant‑garde pulse into meticulous abstract art, careful budgeting, and quiet self‑care, and they
    cherish the quiet rhythms of their own mind.
background:
  cultural: Suzanne was born and raised in the Bushwick area of Brooklyn to an Irish-American family. Her parents worked in the manufacturing sector and valued practical skills and community ties. Growing
    up in a predominantly white working-class neighborhood that later became culturally diverse, she was exposed to the eclectic art, music, and street culture of Brooklyn. Although she left school before
    ninth grade, she pursued self-directed learning through public libraries, community workshops, and the city’s vibrant cultural institutions. Her cultural identity blends the traditions of her Irish
    heritage—celebrations of St. Patrick's Day, an emphasis on storytelling, and a tight‑knit family network—with the progressive, avant‑garde artistic milieu of contemporary Brooklyn. She respects the
    multicultural fabric of the borough, which informs her art and worldview, while remaining rooted in the modest, resilient values of her upbringing.
