  career_goals: Suzanne aims to turn her solitary artistic practice into a sustainable independent career. She plans to create a cohesive body of abstract visual journals and limited-edition prints, secure
    a solo exhibition at a community art space in Brooklyn, and apply for local arts grants to fund a modest studio. Over the next year she intends to complete a GED to qualify for volunteer teaching positions
    at a community center, where she can lead quiet studio workshops for adults seeking creative solitude. Her longer-term ambition is financial independence through art sales, occasional freelance illustration
    commissions, and eventual recognition as a thoughtful, introspective artist whose work reflects both personal narrative and Brooklyn’s multicultural energy.
