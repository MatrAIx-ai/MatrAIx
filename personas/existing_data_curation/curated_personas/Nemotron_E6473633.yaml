personas:
  professional: Catherine Barnes is an organized budding community volunteer who leverages her love of structured reading series and her reliable nature to lead Girl Scouts badge projects and library reading
    programs, showcasing early leadership and methodical planning skills.
  sports: Catherine Barnes plays forward for the Midtown Youth Soccer League, idolizes the women's national team and often watches matches of the USWNT, while also cheering for the local professional team,
    the City Hawks, and participates in weekend pick‑up games at the community park.
  arts: Catherine Barnes enjoys junior piano lessons with a focus on classical pieces by Mozart and also dives into the adventurous world of the "Harry Potter" book series, while her board game nights feature
    strategic titles like "Catan Junior" and she admires the music of contemporary pop artist Billie Eilish.
  travel: Catherine Barnes prefers family road trips to nearby attractions like the National History Museum in the city and the state’s coastal beaches, but dreams of visiting Disneyland and the historic
    castles of Scotland, favoring itineraries that blend educational stops with fun activities.
  culinary: Catherine Barnes loves building her own mini pizzas topped with pepperoni, mozzarella, and pineapple, and she’s adept at whipping up chocolate chip cookies using her grandmother’s secret ingredient—sea‑salt
    sprinkled on the dough—while also enjoying classic school cafeteria meals like mac & cheese.
  core: Catherine Barnes balances a methodical love for structured projects with boundless social energy, turning every LEGO build and soccer practice into a disciplined yet joyful experience.
background:
  cultural: Catherine was raised in a white, middle‑class family in Canonsburg, Pennsylvania, a town with strong small‑community values and a tradition of active civic involvement. Her upbringing reflects
    typical Western‑Pennsylvania culture, emphasizing education, community service, and seasonal local events such as county fairs and church gatherings. While her family’s ancestry includes German and
    Irish roots common to the region, her daily life is shaped more by the close‑knit neighborhood atmosphere and the modest, family‑centered lifestyle of Allegheny County.
