  career_goals: Catherine aspires to become an elementary school teacher who can create a structured, supportive learning environment for young children. She is also interested in eventually taking on a
    leadership role, such as a school principal or community youth program coordinator, where she can design activities that promote teamwork, kindness, and academic excellence.
