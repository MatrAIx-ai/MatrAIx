  hobbies: '[''Vegetable gardening'', ''Home cooking'', ''Quilting'', ''Reading mystery novels'', ''Crossword puzzles'', ''Volunteer at local Methodist church food pantry'', ''Hiking in Pine Hills State
    Forest'', ''Restoring vintage computers'']'
  career_goals: Stefanie’s primary career ambition is to remain a steady, trusted technical resource while gradually easing into a mentorship and consulting role that offers more flexibility. She hopes
    to lead a small team that safeguards existing business‑critical applications, develop a streamlined hand‑off process for junior staff, and eventually shift to part‑time freelance work that lets her
    support local small businesses with their IT needs. While she does not seek rapid promotion, she aims to deepen her expertise in database optimization and to leave a legacy of well‑documented code before
    she considers retiring.
