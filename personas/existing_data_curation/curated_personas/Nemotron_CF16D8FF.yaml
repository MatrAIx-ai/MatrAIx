personas:
  professional: Stefanie Sage, a seasoned software developer with three decades of hands‑on experience in maintaining legacy Windows business applications, leverages they methodical debugging, VBA and COBOL
    batch scripting expertise, and patient mentorship style to deliver reliable, well‑documented solutions while embracing a relaxed, routine‑driven workflow that tolerates occasional disorganization in
    favor of steady progress.
  sports: Stefanie Sage, an avid weekend hiker who also follows the Chicago Cubs and the Chicago Bears, belongs to the local Pine Hills Trailblazers hiking club, participates in church‑sponsored softball
    leagues, and prefers low‑impact cardio over high‑intensity workouts, balancing community camaraderie with a steady, routine‑oriented fitness regimen.
  arts: Stefanie Sage, a devoted quilter and mystery‑novel enthusiast, frequently contributes patterned blankets to Methodist church fundraisers, attends community book‑clubs featuring Agatha Christie and
    Sue Grafton, and enjoys listening to classic crooners like Frank Sinatra while they stitch, reflecting a love for tradition, cooperative creativity, and occasional nostalgic tunes.
  travel: Stefanie Sage, a cautious traveler who favors road trips to historic small towns such as Asheville, NC, and Shenandoah Valley, balances a modest retirement budget with a yearning to experience
    the Tuscan countryside’s vineyards, prefers meticulously planned itineraries yet remains flexible enough to linger at a charming bed‑and‑breakfast when a local festival appears.
  culinary: Stefanie Sage, who delights in farm‑to‑table cooking, often transforms garden‑grown tomatoes, beans, and lettuce into hearty ratatouille, chicken pot pie, and fresh salsa, while also mastering
    a family‑secret apple‑cinnamon crumble, and occasionally splurges on premium olive oil or aged cheddar for a Sunday brunch, showcasing a moderate cooking skill that blends routine comfort food with
    occasional culinary experimentation.
  core: Stefanie Sage, a methodical yet relaxed mentor who blends routine‑driven coding with a love for quilting, garden‑fresh meals, and vintage computer restoration, while occasionally misplacing a notebook
    in the garden, embodies a steady, cooperative spirit tempered by a touch of endearing disarray.
background:
  cultural: Stefanie was born and raised in a small‑town setting in upstate New York, growing up in a middle‑class family of German‑Irish descent. Her upbringing emphasized practical values, community involvement,
    and self‑reliance, typical of many families in the Onondaga County region. She attended the local high school, where an early elective in computer basics sparked her interest in programming. Her cultural
    identity is shaped by a blend of Mid‑Atlantic Protestant traditions, participation in community events such as town fairs and church gatherings, and a strong sense of loyalty to family and neighbors.
    This background reinforces her preference for routine, her cooperative disposition, and her pragmatic approach to work and life.
attributes:
  skills: '[''Legacy system maintenance'', ''Visual Basic for Applications'', ''C++ (classic)'', ''SQL Server and Access'', ''Debugging and troubleshooting'', ''User support for non‑technical staff'', ''Systems
