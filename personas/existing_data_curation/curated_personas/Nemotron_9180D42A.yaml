  hobbies: '["Watercolor painting", "Gardening (rose and herb garden)", "Bird‑watching", "Knitting and crocheting", "Genealogy research", "Reading historical non‑fiction and biographies", "Visiting museums
    and art galleries", "Attending community theater and local festivals", "Listening to classical and folk music"]'
  career_goals: Although officially retired from the formal workforce, Kathleen aims to deepen her contributions to the Meadville community. She plans to enroll in a senior adult‑education program to earn
    a high‑school equivalency diploma and to complete an online certificate in museum studies, enabling her to curate a rotating local‑history exhibit at the public library. She also aspires to author a
    memoir that weaves together her family’s genealogy with the broader story of Crawford County, and to launch a monthly art‑history discussion series that invites younger residents to explore unconventional
    ideas. Ultimately, she hopes her efforts will preserve regional heritage while fostering intergenerational curiosity.
