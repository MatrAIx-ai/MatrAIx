  career_goals: Ana aims to transition from an administrative support role to a supervisory position such as Office Manager or Operations Coordinator within the next three years. She plans to obtain a Certified
    Administrative Professional (CAP) credential and complete an associate’s degree in Business Administration to deepen her managerial knowledge. Her long‑term ambition is to lead a diverse office team,
    implement efficient workflow systems, and mentor other young Latina professionals entering the workforce. Recognizing her own experience with anxiety, she also hopes to advocate for employee mental‑health
    initiatives, ensuring that workplace policies promote emotional well‑being and work‑life balance. By combining her practical skills, curiosity for process improvement, and cultural competence, she aspires
    to become a trusted liaison between management and staff.
