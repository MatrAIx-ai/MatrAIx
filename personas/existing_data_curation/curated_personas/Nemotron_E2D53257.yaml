  hobbies: '[''Metal sculpting'', ''Watercolor painting'', ''Science-fiction reading'', ''Philosophy reading'', ''DIY electronics'', ''Kinetic art construction'', ''Coastal hiking'', ''Stargazing'', ''3D
    modeling'', ''Sketch journaling'']'
  career_goals: Jay aims to transition from production-line welding to a senior specialist role that lets him blend technical mastery with artistic expression. Over the next five years he plans to obtain
    a Journeyman Welder credential and a Certified Welding Inspector certification, mentor apprentices, and establish a boutique studio that creates custom metal sculptures for architectural and marine
    clients in the San Diego area. He also hopes to teach a night class at the local community college, publish a guide on integrating artistic design into industrial welding, and eventually serve as a
    lead consultant for advanced welding processes in the aerospace and marine sectors, earning recognition for innovative techniques.
