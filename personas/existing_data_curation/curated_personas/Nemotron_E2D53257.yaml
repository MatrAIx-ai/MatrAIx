personas:
  professional: Jay Harris, a 52‑year‑old master welder with three decades of hands‑on metal‑joining expertise, channels their meticulous, organized nature and vivid imagination into crafting kinetic metal
    sculptures while strategically positioning themselves for a senior specialist role that blends industrial precision with artistic expression.
  sports: Jay Harris prefers solitary fitness activities like sunrise hikes along the Carlsbad bluffs and weekend kayaking in San Diego Bay, while they cheer on the San Diego Padres and occasionally catch
    a Lakers game when the schedule aligns with their limited social bandwidth.
  arts: Jay Harris merges their metal‑sculpting hobby with a love for watercolor, often painting seascapes inspired by Ansel Adams while listening to the ambient compositions of Brian Eno, and they draw
    creative sparks from reading Philip K. Dick and the philosophy of Nietzsche.
  travel: Jay Harris favors low‑key road trips that blend nature and stargazing, revisiting Joshua Tree for its night sky and planning a future pilgrimage to Iceland’s aurora‑rich Þingvellir National Park,
    all while they adhere to a modest travel budget dictated by their retirement savings goals.
  culinary: Jay Harris enjoys cooking grilled mahi‑mahi seasoned with lime zest and rosemary, perfecting a side of roasted cauliflower with cumin, and they relish sipping a crisp Sauvignon Blanc while reflecting
    on their latest sketch journal entry—a habit that sometimes leads to lingering kitchen messes they reluctantly clean up the next morning.
  core: Jay Harris is an imaginative, solitary craftsman who meticulously welds kinetic art, balances disciplined finances with occasional collector’s splurges, and they channel their competitive spirit
    into mastering both metal and the open sky.
background:
  cultural: Jay hails from a multi-generational Anglo-American family rooted in Southern California's manufacturing and maritime heritage. He grew up in a modest suburban neighborhood of Carlsbad, where
    the local culture values hard work, self-reliance, and a respect for skilled trades. His upbringing blends typical American middle-class values with a strong appreciation for the region’s outdoor lifestyle,
    coastal craftsman traditions, and progressive tech-savvy environment of San Diego County. While identifying as white, he embraces the diverse influences of the coastal community, including the crafts
    and artistic scene, the marine history of the area, and the collaborative spirit of local maker spaces.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Brazing'', ''Soldering'', ''Blueprint reading'', ''Material inspection'', ''CNC plasma cutting'', ''Robotic welding programming'', ''Metal sculpture fabrication'',
