  career_goals: Although retired, Victoria’s ambition centers on staying intellectually vibrant and contributing to her community. She aims to earn a senior volunteer certification so she can lead workshops
    on basic computer skills for fellow retirees. She also hopes to complete a memoir that captures her family’s history, using her growing interest in genealogy and smartphone photography. Another personal
    goal is to secure a top spot in her bridge club’s senior league, reflecting her competitive nature. Finally, she wishes to travel with her husband to the national parks of the Southeast, especially
    the Everglades, before health limitations arise.
