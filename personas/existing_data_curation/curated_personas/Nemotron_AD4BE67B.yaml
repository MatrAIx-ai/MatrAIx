personas:
  professional: Angela Novich, a seasoned IT support specialist with two decades mastering Windows, macOS, and Linux environments, leverages their methodical troubleshooting and automation expertise to
    author detailed SOPs, empower end users, and mentor junior technicians while pursuing ITIL certification and a master's degree to transition into service‑management leadership.
  sports: Angela Novich fuels their fitness routine with biweekly hikes in the Santa Monica Mountains as a member of the Pacific Trails Hiking Club, cheers on the Los Angeles Lakers during basketball season,
    follows the LA Galaxy soccer matches, and joins local charity 5K runs each spring to stay active and connected to the community.
  arts: Angela Novich channels their curiosity into landscape photography, capturing the coastal vistas of the Santa Monica hills with a Nikon D850, unwinds with historical fiction novels by Ken Follett
    while listening to the timeless sounds of Fleetwood Mac, and routinely attends the monthly First Friday art walks at downtown galleries.
  travel: Angela Novich plans their travel with a detailed spreadsheet, favoring a blend of scenic road trips along the Pacific Coast Highway, weekend escapes to Napa Valley’s vineyards, and cultural immersion
    in Kyoto’s cherry blossom season, balancing budget constraints with a desire for enriching experiences.
  culinary: Angela Novich, an avid home chef, crafts health‑focused meals like roasted beet and goat cheese salad seasoned with fresh rosemary, quinoa bowls infused with garden‑grown kale, and occasionally
    honors family tradition with a hearty lasagna, while indulging in an extra slice of chocolate cake as a late‑night treat.
  core: Angela Novich blends methodical IT expertise with a green thumb, balancing disciplined budgeting and health routines while occasionally succumbing to spontaneous garden‑tool purchases and marathon
    puzzle sessions that stretch into the night.
background:
  cultural: Angela identifies as a white American with German and Irish ancestry, raised in the suburban neighborhoods of Los Angeles County. Her upbringing in the 1970s and 1980s blended the traditional
    work ethic of her immigrant grandparents with the laid-back, outdoor-oriented lifestyle of Southern California. Family traditions include holiday gatherings, community service, and an emphasis on education
    and self-reliance. Living in Woodland Hills has exposed her to a multicultural environment while reinforcing values of practicality, independence, and cooperative community involvement. These cultural
    influences shape her balanced approach to life, blending curiosity about new ideas with respect for proven methods.
attributes:
  skills: '[''Windows OS troubleshooting'', ''macOS support'', ''Linux system administration'', ''Hardware diagnostics and repair'', ''Network configuration (wired/wireless)'', ''Remote desktop assistance'',
    ''Ticketing systems (ServiceNow, Zendesk)'', ''Documentation and SOP creation'', ''Knowledge base article writing'', ''PowerShell scripting'', ''Bash scripting'', ''Backup and cloud service management
    (Microsoft 365, Google Workspace)'', ''IT project coordination'', ''User training and education'', ''Conflict resolution and customer service'']'
  hobbies: '[''Gardening'', ''Hiking and nature photography'', ''Cooking seasonal recipes'', ''Reading historical fiction and tech journals'', ''Puzzle solving (jigsaw, crosswords)'', ''Volunteering teaching
    digital literacy to seniors'', ''Yoga'', ''Participating in maker-space workshops'', ''Community clean-up events'']'
  career_goals: Angela aims to transition from individual contributor to a leadership role within IT service management. Over the next five years she plans to earn ITIL Foundation and Practitioner certifications
    and pursue a part-time master's degree in Information Systems. She envisions managing a dedicated support team, shaping service-delivery processes, and introducing automation initiatives that reduce
    resolution time. Additionally, she aspires to develop a comprehensive internal knowledge base that improves self-service rates and to mentor junior technicians, especially women and veterans entering
    the tech field. Long-term, Angela is interested in expanding into cybersecurity governance, leveraging her practical support experience to strengthen organizational security posture, while maintaining
    a balanced workload that allows continued community volunteering.
