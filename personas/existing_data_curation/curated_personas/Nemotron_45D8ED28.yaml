personas:
  professional: Edwin Angel is a seasoned metal fabricator and CNC assembler who leverages his MIG/TIG welding and blueprint reading expertise to solve on‑the‑fly production challenges, and is racing toward
    a Certified Welder credential and a shop foreman role that will let them mentor a small crew while still carving out time for custom metal art commissions.
  sports: Edwin Angel jogs three times a week in Bell Gardens park to clear their mind, catches Los Angeles Dodgers games on weekends, plays occasional pick‑up basketball at the community center, and follows
    the LA Galaxy as their preferred soccer team, all while avoiding overly competitive league commitments.
  arts: Edwin Angel immerses themselves in LA’s vibrant street‑art scene, sketching murals and drawing inspiration from Mexican folk art displayed at local galleries, while blasting Led Zeppelin and Los
    Tigres del Norte to fuel their design ideas for custom metal sculptures.
  travel: Edwin Angel prefers short, budget‑friendly road trips that blend cultural discovery and metal‑craft exposure, such as weekend drives to Baja’s artisan markets for tinware, a planned pilgrimage
    to Oaxaca’s Día de los Muertos festivities, and a future ambition to attend a metalworking exposition in Tokyo.
  culinary: Edwin Angel enjoys cooking tamales and pozole with family recipes, perfects a smoky street‑taco al pastor on the backyard grill, and relishes the occasional cheeseburger after a long shift,
    while their pantry is stocked with spices like ancho chile, cumin, and smoked paprika for both traditional and experimental dishes.
  core: Edwin Angel blends hands‑on metal craftsmanship with a restless artistic curiosity, navigating stress‑filled workdays through improvisation, jogging, and occasional splurges on tools, all while
    wrestling with a relaxed, sometimes disorganized, approach to life.
background:
  cultural: Edwin is a second‑generation Mexican‑American raised in Bell Gardens, a city with a strong Latino presence. He grew up bilingual, speaking Spanish at home and English at school, and his family
    maintains traditions such as celebrating Día de los Muertos, preparing tamales, and attending the local parish’s festas. The community’s emphasis on craftsmanship—evident in local tinware and metalwork
    used in traditional festivals—has subtly shaped his appreciation for combining function with art. While he never married, his extended family remains a central support network, and he frequently participates
    in neighborhood block parties and cultural events, which reinforce his connection to Mexican heritage while also exposing him to the diverse artistic currents of Los Angeles.
attributes:
  skills: '[''MIG Welding'', ''TIG Welding'', ''CNC Milling'', ''Manual Machining'', ''Blueprint Reading'', ''Mechanical Troubleshooting'', ''Basic CAD (SolidWorks)'', ''Precision Measuring (Calipers, Micrometers)'',
    ''Metal Fabrication'', ''Sheet Metal Bending'', ''Creative Design Sketching'', ''Improvisational Problem Solving'']'
  hobbies: '[''Street Art Exploration'', ''Sketching'', ''DIY Metal Projects'', ''Listening to Classic Rock and Regional Mexican Music'', ''Reading Speculative Fiction'', ''Mechanical Puzzle Solving'',
    ''Jogging'', ''Volunteering at Youth Tool Safety Workshops'']'
  career_goals: Edwin aspires to move from a line assembler to a lead fabricator or shop foreman where he can mentor a small team while retaining the flexibility he values. He plans to earn a Certified
    Welder credential and complete an associate degree in Manufacturing Technology to formalize his knowledge. His deeper passion for art drives a long‑term ambition to launch a niche side business creating
    custom metal art sculptures and functional décor for local galleries and interior designers. He also seeks to develop better stress‑management habits, aiming for a role that offers stable hours and
    the possibility of occasional remote design work, allowing him to balance his competitive drive with personal well‑being.
