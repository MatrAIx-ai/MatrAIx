    and mindfulness meditation'',''Playing acoustic guitar'',''Organizing school art fairs'']'
  career_goals: Sevgi aims to become a district‑wide STEAM curriculum specialist, leading the creation of innovative, equity‑focused curricula that blend creativity with rigorous science and math instruction.
    She plans to earn a master’s degree in educational leadership to qualify for a department head or principal role, with a particular emphasis on mental‑health‑responsive schooling. She also seeks to
    mentor early‑career teachers, organize community workshops that demonstrate how to integrate art into STEM lessons, and advocate for increased resources and professional development around student wellness
    and anxiety reduction in her school district.
