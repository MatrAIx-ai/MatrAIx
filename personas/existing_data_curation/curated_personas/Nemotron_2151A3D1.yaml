personas:
  professional: Veteran elementary and middle school teacher Sevgi Metzelaar fuses her STEM expertise with a flair for abstract art, designing interdisciplinary STEAM curricula that blend hands‑on experiments,
    digital simulations, and project‑based learning while flexibly managing the classroom to accommodate spontaneous inquiry, all the while channeling her emotionally reactive nature into mindful facilitation
    and supportive peer‑mediated conflict resolution.
  sports: Active and community‑oriented, Sevgi Metzelaar participates in Saturday morning yoga classes, hikes with the Greenwich Trailblazers club through Westport River State Wildlife Area, cheers for
    the New York Yankees, New York Knicks, and New England Patriots on game days, and integrates brisk walking intervals into her garden‑care routine to offset the stress of her emotionally intense days.
  arts: Creative and culturally curious, Sevgi Metzelaar paints oil canvases inspired by the color fields of Mark Rothko and the whimsical patterns of Yayoi Kusama, writes short stories that explore abstract
    concepts, strums acoustic guitar to the melodies of Sufjan Stevens and the haunting scales of Turkish ney music, regularly attends community theater productions of Shakespeare’s comedies, and finds
    artistic renewal in listening to the improvisational jazz of Miles Davis.
  travel: An avid planner with a taste for both structured itineraries and spontaneous escapades, Sevgi Metzelaar has explored historic neighborhoods of Istanbul for family roots, wandered the canals of
    Amsterdam during a spring cycling tour, trekked the Maine coastline’s lighthouses, and dreams of a future retreat to Kyoto’s zen gardens, all while balancing travel with her commitment to local school
    events and garden maintenance.
  culinary: With a garden of rosemary, basil, and chamomile at her fingertips, Sevgi Metzelaar enjoys cooking Mediterranean dishes such as grilled halloumi with lemon‑oregano quinoa, perfects a Sunday Dutch
    apple pie using Granny Smith apples, and savors Turkish coffee brewed with cardamom, while her limited culinary confidence leads her to rely on simple, fresh salads and occasional take‑out from the
    local farm‑to‑table bistro.
  core: Dynamic educator Sevgi Metzelaar blends scientific rigor with artistic spontaneity, navigates life’s emotional currents with mindfulness, and occasionally succumbs to impulse purchases of vibrant
    paint tubes that brighten both her studio and her soul.
background:
  cultural: Sevgi grew up in a middle‑class suburban environment in the Northeast United States, where education and community involvement were highly valued. Her family heritage blends American, Dutch
    (reflected in the surname Metzelaar), and Turkish influences (evident in her first name, Sevgi, meaning "love"), giving her a nuanced multicultural perspective while identifying as white. Living in
    Greenwich, CT, she is part of an affluent, highly educated community that emphasizes civic engagement, cultural enrichment, and support for public schools. These surroundings have reinforced her collaborative
    spirit, her appreciation for the arts, and her commitment to fostering inclusive, nurturing educational spaces.
