persona_description: A wildlife biologist who focuses on the study and management of bird populations, particularly those that are at risk of being hit by aircraft. They are interested in understanding
  the factors that contribute to bird strikes on aircraft and developing strategies to reduce these risks. They may work with aviation authorities, government agencies, and conservation organizations to
  implement policies and practices that minimize the impact of bird strikes on aircraft. They are also likely to have a deep understanding of the biology and behavior of birds, as well as the engineering
  and materials science of aircraft.
