  hobbies: '["Trivia nights", "Gardening", "Bird watching", "Woodworking", "Classic rock listening", "High‑school football games", "Community theater", "Food bank volunteering", "Mentoring teens", "Genealogy
    research", "Digital photography"]'
  career_goals: Patrick aims to deepen his role as a community catalyst in Putnam County. He hopes to lead a senior‑focused mentorship program that pairs retirees with high‑school students for skill‑exchange,
    expand the local historical society’s outreach by writing a series of articles on the county’s agricultural heritage, and master digital photography to document community events. He also aspires to
    complete a certification in nonprofit leadership and to travel to historic sites across the Midwest, using his curiosity to broaden his knowledge while staying grounded in practical, service‑oriented
    goals.
