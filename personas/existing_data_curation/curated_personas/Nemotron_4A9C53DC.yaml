  career_goals: Brittany aims to expand her practice into a holistic wellness studio that combines massage, yoga, and an on‑site art gallery where she can showcase local artists and her own work. She plans
    to earn advanced certifications in orthopedic and neurologic massage within the next two years, and to become a certified instructor to teach massage techniques and self‑care workshops. She also wishes
    to develop a line of natural, locally sourced aromatherapy oils and skincare products. Ultimately, she hopes to build a sustainable business that supports her financial independence, provides a supportive
    community space, and allows her to mentor aspiring massage therapists.
