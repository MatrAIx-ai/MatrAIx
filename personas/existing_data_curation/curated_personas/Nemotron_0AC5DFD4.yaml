  career_goals: Ada aims to advance into an office manager role within the next three to five years, leveraging her organizational strengths and growing leadership capabilities. She plans to earn the Certified
    Administrative Professional (CAP) credential and pursue an associate degree in Business Administration to deepen her knowledge of budgeting, human resources, and project management. Her long‑term ambition
    includes leading a small administrative team, mentoring new hires, and introducing digital workflow automation that balances efficiency with the personal touch she values. Additionally, she is exploring
    the possibility of offering virtual assistant services on a part‑time basis, allowing her to apply her skills in a flexible, entrepreneurial setting while preserving a stable, full‑time position.
