  is also interested in the latest advancements and innovations in remote desktop software, such as Virtual Network Computing (VNC), Splashtop, and the comparison of remote desktop software. The user is
  likely to have experience with cloud computing and the use of USB hardware devices to connect remote desktop software to any PC connected to their network or the Internet. The user is also interested
  in the latest developments in desktop virtualization and the comparison of Java Remote Desktop projects.
