  career_goals: Christine dreams of becoming the star of her school’s upcoming musical and hopes to have her artwork displayed at the local community center. She imagines herself one day as a famous illustrator
    or animator who creates colorful characters that inspire children worldwide. In the short term, she aims to win the class’s spelling bee, lead her friends in a science fair project, and maybe appear
    on a local kids‑TV segment about art and creativity. Her competitive spirit fuels a desire to be recognized as the best in any challenge she undertakes.
