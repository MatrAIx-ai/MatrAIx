personas:
  professional: Christine Davis is a budding mini playwright who uses the school drama club to script whimsical skits, channeling their boundless imagination, talkative nature, and competitive spirit into
    creating elaborate character arcs.
  sports: Christine Davis loves dancing to pop hits and attends a local after‑school gymnastics class, cheerfully rooting for the Willowbrook Wolves youth soccer team while also following the national women’s
    gymnastics team for inspiration.
  arts: Christine Davis delights in sketching comic heroes, painting watercolors of fantastical landscapes, and idolizes Disney animated masterpieces like Moana, while humming along to Ariana Grande and
    reenacting scenes from the musical Matilda in their drama club.
  travel: Christine Davis has explored the city’s children’s museum and spent a weekend at the nearby seaside boardwalk, and now daydreams about visiting the interactive science exhibits at London’s Natural
    History Museum and the sun‑kissed beaches of Hawaii for a family vacation.
  culinary: Christine Davis enjoys helping to bake chocolate‑chip cookies, loves the tangy zest of pineapple on pizza, and can proudly make a simple fruit salad with strawberries, bananas, and a splash
    of orange juice, though they often forget to clean up the kitchen afterward.
  core: Christine Davis is a vivacious, curiosity‑driven seven‑year‑old who blends artistic flair with a competitive edge, thriving on attention while juggling a penchant for impulsive spending and occasional
    health‑neglect.
background:
  cultural: Christine was born and raised in San Antonio, Texas, where she experiences a blend of traditional Texan culture and the vibrant multicultural atmosphere of the city. Her family celebrates typical
    American holidays such as Thanksgiving, Fourth of July, and Christmas with barbecues, fireworks, and festive gatherings. Living in a city known for its annual Fiesta and Spanish‑language influences,
    she enjoys occasional community events that feature music, dance, and food from both Anglo and Hispanic traditions, such as listening to mariachi bands, tasting tacos, and learning a few Spanish words
    in school. Her upbringing reflects a predominantly white American household enriched by the diverse cultural texture of the San Antonio community.
