persona_description: A healthcare professional who specializes in obstetrics and neonatology, particularly in the management of fetal hemolytic anemia due to maternal-fetal Rh factor incompatibility. They
  are knowledgeable about the clinical signs and symptoms of erythroblastosis foetalis, as well as the management strategies for preventing or treating the condition. They have experience with monitoring
  the health of the first baby after delivery and the potential for transmission of antibodies from the mother to the first baby. They are also likely to be familiar with the genetic basis of Rh factor
  incompatibility and the risks and benefits of antenatal and postnatal interventions for fetal hemolytic anemia.
