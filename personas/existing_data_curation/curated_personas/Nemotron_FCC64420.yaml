personas:
  professional: Trevor Wilkerson, an aspiring junior marine explorer, merges a love for tide‑pool discoveries with building intricate LEGO ship models, applying a curious but methodical mindset that balances
    imaginative ideas and step‑by‑step practicality, and they often document their findings in a sketchbook.
  sports: Trevor Wilkerson, a member of the San Diego Kids Soccer Club U‑9 team, enjoys small‑sided games that emphasize teamwork, cycles around the neighborhood park for cardio, and cheers for the San
    Diego Loyal SC, preferring low‑pressure, close‑knit sports environments over large crowds, and they relish the camaraderie after each practice.
  arts: Trevor Wilkerson, a budding marine illustrator, draws detailed fish and crustacean sketches inspired by the murals of Wyland and the documentaries of Jacques Cousteau, paints vibrant ocean scenes
    with watercolors, and channels creative problem‑solving into LEGO wildlife builds, and they often share their artwork with friends during beach clean‑ups.
  travel: Trevor Wilkerson, who loves exploring La Jolla tide pools and has visited the Monterey Bay Aquarium with family, dreams of snorkeling at the Great Barrier Reef, plans trips with a modest budget
    and a checklist of seashells to collect, favoring small‑group guided tours over crowded resorts, and they eagerly map out each itinerary in a colorful notebook.
  culinary: Trevor Wilkerson, an enthusiastic fan of fish tacos, shrimp pasta, and clam chowder, enjoys helping their parents stir a simple seaweed salad and often snacks on goldfish crackers while drawing,
    though they sometimes refuse to eat raw vegetables, and they relish the occasional treat of homemade sushi rolls.
  core: Trevor Wilkerson, a curious yet practical eight‑year‑old, blends marine adventure with LEGO construction, prefers quiet small‑group activities, and they occasionally forget to finish chores after
    an exciting beach clean‑up.
background:
  cultural: Trevor comes from a white, middle‑class American family living in San Diego, California. His upbringing blends traditional U.S. customs—such as celebrating Thanksgiving, Fourth of July fireworks,
    and Christmas—with the relaxed West Coast coastal lifestyle. Growing up near the Pacific Ocean, he frequently visits local beaches, the San Diego Zoo, and marine museums, which foster his love for nature.
    The multicultural environment of San Diego, including frequent exposure to Mexican cuisine, Spanish words, and community festivals, has broadened his cultural awareness. His family emphasizes education,
    respect for the environment, and community service, values that shape his sense of responsibility and kindness.
attributes:
  skills: '["Reading comprehension", "Puzzle solving", "LEGO model building", "Basic Scratch programming", "Organizational skills", "Cooperative teamwork", "Empathy and kindness"]'
  hobbies: '["Reading adventure and nature books", "Exploring tide pools", "Collecting seashells", "LEGO building", "Playing soccer", "Drawing marine animals", "Scratch programming", "Bike riding", "Family
    beach clean-ups"]'
  career_goals: Trevor aspires to become a marine biologist who studies and protects the ocean life along the Southern California coast. He also imagines working as an environmental engineer designing sustainable
    solutions for coastal habitats. He plans to deepen his scientific knowledge through school science fairs, youth programs at local marine institutions, and by continuing his Scratch projects that explore
    ecological themes. Ultimately, he hopes to combine his curiosity, practical problem‑solving, and caring nature to help preserve the environment for future generations.
