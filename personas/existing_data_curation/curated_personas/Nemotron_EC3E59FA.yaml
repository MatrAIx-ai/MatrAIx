personas:
  professional: Giselle Perez, a five‑year‑old who meticulously lines up their building blocks and dreams of becoming a librarian, demonstrates early organizational talent, a reliable follow‑through on
    playtime projects, and a strong preference for routine that guide their budding professional imagination.
  sports: Giselle Perez, a five‑year‑old who participates in a community Mini‑Kick soccer program on Saturdays, avidly supports the Los Angeles Dodgers, and insists on a pre‑game snack routine of banana
    slices, balancing structured team play with personal comfort that they cherish.
  arts: Giselle Perez, a five‑year‑old who loves drawing bright dinosaurs, sings along to Disney's Frozen soundtrack, and idolizes Idina Menzel and children's musician Raffi, channels their organized imagination
    into creative expression while preferring familiar tunes.
  travel: Giselle Perez, a five‑year‑old who has visited a nearby beach, a local zoo, and a weekend stay at a grandparent’s house, dreams of exploring Disneyland and the Grand Canyon, and meticulously packs
    their travel checklist with a favorite stuffed animal and snacks to ease anxiety about new places.
  culinary: Giselle Perez, a five‑year‑old who adores mac and cheese with cheddar, peanut butter‑jelly sandwiches, and sliced strawberries, won’t touch broccoli or mushrooms, and delights in helping stir
    batter for chocolate chip cookies, showcasing a picky yet enthusiastic palate that they proudly display.
  core: Giselle Perez, a five‑year‑old whose love for routine, meticulous organization, and occasional worry creates a cautious yet methodical approach to play, money, health, and adventure that they follow.
background:
  cultural: Giselle grows up in a bilingual Puerto Rican household in Westfield, Massachusetts. At home, her parents speak Spanish alongside English, and she participates in cultural traditions such as
    celebrating Three Kings Day, helping her grandmother prepare arroz con pollo, and dancing to salsa music during family gatherings. Her family maintains strong ties to the local Puerto Rican community,
    attending cultural festivals, the Catholic parish’s celebrations, and community picnics. This blend of Caribbean heritage and New England environment enriches her language skills, family values, and
    appreciation for cultural music and food.
