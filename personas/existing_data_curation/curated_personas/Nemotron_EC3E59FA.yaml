  career_goals: Giselle dreams of a future where she can keep things orderly and help others. She often says she wants to be a kindergarten teacher because she loves the idea of guiding children through
    a predictable classroom routine. She also imagines becoming a librarian, attracted by the quiet, organized environment of bookshelves, or a veterinarian, reflecting her compassionate nature and desire
    to protect animals. These ambitions are shaped by her preference for structure, love of routine, and sensitivity to the well‑being of others.
