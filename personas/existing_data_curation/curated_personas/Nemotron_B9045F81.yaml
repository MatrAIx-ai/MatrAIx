personas:
  professional: Rita Newman, a 42‑year‑old community‑focused data coordinator, leverages her STEM background and Excel wizardry to streamline volunteer project records while using her natural knack for
    people‑pleasing and flexible routine to keep the neighborhood garden club’s events running smoothly, even if a few spreadsheets occasionally sit untouched until the last minute.
  sports: Rita Newman fuels her love of movement through weekly Zumba sessions, plays catcher on the Westchester Women’s Softball League, cheers loudly for the New York Yankees in summer and the New York
    Knicks during basketball season, and occasionally joins the local women’s running club for the Hudson Valley 5K.
  arts: Rita Newman stars in the community theater’s annual production of “Our Town,” devotes Saturday evenings to a book‑discussion group that dissects the works of Jane Austen and Toni Morrison, and unwinds
    with playlists featuring Adele and Lin‑Manuel Miranda while displaying a modest collection of Monet prints in her living room.
  travel: Rita Newman enjoys weekend getaways to the Hudson Valley’s apple orchards and historic Hudson towns, takes the kids on annual summer trips to the beaches of Cape Cod, dreams of a cultural pilgrimage
    to Ireland’s County Kerry but postpones it for now due to family and budgeting priorities.
  culinary: Rita Newman relishes cooking hearty family dinners such as rosemary‑roasted chicken, homemade lasagna, German potato salad, and Irish soda bread baked with fresh garden thyme, often sprinkling
    a generous pinch of garlic beyond the recipe, and treats herself to a slice of apple pie whenever a new baking gadget arrives.
  core: Rita Newman balances a love for community‑driven data work and lively Zumba beats with a habit of color‑coding budgets while occasionally misplacing the very spreadsheets she prides herself on.
background:
  cultural: Rita comes from a White, middle-class American background with deep roots in the Westchester County region. Her family’s heritage includes Irish and German ancestors, and she was raised in a
    traditional, outward-looking household that valued community involvement, church gatherings, and regular family holidays. She embraces the suburban New York culture of neighborly support, local festivals,
    and a strong emphasis on maintaining a balanced, family-centered lifestyle.
attributes:
  skills: '[''Data analysis'', ''Basic Python programming'', ''Microsoft Excel and PowerPoint'', ''Computer troubleshooting'', ''Project coordination'', ''Community outreach'', ''Facilitation of group activities'']'
  hobbies: '[''Gardening club'', ''Book club'', ''Volunteer tech tutoring'', ''Cooking'', ''Zumba fitness classes'', ''Community theater'']'
  career_goals: Rita aims to re-enter the workforce in a role that blends her technical skills with her passion for helping others, such as a part-time administrative assistant, data entry specialist, or
    community program coordinator. She plans to take a short certification in Microsoft Office Specialist and attend local workshops to refresh her coding skills, with the long-term ambition of contributing
    to a nonprofit's data-driven initiatives while maintaining a flexible schedule that accommodates her family commitments.
