  hobbies: '[''Gardening (tropical plants and herbs)'', ''Cooking traditional Dominican cuisine with Floridian twists'', ''Fishing in local waters'', ''Walking and light hiking'', ''Attending church and
    community festivals'', ''Listening to merengue and bachata music'', ''Reading historical biographies'', ''Woodworking (small furniture and crafts)'', ''Supporting grandchildren’s education and activities'']'
  career_goals: Although retired from formal employment, Carlos aims to remain an active contributor to his community. He plans to volunteer as a cultural liaison for Dominican festivals and local events,
    helping to preserve and share his heritage. He wishes to mentor younger Dominican immigrants and high school students, guiding them in language skills, career planning, and cultural pride. Carlos also
    hopes to expand the community garden project he participates in, introducing new sustainable practices he learns out of curiosity. Additionally, he aspires to develop a small artisanal food stand at
    local markets, offering a fusion of Dominican and Floridian flavors, and to take a few woodworking classes to create functional items for friends and family.
