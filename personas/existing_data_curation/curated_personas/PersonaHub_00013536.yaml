persona_description: An industrial emissions control researcher at the National Institute of Standards and Technology (NIST) who is testing and calibrating different types of pitot tubes used in smokestack
  emissions monitoring. He is conducting research on the accuracy and efficiency of these tubes, and is developing a method to eliminate the need for yaw-nulling, a labor-intensive process that is currently
  used to calibrate the pitot tubes. He is confident that the savings from this method will be substantial.
