persona_description: A professional educator in the field of education, specifically focusing on the implementation and expansion of Extended Learning Time (ELT) programs in the Boston Public Schools (BPS).
  This individual is knowledgeable about the various forms of ELT and their benefits for BPS students, including the creation of more time for enrichment and targeted learning. This persona is responsible
  for overseeing grants and District initiatives that support ELT and building a web of support for all students to access year-round learning opportunities. They are also involved in research on expanded
  learning time in BPS and have experience with the main programs and initiatives, such as New School Hours for Schedule A ELT Schools, Researching Expanded Learning Time in BPS, and the February 1 - 5th
  Quarter Portfolio Selection Announcement.
