  career_goals: He aims to leverage his curiosity about logistics technology to move into a supervisory role within the next two to three years, eventually becoming a warehouse manager or process‑improvement
    specialist. To achieve this, Chee plans to complete a bachelor's degree in Supply Chain Management while earning industry certifications such as the Certified Supply Chain Professional (CSCP). His long‑term
    ambition is to design more efficient, employee‑friendly workflows that reduce stress and improve workplace harmony, reflecting his compassionate and cooperative values.
