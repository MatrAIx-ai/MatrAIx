personas:
  professional: Daryhl Stephens, a budding junior coder and neighborhood event organizer, channels their curiosity and practical mindset into building interactive Scratch stories that teach teamwork, while
    their disciplined planning and sociable charisma keep the youth choir rehearsals running smoothly, even as they worry about meeting their own high standards.
  sports: Daryhl Stephens spends afternoons shooting hoops with friends in the Eastside Jaguars youth basketball league, eagerly follows the NBA’s Chicago Bulls on game nights, and approaches fitness with
    disciplined practice drills while using their natural sociability to rally teammates, though they sometimes stress over missing a shot.
  arts: Daryhl Stephens, a member of their church’s youth choir, delights in singing hymns alongside pop hits from artists like Beyoncé and Shawn Mendes, reads adventure series by Rick Riordan, and spends
    weekend evenings constructing LEGO masterpieces inspired by scenes from the LEGO Movie, all of which fuel their vibrant imagination and collaborative spirit, and they often share their creations with
    friends during playdates.
  travel: Daryhl Stephens prefers day‑trip adventures with family, having explored the Smithsonian’s National Museum of African American History and Culture in Washington, D.C., and the Grand Canyon’s rim,
    while dreaming of a future vacation to Tokyo’s vibrant festivals where they could combine scavenger hunts with cultural learning, and they love to plan each outing with detailed maps and checklists.
  culinary: Daryhl Stephens enjoys classic kid‑friendly meals like pepperoni pizza and mac and cheese, but also takes pride in preparing fresh garden salads with cherry tomatoes, cucumbers, and basil, and
    loves blending fruit smoothies with strawberries, bananas, and a splash of orange juice, though they sometimes sneak extra chocolate chips into their trail mix when nobody’s watching.
  core: Daryhl Stephens is a curious, meticulously organized ten‑year‑old who thrives on leading friends in basketball games and choir rehearsals, yet their constant worry often turns a simple LEGO build
    into a high‑stakes project, and they frequently double‑check every detail to feel secure.
background:
  cultural: Raised in Conyers, Georgia, Daryhl grew up in a close‑knit African‑American family with strong ties to the local Southern Baptist church. Family gatherings often center around gospel music,
    shared meals, and storytelling about ancestors and civil‑rights history. The community values mutual support, mentorship, and resilience, shaping his compassionate and cooperative nature. He celebrates
    cultural traditions such as Juneteenth, enjoys the local soul food cuisine, and participates in neighborhood block parties, which reinforce his sociable personality and sense of belonging.
attributes:
  skills: '[''organized project coordination'', ''public speaking'', ''basic Scratch programming'', ''peer tutoring in math and reading'', ''event planning'', ''empathetic listening'', ''detail‑oriented
    note taking'', ''team collaboration'', ''time management'', ''problem solving'']'
  hobbies: '[''basketball'', ''church youth choir singing'', ''LEGO building'', ''reading mystery books'', ''Scratch coding projects'', ''organizing scavenger hunts'', ''rock collecting'', ''community gardening'',
    ''attending cultural festivals'', ''learning African‑American history'']'
  career_goals: He envisions a future where he can combine his love for helping others with his practical mindset. Daryhl hopes to become a teacher or community organizer who designs programs that empower
    local youth. He also dreams of becoming a civil engineer to design safe, sustainable neighborhoods, and is fascinated by the idea of being an astronaut or scientist, but he sees education and mentorship
    as his immediate goal. He wants to earn scholarships, graduate with high honors, and later return to Conyers to mentor younger children.
