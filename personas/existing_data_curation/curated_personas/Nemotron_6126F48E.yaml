  hobbies: '[''Cooking Southern and soul food'', ''Reading historical fiction'', ''Personal development books'', ''Church choir participation'', ''Youth mentorship volunteering'', ''Gardening'', ''Nature
    walks'', ''Attending community festivals'', ''Pilates'', ''Quilting'']'
  career_goals: She aims to advance from sales associate to store manager within the next two years, leveraging her leadership and organizational skills to improve store performance. Long‑term, Shanika
    aspires to become a district manager or retail operations specialist, overseeing multiple locations and implementing data‑driven strategies. She also dreams of opening her own boutique that highlights
    African‑American designers and sustainable fashion, using her retail expertise to foster community entrepreneurship. Continuing education, such as a bachelor’s in business management, is part of her
    plan.
