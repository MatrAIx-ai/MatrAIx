personas:
  professional: Shanika Slaton is a seasoned retail sales professional with 15 years of experience who blends data‑driven inventory control and visual merchandising with a compassionate leadership style,
    leveraging their curiosity for emerging tech to push for a store manager promotion within two years while planning a future boutique.
  sports: Shanika Slaton enjoys casual fitness through weekly Pilates sessions and regular nature walks with the community Green Trails walking club, while cheering on the nearby NBA team, the Timberwolves,
    and the NFL’s Vikings during the fall season.
  arts: Shanika Slaton sings in the church choir performing gospel classics of Mahalia Jackson, attends local art fairs featuring works by Kehinde Wiley, and relaxes quilting with patterns inspired by the
    designs of Georgia O'Keeffe.
  travel: Shanika Slaton prefers short, purposeful road trips that blend cultural immersion with relaxation, having explored Charleston’s historic district and the Georgia coast, while dreaming of a future
    tour of Ghana’s textile markets to source sustainable fabrics for their boutique.
  culinary: Shanika Slaton, an adept home chef, perfects Southern staples such as fried chicken with a buttery hot‑sauce glaze, collard greens simmered with smoked turkey, and sweet potato casserole topped
    with toasted marshmallows, often incorporating fresh herbs like thyme and rosemary from their garden.
  core: Shanika Slaton blends a data‑savvy retail mind with soulful Southern hospitality, balancing disciplined ambition with a love for community gatherings, occasional splurges, and a habit of humming
    hymns while organizing inventory.
background:
  cultural: Shanika’s cultural background is rooted in African‑American Southern traditions. Growing up in East Texas, she was shaped by the close‑knit church community, family gatherings centered around
    music, food, and storytelling, and the resilience of the Black community in Longview. She celebrates cultural milestones such as Juneteenth and Black History Month, and she incorporates soulful music,
    gospel, and R&B into her daily life. Her heritage influences her values of mutual support, perseverance, and pride in Black entrepreneurship, which inform both her professional ambitions and community
    involvement.
attributes:
  skills: '[''Customer service'', ''Sales and upselling'', ''Inventory management'', ''POS system operation'', ''Visual merchandising'', ''Conflict resolution'', ''Team leadership'', ''Training and onboarding'',
