  career_goals: Marilyn aims to become a senior wealth manager and eventually a partner at her firm, specializing in comprehensive financial strategies for middle‑class families in Grand Rapids. She plans
    to obtain the Certified Financial Planner (CFP) designation and add the Chartered Financial Analyst (CFA) credential to reinforce her analytical credibility. Over the next five years, she hopes to lead
    a community outreach program that provides financial literacy workshops in local schools and churches, positioning herself as a trusted resource for financial well‑being. Long‑term, she envisions launching
    her own boutique advisory practice that integrates socially responsible investing and holistic life‑planning services, allowing for greater flexibility and deeper client relationships while implementing
    systematic processes that help manage her own anxiety.
