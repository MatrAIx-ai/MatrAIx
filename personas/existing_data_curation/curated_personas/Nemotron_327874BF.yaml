  career_goals: Jesus aims to earn an Associate's degree and later a Bachelor's in Education, with a focus on bilingual instruction, so he can become a fully certified teacher in the Los Angeles Unified
    School District. He is motivated to integrate new pedagogical approaches—such as flipped classrooms and project‑based learning—while maintaining the practical stability of a teaching career. In the
    medium term, he hopes to take on a lead teaching assistant role or become a curriculum coordinator, designing culturally responsive materials for Mexican‑American students. Long‑term, Jesus envisions
    founding a community‑based tutoring program that offers free academic support and mentorship to underserved youth in Inglewood, combining his competitive drive with a desire to give back to his community.
