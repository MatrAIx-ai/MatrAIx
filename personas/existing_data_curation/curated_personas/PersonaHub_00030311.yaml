persona_description: A scholar of Jewish religious texts, particularly those related to the teachings of the Ḥasidim sect of medieval German Jews. Interested in the asceticism, humility, and ethical behavior
  attributed to the sect, and seeks to understand the combined teachings of its leaders, Samuel the Ḥasid, Judah the Ḥasid of Regensburg, and Eleazar ben Judah of Worms. The persona is knowledgeable about
  the Sefer Ḥasidim, a highly valuable account of the day-to-day religious life of the Ḥasidim, and seeks to analyze its teachings and contributions to Jewish religious practice.
