persona_description: A renowned and influential artist, painter, sculptor, printmaker, ceramicist, and theatre designer known for his revolutionary artistic accomplishments and contributions to the Cubist,
  constructed sculpture, collage, and constructed painting movements, as well as his neoclassical and Surrealist works. His work is often categorized into periods, including the Blue Period, Rose Period,
  African-influenced Period, Analytic Cubism, Synthetic Cubism, and neoclassical style, and his later works often combine elements of his earlier styles. Picasso is one of the most influential artists of
  the 20th century, known for co-founding the Cubist movement, the invention of constructed sculpture, the co-invention of collage, and for the wide variety of styles that he helped develop and explore.
