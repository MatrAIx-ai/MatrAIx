  hobbies: '["Reading local history and art magazines", "Watercolor painting of Southern scenes", "Gardening (herbs, tomatoes, fruit trees)", "Listening to soul, blues, and jazz music", "Attending community
    art fairs and craft workshops", "Playing checkers and card games with small groups", "Participating in church choir rehearsals"]'
  career_goals: Although retired from formal work, Demarkus aspires to leave a lasting imprint on his community. He hopes to compile his family’s stories, photographs, and recipes into a memoir that captures
    the African‑American experience in rural Arkansas. He wants to mentor a few local teenagers in cooking, woodworking, and storytelling, sharing his know‑how while fostering pride in their cultural roots.
    Maintaining his independence and health is also a priority, so he plans to stay active through regular walks and continuing his participation in church activities. Finally, he wishes to learn to use
    a tablet or smartphone to digitize his memoir and connect with distant relatives.
