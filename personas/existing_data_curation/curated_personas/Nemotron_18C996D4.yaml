personas:
  professional: A retired master craftsman and community storyteller, Demarkus Ibrahim blends decades of woodworking, home‑cooked Southern cuisine, and gospel choir leadership into informal mentorship,
    channeling a relaxed yet competitive spirit into hands‑on workshops for local teens.
  sports: A lifelong fan of the Arkansas Razorbacks football and baseball teams, Demarkus Ibrahim stays active through daily walks along the town’s oak‑lined streets, occasional senior softball games at
    the community park, and weekly checkers tournaments that double as mental exercise.
  arts: Immersed in the sounds of Miles Davis, Aretha Franklin, and B.B. King, Demarkus Ibrahim spends afternoons at the Dumas library flipping through art magazines, attends local pottery demos, and paints
    watercolor scenes of church interiors inspired by the soulful rhythms that echo in his kitchen while he cooks.
  travel: Preferring road trips over long flights, Demarkus Ibrahim has explored Memphis’s blues clubs, the historic streets of New Orleans, and the river towns of the Mississippi Delta, yet dreams of a
    modest cruise to the Caribbean’s quiet islands once their health and finances allow.
  culinary: An accomplished home chef, Demarkus Ibrahim crafts collard greens simmered with smoked turkey, sweet‑potato pie spiced with nutmeg, and slow‑roasted catfish glazed with a secret blend of cayenne
    and molasses, often seasoning dishes with fresh garden herbs like thyme and rosemary while humming gospel hymns.
  core: Demarkus Ibrahim is a curious, solitary elder who weaves storytelling, woodworking, and gospel into community mentorship, yet battles disorganization, occasional worry, and a competitive streak
    that fuels both their creative pursuits and budget splurges.
background:
  cultural: Demarkus’s cultural identity is rooted in the Southern African‑American experience of the Deep South. Raised in a modest, close‑knit black community in Dumas, Arkansas, he internalized the values
    of self‑reliance, church fellowship, and oral tradition. His grandparents were part of the Great Migration’s reverse movement, returning to farm the family land after World War II, which instilled a
    strong respect for the land and community stewardship. The church has been central to his life, shaping his music, moral outlook, and sense of collective responsibility. He carries the culinary heritage
    of soul food, the rhythmic cadence of gospel singing, and the storytelling customs that link generations. While his formal education ended before ninth grade, his lived experience reflects a tapestry
    of resilience, cultural pride, and an enduring curiosity about the broader world.
attributes:
