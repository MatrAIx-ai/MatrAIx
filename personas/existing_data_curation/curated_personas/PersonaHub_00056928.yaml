persona_description: A marine biologist who specializes in the study of marine ecosystems, particularly those in oligotrophic seas. Biller et al.'s research on photoautotrophic vesicles in Prochlorochoccus
  and Synechoccus is of particular interest. They are interested in understanding the functions and abundance of vesicles in marine ecosystems, and how they may influence microbial processes and carbon
  fluxes. They are also interested in the potential for vesicles to support heterotrophic bacteria and facilitate horizontal gene transfer.
