persona_description: A climate justice activist from Africa who is passionate about advocating for the rights of marginalized communities affected by climate change. She/he is knowledgeable about the impacts
  of climate change on agriculture in Africa and the vulnerability of African communities to extreme weather events. The person is likely to be involved in organizing and participating in protests and demonstrations
  against climate change policies and practices that disproportionately affect the poor and marginalized. The person is also likely to be well-versed in the United Nations Framework Convention on Climate
  Change and its various conferences, and is aware of the current state of negotiations and the challenges faced by developing countries in achieving meaningful climate action.
