  hobbies: '[''Creating TikTok videos'', ''Drama club and improvisational acting'', ''Cheerleading and gymnastics'', ''Soccer'', ''Listening to pop and indie music'', ''Reading YA fiction'', ''Sketching
    and doodling'', ''Video gaming (Minecraft, Among Us)'', ''Journaling for stress relief'']'
  career_goals: Lindsey envisions a future that blends her love of communication, performance, and helping others. In the short term, she wants to join the school media club, build a portfolio of video
    segments, and secure a summer volunteer role at the local public‑access television station. Her longer‑term ambition is to study communications or journalism in college and become a broadcast journalist
    or TV host for a regional news outlet. She also dreams of using her platform to raise awareness about teen mental‑health issues, possibly branching into public‑relations work for a nonprofit focused
    on youth wellbeing. Occasionally, she imagines a side career as a social‑media influencer who creates relatable, uplifting content for her peers.
