personas:
  professional: Runette Maruf blends meticulous data‑driven forecasting with a warm, customer‑focused communication style, excelling as an electronics retail associate who demystifies complex tech specs
    for shoppers while they apply data‑driven inventory forecasts to streamline store operations.
  sports: Runette Maruf fuels her competitive spirit by training for half‑marathons on the trails of Great Falls Park, leading a weekly Zumba class at a community center, cheering for the Washington Capitals
    and DC United, and while they regularly log 30‑mile runs with the DC Road Runners club during the spring racing season.
  arts: Runette Maruf weaves artistic appreciation into their routine by visiting the Smithsonian National Air and Space Museum, discussing the latest novel at their book club, dancing to Beyoncé and Miles
    Davis on weekends, and catching productions at the Shakespeare Theatre Company while swapping board‑game strategies over a game of Catan with friends.
  travel: Runette Maruf balances their love of structured itineraries—having organized a museum‑centric weekend in Washington, a culinary road‑trip through Asheville, and a tech conference tour of Austin—with
    occasional spur‑of‑the‑moment escapes to nearby Virginia Beach, while they eagerly eye future adventures in Tokyo’s Akihabara district and the historic streets of Charleston, all while staying within
    a moderate travel budget.
  culinary: Runette Maruf brings their intermediate cooking skills to the kitchen, mastering Jamaican‑style jerk chicken with all‑spice rubs, simmering hearty collard greens with smoked turkey, and crafting
    coconut rice and bean bowls, while also delighting in tasting the latest ramen bowls in Alexandria and exploring pop‑up taco trucks in Fairfax for fresh culinary inspiration.
  core: Runette Maruf tackles life with a curiosity‑driven pragmatism, treating every new gadget, half‑marathon route, or recipe as a puzzle to solve, even if that means juggling three alarm clocks to fit
    a Zumba class before bedtime, and they still manage to smile through the chaos.
background:
  cultural: Raised in the vibrant Black community of the Washington, D.C. metropolitan area, Runette’s family has deep roots in African‑American traditions and the broader African diaspora. Her parents,
    both alumni of an HBCU, emphasized education, community service, and cultural pride. She grew up celebrating Juneteenth, Kwanzaa, and Caribbean festivals, and stays connected to the church and local
    activist groups. This heritage informs her collaborative spirit, her commitment to uplifting others, and her enthusiasm for sharing Black culinary, musical, and storytelling traditions with friends
    and coworkers.
attributes:
  skills: '[''Technical troubleshooting'', ''Product knowledge (electronics & computers)'', ''Data analysis (Excel, basic SQL)'', ''Inventory management'', ''POS system operation'', ''Sales forecasting'',
    ''Effective communication'', ''Customer service excellence'', ''Conflict resolution'', ''Visual merchandising'', ''Team collaboration'', ''Basic Python scripting'']'
  hobbies: '[''Community STEM mentorship'', ''Tech meetups and hackathons'', ''DIY electronics projects'', ''Zumba and group fitness classes'', ''Book club participation'', ''Board‑game nights'', ''Cooking
    traditional African‑American and Caribbean cuisine'', ''Exploring local restaurants'', ''Running (half‑marathon training)'', ''Visiting museums (e.g., Smithsonian)'']'
  career_goals: Runette aims to translate her curiosity for technology and practical problem‑solving into a leadership role within retail. Over the next three years she plans to earn a certified retail
    management credential and move from sales associate to assistant store manager, eventually becoming a store manager for a major electronics retailer. Long‑term, she envisions leveraging her STEM background
    to transition into a regional operations or product‑training position, where she can design data‑driven sales strategies and mentor new talent across multiple locations. She also dreams of launching
    a small community‑focused tech workshop series that blends retail insights with hands‑on STEM education.
