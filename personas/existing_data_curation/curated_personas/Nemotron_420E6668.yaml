personas:
  professional: Kathleen Sternstein, a seasoned insurance sales specialist with three decades of experience, blends meticulous risk assessment and data‑driven forecasting using Excel and Tableau with a
    practical curiosity that drives her to explore innovative AI‑assisted underwriting, while her assertive yet compassionate communication style helps her mentor emerging agents and negotiate complex policies
    as she pursues a regional sales manager role.
  sports: Kathleen Sternstein embraces the outdoors through regular hikes in the Black Hills and seasonal cross‑country skiing, participates in a local walking club that supports veteran health, roots for
    the South Dakota State Jackrabbits in college athletics and the Kansas City Chiefs in the NFL, and balances her fitness routine with occasional yoga sessions at the senior center.
  arts: Kathleen Sternstein cultivates her creative side by photographing Black Hills vistas in the style of Ansel Adams, knitting while listening to podcasts on historical fiction, attending community
    theater productions of classic American plays, and drawing inspiration from folk musician John Denver and painter Edward Bier, which enriches her book club discussions and personal reflections.
  travel: Kathleen Sternstein favors road‑trip itineraries that combine camping under starlit skies with comfortable stays at historic lodges, having explored Yellowstone, the Grand Tetons, and a recent
    adventure to New Zealand’s South Island, while she dreams of trekking Patagonia’s Torres del Paine, always planning trips with a detailed spreadsheet to balance budget, family commitments, and her love
    for nature.
  culinary: Kathleen Sternstein, an avid home cook with modest skill, delights in preparing bison stew with juniper berries and wild mushrooms harvested from her garden, perfecting sourdough bread using
    heritage wheat, and experimenting with pickled heirloom carrots, yet she sometimes over‑spices dishes while sampling recipes from regional chefs like Sean Sherman.
  core: Kathleen Sternstein is a pragmatic, curiosity‑driven insurance veteran who balances analytical rigor with community compassion, hiking the Black Hills, knitting in quiet moments, and meticulously
    budgeting while occasionally splurging on garden tools, embodying a resilient Midwestern spirit with a flair for AI‑enhanced risk solutions.
background:
  cultural: Kathleen is a white American who grew up in the Midwest before moving to Rapid City, South Dakota for her career. Her upbringing emphasized a pragmatic work ethic, community responsibility,
    and modest curiosity about new ideas. Living in the Black Hills region has immersed her in a landscape that values the outdoors, self‑reliance, and respect for the Lakota Nation’s cultural heritage.
    As a widowed veteran’s spouse, she maintains strong ties to military families and often volunteers with related organizations. Her cultural identity blends Midwestern practicality, South Dakota’s frontier
    spirit, and a gentle embrace of both traditional community rituals and contemporary technological tools.
attributes:
  skills: '[''Insurance policy analysis'', ''Risk assessment'', ''Customer relationship management (CRM)'', ''Sales negotiation'', ''Data analysis (Excel, Tableau)'', ''Public speaking'', ''Regulatory compliance'',
    ''Financial planning basics'', ''Digital marketing'', ''Community outreach'']'
  hobbies: '[''Hiking in the Black Hills'', ''Gardening (vegetables and native flowers)'', ''Reading historical fiction and popular science'', ''Volunteer work at the local senior center and veteran support
    groups'', ''Knitting and crochet'', ''Nature photography'', ''Cooking regional dishes'', ''Participating in a genealogy club'', ''Book club meetings'', ''Community emergency preparedness drills'']'
  career_goals: Kathleen aims to advance into a regional sales manager role overseeing the Black Hills district, where she can shape strategy, mentor emerging agents, and drive growth for both personal
    and company success. She plans to earn the Chartered Property & Casualty Underwriter (CPCU) designation to deepen her technical expertise and to explore niche markets such as small‑business commercial
    lines. Passionate about community, she also envisions launching a boutique agency that partners with local businesses and veteran-owned enterprises, integrating emerging technologies like AI‑assisted
    underwriting to improve efficiency while preserving the personalized service her clients value.
