    solving (crosswords, Sudoku)", "Home automation projects", "Knitting", "Attending local theater performances"]'
  career_goals: Sandra aims to advance to a senior systems analyst role within the next three years, positioning herself to lead cross‑functional technology initiatives that improve operational efficiency
    and user experience. She plans to earn professional certifications such as CBAP, PMP, and ITIL Expert to solidify her expertise. Long‑term, she envisions moving into an IT manager or director position
    where she can shape strategic digital transformation projects, mentor junior analysts, and champion workplace practices that support mental well‑being and collaborative culture.
