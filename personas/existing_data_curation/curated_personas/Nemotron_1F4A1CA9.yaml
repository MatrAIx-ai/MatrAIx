personas:
  professional: Madelyn Tharp, a seasoned retail leader with a STEM background, blends data‑driven sales analysis, meticulous inventory control, and inventive visual merchandising that features local artists,
    while they mentor emerging managers through a budding regional mentorship program and champion a harmonious workplace.
  sports: Madelyn Tharp, an avid walker, enjoys daily strolls along the River Greenway trail and participates in the Roanoke Senior Walking Club, while they cheer on the Roanoke Rail Yard Dawgs hockey team
    and the Virginia Tech Hokies football squad on game nights, and occasionally join leisurely shuffleboard games at the community center.
  arts: Madelyn Tharp, a watercolor enthusiast inspired by Monet and O'Keeffe, regularly exhibits their blooms at the Roanoke Museum of Art’s senior artists showcase, attends performances at the Virginia
    Repertory Theatre, and listens to Beethoven’s Symphony No. 9 and the pianist Lang Lang while crafting new community‑focused store displays.
  travel: Madelyn Tharp, a lover of scenic getaways, frequently drives the Blue Ridge Parkway to admire fall foliage, has visited New York City’s MoMA and London’s British Museum, and dreams of a grand
    tour of Italy’s Renaissance cities, balancing such trips with a modest travel budget and family commitments.
  culinary: Madelyn Tharp, a modest home cook, delights in preparing rosemary‑infused grilled chicken with lemon butter sauce and fresh raspberry‑rose jam using herbs from their garden, while they savor
    Virginia ham and crab cakes at local bistros and experiment with new recipes during quiet afternoons.
  core: Madelyn Tharp, a curiosity‑driven yet worry‑prone septuagenarian, weaves art, data, and community service into a life of harmonious service, meticulous budgeting, and gentle self‑care, and they
    approach each day with measured optimism.
background:
  cultural: Madelyn was born and raised in Virginia’s Shenandoah Valley in a middle‑class white family that emphasized education, community service, and an appreciation for the region’s natural beauty and
    cultural traditions. She earned a bachelor's degree in a STEM field from Virginia Tech, fostering a lifelong curiosity. After college, she settled in Roanoke, where she has lived for most of her adult
    life. She actively participates in local arts initiatives, supports Appalachian craft traditions, and attends her Methodist church’s fellowship activities. Her cultural identity blends Southern hospitality,
    a progressive outlook shaped by her education, and a deep love for the arts and community engagement.
