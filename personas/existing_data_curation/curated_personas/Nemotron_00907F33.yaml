  career_goals: Approaching the next phase of his career, Nilay aims to transition into a strategic advisory role where he can influence large‑scale engineering projects with an emphasis on sustainability
    and digital integration. He seeks to leverage his competitive drive to lead high‑visibility initiatives that push the boundaries of conventional engineering while delivering measurable ROI. Nilay also
    intends to build a legacy by establishing a mentorship program for underrepresented South Asian engineers in Texas and by publishing thought pieces on the intersection of engineering, business strategy,
    and emerging technologies. Ultimately, he aspires to serve on an executive board or as a senior consultant for firms looking to bridge technical excellence with market relevance.
