  career_goals: She aims to move into a supervisory role such as Facilities Coordinator at a community center or senior housing facility, where she can leverage her organizational abilities and mentor junior
    staff. Over the next few years she plans to obtain a certification in Facility Management and possibly launch a small side business offering eco‑friendly cleaning and upcycled décor services to local
    businesses. Additionally, she hopes to curate a community art space that blends her love for abstract art with sustainable practices.
