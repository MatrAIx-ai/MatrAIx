  hobbies: '[''Hiking'', ''Trail running'', ''Snowshoeing'', ''Landscape photography'', ''Acoustic guitar'', ''Songwriting'', ''Reading science fiction'', ''Attending craft fairs'', ''Volunteering at food
    bank'']'
  career_goals: Sylvia aims to complete her accounting degree and earn a CPA license within the next three years. She hopes to transition into a senior auditing role at a regional firm, eventually specializing
    in forensic accounting or sustainability reporting. She also dreams of using her love for flexibility to start a boutique bookkeeping consultancy that serves small businesses in the Rocky Mountain region,
    allowing her to blend practical accounting work with occasional travel and community projects.
