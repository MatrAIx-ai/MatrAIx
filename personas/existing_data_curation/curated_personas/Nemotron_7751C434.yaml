personas:
  professional: Brittany Sousa, a retired home‑cooking virtuoso and genealogical storyteller, now volunteers at the local senior center teaching quilting, recipe preservation, and family‑history research,
    and they blend meticulous organization with a quiet, patient demeanor that feels like a cozy church gathering.
  sports: Brittany Sousa, a devoted fan of the Carolina Panthers football team and the Charlotte Hornets basketball squad, stays active by walking the neighborhood each morning, tending to the garden, and
    joining a gentle senior walking club at Freedom Park, while they avoid high‑impact sports and prefer low‑key exercises that keep their joints comfortable.
  arts: Brittany Sousa finds solace in the piano works of Frédéric Chopin and the folk ballads of The Carter Family, paints watercolor scenes of her garden inspired by Winslow Homer, and they spend quiet
    evenings reading Hilary Mantel’s historical novels, letting these artistic influences shape their reflective worldview.
  travel: Brittany Sousa enjoys low‑key road trips to nearby historic towns like Asheville and Charleston, planning each outing around comfortable lodging and accessible rest stops, and they dream of a
    calm pilgrimage along the Blue Ridge Parkway in the fall, balancing a love of scenic drives with the practical constraints of senior health and a modest travel budget.
  culinary: Brittany Sousa, an accomplished Southern home cook, masters low‑country boil, shrimp and grits, and heirloom tomato gazpacho, favors ingredients like fresh rosemary, sweet corn, and local collard
    greens, and they adapt recipes with reduced salt and butter to honor both tradition and health‑conscious needs.
  core: Brittany Sousa is a quietly diligent octogenarian who weaves genealogy, gardening, and cooking into a tapestry of service, yet they worry over every detail, overwater their roses, and can’t resist
    a late‑night crossword puzzle.
background:
  cultural: Brittany was born and raised in the American South, growing up in a close‑knit, Protestant (Baptist) community in rural North Carolina. Her family’s roots trace back to early 20th‑century Appalachian
    migrants who settled in the Piedmont region, bringing traditions of self‑reliance, hospitality, and a reverence for the land. Southern cultural influences are evident in her love of regional cuisine,
    folk music, and seasonal festivals. The church has played a central role in her life, shaping her values of kindness, cooperation, and service to others. Living now in Cornelius, part of the Mecklenburg
    County suburb, she enjoys the slower pace of small‑town life while being connected to the broader cultural tapestry of North Carolina.
attributes:
  skills: '["Southern cooking", "Seasonal vegetable and flower gardening", "Hand‑sewing and quilting", "Knitting", "Personal budgeting", "Basic computer and email use", "Genealogical research", "Narrative
    writing"]'
  hobbies: '["Reading historical fiction and classic literature", "Listening to classical piano music", "Rose, lavender, and heirloom vegetable gardening", "Knitting scarves and sweaters", "Crossword puzzles
    and sudoku", "Birdwatching (finches, warblers)", "Watercolor painting of garden scenes"]'
  career_goals: Brittany’s primary ambitions focus on personal well‑being and legacy. She aims to stay physically active and mentally sharp through daily gardening, puzzle solving, and regular walks. She
    intends to complete a handwritten memoir that weaves together family stories, local history, and her own reflections, and to preserve these narratives in a digital archive for future generations. While
    she is not seeking formal employment, she hopes to contribute quietly to her community by mentoring younger relatives in cooking and genealogy, and by offering occasional assistance at the local senior
    center’s craft workshops. Additionally, she wishes to set up a modest charitable donation to the church’s outreach program, ensuring her values of harmony and service endure.
