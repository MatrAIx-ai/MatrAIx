  career_goals: Marissa aims to become a licensed general contractor specializing in historic restoration and artistic painting. Over the next five years she plans to enroll in a community‑college apprenticeship
    program to earn a Virginia Painting Contractor license and certification in historic preservation techniques. She aspires to launch her own small business that blends high‑quality painting services
    with custom mural and faux‑finish work for residential and public spaces, particularly in the Williamsburg and James City County area. She is motivated to mentor other young women entering the trades
    and to champion sustainable, low‑VOC paint practices, positioning her company as an eco‑conscious leader in the local market.
