persona_description: A professor of medieval English and Scandinavian Philology at Shinshū University who specializes in the study of Old Norse mythology and its reception in Japan. His research interests
  include the translation and reception of Old Norse literature, particularly the works of Jón Sveinsson (Nonni), Halldór Kiljan Laxness, Tove Jansson, and Astrid Lindgren. He has conducted studies on the
  Japanese reception of Old Norse myths and has presented his findings at various conferences. His works have been influenced by the works of Kenji Matsutani and Yukio Taniguchi.
