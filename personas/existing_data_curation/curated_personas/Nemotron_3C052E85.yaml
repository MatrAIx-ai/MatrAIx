personas:
  professional: Kristen Golfos, a seasoned postsecondary educator specializing in Southern literature, feminist theory, and digital humanities, leverages their methodical organization, competitive drive,
    and cautious skepticism to design rigorous interdisciplinary curricula, secure grant funding, and mentor graduate students while balancing curiosity with a practical, stress‑aware approach.
  sports: Kristen Golfos maintains their fitness through weekly hikes with the Montgomery Senior Hikers Club, casual bird‑watching walks, follows the Alabama Crimson Tide football and the Montgomery Biscuits
    baseball teams, and prefers low‑intensity exercises over competitive sports, reflecting their methodical and reserved nature.
  arts: Kristen Golfos cultivates a rich artistic life by curating literary salons where they discuss poetry by Emily Dickinson and contemporary novels by Zadie Smith, listen to Joan Baez’s folk ballads
    and The National’s indie rock, attend performances at the Alabama Shakespeare Festival, and draw inspiration from Kara Walker’s visual installations, all of which shape their scholarly voice.
  travel: Kristen Golfos favors meticulously planned road trips that blend scholarly research with leisurely exploration, having visited the historic streets of Charleston, the jazz districts of New Orleans,
    the civil‑rights sites of Selma, and the literary cafés of Paris, while future aspirations include a research conference in Cambridge, UK, all balanced against a modest travel budget and family commitments
    they navigate with careful scheduling.
  culinary: Kristen Golfos is a proficient home cook who perfects classic Southern dishes such as fried chicken brined in buttermilk with hot sauce, pecan pie made with fresh Georgia pecans and a bourbon‑kissed
    caramel filling, and heirloom tomato salads tossed with lavender, basil, and aged balsamic vinegar, delighting in both heritage flavors and inventive twists that they share at intimate dinner gatherings.
  core: Kristen Golfos is an introspective, detail‑driven scholar who channels their competitive edge and chronic worry into meticulous research, garden cultivation, and vintage typewriter poetry, while
    occasionally succumbing to impulsive auction splurges as a stress‑relief outlet they consider a necessary indulgence.
background:
  cultural: Kristen grew up in Montgomery, Alabama, in a middle‑class white family with deep roots in the region. Her upbringing was shaped by the city’s complex history, from the legacy of the civil rights
    movement to the enduring Southern traditions of hospitality, church, and community gatherings. Exposed early to both the literary heritage of Southern authors and the broader cultural dialogues of her
    humanities studies, she developed a nuanced appreciation for the intersecting narratives of place, identity, and memory. Her family values emphasized education, self‑reliance, and respect for history,
    which continue to inform her scholarly interests and personal worldview. While she identifies with the larger Southern White cultural milieu, her academic training encourages her to critically examine
    the social dynamics and histories of her community.
attributes:
  skills: '[''American Southern literature'', ''Cultural studies'', ''Feminist theory'', ''Curriculum development'', ''Digital humanities'', ''Archival research'', ''Qualitative data analysis (NVivo)'',
    ''Grant writing'', ''Learning Management Systems (Canvas)'', ''Student assessment design'', ''Project management'', ''Graduate mentorship'']'
  hobbies: '[''Gardening (heirloom tomatoes, lavender, native wildflowers)'', ''Reading classic and contemporary literature'', ''Creative journaling'', ''Collecting and using vintage typewriters'', ''Birdwatching'',
    ''Hiking historic local trails'', ''Playing chess'', ''Hosting small literary salons'', ''Cooking Southern cuisine (pecan pie, fried chicken)'', ''Genealogy research'']'
  career_goals: Kristen aspires to secure tenure and achieve promotion to full professor within the next five years, focusing on establishing a Southern Humanities Initiative that blends literary scholarship
    with digital archival projects. She aims to obtain a major NEH grant to digitize and make accessible primary sources related to the Civil Rights Movement in Montgomery. She plans to publish a monograph
    examining memory and identity in 20th‑century Southern fiction, and to increase her citation impact. Additionally, she seeks to take on the role of department chair to influence hiring and curriculum
    strategy, while also developing a mentorship program for first‑generation college students. Recognizing her sensitivity to stress, she intends to implement well‑being workshops for faculty, fostering
    a supportive academic environment.
