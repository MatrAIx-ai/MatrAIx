  career_goals: Ricky aims to transition into a supervisory or training role within his restaurant, such as becoming a shift manager or training coordinator, where he can systematically improve service
    standards. He plans to enroll in a hospitality management certificate program at a local community college to broaden his credentials. In the longer term, he hopes to co‑own a modest neighborhood café
    with his wife, creating a welcoming space that emphasizes community connection and reliable service. Additionally, he wants to expand his volunteer leadership by overseeing a senior‑focused food‑delivery
    program in Pflugerville.
