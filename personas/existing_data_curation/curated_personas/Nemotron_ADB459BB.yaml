personas:
  professional: Everett Muller is a process‑oriented operations manager who blends Lean Six Sigma expertise with Agile project leadership, using advanced Excel, PowerBI, and Python to drive data‑backed
    decisions, while their disciplined, results‑focused mindset and charismatic presence keep cross‑functional teams aligned and motivated.
  sports: Everett Muller dominates weekend beach volleyball tournaments with the Gulf Coast Volleyball Club, joins the Bayou City Pick‑Up Basketball League at the local community center, roots for the Houston
    Rockets and the Houston Astros, and blends a competitive streak with a talkative presence that often makes them the unofficial team captain.
  arts: Everett Muller curates a soundtrack ranging from Miles Davis and John Coltrane to Kendrick Lamar and J. Cole for cooking sessions, frequents the Houston Museum of Fine Arts and the historic Blue
    House Jazz Club, and regularly debates leadership themes with friends while quoting Malcolm Gladwell and Brené Brown, revealing a love for both classic jazz improvisation and contemporary hip‑hop lyricism.
  travel: Everett Muller plans trips with spreadsheet precision, has documented sunrise shots at the Galveston Seawall, explored the historic French Quarter in New Orleans, trekked Barcelona’s Gothic Quarter,
    wandered Kyoto’s Arashiyama bamboo forest, and dreams of catching the Northern Lights in Iceland, balancing adventure photography with periods of laid‑back beach relaxation.
  culinary: Everett Muller masters Southern‑inspired comfort food, perfecting shrimp and grits with smoked paprika and Andouille sausage, simmering gumbo brimming with okra and crab, and crafting flaky
    cornbread, all while hosting friends for pot‑luck evenings, though they sometimes over‑salt dishes in their quest for bold flavor.
  core: Everett Muller is a disciplined, socially magnetic go‑getter who channels competitive energy into volleyball, data‑driven work, and jazz playlists, yet occasionally over‑schedules and lets minor
    dental hygiene slip.
background:
  cultural: Everett identifies as African American and grew up in a close‑knit Black community in the Tampa Bay area. His cultural heritage blends Southern traditions, the legacy of the civil rights movement,
    and a strong emphasis on education and communal uplift. He regularly attends a historically Black Baptist church, participates in the African American Heritage Festival, and mentors youth through programs
    such as the Boys & Girls Clubs. This background reinforces his commitment to diversity, equity, and inclusion, and fuels his drive to serve as a role model for other Black professionals in STEM and
    leadership.
