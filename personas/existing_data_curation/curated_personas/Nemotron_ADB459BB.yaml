  career_goals: Everett aims to rise to a senior operations director position within the next five years, overseeing large‑scale logistics and supply‑chain initiatives across the Gulf Coast. He plans to
    earn an MBA from a top‑ranked program, deepen his expertise in digital transformation, and eventually launch a boutique consulting firm that helps small businesses adopt data‑driven operational practices.
    A core ambition is to mentor emerging Black professionals in STEM and leadership, fostering a pipeline of talent and representation.
