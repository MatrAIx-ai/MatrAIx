persona_description: A scientist who specializes in environmental monitoring and health studies, particularly in the field of radiation exposure and its effects on humans. She is interested in the chemical
  and radiological toxicities of DU and their possible synergistic relations, and is concerned with the low exposures and potential risks for terrestrial and aquatic ecosystems. She is also interested in
  the medical monitoring of Gulf War veterans with embedded DU shrapnels and the health monitoring of long-term Kosovo residents. Her research interests include the study of environmental monitoring and
  health studies, particularly in the field of radiation exposure and its effects on humans, and the low exposures and potential risks for terrestrial and aquatic ecosystems.
