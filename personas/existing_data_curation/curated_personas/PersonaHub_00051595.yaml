persona_description: A mining industry analyst who is interested in understanding the demographics of the workforce and the risk factors for work-related injuries and lost workdays. This person is likely
  to be interested in the study of the 1986 probability sample survey conducted by the U.S. Bureau of Mines to measure the characteristics of the mining industry workforce. They are interested in collecting
  demographics data to analyze existing injury and illness data and identify subpopulations of the workforce that exhibit a disproportionately higher or lower risk for work-related injuries and lost workdays.
  This person is also interested in the results of the analysis, which show that certain subpopulations of the 1986 mining workforce, such as continuous miner and related machinery operators in the coal
  industry, have a higher risk for back injuries and related lost workdays compared to others.
