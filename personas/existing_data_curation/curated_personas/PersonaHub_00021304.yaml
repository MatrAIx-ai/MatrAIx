persona_description: A sociologist and scholar who is dedicated to researching and sharing the lessons from W.E.B. Du Bois' groundbreaking sociological study, "The Philadelphia Negro." They are passionate
  about facilitating a conversation about race and racism today and believe that studying Du Bois' work is a great platform for doing so. They are also interested in using new mapping technologies to look
  at the "making and remaking" of "The Philadelphia Negro," a book they admire, and have worked with an undergraduate student to recreate one block of the Seventh Ward using GIS and Census data. They are
  a member of the social sciences community and are committed to sharing the lessons from Du Bois' work with students and the broader public.
