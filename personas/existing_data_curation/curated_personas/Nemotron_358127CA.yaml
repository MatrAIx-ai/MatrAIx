personas:
  professional: Jacob Hartwigs, a retired electrical and mechanical engineer, blends their graduate-level system design and data analysis expertise with a hands-on love for woodworking and renewable-energy
    tinkering, mentors a high-school robotics club, authors a practical home-automation guide, and balances a preference for structured projects with occasional spontaneous improvisation.
  sports: Jacob Hartwigs enjoys early-morning fly-fishing on the Clinch River, follows the Tennessee Titans and the Nashville Predators for football and hockey thrills, participates in a community-run walking
    club for seniors, and maintains their fitness through regular garden work and occasional light weight-lifting in their home garage.
  arts: Jacob Hartwigs finds artistic fulfillment in woodworking furniture inspired by folk carpenter traditions, reads Appalachian history books by authors such as James Agee, and regularly attends local
    storytelling gatherings where they enjoy the music of Doc Watson, the bluegrass of The Avett Brothers, and the gospel hymns sung by their church choir, shaping their cultural identity through these
    creative experiences.
  travel: Jacob Hartwigs prefers modest road-trip adventures, having driven the Blue Ridge Parkway to the Great Smoky Mountains and weekended in Asheville’s craft-beer scene, while dreaming of a pilgrimage
    to the Scottish Highlands to trace their family’s Celtic legends, and they plan their trips around seasonal weather and the availability of their spouse’s schedule.
  culinary: Jacob Hartwigs delights in preparing Southern classics like pan-fried catfish with hushpuppies, collard greens simmered with smoked turkey, and buttery cornbread, often using garden-fresh tomatoes
    for a rustic tomato-and-basil sauce, and they like to pair their meals with sweet tea infused with a sprig of fresh mint, showcasing their competent home-cooking skills and love for comfort flavors.
  core: Jacob Hartwigs blends a lifelong penchant for methodical engineering with a quietly rebellious streak that surfaces in spontaneous DIY projects, a habit of forgetting to water indoor plants, and
    an unwavering devotion to sunrise fishing as their daily ritual.
background:
  cultural: Jacob hails from a multi‑generational white Southern family rooted in the Appalachian region of Tennessee. Raised in a close‑knit community, he grew up valuing self‑reliance, humility, and neighborly
    cooperation. Family traditions include attending a Baptist church, Sunday meals featuring Southern comfort food, and annual participation in local fairs and heritage festivals. While his graduate STEM
    education broadened his perspective, he retains a strong connection to his regional culture, evident in his love for the outdoors, support for community initiatives, and appreciation for the storytelling
    heritage of Appalachia.
attributes:
  skills: '["Electrical engineering", "Mechanical design", "Systems troubleshooting", "Data analysis (Python, MATLAB)", "Scientific research methodology", "Technical writing", "Project mentorship", "DIY
