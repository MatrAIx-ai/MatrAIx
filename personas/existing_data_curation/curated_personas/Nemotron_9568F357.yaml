personas:
  professional: Donna Lundsmark is a precocious ten‑year‑old budding coder and problem‑solver whose methodical nature shines when building intricate LEGO models, creating Scratch animations, and tackling
    daily puzzles, reflecting a balance of curiosity and practicality.
  sports: Donna Lundsmark plays on the Northside Tigers youth soccer team, joins her school’s after‑school hiking club for nature walks, enjoys cheering for the Seattle Seahawks during football season,
    and prefers the quiet rhythm of weekend trail hikes with her family over crowded sports arenas.
  arts: Donna Lundsmark is a dedicated piano student who practices Beethoven’s "Für Elise" and Ludovico Einaudi’s "Nuvole Bianche," creates whimsical Scratch animations inspired by Pixar’s "Inside Out,"
    and sketches collected rocks and shells, weaving her love of nature into each artistic endeavour.
  travel: Donna Lundsmark has explored the Great Smoky Mountains National Park on family camping trips, visited Washington, D.C.’s National Museum of Natural History, spent a summer vacation at Cape Cod’s
    sandy beaches, and dreams of seeing the Northern Lights in Iceland and wandering the ancient stone circles of Stonehenge.
  culinary: Donna Lundsmark favors simple, wholesome meals like whole‑grain spaghetti topped with marinara sauce and fresh basil, grilled cheese sandwiches made with sharp cheddar, fruit kebabs of blueberries,
    strawberries, and pineapple, enjoys baking chocolate‑chip cookies with fair‑trade chocolate chips, and avoids heavily processed snack foods, often opting for raw carrot sticks or her own rock‑shaped
    fruit salads.
  core: Donna Lundsmark is a quietly curious ten‑year‑old whose love of puzzles, methodical LEGO builds, and tender piano tunes coexist with a habit of worrying over small details and a meticulous collection
    of rocks and shells.
background:
  cultural: Donna comes from a white, middle‑class American family in Syosset, a suburban community on Long Island, New York. Her upbringing reflects typical East Coast suburban values that prioritize education,
    community involvement, and family traditions such as celebrating Thanksgiving, Christmas, and local neighborhood festivals. Her family’s heritage includes a mix of Northern European ancestry, and she
    participates in community activities like the local library reading program, the Girl Scouts, and seasonal town events, fostering a sense of civic responsibility and appreciation for the diverse cultures
    within her community.
