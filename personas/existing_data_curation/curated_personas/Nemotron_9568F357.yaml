  career_goals: Donna dreams of becoming a veterinarian because she loves animals and wants to apply her practical problem‑solving skills to help them. She also imagines a future as a teacher, where her
    organized approach and caring nature could support other children’s learning. She aims to deepen her science knowledge, develop leadership abilities through Girl Scouts, and maintain her reliable, compassionate
    character as she pursues a career that blends curiosity with service to others.
