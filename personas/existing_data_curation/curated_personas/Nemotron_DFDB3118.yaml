  career_goals: Urvashi aims to transition from a technical inspection role to a supervisory position within three years. She plans to earn a bachelor’s degree in industrial engineering and obtain the ASQ
    Certified Quality Engineer (CQE) and Six Sigma Green Belt certifications. Her long‑term ambition is to lead a quality assurance team that drives continuous improvement, integrates new testing technologies,
    and mentors junior staff. She also seeks to contribute to product safety initiatives that have a tangible impact on consumer health, while maintaining work‑life balance to manage stress.
