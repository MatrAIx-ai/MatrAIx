personas:
  professional: Joshua Lormand, a 26‑year‑old career counselor in Boise, blends evidence‑based assessment tools with watercolor sketches and folk‑song metaphors in workshops, leveraging their empathetic
    listening and flexible, sometimes chaotic, planning style to help students discover purpose through creative self‑portrait exercises.
  sports: Joshua Lormand, an avid hiker, joins the Boise Ridge Trail Club for weekend climbs, practices yoga for flexibility, and follows the Colorado Rockies and Denver Nuggets as their go‑to professional
    sports teams for seasonal excitement.
  arts: Joshua Lormand, a watercolor enthusiast, frequents the Boise Art Museum and local galleries, draws inspiration from Claude Monet and Georgia O'Keeffe, strums acoustic folk songs reminiscent of Bob
    Dylan and Sufjan Stevens at open‑mic nights, and immerses themselves in the literary worlds of Camus and Donna Tartt.
  travel: Joshua Lormand prefers loosely planned road trips across the Intermountain West, often camping in Yellowstone or Zion before dreaming of an artistic pilgrimage to Kyoto’s tea houses and the colorful
    street murals of Santa Fe; they balance budget constraints with a love for spontaneous discovery.
  culinary: Joshua Lormand enjoys crafting simple farm‑to‑table meals like grilled trout with lemon‑dill, quinoa salad with roasted beets and goat cheese, and miso ramen; they have a moderate cooking skill
    level and regularly experiment with fresh herbs and local Idaho potatoes while savoring a well‑brewed pour‑over coffee.
  core: Joshua Lormand is a creatively driven, nature‑loving career counselor whose flexible, sometimes disorganized habits fuel a habit of merging art, mindfulness, and mentorship into every facet of life.
background:
  cultural: Joshua grew up in a middle‑class family in the Pacific Northwest, where a mix of mainstream American values and regional appreciation for the outdoors shaped his worldview. His family emphasized
    education, community involvement, and respect for diverse perspectives, encouraging him to pursue curiosity‑driven learning. While identifying as white with European ancestry (German and Irish roots),
    he embraces the inclusive, progressive culture of Boise, fostering a balance between individual achievement and collective harmony. This background informs his collaborative counseling style and his
    commitment to integrating artistic expression into personal development.
attributes:
  skills: '[''Active listening'', ''Empathetic communication'', ''Career assessment administration'', ''Academic planning'', ''Labor‑market research'', ''Counseling software (Naviance, PowerSchool)'', ''Microsoft
    Office Suite'', ''Data analysis for outcomes tracking'', ''Creative counseling techniques'', ''Group facilitation'', ''Presentation skills'', ''Collaboration with educators and community partners'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Photography'', ''Hiking in the Rockies'', ''Acoustic guitar playing'', ''Open‑mic performances'', ''Reading philosophy and contemporary
    fiction'', ''Reflective journaling'', ''Volunteer mentoring for middle‑school students'']'
  career_goals: Joshua aims to pursue a Master’s degree in Counseling Psychology within the next two years, followed by certification as a Certified Professional Career Counselor (CPCC). He envisions developing
    a holistic guidance program at his institution that blends traditional career planning with artistic and experimental methods, such as portfolio‑based self‑discovery workshops and community‑based mentorships.
    He also hopes to author a guidebook on integrating creativity into career counseling, present at national conferences, and eventually take on a leadership role as a Director of Student Success in a
    larger university or district.
