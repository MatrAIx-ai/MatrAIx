personas:
  professional: Robbie Forrester is an organized event‑management specialist who leverages digital marketing tools, basic graphic design, and persuasive public speaking to coordinate community festivals
    and volunteer logistics, while their curious‑yet‑practical mindset drives innovative solutions and their sociable nature ensures stakeholder engagement.
  sports: Robbie Forrester is a devoted fan of the Orlando Magic, a seasonal runner with the Central Florida Marathon Club for spring 5Ks, a weekend hiker with the Florida Trails Club exploring Ocala National
    Forest, and they relish pick‑up basketball games at the community center, balancing competitive play with the social camaraderie of the court.
  arts: Robbie Forrester is an avid live‑music enthusiast who regularly attends shows featuring The Strokes, Hozier, and local indie bands, practices candid street photography inspired by Henri Cartier‑Bresson,
    and they support local theater productions such as "Hamilton," finding creative inspiration in both visual and auditory art forms.
  travel: Robbie Forrester is a meticulous planner who prefers weekend road trips to cultural gems like St. Augustine and Asheville, has a bucket‑list desire to experience the Glastonbury Festival in England,
    balances spontaneous wanderlust with a modest travel budget by leveraging Chase Sapphire Preferred points, and they occasionally join group hikes in the Great Smoky Mountains for a blend of adventure
    and relaxation.
  culinary: Robbie Forrester is a self‑taught home chef with confident intermediate skills who experiments with regional flavors such as Cuban medianoche sandwich, Jamaican jerk chicken, Key Lime pie, and
    Southern shrimp and grits, sources fresh herbs from the weekly farmer’s market, and they enjoy pairing these dishes with craft beers from local microbreweries.
  core: Robbie Forrester blends relentless organization, social magnetism, and a curiosity for tech trends into a life of orchestrating community events, meticulously budgeting, and balancing a love for
    live music, hiking, and culinary experiments, all while occasionally over‑committing and binge‑scrolling late‑night productivity podcasts.
background:
  cultural: Robbie grew up in DeLand, Florida, in a middle‑class white family that emphasized community involvement and practical achievement. The region’s blend of Southern hospitality, coastal leisure,
    and a growing multicultural population has shaped his worldview. He celebrates typical American holidays, enjoys Florida’s outdoor lifestyle—beaches, parks, and fishing—and frequently participates in
    local festivals that showcase Hispanic and Caribbean influences, such as food fairs and music events. This upbringing instilled in him a strong work ethic, respect for tradition, and openness to new
    ideas.
