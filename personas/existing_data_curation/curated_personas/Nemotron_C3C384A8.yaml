  career_goals: Robbie aims to leverage his organizational talent and sociable nature into a career in community event management or digital marketing. Within the next three years, he plans to obtain a
    certification in project management and complete a short course in digital marketing, then secure a position as an event coordinator for a local nonprofit or tourism board. Long‑term, he hopes to launch
    his own boutique event‑planning agency serving small businesses and cultural festivals in Central Florida, positioning himself as a trusted leader who delivers high‑quality, innovative experiences.
