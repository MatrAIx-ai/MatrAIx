  career_goals: Daniel aims to move from a line assembler to a lead technician or shop supervisor within the next five years, leveraging his growing knowledge of advanced manufacturing technologies such
    as robotics and additive manufacturing. He hopes to combine his technical skill set with his creative interests by contributing to product design projects, perhaps leading a small in‑house design‑to‑production
    team. In the longer term, he envisions opening a boutique fabrication shop that offers custom metal art pieces and functional designs for local businesses and hobbyists, allowing him to merge his craftsmanship
    with his love for unconventional ideas.
