  career_goals: Manuel aims to advance to a supervisory role within the plant, such as shift lead or safety officer, where he can apply his meticulous approach to ensure smooth operations and a safe workplace.
    He plans to obtain a certified forklift trainer credential and a competency certification in occupational health and safety. Over the next few years, he also envisions leveraging his mechanical aptitude
    to launch a side business offering home repair services, providing additional financial security for his children.
