    User 2: I''ve heard great things about that show! I''m glad you enjoyed it.

    User 1: I did! It was so much better than I thought it was going to be.

    User 2: What else did you do in New York?

    User 1: I went to the top of the Empire State Building, walked through Central Park, and visited the Metropolitan Museum of Art.

    User 2: That sounds like you had a great time!

    User 1: I did! I''m already planning my next trip back.

    User 2: I''m glad to hear you enjoyed it! I''ve always wanted to go to New York City.

    User 1: You should definitely go! It''s such a great city.

    User 2: I will! Thanks for the recommendation.

    User 1: No problem!

    User 2: So, what do you like to do for fun?

    User 1: I like to listen to podcasts, read, and spend time with my friends and family.

    User 2: I like to do all of those things too! What kind of podcasts do you listen to?

    User 1: I like to listen to podcasts about true crime, history, and science.

    User 2: I love listening to true crime podcasts! I''m a big fan of the Serial podcast.

    User 1: Me too! I''ve also listened to a lot of episodes of the My Favorite Murder podcast.

    User 2: I''ve heard good things about that podcast. I''ll have to check it out.

    User 1: You definitely should! It''s really funny.

    User 2: I''m always looking for new podcasts to listen to.

    User 1: Me too! I love the feeling of finding a new podcast that I really enjoy.

    User 2: Me too! It''s like finding a new friend.

    User 1: Exactly'
