personas:
  professional: Sang Penn, an aspiring teen content creator and budding programmer, blends curiosity with practicality by scripting simple games and editing TikTok clips, thriving in spontaneous creative
    bursts yet often scrambling when school project deadlines loom.
  sports: Sang Penn, a dedicated midfielder for the local youth soccer league and a fan of Manchester United and LA Galaxy, caps each week with pickup games at the community field, valuing camaraderie over
    competitive glory.
  arts: Sang Penn, an enthusiastic TikTok videographer and amateur acoustic guitarist, draws inspiration from Ed Sheeran and BTS, often fusing trending dance challenges with original chord progressions
    in short clips that showcase both humor and heartfelt lyrics.
  travel: Sang Penn, who dreams of backpacking through Japan's historic temples after saving up from odd jobs, prefers spontaneous weekend road trips to nearby coastal towns but feels anxious about long
    flights and therefore favors traveling with a close friend.
  culinary: Sang Penn, a self-taught kitchen tinkerer, loves whipping up cheesy pepperoni pizza and mastering ramen broth with miso paste, yet frequently orders bubble tea for its chewy tapioca pearls,
    revealing a comfort in familiar flavors mixed with occasional culinary experiments.
  core: Sang Penn, the curious yet easily stressed teen, oscillates between spontaneous bursts of creative coding and last-minute cramming, while hoarding gaming gear, obsessively checking notifications,
    and juggling a shaky balance between worry and wanderlust.
background:
  cultural: Born to East Asian immigrant parents (originally from Taiwan), Sang grew up in a bilingual household in Allen, Texas. He celebrates Lunar New Year and Mid‑Autumn Festival with his family, enjoys
    traditional dishes like dumplings and bubble tea, and attends weekend Mandarin language classes. The community’s emphasis on respect, hard work, and collective well‑being shapes his values, while the
    multicultural environment of Collin County exposes him to a blend of American and Asian influences.
