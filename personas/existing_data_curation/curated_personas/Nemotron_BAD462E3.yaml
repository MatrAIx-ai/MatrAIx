  career_goals: Thư dreams of combining her love for technology and helping others by creating educational apps or games that make learning fun for kids, especially those from multicultural backgrounds.
    She envisions studying computer science in college and eventually working as a software developer focused on educational technology. Alongside that, she hopes to stay connected to her community by mentoring
    younger students in coding clubs and volunteering at local cultural events.
