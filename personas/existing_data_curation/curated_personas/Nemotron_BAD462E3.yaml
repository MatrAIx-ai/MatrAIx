personas:
  professional: A budding robotics enthusiast, Thuy Ngo channels their curiosity and practical problem‑solving into designing simple machines for the school club, while also creating short‑form video tutorials
    that showcase their projects in a relaxed, flexible style.
  sports: A community‑spirit soccer player, Thuy Ngo joins weekly pickup matches at a local park, cheers for the San Jose Earthquakes, and incorporates hip‑hop dance for cross‑training, thriving on the
    energetic camaraderie despite a loosely organized practice schedule.
  arts: A graphic‑novel aficionado and hip‑hop enthusiast, Thuy Ngo draws inspiration from creators like Marjane Satrapi and dancers like Misty Copeland, attends Lunar New Year parades featuring traditional
    drum performances, and enjoys listening to artists such as Billie Eilish and Lil Nas X while crafting their own content.
  travel: An adventurous weekend explorer, Thuy Ngo loves day trips to the Redwoods, weekend stays in San Francisco's Chinatown for dim sum, and dreams of visiting Osaka to taste authentic street food,
    balancing school commitments with flexible, low‑budget itineraries.
  culinary: A budding home chef, Thuy Ngo enjoys cooking family recipes like pho broth, fresh spring rolls, and bánh mì, experimenting with star anise, lemongrass, and rice noodles while sharing step‑by‑step
    tutorials on their video blog.
  core: Thuy Ngo is a sociable, curious 13‑year‑old who blends tech tinkering, cultural traditions, and spontaneous creativity into a lively, slightly disorganized yet emotionally steady lifestyle.
background:
  cultural: Thư comes from a Vietnamese‑American family in San Jose. At home, Vietnamese is spoken alongside English, and she celebrates traditional holidays such as Tet, Mid‑Autumn Festival, and the Hungry
    Ghost Festival with her extended family. Her parents emphasize respect for elders, community involvement, and the value of education, which shapes Thư’s collaborative and supportive nature. She participates
    in local cultural events hosted by the Vietnamese community center, enjoys sharing her heritage through food and music, and balances these traditions with the multicultural environment of the Bay Area.
