personas:
  professional: A budding junior architect who loves building LEGO cities, Andres Reyes demonstrates early spatial reasoning, meticulous organization of blocks, and a flexible imagination that lets them
    redesign structures on the fly, while they balance reliability with creative experiments.
  sports: A lively mini‑athlete who dashes around the playground and attends the Sunshine Tykes soccer club, Andres Reyes cheers for the River City Mariners baseball team and the hometown basketball squad
    the Metro Hawks, enjoying seasonal kite‑flying afternoons while they maintain a bouncing energy that keeps them constantly moving.
  arts: A budding art enthusiast who loves drawing crayon dinosaurs, humming the Frozen soundtrack by Idina Menzel, watching Walt Disney's Mickey Mouse cartoons, and collecting Dr. Seuss books, Andres Reyes
    channels their curiosity into vibrant scribbles that blend classic characters with their own whimsical stories, and they often display these works proudly on the fridge.
  travel: A small‑world explorer who delights in brief family getaways, Andres Reyes has already visited Disneyland in California, splashed at the local seaside boardwalk, and day‑dreams about the Grand
    Canyon, preferring meticulously planned itineraries that balance playground time with occasional quiet sand‑castle building, while they always request a snack pack for the journey.
  culinary: A tiny food connoisseur who adores gooey macaroni and cheese, crunchy carrot sticks, and banana pancakes, Andres Reyes eagerly helps stir batter with a wooden spoon, loves the sweet tang of
    strawberry jam on toast, and they often insist on adding extra cheese to every meal, showcasing a playful yet picky palate.
  core: An endlessly curious four‑year‑old with a penchant for building towering LEGO structures, a secret stash of glow‑in‑the‑dark stickers, and occasional forgetfulness about bedtime, Andres Reyes balances
    a bright imagination with a surprisingly organized routine, and they become the little architect who never leaves a puzzle piece behind.
background:
  cultural: Andres grows up in a bilingual Spanish‑English home, celebrating traditional Spanish holidays like Día de los Reyes and enjoying family foods such as paella and churros. At the same time, his
    family lives in Philadelphia’s diverse neighborhoods, exposing him to the city’s multicultural festivals, public library storytimes, and a mix of American and Spanish cultural influences.
