  hobbies: '["Fishing","Backyard gardening","Reading DIY and mechanics manuals","Model airplane building","Woodworking (handcrafted furniture)","Listening to merengue and bachata","Cooking Dominican dishes","Watching
    nature documentaries","Hiking nature trails"]'
  career_goals: Leonardo aims to move beyond labor‑only roles and become a foreman or crew lead within the next few years. He plans to obtain an OSHA 30‑hour certification and enroll in night classes for
    construction management at a nearby community college. His long‑term ambition is to launch a small, family‑run subcontracting business that specializes in residential remodels and environmentally‑friendly
    building techniques. Achieving a stable income will allow him to purchase a larger home for his wife and children, support his children's education, and eventually provide the financial freedom to travel
    back to the Dominican Republic to visit extended family.
