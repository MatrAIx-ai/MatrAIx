personas:
  professional: Leonardo Solano, a seasoned Gulf Coast construction laborer with expertise in concrete work, framing, and heavy equipment operation, channels his curiosity and competitive drive toward a
    foreman role, pursuing OSHA 30 certification and night classes in construction management to eventually launch a family‑owned, environmentally‑focused remodeling subcontractor.
  sports: Leonardo Solano, a quiet fan of the Tampa Bay Buccaneers and the Miami Marlins, spends early mornings fishing at Wakulla Springs, occasionally joins a local recreational bowling league at the
    Gulf Coast Community Center, and prefers low‑impact activities like weekend hikes through pine flatwoods over high‑intensity gym workouts.
  arts: Leonardo Solano nurtures his creative side by building model airplanes, hand‑crafting wooden stools in his workshop, and unwinding to merengue and bachata tracks from Carlos Vives and Juan Luis
    Guerra while watching nature documentaries, a routine that fuels both his imagination and his appreciation for tactile craftsmanship.
  travel: Leonardo Solano enjoys low‑key road trips to nearby Gulf Coast beaches, has already explored the Everglades and historic St. Augustine, dreams of visiting coastal towns in Portugal and Costa Rica
    for their natural beauty, yet plans travel around the school calendar and family finances, often opting for stay‑cations when budgets tighten.
  culinary: Leonardo Solano delights in cooking family recipes like arroz con pollo, tostones, and plantain‑based mangu, seasoning dishes with sofrito, achiote, and fresh cilantro, and while their cooking
    skill is solid enough to impress relatives, they still struggle to perfect the perfect rice texture and sometimes over‑salt their sauces.
  core: Leonardo Solano blends rugged hands‑on construction expertise with a solitary, curious mind, juggling a competitive drive toward leadership, frugal finances, modest health hurdles, and a love for
    low‑key outdoor hobbies that keep them grounded.
background:
  cultural: Leonardo is a first‑generation Dominican American. His parents migrated from the Dominican Republic in the early 1980s and settled in northern Florida, where a close‑knit Latino community provided
    a familiar cultural environment. At home, Spanish is spoken, and family gatherings are marked by Dominican cuisine, merengue, and bachata music. He was raised Catholic, attending a local parish that
    remains a focal point for cultural celebrations such as Santo Domingo and Día de los Muertos. Although he works in a predominantly Anglo‑American construction setting, he maintains strong ties to his
    heritage through church events, Dominican food traditions, and periodic trips to the Dominican Republic to visit relatives.
attributes:
  skills: '["Concrete mixing and pouring","Framing and wall construction","Demolition work","Heavy equipment operation (forklift, skid‑steer, compactor)","Basic carpentry","Minor electrical repairs","Plumbing
