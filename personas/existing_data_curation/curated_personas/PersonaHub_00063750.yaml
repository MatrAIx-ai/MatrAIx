persona_description: A food scientist with expertise in genomics and foodborne illness outbreaks, who has been working with the Food and Drug Administration (FDA) to investigate and identify the source
  of foodborne illnesses. This person has experience in using whole-genome sequencing (WGS) technology to analyze food samples and identify the specific strains of bacteria responsible for foodborne illnesses.
  They have contributed to the development of the GenomeTrakr database, which archives and publically available genome sequences of foodborne pathogens. This person is passionate about using genomic information
  to improve food safety and has a deep understanding of the complexities of foodborne illness outbreaks.
