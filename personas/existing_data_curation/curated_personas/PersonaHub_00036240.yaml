persona_description: A scientist who specializes in marine ecology and environmental biology, particularly in the study of blooms and the factors that contribute to their persistence. The scientist has
  conducted research in Texas' Laguna Madre and Baffin Bay, and has presented their findings at the 2019 CERF Conference. Their research has focused on the environmental conditions and phytoplankton dynamics
  in Laguna Salada, a tributary of Baffin Bay, and their results have highlighted the characteristics of Laguna Salada that are favorable to the persistence of the "brown tide" organism, Aureoumbra lagunensis.
