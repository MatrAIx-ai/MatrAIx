  career_goals: Armando aims to advance to a fleet supervisor or driver‑trainer position where he can mentor new drivers and shape routing procedures. He hopes to eventually start a modest logistics or
    courier business that lets him combine his driving know‑how with sales experience, while also completing his GED to broaden future opportunities and provide a stable retirement for his family.
