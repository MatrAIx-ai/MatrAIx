persona_description: A historian who specializes in the study of American history, particularly the era of the Cold War and the civil rights movement. Their research interests include the politics of civil
  rights in the Truman administration, the impact of the Cold War on civil rights, and the legacy of Harry Truman's civil rights policies. They are particularly interested in the revisionist view of Truman's
  civil rights legacy and the ways in which it has been shaped by recent scholarship. They are skilled in conducting extensive archival research and interviewing experts to gain a nuanced understanding
  of Truman's personal views on race and the role that civil rights should play in the Democratic agenda.
