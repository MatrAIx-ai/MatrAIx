    knowledge‑base article creation'', ''Basic data analysis with Excel'', ''Rapid learning of new product features'', ''Stress‑management and mindfulness techniques'', ''Adaptability and flexible workflow
    management'']'
  hobbies: '[''Reading magical‑realism and contemporary Latino fiction'', ''Reflective journaling'', ''Mindfulness meditation and breathing exercises'', ''Urban photography'', ''Nature walks in Fairmount
    Park'', ''Cooking traditional Puerto Rican dishes with personal variations'', ''Listening to salsa, boleros, and reggaeton'', ''Solving puzzles (crosswords, sudoku, jigsaw)'', ''Stargazing and amateur
    astronomy'', ''Collecting vintage Latin vinyl records'']'
  career_goals: Crystalmarie aspires to move beyond frontline support into a specialist role that leverages her analytical curiosity and competitive drive. In the next two to three years she aims to earn
    the Certified Customer Service Professional (CCSP) credential and complete an associate degree in Business Analytics, positioning herself for a transition to a remote Customer Experience Analyst or
    Quality Assurance Specialist position. She wants to become the go‑to subject‑matter expert for product knowledge within her team, consistently rank in the top 5% of performance metrics, and later mentor
    new agents via virtual training modules—activities that allow her to work independently while still contributing to the organization’s success. A longer‑term ambition is to design data‑driven customer
    insight reports that inform product improvements, all while maintaining a flexible schedule that supports her need for solitude and mental‑wellness.
