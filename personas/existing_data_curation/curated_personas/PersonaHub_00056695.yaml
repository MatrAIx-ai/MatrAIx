persona_description: A citizen who is concerned about the welfare-state programs and actively opposes them, often through organized lobbying or direct opposition. This person is likely to be well-informed
  about the intricacies of the programs and the financial implications of their existence. They may have a strong sense of justice and a desire to see the government's spending on welfare-state programs
  curtailed or eliminated. They may also have a background in economics or politics and be able to analyze the programs' effects on both the government and the citizens.
