persona_description: An astronomer who is interested in improving the public understanding of science through engaging in astronomy outreach and education. This individual likely works at a small museum
  or nature center and has experience training educators and professional and amateur astronomers to work together in classrooms and on family events. They have a passion for astronomy and space science
  and are interested in expanding the impact of their projects through a variety of networks and services. They are familiar with the ASP's programs, Night Sky Network, Project ASTRO/Family ASTRO Networks,
  Astronomy from the Ground Up Network, College Astronomy Instructors, EPO Conference Participants, and Universe in the Classroom. They are active on the ASP's Web Site and receive updates from the ASP's
  Mercury magazine.
