  hobbies: '[''Reading (science‑fiction, non‑fiction)'', ''Hiking'', ''Fishing'', ''Raspberry Pi and Arduino tinkering'', ''Crossword and Sudoku puzzles'', ''Digital landscape photography'', ''Podcast listening
    (personal development, folk music)'']'
  career_goals: Darren aims to progress from front‑line customer service to a supervisory or quality‑assurance role within the next three to five years, leveraging his practical mindset and curiosity about
    process improvement. He plans to earn a customer‑experience certification and enroll part‑time in a community college business program to broaden his managerial skill set. Long‑term, he envisions a
    remote or partially remote position as a Customer Experience Manager or Technical Support Specialist that allows for a quiet work setting and the flexibility to continue learning new technologies.
