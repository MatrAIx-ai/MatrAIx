personas:
  professional: Stephanie Derado is a retired STEM professional who now curates interdisciplinary workshops that blend watercolor painting with data visualization, volunteers as a docent-in-training at
    the Denver Museum of Nature & Science, and mentors high-school students, leveraging their analytical rigor, emotional intelligence, and love of lifelong learning to foster inclusive, collaborative learning
    environments.
  sports: Stephanie Derado enjoys weekend hikes with the Colorado Mountain Club, follows the Denver Broncos and Colorado Rockies with faithful enthusiasm, participates in a senior‑friendly yoga class at
    Red Rocks, and occasionally joins an amateur walking club that meets at City Park, balancing a love of the outdoors with low‑impact aerobic activity.
  arts: Stephanie Derado spends afternoons painting watercolors of the Rockies inspired by Ansel Adams and Georgia O'Keeffe, attends the Denver Art Museum to view works by contemporary muralist Levi Schott
    and enjoys live jazz performances by Miles Davis tributes at the Bluebird Café, while also curating community exhibitions that pair visual art with scientific concepts.
  travel: Stephanie Derado prefers organized senior group tours that combine museum visits in Boston and New York with leisurely strolls through Denver’s historic LoDo district, yet also dreams of solo
    study trips to the Louvre, the Uffizi, and the Smithsonian, balancing structured itineraries with a yearning for immersive cultural experiences.
  culinary: Stephanie Derado enjoys cooking Colorado lamb stew with rosemary from their patio garden, preparing blueberry galettes using fresh herbs, savoring occasional meals at the historic Buckhorn Exchange
    featuring bison ribeye, and indulging in simple oat‑milk lattes and seasonal wild mushroom risotto at home.
  core: Stephanie Derado is a curiosity‑driven, analytically minded senior who blends art, science, and community service, but wrestles with anxiety that colors their daily choices.
background:
  cultural: Stephanie grew up in a middle-class white family in the Denver metropolitan area during the 1960s and 70s, a period marked by the civil-rights movement, the women’s liberation era, and an expanding
    environmental consciousness in Colorado. Her upbringing blended traditional Mid-American values of self-reliance and modesty with the progressive, outdoors-oriented culture of the Rockies. Family gatherings
    often featured hearty home-cooked meals, folk music, and seasonal celebrations that emphasized community and harmony. Exposure to the city’s vibrant art scene—museum visits, theater productions, and
    public murals—nurtured her appreciation for visual culture, while her STEM education reflected the era’s emphasis on scientific advancement and gender equity in higher education. These experiences have
    instilled in her a respect for both analytical rigor and artistic expression, a belief in lifelong learning, and a commitment to fostering inclusive, supportive environments.
