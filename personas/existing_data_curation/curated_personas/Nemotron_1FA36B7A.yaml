  career_goals: Arthur aims to obtain his California Architectural License within the next two years, passing the NCARB certification exams and completing the required professional experience hours. He
    aspires to lead multidisciplinary teams on large‑scale, eco‑friendly residential and mixed‑use projects in the Los Angeles area, eventually becoming a principal at his firm. Long‑term, he hopes to establish
    a boutique studio that integrates community‑focused design with cutting‑edge technology, championing affordable green housing and mentorship programs for emerging architects.
