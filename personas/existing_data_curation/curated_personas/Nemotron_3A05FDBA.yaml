personas:
  professional: Eun Chen, a 25‑year‑old retail specialist with a knack for data‑driven visual merchandising, blends their bilingual communication skills and Python‑powered analytics to streamline store
    processes while dreaming of a future as a tech‑focused product designer.
  sports: Eun Chen maintains a balanced fitness routine that includes weekend hikes in Griffith Park, bi‑weekly yoga classes at a downtown studio, and casual viewings of the Los Angeles Lakers and LA Galaxy
    games, while they occasionally join the Los Angeles Road Runners club for 5K trainings.
  arts: Eun Chen curates their artistic life by sketching digital illustrations inspired by the ethereal light installations of James Turrell, visiting LACMA’s contemporary exhibits, collecting limited‑edition
    prints by Ai Weiwei, and unwinding to indie playlists featuring Phoebe Bridgers and Tame Impala while sipping oat‑milk latte at a local coffee shop.
  travel: Eun Chen prefers meticulously planned cultural trips, having explored the night markets of Tokyo and the street art districts of Berlin, while dreaming of a future solo itinerary through Taiwan’s
    tea plantations and Italy’s Renaissance towns, and they balance this against a student‑budget that favors off‑season flights and Airbnb stays.
  culinary: Eun Chen enjoys experimenting in the kitchen at an intermediate level, frequently whipping up homemade Xiaolongbao and spicy Mapo tofu for friends, perfecting chilaquiles with fresh tomatillos
    on weekends, and savoring the occasional matcha latte made with ceremonial‑grade powder at their favorite indie coffee spot.
  core: Eun Chen is a meticulously organized 25‑year‑old who balances a restless curiosity for tech‑infused art with a habit of over‑checking their phone for notifications, often turning to yoga and playlists
    to calm a mind that worries about every detail.
background:
  cultural: Eun Gia is a second‑generation East Asian American whose family roots trace back to China (or Taiwan). Growing up in Bellflower, she was raised with a blend of traditional Chinese values—such
    as respect for family, education, and community celebrations like Lunar New Year—and the multicultural, open‑minded environment of Southern California. She is fluent in Mandarin and English, enjoys
    both dim sum and local Mexican cuisine, and incorporates both Chinese artistic traditions and contemporary Western art in her personal interests.
