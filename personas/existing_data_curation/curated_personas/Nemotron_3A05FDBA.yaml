  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Photography'', ''DIY crafts (jewelry making)'', ''Reading science, philosophy, and art books'', ''Coding side
    projects (Python)'', ''Exploring new coffee shops and recipes'', ''Yoga and mindfulness meditation'', ''Hiking local trails'', ''Listening to indie and alternative music'', ''Travel planning and cultural
    exploration'']'
  career_goals: She aims to leverage her retail experience and STEM education to transition into a technology‑focused sales or product specialist role, eventually moving toward a business analyst or user‑experience
    designer position. Eun Gia plans to obtain certifications in data analytics and retail management, pursue a master's degree in Business Analytics, and build a portfolio of side projects that blend art
    and technology. Long‑term, she envisions managing a boutique that curates innovative tech‑enhanced art pieces or leading a digital product team that emphasizes user‑centered design.
