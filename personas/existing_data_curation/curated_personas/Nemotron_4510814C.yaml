personas:
  professional: Kristina Johnson, an aspiring freelance illustrator, blends meticulous project planning with a vivid curiosity for speculative storytelling, channeling their preference for solitude into
    focused digital art sessions that produce poignant visual narratives highlighting underrepresented experiences.
  sports: Kristina Johnson seldom participates in team sports, but maintains a personal fitness routine of early morning jogs along the Dover Riverfront and weekly yoga practice, while enthusiastically
    following the Dover Blue Hens and holding a membership at the local indoor climbing gym.
  arts: Kristina Johnson immerses themselves in creative expression, filling sketchbooks with urban portraits while listening to H.E.R., Miles Davis, and Noname, and regularly visits the Dover Art Museum
    to study the works of contemporary illustrators like James Jean.
  travel: Kristina Johnson prefers low‑key, budget‑friendly trips that feed their artistic eye, such as a week‑long visit to Asheville, North Carolina for its vibrant galleries and a weekend in Lisbon,
    Portugal to photograph historic tilework, always planning meticulously to preserve funds for art supplies.
  culinary: Kristina Johnson enjoys cooking simple yet flavorful dishes like avocado toast with poached eggs, miso ramen, and mango sticky rice, often experimenting with ingredients such as matcha powder
    and smoked salmon while occasionally grabbing quick bites from local food trucks during study breaks.
  core: Kristina Johnson is a methodical, introverted teen whose creative mind thrives on solitary art‑making, yet wrestles with persistent worry that fuels both their meticulousness and occasional self‑sabotage.
background:
  cultural: Kristina comes from a close‑knit African‑American family with deep roots in the Mid‑Atlantic region. Her grandparents migrated from the South during the Great Migration, bringing with them traditions
    of gospel music, storytelling, and Southern cooking that are still celebrated at family gatherings. Growing up in Dover, she participates in community events such as Juneteenth celebrations and the
    annual Black History Month programs at the local library. The church plays a central role in her life, offering both spiritual guidance and a venue for artistic expression through choir and youth arts
    workshops. These cultural influences shape her aesthetic sensibility and her desire to represent Black experiences through visual art.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''creative writing'', ''time management'', ''research'', ''basic computer operation'', ''self-directed learning'', ''critical thinking'']'
  hobbies: '[''sketching'', ''digital illustration'', ''poetry writing'', ''reading speculative fiction'', ''listening to R&B and jazz'', ''photography'', ''visiting art galleries'', ''journaling'']'
  career_goals: Kristina is determined to obtain her GED within the next year and enroll in a community college program focused on graphic design or visual communications. She dreams of building a career
    as a freelance illustrator who can merge her artistic vision with storytelling about African‑American experiences. In the longer term, she hopes to curate digital exhibitions that highlight under‑represented
    voices and perhaps mentor other young artists from her community.
