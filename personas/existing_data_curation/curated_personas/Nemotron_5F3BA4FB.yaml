personas:
  professional: Aaron Doan, a retired liberal arts scholar turned community cultural facilitator, leverages their decades-long research and writing expertise, keen eye for analog and digital photography,
    and hands-on handyman skills to plan senior-focused art exhibitions, mentor volunteer photographers, and deliver engaging lectures on California coastal history, all while balancing meticulous organization
    with spontaneous creative flexibility.
  sports: Aaron Doan, a dedicated member of the Huntington Beach senior walking club and occasional beach-volleyball enthusiast in the summer, follows the Los Angeles Lakers and Anaheim Ducks, participates
    in weekly low-impact yoga classes at the senior center, and treats Sunday morning beach walks as their primary fitness routine while occasionally indulging in nostalgic Saturday afternoon board-game
    tournaments at the local community center.
  arts: Aaron Doan, an avid patron of live jazz featuring artists like Thelonious Monk's tribute band and community theater productions starring local talent such as Emily Chen, regularly critiques contemporary
    exhibitions at the Bowers Museum, collects vintage photography prints by Ansel Adams, and passionately discusses the works of Edward Hopper and Frida Kahlo during their weekly bridge club gatherings.
  travel: Aaron Doan, who favors meticulously planned senior-friendly tours, has visited California's Getty Center and Hearst Castle, dreams of strolling through the Louvre in Paris and the Uffizi in Florence,
    and regularly arranges short road trips to coastal towns like Santa Barbara, while balancing travel aspirations with a modest travel budget and a desire to bring fresh cultural ideas back to their local
    programs.
  culinary: Aaron Doan, a competent amateur chef who experiments with mid-century American dishes like Chicken a la King and Beef Stroganoff using garden-fresh heirloom tomatoes, fresh basil, and locally
    sourced avocados, delights friends with a signature citrus-infused shrimp salad, yet is notorious for occasionally over-salting dishes and forgetting to turn off the oven after a lively potluck.
  core: Aaron Doan, an 84-year-old beach-side raconteur, blends a relentless curiosity for art, a knack for organizing community events, and a love of lively conversation with occasional forgetfulness about
    medication and a penchant for over-seasoned cooking.
background:
  cultural: Aaron is a white American of German‑Irish ancestry, born in 1941 in the Midwest and raised during the post‑World War II era. He moved to Southern California in the early 1970s, immersing himself
    in the relaxed, surf‑oriented lifestyle of Huntington Beach while maintaining the work ethic and family values of his Midwestern upbringing. Over the decades, he has absorbed the multicultural flavors
    of Orange County, appreciating the influences of nearby Hispanic and Asian communities, yet his cultural identity remains rooted in traditional American middle‑class norms—emphasizing independence,
    community involvement, and a love of the arts.
attributes:
  skills: '["Public speaking and storytelling","Research and writing (local history, art criticism)","Digital and analog photography","Event planning and coordination for community arts","Mentoring and
