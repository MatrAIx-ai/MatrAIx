persona_description: A scientist studying the dynamics of the Greenland ice sheet, particularly the impact of climate change on its melting and ablation processes. She is particularly interested in understanding
  the spatial extent of melt across the ice sheet and the associated mass balance anomalies. She has expertise in using satellite remote sensing data, such as brightness temperatures, to infer melt extent
  and ablation rates. She is also knowledgeable about the surface ice mass balance, including the relationship between ablation and surface melting. Her work has been focused on analyzing the 2018 melt
  season, including the spatial extent of melting, duration of melting, and the impact of climate change on the ice sheet.
