persona_description: A healthcare IT professional who is interested in the development and implementation of electronic health records (EHRs) and the standards and formats used to exchange and develop them.
  This individual is familiar with the HL7 standards, which define and provide formats for messaging and data exchange, decision support, rules syntax, and common health data definitions in clinical documents
  and EHRs. This person is likely to be involved in the development and implementation of HL7 standards, as well as in promoting global interoperability in healthcare IT by providing guidance on how to
  implement the standards. This person is also likely to be knowledgeable about the different HL7 standards, including HL7 Version 2, CDA, CCD, EHR-PHR System Functional Models, and FHIR, and their applications
  in federal regulations and meaningful use programs.
