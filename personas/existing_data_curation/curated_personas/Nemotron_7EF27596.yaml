  hobbies: '["basketball", "co‑op video gaming", "mountain biking", "fishing", "hiking", "model kit building", "electronics tinkering", "church youth group volunteering"]'
  career_goals: Short‑term, Alan aims to complete his GED and obtain a certification in automotive or HVAC technology, leveraging his mechanical aptitude. He also plans to enroll in a part‑time apprenticeship
    with a local contractor or service garage to gain real‑world experience. Long‑term, he envisions owning a small repair shop that serves the farming community of Sanpete County, or becoming a foreman
    for construction projects that help modernize the local infrastructure. Alan hopes to combine his practical skills with his desire to give back to his hometown, possibly by mentoring younger teens in
    hands‑on trades.
