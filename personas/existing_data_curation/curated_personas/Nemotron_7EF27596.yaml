personas:
  professional: Alan Styles, a 16‑year‑old aspiring tradesperson, blends curiosity with practicality by leading his school’s basketball team drills while mastering routine mechanical repairs on farm equipment,
    and is set on completing his GED and scoring an automotive or HVAC certification to launch a future repair shop for the local farming community.
  sports: Alan Styles, a 16‑year‑old guard on the high‑school basketball team, thrives on community pickup games, follows the Utah Jazz closely, and spends weekends mountain biking on Wasatch foothill trails
    while occasionally joining local youth hockey drills at the Logan Ice Center.
  arts: Alan Styles, a 16‑year‑old who builds model kits and plays cooperative video games, spends free time listening to the classic rock of Led Zeppelin, streams indie game soundtracks by Austin Wintory,
    and enjoys watching the sci‑fi series "The Expanse" for its strategic storytelling.
  travel: Alan Styles, a 16‑year‑old adventure‑seeker, has hiked the Delicate Arch trail in Arches National Park, plans a future road trip to the Pacific Northwest’s Olympic National Park for rainforest
    biking, and enjoys weekend camping trips to nearby reservoirs for fishing and night‑time stargazing.
  culinary: Alan Styles, a 16‑year‑old who often cooks after fishing trips, favors grilled trout seasoned with lemon and dill, enjoys whipping up loaded nachos with jalapeños and shredded cheddar, and occasionally
    experiments with building a homemade pizza topped with pepperoni, mushrooms, and fresh basil.
  core: Alan Styles, a 16‑year‑old energetic fixer‑upper, balances team‑leadership on the basketball court with hands‑on mechanical tinkering, all while juggling video‑game marathons, mountain‑bike thrills,
    and a budding entrepreneurial dream.
background:
  cultural: Alan was raised in Mount Pleasant, a small, predominantly white, Latter‑day Saint‑influenced community in central Utah. The town’s rural character, with many families involved in farming and
    ranching, instills values of self‑reliance, community service, and respect for practical work. Local traditions such as church gatherings, county fairs, and youth service projects shape his social outlook.
    While his cultural environment emphasizes modesty and cooperation, it also celebrates individual initiative, which aligns with Alan’s balanced blend of curiosity, practicality, and sociable energy.
attributes:
