  hobbies: '[''Reading historical fiction'', ''Gardening (native plants & herbs)'', ''Classical Indian music (listening and vocal practice)'', ''Puzzle solving (crosswords, Sudoku)'', ''Walking in regional
    parks'', ''Volunteering for STEM outreach for schoolgirls'']'
  career_goals: Although retired from formal employment, Madhavi aims to stay intellectually active and give back to her community. She plans to develop a citizen‑science program that trains local seniors
    to monitor and record garden biodiversity using simple sensors, merging her curiosity for new tech with practical outcomes. She also aspires to author a series of concise guides on data‑driven gardening
    and age‑appropriate STEM outreach for schoolgirls, leveraging her competitive drive to produce high‑quality resources. Finally, she is interested in earning a short‑term certificate in data science
    to deepen her analytical skill set and remain current with emerging methods.
