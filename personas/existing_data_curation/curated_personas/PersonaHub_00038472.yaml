persona_description: A historian or archaeologist who specializes in the study of medieval ecclesiastical architecture and the Church of England, particularly focusing on the Norman style and its architectural
  characteristics. This individual has a keen interest in the desecration of churches and the subsequent loss of their names in the Domesday Book. They are knowledgeable about the Taxation of Pope Nicholas
  the Fourth and its implications for the existence of churches in the past. This person has a strong interest in the study of ecclesiastical architecture and its preservation, and is interested in the
  role of vicars in the Church of England.
