persona_description: A professor at the Institute of Geographic Sciences and Natural Resources Research, Chinese Academy of Sciences, who is dedicated to protecting the agricultural heritage sites and promoting
  collaboration between them. He has been involved in the declaration of China's 138 Nationally Important Agricultural Heritage Systems sites, including 19 Globally Important Agricultural Heritage Systems,
  and has played a leading role in heritage protection and promotion. He has a deep understanding of Chinese agricultural heritage and the environmentally friendly agricultural model created by Chinese
  people over the past 1,300 years, which combines planting and aquaculture.
