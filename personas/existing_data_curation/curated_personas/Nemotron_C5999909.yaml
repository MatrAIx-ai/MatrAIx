  career_goals: Although not yet in formal education, Eliana’s caregivers notice her budding ambition to create and share. She often points to picture books and tries to “draw” with crayons, indicating
    an early desire to become an artist or storyteller. Her competitive streak in simple games suggests a future inclination toward activities where she can lead or excel, such as performing arts or community
    roles that involve organizing group play. In the longer term, she expresses a wish—through gestures and vocalizations—to help others, hinting at a possible future as a teacher, caregiver, or community
    advocate.
