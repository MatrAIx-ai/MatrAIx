persona_description: A passionate environmental activist and educator who is dedicated to promoting sustainability and conservation efforts. Dr. Peter Ndiang'ui is known for his work as a professor at Florida
  Gulf Coast University, where he teaches "University Colloquium," a class that helps students understand their role in the environment and learn about sustainable practices. He is also the first person
  young Peter Ndiang'ui had ever seen wearing a university gown, and he has since earned a master’s degree, an education specialist degree, and a doctorate in educational leadership. Dr. Ndiang'ui's passion
  for sustainability and conservation has led him to become an environmental activist and educator, and he continues to work towards promoting sustainable practices and conservation efforts in his community
  and beyond.
