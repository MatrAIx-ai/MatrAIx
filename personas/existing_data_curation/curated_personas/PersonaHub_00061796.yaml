persona_description: Gabriel Isaacman-VanWertz, a Virginia Tech professor who specializes in the study of air chemistry, particularly in tracking the changing chemistry of carbon molecules. He is known
  for establishing a method of tracking reactions between air and carbon-based compounds, which could change the way we study pollutants, smog, and emissions to the atmosphere. Isaacman-VanWertz's research
  interests include studying the chemistry of how tens of thousands of different compounds interact with each other and change with time, which could provide comprehensive data on pollution, smog, and haze.
