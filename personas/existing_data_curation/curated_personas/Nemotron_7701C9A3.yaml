  hobbies: '[''Hiking and nature photography'', ''Visiting local art fairs and galleries'', ''Playing acoustic guitar and banjo in small jam sessions'', ''Organic gardening and heirloom vegetable cultivation'',
    ''Reading Appalachian folklore, history, and contemporary philosophy'', ''Creative writing and short story crafting'', ''Cooking Southern cuisine and experimenting with recipes'', ''Volunteering at
    community center events (book clubs, film screenings, folk-dance workshops)'']'
  career_goals: Wesley aims to translate his artistic passions into a modest, flexible livelihood while maintaining the freedom he values. He plans to develop a freelance photography business focused on
    documenting Appalachian landscapes, historic sites, and local cultural events, gradually building an online portfolio and selling prints. Concurrently, he hopes to open a small community workshop where
    he can teach woodworking, basic gardening, and folk music to neighbors and youth, fostering collaborative creativity. He also considers completing his associate degree in environmental studies or art
    history, either online or through a local college, to deepen his knowledge and potentially qualify for part‑time teaching or curatorial roles at regional cultural centers. Ultimately, Wesley envisions
    a balanced life where his work supports his family, allows ample time for personal projects, and contributes to preserving and celebrating his Appalachian heritage.
