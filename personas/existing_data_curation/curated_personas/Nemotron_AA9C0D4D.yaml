personas:
  professional: Patricia Griffin is an aspiring business student with strong organizational chops, who leverages her debate and track background to approach accounting assignments with competitive precision;
    they treat each spreadsheet like a chessboard, planning moves ahead and double-checking every formula while adhering to a strict study schedule.
  sports: Patricia Griffin is a dedicated runner who logs three weekly 5-kilometer routes with the Mid‑South Running Club, cheers on the hometown high school Red Raiders on Saturday evenings, and they also
    casually follow the New Orleans Saints and the Mississippi State Bulldogs for a competitive edge.
  arts: Patricia Griffin is a mystery-book aficionado who devours novels by Tana French and Gillian Flynn, listens to gospel choirs like the Mississippi Mass Choir and classic soul artist Otis Redding,
    and they spend evenings dissecting clues from true-crime podcasts such as "Serial" and "Criminology".
  travel: Patricia Griffin is a careful planner who prefers short weekend road trips to nearby cultural spots, such as a historic tour of Natchez, a food-focused getaway to New Orleans for beignets and
    jambalaya, and they dream of a solo hike through the Great Smoky Mountains, though a tight student budget keeps long-haul flights off the table.
  culinary: Patricia Griffin is a home-cooking enthusiast who masters Southern staples like smoked pork ribs, shrimp étouffée, and collard greens using a family-passed spice blend of paprika, cayenne, and
    thyme, while they occasionally binge-watch cooking shows and practice plating on Instagram, though they sometimes over-salt dishes when stressed.
  core: Patricia Griffin is a structured, competitive 19-year-old who balances a love for puzzles and running with a skeptical mind, always juggling family traditions and ambitious career goals while they
    secretly worry about every detail.
background:
  cultural: Patricia grew up in Hattiesburg, Mississippi, in a middle‑class family with deep roots in the Southern United States. Her upbringing combined a strong sense of community, frequent participation
    in church activities, and an appreciation for regional traditions such as local cuisine, high school football culture, and family gatherings. She attended a public high school where she was involved
    in the debate club and varsity track, experiences that fostered her competitive spirit and practical outlook. The blend of Southern hospitality, respect for routine, and exposure to diverse community
    events in Forrest County has given her a balanced view of her regional heritage while encouraging her to pursue opportunities beyond her hometown.
