  career_goals: Patricia aims to enroll in a two‑year community college program in Business Administration, targeting an associate degree in accounting within two years. She plans to earn a Certified Bookkeeper
    credential and later transfer to a four‑year university to obtain a Bachelor’s degree in Management. Her long‑term ambition is to become a project manager at a medium‑sized manufacturing firm in the
    Gulf Coast region, where she can apply her organizational strengths and analytical mindset to improve operational efficiency. She seeks a stable, structured career that offers clear advancement paths,
    allowing her to achieve financial independence and support her family.
