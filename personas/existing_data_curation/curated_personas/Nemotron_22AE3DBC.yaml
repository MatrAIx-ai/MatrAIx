  hobbies: '[''Cooking Dominican dishes'', ''Dancing merengue and bachata'', ''Playing dominoes'', ''Gardening'', ''Walking in local parks and along the Passaic River Trail'', ''Volunteering at community
    and church events'', ''Reading historical biographies'', ''Attending Dominican cultural festivals'']'
  career_goals: Ricardo aims to re‑enter the workforce in a part‑time capacity that leverages his organizational strengths and community ties. He is pursuing a certificate in nonprofit management to qualify
    for roles in local community centers or charitable organizations where he can coordinate programs for seniors and youth. Simultaneously, he hopes to complete the remaining credits of his associate degree
    in business administration, with the long‑term goal of launching a small home‑based catering service specializing in traditional Dominican cuisine. He also aspires to mentor younger Dominican‑American
    adults, sharing his experience in navigating education, employment, and cultural identity. Achieving financial stability and a balanced lifestyle that reduces his stress levels are central to his ambitions.
