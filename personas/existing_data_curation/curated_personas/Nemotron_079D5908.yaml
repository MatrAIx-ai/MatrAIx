personas:
  professional: Aimee Sabin is a front-desk operations specialist turned community heritage coordinator, leveraging their crisp communication, meticulous data-entry skills, and humanities-driven research
    acumen to design outreach programs that digitize local archives, mentor volunteer archivists, and stage pop-up art exhibitions featuring emerging regional artists.
  sports: Aimee Sabin is an avid birdwatcher and gentle fitness enthusiast who joins the Raleigh Audubon Society's sunrise walks each spring, plays casual pickleball with the Raleigh Community Pickleball
    Club's senior league on weekends, and they remain a steadfast fan of the Carolina Panthers and the Charlotte Hornets, attending games when the schedule allows.
  arts: Aimee Sabin is a dedicated abstract watercolorist whose palette draws inspiration from Mark Rothko's vibrant color fields and Agnes Martin's subtle grids, who regularly reads Susan Sontag's essays
    on photography, and who savors quiet evenings at the North Carolina Museum of Art's intimate gallery openings featuring emerging artists like Jane Doe, where they linger over the subtleties of each
    piece.
  travel: Aimee Sabin is a methodical solo traveler who meticulously plans heritage-focused trips to historic locales such as Williamsburg, Virginia, and Bath, England, prefers off-season visits to avoid
    crowds, stays in boutique B&Bs that reflect local character, and they record each journey in a leather-bound journal that doubles as a research notebook.
  culinary: Aimee Sabin is a modestly skilled home cook who delights in preparing herb-infused roasted Brussels sprouts, skillet-seared trout with lemon-dill sauce, and, on special occasions, a labor-intensive
    paella featuring saffron, locally foraged wild mushrooms, and fresh cilantro plucked from her garden, and they take pride in plating each dish with a delicate garnish of garden herbs.
  core: Aimee Sabin is a solitary, imagination-driven archivist who hoards vintage postcards, loses track of time while watercoloring, forgets to water succulents, and they can spend an entire afternoon
    debating abstract art theory in the quiet corner of a museum.
background:
  cultural: Aimee grew up in a modest, middle-class white family in the Piedmont region of North Carolina, where Southern hospitality and community involvement were emphasized. Her upbringing included regular
    church attendance, participation in local fairs, and exposure to regional folk arts and storytelling. She attended public schools before earning a BA in humanities at a state university, where she developed
    an appreciation for diverse cultural narratives. The values of self-reliance, quiet reflection, and respect for tradition that she absorbed from her community continue to shape her worldview and inform
    her interest in preserving local heritage.
attributes:
  skills: '[''Customer service'', ''Information management'', ''Data entry'', ''Scheduling'', ''File organization'', ''Research'', ''Critical analysis'', ''Graphic design basics'', ''Digital archiving'',
    ''VBA scripting'', ''Creative problem solving'']'
  hobbies: '[''Watercolor painting'', ''Mixed-media collage'', ''Reading literary fiction'', ''Philosophy'', ''Art theory'', ''Birdwatching'', ''Native-plant gardening'', ''Journaling'', ''Poetry writing'',
    ''Genealogy research'', ''Digital photo archiving'', ''Knitting'']'
  career_goals: Aimee hopes to leverage her administrative experience and humanities background to transition into a role that combines community outreach with cultural preservation, such as a coordinator
    for a local heritage center or an education assistant at a regional museum. She plans to earn a certification in archival studies, develop a small community-focused history blog, and eventually mentor
    volunteers in curating and digitizing local historical records. In the longer term, she envisions curating occasional pop-up art exhibitions that showcase works by emerging local artists, allowing her
    to fuse her love of novelty, art, and abstract concepts with her organizational strengths.
