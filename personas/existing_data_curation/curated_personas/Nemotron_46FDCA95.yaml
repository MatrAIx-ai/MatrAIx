  hobbies: '["Recreational basketball", "Fishing", "Community barbecues", "Dallas Cowboys tailgate parties", "Church volunteering", "Neighborhood HOA involvement", "DIY home improvement", "Cycling", "Reading
    business non-fiction", "Watching NFL football"]'
  career_goals: Joseph aims to leverage his experience and business degree to move into a supervisory or operations management role within his courier company. Over the next five years he hopes to become
    a regional logistics coordinator, overseeing a team of drivers, implementing efficiency initiatives, and possibly obtaining a Certified Supply Chain Professional (CSCP) credential. He is also open to
    eventually starting his own small delivery or moving service, where he can apply his practical expertise while maintaining the stable, routine‑focused environment he values.
