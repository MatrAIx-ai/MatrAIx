persona_description: A law professor who specializes in environmental law, specifically the Endangered Species Act and its impact on development and agriculture. He or she has expertise in the use of scientific
  studies to argue for the protection of salmon and steelhead populations and the unintended consequences of listing them as endangered. The professor is likely to have a strong background in biology and
  ecology, as well as a deep understanding of the legal and policy frameworks governing the Endangered Species Act. The professor is likely to have a strong advocacy for the protection of salmon and steelhead
  populations and the recognition of the role of human-raised hatchery fish in their survival.
