  hobbies: '[''Gardening'', ''Fishing'', ''Woodworking'', ''Cooking (comfort food)'', ''Reading non-fiction (education, personal development)'', ''Chess'', ''Board games'', ''Evening walks'', ''Community
    events (selective)'']'
  career_goals: Alessio aims to move into school leadership, pursuing a master's degree in Educational Leadership to become a department chair or assistant principal. He wants to spearhead initiatives that
    strengthen student well‑being, integrate community resources into the curriculum, and promote disciplined yet flexible learning environments that reflect his commitment to practicality and harmony.
