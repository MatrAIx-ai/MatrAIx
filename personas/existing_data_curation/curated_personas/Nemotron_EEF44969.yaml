  hobbies: '[''Tropical gardening'', ''Birdwatching and nature walks'', ''Cuban cooking and recipe experimentation'', ''Salsa music and dancing'', ''Reading historical fiction and memoirs'', ''Knitting
    and crochet craft projects'', ''Community book club participation'', ''Marine conservation volunteering'']'
  career_goals: Although retired, Franchesca aims to deepen her community impact and preserve her cultural heritage. She plans to lead a weekly cooking workshop at the local senior center, sharing authentic
    Cuban recipes while encouraging participants to adapt them to local ingredients. She wishes to mentor younger volunteers in caregiving and organizational skills, emphasizing flexibility and compassion.
    Franchesca also hopes to compile a family memoir that combines oral histories, photographs, and recipes, creating a legacy for future generations. Finally, she aspires to support local environmental
    initiatives, such as beach clean‑ups and mangrove restoration, blending her curiosity about nature with her practical love of the outdoors.
