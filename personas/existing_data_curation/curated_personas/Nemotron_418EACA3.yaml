personas:
  professional: Wayne Hunt, a veteran engineering technician with over three decades of oilfield and agricultural machinery experience, channels his methodical, hands‑on expertise into mentoring junior
    staff and launching a modest home‑based farm‑equipment repair shop that reflects his love for routine, practical problem‑solving, and solitude; they plan to formalize their knowledge with a Journeyman
    Technician certification.
  sports: Wayne Hunt stays fit through early‑morning fishing on the Washita River and seasonal deer hunting, while cheering for the Oklahoma City Thunder, the Oklahoma Sooners football team, and attending
    local high‑school basketball games, and they are a member of a regional shooting club that meets each spring.
  arts: Wayne Hunt’s evenings are filled with classic country and western legends like Johnny Cash, Merle Haggard, and Willie Nelson, interspersed with the occasional live performance at the county fair’s
    music stage, and they also collect vintage Western art prints by Frederic Remington that line the walls of their workshop.
  travel: Wayne Hunt prefers road‑trip adventures that combine his love for classic car shows in Detroit, fishing expeditions to the Florida Keys, and hunting lodges in the Texas Hill Country, planning
    trips months ahead to accommodate their part‑time schedule and budget constraints; they keep a well‑worn leather travel journal to record each journey.
  culinary: Wayne Hunt enjoys cooking garden‑fresh vegetables into hearty stews, grilling catfish caught at the river, and savoring Oklahoma staples such as chicken fried steak, biscuits with sausage gravy,
    and cornbread, often seasoning their dishes with home‑grown oregano and smoked paprika; they never miss a Saturday morning coffee brewed strong enough to cut through the air’s chill.
  core: Wayne Hunt is a solitary, routine‑loving craftsman who balances meticulous technical expertise with a passion for classic country tunes, vintage cars, and the quiet rhythm of the outdoors, and they
    often over‑tighten bolts in a burst of meticulous pride.
background:
  cultural: Born and raised in a small farming community in central Oklahoma, Wayne grew up in a conventional white, Midwestern‑type family that valued self‑reliance, hard work, and community responsibility.
    His upbringing emphasized practical skills over formal education, which is reflected in his early departure from school before ninth grade and subsequent apprenticeship in local machine shops. The cultural
    milieu of Shattuck, with its close‑knit neighbors, church gatherings, and seasonal agricultural cycles, has reinforced Wayne’s preference for routine, modest ambition, and quiet solitude. While he respects
    the traditional values of his community, his divorce has led him to forge an independent, self‑sufficient lifestyle anchored in his trade and personal hobbies.
attributes:
  skills: '[''mechanical troubleshooting'', ''hydraulic system maintenance'', ''pneumatic system maintenance'', ''electrical wiring and diagnostics'', ''MIG/TIG welding'', ''CNC machine operation'', ''blueprint
