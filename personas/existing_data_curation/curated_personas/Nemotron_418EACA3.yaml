  hobbies: '[''fishing'', ''deer hunting'', ''vegetable gardening'', ''woodworking'', ''classic car restoration'', ''listening to classic country music'', ''reading technical manuals'', ''reading agricultural
    magazines'']'
  career_goals: Approaching retirement, Wayne aims to transition from full‑time shift work to a part‑time mentor role, formally passing his extensive knowledge to younger technicians at the local oilfield
    service company. He plans to obtain a Journeyman Technician certification and complete a short‑term community college program in industrial maintenance to solidify his credentials. In the longer term,
    he hopes to establish a modest home‑based repair workshop specializing in farm equipment, offering reliable, no‑frills service to the Shattuck farming community while maintaining a predictable schedule
    that aligns with his preference for routine and solitude.
