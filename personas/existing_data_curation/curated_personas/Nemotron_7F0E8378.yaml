  hobbies: '[''Watercolor painting'', ''Art gallery visits'', ''Live music and dance events'', ''Cooking Mexican cuisine'', ''Yoga'', ''Hiking'', ''Reading contemporary fiction'', ''Gardening'', ''Volunteering
    at health fairs'', ''Art‑therapy workshops'']'
  career_goals: Jannette aims to become a regional leader in community health by establishing a culturally tailored primary‑care clinic that blends conventional medicine with artistic wellness practices.
    She seeks a faculty appointment to mentor Latino medical students and to spearhead grant‑funded research on reducing health inequities in rural California. Additionally, she envisions expanding telehealth
    services to reach underserved farming communities in Kings County, while advocating for policy changes that support bilingual health‑care delivery.
