personas:
  professional: Jannette Suero, a board‑certified family physician, channels their curiosity and organized flexibility into pioneering a community health model that integrates preventive medicine, telehealth,
    and art‑therapy workshops for children, while mentoring bilingual medical students and advocating for policy change.
  sports: Jannette Suero enjoys weekend hikes in the Sierra Nevada foothills, practices yoga three times weekly, follows the Sacramento Kings, San Francisco 49ers, and Los Angeles Dodgers, and participates
    in the local Sacramento River Runners running club and a community pickleball league during the summer.
  arts: Jannette Suero immerses themselves in the arts by painting watercolor landscapes of the Central Valley, attending exhibitions featuring Georgia O'Keeffe at the Fresno Art Museum, and catching live
    performances by the San Joaquin Symphony and contemporary dance troupe Lolas Collective, while drawing inspiration from the music of John Legend and the poetry of Ocean Vuong.
  travel: Jannette Suero prefers meticulously planned weekend getaways to California gems such as Yosemite and Napa Valley, yet delights in spontaneous overseas adventures, having recently explored the
    historic streets of Seville, the culinary markets of Oaxaca, and the art‑laden canals of Venice, balancing a love for cultural immersion with a moderate budget.
  culinary: Jannette Suero, an avid home cook, skillfully prepares traditional dishes such as chiles en nogada and carnitas tacos with a modern twist of quinoa‑infused mole, enjoys experimenting with heirloom
    tomatoes, cilantro, and poblano peppers, and frequents the farmer’s market to select fresh produce for their weekend family feasts.
  core: Jannette Suero blends a physician’s precision with an artist’s improvisation, juggling clinic rounds, watercolor sessions, and late‑night coffee while habitually forgetting to water their garden
    until the last minute.
background:
  cultural: Jannette was raised in a bicultural Mexican‑American household, fluent in both Spanish and English. Her family traditions emphasize respect (respeto), close‑knit family ties, and the celebration
    of Mexican holidays such as Día de los Muertos and Cinco de Mayo. She maintains strong connections to her heritage through culinary practices, folk music, and participation in local cultural festivals.
    Living in Lemoore’s agricultural region, she is attuned to the experiences of farmworker communities and integrates that awareness into her medical practice, striving to bridge Mexican cultural values
    with the broader American health‑care system.
