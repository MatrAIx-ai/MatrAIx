personas:
  professional: Don Morris, a mechanical engineer with a knack for hands‑on design and data modeling, channels his curiosity and competitive edge into leading small, outcome‑focused project teams that blend
    flexible workflows with rigorous standards, aiming to earn his PE license and pioneer sustainable infrastructure retrofits.
  sports: Don Morris, an avid hiker of the San Bernardino mountains and occasional trail runner, supports the Los Angeles Lakers and LA Galaxy, and belongs to a local cycling club that meets on weekends,
    preferring outdoor fitness that aligns with his solitary yet competitive nature.
  arts: Don Morris, an enthusiastic landscape photographer inspired by Ansel Adams and a sci‑fi aficionado devouring works by Isaac Asimov and Liu Cixin, also enjoys listening to Daft Punk while refurbishing
    vintage model kits, weaving his engineering precision into his artistic pursuits.
  travel: Don Morris, who prefers spontaneous road trips that combine hiking and photography, has trekked through Yosemite and Iceland’s geothermal sites, and dreams of exploring Japan’s robotics hubs,
    often planning loosely around work deadlines and a modest travel budget.
  culinary: Don Morris, an experimental home cook who mixes Mediterranean flavors like smoked paprika with Asian techniques such as miso‑based marinades, often uses an Arduino‑controlled sous‑vide device
    to perfect dishes like ramen carbonara, and delights in sourcing fresh herbs from the local farmers market.
  core: Don Morris blends engineering rigor with creative curiosity, thriving on solitary projects yet fiercely competing in board games, while his relaxed approach to obligations sometimes leads to missed
    deadlines and forgotten appointments.
background:
  cultural: Don grew up in Ontario, a modest suburban community in San Bernardino County, within a predominantly white, middle‑class environment that emphasized self‑reliance, practical education, and individual
    achievement. His parents, both professionals—his mother a high‑school science teacher and his father an electrical engineer—instilled a respect for disciplined learning and hands‑on problem solving.
    The outdoor culture of Southern California, combined with the region’s tech‑oriented atmosphere, shaped his love for engineering, DIY projects, and environmental stewardship. While he identifies with
    mainstream American cultural norms, his divorce and independent lifestyle have reinforced a more introspective, self‑directed outlook.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''MATLAB'', ''Python'', ''Finite Element Analysis'', ''Rapid Prototyping'', ''Systems Integration'', ''Project Coordination'']'
  hobbies: '[''Hiking'', ''Landscape Photography'', ''Arduino Electronics Projects'', ''Reading Science Fiction'', ''Strategy Board Games'', ''Model Kit Restoration'', ''Experimental Cooking'']'
  career_goals: Don aims to become a senior project lead within the next five years and earn his Professional Engineer (PE) license. He is determined to spearhead sustainable infrastructure projects, especially
    renewable‑energy retrofits for Southern California communities. His long‑term ambition is to launch his own engineering consultancy that blends cutting‑edge design with practical implementation. He
    also seeks recognition as an innovator through patents, technical publications, and speaking at industry conferences, reflecting his competitive drive and desire for professional distinction.
