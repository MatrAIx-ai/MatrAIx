  hobbies: '[''Watercolor Painting'', ''Storytelling Circles'', ''Church Choir'', ''Craft and Quilting Groups'', ''Exploring Blues and Jazz Music'', ''Reading Speculative Fiction'', ''Gardening'', ''Cooking
    Experimental Southern Recipes'', ''Visiting Farmers Markets'', ''Spontaneous Road Trips'']'
  career_goals: She aims to obtain a higher‑level commercial driving certification and transition into a driver‑trainer role where she can mentor younger drivers, especially women and minorities, sharing
    her road safety knowledge. Kalayah also hopes to launch a small side venture selling handcrafted artwork and prints inspired by the Mississippi landscapes she enjoys driving through, blending her love
    of novelty and art. Long‑term, she envisions organizing community workshops that combine storytelling, art, and road‑safety education.
