personas:
  professional: Kalayah Laister is a veteran commercial driver with three decades of long‑haul and regional experience who leverages her mechanical savvy and people‑skills to keep trucks on the road and
    clients smiling, while channeling her imaginative, easy‑going nature into mentoring the next generation of drivers—especially women and minorities—and dreaming of turning her Delta watercolor prints
    into a modest side business.
  sports: Kalayah Laister is a regular participant in the Delta Community Seniors' Walking Club, a casual fan of the Mississippi State Bulldogs football team and the New Orleans Saints, and occasionally
    joins a church‑organized softball league that lets her stay active while socializing.
  arts: Kalayah Laister blends her love of watercolor painting—capturing the misty Delta wetlands—with a soulful voice in her church choir, a deep appreciation for B.B. King, Mahalia Jackson, and John Coltrane,
    and a habit of devouring speculative fiction by Octavia Butler and poetry by Maya Angelou, all of which feed her imagination and community storytelling gatherings.
  travel: Kalayah Laister prefers spontaneous, short‑range road trips in her own semi‑truck, steering off highways to explore roadside art installations along the Natchez Trace Parkway, the blues‑rich streets
    of Memphis, and the quirky murals of Austin, all while keeping travel costs low by camping at state parks and sharing rides with fellow drivers.
  culinary: Kalayah Laister’s culinary playground fuses Southern staples—like shrimp and grits or jambalaya—with global twists such as Thai coconut curry, harissa, and miso, and she regularly stocks her
    pantry with okra, cornmeal, jalapeños, and fresh cilantro sourced from the local farmers’ market to craft bold, comfort‑filled dishes.
  core: Kalayah Laister, a 63‑year‑old trucker‑turned‑artist, channels her boundless imagination and love of community into mentoring, watercolor painting, and culinary experiments, while her relaxed planning
    and occasional forgetfulness keep life both colorful and delightfully chaotic.
background:
  cultural: Kalayah’s cultural roots lie in the African‑American community of the Mississippi Delta, where gospel music, church fellowship, and strong family ties shape daily life. She grew up with oral
    storytelling traditions and a reverence for Southern cuisine, while also being aware of the civil‑rights legacy that pervades the region. Her identity blends the resilience of Southern Black culture
    with a deep appreciation for community rituals, local festivals, and the rich musical heritage of blues and jazz that permeates Woodville. She values intergenerational connections, mentorship, and the
    sharing of cultural knowledge through community events.
attributes:
  skills: '[''Commercial Driving'', ''Vehicle Maintenance'', ''Customer Service'', ''Sales and Negotiation'', ''Route Planning'', ''Logistics Software Operation'', ''Interpersonal Communication'', ''Conflict
