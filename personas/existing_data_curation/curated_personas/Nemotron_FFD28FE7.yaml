personas:
  professional: John Edwards, a 22‑year‑old aspiring communications professional with a humanities degree, merges meticulous event‑planning experience and strong written skills with a pragmatic, structured
    mindset, and they leverage their competitive drive to produce clear, outcome‑focused outreach campaigns for nonprofit organizations.
  sports: John Edwards fuels their competitive spirit by playing pickup basketball at the campus gym, joining a casual soccer league that supports Fayetteville FC, hiking the Ozark trails on weekends, and
    they cheer for the Arkansas Razorbacks during college football season.
  arts: John Edwards channels their creative energy into community theater, occasionally acting in productions of Lin‑Manuel Miranda’s *Hamilton* and designing sets inspired by Greta Gerwig’s visual style,
    while they unwind to Beyoncé’s *Renaissance* album and attend local indie‑film screenings.
  travel: John Edwards balances adventurous hiking in the Ozarks with budget‑friendly weekend road trips to Zion National Park, and they dream of a cultural immersion in Barcelona while carefully budgeting
    travel costs alongside a part‑time job.
  culinary: John Edwards experiments in the kitchen by mastering spicy ramen, BBQ pulled pork, and vegetarian tacos, favoring fresh basil, lime juice, and smoked paprika, and they often host dinner nights
    where friends sample these dishes alongside craft beer.
  core: John Edwards, a pragmatic yet sociable 22‑year‑old, constantly juggles multiple event‑planning projects while forgetting to charge their phone, and they display a competitive edge tempered by occasional
    forgetfulness.
background:
  cultural: John grew up in Fayetteville, Arkansas, a predominantly white, college-town community where Southern hospitality blends with a vibrant university atmosphere. Raised in a middle-class family,
    he experienced the region’s emphasis on community involvement, outdoor recreation in the Ozarks, and strong local traditions such as Razorbacks football and regional barbecue. His education at the University
    of Arkansas exposed him to diverse ideas, while his upbringing reinforced values of practicality, personal responsibility, and a modest, friendly demeanor typical of the American South. These cultural
    influences shape his outlook, work ethic, and social preferences.
attributes:
  skills: '["Written communication", "Critical research and analysis", "Public speaking", "Event planning and volunteer coordination", "Social media management", "Microsoft Office suite", "Google Workspace",
