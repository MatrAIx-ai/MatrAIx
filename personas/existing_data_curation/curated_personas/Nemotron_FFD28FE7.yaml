  hobbies: '["Pickup basketball", "Casual soccer", "Hiking Ozark trails", "Cycling", "Volunteer event organization", "Community theater (acting & set design)", "Reading historical non-fiction", "Landscape
    photography", "Board games", "Trivia nights", "Cooking for friends"]'
  career_goals: John aims to launch his career in the communications field, targeting entry-level roles such as Communications Assistant or Community Outreach Coordinator at a regional nonprofit or marketing
    agency. Over the next five years, he plans to build a professional portfolio of writing, digital content, and event-management projects, pursue a certification in digital marketing, and eventually move
    into a Communications Manager position where he can shape strategic outreach campaigns. He is also considering a part-time Master’s program in Strategic Communication to deepen his expertise and increase
    his competitiveness in the job market.
