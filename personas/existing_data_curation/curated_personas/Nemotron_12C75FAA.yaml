  career_goals: Though retired, John aims to channel his engineering and artistic expertise into community‑driven projects. He plans to co‑lead a local makerspace where seniors can collaborate on kinetic
    sculptures and functional art pieces, providing mentorship to youth interested in STEAM fields. He hopes to publish a practical guide titled "Engineering Creativity for Seniors" and to serve on the
    board of the Canton Art Club, championing interdisciplinary public installations. Personally, he seeks to master stress‑reduction techniques—such as mindfulness through creative practice—and to compete
    in regional senior chess tournaments, balancing his competitive drive with a desire for personal well‑being.
