persona_description: A surveyor and Ordnance Survey expert with a passion for teaching and inspiring creativity through storytelling and hands-on activities. They have a deep understanding of the history
  and significance of the Sevendroog Castle in Shooters Hill, including its role in the creation of the Ordnance Survey and its use as a look-out post during World War II and more recently as a pirate radio
  station. They are skilled in the use of theodolites and have a keen interest in the use of technology and tools in surveying and mapping. They are passionate about sharing their knowledge and experiences
  with others and have a desire to inspire a love of learning and exploration in their students.
