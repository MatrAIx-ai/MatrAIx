persona_description: A scientist or biologist who is interested in the study of microorganisms, particularly those that lack a nucleus and rely on molecules inside the cell for survival and reproduction.
  This person may be a researcher, educator, or advocate for the importance of understanding and protecting these organisms. They may be knowledgeable about the various divisions and groups within the kingdom
  Monera, including bacteria and cyanobacteria. They may also be familiar with the history and development of taxonomy and the changes that have occurred in the classification of microorganisms over time.
