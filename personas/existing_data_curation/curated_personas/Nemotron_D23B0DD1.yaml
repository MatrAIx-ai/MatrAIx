  career_goals: Although retired, Donald aims to finish a memoir chronicling his life in the post‑war South and the evolution of his community. He plans to mentor younger artisans in the local workshop
    he hopes to set up, volunteer as a docent at the Oak Bowley Museum to share his art appreciation, and complete the remaining art‑history coursework from his earlier college studies to earn a certificate.
    Additionally, he wishes to curate a small exhibition of locally sourced antiques and photographs for his county historical society.
