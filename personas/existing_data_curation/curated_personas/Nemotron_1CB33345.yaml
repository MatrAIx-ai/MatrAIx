  career_goals: Although only ten, Lucinda has a budding vision for her future. She dreams of becoming a scientist who explores the natural world—particularly a wildlife biologist or veterinarian—so she
    can help protect animals she cares for. She also imagines working on environmental projects that improve her community’s parks and waterways. In the short term, she aims to win the school science fair
    with a project about local ecosystems, learn more advanced coding to create interactive stories, and volunteer at the neighborhood library’s reading program. Her ambitions are guided by a desire to
    combine curiosity with practical solutions that benefit others.
