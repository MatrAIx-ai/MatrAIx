personas:
  professional: Lucinda Wilson is a budding young technologist who blends their love for fantasy storytelling with hands‑on problem solving, building Scratch games and LEGO creations in quiet solo sessions,
    where their curiosity and practical mindset let them experiment with new ideas while relying on proven methods.
  sports: Lucinda Wilson enjoys quiet weekend hikes through Anoka County parks, occasionally cheering for the Minnesota Twins and Minnesota Timberwolves while they serve as a casual mini‑coach in the Anoka
    Youth Soccer League’s after‑school program, embodying a low‑key, nature‑focused approach to fitness that balances solitary exploration with occasional team involvement.
  arts: Lucinda Wilson immerses themselves in R&B and gospel tracks by Beyoncé and Mahalia Jackson while sketching scenes from J.K. Rowling’s novels, often watching Studio Ghibli films for inspiration,
    and their quiet, imaginative nature fuels a deep appreciation for storytelling across music, literature, and visual art.
  travel: Lucinda Wilson prefers low‑key, nature‑oriented trips, often planning loosely with their mother to explore nearby destinations like the North Shore of Lake Superior and the Minnesota State Parks,
    while dreaming of a future adventure to Disney World in Florida and Paris, and they always bring a sketchbook to capture each new landscape.
  culinary: Lucinda Wilson loves helping their mother bake chocolate chip cookies and brownies, relishes the tactile process of measuring flour and mixing batter despite occasionally spilling ingredients
    and leaving crumbs everywhere, and they delight in sharing the warm treats with friends at school.
  core: Lucinda Wilson is a quiet, imaginative ten‑year‑old who blends curiosity with practicality, thriving in solitary creative projects while they occasionally forget to stay organized or track their
    spending.
background:
  cultural: Lucinda grows up in a close‑knit African‑American family in Minneapolis’ Anoka County suburbs. Her parents emphasize pride in their heritage, sharing stories of the civil‑rights movement and
    celebrating traditions like Juneteenth and Kwanzaa at home. She attends a local elementary school with a diverse student body and participates in after‑school programs at the community center that highlight
    African‑American art, music, and history. Regular visits to the Twin Cities’ Black History Museum and church gatherings reinforce a sense of belonging and responsibility to her community. This cultural
    foundation nurtures her love for storytelling, her respect for collaborative kindness, and her aspiration to give back, especially through science and environmental stewardship.
