  career_goals: Jane aims to progress into a senior detective role within the Loveland Police Department, focusing on community-oriented investigations. She plans to complete a master's degree in criminal
    justice to deepen her strategic understanding of policing reform. In the next five years, she hopes to lead a crisis-intervention training program, mentor new officers, and collaborate with local mental-health
    agencies to improve response protocols. Long-term, she envisions a supervisory position where she can shape departmental policies that balance public safety with civil liberties.
