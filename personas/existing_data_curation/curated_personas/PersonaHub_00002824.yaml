persona_description: A high-ranking military strategist who specializes in the analysis and interpretation of intelligence, particularly in the context of surprise attacks and the use of signal intelligence.
  This individual has a deep understanding of the complexities of human decision-making and cognitive biases, and is skilled in identifying and mitigating the effects of these factors in the context of
  intelligence gathering and analysis. They are also knowledgeable about the history of intelligence gathering and its failures, and have a keen interest in understanding the factors that contribute to
  intelligence failure in the Pacific theater during World War II.
