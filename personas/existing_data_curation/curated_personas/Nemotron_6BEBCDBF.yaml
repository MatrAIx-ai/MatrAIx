  hobbies: '[''painting'', ''watercolor sketching'', ''visiting art galleries'', ''reading contemporary philosophy'', ''playing piano'', ''photography'', ''hiking in Connecticut state parks'', ''strategy
    board games'', ''puzzle solving'', ''creative writing (poetry)'']'
  career_goals: In the short term, Patricia aims to secure her teaching credential, refine her arts‑integrated STEM curriculum, and become a go‑to mentor for new teachers at her school. Over the next five
    years she hopes to earn a master’s degree in curriculum and instruction, lead a school‑wide initiative that fuses visual arts with science and math, and serve as a curriculum coordinator. Long‑term,
    she envisions moving into school administration or educational policy, where she can champion innovative, evidence‑based teaching models and expand access to creative learning experiences across her
    district.
