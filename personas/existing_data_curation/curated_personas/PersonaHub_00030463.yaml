persona_description: A public health official who is advocating for harm reduction policies in West Virginia, specifically in Cabell County, to reduce the spread of infectious diseases among people who
  inject drugs. The official is aware of the controversy surrounding SSPs and the potential for harm reduction programs to be controversial in local communities. The official is dedicated to reducing syringe
  litter in the community and encouraging PWID to bring syringes to the HRP for proper disposal. The official is also aware of the potential for harm reduction programs to be at risk of an HIV outbreak
  in the future, but is working to monitor the situation and ensure that the community is protected.
