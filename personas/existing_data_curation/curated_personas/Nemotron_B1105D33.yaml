  career_goals: Emily hopes to blend her love of science with her desire to help others by pursuing a career in veterinary medicine or becoming a veterinary technician. She also wants to start a youth mental‑health
    outreach group at her future high school, using her own experiences with anxiety to support peers. Long term, she plans to earn a degree in biology, continue volunteering at animal shelters, and eventually
    work in a clinic that combines animal care with community education.
