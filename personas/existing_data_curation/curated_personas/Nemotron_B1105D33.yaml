personas:
  professional: Emily Sanford, an aspiring young coder and science‑club enthusiast, blends curiosity with practicality by leading Scratch projects that combine imaginative game ideas with step‑by‑step logic,
    leveraging their sociable energy and reliable organization to keep group work on track while they assertively guide teammates through experiments.
  sports: Emily Sanford anchors the midfield for the River Valley Rockets Youth Soccer team, trains with the Midtown Athletic Club’s after‑school fitness program during the fall, follows the professional
    Springfield Strikers in the NFL and admires Manchester United’s tactical play, and they balance high‑energy practices with mindful stretching to keep their footwork sharp.
  arts: Emily Sanford sings alto in the Maple Grove High School choir, channeling the vocal styles of Ariana Grande and Billie Eilish, and they spend evenings sketching fantasy characters inspired by Hayao
    Miyazaki and JK Rowling while crafting DIY charm bracelets to the soundtrack of Taylor Swift’s latest album, weaving music and visual art into their daily routine.
  travel: Emily Sanford prefers weekend road trips with family, planning itineraries on Google Trips and dreaming of exploring Edinburgh’s historic streets and the interactive science exhibits at Washington,
    D.C.’s Smithsonian, yet their school commitments and modest allowance often confine adventures to nearby state parks and the annual county fair, where they savor local crafts and carnival rides.
  culinary: Emily Sanford favors homemade pizza topped with extra mozzarella and pepperoni, experiments with baking chocolate‑chip cookies and rainbow cupcakes under their mom’s watchful eye, enjoys occasional
    sushi rolls like California rolls and spicy tuna, and they view cooking as a low‑stress hobby that doubles as a creative outlet after school.
  core: Emily Sanford is a curiosity‑driven, socially vibrant teen who balances practical projects with bursts of anxiety, channeling energy into soccer, coding, and journaling while they occasionally succumb
    to impulse jewelry purchases.
background:
  cultural: 'Emily comes from a White, Anglo‑American family in Crosby, Texas. Her upbringing reflects typical small‑town Texan values: close family ties, participation in community churches, and involvement
    in local events such as county fairs and youth sports. While her family maintains traditional Texas traditions like barbecue and holiday gatherings, she also experiences the diverse influences of Harris
    County, including exposure to Hispanic cuisine, music, and a multicultural school environment. This blend of suburban Texas life and broader cultural exposure shapes her worldview and social interactions.'
