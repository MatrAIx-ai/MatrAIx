  hobbies: '[''Fishing'', ''Lowcountry Cooking'', ''R&B and Jazz Music'', ''Pickup Basketball'', ''Reading Historical Nonfiction'', ''Tech Gadgets Exploration'', ''Mentoring Youth'', ''Coastal Road Trips'',
    ''Solo Waterfront Walking'']'
  career_goals: Antonio aims to move from his current first‑line supervisor role to assistant manager within the next year, then to store manager and eventually a regional management position. He plans
    to earn an associate degree in business administration and later a bachelor’s degree, using online courses that fit his flexible schedule. He wants to deepen his expertise in omnichannel retail, learning
    how to blend in‑store experiences with e‑commerce platforms. Long‑term, he envisions opening a small boutique that showcases locally sourced products and provides mentorship opportunities for young
    people from his community. Throughout his career progression, he prioritizes maintaining a balanced family life and staying adaptable to new challenges.
