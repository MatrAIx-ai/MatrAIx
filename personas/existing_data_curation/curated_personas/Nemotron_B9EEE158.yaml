  career_goals: Emilia aspires to attend a high school that offers strong art and environmental science programs, and eventually enroll in a college where she can study environmental art or conservation
    communication. She dreams of creating community murals and educational installations that highlight the unique coastal ecosystems of the Oregon coast, and hopes to work for a nonprofit organization
    that combines art education with ecological stewardship. In the shorter term, she aims to build a robust portfolio of illustrations and photography, gain leadership experience in her school's ecology
    club, and secure a summer internship at the Tillamook County Fair’s art booth or a local nature center.
