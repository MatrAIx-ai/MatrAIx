personas:
  professional: Quentin Canton is a budding LEGO architect whose love for structure and discipline shows up in meticulously organized creations, where they consistently align bricks by color and size to
    meet the high standards they set for themselves.
  sports: Quentin Canton is an enthusiastic member of the local tots' soccer club that practices on Saturday mornings, cheering for the Metro Cubs and loving the predictable drills, yet they also enjoy
    solitary play on their backyard mini-treadmill bike when they need quiet time.
  arts: Quentin Canton is a creative drawer who spends afternoons sketching cartoon dinosaurs on graph paper, listening to The Wiggles, and organizing their artwork into neat stacks, reflecting their desire
    for order and harmony.
  travel: Quentin Canton is an adventurous little traveler who loves family road trips to the nearby beach where they catalog seashells in a labeled notebook, dreaming of future visits to Disney World and
    the Great Barrier Reef while preferring itineraries with clear schedules.
  culinary: Quentin Canton is a picky yet curious eater who favors mac and cheese with peas, chicken nuggets, and carrot sticks, and proudly assembles their own mini-pizza by arranging toppings in tidy
    rows before baking it under adult supervision.
  core: Quentin Canton is a disciplined five-year-old who blends a love of order with gentle kindness, turning every playtime into a mini-project while keeping a tidy piggy bank and an eye on their favorite
    dinosaur stickers.
background:
  cultural: Quentin is an African American child growing up in Madison Heights, a small community in Amherst County, Virginia. His family is deeply rooted in the local Black community, where church, education,
    and family gatherings are central. His parents work as educators, emphasizing the importance of learning and cultural pride. They attend a historically Black congregation that celebrates traditions
    such as gospel music, Juneteenth, and community service projects. Quentin regularly participates in Sunday school, church potlucks, and the county’s summer reading program, and his family shares stories
    about ancestors who contributed to the civil‑rights movement in Virginia. These experiences give him a strong sense of cultural identity and belonging.
