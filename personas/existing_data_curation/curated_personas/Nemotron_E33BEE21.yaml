  career_goals: Quentin often imagines himself as a teacher who helps his classmates learn in an orderly way, arranging books and materials for lessons. He also loves building things and dreams of becoming
    an engineer or an astronaut who follows precise mission plans. These aspirations reflect his desire to combine his natural love for organization, achievement, and helping others. In the long term he
    sees himself in a role such as a school principal, city planner, or community leader where he can create structured, supportive environments for people around him.
