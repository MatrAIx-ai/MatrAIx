  career_goals: Zineb aspires to step into a regional director role overseeing a network of rural hospitals in Idaho, where she can champion the expansion of tele‑health services to reach underserved populations.
    She plans to institutionalize an integrated art‑therapy program across her facilities, using her love of art to enhance patient recovery and staff morale. Over the next five years, she aims to achieve
    a Certified Medical Manager (CMM) designation and complete advanced coursework in health‑services leadership, closing the formal education gap left by her high‑school‑only background. Zineb also seeks
    to mentor emerging female health‑services managers, establishing a structured apprenticeship program within her organization. Her long‑term ambition is to lead a multi‑facility quality‑improvement initiative
    that reduces average patient wait times by at least 20% while maintaining the highest standards of safety and patient satisfaction.
