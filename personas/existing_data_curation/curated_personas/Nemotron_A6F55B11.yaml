  hobbies: '["Watercolor painting", "Knitting", "Reading historical fiction", "Visiting art galleries", "Community gardening", "Cooking international dishes", "Walking tours of Brooklyn", "Attending local
    jazz concerts", "Participating in book clubs", "Learning basic Spanish"]'
  career_goals: Although retired, Martha aims to deepen her impact in the community. She plans to organize a neighborhood art exhibition that showcases works by senior creators, mentor a group of high‑school
    students interested in local history, and complete a memoir that weaves her family’s French‑Canadian heritage with Brooklyn’s evolving cultural landscape. Additionally, she hopes to become more proficient
    with video‑calling platforms to stay connected with her grandchildren and to explore new art techniques, such as mixed‑media collage.
