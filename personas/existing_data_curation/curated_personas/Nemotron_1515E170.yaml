  career_goals: Adrienne is focused on advancing her nursing career while maintaining the structured and reliable work style she values. In the short term, she plans to complete her Bachelor of Science
    in Nursing (BSN) to meet the evolving standards of her health system. She aims to obtain advanced certifications such as Advanced Cardiac Life Support (ACLS) and a Critical Care Registered Nurse (CCRN)
    credential, positioning herself for a role in the emergency department or intensive care unit. Long‑term, she aspires to pursue a Master of Science in Nursing with a concentration in either Family Nurse
    Practitioner or Nursing Administration, enabling her to provide autonomous patient care and take on leadership positions such as charge nurse or nurse manager. Adrienne is also driven to address health
    disparities affecting African‑American communities; she hopes to lead community outreach programs, mentor black nursing students, and eventually influence health policy to improve access and outcomes
    for underserved populations.
