personas:
  professional: Adrienne Mcnair, a 23‑year‑old registered nurse at a busy community hospital, leverages precise patient assessments, swift IV medication administration, meticulous wound‑care documentation,
    and a competitive drive for certifications—currently pursuing ACLS and CCRN—to keep the unit organized, and they rigorously precept new staff while championing quality‑improvement projects.
  sports: Adrienne Mcnair starts each morning with a 5‑mile jog through the Glassboro trail network, attends weekly yoga classes, plays catcher for the local Glassboro Community Softball League, and they
    root passionately for the Philadelphia Eagles, Phillies, and 76ers, balancing a disciplined fitness routine with a competitive spirit on the field.
  arts: Adrienne Mcnair channels creative energy through photography of sunrise hikes, crocheting colorful blankets while listening to H.E.R. and Miles Davis, losing themselves in contemporary novels by
    Sally Rooney, and they unwind with board games such as Settlers of Catan during evening gatherings with close friends.
  travel: Adrienne Mcnair prefers meticulously planned weekend getaways to cultural festivals—having explored New Orleans’ Mardi Gras and Jamaica’s Reggae Sumfest—and they dream of future trips to Edinburgh’s
    Fringe Festival and the historic streets of Charleston, balancing limited nursing shift schedules with a desire for immersive, music‑rich experiences.
  culinary: Adrienne Mcnair, an intermediate home chef, loves experimenting with Southern comfort staples like shrimp and grits and Caribbean‑infused jerk chicken, frequently seasoning with smoked paprika,
    allspice, and scotch bonnet peppers, and they enjoy sourcing fresh collard greens from their garden to create wholesome, flavor‑forward meals that they share at potluck gatherings.
  core: Adrienne Mcnair, a 23‑year‑old nurse who balances a relentless drive for professional certification with a love of sunrise jogs, impromptu crochet projects, and occasional binge‑reading, can be
    both meticulously organized and surprisingly skeptical of anyone who disrupts their carefully timed schedule.
background:
  cultural: Adrienne identifies as African‑American with roots that trace back to both the Southern United States and Caribbean relatives who settled in South Jersey. Growing up in Glassboro, she was immersed
    in a close‑knit black community where church, family gatherings, and soulful music were central to daily life. These cultural experiences instilled values of resilience, mutual support, and a strong
    sense of identity. She carries forward family traditions of cooking soul food and celebrates cultural holidays that honor her heritage. Aware of the health inequities that disproportionately affect
    black populations, Adrienne integrates this perspective into her nursing practice and community involvement, striving to improve health outcomes for the people who share her background.
