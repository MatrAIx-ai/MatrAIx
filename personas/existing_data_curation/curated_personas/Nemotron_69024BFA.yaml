  career_goals: Terence aims to move into a supervisory role within the hospitality sector, such as shift manager or assistant floor supervisor, where he can mentor new staff while still staying hands‑on.
    He is interested in completing a GED and taking short courses in culinary arts or hospitality management to broaden his expertise. Long‑term, he envisions opening a modest neighborhood café that blends
    classic Midwestern comfort food with rotating seasonal menus, allowing him to satisfy both his curiosity for new ideas and his practical desire for a stable, community‑focused business.
