personas:
  professional: Terence Sholler is a 40‑year‑old server at a bustling downtown diner where their quick‑thinking, hands‑on approach to POS systems and food‑safety regulations keeps the floor humming even
    during the lunch rush; they blend curiosity about new menu ideas with practical multitasking, mentor new hires with a calm, assertive style, and are actively pursuing a GED and short hospitality‑management
    courses to step into a shift‑manager role and eventually launch a neighborhood café.
  sports: Terence Sholler is a faithful follower of Detroit sports—cheering the Tigers in baseball, the Lions in football, and the Pistons in basketball—while spending quiet weekends fishing at Lake St.
    Clair with the local Muskegon Lakes Bass Club; they also play pickup basketball at the community center and coach a youth baseball team twice a season, preferring small‑group camaraderie over large‑scale
    fan events.
  arts: Terence Sholler immerses themselves in gritty Midwestern music, regularly listening to The White Stripes and John Mellencamp, strums acoustic renditions of Bob Dylan on a vintage guitar, enjoys
    classic films like "Casablanca" and "The Godfather" during quiet evenings, and visits the Detroit Institute of Arts for occasional exhibitions of American realism, all of which enrich their appreciation
    for straightforward, heartfelt storytelling.
  travel: Terence Sholler favors road‑trip adventures that blend solitude with local flavor, having taken spontaneous drives to Mackinac Island, the Upper Peninsula’s Porcupine Mountains, and the Great
    Lakes shoreline; they dream of a fall foliage tour through New England’s small towns and a rugged camping expedition in the Pacific Northwest, but typically book budget motels last‑minute, packing a
    cooler of homemade sandwiches for the journey.
  culinary: Terence Sholler delights in hearty Midwestern cooking, mastering the pork tenderloin sandwich, perfecting a Michigan cherry pie, and experimenting with homemade pierogi stuffed with potatoes
    and cheese; they grill fresh lake‑caught trout on summer evenings, brew a seasonal saison with local hops, and keep a well‑stocked pantry of rye flour, sauerkraut, and fire‑roasted peppers to add a
    twist to classic comfort dishes.
  core: Terence Sholler blends a steady Midwestern work ethic with a restless curiosity, managing a busy service floor while dreaming up a community café, all while juggling a love for fishing, craft beer,
    and DIY projects.
background:
  cultural: Terence grew up in the Detroit metropolitan area as a second‑generation white American, with family roots tracing back to German and Irish immigrants. Raised in a working‑class neighborhood
    of Flat Rock, Michigan, he internalized Midwestern values of self‑reliance, modesty, and community support. His upbringing involved frequent visits to local diners, community fairs, and seasonal festivals,
    shaping his appreciation for straightforward, hearty cuisine and the social fabric of small‑town gatherings. Though he left high school without a diploma, he values practical knowledge and informal
    learning, reflecting the region's emphasis on hands‑on experience over formal credentials.
attributes:
