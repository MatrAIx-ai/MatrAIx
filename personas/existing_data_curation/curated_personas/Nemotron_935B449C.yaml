personas:
  professional: Darren Moratin, a 7‑year‑old aspiring illustrator and imaginative builder, merges a love for drawing cartoons with LEGO construction, applying meticulous organization to detailed sketches
    while staying flexible enough to improvise bold, unconventional ideas, and they often channel their high energy into collaborative classroom projects.
  sports: Darren Moratin kicks a soccer ball with friends at recess, idolizes Manchester United’s midfield creativity, and plays for the local Little Sprouts Soccer Club that practices after school, bringing
    their outgoing energy and assertive teamwork to every match.
  arts: Darren Moratin sketches cartoons inspired by Charles Schulz and Matt Groening, dances to Kidz Bop Kids’ pop covers, and watches Studio Ghibli’s Spirited Away for visual storytelling cues, blending
    these influences into vivid, slightly unconventional art that reflects their curiosity and emotional depth.
  travel: Darren Moratin plans weekend adventures with a hand‑drawn map, prefers hands‑on trips like camping in Redwood National Park and exploring the Monterey Bay Aquarium, and dreams of a future family
    vacation to Disneyland Paris, balancing excitement with the practical limits of parental budgeting.
  culinary: Darren Moratin loves cheesy pizza and crunchy chicken nuggets, eagerly helps stir spaghetti sauce, crafts strawberry‑banana smoothies with almond milk, and they often request extra marshmallows
    tucked into their hot cocoa as a comforting treat.
  core: Darren Moratin is a curious, art‑obsessed 7‑year‑old who balances meticulous LEGO building with spontaneous cartoon sketches, bursts of soccer energy, and occasional anxiety‑driven snack binges,
    never quite finishing a clean‑up before the next adventure.
background:
  cultural: Darren lives in the small rural community of Hartford, Michigan, where Midwestern values of friendliness, modesty, and community involvement shape his upbringing. His family’s white, predominantly
    German‑Irish heritage is reflected in holiday traditions such as Thanksgiving feasts, summer county fairs, and a strong emphasis on school and local church activities. Growing up in Van Buren County,
    he often participates in community events like the pumpkin patch, local library story hours, and volunteer clean‑up days, which reinforce his sense of belonging and appreciation for the region’s natural
    landscape.
