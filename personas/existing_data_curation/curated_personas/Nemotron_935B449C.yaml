  career_goals: When asked about his future, Darren often talks about becoming an astronaut so he can explore space, an artist to create vivid pictures, or a teacher who helps other kids learn. He is drawn
    to careers that combine curiosity, creativity, and the chance to work with others, and he looks forward to learning more about science and art as he grows.
