  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography'', ''Reading graphic novels'', ''Writing poetry'', ''Listening to jazz and hip‑hop'', ''Visiting museums and galleries'', ''Volunteering
    at community art center'', ''Cooking family recipes'', ''Journaling'']'
  career_goals: Jmia aspires to pursue formal training in graphic design or visual arts, aiming to enroll in a community college or a specialized art institute after earning her high‑school equivalency.
    She hopes to secure a scholarship that will allow her to study illustration and community‑based art projects. In the long term she envisions a career as a graphic designer for a nonprofit that highlights
    African‑American history, or as a community‑arts coordinator who creates youth workshops and public murals that reflect Chicago’s Black heritage. She also dreams of curating a local exhibition that
    showcases emerging Black artists from her neighborhood.
