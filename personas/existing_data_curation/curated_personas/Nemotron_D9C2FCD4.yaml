personas:
  professional: Jmia Snipes, an aspiring graphic designer who blends charcoal sketches with Procreate illustrations, channels a disciplined yet adaptable work ethic into freelance design projects for local
    community nonprofits, and they use empathetic collaboration to craft visual stories that celebrate neighborhood resilience.
  sports: Jmia Snipes, a member of the South Side Youth Basketball Association, enjoys early‑morning jogs along the lakefront while listening to classic jazz, cheerfully watches Chicago Bulls games at home,
    follows the Chicago Cubs season passionately, and they participate in community yoga classes at the local recreation center.
  arts: Jmia Snipes, a dedicated visual arts enthusiast, spends weekends sketching in the Chicago Cultural Center, draws inspiration from Theaster Gates’ public installations and Kara Walker’s narrative
    prints, while vibing to Miles Davis and Kendrick Lamar as background tracks for digital illustration sessions, and they volunteer at a neighborhood art hub to mentor younger creators.
  travel: Jmia Snipes, an adventurous yet budget‑conscious teen, has explored New Orleans during Mardi Gras, trekked the Detroit Institute of Arts murals, and visited Washington, D.C.’s National Museum
    of American History, with future plans to journey to Harlem’s Studio Museum and the music‑rich streets of Memphis, and they always opt for bus or train travel to keep costs low.
  culinary: Jmia Snipes, an intermediate home cook, lovingly prepares collard greens seasoned with smoked paprika, sweet‑potato pie, and buttery cornbread for family gatherings, experiments with mac and cheese
    variations using sharp cheddar, and they enjoy creating quick Snapseed‑styled food photos of fried chicken and waffles for their social‑media feed.
  core: Jmia Snipes blends artistic curiosity with organized creativity, they save diligently for supplies, manage mild health issues, stay active through basketball and jazz‑filled runs, and dream of community
    murals that echo neighborhood pride.
background:
  cultural: Jmia identifies as African‑American and grew up on Chicago’s South Side, a neighborhood shaped by a vibrant Black cultural legacy. She was raised with Sunday church services, family reunions
    featuring soul food, and storytelling about the Great Migration. Her upbringing exposed her to the city’s historic blues and jazz clubs, the legacy of the Chicago Black Renaissance, and contemporary
    street art projects led by artists like Theaster Gates. These influences inform her appreciation for music, visual art, and community solidarity. She participates in local youth programs that celebrate
    Black history and often incorporates themes of resilience and cultural pride into her artwork.
