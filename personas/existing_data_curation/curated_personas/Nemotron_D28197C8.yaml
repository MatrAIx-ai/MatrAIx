  hobbies: '["Comic book drawing", "Digital illustration", "Creative writing (science fiction & fantasy)", "Collaborative video gaming", "School drama & improv", "Playing guitar", "Cooking Vietnamese family
    recipes", "Exploring local parks and nature", "Attending community cultural festivals"]'
  career_goals: Truc dreams of becoming a multimedia artist and game designer, crafting immersive stories that blend visual art, narrative, and interactive technology. He plans to pursue graphic design
    or animation in college, aiming to work for a studio that values cultural diversity and innovative storytelling. In the long term, he hopes to launch a youth art mentorship program in his community,
    giving other teens a creative outlet while also promoting mental‑health awareness among adolescents. He balances his personal ambition with a desire to give back to the Vietnamese‑American community
    that shaped him.
