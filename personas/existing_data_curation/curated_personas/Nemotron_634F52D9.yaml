personas:
  professional: Olga Blas, 41, leverages her STEM foundation and bilingual fluency to excel as a technology and intellectual property attorney, delivering meticulously researched legal analyses, precise
    contract negotiations, and proactive cybersecurity compliance strategies while mentoring emerging women lawyers through structured workshops and public speaking engagements.
  sports: Olga Blas participates in weekend charity 5K runs supporting legal aid, trains with the Trailblazers Hiking Club on Texas Hill Country trails, avidly follows the Houston Dynamo soccer team and
    the Dallas Cowboys football franchise, and incorporates salsa practice into her cardio routine.
  arts: Olga Blas immerses herself in cultural expression through weekly salsa and folklórico dance rehearsals, attends live performances by Carlos Santana and Buika, collects historical fiction novels
    by authors such as Ken Follett, and draws inspiration from vibrant mural art displayed at community festivals.
  travel: Olga Blas prefers meticulously planned trips that blend adventure with relaxation, often vacationing in the mountainous regions of Colorado for hiking, exploring the historic streets of Santa
    Fe, and scheduling an annual retreat to the coastal town of Puerto Vallarta to reconnect with family and savor regional cuisine.
  culinary: Olga Blas delights in preparing traditional dishes such as mole poblano, tamales de hoja, and pozole for family gatherings, expertly balancing flavors with chiles, chocolate, and corn masa,
    while modestly rating herself a competent home chef who occasionally over‑spices a batch of salsa to impress guests.
  core: Olga Blas is a structured, socially dynamic tech‑law attorney who channels her love for dance, outdoor adventure, and strategic planning into a balanced life that blends rigorous professional ambition
    with vibrant cultural traditions and occasional impulse purchases.
background:
  cultural: Olga is a first‑generation Mexican American who grew up in a bilingual household in the Greater Houston area. Her family maintains strong ties to Mexican traditions—celebrating Día de los Muertos,
    sharing regional recipes, and participating in community church events—while also embracing the multicultural fabric of Texas. Fluent in both Spanish and English, she often leverages her cultural insight
    to bridge gaps between clients and the legal system, especially for Spanish‑speaking entrepreneurs and immigrants.
attributes:
  skills: '[''Legal research'', ''Intellectual property litigation'', ''Contract drafting and negotiation'', ''Regulatory compliance (technology & data privacy)'', ''Cybersecurity law'', ''Mediation and
    arbitration'', ''Risk assessment and strategic advising'', ''Project management'', ''Bilingual client communication (English/Spanish)'', ''Public speaking'']'
  hobbies: '[''Salsa dancing'', ''Folklórico dancing'', ''Cooking Mexican cuisine'', ''Hiking in Texas Hill Country'', ''Bird‑watching'', ''Yoga'', ''Charity runs for legal aid'', ''Attending Hispanic cultural
    festivals'', ''Reading historical fiction'', ''Tech meetups and webinars'']'
  career_goals: Olga aims to become a senior partner at her firm, leading a boutique practice that serves innovative tech companies and provides pro bono support to underserved immigrant entrepreneurs.
    She aspires to shape state and federal policy on data privacy and to mentor the next generation of Latinx women lawyers. Over the next five years, she plans to expand her professional network through
    speaking engagements at tech‑law conferences, publish thought‑leadership articles, and develop a mentorship program within the Houston Bar Association.
