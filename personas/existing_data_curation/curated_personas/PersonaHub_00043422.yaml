persona_description: A medical researcher who has conducted extensive studies on the protective effects of thyroid hormone on colorectal cancer, particularly in Ashkenazi Jews and their descendants. His
  work has led to the development of the MECC Study, which has shown that long-term use of L-thyroxin is associated with a reduced risk of colorectal cancer.
