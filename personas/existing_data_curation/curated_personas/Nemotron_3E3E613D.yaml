  hobbies: '[''Reading literary fiction'', ''Hiking'', ''Photography'', ''Journaling'', ''Collecting vintage records'', ''Acoustic guitar'', ''Yoga'', ''Experimental cooking'', ''Visiting local art galleries'',
    ''Volunteering for community events'']'
  career_goals: Mary aims to transition from local coaching to a senior leadership role within her municipality’s recreation department, where she can shape city‑wide youth development initiatives. She
    plans to earn a Certified Professional Coach credential, launch a consultancy that offers flexible coaching frameworks for schools and community organizations, and eventually author a guidebook on integrating
    curiosity‑driven methods with practical coaching outcomes. Long‑term, she envisions influencing national scouting policy and mentoring the next generation of coaches.
