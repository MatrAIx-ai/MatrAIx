  career_goals: Lourdes aims to advance to a fire captain role where she can shape department policies, especially around mental-health support and diversity recruitment. She plans to obtain certification
    as a fire safety inspector and to develop a city-wide wellness program that addresses the stress and emotional challenges firefighters face. Long-term, she envisions serving as fire chief, championing
    inclusive leadership and strengthening community-firehouse partnerships across Gary.
