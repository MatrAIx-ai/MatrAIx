  hobbies: '[''Visiting art museums and galleries'', ''Attending live jazz and blues performances'', ''Community theater participation'', ''Photography, especially street photography'', ''Cooking and experimenting
    with new cuisines'', ''Gardening on his balcony'', ''Reading historical biographies and contemporary non‑fiction'', ''Volunteering at senior centers for art workshops'', ''Traveling to historic towns
    and cultural festivals'', ''Hosting game nights for friends'']'
  career_goals: Sammy aims to earn a Certified Geriatric Care Specialist credential and eventually transition into a senior care coordinator role within a Chicago nonprofit. He wants to design and implement
    an art‑therapy program for older adults that blends his love of visual arts with therapeutic care. Over the next five years, he plans to complete a bachelor’s degree in Social Work to enhance his advocacy
    skills and influence policy improvements for home‑based caregivers. Additionally, he aspires to become a trainer of new personal care aides, sharing his best practices and fostering a supportive learning
    environment.
