personas:
  professional: Sammy Wetherington is a seasoned personal care aide in Chicago who blends empathetic communication, medication reminder expertise, and crisis de‑escalation skills with a passion for art,
    often weaving creative workshops into caregiving and mentoring new aides while championing organized flexibility in their daily routines.
  sports: Sammy Wetherington follows the Chicago Bulls, Chicago Bears, and Chicago Cubs with enthusiastic fandom, plays in a senior softball league at the local park, participates in the Lakeshore Trailwalkers
    walking club for regular cardio, and attends weekly beginner yoga classes to maintain flexibility.
  arts: Sammy Wetherington immerses themselves in the Art Institute of Chicago’s collection of Grant Wood and Vivian Maier photography, seeks out Shepard Fairey murals in the Wabash Arts Corridor, frequents
    live sets by jazz vocalist Kurt Elling and blues guitarist Buddy Guy, and contributes as an actor and stage manager in community theater productions of Our Town and The Glass Menagerie, allowing the
    arts to fuel both personal fulfillment and therapeutic outreach.
  travel: Sammy Wetherington blends meticulous planning with spontaneous weekend getaways, having explored historic towns like Savannah and Charleston, attended the New Orleans Jazz & Heritage Festival
    and Seville’s Feria de Abril, and dreaming of future trips to Kyoto’s Gion Matsuri and the Andean ruins of Cusco, all while balancing travel expenses with a dedicated fund for cultural immersion.
  culinary: Sammy Wetherington delights in experimental cooking, often harvesting basil, rosemary, and cherry tomatoes from a balcony garden to craft miso‑infused risotto with charred cauliflower, rosemary‑roasted
    carrots, and a kimchi‑topped pancake, while also savoring classic Chicago deep‑dish pizza as an occasional comfort.
  core: Sammy Wetherington blends boundless curiosity for art with a talkative, community‑centric spirit, orchestrating creative care workshops, yet stubbornly hoards vintage photography manuals and occasionally
    forgets to take their daily blood‑pressure reading.
background:
  cultural: Sammy grew up on Chicago’s South Side in a working‑class family of Irish‑Polish descent. Raised in the public‑school system, his mother often took him to the Art Institute, sparking his lifelong
    appreciation for visual arts. The city’s rich jazz and blues heritage, along with its multicultural neighborhoods, shaped his open‑minded worldview and love for diverse experiences. While he was raised
    in a modest Catholic household, his adult life leans toward a secular, community‑focused ethos. Sammy values Midwestern principles of hard work, neighborly support, and civic engagement, which manifest
    in his dedication to elder care and community outreach initiatives throughout Chicago.
