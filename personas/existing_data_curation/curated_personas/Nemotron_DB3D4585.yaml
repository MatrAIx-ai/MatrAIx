  hobbies: '["Reading non-fiction", "Puzzle solving (crosswords, Sudoku)", "Scale model building", "Acoustic guitar playing", "Journaling", "Nature walks", "Single-player RPG video gaming", "Electronics
    tinkering", "Landscape photography"]'
  career_goals: Nicholas aims to secure a stable, structured career that aligns with his preference for predictable routines and solitary work environments. He plans to enroll in a community‑college program
    for computer networking or a trade apprenticeship in HVAC/electrical work within the next year, targeting an industry‑recognized certification within two years. His long‑term ambition is to obtain a
    full‑time technical support or maintenance position that offers clear responsibilities, steady hours, and opportunities for incremental advancement, allowing him to achieve financial independence while
    managing stress through a well‑defined schedule.
