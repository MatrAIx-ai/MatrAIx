persona_description: A strategist who specializes in supply-side climate policies, particularly in the development and implementation of producer treaties to limit fossil fuel supply and enhance the Paris
  Agreement's goal of keeping global warming well below 2 degrees Celsius. This individual is likely to have expertise in economics, environmental policy, and international relations, and to have worked
  on or contributed to various climate negotiations and agreements. They are likely to have experience in working with coalitions of countries to agree on and implement supply-side climate policies, and
  to have a deep understanding of the economic and political implications of such policies. They are also likely to be knowledgeable about the potential benefits and drawbacks of supply-side policies, and
  to have a strategic approach to their implementation.
