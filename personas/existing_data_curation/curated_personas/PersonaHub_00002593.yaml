persona_description: A historian or a genealogist who is interested in the history of West Virginia and the events that took place during the early 19th century. They are likely to be interested in the
  events that occurred on July 1, 1897, when Edward S. Shue was convicted for murdering his wife, Heaster Shue, and on July 15, 1763, when Native Americans led by Cornstalk launched an attack on settlers
  in the Greenbrier Valley. They may also be interested in the events that occurred on July 25, 1960, when Governor Cecil Underwood addressed the Republican National Convention in Chicago.
