personas:
  professional: Jorge Ambriz, an aspiring community health aide, leverages bilingual communication, empathetic listening, and basic conflict‑resolution skills to coordinate food‑bank volunteers while juggling
    associate‑level coursework; they adopt a routine‑oriented yet relaxed approach that sometimes leads to occasional disorganization.
  sports: Jorge Ambriz, a devoted follower of Liga MX—especially Club América—and the MLS side Austin FC, spends weekend match nights on the couch with their dog; they also join a local amateur soccer league
    in Leander for occasional rec games and cheer the Texas Longhorns during college football season.
  arts: Jorge Ambriz, whose daily soundtrack features norteño legends like Los Tigres del Norte and banda groups such as Banda El Recodo, also enjoys watching classic Mexican cinema starring Gael García
    Bernal, and occasionally sings along at community festivals; they let the rhythms shape their social gatherings.
  travel: Jorge Ambriz, an adventure‑leaning yet budget‑conscious traveler, plans short road trips to Texas Hill Country vineyards and occasional weekend escapes to San Antonio’s historic missions, while
    dreaming of a culturally immersive visit to Oaxaca, Mexico, though they often postpone longer trips due to limited savings.
  culinary: Jorge Ambriz, a confident home cook, delights in preparing traditional dishes such as chicken tinga tacos, pozole rojo, and homemade salsa verde with fresh cilantro, chilies, and hominy, and
    while they expertly rehearse family recipes, they sometimes over‑season, prompting taste‑testers to reach for a glass of agua fresca.
  core: Jorge Ambriz, a routine‑loving, community‑driven 23‑year‑old who balances heartfelt volunteerism with occasional video‑game marathons and a habit of forgetting to water their garden when distracted
    by a new recipe; they embody compassionate pragmatism.
background:
  cultural: Jorge is a second‑generation Mexican‑American raised in a bilingual household in Texas. He grew up celebrating Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family Christmas
    posadas, while also participating in typical American holidays. His family places a strong emphasis on close family ties, respect for elders, and Catholic faith, which shape his compassionate and cooperative
    outlook. Bilingualism allows him to navigate both Mexican and Texan cultural spheres, and he stays connected to the local Mexican community through church events, cultural festivals, and neighborhood
    gatherings. This blend of heritage and contemporary Texan life informs his practical, routine‑driven approach and his commitment to helping others in his community.
attributes:
  skills: '[''Spanish‑English bilingual communication'', ''Empathy and active listening'', ''Basic conflict resolution'', ''Community outreach and volunteer coordination'', ''Traditional Mexican cooking'',
    ''Household budgeting and financial planning'', ''Basic computer literacy (MS Office, email, social media)'', ''Small event planning'', ''Home maintenance and handyman tasks'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Watching soccer matches'', ''Gardening'', ''Volunteering at food banks and community centers'', ''Listening to regional Mexican music'', ''Playing video games
    (FIFA)'', ''Attending church gatherings'', ''Walking his dog'']'
  career_goals: Jorge aims to complete a certification in community health work or social services while finishing his associate‑level college studies. He hopes to secure a full‑time position at a local
    nonprofit, health clinic, or community center where he can apply his compassion to support underserved families, especially within the Mexican‑American community. At the same time, he dreams of launching
    a modest side business delivering homemade Mexican meals to neighbors, providing both a supplemental income and a way to share his culinary heritage. Ultimately, his goal is to build a stable financial
    foundation for his marriage while maintaining the flexibility to stay involved in his community and family life.
