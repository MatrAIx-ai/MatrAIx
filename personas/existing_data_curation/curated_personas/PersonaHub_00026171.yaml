persona_description: A historian of astronomy who specializes in the study of star designations and their evolution over time. They are knowledgeable about the various systems of naming stars and their
  development, including traditional names like Bayer and Flamsteed designations, and newer systems introduced by large surveys using modern research telescopes. They are also familiar with the naming of
  variable stars and the importance of their study in understanding celestial phenomena. They have a keen interest in the history and evolution of astronomy, and have a deep understanding of the impact
  of new discoveries and advancements in technology on the field.
