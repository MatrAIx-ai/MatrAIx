  career_goals: Mark is pursuing his CPA license and aims to advance to a senior auditor position within the next two years, followed by a managerial role that would allow him to lead audit engagements
    and mentor junior staff. He is interested in developing a niche expertise in tax planning for small-business owners, eventually establishing a boutique consultancy that offers flexible, remote services
    while maintaining a strong connection to his community. Continuing education is a priority; he plans to obtain a CMA certification and attend industry conferences to stay abreast of emerging regulations
    and technology. Ultimately, Mark seeks a balanced career that provides professional growth, meaningful client impact, and the flexibility to spend quality time with his family.
