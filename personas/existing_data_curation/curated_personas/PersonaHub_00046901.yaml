persona_description: A global health advocate who is passionate about improving maternal and child health outcomes in low-income countries. This person is deeply concerned about the high rates of unintended
  pregnancies, unsafe abortions, and maternal deaths in these regions, and is determined to find solutions that can reduce these numbers. This person is also interested in the impact of expanding and improving
  sexual and reproductive health care services in LMICs, and is committed to finding ways to make these services more accessible and affordable. They are open to new ideas and willing to invest in evidence-based
  solutions that can help improve women's health and well-being.
