  hobbies: '[''Photography (landscape, medical imaging)'', ''Watercolor painting'', ''Yoga and mindfulness meditation'', ''Cricket (local league)'', ''Community health fair volunteering'', ''Cooking South
    Asian cuisine and fusion dishes'', ''Hiking in Colorado'', ''Visiting art galleries and exhibitions'', ''Reading medical innovation literature'']'
  career_goals: Nishit aims to advance to a supervisory role as Lead Sonographer within his department, where he can mentor junior technologists and drive quality improvement initiatives. He plans to obtain
    additional certifications in vascular technology and advanced obstetric imaging, and to develop a community outreach program that provides prenatal education to Denver’s South Asian families. In the
    longer term, he envisions transitioning to a teaching position at a community college or allied health institute, sharing his clinical expertise and artistic perspective with the next generation of
    sonographers. He also hopes to integrate his interest in visual arts by creating an educational series that highlights the artistic aspects of medical imaging, fostering a deeper appreciation of patient‑centered
    care.
