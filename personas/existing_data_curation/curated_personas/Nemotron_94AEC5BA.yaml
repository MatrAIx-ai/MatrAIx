  hobbies: '[''Home cocktail experimentation'', ''Cooking Cajun dishes'', ''Fishing in Calcasieu Bayou'', ''Watching sports'', ''Competitive video gaming'', ''Reading mixology books'', ''Attending small
    live music gigs'', ''DIY woodworking projects'', ''Hiking in local nature trails'', ''Learning about local history'']'
  career_goals: George aims to earn his GED and become a certified mixologist within the next two years. He plans to leverage his practical experience to move into a lead bartender role, eventually progressing
    to shift supervisor and restaurant manager. His long‑term ambition is to open a small gastropub in Lake Charles that blends modern mixology with traditional Cajun flavors, providing a community‑focused
    gathering spot. He is also interested in pursuing hospitality management courses to broaden his managerial skill set.
