personas:
  professional: George Bush is a 21‑year‑old front‑of‑house assistant who leverages his precise inventory tracking and customer‑service experience in a Louisiana cafeteria to practice disciplined time‑management,
    while his curiosity drives him to experiment with cocktail recipes and his competitive nature pushes him to take on increasingly complex drink‑mixing tasks, and they consistently seek new flavor profiles
    to impress both patrons and peers.
  sports: George Bush enjoys weekend fishing along Calcasieu Bayou, follows the New Orleans Pelicans for basketball and the LSU Tigers for college football, participates in casual intramural soccer at his
    community center, and they maintain a flexible fitness routine that prioritizes outdoor recreation over gym workouts.
  arts: George Bush frequents intimate live‑music venues to watch zydeco acts like The Red Stick Ramblers and local blues singer Erica Hines, collects vintage mixology books for both inspiration and decoration,
    and they let the rhythms and storytelling of these performances shape their creative cocktail concepts.
  travel: George Bush prefers short, meticulously planned road trips to places like the French Quarter in New Orleans, the historic streets of Savannah, and the music scene of Austin, yet they occasionally
    embark on spontaneous overnight drives to nearby nature retreats when a new fishing spot is rumored, balancing budget constraints with a desire for immersion in local culture.
  culinary: George Bush blends intermediate cooking skills with a passion for Cajun cuisine, regularly preparing jambalaya, blackened catfish, and shrimp étouffée while experimenting with cocktails that
    feature tarragon‑infused gin, smoked paprika bitters, and honey‑bourbon sours, and they treat each dish and drink as a laboratory for flavor exploration.
  core: George Bush is a curious yet pragmatic 21‑year‑old whose competitive streak drives a meticulous approach to bartending, budgeting, and fishing, while his reserved nature hides a habit of occasional
    late‑night gaming marathons and a tendency to question others’ motives, and they often double‑check every invoice before signing.
background:
  cultural: George grew up in Lake Charles, a city where Southern hospitality meets Cajun and Creole influences. As a white Louisianan, his family background blends traditional Southern values with the
    region's distinctive cultural traditions, including an appreciation for local cuisine, Mardi Gras celebrations, and community church activities. He identifies with the working‑class ethos of the area,
    valuing hard work, practicality, and the close‑knit social networks that characterize life in Calcasieu Parish.
