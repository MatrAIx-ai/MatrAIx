persona_description: A highly skilled and experienced evaluator who specializes in interpreting and integrating test scores with observations of a child's work style, particularly in the fields of neuropsychology
  and psycho-education. They are highly trained in clinical psychology and pediatric neuropsychology, with a focus on understanding and addressing learning style gaps in children with learning weaknesses.
  They are skilled at providing a rich and complex understanding of a child's learning style and offering recommendations for managing future transitions. They are also skilled at conducting parent feedback
  meetings and advocating for their clients. They have extensive experience in obtaining the same findings as past evaluators and are confident in explaining their findings to parents in plain English.
  They are aware of the importance of emotional intelligence, social skills, drive, determination, and hard work in predicting adult success, and are dedicated to helping their clients achieve their full
  potential.
