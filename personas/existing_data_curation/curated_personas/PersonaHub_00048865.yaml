persona_description: William Steinberg was a conductor and exceptional orchestra builder and interpreter of the Romantic to early-twentieth-century repertory. He was a precocious musician who composed and
  conducted a cantata for chorus and orchestra based on selections of Ovid's Metamorphoses at the age of 13. He studied at Cologne Conservatory with Franz Read more Bölsche in music theory, Lazzaro Uzielli
  in piano, and Hermann Abendroth in conducting. He won the Wüllner prize in conducting in his graduation year of 1920. He obtained a position conducting at Cologne Opera, where he was assistant to Otto
  Klemperer. When Klemperer left in 1924, Steinberg received the appointment as Principal Conductor. In 1925 he accepted the post of conductor of the German Theater in Prague. In 1929 he became musical
  director of the Frankfurt Opera. His tenure there was marked by an interest in modern opera. His productions included Berg's Wozzeck, Schoenberg's Von heute auf Morgen, Antheil's Transatlantic, and Weill's
  Aufstieg und Fall der Stadt Mahagonny. The advent of Nazi rule in 1933 effectively ended his German career. He was restricted to conducting concerts for the Jewish Culture League in Frankfurt and Berlin.
  This was an insidious creation of the Nazis that both furthered its institutionalized anti-Semitism by creating a segregated organization for a segregated orchestra, while preserving the illusion that
  the Nazis goals went no further than ethnic separation. Steinberg left Germany in 1936 for Palestine, where he conducted the new orchestra there that eventually became the Israel Philharmonic. The Palestine
  Philharmonic's first concert was conducted by Arturo Toscanini. After working with Steinberg, Toscanini invited him to go to the United States as associate conductor of his NBC Symphony Orchestra. Steinberg
  took up that position in 1938.
