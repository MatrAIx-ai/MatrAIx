personas:
  professional: Kiana Freeman is a veteran special education teacher who leverages a STEM background to craft hands‑on individualized education plans, blending data‑driven assessment with the improvisational
    flexibility of their beloved community jam sessions and quilting circles.
  sports: Kiana Freeman stays active by tending a backyard garden, playing on a senior softball team that cheers for the LSU Tigers, rooting passionately for the New Orleans Saints during football season
    and the New Orleans Pelicans in winter, and joining the Lafayette Walking Club for brisk weekly strolls along the Bayou Teche, turning each activity into a social gathering.
  arts: Kiana Freeman immerses themselves in the soulful sounds of Wynton Marsalis, the blues legend Etta James, and the literary worlds of Zora Neale Hurston and Colson Whitehead, while contributing hand‑stitched
    quilts inspired by the improvisational rhythms of their favorite jazz evenings, making the arts a cornerstone of both personal expression and community connection.
  travel: Kiana Freeman prefers relaxed, culturally rich trips planned around family gatherings, often revisiting New Orleans for its jazz festivals, taking day trips to the historic plantations of Baton
    Rouge, dreaming of attending the Montreux Jazz Festival in Switzerland, yet staying within a modest retirement budget that balances adventure with financial prudence.
  culinary: Kiana Freeman loves cooking gumbo with fresh okra, smoked sausage, and a pinch of cayenne from their herb garden, skillfully prepares jambalaya with shrimp and andouille, and delights friends
    at church potlucks with collard greens seasoned with smoked turkey and a dash of hot sauce, showcasing a culinary style that blends Creole comfort with garden‑fresh simplicity.
  core: Kiana Freeman blends a structured, data‑driven mindset with the improvisational spirit of jazz, turning each classroom, garden, and community event into a collaborative composition, even if their
    to‑do list often spills over the margins of a perfectly planned lesson plan.
background:
  cultural: Kiana Freeman grew up in a tight‑knit African‑American community in the rural towns of southwest Louisiana, where church, music, and family gatherings shaped her worldview. The blend of Southern
    Black traditions with the region’s Creole and Cajun influences has instilled in her a deep appreciation for storytelling, rhythmic music, and communal resilience. Her family emphasized education and
    self‑advocacy, encouraging her to pursue a STEM degree despite limited local resources. These cultural roots inform her collaborative teaching style, her commitment to community service, and her pride
    in preserving and sharing the rich cultural heritage of Black Louisianans.
attributes:
  skills: '["Special Education Instruction", "Individualized Education Plan (IEP) Development", "STEM Curriculum Adaptation", "Assistive Technology Integration", "Data-Driven Assessment", "Behavior Management
    Strategies", "Collaborative Team Teaching", "Professional Development Facilitation", "Community Outreach and Advocacy"]'
  hobbies: '["Community Church Activities", "Choir Participation", "Gardening", "Jazz and Blues Concerts", "Reading Historical Fiction", "African-American Biographies", "Quilting Circle", "Volunteering
    at Local Festivals", "Family Cooking of Creole Dishes"]'
  career_goals: Drawing on her passion for inclusive education, Kiana aims to advance to a district-wide Special Education Coordinator role where she can champion the integration of STEM opportunities for
    students with disabilities. She plans to develop a scalable, flexible curriculum framework that balances structure with student‑centered adaptability, secure funding for assistive tech resources, and
    mentor new teachers through a peer‑coaching program. In the longer term, she envisions establishing a community nonprofit that offers after‑school STEM enrichment and family workshops, leveraging her
    leadership skills and collaborative spirit.
