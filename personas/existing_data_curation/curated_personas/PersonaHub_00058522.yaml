persona_description: A medical doctor with expertise in immunology, clinical microbiology, and infectious diseases. She is an Assistant Professor at a young university in Croatia and has a Ph.D. in biomedical
  and health sciences. She is passionate about writing and scientific communication and has published extensively on microsporidiosis. She is also interested in immunology and the immune response to microsporidiosis,
  and has studied the immunology of the disease in immunocompromised patients. She is aware of the potential for microsporidiosis to cause gastrointestinal, ocular, and cerebral infections in immunocompetent
  hosts, and is interested in the treatment options available for these infections.
