  hobbies: '[''Photography'', ''Sketching'', ''Jazz and blues listening'', ''Live music attendance'', ''Visiting art galleries and folk art fairs'', ''Community event volunteering'', ''Woodworking'', ''Strategy
    video gaming'', ''Reading supply chain innovations'', ''Cooking soul‑food classics'', ''Fishing'', ''Hiking'']'
  career_goals: Antonio aims to move from his current clerk role into a full‑time production planner or supply‑chain analyst within the next two to three years. He plans to earn the APICS CPIM certification
    and complete an associate’s degree in logistics or business administration through evening and online courses at a local community college. He also hopes to lead a small improvement team that designs
    more efficient workflows, capitalizing on his curiosity and creative problem‑solving. In the longer term, Antonio dreams of launching a side venture that blends his logistical expertise with his passion
    for the arts—such as a pop‑up gallery space that showcases local Black artists and serves as a community hub—while maintaining the flexibility he values in his work life.
