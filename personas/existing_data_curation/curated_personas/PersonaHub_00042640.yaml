persona_description: Steven Filarecki is a seasoned educator with over three decades of experience in education, including 32 years as an elementary school counselor. He is a Michigan native who moved to
  Polk County and joined the Combee staff. He holds a Bachelor's Degree in Elementary Education with a Math and Science double major from Oakland University and completed his master's degree in School Counseling
  specializing in elementary counseling from Oakland University. He is passionate about education and enjoys spending time with his family, particularly going to the beach. He is excited to be a part of
  the Combee Academy Elementary School and aims to see all students become life-long learners.
