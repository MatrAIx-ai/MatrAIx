personas:
  professional: John Heron, a budding LEGO engineer who loves building moving models, channels their curiosity and practical mindset into designing simple mechanisms while daydreaming about becoming a real‑world
    inventor.
  sports: John Heron, a spirited midfielder on the Mercer County Youth Soccer Club's Under‑7 team, dashes across the field with competitive gusto while cheering for the New Jersey Red Bulls and occasionally
    joins the local park's weekend kickball games, showcasing their love of competition and teamwork.
  arts: John Heron, an enthusiastic doodler who spends afternoons copying the bright, whimsical styles of Dr. Seuss and coloring books by Mo Willems, also enjoys crafting simple paper rockets inspired by
    the illustrations in the picture book 'The Way Back Home,' and they often experiment with color mixing using crayons and markers.
  travel: John Heron, a curious explorer, loves weekend hikes on the Mercer County Trails discovering bugs and rocks, has visited the Liberty Science Center in Jersey City and dreams of seeing the dinosaurs
    at the National Museum of Natural History in Washington, D.C., preferring family‑planned trips that blend learning and play, and they eagerly request more adventures.
  culinary: John Heron, a picky yet adventurous eater, favors pepperoni pizza and mac and cheese but gets excited when mom lets them help stir spaghetti sauce with fresh basil and garlic, and they always
    request LEGO‑shaped chicken nuggets for lunch.
  core: John Heron blends a fierce curiosity for building moving LEGO models with a competitive edge on the soccer field, while their relaxed, slightly disorganized nature leads them to juggle savings for
    new sets, occasional allergy flare‑ups, and endless imagination.
background:
  cultural: John grows up in a suburban white middle‑class family in Princeton Junction, New Jersey, where community values emphasize education, outdoor recreation, and participation in local events like
    seasonal festivals and library programs. His household reflects typical American cultural practices, such as celebrating holidays together, encouraging curiosity through visits to nearby museums and
    science centers, and fostering a balanced mix of social interaction and personal reflection.
