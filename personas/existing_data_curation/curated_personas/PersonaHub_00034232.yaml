persona_description: A network administrator who is responsible for managing a dynamic IP routing environment on an intranet. They are familiar with the two most common IP routing protocols used on intranets,
  Routing Information Protocol (RIP) and Open Shortest Path First (OSPF), and are skilled in configuring preference levels for the preferred routing protocol. They also understand the importance of selecting
  the most preferred routing protocol to ensure the most accurate and up-to-date routing information is propagated to the IP routing table. Additionally, they are aware of the limitations of OSPF on Windows
  XP 64-bit Edition (Itanium) and the 64-bit versions of the Windows Server 2003 family, and are aware of the process of configuring the preferred routing protocol.
