  career_goals: Jonathan aims to transition from hands‑on camera work to a senior director of photography role, focusing on documentary projects that highlight the agricultural heart of the Central Valley.
    He plans to launch a boutique production company that combines his technical expertise with his competitive drive to tell stories using emerging formats like VR and 360° video. Over the next five years,
    he seeks recognition for a signature visual style, secure funding for a series on local farming families, and eventually establish a mentorship program for aspiring camera operators in the region.
