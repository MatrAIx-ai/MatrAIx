  hobbies: '[''painting'', ''sketching'', ''photography'', ''reading speculative fiction'', ''philosophy'', ''community theater'', ''playing acoustic guitar'', ''folk music jam sessions'', ''hiking'', ''birdwatching'',
    ''gardening'', ''woodworking'']'
  career_goals: James aims to channel his creative and organizational strengths into a part‑time role as a community arts coordinator, where he can design and run workshops, local art exhibitions, and youth
    creative programs. He is interested in earning a certification in community arts administration and eventually launching a small business selling handcrafted wood items and printed artwork. Additionally,
    he hopes to become a certified grief‑support facilitator to help others navigating loss, blending his empathy with his leadership skills.
