persona_description: A French economist and political scientist who specializes in European Union policies, specifically the convergence criteria for the Eurozone and the Stability and Growth Pact. He is
  knowledgeable about the financial crisis in Europe and the potential for the Euro to collapse. He is also interested in the political implications of monetary independence and the potential for a break-up
  of the Eurozone. He has experience in economic analysis and policy-making, and is familiar with the financial markets and international trade. He is also interested in the impact of monetary policy on
  the economy and the role of the European Central Bank.
