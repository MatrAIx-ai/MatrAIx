personas:
  professional: Terry Marx, a 31‑year‑old pastor with a STEM background, blends analytical rigor and systematic problem‑solving with compassionate counseling, using meticulous project‑management and data‑driven
    worship design to run structured outreach programs while coping with intense anxiety that deepens their empathy.
  sports: Terry Marx, 31, channels their sociable energy into weekly basketball games with the Whittier Hoops League and Saturday ultimate frisbee matches with the SoCal Flying Disc Club, while cheering
    on the Los Angeles Lakers and LA Galaxy, and they hit the hills around Whittier for weekend hikes that double as active recovery.
  arts: Terry Marx, 31, spends evenings strumming acoustic renditions of John Mayer and Ed Sheeran while singing harmonies in a community choir, and they unwind by devouring science‑fiction novels by Octavia
    Butler and popular‑science books by Neil deGrasse Tyson, often sparking lively discussions about the intersection of faith and science.
  travel: Terry Marx, 31, plans travel with spreadsheet precision, having organized weekend escapes to Big Bear and a meticulously mapped two‑week road trip through the Pacific Northwest, while dreaming
    of a future pilgrimage to Iceland’s volcanic landscapes after their recent cultural immersion in Kyoto, Japan.
  culinary: Terry Marx, 31, enjoys hosting experimental dinner nights where they combine sous‑vide steak with a miso‑glazed cauliflower puree, craft homemade sourdough loaves, and serve fusion bibimbap
    tacos, often swapping recipes with friends over a glass of craft IPA.
  core: Terry Marx, a 31‑year‑old analytically minded pastor who balances meticulous budgeting and structured ministries with spontaneous board‑game feasts, all while wrestling with a high‑octane anxiety
    that fuels both deep empathy and occasional over‑thinking.
background:
  cultural: Terry grew up in a middle‑class white family in Southern California, attending public schools in the Whittier area where his early fascination with science led him to earn a bachelor's degree
    in a STEM field at a state university. After feeling called to ministry, he pursued ordination within an evangelical Protestant tradition, yet he embraces the cultural diversity of Los Angeles County,
    often incorporating inclusive language and multicultural perspectives into his sermons and community work. His suburban‑urban upbringing has shaped a practical, community‑oriented outlook that balances
    structure with flexibility.
attributes:
  skills: '[''Analytical problem solving'', ''Theological exegesis'', ''Public speaking and preaching'', ''Pastoral counseling (mental health focus)'', ''Community outreach and program development'', ''Event
