  hobbies: '[''Basketball'', ''Ultimate frisbee'', ''Hiking'', ''Acoustic guitar'', ''Singing in choir'', ''Cooking'', ''Board game nights'', ''Reading science fiction'', ''Volunteering'', ''Mindfulness
    meditation'']'
  career_goals: Terry aims to become a senior pastor of a multi‑site congregation within the next five years, expanding the church’s mental‑health ministry and launching a STEM outreach program for local
    youth. He plans to pursue a Master of Divinity to deepen his theological training, author a book that bridges faith and science, and potentially serve as a chaplain in a hospital or university setting.
    Ultimately, he wants to shape a structured, supportive faith community that prioritizes both spiritual growth and emotional well‑being.
