  hobbies: '[''Surfing'', ''Paddle‑boarding'', ''Hiking the Diamond Head Trail'', ''Playing ukulele'', ''Cooking Vietnamese cuisine'', ''Karaoke with friends'', ''Attending Hawaiian luau festivals'', ''Volunteering
    for beach clean‑ups'', ''Participating in local basketball leagues'', ''Exploring food markets'']'
  career_goals: Quoc aims to move from a hands‑on labor role into a supervisory position within the next two years. He plans to obtain a certified forklift operator license and complete a community‑college
    certificate in supply‑chain logistics. In the medium term, he hopes to become a shift lead or logistics coordinator, overseeing a team of material handlers and managing inbound and outbound shipments
    for a local distributor. Ultimately, he aspires to take on a warehouse manager role or start his own small freight‑handling business that emphasizes safety, teamwork, and efficient service for Hawaii’s
    islands. His goals balance his practical experience with a desire to grow his leadership and strategic planning skills.
