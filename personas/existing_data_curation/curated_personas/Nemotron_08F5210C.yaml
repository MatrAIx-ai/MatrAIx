personas:
  professional: Mildred Godbolt, a three‑year‑old aspiring mini‑storyteller, treats everyday play as a professional stage where she architects elaborate block forts, invents abstract narratives, and negotiates
    play‑time rules with calm confidence, showcasing early leadership and creative problem‑solving skills.
  sports: Mildred Godbolt, a three‑year‑old, participates in the Sunny Sprouts toddler soccer program at the community park, loves swinging on the local playground equipment, cheers enthusiastically for
    the New York Yankees on game days, and approaches fitness with joyful spontaneity rather than structured training.
  arts: Mildred Godbolt, a three‑year‑old, spends afternoons drawing whimsical creatures while humming 'Baby Shark' and Beethoven’s Symphony No. 5, enjoys animated films by Walt Disney, and finds comfort
    in the rhythmic patterns of Sesame Street songs, letting these artistic experiences shape her imaginative play.
  travel: Mildred Godbolt, a three‑year‑old, has visited the city zoo, splurged on a day at Disneyland, dreams of exploring the Eiffel Tower in Paris, and prefers spontaneous family outings over meticulously
    planned trips, balancing brief stays at familiar playgrounds with occasional bursts of adventure.
  culinary: Mildred Godbolt, a three‑year‑old, adores creamy mac and cheese with cheddar, loves peanut butter and banana sandwiches, delights in strawberry slices, and frequently pretends to bake chocolate
    chip cookies in her toy kitchen, while occasionally refusing broccoli with a determined pout.
  core: Mildred Godbolt, a three‑year‑old, blends boundless imagination, calm resilience, and a playful knack for turning everyday objects into grand adventures, all while stubbornly refusing vegetables
    and hoarding glittery stickers.
background:
  cultural: Mildred is a Black child raised in San Antonio, Texas, where she experiences a blend of African‑American family traditions and the multicultural fabric of the city. Her family celebrates music,
    storytelling, and community gatherings rooted in Black heritage while also participating in local Texan customs such as enjoying Tex‑Mex cuisine, attending community festivals, and visiting a nearby
    church that integrates gospel music and community service.
