  hobbies: '["crayon drawing", "finger painting", "block building", "music listening and dancing", "picture book reading", "nature exploration", "pretend role‑play", "educational cartoon watching"]'
  career_goals: Even at three, Mildred loves to imagine herself as a creator; she often says she wants to paint beautiful pictures, discover new things like a scientist, or travel to space as an astronaut.
    Her long‑term ambition is to explore, create, and share stories that inspire wonder.
