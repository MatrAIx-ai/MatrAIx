personas:
  professional: Jerome Louis is a methodical teen who channels his organized mindset into building custom PCs, troubleshooting car engines, and coordinating after‑school basketball clinics at the local
    community center, while they prepare to earn a GED and enroll in a vocational automotive technology program.
  sports: Jerome Louis dominates pick‑up basketball games in the downtown park, cheers for the Chicago Bulls, plays for the community center’s junior league team and follows the collegiate season of the
    Loyola Ramblers, treating each match as a structured competition that satisfies their competitive drive.
  arts: Jerome Louis immerses themselves in hip‑hop and R&B playlists featuring Kendrick Lamar and H.E.R., winds down with classic soul tracks by Marvin Gaye, and devours self‑improvement books like "Atomic
    Habits" and "Deep Work", letting lyrical rhythm and productivity wisdom shape their after‑school routine.
  travel: Jerome Louis has explored Detroit’s automotive museums, road‑tripped to Austin for live music festivals, and dreams of a future Japan tour to attend the Tokyo Game Show and visit Akihabara’s hardware
    shops, balancing budget‑friendly road trips with a yearning for tech‑centric destinations that they track on a travel spreadsheet.
  culinary: Jerome Louis prefers hearty, protein‑rich meals such as grilled chicken with quinoa and roasted veggies, loves crafting pepperoni pizza at home with fresh mozzarella and basil, and often snacks
    on spicy hummus with carrot sticks while they tweak PC builds, showcasing their blend of practicality and flavor.
  core: Jerome Louis is a 17‑year‑old driven by structure, channeling competitive energy into basketball, meticulous PC builds, and community leadership while they juggle a disciplined budget and a pragmatic
    health routine.
background:
  cultural: Jerome is an African‑American teenager raised in Brookpark, a suburb of Cleveland, Ohio. His upbringing reflects the rich cultural tapestry of the Midwestern Black community, with strong influences
    from church, family gatherings, and local traditions of music, food, and communal support. He embraces contemporary urban culture—such as hip‑hop music and streetwear—while also valuing the close‑knit
    community bonds typical of the region, including neighborly help, church activities, and local sports programs. Stories of resilience and perseverance passed down through his family shape his competitive
    yet methodical approach to life.
attributes:
