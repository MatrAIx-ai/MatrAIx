  hobbies: '[''Basketball'', ''PC building and customization'', ''Strategy video gaming'', ''Hip‑hop and R&B music'', ''Self‑improvement reading'', ''Community center volunteering'']'
  career_goals: Jerome plans to earn his GED within the next year and then enroll in a vocational program, preferably in automotive technology or HVAC, to secure a stable, well‑structured trade career.
    He aims to become a certified technician, earn a reliable income, and eventually mentor younger students in his neighborhood, helping them develop the same practical and organizational skills that have
    helped him. In the long term, Jerome envisions a role that blends technical expertise with community leadership, such as a senior technician who also serves as a liaison for a local trade union or youth
    program.
