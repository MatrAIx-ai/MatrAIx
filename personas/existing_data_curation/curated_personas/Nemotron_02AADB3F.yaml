  hobbies: '["Attending live music events (hip‑hop, jazz)", "Painting and sketching", "Street photography", "Playing basketball with friends", "Community volunteering (youth mentorship)", "Exploring local
    food scene", "Hiking", "Road‑trip travel", "Multiplayer video gaming", "Listening to podcasts on entrepreneurship and art"]'
  career_goals: Clyde aims to become a senior sales manager within the next five years, leading a high‑performing team and shaping the company’s service portfolio. He plans to earn professional sales certifications
    and eventually pursue a bachelor's degree in business administration to solidify his knowledge. Long‑term, he envisions launching his own consultancy that blends sales strategy with creative branding,
    helping service firms stand out through art‑inspired campaigns. He also hopes to mentor younger sales reps, using his experience to foster a supportive, collaborative workplace culture.
