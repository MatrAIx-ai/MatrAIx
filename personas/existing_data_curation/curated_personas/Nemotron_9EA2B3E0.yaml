personas:
  professional: Gary Williams is a budding robotics enthusiast and teen tech influencer who channels their curiosity and methodical mindset into designing competition‑ready robots for the school club while
    delivering witty, tech‑savvy sketches on TikTok that showcase both their flair for comedy and their practical problem‑solving skills.
  sports: Gary Williams is a point‑guard on the Westside Middle School basketball team, they spend evenings shooting hoops at the neighborhood park, root for the Los Angeles Lakers while modeling their
    drill routine after star guard Russell Westbrook, and balance their love of competition with a laid‑back approach to fitness that includes weekend pickup games and occasional skateboarding.
  arts: Gary Williams blends their love of hip‑hop—especially tracks by Kendrick Lamar and Doja Cat—and graphic novel epics like "Saga" and "Watchmen" with a knack for short‑form video, producing TikTok
    clips that riff on tech tips while slipping in rap‑style punchlines, and they often help the church youth group craft skits for worship services.
  travel: Gary Williams prefers short, budget‑friendly road trips with their family, cherishing weekend visits to the nearby science museum and a yearly pilgrimage to the Orlando Disney World resort, while
    dreaming of attending the San Diego Comic‑Con to meet their sci‑fi heroes and perhaps taking a future study‑abroad stint in Japan for a robotics workshop.
  culinary: Gary Williams enjoys the classic combo of pepperoni pizza and chicken tenders, they can whip up a quick ramen bowl with instant noodles, frozen veggies, and a boiled egg, and occasionally experiment
    with making their own homemade milk‑shake flavored with Oreo cookies, though their midnight snack habit often leads to a half‑eaten bag of chips.
  core: Gary Williams is a charismatic teen who fuses tech curiosity, organized ambition, and a love for performance into every basketball game, robot build, and TikTok video—sometimes at the cost of forgetting
    to floss.
background:
  cultural: Gary grows up in a Black family in Round Rock, Texas, where the local African-American community blends Southern traditions with contemporary urban culture. Family gatherings feature church
    music, soul food, and storytelling that emphasize respect, perseverance, and community support. He participates in the neighborhood church's youth programs, celebrates Juneteenth with parades and barbecues,
    and listens to hip-hop artists who reflect his cultural identity. This heritage influences his values of hard work, collective uplift, and expressive creativity.
