  career_goals: Gary wants to attend a magnet high school with a strong STEM curriculum, earn a scholarship to study computer science, and become a software developer who builds tools for community education.
    He also hopes to launch a mentorship program for middle school students in Round Rock, combining his love for tech and community service. Long-term, he dreams of leading a tech startup focused on educational
    gaming.
