personas:
  professional: Angel Rios is a budding graphic designer who leverages expertise in Adobe Photoshop and Illustrator to craft vibrant branding for local cultural events, applying meticulous planning and
    a competitive drive to deliver high‑impact visual assets, and they consistently seek fresh visual inspiration.
  sports: Angel Rios is an avid supporter of the Dallas Cowboys and Dallas Mavericks, plays intramural volleyball with the town’s community center in spring, and maintains a disciplined routine of daily
    jogs through the local hills, balancing competitive spirit with occasional leisurely bike rides, and they relish the camaraderie of team sports.
  arts: Angel Rios is an enthusiastic visual artist who frequents the Fort Worth Contemporary Arts Center, draws inspiration from street muralist Shepard Fairey and illustrator Hayao Miyazaki, and spends
    weekends performing acoustic renditions of classic songs by José González and Lila Downs at community salsa nights, and they constantly experiment with new techniques in their sketch journal.
  travel: Angel Rios dreams of exploring the colorful markets of Oaxaca and the historic streets of San Antonio, but also cherishes recent road trips to Austin’s live‑music festivals and a weekend camping
    adventure in Big Bend, favoring a blend of spontaneous detours and carefully planned itineraries, and they often map out routes on a handwritten travel board.
  culinary: Angel Rios loves cooking tamales and chilaquiles with fresh masa, ripe tomatillos, and salsa verde, often pairing meals with artisanal queso fresco, while occasionally over‑salting dishes during
    late‑night study sessions, and they take pride in perfecting family recipes.
  core: Angel Rios is a meticulous, curiosity‑driven teen who blends artistic flair with competitive ambition, organizing community events, saving prudently, and navigating health and hobbies with a disciplined
    yet creative approach, and they never shy away from a new challenge.
background:
  cultural: Angel was raised in a Mexican-American household in Franklin, Texas, where Spanish is spoken alongside English. Her family maintains strong ties to Mexican traditions such as Día de los Muertos,
    Mexican Independence Day celebrations, and weekly homemade tamales. Growing up in a small rural town, she is also shaped by Texan values of community self-reliance and closeness. Her bicultural upbringing
    blends vibrant Mexican art, music, and cuisine with the modest, neighborly rhythm of West Texas life. This dual heritage informs her artistic sensibility, language proficiency, and commitment to giving
    back to both the Mexican-American and broader local community.
