  hobbies: '[''drawing'', ''painting'', ''digital illustration'', ''photography'', ''sketch journaling'', ''reading graphic novels'', ''guitar playing'', ''cooking Mexican recipes'', ''volunteering at community
    art workshops'', ''salsa dancing'']'
  career_goals: Angel aims to earn her GED within the next year and then enroll in a community college art program to build a robust portfolio. She hopes to secure an apprenticeship with a regional design
    studio, ultimately establishing herself as a freelance graphic designer specializing in branding for Mexican-American businesses and cultural events. In the longer term, she envisions leading community
    arts initiatives, using her organizational strengths to produce annual festivals and workshops that celebrate her heritage.
