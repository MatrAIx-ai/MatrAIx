  hobbies: '[''Abstract painting'', ''Pottery'', ''Cooking Salvadoran cuisine'', ''Soccer'', ''Attending local festivals'', ''Reading science fiction'', ''Gardening'', ''Volunteering at community center'']'
  career_goals: Jose aims to establish a community cultural center in Bogalusa that offers free art classes, Salvadoran heritage workshops, and a gathering space for local festivals. He also hopes to launch
    a small catering venture focused on authentic Salvadoran dishes, using the center as a showcase. Long‑term, he aspires to become a recognized advocate for arts funding in Washington Parish, mentoring
    the next generation of creative leaders while preserving his cultural legacy.
