personas:
  professional: Vickie Swett, a seasoned manufacturing technologist, leverages deep expertise in CAD, CNC machining, and quality assurance alongside a humanities‑driven flair for visual storytelling, using
    their curious, organized and sociable nature to lead cross‑functional projects, mentor junior staff, and translate complex technical concepts into compelling presentations as they pursue a senior technologist
    or project‑manager role.
  sports: Vickie Swett is an avid outdoor enthusiast who hits the Beartooth trails for hiking and runs with the Billings Trail Runners club in the spring, skis at Big Sky Resort with the Billings Snowmountain
    group in winter, and roots for the local Billings Mustangs baseball team and the Montana Grizzlies football squad on weekends.
  arts: Vickie Swett immerses herself in the arts by painting watercolors of Yellowstone inspired by Georgia O'Keeffe’s bold palettes, curating set designs for community theater, photographing macro subjects
    in the style of Ansel Adams, frequenting the Museum of the Rockies to see contemporary installations by Yayoi Kusama, and participating in the Billings Fine Arts Council’s monthly critic circles.
  travel: Vickie Swett prefers thoughtfully planned road trips that blend rugged scenery with cultural stops, returning yearly to Yellowstone and Glacier National Parks for painting expeditions, while also
    carving out occasional overseas escapes to art‑rich cities like Florence and Paris and, when budget permits, an adventure trek through New Zealand’s South Island.
  culinary: Vickie Swett enjoys a farm‑to‑table kitchen where they bake artisan sourdough loaves, perfect pan‑seared rainbow trout with lemon‑butter glaze, and stir a comforting elk and root‑vegetable stew
    seasoned with local huckleberries and wildflower honey, often sourcing fresh herbs from their own garden.
  core: Vickie Swett is a curious, methodical multitasker who balances high‑tech engineering with watercolor landscapes, yet habitually forgets to water their garden succulents, hoards vintage typewriters
    for inspiration, and can’t resist a late‑night dip into a new photography technique.
background:
  cultural: Vickie comes from a White, Midwestern American background; her parents raised her in a small town in Iowa where education, community involvement, and a strong work ethic were emphasized. Early
    exposure to local art fairs and farm life cultivated both her appreciation for the outdoors and her curiosity about creative expression. After completing a graduate degree in the humanities, she moved
    to Billings, Montana, drawn by the region’s rugged landscape and emerging technical industry. In Billings, she has integrated the western frontier spirit—self‑reliance, respect for nature, and community
    solidarity—into her personal identity while embracing the city’s growing arts scene. This blend of Midwestern roots, academic humanities influence, and Montana’s cultural landscape informs her worldview,
    shaping a balanced perspective that values tradition, innovation, and diverse experiences.
attributes:
  skills: '[''CAD modeling (SolidWorks, Autodesk Inventor, AutoCAD)'', ''CNC machine operation and programming'', ''Mechanical troubleshooting and preventive maintenance'', ''Quality assurance and statistical
    process control'', ''Technical documentation and regulatory compliance (OSHA)'', ''Ergonomic and aesthetic design analysis'', ''Technical writing and visual communication'', ''Project scheduling and
    resource management (MS Project, Asana)'', ''Team leadership and mentorship'', ''Data analysis with Excel and Python scripting'', ''Client liaison and stakeholder presentations'', ''Cross‑functional
    collaboration and creative problem solving'']'
  hobbies: '[''Watercolor and acrylic painting'', ''Hiking and backcountry camping in Montana'', ''Landscape and macro photography'', ''Visiting art galleries and museum exhibitions'', ''Volunteering as
    stage tech and set designer for community theater'', ''Reading classic and contemporary literature'', ''Participating in local book clubs'', ''Gardening and arboretum care'', ''Baking artisan breads
    and hosting potluck gatherings'']'
  career_goals: Vickie is focused on advancing into a senior technologist or engineering project manager role where she can shepherd product development from concept through manufacturing, integrating design
    aesthetics with functional performance. She aims to earn a Certified Manufacturing Technologist (CMfgT) credential and complete a Project Management Professional (PMP) certification within the next
    two years. Long‑term, she envisions leading a multidisciplinary R&D team that pioneers sustainable, user‑centric engineering solutions and establishing a mentorship program in Billings to encourage
    women and underrepresented groups to pursue technical careers. Additionally, she hopes to spearhead community outreach initiatives that blend art and engineering education for local schools.
