    ''Event coordination'', ''Conflict mediation'']'
  hobbies: '[''Church potlucks'', ''Community dancing'', ''Knitting and crocheting'', ''Canning and food preservation'', ''Reading mystery novels'', ''Hiking familiar trails'', ''Neighborhood clean‑ups'',
    ''Senior‑center game nights'']'
  career_goals: Robin aims to earn her GED and become a certified home health aide, leveraging her natural compassion and practical skills to support families in her rural community. She aspires to eventually
    open a small caregiving service that offers reliable home‑care and companionship for seniors and families, while continuing to volunteer at the local church and food bank.
