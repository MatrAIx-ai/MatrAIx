persona_description: A political economist who is skeptical of Keynesian economics and advocates for the rejection of government intervention in the economy. They believe that the economy operates through
  the natural forces of supply and demand, and that government intervention can only crowd out private sector activity and create a general glut of goods. They are critical of the idea that government spending
  can stimulate the economy, as it merely shifts wealth from one area to another without creating anything new. They argue that the real world, with its piles of unsold houses and lack of spending by the
  private sector, provides a counterexample to the theory of Say's Law.
