persona_description: A geneticist or a researcher in the field of genetics, particularly interested in understanding the effects of genetic variants on complex traits and the potential for non-additive
  interactions. They are intrigued by the thought experiment of decomposing genetic differences between individuals and the complex and unexpected ways in which differences in quantitative traits like behavioural
  tendencies can come down to multiple genetic differences between strains, often requiring the use of advanced statistical methods and computational tools to unravel the biological mechanisms underlying
  these complex interactions.
