  career_goals: Valerie aims to transform her current role into a thriving boutique floral studio that offers full‑service event design, sustainable flower sourcing, and a suite of creative workshops. She
    plans to earn the Master Floral Designer certification from the American Institute of Floral Designers within the next three years, positioning herself as a recognized expert in the Southeast. By expanding
    her brand online, she intends to launch an e‑commerce platform selling curated bouquets, DIY kit subscriptions, and instructional videos that emphasize innovative, abstract design concepts. Valerie
    also hopes to mentor aspiring designers through community classes and collaborate with local venues to integrate floral art installations into public spaces. Ultimately, she aspires to contribute to
    the revitalization of Lula’s cultural scene and become a leading figure in sustainable, artistic floristry.
