personas:
  professional: Valerie Baker is a boutique floral designer who intertwines meticulous color theory with whimsical abstract concepts, turning garden‑grown herbs and watercolor sketches into immersive wedding
    and corporate installations while deftly handling last‑minute client requests and amplifying her brand through vibrant Instagram reels.
  sports: Valerie Baker is an avid hiker who joins the North Georgia Trail Club for sunrise treks up Blood Mountain, practices Vinyasa yoga twice weekly, participates in community dance classes at the local
    studio, and roots for the Atlanta Falcons during football season.
  arts: Valerie Baker immerses herself in the arts by painting watercolors inspired by Monet and Georgia O'Keeffe, photographing garden scenes in the style of Ansel Adams, frequenting Savannah’s art galleries
    and the local botanical garden exhibitions, and drawing creative spark from folk duo The Milk Carton Kids’ live performances.
  travel: Valerie Baker prefers spontaneous road trips that blend adventure with floral inspiration, having explored the lavender fields of Provence, the botanical gardens of Asheville, and the historic
    streets of Savannah, while budgeting travel through a dedicated savings jar and planning future visits to the Philadelphia Flower Show.
  culinary: Valerie Baker enjoys cooking herb‑infused dishes such as basil pesto pasta, rosemary‑crusted lamb, and lavender shortbread, often harvesting fresh thyme, sage, and rosemary from her backyard
    and experimenting with seasonal farm‑to‑table recipes, though she occasionally over‑salts when multitasking between orders.
  core: Valerie Baker is a wildly imaginative floral artist who balances garden‑grown inspiration with meticulous event planning, fueled by yoga, watercolor, and a penchant for spontaneous travel, yet sometimes
    fumbles on budgeting and health check‑ups.
background:
  cultural: Valerie was raised in Lula, a small town in Banks County, Georgia, within a predominantly white, Southern rural community. Her upbringing emphasized Southern hospitality, close family ties,
    and a deep respect for the land and seasonal cycles. Regular participation in church activities and community gatherings fostered a strong sense of civic responsibility and teamwork. The region’s agricultural
    heritage influenced her appreciation for fresh, locally sourced produce and seasonal flowers, while the local folk art traditions nurtured her love for handcrafted beauty. These cultural roots shape
    Valerie’s values of reliability, community engagement, and a keen interest in sustainable, nature‑based design.
