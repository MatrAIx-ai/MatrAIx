personas:
  professional: Engels Alvarezrivera is a bilingual community outreach enthusiast who leverages empathetic listening, informal conflict mediation, and a knack for spontaneous event promotion on social media
    to connect recent immigrants and at‑risk youth with resources, even as their relaxed attitude toward formal planning sometimes leads to last‑minute scramble.
  sports: Engels Alvarezrivera is a devoted fan of the Tennessee Titans and Nashville Predators, regularly plays casual soccer at a local league, attends weekly salsa dancing sessions, and hikes the trails
    of Percy Warner Park to stay active and socially engaged.
  arts: Engels Alvarezrivera strums acoustic renditions of classic Latin melodies by José José and contemporary Nashville country hits by Chris Stapleton at community gatherings, frequently visits intimate
    venues such as The 5 Spot and the Bluebird Café, and captures candid street performances on their phone to share on social media.
  travel: Engels Alvarezrivera prefers spontaneous road trips, having explored the Great Smoky Mountains, spent a weekend in Austin’s live‑music scene and a cultural tour of New Orleans, while day‑dreaming
    about a future immersion trip to Oaxaca’s culinary markets, all balanced against part‑time work and volunteer commitments.
  culinary: Engels Alvarezrivera expertly prepares family staples like pepian and tamales, skillfully balancing spices such as achiote, cumin, and fresh cilantro with Southern corn masa to create flavorful
    fusion dishes that often become the highlight of neighborhood potlucks.
  core: Engels Alvarezrivera is a charismatic, talkative connector who blends music, cooking, and community service into a relaxed yet purpose‑driven lifestyle, occasionally letting their disorganized habits
    delay projects.
background:
  cultural: Engels was born to Guatemalan parents and grew up speaking Spanish at home while learning English after moving to the United States. He maintains strong ties to Guatemalan traditions, celebrating
    holidays like Semana Santa and Día de los Muertos with family and the local diaspora community in Nashville. His cultural identity is reflected in his love for Guatemalan cuisine, marimba rhythms, and
    the Catholic values of community service and hospitality that were emphasized during his upbringing. He regularly participates in cultural festivals organized by the Guatemalan community, both preserving
    his heritage and sharing it with a broader audience.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Empathetic listening and peer support'', ''Informal conflict mediation'', ''Community event planning and facilitation'', ''Basic cooking of Guatemalan
