  hobbies: '[''Playing acoustic guitar'', ''Singing and karaoke'', ''Salsa dancing'', ''Cooking Guatemalan dishes (pepian, tamales)'', ''Attending live music events'', ''Watching and playing soccer'', ''Hiking
    in Percy Warner Park'', ''Volunteering at local shelters'', ''Street photography'']'
  career_goals: Engels aims to secure a GED within the next year and enroll in community‑college courses focused on social work or community health. His short‑term goal is to obtain a part‑time position
    as a community outreach assistant with a local nonprofit, where he can leverage his sociable nature and compassion to assist recent immigrants and at‑risk youth. Long‑term, he envisions founding a culturally
    centered community hub in Nashville that offers language tutoring, cultural workshops, and a modest kitchen serving traditional Guatemalan fare, providing both employment and a gathering space for the
    diaspora.
