persona_description: A comprehensive and engaging teacher of the National Curriculum, with a focus on mathematics, English, and sciences, who also teaches geography, history, French, religious studies,
  music, information technology, art, craft, design and technology. The teacher aims to introduce reasoning in the Upper School to prepare pupils for their secondary school examinations, with a strong emphasis
  on developing critical thinking. The teacher uses subject specialists in the Lower School and focuses on individualized teaching in the Upper School, with a focus on flat-panel interactive display boards
  and iPads for practice. The teacher organizes trips to places related to curriculum subjects, and there are regular drama and musical performances. The teacher encourages pupils to develop their talents
  and abilities, and all children are encouraged to develop their particular talents and abilities.
