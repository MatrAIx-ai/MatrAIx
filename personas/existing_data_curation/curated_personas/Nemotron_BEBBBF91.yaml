  career_goals: Although retired, Zane is focused on staying active and contributing to his community. His primary goals are to maintain his health through regular boating and walking, to volunteer at the
    local senior center by teaching basic home-repair skills, and to document his life stories for future generations. He also aspires to support his wife in traveling to family members across the country
    and to help preserve the local history of Lake Havasu City.
