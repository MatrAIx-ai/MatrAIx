personas:
  professional: Zane Black, a retired hands‑on contractor turned community mentor, leverages their carpentry, budgeting, and event‑coordination expertise to guide fellow retirees through practical home‑repair
    projects, applying their structured and reliable nature to keep workshops punctual and orderly.
  sports: Zane Black enjoys leisurely fishing on Lake Havasu, participates in the Havasu County Boating Club, follows the Arizona Cardinals in football season, watches the Phoenix Suns during winter, and
    maintains a gentle walking routine along the desert trails for fitness.
  arts: Zane Black's creative side shines through listening to Marty Robbins and Willie Nelson, attending the local community theater's classic Western performances, and dabbling in modest desert‑landscape
    sketches, all of which reinforce their appreciation for the region's heritage.
  travel: Zane Black prefers low‑key road trips, having explored the Grand Canyon and Sedona by car, and dreams of a cross‑country family reunion drive to Santa Fe, balancing careful itinerary planning
    with spontaneous stops at roadside diners.
  culinary: Zane Black enjoys preparing simple desert meals, often grilling lake‑caught catfish seasoned with lemon and cilantro, simmering a hearty chili con carne with beans and jalapeños, and roasting
    cactus paddles, reflecting their practical, no‑frills approach to dining.
  core: Zane Black is a steadfast, community‑oriented retiree who blends a love of the outdoors with meticulous DIY expertise, quietly mentoring peers, preserving local heritage, and navigating life with
    a structured yet flexible mindset.
background:
  cultural: Zane is a white American with roots in the Midwestern United States. He grew up in a small-town, middle-class environment that emphasized self-reliance, modesty, and community service. After
    moving to the Southwest in his later years, he blended his Midwestern values with the laid-back, outdoor-focused culture of Lake Havasu City, embracing the local boating lifestyle while maintaining
    a strong sense of personal responsibility and respect for tradition.
attributes:
  skills: '[''Carpentry'', ''Basic plumbing'', ''Vehicle maintenance'', ''Budgeting and financial planning'', ''Event organization'', ''Mentoring'']'
