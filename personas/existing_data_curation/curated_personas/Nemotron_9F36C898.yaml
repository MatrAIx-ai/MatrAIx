personas:
  professional: Maria Rosario is a seasoned maintenance professional in Miami who combines their bilingual fluency, electrical, plumbing, and HVAC expertise with a curious, art‑appreciating mindset, using
    improvisational problem‑solving and a relaxed, sociable flair to turn chaotic work orders into collaborative projects while fiercely competing for leadership roles and meticulously vetting vendors.
  sports: Maria Rosario keeps fit by sprinting through weekend pick‑up games with the Miami United Soccer Club, fervently supporting Colombian powerhouse Atlético Nacional during the Copa Libertadores broadcasts,
    and occasionally tuning in to the Miami Heat during NBA season to satisfy their competitive spirit, while they prefer spontaneous salsa dancing as a cardio alternative to regimented gym routines.
  arts: Maria Rosario immerses themselves in Miami’s vibrant arts scene by strolling through Wynwood Walls to admire murals by Shepard Fairey and RETNA, attending Pablo Picasso‑inspired exhibitions at PAMM,
    dancing to live performances by Carlos Vives and Juan Luis Guerra at Little Havana Latin Club, and curating a modest home gallery of local photography that reflects their curiosity for unconventional
    creativity.
  travel: Maria Rosario favors spontaneous weekend road trips to Florida hotspots like Key West and Naples, while dreaming of immersive cultural tours of Cartagena and Barcelona, planning each adventure
    on a loose itinerary that balances salsa‑filled evenings with affordable boutique hotels, and they manage a modest vacation budget that reflects their disciplined yet flexible financial mindset.
  culinary: Maria Rosario showcases a seasoned home‑cook’s flair by hand‑crafting crisp arepas with corn masa, sizzling beef empanadas seasoned with cumin and ají, and pepper‑spiced plantain fritters harvested
    from their balcony herb garden that features cilantro and oregano, while they relish sharing these dishes at salsa nights and expect bold, authentic flavors at any restaurant they visit.
  core: Maria Rosario is a curious, sociable maintenance whiz whose love for salsa, street art, and impromptu DIY projects is tempered by a habit of misplacing tools and a relaxed approach to budgeting
    that keeps them perpetually juggling spreadsheets and paint cans.
background:
  cultural: Maria was born in Medellín, Colombia, and moved to Miami in her early thirties. She maintains strong ties to her Colombian heritage, speaking Spanish at home and celebrating traditions such
    as Día de la Independencia, Carnaval de Barranquilla, and family gatherings centered around music, dance, and food. In Miami’s multicultural environment, she blends Colombian customs with Afro‑Caribbean
    influences, participating in local festivals, enjoying the city's Latin culinary scene, and staying connected with the vibrant Colombian diaspora. Her cultural roots shape her warm, hospitable demeanor,
    her love for communal activities, and her dedication to supporting fellow immigrants through mentorship and community service.
