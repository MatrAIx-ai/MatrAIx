  career_goals: Maria aims to advance to a lead maintenance supervisor role within the next three years, securing certifications in HVAC and electrical work to broaden her technical credentials. She envisions
    establishing a small, community‑focused handyman business that blends her practical expertise with her love for aesthetic improvements, such as decorative painting and custom shelving. Mentoring younger
    technicians and introducing sustainable, energy‑efficient maintenance practices are also key components of her long‑term professional vision.
