personas:
  professional: Danielle Hoskins, a retired community organizer turned volunteer arts coordinator, leverages their storytelling, event‑planning, and watercolor skills to run workshops at the North Myrtle
    Beach Arts Center, balancing a relaxed, flexible approach with occasional bursts of assertiveness when championing junior volunteers.
  sports: Danielle Hoskins enjoys daily sunrise walks along the North Myrtle Beach boardwalk, participates in the senior-friendly sand‑volleyball league at the Myrtle Beach Community Center, and faithfully
    cheers for the Carolina Panthers and the Greenville Drive while keeping a relaxed attitude toward formal exercise routines.
  arts: Danielle Hoskins channels their curiosity through watercolor seascapes inspired by Winslow Homer and local painter Terry Taylor, volunteers as a quilting mentor at the Arts Center, regularly attends
    performances by the Charleston Symphony Orchestra and the Savannah Music Festival, and delights in the soulful blues of B.B. King and the storytelling of actress Viola Davis.
  travel: Danielle Hoskins plans leisurely road trips to historic art museums in Charleston, Savannah, and Atlanta, prefers staying in charming B&Bs that offer garden views, and dreams of a future cruise
    along the Mediterranean’s Amalfi Coast, even though limited mobility sometimes forces them to schedule travel around medical appointments.
  culinary: Danielle Hoskins, a confident home cook, blends Southern comfort with garden‑fresh herbs, frequently preparing shrimp and grits with locally sourced okra, collard greens seasoned with rosemary,
    and a sweet potato casserole topped with toasted pecans, while savoring occasional meals at the beachfront crab shack for fresh Gulf seafood.
  core: Danielle Hoskins, a beach‑loving watercolor‑painting retiree, balances spontaneous generosity with occasional forgetfulness, turning every garden bloom and bridge game into a lesson in community
    and joy.
background:
  cultural: Danielle grew up in a Southern, white family in South Carolina, steeped in the traditions of Southern hospitality, close‑knit community life, and a strong church presence. Her upbringing emphasized
    family gatherings, shared meals, and respect for local customs. Living most of her adult life along the coastal stretch of North Myrtle Beach, she has embraced the beach lifestyle—valuing outdoor recreation,
    seafood, and a relaxed pace of life. While she honors her Southern roots, her curiosity and openness to new ideas have led her to appreciate diverse artistic expressions and cultural experiences, blending
    traditional Southern values with a modern, inclusive outlook.
