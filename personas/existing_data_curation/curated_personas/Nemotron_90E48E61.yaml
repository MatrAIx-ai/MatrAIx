    resolution and mediation'', ''Community outreach and safety education'', ''Creative problem solving'', ''Technical writing and presentation'', ''Visual communication (basic graphic design)'', ''Empathy‑driven
    stakeholder engagement'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Watercolor painting and sketching'', ''Photography (urban and industrial subjects)'', ''Writing blog posts on art, technology, and safety'',
    ''Hiking local trails and nature walks'', ''Practicing yoga and meditation'', ''Experimenting with multicultural cooking'', ''Volunteering for community safety workshops'', ''Curating pop‑up art exhibitions'',
    ''Playing board games and improv workshops'']'
  career_goals: Sophie aspires to advance to a senior safety engineering role where she can lead a comprehensive health‑ and‑safety program for a mid‑size manufacturing firm in the Midwest. She aims to
    obtain Certified Safety Professional (CSP) certification and eventually an MBA in sustainable operations to blend safety with environmental stewardship. Her long‑term ambition includes developing culturally
    responsive safety training that incorporates artistic expression and storytelling, mentoring emerging professionals from under‑represented backgrounds, and championing workplace cultures that prioritize
    both employee well‑being and creative innovation.
