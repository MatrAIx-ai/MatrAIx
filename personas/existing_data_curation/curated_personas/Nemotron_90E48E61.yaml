personas:
  professional: Industrial safety engineer Sophie Calderon, 26, merges industrial engineering expertise with a flair for artistic communication, leveraging Lean Six Sigma, OSHA/ISO compliance, and ergonomic
    design to devise safety programs that feel as creative as a gallery installation, while her relaxed, slightly disorganized style lets ideas flow freely but sometimes requires teammates to remind her
    of deadlines.
  sports: Sophie Calderon embraces hiking the Blue River Trail with the Kansas City Trailblazers club, practices yoga at a downtown studio, and roots for the Kansas City Chiefs, Royals, and Sporting Kansas
    City, balancing her love of the outdoors with a relaxed weekly schedule that prioritizes wellbeing over intense competition.
  arts: Sophie Calderon curates intimate pop‑up shows inspired by artists like Kara Walker and Banksy, sketches watercolors of industrial landscapes, captures street textures reminiscent of Henri Cartier-Bresson,
    and finds solace listening to The Velvet Underground while perusing contemporary exhibitions at the Nelson‑Atkins Museum.
  travel: Sophie Calderon prefers spontaneous, art‑focused weekend getaways, having explored Chicago’s museum scene, Austin’s live‑music venues, and Portland’s quirky coffee shops, while dreaming of a week‑long
    immersion in Berlin’s galleries and the tranquil temples of Kyoto.
  culinary: Sophie Calderon experiments in her kitchen with dishes like kimchi‑topped ramen, Ethiopian injera with lentil stew, and homemade sourdough, favoring bold flavors such as gochujang, sumac, and
    smoked paprika, yet she often forgets to clean the fridge after cooking marathons.
  core: Sophie Calderon is a curiosity‑driven safety engineer who fuses art and ergonomics, scatters art supplies across her studio, forgets deadlines but never misses a chance to sketch an industrial scene.
background:
  cultural: Sophie’s cultural background is rooted in an African‑American family that values storytelling, music, and communal support. Growing up in the Midwest, she blends the rich traditions of her heritage—celebrating
    Juneteenth, enjoying soul food, and engaging with Black literary and artistic circles—with the neighborly ethos of Overland Park. She actively participates in local Black professional networks, mentors
    youth through STEM outreach programs, and draws inspiration from African‑American artists and activists, which informs her inclusive approach to both her personal life and her engineering career.
attributes:
  skills: '[''Industrial safety compliance (OSHA, ISO 45001)'', ''Hazard identification and risk assessment'', ''Ergonomic workstation design'', ''Process optimization (Lean Six Sigma Green Belt)'', ''Project
