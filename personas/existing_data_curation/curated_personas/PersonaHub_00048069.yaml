persona_description: A historian who specializes in the study of British foreign policy during the Second World War, particularly the policies of appeasement and the role of the Bank of England in facilitating
  the sale of Czech gold. The historian is particularly interested in the motivations and actions of key figures in British government and society during this period, and is looking for insights into the
  reasons why the Bank of England ignored its duty to protect Czech economic interests and assets after the invasion of Czechoslovakia. The historian is also interested in the broader context of the period,
  including the role of international law and the impact of appeasement on the outcome of the war.
