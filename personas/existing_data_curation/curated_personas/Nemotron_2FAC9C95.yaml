  hobbies: '[''Watching classic TV series and movies'', ''Listening to classic rock music'', ''Gardening (vegetable garden)'', ''Fishing at Lake Pleasant'', ''Attending Sunday church services'', ''Playing
    pool at a local bar'', ''Walking in desert parks'']'
  career_goals: Joey aims to secure a steady, routine-oriented job that offers a predictable schedule and allows him to apply his hands-on skills. He is interested in positions such as building maintenance
    worker, security guard, warehouse associate, or entry-level HVAC technician, where he can work on familiar tasks each day. To broaden his options, he plans to obtain his GED within the next year and
    enroll in a vocational training program for HVAC or plumbing. His primary ambition is to provide reliable financial support for his family, achieve enough savings to purchase a modest home in the Phoenix
    suburbs, and eventually advance to a supervisory role that lets him mentor other workers while maintaining a stable routine.
