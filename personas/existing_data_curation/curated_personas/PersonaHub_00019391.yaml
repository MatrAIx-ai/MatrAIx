persona_description: A government official responsible for managing spatial information and developing digital tools to enhance real estate and town planning sectors. This person is skilled in using spatial
  technologies such as GPS and GIS to present complex data in an accessible and user-friendly manner. They are knowledgeable about the use of spatial data for disaster response, emergency management, and
  the creation of tools for land use management. This person is familiar with the different spatial delivery platforms developed by NSW Land and Property Information (LPI) and is skilled in using GIS Online
  to provide full GIS capabilities without the need for a GIS professional. They are passionate about using a platform that is familiar and easy to use to allow the public to view information about their
  property anywhere, at any time.
