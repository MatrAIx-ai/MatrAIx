persona_description: A pediatrician who specializes in the diagnosis and treatment of acute kidney injury (AKI) caused by non-steroidal anti-inflammatory drugs (NSAIDs) in children. The pediatrician has
  a thorough understanding of the natural history of NSAID-associated AKI, including the potential for development of chronic kidney disease, and is concerned about the significant costs of caring for children
  with AKI caused by NSAIDs. The pediatrician is also interested in providing careful NSAID education to parents and children.
