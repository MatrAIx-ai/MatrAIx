personas:
  professional: Clariann Rodriguez, a 17‑year‑old high‑school senior, channels her love for organizing community events and bilingual fluency into a budding role as a youth outreach coordinator, leading
    school club meetings and church dance workshops while planning a part‑time job at a local nonprofit, and they eagerly seek opportunities to bridge gaps between service agencies and their community.
  sports: Clariann Rodriguez, an avid after‑school soccer enthusiast, plays on a co‑ed recreation league team at the local park, roots for the Arkansas Razorbacks during college football season, and they
    attend Little Rock Rangers matches whenever they can fit them between dance rehearsals.
  arts: Clariann Rodriguez, an energetic creator on TikTok, blends folkloric dance moves with modern pop beats from artists like Shakira, Rosalía, and J Balvin, while they sketch digital illustrations inspired
    by Frida Kahlo and Banksy in spare moments.
  travel: Clariann Rodriguez dreams of exploring historic colonial cities in Central America and the bustling streets of Mexico City, yet they currently balance weekend camping trips to the Ozark National
    Forest with occasional family outings to Nashville, all while budgeting around a modest teen allowance.
  culinary: Clariann Rodriguez loves crafting authentic tamales and pepián for her TikTok followers, often seasoning with roasted chiles, corn masa, and a hint of chocolate, while they experiment with fusion
    dishes like taco‑styled pepián nachos, though they sometimes forget to clean the kitchen after cooking marathons.
  core: Clariann Rodriguez is a sociable, structure‑loving teen who juggles dance workshops, soccer games, and budgeting for future studies, while they sprinkle daily life with a lively mix of cultural
    rhythms, digital creativity, and a habit of procrastinating on chores.
background:
  cultural: Clariann comes from a Guatemalan immigrant family that settled in Little Rock a decade ago. At home, Spanish is the primary language, and family gatherings often revolve around traditional foods,
    music, and Catholic observances such as Día de los Santos and the celebration of Guatemala’s Independence Day. Her parents emphasize the values of family solidarity, respect for elders, and community
    service, which shape her considerate and cooperative outlook. Though she navigates American school culture, she remains deeply connected to her heritage through language, dance, and participation in
    local Latin American festivals, serving as a cultural ambassador among her peers.
