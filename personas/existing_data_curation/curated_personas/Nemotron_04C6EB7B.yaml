  hobbies: '[''Folkloric dance workshops'', ''Soccer'', ''TikTok video creation (dance and cooking)'', ''Cooking Guatemalan recipes'', ''Volunteering at community center'', ''Reading teen fiction'', ''Sketching
    and digital illustration'', ''Journaling'']'
  career_goals: Clariann aims to earn her GED within the next two years and then enroll in a community college program focused on social work or community health. She envisions a career as a bilingual community
    outreach coordinator, where she can combine her organizational talents, love for helping others, and cultural background to bridge gaps between local service agencies and the Guatemalan immigrant community
    in Little Rock. In the short term, she hopes to secure a part‑time position at a local nonprofit or community center, gaining practical experience in client interaction and program logistics.
