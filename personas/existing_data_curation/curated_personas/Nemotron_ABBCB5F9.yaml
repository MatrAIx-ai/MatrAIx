    and interpersonal skills'']'
  hobbies: '[''Playing basketball at community courts'', ''Listening to and curating hip‑hop/R&B music'', ''Grilling, smoking, and experimenting with marinades'', ''Volunteering at a local food bank'',
    ''Urban cycling and exploring street art'', ''Sneaker collecting'', ''Playing sports video games (e.g., NBA 2K)'', ''Attending local concerts and community events'']'
  career_goals: Stanton aims to become a master butcher recognized for both craftsmanship and community impact. He plans to earn USDA certification and complete a culinary apprenticeship that deepens his
    expertise in specialty cuts and artisanal charcuterie. Long‑term, he envisions opening a boutique butcher shop in Philadelphia that emphasizes locally sourced, sustainably raised meats, paired with
    a small sit‑down grill where he can showcase his barbecue and seasoning experiments. He also hopes to mentor youth from his neighborhood, offering workshops that combine food safety training with entrepreneurship
    basics. Completing his GED and possibly attending night courses in business management are concrete steps he intends to take to support his entrepreneurial aspirations.
