personas:
  professional: Stanton Smith, a 23‑year‑old meat‑processing specialist in Philadelphia, blends meticulous butchering precision with a talkative, mentorship‑driven approach, and they turn technical expertise
    into community‑focused cooking demos while balancing curiosity for new cuts with practical workflow efficiency.
  sports: Stanton Smith, a regular on Philly’s neighborhood basketball courts, follows the Philadelphia 76ers and Eagles, rides with the Philadelphia Cycling Club through spring‑time city rides, and they
    stay fit by mixing pickup hoops, weekend bike tours, and occasional weight‑training sessions at the local gym.
  arts: Stanton Smith curates hip‑hop and R&B playlists featuring Kendrick Lamar, Anderson .Paak, and H.E.R., dabbles in basic DJ mixing at home, attends live shows at the Electric Factory, and they also
    enjoy street art tours that showcase works by local muralists while unwinding with NBA 2K sessions featuring the Philadelphia 76ers roster.
  travel: Stanton Smith prefers short, budget‑friendly road trips that blend culinary exploration and music scenes, having toured New Orleans for its gumbo and jazz, Austin for live indie‑hip‑hop festivals,
    and they dream of a future culinary pilgrimage to Kansas City’s BBQ mecca and Barcelona’s vibrant street art districts.
  culinary: Stanton Smith, an avid grillmaster, experiments with hickory‑smoked brisket, Korean‑style short ribs, and homemade rubs featuring brown sugar, smoked paprika, and garlic, enjoys cooking for
    friends on weekend cook‑outs, and they constantly refine techniques while balancing the scientific precision of meat‑processing with creative flavor experimentation.
  core: Stanton Smith is a high‑energy, talkative 23‑year‑old butcher who turns every grill session into a community jam, obsessively hunts sneaker drops, yet sometimes lets impulse spending outpace the
    budget they set.
background:
  cultural: Stanton is an African‑American raised in the vibrant, historically Black neighborhoods of Philadelphia, with close ties to Delaware County’s suburban community. Family gatherings centered around
    soul food—slow‑cooked greens, seasoned meats, and shared recipes—instilled in him a deep appreciation for culinary tradition and communal hospitality. His upbringing is rooted in the city’s rich cultural
    tapestry, including church services that emphasize fellowship, local festivals celebrating African‑American heritage, and a strong sense of neighborhood solidarity. These influences shape his outlook
    on community service, entrepreneurship, and the importance of preserving cultural food practices. While he embraces contemporary urban culture—music, fashion, and sports—he also honors the legacy of
    resilience and mentorship passed down through generations of his family, many of whom have worked in food‑related trades.
attributes:
  skills: '[''Butchery and meat cutting'', ''Food safety and HACCP compliance'', ''Sanitation and hygiene protocols'', ''Industrial equipment operation and maintenance'', ''Inventory management and portion
