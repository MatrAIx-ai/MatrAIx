personas:
  professional: An eager classroom helper named Angelo Norgard volunteers to arrange LEGO stations, distribute picture books during story time, and ensure peers follow the daily routine, showing they blend
    practicality with a cooperative spirit.
  sports: A lively soccer enthusiast named Angelo Norgard dashes across the neighborhood field every Saturday with the Little Strikers club, idolizes the Chicago Fire FC, and fuels their energy by joining
    impromptu games of tag that they organize during recess.
  arts: A budding creator named Angelo Norgard spends afternoons constructing LEGO marvels, sketching heroic animals and superheroes inspired by Marvel’s Spider‑Man and Disney’s The Lion King, and loses
    themselves in picture books by Dr. Seuss and Mo Willems, which they consider essential to their imagination.
  travel: A curious explorer named Angelo Norgard loves family road trips to the nearby beach and annual visits to Walt Disney World in Orlando, preferring familiar itineraries with predictable snack stops,
    but they dream of one day seeing the pyramids of Egypt after hearing stories at bedtime.
  culinary: A budding foodie named Angelo Norgard enjoys simple dishes like cheese pizza, chicken nuggets, and peanut‑butter‑and‑jelly sandwiches, can proudly make a bowl of mac‑and‑cheese with a splash
    of butter under parental supervision, and prefers the crunchy crunch of carrot sticks and apple slices as snack staples.
  core: Angelo Norgard shines as an energetic, routine‑loving six‑year‑old whose compassion fuels group games, yet they sometimes forget to tidy up their LEGO creations, balancing leadership with a delightful
    hint of messiness.
background:
  cultural: Angelo grows up in a middle‑class, predominantly white suburban community in Medford, New Jersey. His family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth
    of July, often with community gatherings, backyard barbecues, and neighborhood parades. The local culture emphasizes school involvement, community sports leagues, and a strong sense of neighborhood
    safety. Angelo’s upbringing reflects a blend of broader American cultural values—such as independence, teamwork, and volunteering—combined with the local New Jersey tradition of close‑knit, family‑oriented
    neighborhoods.
