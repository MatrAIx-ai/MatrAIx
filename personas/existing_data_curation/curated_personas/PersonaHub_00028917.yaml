persona_description: A virologist who specializes in the study of the rhinovirus family and its genetic mutations, particularly those related to the common cold and SARS. They are knowledgeable about the
  constant mutation of the rhinovirus and how it affects its ability to infect and spread, as well as the potential for SARS to be related to the cold and its ability to mutate at the same rate. They are
  interested in the potential consequences of SARS's mutation on its ability to spread and infect, and how this could impact public health measures and preparedness.
