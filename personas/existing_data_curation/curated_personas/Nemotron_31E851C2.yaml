  career_goals: While approaching retirement, Jane aims to transition into a mentorship and advisory role, sharing her wealth of supervisory experience with emerging leaders in her organization and local
    nonprofits. She hopes to develop a community art program that engages seniors and youth on Whidbey Island, blending her administrative expertise with her love for the arts. Jane also aspires to author
    a practical guide on office team leadership, drawing on her methodical approach and curiosity for unconventional solutions. Volunteering as a docent at the local museum and contributing to regional
    cultural festivals are also part of her legacy‑focused ambitions.
