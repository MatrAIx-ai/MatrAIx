persona_description: A scientist or researcher who specializes in the study of carbon respiratory fluxes in heterogeneous forest canopies, particularly in ponderosa pine forests. They are interested in
  understanding the temporal and spatial variation in respiration rates of components such as needles, stems, roots, and soil microbes. They are skilled in conducting field studies and employing a combination
  of biological and micrometeorological measurements to assess these fluxes. They are also experienced in manipulating the ecosystem to examine the carbon fluxes from roots and heterotrophs.
