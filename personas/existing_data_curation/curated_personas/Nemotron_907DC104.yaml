  hobbies: '[''Reading classic novels'', ''Journaling'', ''Gardening'', ''Baking desserts'', ''Pet care (dog walks)'', ''Small‑group book club'', ''Knitting and crochet'', ''Listening to folk music'']'
  career_goals: Marydarlene aims to graduate high school with solid academic credentials and then pursue a vocational path in healthcare, such as becoming a certified nursing assistant or a veterinary technician.
    She is drawn to careers that offer stable, routine‑focused environments where she can care for people or animals. In the short term, she plans to take a part‑time job at the local family bakery after
    completing her training, combining her love for routine work with community interaction. Long‑term, she hopes to work at the nearby community clinic or an animal care facility, applying her practical
    skills and compassionate nature to support the well‑being of her hometown.
