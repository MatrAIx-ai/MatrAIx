persona_description: A woman who is passionate about social justice and equality, particularly in the areas of reproductive justice, labor rights, and an end to gender violence. She is a member of the International
  Women's Strike USA's national planning committee and is involved in organizing rallies and marches for the "International Women's Strike" in the United States. She is also involved in planning a "Day
  Without A Woman" general strike and is encouraging women to wear red to show solidarity with the movement. She is committed to using a diversity of actions to talk about women's labor and understands
  the unity between domestic roles and public roles that women constantly have to straddle. She is aware of the challenges of tracking and quantifying the measures that will be difficult to track and quantify.
