  hobbies: '["Oil painting","Charcoal sketching","Digital photography","Visiting art galleries and museums","Garden design and organic vegetable gardening","Woodworking and furniture restoration","Model
    shipbuilding","Reading philosophy and literary fiction","Tai chi practice","Cooking artisan breads and homemade preserves"]'
  career_goals: Milton aims to channel his organizational expertise and artistic curiosity into a part‑time consulting role for nonprofit arts organizations in the Chicago suburbs, helping them plan exhibitions,
    manage budgets, and engage volunteers. He also aspires to complete his bachelor's degree in Art History, which he began in college, and to launch a modest community art space in Geneva that offers workshops
    in painting, woodworking, and garden design. Long‑term, he envisions authoring a collection of essays that explore the intersection of Midwestern pragmatism and contemporary art, while mentoring local
    youth through hands‑on creative programs.
