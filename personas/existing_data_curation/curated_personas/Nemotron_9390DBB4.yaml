  hobbies: '[''Drawing and painting'', ''Lego and block building'', ''Collecting and sketching nature items'', ''Reading picture books'', ''Dancing and singing'', ''Attending community art workshops'']'
  career_goals: Jackie's ambitions are shaped by her love for art and caring nature. She dreams of growing up to become an artist who creates colorful books for children, or a teacher who blends creativity
    into lessons. She also imagines helping animals as a veterinarian because she often cares for her family’s pet rabbit. These aspirations reflect her desire to bring joy, nurture others, and explore
    new ideas.
