personas:
  professional: Frank Couture, a retired facilities and property manager with decades of hands‑on expertise, now mentors local small‑business owners on operational efficiency, leads a senior‑center financial‑literacy
    program, and offers practical home‑renovation consulting, all while applying his structured, budget‑focused mindset.
  sports: Frank Couture, an avid Los Angeles Angels supporter who rarely misses a home game, also hikes regularly with the Los Angeles Hiking Club, participates in senior‑center pickup basketball, and maintains
    fitness through weekend trail walks and occasional light weight‑lifting.
  arts: Frank Couture finds inspiration in Ken Burns’ historical documentaries, the resonant slide‑guitar of Ry Cooder, and classic films starring Audrey Hepburn, while his woodworking projects echo the
    clean lines of mid‑century designers like Charles and Ray Eames, turning functional pieces into personal art statements.
  travel: Frank Couture prefers well‑planned road trips in his restored 1960s Chevrolet, having recently explored Napa Valley’s vineyards and Yosemite’s Mist Trail, and he aims to embark on a Route 66 adventure
    along the Pacific coast, balancing travel aspirations with a modest retirement budget that prioritizes family visits over luxury lodging.
  culinary: Frank Couture delights in backyard barbecues featuring slow‑smoked brisket with a chipotle‑honey glaze, fresh garden basil pesto pasta, and seasonal roasted corn, possessing a competent but
    occasionally over‑salty cooking style that reflects his love for robust flavors and hands‑on food preparation.
  core: Frank Couture blends disciplined pragmatism with hands‑on creativity, channeling his retirement into community mentorship, meticulous budgeting, and a steady stream of woodworking, gardening, and
    classic‑car projects, while maintaining a calm, structured outlook and a penchant for occasional over‑fixing.
background:
  cultural: Frank is a white American with mixed Italian and Anglo‑American heritage, raised in suburban Southern California during the 1960s and 1970s. His family's values emphasized hard work, family
    cohesion, and community involvement. After earning an associate's degree in Business Administration, he built a career in logistics and facilities management before retiring in Tustin, Orange County,
    where he remains active in his homeowners association and local volunteer circles.
