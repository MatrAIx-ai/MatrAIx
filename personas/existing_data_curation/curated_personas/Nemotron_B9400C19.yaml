  career_goals: Gloria aims to transition into a supervisory role within the next three to five years, leveraging her hands‑on experience to become a shift lead or safety coordinator. She plans to pursue
    additional certifications, such as a Certified Safety Professional credential, and complete a bachelor’s degree in logistics or business administration through evening classes at a nearby community
    college. Long‑term, she hopes to design a workplace training program that emphasizes both operational efficiency and employee well‑being, and to champion community outreach initiatives that help local
    residents acquire entry‑level logistics skills. While advancing her career, she remains committed to maintaining a balanced schedule that allows time for her family, hobbies, and volunteer work.
