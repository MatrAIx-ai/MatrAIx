  career_goals: In her imaginative play, Kelly Ann often pretends to be a teacher who organizes a classroom, a librarian who keeps books orderly, or a caregiver who helps animals stay healthy. She expresses
    a desire to grow up helping others and maintaining order, hinting at future aspirations toward teaching, caregiving, or other service‑oriented roles.
