persona_description: A group of more than 200 educators around the nation who have declared Oct. 1-7 Ethnic Studies Week in response to recent attacks on ethnic studies programs, particularly Arizona's
  HB 2281 and the latest social studies curriculum standards adopted in Texas. These educators believe that ethnic studies programs, like programs in women's studies or queer studies, have come into existence
  in the United States in order to rectify widespread imbalances in portraits of American life. They are aware of the charges that ethnic studies programs are anti-American or racially divisive, but they
  condemn such programs as politically biased while implying the political neutrality of more traditionally mainstream curriculum. These educators are concerned about the economic inequality that mars contemporary
  life and the cumulative effects of American failures to treat and value each other as individuals and not based on ethnic background. They are interested in the full picture of our cultures and histories,
  recognizing the injustices of the past and present as well as the promises of our national traditions.
