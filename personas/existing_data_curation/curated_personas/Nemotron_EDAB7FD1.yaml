personas:
  professional: Sun Zhang, an 18-year-old business administration student specializing in operations management, merges strong Excel data-analysis skills with a methodical, competitive mindset to coordinate
    group projects, optimize process flow charts, and deliver meticulously timed presentations, all while leveraging bilingual fluency to navigate cross-cultural supplier communications, and they consistently
    enforce a disciplined timeline in every task.
  sports: Sun Zhang, an active member of the campus running club and local yoga studio, logs three trail jogs per week, attends bi-weekly Vinyasa classes, cheers for the city's baseball team the Mariners,
    follows the NBA's Golden State Warriors, and they balance a competitive drive with a laid-back approach to fitness.
  arts: Sun Zhang, a budding pianist who enjoys interpreting pieces that weave Western harmonies with traditional pentatonic motifs, frequently practices Liszt's Hungarian Rhapsody alongside contemporary
    compositions by Ludovico Einaudi, designs eye-catching project visuals using Canva, attends monthly art exhibits featuring artists such as Claude Monet and Banksy, and they let creativity temper their
    analytical nature.
  travel: Sun Zhang, a budget-conscious traveler who prefers meticulously planned itineraries, has backpacked through the historic lanes of Kyoto, explored the vibrant street food markets of Bangkok, dreams
    of hiking the Grand Canyon, eagerly awaits a spring study-abroad semester in Barcelona, and they balance adventure with academic responsibilities.
  culinary: Sun Zhang, a confident home cook who masters classic dumpling dough, experiments by adding smoked paprika to mapo tofu, regularly plate-presents a fusion ramen topped with parmesan and scallions,
    relishes the contrast of bold peppercorn heat and Italian tomato umami, occasionally orders takeout pizza to satisfy a late-night gaming craving, and they view cooking as both a cultural connection
    and a creative playground.
  core: Sun Zhang, an 18-year-old analytical strategist who blends disciplined budgeting, methodical study habits, and a quiet competitive spark while juggling piano practice, jogs, and a penchant for late-night
    gaming marathons, and they constantly seek efficient pathways to personal growth.
background:
  cultural: Sun is a second-generation Chinese-American raised in Lindenhurst, NY. Her parents emigrated from mainland China and instilled traditional values such as respect for elders, emphasis on education,
    and a strong work ethic. At home, Mandarin is spoken alongside English, and family traditions like celebrating Lunar New Year, making dumplings, and attending cultural festivals are integral to her
    life. Sun also engages with the broader Asian-American community through school clubs and local cultural organizations, blending her heritage with the suburban American environment.
attributes:
  skills: '[''Data analysis (Excel)'', ''Basic Python scripting'', ''Bilingual (Mandarin & English)'', ''Project coordination'', ''Financial accounting fundamentals'', ''Time management & organization'',
    ''Research and report writing'', ''Personal budgeting'', ''Graphic design (Canva)'']'
  hobbies: '[''Sudoku and crosswords'', ''Strategy video games (e.g., StarCraft, League of Legends)'', ''Piano playing'', ''Cooking Chinese and fusion dishes'', ''Jogging on local trails'', ''Yoga'', ''Reading
    non-fiction (business & self-improvement)'', ''Volunteer at community cultural events'', ''Language exchange meetups'']'
  career_goals: Sun aims to complete a Bachelor's degree in Business Administration with a concentration in Operations Management or Supply Chain Analytics. She plans to secure a summer internship at a
    logistics or financial services firm to gain real-world experience, then pursue professional certifications such as the Certified Supply Chain Professional (CSCP) or CPA. Her long-term ambition is to
    become a senior analyst or operations manager in a multinational corporation, leveraging her bilingual skills to facilitate cross-border projects, and eventually launch her own e-commerce venture that
    imports niche Chinese products to the U.S. market.
