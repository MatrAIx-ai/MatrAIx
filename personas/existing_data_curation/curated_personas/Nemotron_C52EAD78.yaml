  career_goals: Linda aims to transition from day‑to‑day contracting to a boutique consultancy that specializes in high‑end residential remodels and historic preservation projects. She plans to obtain a
    Florida contractor’s license, mentor a small group of apprentices, and expand her service offering to include interior design consulting rooted in sustainable materials. As she approaches retirement,
    she seeks to build a legacy of quality workmanship and reliable client relationships while ensuring a steady income stream and financial security for her family.
