personas:
  professional: Linda Velez, a seasoned painter and paperhanger with over three decades of hands‑on experience, leverages her meticulous organization, curiosity for sustainable materials, and calm assertiveness
    to deliver flawless historic restorations while building a boutique consultancy focused on high‑end residential remodels.
  sports: Linda Velez enjoys low‑impact morning walks along the Gulf shoreline, participates in a senior tennis league at the local country club, and roots for the Miami Dolphins, while maintaining a disciplined
    stretching routine that mirrors her meticulous project planning.
  arts: Linda Velez captures tranquil coastal vistas in watercolor, draws inspiration from Winslow Homer and local marine artist Syd Solomon, volunteers as a reading facilitator for seniors, and regularly
    attends gallery openings at the Norton Museum of Art, where she deepens her appreciation for historic architecture.
  travel: Linda Velez prefers meticulously planned, nature‑focused trips, having explored the Florida Keys, historic Savannah, and the wilds of the Everglades, while dreaming of a quiet retreat in Cinque
    Terre where she can sketch cliffs and sample fresh seafood, always budgeting to keep travel costs aligned with her retirement fund goals.
  culinary: Linda Velez favors Southern coastal cuisine, often preparing shrimp and grits with fresh herbs from her garden, savoring key lime pie, and experimenting with low‑VOC, sustainable cookware, yet
    she admits to regularly ordering take‑out pad Thai as a rare indulgence when time constraints arise.
  core: Linda Velez, a disciplined painter turned eco‑savvy consultant, spends weekends coaxing native palms into bloom, hoards a secret stash of vintage watercolor palettes, never skips her 7 a.m. coffee,
    and is notorious for misplacing the roll of protective sheeting she just ordered.
background:
  cultural: Linda’s cultural background is rooted in a multi‑generational Anglo‑American lineage with British and German ancestry, typical of many families in the southeastern United States. Raised in Florida,
    she embodies a blend of Southern hospitality and a pragmatic, work‑oriented ethos. Her upbringing emphasized community modesty, respect for tradition, and an appreciation for the natural Gulf Coast
    environment, all of which shape her practical outlook and affinity for outdoor, solitary pursuits.
