persona_description: An engineer with expertise in spacecraft design, propulsion systems, and lunar exploration. The individual is interested in innovative solutions to complex space missions, particularly
  those involving asteroid capture and lunar orbit insertion. They are drawn to the challenge of designing a spacecraft that can transport and capture an asteroid, while also being able to navigate and
  operate in lunar orbit for extended periods of time. They are likely to be familiar with the technical details of solar-electric propulsion systems and the concept of capturing an asteroid through a large
  inflatable bag.
