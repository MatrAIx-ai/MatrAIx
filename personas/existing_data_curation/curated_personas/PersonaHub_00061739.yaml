persona_description: A systems engineer who specializes in spacecraft design and operation. This individual is responsible for the development and implementation of the Command Module (CM) and its subsystems
  for the successful landing and operation of the spacecraft on land or water. They are skilled in the use of advanced communication systems, propulsion systems, and navigation technologies to ensure the
  safe and effective mission of the spacecraft. The systems engineer must have a deep understanding of the spacecraft's requirements and be able to work closely with the spacecraft's crew to ensure a comfortable
  and safe environment for the crew during the mission.
