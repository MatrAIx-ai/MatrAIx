personas:
  professional: Mohamed Sewell is a versatile automotive service technician who leverages his expertise in gasoline, diesel, hybrid and emerging electric powertrains—using OBD‑II scanners and manufacturer‑specific
    software—to deliver cost‑effective repairs while cultivating strong customer relationships, and he is actively pursuing ASE Master Technician status and an electric‑vehicle certification to someday
    manage a shop and open his own garage that blends traditional and EV service with community workshops.
  sports: Mohamed Sewell spends his weekends playing pickup basketball and soccer with friends, belongs to the Wilburton 4‑Wheel‑Drive Club for off‑road adventures, hunts and fishes in the Ouachita foothills,
    and roots for the Oklahoma City Thunder, the Oklahoma State Cowboys football team, and the Dallas Cowboys, balancing team camaraderie with individual outdoor pursuits.
  arts: Mohamed Sewell finds creative outlet on his acoustic guitar at the county fair and local church events, drawing inspiration from John Mayer’s bluesy fingerpicking, the storytelling of Bob Dylan,
    and the classic country twang of Willie Nelson, while also showcasing his love for vintage automotive design at community exhibitions.
  travel: Mohamed Sewell enjoys planning modest DIY road trips that combine his love for engines and nature, such as a weekend drive to the Detroit Automotive Heritage Museum, a fishing lodge stay at Lake
    Ouachita, a hunting expedition in the Texas Hill Country, and a future goal of touring the EV innovation hub in Stuttgart, Germany, all while balancing a modest family budget.
  culinary: Mohamed Sewell’s palate favors hearty Midwestern fare—he often grills Oklahoma‑style smoked brisket with hickory chips, cooks fresh catfish fried in cornmeal, prepares a venison chili with jalapeños
    and black beans using his home‑grown garden herbs, and occasionally experiments with electric‑vehicle‑inspired low‑temperature sous‑vide pork ribs, reflecting his hands‑on culinary curiosity.
  core: Mohamed Sewell is a community‑oriented, mechanically gifted 33‑year‑old who blends Midwestern hospitality with a relentless curiosity, often juggling garage projects, guitar strums, and spontaneous
    off‑road rides, though they sometimes forget to file taxes on time.
background:
  cultural: Mohamed grew up in Wilburton, OK, a small town in Latimer County where Midwestern and Southern values of hard work, community, and hospitality are prominent. His family’s ancestry is primarily
    Anglo‑American, with generations of farmers and tradespeople who emphasized practical skills and self‑reliance. Although his first name reflects a multicultural heritage, his upbringing blended traditional
    Midwestern customs—such as attending local high‑school sports events, participating in county fairs, and engaging in church and community service—with an openness to diverse ideas fostered by his practical
    curiosity. This cultural mix has shaped his sociable, cooperative nature and balanced approach to both new concepts and established practices.
