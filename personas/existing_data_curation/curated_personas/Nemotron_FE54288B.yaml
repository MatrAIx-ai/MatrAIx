  hobbies: '[''Pickup Basketball'', ''Soccer'', ''4-Wheel Drive Club'', ''Hunting'', ''Fishing'', ''Classic Car Restoration'', ''Acoustic Guitar Playing'', ''Volunteer at County Fair Tech Showcase'', ''DIY
    Home Improvement'', ''Drone Tinkering'']'
  career_goals: Mohamed aims to become an ASE Master Technician within the next three years and to gain certification in electric‑vehicle systems. He aspires to move into a service manager role at his current
    shop, where he can lead a team, improve workflow efficiency, and mentor apprentices. Long‑term, he envisions opening his own independent garage that specializes in both traditional and electric vehicle
    repairs, offering community workshops to teach basic vehicle maintenance. He also plans to pursue a bachelor’s degree in automotive technology or business management to support his entrepreneurial goals.
