  hobbies: '[''Gardening'', ''Reading science and literature'', ''Arduino tinkering'', ''Home automation projects'', ''Yoga'', ''Hiking'', ''Book club'', ''Cooking and recipe experimentation'']'
  career_goals: 'Her ambition is to leverage her expertise to foster pathways for young women and underrepresented groups into STEM fields. She aims to volunteer as a mentor in local robotics clubs, serve
    on the board of the Rockdale County STEM Outreach nonprofit, and possibly launch a community‑based hobbyist electronics workshop. She also plans to complete a personal project: developing an open‑source
    mobile app that assists seniors in tracking medication and health data. Long‑term, she hopes to author a guidebook that melds scientific methodology with everyday problem solving, sharing her pragmatic
    curiosity with a broader audience.'
