personas:
  professional: Kun Le is a technically proficient electrician who blends meticulous safety standards with a curiosity for smart‑home and solar tech, leading apprentice teams on residential projects while
    flexibly adapting on‑site challenges to meet code and client needs.
  sports: Kun Le rides mountain‑bike trails with the West Michigan Cyclists club in the summer, follows the Detroit Pistons and Michigan Wolverines, and practices Brazilian jiu‑jitsu on weekends as a nod
    to cultural martial‑arts roots.
  arts: Kun Le plays electric guitar in the local band ‘Circuit Riders’, draws inspiration from Jimi Hendrix and Daft Punk, and regularly performs at The HARK open‑mic, while also curating a modest vinyl
    collection that includes classic rock and synth‑wave.
  travel: Kun Le prefers weekend road trips, having explored the Upper Peninsula’s Pictured Rocks, a music‑laden visit to Nashville, and a dream to wander Kyoto’s lantern‑lit streets, always balancing travel
    costs with a modest savings plan.
  culinary: Kun Le loves fusing family dumpling recipes with Midwestern corn‑bread, whipping up maple‑glazed pork belly tacos and miso‑infused cheddar scones, skillfully handling a well‑equipped kitchen
    but occasionally burns the edges of experimental stir‑fries.
  core: Kun Le blends meticulous craftsmanship, a spark of tech curiosity, and a disciplined yet flexible mindset, balancing community traditions, DIY tinkering, and a budding entrepreneurial drive with
    a penchant for late‑night gaming and occasional over‑caffeination.
background:
  cultural: Kun grew up in a bilingual household; his parents immigrated from an East Asian country (Chinese heritage) and maintained cultural traditions such as celebrating Lunar New Year, honoring ancestors,
    and speaking Mandarin at home. This upbringing instilled a strong work ethic, respect for education, and communal values. Living in Rochester, MI, he integrates these traditions with American suburban
    life, participating in local festivals and community events while also embracing the region's seasonal outdoor culture. His cultural identity informs his culinary interests, holiday observances, and
    the collaborative spirit he brings to both his professional and volunteer activities.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''NEC code interpretation'', ''Troubleshooting and fault diagnosis'', ''Smart home automation installation'', ''Solar panel system
    basics'', ''Blueprint and schematic reading'', ''Electrical safety protocols'', ''Team leadership and apprentice training'']'
  hobbies: '[''DIY electronics and Arduino projects'', ''Building custom gaming computers'', ''Playing electric guitar'', ''Mountain biking'', ''Martial‑arts training'', ''Cooking fusion Asian‑Midwestern
    dishes'', ''Volunteering to teach basic electricity to youth'']'
  career_goals: Kun aims to achieve Master Electrician licensure within the next three years and to acquire specialized certifications in solar energy and building automation. He envisions launching his
    own contracting firm focused on energy‑efficient retrofits and smart‑home integrations, positioning himself at the intersection of traditional electrical work and sustainable technology. Long‑term,
    he hopes to mentor future electricians through apprenticeship programs and possibly contribute to industry standards committees, blending his practical expertise with a drive for continual learning.
