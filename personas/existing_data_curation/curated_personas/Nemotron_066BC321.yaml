personas:
  professional: Adrienne Flagg, an aspiring digital illustrator and teenage game prototyper, leverages their curiosity and competitive streak to experiment with Scratch and beginner Python projects, often
    discarding strict schedules for spontaneous creative bursts.
  sports: Adrienne Flagg skips varsity sport tryouts, preferring quiet weekend hikes through Massasoit State Forest for low‑key cardio while cheerfully rooting for the Boston Celtics in basketball and the
    New England Revolution in soccer, yet they rarely join organized sports teams.
  arts: Adrienne Flagg spends afternoons sketching original characters inspired by the surreal worlds of H.R. Giger and Hayao Miyazaki’s Studio Ghibli, while devouring graphic novels such as Brian K. Vaughan’s
    Saga and listening to the ambient cello of Ólafur Arnalds to fuel their artistic imagination.
  travel: Adrienne Flagg favors low‑key, self‑guided trips—spending summer weekends wandering the Boston Museum of Fine Arts and hiking Massasoit State Forest—while dreaming of a future solo adventure to
    the neon‑lit districts of Tokyo and the historic temples of Kyoto.
  culinary: Adrienne Flagg, a modestly skilled home cook, often whips up pepperoni pizza and miso ramen bowls, favoring bold umami from miso paste and kombu, while savoring artisanal chocolate chip cookies
    after marathon sketching sessions.
  core: Adrienne Flagg is a curious, art‑obsessed teen who balances fierce competitiveness in chess with a relaxed, often disorganized approach to life, channeling stress into sketchbooks and dreams of
    digital storytelling.
background:
  cultural: Adrienne comes from a typical white, suburban New England family in East Bridgewater, Massachusetts. Her ancestry includes English and Irish roots common to the region, and she grew up immersed
    in the area's colonial history, civic traditions, and strong public-school system. The town's community events, such as the annual Fourth of July parade and local library programs, have nurtured her
    appreciation for art and independent learning. Proximity to Boston's vibrant museum and theater scene provides occasional exposure to professional art, while her family emphasizes self-reliance and
    academic curiosity. This cultural milieu blends a respect for historical heritage with encouragement to explore unconventional creative paths.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''creative writing'', ''basic Python programming'', ''critical analysis'', ''chess strategy'', ''self-directed research'']'
  hobbies: '[''sketching and drawing'', ''digital painting'', ''reading graphic novels and sci-fi books'', ''writing short stories'', ''playing chess'', ''coding simple games in Scratch/Python'', ''visiting
    art galleries and museums'', ''journaling'', ''nature walks in local parks'']'
  career_goals: She dreams of turning her love for art and storytelling into a career in animation or video-game design. By the time she graduates high school, Adrienne hopes to have built an impressive
    portfolio of illustrations, short comics, and small interactive projects that could earn her a place at a top art school such as RISD or the Massachusetts College of Art and Design. She is eager to
    create her own graphic-novel series and eventually work as a concept artist or narrative designer for an indie game studio, where she can blend her visual skills with her knack for critical storytelling.
    In the near term, she aims to win the school's annual art competition and secure a mentorship with a local illustrator.
