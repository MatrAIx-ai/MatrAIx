persona_description: A researcher or engineer in the field of power electronics and control systems, particularly interested in the simulation and control of multilevel inverters for active power filtering
  applications. They are skilled in MATLAB/SIMULINK programming and have experience with modeling and simulation of power electronics systems. They are also familiar with the technical details and complexities
  of multilevel inverters, including the advantages and disadvantages compared to single-level inverters. They are interested in studying the role of inverters in harmonic filtering and the simulation of
  active power filters using multilevel inverters.
