personas:
  professional: Rey Santiago is a seasoned facilities maintenance specialist with expertise in HVAC, electrical, plumbing, and carpentry, whose meticulous organization and artistic eye drive them to devise
    creative, aesthetically mindful repair solutions while pursuing a supervisory path toward facilities management in cultural venues.
  sports: Rey Santiago enjoys low-impact cardio through solitary park walks and weekend fishing trips, follows the local minor-league baseball team the Riverside Runners with avid enthusiasm, and participates
    in a community woodworking club’s recreational softball league each spring, balancing leisurely activity with a modest competitive streak.
  arts: Rey Santiago frequents downtown galleries, draws inspiration from the vibrant canvases of Frida Kahlo and the mixed-media collages of Joseph Cornell, paints small acrylic studies of urban street
    scenes, and attends salsa and bomba dance nights featuring the rhythms of Celia Cruz and Tito Puente, weaving visual and musical arts into their daily life.
  travel: Rey Santiago plans trips with the same spreadsheet precision they use for maintenance logs, favoring culturally rich destinations like New Orleans’ French Quarter, Santa Fe’s Pueblo architecture,
    and Savannah’s historic squares, while budgeting for occasional weekend getaways to nearby state parks for fishing and sketching sessions.
  culinary: Rey Santiago is an adept home cook who loves grilling fresh fish fillets with citrus-herb marinades, simmering hearty black-bean chili with cumin and smoked paprika, and crafting colorful vegetable
    paellas that showcase their penchant for bold flavors and seasonal ingredients.
  core: Rey Santiago blends meticulous craftsmanship with a restless curiosity, juggling high standards and occasional worry while finding solace in art, quiet walks, and a well-organized toolbox.
background:
  cultural: Rey's Puerto Rican heritage is a central part of his identity. Raised in a bilingual household, he grew up hearing stories of San Juan's colorful streets, and family gatherings were filled with
    traditional dishes like arroz con gandules and lechon. He maintains strong ties to the Puerto Rican community in Vineland, participating in annual Fiestas de la Cultura and supporting local mural projects
    that celebrate island folklore. This cultural pride influences his aesthetic sensibilities, prompting him to incorporate vibrant colors and island motifs into his repair and renovation work. His respect
    for community and family values also shapes his collaborative approach at work, even as he balances personal ambition with a desire to give back.
attributes:
