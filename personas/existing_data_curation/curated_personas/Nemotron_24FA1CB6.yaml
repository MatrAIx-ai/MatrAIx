  hobbies: '[''Visiting art galleries and museums'', ''Painting and mixed media art'', ''DIY electronics and woodworking'', ''Salsa and bomba dancing at cultural festivals'', ''Walking in nature parks'',
    ''Fishing'', ''Reading about sustainable building technologies'', ''Learning about Puerto Rican art history'']'
  career_goals: Rey aims to advance from a hands-on maintenance role to a supervisory position, eventually becoming a facilities manager for a cultural or community center where he can merge his technical
    expertise with his appreciation for the arts. He plans to earn a Certified Facility Manager (CFM) credential and to lead a team that implements sustainable, energy-efficient maintenance practices. In
    the longer term, he hopes to start his own small-scale handyman business that emphasizes meticulous workmanship and offers consulting on preserving the aesthetic integrity of historic Puerto Rican-influenced
    buildings.
