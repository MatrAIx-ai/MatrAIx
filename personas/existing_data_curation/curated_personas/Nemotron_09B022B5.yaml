personas:
  professional: Yanessi Martinez, a budding LEGO architect and junior storyteller, blends boundless curiosity with practical precision to design intricate brick structures while weaving vivid narratives
    in picture books, showcasing their creative problem‑solving, organizational flair, and comfort balancing new ideas with trusted methods.
  sports: Yanessi Martinez, a spirited participant in the neighborhood Red Rovers youth soccer team, dashes across the field in the spring season, looks up to the city’s professional club City United, and
    balances high‑energy play with mindful nature walks for recovery.
  arts: Yanessi Martinez, a budding visual storyteller, fills sketchbooks with vivid drawings inspired by graphic novelists like Raina Telgemeier and animators from Studio Ghibli, while grooving to the
    Latin rhythms of Shakira and Carlos Vives during family dance sessions.
  travel: Yanessi Martinez, who thrives on weekend adventures, explores nearby state parks like Green Valley Reserve and the sunny beach town of Coral Bay with family, while daydreaming about future trips
    to the vibrant rainforests of Costa Rica and the historic castles of Scotland, though travel plans are always shaped by parental schedules and a modest family budget.
  culinary: Yanessi Martinez, a young kitchen helper, enjoys whisking together bright fruit salads of mango, pineapple, and strawberries and assembling tiny pupusas stuffed with cheese and beans, mastering
    simple chopping and rolling techniques while gravitating toward sweet, colorful flavors over spicy foods.
  core: Yanessi Martinez blends boundless curiosity with a meticulous love for LEGO bricks, navigates daily waves of anxiety through mindful breathing, saves pennies for future builds while occasionally
    splurging on candy, and never can resist doodling in the margins of every book they read.
background:
  cultural: Yanessi comes from a Honduran family that values close‑knit relationships, respect for elders, and shared celebrations. At home, Spanish is spoken daily, and traditional foods such as baleadas,
    pupusas, and tamales are prepared on weekends and holidays. Her family celebrates Honduran festivals like Feria de San Juan and participates in community events in Houston's vibrant Latinx neighborhoods.
    The blend of Honduran customs and the multicultural atmosphere of Houston has exposed her to a wide range of cultures, languages, and ideas. This dual cultural heritage gives Yanessi a strong sense
    of identity, a love for music and dance, and an appreciation for both her roots and the diverse community she lives in.
