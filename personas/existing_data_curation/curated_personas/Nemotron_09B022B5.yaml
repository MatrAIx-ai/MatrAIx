  hobbies: '["reading picture books", "drawing and coloring", "building with LEGO", "playing soccer", "dancing to Latin music", "helping in the kitchen", "exploring parks and nature"]'
  career_goals: Yanessi often talks about wanting to help people and animals when she grows up. She dreams of becoming a teacher because she loves sharing what she learns with friends, and she also imagines
    herself as a veterinarian to care for pets and farm animals she sees in community gardens. She envisions a career that lets her combine her curiosity about the world with a practical way to make a difference,
    and she hopes to one day work in a role where she can support children who feel anxious or sad, just like she sometimes does.
