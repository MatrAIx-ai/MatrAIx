persona_description: A dental researcher and health economist who is interested in the cost-effectiveness and effectiveness of dental home visits (DHVs) in preventing dental caries in young children in
  Malaysia. This person is likely to have a background in public health, dentistry, economics, and healthcare research. They are familiar with the latest research on DHVs, oral health promotion, and economic
  evaluation. They are interested in identifying effective and cost-effective behavioral interventions to promote oral health and reduce oral health disparities in the population. They are also interested
  in the economic and social consequences of dental caries and the potential for DHVs to have a positive impact on oral health and overall health.
