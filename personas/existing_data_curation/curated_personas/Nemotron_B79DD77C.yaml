  hobbies: '[''Reading historical non-fiction'', ''Studying philosophy'', ''Playing chess'', ''Jogging along the river levee'', ''Fishing in bayous'', ''Cooking Creole cuisine'', ''Street photography'',
    ''Mentoring youth in after-school programs'', ''Attending intimate jazz performances'']'
  career_goals: Moses aims to advance into senior project leadership within the next five years. He plans to earn the Project Management Professional (PMP) certification and lead multi‑disciplinary, high‑visibility
    initiatives that drive digital transformation for his organization. Long‑term, he envisions overseeing a corporate Project Management Office, shaping strategic project portfolios, and mentoring the
    next generation of project managers, especially from underrepresented backgrounds. He also hopes to integrate community‑focused projects that leverage his local cultural knowledge.
