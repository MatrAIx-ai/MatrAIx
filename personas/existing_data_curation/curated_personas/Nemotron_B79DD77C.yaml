personas:
  professional: Moses Brown, a 31‑year‑old project manager in the technology sector, blends rigorous scheduling with adaptive flexibility, leveraging Waterfall and Agile frameworks, advanced Excel analytics,
    and stakeholder communication to steer high‑visibility digital transformation initiatives, while their competitive edge fuels a drive toward PMP certification and eventual leadership of a corporate
    PMO.
  sports: Moses Brown, a 31‑year‑old fitness enthusiast, logs solo runs on the Mississippi River levee with the Crescent City Runners, enjoys weekend fishing trips in Jefferson Parish bayous, and follows
    the New Orleans Pelicans and Saints, occasionally volunteering as a mentor for a local youth baseball league, combining competitive drive with solo endurance.
  arts: Moses Brown captures New Orleans' vibrancy through street photography, frequents intimate jazz sessions at Snug Harbor and Preservation Hall, curates a modest vinyl collection featuring Trombone
    Shorty, Wynton Marsalis, and Nina Simone, and finds solace in gospel hymns that echo the city's storytelling tradition.
  travel: Moses Brown favors purposeful road trips that blend quiet reflection with cultural immersion, having explored historic neighborhoods of Charleston, the jazz‑infused streets of Montreal, and the
    bayou trails of Lafayette, while dreaming of a pilgrimage to the Acadian heartlands of southern Louisiana, all planned around limited vacation days and family commitments.
  culinary: Moses Brown delights in preparing Creole classics like gumbo, jambalaya, and shrimp étouffée alongside collard greens, meticulously layering the Holy Trinity of onions, bell peppers, and celery,
    sourcing fresh catfish from local markets, yet sometimes over‑seasoning with cayenne, and reserves weekends for occasional fine‑dining at Coquette.
  core: Moses Brown, a curious yet pragmatic project leader, balances disciplined budgeting with occasional indulgences, channels competitive energy into solo runs and chess, and weaves New Orleans’ jazz,
    gospel, and culinary traditions into a quietly driven, resilient life.
background:
  cultural: Moses was born and raised in the Greater New Orleans area, deeply rooted in the African‑American community of Jefferson Parish. His upbringing blended the traditions of Southern Black culture—gospel
    music, church fellowship, soul food, and storytelling—with the vibrant Creole heritage of the city. Family gatherings often featured gumbo, jambalaya, and shared music ranging from jazz to blues. He
    grew up cherishing the city’s history of resilience and civil‑rights activism, which informs his commitment to community service and representation. While he respects the celebratory spirit of Mardi
    Gras, he prefers its more reflective, neighborhood‑focused expressions. His cultural identity shapes his communication style, values of perseverance, and his appreciation for collective storytelling.
