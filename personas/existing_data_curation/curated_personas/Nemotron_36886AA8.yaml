  hobbies: '[''Watercolor painting'', ''Sketching'', ''Gardening (herbs, chilies)'', ''Traditional Mexican cooking'', ''Listening to mariachi and ranchera music'', ''Reading poetry and philosophy'', ''Writing
    short stories and reflections'', ''Walking in Orange County parks and trails'', ''Attending small local art gatherings'']'
  career_goals: He hopes to curate a small exhibition of his artwork at a local community center or senior center, where he can share the cultural narratives embedded in his paintings. He aims to compile
    a collection of short stories and poems reflecting his Mexican heritage, his life in Orange County, and his philosophical musings, possibly self‑publishing a memoir. He wishes to volunteer as a mentor
    for younger members of the Mexican‑American community, teaching basic painting techniques and cooking simple dishes. Another personal ambition is to continue learning new artistic mediums—such as collage
    or digital illustration—while maintaining his flexibility and avoiding rigid schedules. Ultimately, his goal is to find personal fulfillment and emotional balance through creative expression, using
    his art as a way to manage worry and stress.
