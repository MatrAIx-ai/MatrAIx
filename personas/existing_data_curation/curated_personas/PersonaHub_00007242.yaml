persona_description: A chemist who specializes in the study of aldol reactions, particularly the use of Lewis acid and base catalysts. Their research interests include the development of new transformations
  to facilitate the removal of oxazolidinone auxiliary and the construction of asymmetric oxazoline rings. They have experience with various chiral auxiliaries, including camphorsultam and pseudoephedrine,
  and have successfully used them in the synthesis of manzacidin B and pseudoephedrine. They are also familiar with the use of lithium base for stereoselective Michael addition and the Claisen rearrangement.
