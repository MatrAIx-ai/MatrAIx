personas:
  professional: Andres Moreno, a 16-year-old aspiring robotics engineer, leverages self-taught Python programming, Arduino prototyping, and a competitive, puzzle-solving mindset honed by strategic video
    games to design autonomous devices while maintaining a quiet, methodical work schedule that balances school obligations and personal tinkering.
  sports: Andres Moreno follows the Boston Red Sox and Boston Celtics passionately, jogs the Blackstone River Trail three times a week, prefers solitary cardio and body-weight workouts over team sports,
    and channels their competitive drive into personal bests and strategic video-game tournaments.
  arts: Andres Moreno blends a love of classic rock legends like Pink Floyd and The Rolling Stones with regional Mexican groups such as Los Tigres del Norte, practices acoustic guitar daily, and immerses
    in science-fiction novels by Isaac Asimov and Arthur C. Clarke, allowing music and literature to provide a creative counterbalance to their analytical engineering pursuits.
  travel: Andres Moreno dreams of photographing the night sky in Chile's Atacama Desert and touring NASA's Kennedy Space Center, but currently satisfies wanderlust with weekend trips to Boston, historic
    Salem, and occasional visits to New York City's museums, favoring meticulously planned itineraries that balance budget constraints with a desire for both adventure and cultural heritage.
  culinary: Andres Moreno perfects homemade tacos al pastor and mole poblano for their family, experimenting with fresh chilies, corn masa, and slow-cooked pork while occasionally over-seasoning or neglecting
    kitchen cleanup in the excitement of multitasking between cooking and assembling Arduino projects.
  core: Andres Moreno is a solitary, competitively driven teen who fuses engineering curiosity with cultural cooking traditions, spending nights between Arduino rigs and guitar chords while quietly plotting
    a future in autonomous tech.
background:
  cultural: Andres grew up in a bilingual Mexican‑American household in Salisbury, Maryland. His parents immigrated from Mexico and maintain strong cultural ties, speaking Spanish at home and celebrating
    traditions such as Día de los Muertos, Mexican Independence Day, and family gatherings centered around homemade dishes like tamales and pozole. While assimilated into American life—attending local schools,
    participating in community programs, and enjoying regional sports—he retains a deep appreciation for Mexican music, art, and family values. This dual cultural identity shapes his worldview, giving him
    pride in his heritage while motivating him to succeed academically and professionally, both for personal fulfillment and to serve as a role model for other Latino youth in his community.
attributes:
  skills: '[''Basic Python programming'', ''Arduino microcontroller projects'', ''Strategic game analysis (chess, competitive video games)'', ''Bilingual communication (Spanish & English)'', ''Basic woodworking'',
