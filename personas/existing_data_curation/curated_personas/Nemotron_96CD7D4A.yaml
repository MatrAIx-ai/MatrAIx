  hobbies: '[''Playing strategic video games'', ''Reading science‑fiction and tech articles'', ''Building model kits (LEGO Technic, scale models)'', ''Tinkering with Arduino and electronics'', ''Stargazing
    and astronomy'', ''Playing acoustic guitar'', ''Cooking traditional Mexican recipes'', ''Listening to regional Mexican music'', ''Exploring nature trails in Worcester County'']'
  career_goals: Andres aims to turn his early tech skills into a professional career in engineering or software development. He plans to enroll in a community college technical program after completing
    high school, focusing on robotics and embedded systems. His long‑term ambition is to work on autonomous devices or aerospace‑related projects that combine his love of electronics, coding, and space.
    He hopes to earn certifications in computer‑aided design and advanced programming, eventually securing a role where he can work independently on innovative prototypes. By achieving financial stability,
    he wants to support his family and give back to the local Mexican‑American community through mentorship programs for youth interested in STEM.
