persona_description: A power engineer who is interested in understanding the dynamics of electronic circuits and how they dissipate power. They are particularly interested in the short circuit power, which
  is a small but significant component of the total dynamic power dissipated in the circuit. They are likely to be interested in the factors that affect the short circuit power, such as switching frequency,
  supply voltage, output slew, and input slew. They may also be interested in the specific formulas and equations used to calculate the short circuit power and how it relates to other aspects of circuit
  design and analysis.
