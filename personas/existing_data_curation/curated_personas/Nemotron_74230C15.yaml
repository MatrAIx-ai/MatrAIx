  hobbies: '[''Herb and Succulent Gardening'', ''Korean & Fusion Cooking'', ''Coastal Walking'', ''Gentle Yoga'', ''Reading Non‑Fiction (Productivity, Mindfulness, History)'', ''Volunteering (Senior Community
    Events)'', ''Small‑Group Book Club'', ''Korean Cultural Festivals'', ''Church Community Activities'']'
  career_goals: Myungsun aims to channel her disciplined, structure‑oriented mindset into a home‑based consulting practice that helps families streamline household systems and improve time management. She
    plans to complete a Bachelor’s degree in Business Administration within the next three years and acquire Certified Professional Organizer (CPO) credentials. Additionally, she aspires to take on a leadership
    role in her local neighborhood association, leveraging her cooperative yet assertive style to enhance community resources while preserving a balanced family life.
