personas:
  professional: Myungsun Park, a disciplined home‑based consulting practitioner in the making, leverages their strong administrative expertise, project‑planning acumen, and fluency in a heritage language
    and English to design streamlined household systems for families while pursuing a Business Administration degree and Certified Professional Organizer credentials.
  sports: Myungsun Park, a regular participant in early‑morning walks along the Santa Monica bluffs and a seasonal member of a local recreational pickleball league, cheerfully follows the Los Angeles Dodgers,
    the LA Galaxy, and the Los Angeles Lakers while maintaining a low‑impact fitness routine.
  arts: Myungsun Park immerses themselves in the arts by attending cultural festivals celebrating heritage music and dance, exploring contemporary artists like Yayoi Kusama, listening to singer‑songwriter
    Sufjan Stevens, and enjoying performances at the local church choir.
  travel: Myungsun Park prefers thoughtfully planned road trips to coastal gems such as Big Sur and Catalina Island, balances a love for scenic drives with a modest budget, and dreams of exploring historic
    East Asian temples and gardens on a future sabbatical abroad.
  culinary: Myungsun Park delights in crafting heritage‑fusion dishes like bulgogi tacos with cilantro‑lime slaw, kimchi‑infused quinoa bowls, rosemary‑garlic sautéed succulents, and perfectly balanced
    bibimbap using fresh herbs from their garden while experimenting with gochujang‑glazed salmon for modern twists.
  core: Myungsun Park blends disciplined organization, quiet resilience, and a love for herb‑rich, cross‑cultural cooking into a life of structured creativity and community support.
background:
  cultural: Myungsun is a first‑generation Korean American who grew up in a close‑knit immigrant family that emphasized education, respect, and collective well‑being. Bilingual in Korean and English, she
    regularly celebrates Korean holidays such as Seollal and Chuseok, and participates in local Korean church and cultural events. Living in Santa Monica, she blends traditional Korean values—such as filial
    responsibility and community service—with the diverse, active lifestyle of coastal California, creating a hybrid identity that informs her disciplined yet compassionate outlook.
attributes:
  skills: '[''Project Planning'', ''Budget Management'', ''Scheduling & Calendar Coordination'', ''Home Organization'', ''Microsoft Office Suite'', ''Google Workspace'', ''Korean Language Proficiency'',
