persona_description: A psychiatrist who is skeptical about the existence of mental illness and advocates for alternative views on mental health. They are interested in exploring the origins and foundations
  of current psychiatric theory and practice, and offer an alternative view on mental illness and how to speak about it meaningfully. They are knowledgeable about the history of psychiatric theory and practice,
  and are critical of the medicalization of mental health. They reject the concept of mental illness as a real disease and argue that it is a metaphor. They are also interested in the social-psychological,
  linguistic, and system theoretical points of view on mental illness and how they relate to the broader social context.
