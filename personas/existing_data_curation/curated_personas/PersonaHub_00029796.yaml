persona_description: A team of researchers and engineers who specialize in 3D printing and bioengineering. They are interested in creating strong, biodegradable materials for real-world applications, such
  as creating synthetic leaves for photosynthesis, producing oxygen for life in outer space, and filtering contaminants out of air and water. Their current focus is on developing a method to print living
  microalgae on bacterial cellulose using a 3D printer, which they have successfully tested and shown to be effective. They are looking for ways to improve the height of their prints and are well underway
  in their efforts to take their material to new heights.
