personas:
  professional: Iliana is an aspiring junior illustrator whose boundless curiosity fuels daily sketchbook raids, while they adopt a laid‑back attitude that lets them abandon rigid plans in favor of spontaneous
    bursts of color and creativity.
  sports: Iliana loves to sprint through neighborhood parks on their bike, plays forward for the community youth soccer team that competes in the spring league, and cheers loudly for the local baseball
    club, the City Raptors, while they prefer unstructured play over regimented workouts.
  arts: Iliana immerses themselves in graphic novels like Amulet and Bone, emulates the bold strokes of illustrator Kazu Kibuishi, spends weekends crafting intricate papel picado for family celebrations,
    and hums pop tunes from artists such as Billie Eilish and Shawn Mendes while they build LEGO sculptures.
  travel: Iliana dreams of exploring the towering red rocks of Sedona and the glittering lights of Orlando's theme parks, yet their most cherished trips are weekend hikes in the nearby state forest and
    family road‑trips to the seaside town of Santa Cruz, where they collect shells, sketch dunes, and practice bilingual songs on the car ride.
  culinary: Iliana delights in slurping warm noodle soup with soft tofu, drizzling honey over fresh fruit, and assembling DIY mini‑tacos, though their cooking skills hover at the level of mixing ingredients
    in a bowl and sprinkling cheese, as they prefer hands‑on mess over precise recipes.
  core: Iliana is a curious, art‑obsessed nine‑year‑old who turns everyday moments into colorful experiments, juggling a love for LEGO and nature while delighting in spontaneous creativity and a pocketful
    of coins for instant fun.
background:
  cultural: Iliana is a Mexican‑American child raised in West Jordan, Utah. Her household blends English and Spanish, and she participates in Mexican traditions such as Día de los Muertos altars, family
    gatherings with tacos and mole, and listening to mariachi music. The multicultural atmosphere of Salt Lake County, combined with her family's emphasis on respect for elders and community, shapes her
    appreciation for both her heritage and the broader cultural landscape around her.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Sketching and drawing'', ''Basic color theory'', ''Spanish conversational basics'', ''Scratch coding basics'']'
  hobbies: '[''Drawing and sketching'', ''Painting'', ''Reading fantasy graphic novels'', ''Exploring local parks and nature trails'', ''Building LEGO sets'', ''Making papel picado for celebrations'', ''Learning
    songs in English and Spanish'']'
  career_goals: Iliana dreams of a future where she can combine art and caring for living things. She imagines becoming an illustrator who brings stories to life, a wildlife rehabilitator who helps injured
    animals, or even an astronaut who explores new worlds—any path that lets her create, learn, and make a positive impact.
