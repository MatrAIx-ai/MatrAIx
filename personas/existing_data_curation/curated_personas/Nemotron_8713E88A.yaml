  career_goals: Julian dreams of becoming an artist who creates comic books and animated shorts that capture the magic of his imagination and celebrate the people and places in his community. He also hopes
    to blend art with technology, envisioning a future where he designs interactive experiences or video games. Over time, he sees himself studying visual arts or multimedia design, and perhaps returning
    to Saint Francisville to run workshops that inspire other kids to explore creativity and curiosity.
