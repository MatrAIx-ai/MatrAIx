personas:
  professional: Ebony Russell is a telecommunications field engineer with deep expertise in installing, configuring, and troubleshooting cellular base stations, fiber-optic networks, and microwave links,
    and they leverage a systematic, detail-oriented mindset and a harmony-focused collaborative style to ensure compliance with FCC regulations while pursuing BICSI RCDD certification and mentoring aspiring
    engineers.
  sports: 'Ebony Russell enjoys low-key fitness activities: they hike the nearby Ridgewood Park and Eastside Trail with a close friend on weekends, belong to a local amateur hiking club, follow the Atlanta
    Falcons and Atlanta Hawks, attending occasional games when the schedule permits, and they prefer solo runs over team sports, keeping a modest collection of trail-running shoes for weekend treks.'
  arts: Ebony Russell's artistic life revolves around classic R&B, soul, and jazz; they spin vinyl records by Marvin Gaye, Etta James, Anita Baker, and Miles Davis while cooking, attend church choir rehearsals,
    discuss science-fiction novels by Octavia Butler and Nnedi Okorafor at a monthly book club, and they occasionally catch live jazz performances at the downtown Blue Note.
  travel: 'Ebony Russell balances adventure with thrift: they plan trips using detailed itineraries, have trekked through the Great Smoky Mountains, spent a weekend in Asheville exploring its craft breweries,
    attended a tech conference in Austin, and dream of visiting Kyoto''s cherry blossom season, all while leveraging airline points and keeping travel budgets in check to accommodate modest savings goals.'
  culinary: Ebony Russell's kitchen is a sanctuary where they perfect Southern comfort dishes like collard greens simmered with smoked ham hocks, buttery corn-bread with jalapeno kernels, and black-eyed
    peas, often preparing a pitcher of sweet tea sweetened with raw cane sugar, and they experiment with spice blends while listening to classic soul playlists, though they sometimes over-salt the greens
    when rushed.
  core: Ebony Russell blends technical precision with soulful creativity, habitually turning stress into meticulous schematics while curating vintage jazz and Southern comfort cooking as a soothing counterbalance.
background:
  cultural: Ebony identifies as African American and grew up in Charlotte, North Carolina, surrounded by a tight‑knit Black community. Family traditions include Sunday church services, storytelling, and
    communal meals featuring collard greens, fried chicken, and cornbread. The legacy of civil‑rights activism in the South shaped her sense of responsibility to uplift her community. She participates in
    local cultural events such as Juneteenth celebrations, mentors young Black women interested in technical careers, and draws inspiration from the resilience, music, and culinary heritage of her culture.
attributes:
  skills: '[''Radio tower installation'', ''Fiber‑optic cabling'', ''Microwave link configuration'', ''Signal testing and spectrum analysis'', ''FCC compliance and safety standards'', ''Troubleshooting
    and diagnostic procedures'', ''Technical documentation'', ''Customer communication'', ''Team collaboration'', ''BICSI certification (RCDD)'']'
  hobbies: '[''DIY electronics projects'', ''Listening to R&B and jazz music'', ''Reading science-fiction novels'', ''Hiking in local parks'', ''Cooking Southern cuisine'', ''Volunteering at youth STEM
    programs'', ''Attending small community gatherings'']'
  career_goals: Ebony aims to become a lead field engineer who oversees large‑scale telecom deployments, especially emerging 5G and IoT infrastructure. She plans to complete her BICSI RCDD certification
    and obtain additional FCC licensing to qualify for senior supervisory roles. Long‑term, she hopes to mentor other Black women entering the telecommunications field, contribute to community STEM outreach,
    and eventually launch her own consulting firm that specializes in sustainable and inclusive network installations.
