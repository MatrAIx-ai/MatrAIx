  career_goals: Matt aspires to solidify his reputation as a thought‑provoking contemporary visual artist. Over the next five years, he aims to secure a solo exhibition at a reputable Los Angeles gallery,
    expand his body of work into immersive installations that explore solitude and inner turbulence, and publish a monograph that contextualizes his practice within modern art discourse. He also seeks to
    develop a sustainable income stream through limited edition prints, strategic licensing, and selective commissions, reducing the stress of financial uncertainty that frequently fuels his worry. Ultimately,
    Matt wishes to transition into a mentorship role, offering one‑on‑one guidance to emerging artists while maintaining his independent studio practice.
