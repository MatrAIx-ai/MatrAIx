personas:
  professional: A disciplined contemporary visual artist, Matt Wells harnesses oil, acrylic, and mixed‑media techniques alongside Adobe Photoshop and Illustrator to produce conceptually rigorous works that
    explore solitude, while a methodical studio schedule and competitive drive push them to secure solo gallery shows, and they often stay late into the night refining details, despite frequent bouts of
    worry.
  sports: An early‑morning hiker and occasional runner, Matt Wells frequently explores the less‑traveled trails of Griffith Park for solitary sketch‑filled treks, holds season tickets for the Los Angeles
    Dodgers and follows the Lakers avidly, and belongs to a small downtown hiking collective that meets monthly, though they prefer the quiet of solo workouts over team sports.
  arts: A devoted connoisseur of contemporary visual culture, Matt Wells draws inspiration from the vibrant street murals of Shepard Fairey and the political edge of Banksy, reveres the cinematic storytelling
    of David Lynch and Wong Kar‑Wai, curates intimate pop‑up shows at venues like LACMA and The Broad, and they regularly experiment with vintage analog cameras to capture Los Angeles’s layered urban textures.
  travel: A meticulous solo traveler, Matt Wells carefully plans low‑key retreats to places like Joshua Tree, Kyoto’s Arashiyama bamboo grove, and the rain‑washed streets of Paris, favoring off‑season dates
    to avoid crowds and keep expenses low, while their penchant for sketching on the go and occasional anxiety about unfamiliar locales sometimes leads them to over‑pack their journal and camera gear.
  culinary: A health‑oriented home cook, Matt Wells prepares minimalist dishes such as quinoa bowls with roasted salmon seasoned with rosemary from their rooftop garden, avocado toast topped with heirloom
    tomatoes and microgreens, and herbal teas brewed from basil and mint, while they occasionally splurge on single‑origin espresso to fuel late‑night painting sessions.
  core: Matt Wells is a solitary, introspective visual artist whose disciplined studio routine and competitive drive coexist with a perpetual undercurrent of anxiety, prompting them to seek meaning through
    philosophy, meditation, and meticulously curated solo exhibitions.
background:
  cultural: Matt was born and raised in the Los Angeles suburb of Glendale, growing up in a middle‑class white Anglo‑American family. His cultural identity blends the individualistic values of the broader
    American West Coast with a deep appreciation for the city's diverse artistic communities. Throughout his life, he's been influenced by the vibrant street art scene, the legacy of Hollywood's visual
    storytelling, and the intellectual currents of the local university art departments. While his heritage aligns with mainstream Western traditions, his exposure to LA's multicultural environment has
    broadened his perspective, prompting him to incorporate subtle references to global art histories and contemporary societal themes into his work.
