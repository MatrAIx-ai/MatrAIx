  hobbies: '["Gardening","Cooking traditional Honduran cuisine","Reading historical biographies and contemporary non‑fiction","Hiking on local trails","Yoga and mindfulness meditation","Volunteering at
    a Hispanic cultural center (Spanish literacy tutoring)"]'
  career_goals: Bertha aims to become the lead coordinator for the district’s special education program, where she can shape inclusive policies and mentor emerging teachers. She plans to earn a Master’s
    degree in Special Education to deepen her expertise in universal design for learning. Additionally, she envisions establishing a community outreach initiative that provides workshops for Spanish‑speaking
    families on navigating the U.S. education system, and she hopes to advocate for increased resources and culturally relevant training within the school district.
