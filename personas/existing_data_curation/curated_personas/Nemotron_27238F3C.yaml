personas:
  professional: Bertha Pimienta, a veteran special education teacher with over twenty years of hands‑on experience, blends meticulous IEP design, bilingual communication, and culturally responsive pedagogy
    to champion inclusive learning environments, while quietly pushing toward a district‑wide leadership role through organized planning and assertive advocacy.
  sports: Bertha Pimienta, an active member of the Chapel Hill Hiking Club and volunteer with the adult community soccer league, spends Saturday mornings tackling the Occoneechee Mountain trails, cheers
    on the UNC Tar Heels basketball team and follows the Durham Bulls baseball season, while integrating gentle yoga into her weekly fitness routine.
  arts: Bertha Pimienta, an avid patron of the Lyric Theatre and the Carolina Symphonic Orchestra, enjoys the lyrical storytelling of Gabriel García Márquez adaptations, finds solace in the paintings of
    Frida Kahlo and the folk music of Los Folkloricos, and frequently organizes cultural art workshops at the Hispanic community center.
  travel: Bertha Pimienta, a careful planner who prefers culturally immersive trips, has explored Oaxaca’s Day of the Dead festivities, trekked the historic streets of Granada, Spain, and enjoys weekend
    getaways to the Blue Ridge Mountains, always booking early to secure mid‑range accommodations that fit her modest travel budget.
  culinary: Bertha Pimienta, a proficient home chef, specializes in making pupusas stuffed with queso fresco and loroco, and baleadas layered with refried beans, avocado, and queso duro, often pairing them
    with homemade salsa verde, while occasionally experimenting with seasonal produce from her garden like heirloom tomatoes and fresh herbs.
  core: Bertha Pimienta, a meticulous educator and garden‑loving community advocate, balances a diligent work ethic and worry‑driven attention to detail with a love for cooking, hiking, and a quiet penchant
    for budgeting every cent.
background:
  cultural: Bertha was born to Honduran parents who immigrated to the United States in the 1970s. She grew up in a bilingual household where Spanish was spoken daily, and she maintains strong ties to Honduran
    cultural traditions such as celebrating Semana Santa and the Day of the Dead with her extended family. Her upbringing emphasized familismo, community support, and resilience, values she weaves into
    her teaching practice by fostering a collaborative classroom environment and honoring the cultural identities of her students. Living in Chapel Hill, she blends her Honduran heritage with the local
    Southern culture, participating in both community festivals and church activities, while also advocating for the needs of Hispanic families within the public school system.
attributes:
  skills: '["Individualized Education Program (IEP) development","Behavioral Intervention Planning","Bilingual instruction (Spanish‑English)","Assistive technology integration","Data‑driven assessment","Classroom
