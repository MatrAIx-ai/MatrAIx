personas:
  professional: Katrina Jones is a seasoned preschool and kindergarten teacher who blends a solid grounding in child‑development theory with hands‑on classroom management, designing play‑based lesson plans
    that meet curriculum standards while integrating early literacy, numeracy, music, and storytelling, and she leverages her meticulous assessment practices and collaborative parent communication to champion
    inclusive education and prepare for a future role as curriculum specialist.
  sports: Katrina Jones enjoys moderate fitness through weekend hikes on the Piedmont trails with the Chester County Hiking Association, follows the Philadelphia Eagles in football and the Phillies in baseball,
    joins a local adult softball league each summer, and she adds morning stretches and occasional yoga classes to stay flexible.
  arts: Katrina Jones weaves her love of storytelling into her quilting, drawing inspiration from the Gee's Bend quilters, sings in her church choir while listening to folk legends like Pete Seeger and
    contemporary artist Brandi Carlile, devours historical novels by Hilary Mantel and Ken Follett, and finds calm admiring the Impressionist works of Claude Monet and the modernist paintings of Georgia
    O'Keeffe.
  travel: Katrina Jones prefers carefully planned road trips that blend nature photography with historic exploration, favoring destinations like Shenandoah National Park for its fall colors, the colonial
    streets of Williamsburg, Virginia, and the coastal charm of Savannah, Georgia, while balancing family obligations and a modest travel budget that often limits her to weekend getaways within Pennsylvania.
  culinary: Katrina Jones delights in Southern comfort cooking, perfecting low‑country biscuits with buttermilk and flaky cornmeal cornbread, slow‑roasting peach cobbler with fresh garden peaches and a
    hint of cinnamon, and crafting hearty collard greens seasoned with smoked ham, often seasoning dishes with herbs from her heirloom garden such as thyme, rosemary, and basil.
  core: Katrina Jones is a pragmatic educator who nurtures community through gardening, knitting, and music, yet she sometimes overcommits to volunteer projects, leading to occasional burnout.
background:
  cultural: Katrina was raised in a middle‑class Southern family in the Carolinas, where community, hospitality, and faith play central roles. Her upbringing emphasized the value of education, church involvement,
    and preserving regional traditions such as Southern cooking and seasonal celebrations. She identifies with the broader cultural heritage of the American South—valuing hard work, neighborly support,
    and a love for the outdoors—while also appreciating the growing diversity and historical richness of Chester County. This blend of tradition and openness informs both her personal life and her approach
    to teaching.
attributes:
  skills: '["Child Development Knowledge", "Classroom Management", "Lesson Planning and Curriculum Design", "Early Literacy Instruction", "Foundational Numeracy Teaching", "Creative Arts Integration", "Storytelling
    and Music Facilitation", "Parent Communication and Engagement", "Behavioral Intervention Strategies", "First Aid and CPR Certified", "Technology Integration for Young Learners", "Assessment and Documentation",
    "Conflict Resolution and Mediation", "Community Outreach Coordination", "Professional Development Facilitation"]'
  hobbies: '["Gardening", "Reading historical novels", "Cooking and baking Southern cuisine", "Knitting and quilting", "Participating in church choir", "Volunteering for library storytime", "Hiking local
    trails", "Nature photography", "Attending craft fairs"]'
  career_goals: Katrina aims to build on her associate’s degree by completing a bachelor’s in Early Childhood Education, positioning herself for a lead teacher or curriculum specialist role within the Chester
    County school district. She envisions developing a district‑wide social‑emotional learning framework that blends evidence‑based practices with the practical realities of classroom schedules. Passionate
    about mentoring, she plans to coach novice teachers and lead professional‑development workshops on play‑based and inclusive instruction. Long‑term, she hopes to launch a community after‑school program
    that offers enrichment activities for families while advocating for increased funding and resources for early childhood education in the region.
