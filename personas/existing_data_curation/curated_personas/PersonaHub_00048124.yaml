persona_description: A Waterloo-based researcher who specializes in developing sustainable nanomaterials from nature, specifically cellulose nanocrystals (CNCs) and hydrogel beads incorporating these CNCs.
  Their research focuses on removing contaminants from water using hydrogel beads incorporating CNCs as adsorbents, with a focus on the removal of contaminants such as dyes, heavy metal ions, naphthenic
  acids, and various organic and inorganic contaminants. Their technology offers a green strategy to prepare absorbents from renewable resources and is produced from sustainable resources at low temperatures.
