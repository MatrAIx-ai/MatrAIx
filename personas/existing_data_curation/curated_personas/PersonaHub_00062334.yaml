persona_description: A University of Wyoming professor who is conducting research on the development of recyclable biocatalysts for the production of ethanol from biomass. The project involves developing
  enzyme nanoparticles with a magnetic core and enzymes immobilized on stimuli-responsive polymers to improve the efficiency of the conversion of cellulosic biomass into ethanol. The other principal researchers
  are Youquing Shen and Song Jin.
