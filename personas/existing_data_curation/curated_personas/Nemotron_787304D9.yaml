personas:
  professional: Clayton Carlson, a forward‑thinking residential electrician, leverages his rigorous mastery of the National Electrical Code and knack for creative problem‑solving to craft custom smart‑home
    lighting installations that double as interactive art pieces.
  sports: Clayton Carlson frequents the downtown skate park to practice freestyle skateboarding, cheers on the Memphis Grizzlies during the NBA season, follows the Redbirds in spring, and belongs to an
    informal weekend basketball league at the local community center, balancing a competitive drive with a laid‑back love for street‑style movement.
  arts: Clayton Carlson channels their imagination into abstract paintings inspired by Jean‑Michel Basquiat and the neon geometry of James Turrell, captures the gritty charm of Beale Street through black‑and‑white
    photography, and draws creative sparks from live performances at B.B. King's Blues Club and local rock venues, while citing influential musicians like Stevie Ray Vaughan and avant‑garde composer Philip
    Glass.
  travel: Clayton Carlson prefers spontaneous road trips focused on urban art scenes and music festivals, having snapped street murals in Detroit, explored indie galleries in Portland, and dreaming of a
    week‑long trek through the sci‑fi‑themed districts of Tokyo, all while budgeting travel through off‑season airline deals and occasional Couchsurfing stays.
  culinary: Clayton Carlson, a self‑taught home cook, alternates between devouring Memphis‑style barbecue at Central BBQ and experimenting with spicy ramen bowls topped with kimchi, while their favorite
    comfort dish remains the sweet‑and‑tangy fried chicken from Gus’s and they frequently pair meals with craft brews from local breweries.
  core: Clayton Carlson blends a spark‑filled imagination with practical wiring know‑how, turning everyday spaces into glowing canvases, yet occasionally hoards half‑finished LED projects like secret trophies
    of curiosity.
background:
  cultural: Clayton grew up in a working‑class, white family in the Memphis suburbs of Shelby County, absorbing the Southern values of self‑reliance, hospitality, and community pride. The city's rich musical
    heritage—blues, rock 'n' roll, and soul—has shaped his appreciation for rhythm and improvisation, which he expresses through his guitar playing and love for live performances. Though he did not complete
    a traditional high‑school diploma, he entered the electrical trade early, benefiting from local apprenticeship programs and the camaraderie of trade unions that emphasize skill mastery and mentorship.
    Memphis's vibrant arts scene, with its street murals and eclectic festivals, fuels his artistic interests, while Southern cuisine and regional traditions provide a cultural backdrop to his everyday
    life.
attributes:
  skills: '[''Electrical wiring and conduit installation'', ''Troubleshooting residential and light‑commercial circuits'', ''Blueprint and schematic interpretation'', ''Smart‑home automation setup'', ''Custom
    LED lighting design'', ''National Electrical Code compliance'', ''Use of multimeter, thermal imaging, and test equipment'', ''Basic carpentry and welding for installation support'', ''Project scheduling
    and documentation'', ''Creative problem solving in electrical contexts'']'
  hobbies: '[''Abstract painting'', ''Urban photography'', ''DIY LED art projects'', ''Arduino and Raspberry Pi tinkering'', ''Guitar playing'', ''Reading science‑fiction literature'', ''Visiting local
    art galleries'', ''Skateboarding'', ''Exploring Memphis music venues'', ''Attending sci‑fi conventions'']'
  career_goals: Clayton aims to become a licensed Master Electrician within the next three years and eventually obtain a contractor’s license to start his own electrical firm. He envisions his business
    specializing in innovative lighting solutions that merge technology with artistic design, catering to boutique commercial spaces, event venues, and residential clients seeking smart‑home integration.
    Long‑term, he hopes to expand into renewable energy installations, such as solar‑powered lighting systems, and to mentor apprentices, sharing his blend of technical expertise and creative curiosity.
    He also desires to earn certifications in advanced home automation and low‑voltage art installations to stay at the forefront of emerging trends.
