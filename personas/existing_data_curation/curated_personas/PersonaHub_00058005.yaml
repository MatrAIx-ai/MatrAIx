persona_description: A cosmologist who has dedicated her career to studying the expansion of the universe and its relationship with dark energy. She is particularly interested in the measurement of cosmic
  distances and the study of type Ia supernovae as standard candles. She is known for her contributions to the discovery of accelerating expansion and the independently announced discovery of the nature
  of dark energy. She is a member of the High-z Supernova Search Team and has been awarded the Nobel Prize in physics for her work.
