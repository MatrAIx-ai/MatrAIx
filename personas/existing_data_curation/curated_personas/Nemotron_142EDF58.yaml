  hobbies: '["Urban balcony gardening", "Reading historical biographies", "Traditional Ecuadorian cooking", "Listening to classical music", "Walking tours of Washington, DC architecture", "Volunteering
    at community STEM workshops"]'
  career_goals: Although approaching retirement, Miguelina aims to transition into a consulting role where she can apply her extensive knowledge to sustainable, community‑focused infrastructure projects
    in Washington, DC. She is passionate about mentoring the next generation of engineers, particularly women and Latinx students, and hopes to establish a small scholarship or mentorship program. Additionally,
    she seeks to contribute to the development of green public spaces—such as pedestrian walkways and neighborhood parks—that improve urban livability and reflect environmentally responsible design principles.
    Her long‑term ambition is to leave a legacy of both technical excellence and inclusive, supportive professional culture.
