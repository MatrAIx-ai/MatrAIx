personas:
  professional: Miguelina Ibarra, a seasoned civil engineer transitioning to a consulting role, uses their decades‑long expertise in structural analysis, AutoCAD and Revit drafting, and community‑focused
    project management to craft sustainable public spaces in Washington, DC, while mentoring emerging engineers with a methodical, supportive approach.
  sports: Miguelina Ibarra, an early‑morning walker, joins the DC Senior Walkers Club and follows the Washington Nationals baseball season, supplementing their activity with gentle senior yoga twice a week
    to maintain joint mobility.
  arts: Miguelina Ibarra, an avid classical music enthusiast, regularly attends Kennedy Center concerts featuring Beethoven, Mozart, and contemporary chamber ensembles, while also immersing themselves in
    historical biographies of social reformers that deepen their appreciation for narrative art.
  travel: Miguelina Ibarra, a careful planner, enjoys leisurely cultural trips such as a weekend in Savannah’s historic district, a spring visit to Lisbon’s narrow cobblestone streets, and annual tours
    of Washington, D.C.’s monuments, always booking well in advance to secure senior discounts and ensuring they have ample time to rest between flights.
  culinary: Miguelina Ibarra, a skilled home cook, delights in preparing fresh ceviche with lime, cilantro, and firm white fish and hand‑rolled empanadas stuffed with seasoned beef, often seasoning both
    dishes with oregano and thyme harvested from their balcony garden.
  core: Miguelina Ibarra blends methodical engineering precision with a quiet love for community, gardening, and classical music, channeling a disciplined yet warm approach to every facet of life.
background:
  cultural: Miguelina was born and raised in a coastal town in Ecuador, where family and community gatherings centered around shared meals, music, and Catholic traditions. Growing up, she learned the value
    of solidarity and respect for elders, which continues to shape her considerate and cooperative nature. After moving to the United States in her early twenties, she adapted to life in Washington, DC
    while preserving her native language and cultural customs. She regularly participates in Ecuadorian diaspora events, celebrates national holidays such as Carnaval de Guaranda, and maintains strong ties
    with relatives back home through weekly video calls. Her bicultural identity enriches her perspective, allowing her to blend meticulous Latin American work ethics with American standards of engineering
    practice.
