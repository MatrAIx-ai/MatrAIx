  career_goals: Opio aims to advance to a senior director role within Prince George’s County’s Department of Recreation and Parks, where she can champion city‑wide arts‑and‑cultural programs for older adults.
    She plans to acquire a Project Management Professional (PMP) certification to strengthen her project leadership skills and to mentor emerging Black women managers in the public sector. Ultimately, she
    envisions establishing a community‑based arts incubator that offers workshops, exhibition spaces, and small‑grant opportunities for local artists.
