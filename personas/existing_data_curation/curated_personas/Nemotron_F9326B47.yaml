personas:
  professional: Opio Encalade, a veteran nonprofit and municipal manager with more than thirty years of experience, leverages their curiosity, meticulous organization, and data‑driven approach to turn strategic
    visions into inclusive arts‑and‑culture programs for older adults, and they use assertive yet compassionate leadership to mentor staff and resolve conflicts.
  sports: Opio Encalade, an avid walker who joins a senior walking club for regular treks along the Paint Branch Trail, complements their routine with a weekly low‑impact tai chi class, follows the Washington
    Capitals and Washington Wizards as favored professional teams, and they maintain a modest fitness goal of 10,000 steps per day to support joint health.
  arts: Opio Encalade, a lifelong champion of the arts, spends weekends painting watercolor landscapes of Maryland’s Chesapeake scenery, curates an intimate collection of African‑Diaspora prints featuring
    works by Kehinde Wiley and Lorna Simpson, attends performances by the Washington National Opera and exhibitions at the Smithsonian’s National Museum of African American History and Culture, and they
    find creative inspiration in the music of Nina Simone and Beyoncé.
  travel: Opio Encalade, a methodical planner who favors cultural immersion, has explored historic Charleston, revisited the Smithsonian museums in Washington, D.C., and dreams of touring Lisbon, Portugal
    and the Caribbean island of St. Kitts to study local art and cuisine, and they always book trips months ahead while documenting experiences in a detailed travel journal.
  culinary: Opio Encalade, an experimental home cook with moderate skill, delights in crafting soul‑food staples like collard greens and cornbread alongside Caribbean dishes such as jerk chicken, plantain
    mofongo, and callaloo, frequently uses scotch bonnet peppers, sweet potatoes, and fresh herbs, and they host monthly potluck gatherings where neighbors sample their flavorful creations.
  core: Opio Encalade blends a meticulous, data‑driven work ethic with an insatiable curiosity for art and culture, balancing diligent budgeting and program planning with spontaneous watercolor sessions
    and garden strolls, and they occasionally overcommit to community projects while indulging in impulse purchases of art supplies.
background:
  cultural: Opio identifies as African‑American with family roots that trace back to the Great Migration and a maternal lineage from Haiti, which informs her appreciation for Caribbean culture. Growing
    up in Prince George’s County, she has been shaped by a close‑knit Black church community and the vibrant local arts scene. Her cultural heritage underscores a commitment to intergenerational mentorship,
    community empowerment, and the preservation of African‑Diaspora traditions through food, music, and storytelling.
