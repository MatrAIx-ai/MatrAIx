  hobbies: '[''competitive video gaming'', ''skateboarding'', ''basketball'', ''hip‑hop beat making'', ''digital illustration'', ''DIY electronics projects'', ''reading science‑fiction'']'
  career_goals: Terrence aims to complete his high school education by earning a GED within the next two years and then enroll in a community college program focused on computer science or game design.
    He aspires to secure an entry‑level position as a junior software developer or a game tester, leveraging his programming foundation and practical tech know‑how. Parallel to that, he hopes to build a
    reputation in the competitive esports scene, eventually transitioning into a content creator or streaming professional who can blend his technical skills with his love for gaming. His long‑term ambition
    is to combine these paths by working on interactive entertainment projects that allow him to design, code, and test games that appeal to both casual players and competitive audiences.
