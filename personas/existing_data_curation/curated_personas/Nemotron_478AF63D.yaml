personas:
  professional: Terrence Erie is an aspiring esports strategist and budding game modder, channeling his analytical way with shooter titles and self‑taught beat‑making into prototype designs while staying
    grounded in the discipline of his after‑school mentorship program.
  sports: Terrence Erie heads to the Sunset Skate Plaza for daily runs, drops into pickup basketball games at the Watts court while cheering for the LA Lakers and LA Clippers, and follows the LA Galaxy’s
    matches to stay tuned to the city’s sports pulse.
  arts: Terrence Erie produces lo‑fi hip‑hop beats inspired by Kendrick Lamar and J. Cole, creates digital illustrations that echo street‑art graffiti styles, and devours sci‑fi novels like Neuromancer
    while streaming anime soundtracks from composers such as Yoko Kanno.
  travel: Terrence Erie prefers short, budget‑friendly road trips with friends, having explored San Diego’s beach boardwalk, the neon lights of Las Vegas, and dreaming of a future visit to Tokyo for its
    gaming arcades and sushi stalls.
  culinary: Terrence Erie favors bold flavors, often whipping up spicy Korean‑BBQ tacos with kimchi and Sriracha, grabbing late‑night ramen bowls, and occasionally perfecting a classic chicken‑and‑waffles
    combo that merges comfort food with his love of Southern soul.
  core: Terrence Erie blends a competitive gamer’s edge with a quiet, curiosity‑driven mind, juggling late‑night gaming marathons, skateboard tricks, and beat‑making sessions while occasionally neglecting
    sleep and stretching.
background:
  cultural: Terrence is an African‑American teen raised in the vibrant, multicultural neighborhoods of Los Angeles. He is shaped by the rhythms of West Coast hip‑hop, the camaraderie of local basketball
    courts, and the supportive environment of community youth programs that emphasize mentorship and creative expression. Family gatherings and church events reinforce a strong sense of communal responsibility
    and cultural pride. At the same time, the city's diversity exposes him to a broad spectrum of perspectives, fostering both his skeptical outlook toward unfamiliar intentions and his competitive drive
    to succeed within his peer group.
attributes:
  skills: '[''basic computer hardware troubleshooting'', ''assembly and upgrade of personal computers'', ''introductory programming (Python, JavaScript)'', ''strategic game analysis'', ''small‑team coordination'',
