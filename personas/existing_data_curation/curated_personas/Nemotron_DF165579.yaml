personas:
  professional: Diane Bagain, a seasoned home manager and community volunteer who leverages their meticulous budgeting, garden expertise, and hands‑on repair skills to coordinate senior‑center events and
    mentor neighbors, embodying a practical, structured approach to everyday problem‑solving.
  sports: Diane Bagain, an avid spectator of the Seattle Seahawks and Portland Trail Blazers who supplements fandom with low‑impact activities like weekly walks on the local trail and a pickleball league
    at the senior center, prefers organized group play over crowded gyms.
  arts: Diane Bagain, a mystery‑novel aficionado who devours Agatha Christie and Tana French, enjoys folk‑rock staples such as Joni Mitchell and local acoustic concerts, and contributes hand‑knit scarves
    to the community theater’s costume department, reflecting a quiet yet expressive artistic side.
  travel: Diane Bagain, a methodical planner who favors short, well‑organized road trips to Oregon’s Willamette Valley vineyards, weekend retreats to Vancouver Island’s coastal towns, and annual family
    pilgrimages to the Olympic National Park, balancing a love of nature with budget constraints and a desire for predictable itineraries.
  culinary: Diane Bagain, a dedicated home baker who perfects sourdough and rye loaves, crafts apple‑cinnamon pies using garden‑grown apples, and delights in cooking salmon with dill and roasted root vegetables,
    while meticulously measuring ingredients and cataloguing recipes in a handwritten notebook.
  core: Diane Bagain, the garden‑loving, coupon‑collecting orchestrator who blends disciplined budgeting with a flair for baking and a quiet, competitive streak that surfaces in every well‑planned garden
    plot.
background:
  cultural: Raised in a modest, middle‑class white family in the Pacific Northwest, Diane’s upbringing emphasized self‑reliance, frugality, and community involvement. Her values reflect a traditional American
    ethos of hard work, family loyalty, and local civic participation. While her exposure to other cultures has been limited, she respects diversity and incorporates regional traditions, such as seasonal
    harvest festivals, into her family life.
