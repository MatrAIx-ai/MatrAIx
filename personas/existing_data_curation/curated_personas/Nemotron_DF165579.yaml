  career_goals: Diane aims to deepen her horticultural knowledge through community‑college classes, increase her volunteer involvement at the senior center, and compile a memoir of her life experiences
    for her grandchildren. She also aspires to maintain her health and independence so she can continue providing practical support to her family and uphold the structured, reliable role she values.
