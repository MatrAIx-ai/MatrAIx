  career_goals: Katheryne aims to transition from laborer to foreman or site supervisor within the next two years, leveraging her extensive field knowledge and associate’s degree. She plans to obtain a
    Certified Safety Trainer (CST) credential to lead OSHA training sessions for local contractors. Passionate about sustainable building, she intends to pursue LEED Green Associate certification and incorporate
    eco‑friendly practices into projects. Long‑term, she dreams of launching a boutique side business offering custom decorative concrete and reclaimed‑wood art installations for homes in Pearl River County,
    while mentoring the next generation of tradespeople through a partnership with the nearby technical college.
