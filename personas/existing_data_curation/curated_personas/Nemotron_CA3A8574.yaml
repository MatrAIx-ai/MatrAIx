  hobbies: '[''Watercolor Painting'', ''Abstract Art'', ''Reclaimed‑Wood Sculpting'', ''Concrete Art'', ''Reading Classic Literature'', ''Science‑Fiction Novels'', ''Vegetable Gardening'', ''Birdwatching'',
