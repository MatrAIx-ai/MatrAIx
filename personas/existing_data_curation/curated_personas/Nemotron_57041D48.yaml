personas:
  professional: Toni Naghshineh combines solid bookkeeping expertise—including double‑entry ledgers, QuickBooks, Xero, and Excel macros—with a curious but flexible mindset, often improvising process‑improvement
    ideas while occasionally missing deadline structures, and uses their cooperative nature to mentor junior staff and smooth client communications.
  sports: Toni Naghshineh enjoys hiking the Swamp Rabbit Trail and joining the Dillon County Birding Club’s weekend treks, follows the Carolina Panthers and Clemson Tigers with casual enthusiasm, and prefers
    low‑impact fitness like yoga and garden‑work, though their spontaneous schedule means workouts occasionally fall by the wayside.
  arts: Toni Naghshineh blends acoustic guitar strumming of folk legends like John Prine with knitting soothing scarves, devours historical fiction by Philippa Gregory, and regularly attends community‑center
    open‑mic nights where they showcase a shy yet heartfelt rendition of “Take Me Home, Country Roads.”
  travel: Toni Naghshineh favors unplanned weekend getaways to nearby natural gems such as the Blue Ridge Parkway, Charleston’s historic districts, and Savannah’s riverfront, while dreaming of a summer
    road trip to Asheville’s art scene and a future solo trek through the Great Smoky Mountains, all balanced against the modest budget of a freelance‑ready lifestyle.
  culinary: Toni Naghshineh’s kitchen is a laboratory for Southern comfort classics like shrimp and grits, collard greens, and cornbread, spiced up with fresh garden herbs such as basil and thyme, and they
    regularly experiment with Korean kimchi fried rice and Mediterranean mezze, confidently juggling a medium‑level cooking skill set.
  core: Toni Naghshineh is a curious, people‑oriented bookkeeper who trades deadline‑driven rigidity for spontaneous gardening, guitar riffs, and occasional fiscal indulgences, all while balancing community
    service and a budding freelance dream.
background:
  cultural: Toni grew up in Marion, South Carolina, within a family of Anglo-American Southern roots. Her upbringing emphasized hospitality, community involvement, and a strong connection to local traditions
    such as church gatherings, high-school football games, and seasonal festivals. She values Southern craftsmanship and cuisine, and she participates in community events that celebrate the region's heritage
    while also maintaining an open-minded curiosity about broader cultural experiences.
attributes:
  skills: '[''Bookkeeping'', ''Account reconciliation'', ''Data entry'', ''QuickBooks'', ''Xero'', ''Microsoft Excel (formulas, pivot tables, macros)'', ''Audit support'', ''Vendor management'', ''Payroll
