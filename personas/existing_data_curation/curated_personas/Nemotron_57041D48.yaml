  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''Cooking (Southern and experimental recipes)'', ''Reading historical fiction and local history'', ''Community volunteering'', ''Playing acoustic
    guitar'', ''Knitting'']'
  career_goals: Toni aims to earn the Certified Bookkeeper credential within the next two years and enroll in part-time community-college courses to deepen her understanding of financial analysis. She hopes
    to transition from a clerical role to a senior bookkeeping or finance coordinator position at a growing local company, where she can lead process-improvement projects and mentor newer staff. Ultimately,
    she envisions launching her own freelance bookkeeping practice serving small businesses in Dillon County and surrounding areas, allowing her to balance professional growth with the flexibility she values.
