personas:
  professional: Liza Flores, a budding classroom helper at her preschool, channels her curiosity and methodical nature into organizing story-time props, leading snack-time cleanup, and they reliably assist
    teachers, showcasing an outgoing, cooperative spirit even at five.
  sports: Liza Flores, a member of the Little Cubs soccer club, loves dribbling the ball in preschool games, proudly wears a Los Angeles Dodgers cap while cheering from the sidelines, and they enjoy weekend
    dance‑along fitness videos with friends that keep their energy boundless.
  arts: Liza Flores, an avid fan of "The Wiggles" and Disney’s "Frozen" soundtrack, spends afternoons drawing bright versions of Anna and Elsa, humming the songs while practicing simple piano chords from
    "Twinkle, Twinkle Little Star," and they eagerly share their creations with classmates.
  travel: Liza Flores delights in weekend trips to the local aquarium, where she draws a mini‑map of exhibits before each visit, dreams of a family adventure to Disneyland after seeing pictures in a travel
    book, and they love collecting souvenir seashells as reminders of each journey.
  culinary: Liza Flores loves homemade mac and cheese sprinkled with sharp cheddar, eagerly helps stir chocolate chip cookie batter, sneaks a spoonful of peanut butter straight from the jar for a quick
    snack, and they proudly name each dish after their favorite cartoon characters.
  core: Liza Flores blends curiosity with a love for order, turning every play‑date into a well‑planned adventure while never missing a chance to share her favorite stickers, even if they occasionally hoard
    the brightest ones.
background:
  cultural: Liza comes from a Colombian family living in Forest Hills, Queens. At home, Spanish is spoken alongside English, and she grows up hearing Colombian music such as cumbia, vallenato, and salsa,
    which influences her love for rhythm and dance. Family gatherings often feature traditional foods like arepas, empanadas, and sancocho, and she participates in cultural celebrations such as Carnaval
    de Barranquilla crafts and the Colombian Independence Day parade in the neighborhood. Her parents maintain ties with the local Colombian community through church events, language classes, and cultural
    festivals, giving Liza a strong sense of her heritage while embracing the multicultural environment of New York City.
