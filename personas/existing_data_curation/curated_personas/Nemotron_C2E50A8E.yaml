    cultural festivals'']'
  career_goals: Liza often says she wants to become a teacher because she loves helping friends learn new things. She also dreams of being a veterinarian to care for animals and imagines being a dancer
    who shares Colombian music with others. Her ambition is to grow up with the ability to organize, teach, and bring joy to her community.
