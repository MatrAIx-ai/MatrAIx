persona_description: A lender who is responsible for verifying the identity of borrowers and enforcing promissory notes. They are familiar with the different types of promissory notes, the risks associated
  with each, and the methods of enforcing unsecured promissory notes. They have experience in negotiation, communication, and legal action to recover debts. They are knowledgeable in the Fair Debt Collection
  Practice Act and are familiar with the process of filing complaints or petitions in court. They have a strong interest in ensuring that borrowers pay back their debts and are committed to enforcing contracts
  and agreements.
