personas:
  professional: Courtney Sanzone, a seasoned STEM educator and secondary mathematics specialist, blends meticulous curriculum design with hands‑on robotics projects, leveraging their organized, data‑driven
    mindset and practical curiosity to deliver equitable, standards‑aligned learning experiences while assertively advocating for grant funding and district‑wide STEM coordination.
  sports: Courtney Sanzone, an avid hiker and weekend trail‑runner, trains with the Sierra Mountain Running Club, practices yoga at Golden State Yoga Studio, cheers for the San Francisco Giants and Berkeley
    Golden Bears, and incorporates weekly bike rides through the Yuba County countryside to maintain cardiovascular health while keeping a keen eye on safety protocols learned from their lab experience.
  arts: Courtney Sanzone, who finds inspiration in Ansel Adams’ black‑and‑white landscapes and Fleetwood Mac’s melodic harmonies, attends the California Shakespeare Theater’s productions, curates a quarterly
    student STEM‑art exhibition, and collects vintage scientific posters, using photography to document field trips and enrich classroom storytelling.
  travel: Courtney Sanzone, a planner‑oriented explorer, balances weekend drives through Yosemite’s high country with international trips to Kyoto’s historic temples, schedules trips around school breaks
    to minimize family disruption, and joins educational exchange programs in Scandinavia to study innovative teaching models while keeping a modest travel budget through careful use of reward points.
  culinary: Courtney Sanzone, a confident home gardener‑chef, delights in cooking heirloom tomato ratatouille, fermenting seasonal kimchi, and sautéing foraged shiitake mushrooms, frequently experiments
    with crisp kale‑apple slaws and sourdough made from locally milled flour, while maintaining a meticulously organized pantry labeled by expiration dates.
  core: Courtney Sanzone merges methodical curiosity with a deep commitment to equitable STEM education, all while juggling garden‑grown meals, data‑driven budgeting, and a vigilant self‑care regimen that
    balances stress‑management yoga with occasional over‑planning.
background:
  cultural: Courtney was raised in a middle-class white family in Northern California, where a strong emphasis on education and self-reliance shaped her worldview. The region’s blend of progressive school
    culture and rugged outdoor lifestyle fostered her love for both structured learning and hands-on exploration. Community events such as local farmers’ markets, county fairs, and volunteer service projects
    reinforced a sense of collective responsibility. While she shares mainstream American traditions—Thanksgiving, Fourth of July celebrations—her daily life reflects the West Coast values of environmental
    stewardship, pragmatic problem solving, and a commitment to equitable access to education.
attributes:
  skills: '[''Mathematics instruction (Algebra, Geometry, Calculus)'', ''Introductory computer science (Python, Scratch)'', ''Curriculum design and alignment'', ''Instructional technology integration (Google
    Classroom, robotics kits)'', ''Data-driven assessment and analytics'', ''Project-based learning facilitation'', ''Laboratory safety management'', ''Differentiated instruction'', ''Classroom management'',
    ''Mentoring and coaching of new teachers'', ''Professional development workshop facilitation'', ''Grant writing for STEM resources'']'
  hobbies: '[''Hiking in the Sierra foothills'', ''Nature photography'', ''Urban gardening of heirloom vegetables'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading popular science literature'',
    ''Strategy board games and puzzles'', ''Yoga and mindfulness meditation'', ''Volunteer tutoring for after-school STEM clubs'']'
  career_goals: Courtney aims to advance to a district-wide STEM coordinator role where she can shape curriculum policy, secure grant funding, and expand hands-on learning opportunities across Yuba County
    schools. She plans to pursue a master’s degree in Educational Leadership to strengthen her expertise in program administration and equity-focused instruction. Long-term, she envisions establishing a
    community makerspace that bridges school and local industry, offering students real-world engineering projects. She also aspires to publish a curriculum guide for integrating coding into middle-school
    math classes, thereby influencing teaching practice beyond her own classroom.
