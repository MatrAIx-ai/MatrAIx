personas:
  professional: An aspiring musician and songwriter, Evelyn Lamotte blends a warm alto voice with acoustic guitar and banjo, writing lyrical narratives that weave Southern folk tales and Southern Gothic
    literary references; they manage intimate live performances, home‑studio recordings in Ableton Live, and youth music workshops, thriving on a curious yet practical mindset while embracing a relaxed,
    often disorganized schedule.
  sports: A nature‑loving adventurer and local sports fan, Evelyn Lamotte hikes the Natchez Trace Trail regularly, participates in the Humboldt Women’s Running Club’s 5K events, and follows the Nashville
    Predators and Tennessee Titans for weekend excitement; they also enjoy casual pick‑up games of ultimate frisbee with friends, balancing active outdoor pursuits with occasional yoga flow classes.
  arts: A literary‑infused artist, Evelyn Lamotte draws inspiration from Southern Gothic authors like Flannery O'Connor and William Faulkner, while listening to folk legends such as Gillian Welch, Townes
    Van Zandt, and contemporary indie acts like Sufjan Stevens; they capture rural landscapes and candid community moments with a vintage Nikon film camera, often citing Ansel Adams and Gregory Crewdson
    as visual influences.
  travel: A spontaneous explorer, Evelyn Lamotte has trekked the Great Smoky Mountains, soaked up music in New Orleans, and enjoyed weekend art festivals in Asheville, while dreaming of a folk‑themed pilgrimage
    to County Kerry, Ireland; they favor last‑minute road trips over meticulously planned itineraries, allowing flexibility to follow the rhythm of roadside diners and impromptu jam sessions.
  culinary: A culinary experimenter, Evelyn Lamotte loves reinventing classic Southern dishes—serving miso‑glazed fried chicken, shrimp and grits tossed with kaffir lime, and collard green tacos topped
    with pickled heirloom tomatoes—while showcasing ingredients like pecans, bourbon, and heirloom corn; their cooking skill sits between confident home chef and aspiring food stylist, often documenting
    dishes on Instagram before sharing with friends.
  core: Evelyn Lamotte, a 23‑year‑old folk‑oriented songwriter, balances a calm, resilient demeanor with a disorganized, curiosity‑driven lifestyle that fuels her music, cooking, hiking, and community‑building
    passions.
background:
  cultural: 'Evelyn grew up in a white, middle‑class family in Humboldt, Tennessee, where community gatherings, church choirs, and local festivals celebrated Appalachian folk and country traditions. Her
    upbringing emphasized humility, resilience, and a deep respect for storytelling—a value reinforced by her humanities degree, which exposed her to world literature, art history, and cultural theory.
    This blend of regional musical heritage and academic curiosity gives her a unique perspective: she honors the roots of Southern music while actively seeking new influences and ideas, balancing practical
    local sensibilities with an open‑minded artistic exploration.'
attributes:
  skills: '[''Acoustic guitar'', ''Banjo'', ''Lead vocals'', ''Songwriting'', ''Audio recording and mixing (DAW)'', ''Live performance and stagecraft'', ''Music workshop facilitation'', ''Lyric analysis
    and literary influence integration'']'
  hobbies: '[''Reading (Southern literature, poetry)'', ''Hiking on the Natchez Trace'', ''Cooking Southern cuisine with modern twists'', ''Photography of local landscapes and community gatherings'', ''Tabletop
    role‑playing games (e.g., Dungeons & Dragons)'', ''Yoga and meditation'']'
  career_goals: Evelyn aims to release a concept EP that captures the layered identity of rural Tennessee while incorporating broader literary themes, and to build a sustainable independent music career
    through streaming platforms, regional radio play, and modest touring across the Southeast. She hopes to collaborate with other folk and indie artists, form a local artist collective that shares resources
    and performance opportunities, and eventually establish a community music space in Humboldt where workshops, open‑mic nights, and youth programs can thrive. Long‑term, she envisions her music being
    licensed for film and television to reach wider audiences while staying rooted in authentic storytelling.
