  career_goals: Melvin aims to transition into engineering leadership, first as a lead engineer and eventually as a director or VP of engineering at a technology firm that values innovation and inclusive
    culture. He aspires to mentor and champion the growth of underrepresented developers, shaping diversity initiatives within his organization. Long‑term, he dreams of launching a startup that blends technology
    and the arts—creating an online platform that offers interactive, AI‑enhanced art‑education experiences for children and adults. He also hopes to contribute to open‑source projects focused on accessibility
    and to speak at conferences about the intersection of software, design, and social impact.
