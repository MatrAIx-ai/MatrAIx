  skills: '[''Watercolor painting'', ''Sketching'', ''Quilting'', ''Pottery'', ''Oral storytelling'', ''Local history research'', ''Community facilitation'', ''Mentoring'', ''Adaptability'']'
  hobbies: '[''Painting'', ''Pottery'', ''Quilting'', ''Visiting galleries'', ''Reading poetry'', ''Gardening'', ''Genealogy'', ''Birdwatching'', ''Bluegrass concerts'', ''Book clubs'']'
  career_goals: Although retired, Brenda aims to deepen her artistic practice and share her knowledge with others. She plans to enroll in a regional art workshop series, curate a traveling exhibit of local
    folk art for the community center, and compile a memoir that weaves personal anecdotes with the history of Graves County. Additionally, she hopes to mentor younger artists through the county's senior
    arts council, and to travel to at least three cultural festivals in the Midwest over the next five years.
