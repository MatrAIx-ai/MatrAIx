  career_goals: He aims to transition from commercial and episodic production to directing feature‑length narratives that blend high‑concept sci‑fi or psychological themes with cutting‑edge visual technology.
    Within the next five years, he plans to launch his own boutique production company focused on immersive AR/VR storytelling, targeting festival circuits and streaming platforms. He aspires to earn recognition
    from major industry awards such as the Oscars and Emmys, and to become a thought leader at the intersection of entertainment and technology, mentoring emerging creators and championing greater Asian
    representation on screen.
