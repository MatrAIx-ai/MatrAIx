personas:
  professional: Jean Stemen is a grain-elevator sorter who blends their practical know-how of USDA grading standards, forklift operation, and conveyor-belt troubleshooting with a curiosity for new sorting
    technologies, using their flexible, solution-oriented attitude to keep the line humming while eyeing a shift-lead promotion, and they often suggest incremental process tweaks during crew briefings.
  sports: Jean Stemen is a devoted fan of the Minnesota Twins and Vikings, participates in a local deer-hunting club during season, and they join a community softball league in the summer, balancing competitive
    instincts with occasional friendly rivalry on the field.
  arts: Jean Stemen enjoys mystery novels by Agatha Christie, follows the podcast series of sustainable farming, attends quilting circle gatherings where they stitch patterns inspired by folk artist Bob
    Dylan's album covers, and pockets quiet moments listening to the fiddle tunes of local Minnesota folk bands.
  travel: Jean Stemen prefers road-trip adventures to nearby state parks like Voyageurs National Park and the Black Hills, while they dream of a weekend getaway to the Napa Valley vineyards, planning trips
    on a flexible itinerary that allows impromptu stops at farmer markets and hunting lodges.
  culinary: Jean Stemen's cooking skill is solid-handed, and they favor hearty Midwestern fare such as pan-fried trout, roasted root vegetables, cornbread, and wild-rice pilaf, seasoned with fresh herbs
    from their garden and often paired with a cold craft beer.
  core: Jean Stemen is a pragmatic, curiosity-driven grain specialist who balances hands-on efficiency with a love for outdoors, DIY projects, and occasional financial forgetfulness, and they often juggle
    work ambitions with spontaneous weekend adventures.
background:
  cultural: Jean grew up in a multi‑generational farming community in Porter, Minnesota, where white Midwestern culture is rooted in values of self‑reliance, practicality, and community involvement. Her
    family’s ancestry traces back to German and Scandinavian (particularly Norwegian) immigrants who settled the region in the early 1900s, bringing Lutheran traditions, a strong work ethic, and a love
    for seasonal celebrations like harvest festivals. These cultural influences manifest in her emphasis on dependable, hands‑on work, participation in local church and community events, and an appreciation
    for both preserving proven agricultural practices and cautiously exploring new ideas.
attributes:
  skills: '["grain grading and inspection", "operation of conveyor sorting equipment", "forklift operation and certification", "basic mechanical troubleshooting", "quality‑control documentation", "knowledge
    of USDA grain standards", "inventory data entry and tracking", "first‑aid/CPR certification", "team communication and coordination", "problem solving under pressure"]'
  hobbies: '["fishing", "deer hunting", "home vegetable gardening", "attending county fair and agricultural expos", "participating in friendly competitive games", "reading mystery novels", "listening to
    sustainable‑farming podcasts", "DIY woodworking", "quilting circle"]'
  career_goals: Jean aims to move from a frontline sorter to a supervisory role within the next two to three years, securing a shift‑lead position that lets her mentor newer employees and influence process
    improvements. She plans to complete a Certified Grain Handler program and a workplace safety management course to qualify for facility‑manager responsibilities. Long‑term, she is open to partnering
    with a family‑owned farm or co‑op, leveraging her operational insight to help market local grains more effectively, while remaining pragmatic about the financial and logistical challenges of entrepreneurship.
