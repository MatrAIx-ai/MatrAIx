  hobbies: '[''Fishing'', ''Vegetable gardening'', ''Woodworking'', ''Reading non-fiction'', ''Cooking Mexican cuisine'', ''Guided nature walks'', ''Volunteer community service'']'
  career_goals: Erick aims to advance to a supervisory position such as Assistant Recreation Director within the next three years, focusing on expanding inclusive programming for seniors and youth, obtaining
    a certification in Recreation Management, and leading a county‑wide initiative that integrates culturally relevant activities, including traditional Mexican games and culinary workshops. He also aspires
    to mentor younger recreation staff, using his organized mindset to foster professional growth while maintaining a balance between innovative ideas and proven practices.
