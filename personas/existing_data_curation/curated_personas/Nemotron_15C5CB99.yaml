  career_goals: Thomas aims to transition from a frontline representative to a team lead or training specialist within the next three years, leveraging his curiosity for novel problem‑solving to design
    interactive onboarding modules. He aspires to develop a mentorship program that pairs experienced agents with newcomers, fostering both competence and a supportive community. Long‑term, he envisions
    launching a modest side‑business—a curated online shop featuring his watercolor artwork and Appalachian‑inspired prints—allowing him to merge his artistic passions with entrepreneurial ambition while
    maintaining a stable income in his current role.
