personas:
  professional: John Lewis, a 21-year-old corrections officer on the rise, channels his love of structure and practical mindset into meticulous inmate supervision, precise incident reporting, and calm crisis
    de-escalation, while they pursue a criminal-justice degree and CIT certification to fast-track toward shift supervisor and eventually deputy warden.
  sports: John Lewis, a dedicated weightlifter, boxer, and basketball player at the Gulf-Coast community center, follows the Houston Rockets and New Orleans Saints, trains with the Coastline Boxing Club,
    participates in the Bayou Basketball League, and joins a weekend fishing league for red snapper, while they also run in the local 5k club during cooler months.
  arts: John Lewis, a hip-hop and R&B enthusiast, powers workouts with Kendrick Lamar, J. Cole, and H.E.R., reads personal-development titles like Atomic Habits, mentors youth through church drama rehearsals,
    and occasionally attends gospel choir performances at the regional theater, which they find inspiring.
  travel: John Lewis, a budget-conscious road-tripper, plans weekend getaways to Galveston, Key West, and the Florida Keys for fishing and relaxation, while they dream of a future scuba-diving adventure
    in Belize, using a spreadsheet to track expenses and keep trips within a modest budget.
  culinary: John Lewis, a high-protein home cook, regularly prepares shrimp étouffée, blackened catfish, and grilled chicken with quinoa seasoned with cayenne and smoked paprika, never skips a post-workout
    whey protein shake, yet they often indulge in late-night pizza after marathon gaming sessions.
  core: John Lewis blends disciplined corrections work, regimented fitness, and a pragmatic love for hip-hop-driven workouts and weekend fishing, all while they methodically pursue upward mobility and personal
    growth.
background:
  cultural: John was raised in the African-American community of Pensacola, where Southern traditions and Black cultural heritage intersect. He grew up attending a local church that emphasized service,
    resilience, and family ties, and he celebrates community events such as Juneteenth and local soul-food festivals. His family's history of navigating systemic challenges in the South instilled a strong
    sense of responsibility and pride in his roots. The blend of Southern hospitality, church choir music, and a tight-knit neighborhood network shapes his worldview, informing both his collaborative work
    style and his commitment to serving and protecting his community.
attributes:
  skills: '[''Inmate supervision'', ''Conflict de-escalation'', ''Security protocol enforcement'', ''Incident reporting'', ''First aid and CPR'', ''Firearms safety'', ''CCTV monitoring'', ''Physical fitness
    training'', ''Team coordination'', ''Crisis response'']'
  hobbies: '[''Weightlifting'', ''Boxing'', ''Basketball'', ''Video gaming'', ''Fishing'', ''Hip-hop and R&B music'', ''Reading personal-development books'', ''Mentoring youth'']'
  career_goals: John aims to advance within the corrections field by first obtaining a bachelor's degree in criminal justice and earning certifications such as Crisis Intervention Team (CIT) and defensive
    tactics. He aspires to be promoted to shift supervisor within the next three years, then to lieutenant and eventually deputy warden. Beyond rank, he is passionate about developing inmate rehabilitation
    programs and hopes to influence policy that improves mental-health support for both staff and prisoners. He also considers a future transition into law enforcement or community outreach roles that leverage
    his leadership experience.
