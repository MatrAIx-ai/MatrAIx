  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Participating in Vietnamese cultural festivals'', ''Gardening herbs and vegetables'', ''Walking in local parks'', ''Reading historical fiction (book
    club)'', ''Yoga'', ''Volunteering at senior center (storytelling)'', ''Hosting cooking gatherings'']'
  career_goals: As she approaches retirement, Ms. Thach aims to transition into a mentorship role, serving as an instructional coach for novice teachers and spearheading the development of a bilingual Vietnamese
    program at her school district. She hopes to contribute to professional development workshops, advocate for culturally responsive curricula, and eventually volunteer as a community tutor for recent
    immigrant families. Additionally, she is interested in joining the school board or PTSA to influence policy that supports equity and family engagement.
