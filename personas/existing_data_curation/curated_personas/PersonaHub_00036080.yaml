persona_description: A historian who is deeply interested in the history of Ireland and the constitutional changes that took place in the country. The individual is passionate about the political and social
  changes that occurred during the 20th century and has a particular interest in the role of religion and politics in shaping Irish society. They are knowledgeable about the events of 1938 and the inauguration
  of Douglas Hyde as the first president of Ireland under the new Constitution of 1937. They are also interested in the historical context of the inauguration and the role of religion in the selection of
  the president.
