    User 2: Thanks! I''m glad you do.

    User 1: So, what''s it like being a YouTuber?

    User 2: It''s really fun! I get to meet a lot of people and share my love of makeup with them.

    User 1: That sounds really cool.

    User 2: It is! I love it.

    User 1: What''s the most fun thing you''ve done as a YouTuber?

    User 2: I got to go to Japan for a makeup convention.

    User 1: That''s amazing! I''ve always wanted to go to Japan.

    User 2: It was so much fun! I got to meet so many amazing people and see so many beautiful places.

    User 1: That sounds incredible.

    User 2: It was! I''m so glad I got to do it.

    User 1: I''m sure you''re going to continue to do amazing things.'
