  career_goals: Ricky aims to move into a supervisory role within the restaurant industry, seeking a shift‑manager position over the next two years. He plans to enroll in a community‑college hospitality
    program to earn a certification that will support his advancement. His long‑term ambition is to open a modest, family‑run diner in Tuttle that offers a stable, structured environment for both staff
    and customers, while also achieving financial independence to purchase a home in his hometown.
