personas:
  professional: Ricky Smith, a 26‑year‑old restaurant waiter in a busy downtown diner, applies precise POS handling, calm problem‑solving, and a methodical shift routine while their cooperative demeanor
    keeps the floor harmonious and staff morale high.
  sports: Ricky Smith enjoys playing on a local recreational softball league, follows the Oklahoma City Thunder and the Oklahoma Sooners with keen interest, and spends weekends fishing at nearby Lake Murray,
    where they belong to a small anglers' club and value low‑key physical activity over high‑intensity workouts.
  arts: Ricky Smith often unwinds with classic American folk music from Johnny Cash and Bob Dylan, watches Ken Burns documentaries on historical topics, and occasionally attends community‑theater productions
    starring local actor Jake Franklin, allowing the arts to inform their storytelling in personal journals.
  travel: Ricky Smith prefers road‑trip planning that balances budget constraints with a love for nature, having driven to the Ozark National Forest and Yellowstone for fishing expeditions, while dreaming
    of a future fishing lodge getaway in Alaska's Kenai Peninsula.
  culinary: Ricky Smith experiments with wood‑fire cooking, often preparing smoked trout, chili con carne with smoked paprika, and homemade biscuits, and they relish sourcing fresh ingredients from the
    farmers' market, though they sometimes over‑salt their dishes in pursuit of bold flavor.
  core: Ricky Smith is a structured, solitary‑leaning realist who blends meticulous budgeting, low‑key sports, and quiet creative pursuits into a life steered by practical goals and occasional over‑enthusiastic
    woodworking projects.
background:
  cultural: Ricky grew up in Tuttle, Oklahoma, a small, close‑knit community in the Great Plains. His family belongs to the region’s white, middle‑class demographic and has long-standing ties to local churches
    and community events. The town’s emphasis on hard work, modesty, and neighborly assistance shaped his values, fostering a preference for structure, reliability, and harmony. High‑school life was centered
    around football games, county fairs, and small gatherings, reinforcing his comfort with intimate social settings and a practical, down‑to‑earth lifestyle.
