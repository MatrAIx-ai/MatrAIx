personas:
  professional: Racheal Kelly, a 25-year-old postsecondary educator, blends rigorous curriculum design with data-driven advising, leveraging Canvas and meticulous semester outlines while quietly championing
    inclusive classrooms and faculty-development projects.
  sports: Racheal Kelly enjoys weekend hikes in the foothills, is a dedicated member of a local trail-running club, roots for the Utah State Aggies basketball team, and incorporates a disciplined morning
    stretch routine before tackling the day’s lesson plans.
  arts: Racheal Kelly finds calm in knitting, photography of misty sunrise over the valleys, and curates a reading list that alternates between contemporary educational theory and classic novels by Jane
    Austen, while regularly listening to folk-rock artist Brandi Carlile during study breaks.
  travel: Racheal Kelly prefers meticulously planned trips, often mapping out multi-day treks through Zion and Bryce National Parks, but also dreams of a modest European tour to visit historic libraries
    in Oxford and the art museums of Florence, balancing adventure with a modest travel budget.
  culinary: Racheal Kelly loves baking artisanal sourdough and rosemary focaccia, experiments with seasonal beet and goat cheese salads, and meticulously measures ingredients using a digital scale while
    savoring a cup of single-origin Ethiopian coffee.
  core: Racheal Kelly merges an organized, data-centric mind with a quiet love for solitary creativity, from journaling to baking, while battling a perfectionist streak that sometimes stalls spontaneous
    fun.
background:
  cultural: Racheal grew up in the Intermountain West, raised in a predominantly white, middle‑class family with deep roots in the Logan, Utah community. Her upbringing emphasized the values of self‑reliance,
    modesty, and service—principles common among families in this part of the state. Although not overtly religious, she was exposed to the region’s strong community‑oriented culture, which includes seasonal
    festivals, volunteerism, and a love for the outdoors. This background fostered a respect for education as a pathway to personal and communal advancement, a collaborative spirit, and an appreciation
    for balancing work, family, and personal growth.
attributes:
  skills: '["Curriculum design and development","Instructional technology integration (Canvas, video conferencing)","Student assessment creation and data analysis","Academic advising and mentorship","Classroom
