    resolution and interpersonal communication"]'
  hobbies: '["Reading (educational research, classic literature)","Journaling and reflective writing","Hiking in Cache Valley and nature photography","Knitting and textile crafts","Baking artisanal breads
    and pastries","Yoga and mindfulness practice","Volunteering for community literacy tutoring","Listening to classical and acoustic music"]'
  career_goals: Racheal aims to deepen her scholarly expertise by completing a master’s degree in educational leadership within the next three years, followed by a Ph.D. focused on student retention in
    community colleges. She aspires to develop a signature interdisciplinary course that merges educational theory with emerging technologies, and to publish research articles on evidence‑based teaching
    practices. In the long term, she envisions moving into academic leadership—first as a department chair and eventually as a dean—where she can influence curriculum policy at the institutional and state
    levels while maintaining a balanced family life.
