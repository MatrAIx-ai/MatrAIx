personas:
  professional: Darrell Thomas, a library information specialist with a STEM graduate background, excels at digital archiving and data‑driven collection development while juggling a love for structured
    workflows and a tendency toward last‑minute planning that often spawns late‑night grant‑proposal drafts; they advocate assertively for resources yet sometimes procrastinate on paperwork.
  sports: Darrell Thomas, an avid Steelers and Penguins supporter who hikes the Allegheny County trails on weekends and belongs to the local Allegheny Trails Running Club, combines his love for team spirit
    with a pragmatic approach to fitness, though they often forget to stretch after hikes, resulting in occasional knee stiffness.
  arts: Darrell Thomas, a regular attendee of the Pittsburgh Film Festival and a fan of indie bands like The Black Moods, immerses themselves in sci‑fi literature from authors like Neal Stephenson while
    also volunteering to run chess tournaments at the community center, revealing a blend of analytical curiosity and creative appreciation.
  travel: Darrell Thomas, a weekend road‑tripper who plans spontaneous detours to destinations like the Great Smoky Mountains, the historic streets of Philadelphia, and the Scottish Highlands, uses credit‑card
    points for flights and prefers a mix of structured itinerary and on‑the‑fly adjustments, though they sometimes overpack their DIY electronics gear.
  culinary: Darrell Thomas, a home‑cooking enthusiast who perfects steel‑head trout with dill, stews hearty chili with locally sourced kielbasa, and experiments with a Raspberry Pi‑controlled sous‑vide,
    yet they frequently order pizza after late‑night work sessions and keep a secret stash of craft‑brew cans in the pantry.
  core: Darrell Thomas, a 37‑year‑old library technologist who balances a love for structured digital services with a habit of last‑minute grant writing, occasional stress‑induced insomnia, and a guilty
    pleasure for pizza after marathon coding sessions, embodies a pragmatic yet quirky approach to life.
background:
  cultural: Darrell's cultural background is rooted in a White American upbringing typical of the greater Pittsburgh region. His family generations have been part of the city’s transition from an industrial
    steel hub to a modern knowledge‑based economy, instilling a strong work ethic and appreciation for community institutions such as libraries. He grew up attending public schools that emphasized practical
    education and civic involvement, which shaped his respect for structured learning environments. While his heritage reflects broad European‑American influences, his identity is also shaped by the city’s
    multicultural neighborhoods, fostering an openness to diverse perspectives within his professional and personal life.
