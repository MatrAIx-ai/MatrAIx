personas:
  professional: A veteran personal care aide with over thirty years of hands‑on experience, Alec Jacobs combines meticulous scheduling, a competitive drive to advocate for his clients, and a curiosity for
    emerging dementia‑care techniques, making him a reliable pillar in the Brewer home‑care agency while eyeing a supervisory role.
  sports: A seasonal outdoors enthusiast, Alec Jacobs spends crisp winter mornings snowshoeing the spruce‑filled trails near Brewer, joins the local senior bowling league at the Brewer Community Center,
    roots for the Boston Red Sox and Boston Bruins, and still finds time for early‑morning fishing on the Penobscot River, balancing friendly competition with personal fitness.
  arts: An avid reader of maritime historical novels by Bernard Cornwell and Patrick O'Neal, Alec Jacobs enjoys the folk tunes of The Low Anthem, the storytelling of author Sarah Stewart, and the classic
    films of Tom Hanks, weaving these cultural threads into his evenings of birdwatching and quiet reflection.
  travel: Methodical in planning, Alec Jacobs favors short road trips to Acadia National Park, the historic lighthouse town of St. Andrews, New Brunswick, and the coastal charms of Bar Harbor, while dreaming
    of a leisurely cruise through the Norwegian fjords, always budgeting his travel expenses to align with his retirement timeline.
  culinary: Rooted in his love for fresh catch, Alec Jacobs delights in cooking Atlantic cod with garden‑grown thyme and rosemary, preparing lobster rolls and clam chowder for family gatherings, and mastering
    a modest skill set that includes pan‑searing fish and baking blueberry pies, yet he occasionally over‑season his dishes in a quest for bold flavor.
  core: Alec Jacobs is a pragmatic, competitive caregiver who blends meticulous care, frugal finances, seasonal outdoor pursuits, a love for regional history and music, and a methodical approach to retirement
    planning, all seasoned with a dash of curiosity and occasional stubbornness.
background:
  cultural: Alec grew up in a working‑class family in Brewer, Maine, rooted in the region’s Irish‑American and French‑Canadian heritage. The community’s gritty, self‑reliant New England ethos shaped his
    practical outlook and strong work ethic. He was raised with an appreciation for seasonal outdoor pursuits—fishing, ice‑fishing, and winter sports—that are hallmarks of coastal Maine culture. Local traditions,
    such as the annual Brewer Fall Festival and the maritime storytelling gatherings, fostered his curiosity about regional history and reinforced a sense of communal responsibility. While his upbringing
    emphasized modesty and reliability, the competitive spirit of local high‑school sports and community leagues left a lasting impression, translating into his professional drive to excel and advocate
    for those he cares for. This blend of cultural values and personal traits informs Alec’s balanced approach to life, work, and leisure.
attributes:
  skills: '["Personal care assistance", "Mobility support and transfers", "Medication assistance and monitoring", "Vital signs measurement", "First aid and CPR certification", "Infection control protocols",
