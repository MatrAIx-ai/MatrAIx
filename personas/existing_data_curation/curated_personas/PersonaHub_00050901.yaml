persona_description: An aging researcher interested in the study of the aging process and the prevalence of physical and cognitive function, diseases, and problem behavior in the very oldest-old population.
  This researcher has access to large data sets from existing Resident Assessment Instrument records in nursing homes, allowing them to analyze the prevalence of physical and cognitive dysfunction, diseases,
  and problem behavior in the very oldest-old population. They are interested in understanding the mechanisms of aging that occur after the mid-nineties and examining the nature of the aging process through
  the lens of the very oldest-old population.
