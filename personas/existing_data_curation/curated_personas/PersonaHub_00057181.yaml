persona_description: A typographer, graphic artist, and founder of the Typographic Society Austria who is concerned about the loss of handwriting and the potential consequences of digital data being lost
  in a blackout. He is interested in the potential benefits of analog writing and the importance of handwriting in personalizing thoughts and ideas. He is also aware of the challenges faced by modern digital
  technology in accessing and reading analog writing.
