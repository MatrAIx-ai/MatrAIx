  career_goals: Gloria aims to leave a lasting legacy of community connection by expanding the senior-center’s intergenerational programs, mentoring younger volunteers in event planning, and compiling a
    digital archive of local histories and family stories. She aspires to author a memoir that weaves personal anecdotes with the broader history of Kernersville, and to master new digital media tools so
    she can share these narratives online. Additionally, Gloria hopes to launch a seasonal community garden project that teaches sustainable gardening practices while fostering friendly competition among
    participants, reflecting her love for both practical learning and organized fun.
