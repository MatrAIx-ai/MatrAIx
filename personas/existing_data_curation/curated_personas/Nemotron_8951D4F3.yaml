  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Genealogy Research'', ''Bridge'', ''Cooking Family Recipes'', ''Quilting'', ''Photography'', ''Storytelling at Schools'', ''Volunteer Event
