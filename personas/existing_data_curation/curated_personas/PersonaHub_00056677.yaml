persona_description: A zoologist who specializes in the study of arthropods, particularly the relationships between different groups of arthropods. He has a deep understanding of the evolutionary history
  of arthropods and the ways in which common names for different groups of arthropods have originated. He is particularly interested in the relationships between different groups of arthropods, including
  the relationships between cockroaches and shrimp. He is also knowledgeable about the characteristics and behaviors of different groups of arthropods, including the isopods and the land shrimp. He has
  a passion for cooking insects and has tried a few recipes from Entertaining with Insects by Taylor, R.L. and Carter, J.B.
