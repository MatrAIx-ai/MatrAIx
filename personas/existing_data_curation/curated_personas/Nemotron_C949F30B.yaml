  hobbies: '[''Painting'', ''Woodworking'', ''Photography'', ''Hiking'', ''Reading Indigenous folklore'', ''Playing traditional drums'', ''Gardening'', ''Bird watching'', ''Attending art fairs'']'
  career_goals: Eyerusalem aims to launch a region‑wide youth program that combines Indigenous cultural arts with sports mentoring, securing grant funding to create a dedicated community center in Cascade
    County. He aspires to become a regional director for culturally‑responsive scouting, author a guide on integrating artistic sensibility into athletic training, and mentor the next generation of coaches
    from American Indian communities. Ultimately, he seeks to leave a sustainable legacy that empowers young people to embrace both their heritage and personal resilience.
