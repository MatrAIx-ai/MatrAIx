personas:
  professional: Eyerusalem Chong, a 58‑year‑old veteran mentor and talent scout, merges a strategic sports coaching methodology with a deep appreciation for visual and performing arts, designing culturally
    resonant curricula that blend individualized athlete development, creative storytelling, and conflict‑resolution techniques, while their intense emotional reactivity fuels a passionate yet occasionally
    volatile dedication to empowering youth.
  sports: Eyerusalem Chong coaches a youth track and field program in Cascade County, volunteers as a scouting consultant for the Billings Mustangs baseball club, avidly follows the Montana Grizzlies football
    team, and they spend weekend hikes in the Beartooth Range practicing bird‑watching as a form of mindful conditioning.
  arts: Eyerusalem Chong spends evenings painting prairie vistas inspired by Albert Bierstadt, photographing wildlife with a reverence akin to Ansel Adams, carving driftwood using traditional motifs drawn
    from regional folklore, and they regularly attend the Missoula Art Market where they admire contemporary painter Elizabeth Van Loosen and folk musician Victor Wooten.
  travel: Eyerusalem Chong prefers purposeful travel, often planning week‑long road trips to savor the solitude of Banff National Park in Canada, the red‑rock landscapes of Sedona, Arizona, and the historic
    art colonies of Santa Fe, while domestic constraints and grant deadlines keep them from longer overseas excursions, and they favor modest campgrounds over luxury hotels.
  culinary: Eyerusalem Chong enjoys hearty Montana cuisine, favoring bison stew seasoned with juniper berries, grilled trout with lemon‑dill sauce, and homemade huckleberry jam, cooks at a moderate skill
    level—experimenting with foraged mushrooms and wild sage—while indulging in strong coffee each morning and sometimes over‑spicing dishes in a burst of creative energy.
  core: Eyerusalem Chong, a 58‑year‑old mentor who blends prairie painting, woodworking, and youth sports scouting, battles intense anxiety that fuels both passionate advocacy and occasional self‑doubt,
    hoards pine cones for art projects, and cannot start the day without a cup of dark roast coffee.
background:
  cultural: Eyerusalem belongs to a Montana‑based American Indian tribe, drawing on a lineage of oral storytelling, reverence for the land, and communal responsibility. His upbringing on or near reservation
    lands instilled a profound respect for Indigenous traditions, language, and ceremonial practices, which he weaves into his coaching philosophy and community work. He regularly participates in tribal
    gatherings, shares stories of ancestors, and incorporates Indigenous values of reciprocity and stewardship into his personal and professional life.
