persona_description: A professional change management consultant who specializes in developing and implementing effective change management programs for organizations. They have a deep understanding of
  the human aspect of change and are skilled in navigating the various stages of change, from apprehension to internalization. They are adept at detecting trends in the macro-environment and assessing employee
  reactions to changes, and have experience in crafting change programs that provide support as workers go through the process of accepting change. They are also skilled in implementing, disseminating,
  monitoring, and adjusting change programs to ensure their effectiveness.
