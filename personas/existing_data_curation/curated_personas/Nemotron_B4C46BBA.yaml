  hobbies: '[''gardening'', ''reading science‑fiction and tech non‑fiction'', ''local book club'', ''volunteering for digital literacy'', ''knitting'', ''hiking in Cuyahoga Valley'', ''crossword puzzles'',
    ''Mediterranean cooking'']'
  career_goals: Eva aims to transition into a senior analyst or lead architect role within the next three to five years, leveraging her practical experience to guide large‑scale system modernization initiatives
    for regional enterprises. She plans to earn certifications such as CBAP (Certified Business Analysis Professional) and a cloud architecture credential to deepen her technical breadth. Eva is also passionate
    about mentoring mid‑career professionals and hopes to develop a part‑time teaching portfolio at a local community college, sharing her balanced approach to curiosity and practicality while maintaining
    a healthy work‑life harmony.
