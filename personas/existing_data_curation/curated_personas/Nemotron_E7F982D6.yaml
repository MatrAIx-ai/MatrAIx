personas:
  professional: Corey Reid is a fast‑food associate with deep expertise in food prep, POS operation, inventory control, and staff training, whose routine‑driven, detail‑oriented nature makes them a model
    of calm efficiency on busy shifts and they are positioned for a fast‑track into shift‑manager and store‑manager roles.
  sports: Corey Reid is a loyal fan of the St. Louis Cardinals baseball team, enjoys attending the occasional home game when schedule permits, and they spend Thursday nights bowling with the Green Lanes
    league at the local alley, while also maintaining a modest fitness routine of weekend hikes and occasional calf‑strengthening exercises to support their fishing trips.
  arts: Corey Reid immerses themselves in classic cinema, regularly watching Casablanca, Citizen Kane, and Ken Burns’ The Civil War documentaries, while also appreciating folk music from John Denver and
    the acoustic storytelling of Gordon Lightfoot, and they occasionally dabble in woodworking as a form of artistic expression.
  travel: Corey Reid prefers low‑key, meticulously planned road trips to fishing‑rich regions like the Ozark National Forest and the Upper Peninsula of Michigan, they cherish weekend stays at modest cabins,
    and they dream of a future fishing expedition to New Zealand’s South Island, all while keeping travel costs within a tight budget.
  culinary: Corey Reid delights in hearty, home‑cooked fare such as slow‑cooked beef chili, rosemary‑infused roasted chicken, and garden‑fresh salad with heirloom tomatoes, they routinely grow basil and
    cilantro for sauces, and while their cooking skill is solid, they still rely on simple one‑pot recipes to avoid kitchen chaos.
  core: Corey Reid, a 31‑year‑old routine‑obsessed, calm craftsman, balances fast‑food leadership ambitions with solitary hobbies like fishing, woodworking, and classic film marathons, and they meticulously
    budget for a future community eatery.
background:
  cultural: Corey grew up in a modest, working‑class community in Lucas County, Ohio, within a predominantly white Midwestern environment. His family background reflects traditional regional values—hard
    work, self‑reliance, loyalty to family, and active participation in local church and neighborhood events. These cultural influences shape his practical outlook, preference for routine, and his drive
    to provide stability and modest comfort for his married life.
attributes:
  skills: '[''Food preparation'', ''Customer service'', ''Cash handling'', ''POS system operation'', ''Food safety compliance (ServSafe)'', ''Inventory management'', ''Team training'', ''Time management'',
    ''Routine workflow optimization'', ''Basic equipment maintenance'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Gardening'', ''Watching classic movies'', ''Reading DIY manuals'', ''Single‑player video games'', ''Bowling with friends'', ''Community church activities'']'
  career_goals: Corey aims to advance to a supervisory position within his current restaurant chain within the next two years, eventually becoming a shift manager and later a store manager. He plans to
    complete a management training program and obtain a food‑service manager certification. Long‑term, he hopes to save enough to open a small, community‑focused eatery or franchise, where he can apply
    his love of routine, consistency, and reliable service while providing a stable livelihood for his family.
