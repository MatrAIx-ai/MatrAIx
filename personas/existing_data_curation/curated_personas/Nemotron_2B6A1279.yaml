personas:
  professional: Liana Jiang is an aspiring junior astronomer and budding coder who channels their boundless curiosity about space and dinosaurs into building intricate LEGO models and mastering beginner
    coding puzzles, approaching each project with meticulous organization, a healthy competitive streak to outdo their own previous creations, and a calm confidence that rarely wavers.
  sports: Liana Jiang plays on the Queens Soccer Club’s under‑7 team, where they eagerly follow organized drills and revel in friendly competition, while cheering for the New York Knicks during basketball
    season and the New York Mets in summer, and they also enjoy solo bike rides through Flushing Meadows after school, balancing team spirit with personal fitness.
  arts: Liana Jiang immerses themselves in watercolor sessions inspired by Claude Monet’s lily pads, practices delicate calligraphy strokes while listening to Lang Lang’s piano pieces, and creates vibrant
    collages that blend images from Disney’s Moana and traditional paper‑cutting motifs, allowing both classic and contemporary art to shape their creative outlook.
  travel: Liana Jiang loves weekend trips to the American Museum of Natural History to stare at towering dinosaur skeletons, enjoys family outings to Queens Botanical Garden’s spring blossom festivals,
    and dreams of one day exploring the Great Wall of China and the Kennedy Space Center, balancing their parents’ budget‑conscious planning with a vivid imagination that maps each adventure on their sticker‑covered
    travel journal.
  culinary: Liana Jiang delights in helping knead dough for scallion pancakes and shape pork dumplings with their family, proudly assembles their own peanut butter‑banana sandwich for lunch, and often adds
    a sprinkle of shredded mozzarella to a personal pizza, showcasing a budding palate that loves the salty tang of soy sauce, the sweet zest of orange slices, and the comforting melt of cheese.
  core: Liana Jiang is a curious, calm six‑year‑old who balances a competitive love for LEGO building and coding with meticulous organization, occasional vegetable avoidance, and an ever‑growing dream of
    exploring the stars.
background:
  cultural: Liana is a second-generation Chinese-American raised in Flushing, Queens, a vibrant enclave of East Asian culture. She grows up bilingual, speaking Mandarin at home and English at school, and
    celebrates both Chinese traditions—such as Lunar New Year, moon festivals, and family gatherings with dim sum—and American holidays like Thanksgiving. Her family maintains a strong emphasis on education
    and respect for elders, while also encouraging her curiosity and openness to new ideas. This blend of cultural values fosters her appreciation for art, technology, and community, shaping a balanced
    identity that honors her heritage while engaging with the diverse environment of New York City.
