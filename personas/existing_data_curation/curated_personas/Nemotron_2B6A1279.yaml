  career_goals: Liana dreams of becoming someone who creates and explores—she often says she wants to be an astronaut who discovers new worlds, a scientist who solves big mysteries, or an architect who
    designs imaginative spaces. She is eager to combine her love of art and science, envisioning a future where she can design eco-friendly buildings or develop educational games that inspire other children.
    Her calm resilience fuels a determination to excel in school, win science fairs, and eventually pursue a career that lets her turn curiosity into real-world impact.
