personas:
  professional: Jimmy Andrade, a four‑year‑old budding architect, spends hours arranging building blocks with methodical precision, drafting imaginary floor plans on paper and insisting on a strict color‑coded
    system before any play can begin, and they proudly label each tower with a tiny sticker.
  sports: Jimmy Andrade, a fervent little fan, chants for the Chicago Cubs during Sunday TV time, practices with the neighborhood soccer club the Greenfield Gators, proudly wears a miniature New York Knicks
    jersey when playing indoor basketball with friends, and they celebrate each goal with a high‑five.
  arts: Jimmy Andrade, whose creative outlet is drawing characters from Disney's Frozen and humming songs by Taylor Swift, enjoys watching Pixar short films, proudly recites lines from the Sesame Street
    cast, and they love to perform impromptu dances in the living room.
  travel: Jimmy Andrade, an enthusiastic explorer, requests family trips to the Children's Museum of Chicago, longs to see the Eiffel Tower in Paris, thrills at the thought of a beach day at Clearwater,
    Florida, and they keep a colorful map with stickers marking each visited spot.
  culinary: Jimmy Andrade, a picky but adventurous eater, loves mac and cheese with a three‑cheese blend, devours peanut butter and jelly sandwiches, insists on slicing apple wedges with a tiny plastic
    knife, refuses broccoli at the dinner table, and they often ask for extra cheese on everything.
  core: Jimmy Andrade is a meticulous four‑year‑old who organizes toys by size, hoards sticker money, clings to predictable routines, rebukes bedtime delays with a stubborn sigh, and they always double‑check
    that their toy cars are in perfect rows before sleep.
background:
  cultural: Jimmy is raised in a white, middle‑class family in Kalispell, Montana. The local culture emphasizes outdoor recreation, self‑reliance, and close community ties. While his primary cultural identity
    is rooted in the rural Mountain West, his family occasionally incorporates Portuguese and Middle‑Eastern dishes reflecting his surnames, and they celebrate typical American holidays such as Thanksgiving,
    Halloween, and the Fourth of July.
