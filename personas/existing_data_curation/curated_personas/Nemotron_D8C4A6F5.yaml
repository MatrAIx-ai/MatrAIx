personas:
  professional: Cynthia Trent, a postsecondary instructor specializing in interdisciplinary STEAM curriculum development, leverages her quantitative analysis expertise and oil‑painting hobby to craft data
    visualizations that feel like a canvas, while fostering inclusive, small‑group learning environments that reflect a community‑centered work ethic and Southern hospitality.
  sports: Cynthia Trent enjoys low‑impact fitness such as morning walks with the Lake County Birdwatchers Club, a weekly pickleball league at the Winter Garden community center, and avidly follows the Orlando
    Magic during the NBA season, balancing her love for nature with a disciplined routine that includes yoga and occasional volunteer coaching for youth soccer.
  arts: Cynthia Trent, an oil‑painter inspired by Georgia O'Keeffe’s desert landscapes and Frida Kahlo’s vibrant self‑portraits, regularly attends intimate gallery openings featuring local Floridian artists,
    participates in a book club that discusses interdisciplinary titles like The Art of Science, and finds solace in the cello recordings of Yo‑Yo Ma while also appreciating the theatrical works of August
    Wilson.
  travel: Cynthia Trent prefers meticulously planned week‑long trips that blend cultural immersion with relaxation, such as a recent art‑focused itinerary through Florence and Siena, a family reunion beach
    vacation in the Dominican Republic’s Punta Cana, and a seasonal retreat to the historic Savannah, while dreaming of a future study‑tour of the Galápagos to observe hummingbirds in their native habitats.
  culinary: Cynthia Trent, a confident home cook, delights in preparing Mediterranean staples like spanakopita with feta, fresh basil pesto, and grilled branzino drizzled with lemon‑olive oil, often sourcing
    heirloom tomatoes and Kalamata olives from the local farmer’s market, and enjoys occasional dining out at Havana‑inspired Cuban restaurants for a taste of the Caribbean community she embraces.
  core: Cynthia Trent balances her love of data and canvas by turning scientific graphs into artful oil paintings, nurturing hummingbirds in her garden while habitually sipping espresso before yoga, and
    quietly guiding a community of interdisciplinary educators toward inclusive, small‑group learning.
background:
  cultural: Cynthia is a White American of European descent, raised in the Midwest where community involvement and modesty were emphasized. Her upbringing instilled a respect for hard work, education, and
    the arts, leading her to pursue a STEM career while maintaining a lifelong appreciation for visual culture. Relocating to Winter Garden, Florida, she has embraced the region’s Southern hospitality and
    multicultural vibrancy, often engaging with local Latino, Caribbean, and African‑American communities through her teaching and outreach. This blend of Midwestern values, Southern warmth, and exposure
    to diverse cultural expressions shapes her inclusive, collaborative worldview.
attributes:
  skills: '[''Curriculum development'', ''Interdisciplinary STEAM teaching'', ''Research design and quantitative analysis'', ''Data visualization and scientific communication'', ''Grant writing and funding
    acquisition'', ''Learning management system integration'', ''Virtual lab implementation'', ''Academic advising and mentorship'', ''Small-group facilitation and discussion design'', ''Project management
    for interdisciplinary initiatives'', ''Public speaking for academic and community audiences'', ''Community outreach and partnership building'']'
  hobbies: '[''Oil painting'', ''Native Florida gardening'', ''Birdwatching'', ''Reading classic literature and science nonfiction'', ''Attending small art exhibitions and museum talks'', ''Cooking Mediterranean
    cuisine'', ''Yoga and mindfulness meditation'', ''Participating in a local book club'', ''Volunteering for community science outreach'']'
  career_goals: Cynthia aims to expand interdisciplinary education at her institution by establishing a STEAM minor that combines engineering, natural sciences, and visual arts. She seeks a named professorship
    that recognizes her contributions to inclusive pedagogy and curriculum innovation. Over the next five years she intends to secure external grants to fund community‑based science‑art projects in Lake
    County, publish a monograph on interdisciplinary teaching strategies, and mentor a cohort of early‑career faculty to enhance retention and professional growth. She also aspires to develop high‑impact
    online courses that reach a broader audience while preserving her commitment to small‑group, student‑focused learning.
