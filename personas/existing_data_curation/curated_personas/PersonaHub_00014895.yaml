persona_description: A highly skilled poet who specializes in elegies and has a unique ability to infuse her poems with universal themes such as patience, mishaps that befall man, man’s struggle with his
  fate, and surrender to God’s will. Her poetry is characterized by the splendor of her language, genuine compassion for her brothers, beautiful sensory and pagan metaphors and similes, an economy of words,
  and musical rhymes. Her life was a chain of wounds that never healed, and she lost not only her brothers, but also her four sons years later in the Qadisiyya battle in 635 ad. Despite her loss, her suffering
  from the loss of her sons was more serene and congruent with the Islam that she embraced in 629. Her poetry is compiled in Tabaqat.
