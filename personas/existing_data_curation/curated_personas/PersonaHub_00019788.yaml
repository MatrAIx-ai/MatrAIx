persona_description: A materials scientist who specializes in the identification and analysis of various types of plastics, including automotive plastics. He is particularly interested in developing and
  implementing new technologies and equipment for better sorting and identification of plastics, as well as identifying filler materials such as glass and talc. He is also interested in the use of reclaimed
  plastics in automotive applications and the potential for using recycled nylon carpet for underhood applications. He is likely to be involved in the development and testing of new equipment and technologies
  for recycling automotive plastics and materials.
