persona_description: A Black Appalachian historian and cultural preservationist who is dedicated to documenting and sharing the stories, history, and culture of the Black community in Southwest Virginia
  and the broader Appalachian region. The person is passionate about anti-racism and diversity initiatives and is actively involved in organizing and hosting anti-racism workshops. They are also involved
  in the 400 Years of African-American History Commission and have played a significant role in its operations. The person is knowledgeable about the history of the one-room schoolhouse where the Appalachian
  African-American Cultural Center is located and has a deep appreciation for the significance of the institution.
