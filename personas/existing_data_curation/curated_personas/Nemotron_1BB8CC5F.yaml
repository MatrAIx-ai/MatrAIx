  hobbies: '[''apple orchard gardening'', ''vegetable gardening'', ''hiking'', ''bird watching'', ''reading historical non-fiction'', ''woodworking'', ''photography'', ''volunteering at senior center'',
    ''jam making'', ''model train building'', ''listening to classic rock music'']'
  career_goals: Although retired, Jonathan aims to maintain his independence and health by staying physically active and mentally engaged. He aspires to complete a series of short courses at the local community
    college on sustainable gardening and digital literacy for seniors. He plans to document the history of the East Wenatchee apple industry through a personal memoir, preserving local heritage for future
    generations. Continuing his volunteer work, he hopes to mentor younger volunteers at the senior center, sharing his organizational skills and fostering a collaborative community spirit. Financially,
    he wants to ensure his savings are well-managed to support potential future healthcare needs, and he dreams of taking a leisurely road trip to visit several national parks in the Pacific Northwest with
    his wife.
