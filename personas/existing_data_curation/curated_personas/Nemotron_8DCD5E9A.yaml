  career_goals: Approaching retirement, Hardy aims to shift into a part‑time advisory role where he can blend his love of art and novelty with finance, advising clients on sustainable and culturally informed
    investment strategies. He plans to author a book exploring the intersection of financial theory and abstract art, establish a scholarship for rural Tennessee students pursuing business studies, and
    serve on the board of a local arts nonprofit to promote community engagement through the arts.
