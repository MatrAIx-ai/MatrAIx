persona_description: A medical professional with expertise in identifying and assessing the central venous pressure (CVP) and its relationship to the IJV, particularly in the context of assessing patients
  with suspected heart failure or other cardiac conditions. The persona is skilled at visualizing and palpating the IJV and is experienced in using various techniques to identify the top of the pulsations
  and the height of the column of blood. They have a deep understanding of the anatomy and physiology of the neck and chest, and are able to accurately estimate the location of the angle of Louis and the
  vertical distance from the top of the column to the right atrium. They are also adept at using a pen light to accentuate the pulsations and are comfortable with applying gentle pressure to the abdomen
  to elicit Hepatojugular reflux.
