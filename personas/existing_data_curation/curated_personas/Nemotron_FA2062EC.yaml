  career_goals: He aspires to combine his artistic talent with his desire to help others by pursuing a career as an art therapist or community arts program director. In the short term, he plans to enroll
    in a local community college’s visual arts program or obtain a vocational art certification, while continuing to volunteer as a youth mentor at the community center. Long‑term, he hopes to earn a degree
    in counseling with a focus on expressive arts therapy, establishing workshops that foster emotional expression for at‑risk teens in rural Virginia.
