personas:
  professional: A budding community arts advocate, Tawanda Struggs blends self‑taught digital illustration, photography, and peer‑support skills to design therapeutic workshops for at‑risk teens, and they
    channel their compassionate nature and organized yet flexible work style into each project.
  sports: Tawanda Struggs laces up for the Dan River Trail runs each morning, competes on the Virginia Highlands High School cross‑country team, roots for the Virginia Tech Hokies football and the Washington
    Capitals hockey squads, and they occasionally volunteer as an assistant coach for the community’s under‑12 soccer club, treating fitness as a meditative counterbalance to artistic pursuits.
  arts: A budding visual storyteller, Tawanda Struggs immerses in the colors of Claude Monet and Frida Kahlo for inspiration, captures rustic vistas with a Canon EOS M50, listens to Bill Evans’ Kind of
    Blue jazz, Kendrick Lamar’s lyrical flows, and Tasha Cobbs’s gospel choruses, reads Brandon Sanderson’s epic fantasies, and they translate every influence into sketchbook doodles and digital paintings.
  travel: Tawanda Struggs favors low‑cost, itinerary‑free getaways that blend nature and culture, having trekked the Blue Ridge Parkway and explored historic Williamsburg, while dreaming of an art pilgrimage
    to Paris’s Musée d’Orsay and Kyoto’s Arashiyama bamboo forest, and they always budget travel via student discounts and occasional rideshares to stay within a modest allowance.
  culinary: Tawanda Struggs leans toward home‑cooked Southern fare—crisp fried chicken, buttery collard greens, and tangy cornbread—while experimenting with amateur sushi rolls featuring tuna, avocado,
    and soy sauce, and they most relish whipping up earthy beet‑and‑goat‑cheese salads for friends after a long photography outing.
  core: Tawanda Struggs is a tender‑hearted teen who sketches emotions into color, jolts at intense anxiety, finds calm in Dan River walks, and chaotically hoards sketchbooks wherever they go.
background:
  cultural: Tawanda comes from an African‑American family rooted in the rural South of Virginia. His upbringing is shaped by a tight‑knit extended family and a local church that emphasizes communal support,
    storytelling, and music. He grew up with the rhythms of gospel and the modern beats of hip‑hop, and he values the oral tradition of sharing personal experiences. The small‑town environment of Pittsylvania
    County has taught him resilience and a strong sense of community responsibility, while his black heritage informs his perspective on cultural identity, social justice, and the importance of creating
    safe spaces for marginalized youth.
