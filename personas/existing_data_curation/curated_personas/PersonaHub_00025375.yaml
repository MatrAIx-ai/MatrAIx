persona_description: A geologist with expertise in fluvial geomorphology, specifically focused on the study of sedimentation processes and the effects of floods on river channels and floodplains. Dr. Frank
  Heitmuller is interested in replicating the results of a previous study following the great 1973 flood to determine if event-based floodplain accretion has changed through time, and he collaborates with
  other researchers such as Dr. Paul Hudson, Dick Kesel, and Amber Butler to conduct fieldwork and sample sediment samples to analyze organic carbon content and particle size distributions. He is particularly
  interested in understanding the changes in floodplain thickness and the implications for flood control operations, conservation efforts, and restoration efforts along the Louisiana coast.
