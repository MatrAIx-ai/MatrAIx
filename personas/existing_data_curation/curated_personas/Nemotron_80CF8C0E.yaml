personas:
  professional: An efficient front‑desk specialist, Sonya Wilkerson leverages meticulous filing, multi‑line phone mastery, and strict schedule enforcement to keep the office running smoothly, and they are
    actively pursuing a Certified Administrative Professional credential to transition into an office‑manager role where they can codify streamlined processes.
  sports: A low‑key fitness enthusiast, Sonya Wilkerson walks the winding trails of the Kent State Arboretum three times weekly with the Wooster Hiking Club, cheers quietly for the Cleveland Browns on Sundays,
    foregoes high‑intensity gym routines in favor of gentle stretching and herb‑garden yoga, and they find the quiet rhythm of these activities a perfect counterbalance to office stress.
  arts: A cultured aficionado, Sonya Wilkerson devours Agatha Christie mysteries and Hilary Mantel’s historical biographies, enjoys the folk storytelling of Joan Baez, streams classic Meryl Streep films
    on quiet evenings, and they knit to the rhythm of true‑crime podcasts that double as background soundtracks.
  travel: A meticulous planner, Sonya Wilkerson prefers weekend retreats to tranquil locales such as Hocking Hills State Park and the historic streets of Bath, England, books lodging months ahead, avoids
    crowded itineraries, and they allocate a modest budget that balances travel with maintaining her herb garden at home.
  culinary: A practical home cook, Sonya Wilkerson flavors her meals with garden‑fresh herbs, often preparing rosemary‑infused roasted chicken, hearty lentil soup with thyme, and oatmeal breakfast topped
    with sliced apples, while they reserve occasional visits to the local diner for a perfectly crisp cheeseburger.
  core: Sonya Wilkerson is a detail‑driven, solitude‑seeking organizer who channels her Midwestern work ethic into flawless office logistics, disciplined finances, and a quietly ambitious life peppered
    with knitting, garden herbs, and methodical planning.
background:
  cultural: Sonya hails from a midwestern, small‑town upbringing in Ohio, raised in a modest, Protestant family that emphasized self‑reliance, hard work, and community responsibility. While she participates
    in family gatherings and occasional church events, she values personal privacy and quiet, preferring the familiar rhythms of local life in Wooster. Her cultural background reinforces the practical,
    organized, and dependable traits that shape her daily interactions and career aspirations.
attributes:
  skills: '[''Front‑desk operations'', ''Multi‑line phone handling'', ''Scheduling and calendar management'', ''Physical and digital filing'', ''Data entry'', ''Microsoft Office and Google Workspace proficiency'',
    ''Office policy enforcement'', ''Time management'', ''Conflict resolution'', ''Basic bookkeeping'']'
  hobbies: '[''Reading mystery novels'', ''Knitting'', ''Gardening'', ''Crossword puzzles'', ''True crime podcasts'', ''Walking nature trails'']'
  career_goals: Sonya aims to advance from receptionist to office manager within the next few years, seeking a supervisory role where she can implement streamlined processes and efficiency standards. She
    plans to earn a Certified Administrative Professional (CAP) credential and explore additional training in office technology and bookkeeping to broaden her expertise. Her ambition includes achieving
    a stable, higher income to support her family, securing long‑term job stability, and eventually mentoring new clerical staff to uphold the structured, reliable environment she values.
