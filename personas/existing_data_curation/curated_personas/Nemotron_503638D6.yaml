personas:
  professional: Nicole Collier, a budding mini-entrepreneur who runs a meticulously organized pretend lemonade stand at preschool, carefully counts each coin, assigns roles to classmates, and insists on
    a strict schedule for serving customers, reflecting they love structure and a competitive edge.
  sports: Nicole Collier, an energetic preschool soccer participant who practices drills with the same precision they use to line up their toy blocks, proudly wears a Minnesota Twins cap, cheers for the
    Vikings on Sundays, and hopes to join a kids’ gymnastics club to channel their competitive spirit into organized movement.
  arts: Nicole Collier, a budding arts enthusiast who spends afternoons drawing vibrant scenes inspired by Disney’s Frozen and the Sesame Street characters, sings along to the upbeat tunes of the Kidz Bop
    version of Taylor Swift’s ‘Shake It Off’, and proudly displays their hand‑painted thank‑you cards at the annual Minnesota State Fair.
  travel: Nicole Collier, an eager explorer who, after delighting in the family’s organized road trip to the Minnesota State Fair and a weekend stay at the Mall of America’s indoor aquarium, dreams of visiting
    Disneyland’s Fantasyland and the bright lights of New York City’s Central Park, and they keep a carefully plotted itinerary in their scrapbook.
  culinary: Nicole Collier, a modest little chef who loves the creamy comfort of macaroni‑and‑cheese, the sweet bite of strawberry‑filled peanut butter‑and‑jelly sandwiches, and proudly helps stir batter
    for sugar‑sprinkled chocolate chip cookies, often insisting they arrange the food on their plate by color.
  core: Nicole Collier, a four‑year‑old with an uncanny need to line up every toy, a competitive streak that fuels their pretend business ventures, and a persistent worry that makes them double‑check every
    bedtime story page, embodies a tiny but determined blend of order and anxiety.
background:
  cultural: Nicole is raised in a white, middle‑class family in Saint Paul, Minnesota. Her household observes typical Midwestern traditions such as Thanksgiving gatherings, Christmas celebrations with a
    focus on order and family routines, and community participation in the Minnesota State Fair. She attends a local Methodist preschool where emphasis is placed on punctuality, classroom structure, and
    cooperative play. The diverse environment of Ramsey County exposes her to multicultural festivals, but her primary cultural influences are rooted in mainstream American Midwestern values of reliability,
    organization, and community involvement.
attributes:
  skills: '[''following daily routines independently'', ''sorting objects by color and size'', ''building block towers methodically'', ''recognizing letters A‑Z'', ''counting to ten'', ''solving simple
    puzzles'', ''verbal storytelling'', ''organizing play space'']'
  hobbies: '[''building with LEGO DUPLO'', ''sorting and organizing toys'', ''reading picture books with repetitive patterns'', ''playing memory matching games'', ''helping set the dining table'', ''drawing
    and coloring within lines'', ''attending library storytime'', ''making patterned snow angels'']'
  career_goals: Nicole frequently tells adults she wants to be a teacher or a builder when she grows up. She is drawn to roles that involve keeping things tidy, helping others learn, and creating orderly
    spaces. Her imaginative ambition includes becoming a kindergarten teacher who runs a well‑structured classroom or an engineer who designs simple, organized play equipment for children.
