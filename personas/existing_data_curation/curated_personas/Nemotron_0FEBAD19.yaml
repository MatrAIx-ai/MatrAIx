personas:
  professional: A disciplined executive chef in training, Sofiya Lamos leverages precise Southern grilling, smoking, and baking techniques, rigorous inventory control via MarketMan and Toast POS, and ServSafe-certified
    safety protocols to standardize kitchen operations while pursuing Certified Chef de Cuisine credentials and a farm‑to‑table leadership role in Louisville.
  sports: An early‑morning runner and modest yoga practitioner, Sofiya Lamos is a member of the Louisville Bats fan club, follows the Kentucky Wildcats basketball team, and occasionally jogs the University
    of Louisville campus trails with a small group of fellow culinary professionals to maintain stamina for back‑of‑house demands.
  arts: A passionate patron of Southern arts, Sofiya Lamos frequently attends the Actors Theatre of Louisville, listens to bluegrass legends like Ricky Skaggs and modern folk duo The Infamous Stringdusters,
    and collects vintage culinary memoirs by authors such as James Beard, which inspire both menu development and personal reflection.
  travel: Methodical in planning, Sofiya Lamos enjoys weekend getaways to farm‑to‑table destinations like Asheville’s mountain markets, Napa Valley’s boutique wineries, and Kyoto’s fermented food tours,
    always booking boutique B&Bs, mapping out tasting itineraries, and budgeting travel expenses within a dedicated culinary adventure fund.
  culinary: An artisan baker and grill master, Sofiya Lamos perfects sourdough loaves, pecan pies, and smoked pork shoulder using heirloom Kentucky cornmeal, fresh thyme, and locally sourced honey, while
    maintaining a meticulously organized pantry and a habit of cataloguing each recipe with precise measurements and tasting notes.
  core: Detail‑oriented and competitive, Sofiya Lamos balances a relentless pursuit of culinary precision with a quiet, anxiety‑driven inner life that fuels both relentless planning and occasional over‑caffeinated
    late‑night baking sessions.
background:
  cultural: Sofiya was raised in Columbia, a small town in Green County, Kentucky, where Southern hospitality and self‑reliance shape daily life. Her family traditions center around home‑cooked comfort
    foods—fried chicken, biscuits, collard greens, and bourbon‑glazed dishes—reflecting the region’s culinary heritage. Growing up in a predominantly white, close‑knit community, she attended local churches
    and county fairs, where she first tasted the competitive spirit of cooking contests. Her partial college education in culinary arts was pursued at a nearby community college, but family responsibilities
    led her to focus on hands‑on kitchen work. These cultural roots instill in her a respect for locally sourced produce, a pragmatic approach to food preparation, and a strong sense of personal responsibility.
attributes:
  skills: '[''Advanced culinary techniques (grilling, smoking, baking)'', ''Recipe development and standardization'', ''Menu planning and cost control'', ''Inventory management and supply chain negotiation'',
