    ''Basic nutrition and balanced meal design'', ''Catering for small events and private parties'']'
  hobbies: '[''Artisanal baking and recipe journaling'', ''Vegetable gardening and crop rotation'', ''Crossword puzzles and Sudoku'', ''Watching competitive cooking shows and listening to culinary podcasts'',
    ''Participating in local bake‑off and grilling contests'', ''Reading Kentucky agricultural history'', ''Home organization and kitchen tool optimization'']'
  career_goals: She aims to become an executive chef at a well‑regarded farm‑to‑table restaurant in Louisville within the next five years, leveraging her expertise in Southern cuisine and operational efficiency.
    She also plans to earn the Certified Chef de Cuisine credential and win regional culinary competitions to validate her disciplined approach. Long‑term, she hopes to open a boutique catering business
    that emphasizes meticulous menu planning, predictable service quality, and locally sourced ingredients, allowing her to maintain the structure she values while building a reputation for excellence.
