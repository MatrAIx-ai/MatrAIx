  career_goals: Gregory aims to build on his experience as an order clerk to become a logistics coordinator within the next two years, pursuing certifications such as the Certified Supply Chain Professional
    (CSCP) and possibly completing a bachelor's degree in supply chain management. Long term, he envisions a role as an operations manager or warehouse supervisor, leading a team to improve efficiency and
    implement technology‑driven solutions. He also aspires to start a small e‑commerce venture that capitalizes on his logistics expertise while maintaining the flexibility he values.
