  career_goals: Natalia aims to step up from a secretary role to an office manager or executive assistant position within the next three years, seeking certifications such as the Certified Administrative
    Professional (CAP) and an associate degree in business administration. She is interested in gaining experience in remote coordination to enjoy greater flexibility, and she hopes to eventually launch
    her own virtual assistant service that caters to bilingual clients. Her long‑term ambition blends her competitive drive with her love of learning, aspiring to lead a small team while maintaining a work‑life
    balance that respects her need for occasional solitude.
