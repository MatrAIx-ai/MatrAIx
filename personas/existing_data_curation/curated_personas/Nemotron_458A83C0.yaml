personas:
  professional: Michael Mccourry is a retired engineer who now channels his technical expertise and artistic sensibility into community maker workshops, teaching woodworking, electronics, and digital photography
    while casually mentoring high‑school students, guided by a relaxed, curiosity‑driven mindset that prizes flexibility over rigid schedules.
  sports: Michael Mccourry passionately roots for the Baltimore Ravens and follows the Orioles during spring training, while personally staying active through morning walks on the Wicomico wildlife trails,
    occasional senior‑center tai chi sessions, and weekend paddling with a local canoe club on the Chesapeake Bay.
  arts: Michael Mccourry spends afternoons painting watercolors of the Bay inspired by Winslow Homer, curates modest exhibitions at the community gallery featuring local photographers, indulges in folk
    classics by Joan Baez and singer‑songwriters like James Taylor, and captures seasonal change with his DSLR, frequently sharing his images on a neighborhood online board.
  travel: Michael Mccourry favors relaxed, curiosity‑driven trips such as weekend getaways to historic Williamsburg, bird‑watching excursions in the Great Smoky Mountains, and occasional transatlantic voyages
    to the English coast to explore maritime heritage, always planning loosely enough to allow spontaneous stops at farmers’ markets and local art fairs.
  culinary: Michael Mccourry enjoys cooking with fresh herbs from his garden, delighting in classic Maryland crab cakes seasoned with Old Bay, creamy corn chowder, and a summer beet‑goat‑cheese salad, while
    his cooking skill hovers at competent home‑cook level—he loves weekend barbecues but occasionally over‑spices dishes in his enthusiastic quest for bold flavor.
  core: Michael Mccourry is a calm, curious septuagenarian who blends engineering precision with watercolor imagination, trades strict planning for spontaneous creativity, forgets occasional deadlines yet
    never loses the joy of a well‑painted sunrise over the Chesapeake.
background:
  cultural: Michael grew up in a predominantly white, middle‑class family in the Mid‑Atlantic town of Salisbury, Maryland, surrounded by the maritime culture of the Chesapeake Bay. His upbringing blended
    practical, community‑oriented values with the cultural shifts of the 1960s and 1970s, fostering an appreciation for both regional traditions—such as crab feasts, folk festivals, and local history—and
    broader artistic and scientific movements. He identifies with European ancestry (primarily Irish and English) and a modest Protestant background, though his adult life leans toward secular humanism
    and a strong commitment to communal harmony and lifelong curiosity.
