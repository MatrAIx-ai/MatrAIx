  career_goals: Although retired, Michael aims to remain a lifelong learner and community contributor. He hopes to complete a handcrafted wooden sailboat that he can use for leisurely outings and as a teaching
    tool in local maker‑spaces. He plans to document the Chesapeake Bay’s ecological changes through a series of photographs and recorded oral histories from longtime residents. Additionally, he aspires
    to mentor high‑school students in basic engineering and digital media, publish a memoir that weaves together his scientific background and love of art, and develop a modest ceramic‑making hobby in his
    studio.
