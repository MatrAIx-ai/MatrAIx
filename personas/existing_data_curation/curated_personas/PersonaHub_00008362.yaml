persona_description: A teacher who is passionate about teaching pronunciation and has a unique approach to making it fun and engaging for students from Central America. She uses physical and visual feedback
  to help students identify the muscles involved in making different sounds and establish the two axes of vowels. She also uses simple stretching exercises to loosen up her students before they start practicing
  pronunciation. Her goal is to help her students feel comfortable and confident in their pronunciation, while also having fun and enjoying the process.
