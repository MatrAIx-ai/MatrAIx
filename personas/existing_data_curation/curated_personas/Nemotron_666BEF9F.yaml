personas:
  professional: Charlie Braxton is a freelance nonfiction and fiction writer who blends meticulous research with evocative storytelling, harnessing their curiosity and practical eye for detail to produce
    community-focused pieces while navigating the disorganized rhythm of freelance contracts, and they aim to secure literary representation and a writer‑in‑residence position to amplify under‑represented
    voices.
  sports: Charlie Braxton enjoys leisurely walks along Riverside Park trails, participates in the Riverside Hiking Club’s monthly meet‑ups, cheers for the New England Patriots and Hartford Yard Goats from
    the comfort of home, and they keep fit with occasional pickup soccer games and yoga sessions when the weather permits.
  arts: Charlie Braxton immerses themselves in the worlds of contemporary fiction by Sally Rooney, poetry by Langston Hughes, and urban photography inspired by Vivian Maier, while their evenings often feature
    jazz legends like Nina Simone and Miles Davis, and they translate the lyrical cadences they hear into the texture of their own prose.
  travel: Charlie Braxton prefers short road trips to literary hotspots such as Boston’s historic Beacon Hill for book festivals, a weekend retreat at a Cape Cod writers’ colony, and occasional visits to
    New Orleans for jazz immersion, and they balance a modest travel budget with an appetite for culturally rich, off‑the‑beaten‑path experiences.
  culinary: Charlie Braxton delights in cooking soulful meals like smoked paprika roasted chicken, creamy grits, collard green sauté, and caramelized plantain fritters, experimenting with fresh thyme, jalapeños,
    and citrus zest, while they proudly host dinner gatherings for friends and often pair dishes with artisanal craft beers.
  core: Charlie Braxton is a curiosity‑driven, slightly disorganized writer who balances compassion‑filled community work with a love for photography, jazz, and spontaneous culinary experiments, often forgetting
    appointments but never missing a deadline they care about.
background:
  cultural: Charlie was born and raised in Waterbury, Connecticut, to parents whose families migrated north during the Great Migration. His upbringing blends New England’s industrial working‑class culture
    with African‑American traditions of oral storytelling, gospel music, and community activism. He grew up attending a historically Black church, celebrating Black History Month events, and absorbing the
    works of Langston Hughes and Toni Morrison, which inform his writing. While navigating the intersections of his Black identity and a predominantly white regional setting, Charlie remains committed to
    preserving and amplifying the narratives of his local Black community.
attributes:
  skills: '[''Creative writing'', ''Narrative structuring'', ''Copyediting'', ''Research and fact-checking'', ''Interviewing'', ''Community storytelling'', ''Digital publishing (ePub, WordPress)'', ''Social
