  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Urban photography'', ''Walking/hiking in local parks'', ''Participating in small book clubs'', ''Cooking soul food for friends'', ''Listening
    to jazz and R&B'', ''Volunteering at literacy programs'', ''Playing board games'', ''Writing poetry'']'
  career_goals: Charlie aims to publish his first novel—a literary fiction work that weaves Black New England experiences—secure representation, and build a sustainable freelance writing career that supports
    community storytelling initiatives. He hopes to lead writing workshops for local youth, contribute regular columns to the Waterbury newspaper, and eventually become a writer‑in‑residence at a public
    library. He balances his desire for creative freedom with practical financial stability, seeking flexible contracts and self‑publishing opportunities.
