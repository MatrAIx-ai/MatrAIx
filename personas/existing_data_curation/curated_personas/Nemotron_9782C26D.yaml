  hobbies: '[''Drawing and sketching'', ''Creating comic strips and stories'', ''Playing Minecraft and building virtual worlds'', ''LEGO building and model kits'', ''School art club participation'', ''Reading
    fantasy and science‑fiction books'', ''Playing soccer with friends'', ''Learning basic coding with Scratch'', ''Exploring local parks and nature trails'', ''Experimenting with keyboard music'']'
  career_goals: Fredrick dreams of turning his love for art, technology, and teamwork into a career as a multimedia creator—something like a video game designer, animator, or interactive storyteller. He
    envisions working on projects that let his friends and other kids experience adventures together, and later hopes to run community workshops where children can learn to create their own stories, games,
    and art. He also imagines combining his curiosity about science with his creative side, perhaps by designing educational games that make abstract concepts fun and accessible.
