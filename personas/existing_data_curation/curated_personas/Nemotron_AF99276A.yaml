  hobbies: '[''sketching animals and imaginary creatures'', ''building LEGO structures'', ''reading picture books about space and dinosaurs'', ''watching educational nature shows'', ''playing puzzle apps
    on tablet'', ''practicing simple piano scales'', ''collecting and sorting rocks and shells'']'
  career_goals: Although still young, Yaping dreams of exploring the stars one day, envisioning himself as an astronaut who maps new worlds. He also loves the idea of creating immersive video games or interactive
    storybooks where his own drawings become characters. In the long term he imagines blending art and technology as an architect or designer who builds imaginative spaces, and he hopes to keep learning
    new things that let him turn abstract ideas into reality.
