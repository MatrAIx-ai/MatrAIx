personas:
  professional: Energetic young creator, Yaping Ho, combines meticulous LEGO building with detailed animal sketches, treating every toy set and drawing as a mini‑project that they plan out with color‑coded
    instructions and execute with reliable focus.
  sports: Yaping Ho enjoys weekly soccer practice with the neighborhood Tigers Jr. C team, cheering for the local Major League Soccer club Seattle Sounders on Saturdays, and spends chilly winter afternoons
    building a miniature indoor ski slope with LEGOs to stay active.
  arts: Yaping Ho frequently immerses themselves in the colorful world of Eric Carle's picture books, draws inspiration from the animated films of Hayao Miyazaki, and reveres the playful melodies of Disney's
    'Fantasia' while sketching fantastical creatures during quiet afternoons.
  travel: Yaping Ho loves meticulously planning family road trips to destinations like the Grand Canyon National Park and the interactive Children's Museum of Denver, balancing a love for awe‑inspiring
    natural vistas with the comfort of familiar routine, and always insists on bringing along their favorite rock‑collecting pouch.
  culinary: Yaping Ho shows a budding palate for simple yet diverse dishes, eagerly mixing spaghetti with tomato sauce, nibbling on fresh strawberries and cheese cubes, and experimenting with peanut butter
    and banana sandwiches while proudly displaying their ever‑growing collection of shinier cookie cutters.
  core: Yaping Ho is a methodical, imagination‑driven six‑year‑old who fuses LEGO engineering, animal illustration, and relentless curiosity into a quiet yet assertive presence that thrives on routine,
    small‑scale adventures, and a trusty piggy bank.
background:
  cultural: Yaping comes from an East Asian family that celebrates traditions such as Lunar New Year and enjoys home‑cooked dishes like dumplings and stir‑fry vegetables. He hears his parents speak Mandarin
    (or Cantonese) alongside English, giving him a bilingual environment that emphasizes respect, hard work, and curiosity. Living in Mira Loma, California, he blends these cultural values with the diverse
    experiences of his local community, participating in school cultural events and enjoying a mix of Asian and American holidays.
attributes:
  skills: '[''drawing'', ''painting'', ''digital illustration using tablet'', ''storytelling'', ''LEGO building'', ''puzzle solving (jigsaw and logical)'', ''basic arithmetic'', ''early reading comprehension'',
