  career_goals: Beverly aspires to advance to a supervisory or lead position within the warehouse, leveraging her experience to improve operational efficiency while mentoring newer employees. She plans
    to pursue a certification in supply chain or logistics to broaden her career options and enhance her expertise. Long‑term, she hopes to transition into a part‑time community outreach or volunteer coordination
    role that utilizes her sociable and cooperative nature, allowing her to give back to her town while securing a stable retirement and maintaining financial security.
