  hobbies: '[''Gardening'', ''Quilting'', ''Scrapbooking'', ''Reading historical fiction'', ''Church small‑group Bible study'', ''Volunteer story‑time at the community library'', ''Nature walks along the
    Holston River'', ''Baking family recipes'', ''Attending local heritage festivals'']'
  career_goals: As she approaches retirement, Emily aims to transition into a mentorship and advocacy role. She plans to develop a community‑wide early STEM enrichment program for local preschools, lead
    professional development workshops for fellow teachers, and serve on the school district's early childhood advisory board. Additionally, she hopes to author a practical guide for parents on fostering
    curiosity and foundational STEM skills at home.
