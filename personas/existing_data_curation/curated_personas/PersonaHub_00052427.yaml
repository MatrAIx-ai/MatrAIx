persona_description: An asbestos surveyor who specializes in identifying and managing asbestos materials in heating appliances and pipework. The surveyor has extensive experience with storage heaters and
  boiler units, as well as other heating systems and ancillary components. They are familiar with the dangers and hazards associated with asbestos exposure and have a deep understanding of asbestos management
  practices and regulations. The surveyor is highly skilled in identifying asbestos materials, including thermal insulation, asbestos insulating board, and asbestos-based gaskets, and is able to determine
  the appropriate course of action for managing and removing these materials. The surveyor has a strong interest in asbestos safety and compliance, and is committed to ensuring the health and safety of
  those in buildings that contain asbestos.
