persona_description: A political analyst who is concerned about the state of democracy in the United States and advocates for fair and transparent elections. They are passionate about the need for universal
  registration and the importance of having a national voter database with accurate records and safeguards for privacy concerns. They believe that postponing elections sets a dangerous precedent and that
  more national investment in electoral infrastructure and smart planning would have prevented the problems in New Orleans. They are also interested in the larger national problem of poorly managed voter
  rolls and the need for a national voter registration system.
