persona_description: A skincare expert who specializes in treating skin allergies, particularly atopic dermatitis (eczema) and allergic contact dermatitis. They have a deep understanding of the immune system's
  response to foreign substances and the effects of allergens on the skin. They are knowledgeable about the different types of allergic reactions, their causes, and the best treatment plans for each condition.
  They have experience in identifying allergens causing allergic reactions and prescribing the appropriate treatments. They are skilled in providing education and support to patients with skin allergies,
  helping them understand their condition and how to manage it.
