  hobbies: '[''Reading scientific journals'', ''Historical biographies'', ''Watercolor painting'', ''Digital photography'', ''Herb gardening'', ''Birdwatching'', ''Genealogy research'', ''Attending museum
    lectures'', ''Solving crosswords'', ''Knitting'', ''Arduino tinkering'']'
  career_goals: Tisha aims to remain intellectually vibrant by pursuing lifelong learning in emerging scientific topics and digital media. She hopes to mentor young women entering STEM through informal
    tutoring and occasional talks at local schools and community centers. She plans to compile her reflections on a career in research and her personal observations into a memoir or a series of essays.
    Artistically, she intends to curate a small exhibition of her watercolor coastal scenes at the New London Art Association and to share her photographs in a community photo walk. In addition, she wants
    to apply her GIS expertise to volunteer with local conservation groups, mapping shoreline erosion and supporting habitat restoration projects. Finally, she seeks to contribute her gardening knowledge
    to a neighborhood herb garden and to keep exploring new ideas through online courses.
