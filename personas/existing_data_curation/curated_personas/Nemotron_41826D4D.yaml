personas:
  professional: Tisha Ferguson, a retired environmental data analyst, harnesses her expertise in GIS, Python, and statistical visualization to volunteer on shoreline erosion projects, applying her meticulous,
    skeptical mindset and love of solitary research to produce precise, data‑driven reports for Connecticut’s coastal conservation groups.
  sports: Tisha Ferguson enjoys low‑impact fitness by strolling along the Connecticut River for birdwatching, attends New England Patriots games when the team’s schedule aligns with her calendar, and belongs
    to a senior kayaking club that meets monthly at the New London boat launch, while occasionally practicing gentle yoga at the community center.
  arts: Tisha Ferguson expresses her creative soul through watercolor seascapes inspired by Winslow Homer, captures coastal wildlife in digital photographs reminiscent of Ansel Adams’ tonal mastery, attends
    Yale’s museum lectures, and knits scarves with locally sourced Merino yarn, often naming each piece after the bird she observed.
  travel: Tisha Ferguson prefers leisurely train journeys to historic New England towns like Mystic, Boston, and Portland, relishes weekend road trips to Acadia National Park, and dreams of a genealogical
    pilgrimage to the Scottish Highlands, planning each outing loosely to allow spontaneous detours.
  culinary: Tisha Ferguson delights in cooking with fresh herbs from her garden, seasoning grilled salmon with rosemary, simmering classic New England clam chowder with thyme and bay leaf, and crafting
    basil pesto for pasta, while she rarely ventures into fast‑food cuisine and considers a lavender‑infused shortbread her occasional indulgence.
  core: Tisha Ferguson, a 75‑year‑old lifelong learner, blends razor‑sharp analytical rigor with solitary artistic pursuits, navigating retirement with curiosity, a competitive edge, and a relaxed, occasionally
    disorganized lifestyle.
background:
  cultural: Tisha was born in the early 1950s into a middle‑class, Anglo‑American family in suburban New England. Her parents emphasized education and self‑reliance, encouraging her to pursue a STEM degree
    at a liberal‑arts college in the Northeast. Growing up during the social changes of the 1960s and 70s fostered her independent, skeptical outlook and competitive spirit. She has spent most of her adult
    life in the historic coastal town of New London, Connecticut, absorbing the region’s maritime heritage, seasonal festivals, and strong community ties. The New England cultural values of modesty, privacy,
    and a reverence for nature are reflected in her love of quiet, solitary activities, while the area’s vibrant arts scene nurtured her appreciation for painting and photography. Although she identifies
    as white, she is aware of the town’s growing diversity and supports local multicultural initiatives through volunteer work.
