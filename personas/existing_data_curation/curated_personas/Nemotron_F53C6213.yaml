  hobbies: '[''Fishing'', ''Kayaking'', ''Snowshoeing'', ''Cross‑Country Skiing'', ''Green Bay Packers Games'', ''Cooking Mexican Cuisine'', ''Playing Acoustic Guitar'', ''Volunteering at Hispanic Community
    Center'', ''Bilingual Tutoring'']'
  career_goals: Luis aims to progress to a regional operations manager role within the next five years, overseeing multiple facilities across the Midwest. He plans to complement his on‑the‑job experience
    with an online associate degree in Business Administration and certifications in Lean Six Sigma. He also aspires to become a mentor for emerging leaders, fostering a collaborative and inclusive workplace
    culture that reflects his value of harmony. In the long term, Luis envisions launching a family‑owned logistics consultancy that helps small Mexican‑American businesses expand their supply chains nationwide.
