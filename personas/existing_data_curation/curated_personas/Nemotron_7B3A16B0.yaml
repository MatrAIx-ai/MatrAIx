  career_goals: Laura aims to advance to a Director of Operations role within the next three years, acquire a Project Management Professional (PMP) certification, and lead large-scale sustainability initiatives
    that enhance operational efficiency while reducing environmental impact. She is passionate about mentoring emerging female leaders and plans to eventually establish her own consultancy focused on pragmatic,
    innovation-driven process improvement for mid-size enterprises in Southern California.
