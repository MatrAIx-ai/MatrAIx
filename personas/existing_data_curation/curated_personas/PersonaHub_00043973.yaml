persona_description: A safety expert who is knowledgeable about crash avoidance systems and their impact on reducing the frequency and severity of low-speed, rear-end collisions in bumper-to-bumper traffic.
  They are particularly interested in the study conducted by the Highway Loss Data Institute, which found that Volvo XC60s equipped with the City Safety feature are significantly less likely to be involved
  in low-speed crashes compared to other mid-sized SUVs without the system. They are likely to be familiar with the funding source of the study, the Highway Loss Data Institute, which is funded by the auto
  insurance industry.
