persona_description: A biologist who specializes in the study of sensitive biological resources, specifically focusing on oil-sensitive animals and rare plants, and their habitats. They are responsible
  for mapping these resources throughout the study area, prioritizing species based on their rarity, protection status, commercial, recreational, or cultural value, and critical life stages. They also collect
  biological data from local officials and review it, dividing the data into seven elements based on major taxonomic and functional groupings, and mapping them as points, polygons, and lines with unique
  numbers corresponding to associated data tables.
