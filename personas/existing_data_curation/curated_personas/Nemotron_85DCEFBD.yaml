  hobbies: '[''Playing Soccer'', ''Cooking Mexican Cuisine'', ''Community Volunteering'', ''Attending Cultural Festivals'', ''Gardening (cacti and succulents)'', ''Exploring Home Automation Gadgets'', ''Traveling
    to Mexico'', ''Listening to Mariachi and Norteño Music'']'
  career_goals: Luis aims to elevate his career to a regional director role, overseeing multiple distribution centers across the Southwest. He plans to acquire a Project Management Professional (PMP) certification
    to formalize his project leadership credentials. Passionate about representation, he wants to mentor rising Hispanic talent within his industry and eventually launch a consulting practice that helps
    small businesses adopt efficient operational practices. Balancing ambition with his health concerns, Luis also seeks to adopt stress‑management routines that will sustain his high‑achievement lifestyle
    into his later years.
