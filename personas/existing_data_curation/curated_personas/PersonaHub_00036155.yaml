persona_description: A person who is interested in the history of the Latter-day Saints and the Mormon pioneers who settled in the Salt Lake Valley during the 19th century. They are knowledgeable about
  the Church of Jesus Christ of Latter-day Saints, the history of the United States, and the development of the Mormon religion. They are also interested in the physical and religious space that the Mormons
  found in the Great Basin and the struggle they faced with the federal government over their statehood. They are also interested in the history of the Great Salt Lake City and the impact of the Mormon
  pioneers on the development of the city.
