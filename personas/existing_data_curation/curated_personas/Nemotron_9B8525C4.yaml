  hobbies: '[''Hip‑hop dance classes'', ''Pickup basketball at community center'', ''Attending local music festivals'', ''Mentoring youth in trade programs'', ''Cooking soul‑food recipes for family gatherings'',
    ''Participating in truck and car shows'', ''Road trips along the Great Lakes shoreline'', ''Creating social‑media content about life on the road'', ''DIY vehicle maintenance projects'']'
  career_goals: Shedna aims to advance from driver‑sales associate to a logistics coordinator position within the next three years, gaining certifications such as a HazMat endorsement and a Certified Transportation
    Professional (CTP) credential. Long‑term, she envisions launching her own boutique transportation firm that offers flexible, community‑focused freight services in the Midwest. She plans to complete
    an associate degree in supply chain management to strengthen her strategic planning abilities and hopes to mentor younger workers from Flint, helping them enter the trucking industry.
