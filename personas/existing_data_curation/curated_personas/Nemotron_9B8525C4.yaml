personas:
  professional: Shedna Borders, a 22‑year‑old Class A truck driver‑sales associate, blends meticulous pre‑trip inspections and savvy route planning with an outgoing, assertive sales style that lets them
    quickly build client rapport while flexibly adapting to schedule changes, though they sometimes let a relaxed attitude toward paperwork cause minor disorganization.
  sports: Shedna Borders fuels their competitive edge by playing pickup basketball at the Flint community center and dancing in high‑energy hip‑hop classes, cheering on the Detroit Pistons and Michigan
    State Spartans during the season, while they keep a habit of late‑night running along the Lake Michigan shoreline to stay fit despite occasional missed workouts.
  arts: Shedna Borders' weekends are soundtracked by R&B legends like H.E.R. and Anderson .Paak, and they often cite the choreography of Missy Elliott’s videos as inspiration for their own hip‑hop dance
    moves while they unwind by watching Lupita Nyong'o in recent dramas, merging the rhythmic energy of music with their love for storytelling through social media reels.
  travel: Shedna Borders prefers spontaneous road‑trip adventures along Michigan’s shoreline and the Great Lakes coastal routes, documenting each mile on Instagram while balancing weekend getaways to Nashville’s
    music scene and dreaming of a future cross‑country haul to the Pacific Northwest, all constrained by the need to schedule around freight deliveries.
  culinary: Shedna Borders showcases their soulful cooking by mastering Michigan‑style pasties and Southern‑inspired collard greens seasoned with smoked paprika and garlic, often preparing these dishes
    for family gatherings while they indulge in quick street‑food lunches like loaded tacos and Philly cheesesteak sandwiches during breaks between routes.
  core: Shedna Borders blends a truck‑driver’s disciplined logistics mindset with a vibrant social streak, living on the edge of structured routes and impromptu dance battles, all while juggling ambitions,
    occasional financial splurges, and a stubborn habit of forgetting dentist appointments.
background:
  cultural: Shedna grew up in Flint’s close‑knit African‑American community, where church, family, and neighborhood solidarity shaped her identity. She draws pride from the city’s rich musical heritage—Motown,
    soul, and contemporary hip‑hop—and celebrates Black history through local events and cultural festivals. The economic challenges of her hometown have fostered a resilient, community‑oriented outlook;
    she often volunteers at food banks and supports initiatives that provide job training for young Black adults. Her cultural roots influence her cooking, her love of rhythm and dance, and her commitment
    to uplifting others while pursuing her own professional ambitions.
