personas:
  professional: Arlene Charles is an aspiring marine‑life storyteller who blends fantasy reading with hands‑on model‑boat building, sketching oceanic scenes for school projects and dreaming of a future
    career in marine illustration.
  sports: Arlene Charles enjoys low‑pressure coastal activities, such as joining the local junior surf club, cheering for the hometown baseball team the Shoreline Seagulls, and playing beach volleyball
    with a small circle of friends, preferring nature‑centric fitness over competitive sports.
  arts: Arlene Charles immerses themselves in creative expression by drawing kelp forests and mythical sea creatures, listening to folk icons like The Avett Brothers and classic country artists such as
    Dolly Parton while journaling, and drawing narrative inspiration from fantasy authors like Sarah J. Maas and Brandon Sanderson.
  travel: Arlene Charles loves day‑trips along the shoreline, collecting shells at Cape Harmony and exploring tide‑pools at Sunset Cove, while dreaming of snorkeling the Great Barrier Reef and taking a
    family road‑trip to the historic lighthouse on Pine Point, balancing parental permission with school schedules.
  culinary: Arlene Charles prefers simple, ocean‑themed snacks such as dried seaweed, shrimp cocktail, and buttery lobster rolls from the local shack, enjoys making homemade clam chowder with fresh herbs,
    and occasionally experiments with mango‑pineapple smoothies, though they often forget to finish their vegetables at dinner.
  core: Arlene Charles is a solitary, imagination‑driven teen who builds model boats, sketches marine life, hoards shells, and navigates a relaxed, slightly chaotic routine fueled by country‑folk tunes
    and a pocket‑sized dream of ocean exploration.
background:
  cultural: Arlene was raised in Biloxi, Mississippi, within a white Southern family that embraces the Gulf Coast’s distinct cultural mix. Her family participates in local traditions such as the Biloxi
    Seafood Festival, Mardi Gras parades, and church gatherings at a nearby Baptist congregation, fostering a sense of community and hospitality. The coastal environment has shaped her appreciation for
    marine life and seasonal rhythms, while the region’s history of hurricanes has instilled resilience and a practical approach to challenges. Southern cuisine, especially seafood dishes like shrimp and
    crawfish, is a common family staple, and she enjoys sharing these meals during family gatherings. Music ranging from country to blues often fills the household, reflecting the broader cultural tapestry
    of the Gulf Coast. These influences combine to give Arlene a grounded yet inquisitive outlook, balancing respect for tradition with a desire to explore new ideas.
