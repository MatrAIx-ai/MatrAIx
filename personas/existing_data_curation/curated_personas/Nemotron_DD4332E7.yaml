  career_goals: Arlene envisions a future that marries her love of the ocean with her practical mindset. She hopes to study marine biology or environmental science in high school and college, aiming to
    become a marine conservationist who can translate scientific findings into community outreach programs. She also imagines creating a blog or digital platform to share the Gulf Coast’s marine wonders
    with peers, blending her tech skills and storytelling. While she values flexibility and the ability to explore new ideas, she aspires to a career that offers tangible impact, such as working for a local
    aquarium, a coastal research institute, or as an environmental educator in schools. Her ambition includes developing leadership skills that allow her to advocate for sustainable practices in her hometown.
