  career_goals: Gloria aims to cement a lasting compliance culture within her organization by mentoring the next generation of officers, spearheading the adoption of emerging state and federal standards,
    and earning the Certified Compliance & Ethics Professional (CCEP) credential. As she approaches retirement, she envisions transitioning to a part‑time consulting role or board membership for nonprofit
    health organizations, leveraging her expertise to influence broader community impact while maintaining a structured, low‑stress work rhythm.
