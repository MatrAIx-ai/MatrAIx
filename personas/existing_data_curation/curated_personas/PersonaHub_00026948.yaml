persona_description: A sociologist who specializes in the study of immigrant populations and their integration into American society. This person is knowledgeable about the unique historical experience
  of Filipino immigrants due to U.S. annexation of the Philippines in 1899, close historic ties to the U.S. military, and prevalence in health-care professions. This person is also interested in the socioeconomic
  indicators of the LEP population, including geographic distribution, language diversity, and employment. Additionally, this person is interested in the variations among MENA groups on key socioeconomic
  indicators, including employment, immigration pathways, and naturalization.
