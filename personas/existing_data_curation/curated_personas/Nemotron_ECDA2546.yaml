  career_goals: Alisa dreams of becoming a scientist who explores how things work, an astronaut who travels to space, or a teacher who helps other children learn. She is fascinated by asking "why" and loves
    discovering new ideas, yet she also values practical outcomes, so she imagines a future where she can solve real‑world problems for her community, perhaps by inventing helpful tools or caring for animals.
    At her age, she expresses a desire to be a kind, helpful grown‑up who makes people smile and contributes positively to the world.
