  career_goals: Stacy aims to turn her passion for art and community into a career. She envisions attending a specialized arts high school followed by a college program in graphic design or visual communication.
    Long‑term, she dreams of becoming a creative director who blends storytelling with social impact, possibly launching community art workshops that empower youth. She also hopes to travel abroad to study
    diverse art forms and incorporate those influences into her future work.
