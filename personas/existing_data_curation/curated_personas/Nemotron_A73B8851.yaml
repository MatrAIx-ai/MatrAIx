personas:
  professional: Stacy Patel, an aspiring multimedia artist and budding graphic designer, blends a curious eye for detail with a knack for organization to craft vibrant digital illustrations and school theatre
    set designs that reflect both their love for fantasy worlds and their community‑centered sensibility.
  sports: Stacy Patel, a dedicated high‑school soccer player who trains with the school’s varsity team and participates in local club leagues, cheers on FC Cincinnati and the Cincinnati Bearcats basketball
    squad, and complements weekly matches with yoga sessions and weekend hikes in Hocking Hills State Park to stay flexible and energized.
  arts: Stacy Patel immerses themselves in creative expression through sketching, digital painting, and photography, draws inspiration from graphic novel masters like Alan Moore, fantasy filmmakers such
    as Hayao Miyazaki, musicians Billie Eilish and The Strokes, and regularly performs in the school’s drama club while attending exhibitions at the Cincinnati Art Museum and the Contemporary Arts Center.
  travel: Stacy Patel dreams of exploring the lush landscapes of New Zealand’s South Island and the bustling streets of Tokyo, while savoring home‑state adventures like weekend road trips to the Ohio River
    Valley’s wineries, a family visit to Chicago’s museums, and annual summer camping at Hocking Hills, favoring a mix of structured itineraries with spontaneous photo‑walks.
  culinary: Stacy Patel delights in baking experimental desserts, crafting lavender‑infused brownies and matcha cupcakes, while also mastering family‑favorite butter chicken and Midwestern BBQ ribs, skilled
    at combining fresh market herbs with bold spices, though they sometimes over‑mix batter in their enthusiasm for perfect texture.
  core: Stacy Patel, the sketch‑loving soccer enthusiast who balances a passion for fantasy comics, experimental baking, and community theatre, often procrastinates on homework until night‑fall, yet uses
    that pressure to unleash burst‑of‑creative energy in their art.
background:
  cultural: Stacy was raised in a predominantly white, middle‑class neighborhood in Cincinnati, Ohio. Her family celebrates classic Midwestern traditions such as Thanksgiving, Fourth of July barbecues,
    and local community festivals. Because of her Patel surname and extended relatives, she also experiences occasional South Asian cultural practices—helping her family prepare for Diwali, learning a few
    Hindi phrases, and enjoying Indian dishes at family gatherings. This blend of Midwestern American values and occasional South Asian influences shapes her worldview, fostering an appreciation for diversity
    while grounding her in the local community.
