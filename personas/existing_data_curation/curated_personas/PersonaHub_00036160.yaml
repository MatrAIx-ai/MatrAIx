persona_description: 'A historian who specializes in the development of university-affiliated legal education and the role of Transylvania University in the antebellum era. His/her research interests include
  the history of legal education, the impact of legal education on public service, and the role of legal education in securing the integrity of public institutions. His/her expertise lies in the development
  of university-affiliated legal education, particularly in the context of Transylvania University''s law department, which is credited with giving birth to law programs at Indiana University, the University
  of Louisville, the University of Louisiana, and the University of Mississippi. His/her presentation, "Teaching Law and Virtue at Transylvania University: The George Wythe Tradition in the Antebellum Years,"
  is a testament to his/her research and knowledge of the subject.'
