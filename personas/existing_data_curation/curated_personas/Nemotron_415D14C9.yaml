personas:
  professional: Shobha Choudhry, a five‑year‑old budding explorer who loves constructing LEGO cities and asking why, blends natural curiosity with a practical need for tidy, step‑by‑step building routines,
    and they treat each play session like a miniature project, balancing imagination with order.
  sports: Shobha Choudhry practices soccer with the Little Cubs club on Saturday mornings, cheerfully mimics the moves of the local professional team the Metro City Lions, and they balance this active play
    with occasional naps, showing organized enthusiasm while sometimes worrying about missing a game.
  arts: Shobha Choudhry loves drawing bright cartoon animals inspired by Dr. Seuss and listening to children’s music by Raffi, especially Baby Beluga, using crayons to create ordered galleries on the fridge,
    while they sometimes become upset when a masterpiece is accidentally crumpled.
  travel: Shobha Choudhry enjoys family outings to the nearby children’s museum and a weekend trip to the seaside town of Oceanview, dreams of visiting Disney World in Orlando, and they carefully pack a
    small backpack with a favorite stuffed bear, balancing excitement with the anxiety of missing a familiar routine.
  culinary: Shobha Choudhry loves pizza with extra cheese, peanut butter and jelly sandwiches, and carrots, and they enjoy helping Mom bake chocolate‑chip cookies using vanilla extract and a sprinkle of
    cinnamon, though they occasionally sneak extra chocolate chips into the dough as a secret treat.
  core: Shobha Choudhry is a meticulous, inquisitive five‑year‑old who balances curiosity with order, worries about small setbacks, and finds comfort in routine, creativity, and the occasional treat.
background:
  cultural: Shobha comes from a South Asian family that blends Indian and Bengali cultural traditions. At home she hears Hindi and Bengali phrases alongside English, celebrates festivals such as Diwali
    and Eid with lights, sweets, and traditional foods, and participates in communal gatherings that emphasize respect, harmony, and generosity. Growing up in Princeton Junction, New Jersey, she experiences
    a multicultural community and school environment, allowing her to integrate her heritage with American customs while maintaining strong family bonds.
