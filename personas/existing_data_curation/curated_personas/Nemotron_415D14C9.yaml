  career_goals: Shobha often talks about wanting to become a teacher who creates organized yet fun lessons, a nurse who cares for people with gentle hands, and a curious scientist who explores animals and
    nature. She imagines blending her love of drawing with teaching, using colorful visuals to help classmates learn. She also hopes to keep her family’s cultural traditions alive while discovering new
    ideas, showing her balance of curiosity and practicality.
