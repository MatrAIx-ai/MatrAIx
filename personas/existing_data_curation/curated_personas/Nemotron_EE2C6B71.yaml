personas:
  professional: Susie Rice, a seasoned psychologist with over thirty years of clinical practice, leverages meticulous assessment skills, CBT and DBT expertise, and a culturally attuned, trauma‑informed
    approach while balancing a structured work ethic with a flexible, community‑focused mindset.
  sports: Susie Rice enjoys daily walks along the Lake Abilene trails as part of the local Senior Walking Club, follows the Dallas Cowboys and Texas Rangers for seasonal excitement, and participates in
    a weekly pickleball group at the community recreation center, using these activities as both social outlets and gentle fitness routines.
  arts: Susie Rice blends her love for quilting with a vibrant church choir role, often humming along to gospel classics by Mahalia Jackson and contemporary soul tunes by Alicia Keys while attending local
    art shows featuring Texas folk painters like Wilmer M. Smith and collecting handcrafted quilts from regional artisans.
  travel: Susie Rice prefers relaxed road‑trip itineraries that blend visits to historic Southern cultural museums like the Texas State History Museum with cherished get‑aways to the Hill Country vineyards
    near Austin, planning most details on the fly while reserving a few boutique B&B stays for comfort.
  culinary: Susie Rice, an adept home cook, delights in preparing soul‑food staples like collard greens seasoned with smoked turkey, baked sweet potatoes topped with cinnamon‑brown sugar, and a hearty,
    spice‑laden gumbo featuring okra and fresh herbs from her garden, often pairing meals with homemade peach cobbler for family gatherings.
  core: Susie Rice balances a structured, evidence‑based therapeutic practice with a delightfully improvisational home life filled with hummingbirds, quilting projects, and spontaneous choir performances,
    all while juggling occasional bill‑pay forgetfulness and a steadfast commitment to community well‑being.
background:
  cultural: Susie was raised in a close‑knit African‑American family in Texas, where church, storytelling, and community service were daily cornerstones. Her grandparents instilled a strong sense of resilience
    and pride in the Black experience, teaching her to honor traditions such as Juneteenth celebrations and gospel music. This heritage informs her therapeutic style; she weaves cultural humility and an
    awareness of historical trauma into her practice, ensuring clients feel seen and understood within their cultural context. Deeply connected to the South‑Texas Black community, she participates in local
    cultural festivals, mentors young Black professionals, and advocates for greater representation of African‑American voices in mental‑health policy.
attributes:
  skills: '[''Clinical assessment'', ''Cognitive-behavioral therapy (CBT)'', ''Dialectical behavior therapy (DBT) basics'', ''Group therapy facilitation'', ''Family and couples counseling'', ''Trauma-informed
    care'', ''Crisis intervention'', ''Psychological testing and interpretation'', ''Program development for community mental health'', ''Cultural competency in African American and Latino populations'',
    ''Supervision and mentorship of trainees'', ''Public speaking and workshop facilitation'']'
  hobbies: '[''Gardening (roses and native Texas plants)'', ''Quilting'', ''Cooking Southern and Soul Food'', ''Church choir and gospel music'', ''Walking and birdwatching at Lake Abilene'', ''Reading historical
    fiction and memoirs'', ''Volunteering at community youth centers'', ''Yoga and mindfulness meditation'', ''Traveling to African American heritage sites'', ''Attending local art and craft fairs'']'
  career_goals: Susie aims to expand her private practice in Abilene by incorporating a hybrid model of in‑person and telehealth services, allowing her to reach underserved rural clients. She is passionate
    about creating culturally tailored mental‑health workshops for African‑American families and hopes to secure funding for a community wellness center that offers counseling, support groups, and psycho‑educational
    events. Over the next five years, she plans to mentor at least ten early‑career psychologists, contribute a chapter to a textbook on culturally responsive therapy, and eventually serve as the director
    of mental‑health services for Taylor County’s public health department, where she can shape policy and improve access to care.
