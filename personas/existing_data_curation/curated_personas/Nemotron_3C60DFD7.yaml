  career_goals: Nicholas aspires to a future career where he can combine his love for helping others with his methodical, organized approach. He envisions becoming a school counselor or child psychologist,
    aiming to support students' emotional health, guide them through challenges, and foster a harmonious learning environment. To achieve this, he plans to maintain strong academic performance through high
    school, take advanced courses in psychology and social sciences, and later pursue a degree in counseling or educational psychology. Long‑term, he hopes to earn a graduate degree and work in a school
    setting, providing mentorship and mental‑health support to his peers.
