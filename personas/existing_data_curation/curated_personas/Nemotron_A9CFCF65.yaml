personas:
  professional: Cara Will, a 34‑year‑old landscape architect, blends meticulous site analysis with advanced BIM and GIS tools to craft climate‑resilient public spaces, leveraging a competitive drive to
    win design awards while leading collaborative workshops that showcase their sociable flair, and constantly checks project milestones to soothe a worry‑prone mind.
  sports: Cara Will stays active by hiking with the Miami Beach Trailblazers Hiking Club, cycling in the Coral Gables Cyclists group for high‑intensity cardio, cheering the Miami Heat and Tampa Bay Rays,
    and channeling a competitive edge into the city’s co‑ed ultimate frisbee league while balancing recovery with yoga.
  arts: Cara Will nurtures a love of contemporary expression by photographing immersive installations by Refik Anadol, assisting at community art workshops that explore Yayoi Kusama’s polka‑dot aesthetics,
    and attending live gigs by The Strokes and Norah Jones at Miami’s historic Fillmore, integrating those artistic sparks into their design narratives.
  travel: Cara Will plans each escape with a detailed spreadsheet, alternating weekend visits to Florida’s Bok Tower Gardens and Savannah’s historic Forsyth Park with annual pilgrimages to Monet’s Giverny
    and the Royal Botanic Gardens, Kew, balancing a modest travel fund with a deep desire for botanical inspiration.
  culinary: Cara Will, an enthusiastic home cook, regularly prepares Mediterranean dishes such as ratatouille, Greek moussaka, and seafood paella, layering flavors with extra‑virgin olive oil, sun‑dried
    tomatoes, fresh basil, and occasional Floridian herbs, treating each meal as a creative experiment that mirrors their design process.
  core: Cara Will, a competitively driven yet anxiety‑prone landscape architect, transforms a love for art and native flora into climate‑smart designs, while battling a habit of obsessively checking emails
    late at night and reserving a nightly ten‑minute phone‑free mindfulness pause.
background:
  cultural: Cara grew up in a middle‑class white family in central Florida, where outdoor activities and appreciation for natural beauty were integral parts of her upbringing. Her parents encouraged curiosity
    and education, leading her to pursue a STEM degree at the University of Florida. The blend of Southern hospitality, a strong work ethic, and a regional emphasis on environmental stewardship shapes her
    values. Living in DeLand’s college‑town atmosphere, she enjoys a community‑oriented lifestyle while maintaining an individualistic drive for professional achievement.
