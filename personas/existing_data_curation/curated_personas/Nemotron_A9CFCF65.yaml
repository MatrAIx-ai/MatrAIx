  career_goals: She aims to become a principal landscape architect within the next five years, leading a boutique firm that specializes in climate‑adaptive public spaces for coastal Florida. Cara seeks
    to earn LEED AP and FLALA certification, win regional design awards, and influence local land‑use policy through research and advocacy. Ultimately, she envisions publishing a monograph on integrating
    art and ecology in urban landscapes and mentoring emerging designers, while balancing her drive for excellence with strategies to manage stress.
