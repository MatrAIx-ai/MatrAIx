persona_description: A cybersecurity professional who is committed to protecting the personal data and online experiences of students, faculty, and staff. They are knowledgeable about the various forms
  of cybercrime, such as identity theft, stalking, bullying, hacking, financial fraud, email spoofing, information piracy, and forgery. They prioritize the use of security software, automatic software updates,
  and protective measures for all devices that connect to the internet. They understand the importance of keeping a clean machine, protecting personal information, and connecting with care online. They
  are aware of the dangers of careless cyber security and the potential impact on others, especially when computers are networked. They are proactive in following the National Cyber Security Alliance's
  recommendations to safeguard their information and minimize the chances of being targeted by cybercriminals.
