  hobbies: '[''Bridge card game'', ''Gentle yoga and Tai Chi'', ''Community gardening'', ''Traditional South Asian cooking'', ''Reading historical fiction'', ''Walking groups in Queens'', ''Attending cultural
    festivals and potluck gatherings'']'
  career_goals: Although retired, Rabina aims to leave a lasting impact on her community. She is committed to mentoring young South Asian women interested in STEM, offering informal tutoring and career
    guidance. She hopes to establish a modest scholarship fund for local high‑school girls pursuing science and engineering. Rabina also plans to compile a memoir of her immigrant experience and professional
    journey, preserving family history for future generations. Finally, she wishes to continue expanding her digital skills, particularly learning photo‑editing and online archival tools to document community
    events.
