  career_goals: Moranda aims to transition into a Lead Software Architect role where she can shape enterprise‑scale systems with a focus on reliability, security, and inclusive design. She aspires to establish
    a mentorship program within her organization that specifically supports women of color in technology, fostering a pipeline of diverse talent. Over the next five years, she hopes to achieve a senior
    engineering position that balances strategic technical leadership with a predictable, structured work environment, allowing her to maintain work‑life balance while continuing to contribute to community
    outreach initiatives in Kansas City’s tech ecosystem.
