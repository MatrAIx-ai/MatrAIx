    Design'', ''Hand Sketching'', ''3D Visualization'', ''Project Feasibility Analysis'', ''Community Engagement and Stakeholder Facilitation'']'
  hobbies: '[''Watercolor Painting'', ''Hand Sketching'', ''Photography'', ''Reading Caribbean Literature'', ''Cooking Dominican Cuisine'', ''Yoga'', ''Rooftop Gardening (tropical plants)'', ''Participating
    in Community Mural Projects'', ''Improvisational Dance'', ''Exploring VR Art Installations'', ''Experimenting with AI-augmented Design Tools'']'
  career_goals: Mariana aims to establish a boutique studio that focuses on affordable, eco‑friendly housing for the Dominican community in Hudson County, integrating Caribbean vernacular elements with
    modern sustainable practices. She aspires to become a recognized thought leader in culturally‑responsive architecture, publish a guidebook on Caribbean‑inspired sustainable design, and mentor emerging
    architects, especially women and minorities. Over the next five years, she plans to acquire LEED‑AP certification, expand her portfolio of community projects, and collaborate with local NGOs to promote
    resilient, inclusive urban development.
