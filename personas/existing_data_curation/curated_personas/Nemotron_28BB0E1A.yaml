personas:
  professional: Mariana Davila, a seasoned architect renowned for sustainable and culturally-responsive design, blends structural engineering expertise, BIM coordination, and parametric modeling to craft
    fluid, unconventional forms, yet they often grapple with organization and deadlines due to a spontaneous mindset.
  sports: Mariana Davila stays active through daily yoga, weekend paddle‑boarding on the Hudson River, and participation in the Hoboken Community Softball League, while they enthusiastically support the
    New York Giants, Yankees, and Knicks, yet they often let the seasonal chill deter them from fall jogging.
  arts: Mariana Davila channels their love for urban skylines into watercolor and hand‑drawn studies while listening to Juan Luis Guerra’s merengue and Romeo Santos’s bachata in the kitchen, drawing artistic
    inspiration from James Turrell’s light installations and Edward Hopper’s cityscapes, and they regularly explore VR gallery experiences featuring works by Refik Anadol.
  travel: Mariana Davila favors culturally immersive trips that blend solo exploration with small‑group workshops, having visited San Juan, Cartagena, and Lisbon, while they dream of exploring Tokyo’s design
    districts and Copenhagen’s sustainable housing projects, yet their spontaneous streak often leads to last‑minute itinerary changes that challenge their budgeting.
  culinary: Mariana Davila delights in preparing traditional island dishes such as sancocho, mofongo, and asopao de pollo, skillfully combining plantains, yucca, and cilantro while listening to merengue
    beats, and they often experiment with tropical herbs like culantro, though they occasionally over‑season in their enthusiasm for bold flavors.
  core: Mariana Davila, a curious architect who blends sustainable design with Caribbean‑inspired artistry, balances a disciplined yoga practice and community mentorship with a tendency to misplace project
    files and indulge in spontaneous culinary experiments.
background:
  cultural: Mariana grew up in a close‑knit Dominican family that later settled in West New York, a hub of Dominican diaspora culture. Her upbringing blended vibrant Caribbean traditions—music, oral storytelling,
    and the colourful aesthetics of island architecture—with the multicultural urban environment of Hudson County. These roots inform her design sensibility, prompting her to incorporate warm, earthy tones,
    courtyards, and natural ventilation reminiscent of Dominican vernacular homes into her projects. She remains actively involved in local cultural events, such as the Dominican Parade and community workshops,
    and draws inspiration from the resilience and communal spirit of her heritage while navigating her professional identity as a Dominican woman architect in the United States.
attributes:
