  hobbies: '[''Reading non-fiction'', ''Yoga and meditation'', ''Coffee brewing (pour‑over)'', ''Cooking Guatemalan cuisine'', ''Nature walks/hiking'', ''Journaling'', ''Photography'', ''Language learning'',
    ''DIY home organization'']'
  career_goals: Soraya aims to move from her current hostess role to a shift supervisor position within the next year, then advance to restaurant manager. She plans to enroll in a hospitality management
    certificate program and earn a certified barista credential. Ultimately, she envisions opening her own upscale coffee shop that highlights Guatemalan beans and offers a calm, structured atmosphere where
    she can apply her organizational strengths and foster a community centered on quality and quiet enjoyment.
