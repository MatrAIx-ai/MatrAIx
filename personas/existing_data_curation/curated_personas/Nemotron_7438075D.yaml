personas:
  professional: Soraya Muniz is a high‑volume hospitality professional whose meticulous organization and disciplined mindset make her the go‑to hostess for seamless reservations and seating logistics, and
    they leverage bilingual fluency and POS expertise to train new staff while maintaining polished customer service.
  sports: Soraya Muniz enjoys low‑impact fitness, taking regular walks through Griffith Park and jogging on the Farm Vista Trail, supports the Los Angeles Lakers and Dodgers as a dedicated fan, and participates
    in a weekend yoga class at a local studio rather than competitive team sports.
  arts: Soraya Muniz cultivates a quiet artistic side by photographing the interplay of light and architecture in downtown LA, curating an Instagram feed inspired by Gregory Crewdson and Edward Hopper,
    and listening to the soothing piano works of Ryuichi Sakamoto and the vocal warmth of Norah Jones during evening brewing sessions.
  travel: Soraya Muniz prefers meticulously planned, low‑stress escapes, having explored the coffee farms of Colombia’s Antioquia region, the historic streets of Antigua, Guatemala, and the serene hiking
    trails of Lake Tahoe, while they keep a travel bucket list that includes a solitary retreat to a Japanese ryokan for a language‑immersion stay.
  culinary: Soraya Muniz delights in perfecting pour‑over coffee with a Hario V60, experimenting with beans from Guatemala’s Antigua region, and cooking traditional dishes such as pepian and kak'ik, often
    seasoning with roasted Guatemalan cacao and fresh cilantro, while their kitchen skill level hovers between confident home chef and aspiring culinary artist.
  core: Soraya Muniz blends disciplined organization, a love for quiet solitude, and a passion for coffee culture into a structured, goal‑driven life, punctuated by a habit of over‑booking their schedule
    and an occasional binge on espresso‑laden nights.
background:
  cultural: Soraya is the daughter of Guatemalan immigrants who settled in Los Angeles. Raised in a bilingual household, she speaks Spanish fluently and values the strong family ties, hospitality traditions,
    and reverence for food and coffee that characterize Guatemalan culture. She celebrates cultural holidays such as Día de la Independencia and incorporates traditional recipes into her cooking. Her heritage
    informs her appreciation for high‑quality coffee, which fuels her ambition to showcase Guatemalan beans in her future café, while her upbringing in a diverse urban environment has cultivated an adaptable
    yet grounded worldview.
