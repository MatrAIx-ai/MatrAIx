personas:
  professional: Antonio Madrid is a bilingual, self-taught handyman; they leverage their practical curiosity and calm demeanor to repair homes, restore vintage radios, and volunteer by teaching basic carpentry
    and traditional cooking techniques at a local community hub, while keeping detailed records of their family’s stories and recipes.
  sports: Antonio Madrid follows the Houston Astros in baseball and the Houston Rockets in basketball with quiet enthusiasm; they participate in the Lake Houston Anglers Club for seasonal fishing trips
    and occasionally watch the Houston Dynamo matches on TV, favoring solitary or small-group physical activities over competitive sports.
  arts: Antonio Madrid regularly enjoys the timeless folk ballads of Alejandro Delgado, the stirring marimba compositions of highland ensembles, and classic Mexican movie performances by Pedro Infante;
    they also watch Ken Burns documentaries and appreciate the vibrant canvases of Frida Kahlo, all of which feed their quiet curiosity and reflective nature.
  travel: Antonio Madrid prefers low-key, self-planned road trips, having explored Galveston’s historic waterfront and the tranquil fishing spots of Lake Conroe; they dream of a culturally immersive visit
    to the colonial streets of Granada, Spain, and the historic plazas of Antigua, Guatemala, balancing a modest budget with a desire for quiet discovery.
  culinary: Antonio Madrid delights in crafting traditional family recipes such as arroz con pollo seasoned with cumin and achiote, hand-pressed corn tortillas topped with refried beans and fried eggs,
    and sweet plantain fritas; they apply their solid cooking knowledge to nourish gatherings while occasionally over-salting a stew when caught up in a puzzle.
  core: Antonio Madrid is a solitary, pragmatically curious retiree; they balance meticulous home-repair projects, frugal financial habits, and a penchant for over-salting their beloved arroz con pollo,
    all while quietly preserving their family’s stories and traditions.
background:
  cultural: Antonio grew up in a modest Honduran family, speaking Spanish at home and celebrating cultural traditions such as Semana Santa and the Feria de San Isidro. After immigrating to the United States
    in his early twenties, he settled in Houston, where he maintains close ties to the Honduran diaspora through church, community festivals, and cooking family meals. His cultural identity blends Central
    American customs with the multicultural fabric of Houston, influencing his cuisine, language, and values of family loyalty, hard work, and modest religious observance.
