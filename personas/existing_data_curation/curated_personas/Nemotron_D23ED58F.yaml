  career_goals: John aspires to turn his creative passions into a professional career. He dreams of studying visual arts or graphic design at a specialized high school and later at an art institute, aiming
    to become a concept artist for video games or a freelance illustrator. He also envisions writing and illustrating his own graphic novels. In parallel, he hopes to develop a small YouTube channel that
    showcases his artwork, music covers, and storytelling, eventually monetizing it while using the platform to connect with a broader creative community. He is mindful of his tendency toward worry, so
    he sets a personal goal of learning stress‑management techniques and possibly studying psychology to better understand emotion, which could inform his art.
