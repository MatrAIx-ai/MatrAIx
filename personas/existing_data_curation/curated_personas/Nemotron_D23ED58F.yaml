personas:
  professional: John Mier, an aspiring digital illustrator and budding indie game developer, channels their boundless imagination and love for abstract concepts into vibrant character designs using Procreate
    and Scratch, while their laid‑back attitude toward deadlines sometimes results in unfinished projects and late‑night bursts of creativity.
  sports: John Mier, a regular member of their high school basketball club and a fervent supporter of the Chicago Bulls and Chicago White Sox, spends weekends shooting hoops at the nearby community center
    and attending games with friends, though they occasionally miss practice when overwhelmed by homework stress.
  arts: John Mier, an enthusiastic participant in their school's drama club and a frequent visitor to the Art Institute of Chicago, draws inspiration from creators like James Jean, Neil Gaiman, and the
    video game Celeste, and channels that energy into composing acoustic guitar ballads, sketching lakeside vistas, and posting illustrated sci‑fi short stories on their school blog.
  travel: John Mier prefers spontaneous, low‑budget excursions that blend art and nature, having taken weekend trips to the Milwaukee Art Museum and Lake Michigan's lakeshore, dreaming of attending New York
    Comic Con and a future cultural tour of Kyoto, while they often leave itineraries vague to accommodate impromptu sketch‑sessions.
  culinary: John Mier, a self‑described snack enthusiast, gravitates toward pepperoni pizza with extra mozzarella, avocado‑feta salad, and experimental midnight ramen featuring miso broth, soy sauce, and
    soft‑boiled egg, though they frequently leave half‑eaten plates on the counter while they dive back into digital drawing.
  core: John Mier is a creatively restless teen who blends sketching, guitar riffs, and indie gaming into a colorful daily swirl, but they often procrastinate on obligations, worry excessively, and leave
    a trail of half‑finished projects behind.
background:
  cultural: John grew up in Waukegan, a diverse lakeside city in Lake County, Illinois, steeped in the Midwestern values of community, modesty, and a practical outlook. His family’s white, middle‑class
    background includes parents who work in the local manufacturing and education sectors. The proximity to Chicago exposes him to a rich cultural scene, from art museums and theater to live music, which
    fuels his creative interests. Local traditions such as summer lake outings, community picnics, and support for high school sports shape his social life. While his household emphasizes independence and
    self‑reliance, the multicultural environment of Waukegan also offers him a broader perspective on art and storytelling.
