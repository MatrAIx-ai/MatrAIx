persona_description: A researcher and policy analyst with expertise in the use of agent-based models to study social norms and their impact on group behavior. They are particularly interested in how social
  norms can shift and influence group behavior in complex social networks, and how targeted interventions can alter these norms. They have conducted empirical research in various domains, including the
  diffusion of new agricultural technologies and shifts in smoking behavior, and they are skilled in analyzing the long-run dynamical behavior of agent-based models to understand how social norms and group
  behavior are influenced. They have a strong interest in using social norms to inform policy analysis and have published papers on the topic.
