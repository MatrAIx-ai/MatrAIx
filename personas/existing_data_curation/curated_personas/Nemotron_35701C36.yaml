  career_goals: Although officially retired, Patricia aims to channel her engineering expertise into community service. She aspires to mentor high‑school girls and under‑represented students through a local
    STEM outreach program, serve on the board of a nonprofit that promotes sustainable building practices, and complete a series of online courses on green architecture. She also hopes to publish a memoir
    that chronicles her experiences as one of the early women in a male‑dominated field, thereby preserving a legacy that can inspire future generations.
