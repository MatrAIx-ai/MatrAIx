personas:
  professional: Marcelo Marchena, a budding junior esports competitor, channels his strategic curiosity and competitive edge into mastering Mario Kart and building collaborative Minecraft servers, even
    though his practice schedule often bends to his relaxed, flexible attitude.
  sports: Marcelo Marchena, a member of the Meadowbrook Youth Baseball League, idolizes the New York Yankees, practices pitching and fielding at the local park on weekends, and balances his love of baseball
    with brief cardio jogs to stay fit.
  arts: Marcelo Marchena, an enthusiastic comic creator, draws superhero stories inspired by Spider‑Man and Captain America while listening to reggaeton hits by Bad Bunny, Daddy Yankee, and salsa classics
    from Marc Anthony, letting music fuel his artistic bursts.
  travel: Marcelo Marchena enjoys spontaneous nature walks through the Meadowlands, has explored the nearby state aquarium, and dreams of a family trip to the Grand Canyon and a Disney adventure in Orlando,
    preferring day trips over long‑term planning.
  culinary: Marcelo Marchena loves helping his grandmother prepare tamales and arroz con pollo, idolizes the aroma of cumin and cilantro, and experiments by topping his own pizza with pineapple and jalapeños,
    though he often leaves a trail of flour on the kitchen floor.
  core: Marcelo Marchena is a competitive 9‑year‑old gamer, LEGO builder, and comic artist who balances curiosity with a carefree, sometimes disorganized streak, feels intense emotions, and channels his
    energy into gaming, baseball, and family cooking.
background:
  cultural: Marcelo is a first‑generation Puerto Rican American who grows up in a bilingual household in Collingswood, New Jersey. He celebrates holidays such as Three Kings Day and Puerto Rico’s Día de
    la Constitución, eats dishes like arroz con gandules and pasteles with his family, and participates in community events at the local cultural center. His cultural identity shapes his love for music,
    dance, and food, and he often shares Spanish words with his friends while navigating school life.
