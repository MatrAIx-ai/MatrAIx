  career_goals: He dreams of one day designing video games that let players solve puzzles in creative ways, hopes to become the captain of his school’s baseball team, and imagines studying engineering or
    computer science in high school to turn his curiosity into real‑world inventions. Marcelo also expresses a desire to keep his family’s cultural traditions alive, perhaps by creating a cooking show for
    kids that mixes technology and Puerto Rican cuisine.
