  career_goals: As James approaches retirement age, his primary goal is to transition from full‑time labor to a supervisory and mentorship role. He aims to become a licensed foreman or site safety coordinator,
    obtain OSHA 30‑hour certification, and possibly start a modest subcontracting business focusing on home repair and renovation projects. He also wishes to secure a stable income through part‑time work
    that allows him to support his family's long‑term financial security and give back to his community through volunteer construction projects.
