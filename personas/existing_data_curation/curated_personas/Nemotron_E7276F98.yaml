personas:
  professional: James Burkett, a veteran construction professional with three decades of hands‑on experience in residential and light commercial projects, leverages their meticulous blueprint interpretation,
    OSHA‑compliant safety oversight, and heavy‑equipment expertise to mentor younger crews while maintaining the structure and predictability they value, often double‑checking plans and inventory before
    every job.
  sports: James Burkett, a devoted supporter of the Ole Miss Rebels and a regular participant in the Mississippi River Fishing Club, spends weekends hunting deer with the local Deer Hunters Association,
    attending high school football games, and maintaining a modest fitness routine of early‑morning walks along the Chickasawhay River, all while cheering for the New Orleans Saints during the NFL season,
    and they relish the camaraderie of post‑game gatherings at the local bar.
  arts: James Burkett, a lover of Southern folk music and classic western cinema, often listens to Willie Nelson, Johnny Cash, and the storytelling of John Wayne while perusing local history books by regional
    authors, attends community theater productions featuring classic plays, and appreciates the paintings of Thomas Hart Benton, finding these artistic touches woven into their weekend gatherings and church
    choir performances, and they often share their favorite tracks with friends over a cold brew.
  travel: James Burkett, an avid road‑trip planner who favors scenic drives and modest campgrounds, has explored the Great Smoky Mountains, taken a fishing charter to the Florida Keys, and enjoyed the music
    heritage of New Orleans, while dreaming of a future visit to Yellowstone’s geysers and a historic tour of Williamsburg, always budgeting trips to fit their retirement income and family commitments,
    and they keep a weather‑worn travel journal documenting each stop.
  culinary: James Burkett, a competent backyard chef who blends garden‑fresh produce like heirloom tomatoes, sweet potatoes, and rosemary into Southern staples such as smoked brisket, collard greens, and
    buttery cornbread, also experiments with home‑brewed IPAs featuring citrus hops, and occasionally over‑seasones dishes in enthusiasm for bold flavors, and they proudly serve their creations to neighbors
    at potluck gatherings.
  core: James Burkett blends hands‑on craftsmanship, community devotion, and a pragmatic love of the outdoors into a steady, structured life, and they punctuate it with occasional over‑indulgence in home‑brewed
    beer and garden‑fresh chili.
background:
  cultural: James grew up in a small, tightly‑knit town in north‑central Mississippi, steeped in Southern traditions and the values of the Bible Belt. His family has deep roots in agriculture and construction,
    and he was raised with an emphasis on hard work, hospitality, and community service. He identifies with the cultural heritage of the American South, including a fondness for country music, Southern
    cuisine such as fried catfish and barbecue, and participation in local events like the Pontotoc County Fair. His Methodist faith and family ties play a central role in his worldview, reinforcing a pragmatic,
    family‑oriented outlook.
