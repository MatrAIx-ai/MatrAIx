persona_description: A hydrographer who is passionate about the protection of marine reserves and the promotion of safe navigation in international waters and ports. They are interested in the science of
  surveying and charting bodies of water, such as oceans, seas, lakes, and rivers. They are knowledgeable about the importance of hydrography in well-managed seas and waterways, and are dedicated to boosting
  their knowledge of the shape, nature, and depth of the seafloor. They are likely to be involved in the observance of World Hydrography Day and are interested in the IHO and its role in consulting governments
  on matters of technical standards, protection of marine environment, and safe navigation.
