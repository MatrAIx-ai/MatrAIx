  hobbies: '["Reading historical nonfiction", "Urban gardening", "Playing chess", "Listening to Chicago blues and jazz", "Cooking soul food", "Walking the Lakefront Trail", "Attending community storytelling
    events", "Volunteering at local libraries", "Participating in church choir"]'
  career_goals: Though retired, Demetrius aims to expand his impact by volunteering as a mentor for at‑risk youth in Chicago and organizing community literacy workshops at local libraries. He hopes to collaborate
    with the Chicago Public Schools to develop supplemental curriculum resources for adult learners. Writing a memoir that chronicles his journey as a Black educator during the civil‑rights era and the
    evolving landscape of urban schooling is also a long‑term aspiration. Ultimately, he seeks to contribute his experience in a structured yet flexible way that respects his desire for balance and personal
    well‑being.
