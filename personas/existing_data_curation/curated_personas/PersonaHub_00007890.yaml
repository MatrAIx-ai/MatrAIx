persona_description: A scientist or researcher who studies the Earth's climate and its impact on ice shelves and icebergs. They are particularly interested in understanding the processes that lead to ice
  shelf melting and the impact of this on ocean circulation and sea ice extent. They are likely to be familiar with NASA's Operation IceBridge and the Icesat satellite data, and may have expertise in regional
  climate modeling and oceanography. They may also have a background in hydrology and/or oceanography.
