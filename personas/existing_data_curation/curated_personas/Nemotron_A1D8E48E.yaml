  career_goals: Queenie aims to finish high school with strong grades and earn a scholarship that will let her study nursing or health-sciences at a university. In the short term she wants to secure a part-time
    internship at the local health clinic to gain hands-on experience and continue developing her digital-media skills by creating health-education videos for her community. Long-term, she envisions becoming
    a registered nurse who can combine clinical work with community outreach, using her social media savvy to promote preventive health and empower other young people in Sussex County.
