persona_description: A music historian and musicologist who is particularly interested in the impact of the Nazi regime on the arts and music scene. They are knowledgeable about the history of the arts
  in Europe and the role of music in shaping cultural and political ideologies. They are also interested in the works of Hans Severus Ziegler, the state council who organized the exhibition "Under the Influence
  of the "Degenerate Art" exhibition" in Munich. They are likely to be interested in the details of the exhibition, such as the content of the opening speech, the quotations of Hitler's words, and the impact
  of the exhibition on the musical scene in Europe.
