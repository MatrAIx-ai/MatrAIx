persona_description: A chemist who specializes in the synthesis and analysis of alternative juices, particularly those that have been heated and squeezed from metal conductors. They are skilled in the use
  of latticework and metal materials to conduct heat through their surface conditions, and are known for their ability to place a heat source underneath to evenly disburse increased heat throughout the
  encased object. They are also known for their gentle squeezing action on contained objects.
