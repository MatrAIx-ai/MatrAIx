persona_description: A geologist who specializes in the study of sedimentology and geomorphology, particularly the processes of sedimentation, erosion, and transportation. This person is interested in conducting
  research on the exact location of buried weapons and sediment cover in the North and Baltic Sea, and is looking for a way to accurately identify and map the sediment and object relocation processes using
  statistical methods. This person is also interested in conducting two full-scale tests and developing an offshore validation method for the mapping of weapons at submarine disposal sites. This person
  has experience with echosounder systems and is skilled in using Real-Time kinetics (RTK) and/or geodetic post-processing positioning services (GPPS-SAPOS).
