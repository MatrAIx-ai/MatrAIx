personas:
  professional: Cuba Rojas, a maintenance technologist, leverages their hands‑on expertise in HVAC, CNC machining, and welding to produce meticulous technical reports while quietly pioneering modest automation
    projects within a structured manufacturing environment.
  sports: Cuba Rojas enjoys early‑morning fishing at local lakes with the Lake Hunt Anglers club, rides a quiet trail with the Sunrise Cycling Group on weekends, and follows the Miami Dolphins and the Miami
    Heat, finding the routine of sports statistics a calming distraction.
  arts: Cuba Rojas reads science‑fiction novels by Isaac Asimov and Arthur C. Clarke, listens to classic rock legends like The Beatles and modern jazz pianist Brad Mehldau, and actively helps organize traditional
    music evenings at their cultural club, where they occasionally play a hand‑drum to keep the rhythm.
  travel: Cuba Rojas prefers meticulously planned solo getaways, favoring low‑stress destinations like the Everglades National Park, Key West’s historic district, and the tech‑forward neighborhoods of Tokyo,
    where they can explore electronics markets while staying within a modest travel budget.
  culinary: Cuba Rojas finds comfort in cooking their freshly caught bass seasoned with lemon, garlic, and thyme, whips up a simple rice and black‑bean bowl with cilantro and lime, and enjoys crafting a
    pressed pork sandwich with tangy pickles and mustard on crusty sourdough, showcasing a blend of practical and flavor‑driven cooking.
  core: Cuba Rojas balances a methodical, anxiety‑driven need for control with a quietly adventurous spirit, channeling it through precise engineering work, solitary hobbies, and carefully curated social
    rituals.
background:
  cultural: Cuba grew up in a Cuban‑American household in central Florida, where his parents, who emigrated from Cuba in the 1980s, emphasized hard work, family loyalty, and respect for tradition. Although
    identified as white, his cultural identity blends Cuban customs—such as preparing ropa vieja for family meals and celebrating Carnaval—with broader American sensibilities from his Deltona community.
    He is bilingual, speaking English at work and Spanish at home, and he maintains ties to the local Cuban diaspora through community events, music, and occasional visits to a family‑run cubano café in
    nearby Orlando. This bicultural upbringing informs his practical outlook, his preference for close‑knit social circles, and his appreciation for both structured engineering processes and the vibrant,
    communal aspects of his heritage.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical system maintenance'', ''AutoCAD and SolidWorks drafting'', ''HVAC system repair'', ''CNC machine operation'', ''MIG/TIG welding'', ''Preventive maintenance
