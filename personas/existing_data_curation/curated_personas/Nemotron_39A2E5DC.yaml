  hobbies: '[''Arduino and DIY electronics'', ''Technical and nonfiction reading'', ''Science‑fiction novels'', ''Fishing at Lake Monroe'', ''Casual bike riding'', ''Small‑group tabletop gaming'', ''Cuban‑American
    cultural club activities'']'
  career_goals: Cuba seeks to deepen his technical expertise by earning an Associate of Applied Science in Mechanical Technology and acquiring a Certified Maintenance & Reliability Technician (CMRT) credential.
    Over the next five years, he aims to move into a senior technician role with supervisory responsibilities, overseeing a small maintenance team in a stable manufacturing environment. He values predictable
    workflows but also wants to contribute to process‑improvement projects that introduce modest automation, allowing him to blend his love of structure with occasional creative problem‑solving. A long‑term
    ambition is to start a niche consulting service that helps small Florida businesses optimize equipment uptime while maintaining rigorous safety standards.
