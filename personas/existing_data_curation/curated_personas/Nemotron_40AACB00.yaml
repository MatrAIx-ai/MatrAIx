  career_goals: Marcelino dreams of becoming a firefighter because he admires the clear schedules, training routines, and the idea of protecting his community. He also imagines being a teacher one day,
    creating organized learning environments where he can share knowledge and help others succeed. He plans to work hard in school, attend a good high school, and later study public safety or education
    at university, seeking a stable, predictable career that lets him care for people.
