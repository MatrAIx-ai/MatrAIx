persona_description: A UI/UX designer who is familiar with the MVVM pattern and its implementation in a mark-up language like XML. This person has experience with the implementation details of the PM pattern
  and the MVCP pattern. They are looking for a pattern that allows them to implement a simple View in a language that does not fully support logics, while also being able to synchronize the model states
  between the Presenter and the View. They are interested in the MVVM pattern because it allows them to separate the View from the logic, making it easier for non-programmer people to work with. They are
  also interested in the MVP pattern because it allows them to implement the logic of input converting in the Presenter, which is a feature that is not available in other patterns.
