personas:
  professional: Raul Saenz, a budding automotive technician who also dreams of launching a food‑truck, leverages his hands‑on knack for troubleshooting engines and his bilingual fluency to assist customers,
    yet his mix of craving for orderly procedures and sudden spurts of creative tinkering often leaves project timelines wobbling as they bounce between meticulous checklists and impromptu design experiments.
  sports: Raul Saenz, a quiet teen who prefers solo jogging at dawn and occasional pick‑up basketball games, rallies behind the San Antonio Spurs and follows San Antonio FC with fervor, and trains with
    the Southwest Youth Soccer Club’s weekend drills while using a local gym’s weight‑lifting area to satisfy both their structured fitness routine and the freedom of exploring new workouts.
  arts: Raul Saenz, a solitary sketcher inspired by the vivid panels of Alex Ross and the urban provocations of Banksy, spends evenings listening to indie sounds from Bon Iver to Sufjan Stevens while using
    GIMP to craft comic‑style illustrations reminiscent of Studio Ghibli’s Hayao Miyazaki, merging narrative depth with the bold colors of local mural traditions.
  travel: Raul Saenz, who favors meticulously planned road trips over spontaneous flights, has explored the desert canyons of West Texas and the historic River Walk of San Antonio, and now dreams of future
    adventures wandering Kyoto’s lantern‑lit streets and Barcelona’s sun‑drenched plazas, all while balancing a limited teen budget and family responsibilities.
  culinary: Raul Saenz, an intermediate home chef who refines family staples such as carne asada tacos, chilaquiles with tangy tomatillo salsa, and hand‑rolled corn tortillas, delights in the aroma of roasted
    chilies and fresh cilantro while experimenting with avocado‑lime crema and plating techniques inspired by online cooking channels.
  core: Raul Saenz, a solitary teen who oscillates between meticulous planning and impulsive bursts of creativity, balances a love for hands‑on projects with a habit of hoarding snack wrappers in the garage
    and forgetting to charge their phone until the last minute.
background:
  cultural: Raul comes from a Mexican‑American family rooted in Houston’s vibrant Hispanic community. He grew up speaking Spanish at home and celebrating traditions such as Día de los Muertos, Cinco de
    Mayo, and the annual Fiesta de la Cultura Mexicana. Family meals are central to his life, with recipes passed down from grandparents, and he regularly helps prepare tamales and tacos for gatherings.
    The local Catholic parish and neighborhood festivals reinforce his cultural identity, while the multicultural environment of Houston exposes him to a blend of Mexican, Texan, and broader American influences
    that shape his outlook.
