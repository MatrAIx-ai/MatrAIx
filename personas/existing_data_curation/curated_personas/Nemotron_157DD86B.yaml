  career_goals: Raul aims to earn his GED within the next two years and enroll in a community‑college certificate program in automotive technology or culinary arts. He dreams of gaining a stable, hands‑on
    career that allows him to be self‑sufficient while supporting his family. In the longer term, he hopes to open a small food‑truck serving authentic Mexican snacks or work as a certified auto‑technician
    at a local garage, balancing a structured work schedule with occasional creative projects.
