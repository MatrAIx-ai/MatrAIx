  hobbies: '[''Recreational basketball'', ''Community softball'', ''Hunting'', ''Fishing'', ''Hiking'', ''DIY home renovation'', ''Woodworking'', ''Playing guitar'', ''Attending bluegrass concerts'', ''Volunteering
    with Habitat for Humanity'']'
  career_goals: Cody aims to transition from a laborer to a foreman or site supervisor within the next few years, leveraging his practical experience and expanding his leadership capabilities. He plans
    to earn OSHA 30‑hour certification and an NCCER carpentry credential to boost his credibility. Ultimately, he dreams of launching his own small, locally‑owned construction firm focused on green renovation
    projects for historic homes in the Martinsburg area, allowing him to blend his curiosity for new building technologies with his deep roots in the community. He also wants to mentor younger workers,
    passing on his hands‑on knowledge and resilient work ethic.
