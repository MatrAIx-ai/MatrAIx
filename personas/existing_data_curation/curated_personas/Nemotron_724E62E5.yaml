  hobbies: '["Visiting art galleries", "DIY home‑decor projects", "Gardening", "Cooking Tex‑Mex and Southern meals", "Hosting potluck gatherings", "Volunteering at food banks", "Participating in church
    outreach", "Yoga and mindfulness", "Attending community craft fairs", "Reading mystery novels", "Birdwatching"]'
  career_goals: Michelle aims to transition from a hands‑on tradesperson to a boutique decorative‑painting studio owner, offering bespoke mural and faux‑finish services for local businesses and community
    spaces. She plans to obtain a professional painting contractor license and develop a small apprenticeship program to mentor younger workers, especially those from under‑served neighborhoods. Incorporating
    low‑VOC, eco‑friendly paints into her offerings is a priority, as is building steady relationships with property‑management firms to ensure a predictable workload that reduces her financial stress.
    Ultimately, she hopes her studio will become a hub for collaborative art projects that bring neighbors together and celebrate the cultural diversity of Harris County.
