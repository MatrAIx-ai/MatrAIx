personas:
  professional: Michelle Murphy, a seasoned painter and paperhanger with over twenty years of hands‑on experience, blends meticulous surface preparation with artistic faux‑finish techniques and leads small
    crews while dreaming of launching a boutique decorative‑painting studio that champions low‑VOC paints and mentorship for under‑served youth; they are known for turning client visions into vibrant realities.
  sports: Michelle Murphy enjoys cheering on the Houston Astros and the Houston Rockets, participates in a local weekend softball league, and practices gentle yoga three times a week to stay limber, viewing
    fitness as a social, low‑stress activity; they often meet teammates at the community center after games for coffee.
  arts: Michelle Murphy frequently explores Houston’s Museum of Fine Arts, the Contemporary Arts Museum Houston, and community craft fairs, drawing inspiration from muralist Kelsey Montague, textile artist
    Anni Albers, and the bold colors of Frida Kahlo for her own decorative projects; they also keep a sketchbook of color palettes collected from each visit.
  travel: Michelle Murphy loves spontaneous road trips to the Texas Hill Country, weekend getaways in Austin’s Barton Springs, and cultural immersion in New Orleans’ French Quarter, balancing travel dreams
    with the financial reality of funding her upcoming studio; they often plan trips around church holidays to combine family time with exploration.
  culinary: Michelle Murphy delights in cooking Tex‑Mex staples like carne asada tacos with fresh cilantro and lime, alongside Southern comforts such as chicken‑fried steak and collard greens, often hosting
    potluck gatherings where homemade enchilada sauce and buttery cornbread become the centerpiece; they occasionally over‑season dishes in the pursuit of perfect flavor, a quirk their guests find both
    amusing and delicious.
  core: Michelle Murphy is a curious, art‑driven empath who balances creative ambition with occasional worry, thriving on community collaboration while juggling the chaos of a busy life; they often turn
    stress into motivation for new projects.
background:
  cultural: Michelle grew up in the greater Houston area as a third‑generation Texan of European descent. Her family’s roots in the Gulf Coast region have instilled a blend of Southern hospitality and a
    relaxed, community‑oriented outlook. Living in New Caney, a close‑knit suburb of Harris County, she is familiar with the multicultural tapestry of the region, including the vibrant Hispanic and African‑American
    communities that shape local traditions. Her upbringing includes regular participation in high‑school football Saturdays, church socials, and neighborhood barbecues. These experiences have reinforced
    values of generosity, cooperation, and a strong work ethic, which she brings to both her professional life and volunteer activities.
attributes:
  skills: '["Interior painting", "Exterior painting", "Wallpaper installation", "Surface preparation and priming", "Faux finish decorative painting", "Colour consultation", "Client communication", "Team
