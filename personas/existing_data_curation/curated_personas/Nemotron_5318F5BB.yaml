personas:
  professional: Kristal Ryals, a seasoned fabricator who masterfully operates CNC mills, lathe machines, and MIG/TIG welding stations while applying lean manufacturing principles, leverages their problem‑solving
    mindset and community‑first values to mentor new hires and is actively pursuing a supervisory role, CWI certification, and a Bachelor’s in Manufacturing Engineering Technology to eventually launch a
    sustainable custom metal‑polymer studio.
  sports: Kristal Ryals enjoys kayaking along the Gulf Coast and birdwatching on breezy mornings, trains at the local community gym for functional strength, plays casual beach volleyball in summer, supports
    the Tampa Bay Buccaneers and the Florida Gulf Coast Eagles, and belongs to the Gulf Coast Canoe Club where they lead monthly maintenance workshops for fellow paddlers.
  arts: Kristal Ryals, an avid sci‑fi reader who devours novels by Ann Leckie, curates a personal sketchbook of product ideas, attends monthly performances at the Historic Gulf Theatre featuring local playwrights,
    and relaxes to the music of the Zac Brown Band and contemporary folk singer Hozier, and they often share insights at a small book club.
  travel: Kristal Ryals prefers modest, well‑planned road trips that blend cultural immersion with hands‑on discovery, having explored New Orleans’s jazz scene, savored the historic charm of Savannah, and
    toured Seattle’s tech campuses, they now dream of a bicycle‑friendly European itinerary to Stuttgart’s automotive museums and the coastal villages of Cinque Terre, all balanced against a modest family
    budget and occasional weekend work projects.
  culinary: Kristal Ryals, a competent home cook who loves whipping up Gulf shrimp étouffée with fresh okra and Creole spices, savors grilled grouper sandwiches with lemon‑aioli, bakes key lime pie using
    locally sourced limes, experiments with smoked brisket recipes on a backyard pellet grill, and they occasionally treat themselves to artisanal craft beers while sharing meals at the community garden
    potluck.
  core: Kristal Ryals, a pragmatic tinkerer with a community‑first ethic, balances meticulous organization and spontaneous DIY projects while they secretly hoard vintage bike parts in a garage closet.
background:
  cultural: Kristal was raised in the Gulf Coast region of the United States, growing up in a middle‑class, white family that valued a strong work ethic, community involvement, and Southern hospitality.
    The multicultural atmosphere of Panama City, FL, exposed her to Hispanic and Caribbean influences, especially through local cuisine, music, and neighborhood festivals. Her family traditions include
    church attendance, holiday gatherings with close relatives, and outdoor activities such as fishing and beach outings, all of which shape her appreciation for practical collaboration and harmonious relationships.
attributes:
  skills: '[''CNC Milling'', ''CNC Lathe Operation'', ''MIG Welding'', ''TIG Welding'', ''Injection Molding Setup'', ''Blueprint Reading'', ''Precision Measurement'', ''Lean Manufacturing'', ''Preventative
    Maintenance'', ''OSHA Safety Compliance'', ''Team Training'', ''Technical Troubleshooting'']'
  hobbies: '[''DIY woodworking'', ''Bicycle repair'', ''Kayaking'', ''Birdwatching'', ''Science‑fiction reading'', ''Industry journal reading'', ''Product sketching'', ''Book club'', ''Community gardening'']'
  career_goals: Kristal aims to advance into a supervisory role within the fabrication shop, overseeing production schedules and quality assurance. She plans to obtain Certified Welding Inspector (CWI)
    credentials and pursue a bachelor’s degree in Manufacturing Engineering Technology to deepen her technical knowledge. Long‑term, she hopes to lead initiatives that introduce sustainable plastic recycling
    processes and, eventually, launch her own small‑scale custom metalwork and polymer design studio that serves local businesses and hobbyists.
