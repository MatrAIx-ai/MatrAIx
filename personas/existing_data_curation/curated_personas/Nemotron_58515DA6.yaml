  career_goals: Although retired from full‑time work, Andria is focused on staying active and purposeful. She aims to become the coordinator of a neighborhood desert‑garden project, where she can merge
    her gardening expertise with community leadership while carefully evaluating proposals to ensure they meet her high standards for sustainability. She also plans to complete her GED through a local adult‑education
    program, satisfying her desire for personal growth and practical validation. Leveraging her knitting and quilting talents, she hopes to launch a modest online shop selling hand‑made blankets and accessories,
    positioning herself competitively in the small‑craft market. Andria is determined to maintain her financial independence, so she continues to refine her budgeting skills. Finally, she aspires to travel
    to several national parks in the Southwest, balancing her love of exploration with a realistic travel plan that accounts for health considerations.
