  hobbies: '[''Chess'', ''Sudoku'', ''Golf'', ''Vegetable gardening'', ''Reading historical non-fiction'', ''Reading technology biographies'', ''Cooking traditional South Asian dishes'', ''Volunteering
    for community cybersecurity education'', ''Attending local cultural festivals'']'
  career_goals: Approaching retirement, Navindra aims to transition from a full‑time analyst to a strategic consultant, helping mid‑size enterprises in the Research Triangle area build resilient security
    programs. He aspires to mentor the next generation of security professionals, particularly those from under‑represented South Asian backgrounds, by establishing a scholarship and offering regular workshops.
    He also hopes to publish a whitepaper on integrating zero‑trust principles into legacy systems, and to speak at regional conferences such as RSA and BSides. Ultimately, he envisions serving as a trusted
    advisor to a hospital network, ensuring patient data protection while shaping a legacy of rigorous, ethical security practices.
