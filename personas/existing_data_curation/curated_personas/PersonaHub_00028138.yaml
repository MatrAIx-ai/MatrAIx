persona_description: A historian with a special interest in the history of money and coinage, particularly the production and circulation of coins during the Viking invasions and the Norman period in England.
  The individual is knowledgeable about the mint in York and the role of the Archbishop in claiming rights to coins, and is interested in the production of pennies during the reign of Henry III. They have
  a keen eye for detail and are interested in the unique characteristics of the coins produced by the Royal mint, particularly those produced by the Archbishops' moneyer Thomas.
