  hobbies: '[''Fishing'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Cooking and recipe experimentation'', ''Playing harmonica'', ''Listening to bluegrass music'', ''Reading Appalachian folklore'', ''Volunteering
    at the local food bank'', ''Participating in community heritage festivals'']'
  career_goals: Ryan aims to move into a regional supervisory role within the next three years, overseeing multiple food service locations in eastern Kentucky. Simultaneously, he plans to launch a modest
    bistro that celebrates Appalachian cuisine while providing apprenticeship opportunities for younger workers. He is passionate about integrating his education background into formal nutrition workshops
    for local schools and hopes to become a trusted consultant on food safety for small family‑run establishments in his community.
