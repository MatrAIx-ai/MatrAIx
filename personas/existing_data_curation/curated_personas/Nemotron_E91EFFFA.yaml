personas:
  professional: Sarah Brown, a budding junior author who weaves the fantastical worlds of their favorite books into elaborate school projects, uses their LEGO building skills to map out story arcs, and
    collaborates with classmates in a relaxed, cooperative way while rarely worrying about strict deadlines.
  sports: Sarah Brown, a regular participant in the neighborhood after‑school soccer league and a seasonal beginner's figure‑skating class, cheers for the local professional baseball team the Riverside
    Rovers, enjoys weekend bike rides along the creek, and they find flexible, playful exercise more rewarding than rigid training schedules.
  arts: Sarah Brown, who spends afternoons drawing detailed fantasy creatures and serene nature scenes inspired by the worlds of J.K. Rowling and Studio Ghibli, often listens to the whimsical melodies of
    Taylor Swift’s Folklore album while building LEGO sets, and loves sharing their artwork with family during board‑game nights.
  travel: Sarah Brown, who loves spontaneous weekend camping trips to Pine Ridge State Park where they explore streams and collect pinecones, dreams of visiting the ancient castles of Scotland and the towering
    Redwoods of California, and often maps out imaginary journeys on sheet paper after watching nature documentaries.
  culinary: Sarah Brown, who favors homemade mac and cheese, pepperoni pizza, and strawberry smoothies, enjoys helping their mom bake chocolate chip cookies and often arranges fruit into playful dragon
    shapes on their plate, even if the kitchen ends up a bit messy.
  core: Sarah Brown blends boundless fantasy curiosity with a relaxed, sometimes disorganized approach to chores, turning everyday adventures into creative projects while occasionally forgetting to tidy
    up.
background:
  cultural: Sarah is raised in a predominantly white, middle‑class community in Reading, Pennsylvania, where she experiences typical American traditions such as Thanksgiving, Fourth of July celebrations,
    and local county fairs. Her family values community involvement, school activities, and the regional blend of suburban life with nearby historic Dutch‑Pennsylvania heritage, providing her with a supportive
    environment that encourages curiosity and cooperation.
