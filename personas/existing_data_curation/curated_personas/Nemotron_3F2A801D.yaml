  career_goals: Betty aspires to merge her love for art with her desire to help others. She plans to attend a community college or university program that combines visual arts with psychology or counseling,
    aiming to become an art therapist or community arts facilitator. In the longer term, she hopes to work in schools, mental‑health centers, or non‑profit organizations where she can lead art‑based workshops
    for youth and marginalized groups. She also dreams of founding a free‑at‑the‑door youth art collective in Hammond that offers weekly creative sessions and mentorship. Travel to attend art residencies
    and learn diverse artistic traditions is another goal that fuels her curiosity.
