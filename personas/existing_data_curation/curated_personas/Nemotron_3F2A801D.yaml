personas:
  professional: Betty Currie, a high‑school senior with an emerging portfolio of acrylic, watercolor, and Procreate illustrations, leverages their vivid imagination, empathy, and loosely organized planning
    to spearhead peer‑listening circles and small community art‑craft fairs, foreshadowing a future career as an art therapist who blends visual creation with counseling.
  sports: Betty Currie enjoys leisurely jogs around the lakefront, participates in a seasonal community yoga group, plays pick‑up basketball on weekends, and fans the Chicago Cubs, Chicago Bulls, and the
    local Hammond Hawks semi‑pro soccer team.
  arts: Betty Currie immerses themselves in indie and ambient soundscapes from Bon Iver and Beach House while crafting mixed‑media collages inspired by Yayoi Kusama’s polka‑dot motifs and Salvador Dalí’s
    surrealist dreamscapes, and they regularly showcase poetry at open‑mic events alongside spoken‑word artists like Sarah Kay.
  travel: Betty Currie favors spontaneous weekend day‑trips to the Milwaukee Art Museum and Chicago’s Museum of Contemporary Art, dreams of a summer residency in Oaxaca’s artist colonies and a calligraphy
    workshop in Kyoto, and organizes low‑budget DIY itineraries rather than relying on packaged tours.
  culinary: Betty Currie enjoys crafting vibrant, plant‑based meals like avocado‑lime smoothies, homemade pesto pasta topped with fresh basil and cherry tomatoes, and experimental charcoal‑ink risotto,
    yet they occasionally resort to instant ramen after late‑night sketching sessions when pantry supplies dwindle.
  core: Betty Currie is a wildly imaginative teen artist whose compassionate heart drives community projects, while their scattered organization and occasional insomnia fuel both creative bursts and occasional
    chaos.
background:
  cultural: Betty grew up in Hammond, Indiana, a Lake County city with a working‑class, Midwestern roots and a history tied to the rust‑belt industrial landscape. Her family’s white, middle‑class background
    reflects the region’s values of modesty, hard work, and community solidarity. Living near the Indiana shoreline and the diverse neighborhoods of Hammond exposed her to a blend of cultural traditions,
    from local folk festivals to the city’s immigrant influences. This environment fostered her appreciation for communal spaces, such as the public library and community garden, and encouraged an openness
    to new ideas while maintaining a grounded, collaborative spirit.
