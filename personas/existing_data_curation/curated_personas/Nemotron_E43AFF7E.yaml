  hobbies: '["Solo hiking", "Nature photography", "Reading science fiction", "Reading medical research", "DIY electronics projects", "Meditation and breathing exercises", "Playing chess", "Writing health‑tech
    blog", "Experimental cooking", "Listening to classical music"]'
  career_goals: Michael aims to open an independent integrative primary‑care clinic that offers flexible, telehealth‑enabled services for underserved Seattle neighborhoods, emphasizing mental‑health support
    and data‑driven chronic‑disease management. He plans to pursue a PhD in health informatics to develop predictive tools that improve patient outcomes and reduce clinician stress. He also hopes to influence
    local health policy on provider burnout and to publish research on stress‑reduction interventions for healthcare workers. Ultimately, he seeks a career structure that affords autonomy, minimal bureaucracy,
    and ample time for reflective practice.
