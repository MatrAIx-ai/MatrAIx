    coordination"]'
  hobbies: '["Cooking and experimenting with Southeast Asian recipes", "Herb and vegetable gardening", "Yoga and meditation", "Hiking in the Santa Cruz Mountains", "Volunteer work with youth mentorship
    programs", "Attending cultural festivals and community events", "Reading non‑fiction on marketing and psychology", "Visiting art galleries and exhibitions"]'
  career_goals: Ngá aims to transition from senior advertising sales agent to Regional Advertising Sales Director within the next five years, overseeing a multi‑disciplinary team across the Bay Area. She
    seeks to pioneer inclusive advertising strategies that reflect the region's cultural diversity and to integrate emerging ad‑tech, such as AI‑driven targeting and measurement tools, into her team's workflow.
    Long‑term, she envisions launching her own consultancy focused on culturally resonant brand storytelling for Southeast Asian and broader multicultural markets.
