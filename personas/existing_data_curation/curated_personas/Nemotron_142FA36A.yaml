personas:
  professional: Ngá Hernandez, a senior advertising sales agent with a proven record of securing multimillion‑dollar media contracts, leverages their disciplined organization, data‑driven analytics, and
    cross‑cultural communication to design integrated campaigns while nurturing client relationships through thoughtful negotiation.
  sports: Ngá Hernandez hikes the Santa Cruz Mountains on weekends, trains with the Bay Area Runners club for seasonal 5 K races, and avidly follows the San Francisco Giants and Golden State Warriors, balancing
    their love of nature with structured cardio sessions.
  arts: Ngá Hernandez regularly visits the San Francisco Museum of Modern Art to admire works by Yayoi Kusama and Kehinde Wiley, fills their living space with local murals, and curates playlists featuring
    Tame Impala, Sufjan Stevens, and contemporary jazz, allowing visual and musical inspiration to inform their creative outlook.
  travel: Ngá Hernandez prefers meticulously planned weekend escapes, such as wine‑tasting tours in Napa Valley and coastal hikes along Oregon’s Pacific Coast, while dreaming of an immersive culinary journey
    to Bali’s rice terraces that would blend their love of Southeast Asian flavors with California farm‑to‑table sensibilities.
  culinary: Ngá Hernandez, an enthusiastic home chef, delights in crafting fusion dishes like lemongrass‑infused grilled salmon served on a quinoa‑salad of heirloom tomatoes, avocado, and fresh basil, while
    sourcing microgreens from their garden and hosting farm‑to‑table dinner gatherings featuring Thai‑style coconut curry with locally foraged mushrooms.
  core: Ngá Hernandez combines strategic ad‑sales expertise with disciplined garden‑fresh fusion cooking, channels curiosity through yoga, yet occasionally overbooks meetings and forgets to water their
    herbs.
background:
  cultural: Ngá Tuong Hernandez is a second‑generation Southeast Asian American whose mother immigrated from Vietnam and whose father is of Mexican descent, reflected in her surname. Raised in the Bay Area,
    she grew up bilingual in English and Vietnamese, celebrating Tet with her extended family while also participating in Mexican cultural traditions such as Día de los Muertos. Her upbringing emphasized
    community harmony, respect for elders, and a blend of Asian and Latino culinary customs. These multicultural roots inform her approach to advertising, allowing her to craft campaigns that resonate across
    diverse audiences and to serve as a cultural bridge for clients seeking authentic engagement with Southeast Asian and Hispanic markets.
attributes:
  skills: '["Strategic advertising sales", "Client relationship management", "Media planning", "Digital marketing analytics", "Negotiation", "Project management", "Cross‑cultural communication", "Data‑driven
