  hobbies: '[''Community theater acting'', ''Playing saxophone in a jazz ensemble'', ''Gardening'', ''Hiking on the Allegheny River Trail'', ''Reading American history'', ''Cooking and hosting dinner parties'',
    ''Genealogy research'', ''Volunteering at the public library'', ''Senior bridge club'', ''Traveling to historic sites in the Eastern US'']'
  career_goals: As he approaches retirement, John aims to transition from full-time teaching to a role that leverages his expertise as an educational consultant for district-wide curriculum reform. He hopes
    to lead a series of workshops on structured classroom practices and blended learning, and he plans to author a practical guide for teachers on building resilient, organized learning environments. Additionally,
    John aspires to serve on the local school board to influence policy that supports teacher collaboration, resource equity, and community engagement. He also envisions establishing a mentorship program
    that pairs veteran teachers with new educators in the Allegheny County school system.
