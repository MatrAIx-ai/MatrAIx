  hobbies: '["Gardening", "Baking and pastry making", "Quilting", "Church choir singing", "Local history storytelling", "Volunteer work at senior center", "Card games (bridge)", "Birdwatching", "Attending
    community festivals"]'
  career_goals: Although retired, Patsy aims to remain a vibrant contributor to Live Oak’s social fabric. She plans to lead a neighborhood garden project, mentoring younger volunteers while competing for
    recognition in the county’s annual gardening contest. She also aspires to become the senior center’s lead coordinator for cultural activities, using her event‑planning expertise to create memorable
    gatherings and to preserve local stories through a small oral‑history archive. In the longer term, Patsy hopes to win the best‑baked‑goods award at the Suwannee County Fair, showcasing her culinary
    prowess and reinforcing her reputation as a friendly yet competitive community member.
