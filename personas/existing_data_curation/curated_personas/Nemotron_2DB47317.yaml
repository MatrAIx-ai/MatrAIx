  hobbies: '[''jigsaw puzzles'', ''Sudoku'', ''strategy board games (e.g., Catan)'', ''reading non‑fiction (psychology, technology, business)'', ''hiking on the Appalachian Trail'', ''vegetable gardening'',
    ''DIY home‑improvement projects'', ''volunteering at the local library'']'
  career_goals: Setareh aims to transition from a clerk role to a supervisory position within the supply‑chain field. Over the next three to five years she plans to earn a Certified Supply Chain Professional
    (CSCP) credential and complete an associate’s degree in Business Administration at a local community college. Her long‑term ambition is to become a warehouse or logistics manager, where she can lead
    process‑improvement projects, implement lean inventory strategies, and mentor a small team. She is also interested in exploring the use of data analytics to optimize order fulfillment efficiency, positioning
    herself as a forward‑thinking leader who balances innovative ideas with proven operational practices.
