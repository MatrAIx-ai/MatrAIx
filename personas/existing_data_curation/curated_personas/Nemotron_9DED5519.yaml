personas:
  professional: Ana Garcia, a seasoned dental hygienist with expertise in periodontal care, radiography, and bilingual patient education, they leverage their meticulous organizational habits and calm assertiveness
    to streamline clinic workflow while fostering collaborative relationships with dentists and staff.
  sports: Ana Garcia follows the Orlando Magic and Tampa Bay Rays, they participate in a local senior walking club that meets every Saturday morning along the Indian River, and occasionally join a recreational
    pickleball league at the community center.
  arts: Ana Garcia enjoys low‑key salsa evenings featuring the music of Celia Cruz and Marc Anthony, they spend afternoons photographing local wildlife such as herons and sandpipers, and they unwind in
    a monthly knitting circle while listening to the folk guitar stylings of Andrés Segovia and sharing crafts at the senior center.
  travel: Ana Garcia prefers short, well‑planned road trips along Florida’s Atlantic coast, they have taken weekend getaways to St. Augustine and the Florida Keys, and they dream of stargazing from the
    summit of Mauna Kea in Hawaii, though family commitments often shape travel timing.
  culinary: Ana Garcia delights in preparing traditional island dishes like arroz con gandules, pasteles, and plantain‑based mofongo, they grow fresh herbs such as cilantro and oregano in their garden,
    and they combine meticulous cooking techniques with a habit of humming salsa tunes while the kitchen fills with the aroma of sofrito.
  core: Ana Garcia balances curiosity and practicality, they nurture a thriving garden, whip up vibrant home‑cooked meals, and volunteer their dental expertise, all while occasionally indulging in late‑night
    coffee and a nostalgic fondness for salsa music.
background:
  cultural: Ana is a first‑generation Puerto Rican American who grew up in a bilingual household. Her heritage emphasizes strong family bonds, respect for elders, and celebrations of music and food. She
    maintains close ties with relatives in Puerto Rico, often traveling to visit them and bringing back cultural traditions. In Florida, she actively participates in local Hispanic community events, and
    her cultural lens informs her patient care, especially in tailoring oral‑health advice to Puerto Rican dietary habits. Her Catholic upbringing also shapes her values of service, compassion, and community
    involvement.
attributes:
  skills: '[''Oral prophylaxis'', ''Dental scaling and polishing'', ''Fluoride application'', ''Dental radiography'', ''Infection control'', ''Bilingual patient education (Spanish/English)'', ''Dental charting
    and EHR management'', ''Community health workshop facilitation'', ''Inter‑professional communication'', ''Conflict resolution'']'
  hobbies: '[''Gardening'', ''Cooking Puerto Rican cuisine'', ''Bird watching'', ''Nature photography'', ''Salsa dancing (social)'', ''Knitting'', ''Volunteering at senior center'', ''Attending astronomy
    talks'', ''Reading historical fiction'']'
  career_goals: Looking ahead, Ana aims to become a lead dental hygienist and obtain an Advanced Periodontal Therapy certification. She plans to pursue a Master’s in Public Health to broaden her impact
    on community oral health, particularly for underserved Hispanic populations in Brevard County. Over the next five years she hopes to establish a regular oral‑health education program at local senior
    centers and schools, mentor junior hygienists, and possibly teach part‑time at a community college. While staying close to her family, she also aspires to serve in an advisory role for a regional health‑fair
    coalition, shaping policies that improve access to preventive dental care.
