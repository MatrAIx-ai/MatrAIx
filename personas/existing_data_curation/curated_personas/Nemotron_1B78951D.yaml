  career_goals: Loretta aims to leverage her packaging experience into a role that merges operational efficiency with product design. In the next two years she plans to earn a certification in supply-chain
    management and step up as a shift lead or process-improvement coordinator at her current plant. Long-term, she aspires to transition into packaging development or sustainable packaging engineering,
    where she can apply her artistic vision to create environmentally-friendly, brand-forward packaging solutions. She is also considering completing a bachelor's program in industrial design or applied
    sciences to solidify her technical design credentials.
