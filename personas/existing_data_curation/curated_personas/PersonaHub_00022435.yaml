persona_description: A historian and archaeologist who specializes in the study of pre-Columbian and Native American cultures, particularly those from the Northeastern United States. Her research interests
  include, but are not limited to, the cultural and historical contexts of the Amish, the impact of colonialism on Native American societies, and the development of indigenous communities in the Northeast.
  She is particularly interested in the role of women in Native American societies and the impact of European colonization on Native American culture. Her work has been published in academic journals and
  featured in documentaries.
