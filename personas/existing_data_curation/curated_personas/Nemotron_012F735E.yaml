personas:
  professional: Deloris Tanner, a retired civil engineer turned community STEM mentor, blends analytical rigor with the warmth of a storyteller as they design after‑school curricula, senior‑tech workshops,
    and hands‑on garden‑based learning modules, using their knack for simplifying complex concepts while assertively championing funding for local maker spaces.
  sports: Deloris Tanner roots for the Brooklyn Nets and the New York Yankees while staying active through a weekly senior walking club in Prospect Park, low‑impact water aerobics at the local community
    center, and a seasonal pickleball league with neighbors at the recreation field, where they enjoy friendly competition and community connection.
  arts: Deloris Tanner frequents intimate jazz sessions featuring Miles Davis tributes at the historic Blue Note Club, immerses themselves in quilting projects inspired by vibrant fabric patterns, and visits
    the Brooklyn Museum to study works that celebrate local cultural narratives, all of which deepen their appreciation for storytelling through music and textile art, and they often share these experiences
    with neighborhood friends.
  travel: Deloris Tanner prefers purposeful short trips such as a reflective visit to the National Museum of American History in Washington, D.C., a quiet weekend exploring Savannah’s historic district,
    an annual retreat to Key West, Florida, and a dreamed Mediterranean cruise that would stop in Athens and Naples, all planned with careful budgeting and a small group of like‑minded friends, where they
    enjoy sharing stories and photographs with their community back home.
  culinary: Deloris Tanner delights in preparing collard greens slow‑cooked with smoked turkey, sweet‑potato pie spiced with nutmeg, and crisp baked catfish, pairing each with fresh heirloom tomatoes, kale,
    and buttery cornbread harvested from their backyard garden, showcasing their advanced cooking skills and love for seasonal, home‑grown flavors, and they often host neighborhood potlucks where they share
    these dishes.
  core: Deloris Tanner is a garden‑loving, jazz‑enthusiast retiree who balances disciplined budgeting with occasional candle‑buying sprees, channels anxiety into mindful yoga sessions, and passionately
    mentors young STEM aspirants, and they never miss a Sunday church potluck.
background:
  cultural: Deloris grew up in a close‑knit African-American community in Brooklyn, shaped by the civil‑rights era and the cultural vibrancy of the Harlem Renaissance that resonated throughout the city.
    Her family's roots trace back to the Southern Great Migration, and she maintains traditions of church fellowship, soul‑food cooking, and oral storytelling. She actively participates in neighborhood
    block parties, Juneteenth celebrations, and the annual Brooklyn Black Arts Festival, drawing strength from the intergenerational legacy of Black women's resilience, advocacy, and cultural expression.
attributes:
  skills: '[''Analytical problem solving'', ''Technical troubleshooting'', ''Data analysis'', ''Curriculum development'', ''Science communication'', ''Project management'', ''Digital literacy tutoring'',
    ''DIY home repair'', ''Community outreach'']'
  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Jazz music'', ''Quilting'', ''Museum visits'', ''Yoga and mindfulness'', ''Volunteer STEM tutoring'', ''Genealogy research'']'
  career_goals: She hopes to mentor high-school students in STEM through after-school programs, write a memoir that captures her journey as a Black woman in science, lead a senior-tech workshop series in
    Brooklyn, advocate for expanded mental-health resources for older adults, and establish a community garden that integrates sustainable practices with educational workshops for neighborhood residents.
