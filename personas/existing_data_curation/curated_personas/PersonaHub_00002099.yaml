persona_description: A health official in Brazil who is responsible for monitoring and managing the Zika virus outbreak in the country. They are particularly concerned about the impact of the virus on pregnant
  women and the development of microcephaly in infants. They are also aware of the potential risks associated with mosquito-borne diseases and are actively working to prevent the spread of Zika through
  measures such as fumigation campaigns. They are well-informed about the latest developments in the outbreak and are actively monitoring the situation to ensure that the government is taking appropriate
  measures to address the crisis.
