personas:
  professional: Stephanie Watts, a 25‑year‑old office supervisor in Las Vegas, channels her practical, structured outlook and keen eye for data into advanced Excel budgeting, Lean workflow optimization,
    and team coaching, while they occasionally assert themselves to resolve conflicts and keep the department humming.
  sports: Stephanie Watts supports the Las Vegas Raiders, the Vegas Golden Knights and the Las Vegas Aces, hikes Red Rock Canyon on weekends with a local climbing club, and blends structured cardio sessions
    at a boutique gym with casual board‑game‑night stretches to stay fit, though they occasionally skip a planned run when work deadlines mount.
  arts: Stephanie Watts frequents the Neon Museum and the Bellagio Gallery of Fine Art, enjoys live performances by artists like Adele and violinist Lindsey Stirling, and fills their bullet‑journal with
    sketches inspired by the desert’s colors, revealing a subtle but steady love for visual and musical arts, though they sometimes binge‑watch streaming shows instead of attending a concert.
  travel: Stephanie Watts prefers meticulously planned trips that balance adventure and relaxation, has already explored Sedona’s red rock trails and plans a future road trip to the Oregon Coast, while
    they budget carefully to accommodate their MBA tuition and occasional weekend getaways with their husband.
  culinary: Stephanie Watts, an avid meal‑prep enthusiast, crafts balanced dishes such as quinoa‑crowned salmon with roasted brussels sprouts and lemon‑tahini sauce, experiments with Mediterranean herbs,
    and occasional indulgent nights out for shrimp tacos at a popular downtown food hall, even though they sometimes order takeout after a long workday.
  core: Stephanie Watts is a detail‑driven office manager who combats chronic worry with bullet‑journaling, yoga, and disciplined budgeting, yet they still sneak extra espresso shots during late‑night Excel
    crunches.
background:
  cultural: Stephanie comes from a white, middle‑class Anglo‑American background, raised in a suburban setting in the western United States. Her family emphasized self‑reliance, punctuality, and the value
    of a steady career, themes that have informed her practical outlook. Growing up in Nevada, she was exposed to the state's blend of desert culture and the hospitality‑driven economy of Las Vegas, which
    fostered an appreciation for both hard work and the city's diverse social scene. While she identifies with mainstream American cultural norms—celebrating holidays such as Thanksgiving and the Fourth
    of July—she also incorporates local influences like supporting community events in Clark County and enjoying the region's outdoor recreation opportunities. These cultural experiences have reinforced
    her preference for order, community involvement, and balanced personal time.
attributes:
  skills: '[''Office Workflow Coordination'', ''Team Supervision'', ''Scheduling and Calendar Management'', ''Microsoft Office Suite (Excel, Word, PowerPoint, Outlook)'', ''Google Workspace'', ''Data Analysis
