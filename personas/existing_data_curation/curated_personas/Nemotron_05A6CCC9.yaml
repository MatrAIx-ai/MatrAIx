  hobbies: '[''Bullet Journaling'', ''Cooking and Meal Prep'', ''Yoga'', ''Guided Meditation'', ''Board Games with Friends'', ''Attending Museum Exhibits and Live Performances'', ''Hiking (Red Rock Canyon)'',
    ''Volunteer Administrative Support for Nonprofits'']'
  career_goals: Stephanie aspires to transition from a first‑line supervisory role into a senior office management position within the next two to three years. Her short‑term goal is to become an Office
    Manager overseeing a larger department, where she can implement systematic workflow improvements and mentor emerging leaders. She plans to earn a Certified Administrative Professional (CAP) credential
    and enroll in a part‑time MBA program focused on Operations Management to deepen her strategic planning capabilities. In the medium term, she aims to take on an Operations Manager role that combines
    administrative oversight with cross‑functional project leadership, particularly in stable industries such as healthcare or property management. Long‑term, Stephanie envisions herself as a Director of
    Business Operations, shaping organizational policy and driving efficiency across multiple locations while maintaining a balanced work‑life schedule that supports her marriage and personal well‑being.
