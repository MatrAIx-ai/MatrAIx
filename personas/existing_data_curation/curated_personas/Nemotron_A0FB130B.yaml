  career_goals: Dean aims to transition from a senior developer role to a technical architect position where he can shape system‑wide strategies while maintaining the flexibility to work independently.
    Over the next five years, he hopes to lead high‑impact projects that balance innovative technologies with proven practices, contribute to open‑source libraries, and eventually launch a niche SaaS product
    that solves a specific workflow challenge for remote teams. He values roles that allow remote or hybrid work, minimal micromanagement, and the autonomy to set his own schedule, aligning with his preference
    for low‑stress, self‑directed environments.
