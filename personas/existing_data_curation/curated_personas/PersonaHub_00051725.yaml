persona_description: A researcher or geographer who specializes in the study of urban development and its impact on the environment, particularly in the context of ancient cities such as Angkor, Cambodia.
  This person is likely to be interested in the role of water management systems in shaping urban landscapes and the need for a comprehensive understanding of the original hydrological layout of the Angkor
  basin. They are likely to have experience in using remotely sensed imagery to analyze and map urban form and would be familiar with techniques such as Principal Component Analysis (PCA) and vegetation
  indices (VI) for environmental trace detection. They are also likely to be knowledgeable about the history and cultural significance of Angkor, as well as the significance of the research agenda in providing
  essential insights into human modifications to the natural hydrology and topography.
