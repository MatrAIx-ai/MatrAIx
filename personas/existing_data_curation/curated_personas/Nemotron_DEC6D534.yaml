  hobbies: '[''Watercolor Painting'', ''Sketching Local Landscapes'', ''Visiting Art Galleries and Museums'', ''Reading Non-fiction on Art and Innovation'', ''Gardening'', ''Hiking in State Parks and Exploring
    Covered Bridges'', ''DIY Home Craft Projects (Quilting, Knitting)'', ''Photography of Rural Scenes'', ''Community Volunteering at Local Events'', ''Solving Jigsaw Puzzles and Crosswords'']'
  career_goals: Jean aspires to move into a supervisory position within the United States Postal Service, such as a shift manager or operations specialist, where she can lead a team in implementing efficiency‑boosting
    technologies. She plans to complete a bachelor’s degree in Logistics or Business Administration to deepen her strategic expertise. In the longer term, she hopes to champion a workplace initiative that
    integrates sustainable practices and employee‑well‑being programs, while also supporting local arts programs in Montezuma by organizing community workshops and exhibitions.
