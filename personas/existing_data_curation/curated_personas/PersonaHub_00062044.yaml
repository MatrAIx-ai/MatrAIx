persona_description: A scientist who specializes in nanotechnology and has expertise in nanoparticle delivery systems. They are interested in the design and development of targeted delivery systems for
  cancer treatment and have experience in using light scattering and other analytical techniques to measure and count nanoparticles. They are also knowledgeable about the potential applications of nanoparticles
  in diagnostics and enhanced forms of therapy, such as thermotherapy. Additionally, they have experience in developing and testing nanotechnology-based photodynamic therapy (PDT) methods for cardiac ablation
  to resolve arrhythmia and have published several studies on this topic. They are likely to be interested in attending the Pittcon 2017 conference to share their knowledge and expertise on nanotechnology-based
  therapies and diagnostics.
