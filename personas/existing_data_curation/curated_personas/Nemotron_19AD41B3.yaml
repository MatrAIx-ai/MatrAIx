  hobbies: '[''gardening'', ''soul‑food cooking'', ''chess and checkers'', ''reading civil‑rights biographies'', ''attending church services'', ''walking in local parks'', ''listening to jazz and gospel
    music'', ''watching classic movies'']'
  career_goals: Although retired, Deshawn remains focused on leaving a lasting legacy. He aims to document his life story and family recipes in a memoir‑style cookbook that blends traditional soul‑food
    with modern variations. He wishes to continue mentoring younger relatives and neighborhood youth, especially through story‑telling sessions about the civil‑rights era. Deshawn also plans to stay active
    in his church’s outreach programs, volunteer as a senior advisor at the local community center, and learn more about emerging digital tools so he can help his family stay connected. Lastly, he hopes
    to travel to key historical sites in the South, such as Selma and Montgomery, to deepen his personal understanding of the movement he witnessed as a teenager.
