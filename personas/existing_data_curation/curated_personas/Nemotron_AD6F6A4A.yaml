personas:
  professional: Teodorico Kung, a three‑year‑old who loves stacking wooden blocks, demonstrates the nascent traits of an aspiring builder by preferring familiar rectangular shapes and pragmatic construction
    methods, yet approaches each session with relaxed flexibility, thriving in group play where they competitively race to build the tallest tower.
  sports: Teodorico Kung, a three‑year‑old who eagerly joins the neighborhood sandbox soccer league, loves watching the Los Angeles Galaxy Jr. Academy matches, and practices basic dribbling at the community
    park, while they often dread sitting still and prefer high‑energy tag games that satisfy their competitive drive.
  arts: Teodorico Kung, a three‑year‑old who revels in the animated adventures of Sesame Street and sings along to Let It Go by Idina Menzel, channels boundless energy into crayon doodles of dinosaurs and
    impromptu dance routines at family gatherings, reflecting a sociable nature that they sometimes question with occasional skepticism toward new artistic activities.
  travel: Teodorico Kung, a three‑year‑old whose short family trips have taken them to the local San Diego Zoo and a weekend beach stay at Santa Monica, delights in the routine of packed suitcases and car
    rides while yearning for a future adventure to Disneyland Paris, though their anxiety about new environments often leads parents to meticulously plan each outing.
  culinary: Teodorico Kung, a three‑year‑old who avidly requests cheesy macaroni with elbow pasta and cheddar, loves chicken nuggets with a side of sweet potato fries, enjoys dipping apple slices in peanut
    butter, yet grimaces at any dish containing broccoli or spicy mustard, revealing a picky palate that they fiercely protect and a strong preference for familiar, bland flavors.
  core: Teodorico Kung, a three‑year‑old bundle of energetic curiosity who thrives on routine play, competitive group games, and bright snacks, yet is prone to worry, occasional laziness about chores, and
    a relentless craving for sticker rewards.
background:
  cultural: Teodorico comes from a Micronesian family that traces its roots to the island of Pohnpei. His parents maintain many cultural practices at home, including cooking dishes with taro and coconut,
    weaving simple mats, and celebrating community festivals that feature traditional dances and chants. He hears both English and Chuukese spoken regularly, and his grandparents share oral histories and
    legends that shape his sense of identity. While living in Spokane, Washington, his family participates in a local Micronesian church community, which blends Christian worship with cultural celebrations.
    This bicultural environment gives him exposure to Micronesian values of community respect, storytelling, and music, alongside the broader American preschool setting, where he interacts with diverse
    peers and learns mainstream customs. The mix of these influences informs his daily routines, the foods he enjoys, and the songs he sings, creating a rich, blended cultural background.
