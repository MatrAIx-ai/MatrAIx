  career_goals: In his imaginative play Teodorico repeatedly pretends to be a construction worker and a firefighter, attracted by the clear, repeatable steps of building and emergency drills. He talks about
    wanting to wear a hard hat, operate a crane, and be the best builder on his block crew. He also loves the idea of keeping his community safe, saying he would love to drive a fire truck and follow a
    regular fire station schedule. These aspirations blend his love of practical, routine‑based jobs with his competitive drive to be the top performer, while also offering reassurance against his occasional
    worries.
