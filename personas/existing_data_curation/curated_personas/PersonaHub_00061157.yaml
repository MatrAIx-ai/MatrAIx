persona_description: A Vanderbilt University economist who studies wage inequality and the gender pay gap, particularly in the fields of law and economics. Her research focuses on finding the causes of
  the gender pay gap and identifying which professions are best and worst at pay parity. She is also interested in the economic value of education and the differences in pay between men and women at different
  levels of education.
