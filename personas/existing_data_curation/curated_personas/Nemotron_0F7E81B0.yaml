personas:
  professional: Annie Kinney is a seasoned management analyst who translates complex data into actionable insights for public‑sector and nonprofit clients, wielding Python, R, SQL, Tableau, and Power BI
    while championing equity‑focused metrics; their love of curiosity and improvisational thinking leads them to favor agile, design‑thinking projects over rigid plans, and their assertive yet cooperative
    leadership style is paving the way toward a Director of Analytics role where they will build a socially‑impactful analytics team that includes mentoring emerging women in STEM.
  sports: Annie Kinney enjoys seasonal hiking on the C&O Canal towpath in spring and fall, participates in a local running club that meets for 5‑k races, follows the Washington Nationals and Washington
    Capitals with avid fanfare, and joins weekend pick‑up basketball games at the community center, balancing a love for low‑key cardio with occasional team sport camaraderie.
  arts: Annie Kinney curates a personal digital archive of urban street art while regularly attending gallery shows spotlighting artists such as Kehinde Wiley, Amy Sherald, and Yinka Shonibare, finds inspiration
    in spoken‑word circles that echo the cadence of poets like Saul Williams, and unwinds to the soulful vinyl of Nina Simone and the dynamic flows of Kendrick Lamar, all of which feed their improvisational
    theater practice.
  travel: Annie Kinney prefers a flexible travel style that blends purposeful itineraries with spontaneous detours, having explored the historic streets of Savannah, the culinary markets of Marrakech, and
    the vibrant Creole neighborhoods of New Orleans, while planning a future trip to Senegal to attend a diaspora arts festival and indulging in occasional weekend getaways to nearby Annapolis for sailing
    and seafood.
  culinary: Annie Kinney approaches cooking as a creative laboratory, skillfully blending West African spices with Korean fermentation techniques to create dishes like Jollof‑taco bowls and kimchi‑infused
    lentil stew, favoring ingredients such as plantain, harissa, miso, and fresh cilantro, and often experiments with sous‑vide salmon paired with quinoa and roasted cauliflower for dinner parties.
  core: Annie Kinney is a data‑driven strategist fueled by artistic curiosity, whose relaxed yet purposeful approach to work and life weaves together analytics, community equity, improvisational art, and
    adventurous cooking into a uniquely versatile worldview.
background:
  cultural: Annie was raised in a close‑knit Black family in the Washington, D.C. metropolitan area, with deep ties to the historic African‑American neighborhoods of Montgomery County. Her upbringing emphasized
    the importance of education, community service, and cultural pride. She regularly participates in local Juneteenth celebrations, African‑diaspora festivals, and visits the National Museum of African
    American History & Culture, experiences that reinforce her connection to Black artistic and intellectual traditions. Navigating a predominantly white professional environment, she draws strength from
    the resilience of her community and actively mentors other Black professionals. Her cultural identity informs her commitment to equity‑focused analytics and her appreciation for a diverse range of artistic
    expressions.
attributes:
  skills: '[''Statistical analysis'', ''Predictive modeling'', ''Data visualization'', ''Python'', ''R'', ''SQL'', ''Tableau'', ''Power BI'', ''Advanced Excel'', ''Process mapping'', ''Workflow optimization'',
    ''Agile project management'', ''Design thinking'', ''Stakeholder facilitation'', ''Equity‑focused analytics'', ''Data storytelling'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Photography (urban and street art)'', ''Improvisational theater'', ''Spoken‑word poetry'', ''Hiking and nature walks'', ''Meditation'', ''Experimental
    cooking'', ''Attending TED‑style talks'', ''Community forums on equity'', ''Reading nonfiction on science, philosophy, and social justice'']'
  career_goals: Annie aims to transition into a senior leadership role—such as Director of Analytics or Vice President of Strategy—where she can shape data‑driven policies that advance community equity
    and cultural development in Montgomery County and the broader D.C. region. She aspires to build a high‑performing analytics team that blends technical rigor with social impact, mentor emerging Black
    women in STEM and data fields, and create a public‑facing platform that visualizes local cultural‑investment outcomes. Long‑term, she envisions launching a consultancy that partners with city agencies
    and nonprofit arts organizations to embed evidence‑based decision‑making into their programs.
