  career_goals: Myrla aspires to channel her love of structure, problem‑solving, and building into a future career as a civil engineer focused on sustainable infrastructure. In the short term, she aims
    to lead her middle‑school robotics club, win the regional chess championship, and earn top marks in math and science to qualify for an advanced STEM program in high school. She envisions earning scholarships
    that will allow her to attend a top engineering university, where she hopes to design community‑centered projects that blend practicality with environmental stewardship.
