persona_description: A historian who is deeply interested in the history of the United States and its military forces, particularly the contributions made by New York State's military forces during World
  War II and the Civil War. They are particularly knowledgeable about the roles of New York's 27th Division and the 77th Division, as well as the contributions of New York's militia and National Guard during
  the Revolutionary War. They are also interested in the domestic impact of the Cold War, particularly the debates and protests that divided the nation at the height of the war in Vietnam.
