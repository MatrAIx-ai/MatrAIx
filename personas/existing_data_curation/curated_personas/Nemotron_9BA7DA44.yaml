  career_goals: Approaching retirement, Johnathan aims to transition into a supervisory role such as Logistics Coordinator or Safety Officer, securing OSHA certification to formalize his safety expertise.
    He hopes to mentor a new generation of warehouse workers and possibly launch a part‑time side business offering moving services and handyman work that blends his logistics knowledge with his carpentry
    hobby. He is also interested in learning about sustainable supply‑chain practices and hopes to contribute to local community art initiatives, perhaps by organizing art‑related events or volunteering
    as a safety advisor for community festivals.
