  career_goals: Mark envisions a future where his love for art, technology, and community converge. In the short term, he aims to earn a place in a STEM‑arts magnet program during high school, build a robust
    portfolio of digital artwork, and win a regional competition in graphic design. He hopes to launch a small YouTube channel where he blends tutorials on illustration with beginner coding projects, targeting
    peers interested in creative tech. Long‑term, Mark aspires to study Graphic Design or Game Development at a university that emphasizes sustainable design, eventually working as a user‑experience designer
    or freelance illustrator for environmentally‑focused video game studios. He also keeps the possibility of playing soccer at the collegiate level open, viewing athletic discipline as a parallel pathway
    to personal growth.
