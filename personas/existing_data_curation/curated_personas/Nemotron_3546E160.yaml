personas:
  professional: Mark Dalton, an aspiring multimedia storyteller who leverages disciplined sketching routines, meticulous project planning in Scratch and Python, and collaborative set design work in their
    school theater club to prototype interactive sci‑fiction narratives, reflecting their curiosity for new ideas and their high standards for achievement.
  sports: Mark Dalton, a forward for the Tualatin Soccer Club who eagerly follows the Portland Timbers, spends Saturday mornings sprinting on the Tualatin River trails, balances competitive matches with
    collaborative team drills, and channels their sociable energy into leading warm‑up chants, while often over‑committing to extra practice sessions due to their disciplined drive.
  arts: Mark Dalton, a budding visual artist inspired by Studio Ghibli, Pixar, and the graphic novel 'Saga', who spends free evenings drawing sci‑fi characters, composes guitar melodies reminiscent of John
    Mayer, designs theater lighting inspired by Broadway's 'Hamilton', and builds LEGO modular sets that echo the architectural flair of Frank Gehry, embodying their curiosity, organization, and collaborative
    spirit.
  travel: Mark Dalton, an eager explorer who has trekked the Columbia River Gorge, visited the Portland Art Museum's modern art wing, dreams of traveling to Tokyo's Akihabara for manga inspiration, and
    prefers weekend day trips planned with a detailed itinerary in Google Docs, balancing adventurous curiosity with disciplined budgeting and peer group coordination.
  culinary: Mark Dalton, a modest home chef who can whip up a quick pepperoni pizza, enjoys mastering a simple ramen broth with miso, soy sauce, and sliced pork, frequently snacks on trail mix of almonds,
    dried cranberries, and dark chocolate while hiking, and occasionally burns toast when staying up late to finish a digital art commission, reflecting their disciplined cooking attempts and occasional
    teenage sleep‑deprived mishaps.
  core: Mark Dalton blends a disciplined love for digital art, guitar, and soccer with a curious, organized mind, sociable demeanor, and occasional teen quirks like late‑night snack burns.
background:
  cultural: Mark is a white American growing up in Beaverton, Oregon, a suburban community in the Portland metropolitan area. His family reflects a typical Pacific Northwest middle‑class upbringing, valuing
    education, environmental stewardship, and outdoor recreation. The region’s emphasis on sustainability and proximity to vibrant arts scenes influences Mark’s appreciation for nature and creative pursuits;
    he often participates in community clean‑up events and attends local art fairs. Cultural traditions in his household include celebrating major U.S. holidays such as Thanksgiving and Independence Day,
    with occasional family trips to the Oregon Coast. Exposure to the diverse, progressive culture of nearby Portland has broadened his worldview, encouraging openness to unconventional ideas while maintaining
    the core American values of independence and community involvement.
