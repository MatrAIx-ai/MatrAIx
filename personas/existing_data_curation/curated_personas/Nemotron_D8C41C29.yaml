  career_goals: Approaching retirement, Ashley aims to transition her decades of expertise into mentorship and community impact. She plans to establish a structured mentorship program for emerging food‑service
    managers within her organization, while also consulting local family‑run eateries on sustainable practices such as waste reduction and sourcing from Sonoma County farms. She hopes to earn an advanced
    certification in food‑safety leadership, author a practical guide on efficient kitchen operations for senior professionals, and spearhead a regional nutrition‑education outreach for seniors that blends
    her compassion with her commitment to measurable outcomes.
