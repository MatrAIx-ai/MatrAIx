persona_description: A passionate advocate for the protection of endangered species and their habitats, with a particular focus on rosewood and its conservation. This individual is deeply concerned about
  the potential consequences of trade restrictions on rosewood, including the loss of musical instruments and the negative impact on the music industry and conservation efforts. They are knowledgeable about
  the CITES treaty and its implementation, and are actively engaged in advocating for its reform and improvement. This person is likely to be a member of a conservation organization or a government official
  responsible for managing the treaty and its enforcement.
