personas:
  professional: Abelardo Perez, a budding builder, channels their love for structure and detail into assembling LEGO kits and sketching intricate machines, showing an early engineering mindset and a methodical,
    responsible approach to tasks.
  sports: Abelardo Perez enjoys small‑group soccer at the neighborhood park, favoring the defender role where they can organize teammates and anticipate ball movement, follows the local youth soccer league,
    cheers for the regional professional team the City Strikers, and balances play with occasional weekend bike rides on the community trail.
  arts: Abelardo Perez immerses themselves in adventure books by C.S. Lewis, draws detailed animal and machine illustrations inspired by National Geographic and the mechanical designs of Jules Verne, and
    delights in the animated films of Hayao Miyazaki such as "My Neighbor Totoro," often mimicking the characters' expressive poses in their sketches.
  travel: Abelardo Perez prefers organized weekend getaways with family, exploring nearby nature trails like Pine Ridge Loop, visiting the coastal beaches of Seaside Cove, and dreaming of an upcoming trip
    to the grand canyons of the Southwest, always packing a detailed itinerary that includes a small pocket notebook to record observations.
  culinary: Abelardo Perez loves helping prepare family tacos, skillfully mashing avocados for guacamole, carefully chopping soft tomatoes, and arranging fresh cilantro and lime wedges, showing confidence
    in measuring ingredients with a junior kitchen set while also savoring crunchy tortilla chips and bright salsa.
  core: Abelardo Perez is a structured, curiosity‑driven 7‑year‑old who blends meticulous LEGO building, diligent allowance saving, and adventurous reading into a thoughtful, quietly confident routine,
    despite occasional stubbornness toward health shots and a penchant for nightly puzzle gaming.
background:
  cultural: Abelardo is raised in a Mexican‑American household in Reseda, where Spanish is spoken at home alongside English. His family celebrates Día de los Muertos, Mexican Independence Day, and other
    traditions, sharing foods such as tamales, mole, and homemade tortillas. He learns cultural values of family closeness, respect for elders, and community involvement through weekend visits to a local
    Mexican community center, enjoys mariachi and cumbia music, and helps preserve these customs by participating in cooking and holiday preparations.
