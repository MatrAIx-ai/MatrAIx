  hobbies: '[''Group Fitness Classes (Spin, Bootcamp)'', ''Hiking with local clubs'', ''Volunteering at community food bank'', ''Baking (especially pastries)'', ''Yoga and Mindfulness Meditation'', ''Gardening'',
    ''Reading mystery novels'', ''DIY Home Improvement Projects'']'
  career_goals: She aims to step into a senior director role overseeing operations for a mid‑size technology firm, where she can shape organizational strategy, expand mentorship programs for women in STEM,
    and spearhead initiatives that embed mental‑wellbeing into corporate culture. Laura is pursuing an MBA to complement her technical expertise and is working toward PMP certification. Her long‑term ambition
    is to launch a consultancy focused on building resilient, data‑driven processes that help companies balance high performance with employee emotional health.
