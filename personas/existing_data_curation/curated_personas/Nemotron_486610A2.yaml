personas:
  professional: Laura Redus, a 43‑year‑old senior engineering manager, translates her electrical engineering expertise and fifteen years of process‑driven leadership into data‑backed operational strategies,
    rigorously applying Agile and Lean frameworks while championing mental‑wellbeing initiatives and mentorship for women in STEM, even as her naturally skeptical and competitive streak pushes them to constantly
    benchmark team performance.
  sports: Laura Redus, an avid participant in group fitness classes like spin and HIIT and a regular member of the Seattle Hiking Club, runs seasonal 5K races, follows the Seattle Seahawks and Seattle Kraken
    with enthusiastic loyalty, and plays on a corporate intramural soccer team, all while they schedule weekly yoga sessions to balance high‑intensity workouts with mindful recovery.
  arts: Laura Redus, a mystery‑novel aficionado who devours Agatha Christie’s 'Murder on the Orient Express' and Tana French’s 'In the Woods', frequents the Seattle Art Museum’s contemporary exhibitions
    featuring Pacific Northwest photographers, enjoys the mellow folk of Joni Mitchell and the indie roots of The Lumineers, and they occasionally volunteer as a set builder for community theater productions,
    letting their creative problem‑solving spill over from DIY home‑improvement projects.
  travel: Laura Redus, a meticulous travel planner who prefers structured itineraries that blend outdoor adventure with cultural immersion, has hiked the Canadian Rockies, explored Kyoto’s historic temples,
    taken a pastry‑making workshop in Paris, and kayaked the San Juan Islands, and they now aim to trek the Inca Trail to Machu Picchu while balancing limited vacation days and a budget that still supports
    their passion for boutique eco‑lodges.
  culinary: Laura Redus, an exacting baker who delights in crafting buttery croissants, delicate eclairs, and perfectly timed sourdough loaves, sources fresh herbs from their own garden to infuse salmon
    or mushroom risotto, enjoys the briny taste of smoked Pacific Northwest salmon paired with dill and lemon, and they meticulously weigh every ingredient on a digital scale, a habit that both fuels their
    culinary precision and sometimes fuels anxious perfectionism.
  core: Laura Redus is a structure‑loving, socially dynamic strategist who channels intense anxiety into meticulous planning, thrives on competitive benchmarks, and harbors the guilty habit of nightly spreadsheet
    checks while they bake late‑night pastries.
background:
  cultural: Laura is a white American of mixed German and Irish ancestry, raised in a small town near Medford, Oregon. Her upbringing reflected the Pacific Northwest’s blend of self‑reliance, practicality,
    and a deep appreciation for nature. She grew up in a middle‑class, Protestant‑influenced family that valued hard work, community service, and education, which fostered her strong work ethic and competitive
    drive. Living in Jackson County has reinforced her connection to outdoor recreation and local community engagement, while her divorce and single‑parent experience have further shaped her empathy and
    commitment to supportive networks.
attributes:
  skills: '[''Strategic Planning'', ''Process Improvement'', ''Data Analysis'', ''Project Management'', ''Risk Management'', ''Cross-functional Team Leadership'', ''Budgeting'', ''Stakeholder Communication'',
