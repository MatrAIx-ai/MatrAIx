personas:
  professional: Mary Mitchell, a 37‑year‑old commercial janitor with a decade of expertise in floor care, inventory control, and minor repairs, channels their love of structure and practical problem‑solving
    into a clear career trajectory toward a supervisory role, leveraging upcoming OSHA certification and a green‑cleaning course to become a reliable lead in facilities management.
  sports: Mary Mitchell enjoys hiking the Cascades and daily walks along the Columbia River Trail with their Labrador, cheers on the Seattle Seahawks and Washington State Cougars, and they belong to a community
    garden fitness group that meets for weekend jogs, blending structured cardio with the predictability of seasonal outdoor routines.
  arts: Mary Mitchell unwinds by knitting scarves and blankets while listening to folk singer Joan Baez and reading mystery novels by Agatha Christie, and they regularly attend the Wenatchee Valley Museum’s
    art exhibits and local theater productions of 'Our Town' to keep creative expression grounded in community tradition.
  travel: Mary Mitchell prefers well‑planned, budget‑friendly trips, such as a weekend getaway to Leavenworth’s Bavarian village and a summer road tour of Oregon’s wine country, while dreaming of a spring
    hike in New Zealand’s Southern Alps, always packing a detailed itinerary and a spare dog‑travel crate for their Labrador.
  culinary: Mary Mitchell favors farm‑to‑table meals, often cooking roasted apple‑cinnamon pork tenderloin, kale‑and‑quinoa salad with lemon‑dill dressing, and hand‑made sourdough, and they enjoy experimenting
    with heirloom tomatoes and fresh herbs from their garden while knitting at the kitchen table.
  core: Mary Mitchell blends a love of routine, nature, and hands‑on problem‑solving with a quiet anxiety that fuels meticulous planning, sturdy garden roots, and a constant quest for a balanced, low‑stress
    life.
background:
  cultural: Mary grew up in a middle‑class white family in the Pacific Northwest, where a strong work ethic and community involvement are deeply valued. Her upbringing in a small‑town environment emphasized
    self‑reliance, modesty, and respect for the region’s natural beauty. Local traditions such as seasonal fairs, church gatherings, and volunteer service have shaped her sense of belonging and civic responsibility.
    While she identifies with mainstream American cultural norms, she also embraces the outdoors‑oriented lifestyle characteristic of Washington state, which influences her appreciation for hiking, gardening,
    and sustainable living. These cultural threads combine to create a pragmatic, community‑focused perspective that informs both her professional conduct and personal interests.
attributes:
  skills: '["General commercial cleaning","Floor stripping and waxing","Carpet extraction","Restroom sanitation","Chemical safety (MSDS) knowledge","Operation of floor scrubbers and pressure washers","Inventory
