  hobbies: '["Gardening (vegetable and flower beds)","Hiking in the Cascades","Apple orchard tours during harvest","Dog walking on the Columbia River Trail","Reading mystery novels","Knitting scarves and
    blankets","Volunteer community clean‑up events","Listening to mental‑wellness podcasts"]'
  career_goals: Mary aims to leverage her reliability and hands‑on experience to advance into a supervisory role within the facilities department, such as a lead janitorial supervisor or shift manager.
    She plans to earn an OSHA certification and complete a green‑cleaning course to deepen her expertise in sustainable practices, positioning herself for future opportunities in environmental services.
    Over the next five years, Mary hopes to enroll in a community college program for facilities management, enabling her to transition toward a facility coordinator position where she can oversee multiple
    sites and mentor new staff. Ultimately, her ambition is to secure a stable position that offers both financial security for her family and a manageable workload that reduces her stress levels.
