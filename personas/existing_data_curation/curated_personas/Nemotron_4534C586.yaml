  hobbies: '["Historical Book Club", "Genealogy Research", "Gardening (Vegetables & Herbs)", "Knitting for Charity", "Senior Walking Group", "Library Story‑time Volunteering", "Community Theater Attendance",
    "Gentle Yoga", "Café Writing and Memoir Drafting"]'
  career_goals: Although retired, Janet is driven to leave a lasting educational legacy in her community. She aims to mentor emerging teachers through a weekly intergenerational mentorship program, develop
    a series of life‑skill workshops for seniors that combine practical tasks (e.g., basic home repairs, nutrition) with cognitive enrichment, and author a memoir‑style guide on lifelong learning. Additionally,
    she hopes to advocate for increased funding for adult literacy programs in Worcester County and to spearhead a community garden that serves both as an educational resource and a social hub for local
    residents.
