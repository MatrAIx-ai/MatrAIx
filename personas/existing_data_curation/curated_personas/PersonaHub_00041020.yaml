persona_description: A scholar of history and politics, particularly focused on the impact of American imperialism in the Caribbean. Renda's research interests include the history of the United States Marine
  Occupation of Haiti, the role of paternalism in shaping American perceptions of Haiti, and the complex relationship between the United States and Haiti. She is particularly interested in understanding
  the ways in which American military institutions, politics, and culture influenced the discourse of paternalism and how this discourse was used to shape American public opinion and American foreign policy
  towards Haiti.
