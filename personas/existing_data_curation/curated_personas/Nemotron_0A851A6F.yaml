  hobbies: '[''Reading classic literature'', ''Philosophical journaling'', ''Landscape photography'', ''Model aircraft building'', ''Crossword puzzles'', ''Sudoku'', ''Genealogy research'', ''Local history
    exploration'']'
  career_goals: Theodore aims to secure an entry‑level position as a research assistant or library technician at Wichita State University or the Sedgwick County Library, where he can apply his research
    and organization skills in a structured environment. He plans to pursue a master's degree in Library and Information Science within the next two years, with a focus on archival preservation and digital
    curation. His long‑term ambition is to become a professional archivist or curator for a regional museum, helping to safeguard local history while working largely behind the scenes. He also hopes to
    develop a freelance writing portfolio that provides steady supplementary income, allowing him to maintain financial independence while continuing scholarly work.
