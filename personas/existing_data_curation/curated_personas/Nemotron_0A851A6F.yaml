personas:
  professional: Theodore Sheffield, an 18‑year‑old aspiring research assistant, leverages meticulous archival research skills, proficiency with Zotero and metadata standards, and a quiet dedication to preserving
    Wichita’s prairie history, thriving in the structured environment of the Sedgwick County Library.
  sports: Theodore Sheffield follows the Wichita Thunder ice hockey team and the Kansas City Chiefs with quiet devotion, participates in the Prairie Pace Runners club for occasional 5K jogs, and enjoys
    occasional recreational bowling at the local league, preferring low‑intensity exercise over competitive sports.
  arts: Theodore Sheffield cultivates a refined artistic palate by photographing Kansas prairie vistas in the style of Ansel Adams, devouring classic novels by Jane Austen and Leo Tolstoy, and listening
    to Beethoven’s symphonies and Johnny Cash’s folk ballads, which together shape their quiet yet contemplative creative sensibility.
  travel: Theodore Sheffield prefers solitary road trips that blend quiet reflection with historic exploration, having driven the Flint Hills to Tallgrass Prairie National Preserve, spent a weekend in Washington,
    D.C. touring the National Archives, and dreaming of a future study tour of the British Library in London.
  culinary: Theodore Sheffield enjoys modest Midwestern comforts like chicken fried steak and buttery cornbread while also experimenting with homemade spinach‑ricotta ravioli topped with heirloom tomatoes
    and fresh basil, and they savor a well‑brewed pour‑over coffee during evenings of reading.
  core: Theodore Sheffield is a quietly diligent archivist‑in‑training who balances a love of prairie photography with a disciplined budgeting habit, a mild allergy regimen, and a penchant for solitary
    crossword puzzles.
background:
  cultural: Theodore was raised in a middle‑class family in Wichita, Kansas, where Midwestern values of self‑reliance, modesty, and community stewardship are deeply ingrained. His family has lived in the
    region for several generations, fostering a strong sense of place tied to the plains and the city’s aviation legacy. Growing up, he attended public schools that emphasized practical education and civic
    responsibility, and he participated in community service projects that taught him the importance of quiet contribution and harmony. This cultural setting, combined with his white Midwestern heritage,
    has shaped his preference for orderly environments, his appreciation for solitude, and his considerate, cooperative demeanor.
attributes:
  skills: '[''Critical thinking'', ''Academic research'', ''Professional writing'', ''Editing and proofreading'', ''Project planning'', ''Time management'', ''Digital archiving'', ''Data organization'',
