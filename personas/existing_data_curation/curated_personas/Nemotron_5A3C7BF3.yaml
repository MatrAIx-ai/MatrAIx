  career_goals: Michael dreams of a future where he can design and construct things, so he often says he wants to become an engineer or architect who builds bridges and skyscrapers. He is fascinated by
    space and sometimes imagines being an astronaut, following the precise training and routines that such a career requires. He also admires firefighters and police officers for their clear, structured
    duties, and he hopes to help his community in a similar dependable role. His competitive streak makes him aim to be the top student in math contests and the captain of a school science club, where he
    can lead by example.
