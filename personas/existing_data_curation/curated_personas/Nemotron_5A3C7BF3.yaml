personas:
  professional: Michael Hutchinson is a budding young engineer who channels his love for order into meticulous LEGO constructions, and they apply systematic problem‑solving and strategic thinking—skills
    honed by puzzles and chess—to envision future projects like building functional gadgets.
  sports: Michael Hutchinson plays midfield for the Virginia Beach United Youth Soccer Club, cheers for DC United, and they follow structured training drills twice a week while also collecting soccer cards,
    reflecting their competitive edge and love for predictable routines.
  arts: Michael Hutchinson enjoys watching The LEGO Movie and listening to John Williams’ orchestral scores, and they draw inspiration from the cinematic storytelling and musical motifs to enhance their
    own creative LEGO designs.
  travel: Michael Hutchinson prefers weekend trips to the Virginia Beach boardwalk and family vacations to Washington D.C.’s National Air and Space Museum, and they plan each outing with detailed itineraries
    that include scheduled museum tours and shell‑collecting sessions, balancing adventure with a need for predictability.
  culinary: Michael Hutchinson loves pepperoni pizza, mac and cheese with cheddar cheese, and fish sticks seasoned with lemon, and they can assemble a simple cheese quesadilla at home, often swapping ingredients
    like tomato sauce and olives while preferring familiar comfort foods.
  core: Michael Hutchinson is a seven‑year‑old order enthusiast who obsessively sorts LEGO bricks, shells, and coins, balances competitive video‑game levels with quiet puzzle solving, and sometimes skips
    sunscreen during beach walks.
background:
  cultural: Michael grows up in a middle‑class white family in Virginia Beach, Virginia. His upbringing reflects a Southern Atlantic coastal culture—frequent trips to the beach, love for seafood, and participation
    in local school events and community activities. He attends a public elementary school where multicultural awareness is introduced, yet his household traditions include typical American suburban customs
    such as holiday celebrations, summer barbecues, and involvement in local scouting programs.
