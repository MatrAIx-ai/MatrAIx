personas:
  professional: Roy Garner leverages their meticulous research, writing, and digital archiving skills to produce scholarly articles and manage historical collections, while their competitive edge fuels
    precise project planning for future roles as an archivist at Yellowstone National Park.
  sports: Roy Garner engages in weekend trail hikes with the Bridger Peaks Hiking Club, follows the Wyoming Cowboys football team and the Denver Broncos for NFL excitement, and plays casual pick‑up basketball
    at the Lander community center during winter months.
  arts: Roy Garner cultivates a love for black‑and‑white photography inspired by Ansel Adams, curates a vintage book collection featuring works by Thoreau and Woolf, and finds solace listening to Debussy’s
    ‘Clair de Lune’ while editing essays, occasionally attending local indie theater performances.
  travel: Roy Garner prefers meticulously planned trips to historic sites such as Colonial Williamsburg, the Alhambra, and the ancient libraries of Florence, balancing solo explorations with occasional
    group hikes in the Canadian Rockies, and dreams of a scholarly pilgrimage to Kyoto’s temples.
  culinary: Roy Garner’s palate favors hearty, rustic meals like bison stew with root vegetables, rye bread, and apple crisp, and they enjoy experimenting with heritage recipes such as Scottish oat bannocks
    while brewing single‑origin coffee in a pour‑over method.
  core: Roy Garner is a disciplined, solitary scholar whose love for historic texts and precise organization shapes a life of careful budgeting, measured risk, and quiet ambition tempered by occasional
    back pain and a penchant for vintage aesthetics.
background:
  cultural: Roy identifies as a white American whose upbringing in a modest, middle‑class family in the Midwest instilled values of self‑reliance, practicality, and a respect for privacy. Relocating to
    Bozeman for his university studies exposed him to the rugged outdoor culture of the Rocky Mountain region, fostering an appreciation for nature and community stewardship. His academic focus on humanities
    broadened his cultural awareness, encouraging a nuanced curiosity about diverse historical narratives while reinforcing his commitment to preserving local heritage. Roy integrates the region's outdoor
    lifestyle—hiking, photography, and conservation—into his identity, balancing it with a disciplined, introspective approach to intellectual pursuits.
attributes:
  skills: '["Academic research and critical analysis", "Advanced writing and editing", "Information organization and digital archiving", "Proficiency with Microsoft Office and Google Workspace", "Reference
    management (Zotero, EndNote)", "Basic HTML/CSS for digital content", "Project planning and timeline management", "Small‑group presentation skills", "Event coordination for community programs", "Analytical
    problem‑solving"]'
  hobbies: '["Reading historic non‑fiction and classic literature", "Bullet journaling for organization and reflection", "Solo and small‑group hiking in the Bridger Mountains", "Black‑and‑white landscape
    photography", "Competitive chess (local club and online)", "Collecting and preserving vintage books", "Woodworking projects", "Writing personal essays and freelance historical articles"]'
  career_goals: Roy aims to deepen his expertise in heritage preservation by enrolling in a Master’s program in Library and Information Science within the next year. He envisions securing an entry‑level
    archivist position with the Yellowstone National Park historical documentation team or the Museum of the Rockies, where he can apply his archival skills to protect regional histories. Over the next
    five years, he plans to advance to a senior archivist role, leading digitization initiatives and mentoring junior staff. Parallel to this, he intends to build a freelance portfolio of historical articles
    and essays for academic journals and popular history magazines, establishing himself as a reliable voice in public history. Throughout his career, Roy seeks structured, mission‑focused environments
    that reward precision, independence, and measurable contributions.
