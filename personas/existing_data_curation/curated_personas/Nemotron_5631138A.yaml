  career_goals: Lionel aims to re‑enter the workforce in a role that leverages his organizational talent and people‑focused style. He plans to earn a certification in community project management or a related
    field within the next two years, targeting a position as a community outreach coordinator for a nonprofit or municipal agency in DeKalb County. Long‑term, he dreams of launching his own event‑planning
    and catering business that serves the local community while creating jobs for neighbors. Additionally, he aspires to become a certified peer support specialist to help others manage stress and mental‑health
    challenges.
