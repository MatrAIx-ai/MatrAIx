persona_description: A teacher of the deaf who is interested in the use of sign language before and after cochlear implantation, as well as the myth that sign language interferes with the acquisition of
  spoken language. This person is knowledgeable about the relationship between early expressive language skills and later development of spoken language, and has experience with children who have both sign
  language and spoken language skills. They are interested in the effects of cochlear implantation on spoken language development and the potential benefits of early exposure to spoken language for deaf
  children.
