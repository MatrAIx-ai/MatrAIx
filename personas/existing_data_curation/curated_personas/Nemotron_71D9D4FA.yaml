  hobbies: '[''Chess'', ''Robotics club (basic programming)'', ''Volunteering at a food bank'', ''Cooking Peruvian dishes with family'', ''Playing soccer'', ''Listening to Andean folk music'', ''Reading
    non‑fiction about social issues'', ''Organizing community cultural events'']'
  career_goals: He aspires to pursue a career that blends his desire to help others with his methodical approach. Over the next few years, Dionisio aims to graduate high school with honors, earn a scholarship,
    and study social work or community health at a university. He hopes to become a community outreach coordinator or youth counselor, working within multicultural settings to support at‑risk teens and
    promote educational equity. He also envisions leading programs that connect his Peruvian heritage with local community services.
