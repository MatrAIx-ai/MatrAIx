personas:
  professional: Michael Shuler, a 58‑year‑old automotive service technician, blends three decades of hands‑on engine expertise with a disciplined, organized workflow and a sociable, mentorship‑focused approach,
    allowing them to diagnose everything from classic V8s to modern EV drivetrains while fostering a collaborative shop culture.
  sports: Michael Shuler pitches for the Worcester Adult Softball Association, assists as an assistant coach for the North Worcester youth baseball squad, and keeps their stamina by hiking Mount Wachusett
    with the local Wachusett Hiking Club, all while cheering on the Boston Red Sox and the New England Patriots on game days.
  arts: Michael Shuler finds artistic release in restoring their 1967 Chevrolet Impala to showroom shine, crafting hand‑made wooden coffee tables, and immersing themselves in folk‑music nights featuring
    Gillian Welch, Bob Dylan tribute bands, and local storyteller Tom O'Hara at the Worcester Community Arts Center.
  travel: Michael Shuler favors low‑key, weekend road trips that combine their love for classic cars and nature, often cruising to the annual Woodward Dream Cruise in Michigan, exploring the vineyards of
    Burlington, Vermont, and hiking the White Mountains, while dreaming of a future EV‑technology tour of Stuttgart, Germany, which they hope to fund through a dedicated travel savings account.
  culinary: Michael Shuler enjoys cooking hearty New England fare—perfecting a butter‑rich clam chowder, searing a cedar‑plank salmon with fresh dill, and grilling a dry‑rubbed ribeye steak—while also indulging
    in Saturday night barbecues that feature tangy Carolina‑style slaw and craft beers, and they frequently stop at local diners for a slice of blueberry pie after a long day in the shop.
  core: Michael Shuler is a disciplined, curiosity‑driven auto veteran who balances their love for classic‑car restoration, community coaching, and folk music with a lingering anxiety that fuels both meticulous
    spreadsheets and occasional late‑night engine tinkering.
background:
  cultural: Michael grew up in the modest, working‑class neighborhoods of Worcester County, where New England’s values of hard work, self‑reliance, and community involvement are deeply ingrained. His family’s
    heritage traces back to Irish immigrants who settled in the region, imparting a tradition of craftsmanship and a love for local sports. The cultural emphasis on practicality and modesty shaped his disciplined
    approach to his trade, while the strong community spirit encouraged his sociable nature and his commitment to mentoring younger generations. Living in Shrewsbury, he is familiar with the blend of suburban
    life and the rich automotive culture of the greater Boston area.
attributes:
  skills: '[''engine repair'', ''transmission service'', ''electrical & electronic diagnostics'', ''hybrid/electric vehicle maintenance'', ''preventative maintenance planning'', ''workshop inventory management'',
