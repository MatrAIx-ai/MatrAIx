  hobbies: '[''adult softball league'', ''youth baseball coaching'', ''classic‑car club membership'', ''restoring a 1967 Chevrolet Impala'', ''journaling'', ''mindfulness meditation'', ''hiking in Mount
    Wachusett State Forest'', ''woodworking'', ''live folk music events'']'
  career_goals: Michael aims to obtain his ASE Master Technician certification within the next year and to transition his expertise into a small independent shop that he can own and operate. He envisions
    the shop as a community hub where he can mentor younger mechanics, especially those from under‑represented backgrounds, and incorporate the latest eco‑friendly automotive technologies. In the longer
    term, he hopes to become a regional consultant for dealerships seeking to modernize their service departments, while also authoring a practical guide on blending classic repair techniques with new electric‑vehicle
    diagnostics.
