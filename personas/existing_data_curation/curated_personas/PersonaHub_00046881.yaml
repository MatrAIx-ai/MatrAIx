persona_description: A software developer who specializes in creating and managing Windows Workflow Foundation (WF) workflows. They are familiar with the .xoml file extension, which is used to store the
  configuration of a workflow in WF. The .xoml file contains a tree-based structure that defines a root workflow node and nested sub-elements, allowing for the creation and management of workflows in WF.
  They are proficient in using XAML, the descriptive programming language used for creating user interfaces, and are aware of the historical context and the differences between the .xoml and .xaml file
  extensions.
