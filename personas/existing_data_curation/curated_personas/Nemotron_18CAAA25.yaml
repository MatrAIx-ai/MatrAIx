personas:
  professional: Don Castrejon, a 24‑year‑old aspiring data scientist at a Boston‑area biotech startup, blends his Python, statistical modeling, and laboratory expertise with a collaborative, detail‑oriented
    work style, using structured project plans tempered by flexibility to turn curiosity into practical, data‑driven solutions while his sociable nature and occasional worry drive him to double‑check analyses
    before presenting them.
  sports: Don Castrejon, an avid intramural soccer player for the Norwood Rangers, regularly hikes the Blue Hills and coastal trails with friends, passionately follows the Boston Red Sox and New England
    Revolution, and balances team sports with solo cardio sessions to manage stress and maintain fitness year‑round.
  arts: Don Castrejon, a devoted board‑game host who regularly plays Terraforming Mars and Gloomhaven, also unwinds listening to indie rock favorites like Radiohead and The National, attends local productions
    of Lin‑Manuel Miranda’s works, and finds that the strategic storytelling of tabletop RPGs fuels his problem‑solving mindset and creative curiosity.
  travel: Don Castrejon, a budget‑conscious yet adventure‑seeking traveler, frequently road‑trips to Cape Cod and the White Mountains, has backpacked through Portugal and Italy on a student exchange, and
    dreams of a tech‑focused visit to Tokyo’s Akihabara to explore robotics labs, often using flexible itineraries and hostels to stretch his modest travel fund.
  culinary: Don Castrejon, an intermediate home chef with a love for global flavors, often prepares Thai Pad Thai with tamarind, Japanese ramen with homemade broth, and Spanish paella seasoned with saffron
    and chorizo, sources fresh produce at the Boston Public Market, and swaps recipes with fellow board‑game friends during gatherings.
  core: Don Castrejon fuses New England modesty with tech‑savvy curiosity, juggling a habit of over‑analyzing code and anxiety with spontaneous board‑game nights and midnight coding sprints that keep his
    creative juices flowing.
background:
  cultural: Don grew up in Norwood, Massachusetts, a suburban town within the Greater Boston area. His family’s heritage is primarily of European descent, reflecting a typical White American upbringing
    in New England. The region’s emphasis on education, community involvement, and a mix of urban and natural settings shaped his values. He was raised with a respect for hard work and modesty, participated
    in local community events, and was exposed to the cultural diversity of the Boston metropolitan area through school and extracurricular activities. This background informs his pragmatic outlook, collaborative
    spirit, and appreciation for both tradition and innovation.
