  career_goals: Don aims to secure a full‑time role that merges his curiosity for emerging technologies with practical problem‑solving. He is targeting positions such as junior data scientist at a biotech
    startup, product development engineer in a consumer‑electronics company, or research associate in an academic lab. Over the next five years he plans to deepen his expertise in machine learning and hardware
    prototyping, earn certifications like AWS Certified Machine Learning and Certified SolidWorks Professional, and progress toward a lead engineer or project manager role where he can mentor peers and
    guide multidisciplinary projects. He also intends to expand his professional network in the Boston‑area tech and biotech community through meetups and industry conferences.
