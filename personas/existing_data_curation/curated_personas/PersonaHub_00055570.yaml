persona_description: A scientist who specializes in the development and application of novel imaging technologies for medical research, particularly in the field of neuroscience. She has expertise in the
  synthesis and conjugation of functional materials for targeted delivery and imaging, and has successfully developed and evaluated a multifunctional probe for real-time imaging of glioma brain tumors.
  She is interested in the in vitro and in vivo evaluation of the probe's performance and has published studies on the binding of the probe to metalloproteinases and the specific binding to glioma cells.
