  career_goals: Approaching retirement, Cindy aims to transition from full‑time school management to a mentorship and consulting role that leverages her decades of experience. She hopes to create a regional
    mentorship network for emerging school leaders, guide small‑scale curriculum innovation projects, and serve on the board of a local nonprofit focused on adult literacy. Additionally, she envisions contributing
    to a statewide initiative that supports flexible, competency‑based learning pathways for adult learners, aligning with her belief in practical yet forward‑thinking education. While she plans to scale
    back daily administrative duties, she remains committed to fostering harmony and collaborative growth within the educational community she loves.
