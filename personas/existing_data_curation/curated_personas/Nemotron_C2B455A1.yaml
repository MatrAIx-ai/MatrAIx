  career_goals: Billy aims to spearhead a new interdisciplinary program that merges visual arts, literature, and digital media within the education department, positioning the university as a hub for innovative
    pedagogy. He aspires to publish a monograph on creativity in adult learning and to secure a research grant exploring the impact of abstract art on critical thinking in higher education. Over the next
    five years, he hopes to serve as department chair, mentor a cohort of emerging educators, and establish community partnerships that bring university resources to local schools and cultural institutions.
