    networking and outreach'']'
  hobbies: '[''Community volunteering'', ''Gardening'', ''Hiking and nature walks'', ''Canoeing on lakes'', ''Reading and book clubs'', ''Baking and cooking for gatherings'', ''Quilting and crocheting'',
    ''Genealogy research'', ''Road‑trip travel to historic sites'', ''Church and social events'']'
  career_goals: Patricia aims to become the top‑producing broker in Wright County while earning advanced designations such as Certified Residential Specialist (CRS) and the Graduate REALTOR® Institute (GRI).
    She plans to expand her boutique team, develop a formal mentorship program for new agents, and launch a community‑focused housing assistance initiative. Long‑term, she seeks financial independence for
    a comfortable retirement and hopes to transition into consultancy or teaching roles at local real‑estate schools, sharing her practical expertise with the next generation.
