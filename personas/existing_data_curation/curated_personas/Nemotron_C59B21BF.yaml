  career_goals: Shauna aims to transition from employee to independent contractor within the next three years, establishing her own small painting and paper‑hanging business focused on residential and boutique
    commercial projects in the Cullman County area. She plans to obtain certifications in green painting practices and advanced decorative finishes, positioning herself as a specialist in sustainable and
    artistic interior solutions. Long‑term, she envisions mentoring apprentices through a local trade school program, sharing her blend of practical skill and innovative curiosity.
