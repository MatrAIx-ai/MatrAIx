persona_description: A domestic electrician with expertise in the safe and effective installation, maintenance, and troubleshooting of domestic electrical systems. They are experienced in connecting generators
  to circuits and distribution systems, and are familiar with the differences between floating live and neutral wiring, the risks associated with such wiring, and the proper procedures for connecting and
  disconnection of generators to the grid supply. They are knowledgeable about the benefits and drawbacks of using generators to power multiple pieces of equipment and the need for consumer units and residual
  current devices to protect against electric shock. They are skilled in altering the wiring of generators to bond earth and neutral together and are familiar with the potential hazards of earth loops and
  the importance of clearly marking the wiring of the generator. They are aware of the importance of incorporating generators into domestic supplies or as an alternative supply and are comfortable with
  the job of a qualified and experienced electrician.
