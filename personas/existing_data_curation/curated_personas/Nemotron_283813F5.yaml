    maker workshops (3‑D printing)'']'
  career_goals: Tyler aspires to turn his curiosity and practical mindset into a career that allows him to work independently while contributing to society. He hopes to study computer science and eventually
    become a software developer focused on environmental monitoring tools, combining his love for technology with his appreciation for nature. Alternatively, he is interested in a role as a technical writer
    or data analyst where he can organize information clearly and help others understand complex subjects. He aims to complete high school with strong grades, attend a community college, and then earn a
    bachelor's degree that prepares him for a stable, low-stress, impact-oriented profession.
