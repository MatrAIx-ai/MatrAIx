personas:
  professional: Tyler Sharma is an aspiring junior programmer who writes Python scripts for weather tracking, meticulously documents code as if it were a scientific notebook, and balances boundless curiosity
    with a practical, organized approach to problem‑solving, making their solitary coding sessions highly productive.
  sports: Tyler Sharma enjoys solitary hikes along the Snake River and runs with the Boise Youth Cross‑Country Club in the fall, while cheering on the Idaho Vandals football team in winter and the Seattle
    Seahawks during the NFL season, preferring low‑key fitness routines over noisy team sports.
  arts: Tyler Sharma finds refuge at the piano, interpreting Beethoven’s ‘Moonlight Sonata’ alongside modern film scores by Hans Zimmer and John Williams, while also attending occasional local theater productions
    of classic plays and admiring the works of visual artists like Vincent van Gogh and the digital installations at the community maker space.
  travel: Tyler Sharma prefers meticulously planned getaways, often exploring nearby natural gems like Yellowstone National Park and the Palouse region on quiet backpacking trips, while dreaming of a future
    adventure to Iceland’s aurora‑lit skies and a science‑focused tour of the Kennedy Space Center, all within the constraints of parental permission and a modest travel budget.
  culinary: Tyler Sharma enjoys moderate cooking experiments, frequently whipping up spaghetti carbonara with pancetta and Pecorino, perfecting blueberry pancakes on weekends, and savoring the occasional
    slice of margherita pizza topped with fresh basil, while their skill level rests at confident home‑cook who follows detailed recipes.
  core: Tyler Sharma is a quietly driven teen whose love of order fuels a meticulous hobbyist programmer, a cautious saver, a piano enthusiast, and a worry‑prone but kind soul who finds peace in solitary
    pursuits and structured routines.
background:
  cultural: Tyler grew up in Lewiston, Idaho, a small town nestled along the Snake River in Nez Perce County. His family identifies as white American, embracing the region’s blend of rural values, self-reliance,
    and close-knit community spirit. Celebrations such as Thanksgiving, Fourth of July barbecues, and winter holidays are central to his upbringing, often featuring homemade meals, outdoor activities, and
    community gatherings. Though the area has a strong Native American heritage, Tyler’s family respects and occasionally learns about the Nez Perce history through local museum visits and school projects,
    fostering an appreciation for the land’s original stewards. The surrounding natural environment—forests, rivers, and mountains—has shaped his love for solitary outdoor pursuits and his desire to protect
    the environment.
