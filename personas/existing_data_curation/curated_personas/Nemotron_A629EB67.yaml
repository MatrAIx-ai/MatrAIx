  career_goals: Leonardo aims to open his own restaurant in the Detroit metro area that showcases contemporary Mexican fare built on farm‑to‑table principles. He plans to secure a reputable local food‑scene
    award within five years and eventually earn recognition from national culinary competitions. To achieve this, he intends to complete advanced culinary workshops, refine cost‑efficient menu engineering,
    and build a loyal, well‑trained kitchen team. Financial stability for his wife and future family is a core motivator, so he also envisions expanding into a small catering operation that leverages his
    competitive edge and careful planning. Ultimately, he wants his establishment to be a cultural bridge, blending Mexican heritage with Midwest ingredients while providing a supportive, low‑stress work
    environment.
