persona_description: A researcher in urban planning and design, particularly interested in the concept of public space and its role in urban development. This person has a deep understanding of the changes
  in urban planning and design since the first decades of the last century, and is actively engaged in the debate on the quality of public space in the context of modern complexity. They are interested
  in exploring innovative processes and technologies, and have a special focus on collaborative and temporary configurations of public space. Additionally, they are also interested in the use of nature-based
  design solutions and the use of technology to improve public space, as well as the role of public space in governance and management. They are also interested in the environmental impact of public space
  and the adaptation to climate change, and are looking for ways to redesign public space through innovation and technology.
