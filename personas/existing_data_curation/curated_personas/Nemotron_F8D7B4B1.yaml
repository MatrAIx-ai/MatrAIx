  hobbies: '["hiking", "trail running", "fishing", "community garden volunteer", "guitar playing", "building small woodworking projects", "model ship kit assembly", "reading architectural history", "studying
    sustainable design"]'
  career_goals: Ronald aims to earn his journeyman carpenter certification within the next two years, followed by a master carpenter credential. He envisions eventually opening a small, eco‑focused custom
    woodworking shop that serves the Grass Valley community and neighboring towns. To support that goal, he plans to complete an associate degree in construction management, build a network of reliable
    suppliers, and develop a reputation for high‑quality, responsibly sourced work. He also hopes to mentor younger apprentices, combining his practical skills with a desire to give back to his trade.
