personas:
  professional: Karim Hernandez, a 13‑year‑old budding comic‑book creator, blends vivid imagination with disciplined sketch‑daily routines to craft serialized graphic stories, leveraging strong visual storytelling
    skills and an empathetic eye for character emotion while navigating occasional anxiety that fuels dramatic plot twists.
  sports: Karim Hernandez stays active by playing on the local youth soccer club, the Island Youth Flyers, cheering for FC Barcelona during the European season, and supplementing workouts with salsa and
    reggaeton dance sessions that double as cardio, while also following the Los Angeles Lakers and the New York Yankees for a broader sports palate.
  arts: Karim Hernandez immerses themselves in graphic storytelling, drawing inspiration from manga creator Naoki Urasawa, comic legend Alex Ross, and fantasy author Neil Gaiman, while their musical palate
    includes ukulele renditions of Jack Johnson, reggaeton hits by Bad Bunny, and classical pieces by Yo‑Yo Ma, and they regularly attend community youth theater productions of Shakespeare and contemporary
    plays.
  travel: Karim Hernandez favors family‑planned weekend getaways to coastal towns and occasional school trips to historic sites like Washington, D.C., while day‑dreaming about a future adventure to Tokyo’s
    Akihabara district and a cultural tour of Barcelona to soak in street art and fantasy conventions.
  culinary: Karim Hernandez enjoys hands‑on cooking, frequently helping the family craft mofongo with garlic‑infused plantains and chicharrón, whipping up arroz con gandules, and experimenting with mango‑passion
    fruit smoothies, while their palate also appreciates cheesy pizza slices and classic chicken nuggets during after‑school snack sessions.
  core: Karim Hernandez is a hyper‑imaginative teen who constantly jots down story ideas on napkins, obsessively re‑reads favorite fantasy novels, yet often loses sleep over anxious spirals before school.
background:
  cultural: Karim is a second‑generation Puerto Rican living in Lake Mary, Florida. He grew up in a bilingual home where Spanish and English are spoken daily, and his family maintains many Puerto Rican
    traditions. He celebrates holidays such as Three Kings Day and Noche de San Juan, enjoys foods like arroz con habichuelas, pasteles, and flan, and listens to a mix of salsa, bomba, plena, and modern
    reggaeton. His parents emphasize family cohesion, community involvement, and respect for cultural roots, shaping his cooperative and considerate nature. Karim also participates in a local Latino youth
    arts program that blends Caribbean artistic expression with contemporary media.
