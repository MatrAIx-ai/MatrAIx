    Puerto Rican dishes'', ''dancing salsa/reggaeton'']'
  career_goals: Karim aims to turn his passion for art and storytelling into a career as a concept artist or graphic designer for video games or animation studios. He hopes to attend a specialized visual‑arts
    high school, then study illustration or game design at college. He dreams of publishing his own comic series that reflects his Puerto Rican heritage and, eventually, leading multidisciplinary creative
    projects as a creative director while mentoring younger artists.
