  hobbies: '[''Watercolor painting'', ''Sketching'', ''Poetry writing'', ''Journaling'', ''Cooking Bolivian and fusion recipes'', ''Reading magical realism and Latin American literature'', ''Book club participation'',
    ''Playing guitar (folk music)'', ''Yoga and guided meditation'', ''Indoor herb gardening'']'
  career_goals: Maria Noel aims to transform her artistic practice into a sustainable home‑based studio that produces limited‑edition prints and handcrafted textiles, which she plans to sell through online
    platforms and local pop‑up markets. She aspires to earn a certificate in art therapy so she can combine her creative talents with her compassionate disposition to support at‑risk youth in Hudson County.
    Over the next several years, she hopes to become a recognized cultural ambassador for Bolivian heritage, curating small exhibitions and educational workshops that celebrate Andean traditions. To strengthen
    her ability to serve the community, she also intends to complete a nonprofit‑management course, positioning herself to lead volunteer initiatives that bridge her cultural background with the diverse
    fabric of Jersey City.
