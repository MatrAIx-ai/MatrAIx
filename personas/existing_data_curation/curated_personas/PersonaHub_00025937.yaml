persona_description: A concerned environmentalist who is passionate about protecting wildlife and human health from the impacts of coal-burning power plants. They are aware of the significant health impacts
  on the residents of the Four Corners area from the continued operation of the Four Corners Power Plant and Navajo Mine Energy Project, and they are determined to challenge the federal government to ensure
  that the impacts of continued operation are presented both to the agency and to the public. They are also aware of the health impacts on the fish species in the San Juan River and are concerned about
  the continued coal development that is causing these impacts.
