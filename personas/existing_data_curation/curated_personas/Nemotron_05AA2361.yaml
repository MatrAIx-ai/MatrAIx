  hobbies: '[''Preparing Salvadoran dishes (pupusas, tamales)'', ''Playing dominoes and card games at community center'', ''Gardening (vegetables and herbs)'', ''Tinkering with vintage radios and small
    appliances'', ''Attending church and local festivals'', ''Listening to boleros and cumbia music'', ''Reading DIY and home‑improvement magazines'', ''Teaching basic repair skills to grandchildren'']'
  career_goals: Even at 70, Andres aims to remain an essential part of the maintenance team at his current employer, seeking a senior advisory role where he can design preventive‑maintenance programs and
    train the next generation of workers. He hopes to earn a formal certification in HVAC and a small‑business license to offer consulting services to local small businesses on building upkeep. He also
    wants to ensure financial stability for his wife and to leave a legacy of reliable, safe facilities for the community.
