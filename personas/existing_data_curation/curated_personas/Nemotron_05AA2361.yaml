personas:
  professional: Andres Arroyorivera, a 70‑year‑old master of building maintenance with five decades of hands‑on expertise in electrical, plumbing, HVAC, and carpentry, blends methodical scheduling with
    a curiosity for new tools, mentors apprentices in both English and Spanish, and is pursuing an HVAC certification and a consulting license to become a senior advisor who designs preventive‑maintenance
    programs for his municipal employer.
  sports: Andres Arroyorivera enjoys casual basketball at the senior league, follows the Houston Astros and the Houston Texans avidly, and participates in weekly low‑impact fitness classes at the community
    center’s senior stretch club to stay active despite occasional knee soreness.
  arts: Andres Arroyorivera finds solace in classic boleros and cumbia, often playing vinyl records by José José, Celia Cruz, and Los Ángeles Negros while flipping through DIY magazines, and they occasionally
    join a local folk‑dance group that performs traditional steps during community festivals.
  travel: Andres Arroyorivera prefers well‑planned road trips to historic towns like Antigua, Guatemala, and Santa Fe, New Mexico, mixing cultural sightseeing with leisurely meals, yet they limit long flights
    due to health concerns and budget constraints, often traveling with grandchildren for shared family experiences.
  culinary: Andres Arroyorivera delights in preparing pupusas stuffed with cheese, loroco, and refried beans for the annual community festival, cultivates fresh tomatoes, cilantro, and peppers in a modest
    garden, and they savor the aroma of simmering salsa roja while sharing stories over communal meals.
  core: Andres Arroyorivera is a talkative, detail‑oriented handyman who worries about every loose screw, hoards vintage radios, and insists on a perfectly organized schedule before joining any social gathering.
background:
  cultural: Andres grew up in a Salvadoran family that emigrated to the United States in the 1970s. He maintains strong ties to his roots through language, Catholic traditions, and regular participation
    in the Salvadoran diaspora community of South Hill and the surrounding area. Family gatherings are central to his life; he celebrates holidays such as Día de los Santos and the Feria de la Palma with
    traditional foods and music. His bilingual fluency allows him to serve both Spanish‑speaking neighbors and English‑speaking clients, bridging cultural gaps and fostering community harmony.
attributes:
  skills: '[''Electrical wiring and troubleshooting'', ''Plumbing repair and installation'', ''HVAC maintenance'', ''Carpentry and woodwork'', ''Preventive maintenance scheduling'', ''Safety inspections
