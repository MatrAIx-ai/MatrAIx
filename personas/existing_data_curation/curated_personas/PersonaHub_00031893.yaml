persona_description: A biologist who specializes in the study of mammalian metabolism, particularly the cellular reactions that contribute to the regulation of metabolic rate and the production of heat.
  Their research interests include, but are not limited to, the quantitative contribution of different cellular reactions to the standard metabolic rate, the differences and distinctions between the cellular
  reactions that couple to oxygen consumption, uncouple metabolism, hydrolyze ATP, control metabolic rate, regulate metabolic rate, produce heat, and dissipate free energy. They are likely to be interested
  in the implications of the significant contribution of proton leak to standard metabolic rate for tissue P-to-O ratio, heat production, and free energy dissipation by oxidative phosphorylation, and the
  estimated contribution of ATP-consuming processes to tissue oxygen consumption rate.
