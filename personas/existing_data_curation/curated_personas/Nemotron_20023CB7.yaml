personas:
  professional: Juan Perez is a budding comic illustrator who channels curiosity into drawing vibrant panels, rehearses storytelling techniques from adventure books, and often trades LEGO creations for
    brainstorming sessions with friends, showing a naturally cooperative and flexible approach to collaborative projects despite a habit of misplacing sketchbooks.
  sports: Juan Perez is a spirited member of the local junior soccer club, dribbling for the team dubbed the River Rangers, cheering for the city’s professional basketball team the Eagles, and spends Saturday
    mornings jogging on park trails while scanning for interesting insects, mixing competitive play with a love for nature.
  arts: Juan Perez immerses themselves in creative expression, sketching comic heroes inspired by Jim Lee, painting panels reminiscent of classic Disney animation, dancing to traditional folk rhythms alongside
    contemporary pop hits from Ariana Grande and Ed Sheeran, and citing the whimsical storytelling of Dr. Seuss as a core influence on their artistic identity.
  travel: Juan Perez dreams of exploring the towering redwoods of the state park they often hike, revisiting the seaside boardwalk of their hometown, and hopes to one day experience the neon streets of
    Tokyo’s Akihabara and the historic museums of Paris, balancing family road trips with spontaneous weekend camping adventures whenever school permits.
  culinary: Juan Perez prefers simple, comforting meals like cheesy spaghetti, chicken nuggets, and fruit‑laden smoothies, enjoys adding a dash of hot sauce to mini tacos for extra zing, shows moderate
    cooking skill by whipping up scrambled eggs with diced bell peppers, and delights in creating LEGO‑shaped cookies with vanilla frosting for friends.
  core: Juan Perez is a curious, art‑loving nine‑year‑old who sketches comics, trades LEGO bricks for ideas, worries about missing deadlines, and balances a love for soccer and folk‑pop rhythms with an
    ever‑growing imagination.
background:
  cultural: Juan grows up in a bilingual Mexican-American household in Fresno, where Spanish is spoken at home and English at school. His family celebrates traditions like Día de los Muertos, enjoys homemade
    tamales and tacos, and participates in local community festivals that blend Mexican heritage with the Central Valley’s agricultural roots. He attends a Catholic parish with a vibrant youth group, and
    his extended family often shares stories of Mexico, reinforcing his pride in his cultural identity while also embracing the diverse influences of his California community.
