  career_goals: Juan dreams of a future where he can combine his love for animals, art, and helping people. He often talks about becoming a veterinarian so he can care for neighborhood pets and farm animals,
    but he also imagines working as a community health volunteer or a teacher who uses creative projects to engage classmates. His overarching ambition is to make a positive difference in his community
    while keeping the flexibility to explore new ideas.
