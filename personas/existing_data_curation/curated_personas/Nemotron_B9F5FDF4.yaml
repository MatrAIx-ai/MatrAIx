personas:
  professional: Teresa Yacco, a seasoned construction project manager on the cusp of retirement, channels three decades of architectural and engineering oversight into meticulous project planning, budget
    control, and lean‑construction documentation while they foster a supportive, detail‑oriented team environment and mentor emerging women engineers with a calm, routine‑driven leadership style.
  sports: Teresa Yacco enjoys leisurely nature walks along the Lake Michigan shoreline with the Kenosha Senior Center walking club, participates in low‑impact water‑aerobics classes to protect their joints,
    and follows the Milwaukee Brewers and Green Bay Packers as seasonal sports rituals.
  arts: Teresa Yacco immerses themselves in historical fiction and mystery novels, contributes to lively discussions at a local book club, attends monthly performances at the Milwaukee Repertory Theater,
    and knits scarves inspired by Victorian textile patterns while listening to folk singer Joan Baez as a soothing soundtrack.
  travel: Teresa Yacco favors well‑planned road trips that blend historic sightseeing with comfortable accommodations, having toured Door County’s lighthouses and Charleston’s colonial district, and dreams
    of a leisurely pilgrimage to the medieval towns of Bruges and Edinburgh, always using senior‑discounted stays and detailed itineraries to ease travel‑related anxiety.
  culinary: Teresa Yacco delights in preparing garden‑fresh meals such as ratatouille, beet and goat‑cheese salad, and rustic whole‑wheat bread seasoned with basil, thyme, and roasted garlic, while occasionally
    rewarding a completed knitting project with a slice of creamy pumpkin cheesecake.
  core: Teresa Yacco is a methodical, community‑oriented retiree who balances a love of routine and sustainable design with a gentle anxiety that fuels both careful planning and occasional comfort‑seeking
    splurges.
background:
  cultural: Teresa was raised in a traditional Midwestern white family with German‑Polish ancestry, rooted in the values of hard work, modesty, and community service. Growing up in the suburbs of the Greater
    Chicago area before relocating to Kenosha, she was immersed in a culture that emphasizes practicality, reliability, and a strong sense of civic duty. Her upbringing included regular church attendance,
    participation in local fairs, and an appreciation for modest, functional design, which later influenced her career in architectural and engineering management. These cultural influences continue to
    shape her approach to both professional responsibilities and personal life.
