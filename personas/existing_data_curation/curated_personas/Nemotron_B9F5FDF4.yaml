  career_goals: Teresa aims to consolidate her legacy by guiding the transition of her department to the next generation of managers, ensuring that current projects are completed on schedule and within
    budget. She plans to obtain LEED Accredited Professional status to deepen her expertise in sustainable design and to mentor emerging engineers and architects, particularly women, in navigating the industry.
    Over the next few years, she hopes to reduce her workload gradually while taking on a consulting role that allows her to share her practical knowledge without the daily pressures of full‑time management.
