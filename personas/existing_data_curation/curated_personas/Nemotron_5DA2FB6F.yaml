personas:
  professional: Shenita Ashley, a retired homemaker turned community mentor, leverages her methodical budgeting, gardening, and cooking expertise to organize church events and senior‑center workshops, while
    her competitive streak pushes her to lead cooking contests and her skeptical eye ensures every plan is meticulously vetted.
  sports: Shenita Ashley enjoys low‑impact fitness through daily walks along Lettuce Lake Park trails, participates in the local senior walking club, and fervently supports the Tampa Bay Buccaneers and
    the Florida Gators, occasionally cheering loudly at televised games while keeping a competitive tally of steps taken each week.
  arts: Shenita Ashley immerses themselves in gospel legends like Mahalia Jackson, soul icons such as Aretha Franklin, and jazz greats like Louis Armstrong, sings along during church services, and relishes
    classic Hollywood films like Casablanca and Gone with the Wind, often quoting lines in conversations with fellow seniors.
  travel: Shenita Ashley prefers relaxed road trips to nearby historic towns such as St. Augustine, Savannah, and Charleston, enjoys day visits to the Florida Keys for fresh seafood, but budget constraints
    keep them from long‑haul cruises, and they meticulously plan each itinerary using a notebook to avoid any unexpected stress.
  culinary: Shenita Ashley excels at preparing Southern soul‑food staples like collard greens seasoned with smoked turkey, buttery cornbread, sweet potato pie infused with nutmeg, and low‑sugar fried chicken,
    skillfully adjusts recipes to lower sodium while still honoring traditional flavors, and cherishes a pantry stocked with fresh basil, thyme, and garden‑grown oregano.
  core: Shenita Ashley combines a fiercely organized mind, a competitive edge in garden and kitchen challenges, and a resilient yet worry‑prone spirit that fuels their lifelong mission to preserve family
    heritage.
background:
  cultural: Shenita grew up in Tampa’s historic Overtown neighborhood during the era of segregation, absorbing the resilience and communal spirit of the African‑American South. Her upbringing was steeped
    in church life, gospel music, and the oral storytelling tradition that preserved family history across generations. The civil‑rights movement of the 1950s and 60s shaped her cautious yet determined
    worldview, fostering a healthy skepticism that guides her interactions. She maintains strong ties to Southern Black culinary traditions, especially soul‑food cooking, and honors the craft of quilting
    and sewing passed down from her mother and aunt. While she respects the established customs of her community, she remains open to new ideas, reflecting a balance of curiosity and practicality rooted
    in her cultural heritage.
attributes:
  skills: '["Southern soul‑food cooking", "Herb and vegetable gardening", "Quilting, hand‑sewing, and knitting", "Household budgeting and financial planning", "Community event coordination", "Oral storytelling
    and family history preservation", "Basic smartphone and video‑call usage", "Strategic bingo and card‑game play"]'
  hobbies: '["Herb garden cultivation", "Cooking traditional Southern dishes", "Knitting and crocheting", "Reading historical fiction and biographies", "Listening to gospel, soul, and jazz music", "Participating
    in church choir and picnics", "Bingo and card games at the senior center", "Walking in Lettuce Lake Park", "Family genealogy research", "Watching classic Hollywood films"]'
  career_goals: Although retired, Shenita’s ambitions focus on leaving a lasting legacy. She aims to compile her family’s cherished recipes and stories into a small cookbook and memoir that can be passed
    down to grandchildren. She wants to continue mentoring younger members of her church and the senior‑center, teaching them cooking, gardening, and financial organization. Maintaining her health and independence
    remains a priority, as does staying mentally sharp through regular reading and community participation. Shenita also hopes to see her descendants succeed academically and professionally, and she quietly
    works toward that by offering guidance and encouragement.
