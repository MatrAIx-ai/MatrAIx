background:
  cultural: Jasmine is being raised in a Black American family in Youngstown, Ohio, a city shaped by the industrial Midwest and a vibrant African‑American community. Her upbringing blends traditions such
    as gospel music, church fellowship, family storytelling, and celebrations of Black heritage with Midwestern values of resilience and solidarity. Community events like the Youngstown Black Cultural Festival,
    church gatherings, and neighborhood block parties will expose her to a rich tapestry of music, cuisine, and intergenerational mentorship that will shape her identity and worldview.
