persona_description: A researcher and inventor with a unique and innovative approach to problem-solving. Known for their work in the field of pykrete, a stronger-than-ice mixture of water and wood pulp
  used to construct aircraft carriers. The inventor's solution to the problem of ice melting during construction was to rig the ship with a complex refrigeration system and reinforcements consisting of
  10,000 tons of steel, which was the very resource they were trying to avoid using in the first place. Despite the success of their invention, the project was eventually abandoned due to the high cost
  and the inability to overcome the issue of "plastic flow".
