  career_goals: Stephen aims to progress to a senior systems architect role where he can shape enterprise‑wide technology strategies and integrate emerging AI/ML capabilities into operational workflows.
    He plans to earn certifications such as TOGAF and CISSP to deepen his expertise in enterprise architecture and cybersecurity. Over the next five years, he wants to lead a multidisciplinary team, mentor
    junior analysts, and spearhead initiatives that improve organizational agility and sustainability. Ultimately, he envisions transitioning into a product management position that bridges technology innovation
    with market needs, leveraging his curiosity for new ideas and his ability to collaborate across diverse groups.
