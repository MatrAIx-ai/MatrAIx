persona_description: A political economist and historian who specializes in the study of famine and its causes in India. Sen argues that democracy is a critical factor in preventing famines, as it provides
  a free and independent press and allows for periodic election. He also emphasizes the informational role played by democracy in situations where there is little public knowledge of the consequences of
  government policy. Sen's work is particularly relevant to current debates about the impact of authoritarian rule on food security and the role of democracy in preventing famines.
