persona_description: A researcher and inventor who is passionate about developing new technologies for biosensor materials and devices. They are interested in developing simple, portable, disposable, and
  inexpensive paper-based solid-phase sensors to run multiple bioassays and controls simultaneously. They are also interested in using biocompatible sol-gel-derived materials for protein immobilization
  on solid surfaces, which will allow for automation of the printing process and clearly show that biomolecules can withstand the ink-jet deposition process. Their research interests include developing
  bioactive paper that can detect, capture, and deactivate water and airborne toxins, particularly in developing countries where neurotoxins are a significant concern.
