    for art-science workshops'']'
  hobbies: '[''Watercolor painting'', ''Visiting art exhibitions'', ''Reading science and literature'', ''Gardening (vegetables and native wildflowers)'', ''Birdwatching'', ''Crossword puzzles and Sudoku'',
    ''Knitting'', ''Genealogy research'', ''Senior-center book clubs'', ''Community theater'', ''Cooking Texan cuisine'', ''Road trips to historic towns'']'
  career_goals: Annie aims to stay intellectually engaged by mentoring local high school students in STEM, establishing a scholarship for female students, leading art‑science workshops at the community
    center, and volunteering as a board member for the Sealy Historical Museum. She hopes to write a memoir documenting her experiences in the petrochemical field and her family's Texan heritage, and to
    travel to a few key art museums such as the Museum of Fine Arts in Houston and the Smithsonian. She also wants to maintain her mental acuity by pursuing lifelong learning through online courses in quantum
    physics and art history.
