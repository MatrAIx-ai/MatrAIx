  career_goals: John aims to transition from his current technical role into a data‑science position within a manufacturing or energy firm, where he can apply predictive analytics to improve operational
    efficiency. Over the next five years, he plans to complete a bachelor's degree in Applied Mathematics or Engineering, followed by a professional certification in data analytics (e.g., SAS, Microsoft
    Azure). His long‑term ambition is to become a senior analyst or R&D manager, leading interdisciplinary teams that develop innovative, yet practical, solutions. He also hopes to mentor younger technicians
    and eventually launch a consultancy focused on process optimization for Midwestern industries.
