personas:
  professional: John Couch is a data‑savvy mathematical scientist who leverages Python, MATLAB, and advanced Excel to build predictive models for manufacturing processes, while leading small project teams
    with clear communication and a pragmatic, reliability‑first mindset.
  sports: John Couch plays pickup basketball at the local gym, hikes the Little Miami Scenic Trail in the spring, follows the Cincinnati Bengals and the Cleveland Browns loyally, and belongs to the county
    hiking club that meets monthly for weekend treks.
  arts: John Couch volunteers as the lighting and sound technician for the community theater, enjoys the folk‑rock sounds of The Avett Brothers and the indie cinema of Greta Gerwig, and spends trivia nights
    quoting classic movie lines while bonding with friends.
  travel: John Couch has road‑tripped to Nashville’s music scene and the historic streets of Boston, dreams of backpacking through Yellowstone and the Grand Canyon, and prefers planning trips with detailed
    itineraries that balance adventure hikes with budget‑friendly lodging.
  culinary: John Couch experiments in the kitchen with homemade chili, smoked bratwurst, and weekend batch‑cooking of chicken enchiladas, often sourcing fresh corn and tomatoes from the local farmer’s market
    while pairing dishes with a rotating selection of craft beers.
  core: John Couch blends Midwestern practicality with a tech‑driven curiosity, thriving on teamwork, occasional competitive streaks, and a habit of tinkering with gadgets while never missing a community
    basketball game.
background:
  cultural: John grew up in Franklin, Ohio, a small Midwestern town with deep ties to manufacturing, agriculture, and community-oriented values. His family’s European ancestry—predominantly German and Irish—has
    instilled traditions of hard work, modesty, and self‑reliance. Local influences include high school sports culture, church and civic events, and the regional emphasis on practical problem solving. He
    celebrates typical American holidays such as Independence Day with community parades and fireworks, and participates in county fairs that showcase local crafts and agricultural heritage. The area's
    blend of industrial history and natural landscapes shaped his appreciation for both technological progress and outdoor recreation. While primarily English‑speaking, John has had exposure to Spanish
    through community outreach programs, fostering a modest openness to cultural diversity.
