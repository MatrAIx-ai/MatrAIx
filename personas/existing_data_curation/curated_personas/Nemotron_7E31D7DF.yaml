personas:
  professional: Mary Orbe is a diligent high school science club member who blends her curiosity for biology with practical organization to lead weekly experiments, while also volunteering to coordinate
    community events, showcasing emerging leadership and a compassionate drive toward future caregiving roles.
  sports: Mary Orbe enjoys weekend hikes on local trails, occasionally joins the community youth soccer league as a casual player, cheers for the hometown baseball team the Springfield Hawks, and uses a
    bike to commute to school for extra cardio.
  arts: Mary Orbe spends evenings drawing digital illustrations inspired by mystery novels, listening to pop artist Taylor Swift and country singer Kacey Musgraves, and frequently attends local art workshops
    where they craft friendship bracelets and experiment with watercolor.
  travel: Mary Orbe daydreams about a spring road trip to the national parks of the Pacific Northwest, but for now explores nearby state parks on weekend hikes and has saved up for a school‑organized exchange
    program to visit a coastal town in Ireland.
  culinary: Mary Orbe loves whipping up simple meals like spaghetti carbonara and avocado toast, perfecting grandma’s chocolate chip cookies, and frequently experiments with garden‑fresh herbs in homemade
    pesto, though they sometimes forget to clean up after cooking.
  core: Mary Orbe is a 16‑year‑old pragmatic dreamer who balances curiosity with community service, saves cautiously for a bakery future, and occasionally over‑commits to school clubs while forgetting to
    hand‑wash dishes.
background:
  cultural: Mary grew up in Deville, a small town in Rapides Parish, Louisiana, where Southern hospitality and a close‑knit community shape daily life. Her family participates in local church gatherings
    and values traditions such as community potlucks, holiday celebrations that often incorporate Cajun flavors, and a reverence for the outdoors. The cultural environment emphasizes modesty, mutual support,
    and a strong sense of belonging, all of which inform Mary's respectful demeanor and her desire to give back to her community.
attributes:
  skills: '[''basic computer literacy (word processing, spreadsheets)'', ''internet research'', ''organized note‑taking and time management'', ''basic cooking and meal planning'', ''gardening'', ''volunteering
