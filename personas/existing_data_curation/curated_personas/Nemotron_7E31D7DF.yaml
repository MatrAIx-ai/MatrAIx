  hobbies: '[''hiking and exploring nature trails'', ''reading mystery and adventure novels'', ''listening to pop and country music'', ''participating in school science club'', ''drawing and digital illustration'',
    ''playing strategy video games'', ''DIY crafts (friendship bracelets, home décor)'']'
  career_goals: Mary aims to finish her secondary education, either by completing high school or obtaining a GED, so she can pursue a career that blends her compassion for others with practical stability.
    She is drawn to fields such as early childhood education, nursing assistance, or a community health role where she can help people while maintaining a reliable schedule. In the longer term, she imagines
    opening a small, family‑run bakery or a garden-to‑table initiative that reflects her love for cooking, gardening, and serving her community.
