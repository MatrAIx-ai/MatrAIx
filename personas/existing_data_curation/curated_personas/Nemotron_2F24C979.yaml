  career_goals: Approaching traditional retirement, Latrina aims to transition into a mentorship role, securing a part‑time advisory position within the building‑management team where she can share her
    institutional knowledge and guide younger cleaners. She plans to earn a certification in Environmental Health and Safety to qualify for a modest pension supplement. Ultimately, she hopes to be recognized
    with a community award for her decades of reliable service and to volunteer at local senior centers, teaching basic home‑care and cleaning skills to fellow elders.
