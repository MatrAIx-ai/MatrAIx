personas:
  professional: Latrina Magwood, an 82‑year‑old building‑maintenance veteran, leverages five decades of floor‑care expertise and OSHA know‑how to mentor junior cleaners, offering calm, detail‑oriented guidance
    while occasionally indulging in last‑minute schedule tweaks that reflect their spontaneous side.
  sports: Latrina Magwood enjoys gentle walks in Riverside Park, follows the New York Mets and Buffalo Bills on television, and attends local senior‑friendly water‑aerobics classes, while also cheering
    on the Binghamton Rumble Ponies during summer home‑games.
  arts: Latrina Magwood sails through gospel classics by Mahalia Jackson and blues legends like B.B. King, sings in their church choir, treasures quilts inspired by Gee’s Bend patterns, and loses themselves
    in historical fiction by Isabel Wilkerson, while occasionally watching classic films starring Sidney Poitier.
  travel: Latrina Magwood prefers short, well‑planned trips to nearby attractions such as Watkins Glen State Park and historic Saratoga Springs, yet they spontaneously revisit Memphis to chase the blues
    scene, and dream of a modest pilgrimage to their grandparents’ hometown in the rural South.
  culinary: Latrina Magwood’s kitchen is a shrine to soul‑food, where they perfect fried chicken, collard greens simmered with smoked turkey, cornbread, and sweet‑potato pie using fresh okra, black‑eyed
    peas, and a trusted cast‑iron skillet, while occasionally treating themselves to store‑bought peach cobbler.
  core: Latrina Magwood blends disciplined service as a cleaning mentor with a soulful love for gospel, quilting, and Southern flavors, all tempered by a playful streak that lets them bend schedules and
    savor simple joys.
background:
  cultural: Latrina is an African‑American woman whose grandparents migrated from the rural South to upstate New York during the Great Migration, settling in the Johnson City area. Raised in the 1950s and
    60s, she was shaped by a close‑knit Black community, the traditions of a historic Baptist church, and a family emphasis on hard work, self‑reliance, and communal support. Her cultural identity blends
    Southern culinary heritage, church music, and the resilience forged by navigating segregation and the civil‑rights movement. She maintains strong ties to community service, family gatherings, and oral
    histories that celebrate Black perseverance in the Northeast.
