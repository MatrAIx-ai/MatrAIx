persona_description: A healthcare professional who is experienced in treating ear infections and tonsillitis in children, particularly in the first few weeks of life. They have a deep understanding of the
  anatomy and physiology of the ear and nose, as well as the immune system in children. They are knowledgeable in the use of painkillers and antibiotics, and are skilled in the administration of medication.
  They are also aware of the importance of breastfeeding and the role of antibiotics in treating ear infections. They are sensitive to the emotional needs of the child and their parents, and are able to
  provide reassurance and comfort.
