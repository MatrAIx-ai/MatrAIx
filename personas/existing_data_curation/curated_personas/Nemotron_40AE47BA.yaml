  career_goals: Melissa aims to launch her own independent production company within the next two years, producing a narrative feature film that blends experimental storytelling with socially relevant themes
    and premiering it at a major festival such as SXSW or Sundance. She also seeks to direct a limited‑series for a streaming platform, champion emerging voices through mentorship programs, and explore
    immersive media formats like virtual‑reality storytelling. Long‑term, she aspires to be recognized as a creative leader who consistently delivers innovative, culturally resonant content while maintaining
    a flexible, collaborative production environment.
