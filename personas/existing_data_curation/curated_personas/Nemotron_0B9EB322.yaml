personas:
  professional: Kasey Thorpe, a budding junior coder, merges a passion for adventure and mystery books featuring animals with a knack for building intricate LEGO and K’NEX structures, channeling curiosity
    and practicality into crafting simple Scratch games about forest quests.
  sports: Kasey Thorpe shells out energy playing forward for the Little Strikers Soccer Club, cheers on the local high‑school soccer team, idolizes Manchester United’s Marcus Rashford, and balances team
    practices with solo weekend hikes to nearby streams for amphibian spotting.
  arts: Kasey Thorpe draws inspiration from Dr. Seuss’s whimsical illustrations and the pixel‑art aesthetic of the game Minecraft, eagerly attends library storytime events featuring author Rick Riordan,
    and decorates sketchbooks with limited‑edition Disney character stickers.
  travel: Kasey Thorpe enjoys weekend expeditions to Riverbend State Park to watch kingfishers, dreams of joining the junior ranger program at the Grand Canyon, and cherishes a family tradition of a summer
    road‑trip to Niagara Falls, balancing curiosity with budget‑friendly travel plans.
  culinary: Kasey Thorpe loves helping bake chocolate‑chip cookies with a pinch of sea salt during holidays, often experiments with edible LEGO‑shaped fruit skewers, prefers mac‑and‑cheese for lunch, and
    sometimes forgets to wash hands before handling dough.
  core: Kasey Thorpe is a curious 9‑year‑old explorer‑coder who balances a love for wildlife, LEGO, and soccer with occasional snack‑splurges and a habit of forgetting chores.
background:
  cultural: Kasey is raised in a white American family in the suburban community of Chatham, New Jersey. Her family participates in typical suburban traditions such as celebrating Thanksgiving, Christmas,
    and the Fourth of July, and they value community involvement through local library programs, school events, and neighborhood sports leagues. The town's emphasis on education, safety, and outdoor recreation
    influences her interests in reading, nature, and organized extracurricular activities. Her parents encourage curiosity balanced with practicality, fostering her desire to learn while completing responsibilities.
