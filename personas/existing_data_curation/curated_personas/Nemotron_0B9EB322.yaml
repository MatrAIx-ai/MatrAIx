  career_goals: Kasey dreams of becoming a marine biologist or veterinarian who helps protect wildlife. She also imagines designing educational games that teach other kids about animals and the environment.
    In the near term, she hopes to become the class monitor, lead a science fair project on local ecosystems, and improve her drawing skills to create her own comic strips.
