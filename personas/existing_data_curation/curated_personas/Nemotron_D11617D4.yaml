personas:
  professional: Rubisel Gonzalez, a 57‑year‑old veteran administrative professional, leverages three decades of executive support, bilingual liaison work, and creative event planning to orchestrate community
    arts programs while navigating her relaxed, improvisational approach to deadlines with a collaborative, yet occasionally assertive, style.
  sports: Rubisel Gonzalez, a 57‑year‑old outdoor enthusiast, enjoys leisurely hikes with the White Mountains Hiking Club, follows the Boston Red Sox and Boston Bruins with seasonal enthusiasm, and participates
    in community walking groups, preferring gentle trail walks over high‑intensity gym sessions.
  arts: Rubisel Gonzalez, a 57‑year‑old avid art aficionado, regularly visits Boston museums to study works by Monet, O’Keeffe, and Kusama, draws inspiration for her quilting and knitting from their bold
    palettes, enjoys salsa nights featuring music by Celia Cruz, and contributes to a local book club focused on art history.
  travel: Rubisel Gonzalez, a 57‑year‑old traveler who balances spontaneity with modest budgeting, takes weekend road trips to New England coastal towns like Portland, Maine, plans annual flights to the
    Caribbean island where her family resides, and dreams of a culturally immersive getaway to Barcelona’s art districts.
  culinary: Rubisel Gonzalez, a 57‑year‑old culinary enthusiast, delights in preparing island staples such as arroz con gandules, mofongo, and pasteles using home‑grown plantains, cilantro, and sofrito,
    while also incorporating fresh tomatoes and peppers from her garden into inventive side dishes.
  core: Rubisel Gonzalez, a 57‑year‑old social dynamo, blends a love for art, community, and spontaneous salsa dancing with a habit of misplacing appointments and over‑watering her garden, all while navigating
    a gentle, worry‑prone inner voice.
background:
  cultural: Rubisel was born and raised in a close‑knit Puerto Rican family, learning both Spanish and English from an early age. She carries the island’s vibrant traditions—music, dance, and cuisine—into
    her daily life in Francestown, NH. She celebrates cultural holidays such as Three Kings Day and Puerto Rican Day with family gatherings, festive foods, and music. Her Catholic upbringing informs her
    community involvement, often volunteering at the local parish’s cultural events. While she has embraced the slower, community‑oriented lifestyle of New England, she remains proud of her heritage, serving
    as a cultural bridge between the Puerto Rican diaspora and her New Hampshire neighbors. This dual identity shapes her worldview, fostering a deep appreciation for diversity, storytelling, and the arts.
