  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing and Latin music gatherings'', ''Cooking traditional Puerto Rican dishes'', ''Gardening and seasonal planting'', ''Walking and hiking
    in New Hampshire’s countryside'', ''Participating in community theater'', ''Reading art history and contemporary fiction'', ''Volunteering at the local senior center'', ''DIY crafts like knitting and
    quilting'', ''Traveling to Puerto Rico to reconnect with family and culture'']'
  career_goals: Rubisel aims to transition over the next few years into a role that blends her administrative strengths with her love of the arts and her Puerto Rican heritage. She is exploring part‑time
    positions as a cultural program coordinator at the local community center, where she could organize art exhibitions, language workshops, and heritage festivals. She also hopes to mentor younger staff
    on effective communication and bilingual service, and to develop a small consulting service that helps small nonprofits in Francestown with event logistics and bilingual outreach. Ultimately, she wants
    a balanced work schedule that reduces stress, provides financial security for retirement, and leaves ample time to pursue creative projects and community involvement.
