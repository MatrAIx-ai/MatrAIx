personas:
  professional: Mary Hite, a budding hands-on explorer, demonstrates early talent for constructing makeshift forts from wooden crates and farm-yard toys, blending curious experimentation with pragmatic
    problem-solving while they prefer a relaxed, unstructured play schedule.
  sports: Mary Hite, a spirited toddler who spends sunny afternoons chasing butterflies at the community park and giggling while the Little Sprouts Soccer Club's coach tosses a soft pastel ball, cheers
    on the New York Knicks on TV and proudly waves a Buffalo Bills cap on game days, preferring spontaneous bursts of crawling and toddling over formal exercise routines.
  arts: Mary Hite, a budding creative soul, loves finger-painting bright apple-shaped scribbles to the soundtrack of Disney's Frozen and the cheerful laugh of Sesame Street's Elmo, and can often be seen
    clutching a soft plush of Mickey Mouse while dreaming of drawing the farm's barn.
  travel: Mary Hite, a curious traveler in training, enjoys slow rides in the family minivan to the nearby apple orchard in Otsego County and the annual county fair in Oneida, savoring the scent of fresh
    hay and the feel of wind in her hair, while dreaming of future seaside trips to Cape Cod.
  culinary: Mary Hite, a picky yet adventurous eater, adores smooth carrot puree, sweet apple sauce, soft cheese cubes, and the occasional crumb of homemade chicken noodle soup, often reaching for the jar
    of farm-fresh strawberry jam while helping mom stir mashed potatoes.
  core: Mary Hite, a one-year-old bundle of gentle curiosity, balances practical tinkering with whimsical mess-making, forever chasing the next apple-scented adventure while occasionally leaving a trail
    of scattered pennies.
background:
  cultural: Mary comes from a White, Anglo‑American family living in Earlville, a small rural community in Madison County, New York. The area has deep agricultural roots and a tradition of tight‑knit family
    and church networks. Her upbringing reflects modest, self‑reliant values, participation in local farmer’s markets, seasonal community events such as apple‑picking and holiday festivals, and an emphasis
    on cooperation and practicality.
