  career_goals: In the near future, Mary aims to master walking and speaking milestones, attend preschool, and nurture her natural curiosity and practical problem‑solving. As she grows, she envisions a
    career that blends discovery with useful skills, such as early childhood education or community outreach, allowing her to help other children explore while providing supportive guidance.
