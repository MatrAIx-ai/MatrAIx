personas:
  professional: Gordon Titus is an aspiring preschool architect whose love for order makes them meticulously line up building blocks, using their methodical planning and sociable storytelling to coordinate
    group play projects.
  sports: Gordon Titus sprints across the field for the Little Owls Soccer Club, cheers loudly for the Orlando Magic during family game nights, and eagerly signs up for weekly toddler swim lessons at the
    community YMCA, where they love splashing in the shallow pool.
  arts: Gordon Titus delights in the magical scores of Disney’s Frozen and sings along to JoJo Siwa’s upbeat tracks, while their imagination is fueled by watching Mickey Mouse Clubhouse and re‑creating
    scenes from Paw Patrol with friends.
  travel: Gordon Titus prefers short family road trips to Disney World in Orlando and seasonal beach getaways at Cocoa Beach, where they plan itineraries with snack stops and playground breaks, while dreaming
    of a future adventure to the Smithsonian in Washington, D.C.
  culinary: Gordon Titus favors crunchy chicken nuggets, cheesy mac and cheese, and bright strawberry‑covered pancakes, often insisting on arranging food on their plate in neat rows and proudly stirring
    batter during weekend cooking sessions under mom’s supervision.
  core: Gordon Titus blends a tiny yet fierce love of structure with boundless sociability, turning everyday routines into organized adventures while they occasionally get sidetracked by a sticky‑fingered
    candy habit.
background:
  cultural: Gordon is a white American child raised in Denver, Colorado, a city that mixes urban culture with easy access to the outdoors. His family celebrates typical U.S. holidays such as Thanksgiving,
    Christmas, and the Fourth of July, often incorporating local traditions like summer picnics in City Park and weekend trips to nearby mountain trails. He attends a diverse public preschool where he interacts
    with peers from many cultural backgrounds, giving him early exposure to multicultural perspectives. The Denver community’s emphasis on outdoor recreation and environmental stewardship influences his
    love for nature walks and park play.
attributes:
