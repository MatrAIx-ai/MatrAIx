  career_goals: Gordon often talks about the people he admires and imagines himself in caring, organized roles. He dreams of becoming a teacher or a community helper such as a firefighter or doctor, because
    he wants to create orderly environments and help others. His fascination with building blocks also hints at a future as a builder or engineer. In the near term, he aims to learn to read independently,
    ride a two-wheel bike without training wheels, and lead his preschool group in organized games.
