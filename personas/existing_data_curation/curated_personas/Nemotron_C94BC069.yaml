    center'']'
  career_goals: Approaching retirement, Thomas aims to transition from front‑line sales to a senior advisory role where he can mentor the next generation of representatives. He aspires to design a consulting
    practice that helps small service firms improve their sales processes and adopt CRM technology. Thomas also seeks recognition for his consistent performance, targeting a regional sales excellence award
    before he steps back from full‑time work. Financial security for his retirement and reduced workplace stress are key motivations, so he plans to negotiate a phased‑down schedule that balances income
    with personal well‑being. Additionally, he hopes to contribute to community initiatives by offering pro‑bono sales training to local nonprofits.
