  career_goals: Donna aims to transition from a mid‑level chemical engineer to a senior process engineer and eventually a technical lead overseeing sustainable product development. She aspires to spearhead
    projects that integrate green chemistry principles into large‑scale manufacturing, reducing waste and carbon footprint. In the next five years, she hopes to obtain a master’s degree in Environmental
    Engineering or a professional certification in Process Safety Management, to deepen her expertise. Long‑term, she envisions founding a start‑up that converts industrial by‑products into valuable materials,
    and becoming a recognized speaker at industry conferences and a mentor for younger engineers, especially women entering the field, while maintaining flexibility to explore interdisciplinary collaborations
    with artists on interactive installations that showcase chemical processes.
