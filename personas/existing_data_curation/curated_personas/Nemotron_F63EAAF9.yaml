personas:
  professional: Donna Meyer, a 27‑year‑old chemical engineer at a regional specialty chemicals firm, leverages Aspen HYSYS and COMSOL to design greener processes, thriving in loosely structured interdisciplinary
    projects that satisfy her curiosity and competitive drive while remaining skeptical of superficial sustainability claims.
  sports: Donna Meyer tackles the Columbia River Gorge trails on weekends, climbs at The Edge gym, attends weekly Vinyasa yoga at a downtown studio, cheers for the Portland Timbers and Trail Blazers, and
    joins a seasonal adult kick‑ball league to satisfy her competitive yet sociable nature.
  arts: Donna Meyer immerses herself in Portland’s creative pulse, attending live shows by The Decemberists and St. Vincent, exploring contemporary installations by James Turrell at the Portland Art Museum,
    and collaborating on science‑art projects that fuse chemical kinetics with kinetic sculptures inspired by Yayoi Kusama.
  travel: Donna Meyer prefers spontaneous weekend road trips, having already hiked the Columbia River Gorge, explored Seattle’s coffee scene, and booked a future eco‑tour of Iceland’s geothermal spouts,
    balancing her limited savings with a desire for adventurous, low‑key experiences over luxury travel.
  culinary: Donna Meyer, an experimental home‑cook, frequently whips up seasonal dishes like miso‑glazed carrots with heirloom tomatoes and craft‑hop‑infused braised short ribs, mastering fermentation techniques
    for kimchi and sourdough while sourcing kale, heirloom tomatoes, and locally roasted beans from the Portland farmers market.
  core: Donna Meyer, a 27‑year‑old chemical engineer who blends green chemistry with art, lives for spontaneous hikes, craft‑beer experiments, and competitive brainstorming, all while juggling a chaotic
    calendar and a habit of forgetting to pay a few utility bills.
background:
  cultural: Donna was raised in a middle‑class, white family in the suburbs of Portland, Oregon. Growing up in the Pacific Northwest, she was immersed in a culture that values environmental stewardship,
    progressive politics, and strong support for the arts. Her parents emphasized education and encouraged curiosity, leading her to pursue a STEM degree. The regional ethos of “going green” shaped her
    interest in sustainable engineering and green chemistry. While she identifies with typical American suburban values—self‑reliance, independence, and a laid‑back lifestyle—her exposure to Portland’s
    eclectic music, art, and food scenes has cultivated an open‑minded, culturally aware outlook that blends a traditional Western upbringing with the region’s distinctive, forward‑thinking vibe.
