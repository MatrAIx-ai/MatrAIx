  career_goals: Merodie aims to move from a representative role to a team lead or supervisory position within her call center, where she can mentor new hires and shape service standards. She plans to complete
    her associate degree in Business Administration, which will qualify her for a training specialist or quality assurance analyst role. Long‑term, she seeks a position with a more predictable schedule
    that reduces daily stress, allows her to contribute to process improvements, and supports her personal development of stronger time‑management and stress‑reduction habits.
