personas:
  professional: Diego Bethencourt, a seasoned retail floor supervisor with over 30 years of bilingual customer service expertise, commands point‑of‑sale systems, precise inventory tracking, and staff scheduling
    with calm, structured precision, and they infuse each interaction with the compassion that keeps the sales floor harmonious even under pressure.
  sports: Diego Bethencourt, a lifelong soccer enthusiast, follows Liga MX giants like Club América while cheering for the LA Galaxy, participates in a neighborhood 5‑k run at Griffith Park each Saturday,
    and they keep a modest collection of vintage soccer jerseys as a reminder of their favorite matches.
  arts: Diego Bethencourt, a devoted fan of classic mariachi and ranchera, streams performances by Vicente Fernández and the Mariachi Vargas de Tecalitlán, attends local community festivals that celebrate
    Día de los Muertos, and they proudly display a set of vintage concert posters in their living room.
  travel: Diego Bethencourt, a family‑oriented traveler who prefers relaxed road trips, has driven to Oaxaca’s bustling markets and explored the Grand Canyon’s vistas, dreams of visiting the historic churches
    of Seville and the Pacific coast of Yucatán, and they always plan trips around school schedules to keep the youth mentorship program running.
  culinary: Diego Bethencourt, an avid home cook, spends weekends perfecting tamales, pozole, and mole using heirloom chilies, roasted pumpkin seeds, and fresh epazote from their garden, enjoys sourcing
    local corn masa for authentic flavor, and they never miss a chance to share a hearty bowl of pozole with neighbors during festive gatherings.
  core: Diego Bethencourt, a 58‑year‑old retail veteran, blends meticulous organization with a warm, community‑focused heart, never skips their nightly stroll through Griffith Park to clear their mind,
    but they habitually hit the snooze button on weekday mornings, often arriving just in time for the shift.
background:
  cultural: Diego was born and raised in East Los Angeles to Mexican immigrant parents, growing up bilingual in Spanish and English. His upbringing emphasized familismo, respeto, and a strong work ethic,
    shaping his personal and professional values. He actively celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and maintains Catholic practices observed by his family. Diego stays
    connected to the Mexican‑American community through neighborhood festivals, local churches, and extended family gatherings, often acting as a cultural bridge for coworkers and neighbors. This heritage
    informs his compassionate approach to customer service and his commitment to fostering inclusive, welcoming environments.
attributes:
  skills: '[''Bilingual (Spanish‑English) Customer Service'', ''Point‑of‑Sale (POS) operation and cash handling'', ''Inventory management and stock replenishment'', ''Visual merchandising and store layout
    planning'', ''Staff scheduling and shift coordination'', ''Conflict resolution and customer complaint handling'', ''Team mentorship and training'', ''Loss prevention and compliance adherence'', ''Problem‑solving
    under high‑traffic conditions'', ''Basic sales reporting and data entry'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Watching soccer (Liga MX and local LA teams)'', ''Gardening (herbs and vegetables)'', ''Reading local newspaper'', ''Walking in Griffith Park'', ''Volunteering
    at community center (organizing events, language workshops)'', ''Listening to Mexican mariachi and ranchera music'']'
  career_goals: Diego’s primary goal is to move into a supervisory or store‑manager position, where he can apply his organizational strengths and compassionate leadership to improve team cohesion and customer
    satisfaction. He aims to develop a formal mentorship program for new hires, fostering smoother onboarding and skill development. As he plans for retirement, he is focused on securing financial stability
    for his family and is exploring the possibility of opening a small, family‑run convenience store that highlights Mexican culinary products. Additionally, he hopes to increase his community involvement
    by mentoring local youth interested in retail careers.
