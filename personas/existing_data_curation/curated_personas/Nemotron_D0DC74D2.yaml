  career_goals: Randall plans to earn his GED this year and enroll in a community‑college program that offers a certification in information technology or a trade like HVAC. He is drawn to careers that
    let him combine technical problem‑solving with helping people, such as a technical support specialist for a non‑profit or a community health technician. Long‑term, he hopes to lead a youth mentorship
    program that teaches digital skills and life‑planning tools to other teens in Pittsboro, ensuring they have practical pathways to success.
