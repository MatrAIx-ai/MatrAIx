personas:
  professional: Randall Nirmal is a budding technology enthusiast who blends a knack for troubleshooting wireless networks and Arduino tinkering with a compassionate drive to help others, often volunteering
    to set up computers at the local food bank and dreaming of a future role as a technical support specialist for a nonprofit.
  sports: Randall Nirmal enjoys weekend cricket matches with friends, follows the North Carolina Tar Heels basketball team and the Carolina Hurricanes for a burst of regional pride, and stays fit by jogging
    at the local park and participating in the high‑school cross‑country club when the season allows.
  arts: Randall Nirmal is an avid digital illustrator who draws comic‑style sketches inspired by Bollywood soundtracks from A.R. Rahman and the raw energy of indie rock bands like Arctic Monkeys, often
    sharing their work on social media while listening to a blend of filmi melodies and guitar riffs.
  travel: Randall Nirmal prefers low‑key road trips that balance adventure with family responsibilities, having explored the historic streets of New Orleans and dreaming of a future backpacking journey
    to the vibrant markets of Jaipur while saving up through part‑time gigs and careful budgeting.
  culinary: Randall Nirmal loves experimenting in the kitchen, mastering classic dal and biryani recipes with cumin, coriander, and turmeric, then fusing them with Southern BBQ ribs seasoned with smoked
    paprika and a mango‑chili glaze, often serving the creations at family gatherings and community potlucks.
  core: Randall Nirmal is a compassionate teen tech‑tinkerer who balances late‑night gaming marathons with meticulous saving, occasional acne flare‑ups, and a secret love for sketching Bollywood‑inspired
    characters while dreaming of mentoring peers.
background:
  cultural: Randall’s South Asian heritage is a central thread in his identity. His parents immigrated from India (Gujarati-speaking) and have maintained cultural practices such as celebrating Diwali, cooking
    traditional meals, and speaking Hindi at home. Growing up in Pittsboro, he blends these traditions with Southern U.S. customs—attending community festivals, enjoying local barbecue, and participating
    in school activities. This mix has given him fluency in both English and conversational Hindi, and a respect for communal values like hospitality and collective responsibility. His cultural background
    informs his compassionate nature and his desire to give back to both the South Asian diaspora and the broader community.
