  hobbies: '["Watercolor painting", "Digital illustration", "Guitar playing", "Soccer", "Hiking in Palisades Interstate Park", "Visiting art museums", "Participating in hackathons", "Arduino robotics projects",
    "Photography", "Reading science fiction"]'
  career_goals: Antonio aims to become a research and development engineer who integrates cutting‑edge technology with artistic design. He envisions working on sustainable AI‑driven products that enhance
    everyday experiences, while also contributing to open‑source robotics projects. In the next five years, he plans to pursue a master's degree in interdisciplinary engineering, secure a position at an
    innovative tech firm, and eventually lead a multidisciplinary team that blends engineering, design, and user experience. His ambition includes mentoring younger students from diverse backgrounds and
    developing stress‑management workshops for peers in high‑pressure STEM environments.
