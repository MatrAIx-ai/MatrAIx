personas:
  professional: Antonio Raudez, an 18‑year‑old budding research and development engineer, leverages their fluency in Python, CAD design, and acoustic guitar creativity to prototype sustainable AI‑driven
    devices, while meticulously planning project timelines and harmonizing diverse team voices to keep stress at bay.
  sports: Antonio Raudez plays forward for the Palisades Soccer Club, cheers for the New York Red Bulls, and hikes the rugged trails of Palisades Interstate Park every weekend, balancing cardio with occasional
    yoga to stretch out the tension that builds after hackathon marathons, which they find essential for mental clarity.
  arts: Antonio Raudez paints serene watercolors of Central Park in the style of Monet, creates digital illustrations inspired by the bold lines of Banksy, captures candid street scenes with a Fujifilm
    X‑T30, and strums simple melodies reminiscent of early Ed Sheeran on their acoustic guitar during late‑night studio sessions.
  travel: Antonio Raudez prefers short, budget‑friendly trips, having explored the historic streets of Boston, the art cafés of Montreal, and a solo weekend in Kyoto to study traditional ink painting, while
    dreaming of a semester‑long research stay in Berlin to merge robotics with public art installations, a plan they hope to fund with a summer internship.
  culinary: Antonio Raudez enjoys crafting avocado toast with a sprinkle of feta, whipping up homemade spaghetti carbonara seasoned with fresh rosemary, and indulging in New York‑style pepperoni pizza topped
    with extra mozzarella, though they often forget to finish their meals when a new coding problem captures their attention.
  core: Antonio Raudez is an 18‑year‑old tech‑savvy artist who meticulously plans every project, worries about deadlines, bursts into spontaneous guitar riffs, and occasionally loses sleep over unfinished
    code or a missed brushstroke, a habit they attribute to their perfectionist streak.
background:
  cultural: Antonio is a first‑generation American of Spanish descent. His family maintains traditions such as celebrating Semana Santa, sharing paella during holidays, and listening to Flamenco music,
    while also embracing the multicultural environment of Palisades Park, NJ. Bilingual in Spanish and English, he often helps bridge cultural gaps in community events. His Spanish heritage instills a strong
    sense of hospitality, family cohesion, and respect for diverse perspectives, which shapes his collaborative and considerate approach in both personal and professional contexts.
attributes:
  skills: '["Python programming", "Java", "Data analysis (Pandas, NumPy)", "Machine learning fundamentals", "CAD design (SolidWorks)", "Robotics (Arduino, Raspberry Pi)", "Mathematical modeling", "Scientific
