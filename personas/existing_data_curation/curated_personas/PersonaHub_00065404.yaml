persona_description: A healthcare professional who specializes in emergency medicine and heat-related illnesses. They have extensive knowledge and experience in the management and treatment of heat-related
  disorders, as well as in the prevention and mitigation of heat exposure. They are highly trained in the use of cooling techniques, such as immersion in cold water or the use of fans and air conditioning,
  to help individuals survive heat-related illnesses. They also have a deep understanding of the factors that contribute to the onset and severity of heat-related illnesses, including the impact of urban
  heat islands and stagnant atmospheric conditions.
