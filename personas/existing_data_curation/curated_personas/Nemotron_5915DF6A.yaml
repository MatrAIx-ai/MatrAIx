personas:
  professional: Frank Campbell, a 40‑year‑old senior radiologic technologist at Gouverneur Regional Hospital, blends his solid expertise in CT, MRI, and digital X‑ray operation with a meticulous eye for
    radiation safety, delivering consistent high‑quality images while navigating his love of routine and occasional disorganization through a cooperative, patient‑focused work style.
  sports: Frank Campbell spends his summers angling on the St. Lawrence River as a member of the Gouverneur Anglers Club, cheers on the Buffalo Bills and Montreal Canadiens each season, and joins a low‑key
    weekend softball league with hospital colleagues, preferring steady, routine‑based activity over high‑intensity competition.
  arts: Frank Campbell enjoys classic cinema, often re‑watching Alfred Hitchcock’s "Vertigo" and Humphrey Bogart’s "Casablanca," reads David McCullough’s historical biographies, and dabbles in landscape
    photography inspired by Ansel Adams, which they use to capture the serene rural scenery of their fishing trips.
  travel: Frank Campbell prefers low‑key road trips, having explored the historic streets of Quebec City, the Adirondack lake region, and the Thousand Islands, and dreams of a solo pilgrimage to the Scottish
    Highlands and Normandy’s WW II sites, always crafting a simple itinerary that balances modest costs with their love of solitude.
  culinary: Frank Campbell enjoys cooking simple, hearty meals such as pan‑fried trout with lemon‑dill, garden‑fresh tomato‑basil pasta, and herb‑seasoned roasted chicken, though they sometimes over‑salt
    dishes when stressed, preferring the familiar comfort of home‑cooked fare over adventurous cuisine.
  core: Frank Campbell balances a steadfast love for routine, hands‑on craftsmanship, and quiet solitude with an undercurrent of worry that drives both meticulous work habits and occasional impulsive splurges
    on fishing gear.
background:
  cultural: Frank was raised in a working‑class, white family in rural upstate New York, where community ties and practical values are emphasized. His upbringing reflects the cultural traditions of the
    St. Lawrence County region, including modest celebrations of holidays such as Thanksgiving and Christmas, a strong sense of self‑reliance and an appreciation for the outdoors. He grew up attending a
    local public high school and was exposed to the mixed cultural influences of nearby French‑Canadian communities, which contributed to a respectful, cooperative attitude toward diverse neighbors. His
    cultural background values hard work, modesty and contributing to the local community.
attributes:
  skills: '[''Digital X‑ray operation'', ''Patient positioning'', ''Radiation safety'', ''Image quality assurance'', ''Equipment troubleshooting'', ''Basic CT scanning'', ''Basic MRI operation'', ''Medical
