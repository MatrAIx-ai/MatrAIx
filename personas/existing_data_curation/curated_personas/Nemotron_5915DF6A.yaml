  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Watching classic movies'', ''Landscape photography'', ''Volunteering at senior center'', ''Nature walks'']'
  career_goals: Frank aims to solidify his position as a senior technologist at the Gouverneur Regional Hospital, obtain advanced certifications in CT and mammography, and eventually transition into a supervisory
    role overseeing imaging quality and radiation safety. He hopes to further his education with an associate degree in radiologic sciences, which would enable him to mentor newer staff and contribute to
    protocol development. Balancing his desire for routine with a need for reduced stress, he seeks a schedule with regular daytime shifts and a supportive workplace culture that values teamwork and patient‑centered
    care.
