  hobbies: '[''Hiking'', ''Vegetable gardening'', ''Reading non-fiction'', ''Journaling'', ''Mindfulness meditation'', ''Yoga'', ''Woodworking'', ''Podcast listening'']'
  career_goals: Zennie aims to become one of the top‑producing brokers in the Lincoln area and eventually launch her own boutique real estate firm that specializes in data‑driven, environmentally conscious
    property sales. She wants to develop a niche advising investors on sustainable housing opportunities, mentor newer agents with an emphasis on analytical tools, and earn recognition as a thought leader
    in integrating technology with real estate practice. Her long‑term ambition includes building a small, high‑performing team that values measurable results over flashy sales tactics.
