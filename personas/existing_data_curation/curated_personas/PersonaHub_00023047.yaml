persona_description: A healthcare professional with expertise in cervical cancer prevention and management, particularly in the implementation of cervical screening programs and the provision of palliative
  care services. This individual has experience in setting up and leading sustainable projects, and has worked with Malawian healthcare professionals to implement a comprehensive cervical cancer reduction
  program in the Nkhoma Hospital and surrounding health centers. They are passionate about improving access to treatment and care for women with cervical cancer, and are committed to ensuring that women
  have the information and support they need to make informed decisions about their health.
