  hobbies: '[''Recreational Softball'', ''Fishing'', ''Boating'', ''Paddleboarding'', ''Community Volunteering'', ''DIY Home Improvement'', ''Woodworking'', ''Garden Landscaping'', ''Technology Blogging'',
    ''Cooking and Grilling'']'
  career_goals: Dan aims to advance from his current representative role to a team lead position within the next two years, focusing on developing coaching and performance‑analysis skills. He plans to earn
    a Certified Customer Service Professional (CCSP) credential and later pursue a Certified Call Center Supervisor (CCCS) certification. Over the next five to seven years, he envisions moving into a customer‑experience
    manager role that oversees multiple support channels and contributes to strategic service improvements. Long‑term, Dan harbors an entrepreneurial ambition to open a small waterfront café in Cape Coral,
    blending his love for community interaction with his interest in culinary arts.
