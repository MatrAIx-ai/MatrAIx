  hobbies: '[''Reading (fiction, economics, personal finance)'', ''Crossword puzzles'', ''Sudoku'', ''Yoga'', ''Mindfulness meditation'', ''Gardening (herbs, succulents)'', ''Cooking and baking'']'
  career_goals: Deitra aims to deepen her expertise in sustainable and ESG‑focused investing, positioning herself as a subject‑matter expert within her firm. She plans to earn the Chartered Financial Analyst
    (CFA) designation within the next two years and subsequently pursue a senior analyst or portfolio manager role that offers greater strategic influence. Long‑term, she envisions moving into a leadership
    position such as Director of Investment Research or Chief Investment Officer, where she can shape investment policy while fostering a supportive, low‑stress team environment. Balancing ambition with
    personal well‑being, she also hopes to achieve a stable work‑life balance that allows her to manage stress and maintain her mental health.
