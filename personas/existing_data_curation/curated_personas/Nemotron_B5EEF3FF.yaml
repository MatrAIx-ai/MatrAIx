    and team coordination'']'
  hobbies: '[''Museum visits and art gallery tours'',''Photography (urban and event photography)'',''Reading contemporary fiction and design literature'',''Cooking international dishes'',''Volunteer event
    coordination for community festivals'',''Yoga and mindfulness practice'',''Trail walking in Houston parks'',''Attending live music and theater performances'']'
  career_goals: Sophia aims to transition from managing regional conventions to becoming a senior director of events for a national corporation or a leading trade‑show organization. She plans to obtain
    the Certified Meeting Professional (CMP) credential and to specialize in sustainable, hybrid event formats that integrate virtual participation. Within five years she hopes to lead a cross‑functional
    team responsible for multi‑city conferences attracting thousands of attendees, and to mentor junior planners within her company. Long‑term, she envisions launching her own boutique event‑planning firm
    that focuses on culturally rich, art‑centric conferences and community festivals in the Gulf Coast region.
