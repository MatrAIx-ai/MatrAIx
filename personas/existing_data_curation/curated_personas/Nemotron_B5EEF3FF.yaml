personas:
  professional: Sophia Mencl is a senior event planner who blends meticulous budget management, vendor negotiation, and tech‑savvy use of Cvent, Social Tables, and Asana with a curious artistic eye, delivering
    seamless, sustainable hybrid conferences while they stay calm under pressure, assertively guide cross‑functional teams, and honor Southern hospitality through thoughtful, community‑focused experiences.
  sports: Sophia Mencl stays active through morning yoga sessions, weekend trail walks with the Houston Hiking Club in Buffalo Bayou Park, and occasional 5 K runs during the annual Texas Trail Run, while
    they cheer on the Houston Astros, Rockets, and Texans and join a local co‑ed pickleball league for friendly competition.
  arts: Sophia Mencl draws artistic inspiration from Houston’s Museum District, studying contemporary photographers like Cindy Sherman and street artist Banksy, attending live shows by Brittany Howard and
    John Mayer, and channeling these influences into event themes while they constantly capture cityscapes with their Canon EOS R5.
  travel: Sophia Mencl prefers meticulously planned cultural escapes, having toured the vibrant murals of Austin, sampled Creole cuisine in New Orleans, explored Barcelona’s modernist architecture, and
    now dreams of a photography‑focused pilgrimage to Kyoto’s Gion district, where they can blend work and wanderlust.
  culinary: Sophia Mencl, an intermediate home chef, loves experimenting with Thai green curry, Moroccan tagine, and Japanese ramen, seasoning each with cumin, fresh cilantro, lemongrass, and coriander,
    and while they often delight friends with bold flavors, they sometimes over‑spice in their enthusiasm for culinary adventure.
  core: Sophia Mencl is a curious, detail‑driven event strategist who balances Southern hospitality with bold artistic experimentation, often juggling three projects at once while they secretly hoard vintage
    event brochures and scroll design blogs late into the night.
background:
  cultural: Sophia identifies as a White American raised in the Southern United States, with deep roots in Texas culture that emphasize hospitality, community involvement, and a pragmatic work ethic. Growing
    up in Houston exposed her to a multicultural environment, shaping an inclusive outlook that she incorporates into her event designs. She values Southern traditions such as family gatherings and seasonal
    celebrations while also embracing the vibrant, diverse artistic scene of the city. Her cultural perspective blends a respect for tradition with a curiosity for new ideas, informing both her personal
    life and professional approach.
attributes:
