persona_description: A historian who specializes in the study of the history of colonial Natal, particularly the role of cities and towns in the incorporation of Natal into the capitalist world-system.
  This person is interested in the development of the economy, the nature of urban networks, the interactions between urban networks and the development of the economy, and the role of cities and towns
  in class and racial struggles. They are also interested in the impact of railway development on the pattern of settlement in Natal and the policies of the commercial elites. This person is likely to have
  a strong understanding of the history of Natal and the development of the economy in the region, and is interested in the interactions between different historical and social forces that shaped the development
  of Natal.
