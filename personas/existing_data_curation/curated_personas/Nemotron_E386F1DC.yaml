  hobbies: '[''Organic gardening'', ''Reading historical nonfiction and classic literature'', ''Small‑group book club'', ''Scale model building (locomotives)'', ''Chess'', ''Astronomy club (stargazing)'',
    ''Walking/hiking local nature trails'', ''Cooking experimental world cuisines'', ''Listening to jazz and classical music'']'
  career_goals: Zach aims to transition from an individual sales representative to a regional sales manager within the next three years, leveraging his analytical strengths to lead a team of reps in the
    Midwest. He is committed to developing a mentorship program that formalizes his informal coaching of junior colleagues. In the longer term, he envisions either moving into a director‑level role overseeing
    strategic account development or launching an independent consultancy that helps manufacturers adopt sustainable sales practices and digital tools. Achieving a consistent performance rating above 150%
    quota and obtaining a Certified Professional Sales Leader (CPSL) credential are concrete milestones on his path.
