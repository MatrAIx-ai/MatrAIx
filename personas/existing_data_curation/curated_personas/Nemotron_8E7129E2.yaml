  career_goals: Hunter aims to become a senior lead engineer within the automotive software sector, leveraging Detroit’s emerging connected‑vehicle ecosystem. Over the next five years he plans to earn AWS
    Solutions Architect and Certified Scrum Master credentials, lead a cross‑functional team developing over‑the‑air update platforms, and contribute to open‑source automotive cybersecurity tools. He also
    envisions pursuing a Master’s degree in Computer Science or an MBA to broaden his strategic impact and eventually transition into a technology‑product leadership role.
