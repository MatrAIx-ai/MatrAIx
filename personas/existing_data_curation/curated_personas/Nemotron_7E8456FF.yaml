personas:
  professional: David Pasteris is a seasoned statistician who translates raw health and agricultural data into actionable policy insights for Stone County, leveraging R, Python, GIS, and Tableau while mentoring
    junior staff and fostering collaborative decision‑making.
  sports: David Pasteris enjoys early‑morning fly fishing on the Pearl River, weekend hikes on the De Soto National Forest trails, and follows the Mississippi State Bulldogs football team and the New Orleans
    Saints with a modest membership in the local fishing club, combining low‑impact endurance with community sports enthusiasm.
  arts: David Pasteris captures the subtleties of Mississippi wetlands through nature photography inspired by Ansel Adams, crafts hand‑made furniture echoing the minimalist lines of Scandinavian design,
    and reads historical non‑fiction by Shelby Foote and James McPherson, weaving visual and literary arts into their solitary creative practice.
  travel: David Pasteris prefers low‑key, self‑planned trips that blend fishing and hiking, such as weekend drives to the Ozark National Forest, a spring fly‑fishing excursion in the Catskills, and a long‑awaited
    pilgrimage to Gettysburg to explore Civil War battlefields, balancing adventure with modest budget constraints.
  culinary: David Pasteris delights in smoking pork ribs and brisket over hickory, preparing fresh catfish caught at dawn, and seasoning dishes with locally sourced okra, collard greens, and sweet corn,
    while their cooking skill ranges from competent grill master to occasional over‑smoked mishap.
  core: David Pasteris blends analytical precision with a love for solitary river mornings, crafting wooden gifts for friends, and quietly championing data literacy in their community, all while occasionally
    misplacing their fishing license and forgetting to water houseplants.
background:
  cultural: David grew up on a small farm near Laurel, Mississippi, within a tight‑knit white Southern community rooted in Methodist traditions. The rhythms of rural life, seasonal cycles, and a strong
    sense of hospitality shaped his values. He embraces Southern customs such as church gatherings, community festivals, and a deep appreciation for local cuisine and country music. Though he holds only
    a high‑school diploma, practical knowledge passed down through family and local mentors fostered his hands‑on approach to problem‑solving. His cultural identity reflects the Southern "gentleman" ethos—polite,
    courteous, and ready to lend a helping hand—while his experiences with natural challenges like floods reinforced the importance of cooperation and resilience in his community.
