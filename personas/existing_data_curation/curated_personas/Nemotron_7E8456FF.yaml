  career_goals: At 52, David aims to step into a senior advisory role within Stone County's health and agricultural departments, leading a regional data hub that informs policy on public health, crop forecasting,
    and economic development. He plans to earn a Certified Statistician credential to formalize his expertise, publish case studies on data‑driven community interventions, and develop workshops that empower
    local farmers and non‑profit leaders to use data responsibly. Beyond formal leadership, he hopes to mentor the next generation of analysts, streamline data workflows for greater efficiency, and eventually
    transition to a part‑time consulting role focused on data literacy for community organizations after retirement.
