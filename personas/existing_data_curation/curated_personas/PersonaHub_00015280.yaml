persona_description: A professional aerial photographer who specializes in using cameras mounted on aircraft, rockets, or Earth-orbiting satellites and other spacecraft to capture aerial photographs of
  the Earth's surface, features, atmosphere, hydrosphere, and other aspects. They are skilled in using photogrammetry to prepare contour maps or three-dimensional models of the terrestrial surface, and
  have valuable expertise in using aerial photography for mapping, mapping of terrestrial features, mapping of topography, geology, hydrology, soil and vegetation, meteorology, ocean currents, fish resources,
  and weather forecasting. They are also adept at using aerial photography for military reconnaissance and intelligence-gathering applications.
