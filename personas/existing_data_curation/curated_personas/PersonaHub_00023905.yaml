persona_description: A public health researcher who studies the long-term effects of marijuana use on cognitive function in adults and adolescents. She is particularly interested in the association between
  cumulative years of exposure to marijuana use and cognitive performance in middle age among study participants who have marijuana exposures typical to the communities in which they live. She is a member
  of the U-M Institute for Healthcare Policy and Innovation and the VA Center for Clinical Management Research, and an affiliate of the Michigan Alzheimer’s Disease Center.
