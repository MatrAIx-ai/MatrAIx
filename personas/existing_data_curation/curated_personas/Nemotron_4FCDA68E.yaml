  career_goals: George aims to become a senior facilities manager within the next five years, pursuing a bachelor's degree in facilities management and certifications such as CFM. He envisions overseeing
    a campus or cultural venue where he can merge his love for art with operational excellence, implementing smart‑building technologies and sustainable practices. His competitive drive pushes him to be
    recognized as an innovative leader, earning industry awards and eventually founding his own consulting firm that specializes in designing inventive, people‑centric spaces.
