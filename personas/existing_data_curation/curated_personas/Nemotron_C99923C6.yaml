personas:
  professional: Sandra Coggins is a 12-year-old budding marine conservation advocate who blends her practical, routine-loving nature with a love of group action by organizing weekly beach clean-ups with
    her Girl Scout troop, and they keep meticulous logs of the trash collected while dreaming of studying ocean biology to protect the seas she sketches in her journal.
  sports: Sandra Coggins is a 12-year-old energetic athlete who splits time between the middle‑school soccer team, after‑school beach volleyball drills, and swim practice; they cheer on the USWNT and the
    Los Angeles Dodgers while also playing pickup games with friends at the community park.
  arts: Sandra Coggins is a 12-year-old creative soul who explores her theatrical side in a junior drama workshop, fills sketchbooks with ocean‑inspired illustrations of seashells, builds elaborate Minecraft
    islands, and draws inspiration from the music of Taylor Swift and the animated film The Little Mermaid, often humming the tunes while they craft.
  travel: Sandra Coggins is a 12-year-old adventurous planner who loves weekend beach outings with her family to local spots like Santa Cruz, dreams of snorkeling the coral reefs of Belize, and, when mapping
    out trips, prefers detailed itineraries that balance beach time with a single visit to a theme park such as Disneyland, all while they keep a scrapbook of seashell collections to remember each destination.
  culinary: Sandra Coggins is a 12-year-old budding chef who prefers practical, repeatable recipes like fish‑taco bowls with homemade mango salsa and simple sushi rolls, enjoys experimenting with sea‑salted
    popcorn during movie nights, and, while they can be fussy about vegetables, they love adding fresh shredded carrots and cucumber to their dishes.
  core: Sandra Coggins is a routine‑loving, socially vibrant 12-year-old who balances beach clean‑ups, soccer, and theater with a chronic worry streak that fuels meticulous planning yet sometimes leads
    them to late‑night Minecraft marathons and occasional snack‑filled study sessions.
background:
  cultural: Sandra was raised in a middle‑class, white family in Ponte Vedra Beach, a coastal suburb of Jacksonville, Florida. The community blends a relaxed beach lifestyle with the typical Southern hospitality
    of the region. Her family celebrates mainstream American holidays and participates in local traditions such as beach festivals, high‑school football rallies, and community volunteer days. Growing up
    near the Atlantic Ocean has fostered a strong connection to marine environments, and she frequently joins neighborhood clean‑up and marine‑education events. Her cultural upbringing emphasizes education,
    outdoor recreation, and civic involvement, providing a supportive backdrop for her practical, sociable, and community‑oriented personality.
attributes:
  skills: '[''Organizing school projects'', ''Team collaboration'', ''Basic computer literacy (typing, Google Classroom)'', ''Public speaking'', ''First aid basics (Red Cross youth)'', ''Swimming proficiency'',
