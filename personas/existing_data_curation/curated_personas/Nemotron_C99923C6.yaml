  hobbies: '[''Beach volleyball'', ''Swimming'', ''Middle‑school soccer team'', ''Girl Scouts community service'', ''Beach clean‑up projects'', ''Junior theater club'', ''Drawing and crafts'', ''Collecting
    shells and marine identification'', ''Journaling'', ''Playing Minecraft with friends'']'
  career_goals: Sandra imagines a career that combines structure, tangible results, and regular interaction with people. In the short term she wants to earn her Girl Scouts Gold Award by leading a community‑service
    project, and she aims to graduate high school with strong grades that qualify her for a scholarship. She is drawn to roles such as a marine wildlife rehabilitator or an elementary‑school teacher because
    they provide clear routines, practical problem‑solving, and the chance to help others. Ultimately, she plans to study environmental science or early childhood education in college, gaining the credentials
    needed for a stable, community‑focused profession that lets her use her organizational strengths and compassionate side.
