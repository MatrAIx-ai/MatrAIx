  hobbies: '[''Community theater acting'', ''Reading contemporary fiction'', ''Participating in a local book club'', ''Gardening (herbs and vegetables)'', ''Hiking the Ice Age Trail'', ''Yoga practice'',
    ''Baking artisan breads'', ''Hosting game nights with friends and family'', ''Attending live music festivals'', ''Listening to education/history podcasts'']'
  career_goals: Shauna aims to transition into a district curriculum specialist role where she can shape a cohesive humanities framework that emphasizes project‑based learning and community partnerships.
    She plans to pursue a Master’s in Educational Leadership to become an assistant principal and eventually a principal, using her sociable and assertive nature to champion teacher collaboration and student
    voice. Additionally, she hopes to launch a STEAM initiative that fuses the arts with emerging technology, and she dreams of authoring a children's book series that weaves Wisconsin folklore with lessons
    on empathy and civic responsibility. Throughout her career growth, she intends to maintain a flexible work style that allows room for creativity and spontaneous community engagement.
