personas:
  professional: Shauna Smith is a Madison middle‑school humanities teacher who designs interdisciplinary, project‑based units that weave literature, history, and visual arts, leverages their relaxed yet
    effective classroom management style, and channels their talkative, center‑stage personality into leading vibrant professional‑development workshops and community theater productions.
  sports: Shauna Smith embraces outdoor fitness by hiking segments of the Ice Age Trail, practicing yoga at a local studio, cheering on the Milwaukee Bucks and Green Bay Packers while also playing on a
    community co‑ed softball league, and they balance seasonal sports involvement with a laid‑back attitude toward routine exercise.
  arts: Shauna Smith immerses themselves in the arts through starring in community theater productions and organizing backstage crews, drawing inspiration from playwrights like Lin‑Manuel Miranda and Stephen
    Sondheim, curating playlists featuring Sufjan Stevens and The Lumineers at live music festivals such as Summerfest, and they regularly discuss contemporary novels by Chimamanda Adichie and Sally Rooney
    at their bustling book club.
  travel: Shauna Smith favors spontaneous, budget‑conscious getaways that blend adventure and relaxation—taking weekend road trips to Door County’s orchards, exploring the historic streets of Chicago, and
    dreaming of an Icelandic hike along the Golden Circle, all planned with a flexible itinerary that leaves room for unexpected community events.
  culinary: Shauna Smith delights in baking artisan sourdough loaves, rosemary focaccia, and cinnamon‑streusel pastries, cultivates fresh herbs and heirloom tomatoes for vibrant salads, enjoys cooking with
    locally sourced Wisconsin cheese and honey, and they frequently host themed potlucks where guests savor dishes like beet‑and‑goat‑cheese tartlets.
  core: Shauna Smith’s curiosity‑driven, talkative nature fuels a perpetual juggle of theater scripts, garden seedlings, and lesson plans, while their lovable habit of misplacing keys and forgetting bills
    adds a dash of endearing chaos to an otherwise organized community life.
background:
  cultural: Shauna was raised in a small town on the outskirts of Madison, Wisconsin, within a family that valued public education, community service, and seasonal outdoor activities typical of the Upper
    Midwest. Her white, European‑American heritage aligns with the region’s historical roots, yet she was immersed in Madison’s progressive, university‑town atmosphere, which broadened her exposure to diverse
    ideas and cultural events. This blend of Midwestern pragmatism and academic openness informs her appreciation for both established traditions and innovative approaches. Shauna’s humanities education
    reinforces a love for literature, art, and historical narratives, while her involvement in local festivals, farmers’ markets, and civic volunteerism reflects a strong sense of community responsibility
    and collaborative spirit.
attributes:
  skills: '[''Curriculum design and interdisciplinary unit planning'', ''Differentiated instruction'', ''Restorative classroom management'', ''Public speaking and parent engagement'', ''Educational technology
