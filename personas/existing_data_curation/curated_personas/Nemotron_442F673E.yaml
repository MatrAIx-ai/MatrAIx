  career_goals: Norman hopes to attend an arts‑focused high school and later earn a degree in graphic design or game concept art. He dreams of turning his love for storytelling and visual creation into
    a career where he can craft inclusive, emotion‑rich experiences for diverse audiences. Long‑term, he is interested in using art as a therapeutic outlet, possibly studying art therapy to help peers manage
    stress and anxiety.
