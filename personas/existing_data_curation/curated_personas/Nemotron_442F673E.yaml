personas:
  professional: Norman Torres is an aspiring digital illustrator and narrative designer, blending hand‑sketched landscapes with beginner‑level Photoshop techniques to craft immersive storyboards for indie
    video games, while their relaxed attitude toward deadlines and penchant for wandering inspiration often leads to disorganized project files and spontaneous bursts of creativity.
  sports: Norman Torres enjoys low‑key Saturday morning runs through their hometown’s river trail and occasionally joins the community’s youth basketball league, cheering for the local high school Tigers
    while preferring the calming rhythm of a weekly yoga class over competitive sports, which they find satisfies their need for gentle fitness as a stress release.
  arts: Norman Torres immerses themselves in the worlds of Neil Gaiman’s graphic novels, the ethereal animation of Hayao Miyazaki, and the atmospheric photography of Ansel Adams, regularly sketching in
    local museums, attending indie film nights featuring auteurs like Jim Jarmusch, and jam‑sessioning on a borrowed keyboard to a soundtrack of Billie Eilish and Tame Impala, shaping a uniquely eclectic
    artistic identity that they cherish as a personal sanctuary.
  travel: Norman Torres prefers spontaneous weekend getaways to nearby scenic spots like Redwood National Park for sunrise sketching sessions and dreams of a future pilgrimage to Kyoto’s historic temples
    to study traditional ukiyo‑e prints, while balancing their modest travel budget with family constraints and a love for meticulously planning art‑inspired itineraries that they believe will broaden their
    creative horizon.
  culinary: Norman Torres favors simple yet flavorful dishes such as homemade ramen with miso broth, avocado toast topped with chili flakes, and late‑night pizza slices while experimenting with sketch‑inspired
    plating, though their cooking schedule is often irregular due to occasional procrastination and they frequently indulge in sugary snacks after intense art marathons.
  core: Norman Torres is a quietly curious teen who channels stress into sketching, oscillates between meticulous artistic planning and disorganized spontaneity, and carries a habit of worrying about every
    creative and financial decision.
background:
  cultural: Norman grew up in Manteca, a small city in California’s Central Valley, where agricultural roots mingle with a growing arts scene. His family observes typical American holidays and values close‑knit
    community ties, while also being exposed to the region’s multicultural atmosphere, including frequent encounters with Spanish language and local farm traditions. This blend of suburban Midwestern‑style
    upbringing and California’s openness to diverse creative expression shapes his worldview and artistic sensibility.
