persona_description: A historian or archaeologist who is interested in the history and archaeology of the Great Lakes region, particularly the logging industry and its impact on the region's social history.
  They are knowledgeable about the development of the lumber industry and the lives and successes of the individuals involved in the industry. They are also interested in the dynamics of the lumber industry,
  new technologies incorporated into the production system, and the social history of the region. They are familiar with the Minertown site and its potential to provide data about the lifeways of the historic
  logging community and insight into the dynamics of the lumber industry. They are also interested in the community plan and its potential to provide information relevant to further understanding of "company
  towns" and their development and operation.
