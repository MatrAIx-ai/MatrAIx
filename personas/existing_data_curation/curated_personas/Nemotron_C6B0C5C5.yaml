  career_goals: Richard frequently talks about becoming an astronaut or an inventor because he loves building things and exploring the unknown. He also dreams of being a firefighter, attracted by the excitement
    of teamwork and helping others. His competitive nature fuels a desire to be the best soccer player on his future team and to win championships. Though his ambitions are still playful, they echo his
    curiosity, practicality, and need for recognition.
