  hobbies: '[''Woodworking'', ''Sketching and watercolor painting'', ''DIY home improvement projects'', ''Visiting art galleries and local craft fairs'', ''Listening to country and indie music'', ''Recreational
    basketball'', ''Fishing'', ''Reading about architecture and sustainable design'', ''Gardening'', ''Podcast listening (mental health and self-improvement)'']'
  career_goals: Mack aims to move beyond labor work into supervisory roles. Over the next five years he plans to earn a certification in construction management, attend community college courses in building
    technology, and become a foreman. Ultimately he aspires to obtain a general-contractor license and launch a small construction firm that emphasizes high-quality craftsmanship combined with artistic
    design elements, such as custom finishes and sustainable building practices. He also seeks a better work-life balance to reduce stress and provide stability for his family.
