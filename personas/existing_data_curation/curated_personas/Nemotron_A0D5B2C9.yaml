personas:
  professional: Mack Southern, a 29‑year‑old construction laborer with OSHA 10 certification, leverages a keen eye for aesthetic detail and blueprint fluency to excel in framing, drywall, and concrete finishing
    while habitually proposing custom finishes that blend artistry with sustainable design, positioning them on a clear path to foreman and eventually general‑contractor ownership.
  sports: Mack Southern, an avid weekend basketball player in the local Eastside Hoops league who cheers for the Chicago Bulls while also following the Dallas Mavericks, spends early mornings fishing at
    Lake Ouachita, and joins the community garden’s weekend fitness bootcamp, balancing cardio with DIY strength training at the job site.
  arts: Mack Southern, a frequent patron of downtown art galleries and regional craft fairs, finds inspiration in watercolor works by contemporary artist Agnes Cecile, sketches floor plans while listening
    to indie acts like Phoebe Bridgers and country legends such as Kacey Musgraves, and collects limited‑edition prints from emerging local sculptors, letting these creative sparks influence their custom
    furniture designs.
  travel: Mack Southern, who prefers road trips over long flights, has road‑tripped to Asheville, NC to study its sustainable architecture, spent a fishing weekend at Lake Okeechobee, and dreams of visiting
    the Eco‑Village in Denmark to see passive‑house building techniques, always planning trips around a modest budget and the need to return home for church commitments on Sundays.
  culinary: Mack Southern, a competent backyard griller, enjoys cooking smoked trout seasoned with lemon‑dill, pairing it with a garden‑harvested heirloom tomato salad drizzled with balsamic reduction,
    and perfects a keto‑friendly smoked brisket chili that often wins the local pot‑luck, while occasionally indulging in fast‑food tacos as a quick post‑shift snack.
  core: Mack Southern is a 29‑year‑old construction craftsman with a passion for art and sustainable design, whose meticulous, worry‑prone nature drives them to blend hands‑on building with creative custom
    finishes while juggling work, family, and personal growth.
background:
  cultural: Mack was raised in a white Anglo-American family in East Texas, where community, hard work, and modesty are valued. He grew up attending a Methodist church, participating in high school football
    culture, and celebrating Southern traditions such as barbecue, Thanksgiving, and Christmas with extended family. The regional emphasis on hospitality and neighborly assistance shaped his cooperative
    nature. While rooted in these local customs, his curiosity has led him to explore broader cultural expressions through art, music, and online learning, influencing both his personal style and his interest
    in integrating artistic elements into construction work.
