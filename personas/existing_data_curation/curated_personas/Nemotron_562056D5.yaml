personas:
  professional: Kin Kim is a part‑time cultural liaison and program coordinator who draws on a humanities background, bilingual fluency, and a knack for empathetic storytelling to design community workshops,
    while embracing a flexible, sometimes spontaneous work style and assertively balancing stakeholder interests.
  sports: Kin Kim plays pick‑up basketball at Flushing Meadows, follows the New York Knicks and Queensbridge Community Basketball Club, and adds weekly runs through Central Park to their routine, blending
    a competitive edge with a relaxed, socially driven approach to fitness.
  arts: Kin Kim devotes evenings to Korean dramas such as 'Crash Landing on You', streams K‑pop hits from BTS and IU, frequents MoMA exhibitions and The Public Theater productions, and belts out karaoke
    favorites, weaving these artistic passions into their lifestyle blog and community storytelling.
  travel: Kin Kim favors flexible, last‑minute trips that mix cultural immersion and leisure, having explored Seoul and Busan for family festivals, taken a solo road trip through the Hudson Valley, and
    planning future journeys to Kyoto and Istanbul whenever time and family obligations allow.
  culinary: Kin Kim enjoys crafting homemade kimchi and bulgogi, experimenting with gochujang marinades, sesame‑oil‑drizzled bibimbap, and japchae, while also sampling local Korean BBQ spots like Seoul
    Garden to refine their cooking techniques and share recipes on their blog.
  core: Kin Kim blends community‑focused cultural storytelling with spontaneous basketball games and karaoke nights, wielding empathy and assertiveness to connect people while navigating a flexible, mildly
    disorganized life.
background:
  cultural: 'Kin is a second‑generation Korean‑American whose parents immigrated to the United States in the late 1980s. Raised in Flushing, Queens, he grew up surrounded by a vibrant Korean enclave, attending
    Korean churches, celebrating Chuseok and Seollal, and speaking Korean at home while navigating an English‑dominant school environment. This bicultural upbringing instilled a deep respect for Korean
    family values—such as filial duty, education, and communal harmony—while also embracing the energetic, multicultural atmosphere of New York City. Kin’s daily life reflects this blend: he enjoys Korean
    cuisine and festivals, participates in local community activities, and effortlessly shifts between Korean and American social contexts. His cultural identity informs his passion for bridging gaps between
    immigrant communities and mainstream institutions.'
attributes:
  skills: '["Academic research", "Critical analysis", "Creative writing", "Korean-English translation", "Cross-cultural communication", "Community outreach", "Event coordination", "Public speaking", "Group
