  hobbies: '["Basketball pick-up games", "Karaoke with friends", "Korean language exchange meet-ups", "Cooking Korean dishes", "Watching Korean dramas and K-pop", "Board-game nights", "Visiting museums
    and cultural festivals", "Volunteering at community center", "Writing essays for lifestyle blog", "Hiking in nearby parks"]'
  career_goals: Kin aims to translate his curiosity and practicality into a role that supports his community while preserving flexibility in his schedule. In the short term, he plans to secure part‑time
    work as a cultural liaison or program coordinator for a nonprofit serving Asian‑American families, where he can use his research and communication skills to design workshops and advocacy initiatives.
    He also intends to expand his personal blog and video channel, turning his hobby of cultural storytelling into a modest source of income. Long‑term, Kin envisions pursuing a Master’s degree in Social
    Work or Public Policy to deepen his ability to develop scalable, evidence‑based programs that improve immigrant integration and family well‑being. Throughout, he values positions that allow collaborative,
    group‑focused environments and the freedom to balance family responsibilities.
