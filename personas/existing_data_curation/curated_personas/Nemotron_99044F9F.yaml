  skills: '[''JavaScript'', ''TypeScript'', ''HTML5'', ''CSS3'', ''React'', ''Vue.js'', ''Node.js'', ''Express'', ''RESTful APIs'', ''PostgreSQL'', ''MongoDB'', ''Git'', ''Agile/Scrum'', ''CI/CD (AWS, Docker)'',
    ''Figma'', ''Adobe XD'', ''Web Accessibility (WCAG)'', ''Performance optimization'', ''Jest'', ''Cypress'']'
  hobbies: '[''Photography (landscape & urban)'', ''Acoustic guitar playing'', ''Cooking Mexican cuisine'', ''Hiking in the Cascades'', ''Visiting art galleries'', ''Reading science-fiction literature'',
    ''Mentoring junior developers'', ''Volunteering at community coding workshops'']'
  career_goals: Jesus aims to evolve from a senior developer into a lead web architect, guiding product strategy and mentoring cross-functional teams. He wants to champion inclusive design that blends artistic
    storytelling with seamless functionality, creating web experiences that reflect his appreciation for art and unconventional ideas. Over the next five years, he plans to launch a SaaS platform that empowers
    local artisans to showcase and sell their work online, leveraging progressive web app technologies and AR integrations. To support this vision, he intends to earn an AWS Solutions Architect certification,
    deepen his expertise in cloud-native architecture, and contribute to open-source projects that promote accessibility. Additionally, he hopes to organize hackathons and coding workshops for underrepresented
    youth in the Medford area, combining his technical leadership with community outreach.
