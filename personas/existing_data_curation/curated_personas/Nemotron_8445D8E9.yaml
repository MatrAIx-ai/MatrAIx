personas:
  professional: Brittany Shepherd is a veteran food‑service educator who leverages over two decades of kitchen operations, HACCP mastery, staff development expertise, and proficiency with scheduling software
    like 7shifts and POS system Toast to design efficient, compliance‑driven service models, while their competitive edge and skeptical mindset push them to constantly benchmark performance against industry
    standards.
  sports: Brittany Shepherd follows the New York Yankees and the New Jersey Devils with a loyal weekend‑watch habit, participates in the Watchung Trails Hiking Club that meets for weekly walks, practices
    gentle yoga twice a week, and joins a senior tennis league each summer, balancing low‑impact fitness with the occasional competitive spirit they bring from the kitchen.
  arts: Brittany Shepherd enjoys the culinary storytelling of Anthony Bourdain, the cello performances of Yo‑Yo Ma, the acting of Meryl Streep in 'The Devil Wears Prada', and regularly attends community
    theater productions at the Paper Mill Playhouse and concerts at the New Jersey Performing Arts Center, allowing them to blend cultural depth with their love of food narratives.
  travel: Brittany Shepherd prefers carefully planned, short‑duration trips that combine culinary workshops with historic tours, has explored farm‑to‑table markets in Tuscany, tea gardens in Kyoto, and
    colonial streets in Charleston, and dreams of a future journey to Provence’s lavender fields to source heirloom seeds, all while budgeting within a modest vacation fund.
  culinary: Brittany Shepherd, an accomplished home chef, transforms heirloom tomatoes, basil, and thyme from their garden into fresh caprese salads, roasted vegetable lasagna, and homemade pesto, balances
    classic family recipes such as chicken pot pie with experimental sous‑vide salmon, and relishes dining at farm‑focused restaurants like The Farmhouse in New Jersey for inspiration.
  core: Brittany Shepherd blends a meticulous, competitive kitchen mind with a love for solitary garden experiments, yet often worries about stress and can be skeptically guarded in both professional and
    personal circles.
background:
  cultural: Brittany was raised in a middle‑class, predominantly white suburban community in New Jersey, with family roots tracing back to English and Irish ancestors who settled in the Mid‑Atlantic in
    the early 20th century. Her upbringing emphasized education, community involvement, and a respect for tradition—values reflected in her observance of American holidays such as Thanksgiving and the Fourth
    of July and her participation in local civic events. The cultural ethos of Basking Ridge—with its historic colonial heritage and strong emphasis on quality of life—shapes her practical yet curious outlook,
    blending a reverence for proven methods with an openness to new culinary ideas.
