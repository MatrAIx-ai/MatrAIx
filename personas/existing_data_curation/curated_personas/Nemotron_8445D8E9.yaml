  career_goals: Brittany aims to transition from supervising a single kitchen to a regional management role overseeing multiple food‑service sites within a corporate or educational institution. She plans
    to earn a Certified Food Protection Manager credential and enroll in a hospitality‑management certificate program to complement her education background. Long‑term, she envisions opening a family‑run
    café that highlights seasonal, locally sourced produce while offering a mentorship program for aspiring culinary professionals. She is also motivated to implement sustainability initiatives—such as
    waste reduction and energy‑efficient equipment—in her current operation, positioning herself as a leader in responsible food service.
