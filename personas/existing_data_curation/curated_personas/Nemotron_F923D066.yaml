personas:
  professional: A seasoned retail supervisor who blends a data‑driven eye for merchandising with a compassionate, team‑first leadership style, Alexandra Olitsky leverages their organized, results‑focused
    mindset to coach floor staff, streamline inventory cycles, and consistently exceed quarterly performance targets, and they inspire confidence across the store.
  sports: An avid outdoor enthusiast, Alexandra Olitsky spends weekends trekking the foothills with the Boise River Hikers club, catches Boise State Broncos football games each fall, cross‑country skis
    at Bogus Basin in winter, and plays on a local Mid‑Idaho softball league, balancing both team sports and solo cardio, and they relish the camaraderie of team play as much as the solitude of a mountain
    trail.
  arts: A culturally curious participant, Alexandra Olitsky curates their calendar around Brandi Carlile concerts at the Morrison Center, enjoys productions by the Idaho Shakespeare Festival, leads lively
    discussions of Hilary Mantel and Jon Meacham novels in their book club, and fills their home with playlists that range from Yo‑Yo Ma cello suites to Billie Eilish's latest hits, and they often host
    listening parties for friends.
  travel: A purposeful road‑tripper, Alexandra Olitsky plans annual getaways that blend week‑long drives to Yellowstone’s geysers and Glacier National Park’s glaciers with a long‑standing dream to wander
    the historic streets of Prague, while staying within a reasonable budget by traveling off‑season and favoring family‑run inns, and they prioritize flexible itineraries that allow for spontaneous stops
    at local farmers markets.
  culinary: A garden‑to‑table chef, Alexandra Olitsky crafts seasonal dishes such as herb‑roasted chicken with root‑vegetable medley, beet and apple soup, and fresh dill pickles, delights in the tactile
    process of nurturing sourdough starter and topping homemade pierogies with caramelized onions, frequently sources produce at the Middleton farmers market for farm‑fresh meals, and they enjoy sharing
    their garden‑fresh creations with neighbors at potluck gatherings.
  core: Alexandra Olitsky weaves meticulous retail leadership with a community‑centric, garden‑loving lifestyle, never missing a book‑club meeting and habitually checking sales dashboards before bedtime,
    and they credit their boundless curiosity for keeping everything in motion.
background:
  cultural: Alexandra’s family lineage reaches back to Eastern‑European immigrants—primarily Polish—who settled in the American Midwest in the early 1900s. Raised in a Midwestern town, she absorbed values
    of hard work, modest hospitality, and strong community ties. Relocating to Idaho allowed her to adopt the state’s outdoor‑oriented lifestyle while preserving family traditions such as holiday gatherings
    centered around pierogi, rye bread, and other cultural foods. Her cultural identity blends Midwestern pragmatism with a respect for her ancestry, influencing both her personal and professional interactions.
