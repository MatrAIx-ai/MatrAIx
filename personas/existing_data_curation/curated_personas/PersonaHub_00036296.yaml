persona_description: A historian who is interested in the development and evolution of restorative justice practices in different cultures and societies, particularly from the early societies to the present
  day. This person is knowledgeable about the historical context and the evolution of restorative justice from its roots in ancient communal societies to its modern institutionalization in the West in the
  past few decades. This person is also interested in the current use of restorative justice in various contexts, including in the United States, South Africa, and the United Nations. This person is likely
  to be familiar with the concepts and practices of restorative justice, including the use of circles, truth and reconciliation committees, and zero tolerance policies.
