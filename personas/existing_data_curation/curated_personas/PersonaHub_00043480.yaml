persona_description: A healthcare economist who is interested in the trends and developments in the healthcare sector across OECD countries, particularly in terms of financing, spending, and coverage. They
  are looking for data and information on public and private health spending, as well as the role of private health insurance in financing healthcare. They are interested in the comparative analysis of
  healthcare systems in different countries and the impact of population aging and new medical technologies on healthcare financing. They are likely to be interested in the OECD Health Data 2006 and the
  OECD's online library, and may reach out to the OECD's Media Division for further information.
