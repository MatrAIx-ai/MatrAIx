  career_goals: Martha dreams of a future where she can blend art and science. She imagines becoming a wildlife photographer who documents Alaska’s animals, a marine biologist studying salmon, or a digital
    artist creating interactive stories. She is eager to learn new technologies and hopes to design her own video games or robots, aiming to inspire others with her unique ideas.
