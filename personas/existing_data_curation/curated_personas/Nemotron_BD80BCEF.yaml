personas:
  professional: Martha Erickson, a budding junior naturalist, blends meticulous wildlife sketching on Anchorage’s trails with imaginative game design on Scratch, channeling their curiosity and competitive
    drive into precise artwork and strategic problem‑solving.
  sports: Martha Erickson enjoys cross‑country skiing lessons at the Anchorage Youth Ski Club and ice skating at the local rink where they cheer for the Alaska Aces junior squad, while in the summer they
    play pickup soccer with friends, always seeking to outscore opponents.
  arts: Martha Erickson spends weekends drawing Alaskan wildlife in watercolors, inspired by the vivid illustrations of Beatrix Potter and the dynamic murals of local artist Laurie Anderson at the Anchorage
    Museum, and they channel that creative energy into building intricate LEGO cityscapes and crafting whimsical sprites for Scratch games.
  travel: Martha Erickson dreams of kayaking through Kenai Fjords National Park after their recent family visit to the Alaska SeaLife Center, and they plan a future adventure to watch the aurora borealis
    from a cabin in Fairbanks, balancing the thrill of distant horizons with the comfort of staying near school during the week.
  culinary: Martha Erickson favors salmon‑and‑cream cheese bagels for breakfast, whips up blueberry‑lime smoothies with fresh berries, and enjoys helping Mom roll dough for homemade pepperoni pizza, yet
    they often sneak extra chocolate chips into the topping when no one watches.
  core: Martha Erickson blends a keen eye for Alaskan wildlife with a competitive spirit, turning outdoor adventures into art, games, and a pocket‑money plan for the next LEGO masterpiece.
background:
  cultural: Martha grows up in a middle‑class white family in Anchorage, Alaska. Her household blends typical American traditions—celebrating holidays like Thanksgiving and Christmas—with a strong connection
    to the local environment. Long winters shape her love for indoor arts and winter sports, while summer offers opportunities to explore the wilderness, observe moose, salmon, and the northern lights.
    She participates in school activities and community events, gaining exposure to the diverse cultural heritage of Alaska, including learning about Indigenous art forms through museum programs and school
    projects.
