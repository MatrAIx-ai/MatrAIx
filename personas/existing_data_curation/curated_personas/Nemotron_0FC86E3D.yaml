personas:
  professional: Bertha Bush is a tech-savvy administrative professional who leverages eight years of executive support experience and a STEM graduate background to streamline workflows with advanced Microsoft
    and Google tools, while channeling her curiosity and flexible mindset into data-driven project coordination and inclusive workplace initiatives, all while pursuing CAP and PMP certifications.
  sports: Bertha Bush enjoys weekend hikes at Pinckney Recreation Area, practices yoga at the local Mindful Flow studio, follows the Detroit Lions and Detroit Pistons, and occasionally joins a community
    basketball league, balancing a laid-back approach to exercise with occasional sprint intervals when training for a local 5k race.
  arts: Bertha Bush frequents the Detroit Institute of Arts, draws inspiration from contemporary painters like Kehinde Wiley and seminal photographers such as Gordon Parks, curates an online portfolio of
    watercolor landscapes, and finds solace in listening to jazz pianist Robert Glasper and R&B vocalist H.E.R. during creative sessions.
  travel: Bertha Bush prefers low-key, culturally immersive getaways, often planning spontaneous weekend road trips to historic cities like New Orleans and Savannah, while dreaming of a future trip to Accra
    to explore its musical roots, and they typically combine budget airlines and Amtrak passes to balance cost with comfort.
  culinary: Bertha Bush is an intermediate home chef who blends soul-food traditions, such as collard greens seasoned with smoked paprika and sweet potato pie, with fresh garden-grown kale and heirloom
    tomatoes, often experimenting with hearty stews and jazz-inspired flavor pairings, though they occasionally let leftover rice sit too long before reheating.
  core: Bertha Bush is a curious, art-infused admin specialist who balances a flexible, occasionally disorganized work style with a strong drive to mentor and champion inclusive, data-driven initiatives.
background:
  cultural: Bertha is a Black American who grew up in the culturally rich neighborhoods of Detroit, where church, music, and community solidarity shaped her early life. Her family maintains traditions of
    gathering for celebrations such as Juneteenth and Kwanzaa, and she cherishes the oral histories and literature of the African‑American experience. Now living in Howell, Michigan, she actively engages
    with local Black churches, supports Black‑owned businesses, and participates in regional cultural festivals that highlight African‑American arts and cuisine. She draws strength from her heritage, using
    it to mentor young Black students in STEM and to bring diverse perspectives to her professional environment.
attributes:
  skills: '["Advanced Microsoft Office (Word, Excel, PowerPoint, Outlook)", "Google Workspace (Docs, Sheets, Calendar)", "Data analysis with Python (pandas, matplotlib)", "Statistical reporting in Excel",
    "Calendar and travel management", "Event planning and logistics", "Project management software (Asana, Trello)", "Customer relationship management (CRM) systems", "Technical writing and documentation",
    "Basic programming in R and MATLAB", "Budget tracking and expense reporting", "Conflict resolution and interpersonal communication"]'
  hobbies: '["Watercolor painting", "Photography", "Visiting art galleries and museums", "Reading sci‑fi and technology non‑fiction", "Yoga and mindfulness practice", "Hiking in local parks", "Gardening
    (vegetables and herbs)", "Volunteering for STEM mentorship programs", "Attending jazz and R&B concerts", "Cooking and exploring soul food recipes"]'
  career_goals: Bertha aims to leverage her technical aptitude and administrative experience to move into a senior office‑manager or project‑coordinator role within a technology‑focused or arts‑cultural
    organization. Over the next three years she plans to earn a Certified Administrative Professional (CAP) credential and a Project Management Professional (PMP) certification, positioning herself to lead
    cross‑functional initiatives that improve workflow efficiency and foster innovation. She is also interested in exploring remote or hybrid work arrangements that give her flexibility, allowing her to
    balance her career progression with family responsibilities and her passion for community outreach. Ultimately, she hopes to mentor younger professionals, particularly women of color entering STEM fields,
    and to be a catalyst for inclusive workplace culture.
