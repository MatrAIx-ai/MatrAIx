  career_goals: Although retired, Chandranie’s ambitions focus on preserving her legacy and maintaining her independence. She aims to compile a family cookbook that blends traditional recipes with personal
    anecdotes, creating a tangible heirloom for future generations. She hopes to mentor her grandchildren in both culinary arts and cultural traditions, sharing stories of her homeland and teaching them
    the values of resilience and curiosity. Chandranie also aspires to continue her volunteer work at the senior center, teaching cooking classes and leading low‑impact exercise sessions to help peers manage
    anxiety and stay active. Healthwise, she strives to keep her mobility and mental sharpness through daily walks, crosswords, and mindfulness practices, ensuring she can remain a supportive presence for
    her family and community.
