persona_description: A Russian architect who worked on the construction of St. Basil's Cathedral in Moscow in 1555–1561, and is said to have been blinded by Ivan the Terrible for his work on the cathedral.
  He is credited with the main plan for the construction and is also the creator of the walls and towers of the Kazan fortress, which resemble those of the Moscow Kremlin. His work is known for its intricate
  design and its unique architectural style. Despite the legend about the architects' blinding, there is no concrete evidence to support it.
