personas:
  professional: Santiago Borges is a 24‑year‑old restaurant manager who leverages data‑driven cost‑optimization, people‑management savvy, and a love for avant‑garde plating to run a high‑volume kitchen,
    and they maintain a flexible, sometimes disorganized schedule that fuels their competitive drive for continuous improvement.
  sports: Santiago Borges plays forward for a local Houston Adult Soccer League team called the 'Lone Star Strikers,' follows the Houston Dynamo MLS club, and they squeeze in weekend pick‑up games to stay
    active, combining competitive spirit with a laid‑back approach to fitness.
  arts: Santiago Borges spends weekends wandering Houston’s vibrant mural districts, photographing works by street artists like Shepard Fairey‑inspired local creator Mike Ross, curating food‑themed photo
    essays that blend culinary plating with visual storytelling, and they unwind with documentaries like Chef’s Table and the sci‑fi novel series by Becky Chambers.
  travel: Santiago Borges prefers spontaneous weekend getaways, having explored Oaxaca’s night markets, spent a culinary tour in Austin’s food‑truck capital, and dreaming of a week‑long Barcelona tapas
    crawl, and they budget travel through a mix of discount flights and hostel stays to fund their experimental pop‑up restaurant ideas.
  culinary: Santiago Borges cooks at an advanced level, regularly deconstructing classic mole and carnitas into foam, gel, and micro‑corn presentations, while they experiment with unconventional ingredients
    like squid ink, activated charcoal, and epazote, and proudly serve dishes such as spherified salsa verde atop a taco‑shell crisp.
  core: Santiago Borges is a data‑driven kitchen maestro who blends traditional flavors with avant‑garde art, splurges on street‑food adventures, occasionally forgets to file a bill, and they never let
    stress dim their competitive spark.
background:
  cultural: Santiago grew up in a Mexican‑American household in Houston, where Spanish and English intermingle daily. Family gatherings centered around traditional dishes like mole, tamales, and carnitas,
    instilling a deep respect for Mexican culinary heritage. He celebrates cultural holidays such as Día de los Muertos and Mexican Independence Day, often incorporating these themes into his personal cooking
    projects. The multicultural fabric of Houston, with its diverse cuisines and arts scene, has broadened his perspective, allowing him to blend Mexican roots with contemporary influences in both his professional
    and personal life.
