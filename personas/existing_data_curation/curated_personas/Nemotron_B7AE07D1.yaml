  career_goals: Santiago aims to transition from managing a single restaurant to opening his own culinary concept that merges traditional Mexican flavors with avant‑garde presentation and experimental techniques.
    He envisions a pop‑up‑style eatery that leverages flexible staffing and rotating menus, allowing him to test new ideas without rigid constraints. In the long term, he hopes to develop a small chain
    of such venues across Texas, positioning himself as a thought leader in innovative, culturally rooted cuisine while building a personal brand through social‑media food content and community workshops.
