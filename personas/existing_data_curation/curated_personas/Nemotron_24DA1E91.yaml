  sports: Marisol Zelaya, despite being only a year old, enjoys watching the local junior soccer club the Little Giants at the community field and giggles at televised games of the New York Yankees, preferring
    short, energetic bursts of activity during baby gym sessions where they display a competitive spark, and they gravitate toward informal play rather than structured team sports.
  arts: Marisol Zelaya's arts persona is shaped by nightly lullabies from the Beatles, vibrant picture books by Dr. Seuss, and animated cartoons featuring Pixar's Toy Story characters, fostering an early
    appreciation for music and visual storytelling, and they tend to favor quiet, solitary listening over large group sing‑alls, reflecting their reserved nature.
  travel: Marisol Zelaya's travel persona features short weekend trips to the nearby botanical garden, a family vacation to San Diego's zoo, and a cherished visit to grandparents' lakeside cottage, where
    they prefer familiar, sensory‑rich environments and small group settings over long flights or crowded tourist attractions.
  culinary: Marisol Zelaya delights in pureed sweet potatoes, mashed bananas, and tiny bites of avocado toast, enjoys experimenting with soft finger foods like steamed carrots, and their parents encourage
    a balanced diet by introducing mild spices such as cinnamon, while they occasionally display picky eating habits and a strong preference for smooth textures.
  core: Marisol Zelaya is a curious yet caution‑filled one‑year‑old who balances adventurous crawling with a practical need for comforting routines, often worrying about new stimuli while savoring the safety
    of familiar surroundings.
