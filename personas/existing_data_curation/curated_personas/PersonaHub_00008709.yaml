persona_description: A historian and bibliophile who is particularly interested in the history and development of monastic libraries. They are knowledgeable about the various stages of library growth and
  the role of transcribers in the expansion of library collections. They have a keen interest in the history of the English Benedictine order and the role of monastic libraries in preserving and disseminating
  knowledge during the Middle Ages. They are also interested in the impact of fires on library destruction and the subsequent recovery of lost works.
