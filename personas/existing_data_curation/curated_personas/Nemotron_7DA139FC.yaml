  career_goals: Although retired, Raburn aims to deepen his expertise in local and American art, aspiring to publish a series of articles on the evolution of folk art in New England for the town’s historical
    journal. He also plans to compile and digitize his extensive family genealogies and the Chelmsford Historical Society’s archives, creating an online resource for researchers. Additionally, he wishes
    to mentor younger volunteers in archival techniques and project management, passing on his methodical skills. On a personal level, he hopes to master basic oil‑painting techniques, allowing him to produce
    his own artwork for exhibitions at his community center. Ultimately, his ambition is to leave a lasting, organized legacy of knowledge and community resources that reflect his lifelong curiosity and
    disciplined approach.
