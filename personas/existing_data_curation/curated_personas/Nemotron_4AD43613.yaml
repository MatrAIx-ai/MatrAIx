personas:
  professional: Mathew Stiles is a charismatic wholesale sales representative for a manufacturing firm, leveraging their knack for quickly mastering product specifications and their talk‑heavy, relationship‑focused
    style to turn technical details into practical selling points while flexibly juggling leads in a CRM that reflects their relaxed, adaptable schedule.
  sports: Mathew Stiles is a devoted Texas Longhorns football fan who never misses a game‑day tailgate, a weekly member of the Guadalupe River Anglers Club, a casual hiker on the Hill Country trails, and
    a participant in the local recreational basketball league that sponsors the San Antonio Spurs, using these outlets to satisfy their competitive streak while still maintaining a laid‑back approach to
    fitness.
  arts: Mathew Stiles is an avid live‑music enthusiast who frequents local bars to catch country stars like George Strait and rock acts such as Foo Fighters, appreciates the regional polka bands at Wurstfest,
    and collects vintage concert posters, channeling their sociable energy into cheering loud and debating song lyrics with fellow fans.
  travel: Mathew Stiles is a spontaneous road‑trip planner who has driven to Austin for SXSW, trekked the Colorado Rockies for a weekend hike, spent a long weekend in New Orleans for Mardi Gras, and dreams
    of a future getaway to Munich’s Oktoberfest, preferring flexible itineraries that let them detour to a roadside BBQ pit when the mood strikes.
  culinary: Mathew Stiles is a grill‑master who feels most at home smoking a brisket slab seasoned with a secret blend of coffee and paprika, crafting homemade bratwurst with a Jäger‑beer glaze at Wurstfest,
    and topping their tacos with pickled jalapeños and fresh cilantro, while their casual cooking style can lead to occasional over‑salting when they’re in a hurry.
  core: Mathew Stiles blends Texan grit with German precision, thriving on social buzz, a competitive edge, and a flexible, curiosity‑driven approach to work and life, where they constantly seek new challenges.
background:
  cultural: Mathew is a white Texan raised in New Braunfels, a city known for its strong German heritage and vibrant Hispanic influences. Growing up in a small‑town environment, he adopted the Texan values
    of independence, practicality, and friendliness, while routinely participating in German cultural events such as Oktoberfest and Wurstfest, reflecting the community’s legacy. The blend of German precision
    and Texas adaptability informs his work ethic and social style. He is comfortable navigating both English and the occasional Spanish phrases common in the region, and he appreciates the communal spirit
    of local gatherings, from church picnics to country fairs. This multicultural backdrop shapes his personable, easy‑going demeanor and his pragmatic approach to both life and business.
attributes:
  skills: '[''B2B sales'', ''Negotiation'', ''Customer relationship management'', ''Product knowledge (manufacturing)'', ''Cold calling'', ''CRM software (Salesforce)'', ''Logistics coordination'', ''Public
