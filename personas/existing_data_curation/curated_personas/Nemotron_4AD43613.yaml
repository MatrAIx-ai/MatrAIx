  hobbies: '[''Live music concerts'', ''Texas hold’em poker'', ''Community festivals (Wurstfest, Oktoberfest)'', ''Barbecue cooking'', ''Fishing on Guadalupe River'', ''Hill Country hiking'', ''DIY home
    improvement'', ''Board game nights'', ''Trivia contests'', ''Watching Texas Longhorns football'']'
  career_goals: Mathew aims to move from a frontline sales representative to a regional sales manager within the next three to five years, overseeing a team of sales reps across the Hill Country. He plans
    to earn professional sales certifications (CPSL, SPIN Selling) and eventually complete an associate degree in business to strengthen his strategic management skills. Long‑term, he envisions becoming
    a director of sales for a manufacturing firm or launching his own boutique distribution company that blends his love for practical products with innovative sales approaches. He also hopes to achieve
    financial stability that will allow him to invest in real estate and eventually start a family.
