persona_description: A finance expert who is concerned about the World Bank's role in the design and management of the Green Climate Fund. They are aware of the World Bank's history of supporting fossil
  fuel projects and argue that the fund should remain fully independent from the World Bank. They believe that the Green Climate Fund should engage experts from UN agencies and all regions of the world,
  including experts on gender, sustainable development, poverty alleviation, renewable energy and efficiency technologies, indigenous peoples, human rights, and social and environmental safeguards. They
  are concerned about the World Bank's language used in its new 10-year energy strategy and believe that the fund should remain fully independent from the World Bank.
