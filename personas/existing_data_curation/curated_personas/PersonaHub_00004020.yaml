persona_description: A multidisciplinary team of researchers from across Wales who are aiming to redesign the lifecycle of laboratory gloves to reduce waste and promote sustainable practices in laboratories.
  The team includes scholars from Cardiff University's Schools of Engineering, Psychology, Medicine, Business, and the Sustainable Places Research Institute, as well as experts from Aberystwyth University
  and Bangor University. The project aims to develop innovative solutions and infrastructure to facilitate safe recycling and composting of hazardous laboratory materials, and to promote sustainable behaviors
  and practices within laboratories.
