  hobbies: '[''water play'', ''exploring backyard'', ''picture books'', ''sing‑along songs'', ''building block towers'', ''dance and movement'']'
  career_goals: While still at the beginning of her life journey, Sheriann’s emerging curiosity and desire for harmony point toward future aspirations of learning and helping others. Her long‑term goal
    is to develop strong language and social skills in preschool, eventually become a caring educator or community volunteer who supports families in Waycross. She dreams of one day teaching children how
    to explore the world with both imagination and practical understanding.
