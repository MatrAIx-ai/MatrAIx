    building workshops'']'
  career_goals: Rogelio aims to earn his journeyman‑level pipefitter certification within the next two years, followed by a master pipefitter credential. He aspires to open a boutique contracting firm that
    specializes in sustainable plumbing solutions—such as rain‑water harvesting, grey‑water recycling, and low‑flow fixtures—while offering custom, artistically crafted metalwork for residential remodels.
    Long‑term, he envisions teaching advanced pipefitting techniques at a local trade school and becoming a trusted advisor for green‑building projects in Los Angeles.
