  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Woodworking'', ''Reading (historical non-fiction)'', ''Cooking'', ''Volunteer Community Workshops'', ''Book Club'']'
  career_goals: Janet aims to transition into a supervisory and entrepreneurial role by obtaining a master‑glazier certification and establishing her own small glazier business focused on sustainable, energy‑saving
    retrofits. She is passionate about mentoring the next generation of tradespeople, developing apprenticeship programs, and partnering with local nonprofit housing initiatives to improve window safety
    and efficiency for low‑income families in the Inland Empire. Additionally, she hopes to become a recognized advisor on building resilience to earthquakes and wildfires, leveraging her practical expertise
    to benefit her community.
