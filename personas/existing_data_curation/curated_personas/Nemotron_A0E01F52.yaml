personas:
  professional: Janet Cooper, a seasoned glazier known for precision cutting, safe installation of low‑E glass, and exacting code compliance, channels their calm resilience and strong community ethic into
    mentoring apprentices and spearheading a fledgling eco‑retrofit business.
  sports: Janet Cooper stays active by weekend hikes in the San Bernardino Mountains, volunteers as a trail guide for the local San Bernardino Mountain Hikers club, and they support the Los Angeles Dodgers
    as a seasonal baseball fan while occasionally joining a community bowling league.
  arts: Janet Cooper intertwines their hands‑on woodworking hobby with a love of historical nonfiction, finding inspiration from the prairie ballads of John Denver and the American Southwest canvases of
    Georgia O’Keeffe, while they regularly attend the San Bernardino County Fair’s art showcase and share book‑club discussions on Maya Angelou’s memoirs.
  travel: Janet Cooper favors self‑planned road trips that blend light hiking with cultural stops, having already driven the Pacific Coast Highway to explore Yosemite and the historic missions of San Juan
    Capistrano, and they now dream of a week‑long immersion in Oaxaca’s culinary scene once their glazier business stabilizes financially.
  culinary: Janet Cooper, an adept home cook, regularly prepares hearty seasonal dishes such as rosemary‑roasted chicken with sweet potatoes, barley‑lentil soup brimming with garden carrots and kale, and
    occasionally experiments with homemade black‑bean enchiladas topped with fresh pico de gallo, all while they enjoy the process of preserving their garden’s bounty through canning.
  core: Janet Cooper balances a pragmatic work ethic with gentle curiosity, often juggling their love of precision glasswork with a habit of over‑watering their garden and a tendency to binge‑read historical
    biographies on rainy afternoons.
background:
  cultural: Janet comes from an Anglo‑American working‑class background, raised in the Midwest before moving to the Inland Empire in Southern California. Her upbringing emphasized self‑reliance, a strong
    work ethic, and community responsibility. Living in San Bernardino has broadened her cultural perspective, leading her to engage with the region’s diverse population, learn basic Spanish phrases, and
    participate in local traditions and community events. She values practicality, compassion, and cooperation, reflecting both her personal heritage and the collaborative spirit of her adopted community.
