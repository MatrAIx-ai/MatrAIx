persona_description: An advocate for limiting the number of biosafety labs, particularly those dealing with lethal pathogens like smallpox and anthrax. They are knowledgeable about the potential risks associated
  with the proliferation of these labs and have advocated for a national strategy for oversight of the labs. They are concerned about the potential for dangerous pathogens to be accidentally or deliberately
  released into the wild and have called for the number of BSL-3 and BSL-4 labs to be cut by a factor of 20 to 40. They are a member of the American Biological Safety Association and have spoken publicly
  about the importance of maintaining the security and safety of these labs.
