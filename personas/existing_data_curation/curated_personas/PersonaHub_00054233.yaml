persona_description: A military historian who specializes in the study of the SS Mountain Regiments, particularly the formation of the 23 SS Mountain "Kama" in Bosnia and Herzegovina in 1944. The historian
  is interested in the history of collaboration between Muslim, Croatian, and German soldiers in the Balkans, the role of the 23 SS Mountain "Kama" in the creation of an autonomous region for the Muslims
  under the authority of the SS, and the impact of the division on morale and desertion. The historian is also interested in the history of military training in the Balkans and the role of the Red Army
  in the Balkans during the war.
