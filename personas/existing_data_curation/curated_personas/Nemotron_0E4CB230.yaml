personas:
  professional: Betty Glenn is a seasoned bookkeeping professional; they bring meticulous attention to detail, mastery of QuickBooks, Sage 50, and advanced Excel, and a curiosity for artistic communities
    that fuels their reputation as the go‑to financial advisor for local creators and non‑profits.
  sports: Betty Glenn hits the trails year‑round; they join the Bennington Trailblazers cross‑country ski club in winter, race in the Green Mountain Running Club’s 5K charity events, and cheer on the Vermont
    Lake Monsters baseball team and the University of Vermont Catamounts basketball squad.
  arts: Betty Glenn nurtures their creative side; they sketch Green Mountain vistas during hikes, attend weekly workshops at the Bennington Museum where they study works by folk painter Grandma Moses and
    photographer Ansel Adams, and volunteer as treasurer for the community theater that stages productions of Harold Pinter plays and Bob Dylan song circles.
  travel: Betty Glenn favors scenic road trips that blend art and nature; they have explored the historic streets of Burlington, the lavender fields of Provence, the vibrant markets of Oaxaca, and the autumn
    foliage of New England’s White Mountains, while planning a future journey to the Japanese countryside for its seasonal festivals.
  culinary: Betty Glenn enjoys farm‑to‑table cooking; they master dishes such as maple‑glazed salmon, roasted heirloom carrots with thyme, and spiced pumpkin risotto, frequently sourcing local honey, Vermont
    cheddar, and fresh squash from the Bennington farmer’s market.
  core: Betty Glenn is a methodical numbers guru with a painter’s eye, balancing spreadsheets with watercolor sketches, yet they cannot resist an impromptu purchase of a new brush set during a financial
    audit break.
background:
  cultural: Betty was raised in a middle‑class, white New England family with deep roots in rural Vermont. Her ancestry is primarily English and Irish, and she grew up surrounded by the traditions of small‑town
    community life, seasonal farming cycles, and a strong appreciation for the natural landscape of the Green Mountains. The local culture emphasizes self‑reliance, neighborly cooperation, and participation
    in communal events such as town meetings, harvest festivals, and volunteer initiatives. These values have shaped Betty’s pragmatic yet compassionate outlook, her love for community engagement, and her
    respect for the region’s artistic folk heritage.
attributes:
  skills: '["Bookkeeping", "Financial reconciliation", "Tax filing", "QuickBooks", "Sage 50", "Advanced Excel (pivot tables, macros)", "Data visualization", "Audit preparation", "Internal controls", "Process
    documentation", "Workflow optimization", "Time management", "Customer service", "Financial reporting", "Training and mentorship"]'
  hobbies: '["Art workshops", "Landscape sketching", "Community theater volunteering", "Book club organizer", "Cooking classes", "Cross‑country skiing", "Town festival planning", "Financial‑literacy volunteering",
    "Hiking", "Farm‑to‑table cooking"]'
  career_goals: Betty aims to obtain the Certified Bookkeeper (CB) credential within the next year and leverage it to transition into a senior accounting consultant role for local small‑business owners
    and non‑profits in Bennington County. She is passionate about designing and leading community‑based financial‑literacy workshops, especially for artists and entrepreneurs, where she can blend her love
    of art with her accounting expertise. Long‑term, she hopes to establish a part‑time boutique bookkeeping practice that offers advisory services while giving her more time for her artistic pursuits and
    volunteer work.
