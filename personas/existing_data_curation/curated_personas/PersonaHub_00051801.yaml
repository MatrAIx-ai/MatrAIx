persona_description: A scientist at Washington University School of Medicine in St. Louis who studies the FGF family of proteins and their role in wound healing and vision loss, particularly in the context
  of diabetes and macular degeneration. The scientist's research involves examining the mechanisms by which FGF signaling is turned off in these diseases and how increasing FGF signaling in the body might
  improve wound healing and prevent vision loss. The scientist's work has implications for treating diseases involving abnormal blood vessel growth and may have implications for clinical treatments.
