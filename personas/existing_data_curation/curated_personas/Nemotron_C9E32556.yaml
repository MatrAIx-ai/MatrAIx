  career_goals: Patrick hopes to earn his GED within the next two years and then enroll in a vocational program that trains him as an automotive technician or diesel mechanic. He is attracted to careers
    that blend hands‑on problem solving with a predictable work routine, such as working in a local garage, joining a regional trucking company as a driver after getting a commercial license, or eventually
    running his own small repair shop. In the long term, he envisions building a modest business that serves the community, perhaps offering equipment maintenance for farms and local businesses, while maintaining
    a flexible schedule that allows him to stay involved in his friends’ activities and family life.
