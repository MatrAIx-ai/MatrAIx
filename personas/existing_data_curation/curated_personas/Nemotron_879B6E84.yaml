personas:
  professional: Theresa Phillips is an enthusiastic toy store clerk in her playroom, arranging plastic goods on low shelves, greeting other kids with a bright 'hello', and proudly maintaining a simple cash
    register that helps they practice counting and responsibility; they thrive on the predictable opening-and-closing routine of their make-believe shop while offering snacks and crayons to friends, blending
    organization with the flexibility needed for imaginative play.
  sports: Theresa Phillips is an active member of the neighborhood toddlers’ gymnastics class, where they climb soft foam structures, practice tumble rolls, and giggle on the mini-slide; they also attend
    the Tiny Tigers kid’s soccer group on Saturday mornings, learning to kick a soft foam ball while cheering for the hometown baseball team, the River City Cubs, by waving a tiny cap during televised games,
    blending their love for group activities with their sociable nature.
  arts: Theresa Phillips is a budding artist who delights in finger painting with non-toxic watercolors, scribbling bright circles that often turn into abstract animals; they love singing along to The Wiggles'
    Fruit Salad, clapping to the rhythm of Disney's Let It Go, and watching Sesame Street, especially the antics of Cookie Monster, their playful imagination sparked by these musical and visual cues, leading
    them to perform impromptu dances for family members.
  travel: Theresa Phillips is an enthusiastic explorer who enjoys short car trips with a favorite stuffed rabbit, taking them to the grandparents' farm in the countryside to feed chickens, visiting the
    city aquarium where they marvel at colorful fish, and spending a weekend at Clearwater Beach building sand castles and collecting shells; they prefer structured itineraries with a clear start and finish,
    delighting in pointing out new sights on picture-book maps and dreaming of future trips to places like Disney World and the Grand Canyon.
  culinary: Theresa Phillips is a developing foodie who prefers soft, easy-to-chew foods such as mashed sweet potatoes, banana slices, cheese cubes, and bite-size chicken nuggets, often dipping pea sticks
    in mild hummus for extra flavor; they love plain yogurt with a drizzle of honey and can be coaxed into trying a small bite of avocado toast, especially when their mother frames it as a 'green superhero'
    snack, while their cooking skills are limited to spreading peanut butter on toast with a clumsy but earnest hand.
  core: Theresa Phillips, a two-year-old who thrives on routine, bright smiles, and group play, balances a practical curiosity with a generous heart, turning every day into a mini-adventure of learning,
    sharing, and joyful discovery.
background:
  cultural: Theresa is raised in a White, Southern Texas family in Kountze, Hardin County. Her upbringing reflects traditional Texan values, emphasizing community, family gatherings, church attendance,
    and celebration of holidays such as Thanksgiving, Christmas, and the Fourth of July. She experiences Southern hospitality, country music, regional cuisine, and modest, practical outlooks reinforced
    by her family's cultural traditions.
attributes:
  skills: '[''Following daily routines'', ''Simple self-dressing'', ''Toy organization by color'', ''Basic verbal communication'', ''Sharing and cooperative play'', ''Recognition of shapes and colors'']'
  hobbies: '[''Singing nursery rhymes'', ''Dancing to music'', ''Playing with building blocks'', ''Crayon coloring'', ''Group playdates'', ''Nature walks with family'']'
  career_goals: Although only two years old, Theresa already shows budding interest in caring and helping roles. She enjoys mimicking her parents in the kitchen and often says she wants to be a teacher
    after observing preschool teachers. Her early ambitions center on continuing to learn, assisting her family, and eventually pursuing a caring profession such as teaching or nursing, guided by her love
    for routine and practical contribution.
