personas:
  professional: Siv Johnson, a budding naturalist and amateur wildlife documentarian, channels their curiosity about the Appalachian woods into detailed bird‑watching logs, hand‑drawn sketches, and a growing
    collection of nature‑themed Minecraft builds, balancing a practical, hands‑on approach with a love of fantasy storytelling.
  sports: Siv Johnson, an enthusiastic member of a Boy Scout hiking crew and a junior angler on the local trout stream, cheers for the West Virginia Mountaineers basketball team on Sunday evenings while
    occasionally joining the school’s intramural soccer league, yet they prefer solitary trail runs over crowded gym sessions.
  arts: Siv Johnson, a bluegrass aficionado who sings along to Bill Monroe and Ricky Skaggs at family gatherings, devotes free evenings to sketching deer and hawks, and reads the Harry Potter series and
    Percy Jackson novels for inspiration, weaving storytelling into their Minecraft creations.
  travel: Siv Johnson, whose family road trips have taken them to Shenandoah National Park for campfire storytelling and to the New River Gorge for rock‑collecting, dreams of backpacking through Yellowstone
    and seeing the Aurora Borealis over Iceland, but their travel plans are often shaped by school schedules and budget constraints.
  culinary: Siv Johnson, who loves home‑cooked cornbread topped with honey, enjoys grilling freshly caught catfish on the porch, and often snacking on trail mix made of peanuts, dried cranberries, and pretzels,
    balances simple comfort foods with occasional cravings for pepperoni pizza after a long Minecraft session.
  core: Siv Johnson blends a love of solitary exploration, bluegrass tunes, and hands‑on nature projects into a curious yet easy‑going outlook, occasionally forgetting chores but always ready with a sketchbook
    and a fishing line.
background:
  cultural: Siv comes from a white, Appalachian family rooted in Fayette County, West Virginia. His upbringing reflects the region’s emphasis on self‑reliance, close‑knit family ties, and community support,
    often centered around church events and local festivals that celebrate coal‑mining heritage and folk music. The cultural landscape has given him a respect for the land, a practical work ethic, and an
    appreciation for traditional music and storytelling, all of which shape his values and interests.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Computer basics (typing, Scratch programming)'', ''Bicycle maintenance'', ''Woodworking (simple projects)'', ''First aid basics'', ''Outdoor
    navigation and map reading'', ''Basic fishing techniques'']'
  hobbies: '[''Reading fantasy novels'', ''Exploring the woods'', ''Bird watching'', ''Fishing'', ''Playing Minecraft'', ''Drawing and sketching'', ''Collecting rocks and insects'', ''Listening to bluegrass
    music'']'
  career_goals: Siv dreams of turning his love of nature and his hands‑on skills into a future career as a park ranger or wildlife technician. He wants to study environmental science in high school and
    eventually attend college to work in forest conservation, helping preserve the Appalachian woods he explores. He also hopes to give back to his community, perhaps by teaching younger kids about outdoor
    safety and local ecology.
