personas:
  professional: David Waken, a seasoned retail supervisor in Lake Havasu City, blends methodical inventory control, data‑driven sales analysis, and a curiosity for emerging POS technologies with their reliable,
    organized leadership style to mentor staff and streamline store operations for community impact.
  sports: David Waken, a devoted angler and birdwatcher, spends weekends on Lake Havasu with the Lake Havasu Anglers Club, follows the Arizona Cardinals and Phoenix Suns with fervor, and they occasionally
    join a local senior softball league to keep active during the cooler desert evenings.
  arts: David Waken, an avid nature photographer and woodworking enthusiast, captures desert sunsets and migratory birds while listening to folk legends like Bob Dylan and Johnny Cash, reads classic detective
    novels by Agatha Christie and Dashiell Hammett, and they often display restored vintage metal signs inspired by Southwestern art at their home.
  travel: David Waken, a methodical planner, prefers scenic road trips to natural wonders such as the Grand Canyon, Sedona’s red rocks, and Baja California’s fishing villages, and they dream of an Alaskan
    salmon‑fishing expedition, always booking modest motels and using a detailed itinerary to balance adventure with comfort.
  culinary: David Waken, a competent home cook, relishes grilling freshly caught lake trout with lemon‑herb butter, simmering a hearty southwestern chili seasoned with cumin and chipotle, and they often
    experiment with cedar‑plank smoking techniques while keeping a well‑organized spice rack.
  core: David Waken, a meticulous retiree, harmonizes his disciplined work ethic with quiet passions for fishing, photography, and mentoring, all while navigating the occasional habit of over‑organizing
    his tools and forgetting to floss.
background:
  cultural: David is a White American whose family roots trace back to Anglo‑Irish immigrants who settled in the Midwest before moving to Arizona in the 1970s. He grew up with a strong work ethic typical
    of Midwestern values—punctuality, reliability, and community orientation. Since relocating to Lake Havasu City, he has embraced the relaxed, outdoors‑focused lifestyle of the Southwest while maintaining
    traditions such as celebrating Thanksgiving, Fourth of July barbecues, and attending the local Lutheran church. His cultural outlook blends a modest, pragmatic Midwestern sensibility with an appreciation
    for the region’s retirement‑friendly, outdoor‑recreation culture.
