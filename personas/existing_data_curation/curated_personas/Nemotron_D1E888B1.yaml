  career_goals: Approaching retirement, David aims to consolidate his decades of retail experience into a legacy of mentorship and operational excellence. His primary ambition is to mentor emerging supervisors,
    formalizing a training program that captures his practical knowledge while introducing contemporary retail tools. He also hopes to streamline store operations to improve profitability and customer satisfaction,
    positioning the store as a community hub. In the longer term, David envisions transitioning to a part‑time consultancy role, advising small businesses on inventory management and staff development,
    while maintaining a flexible schedule to spend more time with his wife and pursue personal interests.
