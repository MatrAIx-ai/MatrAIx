  hobbies: '[''Playing pick‑up basketball'', ''CrossFit group classes'', ''Hiking in the Kentucky countryside'', ''Attending live music venues'', ''Cooking BBQ and trying new recipes'', ''Volunteering at
    community health events'', ''Playing video games'', ''Mindfulness and meditation practice'']'
  career_goals: Louis aims to deepen his clinical expertise by pursuing a Master’s degree in Physician Assistant Studies with a focus on sports medicine and orthopedics, fields that align with his interest
    in helping active individuals. He aspires to take on a leadership role as a Clinical Coordinator, where he can implement structured care pathways and improve workflow efficiency in a busy outpatient
    setting. Long‑term, he hopes to co‑found a community health clinic in rural Jefferson County to address healthcare access gaps, leveraging his competitive drive to secure funding and build partnerships
    with local hospitals and universities.
