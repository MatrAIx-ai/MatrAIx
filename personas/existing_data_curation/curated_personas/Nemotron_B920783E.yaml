personas:
  professional: J Faller is a 29-year-old physician assistant who combines precise clinical assessment and procedural expertise with a competitive, structure-loving mindset, efficiently triaging emergencies
    and streamlining workflows while occasionally letting a flexible, disorganized side cause missed paperwork.
  sports: J Faller thrives on pick-up basketball games at the local YMCA, trains at CrossFit Louisville, hikes the Daniel Boone National Forest year-round, avidly follows the Louisville Cardinals and Kentucky
    Wildcats, and brings a competitive edge to every workout, often timing personal bests against friends.
  arts: J Faller immerses themselves in Louisville's bluegrass scene by frequenting the Bluegrass on the Green festival and catches indie shows at the Mercury Ballroom featuring bands like the War on Drugs,
    while also channeling creativity into crafting smoked BBQ recipes that they treat like a culinary performance.
  travel: J Faller's travel style blends spontaneous weekend hikes in the Daniel Boone National Forest with planned music pilgrimages to Nashville's honky-tonk bars, and they dream of an adventurous trek
    through New Zealand's South Island, all while balancing a modest travel budget and occasional work-related constraints.
  culinary: J Faller enjoys experimenting with Southern BBQ, mastering a hickory-smoked brisket glazed with bourbon and brown sugar, perfecting side dishes like collard greens and cornbread, and their intermediate
    cooking skill shines during neighborhood potlucks where they showcase rib rubs featuring cayenne and smoked paprika.
  core: J Faller is a competitive, structure-driven PA who channels anxiety into rigorous fitness, loves group activities, cooks smoky BBQ, and balances meticulous financial planning with occasional disorganized
    lapses.
background:
  cultural: Louis was raised in a middle‑class white family in Louisville, Kentucky, where Southern hospitality and community ties are central. His upbringing involved regular attendance at a Methodist
    church, participation in local festivals like the Kentucky Derby festivities, and a strong loyalty to the University of Louisville sports teams. He’s been influenced by the blend of Midwestern pragmatism
    and Southern tradition, valuing both practical, structured approaches to problem‑solving and the warmth of collaborative, neighborly networks. This cultural mix informs his work ethic, social interactions,
    and commitment to community health.
attributes:
