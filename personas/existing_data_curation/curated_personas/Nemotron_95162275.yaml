personas:
  professional: Imran Wikramanayake, a seasoned operations and business manager with three decades of expertise in strategic planning, budgeting, and financial analysis, leverages their practical curiosity
    and relaxed, collaborative leadership style to champion sustainable supply‑chain initiatives and mentor emerging managers in Northern Virginia's diverse market.
  sports: Imran Wikramanayake follows the Washington Commanders and the Washington Capitals, plays for the Northern Virginia Cricket Club during the spring, and maintains fitness with weekend hikes on the
    Catoctin Trail, preferring low‑impact activities that harmonize with their love of nature and community sport.
  arts: Imran Wikramanayake cultivates a love for the arts by attending local theater productions of Shakespeare, listening to the improvisational jazz of John Coltrane, and collecting impressionist prints
    by Monet, which together provide a reflective escape from their busy professional life.
  travel: Imran Wikramanayake enjoys well‑planned road trips to the Shenandoah Valley and historic Williamsburg, while dreaming of a slow‑paced cultural tour of Kyoto and the Scottish Highlands, favoring
    a mix of comfortable accommodations and immersive local experiences that align with their curiosity and desire for relaxation.
  culinary: Imran Wikramanayake is an adept home chef who expertly prepares aromatic spiced rice pilafs, coconut‑infused stew, and herb‑laden vegetable dishes using fresh coriander, cumin, cardamom, and
    mint, often sharing these flavorful meals with family and friends in a convivial garden setting.
  core: Imran Wikramanayake balances a pragmatic senior advisory career with a love for gardening, spice‑rich cooking, community cricket, and occasional disorganization, all while staying generously supportive
    and quietly resilient in the face of life's challenges.
background:
  cultural: Imran traces his roots to a Sri Lankan Muslim family that immigrated to the United States in the early 1970s. Growing up in a bilingual household, he learned both English and Sinhala, absorbing
    a mixture of Islamic traditions and Sinhalese cultural values centered on respect, hospitality, and communal harmony. The family settled in the Washington, D.C. metropolitan area, where Imran experienced
    the multicultural tapestry of Northern Virginia. His cultural identity blends South Asian customs—celebrating Ramadan, Eid, and Sri Lankan New Year—with American civic engagement, reflected in his participation
    in local community boards and his commitment to volunteer service. This dual heritage informs his inclusive leadership style, his love for South Asian cuisine, and his appreciation for multicultural
    dialogue.
