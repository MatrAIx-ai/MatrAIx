  career_goals: Looking ahead, Imran aims to transition from day‑to‑day operational oversight to a senior advisory role that leverages his decades of experience to mentor emerging managers and shape corporate
    social‑responsibility initiatives. He is passionate about creating a structured succession plan for his department, fostering a culture of continuous learning, and leading community‑focused financial‑literacy
    workshops in Loudoun County. Over the next five years he hopes to serve on the board of a local nonprofit, consult for startups seeking sustainable growth strategies, and achieve a balanced work‑life
    rhythm that honors his family and personal interests.
