personas:
  professional: Sheldon Minter, a veteran librarian and media collections specialist, channels their methodical organization, STEM-savvy cataloging expertise, and competitive drive into leading a community-driven
    digital archive of local history while they mentor emerging professionals.
  sports: Sheldon Minter, an avid kayaker with the St. Lucie River Explorers club, stays fit by paddling the Indian River Lagoon each week, cheers on the Tampa Bay Buccaneers and Tampa Bay Lightning, and
    occasionally joins senior fitness classes for low-impact strength training, all while they maintain a disciplined routine.
  arts: Sheldon Minter, who spends evenings listening to Miles Davis, B.B. King, and Ella Fitzgerald, regularly attends live gigs at the local Riverfront Jazz Club, and channels their creative impulse into
    crafting wooden shelves that echo the improvisational spirit of the music they love.
  travel: Sheldon Minter prefers thoughtfully planned trips that blend historical exploration with gentle adventure, having visited the Civil War sites of Savannah, the culinary markets of New Orleans,
    and the natural wonders of the Florida Keys, while they dream of a future research pilgrimage to the National Archives in Washington, D.C., all balanced against a modest retirement budget.
  culinary: Sheldon Minter, an enthusiastic home cook who cultivates hibiscus, basil, and mint in their tropical garden, delights in preparing herb-infused grilled mahi-mahi with a side of citrus-scented
    rice and a cup of homemade hibiscus tea, though they occasionally forget to season properly when rushed.
  core: Sheldon Minter, a disciplined 71-year-old librarian with a competitive edge, weaves together a love of meticulous record-keeping, birdwatching, classic jazz, and weekly chess into a life marked
    by quiet curiosity, occasional over-critical tendencies, and a steadfast commitment to preserving community history, and they never miss a chance to log a new bird sighting.
background:
  cultural: Sheldon is an African American who grew up in the Deep South during the Civil Rights era, an experience that instilled in him a deep respect for education, community, and resilience. His family
    has roots in Florida's historically Black neighborhoods, and he maintains close ties to the local Black church, where he has served on outreach committees. The cultural emphasis on storytelling and
    preserving oral histories inspired his commitment to creating a digital archive of African American experiences in St. Lucie County. While he embraces contemporary technology, he also honors traditional
    values such as family solidarity, mentorship, and service to the community. His background informs his dedication to making library resources inclusive and accessible, ensuring that the histories and
    voices of Black residents are documented and celebrated for future generations.
attributes:
  skills: '[''Cataloging and Classification (Dewey Decimal, LC)'', ''Metadata Management (MARC, Dublin Core, RDA)'', ''Digital Preservation (digitization, format migration, storage strategies)'', ''Integrated
    Library System Administration (Alma, WorldCat)'', ''Data Analysis and Reporting (Excel, SQL, Python scripting)'', ''Project Management (budgeting, grant writing, acquisition planning)'', ''User Instruction
    and Outreach (workshops for seniors, community programs)'', ''Multimedia Collection Development (audio‑visual materials)'', ''Research Assistance and Reference Services'', ''Technology Integration (hardware
    setup, network troubleshooting)'']'
  hobbies: '[''Tropical gardening (hibiscus, orchids, herbs)'', ''Birdwatching with systematic species checklist'', ''Reading (African American biographies, history)'', ''Genealogy research for community
    members'', ''Listening to jazz and blues music'', ''Playing chess at the senior center'', ''Woodworking (shelves, small furniture)'', ''Kayaking on the Indian River Lagoon'', ''Volunteer tutoring and
    technology workshops for seniors'']'
  career_goals: Sheldon aims to leave a lasting legacy by establishing a community‑driven digital archive that documents the African American history of St. Lucie County. He plans to secure a grant from
    the National Endowment for the Humanities to fund oral‑history recording projects, digitization of local newspapers, and the creation of an open‑access repository hosted on Omeka. He also seeks to mentor
    emerging librarians through a formal apprenticeship program at the St. Lucie County Library System, and to teach an adjunct course on digital curation at Indian River State College. Additionally, he
    wishes to develop a series of technology‑focused workshops that help senior citizens navigate online resources, thereby strengthening intergenerational connections within the community. By the time
    he transitions to emeritus status, he hopes to be recognized for innovative integration of STEM‑based solutions in public library services.
