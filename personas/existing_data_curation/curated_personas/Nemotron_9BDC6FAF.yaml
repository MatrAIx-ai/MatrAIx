personas:
  professional: Debra Rieger, a five‑year‑old classroom helper in kindergarten who proudly organizes the cubby‑hole system, asks “why” questions about the earth and the classroom rug, and brings a gentle,
    cooperative spirit that makes them the go‑to friend for sharing crayons and solving simple puzzles.
  sports: Debra Rieger, a five‑year‑old who plays in the local community soccer program and cheerfully chants the Dallas Cowboys fight song during backyard games, proudly wears a mini Cowboys jersey, and
    watches the Texas Rangers on TV with wide eyes, yet prefers the freedom of a playground swing over structured drills.
  arts: Debra Rieger, a five‑year‑old who spends afternoons drawing bright pictures of unicorns and cartoon heroes, sings along to Disney’s Frozen and Sesame Street, eagerly watches Taylor Swift’s kid‑friendly
    performances on family TV, and delights in crafting glittery friendship bracelets during crafts hour.
  travel: Debra Rieger, a five‑year‑old who loves family trips to the Dallas Arboretum for picnics and the Great Wolf Lodge for splash‑down fun, eagerly maps out future adventures to the Grand Canyon and
    the San Antonio River Walk, but prefers destinations with plenty of playgrounds and ice‑cream stops.
  culinary: Debra Rieger, a five‑year‑old who adores cheesy mac and cheese, chicken nuggets, and cheese quesadillas, helps stir batter for pancakes on Saturday mornings, insists on a generous splash of
    ketchup on fries, and politely declines broccoli unless it’s doused in ranch dressing.
  core: Debra Rieger is a curious, organized five‑year‑old who balances playful wonder with gentle cooperation, loves sticker collections, and has a quirky habit of over‑packing their backpack with extra
    crayons and snacks.
background:
  cultural: Debra is a white American child raised in suburban Dallas, Texas. Her family observes typical Southern‑Texas customs such as celebrating Thanksgiving, Christmas, and Fourth of July with gatherings
    and meals that blend classic American dishes with Tex‑Mex flavors. They attend a local community church, participate in neighborhood events, and value hospitality and friendliness. The cultural environment
    encourages outdoor play, community involvement, and an appreciation for diverse cultural influences present in the Dallas metro area.
