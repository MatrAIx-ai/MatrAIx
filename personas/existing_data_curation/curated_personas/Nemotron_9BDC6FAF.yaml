  hobbies: '[''Drawing and coloring'', ''LEGO Duplo building'', ''Pretend play (doctor, kitchen)'', ''Reading picture books'', ''Listening to music and dancing'', ''Playing at the park'', ''Riding a tricycle'']'
  career_goals: Although only five, Debra dreams of growing up to help others. She often says she wants to be a veterinarian because she loves animals and enjoys caring for her stuffed pets. She also imagines
    being a teacher, sharing stories and guiding younger children. Her ambition is to be a kind helper in her community, reflecting her caring personality.
