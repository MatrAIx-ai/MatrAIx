persona_description: An historian who is interested in the study of the Mughal Empire, its culture, and its influence on South Asia. The person is likely to be interested in the causes of its collapse and
  the legacy of the empire on modern India. They would be familiar with the works of Muhammad Asad and Douglas Streusand, and have a keen interest in the history of the Mughal rulers, particularly those
  who ruled in the 18th century. They would also be interested in the works of Indian writers such as Baber, Ali, and Malika Mohammada, and would appreciate the contributions of scholars like Charles T.
  Evans and Marc Jason Gilbert in understanding the complex history of South Asia.
