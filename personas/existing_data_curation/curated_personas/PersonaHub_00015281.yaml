persona_description: An experienced and knowledgeable educator who is specifically trained to work with educable mentally retarded (EMR) pupils, and is well-versed in the life-problem curricular concept
  and the psychology of learning that applies to these pupils. The reader is likely to be a teacher of EMR pupils who has experience in implementing the curriculum guide's sample lesson plans and discussing
  its objectives and outcomes. They are likely to be interested in the instructional materials and resources provided in the guide, and may have a strong interest in understanding the psychology of learning
  and the life-problem curricular concept in the context of working with EMR pupils.
