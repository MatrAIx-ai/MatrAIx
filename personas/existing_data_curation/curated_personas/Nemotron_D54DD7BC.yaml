  career_goals: Dwyane dreams of a future where his love for art, discovery, and quiet, focused work can intersect. He often talks about becoming an astronaut who can explore the stars, an artist who paints
    vivid murals, and a wildlife researcher who sketches animals in detail. He also expresses interest in becoming a computer programmer because he enjoys solving puzzles methodically and values a calm,
    predictable work environment. Ultimately, he hopes to combine his curiosity and creative talents in a career that lets him work independently while contributing something meaningful.
