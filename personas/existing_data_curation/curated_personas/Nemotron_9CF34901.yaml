    Road Conditions'']'
  hobbies: '[''Cooking Vietnamese and Southern dishes'', ''Karaoke nights with friends'', ''Hiking the Blue Ridge Mountains'', ''Community volunteering at food banks'', ''Participating in local festivals
    and cultural events'', ''Gardening'', ''Playing pick‑up soccer and basketball'', ''Attending church and temple gatherings'', ''Exploring electric vehicle technology'', ''Handcrafting quilts or embroidery'']'
  career_goals: Looking ahead, Phuongthao aims to transition from hands‑on driving to a supervisory role in logistics and fleet management. She plans to obtain a CDL Class A to qualify for longer‑haul routes
    and eventually purchase her own truck, allowing her to start a small, community‑oriented transport business that offers reliable delivery services for local businesses and provides discounted rides
    for seniors and immigrants. Concurrently, she wishes to earn a certification as a driver trainer, so she can mentor new drivers from underrepresented backgrounds. Over the next five years, she hopes
    to enroll in an associate‑degree program in supply‑chain management, broaden her sales expertise to include regional contract negotiations, and take on a leadership position that lets her combine her
    practical knowledge with her passion for helping others.
