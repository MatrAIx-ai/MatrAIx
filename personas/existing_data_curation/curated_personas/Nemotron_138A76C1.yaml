  hobbies: '[''Church choir participation'', ''Book club attendance'', ''Gardening'', ''Cooking Southern soul‑food dishes'', ''Quilting'', ''Playing bridge'', ''Volunteer work at senior centers'', ''Genealogy
    research'', ''Walking with friends in local parks'', ''Attending African‑American cultural festivals'']'
  career_goals: Although retired, Audrey is driven to keep contributing to her community. She aims to formalize an intergenerational oral‑history project that records the stories of African‑American elders
    in Fort Bend County, partnering with the local library and her church. She also hopes to expand her role as a senior mentor, offering guidance to high‑school and college‑bound youth interested in the
    humanities. Over the next few years, she plans to author a modest collection of essays and recipes that celebrate Southern Black culinary traditions, preserving them for future generations. Ultimately,
    Audrey wants to remain a trusted pillar in her neighborhood, ensuring that routine community gatherings continue to foster connection and support.
