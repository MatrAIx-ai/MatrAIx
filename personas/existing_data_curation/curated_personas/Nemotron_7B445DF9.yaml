personas:
  professional: Carmen Tourino, an imaginative middle‑school illustrator and budding game‑concept creator, blends hand‑drawn sketches with digital art tools, channeling a love of rhythmic salsa, plena,
    and bomba beats into vivid futuristic cityscapes, while they prefer solitude and flexible timing, fueling spontaneous bursts of creation despite occasional worry about unfinished projects.
  sports: Carmen Tourino enjoys watching the Orlando Magic on TV while they swim solo laps at the community center as a member of the Orlando Kids Swim Club, prefers the rhythmic flow of water to organized
    team drills, occasionally kicks a soccer ball alone in the backyard, and feels drained by group practice sessions, so they keep their fitness routine low‑key and self‑paced.
  arts: Carmen Tourino immerses themselves in the animated worlds of Hayao Miyazaki, the graphic storytelling of Brian K. Vaughan’s Saga, and the pulsating reggaeton beats of Bad Bunny, often drawing character
    drafts while the salsa rhythms of Celia Cruz spin through their headphones, and they shape a vibrant creative voice.
  travel: Carmen Tourino dreams of wandering the sun‑kissed streets of Barcelona after an adventurous day at Disney World and a quiet hike through the Ocala National Forest, but their travel plans stay
    loosely sketched, relying on family vacations that blend cultural festivals like Three Kings Day with nature trips, and they let imagination fill the gaps between booked flights.
  culinary: Carmen Tourino loves the smoky flavor of lechón, the sweet‑savory combo of arroz con gandules, and the buttery crunch of pastelillos, while also craving pizza slices with extra mozzarella and
    fresh basil, often helping in the kitchen by whisking pancake batter and experimenting with digital recipe apps, though they occasionally forget to clean up after cooking, turning the kitchen into a
    cheerful mess.
  core: Carmen Tourino is an imaginative, solitary creator who transforms rhythmic beats into vivid sketches, and they navigate a storm of worries with a scatter‑brained yet endearing planning style, finding
    comfort in quiet library corners and nature trails.
background:
  cultural: Carmen grew up in a bilingual Puerto Rican household in Orlando, where Spanish and English flow interchangeably at home. Her family celebrates traditional festivals such as Three Kings Day and
    the Puerto Rican Day Parade, bringing flavors like lechón, arroz con gandules, and pastelillos to family gatherings. Music and dance, especially salsa, plena, and bomba, are a constant presence, influencing
    her rhythmic sensibilities. She attends a local Catholic church where community values and storytelling traditions reinforce her respect for heritage. The vibrant Puerto Rican community in Orange County
    offers her a sense of belonging, while the multicultural environment of Orlando exposes her to a diverse array of cultures, reinforcing her appreciation for both her roots and the broader world.
attributes:
  skills: '["creative writing","digital illustration","basic Scratch programming","storyboarding","pattern recognition","LEGO design"]'
  hobbies: '["drawing and sketching","creative writing","digital art on tablet","LEGO building","nature walks and shell collecting","listening to bomba and reggaeton music","reading fantasy novels"]'
  career_goals: Carmen dreams of turning her love for stories and images into a future career as a graphic novelist or animator, where she can weave abstract concepts into visual narratives. She is also
    fascinated by marine life along Florida's coasts and imagines herself someday contributing to environmental education through illustrated children's books about the ocean. While she enjoys solitary
    work, she hopes to develop collaborative projects with peers that respect her need for flexibility and creative freedom. Ultimately, she aspires to blend art, technology, and a deep appreciation for
    nature into a profession that lets her explore new ideas without rigid constraints.
