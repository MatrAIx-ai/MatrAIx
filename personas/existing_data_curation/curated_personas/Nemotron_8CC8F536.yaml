  hobbies: '[''Reading adventure books'', ''Building LEGO sets'', ''Playing chess'', ''Keeping a personal journal'', ''Swimming lessons'', ''Helping with cooking traditional Mexican dishes'', ''Nature walks
    and sketching'', ''Basic Scratch programming projects'', ''Participating in school science club'', ''Collecting and organizing stickers'']'
  career_goals: Although she’s only ten, Ana already imagines a future where she can apply her love of structure and planning. She dreams of becoming a civil engineer to design safe, organized spaces and
    sustainable homes, and she also considers a career as a teacher or school librarian where she could create orderly learning environments for younger kids. Her immediate ambition is to excel academically,
    win her school’s science fair, and later pursue an engineering degree while staying connected to her Mexican cultural roots. She hopes to serve as a model for her siblings in managing stress, planning
    ahead, and achieving goals.
