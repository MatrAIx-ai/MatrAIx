  career_goals: Salim aspires to leverage his decades of hands‑on experience into a leadership role within the local logistics sector. In the next five years he aims to obtain a certification in transportation
    management and transition to a fleet supervisor position, overseeing a small team of drivers for a regional winery distribution network. He dreams of launching his own boutique delivery service focused
    on artisanal goods—wine, cheese, and handcrafted products—where he can combine his sales acumen with his love for art and culture. Salim also hopes to mentor younger drivers, sharing best practices
    on safety, customer service, and stress‑management. Embracing emerging technology, he plans to integrate electric vehicles and route‑optimization software into his operations, positioning his future
    business as environmentally responsible. Ultimately, he seeks a stable, less‑stressful role that provides financial security for his family while allowing time for his artistic interests.
