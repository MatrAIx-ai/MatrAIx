personas:
  professional: Annetta Prude leverages their keen observational skills and practical efficiency as a bustling Newark café host, juggling reservations, seating assignments, and conflict de‑escalation while
    eyeing a supervisory floor‑manager role within the next two years.
  sports: Annetta Prude enjoys solitary jogs along the Passaic Riverfront Trail, tunes into New Jersey Devils hockey games, participates in a casual Sunday pickup basketball league with close friends, and
    follows the New York City Marathon as inspiration for personal fitness goals.
  arts: Annetta Prude immerses themselves in the improvisational sounds of Kamasi Washington, devours contemporary literature exploring resilience and social dynamics, visits Newark Museum’s intimate galleries
    featuring local photographers such as Rodger Doucette, practices basic piano chords from Debussy’s Arabesque, and enjoys low‑key board games like Catan with a tight‑knit circle.
  travel: Annetta Prude prefers low‑key weekend getaways, having explored historic Philadelphia and the jazz‑laden streets of New Orleans, while dreaming of a solo trek through the Blue Ridge Mountains,
    always balancing tight budgeting with a love for spontaneous coffee‑shop discoveries.
  culinary: Annetta Prude relishes crafting pour‑over coffee with Ethiopian Yirgacheffe beans, whipping up avocado toast topped with radish and lemon zest, and savoring flaky croissants at boutique bakeries,
    though their cooking repertoire is limited to quick brunch staples and reheated leftovers.
  core: Annetta Prude blends quiet curiosity with practical ambition, channeling a love for coffee culture, jazz, and solo exploration into a future boutique café that serves as a community hub.
background:
  cultural: Anneta is a second‑generation African‑American who grew up in Newark’s East Side, an area steeped in Black cultural heritage and infused with Caribbean influences. Her family’s roots trace back
    to the Southern United States, and her parents emphasized community, resilience, and pride in Black identity. She has been shaped by Newark’s legacy of civil‑rights activism and the vitality of local
    Black‑owned businesses, which inspire her ambitions to contribute to the city’s cultural tapestry. While naturally reserved, she values the close‑knit support of her extended family and neighborhood,
    often incorporating elements of African‑American culinary traditions and music into her personal interests.
