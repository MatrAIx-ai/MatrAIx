  career_goals: Anneta aims to translate her front‑of‑house experience into a supervisory role within the next two years, targeting a floor manager position at a locally owned restaurant or coffee shop.
    She plans to complete her associate degree in hospitality management to deepen her operational expertise and enhance her competitive advantage. Long‑term, she aspires to launch a boutique coffee shop
    in Newark that showcases African‑American cultural art, provides a community‑focused space for intimate gatherings and live jazz, and reflects her blend of curiosity and practicality. Her ambition is
    grounded in a desire to create a sustainable, culturally resonant business that offers both personal fulfillment and tangible contributions to her neighborhood.
