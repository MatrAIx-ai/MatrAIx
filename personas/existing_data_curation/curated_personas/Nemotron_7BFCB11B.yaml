  hobbies: '[''Playing basketball'', ''Robotics club (Arduino projects)'', ''Volunteering at animal shelter'', ''Playing acoustic guitar'', ''Reading science‑fiction novels'', ''Multiplayer video gaming
    (Minecraft, Fortnite)'', ''Journaling for stress management'']'
  career_goals: Brian aspires to pursue a career that blends his practical problem‑solving skills with his strong desire to help others. He plans to become an emergency medical technician (EMT) after completing
    a high‑school health‑sciences program and obtaining certifications in first aid and CPR. In the longer term, he is interested in studying biomedical engineering at a university, where he can design
    medical devices that improve patient care. Brian also hopes to volunteer in community outreach programs and eventually serve as a mentor to younger students, using his leadership experience to foster
    a supportive and harmonious environment.
