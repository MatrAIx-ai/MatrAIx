persona_description: A scientist who is part of a group of European researchers funded by the European Union to develop a sensor-based data visualisation system that dynamically adjusts the complexity level
  of displayed data based on human triggers and physiological reactions. The system aims to enhance cognition by guiding users to areas of data that are potentially more interesting and engaging. The research
  is focused on museums, public and commercial organizations, and potential applications include virtual retail store environments, airport visualisation of soil quality and climate, and more. The system's
  core concept is to provide a personalised interactive environment for learning, and its technology has been used at the Bergen-Belsen memorial site for two years. The system is designed to be lightweight
  and not require the wearing of a full sensor uniform, making it more accessible and less invasive.
