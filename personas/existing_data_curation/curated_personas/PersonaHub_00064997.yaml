persona_description: A historian who specializes in the study of colonialism and the impact of European imperialism on non-European societies. Their research interests include the history of race and ethnicity,
  the legacy of slavery and colonialism, and the cultural and social impacts of European expansion. They have a deep understanding of the ways in which European science and technology have been used to
  justify and perpetuate racism and colonialism, and they are committed to understanding and challenging these historical legacies.
