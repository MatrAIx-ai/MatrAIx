persona_description: A person interested in renewable energy and its implementation, particularly in the context of utility services and policies. This person is likely to be familiar with the concepts
  of distributed generation, net metering, and net excess generation, and may have an interest in understanding the role of state public utility commissions and investor-owned utilities in regulating utilities.
  This person may also be interested in the incentives and policies provided by the Database of State Incentives for Renewables & Efficiency (DSIRE) and the Energy Policy Act of 2005 (EPAct).
