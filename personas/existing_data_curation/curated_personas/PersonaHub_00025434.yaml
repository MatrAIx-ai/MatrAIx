persona_description: A historian who specializes in the study of American history, particularly the social and economic changes that occurred during the 1950s and 60s. She is interested in understanding
  the role of World War II in ending discrimination against blacks and women and in promoting equality for all Americans. She is also interested in the impact of the Servicemen's Readjustment Act of 1944
  and the Equal Pay Act of 1963 on the middle class and the role of women in the workforce.
