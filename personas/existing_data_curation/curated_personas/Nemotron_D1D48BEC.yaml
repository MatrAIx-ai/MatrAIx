  hobbies: '[''Watercolor painting'', ''Sketching'', ''Community theater'', ''Volunteering at senior center (arts & crafts)'', ''Gardening'', ''Hiking local trails'', ''Book club participation'', ''Podcast
    listening (innovation, art)'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Crocheting'', ''Attending art fairs and farmers markets'']'
  career_goals: Marielle aims to formalize her expertise by earning the Certified Pharmacy Technician (CPhT) credential and an immunization certification within the next year. She aspires to become a lead
    pharmacy technician, overseeing a team and coordinating continuing‑education programs for staff. In the long term, she hopes to design a patient‑education initiative that blends medication counseling
    with visual art tools, making complex information more accessible. Additionally, she plans to launch a free community art workshop for seniors and adults in Millsboro, leveraging her organizational
    strengths to sustain the program. Marielle also wishes to mentor younger women entering the pharmacy field and to advocate for mental‑health awareness among healthcare professionals, drawing on her
    own experiences with anxiety.
