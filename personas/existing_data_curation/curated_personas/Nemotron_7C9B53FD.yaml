    clean-up'', ''participating in cultural festivals'', ''woodworking'']'
  career_goals: Geovanny aims to advance to a supervisory role within the Houston Parks and Recreation Department, eventually becoming a recreation director for a large community center. He plans to earn
    an associate’s degree in recreation management and acquire the Certified Park & Recreation Professional (CPRP) credential. Over the next five years, he hopes to design an intergenerational health-and-wellness
    program that bridges youth and senior participants, and to secure funding for culturally-focused activities that celebrate Mexican heritage. Long-term, he envisions transitioning to part-time consulting,
    offering expertise to nonprofit groups seeking to expand inclusive recreation services while ensuring a stable retirement.
